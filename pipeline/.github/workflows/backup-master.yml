name: backup-master

on:
  push:
    branches: [master]

# タグ push に必要（リポジトリ既定の GITHUB_TOKEN は read-only のため明示昇格）
permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: create timestamped tag
        run: |
          TAG="backup/$(date -u +'%Y%m%d-%H%M%S')"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created tag: $TAG"
