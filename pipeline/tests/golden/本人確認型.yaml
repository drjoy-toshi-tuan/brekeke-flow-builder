      - "入力_診察券番号"
      - "OpenAI_診察券番号"
      - "saveContext_patientId"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "生年月日"
      - "入力_生年月日"
      - "OpenAI_生年月日"
      - "生年月日_00_07確認"
      - "入力_生年月日_00_07確認"
      - "OpenAI_生年月日_00_07確認"
      - "saveContext_patientDateOfBirth"
      - "OpenAI_連絡先_着信番号判定"
      - "連絡先電話番号_確認"
