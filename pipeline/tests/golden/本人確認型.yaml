      - module: "入力_生年月日"
        type: "dtmf"
        value: "20000101"
        expected_openai_output: "valid"
      - module: "OpenAI_連絡先_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "09099998888"
      - module: "入力_連絡先電話番号_確認"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
      - module: "入力_最後の問い合わせ"
        type: "stt_result"
        value: "ありません"
        expected_openai_output: "なし"
    expected_path:
