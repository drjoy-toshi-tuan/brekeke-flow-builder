      - module: "入力_診察券番号"
        type: "no_result"
        value: ""
        expected_openai_output: "NO_RESULT"
      - module: "入力_診察券番号_再聴取"
        type: "stt_result"
        value: "9876543"
        expected_openai_output: "数字"
      - module: "入力_患者名"
        type: "stt_result"
        value: "鈴木一郎"
        expected_openai_output: "鈴木一郎"
      - module: "入力_生年月日"
        type: "dtmf"
        value: "19750101"
        expected_openai_output: "valid"
      - module: "OpenAI_連絡先_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "09011112222"
      - module: "入力_連絡先電話番号_確認"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
      - module: "入力_最後の問い合わせ"
        type: "stt_result"
        value: "ありません"
        expected_openai_output: "なし"
    expected_path:
      - "診察券番号"
      - "入力_診察券番号"
      - "リトライ_診察券番号"
      - "診察券番号_再聴取"
      - "入力_診察券番号_再聴取"
      - "OpenAI_診察券番号_再聴取"
      - "saveContext_patientId"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "生年月日"
      - "入力_生年月日"
      - "OpenAI_生年月日"
      - "saveContext_patientDateOfBirth"
      - "OpenAI_連絡先_着信番号判定"
      - "連絡先電話番号_確認"
      - "入力_連絡先電話番号_確認"
      - "OpenAI_連絡先電話番号_確認"
      - "最後の問い合わせ"
      - "入力_最後の問い合わせ"
      - "OpenAI_最後の問い合わせ"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      patientId: "9876543"
      patientName: "鈴木一郎"
      patientDateOfBirth: "1975-01-01"
      telephoneNumber: "09011112222"
    expected_status: "1"
    expected_sms_flag: "1"

  - name: "retry_患者名_no_result_skip"
    description: >
      患者名でNO_RESULT→リトライ→再度NO_RESULT→No more→スキップして生年月日へ
    category: "retry"
    preconditions:
      telephoneNumber: "09033334444"
      classification: "予約変更"
    inputs:
      - module: "入力_診察券番号"
        type: "stt_result"
        value: "1111111"
        expected_openai_output: "数字"
      - module: "入力_患者名"
        type: "no_result"
        value: ""
        expected_openai_output: "NO_RESULT"
      - module: "入力_患者名"
        type: "no_result"
        value: ""
        expected_openai_output: "NO_RESULT"
      - module: "入力_生年月日"
        type: "dtmf"
        value: "19900601"
        expected_openai_output: "valid"
      - module: "OpenAI_連絡先_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "09033334444"
      - module: "入力_連絡先電話番号_確認"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
      - module: "入力_最後の問い合わせ"
        type: "stt_result"
        value: "以上です"
        expected_openai_output: "なし"
    expected_path:
      - "診察券番号"
      - "入力_診察券番号"
      - "OpenAI_診察券番号"
      - "saveContext_patientId"
      - "患者名"
      - "入力_患者名"
      - "リトライ_患者名"
      - "患者名"
      - "入力_患者名"
      - "リトライ_患者名"
      - "生年月日"
      - "入力_生年月日"
      - "OpenAI_生年月日"
      - "saveContext_patientDateOfBirth"
      - "OpenAI_連絡先_着信番号判定"
      - "連絡先電話番号_確認"
      - "入力_連絡先電話番号_確認"
      - "OpenAI_連絡先電話番号_確認"
      - "最後の問い合わせ"
      - "入力_最後の問い合わせ"
      - "OpenAI_最後の問い合わせ"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      patientId: "1111111"
      patientDateOfBirth: "1990-06-01"
      telephoneNumber: "09033334444"
    expected_status: "1"
    expected_sms_flag: "1"

  # --- edge_case ---

  - name: "edge_case_非通知"
