      強制的に手動聴取ルートへ遷移
    category: "edge_case"
    preconditions:
      telephoneNumber: ""
      classification: "予約変更"
    inputs:
      - module: "入力_診察券番号"
        type: "stt_result"
        value: "5555555"
        expected_openai_output: "数字"
      - module: "入力_患者名"
        type: "stt_result"
        value: "田中次郎"
        expected_openai_output: "田中次郎"
      - module: "入力_生年月日"
        type: "dtmf"
        value: "19850315"
        expected_openai_output: "valid"
      - module: "OpenAI_連絡先_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: ""
      - module: "入力_連絡先電話番号_手動聴取"
        type: "dtmf"
        value: "09055556666"
        expected_openai_output: "valid"
      - module: "入力_最後の問い合わせ"
        type: "stt_result"
        value: "ありません"
        expected_openai_output: "なし"
    expected_path:
      - "診察券番号"
      - "入力_診察券番号"
      - "OpenAI_診察券番号"
      - "saveContext_patientId"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "生年月日"
      - "入力_生年月日"
      - "OpenAI_生年月日"
      - "saveContext_patientDateOfBirth"
      - "OpenAI_連絡先_着信番号判定"
      - "連絡先電話番号_手動聴取"
      - "入力_連絡先電話番号_手動聴取"
      - "OpenAI_連絡先電話番号_手動聴取"
      - "saveContext_additionalPhoneNumber"
