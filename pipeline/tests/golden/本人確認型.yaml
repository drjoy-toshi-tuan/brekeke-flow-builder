# テストベクター — 本人確認型
# 海老名総合病院 個人情報聴取サブフロー（海老名病院$個人情報聴取）の
# 診察券番号→氏名→生年月日→電話番号→最後の問い合わせ を中心にテスト
pattern: "本人確認型"
description: >
  個人情報聴取サブフローの本人確認パターンをテストする。
  診察券番号・患者名・生年月日・連絡先電話番号・最後の問い合わせの各ステップを網羅し、
  着信番号判定による携帯/固定分岐、リトライ、非通知・時間外のエッジケースを検証する。

test_vectors:
  # --- happy_path ---

  - name: "happy_path_受付完了"
    description: >
      正常フロー: 診察券番号→患者名→生年月日(valid)→着信番号あり→確認はい→
      最後の問い合わせなし→END_受付完了
    category: "happy_path"
    preconditions:
      telephoneNumber: "09012345678"
      classification: "予約変更"
    inputs:
      - module: "入力_診察券番号"
        type: "stt_result"
        value: "1234567"
        expected_openai_output: "数字"
      - module: "入力_患者名"
        type: "stt_result"
        value: "山田太郎"
        expected_openai_output: "山田太郎"
      - module: "入力_生年月日"
        type: "dtmf"
        value: "19800415"
        expected_openai_output: "valid"
      - module: "OpenAI_連絡先_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "09012345678"
      - module: "入力_連絡先電話番号_確認"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
      - module: "入力_最後の問い合わせ"
        type: "stt_result"
        value: "ありません"
        expected_openai_output: "なし"
    expected_path:
      - "診察券番号"
      - "入力_診察券番号"
      - "OpenAI_診察券番号"
      - "saveContext_patientId"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "生年月日"
      - "入力_生年月日"
      - "OpenAI_生年月日"
      - "saveContext_patientDateOfBirth"
      - "OpenAI_連絡先_着信番号判定"
      - "連絡先電話番号_確認"
      - "入力_連絡先電話番号_確認"
      - "OpenAI_連絡先電話番号_確認"
      - "最後の問い合わせ"
      - "入力_最後の問い合わせ"
      - "OpenAI_最後の問い合わせ"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      patientId: "1234567"
      patientName: "山田太郎"
      patientDateOfBirth: "1980-04-15"
      telephoneNumber: "09012345678"
    expected_status: "1"
    expected_sms_flag: "1"

  - name: "happy_path_携帯"
    description: >
      着信番号が携帯(090/080/070)の場合、着信番号判定で telephoneNumber あり→
      復唱確認「はい」で着信番号をそのまま使用するルート
    category: "happy_path"
    preconditions:
      telephoneNumber: "08012349876"
      classification: "予約キャンセル"
    inputs:
      - module: "入力_診察券番号"
        type: "stt_result"
        value: "わからない"
        expected_openai_output: "わからない"
      - module: "入力_患者名"
        type: "stt_result"
        value: "佐藤花子"
        expected_openai_output: "佐藤花子"
      - module: "入力_生年月日"
        type: "stt_result"
        value: "昭和55年8月31日"
        expected_openai_output: "valid"
      - module: "OpenAI_連絡先_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "08012349876"
      - module: "入力_連絡先電話番号_確認"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
      - module: "入力_最後の問い合わせ"
        type: "stt_result"
        value: "大丈夫です"
        expected_openai_output: "なし"
    expected_path:
      - "診察券番号"
      - "入力_診察券番号"
      - "OpenAI_診察券番号"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "生年月日"
      - "入力_生年月日"
      - "OpenAI_生年月日"
      - "saveContext_patientDateOfBirth"
      - "OpenAI_連絡先_着信番号判定"
      - "連絡先電話番号_確認"
      - "入力_連絡先電話番号_確認"
      - "OpenAI_連絡先電話番号_確認"
      - "最後の問い合わせ"
      - "入力_最後の問い合わせ"
      - "OpenAI_最後の問い合わせ"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      patientName: "佐藤花子"
      patientDateOfBirth: "1980-08-31"
      telephoneNumber: "08012349876"
    expected_status: "1"
    expected_sms_flag: "1"

  # --- retry ---

  - name: "retry_診察券番号_no_result"
