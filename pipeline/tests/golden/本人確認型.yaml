      生年月日を2桁(例: 07)で入力→2桁_0007ルート→令和/平成確認ステップ→連絡先へ
    category: "edge_case"
    preconditions:
      telephoneNumber: "07012345678"
      classification: "予約変更"
    inputs:
      - module: "入力_診察券番号"
        type: "stt_result"
        value: "2222222"
        expected_openai_output: "数字"
