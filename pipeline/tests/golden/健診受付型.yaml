      classification: "人間ドック"
      patientName: "渡辺四郎"
    expected_status: "1"
    expected_sms_flag: "1"

  # --- context ---

  - name: "context_smsFlag_6パターン"
    description: >
      施設(A/B/C)×用件(人間ドック/その他)の6パターンのsmsFlag値を列挙。
      本テストベクターは施設A+人間ドックのケースを実行し、
      他の組み合わせの期待値を notes に記載する。
    category: "context"
    preconditions:
      telephoneNumber: "09099990000"
    inputs:
      - module: "入力_施設選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "施設A"
      - module: "入力_用件選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "人間ドック"
      - module: "入力_患者名"
        type: "stt_result"
        value: "テスト太郎"
        expected_openai_output: "テスト太郎"
      - module: "OpenAI_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "09099990000"
      - module: "入力_電話番号_確認"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
    expected_path:
      - "saveContextModel2DB"
      - "incoming-classifier"
      - "冒頭_アナウンス"
      - "施設選択"
      - "入力_施設選択"
      - "OpenAI_施設選択"
      - "saveContext_facility"
      - "用件選択"
      - "入力_用件選択"
      - "OpenAI_用件選択"
      - "saveContext_classification"
      - "患者名"
      - "入力_患者名"
