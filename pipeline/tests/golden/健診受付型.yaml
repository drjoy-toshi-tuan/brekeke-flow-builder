      - "incoming-classifier"
      - "冒頭_アナウンス"
      - "施設選択"
      - "入力_施設選択"
      - "OpenAI_施設選択"
      - "saveContext_facility"
      - "用件選択"
      - "入力_用件選択"
      - "OpenAI_用件選択"
      - "saveContext_classification"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "OpenAI_着信番号判定"
      - "電話番号_手動聴取"
      - "入力_電話番号_手動聴取"
      - "OpenAI_電話番号_手動聴取"
      - "saveContext_additionalPhoneNumber"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      facility: "施設A"
      classification: "人間ドック"
      patientName: "高橋美咲"
      additionalPhoneNumber: "09055556666"
      phonetype: "その他"
    expected_status: "1"
    expected_sms_flag: "1"

  # --- retry ---

  - name: "retry_施設選択"
    description: >
      施設選択でNO_RESULT→リトライ→成功(施設A)→以降正常ルート
    category: "retry"
    preconditions:
      telephoneNumber: "09077778888"
    inputs:
      - module: "入力_施設選択"
        type: "no_result"
        value: ""
        expected_openai_output: "NO_RESULT"
      - module: "入力_施設選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "施設A"
      - module: "入力_用件選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "人間ドック"
      - module: "入力_患者名"
        type: "stt_result"
        value: "中村三郎"
        expected_openai_output: "中村三郎"
      - module: "OpenAI_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "09077778888"
      - module: "入力_電話番号_確認"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
    expected_path:
      - "saveContextModel2DB"
      - "incoming-classifier"
      - "冒頭_アナウンス"
      - "施設選択"
      - "入力_施設選択"
      - "リトライ_施設選択"
      - "施設選択"
      - "入力_施設選択"
      - "OpenAI_施設選択"
      - "saveContext_facility"
      - "用件選択"
      - "入力_用件選択"
      - "OpenAI_用件選択"
      - "saveContext_classification"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "OpenAI_着信番号判定"
      - "電話番号_確認"
      - "入力_電話番号_確認"
      - "OpenAI_電話番号_確認"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      facility: "施設A"
      classification: "人間ドック"
      patientName: "中村三郎"
      telephoneNumber: "09077778888"
    expected_status: "1"
    expected_sms_flag: "1"

  - name: "edge_case_電話番号上限"
    description: >
      電話番号手動聴取で不正値→再聴取でも不正値→Retry上限→END_電話番号聴取失敗
    category: "edge_case"
    preconditions:
      telephoneNumber: "0312345678"
    inputs:
      - module: "入力_施設選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "施設A"
      - module: "入力_用件選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "人間ドック"
      - module: "入力_患者名"
        type: "stt_result"
        value: "渡辺四郎"
        expected_openai_output: "渡辺四郎"
      - module: "OpenAI_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "固定"
      - module: "入力_電話番号_手動聴取"
        type: "stt_result"
        value: "123"
        expected_openai_output: "不正値"
      - module: "入力_電話番号_手動再聴取"
        type: "stt_result"
        value: "456"
        expected_openai_output: "不正値"
    expected_path:
