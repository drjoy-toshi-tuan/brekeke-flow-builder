      携帯番号(090)着信→着信番号判定で携帯と判定→復唱確認→肯定→携帯ルート
    category: "edge_case"
    preconditions:
      telephoneNumber: "09033334444"
    inputs:
      - module: "入力_施設選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "施設A"
      - module: "入力_用件選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "人間ドック"
      - module: "入力_患者名"
        type: "stt_result"
        value: "田中次郎"
        expected_openai_output: "田中次郎"
      - module: "OpenAI_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "09033334444"
      - module: "入力_電話番号_確認"
        type: "stt_result"
        value: "そうです"
        expected_openai_output: "はい"
    expected_path:
      - "saveContextModel2DB"
      - "incoming-classifier"
      - "冒頭_アナウンス"
      - "施設選択"
      - "入力_施設選択"
      - "OpenAI_施設選択"
      - "saveContext_facility"
      - "用件選択"
      - "入力_用件選択"
      - "OpenAI_用件選択"
      - "saveContext_classification"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "OpenAI_着信番号判定"
      - "電話番号_確認"
      - "入力_電話番号_確認"
      - "OpenAI_電話番号_確認"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      facility: "施設A"
      classification: "人間ドック"
      patientName: "田中次郎"
      telephoneNumber: "09033334444"
      phonetype: "携帯"
    expected_status: "1"
    expected_sms_flag: "1"

  - name: "edge_case_固定電話"
    description: >
      固定電話番号(03/046等)着信→着信番号判定で固定と判定→
      手動聴取→Phone Normalization→再確認→END
    category: "edge_case"
    preconditions:
      telephoneNumber: "0462001234"
    inputs:
      - module: "入力_施設選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "施設A"
      - module: "入力_用件選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "人間ドック"
      - module: "入力_患者名"
        type: "stt_result"
        value: "高橋美咲"
        expected_openai_output: "高橋美咲"
      - module: "OpenAI_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "固定"
      - module: "入力_電話番号_手動聴取"
        type: "dtmf"
        value: "09055556666"
        expected_openai_output: "valid"
    expected_path:
