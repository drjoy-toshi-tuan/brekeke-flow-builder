# テストベクター — 健診受付型
# 健康診断・人間ドック受付のパターンをテスト
# 施設選択→用件選択→氏名→電話番号の各ステップを網羅
# 注: 海老名総合病院の設計書には健診受付フローがないため、
#     一般的な健診受付型フローの構造に基づくテストベクター
pattern: "健診受付型"
description: >
  健診受付型フローのテストパターン。施設選択(複数施設対応)→
  用件選択(人間ドック/その他)→個人情報聴取→電話番号判定の各ルートを網羅し、
  施設×用件の組み合わせによるsmsFlag分岐、携帯/固定の判別ロジックを検証する。

test_vectors:
  # --- happy_path ---

  - name: "happy_path_人間ドック_施設A"
    description: >
      施設A→人間ドック→氏名→電話番号(携帯着信)→着信番号確認→END
    category: "happy_path"
    preconditions:
      telephoneNumber: "09012345678"
    inputs:
      - module: "入力_施設選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "施設A"
      - module: "入力_用件選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "人間ドック"
      - module: "入力_患者名"
        type: "stt_result"
        value: "山田太郎"
        expected_openai_output: "山田太郎"
      - module: "OpenAI_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "09012345678"
      - module: "入力_電話番号_確認"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
    expected_path:
      - "saveContextModel2DB"
      - "incoming-classifier"
      - "冒頭_アナウンス"
      - "施設選択"
      - "入力_施設選択"
      - "OpenAI_施設選択"
      - "saveContext_facility"
      - "用件選択"
      - "入力_用件選択"
      - "OpenAI_用件選択"
      - "saveContext_classification"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "OpenAI_着信番号判定"
      - "電話番号_確認"
      - "入力_電話番号_確認"
      - "OpenAI_電話番号_確認"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      facility: "施設A"
      classification: "人間ドック"
      patientName: "山田太郎"
      telephoneNumber: "09012345678"
    expected_status: "1"
    expected_sms_flag: "1"

  - name: "happy_path_その他_施設B"
    description: >
      施設B→その他→問い合わせ内容聴取→氏名→電話番号(固定着信)→手動聴取→END
    category: "happy_path"
    preconditions:
      telephoneNumber: "0462345678"
    inputs:
      - module: "入力_施設選択"
        type: "dtmf"
        value: "2"
        expected_openai_output: "施設B"
      - module: "入力_用件選択"
        type: "dtmf"
        value: "2"
        expected_openai_output: "その他"
      - module: "入力_問い合わせ内容"
        type: "stt_result"
        value: "健診の日程を変更したいのですが"
        expected_openai_output: "健診の日程を変更したいのですが"
      - module: "入力_患者名"
        type: "stt_result"
        value: "佐藤花子"
        expected_openai_output: "佐藤花子"
      - module: "OpenAI_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "固定"
      - module: "入力_電話番号_手動聴取"
        type: "dtmf"
        value: "09087654321"
        expected_openai_output: "valid"
    expected_path:
      - "saveContextModel2DB"
      - "incoming-classifier"
      - "冒頭_アナウンス"
      - "施設選択"
      - "入力_施設選択"
      - "OpenAI_施設選択"
      - "saveContext_facility"
      - "用件選択"
      - "入力_用件選択"
      - "OpenAI_用件選択"
      - "saveContext_classification"
      - "問い合わせ内容"
      - "入力_問い合わせ内容"
      - "saveContext_question"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "OpenAI_着信番号判定"
      - "電話番号_手動聴取"
      - "入力_電話番号_手動聴取"
      - "OpenAI_電話番号_手動聴取"
      - "saveContext_additionalPhoneNumber"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      facility: "施設B"
      classification: "その他"
      question: "健診の日程を変更したいのですが"
      patientName: "佐藤花子"
      additionalPhoneNumber: "09087654321"
    expected_status: "1"
    expected_sms_flag: "2"

  - name: "happy_path_施設C"
    description: >
      施設C→人間ドック→氏名→電話番号→END (smsFlag=3)
      施設Cは特殊smsFlag設定を持つパターン
    category: "happy_path"
    preconditions:
      telephoneNumber: "08011112222"
    inputs:
      - module: "入力_施設選択"
        type: "dtmf"
        value: "3"
        expected_openai_output: "施設C"
      - module: "入力_用件選択"
        type: "dtmf"
        value: "1"
        expected_openai_output: "人間ドック"
      - module: "入力_患者名"
        type: "stt_result"
        value: "鈴木一郎"
        expected_openai_output: "鈴木一郎"
      - module: "OpenAI_着信番号判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "08011112222"
      - module: "入力_電話番号_確認"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
    expected_path:
      - "saveContextModel2DB"
      - "incoming-classifier"
      - "冒頭_アナウンス"
      - "施設選択"
      - "入力_施設選択"
      - "OpenAI_施設選択"
      - "saveContext_facility"
      - "用件選択"
      - "入力_用件選択"
      - "OpenAI_用件選択"
      - "saveContext_classification"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "OpenAI_着信番号判定"
      - "電話番号_確認"
      - "入力_電話番号_確認"
      - "OpenAI_電話番号_確認"
      - "完了フラグ_受付完了"
      - "END_受付完了"
    expected_terminal: "END_受付完了"
    expected_context:
      facility: "施設C"
      classification: "人間ドック"
      patientName: "鈴木一郎"
      telephoneNumber: "08011112222"
    expected_status: "1"
    expected_sms_flag: "3"

  # --- edge_case ---

  - name: "edge_case_携帯判別"
