      - "incoming-classifier"
      - "冒頭_アナウンス"
      - "施設選択"
      - "入力_施設選択"
      - "OpenAI_施設選択"
      - "saveContext_facility"
      - "用件選択"
      - "入力_用件選択"
      - "OpenAI_用件選択"
      - "saveContext_classification"
      - "患者名"
      - "入力_患者名"
      - "saveContext_patientName"
      - "OpenAI_着信番号判定"
      - "電話番号_手動聴取"
      - "入力_電話番号_手動聴取"
      - "OpenAI_電話番号_手動聴取"
      - "電話番号_手動再聴取"
      - "入力_電話番号_手動再聴取"
      - "OpenAI_電話番号_手動再聴取"
      - "リトライ_電話番号_手動再聴取"
