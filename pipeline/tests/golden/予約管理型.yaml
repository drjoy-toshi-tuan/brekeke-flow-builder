      - "入力_冒頭_直近予約確認"
      - "OpenAI_冒頭_直近予約確認"
      - "用件確認"
      - "入力_用件確認"
      - "OpenAI_用件確認"
      - "saveContext_classification"
      - "診療科_聴取"
      - "入力_診療科_聴取"
      - "OpenAI_診療科_聴取"
      - "saveContext_clinicalDepartment"
      - "予約日_聴取"
      - "入力_予約日_聴取"
      - "OpenAI_予約日_聴取"
      - "saveContext_currentAppointmentDate"
      - "OpenAI_予約日_用件判定"
      - "OpenAI_予約日_直近判定"
      - "希望日の有無"
      - "入力_希望日の有無"
      - "OpenAI_希望日の有無"
      - "saveContext_scheduledAppointmentDate"
      - "サブフロー遷移_個人情報聴取"
    expected_terminal: "サブフロー遷移_個人情報聴取"
    expected_context:
      classification: "予約キャンセル"
      clinicalDepartment: "整形外科"
      currentAppointmentDate: "2026-06-20"
      scheduledAppointmentDate: "いいえ"
    expected_status: ""
    expected_sms_flag: ""

