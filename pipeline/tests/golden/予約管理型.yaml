# テストベクター — 予約管理型
# 海老名総合病院 メインフロー（海老名病院$外来予約_20260326）の
# 用件確認→診療科→予約日→直近判定→希望日→サブフロー遷移 を中心にテスト
pattern: "予約管理型"
description: >
  メインフローの予約管理パターンをテストする。
  予約変更・予約キャンセル・予約確認・予約希望の4用件分岐、
  診療科聴取、予約日聴取、直近キャンセル判定、希望日の有無、
  サブフロー遷移までの各ルートを網羅し、リトライ・エッジケースを検証する。

test_vectors:
  # --- happy_path ---

  - name: "happy_path_予約変更"
    description: >
      予約変更→診療科(成功)→予約日(valid)→用件判定(予約変更)→
      希望日の有無(はい)→次回受診希望日→サブフロー遷移
    category: "happy_path"
    preconditions:
      telephoneNumber: "09012345678"
    inputs:
      - module: "入力_冒頭_直近予約確認"
        type: "stt_result"
        value: "いいえ"
        expected_openai_output: "NO_RESULT"
      - module: "入力_用件確認"
        type: "dtmf"
        value: "1"
        expected_openai_output: "予約変更"
      - module: "入力_診療科_聴取"
        type: "stt_result"
        value: "内科"
        expected_openai_output: "内科"
      - module: "入力_予約日_聴取"
        type: "stt_result"
        value: "5月15日"
        expected_openai_output: "valid"
      - module: "OpenAI_予約日_用件判定"
        type: "stt_result"
        value: ""
        expected_openai_output: "予約変更"
      - module: "入力_希望日の有無"
        type: "stt_result"
        value: "はい"
        expected_openai_output: "はい"
      - module: "入力_次回受診希望日"
        type: "stt_result"
        value: "6月上旬"
        expected_openai_output: "6月上旬"
    expected_path:
      - "saveContextModel2DB"
      - "incoming-classifier"
      - "冒頭_直近予約確認"
      - "入力_冒頭_直近予約確認"
      - "OpenAI_冒頭_直近予約確認"
      - "用件確認"
      - "入力_用件確認"
      - "OpenAI_用件確認"
      - "saveContext_classification"
      - "診療科_聴取"
      - "入力_診療科_聴取"
      - "OpenAI_診療科_聴取"
      - "saveContext_clinicalDepartment"
      - "予約日_聴取"
      - "入力_予約日_聴取"
      - "OpenAI_予約日_聴取"
      - "saveContext_currentAppointmentDate"
      - "OpenAI_予約日_用件判定"
      - "希望日の有無"
      - "入力_希望日の有無"
      - "OpenAI_希望日の有無"
      - "saveContext_scheduledAppointmentDate"
      - "次回受診希望日"
      - "入力_次回受診希望日"
      - "saveContext_desiredAppointmentDate"
      - "サブフロー遷移_個人情報聴取"
    expected_terminal: "サブフロー遷移_個人情報聴取"
    expected_context:
      classification: "予約変更"
      clinicalDepartment: "内科"
      currentAppointmentDate: "2026-05-15"
      scheduledAppointmentDate: "はい"
      desiredAppointmentDate: "6月上旬"
    expected_status: ""
    expected_sms_flag: ""

