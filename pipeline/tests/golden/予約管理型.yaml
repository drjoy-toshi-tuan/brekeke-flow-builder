    description: >
      予約キャンセル→診療科(成功)→予約日(valid)→用件判定(予約キャンセル)→
      直近判定(3日以上先)→希望日の有無(いいえ)→サブフロー遷移
    category: "happy_path"
    preconditions:
      telephoneNumber: "08055556666"
    inputs:
      - module: "入力_冒頭_直近予約確認"
        type: "stt_result"
        value: "違います"
        expected_openai_output: "NO_RESULT"
      - module: "入力_用件確認"
