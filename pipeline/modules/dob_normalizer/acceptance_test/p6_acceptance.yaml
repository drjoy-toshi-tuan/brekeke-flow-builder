# Pattern 6 (テストフロー) - DOB Re-confirmation (生年月日復唱) 受入テスト [拡張版 ~100ケース / tts_ai版]
#
# 期待値は全ケース dob_oracle (実機とバイト一致確認済みの解析ロジック) で算出。
# 汚いデータ(欠落/桁不足/範囲外/誤認識/全角漢数字)を中心に網羅。
# 1 ケース=2〜3 モジュール: prime→dob(→OKのみ chk CMR)。全PASSで結果_全PASS到達。

version: "2.0"

basic_info:
  facility_name: "テスト"
  group_name: "テスト$生年月日復唱AI"
  flow_name: "テスト$生年月日復唱AI"
  office_id: ""
  environment: "demo"

flow_structure:
  type: standalone
  flows:
    - name: "テスト$生年月日復唱AI"
      role: main
  subflows: []

scenario_flow:
  - step: 冒頭
    type: opening
    next: ログ_開始

  - step: ログ_開始
    type: inline_script
    body: |
      $runner.getLogger().info("=================================================");
      $runner.getLogger().info("[TEST START] DOB Re-confirmation 受入 (119 cases)");
      $runner.getLogger().info("=================================================");
      $runner.setResult("ok");
    next: DOB_TEST

  - step: DOB_TEST
