# Pattern 6 (テストフロー) — yes_no_classifier 受入テスト engine v3 【part1/2: Y+N+E = 136ケース】
#
# ★分割理由: Brekeke は 1 コール Module.exec() 累計 1000 回でハード停止（設計バジェット 900）。
#   251 ケース×4 実行/case ≈ 1004+overhead で超過するため part1(136)/part2(115) に分割し別コールで流す。
#   ケースの正本は acceptance_test/cases.tsv（oracle.py が全 PASS を保証）。part1∪part2 == cases.tsv（251・disjoint）。
#   ※#279②(Y279)・#290(Y290) デルタは part2 に収録（現行 spec_hash 946a7f65 を実機で踏む）。
#   part1 実行回数 ≈ 3 + 136×4 + 2 ≈ 549（< 900 安全）。
#
# 検証対象は modules/yes_no_classifier/script.js（デプロイ正本）を script_test_matrix が
# sidecar 読込＝バイト一致で全ケース実機（Nashorn）検証（部品 DoD#4）。
# 実機判定＝通話後の Brekeke ログで "[TEST FAIL]" 件数 0（pass/fail とも次 case へ進む）。
#
# 生成: python3 tools/build_part_acceptance_bivr.py yes_no_classifier \
#         --spec modules/yes_no_classifier/acceptance_test/p6_acceptance_part1.yaml \
#         --out  output/acceptance/yes_no_classifier/yes_no_classifier_p6_part1.bivr

version: "2.0"

basic_info:
  facility_name: "テスト"
  group_name: "テスト$はいいいえ判定v3_part1"
  flow_name: "テスト$はいいいえ判定v3_part1"
  office_id: ""
  environment: "demo"

flow_structure:
  type: standalone
  flows:
    - name: "テスト$はいいいえ判定v3_part1"
      role: main
  subflows: []

scenario_flow:
  - step: 冒頭
    type: opening
    next: ログ_開始

  - step: ログ_開始
    type: inline_script
    body: |
      $runner.getLogger().info("=================================================");
      $runner.getLogger().info("[TEST START] yes_no_classifier engine v3 受入 part1 (Y+N+E = 136 cases)");
      $runner.getLogger().info("=================================================");
      $runner.setResult("ok");
    next: YESNO_TEST

  - step: YESNO_TEST
    type: script_test_matrix
    script_file: "../script.js"
    input_placeholder: "__SOURCE_MODULE__"
    wiring:                 # v4: 表示ラベル wiring を既定 肯定/否定 で充填し、受入出力を内部enumと一致させる（#270）
      __YES_LABEL__: "肯定"
      __NO_LABEL__: "否定"
    final_next: 結果_完了
    cases:
      # --- Y* 肯定（本番頻度 + 合成）---
      - {id: Y001, input: "はいそうです。", expected: "肯定"}
      - {id: Y002, input: "はい", expected: "肯定"}
      - {id: Y003, input: "はい、そうです。", expected: "肯定"}
