# Pattern 6 (テストフロー) — n_choice 決定論エンジン 単体受入テスト（発信元3分類 config）
#
# 検証対象: modules/n_choice/acceptance_test/script_caller_type.js
#   = 正本テンプレ modules/n_choice/script.js を「発信元3分類」config で充填した具体版
#     （エンジンは正本と同一。DTMF_MAP/KEYWORD_PATTERNS のみ発信元データ。{{INPUT_MODULE}} は placeholder のまま）。
#
# 狙い: n_choice エンジンを Brekeke 実機 (Nashorn/ES5) で単体実行し、オラクル↔実機パリティを確証する。
#   P7 連結はラベル注入のみで、DTMF 数字入力(1/2/3)・全角・キーワード変種・AmiVoice重複・正規化を実機検証していない。
#   本テストでそれらを全入力耐性として単体検証する（オラクル test_oracle.py 29/29 と同一ケース）。
#   ※ n_choice は複数設問で使い回す汎用エンジン。本テストは「発信元 config」で代表検証する
#     （他設問=患者区分/担当者/F1 は同一エンジン＋config データ差のみ。DTMF/keyword 機構の検証は本テストで担保）。
#
# 確認: Brekeke ログを grep "[TEST FAIL]" で 0 件なら全 PASS。末尾 "[TEST DONE]" で全 22 ケース完走。

version: "2.0"

basic_info:
  facility_name: "テスト"
  group_name: "テスト$相談区分"
  flow_name: "テスト$相談区分"
  office_id: ""
  environment: "demo"

flow_structure:
  type: standalone
  flows:
    - name: "テスト$相談区分"
      role: main
  subflows: []

scenario_flow:
  - step: 冒頭
    type: opening
    next: ログ_開始

  - step: ログ_開始
    type: inline_script
    body: |
      $runner.getLogger().info("============================================");
      $runner.getLogger().info("[TEST START] n_choice 決定論エンジン 単体受入 (相談区分 config, 22 ケース)");
      $runner.getLogger().info("対象: script_patient_category.js (正本 script.js を相談区分 config 充填) / オラクル 22/22 PASS 済");
      $runner.getLogger().info("grep [TEST FAIL] = 0 なら実機も全 PASS");
      $runner.getLogger().info("============================================");
      $runner.setResult("ok");
    next: matrix

  - step: matrix
    type: script_test_matrix
    script_file: "./script_patient_category.js"
    input_placeholder: "{{INPUT_MODULE}}"
    final_next: ログ_終了
    cases:
      - {id: t01, input: "1", expected: "入院"}
      - {id: t02, input: "2", expected: "外来"}
      - {id: t03, input: "3", expected: "新規"}
      - {id: t04, input: "１", expected: "入院"}
      - {id: t05, input: "２", expected: "外来"}
      - {id: t06, input: "３", expected: "新規"}
      - {id: t07, input: "9", expected: "NO_RESULT"}
      - {id: t08, input: "0", expected: "NO_RESULT"}
      - {id: t09, input: "1です", expected: "入院"}
      - {id: t10, input: "３でお願いします", expected: "新規"}
      - {id: t11, input: "入院です", expected: "入院"}
      - {id: t12, input: "入院の予定です", expected: "入院"}
      - {id: t13, input: "外来です", expected: "外来"}
      - {id: t14, input: "通院しています", expected: "外来"}
      - {id: t15, input: "新規です", expected: "新規"}
      - {id: t16, input: "初めてです", expected: "新規"}
      - {id: t17, input: "はじめてかかります", expected: "新規"}
      - {id: t18, input: "初診でお願いします", expected: "新規"}
      - {id: t19, input: "えーっと", expected: "NO_RESULT"}
      - {id: t20, input: "あのー", expected: "NO_RESULT"}
      - {id: t21, input: "よろしくお願いします", expected: "NO_RESULT"}
      - {id: t22, input: "今日はいい天気", expected: "NO_RESULT"}

  - step: ログ_終了
    type: inline_script
    body: |
      $runner.getLogger().info("[TEST DONE] n_choice 相談区分 config 単体受入 全 22 ケース完走");
      $runner.setResult("done");
    next: 終了

  - step: 終了
    type: termination
    termination_ref: "END_テスト終了"

termination_patterns:
  - name: "END_テスト終了"
    condition: "テスト完走"
    tts_announcement: "テストを終了します。"
    status: "1"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_テスト終了"
