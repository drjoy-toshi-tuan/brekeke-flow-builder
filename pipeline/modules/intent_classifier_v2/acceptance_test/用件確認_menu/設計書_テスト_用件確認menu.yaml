# intent_classifier_v2 P6 受入テスト設計書
# テスト対象: intent_classifier_v2 engine (v2-evidence) + 用件確認メニュー spec
# cases: acceptance_test/用件確認_menu/cases.tsv (27件)

facility: テスト
flow: 用件確認menu
group_name: テスト_用件確認menu_YYYYMMDD  # P6実行時に日付を入れる

scenario_flow:
  - step: 用件確認
    type: intent
    engine: v2
    intent_spec_ref: modules/intent_classifier_v2/spec_menu.json
    tts: >
      ご用件をお話しください。
      予約は1番、変更は2番、キャンセルは3番、
      お問い合わせは4番でもお話いただけます。
    retry_tts: >
      恐れ入ります。予約、変更、キャンセル、お問い合わせのいずれかで
      もう一度お話しください。
    retry_count: 3
    save_to: classification
    conditions:
      - match: 予約
        next: 結果_予約
      - match: 変更
        next: 結果_変更
      - match: キャンセル
        next: 結果_キャンセル
      - match: キャンセル取りやめ
        next: 結果_キャンセル取りやめ
      - match: 問い合わせ
        next: 結果_問い合わせ
      - match: TRANSFER_OPERATOR
        next: 結果_転送
      - match: CLARIFY
        next: リトライ_用件確認
      - match: NO_RESULT
        next: リトライ_用件確認

  - step: 結果_予約
    type: termination
    tts: "{tts_g:予約ルートへ転送します}"

  - step: 結果_変更
    type: termination
    tts: "{tts_g:変更ルートへ転送します}"

  - step: 結果_キャンセル
    type: termination
    tts: "{tts_g:キャンセルルートへ転送します}"

  - step: 結果_キャンセル取りやめ
    type: termination
    tts: "{tts_g:キャンセル取りやめルートへ転送します}"

  - step: 結果_問い合わせ
    type: termination
    tts: "{tts_g:問い合わせルートへ転送します}"

  - step: 結果_転送
    type: termination
    tts: "{tts_g:オペレーターへ転送します}"
