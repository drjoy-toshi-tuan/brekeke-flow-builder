<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceBot Flow Builder — 稼働実績</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0c;--sf:#111115;--sf2:#1a1a20;--bd:#2a2a32;
  --t1:#e8e6e0;--t2:#9a9890;--t3:#5a5a55;
  --ac:#4ae3b5;--ac2:#3bc49a;--warn:#e8a84a;--dng:#e85454;
  --blu:#4a8ae3;--pur:#8a6ae3;
}
body{background:var(--bg);color:var(--t1);font-family:'Noto Sans JP',sans-serif;line-height:1.6;min-height:100vh}

/* ヘッダー */
.hd{padding:1.8rem 2rem 1.2rem;border-bottom:1px solid var(--bd);display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap}
.hd h1{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:500;color:var(--ac);letter-spacing:.02em}
.hd .sub{font-size:.72rem;color:var(--t3);font-family:'JetBrains Mono',monospace}
.hd .ts{margin-left:auto;font-size:.65rem;color:var(--t3);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:.5rem}
.live{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ツールバー */
.tb{display:flex;align-items:center;gap:1rem;padding:.5rem 2rem;border-bottom:1px solid var(--bd);background:var(--sf);font-size:.7rem;color:var(--t3);font-family:'JetBrains Mono',monospace}
.tb button{font-size:.65rem;padding:3px 12px;background:var(--sf2);border:1px solid var(--bd);color:var(--t2);border-radius:3px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.tb button:hover{background:var(--bd);color:var(--t1)}
.tb input[type=file]{font-size:.65rem;color:var(--t3)}
.tb .sep{color:var(--bd)}
.tb .st{margin-left:auto;font-size:.65rem}

/* コンテンツ */
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 2rem}

/* KPIカード */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);margin-bottom:1px}
.kpi{background:var(--sf);padding:1.5rem 1.8rem}
.kpi-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:.4rem}
.kpi-value{font-size:2.4rem;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.kpi-value .unit{font-size:.8rem;font-weight:400;color:var(--t2);margin-left:.3rem}
.kpi-sub{font-size:.65rem;color:var(--ac);margin-top:.4rem;font-family:'JetBrains Mono',monospace}

/* セクション */
.sec{background:var(--sf);margin-bottom:1px}
.sec-hd{font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-family:'JetBrains Mono',monospace;padding:.9rem 1.5rem;border-bottom:1px solid var(--bd)}

/* テーブル共通 */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:'JetBrains Mono',monospace;padding:.5rem 1rem;border-bottom:1px solid var(--bd);font-weight:500}
td{padding:.55rem 1rem;border-bottom:1px solid #16161a;color:var(--t2);font-size:.8rem}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sf2);color:var(--t1)}

/* 担当者テーブル */
.author-name{color:var(--t1);font-weight:500;font-size:.82rem}
.bar-wrap{display:flex;align-items:center;gap:.5rem}
.bar{height:4px;border-radius:2px;background:var(--ac);min-width:2px;transition:width .4s}
.bar-val{font-size:.7rem;color:var(--t3);font-family:'JetBrains Mono',monospace;min-width:2.5rem;text-align:right}
.scenario-chip{display:inline-block;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;padding:.1rem .5rem;font-size:.68rem;font-family:'JetBrains Mono',monospace;color:var(--t2);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}

/* 実績リスト */
.badge{display:inline-block;padding:1px 8px;border-radius:3px;font-size:.58rem;font-family:'JetBrains Mono',monospace}
.badge.merged{background:#1a3a2a;color:var(--ac)}
.badge.open{background:#1a2a3a;color:var(--blu)}
.dur-fast{color:var(--ac)}
.dur-mid{color:var(--warn)}
.dur-slow{color:var(--dng)}

/* 空状態 */
.empty{text-align:center;padding:3rem 2rem;color:var(--t3)}
.empty h2{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--t2);margin-bottom:.6rem}
.empty p{font-size:.72rem;line-height:1.9}
.empty code{background:var(--sf2);padding:.15em .4em;border-radius:3px;font-size:.68rem;color:var(--ac)}

/* パイプライン実行時間KPIは2列 */
.kpi-row-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--bd);margin-bottom:1px}

/* ステップ別内訳 */
.step-scenario{font-size:.72rem;color:var(--t2);padding:.7rem 1.5rem .2rem;border-bottom:1px solid var(--bd)}
.step-scenario-title{color:var(--t1);font-weight:500}
.step-grid{padding:.5rem 1.5rem .9rem;display:flex;flex-direction:column;gap:.35rem}
.step-row{display:flex;align-items:center;gap:.6rem}
.step-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t3);width:80px;flex-shrink:0;text-align:right}
.step-bar-outer{flex:1;height:6px;background:var(--sf2);border-radius:3px;overflow:hidden}
.step-bar-inner{height:100%;border-radius:3px;transition:width .4s}
.step-bar-ok{background:var(--ac)}
.step-bar-fail{background:var(--dng)}
.step-bar-skip{background:var(--t3)}
.step-dur{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--t3);width:52px;flex-shrink:0}
.step-status-fail{color:var(--dng)}
.step-divider{border:none;border-top:1px solid var(--bd);margin:.3rem 0}

@media(max-width:700px){.kpi-row,.kpi-row-2{grid-template-columns:1fr}.wrap{padding:1rem}}
</style>
</head>
<body>

<div class="hd">
  <h1>voicebot-flow-builder</h1>
  <div class="sub">稼働実績ダッシュボード</div>
  <div class="ts"><span class="live"></span><span id="hts">読み込み待ち</span></div>
</div>

<div class="tb">
  <button onclick="autoLoad()">データ取得</button>
  <span class="sep">|</span>
  <input type="file" id="fi" accept=".json">
  <span class="st" id="st"></span>
</div>

<div id="db"></div>

<script>
const $ = id => document.getElementById(id);

window.addEventListener('DOMContentLoaded', () => autoLoad());

$('fi').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { try { render(JSON.parse(ev.target.result)); $('st').textContent = 'ファイル読み込み完了'; } catch(e) { $('st').textContent = 'JSON解析エラー'; } };
  r.readAsText(f);
});

function autoLoad() {
  $('st').textContent = '取得中...';
  fetch('metrics.json?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(d => { render(d); $('st').textContent = '自動取得完了'; })
    .catch(() => { $('st').textContent = 'ファイルを選択してください'; });
}

// 秒数を人間向けラベルに変換
function secToLabel(s) {
  if (s == null) return '—';
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60), r = s % 60;
  return r > 0 ? m + 'min ' + r + 's' : m + 'min';
}

// PRタイトルからシナリオ名を抽出
function extractScenario(title) {
  // "feat: 北里大学病院_訪問看護 生成完了" → "北里大学病院_訪問看護"
  // "feature/北里大学病院_診療" → "北里大学病院_診療"
  const t = title
    .replace(/^(feat|fix|docs|refactor|chore|update|add|build|ci|test|style|perf|revert):\s*/i, '')
    .replace(/^feature\//, '')
    .replace(/(生成完了|完了|修正|更新|対応|追加|削除).*$/, '')
    .trim();
  return t.length > 0 ? t : title;
}

// リードタイムの色分け
function durClass(h) {
  if (h == null) return '';
  if (h <= 2) return 'dur-fast';
  if (h <= 8) return 'dur-mid';
  return 'dur-slow';
}

function durLabel(h) {
  if (h == null) return '—';
  if (h < 1) return Math.round(h * 60) + '分';
  return h.toFixed(1) + 'h';
}

function render(data) {
  const s = data.summary;
  const prs = data.pull_requests || [];
  const merged = prs.filter(p => p.state === 'merged');
  const genAt = new Date(data.generated_at).toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
  $('hts').textContent = '最終更新: ' + genAt;

  if (!prs.length) {
    $('db').innerHTML = `<div class="empty"><h2>データがありません</h2><p>metrics.json を読み込んでください。<br><code>python metrics/fetch_metrics.py</code> を実行後、生成された metrics.json を選択してください。</p></div>`;
    return;
  }

  // 担当者別集計
  const byAuthor = {};
  merged.forEach(p => {
    const a = p.author;
    if (!byAuthor[a]) byAuthor[a] = { prs: [], durations: [] };
    byAuthor[a].prs.push(p);
    if (p.duration_hours != null) byAuthor[a].durations.push(p.duration_hours);
  });

  const authorStats = Object.entries(byAuthor).map(([author, d]) => {
    const avgDur = d.durations.length
      ? d.durations.reduce((a, b) => a + b, 0) / d.durations.length
      : null;
    const latest = d.prs.sort((a, b) => new Date(b.merged_at) - new Date(a.merged_at))[0];
    return { author, count: d.prs.length, avgDur, latestScenario: latest ? extractScenario(latest.title) : '—', latestDate: latest?.merged_at };
  }).sort((a, b) => b.count - a.count);

  const maxCount = Math.max(...authorStats.map(a => a.count), 1);

  // KPI
  const openCount = prs.filter(p => p.state === 'open').length;
  const avgDur = s.avg_pr_duration_hours;
  const avgActual = s.avg_actual_duration_hours;
  const avgPipeline = s.avg_pipeline_duration_seconds;
  const ptimes = data.pipeline_times || [];
  const measuredCount = ptimes.filter(p => p.pipeline_duration_seconds != null).length;

  const kpiHtml = `
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">完了シナリオ数</div>
        <div class="kpi-value">${s.merged_prs}<span class="unit">件</span></div>
        <div class="kpi-sub">進行中 ${openCount} 件</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">平均リードタイム (PR)</div>
        <div class="kpi-value">${avgDur < 1 ? Math.round(avgDur * 60) + '<span class="unit">分</span>' : avgDur.toFixed(1) + '<span class="unit">h</span>'}</div>
        <div class="kpi-sub">PR作成 → マージ</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">稼働メンバー</div>
        <div class="kpi-value">${authorStats.length}<span class="unit">名</span></div>
        <div class="kpi-sub">総PR ${s.total_prs} 件</div>
      </div>
    </div>
    <div class="kpi-row-2">
      <div class="kpi">
        <div class="kpi-label">平均着手→マージ時間</div>
        <div class="kpi-value">${avgActual != null ? (avgActual < 1 ? Math.round(avgActual * 60) + '<span class="unit">分</span>' : avgActual.toFixed(1) + '<span class="unit">h</span>') : '<span style="font-size:1.4rem;color:var(--t3)">未計測</span>'}</div>
        <div class="kpi-sub">ローカル着手 → マージ（pipeline_state計測分）</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">平均パイプライン実行時間</div>
        <div class="kpi-value">${avgPipeline != null ? secToLabel(avgPipeline) : '<span style="font-size:1.4rem;color:var(--t3)">未計測</span>'}</div>
        <div class="kpi-sub">orchestrator started_at → ended_at（${measuredCount}件計測済み）</div>
      </div>
    </div>`;

  // 担当者別実績
  const authorRows = authorStats.map(a => `
    <tr>
      <td class="author-name">${a.author}</td>
      <td>
        <div class="bar-wrap">
          <div class="bar" style="width:${a.count / maxCount * 160}px"></div>
          <span class="bar-val">${a.count}件</span>
        </div>
      </td>
      <td class="${durClass(a.avgDur)}" style="font-family:'JetBrains Mono',monospace">${durLabel(a.avgDur)}</td>
      <td><span class="scenario-chip" title="${a.latestScenario}">${a.latestScenario}</span></td>
      <td style="font-size:.7rem;color:var(--t3)">${a.latestDate ? new Date(a.latestDate).toLocaleDateString('ja-JP') : '—'}</td>
    </tr>`).join('');

  const authorHtml = `
    <div class="sec">
      <div class="sec-hd">担当者別実績</div>
      <table>
        <tr><th>担当者</th><th>完了件数</th><th>平均リードタイム</th><th>直近シナリオ</th><th>最終完了日</th></tr>
        ${authorRows}
      </table>
    </div>`;

  // pipeline_timesをPR番号でインデックス化
  const ptimesByPR = {};
  ptimes.forEach(pt => { ptimesByPR[pt.pr_number] = pt; });

  // 直近の完了シナリオ（最新10件）
  const recentMerged = merged
    .sort((a, b) => new Date(b.merged_at) - new Date(a.merged_at))
    .slice(0, 10);

  const recentRows = recentMerged.map(p => {
    const scenario = extractScenario(p.title);
    const pt = ptimesByPR[p.number];
    const pipelineSec = pt?.pipeline_duration_seconds ?? null;
    const pipelineCell = pipelineSec != null
      ? `<span style="font-family:'JetBrains Mono',monospace;color:var(--ac)">${secToLabel(pipelineSec)}</span>`
      : `<span style="color:var(--t3)">—</span>`;
    return `
      <tr>
        <td><span class="scenario-chip" title="${scenario}" style="max-width:260px">${scenario}</span></td>
        <td style="color:var(--t2);font-size:.75rem">${p.author}</td>
        <td class="${durClass(p.duration_hours)}" style="font-family:'JetBrains Mono',monospace">${durLabel(p.duration_hours)}</td>
        <td>${pipelineCell}</td>
        <td style="font-size:.7rem;color:var(--t3)">${new Date(p.merged_at).toLocaleDateString('ja-JP')}</td>
      </tr>`;
  }).join('');

  const recentHtml = `
    <div class="sec">
      <div class="sec-hd">直近の完了シナリオ</div>
      <table>
        <tr><th>シナリオ名</th><th>担当者</th><th>リードタイム (PR)</th><th>実行時間</th><th>完了日</th></tr>
        ${recentRows || '<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:var(--t3)">完了したPRがありません</td></tr>'}
      </table>
    </div>`;

  // ステップ別内訳（pipeline_timesのうちstep_timingsがある最新5件）
  const STEP_ORDER = ['branch','director','qa','generator','validator1','prompter','reviewer','merge','validator2','add_date','tester_build','spec_html','commit','approve'];
  const STEP_LABEL = {branch:'branch',director:'director',qa:'qa',generator:'generator',validator1:'valid-1',prompter:'prompter',reviewer:'reviewer',merge:'merge',validator2:'valid-2',add_date:'add_date',tester_build:'test/build',spec_html:'spec_html',commit:'commit',approve:'approve'};

  const pipelineRuns = ptimes
    .filter(pt => pt.step_timings && Object.keys(pt.step_timings).length > 0)
    .slice(0, 5);

  let stepBreakdownHtml = '';
  if (pipelineRuns.length > 0) {
    // 全ステップの最大秒数（バー幅スケーリング用）
    const allSecs = pipelineRuns.flatMap(pt =>
      Object.values(pt.step_timings).map(v => v.seconds || 0)
    );
    const maxSec = Math.max(...allSecs, 1);

    const runBlocks = pipelineRuns.map(pt => {
      const scenario = extractScenario(pt.title);
      const totalLabel = pt.pipeline_duration_seconds != null ? secToLabel(pt.pipeline_duration_seconds) : '';
      const rows = STEP_ORDER
        .filter(sid => pt.step_timings[sid])
        .map(sid => {
          const sv = pt.step_timings[sid];
          const secs = sv.seconds || 0;
          const status = sv.status || 'ok';
          const barClass = status === 'fail' ? 'step-bar-fail' : status === 'skip' ? 'step-bar-skip' : 'step-bar-ok';
          const barW = Math.round(secs / maxSec * 200);
          const statusMark = status === 'fail' ? ' <span class="step-status-fail">✗</span>' : status === 'skip' ? ' <span style="color:var(--t3)">skip</span>' : '';
          return `<div class="step-row">
            <span class="step-label">${STEP_LABEL[sid] || sid}</span>
            <div class="step-bar-outer"><div class="step-bar-inner ${barClass}" style="width:${barW}px"></div></div>
            <span class="step-dur">${secToLabel(secs)}${statusMark}</span>
          </div>`;
        }).join('');
      return `
        <div class="step-scenario">
          <span class="step-scenario-title">${scenario}</span>
          ${totalLabel ? `<span style="margin-left:.8rem;font-family:'JetBrains Mono',monospace;color:var(--ac)">${totalLabel}</span>` : ''}
          <span style="margin-left:.6rem;font-size:.65rem;color:var(--t3)">${pt.merged_at ? new Date(pt.merged_at).toLocaleDateString('ja-JP') : ''}</span>
        </div>
        <div class="step-grid">${rows}</div>`;
    }).join('<hr class="step-divider">');

    stepBreakdownHtml = `
      <div class="sec">
        <div class="sec-hd">ステップ別実行時間（直近${pipelineRuns.length}件）</div>
        ${runBlocks}
      </div>`;
  }

  // 進行中
  const openPrs = prs.filter(p => p.state === 'open');
  const openRows = openPrs.map(p => {
    const scenario = extractScenario(p.title);
    const elapsed = ((Date.now() - new Date(p.created_at)) / 36e5).toFixed(1);
    return `
      <tr>
        <td><span class="scenario-chip" title="${scenario}" style="max-width:320px">${scenario}</span></td>
        <td style="color:var(--t2);font-size:.75rem">${p.author}</td>
        <td style="font-family:'JetBrains Mono',monospace;color:var(--warn)">${elapsed}h経過</td>
        <td style="font-size:.7rem;color:var(--t3)">${new Date(p.created_at).toLocaleDateString('ja-JP')}</td>
      </tr>`;
  }).join('');

  const openHtml = openPrs.length ? `
    <div class="sec">
      <div class="sec-hd">進行中</div>
      <table>
        <tr><th>シナリオ名</th><th>担当者</th><th>経過時間</th><th>開始日</th></tr>
        ${openRows}
      </table>
    </div>` : '';

  $('db').innerHTML = `<div class="wrap">${kpiHtml}${authorHtml}${recentHtml}${stepBreakdownHtml}${openHtml}</div>`;
}
</script>
</body>
</html>
