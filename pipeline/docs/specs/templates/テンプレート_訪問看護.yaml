# --- セクション7: ステップ詳細（TTS 発話文言）---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。{施設名}、訪問看護指示書専用のAI電話です。訪問看護指示書作成のご依頼でしょうか。「はい、そうです」または「いいえ、違います」とお話しください。"
    input_method: "voice_only"
    save_to: ""
    next_step: "依頼確認"
    retry_failure: "skip"
  - step_name: "依頼確認"
    tts_announcement: "訪問看護指示書作成のご依頼でしょうか。「はい、そうです」または「いいえ、違います」とお話しください。"
    input_method: "voice_only"
    save_to: "classification"
    next_step: "患者同意確認 / END_非該当"
    retry_failure: "end_failure"
  - step_name: "患者同意確認"
    tts_announcement: "患者様の同意は得られておりますか。同意済みの場合は「同意済み」、未取得の場合は「取れていない」とお話しください。"
    input_method: "voice_only"
    save_to: ""
    next_step: "事業所名 / END_受付不可"
    retry_failure: "end_failure"
  - step_name: "事業所名"
    tts_announcement: "事業所名を正式名称でお話しください。"
    input_method: "voice_only"
    save_to: "officeName"
    next_step: "担当者名"
    retry_failure: "skip"
  - step_name: "担当者名"
    tts_announcement: "担当者名を「名前は山田太郎です」のようにお話しください。"
    input_method: "voice_only"
    save_to: "staffName"
    next_step: "連絡先確認"
    retry_failure: "skip"
  - step_name: "連絡先確認"
    tts_announcement: "ご連絡先の電話番号は、今おかけいただいている番号でよろしいですか。「はい、そうです」または「いいえ、違います」とお話しください。"
    input_method: "voice_only"
    save_to: ""
    next_step: "指示書種別 / 電話番号聴取"
    retry_failure: "skip"
  - step_name: "指示書種別"
    tts_announcement: "指示書の種別を、プッシュボタンでお選びください。1.訪問看護指示書、2.精神科訪問看護指示書、3.特別訪問看護指示書、4.精神科特別訪問看護指示書、5.医療観察精神科訪問看護指示書、のいずれかを選択ください。"
    input_method: "dtmf_voice"
    save_to: "instructionType"
    next_step: "診療科"
    retry_failure: "end_failure"
  - step_name: "診療科"
    tts_announcement: "診療科を「診療科は精神科です」のようにお話しください。わからない場合は「わからない」とお話しください。"
    input_method: "voice_only"
    save_to: "clinicalDepartment"
    next_step: "主治医名"
    retry_failure: "end_failure"
  - step_name: "主治医名"
    tts_announcement: "主治医名を「先生は木村先生です」のようにお話しください。"
    input_method: "voice_only"
    save_to: "doctorName"
    next_step: "患者氏名"
    retry_failure: "skip"
  - step_name: "患者氏名"
    tts_announcement: "患者氏名を「名前は佐藤花子です」のようにお話しください。"
    input_method: "voice_only"
    save_to: "patientName"
    next_step: "患者生年月日"
    retry_failure: "skip"
  - step_name: "患者生年月日"
    tts_announcement: "患者様の生年月日を西暦でお話しください。プッシュボタンでも操作できます。"
    input_method: "dtmf_voice"
    save_to: "patientDateOfBirth"
    next_step: "診察券番号"
    retry_failure: "end_failure"
  - step_name: "診察券番号"
    tts_announcement: "7桁の診察券番号をお話しください。プッシュボタンでも操作できます。"
    input_method: "dtmf_voice"
    save_to: "medicalCardNumber"
    next_step: "指示期間開始日"
    retry_failure: "end_failure"
  - step_name: "指示期間開始日"
    tts_announcement: "指示期間の開始日を、西暦でお話しください。プッシュボタンでも操作できます。"
    input_method: "dtmf_voice"
    save_to: "instructionStartDate"
    next_step: "訪問内容"
    retry_failure: "end_failure"
  - step_name: "訪問内容"
    tts_announcement: "訪問看護・リハビリテーションの内容を、「病状観察」「理学療法士が行う訪問看護を1日あたり30分、週1回」などのようにお話しください。"
    input_method: "voice_only"
    save_to: "visitContent"
    next_step: "END_受付完了"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # 異常系（デフォルト必須 — 削除禁止）
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に「186」を追加いただくことで、発信者番号を通知していただくことができます。お電話ありがとうございました。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。{施設名}、訪問看護指示書専用のAI電話です。ただいまの時間は受付時間外です。恐れ入りますが、土日祝日を除く月曜から金曜の8時30分から17時の間におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "ご回答の確認ができませんでしたので、こちらからお電話失礼させていただきます。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"
  # 正常系・案内系
  - name: "END_固定電話案内"
    condition: "固定電話からの着信（SMS 受信不可）"
    tts_announcement: "お電話ありがとうございます。{施設名}、訪問看護指示書専用のAI電話です。恐れ入りますが、固定電話からはお受けできません。ショートメッセージが受信可能な携帯電話から、改めておかけ直しください。お電話ありがとうございました。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_固定電話案内"
  - name: "END_非該当"
    condition: "訪問看護指示書依頼以外"
    tts_announcement: "恐れ入ります。こちらは訪問看護指示書の専用ダイヤルです。外来予約やその他のお問合わせは、恐れ入りますが、病院の代表番号、{代表電話番号}へおかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非該当"
  - name: "END_受付不可"
    condition: "患者同意=取れていない"
    tts_announcement: "こちらのお電話では受付できません。恐れ入りますが、事前に患者様の同意をご確認のうえ、改めてお手続きをお願いいたします。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付不可"
  - name: "END_受付完了"
    condition: "全項目聴取完了"
    tts_announcement: "ご依頼を承りました。AI電話番号よりショートメッセージにてご連絡いたします。届いたURLより内容をご確認ください。更新をもって本申し込み完了となります。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了"

# --- セクション8b: RAG/FAQ 検索サブフロー ---
rag_subflow:
