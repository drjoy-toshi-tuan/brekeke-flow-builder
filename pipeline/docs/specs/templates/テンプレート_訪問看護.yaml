# =============================================================================
# シナリオテンプレート: 訪問看護（訪問看護指示書 作成依頼）
# =============================================================================
# 用途: draw.io でシナリオを起こすための雛形 YAML。
#   コピー → {施設名} 等を置換 → yaml_to_drawio.py で drawio 化 → diagrams.net で確認。
# ベース実例: 北里大学病院TSC 訪問看護指示書専用ダイヤル
#   （Drive: 20260413_濱口_北里大学病院_訪問看護_Brekekeテスト電話.pdf）
# 構造: 訪問看護事業所 → 病院 への B2B 依頼受付。
#   SMS 送信前提のため携帯のみ受付（固定電話は終話案内）。依頼確認 → 患者同意確認 →
#   事業所名・担当者名・連絡先 → 指示書種別(DTMF) → 患者情報 → 指示期間 → 訪問内容 → 終話。
#   終話後 SMS で本申し込み URL を送付し、更新をもって本申し込み完了となる運用。
# =============================================================================
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "{施設名}"
  scenario_name: "訪問看護"
  group_name: "{施設名}_訪問看護_{YYYYMMDD}"   # 末尾に作業日。日付はグループ名のみに付ける（naming_convention.md）
  flow_name: "{施設名}_訪問看護_{YYYYMMDD}$訪問看護"   # $ より前は group_name と完全一致（T-2d）
  target_facility: "{施設名}（トータルサポートセンター等）"
  office_id: "TODO_要確認"
  phone_number: "{代表電話番号}"
  business_hours: "祝日除く月〜金 8:30〜17:00"
  flow_type: "subflow"
  work_type: "new"
  environment: "demo"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "{施設名}$訪問看護"
      role: "main"
      description: "訪問看護指示書作成依頼の一次受付。携帯のみ受付（固定電話は終話案内）。依頼確認→患者同意→事業所/担当者/連絡先→指示書種別→患者情報→指示期間→訪問内容→終話（SMSで本申し込みURL送付）"
  subflows:
    - name: "{施設名}$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "連絡先が着信番号と異なる場合のみ呼び出す"

# --- セクション3: フローの目的 ---
purpose: >
  {施設名} に訪問看護事業所から訪問看護指示書の作成依頼があった際、AI が一次受付する。
  SMS で本申し込み URL を送るため携帯電話のみ受付し、固定電話・非通知は終話案内する。
  依頼確認・患者同意の確認後、事業所名・担当者名・連絡先・指示書種別・診療科・主治医名・
  患者氏名・患者生年月日・診察券番号・指示期間の開始日・訪問看護内容を聴取して Dr.JOY に登録。
  終話後に SMS で本申し込み URL を送付し、URL 上の更新操作をもって本申し込み完了となる。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
# 営業時間判定が必要な施設 (曜日別営業時間 / 祝日休 / 固定休 / 年末年始 等):
# script_template: business_hour_classifier を script ブロックで使用可能。
# 曜日別営業時間 + 祝日 (Brekeke Note `drjoy.holidays` 連携) + 固定休を 1 ブロックで判定し、
# 営業中/営業時間外/定休日/祝日/固定休/ERROR の 6 分岐に仕分ける。
# 使用例: docs/brekeke/script_templates/README.md、詳細仕様: modules/business_hour_classifier/REQUIREMENTS.md
scenario_flow:
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 着信種別判定

  # 携帯のみ受付。固定電話は SMS 受信不可のため終話案内（非通知/時間外は opening が自動処理）
  - step: 着信種別判定
    type: context_match_router
    reference_module: "incoming-classifier"
    conditions:
      - match: "携帯"
        next: 冒頭_アナウンス
      - match: "other"
        next: END_固定電話案内

  - step: 冒頭_アナウンス
    type: announcement
    next: 依頼確認

  # 訪問看護指示書作成の依頼か（専用ダイヤルのため対象外は終話案内）
  - step: 依頼確認
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 患者同意確認
      - match: "いいえ"
        next: END_非該当

  # 患者同意の取得有無（未取得は受付不可で終話）
  - step: 患者同意確認
    type: hearing
    output_format: enum
    conditions:
      - match: "同意済み"
        next: 事業所名
      - match: "取れていない"
        next: END_受付不可

  - step: 事業所名
    type: hearing
    output_format: text
    next: 担当者名

  - step: 担当者名
    type: hearing
    output_format: text
    next: 連絡先確認

  # 連絡先は着信番号でよいか。異なる場合のみ電話番号聴取サブフローへ
  - step: 連絡先確認
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 指示書種別
      - match: "いいえ"
        next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "{施設名}$電話番号聴取"
    next: 指示書種別

  # 指示書種別（DTMF 1-5、再質問5回→終話）
  - step: 指示書種別
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 診療科

  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 主治医名

  - step: 主治医名
    type: hearing
    output_format: text
    next: 患者氏名

  - step: 患者氏名
    type: hearing
    output_format: text
    next: 患者生年月日

  # DTMF 併用、再質問5回→終話
  - step: 患者生年月日
    type: hearing
    output_format: datetime
    next: 診察券番号

  # DTMF 7桁、再質問5回→終話
  - step: 診察券番号
    type: hearing
    output_format: text
    next: 指示期間開始日

  # DTMF 併用、再質問5回→終話
  - step: 指示期間開始日
    type: hearing
    output_format: datetime
    next: 訪問内容

  - step: 訪問内容
    type: hearing
    output_format: text
    next: END_受付完了

  # 終話
  - step: END_固定電話案内
    type: termination
    termination_ref: "END_固定電話案内"
  - step: END_非該当
    type: termination
    termination_ref: "END_非該当"
  - step: END_受付不可
    type: termination
    termination_ref: "END_受付不可"
  - step: END_受付完了
    type: termination
    termination_ref: "END_受付完了"

