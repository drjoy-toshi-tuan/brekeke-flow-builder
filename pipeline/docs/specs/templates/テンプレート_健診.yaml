# =============================================================================
# シナリオテンプレート: 健診
# =============================================================================
# 用途: draw.io でシナリオを起こすための雛形 YAML。
#   コピー → {施設名} 等を置換 → yaml_to_drawio.py で drawio 化 → diagrams.net で確認。
# ベース実例: output/scenarios/銚子市立病院_健診/設計書.yaml
# 構造: 個人情報を先に聴取 → 用件4択（予約/変更/キャンセル/その他問合せ）
#       → 予約は予約種類（健康診断/がん検診/予防接種）で分岐 → RAG → 終話
# =============================================================================
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "{施設名}"
  scenario_name: "健診"
  group_name: "{施設名}_健診_{YYYYMMDD}"   # 末尾に作業日。日付はグループ名のみに付ける（naming_convention.md）
  flow_name: "{施設名}_健診_{YYYYMMDD}$健診"   # $ より前は group_name と完全一致（T-2d）
  target_facility: "{施設名}（健診センター）"
  office_id: "TODO_要確認"
  phone_number: "{代表電話番号}"
  business_hours: "祝日除く月〜金 9:00〜17:00"
  flow_type: "subflow"
  work_type: "new"
  environment: "demo"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "{施設名}$健診"
      role: "main"
      description: "個人情報聴取 → 用件4択 → 予約/変更/キャンセル/問合せ分岐 → RAG → 終話"
  subflows:
    - name: "{施設名}$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
    - name: "{施設名}$生年月日聴取"
      target: "生年月日聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
    - name: "{施設名}$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
    - name: "{施設名}$RAG検索"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "FAQ 検索サブフロー（パターン3）"

# --- セクション3: フローの目的 ---
purpose: >
  {施設名} の健診専用 AI 電話。個人情報（氏名・生年月日・電話番号）を聴取後、用件
  （予約/変更/キャンセル/その他問合せ）を4択で振り分ける。予約ルートでは予約種類
  （健康診断/がん検診/予防接種）に応じた聴取を行い、折り返し受付を自動化する。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
# 営業時間判定が必要な施設 (曜日別営業時間 / 祝日休 / 固定休 / 年末年始 等):
# script_template: business_hour_classifier を script ブロックで使用可能。
# 曜日別営業時間 + 祝日 (Brekeke Note `drjoy.holidays` 連携) + 固定休を 1 ブロックで判定し、
# 営業中/営業時間外/定休日/祝日/固定休/ERROR の 6 分岐に仕分ける。
# 使用例: docs/brekeke/script_templates/README.md、詳細仕様: modules/business_hour_classifier/REQUIREMENTS.md
scenario_flow:
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 氏名聴取

  # 個人情報を先に聴取（健診の定型順）
  - step: 氏名聴取
    type: subflow
    flowname: "{施設名}$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "{施設名}$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "{施設名}$電話番号聴取"
    next: 用件選択

  # 用件4択
  - step: 用件選択
    type: hearing
    output_format: enum
    conditions:
      - match: "予約"
        next: 予約種類
      - match: "変更"
        next: 変更_予約日
      - match: "キャンセル"
        next: キャンセル_予約日
      - match: "その他問合せ"
        next: 問合せ内容

  # 予約ルート（予約種類で分岐 → 希望日合流）
  - step: 予約種類
    type: hearing
    output_format: enum
    conditions:
      - match: "健康診断"
        next: 予約希望日
      - match: "がん検診"
        next: 予約希望日
      - match: "予防接種"
        next: 予約希望日

  - step: 予約希望日
    type: hearing
    output_format: text
    next: jump_RAG_予約

  - step: jump_RAG_予約
    type: subflow
    flowname: "{施設名}$RAG検索"
    next: END_予約

  # 変更ルート
  - step: 変更_予約日
    type: hearing
    output_format: text
    next: jump_RAG_変更

  - step: jump_RAG_変更
    type: subflow
    flowname: "{施設名}$RAG検索"
    next: END_変更

  # キャンセルルート
  - step: キャンセル_予約日
    type: hearing
    output_format: text
    next: jump_RAG_キャンセル

  - step: jump_RAG_キャンセル
    type: subflow
    flowname: "{施設名}$RAG検索"
    next: END_キャンセル

  # その他問合せルート
  - step: 問合せ内容
    type: hearing
    output_format: text
    next: jump_RAG_問合せ

  - step: jump_RAG_問合せ
    type: subflow
    flowname: "{施設名}$RAG検索"
    next: END_問い合わせ

  # 終話
  - step: END_予約
    type: termination
    termination_ref: "END_予約"
  - step: END_変更
    type: termination
    termination_ref: "END_変更"
  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"
  - step: END_問い合わせ
    type: termination
    termination_ref: "END_問い合わせ"

# --- セクション5: コンテキストフィールド一覧（抜粋）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "その他問合せ"
    item_default: true
    editable: true
    deletable: false
    notes: "DTMF 1=予約 2=変更 3=キャンセル 4=その他問合せ"
  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: ""
  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: ""
  - context_name: "reservationType"
    context_name_jp: "予約種類"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "健康診断/がん検診/予防接種"
  - context_name: "Preferred_date"
    context_name_jp: "予約希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "フリーテキスト。日付妥当性チェックはしない"
  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "変更/キャンセルルートで聴取"
  - context_name: "inquiry"
    context_name_jp: "問合せ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "その他問合せルートのみ"
  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"
  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: ""
  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: ""
  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

# --- セクション7: ステップ詳細（TTS 発話文言）---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。{施設名}の健診専用AI電話です。音声ガイダンスに従い、お答えください。"
    input_method: "voice_only"
    save_to: ""
    next_step: "氏名聴取"
    retry_failure: "skip"
  - step_name: "用件選択"
    tts_announcement: "ご用件を、次の4つからお選びください。予約は1、変更は2、キャンセルは3、その他お問い合わせは4。"
    input_method: "dtmf_voice"
    save_to: "classification"
    next_step: "予約種類 / 変更_予約日 / キャンセル_予約日 / 問合せ内容"
    retry_failure: "end_failure"
  - step_name: "予約種類"
    tts_announcement: "ご予約を希望される種類を次の3つからお選びください。健康診断は1、がん検診は2、予防接種は3。"
    input_method: "dtmf_voice"
    save_to: "reservationType"
    next_step: "予約希望日"
    retry_failure: "end_failure"
  - step_name: "予約希望日"
    tts_announcement: "予約を希望される日や曜日をお話しください。"
    input_method: "voice_only"
    save_to: "Preferred_date"
    next_step: "jump_RAG_予約"
    retry_failure: "skip"
  - step_name: "変更_予約日"
    tts_announcement: "現在の予約日と変更を希望される内容をお話しください。"
    input_method: "voice_only"
    save_to: "reservationDate"
    next_step: "jump_RAG_変更"
    retry_failure: "skip"
  - step_name: "キャンセル_予約日"
    tts_announcement: "キャンセルされる現在の予約日と予約内容をお話しください。"
    input_method: "voice_only"
    save_to: "reservationDate"
    next_step: "jump_RAG_キャンセル"
    retry_failure: "skip"
  - step_name: "問合せ内容"
    tts_announcement: "お問合せ内容をお話しください。"
    input_method: "voice_only"
    save_to: "inquiry"
    next_step: "jump_RAG_問合せ"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # 異常系（デフォルト必須 — 削除禁止）
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"
  # 正常系
  - name: "END_予約"
    condition: "予約ルート完了"
    tts_announcement: "予約についてのご要望を承りました。3営業日以内に、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。担当者からのご連絡後に確定となります。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約"
  - name: "END_変更"
    condition: "変更ルート完了"
    tts_announcement: "予約変更についてのご要望を承りました。3営業日以内に、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更"
  - name: "END_キャンセル"
    condition: "キャンセルルート完了"
    tts_announcement: "予約キャンセルについてのご要望を承りました。担当者より折り返しご連絡をさせていただく場合がございます。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_キャンセル"
  - name: "END_問い合わせ"
    condition: "その他問合せルート完了"
    tts_announcement: "お問い合わせを承りました。3営業日以内に、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_問い合わせ"

# --- セクション8b: RAG/FAQ 検索サブフロー ---
rag_subflow:
  pattern: "3"                              # 問合せルート内 + 全終話前
  inquiry_insertion_point: "問合せ内容聴取後"
  pre_termination: true
