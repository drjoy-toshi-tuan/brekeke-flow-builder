# =============================================================================
# シナリオテンプレート: 疑義照会
# =============================================================================
# 用途: draw.io でシナリオを起こすための雛形 YAML。
#   コピー → {施設名} 等を置換 → yaml_to_drawio.py で drawio 化 → diagrams.net で確認。
# ベース実例: output/scenarios/すずな皮ふ科_疑義照会/設計書_すずな皮ふ科クリニック_疑義照会.yaml
# 構造: 入電者は調剤薬局担当者（患者本人ではない）。電話帳登録済み薬局は
#       incoming-category-classifier + Phone2Name で自動認識、無登録は薬局名聴取に
#       フォールバック。担当者名・患者名・患者生年月日(DTMF)・疑義内容を聴取。
# 注意: augment ブロック（薬局カテゴリ判定 / 薬局名読み上げ）は scaffold が placeholder
#       Script で生成 → Brekeke IVR UI で drjoy^Incoming$incoming-category-classifier /
#       drjoy^External Integration$Phone2Name に手動置換が必要。
# =============================================================================
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "{施設名}"
  scenario_name: "疑義照会"
  group_name: "{施設名}_疑義照会_{YYYYMMDD}"   # 末尾に作業日。日付はグループ名のみに付ける（naming_convention.md）
  flow_name: "{施設名}_疑義照会_{YYYYMMDD}$疑義照会"   # $ より前は group_name と完全一致（T-2d）
  target_facility: "{施設名}"
  office_id: "TODO_要確認"
  phone_number: "{代表電話番号}"
  business_hours: "祝日除く月〜金 9:00〜18:00"
  flow_type: "1flow"
  work_type: "new"
  environment: "demo"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# 入電者は調剤薬局担当者。患者本人由来の標準4点セット（PatientName/DOB/Phone/MedicalCard）
# サブフローは使用しない。患者名・患者生年月日は hearing として直接 main に置く。
flow_structure:
  type: "1flow"
  flows:
    - name: "{施設名}$疑義照会"
      role: "main"
      description: "調剤薬局からの疑義照会一次受付。電話帳登録済み薬局は自動認識、無登録は薬局名聴取にフォールバック"
  subflows: []

# --- セクション3: フローの目的 ---
purpose: >
  {施設名} に調剤薬局担当者から疑義照会の電話があった際、薬局名・担当者名・患者氏名・
  患者生年月日(DTMF)・疑義内容を自動聴取し Dr.JOY に登録する。電話帳登録薬局からの着信は
  incoming-category-classifier + Phone2Name で薬局名を自動認識し「{薬局名}さんですね。」と
  読み上げる。電話帳未登録時は薬局名を聴取する。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
# 営業時間判定が必要な施設 (曜日別営業時間 / 祝日休 / 固定休 / 年末年始 等):
# script_template: business_hour_classifier を script ブロックで使用可能。
# 曜日別営業時間 + 祝日 (Brekeke Note `drjoy.holidays` 連携) + 固定休を 1 ブロックで判定し、
# 営業中/営業時間外/定休日/祝日/固定休/ERROR の 6 分岐に仕分ける。
# 使用例: docs/brekeke/script_templates/README.md、詳細仕様: modules/business_hour_classifier/REQUIREMENTS.md
scenario_flow:
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 薬局カテゴリ判定

  # 電話帳の薬局カテゴリ（リスト1）に着信番号がヒットするか判定
  - step: 薬局カテゴリ判定
    type: augment
    augment_pattern: new_module
    augment_purpose: "drjoy^Incoming$incoming-category-classifier。電話帳の薬局カテゴリ（リスト1）に着信番号がヒットするか判定。found→薬局名読み上げ(Phone2Name)、other(NO_RESULT/TIMEOUT/ERROR)→薬局名聴取にフォールバック"
    conditions:
      - match: "found"
        next: 薬局名読み上げ
      - match: "other"
        next: 薬局名聴取

  # 電話帳ヒット時のみ。フリガナを recipient_name で差込み「{薬局名}さんですね。」と読み上げ
  - step: 薬局名読み上げ
    type: augment
    augment_pattern: new_module
    augment_purpose: "drjoy^External Integration$Phone2Name。電話帳のフリガナを recipient_name で動的差込し「{薬局名}さんですね。」と読み上げる。FOUND_KATAKANA_NAME_DEFAULT_TMP='recipient_name さんですね。'"
    next: 担当者名

  # 電話帳未登録時のフォールバック
  - step: 薬局名聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 担当者名

  - step: 担当者名
    type: hearing
    output_format: text
    retry_failure: skip
    next: 患者名

  - step: 患者名
    type: hearing
    output_format: text
    retry_failure: skip
    next: 患者生年月日

  # DTMF 8桁（YYYYMMDD）併用
  - step: 患者生年月日
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 疑義内容

  - step: 疑義内容
    type: hearing
    output_format: text
    retry_failure: skip
    next: END_疑義照会

  - step: END_疑義照会
    type: termination
    termination_ref: "END_疑義照会"

# --- セクション5: コンテキストフィールド一覧（抜粋）---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "5"
        order: "5"
        value: "疑義照会"
    item_default: true
    editable: true
    deletable: false
    notes: ""
  - context_name: "clinicalDepartment2"
    context_name_jp: "薬局名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "フォールバック（薬局名聴取）時のみ格納。電話帳ヒット時は Dr.JOY 側で紐付く"
  - context_name: "Desiredreservation"
    context_name_jp: "担当者名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "薬局担当者名"
  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "薬局担当者からの代理入力"
  - context_name: "patientDateOfBirth"
    context_name_jp: "患者生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "DTMF 8桁（YYYYMMDD）。患者本人との照合用"
  - context_name: "reason"
    context_name_jp: "疑義内容"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "疑義の自由記述"
  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納。Phone2Name の入力源"
  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "転送"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: ""
  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

# --- セクション7: ステップ詳細（TTS 発話文言）---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。{施設名}AI電話です。"
    input_method: "voice_only"
    save_to: ""
    next_step: "薬局カテゴリ判定"
    retry_failure: "skip"
  - step_name: "薬局名読み上げ"
    tts_announcement: "<% recipient_name %> さんですね。"
    input_method: "voice_only"
    save_to: ""
    next_step: "担当者名"
    retry_failure: "skip"
  - step_name: "薬局名聴取"
    tts_announcement: "薬局名をお話しください。"
    input_method: "voice_only"
    save_to: "clinicalDepartment2"
    next_step: "担当者名"
    retry_failure: "skip"
  - step_name: "担当者名"
    tts_announcement: "今お電話いただいているご担当者名を、「担当は佐藤です」のようにお話しください。"
    input_method: "voice_only"
    save_to: "Desiredreservation"
    next_step: "患者名"
    retry_failure: "skip"
  - step_name: "患者名"
    tts_announcement: "患者様のお名前を、「名前は山田太郎です」のようにフルネームでお話しください。"
    input_method: "voice_only"
    save_to: "patientName"
    next_step: "患者生年月日"
    retry_failure: "skip"
  - step_name: "患者生年月日"
    tts_announcement: "患者様の生年月日を、「1990年4月1日」のようにお話しください。プッシュボタンでも操作できます。"
    input_method: "dtmf_voice"
    save_to: "patientDateOfBirth"
    next_step: "疑義内容"
    retry_failure: "skip"
  - step_name: "疑義内容"
    tts_announcement: "疑義の内容をお話しください。"
    input_method: "voice_only"
    save_to: "reason"
    next_step: "END_疑義照会"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # 異常系（デフォルト必須 — 削除禁止）
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に「186」を追加いただくことで、発信者番号を通知していただくことができます。お電話ありがとうございました。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。{施設名}のAI電話です。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "ご回答の確認ができませんでしたので、こちらからお電話失礼させていただきます。お電話ありがとうございました。"
    status: "3"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_聴取失敗"
  # 正常系
  - name: "END_疑義照会"
    condition: "通話完了（疑義照会フロー正常終了）"
    tts_announcement: "かしこまりました。お掛けいただいた番号に折り返しいたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_疑義照会"

# --- セクション8b: RAG/FAQ 検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション8c: Dr.JOY 電話帳エントリ（薬局カテゴリ判定で使用）---
# 着信番号 → 薬局カテゴリ自動判定（incoming-category-classifier + Phone2Name）。
# 登録薬局を list1（薬局カテゴリ）として事前登録する。フリガナは元資料に記載がある場合のみ記入。
phonebook:
  enabled: true
  list_labels:
    list1: "薬局カテゴリ（登録薬局）"
    list2: ""
    list3: ""
    list4: ""
    list5: ""
  entries:
    - phone_number: "{薬局1電話番号}"
      name: "{薬局1名称}"
      furigana: ""
      blacklist: 0
      list1: 1
      list2: 0
      list3: 0
      list4: 0
      list5: 0
      notification: 0
