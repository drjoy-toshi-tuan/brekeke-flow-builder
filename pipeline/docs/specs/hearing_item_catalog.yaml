# ============================================================
# 聴取項目カタログ (Hearing Item Catalog)
# ============================================================
# 用途: 設計書 YAML の scenario_flow ブロック名を正規化するための辞書
#   - normalize_hearing_items.py が PDF / drawio テキストと照合する
#   - 各エントリの synonyms に含まれる名前がすべてマッチ対象
#   - canonical が設計書 YAML に書き込まれる正式名称
#
# 更新ルール:
#   - synonyms は「顧客資料（PDF / drawio / 議事録）に実際に出現するラベル」のみ。
#     内部モジュール名（アンダースコア連結・_Soniox 等のサフィックス付き）は載せない。
#     ※ 照合時に normalize_hearing_items.py が空白・_・・を除去するため、
#       表記ゆれ（用件_聴取 ↔ 用件聴取 等）は synonym 追加なしでマッチする
#   - 新しいシノニムを発見したら出典（資料パス）を PR に明記して追加する（canonical は変えない）
#   - 新しい聴取項目を追加する場合は canonical を明確にしてエントリを追加する
#   - block_type / output_format / save_to はデフォルト値（施設固有調整可）
#
# processing: 聴取値の後処理方式（決定論優先ポリシー準拠）
#   - script : 認定スクリプト部品で決定論的に判定する（既定。適用できる限りこれを選ぶ）
#   - openai : generate_by_OpenAI を使う。許可は 2 系統のみ:
#              ① FAQ（自由発話の質問意図照合 — 決定論で書けない）
#              ② 予約希望日/希望時期（SKILL_希望日 の固定プロンプト —
#                 病院側が扱いやすいクリーンな日付データを返すため）
#   - none   : 後処理なし（slot/card_number 決定論展開・アナウンスのみに限る。
#              自由テキスト項目は必ず script のテキスト正規化部品を通してクリーンに保存する —
#              フィラー・言い淀み除去 / 記号・空白正規化 / 全半角統一。意味の書き換え・要約はしない）
#   processing_ref に判定ロジックの正本（SKILL / 部品 / テンプレ）を記す。
#
# next_hint: 構造上の既定遷移先（canonical 名）。問い合わせ系 3 項目
#   （問い合わせ内容 / その他問い合わせ内容 / 追加の質問）はすべて FAQ照合 の入力であり、
#   normalize_hearing_items.py が next を FAQ照合 に自動接続する
#   （FAQ照合 が資料に明記されていなくてもブロックを自動追加する）。
#
# script のキーワード設計ポリシー（各部品の REQUIREMENTS.md / oracle で担保）:
#   1. 完全一致 > 部分一致 の順で必ず先に評価する（完全一致キーワードを部分一致辞書より優先）
#   2. 部分一致は STRONG（その語だけで確定してよい語）と WEAK（他の手掛かりと併用）に分ける
#      （SKILL_用件 の STRONG/WEAK 分類に準拠）
#   3. 複数候補が部分一致したら最長一致を採用（SKILL_診療科 の最長一致ロジックに準拠）
#   4. AmiVoice 誤認識対策: 部品ごとの文脈に合わせた誤認識辞書（音近似語）を持ってよいが、
#      他ラベルと衝突する短い語（2 文字以下等）を WEAK にも入れない
#   5. どれにも該当しなければ確定させず「わからない」系ラベルへ倒す（誤マッチより聞き直し）
#   ※ 上記は catalog では強制できない。部品認定（oracle + P6 受入）が機械ゲート。
#
# risk: 誤判定の実害区分（docs/specs/script-input-handling.md §3）。
#   - high: 誤判定が予約・患者データ・連絡義務に直接影響 →
#           ①分類確定後に復唱確認（はい/いいえ）必須 ②WEAK マーカー使用禁止
#           ③音近似ラベル対（キャンセル/変更 等）は復唱で確定
#   - 未宣言 = low（標準ラダーのみでよい）
#
# 最終更新: 2026-07-14 (processing を決定論優先に再定義。openai は FAQ と希望日系のみ)
# ============================================================

version: "1.0"

