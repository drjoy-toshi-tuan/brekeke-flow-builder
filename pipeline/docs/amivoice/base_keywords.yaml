# AmiVoice 単語登録 マスターキーワード定義
# -------------------------------------------------------
# 管理者: @TS-dong-nc（保護ゾーン — 変更には PR レビュー必須）
# 生成ツール: tools/gen_amivoice_dict.py
# 出力先: output/scenarios/{施設}_{flow}/amivoice/{ノード名}.csv
#
# カラム説明:
#   word         : 登録する表記（AmiVoice に認識させたい単語・フレーズ）
#   reading      : 読み（ひらがな）
#   category     : 用途分類（youken / faq / department / date / number / system / log_derived）
#   priority     : 登録優先度（high / medium / low）
#   target_nodes : 登録対象ノード名リスト（設計書の入力モジュール名と一致させること）
#   note         : 備考・誤認識例など
# -------------------------------------------------------

# ===== 用件キーワード（Scripts_用件 と完全一致させること） =====
youken:
  - word: 予約
    reading: よやく
    priority: high
    target_nodes: [入力_用件]
    note: "誤認識例: お薬(おやく)、規約(きやく)、ようやく"

  - word: 変更
    reading: へんこう
    priority: high
    target_nodes: [入力_用件]
    note: "誤認識例: 返却(へんきゃく)、勉強(べんきょう)"

  - word: キャンセル
    reading: きゃんせる
    priority: high
    target_nodes: [入力_用件]
    note: "誤認識例: キャンセール、キャンセラー"

  - word: お問い合わせ
    reading: おといあわせ
    priority: high
    target_nodes: [入力_用件]

  - word: 取り消し
    reading: とりけし
    priority: medium
    target_nodes: [入力_用件]
    note: "キャンセルの口語表現"

  - word: 予約を取りたい
    reading: よやくをとりたい
    priority: medium
    target_nodes: [入力_用件]

  - word: 予約したい
    reading: よやくしたい
    priority: medium
    target_nodes: [入力_用件]

  - word: 日にちを変えたい
    reading: ひにちをかえたい
    priority: medium
    target_nodes: [入力_用件]

  - word: 予約をずらしたい
    reading: よやくをずらしたい
    priority: medium
    target_nodes: [入力_用件]

  - word: 予約をやめたい
    reading: よやくをやめたい
    priority: medium
    target_nodes: [入力_用件]

  - word: 診てもらいたい
    reading: みてもらいたい
    priority: medium
    target_nodes: [入力_用件]

  - word: 確認
    reading: かくにん
    priority: medium
    target_nodes: [入力_用件]

# ===== FAQ 頻出キーワード（Scripts-FAQ_* の faqMap キーと対応） =====
