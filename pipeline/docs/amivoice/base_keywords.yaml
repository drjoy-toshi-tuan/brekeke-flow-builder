  - word: 受付時間
    reading: うけつけじかん
    priority: high
    target_nodes: [入力_相談_問合せ, 入力_追加の質問, 入力_内容確認, 入力_その他の問い合わせ]

  - word: 駐車場
    reading: ちゅうしゃじょう
    priority: high
    target_nodes: [入力_相談_問合せ, 入力_追加の質問, 入力_内容確認, 入力_その他の問い合わせ]
    note: "誤認識例: 中小城(ちゅうしょうじょう)"

  - word: 診察券
    reading: しんさつけん
    priority: high
    target_nodes: [入力_相談_問合せ, 入力_追加の質問, 入力_内容確認, 入力_その他の問い合わせ]
    note: "誤認識例: 診察件、真察券"

  - word: 紹介状
    reading: しょうかいじょう
    priority: high
    target_nodes: [入力_相談_問合せ, 入力_追加の質問, 入力_内容確認, 入力_その他の問い合わせ]

  - word: 初診
    reading: しょしん
    priority: high
    target_nodes: [入力_相談_問合せ, 入力_追加の質問, 入力_内容確認, 入力_その他の問い合わせ, 入力_用件]

  - word: 再診
    reading: さいしん
    priority: high
    target_nodes: [入力_相談_問合せ, 入力_追加の質問, 入力_内容確認, 入力_その他の問い合わせ, 入力_用件]

  - word: 健康保険証
    reading: けんこうほけんしょう
    priority: high
    target_nodes: [入力_相談_問合せ, 入力_追加の質問, 入力_内容確認, 入力_その他の問い合わせ]

  - word: クレジットカード
    reading: くれじっとかーど
    priority: medium
    target_nodes: [入力_相談_問合せ, 入力_追加の質問, 入力_内容確認, 入力_その他の問い合わせ]

  - word: 選定療養費
    reading: せんていりょうようひ
    priority: high
    target_nodes: [入力_相談_問合せ, 入力_追加の質問, 入力_内容確認, 入力_その他の問い合わせ, 入力_選定療養費]
    note: "誤認識例: 選定療養比、専定療養費"

