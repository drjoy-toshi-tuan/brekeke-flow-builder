# ===== 理由・症状関連の一般語彙（誤認識例は病院からの不具合報告 2026-07 由来） =====
# ここに載せるのは「日にち」「血圧」等の一般的な業務用語のみ。
# 通話ごとの具体的な理由・症状の内容（個人情報寄りの自由発話）は登録しない。
reason:
  - word: 日にち
    reading: ひにち
    priority: medium
    target_nodes: [入力_理由, 入力_予約希望日, 入力_変更希望日]
    note: "誤認識例: 日にち(ひにち) → 平熱(へいねつ)"

  - word: 血圧
    reading: けつあつ
    priority: medium
    target_nodes: [入力_理由]
    note: "誤認識例: 血圧(けつあつ) → 検査通(けんさつう)"

  - word: 脳波
    reading: のうは
    priority: medium
    target_nodes: [入力_理由, 入力_検査項目]
    note: "誤認識例: 脳波(のうは) → ノウハウ"

  - word: 急用
    reading: きゅうよう
    priority: medium
    target_nodes: [入力_理由]
    note: "誤認識例: 用事・急用 → 幼児は救助"

# ===== 診察券番号・電話番号（数字系） =====
number:
  - word: 診察券番号
    reading: しんさつけんばんごう
    priority: high
    target_nodes: [入力_診察券番号]

  - word: ございません
    reading: ございません
    priority: high
    target_nodes: [入力_診察券番号]
    note: "診察券なしの口語表現"

  - word: 持っていません
    reading: もっていません
    priority: high
    target_nodes: [入力_診察券番号]

  - word: わかりません
    reading: わかりません
    priority: high
    target_nodes: [入力_診察券番号, 入力_診療科]

# ===== 通院歴 =====
history:
  - word: 初めて
    reading: はじめて
    priority: high
    target_nodes: [入力_通院歴]

  - word: 初診
    reading: しょしん
    priority: high
    target_nodes: [入力_通院歴]

  - word: 以前に来たことがある
    reading: いぜんにきたことがある
    priority: medium
    target_nodes: [入力_通院歴]

  - word: 通っています
    reading: かよっています
    priority: medium
    target_nodes: [入力_通院歴]

# ===== 聞き返しリピート（もう一度/もう一回）=====
# Scripts の repeat_guard: true ブロックで検知する。全 STT 入力ノードに配布
repeat:
  - word: もう一度
    reading: もういちど
    priority: high
    target_nodes: [入力_用件, 入力_診療科, 入力_生年月日, 入力_予約希望日,
                   入力_変更希望日, 入力_診察券番号, 入力_通院歴,
                   入力_相談_問合せ, 入力_追加の質問, 入力_内容確認,
                   入力_その他の問い合わせ]
    note: "誤認識例: もう一度(もういちど) → もう一回"

  - word: もう一回
    reading: もういっかい
    priority: high
    target_nodes: [入力_用件, 入力_診療科, 入力_生年月日, 入力_予約希望日,
                   入力_変更希望日, 入力_診察券番号, 入力_通院歴,
                   入力_相談_問合せ, 入力_追加の質問, 入力_内容確認,
                   入力_その他の問い合わせ]

  - word: 繰り返し
    reading: くりかえし
    priority: medium
    target_nodes: [入力_用件, 入力_診療科, 入力_生年月日, 入力_予約希望日,
                   入力_変更希望日, 入力_診察券番号]

  - word: 聞こえません
    reading: きこえません
    priority: medium
    target_nodes: [入力_用件, 入力_診療科, 入力_生年月日, 入力_予約希望日,
                   入力_変更希望日, 入力_診察券番号]
    note: "音量問題と区別せずリピートで対応"

  - word: もう少し大きな声で
    reading: もうすこしおおきなこえで
    priority: low
    target_nodes: [入力_用件, 入力_診療科]

# ===== 実ログ由来の誤認識補正エントリ（log upload後に追加） =====
# misrecognition_log.csv をアップロード後、gen_amivoice_dict.py が自動追記する
log_derived: []
