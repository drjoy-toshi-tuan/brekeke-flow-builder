    - 財団法人

# ===== はい / いいえ =====

hai:
  note: "確認・Yes/No 質問に対する肯定回答"
  # 出典: 実ログ 2026-07-11〜2026-07-15（4日分・複数施設の電話復唱/生年月日復唱/日程確認等の
  # echo-confirm ノード実測。氏名・電話番号・生年月日・診察券番号の値そのものは一切参照していない
  # — save-dialogue 系の汎用キーは同一キーが施設によって自由記述の個人情報も拾ってしまうことを
  # 確認したため除外し、echo-confirm 専用キー + はい/いいえ語彙のみで構成される発話だけを対象にした）
  keywords:
    - はい
    - そうです
    - はいそうです
    - 正しいです
    - 合っています
    - 合ってます
    - お願いします
    - お願いいたします
    - 大丈夫です
    # 「結構です」「いいです」は両義語（肯定/拒否）のため登録禁止 — 認定部品 yes_no_classifier も不採用（監査 2026-07-14 #2）
    - よろしいです
    - 宜しいです
    - 間違いないです
    - そうになります
    - はい大丈夫です
    - 構いません
    - その通りです

iie:
  note: "確認・Yes/No 質問に対する否定回答"
  keywords:
    - いいえ
    - 違います
    - ちがいます
    - 別です
    - そうではない
    - そうじゃない
    - 違う
    - 異なります
    - 間違いです
    - 間違っています
    - 正しくないです
    - いえ
    - いや

