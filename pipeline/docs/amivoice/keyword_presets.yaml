# AmiVoice キーワードプリセット定義
# -------------------------------------------------------
# 管理者: @TS-dong-nc（保護ゾーン — 変更には PR レビュー必須）
#
# 用途:
#   設計書 YAML の script_blocks で preset: <名前> を指定すると
#   gen_scripts.py がこのファイルからキーワードリストを自動展開する。
#
# 追加方法:
#   1. 新しいプリセット名（英数字・アンダースコア）でエントリを追加
#   2. keywords: に実際の発話パターンをリストアップ
#      ★ 出典必須（2026-07-14〜・docs/specs/script-input-handling.md）:
#        追加する語は「実通話ログ or 受入テストケース」に出典があるものだけ。
#        推測・「ありそう」で追加しない。PR に出典（ログ日付/ケース ID）を明記。
#        既存語彙は認定部品（yes_no_classifier/checkup_intent_classifier）と
#        docs/testcase_master 由来（包括出典）。
#      ★ 両義語（結構です 等・文脈で肯定にも否定にもなる語）は登録禁止 —
#        確定させず聞き直し（NO_RESULT）に倒す。
#      ★ 2 文字以下の語は部分一致で誤爆するため原則登録しない
#        （現状の gen_scripts は部分一致生成 — 監査 #1 の engine 改修まで特に注意。
#          監査: docs/amivoice/keyword_presets_audit_20260714.md）
#   3. note: に対象の TTS 文言の例を書く（次の人が迷わないように）
#   4. PR を作成して @TS-dong-nc にレビュー依頼
#
# ★ polar-first 原則（2026-07-14・script-input-handling.md）:
#   あり/なし・当日/後日・必要/不要・本人/代理人 のような 2 極判定は、preset を作らず
#   TTS を「はい/いいえで答えられる質問」に設計して認定部品 yes_no_classifier
#   （実ログで鍛えた最成熟語彙・YES_LABEL/NO_LABEL で任意ラベルへ写像可）を使う。
#   preset + n_choice を使うのは 3 択以上 or 質問文を polar にできない場合のみ。
#
# ★ 施設固有語彙（ワクチン種類 / コース / がん検診種類 等）は本ファイルに載せない —
#   施設ごとの spec として設計書 options[].keywords に壁打ちで確定する。
#
# 使い方（設計書 YAML の script_blocks）:
#   - type: enum_classifier
#     module_name: Scripts_個人法人
#     input_module: 入力_個人法人
#     options:
#       - label: 個人
#         preset: kojin          ← このファイルの名前を指定
#       - label: 企業
#         preset: kigyo_hojin
#         keywords: [NPO法人]   ← preset に追加したいものだけ書く（マージされる）
# -------------------------------------------------------

# ===== 個人 / 法人 =====

kojin:
  note: "「個人のお客様か企業・法人のお客様か」に対する個人回答"
  keywords:
    - 個人
    - 自分
    - 一般
    - 私個人
    - 個人です
    - 個人で
    - 個人のほうで
    - 個人として
    - 個人利用

kigyo_hojin:
  note: "「個人のお客様か企業・法人のお客様か」に対する企業・法人回答"
  keywords:
    - 企業
    - 会社
    - 法人
    - 団体
    - 組織
    - 事業者
    - 法人格
    - 株式会社
    - 有限会社
    - 合同会社
    - 一般社団法人
    - 医療法人
    - 学校法人
