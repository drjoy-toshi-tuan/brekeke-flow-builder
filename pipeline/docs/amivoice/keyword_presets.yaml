# ===== 用件（intent ブロック用）=====
# 語彙のベースは認定部品 checkup_intent_classifier の CATEGORY_KEYS。
# それに master テストケース（docs/testcase_master）で検出された未カバー言い回しを追加。
# intent スクリプトは部分一致（/kw/.test）でスコアリングするため、
# 判別力のある語幹のみ列挙すること（「お願いします」等の汎用語は入れない）。

yoken_yoyaku:
  note: "用件確認に対する予約系回答（strong 推奨）"
  keywords:
    - 予約
    - よやく
    - よやぐ
    - 受けたい
    - 受診したい
    - 申し込み
    - 申込
    - 診てもらいたい
    - 診てもらえ
    - 診察してもら
    - かかりたい
    - 行きたい

yoken_henkou:
  note: "用件確認に対する変更系回答（strong 推奨）"
  # compounds: 複合発話（「予約を変更したい」等 — 単独 keyword より先に評価。監査 #4 対応・出典 docs/testcase_master）
  compounds:
    - "予約.*(変更|変え|ずらし|し直し)"
  keywords:
    - 変更
    - 変えたい
    - 変えて
    - ずらしたい
    - ずらして
    - 日にちを変え
    - 日程を変え
    - 時間を変え
    - 日程を改め
    - し直したい
    - 別の日に

yoken_cancel:
  note: "用件確認に対するキャンセル系回答（strong 推奨）"
  # compounds: 「予約をキャンセルしたい」等（監査 #1 の実害例 — keyword より先に評価・出典 docs/testcase_master）
  compounds:
    - "予約.*(キャンセル|取り消し|取消|取りやめ|中止|やめ)"
  keywords:
    - キャンセル
    - 取り消し
    - 取消
    - 取りやめ
    - 中止
    - やめたい
    - やめます
    - やめて
    - 行けなくなった
    - 行けなくなり
    - なかったことに
    - 見送りたい

yoken_kakunin:
  note: "用件確認に対する予約確認系回答（施設により その他 に束ねる場合あり）。※「予約の確認」は 予約 と両ヒット — engine 改修（最長一致）まで設計書 options で 確認 を 予約 より先に置くこと（監査 #4）"
  # compounds: 「予約の確認」「予約が入っているか」等（監査 #4 対応・出典 docs/testcase_master）
  compounds:
    - "予約.*(確認|確かめ|入っている|入ってる|取れて|いつだったか|教え)"
  keywords:
    - 確認
    - 確かめたい
    - いつだったか
    - 予約日を教え
    - 入っているか
    - 入っている
    - 入ってる
    - 取れて
    - 取れてますか
    - 取れているか

yoken_sonota:
  note: "用件確認に対するその他系回答（weak 推奨。話題語ベース）"
  keywords:
    - その他
    - そのほか
    - 問い合わせ
    - 問合せ
    - 問いあわせ
    - 質問
    - 聞きたい
    - 伺いたい
    - 相談
    - 診断書
    - 紹介状
    - 薬だけ
    - 処方箋
    - 面会
    - 支払い
    - 入院
    - 検査結果
    - 健診結果
    - 転院
    - 忘れ物

yoken_chikoku:
  note: "用件確認に対する遅刻連絡系回答（遅刻分岐がある施設のみ）"
  keywords:
    - 遅刻
    - 遅れ
