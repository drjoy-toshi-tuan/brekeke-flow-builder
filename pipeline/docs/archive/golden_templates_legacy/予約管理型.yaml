# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "冒頭_直近予約確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "はい"
    notes: "はい→END_受付時間外案内、NO_RESULT→用件確認へ進む"

  - order: 2
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
      - "予約希望"
    notes: "DTMF 1=予約変更, 2=予約キャンセル, 3=予約確認, 4=予約希望"

  - order: 3
    name: "内容確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "予約確認ルートのみ。フリーテキスト保存"

  - order: 4
    name: "診療科_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "label"
    output_labels:
      - "予約不可"
      - "リストにない"
      - "{診療科名}"
    notes: "profile_words: 診療科辞書。予約不可診療科は代表案内へ"

  - order: 5
    name: "予約日_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "currentAppointmentDate"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "valid"
      - "過去日"
    notes: "日付フォーマット変換。過去日は再聴取"

  - order: 6
    name: "希望日の有無"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "scheduledAppointmentDate"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "はい→次回受診希望日聴取、いいえ→サブフロー遷移"

  - order: 7
    name: "次回受診希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredAppointmentDate"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels: []
    notes: "日付フォーマット変換"

  - order: 8
    name: "診察券番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 1
    echo_back: false
    save_to: "patientId"
    openai_processing: "classify"
    output_format: "number"
    output_labels:
      - "数字"
      - "わからない"
    notes: "サブフロー。わからない→患者名へスキップ"

  - order: 9
    name: "患者名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー。profile_words: 氏名辞書"

  - order: 10
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 1
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "valid"
      - "不正値"
      - "2桁_0007"
      - "2桁_0831"
      - "2桁_3263"
    notes: "サブフロー。DOB Re-confirmation あり。2桁入力時は元号確認ステップへ分岐"

  - order: 11
    name: "連絡先電話番号_確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 1
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "サブフロー。telephoneNumber復唱確認"

  - order: 12
    name: "連絡先電話番号_手動聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 1
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "サブフロー。Phone Normalization + Re-confirmation"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_直近予約確認"
    tts_announcement: "サンプル総合病院のAI電話がお受けします。本日から2営業日後までのご予約に関するお問い合わせは、受付時間内に外来予約センターへおかけ直しください。3日以内の予約に関するお問い合わせですか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「そうです」を含む"
          output: "はい"
        - input: "それ以外"
          output: "NO_RESULT"
      no_result_condition: "「はい」「そうです」以外の全入力"
    save_to: null
    next_step: "用件確認（NO_RESULT時）/ END_受付時間外案内（はい時）"
    retry_failure: "end_failure"

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つからお話ください。予約の変更は1を、キャンセルは2を、確認は3を、紹介状のある方・予約を取りたい方は4。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約変更"
        - "予約キャンセル"
        - "予約確認"
        - "予約希望"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「変更」を含む"
          output: "予約変更"
        - input: "DTMF 2 または「キャンセル」を含む"
          output: "予約キャンセル"
        - input: "DTMF 3 または「確認」を含む"
          output: "予約確認"
        - input: "DTMF 4 または「予約」「紹介状」を含む"
          output: "予約希望"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約変更/予約キャンセル→診療科_聴取 / 予約確認→内容確認 / 予約希望→END_予約希望案内"
    retry_failure: "end_failure"

  - step_name: "内容確認"
    tts_announcement: "それでは、ご確認内容についてお伺いします。次回の予約日時を教えて欲しいなど、内容を簡潔にお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "サブフロー遷移_個人情報聴取"
    retry_failure: "skip"

  - step_name: "診療科_聴取"
    tts_announcement: "それでは、ご予約されている診療科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約不可"
        - "リストにない"
        - "{診療科名}"
      mapping:
        - input: "予約不可対象の診療科（リハビリテーション科、放射線科等）"
          output: "予約不可"
        - input: "辞書に存在しない診療科名"
          output: "リストにない"
        - input: "辞書に存在する診療科名"
          output: "{診療科名}（正規化後の診療科名）"
      no_result_condition: "診療科名を抽出できない"
    save_to: "clinicalDepartment"
    next_step: "予約不可→END_診療科予約不可 / リストにない→診療科_再聴取 / {診療科名}→予約日_聴取"
    retry_failure: "skip"

  - step_name: "予約日_聴取"
    tts_announcement: "それでは、現在の予約日を「4月1日」のように日付でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "valid"
        - "過去日"
      mapping:
        - input: "本日以降の有効な日付"
          output: "valid（YYYY-MM-DD形式）"
        - input: "過去の日付"
          output: "過去日"
      no_result_condition: "日付として解釈できない"
    save_to: "currentAppointmentDate"
    next_step: "OpenAI_予約日_用件判定"
    retry_failure: "skip"

  - step_name: "OpenAI_予約日_用件判定"
    tts_announcement: ""
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約キャンセル"
        - "予約変更"
      mapping:
        - input: "classificationが「予約キャンセル」"
          output: "予約キャンセル"
        - input: "classificationが「予約変更」"
          output: "予約変更"
      no_result_condition: "classificationが空"
    save_to: null
    next_step: "予約キャンセル→OpenAI_予約日_直近判定 / 予約変更→希望日の有無"
    retry_failure: "skip"

  - step_name: "OpenAI_予約日_直近判定"
    tts_announcement: ""
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "直近"
        - "それ以外"
      mapping:
        - input: "currentAppointmentDateが本日から2営業日以内"
          output: "直近"
        - input: "currentAppointmentDateが3日以上先"
          output: "それ以外"
      no_result_condition: "currentAppointmentDateが空"
    save_to: null
    next_step: "直近→END_直近キャンセル不可 / それ以外→希望日の有無"
    retry_failure: "skip"

  - step_name: "希望日の有無"
    tts_announcement: "次の受診予定日はお決まりですか？はい決まっています、または、いいえ決まっていません、のようにお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「決まっています」を含む"
          output: "はい"
        - input: "「いいえ」「決まっていません」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "scheduledAppointmentDate"
    next_step: "はい→次回受診希望日 / いいえ→サブフロー遷移_個人情報聴取"
    retry_failure: "skip"

  - step_name: "次回受診希望日"
    tts_announcement: "予約希望日を「4月1日」「4月中旬」のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト"
      mapping:
        - input: "音声認識結果から日付を抽出"
          output: "日付テキスト（YYYY-MM-DD形式またはフリーテキスト）"
      no_result_condition: "日付として解釈できない"
    save_to: "desiredAppointmentDate"
    next_step: "サブフロー遷移_個人情報聴取"
    retry_failure: "skip"

  - step_name: "診察券番号"
    tts_announcement: "診察券番号をお伺いします。10桁以内の診察券番号をお話ください。番号がわからない場合は、「わからない」とお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "数字"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "3桁以上の数字"
          output: "数字"
        - input: "「わからない」「不明」を含む"
          output: "わからない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "patientId"
    next_step: "患者名"
    retry_failure: "skip"

  - step_name: "患者名"
    tts_announcement: "患者さんのお名前を、フルネームでお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "氏名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "氏名テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "patientName"
    next_step: "生年月日"
    retry_failure: "skip"

  - step_name: "生年月日"
    tts_announcement: "患者さんの、生年月日をお話ください。ダイヤルプッシュの場合は、8桁で入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "valid"
        - "不正値"
        - "2桁_0007"
        - "2桁_0831"
        - "2桁_3263"
      mapping:
        - input: "8桁の有効な日付"
          output: "valid"
        - input: "不正な形式・存在しない日付"
          output: "不正値"
        - input: "2桁入力かつ00〜07の範囲"
          output: "2桁_0007"
        - input: "2桁入力かつ08〜31の範囲"
          output: "2桁_0831"
        - input: "2桁入力かつ32〜63の範囲"
          output: "2桁_3263"
      no_result_condition: "音声認識結果が空または解析不能"
    save_to: "patientDateOfBirth"
    next_step: "連絡先_着信番号判定"
    retry_failure: "skip"

  - step_name: "電話番号_手動聴取"
    tts_announcement: "ご連絡先の電話番号を、0から始まる市外局番から、または携帯番号でお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "valid"
        - "不正値"
      mapping:
        - input: "10〜11桁の数値（先頭0）"
          output: "valid"
        - input: "電話番号として不正な形式"
          output: "不正値"
      no_result_condition: "電話番号として解釈できない"
    save_to: "additionalPhoneNumber"
    next_step: "終話チェーン"
    retry_failure: "end_failure"

# --- セクション8: 終話パターン ---
termination_patterns:
  - name: "END_受付完了"
    condition: "全聴取完了（正常終話）"
    tts_announcement: "ご用件を受付いたしました。3営業日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。ご連絡がいくまでは確定ではありません。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了"

  - name: "END_電話番号聴取失敗"
    condition: "電話番号リトライ上限超過"
    tts_announcement: "ご回答の確認ができませんでしたのでこちらからお電話失礼させていただきます。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_電話番号聴取失敗"

  - name: "END_受付時間外案内"
    condition: "冒頭直近予約確認で「はい」"
    tts_announcement: "申し訳ございません。恐れ入りますが受付時間内に外来予約センターへおかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_受付時間外案内"

  - name: "END_予約希望案内"
    condition: "用件=予約希望"
    tts_announcement: "申し訳ございません。恐れ入りますが受付時間内に外来予約センターへおかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_予約希望案内"

  - name: "END_診療科予約不可"
    condition: "予約不可診療科"
    tts_announcement: "受付時間内に外来予約センターへおかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_診療科予約不可"

  - name: "END_直近キャンセル不可"
    condition: "直近（2営業日以内）キャンセル"
    tts_announcement: "恐れ入りますが、直近のご予約に関するお問い合わせは、受付時間内に外来予約センターへおかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_直近キャンセル不可"

  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

