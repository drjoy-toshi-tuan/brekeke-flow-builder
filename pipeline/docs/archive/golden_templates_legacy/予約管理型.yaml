# ゴールデンテンプレート: 予約管理型（Reservation Management）
# パターン概要: 複数分岐を持つ予約受付フロー。用件確認（DTMF 4択）→ 診療科（STT）→ 予約日（STT）→ 個人情報聴取サブフロー。
# 参照元: 海老名総合病院 外来予約 設計書を汎用化
# 用途: Directorエージェントが新規設計書を生成する際のリファレンス。
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "サンプル総合病院"
  group_name: "サンプル病院"
  flow_name: "サンプル病院$外来予約_20260401"
  target_facility: "サンプル総合病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "045-123-4567"
  business_hours: "なし（acceptance_times 不使用）"
  flow_type: "subflow"
  work_type: "new"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "サンプル病院$外来予約_20260401"
      role: "main"
      description: "冒頭チェーン → 用件分岐（4択）→ 診療科・予約日聴取 → サブフロー遷移 → 終話（代表案内系）"
    - name: "サンプル病院$個人情報聴取"
      role: "sub"
      description: "診察券番号 → 氏名 → 生年月日 → 電話番号 → 終話（受付完了/電話番号失敗）"
  subflows:
    - name: "サンプル病院$個人情報聴取"
      target: "個人情報聴取（診察券番号・氏名・生年月日・電話番号）"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフローのリファレンスbivrを完全コピー"

# --- セクション3: フローの目的 ---
purpose: "患者からの外来予約に関する電話を受け、用件（予約変更・キャンセル・確認・予約希望）・診療科・予約日・患者情報（診察券番号・氏名・生年月日・連絡先電話番号）を聴取し、折り返し受付を自動化する。直近2営業日以内の予約・直近キャンセル・予約不可診療科は代表案内（電話かけ直し）に誘導する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "サンプル病院$外来予約_20260401"
    diagram: |
      saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知 → END_非通知 → 切断
            └─ 通常 → 冒頭_直近予約確認(TTS+DTMF STT, max_dtmf_length=1)
                        ├─ はい → 完了フラグ_受付時間外案内 → END_受付時間外案内 → 切断
                        └─ NO_RESULT → 用件確認

      用件確認（TTS+DTMF STT, max_dtmf_length=1）
        ├─ 予約変更 → 診療科_聴取
        ├─ 予約キャンセル → 診療科_聴取
        ├─ 予約確認 → 内容確認
        ├─ 予約希望 → 完了フラグ_予約希望案内 → END_予約希望案内 → 切断
        └─ NO_RESULT → リトライ_用件確認
                          ├─ Retry → 用件確認_再聴取
                          └─ No more → 切断

      ─── 予約変更・予約キャンセルルート ───
      診療科_聴取（TTS+AmiVoice STT）
        ├─ 予約不可 → 完了フラグ_診療科予約不可 → END_診療科予約不可 → 切断
        ├─ リストにない → リトライ_診療科 → Retry → 診療科_再聴取
        │     ├─ 予約不可 → END_診療科予約不可 → 切断
        │     ├─ リストにない → 診療科_聴取失敗アナウンス → 予約日_聴取
        │     └─ {診療科名} → 予約日_聴取
        └─ {診療科名} → 予約日_聴取

      予約日_聴取（TTS+AmiVoice STT）
        ├─ 過去日 → 予約日_過去エラー → valid → OpenAI_予約日_用件判定
        └─ valid → OpenAI_予約日_用件判定

      OpenAI_予約日_用件判定（generate_by_OpenAI）
        ├─ 予約キャンセル → OpenAI_予約日_直近判定
        └─ 予約変更 → 希望日の有無

      OpenAI_予約日_直近判定（generate_by_OpenAI）
        ├─ 直近（当日〜明後日） → 完了フラグ_直近キャンセル不可 → END_直近キャンセル不可 → 切断
        └─ それ以外 → 希望日の有無

      希望日の有無（TTS+DTMF STT, max_dtmf_length=1）
        ├─ はい → 次回受診希望日 → ★サブフロー遷移
        ├─ いいえ → ★サブフロー遷移
        └─ NO_RESULT → リトライ_希望日 → No more → ★サブフロー遷移

      ─── 予約確認ルート ───
      内容確認（TTS+AmiVoice STT）
        └─ デフォルト → ★サブフロー遷移

      ─── 共通合流 → サブフロー遷移 ───
      ★サブフロー遷移 = Custom Jump to Flow → サンプル病院$個人情報聴取

      ─── メインフロー内終話パターン ───
      END_非通知 → 切断
      END_受付時間外案内 → 切断
      END_予約希望案内 → 切断
      END_診療科予約不可 → 切断
      END_直近キャンセル不可 → 切断
    notes: "acceptance_times不使用（営業時間なし）。incoming-classifierの直後に冒頭直近予約確認を配置"

  - flow_name: "サンプル病院$個人情報聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「診察券番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「サンプル病院$」に置換。構造・接続・スクリプトは一切変更不可。

      このサブフローは以下の4つの聴取ステップを順に実行する:
        1. 診察券番号（DTMF AmiVoice STT, max_dtmf_length=10）
        2. 氏名（AmiVoice STT — 音声のみ）
        3. 生年月日（DTMF AmiVoice STT, max_dtmf_length=8 + DOB Re-confirmation）
        4. 電話番号（incoming-classifier → 携帯/固定分岐 → Phone Normalization → Re-confirmation）

      電話番号聴取後、終話チェーンを実行して切断。
      リファレンス.bivr 内の構成: 41モジュール（Disconnect含む）

      ─── サブフロー内終話パターン ───
      END_電話番号聴取失敗 → 切断
      END_受付完了 → 切断
    notes: |
      CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr を完全コピー。
      独自のモジュール追加・削除・接続変更は禁止。フロー名プレフィックスのみ施設名に置換。

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
