  - "OpenAI分岐が4箇所: 用件判定、診療科判定、予約日用件判定、直近判定"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id"
    resolved: false
  - item: "対応電話番号"
    resolved: false
  - item: "予約不可診療科の一覧（施設固有）"
    resolved: false
  - item: "smsFlag の割り当て（0=代表案内系, 1=受付完了/電話番号失敗）"
    resolved: true
  - item: "直近判定の基準日数（2営業日）"
    resolved: true
