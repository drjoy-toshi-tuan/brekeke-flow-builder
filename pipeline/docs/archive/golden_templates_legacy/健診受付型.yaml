# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "clinicalDepartment"
    - "full-body_checkup"
  patterns:
    - condition: "clinicalDepartment=サンプルクリニック & full-body_checkup=人間ドック"
      sms_flag: "1"
      notes: "人間ドック × サンプルCL"
    - condition: "clinicalDepartment=サンプルクリニックレディースプラザ & full-body_checkup=人間ドック"
      sms_flag: "2"
      notes: "人間ドック × レディース"
    - condition: "clinicalDepartment=サンプルガーデンズ健診クリニック & full-body_checkup=人間ドック"
      sms_flag: "3"
      notes: "人間ドック × ガーデンズ"
    - condition: "clinicalDepartment=サンプルクリニック & full-body_checkup=その他"
      sms_flag: "4"
      notes: "その他 × サンプルCL"
    - condition: "clinicalDepartment=サンプルクリニックレディースプラザ & full-body_checkup=その他"
      sms_flag: "5"
      notes: "その他 × レディース"
    - condition: "clinicalDepartment=サンプルガーデンズ健診クリニック & full-body_checkup=その他"
      sms_flag: "6"
      notes: "その他 × ガーデンズ"

