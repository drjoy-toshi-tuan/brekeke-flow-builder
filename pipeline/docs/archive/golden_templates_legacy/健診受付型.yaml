# --- セクション11: 特記事項・制約 ---
special_notes:
  - "3施設共通の1フロー構成。施設選択が冒頭にある特殊構成"
  - "smsFlag が 6パターン: clinicalDepartment（3値）x full-body_checkup（2値）= 6パターン。通常のフローより複雑"
  - "電話番号リトライ3回: 第2世代の仕様を維持（第3世代標準の2回より1回多い）"
  - "電話番号確認中の番号再入力対応: 確認中に10-11桁の新しい番号をそのまま入力できる仕様"
  - "classification は常に「問合せ」: 人間ドックでも「問合せ」がセットされる"
  - "終話チェーンは電話番号聴取サブフロー内で完結: smsFlag分岐を含む"
  - "冒頭チェーンの順序: wait → saveContextModel2DB → acceptance_times → incoming-classifier（時間外チェックを先に実施）"
  - "生年月日・診察券番号はこのフローでは聴取しない"

