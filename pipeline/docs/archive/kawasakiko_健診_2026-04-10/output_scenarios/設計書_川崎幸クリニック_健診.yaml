    tts_announcement: "予約確認についてのご要望を承りました。日曜、祝日を除く、翌営業日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。担当者からのご連絡後に確定となりますのでしばらくお待ちくださいませ。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_問合せ_携帯"

  - name: "END_問合せ_固定"
    condition: "classification=問い合わせ かつ phoneType=その他"
    tts_announcement: "予約確認の申し込みを受付いたしました。日曜、祝日を除く、翌営業日以内に、担当者から折り返し電話にてご連絡いたします。担当者からのご連絡後に確定となりますのでしばらくお待ちくださいませ。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_問合せ_固定"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["classification"]
  patterns:
    - condition: "キャンセル"
      sms_flag: "2"
      notes: "キャンセル完了時のみ smsFlag=2"
    - condition: "予約/変更/問い合わせ（全正常終話）"
      sms_flag: "1"
      notes: "キャンセル以外の正常終話は全て smsFlag=1"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"
  inquiry_insertion_point: ""
  pre_termination: true
  # パターン2: 全ルートの終話前に「そのほかに何かお問い合わせはございますか？」RAGサブフローを配置。
  # Gen2の「最後の問い合わせ」（全ルート合流点）をRAGサブフローで代替。
  # Gen2→Gen3デフォルトはパターン3だが、本フローでは全ルートが「最後の問い合わせ」に合流する構造のため、
  # パターン2（全終話前のみ）が適切（確認レポート N-5 参照）。

