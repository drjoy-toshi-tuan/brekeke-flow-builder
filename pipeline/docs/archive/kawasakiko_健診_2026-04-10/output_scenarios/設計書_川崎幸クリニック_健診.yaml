      サブフロー内でphoneType（携帯/その他）をsaveContext2DBで保存済み。
      3回失敗時は失敗コードで返却→メインフロー側でEND_代表案内へ分岐。
    notes: "静的JSONコピー。復唱あり版。Rule 9/10/11準拠。termination=return"

