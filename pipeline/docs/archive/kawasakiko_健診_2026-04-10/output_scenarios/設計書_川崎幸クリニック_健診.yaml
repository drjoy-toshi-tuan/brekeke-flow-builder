        - input: "DTMF 2 または「健保」「健康保険」「組合」「会社」を含む"
          output: "健保組合"
        - input: "DTMF 3 または「その他」「ドック」「人間ドック」「雇用」を含む"
          output: "その他"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "menu"
    next_step: "川崎市→川崎市_受診内容 / 健保組合→健保_会社名 / その他→その他_希望検査"
    retry_failure: "skip"

  - step_name: "川崎市_受診内容"
