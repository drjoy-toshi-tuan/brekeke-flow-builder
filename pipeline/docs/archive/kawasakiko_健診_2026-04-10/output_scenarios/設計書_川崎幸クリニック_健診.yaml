      notes: "CLAUDE.md Rule 16準拠。パターン2: 全終話前に配置。静的JSONコピー"

# --- セクション3: フローの目的 ---
purpose: >
  川崎幸クリニック健診予約専用ダイヤルのAI電話受付。
  受診者名・生年月日・連絡先電話番号・診察券番号を聴取した後、
  用件4択（予約/変更/キャンセル/問い合わせ）に分岐。
  予約ルートは更に健診種類3択（川崎市/健保組合/その他）に分岐し種類別に聴取。
  全ルート終話前にFAQ対応（RAGサブフロー）を実施。
  終話TTSは用件 x 電話種別（携帯/固定）で分岐し、川崎市予約のみ特定健診受診券案内を追加。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "川崎幸クリニック$健診_20260410"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(status=2,smsFlag=-1) → END_非通知(TTS) → 切断
            └─ 通常/携帯/固定 → acceptance_times
                ├─ 時間外/ERROR/TIMEOUT → 完了フラグ_時間外(status=6,smsFlag=-1) → END_時間外(TTS) → 切断
                └─ 受付可(true) → 冒頭_アナウンス(TTS)
                    → ジャンプ_氏名聴取(Custom Jump to Flow) → [返却:.*→次へ]
                    → ジャンプ_生年月日聴取(Custom Jump to Flow) → [返却:.*→次へ]
                    → ジャンプ_電話番号聴取(Custom Jump to Flow)
                        ├─ 返却:1(携帯)/2(その他) → ジャンプ_診察券番号聴取へ
                        └─ 返却:失敗 → 完了フラグ_代表案内(status=2,smsFlag=-1) → END_代表案内(TTS) → 切断
                    → ジャンプ_診察券番号聴取(Custom Jump to Flow) → [返却:.*→次へ]
                    → 用件_選択(TTS)
                    → 入力_用件(DTMF AmiVoice STT, max_dtmf_length=1)
                    → OpenAI_用件(generate_by_OpenAI)
                    → リトライ_用件(Retry: No more→完了フラグ_聴取失敗)
                        ├─ 予約 → 予約_健診種類(TTS)
                        │    → 入力_予約_健診種類(DTMF, max_dtmf_length=1)
                        │    → OpenAI_予約_健診種類 → リトライ_予約_健診種類(No more→その他_希望検査)
                        │       ├─ 川崎市 → 川崎市_受診内容(TTS)
                        │       │    → 入力_川崎市_受診内容(STT) → OpenAI_川崎市_受診内容 → リトライ_川崎市_受診内容
                        │       │    → 共通_人数受診時期(TTS)
                        │       │    → 入力_共通_人数受診時期(STT) → OpenAI_共通_人数受診時期 → リトライ_共通_人数受診時期
                        │       │    → ジャンプ_RAG
                        │       ├─ 健保組合 → 健保_会社名(TTS)
                        │       │    → 入力_健保_会社名(STT) → OpenAI_健保_会社名 → リトライ_健保_会社名
                        │       │    → 健保_コース(TTS)
                        │       │    → 入力_健保_コース(STT) → OpenAI_健保_コース → リトライ_健保_コース
                        │       │    → 健保_オプション(TTS)
                        │       │    → 入力_健保_オプション(STT) → OpenAI_健保_オプション → リトライ_健保_オプション
                        │       │    → 共通_人数受診時期(TTS) → ... → ジャンプ_RAG
                        │       └─ その他 → その他_希望検査(TTS)
                        │            → 入力_その他_希望検査(STT) → OpenAI_その他_希望検査 → リトライ_その他_希望検査
                        │            → ジャンプ_RAG
                        ├─ 変更 → 変更_予約日(TTS)
                        │    → 入力_変更_予約日(STT) → OpenAI_変更_予約日 → リトライ_変更_予約日
                        │    → 変更_変更項目(TTS)
                        │    → 入力_変更_変更項目(STT) → OpenAI_変更_変更項目 → リトライ_変更_変更項目
                        │    → ジャンプ_RAG
                        ├─ キャンセル → キャンセル_予約日(TTS)
                        │    → 入力_キャンセル_予約日(STT) → OpenAI_キャンセル_予約日 → リトライ_キャンセル_予約日
                        │    → キャンセル_受診内容(TTS)
                        │    → 入力_キャンセル_受診内容(STT) → OpenAI_キャンセル_受診内容 → リトライ_キャンセル_受診内容
                        │    → ジャンプ_RAG
                        └─ 問い合わせ → 問い合わせ_確認内容(TTS)
                             → 入力_問い合わせ_確認内容(STT) → OpenAI_問い合わせ_確認内容 → リトライ_問い合わせ_確認内容
                             → ジャンプ_RAG

                    [RAGサブフロー返却後]
                    → 終話ルーティング
                        ├─ キャンセル → 完了フラグ_キャンセル(status=1,smsFlag=2) → END_キャンセル(TTS) → 切断
                        ├─ 予約 x 川崎市 x 携帯 → 完了フラグ(status=1,smsFlag=1) → END_予約_川崎_携帯(TTS) → 切断
                        ├─ 予約 x 川崎市 x 固定 → 完了フラグ(status=1,smsFlag=1) → END_予約_川崎_固定(TTS) → 切断
                        ├─ 予約 x 健保/その他 x 携帯 → 完了フラグ(status=1,smsFlag=1) → END_予約_健保_携帯(TTS) → 切断
                        ├─ 予約 x 健保/その他 x 固定 → 完了フラグ(status=1,smsFlag=1) → END_予約_健保_固定(TTS) → 切断
                        ├─ 変更 x 携帯 → 完了フラグ(status=1,smsFlag=1) → END_変更_携帯(TTS) → 切断
                        ├─ 変更 x 固定 → 完了フラグ(status=1,smsFlag=1) → END_変更_固定(TTS) → 切断
                        ├─ 問い合わせ x 携帯 → 完了フラグ(status=1,smsFlag=1) → END_問合せ_携帯(TTS) → 切断
                        └─ 問い合わせ x 固定 → 完了フラグ(status=1,smsFlag=1) → END_問合せ_固定(TTS) → 切断

      ─── 終話ルーティング実装方針 ───
      1. ContextMatchRouter(classification)
         ├─ キャンセル → 直接 END_キャンセル チェーン
         ├─ 予約 → ContextMatchRouter(OpenAI_予約_健診種類)
         │    ├─ 川崎市 → ContextMatchRouter(phoneType) → 携帯/固定
         │    └─ 健保組合/その他/default → ContextMatchRouter(phoneType) → 携帯/固定
         ├─ 変更 → ContextMatchRouter(phoneType) → 携帯/固定
         └─ 問い合わせ/default → ContextMatchRouter(phoneType) → 携帯/固定
      ※ phoneTypeは電話番号聴取サブフロー内のsaveContext2DBで保存済み

      ─── リトライ失敗時 ───
      用件リトライ超過 → 完了フラグ_聴取失敗(status=3,smsFlag=-1) → END_聴取失敗(TTS) → 切断
      健診種類リトライ超過 → その他_希望検査へスキップ（Gen2デフォルト: その他にフォールバック）
      その他聴取項目リトライ超過 → 次ステップへスキップ（Gen2準拠: 不明確でも次へ）
    notes: |
      冒頭チェーン: wait → saveContextModel2DB → incoming-classifier → acceptance_times → 冒頭_アナウンス
      個人情報は用件確認の前に聴取（Gen2順序踏襲）。全サブフロー return 型。
      RAGはパターン2: 全ルート終話前に「そのほかに何かお問い合わせはございますか？」
      共通_人数受診時期は川崎市/健保組合の2ルートで共用（同一TTS・同一保存先・同一Retry先）。
      変更_予約日とキャンセル_予約日は別モジュール（Retry先が異なるため）。

  - flow_name: "川崎幸クリニック$氏名聴取_20260410"
    diagram: |
      CLAUDE.md Rule 9: docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。
