# --- セクション11: 特記事項・制約 ---
special_notes:
  - "個人情報聴取（氏名→生年月日→電話番号→診察券番号）を用件確認の前に実施する（Gen2順序を踏襲）。通常フローでは用件確認が先だが、本フローは顧客の意図的な設計のため変更しない"
  - "共通_人数受診時期モジュールは川崎市ルートと健保組合ルートの2経路から参照される共用モジュール。同一TTS・同一保存先（detail）・同一Retry先（RAG）のため共用可能"
  - "変更_予約日とキャンセル_予約日は同一TTS文言だが別モジュール。Retry No more先が異なる（変更→変更_変更項目、キャンセル→キャンセル_受診内容）ため共用不可"
  - "reasonフィールドは多目的フィールドとして共用（Gen2準拠）。ルートごとに異なる内容を保存する"
  - "終話TTSは classification x phoneType x menu の3軸ルーティング。川崎市予約のみ特定健診受診券案内が追加される。携帯/固定で冒頭表現（承りました/受付いたしました）と連絡方法（SMS言及有無）が異なる"
  - "電話番号聴取サブフローのtermination=returnのため、メインフロー側でEND_代表案内チェーンを配置する。電話番号サブフローの施設固有代表案内TTS（044-541-5210）はメインフロー内のTTSモジュールで発話する"
  - "Gen2のstatus=0はGen3では使用禁止。途中切断時はsaveCompletionFlag2dbを呼ばずデフォルト状態とする"
  - "Gen2のendpointフィールドとsmsFlagフィールドはsaveContextModel2DBに含めない（saveCompletionFlag2dbパラメータで制御）"

# --- セクション12: 要確認事項 ---
