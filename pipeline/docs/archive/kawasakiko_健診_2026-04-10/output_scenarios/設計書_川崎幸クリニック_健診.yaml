# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちの、いずれかでお話しください。予約を取る場合は1、予約を変更する場合は2、予約をキャンセルする場合は3、その他お問い合わせは4、それでは、お話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「薬」「集約」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「取り直し」「変えたい」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「やめる」「取り消し」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「問い合わせ」「確認」「質問」を含む"
          output: "問い合わせ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→予約_健診種類 / 変更→変更_予約日 / キャンセル→キャンセル_予約日 / 問い合わせ→問い合わせ_確認内容"
    retry_failure: "end_failure"

  - step_name: "予約_健診種類"
    tts_announcement: "今回受診を希望される健診の種類を、以下の3つのうちいずれかでお話しください。川崎市の健診の方は1、健康保険組合の健診の方は2、その他の健診の方は3。それでは、お話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "川崎市"
        - "健保組合"
        - "その他"
