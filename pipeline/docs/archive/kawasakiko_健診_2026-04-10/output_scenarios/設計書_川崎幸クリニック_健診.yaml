    resolved: false
  - item: "questionフィールド不採用 — RAGサブフローで代替（問題あれば追加可能）"
    resolved: false
  - item: "RAGパターン2採用 — 全終話前にRAG配置（Gen2→Gen3デフォルトのパターン3ではない）"
    resolved: false
  - item: "川崎市予約の終話TTS分離採用 — 計9正常終話パターン"
    resolved: false
  - item: "営業時間（祝日除く月〜金 8:30-17:00、土 8:30-12:30）— 代表案内テキストから推定。Dr.JOY側で正式設定"
