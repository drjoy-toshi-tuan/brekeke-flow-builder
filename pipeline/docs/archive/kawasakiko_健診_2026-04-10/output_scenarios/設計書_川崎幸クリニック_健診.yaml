      ループTTS（プロパティ設定）: 「その他に何かご質問はございますか？ない場合は「ありません」のようにお話しください。」
    notes: "静的JSONコピー。パターン2。TTS文言はプロパティで設定（JSON内は空文字）。Rule 16準拠"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
# endpoint / smsFlag は saveContextModel2DB に含めない（saveCompletionFlag2db パラメータ）。
# Preferred_date / question は不採用（確認レポート N-3, N-4 参照）。
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。DTMF 1=予約, 2=変更, 3=キャンセル, 4=問い合わせ"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "受診者名。氏名聴取サブフローで聴取"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "ID番号/登録番号。診察券番号聴取サブフローで聴取。「分からない」の場合は空"

  - context_name: "patientDateOfBirth"
