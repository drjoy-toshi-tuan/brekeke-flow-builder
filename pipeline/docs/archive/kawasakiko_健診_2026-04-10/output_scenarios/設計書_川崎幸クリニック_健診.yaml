    condition: "classification=キャンセル（電話種別不問）"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。必要がある場合のみ、担当者よりご連絡させていただきます。お電話ありがとうございました。それでは失礼いたします。"
