# --- セクション6: 聴取項目一覧 ---
# サブフロー内の聴取項目（氏名・生年月日・電話番号・診察券番号）は静的JSONコピーのため省略。
# 以下はメインフロー内の聴取項目のみ。
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "問い合わせ"
    notes: "DTMF 1=予約, 2=変更, 3=キャンセル, 4=問い合わせ。分類不可時はNO_RESULT。リトライ超過→END_聴取失敗"

  - order: 2
    name: "予約_健診種類"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "menu"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "川崎市"
      - "健保組合"
      - "その他"
    notes: "DTMF 1=川崎市, 2=健保組合, 3=その他。予約ルートのみ。リトライ超過→その他にフォールバック"

