# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
  patterns:
    - condition: "再診予約の変更"
      sms_flag: "1"
      notes: "変更完了SMS（キャンセル→変更合流もこちら）"
    - condition: "予約の取り直し"
      sms_flag: "4"
      notes: "取り直し完了SMS"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"
  inquiry_insertion_point: ""
  pre_termination: true
  notes: |
    パターン2: 全正常終話前に「そのほかお問い合わせはございますか？」RAGサブフローを配置。
    配置箇所:
    - 予約日の確認ルート: 確認事項の後、END_予約日の確認の前
    - 予約のキャンセルルート（完全キャンセル）: キャンセル時案内の後、END_予約のキャンセルの前
    - 共有チェーン（変更/取り直し）: その他共有事項の後、smsFlag分岐の前
    RAGサブフロー初回発話: 「そのほかお問い合わせはございますか。ない場合は、「特にない」とお話しください。」
    ループ時発話: 「その他に何かご質問はございますか。ない場合は「ありません」のようにお話しください。」

