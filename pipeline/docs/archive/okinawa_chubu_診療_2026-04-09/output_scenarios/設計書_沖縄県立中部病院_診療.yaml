# --- セクション3: フローの目的 ---
purpose: >
  通院中の患者からの再診予約に関する電話を受け、通院確認後に個人情報（本人確認・診察券番号・氏名・生年月日・連絡先電話番号・診療科）を聴取し、
  用件（再診予約の変更・予約日の確認・予約のキャンセル・予約の取り直し）を確認した上で、
  用件固有の情報を聴取して折り返し受付を自動化する。
  非通院中・非通知・取り直し受付不可の場合は代表電話番号を案内して切断する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "沖縄県立中部病院$診療_20260409"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=8) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → 通院確認(TTS) → 入力_通院確認(STT) → OpenAI_通院確認
                                          ├─ 通院中 → 本人確認へ
                                          ├─ 通院中ではない → 通院中以外受付不可_アナウンス(TTS) → 完了フラグ_通院中以外(status=9) → 切断
                                          └─ NO_RESULT → リトライ_通院確認
                                                           ├─ Retry → 通院確認(TTS)
                                                           └─ No more → END_聴取失敗 → 切断

      ─── 本人確認 ───
      本人確認(TTS) → 入力_本人確認(STT) → OpenAI_本人確認 → saveContext_本人確認
        └─ NO_RESULT → リトライ_本人確認
                         ├─ Retry → 本人確認(TTS)
                         └─ No more → END_聴取失敗 → 切断

      ─── サブフロー遷移（個人情報聴取）───
      → Custom Jump to Flow: 診察券番号聴取
      → Custom Jump to Flow: 氏名聴取
      → Custom Jump to Flow: 生年月日聴取（復唱あり）
      → Custom Jump to Flow: 電話番号聴取（復唱あり）

      ─── 診療科 ───
      診療科(TTS) → 入力_診療科(STT) → OpenAI_診療科 → saveContext_診療科
        └─ NO_RESULT → リトライ_診療科
                         ├─ Retry → 診療科(TTS)
                         └─ No more → END_聴取失敗 → 切断

      ─── 用件確認 ───
      用件確認(TTS) → 入力_用件確認(DTMF AmiVoice STT, max_dtmf_length=1) → OpenAI_用件確認 → saveContext_用件確認
        ├─ 再診予約の変更 → 現在の予約日_変更ルートへ
        ├─ 予約日の確認 → 確認事項ルートへ
        ├─ 予約のキャンセル → 理由_キャンセルルートへ
        ├─ 予約の取り直し → 前回の予約日ルートへ
        └─ NO_RESULT → リトライ_用件確認
                         ├─ Retry → 用件確認(TTS)
                         └─ No more → END_聴取失敗 → 切断

      ─── 再診予約の変更ルート ───
      現在の予約日_変更(TTS) → 入力_現在の予約日_変更(STT) → OpenAI_現在の予約日_変更 → saveContext_予約日
        └─ NO_RESULT → リトライ_現在の予約日_変更 → No more → END_聴取失敗
      → 理由_変更(TTS) → 入力_理由_変更(STT) → OpenAI_理由_変更 → saveContext_理由
        └─ NO_RESULT → リトライ_理由_変更 → No more → END_聴取失敗
      → [共有合流点: 予約希望日チェーン]

      ─── 予約日の確認ルート ───
      確認事項(TTS) → 入力_確認事項(STT) → OpenAI_確認事項 → saveContext_確認事項
        └─ NO_RESULT → リトライ_確認事項 → No more → END_聴取失敗
      → [Jump to RAG検索] → END_予約日の確認(status=1, smsFlag=2)

      ─── 予約のキャンセルルート ───
      理由_キャンセル(TTS) → 入力_理由_キャンセル(STT) → OpenAI_理由_キャンセル → saveContext_理由
        └─ NO_RESULT → リトライ_理由_キャンセル → No more → END_聴取失敗
      → 現在の予約日_キャンセル(TTS) → 入力_現在の予約日_キャンセル(STT) → OpenAI_現在の予約日_キャンセル → saveContext_予約日
        └─ NO_RESULT → リトライ_現在の予約日_キャンセル → No more → END_聴取失敗
      → キャンセル時案内(TTS) → 入力_キャンセル時案内(DTMF AmiVoice STT, max_dtmf_length=1) → OpenAI_キャンセル時案内
        ├─ 次回予約希望なし → [Jump to RAG検索] → END_予約のキャンセル(status=1, smsFlag=3)
        ├─ 次回予約希望あり → saveContext_classification更新(「再診予約の変更」に更新) → [共有合流点: 予約希望日チェーン]
        └─ NO_RESULT → リトライ_キャンセル時案内
                         ├─ Retry → キャンセル時案内(TTS)
                         └─ No more → END_聴取失敗 → 切断

      ─── 予約の取り直しルート ───
      前回の予約日(TTS) → 入力_前回の予約日(STT) → OpenAI_前回の予約日 → saveContext_前回の予約日
        ├─ 3か月以上前 → END_取り直し受付不可(status=7, smsFlag=-1) → 切断
        ├─ 3か月以内 → [共有合流点: 予約希望日チェーン]
        └─ NO_RESULT → リトライ_前回の予約日
                         ├─ Retry → 前回の予約日(TTS)
                         └─ No more → END_聴取失敗 → 切断

      ─── 共有合流点: 予約希望日チェーン ───
      （変更ルート / キャンセル→変更合流 / 取り直し→受付可能 の3ルートが合流）
      予約希望日(TTS) → 入力_予約希望日(STT) → OpenAI_予約希望日 → saveContext_予約希望日
        └─ NO_RESULT → リトライ_予約希望日 → No more → END_聴取失敗
      → 都合悪い日(TTS) → 入力_都合悪い日(STT) → OpenAI_都合悪い日 → saveContext_都合悪い日
        └─ NO_RESULT → リトライ_都合悪い日 → No more → END_聴取失敗
      → その他共有事項(TTS) → 入力_その他共有事項(STT) → OpenAI_その他共有事項 → saveContext_その他共有事項
        └─ NO_RESULT → リトライ_その他共有事項 → No more → END_聴取失敗
      → [Jump to RAG検索]
      → smsFlag分岐(ContextMatchRouter on classification)
        ├─ 再診予約の変更 → END_再診予約の変更(status=1, smsFlag=1)
        └─ 予約の取り直し → END_予約の取り直し(status=1, smsFlag=4)

      ─── メインフロー内終話パターン ───
      END_非通知 → 切断
      END_時間外 → 切断
      END_聴取失敗 → 切断
      END_通院中以外受付不可 → 切断
      END_取り直し受付不可 → 切断
      END_再診予約の変更 → 切断
      END_予約日の確認 → 切断
      END_予約のキャンセル → 切断
      END_予約の取り直し → 切断
    notes: |
      - 聴取順序が特殊: 個人情報聴取→用件確認（Gen2設計を維持）
      - 通院確認は冒頭アナウンス直後に配置（通院中以外は即切断）
      - 予約希望日〜その他共有事項は3ルート（変更/キャンセル→変更合流/取り直し→受付可能）で共有
      - 共有チェーン末尾のContextMatchRouterでclassificationに基づきsmsFlag分岐
      - acceptance_timesを使用（営業時間チェック）

  - flow_name: "沖縄県立中部病院$診察券番号聴取_20260409"
