# --- セクション11: 特記事項・制約 ---
special_notes:
  - "聴取順序が一般的なフローと異なる: 個人情報聴取（本人確認→診察券番号→氏名→生年月日→電話番号→診療科）が用件確認より前に配置される。これはGen2の設計意図を維持"
  - "通院確認ステップ: 冒頭アナウンス直後に通院中かどうかを確認し、通院中でない場合は即座に受付不可案内で切断（status=9）"
  - "キャンセル→変更合流: キャンセルルートで「次回予約希望あり」を選択した場合、saveContext2DBでclassificationを「再診予約の変更」に更新し、共有チェーン（予約希望日→都合悪い日→その他共有事項）に合流。smsFlag分岐時にclassification=再診予約の変更→smsFlag=1で終話"
  - "予約の取り直し可否判定: 前回の予約日が本日から3か月以内かどうかを患者に確認（はい/いいえ形式）。3か月以上前→取り直し受付不可（status=7）で切断"
