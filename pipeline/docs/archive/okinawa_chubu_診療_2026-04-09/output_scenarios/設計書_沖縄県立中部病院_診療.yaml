# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "通院確認"
    tts_announcement: "現在、当病院に通院中ですか。「はい、通院中です」、「いいえ、通院中ではありません」のようにお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "通院中"
        - "通院中ではない"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「通院中」「通っている」等の肯定的表現"
          output: "通院中"
        - input: "「いいえ」「通院中ではない」「通っていない」「初めて」等の否定的表現"
          output: "通院中ではない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "肯定・否定が判別できない"
    save_to: null
    next_step: "通院中→本人確認 / 通院中ではない→END_通院中以外受付不可"
    retry_failure: "end_failure"

  - step_name: "本人確認"
