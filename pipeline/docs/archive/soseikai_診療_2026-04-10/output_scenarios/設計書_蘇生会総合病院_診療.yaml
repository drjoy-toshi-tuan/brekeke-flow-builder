# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管。移管元: docs/migration/gen2_蘇生会総合病院_診療.md（2026/1/19修正版）"
  - "Gen2の聴取順序（患者名→旧姓→診察券→生年月日→電話番号→診療科→用件）を維持"
  - "旧姓確認はGen2固有のステップ。メインフロー内に配置（サブフロー対象外）"
  - "診療科は28科+センター+専門外来。うち9科+センターは予約不可→代表電話案内（075-621-3101）"
  - "健康増進センターは別電話番号案内（050-1724-0765）"
  - "歯科口腔外科の変更ルートでは残薬確認をスキップ（ContextMatchRouterで分岐）"
  - "Gen2 checkpoint/endpoint/smsFlag/checkout は saveContextModel2DB に含めない"
  - "Gen2 symptoms/details/institution は未使用フィールドのため除外"
  - "Gen2の用件は4択だが、Gen3ではRAGパターン3に伴い問い合わせを5番目に追加"
  - "Gen2は復唱禁止（生年月日）だがDOB Re-confirmationの元号確認は必要→生年月日聴取_復唱ありを使用"
  - "acceptance_timesを使用。営業時間の詳細スケジュールはDr.JOY側で設定"
