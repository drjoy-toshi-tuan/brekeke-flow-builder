# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # --- メインフロー内の聴取項目 ---
  - order: 1
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー（氏名聴取）。profile_words: 氏名辞書"

  - order: 2
    name: "旧姓確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "former"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "メインフロー内。旧姓またはなし。profile_words: 氏名辞書"

  - order: 3
    name: "診察券番号"
