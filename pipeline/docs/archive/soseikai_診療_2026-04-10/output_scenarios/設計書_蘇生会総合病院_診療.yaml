        - "NO_RESULT"
      mapping:
        - input: "症状に関する発話"
          output: "{症状テキスト}（フリーテキスト要約）"
        - input: "音声認識結果が空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "disease"
    next_step: "医師指定"
    retry_failure: "end_failure"

  - step_name: "医師指定"
    tts_announcement: "医師の指定がある場合は医師名をお話ください。ない場合は、無いとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{医師名テキスト}"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "医師名を発話"
          output: "{医師名テキスト}"
        - input: "ない、なし等"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "doctorName"
    next_step: "RAGサブフロー（最後の問い合わせ）"
    retry_failure: "end_failure"

  - step_name: "症状2"
    tts_announcement: "前回と同じ症状でご受診ですか？はい、または、いいえ、でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "はい、同じ等の肯定"
          output: "はい"
        - input: "いいえ、違う等の否定"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "disease"
    next_step: "RAGサブフロー（最後の問い合わせ）"
    retry_failure: "end_failure"

  # === 変更ルート ===
  - step_name: "変更_予約日"
    tts_announcement: "現在の予約日を4月1日のように、日付でお話ください。わからない場合は、わからないのようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{日付テキスト}"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "日付の発話"
          output: "{YYYY-MM-DD 00:00:00形式}"
        - input: "わからない"
          output: "わからない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "reservationDate"
    next_step: "変更_希望時期"
    retry_failure: "end_failure"

  - step_name: "変更_希望時期"
    tts_announcement: "予約希望時期を、来週や、今月下旬、のようにおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{希望時期テキスト}"
        - "NO_RESULT"
      mapping:
        - input: "希望時期の発話"
          output: "{希望時期テキスト}（フリーテキスト）"
        - input: "音声認識結果が空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "DesiredreservationDate"
    next_step: "歯科判定(ContextMatchRouter)"
    retry_failure: "end_failure"

  - step_name: "残薬確認"
    tts_announcement: "前回処方されたお薬は、次回の予約まで十分にありますか？はい、あります、いいえ、ありませんのようにお話ください。処方されていない場合は、ないとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "はい、あります等の肯定"
          output: "はい"
        - input: "いいえ、ありません等の否定"
          output: "いいえ"
        - input: "ない、処方されていない"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "medicine"
    next_step: "RAGサブフロー（最後の問い合わせ）"
    retry_failure: "end_failure"

  # === キャンセルルート ===
  - step_name: "キャンセル_予約日"
    tts_announcement: "現在の予約日を4月1日のように、日付でお話ください。わからない場合は、わからないのようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{日付テキスト}"
        - "わからない"
        - "NO_RESULT"
