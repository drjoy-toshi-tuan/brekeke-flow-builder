# --- セクション7: ステップ詳細 ---
step_details:
  # === メインフロー内ステップ ===
  - step_name: "旧姓確認"
    tts_announcement: "旧姓での登録の可能性がある方は、旧姓をおっしゃってください。ない場合はない、とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{旧姓テキスト}"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "旧姓を名乗った場合"
          output: "{旧姓テキスト}（フリーテキスト）"
        - input: "ない、なし等の否定表現"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "former"
    next_step: "サブフロー遷移_診察券番号聴取"
    retry_failure: "end_failure"

  - step_name: "診療科"
    tts_announcement: "受診を希望される診療科をお話ください。分からない場合は分からないとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{診療科名}"
        - "予約不可"
        - "健康増進センター"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "診療科リストに一致する発話"
          output: "{正規化された診療科名}"
        - input: "救急科/麻酔科/三叉神経痛片側顔面けいれん専門外来/ロービジョン外来/手術センター/血液浄化センター/脳血管内治療センター/内視鏡センター/放射線科"
          output: "予約不可"
        - input: "健康増進センター/けんしん/にんげんどっく等"
          output: "健康増進センター"
        - input: "分からない/わからない"
          output: "わからない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "clinicalDepartment"
    next_step: "用件_聴取（受付可能時）/ END_代表電話案内（予約不可時）/ END_健康増進センター案内"
    retry_failure: "end_failure"

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の5つのうちの、いずれかでお話ください。予約を取る、変更する、キャンセルする、確認する、問い合わせ。それではお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「予約したい」「予約を取る」「薬」「お薬」「緊急薬」「印刷」「定期」「新薬」「再診」「最新」「禁忌」"
          output: "予約"
        - input: "DTMF 2 または「変更」「変更したい」「変更する」「予約変更」"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「取り消し」「キャンセルする」"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」「確認する」「予約確認」"
          output: "確認"
        - input: "DTMF 5 または「問い合わせ」「質問」「聞きたい」"
          output: "問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "用件別に分岐"
    retry_failure: "end_failure"

  # === 予約ルート ===
  - step_name: "受診歴確認"
    tts_announcement: "当院でのご受診は初めてですか？はい、または、いいえ、でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "新規"
        - "再診"
        - "NO_RESULT"
      mapping:
        - input: "はい、初めて等の肯定"
          output: "新規"
        - input: "いいえ、通っている等の否定"
          output: "再診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "history"
    next_step: "新規→紹介状確認 / 再診→症状2"
    retry_failure: "end_failure"

  - step_name: "紹介状確認"
    tts_announcement: "紹介状はお持ちでしょうか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "はい、持っています等の肯定"
          output: "あり"
        - input: "いいえ、ありません等の否定"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
