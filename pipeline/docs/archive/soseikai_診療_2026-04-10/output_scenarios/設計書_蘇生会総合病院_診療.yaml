# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # === 標準フィールド（itemDefault: true）===
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "新規"
      - order: "2"
        value: "再診"
      - order: "3"
        value: "変更"
      - order: "4"
        value: "キャンセル"
      - order: "5"
        value: "確認"
      - order: "6"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "Gen2 enum: 新規/再診/変更/キャンセル/確認/問い合わせ。予約→受診歴で新規/再診に分化"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフロー（氏名聴取）で聴取"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフロー（診察券番号聴取）で聴取。8桁。わからない分岐あり"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフロー（生年月日聴取_復唱あり）で聴取"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフロー（電話番号聴取_復唱あり）で聴取"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - order: "1"
        value: "未処理"
      - order: "2"
        value: "代表案内"
      - order: "3"
        value: "聴取失敗"
      - order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理(通話完了) 2=代表案内(診療科対象外/健康増進/非通知) 3=聴取失敗 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

  # === 施設固有フィールド（itemDefault: false）===
  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "メインフロー内で聴取。OpenAIで正規化"

