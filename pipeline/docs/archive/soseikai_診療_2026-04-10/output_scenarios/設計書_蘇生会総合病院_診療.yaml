version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "蘇生会総合病院"
  group_name: "蘇生会総合病院"
  flow_name: "蘇生会総合病院$診療_20260410"
  target_facility: "蘇生会総合病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "075-621-3101（代表）"
  business_hours: "祝日除く月〜土 9:00〜16:00（Gen2エラーメッセージから推定）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "蘇生会総合病院$診療_20260410"
      role: "main"
      description: "冒頭チェーン → 氏名→旧姓→診察券→生年月日→電話番号(サブフロー) → 診療科(メイン内) → 用件分岐(5択) → 用件別追加聴取 → RAG(最後の問い合わせ) → 終話"
  subflows:
    - name: "蘇生会総合病院$氏名聴取_20260410"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9準拠。静的JSONコピー"

    - name: "蘇生会総合病院$診察券番号聴取_20260410"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9準拠。静的JSONコピー。Gen2では復唱(digits)あり→サブフロー内で対応済み"

    - name: "蘇生会総合病院$生年月日聴取_20260410"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9準拠。Gen2は復唱禁止だが2桁年元号確認が必要→DOB Re-confirmation使用のため復唱あり"

    - name: "蘇生会総合病院$電話番号聴取_20260410"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10準拠。incoming-classifier→携帯/固定分岐→復唱確認"

    - name: "蘇生会総合病院$RAG検索_20260410"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 16準拠。RAGパターン3用。静的JSONコピー"

# --- セクション3: フローの目的 ---
purpose: >
  患者からの診察予約に関する電話を受け、患者情報（氏名・旧姓・診察券番号・生年月日・連絡先電話番号）と
  診療科・用件（予約・変更・キャンセル・確認・問い合わせ）を聴取し、折り返し受付を自動化する。
  予約不可診療科（救急科等9科）は代表電話案内、健康増進センターは専用電話案内に誘導する。
  Gen2（2026/1/19修正版）からの第3世代移管。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "蘇生会総合病院$診療_20260410"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(status=2,smsFlag=-1) → 非通知_アナウンス(TTS) → 切断
            └─ 通常(携帯/固定/海外/その他) → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR(false) → 完了フラグ_時間外(status=6,smsFlag=-1) → 時間外_アナウンス(TTS) → 切断
                        └─ 受付可(true) → 冒頭_アナウンス(TTS)

      ─── 個人情報聴取ステップ（サブフロー遷移） ───
      冒頭_アナウンス → サブフロー遷移_氏名聴取(Custom Jump to Flow)
        → 旧姓_聴取(TTS) → 入力_旧姓(AmiVoice STT) → OpenAI_旧姓(normalize) → リトライ_旧姓
        → サブフロー遷移_診察券番号聴取(Custom Jump to Flow)
        → サブフロー遷移_生年月日聴取(Custom Jump to Flow)
        → サブフロー遷移_電話番号聴取(Custom Jump to Flow)

      ─── 診療科聴取（メインフロー内） ───
      → 診療科_聴取(TTS) → 入力_診療科(AmiVoice STT) → OpenAI_診療科(classify)
          ├─ 予約不可 → 完了フラグ_代表案内_診療科(status=2,smsFlag=-1) → END_代表電話案内_診療科対象外(TTS) → 切断
          ├─ 健康増進センター → 完了フラグ_健康増進(status=2,smsFlag=-1) → END_健康増進センター案内(TTS) → 切断
          ├─ NO_RESULT → リトライ_診療科
          │               ├─ Retry → 診療科_聴取(TTS)
          │               └─ No more → 完了フラグ_聴取失敗(status=3,smsFlag=-1) → END_聴取失敗(TTS) → 切断
          └─ {受付可能な診療科/わからない} → 用件_聴取

      ─── 用件聴取（DTMF 5択） ───
      用件_聴取(TTS) → 入力_用件(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_用件(classify)
            ├─ 予約 → saveContext_分類_予約(classification=予約) → 予約_受診歴確認
            ├─ 変更 → saveContext_分類_変更(classification=変更) → 変更_予約日
            ├─ キャンセル → saveContext_分類_キャンセル(classification=キャンセル) → キャンセル_予約日
            ├─ 確認 → saveContext_分類_確認(classification=確認) → 確認_内容
            ├─ 問い合わせ → saveContext_分類_問合(classification=問い合わせ) → サブフロー遷移_RAG検索_問合
            ├─ NO_RESULT → リトライ_用件
            │               ├─ Retry → 用件_聴取(TTS)
            │               └─ No more → 完了フラグ_聴取失敗(status=3,smsFlag=-1) → END_聴取失敗(TTS) → 切断
            └─ TIMEOUT/ERROR → リトライ_用件

      ─── 予約ルート ───
      予約_受診歴確認(TTS) → 入力_受診歴(AmiVoice STT) → OpenAI_受診歴(classify)
          ├─ 新規 → saveContext_分類_新規(classification=新規)
          │   → 予約_紹介状確認(TTS) → 入力_紹介状(AmiVoice STT) → OpenAI_紹介状(normalize)
          │   → 予約_症状1(TTS) → 入力_症状1(AmiVoice STT) → OpenAI_症状1(summarize)
          │   → 予約_医師指定(TTS) → 入力_医師指定(AmiVoice STT) → OpenAI_医師指定(normalize)
          │   → [合流: RAGサブフロー → 終話_汎用受付]
          ├─ 再診 → saveContext_分類_再診(classification=再診)
          │   → 予約_症状2(TTS) → 入力_症状2(AmiVoice STT) → OpenAI_症状2(summarize)
          │   → [合流: RAGサブフロー → 終話_汎用受付]
          └─ NO_RESULT → リトライ_受診歴 → No more → 完了フラグ_聴取失敗 → END_聴取失敗 → 切断

      ─── 変更ルート ───
      変更_予約日(TTS) → 入力_変更_予約日(AmiVoice STT) → OpenAI_変更_予約日(convert)
        → 変更_希望時期(TTS) → 入力_変更_希望時期(AmiVoice STT) → OpenAI_変更_希望時期(normalize)
        → 変更_歯科判定(ContextMatchRouter: OpenAI_診療科の出力値)
            ├─ 歯科口腔外科 → [合流: RAGサブフロー → 終話_汎用受付]
            └─ その他 → 変更_残薬確認(TTS) → 入力_残薬(AmiVoice STT) → OpenAI_残薬(classify)
                         → [合流: RAGサブフロー → 終話_汎用受付]

      ─── キャンセルルート ───
      キャンセル_予約日(TTS) → 入力_キャンセル_予約日(AmiVoice STT) → OpenAI_キャンセル_予約日(convert)
        → キャンセル_理由(TTS) → 入力_キャンセル理由(AmiVoice STT) → OpenAI_キャンセル理由(summarize)
        → [合流: RAGサブフロー → 終話_キャンセル]

      ─── 確認ルート ───
      確認_内容(TTS) → 入力_確認内容(AmiVoice STT) → OpenAI_確認内容(summarize)
        → [合流: RAGサブフロー → 終話_汎用受付]

      ─── 問い合わせルート（Gen3追加 / RAGパターン1） ───
      サブフロー遷移_RAG検索_問合(Custom Jump to Flow → RAG検索サブフロー)
        → 完了フラグ_問い合わせ完了(status=1,smsFlag=-1) → END_問い合わせ完了(TTS) → 切断

      ─── RAGサブフロー合流点（パターン2: 全終話前） ───
      [合流: RAGサブフロー] = サブフロー遷移_RAG検索_最終(Custom Jump to Flow → RAG検索サブフロー)

      ─── RAGサブフロー後の終話分岐 ───
      RAGサブフロー戻り → 終話分岐(ContextMatchRouter: OpenAI_用件の出力値)
          ├─ キャンセル → 完了フラグ_キャンセル完了(status=1,smsFlag=1) → END_キャンセル完了(TTS) → 切断
          └─ その他(予約/変更/確認) → 完了フラグ_汎用受付完了(status=1,smsFlag=1) → END_汎用受付完了(TTS) → 切断

      ─── メインフロー内終話パターン ───
      END_非通知(TTS) → 切断
      END_時間外(TTS) → 切断
      END_聴取失敗(TTS) → 切断
      END_代表電話案内_診療科対象外(TTS) → 切断
      END_健康増進センター案内(TTS) → 切断
      END_キャンセル完了(TTS) → 切断
      END_汎用受付完了(TTS) → 切断
      END_問い合わせ完了(TTS) → 切断
    notes: |
      - incoming-classifier → acceptance_times → 冒頭アナウンスの標準冒頭チェーン
      - Gen2の聴取順序を維持: 患者名→旧姓→診察券番号→生年月日→電話番号→診療科→用件→用件別追加
      - 旧姓聴取はGen2固有ステップのためメインフロー内に配置
      - 歯科口腔外科の変更ルートでは残薬確認をスキップ（ContextMatchRouterで分岐）
      - RAGパターン3: 問い合わせルート(パターン1) + 全終話前(パターン2)

  - flow_name: "蘇生会総合病院$氏名聴取_20260410"
