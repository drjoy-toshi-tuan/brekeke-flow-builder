    save_to: "free"
    next_step: "RAGサブフロー（最後の問い合わせ）"
    retry_failure: "end_failure"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須） ---
  - name: "END_非通知"
    condition: "incoming-classifierで非通知と判定"
    tts_announcement: "お電話ありがとうございます。蘇生会総合病院、診察予約専用、AI電話です。申し訳ございません。電話番号が非通知設定の場合、AI電話では受付できません。通知設定をしていただくか、先頭に数字の186を付けておかけなおしください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_timesで時間外と判定"
    tts_announcement: "お電話ありがとうございます。蘇生会総合病院です。ただいまの時間は受付時間外です。恐れ入りますが、祝日を除く、月曜から土曜の、9時00分から16時00分に、おかけなおしください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、祝日を除く、月曜から土曜の、9時00分から16時00分に、代表電話へおかけなおしください。電話番号が分かる場合は、そのままお電話をお切りください。分からない場合はご案内いたしますので、メモをご準備ください。電話番号は、075-621-3101です。繰り返します。電話番号は、075-621-3101です。繰り返します。電話番号は、075-621-3101です。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 診療科系（代表案内） ---
