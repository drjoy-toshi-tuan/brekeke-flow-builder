# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【復唱原則禁止】聴取内容の復唱は生年月日のみ「○○ですね」1回だけ許可。氏名・電話番号・コース・予約日・変更内容・受診希望コース・追加オプションの復唱は全て禁止。聞き取れなくても再質問せずそのまま次へ進む（Customer Doc 1, 2）"
  - "【再質問は無回答時のみ】内容不明瞭での再質問は不可。質問に全く返答がない場合のみ最大2回まで再促しOK（発話: 「申し訳ございません、ご回答が確認できませんでした。今一度おっしゃっていただけますでしょうか？」）。3回目で END_聴取失敗 に遷移"
  - "【胃カメラ分岐の質問順序厳守】胃カメラ有ルート（胃カメラ方法→予約希望日→コース→会社名）と無ルート（コース→予約希望日→会社名）で順序が異なる。Customer Doc 明記「絶対に指定順どおり」「途中で別の項目に飛んではいけない」"
  - "【連絡先電話番号は聴取しない】Customer Doc 1-4-2 で明記。incoming_phone_number（着信番号）のみで携帯/固定判定（Script モジュール phone_type）。additionalPhoneNumber フィールドは function スキーマ互換のため context 定義に残すが実運用では値は入らない"
  - "【非通知即時終話】非通知着信（incoming_phone_number が anonymous/空/0桁）は冒頭アナウンスを流さず即 END_非通知。Customer Doc 1-4-1 の専用文言「電話番号の前に\"186\"を追加...」を使用。status=2"
  - "【数字認識キーワード】OpenAI プロンプトに以下の置換を含める: 「よん」「しー」「し」「よー」「C」「Sea」→4、「ご」「いつ」「Go」→5、「きゅう」「Q」「きゅー」→9 等（Customer Doc 1-7, 1-9）"
  - "【誤認識救済語彙】OpenAI プロンプトに以下の置換を含める: 「検針」「返信」「天候診断」「返金控寸断」→「健診」、「人間ロック」「ドック」「ロック」「人間独」→「人間ドック」、「薬」「お薬」→「予約」、「取り直したい」「取り直す」「別の」「変えたい」「変える」「変えて」→「変更」、「やめる」「取り消し」「取り消す」「取消」「やめたい」→「キャンセル」（Customer Doc 5）"
  - "【検診の例外】「検診」は原則「健診」扱いだが、「乳がん検診」「子宮がん検診」「子宮頸がん検診」など特定の検診名は除外して「検診」のまま扱う（Customer Doc 5）"
  - "【日付補正】月日のみ発話→当年度を補完。10月以降の入電で1〜9月の日付発話→翌年扱い（Customer Doc 1-5）。「今日」「明日」「明後日」は着信日時から自動換算（Customer Doc 1-4）"
  - "【過去日付の扱い】Customer Doc 1-4 に「未来の日付のみ受け付ける」記載あるが、復唱・再質問禁止ルールと衝突するため、発話原文をそのまま記録して Dr.JOY 側でスタッフが確認する運用とする（NON-BLOCKER N-6）"
  - "【複数人氏名】2人目以降の氏名（カタカナ）・生年月日（yyyy-MM-dd）は reason に改行区切りで格納。1人目は patientName/patientDateOfBirth に格納（Customer Doc 3）"
  - "【受診希望コース特定ルール】Customer Doc 1-3: リストに一致すれば正式名称、不一致なら発話原文をそのまま course に格納。「わからない」「不明」「覚えていない」は空欄。候補提示・再質問・繰り返し確認は禁止"
  - "【コースリスト・オプションリスト未提供】Customer Doc セクション3・4が空欄（明示的に未提供）。顧客からリスト提供後に profile_words と OpenAI プロンプトに追加する作業が別途必要（NON-BLOCKER N-5）。現状は発話原文格納ルールのみで動作"
  - "【FAQ対応なし】Customer Doc 1-2: RAG未使用。プロンプト外の質問は1回目「うまく聞き取りができませんでした。再度ご用件をお話しください」で再質問、2回目以降「代表電話の『03-6426-5933』におかけ直しください。お電話ありがとうございました。それでは失礼いたします。」で終話（status=2）"
  - "【endpoint/smsFlag の格納先】Gen2 function に存在するが Gen3 では saveContextModel2DB に含めず、各 saveCompletionFlag2db のパラメータとして設定（CLAUDE.md 規則）"
  - "【下の名前分岐を省略】Gen2 YAML では「苗字のみ発話時に『下のお名前もお伺いしてもよろしいですか？』」の分岐があったが、Gen3 では氏名聴取サブフローの標準リトライでカバーする方針。下の名前追加聴取は配置しない（NON-BLOCKER N-8）"
  - "【携帯判定の差異】Customer Doc 1-6（終話文言判定）は 090/080/070 の11桁のみ携帯扱い、function.smsFlag 記述は 090/080/070/060。本フローでは 1-6 に従い 090/080/070 のみ携帯として終話分岐を行う（060 は現行日本国内で使われていないため実用上問題なし）"

