# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 — 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信（incoming_phone_number が anonymous/空/0桁）"
    tts_announcement: "お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に\"186\"を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（無回答3回目）"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、再度おかけなおしください。お電話ありがとうございました。それでは失礼いたします。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_申込_携帯"
    condition: "classification=申し込み かつ 着信番号が携帯（090/080/070で始まる11桁）"
    tts_announcement: "電話終了後に送信されるSMSより必要項目の入力を完了してください。〇日以内にスタッフより折り返しご連絡をいたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_申込_携帯"

  - name: "END_申込_固定"
    condition: "classification=申し込み かつ 着信番号が固定（10桁 or 050で始まる11桁）"
    tts_announcement: "内容確認後、〇日以内にスタッフより折り返しご連絡をいたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_申込_固定"

  - name: "END_その他全般"
    condition: "classification=変更/キャンセル/その他（電話種別を問わず）"
    tts_announcement: "内容確認後、〇日以内にスタッフより折り返しご連絡をいたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_その他全般"

# smsFlag分岐設計
# Customer Doc function.smsFlag の記述:
#   申し込み × 携帯(090/080/070/060)      → smsFlag=1
#   変更  × patientName/DOB not empty    → smsFlag=2
#   キャンセル × patientName/DOB not empty → smsFlag=2
#   それ以外                            → smsFlag=0
# Gen3 では saveCompletionFlag2db の sms_flag パラメータで終話ごとに固定値を埋める方針。
# 変更/キャンセル/その他は END_その他全般 に集約するため、Gen2 の smsFlag=2 は本フローでは実装しない
# （Dr.JOY側で status=1 の受付記録があれば人間オペレーターが対応）。
# BREKEKE で SMS を送らない場合は sms_flag=-1 を使用（Gen3 標準）。
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "telephoneNumber"
  patterns:
    - condition: "classification=申し込み かつ 携帯（090/080/070 11桁）"
      sms_flag: "1"
      notes: "END_申込_携帯"
    - condition: "classification=申し込み かつ 固定（10桁 or 050 11桁）"
      sms_flag: "-1"
      notes: "END_申込_固定（SMS送信なし）"
    - condition: "classification=変更/キャンセル/その他"
      sms_flag: "-1"
      notes: "END_その他全般（Gen3 方針で統一、SMS送信なし）"

