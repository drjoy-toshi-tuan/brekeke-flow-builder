# 設計書 — 大星クリニック 健診
# 生成元: @director エージェント
# 生成日: 2026-04-22
# 確認レポート: docs/designs/確認レポート_大星クリニック_健診_20260420.md
# 作業種別: Gen2→Gen3移管
# 元資料: docs/reference/customer_docs/【健診1】：大星クリニック.md
# 移管ノート: docs/migration/gen2_大星クリニック_健診.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "大星クリニック健診センター"
  group_name: "大星クリニック健診センター"
  flow_name: "大星クリニック健診センター$健診"
  target_facility: "大星クリニック（健診・人間ドック専用窓口）"
  office_id: "TODO_要確認"              # NON-BLOCKER N-1: Dr.JOY管理画面で確認
  phone_number: "TODO_要確認"           # NON-BLOCKER N-2: IVR着信番号（Brekeke設定時）
  business_hours: "祝日除く月〜金 9:00〜17:00"  # NON-BLOCKER N-3: Dr.JOY側スケジュールで最終設定
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"                   # 移管ノート記載値

# --- セクション2: フロー構成 ---
# Customer Doc 1-4-2 により 連絡先電話番号の聴取は禁止。
#   → 電話番号聴取サブフローは配置しない。着信番号（telephoneNumber）のみで携帯/固定判定。
# 生年月日は「○○ですね」1回復唱のみ許可（Customer Doc 2 / 重要ポイント）。
#   → 生年月日聴取サブフローは復唱ありを使用。
# 氏名復唱は禁止（Customer Doc 2）。
#   → 氏名聴取サブフローは復唱なしの標準コピー。
# FAQ対応なし（Customer Doc 1-2）。RAGサブフロー配置しない。
flow_structure:
  type: "subflow"
  flows:
    - name: "大星クリニック健診センター$健診"
      role: "main"
      description: "冒頭チェーン → 氏名聴取サブフロー → 生年月日聴取サブフロー（復唱あり） → 用件聴取(4分類) → 用件別聴取 → 終話分岐(classification × phone_type) → 終話"
    - name: "大星クリニック健診センター$氏名聴取"
      role: "sub"
      description: "氏名聴取 → 結果返却（復唱なし）"
    - name: "大星クリニック健診センター$生年月日聴取"
      role: "sub"
      description: "生年月日聴取 → DOB Re-confirmation（○○ですね）→ 結果返却"
  subflows:
    - name: "大星クリニック健診センター$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "氏名聴取サブフロー。復唱禁止のため復唱なし版を使用。リトライ上限到達時は氏名未取得のまま次へスキップ"
    - name: "大星クリニック健診センター$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "生年月日聴取サブフロー。DOB Re-confirmation（「○○ですね」）を含む復唱ありパターン（Customer Doc 2 準拠）"

# --- セクション3: フローの目的 ---
purpose: |
  大星クリニックの健康診断・人間ドック予約専用AIオペレーター。
  着信者から受診者名・生年月日を聴取した後、用件（申込/変更/キャンセル/その他問い合わせ）を4分類で聴取する。
  申込ルートでは受診歴・胃カメラ有無に応じて質問順を切替えてコース・予約希望日・会社名を聴取、
  変更ルートは既存予約日と変更希望日、キャンセルルートは既存予約日、その他ルートは内容確認を聴取する。
  最後に classification × 着信番号種別（携帯/固定）の組み合わせで終話アナウンスを分岐し、
  申込×携帯の場合のみ SMS 送信（smsFlag=1）、それ以外は折返し案内で終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "大星クリニック健診センター$健診"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知（「186を追加して...」即時終話, status=2）
            └─ 通常 → acceptance_times
                        ├─ 時間外 → END_時間外（status=6）
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → jump_氏名聴取(サブフロー・復唱なし)
                                        → jump_生年月日聴取(サブフロー・復唱あり「○○ですね」)
                                          → 用件聴取(OpenAI enum 4分岐)
      ─── 用件ルート ───
        申し込み ─→ 受診歴_申込 ─→ 胃カメラ_申込(enum 2分岐)
                                    ├─ 有 → 胃カメラ方法_申込 → 予約希望日_申込_有
                                    │       → 受診希望コース_申込_有 → 会社名_申込(合流)
                                    └─ 無 → 受診希望コース_申込_無 → 予約希望日_申込_無
                                            → 会社名_申込(合流)
        変更 ───────→ 予約日_変更 → 変更希望日 ─┐
        キャンセル ──→ 予約日_キャンセル ──────┤
        その他 ─────→ 内容確認_その他 ──────┤
                                                └→ 終話分岐_用件(ContextMatchRouter: classification)
                                                    ├─ 申し込み → 終話分岐_電話種別(Script: phone_type)
                                                    │               ├─ 携帯 → END_申込_携帯(smsFlag=1) → 切断
                                                    │               └─ 固定/その他 → END_申込_固定(smsFlag=-1) → 切断
                                                    └─ 変更/キャンセル/その他 → END_その他全般(smsFlag=-1) → 切断
    notes: |
      - 非通知即時終話: 冒頭アナウンスも流さず即 END_非通知（Customer Doc 1-4-1）
      - 胃カメラ有無で質問順切替は顧客明記「絶対に指定順どおり」
      - 連絡先電話番号は聴取しない（Customer Doc 1-4-2）。携帯/固定判定は telephoneNumber（着信番号）のみ
      - 復唱は生年月日のみ。氏名・コース・予約日・変更内容の復唱禁止（Customer Doc 2）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: jump_氏名聴取

  # --- 氏名聴取サブフロー ---
  - step: jump_氏名聴取
    type: subflow
    flowname: "大星クリニック健診センター$氏名聴取"
    next: jump_生年月日聴取

  # --- 生年月日聴取サブフロー（復唱あり「○○ですね」）---
  - step: jump_生年月日聴取
    type: subflow
    flowname: "大星クリニック健診センター$生年月日聴取"
    next: 用件聴取

  # --- 用件聴取（4分類 Pattern A）---
  - step: 用件聴取
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "申し込み"
        next: 受診歴_申込
      - match: "変更"
        next: 予約日_変更
      - match: "キャンセル"
        next: 予約日_キャンセル
      - match: "その他"
        next: 内容確認_その他

  # --- 申込ルート共通前段 ---
  - step: 受診歴_申込
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "default"
        next: 胃カメラ_申込

  - step: 胃カメラ_申込
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "有"
        next: 胃カメラ方法_申込
      - match: "default"
        next: 受診希望コース_申込_無

  # --- 申込_胃カメラ有ルート ---
  - step: 胃カメラ方法_申込
    type: hearing
    output_format: text
    retry_failure: skip
    next: 予約希望日_申込_有

  - step: 予約希望日_申込_有
    type: hearing
    output_format: text
    retry_failure: skip
    next: 受診希望コース_申込_有

  - step: 受診希望コース_申込_有
    type: hearing
    output_format: text
    retry_failure: skip
    next: 会社名_申込

  # --- 申込_胃カメラ無ルート ---
  - step: 受診希望コース_申込_無
    type: hearing
    output_format: text
    retry_failure: skip
    next: 予約希望日_申込_無

  - step: 予約希望日_申込_無
    type: hearing
    output_format: text
    retry_failure: skip
    next: 会社名_申込

  # --- 申込合流地点 ---
  - step: 会社名_申込
    type: hearing
    output_format: text
    retry_failure: skip
    next: 終話分岐_用件

  # --- 変更ルート ---
  - step: 予約日_変更
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 変更希望日

  - step: 変更希望日
    type: hearing
    output_format: text
    retry_failure: skip
    next: 終話分岐_用件

  # --- キャンセルルート ---
  - step: 予約日_キャンセル
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 終話分岐_用件

  # --- その他ルート ---
  - step: 内容確認_その他
    type: hearing
    output_format: text
    retry_failure: skip
    next: 終話分岐_用件

  # --- 終話分岐1: classification による ContextMatchRouter（Pattern B）---
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "申し込み"
        next: 終話分岐_電話種別
      - match: "default"
        next: END_その他全般

  # --- 終話分岐2: telephoneNumber で携帯/固定判定（Script）---
  - step: 終話分岐_電話種別
    type: script
    script_template: phone_type
    reference_module: "telephoneNumber"
    template_params: {}
    conditions:
      - match: "mobile"
        next: END_申込_携帯
      - match: "default"
        next: END_申込_固定

  # --- 終話ブロック ---
  - step: END_申込_携帯
    type: termination
    termination_ref: "END_申込_携帯"

  - step: END_申込_固定
    type: termination
    termination_ref: "END_申込_固定"

  - step: END_その他全般
    type: termination
    termination_ref: "END_その他全般"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
# Customer Doc function.parameters.properties から転記。
# endpoint / smsFlag は CLAUDE.md 規則により saveContextModel2DB に含めず、
# 各 saveCompletionFlag2db のパラメータとして設定する。
context_fields:
  # --- Dr.JOY 標準フィールド ---
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "申し込み"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "その他"
    item_default: true
    editable: true
    deletable: true
    notes: "用件4分類（Customer Doc function.classification.enum より）"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "受診者名。複数人発話時は最初の1名のみ。2人目以降は reason に改行区切りで格納（Customer Doc 3）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "DTMF聴取（<dtmf digit=\"8\" />）+ ○○ですね 1回復唱。yyyy-MM-dd 形式"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "着信番号自動格納。Customer Doc 1-4-3: 先頭3桁で 090/080/070=携帯、050/その他10桁=固定判定"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "Customer Doc 1-4-2 により聴取しない。function スキーマ互換のため定義のみ残す（実運用で値は入らない）"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: true
    notes: "CLAUDE.md 規則に従い Gen2 の 0/1/2 を 1/2/3/6 にマップ。0 は Gen3 で使用禁止"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "着信日時自動格納。相対日付（今日/明日/明後日）・10月以降の年度補正の基準（Customer Doc 1-4 / 1-5）"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

  # --- 施設固有フィールド（function properties より転記、endpoint/smsFlag は除外）---
  - context_name: "medical_history"
    context_name_jp: "受診歴"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "有 / 無 / 空（function.medical_history.enum）"

  - context_name: "gastroscopy"
    context_name_jp: "胃カメラ確認"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "有 / 無 / 空。質問順切替のキー（function.gastroscopy.enum）"

  - context_name: "method"
    context_name_jp: "胃カメラ方法"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "口 / 鼻（胃カメラ有ルートのみ）"

  - context_name: "course"
    context_name_jp: "受診希望コース"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "リスト一致なら正式名称、不一致なら発話原文（Customer Doc 1-3）。「わからない」は空欄、再質問・候補提示は禁止"

  - context_name: "option"
    context_name_jp: "追加オプション"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Customer Doc セクション4のリストは未提供（NON-BLOCKER N-5）。現フローでは聴取ステップ無し"

  - context_name: "Preferred_date"
    context_name_jp: "予約希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "フリーワード格納。明確な月日発話のみ yyyy-MM-dd に正規化（Customer Doc 1-5）。当年度補完、10月以降の1-9月発話は翌年扱い"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更・キャンセル時の既存予約日。yyyy-MM-dd HH:mm 形式"

  - context_name: "companyName"
    context_name_jp: "会社名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業予約時の会社名。個人の場合は「その他」を格納"

  - context_name: "confirmation"
    context_name_jp: "内容確認"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "その他ルートの問い合わせ内容"

  - context_name: "change_item"
    context_name_jp: "変更項目"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "日時変更/内容変更の区分（Customer Doc 5「日程変更」判定参照）。現フローでは自動格納のみ、別途聴取しない"

  - context_name: "reason"
    context_name_jp: "問い合わせ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Customer Doc 3: 2人目以降の氏名（カタカナ）・生年月日（yyyy-MM-dd）を改行区切りで格納"

# --- セクション6: 聴取項目一覧 ---
# サブフロー内の聴取項目（氏名・生年月日）は設計書に含めない（CLAUDE.md Rule 9 準拠、共通サブフローを参照）。
hearing_items:
  - order: 1
    name: "用件聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "申し込み"
      - "変更"
      - "キャンセル"
      - "その他"
    notes: "DTMF未使用（Customer Doc 共通ヒアリング参照）。誤認識救済語彙（薬/お薬→申し込み、取り直す/変えたい等→変更、やめる/取り消し等→キャンセル）を OpenAI プロンプトで実装"

  - order: 2
    name: "受診歴_申込"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "medical_history"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: "Yes/No判定。「はい、あります」→有 / 「いいえ、ありません」→無。NO_RESULT時はデフォルトで胃カメラ_申込へフォールスルー"

  - order: 3
    name: "胃カメラ_申込"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "gastroscopy"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: "Yes/No判定。「はい希望します」→有 / 「いいえ希望しません」→無。有ルート/無ルートで質問順切替（Customer Doc 明記「絶対に指定順どおり」）"

  - order: 4
    name: "胃カメラ方法_申込"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "method"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "「口」「鼻」を正規化。胃カメラ有ルートの最初の質問"

  - order: 5
    name: "予約希望日_申込_有"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "Preferred_date"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "胃カメラ有ルート2番目。フリーワード保存。明確な日付のみ yyyy-MM-dd 正規化（当年度補完、10月以降の1-9月発話は翌年扱い）"

  - order: 6
    name: "受診希望コース_申込_有"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
