      フロー名プレフィックスのみ「銚子市立病院$」に置換。構造・接続・スクリプトは一切変更不可。
      termination=return: 終話チェーンはメインフロー側で処理。
    notes: "CLAUDE.md Rule 9/10/11 準拠。MOBILEパスの着信番号確認は標準機能として復唱あり版を使用。"

  - flow_name: "銚子市立病院$RAG検索"
