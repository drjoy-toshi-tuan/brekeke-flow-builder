# smsFlag分岐設計
sms_flag_routing:
  enabled: false                     # 単一施設でsmsFlag値は2種類（1 or 2）のみ。各終話パターンに直接設定
  routing_keys: []
  patterns: []

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"                         # Gen2→Gen3デフォルト。NON-BLOCKER N-5参照
  inquiry_insertion_point: "問合せ_内容聴取後"  # パターン3: 問合せルート内にRAGサブフロー
  pre_termination: true                # パターン3: 全終話前に「最後にご質問はありますか？」RAGサブフロー

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # --- メインフロー: 冒頭・異常系 ---
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内"
    announcement: "お電話ありがとうございます。銚子市立病院の健診専用AI電話です。音声ガイダンスに従い、お答えください。"

  - module_name: "非通知_アナウンス"
    purpose: "非通知案内"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  - module_name: "時間外_アナウンス"
    purpose: "時間外案内"
    announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"

  # --- メインフロー: 用件聴取 ---
  - module_name: "用件_選択"
    purpose: "用件選択案内（4択DTMF）"
    announcement: "ご用件を、次の4つからお選びください。予約は1、変更は2、キャンセルは3、その他お問い合わせは4。"

  # --- メインフロー: 予約ルート ---
  - module_name: "予約_種類"
    purpose: "予約種類選択案内（3択DTMF）"
    announcement: "ご予約を希望される種類を次の3つからお選びください。健康診断は1、がん検診は2、予防接種は3。"

  - module_name: "健康診断_種類"
    purpose: "健康診断種類選択案内（3択DTMF）"
    announcement: "健康診断の種類を次の3つからお選びください。人間ドックは1、特定健診は2、その他は3。"

  - module_name: "脳ドック_確認"
    purpose: "脳ドック追加確認"
    announcement: "脳ドックの追加を希望されますか。希望される方は「はい」、希望されない方は「いいえ」とお話しください。"

  - module_name: "国保_社保"
    purpose: "保険種類選択案内（3択DTMF）"
    announcement: "保険の種類を次の3つからお選びください。国民健康保険は1、社会保険は2、わからない場合は3。"

  - module_name: "内容_健康診断"
    purpose: "その他健診内容聴取案内"
    announcement: "その他に希望される健診内容をすべてお話しください。"

  - module_name: "がん_種類"
    purpose: "がん検診種類選択案内（4択DTMF）"
    announcement: "がん検診の種類を次の4つからお選びください。乳がんは1、胃がんは2、肝炎は3、その他は4。"

  - module_name: "超音波_マンモ"
    purpose: "乳がん検査方法選択案内（2択DTMF）"
    announcement: "乳がん検査について、乳腺エコーは1、マンモは2。"

  - module_name: "エコー_確認"
    purpose: "エコー追加確認"
    announcement: "マンモグラフィに加えて、乳腺エコーを自費で受けることもできます。エコーを追加されますか。「はい、希望します」または「いいえ、希望しません」とお話しください。"

  - module_name: "がん_内容"
    purpose: "がん健診内容聴取案内"
    announcement: "ご希望のがん健診をお話しください。"

  - module_name: "ワクチン_種類"
    purpose: "ワクチン種類聴取案内"
    announcement: "ご希望のワクチン名をお話しください。"

  - module_name: "予約_希望日"
    purpose: "予約希望日聴取案内"
