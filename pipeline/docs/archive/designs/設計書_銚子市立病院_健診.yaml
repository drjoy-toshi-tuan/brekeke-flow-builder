# --- セクション11: 特記事項・制約 ---
special_notes:
  - "個人情報聴取が用件聴取の前に配置される（Gen2設計踏襲）。標準的なフロー（用件先→個人情報後）とは逆順"
  - "Gen2で全項目復唱禁止。Gen3でも氏名/生年月日は復唱なし。電話番号はMOBILEパスの着信番号確認のみ（標準サブフロー機能）"
  - "cancerTypeフィールドは段階的に更新される: 乳がん → 乳がん/超音波 or 乳がん/マンモグラフィ → 乳がん/マンモグラフィ/エコー希望あり等"
  - "予約希望日（Preferred_date）は日付妥当性チェック禁止。過去日付・当日・翌日でもそのまま受け付ける（Gen2プロンプト厳守ルール）"
  - "MRワクチン/おたふくかぜワクチンは品薄のため予約不可。専用終話パターン（END_予約_MR_おたふく）に遷移"
  - "Gen2のsmsFlag値マッピング: Gen2 '0'→Gen3 '-1'（未送信）, Gen2 '1'→Gen3 '1', Gen2 '2'→Gen3 '2', Gen2 '3'（中間状態）→Gen3では不使用"
  - "3/26メモの未適用変更: medicalCardNumber削除（BLOCKER B-1）、Preferred_date希望時期削除（NON-BLOCKER N-3）、detail希望内容削除（NON-BLOCKER N-4）"
  - "Gen2の判断ルール（検針→健診、人間ロック→人間ドック、薬→予約等の誤認識対応）はOpenAIプロンプトに反映する（prompterが担当）"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "登録番号（medicalCardNumber）をGen3に含めるか除外するか（3/26メモ指示: 削除）"
    resolved: false
  - item: "営業時間（曜日・時間帯）— Gen2に記載なし"
    resolved: false
  - item: "office_id（デモAdminのofficeIdで正しいか確認）"
    resolved: false
  - item: "対象環境（デモ/本番）"
    resolved: false
  - item: "Preferred_date（予約希望日）を維持するか削除するか（3/26メモ参照）"
    resolved: false
  - item: "RAGサブフロー配置パターン（パターン3: 全終話前に配置 vs パターン1: 問合せルートのみ）"
    resolved: false
