# --- セクション3: フローの目的 ---
purpose: "銚子市立病院の健診専用AI電話。個人情報（氏名・生年月日・電話番号）を聴取後、用件（予約/変更/キャンセル/その他問合せ）を4択で振り分ける。予約ルートでは予約種類（健康診断/がん検診/予防接種）に応じた詳細聴取を行い、折り返し受付を自動化する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "銚子市立病院$健診"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2,smsFlag=-1) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6,smsFlag=-1) → 切断
                        └─ 受付可(true) → 冒頭_アナウンス(TTS)
                                            → ジャンプ_氏名聴取(Custom Jump to Flow)
                                            → ジャンプ_生年月日聴取(Custom Jump to Flow)
                                            → ジャンプ_電話番号聴取(Custom Jump to Flow)
                                            → 用件_選択(TTS) → 用件選択(DTMF STT) → OpenAI_用件_選択
                                                ├─ 予約 → saveContext_用件_予約 → 予約_種類(TTS) → 予約種類(DTMF STT) → OpenAI_予約_種類
                                                │     ├─ 健康診断 → saveContext_予約種類 → 健康診断_種類(TTS) → 健康診断の種類(DTMF STT) → OpenAI_健康診断_種類
                                                │     │     ├─ 人間ドック → saveContext_健診種類 → 脳ドック_確認(TTS) → 脳ドック確認(STT) → OpenAI_脳ドック → saveContext_脳ドック
                                                │     │     │     → ジャンプ_RAG(パターン3,pre-termination) → END_予約_ドック
                                                │     │     ├─ 特定健診 → saveContext_健診種類 → 国保_社保(TTS) → 国保_社保(DTMF STT) → OpenAI_国保_社保 → saveContext_国保社保
                                                │     │     │     → 予約_希望日(TTS) → 予約希望日(STT) → OpenAI_予約_希望日 → saveContext_予約希望日
                                                │     │     │     → ジャンプ_RAG(パターン3,pre-termination) → END_予約
                                                │     │     └─ その他 → saveContext_健診種類 → 内容_健康診断(TTS) → 内容_健康診断(STT) → OpenAI_内容_健康診断 → saveContext_内容
                                                │     │           → 予約_希望日(TTS) → ... → ジャンプ_RAG → END_予約
                                                │     ├─ がん検診 → saveContext_予約種類 → がん_種類(TTS) → がん検診種類(DTMF STT) → OpenAI_がん_種類
                                                │     │     ├─ 乳がん → saveContext_がん種類 → 超音波_マンモ(TTS) → 超音波_マンモ(DTMF STT) → OpenAI_超音波_マンモ
                                                │     │     │     ├─ 超音波 → saveContext_がん種類更新 → 予約_希望日 → ... → ジャンプ_RAG → END_予約
                                                │     │     │     └─ マンモ → saveContext_がん種類更新 → エコー_確認(TTS) → エコー確認(STT) → OpenAI_エコー → saveContext_がん種類更新
                                                │     │     │           → 予約_希望日 → ... → ジャンプ_RAG → END_予約
                                                │     │     ├─ 胃がん/肝炎 → saveContext_がん種類 → 予約_希望日 → ... → ジャンプ_RAG → END_予約
                                                │     │     └─ その他 → saveContext_がん種類 → がん_内容(TTS) → がん健診内容(STT) → OpenAI_がん_内容 → saveContext_がん内容
                                                │     │           → 予約_希望日 → ... → ジャンプ_RAG → END_予約
                                                │     └─ 予防接種 → saveContext_予約種類 → ワクチン_種類(TTS) → ワクチン種類(STT) → OpenAI_ワクチン_種類
                                                │           ├─ MR/おたふく → saveContext_ワクチン → ジャンプ_RAG → END_予約_MR_おたふく
                                                │           └─ その他 → saveContext_ワクチン → 予約_希望日 → ... → ジャンプ_RAG → END_予約
                                                ├─ 変更 → saveContext_用件_変更 → 変更_予約日(TTS) → 変更_現在の予約日(STT) → OpenAI_変更_予約日 → saveContext_変更予約日
                                                │     → 変更_希望内容(TTS) → 変更希望内容(STT) → OpenAI_変更_希望内容 → saveContext_変更内容
                                                │     → ジャンプ_RAG(パターン3,pre-termination) → END_変更
                                                ├─ キャンセル → saveContext_用件_キャンセル → キャンセル_予約日(TTS) → キャンセル_現在の予約日(STT) → OpenAI_キャンセル_予約日 → saveContext_キャンセル予約日
                                                │     → ジャンプ_RAG(パターン3,pre-termination) → END_キャンセル
                                                └─ その他問合せ → saveContext_用件_問合せ → 問合せ_内容(TTS) → 問合せ内容(STT) → OpenAI_問合せ_内容 → saveContext_問合せ
                                                      → ジャンプ_RAG(パターン3,inquiry) → END_問い合わせ

      ─── 終話パターン ───
      END_予約: 完了フラグ_予約(status=1,smsFlag=1) → 終話_予約(TTS) → 切断
      END_予約_ドック: 完了フラグ_予約_ドック(status=1,smsFlag=1) → 終話_予約_ドック(TTS) → 切断
      END_予約_MR_おたふく: 完了フラグ_予約_MR(status=1,smsFlag=1) → 終話_予約_MR_おたふく(TTS) → 切断
      END_変更: 完了フラグ_変更(status=1,smsFlag=1) → 終話_変更(TTS) → 切断
      END_キャンセル: 完了フラグ_キャンセル(status=1,smsFlag=1) → 終話_キャンセル(TTS) → 切断
      END_問い合わせ: 完了フラグ_問い合わせ(status=1,smsFlag=2) → 終話_問い合わせ(TTS) → 切断
      END_聴取失敗: 完了フラグ_聴取失敗(status=3,smsFlag=-1) → 終話_聴取失敗(TTS) → 切断
    notes: |
      冒頭チェーン順序: wait → saveContextModel2DB → incoming-classifier → acceptance_times。
      個人情報聴取がの前に配置（Gen2設計を踏襲）。
      予約ルートは3段階の多段分岐（予約種類→健康診断種類/がん検診種類→詳細）。
      RAGサブフローはパターン3: 問合せルート内(inquiry) + 全終話前(pre-termination)。

  - flow_name: "銚子市立病院$氏名聴取"
    diagram: |
      docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。
      フロー名プレフィックスのみ「銚子市立病院$」に置換。構造・接続・スクリプトは一切変更不可。
