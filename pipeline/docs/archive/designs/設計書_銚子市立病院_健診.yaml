# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # --- サブフローで聴取する個人情報 ---
  - order: 1
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "氏名聴取サブフロー内。カタカナ変換。リトライ上限→スキップ"

  - order: 2
    name: "生年月日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels: []
    notes: "生年月日聴取サブフロー内。復唱なし。リトライ上限→スキップ"

  - order: 3
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "電話番号聴取サブフロー内。incoming-classifier分岐。MOBILEパス着信番号確認あり。DTMF 0-9=電話番号の各桁入力, max_dtmf_length=11"

  # --- メインフローで聴取する業務項目 ---
  - order: 4
    name: "用件選択"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "その他問合せ"
