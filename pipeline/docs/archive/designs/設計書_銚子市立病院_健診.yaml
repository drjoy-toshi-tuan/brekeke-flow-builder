    purpose: "予約受付完了終話"
    announcement: "予約についてのご要望を承りました。3営業日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡をいたします。担当者からのご連絡後に確定となります。お電話ありがとうございました。"

  - module_name: "終話_予約_ドック"
