      - order: "2"
        value: "変更"
      - order: "3"
        value: "キャンセル"
      - order: "4"
        value: "その他問合せ"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。DTMF 1=予約, 2=変更, 3=キャンセル, 4=その他問合せ"

