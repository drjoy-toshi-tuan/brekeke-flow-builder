# --- セクション7: ステップ詳細 ---
step_details:
  # === 個人情報（サブフロー — 静的JSONコピーのため詳細省略）===
  # 氏名聴取: docs/reference/bivr/samples/json/氏名聴取.json 完全コピー
  # 生年月日聴取: docs/reference/bivr/samples/json/生年月日聴取_復唱なし.json 完全コピー
  # 電話番号聴取: docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json 完全コピー

  # === メインフロー: 用件聴取 ===
  - step_name: "用件選択"
    tts_announcement: "ご用件を、次の4つからお選びください。予約は1、変更は2、キャンセルは3、その他お問い合わせは4。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "その他問合せ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「よやく」「予約したい」「申し込み」等を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「予約変更」「変えたい」等を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「取り消し」「やめたい」等を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「問合せ」「質問」「確認」「わからない」等を含む"
          output: "その他問合せ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→予約_種類 / 変更→変更_予約日 / キャンセル→キャンセル_予約日 / その他問合せ→問合せ_内容"
    retry_failure: "end_failure"

  # === 予約ルート ===
  - step_name: "予約種類"
    tts_announcement: "ご予約を希望される種類を次の3つからお選びください。健康診断は1、がん検診は2、予防接種は3。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "健康診断"
        - "がん検診"
        - "予防接種"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「健康診断」「健診」「健康」等を含む"
          output: "健康診断"
        - input: "DTMF 2 または「がん検診」「がん」「癌」等を含む"
          output: "がん検診"
        - input: "DTMF 3 または「予防接種」「ワクチン」「接種」等を含む"
          output: "予防接種"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "reservationType"
    next_step: "健康診断→健康診断_種類 / がん検診→がん_種類 / 予防接種→ワクチン_種類"
    retry_failure: "end_failure"

  - step_name: "健康診断の種類"
    tts_announcement: "健康診断の種類を次の3つからお選びください。人間ドックは1、特定健診は2、その他は3。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "人間ドック"
        - "特定健診"
        - "その他"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「人間ドック」「ドック」等を含む"
          output: "人間ドック"
        - input: "DTMF 2 または「特定健診」「特定」等を含む"
          output: "特定健診"
        - input: "DTMF 3 または上記以外"
          output: "その他"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "course"
    next_step: "人間ドック→脳ドック_確認 / 特定健診→国保_社保 / その他→内容_健康診断"
    retry_failure: "end_failure"

  - step_name: "脳ドック確認"
    tts_announcement: "脳ドックの追加を希望されますか。希望される方は「はい」、希望されない方は「いいえ」とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "希望あり"
        - "希望なし"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「希望します」等の肯定的表現"
          output: "希望あり"
        - input: "「いいえ」「希望しません」「けっこうです」等の否定的表現"
          output: "希望なし"
      no_result_condition: "肯定/否定が判定できない"
    save_to: "brainExaminationCheck"
    next_step: "ジャンプ_RAG → END_予約_ドック"
    retry_failure: "skip"

  - step_name: "国保_社保"
    tts_announcement: "保険の種類を次の3つからお選びください。国民健康保険は1、社会保険は2、わからない場合は3。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "国民健康保険（国保）"
        - "社会保険（社保）"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「国保」「国民健康保険」等を含む"
          output: "国民健康保険（国保）"
        - input: "DTMF 2 または「社保」「社会保険」等を含む"
          output: "社会保険（社保）"
        - input: "DTMF 3 または「わからない」「わかりません」等を含む"
          output: "わからない"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "insuranceTypeCheck"
    next_step: "予約_希望日"
    retry_failure: "skip"

  - step_name: "内容_健康診断"
    tts_announcement: "その他に希望される健診内容をすべてお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "コースリスト/オプションリストに該当する回答"
          output: "正規化されたコース名/オプション名"
        - input: "「ない」「大丈夫」「ありません」等"
          output: "特になし"
        - input: "上記以外"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "detail"
    next_step: "予約_希望日"
    retry_failure: "skip"

  - step_name: "がん検診種類"
    tts_announcement: "がん検診の種類を次の4つからお選びください。乳がんは1、胃がんは2、肝炎は3、その他は4。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "乳がん"
        - "胃がん"
        - "肝炎"
        - "その他"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「乳がん」を含む"
          output: "乳がん"
        - input: "DTMF 2 または「胃がん」を含む"
          output: "胃がん"
        - input: "DTMF 3 または「肝炎」を含む"
          output: "肝炎"
        - input: "DTMF 4 または上記以外"
          output: "その他"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "cancerType"
    next_step: "乳がん→超音波_マンモ / 胃がん,肝炎→予約_希望日 / その他→がん_内容"
    retry_failure: "end_failure"

  - step_name: "超音波_マンモ"
    tts_announcement: "乳がん検査について、乳腺エコーは1、マンモは2。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "乳がん/超音波"
        - "乳がん/マンモグラフィ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「超音波」「エコー」を含む"
          output: "乳がん/超音波"
        - input: "DTMF 2 または「マンモ」「マンモグラフィ」を含む"
          output: "乳がん/マンモグラフィ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "cancerType"
    next_step: "超音波→予約_希望日 / マンモ→エコー_確認"
    retry_failure: "skip"

  - step_name: "エコー確認"
    tts_announcement: "マンモグラフィに加えて、乳腺エコーを自費で受けることもできます。エコーを追加されますか。「はい、希望します」または「いいえ、希望しません」とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "乳がん/マンモグラフィ/エコー希望あり"
        - "乳がん/マンモグラフィ/エコー希望なし"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「希望します」等の肯定的表現"
          output: "乳がん/マンモグラフィ/エコー希望あり"
        - input: "「いいえ」「希望しません」等の否定的表現"
          output: "乳がん/マンモグラフィ/エコー希望なし"
      no_result_condition: "肯定/否定が判定できない"
    save_to: "cancerType"
    next_step: "予約_希望日"
    retry_failure: "skip"

  - step_name: "がん健診内容"
    tts_announcement: "ご希望のがん健診をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "detail"
    next_step: "予約_希望日"
    retry_failure: "skip"

  - step_name: "ワクチン種類"
    tts_announcement: "ご希望のワクチン名をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "MR"
        - "おたふく"
        - "その他ワクチン名"
        - "NO_RESULT"
      mapping:
        - input: "「MR」「えむあーる」等を含む"
          output: "MR"
        - input: "「おたふく」「ムンプス」等を含む"
          output: "おたふく"
        - input: "ワクチンリストに該当する名称"
          output: "正規化されたワクチン名"
      no_result_condition: "ワクチン名として認識できない"
    save_to: "vaccineType"
    next_step: "MR/おたふく→ジャンプ_RAG→END_予約_MR_おたふく / その他→予約_希望日"
    retry_failure: "skip"

  - step_name: "予約希望日"
    tts_announcement: "予約を希望される曜日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "日付・曜日・期間等の回答"
          output: "フリーテキスト（そのまま保存。日付妥当性チェック禁止）"
      no_result_condition: "音声認識結果が空"
    save_to: "Preferred_date"
    next_step: "ジャンプ_RAG → END_予約"
    retry_failure: "skip"

  # === 変更ルート ===
  - step_name: "変更_現在の予約日"
    tts_announcement: "現在の予約日と予約内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト"
      mapping:
        - input: "日付を含む回答"
          output: "yyyy-MM-dd 00:00:00形式。月日のみの場合は着信年を補完"
      no_result_condition: "音声認識結果が空"
    save_to: "reservationDate"
    next_step: "変更_希望内容"
    retry_failure: "skip"

  - step_name: "変更希望内容"
    tts_announcement: "変更を希望される検査項目や日付をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（コースリスト/オプションリスト参照で正規化）"
      no_result_condition: "音声認識結果が空"
    save_to: "detail"
    next_step: "ジャンプ_RAG → END_変更"
    retry_failure: "skip"

  # === キャンセルルート ===
  - step_name: "キャンセル_現在の予約日"
    tts_announcement: "現在の予約日と予約内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト"
      mapping:
        - input: "日付を含む回答"
          output: "yyyy-MM-dd 00:00:00形式。月日のみの場合は着信年を補完"
      no_result_condition: "音声認識結果が空"
    save_to: "reservationDate"
    next_step: "ジャンプ_RAG → END_キャンセル"
    retry_failure: "skip"

  # === その他問合せルート ===
  - step_name: "問合せ内容"
    tts_announcement: "お問合せ内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "inquiry"
    next_step: "ジャンプ_RAG(inquiry) → END_問い合わせ"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
