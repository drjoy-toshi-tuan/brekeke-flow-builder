  - module_name: "終話_変更"
    purpose: "予約変更完了終話"
    announcement: "予約変更についてのご要望を承りました。3営業日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡をいたします。担当者からのご連絡後に確定となります。お電話ありがとうございました。"

  - module_name: "終話_キャンセル"
    purpose: "キャンセル完了終話"
    announcement: "予約キャンセルについてのご要望を承りました。担当者より折り返しご連絡をさせていただく場合がございます。お電話ありがとうございました。"

  - module_name: "終話_問い合わせ"
    purpose: "問い合わせ完了終話"
    announcement: "お問い合わせを承りました。3営業日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。お電話ありがとうございました。"

  - module_name: "終話_聴取失敗"
