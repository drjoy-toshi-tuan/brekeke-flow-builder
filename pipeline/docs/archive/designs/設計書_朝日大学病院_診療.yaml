# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "朝日大学病院$診療_20260407"
      role: "main"
      description: "冒頭チェーン → 個人情報サブフロー3種（氏名・生年月日・診察券番号）→ 用件分岐（変更/キャンセル/確認）→ ルート別聴取 → 電話番号サブフロー（変更・確認のみ）→ 終話"
  subflows:
    - name: "朝日大学病院$氏名聴取_20260407"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr を完全コピー"
    - name: "朝日大学病院$生年月日聴取_20260407"
      target: "生年月日聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr を完全コピー"
    - name: "朝日大学病院$診察券番号聴取_20260407"
      target: "診察券番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr を完全コピー"
    - name: "朝日大学病院$電話番号聴取_20260407"
      target: "電話番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10/11 準拠。変更・確認ルートのみ使用。キャンセルルートでは不使用"

# --- セクション3: フローの目的 ---
purpose: >
  朝日大学病院の予約専用AI電話として、患者からの電話を受け、
  患者情報（氏名・生年月日・診察券番号）を聴取した後、用件（変更・キャンセル・確認）を分類し、
  用件別に診療科・予約日・薬処方確認・残薬確認・キャンセル理由・連絡先電話番号等を聴取して折り返し受付を自動化する。
  初診予約は受け付けず代表電話案内、病理診断科・残薬なしも代表案内に誘導する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "朝日大学病院$診療_20260407"
    diagram: |
      wait(2000ms)
        -> saveContextModel2DB
        -> incoming-classifier
            +-- 非通知/海外 -> 非通知_アナウンス(TTS) -> 完了フラグ_非通知(status=2, smsFlag=-1) -> 切断
            +-- 携帯/固定/通常 -> 冒頭_アナウンス(TTS)
                  -> [氏名聴取サブフロー] (Custom Jump to Flow)
                  -> [生年月日聴取サブフロー] (Custom Jump to Flow)
                  -> [診察券番号聴取サブフロー] (Custom Jump to Flow)
                  -> 用件確認(TTS) -> 入力_用件確認(AmiVoice STT)
                  -> OpenAI_用件確認
                      +-- 変更 -> saveContext_用件(変更) -> === 変更ルート ===
                      +-- キャンセル -> saveContext_用件(キャンセル) -> === キャンセルルート ===
                      +-- 確認 -> saveContext_用件(確認) -> === 確認ルート ===
                      +-- 予約 -> END_初診不可(TTS) -> 完了フラグ_初診不可(status=2, smsFlag=-1) -> 切断
                      +-- NO_RESULT -> リトライ_用件確認
                                         +-- Retry -> 用件確認(TTS)
                                         +-- No more -> END_代表案内(TTS) -> 完了フラグ_代表案内(status=2, smsFlag=-1) -> 切断

      === 変更ルート ===
      診療科_変更(TTS) -> 入力_診療科_変更(AmiVoice STT) -> OpenAI_診療科_変更
          +-- 病理診断科 -> END_代表案内(TTS) -> 完了フラグ_代表案内 -> 切断
          +-- {valid科} -> saveContext_診療科 -> 予約日_変更(TTS) -> 入力_予約日_変更(AmiVoice STT) -> OpenAI_予約日_変更
                -> saveContext_予約日 -> 予約希望日(TTS) -> 入力_予約希望日(AmiVoice STT) -> OpenAI_予約希望日
                -> saveContext_予約希望日 -> 薬処方確認_変更(TTS) -> 入力_薬処方確認_変更(AmiVoice STT) -> OpenAI_薬処方確認_変更
                    +-- 飲んでいない -> === 電話番号聴取合流 ===
                    +-- 飲んでいる -> saveContext_薬処方 -> 残薬確認_変更(TTS) -> 入力_残薬確認_変更(AmiVoice STT) -> OpenAI_残薬確認_変更
                        +-- あり -> saveContext_残薬 -> === 電話番号聴取合流 ===
                        +-- なし -> END_代表案内2(TTS) -> 完了フラグ_代表案内2(status=2, smsFlag=-1) -> 切断
                        +-- NO_RESULT -> リトライ_残薬確認_変更
                    +-- NO_RESULT -> リトライ_薬処方確認_変更
          +-- 登録なし -> saveContext_診療科(登録なし) -> 予約日_変更(TTS) -> ...（上記と同じ流れ）
          +-- NO_RESULT -> リトライ_診療科_変更
                             +-- Retry -> 診療科_変更(TTS)
                             +-- No more -> saveContext_診療科(空) -> 予約日_変更(TTS) -> ...

      === キャンセルルート ===
      診療科_キャンセル(TTS) -> 入力_診療科_キャンセル(AmiVoice STT) -> OpenAI_診療科_キャンセル
          +-- 病理診断科 -> END_代表案内(TTS) -> 完了フラグ_代表案内 -> 切断
          +-- {valid科} -> saveContext_診療科 -> 予約日_キャンセル(TTS) -> 入力_予約日_キャンセル(AmiVoice STT) -> OpenAI_予約日_キャンセル
                -> saveContext_予約日 -> 薬処方確認_キャンセル(TTS) -> 入力_薬処方確認_キャンセル(AmiVoice STT) -> OpenAI_薬処方確認_キャンセル
                    +-- 飲んでいない -> キャンセル理由(TTS) -> 入力_キャンセル理由(AmiVoice STT) -> saveContext_キャンセル理由 -> END_キャンセル
                    +-- 飲んでいる -> saveContext_薬処方 -> 残薬確認_キャンセル(TTS) -> 入力_残薬確認_キャンセル(AmiVoice STT) -> OpenAI_残薬確認_キャンセル
                        +-- あり -> saveContext_残薬 -> キャンセル理由(TTS) -> ... -> END_キャンセル
                        +-- なし -> END_代表案内2(TTS) -> 完了フラグ_代表案内2 -> 切断
                        +-- NO_RESULT -> リトライ_残薬確認_キャンセル
                    +-- NO_RESULT -> リトライ_薬処方確認_キャンセル
          +-- 登録なし -> saveContext_診療科(登録なし) -> 予約日_キャンセル(TTS) -> ...
          +-- NO_RESULT -> リトライ_診療科_キャンセル

      === 確認ルート ===
      内容確認(TTS) -> 入力_内容確認(AmiVoice STT) -> OpenAI_内容確認
          -> saveContext_内容確認
          -> 内容確認_受付(TTS)
          -> === 電話番号聴取合流 ===

      === 電話番号聴取合流（変更・確認ルート共通）===
      [電話番号聴取サブフロー] (Custom Jump to Flow)
          +-- 1（携帯）-> 携帯用の質問(TTS) -> 入力_携帯用の質問(AmiVoice STT) -> OpenAI_携帯用の質問
                -> saveContext_連絡方法 -> END_変更_確認(TTS) -> 完了フラグ_変更確認(status=1, smsFlag=1) -> 切断
          +-- 2（その他）-> END_変更_確認(TTS) -> 完了フラグ_変更確認(status=1, smsFlag=1) -> 切断

      === キャンセル終話 ===
      END_キャンセル(TTS) -> 完了フラグ_キャンセル(status=1, smsFlag=1) -> 切断

      --- メインフロー内終話パターン ---
      END_非通知 -> 切断
      END_初診不可 -> 切断
      END_代表案内 -> 切断
      END_代表案内2 -> 切断
      END_聴取失敗（電話番号サブフロー内） -> 切断
      END_キャンセル -> 切断
      END_変更_確認 -> 切断
    notes: |
      - acceptance_times不使用（Gen2に営業時間チェックなし）
      - 個人情報聴取（氏名・生年月日・診察券番号）は用件確認の前に配置（Gen2設計準拠）
      - 電話番号聴取は変更・確認ルートのみ。キャンセルルートでは不使用
      - 薬処方確認の「飲んでいない」系表現は残薬確認スキップ（Gen2特殊ルール）
      - 診療科リトライ失敗時は診療科=空のまま次ステップへ進む

  - flow_name: "朝日大学病院$氏名聴取_20260407"
    diagram: |
      CLAUDE.md Rule 9 完全コピー対象
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「朝日大学病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "Rule 9 準拠。氏名聴取サブフロー"

  - flow_name: "朝日大学病院$生年月日聴取_20260407"
    diagram: |
      CLAUDE.md Rule 9 完全コピー対象
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「生年月日聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「朝日大学病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "Rule 9 準拠。生年月日聴取サブフロー。DOB Re-confirmation あり"

  - flow_name: "朝日大学病院$診察券番号聴取_20260407"
    diagram: |
      CLAUDE.md Rule 9 完全コピー対象
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「診察券番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「朝日大学病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "Rule 9 準拠。診察券番号聴取サブフロー。「わからない」分岐あり"

  - flow_name: "朝日大学病院$電話番号聴取_20260407"
    diagram: |
      CLAUDE.md Rule 9/10/11 完全コピー対象
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「電話番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「朝日大学病院$」に置換。構造・接続・スクリプトは一切変更不可。

      incoming-classifier -> 携帯/固定/その他分岐
        携帯パス: 着信番号復唱確認 -> Phone Normalization -> script_携帯判別
        連絡先聴取パス: 電話番号聴取 -> Phone Normalization -> 復唱確認 -> script_携帯判別
        結果返却: 1(携帯) / 2(その他) をメインフローに返却
    notes: |
      Rule 9/10/11 準拠。電話番号聴取サブフロー。
      変更・確認ルートのみ使用。メインフロー側で返却値(1/2)に基づいて携帯用の質問の要否を分岐。

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
