# --- セクション7: ステップ詳細 ---
step_details:
  # --- 用件確認 ---
  - step_name: "用件確認"
    tts_announcement: "ご用件を、「変更」「キャンセル」「予約確認」の中から1つ選んでお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "予約"
        - "NO_RESULT"
      mapping:
        - input: "「変更」を含む発話"
          output: "変更"
        - input: "「キャンセル」を含む発話"
          output: "キャンセル"
        - input: "「確認」を含む発話"
          output: "確認"
        - input: "「予約」「薬」「お薬」「契約」を含む発話"
          output: "予約"
        - input: "「新規」「電気」「でんき」を含む発話"
          output: "予約"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "変更->診療科_変更 / キャンセル->診療科_キャンセル / 確認->内容確認 / 予約->END_初診不可"
    retry_failure: "end_failure"

  # --- 変更ルート ---
  - step_name: "診療科_変更"
    tts_announcement: "診療科をお話しください。わからない場合はわからないとお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "(22科の診療科名)"
        - "登録なし"
        - "NO_RESULT"
      mapping:
        - input: "リスト内の診療科名またはキーワード"
          output: "該当する診療科名"
        - input: "リストにない診療科名"
          output: "NO_RESULT（近い診療科をレコメンドするプロンプトは prompter が記述）"
        - input: "「わからない」を含む発話"
          output: "登録なし"
      no_result_condition: "リストに合致しない場合"
    save_to: "clinicalDepartment"
    next_step: "病理診断科->END_代表案内 / それ以外->予約日_変更"
    retry_failure: "skip"

  - step_name: "予約日_変更"
    tts_announcement: "現在の予約日をお伺いいたします。それではお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "YYYY-MM-DD 00:00:00 形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "日付として解釈可能な発話"
          output: "YYYY-MM-DD 00:00:00"
        - input: "日付として解釈不能"
          output: "NO_RESULT"
      no_result_condition: "日付として解釈できない"
    save_to: "reservationDate"
    next_step: "予約希望日"
    retry_failure: "skip"

  - step_name: "予約希望日"
    tts_announcement: "予約希望日をお伺いいたします。本日より7診療日以降で担当医が診察する曜日の中からご都合のいいお日にちやお時間帯をお話しください。複数ある場合は複数お話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "発話内容のフリーテキスト"
      mapping:
        - input: "任意の発話"
          output: "発話内容をそのままフリーテキストで保存"
      no_result_condition: "音声認識結果が空"
    save_to: "DesiredreservationDate"
    next_step: "薬処方確認_変更"
    retry_failure: "skip"

  - step_name: "薬処方確認_変更"
    tts_announcement: "病院からお薬を処方されている方は、「はい、飲んでいます」、と、されていない方は、「いいえ、飲んでいません」、とお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "飲んでいる"
        - "飲んでいない"
        - "NO_RESULT"
      mapping:
        - input: "「飲んでいない」「飲んでない」「飲んでいません」「服用していない」を含む（「いいえ」の有無にかかわらず）"
          output: "飲んでいない"
        - input: "「はい」「飲んでいます」「飲んでいる」を含む"
          output: "飲んでいる"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "肯定・否定いずれにも分類できない"
    save_to: "drugCheck"
    next_step: "飲んでいない->電話番号聴取合流 / 飲んでいる->残薬確認_変更"
    retry_failure: "skip"

  - step_name: "残薬確認_変更"
    tts_announcement: "残薬について確認をいたします。変更を希望するお日にちまでの残薬がある場合は「はい、あります」、無い場合は、「いいえ、ありません」、とお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「あります」を含む"
          output: "あり"
        - input: "「いいえ」「ありません」を含む"
          output: "なし"
      no_result_condition: "肯定・否定いずれにも分類できない"
    save_to: "remainingDrugs"
    next_step: "あり->電話番号聴取合流 / なし->END_代表案内2"
    retry_failure: "skip"

  # --- キャンセルルート ---
  - step_name: "診療科_キャンセル"
    tts_announcement: "診療科をお話しください。わからない場合はわからないとお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "(診療科_変更と同じ)"
      mapping:
        - input: "(診療科_変更と同じ)"
          output: "(同上)"
      no_result_condition: "リストに合致しない場合"
    save_to: "clinicalDepartment"
    next_step: "病理診断科->END_代表案内 / それ以外->予約日_キャンセル"
    retry_failure: "skip"

  - step_name: "予約日_キャンセル"
    tts_announcement: "キャンセルを希望される予約日をお伺いいたします。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "YYYY-MM-DD 00:00:00 形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "日付として解釈可能な発話"
          output: "YYYY-MM-DD 00:00:00"
      no_result_condition: "日付として解釈できない"
    save_to: "reservationDate"
    next_step: "薬処方確認_キャンセル"
    retry_failure: "skip"

  - step_name: "薬処方確認_キャンセル"
    tts_announcement: "病院からお薬を処方されている方は、「はい、飲んでいます」、と、されていない方は、「いいえ、飲んでいません」、とお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "飲んでいる"
        - "飲んでいない"
        - "NO_RESULT"
      mapping:
        - input: "(薬処方確認_変更と同じ特殊ルール)"
          output: "(同上)"
      no_result_condition: "肯定・否定いずれにも分類できない"
    save_to: "drugCheck"
    next_step: "飲んでいない->キャンセル理由 / 飲んでいる->残薬確認_キャンセル"
    retry_failure: "skip"

  - step_name: "残薬確認_キャンセル"
    tts_announcement: "残薬について確認をいたします。残薬がある場合は「はい、あります」、無い場合は「いいえ、ありません」、とお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「あります」を含む"
          output: "あり"
        - input: "「いいえ」「ありません」を含む"
          output: "なし"
      no_result_condition: "肯定・否定いずれにも分類できない"
    save_to: "remainingDrugs"
    next_step: "あり->キャンセル理由 / なし->END_代表案内2"
    retry_failure: "skip"

  - step_name: "キャンセル理由"
    tts_announcement: "キャンセル理由をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "発話内容のフリーテキスト"
      mapping:
        - input: "任意の発話"
          output: "発話内容をそのまま保存"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "END_キャンセル"
    retry_failure: "skip"

  # --- 確認ルート ---
  - step_name: "内容確認"
    tts_announcement: "本日より3営業日以内の予約に関するお問い合わせは、当院の代表電話へおかけ直しください。それでは、確認をしたい事項に関して、「次回の予約日を確認したい」など簡潔にお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "発話内容のフリーテキスト"
      mapping:
        - input: "任意の発話"
          output: "発話内容をそのまま保存（FAQは使用しない）"
      no_result_condition: "音声認識結果が空"
    save_to: "details"
    next_step: "内容確認_受付アナウンス"
    retry_failure: "skip"

  # --- 携帯用の質問（メインフロー）---
  - step_name: "携帯用の質問"
    tts_announcement: "折り返しのご連絡方法に関して、ショートメールとお電話どちらをご希望でしょうか。お話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "SMS"
        - "電話"
        - "NO_RESULT"
      mapping:
        - input: "「ショートメール」「SMS」「メール」「メッセージ」を含む"
          output: "SMS"
        - input: "「電話」「でんわ」「お電話」を含む"
          output: "電話"
      no_result_condition: "SMS/電話のいずれにも分類できない"
    save_to: "smsOrCall"
    next_step: "END_変更_確認"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  - name: "END_非通知"
    condition: "incoming-classifier で非通知または海外と判定"
    tts_announcement: "お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に186を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_初診不可"
    condition: "用件確認で「予約」「新規」に分類"
    tts_announcement: "恐れ入りますが、初診の予約は受け付けておりません。診療時間内に直接お越し下さいませ。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_初診不可"

  - name: "END_代表案内"
    condition: "病理診断科が選択された場合、または用件確認リトライ超過"
    tts_announcement: "代表番号までお電話をお願いいたします。代表電話番号は、058-253-8001です。繰り返します。代表電話番号は、058-253-8001です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内"

  - name: "END_代表案内2"
    condition: "残薬確認で「なし」と回答"
    tts_announcement: "恐れ入りますが、残薬が無い方に関しては、こちらのお電話で受け付けることができません。当院の代表電話番号へおかけなおしくださいませ。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内2"

