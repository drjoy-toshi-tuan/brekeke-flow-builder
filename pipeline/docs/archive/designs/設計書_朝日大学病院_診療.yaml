# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # --- 個人情報（用件確認の前に聴取）---
  - order: 1
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー（リファレンスbivr完全コピー）。復唱なし"

  - order: 2
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "valid"
      - "不正値"
      - "2桁_0007"
      - "2桁_0831"
      - "2桁_3263"
    notes: "サブフロー。DOB Re-confirmation あり。2桁入力時は元号確認ステップへ分岐"

  - order: 3
    name: "診察券番号"
