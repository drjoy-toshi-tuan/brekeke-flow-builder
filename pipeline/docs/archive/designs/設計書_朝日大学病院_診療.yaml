        order: "1"
        value: "変更"
      - id: "2"
        order: "2"
        value: "キャンセル"
      - id: "3"
        order: "3"
        value: "確認"
    item_default: true
    editable: true
    deletable: false
    notes: "用件分岐結果。予約/新規は即終話のためrangeValuesに含めない"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
