# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管案件。Gen2プロンプト: docs/migration/gen2_朝日大学病院_診療.md"
  - "聴取順序が非標準: 個人情報（氏名・生年月日・診察券番号）を用件確認の前に聴取する（Gen2設計準拠）"
  - "営業時間チェック(acceptance_times)なし（Gen2に時間外判定が存在しないため）"
  - "用件確認のリトライは3回（Gen3標準の2回ではなくGen2設定を維持）"
  - "薬処方確認の特殊ルール: 「飲んでいない」系表現は「いいえ」が含まれていても飲んでいないとして判定し、残薬確認をスキップ"
  - "病理診断科は代表電話案内(058-253-8001)で終話。他の診療科は続行"
  - "残薬なしも代表電話案内で終話"
  - "キャンセルルートは電話番号聴取なしで終話（smsFlag=1、SMSは着信番号に送信される想定）"
  - "携帯用の質問（SMS/電話希望）は連絡先が携帯の場合のみ。smsOrCallは参考情報として保存（smsFlagの値には影響しない）"
  - "Gen2のstatus=7（非通知/代表案内）はGen3のstatus=2（代表案内）にリマッピング済み"
  - "Gen2未使用フィールド（doctor, history, institution, introduction, other, clinicalDepartment2, checkout）は除外。Gen2固有フィールド（checkpoint, endpoint, smsFlag, additional_phone_type, Incoming_phone_type）も除外"
  - "個人情報聴取サブフロー（氏名・生年月日・診察券番号・電話番号）はCLAUDE.md Rule 9 準拠でリファレンスbivrを完全コピー"
  - "代表電話番号 058-253-8001 はTTSモジュール内に直接記載"
  - "予約希望日はフリーテキスト保存。日付形式への変換・妥当性チェックは行わない（Gen2シンプル運用ルール準拠）"
  - "用件確認で「予約」「薬」「お薬」「契約」「新規」「電気」「でんき」は全て「予約」に分類し初診不可で終話"
  - "診療科レコメンド機能: リストにない診療科が指定された場合は近い診療科を提案（OpenAIプロンプトで対応）"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
  - item: "対象環境（デモ/本番）-- 仮設定: demo"
    resolved: false
  - item: "営業時間チェック(acceptance_times)追加の要否"
    resolved: false
  - item: "status値マッピング: Gen2 status=7 -> Gen3 status=2 への統一でよいか"
    resolved: false
  - item: "Gen2未使用フィールドの除外でよいか"
    resolved: false
  - item: "個人情報サブフローのTTS文言をGen2準拠にカスタマイズするか（IVRプロパティで上書き可能）"
    resolved: false
  - item: "電話番号聴取リトライ回数の差異（Gen2=3回, リファレンスbivr=2回）を許容するか"
    resolved: false
  - item: "変更/確認の終話メッセージ共通化でよいか（Gen2コードでは用件別メッセージ）"
    resolved: false
