# --- セクション8: 終話パターン ---
termination_patterns:
  - name: "END_受付完了"
    condition: "全聴取完了（正常終話）"
    tts_announcement: "以上で受付が完了いたしました。内容を確認の上、AIが解析後ショートメールにてご連絡を差し上げます。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了"

  - name: "END_受付不要"
    condition: "確認ステップで「いいえ」を選択"
    tts_announcement: "承知いたしました。ご用件の確認ができませんでしたので、恐れ入りますが、代表の番号、042-778-9321にお電話をおかけください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付不要"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定"
    tts_announcement: "お電話ありがとうございます。北里大学病院、訪問看護指示書作成等の専用AI電話受付です。ただいまの時間は受付時間外です。受付時間は月曜日から金曜日の8時30分から17時までとなっております。土日祝日および年末年始は受付時間外です。恐れ入りますが、受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_上限エラー"
    condition: "リトライ上限到達"
    tts_announcement: "恐れ入りますがご回答の確認ができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_上限エラー"

