# --- セクション2: フロー構成 ---
# 個人情報聴取サブフロー: 患者氏名・患者生年月日・連絡先電話番号の3項目
# CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr から必要なサブフローのみ接続。
# 診察券番号は聴取対象外のため接続しない。
flow_structure:
  type: "subflow"
  flows:
    - name: "北里大学病院TSC$訪問看護"
      role: "main"
      description: "冒頭チェーン → 確認(はい/いいえ) → 事業所名 → 担当者名 → 連絡先電話番号 → 指示書種別 → 診療科 → 主治医名 → サブフロー遷移(個人情報聴取) → 診療期間 → 指示期間開始日 → 訪問看護リハビリ内容 → 終話"
    - name: "北里大学病院TSC$個人情報聴取"
      role: "sub"
      description: "患者氏名 → 患者生年月日 → 連絡先電話番号 → メインフローに返却"
  subflows:
    - name: "北里大学病院TSC$個人情報聴取"
      target: "個人情報聴取（患者氏名・患者生年月日・連絡先電話番号）"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の氏名・生年月日・電話番号サブフローを完全コピー。診察券番号サブフローは接続しない。フロー名プレフィックスのみ「北里大学病院TSC$」に置換"

# --- セクション3: フローの目的 ---
purpose: "訪問看護ステーション等からの電話を受け、訪問看護指示書（または訪問リハビリテーション指示書）の作成依頼に必要な情報（事業所名・担当者名・連絡先電話番号・指示書種別・診療科・主治医名・患者氏名・患者生年月日・診療期間・指示期間開始日・訪問看護/リハビリ内容）を聴取し、受付を自動化する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "北里大学病院TSC$訪問看護"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知 → END_非通知 → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外 → END_時間外 → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → 確認(TTS)
                                      → 入力_確認(DTMF AmiVoice STT, max_dtmf_length=1)
                                      → OpenAI_確認(generate_by_OpenAI)
                                          ├─ はい → saveContext_確認
                                          │         → 事業所名(TTS)
                                          │         → 入力_事業所名(AmiVoice STT)
                                          │         → OpenAI_事業所名(generate_by_OpenAI)
                                          │             ├─ success → saveContext_事業所名
                                          │             │             → 担当者名(TTS)
                                          │             │             → 入力_担当者名(AmiVoice STT)
                                          │             │             → OpenAI_担当者名(generate_by_OpenAI)
                                          │             │                 ├─ success → saveContext_担当者名
                                          │             │                 │             → 連絡先電話番号(TTS)
                                          │             │                 │             → 入力_連絡先電話番号(DTMF AmiVoice STT, max_dtmf_length=11)
                                          │             │                 │             → OpenAI_連絡先電話番号(generate_by_OpenAI)
                                          │             │                 │                 ├─ success → saveContext_連絡先電話番号
                                          │             │                 │                 │             → 指示書種別(TTS)
                                          │             │                 │                 │             → 入力_指示書種別(DTMF AmiVoice STT, max_dtmf_length=1)
                                          │             │                 │                 │             → OpenAI_指示書種別(generate_by_OpenAI)
                                          │             │                 │                 │                 ├─ 訪問看護 → saveContext_指示書種別
                                          │             │                 │                 │                 ├─ 訪問リハビリ → saveContext_指示書種別
                                          │             │                 │                 │                 └─ NO_RESULT → リトライ_指示書種別
                                          │             │                 │                 │
                                          │             │                 │                 └─ NO_RESULT → リトライ_連絡先電話番号
                                          │             │                 └─ NO_RESULT → リトライ_担当者名
                                          │             └─ NO_RESULT → リトライ_事業所名
                                          │
                                          ├─ いいえ → 終話_受付不可(TTS) → 完了フラグ_受付不要 → 切断
                                          └─ NO_RESULT → リトライ_確認
                                                           ├─ Retry → 確認(TTS)
                                                           └─ No more → END_上限エラー → 切断

                                      ─── saveContext_指示書種別 以降 ───
                                      → 診療科(TTS)
                                      → 入力_診療科(DTMF AmiVoice STT, max_dtmf_length=1)
                                      → OpenAI_診療科(generate_by_OpenAI)
                                          ├─ success → saveContext_診療科
                                          │             → 主治医名(TTS)
                                          │             → 入力_主治医名(AmiVoice STT)
                                          │             → OpenAI_主治医名(generate_by_OpenAI)
                                          │                 ├─ success → saveContext_主治医名
                                          │                 │             → サブフロー遷移_個人情報聴取
                                          │                 │               └─ (返却) → 診療期間(TTS)
                                          │                 │                             → 入力_診療期間(AmiVoice STT)
                                          │                 │                             → OpenAI_診療期間(generate_by_OpenAI)
                                          │                 │                                 ├─ success → saveContext_診療期間
                                          │                 │                                 │             → 指示期間開始日(TTS)
                                          │                 │                                 │             → 入力_指示期間開始日(AmiVoice STT)
                                          │                 │                                 │             → OpenAI_指示期間開始日(generate_by_OpenAI)
                                          │                 │                                 │                 ├─ success → saveContext_指示期間開始日
                                          │                 │                                 │                 │             → 訪問看護リハビリ内容(TTS)
                                          │                 │                                 │                 │             → 入力_訪問看護リハビリ内容(AmiVoice STT)
                                          │                 │                                 │                 │             → OpenAI_訪問看護リハビリ内容(generate_by_OpenAI)
                                          │                 │                                 │                 │                 ├─ success → saveContext_訪問看護リハビリ内容
                                          │                 │                                 │                 │                 │             → END_受付完了(TTS) → 完了フラグ_受付完了 → 切断
                                          │                 │                                 │                 │                 └─ NO_RESULT → リトライ_訪問看護リハビリ内容
                                          │                 │                                 │                 └─ NO_RESULT → リトライ_指示期間開始日
                                          │                 │                                 └─ NO_RESULT → リトライ_診療期間
                                          │                 └─ NO_RESULT → リトライ_主治医名
                                          └─ NO_RESULT → リトライ_診療科

      ─── メインフロー内終話パターン ───
      END_時間外 → 切断
      END_非通知 → 切断
      END_上限エラー → 切断
      END_受付不可 → 切断
      END_受付完了 → 切断（SMS送信あり）
    notes: "incoming-classifier → acceptance_times → 冒頭アナウンス の標準冒頭チェーン。個人情報聴取（患者氏名・生年月日・電話番号）はサブフロー遷移。メインフロー内で終話チェーンを完結。"

  - flow_name: "北里大学病院TSC$個人情報聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の以下のサブフローを完全コピーする:
        1. 氏名（AmiVoice STT — 音声のみ）
        2. 生年月日（DTMF AmiVoice STT, max_dtmf_length=8 + DOB Re-confirmation）
        3. 電話番号（incoming-classifier → 携帯/固定分岐 → Phone Normalization → Re-confirmation）

      診察券番号サブフローは接続しない（聴取対象外）。
      フロー名プレフィックスのみ「北里大学病院TSC$」に置換。構造・接続・スクリプトは一切変更不可。

      電話番号聴取後、結果返却スクリプトでメインフローに返却する。
    notes: |
      CLAUDE.md Rule 9/10/11 準拠。
      個人情報サブフロー.bivr を完全コピー。独自のモジュール追加・削除・接続変更は禁止。
      フロー名プレフィックスのみ施設名に置換すること。
      termination: return（メインフローに返却。終話チェーンはメインフロー側に配置）

