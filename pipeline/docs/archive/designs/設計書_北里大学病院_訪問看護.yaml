        - "一般・消化器外科"
        - "小児科"
        - "産科"
        - "耳鼻"
        - "歯科"
        - "糖尿・内分泌内科"
        - "膠原病感染内科"
        - "泌尿器科"
        - "脳神経内科"
        - "形成外科"
        - "皮膚科・形成外科"
        - "乳腺甲状腺外科"
        - "心臓血管外科"
