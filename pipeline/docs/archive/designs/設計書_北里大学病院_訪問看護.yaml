    save_to: "additionalPhoneNumber"
    next_step: "指示書種別"
    retry_failure: "end_failure"

  - step_name: "指示書種別"
    tts_announcement: "ご依頼いただく指示書の種類をお話しください。1、訪問看護指示書。2、訪問リハビリテーション指示書。わからない場合は「わからない」とおっしゃってください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "訪問看護"
        - "訪問リハビリ"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「訪問看護」「看護」を含む"
          output: "訪問看護"
        - input: "DTMF 2 または「訪問リハビリ」「リハビリ」を含む"
          output: "訪問リハビリ"
        - input: "「わからない」を含む"
          output: "わからない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "documentType"
    next_step: "診療科"
    retry_failure: "end_failure"

  - step_name: "診療科"
