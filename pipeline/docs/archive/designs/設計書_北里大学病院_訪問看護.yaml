# --- セクション11: 特記事項・制約 ---
special_notes:
  - "訪問看護ステーション等からの電話が対象。患者本人からの電話ではない点に注意"
  - "聴取項目が12項目と多い。事業所情報→指示書情報→患者情報→診療情報の順に聴取"
  - "個人情報聴取サブフローはリファレンスbivrを完全コピー（CLAUDE.md Rule 9）。対象: 氏名・生年月日・電話番号の3つ。診察券番号は聴取しない"
  - "電話番号聴取はincoming-classifierで携帯/その他を分岐（CLAUDE.md Rule 10）"
  - "サブフローの出口に結果返却スクリプトを必ず配置（CLAUDE.md Rule 11）"
  - "サブフローのtermination: return（メインフローに返却）。終話チェーンはメインフロー側に配置"
  - "acceptance_timesを使用。祝日除く月〜金 8:30〜17:00"
  - "確認ステップで「いいえ」の場合、代表番号（042-778-9321）への案内を行い切断"
  - "診療科は26科。類義語を含むprofile_wordsの設定が重要"
  - "指示書種別で「わからない」の場合の処理: そのまま「わからない」として保存しフロー続行"
  - "SMS送信: 受付完了時のみ（smsFlag=1）。文面はDr.JOY側で設定"
  - "非通知受入拒否: 設定あり。非通知着信は即アナウンス+切断"

