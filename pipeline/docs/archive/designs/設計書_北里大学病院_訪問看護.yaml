    tts_announcement: "こちらは、北里大学病院、訪問看護指示書作成等の専用AI電話受付です。ただいま担当者が不在のため、AI電話がお受けいたします。ショートメールでメッセージ等をお送りする場合がございます。お待たせいたしましてありがとうございました。お電話ありがとうございます。"
    input_method: null
    openai_rules: null
    save_to: null
    next_step: "確認"
    retry_failure: null

  - step_name: "確認"
    tts_announcement: "お伝えいただく内容ですが、外来主治医の訪問看護に関する記載の依頼でお間違えないでしょうか。はいの場合は1を、それ以外の場合は2をお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」を含む"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「違います」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "はい→事業所名 / いいえ→終話_受付不要"
    retry_failure: "end_failure"

  - step_name: "事業所名"
    tts_announcement: "お伝えする内容がいくつかございます。外来主治医の訪問看護指示書の記載の依頼でお間違えないでしょうか。おたくの方がお聞きしますので回答をお願いいたします。事業所名をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "事業所名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "事業所名テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "officeName"
    next_step: "担当者名"
    retry_failure: "end_failure"

  - step_name: "担当者名"
    tts_announcement: "担当者名をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "担当者名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "担当者名テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "staffName"
    next_step: "連絡先電話番号"
    retry_failure: "skip"

  - step_name: "連絡先電話番号"
    tts_announcement: "ご連絡先の電話番号をお話しください。"
