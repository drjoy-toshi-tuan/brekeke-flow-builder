# --- セクション8: ブロッカー・非ブロッカー ---
blockers:
  - id: "B-1"
    severity: "BLOCKER"
    description: "office_id（Dr.JOYオフィスID）が不明。IVRプロパティに設定が必要。"
    action_required: "多根クリニックのDr.JOYオフィスIDを確認して設計書を更新してください。"

  - id: "B-2"
    severity: "BLOCKER"
    description: "phone_number（着信電話番号）が不明。acceptance_times・incoming-classifierに設定が必要。"
    action_required: "多根クリニック健診専用電話番号を確認して設計書を更新してください。"

non_blockers:
  - id: "N-1"
    severity: "NON-BLOCKER"
    description: "business_hours（受付時間）が不明。acceptance_timesは仮設定で進める。"
    notes: "IVRプロパティのacceptance_times設定でTODOタグを付記。人間が後から設定。"

  - id: "N-2"
    severity: "NON-BLOCKER"
    description: "非通知着信時のTTSアナウンス文言がMDファイルに記載なし。"
    notes: "一般的な非通知拒否文言「恐れ入りますが、電話番号を通知しておかけ直しください。」を仮設定。確認後に差し替え"

  - id: "N-3"
    severity: "NON-BLOCKER"
    description: "時間外着信時のTTSアナウンス文言がMDファイルに明記なし。"
    notes: "一般的な時間外案内文言を仮設定。確認後に差し替え"

# --- セクション9: ステップ詳細 ---
# 各聴取ステップのTTSアナウンス・OpenAIルール・遷移先を定義。
# サブフロー内のステップ（氏名・生年月日・電話番号）はCLAUDE.md Rule 9で完全コピーのため省略。
step_details:
  # 冒頭用件選択（4択DTMF+音声、復唱確認あり）
  - step_name: "冒頭用件"
    tts_announcement: "お電話ありがとうございます。多根クリニックの健診予約専用AI電話です。ご用件を次の4つのうちの、いずれかでお話ください。1、健診の予約。2、日程変更・キャンセル。3、紹介状や受診結果の質問。4、その他お問い合わせ。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更キャンセル"
        - "紹介状受診結果"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「よやく」「申し込み」「契約」「薬」等"
          output: "予約"
        - input: "DTMF 2 または「変更」「キャンセル」「日程変更」「取り消し」「やめたい」等"
          output: "変更キャンセル"
        - input: "DTMF 3 または「紹介状」「受診結果」「しょうかいじょう」「じゅしんけっか」等"
          output: "紹介状受診結果"
        - input: "DTMF 4 または「問い合わせ」「質問」「聞きたい」「確認したい」等"
          output: "問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "各用件の復唱確認TTSへ分岐"
    retry_failure: "end_failure"
    notes: "リトライ超過時は終話ではなく強制伝言ルートへ遷移。next_step='強制伝言_アナウンス(TTS)→ジャンプ_氏名聴取'。generatorはNo moreの遷移先を強制伝言_アナウンスに設定すること。classification=問い合わせで固定"

  # 復唱確認（4種類 - はい/いいえ分岐）
  - step_name: "復唱_予約"
    tts_announcement: "健診の予約でよろしいですか？はい、または、いいえでお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["はい", "いいえ", "NO_RESULT"]
      mapping:
        - input: "「はい」「そうです」等の肯定表現"
          output: "はい"
        - input: "「いいえ」「違います」等の否定表現"
          output: "いいえ"
      no_result_condition: "肯定・否定の判断不可"
    save_to: null
    next_step: "はい→予約案内(TTS)→ジャンプ_氏名聴取 / いいえ→冒頭_アナウンス(TTS)（再聴取）"
    retry_failure: "skip_as_yes"
    retry_failure_next_step: "予約案内(TTS)（はい扱いで進む。No more時は肯定と見なし、先行する用件選択を尊重して予約ルートへ進む）"

  - step_name: "復唱_変更キャンセル"
    tts_announcement: "日程変更・キャンセルでよろしいでしょうか？はい、または、いいえでお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["はい", "いいえ", "NO_RESULT"]
      mapping:
        - input: "肯定表現"
          output: "はい"
        - input: "否定表現"
          output: "いいえ"
      no_result_condition: "判断不可"
    save_to: null
    next_step: "はい→サブ選択_変更キャンセル(TTS) / いいえ→冒頭_アナウンス(TTS)"
    retry_failure: "skip_as_yes"
    retry_failure_next_step: "サブ選択_変更キャンセル(TTS)（はい扱いで進む。No more時は肯定と見なし、サブ選択に進む）"

  - step_name: "復唱_紹介状受診結果"
    tts_announcement: "紹介状や受診結果の質問でよろしいでしょうか？はい、または、いいえでお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["はい", "いいえ", "NO_RESULT"]
      mapping:
        - input: "肯定表現"
          output: "はい"
        - input: "否定表現"
          output: "いいえ"
      no_result_condition: "判断不可"
    save_to: null
    next_step: "はい→サブ選択_紹介状受診結果(TTS) / いいえ→冒頭_アナウンス(TTS)"
    retry_failure: "skip_as_yes"
    retry_failure_next_step: "サブ選択_紹介状受診結果(TTS)（はい扱いで進む。No more時は肯定と見なし、サブ選択に進む）"

  - step_name: "復唱_問い合わせ"
    tts_announcement: "その他お問い合わせでよろしいでしょうか？はい、または、いいえでお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["はい", "いいえ", "NO_RESULT"]
      mapping:
        - input: "肯定表現"
          output: "はい"
        - input: "否定表現"
          output: "いいえ"
      no_result_condition: "判断不可"
    save_to: null
    next_step: "はい→個人企業分岐(TTS) / いいえ→冒頭_アナウンス(TTS)"
    retry_failure: "skip_as_yes"
    retry_failure_next_step: "個人企業分岐(TTS)（はい扱いで進む。No more時は肯定と見なし、個人/企業分岐に進む）"

  # サブ選択（2択）
  - step_name: "変更キャンセル_サブ選択"
    tts_announcement: "次の2つのうちの、いずれかでお話ください。1、日程変更。2、キャンセル。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["日程変更", "キャンセル", "NO_RESULT"]
