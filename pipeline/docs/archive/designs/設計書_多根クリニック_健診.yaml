# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # 冒頭用件選択
  - order: 1
    name: "冒頭用件"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: "1"
    retry_count: 2
    echo_back: true                               # 復唱確認あり（Gen2仕様）
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更キャンセル"
      - "紹介状受診結果"
      - "問い合わせ"
    notes: "「1」「予約」など → 予約ルート。リトライ超過時は強制伝言ルートへ移行。復唱確認（はい/いいえ）あり"

  # 変更/キャンセル サブ選択
