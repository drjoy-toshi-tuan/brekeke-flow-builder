# 設計書 -- 多根クリニック 健診
# 生成元: @pl エージェント（Gen2→Gen3 パターン3移管）
# 生成日: 2026/04/07
# 参照資料:
#   - docs/reference/customer_docs/【健診1】：多根クリニック.md（Gen2プロンプト+YAML）
#   - docs/reference/customer_docs/【新エンジン依頼用】多根クリニック様_AI電話設計書.pdf
# ゴールデンテンプレート参照: 健診受付型.yaml（smsFlag分岐）+ 予約管理型.yaml（用件6分岐）
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "多根クリニック"
  group_name: "多根CL"
  flow_name: "多根CL$健診_20260407"
  target_facility: "多根クリニック（健診専用窓口）"
  office_id: "TODO_要確認"                     # BLOCKER B-1
  phone_number: "TODO_要確認"                  # BLOCKER B-2
  business_hours: "TODO_要確認"                # NON-BLOCKER N-1: acceptance_times配置あり（仮設定）
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
# Gen2の構造: 冒頭で用件4択(+サブ選択) → 個人情報聴取(受診者名→生年月日→電話番号)
# → 用件別聴取 → 終話。電話番号には着信番号判定分岐あり。
# 第3世代化: Gen2のOpenAI単一モジュール（1ターン会話全体を処理）→
#   TTS + STT + generate_by_OpenAI の標準パターンに変換。
#   冒頭に wait(2000ms)→saveContextModel2DB→incoming-classifier→acceptance_times を追加。
flow_structure:
  type: "subflow"
  flows:
    - name: "多根CL$健診_20260407"
      role: "main"
      description: "冒頭チェーン → 用件選択(4択+復唱) → サブフロー(氏名・生年月日・電話番号) → 用件別聴取 → 終話"
    - name: "多根CL$氏名聴取_20260407"
      role: "sub"
      description: "氏名聴取 → 結果返却"
    - name: "多根CL$生年月日聴取_20260407"
      role: "sub"
      description: "生年月日聴取 → DOB Re-confirmation → 結果返却"
    - name: "多根CL$電話番号聴取_20260407"
      role: "sub"
      description: "着信番号分岐 → 電話番号聴取/復唱確認 → 結果返却"
  subflows:
    - name: "多根CL$氏名聴取_20260407"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr を完全コピー。リトライ上限到達時は氏名未取得のまま次へスキップ"
    - name: "多根CL$生年月日聴取_20260407"
      target: "生年月日聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr を完全コピー。2回失敗で次へスキップ（Gen2仕様と一致）"
    - name: "多根CL$電話番号聴取_20260407"
      target: "電話番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10 準拠。個人情報サブフロー.bivr を完全コピー。終話はメインフロー側（用件でsmsFlag値が変わるため）"

# --- セクション3: フローの目的 ---
purpose: >
  多根クリニック健診専用のAI電話。冒頭で用件（健診予約/日程変更・キャンセル/紹介状・受診結果/問い合わせ）を
  4択で聴取し、復唱確認の後、受診者名・生年月日・連絡先電話番号を聴取する。
  その後、用件別の追加情報（保険者情報・希望コース・予約希望時期/人数・予約日・希望日・医療機関名・
  医師への質問・問い合わせ内容等）を聴取し、折り返し受付を完了する。
  冒頭の用件聴取失敗時（3回リトライ超過）は強制伝言モードへ移行し、問い合わせルートで受付する。
  SMS送信フラグ（smsFlag）は用件別に設定（予約=1, 変更/キャンセル=2, 紹介状/受診結果=3, 問い合わせ=4）。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "多根CL$健診_20260407"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → saveCompletionFlag2db(status=0,smsFlag=0) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → saveCompletionFlag2db(status=6,smsFlag=0) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)

      ─── 冒頭用件選択 ───
      冒頭_アナウンス(TTS) → 入力_冒頭用件(DTMF AmiVoice STT Input)
        → OpenAI_冒頭用件(generate_by_OpenAI)
            ├─ 予約 → 復唱_予約(TTS) → 入力_復唱_予約(AmiVoice STT)
            │           → OpenAI_復唱_予約: はい → 予約案内(TTS) → ジャンプ_氏名聴取
            │                               いいえ → 冒頭_アナウンス(TTS)
            ├─ 変更キャンセル → 復唱_変更キャンセル(TTS) → 入力_復唱_変更キャンセル(AmiVoice STT)
            │           → OpenAI_復唱_変更キャンセル: はい → サブ選択_変更キャンセル(TTS) → 入力_サブ選択_変更キャンセル(DTMF STT)
            │                                                   → OpenAI_サブ選択: 日程変更 → ジャンプ_氏名聴取(日程変更ルートへ)
            │                                                                     キャンセル → ジャンプ_氏名聴取(キャンセルルートへ)
            │                               いいえ → 冒頭_アナウンス(TTS)
            ├─ 紹介状受診結果 → 復唱_紹介状受診結果(TTS) → 入力_復唱_紹介状受診結果(AmiVoice STT)
            │           → OpenAI_復唱_紹介状受診結果: はい → サブ選択_紹介状受診結果(TTS) → 入力_サブ選択_紹介状受診結果(DTMF STT)
            │                                                   → OpenAI_サブ選択_紹介状受診結果: 紹介状 → 紹介状案内(TTS) → 医療機関名(TTS) → 入力_医療機関名(STT) → ジャンプ_氏名聴取(紹介状ルートへ)
            │                                                                               受診結果 → 医師への質問(TTS) → 入力_医師への質問(STT) → ジャンプ_氏名聴取(受診結果ルートへ)
            │                               いいえ → 冒頭_アナウンス(TTS)
            ├─ 問い合わせ → 復唱_問い合わせ(TTS) → 入力_復唱_問い合わせ(AmiVoice STT)
            │           → OpenAI_復唱_問い合わせ: はい → 個人企業分岐(TTS) → 入力_個人企業分岐(AmiVoice STT)
            │                                               → OpenAI_個人企業分岐: 個人 → 問い合わせ内容_個人(TTS) → 入力_問い合わせ内容_個人(STT) → ジャンプ_氏名聴取(問い合わせ個人ルートへ)
            │                                                                   企業 → 問い合わせ内容_企業(TTS) → 入力_問い合わせ内容_企業(STT) → 企業名聴取へ(★氏名/DOBスキップ)
            │                               いいえ → 冒頭_アナウンス(TTS)
            └─ NO_RESULT/error → リトライ_冒頭用件
                                   ├─ Retry → 冒頭_アナウンス(TTS)
                                   └─ No more → 強制伝言_アナウンス(TTS) → 入力_強制伝言(AmiVoice STT) → ジャンプ_氏名聴取(強制伝言ルートへ)

      ─── 個人情報聴取（サブフロー遷移） ───
      ジャンプ_氏名聴取(Custom Jump to Flow → 多根CL$氏名聴取_20260407)
        → [氏名聴取サブフローから戻り]
        → ジャンプ_生年月日聴取(Custom Jump to Flow → 多根CL$生年月日聴取_20260407)
        → [生年月日聴取サブフローから戻り]
        → ジャンプ_電話番号聴取(Custom Jump to Flow → 多根CL$電話番号聴取_20260407)
        → [電話番号聴取サブフローから戻り]
        → 電話番号後_ルート分岐(generate_by_OpenAI: reasonにテキストがあれば問い合わせ終話、なければclassification分岐)
            ├─ 問い合わせ_終話 → saveCompletionFlag2db(status=1, smsFlag=4) → END_問い合わせ(TTS) → 切断
            ├─ 予約 → 保険者情報(TTS) → 入力_保険者情報(AmiVoice STT) → saveContext_保険者情報 → 希望コース(TTS) → ...
            ├─ 日程変更 → 予約日(TTS) → 入力_予約日(AmiVoice STT) → saveContext_予約日 → 希望日(TTS) → ...
            ├─ キャンセル → 予約日(TTS) → 入力_予約日_キャンセル(AmiVoice STT) → saveContext_予約日_キャンセル → ...
            ├─ 紹介状 → saveCompletionFlag2db(status=1, smsFlag=3) → END_紹介状(TTS) → 切断
            ├─ 受診結果 → 受診結果_曜日判定 → 平日 or 土日 → 各TTS → 切断
            └─ デフォルト/問い合わせ → saveCompletionFlag2db(status=1, smsFlag=4) → END_問い合わせ(TTS) → 切断

      ─── 予約ルート ───
      保険者情報(TTS) → 入力_保険者情報(DTMF/AmiVoice STT) → OpenAI_保険者情報 → saveContext_保険者情報
      → 希望コース(TTS) → 入力_希望コース(DTMF/AmiVoice STT) → OpenAI_希望コース → saveContext_希望コース
      → 希望時期人数(TTS) → 入力_希望時期人数(AmiVoice STT) → OpenAI_希望時期人数 → saveContext_希望時期人数
      → その他_追加オプション(TTS) → 入力_その他_追加オプション(AmiVoice STT) → OpenAI_その他_追加オプション → saveContext_その他_追加オプション
      → saveCompletionFlag2db(status=1, smsFlag=1) → END_予約(TTS) → 切断

      ─── 日程変更ルート ───
      予約日(TTS) → 入力_予約日(AmiVoice STT) → OpenAI_予約日 → saveContext_予約日
      → 希望日(TTS) → 入力_希望日(AmiVoice STT) → OpenAI_希望日 → saveContext_希望日
      → saveCompletionFlag2db(status=1, smsFlag=2) → END_日程変更(TTS) → 切断

      ─── キャンセルルート ───
      予約日(TTS) → 入力_予約日_キャンセル(AmiVoice STT) → OpenAI_予約日_キャンセル → saveContext_予約日_キャンセル
      → saveCompletionFlag2db(status=1, smsFlag=2) → END_キャンセル(TTS) → 切断

      ─── 紹介状ルート ───
      紹介状案内(TTS) → 医療機関名(TTS) → 入力_医療機関名(AmiVoice STT) → OpenAI_医療機関名 → saveContext_医療機関名
      → [個人情報サブフローへ] → 戻り → saveCompletionFlag2db(status=1, smsFlag=3) → END_紹介状(TTS) → 切断

      ─── 受診結果ルート ───
      医師への質問(TTS) → 入力_医師への質問(AmiVoice STT) → saveContext_医師への質問
      → [個人情報サブフローへ] → 戻り → 受診結果_曜日判定(generate_by_OpenAI: 平日/土日判定)
          ├─ 平日 → saveCompletionFlag2db(status=1, smsFlag=3) → END_受診結果_平日(TTS) → 切断
          └─ 土日 → saveCompletionFlag2db(status=1, smsFlag=3) → END_受診結果_土日(TTS) → 切断

      ─── 問い合わせ個人ルート ───
      問い合わせ内容_個人(TTS) → 入力_問い合わせ内容_個人(AmiVoice STT) → saveContext_reason
      → [個人情報サブフローへ] → 戻り → saveCompletionFlag2db(status=1, smsFlag=4) → END_問い合わせ(TTS) → 切断

      ─── 問い合わせ企業ルート（★氏名/DOBスキップ — Gen2仕様準拠）───
      問い合わせ内容_企業(TTS) → 入力_問い合わせ内容_企業(AmiVoice STT) → saveContext_reason
      → 企業名(TTS) → 入力_企業名(AmiVoice STT) → saveContext_企業名
      → ジャンプ_電話番号聴取_企業(Custom Jump to Flow → 多根CL$電話番号聴取_20260407)
          ※氏名・生年月日サブフローを経由せず、直接電話番号聴取へ遷移
      → saveCompletionFlag2db(status=1, smsFlag=4) → END_問い合わせ(TTS) → 切断

      ─── 強制伝言ルート ───
      強制伝言_アナウンス(TTS) → 入力_強制伝言(AmiVoice STT) → saveContext_reason
      → [個人情報サブフローへ] → 戻り → saveCompletionFlag2db(status=1, smsFlag=4) → END_問い合わせ(TTS) → 切断

      ─── 終話パターン ───
      END_予約 → 切断 (smsFlag=1)
      END_日程変更 → 切断 (smsFlag=2)
      END_キャンセル → 切断 (smsFlag=2)
      END_紹介状 → 切断 (smsFlag=3)
      END_受診結果_平日 → 切断 (smsFlag=3)
      END_受診結果_土日 → 切断 (smsFlag=3)
      END_問い合わせ → 切断 (smsFlag=4)
      END_非通知 → 切断
      END_時間外 → 切断
    notes: |
      Gen2からの移管。Gen2はOpenAI1モジュールで全会話を処理していたが、
      Gen3ではTTS→STT→generate_by_OpenAIの標準パターンに変換。
      冒頭の用件選択はDTMF + AmiVoice STTでプッシュ/音声両対応。
      用件4択復唱確認あり（Gen2仕様準拠）。
      電話番号聴取後にreason格納チェックで問い合わせ/強制伝言ルートを自動検出。
      各STT項目にリトライ（2回）を設定。リトライ上限到達時は空欄スキップして次へ。
      ただし用件分岐必須項目（冒頭用件・変更/キャンセル選択・紹介状/受診結果選択）は
      リトライ超過時に強制伝言モードへ移行。
      フロー図では "NO_RESULT/error → リトライ" と省略しているが、next配列はCLAUDE.md規則通り
      TIMEOUT/ERROR/NO_RESULTの3パターンを個別スロット[0][1][2]に配置すること。

  - flow_name: "多根CL$氏名聴取_20260407"
    diagram: |
      ===== 完全コピー対象（CLAUDE.md Rule 9） =====
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「多根CL$」に置換。構造・接続・スクリプトは一切変更不可。

      構成: AmiVoice STT → OpenAI正規化 → saveContext → script_結果返却
      リトライ上限到達時は氏名未取得のままスキップ。script_結果返却_氏名で$runner.setResult()実行。
    notes: |
      CLAUDE.md Rule 9/11 準拠。個人情報サブフロー.bivr を完全コピー。
      フロー名プレフィックスのみ施設名に置換。

  - flow_name: "多根CL$生年月日聴取_20260407"
    diagram: |
      ===== 完全コピー対象（CLAUDE.md Rule 9） =====
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「生年月日聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「多根CL$」に置換。構造・接続・スクリプトは一切変更不可。

      構成: DTMF AmiVoice STT → OpenAI正規化 → DOB Re-confirmation → saveContext → script_結果返却
      リトライ上限到達時は生年月日未取得のまま次へスキップ（Gen2仕様「2回失敗で次へ」と一致）。
    notes: |
      CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr を完全コピー。
      Gen2仕様: 生年月日認識が計2回失敗でブランクのまま次へスキップ。リファレンスbivrの標準動作と一致。

  - flow_name: "多根CL$電話番号聴取_20260407"
    diagram: |
      ===== 完全コピー対象（CLAUDE.md Rule 9/10） =====
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「電話番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「多根CL$」に置換。構造・接続・スクリプトは一切変更不可。

      Gen2からの電話番号聴取仕様（CLAUDE.md Rule 10準拠）:
        - 携帯（050/060/070/080/090）: 着信番号を復唱確認 → 肯定ならそのまま保存、否定なら番号聴取
        - anonymous/unknown/空白: 「ご連絡先の電話番号を、0から始まる市外局番から...」
        - 口頭聴取後: 復唱確認（<speak type="telephone">フォーマット）
    notes: |
      CLAUDE.md Rule 9/10 準拠。電話番号聴取部分は個人情報サブフロー.bivr を完全コピー。
      termination=return: 終話チェーンはメインフロー側（用件によってsmsFlag値が異なるため）。

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # 標準フィールド（itemDefault: true）
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "日程変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "紹介状"
      - id: "5"
        order: "5"
        value: "受診結果"
      - id: "6"
        order: "6"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: true
    notes: "用件選択ステップで設定。強制伝言モード時は問い合わせに固定"

  - context_name: "patientName"
    context_name_jp: "受診者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "氏名聴取サブフローで聴取。カタカナ変換。復唱禁止（Gen2仕様）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "生年月日聴取サブフローで聴取。和暦→西暦変換。2回失敗で次へスキップ"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "電話番号聴取サブフローで聴取。Re-confirmation（電話番号復唱）あり"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "0"
        order: "0"
        value: "途中切断"
      - id: "1"
        order: "1"
        value: "通話完了"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: true
    notes: "0=途中切断/冒頭切断/非通知, 1=通話完了, 6=時間外。Gen2は0/1のみだったが、Gen3で時間外(6)を追加"

  # smsFlag はsaveContextModel2DBに含めない（saveCompletionFlag2dbのパラメータ）
  # 値定義: 0=SMS不送, 1=予約, 2=変更/キャンセル, 3=紹介状/受診結果, 4=問い合わせ
