# --- セクション12: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管案件。Gen2のOpenAI単一モジュール構成をTTS+STT+OpenAIの標準パターンに分解"
  - "用件4択は復唱確認あり（Gen2仕様準拠）。冒頭用件復唱後にサブ選択が必要な用件（変更/キャンセル、紹介状/受診結果）は追加2択ステップあり"
  - "企業ルートは氏名・生年月日聴取をスキップし、企業名→電話番号→終話の短縮パスを使用（Gen2仕様準拠）"
  - "強制伝言モード: 冒頭用件の3回リトライ超過、または変更/キャンセル・紹介状/受診結果のサブ選択リトライ超過時に移行。classification=問い合わせ固定、smsFlag=4固定"
  - "smsFlag用件別割り当て: 1=予約, 2=変更/キャンセル, 3=紹介状/受診結果, 4=問い合わせ/強制伝言"
  - "受診結果ルートは曜日判定あり（平日→当日15-17時電話、土日→翌営業日15時以降電話）"
  - "電話番号後ルート分岐: reason非空→即問い合わせ終話（強制伝言・問い合わせ個人ルート）、reason空→classification分岐"
  - "生年月日・診察券番号はこのフローでは聴取しない。氏名サブフローのリトライ上限到達時は空欄スキップ"
  - "希望コースはコースリストから正規化。リストに一致しない場合はフリーテキスト保存"
  - "FAQ対応はGen3では実装しない（Gen2固有機能。必要に応じて別途RAGサブフロー検討）"
  - "「medicalCardinfor」はGen2のスペルをそのまま維持（medicalCardInformation等への変更は不要）"
  - "複合用件発話（例:「予約と変更どちらも」）時は冒頭用件のOpenAIが最優先の用件で分類する。複数用件の同時対応は不可の旨をTTSには含めない（混乱を招くため）"

# --- セクション13: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（Dr.JOYオフィスID）"
    resolved: false
  - item: "phone_number（健診専用電話番号）"
    resolved: false
  - item: "営業時間（曜日・時間帯）の最終確認"
    resolved: false
  - item: "smsFlag 1〜4 の割り当てが正しいか（Gen2: 予約=1, 変更/キャンセル=2, 紹介状/受診結果=3, 問い合わせ=4）"
    resolved: false
  - item: "非通知アナウンスの文言（仮設定中）"
    resolved: false
  - item: "時間外アナウンスの文言（仮設定中）"
    resolved: false
  - item: "classification が全ケース「問合せ」のGen2仕様 → Gen3ではclassification=用件名（予約/日程変更等）に変更したが問題ないか"
    resolved: false
  - item: "電話番号リトライ回数: Gen2では3回。Gen3標準は2回。どちらに合わせるか"
    resolved: false
