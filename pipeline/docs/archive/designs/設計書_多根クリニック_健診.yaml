    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["紹介状", "受診結果", "NO_RESULT"]
      mapping:
        - input: "DTMF 1 または「紹介状」等"
          output: "紹介状"
        - input: "DTMF 2 または「受診結果」等"
          output: "受診結果"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "紹介状→紹介状案内(TTS)→医療機関名 / 受診結果→医師への質問"
    retry_failure: "end_failure"
    notes: "リトライ超過時は終話ではなく強制伝言ルートへ遷移。next_step='強制伝言_アナウンス(TTS)→ジャンプ_氏名聴取'。generatorはNo moreの遷移先を強制伝言_アナウンスに設定すること"

  # 個人/企業分岐
  - step_name: "個人企業分岐"
    tts_announcement: "今お電話いただいている方は受診されるご本人様でしょうか？はい、そうです、またはいいえ、違いますのようにお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["個人", "企業", "NO_RESULT"]
      mapping:
        - input: "「はい」「そうです」「本人」等の肯定/個人表現"
          output: "個人"
        - input: "「いいえ」「違います」「担当者」「会社」「企業」等の否定/企業表現"
          output: "企業"
      no_result_condition: "判断不可"
    save_to: "company_check"
    next_step: "個人→問い合わせ内容_個人(TTS) / 企業→問い合わせ内容_企業(TTS)"
    retry_failure: "skip_as_individual"
    retry_failure_next_step: "問い合わせ内容_個人(TTS)（個人扱いで進む。No more時は個人と見なし、氏名/生年月日サブフロー経由の個人ルートへ進む。企業ルートは氏名/DOBスキップパスのため、誤って企業扱いにすると個人情報未取得のまま終話するリスクがある）"

  # 強制伝言
  - step_name: "強制伝言_reason"
    tts_announcement: "申し訳ございません。少々お聞き取りしにくい状況でございましたので、折り返しの際に確認いたします。お問い合わせの内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "ジャンプ_氏名聴取"
    retry_failure: "skip"
    notes: "classification=問い合わせ固定。smsFlag=4固定。以降のルート変更禁止"

  # 問い合わせ内容
  - step_name: "問い合わせ内容_個人"
    tts_announcement: "お問い合わせの内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "ジャンプ_氏名聴取（問い合わせ個人ルート）"
    retry_failure: "skip"

  - step_name: "問い合わせ内容_企業"
    tts_announcement: "お問い合わせの内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "企業名(TTS)（氏名/DOBスキップ）"
    retry_failure: "skip"

  # 企業名
  - step_name: "企業名"
    tts_announcement: "お電話いただいている方のお名前、もしくは、企業名をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "company_name"
    next_step: "ジャンプ_電話番号聴取_企業（電話番号サブフローへ直接遷移）"
    retry_failure: "skip"

  # 予約案内（情報提供TTS、入力なし）
  - step_name: "予約案内"
    tts_announcement: "これから、コースやご希望の受診日、オプションについてお伺いします。内容がお決まりの方は健康保険証をご用意の上、このままお進みください。まだお決まりでない方は、改めてご連絡ください。"
    input_method: null
    save_to: null
    next_step: "ジャンプ_氏名聴取（予約ルート）"
    retry_failure: "skip"

  # 保険者情報
  - step_name: "保険者情報"
    tts_announcement: "健康保険組合の名称および、健康保険証の保険者番号、記号、番号をお話しください。わからない場合は「わからない」のようにお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存。わからないも含む）"
      no_result_condition: "音声認識結果が空"
    save_to: "medicalCardinfor"
    next_step: "希望コース(TTS)"
    retry_failure: "skip"

  # 希望コース
  - step_name: "希望コース"
    tts_announcement: "ご希望のコースをお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["正規化コース名またはフリーテキスト"]
      mapping:
        - input: "受診希望コースリストに一致する場合"
          output: "正規化されたコース名（半日人間ドック、1泊2日人間ドック等）"
        - input: "リストに一致しない場合"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "course"
    next_step: "希望時期_人数(TTS)"
    retry_failure: "skip"
    notes: "復唱禁止（Gen2仕様）。コースリスト: 半日人間ドック/1泊2日人間ドック/脳疾患チェック/特定検診/協会けんぽ/生活習慣病予防健診/大阪市国保特定健康診査/C健診 等"

  # 希望時期/人数
  - step_name: "希望時期_人数"
    tts_announcement: "受診を希望されている日や、人数をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "Preferred_date"
    next_step: "その他_追加オプション(TTS)"
    retry_failure: "skip"

  # その他_追加オプション
  - step_name: "その他_追加オプション"
    tts_announcement: "その他ご希望や追加オプションなどがありましたらお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "option"
    next_step: "saveCompletionFlag2db(status=1,smsFlag=1) → END_予約(TTS)"
    retry_failure: "skip"

  # 予約日（日程変更/キャンセル共通）
  - step_name: "予約日_変更キャンセル"
    tts_announcement: "次に現在の予約日を「4月1日」のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD形式の日付"]
      mapping:
        - input: "日付表現（月日、年月日）"
          output: "YYYY-MM-DD 00:00形式に正規化"
      no_result_condition: "日付として解釈不可"
    save_to: "reservationDate"
    next_step: "日程変更→希望日(TTS) / キャンセル→saveCompletionFlag2db→END_キャンセル"
    retry_failure: "skip"

  # 希望日
  - step_name: "希望日"
    tts_announcement: "次回のご予約希望日があればお話しください。なければ、ない、とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存。「ない」も含む）"
      no_result_condition: "音声認識結果が空"
    save_to: "Preferred_date2"
    next_step: "saveCompletionFlag2db(status=1,smsFlag=2) → END_日程変更(TTS)"
    retry_failure: "skip"

  # 紹介状案内（情報提供TTS、入力なし）
  - step_name: "紹介状案内"
    tts_announcement: "紹介状の発行については、紹介先医療機関名をお伺いします。医療機関がお決まりの方はこのままお進みください。まだお決まりでない方は、改めてご連絡ください。要精密検査について紹介状を発行します。"
    input_method: null
    save_to: null
    next_step: "医療機関名(TTS)"
    retry_failure: "skip"

  # 医療機関名
  - step_name: "医療機関名"
    tts_announcement: "紹介先医療機関名をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "company_name"
    next_step: "ジャンプ_氏名聴取（紹介状ルート）"
    retry_failure: "skip"

  # 医師への質問
  - step_name: "医師への質問"
    tts_announcement: "医師に質問したい内容についてお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト"]
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "doctorcheck"
    next_step: "ジャンプ_氏名聴取（受診結果ルート）"
    retry_failure: "skip"
    notes: "doctorcheckに格納。reasonには格納しないこと（Gen2仕様）"

  # 電話番号後ルート分岐（OpenAIでreason空欄チェック+classification分岐）
  - step_name: "電話番号後_ルート分岐"
    tts_announcement: null
    input_method: null
    openai_rules:
      output_values: ["予約", "日程変更", "キャンセル", "紹介状", "受診結果", "問い合わせ"]
      mapping:
        - input: "reasonにテキストが格納されている場合（強制伝言・問い合わせ個人ルート）"
          output: "問い合わせ"
        - input: "reasonが空でclassification=予約"
          output: "予約"
        - input: "classification=日程変更"
          output: "日程変更"
        - input: "classification=キャンセル"
          output: "キャンセル"
        - input: "classification=紹介状"
          output: "紹介状"
        - input: "classification=受診結果"
          output: "受診結果"
      no_result_condition: "該当なし（デフォルトで問い合わせ）"
    save_to: null
    next_step: "各用件ルートの後続ステップへ分岐"
    retry_failure: "skip"
    notes: >
      reason空欄チェックが最優先。reason非空→即END_問い合わせ。reason空→classification分岐。
      params.moduleには前段の電話番号聴取サブフロー結果返却スクリプト（script_結果返却_電話番号）を指定する。
      ただしコンテキスト値（reason, classification）の読み出しが必要なため、
      generatorは前段にScriptモジュール（script_ルート判定）を配置し、
      saveContext2DBからreason/classificationを取得してOpenAIに渡す構成を検討すること。
      あるいはdeterministicなロジック（reason非空→問い合わせ, それ以外→classification値そのまま返却）を
      Scriptモジュール単体で実装することも可

  # 受診結果_曜日判定（着信日の曜日を判定）
  - step_name: "受診結果_曜日判定"
    tts_announcement: null
    input_method: null
    openai_rules:
      output_values: ["平日", "土日"]
      mapping:
        - input: "着信日が月〜金の場合"
          output: "平日"
        - input: "着信日が土・日の場合"
          output: "土日"
      no_result_condition: "判定不可（デフォルト平日）"
    save_to: null
    next_step: "平日→END_受診結果_平日 / 土日→END_受診結果_土日"
    retry_failure: "skip"
    notes: >
      曜日判定はdeterministicなロジック（new Date().getDay()で判定可能）のため、
      generatorはOpenAIモジュールではなくScriptモジュール（script_曜日判定）での実装を推奨する。
      スクリプト内で現在曜日を取得し、0(日)・6(土)→「土日」、それ以外→「平日」を$runner.setResult()で返却。
      OpenAIモジュールで実装する場合はparams.moduleの参照先が必要となるため、
      前段にScriptモジュールを配置して現在日時を出力させること

# --- セクション10: TTSモジュール一覧 ---
# IVRプロパティに記載するモジュール名の一覧。モジュール名とプロパティ名の完全一致が必須。
tts_modules:
  # === メインフロー: 冒頭チェーン ===
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内+用件選択（4択）"
    announcement: "お電話ありがとうございます。多根クリニックの健診予約専用AI電話です。ご用件を次の4つのうちの、いずれかでお話ください。1、健診の予約。2、日程変更・キャンセル。3、紹介状や受診結果の質問。4、その他お問い合わせ。それでは、お話ください。"
  - module_name: "時間外_アナウンス"
    purpose: "時間外案内"
    announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
  - module_name: "非通知_アナウンス"
    purpose: "非通知案内"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  # === メインフロー: 復唱確認 ===
  - module_name: "復唱_予約"
    purpose: "用件復唱確認（予約）"
    announcement: "健診の予約でよろしいですか？はい、または、いいえでお答えください。"
  - module_name: "復唱_変更キャンセル"
    purpose: "用件復唱確認（変更/キャンセル）"
    announcement: "日程変更・キャンセルでよろしいでしょうか？はい、または、いいえでお答えください。"
  - module_name: "復唱_紹介状受診結果"
    purpose: "用件復唱確認（紹介状/受診結果）"
    announcement: "紹介状や受診結果の質問でよろしいでしょうか？はい、または、いいえでお答えください。"
  - module_name: "復唱_問い合わせ"
    purpose: "用件復唱確認（問い合わせ）"
    announcement: "その他お問い合わせでよろしいでしょうか？はい、または、いいえでお答えください。"

  # === メインフロー: サブ選択 ===
  - module_name: "サブ選択_変更キャンセル"
    purpose: "変更/キャンセル2択選択"
    announcement: "次の2つのうちの、いずれかでお話ください。1、日程変更。2、キャンセル。それでは、お話ください。"
  - module_name: "サブ選択_紹介状受診結果"
    purpose: "紹介状/受診結果2択選択"
    announcement: "内容を、次の2つのうちの、いずれかでお話ください。1、紹介状の発行。2、受診結果の質問。それでは、お話ください。"

  # === メインフロー: 予約ルート固有 ===
  - module_name: "予約案内"
    purpose: "予約案内（情報提供のみ）"
    announcement: "これから、コースやご希望の受診日、オプションについてお伺いします。内容がお決まりの方は健康保険証をご用意の上、このままお進みください。まだお決まりでない方は、改めてご連絡ください。"
  - module_name: "保険者情報"
    purpose: "保険者情報聴取案内"
