    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（本フローでは use_acceptance_times: false のため通常未到達。安全装置として保持）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系終話: 携帯ルート ---
  - name: "END_受付完了_携帯"
    condition: "全聴取完了 + 携帯電話"
    tts_announcement: "ご用件を承りました。3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_携帯"

  # --- 正常系終話: その他（固定/その他）ルート ---
  - name: "END_受付完了_その他"
    condition: "全聴取完了 + 固定電話／その他"
    tts_announcement: "ご用件を承りました。3診療日以内に担当者から折り返しお電話いたします。お電話ありがとうございました。失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_その他"

# --- smsFlag 分岐設計 ---
sms_flag_routing:
  enabled: true
  routing_keys: ["phonetype"]
  patterns:
    - condition: "phonetype = 携帯"
      sms_flag: "1"
      notes: "携帯電話への SMS 送信あり。終話文言で「ショートメールにてご連絡」と明示。"
    - condition: "phonetype = その他（固定電話）"
      sms_flag: "-1"
      notes: "固定電話・その他は SMS 受信不可のため SMS 送信なし。終話文言から「ショートメール」表現を除外。"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  # Gen2 元資料に専用 RAG/FAQ サブフローの記載なし。
  # FAQ 対応は OpenAI プロンプト側で「FAQに記載がない質問は折返し対応とする」と指示する方針。
  # FAQ ライブラリ化（RAG サブフロー化）の要否は confirmation_items に記載。

