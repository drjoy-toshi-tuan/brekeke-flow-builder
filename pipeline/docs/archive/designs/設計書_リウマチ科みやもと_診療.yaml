    notes: "「改めて予約をお取りすることになります」と前置きして希望日 2 つを聴取。"

  - order: 6
    name: "希望日聴取_紹介状あり"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "preferredDate"
    openai_processing: "none"
    output_format: "text"
