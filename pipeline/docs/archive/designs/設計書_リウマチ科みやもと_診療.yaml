# --- セクション11: 特記事項・制約 ---
special_notes:
  - "完全予約制クリニック。「予約なしで受診できますか」には「完全予約制となります」と返答してから希望日を聴取（希望日聴取_予約なし受診 ブロック）。"
  - "Gen2 のルール「聴取内容の復唱禁止」を厳守。echo_back は全主フロー hearing で false。連絡先電話番号のみ電話番号聴取サブフロー内部で復唱（Gen2 仕様の telephone 形式復唱を Gen3 の Phone Normalization + Re-confirmation で代替実装）。"
  - "SSML タグ（<speak>/<break>/<say-as>）は元資料に多数登場するが Gen3 では全削除し、{tts_g:...} の自然文に置換。<break time='400ms'/> は読点・連続読みで吸収。"
  - "Pattern A（OpenAI 直後 enum 分岐）を全体方針として採用。echo_back・複数 context 組み合わせ要件がないため Pattern B は不要。"
  - "用件確認は 3 enum すべて同じ next（内容確認_詳細）を持つ縮退分岐。Gen2 では「変更」「キャンセル」も 予約 として扱うため、これらは OpenAI プロンプトで 予約 に丸め込む。"
  - "内容確認_詳細 の 9 詳細キーワード分岐は details への分類ラベル保存（「予約変更」「紹介状あり」等）。生発話は call recording 側で確認。これは Gen2 仕様（details に分類結果を残す）と整合する。"
  - "「今日診察」分岐のみ後段 症状聴取 で details を症状本文に上書き。これは Gen2 仕様（同一 context への 2 段書き込み）を踏襲。"
  - "preferredDate / diagnosisClinic は Gen2 function 定義の空白入りキー（'Preferred date' / 'diagnosis clinic'）から camelCase 統一に変換（director 判断）。Dr.JOY 側で表示名を Gen2 と揃えたい場合は context_name_jp を活用。"
  - "数字キーワード正規化（4=for/four を入れない、5,5=号と認識しない、よん/しー/Si/For→4、ご/ごお→5 等）は OpenAI プロンプト側で処理する。STT の profile_words ではなくプロンプトで明示する。"
  - "電話番号 3 回失敗時の強制終話文言（「ご回答の確認ができませんでしたので…」）は Gen2 では END_番号確認不可 として独立しているが、Gen3 ではサブフロー内のリトライ失敗を親フローへシグナルできない（CLAUDE.md 規定）。Brekeke IVR UI で電話番号聴取サブフロー内の retry_false パスに切断モジュールを手動追加する（confirmation_items 参照）。"
  - "終話文言は携帯／その他で 2 通り。携帯は SMS 送信あり「ショートメールにてご連絡」、その他は SMS 送信なし「お電話いたします」のみ。"
  - "FAQ 機能は OpenAI プロンプト内の FAQ ナレッジで対応する方針。RAG サブフロー化（rag_subflow パターン）は採用しない。FAQ ライブラリ化要否は要確認。"
  - "use_acceptance_times: false（Gen2 元資料に営業時間外対応の記述なし）。Dr.JOY 側で受付時間制御を有効化したい場合は別途確認。"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（Dr.JOY 施設ID）"
    resolved: false
    notes: "Dr.JOY 管理画面で確認"

  - item: "受付時間設定（Dr.JOY 側 acceptance_times の有効化要否）"
    resolved: false
    notes: |
      Gen2 元資料に営業時間外対応の記述なしのため use_acceptance_times: false に設定。
      Dr.JOY 側で営業時間制御を有効化したい場合は、フロー側を use_acceptance_times: true に変更し、
      Dr.JOY 管理画面で曜日・時間を設定する必要がある。

  - item: "[電話番号聴取] サブフロー内の retry 上限到達時に Gen2 の END_番号確認不可 文言→切断 を手動追加"
    status: "TODO"
    resolved: false
    notes: |
      Custom Jump to Flow からは親フローの END モジュールへ接続不可（CLAUDE.md 規定）。
      Brekeke IVR UI で「リウマチ科みやもと$電話番号聴取」サブフロー内の retry_false パスに、
      以下の TTS と 切断モジュールを手動追加する:
      TTS: 「ご回答の確認ができませんでしたのでこちらからお電話失礼させていただきます。それでは失礼いたします。」
      saveCompletionFlag2db: status="2", smsFlag="2"（Gen2 の代表案内 smsFlag=2 を踏襲する場合）または "-1"。
      Dr.JOY 側 Status 表示に応じて status="2"（代表案内）で問題ないか確認。

  - item: "Gen2 smsFlag enum（0/1/2）と Gen3 smsFlag 値（1/-1）の対応"
    resolved: false
    notes: |
      Gen2 は smsFlag を「status=1 → 1」「代表案内 → 2」「それ以外 → 0」で運用していた。
      Gen3 は本設計で「携帯 → 1」「その他 → -1」「異常系 → -1」に統合。
      Dr.JOY 側で Gen2 互換の smsFlag=2 を必要とするレコードがあれば、END_聴取失敗 / END_番号確認不可 等を
      smsFlag="2" に変更する必要がある。Dr.JOY 側運用の確認が必要。

  - item: "Gen2 endpoint enum（冒頭切断／時間外／電話転送／電話案内／途中切断／通話完了）の Gen3 対応"
    resolved: false
    notes: |
      Gen2 では endpoint context にエンドポイント種別を文字列で保存していた。Gen3 では status 数値で代替。
      Dr.JOY 側で endpoint 文字列を表示する画面がある場合、saveContextModel2DB に endpoint context を追加するか、
      status の rangeValues に Gen2 文字列を割り当て直すか確認。

  - item: "context_name camelCase 変換: 'Preferred date' → preferredDate, 'diagnosis clinic' → diagnosisClinic"
    resolved: false
    notes: |
      Gen2 function 定義は空白入りキーだったが、Brekeke IVR では context name に空白を含められないため
      camelCase に変換した（director 判断）。Dr.JOY 側で Gen2 互換の表示名（「希望日」「医療機関名/病名」）を
      表示できているか、データ移行があれば旧 key からの mapping が必要かを確認。

  - item: "FAQ ナレッジを OpenAI プロンプト内に持つか、RAG サブフローを別途構築するか"
    resolved: false
    notes: |
      Gen2 元資料に「FAQに記載がある質問はFAQを参照」「FAQに記載が無い質問は折返し対応」というルールが
      明記されているが、具体的な FAQ ナレッジの内容（アクセス／面会時間／費用 等）は元資料に含まれていない。
      OpenAI プロンプトに FAQ を埋め込む方針で進めるか、RAG サブフローを別途構築するか方針確認が必要。
      RAG 採用の場合は rag_subflow.pattern を 1（その他問合せ確認の前後に挿入）に変更する。

  - item: "Gen2 1-7「数字のキーワード」のフロー反映方針"
    resolved: false
    notes: |
      Gen2 では「いち→1」「にー/つー/ふー→2」「よん/しー/し/よー/C/Sea→4」等の細かい数字読み正規化が定義されている。
      Gen3 では電話番号聴取サブフロー（Phone Normalization）と OpenAI プロンプトの双方で対応するが、
      Gen2 と完全一致が必要かは要確認。基本は AmiVoice 標準辞書 + Phone Normalization の標準動作で十分と判断。

  - item: "詳細キーワード「キャンセル」系の Gen3 取扱い"
    resolved: false
    notes: |
      Gen2 では「契約キャンセル」を「キャンセル」と判断するルールがあるが、内容確認_詳細 の 9 enum には
      「キャンセル」相当の値がない。本設計では「予約変更」に統合してプロンプト指示するが、
      予約キャンセル系の自由発話を独立 enum「予約キャンセル」として追加するか方針確認。

  - item: "「もしもし」「もう一度」発話時のリトライ動作"
    resolved: false
    notes: |
      Gen2 では用件確認時に「もしもし」「もう一度」を聞き返し発話としてリトライに合流させる。
      Gen3 では OpenAI プロンプトで「これらは no_result として扱う」と指示してリトライへ。
      文言の細かい差異（「はい、聞こえております」等の追加メッセージ）が必要かどうか確認。

  - item: "SMS 送信文面（携帯ルート）"
    resolved: false
    notes: "Dr.JOY 管理画面で設定する SMS 文面（フローJSONには含まない）。「3 診療日以内に担当者からご連絡」相当の文面を設定するか確認。"

  - item: "認証設定（Dr.JOY 側）優先順位"
    resolved: false
    notes: "Dr.JOY 管理画面で設定。生年月日／電話番号 のどちらを優先認証キーとするかの確認（リウマチ科みやもと案件は診察券番号を聴取しないため、認証は生年月日と電話番号の組合せ）。"

  - item: "details への分類ラベル保存運用"
    resolved: false
    notes: |
      内容確認_詳細 hearing の出力（「予約変更」「紹介状あり」等の分類ラベル）が details に保存される。
      Gen2 では details に発話文を保存していたため、Dr.JOY オペレータの運用変更が必要。
      生発話を残したい場合は、内容確認_詳細 の output_format を text に変更し、
      別途 OpenAI 分岐ステップを挟む構成（Pattern B 的）に変更する必要がある。
