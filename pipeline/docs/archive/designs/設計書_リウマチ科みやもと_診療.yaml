      「今日診察」分類時のみ実行。症状本文を details に上書き保存（Gen2 仕様: 内容確認_詳細 の分類ラベル
      ではなく症状文を残す）。

  - order: 9
    name: "転院情報聴取"
    stt_type: "AmiVoice_STT"
