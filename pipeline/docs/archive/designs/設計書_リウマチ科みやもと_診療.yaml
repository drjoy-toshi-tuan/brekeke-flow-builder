# 設計書: リウマチ科みやもと — 診療
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/【診療1】：リウマチ科みやもと.md
# 移管ノート: docs/migration/gen2_リウマチ科みやもと_診療.md
# 移管日: 2026-04-27
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "リウマチ科みやもと"
  scenario_name: "診療"
  group_name: "リウマチ科みやもと"
  flow_name: "リウマチ科みやもと$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: ""                         # Gen2 元資料に折返し用代表電話の明示なし
  business_hours: "Gen2 元資料に営業時間外対応の記述なし。Dr.JOY 側で曜日・時間設定が必要な場合は別途確認。"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "リウマチ科みやもと$診療"
      role: "main"
      description: |
        リウマチ科みやもと（完全予約制クリニック）の AI 電話応答メインフロー。
        用件（予約／体調不良相談／問い合わせ）を分類し、内容詳細の 9 キーワード分岐で
        希望日／症状／転院情報を聴取した後、氏名・生年月日・電話番号のサブフロー連鎖
        を経て終話する。
  subflows:
    - name: "リウマチ科みやもと$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー。Gen2 の「復唱禁止」ルールに従い recitation=なし"
    - name: "リウマチ科みやもと$生年月日聴取"
      target: "生年月日聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        Gen2 ルール（「聴取内容の復唱禁止」）に従い recitation=なし に上書き。
        Gen3 の通常デフォルトは「あり」だが、本案件は 復唱禁止 が施設要件のため明示的に「なし」とする。
        和暦／西暦補正、未来日判定、2 桁年解釈ロジックは OpenAI プロンプト側に持たせる。
    - name: "リウマチ科みやもと$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        Gen2 で唯一復唱が許可されている項目（telephone 形式の専用復唱）。Gen3 では Phone Normalization +
        Re-confirmation で読み上げ復唱を実装。携帯/固定/その他の判別 (phonetype) を行い、終話分岐で参照。
        着信番号が 070/080/090/060 の場合は着信番号確認、それ以外（固定）は連絡先聴取の標準動作で吸収。

# --- セクション3: フローの目的 ---
purpose: |
  リウマチ科みやもと（完全予約制のリウマチ科専門クリニック）の電話受付を AI で自動化するフロー。
  患者からの電話を受け、用件（予約／体調不良による急な相談／その他お問い合わせ）を分類した上で、
  さらに 9 種類の詳細キーワード（予約変更／当日診察／予約忘れ／空き状況／予約なし受診／予約日欠席／
  紹介状あり／紹介状なし／転院希望）を判別し、希望日や症状、医療機関名と病名などの追加情報を聴取する。
  続けて氏名・生年月日・連絡先電話番号を個人情報サブフローで聴取し、最後に「その他お問い合わせ」を確認して、
  携帯／その他電話の種別に応じて SMS 送信有無を切り替えた終話アナウンスで通話を終了する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "リウマチ科みやもと$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知
            └─ 通常   → 冒頭_アナウンス
                          → 用件確認(hearing, enum, Pattern A 直接分岐)
                            └─ 予約 / 体調不良相談 / 問い合わせ → 内容確認_詳細

      内容確認_詳細(hearing, enum, save_to: details)
        ├─ 予約変更      → 希望日聴取_共通
        ├─ 今日診察      → 症状聴取
        ├─ 予約忘れ      → 希望日聴取_共通
        ├─ 空き状況      → 希望日聴取_共通
        ├─ 予約なし受診  → 希望日聴取_予約なし受診
        ├─ 予約日欠席    → 希望日聴取_予約日欠席
        ├─ 紹介状あり    → 希望日聴取_紹介状あり
        ├─ 紹介状なし    → 希望日聴取_紹介状なし
        ├─ 転院希望      → 転院情報聴取
        └─ その他/default → jump_氏名聴取（特別アナウンス無し）

      希望日聴取_共通          → jump_氏名聴取   (preferredDate)
      希望日聴取_予約なし受診  → jump_氏名聴取   (preferredDate)
      希望日聴取_予約日欠席    → jump_氏名聴取   (preferredDate)
      希望日聴取_紹介状あり    → jump_氏名聴取   (preferredDate)
      希望日聴取_紹介状なし    → jump_氏名聴取   (preferredDate)
      症状聴取                 → jump_氏名聴取   (details 上書き)
      転院情報聴取             → jump_氏名聴取   (diagnosisClinic)

      [個人情報サブフロー連鎖]
      jump_氏名聴取 → jump_生年月日聴取 → jump_電話番号聴取
        → その他問合せ確認(hearing, text, save_to: question)
            → 終話分岐_電話種別(CMR: phonetype)
                ├─ 携帯  → END_受付完了_携帯   (status=1, smsFlag=1)
                └─ その他 → END_受付完了_その他 (status=1, smsFlag=-1)
    notes: |
      - Pattern A（OpenAI 直後に enum 分岐）。echo_back は全ての主フロー hearing で false（Gen2「復唱禁止」ルール）。
      - 用件確認は 3 enum すべてが同じ next（内容確認_詳細）を持つ。Pattern A の縮退形でデフォルト直結も可だが、
        明示的に 3 値を列挙して classification を確実に保存する。
      - 詳細キーワード 9 種は 内容確認_詳細 hearing の enum で判別。details には分類ラベル
        （「予約変更」「紹介状あり」等）が保存される。生の発話は call recording 側で確認可。
      - 症状聴取は同じ details context に上書きするため、「今日診察」のケースのみ最終的に症状文が details
        に格納される（Gen2 仕様踏襲）。
      - 転院希望は単独の context (diagnosisClinic) に医療機関名と病名を保存。Gen2 では "diagnosis clinic"
        という空白入りキーだったが Gen3 では camelCase の diagnosisClinic を使用（director 判断）。
      - 希望日は 5 バリエーション（共通／予約なし受診／予約日欠席／紹介状あり／紹介状なし）でアナウンス文言が異なるが、
        save_to はすべて preferredDate で統一。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # =====================================================================
  # 冒頭 2 ブロック 1 セット
  # =====================================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: false              # Gen2 元資料に営業時間外対応の記述なし
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # =====================================================================
  # 用件確認（Pattern A: 3 値 → 全て 内容確認_詳細 へ）
  # =====================================================================
  - step: 用件確認
    type: hearing
    output_format: enum
    echo_back: false                         # Gen2「復唱禁止」ルール
    conditions:
      - match: "予約"
        next: 内容確認_詳細
      - match: "体調不良相談"
        next: 内容確認_詳細
      - match: "問い合わせ"
        next: 内容確認_詳細

  # =====================================================================
  # 内容確認_詳細（Pattern A: 9 詳細キーワード分岐 + その他 default）
  # =====================================================================
  - step: 内容確認_詳細
    type: hearing
    output_format: enum
    echo_back: false
    conditions:
      - match: "予約変更"
        next: 希望日聴取_共通
      - match: "今日診察"
        next: 症状聴取
      - match: "予約忘れ"
        next: 希望日聴取_共通
      - match: "空き状況"
        next: 希望日聴取_共通
      - match: "予約なし受診"
        next: 希望日聴取_予約なし受診
      - match: "予約日欠席"
        next: 希望日聴取_予約日欠席
      - match: "紹介状あり"
        next: 希望日聴取_紹介状あり
      - match: "紹介状なし"
        next: 希望日聴取_紹介状なし
      - match: "転院希望"
        next: 転院情報聴取
      - match: "default"
        next: jump_氏名聴取

  # =====================================================================
  # 希望日聴取（5 バリエーション）— すべて preferredDate に保存
  # =====================================================================
  - step: 希望日聴取_共通
    type: hearing
    output_format: text
    echo_back: false
    next: jump_氏名聴取

  - step: 希望日聴取_予約なし受診
    type: hearing
    output_format: text
    echo_back: false
    next: jump_氏名聴取

  - step: 希望日聴取_予約日欠席
    type: hearing
    output_format: text
    echo_back: false
    next: jump_氏名聴取

  - step: 希望日聴取_紹介状あり
    type: hearing
    output_format: text
    echo_back: false
    next: jump_氏名聴取

  - step: 希望日聴取_紹介状なし
    type: hearing
    output_format: text
    echo_back: false
    next: jump_氏名聴取

  # =====================================================================
  # 症状聴取（今日診察のみ）— details に上書き保存
  # =====================================================================
  - step: 症状聴取
    type: hearing
    output_format: text
    echo_back: false
    next: jump_氏名聴取

  # =====================================================================
  # 転院情報聴取（転院希望のみ）— diagnosisClinic に保存
  # =====================================================================
  - step: 転院情報聴取
    type: hearing
    output_format: text
    echo_back: false
    next: jump_氏名聴取

  # =====================================================================
  # 個人情報サブフロー（3 本連鎖。診察券番号サブフローは無し）
  # =====================================================================
  - step: jump_氏名聴取
    type: subflow
    flowname: "リウマチ科みやもと$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "リウマチ科みやもと$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "リウマチ科みやもと$電話番号聴取"
    next: その他問合せ確認

  # =====================================================================
  # その他問合せ確認（最終確認の自由発話聴取）
  # =====================================================================
  - step: その他問合せ確認
    type: hearing
    output_format: text
    echo_back: false
    next: 終話分岐_電話種別

  # =====================================================================
  # 終話分岐: 電話種別（携帯 / その他）で SMS 言及を切替
  # =====================================================================
  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_受付完了_携帯
      - match: "その他"
        next: END_受付完了_その他
      - match: "default"
        next: END_受付完了_その他

  # =====================================================================
  # 終話ブロック（受付完了 2 通り）
  # =====================================================================
  - step: END_受付完了_携帯
    type: termination
    termination_ref: "END_受付完了_携帯"

  - step: END_受付完了_その他
    type: termination
    termination_ref: "END_受付完了_その他"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "体調不良相談"
      - id: "3"
        order: "3"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分。Gen2 function 定義の 4 値（予約／体調不良相談／問い合わせ／空文字）から空文字を除外"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名聴取サブフローで保存"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "本フローでは聴取しない（リウマチ科みやもと案件は診察券番号聴取なし）。Dr.JOY 側のデフォルト項目として保持。"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "本フローでは聴取しない（リウマチ科専門のため）。Dr.JOY 側のデフォルト項目として保持。"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "和暦／西暦両対応。OpenAI プロンプトで 2 桁年・3 桁年の解釈ルールを実装"

  - context_name: "reason"
    context_name_jp: "理由"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "本フローでは聴取しない。Dr.JOY 側のデフォルト項目として保持。"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "本フローでは聴取しない（希望日は free text の preferredDate で保存）。Dr.JOY 側のデフォルト項目として保持。"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "電話番号聴取サブフローで保存（携帯着信時は着信番号を流用）"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "転送"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: |
      1=未処理（受付完了）、2=代表案内（聴取失敗・非通知）、3=転送（本フローでは未使用）、6=時間外（本フローでは use_acceptance_times: false のため通常未到達）。
      Gen2 の status 0 / 5 は Gen3 では使用禁止のため、対応する終話パターンは status=2 に変換。

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

  # --- 施設固有フィールド（itemDefault: false）---
  - context_name: "phonetype"
    context_name_jp: "電話種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "電話番号聴取サブフローで設定（携帯 / その他）。終話分岐で SMS 言及有無の切替に使用。"

  - context_name: "details"
    context_name_jp: "用件詳細"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: |
      内容確認_詳細 hearing で 9 詳細キーワード or 「その他」を分類して保存。
      「今日診察」ルートの場合のみ、後段 症状聴取 で症状本文に上書きされる（Gen2 仕様踏襲）。

  - context_name: "preferredDate"
    context_name_jp: "希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: |
      Gen2 function "Preferred date"（空白入り）を Gen3 では camelCase preferredDate に統一。
      希望日は自由発話のため text として保存（datetime 正規化はしない。Gen2 でも free word 保存）。

  - context_name: "diagnosisClinic"
    context_name_jp: "医療機関名／病名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: |
      Gen2 function "diagnosis clinic"（空白入り）を Gen3 では camelCase diagnosisClinic に統一。
      転院希望時のみ聴取し、「現在通院中の医療機関名」と「病名」を 1 つの text に保存。

  - context_name: "question"
    context_name_jp: "最後の問い合わせ"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "その他問合せ確認 hearing で保存。折返し時間の催促・看護師希望等の特殊応答は OpenAI プロンプトで対応。"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "体調不良相談"
      - "問い合わせ"
    notes: |
      DTMF 1=予約, 2=体調不良相談, 3=問い合わせ。
      Gen2 のキーワード補完ルール: 「印刷／定期／新薬／再診／最新／禁忌」「薬／お薬」→ 予約、
      「契約変更／契約法／契約キャンセル／変更／キャンセル」も 予約 として扱う（最終的に内容確認_詳細 で詳細分岐）。
      echo_back は施設要件「復唱禁止」により false 固定。

  - order: 2
    name: "内容確認_詳細"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約変更"
      - "今日診察"
      - "予約忘れ"
      - "空き状況"
      - "予約なし受診"
      - "予約日欠席"
      - "紹介状あり"
      - "紹介状なし"
      - "転院希望"
      - "その他"
    notes: |
      9 詳細キーワード + その他 を分類。OpenAI プロンプトに以下のキーワード補完を含める:
      - 予約変更: 「予約変更」「予約を変えたい」「変更したい」「契約変更」「契約法」
      - 今日診察: 「今日診てもらえますか」「今日診察」「今日見てほしい」「当日受診」
      - 予約忘れ: 「予約を忘れた」「忘れて行けなかった」
      - 空き状況: 「空き状況を知りたい」「予約の空きを教えて」「空いている時間」
      - 予約なし受診: 「予約なしで受診」「予約せずに行きたい」
      - 予約日欠席: 「予約日に行けなかった」「予約日に受診できなかった」
      - 紹介状あり: 「紹介状を持っている」「紹介状があります」
      - 紹介状なし: 「紹介状がない」「紹介状なくても受診」
      - 転院希望: 「転院希望」「転院したい」「他の病院から移りたい」
      - その他: 上記いずれにも該当しない発話

  - order: 3
    name: "希望日聴取_共通"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "preferredDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約変更／予約忘れ／空き状況の 3 ケース共通。「ご希望のお日にちを 2 つ」と促す自由発話聴取。"

  - order: 4
