    save_to: "question"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: |
      最終確認の自由発話聴取。OpenAI プロンプトに以下の特殊応答ルールを含める:
      - 「すぐに連絡ください」「急いで連絡」等 → 「内容を確認のうえ、緊急性を判断させていただきます」と返答してから question 保存
      - 「看護師に代わってほしい」等 → 「まずは AI が対応させていただきます」と返答してから question 保存
      - 折返し時間希望 → 「ご要望を承りました。ご希望に添えない場合もありますので、ご了承ください」と返答してから question 保存
      - 折返し時間質問 → 「順番に対応しておりますので、しばらくお待ちください」と返答してから question 保存
      - 何も無し → 空文字または「特になし」を保存して終話分岐へ

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。リウマチ科みやもと、AI電話です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "用件確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "用件確認"
    tts_announcement: "今日はどうされましたか？予約関連、体調不良による急な相談、その他お問い合わせ、から選んでお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "体調不良相談"
        - "問い合わせ"
      mapping:
        - input: "DTMF 1 / 「予約」「予約関連」「予約取得」「診察」「定期」「新薬」「再診」「最新」「禁忌」「薬」「お薬」「変更」「キャンセル」「契約変更」「契約法」「契約キャンセル」"
          output: "予約"
        - input: "DTMF 2 / 「体調不良」「体調不良による急な相談」「具合が悪い」「症状が出ている」（急な体調不良の相談）"
          output: "体調不良相談"
        - input: "DTMF 3 / 「問い合わせ」「その他」「質問」「聞きたいこと」（予約・体調不良以外）"
          output: "問い合わせ"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "classification"
    next_step: "内容確認_詳細"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "内容確認_詳細"
    tts_announcement: "それでは、内容を簡単にお聞かせいただけますか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約変更"
        - "今日診察"
        - "予約忘れ"
        - "空き状況"
        - "予約なし受診"
        - "予約日欠席"
        - "紹介状あり"
        - "紹介状なし"
        - "転院希望"
        - "その他"
      mapping:
        - input: "「予約を変更したい」「予約変更」「変更したい」「契約変更」「契約法」「日にち変更」"
          output: "予約変更"
        - input: "「今日診てもらえますか」「今日診察できますか」「今日見てほしい」「当日受診」"
          output: "今日診察"
        - input: "「予約を忘れて行けませんでした」「予約忘れ」「忘れて行けなかった」"
          output: "予約忘れ"
        - input: "「予約が空いている時間を教えてほしい」「予約の空き状況」「空いている時間」"
          output: "空き状況"
        - input: "「予約なしで受診できますか」「予約なしで行きたい」「予約せずに受診」"
          output: "予約なし受診"
        - input: "「予約日に受診できなかった」「予約日に行けなかった」「予約の日を欠席」"
          output: "予約日欠席"
        - input: "「他の病院からの紹介状をもっています」「紹介状あり」「紹介状を持っている」"
          output: "紹介状あり"
        - input: "「紹介状がなくても受診できますか」「紹介状なし」「紹介状を持っていない」"
          output: "紹介状なし"
        - input: "「転院希望です」「転院したい」「他院から移りたい」"
          output: "転院希望"
        - input: "上記 9 種いずれにも該当しない発話（一般質問・FAQ 質問等）"
          output: "その他"
      no_result_condition: |
        無発話（5秒以上の沈黙）。OpenAI が分類を確定できない場合は no_result とせず、
        「その他」に倒してデフォルト分岐に流す（Gen2「デフォルト: 氏名聴取」を踏襲）。
    save_to: "details"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "希望日聴取_共通"
    tts_announcement: "ご希望のお日にちを2つ教えてください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "preferredDate"
    next_step: "jump_氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "希望日聴取_予約なし受診"
    tts_announcement: "完全予約制となります。ご希望のお日にちを教えてください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "preferredDate"
    next_step: "jump_氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "希望日聴取_予約日欠席"
    tts_announcement: "改めて予約をお取りすることになります。ご希望のお日にちを2つ教えてください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "preferredDate"
    next_step: "jump_氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "希望日聴取_紹介状あり"
    tts_announcement: "初めての方ですね。ご希望のお日にちを2つ教えてください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "preferredDate"
    next_step: "jump_氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "希望日聴取_紹介状なし"
    tts_announcement: "はい、可能です。血液検査の結果とお薬手帳をご持参ください。予約をお取りします。ご希望のお日にちを2つ教えてください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "preferredDate"
    next_step: "jump_氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "症状聴取"
    tts_announcement: "いつからどのような症状があるかを教えてください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "details"
    next_step: "jump_氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "転院情報聴取"
    tts_announcement: "現在、通院中の医療機関名と病名を教えてください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "diagnosisClinic"
    next_step: "jump_氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "その他問合せ確認"
    tts_announcement: "そのほかに何かお問い合わせは有りませんか？"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「すぐに連絡ください」「急いで連絡」「返事を急いで」"
          output: "内容を確認のうえ、緊急性を判断させていただきます。恐れ入りますが、ご連絡をお待ちください。 + 発話内容を question に保存"
        - input: "「看護師に代わってほしい」「看護師と話したい」"
          output: "まずはAIが対応させていただきます。恐れ入りますがご連絡をお待ちください。 + 発話内容を question に保存"
        - input: "「〇時頃に折返し希望」（時間指定）"
          output: "ご要望を承りました。ご希望に添えない場合もありますので、ご了承ください。 + 発話内容を question に保存"
        - input: "「折返しの時間はいつ？」（折返し時間質問）"
          output: "順番に対応しておりますので、しばらくお待ちください。 + 発話内容を question に保存"
