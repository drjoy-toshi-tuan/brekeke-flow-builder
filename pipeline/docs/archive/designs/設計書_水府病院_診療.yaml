  - "Gen2→Gen3移管案件。Gen2プロンプトの全ルート（6パターン+フリー聴取）を第3世代フロー構造に変換"
  - "日程確認（DAYCHECK）が冒頭にある特殊構成。冒頭アナウンスと日程確認が一体化した発話"
  - "TYPE（種類）は再質問なし。1/2以外はすべて「その他」→確認内容フリーへ遷移"
  - "PURPOSE（用件）は再質問あり（最大2回、合計3トライ）。上限到達→フリー聴取ルート"
  - "診療科グループ化: 内科系4科→「内科」、外科系4科→「外科」。OpenAIプロンプトで正規化"
  - "リハビリテーション科・発熱外来・健診 → AI電話非対応。代表案内（0293095000、つながったら1番）"
  - "当日/翌営業日ガード: 予約希望日・予約日にキーワード検出で代表案内に強制分岐"
  - "初診ルートのみ性別聴取あり（メインフロー内。氏名サブフロー後、生年月日サブフロー前）"
  - "初診ルートは診察券番号サブフローを呼ばない"
  - "初診ルートのみ紹介医療機関名を聴取"
  - "人間ドック予約では第二希望を聞いてはいけない（人間ドック変更の場合は可）"
  - "smsFlag分岐: 電話番号サブフロー返却値（携帯/その他）で終話パターンを切り替え"
  - "連絡方法: 携帯番号（060/070/080/090）の場合のみ聴取。050は携帯に含めない"
  - "代表電話番号の読み上げ: 0293095000（SSMLタグはprompterが設定）"
  - "RAGサブフロー: パターン2（全終話前に配置）。Gen2の2-6「そのほかに何かお問い合わせは?」に相当"
  - "個人情報サブフローはCLAUDE.md Rule 9準拠。bivrリファレンスを完全コピー"
  - "全STTモジュールのTIMEOUT/ERRORは、対応するリトライカウンター（Speech Retry Counter）に接続する。フロー図ではNO_RESULTのみ明示しているが、TIMEOUT/ERRORも同一のリトライカウンターに接続すること"
  - "Gen2のcheckout/endpoint/smsFlagフィールドはsaveContextModel2DBに含めない（saveCompletionFlag2dbパラメータ）"
  - "複合発話（例: 「予約を取りたいんですが、内科です」）が入力された場合は、各OpenAIモジュールが当該ステップの情報のみを抽出する。次ステップの情報が含まれていても破棄して再聴取する"

