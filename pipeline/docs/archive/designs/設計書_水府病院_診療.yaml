# --- セクション3: フローの目的 ---
purpose: >
  水府病院の予約専用AI電話。患者からの着信に対し、まず本日/翌診療日の予約かどうかを確認し
  （該当時は代表案内）、問い合わせの種類（診療・検査/人間ドック/その他）と用件（予約/変更/
  キャンセル/確認）を聴取した後、ルート別に診療科・受診歴・予約日・予約希望日等を聴取し、
  個人情報（診察券番号・氏名・生年月日・電話番号）をサブフローで収集して折り返し受付を自動化する。
  リハビリテーション科・発熱外来・健診はAI電話非対応のため代表案内に誘導する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "水府病院$診療_20260408"
    diagram: |
      ====== 冒頭チェーン ======
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2,smsFlag=-1) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6,smsFlag=-1) → 切断
                        └─ 受付可(true) → 冒頭_日程確認(TTS)

      ====== DAYCHECK（日程確認）======
      冒頭_日程確認(TTS)
        → 入力_日程確認(AmiVoice STT)
        → OpenAI_日程確認(classify: はい/いいえ)
            ├─ はい → 完了フラグ_代表案内_本日翌診療日(status=2,smsFlag=-1) → END_代表案内_本日翌診療日(TTS) → 切断
            ├─ いいえ → 種類_TYPE(TTS)
            └─ NO_RESULT → リトライ_日程確認
                             ├─ Retry → 冒頭_日程確認(TTS)
                             └─ No more → 種類_TYPE(TTS)  ※上限到達=NOとみなしTYPEへ

      ====== TYPE（種類）======
      種類_TYPE(TTS)
        → 入力_種類(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_種類(classify: 診療検査/人間ドック/その他)
            ├─ 診療検査 → saveContext_種類(classification2="診療・検査") → 用件_PURPOSE(TTS)
            ├─ 人間ドック → saveContext_種類(classification2="人間ドック") → 用件_PURPOSE(TTS)
            ├─ その他 → saveContext_種類(classification="登録なし",classification2="聴取失敗") → 確認内容_フリー(TTS)
            └─ NO_RESULT → saveContext_種類_失敗(classification="登録なし",classification2="聴取失敗") → 確認内容_フリー(TTS)
      ※TYPEは再質問なし（1/2に正規化できない入力はすべて「その他」として確定）

      ====== PURPOSE（用件）======
      用件_PURPOSE(TTS)
        → 入力_用件(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_用件(classify: 予約/変更/キャンセル/確認)
            ├─ 予約 → 分岐_予約ルート(classification2ベースで分岐)
            │         ├─ 人間ドック → saveContext(classification="人間ドック予約") → 胃カメラ希望(TTS)
            │         └─ 診療検査 → 受診歴(TTS)
            ├─ 変更 → saveContext(classification="変更") → 診療科_変更キャンセル(TTS)
            ├─ キャンセル → saveContext(classification="キャンセル") → 診療科_変更キャンセル(TTS)
            ├─ 確認 → saveContext(classification="確認") → 確認内容_確認(TTS)
            └─ NO_RESULT → リトライ_用件
                             ├─ Retry → 用件_PURPOSE(TTS)
                             └─ No more → saveContext(classification="登録なし",classification2="聴取失敗") → 確認内容_フリー(TTS)

      ====== 診療・検査 予約ルート ======
      --- 受診歴確認 ---
      受診歴(TTS)
        → 入力_受診歴(AmiVoice STT)
        → OpenAI_受診歴(classify: 初診/再診)
            ├─ 初診 → saveContext(classification="初診") → 医療機関名(TTS)
            ├─ 再診 → saveContext(classification="再診") → 診療科_予約(TTS)
            └─ NO_RESULT → リトライ_受診歴
                             ├─ Retry → 受診歴(TTS)
                             └─ No more → saveContext(classification="再診") → 診療科_予約(TTS)  ※不明時は再診扱い

      --- 初診ルート ---
      医療機関名(TTS)
        → 入力_医療機関名(AmiVoice STT)
        → OpenAI_医療機関名(normalize: free_text) → saveContext_医療機関名
        → 診療科_予約(TTS)

      --- 診療科聴取（予約: 初診/再診共通）---
      診療科_予約(TTS: "受診を希望される診療科をお話ください。")
        → 入力_診療科_予約(AmiVoice STT + profile_words)
        → OpenAI_診療科_予約(classify)
            ├─ リハビリテーション科 → saveContext(clinicalDepartment) → 完了フラグ_代表案内_診療科不可(status=2,smsFlag=-1) → END_代表案内_診療科不可(TTS) → 切断
            ├─ 発熱外来 → 同上
            ├─ 健診 → 同上
            ├─ {正常な診療科} → saveContext(clinicalDepartment) → 予約希望日(TTS) ※初診/再診で文言共通
            ├─ 登録なし → saveContext(clinicalDepartment="登録なし") → 予約希望日(TTS)
            └─ NO_RESULT → リトライ_診療科_予約
                             ├─ Retry → 診療科_予約(TTS)
                             └─ No more → saveContext(clinicalDepartment="登録なし") → 予約希望日(TTS)

      --- 予約希望日（初診/再診共通）---
      予約希望日_予約(TTS: "予約希望のお日にちを「4月1日」のように日付でお話しください。")
        → 入力_予約希望日_予約(AmiVoice STT)
        → OpenAI_予約希望日_予約(normalize: free_text + 当日翌営業日検出)
            ├─ 当日翌営業日 → 完了フラグ_代表案内_本日翌診療日(status=2,smsFlag=-1) → END_代表案内_本日翌診療日(TTS) → 切断
            └─ valid → saveContext(preferred_date)
                        → [初診] 氏名サブフロー → 性別_聴取 → 生年月日サブフロー → 電話番号サブフロー
                        → [再診] 診察券番号サブフロー → 氏名サブフロー → 生年月日サブフロー → 電話番号サブフロー

      ====== 人間ドック予約ルート ======
      胃カメラ希望(TTS)
        → 入力_胃カメラ(AmiVoice STT)
        → OpenAI_胃カメラ(classify: 希望する/希望しない/その他)
        → saveContext(EGD)
        → 予約希望日_人間ドック(TTS: "平日で、受診を希望されている日付や時期を、複数教えていただけますか？")
            → 入力_予約希望日_人間ドック(AmiVoice STT)
            → OpenAI_予約希望日_人間ドック(normalize + 当日翌営業日検出)
                ├─ 当日翌営業日 → 完了フラグ_代表案内_本日翌診療日 → END_代表案内_本日翌診療日(TTS) → 切断
                └─ valid → saveContext(preferred_date)
                            → 診察券番号サブフロー → 氏名サブフロー → 生年月日サブフロー → 電話番号サブフロー

      ====== 変更ルート ======
      診療科_変更キャンセル(TTS: "予約票に記載されている診療科をお話ください。")
        → 入力_診療科_変更キャンセル(AmiVoice STT + profile_words)
        → OpenAI_診療科_変更キャンセル(classify)
            ├─ リハビリテーション科/発熱外来/健診 → 代表案内_診療科不可 → 切断
            ├─ {正常な診療科/登録なし} → saveContext(clinicalDepartment) → 予約日(TTS)
            └─ NO_RESULT → リトライ_診療科_変更キャンセル → Retry/No more

      予約日(TTS: "現在の予約日を「4月1日」のように日付でお話しください。")
        → 入力_予約日(AmiVoice STT)
        → OpenAI_予約日(normalize: date + 当日翌営業日検出)
            ├─ 当日翌営業日 → 完了フラグ_代表案内_本日翌診療日 → END → 切断
            └─ valid → saveContext(reservationDate)
                        → [変更の場合] 予約希望日_変更(TTS: "平日で、受診を希望されている日付をお話しください。複数あれば第二希望までお話しください。")
                                         → saveContext(preferred_date) → 診察券番号サブフロー → 氏名 → 生年月日 → 電話番号
                        → [キャンセルの場合] 診察券番号サブフロー → 氏名 → 生年月日 → 電話番号

      ====== 確認/フリー聴取ルート ======
      確認内容_確認(TTS) / 確認内容_フリー(TTS)
        (共通文言: "ご確認内容についてお伺いします。次回の予約日時を教えて欲しい、など、内容を簡潔にお話しください。")
        → 入力_確認内容(AmiVoice STT)
        → OpenAI_確認内容(normalize: free_text) → saveContext(reason)
        → 診察券番号サブフロー → 氏名サブフロー → 生年月日サブフロー → 電話番号サブフロー

      ====== 個人情報サブフロー合流 → 連絡方法 → RAG → 終話 ======
      [電話番号サブフロー返却値で分岐]
        ├─ 携帯(1) → 連絡方法(TTS: "当院からのご連絡は、電話またはショートメッセージの、どちらがよろしいでしょうか？")
        │              → 入力_連絡方法(AmiVoice STT) → OpenAI_連絡方法 → saveContext(contact_method)
        │              → RAGサブフロー(全終話前) → 終話_携帯あり
        └─ その他(2) → RAGサブフロー(全終話前) → 終話_通常

      ====== 終話チェーン ======
      終話_携帯あり:
        完了フラグ_終話_携帯あり(status=1,smsFlag=1) → END_終話_携帯あり(TTS) → 切断

      終話_通常:
        完了フラグ_終話_通常(status=1,smsFlag=-1) → END_終話_通常(TTS) → 切断

      ====== メインフロー内の全終話パターン ======
      END_代表案内_本日翌診療日(status=2,smsFlag=-1) → 切断
      END_代表案内_聴取失敗(status=2,smsFlag=-1) → 切断  ※電話番号サブフロー内で聴取失敗時
      END_代表案内_診療科不可(status=2,smsFlag=-1) → 切断
      END_終話_携帯あり(status=1,smsFlag=1) → 切断
      END_終話_通常(status=1,smsFlag=-1) → 切断
      END_時間外(status=6,smsFlag=-1) → 切断
      END_非通知(status=2,smsFlag=-1) → 切断
    notes: |
      冒頭チェーン: wait → saveContextModel2DB → incoming-classifier → acceptance_times の標準構成。
      ルート分岐が非常に多い（6パターン+フリー聴取）。
      初診ルートのみ性別聴取がメインフロー内に入る（氏名サブフロー後、生年月日サブフロー前）。
      初診ルートのみ診察券番号サブフローを呼ばない。
      当日/翌営業日ガード: 予約希望日・予約日のOpenAIモジュールに「当日翌営業日」出力ラベルを追加し、代表案内ルートへ分岐。
      キャンセルルートと変更ルートは診療科TTS後の分岐で予約日→（変更のみ予約希望日）と分かれる。
      分岐_予約ルート（PURPOSE後）は ContextMatchRouter で classification2（種類ステップの結果）を参照し、人間ドック/診療検査に分岐する。
      予約希望日_予約後の初診/再診分岐は ContextMatchRouter で history（受診歴の保存値）を参照し、初診ルート/再診ルートに分岐する。

