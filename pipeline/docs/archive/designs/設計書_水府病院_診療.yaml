# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "日程確認"
    tts_announcement: "お電話ありがとうございます。水府病院の、予約専用、AI電話です。まず初めに、今回のお問い合わせは、本日または翌診療日の予約に関する内容ですか？はい、そうです、または、いいえ、ちがいます、でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "REF.YES_TERMS（はい/肺/以上です 等）"
          output: "はい"
        - input: "REF.NO_TERMS（いいえ/違います 等）"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "はい→代表案内_本日翌診療日終話、いいえ→種類_TYPE"
    retry_failure: "skip"  # 上限到達=NOとみなし種類_TYPEへ遷移

  - step_name: "種類"
    tts_announcement: "かしこまりました。お問い合わせ内容を、次の 3 つの、いずれかでお話ください。1.診療または検査、2.人間ドック、3.その他、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "診療検査"
        - "人間ドック"
        - "その他"
      mapping:
        - input: "DTMF 1 または「診療」「検査」「診察」を含む"
          output: "診療検査"
        - input: "DTMF 2 または「人間ドック」「ドック」を含む"
          output: "人間ドック"
        - input: "DTMF 3 または上記いずれにも該当しない"
          output: "その他"
      no_result_condition: "該当なし（すべて「その他」に分類）"
    save_to: "classification2"
    next_step: "診療検査/人間ドック→用件_PURPOSE、その他→確認内容_フリー"
    retry_failure: "skip"  # 再質問なし。確認内容_フリーへ遷移

  - step_name: "用件"
    tts_announcement: "ご用件を、次の 4 つのうちの、いずれかでお話ください。1.予約を取る、2.変更、3.キャンセル、4.確認、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「予約したい」「薬」「契約」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「変えたい」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「取り消し」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」「確かめたい」を含む"
          output: "確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→分岐_予約ルート、変更→診療科_変更キャンセル、キャンセル→同、確認→確認内容"
    retry_failure: "skip"  # classification=登録なしで確認内容_フリーへ遷移

  - step_name: "受診歴"
    tts_announcement: "当院でのご受診は初めてですか？ はい、そうです、または、いいえ、違います、でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "初診"
        - "再診"
        - "NO_RESULT"
      mapping:
        - input: "REF.YES_TERMS"
          output: "初診"
        - input: "REF.NO_TERMS"
          output: "再診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "history"
    next_step: "初診→医療機関名、再診→診療科_予約"
    retry_failure: "skip"  # 不明時は再診扱いで診療科_予約へ遷移

  - step_name: "紹介医療機関名"
    tts_announcement: "紹介状をお持ちの場合は、紹介元の医療機関名をお話ください。お持ちでない場合は「持っていない」のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "医療機関名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト"
      no_result_condition: "なし（発話内容をそのまま保存）"
    save_to: "introduction"
    next_step: "診療科_予約"
    retry_failure: "skip"

  - step_name: "胃カメラ希望"
    tts_announcement: "胃カメラ検査を希望されますか？ はい、または、いいえ、でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "希望する"
        - "希望しない"
      mapping:
        - input: "REF.YES_TERMS"
          output: "希望する"
        - input: "REF.NO_TERMS"
          output: "希望しない"
      no_result_condition: "判定不能（テキストのまま保存）"
    save_to: "EGD"
    next_step: "予約希望日_人間ドック"
    retry_failure: "skip"

  - step_name: "診療科_予約"
    tts_announcement: "受診を希望される診療科をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "外科"
        - "整形外科"
        - "リハビリテーション科"
        - "発熱外来"
        - "健診"
        - "登録なし"
        - "NO_RESULT"
      mapping:
        - input: "呼吸器内科/消化器内科/循環器内科/一般内科/内科"
          output: "内科"
        - input: "甲状腺外科/消化器外科/乳腺外科/一般外科/外科"
          output: "外科"
        - input: "整形外科/整形"
          output: "整形外科"
        - input: "リハビリテーション科/リハビリ"
          output: "リハビリテーション科"
        - input: "発熱外来/発熱/風邪"
          output: "発熱外来"
        - input: "健診"
          output: "健診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "リスト外の診療科名"
    save_to: "clinicalDepartment"
    next_step: "リハビリ/発熱/健診→代表案内_診療科不可、それ以外→予約希望日"
    retry_failure: "skip"  # clinicalDepartment=登録なしで予約希望日へ遷移

  - step_name: "診療科_変更キャンセル"
    tts_announcement: "予約票に記載されている診療科をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "外科"
        - "整形外科"
        - "リハビリテーション科"
        - "発熱外来"
        - "健診"
        - "登録なし"
        - "NO_RESULT"
      mapping:
        - input: "診療科_予約と同一マッピング"
          output: "同上"
      no_result_condition: "リスト外の診療科名"
    save_to: "clinicalDepartment"
    next_step: "リハビリ/発熱/健診→代表案内_診療科不可、それ以外→予約日(変更/キャンセル)"
    retry_failure: "skip"  # clinicalDepartment=登録なしで予約日へ遷移

  - step_name: "予約日"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "valid"
        - "当日翌営業日"
        - "NO_RESULT"
      mapping:
        - input: "有効な日付（yyyy-MM-dd 00:00:00 形式に変換）"
          output: "valid"
        - input: "今日/本日/明日/翌日/当日/翌診療日 等のキーワード"
          output: "当日翌営業日"
        - input: "日付として解析不能"
          output: "NO_RESULT"
      no_result_condition: "日付として解析不能"
    save_to: "reservationDate"
    next_step: "当日翌営業日→代表案内、valid→予約希望日(変更)/診察券番号(キャンセル)"
    retry_failure: "skip"

  - step_name: "予約希望日_予約"
    tts_announcement: "予約希望のお日にちを「4月1日」のように日付でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "valid"
        - "当日翌営業日"
      mapping:
        - input: "日付または時期のフリーテキスト"
          output: "valid"
        - input: "今日/本日/明日/翌日/当日/翌診療日 等のキーワード"
          output: "当日翌営業日"
      no_result_condition: "なし（フリーテキスト保存）"
    save_to: "preferred_date"
    next_step: "当日翌営業日→代表案内、valid→個人情報サブフロー"
    retry_failure: "skip"

  - step_name: "予約希望日_変更"
    tts_announcement: "平日で、受診を希望されている日付をお話しください。複数あれば第二希望までお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "valid"
        - "当日翌営業日"
      mapping:
        - input: "予約希望日_予約と同一"
          output: "同上"
      no_result_condition: "なし"
    save_to: "preferred_date"
    next_step: "当日翌営業日→代表案内、valid→診察券番号サブフロー"
    retry_failure: "skip"

  - step_name: "予約希望日_人間ドック"
    tts_announcement: "平日で、受診を希望されている日付や時期を、複数教えていただけますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "valid"
        - "当日翌営業日"
      mapping:
        - input: "予約希望日_予約と同一"
          output: "同上"
      no_result_condition: "なし"
    save_to: "preferred_date"
    next_step: "当日翌営業日→代表案内、valid→診察券番号サブフロー"
    retry_failure: "skip"

  - step_name: "確認内容"
    tts_announcement: "ご確認内容についてお伺いします。次回の予約日時を教えて欲しい、など、内容を簡潔にお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "テキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト"
      no_result_condition: "なし（発話内容をそのまま保存）"
    save_to: "reason"
    next_step: "診察券番号サブフロー"
    retry_failure: "skip"

  - step_name: "性別"
    tts_announcement: "患者さんの性別をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "男性"
        - "女性"
        - "NO_RESULT"
      mapping:
        - input: "男/男性/おとこ"
          output: "男性"
        - input: "女/女性/おんな"
          output: "女性"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "判定不能。NO_RESULT時は性別未設定のまま生年月日サブフローへ続行（genderコンテキストは空のまま）"
    save_to: "gender"
    next_step: "NO_RESULT含む全出力 → 生年月日サブフロー（性別未設定でも次ステップに続行）"
    retry_failure: "skip"

  - step_name: "連絡方法"
    tts_announcement: "当院からのご連絡は、電話またはショートメッセージの、どちらがよろしいでしょうか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "電話"
        - "ショートメッセージ"
      mapping:
        - input: "電話/でんわ/通話"
          output: "電話"
        - input: "SMS/ショートメッセージ/ショートメール/メッセージ/SNS"
          output: "ショートメッセージ"
      no_result_condition: "判定不能（1回再質問後はデフォルト保存）"
    save_to: "contact_method"
    next_step: "RAGサブフロー → 終話_携帯あり"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  - name: "END_終話_携帯あり"
    condition: "全聴取完了 かつ 携帯電話番号（060/070/080/090）"
    tts_announcement: "かしこまりました。通話終了後、いまお話しいただいた内容のショートメッセージを送信いたしますので、必ずご確認のうえ、必要に応じて修正をお願いいたします。3診療日以内に、担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_終話_携帯あり"

  - name: "END_終話_通常"
    condition: "全聴取完了 かつ 携帯番号以外（固定電話/IP電話等）"
    tts_announcement: "かしこまりました。3診療日以内に、担当者よりお電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_終話_通常"

  - name: "END_代表案内_本日翌診療日"
    condition: "DAYCHECK=はい、または予約希望日/予約日に当日/翌営業日を検出"
    tts_announcement: "申し訳ございません。本日と翌診療日のご予約に関しては、こちらのAI電話ではお受けできません。恐れ入りますが、代表電話までおかけなおしください。番号は、0293095000です。つながりましたら、1番を選択してください。繰り返します。番号は、0293095000です。つながりましたら、1番を選択してください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内_本日翌診療日"

  - name: "END_代表案内_聴取失敗"
    condition: "電話番号聴取のリトライ上限到達"
    tts_announcement: "お手数をおかけいたします。代表電話にて承りますので、恐れ入りますが、代表電話までおかけなおしください。番号は、0293095000です。つながりましたら、1番を選択してください。繰り返します。番号は、0293095000です。つながりましたら、1番を選択してください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内_聴取失敗"

  - name: "END_代表案内_診療科不可"
    condition: "診療科がリハビリテーション科/発熱外来/健診"
    tts_announcement: "申し訳ございません。<% clinicalDepartment %>は、AI電話では承ることができません。恐れ入りますが、代表電話までおかけなおしください。番号は、0293095000です。つながりましたら、1番を選択してください。繰り返します。番号は、0293095000です。つながりましたら、1番を選択してください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内_診療科不可"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"          # 電話番号サブフローの返却値（1=携帯, 2=その他）
  patterns:
    - condition: "電話番号サブフロー返却値=1（携帯）"
      sms_flag: "1"
      notes: "END_終話_携帯あり ルートへ。連絡方法聴取を経由"
    - condition: "電話番号サブフロー返却値=2（その他）"
      sms_flag: "-1"
      notes: "END_終話_通常 ルートへ。連絡方法聴取をスキップ"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"                      # パターン2: 全終話前に「最後にご質問は?」RAGサブフロー
  inquiry_insertion_point: ""       # パターン1は不使用（問い合わせ専用ルートがないため）
  pre_termination: true             # 正常完了終話の前にのみRAGサブフローを配置
  pre_termination_targets:          # RAGサブフロー配置対象の終話パターン（明示指定）
    - "END_終話_携帯あり"
    - "END_終話_通常"
  pre_termination_excludes_note: "代表案内（本日翌診療日/聴取失敗/診療科不可）・時間外・非通知の終話パスにはRAGサブフローを配置しない"

