# --- セクション11: 特記事項・制約 ---
special_notes:
  - "問合せ/相談窓口専用フロー。患者氏名・生年月日・電話番号・診察券番号の聴取は一切行わない。Dr.JOY 予約 API 連携も行わない（API_DRJOY はコンテキスト設定用途のみ）"
  - "担当者個別番号（大城実/大城尚幸/下地光太郎/下地碧生/山城碧生 の 5 名）は『担当者へ転送』call_transfer ブロックに集約。Brekeke IVR UI 側で staffName コンテキストを参照して個別番号に分岐させる、または共通転送番号で運用する判断が必要（NON-BLOCKER N-3）"
  - "看護師窓口への転送は『看護師窓口へ転送』call_transfer。staffName == '山城諒子' のときに担当者種別判定（context_match_router）から分岐"
  - "医療福祉相談室固定電話 098-923-2647 への転送は『代表電話へ転送』call_transfer。担当者名聴取で『わからない』と答えたケースのみ到達"
  - "受付時間カレンダー（月〜金 8:30〜17:00 / 土 8:30〜12:30、日祝・年末年始 12/31〜1/4 休業）は Dr.JOY 管理画面の acceptance_times スケジュールで設定。フローでは acceptance_times モジュールの配置のみ"
  - "Gen1 にあった『担当者は〇〇でよろしいですか？』の最終復唱は Gen3 では省略している（NON-BLOCKER N-1）"
  - "Gen1 にあった転送失敗時の多段フォールバック（担当者→代表→『混みあっている』案内）は Gen3 では END_転送失敗 単段に統一（NON-BLOCKER N-2）"
  - "Gen1 にあった年末年始固有文言（『1月5日の8時30分より開始いたします』）は END_時間外 で兼用（NON-BLOCKER N-4）"
  - "Gen1 にあった聴取失敗時の代表電話フォールバック（3 回失敗で 098-923-2647 へ転送）は Gen3 では END_聴取失敗 で切断（NON-BLOCKER N-6）"
  - "DTMF 入力対応なし（Gen1 から踏襲）。すべて AmiVoice STT 音声入力"
  - "リトライ回数は全聴取ステップ 3 回上限（Gen1 の count再質問_1〜_6 を踏襲）"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（Dr.JOY 管理画面で確認）"
    resolved: false
  - item: "着信用 050 番号（IVR プロパティで設定。設計書には不要）"
    resolved: false
  - item: "担当者個別転送先番号（大城実/大城尚幸/下地光太郎/下地碧生/山城碧生 の 5 名分）"
    resolved: false
  - item: "看護師窓口の転送先番号"
    resolved: false
  - item: "代表電話 098-923-2647 への転送設定（call_transfer『代表電話へ転送』の number パラメータ）"
    resolved: false
  - item: "Gen1 の担当者最終復唱（『担当者は〇〇でよろしいですか？』）を Gen3 でも残すか、省略するか（NON-BLOCKER N-1）"
    resolved: false
  - item: "Gen1 の転送失敗多段フォールバック（担当者→代表→『混みあっている』）を Gen3 でも残すか、END_転送失敗 単段で良いか（NON-BLOCKER N-2）"
    resolved: false
  - item: "担当者個別番号への分岐実装（複数 call_transfer 配置 vs IVR プロパティで動的決定）の判断（NON-BLOCKER N-3）"
    resolved: false
  - item: "年末年始固有アナウンス（『1月5日の8時30分より開始』）を専用 termination として作るか、END_時間外 兼用で良いか（NON-BLOCKER N-4）"
    resolved: false
  - item: "聴取失敗時の代表電話フォールバック（Gen1 では 3 回失敗で 098-923-2647 転送）を Gen3 でも残すか、END_聴取失敗 で切断で良いか（NON-BLOCKER N-6）"
    resolved: false
