# 設計書 -- 中部徳洲会病院 医療福祉相談室
# 生成元: @director エージェント
# 生成日: 2026/04/27
# 確認レポート: docs/designs/確認レポート_中部徳洲会病院_医療福祉相談室_20260427.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "中部徳洲会病院"
  scenario_name: "医療福祉相談室"
  group_name: "中部徳洲会病院"
  flow_name: "中部徳洲会病院$医療福祉相談室"
  target_facility: "中部徳洲会病院（医療福祉相談室）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"          # 着信用 050 番号は IVR プロパティで設定
  business_hours: "祝日除く月〜金 8:30〜17:00 / 土 8:30〜12:30（年末年始 12/31〜1/4 休業）"
  flow_type: "1flow"                   # 個人情報聴取サブフローは使用しない（問合せ/相談窓口のため）
  work_type: "gen1_migration"
  environment: "prod"

  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# 問合せ/相談窓口のため、患者氏名・生年月日・電話番号・診察券番号の聴取は一切行わない。
# 個人情報サブフロー（PatientName / DOB / Phone / MedicalCard）は使用しない。
# RAG 検索サブフローも使用しない（FAQ ではなく担当者直接転送が主機能のため）。
flow_structure:
  type: "1flow"
  flows:
    - name: "中部徳洲会病院$医療福祉相談室"
      role: "main"
      description: "冒頭挨拶 → 受付時間判定 → 担当者名聴取（5 ルート分岐） → 担当者個別/看護師/代表電話のいずれかへ転送"
  subflows: []

# --- セクション3: フローの目的 ---
purpose: "中部徳洲会病院 医療福祉相談室の問合せ専用 AI 電話。受付時間を判定したうえで担当者名（大城/下地/山城/その他/わからない）を聴取し、特定担当者または看護師窓口、医療福祉相談室固定電話（098-923-2647）に転送する。患者属性聴取・予約 API 連携・SMS 送信は行わない。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "中部徳洲会病院$医療福祉相談室"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常/携帯/固定 → acceptance_times
                                  ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6) → 切断
                                  └─ 受付可 → 冒頭_アナウンス(TTS)
                                                → 担当者案内(TTS)
                                                → 担当者名聴取(TTS+AmiVoice STT+OpenAI[enum 5値])
                                                    ├─ 大城 → 大城聞き取り(TTS+STT+OpenAI[大城実/大城尚幸])
                                                    │            └─ → 担当者種別判定(ContextMatchRouter on staffName)
                                                    ├─ 下地 → 下地聞き取り(TTS+STT+OpenAI[下地光太郎/下地碧生])
                                                    │            └─ → 担当者種別判定
                                                    ├─ 山城 → 山城聞き取り(TTS+STT+OpenAI[山城碧生/山城諒子])
                                                    │            └─ → 担当者種別判定
                                                    ├─ わからない → 代表転送案内(TTS) → 代表電話へ転送(call_transfer)
                                                    │                                       ├─ 成功 → 完了フラグ_転送成功(status=3) → END_転送成功
                                                    │                                       └─ 失敗 → 完了フラグ_転送失敗(status=9) → END_転送失敗
                                                    └─ default(その他担当者) → 担当者読み取得(TTS+STT, output_format=text)
                                                                                  └─ → 担当者種別判定

      担当者種別判定(ContextMatchRouter on staffName)
        ├─ "山城諒子" → 看護師窓口へ転送(call_transfer)
        │                  ├─ 成功 → 完了フラグ_転送成功(status=3) → END_転送成功
        │                  └─ 失敗 → 完了フラグ_転送失敗(status=9) → END_転送失敗
        └─ default → 担当者へ転送(call_transfer)
                       ├─ 成功 → 完了フラグ_転送成功(status=3) → END_転送成功
                       └─ 失敗 → 完了フラグ_転送失敗(status=9) → END_転送失敗
    notes: |
      - 個人情報聴取（氏名/生年月日/電話番号/診察券番号）は一切行わない
      - 担当者の最終復唱（「担当者は〇〇でよろしいですか？」）は Gen3 簡素化のため省略（要件確認は NON-BLOCKER N-1）
      - 転送失敗時の Gen1 多段フォールバック（担当者→代表→『混みあっている』）は END_転送失敗 単段に統一（NON-BLOCKER N-2）
      - 年末年始固有文言は END_時間外 で兼用（NON-BLOCKER N-4）
      - 担当者個別番号は「担当者へ転送」call_transfer 1 本に集約（IVR プロパティで番号設定、NON-BLOCKER N-3）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 担当者案内

  - step: 担当者案内
    type: announcement
    next: 担当者名聴取

  # --- 担当者名聴取（メイン分岐: 大城/下地/山城/わからない/その他）---
  - step: 担当者名聴取
    type: hearing
    output_format: enum
    save_to: staffType
    retry_failure: end_failure
    conditions:
      - match: "大城"
        next: 大城聞き取り
      - match: "下地"
        next: 下地聞き取り
      - match: "山城"
        next: 山城聞き取り
      - match: "わからない"
        next: 代表転送案内
      - match: "default"
        next: 担当者読み取得

  # --- 大城聞き取り（大城実 / 大城尚幸 の 2 択）---
  - step: 大城聞き取り
    type: hearing
    output_format: enum
    save_to: staffName
    retry_failure: end_failure
    conditions:
      - match: "大城実"
        next: 担当者種別判定
      - match: "大城尚幸"
        next: 担当者種別判定

  # --- 下地聞き取り（下地光太郎 / 下地碧生 の 2 択）---
  - step: 下地聞き取り
    type: hearing
    output_format: enum
    save_to: staffName
    retry_failure: end_failure
    conditions:
      - match: "下地光太郎"
        next: 担当者種別判定
      - match: "下地碧生"
        next: 担当者種別判定

  # --- 山城聞き取り（山城碧生 / 看護師の山城諒子 の 2 択）---
  - step: 山城聞き取り
    type: hearing
    output_format: enum
    save_to: staffName
    retry_failure: end_failure
    conditions:
      - match: "山城碧生"
        next: 担当者種別判定
      - match: "山城諒子"
        next: 担当者種別判定

  # --- その他担当者の自由聴取（読み仮名取得）---
  - step: 担当者読み取得
    type: hearing
    output_format: text
    save_to: staffName
    retry_failure: end_failure
    next: 担当者種別判定

  # --- 担当者種別判定（staffName を見て看護師ルート / 担当者ルートに分岐）---
  - step: 担当者種別判定
    type: context_match_router
    reference_module: staffName
    conditions:
      - match: "山城諒子"
        next: 看護師窓口へ転送
      - match: "default"
        next: 担当者へ転送

  # --- 「わからない」ルートの代表転送ガイダンス ---
  - step: 代表転送案内
    type: announcement
    next: 代表電話へ転送

  # --- 転送ブロック群（番号は IVR プロパティ側で設定）---
  # 各 call_transfer は成功時 → END_転送成功(status=3) / 失敗時 → END_転送失敗(status=9) に明示接続
  - step: 担当者へ転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    conditions:
      - match: "success"
        next: END_転送成功
      - match: "failure"
        next: END_転送失敗

  - step: 看護師窓口へ転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    conditions:
      - match: "success"
        next: END_転送成功
      - match: "failure"
        next: END_転送失敗

  - step: 代表電話へ転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    conditions:
      - match: "success"
        next: END_転送成功
      - match: "failure"
        next: END_転送失敗

  # --- 終話ステップ（call_transfer の next 参照解決用）---
  - step: END_転送成功
    type: termination
    termination_ref: END_転送成功

  - step: END_転送失敗
    type: termination
    termination_ref: END_転送失敗

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
# 標準フィールド（patientName / patientDateOfBirth / medicalCardNumber / clinicalDepartment 等）は
# 使用しないため Dr.JOY 標準セットから抜く。Dr.JOY 管理画面の表示も簡素化される。
# 残すのは telephoneNumber（着信元自動取得）/ dateOfCall（自動取得）/ status / classification（標準, 値は固定）/ callId と、
# 案件固有の staffType / staffName。
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "本フローは問い合わせ専用のため固定値『問い合わせ』のみ"

  - context_name: "staffType"
    context_name_jp: "担当者カテゴリ"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "大城"
      - id: "2"
        order: "2"
        value: "下地"
      - id: "3"
        order: "3"
        value: "山城"
      - id: "4"
        order: "4"
        value: "わからない"
      - id: "5"
        order: "5"
        value: "その他担当者"
    item_default: false
    editable: true
    deletable: false
    notes: "担当者名聴取で判定された大分類。施設固有フィールド"

  - context_name: "staffName"
    context_name_jp: "担当者名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "個別担当者名（大城実/大城尚幸/下地光太郎/下地碧生/山城碧生/山城諒子/その他自由聴取）。施設固有フィールド"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "転送"
      - id: "6"
        order: "6"
        value: "時間外"
      - id: "9"
        order: "9"
        value: "転送失敗"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理 2=代表案内 3=転送成功 6=時間外 9=転送失敗"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "担当者名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "staffType"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "大城"
      - "下地"
      - "山城"
      - "わからない"
    notes: "5 値分類。「大城/下地/山城/わからない」のいずれにも該当しない場合は default で『その他担当者』として担当者読み取得ステップへ。Gen1 では DTMF 入力なし → 音声のみ"

  - order: 2
    name: "大城聞き取り"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "staffName"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "大城実"
      - "大城尚幸"
    notes: "大城ルート。OpenAI 分類で担当者氏名を確定し staffName に保存。default 時はリトライ"

  - order: 3
    name: "下地聞き取り"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "staffName"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "下地光太郎"
      - "下地碧生"
    notes: "下地ルート"

  - order: 4
    name: "山城聞き取り"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "staffName"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "山城碧生"
      - "山城諒子"
    notes: "山城ルート。「山城諒子」は看護師窓口へ、「山城碧生」は担当者へ転送（後段の context_match_router で staffName を参照）"

  - order: 5
    name: "担当者読み取得"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "staffName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "default ルート（その他担当者）。OpenAI で読み仮名込みのテキスト化を行い staffName に保存。担当者名はフリーテキストとして Dr.JOY に渡す"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "担当者名聴取"
    tts_announcement: "担当の名前を仰ってください。分からない場合には、分からないとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "大城"
        - "下地"
        - "山城"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "大城を含む発話（おおしろ／大城実／大城尚幸／大城さん／オオシロ）"
          output: "大城"
        - input: "下地を含む発話（しもじ／下地光太郎／下地碧生／下地さん／シモジ）"
          output: "下地"
        - input: "山城を含む発話（やましろ／山城碧生／山城諒子／山城さん／ヤマシロ／看護師の山城）"
          output: "山城"
        - input: "わからない／分からない／不明／知らない／担当が分からない／教えてもらってない"
          output: "わからない"
      no_result_condition: "上記いずれにも該当しない／全く別の氏名（例: 田中、佐藤、鈴木 等）。default ルート（その他担当者）として担当者読み取得へ進めるため、OpenAI 出力は『該当なし扱い』だが、ここではフロー上 default 分岐で担当者読み取得に遷移する"
    save_to: "staffType"
    next_step: "（条件分岐: 大城聞き取り / 下地聞き取り / 山城聞き取り / 代表転送案内 / 担当者読み取得）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "大城聞き取り"
    tts_announcement: "大城、ですね。大城実と、大城尚幸、どちらの担当者でしょうか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "大城実"
        - "大城尚幸"
        - "NO_RESULT"
      mapping:
        - input: "実（みのる）／大城実／みのる／OOSHIRO MINORU"
          output: "大城実"
        - input: "尚幸（なおゆき）／大城尚幸／なおゆき／OOSHIRO NAOYUKI"
          output: "大城尚幸"
      no_result_condition: "上記いずれにも該当しない／別人名・否定発話（聞き直し）"
    save_to: "staffName"
    next_step: "担当者種別判定"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "下地聞き取り"
    tts_announcement: "下地、ですね。下地光太郎と、下地碧生、どちらの担当者でしょうか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "下地光太郎"
        - "下地碧生"
        - "NO_RESULT"
      mapping:
        - input: "光太郎（こうたろう）／下地光太郎／こうたろう"
          output: "下地光太郎"
        - input: "碧生（あおい）／下地碧生／あおい"
          output: "下地碧生"
      no_result_condition: "上記いずれにも該当しない／別人名・否定発話"
    save_to: "staffName"
    next_step: "担当者種別判定"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "山城聞き取り"
    tts_announcement: "山城、ですね。山城碧生と、看護師の山城諒子、どちらでしょうか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "山城碧生"
        - "山城諒子"
        - "NO_RESULT"
      mapping:
        - input: "碧生（あおい）／山城碧生／あおい"
          output: "山城碧生"
        - input: "諒子（りょうこ）／山城諒子／看護師／看護師の山城／看護師さん／りょうこ"
          output: "山城諒子"
      no_result_condition: "上記いずれにも該当しない／別人名"
    save_to: "staffName"
    next_step: "担当者種別判定"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "担当者読み取得"
    tts_announcement: "担当者のお名前を、もう一度ゆっくりお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "（聴取テキストをそのまま正規化して保存）"
      mapping:
        - input: "発話テキスト（漢字交じり）"
          output: "正規化後の担当者名（漢字+読み）"
      no_result_condition: "発話なし／聞き取り不能"
    save_to: "staffName"
    next_step: "担当者種別判定"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須） ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
