# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【サブフロー完全コピー】氏名・生年月日・診察券番号・電話番号の 4 サブフローは docs/reference/bivr/samples/個人情報サブフロー.bivr を完全コピーし、プレフィックスのみ「神栖済生会病院」に置換する（CLAUDE.md Rule 9 準拠）。サブフロー内部の構造改変は禁止"
  - "【status コード】customer 固有の enum `[\"0\",\"9\",\"1\",\"7\",\"8\"]` を保持する（Dr.JOY 連携側の登録値と合わせるため）。Gen3 の `0` 禁止ルールに従い Gen2 の 0 は 2 に置換（皮膚科案内 / 冒頭切断相当）。director.md の Gen3 標準体系（9=転送失敗/7=非通知）とは意味が異なる点に注意"
  - "【複数診療科 status=8 強化（2026/04/12）】変更 / キャンセルで clinicalDepartment2 に正式名称 or \"不明\" が入った場合、後段の desiredreservationDate/reason 格納で status=1 に降格させない。本設計では終話直前の ContextMatchRouter で clinicalDepartment2 の値で END_xxx_単一／END_xxx_複数 に分岐することで実現"
  - "【肺＝はい救済（2026/04/12）】すべての Yes/No 判定ブロック（生年月日確認 / 診察券番号確認 / 電話番号携帯確認 / 電話番号固定確認 / 用件確認 / 受診歴 / 紹介状確認 / 予約日過去確認）で「肺」を肯定同義語として扱う。肯定同義語: はい／そう／そうです／そうですね／あっています／せいかい／肺／はい持っています。否定同義語: いいえ／いえ／いや／ちがう／ちゃう／ちがいます／ふせいかい／いいえ持っていません。prompter は SKILL_A〜E_*.md の Yes/No テンプレに同義語として埋め込む"
  - "【SSML 完全削除】customer_doc の `<dtmf/>` `<dtmf digit=\"8\"/>` `<break time=\"...\"/>` `<speak type=\"telephone\">` `<speak type=\"digits\">` 等は Gen3 では全削除。TTS は `{tts_g:...}`（全小文字）形式。電話番号/診察券番号の桁区切り読み上げは tts_g の読み方調整（半角スペース挿入等）で代替"
  - "【聞き直し回数 最大1回】customer_doc 1.1 準拠。有効回答が得られない場合は1回だけ再聴取→空文字格納→「かしこまりました。」と発話して次ステップへ。空文字格納も「データ格納成功」として扱う。retry_count: 1 を全 hearing に設定"
  - "【再確認必須 4 項目】生年月日 / 診察券番号 / 電話番号（固定）/ 用件 は echo_back=true。復唱専用フォーマットは customer_doc 2.2 に準拠（生年月日は YYYY年M月D日、診察券番号は 1桁ずつ読み上げ、電話番号は 1桁ずつ読み上げ、用件は reservation_name 変換後の表示名）"
  - "【再確認厳禁 10 項目】患者名 / 電話番号（携帯）/ 受診歴 / 紹介状確認 / 診療科 / 予約希望日 / 診療科2 / 現在の予約日 / 理由 / 確認内容 は echo_back=false。「〜ですね」「〜を承りました」等の復唱を prompter のプロンプトで明示禁止"
  - "【reason / details の発話厳禁】ユーザーに対して reason・details の内容を読み上げたり、同情（「お大事に」等）や意見・質問を一切行わない。終話挨拶の中でも内容に言及しない。prompter の SKILL_E_*.md 自由テキスト抽出テンプレに明示"
  - "【診療科 no_result デフォルト】診療科_新規 / 診療科_変更 / 診療科_キャンセル は NO_RESULT 時に \"登録なし\" を clinicalDepartment に保存してリトライ（モジュール選定ガイド 2.5）"
  - "【数字認識ルール】「よん」「し」→ 4、「ご」「ごお」「ごー」→ 5。「for」「C」「号」「go」等の誤変換禁止。prompter の数値正規化テンプレに明示"
  - "【診察券番号 8桁バリデーション】サブフロー内で対応（個人情報サブフロー.bivr の実装を踏襲）。「わからない／持っていない」時は桁数チェック免除・復唱スキップ"
  - "【電話番号 桁数バリデーション】mobile/ip050=11桁、landline=10桁。不一致は1回再聴取→空文字格納。サブフロー内で対応"
  - "【未聴取フィールドの初期値】customer function required に含まれるが本フローで聴取しない項目（institution / disease / symptoms / question / history）は saveContextModel2DB で空文字 \"\" を初期値として埋める。OpenAI プロンプトで強制聴取させない"
  - "【Dr.JOY 側設定事項】SMS 送信文面 / status マスター / 診療科マスター / office_id は Dr.JOY 管理画面で別途設定。設計書・フローJSON には含めない"

