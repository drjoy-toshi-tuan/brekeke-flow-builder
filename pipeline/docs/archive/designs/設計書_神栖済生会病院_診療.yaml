# 設計書 — 神栖済生会病院 診療
# 生成元: @director エージェント（Gen2→Gen3移管）
# 生成日: 2026/04/20
# 確認レポート: docs/designs/確認レポート_神栖済生会病院_診療_20260420.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "神栖済生会病院"
  group_name: "神栖済生会病院"
  flow_name: "神栖済生会病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "なし（24時間受付 / customer_doc に時刻判定なし）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "神栖済生会病院$診療"
      role: "main"
      description: "診療予約・変更・キャンセル・確認を受け付けるメインフロー。用件分岐と診療科分岐を含む"
  subflows:
    - name: "神栖済生会病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報サブフロー.bivr の氏名聴取を完全コピー。接続先はメインフロー側で jump_氏名聴取 として参照"
    - name: "神栖済生会病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "復唱必須。DOB Re-confirmation 構成。肺＝はい救済は prompter の Yes/No テンプレ側で同義語追加"
    - name: "神栖済生会病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "8桁バリデーション＋「わからない／持っていない」分岐を含むサンプルをそのまま使用。桁数不一致は1回だけ再聴取→空文字格納"
    - name: "神栖済生会病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier で mobile/landline を分岐。mobile は入電番号ショートカット、landline は10/11桁バリデーション＋復唱。smsFlag=1 はデータ格納時に併せて更新"

# --- セクション3: フローの目的 ---
purpose: |
  神栖済生会病院の予約専用 AI 電話窓口。
  患者からの電話を受けて以下の用件を聴取・分岐処理する:
    - 新規予約（受診歴で新規／再診を判定し、新規は紹介状確認を追加聴取）
    - 予約変更（診療科・診療科2・現在の予約日・予約希望日）
    - 予約キャンセル（診療科・診療科2・現在の予約日・理由）
    - その他問い合わせ（確認内容）
  診療科が インフルエンザワクチン／コロナウイルスワクチン／予防接種／皮膚科 の場合は受付終了案内で終話する。
  複数診療科（clinicalDepartment2 が正式名称 or "不明"）を同時受付した場合は status=8 固定。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "神栖済生会病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知(status=9) → 切断
            └─ 通常   → 冒頭_アナウンス
                          → jump_氏名聴取 (サブフロー)
                            → jump_生年月日聴取 (サブフロー, 復唱あり)
                              → jump_診察券番号聴取 (サブフロー, 8桁検証＋復唱)
                                → jump_電話番号聴取 (サブフロー, 携帯/固定分岐＋復唱)
                                  → 用件聴取 (enum, 復唱あり)
                                      ├─ 新規   → 受診歴聴取 → (肯定→紹介状確認聴取) → 診療科_新規
                                      │           → 診療科_新規:
                                      │               ├─ インフル    → END_インフルエンザ
                                      │               ├─ コロナ      → END_コロナ
                                      │               ├─ 予防接種    → END_予防接種
                                      │               ├─ 皮膚科      → END_皮膚科案内
                                      │               └─ default     → 予約希望日聴取_新規 → END_予約完了_単一
                                      │
                                      ├─ 変更   → 診療科_変更:
                                      │           ├─ インフル／コロナ／予防接種／皮膚科 → 各終話
                                      │           └─ default → 診療科2聴取_変更
                                      │                       ├─ 皮膚科 → END_皮膚科案内
                                      │                       ├─ 空文字 → 現在の予約日聴取_変更
                                      │                       └─ default → 現在の予約日聴取_変更
                                      │                                     → 過去日判定_変更
                                      │                                         ├─ 過去 → 過去受付不可_変更(TTS) → 予約希望日聴取_変更
                                      │                                         └─ 未来 → 予約希望日聴取_変更
                                      │                                     → 分岐_変更終話 (clinicalDepartment2 で分岐)
                                      │                                         ├─ ""       → END_予約完了_単一
                                      │                                         └─ default → END_予約完了_複数(status=8)
                                      │
                                      ├─ キャンセル → 診療科_キャンセル:
                                      │           ├─ 皮膚科 → END_皮膚科案内
                                      │           └─ default → 診療科2聴取_キャンセル
                                      │                        ├─ 皮膚科 → END_皮膚科案内
                                      │                        ├─ 空文字 → 現在の予約日聴取_キャンセル
                                      │                        └─ default → 現在の予約日聴取_キャンセル
                                      │                                      → 過去日判定_キャンセル
                                      │                                          ├─ 過去 → 過去受付不可_キャンセル(TTS) → 理由聴取
                                      │                                          └─ 未来 → 理由聴取
                                      │                                      → 分岐_キャンセル終話 (clinicalDepartment2 で分岐)
                                      │                                          ├─ ""      → END_キャンセル完了_単一
                                      │                                          └─ default → END_キャンセル完了_複数(status=8)
                                      │
                                      └─ 確認   → 確認内容聴取 → END_確認完了
    notes: |
      - 全 hearing のリトライ失敗時は原則 skip（空文字格納して次へ）。customer_doc の再質問ルール準拠
      - 診療科の NO_RESULT は "登録なし" を保存してリトライ（モジュール選定ガイド 2.5）
      - 肺＝はい救済は prompter の Yes/No テンプレで同義語として埋め込む
      - reason / details は AI からの復唱・同情発話禁止。prompter で明示

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: jump_氏名聴取

  # --- サブフロー 4 本 ---
  - step: jump_氏名聴取
    type: subflow
    flowname: "神栖済生会病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "神栖済生会病院$生年月日聴取"
    next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "神栖済生会病院$診察券番号聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "神栖済生会病院$電話番号聴取"
    next: 用件聴取

  # --- 用件聴取（復唱必須）---
  - step: 用件聴取
    type: hearing
    output_format: enum
    conditions:
      - match: "新規"
        next: 受診歴聴取
      - match: "変更"
        next: 診療科_変更
      - match: "キャンセル"
        next: 診療科_キャンセル
      - match: "確認"
        next: 確認内容聴取

  # --- 新規ルート ---
  - step: 受診歴聴取
    type: hearing
    output_format: enum
    conditions:
      - match: "新規"
        next: 紹介状確認聴取
      - match: "再診"
        next: 診療科_新規

  - step: 紹介状確認聴取
    type: hearing
    output_format: enum
    next: 診療科_新規

  - step: 診療科_新規
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "インフルエンザワクチン"
        next: END_インフルエンザ
      - match: "コロナウイルスワクチン"
        next: END_コロナ
      - match: "予防接種"
        next: END_予防接種
      - match: "皮膚科"
        next: END_皮膚科案内
      - match: "default"
        next: 予約希望日聴取_新規

  - step: 予約希望日聴取_新規
    type: hearing
    output_format: text
    next: END_予約完了_単一

  # --- 変更ルート ---
  - step: 診療科_変更
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "インフルエンザワクチン"
        next: END_インフルエンザ
      - match: "コロナウイルスワクチン"
        next: END_コロナ
      - match: "予防接種"
        next: END_予防接種
      - match: "皮膚科"
        next: END_皮膚科案内
      - match: "default"
        next: 診療科2聴取_変更

  - step: 診療科2聴取_変更
    type: hearing
    output_format: enum
    conditions:
      - match: "皮膚科"
        next: END_皮膚科案内
      - match: "default"
        next: 現在の予約日聴取_変更

  - step: 現在の予約日聴取_変更
    type: hearing
    output_format: datetime
    next: 過去日判定_変更

  - step: 過去日判定_変更
    type: script
    script_template: future_date
    reference_module: "OpenAI_現在の予約日聴取_変更"
    conditions:
      - match: "SUCCESS"
        next: 予約希望日聴取_変更
      - match: "FAIL"
        next: 過去受付不可_変更

  - step: 過去受付不可_変更
    type: announcement
    next: 予約希望日聴取_変更

  - step: 予約希望日聴取_変更
    type: hearing
    output_format: text
    next: 分岐_変更終話

  - step: 分岐_変更終話
    type: context_match_router
    reference_module: "clinicalDepartment2"
    conditions:
      - match: ""
        next: END_予約完了_単一
      - match: "default"
        next: END_予約完了_複数

  # --- キャンセルルート ---
  - step: 診療科_キャンセル
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "皮膚科"
        next: END_皮膚科案内
      - match: "default"
        next: 診療科2聴取_キャンセル

  - step: 診療科2聴取_キャンセル
    type: hearing
    output_format: enum
    conditions:
      - match: "皮膚科"
        next: END_皮膚科案内
      - match: "default"
        next: 現在の予約日聴取_キャンセル

  - step: 現在の予約日聴取_キャンセル
    type: hearing
    output_format: datetime
    next: 過去日判定_キャンセル

  - step: 過去日判定_キャンセル
    type: script
    script_template: future_date
    reference_module: "OpenAI_現在の予約日聴取_キャンセル"
    conditions:
      - match: "SUCCESS"
        next: 理由聴取
      - match: "FAIL"
        next: 過去受付不可_キャンセル

  - step: 過去受付不可_キャンセル
    type: announcement
    next: 理由聴取

  - step: 理由聴取
    type: hearing
    output_format: text
    next: 分岐_キャンセル終話

  - step: 分岐_キャンセル終話
    type: context_match_router
    reference_module: "clinicalDepartment2"
    conditions:
      - match: ""
        next: END_キャンセル完了_単一
      - match: "default"
        next: END_キャンセル完了_複数

  # --- 確認ルート ---
  - step: 確認内容聴取
    type: hearing
    output_format: text
    next: END_確認完了

  # --- 終話 ---
  - step: END_予約完了_単一
    type: termination
    termination_ref: "END_予約完了_単一"
  - step: END_予約完了_複数
    type: termination
    termination_ref: "END_予約完了_複数"
  - step: END_キャンセル完了_単一
    type: termination
    termination_ref: "END_キャンセル完了_単一"
  - step: END_キャンセル完了_複数
    type: termination
    termination_ref: "END_キャンセル完了_複数"
  - step: END_確認完了
    type: termination
    termination_ref: "END_確認完了"
  - step: END_インフルエンザ
    type: termination
    termination_ref: "END_インフルエンザ"
  - step: END_コロナ
    type: termination
    termination_ref: "END_コロナ"
  - step: END_予防接種
    type: termination
    termination_ref: "END_予防接種"
  - step: END_皮膚科案内
    type: termination
    termination_ref: "END_皮膚科案内"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "新規"
      - id: "2"
        order: "2"
        value: "再診"
      - id: "3"
        order: "3"
        value: "変更"
      - id: "4"
        order: "4"
        value: "キャンセル"
      - id: "5"
        order: "5"
        value: "確認"
    item_default: true
    editable: true
    deletable: true
    notes: "受診歴で「新規」「再診」に上書きされる"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "カタカナ格納。「名前は」「です」等のクッション言葉は除外"

