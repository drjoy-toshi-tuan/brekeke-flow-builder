      no_result_condition: "無音・無関係発話"
    save_to: "desiredreservationDate"
    next_step: "分岐_変更終話"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "診療科_キャンセル"
    tts_announcement: "診療科をお話ください。わからない場合は、『わからない』、とお話ください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "消化器外科"
        - "小児外科"
        - "乳腺外科"
        - "脳神経外科"
        - "麻酔科"
        - "甲状腺内分泌"
        - "整形外科"
        - "泌尿器科"
        - "形成外科"
        - "耳鼻咽喉科"
        - "皮膚科"
        - "眼科"
        - "婦人科"
        - "禁煙外来"
        - "リハビリテーション科"
        - "小児科"
        - "インフルエンザワクチン"
        - "コロナウイルスワクチン"
        - "予防接種"
      mapping:
        - input: "診療科_新規 と同じ"
          output: "該当正式名称"
      no_result_condition: "診療科_新規 と同じ"
    save_to: "clinicalDepartment"
    next_step: "皮膚科 → END_皮膚科案内 / default → 診療科2聴取_キャンセル"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "診療科2聴取_キャンセル"
    tts_announcement: "同日にキャンセルを希望される診療科があればお話しください。ない場合は、『ないです』、とお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["皮膚科", "default"]
      mapping:
        - input: "ないです／ありません"
          output: ""
        - input: "皮膚科／皮膚／肌"
          output: "皮膚科"
        - input: "【診療科一覧】の正式名称 / 不明な診療科"
          output: "default（格納値は正式名称 or 「不明」）"
      no_result_condition: "該当なし → default 扱いで「不明」"
    save_to: "clinicalDepartment2"
    next_step: "皮膚科 → END_皮膚科案内 / それ以外 → 現在の予約日聴取_キャンセル"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "現在の予約日聴取_キャンセル"
    tts_announcement: "次に現在の予約日を、『4月1日』、のように日付でお話ください。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["YYYY-MM-DD HH:MM"]
      mapping:
        - input: "4月1日／令和7年4月1日／2026年4月1日 等"
          output: "YYYY-MM-DD 00:00 形式に正規化"
      no_result_condition: "日付が特定できない → 空文字"
    save_to: "reservationDate"
    next_step: "過去日判定_キャンセル"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "過去受付不可_キャンセル"
    tts_announcement: "ご指定の予約日は過去の日付のため、予約キャンセルをお受けすることができません。申し訳ございませんが、予約日は本日の翌日以降のお日にちでお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "理由聴取"
    retry_failure: "skip"

  - step_name: "理由聴取"
    tts_announcement: "キャンセルの理由をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["名詞句（例: 本人体調不良, 仕事の都合, 予定重複, 他院受診）"]
      mapping:
        - input: "任意のキャンセル理由発話"
          output: "[理由の主体]+[事象] の簡潔名詞句に要約"
      no_result_condition: "無音・無関係発話 → 空文字"
    save_to: "reason"
    next_step: "分岐_キャンセル終話"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "確認内容聴取"
    tts_announcement: "お問い合わせの内容を簡潔にお話ください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["名詞句（例: 予約日時の確認, 検査前日の注意事項の確認, 持ち物の確認）"]
      mapping:
        - input: "任意の問い合わせ発話"
          output: "[対象]+[アクション] の簡潔名詞句に要約"
      no_result_condition: "無音・無関係発話 → 空文字"
    save_to: "details"
    next_step: "END_確認完了"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 — 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "神栖済生会病院の予約専用AI電話です。お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の先頭に「1 8 6」を追加いただくことで発信者番号を通知していただくことができます。お電話ありがとうございました。それでは失礼いたします。"
    status: "9"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（use_acceptance_times=false のため到達しないが template 必須項目として保持）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（customer_doc では空文字格納で次ステップへ進む仕様のため実質到達しない）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
