    save_to: "desiredreservationDate"
    next_step: "END_予約完了_単一"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "診療科_変更"
    tts_announcement: "診療科をお話ください。わからない場合は、『わからない』、とお話ください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "消化器外科"
        - "小児外科"
        - "乳腺外科"
        - "脳神経外科"
        - "麻酔科"
        - "甲状腺内分泌"
        - "整形外科"
        - "泌尿器科"
        - "形成外科"
        - "耳鼻咽喉科"
        - "皮膚科"
        - "眼科"
        - "婦人科"
        - "禁煙外来"
        - "リハビリテーション科"
        - "小児科"
        - "インフルエンザワクチン"
        - "コロナウイルスワクチン"
        - "予防接種"
      mapping:
        - input: "診療科_新規 と同じマッピング"
          output: "該当正式名称"
