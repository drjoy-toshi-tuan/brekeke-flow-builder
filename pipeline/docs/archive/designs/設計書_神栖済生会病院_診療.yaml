# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件聴取"
    tts_announcement: "ご用件を、『予約』、『予約変更』、『キャンセル』、『その他問い合わせ』の中からお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["新規", "変更", "キャンセル", "確認"]
      mapping:
        - input: "予約／お薬／よやく／しんきよやく／新規／しんき／鍼灸薬／しんきゅうやく／通訳／ようやく"
          output: "新規"
        - input: "取り直したい／取り直す／別の日に／変えたい／変える／変えて／予約変更"
          output: "変更"
        - input: "やめる／取り消し／取り消す／取消／やめたい／経験／建設／キャンセル"
          output: "キャンセル"
        - input: "確かめる／かくにん／予約確認／ようやくび／問い合わせ／その他／その他のお問い合わせ"
          output: "確認"
      no_result_condition: "上記いずれにも該当しない場合"
    save_to: "classification"
    next_step: "（scenario_flow の conditions を参照）"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "受診歴聴取"
    tts_announcement: "今回の症状でのご受診は初めてですか？『はい、そうです』、または、『いいえ違います』、のようにお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["新規", "再診"]
      mapping:
        - input: "はい／そう／そうです／そうですね／あっています／せいかい／肺／はい持っています／初めて"
          output: "新規"
        - input: "いいえ／いえ／いや／ちがう／ちゃう／ちがいます／ふせいかい／いいえ持っています／再診"
          output: "再診"
      no_result_condition: "上記いずれにも該当しない場合"
    save_to: "classification"
    next_step: "（scenario_flow の conditions を参照）"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "紹介状確認聴取"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか？『はい、持ってます』、または、『いいえ、持っていません』、のようにお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["有", "無"]
      mapping:
        - input: "はい／そう／そうです／あっています／せいかい／肺／はい持っています／持っている／持ってる"
          output: "有"
        - input: "いいえ／いえ／いや／ちがう／ふせいかい／いいえ持っていません／持っていない"
          output: "無"
      no_result_condition: "上記いずれにも該当しない場合"
    save_to: "introduction"
    next_step: "診療科_新規"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "診療科_新規"
    tts_announcement: "診療科をお話ください。わからない場合は、『わからない』、とお話ください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "消化器外科"
        - "小児外科"
        - "乳腺外科"
        - "脳神経外科"
        - "麻酔科"
        - "甲状腺内分泌"
        - "整形外科"
        - "泌尿器科"
        - "形成外科"
        - "耳鼻咽喉科"
        - "皮膚科"
        - "眼科"
        - "婦人科"
        - "禁煙外来"
        - "リハビリテーション科"
        - "小児科"
        - "インフルエンザワクチン"
        - "コロナウイルスワクチン"
        - "予防接種"
      mapping:
        - input: "【診療科一覧】の正式名称・類義語に合致"
          output: "該当正式名称"
        - input: "インフル／インフルエンザ／インフルワクチン／インフルエンザ予防接種／インフル予防接種"
