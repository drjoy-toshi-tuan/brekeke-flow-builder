# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["classification", "clinicalDepartment", "clinicalDepartment2"]
  patterns:
    - condition: "classification ∈ {新規,再診,変更,キャンセル,確認} かつ clinicalDepartment ∉ {インフル,コロナ,予防接種,皮膚科}"
      sms_flag: "1"
      notes: "受付完了ルート（SMS 送信あり）"
    - condition: "clinicalDepartment ∈ {インフル,コロナ,予防接種,皮膚科}"
      sms_flag: "-1"
      notes: "受付終了案内ルート（SMS なし）"
    - condition: "非通知"
      sms_flag: "-1"
      notes: "非通知切断"

