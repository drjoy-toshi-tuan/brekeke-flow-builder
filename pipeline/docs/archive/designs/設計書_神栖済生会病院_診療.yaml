      - DTMF 対応表（dtmf_max_length=8 / YYYYMMDD 形式）:
          DTMF 8桁数字 = YYYYMMDD（例: 20260401 → 2026年4月1日）
          DTMF 4桁数字 = MMDD（例: 0401 → 当年または翌年の4月1日。年は今日基準で未来補完）
          DTMF 2桁数字 = DD（例: 15 → 当月または翌月の15日。月は今日基準で未来補完）
