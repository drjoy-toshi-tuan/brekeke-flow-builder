# --- セクション3: フローの目的 ---
purpose: "患者からの電話を受け、診療科・用件（予約/変更/キャンセル）・予約日・患者情報（診察券番号・氏名・生年月日・連絡先電話番号）を聴取し、折り返し受付を自動化する。整形外科の新規予約および当日/翌診療日の予約変更・キャンセルは代表電話案内に誘導する。"

