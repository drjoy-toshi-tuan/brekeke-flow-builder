              ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS)
                                    └─ 診療科_聴取(TTS+AmiVoice STT)
                                        → OpenAI_診療科(generate_by_OpenAI)
                                            ├─ 整形外科 → 用件確認_整形(TTS+AmiVoice STT) → OpenAI_用件_整形
                                            │               ├─ 予約 → 受診歴確認(TTS+AmiVoice STT) → OpenAI_受診歴
                                            │               │           ├─ 初診 → saveContext2DB(classification=新規) → END_代表案内_新規不可(TTS) → 完了フラグ_代表案内(status=2, smsFlag=-1) → 切断
                                            │               │           └─ 再診 → saveContext2DB(classification=再診) → 希望医師名_聴取(TTS+AmiVoice STT) → OpenAI_希望医師名
                                            │               │                       → ★診察券番号サブフロー → ★氏名サブフロー → ★生年月日サブフロー → ★電話番号サブフロー(self_contained: 終話含む)
                                            │               ├─ 変更 → saveContext2DB(classification=変更) → 日程確認_整形(TTS+AmiVoice STT) → OpenAI_日程確認
                                            │               │           ├─ はい → END_代表案内_当日翌日不可(TTS) → 完了フラグ_代表案内(status=2, smsFlag=-1) → 切断
                                            │               │           └─ いいえ → 予約日_聴取(TTS+AmiVoice STT) → OpenAI_予約日
                                            │               │                         → ★診察券番号サブフロー → ★氏名サブフロー → ★生年月日サブフロー → ★電話番号サブフロー(self_contained)
                                            │               └─ キャンセル → saveContext2DB(classification=キャンセル) → 日程確認_整形（変更と共通パス）
                                            │
                                            ├─ 健診センター → 用件確認_健診(TTS+AmiVoice STT) → OpenAI_用件_健診
                                            │                   ├─ 予約 → saveContext2DB(classification=健診予約)
                                            │                   │           → ★診察券番号サブフロー → ★氏名サブフロー → ★生年月日サブフロー → ★電話番号サブフロー(self_contained)
                                            │                   ├─ 変更 → saveContext2DB(classification=変更) → 日程確認_健診(TTS+AmiVoice STT) → OpenAI_日程確認_健診
                                            │                   │           ├─ はい → END_代表案内_当日翌日不可(TTS) → 完了フラグ_代表案内 → 切断
                                            │                   │           └─ いいえ → 予約日_聴取 → ★診察券番号SF → ★氏名SF → ★生年月日SF → ★電話番号SF(self_contained)
                                            │                   └─ キャンセル → saveContext2DB(classification=キャンセル) → 日程確認_健診（変更と共通パス）
                                            │
                                            └─ その他（既定） → 用件確認_その他(TTS+AmiVoice STT) → OpenAI_用件_その他
                                                                ├─ 変更 → saveContext2DB(classification=変更) → 日程確認_その他(TTS+AmiVoice STT) → OpenAI_日程確認_その他
                                                                │           ├─ はい → END_代表案内_当日翌日不可(TTS) → 完了フラグ_代表案内 → 切断
                                                                │           └─ いいえ → 予約日_聴取 → ★診察券番号SF → ★氏名SF → ★生年月日SF → ★電話番号SF(self_contained)
                                                                └─ キャンセル → saveContext2DB(classification=キャンセル) → 日程確認_その他（変更と共通パス）

      ─── メインフロー内終話パターン ───
      END_代表案内_新規不可: 整形外科新規予約 → 代表電話案内 → 切断
      END_代表案内_当日翌日不可: 当日/翌診療日予約 → 代表電話案内 → 切断
