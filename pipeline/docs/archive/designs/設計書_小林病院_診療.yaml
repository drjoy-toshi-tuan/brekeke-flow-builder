# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "診療科確認"
    tts_announcement: "初めに、問い合わせをしたい診療科名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "整形外科"
        - "健診センター"
        - "外科"
        - "内科"
        - "脳神経外科"
        - "泌尿器科"
        - "循環器科"
        - "リハビリ科"
        - "呼吸器科"
        - "登録なし"
      mapping:
        - input: "整形、骨密度"
          output: "整形外科"
        - input: "健康診断、特定健診、がん検診、ワクチン、特定保健指導、健診、予防接種、予防注射"
          output: "健診センター"
        - input: "外科"
          output: "外科"
        - input: "内科"
          output: "内科"
        - input: "脳外、脳神経、脳外科、脳神経外科"
          output: "脳神経外科"
        - input: "泌尿器、ウロ、泌尿器科"
          output: "泌尿器科"
