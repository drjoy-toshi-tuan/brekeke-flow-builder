    condition: "予約→市町村の子宮頚がん健診ルート"
    tts_announcement: "諏訪市、下諏訪町、箕輪町に住民票がある方の子宮頸がん検診、乳がん健診を承ります。予約開始は5月25日を予定しておりますので、期日まで暫くお待ちくださいませ。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_子宮頚がん案内"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  notes: "各終話パターンに smsFlag を直接設定。共通終話前処理後は『終話_振り分け』(context_match_router on classification) で予約/追加/変更/問い合わせ → END_通常(smsFlag=1) / キャンセル → END_キャンセル(smsFlag=2) に分岐。3日以内直通・生活習慣病/市民健診/子宮頚がん は各ルート途中から直接遷移するため routing_keys による動的分岐は不要"

