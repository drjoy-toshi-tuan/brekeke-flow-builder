# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管案件。Gen2 の function プロパティ 25 種のうち、Gen3 では以下のみ使用する: classification / patientName / history / companyname / person_in_charge_name / course / course_name / option / details / question / people / cancel / reservation_decision / reservationDate / DesiredreservationDate / returntime / additionalPhoneNumber / patientDateOfBirth / status + 自動格納系(telephoneNumber / dateOfCall / callId)。Gen2 の medicalCardNumber / clinicalDepartment / reason / other_inquiries / checkout / endpoint / smsFlag は Gen3 では saveContextModel2DB に含めない（checkout/endpoint/smsFlag は saveCompletionFlag2db パラメータとして扱う）"
  - "個人情報聴取はサブフロー分割型。氏名（復唱なし）・生年月日（復唱あり）・電話番号（復唱あり）の3つをそれぞれ独立サブフローとして呼び出す（CLAUDE.md Rule 9/11 準拠）"
  - "企業ルートの企業名・部署担当者名はサブフローではなくメインフローにインラインで聴取（Dr.JOY 汎用サブフローは個人情報向けのため）"
  - "電話番号聴取サブフローは incoming-classifier 3分岐（携帯/固定/その他）付きの復唱あり版を完全コピー。Gen2 1-11 の分岐1/2/3ロジックを包含"
  - "RAGサブフローはパターン3（Gen2→Gen3デフォルト）: 問い合わせルート内 + 全終話前の共通_その他問合せ位置に配置（CLAUDE.md Rule 16 準拠）"
  - "Gen2 status enum の『0』は Gen3 で使用禁止。冒頭切断等の Gen2 で status=0 相当のケースは Gen3 では status=2（代表案内相当）または status=3（聴取失敗）に振り替え"
  - "Gen2 プロンプトには時間外アナウンスの文言が明記されていないため、Gen3 テンプレートのデフォルト文言を使用"
  - "Gen2 プロンプトには非通知アナウンスの文言が明記されていないため、Gen3 テンプレートのデフォルト文言を使用"
  - "3日以内の予約判断は追加/変更/キャンセル/問い合わせの4ルート共通（予約ルートには存在しない — Gen2 設計通り）"
  - "キャンセル+企業ルートのみキャンセル人員確認を追加聴取（ContextMatchRouter on history で分岐）"
  - "第3世代では1発話1意図が原則。Gen2 で複合発話を受け入れていたとしても、復唱フォーマットは DOB Re-confirmation / Phone Re-confirmation の専用モジュールに委ね、業務項目（用件/コース/オプション等）の復唱（Gen2 の『○○ですね』動作）は実装しない（フロー速度優先）"
  - "SSML タグ（<speak>, <break>, <speak type=telephone> 等）は Gen3 では TTS プロンプトに埋め込まない。電話番号の復唱は Re-confirmation モジュールが処理、break time は TTS 側で制御"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（Dr.JOY Admin 画面で確認）"
