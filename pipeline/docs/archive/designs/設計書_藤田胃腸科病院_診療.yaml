    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "健診ルートのみ。第三希望までフリーテキスト"

  - order: 15
    name: "健診_予約希望内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "ReservationRequestDetails"
