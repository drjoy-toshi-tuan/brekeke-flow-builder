# --- セクション2: フロー構成 ---
# CLAUDE.md Rule 9 準拠: 個人情報聴取サブフローは個人情報サブフロー.bivr を完全コピー。
# フロー名プレフィックスのみ施設名に置換。構造・接続・スクリプトの変更は禁止。
flow_structure:
  type: "subflow"
  flows:
    - name: "藤田胃腸科病院$診療_20260408"
      role: "main"
      description: >
        冒頭チェーン → 本人確認 → (代理:入電者氏名) → 氏名サブフロー → 生年月日サブフロー → 電話番号サブフロー
        → 用件1分岐（診察予約/健診検査等/変更キャンセル）
        → 各用件ルート聴取 → その他問い合わせ → 終話判定 → 終話TTS → 切断
    - name: "藤田胃腸科病院$氏名聴取_20260408"
      role: "sub"
      description: "患者氏名聴取（音声のみ）→ 結果返却"
    - name: "藤田胃腸科病院$生年月日聴取_20260408"
      role: "sub"
      description: "生年月日聴取（DTMF 8桁 + DOB Re-confirmation復唱確認）→ 結果返却"
    - name: "藤田胃腸科病院$電話番号聴取_20260408"
      role: "sub"
      description: "電話番号聴取（incoming-classifier→携帯/固定分岐→Phone Normalization→復唱確認）→ 結果返却"

  subflows:
    - name: "藤田胃腸科病院$氏名聴取_20260408"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の氏名聴取を完全コピー"
    - name: "藤田胃腸科病院$生年月日聴取_20260408"
      target: "生年月日聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の生年月日聴取（復唱あり）を完全コピー"
    - name: "藤田胃腸科病院$電話番号聴取_20260408"
      target: "電話番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10 準拠。個人情報サブフロー.bivr の電話番号聴取を完全コピー。phonetype をコンテキストに保存し、メインフローに返却"

# --- セクション3: フローの目的 ---
purpose: >
  藤田胃腸科病院の予約専用AI電話。患者からの電話を受け、本人確認・患者情報（氏名・生年月日・連絡先電話番号）を聴取した後、
  用件（診察予約/健診・検査等予約/予約変更・キャンセル）を確認し、各用件に応じた追加情報を聴取して折り返し受付を自動化する。
  Gen2からの移管のため、個人情報を用件聴取の前に聴取する順序を維持する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "藤田胃腸科病院$診療_20260408"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(status=2, smsFlag=-1) → END_非通知(TTS) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → 完了フラグ_時間外(status=6, smsFlag=-1) → END_時間外(TTS) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)

      ─── 個人情報聴取ブロック ───
      冒頭_アナウンス → 本人確認(TTS) → 入力_本人確認(AmiVoice STT) → OpenAI_本人確認
          ├─ 本人 → ジャンプ_氏名聴取(Custom Jump to Flow)
          ├─ 代理 → saveContext_agentcheck(contextValue=代理)
          │           → 入電者_氏名(TTS) → 入力_入電者_氏名(AmiVoice STT) → OpenAI_入電者_氏名
          │               ├─ 正規化結果 → saveContext_入電者氏名 → ジャンプ_氏名聴取(Custom Jump to Flow)
          │               └─ TIMEOUT/ERROR/NO_RESULT → リトライ_入電者_氏名
          │                                              ├─ Retry → 入電者_氏名(TTS)
          │                                              └─ No more → ジャンプ_氏名聴取（未取得のままスキップ）
          └─ TIMEOUT/ERROR/NO_RESULT → リトライ_本人確認
                           ├─ Retry → 本人確認(TTS)
                           └─ No more → ジャンプ_氏名聴取(本人扱いでスキップ)

      ジャンプ_氏名聴取 → [氏名サブフローから戻り]
        → ジャンプ_生年月日聴取(Custom Jump to Flow) → [生年月日サブフローから戻り]
        → ジャンプ_電話番号聴取(Custom Jump to Flow) → [電話番号サブフローから戻り]

      ─── 用件1聴取 ───
      → 用件1(TTS) → 入力_用件1(AmiVoice STT) → OpenAI_用件1
          ├─ 診察 → saveContext_用件(classification=診察)
          │         → [診察予約ルート]
          ├─ 健診等 → saveContext_用件(classification=予約)
          │           → [健診・検査等ルート]
          ├─ 変更キャンセル → [変更・キャンセルルート]
          └─ TIMEOUT/ERROR/NO_RESULT → リトライ_用件1
                           ├─ Retry → 用件1(TTS)
                           └─ No more → 完了フラグ_上限エラー(status=2, smsFlag=-1) → END_上限エラー(TTS) → 切断

      ─── 診察予約ルート ───
      通院歴(TTS) → 入力_通院歴(AmiVoice STT) → OpenAI_通院歴
          ├─ 初診 → saveContext_用件(classification=新規) → 診察_予約希望日(TTS) → 入力_診察_予約希望日(AmiVoice STT) → OpenAI_診察_予約希望日
          │         → saveContext_予約希望日 → ★その他問い合わせへ合流
          ├─ 再診 → saveContext_用件(classification=再診) → 完了フラグ_再診(status=7, smsFlag=-1) → END_再診(TTS) → 切断
          └─ TIMEOUT/ERROR/NO_RESULT → リトライ_通院歴
                           ├─ Retry → 通院歴(TTS)
                           └─ No more → ★その他問い合わせへ合流（classification=診察のまま。終話判定のデフォルト分岐で処理）

      ─── 健診・検査等ルート ───
      用件2(TTS) → 入力_用件2(AmiVoice STT) → OpenAI_用件2
          ├─ 検査 → 検査_受診希望日(TTS) → 入力_検査_受診希望日(AmiVoice STT) → OpenAI_検査_受診希望日
          │         → saveContext_受診希望日 → 検査_内容(TTS) → 入力_検査_内容(AmiVoice STT) → OpenAI_検査_内容
          │         → saveContext_検査内容 → ★その他問い合わせへ合流
          ├─ ドック → ドック_受診希望人数_希望日(TTS) → 入力_ドック_受診希望人数_希望日(AmiVoice STT) → OpenAI_ドック_受診希望人数_希望日
          │           → saveContext_受診希望人数_希望日 → ドック_受診希望コース(TTS) → 入力_ドック_受診希望コース(AmiVoice STT) → OpenAI_ドック_受診希望コース
          │           → saveContext_受診希望コース → ★その他問い合わせへ合流
          ├─ 健診 → 健診_受診希望日(TTS) → 入力_健診_受診希望日(AmiVoice STT) → OpenAI_健診_受診希望日
          │         → saveContext_受診希望日2 → 健診_予約希望内容(TTS) → 入力_健診_予約希望内容(AmiVoice STT) → OpenAI_健診_予約希望内容
          │         → saveContext_予約希望内容 → ★その他問い合わせへ合流
          └─ TIMEOUT/ERROR/NO_RESULT → リトライ_用件2
                           ├─ Retry → 用件2(TTS)
                           └─ No more → ★その他問い合わせへ合流

      ─── 変更・キャンセルルート ───
      用件3(TTS) → 入力_用件3(AmiVoice STT) → OpenAI_用件3
          ├─ 変更 → saveContext_用件(classification=変更)
          │         → 変更_予約日(TTS) → 入力_変更_予約日(AmiVoice STT) → OpenAI_変更_予約日 → saveContext_予約日
          │         → 変更_予約希望日(TTS) → 入力_変更_予約希望日(AmiVoice STT) → OpenAI_変更_予約希望日 → saveContext_変更_予約希望日
          │         → ★その他問い合わせへ合流
          ├─ キャンセル → saveContext_用件(classification=キャンセル)
          │               → キャンセル_予約日(TTS) → 入力_キャンセル_予約日(AmiVoice STT) → OpenAI_キャンセル_予約日 → saveContext_キャンセル_予約日
          │               → ★その他問い合わせへ合流
          ├─ 問い合わせ → saveContext_用件(classification=確認)
          │               → 確認_内容確認(TTS) → 入力_確認_内容確認(AmiVoice STT) → OpenAI_確認_内容確認 → saveContext_内容確認
          │               → ★その他問い合わせへ合流
          └─ TIMEOUT/ERROR/NO_RESULT → リトライ_用件3
                           ├─ Retry → 用件3(TTS)
                           └─ No more → ★その他問い合わせへ合流（classification未設定のまま。終話判定のデフォルト分岐で処理）

      ─── 共通合流: その他問い合わせ + 終話判定 ───
      ★その他問い合わせ:
      その他_問い合わせ(TTS) → 入力_その他_問い合わせ(AmiVoice STT) → OpenAI_その他_問い合わせ → saveContext_その他問い合わせ

      → 終話判定(Script: classification と phonetype を読み取り分岐)
          ├─ キャンセル → 完了フラグ_キャンセル(status=1, smsFlag=2) → END_キャンセル(TTS) → 切断
          ├─ 新規 → 完了フラグ_診察予約(status=1, smsFlag=1) → END_診察予約(TTS) → 切断
          ├─ 携帯(予約/変更/確認) → 完了フラグ_健診等_携帯(status=1, smsFlag=1) → END_健診等_携帯(TTS) → 切断
          ├─ 固定(予約/変更/確認) → 完了フラグ_健診等_固定(status=1, smsFlag=-1) → END_健診等_固定(TTS) → 切断
          └─ デフォルト(上記以外) → 完了フラグ_上限エラー(status=2, smsFlag=-1) → END_上限エラー(TTS) → 切断

      ─── メインフロー内終話パターン一覧 ───
      END_非通知 → 切断
      END_時間外 → 切断
      END_上限エラー → 切断
      END_再診 → 切断
      END_キャンセル → 切断
      END_診察予約 → 切断
      END_健診等_携帯 → 切断
      END_健診等_固定 → 切断
    notes: |
      冒頭チェーン: wait → saveContextModel2DB → incoming-classifier → acceptance_times
      個人情報は用件の前に聴取（Gen2順序を維持）
      終話判定はScript moduleで classification + phonetype を読み取って分岐
      全ルートが「その他問い合わせ」に合流してから終話判定に進む
      各STT/OpenAIモジュールのTIMEOUT・ERRORはNO_RESULTと同様にリトライカウンターに向ける
      終話判定Scriptのデフォルト分岐: 上記4条件に一致しないclassification値はEND_上限エラー相当（status=2, smsFlag=-1）で処理する

  - flow_name: "藤田胃腸科病院$氏名聴取_20260408"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「藤田胃腸科病院$」に置換。構造・接続・スクリプトは一切変更不可。

      構成: TTS → AmiVoice STT → OpenAI正規化 → Retry → saveContext → script_結果返却
      リトライ上限到達時は氏名未取得のままスキップ。script_結果返却で $runner.setResult() 実行。
    notes: "CLAUDE.md Rule 9/11 準拠。個人情報サブフロー.bivr を完全コピー"

  - flow_name: "藤田胃腸科病院$生年月日聴取_20260408"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「生年月日聴取（復唱あり）」フローを完全コピーする。
      フロー名プレフィックスのみ「藤田胃腸科病院$」に置換。構造・接続・スクリプトは一切変更不可。

      構成: TTS → DTMF AmiVoice STT(max_dtmf_length=8) → OpenAI変換 → DOB Re-confirmation → Retry
      2桁入力時の元号確認分岐（00-07/08-31/32-63）を含む。
      リトライ上限到達時は生年月日未取得のままスキップ。script_結果返却で $runner.setResult() 実行。
    notes: "CLAUDE.md Rule 9/11 準拠。生年月日聴取（復唱あり版）を完全コピー"

  - flow_name: "藤田胃腸科病院$電話番号聴取_20260408"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9/10） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「電話番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「藤田胃腸科病院$」に置換。構造・接続・スクリプトは一切変更不可。

      構成: incoming-classifier → 携帯パス(着信番号復唱) / 固定パス(連絡先聴取)
        → Phone Normalization → Re-confirmation → script_携帯判別 → 結果返却
      phonetype(携帯/その他)をsaveContext2DBでコンテキストに保存。
      メインフローの Custom Jump to Flow は返却値 1(携帯)/2(その他) で分岐可能。
      本フローでは返却値による即時分岐は不要（.* ワイルドカードで次へ進む）。
      phonetypeはメインフロー終話判定時にコンテキストから読み取って使用する。
    notes: "CLAUDE.md Rule 9/10/11 準拠。電話番号聴取を完全コピー。termination=return"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # --- 標準フィールド（itemDefault: true） ---
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "新規"
      - id: "2"
        order: "2"
        value: "再診"
      - id: "3"
        order: "3"
        value: "予約"
      - id: "4"
        order: "4"
        value: "変更"
      - id: "5"
        order: "5"
        value: "キャンセル"
      - id: "6"
        order: "6"
        value: "確認"
    item_default: true
    editable: true
    deletable: false
    notes: "用件分岐結果。新規=初診予約, 再診=再診(来院案内), 予約=健診・検査・ドック, 変更=予約変更, キャンセル=予約キャンセル, 確認=その他問い合わせ"

  - context_name: "patientName"
    context_name_jp: "患者氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名聴取サブフローで聴取。カタカナ変換済み"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "標準フィールドとして定義。本フローでは聴取しない"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "生年月日聴取サブフローで聴取。復唱あり"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "電話番号聴取サブフローで聴取"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "0"
        order: "0"
        value: "途中切断"
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "6"
        order: "6"
        value: "時間外"
      - id: "7"
        order: "7"
        value: "電話案内"
    item_default: true
    editable: true
    deletable: false
    notes: "0=途中切断(saveCompletionFlag2dbでは設定しない) 1=未処理 2=代表案内/非通知 6=時間外 7=再診電話案内"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

  # --- フロー固有フィールド（itemDefault: false） ---
  - context_name: "agentcheck"
    context_name_jp: "本人確認"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "代理の場合「代理」を保存。本人の場合は空"

  - context_name: "agentname"
    context_name_jp: "入電者氏名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "代理の場合のみ聴取。カタカナ変換済み"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更/キャンセルルートのみ。現在の予約日（YYYY-MM-DD形式）"

  - context_name: "DesiredreservationDate"
    context_name_jp: "予約希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "診察予約（新規）/検査/ドック/健診/変更ルートで聴取。フリーテキスト"

  - context_name: "inspection"
    context_name_jp: "検査内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
