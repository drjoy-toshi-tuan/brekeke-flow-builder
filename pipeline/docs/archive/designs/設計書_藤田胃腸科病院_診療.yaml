# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "本人確認"
    tts_announcement: "まずはいまお電話いただいているのは、受診者ご本人様ですか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "本人"
        - "代理"
        - "NO_RESULT"
      mapping:
        - input: "肯定（はい、そうです等）"
          output: "本人"
        - input: "否定（いいえ、違います、代わりに等）"
          output: "代理"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "肯定・否定いずれとも判断できない"
    save_to: "agentcheck"
    next_step: "本人→ジャンプ_氏名聴取 / 代理→入電者氏名"
    retry_failure: "skip"

  - step_name: "入電者氏名"
    tts_announcement: "お電話いただいている方のお名前をフルネームでお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "カタカナ氏名テキスト"
        - "NO_RESULT"
      mapping:
        - input: "音声認識結果（氏名発話）"
          output: "カタカナ変換済み氏名"
        - input: "認識不可・空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "agentname"
    next_step: "ジャンプ_氏名聴取"
    retry_failure: "skip"

  - step_name: "用件1"
    tts_announcement: "それではご用件を次のうち、いずれかでお話ください。「診察の予約」「健診・検査等の予約」「予約の変更やキャンセル」。それでは、お話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "診察"
        - "健診等"
        - "変更キャンセル"
        - "NO_RESULT"
      mapping:
        - input: "診察、内科、胃腸、お腹、印刷、定期、新薬、再診、最新、禁忌、薬、お薬"
          output: "診察"
        - input: "健診、検査、ドック、人間ドック、胃カメラ、大腸カメラ、健康診断、企業健診、特定健診"
          output: "健診等"
        - input: "変更、キャンセル、取り消し、日程変更、薬品"
          output: "変更キャンセル"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "用件を特定できない"
    save_to: "classification"
    next_step: "診察→通院歴 / 健診等→用件2 / 変更キャンセル→用件3"
    retry_failure: "end_failure"

  - step_name: "通院歴"
    tts_announcement: "受診歴についてお伺いします。当院を受診するのは初めてですか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "初診"
        - "再診"
        - "NO_RESULT"
      mapping:
        - input: "肯定（はい、初めて、電気、でんき等）"
          output: "初診"
        - input: "否定（いいえ、通っている、大変等）"
          output: "再診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "肯定・否定の判断不可"
    save_to: "classification"
    next_step: "初診→classification=新規で診察_予約希望日 / 再診→classification=再診でEND_再診"
    retry_failure: "skip"

  - step_name: "診察_予約希望日"
    tts_announcement: "予約希望時期を、「4月1日」のようにお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
        - "NO_RESULT"
      mapping:
        - input: "日付を含む発話"
          output: "発話内容をそのまま記録"
        - input: "認識不可"
          output: "NO_RESULT"
      no_result_condition: "日付情報を含まない"
    save_to: "DesiredreservationDate"
    next_step: "その他問い合わせ"
    retry_failure: "skip"

  - step_name: "用件2"
    tts_announcement: "ご希望される内容を次の3つのうち、いずれかでお話ください。「健診」「人間ドック」「検査」。それでは、お話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "検査"
        - "ドック"
        - "健診"
        - "NO_RESULT"
      mapping:
        - input: "検査、胃カメラ、大腸カメラ、内視鏡"
          output: "検査"
        - input: "ドック、人間ドック、2時間ドック、1泊ドック"
          output: "ドック"
        - input: "健診、企業健診、特定健診、個人健診、健康診断"
          output: "健診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "種別を特定できない"
    save_to: "classification"
    next_step: "検査→検査_受診希望日 / ドック→ドック_受診希望人数_希望日 / 健診→健診_受診希望日"
    retry_failure: "skip"

  - step_name: "検査_受診希望日"
    tts_announcement: "予約希望時期を、「4月1日」のように、第三希望までお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト", "NO_RESULT"]
      mapping:
        - input: "日付を含む発話"
          output: "発話内容をそのまま記録"
      no_result_condition: "認識不可"
    save_to: "DesiredreservationDate"
    next_step: "検査_内容"
    retry_failure: "skip"

  - step_name: "検査_内容"
    tts_announcement: "それではご希望の検査内容を「胃カメラ」のようにお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト", "NO_RESULT"]
      mapping:
        - input: "検査名を含む発話"
          output: "発話内容をそのまま記録"
      no_result_condition: "認識不可"
    save_to: "inspection"
    next_step: "その他問い合わせ"
    retry_failure: "skip"

  - step_name: "ドック_受診希望人数_希望日"
    tts_announcement: "受診希望人数と予約希望時期を、「4月1日」のように、第三希望までお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト", "NO_RESULT"]
      mapping:
        - input: "人数・日付を含む発話"
          output: "発話内容をそのまま記録"
      no_result_condition: "認識不可"
    save_to: "Desirednumberofpeople"
    next_step: "ドック_受診希望コース"
    retry_failure: "skip"

  - step_name: "ドック_受診希望コース"
    tts_announcement: "それではご希望のコースを次の2つのうち、いずれかでお話しください。「2時間コース」「1泊コース」。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "2時間コース"
        - "1泊コース"
        - "NO_RESULT"
      mapping:
        - input: "2時間、日帰り、簡易"
          output: "2時間コース"
        - input: "1泊、宿泊、泊まり"
          output: "1泊コース"
        - input: "判断不可"
          output: "NO_RESULT"
      no_result_condition: "コースを特定できない"
    save_to: "course"
    next_step: "その他問い合わせ"
    retry_failure: "skip"

  - step_name: "健診_受診希望日"
    tts_announcement: "予約希望時期を、「4月1日」のように、第三希望までお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト", "NO_RESULT"]
      mapping:
        - input: "日付を含む発話"
          output: "発話内容をそのまま記録"
      no_result_condition: "認識不可"
    save_to: "DesiredreservationDate"
    next_step: "健診_予約希望内容"
    retry_failure: "skip"

  - step_name: "健診_予約希望内容"
    tts_announcement: "それではご希望の健診内容を次の3つのうち、いずれかでお話しください。「企業健診」「特定健診・がん健診」「個人健診」。わからない場合はわからないとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "企業健診"
        - "特定健診"
        - "個人健診"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "企業、会社、職員、事業所、福利厚生、雇用、入職"
          output: "企業健診"
        - input: "特定、市民、区民、がん、メタボ"
          output: "特定健診"
        - input: "個人、自費、自由診療、健康チェック"
          output: "個人健診"
        - input: "わからない、不明"
          output: "わからない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "種別を特定できない"
    save_to: "ReservationRequestDetails"
    next_step: "その他問い合わせ"
    retry_failure: "skip"

  - step_name: "用件3"
    tts_announcement: "ご用件を次の3つのうち、いずれかでお話ください。「予約の変更」「予約のキャンセル」「その他問い合わせ」。それでは、お話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "変更、日程変更、薬品"
          output: "変更"
        - input: "キャンセル、取り消し"
          output: "キャンセル"
        - input: "問い合わせ、確認、聞きたい"
          output: "問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "種別を特定できない"
    save_to: "classification"
    next_step: "変更→変更_予約日 / キャンセル→キャンセル_予約日 / 問い合わせ→確認_内容確認"
    retry_failure: "skip"

  - step_name: "変更_予約日"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD形式", "NO_RESULT"]
      mapping:
        - input: "日付表現"
          output: "YYYY-MM-DD形式に正規化（着信日から算出）"
      no_result_condition: "日付として解析できない"
    save_to: "reservationDate"
    next_step: "変更_予約希望日"
    retry_failure: "skip"

  - step_name: "変更_予約希望日"
    tts_announcement: "予約希望時期を、「4月1日」のようにお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト", "NO_RESULT"]
      mapping:
        - input: "日付を含む発話"
          output: "発話内容をそのまま記録"
      no_result_condition: "認識不可"
    save_to: "DesiredreservationDate"
    next_step: "その他問い合わせ"
    retry_failure: "skip"

  - step_name: "キャンセル_予約日"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD形式", "NO_RESULT"]
      mapping:
        - input: "日付表現"
          output: "YYYY-MM-DD形式に正規化（着信日から算出）"
      no_result_condition: "日付として解析できない"
    save_to: "reservationDate"
    next_step: "その他問い合わせ"
    retry_failure: "skip"

  - step_name: "確認_内容確認"
    tts_announcement: "お問い合わせの内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト", "NO_RESULT"]
      mapping:
        - input: "問い合わせ内容"
          output: "発話内容をそのまま記録"
      no_result_condition: "認識不可"
    save_to: "details"
    next_step: "その他問い合わせ"
    retry_failure: "skip"

  - step_name: "その他問い合わせ"
    tts_announcement: "その他お伝えしたいことがあればお話しください。なければないとお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["フリーテキスト", "NO_RESULT"]
      mapping:
        - input: "追加連絡事項"
          output: "発話内容をそのまま記録"
        - input: "ない、なし、特にない"
          output: "なし"
      no_result_condition: "認識不可"
    save_to: "question"
    next_step: "終話判定(Script)"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  - name: "END_診察予約"
    condition: "classification=新規（初診の診察予約完了）"
    tts_announcement: "診察の予約の申し込みを受付いたしました。3営業日以内に、担当者からの折り返し電話、もしくは、SMSにて確定となります。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_診察予約"

  - name: "END_再診"
    condition: "通院歴=再診（再診患者の電話案内）"
    tts_announcement: "受診歴のある方は予約を承っておりません。直接来院して診察の順番をお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_再診"

  - name: "END_健診等_携帯"
    condition: "classification={予約,変更,確認} かつ phonetype=携帯"
    tts_announcement: "お申し込みを受付いたしました。担当者からの折り返し電話、もしくはSMSにてご連絡いたします。携帯電話にはSMSが送信されますので、追加情報をご入力ください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_健診等_携帯"

  - name: "END_健診等_固定"
    condition: "classification={予約,変更,確認} かつ phonetype=その他（固定電話）"
    tts_announcement: "お申し込みを受付いたしました。担当者からの折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_健診等_固定"

  - name: "END_キャンセル"
    condition: "classification=キャンセル"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。必要がある場合のみ担当者からご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_時間外"
    condition: "acceptance_timesで時間外と判定"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_非通知"
    condition: "incoming-classifierで非通知と判定"
    tts_announcement: "お電話ありがとうございます。藤田胃腸科病院の予約専用AI電話です。お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に186を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_上限エラー"
    condition: "用件1のリトライ上限到達"
    tts_announcement: "お電話口での確認が難しい状況となりました。恐れ入りますが、改めておかけ直しいただけますでしょうか。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_上限エラー"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["classification", "phonetype"]
  description: >
    終話判定はScript moduleで実装する。
    classification（用件結果）と phonetype（電話番号サブフローで保存済み）の2キーで分岐する。
    phonetype はコンテキストから読み取る（電話番号サブフローがsaveContext2DBで保存済み）。
  patterns:
    - condition: "classification=キャンセル"
      sms_flag: "2"
      status: "1"
      notes: "キャンセル用SMS。phonetype に関わらずsmsFlag=2"
    - condition: "classification=新規"
      sms_flag: "1"
      status: "1"
      notes: "初診予約完了SMS。phonetype に関わらずsmsFlag=1"
    - condition: "classification=再診"
      sms_flag: "-1"
      status: "7"
      notes: "再診は終話判定の前に直接END_再診に分岐。ここには到達しない"
    - condition: "phonetype=携帯 かつ classification={予約,変更,確認}"
      sms_flag: "1"
      status: "1"
      notes: "健診等・変更・確認 + 携帯 → SMS送信あり"
    - condition: "phonetype=その他 かつ classification={予約,変更,確認}"
      sms_flag: "-1"
      status: "1"
      notes: "健診等・変更・確認 + 固定 → SMS送信なし"
    - condition: "上記以外（classification が未確定/不一致のフォールバック）"
      sms_flag: "-1"
      status: "2"
      notes: >
        デフォルト分岐。代表案内扱いで折り返しなし。END_上限エラーと同じTTSを使用。
        到達パス例: 通院歴No more(classification=診察のまま)、用件3 No more(classification未設定)

