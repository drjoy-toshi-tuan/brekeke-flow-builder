# --- セクション6: 聴取項目一覧 ---
# メインフロー内の聴取項目のみ。サブフロー内の聴取項目はリファレンスbivrに従う。
hearing_items:
  # --- 個人情報ブロック（用件の前に聴取） ---
  - order: 1
    name: "本人確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "agentcheck"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "本人"
      - "代理"
    notes: "肯定→本人、否定→代理。代理の場合のみ agentcheck=代理 を保存。本人の場合は次へスキップ"

  - order: 2
    name: "入電者氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "agentname"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "代理の場合のみ聴取。カタカナ変換。リトライ上限到達時は次へスキップ"

  # order 3-5: サブフロー（氏名/生年月日/電話番号）-- Rule 9準拠、設計書では記載省略

  # --- 用件聴取ブロック ---
  - order: 6
    name: "用件1"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "診察"
      - "健診等"
      - "変更キャンセル"
    notes: >
      3択分岐（中間ルーティングラベル）。OpenAI直後にsaveContextは行わない。
      各分岐パス内でsaveContext_用件(classification=最終値)を個別に実行する。
      診察→診察ルート内でclassification=新規/再診に上書き。
      健診等→classification=予約をセット。
      変更キャンセル→用件3分岐内でclassification=変更/キャンセル/確認に設定。
      output_labelsの「診察」「健診等」「変更キャンセル」はOpenAI分岐ラベルであり、
      context_fields.classification.range_valuesの値とは異なる。

  # --- 診察予約ルート ---
  - order: 7
    name: "通院歴"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "初診"
      - "再診"
    notes: "初診→classification=新規で続行、再診→classification=再診で電話案内終話。リトライ上限→その他問い合わせへスキップ"

  - order: 8
    name: "診察_予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "初診ルートのみ。フリーテキストで保存"

  # --- 健診・検査等ルート ---
  - order: 9
    name: "用件2"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "検査"
      - "ドック"
      - "健診"
    notes: "健診等ルート内の3択分岐。全パターンでclassification=予約をセット"

  - order: 10
    name: "検査_受診希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
