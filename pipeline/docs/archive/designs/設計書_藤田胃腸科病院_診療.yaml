    output_format: "free_text"
    output_labels: []
    notes: "検査ルートのみ。第三希望までフリーテキスト"

  - order: 11
    name: "検査_内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inspection"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "検査ルートのみ。希望検査内容"

  - order: 12
