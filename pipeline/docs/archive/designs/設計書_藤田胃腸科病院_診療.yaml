# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2からの移管。Gen2フローの聴取順序（個人情報 → 用件）を維持する"
  - "本人確認ステップあり: 代理の場合は入電者氏名(agentname)を別途聴取してから患者氏名(patientName)を聴取する"
  - "診察券番号は聴取しない（Gen2フロー内に聴取ステップなし）"
  - "診療科は独立した聴取ステップとして設けない（用件分岐で代替。Gen2と同様）"
  - "終話判定にScript moduleを使用: classification + phonetype の2キーで8パターンに分岐"
  - "smsFlag=2 はキャンセル専用値（Gen2仕様の引き継ぎ。Dr.JOY側でキャンセル用SMSテンプレートの設定が必要な可能性あり）"
  - "Gen2 status=0（途中切断）はGen3で使用禁止。saveCompletionFlag2dbでは設定しない"
  - "Gen2 status=7（再診電話案内）をGen3でもそのまま使用"
  - "Gen2のcheckpoint/endpoint/smsFlag/checkoutフィールドはsaveContextModel2DBに含めない（CLAUDE.md Gen2→Gen3マッピングルール）"
  - "サブフロー（氏名・生年月日・電話番号）はCLAUDE.md Rule 9 準拠で個人情報サブフロー.bivr を完全コピー"
  - "電話番号サブフローはtermination=return。phonetypeはサブフロー内でコンテキストに保存済み。メインフロー終話判定で読み取る"
  - "Gen2の数字誤認識キーワード（C→4、Go→5等）はOpenAIプロンプトで対応（prompterが記述）"
  - "Gen2の診療科キーワード（胃腸内科、内視鏡内科等の類義語）はOpenAIプロンプトの参照情報として prompter に引き継ぐ"
  - "複合用件発話（例: 診察予約と検査も）の場合は、openai_rules優先順位に従い最初の用件を選択して処理する。二重予約対応は担当者折り返し時に対応する"
  - "Gen2 contextNameのケーシング（DesiredreservationDate等）はDr.JOY互換性のためGen2仕様をそのまま維持"

