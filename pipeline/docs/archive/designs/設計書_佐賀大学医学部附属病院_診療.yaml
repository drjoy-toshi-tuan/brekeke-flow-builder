      - "ない"
    notes: "変更・キャンセルルートのみ。profile_words: 診療科辞書。レコメンドなし。「ない」→空欄で次へ"

  - order: 6
    name: "診療科2_二択_心外脳外"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment2"
    openai_processing: "classify"
