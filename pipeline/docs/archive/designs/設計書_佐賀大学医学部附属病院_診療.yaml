# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2からの移管。聴取順序はGen2を維持: 用件確認→[変更アナウンス]→個人情報（サブフロー）→診療科→用件別聴取"
  - "診療科聴取で「しんげ」「心外」「神外」は二択ステップ（心臓血管外科/脳神経外科）に分岐。「ストーマ」「ストマ」は二択ステップ（一般・消化器外科/泌尿器科）に分岐"
  - "診療科レコメンド（呼吸器→内科/外科等）はOpenAIプロンプト内で処理。1発話1意図の制約との兼ね合いはprompterが判断"
  - "キャンセルルートの「変更確認」で「はい」の場合、saveContext2DBでclassification=変更に上書きし、変更ルートの予約希望日時聴取→END_変更に合流"
  - "予約日（reservationDate）は復唱禁止。形式は YYYY-MM-DD 00:00"
  - "予約希望日時（DesiredreservationDate）は過去日/当日の場合のみ再聴取。文字列（例: できるだけ早く）はそのまま保存"
  - "Gen2の代表電話番号 0952-31-6511 をFAQ外対応の案内に使用"
  - "Gen2 function定義のうち history/institution/introduction/disease/symptoms はフローで聴取されていないため除外。必要であれば追加可能"
  - "診療科2は「ない」「いいえ」「わからない」等の回答も受け付ける。displayType=TEXTとし、空欄で次へ進む"

