# --- セクション3: フローの目的 ---
purpose: "患者からの予約関連電話を受け、用件（予約変更・キャンセル・確認）を確認し、個人情報（診察券番号・氏名・生年月日・連絡先電話番号）と診療科を聴取して折り返し受付を自動化する。変更ルートでは予約希望日時を、キャンセルルートでは変更転換の有無とキャンセル理由を、確認ルートでは確認内容を追加聴取する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "佐賀大学医学部附属病院$診療_20260409"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 完了フラグ_非通知(saveCompletionFlag2db, status=2, smsFlag=-1) → 非通知_アナウンス(TTS) → 切断
              └─ 通常/携帯/固定/海外/その他 → 冒頭_アナウンス(TTS)
                    → 用件確認(TTS → STT → OpenAI → Retry)
                        ├─ 変更 → 変更_アナウンス(TTS) → ★個人情報聴取パス
                        ├─ キャンセル → ★個人情報聴取パス
                        ├─ 確認 → ★個人情報聴取パス
                        ├─ 代表案内 → 完了フラグ_代表案内(status=2, smsFlag=-1) → 代表案内_アナウンス(TTS) → 切断
                        └─ リトライ失敗 → 完了フラグ_聴取失敗(status=3, smsFlag=-1) → 聴取失敗_アナウンス(TTS) → 切断

      ★個人情報聴取パス:
        Jump to 診察券番号聴取SF
          → Jump to 氏名聴取SF
            → Jump to 生年月日聴取SF
              → Jump to 電話番号聴取SF
                → 診療科_聴取(TTS → STT → OpenAI → Retry)
                    ├─ {診療科名} → ★用件分岐_診療科後
                    ├─ 二択_心外脳外 → 診療科_二択_心外脳外(TTS → STT → OpenAI) → ★用件分岐_診療科後
                    ├─ 二択_ストーマ → 診療科_二択_ストーマ(TTS → STT → OpenAI) → ★用件分岐_診療科後
                    ├─ わからない → ★用件分岐_診療科後（空欄で次へ）
                    └─ リトライ失敗 → ★用件分岐_診療科後（空欄で次へ）

      ★用件分岐_診療科後(ContextMatchRouter on OpenAI_用件確認):
        ├─ 確認 → 確認内容_聴取(TTS → STT → OpenAI) → Jump to RAGサブフロー → 完了フラグ_確認(status=1, smsFlag=3) → 確認_終話(TTS) → 切断
        └─ 変更/キャンセル → 診療科2_聴取(TTS → STT → OpenAI → Retry)
              ├─ {診療科名} → ★予約日聴取
              ├─ 二択_心外脳外 → 診療科2_二択_心外脳外(TTS → STT → OpenAI) → ★予約日聴取
              ├─ 二択_ストーマ → 診療科2_二択_ストーマ(TTS → STT → OpenAI) → ★予約日聴取
              └─ ない/リトライ失敗 → ★予約日聴取（空欄で次へ）

      ★予約日聴取:
        予約日_聴取(TTS → STT → OpenAI → Retry)
          → ★用件分岐_予約日後(ContextMatchRouter on OpenAI_用件確認)
              ├─ 変更 → 予約希望日時_聴取(TTS → STT → OpenAI → Retry)
              │     ├─ 未来日/文字列 → Jump to RAGサブフロー → 完了フラグ_変更(status=1, smsFlag=1) → 変更_終話(TTS) → 切断
              │     └─ 過去日_当日 → 予約希望日時_再聴取(TTS → STT → OpenAI)
              │           → Jump to RAGサブフロー → 完了フラグ_変更(status=1, smsFlag=1) → 変更_終話(TTS) → 切断
              └─ キャンセル → 変更確認_聴取(TTS → STT → OpenAI → Retry)
                    ├─ はい → saveContext2DB(classification=変更) → 予約希望日時_聴取(共有)
                    └─ いいえ → キャンセル理由_聴取(TTS → STT → OpenAI → Retry)
                          → Jump to RAGサブフロー → 完了フラグ_キャンセル(status=1, smsFlag=2) → キャンセル_終話(TTS) → 切断
    notes: |
      - acceptance_times不使用（Gen2に営業時間の記載なし）
      - incoming-classifierの直後に冒頭アナウンスを配置（時間外チェーンなし）
      - 用件確認は3択（変更/キャンセル/確認）+ 代表案内分岐
      - 個人情報サブフロー4本を順番にJump to Flowで遷移
      - 診療科聴取でしんげ/ストーマの二択分岐ステップあり
      - 診療科レコメンド（呼吸器→内科/外科等）はOpenAIプロンプト内で処理
      - キャンセル→変更転換はsaveContext2DBでclassificationを上書き
      - 全正常終話前にRAGサブフローを配置（パターン2）

  - flow_name: "佐賀大学医学部附属病院$診察券番号聴取_20260409"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピー。
      フロー名プレフィックスのみ「佐賀大学医学部附属病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "「わからない」分岐あり"

  - flow_name: "佐賀大学医学部附属病院$氏名聴取_20260409"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。
