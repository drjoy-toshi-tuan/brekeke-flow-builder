    output_labels:
      - "一般・消化器外科"
      - "泌尿器科"
    notes: "ストーマの発話時に分岐。消化器を含む→一般・消化器外科"

  - order: 5
    name: "診療科2_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment2"
    openai_processing: "normalize"
    output_format: "label"
    output_labels:
      - "{28診療科名のいずれか}"
      - "二択_心外脳外"
