    output_format: "date_text"
    output_labels: []
    notes: "変更・キャンセルルートのみ。YYYY-MM-DD 00:00 形式。復唱禁止"

  - order: 9
    name: "予約希望日時_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "未来日"
      - "過去日_当日"
      - "文字列"
    notes: "変更ルートのみ。過去日/当日の場合は再聴取。文字列（例: できるだけ早く）はそのまま保存"

  - order: 10
    name: "変更確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "DTMF 1=はい, 2=いいえ。キャンセルルートのみ。はい→変更に転換、いいえ→キャンセル理由聴取"

  - order: 11
    name: "キャンセル理由_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "キャンセルルートのみ。フリーテキスト保存"

  - order: 12
    name: "確認内容_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "確認ルートのみ。フリーテキスト保存"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の3つのうちのいずれかでお話ください。予約変更、予約キャンセル、予約確認。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "代表案内"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「変更」「予約変更」「契約変更」「契約法」「先行」を含む"
          output: "変更"
        - input: "DTMF 2 または「キャンセル」を含む"
          output: "キャンセル"
        - input: "DTMF 3 または「確認」を含む"
          output: "確認"
        - input: "上記3用件に該当しない明確な発話（AI電話で対応不可の内容）"
          output: "代表案内"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "変更→変更_アナウンス / キャンセル・確認→サブフロー遷移_診察券番号 / 代表案内→代表案内_アナウンス"
    retry_failure: "end_failure"

  - step_name: "変更_アナウンス"
    tts_announcement: "既にお持ちの予約を、本日の受診に変更することは、AI電話では受け付けておりませんので、ご了承ください。"
    input_method: "none"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: null
    next_step: "サブフロー遷移_診察券番号"
    retry_failure: "skip"

  - step_name: "診療科_聴取"
    tts_announcement: "次に、予約されていた診療科を、「診療科は○○です。」のようにお話ください。わからない場合は、わからない、とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{28診療科名のいずれか}"
        - "二択_心外脳外"
        - "二択_ストーマ"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "診療科リスト28科のいずれか、またはキーワードに一致"
          output: "{該当する診療科名}"
        - input: "「しんげ」「心外」「神外」を含む"
          output: "二択_心外脳外"
        - input: "「ストーマ」「ストマ」を含む"
          output: "二択_ストーマ"
        - input: "「わからない」を含む"
          output: "わからない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "診療科リスト・キーワード・二択条件・「わからない」のいずれにも該当しない"
    save_to: "clinicalDepartment"
    next_step: "{診療科名}→用件分岐_診療科後 / 二択_心外脳外→診療科_二択_心外脳外 / 二択_ストーマ→診療科_二択_ストーマ / わからない→用件分岐_診療科後"
    retry_failure: "skip"

  - step_name: "診療科_二択_心外脳外"
    tts_announcement: "心臓血管外科ですか？脳神経外科ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "心臓血管外科"
        - "脳神経外科"
        - "NO_RESULT"
      mapping:
        - input: "心臓血管外科のキーワード（心臓、心外、胸外、胸部外科）"
          output: "心臓血管外科"
        - input: "脳神経外科のキーワード（脳外、脳神経）"
          output: "脳神経外科"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "どちらの診療科にも判定できない"
    save_to: "clinicalDepartment"
    next_step: "用件分岐_診療科後"
    retry_failure: "skip"

  - step_name: "診療科_二択_ストーマ"
    tts_announcement: "消化器外科ですか？泌尿器科ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "一般・消化器外科"
        - "泌尿器科"
        - "NO_RESULT"
      mapping:
        - input: "「消化器」を含む"
          output: "一般・消化器外科"
        - input: "「泌尿」を含む"
          output: "泌尿器科"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "どちらの診療科にも判定できない"
    save_to: "clinicalDepartment"
    next_step: "用件分岐_診療科後"
    retry_failure: "skip"

  - step_name: "診療科2_聴取"
    tts_announcement: "同じ日に予約されていた診療科があれば、「診療科は○○です。」のようにお話ください。ない場合は、ない、とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{28診療科名のいずれか}"
        - "二択_心外脳外"
        - "二択_ストーマ"
        - "ない"
        - "NO_RESULT"
      mapping:
        - input: "診療科リスト28科のいずれか、またはキーワードに一致"
          output: "{該当する診療科名}"
        - input: "「しんげ」「心外」「神外」を含む"
          output: "二択_心外脳外"
        - input: "「ストーマ」「ストマ」を含む"
          output: "二択_ストーマ"
        - input: "「ない」「いいえ」「わからない」「すいません」「お願いします」「結構です」「失礼します」を含む"
          output: "ない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "clinicalDepartment2"
    next_step: "{診療科名}→予約日_聴取 / 二択→二択ステップ→予約日_聴取 / ない→予約日_聴取"
    retry_failure: "skip"

  - step_name: "診療科2_二択_心外脳外"
    tts_announcement: "心臓血管外科ですか？脳神経外科ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "心臓血管外科"
        - "脳神経外科"
        - "NO_RESULT"
      mapping:
        - input: "心臓血管外科のキーワード"
          output: "心臓血管外科"
        - input: "脳神経外科のキーワード"
          output: "脳神経外科"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "どちらにも判定できない"
    save_to: "clinicalDepartment2"
    next_step: "予約日_聴取"
    retry_failure: "skip"

  - step_name: "診療科2_二択_ストーマ"
    tts_announcement: "消化器外科ですか？泌尿器科ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "一般・消化器外科"
        - "泌尿器科"
        - "NO_RESULT"
      mapping:
        - input: "「消化器」を含む"
          output: "一般・消化器外科"
        - input: "「泌尿」を含む"
          output: "泌尿器科"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "どちらにも判定できない"
    save_to: "clinicalDepartment2"
    next_step: "予約日_聴取"
    retry_failure: "skip"

  - step_name: "予約日_聴取"
    tts_announcement: "次に、現在の予約日をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付文字列"
      mapping:
        - input: "日付として認識可能な発話"
          output: "YYYY-MM-DD 00:00 形式の日付文字列"
        - input: "日付として認識できない"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない"
    save_to: "reservationDate"
    next_step: "用件分岐_予約日後"
    retry_failure: "skip"

  - step_name: "予約希望日時_聴取"
    tts_announcement: "次に、予約希望日をお伺いいたします。ご都合の良い日時をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "未来日"
        - "過去日_当日"
        - "文字列"
        - "NO_RESULT"
      mapping:
        - input: "着信日の翌日以降の日付"
          output: "未来日"
        - input: "着信日当日または過去の日付"
          output: "過去日_当日"
        - input: "日付以外の文字列（例: できるだけ早く）"
          output: "文字列"
        - input: "認識できない"
          output: "NO_RESULT"
      no_result_condition: "認識できない"
    save_to: "DesiredreservationDate"
    next_step: "未来日/文字列→RAGサブフロー→END_変更 / 過去日_当日→予約希望日時_再聴取"
    retry_failure: "skip"

  - step_name: "予約希望日時_再聴取"
    tts_announcement: "恐れ入りますが、明日以降の日程をもう一度お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付文字列/文字列"
      mapping:
        - input: "日付または文字列"
          output: "そのまま保存"
      no_result_condition: "認識できない場合も空欄で次へ"
    save_to: "DesiredreservationDate"
    next_step: "RAGサブフロー→END_変更"
    retry_failure: "skip"

  - step_name: "変更確認"
    tts_announcement: "別の日にちに変更して、予約をしますか？はい、または、いいえ、でお答えください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」を含む"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「違います」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "はい/いいえが判定できない"
    save_to: null
    next_step: "はい→saveContext2DB(classification=変更)→予約希望日時_聴取 / いいえ→キャンセル理由_聴取"
    retry_failure: "skip"

  - step_name: "キャンセル理由_聴取"
    tts_announcement: "次に、キャンセル理由を、「他の病院に通院することになった」など簡潔にお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "RAGサブフロー→END_キャンセル"
    retry_failure: "skip"

  - step_name: "確認内容_聴取"
    tts_announcement: "ご確認内容について、お伺いします。次回の予約日時を教えて欲しい、など、内容を簡潔にお話ください。後ほどスタッフより確認内容について回答させていただきます。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "details"
    next_step: "RAGサブフロー→END_確認"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "お電話ありがとうございます。佐賀大学医学部附属病院の予約専用AI電話です。恐れ入りますが、非通知設定のお電話はお受けできません。お手数ですが、番号を通知のうえ、改めておかけ直しください。電話番号の前に186を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"
  # --- 正常系 ---
  - name: "END_代表案内"
    condition: "FAQ外の質問・AI電話で対応不可の内容"
    tts_announcement: "お話いただきました内容は、AI電話では対応ができません。外来受付時間内に代表電話0952-31-6511へお問い合わせください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内"
  - name: "END_変更"
    condition: "変更ルート全聴取完了"
    tts_announcement: "予約変更の申し込みを受け付けいたしました。この後送信するショートメールから、お申し込み内容のご確認をお願いします。3診療日以内に担当者からショートメールまたは、折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更"
  - name: "END_キャンセル"
    condition: "キャンセルルート全聴取完了"
    tts_announcement: "予約キャンセルの申し込みを受け付けいたしました。確認事項がある場合のみ、担当者よりご連絡させていただきます。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル"
  - name: "END_確認"
    condition: "確認ルート全聴取完了"
    tts_announcement: "予約確認の申し込みを受け付けいたしました。この後送信するショートメールから、お申し込み内容のご確認をお願いします。3診療日以内に担当者からショートメールまたは、折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "3"
    completion_flag_name: "完了フラグ_確認"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # smsFlag は各終話パターンに直接設定済みのため、ContextMatchRouter/Scriptでの分岐は不要。
  # 変更=1, キャンセル=2, 確認=3 が各ルートで確定的に決まる。

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"
  inquiry_insertion_point: ""
  pre_termination: true
  # パターン2: 全正常終話前（END_変更、END_キャンセル、END_確認）にRAGサブフローを配置。
  # 「最後にご質問はございますか？」と問いかけ、質問があればRAG回答ループ、なければ終話へ。
  # パターン1の挿入ポイントは本フローに「問い合わせ」専用ルートがないため非該当。

