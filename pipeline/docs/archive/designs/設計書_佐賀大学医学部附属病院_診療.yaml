# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "変更"
      - "キャンセル"
      - "確認"
      - "代表案内"
    notes: "DTMF 1=変更, 2=キャンセル, 3=確認。代表案内はFAQ外対応"

  - order: 2
    name: "診療科_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "label"
    output_labels:
      - "{28診療科名のいずれか}"
      - "二択_心外脳外"
      - "二択_ストーマ"
      - "わからない"
    notes: "profile_words: 診療科辞書。28科正規化 + しんげ/ストーマ二択分岐。リトライ失敗時は空欄で次へ"

  - order: 3
    name: "診療科_二択_心外脳外"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "心臓血管外科"
      - "脳神経外科"
    notes: "しんげ/心外/神外の発話時に分岐。失敗時は空欄で次へ"

  - order: 4
    name: "診療科_二択_ストーマ"
