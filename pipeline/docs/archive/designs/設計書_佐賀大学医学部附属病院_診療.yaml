    notes: "復唱なし"

  - flow_name: "佐賀大学医学部附属病院$生年月日聴取_20260409"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー。
      フロー名プレフィックスのみ「佐賀大学医学部附属病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱あり"

  - flow_name: "佐賀大学医学部附属病院$電話番号聴取_20260409"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。
      フロー名プレフィックスのみ「佐賀大学医学部附属病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱あり。incoming-classifier内蔵。携帯/固定分岐"

  - flow_name: "佐賀大学医学部附属病院$RAG検索_20260409"
    diagram: |
      CLAUDE.md Rule 16 準拠。docs/reference/bivr/samples/json/RAG検索.json を完全コピー。
      フロー名プレフィックスのみ「佐賀大学医学部附属病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "パターン2。全正常終話前に配置。冒頭TTS: 何かご質問はございますか？"

