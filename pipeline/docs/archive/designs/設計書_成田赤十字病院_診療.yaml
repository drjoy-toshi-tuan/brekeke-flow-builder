# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2 function の endpoint / checkpoint / checkout / smsFlag はGen3 の saveContextModel2DB に含めない。endpoint・smsFlag は各 saveCompletionFlag2db の引数で制御、checkpoint・checkout は Dr.JOY 側で通話ログから判別"
  - "Gen2 status ルール: `0`=冒頭切断/途中切断 / `1`=通話完了 / `2`=代表案内。CLAUDE.md 規約により Gen3 では status=`0` / `5` を使用禁止のため、代表案内系（本日翌日・救急）を status=2、途中切断系は Dr.JOY 側で別途判別する設計に変更"
  - "Gen2 施設固有ルール: Yes/No 判定において『肺』『いいです』を肯定扱い → 当日翌日確認 / 健診_変更_内容確認1 の OpenAI プロンプトに施設固有肯定語として明記すること（prompter 担当）"
  - "Gen2 施設固有ルール: 診察券番号・連絡先電話番号の数字認識で『for/C』→4、『号/go』→5 の変換が必要 → 診察券番号聴取/電話番号聴取サブフローの OpenAI プロンプト側で対応（サブフローJSON 完全コピー前提だが、必要なら prompter が追加調整）"
  - "Gen2 施設固有ルール: 患者名は『苗字のみ』と明確に判定できる場合のみ下の名前再質問を1回だけ許可 → 氏名聴取サブフローの OpenAI プロンプトに明記（必要なら prompter が追加調整）"
  - "Gen2 施設固有ルール: 診療科『こきゅうき/しんけい』等の曖昧発話は Gen2 ではレコメンド質問（『呼吸器外科でしょうか？呼吸器内科でしょうか？』）で再確認していたが、Gen3 では OpenAI プロンプト + profile_words で1ショット処理し、確定不能なら no_result_default='登録なし' で保存。挙動差異は confirmation_items N-6 参照"
  - "Gen2 施設固有ルール: 予約日は10-12月入電で1-9月の日付を言われたら翌年扱い → 診療_変更_予約日 / 診療_キャンセル_予約日 / 健診_変更_予約日 / 健診_キャンセル_予約日 の OpenAI プロンプト（datetime正規化）に明記"
  - "Gen2 施設固有ルール: 入電者が一度に複数情報を伝えた場合、既聴取項目は絶対に復唱・確認しない → 各 OpenAI プロンプトに『既に伝えられた内容は絶対に復唱・確認を行わず、不足している項目のみを一つずつ質問する』を明記（prompter 担当）"
  - "Gen2 の DesiredreservationDate（PascalCase）は Gen3 命名規則に合わせ desiredReservationDate（camelCase）に統一"
  - "Gen2 の 予約日 vs 予約希望日 の区別は厳守。reservationDate は DATE 型（YYYY-MM-DD 形式）、desiredReservationDate は TEXT 型（フリーテキスト）。予約日のヒアリングがなかった場合に予約希望日の中身を予約日に入れない"
  - "用件2_診療 / 用件2_健診 の『その他問い合わせ』（DTMF 4）は classification='確認' に正規化（Gen2 function enum の『その他問い合わせ』を Gen3 では『確認』として統合）。Gen2 『予約確認』も同様に『確認』に正規化"
  - "1-11 患者名はカタカナ変換 → 氏名聴取サブフロー内部の OpenAI プロンプトに明記（サブフロー完全コピーのため標準動作だが、必要なら prompter が追加調整）"
  - "1-12 生年月日は和暦/西暦両対応、2桁元号判定（00-07/08-31/32-63/64-99 の再ヒアリング分岐） → 生年月日聴取サブフロー完全コピーで標準対応"
  - "1-10 連絡先電話番号は10桁/11桁バリデーション、11桁時は先頭3桁が090/080/070/050 でなければ再ヒアリング → 電話番号聴取サブフロー完全コピーで標準対応"
  - "1-9 診察券番号は3桁以上必須 → 診察券番号聴取サブフロー完全コピーで標準対応。『わからない』分岐あり（空欄保存）"
  - "冒頭アナウンスに施設名『成田赤十字病院』と『代表電話0476-22-2311（平日9-16時）』『人間ドックはホームページからも予約可』を含む（Gen2 2026/04/17 改訂版セリフそのまま転記）"
  - "Gen2 では『もしもし』のみ発話時は『お声は届いております』と返してから質問再掲 → Gen3 では OpenAI プロンプトにこのルールを含めるか、STT 側で単語単独の低スコアを reject する方針（prompter 判断）。共通プロンプトルールとして全 generate_by_OpenAI に入れる想定"
  - "非通知着信は Gen3 デフォルトで opening から END_非通知 に直結（Gen2 は非通知でも DTMF で電話番号を聴取していたが、Gen3 標準仕様に準拠）。ビジネス要件として非通知受付が必要なら confirmation_items N-4 の対応が必要"
  - "TTS プロンプトは `{tts_g:...}`（全小文字）形式をデフォルトとする。`{TTS_AI:...}`（大文字）は誤り。SSML タグ（<speak>, <break>, <say-as> 等）は使用禁止。ただし電話番号・診察券番号の復唱系はサブフロー内部のデフォルト復唱で対応し、メインフロー側では SSML を記述しない"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID — Dr.JOY管理画面で確認）"
    resolved: false
    blocker: false
    notes: "Dr.JOY 側で設定。フローJSONには含めない"

  - item: "営業時間スケジュール（acceptance_times の business_hours 詳細）"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトには明示的な営業時間記載なし（冒頭アナウンスに『平日9時から16時は代表電話』の言及あり）。AI電話の受付可能時間帯は Dr.JOY 管理画面で設定する前提（仮値: 24時間 or 平日9-17時）"

  - item: "稼働休止期間（年末年始等）"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトに記載なし。Dr.JOY 管理画面から設定"

  - item: "SMS配信文面（Dr.JOY側）"
    resolved: false
    blocker: false
    notes: "フロー側は smsFlag=1 を立てるのみ。実際のSMS本文はDr.JOY管理画面から設定。Gen2 は予約/変更/確認で smsFlag=1、キャンセルで smsFlag=2 だったが Gen3 は 1/-1 のみ → 完了系は全て smsFlag=1 に統合"

  - item: "非通知着信の扱い（Gen3 標準=弾く vs Gen2 踏襲=受付）"
