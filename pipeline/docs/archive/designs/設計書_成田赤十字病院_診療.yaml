hearing_items:
  - order: 1
    name: "当日翌日確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "sameDayInquiry"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "肯定"
      - "否定"
    notes: "Yes/No 判定。施設固有ルールにより『肺』『いいです』も肯定扱い（Gen2 特殊ルール）。肯定→END_代表案内_本日翌日、否定→電話番号聴取サブフローへ"

  - order: 2
    name: "用件1"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "subject"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "診療"
      - "健診"
    notes: "DTMF 1=診療, 2=健診。音声発話『診療』→診療、『健康診断』→健診。分類不能時は Gen2 踏襲で診療ルートへフォールバック（default→用件2_診療）"

