    blocker: false
    notes: "Gen2 では anonymous 着信でも DTMF で電話番号を聴取していた（仕様）。Gen3 パイプラインのデフォルト opening は非通知を END_非通知 に弾く仕様。本設計書は Gen3 デフォルトに準拠。ビジネス要件として非通知受付が必要な場合は opening の非通知分岐をカスタマイズする必要あり（scaffold_generator 拡張 or augment ブロック検討）"

