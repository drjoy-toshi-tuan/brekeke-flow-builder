# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。成田赤十字病院のAI電話です。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 代表案内系（Gen2 踏襲）---
  - name: "END_代表案内_本日翌日"
    condition: "当日翌日確認で肯定判定"
    tts_announcement: "申し訳ございません。本日の予約に関しては、こちらのAI電話ではお受けできません。代表電話へおかけ直しください。電話番号を申し上げます。メモをご準備ください。番号は0476-22-2311です。くりかえします。番号は0476-22-2311です。番号は0476-22-2311です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内_本日翌日"

  - name: "END_代表案内_救急"
    condition: "診療_予約_診療科で救急・集中治療科判定"
    tts_announcement: "申し訳ございません。この診療科は、AI電話ではお受けできません。代表電話へおかけ直しください。電話番号を申し上げます。メモをご準備ください。番号は0476-22-2311です。くりかえします。番号は0476-22-2311です。番号は0476-22-2311です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内_救急"

  # --- 正常系（用件別）---
  - name: "END_予約受付完了"
    condition: "予約・変更ルート完了（診療_予約_希望日 / 診療_変更_希望日 / 健診_予約_希望日 / 健診_変更_希望日 / 健診_変更_内容確認2 後）"
    tts_announcement: "お電話承りました。予約の申し込みを受付いたしました。このお電話にてご連絡いただいた内容は、当院にて確認後、土日、祝日を除く3日以内に折り返し電話、またはショートメッセージをお送りし、確定となります。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約受付完了"

  - name: "END_キャンセル受付完了"
    condition: "キャンセル・確認ルート完了（診療_キャンセル_理由 / 健診_キャンセル_理由 / 診療_確認_内容 / 健診_確認_内容 後）"
    tts_announcement: "お電話承りました。手続きの申し込みを受付いたしました。必要がある場合のみ、当院より折り返しさせていただきます。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_キャンセル受付完了"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  notes: "Gen2 は「status=1→smsFlag=1, キャンセル時は smsFlag=2」だったが、Gen3 では smsFlag は -1/1 のみ許容。director 移管指針『迷えば 1 に寄せる』に従い完了系は smsFlag=1 固定。携帯/固定での SMS 配信制御は Dr.JOY 側の phonetype 参照で実施（フローは phonetype を保存するのみ）"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  notes: "Gen2 プロンプトに RAG/FAQ 参照の記載なし。確認ルート（診療_確認_内容 / 健診_確認_内容）はフリーテキスト保存→END_キャンセル受付完了 で終話（折り返し対応）。Gen2→Gen3 デフォルトのパターン3 を適用せず、元資料通り RAG なしで構成（顧客確認事項 N-5）"

