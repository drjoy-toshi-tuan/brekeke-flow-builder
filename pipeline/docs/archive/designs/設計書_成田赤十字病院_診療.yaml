# 確認レポート: docs/designs/確認レポート_成田赤十字病院_診療_2026-04-22.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "成田赤十字病院"
  group_name: "成田赤十字病院"
  flow_name: "成田赤十字病院$診療"
  target_facility: "成田赤十字病院"
  office_id: "TODO_要確認"
  phone_number: "0476-22-2311"
  business_hours: "TODO_要確認（Gen2 プロンプト本文に営業時間記載なし。冒頭アナウンスに「平日9時〜16時は代表電話」との言及あり）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "成田赤十字病院$診療"
      role: "main"
      description: "冒頭 → 当日翌日確認 → 個人情報聴取サブフロー4連 → 用件1(診療/健診) → 用件2(予約/変更/キャンセル/確認) → 用件別聴取ルート → 用件別終話"
  subflows:
    - name: "成田赤十字病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/氏名聴取.json を完全コピー。Gen2 の苗字のみ再質問ルールはサブフロー側で対応"
    - name: "成田赤十字病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/生年月日聴取_復唱あり.json を完全コピー。和暦/西暦変換・DOB Re-confirmation 内蔵。Gen2 の「復唱フォーマット {YYYY}年{MM}月{DD}日」はサブフロー側のデフォルト復唱で対応"
    - name: "成田赤十字病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/電話番号聴取_復唱あり.json を完全コピー。incoming-classifier + Phone Normalization + 携帯/固定判別内蔵。phonetype を保存。Gen2 の<speak type=\"telephone\">フォーマット復唱はサブフロー側のデフォルト復唱で対応"
    - name: "成田赤十字病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/診察券番号聴取.json を完全コピー。「わからない」分岐あり。Gen2 の<speak type=\"digits\">復唱はサブフロー側のデフォルト挙動に準ずる（標準サブフローは復唱なし構成。復唱が必要な場合は別途検討要）"

# --- セクション3: フローの目的 ---
purpose: "成田赤十字病院への診療（再診予約変更・キャンセル・確認）および人間ドック等の健診関連問い合わせ（予約・変更・キャンセル・確認）の一次受付を自動化する。本日・翌日の予約問い合わせは代表電話（0476-22-2311）へ案内。診療の新規予約および救急・集中治療科の予約は代表電話案内で終話。それ以外の案件は氏名・生年月日・電話番号・診察券番号・用件種別・診療科/健診コース・予約日/希望日等を聴取してDr.JOYに保存し折り返し対応する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "成田赤十字病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 受付時間判定(acceptance_times)
                    ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                    └─ 受付可 → 冒頭_アナウンス(TTS, 入力待ちなし直結)
                          → 当日翌日確認 (hearing, enum, 肯定/否定)
                              ├─ 肯定 → END_代表案内_本日翌日(status=2, smsFlag=-1) → 切断
                              └─ 否定 → 電話番号聴取(subflow, 携帯/固定判別+phonetype保存)
                                        → 氏名聴取(subflow)
                                          → 生年月日聴取(subflow, 復唱あり)
                                            → 診察券番号聴取(subflow, 「わからない」分岐あり)
                                              → 用件1 (hearing, DTMF+AmiVoice, enum, 診療/健診)
                                                ├─ 診療 → 用件2_診療 (hearing, DTMF+AmiVoice, enum)
                                                │   ├─ 予約 → 診療_予約_診療科 (hearing, enum, no_result_default=登録なし)
                                                │   │         ├─ 救急・集中治療科 → END_代表案内_救急(status=2, smsFlag=-1) → 切断
                                                │   │         └─ default → 診療_予約_希望日 (hearing, text) → END_予約受付完了(status=1, smsFlag=1) → 切断
                                                │   ├─ 変更 → 診療_変更_診療科 (hearing, enum) → 診療_変更_予約日 (hearing, datetime) → 診療_変更_希望日 (hearing, text) → END_予約受付完了 → 切断
                                                │   ├─ キャンセル → 診療_キャンセル_診療科 (hearing, enum) → 診療_キャンセル_予約日 (hearing, datetime) → 診療_キャンセル_理由 (hearing, text) → END_キャンセル受付完了(status=1, smsFlag=1) → 切断
                                                │   └─ 確認 → 診療_確認_内容 (hearing, text) → END_キャンセル受付完了 → 切断
                                                └─ 健診 → 用件2_健診 (hearing, DTMF+AmiVoice, enum)
                                                    ├─ 予約 → 健診_予約_コース (hearing, DTMF+AmiVoice, enum) → 健診_予約_オプション (hearing, text) → 健診_予約_健保名 (hearing, text) → 健診_予約_希望日 (hearing, text) → END_予約受付完了 → 切断
                                                    ├─ 変更 → 健診_変更_予約日 (hearing, datetime) → 健診_変更_内容確認1 (hearing, enum, 肯定/否定)
                                                    │         ├─ 肯定 → 健診_変更_希望日 (hearing, text) → END_予約受付完了 → 切断
                                                    │         └─ 否定 → 健診_変更_内容確認2 (hearing, text) → END_予約受付完了 → 切断
                                                    ├─ キャンセル → 健診_キャンセル_予約日 (hearing, datetime) → 健診_キャンセル_理由 (hearing, text) → END_キャンセル受付完了 → 切断
                                                    └─ 確認 → 健診_確認_内容 (hearing, text) → END_キャンセル受付完了 → 切断

      リトライ上限到達 → END_聴取失敗(status=3, smsFlag=-1) → 切断
    notes: |
      - 冒頭アナウンスは入力待ちなしで当日翌日確認へ直結（Gen2 「最初の箱: 冒頭アナウンス」→「当日翌日確認」を踏襲）
      - 非通知着信は Gen3 標準どおり opening で END_非通知 に弾く。Gen2 では anonymous でも DTMF 電話番号聴取を許容していたが、Gen3 パイプラインの scaffold 仕様に準拠（confirmation_items N-4 参照）
      - 電話番号聴取サブフロー内で incoming-classifier による 携帯/固定 判別 + phonetype 保存を実施
      - 用件2_診療 / 用件2_健診 の TTS は同文（「１、予約を取る」〜「４、その他問い合わせ」）だが、subject 別に分岐先が異なるためブロックを分離
      - 診療_予約ルートでの「救急・集中治療科」発話は enum 条件で直接 END_代表案内_救急 に遷移
      - 変更/キャンセルの「診療科②」TTS は「予約票に記載されている診療科」、予約の「診療科①」TTS は「受診を希望される診療科」で聴取文言が異なる（Gen2 踏襲）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 当日翌日確認

  # --- 当日翌日確認（Yes/No 判定）---
  - step: 当日翌日確認
    type: hearing
    output_format: enum
    conditions:
      - match: "肯定"
        next: END_代表案内_本日翌日
      - match: "否定"
        next: 電話番号聴取

  # --- 個人情報聴取サブフロー（4連: 電話番号 → 氏名 → 生年月日 → 診察券番号）---
  # Gen2 の共通ヒアリング順に従う。連絡先電話番号 → 患者名 → 生年月日 → 診察券番号 → 用件1
  - step: 電話番号聴取
    type: subflow
    flowname: "成田赤十字病院$電話番号聴取"
    next: 氏名聴取

  - step: 氏名聴取
    type: subflow
    flowname: "成田赤十字病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "成田赤十字病院$生年月日聴取"
    next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "成田赤十字病院$診察券番号聴取"
    next: 用件1

  # --- 用件1: 診療 / 健診 の択一 ---
  - step: 用件1
    type: hearing
    output_format: enum
    conditions:
      - match: "診療"
        next: 用件2_診療
      - match: "健診"
        next: 用件2_健診
      - match: "default"
        next: 用件2_診療

  # --- 用件2_診療: 予約/変更/キャンセル/確認 ---
  - step: 用件2_診療
    type: hearing
    output_format: enum
    conditions:
      - match: "予約"
        next: 診療_予約_診療科
      - match: "変更"
        next: 診療_変更_診療科
      - match: "キャンセル"
        next: 診療_キャンセル_診療科
      - match: "確認"
        next: 診療_確認_内容

  # --- 診療_予約ルート ---
  - step: 診療_予約_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "救急・集中治療科"
        next: END_代表案内_救急
      - match: "default"
        next: 診療_予約_希望日

  - step: 診療_予約_希望日
    type: hearing
    output_format: text
    next: END_予約受付完了

  # --- 診療_変更ルート ---
  - step: 診療_変更_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 診療_変更_予約日

  - step: 診療_変更_予約日
    type: hearing
    output_format: datetime
    next: 診療_変更_希望日

  - step: 診療_変更_希望日
    type: hearing
    output_format: text
    next: END_予約受付完了

  # --- 診療_キャンセルルート ---
  - step: 診療_キャンセル_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 診療_キャンセル_予約日

  - step: 診療_キャンセル_予約日
    type: hearing
    output_format: datetime
    next: 診療_キャンセル_理由

  - step: 診療_キャンセル_理由
    type: hearing
    output_format: text
    next: END_キャンセル受付完了

  # --- 診療_確認ルート ---
  - step: 診療_確認_内容
    type: hearing
    output_format: text
    next: END_キャンセル受付完了

  # --- 用件2_健診: 予約/変更/キャンセル/確認 ---
  - step: 用件2_健診
    type: hearing
    output_format: enum
    conditions:
      - match: "予約"
        next: 健診_予約_コース
      - match: "変更"
        next: 健診_変更_予約日
      - match: "キャンセル"
        next: 健診_キャンセル_予約日
      - match: "確認"
        next: 健診_確認_内容

  # --- 健診_予約ルート ---
  - step: 健診_予約_コース
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 健診_予約_オプション

  - step: 健診_予約_オプション
    type: hearing
    output_format: text
    next: 健診_予約_健保名

  - step: 健診_予約_健保名
    type: hearing
    output_format: text
    next: 健診_予約_希望日

  - step: 健診_予約_希望日
    type: hearing
    output_format: text
    next: END_予約受付完了

  # --- 健診_変更ルート ---
  - step: 健診_変更_予約日
    type: hearing
    output_format: datetime
    next: 健診_変更_内容確認1

  - step: 健診_変更_内容確認1
    type: hearing
    output_format: enum
    conditions:
      - match: "肯定"
        next: 健診_変更_希望日
      - match: "否定"
        next: 健診_変更_内容確認2

  - step: 健診_変更_希望日
    type: hearing
    output_format: text
    next: END_予約受付完了

  - step: 健診_変更_内容確認2
    type: hearing
    output_format: text
    next: END_予約受付完了

  # --- 健診_キャンセルルート ---
  - step: 健診_キャンセル_予約日
    type: hearing
    output_format: datetime
    next: 健診_キャンセル_理由

  - step: 健診_キャンセル_理由
    type: hearing
    output_format: text
    next: END_キャンセル受付完了

  # --- 健診_確認ルート ---
  - step: 健診_確認_内容
    type: hearing
    output_format: text
    next: END_キャンセル受付完了

  # --- 終話ブロック ---
  - step: END_代表案内_本日翌日
    type: termination
    termination_ref: "END_代表案内_本日翌日"

  - step: END_代表案内_救急
    type: termination
    termination_ref: "END_代表案内_救急"

  - step: END_予約受付完了
    type: termination
    termination_ref: "END_予約受付完了"

  - step: END_キャンセル受付完了
    type: termination
    termination_ref: "END_キャンセル受付完了"

