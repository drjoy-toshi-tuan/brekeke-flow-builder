# --- セクション11: 特記事項・制約 ---
special_notes:
  - "当日予約は AI 電話では受付不可。予約日・希望日 hearing のあとの script future_date で「未来日チェック FAIL」→ END_当日予約_代表案内 に合流する"
  - "3回聴取失敗時はすべて END_聴取失敗（代表案内 TTS、status=2、SMS送信なし）に集約する。各 hearing の retry_failure: end_failure で自動接続"
  - "代表電話番号 04-2953-9995 は END_聴取失敗・END_当日予約_代表案内 の両方で 3 回繰り返し読み上げる（Gen1 の定型文言を踏襲）"
  - "用件確認 hearing は echo_back: true で復唱確認を行う。3値（定期予約/予約変更/予約キャンセル）すべて scaffold 生成の共通 #data# プロンプトで確認される（Gen1 の 定期予約復唱/予約変更復唱/予約キャンセル復唱 に相当）"
  - "診療科聴取の no_result は「登録なし」を classification に保存してリトライせず先に進める（Dr.JOY 側で「削除レコード」扱いを避けるため）"
  - "電話番号聴取サブフローは 3 分岐（携帯着信→着信番号そのまま復唱 / 固定・その他→連絡先を手入力聴取）の標準パターンに従う。最終的に phonetype コンテキストに「携帯」または「その他」をセット"
  - "生年月日聴取サブフローは DOB Re-confirmation を含み、和暦（大正/昭和/平成/令和）と西暦、DTMF 8桁すべて対応する標準パターンに従う"
  - "診察券番号聴取は「わからない」発話でサブフロー内完結（medicalCardNumber を空のまま次へ）を許容。Gen1 の END_診察券無し パスを踏襲"
  - "営業時間: 日曜祝日・年末年始を除く、月曜〜金曜 8:00〜18:00、土曜 8:00〜17:00。Gen1 は祝日チェック用のサブシナリオを持っていたが、Gen3 では Dr.JOY 側の acceptance_times 設定（祝日カレンダー連携）に委ねる"
  - "Gen1 元資料には 8/1 以降の受付時間変更（月〜金 24時間、土 0〜17時）バージョンも併存していた。Gen3 への移管では「現行バージョン（月〜金 8-18、土 8-17）」のみを反映している"
