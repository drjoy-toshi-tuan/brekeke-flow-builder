  - "Gen1 の「年末年始冒頭アナウンス」（「12月30日から1月4日までは年末年始のため外来診療を休止しております...」）は Gen3 では END_時間外 TTS に統合するか、Dr.JOY 側で日付別アナウンスを切り替える方針（N-4 参照）"
