# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3 移管。元資料 docs/reference/customer_docs/鹿児島厚生連病院_健診.md（766行重厚版の軽量化付箋版）の yaml/function/プロンプト を全量読み込み、第3世代 scenario_flow 構造に機械変換済み"
  - "Gen2 function プロパティ 19 種のうち、Gen3 で使用するもの: classification / patientName / course / Change / details / question / another / clinicalDepartment 相当なし / reservationDate / DesiredreservationDate / patientDateOfBirth / additionalPhoneNumber / status + 自動格納系(telephoneNumber / dateOfCall / callId)。Gen2 の medicalCardNumber / clinicalDepartment / clinicalDepartment2 / reservationDate2 / reason / endpoint / smsFlag は Gen3 では saveContextModel2DB に含めない（診察券・診療科はフロー上聴取ステップなし。reason は未使用。endpoint/smsFlag は saveCompletionFlag2db パラメータとして扱う）"
  - "個人情報聴取はサブフロー分割型。氏名（復唱なし）・生年月日（復唱あり）・電話番号（復唱あり）の3本をそれぞれ独立サブフローとして呼び出し。診察券番号サブフローは不要（Gen2 yaml に聴取ステップなし）— CLAUDE.md Rule 9/11 準拠"
  - "電話番号聴取サブフローは incoming-classifier 3分岐（携帯 090/080/070/060 / 固定 / その他・非通知）付きの復唱あり版を完全コピー。Gen2 プロンプト 1-11 の分岐1/2/3ロジック＋Phone Normalization＋復唱フォーマットを包含"
  - "RAGサブフローは使用しない（Gen2 プロンプト 1-3『問い合わせ項目では FAQ/RAG 確認禁止・外部検索禁止・入力内容は加工せず格納』に厳密準拠）"
  - "status enum: 1=未処理 / 2=代表案内 / 3=聴取失敗 / 6=時間外。Gen2 の status=0（冒頭切断/途中切断）は Gen3 で使用禁止のため、冒頭切断相当は status=2、途中切断/聴取失敗は status=3 に振替"
  - "smsFlag: END_汎用終話=1（SMS 送信あり）/ 非通知・時間外・聴取失敗=-1（SMS 送信なし）。Gen2 の smsFlag=0/2 は Gen3 では未使用（全て -1 に寄せる）"
  - "用件分岐の default（NO_RESULT 時）は『その他お問い合わせ』ルートに振る（Gen2 yaml『デフォルト: 問い合わせ_内容』準拠）"
  - "変更_内容確認の default は『日程変更』（Gen2 yaml『デフォルト: 共通_予約希望日』準拠）"
  - "キャンセル_再受診希望の default は『いいえ』（Gen2 yaml『デフォルト: 共通_その他質問』準拠）"
  - "問い合わせ_受付回答の default は『いいえ』（Gen2 yaml『デフォルト: END_汎用終話』準拠）"
  - "Gen2 プロンプト 5 の救済語（肯定=『肺』『いいです』/否定=『が今』『PHVます』/診察=『印刷』『定期』『新薬』『再診』『最新』『禁忌』/予約=『薬』『お薬』/新規=『電気』『でんき』/変更=『人工』『変更』/幼児=『雇用時』『幼児』/受診内容=『シンナイヨウ』）は各 hearing ブロックの OpenAI プロンプトに埋め込む（prompter が設計書の openai_rules.mapping を読んで反映）。また AmiVoice STT 認識精度向上のため profile_words にも登録"
  - "Gen2 プロンプト 5 の予約日年補完ロジック（月日のみ発話→着信年を付与、10月以降入電で1〜9月の日付→翌年に補正、今日/明日/明後日→着信日時から自動換算、過去日は今日より未来かどうか確認し未来のみ受付）は『共通_現在の予約日』の OpenAI プロンプトに埋め込む"
  - "Gen2 プロンプト 1-9 の氏名カタカナ強制正規化・苗字のみ追問・AI による内部カタカナ変換（ユーザーに『カタカナで』と指示禁止）は氏名聴取サブフローの OpenAI プロンプトに埋め込み（サブフロー側で対応）"
  - "Gen2 プロンプト 1-10 の生年月日和暦対応は DOB Re-confirmation モジュール内のプロンプトで処理（サブフロー側で対応）"
  - "Gen2 プロンプト 1-3 の固定文『ご質問いただいた内容はAI電話ではご対応できませんので、折り返しでご確認させていただきます。』は Gen3 では実装しない（prompter がプロンプトを書く時点でスコープ外質問時の挙動はリトライに委ねる）。ただし『問い合わせ』ヒアリング項目では本固定文を出力してはならない点は『問い合わせ_内容』ブロックの OpenAI プロンプトで明示"
  - "Gen2 プロンプト 3 の復唱ポリシー（受診者名以外について『○○ですね』復唱）は Gen3 では『共通_現在の予約日』のみ echo_back=true で実装。生年月日・連絡先電話番号は専用 Re-confirmation モジュールで処理。それ以外の業務項目（希望コース・変更内容・問い合わせ内容等）の復唱はフロー速度優先で実装しない"
  - "Gen2 プロンプト 3『復唱が否定でも再確認せず次へ進む』仕様は Gen3 標準挙動（否定→再聴取 2回まで、失敗時スキップ）で上書き（精度優先）"
  - "SSML タグ（<speak>, <break>, <speak type=telephone> 等）は Gen3 TTS プロンプトに埋め込まない。電話番号の復唱は Re-confirmation モジュールが処理、break time は TTS 側で制御"
  - "既存の診療フロー（鹿厚連$診療）と同一施設・同一 group_name=『鹿厚連』を使用（Brekeke 管理上の同一グループ運用のため）"
  - "営業時間（business_hours）は Gen2 プロンプトに記載がないため TODO_要確認。acceptance_times は配置のみ指示し、詳細スケジュールは Dr.JOY 管理画面で設定"

# --- セクション12: 要確認事項（人間に確認が必要）---
# 詳細は確認レポート（docs/designs/確認レポート_鹿児島厚生連病院_健診_20260423.md）を参照。
confirmation_items:
  - item: "[N-1] office_id（Dr.JOY Admin 画面で確認）"
    status: "NON-BLOCKER"
    resolved: false
    notes: "Dr.JOY Admin 画面から取得。設計書・フローJSONには不要（NON-BLOCKER ガイドライン準拠）"
  - item: "[N-2] IVR 着信電話番号（本番 050 番号）"
    status: "NON-BLOCKER"
    resolved: false
    notes: "既存の診療フローと同一施設だが、健診は別の 050 番号の可能性あり。Brekeke IVR 設定時に人間が確認・設定"
  - item: "[N-3] 営業時間スケジュール（曜日・時間帯）"
    status: "NON-BLOCKER"
    resolved: false
    notes: "Gen2 プロンプトに営業時間記載なし。acceptance_times 配置ありで仮設定。詳細は Dr.JOY 管理画面で設定"
  - item: "[N-4] 時間外アナウンス文言（Gen3 デフォルトで仮設定）"
    status: "NON-BLOCKER"
    resolved: false
    notes: "Gen2 プロンプトに記載なし。Gen3 テンプレートデフォルト文言を採用。施設固有文言があれば差し替え"
  - item: "[N-5] 非通知アナウンス文言（Gen3 デフォルトで仮設定）"
    status: "NON-BLOCKER"
    resolved: false
    notes: "Gen2 プロンプトに記載なし。Gen3 テンプレートデフォルト文言を採用"
  - item: "[N-6] SMS 送信文面（END_汎用終話 用、Dr.JOY 側で設定）"
    status: "NON-BLOCKER"
    resolved: false
    notes: "フローJSON 側は saveCompletionFlag2db の smsFlag=1 のみ設定。SMS 本文は Dr.JOY 管理画面で設定"
  - item: "[N-7] Gen2『否定でも次へ進む』復唱仕様を Gen3 標準『否定→再聴取』に変更することの許容確認"
    status: "NON-BLOCKER"
    resolved: false
    notes: "共通_現在の予約日 の echo_back=true で Gen3 標準の否定→再聴取挙動を採用。Gen2 の『否定でも次へ』はフロー速度優先の仕様だが、Gen3 では精度優先で上書き"
  - item: "[N-8] Gen2 smsFlag=0/2 を Gen3 で -1 に寄せる判断の確認"
    status: "NON-BLOCKER"
    resolved: false
    notes: "Gen2 の smsFlag 値は 0/1/2 だが、Gen3 では smsFlag=-1（SMS 送信なし）/ 1（送信あり）の2値に簡素化。Dr.JOY 側 SMS テンプレート運用と整合するか確認推奨"
  - item: "[N-9] キャンセル_再受診希望 と 問い合わせ_受付回答 の save_to=another の妥当性確認"
    status: "NON-BLOCKER"
    resolved: false
    notes: "Gen2 yaml にはこの2箱の保存先指定がない。Gen3 では hearing の contextName 必須のため another（その他質問）フィールドを借用。再受診意思・回答要不要が another として Dr.JOY 側に現れる点の許容確認"
  - item: "[N-10] 診察券番号サブフローの不要性確認"
    status: "NON-BLOCKER"
    resolved: false
    notes: "Gen2 yaml には診察券番号聴取ステップなし（medicalCardNumber フィールドは function にあるが yaml フロー上は未使用）。Gen3 でもサブフロー登録しない方針"
