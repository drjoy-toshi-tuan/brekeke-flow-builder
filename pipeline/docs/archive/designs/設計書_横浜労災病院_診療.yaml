# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "横浜労災$診療_20260403"
      role: "main"
      description: "冒頭チェーン → 診療/健診分岐 → 用件分岐(四択) → 診療科・紹介状・予約日等聴取 → サブフロー遷移(個人情報) → 終話"
  subflows:
    - name: "横浜労災$氏名聴取"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
