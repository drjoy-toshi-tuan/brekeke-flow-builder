# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "診療健診"
    tts_announcement: "本日のご用件は、診療、または健診、どちらに関するお問い合わせでしょうか。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "診療"
        - "健診"
        - "NO_RESULT"
      mapping:
        - input: "「診療」「しんりょう」「シンジョウ」「賃料」「診察」「受診」を含む"
          output: "診療"
        - input: "「健診」「けんしん」「健康診断」「人間ドック」を含む"
          output: "健診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "category"
    next_step: "診療→用件聴取 / 健診→転送_健診"
    retry_failure: "end_failure"

  - step_name: "用件"
    tts_announcement: "ご用件を次の中からお選びください。予約、予約変更、キャンセル、予約確認、お話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約"
        - "予約変更"
        - "キャンセル"
        - "予約確認"
        - "NO_RESULT"
      mapping:
        - input: "「予約」「よやく」「予約したい」「予約希望」を含む（変更・キャンセル・確認を含まない）"
          output: "予約"
        - input: "「変更」「へんこう」「予約変更」を含む"
          output: "予約変更"
        - input: "「キャンセル」「取り消し」「やめたい」を含む"
          output: "キャンセル"
        - input: "「確認」「かくにん」「予約確認」を含む"
          output: "予約確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→紹介状確認 / 予約変更・キャンセル→現在の予約日 / 予約確認→確認内容"
    retry_failure: "end_failure"

  - step_name: "紹介状確認"
    tts_announcement: "紹介状はお持ちでしょうか。「はい」または「いいえ」でお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「あります」「持っています」「あり」を含む"
          output: "あり"
        - input: "「いいえ」「ありません」「持っていません」「なし」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "referralLetter"
    next_step: "あり→診療科_予約 / いいえ→診療科_紹介なし"
    retry_failure: "end_failure"

  - step_name: "診療科_予約"
    tts_announcement: "ご希望の診療科名をお話しください。わからない場合は、確認の上おかけ直しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "グループ1"
        - "グループ2"
        - "グループ3"
        - "グループ4"
        - "リハビリ"
        - "NO_RESULT"
      mapping:
        - input: "血液内科、腫瘍内科、放射線治療科"
          output: "グループ1"
        - input: "放射線診断科、放射線IVR科、緩和支持治療科、救急科、救急災害医療部、麻酔科"
          output: "グループ2"
        - input: "小児科、形成外科、産科分娩部、婦人部、女性ヘルスケア部、産婦人科、外科、呼吸器外科"
          output: "グループ3"
        - input: "糖尿病内科、膠原病内科、精神科、眼科、泌尿器科、消化器外科、脊椎脊髄外科、心臓血管外科、内分泌内科、腎臓内科、脳神経外科、消化器内科、新生児内科、耳鼻咽喉科、頭頚部外科、歯科口腔外科口腔内科、乳腺外科、手末梢神経外科、脳神経内科、皮膚科、代謝内科、リウマチ科、心療内科、呼吸器内科、循環器内科、小児外科、整形外科、人工関節外科、脳神経血管内治療科"
          output: "グループ4"
        - input: "リハビリ、リハビリテーション"
          output: "リハビリ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "リストにない診療科名"
    save_to: "clinicalDepartment"
    next_step: "紹介状ありの場合: グループ1→終話1, グループ2→終話2, グループ3/4→紹介元聴取, リハビリ→転送。紹介状なしの場合: グループ1→終話1, グループ2→終話2, グループ3→終話3, グループ4→選定療養費説明, リハビリ→転送"
    retry_failure: "end_failure"

  - step_name: "紹介元医療機関名"
    tts_announcement: "紹介元の医療機関名をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "医療機関名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "医療機関名テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "referralHospital"
    next_step: "医師名"
    retry_failure: "end_failure"

  - step_name: "医師名"
    tts_announcement: "紹介状に医師の指定がありましたらお話しください。ない場合は「ない」とお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "医師名テキスト"
        - "なし"
      mapping:
        - input: "医師名を含む音声"
          output: "医師名テキスト（フリーテキスト）"
        - input: "「ない」「ありません」「特にありません」を含む"
          output: "なし"
      no_result_condition: "音声認識結果が空"
    save_to: "referralDoctor"
    next_step: "個人情報聴取サブフロー遷移"
    retry_failure: "end_failure"

  - step_name: "現在の予約日"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト"
      mapping:
        - input: "日付として解釈可能な音声"
          output: "YYYY-MM-DD形式の日付テキスト"
      no_result_condition: "日付として解釈不能"
    save_to: "currentAppointmentDate"
    next_step: "当日確認"
    retry_failure: "end_failure"

  - step_name: "当日確認"
    tts_announcement: "変更希望は本日の予約でしょうか？「はい」または「いいえ」でお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「そうです」「本日です」「今日です」を含む"
          output: "はい"
        - input: "「いいえ」「違います」「本日ではない」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "はい→転送_当日変更 / いいえ→診療科_変更"
    retry_failure: "end_failure"

  - step_name: "診療科_変更"
    tts_announcement: "ご希望の診療科名をお話しください。わからない場合は、確認の上おかけ直しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "リハビリ"
        - "その他"
        - "NO_RESULT"
      mapping:
        - input: "リハビリ、リハビリテーション"
          output: "リハビリ"
        - input: "上記以外の診療科名"
          output: "その他"
        - input: "診療科名として認識不可"
          output: "NO_RESULT"
      no_result_condition: "診療科名として認識不可"
    save_to: "clinicalDepartment"
    next_step: "リハビリ→転送_リハビリ / その他→変更理由"
    retry_failure: "end_failure"

  - step_name: "変更理由"
    tts_announcement: "予約変更の理由を簡潔にお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "変更理由テキスト"
      mapping:
        - input: "音声認識結果"
          output: "変更理由テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "changeReason"
    next_step: "個人情報聴取サブフロー遷移"
    retry_failure: "end_failure"

  - step_name: "確認内容"
    tts_announcement: "確認をしたい内容に関して、簡潔にお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "確認内容テキスト"
      mapping:
        - input: "音声認識結果"
          output: "確認内容テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "confirmationContent"
    next_step: "個人情報聴取サブフロー遷移"
    retry_failure: "end_failure"

  # サブフローの聴取ステップはリファレンスbivr完全コピーのため詳細省略
  - step_name: "氏名"
    tts_announcement: "お名前をお伺いします。フルネームの前に「名前は」をつけてお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["氏名テキスト"]
      mapping:
        - input: "音声認識結果"
          output: "氏名テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "patientName"
    next_step: "生年月日"
    retry_failure: "skip"

  - step_name: "生年月日"
    tts_announcement: "それでは、生年月日を西暦からお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["valid", "不正値", "2桁_0007", "2桁_0831", "2桁_3263"]
      mapping:
        - input: "8桁の有効な日付"
          output: "valid"
      no_result_condition: "音声認識結果が空または解析不能"
    save_to: "patientDateOfBirth"
    next_step: "診察券番号"
    retry_failure: "skip"

  - step_name: "診察券番号"
    tts_announcement: "診察券番号をお伺いします。7桁の番号をお話しください。番号がわからない場合は、わからない とお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["番号テキスト", "わからない"]
      mapping:
        - input: "数字の並び"
          output: "番号テキスト"
        - input: "わからない"
          output: "わからない"
      no_result_condition: "認識不可"
    save_to: "medicalCardNumber"
    next_step: "電話番号"
    retry_failure: "skip"

  - step_name: "電話番号"
    tts_announcement: "ご連絡先のお電話番号は、今おかけいただいている番号でよろしいですか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["正規化済み電話番号"]
      mapping:
        - input: "10〜11桁の数値"
          output: "正規化済み電話番号"
      no_result_condition: "電話番号として不正な形式"
    save_to: "additionalPhoneNumber"
    next_step: "終話チェーン"
    retry_failure: "end_failure"

# --- セクション8: 終話パターン ---
termination_patterns:
  - name: "END_終話4_SMS"
    condition: "全聴取完了（正常終話）かつ携帯電話"
    tts_announcement: "お電話内容を確認いたしました。2診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_SMS"

  - name: "END_終話4_noSMS"
    condition: "全聴取完了（正常終話）かつ携帯以外"
    tts_announcement: "お電話内容を確認いたしました。2診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_noSMS"

  - name: "END_終話1"
    condition: "グループ1（血液内科・腫瘍内科・放射線治療科）を選択"
    tts_announcement: "ご希望の診療科につきましては、ご紹介の病院から直接、横浜労災病院へお問い合わせいただくようお伝えください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_終話1"

  - name: "END_終話2"
    condition: "グループ2（放射線診断科・放射線IVR科・緩和支持治療科・救急科・救急災害医療部・麻酔科）を選択"
    tts_announcement: "恐れ入りますが、ご希望された診療科は、新規予約を受け付けておりません。他の医療機関での受診をお願いいたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_終話2"

  - name: "END_終話3"
    condition: "グループ3（小児科・形成外科等）を選択かつ紹介状なし"
    tts_announcement: "大変申し訳ございません。紹介状をお持ちでない場合は受付することができません。紹介状をお持ちの上、改めておかけ直しください。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_終話3"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に「186」を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_上限エラー"
    condition: "リトライ上限到達"
    tts_announcement: "恐れ入ります。ご回答がうまく認識できませんでした。AIからの質問にご回答いただいていた場合は、お手数ですが再度お話しください。別途ご質問がある場合は、当院の代表電話へお掛け直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_上限エラー"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"
  patterns:
    - condition: "phonetype=携帯"
      sms_flag: "1"
      notes: "携帯電話の場合はSMS送信あり"
    - condition: "phonetype=その他"
      sms_flag: "-1"
      notes: "固定電話等の場合はSMS送信なし"

