    - name: "横浜労災$生年月日聴取"
      target: "生年月日聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。復唱あり"

    - name: "横浜労災$診察券番号聴取"
      target: "診察券番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。7桁。わからない分岐あり"

    - name: "横浜労災$電話番号聴取"
      target: "電話番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10/11 準拠。incoming-classifier で携帯/固定分岐。復唱あり"

# --- セクション3: フローの目的 ---
purpose: >
  患者からの電話を受け、診療/健診を判別し、診療の場合は用件（予約・予約変更・キャンセル・予約確認）を聴取する。
  用件に応じて診療科・紹介状の有無・紹介元医療機関名・医師名・現在の予約日・変更理由・確認内容等を聴取し、
  患者情報（氏名・生年月日・診察券番号・連絡先電話番号）を個人情報聴取サブフローで収集して折り返し受付を自動化する。
  健診はオペレーター転送、受付不可診療科は案内終話、リハビリはオペレーター転送とする。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "横浜労災$診療_20260403"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                        └─ 受付可(true) → 冒頭_アナウンス(TTS)
                                            → 注意事項_アナウンス(TTS)
                                            → 診療健診(TTS)
                                            → 入力_診療健診(AmiVoice STT)
                                            → OpenAI_診療健診(generate_by_OpenAI)
                                                ├─ 健診 → 転送_健診(TTS) → Call Transfer(045-474-8882)
                                                ├─ 診療 → 用件聴取ルートへ
                                                └─ NO_RESULT → リトライ_診療健診
                                                                  ├─ Retry → 診療健診(TTS)
                                                                  └─ No more → END_上限エラー(TTS) → 完了フラグ_上限(status=2, smsFlag=-1) → 切断

      ─── 用件聴取ルート ───
      用件(TTS)
        → 入力_用件(AmiVoice STT)
        → OpenAI_用件(generate_by_OpenAI)
            ├─ 予約 → ★予約ルート
            ├─ 予約変更 → ★予約変更キャンセルルート
            ├─ キャンセル → ★予約変更キャンセルルート
            ├─ 予約確認 → ★予約確認ルート
            └─ NO_RESULT → リトライ_用件
                              ├─ Retry → 用件(TTS)
                              └─ No more → END_上限エラー(TTS) → 完了フラグ_上限 → 切断

      ─── ★予約ルート ───
      saveContext_用件_予約 → 紹介状確認(TTS)
        → 入力_紹介状確認(AmiVoice STT)
        → OpenAI_紹介状確認(generate_by_OpenAI)
            ├─ あり → saveContext_紹介状_あり → 診療科_予約(TTS)
            │           → 入力_診療科_予約(AmiVoice STT)
            │           → OpenAI_診療科_予約(generate_by_OpenAI)
            │               ├─ グループ1 → END_終話1(TTS) → 完了フラグ_終話1(status=2, smsFlag=-1) → 切断
            │               ├─ グループ2 → END_終話2(TTS) → 完了フラグ_終話2(status=2, smsFlag=-1) → 切断
            │               ├─ リハビリ → 転送_リハビリ(TTS) → Call Transfer(045-474-8882)
            │               ├─ グループ4 → saveContext_診療科 → 紹介元(TTS)
            │               │               → 入力_紹介元(AmiVoice STT) → OpenAI_紹介元 → saveContext_紹介元
            │               │               → 医師名(TTS)
            │               │               → 入力_医師名(AmiVoice STT) → OpenAI_医師名 → saveContext_医師名
            │               │               → ★個人情報聴取サブフロー遷移
            │               └─ NO_RESULT → リトライ_診療科_予約
            │                                 ├─ Retry → 診療科_予約(TTS)
            │                                 └─ No more → END_上限エラー → 切断
            ├─ いいえ → saveContext_紹介状_なし → 診療科_紹介なし(TTS)
            │           → 入力_診療科_紹介なし(AmiVoice STT)
            │           → OpenAI_診療科_紹介なし(generate_by_OpenAI)
            │               ├─ グループ1 → END_終話1(TTS) → 完了フラグ_終話1 → 切断
            │               ├─ グループ2 → END_終話2(TTS) → 完了フラグ_終話2 → 切断
            │               ├─ グループ3 → END_終話3(TTS) → 完了フラグ_終話3(status=2, smsFlag=-1) → 切断
            │               ├─ リハビリ → 転送_リハビリ(TTS) → Call Transfer(045-474-8882)
            │               ├─ グループ4 → saveContext_診療科 → 選定療養費_説明(TTS) → ★個人情報聴取サブフロー遷移
            │               └─ NO_RESULT → リトライ_診療科_紹介なし
            │                                 ├─ Retry → 診療科_紹介なし(TTS)
            │                                 └─ No more → END_上限エラー → 切断
            └─ NO_RESULT → リトライ_紹介状確認
                              ├─ Retry → 紹介状確認(TTS)
                              └─ No more → END_上限エラー → 切断

      ─── ★予約変更キャンセルルート ───
      saveContext_用件_変更キャンセル → 現在の予約日(TTS)
        → 入力_現在の予約日(AmiVoice STT)
        → OpenAI_現在の予約日 → saveContext_予約日
        → 当日確認(TTS)
        → 入力_当日確認(AmiVoice STT)
        → OpenAI_当日確認(generate_by_OpenAI)
            ├─ はい（当日）→ 転送_当日変更(TTS) → Call Transfer(045-474-8882)
            ├─ いいえ → 診療科_変更(TTS)
            │           → 入力_診療科_変更(AmiVoice STT)
            │           → OpenAI_診療科_変更(generate_by_OpenAI)
            │               ├─ リハビリ → 転送_リハビリ(TTS) → Call Transfer(045-474-8882)
            │               └─ その他全て → saveContext_診療科_変更 → 変更理由(TTS)
            │                                → 入力_変更理由(AmiVoice STT) → OpenAI_変更理由 → saveContext_変更理由
            │                                → ★個人情報聴取サブフロー遷移
            └─ NO_RESULT → リトライ_当日確認
                              ├─ Retry → 当日確認(TTS)
                              └─ No more → END_上限エラー → 切断

      ─── ★予約確認ルート ───
      saveContext_用件_確認 → 確認内容(TTS)
        → 入力_確認内容(AmiVoice STT)
        → OpenAI_確認内容 → saveContext_確認内容
        → ★個人情報聴取サブフロー遷移

      ─── ★個人情報聴取サブフロー遷移（共通合流点）───
      Custom Jump to Flow → 横浜労災$氏名聴取 → (返却)
        → Custom Jump to Flow → 横浜労災$生年月日聴取 → (返却)
        → Custom Jump to Flow → 横浜労災$診察券番号聴取 → (返却)
        → Custom Jump to Flow → 横浜労災$電話番号聴取 → (返却、携帯=1/その他=2)
            ├─ 携帯(1) → END_終話4(TTS) → 完了フラグ_受付完了_SMS(status=1, smsFlag=1) → 切断
            └─ その他(2) → END_終話4(TTS) → 完了フラグ_受付完了_noSMS(status=1, smsFlag=-1) → 切断

      ─── メインフロー内終話パターン ───
      END_終話1 → 切断（グループ1受付不可）
      END_終話2 → 切断（グループ2受付不可）
      END_終話3 → 切断（グループ3紹介状なし）
      END_終話4 → 切断（受付完了）
      END_上限エラー → 切断
      END_時間外 → 切断
      END_非通知 → 切断
    notes: |
      - acceptance_times使用（平日 8:15〜17:00）
      - 診療科聴取が3箇所（予約+紹介あり、予約+紹介なし、予約変更/キャンセル）に分かれる
      - 予約変更/キャンセルルートの診療科はグループ分岐不要（リハビリのみ転送）
      - 個人情報聴取は全ルートの共通合流点

  - flow_name: "横浜労災$氏名聴取"
