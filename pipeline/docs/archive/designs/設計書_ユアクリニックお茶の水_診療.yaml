version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "ユアクリニックお茶の水"
  group_name: "ユアCLお茶水"             # NON-BLOCKER N-1: 仮値。正式名を確認
  flow_name: "ユアCLお茶水$診療"
  target_facility: "ユアクリニックお茶の水（単独施設）"
  office_id: "TODO_要確認"               # BLOCKER B-1
  phone_number: "TODO_要確認"            # BLOCKER B-2: デモ050番号未定。本番: 050-1721-0927
  business_hours: "月-土稼働（日曜終日時間外）。時間帯によりAI電話/代表転送/時間外の3パターン制御。詳細はDr.JOY側で設定"
  flow_type: "subflow"
  work_type: "new"
  environment: "demo"                    # NON-BLOCKER N-2: 仮値

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "ユアCLお茶水$診療"
      role: "main"
      description: >
        冒頭チェーン -> acceptance_times（AI電話/代表転送/時間外の3分岐）
        -> 問い合わせ内容聴取 -> サブフロー遷移（氏名 -> 電話番号）-> 終話。
        時間外でもAI聴取を続行する特殊仕様。
        リトライ失敗時は時間帯により代表転送（9:00-19:00）または終話切断。
    - name: "ユアCLお茶水$氏名聴取"
      role: "sub"
      description: "氏名聴取サブフロー（リファレンスbivr完全コピー）"
    - name: "ユアCLお茶水$電話番号聴取"
      role: "sub"
      description: "電話番号聴取サブフロー（リファレンスbivr完全コピー）。着信番号復唱確認方式"
  subflows:
    - name: "ユアCLお茶水$氏名聴取"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivrの氏名聴取フローを完全コピー"
    - name: "ユアCLお茶水$電話番号聴取"
      target: "電話番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivrの電話番号聴取フローを完全コピー"

# --- セクション3: フローの目的 ---
purpose: >
  患者からの電話を受け、お問い合わせ内容（自由発話）・氏名・連絡先電話番号の3項目を聴取し、
  折り返し受付を自動化する。時間帯によりAI電話対応・代表転送・時間外案内の3パターンを切り替える。
  時間外でもAI聴取を続行し、翌営業日に折り返す。
  リトライ上限到達時、9:00-19:00は代表電話に転送し、それ以外の時間帯は終話切断とする。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "ユアCLお茶水$診療"
    diagram: |
      wait(2000ms)
        -> saveContextModel2DB
        -> incoming-classifier
            |-- 非通知 -> 非通知_アナウンス(TTS) -> 完了フラグ_非通知(status=2, smsFlag=-1) -> 切断
            +-- 通常/携帯/固定 -> acceptance_times
                  |-- 転送時間帯(true_transfer) -> 転送_アナウンス(TTS) -> Call Transfer(03-3259-1190)
                  |     +-- 転送失敗(timeout/error) -> 転送失敗_アナウンス(TTS) -> 完了フラグ_転送失敗(status=2, smsFlag=-1) -> 切断
                  |-- 時間外(false) -> 時間外_アナウンス(TTS) -> saveContext_時間帯種別(timeSlot="時間外") -> [問い合わせ内容聴取に合流]
                  +-- AI電話時間帯(true_ai) -> 冒頭_アナウンス(TTS) -> saveContext_時間帯種別(timeSlot="営業時間内")
                        +-> [問い合わせ内容聴取に合流]

      --- 時間帯種別の保存 ---
      # acceptance_timesの結果（AI電話 or 時間外）をsaveContext2DBで保存。
      # リトライ上限到達時に参照して転送/終話を切り替える。
      # AI電話時間帯: timeSlot="営業時間内" / 時間外: timeSlot="時間外"

      --- 問い合わせ内容聴取（冒頭アナウンス/時間外アナウンスの両方から合流）---
      問い合わせ内容(TTS)
        -> 入力_問い合わせ内容(AmiVoice STT)
        -> OpenAI_問い合わせ内容(generate_by_OpenAI: summarize)
            |-- success -> saveContext_問い合わせ内容 -> 氏名聴取へ
            +-- NO_RESULT -> リトライ_問い合わせ内容
                              |-- Retry -> 問い合わせ内容(TTS)
                              +-- No more -> script_時間帯判定
                                              |-- 営業時間内 -> 転送_リトライ失敗_アナウンス(TTS) -> Call Transfer(03-3259-1190)
                                              |     +-- 転送失敗 -> 転送失敗_アナウンス(TTS) -> 完了フラグ_転送失敗 -> 切断
                                              +-- 時間外 -> END_上限エラー(TTS) -> 完了フラグ_上限エラー(status=2, smsFlag=-1) -> 切断

      --- 氏名聴取（サブフロー遷移）---
      saveContext_問い合わせ内容
        -> サブフロー遷移_氏名聴取(Custom Jump to Flow -> ユアCLお茶水$氏名聴取)
            -> [氏名聴取サブフロー: 結果 .* -> 次へ]

      --- 電話番号聴取（サブフロー遷移）---
      -> サブフロー遷移_電話番号聴取(Custom Jump to Flow -> ユアCLお茶水$電話番号聴取)
            -> [電話番号聴取サブフロー: 結果 .* -> 終話判定へ]

      --- 終話判定 ---
      -> script_終話判定
          |-- 営業時間内 -> END_受付完了(TTS) -> 完了フラグ_受付完了(status=1, smsFlag=1) -> 切断
          +-- 時間外 -> END_時間外受付完了(TTS) -> 完了フラグ_時間外受付完了(status=1, smsFlag=1) -> 切断

      --- メインフロー内終話パターン ---
      END_受付完了: status=1, smsFlag=1（通常時間帯の正常終話）
      END_時間外受付完了: status=1, smsFlag=1（時間外の正常終話。折り返し期限が異なる文言）
      非通知: status=2, smsFlag=-1
      転送: status=3, smsFlag=-1（Call Transfer成功時は自動）
      転送失敗: status=2, smsFlag=-1
      上限エラー: status=2, smsFlag=-1（時間外のリトライ上限到達）
    notes: |
      acceptance_timesは3パターン（AI電話/代表転送/時間外）の分岐を制御。
      Dr.JOY側で時間帯スケジュールを設定する。
      時間外でもAI聴取を続行する特殊仕様（P4/P12フロー図、P3/P17アナウンス文言に明記）。
      リトライ失敗時: 9:00-19:00は代表転送（P4/P12に記載）、それ以外は終話切断。
      時間帯種別をsaveContext2DBで保存し、リトライ上限・終話時に参照して分岐。

  - flow_name: "ユアCLお茶水$氏名聴取"
    diagram: |
      --- 完全コピー対象（CLAUDE.md Rule 9） ---
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「ユアCLお茶水$」に置換。構造・接続・スクリプトは一切変更不可。

      聴取ステップ:
        1. 氏名（AmiVoice STT -- 音声のみ）
      出口: script_結果返却_氏名 -> メインフローに返却
    notes: "CLAUDE.md Rule 9/11 準拠。独自のモジュール追加・削除・接続変更は禁止。"

  - flow_name: "ユアCLお茶水$電話番号聴取"
    diagram: |
      --- 完全コピー対象（CLAUDE.md Rule 9） ---
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「電話番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「ユアCLお茶水$」に置換。構造・接続・スクリプトは一切変更不可。

      アーキテクチャ:
        1. incoming-classifier -> 携帯パス / 固定・その他パス
        2. 携帯パス: 着信番号をそのまま保存 -> Phone Normalization -> 復唱確認（DTMF 1=はい/2=いいえ）
           肯定 -> phonetype=携帯。否定 -> 連絡先聴取パスに合流
        3. 固定・その他パス: 連絡先番号を聴取 -> Phone Normalization -> 復唱確認
        4. script_携帯判別 -> 携帯(phonetype=携帯) / その他(phonetype=その他)
        5. 結果返却: 1=携帯 / 2=その他
      出口: script_結果返却_電話番号 -> メインフローに返却
    notes: "CLAUDE.md Rule 9/10/11 準拠。独自のモジュール追加・削除・接続変更は禁止。"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "お問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分。本フローでは「お問い合わせ」のみ（NON-BLOCKER N-7）"

  - context_name: "inquiry"
    context_name_jp: "問い合わせ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "患者が自由発話した問い合わせ内容をOpenAIで要約して保存"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "患者氏名（フルネーム）"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "聴取する連絡先電話番号"

  - context_name: "timeSlot"
    context_name_jp: "時間帯種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: false
    deletable: true
    notes: "acceptance_timesの結果を保存。リトライ上限到達時・終話時の分岐に使用。値: 営業時間内 / 時間外"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "0"
        order: "0"
        value: "途中切断"
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
