    item_default: true
    editable: true
    deletable: false
    notes: "0=途中切断 1=未処理 2=代表案内 3=転送 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "問い合わせ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inquiry"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "自由発話。OpenAIで要約して保存。分岐なし（NON-BLOCKER N-4）"

  - order: 2
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー内（リファレンスbivr完全コピー）。profile_words: 氏名辞書"

  - order: 3
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "サブフロー内（リファレンスbivr完全コピー）。incoming-classifierで携帯/その他分岐。着信番号の復唱確認方式"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "問い合わせ内容"
    tts_announcement: "まずは1つ目の質問です。本日のお問い合わせ内容をお話ください。それではどうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "要約テキスト"
        - "NO_RESULT"
      mapping:
        - input: "音声認識結果（自由発話）"
          output: "要約テキスト（問い合わせ内容を簡潔に要約）"
        - input: "音声認識結果が空または認識不能"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空または認識不能"
    save_to: "inquiry"
    next_step: "サブフロー遷移_氏名聴取"
    retry_failure: "conditional_transfer"
    retry_failure_detail: >
      リトライ上限到達時、timeSlot（時間帯種別）を参照して分岐:
      - 営業時間内 -> 代表電話に転送（03-3259-1190）
      - 時間外 -> 終話切断（END_上限エラー）

  - step_name: "氏名"
    tts_announcement: "かしこまりました。続いて2つ目の質問です。お名前をフルネームでお話ください。それではどうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "氏名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "氏名テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "patientName"
    next_step: "サブフロー遷移_電話番号聴取"
    retry_failure: "skip"

  - step_name: "電話番号"
    tts_announcement: >
      ありがとうございます。それでは、最後の質問です。
      ご連絡先のお電話番号をお伺いします。折返しの電話番号は、○○○-○○○○-○○○○でよろしいでしょうか？
      はいの場合は、1を、いいえの場合は、2を、ダイヤルプッシュで入力してください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "正規化済み電話番号"
      mapping:
        - input: "10-11桁の数値（先頭0）"
          output: "正規化済み電話番号"
      no_result_condition: "電話番号として不正な形式"
    save_to: "additionalPhoneNumber"
    next_step: "終話チェーン"
    retry_failure: "conditional_transfer"
    retry_failure_detail: >
      問い合わせ内容と同じ条件付き転送ロジック:
      - 営業時間内 -> 代表電話に転送（03-3259-1190）
      - 時間外 -> 終話切断（END_上限エラー）

# --- セクション8: 終話パターン ---
termination_patterns:
  - name: "END_受付完了"
    condition: "全聴取完了（正常終話 -- AI電話時間帯）"
    tts_announcement: "ありがとうございます。質問は以上です。内容確認後、院内スタッフから土・日、祝日を除く2日以内にショートメッセージもしくはお電話にてご連絡いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了"

  - name: "END_時間外受付完了"
    condition: "全聴取完了（時間外でAI聴取が完了した場合）"
    tts_announcement: "ありがとうございます。質問は以上です。内容確認後、院内スタッフから翌営業日終了までにショートメッセージもしくはお電話にてご連絡いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_時間外受付完了"

  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
    # NON-BLOCKER N-3: 文言は仮値

  - name: "END_転送"
    condition: "acceptance_times で代表転送時間帯と判定"
    tts_announcement: "只今のお時間は、スタッフへお繋ぎいたします。代表電話に転送いたしますのでそのままお待ちください。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_転送"

  - name: "END_転送失敗"
    condition: "Call Transfer が失敗（転送先回線に空きがない場合）"
    tts_announcement: "申し訳ございません。只今お電話が込み合っております。恐れ入りますが、お時間を空けて再度おかけなおしください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_転送失敗"

  - name: "END_リトライ転送"
    condition: "リトライ上限到達 かつ 9:00-19:00（営業時間内）"
    tts_announcement: "申し訳ございません、うまく認識ができませんでした。代表電話に転送いたしますのでそのままお待ちください。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_リトライ転送"

  - name: "END_上限エラー"
    condition: "リトライ上限到達 かつ 時間外"
    tts_announcement: "大変申し訳ございません。ご回答を聞き取ることができませんでした。恐れ入りますが、改めておかけなおしください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_上限エラー"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # smsFlag分岐は不要。受付完了（status=1）のみSMS送信

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # メインフロー
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内（AI電話時間帯用）"
    announcement: "お電話ありがとうございます。ユアクリニックお茶の水のAI電話です。全部で3つ質問をさせていただきます。"

  - module_name: "時間外_アナウンス"
    purpose: "時間外案内（聴取続行型）"
