# smsFlag 分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["classification"]
  patterns:
    - condition: "classification=新規"
      sms_flag: "1"
      notes: "受付完了（新規）"
    - condition: "classification=変更"
      sms_flag: "2"
      notes: "受付完了（変更）"
    - condition: "classification=キャンセル"
      sms_flag: "3"
      notes: "受付完了（キャンセル、専用 TTS）"
    - condition: "classification=予約日の確認"
      sms_flag: "4"
      notes: "受付完了（予約日の確認）"
    - condition: "非通知/紹介状無し/残薬無し/病理診断科案内/聴取失敗/時間外"
      sms_flag: "-1"
      notes: "SMS 送信なし"

