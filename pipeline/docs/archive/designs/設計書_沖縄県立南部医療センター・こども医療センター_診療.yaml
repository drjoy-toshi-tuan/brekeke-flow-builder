# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【サブフロー完全コピー】氏名・生年月日・診察券番号・電話番号の 4 サブフローは `docs/reference/bivr/samples/個人情報サブフロー.bivr` を完全コピーし、プレフィックスのみ「沖縄県立南部医療センター・こども医療センター」に置換する（CLAUDE.md Rule 9 準拠）。サブフロー内部の構造改変は禁止"
  - "【status 体系】customer 固有の非通知=7 を維持（director.md standard の 2 ではない）。Gen2 の 0 / 5 は禁止のため 2（電話案内）に置換。3（聴取失敗）は template 必須項目として保持（実質到達しない）。6（時間外）は use_acceptance_times=false のため到達しないが template 必須"
  - "【smsFlag 体系】新規=1 / 変更=2 / キャンセル=3 / 予約日の確認=4（customer_doc 1-7）。SMS 送信なし = -1（Gen3 標準。customer の 0 から変換）"
  - "【echo_back 対象 3 項目】用件・生年月日（サブフロー内）・予約日（変更/キャンセル）のみ復唱あり。患者名は絶対復唱禁止（customer_doc §1）。診療科は復唱禁止（小児歯科口腔外科の「歯科口腔外科」言い換え仕様は本設計 echo_back=false のため発話に現れない）"
  - "【Yes/No 肯定語「肺」救済】すべての Yes/No 判定ブロック（年齢確認 / 紹介状有無 / 薬服用中か / 用件聴取の再提示）で「肺」「杯」「配」「敗」「牌」「灰」を肯定同義語として扱う（customer_doc 最優先適用 二択回答正規化）。prompter は SKILL_A〜E_*.md の Yes/No テンプレで明示"
  - "【用件救済語】印刷／定期／新薬／再診／最新／禁忌 → 予約日の確認相当、薬／お薬 → 新規予約、電気／でんき → 新規（customer_doc 4 章）。prompter の用件聴取プロンプトに明示"
  - "【年齢救済語】診療科聴取時の「そう二」→「小児」。本設計では年齢確認で既に age=小児 がセット済みのため、後段の診療科リストが自動的に小児になる。救済語は年齢確認プロンプトにも含める"
  - "【診療科救済語】「癌化」→「眼科」（成人）または「小児眼科」（小児）。診療科_*_* の mapping に明示"
  - "【数字正規化】電話番号・診察券番号で C/c/Ｃ/ｃ/for/ふぉー/フォー/しー/しい/し → 4、ごー/ごお/ご → 5（customer_doc 1-9）。prompter の数値テンプレで吸収。「電気」「でんき」は用件の新規への救済語と区別する"
  - "【SSML 完全削除】customer_doc の `<speak type=\"telephone\">` `<speak type=\"digits\">` `<break time=\"...\">` は Gen3 では全削除。TTS は `{tts_g:...}`（全小文字）形式。電話番号・診察券番号の桁区切り読み上げは tts_g の読み方調整で代替"
  - "【予約日の年補完】10 月以降で 1〜9 月の日付を言われたら翌年扱い（customer_doc 4 章）。OpenAI normalize プロンプト内で今日の日付を参照して補完"
  - "【「以上」扱い】単独発話（句読点除いて「以上」or「以上です」）は無視して同質問を繰り返す。末尾付きなら切り落として採用。最後の問い合わせへの返答としての「以上」のみ終話合図（→「なし」として分岐）"
  - "【reason / facility の発話厳禁】ユーザーに対して reason（理由・確認事項）／facility（医療機関名）の内容を読み上げたり、同情発話（「お大事に」等）や意見を一切行わない。prompter の SKILL_E_*.md 自由テキスト抽出テンプレに明示"
  - "【成人の新規のみ医療機関名】紹介状あり直後に、成人の新規ルートでのみ医療機関名を聴取する。小児の新規ルートには医療機関名聴取が無いため共通化不可。`分岐_新規_紹介状あり_年齢` (context_match_router) で実装"
  - "【病理診断科の AI 不可（成人のみ）】病理診断科は成人の診療科リストにのみ存在。検出時は END_病理診断科案内 で代表電話 098-888-0123 案内終話（status=2）"
  - "【変更／キャンセルの共通化と終話分離】変更の薬残あり側とキャンセルの薬残あり側で、診療科〜都合が悪い日（変更のみ）〜個人情報〜最後の問い合わせは共通化。終話 TTS のみ classification で分岐（変更=通常 / キャンセル=専用）"
  - "【予約日の確認用件の reason 流用】customer_doc 6 章明示「確認事項は reason に格納する」。Gen2 互換のため reason 1 フィールドに 変更・キャンセルの理由と予約日の確認の確認事項を共存させる"
  - "【最後の問い合わせの RAG 非採用】1 ターンの単純聴取で「なし／default」判定のみ。default の場合は FAQ不可_案内 を 1 回流して直接終話へ。customer_doc 1-6 のループ仕様は不採用（移管ノート L.16）"
  - "【未聴取 function フィールド】customer function required に含まれる `medicine` / `checkout` / `endpoint` / `smsFlag` のうち、`medicine` は本フロー未使用のため saveContextModel2DB から除外、`checkout` は Gen3 未対応のため除外、`endpoint` / `smsFlag` は saveCompletionFlag2db のパラメータとして終話ブロックで設定"
  - "【リトライ回数】retry_count=2（customer_doc 2.4）。2 回失敗時は聴取失敗アナウンス「申し訳ございません。ご回答を確認できませんでした。次の内容をお伺いします。」を出力して skip（空文字格納で次ステップ）。customer_doc は「かしこまりました。」を挿入しない仕様だが、Gen3 標準の skip フォールバックで対応"
  - "【function 1 通話 1 回 / endpoint 制約】customer_doc「function は 1 通話 1 回のみ」「endpoint=通話完了は終話アナウンス出力後のみ」は Gen3 では termination ブロック側（saveCompletionFlag2db）で自動担保される。prompter のプロンプト禁則には含めない"
  - "【Dr.JOY 側設定事項】SMS 送信文面 4 パターン / STATUS マスター（7=非通知など）/ DEPARTMENT マスター 49 値 / 認証設定優先順位 / office_id / 本番 050 番号は Dr.JOY 管理画面・Brekeke 側設定で別途対応。設計書・フローJSON には含めない"

