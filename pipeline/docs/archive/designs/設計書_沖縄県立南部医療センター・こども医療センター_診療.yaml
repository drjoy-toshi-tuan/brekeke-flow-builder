      - "小児麻酔科"
      - "小児泌尿器科"
      - "小児総合診療科"
      - "小児科"
      - "登録なし"
    notes: |
      - no_result_default="登録なし"（モジュール選定ガイド 2.5）
      - 復唱なし。小児歯科口腔外科は復唱仕様上「歯科口腔外科」に言い換えるが本設計は echo_back=false のため発話には現れない

