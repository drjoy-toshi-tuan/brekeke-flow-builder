    sms_flag: "4"
    completion_flag_name: "完了フラグ_確認"

  # --- 予約不可系（AI 対応不可 → 代表電話案内）---
  - name: "END_紹介状無し案内"
    condition: "新規ルートで紹介状なし"
    tts_announcement: "恐れ入りますが、当院は紹介状をお持ちでない場合の新規予約は受け付けておりません。地域の医療機関や、かかりつけ医の受診をお願いいたします。紹介状をお持ちでなく緊急を要する方は、救急センターを直接受診くださいませ。またその場合は、通常の診療費とは別に、選定療養費として、7,000円をご負担いただいております。あらかじめご了承ください。それでは失礼いたします。"
