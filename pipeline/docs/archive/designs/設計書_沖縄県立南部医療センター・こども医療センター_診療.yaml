# 確認レポート: docs/designs/確認レポート_沖縄県立南部医療センター_診療_20260423.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "沖縄県立南部医療センター・こども医療センター"
  scenario_name: "診療"
  group_name: "沖縄県立南部医療センター・こども医療センター"
  flow_name: "沖縄県立南部医療センター・こども医療センター$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "なし（24時間受付 / customer_doc に時刻判定の記載なし）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "沖縄県立南部医療センター・こども医療センター$診療"
      role: "main"
      description: "小児/成人分岐 → 用件分岐（新規/変更/キャンセル/予約日の確認）→ 共通個人情報聴取 → smsFlag 別終話のメインフロー"
  subflows:
    - name: "沖縄県立南部医療センター・こども医療センター$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報サブフロー.bivr の診察券番号聴取を完全コピー。「わからない／持っていない」→ 空文字格納。customer_doc 1. 復唱ルールで echo_back 対象外（3 項目のみ）"
    - name: "沖縄県立南部医療センター・こども医療センター$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "customer_doc §1「患者名は絶対に復唱をしてはいけない」に従い recitation=なし。全角カタカナ格納・推定補正禁止"
    - name: "沖縄県立南部医療センター・こども医療センター$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "customer_doc §1 echo_back 対象。DOB Re-confirmation で正規化＋読み上げ復唱。和暦（大正/昭和/平成/令和）対応"
    - name: "沖縄県立南部医療センター・こども医療センター$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier で 090/080/070/060=携帯、050=IP電話、それ以外=固定。携帯/IPは11桁、固定は10桁バリデーション。先頭0必須、「C/for/ふぉー/フォー/しー/しい/し→4」「ごー/ごお/ご→5」救済。再質問2回失敗時は incoming_phone_number 流用＋「連絡先電話番号を聞き取る事ができませんでしたので、今おかけの番号をご連絡先として登録いたします」TTS"

# --- セクション3: フローの目的 ---
purpose: |
  沖縄県立南部医療センター・こども医療センターの診療予約専用 AI 電話窓口。
  入電者から以下を聴取し、Dr.JOY に連携する:
    - 年齢区分（小児／成人）
    - 用件（新規／変更／キャンセル／予約日の確認）
    - 用件別の聴取項目（新規: 診療科・紹介状・医療機関名(成人のみ)・都合が悪い日、変更/キャンセル: 薬服用中・薬残数・診療科・予約日・理由・(変更のみ都合が悪い日)、確認: 診療科・確認事項）
    - 個人情報（診察券番号／氏名／生年月日／連絡先電話番号）
    - 最後の問い合わせ（1 ターンの単純聴取、FAQ ループなし）
  用件に応じて smsFlag を 1（新規）/ 2（変更）/ 3（キャンセル）/ 4（予約日の確認）で出し分け、キャンセルのみ専用終話 TTS を流す。
  病理診断科（成人のみ）/ 紹介状無し（新規のみ）/ 残薬無し（変更・キャンセル）は AI 予約不可で代表案内終話（status=2）。非通知着信は status=7 専用終話。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "沖縄県立南部医療センター・こども医療センター$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知(status=7, smsFlag=-1) → 切断
            └─ 通常   → 冒頭_アナウンス
                          → 年齢確認（enum 小児/成人 を age に保存）
                            → 用件聴取（echo_back, enum 4 分岐）
                                ├─ 新規 → 分岐_新規_年齢 (context_match_router: age)
                                │           ├─ 小児 → 診療科_新規_小児 → 紹介状有無_新規
                                │           └─ 成人 → 診療科_新規_成人（病理→END_病理診断科）→ 紹介状有無_新規
                                │         紹介状有無_新規:
                                │           ├─ あり → 分岐_新規_紹介状あり_年齢
                                │           │           ├─ 小児 → 都合が悪い日_新規
                                │           │           └─ 成人 → 医療機関名_新規 → 都合が悪い日_新規
                                │           └─ なし → END_紹介状無し案内
                                │         都合が悪い日_新規 → (共通) jump_診察券番号聴取
                                │
                                ├─ 変更   → 薬服用中か_変更
                                │             ├─ はい → 薬残数確認_変更
                                │             │           ├─ なし → END_残薬無し案内
                                │             │           └─ あり → 分岐_変更_年齢
                                │             └─ いいえ → 分岐_変更_年齢
                                │           分岐_変更_年齢:
                                │             ├─ 小児 → 診療科_変更_小児 → 予約日_変更(echo_back)
                                │             └─ 成人 → 診療科_変更_成人（病理→END）→ 予約日_変更(echo_back)
                                │           → 理由_変更 → 都合が悪い日_変更 → (共通) jump_診察券番号聴取
                                │
                                ├─ キャンセル → 薬服用中か_キャンセル
                                │             ├─ はい → 薬残数確認_キャンセル
                                │             │           ├─ なし → END_残薬無し案内
                                │             │           └─ あり → 分岐_キャンセル_年齢
                                │             └─ いいえ → 分岐_キャンセル_年齢
                                │           分岐_キャンセル_年齢:
                                │             ├─ 小児 → 診療科_キャンセル_小児 → 予約日_キャンセル(echo_back)
                                │             └─ 成人 → 診療科_キャンセル_成人（病理→END）→ 予約日_キャンセル(echo_back)
                                │           → 理由_キャンセル → (共通) jump_診察券番号聴取
                                │
                                └─ 予約日の確認 → 分岐_確認_年齢
                                          ├─ 小児 → 診療科_確認_小児 → 確認事項_確認(reason)
                                          └─ 成人 → 診療科_確認_成人（病理→END）→ 確認事項_確認(reason)
                                                → (共通) jump_診察券番号聴取
                            (共通) jump_診察券番号聴取 → jump_氏名聴取 → jump_生年月日聴取(復唱) → jump_電話番号聴取(復唱)
                            → 最後の問い合わせ(enum: なし/default)
                                ├─ なし → 分岐_終話_用件
                                └─ default → FAQ不可_案内 → 分岐_終話_用件
                            分岐_終話_用件 (context_match_router: classification):
                                ├─ 新規         → END_通常_新規(status=1, smsFlag=1)
                                ├─ 変更         → END_通常_変更(status=1, smsFlag=2)
                                ├─ キャンセル   → END_通常_キャンセル(status=1, smsFlag=3, 専用TTS)
                                └─ 予約日の確認 → END_通常_確認(status=1, smsFlag=4)
    notes: |
      - 非通知 status=7 は customer 固有運用（director.md standard の 2 ではない）
      - 病理診断科は成人 診療科 hearing でのみ enum 分岐（小児リストには存在しない）
      - 小児歯科口腔外科は復唱時「歯科口腔外科」と言い換える customer 仕様があるが、本設計では診療科 echo_back なしのため発話には現れない（prompter メモに残す）
      - 診療科 hearing は全て no_result_default="登録なし"（モジュール選定ガイド 2.5）
      - 全 hearing の retry 失敗時は skip（空文字格納して次ステップへ）。customer_doc 2.5 準拠で「かしこまりました」TTS を挟む
      - 最後の問い合わせは RAG 化しない 1 ターン聴取。default で FAQ不可_案内 を 1 回流すだけ

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 年齢確認

  # --- 年齢確認（小児/成人 を age に保存。両方とも用件聴取へ合流）---
  - step: 年齢確認
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 用件聴取

  # --- 用件聴取（Pattern A 直接分岐、echo_back あり）---
  - step: 用件聴取
    type: hearing
    output_format: enum
    conditions:
      - match: "新規"
        next: 分岐_新規_年齢
      - match: "変更"
        next: 薬服用中か_変更
      - match: "キャンセル"
        next: 薬服用中か_キャンセル
      - match: "予約日の確認"
        next: 分岐_確認_年齢

  # ============ 新規ルート ============
  - step: 分岐_新規_年齢
    type: context_match_router
    reference_module: "age"
    conditions:
      - match: "小児"
        next: 診療科_新規_小児
      - match: "default"
        next: 診療科_新規_成人

  - step: 診療科_新規_小児
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 紹介状有無_新規

  - step: 診療科_新規_成人
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "病理診断科"
        next: END_病理診断科案内
      - match: "default"
        next: 紹介状有無_新規

  - step: 紹介状有無_新規
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 分岐_新規_紹介状あり_年齢
      - match: "なし"
        next: END_紹介状無し案内

  - step: 分岐_新規_紹介状あり_年齢
    type: context_match_router
    reference_module: "age"
    conditions:
      - match: "小児"
        next: 都合が悪い日_新規
      - match: "default"
        next: 医療機関名_新規

  - step: 医療機関名_新規
    type: hearing
    output_format: text
    next: 都合が悪い日_新規

  - step: 都合が悪い日_新規
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # ============ 変更ルート ============
  - step: 薬服用中か_変更
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 薬残数確認_変更
      - match: "いいえ"
        next: 分岐_変更_年齢

  - step: 薬残数確認_変更
    type: hearing
    output_format: enum
    conditions:
      - match: "なし"
        next: END_残薬無し案内
      - match: "あり"
        next: 分岐_変更_年齢

  - step: 分岐_変更_年齢
    type: context_match_router
    reference_module: "age"
    conditions:
      - match: "小児"
        next: 診療科_変更_小児
      - match: "default"
        next: 診療科_変更_成人

  - step: 診療科_変更_小児
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 予約日_変更

  - step: 診療科_変更_成人
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "病理診断科"
        next: END_病理診断科案内
      - match: "default"
        next: 予約日_変更

  - step: 予約日_変更
    type: hearing
    output_format: datetime
    next: 理由_変更

  - step: 理由_変更
    type: hearing
    output_format: text
    next: 都合が悪い日_変更

  - step: 都合が悪い日_変更
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # ============ キャンセルルート ============
  - step: 薬服用中か_キャンセル
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 薬残数確認_キャンセル
      - match: "いいえ"
        next: 分岐_キャンセル_年齢

  - step: 薬残数確認_キャンセル
    type: hearing
    output_format: enum
    conditions:
      - match: "なし"
        next: END_残薬無し案内
      - match: "あり"
        next: 分岐_キャンセル_年齢

  - step: 分岐_キャンセル_年齢
    type: context_match_router
    reference_module: "age"
    conditions:
      - match: "小児"
        next: 診療科_キャンセル_小児
      - match: "default"
        next: 診療科_キャンセル_成人

  - step: 診療科_キャンセル_小児
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 予約日_キャンセル

  - step: 診療科_キャンセル_成人
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "病理診断科"
        next: END_病理診断科案内
      - match: "default"
        next: 予約日_キャンセル

  - step: 予約日_キャンセル
    type: hearing
    output_format: datetime
    next: 理由_キャンセル

  - step: 理由_キャンセル
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # ============ 予約日の確認ルート ============
  - step: 分岐_確認_年齢
    type: context_match_router
    reference_module: "age"
    conditions:
      - match: "小児"
        next: 診療科_確認_小児
      - match: "default"
        next: 診療科_確認_成人

  - step: 診療科_確認_小児
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 確認事項_確認

  - step: 診療科_確認_成人
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "病理診断科"
        next: END_病理診断科案内
      - match: "default"
        next: 確認事項_確認

  - step: 確認事項_確認
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # ============ 共通個人情報聴取（合流点） ============
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$電話番号聴取"
    next: 最後の問い合わせ

  - step: 最後の問い合わせ
    type: hearing
    output_format: enum
    conditions:
      - match: "なし"
        next: 分岐_終話_用件
      - match: "default"
        next: FAQ不可_案内

  - step: FAQ不可_案内
    type: announcement
    next: 分岐_終話_用件

  # ============ 終話分岐 & 終話 ============
  - step: 分岐_終話_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "新規"
        next: END_通常_新規
      - match: "変更"
        next: END_通常_変更
      - match: "キャンセル"
        next: END_通常_キャンセル
      - match: "予約日の確認"
        next: END_通常_確認
      - match: "default"
        next: END_通常_新規

  - step: END_通常_新規
    type: termination
    termination_ref: "END_通常_新規"
  - step: END_通常_変更
    type: termination
    termination_ref: "END_通常_変更"
  - step: END_通常_キャンセル
    type: termination
    termination_ref: "END_通常_キャンセル"
  - step: END_通常_確認
    type: termination
    termination_ref: "END_通常_確認"
  - step: END_紹介状無し案内
    type: termination
    termination_ref: "END_紹介状無し案内"
  - step: END_残薬無し案内
    type: termination
    termination_ref: "END_残薬無し案内"
  - step: END_病理診断科案内
    type: termination
    termination_ref: "END_病理診断科案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "新規"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "予約日の確認"
    item_default: true
    editable: true
    deletable: false
    notes: "用件聴取で Pattern A 直接分岐"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "全角カタカナ。推定補正禁止・復唱絶対禁止（customer_doc §1）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "YYYY-MM-DD 00:00。和暦対応（大正/昭和/平成/令和）。サブフロー DOB Re-confirmation で復唱"

  - context_name: "medicalCardNumber"
