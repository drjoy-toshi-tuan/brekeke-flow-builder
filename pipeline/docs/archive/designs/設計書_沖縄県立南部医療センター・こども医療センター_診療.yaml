hearing_items:
  - order: 1
    name: "年齢確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "age"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "小児"
      - "成人"
    notes: |
      - 肯定（はい／そう／そうです／肺/そう二 等） → 小児
      - 否定（いいえ／違います／ちがう 等） → 成人
      - 肺＝はい救済（customer_doc 最優先適用二択正規化）
      - 救済語: 「そう二」 → 小児（customer_doc 4 章）

  - order: 2
    name: "用件聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "変更"
      - "キャンセル"
      - "予約日の確認"
    notes: |
      - 復唱フォーマット:「用件は、〇〇 でよろしいでしょうか。はい、そうです、または、いいえ、違います、のようにお答えください。」
      - 救済語: 「印刷／定期／新薬／再診／最新／禁忌」→ 診察相当、「薬／お薬」→ 予約、「電気／でんき」→ 新規（customer_doc 4 章）
      - customer_doc §1 echo_back 対象 3 項目の 1 つ

  - order: 3
    name: "診療科_新規_小児"
