# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 — 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信（customer_doc 1-4: anonymous / unknown）"
    tts_announcement: "お電話ありがとうございます。沖縄県立南部医療センター・こども医療センターの、予約専用AI電話です。お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に、 「1、8、6」を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（use_acceptance_times=false のため到達しないが template 必須項目として保持）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（customer_doc 2.5 で空文字格納方針のため実質到達しない）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（受付完了 4 パターン）---
  - name: "END_通常_新規"
    condition: "classification=新規 で全聴取完了"
    tts_announcement: "かしこまりました。内容を確認のうえ、5日以内にショートメール、もしくはお電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_新規"
  - name: "END_通常_変更"
    condition: "classification=変更 で全聴取完了"
    tts_announcement: "かしこまりました。内容を確認のうえ、5日以内にショートメール、もしくはお電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_変更"
  - name: "END_通常_キャンセル"
    condition: "classification=キャンセル で全聴取完了"
    tts_announcement: "かしこまりました。予約キャンセルのお申し込みを受付いたしました。内容の確認が必要な場合のみ、当院スタッフよりご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "3"
    completion_flag_name: "完了フラグ_キャンセル"
  - name: "END_通常_確認"
    condition: "classification=予約日の確認 で全聴取完了"
