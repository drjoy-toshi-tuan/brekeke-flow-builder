# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "秋田県立循環器・脳脊髄センター$診療"
      role: "main"
      description: "冒頭 → 用件確認（3択）→ 診療科1（救急科/脳神経特定分岐）→ 用件別_前半（予約日時確認は個人情報へスキップ、変更/キャンセルは診療科2/検査/現在予約日へ）→ 用件別_後半（変更=変更希望日+残薬、キャンセル=理由）→ 個人情報聴取サブフロー×4 → phonetype×classification の2段ContextMatchRouter → 用件×電話種別の6終話"
  subflows:
    - name: "秋田県立循環器・脳脊髄センター$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/氏名聴取.json を完全コピー。customer_doc L459-461: 復唱なし、苗字のみの場合「下のお名前もお伺いしてもよろしいですか？」を1度だけ"
    - name: "秋田県立循環器・脳脊髄センター$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/生年月日聴取_復唱あり.json を完全コピー。和暦/西暦変換・2桁元号判定・DOB Re-confirmation 内蔵"
    - name: "秋田県立循環器・脳脊髄センター$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/診察券番号聴取.json を完全コピー。「わからない」分岐・C→4置換を含む（3桁以上必須）"
    - name: "秋田県立循環器・脳脊髄センター$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/電話番号聴取_復唱あり.json を完全コピー。incoming-classifier + Phone Normalization + 携帯/固定判別内蔵。070/080/090/060=携帯、018系=固定、phonetype を保存"

# --- セクション3: フローの目的 ---
purpose: "秋田県立循環器・脳脊髄センターの予約専用AI電話として、患者からの『予約変更・予約キャンセル・予約日時確認』の3用件を受け付け、診療科（最大2科）・検査・現在予約日・変更希望日/キャンセル理由・残薬確認・患者情報（氏名・生年月日・診察券番号・連絡先電話番号）を聴取してDr.JOYに保存し、折り返し連絡（携帯=SMS、固定=電話）の申込受付を自動化する。救急科は AI 電話対応不可のため代表電話案内で終話、新規予約は本フローの用件に含まれない。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "秋田県立循環器・脳脊髄センター$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS)
                    → 用件確認 (DTMF_AmiVoice, enum: 変更/キャンセル/予約日時確認)
                        └─ (全用件) 診療科 (AmiVoice_STT, enum, no_result_default=登録なし)
                              ├─ 救急科 → END_救急科案内(status=2, smsFlag=-1) → 切断
                              ├─ 脳/脳神経 → 脳神経特定_1 (AmiVoice_STT, enum: 脳神経外科/脳神経内科) → 用件別_前半
                              └─ その他 → 用件別_前半 (ContextMatchRouter on classification)
                                    ├─ 予約日時確認 → jump_氏名聴取 (診療科2/検査/現在予約日をスキップ)
                                    └─ 変更/キャンセル → 診療科2 (AmiVoice_STT, enum, no_result_default=登録なし)
                                          ├─ 救急科 → END_救急科案内
                                          ├─ 脳/脳神経 → 脳神経特定_2 → 検査
                                          └─ その他/ない → 検査 (AmiVoice_STT, text)
                                                → 現在予約日 (AmiVoice_STT, datetime)
                                                  → 用件別_後半 (ContextMatchRouter on classification)
                                                        ├─ 変更 → 変更希望日 (AmiVoice_STT, text)
                                                        │       → 残薬確認 (DTMF_AmiVoice, text)
                                                        │         → jump_氏名聴取
                                                        └─ キャンセル → キャンセル理由 (DTMF_AmiVoice, enum: 4択)
                                                                    → jump_氏名聴取
                                                                    → jump_生年月日聴取 (復唱あり)
                                                                        → jump_診察券番号聴取
                                                                          → jump_電話番号聴取 (復唱あり、phonetype保存)
                                                                            → 終話分岐_phonetype (ContextMatchRouter on phonetype)
                                                                                  ├─ 携帯 → 終話分岐_用件_携帯 (ContextMatchRouter on classification)
                                                                                  │          ├─ 変更 → END_変更_終話1(status=1, smsFlag=1) → 切断
                                                                                  │          ├─ キャンセル → END_キャンセル_終話1(status=1, smsFlag=1) → 切断
                                                                                  │          └─ 予約日時確認 → END_確認_終話1(status=1, smsFlag=1) → 切断
                                                                                  └─ その他(固定) → 終話分岐_用件_固定 (ContextMatchRouter on classification)
                                                                                             ├─ 変更 → END_変更_終話2(status=1, smsFlag=1) → 切断
                                                                                             ├─ キャンセル → END_キャンセル_終話2(status=1, smsFlag=1) → 切断
                                                                                             └─ 予約日時確認 → END_確認_終話2(status=1, smsFlag=1) → 切断

      リトライ上限到達（用件確認など） → END_聴取失敗(status=3, smsFlag=-1) → 切断
    notes: |
      - customer_doc に受付時間の記載なしのため use_acceptance_times=false。時間外ルートは形式上残すが到達経路なし。
      - 脳/脳神経の再ヒアリングは診療科1・診療科2 の両方で実施（customer_doc L369, L397, L424）。予約日時確認ルートでは「脳」単独のみ記載だが、director 判断で脳神経も同様に特定する。
      - 終話は「phonetype」→「classification」の2段 ContextMatchRouter で6分岐。Gen2 の「終話_用件判定_1/_2」を ContextMatchRouter 2段に展開。
      - Gen2 の「共通_連絡先_着信確認」ロジックは Gen3 では電話番号聴取サブフロー（復唱あり）に吸収。
      - Gen2 にあった checkpoint / endpoint / checkout 系フィールドは Gen3 ではサポート外のため context_fields から除外（saveCompletionFlag2db が代替）。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 用件確認

  # --- 用件確認（DTMF 1/2/3 + 音声）---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "変更"
        next: 診療科
      - match: "キャンセル"
        next: 診療科
      - match: "予約日時確認"
        next: 診療科

  # --- 診療科1（全用件共通）---
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "救急科"
        next: END_救急科案内
      - match: "脳"
        next: 脳神経特定_1
      - match: "脳神経"
        next: 脳神経特定_1
      - match: "default"
        next: 用件別_前半

  # --- 脳神経特定_1: 「脳」「脳神経」発話時の絞り込み ---
  - step: 脳神経特定_1
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 用件別_前半

  # --- 用件別_前半分岐: 予約日時確認は診療科2/検査/現在予約日をスキップ ---
  - step: 用件別_前半
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "予約日時確認"
        next: jump_氏名聴取
      - match: "変更"
        next: 診療科2
      - match: "キャンセル"
        next: 診療科2

  # --- 診療科2（変更/キャンセルのみ）---
  - step: 診療科2
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "救急科"
        next: END_救急科案内
      - match: "脳"
        next: 脳神経特定_2
      - match: "脳神経"
        next: 脳神経特定_2
      - match: "default"
        next: 検査

  # --- 脳神経特定_2 ---
  - step: 脳神経特定_2
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 検査

  # --- 検査（text）---
  - step: 検査
    type: hearing
    output_format: text
    next: 現在予約日

  # --- 現在予約日（datetime）---
  - step: 現在予約日
    type: hearing
    output_format: datetime
    next: 用件別_後半

  # --- 用件別_後半分岐: 変更→変更希望日、キャンセル→キャンセル理由 ---
  - step: 用件別_後半
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: 変更希望日
      - match: "キャンセル"
        next: キャンセル理由

  # --- 変更ルート: 変更希望日（text）---
  - step: 変更希望日
    type: hearing
    output_format: text
    next: 残薬確認

  # --- 変更ルート: 残薬確認（text — はい/いいえ を自由発話で受ける）---
  - step: 残薬確認
    type: hearing
    output_format: text
    next: jump_氏名聴取

  # --- キャンセルルート: キャンセル理由（DTMF 1-4 + 音声、enum 4択）---
  - step: キャンセル理由
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: jump_氏名聴取

  # --- 個人情報聴取サブフロー（4連、customer_doc L383-386 の順序）---
  - step: jump_氏名聴取
    type: subflow
    flowname: "秋田県立循環器・脳脊髄センター$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "秋田県立循環器・脳脊髄センター$生年月日聴取"
    next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "秋田県立循環器・脳脊髄センター$診察券番号聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "秋田県立循環器・脳脊髄センター$電話番号聴取"
    next: 終話分岐_phonetype

  # --- 終話分岐 第1段: phonetype（携帯 vs その他）---
  - step: 終話分岐_phonetype
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: 終話分岐_用件_携帯
      - match: "その他"
        next: 終話分岐_用件_固定
      - match: "default"
        next: 終話分岐_用件_固定

  # --- 終話分岐 第2段（携帯）: classification で3分岐 ---
  - step: 終話分岐_用件_携帯
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: END_変更_終話1
      - match: "キャンセル"
        next: END_キャンセル_終話1
      - match: "予約日時確認"
        next: END_確認_終話1
      - match: "default"
        next: END_確認_終話1

  # --- 終話分岐 第2段（固定）: classification で3分岐 ---
  - step: 終話分岐_用件_固定
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: END_変更_終話2
      - match: "キャンセル"
        next: END_キャンセル_終話2
      - match: "予約日時確認"
        next: END_確認_終話2
      - match: "default"
        next: END_確認_終話2

  # --- 終話ブロック（代表案内系）---
  - step: END_救急科案内
    type: termination
    termination_ref: "END_救急科案内"

  # --- 終話ブロック（完了系 携帯ルート）---
  - step: END_変更_終話1
    type: termination
    termination_ref: "END_変更_終話1"

  - step: END_キャンセル_終話1
    type: termination
    termination_ref: "END_キャンセル_終話1"

  - step: END_確認_終話1
    type: termination
    termination_ref: "END_確認_終話1"

  # --- 終話ブロック（完了系 固定ルート）---
  - step: END_変更_終話2
    type: termination
    termination_ref: "END_変更_終話2"

  - step: END_キャンセル_終話2
    type: termination
    termination_ref: "END_キャンセル_終話2"

  - step: END_確認_終話2
    type: termination
    termination_ref: "END_確認_終話2"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "変更"
      - order: "2"
        value: "キャンセル"
      - order: "3"
        value: "予約日時確認"
    item_default: true
    editable: true
    deletable: true
    notes: "Gen2 function.enum と同一の3値"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values:
      - order: "1"
        value: "脳神経外科"
      - order: "2"
        value: "脊髄脊椎外科"
      - order: "3"
        value: "脳神経内科"
      - order: "4"
        value: "もの忘れ診療科"
      - order: "5"
        value: "糖尿病・内分泌内科"
      - order: "6"
        value: "循環器内科"
      - order: "7"
        value: "心臓血管外科"
      - order: "8"
        value: "脳血管内科"
      - order: "9"
        value: "麻酔科"
      - order: "10"
        value: "血液内科"
      - order: "11"
        value: "リハビリテーション科"
      - order: "12"
        value: "放射線科"
      - order: "13"
        value: "総合診療科"
      - order: "14"
        value: "救急科"
      - order: "15"
        value: "脳神経病理診断科"
      - order: "16"
        value: "整形外科"
      - order: "17"
        value: "登録なし"
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 function.enum 16件 + no_result用の『登録なし』。customer_doc 本文は15件だが function スキーマの血液内科を含めて16件に統一（移管ノート L25 参照）"

  - context_name: "clinicalDepartment2"
    context_name_jp: "2つ目の診療科"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更/キャンセルルートのみ聴取。『ない』または2つ目の診療科名。TEXT型だが内部的に上記 enum と同じ値 or 『ない』を想定"

  - context_name: "inspection"
    context_name_jp: "検査名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更/キャンセルルートのみ聴取。フリーテキスト（『ありません』『分かりません』含む）"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更/キャンセルルートのみ聴取。YYYY-MM-DD HH:MM 形式。10-12月入電で1-9月言及時は翌年扱い"

  - context_name: "desiredReservationDate"
    context_name_jp: "予約希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更ルートのみ聴取。customer_doc L348-349 に従い DATE ではなく TEXT（フリーワード）。Gen2 の PascalCase『DesiredreservationDate』を camelCase に統一"

  - context_name: "leftoverMedication"
    context_name_jp: "残薬確認"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更ルートのみ聴取。『はい大丈夫です』『いいえ、足りません』を自由発話で受ける。Gen2 の『leftover medication』（スペース含む）を camelCase 化"

  - context_name: "reason"
    context_name_jp: "キャンセル理由"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "キャンセルルートのみ聴取。DTMF 1-4 入力または4択発話。番号のみの場合は番号の内容テキストを格納（customer_doc L455）"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "氏名聴取サブフローで保存"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "生年月日聴取サブフローで保存（復唱あり、和暦/西暦対応）"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "診察券番号聴取サブフローで保存（3桁以上、C→4置換、『わからない』分岐あり）"

