# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "変更"
      - "キャンセル"
      - "予約日時確認"
    notes: "DTMF 1=変更, 2=キャンセル, 3=予約日時確認。音声発話（『予約変更』『キャンセル』『確認』等）も同3値に分類。customer_doc L361-362: dtmf=1,2,3以外の入力は再度用件を確認"

  - order: 2
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "脳神経外科"
      - "脊髄脊椎外科"
      - "脳神経内科"
      - "もの忘れ診療科"
      - "糖尿病・内分泌内科"
      - "循環器内科"
      - "心臓血管外科"
      - "脳血管内科"
      - "麻酔科"
      - "血液内科"
      - "リハビリテーション科"
      - "放射線科"
      - "総合診療科"
      - "救急科"
      - "脳神経病理診断科"
      - "整形外科"
      - "脳"
      - "脳神経"
      - "登録なし"
    notes: "モジュール選定ガイド 2.5 に従い no_result_default='登録なし' を設定。『脳』『脳神経』は絞り込みが必要なため enum に追加して分岐に使う。customer_doc L48-49 に従い近しい診療科レコメンドは OpenAI プロンプトで対応（例: 消化器科→『消化器内科でしょうか？』）"

  - order: 3
    name: "脳神経特定_1"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "脳神経外科"
      - "脳神経内科"
    notes: "『脳神経外科ですか？脳神経内科ですか？』で絞り込み。clinicalDepartment を上書き"

  - order: 4
    name: "診療科2"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment2"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "脳神経外科"
      - "脊髄脊椎外科"
      - "脳神経内科"
      - "もの忘れ診療科"
      - "糖尿病・内分泌内科"
      - "循環器内科"
      - "心臓血管外科"
      - "脳血管内科"
      - "麻酔科"
      - "血液内科"
      - "リハビリテーション科"
      - "放射線科"
      - "総合診療科"
      - "救急科"
      - "脳神経病理診断科"
      - "整形外科"
      - "脳"
      - "脳神経"
      - "ない"
      - "登録なし"
    notes: "変更/キャンセルルートのみ聴取。『無い場合は、ない、とお話しください』（customer_doc L441）のため『ない』を enum に追加。救急科選択時は END_救急科案内（診療科1と同じ）。no_result_default='登録なし'"

  - order: 5
    name: "脳神経特定_2"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment2"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "脳神経外科"
      - "脳神経内科"
    notes: "診療科2 での『脳』『脳神経』発話時の絞り込み。clinicalDepartment2 を上書き"

  - order: 6
    name: "検査"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inspection"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更/キャンセルルートのみ。フリーテキスト。『ありません』『分かりません』も受け付けそのまま保存"

  - order: 7
    name: "現在予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "変更/キャンセルルートのみ。YYYY-MM-DD HH:MM 形式に正規化（時刻は 00:00 固定）。相対日付（今日/明日/明後日）は着信日から換算。10-12月入電で1-9月発話は翌年扱い。『分からない』の場合は NO_RESULT 扱い（text保存ではなく datetime の制約上リトライに流れる）"

  - order: 8
    name: "変更希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更ルートのみ。customer_doc L348-349 に従い TEXT（フリーワード、日付形式で格納しない）"

  - order: 9
    name: "残薬確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "leftoverMedication"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更ルートのみ。『はい大丈夫です』『いいえ、足りません』を自由発話で受けてそのまま保存。後段に分岐なしのため enum 不要。TTS に <break> タグ含むため DTMF_AmiVoice（無DTMFでも可）"

  - order: 10
    name: "キャンセル理由"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "インフルエンザ、コロナ等、感染症のため"
      - "体調変化のため"
      - "他院へ入院中のため"
      - "都合がつかないため"
    notes: "キャンセルルートのみ。DTMF 1=感染症, 2=体調変化, 3=他院入院, 4=都合。番号のみ発話でも内容テキストを格納（customer_doc L455）。後段に分岐なしのため conditions は default 単線"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の3つのうちの、いずれかでお話ください。1、予約変更。2、予約キャンセル。3、予約日時の確認。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "予約日時確認"
      mapping:
        - input: "DTMF 1 または「変更」「1」「いち」「ひー」を含む発話"
          output: "変更"
        - input: "DTMF 2 または「キャンセル」「2」「に」「つー」「取消」を含む発話"
          output: "キャンセル"
        - input: "DTMF 3 または「確認」「3」「さん」「予約日時確認」「予約確認」を含む発話"
          output: "予約日時確認"
      no_result_condition: "上記いずれにも該当しない。DTMF 1/2/3 以外の番号押下も NO_RESULT（customer_doc L362）"
    save_to: "classification"
    next_step: "(enum分岐) 変更/キャンセル/予約日時確認 → すべて 診療科"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "診療科"
    tts_announcement: "予約票に記載されている診療科をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "脳神経外科"
        - "脊髄脊椎外科"
        - "脳神経内科"
        - "もの忘れ診療科"
        - "糖尿病・内分泌内科"
        - "循環器内科"
        - "心臓血管外科"
        - "脳血管内科"
        - "麻酔科"
        - "血液内科"
        - "リハビリテーション科"
        - "放射線科"
        - "総合診療科"
        - "救急科"
        - "脳神経病理診断科"
        - "整形外科"
        - "脳"
        - "脳神経"
        - "登録なし"
      mapping:
        - input: "脳外科 / 脳外 / 神経外科"
          output: "脳神経外科"
        - input: "脊椎外科 / 脊髄外科 / 脊椎脊髄外 / 脊椎"
          output: "脊髄脊椎外科"
        - input: "脳内科 / 神経内科 / 脳神経内 / 神経 / 神経科"
          output: "脳神経内科"
        - input: "もの忘れ科 / 認知症科 / 記憶科 / もの忘れ / もの忘れ外来 / 認知 / 認知症"
          output: "もの忘れ診療科"
        - input: "糖尿病内科 / 内分泌内科 / 代謝内科 / 糖尿 / 糖尿病 / 血統 / 血糖"
          output: "糖尿病・内分泌内科"
        - input: "循内 / 循環器科 / 心臓内科"
          output: "循環器内科"
        - input: "心外 / 心血外 / 心臓外科"
          output: "心臓血管外科"
        - input: "脳血管科 / 脳血管内"
          output: "脳血管内科"
        - input: "麻酔 / 麻酔部 / 麻科"
          output: "麻酔科"
        - input: "血液 / 血内"
          output: "血液内科"
        - input: "リハ科 / リハビリ科 / リハ部"
          output: "リハビリテーション科"
        - input: "放科 / 画像診断科 / 放射線診断科"
          output: "放射線科"
        - input: "総診科 / 総合科 / 一般診療科"
          output: "総合診療科"
        - input: "救急部 / 救命科 / 救急"
          output: "救急科"
        - input: "病理診断科 / 脳病理科 / 神経病理科"
          output: "脳神経病理診断科"
        - input: "整形（単独）"
          output: "整形外科"
        - input: "脳（単独発話、脳神経外科/内科の特定不可）"
          output: "脳"
        - input: "脳神経（単独発話、外科/内科の特定不可）"
          output: "脳神経"
        - input: "リスト非該当（消化器科など）"
          output: "登録なし（直後の OpenAI 出力の近接科レコメンドはリトライ内で扱う）"
      no_result_condition: "無応答 / 音声認識不能 → no_result_default='登録なし' で自動保存"
    save_to: "clinicalDepartment"
    next_step: "(enum分岐) 救急科→END_救急科案内 / 脳・脳神経→脳神経特定_1 / default→用件別_前半"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "脳神経特定_1"
    tts_announcement: "脳神経外科ですか？脳神経内科ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "脳神経外科"
        - "脳神経内科"
      mapping:
        - input: "外科 / 脳神経外科 / げか / のうげ"
          output: "脳神経外科"
        - input: "内科 / 脳神経内科 / ないか / のうない"
          output: "脳神経内科"
      no_result_condition: "どちらにも該当しない"
    save_to: "clinicalDepartment"
    next_step: "用件別_前半"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "診療科2"
    tts_announcement: "ほかに、ご予約を変更もしくはキャンセルされる診療科があればお話ください。無い場合は、ない、とお話しください。どうぞ。"
