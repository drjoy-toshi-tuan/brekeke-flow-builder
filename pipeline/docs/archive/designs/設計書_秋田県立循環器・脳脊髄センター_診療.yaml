# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2 からの移管。Gen2 の status='0'（冒頭切断/途中切断）および status='9'（非通知）は CLAUDE.md 規約により使用禁止。非通知は status='2'、冒頭切断/途中切断は Dr.JOY 側の通話ログから判別する設計に変更。"
  - "Gen2 の checkpoint / endpoint / checkout / history / institution / introduction / disease / question / 'How to contact' / details / other / smsFlag フィールドは Gen3 では context_fields に含めない。smsFlag・endpoint は saveCompletionFlag2db のパラメータとして処理（CLAUDE.md Gen2→Gen3 ルール）。"
  - "命名規則統一: Gen2 の PascalCase 『DesiredreservationDate』→ camelCase 『desiredReservationDate』、スペース含む 『leftover medication』→『leftoverMedication』、『How to contact』は本フロー未使用のため削除。"
  - "脳/脳神経の絞り込みは診療科1・診療科2 の両方で実施（customer_doc L369, L397, L424）。予約日時確認ルートの customer_doc L424 は「脳」のみ言及で「脳神経」への言及なしだが、director 判断で両方拾う（対称性のため）。"
  - "救急科判定は診療科1・診療科2 の両方で実施し、END_救急科案内（status=2, smsFlag=-1）で終話。代表電話 018-833-0115 を3回繰り返す原文そのまま転記。"
  - "終話2（固定ルート）のキャンセル・予約日時確認のアナウンス冒頭が customer_doc L499, L502 で『予約変更の申し込みを受付いたしました』と誤記されているが、原資料に忠実に転記。reviewer で指摘される前提（human review で修正指示があれば差し替え）。"
  - "diagnosticcard: 診察券番号聴取サブフローは Gen2 の『3桁以上必須』『C→4置換』『わからない分岐』を継承（sample/診察券番号聴取.json に既実装）。Gen2 では 復唱ステップ（共通_診察券番号_復唱）があったが Gen3 のサンプルサブフロー（診察券番号聴取.json）には復唱がないため、診察券番号の復唱は移管時に落とすことになる（customer_doc L25 の『診察券番号は digits フォーマットで復唱』仕様は human review で対応要否を判断）。"
  - "連絡先電話番号は Gen2 の『着信番号を利用→復唱→否定なら手動聴取→復唱』ロジックを Gen3 の電話番号聴取_復唱あり サブフローに吸収。携帯判定は 070/080/090/060、固定は 018/0182/0183/0184/0185/0186/0187 他10桁（customer_doc L387-388, L414-415, L431-432）。"
  - "用件確認の特殊単語変換（customer_doc L328-338: 印刷/定期/新薬/再診/最新/禁忌→診察、薬/お薬→予約、電気/でんき→新規、いいです/肺→肯定）は当フローの3択（変更/キャンセル/予約日時確認）には直接マッピングされないが、『確認』として 予約日時確認 に吸収するケースは OpenAI プロンプトで対応。肯定判定は 残薬確認 や 電話番号聴取サブフローの復唱確認で利用。"
  - "予約日時確認ルートは診療科2/検査/現在予約日をスキップして個人情報聴取に進む（customer_doc L419-433）。全用件で診療科1は通過するため、診療科1の no_result_default='登録なし' は全用件に適用される。"
  - "全ての saveCompletionFlag2db の smsFlag は Gen2 に従い完了系=1、代表案内系=-1 で統一。phonetype 別の SMS 配信制御は Dr.JOY 側で行う。"
  - "TTS 発話は {tts_g:...}（全小文字）形式を使用。SSML タグ（<break/>, <dtmf/>, <speak>）は SSML サポート無効のため発話文から除去。DTMF 入力受付は DTMF_AmiVoice の stopByDTMF=Yes で制御。"
  - "use_acceptance_times=false のため acceptance_times モジュール・END_時間外 は到達経路なし。termination_patterns 上は保持（テンプレ規約）。"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID — Dr.JOY管理画面で確認）"
    resolved: false
    blocker: false
    notes: "Dr.JOY 管理画面から確認。フローJSONには含めない"

  - item: "デモ環境の電話番号（着信用ARS番号）"
    resolved: false
    blocker: false
    notes: "Brekeke IVR 設定時に割当。設計書には含めない"

  - item: "診察券番号の復唱有無（Gen2 にはあるが Gen3 のサンプルサブフローには復唱なし）"
    resolved: false
    blocker: false
    notes: "customer_doc L25『診察券番号聴取後の専用フォーマット復唱: <speak type=\"digits\"...>』は Gen2 実装。Gen3 の sample/診察券番号聴取.json には復唱がない。顧客に『復唱なし』で問題ないか確認要。必要なら 診察券番号聴取_復唱あり サブフローの新設またはメインフロー側に復唱モジュール追加。"

  - item: "終話2（固定ルート）のキャンセル・予約日時確認 アナウンス冒頭の誤記修正方針"
    resolved: false
    blocker: false
    notes: "customer_doc L499「予約変更の申し込みを受付いたしました」（キャンセル用）、L502「予約変更の申し込み」（確認用）は明らかに誤記。原資料に忠実に転記したが、顧客に確認して『予約キャンセル』『ご予約に関するお問い合わせ』に差し替えるか判断要。"

  - item: "新規予約の扱い（customer_doc 本文では 新規予約フロー非対応）"
    resolved: false
    blocker: false
    notes: "本フローの用件は 変更/キャンセル/予約日時確認 の3択。customer_doc L328-338 の単語変換に『電気/でんき→新規』があるが、新規は用件に存在しない。『新規』発話時の扱いを OpenAI プロンプトで明示（例: 予約日時確認に寄せる or NO_RESULT）するか確認要。"

  - item: "脳神経特定での予約日時確認ルート（customer_doc L424 は「脳」のみ、「脳神経」への言及なし）"
    resolved: false
    blocker: false
    notes: "director 判断で 脳/脳神経 両方を 脳神経特定_1 へ分岐する設計。予約日時確認ルートで「脳神経」単独発話時も絞り込みするかは顧客確認。"

  - item: "Gen2 の『1-3 診療科の特定ルール』（近しい診療科レコメンド）の実装方針"
    resolved: false
    blocker: false
    notes: "customer_doc L47-49『リストにない場合は近しい診療科をレコメンド（例: 消化器科→消化器内科でしょうか？）』の挙動。Gen3 では OpenAI プロンプトで類推して enum 値に正規化 or 『登録なし』で保存。精度確認要。"

  - item: "残薬確認の保存値形式（TEXT 自由発話 or 『はい/いいえ』正規化）"
    resolved: false
    blocker: false
    notes: "現設計では output_format=text で自由発話保存（『はい大丈夫です』そのまま）。Dr.JOY 画面での参照時に『はい/いいえ』『足りる/足りない』に正規化したい場合は output_format=enum に変更要。"

  - item: "SMS送信文面（Dr.JOY管理画面）"
    resolved: false
    blocker: false
    notes: "終話1（携帯）で送信する SMS 本文の設定は Dr.JOY 管理画面で行う。フロー側は smsFlag=1 のみ制御"

  - item: "非通知アナウンスの status 値（Gen2=9 vs Gen3規約=2）"
    resolved: false
    blocker: false
    notes: "CLAUDE.md 規約に従い status=2 で設定済み。Dr.JOY 側で非通知着信を識別する必要がある場合、別途 classification or 他フィールドで区別する検討要。"
