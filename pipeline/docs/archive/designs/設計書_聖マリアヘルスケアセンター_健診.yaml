# --- セクション6: 聴取項目一覧 ---
# 9ルート共通の聴取項目。使用ルートはnotesに記載。
hearing_items:
  # --- 共通: 個人/企業確認 ---
  - order: 1
    name: "個人企業確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "company_check"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "個人"
      - "企業"
    notes: "全ルート共通。「はい/肯定/本人」→個人、「いいえ/否定/企業/担当者/会社」→企業"

  # --- 個人: 用件聴取 ---
  - order: 2
    name: "用件_個人"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "二次受診"
      - "問い合わせ"
    notes: "個人のみ。DTMF 1=予約 2=変更 3=キャンセル 4=二次受診 5=問い合わせ。リトライ超過→問い合わせルートにフォールスルー"

  # --- 企業: 用件聴取 ---
  - order: 3
    name: "用件_企業"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "問い合わせ"
    notes: "企業のみ。DTMF 1=予約 2=変更 3=キャンセル 4=問い合わせ。リトライ超過→問い合わせルートにフォールスルー"

  # --- 用件復唱（個人5種+企業4種 = 9パターン）---
  - order: 4
    name: "用件復唱"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "肯定"
      - "否定"
    notes: >
      各用件ごとにTTS文言が異なる（「新規の予約でよろしいでしょうか？」等）。
      肯定→用件別ルートに進む、否定→用件聴取に戻る。
      個人5種 + 企業4種 = 9パターンの復唱TTS。

  # --- 当日確認（変更/キャンセル共通）---
  - order: 5
    name: "当日確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "肯定"
      - "否定"
    notes: "変更/キャンセルルートのみ（個人+企業共通）。肯定→代表案内終話、否定→予約日聴取に進む"

  # --- 予約日聴取 ---
  - order: 6
    name: "予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels: []
    notes: >
      変更/キャンセル/二次受診で使用。日付形式(yyyy-MM-dd)に変換。
      復唱あり: 「予約日は{reservationDate}でよろしいでしょうか？」
      二次受診の場合はTTS文言が異なる。

  # --- コース聴取 ---
  - order: 7
    name: "コース"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "course"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "予約ルート（個人/企業共通）。発話内容をそのまま格納。わからない場合も受け付ける"

  # --- オプション聴取 ---
  - order: 8
    name: "オプション"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "option"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "個人_予約ルートのみ。複数項目は読点区切りで格納。「ありません」も受け付ける"

  # --- 希望時期聴取 ---
  - order: 9
    name: "希望時期"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "Preferred_date"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: >
      予約/二次受診ルートで使用。TTS文言がルートで異なる:
      - 個人_予約: 「受診を希望されている時期をお話ください。」
      - 個人_二次受診: 「受診を希望されている時期を、本日より2週間以降のお日にちで...」
      - 企業_予約: 「受診を希望されている時期や、おおよその人数をお話ください。」

  # --- 変更内容聴取 ---
  - order: 10
    name: "変更内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "change_detail"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "変更ルート（個人/企業共通）。フリーテキスト保存"

  # --- 再検査内容聴取 ---
  - order: 11
    name: "再検査内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "change_detail"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "個人_二次受診ルートのみ。change_detailに格納（変更内容と同じフィールド）。「わからない」も受け付ける"

  # --- お問い合わせ内容聴取 ---
  - order: 12
    name: "問い合わせ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "問い合わせルート（個人/企業共通）。フリーテキスト保存。復唱しない"

  # --- 氏名 → サブフロー（hearing_items名を"氏名"に統一: サブフロー"氏名聴取"と部分マッチ成立のため）---
  - order: 13
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "氏名聴取サブフロー内。受診者名(patientName)を聴取。個人全ルート + 企業_変更/キャンセルで使用。復唱なし"

  # --- 生年月日 → サブフロー ---
  - order: 14
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels: []
    notes: "生年月日聴取サブフロー内（復唱あり）。個人ルートのみ。和暦・西暦対応"

  # --- 企業名聴取 ---
  - order: 15
    name: "企業名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "company_name"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "個人/企業共通。インライン聴取。「ありません」も受け付ける"

  # --- 担当者名聴取（企業のみ、インライン）---
  - order: 16
    name: "担当者名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName2"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: >
      企業ルートのみ。メインフロー内インライン聴取（標準氏名聴取サブフローはpatientNameに固定保存のため流用不可）。
      TTS: 「ご担当者様のお名前を、私は、田中太郎です、のようにフルネームでお話ください。」

  # --- 電話番号 → サブフロー ---
  - order: 17
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 3
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "電話番号聴取サブフロー内。リトライ3回（Gen2仕様維持 NON-BLOCKER N-6）"

# --- セクション7: ステップ詳細 ---
step_details:
  # === 個人企業確認 ===
  - step_name: "個人企業確認"
    tts_announcement: "初めに、ご連絡いただいている方は受診されるご本人様でしょうか？はい、そうです、または、いいえ、違いますでお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "個人"
        - "企業"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「そうです」「本人」「一人」「二人」「家族」「夫」「妻」等の個人を示す発話"
          output: "個人"
        - input: "「いいえ」「違います」「担当者」「会社」「企業」「団体」「医療機関」「健保組合」等の企業・団体を示す発話"
          output: "企業"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "company_check"
    next_step: "個人→用件_個人 / 企業→用件_企業"
    retry_failure: "end_failure"

  # === 用件聴取（個人）===
  - step_name: "用件_個人"
    tts_announcement: "ご用件を次の5つのうちの、いずれかでお話ください。 1.新規の予約、2.予約の変更、3.予約のキャンセル、4.二次受診、5.その他お問い合わせ、 それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "二次受診"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「新規」「薬」「お薬」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「取り直し」「変えたい」「別の」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「やめる」「取り消し」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「二次受診」「再検査」「精密検査」を含む"
          output: "二次受診"
        - input: "DTMF 5 または「問い合わせ」「質問」「聞きたい」を含む"
          output: "問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "各用件の復唱確認へ"
    retry_failure: "skip"
    retry_failure_notes: "リトライ超過 → 問い合わせルートにフォールスルー（Gen2仕様維持）"

  # === 用件聴取（企業）===
  - step_name: "用件_企業"
    tts_announcement: "ご用件を次の4つのうちの、いずれかでお話ください。 1.新規の予約、2.予約の変更、3.予約のキャンセル、4.その他お問い合わせ、 それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「新規」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「問い合わせ」を含む"
          output: "問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "各用件の復唱確認へ"
    retry_failure: "skip"
    retry_failure_notes: "リトライ超過 → 問い合わせルートにフォールスルー"

  # === 用件復唱（各用件共通構造、TTS文言のみ異なる）===
  - step_name: "復唱_予約"
    tts_announcement: "新規の予約でよろしいでしょうか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["肯定", "否定", "NO_RESULT"]
      mapping:
        - input: "「はい」「そうです」「DTMF 1」"
          output: "肯定"
        - input: "「いいえ」「違います」「DTMF 2」"
          output: "否定"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "肯定→用件別ルート / 否定→用件聴取に戻る"
    retry_failure: "skip"

  - step_name: "復唱_変更"
    tts_announcement: "予約の変更でよろしいでしょうか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["肯定", "否定", "NO_RESULT"]
      mapping:
        - input: "「はい」/DTMF 1"
          output: "肯定"
        - input: "「いいえ」/DTMF 2"
          output: "否定"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "肯定→変更ルート / 否定→用件聴取に戻る"
    retry_failure: "skip"

  - step_name: "復唱_キャンセル"
    tts_announcement: "予約のキャンセルでよろしいでしょうか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["肯定", "否定", "NO_RESULT"]
      mapping:
        - input: "「はい」/DTMF 1"
          output: "肯定"
        - input: "「いいえ」/DTMF 2"
          output: "否定"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "肯定→キャンセルルート / 否定→用件聴取に戻る"
    retry_failure: "skip"

  - step_name: "復唱_二次受診"
    tts_announcement: "二次受診でよろしいでしょうか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["肯定", "否定", "NO_RESULT"]
      mapping:
        - input: "「はい」/DTMF 1"
          output: "肯定"
        - input: "「いいえ」/DTMF 2"
          output: "否定"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "肯定→二次受診ルート / 否定→用件聴取に戻る"
    retry_failure: "skip"

  - step_name: "復唱_問い合わせ"
    tts_announcement: "その他お問い合わせでよろしいでしょうか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["肯定", "否定", "NO_RESULT"]
      mapping:
        - input: "「はい」/DTMF 1"
          output: "肯定"
        - input: "「いいえ」/DTMF 2"
          output: "否定"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "肯定→問い合わせルート / 否定→用件聴取に戻る"
    retry_failure: "skip"

  # === 用件復唱（包括エントリー: hearing_items "用件復唱" に対応）===
  # 個人5種 + 企業4種 = 9パターン。各TTS文言は復唱_予約/復唱_変更/復唱_キャンセル/復唱_二次受診/復唱_問い合わせ で個別定義。
  - step_name: "用件復唱"
    tts_announcement: "（用件ごとに異なる。各復唱_* TTSモジュールで個別定義）"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["肯定", "否定", "NO_RESULT"]
      mapping:
        - input: "「はい」「そうです」/DTMF 1"
