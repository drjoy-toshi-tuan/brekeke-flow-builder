# 設計書 -- 聖マリアヘルスケアセンター 健診
# 生成元: @director エージェント
# 生成日: 2026/04/08
# 確認レポート: docs/designs/確認レポート_聖マリアヘルスケアセンター_健診_20260408.md
# ゴールデンテンプレート参照: 予約管理型.yaml（用件多分岐+復唱）+ 健診受付型.yaml（smsFlag設計）
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "聖マリアヘルスケアセンター"
  group_name: "聖マリアヘルスケアセンター"
  flow_name: "聖マリアヘルスケアセンター$健診_20260408"
  target_facility: "聖マリアヘルスケアセンター 国際保健センター"
  office_id: "TODO_要確認"                     # NON-BLOCKER N-1
  phone_number: "0942-35-5522"                 # 代表電話番号（代表案内・リトライ超過時に案内）
  business_hours: "TODO_要確認"                # NON-BLOCKER N-2: acceptance_times配置あり
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"                          # NON-BLOCKER N-7

# --- セクション2: フロー構成 ---
# 個人/企業分岐 + 用件9ルート + 共通後段。メインフローが全分岐を管理。
# 個人情報サブフロー: 氏名・生年月日・電話番号はCLAUDE.md Rule 9準拠の標準サブフロー。
# 担当者名(patientName2)は標準サブフロー流用不可のため、メインフロー内でインライン聴取。
flow_structure:
  type: "subflow"
  flows:
    - name: "聖マリアヘルスケアセンター$健診_20260408"
      role: "main"
      description: >
        冒頭チェーン → 個人/企業確認 → 用件聴取(個人5択/企業4択) → 用件復唱確認
        → 用件別聴取ルート(9ルート) → 共通後段(氏名/生年月日/企業名/担当者名/電話番号)
        → 最後の質問(RAGサブフロー) → 終話(通常/二次受診/代表案内)
    - name: "聖マリアヘルスケアセンター$氏名聴取_20260408"
      role: "sub"
      description: "氏名聴取 → 結果返却"
    - name: "聖マリアヘルスケアセンター$生年月日聴取_20260408"
      role: "sub"
      description: "生年月日聴取(復唱あり) → DOB Re-confirmation → 結果返却"
    - name: "聖マリアヘルスケアセンター$電話番号聴取_20260408"
      role: "sub"
      description: "着信番号分岐 → 電話番号聴取/復唱確認 → 結果返却"
    - name: "聖マリアヘルスケアセンター$RAG検索_20260408"
      role: "sub"
      description: "RAG/FAQ検索サブフロー"
  subflows:
    - name: "聖マリアヘルスケアセンター$氏名聴取_20260408"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr を完全コピー。
        個人ルート: 受診者名(patientName)を聴取。
        企業_変更/企業_キャンセル: 受診者名(patientName)を聴取（担当者名とは別）。
        リトライ上限到達時は氏名未取得のまま次へスキップ。
    - name: "聖マリアヘルスケアセンター$生年月日聴取_20260408"
      target: "生年月日聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の「生年月日聴取（復唱あり）」を完全コピー。
        個人ルートのみ使用（企業ルートでは生年月日を聴取しない）。
    - name: "聖マリアヘルスケアセンター$電話番号聴取_20260408"
      target: "電話番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        CLAUDE.md Rule 9/10 準拠。個人情報サブフロー.bivr を完全コピー。
        termination=return: 終話パターンが用件（通常/二次受診/代表案内）で異なるため、
        メインフロー側で最後の質問→終話チェーンを制御する。
    - name: "聖マリアヘルスケアセンター$RAG検索_20260408"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        CLAUDE.md Rule 16 準拠。サブフローRAG.bivr を完全コピー。
        パターン3: 問い合わせルート内(パターン1) + 全終話前(パターン2) の両方で使用。

# --- セクション3: フローの目的 ---
purpose: >
  聖マリアヘルスケアセンター国際保健センターの健診予約受付AI電話。
  個人/企業の区分を確認した後、用件（個人: 予約/変更/キャンセル/二次受診/問い合わせ、
  企業: 予約/変更/キャンセル/問い合わせ）を聴取し、用件別に必要情報
  （受診希望コース・オプション・希望時期・予約日・変更内容・再検査内容・問い合わせ内容）を聴取する。
  受診者名・生年月日（個人のみ）・企業名・担当者名（企業のみ）・連絡先電話番号を収集し、
  折り返し受付を自動化する。代表電話番号は0942-35-5522。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "聖マリアヘルスケアセンター$健診_20260408"
    diagram: |
      === 冒頭チェーン ===
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
            └─ 通常/携帯/固定 → acceptance_times
                  ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                  └─ 受付可 → 冒頭_アナウンス(TTS)

      === 個人/企業確認 ===
      冒頭_アナウンス
        → 個人企業_確認(TTS)
        → 入力_個人企業_確認(AmiVoice STT)
        → OpenAI_個人企業_確認
            ├─ 個人 → saveContext_個人企業(company_check="個人") → 用件_個人(TTS)
            ├─ 企業 → saveContext_個人企業(company_check="企業") → 用件_企業(TTS)
            └─ NO_RESULT → リトライ_個人企業_確認

      === 用件聴取（個人 5択）===
      用件_個人(TTS)
        → 入力_用件_個人(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_用件_個人
            ├─ 予約 → 復唱_予約_個人(TTS+STT+OpenAI)
            │           ├─ 肯定 → saveContext_用件(classification="予約") → [個人_予約ルート]
            │           └─ 否定 → 用件_個人(TTS) に戻る
            ├─ 変更 → 復唱_変更_個人 → saveContext_用件("変更") → [個人_変更ルート]
            ├─ キャンセル → 復唱_キャンセル_個人 → saveContext_用件("キャンセル") → [個人_キャンセルルート]
            ├─ 二次受診 → 復唱_二次受診_個人 → saveContext_用件("二次受診") → [個人_二次受診ルート]
            ├─ 問い合わせ → 復唱_問い合わせ_個人 → saveContext_用件("問い合わせ") → [個人_問い合わせルート]
            └─ NO_RESULT → リトライ_用件_個人
                            └─ No more → saveContext_用件("問い合わせ") → [個人_問い合わせルート]

      === 用件聴取（企業 4択）===
      用件_企業(TTS)
        → 入力_用件_企業(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_用件_企業
            ├─ 予約 → 復唱_予約_企業 → saveContext_用件("予約") → [企業_予約ルート]
            ├─ 変更 → 復唱_変更_企業 → saveContext_用件("変更") → [企業_変更ルート]
            ├─ キャンセル → 復唱_キャンセル_企業 → saveContext_用件("キャンセル") → [企業_キャンセルルート]
            ├─ 問い合わせ → 復唱_問い合わせ_企業 → saveContext_用件("問い合わせ") → [企業_問い合わせルート]
            └─ NO_RESULT → リトライ_用件_企業
                            └─ No more → saveContext_用件("問い合わせ") → [企業_問い合わせルート]

      === 個人_予約ルート ===
      コース_聴取(TTS) → 入力_コース(AmiVoice STT) → OpenAI_コース → saveContext_コース(course)
        → オプション_聴取(TTS) → 入力_オプション(AmiVoice STT) → OpenAI_オプション → saveContext_オプション(option)
        → 希望時期_予約_個人(TTS) → 入力_希望時期(AmiVoice STT) → OpenAI_希望時期 → saveContext_希望時期(Preferred_date)
        → [個人共通後段]

      === 個人_変更ルート ===
      当日確認_個人(TTS) → 入力_当日確認(DTMF AmiVoice STT) → OpenAI_当日確認
        ├─ 肯定（当日/翌日） → [代表案内終話]
        ├─ 否定（それ以外） → 予約日_変更(TTS) → 入力_予約日(DTMF AmiVoice STT) → OpenAI_予約日
        │     → saveContext_予約日(reservationDate)
        │     → 予約日_復唱(TTS) → 入力_予約日_復唱(DTMF AmiVoice STT) → OpenAI_予約日_復唱
        │         ├─ 肯定 → 変更内容_聴取(TTS) → 入力_変更内容(AmiVoice STT) → OpenAI_変更内容
        │         │           → saveContext_変更内容(change_detail) → [個人共通後段]
        │         └─ 否定 → 予約日_変更(TTS) に戻る
        └─ NO_RESULT → リトライ_当日確認

      === 個人_キャンセルルート ===
      当日確認_個人(TTS) → 入力_当日確認 → OpenAI_当日確認
        ├─ 肯定 → [代表案内終話]
        ├─ 否定 → 予約日_キャンセル(TTS) → 入力_予約日 → OpenAI_予約日
        │     → saveContext_予約日 → 予約日_復唱 → ...
        │     → [個人共通後段]
        └─ NO_RESULT → リトライ_当日確認

      === 個人_二次受診ルート ===
      予約日_二次受診(TTS) → 入力_予約日 → OpenAI_予約日 → saveContext_予約日
        → 予約日_復唱 → ...肯定 →
        → 再検査内容_聴取(TTS) → 入力_再検査内容(AmiVoice STT) → OpenAI_再検査内容
        → saveContext_再検査内容(change_detail)
        → 希望時期_二次受診(TTS) → 入力_希望時期 → OpenAI_希望時期 → saveContext_希望時期(Preferred_date)
        → [個人共通後段]

      === 個人_問い合わせルート ===
      問い合わせ_聴取_個人(TTS) → 入力_問い合わせ(AmiVoice STT) → OpenAI_問い合わせ
        → saveContext_問い合わせ(reason)
        → ジャンプ_RAG検索(Custom Jump to Flow)  ★パターン1: 問い合わせルート内RAG
        → [個人共通後段（最後の質問なし → 直接終話）]

      === 個人共通後段 ===
      ジャンプ_氏名聴取(Custom Jump to Flow) → [氏名聴取サブフロー → return]
        → ジャンプ_生年月日聴取(Custom Jump to Flow) → [生年月日聴取サブフロー(復唱あり) → return]
        → 企業名_個人(TTS) → 入力_企業名(AmiVoice STT) → OpenAI_企業名 → saveContext_企業名(company_name)
        → ジャンプ_電話番号聴取(Custom Jump to Flow) → [電話番号聴取サブフロー → return]
        → [最後の質問分岐]

      === 企業_予約ルート ===
      コース_聴取_企業(TTS) → 入力_コース → OpenAI_コース → saveContext_コース(course)
        → 希望時期_予約_企業(TTS) → 入力_希望時期 → OpenAI_希望時期 → saveContext_希望時期(Preferred_date)
        → [企業共通後段]

      === 企業_変更ルート ===
      当日確認_企業(TTS) → 入力_当日確認 → OpenAI_当日確認
        ├─ 肯定 → [代表案内終話]
        └─ 否定 → 予約日_変更_企業(TTS) → ... → saveContext_予約日
            → ジャンプ_氏名聴取(Custom Jump to Flow) → [受診者名聴取 → return]
            → 変更内容_聴取_企業(TTS) → ... → saveContext_変更内容(change_detail)
            → [企業共通後段]

      === 企業_キャンセルルート ===
      当日確認_企業(TTS) → ... →
        ├─ 肯定 → [代表案内終話]
        └─ 否定 → 予約日_キャンセル_企業(TTS) → ... → saveContext_予約日
            → ジャンプ_氏名聴取(Custom Jump to Flow) → [受診者名聴取 → return]
            → [企業共通後段]

      === 企業_問い合わせルート ===
      問い合わせ_聴取_企業(TTS) → 入力_問い合わせ → OpenAI_問い合わせ → saveContext_問い合わせ(reason)
        → ジャンプ_RAG検索(Custom Jump to Flow)  ★パターン1
        → [企業共通後段（最後の質問なし → 直接終話）]

      === 企業共通後段 ===
      企業名_企業(TTS) → 入力_企業名 → OpenAI_企業名 → saveContext_企業名(company_name)
        → 担当者名_聴取(TTS) → 入力_担当者名(AmiVoice STT) → OpenAI_担当者名 → saveContext_担当者名(patientName2)
        → ジャンプ_電話番号聴取(Custom Jump to Flow) → [電話番号聴取サブフロー → return]
        → [最後の質問分岐]

      === 最後の質問分岐 ===
      ★ classification が「問い合わせ」の場合 → 最後の質問をスキップ → [終話分岐]
      ★ それ以外 →
        ジャンプ_RAG検索_終話前(Custom Jump to Flow)  ★パターン2: 全終話前RAG
        → [終話分岐]

      === 終話分岐 ===
      ★ classification が「二次受診」の場合:
        完了フラグ_二次受診(saveCompletionFlag2db, status=1, smsFlag=1)
        → END_終話_二次受診(TTS) → 切断

      ★ それ以外（予約/変更/キャンセル/問い合わせ）:
        完了フラグ_通常(saveCompletionFlag2db, status=1, smsFlag=1)
        → END_終話_通常(TTS) → 切断

      === 代表案内終話 ===
      完了フラグ_代表案内(saveCompletionFlag2db, status=2, smsFlag=-1)
        → END_代表案内(TTS) → 切断

      === リトライ超過終話 ===
      完了フラグ_リトライ超過(saveCompletionFlag2db, status=2, smsFlag=-1)
        → END_リトライ超過(TTS) → 切断

    notes: >
      冒頭チェーン順序: wait → saveContextModel2DB → incoming-classifier → acceptance_times。
      個人/企業で9ルート分岐。各ルートの共通後段で個人情報聴取サブフローに遷移。
      用件リトライ超過時は問い合わせルートにフォールスルー（Gen2仕様維持）。
      当日確認の肯定/否定で変更/キャンセルルートが分岐。
      最後の質問は問い合わせルートではスキップ。
      終話は二次受診とそれ以外で文言が異なる。

  - flow_name: "聖マリアヘルスケアセンター$氏名聴取_20260408"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9）★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」フローを完全コピーする。
