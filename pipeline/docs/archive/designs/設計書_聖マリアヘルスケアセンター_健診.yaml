    next_step: "肯定→用件別ルート / 否定→用件聴取に戻る"
    retry_failure: "skip"
    notes: >
      9パターン（個人5 + 企業4）。個人/企業で同一用件は同じTTS文言のため共有可能。
      各用件のTTS文言とOpenAIルールは復唱_予約/復唱_変更/復唱_キャンセル/復唱_二次受診/復唱_問い合わせ の各エントリを参照。

