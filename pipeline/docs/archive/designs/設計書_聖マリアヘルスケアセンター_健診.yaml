      termination=return: メインフローに結果を返却し、メインフロー側で最後の質問→終話チェーンを実行。
    notes: "CLAUDE.md Rule 9/10 準拠。termination=return。"

  - flow_name: "聖マリアヘルスケアセンター$RAG検索_20260408"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 16）★★★
      docs/reference/bivr/samples/サブフローRAG.bivr を完全コピーする。
      フロー名プレフィックスのみ「聖マリアヘルスケアセンター$」に置換。構造・接続・スクリプトは一切変更不可。

      2箇所で使用:
      - パターン1（問い合わせルート内）: 初回TTS「お問い合わせ内容をご自由におっしゃってください。」
      - パターン2（全終話前）: 初回TTS「何かご質問はございますか？」
    notes: "CLAUDE.md Rule 16 準拠。パターン3（複合）。"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
# Gen2 function properties から変換。
# smsFlag / endpoint は saveContextModel2DB に含めない（saveCompletionFlag2db のパラメータ）。
# Gen2 status "0" は Gen3 で使用禁止（CLAUDE.md Rule 12b）。
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "予約"
      - order: "2"
        value: "変更"
      - order: "3"
        value: "キャンセル"
      - order: "4"
        value: "二次受診"
      - order: "5"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: true
    notes: "用件聴取で設定。リトライ超過時は「問い合わせ」にフォールスルー"

  - context_name: "company_check"
    context_name_jp: "個人/企業"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "「個人」または「企業」。冒頭の個人企業確認で設定"

  - context_name: "patientName"
    context_name_jp: "受診者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "氏名聴取サブフローで聴取。個人全ルート+企業_変更/キャンセルで使用"

  - context_name: "patientName2"
    context_name_jp: "担当者名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業ルートのみ。メインフロー内インラインで聴取（サブフロー不使用）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
