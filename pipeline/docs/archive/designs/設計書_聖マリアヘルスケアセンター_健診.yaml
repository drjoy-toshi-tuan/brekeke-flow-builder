# --- セクション11: 特記事項・制約 ---
special_notes:
  - >
    個人/企業分岐 + 用件9ルートの大規模フロー。Gen2の単一OpenAIプロンプトが管理していた
    全分岐ロジックをBrekekeモジュールに分解するため、メインフローのモジュール数が非常に多くなる（推定200+モジュール）。
  - >
    担当者名(patientName2)はメインフロー内インライン聴取。標準氏名聴取サブフローは
    patientNameに固定保存のため流用不可（CLAUDE.md Rule 9: 構造変更禁止）。
  - >
    用件復唱は個人5種+企業4種=9パターンだが、個人と企業で同一用件は同じTTS文言のため
    共有可能（予約/変更/キャンセル/問い合わせの4つのTTSモジュールを共有し、二次受診は個人のみ）。
    generatorが最適化を判断。
  - >
    用件リトライ超過時のフォールスルー: Gen2仕様を維持し、問い合わせルートに遷移する。
    Retry Counter の No more → 問い合わせルートの最初のステップに接続。
  - >
    予約日の復唱: Gen2で明示されており、Re-confirmationモジュールではなくTTS+STT+OpenAI
    （はい/いいえ分岐）で実装する。生年月日の復唱は標準サブフロー内のDOB Re-confirmationで対応。
  - >
    受診希望コース: Gen2に詳細なコースリスト（18種）とキーワード定義があるが、Gen3では
    フリーテキスト保存（発話内容をそのまま格納）。コース正規化はOpenAIプロンプトで対応する可能性あり
    （prompterが判断）。
  - >
    追加オプション: Gen2に詳細なオプションリスト（18種）とキーワード定義があるが、Gen3では
    フリーテキスト保存。複数項目の読点区切りはOpenAIプロンプトで指示。
  - >
    電話番号リトライ3回: Gen2仕様を維持（Gen3標準は2回）。NON-BLOCKER N-6で確認推奨。
  - >
    Gen2のstatus="0"はGen3で使用禁止（CLAUDE.md Rule 12b）。途中切断はシステムデフォルト扱い。
  - >
    最後の質問の分岐: classification="問い合わせ" の場合はRAGサブフロー（パターン2）をスキップし
    直接終話に進む。それ以外はRAGサブフローを経由してから終話。
  - >
    終話の分岐: classification="二次受診" の場合は END_終話_二次受診（文言が異なる）、
    それ以外は END_終話_通常。ContextMatchRouter または Script で分岐。
  - >
    Gen2プロンプト内の「03-0000-0000」はプレースホルダー。実際の代表電話番号は0942-35-5522。
  - "生年月日・診察券番号はこのフローでは生年月日のみ聴取（個人ルート）。診察券番号は聴取しない"
  - >
    フロー図で _個人/_企業 サフィックスが付いているモジュール名（当日確認_個人/当日確認_企業、
    コース_聴取/コース_聴取_企業、問い合わせ_聴取_個人/問い合わせ_聴取_企業、
    変更内容_聴取/変更内容_聴取_企業、予約日_変更/予約日_変更_企業/予約日_キャンセル/予約日_キャンセル_企業、
    企業名_個人/企業名_企業）について、TTS文言が同一のモジュールはgeneratorが1つの共有モジュールとして
    生成してよい。tts_modules の定義名（サフィックスなし）が共有モジュール名となる。
    予約日_変更 は変更/キャンセル共用のTTSモジュールとして使用する（文言が同一のため）。
  - >
    企業_変更/企業_キャンセルでは受診者名(patientName)も聴取する（氏名聴取サブフロー使用）。
    企業_予約/企業_問い合わせでは受診者名は聴取しない。

