# --- セクション8: 終話パターン ---
termination_patterns:
  # 正常終話（通常）
  - name: "END_終話_通常"
    condition: "全聴取完了 かつ classification が 予約/変更/キャンセル/問い合わせ のいずれか"
    tts_announcement: "かしこまりました。健康診断のお申し込みを受付いたしました。3営業日以内の、担当者からの折り返し電話、もしくは、SMSにて確定となります。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_通常"

  # 正常終話（二次受診）
  - name: "END_終話_二次受診"
    condition: "全聴取完了 かつ classification=二次受診"
    tts_announcement: "二次受診の申し込みを受付いたしました。3営業日以内の、担当者からの折り返し電話、もしくは、SMSにて確定となります。また、受診日程についても折り返し時にご相談の上確定となります。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_二次受診"

  # 代表案内（当日/翌日予約）
  - name: "END_代表案内"
    condition: "当日確認で「肯定」（本日/翌営業日の予約）"
    tts_announcement: "申し訳ございません。本日と翌営業日のご予約に関しては、こちらのAI電話ではお受けできません。恐れ入りますが、代表電話までおかけなおしください。番号は、0942-35-5522です。繰り返します。番号は、0942-35-5522です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内"

  # リトライ超過（代表案内）
  - name: "END_リトライ超過"
    condition: "一般リトライ超過（電話番号聴取含む）"
    tts_announcement: "ご質問いただいた内容はAI電話ではご対応できませんので、代表電話の0942-35-5522におかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_リトライ超過"

  # 時間外
  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  # 非通知
  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

# smsFlag分岐設計
# 本フローでは用件別/施設別のsmsFlag分岐は不要（単一施設、全正常終話でsmsFlag=1）。
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"                                   # Gen2→Gen3移管のデフォルト
  inquiry_insertion_point: "問い合わせ内容聴取後"   # パターン1: 問い合わせルート内RAG
  pre_termination: true                           # パターン2: 全終話前にRAGサブフロー配置

