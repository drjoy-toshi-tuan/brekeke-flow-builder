      構成: AmiVoice STT → OpenAI正規化 → saveContext → script_結果返却（5モジュール）
      リトライ上限到達時は氏名未取得のままスキップ。script_結果返却_氏名で$runner.setResult()実行。
    notes: "CLAUDE.md Rule 9/11 準拠。個人情報サブフロー.bivr を完全コピー。"

  - flow_name: "聖マリアヘルスケアセンター$生年月日聴取_20260408"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9）★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「生年月日聴取（復唱あり）」フローを完全コピーする。
      フロー名プレフィックスのみ「聖マリアヘルスケアセンター$」に置換。構造・接続・スクリプトは一切変更不可。

      構成: DTMF AmiVoice STT → OpenAI正規化 → DOB Re-confirmation → saveContext
      復唱あり: Gen2プロンプト「生年月日聴取後に復唱をしてください」に基づく。
    notes: "CLAUDE.md Rule 9 準拠。復唱あり版を使用。"

  - flow_name: "聖マリアヘルスケアセンター$電話番号聴取_20260408"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9/10）★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「電話番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「聖マリアヘルスケアセンター$」に置換。構造・接続・スクリプトは一切変更不可。

