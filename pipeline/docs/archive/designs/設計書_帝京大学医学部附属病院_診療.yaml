    status: "1"
    sms_flag: "4"
    completion_flag_name: "完了フラグ_聴取失敗_業務"

# smsFlag分岐は classification × phonetype の 2段 ContextMatchRouter で実現するため
# sms_flag_routing の機械的分岐は使用しない（enabled: false）。
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

# =====================================================
# セクション8b: RAG/FAQ検索サブフロー
# =====================================================
# Gen2 元資料に RAG/FAQ サブフローの記載なし。FAQ 対応は OpenAI プロンプト内の
# 「回答後は直前の質問へ戻る」ロジックで処理されており、独立サブフロー化は行わない。
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

