# 設計書 — 帝京大学医学部附属病院 診療
# 生成元: @director エージェント
# 生成日: 2026-04-21
# 確認レポート: docs/designs/確認レポート_帝京大学医学部附属病院_診療_20260421.md
# 作業種別: Gen2→Gen3 移管（Pattern B）
version: "1.0"

# =====================================================
# セクション1: 基本情報
# =====================================================
basic_info:
  facility_name: "帝京大学医学部附属病院"
  group_name: "帝京大学医学部附属病院"
  flow_name: "帝京大学医学部附属病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "0339641211"
  business_hours: "TODO_要確認（Dr.JOY側で設定）— 元資料記載: 日曜・祝日を除く月曜〜金曜 8:30〜16:00、土曜 8:30〜12:30（代表案内の窓口時間）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# =====================================================
# セクション2: フロー構成
# =====================================================
flow_structure:
  type: "subflow"
  flows:
    - name: "帝京大学医学部附属病院$診療"
      role: "main"
      description: "予約変更・予約キャンセル・予約確認の診療予約受付フロー。当日ゲートと phone_type による終話 8 分岐を含む。"
  subflows:
    - name: "帝京大学医学部附属病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。patientName を返却。"
    - name: "帝京大学医学部附属病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（復唱あり）。patientDateOfBirth を返却。"
    - name: "帝京大学医学部附属病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（incoming-classifier＋復唱あり）。additionalPhoneNumber と phonetype（1=携帯 / 2=その他）を返却。"
    - name: "帝京大学医学部附属病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。medicalCardNumber を返却。用件別の前置き（「予約変更ですね」等）は親フロー側の announcement ブロックで処理。"

# =====================================================
# セクション3: フローの目的
# =====================================================
purpose: >
  帝京大学医学部附属病院の外来予約に関する電話を受け、
  当日予約の代表案内への振り分け、予約変更・予約キャンセル・予約確認の用件分類、
  診察券番号・診療科・予約日・患者情報の聴取を自動化する。
  終話アナウンスは用件 × 電話番号種別（携帯/ip050/固定/非通知）で 6 パターンに分岐する。

# =====================================================
# セクション4: シナリオフロー図
# =====================================================
flow_diagrams:
  - flow_name: "帝京大学医学部附属病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常 → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭挨拶(TTS)
                                        → 当日確認ゲート (enum: 代表案内/否定)
                                           ├─ 代表案内 → END_代表案内
                                           ├─ 否定 → 用件聴取 (enum: 変更/キャンセル/確認/用件聴取失敗)
                                           │         ├─ 変更 → 予約変更_前置き → jump_診察券番号
                                           │         │         → 予約変更_診療科 (enum, 救急科→END_聴取失敗_業務)
                                           │         │         → 予約変更_予約日 (datetime)
                                           │         │         → 予約変更_希望日 (text)
                                           │         │         → 共通_氏名→生年月日→電話番号→追加質問
                                           │         │         → 終話分岐_用件 → 終話分岐_電話種別 → END_予約変更_携帯/固定
                                           │         ├─ キャンセル → 予約キャンセル_前置き → jump_診察券番号
                                           │         │         → 予約キャンセル_診療科 (enum, 救急科→END_聴取失敗_業務)
                                           │         │         → 予約キャンセル_予約日 (datetime)
                                           │         │         → 予約キャンセル_理由 (text)
                                           │         │         → 共通→終話分岐 → END_予約キャンセル_携帯/固定
                                           │         ├─ 確認 → 予約確認_前置き → jump_診察券番号
                                           │         │         → 予約確認_診療科 (enum)
                                           │         │         → 予約確認_内容 (text)
                                           │         │         → 共通→終話分岐 → END_予約確認_携帯/固定
                                           │         └─ 用件聴取失敗 (retry 超過) → 聴取失敗_強制遷移_TTS
                                           │                 → 聴取失敗_診療科 (enum)
                                           │                 → 聴取失敗_問合せ内容 (text)
                                           │                 → 共通→終話分岐 → END_聴取失敗_業務
                                           └─ 再質問上限到達 → END_回答不可切断
    notes: "共通ヒアリングブロック（氏名→生年月日→電話番号→追加質問）は全 4 ルートで共有。終話は classification × phonetype で 2 段の ContextMatchRouter で分岐。"

# =====================================================
# セクション4b: シナリオフロー定義（ブロック構成）
# =====================================================
scenario_flow:
  # ---------- 冒頭 ----------
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭挨拶

  - step: 冒頭挨拶
    type: announcement
    next: 当日確認ゲート

  # ---------- 当日確認ゲート ----------
  - step: 当日確認ゲート
    type: hearing
    output_format: enum
    retry_failure: end_failure
    retry_failure_announcement: "ご回答の確認ができませんでした。お電話ありがとうございました。それでは失礼いたします。"
    conditions:
      - match: "代表案内"
        next: END_代表案内
      - match: "否定"
        next: 用件聴取
      - match: "default"
        next: END_回答不可切断

  # ---------- 用件聴取 ----------
  - step: 用件聴取
    type: hearing
    output_format: enum
    retry_failure: skip
    retry_failure_announcement: "かしこまりました。それでは担当者から詳細を確認いたしますので、いくつか質問させていただきます。"
    conditions:
      - match: "変更"
        next: 予約変更_前置き
      - match: "キャンセル"
        next: 予約キャンセル_前置き
      - match: "確認"
        next: 予約確認_前置き
      - match: "新規"
        next: END_代表案内
      - match: "default"
        next: 聴取失敗_診療科

  # =====================================================
  # 予約変更ルート
  # =====================================================
  - step: 予約変更_前置き
    type: announcement
    next: jump_予約変更_診察券番号

  - step: jump_予約変更_診察券番号
    type: subflow
    flowname: "帝京大学医学部附属病院$診察券番号聴取"
    next: 予約変更_診療科

  - step: 予約変更_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "救急科"
        next: END_聴取失敗_業務
      - match: "default"
        next: 予約変更_予約日

  - step: 予約変更_予約日
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 予約変更_希望日

  - step: 予約変更_希望日
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_共通_氏名

  # =====================================================
  # 予約キャンセルルート
  # =====================================================
  - step: 予約キャンセル_前置き
    type: announcement
    next: jump_予約キャンセル_診察券番号

  - step: jump_予約キャンセル_診察券番号
    type: subflow
    flowname: "帝京大学医学部附属病院$診察券番号聴取"
    next: 予約キャンセル_診療科

  - step: 予約キャンセル_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "救急科"
        next: END_聴取失敗_業務
      - match: "default"
        next: 予約キャンセル_予約日

  - step: 予約キャンセル_予約日
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 予約キャンセル_理由

  - step: 予約キャンセル_理由
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_共通_氏名

  # =====================================================
  # 予約確認ルート
  # =====================================================
  - step: 予約確認_前置き
    type: announcement
    next: jump_予約確認_診察券番号

  - step: jump_予約確認_診察券番号
    type: subflow
    flowname: "帝京大学医学部附属病院$診察券番号聴取"
    next: 予約確認_診療科

  - step: 予約確認_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 予約確認_内容

  - step: 予約確認_内容
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_共通_氏名

  # =====================================================
  # 聴取失敗ルート（業務失敗: 用件三択以外 or 救急科）
  # =====================================================
  - step: 聴取失敗_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 聴取失敗_問合せ内容

  - step: 聴取失敗_問合せ内容
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_共通_氏名

  # =====================================================
  # 共通ヒアリング
  # =====================================================
  - step: jump_共通_氏名
    type: subflow
    flowname: "帝京大学医学部附属病院$氏名聴取"
    next: jump_共通_生年月日

  - step: jump_共通_生年月日
    type: subflow
    flowname: "帝京大学医学部附属病院$生年月日聴取"
    next: jump_共通_電話番号

  - step: jump_共通_電話番号
    type: subflow
    flowname: "帝京大学医学部附属病院$電話番号聴取"
    next: 共通_追加質問

  - step: 共通_追加質問
    type: hearing
    output_format: text
    retry_failure: skip
    next: 終話分岐_用件

  # =====================================================
  # 終話分岐（Pattern B: classification × phonetype）
  # =====================================================
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: 終話分岐_変更_電話種別
      - match: "キャンセル"
        next: 終話分岐_キャンセル_電話種別
      - match: "確認"
        next: 終話分岐_確認_電話種別
      - match: "default"
        next: END_聴取失敗_業務

  - step: 終話分岐_変更_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: END_予約変更_携帯
      - match: "default"
        next: END_予約変更_固定

  - step: 終話分岐_キャンセル_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: END_予約キャンセル_携帯
      - match: "default"
        next: END_予約キャンセル_固定

  - step: 終話分岐_確認_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: END_予約確認_携帯
      - match: "default"
        next: END_予約確認_固定

  # =====================================================
  # 終話ブロック
  # =====================================================
  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

  - step: END_回答不可切断
    type: termination
    termination_ref: "END_回答不可切断"

  - step: END_予約変更_携帯
    type: termination
    termination_ref: "END_予約変更_携帯"

  - step: END_予約変更_固定
    type: termination
    termination_ref: "END_予約変更_固定"

  - step: END_予約キャンセル_携帯
    type: termination
    termination_ref: "END_予約キャンセル_携帯"

  - step: END_予約キャンセル_固定
    type: termination
    termination_ref: "END_予約キャンセル_固定"

  - step: END_予約確認_携帯
    type: termination
    termination_ref: "END_予約確認_携帯"

  - step: END_予約確認_固定
    type: termination
    termination_ref: "END_予約確認_固定"

  - step: END_聴取失敗_業務
    type: termination
    termination_ref: "END_聴取失敗_業務"

# =====================================================
# セクション5: コンテキストフィールド一覧
# =====================================================
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "変更"
      - id: "2"
        order: "2"
        value: "キャンセル"
      - id: "3"
        order: "3"
        value: "確認"
      - id: "4"
        order: "4"
        value: "用件聴取失敗"
      - id: "5"
        order: "5"
        value: "再診"
    item_default: true
    editable: true
    deletable: true
    notes: "Gen2 function.classification enum をそのまま転記（再診は旧仕様残滓だが function に残っているため含める）。"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "カタカナ変換・復唱禁止（customer_doc 1-11）。"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "着信番号自動格納（incoming_phone_number）。"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "連絡先電話番号（incoming とは独立判定）。"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values:
      - { order: "1",  value: "内科" }
      - { order: "2",  value: "整形外科" }
      - { order: "3",  value: "産婦人科" }
      - { order: "4",  value: "小児科" }
      - { order: "5",  value: "眼科" }
      - { order: "6",  value: "耳鼻咽喉科" }
      - { order: "7",  value: "皮膚科" }
      - { order: "8",  value: "泌尿器科" }
      - { order: "9",  value: "メンタルヘルス科／デイケア" }
      - { order: "10", value: "放射線科" }
      - { order: "11", value: "脳神経外科" }
      - { order: "12", value: "ペインクリニック科" }
      - { order: "13", value: "歯科口腔外科" }
      - { order: "14", value: "リハビリテーション科" }
      - { order: "15", value: "救急科" }
      - { order: "16", value: "形成外科" }
      - { order: "17", value: "脳神経内科" }
      - { order: "18", value: "心臓血管外科" }
      - { order: "19", value: "外科" }
      - { order: "20", value: "小児外科" }
      - { order: "21", value: "リハビリ訓練" }
      - { order: "22", value: "心臓リハビリ" }
      - { order: "23", value: "登録なし" }
    item_default: true
    editable: true
    deletable: true
    notes: "customer_doc【4.診療科リスト】全22件。no_result 時は『登録なし』を格納。"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更/キャンセル で聴取。YYYY-MM-DD 00:00:00 形式。"

  - context_name: "DesiredreservationDate"
    context_name_jp: "予約希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約変更ルートで聴取。フリーワード（例: 4月下旬）のまま格納。"

  - context_name: "reason"
    context_name_jp: "キャンセル理由"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約キャンセルルートで聴取。"

  - context_name: "details"
    context_name_jp: "内容確認"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約確認・聴取失敗ルートで聴取。"

  - context_name: "question"
    context_name_jp: "追加の質問"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "追加質問で聴取。"

  - context_name: "phonetype"
    context_name_jp: "電話種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "電話番号聴取サブフローが 1=携帯(mobile/ip050) / 2=その他(landline/withheld) を設定。終話分岐で使用。"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - { id: "1", order: "1", value: "未処理" }
      - { id: "2", order: "2", value: "代表案内" }
      - { id: "3", order: "3", value: "聴取失敗" }
      - { id: "6", order: "6", value: "時間外" }
    item_default: true
    editable: true
    deletable: true
    notes: "Gen2→Gen3: status=0 は使用禁止。回答不可切断(旧 status=0)は status=2 へ置換。"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
