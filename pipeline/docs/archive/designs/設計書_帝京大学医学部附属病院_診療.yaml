step_details:
  - step_name: "当日確認ゲート"
    tts_announcement: "本日がご予約日となっているご予約についてのお問い合わせでしょうか。「はい、そうです。」または、「いいえ、違います」でお話しください。それではどうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["代表案内", "否定"]
      mapping:
        - { input: "はい / そうです / うん / お願いします / いいです / 肺 / φ", output: "代表案内" }
        - { input: "初めて / 初診 / 初心 / しょしん / 新しい / 新規 / しんき", output: "代表案内" }
        - { input: "いいえ / 違う / 今日じゃない / 本日ではない / 昨日 / 明日以降 / 後日 / CEA / DIP / CHI / pH / DA / De / NA", output: "否定" }
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "classification"
    next_step: "代表案内→END_代表案内 / 否定→用件聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: "ご回答の確認ができませんでした。お電話ありがとうございました。それでは失礼いたします。"

