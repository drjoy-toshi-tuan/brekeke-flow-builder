# =====================================================
# セクション8: 終話パターン
# =====================================================
termination_patterns:
  # --- 異常系（デフォルト必須） ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（システム的聴取失敗）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 施設固有 ---
  - name: "END_代表案内"
    condition: "当日予約 or 新規・初診キーワード検出"
    tts_announcement: "申し訳ございません。当日に関することはAI電話ではお受けできません。日曜、祝日を除く、月曜から金曜の、8時30分から16時、土曜の、8時30分から12時30分に次の番号へおかけ直しください。電話番号は、0339641211です。電話番号は、0339641211です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内"

  - name: "END_回答不可切断"
    condition: "当日確認ゲートで2回連続判定不能"
    tts_announcement: "ご回答の確認ができませんでした。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_回答不可切断"

  - name: "END_予約変更_携帯"
    condition: "classification=変更 AND phonetype=1 (携帯/ip050)"
    tts_announcement: "予約変更のご希望を承りましたが、こちらのお電話では受付のみとなり、まだ確定ではございません。また、この後送信するショートメールから、お申込み内容のご確認とご修正をお願いいたします。3診療日以内に担当者からショートメッセージもしくは折り返し電話、にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約変更_携帯"

  - name: "END_予約変更_固定"
    condition: "classification=変更 AND phonetype=2 (固定/非通知)"
    tts_announcement: "予約変更のご希望を承りましたが、こちらのお電話では受付のみとなり、まだ確定ではございません。3診療日以内に担当者から折り返し電話、にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
