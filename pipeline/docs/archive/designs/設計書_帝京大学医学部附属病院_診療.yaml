    completion_flag_name: "完了フラグ_予約キャンセル_携帯"

  - name: "END_予約キャンセル_固定"
    condition: "classification=キャンセル AND phonetype=2 (固定/非通知)"
    tts_announcement: "再度予約をご希望の場合は、AI電話の予約変更窓口におかけ直しください。キャンセルの申し込みを受付いたしました。確認事項がある場合のみ、3診療日以内に担当者から折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
