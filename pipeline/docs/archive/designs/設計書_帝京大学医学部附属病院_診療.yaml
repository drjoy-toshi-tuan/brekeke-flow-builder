# セクション11: 特記事項・制約
# =====================================================
special_notes:
  - "【基準日時】{TODAY} = 2026-04-21 — 予約日が {TODAY} と完全一致する場合（変更・キャンセルのみ）は END_代表案内 へ強制遷移（status=2, smsFlag=-1）。"
  - "【当日確認ゲート】冒頭挨拶直後の最優先ゲート。「はい/肺/初めて/初診/しょしん/新規/新しい」等→代表案内、「いいえ/違う/後日/pH/DA/DeNA」等→否定→用件聴取。2回連続判定不能→END_回答不可切断。肯定発話中に新規/初診キーワードが含まれる場合も代表案内へ（新規扱い）。"
  - "【新規/初診の強制遷移】診察券番号聴取中・用件聴取中のいずれに現れても即座に END_代表案内 へ（status=2, smsFlag=-1, retryCount対象外）。"
  - "【救急科の強制合流】変更・キャンセルルートで救急科が選択された場合は END_聴取失敗_業務 へ強制遷移（smsFlag=4）。確認ルートは救急科でも通常進行。"
  - "【用件聴取3回ルール】「変更/キャンセル/確認」三択以外が2リトライまで続いた場合、3回目を待たずに『かしこまりました。それでは担当者から詳細を確認いたしますので、いくつか質問させていただきます。』で classification=用件聴取失敗 として強制遷移→聴取失敗_診療科 から順に聴取。"
  - "【歯科口腔外科の誤認識補正】診療科質問の直後に限り「2日/5日/二日/五日」等→歯科口腔外科に確定（月・曜日・相対日付を含む場合は除外）。診療科名を音声で復唱しない。"
  - "【救済変換】「肺/φ」→はい、「pH/DA/DeNA」→いいえ、「予約塩昆布/エンコード」→予約変更、「406人/よやくひゃくにん/よんひゃくろくにん」→予約確認、「要約/規約/良薬/意訳/唯一」→変更（OpenAIプロンプトに救済マッピング必須）。"
  - "【phone_type判定】電話番号聴取サブフローが正規表現で mobile(^0[6789]0\\d{8}$) / ip050(^050\\d{8}$) / landline(^0(?!50|60|70|80|90)\\d{9,10}$) / withheld(空欄) を判定。mobile/ip050→phonetype=1（携帯用終話）、landline/withheld→phonetype=2（固定用終話）。"
  - "【連絡先電話番号の確認フロー】incoming_phone_numberを「今おかけいただいている番号でよろしいですか」で確認→「はい」→確定／「いいえ」→新規番号聴取→「{}でよろしいですか」で再確認（1回限定）→phone_type再判定。incomingのphone_typeを流用しない（サブフロー標準ロジック）。"
  - "【期間表現】「3診療日以内」（他施設の「3営業日」と異なる。終話文言で原文厳守）。"
  - "【Gen2→Gen3: status 置換】Gen2のstatus=0（冒頭/途中切断）は Gen3 では使用禁止のため、END_回答不可切断 は status=2 へ置換。"
  - "【Gen2→Gen3: smsFlag】Gen2のsmsFlag=0（SMS送信なし）は Gen3 では -1 に置換。END_代表案内・END_回答不可切断・非通知・時間外・聴取失敗異常系は sms_flag=-1。"
  - "【固定発話厳守】用件聴取・追加質問・終話アナウンス等は顧客資料（customer_doc 6章）の文言と厳密一致で gen_properties に渡すこと。"
  - "【FAQ対応】OpenAIプロンプト内で『回答後は直前の質問へ戻る』ロジックを維持。RAGサブフロー化は行わない（Gen2 元資料指示通り）。"
  - "【診察券番号の前置き】3ルート（変更/キャンセル/確認）でそれぞれ固有の前置きTTSを配置。サブフロー本体は同一（診察券番号聴取サブフロー）。"
  - "【prompter 注意】generate_by_OpenAI プロンプトには『終話アナウンスの出力前は絶対にstatus/smsFlagに確定値を書き込まない』制約を必ず含める（customer_doc 34-51行, 607-611行）。"

