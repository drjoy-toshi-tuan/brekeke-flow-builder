# 設計書: 松本協立病院 — 診療
# 作業種別: Gen1→Gen3 移管
# 元資料: commubo抽出/【041】松本協立病院/【0037松本協立病院】診療1_M_本番/
# 移管日: 2026-04-27
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "松本協立病院"
  scenario_name: "診療"
  group_name: "松本協立病院"
  flow_name: "松本協立病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "0263-35-5288"        # 予約センター代表電話（聴取失敗時の代表案内・転送失敗時の番号復唱で使用）
  business_hours: "祝日を除く、月曜〜金曜 9:00〜16:30。12/29 は 9:00〜12:00 のみ。年末年始（12/30〜1/4）は休業。"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "松本協立病院$診療"
      role: "main"
      description: "再診予約・新規予約・予約変更・予約キャンセル・予約確認の5用件を受け付けるメインフロー"
  subflows:
    - name: "松本協立病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー（患者氏名1名のみ）"
    - name: "松本協立病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 含む。和暦/西暦両対応。DTMF 8桁入力も対応"
    - name: "松本協立病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "「わからない」発話の分岐あり（診察券なしでも進める）。最大15桁"
    - name: "松本協立病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "携帯/固定判別あり（phonetype コンテキストに保存）。着信番号自動格納のフォールバックあり"

# --- セクション3: フローの目的 ---
purpose: |
  松本協立病院・予約センターの外来予約を自動化する AI 電話応答フロー。
  患者からの電話を受け、用件（再診予約・新規予約・予約変更・予約キャンセル・予約確認）を
  分類した上で、診療科・予約日・希望日・氏名・生年月日・診察券番号・連絡先電話番号を
  聴取して Dr.JOY に格納する。診療科や用件の組み合わせに応じて、各専門窓口
  （予約センター・小児科・歯科センター・透析センター・健診センター・4階リハビリ・2階リハビリ）
  への有人転送を行う。当日予約・紹介状必須診療科・精神科初診等の特殊ルートは
  本フロー内で適切に振り分け、聴取失敗時は予約センター電話番号を 3 回復唱して切断する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "松本協立病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外
                          └─ 受付可 → 冒頭_アナウンス
                                        → 用件確認(hearing, enum + echo_back)
                                          ├─ 再診     → 当日予約確認
                                          ├─ 新規予約 → 当日予約確認
                                          ├─ 予約変更 → 検査か診察か
                                          ├─ 予約キャンセル → 検査か診察か
                                          └─ 予約確認 → 確認内容聴取

      当日予約確認(hearing, enum yes/no)
        ├─ 当日       → 当日_診療科聴取(hearing, enum)
        │                ├─ 発熱外来 → END_発熱外来案内
        │                ├─ 整形外科 → 後日予約希望(hearing, yes/no)
        │                ├─ 内科     → END_内科直接来院
        │                ├─ 小児科   → 小児科対象確認
        │                ├─ 肛門外科 → END_予約センター転送
        │                ├─ 精神科   → END_精神科初診不可
        │                ├─ リハビリ → 小児科リハビリ確認
        │                ├─ 健診     → END_健診センター転送
        │                ├─ 歯科     → END_歯科センター転送
        │                ├─ 透析     → END_透析センター転送
        │                └─ 対象外/default → END_予約センター転送
        └─ 明日以降   → 用件分岐_明日以降(CMR: classification)
                          ├─ 再診     → 通常_診療科聴取
                          └─ 新規予約 → 紹介状有無

      紹介状有無(hearing, enum yes/no) → 通常_診療科聴取

      通常_診療科聴取(hearing, enum, no_result→"登録なし")
        ├─ 健診/人間ドック → END_健診センター転送
        ├─ 入院             → END_予約センター転送_入院
        ├─ 歯科             → END_歯科センター転送
        ├─ 透析             → END_透析センター転送
        ├─ リハビリ         → 小児科リハビリ確認
        ├─ 対象外           → END_予約センター転送_対象外
        ├─ 心臓血管外科     → 受診希望確認_心臓血管外科
        ├─ 循環器内科       → 医師確認_循環器内科
        ├─ 紹介状必須診療科 → 紹介状必須_分岐(CMR: 紹介状有無)
        ├─ 精神科           → 精神科_分岐(CMR: classification)
        └─ default          → 医師名聴取

      検査か診察か(hearing, enum)
        ├─ 検査   → 検査名聴取(text) → 予約日聴取
        └─ 診察   → 通常_診療科聴取

      予約日聴取(datetime) → 用件分岐_予約日後(CMR: classification)
        ├─ 予約変更       → 希望日聴取(text)
        └─ 予約キャンセル → キャンセル理由(text) → 再予約希望

      再予約希望(yes/no)
        ├─ 希望     → 希望日聴取(text)
        └─ 希望しない → jump_氏名聴取

      希望日聴取(text) → jump_氏名聴取

      確認内容聴取(text) → jump_氏名聴取

      [個人情報サブフロー連鎖]
      jump_氏名聴取 → jump_生年月日聴取 → jump_診察券番号聴取 → jump_電話番号聴取
        → 終話分岐_電話種別(CMR: phonetype)
            ├─ 携帯       → 終話分岐_携帯_用件(CMR: classification)
            │                ├─ 再診       → END_再診_携帯
            │                ├─ 新規予約   → END_新規_携帯
            │                ├─ 予約変更   → END_変更_携帯
            │                ├─ 予約キャンセル → END_キャンセル_携帯
            │                └─ 予約確認   → END_確認_携帯
            └─ その他     → 終話分岐_その他_用件(CMR: classification)
                              ├─ 再診       → END_再診_その他
                              ├─ 新規予約   → END_新規_その他
                              ├─ 予約変更   → END_変更_その他
                              ├─ 予約キャンセル → END_キャンセル_その他
                              └─ 予約確認   → END_確認_その他

      [転送ブロック群]
      END_予約センター転送 → call_transfer(0263-35-5288) [失敗時 3回復唱]
      END_小児科センター転送 → call_transfer(0263-35-9852)
      END_歯科センター転送 → call_transfer(0263-35-8241)
      END_透析センター転送 → call_transfer(0263-35-9726)
      END_4階リハビリ転送 → call_transfer(0263-35-5316)
      END_2階リハビリ転送 → call_transfer(0263-35-9728)
      END_健診センター転送 → call_transfer(0263-35-0479)
    notes: |
      - 用件確認は復唱（echo_back）あり。Pattern B（OpenAI → ContextMatchRouter）で 5 用件に分岐。
      - 検査変更・検査キャンセルは「予約変更/キャンセル + 後段の検査か診察か hearing で検査確定」として表現（用件 enum は 5 値に集約）。
      - 心臓血管外科は紹介状必須だが、下肢静脈瘤希望のみ通常ルートで進める（受診希望確認_心臓血管外科 で振り分け）。
      - 循環器内科は阿部医師希望時のみ予約変更で第3希望まで聴取（医師確認_循環器内科 → CMR: classification）。それ以外は医師名聴取に合流。
      - 紹介状必須_分岐: 通常_診療科聴取の出力が「紹介状必須診療科」かつ 紹介状有無 = "なし" の場合、END_紹介状必須案内 へ。
        紹介状必須診療科の具体的な科名一覧は CSV 提供後に確定（confirmation_items 参照）。
      - 精神科_分岐: 通常_診療科聴取が「精神科」かつ classification = "新規予約" の場合 END_精神科初診不可、それ以外は通常ルート。
      - 当日予約は再診・新規予約のみ確認。予約変更/キャンセル/確認は当日確認なしで通常ルート。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # =====================================================================
  # 冒頭 2 ブロック 1 セット
  # =====================================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # =====================================================================
  # 用件確認（Pattern B: enum + echo_back → ContextMatchRouter で 5 分岐）
  # =====================================================================
  - step: 用件確認
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "default"
        next: 用件_主分岐

  - step: 用件_主分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "再診"
        next: 当日予約確認
      - match: "新規予約"
        next: 当日予約確認
      - match: "予約変更"
        next: 検査か診察か
      - match: "予約キャンセル"
        next: 検査か診察か
      - match: "予約確認"
        next: 確認内容聴取

  # =====================================================================
  # 当日予約確認（再診・新規予約のみ）
  # =====================================================================
  - step: 当日予約確認
    type: hearing
    output_format: enum
    conditions:
      - match: "当日"
        next: 当日_診療科聴取
      - match: "明日以降"
        next: 用件分岐_明日以降

  - step: 用件分岐_明日以降
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "再診"
        next: 通常_診療科聴取
      - match: "新規予約"
        next: 紹介状有無

  # =====================================================================
  # 当日_診療科聴取（発熱外来含む特殊ルート）
  # =====================================================================
  - step: 当日_診療科聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "発熱外来"
        next: END_発熱外来案内
      - match: "整形外科"
        next: 後日予約希望
      - match: "内科"
        next: END_内科直接来院
      - match: "小児科"
        next: 小児科対象確認
      - match: "肛門外科"
        next: END_予約センター転送
      - match: "精神科"
        next: END_精神科初診不可
      - match: "リハビリテーション科"
        next: 小児科リハビリ確認
      - match: "健診"
        next: END_健診センター転送
      - match: "歯科"
        next: END_歯科センター転送
      - match: "透析"
        next: END_透析センター転送
      - match: "default"
        next: END_予約センター転送

  - step: 後日予約希望
    type: hearing
    output_format: enum
    conditions:
      - match: "希望"
        next: 紹介状有無
      - match: "希望しない"
        next: END_明日以降希望なし

  # =====================================================================
  # 紹介状有無（新規予約・後日予約希望時）
  # =====================================================================
  - step: 紹介状有無
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 通常_診療科聴取

  # =====================================================================
  # 通常_診療科聴取（再診・新規予約・予約変更・予約キャンセル共通）
  # =====================================================================
  - step: 通常_診療科聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "健診"
        next: END_健診センター転送
      - match: "入院"
        next: END_予約センター転送_入院
      - match: "歯科"
        next: END_歯科センター転送
      - match: "透析"
        next: END_透析センター転送
      - match: "リハビリテーション科"
        next: 小児科リハビリ確認
      - match: "心臓血管外科"
        next: 受診希望確認_心臓血管外科
      - match: "循環器内科"
        next: 医師確認_循環器内科
      - match: "精神科"
        next: 精神科_分岐
      - match: "紹介状必須診療科"
        next: 紹介状必須_分岐
      - match: "対象外"
        next: END_予約センター転送_対象外
      - match: "default"
        next: 用件分岐_診療科後

  # 紹介状必須診療科 × 紹介状なし → END_紹介状必須案内（一般内科案内へ）
  - step: 紹介状必須_分岐
    type: context_match_router
    reference_module: "紹介状有無"
    conditions:
      - match: "あり"
        next: 用件分岐_診療科後
      - match: "なし"
        next: END_紹介状必須案内
      - match: "default"
        next: 用件分岐_診療科後

  # 精神科 × 新規予約 → 受付不可
  - step: 精神科_分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "新規予約"
        next: END_精神科初診不可
      - match: "default"
        next: 医師名聴取

  # 心臓血管外科は紹介状必須。下肢静脈瘤希望のみ通常ルート、その他は紹介状必須案内へ。
  - step: 受診希望確認_心臓血管外科
    type: hearing
    output_format: enum
    conditions:
      - match: "下肢静脈瘤"
        next: 用件分岐_診療科後
      - match: "その他"
        next: END_紹介状必須案内

  # 循環器内科は阿部医師確認。阿部希望 + 予約変更のみ第3希望まで聴取
  - step: 医師確認_循環器内科
    type: hearing
    output_format: enum
    conditions:
      - match: "阿部医師"
        next: 用件分岐_循環器
      - match: "その他医師"
        next: 医師名聴取

  - step: 用件分岐_循環器
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "予約変更"
        next: 希望日聴取
      - match: "default"
        next: 医師名聴取

  - step: 医師名聴取
    type: hearing
    output_format: text
    next: 用件分岐_診療科後

  # =====================================================================
  # 診療科聴取後の用件分岐（再診/新規/変更/キャンセル）
  # =====================================================================
  - step: 用件分岐_診療科後
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "再診"
        next: jump_診察券番号聴取
      - match: "新規予約"
        next: jump_氏名聴取
      - match: "予約変更"
        next: 予約日聴取
      - match: "予約キャンセル"
        next: 予約日聴取

  # =====================================================================
  # 検査か診察か（予約変更・予約キャンセル時）
  # =====================================================================
  - step: 検査か診察か
    type: hearing
    output_format: enum
    conditions:
      - match: "検査"
        next: 検査名聴取
      - match: "診察"
        next: 通常_診療科聴取

  - step: 検査名聴取
    type: hearing
    output_format: text
    next: 予約日聴取

  # =====================================================================
  # 予約日聴取（変更・キャンセル時の現在予約日）
  # =====================================================================
  - step: 予約日聴取
    type: hearing
    output_format: datetime
    next: 用件分岐_予約日後

  - step: 用件分岐_予約日後
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "予約変更"
        next: 希望日聴取
      - match: "予約キャンセル"
        next: キャンセル理由

  # =====================================================================
  # 希望日聴取（予約変更・循環器内科阿部医師希望時）
  # =====================================================================
  - step: 希望日聴取
    type: hearing
    output_format: text
    next: jump_氏名聴取

  # =====================================================================
  # キャンセル理由 → 再予約希望（予約キャンセル時）
  # =====================================================================
  - step: キャンセル理由
    type: hearing
    output_format: text
    next: 再予約希望

  - step: 再予約希望
    type: hearing
    output_format: enum
    conditions:
      - match: "希望"
        next: 希望日聴取
      - match: "希望しない"
        next: jump_氏名聴取

  # =====================================================================
  # 確認内容聴取（予約確認時）
  # =====================================================================
  - step: 確認内容聴取
    type: hearing
    output_format: text
    next: jump_氏名聴取

  # =====================================================================
  # 個人情報サブフロー（4本連鎖）
  # =====================================================================
  - step: jump_氏名聴取
    type: subflow
    flowname: "松本協立病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "松本協立病院$生年月日聴取"
    next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "松本協立病院$診察券番号聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "松本協立病院$電話番号聴取"
    next: 終話分岐_電話種別

  # =====================================================================
  # 終話分岐: 電話種別 × 用件 = 10 通り
  # =====================================================================
  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: 終話分岐_携帯_用件
      - match: "その他"
        next: 終話分岐_その他_用件
      - match: "default"
        next: 終話分岐_その他_用件

  - step: 終話分岐_携帯_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "再診"
        next: END_再診_携帯
      - match: "新規予約"
        next: END_新規_携帯
      - match: "予約変更"
        next: END_変更_携帯
      - match: "予約キャンセル"
        next: END_キャンセル_携帯
      - match: "予約確認"
        next: END_確認_携帯

  - step: 終話分岐_その他_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "再診"
        next: END_再診_その他
      - match: "新規予約"
        next: END_新規_その他
      - match: "予約変更"
        next: END_変更_その他
      - match: "予約キャンセル"
        next: END_キャンセル_その他
      - match: "予約確認"
        next: END_確認_その他

  # =====================================================================
  # Yes/No 確認系 hearing
  # =====================================================================
