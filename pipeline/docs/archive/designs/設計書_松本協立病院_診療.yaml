# --- smsFlag 分岐設計 ---
sms_flag_routing:
  enabled: true
  routing_keys: ["phonetype", "classification"]
  patterns:
    - condition: "phonetype = 携帯 (5用件すべて)"
      sms_flag: "1"
      notes: "携帯はSMS送信あり。終話文言で「ショートメールにてご連絡」と明示"
    - condition: "phonetype = その他 (5用件すべて)"
      sms_flag: "-1"
      notes: "固定電話・その他はSMS送信なし。終話文言で「お電話いたします」とのみ案内"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  # Gen1 元資料に FAQ / RAG 機能の記載はないため none。

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "施設挨拶"
    announcement: "お電話ありがとうございます。松本協立病院、予約センターの、AI電話です。"

  - module_name: "用件確認"
    purpose: "用件5分類の聴取（DTMF＋音声）"
    announcement: "ご用件を、次のいずれかでお話ください。「診察の予約を取る」「変更する」「キャンセルする」「予約を確認する」、それでは、お話ください。ダイヤルプッシュでも操作できます。"

  - module_name: "当日予約確認"
    purpose: "当日予約か否かの確認（再診・新規予約のみ）"
    announcement: "今回は、当日の予約についてのお問い合わせでしょうか？はい、または、いいえ、でお答えください。ダイヤルプッシュでは、当日予約は1、明日以降の予約は2、を押してください。"

  - module_name: "当日_診療科聴取"
    purpose: "当日の診療科聴取（発熱外来含む）"
    announcement: "ご希望の診療科または専門外来の名前をおっしゃってください。発熱外来の受診を希望される方は、「発熱外来」とおっしゃってください。"

  - module_name: "通常_診療科聴取"
    purpose: "通常診療科聴取"
    announcement: "ご希望の診療科または専門外来の名前をおっしゃってください。検査の予約変更・キャンセルの場合は「検査」とおっしゃってください。"

  - module_name: "紹介状有無"
    purpose: "紹介状の有無確認（新規予約時）"
    announcement: "他の医療機関からの紹介状はお持ちですか？はい、持っています、いいえ、持っていません、のように、お答えください。ダイヤルプッシュでは、紹介状ありは1、なしは2、を押してください。"

  - module_name: "受診希望確認_心臓血管外科"
    purpose: "下肢静脈瘤の希望確認"
    announcement: "下肢静脈瘤の診察をご希望でしょうか？はい、そうです、または、いいえ、違います、のように、お答えください。ダイヤルプッシュでは、下肢静脈瘤は1、それ以外は2、を押してください。"

  - module_name: "医師確認_循環器内科"
    purpose: "阿部医師希望確認"
    announcement: "阿部先生の診察をご希望ですか？はい、そうです、または、いいえ、違います、のように、お答えください。ダイヤルプッシュでは、阿部先生希望は1、その他は2、を押してください。"

  - module_name: "医師名聴取"
    purpose: "担当医師名の自由発話聴取"
    announcement: "担当医師名が分かる場合は、医師名をおっしゃってください。初めての受診や、分からない場合は「分からない」とおっしゃってください。"

  - module_name: "検査か診察か"
    purpose: "予約変更・キャンセル時に検査か診察かを判別"
    announcement: "今回ご変更（または、ご解約）されたいのは、検査の予約でしょうか、それとも、診察の予約でしょうか？診察予約の場合は1、検査予約の場合は2、を押すか、お答えください。"

