    next_step: "jump_氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "後日予約希望"
    tts_announcement: "申し訳ございません。整形外科は完全予約制になっており、当日の予約はお取りできません。明日以降のご希望であればお伺いできますが、希望されますか？はい、希望します、いいえ、希望しません、のように、お答えください。ダイヤルプッシュでは、明日以降の予約希望ありは1、なしは2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "希望"
        - "希望しない"
      mapping:
        - input: "DTMF 1 / 「はい」「希望します」（肯定）"
          output: "希望"
        - input: "DTMF 2 / 「いいえ」「希望しません」（否定）"
          output: "希望しない"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "rebookingFlag"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "小児科対象確認"
    tts_announcement: "受診される方は、中学生、または、それよりも若い年齢でしょうか？はい、または、いいえ、でお答えください。ダイヤルプッシュでは、12歳以下は1、13歳以上は2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "中学生以下"
        - "大人"
      mapping:
        - input: "DTMF 1 / 「はい」「そうです」「中学生」「12歳以下」（肯定）"
          output: "中学生以下"
        - input: "DTMF 2 / 「いいえ」「違います」「大人」「13歳以上」（否定）"
          output: "大人"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "isPediatric"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "小児科リハビリ確認"
    tts_announcement: "小児科のリハビリですか？はい、または、いいえ、でお答えください。ダイヤルプッシュでは、小児科リハビリは1、その他は2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "小児科リハビリ"
        - "その他リハビリ"
      mapping:
        - input: "DTMF 1 / 「はい」「そうです」「2階」「小児科リハビリ」（肯定）"
          output: "小児科リハビリ"
        - input: "DTMF 2 / 「いいえ」「違います」「4階」「成人」（否定）"
          output: "その他リハビリ"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "rehabilitationType"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（年末年始 12/30〜1/4 と 12/29 12:00以降を含む）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、祝日を除く、月曜日から金曜日の9時から16時30分となっております。年末年始は1月4日まで休業とさせていただいております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（代表案内へ）"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、祝日を除く、月曜から金曜の9時から16時30分に、予約センターへおかけなおしください。電話番号が分かる場合は、そのままお電話をお切りください。分からない場合はご案内いたしますので、メモをご準備ください。お電話番号は、0263-35-5288、です。繰り返します。お電話番号は、0263-35-5288、です。繰り返します。お電話番号は、0263-35-5288、です。それでは、失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 案内系終話 ---
  - name: "END_発熱外来案内"
    condition: "当日 + 発熱外来"
    tts_announcement: "申し訳ございません。発熱外来はご予約をお取りしておりません。受付時間は、祝日を除く、月曜から金曜の、8時30分から16時30分までと、土曜の、8時30分から11時30分までです。ご来院の際は、正面玄関入ってすぐの、総合受付の職員にお声がけ下さい。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_発熱外来案内"

  - name: "END_内科直接来院"
    condition: "当日 + 内科"
    tts_announcement: "申し訳ございません。一般内科は予約制ではございませんので、受付時間内にご来院ください。受付時間は、祝日を除く、月曜から金曜の、8時30分から16時30分までと、土曜の、8時30分から11時30分までです。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_内科直接来院"

  - name: "END_精神科初診不可"
    condition: "新規予約 + 精神科"
    tts_announcement: "大変申し訳ございません。精神科は現在、新規患者様のご予約を承っておりません。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_精神科初診不可"

  - name: "END_明日以降希望なし"
    condition: "後日予約希望なし（整形外科 当日希望→後日希望なし）"
    tts_announcement: "それではご案内を終了いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_明日以降希望なし"

  # --- 正常系終話: 携帯ルート（5用件 × 携帯）---
  - name: "END_再診_携帯"
    condition: "再診聴取完了 + 携帯"
