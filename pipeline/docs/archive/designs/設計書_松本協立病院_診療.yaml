      - match: "大人"
        next: END_予約センター転送

  - step: 小児科リハビリ確認
    type: hearing
    output_format: enum
    conditions:
      - match: "小児科リハビリ"
        next: END_2階リハビリ転送
      - match: "その他リハビリ"
        next: END_4階リハビリ転送

