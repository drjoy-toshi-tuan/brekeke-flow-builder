    editable: true
    deletable: false
    notes: |
      診療科リストは Gen1 yaml の「01初診紹介状必須_診療科」「02初診紹介状不要_診療科」「03別窓口案内_診療科」「04対象外_診療科」「05_整形外科」分類から再構成。
      実運用診療科リストは CSV 提供後に確定（confirmation_items 参照）。「紹介状必須診療科」「対象外」は内部分類用のグルーピング値。

