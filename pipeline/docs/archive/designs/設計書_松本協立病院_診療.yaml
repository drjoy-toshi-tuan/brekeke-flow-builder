# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "再診"
      - "新規予約"
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
    notes: "DTMF 1=予約取得（再診/新規予約は会話で確定） 2=変更 3=キャンセル 4=確認。echo_back=true で「再診のご予約でよろしいですか？」等の復唱確認を行う。検査変更・検査キャンセルは「予約変更/キャンセル」に統合し、後段の「検査か診察か」hearing で検査確定。「もしもし」「もう一度」発話は OpenAI プロンプト側でリトライにフォールバック"

  - order: 2
    name: "当日予約確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "isToday"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "当日"
      - "明日以降"
    notes: "DTMF 1=当日, 2=明日以降。再診・新規予約のみ確認。当日 yes/no を判定するだけなので echo_back=false（用件確認で既に復唱済み）"

  - order: 3
    name: "当日_診療科聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "発熱外来"
      - "整形外科"
      - "内科"
      - "小児科"
      - "肛門外科"
      - "精神科"
      - "リハビリテーション科"
      - "健診"
      - "歯科"
      - "透析"
      - "登山者外来"
      - "対象外"
      - "登録なし"
    notes: "音声のみ聴取。発熱外来発話を確実に拾う必要があるため echo_back=true で復唱確認。no_result→「登録なし」（モジュール選定ガイド 2.5）"

  - order: 4
    name: "後日予約希望"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "rebookingFlag"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "希望"
      - "希望しない"
    notes: "DTMF 1=希望, 2=希望しない。整形外科で当日予約不可と案内した後の確認"

  - order: 5
    name: "紹介状有無"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "introduction"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "DTMF 1=あり, 2=なし。新規予約時のみ聴取。「わからない」発話は「なし」として扱う（Gen1 仕様踏襲）"

  - order: 6
    name: "通常_診療科聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "心臓血管外科"
      - "下肢静脈瘤"
      - "循環器内科"
      - "整形外科"
      - "肛門外科"
      - "精神科"
      - "リハビリテーション科"
      - "歯科"
      - "透析"
      - "健診"
      - "登山者外来"
      - "入院"
      - "紹介状必須診療科"
      - "対象外"
      - "登録なし"
    notes: "再診・新規予約・予約変更・予約キャンセル共通の診療科聴取。検査キーワードは「検査か診察か」hearing で先に振り分けているため対象外。no_result→「登録なし」"

  - order: 7
    name: "受診希望確認_心臓血管外科"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "venousVarixFlag"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "下肢静脈瘤"
      - "その他"
    notes: "DTMF 1=下肢静脈瘤, 2=その他。心臓血管外科は紹介状必須だが、下肢静脈瘤希望のみ通常ルートで進める"

  - order: 8
    name: "医師確認_循環器内科"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "doctorPreference"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "阿部医師"
      - "その他医師"
    notes: "DTMF 1=阿部医師希望, 2=その他医師。阿部医師希望 + 予約変更時のみ希望日を第3希望まで聴取"

  - order: 9
    name: "医師名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "doctorName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "担当医師名の自由発話聴取。「分からない」発話時はその旨を text 保存"

  - order: 10
    name: "検査か診察か"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "appointmentType"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "検査"
      - "診察"
    notes: "DTMF 1=診察, 2=検査。予約変更・予約キャンセル時に検査と診察のどちらかを判別"

  - order: 11
    name: "検査名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "examinationName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "検査名の自由発話聴取。「分からない」発話時はその旨を text 保存"

  - order: 12
    name: "予約日聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "予約変更・予約キャンセル時の現在予約日。DTMF 4桁（MMDD）入力も対応。echo_back=true で「〇月〇日でよろしいですか？」と復唱"

  - order: 13
    name: "希望日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "preferredDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約変更・循環器内科阿部医師希望時の希望日。第3希望まで自由発話で聴取するため text 形式"

  - order: 14
    name: "キャンセル理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約キャンセル時のみ聴取。自由発話をそのまま保存"

  - order: 15
    name: "再予約希望"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "rebookingFlag"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "希望"
      - "希望しない"
    notes: "DTMF 1=希望, 2=希望しない。予約キャンセル後に再予約希望があるか確認"

  - order: 16
    name: "確認内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "confirmationContent"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約確認時の確認したい内容を自由発話で聴取"

  - order: 17
    name: "小児科対象確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "isPediatric"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "中学生以下"
      - "大人"
    notes: "DTMF 1=中学生以下, 2=大人。当日予約 + 小児科の場合、対象年齢かを確認"

  - order: 18
    name: "小児科リハビリ確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "rehabilitationType"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "小児科リハビリ"
      - "その他リハビリ"
    notes: "DTMF 1=小児科リハビリ（2階）, 2=その他リハビリ（4階）。リハビリは患者年齢で窓口が異なるため確認"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。松本協立病院、予約センターの、AI電話です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "用件確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次のいずれかでお話ください。「診察の予約を取る」「変更する」「キャンセルする」「予約を確認する」、それでは、お話ください。ダイヤルプッシュでも操作できます。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "再診"
        - "新規予約"
        - "予約変更"
        - "予約キャンセル"
        - "予約確認"
      mapping:
        - input: "DTMF 1 / 「予約を取る」「予約取得」「診察の予約」（受診歴あり、再診と判断できる発話）"
          output: "再診"
        - input: "「新規予約」「初診」「初めて」（受診歴なし、初診と判断できる発話）"
          output: "新規予約"
        - input: "DTMF 2 / 「予約変更」「予約を変える」「予約変えたい」「日時を変更」「検査変更」"
          output: "予約変更"
        - input: "DTMF 3 / 「キャンセル」「予約キャンセル」「予約を取り消す」「予約を消す」「検査キャンセル」"
          output: "予約キャンセル"
        - input: "DTMF 4 / 「予約確認」「予約を確認」「予約状況」「次回予約」"
          output: "予約確認"
      no_result_condition: "上記いずれにも該当しない発話。「もしもし」「もう一度」等の聞き返し発話は内部的にはリトライ扱いとして再質問へ"
    save_to: "classification"
    next_step: "用件_主分岐"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "当日予約確認"
    tts_announcement: "今回は、当日の予約についてのお問い合わせでしょうか？はい、または、いいえ、でお答えください。ダイヤルプッシュでは、当日予約は1、明日以降の予約は2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "当日"
        - "明日以降"
      mapping:
        - input: "DTMF 1 / 「はい」「そうです」「当日」「今日」（肯定）"
          output: "当日"
        - input: "DTMF 2 / 「いいえ」「違います」「明日」「明日以降」「先の予約」（否定）"
          output: "明日以降"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "isToday"
    next_step: "用件_主分岐の遷移先"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "当日_診療科聴取"
    tts_announcement: "ご希望の診療科または専門外来の名前をおっしゃってください。発熱外来の受診を希望される方は、「発熱外来」とおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "発熱外来"
        - "整形外科"
        - "内科"
        - "小児科"
        - "肛門外科"
        - "精神科"
        - "リハビリテーション科"
        - "健診"
        - "歯科"
        - "透析"
        - "登山者外来"
        - "対象外"
        - "登録なし"
      mapping:
        - input: "「発熱」「発熱外来」「熱がある」「コロナ」「インフル」"
          output: "発熱外来"
        - input: "「整形外科」「整形」「せいけい」「骨折」「捻挫」"
          output: "整形外科"
        - input: "「内科」「ないか」「一般内科」"
          output: "内科"
        - input: "「小児科」「しょうにか」「こども」「子供」"
          output: "小児科"
        - input: "「肛門外科」「こうもん」「肛門」"
          output: "肛門外科"
        - input: "「精神科」「せいしんか」「メンタル」"
          output: "精神科"
        - input: "「リハビリ」「リハビリテーション」"
          output: "リハビリテーション科"
        - input: "「健診」「健康診断」「人間ドック」「ドック」"
          output: "健診"
        - input: "「歯科」「しか」「歯」「歯医者」"
          output: "歯科"
        - input: "「透析」「とうせき」"
          output: "透析"
        - input: "「登山者外来」「登山者」"
          output: "登山者外来"
        - input: "上記の対象診療科以外の診療科名（眼科・皮膚科 等）"
          output: "対象外"
      no_result_condition: "上記いずれにも該当しない発話。診療科として認識できない発話の場合は no_result"
    save_to: "clinicalDepartment"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "通常_診療科聴取"
    tts_announcement: "ご希望の診療科または専門外来の名前をおっしゃってください。検査の予約変更・キャンセルの場合は「検査」とおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "心臓血管外科"
        - "下肢静脈瘤"
        - "循環器内科"
        - "整形外科"
        - "肛門外科"
        - "精神科"
        - "リハビリテーション科"
        - "歯科"
        - "透析"
        - "健診"
        - "登山者外来"
        - "入院"
        - "紹介状必須診療科"
        - "対象外"
        - "登録なし"
      mapping:
        - input: "「心臓血管外科」「心臓」「血管外科」"
          output: "心臓血管外科"
        - input: "「下肢静脈瘤」「静脈瘤」「下肢」"
          output: "下肢静脈瘤"
        - input: "「循環器内科」「循環器」"
          output: "循環器内科"
        - input: "「整形外科」「整形」「せいけい」"
          output: "整形外科"
        - input: "「肛門外科」「こうもん」"
          output: "肛門外科"
        - input: "「精神科」「せいしんか」「メンタル」"
          output: "精神科"
        - input: "「リハビリ」「リハビリテーション」"
          output: "リハビリテーション科"
        - input: "「歯科」「しか」「歯医者」"
          output: "歯科"
        - input: "「透析」「とうせき」"
          output: "透析"
        - input: "「健診」「健康診断」「人間ドック」"
          output: "健診"
        - input: "「登山者外来」「登山者」"
          output: "登山者外来"
        - input: "「入院」「入院予約」（変更/キャンセル時のみ）"
          output: "入院"
        - input: "紹介状必須の診療科（具体的な科名は CSV 提供後に確定）"
          output: "紹介状必須診療科"
        - input: "対象外の診療科（眼科・皮膚科等、本院で予約取得できない科）"
          output: "対象外"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "clinicalDepartment"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "紹介状有無"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか？はい、持っています、いいえ、持っていません、のように、お答えください。ダイヤルプッシュでは、紹介状ありは1、なしは2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "DTMF 1 / 「はい」「持っています」「あります」（肯定）"
          output: "あり"
        - input: "DTMF 2 / 「いいえ」「持っていません」「ありません」「わからない」（否定または不明）"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "introduction"
    next_step: "通常_診療科聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "受診希望確認_心臓血管外科"
    tts_announcement: "下肢静脈瘤の診察をご希望でしょうか？はい、そうです、または、いいえ、違います、のように、お答えください。ダイヤルプッシュでは、下肢静脈瘤は1、それ以外は2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "下肢静脈瘤"
        - "その他"
      mapping:
        - input: "DTMF 1 / 「はい」「そうです」「下肢静脈瘤」（肯定）"
          output: "下肢静脈瘤"
        - input: "DTMF 2 / 「いいえ」「違います」「他の症状」（否定）"
          output: "その他"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "venousVarixFlag"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "医師確認_循環器内科"
    tts_announcement: "阿部先生の診察をご希望ですか？はい、そうです、または、いいえ、違います、のように、お答えください。ダイヤルプッシュでは、阿部先生希望は1、その他は2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "阿部医師"
        - "その他医師"
      mapping:
        - input: "DTMF 1 / 「はい」「そうです」「阿部先生」「阿部」（肯定）"
          output: "阿部医師"
        - input: "DTMF 2 / 「いいえ」「違います」「他の先生」（否定）"
          output: "その他医師"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "doctorPreference"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "医師名聴取"
    tts_announcement: "担当医師名が分かる場合は、医師名をおっしゃってください。初めての受診や、分からない場合は「分からない」とおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "doctorName"
    next_step: "用件分岐_診療科後"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "検査か診察か"
    tts_announcement: "今回ご変更（または、ご解約）されたいのは、検査の予約でしょうか、それとも、診察の予約でしょうか？診察予約の場合は1、検査予約の場合は2、を押すか、お答えください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "検査"
        - "診察"
      mapping:
        - input: "DTMF 1 / 「診察」「診察予約」（診察予約）"
          output: "診察"
        - input: "DTMF 2 / 「検査」「検査予約」「検査だけ」（検査予約）"
          output: "検査"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "appointmentType"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "検査名聴取"
    tts_announcement: "検査名が分かる場合はお知らせください。分からない場合は「分からない」とおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "examinationName"
    next_step: "予約日聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約日聴取"
    tts_announcement: "予約票に記載されている予約日を「4月1日」のように日付でおっしゃってください。ダイヤルプッシュで月と日にちの4桁の数字を入力することもできます。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping:
        - input: "「4月1日」「4/1」「よんがつついたち」"
          output: "YYYY-MM-DD HH:MM 形式に正規化"
        - input: "DTMF 0401"
          output: "YYYY-MM-DD HH:MM 形式に正規化（月日4桁）"
      no_result_condition: "日付として解釈できない発話"
    save_to: "reservationDate"
    next_step: "用件分岐_予約日後"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "希望日聴取"
    tts_announcement: "ご希望の変更日時をおっしゃってください。複数候補がある場合は、第3希望までおっしゃっていただいて結構です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "preferredDate"
    next_step: "jump_氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "キャンセル理由"
    tts_announcement: "キャンセル理由をおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無発話（5秒以上の沈黙）"
    save_to: "reason"
    next_step: "再予約希望"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "再予約希望"
    tts_announcement: "再予約のご希望はありますか？はい、希望します、いいえ、希望しません、のように、お答えください。ダイヤルプッシュでは、再予約希望ありは1、なしは2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "希望"
        - "希望しない"
      mapping:
        - input: "DTMF 1 / 「はい」「希望します」（肯定）"
          output: "希望"
        - input: "DTMF 2 / 「いいえ」「希望しません」（否定）"
          output: "希望しない"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "rebookingFlag"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "確認内容聴取"
    tts_announcement: "ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」など、内容を簡潔におっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
