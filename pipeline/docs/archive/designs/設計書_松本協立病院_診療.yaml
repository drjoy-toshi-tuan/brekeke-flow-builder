# --- セクション11: 特記事項・制約 ---
special_notes:
  - "営業時間は祝日除く月〜金 9:00〜16:30。Dr.JOY 側の acceptance_times で曜日・時間を設定する。"
  - "12/29 は午前のみ受付（9:00〜12:00）、年末年始（12/30〜1/4）は休業。これらの特例日は Dr.JOY 側のカレンダー設定で時間外として扱う（END_時間外 文言に「年末年始は1月4日まで休業」を含めることで案内する方針）。"
  - "用件 enum は 5 値（再診/新規予約/予約変更/予約キャンセル/予約確認）に集約。検査変更・検査キャンセルは Gen1 では独立用件だが、Gen3 では「予約変更/キャンセル + 検査か診察か hearing で検査を確定」として表現。"
  - "Pattern B（OpenAI → ContextMatchRouter）を全体方針として採用。用件確認は echo_back あり、診療科系は echo_back あり、Yes/No 系は echo_back なし。"
  - "心臓血管外科は紹介状必須。下肢静脈瘤希望のみ通常ルート（受診希望確認_心臓血管外科 で振り分け）。それ以外の心臓血管外科は END_紹介状必須案内 → 予約センター転送へ。"
  - "循環器内科は阿部医師確認あり。阿部希望 + 予約変更時のみ希望日を第3希望まで聴取（用件分岐_循環器 → 希望日聴取）。それ以外は医師名聴取に合流。"
  - "精神科は新規予約のみ受付不可（END_精神科初診不可）。再診・予約変更・予約キャンセル・予約確認は通常ルート。"
  - "新規予約時の診察券聴取はサブフロー側で「わからない」発話を吸収（診察券無扱い）。Gen1 の「診察券有無の確認」はこの「わからない」分岐と統合されている。"
  - "リハビリは患者年齢で窓口が異なる：小児科リハビリ（2階リハビリ室 0263-35-9728）/ その他リハビリ（4階リハビリ 0263-35-5316）。小児科リハビリ確認 hearing で振り分ける。"
  - "終話文言は携帯/その他で 5 用件 × 2 種 = 10 通り。携帯は SMS 送信あり「ショートメールにてご連絡」、その他は SMS 送信なし「お電話いたします」。"
  - "全 7 つの転送先（予約センター/小児科/歯科/透析/4階リハビリ/2階リハビリ/健診センター）は call_transfer ブロックで実装。転送失敗時は各窓口の電話番号を 3 回復唱して切断する on_failure_announcement を含める。"
  - "聴取失敗（END_聴取失敗）時の代表案内も予約センター電話番号 0263-35-5288 を 3 回復唱して切断する。"
  - "scaffold_generator が status=3（転送成功）/ status=9（転送失敗）と END_転送成功/END_転送失敗 終話チェーンを各 call_transfer に対して自動補完する。"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（Dr.JOY 施設ID）"
    resolved: false
    notes: "Dr.JOY 管理画面で確認"

  - item: "Dr.JOY 側の営業時間設定（祝日除く月〜金 9:00〜16:30）"
    resolved: false
    notes: "acceptance_times モジュールが参照する曜日・時間設定。Dr.JOY 管理画面で設定"

  - item: "12/29 午前限定受付（9:00〜12:00）と年末年始休業（12/30〜1/4）の Dr.JOY カレンダー設定"
    resolved: false
    notes: "通常スケジュールに加えて、特例日カレンダーを Dr.JOY 側で設定する必要がある。Gen1 ではフロー側の時間判断 yaml に組み込まれていたが、Gen3 では Dr.JOY 側に統一する方針。"

  - item: "診療科リスト（紹介状必須/不要、別窓口、対象外、整形外科の特殊扱い等の正式な分類）"
    resolved: false
    notes: |
      Gen1 の「01初診紹介状必須_診療科」「02初診紹介状不要_診療科」「03別窓口案内_診療科」「04対象外_診療科」「05_整形外科」分類の具体的な科名一覧が必要。
      患者会計システム / 病院 HP の診療科一覧から CSV 化して提供してもらうこと。
      profile_words と OpenAI プロンプトの mapping にも反映が必要。

  - item: "検査名の主要ラインナップ（CT/MRI/エコー/内視鏡 等）"
    resolved: false
    notes: "検査名聴取時に AmiVoice 辞書（profile_words）に追加すべき主要検査名。Gen1 元資料には具体的な検査名リストなし"

  - item: "転送先窓口の営業時間（時間外時の挙動）"
    resolved: false
    notes: |
      予約センター以外の 6 窓口（小児科/歯科/透析/4階リハビリ/2階リハビリ/健診）が予約センターと異なる営業時間で稼働している場合、
      時間外でも転送が試行されてしまう可能性がある。窓口ごとの営業時間を Dr.JOY 側で別管理するか、
      acceptance_times をフロー全体で統一するか方針確認。

  - item: "新規予約時の診察券有無分岐の正確な仕様"
    resolved: false
    notes: |
      Gen1 では「診察券有無の確認」hearing があり、有→診察券番号聴取、無→氏名聴取（診察券スキップ）の分岐がある。
      Gen3 では診察券番号聴取サブフロー内の「わからない」分岐で吸収する想定だが、
      新規予約時に診察券聴取をスキップしたい運用要件があれば別途確認。

  - item: "用件確認の echo_back 復唱文言（「再診のご予約でよろしいですか？」等）の 5 用件分の文言"
    resolved: false
    notes: |
      Gen1 では用件ごとに専用の復唱TTS（再診へ進む / 新規予約へ進む 等）があり、それぞれ「〜のご予約でよろしいですか？」と問いかける。
      Gen3 では echo_back=true で scaffold が #data# を埋め込んだ汎用復唱を生成するが、用件 enum 値によって文言を変えたい場合は
      Re-confirmation node data に対応する props を別途整備する必要がある。基本は scaffold デフォルトでよいか確認。

  - item: "希望日（preferredDate）を datetime ではなく text で保存する方針"
    resolved: false
    notes: |
      Gen1 では「ご希望の変更日時を、第3希望までおっしゃってください」と複数候補を許容する自由発話。
      Gen3 では datetime に正規化できないため text で保存するが、
      Dr.JOY 側で「希望日」フィールドをどう扱うか（自由テキスト表示 / オペレーターが手動正規化）の運用確認が必要。

  - item: "予約日（reservationDate）の DTMF 4桁（MMDD）入力時の年補完ルール"
    resolved: false
    notes: |
      Gen1 では DTMF 4桁入力時、現在日と比較して比較日より前なら +1 年で確定するロジックがある（予約日の聞き取り yaml 参照）。
      Gen3 では OpenAI 正規化で同等のルールを実装するか、Script ブロックで処理するか検討。
      シンプル化のため OpenAI プロンプトで「DTMF 4桁の場合は、今日より前の月日なら翌年として解釈」と明示する方針。

  - item: "心臓血管外科の通常ルート進行方針（下肢静脈瘤確定後の処理）"
    resolved: false
    notes: |
      Gen1 では下肢静脈瘤希望時、診療科を「心臓血管外科」のまま循環器外科の医師名聴取ルートに進む。
      Gen3 では受診希望確認_心臓血管外科 → 用件分岐_診療科後（CMR）に直接合流する方針だが、
      診療科 context を「下肢静脈瘤」に上書きするか「心臓血管外科」のまま残すか確認。

  - item: "「もしもし」「もう一度」発話時のリトライ動作"
    resolved: false
    notes: |
      Gen1 では「もしもし」「もう一度」を独立した分岐として用件確認時に検出し、再質問に戻していた。
      Gen3 では OpenAI プロンプト側で「これらの発話は no_result として扱う」と指示してリトライに合流させる方針。
      文言の細かい差異（「はい、聞こえております」等の追加メッセージ）が必要かどうか確認。

