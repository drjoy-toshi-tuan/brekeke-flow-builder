# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2 からの移管。status=0（冒頭切断/途中切断）は CLAUDE.md 規約に従い status=2 に置換済み。Dr.JOY 側で通話ログから切断判定する場合は Dr.JOY システムで対応"
  - "診療科の曖昧入力（げか/こきゅうき/のう/ないか/泌尿器/人）は Gen2 の個別確認ステップ（「当院には外科、乳腺外科、呼吸器外科、整形外科の4つ外科があります。どちらでしょうか？」等）を廃止し、OpenAI プロンプト + profile_words 辞書で1ショット処理に統合。明確に判別できない場合は no_result_default='登録なし' で保存"
  - "Gen2 の checkout / endpoint フィールドは Gen3 では context_fields に含めない（Dr.JOY 側の通話ログから判別）"
  - "Gen2 の clinicalDepartment2 / institution / introduction / disease / symptoms / question は Gen2 本文でも未活用だったため Gen3 で削除。必要が生じた場合は context_fields に追加"
  - "DesiredreservationDate（Gen2 の PascalCase）は Gen3 命名規則に合わせ desiredReservationDate（camelCase）に統一"
  - "確認ルートの内容確認は RAG検索サブフローに直結する。Gen2 の「確認_FAQ判定 → 確認_FAQ回答」ロジックは RAG サブフロー内部に吸収"
  - "用件確認で「新規」判定時は代表電話案内で終話。Gen2 では classification を設定せず終話していたが、Gen3 では classification='新規' を保存（Dr.JOY 側で status=2 + classification=新規 として識別可能）"
  - "smsFlag は完了系（END_変更/キャンセル/確認）で 1 固定。Gen2 の has_mobile_number による smsFlag=2 分岐は撤廃（Dr.JOY 側で phonetype を参照して SMS 配信可否を判断）"
  - "生年月日・電話番号の復唱は専用サブフロー（生年月日聴取_復唱あり / 電話番号聴取_復唱あり）で処理。DOB Re-confirmation / Phone Normalization モジュールを利用"
  - "Re-confirmation TTS では {tts_g:...}（全小文字）形式を使用。{TTS_AI:...}（大文字）は使用禁止"

