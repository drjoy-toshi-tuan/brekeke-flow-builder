# 設計書: 大分赤十字病院 — 診療
# 生成元: @director エージェント (2026/04/17)
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/【診療1】：大分赤十字病院.md
# 確認レポート: docs/designs/確認レポート_大分赤十字病院_診療_2026-04-17.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "大分赤十字病院"
  group_name: "大分赤十字病院"
  flow_name: "大分赤十字病院$診療"
  target_facility: "大分赤十字病院"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "祝日除く月〜土 9:00〜17:00"  # 仮値。Dr.JOY 側で詳細スケジュール設定
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "大分赤十字病院$診療"
      role: "main"
      description: "冒頭チェーン → 用件確認 → (変更/キャンセル/確認) → 診療科 → 予約日/希望日/理由/内容確認 → 個人情報聴取サブフロー × 4 → RAG → 用件別終話"
  subflows:
    - name: "大分赤十字病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/氏名聴取.json を完全コピー"
    - name: "大分赤十字病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/生年月日聴取_復唱あり.json を完全コピー。和暦/西暦対応・DOB Re-confirmation 内蔵"
    - name: "大分赤十字病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/電話番号聴取_復唱あり.json を完全コピー。incoming-classifier + Phone Normalization + 携帯/固定判別内蔵。phonetype を保存"
    - name: "大分赤十字病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/診察券番号聴取.json を完全コピー。「わからない」分岐あり"
    - name: "大分赤十字病院$RAG検索"
      target: "RAG検索"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Dr.JOY 側 FAQ リストを RAG 検索するサブフロー。RAGサンプル（docs/reference/bivr/samples/json/RAG検索.json）を完全コピー"

# --- セクション3: フローの目的 ---
purpose: "大分赤十字病院の外来予約に関する問合せ（予約変更・キャンセル・確認）を受け、用件・診療科・患者情報（氏名・生年月日・連絡先電話番号・診察券番号）を聴取してDr.JOYに保存し、折り返し受付を自動化する。新規予約・当日の予約変更/キャンセルは代表電話案内で終話。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "大分赤十字病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 受付時間判定(acceptance_times)
                    ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                    └─ 受付可 → 冒頭_アナウンス(TTS)
                          → 用件確認 (DTMF_AmiVoice, enum)
                              ├─ 1/変更 ─┐
                              ├─ 2/キャンセル ─┼→ 診療科
                              ├─ 3/確認 → 内容確認(text) → jump_RAG検索① → 診療科
                              └─ 新規 → END_新規案内(status=2, smsFlag=-1) → 切断
                          → 診療科 (AmiVoice_STT, enum, no_result_default=登録なし)
                              → 用件分岐_1 (ContextMatchRouter on classification)
                                  ├─ 確認 → jump_診察券番号
                                  └─ 変更/キャンセル → 予約日(datetime)
                                                        → 当日判定 (Script: future_date)
                                                            ├─ FAIL(当日) → END_当日案内(status=2, smsFlag=-1) → 切断
                                                            └─ SUCCESS(未来) → 用件分岐_2 (ContextMatchRouter)
                                                                  ├─ 変更 → 予約希望日(text) → jump_診察券番号
                                                                  └─ キャンセル → キャンセル理由(text) → jump_診察券番号
                          → jump_診察券番号(サブフロー)
                              → jump_氏名聴取(サブフロー)
                                  → jump_生年月日聴取(サブフロー, 復唱あり)
                                      → jump_電話番号聴取(サブフロー, 復唱あり, phonetype保存)
                                          → jump_RAG検索② (終話前・最後の質問用)
                                              → 終話分岐 (ContextMatchRouter on classification)
                                                  ├─ 変更 → END_変更(status=1, smsFlag=1) → 切断
                                                  ├─ キャンセル → END_キャンセル(status=1, smsFlag=1) → 切断
                                                  └─ 確認 → END_確認(status=1, smsFlag=1) → 切断

      リトライ上限到達 → END_聴取失敗(status=3, smsFlag=-1) → 切断
    notes: |
      - 診療科の曖昧入力確認（「げか」「こきゅうき」「のう」「ないか」「泌尿器」「人」）は Gen2 では個別確認ステップだったが、Gen3 では OpenAI プロンプト + profile_words 辞書（74語）で1ショット処理に統合。
      - RAG検索①: Gen2 の「確認_FAQ判定 → 確認_FAQ回答」を置換（確認ルート内のみ）
      - RAG検索②: Gen3 パターン3 の「最後にご質問は？」汎用RAG（全用件の終話前）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 用件確認

  # --- 用件確認（DTMF + 音声）---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "変更"
        next: 診療科
      - match: "キャンセル"
        next: 診療科
      - match: "確認"
        next: 内容確認
      - match: "新規"
        next: END_新規案内

  # --- 確認ルート: 内容確認（text）→ RAG ---
  - step: 内容確認
    type: hearing
    output_format: text
    next: jump_RAG検索_1

  - step: jump_RAG検索_1
    type: subflow
    flowname: "大分赤十字病院$RAG検索"
    next: 診療科

  # --- 診療科聴取（全用件で通る共通ブロック）---
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 用件分岐_1

  # --- 用件分岐_1: 確認は予約日をスキップして診察券番号へ、変更/キャンセルは予約日へ ---
  - step: 用件分岐_1
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "確認"
        next: jump_診察券番号
      - match: "変更"
        next: 予約日
      - match: "キャンセル"
        next: 予約日

  # --- 変更/キャンセルルート: 予約日 ---
  - step: 予約日
    type: hearing
    output_format: datetime
    next: 当日判定

  # --- 当日判定: 当日ならEND_当日案内、未来なら継続 ---
  - step: 当日判定
    type: script
    script_template: future_date
    reference_module: "予約日"
    conditions:
      - match: "SUCCESS"
        next: 用件分岐_2
      - match: "FAIL"
        next: END_当日案内

  # --- 用件分岐_2: 変更→予約希望日 / キャンセル→キャンセル理由 ---
  - step: 用件分岐_2
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: 予約希望日
      - match: "キャンセル"
        next: キャンセル理由

  - step: 予約希望日
    type: hearing
    output_format: text
    next: jump_診察券番号

  - step: キャンセル理由
    type: hearing
    output_format: text
    next: jump_診察券番号

  # --- 個人情報聴取サブフロー（4連）---
  - step: jump_診察券番号
    type: subflow
    flowname: "大分赤十字病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "大分赤十字病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "大分赤十字病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "大分赤十字病院$電話番号聴取"
    next: jump_RAG検索_2

  # --- RAG検索② (終話前・最後の質問用) ---
  - step: jump_RAG検索_2
    type: subflow
    flowname: "大分赤十字病院$RAG検索"
    next: 終話分岐

  # --- 終話分岐: 用件別に3つの終話へ ---
  - step: 終話分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: END_変更
      - match: "キャンセル"
        next: END_キャンセル
      - match: "確認"
        next: END_確認

  # --- 終話ブロック ---
  - step: END_変更
    type: termination
    termination_ref: "END_変更"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_確認
    type: termination
    termination_ref: "END_確認"

  - step: END_新規案内
    type: termination
    termination_ref: "END_新規案内"

  - step: END_当日案内
    type: termination
    termination_ref: "END_当日案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
