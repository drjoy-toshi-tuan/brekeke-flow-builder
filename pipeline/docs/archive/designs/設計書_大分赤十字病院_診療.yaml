# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "変更"
      - "キャンセル"
      - "確認"
      - "新規"
    notes: "DTMF 1=変更, 2=キャンセル, 3=確認, 無DTMF=音声（新規は音声のみ）。当日の予約変更/キャンセルは代表電話案内するが、ここでの判定は Gen2 同様に予約日聴取後に行う"

  - order: 2
    name: "内容確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "確認ルート専用。問合せ内容をフリーテキストで保存。後段 RAG検索① に渡る"

  - order: 3
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "内分泌糖尿病内科"
      - "外科"
      - "整形外科"
      - "脳神経外科"
      - "皮膚科"
      - "腎泌尿器外科"
      - "産婦人科"
      - "眼科"
      - "耳鼻咽喉科"
      - "放射線科"
      - "歯科口腔外科"
      - "リウマチ科"
      - "循環器内科"
      - "呼吸器内科"
      - "消化器内科"
      - "精神神経科"
      - "腎臓内科"
      - "脳神経内科"
      - "肝臓胆のう膵臓内科"
      - "呼吸器外科"
      - "乳腺外科"
      - "心臓血管外科"
      - "緩和ケア科"
      - "登録なし"
    notes: "モジュール選定ガイド 2.5 に従い no_result_default='登録なし' を設定。曖昧発話（げか/こきゅうき/のう/ないか 等）は OpenAI プロンプトで正規化（Gen2 の個別確認ステップは統合）"

  - order: 4
    name: "予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "変更/キャンセルルートのみ。YYYY-MM-DD HH:MM 形式に正規化。相対日付（今日/明日）は着信日から換算。10–12月に1–9月を言われたら翌年扱い"

  - order: 5
    name: "予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更ルート専用。フリーテキスト（「来月上旬」「火曜の午後」等の曖昧表現を許容）"

  - order: 6
    name: "キャンセル理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "キャンセルルート専用。フリーテキスト"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "初めに、ご用件を、次の３つのうちの、いずれかでお話ください。「1、予約を変更する」。「2、予約をキャンセルする」。「3、予約を確認する」。なお、当日の予約変更、キャンセルは、代表電話へおかけ直しください。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "新規"
      mapping:
        - input: "DTMF 1 または「変更」「1」「へんこう」を含む発話"
          output: "変更"
        - input: "DTMF 2 または「キャンセル」「2」「取消」を含む発話"
          output: "キャンセル"
        - input: "DTMF 3 または「確認」「3」「さん」「サン」を含む発話"
          output: "確認"
        - input: "「新規」「初めて」「はじめて」を含む発話（DTMFなし）"
          output: "新規"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "(enum分岐) 変更→診療科 / キャンセル→診療科 / 確認→内容確認 / 新規→END_新規案内"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "内容確認"
    tts_announcement: "お問い合わせの内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答 / 不明瞭"
    save_to: "reason"
    next_step: "jump_RAG検索_1"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "診療科"
    tts_announcement: "まずは診療科をお話ください。わからない場合はわからないとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内分泌糖尿病内科"
        - "外科"
        - "整形外科"
        - "脳神経外科"
        - "皮膚科"
        - "腎泌尿器外科"
        - "産婦人科"
        - "眼科"
        - "耳鼻咽喉科"
        - "放射線科"
        - "歯科口腔外科"
        - "リウマチ科"
        - "循環器内科"
        - "呼吸器内科"
        - "消化器内科"
        - "精神神経科"
        - "腎臓内科"
        - "脳神経内科"
        - "肝臓胆のう膵臓内科"
        - "呼吸器外科"
        - "乳腺外科"
        - "心臓血管外科"
        - "緩和ケア科"
        - "登録なし"
      mapping:
        - input: "ないぶんぴつ / とうない / とうにょう / とうにょうびょう"
          output: "内分泌糖尿病内科"
        - input: "げか（外科・乳腺・呼吸器・整形のいずれか判別できない場合）"
          output: "登録なし"
        - input: "げか（明確に1科に特定できる文脈・単独発話）"
          output: "外科"
        - input: "せいけいげか / せいけい"
          output: "整形外科"
        - input: "のうげ / のうげか"
          output: "脳神経外科"
        - input: "のう / のうしんけい（脳神経外科/脳神経内科のどちらか特定不可）"
          output: "登録なし"
        - input: "ひふか / ひふ"
          output: "皮膚科"
        - input: "じんひにょうき / 腎泌尿器 / じんぞうげか / じんぞう（泌尿器外科文脈）"
          output: "腎泌尿器外科"
        - input: "さんか / ふじんか / さんふじんか"
          output: "産婦人科"
        - input: "め / がんか"
          output: "眼科"
        - input: "じびか / はな / みみ / のど"
          output: "耳鼻咽喉科"
        - input: "ほうしゃせん / ほうしゃせんちりょう"
          output: "放射線科"
        - input: "しか / こうくうげか / はいしゃ"
          output: "歯科口腔外科"
        - input: "りうまち"
          output: "リウマチ科"
        - input: "しんぞう / 心臓（血管外科文脈でなければ）"
          output: "循環器内科"
        - input: "こきゅうき（内/外特定不可）"
          output: "登録なし"
        - input: "じんぞうないか / じんない / 腎臓 / じんぞう（内科文脈）/ 腎内"
          output: "腎臓内科"
        - input: "のうないか / しんけいないか"
          output: "脳神経内科"
        - input: "かんぞうないか / たんのう / すいぞう"
          output: "肝臓胆のう膵臓内科"
        - input: "にゅうせん"
          output: "乳腺外科"
        - input: "しんげ / しんぞうげか"
          output: "心臓血管外科"
        - input: "がん / かんわ / かんわけあ"
          output: "緩和ケア科"
        - input: "わからない / リストに該当なし / 複数科同時発話"
          output: "登録なし"
      no_result_condition: "無応答 / 音声認識不能"
    save_to: "clinicalDepartment"
    next_step: "用件分岐_1"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約日"
    tts_announcement: "次に現在の予約日を「7月1日」のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「7月1日」「来週の火曜日」等の日付表現"
          output: "YYYY-MM-DD HH:MM 形式に正規化"
        - input: "相対日付（今日/明日/明後日）"
          output: "着信日時から換算。今日→当日日付、明日→翌日、明後日→翌々日"
        - input: "10-12月に1-9月の月を言われた場合"
          output: "翌年扱い（例: 2026年11月入電で「5月1日」→ 2027-05-01）"
      no_result_condition: "日付として解釈不能"
    save_to: "reservationDate"
    next_step: "当日判定"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "予約希望日"
    tts_announcement: "次に、予約の希望日をお伺いいたします。ご都合の良い日付や時間、曜日をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答"
    save_to: "desiredReservationDate"
    next_step: "jump_診察券番号"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "キャンセル理由"
    tts_announcement: "それでは、キャンセルの理由をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答"
    save_to: "reason"
    next_step: "jump_診察券番号"
    retry_failure: "skip"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。大分赤十字病院の外来予約専用AI電話です。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 代表案内系 ---
  - name: "END_新規案内"
    condition: "用件確認で「新規」判定"
    tts_announcement: "新規のご予約は代表電話へおかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_新規案内"

  - name: "END_当日案内"
    condition: "予約日が当日と判定"
    tts_announcement: "当日の予約変更・キャンセルは代表電話へおかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_当日案内"

  # --- 正常系（用件別）---
  - name: "END_変更"
    condition: "全聴取完了 かつ classification=変更"
    tts_announcement: "かしこまりました。予約変更の申し込みを受付いたしました。なお、このお電話ではご用件は完了しません。内容を確認のうえ、後ほどスタッフから折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更"

  - name: "END_キャンセル"
    condition: "全聴取完了 かつ classification=キャンセル"
    tts_announcement: "かしこまりました。予約キャンセルの申し込みを受付いたしました。なお、このお電話ではご用件は完了しません。内容を確認のうえ、後ほどスタッフから折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_確認"
    condition: "全聴取完了 かつ classification=確認"
    tts_announcement: "かしこまりました。ご予約に関するお問い合わせを受付いたしました。なお、このお電話ではご用件は完了しません。内容を確認のうえ、後ほどスタッフから折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_確認"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  notes: "Gen2 移管では完了系は smsFlag=1 固定。携帯/固定での SMS 配信制御は Dr.JOY 側の phonetype 参照で実施（フローは phonetype を保存するのみ）"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "内容確認"
  pre_termination: true
  notes: |
    パターン3（Gen2→Gen3 移管デフォルト）:
    - パターン1部分: 確認ルートの「内容確認」後に RAG検索① を挿入（Gen2 の FAQ判定/FAQ回答 を置換）
    - パターン2部分: 全用件の終話直前に RAG検索② を挿入（「最後にご質問は？」汎用RAG）
    両者とも同一サブフロー「大分赤十字病院$RAG検索」を呼び出す

