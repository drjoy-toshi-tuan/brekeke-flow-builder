version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "慈恵会西田病院"
  scenario_name: "診療"
  group_name: "慈恵会西田病院"            # 7文字、URL制限内
  flow_name: "慈恵会西田病院$診療"
  target_facility: "慈恵会西田病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"             # IVR着信番号(ARS)はBrekeke設定時に確認
  business_hours: "24時間稼働（GW期間 4/30 17:00 ～ 5/7 7:59 のみ案内停止）"
  flow_type: "subflow"
