# --- セクション11: 特記事項・制約 ---
special_notes:
  - "24h 稼働。営業時間チェック（acceptance_times）は配置しない。GW 休診期間（4/30 17:00 ～ 5/7 7:59）のみ Script (custom, calendar) で判定して END_GW へ。GW 期間は毎年メンテナンスが必要なリテラル日付。"
  - "代表電話番号 0972-22-0180 は END_初診代表案内 / END_代表案内 / END_聴取失敗 で 3 回繰り返し読み上げる（Gen1 main.番号案内→回数カウント→繰り返し のループを TTS テキスト内に展開）。"
  - "用件聴取で「初診（初めて受診・健康診断・紹介状）」を検出した場合は、AI 電話では対応せず END_初診代表案内 へ。Gen1 では echo_back なしで直接 END だが、Gen3 では echo_back: true により「初診、でよろしいでしょうか？」の確認を経由する。confirmation_items に Gen3 簡略化として記載。"
  - "診療科聴取の「消化器」発話のみ二段聴取（消化器内科 / 消化器外科）。他科は単発確定。echo_back は親 hearing にあり、子 hearing（消化器分岐）には echo_back なし。"
  - "予約日聴取_既存（現予約日）は datetime + DTMF 並走。Gen1 の「シャープ/アスタ + MM(2)+DD(2)= 4 桁 DTMF」と「比較日より前なら +1 年で確定」は OpenAI プロンプト + DTMF AmiVoice STT Input(termdtmf=#/*, dtmf_max_length=4) で実装。Gen1 にあった大正/昭和/平成/令和の元号判定は予約日では実質不要のため除外。"
  - "再診ルートでは 病院への追加連絡事項を聴取しない（Gen1 main.用件を判断_3 で再診は生年月日聴取へ直結）。変更/キャンセルのみ 病院への追加連絡事項を実施。"
  - "変更ルートでは 予約日（現在）と 予約候補日（新）の両方を聴取する（Gen1 仕様準拠）。"
  - "キャンセルルートでは 予約日 → キャンセル理由 → 病院への追加連絡事項 → 個人情報 の順で聴取。"
  - "個人情報は 生年月日 → 氏名 → 電話番号 のサブフロー 3 本（診察券番号サブフローは Gen1 にも無いため作成しない）。"
  - "smsFlag は 再診=1 / 予約変更=2 / 予約キャンセル=3。Gen1 main.smsflag1（再診）/ smsflag2（変更）/ 終話へ（CXL smsflag3）に準拠。終話 TTS は 再診/変更で同一文言、キャンセルのみ「予約キャンセルを受付いたしました」と短縮。"
  - "Gen1 の繋ぎ TTS（「それでは、」「続いて、」「最後に、」「つぎに、」「ありがとうございます。では次に、」）は次段ブロックの導入文言にマージし、独立ブロック化しない。"
  - "Gen1 用件聴取の echo_back は 4 段階（初診確認 / 再診確認 / キャンセル復唱 / 変更復唱）に分岐していたが、Gen3 では hearing 1 ブロック + scaffold 自動生成の Re-confirmation で吸収。OpenAI 出力値（再診/予約変更/予約キャンセル/初診/代表案内）が data に入って読み上げられる。"
  - "Gen1 の「医師名フリー聴取」は診療科確認の否定後に医師名を取得して逆引きする複雑なルートだが、Gen3 では診療科聴取の OpenAI プロンプトで医師名 → 該当診療科の推論を行わせて簡素化（例: 「波津久先生」→ 消化器外科 / 「奥田先生」→ 該当科）。"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "[BLOCKER] office_id（Dr.JOY 管理画面で確認）"
    resolved: false
  - item: "IVR 着信電話番号（ARS 番号、Brekeke 設定時に確認）"
    resolved: false
  - item: "[Dr.JOY側] SMS 送信文面（smsflag=1 再診 / smsflag=2 変更 / smsflag=3 キャンセル の 3 種類分）"
    resolved: false
  - item: "[Dr.JOY側] 認証設定（生年月日 / 電話番号 / 氏名 の優先順位）"
    resolved: false
