# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件聴取"
    tts_announcement: "ご用件を、次の3つのうちのいずれかでお話ください。定期受診の予約、予約を変更する、予約をキャンセルする、それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["再診", "予約変更", "予約キャンセル", "初診", "代表案内"]
      mapping:
        - input: "定期受診 / 再診 / 予約をとる / 受診の予約 / 診察 / 予約する 等の発話"
          output: "再診"
        - input: "変更 / 延期 / 取り直す / 別の日に / 変えたい 等の発話"
          output: "予約変更"
        - input: "キャンセル / 取り消し / やめる / 取消 等の発話"
          output: "予約キャンセル"
        - input: "初めて / 新規 / 紹介状 / 健康診断 / 健診の結果 等の発話"
          output: "初診"
        - input: "問い合わせ / その他 / 確認したい / 聞きたい / 教えて / 料金 / アクセス / 検査結果 等の発話"
          output: "代表案内"
      no_result_condition: "上記いずれにも該当しない場合"
    save_to: "classification"
    next_step: "条件分岐 (再診→診療科聴取_再診, 予約変更/キャンセル→診療科数確認, 初診→END_初診代表案内, 代表案内→END_代表案内)"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "診療科聴取_再診"
    tts_announcement: "受診を希望される診療科名をおっしゃってください。診療科がわからない場合は、わからない、とお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["リウマチ膠原病内科", "外科", "眼科", "呼吸器内科", "循環器内科", "小児科", "消化器", "腎臓内科", "整形外科", "透析科", "内科", "内分泌糖尿病内科", "脳神経外科", "泌尿器科", "皮膚科", "婦人科", "放射線科"]
      mapping:
        - input: "膠原病 / リウマチ / りうまち / りゅーまち 等"
          output: "リウマチ膠原病内科"
        - input: "外科（消化器系言及なし）/ げか 等"
          output: "外科"
        - input: "眼科 / がんか / 視力検査 等"
          output: "眼科"
        - input: "呼吸器 / 呼内 / 吸気 等"
          output: "呼吸器内科"
        - input: "循環器 / 循内 / ハート 等"
          output: "循環器内科"
        - input: "小児 / 小児科 等"
          output: "小児科"
        - input: "消化器（内科/外科未指定）/ 消火器 / 消内 / 消外 等"
          output: "消化器"
        - input: "腎臓 / 腎内 / じんない 等"
          output: "腎臓内科"
        - input: "整形 / 整形外科 等"
          output: "整形外科"
        - input: "透析 / とうせき 等"
          output: "透析科"
        - input: "内科（科別言及なし）/ ないか 等"
          output: "内科"
        - input: "内分泌 / 糖尿病 / 糖尿内科 等"
          output: "内分泌糖尿病内科"
        - input: "脳神経 / 脳外 / 脳神経外科 等"
          output: "脳神経外科"
        - input: "泌尿器 / 泌尿 / 泌尿器科 等"
          output: "泌尿器科"
        - input: "皮膚 / 皮膚科 等"
          output: "皮膚科"
        - input: "婦人科 / 産婦人科 / 子宮がん検診 / ふじん 等"
          output: "婦人科"
        - input: "放射線 / 放射線科 等"
          output: "放射線科"
        - input: "医師名（奥田/加隈/吉田/三股/山口/柴田/小田/森/清水/増田/中川/島袋/波津久/武内/木許）の発話"
          output: "OpenAI が医師名から該当診療科を逆引きして返却（不明時は NO_RESULT）"
      no_result_condition: "リスト外の診療科 / 医師名で逆引き不能 / わからない発話"
    save_to: "clinicalDepartment"
    next_step: "消化器→消化器分岐_再診, other→予約候補日聴取_再診"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "消化器分岐_再診"
    tts_announcement: "消化器内科と消化器外科の、どちらですか？"
    input_method: "voice_only"
    openai_rules:
      output_values: ["消化器内科", "消化器外科"]
      mapping:
        - input: "内科 / 消化器内科 / 消内 等"
          output: "消化器内科"
        - input: "外科 / 消化器外科 / 消外 等"
          output: "消化器外科"
      no_result_condition: "どちらとも判断不能"
    save_to: "clinicalDepartment"
    next_step: "予約候補日聴取_再診（全分岐共通）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "予約候補日聴取_再診"
    tts_announcement: "予約を希望される候補日を、教えてください。当日のご予約をご希望の場合は、代表電話へおかけなおしください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "発話なし / 5秒無言"
    save_to: "reservationCandidateDate"
    next_step: "生年月日聴取（subflow）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "診療科数確認"
    tts_announcement: "変更またはキャンセルされる診療科は、ひとつでしょうか。1つの場合は「はい」、2つ以上の場合は「いいえ」、でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["ひとつ", "複数"]
      mapping:
        - input: "はい / そうです / 1つ / 一つだけ 等"
          output: "ひとつ"
        - input: "いいえ / 違います / 複数 / 2つ以上 等"
          output: "複数"
      no_result_condition: "肯定/否定どちらとも判断不能"
    save_to: "departmentCount"
    next_step: "ひとつ→診療科聴取_既存, 複数→複数診療科名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "診療科聴取_既存"
    tts_announcement: "現在予約されている診療科名をお答えください。診療科がわからない場合は、わからない、とお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["リウマチ膠原病内科", "外科", "眼科", "呼吸器内科", "循環器内科", "小児科", "消化器", "腎臓内科", "整形外科", "透析科", "内科", "内分泌糖尿病内科", "脳神経外科", "泌尿器科", "皮膚科", "婦人科", "放射線科"]
      mapping:
        - input: "（診療科聴取_再診と同一マッピング）"
          output: "（同上）"
      no_result_condition: "リスト外 / わからない"
    save_to: "clinicalDepartment"
    next_step: "消化器→消化器分岐_既存, other→予約日聴取_既存"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "消化器分岐_既存"
    tts_announcement: "消化器内科と消化器外科の、どちらですか？"
    input_method: "voice_only"
    openai_rules:
      output_values: ["消化器内科", "消化器外科"]
      mapping:
        - input: "内科 / 消化器内科 等"
          output: "消化器内科"
        - input: "外科 / 消化器外科 等"
          output: "消化器外科"
      no_result_condition: "判断不能"
    save_to: "clinicalDepartment"
    next_step: "予約日聴取_既存"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "複数診療科名聴取"
    tts_announcement: "それでは、変更またはキャンセルされる診療科を、すべてお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "発話なし"
    save_to: "clinicalDepartmentsFree"
    next_step: "予約日聴取_既存"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "予約日聴取_既存"
    tts_announcement: "現在の予約日を、「4月1日」のように日付でおっしゃってください。なお、AIが予約日を正しく認識しない場合は、ダイヤルプッシュでの入力も可能です。シャープまたはアスタリスクの後に、月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping:
        - input: "音声「4月15日」「来週の火曜」等 → YYYY-MM-DD HH:MM 正規化"
          output: "datetime（年は推論、比較日より前なら +1 年）"
        - input: "DTMF（# または * の後 4 桁）「#0415」「*0415」等"
          output: "MM(2) + DD(2) → datetime（同上）"
      no_result_condition: "認識不可 / 不正な日付"
    save_to: "reservationDate"
    next_step: "予約日後分岐（CMR）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "予約候補日聴取_変更"
    tts_announcement: "変更を希望される候補日を教えてください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "発話なし"
    save_to: "reservationCandidateDate"
    next_step: "病院への追加連絡事項"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "キャンセル理由聴取"
    tts_announcement: "予約キャンセルの理由を、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "発話なし / 2回質問済で項目なし → 完了扱い（Gen1 仕様準拠）"
    save_to: "reason"
    next_step: "病院への追加連絡事項"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "病院への追加連絡事項"
    tts_announcement: "その他、病院への連絡事項はございますか。無ければ、「特にない」、のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "発話なし"
    save_to: "additionalNotes"
    next_step: "生年月日聴取（subflow）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（24h稼働のため通常未到達。デフォルト必須として保持）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達 / CMR 整合性不能"
    tts_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話番号へおかけなおしください。電話番号は、0972-22-0180、です。繰り返します。電話番号は、0972-22-0180、です。繰り返します。電話番号は、0972-22-0180、です。受付時間は、日曜祝日、年末年始を除く、月曜から金曜、7時30分から17時、土曜は7時30分から11時30分です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 施設固有 ---
  - name: "END_GW"
    condition: "GW 期間（4/30 17:00 ～ 5/7 7:59）の入電"
    tts_announcement: "恐れ入りますが、休診期間中のため、5月7日、木曜日、朝8時以降におかけください。お電話ありがとうございました。それでは失礼いたします。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_GW"

  - name: "END_初診代表案内"
    condition: "用件 = 初診（初めて受診 / 健康診断 / 紹介状）"
