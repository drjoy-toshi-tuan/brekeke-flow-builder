  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "慈恵会西田病院$診療"
      role: "main"
      description: "メインフロー。用件聴取→診療科/予約日/連絡事項→個人情報サブフロー→終話。"
  subflows:
    - name: "慈恵会西田病院$生年月日聴取_{date}"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 含む汎用パターン。Gen1 では大正/昭和/平成/令和の和暦判定があったが Gen3 では DOB Re-confirmation が一括処理する。"
    - name: "慈恵会西田病院$氏名聴取_{date}"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー 1 枠（モジュール選定ガイド §3.1.1）。Gen1 患者名聴取に対応。"
    - name: "慈恵会西田病院$電話番号聴取_{date}"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier + Phone Normalization + Re-confirmation を含む。Gen1 連絡先聴取の入電番号確認/別番号入力ロジックは Gen3 の電話番号サブフローテンプレで吸収。"

# --- セクション3: フローの目的 ---
purpose: |
  慈恵会西田病院の診療予約専用 AI 電話。患者からの電話を受け、用件（再診 / 予約変更 / 予約キャンセル / 初診 / 代表案内）を聴取し、
  再診ルートでは診療科 → 予約候補日 → 個人情報、変更ルートでは診療科数 → 診療科 → 現予約日 → 新候補日 → 連絡事項 → 個人情報、
  キャンセルルートでは診療科数 → 診療科 → 予約日 → キャンセル理由 → 連絡事項 → 個人情報を聴取して受付を自動化する。
  初診（健康診断・紹介状を含む）と一般問い合わせ（代表案内）は、AI では対応できない旨と代表電話番号 0972-22-0180 を 3 回繰り返し案内して切断する。
  GW 期間（4/30 17:00 ～ 5/7 7:59）は休診案内を再生して切断する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "慈恵会西田病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 → 切断
            └─ 通常   → 冒頭_アナウンス
                          → GW判定(Script: カレンダー判定)
                              ├─ GW期間   → END_GW → 切断
                              └─ 通常     → 用件聴取(hearing, enum, echo_back)
                                                ├─ 初診         → END_初診代表案内 → 切断
                                                ├─ 代表案内     → END_代表案内 → 切断
                                                ├─ 再診         → 診療科聴取_再診
                                                │                  ├─ 消化器 → 消化器分岐_再診 → 予約候補日聴取_再診
                                                │                  └─ other  → 予約候補日聴取_再診
                                                ├─ 予約変更     → 診療科数確認
                                                │                  ├─ ひとつ → 診療科聴取_既存
                                                │                  │             ├─ 消化器 → 消化器分岐_既存 → 予約日聴取_既存
                                                │                  │             └─ other  → 予約日聴取_既存
                                                │                  └─ 複数   → 複数診療科名聴取 → 予約日聴取_既存
                                                ├─ 予約キャンセル → 診療科数確認 → ...（同上）→ 予約日聴取_既存
                                                └─ other         → END_聴取失敗 → 切断

      予約日聴取_既存(現予約日 datetime, echo_back)
        → 予約日後分岐(CMR by classification)
            ├─ 予約変更      → 予約候補日聴取_変更 → 病院への追加連絡事項 → 生年月日聴取(sub) → 氏名聴取(sub) → 電話番号聴取(sub) → 終話分岐
            ├─ 予約キャンセル → キャンセル理由聴取 → 病院への追加連絡事項 → 生年月日聴取(sub) → 氏名聴取(sub) → 電話番号聴取(sub) → 終話分岐
            └─ other         → END_聴取失敗

      予約候補日聴取_再診(text)
        → 生年月日聴取(sub) → 氏名聴取(sub) → 電話番号聴取(sub) → 終話分岐

      終話分岐(CMR by classification)
        ├─ 再診           → END_受付完了_再診 (status=1, smsFlag=1)
        ├─ 予約変更        → END_受付完了_変更 (status=1, smsFlag=2)
        ├─ 予約キャンセル → END_受付完了_キャンセル (status=1, smsFlag=3)
        └─ other          → END_受付完了_再診 (フォールバック)
    notes: |
      use_acceptance_times: false（24h稼働）。GW 期間判定は Script (カレンダー) で実装。
      Gen1 の繋ぎ TTS（「それでは、」「続いて、」「最後に、」「つぎに、」「ありがとうございます。では次に、」等）は
      次段ブロックの導入文言にマージ。Gen1 main.yaml の 用件を判断 / _1 / _2 / _3 の 4 箱役割は
      OpenAI 直後分岐（Pattern A）と CMR（Pattern B 用件分岐 / 終話分岐）で吸収。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # =========================
  # 冒頭チェーン
  # =========================
  - step: 冒頭
    type: opening
    use_acceptance_times: false      # 24h稼働。GWのみ Script で別途判定
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: GW判定

  # =========================
  # GW 休診期間判定（カレンダー専用）
  # =========================
  - step: GW判定
    type: script
    script_template: custom
    reference_module: ""             # システム時刻を直接参照するためモジュール参照なし
    template_params: {}
    notes: "施設固有休館日判定。GW 期間（毎年 4/30 17:00 ～ 5/7 7:59）は休診案内を再生して切断する。OpenAI では正確に判断できないカレンダー比較のため Script を使用。毎年メンテナンスが必要なリテラル日付。"
    conditions:
      - match: "GW期間"
        next: END_GW
      - match: "other"
        next: 用件聴取

  # =========================
  # 用件聴取（Pattern A: OpenAI 直後 enum 分岐 + 復唱）
  # =========================
  - step: 用件聴取
    type: hearing
    output_format: enum
    conditions:
      - match: "再診"
        next: 診療科聴取_再診
      - match: "予約変更"
        next: 診療科数確認
      - match: "予約キャンセル"
        next: 診療科数確認
      - match: "初診"
        next: END_初診代表案内
      - match: "代表案内"
        next: END_代表案内
      - match: "other"
        next: END_聴取失敗

  # =========================
  # 再診ルート
  # =========================
  - step: 診療科聴取_再診
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "消化器"
        next: 消化器分岐_再診
      - match: "other"
        next: 予約候補日聴取_再診

  - step: 消化器分岐_再診
    type: hearing
    output_format: enum
    conditions:
      - match: "消化器内科"
        next: 予約候補日聴取_再診
      - match: "消化器外科"
        next: 予約候補日聴取_再診
      - match: "other"
        next: 予約候補日聴取_再診

  - step: 予約候補日聴取_再診
    type: hearing
    output_format: text
    next: 生年月日聴取
    retry_failure: end_failure

  # =========================
  # 予約変更 / 予約キャンセル 共通: 診療科数 → 診療科 → 予約日
  # =========================
  - step: 診療科数確認
    type: hearing
    output_format: enum
    conditions:
      - match: "ひとつ"
        next: 診療科聴取_既存
      - match: "複数"
        next: 複数診療科名聴取
      - match: "other"
        next: END_聴取失敗

  - step: 診療科聴取_既存
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "消化器"
        next: 消化器分岐_既存
      - match: "other"
        next: 予約日聴取_既存

  - step: 消化器分岐_既存
    type: hearing
    output_format: enum
    conditions:
      - match: "消化器内科"
        next: 予約日聴取_既存
      - match: "消化器外科"
        next: 予約日聴取_既存
      - match: "other"
        next: 予約日聴取_既存

  - step: 複数診療科名聴取
    type: hearing
    output_format: text
    next: 予約日聴取_既存
    retry_failure: end_failure

  - step: 予約日聴取_既存
    type: hearing
    output_format: datetime
    next: 予約日後分岐
    retry_failure: end_failure

  # =========================
  # 予約日聴取後の用件分岐（Pattern B: CMR by classification）
  # =========================
  - step: 予約日後分岐
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "予約変更"
        next: 予約候補日聴取_変更
      - match: "予約キャンセル"
        next: キャンセル理由聴取
      - match: "other"
        next: END_聴取失敗

  - step: 予約候補日聴取_変更
    type: hearing
    output_format: text
    next: 病院への追加連絡事項
    retry_failure: end_failure

  - step: キャンセル理由聴取
    type: hearing
    output_format: text
    next: 病院への追加連絡事項
    retry_failure: end_failure

  - step: 病院への追加連絡事項
    type: hearing
    output_format: text
    next: 生年月日聴取
    retry_failure: end_failure

  # =========================
  # 個人情報サブフロー（共通）
  # =========================
  - step: 生年月日聴取
    type: subflow
    flowname: "慈恵会西田病院$生年月日聴取_{date}"
    next: 氏名聴取

  - step: 氏名聴取
    type: subflow
    flowname: "慈恵会西田病院$氏名聴取_{date}"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "慈恵会西田病院$電話番号聴取_{date}"
    next: 終話分岐

  # =========================
  # 終話分岐（Pattern B: CMR by classification）
  # =========================
  - step: 終話分岐
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "再診"
        next: END_受付完了_再診
      - match: "予約変更"
        next: END_受付完了_変更
      - match: "予約キャンセル"
        next: END_受付完了_キャンセル
      - match: "other"
        next: END_受付完了_再診      # フォールバック

  # =========================
  # 終話ブロック
  # =========================
  - step: END_GW
    type: termination
    termination_ref: "END_GW"

  - step: END_初診代表案内
    type: termination
    termination_ref: "END_初診代表案内"

  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

  - step: END_受付完了_再診
    type: termination
    termination_ref: "END_受付完了_再診"

  - step: END_受付完了_変更
    type: termination
    termination_ref: "END_受付完了_変更"

  - step: END_受付完了_キャンセル
    type: termination
    termination_ref: "END_受付完了_キャンセル"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

