# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "診療"
      - "予防接種"
      - "その他"
      - "対象外"
    notes: "音声のみ。OpenAI で入力を 診療/予防接種/その他/対象外 に分類。『予約』『薬』→ 診療、『変更』『キャンセル』→ その他、リスト外質問 → 対象外"

  - order: 2
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "内科"
      - "泌尿器科"
      - "皮膚科"
      - "脳神経外科"
      - "消化器内科・胃腸"
      - "女性専門外来"
      - "整形外科"
      - "メディカルダイエット外来"
      - "登録なし"
    notes: "診療ルートのみ。復唱禁止。リスト外はレコメンド（『当院に〇〇はございませんが、〇〇でしょうか？』）。NO_RESULT時は『登録なし』保存"

  - order: 3
    name: "内容確認_診療"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "confirmation"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "記録優先モード。FAQ一致してもFAQ案内は一切しない。相槌も最小限で次へ"

  - order: 4
    name: "希望ワクチン"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "vaccine"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "インフルエンザワクチン"
      - "子宮頸がんワクチン"
      - "肺炎球菌ワクチン"
      - "帯状疱疹ワクチン"
      - "コロナワクチン"
    notes: "予防接種ルートのみ。復唱禁止。リスト外はレコメンド"

  - order: 5
    name: "その他内容確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "confirmation2"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "その他ルートのみ。FAQ案内モード（RAGサブフローで回答検索）。未マッチ時は『ありがとうございます』のみ"

  - order: 6
    name: "予約希望日時"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "診療・予防接種ルートのみ。フリーワード保存（日付形式に変換しない）"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、診察予約、予防接種、その他、からお選びください。変更やキャンセルも「その他」でお願いします。それではどうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "診療"
        - "予防接種"
        - "その他"
        - "対象外"
      mapping:
        - input: "診察予約／予約／印刷／定期／新薬／再診／最新／禁忌／薬／お薬／診療"
          output: "診療"
        - input: "予防接種／ワクチン／ワクチン接種"
          output: "予防接種"
        - input: "変更／キャンセル／その他／取消／取り消し"
          output: "その他"
        - input: "上記いずれにも該当しない質問（アクセス、費用、診療時間の単発質問等）"
          output: "対象外"
      no_result_condition: "音声が聞き取れなかった場合"
    save_to: "classification"
    next_step: "jump_氏名聴取（対象外→END_FAQなし案内）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "診療科"
    tts_announcement: "診療科がわかれば最初にお知らせください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "泌尿器科"
        - "皮膚科"
        - "脳神経外科"
        - "消化器内科・胃腸"
        - "女性専門外来"
        - "整形外科"
        - "メディカルダイエット外来"
        - "登録なし"
      mapping:
        - input: "内科／風邪／発熱／花粉／糖尿病"
          output: "内科"
        - input: "泌尿器／おしっこ／尿／性病／石"
          output: "泌尿器科"
        - input: "皮膚／やけど／湿疹／痒み"
          output: "皮膚科"
        - input: "脳神経／頭痛／頭／ふらつき／めまい"
          output: "脳神経外科"
        - input: "消化器／胃腸／内視鏡／胃カメラ／腹痛／下痢／胸やけ／ピロリ／消化器科（誤呼称）"
          output: "消化器内科・胃腸"
        - input: "婦人科／女性外来／おりもの／生理"
          output: "女性専門外来"
        - input: "整形／腰／肩／関節"
          output: "整形外科"
        - input: "ダイエット／メディカルダイエット／マンジャロ"
          output: "メディカルダイエット外来"
        - input: "上記リストにない診療科"
          output: "登録なし"
      no_result_condition: "音声が聞き取れなかった場合 → saveContext2DB で『登録なし』を格納してから次へ"
    save_to: "clinicalDepartment"
    next_step: "内容確認_診療"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "内容確認_診療"
    tts_announcement: "今日はどうされましたか？"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "OpenAI不要（text保存）"
    save_to: "confirmation"
    next_step: "jump_診察券番号聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "希望ワクチン"
    tts_announcement: "ご希望のワクチンを、インフルエンザワクチンまたはコロナワクチンからお選びください。その他ワクチンをご希望の場合は、ワクチン名をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "インフルエンザワクチン"
        - "子宮頸がんワクチン"
        - "肺炎球菌ワクチン"
        - "帯状疱疹ワクチン"
        - "コロナワクチン"
      mapping:
        - input: "インフル／インフルエンザ"
          output: "インフルエンザワクチン"
        - input: "子宮頸がん／子宮／HPV／ガーダシル／シルガード／4価ワクチン／9価ワクチン"
          output: "子宮頸がんワクチン"
        - input: "肺炎／肺炎球菌／ニューモバックス"
          output: "肺炎球菌ワクチン"
        - input: "帯状疱疹／シングリックス"
          output: "帯状疱疹ワクチン"
        - input: "コロナ／コロナウイルス／コロナワクチン"
          output: "コロナワクチン"
      no_result_condition: "リスト外ワクチン発話時はレコメンド（OpenAIプロンプトで対応）"
    save_to: "vaccine"
    next_step: "jump_診察券番号聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "その他内容確認"
    tts_announcement: "その他のお問合せ。予約の変更。キャンセル。についてお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "OpenAI不要（text保存）。RAGサブフローに遷移してFAQ検索"
    save_to: "confirmation2"
    next_step: "jump_RAG検索"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約希望日時"
    tts_announcement: "希望する日にちとお時間をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "OpenAI不要（text保存、フリーワードのまま）"
    save_to: "DesiredreservationDate"
    next_step: "jump_電話番号聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須） ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（24h応答のため実運用では到達しない。テンプレート要件で定義のみ残す）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件確認時のみ到達）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"
  # --- 正常系 ---
  - name: "END_受付完了_携帯"
    condition: "全聴取完了 かつ phonetype=携帯"
    tts_announcement: "内容を確認後、スタッフからお電話またはＳＭＳでご連絡します。ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_携帯"
  - name: "END_受付完了_固定"
    condition: "全聴取完了 かつ phonetype=その他（固定・不明含む）"
    tts_announcement: "内容を確認後、スタッフからお電話またはＳＭＳでご連絡します。ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_受付完了_固定"
  - name: "END_FAQなし案内"
    condition: "用件確認で対象外（FAQ非対応質問）と判定"
    tts_announcement: "ご質問いただいた内容はAI電話ではご対応できませんので、代表電話の『03-6426-5933』におかけ直しください。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_FAQなし案内"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"
  patterns:
    - condition: "phonetype=携帯"
      sms_flag: "1"
      notes: "携帯着信時はSMSで詳細送信"
    - condition: "phonetype=その他"
      sms_flag: "0"
      notes: "固定・不明はSMS送信なし（固定はSMS受信不可）"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "1"
  inquiry_insertion_point: "その他内容確認"
  pre_termination: false

