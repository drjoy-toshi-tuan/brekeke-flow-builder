# 設計書 — 大星クリニック 診療
# 生成元: @director / 2026-04-20
# 入力: docs/migration/gen2_大星クリニック_診療.md
# 元資料: docs/reference/customer_docs/【診療1】：大星クリニック.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "大星クリニック"
  group_name: "大星クリニック"
  flow_name: "大星クリニック$診療"
  target_facility: "大星クリニック（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"           # 着信IVR番号（代表 03-6426-5933 はFAQなし案内時の誘導先）
  business_hours: "なし（24時間AI応答）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "大星クリニック$診療"
      role: "main"
      description: "メインフロー。用件聴取→個人情報聴取サブフロー→用件別聴取→連絡先→終話"
  subflows:
    - name: "大星クリニック$氏名"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "復唱なし。苗字のみ発話時の『下のお名前もお伺いしてもよろしいですか？』再聴取ロジックを必要。標準サブフローが対応していない場合は拡張要（confirmation_items 参照）"
    - name: "大星クリニック$生年月日"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "入電者が発話した暦（西暦/和暦）にそのまま合わせて復唱（『〇年〇月〇日ですね。』）"
    - name: "大星クリニック$診察券番号"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "復唱なし。『持っていない』発話を許容。DTMF入力対応"
    - name: "大星クリニック$電話番号"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier で 携帯(060/070/080/090)/固定/不明 を3分岐。携帯は着信番号を自動格納して連絡先質問を完全スキップ。固定/不明は聴取→Phone Normalization→復唱。出口で phonetype=携帯/その他 を設定"
    - name: "大星クリニック$RAG検索"
      target: "FAQ検索"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "『その他』用件の『その他内容確認』聴取後のみ呼び出す。FAQ未マッチ時は『ありがとうございます』のみ発話して次へ"

# --- セクション3: フローの目的 ---
purpose: |
  大星クリニックへの予約専用電話。AIオペレーターが用件（診療／予防接種／その他）を判定し、
  患者情報と用件別の聴取項目を取得して Dr.JOY に保存する。通話完了後にスタッフからの折り返し
  または SMS 連絡につなぐ。24時間AI応答。携帯電話着信時は連絡先聴取をスキップし、SMS送信フラグを
  立てて終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "大星クリニック$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知 → 切断
            └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS)
                                  → 用件確認(hearing, enum)
                                      ├─ 対象外 → FAQなし_アナウンス → 完了フラグ_FAQなし案内 → 切断
                                      └─ 診療/予防接種/その他
                                          → jump_氏名聴取(subflow)
                                          → jump_生年月日聴取(subflow)
                                          → 用件分岐(ContextMatchRouter: classification)
                                              ├─ 診療 → 診療科(hearing) → 内容確認_診療(hearing, text)
                                              │           → jump_診察券番号聴取 → 予約希望日時(hearing, text)
                                              │           → jump_電話番号聴取
                                              │               → 終話分岐_電話種別(ContextMatchRouter: phonetype)
                                              │                   ├─ 携帯 → END_受付完了_携帯(smsFlag=1)
                                              │                   └─ その他 → END_受付完了_固定(smsFlag=0)
                                              ├─ 予防接種 → 希望ワクチン(hearing)
                                              │           → jump_診察券番号聴取 → 予約希望日時
                                              │           → jump_電話番号聴取 → 終話分岐_電話種別
                                              └─ その他 → その他内容確認(hearing, text)
                                                          → jump_RAG検索(subflow)
                                                          → jump_電話番号聴取 → 終話分岐_電話種別
                                                          （診察券番号・予約希望日時は聴取しない）
    notes: "時間外判定（acceptance_times）なし。携帯/固定 SMS 送信有無は phonetype で分岐"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  # --- 冒頭アナウンス ---
  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # --- 用件確認 (Pattern A: OpenAI直後分岐) ---
  - step: 用件確認
    type: hearing
    stt_type: AmiVoice_STT
    echo_back: false
    save_to: classification
    output_format: enum
    output_labels:
      - 診療
      - 予防接種
      - その他
      - 対象外
    conditions:
      - match: "診療"
        next: jump_氏名聴取
      - match: "予防接種"
        next: jump_氏名聴取
      - match: "その他"
        next: jump_氏名聴取
      - match: "対象外"
        next: END_FAQなし案内
    retry_failure: end_failure
    notes: |
      『予約』『薬』『お薬』→ 診療 にマップ。『印刷』『定期』『新薬』『再診』『最新』『禁忌』→ 診療。
      変更・キャンセルは『その他』にマップ。リスト外の質問（FAQ非対応）は『対象外』を出力して END_FAQなし案内 へ。

  # --- 氏名聴取サブフロー ---
  - step: jump_氏名聴取
    type: subflow
    flowname: "大星クリニック$氏名"
    next: jump_生年月日聴取

  # --- 生年月日聴取サブフロー ---
  - step: jump_生年月日聴取
    type: subflow
    flowname: "大星クリニック$生年月日"
    next: 用件分岐

  # --- 用件分岐 (Pattern B: context_match_router on classification) ---
  - step: 用件分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "診療"
        next: 診療科
      - match: "予防接種"
        next: 希望ワクチン
      - match: "その他"
        next: その他内容確認

  # ================== 診療ルート ==================
  - step: 診療科
    type: hearing
    stt_type: AmiVoice_STT
    echo_back: false
    save_to: clinicalDepartment
    output_format: enum
    no_result_default: "登録なし"
    output_labels:
      - 内科
      - 泌尿器科
      - 皮膚科
      - 脳神経外科
      - 消化器内科・胃腸
      - 女性専門外来
      - 整形外科
      - メディカルダイエット外来
      - 登録なし
    conditions:
      - match: "default"
        next: 内容確認_診療
    retry_failure: skip
    notes: "リストにない科の場合は『当院に〇〇はございませんが、〇〇でしょうか？』と近い診療科をレコメンド（OpenAIプロンプトで処理）。復唱・相槌なしで次へ。"

  - step: 内容確認_診療
    type: hearing
    stt_type: AmiVoice_STT
    echo_back: false
    save_to: confirmation
    output_format: text
    next: jump_診察券番号聴取
    retry_failure: skip
    notes: "『記録優先モード』。入電者の発言がFAQと一致してもFAQ回答は一切行わない。記録のみして次へ進む。"

  # ================== 予防接種ルート ==================
  - step: 希望ワクチン
    type: hearing
    stt_type: AmiVoice_STT
    echo_back: false
    save_to: vaccine
    output_format: enum
    output_labels:
      - インフルエンザワクチン
      - 子宮頸がんワクチン
      - 肺炎球菌ワクチン
      - 帯状疱疹ワクチン
      - コロナワクチン
    conditions:
      - match: "default"
        next: jump_診察券番号聴取
    retry_failure: skip
    notes: "リスト外ワクチンの場合は『当院に〇〇はございませんが、〇〇でしょうか？』と近いワクチンをレコメンド。復唱・相槌なしで次へ。"

  # ================== その他ルート ==================
  - step: その他内容確認
    type: hearing
    stt_type: AmiVoice_STT
    echo_back: false
    save_to: confirmation2
    output_format: text
    next: jump_RAG検索
    retry_failure: skip
    notes: "FAQ案内モード。質問の復唱・前置きはしない。RAG検索サブフローで回答を取得。未マッチ時は『ありがとうございます』のみ発話して次へ。"

  - step: jump_RAG検索
    type: subflow
    flowname: "大星クリニック$RAG検索"
    next: jump_電話番号聴取
    # 『その他』ルート専用。診察券番号・予約希望日時を聞かずに電話番号聴取へ

  # ================== 共通後続（診療・予防接種） ==================
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "大星クリニック$診察券番号"
    next: 予約希望日時

  - step: 予約希望日時
    type: hearing
    stt_type: AmiVoice_STT
    echo_back: false
    save_to: DesiredreservationDate
    output_format: text
    next: jump_電話番号聴取
    retry_failure: skip
    notes: |
      フリーワードで言われたままを文字起こし（日付形式に変換しない）。『5月の20日』等の繋ぎ言葉許容。
      『今日／明日／明後日』のみ着信日時から換算。過去日付は未来の日付かどうか確認を促す。

  # ================== 連絡先・終話 ==================
  - step: jump_電話番号聴取
    type: subflow
    flowname: "大星クリニック$電話番号"
    next: 終話分岐_電話種別

  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_受付完了_携帯
      - match: "その他"
        next: END_受付完了_固定

  # --- 終話ブロック ---
  - step: END_受付完了_携帯
    type: termination
    termination_ref: "END_受付完了_携帯"

  - step: END_受付完了_固定
    type: termination
    termination_ref: "END_受付完了_固定"

  - step: END_FAQなし案内
    type: termination
    termination_ref: "END_FAQなし案内"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
