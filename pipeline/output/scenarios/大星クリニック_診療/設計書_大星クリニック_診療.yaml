    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "診療"
      - id: "2"
        order: "2"
        value: "予防接種"
      - id: "3"
        order: "3"
        value: "その他"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。『予約』『変更』『キャンセル』は OpenAI プロンプトで診療/その他 にマップ"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
