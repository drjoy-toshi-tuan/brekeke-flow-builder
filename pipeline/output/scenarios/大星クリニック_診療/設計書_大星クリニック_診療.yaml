# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【復唱禁止ルール】生年月日と連絡先電話番号（新規口頭発話時のみ）以外は一切復唱禁止。患者名・診察券番号・診療科・ワクチン・予約希望日時の echo_back は絶対に生成しない（2026/3/23 改訂）"
  - "【AI内部思考の発話禁止】『スキップします』『確認は不要です』『〇〇のルールに基づき』等のメタ発話を絶対に出さない。指定されたアナウンス文のみを発話する（prompter に明示制約として入れる）"
  - "【用件マッピング】『印刷／定期／新薬／再診／最新／禁忌』→ 診療、『薬／お薬／予約』→ 診療、『変更／キャンセル』→ その他、リスト外質問 → 対象外"
  - "【診療科・ワクチンのレコメンド機能】リスト外発話時『当院に〇〇はございませんが、〇〇でしょうか？』と類似候補を提示（OpenAI プロンプトで実装）。ただし回答待ちで次へ進まず、肯定発話を待つ"
  - "【その他ルートの特例】診察券番号・予約希望日時は聞かない（customer_doc §5 明記）。その他内容確認 → RAG検索 → 電話番号聴取 で直行"
  - "【診療用件の FAQ 禁止】内容確認_診療 では入電者の発言がFAQと一致しても回答を読み上げない。記録のみ。RAG呼び出し禁止"
  - "【その他用件のみ FAQ 案内モード】その他内容確認 だけで RAG サブフローを呼ぶ。未マッチ時は『ありがとうございます』のみ発話"
  - "【日付処理】予約希望日時はフリーワードでそのまま文字起こし。『今日／明日／明後日』のみ着信日時から換算。『5月の20日』『今月の20日』等の繋ぎ言葉を許容。過去日付指定時は未来かどうか確認"
  - "【携帯スキップ】着信番号先頭が 090/080/070/060 の場合、電話番号サブフロー内で連絡先質問を完全スキップし、着信番号を additionalPhoneNumber に自動格納。phonetype=携帯"
  - "【非通知扱い】Gen2仕様では非通知も受付して電話番号を口頭聴取（条件C）。第3世代標準 opening chain では非通知を弾く実装（END_非通知）。本設計書は標準通り弾く（confirmation_items 参照）"
  - "【24時間対応】acceptance_times 不要。END_時間外 は template 要件で定義のみ残すが到達しない"
  - "【氏名の下の名前追加聴取】苗字のみ発話時に『下のお名前もお伺いしてもよろしいですか？』で再聴取。復唱確認ではない再質問。氏名サブフロー内で対応要（標準サブフローで対応可能か要確認 → confirmation_items）"
  - "【TTS制約】`{tts_g:...}` 小文字形式固定。SSML タグ（`<break>`, `<speak type=\"telephone\">`, `<dtmf>`, `<forward>` 等）は Gen3 では禁止。customer_doc に多数登場するがすべて除去して運用。電話番号復唱は Phone Normalization + Re-confirmation モジュールで代替。DTMF 受付は Brekeke 側 STT モジュール設定で対応"
  - "【顧客側設定】受付時間・SMS文面・認証設定（生年月日/診察券番号/電話番号の優先順位）は Dr.JOY 側で設定。フローJSONには含まない"

# --- セクション12: 要確認事項 ---
confirmation_items:
