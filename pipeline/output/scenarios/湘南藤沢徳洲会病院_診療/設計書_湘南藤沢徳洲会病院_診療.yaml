version: "1.0"

# =====================================================
# セクション1: 基本情報
# =====================================================
basic_info:
  facility_name: "湘南藤沢徳洲会病院"
  scenario_name: "診療"
  group_name: "湘南藤沢徳洲会病院"
  flow_name: "湘南藤沢徳洲会病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "0466-35-1177"
