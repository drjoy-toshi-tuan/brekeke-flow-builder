# =====================================================
# セクション2: フロー構成
# =====================================================
flow_structure:
  type: "subflow"
  flows:
    - name: "湘南藤沢徳洲会病院$診療"
      role: "main"
      description: "湘南藤沢徳洲会病院の診療予約受付フロー。用件 5 分類（初診予約/再診予約/予約変更/予約キャンセル/予約確認）+ 用件 echo_back、診療科 × 用件マトリクス（産科/小児科小児外科/眼科の初診代表案内、側弯症/人間ドックの直通電話案内、耳鼻咽喉科/泌尿器科の直接来院案内、循環器科の紹介状あり時直接来院、対象外診療科の代表電話/予約センター案内）、整形外科の脊椎疾患→側弯症 cascade、紹介状あり初診の医師指定→紹介元医療機関→医師名追加聴取、変更/キャンセルの予約日+理由聴取、キャンセルの再予約希望確認、最終的に classification × phonetype の終話 8 分岐を実装する。"
  subflows:
    - name: "湘南藤沢徳洲会病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。patientName を返却。"
    - name: "湘南藤沢徳洲会病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（DOB Re-confirmation 復唱あり）。patientDateOfBirth を返却。"
    - name: "湘南藤沢徳洲会病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（incoming-classifier + Phone Normalization + 復唱あり）。additionalPhoneNumber と phonetype（1=携帯/ip050、2=その他/landline/withheld）を返却。"
    - name: "湘南藤沢徳洲会病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。medicalCardNumber を返却。初診（用件＝初診予約）はスキップする。"

# =====================================================
# セクション3: フローの目的
# =====================================================
purpose: >
  湘南藤沢徳洲会病院の外来予約に関する電話を受け、初診予約・再診予約・予約変更・予約キャンセル・予約確認の 5 用件を分類し、
  紹介状有無・診療科・予約日・理由・患者個人情報を聴取する。
  診療科ごとの受付可否マトリクス（初診不可診療科/直通電話案内/予約制ではない直接来院/対象外代表電話/対象外予約センター）に従って終話誘導し、
  受付可な場合は classification × phonetype（携帯/固定）の 2 段分岐で 8 パターンの終話 TTS を出し分ける。

# =====================================================
# セクション4: シナリオフロー図
# =====================================================
flow_diagrams:
  - flow_name: "湘南藤沢徳洲会病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常 → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → 用件聴取 (enum + echo_back: 初診予約/再診予約/予約変更/予約キャンセル/予約確認)
                                           ├─ 初診予約 → 紹介状有無聴取
                                           │            ├─ あり → 紹介状医師指定確認
                                           │            │       ├─ あり → 紹介元医療機関聴取 → 医師名聴取 → 診療科_初診
                                           │            │       └─ なし/不明 → 診療科_初診
                                           │            └─ なし/不明 → 診療科_初診
                                           ├─ 再診予約 → 診療科_再診
                                           ├─ 予約変更 → 診療科_変更 → 予約日_変更 → 理由_変更 → jump_氏名聴取
                                           ├─ 予約キャンセル → 診療科_キャンセル → 予約日_キャンセル → 理由_キャンセル → 再予約希望確認
                                           │                  ├─ 希望する → 予約希望時期聴取 → jump_氏名聴取
                                           │                  └─ 希望しない → jump_氏名聴取
                                           └─ 予約確認 → 確認内容聴取 → 診療科_確認 → jump_氏名聴取

                                        診療科_初診 特殊分岐:
                                           ├─ 産科 → END_産科代表
                                           ├─ 小児科小児外科 → END_小児科代表
                                           ├─ 眼科 → END_眼科代表
                                           ├─ 側弯症 → END_側弯症直通
                                           ├─ 整形外科 → 脊椎疾患確認(yes/no)
                                           │              ├─ yes → 側弯症確認(yes/no)
                                           │              │         ├─ yes → END_側弯症直通
                                           │              │         └─ no → jump_氏名聴取（股関節外来扱い）
                                           │              └─ no → jump_氏名聴取（通常整形外科初診）
                                           ├─ 人間ドック検診センター → END_人間ドック直通
                                           ├─ 耳鼻咽喉科 → 味覚嗅覚外来確認(yes/no)
                                           │                ├─ yes → jump_氏名聴取
                                           │                └─ no → END_耳鼻咽喉科直接来院
                                           ├─ 泌尿器科 → END_泌尿器科直接来院
                                           ├─ 循環器科 → 紹介状チェック(あり→END_循環器科直接来院 / 他→jump_氏名聴取)
                                           ├─ リハビリテーション科 → END_対象外代表
                                           ├─ 救急総合診療部 → END_救急総合代表
                                           ├─ 内視鏡 → END_対象外代表
                                           ├─ 集中治療科/病理診断科/放射線診断科 → END_対象外予約センター
                                           └─ default → jump_氏名聴取

                                        診療科_再診 特殊分岐: 人間ドック→直通 / リハ・内視鏡→対象外代表 / 救急総合→救急総合代表 / 集中治療・病理・放射線→対象外予約センター / default→jump_氏名聴取
                                        診療科_変更/キャンセル/確認: 全診療科 default → 通常ルート（対象外でも通常ルート許可）

                                        共通個人情報聴取(jump_氏名 → jump_生年月日 → 診察券要否CMR → [初診以外] jump_診察券番号 → jump_電話番号)
                                          → 終話分岐_用件 (classification)
                                              ├─ 初診予約/再診予約 → 終話分岐_診療予約_電話種別 → END_診療予約_携帯/固定
                                              ├─ 予約変更 → 終話分岐_予約変更_電話種別 → END_予約変更_携帯/固定
                                              ├─ 予約キャンセル → 終話分岐_予約キャンセル_電話種別 → END_予約キャンセル_携帯/固定
                                              └─ 予約確認 → 終話分岐_予約確認_電話種別 → END_予約確認_携帯/固定
    notes: "診療科特殊分岐は Pattern A（hearing.conditions で直接 END_* に飛ばす）。循環器科のみ紹介状有無で 2 context 必要なため後段 CMR で referralLetter を参照（Pattern B）。終話は classification × phonetype の 2 段 ContextMatchRouter（Pattern B）。"

# =====================================================
# セクション4b: シナリオフロー定義（ブロック構成）
# =====================================================
scenario_flow:
  # ---------- 冒頭 ----------
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件聴取

  # ---------- 用件聴取（Pattern A + echo_back） ----------
  - step: 用件聴取
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "初診予約"
        next: 紹介状有無聴取
      - match: "再診予約"
        next: 診療科_再診
      - match: "予約変更"
        next: 診療科_変更
      - match: "予約キャンセル"
        next: 診療科_キャンセル
      - match: "予約確認"
        next: 確認内容聴取
      - match: "other"
        next: END_聴取失敗

  # =====================================================
  # 初診ルート（紹介状確認 → 医師指定 → 紹介元医療機関 → 医師名 → 診療科）
  # =====================================================
  - step: 紹介状有無聴取
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: 紹介状医師指定確認
      - match: "なし"
        next: 診療科_初診
      - match: "不明"
        next: 診療科_初診
      - match: "other"
        next: 診療科_初診

  - step: 紹介状医師指定確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: 紹介元医療機関聴取
      - match: "なし"
        next: 診療科_初診
      - match: "不明"
        next: 診療科_初診
      - match: "other"
        next: 診療科_初診

  - step: 紹介元医療機関聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 医師名聴取

  - step: 医師名聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 診療科_初診

  - step: 診療科_初診
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "産科"
        next: END_産科代表
      - match: "小児科小児外科"
        next: END_小児科代表
      - match: "眼科"
        next: END_眼科代表
      - match: "脊椎側弯症外科"
        next: END_側弯症直通
      - match: "整形外科"
        next: 脊椎疾患確認
      - match: "人間ドック検診センター"
        next: END_人間ドック直通
      - match: "耳鼻咽喉科"
        next: 味覚嗅覚外来確認
      - match: "泌尿器科"
        next: END_泌尿器科直接来院
      - match: "循環器科"
        next: 循環器科紹介状チェック
      - match: "リハビリテーション科"
        next: END_対象外代表
      - match: "救急総合診療部"
        next: END_救急総合代表
      - match: "内視鏡"
        next: END_対象外代表
      - match: "集中治療科"
        next: END_対象外予約センター
      - match: "病理診断科"
        next: END_対象外予約センター
      - match: "放射線診断科"
        next: END_対象外予約センター
      - match: "other"
        next: jump_氏名聴取

  # 整形外科 cascade: 脊椎疾患→側弯症
  - step: 脊椎疾患確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "はい"
        next: 側弯症確認
      - match: "いいえ"
        next: jump_氏名聴取
      - match: "other"
        next: jump_氏名聴取

  - step: 側弯症確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "はい"
        next: END_側弯症直通
      - match: "いいえ"
        next: jump_氏名聴取
      - match: "other"
        next: jump_氏名聴取

  - step: 味覚嗅覚外来確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "はい"
        next: jump_氏名聴取
      - match: "いいえ"
        next: END_耳鼻咽喉科直接来院
      - match: "other"
        next: END_耳鼻咽喉科直接来院

  - step: 循環器科紹介状チェック
    type: context_match_router
    reference_module: "OpenAI_紹介状有無聴取"
    conditions:
      - match: "あり"
        next: END_循環器科直接来院
      - match: "other"
        next: jump_氏名聴取

  # =====================================================
  # 再診ルート
  # =====================================================
  - step: 診療科_再診
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "人間ドック検診センター"
        next: END_人間ドック直通
      - match: "リハビリテーション科"
        next: END_対象外代表
      - match: "救急総合診療部"
        next: END_救急総合代表
      - match: "内視鏡"
        next: END_対象外代表
      - match: "集中治療科"
        next: END_対象外予約センター
      - match: "病理診断科"
        next: END_対象外予約センター
      - match: "放射線診断科"
        next: END_対象外予約センター
      - match: "other"
        next: jump_氏名聴取

  # =====================================================
  # 予約変更ルート
  # =====================================================
  - step: 診療科_変更
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "other"
        next: 予約日_変更

  - step: 予約日_変更
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 理由_変更

  - step: 理由_変更
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_氏名聴取

  # =====================================================
  # 予約キャンセルルート
  # =====================================================
  - step: 診療科_キャンセル
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "other"
        next: 予約日_キャンセル

  - step: 予約日_キャンセル
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 理由_キャンセル

  - step: 理由_キャンセル
    type: hearing
    output_format: text
    retry_failure: skip
    next: 再予約希望確認

  - step: 再予約希望確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "希望する"
        next: 予約希望時期聴取
      - match: "希望しない"
        next: jump_氏名聴取
      - match: "other"
        next: jump_氏名聴取

  - step: 予約希望時期聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_氏名聴取

  # =====================================================
  # 予約確認ルート
  # =====================================================
  - step: 確認内容聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 診療科_確認

  - step: 診療科_確認
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "other"
        next: jump_氏名聴取

  # =====================================================
  # 共通: 個人情報聴取
  # =====================================================
  - step: jump_氏名聴取
    type: subflow
    flowname: "湘南藤沢徳洲会病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "湘南藤沢徳洲会病院$生年月日聴取"
    next: 診察券要否CMR

  - step: 診察券要否CMR
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "初診予約"
        next: jump_電話番号聴取
      - match: "other"
        next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "湘南藤沢徳洲会病院$診察券番号聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "湘南藤沢徳洲会病院$電話番号聴取"
    next: 終話分岐_用件

  # =====================================================
  # 終話分岐（Pattern B: classification × phonetype 2 段）
  # =====================================================
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "初診予約"
        next: 終話分岐_診療予約_電話種別
      - match: "再診予約"
        next: 終話分岐_診療予約_電話種別
      - match: "予約変更"
        next: 終話分岐_予約変更_電話種別
      - match: "予約キャンセル"
        next: 終話分岐_予約キャンセル_電話種別
      - match: "予約確認"
        next: 終話分岐_予約確認_電話種別
      - match: "other"
        next: END_聴取失敗

  - step: 終話分岐_診療予約_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_診療予約_携帯
      - match: "other"
        next: END_診療予約_固定

  - step: 終話分岐_予約変更_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_予約変更_携帯
      - match: "other"
        next: END_予約変更_固定

  - step: 終話分岐_予約キャンセル_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_予約キャンセル_携帯
      - match: "other"
        next: END_予約キャンセル_固定

  - step: 終話分岐_予約確認_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
