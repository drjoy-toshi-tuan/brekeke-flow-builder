step_details:
  - step_name: "用件聴取"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話ください。「予約を取るは、1」、「変更は、2」、「キャンセルは、3」、「確認は、4」、それでは、お願いします。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["初診予約", "再診予約", "予約変更", "予約キャンセル", "予約確認"]
      mapping:
        - { input: "DTMF 1 / 予約 / 取る / 新規 / 初めて / 初診 / しょしん / 新患", output: "初診予約" }
        - { input: "再診 / さいしん / 二回目 / 定期受診", output: "再診予約" }
        - { input: "DTMF 2 / 変更 / へんこう / 延期 / 日程変更 / 別の日", output: "予約変更" }
        - { input: "DTMF 3 / キャンセル / きゃんせる / 取り消し / やめる", output: "予約キャンセル" }
        - { input: "DTMF 4 / 確認 / かくにん / いつ / 教えて / 予約日時", output: "予約確認" }
        - { input: "DTMF 1 + 受診歴あり相当（再診を強く示唆する『以前来た』『前回』等）", output: "再診予約" }
      no_result_condition: "上記いずれにも該当しない発話 → 3 回目で END_聴取失敗"
    save_to: "classification"
    next_step: "初診予約→紹介状有無聴取 / 再診予約→診療科_再診 / 予約変更→診療科_変更 / 予約キャンセル→診療科_キャンセル / 予約確認→確認内容聴取 / NO_RESULT→END_聴取失敗"
    retry_failure: "end_failure"
    retry_failure_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、祝日を除く、月曜から金曜の9時から16時、土曜の、9時から14時に、予約センターへおかけなおしください。電話番号が分かる場合は、そのままお電話をお切りください。分からない場合はご案内いたしますので、メモをご準備ください。お電話番号は、0466-35-1350、です。繰り返します。お電話番号は、0466-35-1350、です。繰り返します。お電話番号は、0466-35-1350、です。それでは、失礼いたします。"

  - step_name: "紹介状有無聴取"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか? お持ちの場合は1、お持ちでない場合は2を押してください。ダイヤルプッシュでも操作可能です。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["あり", "なし", "不明"]
      mapping:
        - { input: "DTMF 1 / はい / 持っています / もらいました / 受け取りました / あります", output: "あり" }
        - { input: "DTMF 2 / いいえ / 持っていません / もらってない / ありません", output: "なし" }
        - { input: "わからない / 覚えてない / 知らない / 聞いていない / 忘れた", output: "不明" }
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "referralLetter"
    next_step: "あり→紹介状医師指定確認 / なし→診療科_初診 / 不明→診療科_初診 / NO_RESULT→診療科_初診"
    retry_failure: "skip"

  - step_name: "紹介状医師指定確認"
    tts_announcement: "紹介状の封筒の表面に、先生のお名前が書かれていますか? 書かれている場合は1、書かれていない場合は2を押してください。わからない場合は、「わからない」とおっしゃってください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["あり", "なし", "不明"]
      mapping:
        - { input: "DTMF 1 / はい / 書かれている / 書いてある / 記載あり / あります", output: "あり" }
        - { input: "DTMF 2 / いいえ / 書かれていない / 書いてない / ありません", output: "なし" }
        - { input: "わからない / わかりません / 分からない", output: "不明" }
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "physicianSpecified"
    next_step: "あり→紹介元医療機関聴取 / なし/不明→診療科_初診 / NO_RESULT→診療科_初診"
    retry_failure: "skip"

