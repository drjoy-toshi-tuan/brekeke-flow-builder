# =====================================================
# セクション11: 特記事項・制約
# =====================================================
special_notes:
  - "【冒頭挨拶】Gen1 main.yaml の挨拶文言と一語一句一致。「お電話ありがとうございます。湘南藤沢徳洲会病院の、予約専用、AI電話です。診療科によっては、こちらの番号でお受けできない場合もございます。また、当日の予約は承っておりませんので、ご了承ください。」"
  - "【受付時間】祝日除く 月〜金 9:00〜16:00 / 土 9:00〜14:00 / 日祝 終日時間外。Dr.JOY 側で acceptance_times のスケジュール設定。"
  - "【用件 5 分類】Gen1 用件.yaml「セットした用件の分岐」と完全一致（初診予約/再診予約/予約変更/予約キャンセル/予約確認）。Gen3 では用件は1回だけ分類し、以降 classification context で制御（Gen1 の用件の確認_1/_2/_3 を統合）。echo_back: true で各用件を復唱確認。"
  - "【DTMF 並走】用件聴取（1=予約取得, 2=変更, 3=キャンセル, 4=確認）+ 紹介状/医師指定/脊椎疾患/側弯症/味覚嗅覚/再予約希望（1=Yes, 2=No）の Yes/No 確認系で全面 DTMF 並走。"
  - "【初診紹介状＋医師指定 cascade】初診 + 紹介状あり → 紹介状医師指定確認 → 医師指定あり時のみ紹介元医療機関 + 医師名を追加聴取（移管ノート §「紹介状あり初診の追加聴取」）。"
  - "【整形外科 cascade】初診 + 整形外科 → 脊椎疾患確認 → Yes → 側弯症確認 → Yes → END_側弯症直通（脊椎側弯症外科扱い）/ No → 通常初診ルート（股関節外来扱い、Dr.JOY 側で scoliosisCheck=いいえ + spinalCheck=はい を見て股関節外来として処理）/ 脊椎疾患 No → 通常整形外科初診。"
  - "【耳鼻咽喉科 + 味覚嗅覚外来】初診 + 耳鼻咽喉科 → 味覚嗅覚外来確認 → Yes → 通常ルート（味覚嗅覚外来扱い）/ No → END_耳鼻咽喉科直接来院。"
  - "【循環器科の紹介状あり時直接来院】初診 + 循環器科 + 紹介状あり → END_循環器科直接来院（予約制ではないため）/ 紹介状なし → jump_氏名聴取（通常初診）。Pattern B（context_match_router で referralLetter 参照）。"
  - "【内視鏡内科の用件別変換】Gen1 仕様: 用件＝初診/再診時に内視鏡内科は『肝胆膵・消化器病センター』にセット変換、変更/キャンセル/確認なら内視鏡そのまま。Gen3 では prompter で OpenAI prompt 内で初診/再診の場合のみ正規化を行う（NON-BLOCKER N-6）。"
  - "【コンテキスト変換診療科の読み上げ】内分泌糖尿病内科 / 肝胆膵消化器病センター / 小児科小児外科 → 確認 TTS 時は読み上げ用に「内分泌・糖尿病内科」「肝胆膵・消化器病センター」「小児科・小児外科」と中黒入りで発話するのが望ましいが、Gen3 では context は本来名のまま保存し、TTS prompt 側で個別に対応（properties / prompter フェーズで調整、NON-BLOCKER N-7）。"
  - "【対象外診療科×用件マトリクス】変更/キャンセルでは対象外診療科でも通常ルートを許可（Gen1 main.yaml 『対象外診療科：用件分岐』）。設計書では診療科_変更/キャンセル の conditions に対象外特殊分岐を入れず、全 default → 予約日_変更/キャンセルへ進める。"
  - "【代表案内系の context 置換】END_対象外代表 / END_救急総合代表 / END_対象外予約センター の TTS は <% clinicalDepartment %> で動的置換。Brekeke の prompt を IVR エンジンに渡す際の context 置換構文。"
  - "【キャンセル → 再予約希望】Gen1 仕様: キャンセル後に「再予約希望」Yes → 用件を『予約変更』に書き換えて変更フローに合流。Gen3 では context overwrite ブロックが無いため、用件は『予約キャンセル』のまま、希望時期を desiredTime context に保存して Dr.JOY 側担当者が判断（NON-BLOCKER N-9）。"
  - "【予約日聴取の DTMF 4 桁対応】Gen1 仕様: シャープ/アスタ + 4 桁数字（月日 MMDD）+ 過去日→+1 年確定。Gen3 初期は voice のみ。Phase 2 で dtmf_max_length 4 + 月日変換 script で実装検討（NON-BLOCKER N-8）。"
  - "【WEB or 電話の事前選択】Gen1 仕様: 携帯入電時のみ WEB/電話選択可、WEB→SMS 送信終話。Gen3 では incoming-classifier の出力を ContextMatchRouter で参照する正式手段が無いため省略（NON-BLOCKER N-2）。Phase 2 で script_template: phone_type で対応検討。"
  - "【健診/人間ドック誘導】Gen1 仕様: 用件聴取で「健診」発話時に専用「これから?」フォーク → Yes→人間ドック誘導 / No→氏名聴取。Gen3 では用件聴取で予約取得相当として吸収し、診療科聴取で人間ドック検診センターを選択時に END_人間ドック直通 へ集約（NON-BLOCKER N-12）。"
  - "【3 回失敗時の予約センター案内】用件聴取で 3 回連続失敗 → END_聴取失敗（予約センター 0466-35-1350 を 3 回繰り返し案内）。retry_count: 2 で 3 回目に発火。status=3。"
  - "【phonetype 判定】電話番号聴取サブフローが正規表現で mobile/ip050/landline/withheld を判定。mobile/ip050→phonetype=1（携帯用終話）、landline/withheld→phonetype=2（固定用終話）。"
  - "【終話 8 パターン】classification × phonetype の 2 段 ContextMatchRouter で 8 分岐（診療予約/予約変更/予約キャンセル/予約確認 × 携帯/固定）。初診と再診はどちらも END_診療予約_xx へ集約（Gen1 文言「診療予約の申し込みを受付いたしました。」が共通）。携帯時のみ「ショートメール」を併記。"
  - "【SMSフラグ割当】受付完了で携帯（phonetype=1）→smsFlag=1（SMS送信あり）、固定（phonetype=2）→smsFlag=-1。誘導系（END_*代表 / 直通 / 直接来院 / 予約センター / 聴取失敗 / 時間外 / 非通知）は全て smsFlag=-1。"
  - "【Gen1→Gen3: status 置換】Gen1 status=0 / 5 は Gen3 では使用禁止のため、誘導系は全て status=2 へ置換。受付完了は status=1。聴取失敗は status=3。時間外は status=6。非通知は status=2。"
  - "【Gen1→Gen3: checkpoint 機能】Gen1 commubo の checkpoint（受診歴 / 紹介状有無 / 各 Yes/No 確認）は Gen3 では context（referralLetter / physicianSpecified / spinalCheck / scoliosisCheck / otorhinoSpecial / rescheduleDesired 等）+ context_match_router で代替。"
  - "【Gen1→Gen3: 重複ブロック削除】Gen1 main.yaml の用件の確認/_1/_2/_3 と 携帯電話分岐/_1/_2 は Gen3 では用件聴取 1 回 + 終話分岐_用件 + 終話分岐_xx_電話種別 の組み合わせで代替。重複展開せず統合。"
  - "【固定発話厳守】冒頭 / 用件聴取 / 各 END_* TTS は Gen1 元資料 yaml の文言と厳密一致で gen_properties に渡すこと。"
  - "【prompter 注意】OpenAI_用件聴取 のプロンプトには「初診/再診の自動振り分け」（『初めて』『新規』『初診』→初診予約 / 『再診』『二回目』『定期受診』→再診予約）を明示する。OpenAI_診療科_初診 / 診療科_再診 のプロンプトには「内視鏡内科 → 肝胆膵消化器病センター」変換ルールを明示する。"
  - "【prompter 注意】generate_by_OpenAI プロンプトには『終話アナウンスの出力前は絶対に status / smsFlag に確定値を書き込まない』制約を必ず含める。"

