# =====================================================
# セクション6: 聴取項目一覧
# =====================================================
hearing_items:
  - order: 1
    name: "用件聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "初診予約"
      - "再診予約"
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
    notes: "Gen1 用件.yaml 5 値。DTMF 1=診察予約(初診/再診の振り分けは OpenAI 自動)、2=変更、3=キャンセル、4=確認。echo_back: true で各用件を復唱確認（『初診予約 でよろしいですか?』等、prompter で自然な文言にチューニング推奨）。3回連続失敗→END_聴取失敗（status=3, 予約センター案内3回繰り返し）。"

  - order: 2
    name: "紹介状有無聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "referralLetter"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
      - "不明"
    notes: "用件＝初診予約のみ。DTMF 1=あり、2=なし。NO_RESULT は不明扱い。「持っています/もらいました/受け取りました」→あり、「持っていません/もらってない」→なし、「分からない/覚えてない」→不明。あり→紹介状医師指定確認、なし/不明/other→診療科_初診（紹介状無くても通常初診ルートに進める。循環器科のみ後段で referralLetter=あり チェック）。"

  - order: 3
    name: "紹介状医師指定確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "physicianSpecified"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
      - "不明"
    notes: "用件＝初診予約 + 紹介状あり時のみ。DTMF 1=あり、2=なし。「書かれている/記載あり」→あり、「書かれていない」→なし、「わからない」→不明。あり→紹介元医療機関聴取、なし/不明/other→診療科_初診（医師名は聴取しない）。"

  - order: 4
    name: "紹介元医療機関聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "referralOrgName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "Gen1 紹介元医療機関聞き取り.yaml 準拠。フリーテキスト。「分からない」も許容（そのまま格納）。"

  - order: 5
    name: "医師名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "physicianName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "Gen1 医師名聴取.yaml 準拠。担当医名フリーテキスト。「分からない」も許容。Gen1 では用件で TTS 切替（初診=「何先生と書かれていますか?」/ 再診=「担当の先生のお名前をお話ください」）あったが、Gen3 では初診ルートのみ呼ばれるため初診版 TTS で統一。"

  - order: 6
    name: "診療科_初診"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "産科"
      - "婦人科"
      - "産婦人科"
      - "小児科小児外科"
      - "眼科"
      - "整形外科"
      - "脊椎側弯症外科"
      - "人間ドック検診センター"
      - "耳鼻咽喉科"
      - "泌尿器科"
      - "循環器科"
      - "リハビリテーション科"
      - "救急総合診療部"
      - "内視鏡"
      - "集中治療科"
      - "病理診断科"
      - "放射線診断科"
      - "脳神経内科"
      - "脳神経外科"
      - "内科"
      - "外科"
      - "内分泌糖尿病内科"
      - "肝胆膵消化器病センター"
      - "腎臓内科"
      - "呼吸器内科"
      - "心臓血管外科"
      - "形成外科"
      - "皮膚科"
      - "乳腺外科"
      - "放射線科"
      - "リウマチ科"
      - "ペースメーカー外来"
      - "メモリークリニック"
      - "CPAP外来"
      - "睡眠時無呼吸外来"
      - "下肢創傷外来"
      - "痛みセンター"
      - "高精密度放射線治療センター"
      - "機能的神経疾患センター"
      - "二次健診外来"
      - "味覚嗅覚外来"
    notes: "Gen1 診療科.yaml 準拠。産科/小児科小児外科/眼科→END_*代表、脊椎側弯症外科→END_側弯症直通、整形外科→脊椎疾患確認 cascade、人間ドック→END_人間ドック直通、耳鼻咽喉科→味覚嗅覚外来確認、泌尿器科→END_泌尿器科直接来院、循環器科→循環器科紹介状チェック（紹介状ありのみ END_循環器科直接来院、なしは jump_氏名聴取）、リハ/救急総合/内視鏡→END_対象外代表 (救急総合のみ別 TTS)、集中治療/病理/放射線診断→END_対象外予約センター、default→jump_氏名聴取。no_result→『登録なし』。**内視鏡内科は OpenAI prompt で『肝胆膵・消化器病センター』に正規化する**（Gen1 内視鏡内科 + 初診/再診のセット変換ロジック）。"

  - order: 7
    name: "脊椎疾患確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 1
    echo_back: false
    save_to: "spinalCheck"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "整形外科 + 初診時のみ。DTMF 1=はい、2=いいえ。「はい/そうです/脊椎」→はい、「いいえ/違います」→いいえ。Yes→側弯症確認、No/other→jump_氏名聴取（通常整形外科初診）。"

  - order: 8
    name: "側弯症確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 1
    echo_back: false
    save_to: "scoliosisCheck"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "脊椎疾患Yes時のみ。DTMF 1=はい、2=いいえ。「はい/側弯症/側彎症」→はい、「いいえ/違います/股関節」→いいえ。Yes→END_側弯症直通、No/other→jump_氏名聴取（股関節外来扱い）。"

