  - step_name: "用件聴取"
    tts_announcement: "ご用件を、次の４つのうちの、いずれかでお話ください。『予約を取る』『変更する』『キャンセルする』『確認する』、 それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
      mapping:
        - input: "予約、予約を取る、予約したい、薬、お薬"
          output: "予約"
        - input: "変更、変更する、変更したい"
          output: "変更"
        - input: "キャンセル、キャンセルする、取り消し"
          output: "キャンセル"
        - input: "確認、確認する、確認したい"
          output: "確認"
        - input: "緊急薬"
          output: "予約"
        - input: "印刷、定期、新薬、再診、最新、禁忌"
          output: "確認"
      no_result_condition: "上記いずれにも該当しない、または質問事項 → default ルートで確認扱い（free に質問をそのまま格納）"
    save_to: "classification"
    next_step: "予約→予約_受診歴確認、変更→変更_予約日、キャンセル→キャンセル_予約日、確認/default→確認_内容"
    retry_failure: "end_failure"

  - step_name: "予約_受診歴確認"
    tts_announcement: "当院でのご受診は初めてですか？はい、または、いいえ、でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
      mapping:
        - input: "はい、初めて、初診"
          output: "はい"
        - input: "いいえ、以前ある、通ってる、前に来た"
          output: "いいえ"
