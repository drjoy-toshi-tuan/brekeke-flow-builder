# --- セクション11: 特記事項・制約 ---
special_notes:
  - "代表電話: 075-621-3101。対象外診療科・聴取失敗時の案内で3回繰り返し"
  - "健康増進センター専用電話: 050-1724-0765。健康増進センター選択時の案内で3回繰り返し"
  - "非通知は opening の incoming-classifier で即 END_非通知 に分岐。通常ルートには進ませない"
  - "ヒアリング順序（固定）: 患者名 → 旧姓確認 → 診察券番号 → 生年月日 → 連絡先電話番号 → 診療科 → 用件"
  - "旧姓確認は Gen2 固有項目。former コンテキストに格納、スキップ不可（retry_failure=skip でフォールバック）"
  - "用件の単語置換ルール（prompter で実装）: 印刷/定期/新薬/再診/最新/禁忌→診察（＝確認扱い）、薬/お薬→予約、緊急薬→予約"
  - "予約ルートは受診歴確認で分岐。はい→classification=新規、いいえ→classification=再診 を script ブロックで上書き"
  - "症状は2種類: 新規=症状①「現在の症状をお話しください」／再診=症状②「前回と同じ症状でご受診ですか？」。どちらも disease に格納"
  - "変更ルートの歯科口腔外科判定: clinicalDepartment に「歯科」が含まれる場合は残薬確認をスキップして直接「最後の問い合わせ」に合流"
  - "予約日と予約希望日は別: 予約日は DATE 形式（reservationDate）、予約希望時期はフリーワード（DesiredreservationDate）。ヒアリングがなかった項目に他方の値を入れてはいけない"
  - "予約日の年度判定: 10月以降に1-9月指定は翌年。過去日は未来日確認後にのみ受付"
  - "復唱: 診察券番号と電話番号のみ（サブフロー内で実装）。氏名・生年月日・予約日・その他項目は復唱禁止（Gen2 プロンプト原文の指示）。ただし生年月日サブフローの DOB Re-confirmation はデフォルト有効（NON-BLOCKER N-7 で確認後に無効化可）"
  - "患者名のカタカナ補正: カタカナにならない場合リトライ時に『普通のスピードではっきりと発話してください』と案内（氏名聴取サブフロー内）"
  - "患者名は苗字のみ発話時のみ下の名前を再質問可能（氏名聴取サブフロー内）。他項目の再質問は一切禁止"
  - "生年月日の正規化ルール（prompter で実装）: 2桁年の元号確認（00-07→令和/平成、08-31→西暦/昭和/平成、32-63→西暦/昭和、64-99→西暦）、3桁年（900-999→19XX、100-899→再ヒア）、未来日・Year(NOW)-110 未満は再ヒア、「今日は/そうわ/社長は/希少は」→昭和"
  - "Gen2 の checkpoint/endpoint/smsFlag は context に含めない。Gen3 では smsFlag と status のみ saveCompletionFlag2db に渡す"
  - "Gen2 の status=0 は Gen3 禁止値のため使用しない。Gen2 の checkpoint=0 時に status=0 を入れていたケースは Gen3 では通常完了扱い（status=1）になるが、本フローではそもそも途中切断は Brekeke 側でハンドリング"
  - "口調: 丁寧語統一。ただし Gen2 原文の『おっしゃってください』表現は原文通り保持（患者名・旧姓・診察券・DOB・予約希望時期・キャンセル理由）"
  - "複数情報の同時発話は prompter のシステムプロンプトで対応。全 OpenAI モジュールのプロンプトに「既に伝えられた内容については絶対に復唱・確認を行わず、不足している項目のみを一つずつ質問する」を反映"
  - "FAQ/RAG 不使用。『プロンプトに記載のない質問』は 用件 default → 確認_内容 で free に格納し、最後の問い合わせ完了後に END_汎用受付"
  - "ペイン外来は対象外扱いにしない（通常受付）。function enum のみに存在、yaml 分岐・プロンプト本文には対象外記述なしのため"

