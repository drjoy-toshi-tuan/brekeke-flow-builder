# 設計書 -- 蘇生会総合病院 診療
# 生成元: @director エージェント
# 生成日: 2026/04/22
# 確認レポート: docs/designs/確認レポート_蘇生会総合病院_診療_20260422.md
# 作業種別: Gen2→Gen3 移管
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "蘇生会総合病院"
  group_name: "蘇生会総合病院"
  flow_name: "蘇生会総合病院$診療"
  target_facility: "蘇生会総合病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "075-621-3101"
  business_hours: "TODO_要確認（Gen2 はサーバー側制御のため元資料に記載なし。仮: 24時間受付 / Dr.JOY制御）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "蘇生会総合病院$診療"
      role: "main"
      description: "冒頭 → 患者名→旧姓→診察券番号→生年月日→連絡先電話番号→診療科聴取 → 受付可否判定（対象外9科＝代表電話案内／健康増進＝健診電話案内／それ以外＝用件聴取）→ 用件4分岐（予約/変更/キャンセル/確認）→ 各ルート聴取 → 最後の問い合わせ → 終話（キャンセル/汎用受付）"
  subflows:
    - name: "蘇生会総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー。カタカナ補正リトライは.bivrデフォルト。元資料原文「普通のスピードではっきりと発話してください」リトライ文言も.bivrデフォルトを適用"
    - name: "蘇生会総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 使用。Gen2原文には「復唱しないでください」とあるが、サブフロー.bivr デフォルト（復唱あり）で起草。NON-BLOCKER N-7 で確認後に recitation: なし に切り替え可"
    - name: "蘇生会総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Phone Normalization + Re-confirmation。incoming-classifier で携帯/固定/その他を分岐。非通知は冒頭 opening で既に弾いているためここには到達しない"
    - name: "蘇生会総合病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "8桁復唱・「わからない」スキップ。元資料アナウンス原文に合わせる"

# --- セクション3: フローの目的 ---
purpose: "患者からの電話を受け、患者情報（氏名・旧姓・診察券番号・生年月日・連絡先電話番号）、診療科、用件（予約／変更／キャンセル／確認）および各用件ごとの詳細情報を聴取し、折り返し受付を自動化する。受付対象外の診療科（救急・麻酔・三叉神経痛など9科）と健康増進センターは該当電話番号の案内で終話する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "蘇生会総合病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信分類(incoming-classifier)
              ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS, 入力待ちなし)
                                    └─ ★氏名聴取サブフロー(return)
                                        → 旧姓確認(hearing: text, former)
                                        → ★診察券番号聴取サブフロー(return)
                                        → ★生年月日聴取サブフロー(return)
                                        → ★電話番号聴取サブフロー(return)
                                        → 診療科聴取(hearing: enum, DEPARTMENT, no_result_default=登録なし)
                                        → 診療科_受付可否判定(context_match_router: clinicalDepartment)
                                            ├─ 救急科/麻酔科/三叉神経痛/ロービジョン外来/手術センター/血液浄化センター/脳血管内治療センター/内視鏡センター/放射線科
                                            │     → END_代表電話案内_診療科対象外(TTS) → 完了フラグ_対象外(status=2, smsFlag=-1) → 切断
                                            ├─ 健康増進センター
                                            │     → END_健康増進センター案内(TTS) → 完了フラグ_健康増進(status=2, smsFlag=-1) → 切断
                                            └─ それ以外 → 用件聴取(hearing: enum, classification)
                                                ├─ 予約   → 予約_受診歴確認(hearing: enum, history)
                                                │            ├─ はい(新規) → saveContext2DB(classification=新規)
                                                │            │                 → 予約_紹介状確認(hearing: text, introduction)
                                                │            │                 → 予約_症状1(hearing: text, disease)
                                                │            │                 → 予約_医師の指定(hearing: text, doctorName)
                                                │            │                 → 最後の問い合わせ_聴取
                                                │            └─ いいえ(再診) → saveContext2DB(classification=再診)
                                                │                              → 予約_症状2(hearing: text, disease)
                                                │                              → 最後の問い合わせ_聴取
                                                ├─ 変更   → 変更_予約日(hearing: datetime, reservationDate)
                                                │            → 変更_予約希望時期(hearing: text, DesiredreservationDate)
                                                │            → 変更_歯科判定(context_match_router: clinicalDepartment)
                                                │                ├─ 歯科含む → 最後の問い合わせ_聴取
                                                │                └─ それ以外 → 変更_残薬確認(hearing: text, medicine) → 最後の問い合わせ_聴取
                                                ├─ キャンセル → キャンセル_予約日(hearing: datetime, reservationDate)
                                                │              → キャンセル_理由(hearing: text, reason)
                                                │              → 最後の問い合わせ_聴取
                                                └─ 確認/default → 確認_内容(hearing: text, free) → 最後の問い合わせ_聴取

      最後の問い合わせ_聴取(hearing: text, question)
        → 最後の問い合わせ_分岐(context_match_router: classification)
            ├─ キャンセル → END_キャンセル(TTS) → 完了フラグ_キャンセル(status=1, smsFlag=1) → 切断
            └─ default  → END_汎用受付(TTS) → 完了フラグ_汎用受付(status=1, smsFlag=1) → 切断

      ─── 異常終話 ───
      END_聴取失敗（scaffold自動）: 全 hearing のリトライ超過時 → 完了フラグ_聴取失敗(status=3, smsFlag=-1) → 切断
        ※ 元資料では代表電話案内を聴取失敗時にも使用するが、gen_properties の END_聴取失敗 文言を「申し訳ございません。うまく聞き取ることができませんでした…代表電話0758623101へおかけなおしください」として上書き
      END_非通知: 非通知着信 → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断

      ─── サブフロー遷移（★マーク） ───
      ★氏名聴取サブフロー     = Custom Jump to Flow → 蘇生会総合病院$氏名聴取（return）
      ★診察券番号聴取サブフロー = Custom Jump to Flow → 蘇生会総合病院$診察券番号聴取（return）
      ★生年月日聴取サブフロー   = Custom Jump to Flow → 蘇生会総合病院$生年月日聴取（return）
      ★電話番号聴取サブフロー   = Custom Jump to Flow → 蘇生会総合病院$電話番号聴取（return）
    notes: |
      acceptance_times 不使用（Gen2 はサーバー側制御、元資料に時間帯記載なし）。NON-BLOCKER N-1 参照。
      用件聴取は Pattern A（OpenAI直後分岐）。診療科受付可否判定・変更歯科判定・最後の問い合わせ分岐は Pattern B（context_match_router）。
      受診歴確認（history）は Pattern A で「はい/いいえ」分岐後、各ルート先頭の saveContext2DB で classification を "新規"/"再診" に上書き。
      歯科口腔外科の変更ルートのみ残薬確認をスキップ（context_match_router で clinicalDepartment が「歯科」含有判定）。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 氏名聴取

  # --- 個人情報聴取（サブフロー）---
  - step: 氏名聴取
    type: subflow
    flowname: "蘇生会総合病院$氏名聴取"
    target: 氏名聴取
    next: 旧姓確認

  # --- 旧姓確認（Gen2 固有・hearing）---
  - step: 旧姓確認
    type: hearing
    output_format: text
    save_to: former
    next: 診察券番号聴取
    retry_failure: skip

  - step: 診察券番号聴取
    type: subflow
    flowname: "蘇生会総合病院$診察券番号聴取"
    target: 診察券番号聴取
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "蘇生会総合病院$生年月日聴取"
    target: 生年月日聴取
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "蘇生会総合病院$電話番号聴取"
    target: 電話番号聴取
    next: 診療科聴取

  # --- 診療科聴取（enum, DEPARTMENT, no_result_default: 登録なし）---
  - step: 診療科聴取
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    next: 診療科_受付可否判定

  # --- 診療科_受付可否判定（Pattern B: context_match_router）---
  - step: 診療科_受付可否判定
    type: context_match_router
    reference_module: "clinicalDepartment"
    conditions:
      - match: "救急科"
        next: END_代表電話案内_診療科対象外
      - match: "麻酔科"
        next: END_代表電話案内_診療科対象外
      - match: "三叉神経痛"
        next: END_代表電話案内_診療科対象外
      - match: "ロービジョン外来"
        next: END_代表電話案内_診療科対象外
      - match: "手術センター"
        next: END_代表電話案内_診療科対象外
      - match: "血液浄化センター"
        next: END_代表電話案内_診療科対象外
      - match: "脳血管内治療センター"
        next: END_代表電話案内_診療科対象外
      - match: "内視鏡センター"
        next: END_代表電話案内_診療科対象外
      - match: "放射線科"
        next: END_代表電話案内_診療科対象外
      - match: "健康増進センター"
        next: END_健康増進センター案内
      - match: "default"
        next: 用件聴取

  # --- 用件聴取（Pattern A: OpenAI直後分岐）---
  - step: 用件聴取
    type: hearing
    output_format: enum
    save_to: classification
    conditions:
      - match: "予約"
        next: 予約_受診歴確認
      - match: "変更"
        next: 変更_予約日
      - match: "キャンセル"
        next: キャンセル_予約日
      - match: "確認"
        next: 確認_内容
      - match: "default"
        next: 確認_内容

  # --- 予約ルート ---
  - step: 予約_受診歴確認
    type: hearing
    output_format: enum
    save_to: history
    conditions:
      - match: "はい"
        next: 予約_新規_分類保存
      - match: "いいえ"
        next: 予約_再診_分類保存
      - match: "default"
        next: 予約_再診_分類保存

  - step: 予約_新規_分類保存
    type: script
    script_template: custom
    reference_module: "OpenAI_予約_受診歴確認"
    template_params:
      CONTEXT_NAME: "classification"
      FIXED_VALUE: "新規"
    conditions:
      - match: "default"
        next: 予約_紹介状確認
    notes: "saveContext2DB 代替：classification を '新規' に上書きして次へ。scaffold の script ブロックで固定値保存を実装"

  - step: 予約_紹介状確認
    type: hearing
    output_format: text
    save_to: introduction
    next: 予約_症状1
    retry_failure: skip

  - step: 予約_症状1
    type: hearing
    output_format: text
    save_to: disease
    next: 予約_医師の指定
    retry_failure: skip

  - step: 予約_医師の指定
    type: hearing
    output_format: text
    save_to: doctorName
    next: 最後の問い合わせ_聴取
    retry_failure: skip

  - step: 予約_再診_分類保存
    type: script
    script_template: custom
    reference_module: "OpenAI_予約_受診歴確認"
    template_params:
      CONTEXT_NAME: "classification"
      FIXED_VALUE: "再診"
    conditions:
      - match: "default"
        next: 予約_症状2
    notes: "saveContext2DB 代替：classification を '再診' に上書きして次へ"

  - step: 予約_症状2
    type: hearing
    output_format: text
    save_to: disease
    next: 最後の問い合わせ_聴取
    retry_failure: skip

  # --- 変更ルート ---
  - step: 変更_予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 変更_予約希望時期
    retry_failure: skip

  - step: 変更_予約希望時期
    type: hearing
    output_format: text
    save_to: DesiredreservationDate
    next: 変更_歯科判定
    retry_failure: skip

  - step: 変更_歯科判定
    type: context_match_router
    reference_module: "clinicalDepartment"
    conditions:
      - match: "歯科"
        next: 最後の問い合わせ_聴取
      - match: "default"
        next: 変更_残薬確認

  - step: 変更_残薬確認
    type: hearing
    output_format: text
    save_to: medicine
    next: 最後の問い合わせ_聴取
    retry_failure: skip

  # --- キャンセルルート ---
  - step: キャンセル_予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: キャンセル_理由
    retry_failure: skip

  - step: キャンセル_理由
    type: hearing
    output_format: text
    save_to: reason
    next: 最後の問い合わせ_聴取
    retry_failure: skip

  # --- 確認ルート ---
  - step: 確認_内容
    type: hearing
    output_format: text
    save_to: free
    next: 最後の問い合わせ_聴取
    retry_failure: skip

  # --- 合流 ---
  - step: 最後の問い合わせ_聴取
    type: hearing
    output_format: text
    save_to: question
    next: 最後の問い合わせ_分岐
    retry_failure: skip

  - step: 最後の問い合わせ_分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "キャンセル"
        next: END_キャンセル
      - match: "default"
        next: END_汎用受付

  # --- 終話ブロック ---
  - step: END_汎用受付
    type: termination
    termination_ref: "END_汎用受付"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_代表電話案内_診療科対象外
    type: termination
    termination_ref: "END_代表電話案内_診療科対象外"

  - step: END_健康増進センター案内
    type: termination
    termination_ref: "END_健康増進センター案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "新規"
      - order: "2"
        value: "再診"
      - order: "3"
        value: "変更"
      - order: "4"
        value: "キャンセル"
      - order: "5"
        value: "確認"
    item_default: true
    editable: true
    deletable: false
    notes: "用件選択結果。Gen2 function の enum から Gen3 で使う値を採用（「予約」「問い合わせ」は中間値のため除外。受診歴で新規/再診に上書き）"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
