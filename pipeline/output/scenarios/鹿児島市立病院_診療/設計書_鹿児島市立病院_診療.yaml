# --- セクション11: 特記事項・制約 ---
special_notes:
  - "**初診予約専用フロー**: 鹿児島市立病院の患者様向け初診予約専用 AI 電話。再診は AI 電話で受付不可、代表電話 099-230-7000 へ案内。"
  - "**紹介状必須**: 紹介状なしの場合は紹介状必須の旨を案内して終話（紹介状をとってから再連絡を依頼）。"
  - "**新生児内科は AI 電話で対応不可**: 診療科=新生児内科の場合は代表電話 099-230-7000 へ案内して終話。"
  - "**精神科は入院患者様のみ**: 診療科=精神科の場合は近隣医療機関への外来受診案内で終話。"
  - "**代表電話 099-230-7000**: 失敗・代表案内系の終話で読み上げ。「代表電話に初診紹介予約についてとお伝えください」を必ず付記。"
  - "**医療機関直通ダイヤル 099-230-7115**: Gen1 では `紹介元番号判別` サブシナリオで連携医療機関入電を SIP-from で判別し『連携医療機関からの入電』アナウンスで案内（電話番号 3 回読み上げ）。Gen3 移管初版では SIP-from リスト未確定のため未実装（confirmation_items 参照）。"
  - "**発信専用ダイヤル明記**: 受付完了系の終話アナウンスでは『担当者から折り返しする電話番号は発信専用ダイヤルとなっておりますので、担当者からの折り返し電話をお待ちください』を必ず読み上げる（病院側の運用上の重要要素）。"
  - "**営業時間**: 祝日除く月〜金 9:00〜17:00、土日祝休、年末年始 12/30〜1/3 休診（1/5 9:00 受付再開）。`acceptance_times` で月〜金 9-17 + 祝日休、Script ブロックで年末年始 12/30-1/3 を判定して別文言で案内。"
  - "**phonetype 分岐なし**: 倉敷・蘇生会等とは異なり連絡先の携帯/固定で終話文言を切り替えない。連絡先 subflow の戻り値（phonetype）は context 保存のみ。"
  - "**受診者 = 入電者前提**: diagnosis_subject 聴取は無し、PatientName 1 枠で完結。"
  - "**社内テスト用分岐は削除**: Gen1 にあった社内テスト識別子（渡部/新坂/鹿児島/鹿児島）への分岐は本番移管時に削除。incoming-classifier の通常分岐のみ残す。"
  - "**診療科の親グループ単独発話**: Gen1 では『呼吸器』『消化器』『脳神経』『産婦人科』を単独で発話した場合、内科/外科 の選択を再質問していた。Gen3 では細分化された名称を 1 段の enum で聴取し、親グループ単独発話は NO_RESULT として扱う。OpenAI のプロンプトで『呼吸器』のような単独発話は『呼吸器内科か呼吸器外科のどちらかをお話ください』と再質問するよう指示。"
  - "**紹介元電話番号の正規化**: Gen1 にあったハイフン区切り変換 + 復唱確認は Gen3 移管初版では未実装。テキスト保存（数字とハイフンが混在する可能性あり）。本番運用後の品質に応じて Phone Normalization を導入検討。"
  - "**用件聴取の復唱省略**: Gen1 では『ご予約でよろしいですか?』等の復唱があったが、Gen3 移管初版では用件確認 hearing の echo_back を false で運用。本番運用後の認識率に応じて復唱導入を検討。"

