    editable: true
    deletable: false
    notes: "初診ルート専用フィールド。紹介元の電話番号を聴取して保存。Gen1 にあったハイフン区切り変換は Gen3 では未実装（テキスト保存）"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理（受付完了） 2=代表案内（再診/紹介状なし/新生児内科/精神科/非通知） 3=聴取失敗 6=時間外（年末年始含む）"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: ""

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

