# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "鹿児島市立病院$診療"
      role: "main"
      description: "鹿児島市立病院の初診予約専用 AI 電話。用件 5 分岐（初診/変更/キャンセル/確認/折返し）。再診・新生児内科・精神科は AI 電話で受付不可、代表電話 099-230-7000 へ案内。紹介状必須。"
  subflows:
    - name: "鹿児島市立病院$氏名聴取"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報汎用サブフロー（氏名）"
    - name: "鹿児島市立病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報汎用サブフロー（生年月日）。DOB Re-confirmation で復唱"
    - name: "鹿児島市立病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報汎用サブフロー（連絡先電話番号）。携帯/固定の incoming-classifier 分岐 + Phone Normalization + Re-confirmation"

# --- セクション3: フローの目的 ---
purpose: |
  鹿児島市立病院の患者様向け、初診予約専用 AI 電話。
  患者からの電話を受け、用件（初診予約 / 予約変更 / 予約キャンセル / 予約確認 / 折返し依頼）と
  患者情報（氏名・生年月日・連絡先電話番号）を聴取し、
  さらに用件に応じた追加情報（初診: 紹介状有無・診療科・紹介元医療機関名・紹介元電話番号、
  変更/キャンセル: 診療科・現在の予約日、確認/折返し: 問い合わせ内容自由文）を聴取する。
  受付完了後は「土日祝日を除く 3 診療日以内」に担当者から折り返し連絡する旨を案内して終話する。
  再診・新生児内科・精神科は AI 電話では受付できず、代表電話 099-230-7000 への案内で終話する。
  紹介状なしは紹介状必須の旨を案内して終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "鹿児島市立病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        └─ 年末年始判定(Script: 12/30-1/3)
                                              ├─ 年末年始 → 年末年始_アナウンス → 完了フラグ_年末年始 → 切断
                                              └─ 通常 → 用件確認(hearing enum: 初診/変更/キャンセル/確認/折返し)
                                                        └─ 氏名聴取 → 生年月日聴取 → 電話番号聴取
                                                            └─ 用件分岐(CMR: classification)
                                                                ├─ 初診     → 初診確認(hearing yes/no)
                                                                │              ├─ 初診(はい) → 紹介状確認(hearing yes/no)
                                                                │              │                ├─ あり → 診療科_新規(hearing enum)
                                                                │              │                │           ├─ 新生児内科 → END_新生児内科案内
                                                                │              │                │           ├─ 精神科     → END_精神科案内
                                                                │              │                │           └─ other      → 紹介元医療機関名(hearing text)
                                                                │              │                │                            → 紹介元電話番号(hearing text)
                                                                │              │                │                            → END_受付完了_初診
                                                                │              │                └─ なし → END_紹介状なし
                                                                │              └─ 再診(other) → END_再診案内
                                                                ├─ 変更     ┐
                                                                ├─ キャンセル ┴─→ 診療科_予約変更(hearing enum)
                                                                │              ├─ 新生児内科 → END_新生児内科案内
                                                                │              ├─ 精神科     → END_精神科案内
                                                                │              └─ other      → 現在の予約日(hearing datetime)
                                                                │                                → 用件分岐_変更キャンセル(CMR)
                                                                │                                    ├─ 変更       → END_受付完了_変更
                                                                │                                    └─ キャンセル → END_受付完了_キャンセル
                                                                ├─ 確認     ┐
                                                                ├─ 折返し   ┴─→ 問い合わせ内容(hearing text)
                                                                │                  → 用件分岐_確認折返し(CMR)
                                                                │                      ├─ 確認   → END_受付完了_確認
                                                                │                      └─ 折返し → END_受付完了_折返し
                                                                └─ other    → END_聴取失敗
    notes: |
      Gen1 の「箱」直接接続を Gen3 では OpenAI + ContextMatchRouter + context に集約。
      用件は最初の hearing で context.classification に保存（output_format: enum、Pattern B）し、
      個人情報聴取後の「用件分岐」CMR で実際の分岐を行う。
      診療科分岐（新生児内科/精神科）は hearing の conditions（Pattern A）で表現。
      変更/キャンセル および 確認/折返し は終話文言が異なるため、後段に追加 CMR を配置して終話分岐する。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック ===
  # opening の直後は必ず announcement（冒頭_アナウンス）を配置（qa_validator E-11）。
  # 冒頭_アナウンスの後で年末年始判定を行い、年末年始期間中なら END_年末年始 終話、
  # 通常期間なら 用件確認 へ進む。
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 年末年始判定

  # === 年末年始判定（カレンダー必須） ===
  - step: 年末年始判定
    type: script
    script_template: custom
    notes: "施設固有休館日（年末年始 12/30〜1/3）の判定。年に依存するカレンダー計算が必要。getCurrentDate で現在日を取得し、12/30-1/3 範囲か判定。範囲内なら END_年末年始 へ、範囲外なら 用件確認 へ。"
    conditions:
      - match: "年末年始"
        next: END_年末年始
      - match: "other"
        next: 用件確認

  # === 用件聴取（5 分岐: 初診/変更/キャンセル/確認/折返し）===
  # Pattern B: hearing で classification を context に保存し、後段の CMR で実分岐する。
  # 5 分岐すべてが「氏名聴取へ進む」共通遷移なので、conditions では all-target-same を明示。
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "初診"
        next: 氏名聴取
      - match: "変更"
        next: 氏名聴取
      - match: "キャンセル"
        next: 氏名聴取
      - match: "確認"
        next: 氏名聴取
      - match: "折返し"
        next: 氏名聴取
      - match: "other"
        next: END_聴取失敗

  # === 個人情報聴取（全用件共通の前段）===
  - step: 氏名聴取
    type: subflow
    flowname: "鹿児島市立病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "鹿児島市立病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "鹿児島市立病院$電話番号聴取"
    next: 用件分岐

  # === 用件分岐（個人情報聴取後の用件別ルーティング）===
  - step: 用件分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "初診"
        next: 初診確認
      - match: "変更"
        next: 診療科_予約変更
      - match: "キャンセル"
        next: 診療科_予約変更
      - match: "確認"
        next: 問い合わせ内容
      - match: "折返し"
        next: 問い合わせ内容
      - match: "other"
        next: END_聴取失敗

  # === 初診ルート ===
  - step: 初診確認
    type: hearing
    output_format: enum
    conditions:
      - match: "初診"
        next: 紹介状確認
      - match: "other"  # = 再診（AI 電話受付不可）
        next: END_再診案内

  - step: 紹介状確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 診療科_新規
      - match: "other"  # = なし（紹介状必須）
        next: END_紹介状なし

  - step: 診療科_新規
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "新生児内科"
        next: END_新生児内科案内
      - match: "精神科"
        next: END_精神科案内
      - match: "other"  # = その他の対応可能診療科
        next: 紹介元医療機関名

  - step: 紹介元医療機関名
    type: hearing
    output_format: text
    next: 紹介元電話番号

  - step: 紹介元電話番号
    type: hearing
    output_format: text
    next: END_受付完了_初診

  # === 変更/キャンセルルート ===
  - step: 診療科_予約変更
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "新生児内科"
        next: END_新生児内科案内
      - match: "精神科"
        next: END_精神科案内
      - match: "other"
        next: 現在の予約日

  - step: 現在の予約日
    type: hearing
    output_format: datetime
    next: 用件分岐_変更キャンセル

  - step: 用件分岐_変更キャンセル
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: END_受付完了_変更
      - match: "other"  # = キャンセル
        next: END_受付完了_キャンセル

  # === 確認/折返しルート ===
  - step: 問い合わせ内容
    type: hearing
    output_format: text
    next: 用件分岐_確認折返し

  - step: 用件分岐_確認折返し
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "確認"
        next: END_受付完了_確認
      - match: "other"  # = 折返し
        next: END_受付完了_折返し

  # === 終話ブロック ===
  - step: END_受付完了_初診
    type: termination
    termination_ref: "END_受付完了_初診"
  - step: END_受付完了_変更
    type: termination
    termination_ref: "END_受付完了_変更"
  - step: END_受付完了_キャンセル
    type: termination
    termination_ref: "END_受付完了_キャンセル"
  - step: END_受付完了_確認
    type: termination
    termination_ref: "END_受付完了_確認"
  - step: END_受付完了_折返し
    type: termination
    termination_ref: "END_受付完了_折返し"
  - step: END_紹介状なし
    type: termination
    termination_ref: "END_紹介状なし"
  - step: END_再診案内
    type: termination
    termination_ref: "END_再診案内"
  - step: END_新生児内科案内
    type: termination
    termination_ref: "END_新生児内科案内"
  - step: END_精神科案内
    type: termination
    termination_ref: "END_精神科案内"
  - step: END_年末年始
    type: termination
    termination_ref: "END_年末年始"
  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

