# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話ください。1、診察の予約を取る、2、予約を変更する、3、予約をキャンセルする、4、予約を確認する。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "初診"
        - "変更"
        - "キャンセル"
        - "確認"
        - "折返し"
      mapping:
        - input: "DTMF 1 / 「予約」「初診」「新規」「予約を取る」「診察の予約」「初診予約」"
          output: "初診"
        - input: "DTMF 2 / 「変更」「予約変更」「日程変更」「日付変更」「変えたい」「取り直したい」"
          output: "変更"
        - input: "DTMF 3 / 「キャンセル」「取り消し」「やめる」「Cancel」"
          output: "キャンセル"
        - input: "DTMF 4 / 「確認」「予約確認」「予約票」「料金」「金額」「検査結果」「お問合せ」"
          output: "確認"
        - input: "「折り返し」「先ほど」「担当の」「着信」「電話が」（音声のみ、DTMF なし）"
          output: "折返し"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "classification"
    next_step: "氏名聴取"
    retry_failure: "end_failure"

  - step_name: "初診確認"
    tts_announcement: "初診のご予約ですか？はいそうです、または、いいえ違いますとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "初診"
        - "再診"
      mapping:
        - input: "「はい」「そうです」「初診です」「初めてです」「OK」「大丈夫」"
          output: "初診"
        - input: "「いいえ」「違います」「再診」「ちがう」「ではない」"
          output: "再診"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "isFirstVisit"
    next_step: "紹介状確認 / END_再診案内"
    retry_failure: "end_failure"

  - step_name: "紹介状確認"
    tts_announcement: "鹿児島市立病院宛の紹介状、もしくは検診結果はお持ちですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "「はい」「あります」「持ってます」「持っています」「OK」"
          output: "あり"
        - input: "「いいえ」「ありません」「持ってません」「ないです」"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "hasReferral"
    next_step: "診療科_新規 / END_紹介状なし"
    retry_failure: "end_failure"

  - step_name: "診療科_新規"
    tts_announcement: "紹介状に記載されている診療科をお話ください。記載がない場合は「記載なし」のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "外科"
        - "眼科"
        - "形成外科"
        - "血液・膠原病内科"
        - "検診"
        - "呼吸器外科"
        - "呼吸器内科"
        - "産科"
        - "歯科・歯科口腔外科"
        - "耳鼻咽喉科"
        - "腫瘍内科"
        - "循環器内科"
        - "小児科"
        - "小児外科"
        - "消化器外科"
        - "消化器内科"
        - "心臓血管外科"
        - "新生児内科"
        - "腎臓内科"
        - "整形外科"
        - "精神科"
        - "総合内科"
        - "糖尿病・内分泌内科"
        - "内科"
        - "乳腺外科"
        - "脳神経外科"
        - "脳神経内科"
        - "泌尿器科"
        - "皮膚科"
        - "婦人科"
        - "放射線科"
        - "麻酔科"
        - "登録なし"
      mapping:
        - input: "「呼吸器」「呼吸器外科」「呼吸器内科」（呼吸器のみは内科/外科の確認が必要）"
          output: "呼吸器外科 / 呼吸器内科 / NO_RESULT（呼吸器のみは再質問）"
        - input: "「消化器」「消化器外科」「消化器内科」"
          output: "消化器外科 / 消化器内科 / NO_RESULT"
        - input: "「脳神経」「脳神経外科」「脳神経内科」"
          output: "脳神経外科 / 脳神経内科 / NO_RESULT"
        - input: "「産婦人科」「産科」「婦人科」"
          output: "産科 / 婦人科 / NO_RESULT"
        - input: "「内科」「外科」「眼科」「皮膚科」「整形外科」「精神科」「新生児内科」 等の単独科目"
          output: "対応する診療科名"
        - input: "「記載なし」「分からない」「忘れた」"
          output: "登録なし"
      no_result_condition: "32 科目および登録なしのいずれにも該当しない発話、または 呼吸器/消化器/脳神経/産婦人科 の親グループ単独発話"
    save_to: "clinicalDepartment"
    next_step: "紹介元医療機関名 / END_新生児内科案内 / END_精神科案内"
    retry_failure: "end_failure"

  - step_name: "紹介元医療機関名"
    tts_announcement: "紹介元の医療機関名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "（自由文）"
      mapping:
        - input: "「〇〇病院」「〇〇クリニック」「〇〇医院」 等"
          output: "発話内容そのまま"
      no_result_condition: "発話なし / 無音"
    save_to: "referralSourceFacility"
    next_step: "紹介元電話番号"
    retry_failure: "end_failure"

  - step_name: "紹介元電話番号"
    tts_announcement: "続いて、紹介元の電話番号を、0から始まる市外局番からお話ください。わからない場合は「わからない」とお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "（電話番号文字列）"
      mapping:
        - input: "数字列（音声 or DTMF）"
          output: "数字列をそのまま保存"
        - input: "「わからない」「分かりません」「不明」"
          output: "わからない"
      no_result_condition: "発話なし / 無音"
    save_to: "referralSourcePhone"
    next_step: "END_受付完了_初診"
    retry_failure: "end_failure"

  - step_name: "診療科_予約変更"
    tts_announcement: "予約票に記載されている診療科をおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "外科"
        - "眼科"
        - "形成外科"
        - "血液・膠原病内科"
        - "検診"
        - "呼吸器外科"
        - "呼吸器内科"
        - "産科"
        - "歯科・歯科口腔外科"
        - "耳鼻咽喉科"
        - "腫瘍内科"
        - "循環器内科"
        - "小児科"
        - "小児外科"
        - "消化器外科"
        - "消化器内科"
        - "心臓血管外科"
        - "新生児内科"
        - "腎臓内科"
        - "整形外科"
        - "精神科"
        - "総合内科"
        - "糖尿病・内分泌内科"
        - "内科"
        - "乳腺外科"
        - "脳神経外科"
        - "脳神経内科"
        - "泌尿器科"
        - "皮膚科"
        - "婦人科"
        - "放射線科"
        - "麻酔科"
        - "登録なし"
      mapping:
        - input: "（同 診療科_新規 と同じマッピング）"
          output: "対応する診療科名"
      no_result_condition: "32 科目および登録なしのいずれにも該当しない発話"
    save_to: "clinicalDepartment"
    next_step: "現在の予約日 / END_新生児内科案内 / END_精神科案内"
    retry_failure: "end_failure"

  - step_name: "現在の予約日"
    tts_announcement: "予約日を「４月１日」のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "YYYY-MM-DD HH:MM"
      mapping:
        - input: "「4月1日」「来週の火曜日」「明日」 等"
          output: "YYYY-MM-DD 形式に正規化"
      no_result_condition: "日付として解釈できない発話"
    save_to: "reservationDate"
    next_step: "用件分岐_変更キャンセル"
    retry_failure: "end_failure"

  - step_name: "問い合わせ内容"
    tts_announcement: "それでは、ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」など、内容を簡潔にお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "（自由文）"
      mapping:
        - input: "発話内容そのまま"
          output: "（保存）"
      no_result_condition: "発話なし / 無音"
    save_to: "reason"
    next_step: "用件分岐_確認折返し"
    retry_failure: "end_failure"

# --- セクション8: 終話パターン ---
termination_patterns:
  # 異常系（必須3パターン）
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（土日祝・平日 9 時前/17 時以降）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、土日祝日を除く、平日月曜日から金曜日の９時から１７時となっております。恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。受付時間は、平日月曜日から金曜日の９時から１６時となっております。電話番号は、０９９－２３０－７０００です。代表電話に初診紹介予約についてとお伝えください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # 正常系（受付完了）
  - name: "END_受付完了_初診"
    condition: "初診ルート全聴取完了"
    tts_announcement: "初診予約の申し込みを受付いたしました。土日祝日を除く、3診療日以内に、担当者から折り返しお電話いたします。担当者から折り返しする電話番号は発信専用ダイヤルとなっておりますので、担当者からの折り返し電話をお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_初診"

  - name: "END_受付完了_変更"
    condition: "変更ルート全聴取完了"
    tts_announcement: "予約変更の申し込みを受付いたしました。土日祝日を除く、3診療日以内に、担当者から折り返しお電話いたします。担当者から折り返しする電話番号は発信専用ダイヤルとなっておりますので、担当者からの折り返し電話をお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
