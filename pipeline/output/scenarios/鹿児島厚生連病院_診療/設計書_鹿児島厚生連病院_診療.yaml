# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "鹿厚連$診療_20260403"
      role: "main"
      description: "冒頭チェーン → 個人情報サブフロー遷移（診察券番号・氏名・生年月日・電話番号） → 診療科聴取 → 用件分岐（4択DTMF） → 用件別聴取 → 終話"
    - name: "鹿厚連$氏名聴取_20260403"
      role: "sub"
      description: "氏名聴取サブフロー"
    - name: "鹿厚連$生年月日聴取_20260403"
      role: "sub"
      description: "生年月日聴取サブフロー（復唱あり）"
    - name: "鹿厚連$電話番号聴取_20260403"
      role: "sub"
      description: "電話番号聴取サブフロー（携帯/固定分岐・SMS送信用携帯番号聴取）"
    - name: "鹿厚連$診察券番号聴取_20260403"
      role: "sub"
      description: "診察券番号聴取サブフロー（復唱確認・わからない対応・DTMF適用）"
    - name: "鹿厚連$RAG検索_20260403"
      role: "sub"
      description: "FAQ検索（RAG）サブフロー。RAGモジュールで検索し該当あり/なしをメインフローに返却"
  subflows:
    - name: "鹿厚連$診察券番号聴取_20260403"
      target: "診察券番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の診察券番号聴取フローを完全コピー。フロー名プレフィックスのみ置換"
    - name: "鹿厚連$氏名聴取_20260403"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の氏名聴取フローを完全コピー"
    - name: "鹿厚連$生年月日聴取_20260403"
      target: "生年月日聴取（復唱あり）"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の生年月日聴取フローを完全コピー。復唱あり"
    - name: "鹿厚連$電話番号聴取_20260403"
      target: "電話番号聴取（携帯/固定分岐）"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の電話番号聴取フローを完全コピー。incoming-classifier で着信番号分岐"
    - name: "鹿厚連$RAG検索_20260403"
      target: "FAQ検索（RAG）"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "その他問い合わせルートのFAQ検索。RAGモジュールで検索し、該当あり/なしをメインフローに返却"

# --- セクション3: フローの目的 ---
purpose: >
  鹿児島厚生連病院の診療予約専用AI電話。患者からの電話を受け、
  個人情報（診察券番号・氏名・生年月日・電話番号）と診療科をフリーワードで聴取した後、
  用件を4択（予約・予約変更・予約キャンセル・その他問い合わせ）で判別し、
  用件に応じた詳細情報（予約希望時期・予約日・キャンセル理由・問い合わせ内容等）を聴取する。
  キャンセルルートでは次回予約希望を確認し、「あり」の場合はclassificationを変更に更新して予約希望時期を聴取する。
  その他問い合わせではFAQ検索（RAGサブフロー）をループで実施し、該当なしの場合は折り返し連絡で対応する。
  365日 7:00-20:00 で稼働し、時間外は時間外アナウンスで案内する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "鹿厚連$診療_20260403"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信分類(incoming-classifier)
              ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times)
                    ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                    └─ 受付可(true) → 冒頭_アナウンス(TTS)

      冒頭_アナウンス(TTS)
        → ★サブフロー遷移: 診察券番号聴取(Custom Jump to Flow → 鹿厚連$診察券番号聴取_20260403)
          → ★サブフロー遷移: 氏名聴取(Custom Jump to Flow → 鹿厚連$氏名聴取_20260403)
            → ★サブフロー遷移: 生年月日聴取(Custom Jump to Flow → 鹿厚連$生年月日聴取_20260403)
              → ★サブフロー遷移: 電話番号聴取(Custom Jump to Flow → 鹿厚連$電話番号聴取_20260403)
                  └─ .* → 診療科_アナウンス(TTS)

      ─── 診療科聴取 ───
      診療科_アナウンス(TTS) → 入力_診療科(AmiVoice STT, profile_words=診療科辞書)
        ├─ success → OpenAI_診療科(generate_by_OpenAI)
        │     └─ success → saveContext2DB_診療科 → 用件_アナウンス(TTS)
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_診療科(Speech Retry Counter)
        │     ├─ Retry → 診療科_アナウンス(TTS)
        │     └─ No more → saveContext2DB_診療科_登録なし → 用件_アナウンス(TTS)

      ─── 用件聴取（DTMF 4択）───
      用件_アナウンス(TTS) → 入力_用件(DTMF AmiVoice STT, max_dtmf_length=1)
        ├─ success → OpenAI_用件(generate_by_OpenAI)
        │     ├─ 予約 → saveContext2DB_用件_予約 → 予約希望時期_アナウンス(TTS)
        │     ├─ 変更 → saveContext2DB_用件_変更 → 変更_予約日_アナウンス(TTS)
        │     ├─ キャンセル → saveContext2DB_用件_キャンセル → キャンセル_予約日_アナウンス(TTS)
        │     ├─ その他問い合わせ → saveContext2DB_用件_その他 → 確認内容_アナウンス(TTS)
        │     └─ NO_RESULT → リトライ_用件
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_用件(Speech Retry Counter)
        │     ├─ Retry → 用件_アナウンス(TTS)
        │     └─ No more → 終話_失敗_アナウンス(TTS) → 完了フラグ_聴取失敗(status=0, smsFlag=-1) → 切断

      ─── 予約ルート（予約日なし。予約希望時期のみ）───
      予約希望時期_アナウンス(TTS) → 入力_予約希望時期(AmiVoice STT)
        ├─ success → OpenAI_予約希望時期(generate_by_OpenAI)
        │     └─ success → saveContext2DB_予約希望時期 → 終話_予約_アナウンス(TTS)
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_予約希望時期
        │     ├─ Retry → 予約希望時期_アナウンス(TTS)
        │     └─ No more → 終話_予約_アナウンス(TTS)
      終話_予約_アナウンス(TTS) → 完了フラグ_受付完了(status=1, smsFlag=1) → 切断

      ─── 予約変更ルート ───
      変更_予約日_アナウンス(TTS) → 入力_変更_予約日(AmiVoice STT)
        ├─ success → OpenAI_変更_予約日(generate_by_OpenAI)
        │     └─ success → saveContext2DB_変更_予約日 → 変更_希望時期_アナウンス(TTS)
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_変更_予約日
        │     ├─ Retry → 変更_予約日_アナウンス(TTS)
        │     └─ No more → 変更_希望時期_アナウンス(TTS)

      変更_希望時期_アナウンス(TTS) → 入力_変更_希望時期(AmiVoice STT)
        ├─ success → OpenAI_変更_希望時期(generate_by_OpenAI)
        │     └─ success → saveContext2DB_変更_希望時期 → 終話_変更_アナウンス(TTS)
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_変更_希望時期
        │     ├─ Retry → 変更_希望時期_アナウンス(TTS)
        │     └─ No more → 終話_変更_アナウンス(TTS)
      終話_変更_アナウンス(TTS) → 完了フラグ_受付完了(status=1, smsFlag=1) → 切断

      ─── 予約キャンセルルート ───
      キャンセル_予約日_アナウンス(TTS) → 入力_キャンセル_予約日(AmiVoice STT)
        ├─ success → OpenAI_キャンセル_予約日(generate_by_OpenAI)
        │     └─ success → saveContext2DB_キャンセル_予約日 → キャンセル理由_アナウンス(TTS)
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_キャンセル_予約日
        │     ├─ Retry → キャンセル_予約日_アナウンス(TTS)
        │     └─ No more → キャンセル理由_アナウンス(TTS)

      キャンセル理由_アナウンス(TTS) → 入力_キャンセル理由(AmiVoice STT)
        ├─ success → OpenAI_キャンセル理由(generate_by_OpenAI)
        │     └─ success → saveContext2DB_キャンセル理由 → 次回予約希望_アナウンス(TTS)
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_キャンセル理由
        │     ├─ Retry → キャンセル理由_アナウンス(TTS)
        │     └─ No more → 次回予約希望_アナウンス(TTS)

      次回予約希望_アナウンス(TTS) → 入力_次回予約希望(AmiVoice STT)
        ├─ success → OpenAI_次回予約希望(generate_by_OpenAI)
        │     ├─ 希望あり → saveContext2DB_次回予約希望_あり
        │     │         → saveContext2DB_用件_変更更新（classification=「変更」に更新）
        │     │         → キャンセル_変更_希望時期_アナウンス(TTS) → 入力_キャンセル_変更_希望時期(AmiVoice STT)
        │     │             ├─ success → OpenAI_キャンセル_変更_希望時期 → saveContext2DB_キャンセル_変更_希望時期 → 終話_変更_アナウンス(TTS)
        │     │             ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_キャンセル_変更_希望時期
        │     │             │     ├─ Retry → キャンセル_変更_希望時期_アナウンス(TTS)
        │     │             │     └─ No more → 終話_変更_アナウンス(TTS)
        │     │         終話_変更_アナウンス(TTS) → 完了フラグ_受付完了(status=1, smsFlag=1) → 切断
        │     ├─ 希望なし/不明 → saveContext2DB_次回予約希望_なし → 終話_キャンセル_アナウンス(TTS)
        │     └─ NO_RESULT → リトライ_次回予約希望
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_次回予約希望
        │     ├─ Retry → 次回予約希望_アナウンス(TTS)
        │     └─ No more → 終話_キャンセル_アナウンス(TTS)
      終話_キャンセル_アナウンス(TTS) → 完了フラグ_キャンセル受付(status=1, smsFlag=2) → 切断

      ─── その他問い合わせルート ───
      確認内容_アナウンス(TTS) → 入力_確認内容(AmiVoice STT)
        ├─ success → OpenAI_確認内容(generate_by_OpenAI)
        │     └─ success → saveContext2DB_確認内容 → FAQ確認_アナウンス(TTS)
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_確認内容
        │     ├─ Retry → 確認内容_アナウンス(TTS)
        │     └─ No more → FAQ確認_アナウンス(TTS)

      FAQ確認_アナウンス(TTS) → 入力_FAQ確認(AmiVoice STT)
        ├─ success → OpenAI_FAQ確認(generate_by_OpenAI)
        │     ├─ なし → saveContext2DB_FAQ確認 → 終話_その他問合せ_アナウンス(TTS)
        │     ├─ 質問あり → saveContext2DB_FAQ確認
        │     │     → ★FAQ検索(Custom Jump to Flow → 鹿厚連$RAG検索_20260403)
        │     │         ├─ 該当あり → FAQ回答_アナウンス(TTS) → FAQ確認_アナウンス(TTS)（ループ）
        │     │         └─ 該当なし → FAQ非該当_アナウンス(TTS) → FAQ確認_アナウンス(TTS)（ループ）
        │     └─ NO_RESULT → リトライ_FAQ確認
        ├─ TIMEOUT/ERROR/NO_RESULT → リトライ_FAQ確認
        │     ├─ Retry → FAQ確認_アナウンス(TTS)
        │     └─ No more → 終話_その他問合せ_アナウンス(TTS)
      終話_その他問合せ_アナウンス(TTS) → 完了フラグ_その他受付(status=1, smsFlag=1) → 切断

      ─── 終話パターン一覧 ───
      END_受付完了（予約）:          status=1, smsFlag=1 → 切断
      END_受付完了（変更）:          status=1, smsFlag=1 → 切断（キャンセル→変更更新時も含む）
      END_キャンセル受付:            status=1, smsFlag=2 → 切断
      END_その他問合せ受付:          status=1, smsFlag=1 → 切断
      END_聴取失敗（リトライ上限）:   status=0, smsFlag=-1 → 切断
      END_非通知:                    status=2, smsFlag=-1 → 切断
      END_時間外:                    status=6, smsFlag=-1 → 切断
    notes: |
      - acceptance_times使用（365日 7:00-20:00）
      - 診療科はフリーワード聴取だがprofile_words辞書あり（22科+類義語）
      - 用件はDTMF 4択（1=予約, 2=予約変更, 3=予約キャンセル, 4=その他問い合わせ）
      - 予約ルートは予約日なし（予約希望時期のみ）
      - 変更ルートは予約日+予約希望時期
      - キャンセルルートは予約日+キャンセル理由+次回予約希望（あり→classification変更更新→予約希望時期→終話（変更）、なし→終話（キャンセル））
      - smsFlag: 予約/変更/その他=1、キャンセル=2、途中切断/聴取失敗=0(-1)、非通知/時間外=-1
      - 個人情報聴取は4サブフロー分割（CLAUDE.md Rule 9）
      - FAQ確認はループ構造（「なし」回答まで繰り返し）

  - flow_name: "鹿厚連$診察券番号聴取_20260403"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/個人情報サブフロー.bivr の診察券番号聴取フローを完全コピー。
      フロー名プレフィックスのみ「鹿厚連$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱確認あり。わからない対応あり。DTMF適用"

  - flow_name: "鹿厚連$氏名聴取_20260403"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/個人情報サブフロー.bivr の氏名聴取フローを完全コピー。
      フロー名プレフィックスのみ「鹿厚連$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "フリーテキスト聴取。復唱なし"

  - flow_name: "鹿厚連$生年月日聴取_20260403"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/個人情報サブフロー.bivr の生年月日聴取フローを完全コピー。
      フロー名プレフィックスのみ「鹿厚連$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱あり（和暦/西暦対応）。SMSの認証事項に利用"

  - flow_name: "鹿厚連$電話番号聴取_20260403"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/個人情報サブフロー.bivr の電話番号聴取フローを完全コピー。
      フロー名プレフィックスのみ「鹿厚連$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "incoming-classifier で着信番号分岐。携帯は着信番号復唱確認、固定/非通知はSMS送信用携帯番号聴取（DTMF対応）"

  - flow_name: "鹿厚連$RAG検索_20260403"
    diagram: |
      【RAGサブフロー内部構造】
      RAG検索_入力(AmiVoice STT ※メインフローからCustom Jump to Flowで遷移してきた質問文字列は
        params.moduleでメインフローのSTT結果を参照) → RAG検索(RAGモジュール) →
        OpenAI_RAG判定(generate_by_OpenAI) →
          ├─ 該当あり → script_結果返却_RAG(Script: $runner.setResult("該当あり"))
          └─ 該当なし → script_結果返却_RAG_なし(Script: $runner.setResult("該当なし"))

      ※ Custom Jump to Flowの返却値:
        - "該当あり": メインフロー側でFAQ回答_アナウンス(TTS) → FAQ確認_アナウンスにループ
        - "該当なし": メインフロー側でFAQ非該当_アナウンス(TTS) → FAQ確認_アナウンスにループ

      ※ RAGモジュールはdrjoy^External Integration$RAGを使用（AmiVoice内蔵RAGは使わない）
      ※ 全TTS/STTにsave2dbサブモジュールを接続すること
    notes: "RAGモジュールで施設FAQ検索。結果はOpenAI判定で該当あり/なし分岐。メインフローに結果を返却。"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "その他問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件選択結果。DTMF 1=予約, 2=変更, 3=キャンセル, 4=その他問い合わせ。キャンセル→変更の更新あり"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values:
      - id: "1"
        order: "1"
