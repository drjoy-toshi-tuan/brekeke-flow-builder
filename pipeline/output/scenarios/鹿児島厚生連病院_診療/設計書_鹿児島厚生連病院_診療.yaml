# --- セクション11: 特記事項・制約 ---
special_notes:
  - "聴取順序は docx【3-3. 通話フロー】に基づく:「冒頭→個人情報（診察券番号→氏名→生年月日→電話番号）→診療科→用件→用件別詳細」"
  - "3/11修正で「診療科」と「用件」の聴取順番を変更。診療科聴取が先、用件聴取が後"
  - "診療科はフリーワード聴取だが、docxに22科+類義語の詳細辞書あり。profile_wordsに登録して認識精度を向上。OpenAIで診療科リストへの正規化を行う"
  - "用件はDTMF 4択（1=予約, 2=予約変更, 3=予約キャンセル, 4=その他問い合わせ）"
  - "予約ルートには予約日（reservationDate）聴取なし。予約希望時期（desiredPeriod）のみ"
  - "キャンセルルートの次回予約希望「あり」→ classificationを「キャンセル」から「変更」に更新 → 予約希望時期聴取 → 終話（変更）smsFlag=1"
  - "キャンセルルートの次回予約希望「なし」→ 終話（キャンセル）smsFlag=2"
  - "smsFlag制御: 予約/変更/その他問い合わせ完了=1、キャンセル完了=2、途中切断/聴取失敗/非通知/時間外=-1"
  - "status制御: 終話アナウンス到達=1、途中切断/聴取失敗=0、非通知=2、時間外=6"
  - "その他問い合わせルートではFAQ確認がループ構造（「なし」回答まで繰り返し）"
  - "FAQ非該当アナウンス後もFAQ確認にループで戻る（終話ではない）"
  - "確認内容の聴取はフリー聴取"
  - "営業時間チェックあり（365日 7:00-20:00）。acceptance_timesモジュールを配置"
  - "個人情報聴取サブフローはリファレンスbivrを完全コピー（CLAUDE.md Rule 9）"
  - "終話_その他問合せ_アナウンスの「折り返しショートメールもしくは電話にて」という文言は固定電話発信者にも読み上げられるが、「もしくは電話にて」でカバーしているため携帯/固定の終話TTS分岐は設けない（設計判断済み）"
  - "冒頭アナウンスに「本日の受診に関するお問い合わせは代表電話へ」の案内を含む"
  - "稼働開始日: 2026/1/26（既に稼働開始済み。本設計書はGen3フロー再構築用）"

