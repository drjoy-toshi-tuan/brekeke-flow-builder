    retry_failure: "skip"

  - step_name: "確認内容"
    tts_announcement: "お問い合わせの内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果（問い合わせ内容）"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "inquiry"
    next_step: "FAQ確認_アナウンス"
    retry_failure: "skip"

  - step_name: "FAQ確認"
    tts_announcement: "ほかにご用件やお問い合わせはございますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "なし"
        - "質問あり"
        - "NO_RESULT"
      mapping:
        - input: "「なし」「ない」「ありません」「大丈夫」「いいえ」「結構」等の否定表現"
          output: "なし"
        - input: "質問内容が入力された場合"
          output: "質問あり"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "question"
    next_step: "なし→終話_その他問合せ_アナウンス / 質問あり→★FAQ検索(RAGサブフロー)→回答後FAQ確認_アナウンスにループ"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  - name: "END_受付完了_予約"
    condition: "予約ルート全聴取完了"
    tts_announcement: "依頼された内容は、まだ確定ではありません。お話していただいた内容を予約担当が確認し、土日祝日を除く3営業日以内にご連絡いたします。当院からのご連絡をお待ちください。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_予約"

  - name: "END_受付完了_変更"
    condition: "変更ルート全聴取完了（キャンセル→変更更新ルート含む）"
    tts_announcement: "依頼された内容は、まだ確定ではありません。お話していただいた内容を予約担当が確認し、土日祝日を除く3営業日以内にご連絡いたします。当院からのご連絡をお待ちください。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_変更"

  - name: "END_キャンセル受付"
    condition: "キャンセルルート全聴取完了かつ次回予約希望=なし"
    tts_announcement: "依頼された内容は、まだ確定ではありません。お話していただいた内容を予約担当が確認し、土日祝日を除く3営業日以内にご連絡いたします。当院からのご連絡をお待ちください。お電話ありがとうございました。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル受付"

  - name: "END_その他問合せ受付"
    condition: "その他問い合わせルート全聴取完了（FAQ確認で「なし」回答後）"
    tts_announcement: "問い合わせの内容しだいで、土日祝日をのぞく3営業日以内に担当者から折り返しショートメールもしくは電話にてご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_その他受付"

  # NOTE: FAQ非該当アナウンス（FAQ確認ループ内のTTS）は終話パターンではないため、
  # tts_modules セクションの「FAQ非該当_アナウンス」で管理する。
  # 完了フラグは設定しない。アナウンス後、FAQ確認_アナウンスにループで戻る。

  - name: "END_聴取失敗"
    condition: "用件リトライ上限超過"
    tts_announcement: "申し訳ございません。うまく聞き取りができませんでした。恐れ入りますがおかけ直しください。お電話ありがとうございました。"
    status: "0"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定"
    tts_announcement: "お電話ありがとうございます。鹿児島厚生連病院、診療予約専用、AI電話です。ただ今のお時間は、予約受付時間外となっております。7時から20時までにおかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
  patterns:
    - condition: "classification=予約 or classification=変更 or classification=その他問い合わせ"
      sms_flag: "1"
      notes: "通常SMS（予約/変更/その他問い合わせ）"
    - condition: "classification=キャンセル"
      sms_flag: "2"
      notes: "キャンセル専用SMS"

