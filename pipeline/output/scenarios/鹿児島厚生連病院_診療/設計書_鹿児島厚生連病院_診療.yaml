  - step_name: "次回予約希望"
    tts_announcement: "次回の予約希望はありますか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "希望あり"
        - "希望なし/不明"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「あります」「希望します」「お願いします」等の肯定表現"
          output: "希望あり"
        - input: "「いいえ」「ありません」「ない」「わからない」「結構」「大丈夫」等の否定表現"
          output: "希望なし/不明"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "nextReservationCheck"
    next_step: "希望あり→ saveContext2DB_用件_変更更新 → キャンセル_変更_希望時期_アナウンス / 希望なし/不明→ 終話_キャンセル_アナウンス"
    retry_failure: "skip"

  - step_name: "予約希望時期（キャンセル→変更ルート）"
    tts_announcement: "予約を希望する日程をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
