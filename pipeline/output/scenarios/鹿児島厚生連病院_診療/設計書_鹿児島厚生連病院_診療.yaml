# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # === 個人情報（サブフロー — CLAUDE.md Rule 9） ===
  - order: 1
    name: "診察券番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "medicalCardNumber"
    openai_processing: "classify"
    output_format: "number"
    output_labels:
      - "数字"
      - "わからない"
    notes: "サブフロー（Rule 9）。復唱確認あり。「わからない」→「不明」保存でスキップ。3桁以上必須。DTMF適用"

  - order: 2
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー（Rule 9）。「名前は、たなかたろう」の形式で聴取。カタカナ変換"

  - order: 3
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 1
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "valid"
      - "不正値"
      - "2桁_0007"
      - "2桁_0831"
      - "2桁_3263"
    notes: "サブフロー（Rule 9）。DOB Re-confirmation あり。和暦/西暦で復唱。SMSの認証事項"

  - order: 4
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 1
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "サブフロー（Rule 9）。incoming-classifier で着信番号分岐。携帯=着信番号復唱、固定/非通知=携帯番号をDTMFで聴取"

  # === メインフロー聴取項目 ===
  - order: 5
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "フリーワード聴取。profile_words辞書あり（22科+類義語）。OpenAIで診療科リストへの正規化。リストにない場合はフリーテキスト保存。「わからない」→「登録なし」"

  - order: 6
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "その他問い合わせ"
    notes: "DTMF 1=予約, 2=変更, 3=キャンセル, 4=その他問い合わせ"

  - order: 7
    name: "予約希望時期（予約ルート）"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredPeriod"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "予約ルートで使用。フリー聴取"

  - order: 8
    name: "予約日（変更ルート）"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "変更ルートで使用。フリー聴取（日付テキストそのまま保存）"

  - order: 9
    name: "予約希望時期（変更ルート）"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredPeriod"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "変更ルートで使用。フリー聴取"

  - order: 10
    name: "予約日（キャンセルルート）"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "キャンセルルートで使用。フリー聴取"

  - order: 11
    name: "キャンセル理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "cancelReason"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "キャンセルルートのみ。フリー聴取"

  - order: 12
    name: "次回予約希望"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "nextReservationCheck"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "希望あり"
      - "希望なし/不明"
    notes: "キャンセルルートのみ。「あり」→ classification を「変更」に更新 → 予約希望時期聴取。「なし/わからない」→ 終話（キャンセル）"

  - order: 13
    name: "予約希望時期（キャンセル→変更ルート）"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredPeriod"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "キャンセルルートで次回予約希望「あり」の場合のみ。フリー聴取"

  - order: 14
    name: "確認内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inquiry"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "その他問い合わせルートのみ。フリー聴取"

  - order: 15
    name: "FAQ確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "question"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "なし"
      - "質問あり"
    notes: "その他問い合わせルートのみ。ループ構造: 「なし」回答まで繰り返し。「質問あり」→RAG検索→回答→再質問"

# --- セクション7: ステップ詳細 ---
step_details:
  # サブフロー（個人情報）はRule 9 完全コピーのため詳細記載省略。
  # 以下はメインフロー内の聴取ステップのみ記載。

  - step_name: "診療科"
    tts_announcement: "診療科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "（診療科リスト22科のいずれか）"
        - "登録なし"
        - "フリーテキスト"
        - "NO_RESULT"
      mapping:
        - input: "音声認識結果が診療科リストの正規化名またはキーワードに一致"
          output: "正規化診療科名（例: 消化器内科）"
        - input: "「わからない」「決まっていない」等"
          output: "登録なし"
        - input: "リストにない診療科名"
          output: "フリーテキスト（そのまま保存）"
        - input: "音声認識結果が空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "clinicalDepartment"
    next_step: "用件_アナウンス"
    retry_failure: "skip"

  - step_name: "用件確認"
    tts_announcement: >
      ご用件を次の4つのうちからお選びください。
      「1、予約」「2、予約変更」「3、予約キャンセル」「4、その他問い合わせ」。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "その他問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「予約したい」「新規予約」「申し込み」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「予約変更」「予約ずらしたい」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「取り消し」「やめたい」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「問い合わせ」「質問」「確認」「その他」を含む"
          output: "その他問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→予約希望時期_アナウンス / 変更→変更_予約日_アナウンス / キャンセル→キャンセル_予約日_アナウンス / その他問い合わせ→確認内容_アナウンス"
    retry_failure: "end_failure"

  - step_name: "予約希望時期（予約ルート）"
    tts_announcement: "予約を希望する日程をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果（希望日程）"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "desiredPeriod"
    next_step: "終話_予約_アナウンス"
    retry_failure: "skip"

  - step_name: "予約日（変更ルート）"
    tts_announcement: "現在の予約日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果（現在の予約日）"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reservationDate"
    next_step: "変更_希望時期_アナウンス"
    retry_failure: "skip"

  - step_name: "予約希望時期（変更ルート）"
    tts_announcement: "予約を希望する日程をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果（変更希望日程）"
