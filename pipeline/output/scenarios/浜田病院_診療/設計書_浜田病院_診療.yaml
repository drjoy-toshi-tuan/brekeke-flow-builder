# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Pattern 1 新規作成案件。元資料: docs/reference/customer_docs/浜田病院_診療_raw.md (5/12修正依頼分) + 元 PDF (202649【診療】導入時説明資料_浜田病院御中.pdf)"
  - "緊急性の判断を最優先分岐として配置（陣痛・破水・出血・胎動・つわり悪化等 → Blind Transfer to 06-6708-7200）"
  - "用件①→用件②/③の階層分岐。classification は順次上書きされ、最終的に最も詳細な用件種別が残る"
  - "個人情報サブフロー連鎖の順序は raw.md L34-L40 準拠: ID番号 → 患者名 → 生年月日 → 連絡先電話番号"
  - "raw.md L76「ID番号」は診察券番号サブフロー（標準テンプレ）を流用。「わからない」許容の挙動は標準テンプレ仕様確認要"
  - "復唱有無: ID番号(あり) / 患者名(なし) / 生年月日(あり) / 電話番号(あり、固定電話確認ロジック含む)"
  - "分娩予約・産後ケアは聴取せず即時終話（来院案内・HP誘導のみ）"
  - "無痛分娩は経産婦＋紹介状必須。紹介状なしは END_紹介状なし案内 で終話。紹介状ありは個人情報チェーンへ進み END_無痛受付完了 で終話"
  - "予約金 5 万円・転送先 06-6708-7200・浜田病院 HP 等の施設固有数値・名詞は prompter で改変禁止（properties 側で固定文言として記述）"
  - "終話の status 番号は元資料に未記載。本設計は status=1（受付完了）/2（案内系）/3（転送成功）/6（時間外）/9（転送失敗）の推測値で記載。確認事項あり"
  - 'sms_flag のテンプレ番号割当（"1" / "2" / "3" 等）は元 PDF に未記載。本設計は暫定値（電話折返し=0、それ以外=1）。Dr.JOY 画面側 SMS テンプレ仕様で要確認'
  - "SMS 追加項目（出産予定日 / 出産経験 / 帝王切開 or 普通分娩 / 住所 / 身長 / 体重 / 無痛分娩希望 / 女性医師希望）は AI 電話側で聴取せず、SMS で別途回収する設計（raw.md L112-120）。SMS 文言・送信タイミングは Dr.JOY 側設定"
  - "16週確認の配置（産科 新規予約ルート vs 無痛分娩ルート）は raw.md 表崩れで曖昧。本設計は移管ノートの推測に従い産科ルートに配置。元 PDF フロー図で要確認"
  - "「最後の問い合わせ」hearing の yes 時の挙動（用件①ループバック or 追加 hearing）は不明。暫定的に yes/no 両方とも終話分岐へ進める設計"
  - "Dr.JOY 側設定事項: 営業時間スケジュール詳細（acceptance_times）、SMS 送信文面、認証設定（生年月日・診察券番号・電話番号の優先順位）、Dr.JOY 画面の表示設定"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  # === BLOCKER（フローJSON 生成に必須・暫定埋め込み済み・確認後に差し替え）===
  - item: "office_id（Dr.JOY 管理画面で確認）"
    resolved: false
  - item: "対応電話番号（着信 ARS 番号 — Brekeke 設定時に確定）"
    resolved: false
  - item: "稼働時間（acceptance_times の business_hours — 月〜金 9-17 等。Dr.JOY 側設定でも可だが、フロー側でも基本設定必要）"
    resolved: false
  - item: "全終話パターンの status 番号確定（1=受付完了 / 2=代表案内 / 3=転送 / 6=時間外 / 9=転送失敗。元 PDF に明示なし。本設計は推測値）"
    resolved: false
