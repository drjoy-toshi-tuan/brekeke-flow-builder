# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "緊急性の判断"
    tts_announcement: |
      陣痛・破水・出血・胎動が少ない・つわりがひどい・症状が急に重くなったなどの
      緊急の状態ですか？
    input_method: "voice_only"
    openai_rules:
      output_values: ["緊急", "非緊急"]
      mapping:
        - input: "はい, そうです, 緊急, 陣痛, 破水, 出血 等"
          output: "緊急"
        - input: "いいえ, 違います, 大丈夫, 緊急ではない 等"
          output: "非緊急"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "emergencyFlag"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "用件1"
    tts_announcement: |
      本日のご用件を次の３つのうちからお選びください。
      「１、診療の予約・変更」「２、分娩・産後ケア」「３、その他問い合わせ」
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["診察予約・変更", "分娩・産後ケア", "その他問い合わせ"]
      mapping:
        - input: "DTMF 1, 一番, 予約, 変更, キャンセル, 診療 等"
          output: "診察予約・変更"
        - input: "DTMF 2, 二番, 分娩, 産後, ケア, 出産 等"
          output: "分娩・産後ケア"
        - input: "DTMF 3, 三番, 問い合わせ, 質問, その他 等"
          output: "その他問い合わせ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "用件2"
    tts_announcement: |
      ご用件を次の３つのうちどちらでしょうか。
      「１、新規予約」「２、日程の変更」「３、キャンセル」
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["新規予約", "予約変更", "キャンセル"]
      mapping:
        - input: "DTMF 1, 新規, 予約 等"
          output: "新規予約"
        - input: "DTMF 2, 変更, 日程変更 等"
          output: "予約変更"
        - input: "DTMF 3, キャンセル, 取り消し 等"
          output: "キャンセル"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "用件3"
    tts_announcement: |
      ご用件を次の3つのうちどちらでしょうか。
      「１、分娩予約」「２、無痛分娩」「３、産後ケア」
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["分娩予約", "無痛分娩", "産後ケア"]
      mapping:
        - input: "DTMF 1, 分娩, 分娩予約, お産 等"
          output: "分娩予約"
        - input: "DTMF 2, 無痛, 無痛分娩 等"
          output: "無痛分娩"
        - input: "DTMF 3, 産後, 産後ケア, ケア 等"
          output: "産後ケア"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "産科_婦人科確認"
    tts_announcement: "診療を希望されるのは産科と婦人科どちらでしょうか。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["産科", "婦人科"]
      mapping:
        - input: "産科, 産婦人科の産科 等"
          output: "産科"
        - input: "婦人科, 婦人 等"
          output: "婦人科"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "department"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "16週確認"
    tts_announcement: "妊娠週数は16週を超えていますか。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["あり", "なし"]
      mapping:
        - input: "はい, 超えています, あります, 16週以降 等"
          output: "あり"
        - input: "いいえ, まだです, 超えていません 等"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "week16OrLater"
    next_step: "受診希望日_産科"
    retry_failure: "end_failure"

  - step_name: "受診希望日_産科"
    tts_announcement: "受診を希望される日程をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD HH:MM"]
      mapping:
        - input: "音声認識結果（日付・時刻表現）"
          output: "YYYY-MM-DD HH:MM 形式に正規化"
      no_result_condition: "認識不可・日付として解釈不能"
    save_to: "desiredReservationDate"
    next_step: "合流_新規予約"
    retry_failure: "end_failure"

  - step_name: "受診希望日_婦人科"
    tts_announcement: "受診を希望される日程をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD HH:MM"]
      mapping:
        - input: "音声認識結果（日付・時刻表現）"
          output: "YYYY-MM-DD HH:MM 形式に正規化"
      no_result_condition: "認識不可・日付として解釈不能"
    save_to: "desiredReservationDate"
    next_step: "発熱確認"
    retry_failure: "end_failure"

  - step_name: "発熱確認"
    tts_announcement: |
      現在発熱はありますか。ある場合、熱が下がってから24時間後の受診をお願いしております。
    input_method: "voice_only"
    openai_rules:
      output_values: ["あり", "なし"]
      mapping:
        - input: "はい, あります, 発熱しています 等"
          output: "あり"
        - input: "いいえ, ありません, ないです 等"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "feverPresence"
    next_step: "（conditions で分岐: あり=発熱案内, other=合流_新規予約）"
    retry_failure: "end_failure"

  - step_name: "現在の予約日_変更"
    tts_announcement: "現在の診療予約日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD HH:MM"]
      mapping:
        - input: "音声認識結果（日付・時刻表現）"
          output: "YYYY-MM-DD HH:MM 形式に正規化"
      no_result_condition: "認識不可・日付として解釈不能"
    save_to: "reservationDate"
    next_step: "希望予約日_変更"
    retry_failure: "end_failure"

  - step_name: "希望予約日_変更"
    tts_announcement: "変更後の受診を希望される日程をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD HH:MM"]
      mapping:
        - input: "音声認識結果（日付・時刻表現）"
          output: "YYYY-MM-DD HH:MM 形式に正規化"
      no_result_condition: "認識不可・日付として解釈不能"
    save_to: "desiredReservationDate"
    next_step: "体調不良確認"
    retry_failure: "end_failure"

  - step_name: "体調不良確認"
    tts_announcement: "変更理由は体調不良ですか。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["はい", "いいえ"]
      mapping:
        - input: "はい, そうです, 体調不良 等"
          output: "はい"
        - input: "いいえ, 違います, 体調は問題ない 等"
          output: "いいえ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "illnessPresence"
    next_step: "合流_変更"
    retry_failure: "end_failure"

  - step_name: "現在の予約日_キャンセル"
    tts_announcement: "現在の診療予約日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD HH:MM"]
      mapping:
        - input: "音声認識結果（日付・時刻表現）"
          output: "YYYY-MM-DD HH:MM 形式に正規化"
      no_result_condition: "認識不可・日付として解釈不能"
    save_to: "reservationDate"
    next_step: "キャンセル理由"
    retry_failure: "end_failure"

  - step_name: "キャンセル理由"
    tts_announcement: "キャンセルを希望される理由をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["理由テキスト"]
      mapping:
        - input: "音声認識結果"
          output: "理由テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "合流_キャンセル"
    retry_failure: "end_failure"

  - step_name: "紹介状確認"
    tts_announcement: "紹介状はお持ちでしょうか。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["あり", "なし"]
      mapping:
        - input: "はい, あります, 持っています 等"
          output: "あり"
        - input: "いいえ, ありません, 持っていません 等"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "introductionLetter"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "内容確認"
    tts_announcement: |
      お問い合わせ内容をお話しください。内容を確認してから担当者が折り返しご連絡いたします。
    input_method: "voice_only"
    openai_rules:
      output_values: ["問い合わせ内容テキスト"]
      mapping:
        - input: "音声認識結果"
          output: "問い合わせ内容テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "inquiryContent"
    next_step: "電話SMS選択"
    retry_failure: "end_failure"

  - step_name: "電話SMS選択"
    tts_announcement: |
      折り返しのご連絡はお電話を希望されますか。ショートメッセージを希望されますか。
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["電話", "SMS"]
      mapping:
        - input: "DTMF 1, 電話, お電話 等"
          output: "電話"
        - input: "DTMF 2, SMS, ショートメッセージ, メール 等"
          output: "SMS"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "callbackMethod"
    next_step: "合流_問い合わせ"
    retry_failure: "end_failure"

  - step_name: "最後の問い合わせ"
    tts_announcement: "その他にお聞きしたいことはございますか。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["あり", "なし"]
      mapping:
        - input: "はい, あります, 質問があります 等"
          output: "あり"
        - input: "いいえ, ありません, 大丈夫です 等"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "finalInquiry"
    next_step: "終話分岐_用件1"
    retry_failure: "end_failure"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: |
      恐れ入りますが、電話番号を通知しておかけ直しください。
      お電話ありがとうございました。
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（acceptance_times 使用時）"
    tts_announcement: |
      お電話ありがとうございます。ただいまの時間は受付時間外です。
      受付時間内におかけ直しください。お電話ありがとうございました。
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: |
      申し訳ございません。ご回答を正しく聞き取ることができませんでした。
      恐れ入りますが、おかけ直しください。お電話ありがとうございました。
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 転送関連 ---
  - name: "END_転送失敗"
    condition: "緊急 Blind Transfer 失敗（回線一杯）"
    tts_announcement: |
      大変申し訳ございません。有人電話番号の回線が埋まっており転送が出来ませんでした。
      大変お手数ですが06-6708-7200へおかけ直しいただきますよう、お願いいたします。
      お電話ありがとうございました。失礼いたします。
    status: "9"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_転送失敗"

  # --- 分娩・産後ケア系の即時終話 ---
  - name: "END_分娩予約案内"
    condition: "用件3=分娩予約"
    tts_announcement: |
      分娩予約は予約不要で来院にて受け付けています。
      月曜から金曜の午前9時から午後4時、土曜は午前9時から正午にお越しください。
      本人・ご家族どちらでも構いません。予約金として現金5万円のみご持参ください。
      母子手帳や健康保険証などのお持ちいただく必要はありません。
      それではご来院をお待ちしております。お気をつけてお越しくださいませ。
      お電話ありがとうございました。それでは失礼いたします。
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_分娩予約案内"

  - name: "END_紹介状なし案内"
    condition: "無痛分娩=紹介状なし"
    tts_announcement: |
      紹介状をお持ちでない場合、お手数ですが紹介状をご用意のうえ、ご予約をお願いいたします。
      お電話ありがとうございました。それでは失礼いたします。
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_紹介状なし案内"

  - name: "END_産後ケア案内"
    condition: "用件3=産後ケア"
    tts_announcement: |
      産後ケアは産後2か月までの方が対象です。
      浜田病院のホームページより予約ができるため、そちらから予約をお願いいたします。
      お電話ありがとうございました。それでは失礼いたします。
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_産後ケア案内"

  # --- 個人情報聴取後の受付完了系（status / sms_flag は推測値・要確認）---
  - name: "END_新規予約受付完了"
    condition: "新規予約の全聴取完了"
    tts_announcement: |
      ご予約内容を承りました。改めて当院よりお電話またはショートメッセージにて
      ご連絡いたします。お電話ありがとうございました。それでは失礼いたします。
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_新規予約受付完了"

  - name: "END_変更受付完了"
    condition: "予約変更の全聴取完了"
    tts_announcement: |
      ご変更の内容を承りました。改めて当院よりお電話またはショートメッセージにて
      ご連絡いたします。お電話ありがとうございました。それでは失礼いたします。
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更受付完了"

  - name: "END_キャンセル受付完了"
    condition: "キャンセルの全聴取完了"
    tts_announcement: |
      キャンセルを承りました。確認のため当院よりご連絡をさせていただくことがございます。
      あらかじめご了承くださいませ。お電話ありがとうございました。それでは失礼いたします。
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_キャンセル受付完了"

  - name: "END_無痛受付完了"
    condition: "無痛分娩 紹介状ありの全聴取完了"
    tts_announcement: |
      ご予約内容を承りました。改めて当院よりお電話またはショートメッセージにて
      ご連絡いたします。お電話ありがとうございました。それでは失礼いたします。
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_無痛受付完了"

  - name: "END_問い合わせ受付完了"
    condition: "その他問い合わせの全聴取完了"
    tts_announcement: |
      お問い合わせ内容を承りました。改めて担当者よりご連絡いたします。
      お電話ありがとうございました。それでは失礼いたします。
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_問い合わせ受付完了"

# smsFlag 分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["callbackMethod"]
  patterns:
    - condition: "callbackMethod=電話"
      sms_flag: "0"
      notes: "電話折返し希望時。SMS は送信しない（プレースホルダー扱い）"
    - condition: "callbackMethod=SMS / または callbackMethod 未設定（予約系ルート）"
      sms_flag: "1"
      notes: "SMS 折返し / または通常の予約受付完了 SMS（テンプレ番号は要確認）"
  # ★sms_flag の具体値（"1" / "2" / "3" 等のテンプレ番号割当）は元 PDF に未記載のため
  #   confirmation_items で確認必須。本設計は暫定値（電話折返し=0、それ以外=1）。

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  # raw.md / 元 PDF に FAQ 検索や HP 参照等の RAG 的要素の明示なし。
  # 「最後の問い合わせ」hearing は独立した hearing として配置（RAG 不使用）。
  # 将来の RAG 統合は別途要件として確認。

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "施設名挨拶"
    announcement: "お電話ありがとうございます。浜田病院受付AI電話です。"

  - module_name: "緊急性の判断"
    purpose: "緊急性判定アナウンス"
    announcement: |
      陣痛・破水・出血・胎動が少ない・つわりがひどい・症状が急に重くなったなどの
      緊急の状態ですか？

  - module_name: "緊急転送_アナウンス"
    purpose: "緊急転送直前の案内"
    announcement: "緊急のご用件ですので有人電話へ転送いたします。このままお待ちください。"

  - module_name: "用件1"
    purpose: "用件①（3 択）"
    announcement: |
      本日のご用件を次の３つのうちからお選びください。
      「１、診療の予約・変更」「２、分娩・産後ケア」「３、その他問い合わせ」

  - module_name: "用件2"
    purpose: "用件②（診察予約・変更系の 3 択）"
    announcement: |
      ご用件を次の３つのうちどちらでしょうか。
      「１、新規予約」「２、日程の変更」「３、キャンセル」

  - module_name: "用件3"
    purpose: "用件③（分娩・産後ケア系の 3 択）"
    announcement: |
      ご用件を次の3つのうちどちらでしょうか。
      「１、分娩予約」「２、無痛分娩」「３、産後ケア」

  - module_name: "産科_婦人科確認"
    purpose: "産科/婦人科分岐"
    announcement: "診療を希望されるのは産科と婦人科どちらでしょうか。"

  - module_name: "16週確認"
    purpose: "妊娠週数確認"
    announcement: "妊娠週数は16週を超えていますか。"

  - module_name: "受診希望日_産科"
    purpose: "受診希望日聴取（産科）"
    announcement: "受診を希望される日程をお話しください。"

  - module_name: "受診希望日_婦人科"
    purpose: "受診希望日聴取（婦人科）"
    announcement: "受診を希望される日程をお話しください。"

  - module_name: "発熱確認"
    purpose: "発熱有無確認"
    announcement: |
      現在発熱はありますか。ある場合、熱が下がってから24時間後の受診をお願いしております。

  - module_name: "発熱案内_アナウンス"
    purpose: "発熱ありの場合の繋ぎ"
    announcement: "承知いたしました。それでは続けてお伺いします。"

  - module_name: "合流_新規予約"
    purpose: "新規予約ルートの個人情報チェーンへの繋ぎ"
    announcement: "それではご予約に必要な情報をお伺いします。"

  - module_name: "現在の予約日_変更"
    purpose: "現在の予約日聴取（変更）"
    announcement: "現在の診療予約日をお話しください。"

  - module_name: "希望予約日_変更"
    purpose: "希望日聴取（変更）"
    announcement: "変更後の受診を希望される日程をお話しください。"

  - module_name: "体調不良確認"
    purpose: "変更理由が体調不良か確認"
    announcement: "変更理由は体調不良ですか。"

  - module_name: "合流_変更"
    purpose: "変更ルートの個人情報チェーンへの繋ぎ"
    announcement: "それでは変更内容を確認するための情報をお伺いします。"

  - module_name: "現在の予約日_キャンセル"
    purpose: "現在の予約日聴取（キャンセル）"
    announcement: "現在の診療予約日をお話しください。"

  - module_name: "キャンセル理由"
    purpose: "キャンセル理由聴取"
    announcement: "キャンセルを希望される理由をお話しください。"

  - module_name: "合流_キャンセル"
    purpose: "キャンセルルートの個人情報チェーンへの繋ぎ"
    announcement: "それではキャンセルの確認のための情報をお伺いします。"

  - module_name: "説明1_分娩"
    purpose: "分娩予約案内（用件3=分娩予約のみ通る）"
    announcement: |
      分娩予約は予約不要で来院にて受け付けています。
      月曜から金曜の午前9時から午後4時、土曜は午前9時から正午にお越しください。
      本人・ご家族どちらでも構いません。予約金として現金5万円のみご持参ください。
      母子手帳や健康保険証などのお持ちいただく必要はありません。

  - module_name: "説明2_無痛"
    purpose: "無痛分娩案内"
    announcement: |
      診察については、小川産婦人科の患者様は16週から20週の間に1回ご来院ください。
      全員、34週6日までには必ず診察を受けていただく必要がありますので、
      30週頃までにご予約をお取りいただくようお願いします。
      無痛分娩は予約枠に限りがあり、枠が埋まっている場合はお受けできませんので、
      まずはお早めにご来院ください。
      初産婦の方は、当院での無痛分娩は出来かねます。
      経産婦の方は、かかりつけ医からの紹介状をお持ちの上、早めに一度診察にお越しください。
      38週の診察時に正式な分娩予約をお取りします。

  - module_name: "紹介状確認"
    purpose: "紹介状有無確認"
    announcement: "紹介状はお持ちでしょうか。"

  - module_name: "合流_無痛紹介状あり"
    purpose: "無痛分娩紹介状ありルートの個人情報チェーンへの繋ぎ"
    announcement: "ありがとうございます。それでは診察予約に必要な情報をお伺いします。"

  - module_name: "説明3_ケア"
    purpose: "産後ケア案内"
    announcement: |
      産後ケアは産後2か月までの方が対象です。
      浜田病院のホームページより予約ができるため、そちらから予約をお願いいたします。

  - module_name: "内容確認"
    purpose: "問い合わせ内容聴取"
    announcement: |
      お問い合わせ内容をお話しください。
      内容を確認してから担当者が折り返しご連絡いたします。

  - module_name: "電話SMS選択"
    purpose: "折返し方法選択"
    announcement: |
      折り返しのご連絡はお電話を希望されますか。
      ショートメッセージを希望されますか。

  - module_name: "合流_問い合わせ"
    purpose: "問い合わせルートの個人情報チェーンへの繋ぎ"
    announcement: "それでは折り返しのための情報をお伺いします。"

  - module_name: "最後の問い合わせ"
    purpose: "追加質問の有無確認"
    announcement: "その他にお聞きしたいことはございますか。"

  # --- 終話アナウンス ---
  - module_name: "END_非通知"
    purpose: "非通知着信"
    announcement: |
      恐れ入りますが、電話番号を通知しておかけ直しください。
      お電話ありがとうございました。

  - module_name: "END_時間外"
    purpose: "受付時間外案内"
    announcement: |
      お電話ありがとうございます。ただいまの時間は受付時間外です。
      受付時間内におかけ直しください。お電話ありがとうございました。

  - module_name: "END_聴取失敗"
    purpose: "リトライ上限到達"
    announcement: |
      申し訳ございません。ご回答を正しく聞き取ることができませんでした。
      恐れ入りますが、おかけ直しください。お電話ありがとうございました。

  - module_name: "END_転送失敗"
    purpose: "緊急 Blind Transfer 失敗"
    announcement: |
      大変申し訳ございません。有人電話番号の回線が埋まっており転送が出来ませんでした。
      大変お手数ですが06-6708-7200へおかけ直しいただきますよう、お願いいたします。
      お電話ありがとうございました。失礼いたします。

  - module_name: "END_分娩予約案内"
    purpose: "分娩予約案内（来院誘導のみ）"
    announcement: |
      分娩予約は予約不要で来院にて受け付けています。
      月曜から金曜の午前9時から午後4時、土曜は午前9時から正午にお越しください。
      本人・ご家族どちらでも構いません。予約金として現金5万円のみご持参ください。
      母子手帳や健康保険証などのお持ちいただく必要はありません。
      それではご来院をお待ちしております。お気をつけてお越しくださいませ。
      お電話ありがとうございました。それでは失礼いたします。

  - module_name: "END_紹介状なし案内"
    purpose: "無痛分娩紹介状なし"
    announcement: |
      紹介状をお持ちでない場合、お手数ですが紹介状をご用意のうえ、ご予約をお願いいたします。
      お電話ありがとうございました。それでは失礼いたします。

  - module_name: "END_産後ケア案内"
    purpose: "産後ケア HP 誘導"
    announcement: |
      産後ケアは産後2か月までの方が対象です。
      浜田病院のホームページより予約ができるため、そちらから予約をお願いいたします。
      お電話ありがとうございました。それでは失礼いたします。

  - module_name: "END_新規予約受付完了"
    purpose: "新規予約受付完了"
    announcement: |
      ご予約内容を承りました。改めて当院よりお電話またはショートメッセージにて
      ご連絡いたします。お電話ありがとうございました。それでは失礼いたします。

  - module_name: "END_変更受付完了"
    purpose: "予約変更受付完了"
    announcement: |
      ご変更の内容を承りました。改めて当院よりお電話またはショートメッセージにて
      ご連絡いたします。お電話ありがとうございました。それでは失礼いたします。

  - module_name: "END_キャンセル受付完了"
    purpose: "キャンセル受付完了"
    announcement: |
      キャンセルを承りました。確認のため当院よりご連絡をさせていただくことがございます。
      あらかじめご了承くださいませ。お電話ありがとうございました。それでは失礼いたします。

  - module_name: "END_無痛受付完了"
    purpose: "無痛分娩紹介状あり受付完了"
    announcement: |
      ご予約内容を承りました。改めて当院よりお電話またはショートメッセージにて
      ご連絡いたします。お電話ありがとうございました。それでは失礼いたします。

  - module_name: "END_問い合わせ受付完了"
    purpose: "その他問い合わせ受付完了"
    announcement: |
      お問い合わせ内容を承りました。改めて担当者よりご連絡いたします。
      お電話ありがとうございました。それでは失礼いたします。

