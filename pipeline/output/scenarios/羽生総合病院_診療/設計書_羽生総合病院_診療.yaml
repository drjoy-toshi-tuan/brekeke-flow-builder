# 元資料: commubo抽出/【024】羽生総合病院/【羽生総合病院】診療1_M_本番/
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "羽生総合病院"
  scenario_name: "診療"
  group_name: "羽生総合病院"
  flow_name: "羽生総合病院$診療"
  target_facility: "羽生総合病院"
  office_id: "TODO_要確認"
  phone_number: "048-562-3000"
  business_hours: "祝日除く月〜土 8:30〜17:00（12/31〜1/4 休止、5/4〜5/6 は祝日でも平日扱い）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "羽生総合病院$診療"
      role: "main"
      description: "冒頭チェーン → 当日希望確認 → 用件確認(4分類) → 用件別ルート(初診/再診/変更/キャンセル/確認) → 個人情報サブフロー4本 → 終話分岐(用件×電話種別10通り) → 年末前期間アナウンス(条件付) → 終話"
  subflows:
    - name: "羽生総合病院$診察券番号聴取_20260501"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピー。「わからない」分岐あり"
    - name: "羽生総合病院$氏名聴取_20260501"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。Gen1 では復唱なし"
    - name: "羽生総合病院$生年月日聴取_20260501"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー。和暦/西暦両対応・DTMF8桁・復唱"
    - name: "羽生総合病院$電話番号聴取_20260501"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。incoming-classifier内蔵 + Phone Normalization + 復唱。phonetype を context に保存"

# --- セクション3: フローの目的 ---
purpose: "羽生総合病院の予約専用窓口への着信を受け、用件（予約/変更/キャンセル/確認）を分類し、新規予約の場合は紹介状有無を確認、診療科聴取（呼吸器・甲状腺・小児科の二択分岐含む）と個人情報（診察券番号・氏名・生年月日・連絡先電話番号）を聴取して折り返し受付を自動化する。代表案内対象診療科・健診・予約対応なし科は適切な番号へ案内し、当日予約・受付時間外も代表電話案内で完結させる。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "羽生総合病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 完了フラグ_非通知(status=2, smsFlag=-1) → 非通知_アナウンス → 切断
              └─ 通常/携帯/固定/海外/その他 → 受付時間判定(acceptance_times)
                    ├─ 時間外 → 完了フラグ_時間外(status=6, smsFlag=-1) → 時間外_アナウンス → 切断
                    └─ 受付可 → 冒頭_アナウンス
                          → 当日希望_確認(hearing enum yesno)
                              ├─ はい → 完了フラグ_当日代表案内(status=2, smsFlag=-1) → 当日代表案内_アナウンス → 切断
                              └─ other(=いいえ) → 用件_確認(hearing enum 5値)
                                    ├─ 予約 → 初診_再診_確認(hearing enum)
                                    │          ├─ 新規 → 紹介状_確認(hearing enum) → 診療科_聴取
                                    │          └─ other(=再診) → 診療科_聴取
                                    ├─ 変更 → 診療科_聴取
                                    ├─ キャンセル → 診療科_聴取
                                    ├─ 確認 → 確認内容_聴取(hearing text) → jump_診察券番号聴取
                                    └─ other(=代表案内) → 完了フラグ_代表案内(status=2) → 代表案内_アナウンス → 切断

      ★診療科聴取と二択分岐:
        診療科_聴取(hearing enum, no_result_default=登録なし)
          ├─ 呼吸器       → 診療科_呼吸器二択(hearing enum)
          │                    ├─ 呼吸器内科 → 用件分岐_診療科後
          │                    └─ other(=呼吸器外科) → 用件分岐_診療科後
          ├─ 甲状腺       → 診療科_甲状腺二択(hearing enum)
          │                    ├─ 糖尿内分泌 → 用件分岐_診療科後
          │                    └─ other(=外科) → 用件分岐_診療科後
          ├─ 小児科       → 診療科_小児科二択(hearing enum)
          │                    ├─ リハビリテーション科 → 用件分岐_診療科後
          │                    └─ other(=小児科診察) → 用件分岐_診療科後
          ├─ 健診         → 完了フラグ_健診案内(status=2) → 健診案内_アナウンス → 切断
          ├─ 代表案内     → 完了フラグ_代表案内(status=2) → 代表案内_アナウンス → 切断
          └─ other(=分岐なし診療科 約26科 / わからない) → 用件分岐_診療科後

      ★用件別の個人情報聴取ルート:
        用件分岐_診療科後(context_match_router on classification)
          ├─ 新規        → jump_氏名聴取                    [診察券番号スキップ]
          ├─ 再診        → jump_診察券番号聴取
          ├─ 変更        → 予約日_聴取(hearing datetime) → jump_診察券番号聴取
          ├─ キャンセル  → 予約日_聴取(hearing datetime) → jump_診察券番号聴取
          └─ other       → jump_診察券番号聴取

        jump_診察券番号聴取 → jump_氏名聴取 → jump_生年月日聴取 → jump_電話番号聴取
                                                        → 終話分岐_電話種別

      ★終話分岐(2 phonetype × 5 用件 = 10 アナウンス → 年末判定 → 2 termination):
        終話分岐_電話種別(context_match_router on jump_電話番号聴取)
          ├─ 1(=携帯) → 終話分岐_用件_携帯(context_match_router on classification)
          │              ├─ 新規        → 用件_新規_携帯_アナウンス
          │              ├─ 再診        → 用件_再診_携帯_アナウンス
          │              ├─ 変更        → 用件_変更_携帯_アナウンス
          │              ├─ キャンセル  → 用件_キャンセル_携帯_アナウンス
          │              ├─ 確認        → 用件_確認_携帯_アナウンス
          │              └─ other       → 用件_新規_携帯_アナウンス
          │              全て → 年末判定_携帯
          └─ other(=固定/その他) → 終話分岐_用件_固定(context_match_router on classification)
                         ├─ 新規/再診/変更/キャンセル/確認 → 用件_xxx_固定_アナウンス
                         └─ other → 用件_新規_固定_アナウンス
                         全て → 年末判定_固定

        年末判定_携帯(date_of_call_classifier: 12/22-12/30 を「年末前」と判定)
          ├─ 年末前 → 年末前_携帯_アナウンス → END_受付完了_携帯(status=1, smsFlag=1)
          └─ other  → END_受付完了_携帯

        年末判定_固定(date_of_call_classifier: 同上)
          ├─ 年末前 → 年末前_固定_アナウンス → END_受付完了_固定(status=1, smsFlag=-1)
          └─ other  → END_受付完了_固定
    notes: |
      - acceptance_times=true。受付時間: 月〜土 8:30〜17:00、日祝・12/31〜1/4 休止。GW(5/4〜5/6) は祝日でも平日扱い。具体的なカレンダー設定は Brekeke 管理画面で行う(NON-BLOCKER N-2)。
      - 当日希望確認は用件確認の前に実施(Gen1踏襲)。「はい」(本日対応希望) は AI電話では受付不可のため代表案内で終話。
      - 紹介状確認は新規(初診)ルートのみ。Gen1 通り context に保存するのみで発話分岐は行わない(Dr.JOY 側で参照)。
      - 診療科の二択分岐(呼吸器/甲状腺/小児科)は Gen1 の構造を維持。中黒(`・`) は context 値では除去(リウマチ膠原病内科 / 糖尿内分泌 / 放射線画像診断科放射線治療科)し、TTS では中黒入りで読み上げる。
      - 健診は健康管理センター(048-562-5555)へ案内、その他の代表案内対象 12科+病理/麻酔+面会 は代表電話(048-562-3000)で統一。Gen1 にあった「<診療科の読み>は」プレフィックスは Gen3 では使わず固定文言にする(動的値置換のリスク回避)。
      - 用件×電話種別 10 通りの完了文言は Gen1 を踏襲し、携帯あり = SMS 言及あり / 固定 = SMS 言及なし に分ける(NON-BLOCKER N-1: CS 確認推奨)。
      - 年末前期間(12/22〜12/30)に着信した場合のみ、終話直前に「12/30 16:30 まで・1/5 8:30 から再開」のアナウンスを差し込む。

  - flow_name: "羽生総合病院$診察券番号聴取_20260501"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピー。
      フロー名プレフィックスのみ「羽生総合病院$」+ 日付サフィックスに置換。構造・接続・スクリプトは一切変更不可。
    notes: "「わからない」分岐あり"

  - flow_name: "羽生総合病院$氏名聴取_20260501"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。
      フロー名プレフィックスのみ置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱なし"

  - flow_name: "羽生総合病院$生年月日聴取_20260501"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー。
      フロー名プレフィックスのみ置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱あり。和暦/西暦両対応 + DTMF 8 桁"

  - flow_name: "羽生総合病院$電話番号聴取_20260501"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。
      フロー名プレフィックスのみ置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱あり。incoming-classifier 内蔵で携帯/固定分岐 → phonetype context 保存"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 当日希望_確認

  # --- 当日希望確認(Gen1 当日予約サブフロー相当) ---
  - step: 当日希望_確認
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: END_当日代表案内
      - match: "other"
        next: 用件_確認

  # --- 用件確認(4 分類 + 代表案内) ---
  - step: 用件_確認
    type: hearing
    output_format: enum
    conditions:
      - match: "予約"
        next: 初診_再診_確認
      - match: "変更"
        next: 診療科_聴取
      - match: "キャンセル"
        next: 診療科_聴取
      - match: "確認"
        next: 確認内容_聴取
      - match: "other"
        next: END_代表案内

  # --- 初診/再診の確認(予約ルートのみ) ---
  - step: 初診_再診_確認
    type: hearing
    output_format: enum
    conditions:
      - match: "新規"
        next: 紹介状_確認
      - match: "other"
        next: 診療科_聴取

  # --- 紹介状の有無(新規ルートのみ・context 保存目的) ---
  - step: 紹介状_確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 診療科_聴取
      - match: "other"
        next: 診療科_聴取

  # --- 確認内容(確認ルートのみ・自由テキスト) ---
  - step: 確認内容_聴取
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # --- 診療科聴取(分岐あり/分岐なし/健診/代表案内 を分岐) ---
  - step: 診療科_聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "呼吸器"
        next: 診療科_呼吸器二択
      - match: "甲状腺"
        next: 診療科_甲状腺二択
      - match: "小児科"
        next: 診療科_小児科二択
      - match: "健診"
        next: END_健診案内
      - match: "代表案内"
        next: END_代表案内
      - match: "other"
        next: 用件分岐_診療科後

  - step: 診療科_呼吸器二択
    type: hearing
    output_format: enum
    conditions:
      - match: "呼吸器内科"
        next: 用件分岐_診療科後
      - match: "other"
        next: 用件分岐_診療科後

  - step: 診療科_甲状腺二択
    type: hearing
    output_format: enum
    conditions:
      - match: "糖尿内分泌"
        next: 用件分岐_診療科後
      - match: "other"
        next: 用件分岐_診療科後

  - step: 診療科_小児科二択
    type: hearing
    output_format: enum
    conditions:
      - match: "リハビリテーション科"
        next: 用件分岐_診療科後
      - match: "other"
        next: 用件分岐_診療科後

  # --- 用件別の個人情報聴取ルート分岐 ---
  - step: 用件分岐_診療科後
    type: context_match_router
    reference_module: "OpenAI_用件_確認"
    conditions:
      - match: "新規"
        next: jump_氏名聴取
      - match: "再診"
        next: jump_診察券番号聴取
      - match: "変更"
        next: 予約日_聴取
      - match: "キャンセル"
        next: 予約日_聴取
      - match: "other"
        next: jump_診察券番号聴取

  # --- 予約日聴取(変更/キャンセルルートのみ) ---
  - step: 予約日_聴取
    type: hearing
    output_format: datetime
    next: jump_診察券番号聴取

  # --- 個人情報サブフロー4本 ---
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "羽生総合病院$診察券番号聴取_20260501"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "羽生総合病院$氏名聴取_20260501"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "羽生総合病院$生年月日聴取_20260501"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "羽生総合病院$電話番号聴取_20260501"
    next: 終話分岐_電話種別

  # --- 終話分岐(電話種別) ---
  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "jump_電話番号聴取"
    conditions:
      - match: "1"
        next: 終話分岐_用件_携帯
      - match: "other"
        next: 終話分岐_用件_固定

  # --- 終話分岐(用件) -- 携帯ルート ---
  - step: 終話分岐_用件_携帯
    type: context_match_router
    reference_module: "OpenAI_用件_確認"
    conditions:
      - match: "新規"
        next: 用件_新規_携帯_アナウンス
      - match: "再診"
        next: 用件_再診_携帯_アナウンス
      - match: "変更"
        next: 用件_変更_携帯_アナウンス
      - match: "キャンセル"
        next: 用件_キャンセル_携帯_アナウンス
      - match: "確認"
        next: 用件_確認_携帯_アナウンス
      - match: "other"
        next: 用件_新規_携帯_アナウンス

  - step: 用件_新規_携帯_アナウンス
    type: announcement
    next: 年末判定_携帯
  - step: 用件_再診_携帯_アナウンス
    type: announcement
    next: 年末判定_携帯
  - step: 用件_変更_携帯_アナウンス
    type: announcement
    next: 年末判定_携帯
  - step: 用件_キャンセル_携帯_アナウンス
    type: announcement
    next: 年末判定_携帯
  - step: 用件_確認_携帯_アナウンス
    type: announcement
    next: 年末判定_携帯

  # --- 終話分岐(用件) -- 固定ルート ---
  - step: 終話分岐_用件_固定
    type: context_match_router
    reference_module: "OpenAI_用件_確認"
    conditions:
      - match: "新規"
        next: 用件_新規_固定_アナウンス
      - match: "再診"
        next: 用件_再診_固定_アナウンス
      - match: "変更"
        next: 用件_変更_固定_アナウンス
      - match: "キャンセル"
        next: 用件_キャンセル_固定_アナウンス
      - match: "確認"
        next: 用件_確認_固定_アナウンス
      - match: "other"
        next: 用件_新規_固定_アナウンス

  - step: 用件_新規_固定_アナウンス
    type: announcement
    next: 年末判定_固定
  - step: 用件_再診_固定_アナウンス
    type: announcement
    next: 年末判定_固定
  - step: 用件_変更_固定_アナウンス
    type: announcement
    next: 年末判定_固定
  - step: 用件_キャンセル_固定_アナウンス
    type: announcement
    next: 年末判定_固定
  - step: 用件_確認_固定_アナウンス
    type: announcement
    next: 年末判定_固定

  # --- 年末前期間(12/22〜12/30) 判定 ---
  - step: 年末判定_携帯
    type: date_of_call_classifier
    conditions:
      - match: "年末前"
        next: 年末前_携帯_アナウンス
      - match: "other"
        next: END_受付完了_携帯

  - step: 年末前_携帯_アナウンス
    type: announcement
    next: END_受付完了_携帯

  - step: 年末判定_固定
    type: date_of_call_classifier
    conditions:
      - match: "年末前"
        next: 年末前_固定_アナウンス
      - match: "other"
        next: END_受付完了_固定

  - step: 年末前_固定_アナウンス
    type: announcement
    next: END_受付完了_固定

  # --- 終話 ---
  - step: END_受付完了_携帯
    type: termination
    termination_ref: "END_受付完了_携帯"
  - step: END_受付完了_固定
    type: termination
    termination_ref: "END_受付完了_固定"
  - step: END_当日代表案内
    type: termination
    termination_ref: "END_当日代表案内"
  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"
  - step: END_健診案内
    type: termination
    termination_ref: "END_健診案内"

