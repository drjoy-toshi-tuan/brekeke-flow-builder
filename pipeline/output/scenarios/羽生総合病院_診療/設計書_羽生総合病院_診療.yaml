  # --- 終話前アナウンス類(announcement)はここでは詳細不要 — tts_modules セクションで定義 ---

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系(デフォルト必須) ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外(月〜土 8:30〜17:00 以外、日祝、12/31〜1/4)"
    tts_announcement: "申し訳ございません。ただいまの時間は受付時間外となっております。受付時間は、日曜、祝日、年末年始を除く、月曜日から土曜日の8時30分から17時となっております。恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達(用件確認・当日希望確認のリトライ失敗時)"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。電話番号は048-562-3000です。受付時間は、日曜、祝日、年末年始を除く、月曜日から土曜日の8時30分から17時となっております。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系: 当日代表案内 ---
  - name: "END_当日代表案内"
    condition: "当日希望_確認 で「はい」が選択された(当日予約は AI 電話では受付不可)"
    tts_announcement: "本日のご予約について、ですね。大変申し訳ございません。当日のご予約に関しては、AI電話ではお受けできません。恐れ入りますが、代表電話までおかけなおしください。電話番号は、048-562-3000です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_当日代表案内"

  # --- 正常系: 代表案内(用件外 / 非対応診療科 / 予約対応なし科 / 面会) ---
  - name: "END_代表案内"
    condition: "用件_確認で代表案内に該当 / 診療科_聴取で代表案内対象(救急/歯科口腔/小児科非予約/透析/心理/鍼灸/放射線画像診断科放射線治療科/緩和ケア/外来化学療法/胃婁交換/美容/病理/麻酔/面会)"
    tts_announcement: "AI電話では受付できません。代表電話までおかけ直しください。電話番号は、048-562-3000です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内"

  # --- 正常系: 健診案内 ---
  - name: "END_健診案内"
    condition: "診療科_聴取で「健診」または用件_確認で健診/人間ドックが検出された"
    tts_announcement: "健康診断については、当院健康管理センターまでおかけ直しください。電話番号は048-562-5555です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_健診案内"

  # --- 正常系: 受付完了(携帯) ---
  - name: "END_受付完了_携帯"
    condition: "個人情報聴取完了 かつ phonetype=1(携帯)。用件別 5 文言の announcement の後 + 年末前期間なら年末前アナウンスの後"
    tts_announcement: "お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_携帯"

  # --- 正常系: 受付完了(固定) ---
  - name: "END_受付完了_固定"
    condition: "個人情報聴取完了 かつ phonetype=2(固定/その他)。用件別 5 文言の announcement の後 + 年末前期間なら年末前アナウンスの後"
    tts_announcement: "お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_固定"

# smsFlag 分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["phonetype"]
  patterns:
    - condition: "phonetype=1(携帯)"
      sms_flag: "1"
      notes: "携帯ルートのみ SMS 送信あり"
    - condition: "phonetype=2(固定/その他)"
      sms_flag: "-1"
      notes: "固定ルートは SMS 送信なし(SMS 不到達のため)"
    - condition: "代表案内/時間外/非通知/聴取失敗/当日代表案内/健診案内"
      sms_flag: "-1"
      notes: "全ての異常系・案内系は SMS 送信なし"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  # Gen1 元資料には RAG/FAQ 検索の構造がなく、移管ノートでも RAG への言及がないため none で起案。
  # CLAUDE.md Rule 16 では Gen1→Gen3 のデフォルトは pattern 2(全終話前) だが、本フローでは
  # 終話分岐が用件×電話種別=10 通り + 年末判定 と複雑なため、RAG を挿入すると構成が肥大化する。
  # NON-BLOCKER N-3 で CS に RAG 要否を確認推奨。

