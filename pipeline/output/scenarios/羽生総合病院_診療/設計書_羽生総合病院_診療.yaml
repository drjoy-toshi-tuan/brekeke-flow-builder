# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "当日希望_確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "「はい」(本日対応希望) → 当日代表案内で終話。「いいえ」→ 用件確認へ。Gen1 当日予約サブフロー相当"

  - order: 2
    name: "用件_確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "確認"
      - "代表案内"
    notes: "Gen1 用件サブフローの 4 分類 + 健診/ドック/その他特殊用件は代表案内へ。予約は後段の初診_再診_確認 で 新規/再診 に細分化"

  - order: 3
    name: "初診_再診_確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "再診"
    notes: "「当院の受診は、初めてですか？」 → 新規(=初診/初めて) / 再診(=2回目以降)。classification を上書き保存。新規→紹介状確認 / 再診→診療科聴取"

  - order: 4
    name: "紹介状_確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "referralLetter"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "新規(初診)ルートのみ。「他の医療機関からの紹介状はお持ちですか？」 → context 保存のみ、発話分岐なし(Dr.JOY 側で参照)"

  - order: 5
    name: "確認内容_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "確認ルートのみ。Gen1 内容(フリー)。フリーテキスト保存"

  - order: 6
    name: "診療科_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    no_result_default: "登録なし"
    output_labels:
      - "呼吸器"
      - "甲状腺"
      - "小児科"
      - "健診"
      - "代表案内"
      - "リウマチ膠原病内科"
      - "リハビリテーション科"
      - "外科"
      - "漢方内科"
      - "肝臓病"
      - "眼科"
      - "形成外科"
      - "血液内科"
      - "呼吸器外科"
      - "呼吸器内科"
      - "産婦人科"
      - "耳鼻咽喉科"
      - "循環器内科"
      - "消化器内科"
      - "心臓血管外科"
      - "神経内科"
      - "整形外科"
      - "糖尿内分泌"
      - "内科"
      - "脳神経外科"
      - "泌尿器科"
      - "皮膚科"
      - "腎臓内科"
      - "わからない"
    notes: |
      Gen1 診療科サブフロー相当。 OpenAI が出力するラベル:
        - 「呼吸器」「甲状腺」「小児科」 → 二択確認へ
        - 「健診」 → 健康管理センター案内 → END_健診案内
        - 「代表案内」 → 12科(救急/歯科口腔/小児科非予約/透析/心理/鍼灸/放射線画像診断科放射線治療科/緩和ケア/外来化学療法/胃婁交換/美容/予約対応なし=病理/麻酔/面会) を統合 → END_代表案内
        - その他の分岐なし診療科名(26科) → context にそのまま保存して用件分岐_診療科後 へ
        - 「わからない」 → context は登録なし、用件分岐_診療科後 へ
      no_result の場合は saveContext2DB で「登録なし」をセットしてリトライへ(モジュール選定ガイド 2.5)。
      中黒(・)は除去: リウマチ膠原病内科 / 糖尿内分泌 / 放射線画像診断科放射線治療科。

  - order: 7
    name: "診療科_呼吸器二択"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "呼吸器内科"
      - "呼吸器外科"
    notes: "「呼吸器内科と呼吸器外科の、どちらですか？」 → 確定して用件分岐_診療科後 へ"

  - order: 8
    name: "診療科_甲状腺二択"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "糖尿内分泌"
      - "外科"
    notes: "「糖尿・内分泌と、外科、どちらですか？」 → 確定して用件分岐_診療科後 へ"

  - order: 9
    name: "診療科_小児科二択"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "小児科診察"
      - "リハビリテーション科"
    notes: "「診察とリハビリ、どちらですか？」 → 小児科診察 or リハビリテーション科 を context に保存"

  - order: 10
    name: "予約日_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: |
      変更/キャンセルルートのみ。「現在予約されている日にちを、4月1日のようにお話いただくか、ダイヤルキーから数字4桁で0401のように入力してください。」 復唱あり(Gen1 踏襲)。

      DTMF 対応表(4桁 MMDD 形式):
        - 桁1〜2(MM): 月(01〜12)。例: 04 → 4月、12 → 12月
        - 桁3〜4(DD): 日(01〜31)。例: 01 → 1日、25 → 25日
        - 例: DTMF 「0401」 → 4月1日 / 「1225」 → 12月25日 / 「0930」 → 9月30日
        - termdtmf: なし(4桁固定で確定。dtmf_max_length=4 で自動確定)
        - 入力途中での停止は AmiVoice STT 側のタイムアウトで NO_RESULT 扱い → リトライ
        - 年は当日基準で過去日付なら +1 年(OpenAI 側で convert ロジックを実装)

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。羽生総合病院、予約専用、AI電話です。"
    input_method: "none"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: null
    next_step: "当日希望_確認"
    retry_failure: "skip"

  - step_name: "当日希望_確認"
    tts_announcement: "まず初めに、お伺いします。今日の診療に関する内容ですか？はい、または、いいえ、で、お答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「そうです」「あってます」「今日」「本日」を含む"
          output: "はい"
        - input: "「いいえ」「ちがう」「今日じゃない」「明日」「別の日」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "肯定・否定どちらも判定できない"
    save_to: null
    next_step: "はい→END_当日代表案内 / いいえ→用件_確認"
    retry_failure: "end_failure"

  - step_name: "用件_確認"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話ください。「予約を取る」、「予約を変更する」、「予約をキャンセルする」、「予約を確認する」、それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
        - "代表案内"
        - "NO_RESULT"
      mapping:
        - input: "「予約を取る」「予約をしたい」「診察予約」「初診」「再診」「受診」「外来の予約」「1」「いちばん」を含む"
          output: "予約"
        - input: "「変更」「予約変更」「日にち変えたい」「2」「にばん」を含む"
          output: "変更"
        - input: "「キャンセル」「取り消し」「やめる」「3」「さんばん」を含む"
          output: "キャンセル"
        - input: "「確認」「予約確認」「予約日いつ」「4」「よんばん」を含む"
          output: "確認"
        - input: "「健診」「健康診断」「人間ドック」「ドック」「面会」「お見舞い」「美容」「鍼灸」「胃婁」「化学療法」「ケモ」「透析」「救急」「歯科」「口腔」「心理」「緩和」「放射線治療」「病理」「麻酔」を含む"
          output: "代表案内"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "用件 4 分類および代表案内対象キーワードのいずれにも該当しない"
    save_to: "classification"
    next_step: "予約→初診_再診_確認 / 変更・キャンセル→診療科_聴取 / 確認→確認内容_聴取 / 代表案内→END_代表案内"
    retry_failure: "end_failure"

  - step_name: "初診_再診_確認"
    tts_announcement: "当院の受診は、初めてですか？はい、または、いいえ、で、お答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "新規"
        - "再診"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「初めて」「初診」「初診です」を含む"
          output: "新規"
        - input: "「いいえ」「以前にも」「再診」「2回目」「通院中」「いつもの」を含む"
          output: "再診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "新規・再診どちらも判定できない"
    save_to: "classification"
    next_step: "新規→紹介状_確認 / 再診→診療科_聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "紹介状_確認"
