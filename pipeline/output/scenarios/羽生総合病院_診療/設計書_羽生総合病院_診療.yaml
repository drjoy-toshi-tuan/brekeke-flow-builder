# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 (commubo) → Gen3 移管。9 yaml(main + 8 サブ) を Gen3 のブロック構成に再編成。Gen1 の重複箱(用件を判断_0/1/2、携帯電話番号チェック_0~4 等)は OpenAI + ContextMatchRouter + context に集約。"
  - "受付時間: 月〜土 8:30〜17:00、日祝・12/31〜1/4 休止、5/4〜5/6 は祝日でも平日扱い。具体的な祝日カレンダー設定は Brekeke acceptance_times の管理画面側で実施(設計書には含めない)。"
  - "用件 4 分類(予約/変更/キャンセル/確認) のうち「予約」は後段の初診_再診_確認 で classification を「新規」または「再診」に上書きする。終話分岐_用件_xx(CMR)で 5 値(新規/再診/変更/キャンセル/確認) を参照する。"
  - "紹介状確認は新規(初診)ルートのみ。Gen1 通り context 保存のみで発話分岐はしない。Dr.JOY 側で参照される想定。"
  - "診療科聴取の二択分岐(呼吸器→内科/外科 / 甲状腺→糖尿内分泌/外科 / 小児科→診察/リハ) は Gen1 の構造を維持。"
  - "中黒(・)を含む診療科名(リウマチ・膠原病内科 / 糖尿・内分泌 / 放射線画像診断科・放射線治療科) は context 値では中黒を除去(リウマチ膠原病内科 / 糖尿内分泌 / 放射線画像診断科放射線治療科) し、ASCII safe を確保。TTS では中黒入りで自然に読み上げる(必要に応じて gen_properties 側で調整)。"
  - "代表案内対象は Gen1 の 12 科 + 病理/麻酔(予約対応なし) + 面会 を統合し、END_代表案内 で一括対応。Gen1 にあった「<診療科の読み>は」 動的プレフィックスは Gen3 では使用せず固定文言にする(Brekeke の動的値置換は実機検証中のため安全側で除去)。"
  - "終話分岐: phonetype × classification = 10 通りの完了文言を Gen1 通り維持。携帯ルートは SMS 言及あり / 固定ルートは SMS 言及なし。終話 saveCompletionFlag2db は携帯=smsFlag=1, 固定=smsFlag=-1 の 2 種類のみ。"
  - "年末前期間(12/22〜12/30) のみ、終話直前に「12/30 16:30 まで・1/5 8:30 から再開」のアナウンスを挟む。date_of_call_classifier ブロックで判定。年表記は固定値で記載(年度更新時に毎年差し替え必要)。"
  - "新規(初診)ルートでは診察券番号聴取をスキップ。用件分岐_診療科後 CMR で classification=新規 → jump_氏名聴取 に直接遷移。"
  - "確認ルートでは診療科聴取をスキップ(Gen1 踏襲)。用件_確認 → 確認内容_聴取 → jump_診察券番号聴取 で個人情報パスに合流。"
  - "RAG/FAQ 検索サブフローは Gen1 にもなく移管ノートにも言及なし。pattern: none で起案。CLAUDE.md Rule 16 のデフォルト(Gen1→Gen3 = 2)とは異なるため、CS に確認推奨(NON-BLOCKER N-3)。"
  - "Gen1 の 当日予約サブフロー の「うまく聞き取りができませんでした」リトライ後の「2 回目で 聴取失敗:終話へ」流路は、Gen3 では retry_failure: end_failure(END_聴取失敗) で吸収。"
  - "Gen1 元資料で電話番号区切りサブフロー(電話番号合成)は Gen3 の電話番号聴取サブフロー内 Phone Normalization に置換。"

