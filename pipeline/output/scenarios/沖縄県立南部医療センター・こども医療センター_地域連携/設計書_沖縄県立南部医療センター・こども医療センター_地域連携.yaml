  - module_name: "冒頭_アナウンス"
    purpose: "施設名案内 + 緊急対応問いかけ（opening 直後）"
    announcement: "お電話ありがとうございます。沖縄県立南部医療センター・こども医療センター、地域連携室専用AI電話です。本件は、緊急対応が必要でしょうか。はい、いいえでお答えください。どうぞ。"

  - module_name: "緊急対応確認"
    purpose: "緊急対応 Yes/No 判定の再質問用 TTS（冒頭_アナウンスで既に問いかけ済みなので、リトライ時のみ使用）"
    announcement: "本件は、緊急対応が必要でしょうか。はい、いいえでお答えください。どうぞ。"

  - module_name: "医療機関名聴取"
    purpose: "医療機関名の問いかけ"
    announcement: "お電話をいただいている方の、医療機関名をお話しください。どうぞ。"

  - module_name: "入電者氏名聴取"
    purpose: "入電者（担当者）の氏名問いかけ"
    announcement: "次に、ご担当者様の氏名を「名前は、南部 太郎です」のようにお話しください。どうぞ。"

  - module_name: "用件"
    purpose: "用件 4 択の問いかけ（DTMF + 音声）"
    announcement: "ご用件を次の4つのうちのいずれかでお話ください。1番、外来入院申込みについて。2番、情報提供依頼。3番、入退院支援室へのお問い合わせ。4番、その他お問合せ。それではお話ください。どうぞ。"

  - module_name: "診療科"
    purpose: "診療科問いかけ（情報提供依頼ルート）"
    announcement: "まず、該当の診療科をお話しください。どうぞ。"

  - module_name: "担当者名聴取"
    purpose: "当院担当者名問いかけ（入退院支援室ルート）"
    announcement: "当院の担当者がお分かりの場合は担当者名をお話しください。わからない場合は「わからない」とお話しください。"

  - module_name: "FAX送信時期"
    purpose: "FAX 送信時期問いかけ（外来入院申込みルート）"
    announcement: "FAXを送信した日付と時間帯をお話しください。どうぞ。"

  - module_name: "返信期限"
    purpose: "返信期限問いかけ（情報提供依頼ルート）"
    announcement: "本件について、ご回答期限の日時を教えてください。どうぞ。"

  - module_name: "問い合わせ内容"
    purpose: "問い合わせ内容問いかけ（その他お問い合わせルート。『以上です。』待ち）"
    announcement: "本件のお問い合わせ内容を、簡潔にお話しください。話し終わりましたら、「以上です。」とおっしゃってください。どうぞ。"

