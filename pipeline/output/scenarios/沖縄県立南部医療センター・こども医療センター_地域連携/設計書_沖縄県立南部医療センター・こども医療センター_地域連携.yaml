# --- セクション11: 特記事項・制約 ---
special_notes:
  - "入電者は他医療機関の連携担当者（患者本人ではない）。入電者情報（clinicName / callerName / additionalPhoneNumber）と患者情報（patientName / patientDateOfBirth）は別フィールドで聴取する。入退院支援室ルートでは当院側の担当者名（contactName）も聴取する 3 者構造。"
  - "冒頭ゲート（緊急対応 yes/no）は必ず opening 直後に配置する。共通聴取の後に配置すると、緊急時に無駄な聴取が発生するため設計崩壊となる。"
  - "情報提供依頼ルートで診療科が『整形外科』『整形』『せけげか』『せけいげか』等と判定された場合は AI 対応不可として END_整形外科案内（代表電話案内）で終話する。他のルート（外来入院申込み / 入退院支援室 / その他）では診療科聴取なし。"
  - "その他お問い合わせルートの問い合わせ内容（details）は、利用者が『以上です。』を発話するまで次ステップへ遷移しない。prompter は OpenAI プロンプトに必ずターン制御ルールを含めること。"
  - "全項目で復唱禁止（echo_back=false）。本番版プロンプト（2026/02/09 版）に準拠。デモ版では連絡先電話番号のみ復唱ありだが本番版を採用。"
  - "再質問は最大 2 回。2 回失敗で END_聴取失敗（代表電話案内）へ。"
  - "Gen2 プロンプトの SSML タグ（`<speak type=\"telephone\">` / `<break time=\"300ms\"/>`）は Gen3 では使用禁止。TTS 文言は自然文化して tts_g（Google TTS）で読み上げる。"
  - "Gen2 の smsFlag=0 は Gen3 では smsFlag=-1（SMS 送信なし）にマッピング。Gen3 の許可値は [-1, 1] のみ。"
  - "Gen2 の 初期 status=0 は Gen3 では使用しない。終話時の saveCompletionFlag2db で status=1/2/6 を確定的にセット。"
  - "医療機関名（clinicName）は元資料 §2-1 所属リスト 60+ 施設の正規化マッピングあり。OpenAI プロンプトに所属リストを含め、キーワードマッチで正規化表現を出力。マッチしない入力はそのまま保存（正規化失敗は許容、text 保存）。"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id"
    resolved: false
    notes: "Dr.JOY 管理画面で確認。フローJSONには不要（Dr.JOY 側設定事項）"
  - item: "IVR 着信電話番号（ARS番号）"
    resolved: false
    notes: "Brekeke 設定時に配線。設計書には含めない"
  - item: "非通知アナウンス文言（テンプレデフォルト使用可否）"
    resolved: false
    notes: "Gen2 プロンプトに記載なし。テンプレデフォルト（『電話番号を通知しておかけ直しください』）で進めるが、施設固有文言があれば差し替え"
  - item: "時間外アナウンス文言（テンプレデフォルト使用可否）"
    resolved: false
    notes: "Gen2 プロンプトに記載なし。テンプレデフォルト（『ただいまの時間は受付時間外です』）で進めるが、代表電話番号案内を含めるか確認"
  - item: "グループ名（Brekeke 上のグループ名）"
    resolved: false
    notes: "元資料にグループ名の明示なし。施設名と同一値（『沖縄県立南部医療センター・こども医療センター』）で仮設定。Brekeke 側で別名を使っている場合は差し替え"
  - item: "SMS 送信文面（END_終話1 / END_終話2 対応）"
    resolved: false
    notes: "Dr.JOY 管理画面から設定。フロー側は smsFlag=1 のフラグのみ送出"
  - item: "営業時間スケジュール（日曜祝日・年末年始の休止設定）"
    resolved: false
    notes: "月〜土 8:30〜12:00、日祝・年末年始休止。Dr.JOY 管理画面から設定。フロー側は acceptance_times モジュール配置のみ"
