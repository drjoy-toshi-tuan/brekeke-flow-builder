# 設計書 -- 沖縄県立南部医療センター・こども医療センター 地域連携
# 生成元: @director エージェント
# 生成日: 2026/04/23
# 確認レポート: docs/designs/確認レポート_沖縄県立南部医療センター_地域連携_20260423.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "沖縄県立南部医療センター・こども医療センター"
  scenario_name: "地域連携"
  group_name: "沖縄県立南部医療センター・こども医療センター"
  flow_name: "沖縄県立南部医療センター・こども医療センター$地域連携"
  target_facility: "沖縄県立南部医療センター・こども医療センター（地域連携室）"
  office_id: "TODO_要確認"
  phone_number: "098-888-0123"
  business_hours: "日曜祝日・年末年始除く月〜土 8:30〜12:00"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "沖縄県立南部医療センター・こども医療センター$地域連携"
      role: "main"
      description: "冒頭チェーン → 緊急対応ゲート → 共通聴取(医療機関名→入電者氏名→入電者電話番号) → 用件4分岐 → 各用件別聴取 → 終話"
  subflows:
    - name: "沖縄県立南部医療センター・こども医療センター$電話番号聴取_20260423"
      target: "電話番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "本番版プロンプト準拠で復唱なし。入電者電話番号（additionalPhoneNumber）を10/11桁判定で聴取"
    - name: "沖縄県立南部医療センター・こども医療センター$氏名聴取_20260423"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "患者氏名（patientName）聴取専用サブフロー。PatientName 型 1 本のみ。3 用件ルート（外来/情報提供/入退院）から同一 flowname を参照"
    - name: "沖縄県立南部医療センター・こども医療センター$生年月日聴取_20260423"
      target: "生年月日聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "患者生年月日（patientDateOfBirth）聴取。本番版準拠で復唱なし。和暦→西暦変換ルールを含む"

# --- セクション3: フローの目的 ---
purpose: "地域連携室専用 AI 電話。他医療機関の連携担当者からの電話を受け、冒頭で緊急対応の有無を判定した上で、医療機関名・担当者氏名・担当者連絡先を共通聴取し、用件（外来入院申込み / 情報提供依頼 / 入退院支援室 / その他お問い合わせ）に応じた追加情報（患者情報・FAX送信時期・診療科・返信期限・問い合わせ内容）を聴取して折り返し受付を自動化する。緊急対応要または整形外科（情報提供依頼内）は AI 対応不可として代表電話（098-888-0123）案内で終話する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "沖縄県立南部医療センター・こども医療センター$地域連携"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外 → END_時間外(TTS) → 完了フラグ_時間外(status=6) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS: 施設名＋緊急対応問いかけ)
                                      → 緊急対応確認(hearing enum: 有り/無し)
                                          ├─ 有り → END_緊急対応不可(TTS: 代表電話案内) → 完了フラグ(status=2) → 切断
                                          └─ 無し → 医療機関名聴取(hearing text, clinicName)
                                                      → 入電者氏名聴取(hearing text, callerName)
                                                      → jump_電話番号聴取(Custom Jump to Flow: 電話番号聴取サブフロー)
                                                      → 用件(hearing enum 4分岐)
                                                          ├─ 外来入院申込み → 患者氏名聴取_外来(subflow)
                                                          │                    → 患者生年月日聴取_外来(subflow)
                                                          │                    → FAX送信時期(hearing text, fax)
                                                          │                    → END_終話1(TTS) → 完了フラグ(status=1, smsFlag=1) → 切断
                                                          │
                                                          ├─ 情報提供依頼 → 診療科(hearing enum)
                                                          │                    ├─ 整形外科 → END_整形外科案内(TTS: 代表電話案内) → 完了フラグ(status=2) → 切断
                                                          │                    └─ その他 → 患者氏名聴取_情報提供(subflow)
                                                          │                                  → 患者生年月日聴取_情報提供(subflow)
                                                          │                                  → 返信期限(hearing text, responseDeadline)
                                                          │                                  → END_終話2(TTS) → 完了フラグ(status=1, smsFlag=1) → 切断
                                                          │
                                                          ├─ 入退院支援室 → 担当者名聴取(hearing text, contactName)
                                                          │                    → 患者氏名聴取_入退院(subflow)
                                                          │                    → 患者生年月日聴取_入退院(subflow)
                                                          │                    → END_終話2(TTS) → 完了フラグ(status=1, smsFlag=1) → 切断
                                                          │
                                                          └─ その他お問い合わせ → 問い合わせ内容(hearing text, details, 「以上です」待ち)
                                                                                    → END_終話2(TTS) → 完了フラグ(status=1, smsFlag=1) → 切断
    notes: |
      - 冒頭_アナウンスに緊急対応の問いかけを統合。緊急対応確認 hearing の TTS は再質問時用の短文。
      - 患者氏名聴取／患者生年月日聴取は 3 用件ルートから同一 flowname（氏名聴取 / 生年月日聴取）を異なる step 名で参照。flow_structure.subflows[] では各 1 本のみ登録。
      - 全聴取項目で復唱なし（本番版プロンプト準拠）、再質問最大 2 回、2 回失敗で END_聴取失敗（代表電話案内）へ。

