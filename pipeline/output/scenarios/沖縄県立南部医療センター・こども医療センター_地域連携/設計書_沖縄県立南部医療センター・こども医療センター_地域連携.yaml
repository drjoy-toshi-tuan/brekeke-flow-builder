# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ===== 冒頭チェーン =====
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 緊急対応確認

  # ===== 緊急対応ゲート（Pattern A: OpenAI 直後分岐）=====
  - step: 緊急対応確認
    type: hearing
    output_format: enum
    save_to: emergencyResponse
    conditions:
      - match: "有り"
        next: END_緊急対応不可
      - match: "default"
        next: 医療機関名聴取

  # ===== 共通聴取（医療機関名 → 入電者氏名 → 入電者電話番号）=====
  - step: 医療機関名聴取
    type: hearing
    output_format: text
    save_to: clinicName
    next: 入電者氏名聴取

  - step: 入電者氏名聴取
    type: hearing
    output_format: text
    save_to: callerName
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$電話番号聴取_20260423"
    next: 用件

  # ===== 用件（Pattern A: OpenAI 直後分岐 4 分岐）=====
  - step: 用件
    type: hearing
    output_format: enum
    save_to: classification
    conditions:
      - match: "外来入院申込み"
        next: 患者氏名聴取_外来
      - match: "情報提供依頼"
        next: 診療科
      - match: "入退院支援室"
        next: 担当者名聴取
      - match: "その他お問い合わせ"
        next: 問い合わせ内容

  # ===== 用件ルート1: 外来入院申込み =====
  - step: 患者氏名聴取_外来
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$氏名聴取_20260423"
    next: 患者生年月日聴取_外来

  - step: 患者生年月日聴取_外来
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$生年月日聴取_20260423"
    next: FAX送信時期

  - step: FAX送信時期
    type: hearing
    output_format: text
    save_to: fax
    next: END_終話1

  # ===== 用件ルート2: 情報提供依頼 =====
  - step: 診療科
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "整形外科"
        next: END_整形外科案内
      - match: "default"
        next: 患者氏名聴取_情報提供

  - step: 患者氏名聴取_情報提供
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$氏名聴取_20260423"
    next: 患者生年月日聴取_情報提供

  - step: 患者生年月日聴取_情報提供
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$生年月日聴取_20260423"
    next: 返信期限

  - step: 返信期限
    type: hearing
    output_format: text
    save_to: responseDeadline
    next: END_終話2

  # ===== 用件ルート3: 入退院支援室 =====
  - step: 担当者名聴取
    type: hearing
    output_format: text
    save_to: contactName
    next: 患者氏名聴取_入退院

  - step: 患者氏名聴取_入退院
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$氏名聴取_20260423"
    next: 患者生年月日聴取_入退院

  - step: 患者生年月日聴取_入退院
    type: subflow
    flowname: "沖縄県立南部医療センター・こども医療センター$生年月日聴取_20260423"
    next: END_終話2

  # ===== 用件ルート4: その他お問い合わせ =====
  - step: 問い合わせ内容
    type: hearing
    output_format: text
    save_to: details
    next: END_終話2

  # ===== 終話ブロック =====
  - step: END_緊急対応不可
    type: termination
    termination_ref: END_緊急対応不可

  - step: END_整形外科案内
    type: termination
    termination_ref: END_整形外科案内

  - step: END_終話1
    type: termination
    termination_ref: END_終話1

  - step: END_終話2
    type: termination
    termination_ref: END_終話2

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "緊急対応確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "emergencyResponse"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "有り"
      - "無し"
    notes: "Yes/No ゲート。『はい』『そう』『緊急』『必要』『優先』→有り、『いいえ』『いや』『ちがいます』→無し。判定不可は『無し』扱いで本フロー継続（安全側）"

  - order: 2
    name: "医療機関名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "元資料 §2-1 所属リスト 60+ 施設の正規化マッピングあり。OpenAI プロンプトに所属リストを含め、キーワードマッチで正規化表現を出力。マッチしない入力はそのまま保存"

  - order: 3
    name: "入電者氏名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "callerName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "入電者（医療機関担当者）のフルネーム。テキストそのまま保存"

  - order: 4
    name: "用件"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "外来入院申込み"
      - "情報提供依頼"
      - "入退院支援室"
      - "その他お問い合わせ"
    notes: "DTMF 1=外来入院申込み, 2=情報提供依頼, 3=入退院支援室, 4=その他お問い合わせ。音声では『外来』『申込み』→1、『情報提供』→2、『入退院』『支援室』→3、『その他』『問い合わせ』→4"

  - order: 5
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "整形外科"
      - "default"
    notes: |
      情報提供依頼ルート専用。整形外科判定時のみ END_整形外科案内 に分岐、それ以外は次ステップ（患者氏名聴取_情報提供）へ。
      元資料 function.clinicalDepartment.enum 全 49 科を OpenAI プロンプトに列挙し、正規化名を出力。
      『整形外科』『整形』『せけげか』『せけいげか』は整形外科判定。
      NO_RESULT 時は no_result_default=『登録なし』で context に保存してリトライ。

  - order: 6
    name: "担当者名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "contactName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "入退院支援室ルート専用。当院担当者名（わからない場合は『わからない』をそのまま格納）"

  - order: 7
    name: "FAX送信時期"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "fax"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "外来入院申込みルート専用。FAX を送信した日付と時間帯。datetime ではなく text（『先ほど』『午前中に送りました』等の曖昧表現を許容）"

  - order: 8
    name: "返信期限"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "responseDeadline"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "情報提供依頼ルート専用。回答期限の日時。datetime ではなく text（『今週中』『至急』等の曖昧表現を許容）"

  - order: 9
    name: "問い合わせ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: |
      その他お問い合わせルート専用。
      【ターン制御ルール（必須）】
      利用者の発話内容に『以上です。』が含まれた場合にのみ、次の処理・次のステップへ進む。
      利用者が『以上です。』を発話していない間は、最後まで待機。絶対に発話を途中で遮断しない。
      prompter はこのターン制御ルールを OpenAI プロンプトに必ず含めること。

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。沖縄県立南部医療センター・こども医療センター、地域連携室専用AI電話です。本件は、緊急対応が必要でしょうか。はい、いいえでお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "緊急対応確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "緊急対応確認"
    tts_announcement: "本件は、緊急対応が必要でしょうか。はい、いいえでお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "有り"
        - "無し"
      mapping:
        - input: "『はい』『そう』『そうです』『はいそうです』を含む"
          output: "有り"
        - input: "『緊急』『緊急対応』を含む"
          output: "有り"
        - input: "『必要』を含む"
          output: "有り"
        - input: "『優先』を含む"
          output: "有り"
        - input: "『いいえ』『いえ』『いや』『違います』『ちがいます』『ちがう』を含む"
          output: "無し"
        - input: "『緊急対応じゃない』『当日じゃない』を含む"
          output: "無し"
      no_result_condition: "上記いずれにも該当しない場合は『無し』扱い（安全側。本フロー継続）"
    save_to: "emergencyResponse"
    next_step: "医療機関名聴取（無しの場合） / END_緊急対応不可（有りの場合）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "医療機関名聴取"
    tts_announcement: "お電話をいただいている方の、医療機関名をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "所属リスト（元資料 §2-1）に記載のキーワードを含む発話"
          output: "正規化表現（例: 『とうきょうとそうごうくみあいほけんしせつしんこうかい』→『東振協』）"
        - input: "所属リストに該当しない発話"
          output: "発話内容をそのまま保存（正規化不可）"
      no_result_condition: ""
    save_to: "clinicName"
    next_step: "入電者氏名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "入電者氏名聴取"
    tts_announcement: "次に、ご担当者様の氏名を「名前は、南部 太郎です」のようにお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "氏名発話"
          output: "氏名部分のみを抽出（『名前は』『です』等は除去）"
      no_result_condition: ""
    save_to: "callerName"
    next_step: "jump_電話番号聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "用件"
    tts_announcement: "ご用件を次の4つのうちのいずれかでお話ください。1番、外来入院申込みについて。2番、情報提供依頼。3番、入退院支援室へのお問い合わせ。4番、その他お問合せ。それではお話ください。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "外来入院申込み"
        - "情報提供依頼"
        - "入退院支援室"
        - "その他お問い合わせ"
      mapping:
        - input: "DTMF 1 または『外来』『申込み』『外来入院申込み』『外来入院』『一』『一です』『一番』を含む"
          output: "外来入院申込み"
        - input: "DTMF 2 または『情報提供』『じょうほうていきょう』『じょうほうていきょういらい』『じょうほう』『ていきょう』『二』『二です』『二番』を含む"
          output: "情報提供依頼"
        - input: "DTMF 3 または『入退院』『入院』『支援室』『退院』『三』『三です』『三番』を含む"
          output: "入退院支援室"
        - input: "DTMF 4 または『その他』『問い合わせ』『よん』『四』『四番』『よんです』を含む"
          output: "その他お問い合わせ"
      no_result_condition: "上記いずれにも該当しない場合は NO_RESULT（リトライへ）"
    save_to: "classification"
    next_step: "患者氏名聴取_外来（外来）/ 診療科（情報提供）/ 担当者名聴取（入退院）/ 問い合わせ内容（その他）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "診療科"
    tts_announcement: "まず、該当の診療科をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "整形外科"
        - "default"
      mapping:
        - input: "『整形外科』『整形』『せけげか』『せけいげか』を含む"
          output: "整形外科"
        - input: "function.clinicalDepartment.enum 全 49 科（整形外科以外）のいずれかのキーワード／類義語（元資料 §2.2）を含む"
          output: "default（context には該当する正規化診療科名を保存した上で次ステップへ）"
      no_result_condition: "上記いずれにも該当しない場合は context に『登録なし』を保存した上で default ルートへ（NO_RESULT はリトライ、no_result_default=『登録なし』）"
    save_to: "clinicalDepartment"
    next_step: "END_整形外科案内（整形外科の場合） / 患者氏名聴取_情報提供（default）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "担当者名聴取"
    tts_announcement: "当院の担当者がお分かりの場合は担当者名をお話しください。わからない場合は「わからない」とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "担当者名発話"
          output: "氏名部分のみを抽出"
        - input: "『わからない』『わかりません』『不明』を含む"
          output: "わからない"
      no_result_condition: ""
    save_to: "contactName"
    next_step: "患者氏名聴取_入退院"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "FAX送信時期"
    tts_announcement: "FAXを送信した日付と時間帯をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日付と時間帯を含む発話"
          output: "発話内容をそのまま保存（text）"
      no_result_condition: ""
    save_to: "fax"
    next_step: "END_終話1"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "返信期限"
    tts_announcement: "本件について、ご回答期限の日時を教えてください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日時を含む発話"
          output: "発話内容をそのまま保存（text）"
      no_result_condition: ""
    save_to: "responseDeadline"
    next_step: "END_終話2"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "問い合わせ内容"
    tts_announcement: "本件のお問い合わせ内容を、簡潔にお話しください。話し終わりましたら、「以上です。」とおっしゃってください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "『以上です。』を含む発話"
          output: "『以上です。』以前の発話内容をそのまま保存"
      no_result_condition: "発話内容に『以上です。』が含まれない場合は next へ遷移せず、発話を待機し続ける（ターン制御ルール）"
    save_to: "details"
    next_step: "END_終話2"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（日曜祝日・年末年始 または 月〜土 8:30 未満 / 12:00 以降）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間は、日曜祝日・年末年始を除く、月曜日から土曜日の8時30分から12時です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限（2回）到達"
    tts_announcement: "大変申し訳ございません。ご回答を聞き取ることができませんでした。恐れ入りますが、代表電話番号へおかけなおしください。受付時間は、日曜祝日、年末年始を除く、月曜日から土曜日の8時30分から12時です。お電話番号をご案内いたしますので、メモをご準備ください。098-888-0123。もう一度お伝えします。098-888-0123。最後にもう一度お伝えします。098-888-0123。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 施設固有・代表案内系 ---
  - name: "END_緊急対応不可"
    condition: "冒頭ゲートで緊急対応『有り』判定"
    tts_announcement: "当日の緊急対応はAI電話では対応できません。恐れ入りますが、代表電話番号へおかけなおしください。受付時間は、日曜祝日、年末年始を除く、月曜日から土曜日の8時30分から12時です。お電話番号をご案内いたしますので、メモをご準備ください。098-888-0123。もう一度お伝えします。098-888-0123。最後にもう一度お伝えします。098-888-0123。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_緊急対応不可"

  - name: "END_整形外科案内"
    condition: "情報提供依頼ルートで診療科『整形外科』判定"
    tts_announcement: "申し訳ございません。整形外科は、AI電話では承ることができません。恐れ入りますが、代表電話番号へおかけなおしください。受付時間は、日曜祝日、年末年始を除く、月曜日から土曜日の8時30分から12時です。お電話番号をご案内いたしますので、メモをご準備ください。098-888-0123。もう一度お伝えします。098-888-0123。最後にもう一度お伝えします。098-888-0123。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_整形外科案内"

  # --- 正常系 ---
  - name: "END_終話1"
    condition: "外来入院申込みルート完了（患者氏名 + 生年月日 + FAX送信時期 聴取済み）"
    tts_announcement: "かしこまりました。確認事項がある場合のみ、担当者より折り返しご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_終話1"

  - name: "END_終話2"
    condition: "情報提供依頼 / 入退院支援室 / その他お問い合わせ の各ルート完了"
    tts_announcement: "かしこまりました。内容を確認のうえ、5診療日以内にスタッフからご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_終話2"

# smsFlag 分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

# --- セクション8b: RAG/FAQ検索サブフロー ---
