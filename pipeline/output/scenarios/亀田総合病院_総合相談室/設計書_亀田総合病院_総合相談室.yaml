# --- セクション11: 特記事項・制約 ---
special_notes:
  - "PATCH_BOX（亀田_flat.md）により 1フロー型フラットで構築。個人情報（患者氏名・連絡先）はインライン hearing、サブフロー/Jump to Flow は不使用。"
  - "用件分類系の enum 判定は generate_by_OpenAI で実装（A3「決定論デフォルト」に対する初号の暫定例外。OPENAI_EXCEPTION: callerType / classification / patientCategory / staffKnown / inquiryType）。"
  - "顧客大原則（2026-06-10 浜口確定）: 相談室業務に直接関係する電話のみ受け、予約関連はどの分岐で出ても END_予約センター案内 で弾く。用件確認の OpenAI プロンプトは予約系発話を広めに検知する方向でチューニングする。"
  - "担当者個別取次は今回実装しない（内線/PHS 対応表が無いため）。担当者名は staffName に context 記録し、折返し時にスタッフが繋ぐ運用。担当者特定可パスは全て伝言・折返しパスへ合流。"
  - "F1仕分けは『新規の相談(new_q)』と『外来・担当者特定不可(D2)』の両方から合流させる（顧客イメージと drawio の両解釈を包含）。最終形は病院に確認（確認レポート N-4）。"
  - "転送は call_transfer で抽象化。転送方式（内線A / 050外線B）と実番号はプロパティ/TODO（相談室=内線7177、大代表=04-7092-2211）。情シス確認待ち。"
  - "営業時間チェック（acceptance_times）は元資料に時間外の扱いが無いため配置しない（use_acceptance_times: false）。END_時間外 は framework 既定として termination_patterns に保持するがフローからは参照されない。"
  - "incoming-classifier の非通知分岐は framework 既定。非通知・国際入電ガードの要否は顧客確認（確認レポート N-2）。"
  - "TTS 文言は元資料に無いため全文ドラフト（顧客確定前提）。定型案内コンテンツ・予約センター番号は未受領のため placeholder（TODO）。"
  - "call_transfer ブロックが2つ（相談室転送・大代表転送）あるため、scaffold が END_転送成功(status=3)/END_転送失敗(status=9)を自動生成する。両転送が同じ END へ合流する想定。"

