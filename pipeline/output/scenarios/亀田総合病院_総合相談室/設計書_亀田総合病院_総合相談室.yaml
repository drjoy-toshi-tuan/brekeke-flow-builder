  flow_name: "亀田総合病院_総合相談室_20260611$総合相談室"
  target_facility: "本院（総合相談室）のみ"
  office_id: "TODO_要確認"
  phone_number: "04-7099-1223"          # 総合相談室 代表（着信）番号。元資料記載
