    retry_failure: "skip"

  - step_name: "折返し_氏名"
    tts_announcement: "{tts_g:お名前を、姓と名の順に、フルネームでおっしゃってください。}"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "聴取できない場合は次へ進む（skip）"
