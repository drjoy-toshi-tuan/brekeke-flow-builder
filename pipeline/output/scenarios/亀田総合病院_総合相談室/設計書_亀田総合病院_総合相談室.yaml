    resolved: false
  - item: "発信元分類・用件 catch-all の無言/判定不能時の遷移先（現状: 折返し受付へ集約）の妥当性"
    resolved: false
  - item: "new_q（新規の相談）→ F1 と 外来・担当者特定不可 → F1 の両合流配線の最終形（病院確認）"
    resolved: false
  - item: "定型案内の案内コンテンツ（場所・受付時間・番号等）— 未受領。受領後プロパティ差し替え"
    resolved: false
  - item: "予約センター番号 — 未受領。END_予約センター案内に番号を含めるか（番号受領後プロパティ差し替え）"
    resolved: false
  - item: "転送方式（内線A / 050外線B）と実番号設定（相談室7177 / 大代表04-7092-2211）— 情シス確認待ち。プロパティで設定"
    resolved: false
  - item: "TTS 全文言（ドラフト・顧客確定前提）の最終確認"
    resolved: false
  - item: "各終話の status / sms_flag の運用妥当性（折返し=1, 予約センター案内=2, 定型案内=2, 全 sms_flag=0）"
    resolved: false
  - item: "担当者個別取次を今回実装しない方針（担当者名は context 記録のみ）の顧客最終合意"
    resolved: false
  - item: >
      氏名フィールドの扱い: PATCH_BOX(亀田_flat.md) の 1フロー型フラット（サブフロー不使用）を維持するため、
      患者氏名確認・折返し_氏名 を Dr.JOY 標準 magic field patientName ではなく中立フィールド contactName(氏名) に保存している
      （qa_validator E-12 は patientName の hearing インライン配置をサブフロー必須として CRITICAL 検出するため）。
      Dr.JOY 画面の標準「患者名」スロットへの連携が必要であれば、(a) サブフロー化 or (b) Dr.JOY 側マッピングのいずれで対応するか確認。
    resolved: false
