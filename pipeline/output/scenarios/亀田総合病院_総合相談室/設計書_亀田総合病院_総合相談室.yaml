# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "発信元確認"
    tts_announcement: "{tts_g:はじめに、お電話をくださった方についてお伺いします。患者ご本人またはご家族の方は1を、連携先の医療機関の方は2を、行政機関の方は3を、ダイヤルでご入力ください。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "患者本人・家族"
        - "連携医療機関"
        - "行政"
      mapping:
        - input: "DTMF 1 または「本人」「家族」「患者」を含む発話"
          output: "患者本人・家族"
        - input: "DTMF 2 または「クリニック」「診療所」「病院」「医療機関」等を含む発話"
          output: "連携医療機関"
        - input: "DTMF 3 または「市役所」「役所」「保健所」「行政」「地域包括」等を含む発話"
          output: "行政"
      no_result_condition: "上記いずれにも該当しない / 無言"
    save_to: "callerType"
    next_step: "用件確認 / 担当者確認_連携 / 担当者確認_行政 / 折返し_氏名(other)"
    retry_failure: "end_failure"

  - step_name: "用件確認"
    tts_announcement: "{tts_g:ご用件をお話しください。総合相談室へのご相談、当院の代表番号へのご用件、ご予約に関するご用件などについて承ります。}"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "相談"
        - "大代表"
        - "予約"
        - "定型案内"
        - "その他"
      mapping:
        - input: "総合相談室への相談・退院調整・ケアマネ連携 等"
          output: "相談"
        - input: "代表電話・他部署・誤って相談室にかけた 等"
          output: "大代表"
        - input: "外来予約・受診予約・予約変更・予約確認 等の予約関連（広めに検知）"
          output: "予約"
        - input: "場所・受付時間・各種番号の問い合わせ 等の定型案内"
          output: "定型案内"
      no_result_condition: "上記いずれにも明確に該当しない / 判定不能 → その他（折返し受付へ）"
    save_to: "classification"
    next_step: "相談区分確認 / 大代表転送 / END_予約センター案内 / 定型案内 / 折返し_氏名(other)"
    retry_failure: "end_failure"

  - step_name: "相談区分確認"
    tts_announcement: "{tts_g:ご相談についてお伺いします。入院中の患者さまに関するご相談は1を、外来の患者さまに関するご相談は2を、新規のご相談は3を、ダイヤルでご入力ください。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "入院"
        - "外来"
        - "新規"
      mapping:
        - input: "DTMF 1 または「入院」を含む発話"
          output: "入院"
        - input: "DTMF 2 または「外来」を含む発話"
          output: "外来"
        - input: "DTMF 3 または「新規」「初めて」を含む発話"
          output: "新規"
      no_result_condition: "上記いずれにも該当しない → F1仕分けへ"
    save_to: "patientCategory"
    next_step: "担当者確認_入院 / 担当者確認_外来 / F1仕分け"
    retry_failure: "end_failure"

  - step_name: "担当者確認_入院"
    tts_announcement: "{tts_g:ご担当者のお名前はおわかりでしょうか。おわかりの場合は1を、わからない場合は2を、ダイヤルでご入力ください。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "わかる"
        - "わからない"
      mapping:
        - input: "DTMF 1 または「わかる」「はい」"
          output: "わかる"
        - input: "DTMF 2 または「わからない」「いいえ」"
          output: "わからない"
      no_result_condition: "判定不能 → わからない相当（相談室転送）"
    save_to: "staffKnown"
    next_step: "患者氏名確認 / 相談室転送(other)"
    retry_failure: "end_failure"

  - step_name: "担当者確認_外来"
    tts_announcement: "{tts_g:ご担当者のお名前はおわかりでしょうか。おわかりの場合は1を、わからない場合は2を、ダイヤルでご入力ください。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "わかる"
        - "わからない"
      mapping:
        - input: "DTMF 1 または「わかる」「はい」"
          output: "わかる"
        - input: "DTMF 2 または「わからない」「いいえ」"
          output: "わからない"
      no_result_condition: "判定不能 → わからない相当（F1仕分け）"
    save_to: "staffKnown"
    next_step: "患者氏名確認 / F1仕分け(other)"
    retry_failure: "end_failure"

  - step_name: "担当者確認_連携"
    tts_announcement: "{tts_g:ご担当者のお名前はおわかりでしょうか。おわかりの場合は1を、わからない場合は2を、ダイヤルでご入力ください。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "わかる"
        - "わからない"
      mapping:
        - input: "DTMF 1 または「わかる」「はい」"
          output: "わかる"
        - input: "DTMF 2 または「わからない」「いいえ」"
          output: "わからない"
      no_result_condition: "判定不能 → わからない相当（相談室転送）"
    save_to: "staffKnown"
    next_step: "担当者名聴取 / 相談室転送(other)"
    retry_failure: "end_failure"

  - step_name: "担当者確認_行政"
    tts_announcement: "{tts_g:ご担当者のお名前はおわかりでしょうか。おわかりの場合は1を、わからない場合は2を、ダイヤルでご入力ください。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "わかる"
        - "わからない"
      mapping:
        - input: "DTMF 1 または「わかる」「はい」"
          output: "わかる"
        - input: "DTMF 2 または「わからない」「いいえ」"
          output: "わからない"
      no_result_condition: "判定不能 → わからない相当（相談室転送）"
    save_to: "staffKnown"
    next_step: "担当者名聴取 / 相談室転送(other)"
    retry_failure: "end_failure"

  - step_name: "F1仕分け"
    tts_announcement: "{tts_g:ご用件についてお伺いします。ご相談のご予約に関することは1を、受診に関することは2を、ダイヤルでご入力ください。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "相談予約"
        - "受診"
      mapping:
        - input: "DTMF 1 または「相談」「相談の予約」"
          output: "相談予約"
        - input: "DTMF 2 または「受診」「診察」「外来予約」等"
          output: "受診"
      no_result_condition: "判定不能 → 相談室業務寄り（相談室転送）"
    save_to: "inquiryType"
    next_step: "相談室転送 / END_予約センター案内 / 相談室転送(other)"
    retry_failure: "end_failure"

  - step_name: "患者氏名確認"
    tts_announcement: "{tts_g:患者さまのお名前を、姓と名の順に、フルネームでおっしゃってください。}"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "聴取できない場合は次へ進む（skip）"
    save_to: "contactName"
    next_step: "担当者名聴取"
    retry_failure: "skip"

  - step_name: "担当者名聴取"
    tts_announcement: "{tts_g:ご担当者のお名前をおっしゃってください。}"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "聴取できない場合は次へ進む（skip）"
