    next_step: "折返し_連絡先電話番号"
    retry_failure: "skip"

  - step_name: "折返し_連絡先電話番号"
    tts_announcement: "{tts_g:折り返しのご連絡先となるお電話番号を、市外局番からダイヤルでご入力ください。入力が終わりましたら、シャープを押してください。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
