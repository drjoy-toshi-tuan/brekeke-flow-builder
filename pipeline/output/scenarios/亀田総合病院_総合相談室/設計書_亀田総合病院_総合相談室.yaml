# --- セクション2: フロー構成 ---
# PATCH_BOX 亀田_flat.md 指定により 1フロー型フラット。
# 個人情報聴取（患者氏名・連絡先電話番号）はインライン hearing として scenario_flow に直接配置。
# subflow ブロック / Jump to Flow は使用しない。RAG/FAQ も無し。subflows[] は空。
flow_structure:
  type: "1flow"
  flows:
    - name: "亀田総合病院_総合相談室_20260611$総合相談室"
      role: "main"
      description: "総合相談室直通(04-7099-1223)への受電を一次応答。発信元(患者本人・家族/連携医療機関/行政)と用件を判定し、相談室・大代表への転送、伝言・折返し受付、定型案内、予約センターかけ直し案内を行う。"
  subflows: []                          # 1フロー型のため空。個人情報はインライン hearing。

# --- セクション3: フローの目的 ---
purpose: >
  亀田総合病院 総合相談室（一次受けが MSW・PSW・看護師の専門職）の直通番号への受電を AI が一次応答する。
  発信元（患者本人・家族／連携医療機関／行政の3分類）と用件を判定し、(1)相談室業務に関係する電話のみ受け、
  (2)予約関連は予約センターかけ直し案内で弾き、(3)大代表の用件・誤着信は大代表へ転送、
  (4)担当者特定可・特定不可・catch-all は伝言/折返し受付または相談室転送に振り分ける。
  顧客大原則（2026-06-10 浜口確定）: 「相談室業務に直接関係する電話のみ受け付け、予約関連は受け付けずに弾く」。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "亀田総合病院_総合相談室_20260611$総合相談室"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知(framework既定・要否は顧客確認)
            └─ 通常 → 冒頭_アナウンス
                         → 発信元確認(enum: 患者本人・家族 / 連携医療機関 / 行政)
                             ├─ 患者本人・家族 → 用件確認(enum)
                             │     ├─ 相談       → 相談区分確認(enum: 入院/外来/新規)
                             │     │     ├─ 入院 → 担当者確認_入院(わかる/わからない)
                             │     │     │     ├─ わかる   → 患者氏名確認 → 担当者名聴取 → 折返し_用件内容
                             │     │     │     └─ わからない → 相談室転送(7177)
                             │     │     ├─ 外来 → 担当者確認_外来(わかる/わからない)
                             │     │     │     ├─ わかる   → 患者氏名確認 → 担当者名聴取 → 折返し_用件内容
                             │     │     │     └─ わからない → F1仕分け
                             │     │     └─ 新規 → F1仕分け
                             │     ├─ 大代表    → 大代表転送(04-7092-2211・誤着信)
                             │     ├─ 予約       → END_予約センター案内(弾く)
                             │     ├─ 定型案内   → 定型案内 → END_定型案内
                             │     └─ その他     → 折返し_氏名 → 折返し_用件内容
                             ├─ 連携医療機関 → 担当者確認_連携(わかる/わからない)
                             │     ├─ わかる   → 担当者名聴取 → 折返し_用件内容
                             │     └─ わからない → 相談室転送(7177)
                             ├─ 行政        → 担当者確認_行政(わかる/わからない)
                             │     ├─ わかる   → 担当者名聴取 → 折返し_用件内容
                             │     └─ わからない → 相談室転送(7177)
                             └─ その他       → 折返し_氏名 → 折返し_用件内容

      F1仕分け(enum: 相談予約/受診)  ※新規(new_q) と 外来・担当者特定不可(D2) の両方から合流
        ├─ 相談予約 → 相談室転送(7177)
        ├─ 受診     → END_予約センター案内(弾く)
        └─ その他   → 相談室転送(7177)

      折返しパイプライン(伝言・折返し受付)
        折返し_用件内容(text) → 折返し_連絡先電話番号(text・復唱) → END_折返し受付
        （catch-all 入口のみ 折返し_氏名 を先頭に経由）

      転送(call_transfer・方式/実番号はプロパティ/TODO)
        相談室転送(7177) / 大代表転送(04-7092-2211)
          ├─ 成功 → END_転送成功(status=3・自動生成)
          └─ 失敗 → END_転送失敗(status=9・自動生成)
    notes: >
      営業時間チェックは元資料に記載がないため配置しない（use_acceptance_times: false）。
      incoming-classifier の非通知分岐は framework 既定。要否は顧客確認（確認レポート参照）。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 発信元確認

  # --- 発信元3分類（DTMF/音声を収集 → n_choice 決定論分類。OpenAIゼロ）---
  - step: 発信元確認
    type: hearing
    output_format: text          # 収集のみ（OpenAI無し）。分類は後段 script(n_choice)
    save_to: ""                  # 生値は保存しない。script が callerType にラベル保存
    next: 発信元_分類
  - step: 発信元_分類
    type: script
    script_template: n_choice
    reference_module: 入力_発信元確認
    template_params:
      INPUT_MODULE: "入力_発信元確認"
      CONTEXT_NAME: "callerType"
      CONTEXT_DISPLAY_TYPE: "TEXT"
      DTMF_MAP: '{"1":"患者本人・家族","2":"連携医療機関","3":"行政"}'
      TOKEN_MAP: '[]'
      DIGIT_KEYWORD_PATTERNS: '[]'
      COMPOUND_PATTERNS: '[]'
      KEYWORD_PATTERNS: '[{"regex":"本人|家族|患者|母|父|親|息子|娘","result":"患者本人・家族"},{"regex":"クリニック|診療所|病院|医療機関|医院|連携先","result":"連携医療機関"},{"regex":"市役所|役所|役場|保健所|行政|地域包括|包括支援|福祉課","result":"行政"}]'
    conditions:
      - match: "患者本人・家族"
        next: 用件確認
      - match: "連携医療機関"
        next: 担当者確認_連携
      - match: "行政"
        next: 担当者確認_行政
      - match: "other"          # NO_RESULT/判定不能 → 折返し受付に集約（顧客確認事項 N-3）
        next: 折返し_氏名

  # --- 用件分類（自由発話 → inquiry_classifier 決定論分類。OpenAIゼロ）---
  - step: 用件確認
    type: hearing
    output_format: text          # 収集のみ。分類は後段 script(inquiry_classifier)
    save_to: ""
    next: 用件_分類
  - step: 用件_分類
    type: script
    script_template: inquiry_classifier
    reference_module: 入力_用件確認
    template_params:
      INPUT_MODULE: "入力_用件確認"
      CONTEXT_NAME: "classification"
      CONTEXT_DISPLAY_TYPE: "CLASSIFICATION"
    conditions:
      - match: "相談"
        next: 相談区分確認
      - match: "大代表"
        next: 大代表転送
      - match: "予約"
        next: END_予約センター案内    # 予約関連は弾く（顧客大原則）
      - match: "定型案内"
        next: 定型案内
      - match: "other"               # その他/NO_RESULT → 折返し受付
        next: 折返し_氏名

  # --- 相談区分(C0): 入院/外来/新規（DTMF/音声 → n_choice。OpenAIゼロ）---
  - step: 相談区分確認
    type: hearing
    output_format: text
    save_to: ""
    next: 相談区分_分類
  - step: 相談区分_分類
    type: script
    script_template: n_choice
    reference_module: 入力_相談区分確認
    template_params:
      INPUT_MODULE: "入力_相談区分確認"
      CONTEXT_NAME: "patientCategory"
      CONTEXT_DISPLAY_TYPE: "TEXT"
      DTMF_MAP: '{"1":"入院","2":"外来","3":"新規"}'
      TOKEN_MAP: '[]'
      DIGIT_KEYWORD_PATTERNS: '[]'
      COMPOUND_PATTERNS: '[]'
      KEYWORD_PATTERNS: '[{"regex":"入院","result":"入院"},{"regex":"外来|通院","result":"外来"},{"regex":"新規|初めて|はじめて|初診","result":"新規"}]'
    conditions:
      - match: "入院"
        next: 担当者確認_入院
      - match: "外来"
        next: 担当者確認_外来
      - match: "新規"
        next: F1仕分け
      - match: "other"               # 区分不明/NO_RESULT → F1で相談/予約に仕分け
        next: F1仕分け

  # --- 担当者わかるか(入院)（DTMF/音声 → n_choice。OpenAIゼロ）---
  - step: 担当者確認_入院
    type: hearing
    output_format: text
    save_to: ""
    next: 担当者確認_入院_分類
  - step: 担当者確認_入院_分類
    type: script
    script_template: n_choice
    reference_module: 入力_担当者確認_入院
    template_params:
      INPUT_MODULE: "入力_担当者確認_入院"
      CONTEXT_NAME: "staffKnown"
      CONTEXT_DISPLAY_TYPE: "TEXT"
      DTMF_MAP: '{"1":"わかる","2":"わからない"}'
      TOKEN_MAP: '[]'
      DIGIT_KEYWORD_PATTERNS: '[]'
      COMPOUND_PATTERNS: '[]'
      KEYWORD_PATTERNS: '[{"regex":"わからない|わかりません|分からない|分かりません|わかりかね|分かりかね|わからな|分からな|不明|いいえ|知らない|知りません|知らな","result":"わからない"},{"regex":"わかる|わかります|分かる|分かります|^はい|存じ|知って","result":"わかる"}]'
    conditions:
      - match: "わかる"
        next: 患者氏名確認
      - match: "other"               # わからない/NO_RESULT → 相談室7177
        next: 相談室転送

  # --- 担当者わかるか(外来)（DTMF/音声 → n_choice。OpenAIゼロ）---
  - step: 担当者確認_外来
    type: hearing
    output_format: text
    save_to: ""
    next: 担当者確認_外来_分類
  - step: 担当者確認_外来_分類
    type: script
    script_template: n_choice
    reference_module: 入力_担当者確認_外来
    template_params:
      INPUT_MODULE: "入力_担当者確認_外来"
      CONTEXT_NAME: "staffKnown"
      CONTEXT_DISPLAY_TYPE: "TEXT"
      DTMF_MAP: '{"1":"わかる","2":"わからない"}'
      TOKEN_MAP: '[]'
      DIGIT_KEYWORD_PATTERNS: '[]'
      COMPOUND_PATTERNS: '[]'
      KEYWORD_PATTERNS: '[{"regex":"わからない|わかりません|分からない|分かりません|わかりかね|分かりかね|わからな|分からな|不明|いいえ|知らない|知りません|知らな","result":"わからない"},{"regex":"わかる|わかります|分かる|分かります|^はい|存じ|知って","result":"わかる"}]'
    conditions:
      - match: "わかる"
        next: 患者氏名確認
      - match: "other"               # わからない/NO_RESULT → F1仕分け
        next: F1仕分け

  # --- 担当者わかるか(連携医療機関)（DTMF/音声 → n_choice。OpenAIゼロ）---
  - step: 担当者確認_連携
    type: hearing
    output_format: text
    save_to: ""
    next: 担当者確認_連携_分類
  - step: 担当者確認_連携_分類
    type: script
    script_template: n_choice
    reference_module: 入力_担当者確認_連携
    template_params:
      INPUT_MODULE: "入力_担当者確認_連携"
      CONTEXT_NAME: "staffKnown"
      CONTEXT_DISPLAY_TYPE: "TEXT"
      DTMF_MAP: '{"1":"わかる","2":"わからない"}'
      TOKEN_MAP: '[]'
      DIGIT_KEYWORD_PATTERNS: '[]'
      COMPOUND_PATTERNS: '[]'
      KEYWORD_PATTERNS: '[{"regex":"わからない|わかりません|分からない|分かりません|わかりかね|分かりかね|わからな|分からな|不明|いいえ|知らない|知りません|知らな","result":"わからない"},{"regex":"わかる|わかります|分かる|分かります|^はい|存じ|知って","result":"わかる"}]'
    conditions:
      - match: "わかる"
        next: 担当者名聴取
      - match: "other"               # わからない/NO_RESULT → 相談室7177
        next: 相談室転送

  # --- 担当者わかるか(行政)（DTMF/音声 → n_choice。OpenAIゼロ）---
  - step: 担当者確認_行政
    type: hearing
    output_format: text
    save_to: ""
    next: 担当者確認_行政_分類
  - step: 担当者確認_行政_分類
    type: script
    script_template: n_choice
    reference_module: 入力_担当者確認_行政
    template_params:
      INPUT_MODULE: "入力_担当者確認_行政"
      CONTEXT_NAME: "staffKnown"
      CONTEXT_DISPLAY_TYPE: "TEXT"
      DTMF_MAP: '{"1":"わかる","2":"わからない"}'
      TOKEN_MAP: '[]'
      DIGIT_KEYWORD_PATTERNS: '[]'
      COMPOUND_PATTERNS: '[]'
      KEYWORD_PATTERNS: '[{"regex":"わからない|わかりません|分からない|分かりません|わかりかね|分かりかね|わからな|分からな|不明|いいえ|知らない|知りません|知らな","result":"わからない"},{"regex":"わかる|わかります|分かる|分かります|^はい|存じ|知って","result":"わかる"}]'
    conditions:
      - match: "わかる"
        next: 担当者名聴取
      - match: "other"               # わからない/NO_RESULT → 相談室7177
        next: 相談室転送

  # --- F1仕分け（新規 と 外来・特定不可 の両合流。DTMF/音声 → n_choice。OpenAIゼロ）---
  - step: F1仕分け
    type: hearing
    output_format: text
    save_to: ""
    next: F1_分類
  - step: F1_分類
    type: script
    script_template: n_choice
    reference_module: 入力_F1仕分け
    template_params:
      INPUT_MODULE: "入力_F1仕分け"
      CONTEXT_NAME: "inquiryType"
      CONTEXT_DISPLAY_TYPE: "TEXT"
      DTMF_MAP: '{"1":"相談予約","2":"受診"}'
      TOKEN_MAP: '[]'
      DIGIT_KEYWORD_PATTERNS: '[]'
      COMPOUND_PATTERNS: '[]'
      KEYWORD_PATTERNS: '[{"regex":"相談予約|相談|予約の相談","result":"相談予約"},{"regex":"受診|診察|診て|外来","result":"受診"}]'
    conditions:
      - match: "相談予約"
        next: 相談室転送            # 相談予約 7177（相談室業務）
      - match: "受診"
        next: END_予約センター案内  # 受診=予約関連 → 弾く
      - match: "other"             # 不明/NO_RESULT は相談室業務寄りに倒す（弾かない）
        next: 相談室転送

  # --- 患者氏名確認（入院/外来 担当者特定可 — インライン hearing）---
  # PATCH_BOX(亀田_flat.md) 指定の 1フロー型フラットを維持するため、Dr.JOY 標準の magic field
  # patientName（サブフロー必須）は使わず、伝言用の中立フィールド contactName(氏名) に保存する。
  - step: 患者氏名確認
    type: hearing
    output_format: text
    save_to: contactName
    echo_back: false
    next: 担当者名聴取
    retry_failure: skip            # 聞き取れなくても折返し受付へ進む

  # --- 担当者名聴取（context記録のみ・個別取次なし）---
  - step: 担当者名聴取
    type: hearing
    output_format: text
    save_to: staffName
    echo_back: false
    next: 折返し_用件内容
    retry_failure: skip

  # --- 折返し_氏名（catch-all 入口の氏名聴取）---
  # 患者氏名確認 と同様、magic field patientName は使わず中立フィールド contactName(氏名) に保存。
  - step: 折返し_氏名
    type: hearing
    output_format: text
    save_to: contactName
    echo_back: false
    next: 折返し_用件内容
    retry_failure: skip

  # --- 折返し_用件内容（伝言・自由発話）---
  - step: 折返し_用件内容
    type: hearing
    output_format: text
    save_to: reason
    echo_back: false
    next: 折返し_連絡先電話番号
    retry_failure: skip

  # --- 折返し_連絡先電話番号（復唱あり）---
  - step: 折返し_連絡先電話番号
    type: hearing
    output_format: text
    save_to: additionalPhoneNumber
    echo_back: true
    next: END_折返し受付
    retry_failure: end_failure     # 連絡先が取れなければ折返し不可 → 聴取失敗終話

  # --- 定型案内（コンテンツ未受領→プロパティ placeholder, TODO）---
  - step: 定型案内
    type: announcement
    next: END_定型案内

  # --- 転送（call_transfer・方式/実番号はプロパティ/TODO）---
  - step: 相談室転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "申し訳ございません。ただいまおつなぎできませんでした。恐れ入りますが、改めておかけ直しください。お電話ありがとうございました。"
    # 転送先=相談室内線 7177。実番号・転送方式(内線A/050外線B)はプロパティで設定（TODO）

  - step: 大代表転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "申し訳ございません。ただいまおつなぎできませんでした。恐れ入りますが、改めておかけ直しください。お電話ありがとうございました。"
    # 転送先=大代表 04-7092-2211（誤着信扱い）。実番号・転送方式はプロパティで設定（TODO）

  # --- 終話ブロック ---
  - step: END_折返し受付
    type: termination
    termination_ref: "END_折返し受付"

  - step: END_予約センター案内
    type: termination
    termination_ref: "END_予約センター案内"

  - step: END_定型案内
    type: termination
    termination_ref: "END_定型案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
