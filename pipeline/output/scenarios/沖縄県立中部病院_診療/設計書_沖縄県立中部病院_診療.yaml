# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2 function の endpoint / smsFlag はGen3 の saveContextModel2DB に含めない。endpoint（冒頭切断／時間外／電話転送／電話案内／途中切断／通話完了）は Dr.JOY 側で通話ログから判別、smsFlag は各 saveCompletionFlag2db のパラメータで制御"
  - "Gen2 status 値マッピング（customer docs 3.1）：0=冒頭切断/途中切断（Gen3 使用禁止、Dr.JOY 側判別）／1=通話完了（全 4 正常終話）／2=聴取失敗（無効回答・復唱後否定統合）／7=取り直し受付不可／8=非通知拒否／9=通院中以外受付不可。6=時間外 は Gen3 標準追加"
  - "Gen2 smsFlag 値マッピング（customer docs 3.2）：0=SMS送信なし（全異常系・代表案内系）／1=再診予約の変更／2=予約日の確認／3=予約のキャンセル／4=予約の取り直し → Gen3 では 取り直しは 再診予約の変更 に合流するため smsFlag=1（migration notes director 判断、smsFlag=4 は未使用）"
  - "Gen2 施設固有ルール『肺→はい』『PHがいます→いいえ』『PD→いいえ』：Yes/No 判定時のみ適用（通院確認／キャンセル時案内／前回の予約日）。各 generate_by_OpenAI プロンプトに施設固有肯定/否定救済として明記（prompter 担当）"
  - "Gen2 施設固有ルール『社長は→昭和』『修正→平成』：生年月日聴取時のみ適用。生年月日聴取サブフローの OpenAI プロンプトに限定的に記載（prompter 担当）"
  - "Gen2 施設固有ルール『数字4/5/9/0 誤認識救済』：4=しー/C/Sea/よー、5=いつ/Go、9=Q/きゅー、0=れい/まる/おー。電話番号・診察券番号の STT 認識時に prompt 側で対処（prompter 担当）。※発話時は標準読みのみ使用（customer docs 1-7）"
  - "Gen2 施設固有ルール『氏名＝カタカナ強制変換』：全角カタカナのみで記録。氏名復唱・再読み上げは絶対禁止（customer docs 10章）。氏名聴取サブフロー内部の OpenAI プロンプトに明記（prompter 担当）"
  - "Gen2 施設固有ルール『一度聴取した内容は再度聞き直さない』（customer docs 1章）／『一度に複数情報が来た場合：既出情報は復唱・確認しない』（customer docs 3章）：全 generate_by_OpenAI プロンプトに共通ルールとして反映（prompter 担当）"
  - "Gen2 施設固有ルール『復唱可能な項目は生年月日・連絡先電話番号のみ』（customer docs 4章）：氏名・診察券番号・診療科・用件・都合悪い日・理由・キャンセル時案内・前回の予約日・その他共有事項・確認事項・FAQ確認 は復唱禁止。各 hearing_items の echo_back=false 厳守"
  - "代表電話番号 098-973-4111 は 聴取失敗 TTS で3回繰り返し発話（customer docs 1-8『<speak type=\"telephone\">』タグ要件は Gen3 では tts_g 形式で自然読みに統一）。SSML タグは Gen3 では使用禁止（CLAUDE.md）"
  - "診療科は customer docs 2-1 の30科+「登録なし」。Gen2 では『呼吸器内科／呼吸器外科』等の曖昧発話時に『どちらでしょうか？』レコメンド再質問していたが、Gen3 では OpenAI プロンプト + profile_words で1ショット処理し、確定不能なら『登録なし』格納（挙動差異は confirmation_items N-6）"
  - "Gen2 『予約のキャンセル→次回予約希望あり→再診予約の変更へ合流』ルートの classification 書き換えは Gen3 では実装せず、cancelFollowup フィールドで別途管理。Dr.JOY 側で classification+cancelFollowup の組合せ判定で運用（confirmation_items N-7）"
  - "Gen2 『予約の取り直し→3か月判定』は script ブロック（custom テンプレ）で実装。customer docs 7章『月単位での差分判定』準拠。scaffold はプレースホルダ script を生成するため、人間が3か月判定ロジックを手動で実装する必要あり（confirmation_items N-1）"
  - "Gen2 『予約で過去日付は今日より未来のみ受け付ける』（customer docs 1-4）：予約希望日_変更 の OpenAI プロンプトに明記（prompter 担当）。ただし本設計書では output_format=text のため厳密適用は Dr.JOY 側となる"
  - "Gen2 『もしもし』単独発話時『お声は届いております』と返して質問再掲（customer docs 記載なしだが一般的な施設ルール）：Gen3 では STT 側の単語単独低スコア reject or 共通プロンプトルールで対応（prompter 判断）"
  - "FAQ（question フィールド）は Gen2 function required だが yaml に聴取箱が無いため実装上スキップ（rag_subflow: none）。question は空文字のまま終話。Dr.JOY 側で該当列を非表示推奨"
  - "TTS プロンプトは `{tts_g:...}`（全小文字）形式をデフォルトとする。SSML タグ（<speak>, <break>, <say-as> 等）は使用禁止（CLAUDE.md）。電話番号・診察券番号の復唱はサブフロー内部の標準復唱モジュールで処理（メインフロー側では SSML を記述しない）"
  - "非通知着信（anonymous/unknown/空白）は opening の incoming-classifier で即 END_非通知 に弾く。customer docs の非通知拒否アナウンスは『お電話ありがとうございます。沖縄県立中部病院の予約専用AI電話です。恐れ入りますが…』と施設名含むため tts_modules で上書き"
  - "電話番号聴取サブフロー：Gen2 は『着信番号確認Y/N先置→否定時のみ手入力』を全着信種別共通で実施するが、標準サブフローは『携帯着信のみ着信番号確認、固定/その他は直接手入力』構造。Gen3 では標準サブフローをコピーして挙動差異として受容（confirmation_items N-3）"
  - "電話番号聴取サブフロー：Gen2 は『060 プレフィックスも携帯扱い』だが、標準サブフローは 070/080/090 のみ携帯判定。060 は固定扱いになる（confirmation_items N-2）"
  - "通院確認は outpatientStatus フィールド（TEXT）に肯定/否定を保存。否定時は END_通院中以外受付不可 に遷移するため、通常フロー完了時の outpatientStatus 値は常に『肯定』。Dr.JOY 側での非表示推奨（保守情報用途）"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID — Dr.JOY管理画面で確認）"
    resolved: false
    blocker: false
    notes: "Dr.JOY 側で設定。フローJSONには含めない。customer docs 末尾の【本番】Admin URL（officeId=5eecd4072c9faeddaddbeef8）から特定可能"

  - item: "(N-1) 取り直し可否判定 script の 3か月判定ロジック実装"
    resolved: false
    blocker: true
    notes: "scaffold は custom script のプレースホルダを生成するのみ。人間（または fixer）が Brekeke IVR UI で以下の JS を手動実装する必要あり：`const prev = getModuleResult('前回の予約日'); const today = new Date(); const threeMonthsAgo = new Date(today.getFullYear(), today.getMonth() - 3, today.getDate()); // prev を Date.parse 可能な形式に正規化 → 比較 / 不可能な場合は default=3か月以内扱い`。customer docs 7章の『月単位での差分判定』準拠"

  - item: "(N-2) 電話番号聴取サブフロー：060 プレフィックスの携帯判定"
    resolved: false
    blocker: false
    notes: "Gen2 は 070/080/090/060 を携帯判定、標準サブフロー（samples/json/電話番号聴取_復唱あり.json）は 070/080/090 のみ。060 着信は固定扱いとなり phonetype=その他 が保存される。ビジネス要件として 060 を携帯扱いする場合は subflow JSON 修正 or customer から仕様承認要（挙動差異として受容する場合は本項目 resolved=true）"

  - item: "(N-3) 電話番号聴取サブフロー：固定着信時の着信番号確認Y/N の有無"
    resolved: false
    blocker: false
    notes: "Gen2 は 携帯/固定共通で『今おかけいただいている番号でよろしいでしょうか』を先に聴取。標準サブフローは携帯着信のみ着信番号確認、固定着信は直接手入力。挙動差異あり。ビジネス要件で Gen2 踏襲が必須なら subflow JSON 修正要"

  - item: "(N-4) 営業時間スケジュール（acceptance_times の business_hours 詳細）"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトには AI電話受付時間の明示記載なし（代表電話の受付時間は『月〜金 8:30〜17:00』と記載）。AI電話自体は 24時間 or 限定時間 どちらで運用するか顧客確認要。Dr.JOY 管理画面で設定"

  - item: "(N-5) 稼働休止期間（年末年始等）"
    resolved: false
    blocker: false
    notes: "customer docs『土日祝・年末年始』記載あり（代表電話受付時間の文脈）。AI電話も同様の休止期間を設けるか要確認。Dr.JOY 管理画面から設定"

  - item: "(N-6) 診療科の曖昧入力時の挙動差異"
    resolved: false
    blocker: false
    notes: "Gen2 では呼吸器内科／呼吸器外科、神経内科／脳神経外科 等のレコメンド再質問で確定していた可能性（customer docs 明示なしだが profile_words の類義語設計から推察）。Gen3 では OpenAI プロンプト + profile_words で1ショット処理し、確定不能なら『登録なし』格納。ユーザー体験差異を顧客確認要"

  - item: "(N-7) 『予約のキャンセル→次回予約希望あり→再診予約の変更合流』時の classification 書き換え"
    resolved: false
    blocker: false
    notes: "Gen2 仕様では classification を『予約のキャンセル』→『再診予約の変更』に書き換えていた。Gen3 では classification は書き換えず cancelFollowup（次回予約希望あり/なし）を別フィールドで保存。Dr.JOY 側で classification+cancelFollowup の組合せ判定が必要。運用上の影響を顧客確認要"

  - item: "(N-8) 診察券番号の復唱有無"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトには <speak type=\"digits\"> による復唱が明記されているが、Gen3 標準の 診察券番号聴取 サブフロー（samples/json/診察券番号聴取.json）は復唱なし構成。復唱を維持する場合は 診察券番号聴取_復唱あり 版の有無を確認 or サブフロー修正が必要。customer docs 4章では診察券番号は『復唱禁止』明記のため標準挙動（復唱なし）と整合"

  - item: "(N-9) SMS配信文面（Dr.JOY側）"
    resolved: false
    blocker: false
    notes: "フロー側は smsFlag=1/2/3 のいずれかを立てるのみ。実際のSMS本文（用件別3パターン）は Dr.JOY 管理画面から設定。smsFlag=1 再診予約の変更／smsFlag=2 予約日の確認／smsFlag=3 予約のキャンセル"

  - item: "(N-10) 認証設定（優先順位）"
    resolved: false
    blocker: false
    notes: "診察券番号・氏名・生年月日・連絡先電話番号の認証優先順位は Dr.JOY 管理画面で設定。フローJSONには含めない"

  - item: "(N-11) 時間外アナウンスの採用"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトに時間外アナウンスの記載なし。本設計書は Gen3 標準の時間外 TTS（施設名差し替え版）を採用。customer から『時間外は完全無応答』等の別要件がある場合は use_acceptance_times=false 化 or TTS 差し替えが必要"

  - item: "(N-12) status 値の Gen2→Gen3 マッピング"
    resolved: false
    blocker: false
    notes: "Gen2 status=0（冒頭切断/途中切断）は Gen3 使用禁止のため、本設計書の終話パターンには出現せず。途中切断時の Dr.JOY 画面挙動（ステータス空欄 or 『0』未セット）は Dr.JOY 側の実装に依存。customer 確認要"

  - item: "(N-13) FAQ（question フィールド）の扱い"
    resolved: false
    blocker: false
    notes: "Gen2 function required だが yaml に聴取箱無し（実装上スキップ）。question は空文字のまま終話する設計。Dr.JOY 画面での該当列表示は非表示推奨。customer が FAQ 運用を希望する場合は rag_subflow: 1 への変更要"
