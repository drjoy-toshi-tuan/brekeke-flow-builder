# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "沖縄県立中部病院$診療"
      role: "main"
      description: "冒頭 → 通院確認(Y/N) → 本人確認 → 個人情報聴取サブフロー4連(診察券番号/氏名/生年月日/電話番号) → 診療科 → 用件確認(4択) → 用件別聴取ルート → 用件別終話"
  subflows:
    - name: "沖縄県立中部病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/診察券番号聴取.json を完全コピー。「わからない／わかりません／持っていない／持っていません」→「不明／手元に無し」格納の分岐はサブフロー内部で対応。Gen2 の<speak type=\"digits\">復唱は標準サブフロー仕様に従う（復唱なし構成。顧客確認事項 N-8 参照）"
    - name: "沖縄県立中部病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/氏名聴取.json を完全コピー。カタカナ強制変換・氏名復唱禁止ルール（customer docs 10章）は OpenAI プロンプトに明記（prompter 担当）。再聴取上限到達で patientName ブランク保存は標準サブフロー挙動"
    - name: "沖縄県立中部病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/生年月日聴取_復唱あり.json を完全コピー。復唱あり（customer docs 4章 復唱可能項目）。施設固有ルール『社長は→昭和／修正→平成』救済は OpenAI プロンプトで対応（prompter 担当）"
    - name: "沖縄県立中部病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/電話番号聴取_復唱あり.json を完全コピー。incoming-classifier + Phone Normalization + 携帯/固定判別内蔵。phonetype を保存。⚠️ Gen2 固有仕様との差異2点: ①060プレフィックス（Gen2=携帯、標準サブフロー=固定扱い） ②固定着信でも着信番号確認Y/Nを先に実施（Gen2仕様、標準サブフローは固定着信は直接手入力）。挙動差異は顧客確認事項 N-2/N-3 参照"

# --- セクション3: フローの目的 ---
purpose: "沖縄県立中部病院の再診患者からの予約関連電話を自動受付する。着信電話番号種別判定（非通知拒否）、通院確認、個人情報聴取（本人確認・診察券番号・氏名・生年月日・連絡先電話番号・診療科）、用件聴取（再診予約の変更／予約日の確認／予約のキャンセル／予約の取り直しの4択）を順に実施し、用件別の聴取内容を Dr.JOY に保存して折り返し対応する。『予約のキャンセル』は次回予約希望の有無で分岐し、希望ありは『予約変更』合流ルートへ誘導。『予約の取り直し』は前回予約日が3か月以上前の場合は受付不可で終話。聴取失敗時は代表電話番号（098-973-4111）を3回繰り返し案内して切断。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "沖縄県立中部病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → END_非通知(status=8, smsFlag=0) → 切断
              └─ 通常/携帯/固定 → 受付時間判定(acceptance_times)
                    ├─ 時間外 → END_時間外(status=6, smsFlag=0) → 切断
                    └─ 受付可 → 冒頭_アナウンス(TTS, 入力待ちなしで通院確認へ直結)
                          → 通院確認 (hearing, enum, 肯定/否定)
                              ├─ 否定 → END_通院中以外受付不可(status=9, smsFlag=0) → 切断
                              └─ 肯定 → 本人確認 (hearing, text, save_to=relationship)
                                    → 診察券番号聴取 (subflow)
                                      → 氏名聴取 (subflow)
                                        → 生年月日聴取 (subflow, 復唱あり)
                                          → 電話番号聴取 (subflow, 復唱あり)
                                            → 診療科 (hearing, enum, no_result_default=登録なし)
                                              → 用件確認 (hearing, enum, DTMF+voice, 4択)
                                                ├─ 再診予約の変更 → 現在の予約日_変更(text) → 理由_変更(text) → 予約希望日_変更(text) → 都合悪い日(text) → その他共有事項(text) → END_再診予約の変更(status=1, smsFlag=1) → 切断
                                                ├─ 予約日の確認 → 確認事項(text) → END_予約日の確認(status=1, smsFlag=2) → 切断
                                                ├─ 予約のキャンセル → 理由_キャンセル(text) → 現在の予約日_キャンセル(text) → キャンセル時案内(hearing, enum, DTMF 1=次回希望あり / 2=次回希望なし)
                                                │     ├─ 次回予約希望なし → END_予約のキャンセル(status=1, smsFlag=3) → 切断
                                                │     └─ 次回予約希望あり(cancelFollowup保存) → 予約希望日_変更(合流) → 都合悪い日 → その他共有事項 → END_再診予約の変更 → 切断
                                                └─ 予約の取り直し → 前回の予約日(text, save_to=previousReservationDate) → 取り直し可否判定(script, custom, 3か月差分判定)
                                                      ├─ 3か月以上前 → END_取り直し受付不可(status=7, smsFlag=0) → 切断
                                                      └─ default(3か月以内/フリーワード) → 予約希望日_変更(合流) → 都合悪い日 → その他共有事項 → END_再診予約の変更 → 切断

      リトライ上限到達(全聴取項目) → END_聴取失敗(status=2, smsFlag=0) → 切断
    notes: |
      - 冒頭アナウンスは入力待ちなしで通院確認へ直結（Gen2 「通常の冒頭アナウンス」→「通院確認」踏襲）
      - 非通知着信は Gen3 標準どおり opening で END_非通知 に弾く。Gen2 固有テキスト（「沖縄県立中部病院の予約専用AI電話です。恐れ入りますが、非通知でのお電話は…」）を tts_modules で上書き
      - 通院確認（Pattern A Yes/No 直接分岐）は全通話の最前段で必ず通過。No→status=9 で即終話
      - 個人情報聴取サブフロー順序は customer docs 指定通り：診察券番号 → 氏名 → 生年月日 → 連絡先電話番号（本人確認は 通院確認直後に hearing で実施）
      - 電話番号聴取サブフロー内で incoming-classifier + Phone Normalization + 復唱確認（phonetype 保存）を実施。Gen2 仕様の「着信番号確認Y/N先置」と060=携帯ルールは標準サブフローと挙動差異あり（confirmation_items N-2/N-3）
      - 診療科は customer docs 30科+「登録なし」。no_result_default="登録なし"。customer docs 6章「フリーワード扱い再聴取なし」と yaml「リトライ上限2＋復唱確認」の矛盾は yaml を優先（migration notes director 判断）
      - 用件確認は DTMF+音声 4択。再診予約の変更／予約日の確認／予約のキャンセル／予約の取り直し
      - 予約のキャンセルの「次回予約希望あり」ルートでは classification 書き換えを行わず cancelFollowup 別フィールドに保存（後続分析は Dr.JOY 側で classification+cancelFollowup の組合せで判定）
      - 予約の取り直しの 3か月判定は script ブロック（custom テンプレ）で実装。前回の予約日フィールドには生回答（フリーワード）を保存、script が Previous_reservationDate を参照して 3か月前判定（Date of Call Classifier は使用しない、migration notes 判断）
      - 聴取失敗 TTS は customer docs そのまま転記（代表電話番号 098-973-4111 を3回繰り返し発話）。END_無効回答による聴取失敗 と END_復唱後否定の再聴取失敗 は同一文言・同一 status=2 のため END_聴取失敗 に統合
      - FAQ（question フィールド）は function には含まれるが yaml に聴取箱がないため実装上スキップ（rag_subflow: none。migration notes 判断）
      - Gen2 status=0（冒頭切断/途中切断）は Gen3 で使用禁止。途中切断は Dr.JOY 側で通話ログから判別する前提

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 通院確認

  # --- 通院確認（Pattern A: Yes/No 直接分岐）---
  - step: 通院確認
    type: hearing
    output_format: enum
    conditions:
      - match: "肯定"
        next: 本人確認
      - match: "否定"
        next: END_通院中以外受付不可

  # --- 本人確認（relationship フリーテキスト）---
  - step: 本人確認
    type: hearing
    output_format: text
    next: 診察券番号聴取

  # --- 個人情報聴取サブフロー（4連: 診察券番号 → 氏名 → 生年月日 → 電話番号）---
  - step: 診察券番号聴取
    type: subflow
    flowname: "沖縄県立中部病院$診察券番号聴取"
    next: 氏名聴取

  - step: 氏名聴取
    type: subflow
    flowname: "沖縄県立中部病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "沖縄県立中部病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "沖縄県立中部病院$電話番号聴取"
    next: 診療科

  # --- 診療科（enum, no_result_default=登録なし）---
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 用件確認

  # --- 用件確認（Pattern A: 4択 enum 直接分岐）---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "再診予約の変更"
        next: 現在の予約日_変更
      - match: "予約日の確認"
        next: 確認事項
      - match: "予約のキャンセル"
        next: 理由_キャンセル
      - match: "予約の取り直し"
        next: 前回の予約日
      - match: "default"
        next: 現在の予約日_変更

  # --- 再診予約の変更ルート ---
  - step: 現在の予約日_変更
    type: hearing
    output_format: text
    next: 理由_変更

  - step: 理由_変更
    type: hearing
    output_format: text
    next: 予約希望日_変更

  - step: 予約希望日_変更
    type: hearing
    output_format: text
    next: 都合悪い日

  - step: 都合悪い日
    type: hearing
    output_format: text
    next: その他共有事項

  - step: その他共有事項
    type: hearing
    output_format: text
    next: END_再診予約の変更

  # --- 予約日の確認ルート ---
  - step: 確認事項
    type: hearing
    output_format: text
    next: END_予約日の確認

  # --- 予約のキャンセルルート ---
  - step: 理由_キャンセル
    type: hearing
    output_format: text
    next: 現在の予約日_キャンセル

  - step: 現在の予約日_キャンセル
    type: hearing
    output_format: text
    next: キャンセル時案内

  - step: キャンセル時案内
    type: hearing
    output_format: enum
    conditions:
      - match: "次回予約希望あり"
        next: 予約希望日_変更
      - match: "次回予約希望なし"
        next: END_予約のキャンセル
      - match: "default"
        next: END_予約のキャンセル

  # --- 予約の取り直しルート ---
  - step: 前回の予約日
    type: hearing
    output_format: text
    next: 取り直し可否判定

  - step: 取り直し可否判定
    type: script
    script_template: custom
    reference_module: "前回の予約日"
    template_params:
      logic: "前回の予約日(previousReservationDate)と {TODAY} の月差を計算。Yes/はい/3か月以内/本日-3か月以内のdate = 3か月以内（default）。No/いいえ/3か月以上前/本日-3か月超過のdate = 3か月以上前。フリーワード非date = 3か月以内（default）扱い。customer docs 7章『月単位での差分判定』準拠。"
    conditions:
      - match: "3か月以上前"
        next: END_取り直し受付不可
      - match: "default"
        next: 予約希望日_変更

  # --- 終話ブロック ---
  - step: END_再診予約の変更
    type: termination
    termination_ref: "END_再診予約の変更"

  - step: END_予約日の確認
    type: termination
    termination_ref: "END_予約日の確認"

  - step: END_予約のキャンセル
    type: termination
    termination_ref: "END_予約のキャンセル"

  - step: END_取り直し受付不可
    type: termination
    termination_ref: "END_取り直し受付不可"

  - step: END_通院中以外受付不可
    type: termination
    termination_ref: "END_通院中以外受付不可"

