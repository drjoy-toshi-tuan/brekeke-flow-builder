    announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話番号へおかけなおしください。 受付時間は土曜、日曜、祝日、年末年始を除く、月曜日から金曜日の8時30分から17時です。お電話番号をご案内いたしますのでメモをご準備ください。代表電話番号は、098-973-4111です。繰り返します。098-973-4111です。繰り返します。098-973-4111です。それでは失礼いたします。"

