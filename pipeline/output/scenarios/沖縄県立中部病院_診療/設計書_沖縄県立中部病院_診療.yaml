  business_hours: "TODO_要確認（Gen2 プロンプト本文に AI電話受付時間の明示記載なし。代表電話の受付時間は「月〜金 8:30〜17:00、土日祝・年末年始除く」と記載されているが AI電話はこれに限定されない可能性あり。Dr.JOY 側で 24時間 or 平日9-17時 等を仮設定）"
