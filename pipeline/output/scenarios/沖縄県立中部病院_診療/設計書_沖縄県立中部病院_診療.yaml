    notes: "変更／キャンセル次回希望あり／取り直し合流ルート共通。フリーテキスト。customer docs 1-4『過去日付は今日より未来のみ受け付ける』ルールは OpenAI プロンプトに明記可（フリーテキスト保存のため厳密適用は Dr.JOY 側）"

  - order: 8
