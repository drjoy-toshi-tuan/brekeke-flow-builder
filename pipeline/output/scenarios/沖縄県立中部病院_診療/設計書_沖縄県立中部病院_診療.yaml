    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "用件確認"
    tts_announcement: "ご用件を「再診予約の変更」、「予約日の確認」、「予約のキャンセル」、「予約の取り直し」の中からお選びください。それではどうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "再診予約の変更"
        - "予約日の確認"
        - "予約のキャンセル"
        - "予約の取り直し"
      mapping:
        - input: "DTMF 1 または 「1」「1番」「再診予約の変更」「予約の変更」「予約変更」「日時変更」「日程変更」「予約内容変更」「変更」「取り直したい（文脈で変更意図）」「変えたい」「変える」「変えて」「500」（薬文脈なし単独では判定困難だが AI補完で default 扱い）"
          output: "再診予約の変更"
        - input: "DTMF 2 または 「2」「2番」「確認」「予約日の確認」「予約確認」「日時確認」「集約の確認」（『集約』→『予約』誤認救済）"
          output: "予約日の確認"
        - input: "DTMF 3 または 「3」「3番」「キャンセル」「3キャンセル」「予約キャンセル」「予約のキャンセル」「やめる」「取り消し」「取消」「やめたい」「シャント0」（誤認救済）「キャンプ0」（誤認救済）"
          output: "予約のキャンセル"
        - input: "DTMF 4 または 「4」「4番」「予約の取り直し」「予約取り直し」「取り直し」「別の（予約）」"
          output: "予約の取り直し"
      no_result_condition: "いずれにも該当しない／DTMFなし・発話曖昧。Gen2 AI補完規則により default→再診予約の変更ルートへ"
    save_to: "classification"
    next_step: "(enum分岐) 再診予約の変更→現在の予約日_変更 / 予約日の確認→確認事項 / 予約のキャンセル→理由_キャンセル / 予約の取り直し→前回の予約日 / default→現在の予約日_変更"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "現在の予約日_変更"
    tts_announcement: "次に、現在の予約日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答・トピック外"
    save_to: "scheduledDate"
    next_step: "理由_変更"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "理由_変更"
    tts_announcement: "今回の変更の理由をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答・トピック外"
    save_to: "reason"
    next_step: "予約希望日_変更"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約希望日_変更"
    tts_announcement: "次に、ご変更したい予約希望日をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答・トピック外"
    save_to: "preferredDate"
    next_step: "都合悪い日"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "都合悪い日"
    tts_announcement: "予約日に関して、ご来院ができないお日にちがあればお話しください。 ない場合は、「ないです」とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「ない」「ないです」「ありません」「どの日でも大丈夫」等"
          output: "特に無し"
        - input: "日付/日程の回答"
          output: "ユーザー回答をそのまま格納（可能な限りYYYY/MM/DD形式）"
      no_result_condition: "無応答・トピック外"
    save_to: "unavailableDate"
    next_step: "その他共有事項"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "その他共有事項"
    tts_announcement: "その他、「お薬が足りない」など、事前にお伝えしたいことがあればお話しください。なければ「ありません」とお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「ありません」「ない」「大丈夫」「ないでう」等"
          output: "特に無し"
        - input: "その他フリーワード"
          output: "ユーザー回答をそのまま格納"
      no_result_condition: "無応答"
    save_to: "details"
    next_step: "END_再診予約の変更"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "確認事項"
    tts_announcement: "ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」など、内容を簡潔にお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答"
    save_to: "inquiry"
    next_step: "END_予約日の確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "理由_キャンセル"
    tts_announcement: "今回のキャンセルの理由をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答"
    save_to: "reason"
    next_step: "現在の予約日_キャンセル"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "現在の予約日_キャンセル"
    tts_announcement: "次に、現在の予約日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答"
    save_to: "scheduledDate"
    next_step: "キャンセル時案内"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "キャンセル時案内"
    tts_announcement: "予約をキャンセルされた場合、次回のご予約時に紹介状が必要となります。再度受診する予定がある方は、予約キャンセルではなく予約変更をおすすめいたします。予約変更をご希望の方は1を、完全キャンセルをご希望の方は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "次回予約希望あり"
        - "次回予約希望なし"
      mapping:
        - input: "DTMF 1 または 「はい」「決まっています」「決まってます」「次回の予約をお願いします」等の『決まっています』を示す表現 ／ 施設固有救済『肺』"
          output: "次回予約希望あり"
        - input: "DTMF 2 または 「いいえ」「いえ」「決まってません」「決まってない」「いいえ決まっていない」「まだ決まっていません」「わからない」「わかりません」等の『まだ決まっていません』を示す表現 ／ 施設固有救済『PH がいます』『PD』"
          output: "次回予約希望なし"
      no_result_condition: "上記いずれにも該当しない／無応答。Gen2 default→次回予約希望なし（END_予約のキャンセル）扱い"
    save_to: "cancelFollowup"
    next_step: "(enum分岐) 次回予約希望あり→予約希望日_変更（合流）／ 次回予約希望なし→END_予約のキャンセル / default→END_予約のキャンセル"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "前回の予約日"
    tts_announcement: "前回の予約日は、本日から3か月以内の予約日でしょうか？「はい、そうです」「いいえ、違います」のようにお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「はい」「はい、そうです」「そうです」等の肯定表現 ／ 施設固有救済『肺』"
          output: "ユーザー回答をそのままフリーテキスト格納（後続 script で『3か月以内』判定）"
        - input: "「いいえ」「いいえ、違います」「違います」等の否定表現 ／ 施設固有救済『PH がいます』『PD』"
          output: "ユーザー回答をそのままフリーテキスト格納（後続 script で『3か月以上前』判定）"
        - input: "date/日付表現（例: 2025年1月15日、去年の12月）"
          output: "ユーザー回答をそのままフリーテキスト格納（後続 script で {TODAY} との月差判定）"
        - input: "その他フリーワード"
          output: "ユーザー回答をそのままフリーテキスト格納（後続 script で default=3か月以内扱い）"
      no_result_condition: "無応答・雑音・トピック外"
    save_to: "previousReservationDate"
    next_step: "取り直し可否判定"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "取り直し可否判定"
    tts_announcement: ""
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "3か月以内"
        - "3か月以上前"
      mapping:
        - input: "前回の予約日の回答が『はい／そうです』等の肯定 または {TODAY} から3か月以内の date 表現"
          output: "3か月以内"
        - input: "前回の予約日の回答が『いいえ／違います』等の否定 または {TODAY} から3か月以上前の date 表現"
          output: "3か月以上前"
        - input: "フリーワード非date（判定不能）"
          output: "3か月以内（default）"
      no_result_condition: "（script ブロックのため NO_RESULT 想定なし）"
    save_to: ""
    next_step: "(script分岐) 3か月以上前→END_取り直し受付不可 / default→予約希望日_変更"
    retry_failure: "skip"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 — 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信（anonymous/unknown/空白）"
    tts_announcement: "お電話ありがとうございます。沖縄県立中部病院の予約専用AI電話です。恐れ入りますが、非通知でのお電話は受け付けておりません。電話番号を通知して、おかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "8"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。沖縄県立中部病院の予約専用AI電話です。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達／復唱後否定の再聴取失敗（両系統を統合）"
    tts_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話番号へおかけなおしください。 受付時間は土曜、日曜、祝日、年末年始を除く、月曜日から金曜日の8時30分から17時です。お電話番号をご案内いたしますのでメモをご準備ください。代表電話番号は、098-973-4111です。繰り返します。098-973-4111です。繰り返します。098-973-4111です。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 代表案内系（customer docs 踏襲）---
  - name: "END_通院中以外受付不可"
    condition: "通院確認で否定判定"
    tts_announcement: "恐れ入りますが、こちらのお電話は「再診の予約」の方、専用となっております。現在、通院中以外の方は、受付できません。お電話ありがとうございました。それでは失礼いたします。"
    status: "9"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_通院中以外受付不可"

  - name: "END_取り直し受付不可"
    condition: "取り直し可否判定で『3か月以上前』判定"
    tts_announcement: "恐れ入りますが、前回の予約日が3か月以上前の場合、当院での予約は受け付けておりません。地域の医療機関や、かかりつけ医の受診をお願いいたします。それでは失礼いたします。"
    status: "7"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_取り直し受付不可"

  # --- 正常系（用件別）---
  - name: "END_再診予約の変更"
    condition: "再診予約の変更ルート完了（その他共有事項後）／予約のキャンセル次回希望あり合流ルート完了／予約の取り直し合流ルート完了"
    tts_announcement: "かしこまりました。内容を確認のうえ、3診療日以内にスタッフからご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_再診予約の変更"

  - name: "END_予約日の確認"
    condition: "予約日の確認ルート完了（確認事項後）"
    tts_announcement: "かしこまりました。内容を確認のうえ、3診療日以内に担当者よりSMSまたはお電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_予約日の確認"

  - name: "END_予約のキャンセル"
    condition: "予約のキャンセル次回希望なしルート完了（キャンセル時案内後）"
    tts_announcement: "かしこまりました。予約のキャンセルを承りました。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "3"
    completion_flag_name: "完了フラグ_予約のキャンセル"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["classification", "cancelFollowup"]
  patterns:
    - condition: "classification=再診予約の変更（通常ルート）／classification=予約のキャンセル かつ cancelFollowup=次回予約希望あり（合流）／classification=予約の取り直し かつ 3か月以内合流"
      sms_flag: "1"
      notes: "すべて END_再診予約の変更 に合流"
    - condition: "classification=予約日の確認"
      sms_flag: "2"
      notes: "END_予約日の確認"
    - condition: "classification=予約のキャンセル かつ cancelFollowup=次回予約希望なし"
      sms_flag: "3"
      notes: "END_予約のキャンセル"
    - condition: "非通知／時間外／聴取失敗／通院中以外受付不可／取り直し受付不可"
      sms_flag: "0"
      notes: "SMS送信なし"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  notes: "Gen2 customer docs 8章に FAQ確認のルール記載があるが、yaml には FAQ 確認箱が存在せず『実装上スキップ仕様』（migration notes director 判断）。question フィールドは function に required として残るが聴取なしで空文字のまま終話。Gen2→Gen3 デフォルトの RAG パターン3 は適用せず、元資料通り RAG なしで構成"

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内"
    announcement: "お電話ありがとうございます。沖縄県立中部病院の予約専用AI電話です。"

  - module_name: "通院確認"
    purpose: "通院確認（Y/N ゲート）"
    announcement: "現在、当病院に通院中ですか？「はい、通院中です」。「いいえ、通院中ではありません」、のようにお答えください。どうぞ。"

  - module_name: "本人確認"
    purpose: "本人/関係者確認"
    announcement: "現在お電話いただいている方についてお伺いします。受診されるご本人様の場合は『本人』とお答えください。ご本人様以外の場合は、お名前とご関係をお話しください。"

  - module_name: "診療科"
    purpose: "診療科聴取"
    announcement: "診療科をお話しください。わからない場合はわからないとお話しください。"

  - module_name: "用件確認"
    purpose: "用件4択聴取"
    announcement: "ご用件を「再診予約の変更」、「予約日の確認」、「予約のキャンセル」、「予約の取り直し」の中からお選びください。それではどうぞ。"

  - module_name: "現在の予約日_変更"
    purpose: "変更ルート: 現在の予約日聴取"
    announcement: "次に、現在の予約日をお話しください。"

  - module_name: "理由_変更"
    purpose: "変更ルート: 理由聴取"
    announcement: "今回の変更の理由をお話しください。どうぞ。"

  - module_name: "予約希望日_変更"
    purpose: "変更/キャンセル合流/取り直し合流: 予約希望日聴取"
    announcement: "次に、ご変更したい予約希望日をお話しください。どうぞ。"

  - module_name: "都合悪い日"
    purpose: "変更/キャンセル合流/取り直し合流: 都合悪い日聴取"
    announcement: "予約日に関して、ご来院ができないお日にちがあればお話しください。 ない場合は、「ないです」とお話しください。"

  - module_name: "その他共有事項"
    purpose: "変更/キャンセル合流/取り直し合流: その他共有事項聴取"
    announcement: "その他、「お薬が足りない」など、事前にお伝えしたいことがあればお話しください。なければ「ありません」とお話しください。どうぞ。"

  - module_name: "確認事項"
    purpose: "予約日の確認ルート: 確認内容聴取"
    announcement: "ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」など、内容を簡潔にお話しください。"

  - module_name: "理由_キャンセル"
    purpose: "キャンセルルート: 理由聴取"
    announcement: "今回のキャンセルの理由をお話しください。どうぞ。"

  - module_name: "現在の予約日_キャンセル"
    purpose: "キャンセルルート: 現在の予約日聴取"
    announcement: "次に、現在の予約日をお話しください。"

  - module_name: "キャンセル時案内"
    purpose: "キャンセル時: 次回予約希望の有無確認（DTMF 1/2）"
    announcement: "予約をキャンセルされた場合、次回のご予約時に紹介状が必要となります。再度受診する予定がある方は、予約キャンセルではなく予約変更をおすすめいたします。予約変更をご希望の方は1を、完全キャンセルをご希望の方は2を押してください。"

  - module_name: "前回の予約日"
    purpose: "予約の取り直しルート: 前回予約日聴取（3か月判定用）"
    announcement: "前回の予約日は、本日から3か月以内の予約日でしょうか？「はい、そうです」「いいえ、違います」のようにお答えください。"

  - module_name: "非通知_アナウンス"
    purpose: "非通知拒否終話"
    announcement: "お電話ありがとうございます。沖縄県立中部病院の予約専用AI電話です。恐れ入りますが、非通知でのお電話は受け付けておりません。電話番号を通知して、おかけ直しください。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "時間外_アナウンス"
    purpose: "時間外終話（Gen3 標準、customer docs 記載なし）"
    announcement: "お電話ありがとうございます。沖縄県立中部病院の予約専用AI電話です。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"

  - module_name: "聴取失敗_アナウンス"
