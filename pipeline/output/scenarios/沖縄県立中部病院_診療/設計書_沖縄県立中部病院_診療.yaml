    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "unavailableDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "customer docs『ない／ないです／ありません／どの日でも大丈夫』→『特に無し』格納。OpenAI プロンプトに明記"

  - order: 9
    name: "その他共有事項"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "フリーテキスト。『ありません／ない／大丈夫／ないでう』→『特に無し』格納"

  - order: 10
    name: "確認事項"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inquiry"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約日の確認ルートで聴取。フリーテキスト"

  - order: 11
    name: "理由_キャンセル"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "フリーテキスト。理由_変更 と同じ reason フィールドに保存（ルート分離のため両立可）"

  - order: 12
    name: "現在の予約日_キャンセル"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "scheduledDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約のキャンセルルートでの現在の予約日聴取。フリーテキスト。現在の予約日_変更 と同じ scheduledDate に保存"

  - order: 13
    name: "キャンセル時案内"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "cancelFollowup"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "次回予約希望あり"
      - "次回予約希望なし"
    notes: "DTMF 1=次回予約希望あり（予約変更合流）, 2=次回予約希望なし（キャンセル確定）。customer docs の類義語対応：『決まっています／次回の予約をお願いします』→次回希望あり、『決まってません／まだ決まっていません／わからない』→次回希望なし。施設固有肯定/否定救済（『肺→はい』『PH→いいえ』等）をOpenAIプロンプトに明記。⚠️ Gen2 仕様『次回希望あり時に classification を再診予約の変更に書き換え』は Gen3 では実装せず cancelFollowup フィールドで別途管理（confirmation_items N-7）"

  - order: 14
