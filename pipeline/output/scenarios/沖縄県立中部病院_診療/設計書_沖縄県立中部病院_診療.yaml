    save_to: "previousReservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約の取り直しルートで聴取。customer docs 7章『フリーワード扱い』に従い text 保存。Yes/いいえ/date/フリーワードすべて受理。3か月判定は後続の取り直し可否判定 script ブロックで実施"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。沖縄県立中部病院の予約専用AI電話です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "通院確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "通院確認"
    tts_announcement: "現在、当病院に通院中ですか？「はい、通院中です」。「いいえ、通院中ではありません」、のようにお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "肯定"
        - "否定"
      mapping:
        - input: "「はい」「はい、通院中です」「そうです」「はいそうです」「通院中」「通院中です」「通っている」「通っています」「つーいんちゅー」「つーいんつー」「通院通」「肺」（救済）等の肯定/通院中を意味する表現"
          output: "肯定"
        - input: "「いいえ」「いえ」「通院中じゃない」「じゃない」「通院中ではありません」「いいえ、通院中ではありません」「いや通院中じゃない」「通っていない」「初めてです」「PH がいます」（救済）「PD」（救済）等の否定/通院中でないを意味する表現"
          output: "否定"
      no_result_condition: "肯定/否定のいずれにも該当しない、無関係、理解不能、トピック外、雑音"
    save_to: "outpatientStatus"
    next_step: "(enum分岐) 肯定→本人確認 / 否定→END_通院中以外受付不可"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "本人確認"
    tts_announcement: "現在お電話いただいている方についてお伺いします。受診されるご本人様の場合は『本人』とお答えください。ご本人様以外の場合は、お名前とご関係をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「本人」「本人です」「私本人」等の本人宣言"
          output: "本人（フリーテキストとして格納）"
        - input: "お名前+ご関係（例：田中花子／息子／娘／妻／夫／配偶者）"
          output: "ユーザー回答をそのままフリーテキスト格納"
      no_result_condition: "無関係、理解不能、トピック外、雑音"
    save_to: "relationship"
    next_step: "診察券番号聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "診療科"
    tts_announcement: "診療科をお話しください。わからない場合はわからないとお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "総合内科"
        - "循環器内科"
        - "腫瘍・血液内科"
        - "消化器内科"
        - "腎臓内科"
        - "感染症内科"
        - "呼吸器内科"
        - "神経内科"
        - "リウマチ・膠原病科"
        - "外科"
        - "小児外科"
        - "乳腺外科"
        - "心臓血管外科"
        - "脳神経外科"
        - "整形外科"
        - "形成外科"
        - "耳鼻咽喉・頭頸部外科"
        - "泌尿器科"
        - "小児科"
        - "産婦人科"
        - "遺伝診療"
        - "新生児内科"
        - "歯科口腔外科"
        - "物忘れ精査外来"
        - "ジェンダー外来"
        - "放射線治療センター"
        - "緩和ケア"
        - "救急科"
        - "移植外来"
        - "精神科"
        - "登録なし"
      mapping:
        - input: "総内／総合／内科（単独）"
          output: "総合内科"
        - input: "循内／循環／循環器／心臓内科／不整脈外来／末梢血管外来"
          output: "循環器内科"
        - input: "血腫内／腫血内／血液内科／腫瘍内科／血液腫瘍内科"
          output: "腫瘍・血液内科"
        - input: "消内／消化／消化器／胃腸内科／肝臓内科／膵臓内科"
          output: "消化器内科"
