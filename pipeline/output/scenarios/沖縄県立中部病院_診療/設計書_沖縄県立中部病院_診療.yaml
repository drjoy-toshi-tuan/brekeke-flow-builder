# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "通院確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "outpatientStatus"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "肯定"
      - "否定"
    notes: "Yes/No 判定。肯定→本人確認／否定→END_通院中以外受付不可。施設固有救済（『肺→はい』『PH→いいえ』『PD→いいえ』）をOpenAIプロンプトに明記。save_to は通院確認のメタ情報として別フィールド outpatientStatus に格納（context_fields に追加）。Dr.JOY 側での通話履歴可視化用"

