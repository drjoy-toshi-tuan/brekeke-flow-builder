    notes: "DTMF 1=再診予約の変更, 2=予約日の確認, 3=予約のキャンセル, 4=予約の取り直し。customer docs 4章（用件: 固定発話） の類義語対応（「日程変更」→再診予約の変更、「予約確認」「集約の確認」→予約日の確認、「やめる」「取消」「シャント0」「キャンプ0」→予約のキャンセル、「取り直したい」「別の」→予約の取り直し等）を OpenAI プロンプトに明記。分類不能時は Gen2 AI補完規則により default→再診予約の変更ルートへフォールバック"

