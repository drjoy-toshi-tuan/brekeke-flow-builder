# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信（incoming-classifier=非通知）"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（acceptance_times 不使用のため通常到達せず — テンプレ保持）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "各聴取項目で連続3回リトライ失敗（電話番号以外）"
    tts_announcement: "大変申し訳ございません。ご回答が確認できませんでした。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系・特殊系 ---
  - name: "END_予約等"
    condition: "予約/変更/問い合わせの全聴取完了"
    tts_announcement: >
      担当者よりお電話またはショートメールでご連絡いたします。お電話の場合は、048-799-2211よりおかけいたします。
      なお、診療時間外のお問い合わせは翌診療日にご連絡いたします。お電話ありがとうございました。それでは失礼いたします。
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約等"

  - name: "END_キャンセル"
    condition: "キャンセルルートの全聴取完了"
    tts_announcement: "ご予約のキャンセルを承りました。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_聴取失敗_匿名"
    condition: "電話番号3回失敗 かつ 着信元が anonymous（非通知）"
    tts_announcement: "ご回答の確認ができませんでしたのでこちらからお電話失礼させていただきます。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_聴取失敗_匿名"

# smsFlag 分岐設計
sms_flag_routing:
  enabled: false                                 # 各終話の saveCompletionFlag2db で個別に sms_flag を設定（ContextMatchRouter 不要）
  routing_keys:
    - "classification"
  patterns:
    - condition: "classification ∈ {予約, 変更, 問い合わせ}"
      sms_flag: "1"
      notes: "END_予約等 — 予約/変更/問い合わせ完了"
    - condition: "classification = キャンセル"
      sms_flag: "2"
      notes: "END_キャンセル"
    - condition: "聴取失敗 / 匿名失敗"
      sms_flag: "0"
      notes: "END_聴取失敗 / END_聴取失敗_匿名"
    - condition: "非通知 / 時間外"
      sms_flag: "-1"
      notes: "END_非通知 / END_時間外（SMS送信なし）"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"                                # Gen2 末尾 yaml に RAG/FAQ 対応なし。問い合わせ内容はそのまま question に保存して終話
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # --- 冒頭 / 異常系 ---
  - module_name: "冒頭_アナウンス"
