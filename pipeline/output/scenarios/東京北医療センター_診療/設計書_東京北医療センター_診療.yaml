# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2 からの移管。Gen2 の status=0（冒頭切断/途中切断）は CLAUDE.md 規約に従い status=2 に置換。Gen2 の status=3（非通知）も Gen3 標準の status=2 に置換"
  - "Gen2 の checkpoint / checkout / endpoint フィールドは Gen3 では context_fields に含めない（Gen1/Gen2 固有概念、Gen3 相当なし）。smsFlag は saveCompletionFlag2db のパラメータに移行"
  - "Gen2 の DesiredreservationDate（PascalCase）は Gen3 命名規則に合わせ desiredReservationDate（camelCase）に統一"
  - "Gen2 プロンプト「用件を復唱した後、用件に応じて下記の分岐へと進む」「診療科については『○○ですね。』と復唱する」に従い、用件確認・診療科は echo_back=true とする。氏名・生年月日・電話番号・診察券番号の復唱制御はサブフロー固定仕様を踏襲（氏名は復唱禁止、生年月日/電話番号は復唱あり）"
  - "Gen2 プロンプト「確認内容聴取中は FAQ ルールやエラー回答を呼び出さず、記録係に徹する」ルールは OpenAI プロンプト側で明示する必要あり（@prompter への指示として step_details.retry_failure_announcement に記載）"
  - "小児科・産婦人科の予約不可ルールは用件によって挙動が変わる: 予約/予約変更→END_予約不可案内、キャンセル→通常のキャンセルフロー（予約日→キャンセル理由→END_通常完了）。これは ContextMatchRouter を 2 段（clinicalDepartment 判定 → classification 判定）で表現"
  - "紹介状確認は予約ルートのみで通過。変更・キャンセル・予約確認では聴取しない"
  - "予約センター電話番号 03-5963-3312 は予約不可案内・非通知アナウンス以外の「直前フロー再質問」用途（FAQ 非該当時の案内）では発話しない。Gen3 の本設計書では FAQ 処理は未実装のため本アナウンスはフロー内で発話されない"
  - "地域連携センター電話番号 03-5963-3421 は紹介状ありの終話アナウンスでのみ発話"
  - "用件確認の Gen2 特殊マッピング: 『薬』『お薬』『電気』『でんき』→『新規』扱い、『印刷』『定期』『新薬』『再診』『最新』『禁忌』→『診察』扱いは Gen2 音声認識精度向上のための補正。Gen3 でも OpenAI プロンプトで再現"
  - "診療科『げか』は Gen2 では単独で外科にマッピングされる。Gen3 でも同仕様（大分赤十字とは異なり、東京北では外科・乳腺外科・呼吸器外科・整形外科の4外科分岐ではない）"
  - "Re-confirmation TTS / OpenAI プロンプトは {tts_g:...}（全小文字）形式を使用。{TTS_AI:...}（大文字）は使用禁止"
  - "受付時間制御は Gen2 プロンプトに明示なし。use_acceptance_times: false で配置しない。Dr.JOY 側で受付時間外の着信を別ルートに振る場合は END_時間外 のアナウンスは未使用となる"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID — Dr.JOY管理画面で確認）"
    resolved: false
    blocker: false
    notes: "Dr.JOY 側で設定。フローJSONには含めない"

  - item: "受付用電話番号（ARS番号）"
    resolved: false
    blocker: false
    notes: "Dr.JOY/Brekeke 設定時に決定。設計書には記載しない"

  - item: "RAG/FAQ検索サブフローの採用可否（パターン3）"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトには FAQ ルールあり（FAQ 該当時は回答 → 直前フロー再質問、非該当時は予約センター案内 → 直前フロー再質問）。現状 pattern: none で RAG 非実装。顧客要望により pattern 3（問い合わせルート + 終話前）で導入する場合は @director で再設計が必要"

  - item: "営業時間・稼働曜日（acceptance_times の設定）"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトには明示なし。use_acceptance_times=false で配置していない。受付時間制御を Dr.JOY 側で行う想定。時間外アナウンスを自前で出したい場合は再設計が必要"

  - item: "smsFlag の phonetype 分岐ポリシー"
    resolved: false
    blocker: false
    notes: "Gen2 仕様踏襲で完了系 smsFlag=1 固定。固定電話への SMS 配信制御は Dr.JOY 側で phonetype を参照して判断する想定。フロー側で phonetype=その他 のとき smsFlag=-1 にするか要判断"

  - item: "SMS配信文面（Dr.JOY側設定）"
    resolved: false
    blocker: false
    notes: "Dr.JOY 管理画面から SMS 本文を設定。フロー側は smsFlag のみ制御"

  - item: "診療科の曖昧入力処理のユーザー体験テスト"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトの「当院に○○はございませんが、○○でしょうか？」再質問（近しい診療科レコメンド）は廃止。OpenAI プロンプト + profile_words + no_result_default='登録なし' で処理。挙動差異の顧客確認要"

  - item: "非通知・時間外・聴取失敗のTTS文言（施設固有化の要否）"
    resolved: false
    blocker: false
    notes: "非通知は Gen2 文言を採用。時間外・聴取失敗はテンプレートデフォルト文言。施設固有表現があれば差し替え"

  - item: "認証設定（生年月日・診察券番号・電話番号の優先順位）"
    resolved: false
    blocker: false
    notes: "Dr.JOY 側で設定。フローJSONには含めない"

  - item: "稼働休止期間（年末年始等）"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトには記載なし。Dr.JOY 管理画面から設定"
