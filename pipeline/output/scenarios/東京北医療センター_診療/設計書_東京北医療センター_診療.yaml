    item_default: true
    editable: true
    deletable: true
    notes: "自動格納"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "予約変更"
      - "キャンセル"
      - "予約確認"
    notes: "Gen2「確認した用件を復唱した後、用件に応じて下記の分岐へと進む」に従い echo_back=true。Gen2 プロンプトの置換ルール: 『印刷』『定期』『新薬』『再診』『最新』『禁忌』→『診察』、『薬』『お薬』→『予約』、『電気』『でんき』→『新規』（新規は classification では予約に吸収される想定）。『その他問い合わせ』は『予約確認』に分類（Gen2 明示ルール）"

  - order: 2
    name: "紹介状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
