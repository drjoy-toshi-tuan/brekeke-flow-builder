# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を次の4つの内からお話しください。「予約」、「予約変更」、「キャンセル」、「予約確認」。それではどうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約"
        - "予約変更"
        - "キャンセル"
        - "予約確認"
      mapping:
        - input: "「予約」を含む発話（ただし「予約変更」「予約確認」を除く）、「薬」「お薬」「新規」「電気」「でんき」を含む発話"
