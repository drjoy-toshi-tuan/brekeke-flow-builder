# 設計書: 東京北医療センター — 診療
# 生成元: @director エージェント (2026/04/17)
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/東京北医療センター_診療.md
# 確認レポート: docs/designs/確認レポート_東京北医療センター_診療_20260417.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "東京北医療センター"
  group_name: "東京北医療センター"
  flow_name: "東京北医療センター$診療"
  target_facility: "東京北医療センター"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"             # 受付用代表番号は 03-5963-3312 (予約センター) / 地域連携は 03-5963-3421
  business_hours: "TODO_要確認"           # Gen2 プロンプトに営業時間の明示なし。Dr.JOY 側で設定。acceptance_times は配置しない
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "東京北医療センター$診療"
      role: "main"
      description: "冒頭チェーン → 個人情報聴取サブフロー × 4 → 用件確認 → (予約/予約変更/キャンセル/予約確認) → 各用件別ルート → 用件別終話"
  subflows:
    - name: "東京北医療センター$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/氏名聴取.json を完全コピー。Gen2「〇〇様ですね」復唱は禁止の明文あり"
    - name: "東京北医療センター$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/生年月日聴取_復唱あり.json を完全コピー。和暦/西暦対応・DOB Re-confirmation 内蔵。Gen2 は DTMF 入力仕様"
    - name: "東京北医療センター$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/診察券番号聴取.json を完全コピー。「持っていない/わからない」分岐あり。DTMF 入力仕様・3桁以上の数字"
    - name: "東京北医療センター$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/電話番号聴取_復唱あり.json を完全コピー。incoming-classifier + Phone Normalization + 携帯/固定判別内蔵。phonetype を保存"

# --- セクション3: フローの目的 ---
purpose: "東京北医療センターの外来予約に関する問合せ（新規予約・予約変更・キャンセル・予約確認）を受け、個人情報（氏名・生年月日・診察券番号・連絡先電話番号）と用件を聴取してDr.JOYに保存し、折り返し受付を自動化する。紹介状をお持ちの場合は地域連携センター案内、小児科・産婦人科の予約/変更は予約センター案内で終話（ただしキャンセルは予約不可科でも受け付ける）。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "東京北医療センター$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS)
                    → jump_氏名聴取(サブフロー, 復唱なし)
                        → jump_生年月日聴取(サブフロー, 復唱あり)
                            → jump_診察券番号聴取(サブフロー, 復唱なし)
                                → jump_電話番号聴取(サブフロー, 復唱あり, phonetype保存)
                                    → 用件確認 (AmiVoice_STT, enum)
                                        ├─ 予約 → 紹介状確認
                                        │           ├─ あり → END_地域連携室案内(status=2, smsFlag=-1) → 切断
                                        │           └─ なし → 診療科
                                        ├─ 予約変更 → 診療科
                                        ├─ キャンセル → 診療科
                                        └─ 予約確認 → 確認内容 → END_通常完了(status=1, smsFlag=1) → 切断
                                    → 診療科 (AmiVoice_STT, enum, no_result_default=登録なし)
                                        → 予約不可判定 (ContextMatchRouter on clinicalDepartment)
                                            ├─ 小児科/産婦人科 → 予約不可用件判定 (ContextMatchRouter on classification)
                                            │                     ├─ キャンセル → 予約日
                                            │                     └─ default(予約/予約変更) → END_予約不可案内(status=2, smsFlag=-1) → 切断
                                            └─ その他診療科 → 用件別分岐 (ContextMatchRouter on classification)
                                                                ├─ 予約 → 症状聴取 → 予約希望時期 → END_通常完了
                                                                ├─ 予約変更 → 予約日
                                                                └─ キャンセル → 予約日
                                        → 予約日 (AmiVoice_STT, datetime)
                                            → 予約日後分岐 (ContextMatchRouter on classification)
                                                ├─ 予約変更 → 残薬確認 → 予約希望時期_変更 → 変更理由 → END_通常完了(status=1, smsFlag=1) → 切断
                                                └─ キャンセル → キャンセル理由 → END_通常完了(status=1, smsFlag=1) → 切断

      リトライ上限到達 → END_聴取失敗(status=3, smsFlag=-1) → 切断
    notes: |
      - Gen2 は個人情報（氏名→生年月日→診察券→連絡先）を先に聴取する構造。Gen3 も同順序を踏襲。
      - 用件確認後、予約ルートのみ紹介状確認を挟む。紹介状「あり」→ 地域連携センター(03-5963-3421) 案内で終話。
      - 診療科は用件に依らず 1 ブロックで聴取し、後段の ContextMatchRouter で分岐を表現（Pattern B）。
      - 小児科/産婦人科 × (予約/予約変更) は予約不可案内、小児科/産婦人科 × キャンセルは通常通り受け付け（Gen2 プロンプトの明示ルール）。
      - 予約日は変更/キャンセル共通で聴取し、その後の ContextMatchRouter で残薬確認ルート or キャンセル理由ルートに分岐。
      - Gen2 プロンプトに営業時間・時間外アナウンスの明示なし → use_acceptance_times: false で配置しない。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: jump_氏名聴取

  # --- 個人情報聴取サブフロー（4連：Gen2 の順序を踏襲）---
  - step: jump_氏名聴取
    type: subflow
    flowname: "東京北医療センター$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "東京北医療センター$生年月日聴取"
    next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "東京北医療センター$診察券番号聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "東京北医療センター$電話番号聴取"
    next: 用件確認

  # --- 用件確認（音声入力・enum）---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "予約"
        next: 紹介状確認
      - match: "予約変更"
        next: 診療科
      - match: "キャンセル"
        next: 診療科
      - match: "予約確認"
        next: 確認内容

  # --- 紹介状確認（予約ルートのみ）---
  - step: 紹介状確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: END_地域連携室案内
      - match: "なし"
        next: 診療科

  # --- 診療科（用件に依らず 1 ブロック）---
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 予約不可判定

  # --- 予約不可判定: 小児科/産婦人科の場合は用件別に分岐 ---
  - step: 予約不可判定
    type: context_match_router
    reference_module: "clinicalDepartment"
    conditions:
      - match: "小児科"
        next: 予約不可用件判定
      - match: "産婦人科"
        next: 予約不可用件判定
      - match: "default"
        next: 用件別分岐

  # --- 予約不可用件判定: キャンセルは通常通り進行、予約/予約変更は案内終話 ---
  - step: 予約不可用件判定
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "キャンセル"
        next: 予約日
      - match: "default"
        next: END_予約不可案内

  # --- 用件別分岐: 予約→症状聴取 / 予約変更→予約日 / キャンセル→予約日 ---
  - step: 用件別分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "予約"
        next: 症状聴取
      - match: "予約変更"
        next: 予約日
      - match: "キャンセル"
        next: 予約日

  # --- 予約ルート ---
  - step: 症状聴取
    type: hearing
    output_format: text
    next: 予約希望時期

  - step: 予約希望時期
    type: hearing
    output_format: text
    next: END_通常完了

  # --- 予約日（変更/キャンセル共通）---
  - step: 予約日
    type: hearing
    output_format: datetime
    next: 予約日後分岐

  # --- 予約日後分岐: 変更→残薬確認 / キャンセル→キャンセル理由 ---
  - step: 予約日後分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "予約変更"
        next: 残薬確認
      - match: "キャンセル"
        next: キャンセル理由

  # --- 変更ルート ---
  - step: 残薬確認
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 予約希望時期_変更

  - step: 予約希望時期_変更
    type: hearing
    output_format: text
    next: 変更理由

  - step: 変更理由
    type: hearing
    output_format: text
    next: END_通常完了

  # --- キャンセルルート ---
  - step: キャンセル理由
    type: hearing
    output_format: text
    next: END_通常完了

  # --- 確認ルート ---
  - step: 確認内容
    type: hearing
    output_format: text
    next: END_通常完了

  # --- 終話ブロック ---
  - step: END_地域連携室案内
    type: termination
    termination_ref: "END_地域連携室案内"

  - step: END_予約不可案内
    type: termination
    termination_ref: "END_予約不可案内"

  - step: END_通常完了
    type: termination
    termination_ref: "END_通常完了"

