# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "お電話ありがとうございます。東京北医療センターの予約専用AI電話です。お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に「いちはちろく」を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 代表案内系 ---
  - name: "END_地域連携室案内"
    condition: "紹介状確認で「あり」判定（予約ルート）"
    tts_announcement: "紹介状をお持ちの方に関しては、当院の地域連携センターにおかけ直しください。電話番号は「03-5963-3421」です。繰り返します。「03-5963-3421」です。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_地域連携室案内"

  - name: "END_予約不可案内"
    condition: "小児科または産婦人科 × (予約 または 予約変更)。キャンセルは除外"
    tts_announcement: "ご選択の診療科に関する予約および予約変更は、AI電話ではお受けできません。平日15時から16時30分までの間に当院の予約センター、「03-5963-3312」へおかけ直しください。くりかえします。平日15時から16時30分までの間に当院の予約センター、「03-5963-3312」へおかけ直しください。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_予約不可案内"

  # --- 正常系 ---
  - name: "END_通常完了"
    condition: "全聴取完了（全用件共通）"
    tts_announcement: "ご要望を承りました。3診療日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。担当者からのご連絡後に確定となりますのでしばらくお待ちくださいませ。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_通常完了"

# smsFlag分岐設計（用件別・電話種別別の分岐なし）
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  notes: "Gen2 仕様踏襲: 完了系は smsFlag=1 固定。固定電話への SMS 配信制御は Dr.JOY 側で phonetype を参照して判断。フロー側で smsFlag=1/-1 の分岐は行わない"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  notes: |
    Gen2 yaml にはRAG（FAQ検索）フローが明示されていない。Gen2 プロンプトの FAQ ルール
    （「FAQに記載がある質問をされた場合は、FAQを参照して回答を行った後、すぐに直前のフローの
     質問内容をもう一度発話する」「プロンプトにもFAQにも記載が無い質問については
     『当院の予約センターへおかけ直しください』と発話後、すぐに直前のフローの質問内容を
     もう一度発話する」）は、本設計書では OpenAI 側で吸収されず未対応。
    RAG サブフロー（パターン3）の採用可否は確認レポート N-1 で要確認。

