        - input: "「予約確認」「確認」「問い合わせ」「その他」を含む発話、または上記いずれにも該当しない場合（Gen2: その他問い合わせは予約確認に分類）"
          output: "予約確認"
      no_result_condition: "無応答のみ（発話があれば予約確認に分類）"
    save_to: "classification"
    next_step: "(enum分岐) 予約→紹介状確認 / 予約変更→診療科 / キャンセル→診療科 / 予約確認→確認内容"
