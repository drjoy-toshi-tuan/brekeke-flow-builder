    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "「はい」「持っています」「持っている」「ある」「あります」を含む発話"
          output: "あり"
        - input: "「いいえ」「持っていません」「ない」「ありません」「持ってない」を含む発話"
          output: "なし"
      no_result_condition: "無応答 / 判別不能"
    save_to: null
    next_step: "(enum分岐) あり→END_地域連携室案内 / なし→診療科"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "診療科"
