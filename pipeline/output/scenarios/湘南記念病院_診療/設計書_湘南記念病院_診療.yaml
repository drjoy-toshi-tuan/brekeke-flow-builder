# 確認レポート: output/scenarios/湘南記念病院_診療/確認レポート_湘南記念病院_診療_20260501.md
# 元資料: commubo抽出/【048】湘南記念病院/【0045湘南記念病院】診療1_M_本番/

version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "湘南記念病院"
  scenario_name: "診療"
  group_name: "湘南記念病院"
  flow_name: "湘南記念病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "0467-32-3456"
  business_hours: "祝日除く月〜金 9:00〜15:00（土日祝・年末年始 12/30〜1/4 は時間外）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "湘南記念病院$診療"
      role: "main"
      description: "湘南記念病院 診療予約 メインフロー（再診予約・変更・キャンセル・確認）。新規予約は AI 受付不可で代表案内へ"
  subflows:
    - name: "湘南記念病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー（患者氏名 1 枠）"
    - name: "湘南記念病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation で和暦/西暦両対応"
    - name: "湘南記念病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier で携帯/固定/その他を3分岐"
    - name: "湘南記念病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "「わからない」発話を許容（END_診察券無し相当）。Gen3 では unknown 検出後に next へ単純に進める"

# --- セクション3: フローの目的 ---
purpose: |
  湘南記念病院の予約専用 AI 電話。患者からの再診予約・予約変更・予約キャンセル・予約確認の 4 用件を受け付け、
  患者氏名・生年月日・診察券番号・連絡先電話番号を聴取して Dr.JOY に登録する。
  当院は 2026-03-31 をもって外来診療を全終了するため、新規予約（初診）と外来終了予定の診療科は AI で受け付けず代表電話に誘導する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "湘南記念病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → END_非通知
              └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times)
                    ├─ 時間外 → END_時間外
                    └─ 受付可 → 冒頭_アナウンス
                                   → 診察券用意案内
                                     → 当日予約確認(hearing y/n)
                                          ├─ 否定 → END_当日予約（代表案内）
                                          └─ 肯定 → 用件確認(hearing enum)
                                                       ├─ 診察 → 予約判別(y/n) → 新患判断(y/n)
                                                       │                              ├─ 肯定(初診) → END_初診（外来終了+代表案内）
                                                       │                              └─ 否定(再診) → 予約確定説明_再診 → 診療科 → 予約希望日 …
                                                       ├─ 変更 → 予約変更復唱(y/n) → 予約確定説明_変更キャンセル → 診療科 → 予約日 → 予約希望日 …
                                                       ├─ キャンセル → 予約キャンセル復唱(y/n) → 予約確定説明_変更キャンセル → 診療科 → 予約日 → 予約希望日 …
                                                       └─ 確認 → 確認復唱(y/n) → 予約確定説明_確認 → 確認内容聞き取り(text) → 診察券→氏名→生年月日→電話 → END_確認

      [診療科の特殊分岐]
      診療科(hearing enum)
        ├─ 13科（放射線科/検査科/リハビリテーション科/栄養科/内視鏡室/発熱外来/腫瘍内科/健康診断/予防接種/検査/栄養指導/アートメイク/アロママッサージ/乳腺外科）
        │      → END_診療科_代表案内
        ├─ 4科（形成外科/婦人科/脳神経外科/皮膚科 — 2025/12 終了済）
        │      → END_診療科_外来終了
        ├─ 産婦人科 → 「当院には産婦人科はございません。婦人科でよろしいでしょうか?」 → 婦人科に正規化 → END_診療科_外来終了
        └─ AI 対応科（外科・内科・整形外科・泌尿器科・禁煙外来 等）
               → 用件後分岐(CMR: OpenAI_用件確認)
                     ├─ 変更/キャンセル → 予約日(datetime) → 予約希望日
                     └─ 診察(=再診) → 予約希望日(text)

      [後段共通]
      予約希望日 → 二科目診療科聴取(text) → jump_診察券番号聴取 → jump_氏名聴取 → jump_生年月日聴取 → jump_電話番号聴取 → 終話分岐(CMR)
      終話分岐 → 用件で 4 分岐 → END_予約 / END_変更 / END_キャンセル / END_確認
    notes: "確認ルートは「確認内容→診察券→氏名→生年月日→電話→END_確認」で診療科・予約日・予約希望日・二科目をスキップ"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭 ===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 診察券用意案内

  - step: 診察券用意案内
    type: announcement
    next: 当日予約確認

  # === 当日予約排除 ===
  - step: 当日予約確認
    type: hearing
    output_format: enum
    output_labels:
      - "肯定"
    conditions:
      - match: "肯定"
        next: 用件確認
      - match: "other"
        next: END_当日予約

  # === 用件確認（Pattern A: OpenAI 直後 4 分岐）===
  - step: 用件確認
    type: hearing
    output_format: enum
    output_labels:
      - "診察"
      - "変更"
      - "キャンセル"
      - "確認"
    conditions:
      - match: "診察"
        next: 予約判別
      - match: "変更"
        next: 予約変更復唱
      - match: "キャンセル"
        next: 予約キャンセル復唱
      - match: "確認"
        next: 確認復唱
      - match: "other"
        next: END_聴取失敗

  # === 診察ルート: 予約判別 → 新患判断 ===
  - step: 予約判別
    type: hearing
    output_format: enum
    output_labels:
      - "肯定"
    conditions:
      - match: "肯定"
        next: 新患判断
      - match: "other"
        next: END_聴取失敗

  - step: 新患判断
    type: hearing
    output_format: enum
    output_labels:
      - "肯定"
    conditions:
      - match: "肯定"        # 初診=AI受付不可
        next: END_初診
      - match: "other"        # 再診
        next: 予約確定説明_再診

  # === 変更/キャンセル/確認 各復唱 ===
  - step: 予約変更復唱
    type: hearing
    output_format: enum
    output_labels:
      - "肯定"
    conditions:
      - match: "肯定"
        next: 予約確定説明_変更キャンセル
      - match: "other"
        next: END_聴取失敗

  - step: 予約キャンセル復唱
    type: hearing
    output_format: enum
    output_labels:
      - "肯定"
    conditions:
      - match: "肯定"
        next: 予約確定説明_変更キャンセル
      - match: "other"
        next: END_聴取失敗

  - step: 確認復唱
    type: hearing
    output_format: enum
    output_labels:
      - "肯定"
    conditions:
      - match: "肯定"
        next: 予約確定説明_確認
      - match: "other"
        next: END_聴取失敗

  # === 予約確定タイミング説明（用件別 announcement）===
  - step: 予約確定説明_変更キャンセル
    type: announcement
    next: 診療科

  - step: 予約確定説明_再診
    type: announcement
    next: 診療科

  - step: 予約確定説明_確認
    type: announcement
    next: 確認内容聞き取り

  # === 確認ルート: 確認内容 → 診察券へ直結 ===
  - step: 確認内容聞き取り
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # === 変更/キャンセル/再診 共通: 診療科 ===
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    echo_back: true
    output_labels:
      - "外科"
      - "内科"
      - "整形外科"
      - "泌尿器科"
      - "禁煙外来"
      - "脊椎外来"
      - "糖尿病外来"
      - "睡眠時無呼吸外来"
      - "産婦人科"
      - "形成外科"
      - "婦人科"
      - "脳神経外科"
      - "皮膚科"
      - "放射線科"
      - "検査科"
      - "リハビリテーション科"
      - "栄養科"
      - "内視鏡室"
      - "発熱外来"
      - "腫瘍内科"
      - "健康診断"
      - "予防接種"
      - "検査"
      - "栄養指導"
      - "アートメイク"
      - "アロママッサージ"
      - "乳腺外科"
      - "わからない"
    conditions:
      # 13 科は代表案内
      - match: "放射線科"
        next: END_診療科_代表案内
      - match: "検査科"
        next: END_診療科_代表案内
      - match: "リハビリテーション科"
        next: END_診療科_代表案内
      - match: "栄養科"
        next: END_診療科_代表案内
      - match: "内視鏡室"
        next: END_診療科_代表案内
      - match: "発熱外来"
        next: END_診療科_代表案内
      - match: "腫瘍内科"
        next: END_診療科_代表案内
      - match: "健康診断"
        next: END_診療科_代表案内
      - match: "予防接種"
        next: END_診療科_代表案内
      - match: "検査"
        next: END_診療科_代表案内
      - match: "栄養指導"
        next: END_診療科_代表案内
      - match: "アートメイク"
        next: END_診療科_代表案内
      - match: "アロママッサージ"
        next: END_診療科_代表案内
      - match: "乳腺外科"
        next: END_診療科_代表案内
      # 4 科は 2025/12 で外来終了済
      - match: "形成外科"
        next: END_診療科_外来終了
      - match: "婦人科"
        next: END_診療科_外来終了
      - match: "脳神経外科"
        next: END_診療科_外来終了
      - match: "皮膚科"
        next: END_診療科_外来終了
      # 産婦人科 → 婦人科に付け替え（OpenAI プロンプトで「産婦人科」を「婦人科」に正規化する）→ 結果 END_診療科_外来終了
      - match: "産婦人科"
        next: END_診療科_外来終了
      # AI 対応科は用件で振り分け
      - match: "other"
        next: 用件後分岐_診療科後

  # === 用件後分岐（CMR）: 変更/キャンセル → 予約日 / 再診 → 予約希望日 ===
  - step: 用件後分岐_診療科後
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 予約日
      - match: "キャンセル"
        next: 予約日
      - match: "other"   # 診察=再診ルート
        next: 予約希望日

  # === 既存予約日（変更/キャンセルのみ）===
  - step: 予約日
    type: hearing
    output_format: datetime
    next: 予約希望日

  # === 予約希望日（フリーワード）===
  - step: 予約希望日
    type: hearing
    output_format: text
    next: 二科目診療科聴取

  # === 二科目診療科・追加伝達事項（フリーワード）===
  - step: 二科目診療科聴取
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # === 個人情報聴取サブフロー（4 段直列）===
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "湘南記念病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "湘南記念病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "湘南記念病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "湘南記念病院$電話番号聴取"
    next: 終話分岐_用件

  # === 終話分岐（CMR）: 用件で 4 終話に振り分け ===
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "診察"
        next: END_予約
      - match: "変更"
        next: END_変更
      - match: "キャンセル"
        next: END_キャンセル
      - match: "確認"
        next: END_確認
      - match: "other"
        next: END_予約

  # === 終話 ===
  - step: END_予約
    type: termination
    termination_ref: "END_予約"

  - step: END_変更
    type: termination
    termination_ref: "END_変更"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_確認
    type: termination
    termination_ref: "END_確認"

  - step: END_当日予約
    type: termination
    termination_ref: "END_当日予約"

  - step: END_初診
    type: termination
    termination_ref: "END_初診"

  - step: END_診療科_代表案内
    type: termination
    termination_ref: "END_診療科_代表案内"

  - step: END_診療科_外来終了
    type: termination
    termination_ref: "END_診療科_外来終了"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

