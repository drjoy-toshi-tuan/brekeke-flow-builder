  - "【「もしもし」リカバリ】用件確認 OpenAI プロンプトに「『もしもし』だけの発話は no_result とする」を含める"
  - "【復唱対象】用件 4 種（個別復唱）+ 診療科（echo_back: true）+ 予約日（DTMF 復唱）+ 生年月日（DOB Re-confirmation）+ 電話番号（Phone Normalization + Re-confirmation）"
  - "【3 診療日以内連絡】SMS 出し分けなし（携帯/固定問わず SMS 送信あり=sms_flag=1）。連絡猶予 TTS 「3 診療日以内」を全 4 用件の終話に統一配置"
  - "【サブフロー分割】個人情報聴取は 4 サブフロー独立（氏名 / 生年月日 / 電話番号 / 診察券番号）。サブフロー本体は docs/reference/bivr/samples/個人情報サブフロー.bivr の完全コピー"
  - "【設計ベース】Gen1 commubo の 13 サブシナリオ + entity_classification.md / entity_openai_synonyms.md / entity_stt_patch.json から構築。STT/OpenAI 同義語は scaffold/properties が自動取り込み"

