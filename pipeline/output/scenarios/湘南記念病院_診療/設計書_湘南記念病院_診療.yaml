# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "当日予約確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "肯定"
    notes: "DTMF 1=肯定。否定は other で END_当日予約 へ"

  - order: 2
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "診察"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "DTMF 1=診察, 2=変更, 3=キャンセル, 4=確認。「もしもし」誤検知排除を OpenAI プロンプトに含める"

  - order: 3
    name: "予約判別"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "肯定"
    notes: "Yes/No 確認「診察のご予約ですね？」。DTMF 1=肯定"

  - order: 4
    name: "新患判断"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "肯定"
    notes: "Yes/No 確認「当院でのご受診は初めてですか？」。肯定=初診=AI受付不可。DTMF 1=肯定。分岐用のため context 保存は不要"

  - order: 5
    name: "予約変更復唱"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "肯定"
    notes: "Yes/No 確認「ご予約の変更でよろしいですか?」。DTMF 1=肯定"

  - order: 6
    name: "予約キャンセル復唱"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "肯定"
    notes: "Yes/No 確認「ご予約のキャンセルでよろしいですか?」。DTMF 1=肯定"

  - order: 7
    name: "確認復唱"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "肯定"
    notes: "Yes/No 確認「ご予約の確認でよろしいですか?」。DTMF 1=肯定"

  - order: 8
    name: "確認内容聞き取り"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inquiryContent"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "フリーワード自由記述。SKILL_C 相当。「次回の予約日時を教えて欲しい」等"

  - order: 9
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "外科"
      - "内科"
      - "整形外科"
      - "泌尿器科"
      - "禁煙外来"
      - "脊椎外来"
      - "糖尿病外来"
      - "睡眠時無呼吸外来"
      - "産婦人科"
      - "形成外科"
      - "婦人科"
      - "脳神経外科"
      - "皮膚科"
      - "放射線科"
      - "検査科"
      - "リハビリテーション科"
      - "栄養科"
      - "内視鏡室"
      - "発熱外来"
      - "腫瘍内科"
      - "健康診断"
      - "予防接種"
      - "検査"
      - "栄養指導"
      - "アートメイク"
      - "アロママッサージ"
      - "乳腺外科"
      - "わからない"
    notes: "27 科 + わからない。echo_back あり。NO_RESULT 時は no_result_default='登録なし' を保存。診療科辞書は entity_stt_patch.json から自動取り込み"

  - order: 10
    name: "予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "変更/キャンセル時の既存予約日。DTMF 4 桁（月 2 桁＋日 2 桁）並走対応。「4月1日」のように発話"

  - order: 11
    name: "予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "フリーワード（「来週の火曜日」「2月上旬」等の曖昧表現可）"

  - order: 12
    name: "二科目診療科聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "additionalDepartment"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "再診/変更/キャンセル/確認後段共通の追加伝達事項。「ない場合はありませんとお話ください」"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。湘南記念病院の、予約専用、AI電話です。当院は、2026年1月1日より順次、外来診療を縮小し、2026年3月31日をもってすべての外来診療を終了させていただきます。"
    input_method: "voice_only"
    save_to: ""
    next_step: "診察券用意案内"
    retry_failure: "skip"

  - step_name: "診察券用意案内"
    tts_announcement: "ご予約には診察券番号が必要ですので、診察券または予約票をご用意ください。"
    input_method: "voice_only"
    save_to: ""
    next_step: "当日予約確認"
    retry_failure: "skip"

  - step_name: "当日予約確認"
    tts_announcement: "また、このお電話では、本日のご用件を承ることができません。明日以降の受診予約についてでよろしいですか？はい、そうです。またはいいえ、違います。でお答えください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "肯定"
      mapping:
        - input: "DTMF 1 / はい / そうです / 大丈夫"
          output: "肯定"
      no_result_condition: "上記いずれにも該当しない（否定含む）"
    save_to: ""
    next_step: "用件確認"
    retry_failure: "end_failure"

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話ください。ボタン操作も可能です。1番、予約を取る、2番、変更、3番、キャンセル、4番、確認、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "診察"
        - "変更"
        - "キャンセル"
        - "確認"
      mapping:
        - input: "DTMF 1 / 予約を取る / 診察の予約 / 再診の予約 / 薬をとる"
          output: "診察"
        - input: "DTMF 2 / 変更 / 変えたい / 取り直し / 延期"
          output: "変更"
        - input: "DTMF 3 / キャンセル / 取り消し / やめる / 行けない"
          output: "キャンセル"
        - input: "DTMF 4 / 確認 / 確認したい / 確認希望"
          output: "確認"
      no_result_condition: "「もしもし」のみの発話・無関係発話・全パターン非該当"
    save_to: "classification"
    next_step: "用件別ルートへ分岐"
    retry_failure: "end_failure"

  - step_name: "予約判別"
    tts_announcement: "診察のご予約ですね？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "肯定"
      mapping:
        - input: "DTMF 1 / はい / そうです / 大丈夫"
          output: "肯定"
      no_result_condition: "否定（いいえ / 違う 等）または無関係発話"
    save_to: ""
    next_step: "新患判断"
    retry_failure: "end_failure"

  - step_name: "新患判断"
    tts_announcement: "当院でのご受診は初めてですか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "肯定"
      mapping:
        - input: "DTMF 1 / はい（初めて）/ そうです / 初診"
          output: "肯定"
      no_result_condition: "否定（いいえ / 再診 / 何度か来てる 等）→ other で再診ルートへ"
    save_to: "isFirstVisit"
    next_step: "肯定→END_初診 / 否定→予約確定説明_再診"
    retry_failure: "end_failure"

  - step_name: "予約変更復唱"
    tts_announcement: "ご予約の変更でよろしいですか?"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "肯定"
      mapping:
        - input: "DTMF 1 / はい / そうです"
          output: "肯定"
      no_result_condition: "否定または非該当"
    save_to: ""
    next_step: "予約確定説明_変更キャンセル"
    retry_failure: "end_failure"

  - step_name: "予約キャンセル復唱"
    tts_announcement: "ご予約のキャンセルでよろしいですか?"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "肯定"
      mapping:
        - input: "DTMF 1 / はい / そうです"
          output: "肯定"
      no_result_condition: "否定または非該当"
    save_to: ""
    next_step: "予約確定説明_変更キャンセル"
    retry_failure: "end_failure"

  - step_name: "確認復唱"
    tts_announcement: "ご予約の確認でよろしいですか?"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "肯定"
      mapping:
        - input: "DTMF 1 / はい / そうです"
          output: "肯定"
      no_result_condition: "否定または非該当"
    save_to: ""
    next_step: "予約確定説明_確認"
    retry_failure: "end_failure"

  - step_name: "予約確定説明_変更キャンセル"
    tts_announcement: "本日承る内容は、この電話が終了後、3診療日以内に担当者よりお電話、またはSMSにてご連絡のうえ、確定となります。それでは、"
    input_method: "voice_only"
    save_to: ""
    next_step: "診療科"
    retry_failure: "skip"

  - step_name: "予約確定説明_再診"
    tts_announcement: "再診のご予約、ですね。本日承る内容は、この電話が終了後、3診療日以内に担当者よりお電話、またはSMSにてご連絡のうえ、確定となります。それでは、"
    input_method: "voice_only"
    save_to: ""
    next_step: "診療科"
    retry_failure: "skip"

  - step_name: "予約確定説明_確認"
    tts_announcement: "本日承る内容は、この電話が終了後、3診療日以内に担当者よりお電話、またはSMSにてご連絡のうえ、確定となります。それでは、"
    input_method: "voice_only"
    save_to: ""
    next_step: "確認内容聞き取り"
    retry_failure: "skip"

  - step_name: "確認内容聞き取り"
    tts_announcement: "ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」など、内容を簡潔におっしゃってください。"
    input_method: "voice_only"
    save_to: "inquiryContent"
    next_step: "jump_診察券番号聴取"
    retry_failure: "skip"

  - step_name: "診療科"
    tts_announcement: "受診を希望される診療科をおっしゃってください。複数診療科の場合は、一つ目の診療科をお話ください。わからない場合は、「わからない」、のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "外科"
        - "内科"
        - "整形外科"
        - "泌尿器科"
        - "禁煙外来"
        - "脊椎外来"
        - "糖尿病外来"
        - "睡眠時無呼吸外来"
        - "産婦人科"
        - "形成外科"
        - "婦人科"
        - "脳神経外科"
        - "皮膚科"
        - "放射線科"
        - "検査科"
        - "リハビリテーション科"
        - "栄養科"
        - "内視鏡室"
        - "発熱外来"
        - "腫瘍内科"
        - "健康診断"
        - "予防接種"
        - "検査"
        - "栄養指導"
        - "アートメイク"
        - "アロママッサージ"
        - "乳腺外科"
        - "わからない"
      mapping:
        - input: "産婦人科 / お産 / マタニティ / 周産"
          output: "産婦人科"
        - input: "婦人科 / ギネ / 子宮 / 卵巣"
          output: "婦人科"
        - input: "外科 / けが / 経過 / 結果"
          output: "外科"
        - input: "内科 / 呼吸器科 / 循環器科 / 消化器科"
          output: "内科"
        - input: "整形外科 / TK / 整形"
          output: "整形外科"
        - input: "泌尿器科 / ウロ / 泌尿"
          output: "泌尿器科"
        - input: "禁煙外来 / 禁煙"
          output: "禁煙外来"
        - input: "脊椎外来 / 脊椎"
          output: "脊椎外来"
        - input: "糖尿病外来 / 糖尿病"
          output: "糖尿病外来"
        - input: "睡眠時無呼吸外来 / CPAP / 睡眠時 / 無呼吸"
          output: "睡眠時無呼吸外来"
        - input: "形成外科 / 美容外科 / 美容形成 / 訂正"
          output: "形成外科"
        - input: "脳神経外科 / 脳外 / 頭痛"
          output: "脳神経外科"
        - input: "皮膚科 / 皮膚 / Vista"
          output: "皮膚科"
        - input: "放射線科 / 放射"
          output: "放射線科"
        - input: "検査科 / 検査 / センサ"
          output: "検査"
        - input: "リハビリテーション科 / リハ / リハビリ"
          output: "リハビリテーション科"
        - input: "栄養科 / 栄養"
          output: "栄養科"
        - input: "内視鏡室 / 内視鏡 / カメラ / 胃カメラ / 大腸カメラ"
          output: "内視鏡室"
        - input: "発熱外来 / 発熱 / 風邪 / コロナ症状"
          output: "発熱外来"
        - input: "腫瘍内科 / 腫瘍"
          output: "腫瘍内科"
        - input: "健康診断 / 検診 / 健診センター"
          output: "健康診断"
        - input: "予防接種 / インフル / コロナ / 帯状疱疹 / 肺炎球菌 / 注射"
          output: "予防接種"
        - input: "栄養指導 / 指導"
          output: "栄養指導"
        - input: "アートメイク / 眉毛 / アイライン"
          output: "アートメイク"
        - input: "アロママッサージ / アロマ / マッサージ"
          output: "アロママッサージ"
        - input: "乳腺外科 / 乳腺 / 乳がん / 乳癌"
          output: "乳腺外科"
        - input: "わからない / 知らない / 覚えてない / 忘れた"
          output: "わからない"
      no_result_condition: "上記いずれにも該当しない発話 → no_result_default='登録なし' を context に保存"
    save_to: "clinicalDepartment"
    next_step: "13科→END_診療科_代表案内 / 4科+婦人科+産婦人科→END_診療科_外来終了 / その他→用件後分岐_診療科後"
    retry_failure: "end_failure"

  - step_name: "予約日"
    tts_announcement: "では次に、予約票に記載されている予約日を「4月1日」のように日付でおっしゃってください。なお、ダイヤルプッシュでの月日4桁入力も可能です。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping:
        - input: "4月1日 / 4/1 / 4の1 / DTMF 0401"
          output: "YYYY-MM-DD（OpenAI が当年または翌年で確定）"
