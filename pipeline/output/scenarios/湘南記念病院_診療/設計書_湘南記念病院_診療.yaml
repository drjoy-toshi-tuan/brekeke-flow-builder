  - "【受付時間】月～金 9:00〜15:00。土日祝・年末年始（12/30〜1/4）は時間外。年末年始の専用文言は END_時間外 に統合（汎用文言で代用）— 詳細は確認レポート参照"
  - "【Dr.JOY 番号判別】着信元=05017074509 の場合、営業時間判定をスキップして直接診察券用意案内へ。Gen3 では augment ブロック等の特殊対応が必要 — 確認レポート BLOCKER 参照"
