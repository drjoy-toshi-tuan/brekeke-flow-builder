  patterns:
    - condition: "用件=診察/変更/キャンセル/確認 + 携帯/固定問わず"
      sms_flag: "1"
      notes: "携帯/固定問わず SMS 送信あり（湘南記念病院は西宮渡辺と異なり携帯有無での出し分けなし）"
