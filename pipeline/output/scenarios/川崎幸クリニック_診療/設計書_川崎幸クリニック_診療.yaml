# 設計書 — 川崎幸クリニック 診療
# 生成元: @director エージェント（Gen2→Gen3移管）
# 生成日: 2026/04/20
# 元資料: docs/reference/customer_docs/【診療1】：川崎幸クリニック.md
# 移管ノート: docs/migration/gen2_川崎幸クリニック_診療.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "川崎幸クリニック"
  group_name: "川崎幸クリニック"
  flow_name: "川崎幸クリニック$診療"
  target_facility: "川崎幸クリニック / 第二川崎幸クリニック"
  office_id: "TODO_要確認"
  phone_number: "044-511-2112"                    # 案内用代表番号（ARS 着信番号は Dr.JOY 側設定）
  business_hours: "customer_doc に明記なし（Dr.JOY 側で設定）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "川崎幸クリニック$診療"
      role: "main"
      description: |
        川崎幸クリニック／第二川崎幸クリニック診療予約専用 AI 電話のメインフロー。
        「予約の確認」と「明日以降のキャンセル」のみ自動受付する。
        氏名→生年月日→電話番号→診察券番号→用件の順に聴取し、用件別（キャンセル/確認/内容聴取）に分岐。
        キャンセル時は「当日 vs 明日以降」を Script(future_date) で判定し、当日なら代表番号 044-511-2112 を反復案内。
  subflows:
    - name: "川崎幸クリニック$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"                          # 復唱禁止項目
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        個人情報サブフロー.bivr の氏名聴取サンプルをそのまま使用。
        カタカナ以外で格納された場合は再聴取（customer_doc 4-1 氏名カタカナエラー文言を properties 側で設定）。
        苗字のみの場合は「下のお名前もお伺いしてもよろしいですか？」で追加聴取するサブステップを含む。
    - name: "川崎幸クリニック$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"                          # DOB Re-confirmation 構成（2026/04/14 改訂で dtmf 追加）
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        西暦指定だが和暦入力も AI で西暦変換。DTMF 併用必須（customer_doc 改訂履歴 2026/04/14）。
        肯定特殊語「いいです」「肺」は復唱 OpenAI プロンプトで肯定扱い（prompter 申送り）。
    - name: "川崎幸クリニック$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"                          # 電話番号のみ復唱許可。ただし SSML <speak type="telephone"> は Gen3 不可
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        incoming-classifier で携帯/固定分岐。携帯（090/080/070/060/050 始まり）は着信番号を自動格納して
        「今おかけいただいている番号でよろしいですか？」で確認。それ以外は DTMF 直接聴取→復唱確認。
        10桁/11桁のみ受付、11桁は先頭3桁が 090/080/070/060/050 のいずれか必須。
        9桁/10桁で頭0欠落は先頭0補完。復唱 TTS は {tts_g:...} 平文で「電話番号ですね」形式。
    - name: "川崎幸クリニック$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"                          # 復唱禁止
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        「わからない」発話を許可（必須聴取ではない）。数字が含まれない場合は再ヒアリング。
        C→4、Sea→4、Go→5、Q→9 等の誤認識救済テーブルは STT profile_words と
        OpenAI 正規化プロンプトで対応（customer_doc §1-9）。

# --- セクション3: フローの目的 ---
purpose: |
  川崎幸クリニック／第二川崎幸クリニックの診療予約に関する電話を受け付け、
  「予約の確認」と「明日以降のキャンセル」のみを自動受付する。
  新規予約・予約変更・本日の予約受付は AI 電話では対応せず、代表電話番号（044-511-2112）への
  かけ直しを案内する。当日キャンセルも代表番号への電話案内で終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "川崎幸クリニック$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外(TTS) → 完了フラグ_時間外(status=6) → 切断
                          └─ 受付可 → 冒頭_アナウンス(TTS, status=0/smsFlag=0 初期化)
                                        → jump_氏名聴取(サブフロー)
                                        → jump_生年月日聴取(サブフロー)
                                        → jump_電話番号聴取(サブフロー)
                                        → jump_診察券番号聴取(サブフロー)
                                        → 用件確認(enum: キャンセル/確認/内容聴取[default])
                                            ├─ キャンセル → キャンセル_診療科(enum,no_result=登録なし)
                                            │                → 現在の予約日(datetime)
                                            │                → 当日判定(script: future_date)
                                            │                    ├─ SUCCESS(明日以降) → END_キャンセル完了(status=1,smsFlag=1)
                                            │                    └─ FAIL(本日)       → END_当日キャンセル(status=2,smsFlag=0)
                                            ├─ 確認       → 確認_診療科(enum,no_result=登録なし)
                                            │                → 確認内容(text)
                                            │                → END_確認完了(status=1,smsFlag=2)
                                            └─ 内容聴取(default) → 内容聴取_不明時(text)
                                                                    → END_内容聴取完了(status=1,smsFlag=2)
    notes: |
      - 受付対象は「予約の確認」と「明日以降のキャンセル」のみ。新規予約・変更・本日予約は受付不可。
      - 当日キャンセルは代表番号 044-511-2112 を 3 回反復読み上げで案内。
      - 復唱は電話番号のみ。氏名・生年月日・診察券番号・診療科・予約日・確認内容は復唱禁止。
      - 用件 enum に一致しない発話はデフォルトで「内容聴取」扱い。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: jump_氏名聴取
    # 発話後 status=0 / smsFlag=0 を初期化（customer_doc §2）。
    # scaffold の opening/announcement テンプレートに組込み済み想定。

  # --- 個人情報聴取サブフロー（順序固定） ---
  - step: jump_氏名聴取
    type: subflow
    flowname: "川崎幸クリニック$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "川崎幸クリニック$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "川崎幸クリニック$電話番号聴取"
    next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "川崎幸クリニック$診察券番号聴取"
    next: 用件確認

  # --- 用件確認（Pattern A: OpenAI 直後 3 分岐。内容聴取は default）---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "キャンセル"
        next: キャンセル_診療科
      - match: "確認"
        next: 確認_診療科
      - match: "内容聴取"
        next: 内容聴取_不明時

  # --- キャンセルルート ---
  - step: キャンセル_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 現在の予約日

  - step: 現在の予約日
    type: hearing
    output_format: datetime
    next: 当日判定
    retry_failure: end_failure

  # --- 当日判定（Script future_date: 今日より未来なら SUCCESS）---
  - step: 当日判定
    type: script
    script_template: future_date
    reference_module: "OpenAI_現在の予約日"
    template_params: {}
    conditions:
      - match: "SUCCESS"
        next: END_キャンセル完了
      - match: "FAIL"
        next: END_当日キャンセル

  # --- 確認ルート ---
  - step: 確認_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 確認内容

  - step: 確認内容
    type: hearing
    output_format: text
    next: END_確認完了
    retry_failure: end_failure

  # --- 内容聴取ルート（用件分類不能時の default） ---
  - step: 内容聴取_不明時
    type: hearing
    output_format: text
    next: END_内容聴取完了
    retry_failure: end_failure

  # --- 終話（正常系） ---
  - step: END_キャンセル完了
    type: termination
    termination_ref: "END_キャンセル完了"

  - step: END_当日キャンセル
    type: termination
    termination_ref: "END_当日キャンセル"

  - step: END_確認完了
    type: termination
    termination_ref: "END_確認完了"

  - step: END_内容聴取完了
    type: termination
    termination_ref: "END_内容聴取完了"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "キャンセル"
      - id: "2"
        order: "2"
        value: "確認"
      - id: "3"
        order: "3"
        value: "内容聴取"
    item_default: true
    editable: true
    deletable: true
    notes: "診療受付区分。新規予約・変更は AI 電話では受付対象外のため enum に含めない"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "全カタカナ。氏名サブフローで格納。苗字のみの場合は下の名前を追加聴取"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "「わからない」時は空欄。数字未含有時は再ヒアリング。C→4 等の誤認識救済"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "西暦 yyyy-MM-dd。和暦入力は AI で西暦変換。DTMF 併用"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "着信元電話番号を自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "10桁/11桁のみ受付。11桁は先頭3桁が 090/080/070/060/050 のいずれか必須"

  - context_name: "phonetype"
    context_name_jp: "電話種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "電話番号サブフロー内で '携帯' / 'その他' を saveContext2DB で設定"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "キャンセル/確認ルート共通。no_result 時は '登録なし' を格納（モジュール選定ガイド §2.5）"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: |
      キャンセル用途。yyyy-MM-dd HH:MM 形式。
      月日のみ発話時は着信年を補完。10-12月着信で1-9月指定は翌年扱い。

  - context_name: "details"
    context_name_jp: "詳細・問い合わせ内容"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "確認内容または内容聴取（用件分類不能）ルートで格納するフリーテキスト"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: true
    notes: "1=未処理(正常完了) 2=代表案内(当日キャンセル・非通知) 3=聴取失敗 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

