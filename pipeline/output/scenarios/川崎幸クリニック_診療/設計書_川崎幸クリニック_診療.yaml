# smsFlag 分岐設計（用件＋当日判定の組み合わせで決定）
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "reservationDate"
  patterns:
    - condition: "classification=キャンセル かつ reservationDate>今日"
      sms_flag: "1"
      notes: "END_キャンセル完了（SMS 送信あり）"
    - condition: "classification=キャンセル かつ reservationDate=今日"
      sms_flag: "0"
      notes: "END_当日キャンセル（初期値保持。SMS 送信なし、代表番号案内のみ）"
    - condition: "classification=確認"
      sms_flag: "2"
      notes: "END_確認完了（SMS 送信あり）"
    - condition: "classification=内容聴取"
      sms_flag: "2"
      notes: "END_内容聴取完了（SMS 送信あり）"

