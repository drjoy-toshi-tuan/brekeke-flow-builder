# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【受付範囲】受付対象は『予約の確認』と『明日以降のキャンセル』のみ。新規予約・予約変更・本日予約は一切受付不可（用件 enum に含めない）。本日キャンセルは代表番号 044-511-2112 を 3 回反復案内して status=2 で終話。"
  - "【当日判定】Script(future_date) で reservationDate > 今日 を判定。SUCCESS=明日以降（smsFlag=1）、FAIL=当日（smsFlag=0, status=2）。OpenAI の日付比較は不安定なため Script を使用（モジュール選定ガイド §3.8）。"
  - "【復唱ポリシー】電話番号のみ復唱許可。氏名・生年月日・診察券番号・診療科・予約日・確認内容は復唱禁止。一度聴取した情報は再度聞き直さない（customer_doc 冒頭『絶対的な聞き直し禁止』）。"
  - "【電話番号復唱の TTS 形式】customer_doc は `<speak type=\"telephone\" breakc=\"300ms\">{}</speak>ですね` だが Gen3 では SSML 禁止。{tts_g:...} の平文で「...でよろしいですか」形式に置換する（移管ノート §47）。"
  - "【生年月日】西暦指定が基本だが和暦入力も AI で西暦変換可。DTMF 併用必須（customer_doc 改訂履歴 2026/04/14）。"
  - "【連絡先電話番号】10桁/11桁のみ受付。11桁は先頭3桁が 090/080/070/060/050 のいずれか必須。9桁/10桁で頭0欠落時は先頭0補完。着信番号が携帯なら自動格納→確認、それ以外は DTMF 直接聴取→正規化→復唱確認。"
  - "【診察券番号】『わからない』を許可（必須聴取ではない）。数字含まない発話は再ヒアリング。誤認識救済: C/Sea→4、Go→5、Q→9 等（customer_doc §1-9）。"
  - "【氏名】カタカナ以外で格納された場合は『うまく聞き取りができませんでした、ゆっくり話すとAIが聞き取れません。普通のスピードではっきりと発話してください。』で再聴取ループ。苗字のみの場合は『下のお名前もお伺いしてもよろしいですか？』で下の名前を追加聴取するサブステップを氏名サブフロー内に設ける。"
  - "【肯定特殊語】『いいです』『肺』を肯定扱い（customer_doc §4 冒頭）。電話番号復唱 OpenAI プロンプトおよび生年月日復唱 OpenAI プロンプトに反映（prompter 申送り）。"
  - "【smsFlag 初期化】冒頭アナウンス時に status=0 / smsFlag=0 を更新値として設定（customer_doc §2、移管ノート §42）。"
  - "【冒頭アナウンス後の barge-in 抑制】冒頭アナウンスの発話後、次の質問を出力するまではマイクを置くことを厳禁（customer_doc §2 特記）。opening ブロックで barge-in 抑制／連続発話する構成にする。"
  - "【予約日正規化】月日のみ発話時は着信年で補完。10-12月着信で1-9月指定は翌年扱い。過去日付は未来日付のみ受付（customer_doc §1-4）。予約日（reservationDate=DATE型）と予約希望日（フリーワード）を混同しない。"
  - "【診療科レコメンド】該当診療科がリストにない場合は customer_doc §1-3『当院に〇〇はございませんが、〇〇でしょうか？』と近しい診療科をレコメンドし、回答待ち（customer_doc §1-5『回答を待つような返答をした場合は、返答があるまでは次の質問はしない』）。OpenAI 側で実装（prompter 申送り）。"
  - "【用語変換】customer_doc §1 用語変換テーブル: 基礎研修員→基礎健診、印刷/定期/新薬/再診/最新/禁忌→診察、薬/お薬→予約、電気/でんき→新規、日々か→耳鼻咽喉科、ないか→内科、予約を返答→予約を変更。用件確認 OpenAI および診療科 OpenAI のプロンプトに必須反映（prompter 申送り）。"
  - "【数字正規化】customer_doc §1-7/1-9 の数字キーワード表（いち→1、ひー→1、よん/しー/し/C/Sea→4、ご/いつ/Go→5 等）を診察券番号・連絡先電話番号 OpenAI プロンプトに反映（prompter 申送り）。"
  - "【FAQ】customer_doc §1-2 に FAQ 記述はあるが、AI 電話では回答せず『ご質問いただいた内容はAI電話ではご対応できませんので、折り返しでご確認させていただきます。』と案内して内容聴取_不明時 ルートで details に集約（RAG は未使用）。"
  - "【転送】customer_doc §11『転送は行いません』。call_transfer ブロック未配置。"
  - "【健診ブランチとの差異】同一施設の別シナリオ『健診』と並走。氏名/生年月日/電話番号/診察券番号サブフローは健診側と共通化前提。ただし classification 値（診療=3値、健診=別値）・終話分岐は診療独自で別構造のため、健診 bivr の該当分岐をコピー流用しないこと。"

