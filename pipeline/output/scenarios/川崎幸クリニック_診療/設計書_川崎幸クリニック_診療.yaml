  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "キャンセル"
      - "確認"
      - "内容聴取"
    notes: |
      Pattern A（OpenAI 直後分岐）。受付対象は「明日以降のキャンセル」と「予約の確認」のみ。
      用語変換（customer_doc §1 用語の変換と表記統一）:
        薬/お薬 → 予約、電気/でんき → 新規、予約を返答 → 予約を変更（いずれも本フローでは受付対象外）
        やめる/取り消し/取消/やめたい/キャンセル → キャンセル
        確認/予約の確認 → 確認
        上記いずれにも該当しない自由発話 → 内容聴取（default）
