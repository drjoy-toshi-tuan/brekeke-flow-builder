# --- セクション11: 特記事項・制約 ---
special_notes:
  - "復唱禁止: 聴取した内容の復唱は原則禁止。例外は生年月日・診察券番号・連絡先電話番号のみ（サブフロー内で処理）"
  - "訂正2回制限: 同一項目で2回訂正された場合は「折り返しの時に確認させていただきます」として次へ進む。生年月日と電話番号は確認できるまで再ヒアリング"
  - "予約希望日はフリーワード保存: 「予約希望日」は日付形式で格納しない。言われたまま文字起こしする"
  - "予約日と予約希望日は別フィールド: 予約日のヒアリングがなかった場合に予約希望日の中身を予約日に入れてはいけない"
  - "氏名はカタカナチェック: カタカナになっていない場合は再聴取。苗字のみの場合も下の名前を確認"
  - "新規紹介状と変更紹介状で手元確認の有無が異なる: 新規/再診の紹介状は「手元にあるか」を確認。変更/キャンセル/確認の紹介状は手元確認しない"
  - "選定療養費案内: 新規で紹介状なしの場合のみ。キャンセルの用件では聞いてはいけない"
  - "「印刷」「定期」「新薬」「再診」「最新」「禁忌」は「診察（予約）」と判断する（用件確認のOpenAIプロンプトに含める）"
  - "「薬」「お薬」は「予約」と判断する（用件確認のOpenAIプロンプトに含める）"
  - "16:00変更制限: 予約変更の受付は前日16:00まで。冒頭アナウンスで案内するのみ（Gen2準拠。DateOfCall Classifierによる時間チェックなし）"

