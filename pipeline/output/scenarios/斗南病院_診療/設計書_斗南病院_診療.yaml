# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_通常_携帯"
    condition: "全聴取完了 かつ phonetype=携帯"
    tts_announcement: "かしこまりました。このお電話でご予約の確定ではございません。3営業日以内に折り返しの電話またはショートメールでの確認をさせて頂き確定となりますので今しばらくお待ちください。内容によってはご希望に添えない場合がございますので、ご了承ください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_通常_携帯"

  - name: "END_通常_固定"
    condition: "全聴取完了 かつ phonetype=固定/その他"
    tts_announcement: "かしこまりました。このお電話でご予約の確定ではございません。3営業日以内に折り返しのお電話での確認をさせて頂き確定となりますので今しばらくお待ちください。内容によってはご希望に添えない場合がございますので、ご了承ください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_通常_固定"

  - name: "END_紹介状なし"
    condition: "紹介状手元になし（新規/再診で紹介状ありだが手元にない場合）"
    tts_announcement: "紹介状をご準備されましたら、再度ご連絡をお願いいたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_紹介状なし"

  - name: "END_代表案内"
    condition: "問い合わせルートでRAG回答後、またはAI対応不可の場合"
    tts_announcement: "申し訳ございませんが、お話いただきました内容は、AI電話では対応ができません。代表電話におかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["phonetype"]
  patterns:
    - condition: "phonetype=携帯(1)"
      sms_flag: "1"
      notes: "携帯電話の場合はSMS送信あり。TTS「ショートメール」言及"
    - condition: "phonetype=その他(2)"
      sms_flag: "-1"
      notes: "固定電話/その他の場合はSMS送信なし。TTS「お電話」のみ言及"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "用件確認で「問い合わせ」に分岐した場合"
  pre_termination: true

