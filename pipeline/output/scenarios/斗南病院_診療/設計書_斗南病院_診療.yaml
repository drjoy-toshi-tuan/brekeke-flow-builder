# --- セクション6: 聴取項目一覧 ---
# 各ルートで同じ聴取タイプが複数回登場するが、ここではユニークなタイプを列挙。
# scenario_flowのstep名に対応する聴取設定として参照される。
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "確認"
      - "問い合わせ"
    notes: "DTMF 1=予約, 2=変更, 3=キャンセル, 4=確認"

  - order: 2
    name: "初診確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "再診"
    notes: "DTMF 1=新規, 2=再診。classificationの「予約」を「新規」または「再診」に上書き"

  - order: 3
    name: "新規紹介状1"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "introduction"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: "DTMF 1=はい(有), 2=いいえ(無)。手元確認あり版"

  - order: 4
    name: "手元確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "DTMF 1=はい, 2=いいえ。紹介状の手元有無確認。contextには保存しない（分岐のみ）"

  - order: 5
    name: "紹介状2_再診"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "introduction"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: "DTMF 1=はい(有), 2=いいえ(無)。再診用TTS（新規と文言が異なる）"

  - order: 6
    name: "変更紹介状"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "introduction"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: "DTMF 1=はい(有), 2=いいえ(無)。手元確認なし版。有/無を保存するのみで分岐なし"

  - order: 7
    name: "紹介元医療機関名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "institution"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "施設名をそのまま保存。OpenAI不要"

  - order: 8
    name: "紹介元電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: false
    save_to: "institutionPhoneNumber"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "DTMF 最大11桁の数字入力（電話番号）。電話番号をそのまま保存"

  - order: 9
    name: "医師指定"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "doctor"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "医師名または「なし」をそのまま保存"

  - order: 10
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "消化器内科"
      - "腫瘍内科"
      - "リウマチ膠原病科"
      - "糖尿病内分泌内科"
      - "血液内科"
      - "循環器内科"
      - "呼吸器内科"
      - "精神科"
      - "外科消化器外科"
      - "乳腺呼吸器外科"
      - "心臓血管外科"
      - "整形外科"
      - "耳鼻咽喉科頭頸部外科"
      - "婦人科生殖内分泌科"
      - "婦人科腫瘍科"
      - "形成外科"
      - "泌尿器科"
      - "腎臓内科"
      - "眼科"
      - "皮膚科"
      - "麻酔科"
      - "放射線診断科"
      - "放射線治療科"
      - "病理診断科"
    notes: >
      全ルートで共通の聴取設定。scenario_flowでは診療科_新規紹介あり/なし、
      診療科_再診紹介あり/なし、診療科_変キャ確の5ブロックが存在するが、
      聴取設定（STT/OpenAI/profile_words）は全て共通。no_result_default: 登録なし

  - order: 11
    name: "予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "フリーワード保存。日付形式変換しない。新規/再診/変更で使用"

  - order: 12
    name: "性別"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "sex"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "男"
      - "女"
    notes: "DTMF 1=男, 2=女。新規ルートのみ"

  - order: 13
    name: "病名症状"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "symptoms"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "新規紹介ありルートのみ"

  - order: 14
    name: "他院確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "otherhospital"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "新規紹介なしルートのみ"

  - order: 15
    name: "予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "DTMF 最大8桁の数字入力（日付: MMDD等）。変更/キャンセルのみ。YYYY-MM-DD HH:MM形式に正規化"

  - order: 16
    name: "理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更/キャンセルのみ"

  - order: 17
    name: "残薬確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "remainingDrugs"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更/キャンセルのみ"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、予約を取る。予約の変更。予約のキャンセル。予約の日時確認。のようにお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
        - "問い合わせ"
      mapping:
        - input: "DTMF 1 または「予約」「取る」「新規」「初診」「再診」「薬」「お薬」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」「日時」を含む"
          output: "確認"
        - input: "「聞きたい」「教えて」「問い合わせ」「質問」等を含む"
          output: "問い合わせ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "初診確認（予約）/ jump_氏名（変更/キャンセル/確認）/ jump_RAG検索（問い合わせ）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "初診確認"
    tts_announcement: "新規のご予約ですか？2回目以降のご予約ですか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規"
        - "再診"
      mapping:
        - input: "DTMF 1 または「新規」「初めて」「初診」「1回目」を含む"
          output: "新規"
        - input: "DTMF 2 または「2回目」「再診」「通院」「かかりつけ」を含む"
          output: "再診"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "jump_氏名_新規（新規）/ jump_氏名（再診）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "新規紹介状1"
    tts_announcement: "斗南病院宛の紹介状、もしくは検診結果はお持ちですか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "有"
        - "無"
      mapping:
        - input: "DTMF 1 または「はい」「持っている」「ある」を含む"
          output: "有"
        - input: "DTMF 2 または「いいえ」「持っていない」「ない」を含む"
          output: "無"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "introduction"
    next_step: "手元確認_新規（有）/ 選定療養費_新規（無）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "手元確認"
    tts_announcement: "紹介状、もしくは検診結果はお手元にございますか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
      mapping:
        - input: "DTMF 1 または「はい」「ある」を含む"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「ない」を含む"
