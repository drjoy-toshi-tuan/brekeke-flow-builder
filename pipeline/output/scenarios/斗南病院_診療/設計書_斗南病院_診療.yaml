# 設計書: 斗南病院 -- 診療
# 生成元: @director エージェント
# 生成日: 2026/04/16
# テンプレート: docs/specs/設計書テンプレート.yaml 準拠
# 移行元: docs/migration/gen2_斗南病院_診療.md
# 元資料: docs/reference/customer_docs/【診療】斗南病院.md
# 確認レポート: docs/designs/確認レポート_斗南病院_診療_20260416.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "斗南病院"
  group_name: "斗南病院"
  flow_name: "斗南病院$診療"
  target_facility: "斗南病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "あり（スケジュールはDr.JOY側で設定）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
# CLAUDE.md Rule 9 準拠: 個人情報聴取サブフローは個人情報サブフロー.bivr を完全コピー。
# フロー名プレフィックスのみ施設名に置換。構造・接続・スクリプトの変更は禁止。
flow_structure:
  type: "subflow"
  flows:
    - name: "斗南病院$診療"
      role: "main"
      description: >
        冒頭チェーン → 用件確認（予約/変更/キャンセル/確認/問い合わせ）
        → 予約: 初診確認（新規/再診）
          → 新規: 氏名→生年月日→電話番号→紹介状分岐→診療科→各種聴取→終話
          → 再診: 共通個人情報→診察券番号→紹介状分岐→診療科→予約希望日→終話
        → 変更/キャンセル/確認: 共通個人情報→診察券番号→変更紹介状→ルート別聴取→終話
        → 問い合わせ: RAG検索→代表案内
        全正常終話前にRAG検索サブフロー、phonetype分岐で携帯/固定の終話TTS・SMS出し分け
    - name: "斗南病院$氏名聴取"
      role: "sub"
      description: "患者氏名聴取（音声のみ）→ 結果返却"
    - name: "斗南病院$生年月日聴取"
      role: "sub"
      description: "生年月日聴取（DTMF 8桁 + DOB Re-confirmation復唱確認）→ 結果返却"
    - name: "斗南病院$電話番号聴取"
      role: "sub"
      description: "電話番号聴取（incoming-classifier→携帯/固定分岐→Phone Normalization→復唱確認）→ 結果返却"
    - name: "斗南病院$診察券番号聴取"
      role: "sub"
      description: "診察券番号聴取（DTMF + 復唱確認）→ 結果返却"
    - name: "斗南病院$RAG検索"
      role: "sub"
      description: "FAQ問い合わせ対応（STT→OpenAI→RAG検索→回答読み上げループ）"

  subflows:
    - name: "斗南病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の氏名聴取を完全コピー"
    - name: "斗南病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。復唱あり（Gen2プロンプトで生年月日は復唱対象）"
    - name: "斗南病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10 準拠。復唱あり（Gen2プロンプトで電話番号は復唱対象）。phonetypeをコンテキストに保存し、メインフローに返却"
    - name: "斗南病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。復唱あり（Gen2プロンプトで診察券番号は復唱対象）。「わからない」分岐あり"
    - name: "斗南病院$RAG検索"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen2→Gen3移管のデフォルト（pattern 3）。Dr.JOY側にFAQデータ登録が必要"

# --- セクション3: フローの目的 ---
purpose: >
  斗南病院の予約関連専用AI電話。患者からの電話を受け、用件（新規予約/再診予約/変更/キャンセル/日時確認）を確認し、
  紹介状の有無・診療科・患者情報を聴取して折り返し受付を自動化する。
  Gen2からの移管のため、用件確認→初診確認→個人情報→ルート別聴取の順序を維持する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "斗南病院$診療"
    diagram: |
      wait(2000ms)
        -> saveContextModel2DB
        -> incoming-classifier
            +-- 非通知 -> 完了フラグ_非通知(status=2, smsFlag=-1) -> END_非通知(TTS) -> 切断
            +-- 通常 -> acceptance_times
                          +-- 時間外 -> 完了フラグ_時間外(status=6, smsFlag=-1) -> END_時間外(TTS) -> 切断
                          +-- 受付可 -> 冒頭_アナウンス(TTS)

      --- 用件確認 ---
      冒頭_アナウンス -> 用件確認(hearing)
          +-- 予約 -> 初診確認
          +-- 変更 -> jump_氏名（共通個人情報パス）
          +-- キャンセル -> jump_氏名（共通個人情報パス）
          +-- 確認 -> jump_氏名（共通個人情報パス）
          +-- 問い合わせ -> jump_RAG検索 -> END_代表案内
          +-- default -> 初診確認

      --- 初診確認 ---
      初診確認(hearing)
          +-- 新規 -> jump_氏名_新規（新規専用パス）
          +-- 再診 -> jump_氏名（共通個人情報パス）

      === 新規ルート ===
      jump_氏名_新規 -> jump_生年月日_新規 -> jump_電話番号_新規 -> 新規紹介状1
          +-- 有 -> 手元確認_新規
          |         +-- はい -> 紹介元医療機関名_新規 -> 紹介元電話番号_新規 -> 医師指定_新規
          |         |           -> 診療科_新規紹介あり -> 予約希望日_新規紹介あり
          |         |           -> 性別_新規紹介あり -> 病名症状_新規 -> FAX確認_新規
          |         |           -> jump_RAG検索_終話前 -> 終話分岐_phonetype
          |         +-- いいえ -> END_紹介状なし
          +-- 無 -> 選定療養費_新規 -> 診療科_新規紹介なし -> 性別_新規紹介なし -> 他院確認_新規
                    -> jump_RAG検索_終話前 -> 終話分岐_phonetype

      === 共通個人情報パス（再診/変更/キャンセル/確認）===
      jump_氏名 -> jump_生年月日 -> jump_電話番号 -> jump_診察券番号 -> ContextMatchRouter_用件分岐
          +-- 再診 -> 紹介状2_再診
          |           +-- 有 -> 手元確認_再診
          |           |         +-- はい -> 紹介元医療機関名_再診 -> 紹介元電話番号_再診 -> 医師指定_再診
          |           |         |           -> 診療科_再診紹介あり -> 予約希望日_再診紹介あり
          |           |         |           -> jump_RAG検索_終話前
          |           |         +-- いいえ -> END_紹介状なし
          |           +-- 無 -> 診療科_再診紹介なし -> 予約希望日_再診紹介なし -> jump_RAG検索_終話前
          +-- 変更 -> 変更紹介状（共通）
          +-- キャンセル -> 変更紹介状（共通）
          +-- 確認 -> 変更紹介状（共通）

      === 変更/キャンセル/確認 共通パス ===
      変更紹介状 -> 診療科_変キャ確 -> ContextMatchRouter_変キャ確分岐
          +-- 変更 -> 予約日_変更 -> 予約希望日_変更 -> 理由_変更 -> 残薬確認_変更
          |           -> jump_RAG検索_終話前
          +-- キャンセル -> 予約日_キャンセル -> 理由_キャンセル -> 残薬確認_キャンセル
          |           -> jump_RAG検索_終話前
          +-- 確認 -> jump_RAG検索_終話前

      === 終話分岐 ===
      終話分岐_phonetype [ContextMatchRouter: phonetype参照]
          +-- 携帯(1) -> END_通常_携帯(status=1, smsFlag=1, TTS: SMS言及あり)
          +-- その他(2) -> END_通常_固定(status=1, smsFlag=-1, TTS: SMS言及なし)
    notes: >
      新規ルートは診察券番号不要。再診/変更/キャンセル/確認は共通個人情報パスで
      氏名→生年月日→電話番号→診察券番号を共有し、ContextMatchRouterで後続を分岐。
      変更/キャンセル/確認は変更紹介状と診療科も共有し、2段目のContextMatchRouterで分岐。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ============================================================
  # 冒頭ブロック
  # ============================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 用件確認

  # ============================================================
  # 用件確認・初診確認
  # ============================================================
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "予約"
        next: 初診確認
      - match: "変更"
        next: jump_氏名
      - match: "キャンセル"
        next: jump_氏名
      - match: "確認"
        next: jump_氏名
      - match: "問い合わせ"
        next: jump_RAG検索
      - match: "default"
        next: 初診確認

  - step: 初診確認
    type: hearing
    output_format: enum
    conditions:
      - match: "新規"
        next: jump_氏名_新規
      - match: "再診"
        next: jump_氏名
      - match: "default"
        next: jump_氏名_新規

  # ============================================================
  # 新規ルート - 個人情報（診察券番号なし）
  # ============================================================
  - step: jump_氏名_新規
    type: subflow
    flowname: "斗南病院$氏名聴取"
    next: jump_生年月日_新規

  - step: jump_生年月日_新規
    type: subflow
    flowname: "斗南病院$生年月日聴取"
    next: jump_電話番号_新規

  - step: jump_電話番号_新規
    type: subflow
    flowname: "斗南病院$電話番号聴取"
    next: 新規紹介状1

  # ============================================================
  # 新規ルート - 紹介状分岐
  # ============================================================
  - step: 新規紹介状1
    type: hearing
    output_format: enum
    notes: "「斗南病院宛の紹介状、もしくは検診結果はお持ちですか？」有/無で分岐"
    conditions:
      - match: "有"
        next: 手元確認_新規
      - match: "無"
        next: 選定療養費_新規

  - step: 手元確認_新規
    type: hearing
    output_format: enum
    notes: "「紹介状、もしくは検診結果はお手元にございますか？」はい/いいえで分岐。新規紹介状の場合のみ手元確認を実施"
    conditions:
      - match: "はい"
        next: 紹介元医療機関名_新規
      - match: "いいえ"
        next: END_紹介状なし

  # ============================================================
  # 新規ルート - 紹介状あり聴取
  # ============================================================
  - step: 紹介元医療機関名_新規
    type: hearing
    output_format: text
    next: 紹介元電話番号_新規

  - step: 紹介元電話番号_新規
    type: hearing
    output_format: text
    next: 医師指定_新規

  - step: 医師指定_新規
    type: hearing
    output_format: text
    next: 診療科_新規紹介あり

  - step: 診療科_新規紹介あり
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 予約希望日_新規紹介あり

  - step: 予約希望日_新規紹介あり
    type: hearing
    output_format: text
    next: 性別_新規紹介あり

  - step: 性別_新規紹介あり
    type: hearing
    output_format: enum
    next: 病名症状_新規

  - step: 病名症状_新規
    type: hearing
    output_format: text
    next: FAX確認_新規

  - step: FAX確認_新規
    type: announcement
    next: jump_RAG検索_終話前

  # ============================================================
  # 新規ルート - 紹介状なし聴取
  # ============================================================
  - step: 選定療養費_新規
    type: announcement
    next: 診療科_新規紹介なし

  - step: 診療科_新規紹介なし
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 性別_新規紹介なし

  - step: 性別_新規紹介なし
    type: hearing
    output_format: enum
    next: 他院確認_新規

  - step: 他院確認_新規
    type: hearing
    output_format: text
    next: jump_RAG検索_終話前

  # ============================================================
  # 共通個人情報パス（再診/変更/キャンセル/確認）
  # ============================================================
  - step: jump_氏名
    type: subflow
    flowname: "斗南病院$氏名聴取"
    next: jump_生年月日

  - step: jump_生年月日
    type: subflow
    flowname: "斗南病院$生年月日聴取"
    next: jump_電話番号

  - step: jump_電話番号
    type: subflow
    flowname: "斗南病院$電話番号聴取"
    next: jump_診察券番号

  - step: jump_診察券番号
    type: subflow
    flowname: "斗南病院$診察券番号聴取"
    next: 用件分岐_後半

  - step: 用件分岐_後半
    type: context_match_router
    reference_module: "classification"
    notes: "初診確認で上書きされた「再診」、または用件確認で保存された「変更」「キャンセル」「確認」で分岐"
    conditions:
      - match: "再診"
        next: 紹介状2_再診
      - match: "変更"
        next: 変更紹介状
      - match: "キャンセル"
        next: 変更紹介状
      - match: "確認"
        next: 変更紹介状

  # ============================================================
  # 再診ルート - 紹介状分岐
  # ============================================================
  - step: 紹介状2_再診
    type: hearing
    output_format: enum
    notes: "「今回の症状で新たに斗南病院宛の紹介状、もしくは検診結果はお持ちですか？」再診用TTS（新規とは異なる文言）"
    conditions:
      - match: "有"
        next: 手元確認_再診
      - match: "無"
        next: 診療科_再診紹介なし

  - step: 手元確認_再診
    type: hearing
    output_format: enum
    notes: "「紹介状、もしくは検診結果はお手元にございますか？」"
    conditions:
      - match: "はい"
        next: 紹介元医療機関名_再診
      - match: "いいえ"
        next: END_紹介状なし

  # ============================================================
  # 再診ルート - 紹介状あり聴取
  # ============================================================
  - step: 紹介元医療機関名_再診
    type: hearing
    output_format: text
    next: 紹介元電話番号_再診

  - step: 紹介元電話番号_再診
    type: hearing
    output_format: text
    next: 医師指定_再診

  - step: 医師指定_再診
    type: hearing
    output_format: text
    next: 診療科_再診紹介あり

  - step: 診療科_再診紹介あり
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 予約希望日_再診紹介あり

  - step: 予約希望日_再診紹介あり
    type: hearing
    output_format: text
    next: jump_RAG検索_終話前

  # ============================================================
  # 再診ルート - 紹介状なし聴取
  # ============================================================
  - step: 診療科_再診紹介なし
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 予約希望日_再診紹介なし

  - step: 予約希望日_再診紹介なし
    type: hearing
    output_format: text
    next: jump_RAG検索_終話前

  # ============================================================
  # 変更/キャンセル/確認 共通パス - 紹介状・診療科
  # ============================================================
  - step: 変更紹介状
    type: hearing
    output_format: enum
    notes: >
      「斗南病院宛の紹介状、もしくは検診結果はお持ちですか？」
      変更/キャンセル/確認で共有。手元有無の確認はしない（Gen2仕様: 変更紹介状の時は手元有無を確認してはいけない）。
      有/無を保存するのみで分岐なし。
    conditions:
      - match: "default"
        next: 診療科_変キャ確

  - step: 診療科_変キャ確
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 用件分岐_変キャ確

  - step: 用件分岐_変キャ確
    type: context_match_router
    reference_module: "classification"
    notes: "変更/キャンセル/確認で後続ルートを分岐"
    conditions:
      - match: "変更"
        next: 予約日_変更
      - match: "キャンセル"
        next: 予約日_キャンセル
      - match: "確認"
        next: jump_RAG検索_終話前

  # ============================================================
  # 変更ルート
  # ============================================================
  - step: 予約日_変更
    type: hearing
    output_format: datetime
    next: 予約希望日_変更

  - step: 予約希望日_変更
    type: hearing
    output_format: text
    next: 理由_変更

  - step: 理由_変更
    type: hearing
    output_format: text
    next: 残薬確認_変更

  - step: 残薬確認_変更
    type: hearing
    output_format: text
    next: jump_RAG検索_終話前

  # ============================================================
  # キャンセルルート
  # ============================================================
  - step: 予約日_キャンセル
    type: hearing
    output_format: datetime
    next: 理由_キャンセル

  - step: 理由_キャンセル
    type: hearing
    output_format: text
    next: 残薬確認_キャンセル

  - step: 残薬確認_キャンセル
    type: hearing
    output_format: text
    next: jump_RAG検索_終話前

  # ============================================================
  # RAGサブフロー
  # ============================================================
  - step: jump_RAG検索
    type: subflow
    flowname: "斗南病院$RAG検索"
    notes: "問い合わせルート用（pattern 1）。RAG回答後に代表案内へ"
    next: END_代表案内

  - step: jump_RAG検索_終話前
    type: subflow
    flowname: "斗南病院$RAG検索"
    notes: "全正常終話前（pattern 2）。RAG回答後にphonetype分岐→終話へ"
    next: 終話分岐_phonetype

  # ============================================================
  # 終話分岐
  # ============================================================
  - step: 終話分岐_phonetype
    type: context_match_router
    reference_module: "phonetype"
    notes: "電話番号聴取サブフローで設定されたphonetype（携帯=1/その他=2）で分岐"
    conditions:
      - match: "1"
        next: END_通常_携帯
      - match: "2"
        next: END_通常_固定
      - match: "default"
        next: END_通常_固定

  # ============================================================
  # 終話ブロック
  # ============================================================
  - step: END_通常_携帯
    type: termination
    termination_ref: "END_通常_携帯"

  - step: END_通常_固定
    type: termination
    termination_ref: "END_通常_固定"

  - step: END_紹介状なし
    type: termination
    termination_ref: "END_紹介状なし"

  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

