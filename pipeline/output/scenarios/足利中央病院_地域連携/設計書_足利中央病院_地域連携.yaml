# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "緊急確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "history"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "音声のみ（Gen2資料にDTMFタグなし）。「はい」→緊急転送、「いいえ」→施設名聴取へ。OpenAIプロンプトで history=\"緊急案件\"/\"通常\" を設定する想定"

  - order: 2
    name: "施設名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "hospitalName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "音声のみ。「明日は赤十字病院」STT誤認識は profile_words で対応"

  - order: 3
    name: "入電者氏名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "contactName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "音声のみ。カタカナで保存（Gen2ルール「氏名は漢字変換せずにカタカナで文字起こし」）"

  - order: 4
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "相談・紹介"
      - "日程調整"
      - "その他"
    notes: "DTMF 1=相談・紹介, 2=日程調整, 3=その他。復唱後「いいえ」で再聴取。同義語：「診察/印刷/定期/新薬/再診/最新/禁忌/診療」→ 日程調整または相談・紹介 に寄せる（OpenAIプロンプトで対応）"

  - order: 5
    name: "病名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "disease"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "相談・紹介ルートのみ聴取。音声のみ。復唱なし"

  - order: 6
    name: "相談_内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "相談・紹介ルート。音声のみ。復唱なし"

  - order: 7
    name: "日程_内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "日程調整ルート。音声のみ。復唱なし"

  - order: 8
    name: "希望日時聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "DesiredreservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "日程調整ルート。必須復唱。相対表現（明日/来週/来月等）を YYYY-MM-DD に変換。STT「2月」/「4月」誤認識補正（今日の日付基準）をOpenAIプロンプトに含める。10月以降に1-9月言及時は翌年"

  - order: 9
    name: "返信期限確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "replyDeadline"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "日程調整ルート。音声のみ。「特になし」等の曖昧回答も許容するため text"

  - order: 10
    name: "その他_内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "その他ルート。音声のみ。復唱なし"

  - order: 11
    name: "最後の問い合わせ"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "question"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "全ルート共通の最終ヒアリング。「特になし」等も許容"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。足利中央病院の、地域連携室専用、AI電話です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "緊急確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "緊急確認"
    tts_announcement: "こちらのお電話は本日中に対応が必要な緊急案件になりますでしょうか。緊急の場合は、はい、違う場合は、いいえ、とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
      mapping:
        - input: "「はい」「緊急」「はい、緊急です」「急ぎ」など肯定を含む"
          output: "はい"
        - input: "「いいえ」「違う」「通常」「急ぎではない」など否定を含む"
          output: "いいえ"
