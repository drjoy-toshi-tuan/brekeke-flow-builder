# ============================================================
# 設計書: 足利中央病院 地域連携
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/【地域連携】：足利中央病院_20260417.md
# 移管ノート: docs/migration/gen2_足利中央病院_地域連携.md
# 生成日: 2026-04-20
# 生成者: @director
# ============================================================
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "足利中央病院"
  group_name: "足利中央病院"
  flow_name: "足利中央病院$地域連携"
  target_facility: "足利中央病院（地域連携室）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"        # IVR着信番号。Brekeke設定時に設定
  business_hours: "なし（24時間受付想定。Gen2 yaml に時間チェック記載なし）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "足利中央病院$地域連携"
      role: "main"
      description: "医療機関の地域連携室スタッフからの問い合わせを受け、相談・紹介 / 日程調整 / その他の用件別に必要情報を聴取する"
  subflows:
    - name: "足利中央病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "入電番号が非通知以外の場合は「今おかけの番号でよろしいですか？」で確認、はい→着信番号流用。Gen2資料の電話番号_入電番号判定〜電話番号_復唱確認ブロック群に相当。標準サブフロー（個人情報サブフロー.bivr）を完全コピーし、プレフィックスのみ施設名に置換"
    - name: "足利中央病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "患者氏名（カタカナ）。標準サブフローをそのまま使用。苗字のみ検知・下の名前追加聴取は標準サブフロー内で処理"
    - name: "足利中央病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 標準実装。西暦/和暦→YYYY-MM-DD正規化 + 復唱確認"

# --- セクション3: フローの目的 ---
purpose: |
  足利中央病院 地域連携室に対する紹介元医療機関からの問い合わせを自動応対する。
  緊急案件は代表電話（0284-72-8401）へ即時転送し、通常案件は相談・紹介 / 日程調整 / その他の3分類で
  必要情報（施設名・入電者氏名・連絡先電話番号・患者情報・病名・希望日時等）を聴取して担当者の折り返し
  対応に引き継ぐ。当日予約希望は代表電話案内で終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "足利中央病院$地域連携"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知(TTS → 完了フラグ_非通知 → 切断)
            └─ 通常   → 冒頭_アナウンス(TTS)
                          → 緊急確認(hearing enum)
                              ├─ はい → 緊急転送(call_transfer → 0284-72-8401)
                              │           ├─ 成功 → END_転送成功 (status=3)
                              │           └─ 失敗 → END_転送失敗 (status=9)
                              └─ いいえ → 施設名聴取(hearing text)
                                            → 入電者氏名聴取(hearing text)
                                              → jump_電話番号聴取(subflow)
                                                → 用件確認(hearing enum + echo_back)
                                                    → 用件_分岐(context_match_router: classification)
                                                        ├─ その他 → その他_内容聴取 → 最後の問い合わせ → END_完了
                                                        └─ 相談・紹介/日程調整 → jump_氏名聴取(subflow)
                                                                                  → jump_生年月日聴取(subflow)
                                                                                    → 用件_分岐2(context_match_router: classification)
                                                                                        ├─ 相談・紹介 → 病名聴取 → 相談_内容聴取 → 最後の問い合わせ → END_完了
                                                                                        └─ 日程調整  → 日程_内容聴取 → 希望日時聴取(echo_back)
                                                                                                        → 日程_当日判定(script: future_date)
                                                                                                            ├─ 当日/過去 → END_電話案内
                                                                                                            └─ 未来      → 返信期限確認 → 最後の問い合わせ → END_完了
    notes: |
      ・Gen2では用件_分岐と生年月日後の再分岐が1箇所に集約されていたが、相談・紹介/日程調整は個人情報聴取
        （氏名→生年月日）を共通経由するため、用件_分岐（subflow前の1段）と用件_分岐2（subflow後の2段目）
        の2段階 ContextMatchRouter を配置する。
      ・"その他" は個人情報を聴取しないため用件_分岐で即座に内容聴取へ分岐。
      ・営業時間チェックは無し（Gen2資料に時間制限記載なし）。
      ・非通知は incoming-classifier で END_非通知 に送る。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  # --- 冒頭アナウンス ---
  - step: 冒頭_アナウンス
    type: announcement
    next: 緊急確認

  # --- 緊急確認（Pattern A: OpenAI直後分岐）---
  - step: 緊急確認
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 緊急転送
      - match: "いいえ"
        next: 施設名聴取

  # --- 緊急転送（Call Transfer）---
  # call_transfer ブロックは status=3(転送成功)/9(転送失敗) と END_転送成功/失敗 終話チェーンを scaffold が自動生成
  - step: 緊急転送
    type: call_transfer
    transfer_type: "Blind Transfer"

  # --- 施設名聴取（text。「明日は赤十字病院」→「足利赤十字病院」の特別正規化は profile_words と special_notes で対応）---
  - step: 施設名聴取
    type: hearing
    output_format: text
    next: 入電者氏名聴取

  # --- 入電者氏名聴取 ---
  - step: 入電者氏名聴取
    type: hearing
    output_format: text
    next: jump_電話番号聴取

  # --- 電話番号聴取サブフロー ---
  - step: jump_電話番号聴取
    type: subflow
    flowname: "足利中央病院$電話番号聴取"
    next: 用件確認

  # --- 用件確認（Pattern B: echo_back + ContextMatchRouter で分岐）---
  - step: 用件確認
    type: hearing
    output_format: enum
    next: 用件_分岐

  # --- 用件_分岐: その他 は個人情報聴取をスキップ ---
  - step: 用件_分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "相談・紹介"
        next: jump_氏名聴取
      - match: "日程調整"
        next: jump_氏名聴取
      - match: "その他"
        next: その他_内容聴取

  # --- 氏名聴取サブフロー（相談・紹介/日程調整で共有）---
  - step: jump_氏名聴取
    type: subflow
    flowname: "足利中央病院$氏名聴取"
    next: jump_生年月日聴取

  # --- 生年月日聴取サブフロー ---
  - step: jump_生年月日聴取
    type: subflow
    flowname: "足利中央病院$生年月日聴取"
    next: 用件_分岐2

  # --- 用件_分岐2: 個人情報聴取後に相談・紹介/日程調整で分岐 ---
  - step: 用件_分岐2
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "相談・紹介"
        next: 病名聴取
      - match: "日程調整"
        next: 日程_内容聴取

  # --- 相談・紹介ルート ---
  - step: 病名聴取
    type: hearing
    output_format: text
    next: 相談_内容聴取

  - step: 相談_内容聴取
    type: hearing
    output_format: text
    next: 最後の問い合わせ

  # --- 日程調整ルート ---
  - step: 日程_内容聴取
    type: hearing
    output_format: text
    next: 希望日時聴取

  - step: 希望日時聴取
    type: hearing
    output_format: datetime
    next: 日程_当日判定

  # --- 当日判定スクリプト（今日→電話案内、未来→返信期限確認）---
  - step: 日程_当日判定
    type: script
    script_template: future_date
    reference_module: "OpenAI_希望日時聴取"
    conditions:
      - match: "FAIL"
        next: END_電話案内
      - match: "SUCCESS"
        next: 返信期限確認

  - step: 返信期限確認
    type: hearing
    output_format: text
    next: 最後の問い合わせ

  # --- その他ルート ---
  - step: その他_内容聴取
    type: hearing
    output_format: text
    next: 最後の問い合わせ

  # --- 共通: 最後の問い合わせ ---
  - step: 最後の問い合わせ
    type: hearing
    output_format: text
    next: END_完了

  # --- 終話 ---
  - step: END_完了
    type: termination
    termination_ref: "END_完了"

  - step: END_電話案内
    type: termination
    termination_ref: "END_電話案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
