# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【最重要】1回聴取禁止 / 再ヒアリング禁止。既取得 context は再質問しない。OpenAI各モジュールの prompt に「既取得 context の再質問禁止」「不足項目のみ質問」ルールを含めること（prompter）"
  - "復唱する項目は以下の3項目のみ: (1) 用件確認（echo_back=true）、(2) 患者生年月日（生年月日サブフロー内蔵）、(3) 連絡先電話番号（電話番号サブフロー内蔵）、(4) 希望日時（echo_back=true）。他は一切復唱しない"
  - "施設名聴取の特別正規化: STT 結果が「明日は赤十字病院」の場合、hospitalName=\"足利赤十字病院\" に固定正規化する。施設名聴取 OpenAI プロンプト（または profile_words）に明記"
  - "入電者氏名・患者氏名は漢字変換せずカタカナで保存する。「カタカナで」と入電者に質問するのは禁止"
  - "患者氏名聴取（氏名サブフロー内）: 苗字のみ発話時は「下のお名前もお伺いしてもよろしいですか？」と追加聴取する"
  - "希望日時の正規化: STTは「2月」「4月」を誤認識しやすい。着信日時基準で補正すること。相対表現（明日/明後日/来週の月曜等）は YYYY-MM-DD に変換。10月以降に1-9月言及時は翌年として解釈"
  - "緊急案件の即時転送: 緊急確認で「はい」の場合、Call Transfer で 0284-72-8401 に Blind Transfer する。history=\"緊急案件\"、status=3 が自動格納される"
  - "口調ルール: 全て丁寧語。「かしこまりました」可。「ありがとうございます。」「お気軽に」「おっしゃってください」禁止。質問時は「お話ください」に統一。回答受領後に「ありがとうございます」は言わず即次へ進む"
  - "再質問時の固定テンプレート（Retry モジュール TTS 固定）: 「申し訳ありません。うまく聞き取れませんでした。ゆっくり話すとAIがうまく聞き取れません。普通のスピードではっきりとお話しください。再度伺います。」+（元の固定質問文を厳密再提示）。ユーザー発話の挿入禁止"
  - "読み仮名の固定ルール: 「直通」はチョクツウと読む（ナオミチ禁止）。TTSテキストで必要箇所をカタカナ固定する"
  - "SSML 禁止: Gen2資料に <speak type=\"telephone\"> / <forward> / <dtmf/> 等のタグがあるが、Gen3では一切使用しない（memory: feedback_tts_ai_no_ssml）。電話番号読み上げは {tts_g:...} 内で通常テキスト。<forward> は call_transfer ブロックに変換済み"
  - "営業時間チェック: Gen2資料に明示的な時間制限記載なし。24時間受付想定（use_acceptance_times: false）"
  - "FAQ/RAG: Gen2資料にFAQ本体が含まれていないため、Gen3では RAG サブフロー省略。FAQ記載なし質問の特別分岐も配置しない"
  - "Gen2 function required フィールドで本シナリオ未使用のもの（medicalCardNumber / reservationDate / reason / institution / introduction）は saveContextModel2DB に含めない。Dr.JOY画面の整理のため"
  - "status=0（Gen2 の途中切断）は Gen3 では使用禁止。scaffold が自動生成する非通知/時間外/聴取失敗終話チェーンは status=2/6/3 に固定"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（施設ID）— Dr.JOY 管理画面で確認。設計書には不要"
    resolved: false
  - item: "IVR着信電話番号（ARS番号）— Brekeke 設定時に設定。設計書には不要"
    resolved: false
  - item: "緊急時の転送先電話番号（0284-72-8401）は代表電話と同じで問題ないか確認（Gen2資料通り）"
    resolved: false
  - item: "SMS送信文面（smsFlag=1 時）— Dr.JOY 管理画面で設定。地域連携室宛の折り返し案内SMS内容を確認"
    resolved: false
  - item: "「最後の問い合わせ」（question）の扱い: 何か回答があった場合の後続処理（担当者への申し送り）は Dr.JOY 側で運用するか確認"
    resolved: false
  - item: "Gen2 の 1-4「FAQ不適合アナウンス」は Gen3 では RAG 不使用のため省略する方針で問題ないか確認（FAQ本体が提供されればパターン1または3での再設計を検討）"
    resolved: false
