  - module_name: "変更内容_判別"
    purpose: "変更内容判別（3 種、DTMF + 音声）"
    announcement: "変更またはキャンセル内容を、次の3つのうちの、いずれかでお話ください。1番、受診内容の変更。2番、予約日の変更。3番、予約のキャンセル。それでは、お話ください。"
  - module_name: "変更詳細_受診内容"
