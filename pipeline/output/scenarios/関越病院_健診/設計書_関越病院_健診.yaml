# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1（commubo）→Gen3 移管。13 サブシナリオ（main / 当日予約判別 / 用件聞き取り / 希望コース / 予約希望_人数 / 担当者名_受診者名 / 生年月日聴取 / 連絡先電話番号聞き取り / 現在の予約日 / 内容or日程orキャンセル 判別 / 変更内容または時期 詳細 / 理由聴取（変更キャンセル）/ 問い合わせ内容 / 企業団体名聴取 / 電話番号区切り / 3_2~3_31）を 9 ブロック型 + augment（着信元判別）で再構成"
  - "Gen1 動的値 `<? $course ?>` `<? $予約日の読み ?>` 等は Brekeke 公式 `<% context_name %>` 形式に変換（移管ノート 34 行目）"
  - "Gen1「3/2〜3/31 ブレケケ移行アナウンス」（番号変更告知 050-1808-1225）は一時運用済みのため除外（移管ノート 14 行目）"
  - "Gen1「企業団体名聴取.yaml」は main.yaml から到達経路なしのため director 判断で除外（移管ノート 25 行目、確認レポート N-10）"
  - "営業時間: 月〜金 8:30〜17:30 / 土 8:30〜12:00 / 日祝休 / 12/30 12:00〜1/4 年末年始休。Gen3 では acceptance_times 標準セット、年末年始は Dr.JOY 側スケジュールで吸収（移管ノート 13 行目）"
  - "用件確認・希望コース・変更内容判別の各 hearing は echo_back: true（Gen1 で各々「〇〇でよろしいですか？」復唱を実施）。scaffold が Re-confirmation node + 復唱 STT + 復唱 OpenAI を自動生成"
  - "PatientName サブフロー 1 枠ルール準拠（モジュール選定ガイド §3.1.1）: 受診者名（新規/変更/折り返し）→ patientName サブフロー、担当者名（その他）→ callerName hearing"
  - "その他ルートは生年月日聴取をスキップ（Gen1「用件の分岐_2」仕様）。氏名（callerName） → 連絡先電話番号 → END_問い合わせ の最短経路"
  - "終話分岐は Pattern B（後段）: 用件分岐_終話 (CMR: classification) + 用件分岐_変更キャンセル (CMR: changeContent) の 2 段で 4 種正常終話に分岐"
  - "着信元_市の健診_判定 (augment, augment_pattern: none_applicable) は Brekeke 側で着信番号比較モジュールが整備されたら scaffold_generator に新ブロック型として昇格 or ContextMatchRouter で telephoneNumber 直接参照の動作検証後に置換"
  - "smsFlag 配分: 新規/変更/問い合わせ → 1（Gen1「予約変更確認」TTS で SMS 言及あり）、キャンセル/折り返し → -1（Gen1 TTS で SMS 言及なし）。確認レポート N-3"
  - "Gen1 status=0（途中切断・代表案内）は Gen3 では status=2 に置換（CLAUDE.md ルール）。代表電話案内系は status=2"
  - "incoming-classifier の WebRTC 分岐は通常フローに合流（モジュール選定ガイド §1.3）"

