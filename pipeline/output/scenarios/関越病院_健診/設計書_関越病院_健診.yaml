version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "関越病院"
  scenario_name: "健診"
  group_name: "関越病院"
  flow_name: "関越病院$健診"
  target_facility: "関越病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "049-285-3161"
  business_hours: "月〜金 8:30〜17:30 / 土 8:30〜12:00 / 日祝休 / 12/30 12:00〜1/4 年末年始休（スケジュールはDr.JOY側で設定）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  # プラットフォーム選択
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# CLAUDE.md Rule 9 準拠: 個人情報聴取サブフローは個人情報サブフロー.bivr を完全コピー。
# フロー名プレフィックスのみ施設名に置換。構造・接続・スクリプトの変更は禁止。
flow_structure:
  type: "subflow"
  flows:
    - name: "関越病院$健診"
      role: "main"
      description: >
        冒頭チェーン → 着信元_市の健診_判定（augment）→ 用件_聴取 (4 分岐: 新規/変更キャンセル/折り返し/その他)
        → ルート別聴取 (新規: 希望コース → 予約希望/人数 / 変更キャンセル: 現在予約日 → 変更内容判別 → 詳細 → 理由 / 折り返し: 案内 / その他: 当日予約確認 → 問い合わせ内容)
        → ルート別 受診者名 announcement → patientName サブフロー (新規/変更/折り返しのみ)
        → jump_生年月日聴取 (新規/変更/折り返しのみ)
        → jump_電話番号聴取 (全ルート共通)
        → 用件分岐_終話 (CMR: classification) → END_新規 / END_変更キャンセル_分岐 / END_折り返し / END_問い合わせ
        → END_変更キャンセル_分岐 (CMR: changeContent) → END_変更 / END_キャンセル
    - name: "関越病院$氏名聴取"
      role: "sub"
      description: "受診者名聴取（patientName / 音声のみ / 復唱なし）→ 結果返却"
    - name: "関越病院$生年月日聴取"
      role: "sub"
      description: "生年月日聴取（DTMF + 音声、和暦/西暦判別、DOB Re-confirmation 復唱あり）→ 結果返却"
    - name: "関越病院$電話番号聴取"
      role: "sub"
      description: "連絡先電話番号聴取（incoming-classifier 携帯/固定 → Phone Normalization → Re-confirmation 復唱）→ phonetype 保存 → 結果返却"

  subflows:
    - name: "関越病院$氏名聴取"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 / モジュール選定ガイド §3.1.1 準拠（PatientName 1 枠）。受診者名（新規/変更キャンセル/折り返し用）。Gen1 では用件分岐で 3 種 TTS だが Gen3 では直前 announcement で文脈案内 → サブフロー共通化"
    - name: "関越病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。DOB Re-confirmation 復唱あり。和暦/西暦自動判別。新規/変更キャンセル/折り返し のみで呼出（その他ルートは生年月日スキップ - Gen1 用件の分岐_2 仕様）"
    - name: "関越病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。incoming-classifier で携帯/固定判別 → Phone Normalization → Re-confirmation telephone 復唱。phonetype コンテキスト返却。全ルート共通（新規/変更キャンセル/折り返し/その他）で呼出"

# --- セクション3: フローの目的 ---
purpose: >
  関越病院の健診センター専用 AI 電話。健診（特定健診・人間ドック・一般健診・企業健診）の新規予約・
  変更/キャンセル・折り返し連絡・その他問合せを受け付け、用件分類・コース選択・希望時期/人数・
  予約変更内容・受診者名・生年月日・連絡先電話番号を聴取して、Dr.JOY 側に登録 + 担当者からの
  折り返し電話 / SMS 連絡を自動化する。Gen1 (commubo) からの移管。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "関越病院$健診"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                        └─ 受付可 → 冒頭_アナウンス
                                      → 着信元_市の健診_判定 [augment]
                                          ├─ 05017070320 / 08044220245 → 市の健診_案内 → 用件_聴取
                                          └─ 通常番号 → 用件_聴取

      --- 用件_聴取 (hearing/enum/classification, echo_back=true) ---
      用件_聴取 [DTMF 1=新規, 2=変更キャンセル, 3=その他, 4=折り返し]
        ├─ 新規 → 希望_コース
        ├─ 変更キャンセル → 現在_予約日
        ├─ 折り返し → 折り返し_案内
        └─ other (= その他) → 当日予約_確認

      --- 新規ルート ---
      希望_コース (hearing/enum/course, echo_back=true)
        [DTMF 1=特定健診, 2=人間ドック, 3=一般健診, 4=企業健診]
        → 予約_希望_人数 (hearing/text/desiredReservation)
        → 案内_氏名_新規 (announcement: "それでは、受診される方、または代表者のお名前を、フルネームでお話ください。")
        → 共通受診者名・連絡先聴取へ

      --- 変更/キャンセルルート ---
      現在_予約日 (hearing/datetime/reservationDate, echo_back=true)
        → 変更内容_判別 (hearing/enum/changeContent, echo_back=true)
          [DTMF 1=受診内容, 2=日程変更, 3=キャンセル]
            ├─ 受診内容 → 変更詳細_受診内容 (hearing/text/details) → 変更理由_聴取
            ├─ 日程変更 → 変更詳細_日程 (hearing/datetime/desiredDate) → 変更理由_聴取
            └─ other (= キャンセル) → キャンセル理由_聴取
        → 変更理由_聴取 / キャンセル理由_聴取 (hearing/text/reason)
        → 案内_氏名_変更 (announcement: "それでは、予約された方のお名前を、フルネームでお話ください。")
        → 共通受診者名・連絡先聴取へ

      --- 折り返しルート ---
      折り返し_案内 (announcement: "お忙しい中、折り返しのご連絡をいただきまして、ありがとうございます。それでは、予約された方のお名前を、フルネームでお話ください。")
        → 共通受診者名・連絡先聴取へ

      --- その他ルート ---
      当日予約_確認 (hearing/enum/sameDayInquiry)
        [DTMF 1=はい, 2=いいえ]
          ├─ 当日 → END_代表電話案内
          └─ other (= 明日以降) → 問い合わせ_内容
        問い合わせ_内容 (hearing/text/reason)
          → 担当者名_その他 (hearing/text/callerName, TTS: "お電話いただいている方のお名前を、フルネームでお話ください。")
          → jump_電話番号聴取 (共通)
          → 用件分岐_終話

      --- 共通 受診者名・連絡先聴取 (新規/変更キャンセル/折り返し のみ) ---
      jump_氏名聴取 (PatientName サブフロー)
        → jump_生年月日聴取
        → jump_電話番号聴取
        → 用件分岐_終話

      --- 終話分岐 ---
      用件分岐_終話 (ContextMatchRouter: classification)
        ├─ 新規 → END_新規
        ├─ 変更キャンセル → 用件分岐_変更キャンセル
        ├─ 折り返し → END_折り返し
        └─ other (= その他) → END_問い合わせ

      用件分岐_変更キャンセル (ContextMatchRouter: changeContent)
        ├─ キャンセル → END_キャンセル
        └─ other (= 受診内容/日程変更) → END_変更
    notes: |
      用件確認は Pattern A（直後分岐）: classification を保存し、即座に各ルート専用処理へ。
      終話は Pattern B（後段分岐）: 共通 jump_電話番号聴取 通過後に CMR で classification × changeContent の 2 段で分岐。
      その他ルートのみ生年月日スキップ（Gen1 用件の分岐_2 仕様）。
      着信元_市の健診_判定 は augment 暫定（既存 9 ブロック型で表現困難）、確認レポート N-4 参照。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ===== 冒頭ブロック =====
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 着信元_市の健診_判定

  # ===== 着信元番号判別（augment 暫定）=====
  - step: 着信元_市の健診_判定
    type: augment
    augment_pattern: none_applicable
    augment_purpose: |
      Gen1「着信元番号判断」の Gen3 移管。SIP From / 着信番号が
      `05017070320` または `08044220245` の場合、市の乳がん検診・胃がん検診
      ご予約の代表番号への誘導 TTS（市の健診_案内）を発話してから通常フローへ合流。
      既存 9 ブロック型では incoming-classifier が系統分類（携帯/固定/非通知/海外）
      のみで個別番号比較ができず、ContextMatchRouter で telephoneNumber を直接
      参照する設計は動作未検証のため暫定で augment 配置。
      Brekeke 側で着信番号比較モジュールが整備されたら scaffold_generator に
      新ブロック型として昇格、または telephoneNumber CMR 動作検証後に置換予定。
    next: 用件_聴取

  # ===== 用件_聴取 (Pattern A: 直後分岐) =====
  - step: 用件_聴取
    type: hearing
    output_format: enum
    echo_back: true
    save_to: classification
    conditions:
      - match: "新規"
        next: 希望_コース
      - match: "変更キャンセル"
        next: 現在_予約日
      - match: "折り返し"
        next: 折り返し_案内
      - match: "other"
        next: 当日予約_確認

  # ===== 新規ルート =====
  - step: 希望_コース
    type: hearing
    output_format: enum
    echo_back: true
    save_to: course
    next: 予約_希望_人数

  - step: 予約_希望_人数
    type: hearing
    output_format: text
    save_to: desiredReservation
    next: 案内_氏名_新規

  - step: 案内_氏名_新規
    type: announcement
    next: 氏名聴取

  # ===== 変更/キャンセルルート =====
  - step: 現在_予約日
    type: hearing
    output_format: datetime
    echo_back: true
    save_to: reservationDate
    next: 変更内容_判別

  - step: 変更内容_判別
    type: hearing
    output_format: enum
    echo_back: true
    save_to: changeContent
    conditions:
      - match: "受診内容"
        next: 変更詳細_受診内容
      - match: "日程変更"
        next: 変更詳細_日程
      - match: "other"
        next: キャンセル理由_聴取

  - step: 変更詳細_受診内容
    type: hearing
    output_format: text
    save_to: details
    next: 変更理由_聴取

  - step: 変更詳細_日程
    type: hearing
    output_format: datetime
    save_to: desiredDate
    next: 変更理由_聴取

  - step: 変更理由_聴取
    type: hearing
    output_format: text
    save_to: reason
    next: 案内_氏名_変更

  - step: キャンセル理由_聴取
    type: hearing
    output_format: text
    save_to: reason
    next: 案内_氏名_変更

  - step: 案内_氏名_変更
    type: announcement
    next: 氏名聴取

  # ===== 折り返しルート =====
  - step: 折り返し_案内
    type: announcement
    next: 氏名聴取

  # ===== 共通: 氏名 → 生年月日 → 電話番号 (新規/変更/折り返し のみ) =====
  - step: 氏名聴取
    type: subflow
    flowname: "関越病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "関越病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "関越病院$電話番号聴取"
    next: 用件分岐_終話

  # ===== その他ルート =====
  - step: 当日予約_確認
    type: hearing
    output_format: enum
    save_to: sameDayInquiry
    conditions:
      - match: "当日"
        next: END_代表電話案内
      - match: "other"
        next: 問い合わせ_内容

  - step: 問い合わせ_内容
    type: hearing
    output_format: text
    save_to: reason
    next: 担当者名_その他

  - step: 担当者名_その他
    type: hearing
    output_format: text
    save_to: callerName
    next: 電話番号聴取

  # ===== 終話分岐 =====
  - step: 用件分岐_終話
    type: context_match_router
    reference_module: "用件_聴取"
    conditions:
      - match: "新規"
        next: END_新規
      - match: "変更キャンセル"
        next: 用件分岐_変更キャンセル
      - match: "折り返し"
        next: END_折り返し
      - match: "other"
        next: END_問い合わせ

  - step: 用件分岐_変更キャンセル
    type: context_match_router
    reference_module: "変更内容_判別"
    conditions:
      - match: "キャンセル"
        next: END_キャンセル
      - match: "other"
        next: END_変更

  # ===== 終話ブロック =====
  - step: END_新規
    type: termination
    termination_ref: "END_新規"

  - step: END_変更
    type: termination
    termination_ref: "END_変更"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_折り返し
    type: termination
    termination_ref: "END_折り返し"

  - step: END_問い合わせ
    type: termination
    termination_ref: "END_問い合わせ"

  - step: END_代表電話案内
    type: termination
    termination_ref: "END_代表電話案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # --- 標準フィールド (itemDefault: true) ---
  - context_name: "classification"
