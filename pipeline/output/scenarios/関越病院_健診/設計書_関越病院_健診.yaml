    deletable: false
    notes: "Gen1 希望コース.yaml entity コース を踏襲。新規ルートのみで聴取"

  - context_name: "desiredReservation"
    context_name_jp: "希望時期/人数"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "Gen1 予約希望_人数.yaml で聴取された自由テキスト（時期 + 人数 + 決まっていない可）。新規ルートのみで聴取"

  - context_name: "changeContent"
    context_name_jp: "変更内容"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "受診内容"
      - id: "2"
        order: "2"
        value: "日程変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
    item_default: false
    editable: true
    deletable: false
    notes: "Gen1 内容or日程orキャンセル 判別.yaml entity 変更内容 を踏襲。変更/キャンセルルートのみで聴取。終話分岐_変更キャンセル の判定キー"

  - context_name: "details"
    context_name_jp: "変更詳細(受診内容)"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "Gen1 変更内容または時期 詳細.yaml「内容確認」で聴取された自由テキスト。受診内容変更ルートのみで聴取"

  - context_name: "desiredDate"
    context_name_jp: "希望日程"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "Gen1 変更内容または時期 詳細.yaml「日程確認」で聴取された日付。日程変更ルートのみで聴取"

  - context_name: "callerName"
    context_name_jp: "担当者名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "Gen1 担当者名_受診者名.yaml「その他お問い合わせ」分岐の TTS に対応。その他ルートのみで聴取（お電話いただいている方の氏名）"

  - context_name: "sameDayInquiry"
    context_name_jp: "当日予約問合せ"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "Gen1 当日予約判別.yaml の Y/N 判定値（当日 / 明日以降）。その他ルートでの分岐用。Dr.JOY 画面表示の要否は要確認（NON-BLOCKER N-8）"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "変更キャンセル"
      - "折り返し"
      - "その他"
    notes: "DTMF 1=新規, 2=変更キャンセル, 3=その他, 4=折り返し。Gen1 用件聞き取り.yaml の DTMF 分岐踏襲。Pattern A: 直後分岐"

  - order: 2
    name: "希望_コース"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "course"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "特定健診"
      - "人間ドック"
      - "一般健診"
      - "企業健診"
    notes: "DTMF 1=特定健診, 2=人間ドック, 3=一般健診, 4=企業健診。Gen1 希望コース.yaml DTMF 分岐踏襲。Gen1 動的値 `<? $course ?>` は Brekeke 公式 `<% course %>` に変換（復唱 TTS で使用）"

  - order: 3
    name: "予約_希望_人数"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservation"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 予約希望_人数.yaml「時期・人数確認」: 自由テキスト。「決まっていない」発話も許容（OpenAI で要約整理）"

  - order: 4
    name: "現在_予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "Gen1 現在の予約日.yaml: DTMF 4 桁（MMDD）/ 音声日付。和暦/西暦自動正規化。echo_back: true で復唱（Gen1「<? $予約日の読み ?>」相当 → scaffold が #data# 復唱を自動配置）"

  - order: 5
    name: "変更内容_判別"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "changeContent"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "受診内容"
      - "日程変更"
      - "キャンセル"
    notes: "DTMF 1=受診内容, 2=日程変更, 3=キャンセル。Gen1 内容or日程orキャンセル 判別.yaml DTMF 分岐踏襲。echo_back: true で「受診内容の変更でよろしいですか？」「予約日の変更でよろしいですか？」「ご予約のキャンセルでよろしいですか？」復唱（Gen1 復唱 TTS 踏襲）"

  - order: 6
    name: "変更詳細_受診内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 変更内容または時期 詳細.yaml「内容確認」: 自由テキスト。受診内容変更ルートのみ"

  - order: 7
    name: "変更詳細_日程"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: false
    save_to: "desiredDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "Gen1 変更内容または時期 詳細.yaml「日程確認」: DTMF 4 桁（MMDD）/ 音声日付。日程変更ルートのみ"

  - order: 8
    name: "変更理由_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 理由聴取（変更キャンセル）.yaml「変更理由確認」: 「ご予約変更の理由をお話下さい。」自由テキスト。受診内容変更/日程変更ルートのみ"

  - order: 9
    name: "キャンセル理由_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 理由聴取（変更キャンセル）.yaml「キャンセル理由確認」: 「ご予約キャンセルの理由をお話下さい。」自由テキスト。キャンセルルートのみ"

  - order: 10
    name: "当日予約_確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "sameDayInquiry"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "当日"
      - "明日以降"
    notes: "DTMF 1=はい(当日), 2=いいえ(明日以降)。Gen1 当日予約判別.yaml: 「健診日 当日のご連絡、お問い合わせですか？」その他ルートのみ"

  - order: 11
    name: "問い合わせ_内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 問い合わせ内容.yaml「内容聴取」: 「お問い合わせの内容をお話ください。」自由テキスト。その他ルート（明日以降分岐）のみ"

  - order: 12
    name: "担当者名_その他"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "callerName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "Gen1 担当者名_受診者名.yaml「その他お問い合わせ」分岐: 「お電話いただいている方のお名前を、フルネームでお話ください。」その他ルートのみ"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件_聴取"
    tts_announcement: "ご用件を、次の4つのうち、いずれかでお話ください。1番、健診の予約。2番、予約の変更、キャンセル。3番、その他お問い合わせ。4番、当施設から着信があった方の折り返し連絡。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規"
        - "変更キャンセル"
        - "折り返し"
        - "その他"
      mapping:
        - input: "DTMF 1 または 「健診の予約」「健診予約」「取りたい」「取得」「初診」「紹介状」「予約を取りたい」「健康診断」「人間ドック」等"
          output: "新規"
        - input: "DTMF 2 または 「変更」「キャンセル」「日程」「日付」「時間」「変え」「別の」「取り消し」「取消」「やめる」「予約変更」「予約キャンセル」「予約のキャンセル」等"
          output: "変更キャンセル"
        - input: "DTMF 3 または 「その他」「お問い合わせ」「教えて」「質問」等"
          output: "その他"
        - input: "DTMF 4 または 「折り返し」「折返し」「コールバック」「電話が来た」「連絡が欲しい」等"
          output: "折り返し"
      no_result_condition: "上記いずれにも該当しない発話・無言・聞き取り不能"
    save_to: "classification"
    next_step: "（Pattern A 分岐: 新規→希望_コース / 変更キャンセル→現在_予約日 / 折り返し→折り返し_案内 / other→当日予約_確認）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "希望_コース"
    tts_announcement: "ご希望のメニューを次の4つのうちのいずれかでお話ください。番号またはダイヤルプッシュでも可能です。1番、特定健診。2番、人間ドック。3番、一般健診。4番、企業健診。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "特定健診"
        - "人間ドック"
        - "一般健診"
        - "企業健診"
      mapping:
        - input: "DTMF 1 または 「特定」「特定健診」「一」「一番」「いちばん」"
          output: "特定健診"
        - input: "DTMF 2 または 「人間」「ドック」「人間ドック」「基本ドック」「二」「二番」「にばん」"
          output: "人間ドック"
        - input: "DTMF 3 または 「一般」「一般健診」「健保」「健保組合」「健保組合の検診」「三」「三番」「さんばん」"
          output: "一般健診"
        - input: "DTMF 4 または 「企業」「会社」「企業健診」「費用検針」（誤認識補正含む）「四」「四番」「よんばん」"
          output: "企業健診"
      no_result_condition: "上記いずれの健診コースにも該当しない発話・無言・聞き取り不能"
    save_to: "course"
    next_step: "予約_希望_人数"
    retry_failure: "end_failure"

  - step_name: "予約_希望_人数"
    tts_announcement: "受診を希望されている時期や、人数をお話ください。決まっていない場合には、決まっていない、とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「3月上旬」「来月」「2 名」等の希望時期 + 人数"
          output: "そのままテキスト保存"
        - input: "「決まっていない」「いません」「ない」「まだ」"
          output: "決まっていない"
      no_result_condition: ""
    save_to: "desiredReservation"
    next_step: "案内_氏名_新規"
    retry_failure: "skip"

  - step_name: "現在_予約日"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話ください。AIが予約日を正しく認識しない場合は、ダイヤルプッシュでの入力も可能です。日付でお話いただくか、ダイヤルプッシュで月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping:
        - input: "「4月1日」「来週の火曜日」等の日付発話"
          output: "YYYY-MM-DD 形式に正規化（過去日なら +1 年）"
        - input: "DTMF 4 桁（例: 0401）"
          output: "MMDD を YYYY-MM-DD に変換（過去日なら +1 年）"
      no_result_condition: "日付発話なし・DTMF 4 桁取得不可"
    save_to: "reservationDate"
    next_step: "変更内容_判別"
    retry_failure: "end_failure"

  - step_name: "変更内容_判別"
    tts_announcement: "変更またはキャンセル内容を、次の3つのうちの、いずれかでお話ください。1番、受診内容の変更。2番、予約日の変更。3番、予約のキャンセル。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "受診内容"
        - "日程変更"
        - "キャンセル"
      mapping:
        - input: "DTMF 1 または 「受診内容」「内容」「コース」「メニュー」「健診」「検査」「種類」「オプション」「オプション追加」「予約内容」「受診内容の変更」"
          output: "受診内容"
        - input: "DTMF 2 または 「日程」「日にち」「日付」「時間」「日程変更」「予約日の変更」「受診日」"
          output: "日程変更"
        - input: "DTMF 3 または 「キャンセル」「やめる」「取り消し」「取り消す」「取消」「予約キャンセル」「予約のキャンセル」"
          output: "キャンセル"
      no_result_condition: "上記いずれにも該当しない発話・無言・聞き取り不能"
    save_to: "changeContent"
    next_step: "（Pattern A 分岐: 受診内容→変更詳細_受診内容 / 日程変更→変更詳細_日程 / other→キャンセル理由_聴取）"
    retry_failure: "end_failure"

  - step_name: "変更詳細_受診内容"
    tts_announcement: "ご希望の受診内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "details"
    next_step: "変更理由_聴取"
    retry_failure: "skip"

  - step_name: "変更詳細_日程"
    tts_announcement: "ご希望の日程をお話ください。AIが日付を正しく認識しない場合は、ダイヤルプッシュでの入力も可能です。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping:
        - input: "「4月15日」「来週の火曜日」等の日付発話"
          output: "YYYY-MM-DD 形式に正規化"
        - input: "DTMF 4 桁（MMDD）"
          output: "YYYY-MM-DD に変換"
      no_result_condition: "日付発話なし"
    save_to: "desiredDate"
    next_step: "変更理由_聴取"
    retry_failure: "skip"

  - step_name: "変更理由_聴取"
    tts_announcement: "ご予約変更の理由をお話下さい。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "reason"
    next_step: "案内_氏名_変更"
    retry_failure: "skip"

  - step_name: "キャンセル理由_聴取"
    tts_announcement: "ご予約キャンセルの理由をお話下さい。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "reason"
    next_step: "案内_氏名_変更"
    retry_failure: "skip"

  - step_name: "当日予約_確認"
    tts_announcement: "健診日 当日のご連絡、お問い合わせですか？はい、または、いいえ、で、お話下さい。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "当日"
        - "明日以降"
      mapping:
        - input: "DTMF 1 または 「はい」「そうです」「あってます」「あってる」「その通り」等の肯定表現"
          output: "当日"
        - input: "DTMF 2 または 「いいえ」「いえ」「いや」「違う」「ちがう」「そうじゃない」「まちがった」等の否定表現"
          output: "明日以降"
      no_result_condition: "肯定/否定いずれとも判断できない発話・無言"
    save_to: "sameDayInquiry"
    next_step: "（Pattern A 分岐: 当日→END_代表電話案内 / other→問い合わせ_内容）"
    retry_failure: "end_failure"

  - step_name: "問い合わせ_内容"
    tts_announcement: "お問い合わせの内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "reason"
    next_step: "担当者名_その他"
    retry_failure: "skip"

  - step_name: "担当者名_その他"
    tts_announcement: "お電話いただいている方のお名前を、フルネームでお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "callerName"
    next_step: "電話番号聴取"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須） ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（土日祝・年末年始・8:30 前/17:30 後 等）"
    tts_announcement: "ただいまの時間は受付時間外となります。受付時間は月曜日から土曜日の8時半から17時半となっております。恐れ入りますが、受付時間内にお掛け直し下さい。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件_聴取・希望_コース・現在_予約日・変更内容_判別・当日予約_確認 で発生）"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。受付時間は、日曜祝日を除く、月曜日から金曜日は8時半から17時半、土曜日は、8時半から12時までとなっております。電話番号は049-285-3161です。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_新規"
    condition: "新規予約 全聴取完了"
    tts_announcement: "健康診断の予約の申し込みを受付いたしました。終話後、関越病院よりショートメールが届きますので内容を必ずご確認いただき、誤りがありましたら修正をお願いいたします。後ほど、担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
