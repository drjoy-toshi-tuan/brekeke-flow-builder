# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 main.yaml の 100 箱超を Gen3 9 ブロック型に集約。重複箱（用件の確認 / 用件の確認_1〜_7、診療科判断 / 診療科判断_1 / 診療科判断_2、診察券有無、診察券無し、診察券有り、API_DRJOY 系、用件セット系）は独立ブロック化せず、ContextMatchRouter / next 書き換えに集約"
  - "新規予約 / 予約確認 は AI 受付対象外。用件聴取直後に予約専用ダイヤル 0467-84-8922 案内で終話"
  - "AI で完走するのは 定期受診 / 予約変更 / 予約キャンセル の 3 用件のみ"
  - "診療科 × 用件マトリクスは Pattern B（後段 ContextMatchRouter 2 段）で実装：①診療科分岐_専用系（診療科で専用ダイヤル/代表案内/通常を選別）②用件_変更キャンセル分岐（通常診療科について用件で予約日聴取 or 診察券番号への直行を選別）"
  - "用件聴取は echo_back: true（移管ノート §移管方針「Gen3 標準で echo_back 配置」）"
  - "診察券わからない時のみ生年月日聴取（Gen1 診察券有無 → 次へ_3 → 生年月日 の条件分岐を Gen3 では 診察券有無分岐 ContextMatchRouter で再現）"
  - "予約変更/予約キャンセル時は予約日聴取 → 理由聴取 → 診察券番号サブフロー の順（Gen1 用件の確認_5 経由）"
  - "定期受診時は予約日・理由をスキップして直接診察券番号サブフローへ（Gen1 用件の確認_5 で 定期受診 → 次へ_1 = 診察券番号）"
  - "予約キャンセル時の終話は診療科で TTS 切替：産科/放射線腫瘍科/内視鏡 = 折返し対応（END_受付完了_予約キャンセル_特定）/ それ以外 = 折返しなし短いメッセージ（END_受付完了_予約キャンセル_通常）"
  - "年末年始 12/30〜1/5 の自動音声休止は END_時間外 で吸収。Dr.JOY 側 acceptance_times の稼働休止期間で 12/30〜1/5 を設定する必要あり（移管ノート §director見落としポイント参照）"
  - "救急外来の Gen1 時間別アナウンス（8:30まで/17:00まで/それ以外）は Gen3 では END_救急_案内 一本に統合（director判断）。時間別の細粒度制御を再現したい場合は別途 script + business_hours で再構築"
  - "Gen1 の 案内回数カウント（5 回上限ループ）は Gen3 では実装しない。一度終話 TTS を流して切断する設計で簡素化（director判断）"
  - "DTMF 並走なし（Gen1 yaml に DTMF 受付の記述なし）。全 hearing は AmiVoice_STT のみ"
  - "47 診療科 + 分岐あり細分（リハ4種・放射線2種）+ センター系 を OpenAI が直接細分名で返す前提（entity_openai_synonyms.md の類義語を prompter が反映）。Gen1 の分岐ありプロンプト（呼吸器→内科か外科か再聴取）は Gen3 では追加質問せず OpenAI に文脈判断を委ねる（director判断、確認レポート参照）"
  - "心療内科は AI 不可（Gen1 サブ yaml 名が示す通り）→ END_心療内科_案内 で代表案内"
  - "新規予約ルート専用の 紹介状の有無と紹介元医療機関確認.yaml は Gen3 で未使用（新規予約は受付不可で先に切るため、移管ノート §director見落としポイント）"
  - "全終話 sms_flag: -1（Gen1 では SMS 送信に言及なし、本フローでは SMS 送信なしで運用）"
  - "サブフロー 4 本（氏名/生年月日/電話番号/診察券）は CLAUDE.md Rule 9 準拠で標準サブフロー完全コピー。フロー名プレフィックス『湘南鎌倉総合病院$』のみ置換"
  - "phonetype は電話番号サブフロー出口で context に保存されるが、本フローでは終話分岐に使わない（SMS 送信なしのため携帯/固定で TTS を分ける必要なし）"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（Dr.JOY管理画面で確認）"
    resolved: false
  - item: "対応電話番号（IVR 着信番号 / ARS 番号）が未指定。Brekeke 設定時に確認"
    resolved: false
  - item: "年末年始 12/30〜1/5 の自動音声休止を Dr.JOY 側 acceptance_times の稼働休止期間で設定する必要あり。Gen3 フロー側では END_時間外 で吸収。Gen1 では別文言（年末年始アナウンス）だったが、Gen3 で同じ END_時間外 文言で良いか確認（別文言にするなら別 termination 追加）"
    resolved: false
  - item: "救急外来の時間別案内（Gen1: 8:30まで/17:00まで/それ以外）を Gen3 では END_救急_案内 一本に統合。時間別細粒度を再現したい場合は別途 script + business_hours の追加が必要"
    resolved: false
  - item: "救急外来の TTS で「代表電話に転送します」と発話するが、実際には Gen3 で call_transfer ブロックを使わず TTS 案内のみで終話する設計。患者は切断後に自分で代表電話にかけ直す前提。call_transfer に切替えるか確認"
    resolved: false
  - item: "禁煙外来は予防医学センターと同じ専用ダイヤル 0467-44-1454。Gen1 の用件の確認_7 では「定期受診/新規予約 → 予防医学センター予約キャンセル_2 / 予約変更 → 禁煙外来予約変更 / 予約キャンセル → 禁煙外来予約キャンセル」と分岐していたが、最終的に同じ番号案内に集約。Gen3 では一律 END_専門ダイヤル_予防医学 で統合。問題ないか確認"
    resolved: false
  - item: "Gen1 の人工膝関節センター/セカンドオピニオン/予防医学センター 予約変更/予約キャンセル/新規予約 用 TTS（用件別の細分）は Gen3 では各 END_専門ダイヤル_* に統合。用件別の細分文言を再現する必要があるか確認"
    resolved: false
  - item: "心療内科は AI 不可（Gen1 サブ yaml 名「診療科：1_29修正（心療内科非対応）」）。Gen1 では「予約票に記載のある診療科が脳神経内科でないかご確認をお願いいたします」と再聴取を促していたが、Gen3 では一度の OpenAI 判定で心療内科と確定 → END_心療内科_案内 に直行。再聴取ループは省略してよいか確認"
    resolved: false
  - item: "Gen1 分岐あり診療科（呼吸器/内分泌/甲状腺/肝胆膵/産婦人科/リハビリ/整形外科/放射線科/脳神経）について、Gen3 では追加質問せず OpenAI に文脈判断を委ねる設計（例: 「呼吸器」発話 → OpenAI が文脈で「呼吸器内科」or「呼吸器外科」を確定）。Gen1 のように追加質問で内科/外科を確定する設計に切替えるか確認（切替えると診療科 hearing が 9 個増える）"
    resolved: false
  - item: "診察券番号サブフローで「わからない」発話時の context 保存値が「わからない」文字列であることを前提に、診察券有無分岐（context_match_router）で reference_module: 診察券番号聴取 + match: わからない で生年月日聴取に分岐させる設計。標準サブフロー（docs/reference/bivr/samples/json/診察券番号聴取.json）の実装でこの値が保存されるか確認"
    resolved: false
  - item: "Gen1 案内回数カウント（5 回上限ループ）は Gen3 では実装しない（一度の終話 TTS で切断）。患者がアナウンスを最後まで聞かずに切断する場合の挙動が変わるが問題ないか確認"
    resolved: false
  - item: "予約日聴取と理由聴取の retry_failure を skip（聴取失敗しても次に進む）に設定。Gen1 では聴取失敗時に代表電話案内（聞き取りできず）に分岐していた。Gen3 で end_failure（聴取失敗終話）にするか確認"
    resolved: false
  - item: "用件 echo_back: true で、復唱の TTS文言は scaffold が自動生成。Gen1 では「ご予約の変更でよろしいですか?」「定期受診のご予約でよろしいですか?」のように用件別文言だったが、Gen3 標準では `#data#でよろしいですか？` 等の汎用形式になる。Gen1 と同じ用件別文言を再現するか確認"
    resolved: false
  - item: "予約以外（くすり/会計/書類/症状 等）の検出を OpenAI 用件分類に含める設計（output_labels に「予約以外」を追加）。Gen1 では用件聞き取り内で 予約以外エンティティで先に分岐していた。Gen3 では 1 OpenAI 内で同時判定する設計でよいか"
    resolved: false
  - item: "本フローではSMS送信なし（全終話 sms_flag: -1）。携帯番号取得済みでもSMSを送らない設計。SMS送信が必要であれば終話分岐に phonetype 判定を追加する必要あり（要件確認）"
    resolved: false
