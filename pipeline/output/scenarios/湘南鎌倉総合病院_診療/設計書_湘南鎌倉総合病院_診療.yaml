# 設計書 -- 湘南鎌倉総合病院 診療
# 生成元: @director エージェント
# 生成日: 2026/05/01
# 確認レポート: output/scenarios/湘南鎌倉総合病院_診療/確認レポート_湘南鎌倉総合病院_診療_20260501.md
# 元資料: commubo抽出/【001】湘南鎌倉総合病院/【0001湘南鎌倉総合病院】診療1_M_本番/
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "湘南鎌倉総合病院"
  scenario_name: "診療"
  group_name: "湘南鎌倉総合病院"
  flow_name: "湘南鎌倉総合病院$診療"
  target_facility: "湘南鎌倉総合病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "祝日除く 月〜金 8:00-19:00 / 土 8:00-13:00（年末年始 12/30〜1/5 は休止 — Dr.JOY 側 acceptance_times 稼働休止期間で設定）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  # プラットフォーム選択
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "湘南鎌倉総合病院$診療"
      role: "main"
      description: "冒頭（営業時間） → 用件聴取(echo_back) → [新規予約/予約確認は AI不可で予約専用ダイヤル案内] → 診療科聴取 → 診療科分岐(専用ダイヤル系/代表案内系/通常) → [変更/キャンセルは予約日→理由] → 診察券番号サブフロー → 氏名サブフロー → [診察券わからない時のみ生年月日サブフロー] → 電話番号サブフロー → 用件別終話"
  subflows:
    - name: "湘南鎌倉総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。標準サブフローを完全コピー。Gen1: 復唱なし"

    - name: "湘南鎌倉総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。標準サブフローを完全コピー。DOB Re-confirmation あり。診察券わからない時のみ呼ばれる"

    - name: "湘南鎌倉総合病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。標準サブフローを完全コピー。「わからない」分岐あり（診察券無し→生年月日聴取に進ませるための判定キーになる）"

    - name: "湘南鎌倉総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。標準サブフローを完全コピー。incoming-classifier→携帯確認/連絡先聴取→Phone Normalization→復唱確認→携帯判別→結果返却"

# --- セクション3: フローの目的 ---
purpose: "湘南鎌倉総合病院（予約専用 AI 電話）。患者からの予約関連電話を受け、用件（定期受診/予約変更/予約キャンセル）を分類した上で、診療科 × 用件のマトリクスで代表電話案内・専用ダイヤル案内・通常受付ルートに振り分ける。新規予約と予約確認は AI 受付対象外（予約専用ダイヤル 0467-84-8922 へ案内）。通常ルートでは予約日（変更/キャンセル時）・理由・診察券番号・氏名・生年月日（診察券わからない時のみ）・連絡先電話番号を聴取し、Dr.JOY に折り返し受付情報を記録する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "湘南鎌倉総合病院$診療"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常/携帯/固定 → acceptance_times
                          ├─ 時間外 → END_時間外(TTS) → 完了フラグ_時間外(status=6) → 切断
                          └─ 受付可 → 冒頭_アナウンス(TTS, 「お電話ありがとうございます。湘南鎌倉総合病院の、予約専用、AI電話です」)

      ─── 用件聴取（5択 + echo_back）───
      用件聴取(TTS+AmiVoice STT) → OpenAI_用件聴取（5択 + 予約以外検出）
        → echo_back（復唱確認）
            ├─ 新規予約 → END_新規予約_案内 (status=2) → 切断
            ├─ 予約確認 → END_予約確認_案内 (status=2) → 切断
            ├─ 予約以外 → END_予約以外_案内 (status=2) → 切断
            ├─ 定期受診 / 予約変更 / 予約キャンセル → 診療科聴取
            └─ NO_RESULT/other → リトライ → No more → END_聴取失敗 (status=3) → 切断

      ─── 診療科聴取 ───
      診療科聴取(TTS+AmiVoice STT) → OpenAI_診療科聴取（47科正規化）
        → 診療科分岐_専用系(ContextMatchRouter on OpenAI_診療科聴取)
            ├─ 人工膝関節センター → END_専門ダイヤル_膝関節 (0467-46-7172) → 切断
            ├─ セカンドオピニオン → END_専門ダイヤル_セカンド (0467-45-8923) → 切断
            ├─ 予防医学センター   → END_専門ダイヤル_予防医学 (0467-44-1454) → 切断
            ├─ 禁煙外来           → END_専門ダイヤル_予防医学 (同番号) → 切断
            ├─ 救急外来           → END_救急_案内 (代表電話案内) → 切断
            ├─ 放射線検査 / 放射線その他 / 人工透析 / 臨床心理士 → END_代表電話_放射線等 → 切断
            ├─ 心療内科           → END_心療内科_案内 (status=2) → 切断
            └─ other（通常診療科） → 用件_変更キャンセル分岐

      ─── 通常ルート: 用件で分岐 ───
      用件_変更キャンセル分岐(ContextMatchRouter on OpenAI_用件聴取)
        ├─ 予約変更 / 予約キャンセル → 予約日聴取
        └─ other（定期受診） → 診察券番号聴取(subflow)

      ─── 変更/キャンセル時のみ ───
      予約日聴取(TTS+AmiVoice STT, datetime) → 理由聴取(TTS+AmiVoice STT, text)
        → 診察券番号聴取(subflow)

      ─── 個人情報サブフロー連鎖 ───
      診察券番号聴取(Custom Jump to Flow)
        → 氏名聴取(Custom Jump to Flow)
          → 診察券有無分岐(ContextMatchRouter on 診察券番号聴取)
              ├─ "わからない" → 生年月日聴取(Custom Jump to Flow) → 電話番号聴取(Custom Jump to Flow)
              └─ other（診察券あり） → 電話番号聴取(Custom Jump to Flow)
        → 用件_終話分岐(ContextMatchRouter on OpenAI_用件聴取)
            ├─ 定期受診     → END_受付完了_定期受診 (status=1) → 切断
            ├─ 予約変更     → END_受付完了_予約変更 (status=1) → 切断
            ├─ 予約キャンセル → 特定診療科判定(ContextMatchRouter on OpenAI_診療科聴取)
            │                    ├─ 産科 / 放射線腫瘍科 / 内視鏡 → END_受付完了_予約キャンセル_特定 → 切断
            │                    └─ other → END_受付完了_予約キャンセル_通常 → 切断
            └─ other        → END_受付完了_定期受診 (フォールバック)

      ─── 終話パターン一覧 ───
      END_非通知 (status=2)
      END_時間外 (status=6)
      END_聴取失敗 (status=3)
      END_新規予約_案内 (status=2) — 予約専用ダイヤル 0467-84-8922 案内
      END_予約確認_案内 (status=2) — 予約専用ダイヤル 0467-84-8922 案内
      END_予約以外_案内 (status=2) — 代表電話 0467-46-1717 案内
      END_専門ダイヤル_膝関節 (status=2) — 0467-46-7172
      END_専門ダイヤル_セカンド (status=2) — 0467-45-8923
      END_専門ダイヤル_予防医学 (status=2) — 0467-44-1454
      END_救急_案内 (status=2) — 代表電話 0467-46-1717
      END_代表電話_放射線等 (status=2) — 代表電話 0467-46-1717 + 「その他のお問い合わせ4番」
      END_心療内科_案内 (status=2) — AI 不可
      END_受付完了_定期受診 (status=1)
      END_受付完了_予約変更 (status=1)
      END_受付完了_予約キャンセル_特定 (status=1) — 産科/放射線腫瘍科/内視鏡 のキャンセル（折返しあり）
      END_受付完了_予約キャンセル_通常 (status=1) — その他診療科のキャンセル（折返しなし、メッセージ短い）
    notes: |
      Gen1 main.yaml の 100 箱超の構造を Gen3 9 ブロック型に集約。
      用件分類は Pattern A（OpenAI 直後 5 分岐）+ echo_back。
      診療科×用件マトリクスは Pattern B（後段 ContextMatchRouter 2 段：診療科分岐 → 用件分岐）。
      新規予約/予約確認は受付不可で先に切る（main.yaml の `用件セット（新規予約）` `用件セット（予約確認）` 経路）。
      診察券わからない時のみ生年月日聴取（Gen1 の 診察券有無→次へ_3→生年月日 の条件分岐を再現）。
      年末年始 12/30〜1/5 の自動音声休止は Dr.JOY 側 acceptance_times 稼働休止期間で設定（END_時間外 で吸収）。
      救急外来の「8:30まで/17:00まで」時間別 TTS は Gen3 では END_救急_案内 一本に統合（Gen1 の現在の時間判断箱の細粒度制御を簡略化）。

  - flow_name: "湘南鎌倉総合病院$氏名聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/氏名聴取.json を完全コピーする。
      フロー名プレフィックスのみ「湘南鎌倉総合病院$」に置換。
    notes: "氏名聴取（復唱なし）→結果返却"

  - flow_name: "湘南鎌倉総合病院$生年月日聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピーする。
      フロー名プレフィックスのみ「湘南鎌倉総合病院$」に置換。
    notes: "生年月日聴取（DOB Re-confirmation あり）→結果返却。診察券わからない時のみ呼ばれる"

  - flow_name: "湘南鎌倉総合病院$診察券番号聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピーする。
      フロー名プレフィックスのみ「湘南鎌倉総合病院$」に置換。
    notes: "診察券番号聴取（「わからない」分岐あり）→結果返却。下流の 診察券有無分岐 で参照される"

  - flow_name: "湘南鎌倉総合病院$電話番号聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピーする。
      フロー名プレフィックスのみ「湘南鎌倉総合病院$」に置換。
    notes: "incoming-classifier→携帯確認/連絡先聴取→Phone Normalization→復唱確認→携帯判別→結果返却"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  # --- 冒頭アナウンス ---
  - step: 冒頭_アナウンス
    type: announcement
    next: 用件聴取

  # --- 用件聴取（5択 + echo_back）---
  - step: 用件聴取
    type: hearing
    output_format: enum
    echo_back: true
    save_to: classification
    retry_failure: end_failure
    conditions:
      - match: "新規予約"
        next: END_新規予約_案内
      - match: "予約確認"
        next: END_予約確認_案内
      - match: "予約以外"
        next: END_予約以外_案内
      - match: "定期受診"
        next: 診療科聴取
      - match: "予約変更"
        next: 診療科聴取
      - match: "予約キャンセル"
        next: 診療科聴取
      - match: "other"
        next: 診療科聴取   # NO_RESULT 上限到達は scaffold が自動で END_聴取失敗 に流す。other は緩めに「3用件のいずれかと推定」して通常ルートに合流

  # --- 診療科聴取（47診療科 + センター系）---
  - step: 診療科聴取
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "不明"
    retry_failure: end_failure
    conditions:
      - match: "default"
        next: 診療科分岐_専用系

  # --- 診療科分岐: 専用ダイヤル系・代表案内系・通常系 ---
  - step: 診療科分岐_専用系
    type: context_match_router
    reference_module: "OpenAI_診療科聴取"
    conditions:
      - match: "人工膝関節センター"
        next: END_専門ダイヤル_膝関節
      - match: "セカンドオピニオン"
        next: END_専門ダイヤル_セカンド
      - match: "予防医学センター"
        next: END_専門ダイヤル_予防医学
      - match: "禁煙外来"
        next: END_専門ダイヤル_予防医学
      - match: "救急外来"
        next: END_救急_案内
      - match: "放射線検査"
        next: END_代表電話_放射線等
      - match: "放射線その他"
        next: END_代表電話_放射線等
      - match: "人工透析"
        next: END_代表電話_放射線等
      - match: "臨床心理士"
        next: END_代表電話_放射線等
      - match: "心療内科"
        next: END_心療内科_案内
      - match: "other"
        next: 用件_変更キャンセル分岐

  # --- 用件で分岐: 予約変更/キャンセル → 予約日聴取、定期受診 → 診察券番号 ---
  - step: 用件_変更キャンセル分岐
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "予約変更"
        next: 予約日聴取
      - match: "予約キャンセル"
        next: 予約日聴取
      - match: "other"
        next: 診察券番号聴取

  # --- 予約日聴取（変更/キャンセル時のみ）---
  - step: 予約日聴取
    type: hearing
    output_format: datetime
    save_to: reservationDate
    retry_failure: skip
    next: 理由聴取

  # --- 理由聴取（変更/キャンセル時のみ）---
  - step: 理由聴取
    type: hearing
    output_format: text
    save_to: reason
    retry_failure: skip
    next: 診察券番号聴取

  # --- 診察券番号サブフロー ---
  - step: 診察券番号聴取
    type: subflow
    flowname: "湘南鎌倉総合病院$診察券番号聴取"
    next: 氏名聴取

  # --- 氏名サブフロー ---
  - step: 氏名聴取
    type: subflow
    flowname: "湘南鎌倉総合病院$氏名聴取"
    next: 診察券有無分岐

  # --- 診察券有無分岐: わからないなら生年月日聴取、有りなら電話番号聴取 ---
  - step: 診察券有無分岐
    type: context_match_router
    reference_module: "診察券番号聴取"
    conditions:
      - match: "わからない"
        next: 生年月日聴取
      - match: "other"
        next: 電話番号聴取

  # --- 生年月日サブフロー（診察券わからない時のみ）---
  - step: 生年月日聴取
    type: subflow
    flowname: "湘南鎌倉総合病院$生年月日聴取"
    next: 電話番号聴取

  # --- 電話番号サブフロー ---
  - step: 電話番号聴取
    type: subflow
    flowname: "湘南鎌倉総合病院$電話番号聴取"
    next: 用件_終話分岐

  # --- 用件別終話分岐 ---
  - step: 用件_終話分岐
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "定期受診"
        next: END_受付完了_定期受診
      - match: "予約変更"
        next: END_受付完了_予約変更
      - match: "予約キャンセル"
        next: 特定診療科判定
      - match: "other"
        next: END_受付完了_定期受診

  # --- 特定診療科判定: 予約キャンセル時の診療科で TTS 切替 ---
  - step: 特定診療科判定
    type: context_match_router
    reference_module: "OpenAI_診療科聴取"
    conditions:
      - match: "産科"
        next: END_受付完了_予約キャンセル_特定
      - match: "放射線腫瘍科"
        next: END_受付完了_予約キャンセル_特定
      - match: "内視鏡"
        next: END_受付完了_予約キャンセル_特定
      - match: "other"
        next: END_受付完了_予約キャンセル_通常

  # --- 終話ブロック ---
  - step: END_新規予約_案内
    type: termination
    termination_ref: "END_新規予約_案内"
  - step: END_予約確認_案内
    type: termination
    termination_ref: "END_予約確認_案内"
  - step: END_予約以外_案内
    type: termination
    termination_ref: "END_予約以外_案内"
  - step: END_専門ダイヤル_膝関節
    type: termination
    termination_ref: "END_専門ダイヤル_膝関節"
  - step: END_専門ダイヤル_セカンド
    type: termination
    termination_ref: "END_専門ダイヤル_セカンド"
  - step: END_専門ダイヤル_予防医学
    type: termination
    termination_ref: "END_専門ダイヤル_予防医学"
  - step: END_救急_案内
    type: termination
    termination_ref: "END_救急_案内"
