flow_structure:
  type: 1flow
  flows:
  - name: ヘルスケアクリニック厚木_統合CC_20260617$統合CC
    role: main
    description: エリア選択→施設選択→（遅刻ガード）→用件確認→各用件処理→個人情報聴取→終話。6施設は施設確定後に同一下流へ合流する1メインフロー構成。
  subflows: []
purpose: '株式会社健康予防医学協会グループ6クリニック共通の健診予約統合コールセンター。 受診希望者がエリア→施設を選択した上で、健診の予約・変更・キャンセル・その他用件を申し込む電話に自動応対し、 個人情報を聴取して折り返し受付（スタッフ対応）へつなぐ。当日の変更・キャンセル、雇用時健診は受付対象外として案内終話する。

  '
flow_diagrams:
- flow_name: ヘルスケアクリニック厚木_統合CC_20260617$統合CC
  diagram: "冒頭(wait)\n  → コンテキスト設定(saveContextModel2DB)\n  → 着信電話番号分類(incoming-classifier)\n      ├─ 非通知 → END_非通知（186案内）→ 切断\n      ├─ 海外   → ※scaffold は通常フローへ流すため海外案内終話は手動配線（確認レポート B-4）\n      └─ 通常   → 受付時間判定(acceptance_times)\n                    ├─ 時間外 → END_時間外 → 切断\n                    └─ 受付可 → 冒頭_アナウンス\n                                  → 明日以降確認\n                                      ├─ はい → エリア選択\n                                      └─ いいえ → 遅刻種別確認\n                                                    ├─ 遅刻       → 受診施設名称聴取（classification=遅刻・発話→氏名聴取）\n                                                    └─ 変更/ｷｬﾝｾﾙ → END_当日受付不可（当日はAI受付不可）\nエリア選択(DTMF 1/2/3)\n  ├─ 神奈川     → 施設案内_神奈川 ──┐\n  ├─ 新宿渋谷   → 施設選択_新宿渋谷(DTMF 1/2) ──┤\n  └─ 東京品川   → 施設選択_東京品川(DTMF 1/2/3) ──┤\n                                                  ▼\n                                      （施設選択後）健診予約案内 → 用件確認\n                                        ※遅刻は別ルート（遅刻種別確認→受診施設名称聴取→氏名聴取・用件確認スキップ）\n                                        ※施設確定後分岐CMRは遅刻分離に伴い撤去\n用件確認(DTMF 1/2/3/4 + 発話)\n  ├─ 予約       → コース選択\n  ├─ 変更       → 変更受付案内 → 氏名聴取\n  ├─ キャンセル → 現在の予約日 → 再受診希望 → 氏名聴取\n  └─ その他     → お問い合わせ内容 → 氏名聴取\nコース選択(DTMF 1/2/3/4 + 発話)\n  ├─ 人間ドック/協会けんぽ/定期健診 → 氏名聴取\n  ├─ 雇用時健診（発話検知）         → END_雇用時健診_HP案内（HP誘導+SMS）\n  └─ その他の健診                   → その他コース確認\n                                        ├─ 雇用時健診 → END_雇用時健診_HP案内\n                                        └─ other      → 氏名聴取\n氏名聴取 → 生年月日聴取 → 電話番号聴取\n  → 終話分岐_電話種別(CMR: 電話番号聴取 phonetype)\n      ├─ 携帯(1)        → END_受付完了_携帯（SMS言及あり）\n      └─ 固定/その他    → END_受付完了_固定（SMS言及なし）\n"
  notes: 海外/非通知/時間外/聴取失敗は異常系。海外のみ手動配線（B-4）。
scenario_flow:
