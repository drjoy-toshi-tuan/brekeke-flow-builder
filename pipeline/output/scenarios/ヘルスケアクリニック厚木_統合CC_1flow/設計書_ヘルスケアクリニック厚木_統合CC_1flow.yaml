  flow_name: ヘルスケアクリニック厚木_統合CC_20260617$統合CC
  target_facility: 株式会社健康予防医学協会グループ6施設（ヘルスケアクリニック厚木 / ヒロオカクリニック / 渋谷ウエストクリニック / ヘルスケアクリニック秋葉原 / 鉄鋼ビル丸の内クリニック / みなと健診クリニック）共通の統合コールセンター
  office_id: 5eecd4182c9faeddaddc8b41
  phone_number: ''
  business_hours: 祝日を除く月曜〜土曜 7:50〜16:30
  flow_type: 1flow
  work_type: new
  environment: demo
  tts_platform: GOOGLE
