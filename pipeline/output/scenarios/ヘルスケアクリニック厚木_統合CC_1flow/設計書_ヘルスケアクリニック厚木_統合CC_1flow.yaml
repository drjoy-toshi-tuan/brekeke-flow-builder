  - 遅刻
  - 変更キャンセル
  notes: 「いいえ」後の切り分け。遅刻→受診施設名称聴取(classification=遅刻)、変更/キャンセル等→当日受付不可で終話。
- order: 3
  name: エリア選択
  stt_type: DTMF_AmiVoice
  dtmf_max_length: 1
  retry_count: 2
  echo_back: false
  save_to: area
  openai_processing: none
  output_format: text
  output_labels:
  - 神奈川エリア
  - 新宿渋谷エリア
  - 東京品川エリア
  notes: DTMF 1=神奈川エリア, 2=新宿渋谷エリア, 3=東京品川エリア。発話併用。
- order: 4
  name: 施設選択_新宿渋谷
  stt_type: DTMF_AmiVoice
  dtmf_max_length: 1
  retry_count: 2
  echo_back: false
  save_to: facility
  openai_processing: none
  output_format: text
  output_labels:
  - ヒロオカクリニック
  - 渋谷ウエストクリニック
  notes: DTMF 1=ヒロオカクリニック, 2=渋谷ウエストクリニック。
- order: 5
  name: 施設選択_東京品川
  stt_type: DTMF_AmiVoice
  dtmf_max_length: 1
  retry_count: 2
  echo_back: false
  save_to: facility
  openai_processing: none
  output_format: text
  output_labels:
  - ヘルスケアクリニック秋葉原
  - 鉄鋼ビル丸の内クリニック
  - みなと健診クリニック
  notes: DTMF 1=ヘルスケアクリニック秋葉原, 2=鉄鋼ビル丸の内クリニック, 3=みなと健診クリニック。
- order: 6
  name: 用件確認
  stt_type: DTMF_AmiVoice
  dtmf_max_length: 1
  retry_count: 2
  echo_back: false
  save_to: classification
  openai_processing: none
  output_format: text
  output_labels:
  - 予約
  - 変更
  - キャンセル
  - その他
  notes: DTMF 1=予約, 2=変更, 3=キャンセル, 4=その他。
- order: 7
  name: コース選択
  stt_type: DTMF_AmiVoice
  dtmf_max_length: 1
  retry_count: 2
  echo_back: false
  save_to: course
  openai_processing: none
  output_format: text
  output_labels:
  - 人間ドック
  - 協会けんぽ
  - 定期健診
  - 雇用時健診
  - その他の健診
  notes: DTMF 1=人間ドック, 2=協会けんぽ, 3=定期健診, 4=その他の健診。雇用時健診はDTMFになく発話検知のみ→HP案内終話へ。定期健診は通常進行。
- order: 8
  name: その他コース確認
  stt_type: AmiVoice_STT
  dtmf_max_length: null
  retry_count: 2
  echo_back: false
  save_to: course
  openai_processing: none
  output_format: text
  output_labels:
  - 雇用時健診
  notes: コース名称を自由発話。雇用時健診を検知したらHP案内終話へ、それ以外（わからない含む）はコース名をcourseにセットして氏名聴取へ。
- order: 9
  name: 現在の予約日
  stt_type: DTMF_AmiVoice
  dtmf_max_length: 8
  retry_count: 2
  echo_back: false
  save_to: reservationDate
  openai_processing: none
  output_format: text
  output_labels: []
  notes: 'キャンセル対象の現在のご予約日。西暦8桁(YYYYMMDD)DTMF入力。入電日分類ではない。 / フラット化: STT を ^[0-9]{8}$ 直接ガード（分類器なし）。'
- order: 10
  name: 再受診希望
  stt_type: AmiVoice_STT
  dtmf_max_length: null
  retry_count: 2
  echo_back: false
  save_to: rebooking
  openai_processing: none
  output_format: text
  output_labels:
  - 肯定
  - 否定
  notes: 再予約の希望（はい/いいえ）。肯定/否定いずれも氏名聴取へ（値はrebookingに記録）。
- order: 11
  name: お問い合わせ内容
  stt_type: AmiVoice_STT
  dtmf_max_length: null
  retry_count: 2
  echo_back: false
  save_to: reason
  openai_processing: none
  output_format: text
  output_labels: []
  notes: その他用件の自由発話。FAQ発動なし。受付で折り返し対応。
- order: 12
  name: 受診施設名称聴取
  stt_type: AmiVoice_STT
  dtmf_max_length: null
  retry_count: 2
  echo_back: false
  save_to: facility
  openai_processing: none
  output_format: text
  output_labels: []
  notes: 遅刻ルート専用。受診施設の名称を自由発話で聴取し facility に保存。分類器なし(純粋聴取)。素案フロー準拠。
- order: 13
  name: 到着時間
  stt_type: AmiVoice_STT
  dtmf_max_length: null
  retry_count: 2
  echo_back: false
  save_to: arrivalTime
  openai_processing: none
  output_format: text
  output_labels: []
  notes: 遅刻ルート専用。到着予定時間を自由発話で聴取し arrivalTime に保存。分類器なし(純粋聴取)。受診施設名称聴取の後・氏名聴取の前。
step_details:
- step_name: 冒頭_アナウンス
  tts_announcement: 株式会社健康予防医学協会のAI電話です。グループクリニックすべての健診予約を承ります。{recstart}の後に、お話しいただくか、ダイヤルプッシュで操作してください。
  input_method: voice_only
  save_to: ''
  next_step: 明日以降確認
  retry_failure: skip
- step_name: 明日以降確認
  tts_announcement: ご用件は、明日以降のご予約に関することでしょうか。「はい、そうです」や「いいえ、ちがいます」のようにお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - はい
    - いいえ
    mapping:
    - input: 「はい」「そうです」など明日以降の予約に関する肯定
      output: はい
    - input: 「いいえ」「違います」など否定（当日・遅刻・変更等）
      output: いいえ
    no_result_condition: 肯定/否定いずれの意図も判定できない場合
  save_to: ''
  next_step: エリア選択
  retry_failure: end_failure
- step_name: 遅刻種別確認
  tts_announcement: 遅刻のご連絡でしょうか。それとも、ご予約の変更・キャンセルなどのお問い合わせでしょうか。
  input_method: voice_only
  openai_rules:
    output_values:
    - 遅刻
    - 変更キャンセル
    mapping:
    - input: 「遅刻」「遅れる」など到着遅延の連絡
      output: 遅刻
    - input: 変更・キャンセル・その他の問い合わせ
      output: 変更キャンセル
    no_result_condition: いずれの意図も判定できない場合
  save_to: classification
  next_step: 受診施設名称聴取
  retry_failure: end_failure
- step_name: エリア選択
  tts_announcement: 受診を希望されるエリアを、次の三つからお選びください。神奈川エリアは一番、新宿・渋谷エリアは二番、東京・品川エリアは三番を、ダイヤルプッシュで入力してください。
  input_method: dtmf_voice
  openai_rules:
    output_values:
    - 神奈川エリア
    - 新宿渋谷エリア
    - 東京品川エリア
    mapping:
    - input: DTMF 1 または「神奈川」
      output: 神奈川エリア
    - input: DTMF 2 または「新宿」「渋谷」
      output: 新宿渋谷エリア
    - input: DTMF 3 または「東京」「品川」
      output: 東京品川エリア
    no_result_condition: 上記いずれにも該当しない場合
  save_to: area
  next_step: 施設案内_神奈川
  retry_failure: end_failure
- step_name: 施設案内_神奈川
  tts_announcement: 神奈川エリアの受診希望施設は、ヘルスケアクリニック厚木で承ります。
  input_method: voice_only
  save_to: ''
  next_step: 健診予約案内
  retry_failure: skip
- step_name: 施設選択_新宿渋谷
  tts_announcement: 受診を希望されるクリニックを、次の二つからお選びください。ヒロオカクリニックは一番、渋谷ウエストクリニックは二番を、ダイヤルプッシュで入力してください。
  input_method: dtmf_voice
  openai_rules:
    output_values:
    - ヒロオカクリニック
    - 渋谷ウエストクリニック
    mapping:
    - input: DTMF 1 または「ヒロオカ」
      output: ヒロオカクリニック
    - input: DTMF 2 または「渋谷ウエスト」
      output: 渋谷ウエストクリニック
    no_result_condition: 上記いずれにも該当しない場合
  save_to: facility
  next_step: 健診予約案内
  retry_failure: end_failure
- step_name: 施設選択_東京品川
  tts_announcement: 受診を希望されるクリニックを、次の三つからお選びください。ヘルスケアクリニック秋葉原は一番、鉄鋼ビル丸の内クリニックは二番、みなと健診クリニックは三番を、ダイヤルプッシュで入力してください。
  input_method: dtmf_voice
  openai_rules:
    output_values:
    - ヘルスケアクリニック秋葉原
    - 鉄鋼ビル丸の内クリニック
    - みなと健診クリニック
    mapping:
    - input: DTMF 1 または「秋葉原」
      output: ヘルスケアクリニック秋葉原
    - input: DTMF 2 または「鉄鋼ビル」「丸の内」
      output: 鉄鋼ビル丸の内クリニック
    - input: DTMF 3 または「みなと」
      output: みなと健診クリニック
    no_result_condition: 上記いずれにも該当しない場合
  save_to: facility
  next_step: 健診予約案内
  retry_failure: end_failure
- step_name: 健診予約案内
  tts_announcement: ここからは、健診のご予約を承ります。
  input_method: voice_only
  save_to: ''
  next_step: 用件確認
  retry_failure: skip
- step_name: 用件確認
  tts_announcement: ご用件をお伺いします。健診のご予約は一番、変更は二番、キャンセルは三番、その他のご用件は四番を、お話しいただくか、番号をプッシュしてください。
  input_method: dtmf_voice
  openai_rules:
    output_values:
    - 予約
    - 変更
    - キャンセル
    - その他
    mapping:
    - input: DTMF 1 または「予約」「健診の予約」
      output: 予約
    - input: DTMF 2 または「変更」
      output: 変更
    - input: DTMF 3 または「キャンセル」
      output: キャンセル
    - input: DTMF 4 またはその他・上記に該当しない用件
      output: その他
    no_result_condition: 発話が無音・無関係でいずれにも該当しない場合
  save_to: classification
  next_step: コース選択
  retry_failure: end_failure
- step_name: コース選択
  tts_announcement: ご希望のメニューを、次の四つのうちのいずれかでお話しください。人間ドックは一番、協会けんぽは二番、定期健診は三番、その他の健診は四番を、該当の番号をプッシュしてください。
  input_method: dtmf_voice
  openai_rules:
    output_values:
    - 人間ドック
    - 協会けんぽ
    - 定期健診
    - 雇用時健診
    - その他の健診
    mapping:
    - input: DTMF 1 または「人間ドック」
      output: 人間ドック
    - input: DTMF 2 または「協会けんぽ」
      output: 協会けんぽ
    - input: DTMF 3 または「定期健診」「定期健康診断」
      output: 定期健診
    - input: 「雇用時健診」「雇入れ時健診」「雇入れ」（DTMFになく発話のみ）
      output: 雇用時健診
    - input: DTMF 4 または上記以外の健診
      output: その他の健診
    no_result_condition: 発話が無音・無関係でいずれにも該当しない場合
  save_to: course
  next_step: その他コース確認
  retry_failure: end_failure
- step_name: その他コース確認
  tts_announcement: それでは、受診を希望するコースの名称をお話しください。分からない場合は、「わからない」とお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - 雇用時健診
    mapping:
    - input: 「雇用時健診」「雇入れ時健診」「雇入れ」を含む発話
      output: 雇用時健診
    no_result_condition: 雇用時健診以外のコース名称・「わからない」・無音（default 分岐＝氏名聴取へ、発話内容を course に保存）
  save_to: course
  next_step: 氏名聴取
  retry_failure: end_failure
- step_name: 変更受付案内
  tts_announcement: 承知いたしました。変更内容の詳細につきましては、後ほどスタッフより折り返し電話の際に、お伺いさせていただきます。
  input_method: voice_only
  save_to: ''
  next_step: 氏名聴取
  retry_failure: skip
- step_name: 現在の予約日
  tts_announcement: 現在のご予約日を、西暦8桁で、ダイヤルプッシュで入力してください。
  input_method: dtmf_voice
  openai_rules:
    output_values:
    - YYYY-MM-DD HH:MM
    mapping:
    - input: '西暦8桁のDTMF入力（例: 20260415）または日付発話'
      output: 正規化した日時（YYYY-MM-DD 00:00）
    no_result_condition: 日付として解釈できない場合
  save_to: reservationDate
  next_step: 再受診希望
  retry_failure: skip
- step_name: 再受診希望
  tts_announcement: 再予約のご希望はありますか。「はい、そうです」または「いいえ、違います」のようにお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - 肯定
    - 否定
    mapping:
    - input: 「はい」「そうです」など肯定
      output: 肯定
    - input: 「いいえ」「違います」など否定
      output: 否定
    no_result_condition: 日付だけなど、肯定/否定いずれの意図も判定できない場合
  save_to: rebooking
  next_step: 氏名聴取
  retry_failure: end_failure
- step_name: お問い合わせ内容
  tts_announcement: ご用件をお話しください。
  input_method: voice_only
  save_to: reason
  next_step: 氏名聴取
  retry_failure: skip
- step_name: 受診施設名称聴取
  tts_announcement: 受診施設の名称をお話しください。
  input_method: voice_only
  save_to: facility
  next_step: 遅刻アナウンス
  retry_failure: skip
- step_name: 遅刻アナウンス
  tts_announcement: ご到着時間により、承る事が出来ない検査がございますことをご了承ください。
  input_method: voice_only
  save_to: ''
  next_step: 到着時間
  retry_failure: skip
- step_name: 到着時間
  tts_announcement: ご到着予定のお時間をお知らせください。
  input_method: voice_only
  save_to: arrivalTime
  next_step: 氏名聴取
  retry_failure: skip
termination_patterns:
- name: END_非通知
  condition: 非通知着信
  tts_announcement: お客様のお電話は非通知のため、電話番号が確認できず、折り返しのご連絡をすることができません。電話番号を通知の上おかけ直しいただくか、当院の電話番号の頭に「186」を付けてからおかけください。それでは失礼いたします。
  status: '2'
  sms_flag: '0'
  completion_flag_name: 完了フラグ_非通知
- name: END_時間外
  condition: 受付時間外
  tts_announcement: お電話ありがとうございます。ヘルスケアクリニック厚木の健診予約専用AI電話です。申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、祝日を除く月曜から土曜の、7時50分から16時30分となっております。恐れ入りますが、受付時間内におかけ直しください。お電話ありがとうございました。それでは失礼いたします。
  status: '6'
  sms_flag: '0'
  completion_flag_name: 完了フラグ_時間外
- name: END_聴取失敗
  condition: リトライ上限到達
  tts_announcement: 申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。
  status: '2'
  sms_flag: '0'
  completion_flag_name: 完了フラグ_聴取失敗
- name: END_受付完了_携帯
  condition: 全聴取完了 かつ 携帯（phonetype=1）
  tts_announcement: かしこまりました。<%classification%>の申し込みを受付いたしました。内容を確認のうえ、スタッフから折り返しのお電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。
  status: '1'
  sms_flag: '1'
  completion_flag_name: 完了フラグ_受付完了_携帯
- name: END_受付完了_固定
  condition: 全聴取完了 かつ 固定/その他（phonetype=2）
  tts_announcement: かしこまりました。<%classification%>の申し込みを受付いたしました。内容を確認のうえ、スタッフから折り返しのお電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。
  status: '1'
  sms_flag: '0'
  completion_flag_name: 完了フラグ_受付完了_固定
- name: END_雇用時健診_HP案内
  condition: 雇用時健診を希望（用件確認/コース選択/その他コース確認で検知）
  tts_announcement: 恐れ入りますが、雇用時健診をご希望の方は、当院ホームページのお申し込みフォームよりご予約をお願いいたします。携帯電話からご連絡いただいた方には、ショートメールにてお申し込みフォームのリンクをお送りしておりますので、そちらからお手続きください。お電話ありがとうございました。
  status: '7'
  sms_flag: '2'
  completion_flag_name: 完了フラグ_雇用時健診
- name: END_当日受付不可
  condition: 当日かつ遅刻連絡でない変更・キャンセル等（AIでは受付不可）
  tts_announcement: 当日の変更・キャンセルについては、受診施設へ直接ご連絡ください。
  status: '2'
  sms_flag: '0'
  completion_flag_name: 完了フラグ_当日受付不可
sms_flag_routing:
  enabled: true
  routing_keys:
  - phonetype
  patterns:
  - condition: 携帯（phonetype=1）
    sms_flag: '1'
    notes: END_受付完了_携帯。ショートメールで案内。
  - condition: 固定/その他（phonetype=2）
    sms_flag: '0'
    notes: END_受付完了_固定。固定電話はSMS受信不可のためSMS言及なし。
  - condition: 雇用時健診
    sms_flag: '2'
    notes: END_雇用時健診_HP案内。HP申込みフォームのリンクを携帯にSMS送信（固定は案内のみ・物理的に未配信）。
rag_subflow:
  pattern: none
  inquiry_insertion_point: ''
  pre_termination: false
phonebook:
  enabled: false
tts_modules:
- module_name: 冒頭_アナウンス
  purpose: 冒頭の法人案内
  announcement: 株式会社健康予防医学協会のAI電話です。グループクリニックすべての健診予約を承ります。{recstart}の後に、お話しいただくか、ダイヤルプッシュで操作してください。
- module_name: 明日以降確認
  purpose: 遅刻ガード（明日以降の予約か）
  announcement: ご用件は、明日以降のご予約に関することでしょうか。「はい、そうです」や「いいえ、ちがいます」のようにお話しください。
- module_name: 遅刻種別確認
  purpose: 遅刻 or 変更・キャンセル等の切り分け
  announcement: 遅刻のご連絡でしょうか。それとも、ご予約の変更・キャンセルなどのお問い合わせでしょうか。
- module_name: エリア選択
  purpose: エリア選択（DTMF）
  announcement: 受診を希望されるエリアを、次の三つからお選びください。神奈川エリアは一番、新宿・渋谷エリアは二番、東京・品川エリアは三番を、ダイヤルプッシュで入力してください。
- module_name: 施設案内_神奈川
  purpose: 神奈川エリアの単一施設案内
  announcement: 神奈川エリアの受診希望施設は、ヘルスケアクリニック厚木で承ります。
- module_name: 施設選択_新宿渋谷
  purpose: 新宿・渋谷エリアの施設選択（DTMF）
  announcement: 受診を希望されるクリニックを、次の二つからお選びください。ヒロオカクリニックは一番、渋谷ウエストクリニックは二番を、ダイヤルプッシュで入力してください。
- module_name: 施設選択_東京品川
  purpose: 東京・品川エリアの施設選択（DTMF）
  announcement: 受診を希望されるクリニックを、次の三つからお選びください。ヘルスケアクリニック秋葉原は一番、鉄鋼ビル丸の内クリニックは二番、みなと健診クリニックは三番を、ダイヤルプッシュで入力してください。
- module_name: 健診予約案内
  purpose: 健診予約導入アナウンス（n1）
  announcement: ここからは、健診のご予約を承ります。
- module_name: 用件確認
  purpose: 用件確認（DTMF併用）
  announcement: ご用件をお伺いします。健診のご予約は一番、変更は二番、キャンセルは三番、その他のご用件は四番を、お話しいただくか、番号をプッシュしてください。
- module_name: コース選択
  purpose: コース選択（DTMF併用・⚠顧客確定待ち）
  announcement: ご希望のメニューを、次の四つのうちのいずれかでお話しください。人間ドックは一番、協会けんぽは二番、定期健診は三番、その他の健診は四番を、該当の番号をプッシュしてください。
- module_name: その他コース確認
  purpose: その他コース名称聴取
  announcement: それでは、受診を希望するコースの名称をお話しください。分からない場合は、「わからない」とお話しください。
- module_name: 変更受付案内
  purpose: 変更受付（折り返し回収）案内（n9）
  announcement: 承知いたしました。変更内容の詳細につきましては、後ほどスタッフより折り返し電話の際に、お伺いさせていただきます。
- module_name: 現在の予約日
  purpose: キャンセル対象の現在のご予約日聴取（DTMF8桁）
  announcement: 現在のご予約日を、西暦8桁で、ダイヤルプッシュで入力してください。
- module_name: 再受診希望
  purpose: 再予約希望の確認
  announcement: 再予約のご希望はありますか。「はい、そうです」または「いいえ、違います」のようにお話しください。
- module_name: お問い合わせ内容
  purpose: その他用件の自由聴取（⚠顧客確定待ち）
  announcement: ご用件をお話しください。
- module_name: 受診施設名称聴取
  purpose: 遅刻ルート専用。受診施設の名称を自由発話で聴取（素案フロー準拠）
  announcement: 受診施設の名称をお話しください。
- module_name: 遅刻アナウンス
  purpose: 遅刻ルート専用。到着時間聴取の前に検査制限の免責を案内
  announcement: ご到着時間により、承る事が出来ない検査がございますことをご了承ください。
- module_name: 到着時間
  purpose: 遅刻ルート専用。到着予定時間を自由発話で聴取
  announcement: ご到着予定のお時間をお知らせください。
- module_name: END_非通知
  purpose: 非通知終話
  announcement: お客様のお電話は非通知のため、電話番号が確認できず、折り返しのご連絡をすることができません。電話番号を通知の上おかけ直しいただくか、当院の電話番号の頭に「186」を付けてからおかけください。それでは失礼いたします。
- module_name: END_時間外
  purpose: 時間外終話
  announcement: お電話ありがとうございます。ヘルスケアクリニック厚木の健診予約専用AI電話です。申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、祝日を除く月曜から土曜の、7時50分から16時30分となっております。恐れ入りますが、受付時間内におかけ直しください。お電話ありがとうございました。それでは失礼いたします。
- module_name: END_聴取失敗
  purpose: 聴取失敗終話
  announcement: 申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。
- module_name: END_受付完了_携帯
  purpose: 受付完了終話（携帯・SMS言及あり）
  announcement: かしこまりました。<%classification%>の申し込みを受付いたしました。内容を確認のうえ、スタッフから折り返しのお電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。
- module_name: END_受付完了_固定
  purpose: 受付完了終話（固定・SMS言及なし）
  announcement: かしこまりました。<%classification%>の申し込みを受付いたしました。内容を確認のうえ、スタッフから折り返しのお電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。
- module_name: END_雇用時健診_HP案内
  purpose: 雇用時健診HP誘導終話（SMSでフォームリンク）
  announcement: 恐れ入りますが、雇用時健診をご希望の方は、当院ホームページのお申し込みフォームよりご予約をお願いいたします。携帯電話からご連絡いただいた方には、ショートメールにてお申し込みフォームのリンクをお送りしておりますので、そちらからお手続きください。お電話ありがとうございました。
- module_name: END_当日受付不可
  purpose: 当日の変更・キャンセル等 受付不可終話
  announcement: 当日の変更・キャンセルについては、受診施設へ直接ご連絡ください。
- module_name: 氏名聴取
  purpose: 氏名聴取（slot）。フロー図（素案）の氏名例示に合わせる
  announcement: 受診される方のお名前を『名前は、たなか たろうです』のようにお話しください。
- module_name: 生年月日聴取
  purpose: 生年月日聴取（slot）。フロー図（素案）の生年月日例示に合わせる
  announcement: 受診される方の生年月日を『1990年5月1日』とお話しいただくか、西暦8桁をダイヤルプッシュで入力ください。
- module_name: 聴取_電話番号聴取_連絡先
  purpose: 連絡先電話番号の入力案内（固定回線/別番号path・drawio No.21相当）
  announcement: 日中、連絡の取れる携帯電話番号または、市外局番を含む電話番号を、ダイヤルプッシュで入力してください。入力が終わりましたら「こめじるし」を押してください。
