special_notes:
- 本シナリオは厚木単体ではなく、株式会社健康予防医学協会グループ6施設共通の健診予約統合コールセンター。施設確定後は全施設が同一下流に合流する1メインフロー構成（施設は facility/area context に保存）。
- 元資料は drawio 素案 v1.0（上流B案＋下流A案 v0.1 連結）。⚠要検討ノード（コース選択 n6 / お問い合わせ内容 n12）は顧客確定待ち。図に無い値は推測せず BLOCKER 化している。
- '遅刻ルート: 明日以降確認=いいえ→遅刻種別確認=遅刻 で classification=遅刻 を保存し、受診施設名称聴取(発話・自由テキストを facility に保存)→氏名聴取へ直行（用件確認・エリア/施設選択はスキップ＝素案フロー準拠）。明日以降確認=はい の通常ルートは エリア選択→施設選択→健診予約案内→用件確認へ（施設確定後分岐CMRは遅刻ルート分離に伴い撤去）。'
- '海外（国際）入電: scaffold の opening ブロックは incoming-classifier の海外ラベルを通常フロー(受付時間判定)へ流す仕様のため、海外案内終話は自動生成されない。Brekeke IVR UI で incoming-classifier の海外ラベル(^海外$)を海外案内TTS→saveCompletionFlag2db→Disconnect へ手動配線すること（確認レポート B-4）。海外案内文言: 「申し訳ございません。ヘルスケアクリニック厚木の健診予約専用AI電話です。海外からのお問い合わせはAI電話ではご対応できませんので、代表電話の046-227-1131におかけ直しください。繰り返します。お電話番号は、046-227-1131です。繰り返します。お電話番号は、046-227-1131です。お電話ありがとうございました。それでは失礼いたします。」status=2 / sms_flag=-1 想定。'
- 雇用時健診は携帯/固定で分岐させず単一終話(END_雇用時健診_HP案内)とする。TTS文言で「携帯の方にはSMSでフォームリンクを送る」旨を両者に案内し、SMS(sms_flag=2)は携帯にのみ物理的に配信される。旧要件定義(status7/SMS2)と整合。
- 終話 n16 は素案では用件(予約/変更/キャンセル)を差し込む共通文言だが、動的差し込みは行わず携帯/固定の2終話に共通文言化した。用件は classification context でスタッフが把握可能。用件別の読み上げが必要なら <% classification %> 等で後対応（確認レポート N-7）。
- n9 原文「押し返し電話」は「折り返し電話」の誤記とみなし訂正済み（変更受付案内 TTS）。
- drawio の浮きエッジ pf45N7fBwcwUXuKzfR7y-24（→n9）は作図残骸として設計に取り込まない。
- 電話番号聴取は標準サブフローを採用。素案 n15(固定のみ番号確認・違う時のみDTMF)/yxE1-13(携帯は案内のみ)の簡略仕様は標準サブフロー(携帯=着信番号自動格納+復唱、固定=手入力+復唱)に包含した（確認レポート N-6）。
- MedicalCard（診察券番号）は図に登場しないため不使用。予約希望日(旧要件定義にあり)も drawio には無いため設置しない（コース選択→氏名直行）。
- 現在の予約日(n10)は入電日分類ではなく既存予約日の西暦8桁DTMF入力のため、date_of_call_classifier は不要。
