  script_template: yes_no_classifier
  reference_module: 入力_明日以降確認
  template_params:
    INPUT_MODULE: 入力_明日以降確認
  conditions:
  - match: 肯定
    next: エリア選択
  - match: 否定
    next: 遅刻種別確認
  - match: NO_RESULT
