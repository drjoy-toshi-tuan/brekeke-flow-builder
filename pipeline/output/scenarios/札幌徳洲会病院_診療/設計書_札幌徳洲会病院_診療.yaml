# 設計書 — 札幌徳洲会病院 診療
# 生成元: @director エージェント
# 生成日: 2026-05-01
# 確認レポート: output/scenarios/札幌徳洲会病院_診療/確認レポート_札幌徳洲会病院_診療_20260501.md
# 作業種別: Gen1 (commubo) → Gen3 移管
# 元資料: commubo抽出/【017】札幌徳洲会病院/【0019札幌徳洲会】診療1_M_本番/
version: "1.0"

# =====================================================
# セクション1: 基本情報
# =====================================================
basic_info:
  facility_name: "札幌徳洲会病院"
  scenario_name: "診療"
  group_name: "札幌徳洲会病院_診療"
  flow_name: "札幌徳洲会病院_診療$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "011-890-1110"
  business_hours: "祝日除く月〜金 9:00〜17:00（歯科・口腔外科のみ 13:30〜17:00。土日祝・年末年始 12/31〜1/3 休止、12/30 は営業）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# =====================================================
# セクション2: フロー構成
# =====================================================
flow_structure:
  type: "subflow"
  flows:
    - name: "札幌徳洲会病院_診療$診療"
      role: "main"
      description: "札幌徳洲会病院の診療予約受付フロー。冒頭挨拶 → 本日確認（Yes=代表案内/No=用件聴取） → 用件 5 分岐（新規予約/再診予約/予約変更/予約キャンセル/予約確認） → 用件別固有聴取 → 共通個人情報サブフロー（氏名/生年月日/電話番号、再診のみ診察券番号） → RAG 検索 → classification × phonetype の 2 段分岐で 10 種の正常終話 TTS 出し分け。"
  subflows:
    - name: "札幌徳洲会病院_診療$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。patientName を返却。"
    - name: "札幌徳洲会病院_診療$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（DOB Re-confirmation 復唱あり）。patientDateOfBirth を返却。"
    - name: "札幌徳洲会病院_診療$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（incoming-classifier + Phone Normalization + 復唱あり）。additionalPhoneNumber と phonetype（1=携帯/ip050、2=その他/landline/withheld）を返却。"
    - name: "札幌徳洲会病院_診療$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。medicalCardNumber を返却。再診ルートのみ呼び出し。「わからない」分岐あり。"
    - name: "札幌徳洲会病院_診療$RAG検索"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。pre_termination（パターン2）。Gen1→Gen3 移管デフォルト。「何かご質問はございますか？」→ RAG → 結果返却。"

# =====================================================
# セクション3: フローの目的
# =====================================================
purpose: >
  札幌徳洲会病院の外来予約に関する電話を受け、本日受診（=代表案内）を最初に振り分けた上で、
  新規予約・再診予約・予約変更・予約キャンセル・予約確認の 5 用件を分類する。
  新規ルートでは紹介状有無を聞き、地域連携 3 科（整形外科・糖尿病内科・脳神経外科）/ 健診 / 内視鏡 / 産婦人科ワクチンの特殊分岐を吸収。
  再診ルートではリハビリ科（リハビリ室への有人転送）/ 健診 / 内視鏡 / 産婦人科ワクチンの分岐に対応する。
  変更/キャンセルでは予約日・理由（変更は予約希望日も）を聴取。確認では問い合わせ内容のみフリーテキスト保存。
  共通個人情報（氏名・生年月日・電話番号、再診のみ診察券番号）を聴取後、RAG 検索で追加問い合わせを受け、
  classification × phonetype の 2 段 ContextMatchRouter で携帯/固定 × 5 用件 = 10 種の正常終話 TTS を出し分けて切断する。

# =====================================================
# セクション4: シナリオフロー図
# =====================================================
flow_diagrams:
  - flow_name: "札幌徳洲会病院_診療$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常 → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → 本日確認 (enum, echo_back: あり)
                                            ├─ はい → END_本日代表案内
                                            └─ other(=いいえ) → 用件確認

      用件確認 (enum, echo_back: あり) — Pattern A
            ├─ 新規予約 → 紹介状確認 (enum, echo_back: あり)
            │              ├─ あり → 新規_診療科
            │              └─ other(=なし) → 新規_選定療養費案内 → 新規_診療科
            │
            │   新規_診療科 (enum, no_result_default: 登録なし, echo_back: あり)
            │              ├─ 整形外科 / 糖尿病内科 / 脳神経外科 → END_地域連携室
            │              ├─ 健診 → END_健診案内
            │              ├─ 内視鏡 → END_内視鏡案内
            │              ├─ 産婦人科 → 新規_産婦人科ワクチン確認
            │              │              ├─ ワクチン → 新規_ワクチン案内 → 共通_診察券要否分岐
            │              │              └─ other(=ワクチン以外) → 共通_診察券要否分岐
            │              └─ other(=その他通常診療科) → 共通_診察券要否分岐
            │
            ├─ 再診予約 → 再診_診療科 (enum, no_result_default: 登録なし, echo_back: あり)
            │              ├─ リハビリテーション科 → 再診_リハビリ転送 (call_transfer)
            │              │                            ├─ 成功 → END_転送成功
            │              │                            └─ 失敗 → END_リハビリ転送失敗
            │              ├─ 健診 → END_健診案内
            │              ├─ 内視鏡 → END_内視鏡案内
            │              ├─ 産婦人科 → 再診_産婦人科ワクチン確認
            │              │              ├─ ワクチン → 再診_ワクチン案内 → 共通_診察券要否分岐
            │              │              └─ other(=ワクチン以外) → 共通_診察券要否分岐
            │              └─ other(=通常進行) → 共通_診察券要否分岐
            │
            ├─ 予約変更 → 変更_診療科 (enum, no_result_default: 登録なし, echo_back: あり)
            │              → 変更_予約日 (datetime, echo_back: あり)
            │              → 変更_理由 (text)
            │              → 変更_予約希望日 (text)
            │              → 共通_診察券要否分岐
            │
            ├─ 予約キャンセル → キャンセル_診療科 (enum, no_result_default: 登録なし, echo_back: あり)
            │                    → キャンセル_予約日 (datetime, echo_back: あり)
            │                    → キャンセル_理由 (text)
            │                    → 共通_診察券要否分岐
            │
            └─ other(=予約確認) → 確認_問い合わせ内容 (text) → 共通_診察券要否分岐

      共通_診察券要否分岐 (CMR on OpenAI_用件確認)
            ├─ 再診予約 → 診察券番号聴取 (subflow) → 氏名聴取
            └─ other(=新規/変更/キャンセル/確認) → 氏名聴取

      氏名聴取 (subflow) → 生年月日聴取 (subflow) → 電話番号聴取 (subflow) → RAG検索 (subflow)
            → 終話分岐_電話種別 (CMR on 電話番号聴取)
                  ├─ 携帯(1) → 終話分岐_携帯_用件 (CMR on OpenAI_用件確認)
                  │              ├─ 新規予約 → END_新規予約_携帯
                  │              ├─ 再診予約 → END_再診予約_携帯
                  │              ├─ 予約変更 → END_予約変更_携帯
                  │              ├─ 予約キャンセル → END_予約キャンセル_携帯
                  │              └─ other(=予約確認) → END_予約確認_携帯
                  └─ other(=固定/その他) → 終話分岐_固定_用件 (CMR on OpenAI_用件確認)
                                  ├─ 新規予約 → END_新規予約_固定
                                  ├─ 再診予約 → END_再診予約_固定
                                  ├─ 予約変更 → END_予約変更_固定
                                  ├─ 予約キャンセル → END_予約キャンセル_固定
                                  └─ other(=予約確認) → END_予約確認_固定
    notes: |
      用件・診療科・紹介状・本日確認は Pattern A（hearing.conditions で直接 next を分岐）。
      終話は classification × phonetype の 2 段 ContextMatchRouter（Pattern B）。
      診察券聴取は再診のみ（共通_診察券要否分岐 で classification を見て分岐）。
      産婦人科ワクチン確認は新規/再診のみに配置（変更/キャンセル/確認は対象外）。

# =====================================================
# セクション4b: シナリオフロー定義（ブロック構成）
# =====================================================
scenario_flow:
  # ---------- 冒頭 ----------
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 本日確認

  # ---------- 本日確認（Yes/No）----------
  - step: 本日確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "はい"
        next: END_本日代表案内
      - match: "other"
        next: 用件確認

  # ---------- 用件確認（5 分岐 Pattern A）----------
  - step: 用件確認
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "新規予約"
        next: 紹介状確認
      - match: "再診予約"
        next: 再診_診療科
      - match: "予約変更"
        next: 変更_診療科
      - match: "予約キャンセル"
        next: キャンセル_診療科
      - match: "other"
        next: 確認_問い合わせ内容

  # =====================================================
  # 新規予約ルート
  # =====================================================
  - step: 紹介状確認
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "あり"
        next: 新規_診療科
      - match: "other"
        next: 新規_選定療養費案内

  - step: 新規_選定療養費案内
    type: announcement
    next: 新規_診療科

  - step: 新規_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "整形外科"
        next: END_地域連携室
      - match: "糖尿病内科"
        next: END_地域連携室
      - match: "脳神経外科"
        next: END_地域連携室
      - match: "健診"
        next: END_健診案内
      - match: "内視鏡"
        next: END_内視鏡案内
      - match: "産婦人科"
        next: 新規_産婦人科ワクチン確認
      - match: "other"
        next: 共通_診察券要否分岐

  - step: 新規_産婦人科ワクチン確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "ワクチン"
        next: 新規_ワクチン案内
      - match: "other"
        next: 共通_診察券要否分岐

  - step: 新規_ワクチン案内
    type: announcement
    next: 共通_診察券要否分岐

  # =====================================================
  # 再診予約ルート
  # =====================================================
  - step: 再診_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "リハビリテーション科"
        next: 再診_リハビリ転送
      - match: "健診"
        next: END_健診案内
      - match: "内視鏡"
        next: END_内視鏡案内
      - match: "産婦人科"
        next: 再診_産婦人科ワクチン確認
      - match: "other"
        next: 共通_診察券要否分岐

  - step: 再診_産婦人科ワクチン確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "ワクチン"
        next: 再診_ワクチン案内
      - match: "other"
        next: 共通_診察券要否分岐

  - step: 再診_ワクチン案内
    type: announcement
    next: 共通_診察券要否分岐

  - step: 再診_リハビリ転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "転送いたしましたが電話使用中のためお繋ぎすることが出来ませんでした。お時間を空けておかけ直しください。電話番号は0 1 1-890-1622です。"
    conditions:
      - match: "failure"
        next: END_リハビリ転送失敗
    # 転送先電話番号は人間が IVR プロパティで設定（params.number は空）。
    # 転送成功（status=3）→ END_転送成功 は scaffold で自動補完。
    # 転送失敗（status=9）は標準の END_転送失敗 を使わず、施設固有の END_リハビリ転送失敗
    # （011-890-1622 案内付き）に上書き接続する。

  # =====================================================
  # 予約変更ルート
  # =====================================================
  - step: 変更_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "default"
        next: 変更_予約日

  - step: 変更_予約日
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 変更_理由

  - step: 変更_理由
    type: hearing
    output_format: text
    retry_failure: skip
    next: 変更_予約希望日

  - step: 変更_予約希望日
    type: hearing
    output_format: text
    retry_failure: skip
    next: 共通_診察券要否分岐

  # =====================================================
  # 予約キャンセルルート
  # =====================================================
  - step: キャンセル_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "default"
        next: キャンセル_予約日

  - step: キャンセル_予約日
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: キャンセル_理由

  - step: キャンセル_理由
    type: hearing
    output_format: text
    retry_failure: skip
    next: 共通_診察券要否分岐

  # =====================================================
  # 予約確認ルート
  # =====================================================
  - step: 確認_問い合わせ内容
    type: hearing
    output_format: text
    retry_failure: skip
    next: 共通_診察券要否分岐

  # =====================================================
  # 共通: 診察券要否分岐（再診のみ診察券聴取あり）
  # =====================================================
  - step: 共通_診察券要否分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "再診予約"
        next: 診察券番号聴取
      - match: "other"
        next: 氏名聴取

  # =====================================================
  # 共通: 個人情報サブフロー連鎖
  # =====================================================
  - step: 診察券番号聴取
    type: subflow
    flowname: "札幌徳洲会病院_診療$診察券番号聴取"
    next: 氏名聴取

  - step: 氏名聴取
    type: subflow
    flowname: "札幌徳洲会病院_診療$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "札幌徳洲会病院_診療$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "札幌徳洲会病院_診療$電話番号聴取"
    next: RAG検索

  - step: RAG検索
    type: subflow
    flowname: "札幌徳洲会病院_診療$RAG検索"
    next: 終話分岐_電話種別

  # =====================================================
  # 終話分岐（Pattern B: phonetype × classification の 2 段 CMR）
  # =====================================================
  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: 終話分岐_携帯_用件
      - match: "other"
        next: 終話分岐_固定_用件

  - step: 終話分岐_携帯_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "新規予約"
        next: END_新規予約_携帯
      - match: "再診予約"
        next: END_再診予約_携帯
      - match: "予約変更"
        next: END_予約変更_携帯
      - match: "予約キャンセル"
        next: END_予約キャンセル_携帯
      - match: "other"
        next: END_予約確認_携帯

  - step: 終話分岐_固定_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "新規予約"
        next: END_新規予約_固定
      - match: "再診予約"
        next: END_再診予約_固定
      - match: "予約変更"
        next: END_予約変更_固定
      - match: "予約キャンセル"
        next: END_予約キャンセル_固定
      - match: "other"
        next: END_予約確認_固定

  # =====================================================
  # 終話ブロック（termination — saveCompletionFlag2db + TTS + Disconnect は scaffold 自動生成）
  # =====================================================
  - step: END_本日代表案内
    type: termination
    termination_ref: "END_本日代表案内"

  - step: END_地域連携室
    type: termination
    termination_ref: "END_地域連携室"

  - step: END_健診案内
    type: termination
