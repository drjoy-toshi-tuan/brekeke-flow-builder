    announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、土曜日曜祝日、年末年始を除く、月曜日から金曜日の9時から17時、となっております。恐れ入りますが、受付時間内におかけなおしください。"

  # === 本日確認 ===
