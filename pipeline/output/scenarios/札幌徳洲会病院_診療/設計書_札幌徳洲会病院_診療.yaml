  # --- リハビリ転送失敗系（call_transfer の on_failure。status=3/9 と END_転送成功/失敗 は scaffold が自動補完）---
  - name: "END_リハビリ転送失敗"
    condition: "再診_リハビリ転送 が失敗（電話使用中等）"
    tts_announcement: "転送いたしましたが電話使用中のためお繋ぎすることが出来ませんでした。お時間を空けてへおかけ直しください。電話番号は0 1 1-890-1622です。お電話ありがとうございました。"
    status: "9"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_リハビリ転送失敗"

# smsFlag 分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # 携帯/固定の終話 TTS 出し分けは ContextMatchRouter(phonetype) で実装。
  # smsFlag 自体は携帯=1, 固定=-1 で個別に termination ごとに設定。
  # Dr.JOY 側で電話番号に基づいて SMS 実送信を判断。

