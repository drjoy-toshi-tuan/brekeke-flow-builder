# =====================================================
# セクション8: 終話パターン
# =====================================================
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、土曜日曜祝日、年末年始を除く、月曜日から金曜日の9時から17時、となっております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "用件確認・紹介状確認のリトライ上限到達"
    tts_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表番号までおかけなおしください。代表電話番号は0 1 1-890-1110です。受付時間は土曜・日曜・祝日、年末年始を除く、月曜日から金曜日の13時から17時です。なお、歯科・口腔外科については受付時間が13時30分から17時までとなります。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 代表案内系 ---
  - name: "END_本日代表案内"
    condition: "本日確認 = はい"
    tts_announcement: "本日の受診に関する事につきましては、恐れ入りますが、代表電話番号へおかけください。代表電話番号は0 1 1-890-1110です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_本日代表案内"

  - name: "END_地域連携室"
    condition: "新規予約ルートで整形外科/糖尿病内科/脳神経外科を聴取（紹介状有無に関わらず）"
    tts_announcement: "申し訳ございません。お申し込みになられた診療科については、紹介元の病院より、直接のご連絡をお願いしております。紹介元の病院に連絡を取っていただき、当院、医療連携室までお電話するよう、お伝えください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_地域連携室"

  - name: "END_健診案内"
    condition: "新規予約/再診予約ルートで健診を聴取"
    tts_announcement: "健康診断は健診担当が承ります。代表番号にかけていただき用件をお伝えください。健診センターへお繋ぎ致します。代表電話番号は0 1 1-890-1110です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_健診案内"

  - name: "END_内視鏡案内"
    condition: "新規予約/再診予約ルートで内視鏡を聴取"
    tts_announcement: "内視鏡検査の予約は内視鏡担当が承ります。代表番号にかけていただき用件をお伝えください。内視鏡室へお繋ぎ致します。代表電話番号は0 1 1-890-1110です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_内視鏡案内"

  # --- 正常完了系（5 用件 × 携帯/固定 = 10 種）---
  # 携帯時のみ「終話後、予約に関するSMSが送信されます」を併記。固定時は SMS 言及なし。
  # 予約確認のみ「終話後、予約内容確認のSMS」と文言が別。
