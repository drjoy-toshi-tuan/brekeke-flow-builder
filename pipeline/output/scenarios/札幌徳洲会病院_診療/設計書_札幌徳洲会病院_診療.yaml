# =====================================================
# セクション11: 特記事項・制約
# =====================================================
special_notes:
  - "Gen1→Gen3 移管: Commubo の「箱」構造を 9 ブロック型に変換。entity_classification.md / entity_stt_patch.json / entity_openai_synonyms.md は scaffold/properties が自動取り込みするため、director は転記不要"
  - "用件 5 分岐（新規予約/再診予約/予約変更/予約キャンセル/予約確認）。Gen1 元資料の 2 段構造（「診察予約」→ 通院中? Yes/No → 新規/再診）は Gen3 で OpenAI が直接 5 分岐判定する形に圧縮"
  - "本日確認は用件聴取の前段。Yes → 代表案内終話、No → 用件聴取に進む。Gen1 元資料の 本日確認.yaml の END_本日 / END_本日以外 を Gen3 で正しく分岐"
  - "新規予約の地域連携 3 科（整形外科 / 糖尿病内科 / 脳神経外科）は紹介状有無に関わらず END_地域連携室 に到達"
  - "再診予約の診療科 NG リストと新規予約の診療科 NG リストは非対称（重複しない）。整形外科は新規=地域連携 NG、再診=通常進行。共通化禁止、個別 hearing で実装"
  - "再診のリハビリテーション科は call_transfer（Blind Transfer）でリハビリ室へ転送。失敗時は END_リハビリ転送失敗（011-890-1622 案内）"
  - "産婦人科 × ワクチン分岐は新規/再診ルートのみに配置。変更/キャンセル/確認ルートでは産婦人科でも特殊分岐なし（移管ノートの解釈に従う）"
  - "代表電話 011-890-1110 は病院代表（地域連携・健診・内視鏡・本日代表案内・聴取失敗で使用）"
