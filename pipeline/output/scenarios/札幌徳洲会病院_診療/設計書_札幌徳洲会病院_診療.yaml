# =====================================================
# セクション6: 聴取項目一覧
# =====================================================
hearing_items:
  - order: 1
    name: "本日確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "todayConfirmation"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "本日受診の Yes/No 確認。はい→END_本日代表案内、いいえ→用件確認。DTMF 1=はい, 2=いいえ"

  - order: 2
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規予約"
      - "再診予約"
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
    notes: "5 分岐判定。DTMF 1=新規予約, 2=予約変更, 3=予約確認, 4=予約キャンセル, 5=再診予約"

  - order: 3
    name: "紹介状確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "introduction"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "新規予約ルートのみ。あり→新規_診療科、なし→新規_選定療養費案内→新規_診療科。DTMF 1=あり, 2=なし"

  - order: 4
    name: "新規_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "enum"
    no_result_default: "登録なし"
    output_labels:
      - "整形外科"
      - "糖尿病内科"
      - "脳神経外科"
      - "健診"
      - "内視鏡"
      - "産婦人科"
      - "通常診療科"
    notes: "新規予約ルート。地域連携 3 科（整形外科/糖尿病内科/脳神経外科）→ END_地域連携室、健診/内視鏡 → 各案内、産婦人科 → ワクチン確認、通常診療科（catch-all）→ 通常進行"

  - order: 5
    name: "新規_産婦人科ワクチン確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "vaccineConfirmation"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "ワクチン"
      - "ワクチン以外"
    notes: "新規予約ルートで産婦人科聴取後のみ。「ワクチン」発話あり→ワクチン案内、それ以外→通常進行"

  - order: 6
    name: "再診_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "enum"
    no_result_default: "登録なし"
    output_labels:
      - "リハビリテーション科"
      - "健診"
      - "内視鏡"
      - "産婦人科"
      - "通常診療科"
    notes: "再診予約ルート。リハビリテーション科 → 有人転送（call_transfer）、健診/内視鏡 → 各案内、産婦人科 → ワクチン確認、通常診療科（catch-all）→ 通常進行"

  - order: 7
    name: "再診_産婦人科ワクチン確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "vaccineConfirmation"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "ワクチン"
      - "ワクチン以外"
    notes: "再診予約ルートで産婦人科聴取後のみ。「ワクチン」発話あり→ワクチン案内、それ以外→通常進行"

  - order: 8
    name: "変更_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "enum"
    no_result_default: "登録なし"
    output_labels:
      - "診療科名"
    notes: "予約変更ルート。全診療科を受付（OpenAI が正規化された診療科名を出力する catch-all）→ 変更_予約日"

  - order: 9
    name: "変更_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    notes: "予約変更ルート。現在の予約日を YYYY-MM-DD で保存。SKILL_C 自由テキスト + datetime 正規化（DTMF 4 桁機能は未実装）"

  - order: 10
    name: "変更_理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    notes: "予約変更ルート。フリーテキスト保存"

  - order: 11
    name: "変更_予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "summarize"
    output_format: "text"
    notes: "予約変更ルート。フリーテキスト（「決まっていない」も許容）"

  - order: 12
    name: "キャンセル_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "enum"
    no_result_default: "登録なし"
    output_labels:
      - "診療科名"
    notes: "予約キャンセルルート。全診療科を受付（OpenAI が正規化された診療科名を出力する catch-all）→ キャンセル_予約日"

  - order: 13
    name: "キャンセル_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    notes: "予約キャンセルルート。現在の予約日を YYYY-MM-DD で保存"

  - order: 14
    name: "キャンセル_理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    notes: "予約キャンセルルート。フリーテキスト保存"

  - order: 15
    name: "確認_問い合わせ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "summarize"
    output_format: "text"
    notes: "予約確認ルートのみ。お問い合わせ内容をフリーテキスト保存"

# =====================================================
# セクション7: ステップ詳細
# =====================================================
step_details:
  - step_name: "本日確認"
    tts_announcement: "まず初めに、本日の受診に関する内容ですか？はい、または、いいえ、で、お答えください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」「肯定」エンティティを含む"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「違います」「否定」エンティティを含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "todayConfirmation"
    next_step: "はい→END_本日代表案内 / いいえ→用件確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話ください。「1．予約を取る」、「2．変更する」、「3．確認する」、「4．キャンセルする」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規予約"
        - "再診予約"
        - "予約変更"
        - "予約キャンセル"
        - "予約確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「予約を取る」「予約したい」「初診」「初めて」を含む"
          output: "新規予約"
        - input: "「再診」「定期受診」「いつもの」「通院中」「通っている」を含む"
          output: "再診予約"
        - input: "DTMF 2 または「変更」「変えたい」「延期」「取り直し」を含む"
          output: "予約変更"
        - input: "DTMF 4 または「キャンセル」「取り消し」「やめる」を含む"
          output: "予約キャンセル"
        - input: "DTMF 3 または「確認」「教えて」「日時確認」「忘れた」を含む"
          output: "予約確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "新規予約→紹介状確認 / 再診予約→再診_診療科 / 予約変更→変更_診療科 / 予約キャンセル→キャンセル_診療科 / 予約確認→確認_問い合わせ内容"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "紹介状確認"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「あり」「あります」「持っている」「もっています」「いただいている」を含む"
          output: "あり"
        - input: "DTMF 2 または「なし」「ありません」「持っていない」「もってない」を含む"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "introduction"
    next_step: "あり→新規_診療科 / なし→新規_選定療養費案内→新規_診療科"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "新規_選定療養費案内"
    tts_announcement: "かしこまりました。他の医療機関からの紹介状をお持ちでない患者さんにつきましては、通常の診療費とは別に、初診時選定療養費として、2200円を全額自己負担いただいております。予めご了承ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "新規_診療科"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "新規_診療科"
    tts_announcement: "受診を希望する診療科をおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "整形外科"
        - "糖尿病内科"
        - "脳神経外科"
        - "健診"
        - "内視鏡"
        - "産婦人科"
        - "通常診療科"
        - "NO_RESULT"
      mapping:
        - input: "「整形外科」「整形」「TK」を含む"
          output: "整形外科"
        - input: "「糖尿」「糖尿病」「糖尿病内科」を含む"
          output: "糖尿病内科"
        - input: "「脳神経外科」「脳外」「頭痛」を含む"
          output: "脳神経外科"
        - input: "「健診」「健康診断」「人間ドック」を含む"
          output: "健診"
        - input: "「内視鏡」「胃カメラ」「大腸カメラ」「ピロリ菌」を含む"
          output: "内視鏡"
