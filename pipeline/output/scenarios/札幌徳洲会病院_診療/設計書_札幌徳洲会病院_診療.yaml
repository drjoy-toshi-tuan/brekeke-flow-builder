    announcement: "他の医療機関からの紹介状はお持ちですか？"

  - module_name: "新規_選定療養費案内"
    purpose: "選定療養費の案内（announcement only）"
    announcement: "かしこまりました。他の医療機関からの紹介状をお持ちでない患者さんにつきましては、通常の診療費とは別に、初診時選定療養費として、2200円を全額自己負担いただいております。予めご了承ください。"

  - module_name: "新規_診療科"
