# 設計書 -- 蘇生会総合病院 健診
# 生成元: @director エージェント
# 生成日: 2026/05/01
# 確認レポート: output/scenarios/蘇生会総合病院_健診/確認レポート_蘇生会総合病院_健診_20260501.md
# 作業種別: Gen1→Gen3 移管
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "蘇生会総合病院"
  scenario_name: "健診"
  group_name: "蘇生会総合病院"
  flow_name: "蘇生会総合病院$健診"
  target_facility: "蘇生会総合病院（健康増進センター）"
  office_id: "TODO_要確認"
  phone_number: "0120-621-388"
  business_hours: "祝日を除く月〜土 9:00〜16:00（年末年始 12/31〜1/4 は注意喚起のみ。NON-BLOCKER N-1）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "蘇生会総合病院$健診"
      role: "main"
      description: |
        冒頭 → 年末年始注意 → 人間ドック等対象確認(Yes/No) → 用件聴取(5分岐) → 各ルート聴取 →
        氏名→生年月日→連絡先 サブフロー → 終話分岐(phonetype) → END。
        キャンセルは個人情報聴取スキップで即終話。対象外は 0570-071-101 案内、聴取失敗・時間外は 0120-621-388 案内。
  subflows:
    - name: "蘇生会総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー。受診者氏名（新規/変更）/ ご連絡者氏名（問い合わせ）/ ご予約者氏名（キャンセル時は使用しない）の文言差し替えは prompter で対応せず PatientName 1 枠で受ける（director.md §3.1.1）。担当者名（企業ルート）は別 hearing で対応"
    - name: "蘇生会総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 使用。和暦/西暦両対応・大正/昭和元年/昭和/平成元年/平成/令和元年/令和の自動判定"
    - name: "蘇生会総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Phone Normalization + Re-confirmation。incoming-classifier で携帯/固定/その他を分岐し phonetype を設定。非通知は冒頭 opening で既に弾いているためここには到達しない"

# --- セクション3: フローの目的 ---
purpose: |
  蘇生会総合病院 健康増進センター予約専用ダイヤルへの着信を受け、
  人間ドック・健康診断・精密検査の予約／変更／キャンセル／企業担当者問い合わせ／その他問い合わせ
  の用件を聴取し、患者情報（氏名・生年月日・連絡先電話番号）を収集して折り返し受付を自動化する。
  対象外用件は代表電話番号 0570-071-101 へ案内し、聴取失敗・時間外は健診ダイヤル 0120-621-388 を再案内する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "蘇生会総合病院$健診"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信分類(incoming-classifier)
              ├─ 非通知 → END_非通知 → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times)
                                    ├─ 時間外 → END_時間外(0120-621-388案内) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                                    └─ 受付可 → 冒頭_アナウンス(TTS)
                                                  → 年末年始判定(script: custom 12/31〜1/4)
                                                      ├─ 年末年始 → 年末年始_アナウンス(TTS) → 人間ドック確認
                                                      └─ 通常期間 → 人間ドック確認
                                                  → 人間ドック確認(hearing yes/no)
                                                      ├─ はい → 用件聴取
                                                      └─ other → END_対象外案内(0570-071-101案内, 3回繰返) → status=2 → 切断

      用件聴取(hearing enum 5分岐, echo_back: true, DTMF 1-5)
        ├─ 新規 → 受診歴聴取(text) → 受診内容聴取(text) → 受診希望日聴取(text) → 連絡事項聴取(text)
        │           → 個人情報聴取(★氏名→★生年月日→★電話番号 サブフロー) → 受付完了案内_新規(announcement)
        │           → 終話_phonetype分岐
        │
        ├─ 変更 → 予約日聴取(datetime) → 変更内容確認(hearing yes/no: 予約日変更ですか？)
        │           ├─ はい → 受診希望日聴取(text)
        │           └─ other → 変更内容詳細聴取(text)
        │           → 連絡事項聴取(text) → 個人情報聴取 → 受付完了案内_変更 → 終話_phonetype分岐
        │
        ├─ キャンセル → END_キャンセル受付(個人情報スキップ, status=1, smsFlag=-1)
        │
        ├─ 企業 → 企業名聴取(text) → 担当者名聴取(text) → 企業問合せ内容聴取(text)
        │           → 個人情報聴取 → 受付完了案内_問い合わせ → 終話_phonetype分岐
        │
        └─ other(=問い合わせ) → 問い合わせ内容聴取(text) → 連絡事項聴取(text)
                                  → 個人情報聴取 → 受付完了案内_問い合わせ → 終話_phonetype分岐

      終話_phonetype分岐 (context_match_router: 電話番号聴取)
        ├─ 携帯 → END_締めあいさつ_携帯(SMS送信あり, status=1, smsFlag=1)
        └─ other → END_締めあいさつ_その他(SMS送信なし, status=1, smsFlag=-1)

      ─── サブフロー遷移（★マーク）───
      ★氏名聴取    = Custom Jump to Flow → 蘇生会総合病院$氏名聴取（return）
      ★生年月日聴取 = Custom Jump to Flow → 蘇生会総合病院$生年月日聴取（return）
      ★電話番号聴取 = Custom Jump to Flow → 蘇生会総合病院$電話番号聴取（return）

      ─── 異常終話 ───
      END_非通知       : 非通知着信     → status=2, smsFlag=-1
      END_時間外       : 受付時間外     → status=6, smsFlag=-1（0120-621-388案内）
      END_聴取失敗     : リトライ上限到達 → status=3, smsFlag=-1（0120-621-388案内）
      END_対象外案内   : 人間ドック等以外 → status=2, smsFlag=-1（0570-071-101案内）
    notes: |
      Pattern A 採用箇所: 人間ドック確認・用件聴取・変更内容確認（OpenAI 直後分岐）。
      Pattern B 採用箇所: 終話_phonetype分岐（context_match_router: 電話番号聴取の phonetype 出力を参照）。
      用件聴取は echo_back: true で内蔵復唱（NON-BLOCKER N-3）。
      キャンセルは個人情報聴取をスキップする蘇生会健診固有仕様（director 判断ログ #5）。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 年末年始判定

  # --- 年末年始判定（script: custom）---
  - step: 年末年始判定
    type: script
    script_template: custom
    template_params:
      DESCRIPTION: "現在日が 12/31〜1/4 の期間に該当するかを判定。年末年始は注意喚起 TTS を流して通常フローへ復帰、それ以外は人間ドック確認へ直行"
    conditions:
      - match: "年末年始"
        next: 年末年始_アナウンス
      - match: "other"
        next: 人間ドック確認
    notes: "施設固有の休館日（年末年始 12/31〜1/4）に該当するかをカレンダー計算で判定する。年末年始は健康増進センターが休診となる休館日期間であり、祝日相当の固定日付による営業日判定が必要なため Script モジュールでのみ実現可能（OpenAI + ContextMatchRouter では現在日付の比較ができない）。Gen1 main.yaml `時間判断` 箱（lessEqual 12/30日前 / 12/31〜1/4）の Gen3 移植。Brekeke Script で Date() を使った月/日固定の休館日期間判定。NON-BLOCKER N-2 で動作確認推奨"

  - step: 年末年始_アナウンス
    type: announcement
    next: 人間ドック確認

  # --- 人間ドック・健康診断・精密検査 確認（Yes/No）---
  - step: 人間ドック確認
    type: hearing
    output_format: enum
    save_to: kenshinTargetConfirm
    conditions:
      - match: "はい"
        next: 用件聴取
      - match: "other"
        next: END_対象外案内

  # --- 用件聴取（5-way enum, echo_back: true, DTMF 1-5）---
  - step: 用件聴取
    type: hearing
    output_format: enum
    save_to: classification
    echo_back: true
    conditions:
      - match: "新規"
        next: 受診歴聴取
      - match: "変更"
        next: 予約日聴取
      - match: "キャンセル"
        next: END_キャンセル受付
      - match: "企業"
        next: 企業名聴取
      - match: "other"
        next: 問い合わせ内容聴取

  # --- 新規ルート ---
  - step: 受診歴聴取
    type: hearing
    output_format: text
    save_to: history
    next: 受診内容聴取
    retry_failure: skip

  - step: 受診内容聴取
    type: hearing
    output_format: text
    save_to: course
    next: 受診希望日聴取
    retry_failure: skip

  - step: 受診希望日聴取
    type: hearing
    output_format: text
    save_to: desiredDate
    next: 連絡事項聴取
    retry_failure: skip

  # --- 変更ルート ---
  - step: 予約日聴取
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 変更内容確認
    retry_failure: skip

  - step: 変更内容確認
    type: hearing
    output_format: enum
    save_to: changeReservationDate
    conditions:
      - match: "はい"
        next: 受診希望日聴取_変更
      - match: "other"
        next: 変更内容詳細聴取

  - step: 受診希望日聴取_変更
    type: hearing
    output_format: text
    save_to: desiredDate
    next: 連絡事項聴取
    retry_failure: skip

  - step: 変更内容詳細聴取
    type: hearing
    output_format: text
    save_to: changeContent
    next: 連絡事項聴取
    retry_failure: skip

  # --- 企業ルート ---
  - step: 企業名聴取
    type: hearing
    output_format: text
    save_to: companyName
    next: 担当者名聴取
    retry_failure: skip

  - step: 担当者名聴取
    type: hearing
    output_format: text
    save_to: staffName
    next: 企業問合せ内容聴取
    retry_failure: skip

  - step: 企業問合せ内容聴取
    type: hearing
    output_format: text
    save_to: companyInquiry
    next: 連絡事項聴取
    retry_failure: skip

  # --- 問い合わせルート（other）---
  - step: 問い合わせ内容聴取
    type: hearing
    output_format: text
    save_to: inquiry
    next: 連絡事項聴取
    retry_failure: skip

  # --- 共通: 連絡事項 → 個人情報聴取 ---
  - step: 連絡事項聴取
    type: hearing
    output_format: text
    save_to: notes
    next: 氏名聴取
    retry_failure: skip

  - step: 氏名聴取
    type: subflow
    flowname: "蘇生会総合病院$氏名聴取"
    target: 氏名聴取
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "蘇生会総合病院$生年月日聴取"
    target: 生年月日聴取
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "蘇生会総合病院$電話番号聴取"
    target: 電話番号聴取
    next: 受付完了_用件分岐

  # --- 受付完了案内（用件別 announcement）---
  - step: 受付完了_用件分岐
    type: context_match_router
    reference_module: "用件聴取"
    conditions:
      - match: "新規"
        next: 受付完了_新規
      - match: "変更"
        next: 受付完了_変更
      - match: "企業"
        next: 受付完了_問い合わせ
      - match: "other"
        next: 受付完了_問い合わせ

  - step: 受付完了_新規
    type: announcement
    next: 終話_phonetype分岐

  - step: 受付完了_変更
    type: announcement
    next: 終話_phonetype分岐

  - step: 受付完了_問い合わせ
    type: announcement
    next: 終話_phonetype分岐

  # --- 終話 phonetype 分岐 ---
  - step: 終話_phonetype分岐
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: END_締めあいさつ_携帯
      - match: "other"
        next: END_締めあいさつ_その他

  # --- 終話ブロック ---
  - step: END_締めあいさつ_携帯
    type: termination
    termination_ref: "END_締めあいさつ_携帯"

  - step: END_締めあいさつ_その他
    type: termination
    termination_ref: "END_締めあいさつ_その他"

  - step: END_キャンセル受付
    type: termination
    termination_ref: "END_キャンセル受付"

  - step: END_対象外案内
    type: termination
    termination_ref: "END_対象外案内"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "新規"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "企業"
      - id: "5"
        order: "5"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件聴取の OpenAI 出力。新規=健診の予約、企業=企業担当者問い合わせ、問い合わせ=その他お問い合わせ。other → 問い合わせ にフォールバック"

  - context_name: "kenshinTargetConfirm"
    context_name_jp: "対象用件確認"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "「人間ドック、健康診断、精密検査について、でよろしいでしょうか？」の Yes/No 結果。other（=いいえ相当）は END_対象外 へ"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名聴取サブフローで聴取。新規=受診者、問い合わせ=ご連絡者、変更=受診者、企業=企業ご連絡者氏名（PatientName 1 枠で集約）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "生年月日聴取サブフロー。和暦/西暦対応・大正〜令和の元号自動判定"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "電話番号聴取サブフロー。携帯着信は着信番号自動格納、固定/その他は手動聴取"

  - context_name: "phonetype"
    context_name_jp: "電話種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "電話番号聴取サブフロー内で設定（携帯=ショートメール送信可 / その他=送信不可）"

  - context_name: "history"
    context_name_jp: "受診歴"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "新規ルートのみ。「これまでに外来受診を含め、当院を受診されたことはありますか？」の自由応答（Yes/No 含む）。NON-BLOCKER N-7"

  - context_name: "course"
    context_name_jp: "受診内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "新規ルートのみ。「人間ドック」「健康診断」「特定健診」等の希望受診内容"

  - context_name: "desiredDate"
    context_name_jp: "受診希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "新規・変更（予約日変更=Yes）ルートで聴取。「4月1日」形式または「来月上旬」等のフリーワード。NON-BLOCKER N-8"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更ルートのみ聴取。YYYY-MM-DD HH:MM 形式。10月以降に1-9月指定は翌年扱い"

  - context_name: "changeReservationDate"
    context_name_jp: "予約日変更可否"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更ルート。「変更される内容は予約日ですか？」の Yes/No 結果"

  - context_name: "changeContent"
    context_name_jp: "変更内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更ルート（予約日変更ではない場合）。変更を希望する内容のフリーワード"

  - context_name: "companyName"
    context_name_jp: "企業名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業ルートのみ。企業もしくは団体名"

  - context_name: "staffName"
    context_name_jp: "担当者名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業ルートのみ。ご担当者氏名（PatientName とは別 context、文末「ス」削除等のクリーンアップは prompter で対応）"

  - context_name: "companyInquiry"
    context_name_jp: "企業問合せ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業ルートのみ。問合せ内容のフリーワード"

  - context_name: "inquiry"
    context_name_jp: "問い合わせ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "問い合わせ（other）ルートのみ。「最後に、ご用件を自由にお話ください。」の自由応答"

  - context_name: "notes"
    context_name_jp: "連絡事項"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
