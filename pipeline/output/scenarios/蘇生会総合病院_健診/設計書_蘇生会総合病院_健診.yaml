# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "人間ドック確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "kenshinTargetConfirm"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "other"
    notes: "「今回は人間ドック、健康診断、精密検査について、でよろしいでしょうか？」Yes/No。other（=いいえ相当）は END_対象外案内 → 0570-071-101 案内へ"

  - order: 2
    name: "用件聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "変更"
      - "キャンセル"
      - "企業"
      - "other"
    notes: |
      DTMF 1=新規（健診の予約） / 2=変更 / 3=キャンセル / 4=企業 / 5=問い合わせ（=other）。
      OpenAI synonyms（91 件）は entity_openai_synonyms.md を prompter が反映:
        - 新規: 健診/検診/検針/人間ドック/天候診断（誤認）/特定健診/雇い入れ/事業主/就職/進学/生活習慣病/全身/眼瞼すんの（誤認）/人間独/人工診断/返金控寸断（誤認）/返信
        - 変更: 取り直したい/平行/並行/別の/変えたい/予約の方向（誤認）/予約の本校（誤認）/日程/日付
        - キャンセル: 取り消し/取消/取り消す/予約のキャンセル
        - 企業: 企業の担当者の方からのお問い合わせ/企業担当者/企業問合せ
        - 問い合わせ（other）: アクセス/お伺いしたい/お問合せ/その他/確認したい/教えて/金額/検査結果/質問/調べて/聞きたい/料金/なくした/忘れた
      「もしもし」検知も OpenAI プロンプトで救済語扱い（独立 hearing 化しない）。
      echo_back: true により Re-confirmation node が #data# 埋め込みで「ご用件は #data#、でよろしいですか?」を発話（NON-BLOCKER N-3）

  - order: 3
    name: "受診歴聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "history"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "新規ルートのみ。「これまでに外来受診を含め、当院を受診されたことはありますか？」自由応答"

  - order: 4
    name: "受診内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "course"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "新規ルートのみ。「受診内容をお伺いします。「人間ドック」「健康診断」など、ご希望の受診内容をおっしゃってください。」"

  - order: 5
    name: "受診希望日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "新規ルートのみ。「受診希望日を「4月1日」のように日付でお話ください。」フリーワード保存（曖昧表現許容）"

  - order: 6
    name: "予約日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "変更ルートのみ。「現在の予約日を「4月1日」のように日付でお話ください。わからない場合は、分からないとおっしゃってください。」 YYYY-MM-DD HH:MM 形式に変換、10月以降に1-9月指定は翌年扱い"

  - order: 7
    name: "変更内容確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "changeReservationDate"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "other"
    notes: "変更ルート。「変更される内容は予約日ですか？」 はい→受診希望日聴取_変更、other→変更内容詳細聴取"

  - order: 8
    name: "受診希望日聴取_変更"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
