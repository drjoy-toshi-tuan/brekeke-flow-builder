# --- セクション11: 特記事項・制約 ---
special_notes:
  - "蘇生会健診固有: キャンセルルートは個人情報聴取（氏名・生年月日・連絡先）をスキップして即終話する（倉敷との差分、director 判断ログ #5）"
  - "年末年始（12/31〜1/4）はフロー継続。冒頭で注意喚起 TTS のみ流して通常フローへ復帰する（フル休業ではない）"
  - "代表番号は 2 種類: 0570-071-101（人間ドック等以外）、0120-621-388（健診ダイヤル再案内）。両方とも終話 TTS で 3 回繰り返し読み上げる（短縮・省略禁止）"
  - "電話番号には半角ハイフンを使用（例: 0570-071-101）。Brekeke 仕様で全角や中黒は不可"
  - "用件聴取の「もしもし」検知は OpenAI プロンプトで救済語扱い（独立 hearing 化しない、director 判断ログ #6）"
  - "「次へ」「タイトル」等の繋ぎ TTS（「続いて、」「次に、」「ありがとうございます。」「はじめに、」等）は次段ブロック先頭 TTS にマージしている（director 判断ログ #7）"
  - "用件 OpenAI synonyms 91 件は entity_openai_synonyms.md を prompter が反映する。設計書には主要 synonym のみ列挙"
  - "PatientName サブフローは 1 枠のみ。受診者氏名（新規/変更）/ ご連絡者氏名（問い合わせ）/ ご予約者氏名（キャンセル時は使用しない）の文言差し替えは行わず PatientName で集約。担当者名（企業ルート）は別 hearing で対応"
  - "用件聴取の echo_back: true は scaffold 標準の Re-confirmation node（#data# 埋め込み）を使用。Gen1 の個別文言（「健診のご予約、でよろしいですか?」等）は再現しない（NON-BLOCKER N-3）"
  - "受診希望日（新規）と受診希望日（変更）は同じ context（desiredDate）に保存される。フローによってどちらが書き込むか変わる"
  - "saveCompletionFlag2db の status 値は Gen3 許可値（1/2/3/6/7/8/9）のみを使用。Gen2 で使われていた 0/5 は禁止"
  - "TTS は `{tts_g:...}` 形式（小文字、Google TTS デフォルト）。SSML タグは使用禁止（電話番号読み上げ用 say-as は scaffold が自動付与する範囲のみ許容）"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "営業時間（祝日除く月〜土 9:00〜16:00）— Dr.JOY 側スケジュール設定との一致確認 [N-1]"
    resolved: false
  - item: "年末年始判定 Script の動作確認（Brekeke Script で Date() 比較が動作するか）[N-2]"
    resolved: false
  - item: "用件聴取 echo_back の実文言（汎用 #data# 埋め込みで顧客 OK か、個別 5 分岐再現が必要か）[N-3]"
    resolved: false
  - item: "office_id の確定 [N-4]"
    resolved: false
  - item: "IVR 着信電話番号（ARS 番号）の Brekeke 設定 [N-5]"
    resolved: false
  - item: "連絡事項聴取の retry_failure（skip vs end_failure）[N-6]"
    resolved: false
  - item: "受診歴聴取の output_format（text vs enum）[N-7]"
    resolved: false
  - item: "受診希望日聴取の output_format（text 維持で曖昧表現許容、または datetime に絞る）[N-8]"
    resolved: false
  - item: "予約日聴取の datetime 補正ルール（10月以降に1-9月→翌年）動作確認 [N-9]"
    resolved: false
  - item: "キャンセル終話の SMS フラグ（-1 のままで OK か）[N-10]"
    resolved: false
  - item: "企業ルート終話 TTS の文言（個人ルートと同じで OK か別文言が必要か）[N-11]"
    resolved: false
  - item: "SMS 送信文面（Dr.JOY 管理画面で設定）"
    resolved: false
  - item: "稼働休止期間（年末年始のフル休業切替が必要なら Dr.JOY 側設定）"
    resolved: false
  - item: "Dr.JOY 画面表示設定（確認画面表示の有無）"
    resolved: false
