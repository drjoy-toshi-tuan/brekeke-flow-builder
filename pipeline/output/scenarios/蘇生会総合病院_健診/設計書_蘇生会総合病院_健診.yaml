# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "人間ドック確認"
    tts_announcement: "はじめに、今回は人間ドック、健康診断、精密検査について、でよろしいでしょうか？「はい、そうです」や、「いいえ、違います」のように、お答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "other"
      mapping:
        - input: "はい/そうです/大丈夫/合っています/合ってます/問題ありません/違いありません/丈夫"
          output: "はい"
        - input: "いいえ/違います/違う/違って/ダメ/駄目/ノー"
          output: "other"
      no_result_condition: "判別不可時は other（=いいえ扱い）→ END_対象外案内"
    save_to: "kenshinTargetConfirm"
    next_step: "用件聴取（はい）／ END_対象外案内（other）"
    retry_failure: "end_failure"

  - step_name: "用件聴取"
    tts_announcement: |
      ご用件を、次の5つのうちの、いずれかでお話ください。
      「1，健診の予約」「2，予約の変更」「3，予約のキャンセル」「4，企業の担当者の方からのお問い合わせ」「5，その他お問い合わせ」
      もう一度ご案内いたします。
      ご用件を、次の5つのうちの、いずれかでお話ください。
      「1，健診の予約」「2，予約の変更」「3，予約のキャンセル」「4，企業の担当者の方からのお問い合わせ」「5，その他お問い合わせ」
      それでは、お話ください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規"
        - "変更"
        - "キャンセル"
        - "企業"
        - "other"
      mapping:
        - input: "DTMF 1 / 1番 / 一 / 一番 / 健診 / 検診 / 検針 / 人間ドック / ドック / 健康診断 / 健診の予約 / 健診と人間ドック / 雇い入れ / 事業主 / 就職 / 進学 / 生活習慣病 / 全身 / 特定健診 / 予約 / 眼瞼すんの（誤認） / 人間独 / 人工診断 / 天候診断（誤認） / 返信 / ようやく"
          output: "新規"
        - input: "DTMF 2 / 2番 / 二 / 二番 / 変更 / 予約変更 / 予約の変更 / 取り直したい / 取り直す / 平行 / 並行 / 別の / 変えたい / 変えて / 変える / 日程 / 日付 / 予約の方向（誤認） / 予約の本校（誤認）"
          output: "変更"
        - input: "DTMF 3 / 3番 / 三 / 三番 / キャンセル / やめる / 取り消し / 取り消す / 取消 / 予約キャンセル / 予約のキャンセル"
          output: "キャンセル"
        - input: "DTMF 4 / 4番 / 四 / 四番 / 企業 / 企業の担当者の方からのお問い合わせ / 企業担当者 / 企業問合せ"
          output: "企業"
        - input: "DTMF 5 / 5番 / 五 / 五番 / 問い合わせ / お問合せ / お伺いしたい / その他 / アクセス / 確認したい / 教えて / 金額 / 検査結果 / 質問 / 質問したい / 調べて / 聞きたい / 忘れた / なくした / 料金 / もしもし"
          output: "other"
      no_result_condition: "上記いずれにも該当しない場合は other（=問い合わせ扱い、フリーワード救済）"
    save_to: "classification"
    next_step: "新規→受診歴聴取／ 変更→予約日聴取／ キャンセル→END_キャンセル受付／ 企業→企業名聴取／ other→問い合わせ内容聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: "申し訳ございません。うまく聞き取りが出来ませんでした。恐れ入りますが、日曜、祝日を除く、月曜から土曜の9時から16時に、健康増進センター予約専用ダイヤルへおかけなおしください。電話番号が分かる場合は、そのままお切りください。分からない場合はご案内いたしますのでメモをご準備ください。電話番号は0120-621-388です。繰り返します。電話番号は0120-621-388です。繰り返します。電話番号は0120-621-388です。"

  - step_name: "受診歴聴取"
    tts_announcement: "これまでに外来受診を含め、当院を受診されたことはありますか？"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "自由発話（はい/いいえ/初めて/2回目/以前ある 等）"
          output: "そのまま格納"
      no_result_condition: "聴取不可時は skip"
    save_to: "history"
    next_step: "受診内容聴取"
    retry_failure: "skip"

  - step_name: "受診内容聴取"
    tts_announcement: "受診内容をお伺いします。「人間ドック」「健康診断」など、ご希望の受診内容をおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
