# --- smsFlag 分岐設計 ---
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"
  patterns:
    - condition: "phonetype=携帯（正常完了）"
      sms_flag: "1"
      notes: "携帯ルート全用件（新規・変更・問い合わせ・企業）共通。SMS で詳細送信"
    - condition: "phonetype=その他（正常完了）"
      sms_flag: "-1"
      notes: "固定/その他ルート全用件共通。SMS は受信不可のため -1"
    - condition: "キャンセル（個人情報聴取スキップ）"
      sms_flag: "-1"
      notes: "個人情報未取得のため SMS 送信不可"
    - condition: "対象外・非通知・時間外・聴取失敗（異常系）"
      sms_flag: "-1"
      notes: "全異常終話で SMS 送信なし"

