# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 (commubo) → Gen3 移管。Gen1 main.yaml の流れ（個人企業判別 → (企業のみ) 企業団体名 → 連絡先電話番号 → 用件 → 内容フリー → 予約日 → 完了フラグ → 用件確認 → 携帯チェック → クローズ）は、Gen3 標準パターン（用件先 → 各用件聴取 → 個人情報最後 → 用件×phonetype 振分け終話）に再構成（移管ノート方針に従う）"
  - "個人/企業判別は Yes/No 聴取（hearing_yesno_common テンプレ）。肯定→個人、否定→企業。other 経路は END_聴取失敗。retry_count=2 + end_failure"
  - "用件確認は 個人ルート（4 値: 新規/変更/キャンセル/問い合わせ）と企業ルート（2 値: 新規/問い合わせ）で別々の hearing。TTS 文言が「次の4つのうち」「次の2つのうち」と異なるためプロンプト動的フィルタ禁止に従い分離"
  - "用件確認は両ルートとも echo_back=true で 1 回復唱（generic 文言）。Gen1 の 4 ブランチ別 個別文言（『健康診断のご予約、でよろしいですか?』等）を完全再現する場合は properties で 4 個別 Re-confirmation node TTS に分割が必要（confirmation_items 参照）"
  - "内容聴取は用件×個人企業 で 5 種 TTS（個人新規 / 企業新規 / 変更 / キャンセル / 問い合わせ）。全て自由発話 text 受け（OpenAI summarize で要約のみ）"
  - "個人/新規 ルートの「受診時期確認 Yes/No」（Gen1 受診時期・コース 箱）は Gen3 では内容聴取_個人新規 の text 自由聴取に統合し受診時期も合わせて聴取（OpenAI summarize で抽出）。明確な分岐が必要な場合は別 hearing 追加検討（confirmation_items 参照）"
  - "予約日聴取: 変更ルートは 現予約日_聴取 → 希望予約日_聴取 の 2 連続。キャンセルルートは 現予約日_聴取_キャンセル の 1 回のみ。新規/問い合わせは予約日聴取なし"
  - "予約日 datetime 形式（yyyy-MM-dd 00:00:00）。Gen1 の DTMF 4 桁（月日）入力＋過去日付なら +1 年補正は OpenAI 正規化プロンプトで吸収（実機通話テストで動作確認）"
  - "個人情報聴取（受診者名 / 生年月日 / 連絡先電話番号）は Gen3 標準サンプル subflow を完全コピー（reference 個人情報サブフロー.bivr）。受診者名は復唱なし、生年月日・電話番号は復唱あり"
  - "受診者名は patientName へ 1 名のみ格納（受診者=入電者の前提）。Gen1 仕様踏襲"
  - "企業団体名・部署担当者名は Gen3 では inline 2 hearing として展開（Gen3 標準サンプル subflow に該当物なし）。corporateName / contactPersonName 案件固有フィールドへ格納"
  - "終話振分けは 用件×個人企業×phonetype の 3 段 CMR チェーン（個人企業分岐_クローズ → 用件分岐_クローズ_個人 / phonetype分岐_企業 → phonetype分岐_個人 / phonetype分岐_企業）。キャンセルは phonetype 非依存 1 本に集約"
  - "phonetype 分岐: 電話番号聴取サブフロー内で「携帯」「その他」を判定し phonetype context に保存。CMR の reference_module は subflow ステップ名「電話番号聴取」"
  - "企業ルートの完了 TTS（END_クローズ_企業_携帯 / END_クローズ_企業_その他）末尾には「協会けんぽ加入事業所からのご予約はお電話ではなくFAXにてお願いいたします」の注記を必ず付記（移管ノート指示）。個人ルートには付記しない"
  - "Gen1 の一時運用 文言（2月アナウンス / 予約受付不可（6/25〜）/ 稼働前）は本番フローから除外（director 判断）。期間限定告知のため恒久フローには含めない"
  - "代表電話案内: 0570-010-986（健診センター予約確定連絡発信元 + 3 回失敗時案内 + SMS 発信元）。END_聴取失敗 TTS で「電話番号は、0570-010-986です。繰り返します。電話番号は、0570-010-986です。」と 2 連呼"
  - "Gen1「もしもし」検知（はい、聞こえております）: Gen3 では 用件確認 / 個人企業判別 OpenAI プロンプトの no_result_condition に「もしもしのみ」を含めて NO_RESULT 扱い → リトライへ。専用 TTS は配置しない（confirmation_items 参照）"
  - "Gen1「3 回失敗」シリーズ（用件失敗 / 内容失敗 / 生年月日失敗 / 企業失敗 / 企業個人失敗 / 予約日失敗）は Gen3 では END_聴取失敗 1 本に集約。代表案内 TTS で電話番号 2 連呼"
  - "Call Transfer なし（Gen1 にも転送なし。すべて折り返し電話 or SMS で完結）"
  - "RAG/FAQ サブフローなし（Gen1 に FAQ 機能なし。Gen1→Gen3 移管デフォルトのパターン2 ラスト質問 RAG は導入見送り）"
  - "受付時間: 火〜金 11:30〜15:15 / 土 8:30〜11:15 / 月・日祝・年末年始休。Brekeke acceptance_times は曜日・時間のみ。Dr.JOY 側で休館日カレンダー登録"
  - "TTS は {tts_g:...} 小文字のみ。SSML タグ・<dtmf/> 等は不使用（電話番号復唱の <speak type='telephone' breakc='300ms'> のみ標準サンプル subflow 内に SSML 例外として含まれる）"
  - "Gen1 動的タグ <? $予約日の読み ?> / <? $連絡先電話番号（ハイフン区切あり） ?> 等は subflow 内 echo_back に集約済み。メインフローでの直接参照は不要。残骸があれば <% var %> 構文へ"
  - "ContextMatchRouter の reference_module はモジュール名のみ（context 名指定禁止）。個人企業分岐_クローズ → OpenAI_個人企業判別 / 用件分岐_クローズ_個人 → OpenAI_用件確認_個人 / phonetype分岐_個人 / phonetype分岐_企業 → 電話番号聴取（subflow ステップ名）。すべて conditions 末尾に match: 'other' + 明示 next を配置済み"
  - "group_name = facility_name = 「浦添総合病院」（6 文字）。URL エンコード後の制約（漢字 19 文字以内目安）を十分満たす。sister design（病診連携 / 診療）と同じ group_name で統一"
  - "モジュール名・termination 名は ASCII または安全な日本語のみ使用。丸数字（①②③⑩等）等の環境依存文字は使わない"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（Dr.JOY 施設ID）— Dr.JOY 管理画面で確認"
    resolved: false
  - item: "用件確認 echo_back の 4 ブランチ別 個別文言（個人ルート: 健康診断のご予約 / 予約のキャンセル / 予約の変更 / その他お問い合わせ、企業ルート: 健診のご予約 / その他お問い合わせ）を Gen3 で完全再現するか、Gen3 default echo_back（generic 復唱）で運用するかを決定。完全再現の場合は properties で 6 個別 Re-confirmation node TTS に分割が必要"
    resolved: false
  - item: "Gen1「2月アナウンス」「予約受付不可（6/25〜）」「稼働前」一時運用 文言の Gen3 除外妥当性。期間限定告知の運用が現役の場合は復活が必要。現設計では除外（director 判断）"
    resolved: false
  - item: "Gen1「もしもし検知」（はい、聞こえております / もしもしと聞こえております）の Gen3 実装要否。現設計では 用件確認 / 個人企業判別 OpenAI プロンプトの no_result_condition に集約してリトライへ誘導する設計。専用 TTS が必要なら別途 augment ブロック追加"
    resolved: false
  - item: "個人/新規 ルートの「受診時期 Yes/No 確認」（Gen1 受診時期・コース 箱）の Gen3 実装要否。現設計では内容聴取_個人新規 の text 自由聴取に統合（受診時期も含めて発話）。明確な分岐が必要なら別 hearing 追加"
    resolved: false
  - item: "予約日聴取（変更・キャンセル）の +1 年補正ロジック実装確認。Gen1 では 日付比較 箱で「比較日より前 → プラス1年後で確定」を script で処理していた。Gen3 では OpenAI 正規化プロンプトで対応する設計。実機通話テストで動作確認"
    resolved: false
  - item: "「協会けんぽ加入事業所からのご予約はFAX」注記を END_クローズ_企業_xxx の TTS に含める運用判断の最終確認。Gen1 では一時運用 文言（予約受付不可）に存在し恒久 クローズ TTS には含まれていなかった。移管ノート指示「企業ルート完了 TTS の末尾に必ず付記」に従う設計"
    resolved: false
  - item: "個人企業分岐_クローズ CMR の other 経路（個人企業判別の OpenAI 出力が個人/企業以外の場合）の振分け先。現設計では phonetype分岐_企業 にフォールバックしているが、より発生頻度の高い個人ルートにフォールバックする選択もあり得る"
    resolved: false
  - item: "電話番号聴取サブフロー内の 非通知聴取失敗時の遷移確認。標準サンプル JSON 完コピ前提だが、サブフロー内で完結するか親フローへシグナルするかを copy_subflows.py 実行後に確認"
    resolved: false
  - item: "Dr.JOY 側の SMS 送信文面設定（sms_flag=1 の場合の本文）。健診予約確定連絡用の SMS テンプレート"
    resolved: false
  - item: "Dr.JOY 側の認証設定（受診者名・生年月日・電話番号の優先順位）"
    resolved: false
  - item: "Dr.JOY 側の営業時間スケジュール詳細登録: 火〜金 11:30-15:15 / 土 8:30-11:15 / 月・日祝・年末年始休（Brekeke acceptance_times は曜日・時間のみ。月曜終日休と年末年始は Dr.JOY 側で休館日カレンダーとして登録）"
    resolved: false
  - item: "用件確認 retry_failure='end_failure' で END_聴取失敗 へ遷移する仕様の妥当性。Gen1 では 5 回連続聞き取れず → 『再度お伺いします』再質問 → 3 回累積で END_用件取得できず → 終話。Gen3 では retry_count=2＋end_failure で代表案内に直行する設計（CP 用件聴取不可と等価）"
    resolved: false
  - item: "Gen1 内容フリー聴取.yaml に存在した「企業：受診者名」（受診される方のお名前と生年月日をお話ください）の Gen3 実装要否。Gen3 標準では 企業ルートでも 受診者名 + 生年月日 を別々の subflow で聴取する設計。問題なし想定だが運用上の最終確認"
    resolved: false
