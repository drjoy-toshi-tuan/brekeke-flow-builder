# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "individualOrCorporate"
    - "phonetype"
  patterns:
    - condition: "classification=キャンセル（individualOrCorporate / phonetype に依存しない）"
      sms_flag: "-1"
      notes: "→ END_キャンセル (status=1)"
    - condition: "classification ∈ {新規,変更,問い合わせ} AND individualOrCorporate=個人 AND phonetype=携帯"
      sms_flag: "1"
      notes: "→ END_クローズ_個人_携帯 (status=1)"
    - condition: "classification ∈ {新規,変更,問い合わせ} AND individualOrCorporate=個人 AND phonetype=その他"
      sms_flag: "-1"
      notes: "→ END_クローズ_個人_その他 (status=1)"
    - condition: "classification ∈ {新規,問い合わせ} AND individualOrCorporate=企業 AND phonetype=携帯"
      sms_flag: "1"
      notes: "→ END_クローズ_企業_携帯 (status=1, 協会けんぽ FAX 注記)"
    - condition: "classification ∈ {新規,問い合わせ} AND individualOrCorporate=企業 AND phonetype=その他"
      sms_flag: "-1"
      notes: "→ END_クローズ_企業_その他 (status=1, 協会けんぽ FAX 注記)"

