# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系（デフォルト必須）===
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（月曜終日 / 日祝 / 年末年始 / 火〜金 11:30 前または 15:15 以降 / 土曜 8:30 前または 11:15 以降）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、土日祝日、月曜日を除く、平日11時30分から15時です。恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（個人企業判別 / 用件確認_個人 / 用件確認_企業 / 企業団体名_聴取 / 部署担当者名_聴取）／用件確認 other 経路"
    tts_announcement: "恐れ入りますが、浦添総合病院 健診センターへおかけなおしください。受付時間は、土日祝日を除く、平日11時30分から15時となっております。お電話番号が分かる場合は、そのままお電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。電話番号は、0570-010-986です。繰り返します。電話番号は、0570-010-986です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 正常系（浦添総合病院 健診固有）===
  - name: "END_キャンセル"
    condition: "個人/キャンセル ルート完了（携帯/その他 共通、SMS なし）"
    tts_announcement: "再予約をされない方は、お送りした資料、検体一式は破棄をお願いいたします。再予約のご予定がある方は、保管をお願いいたします。お電話ありがとうございました。それでは失礼いたします。"
