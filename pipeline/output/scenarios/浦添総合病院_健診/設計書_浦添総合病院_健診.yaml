# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "個人企業判別"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "individualOrCorporate"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "個人"
      - "企業"
    notes: "Gen1 個人・企業判別.yaml。「ご自身の予約に関するご連絡でしょうか？」Yes/No 聴取。肯定（はい・そうです・大丈夫）→ 個人 / 否定（いいえ・違います・会社で・会社です）→ 企業。other は END_聴取失敗（代表案内 TTS）へ。STT テンプレ: hearing_yesno_common"

  - order: 2
    name: "企業団体名_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "corporateName"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 企業団体名・部署担当者名.yaml 1 段目。「企業もしくは団体名をお話ください」自由発話。OpenAI で発話から企業名抽出"

  - order: 3
    name: "部署担当者名_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "contactPersonName"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 企業団体名・部署担当者名.yaml 2 段目。「部署と、ご担当者様のお名前をお話ください」自由発話。OpenAI で部署 + 氏名を整形"

  - order: 4
    name: "用件確認_個人"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "変更"
      - "キャンセル"
      - "問い合わせ"
    notes: "DTMF 1=新規, 2=変更, 3=キャンセル, 4=問い合わせ。Gen1 個人:用件 救済語: 新規←{健康診断,健診,検診,人間ドック,ドック,特定健診,健診の予約,健診と人間ドック,生活習慣病,雇い入れ,事業主,進学,就職,予約} / 変更←{予約変更,予約の変更,日程,日付,別の,変えたい,変える,取り直す,並行,平行,延期,2番,2つ,3個} / キャンセル←{予約キャンセル,予約のキャンセル,やめる,取消,取り消し,取り消す,3番} / 問い合わせ←{その他,なくした,確認,調べて,忘れた,料金,金額,検査結果,アクセス,聞きたい,問合せ,4番}。other は END_聴取失敗。echo_back=true で復唱（generic）。「もしもし」のみは no_result 扱いでリトライ。STT テンプレ: hearing_yoken_common + hearing_kenshin_course_basic"

  - order: 5
    name: "用件確認_企業"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "問い合わせ"
    notes: "DTMF 1=新規, 2=問い合わせ。Gen1 企業:用件 救済語: 新規←{健診,検診,健診の予約,予約,健康診断,人間ドック,1,1番,一,一番,最初} / 問い合わせ←{その他,アクセス,お伺い,お問合せ,確認,教えて,結果,料金,聞きたい,質問,2,2番,二,二番}。other は END_聴取失敗。echo_back=true で復唱（generic）。STT テンプレ: hearing_yoken_common + hearing_kenshin_course_basic"

  - order: 6
    name: "内容聴取_個人新規"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "個人/新規 専用。「受診を希望されるコースや検査名をお話ください」。Gen1 内容フリー聴取.yaml の 個人/新規ルート + 受診時期確認 Yes/No を統合し自由聴取。OpenAI summarize でコース・検査名・受診時期を要約"

  - order: 7
    name: "内容聴取_企業新規"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "企業/新規 専用。「検査内容や受診時期など、ご希望の内容を簡単にお話ください」。Gen1 内容フリー聴取.yaml 企業/新規 ルート"

  - order: 8
    name: "内容聴取_変更"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "個人/変更 専用。「オプション追加や日時変更など、変更を希望される内容をお話ください」。Gen1 内容フリー聴取.yaml 変更 ルート"

  - order: 9
    name: "内容聴取_キャンセル"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "個人/キャンセル 専用。「予約キャンセルの理由をお話ください。なければ、特にない、とお話ください」。Gen1 内容フリー聴取.yaml キャンセル ルート"

  - order: 10
    name: "内容聴取_問い合わせ"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "個人/問い合わせ + 企業/問い合わせ 共通。「お問い合わせの内容をお話ください」。Gen1 内容フリー聴取.yaml 問い合わせ ルート。OpenAI summarize で要約のみ"

  - order: 11
    name: "現予約日_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "個人/変更 ルート 1 段目。「現在の予約日を、4月1日のように日付でおっしゃってください」。DTMF 4 桁（月日）入力可。OpenAI 正規化で yyyy-MM-dd 形式変換 + 過去日付なら +1 年補正。echo_back=true で 1 回復唱"

  - order: 12
    name: "希望予約日_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "preferredDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "個人/変更 ルート 2 段目。「希望される予約日を、4月1日のように日付でおっしゃってください」。DTMF 4 桁（月日）入力可。OpenAI 正規化で yyyy-MM-dd 形式変換 + 過去日付なら +1 年補正。echo_back=true で 1 回復唱"

  - order: 13
    name: "現予約日_聴取_キャンセル"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "個人/キャンセル ルート（1 回のみ聴取）。「現在の予約日を、4月1日のように日付でおっしゃってください」。DTMF 4 桁（月日）入力可。OpenAI 正規化で yyyy-MM-dd 形式変換 + 過去日付なら +1 年補正。echo_back=true で 1 回復唱"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。浦添総合病院 健診センターの、健診専用、AI電話です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: null
    next_step: "個人企業判別"
    retry_failure: "skip"

  - step_name: "個人企業判別"
    tts_announcement: "はじめに、お電話口の方についてお伺いします。ご自身の予約に関するご連絡でしょうか？はい、そうです、または、いいえ違います、でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "個人"
        - "企業"
      mapping:
        - input: "はい／そうです／そう／大丈夫／あってます／合ってます／個人／個人受診／個人マスク／配送です"
          output: "個人"
        - input: "いいえ／いえ／違います／違う／じゃない／会社で／会社です／企業／法人／団体／三重"
          output: "企業"
      no_result_condition: "判別不能／雑音のみ／『もしもし』のみ／短すぎる発話"
    save_to: "individualOrCorporate"
    next_step: "(個人=用件確認_個人 / 企業=企業団体名_聴取 / other=END_聴取失敗)"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "企業団体名_聴取"
    tts_announcement: "当院より折り返しお電話をさせていただきますので、ご連絡いただいている方の企業もしくは団体名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "発話内容（自由記述／企業名／団体名）"
          output: "(発話内容そのまま text 保存。OpenAI で企業名抽出・整形)"
      no_result_condition: "発話なし"
    save_to: "corporateName"
    next_step: "部署担当者名_聴取"
    retry_failure: "end_failure"

  - step_name: "部署担当者名_聴取"
    tts_announcement: "かしこまりました。次に、部署と、ご担当者様のお名前をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "発話内容（自由記述／部署名 + 氏名）"
          output: "(発話内容そのまま text 保存。OpenAI で部署 + 氏名を整形)"
      no_result_condition: "発話なし"
    save_to: "contactPersonName"
    next_step: "用件確認_企業"
    retry_failure: "end_failure"

  - step_name: "用件確認_個人"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話ください。1、健康診断の予約。2、予約の変更。3、予約のキャンセル。4、その他お問い合わせ。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規"
        - "変更"
        - "キャンセル"
        - "問い合わせ"
      mapping:
        - input: "DTMF 1／健康診断／健診／検診／人間ドック／ドック／特定健診／健診の予約／健診と人間ドックの予約／生活習慣病／雇い入れ／事業主／進学／就職／予約／いちばん／さいしょ／ようやく／一／一番／最初"
          output: "新規"
        - input: "DTMF 2／予約変更／予約の変更／日程／日付／別の／変えたい／変える／取り直したい／取り直す／並行／平行／延期／にこ／2番／2つ／3個"
          output: "変更"
        - input: "DTMF 3／予約キャンセル／予約のキャンセル／キャンセル／やめる／取消／取り消し／取り消す／さんばん／みっつ／みっつめ／3番／三／三番"
          output: "キャンセル"
        - input: "DTMF 4／その他／なくした／確認／調べて／忘れた／料金／金額／検査結果／アクセス／聞きたい／質問／問合せ／問い合わす／ほか／よん／さいご／4番／四"
          output: "問い合わせ"
      no_result_condition: "上記いずれにも該当しない／雑音のみ／短すぎる発話／『もしもし』のみ"
    save_to: "classification"
    next_step: "(条件分岐: 新規=内容聴取_個人新規 / 変更=内容聴取_変更 / キャンセル=内容聴取_キャンセル / 問い合わせ=内容聴取_問い合わせ / other=END_聴取失敗)"
    retry_failure: "end_failure"

  - step_name: "用件確認_企業"
    tts_announcement: "ご用件を、次の2つのうちのいずれかでお話ください。1、健診の予約。2、その他お問い合わせ。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規"
        - "問い合わせ"
      mapping:
