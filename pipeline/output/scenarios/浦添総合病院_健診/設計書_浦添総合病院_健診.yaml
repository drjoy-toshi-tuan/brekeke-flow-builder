version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "浦添総合病院"
  scenario_name: "健診"
  group_name: "浦添総合病院"
  flow_name: "浦添総合病院$健診"
  target_facility: "浦添総合病院 健診センター"
  office_id: "TODO_要確認"
  phone_number: "0570-010-986"
  business_hours: "祝日除く 火〜金 11:30〜15:15 / 土 8:30〜11:15（月曜・日祝・年末年始休）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  # プラットフォーム選択
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# 個人情報聴取（受診者名・生年月日・連絡先電話番号）はサブフロー分割型で構成。
# 診察券番号は健診シナリオでは聴取しないため subflow に含めない。
# 企業団体名・部署担当者名は Gen3 標準サンプルに該当なしのため inline 2 hearing として展開（subflow 化しない）。
flow_structure:
  type: "subflow"
  flows:
    - name: "浦添総合病院$健診"
      role: "main"
      description: "冒頭チェーン → 個人/企業判別 → (企業のみ 企業団体名 + 部署担当者名 inline) → 用件確認(個人=4 / 企業=2) → 内容聴取(用件×個人企業 で 5 種 TTS) → (変更=現予約日+希望日 / キャンセル=現予約日のみ) → 受診者名/生年月日/連絡先 subflow → 用件×個人企業×phonetype の組合せで 5 種終話に振分け"
  subflows:
    - name: "浦添総合病院$受診者名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。reference 個人情報サブフロー.bivr の 氏名聴取（復唱なし版）をコピー。Gen1 受診者名聞き取り.yaml の挙動と完全一致。患者氏名 patientName へ格納"
    - name: "浦添総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。reference 個人情報サブフロー.bivr の 生年月日聴取（DOB Re-confirmation 復唱あり版）をコピー。Gen1 の和暦聴取・大正〜令和判定・1 回復唱と完全一致"
    - name: "浦添総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。reference 個人情報サブフロー.bivr の 電話番号聴取（incoming-classifier で携帯/固定判別、phonetype を出力、復唱あり）をコピー。Gen1 連絡先電話番号聞き取り.yaml + 電話番号区切り.yaml と等価"

# --- セクション3: フローの目的 ---
purpose: |
  浦添総合病院 健診センター向けの AI 電話。健診（健康診断・人間ドック・特定健診等）に関する
  「新規予約／予約変更／予約キャンセル／その他お問い合わせ」を受付ける。
  最初に「個人/企業」判別を行い、企業の場合は企業団体名・部署担当者名を聴取してから用件聴取に進む。
  個人ルートでは 4 用件、企業ルートでは 2 用件（新規/問い合わせ）に対応。
  内容聴取・予約日聴取（変更/キャンセル時）後、共通で受診者名・生年月日・連絡先電話番号を聴取し、
  本日より 10 営業日を目安に代表電話 0570-010-986 から折り返し電話または SMS で予約確定連絡を行う前提で
  ステータス・SMS 送信フラグを記録する。
  携帯番号取得時は SMS 併用案内、それ以外は折り返し電話のみの案内。
  企業ルートの完了 TTS には「協会けんぽ加入事業所からのご予約は FAX で」の注記を必ず付記。
  キャンセルは「再予約をされない方は資料・検体一式の破棄を」案内。
  受付時間外（月曜・日祝・年末年始 / 火〜金 11:30 前または 15:15 以降 / 土曜 8:30 前または 11:15 以降）は
  代表番号 0570-010-986 へ案内して終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "浦添総合病院$健診"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(TTS+完了フラグ_非通知 status=7) → 切断
            └─ 通常   → acceptance_times
                          ├─ 時間外 → END_時間外(TTS+完了フラグ_時間外 status=6) → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → 個人企業判別 (hearing, enum: 個人 / 企業)
                                            ├─ 個人 → 用件確認_個人 (enum 4 値: 新規/変更/キャンセル/問い合わせ)
                                            │           ├─ 新規        → 内容聴取_個人新規 → 受診者名(jump)
                                            │           ├─ 変更        → 内容聴取_変更 → 現予約日_聴取 → 希望予約日_聴取 → 受診者名(jump)
                                            │           ├─ キャンセル  → 内容聴取_キャンセル → 現予約日_聴取_キャンセル → 受診者名(jump)
                                            │           ├─ 問い合わせ  → 内容聴取_問い合わせ → 受診者名(jump)
                                            │           └─ other       → END_聴取失敗
                                            ├─ 企業 → 企業団体名_聴取 (text) → 部署担当者名_聴取 (text)
                                            │             → 用件確認_企業 (enum 2 値: 新規/問い合わせ)
                                            │                 ├─ 新規       → 内容聴取_企業新規 → 受診者名(jump)
                                            │                 ├─ 問い合わせ → 内容聴取_問い合わせ → 受診者名(jump)
                                            │                 └─ other      → END_聴取失敗
                                            └─ other → END_聴取失敗

      ─── 個人情報聴取 → 用件×個人企業×phonetype 分岐 ───
      受診者名(Custom Jump to Flow → 浦添総合病院$受診者名聴取)
        → 生年月日聴取(Custom Jump to Flow → 浦添総合病院$生年月日聴取)
            → 電話番号聴取(Custom Jump to Flow → 浦添総合病院$電話番号聴取)
                → 個人企業分岐_クローズ (CMR: ref=OpenAI_個人企業判別)
                    ├─ 個人 → 用件分岐_クローズ_個人 (CMR: ref=OpenAI_用件確認_個人)
                    │           ├─ キャンセル → END_キャンセル (status=1, sms_flag=-1)
                    │           └─ other      → phonetype分岐_個人 (CMR: ref=電話番号聴取)
                    │                              ├─ 携帯  → END_クローズ_個人_携帯  (status=1, sms_flag=1)
                    │                              └─ other → END_クローズ_個人_その他 (status=1, sms_flag=-1)
                    └─ other(=企業相当) → phonetype分岐_企業 (CMR: ref=電話番号聴取)
                                              ├─ 携帯  → END_クローズ_企業_携帯  (status=1, sms_flag=1, 協会けんぽ FAX 注記)
                                              └─ other → END_クローズ_企業_その他 (status=1, sms_flag=-1, 協会けんぽ FAX 注記)

      ─── 終話パターン一覧 ───
      END_非通知              (status=7, sms_flag=-1) → 切断
      END_時間外              (status=6, sms_flag=-1) → 切断
      END_聴取失敗            (status=2, sms_flag=-1) → 切断（合流: 個人企業判別/用件確認 retry 上限到達 + 用件 other 経路）
      END_キャンセル          (status=1, sms_flag=-1) → 切断
      END_クローズ_個人_携帯  (status=1, sms_flag=1)  → 切断
      END_クローズ_個人_その他(status=1, sms_flag=-1) → 切断
      END_クローズ_企業_携帯  (status=1, sms_flag=1)  → 切断（協会けんぽ FAX 注記入り）
      END_クローズ_企業_その他(status=1, sms_flag=-1) → 切断（協会けんぽ FAX 注記入り）
    notes: |
      use_acceptance_times=true。月曜終日休 + 火〜金 11:30〜15:15 + 土 8:30〜11:15。
      Gen1「2月アナウンス」「予約受付不可（6/25〜）」「稼働前」一時運用 文言は除外（移管ノート指示）。
      協会けんぽ FAX 注記は END_クローズ_企業_xxx に必ず付記（移管ノート指示）。
      Gen1「もしもし検知」（はい聞こえております）は OpenAI プロンプトの no_result_condition で吸収。
      Gen1「3 回失敗」は END_聴取失敗 1 本に集約（代表番号 0570-010-986 を 2 連呼）。
      Gen1「予約日 +1 年補正」（過去日付なら翌年）は OpenAI 正規化プロンプトで対応。
      saveCompletionFlag2db の addCurrentDate=Yes は scaffold 自動付与。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ============================================================
  # 冒頭チェーン（必須）
  # ============================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 個人企業判別

  # ============================================================
  # 個人/企業判別（Yes/No 聴取）
  # ============================================================
  - step: 個人企業判別
    type: hearing
    output_format: enum
    output_labels:
      - "個人"
      - "企業"
    save_to: individualOrCorporate
    conditions:
      - match: "個人"
        next: 用件確認_個人
      - match: "企業"
        next: 企業団体名_聴取
      - match: "other"
        next: END_聴取失敗
    retry_failure: end_failure
    notes: "Gen1 個人・企業判別.yaml の Yes/No 聴取。「ご自身の予約に関するご連絡か？」肯定=個人、否定=企業。retry_count=2 で end_failure → END_聴取失敗（代表案内）"

  # ============================================================
  # 企業ルート専用: 企業団体名 + 部署担当者名（inline 2 hearing）
  # ============================================================
  - step: 企業団体名_聴取
    type: hearing
    output_format: text
    save_to: corporateName
    next: 部署担当者名_聴取
    retry_failure: end_failure
    notes: "Gen1 企業団体名・部署担当者名.yaml の 1 段目。「企業もしくは団体名をお話ください」自由発話 text 受け"

  - step: 部署担当者名_聴取
    type: hearing
    output_format: text
    save_to: contactPersonName
    next: 用件確認_企業
    retry_failure: end_failure
    notes: "Gen1 企業団体名・部署担当者名.yaml の 2 段目。「部署と、ご担当者様のお名前をお話ください」自由発話 text 受け"

  # ============================================================
  # 用件確認（個人=4分類 / 企業=2分類、復唱あり）
  # ============================================================
  - step: 用件確認_個人
    type: hearing
    output_format: enum
    output_labels:
      - "新規"
      - "変更"
      - "キャンセル"
      - "問い合わせ"
    save_to: classification
    echo_back: true
    conditions:
      - match: "新規"
        next: 内容聴取_個人新規
      - match: "変更"
        next: 内容聴取_変更
      - match: "キャンセル"
        next: 内容聴取_キャンセル
      - match: "問い合わせ"
        next: 内容聴取_問い合わせ
      - match: "other"
        next: END_聴取失敗
    retry_failure: end_failure
    notes: "Gen1 用件.yaml 個人ルート。DTMF 1=新規, 2=変更, 3=キャンセル, 4=問い合わせ。OpenAI 救済語: 新規←{健康診断,健診,検診,人間ドック,ドック,特定健診,健診の予約,生活習慣病,雇い入れ,事業主,進学,就職} / 変更←{予約変更,予約の変更,日程,日付,別の,変えたい,変える,取り直す,並行,平行,延期} / キャンセル←{予約キャンセル,予約のキャンセル,やめる,取消,取り消し,取り消す} / 問い合わせ←{その他,なくした,確認,調べて,忘れた,料金,金額,検査結果,アクセス,聞きたい,問合せ}。echo_back=true で復唱確認 1 回。「もしもし」のみは no_result 扱いでリトライ"

  - step: 用件確認_企業
    type: hearing
    output_format: enum
    output_labels:
      - "新規"
      - "問い合わせ"
    save_to: classification
    echo_back: true
    conditions:
      - match: "新規"
        next: 内容聴取_企業新規
      - match: "問い合わせ"
        next: 内容聴取_問い合わせ
      - match: "other"
        next: END_聴取失敗
    retry_failure: end_failure
    notes: "Gen1 用件.yaml 企業ルート。DTMF 1=新規, 2=問い合わせ。OpenAI 救済語: 新規←{健診,検診,健診の予約,予約,健康診断,人間ドック} / 問い合わせ←{その他,アクセス,お伺い,お問合せ,確認,教えて,結果,料金,聞きたい,質問}。echo_back=true で復唱確認 1 回"

  # ============================================================
  # 内容聴取（用件×個人企業 で 5 種 TTS、自由発話 text 受け）
  # ============================================================
  - step: 内容聴取_個人新規
    type: hearing
    output_format: text
    save_to: reason
    next: 受診者名
    retry_failure: skip
    notes: "個人/新規 専用。「受診を希望されるコースや検査名をお話ください」。Gen1 内容フリー聴取.yaml の 個人/新規ルートに加えて Gen1「受診時期確認 Yes/No」も自由聴取で吸収（受診時期表現も含めて OpenAI summarize で抽出）"

  - step: 内容聴取_企業新規
    type: hearing
    output_format: text
    save_to: reason
    next: 受診者名
    retry_failure: skip
    notes: "企業/新規 専用。「検査内容や受診時期など、ご希望の内容を簡単にお話ください」。Gen1 内容フリー聴取.yaml の 企業/新規 ルート"

  - step: 内容聴取_変更
    type: hearing
    output_format: text
    save_to: reason
    next: 現予約日_聴取
    retry_failure: skip
    notes: "個人/変更 専用。「オプション追加や日時変更など、変更を希望される内容をお話ください」。Gen1 内容フリー聴取.yaml の 変更 ルート。次は 現予約日 → 希望日 の 2 連続聴取"

  - step: 内容聴取_キャンセル
    type: hearing
    output_format: text
    save_to: reason
    next: 現予約日_聴取_キャンセル
    retry_failure: skip
    notes: "個人/キャンセル 専用。「予約キャンセルの理由をお話ください。なければ、特にない、とお話ください」。Gen1 内容フリー聴取.yaml の キャンセル ルート。次は 現予約日 1 回のみ"

  - step: 内容聴取_問い合わせ
    type: hearing
    output_format: text
    save_to: reason
    next: 受診者名
    retry_failure: skip
    notes: "個人/問い合わせ + 企業/問い合わせ 共通。「お問い合わせの内容をお話ください」。Gen1 内容フリー聴取.yaml の 問い合わせ ルート。OpenAI summarize で要約のみ"

  # ============================================================
  # 予約日聴取（変更/キャンセル ルート専用）
  # ============================================================
  - step: 現予約日_聴取
    type: hearing
    output_format: datetime
    save_to: reservationDate
    echo_back: true
    next: 希望予約日_聴取
    retry_failure: skip
    notes: "Gen1 現在の予約日_予約希望日_1.yaml（変更ルート時の現予約日聴取）。DTMF 4 桁（月日）入力可。OpenAI 正規化で過去日付なら +1 年補正。echo_back=true で「<% reservationDate %>、でよろしいですか?」復唱"

  - step: 希望予約日_聴取
    type: hearing
    output_format: datetime
    save_to: preferredDate
    echo_back: true
    next: 受診者名
    retry_failure: skip
    notes: "Gen1 現在の予約日_予約希望日.yaml（変更ルート時の希望予約日聴取）。DTMF 4 桁（月日）入力可。OpenAI 正規化で過去日付なら +1 年補正。echo_back=true で復唱"

  - step: 現予約日_聴取_キャンセル
    type: hearing
    output_format: datetime
    save_to: reservationDate
    echo_back: true
    next: 受診者名
    retry_failure: skip
    notes: "Gen1 現在の予約日_予約希望日.yaml（キャンセルルート時の現予約日聴取・1 回のみ）。DTMF 4 桁（月日）入力可。OpenAI 正規化で過去日付なら +1 年補正。echo_back=true で復唱"

  # ============================================================
  # 共通: 個人情報聴取（サブフロー 3 本）
  # ============================================================
  - step: 受診者名
    type: subflow
    flowname: "浦添総合病院$受診者名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "浦添総合病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "浦添総合病院$電話番号聴取"
    next: 個人企業分岐_クローズ

  # ============================================================
  # 終話分岐（個人企業 → 用件 → phonetype の 3 段 CMR）
  # ============================================================
  - step: 個人企業分岐_クローズ
    type: context_match_router
    reference_module: "OpenAI_個人企業判別"
    conditions:
      - match: "個人"
        next: 用件分岐_クローズ_個人
      - match: "other"
        next: phonetype分岐_企業
    notes: "個人企業判別 hearing の OpenAI 出力値を参照。other は企業相当（個人企業判別で 'individual' or 'corporate' 以外の値が来た場合のフォールバック先として、より発生頻度が高い『企業ルートで個人企業判別が NO_RESULT』を採用）"

  - step: 用件分岐_クローズ_個人
    type: context_match_router
    reference_module: "OpenAI_用件確認_個人"
    conditions:
      - match: "キャンセル"
        next: END_キャンセル
      - match: "other"
        next: phonetype分岐_個人
    notes: "個人ルートのみ。キャンセルは破棄案内 TTS、それ以外（新規/変更/問い合わせ）は phonetype 分岐へ"

  - step: phonetype分岐_個人
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: END_クローズ_個人_携帯
      - match: "other"
        next: END_クローズ_個人_その他
    notes: "電話番号聴取 subflow が phonetype context に保存した値を参照（携帯/その他）。携帯=SMS あり、その他=電話のみ"

  - step: phonetype分岐_企業
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: END_クローズ_企業_携帯
      - match: "other"
        next: END_クローズ_企業_その他
    notes: "企業ルート用。電話番号聴取 subflow の phonetype 参照。携帯=SMS あり、その他=電話のみ。両 TTS とも末尾に協会けんぽ FAX 注記を含める"

  # ============================================================
  # 終話ブロック
  # ============================================================
  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_クローズ_個人_携帯
    type: termination
    termination_ref: "END_クローズ_個人_携帯"

  - step: END_クローズ_個人_その他
    type: termination
    termination_ref: "END_クローズ_個人_その他"

  - step: END_クローズ_企業_携帯
    type: termination
    termination_ref: "END_クローズ_企業_携帯"

  - step: END_クローズ_企業_その他
    type: termination
    termination_ref: "END_クローズ_企業_その他"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
