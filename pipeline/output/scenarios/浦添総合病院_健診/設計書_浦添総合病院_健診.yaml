    tts_announcement: "お申し込みを受付いたしました。現時点では予約は確定しておりませんのでご注意ください。本日より10営業日を目安に、0570-010-986よりお電話、もしくはショートメールにて予約確定のご連絡をいたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
