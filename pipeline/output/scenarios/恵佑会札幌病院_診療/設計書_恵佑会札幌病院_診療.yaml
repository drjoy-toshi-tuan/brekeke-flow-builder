# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "Incoming_phone_type"
    - "classification"
  patterns:
    - condition: "classification in {予約, 変更, その他問い合わせ}"
      sms_flag: "1"
      notes: "MOBILE/FIXED共通。SMS送信フラグは通常終話で1固定。"
    - condition: "classification=キャンセル"
      sms_flag: "2"
      notes: "MOBILE/FIXED共通。キャンセルのみ smsFlag=2。"
    - condition: "SMS用フロー完了 (END_SMS送信案内)"
      sms_flag: "3"
      notes: "SMS送信案内固有。status=8 と合わせて一意。"
    - condition: "END_受付不可診療科"
      sms_flag: "0"
      notes: "受付不可は status=2 / smsFlag=0。"
    - condition: "END_代表案内_申し込み方法 / END_非通知 / END_時間外 / END_聴取失敗 / 途中切断"
      sms_flag: "0"
      notes: "デフォルト値を保持。"

