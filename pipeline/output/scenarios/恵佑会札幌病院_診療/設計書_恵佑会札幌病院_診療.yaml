    announcement: "{tts_g:恐れ入りますがご回答が確認できませんでした。再度、申し込み方法をお伺いします。ネットで申し込みを希望の方は、申込用のURLをショートメールにてお送りします。次のいずれかの番号をお話しください。「ネットから申し込みを希望の方は、１」、「このままお電話での申し込み希望の方は、２」、または　<dtmf digit=\"1\"/>}"

