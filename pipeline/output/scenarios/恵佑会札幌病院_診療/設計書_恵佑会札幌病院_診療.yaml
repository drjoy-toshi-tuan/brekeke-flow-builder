# --- セクション11: 特記事項・制約 ---
special_notes:
  - "受付不可診療科キーワードは全ヒアリング項目（用件確認/紹介状確認/医師名/希望医師/予約希望日/内容確認_その他 等）で監視。prompter は各 OpenAI プロンプトに18科のキーワードリスト＋受付不可検出時の強制分岐ルール（出力値=受付不可 → END_受付不可診療科）を埋め込む。用件確認以外の hearing では output_format を変更せず、別の next ルート（受付不可）を動的に割り込ませる実装は不可のため、status/smsFlag の書き換えのみを実装する案も検討（confirmation_items 参照）。"
  - "SSMLタグ（<speak type=\"telephone\" breakc=\"300ms\">, <dtmf digit=\"...\">, <dtmf2/>, <break time=\"...\"/>, <sub alias=\"...\">, <prosody rate=\"...\">）は prompter が IVR プロパティに保持する。CLAUDE.md の『SSMLタグは原則不可』の例外として、顧客資料の文言は一字一句そのまま保持する（director判断）。"
  - "複合発話ルール: 入電者が一度に複数情報を発話しても、すでに伝えられた内容は絶対に復唱・確認せず、不足項目のみ質問する。prompter は全ヒアリングプロンプトに本ルールを埋め込む。"
  - "生年月日の復唱エラー文言（<sub alias=\"イチ キュウ ナナ ゼロ\">...1970...<dtmf digit=\"8\"/>）は生年月日聴取サブフロー専用。予約日・予約希望日・電話番号・診察券番号のエラー時に絶対に流用禁止。"
  - "予約日（reservationDate）と予約希望日（Preferred_date）は別コンテキスト。予約日=DATE型（YYYY-MM-DD HH:MM）、予約希望日=TEXT型（フリーワードそのまま）。director/generator/prompter は絶対に混同しない。"
  - "電話番号聴取サブフローの桁数チェック: 11桁→先頭3桁が090/080/070/050のみ許可、10桁→先頭3桁がその4値に該当しない場合のみ許可。順序厳守（桁数判定→prefix判定）。リトライ上限=2、ただし anonymous/空文字着信時は10/11桁到達まで無制限ループ。"
  - "数字誤認識救済: 「救急」「Go」等の漢字・英語は数字に読み替え（電話番号・診察券番号サブフローのOpenAI正規化で対応）。"
  - "診察券番号の3ケース分岐（数字含む=格納／わからない='わからない'格納／無関連=1回再聴取→2回目は無言格納）はサブフロー内で実装。リトライ上限=1。"
  - "患者名の苗字のみ再質問（患者名_再聴取）は氏名聴取サブフロー内で実装。通常は再質問なし、苗字のみ検出時のみ『苗字は「{patientName}」様でございますね。お名前も教えていただけますか？』で patientName_first を取得。カタカナ変換必須。"
  - "医師名ブロックは強制進行: 入電者が聞き返しや意図不明発話をしてもそのまま DoctorName に格納し、次のステップへ機械的に移動。聞き直し・説明・確認を一切行わない（prompter 実装）。"
  - "incoming-classifier は Incoming_phone_type（MOBILE/FIXED/OTHER）を context に書き込む。saveContext2DB もしくは incoming-classifier 自体が context に出力する想定。generator/scaffold_generator は incoming-classifier 出力を Incoming_phone_type context に確実にバインドすること。"
  - "status / smsFlag / checkout / endpoint は AI が絶対に発話しないシステム内部フラグ。TTS プロンプト生成時に混入しないよう prompter で制御。"
  - "finalQuestion（最後の問い合わせ）は Gen2 仕様では共通ヒアリング末尾で1回だけ聴取する項目。Gen3 では終話チェーンで smsFlag 分岐を優先するため現設計では未配置。将来的に電話番号聴取の後、終話分岐前に hearing ブロック（output_format=text, retry_count=1, 二度聞き禁止）として追加検討。"
  - "Gen2 プロンプトの『#ヒアリング項目のアナウンス』セクションで発見した誤認識救済マッピング（例: 「電車券」→「診察券」、「沈下」→「婦人科」、「商品」→「初診」等）はすべて各 hearing の OpenAI プロンプトに組み込む（prompter 実装）。"
  - "通話終了時（1-8）『連絡先電話は携帯番号か固定番号かを判断して、それによる処理を行って終話』は終話分岐_電話種別（Incoming_phone_type 参照）で実装済み。"
  - "FAQ対応: Gen2プロンプトではFAQ検索→回答あり/なしで分岐する仕組みがあったが、RAGモジュール未使用の現設計ではその他問い合わせルートの『内容確認_その他』hearing で reason に格納し担当者折り返しで対応する。将来的に RAG 導入時は rag_subflow.pattern=1 で『内容確認_その他』の後ろに挿入。"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
    notes: "Dr.JOY管理画面で確認し、IVRプロパティ設定時に反映。設計書には TODO_要確認 で保持。"

  - item: "IVR着信電話番号（本番用ARS番号）"
    resolved: false
    notes: "Brekeke 設定時に反映。設計書には記載しない（運用依存）。"

  - item: "営業時間（acceptance_times の詳細スケジュール）"
    resolved: false
    notes: "代表案内文言より平日8:45-17:00と推定。Dr.JOY側で最終設定。フローJSON側は acceptance_times モジュールの配置のみ対応。"

  - item: "受付不可診療科キーワード監視の実装範囲"
    resolved: false
    notes: |
      元資料には『全ヒアリング項目で監視』と明記。
      Gen3 の hearing ブロック制約上、全 hearing に『受付不可』enum ラベルを追加するのは非現実的のため、
      主要な診療科言及ポイント（用件確認、紹介状確認、医師名、希望医師、予約希望日、内容確認_その他）
      に限定して prompter が受付不可検出プロンプトを埋め込む方針で妥当か要確認。
      代替案: hearing の output_format を enum で拡張 or script ブロックを挟む / 用件確認のみに集約。

  - item: "finalQuestion（最後の問い合わせ）の配置"
    resolved: false
    notes: "Gen2 は共通ヒアリング末尾で聴取していた。Gen3 では終話チェーンを優先して未配置。必要なら電話番号聴取の後ろに追加検討。"

  - item: "SMS文面（Dr.JOY側設定）"
    resolved: true
    notes: "フローJSON 側では制御不要。Dr.JOY 側で smsFlag=1/2/3 それぞれの送信文言を設定。設計書の tts_announcement には電話切断直前のアナウンスのみ記載。"

  - item: "RAG/FAQ サブフローの必要性"
    resolved: true
    notes: "現設計では rag_subflow.pattern=none。Gen2 の FAQ 検索ロジックは『内容確認_その他』の text 格納で代替。将来的に RAG 導入する場合は設計書更新。"

  - item: "個人情報聴取サブフロー（氏名/生年月日/電話番号/診察券番号）のサンプル流用範囲"
    resolved: false
    notes: |
      docs/reference/bivr/samples/個人情報サブフロー.bivr を完全コピーすることが原則だが、
      恵佑会札幌病院固有の特殊ルール（診察券番号3ケース分岐、患者名の苗字のみ再質問、
      医師名の強制進行、生年月日の年判定ルール、電話番号の桁数×prefix両方向チェック）が
      既存サンプルに含まれているか未確認。含まれない場合はサブフロー内 OpenAI プロンプトで
      prompter が追加実装する想定。サンプル実体との差分精査は copy_subflows.py 実行後に人間確認。"

  - item: "Incoming_phone_type context の scaffold による自動書き込み保証"
    resolved: false
    notes: "incoming-classifier が Incoming_phone_type context に自動出力するか、別途 saveContext2DB が必要か要確認。終話分岐_電話種別 / SMS_連絡先電話番号判定 の context_match_router が参照できることが前提。"

  - item: "status=0 / status=3 / status=6 の Dr.JOY 側 rangeValues 整合性"
    resolved: false
    notes: |
      Gen2 enum: 0/1/2/8 の4値のみ。
      Gen3 テンプレートデフォルトの status: 1/2/3/6 とずれがあるため、context_fields の status.range_values を
      Gen2 enum に合わせて上書き済み。ただし異常系（END_非通知=2, END_時間外=6, END_聴取失敗=3）の status 値は
      Gen3 のデフォルトを維持している（Gen2 の定義には存在しない）。Dr.JOY 側で 2/3/6 が rangeValues に存在
      するか、あるいは 0 にマップすべきか要確認。現状は status=6（時間外）を追加定義として許容する前提。
