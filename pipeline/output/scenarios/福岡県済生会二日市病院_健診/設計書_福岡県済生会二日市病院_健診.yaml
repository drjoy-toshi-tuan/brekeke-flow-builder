# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3 移管。Gen2 OpenAI Assistant 単一モジュール + YAML 疑似フロー（2026-04-06 更新版）から、Gen3 の scenario_flow ブロック構造に再構成。"
  - "フロー順序: 用件確認 → 用件別聴取 → 共通個人情報聴取（氏名→生年月日→電話番号）→ 終話。Gen2 仕様を踏襲（一般的な「個人情報→用件」とは逆）。"
  - "営業時間チェック: Gen2 側になし → use_acceptance_times: false。代表電話の受付時間（土日祝除く月-金 14:00-16:00）は END_代表案内 TTS 内に埋め込み。"
  - "リトライ回数: Gen3 標準の2回を採用（用件確認・受診歴確認・前回と同じ内容確認・予約日・変更内容・予約希望日）。Gen2 の電話番号3回リトライは電話番号聴取サブフローのリファレンス bivr 設定を継承。"
  - "1回聴取・復唱確認の原則禁止（Gen2 仕様）: 受診者名の復唱禁止（個人情報サブフローで recitation:なし を設定）。変更内容・受診希望コース・追加オプション・予約日は一度聴取したら再質問しない（OpenAI プロンプトで明記）。電話番号のみサブフロー内で 復唱確認 実施。"
  - "SSML タグ（<speak type=\"telephone\">, <dtmf/>, breakc）は Gen3 非対応のため全て除去。電話番号読み上げは {tts_g:0 9 2 9 2 3 1 5 5 1} 形式（1桁ずつ半角スペース区切り）に変換。"
  - "Gen2 の複合発話処理（1発話で複数情報を記録し不足分のみ質問）は、Gen3 では1ステップ1聴取に単純化。複数情報が発話された場合、2人目以降の氏名・生年月日は reason フィールドに改行区切りで保存（OpenAI プロンプトで対応）。"
  - "Gen2 の Preferred_date（予約希望日）のフリーテキスト保存は、Gen3 では分岐判定を優先し enum 値（拒否/当日/受付）を保存。raw 発話テキストは AmiVoice STT ログで確認可能。"
  - "Gen2 の変更内容（reason/change_item）は、Gen3 では change_item に enum 値（日程変更/変更内容）のみ保存。発話のフリーテキストは reason に別途保存しない。"
  - "Gen2 の電話番号桁数バリデーション（090/080/070/060/050=11桁、それ以外=10桁）は、電話番号聴取サブフロー内の Phone Normalization モジュールが担当。"
  - "Gen2 の「社長は」→「昭和」等の和暦特殊変換ルールは、生年月日聴取サブフローの OpenAI プロンプトで対応（DOB 復唱確認 が処理）。"
  - "status 値: Gen2 の 0/1/2 を Gen3 の 1/2/3/6 にマッピング。Gen2 の status=0（冒頭/途中切断）は Gen3 では使用禁止（CLAUDE.md ルール）。"
  - "smsFlag 値: Gen2 の 0/1/2（0=SMS なし、2=代表案内系）を Gen3 の -1/1（-1=SMS なし、1=SMS 送信）にマッピング。Gen2 status=1→smsFlag=0 は、Gen3 では status=1→smsFlag=1（通話完了時に SMS 送信）とする。"
  - "endpoint、medicalCardNumber、inquiry、PhoneName、confirm、option、company_check、company_name フィールドは本フローで未使用のため saveContextModel2DB から除外。"
  - "口調・言葉遣い: 丁寧語、「かしこまりました」OK、「ありがとうございます。」「お気軽に」は使用禁止、「おっしゃってください」ではなく「お話ください」を使用（Gen2 仕様踏襲）。"
  - "Gen2 の OpenAI Assistant による自由対話の完全禁止ルール（5.1）は、Gen3 では各 generate_by_OpenAI モジュールの prompt で明示的に出力値を制約することで担保。"
  - "代表電話番号: 092-923-1551（終話アナウンスで3回読み上げ）。施設名: 福岡県済生会二日市病院。"
  - "Gen2 の修正履歴（2026-04-06 メモ）: 「予約分岐で希望日の後、個人情報の聴取が漏れて完了した」→ Gen3 の scenario_flow で予約希望日_共通 → jump_氏名聴取 → jump_生年月日聴取 → jump_電話番号聴取 → END_終話 の直列遷移を明示したため、聴取漏れは発生しない構造。"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "[Preferred_date フリーテキスト保存] Gen2 は予約希望日をフリーワードで Preferred_date に保存していたが、Gen3 では分岐判定優先のため enum 値（拒否/当日/受付）のみ保存する設計に変更した。フリーテキスト保存要件が残る場合は、別途 TEXT フィールドへの二重保存または Pattern B（text hearing + context_match_router）への変更を検討。"
    resolved: false
  - item: "[変更内容フリーテキスト保存] Gen2 は変更内容発話を reason にフリーテキスト保存していたが、Gen3 では change_item に enum 値のみ保存する設計に変更した。発話詳細の保存要件が残る場合は、reason への二重保存を別途追加する必要あり。"
    resolved: false
  - item: "[電話番号聴取 サブフロー内 リトライ超過時の END_代表案内 遷移] Custom Jump to Flow アーキテクチャでは、サブフロー内のリトライ失敗を親フローの END_代表案内 へシグナルできない。Brekeke IVR UI で電話番号聴取サブフロー内の retry_false パスに代表電話案内 TTS + saveCompletionFlag2db(status=2, smsFlag=-1) + Disconnect を手動追加する手動タスクが必要。"
    status: "TODO"
    assignee: "人間（Brekeke IVR UI）"
    resolved: false
  - item: "[電話番号復唱確認 否定時の END_代表案内 遷移] 同上。サブフロー内の復唱否定ルートに代表電話案内 TTS を手動追加する必要あり。"
    status: "TODO"
    assignee: "人間（Brekeke IVR UI）"
    resolved: false
  - item: "[smsFlag マッピング] Gen2 の smsFlag（0/1/2）を Gen3 の sms_flag（-1/1）にマッピングした。本設計では全正常終話（END_終話）で sms_flag=1、代表案内系（END_代表案内, END_代表案内_就職進学）で sms_flag=-1 としたが、顧客要件で代表案内系にも SMS 送信が必要な場合は差し替えが必要。"
    resolved: false
  - item: "[予約希望日の当日判定] 本設計では予約希望日 enum hearing の OpenAI プロンプトで「着信日と同一月日」を「当日」に判定する設計。着信日の年月日情報（dateOfCall コンテキスト）を OpenAI プロンプトに埋め込む仕組みが prompter で必要。"
    resolved: false
  - item: "[050 番号の扱い] Gen2 仕様では 050 も携帯相当（11桁必須）として扱う。リファレンス bivr の電話番号聴取サブフローで 050 が MOBILE 扱いになるか、FIXED 扱いになるか要確認。動作確認で差異があれば bivr のカスタマイズが必要。"
    resolved: false
  - item: "[Gen2 function 未使用フィールドの取り扱い] medicalCardNumber, inquiry, PhoneName, confirm, option, company_check, company_name は本フローで聴取しないため saveContextModel2DB から除外した。Dr.JOY 側で既存運用との互換性維持のため、未使用フィールドも itemDefault:false で残す必要があれば追加。"
    resolved: false
  - item: "[office_id] Dr.JOY 管理画面で取得。設計書には含めないが、フロー稼働時に設定が必要。"
    resolved: false
