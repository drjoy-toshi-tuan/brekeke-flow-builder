# --- セクション7: ステップ詳細 ---
step_details:
  # --- メインフロー聴取ステップ ---
  - step_name: "用件確認"
    tts_announcement: "用件を次の4つのうちのいずれかでお話しください。予約、予約変更、キャンセル、その他のお問い合わせ。それではお話しください。1番、予約。2番、変更。3番、キャンセル。4番、その他のお問い合わせ。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規予約"
        - "予約変更"
        - "キャンセル"
        - "その他問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「薬」「お薬」を含む"
          output: "新規予約"
        - input: "DTMF 2 または「変更」を含む"
          output: "予約変更"
        - input: "DTMF 3 または「キャンセル」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「問い合わせ」「確認」「質問」を含む"
          output: "その他問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "用件別分岐（新規予約→来院歴確認 / 予約変更→現在の予約日 / キャンセル→キャンセル希望日 / その他問い合わせ→RAGサブフロー）"
    retry_failure: "end_failure"

  - step_name: "来院歴確認"
    tts_announcement: "当院への来院歴はございますでしょうか。1番、あります。2番、ないです。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「あります」「はい」を含む"
          output: "あり"
        - input: "DTMF 2 または「ないです」「いいえ」「初めて」を含む"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "history"
    next_step: "健診_診療確認"
    retry_failure: "end_failure"

  - step_name: "健診_診療確認"
    tts_announcement: "予約をご希望されるのは、健診と診療、どちらのご用件でしょうか。1番、健診。2番、診療。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "健診"
        - "診療"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「健診」「検診」「人間ドック」を含む"
          output: "健診"
        - input: "DTMF 2 または「診療」「診察」「賃料」「飲料」を含む"
          output: "診療"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "健診→個人_団体確認 / 診療→保険_自由確認"
    retry_failure: "end_failure"

  - step_name: "個人_団体確認"
    tts_announcement: "お一人のご予約でしょうか。団体のご予約でしょうか。1番、個人。2番、団体。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "個人"
        - "団体"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「個人」「一人」「ひとり」を含む"
          output: "個人"
        - input: "DTMF 2 または「団体」を含む"
          output: "団体"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "個人→一般_雇入れ確認 / 団体→END_団体予約"
    retry_failure: "end_failure"

  - step_name: "一般_雇入れ確認"
    tts_announcement: "ご希望の健診は一般健診と雇入れ健診のどちらでしょうか。1番、一般健診。2番、雇入れ健診。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "一般健診"
        - "雇入れ健診"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「一般」を含む"
          output: "一般健診"
        - input: "DTMF 2 または「雇入れ」「雇い入れ」を含む"
          output: "雇入れ健診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "reservationType"
    next_step: "オプション確認"
    retry_failure: "end_failure"

  - step_name: "オプション確認"
    tts_announcement: "オプションのご希望がある方は簡潔にお話しください。ない場合は「ないです」とお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "オプション内容テキスト"
      mapping:
        - input: "音声認識結果"
          output: "オプション内容テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "option"
    next_step: "予約希望日"
    retry_failure: "end_failure"

  - step_name: "保険_自由確認"
    tts_announcement: "ご希望の内容は保険診療と自由診療のどちらでしょうか。1番、保険診療。2番、自由診療。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "保険診療"
        - "自由診療"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「保険」を含む"
          output: "保険診療"
        - input: "DTMF 2 または「自由」を含む"
          output: "自由診療"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "保険診療→予約希望日 / 自由診療→点滴_検査_その他確認"
    retry_failure: "end_failure"

  - step_name: "点滴_検査_その他確認"
    tts_announcement: "ご希望の内容を次の3つからお選びください。1番、点滴。2番、検査。3番、その他。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "点滴診療"
        - "検査診療"
        - "その他自由診療"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「点滴」を含む"
          output: "点滴診療"
        - input: "DTMF 2 または「検査」を含む"
          output: "検査診療"
        - input: "DTMF 3 または「その他」「相談」「カウンセリング」を含む"
          output: "その他自由診療"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "reservationType"
    next_step: "点滴→点滴内容 / 検査→検査内容 / その他→心理_中医_相談"
    retry_failure: "end_failure"

  - step_name: "点滴内容"
    tts_announcement: "ご希望の点滴内容をお話しください。わからない場合は「わからない」とお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "点滴内容テキスト"
      mapping:
        - input: "音声認識結果"
          output: "点滴内容テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "details"
    next_step: "予約希望日"
    retry_failure: "end_failure"

  - step_name: "検査内容"
    tts_announcement: "ご希望の検査内容をお話しください。わからない場合は「わからない」とお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "検査内容テキスト"
      mapping:
        - input: "音声認識結果"
          output: "検査内容テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "details"
    next_step: "予約希望日"
    retry_failure: "end_failure"

  - step_name: "心理_中医_相談"
    tts_announcement: "ご希望の内容を次の3つからお選びください。1番、心理カウンセリング。2番、中医カウンセリング。3番、その他相談。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "心理カウンセリング"
        - "中医カウンセリング"
        - "その他相談"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「心理」を含む"
          output: "心理カウンセリング"
        - input: "DTMF 2 または「中医」を含む"
          output: "中医カウンセリング"
        - input: "DTMF 3 または「その他」「相談」を含む"
          output: "その他相談"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "details"
    next_step: "予約希望日"
    retry_failure: "end_failure"

  - step_name: "予約希望日"
    tts_announcement: "ご予約を希望されるお日にちを、本日より2日以降の日程でお話しください。複数ある場合は続けてお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約希望日テキスト"
      mapping:
        - input: "音声認識結果"
          output: "予約希望日テキスト（フリーテキスト。複数日の場合は読点区切り）"
      no_result_condition: "音声認識結果が空"
    save_to: "desiredReservationDate"
    next_step: "[RAG_最終質問] → 終話チェーン"
    retry_failure: "end_failure"

  - step_name: "現在の予約日"
    tts_announcement: "現在のご予約日をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト（YYYY-MM-DD形式）"
      mapping:
        - input: "音声認識結果（日付表現）"
          output: "YYYY-MM-DD形式に正規化"
      no_result_condition: "音声認識結果が空または日付として解釈不能"
    save_to: "reservationDate"
    next_step: "予約内容"
    retry_failure: "end_failure"

  - step_name: "予約内容"
    tts_announcement: "ご予約の内容を簡潔にお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約内容テキスト"
      mapping:
        - input: "音声認識結果"
          output: "予約内容テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "details"
    next_step: "変更希望日"
    retry_failure: "end_failure"

  - step_name: "変更希望日"
    tts_announcement: "変更をご希望されるお日にちを、本日より2日以降の日程でお話しください。複数ある場合は、続けてお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "変更希望日テキスト"
      mapping:
        - input: "音声認識結果"
          output: "変更希望日テキスト（フリーテキスト。複数日の場合は読点区切り）"
      no_result_condition: "音声認識結果が空"
    save_to: "desiredReservationDate"
    next_step: "[RAG_最終質問] → 終話チェーン"
    retry_failure: "end_failure"

  - step_name: "キャンセル希望日"
    tts_announcement: "キャンセルをご希望されるお日にちをお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト（YYYY-MM-DD形式）"
      mapping:
        - input: "音声認識結果（日付表現）"
          output: "YYYY-MM-DD形式に正規化"
      no_result_condition: "音声認識結果が空または日付として解釈不能"
    save_to: "reservationDate"
    next_step: "[RAG_最終質問] → キャンセル終話チェーン"
    retry_failure: "end_failure"

  - step_name: "問い合わせ内容"
    tts_announcement: "お問い合わせ内容をご自由におっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "問い合わせ内容テキスト"
      mapping:
        - input: "音声認識結果"
          output: "問い合わせ内容テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "details"
    next_step: "RAGサブフロー → 終話チェーン"
    retry_failure: "end_failure"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "お電話ありがとうございます。海風診療所の予約専用AI電話です。お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に186を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（acceptance_times使用時）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。それでは失礼いたします。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_汎用終話"
    condition: "予約/変更/問い合わせの全聴取完了"
    tts_announcement: "ご要望を承りました。2診療日以内に当院スタッフより、お電話またはショートメールにてご連絡いたします。ご連絡をもって確定となりますので、お待ちくださいませ。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_汎用"

  - name: "END_キャンセル終話"
    condition: "キャンセルの全聴取完了"
    tts_announcement: "キャンセルを承りました。確認が必要な場合のみ、当院スタッフよりお電話またはショートメールにてご連絡をさせていただくことがございます。あらかじめご了承くださいませ。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_団体予約"
    condition: "団体予約選択時"
    tts_announcement: "団体のお申込みですね。2診療日以内に当院スタッフより折り返しご連絡いたします。お待ちくださいませ。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_団体予約"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # smsFlag はフロー構造により自動決定される:
  # - END_汎用終話 = smsFlag:1（予約/変更/問い合わせ）
  # - END_キャンセル終話 = smsFlag:2（キャンセル）
  # - END_団体予約 = smsFlag:-1（SMS送信なし）
  # ContextMatchRouterによる分岐は不要

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "用件確認のその他問い合わせ分岐後"
  pre_termination: true
  # パターン3（複合）: Gen2→Gen3移管のデフォルト（CLAUDE.md Rule 16）
  # - パターン1: その他問い合わせルートでRAGサブフローを使用（問い合わせ内容をRAGで検索・回答）
  # - パターン2: 全正常系終話の前に「何かご質問はございますか？」RAGサブフローを配置
  # RAGサブフローのTTS文言:
  #   パターン1（問い合わせルート初回）: {tts_g:お問い合わせ内容をご自由におっしゃってください。}
  #   パターン2（全終話前初回）: {tts_g:何かご質問はございますか？}
  #   ループ時（RAG回答後の再質問）: {tts_g:その他に何かご質問はございますか？ない場合は「ありません」のようにお話しください。}

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # --- メインフロー ---
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内"
    announcement: "お電話ありがとうございます。海風診療所の予約専用AI電話です。人と話す時と同じようなスピードでお話しください。なお、2診療日以内の予約についてはホームページの代表番号へおかけください。"

  - module_name: "用件確認"
    purpose: "用件聴取案内"
    announcement: "用件を次の4つのうちのいずれかでお話しください。予約、予約変更、キャンセル、その他のお問い合わせ。それではお話しください。1番、予約。2番、変更。3番、キャンセル。4番、その他のお問い合わせ。どうぞ。"

  - module_name: "来院歴確認"
    purpose: "来院歴聴取案内"
    announcement: "当院への来院歴はございますでしょうか。1番、あります。2番、ないです。どうぞ。"

  - module_name: "健診_診療確認"
    purpose: "健診/診療選択案内"
    announcement: "予約をご希望されるのは、健診と診療、どちらのご用件でしょうか。1番、健診。2番、診療。どうぞ。"

  - module_name: "個人_団体確認"
    purpose: "個人/団体選択案内"
    announcement: "お一人のご予約でしょうか。団体のご予約でしょうか。1番、個人。2番、団体。どうぞ。"

  - module_name: "一般_雇入れ確認"
    purpose: "一般/雇入れ健診選択案内"
    announcement: "ご希望の健診は一般健診と雇入れ健診のどちらでしょうか。1番、一般健診。2番、雇入れ健診。どうぞ。"

  - module_name: "オプション確認"
    purpose: "オプション聴取案内"
    announcement: "オプションのご希望がある方は簡潔にお話しください。ない場合は「ないです」とお答えください。どうぞ。"

  - module_name: "保険_自由確認"
    purpose: "保険/自由診療選択案内"
    announcement: "ご希望の内容は保険診療と自由診療のどちらでしょうか。1番、保険診療。2番、自由診療。どうぞ。"

  - module_name: "点滴_検査_その他確認"
    purpose: "点滴/検査/その他選択案内"
    announcement: "ご希望の内容を次の3つからお選びください。1番、点滴。2番、検査。3番、その他。どうぞ。"

  - module_name: "点滴内容"
    purpose: "点滴内容聴取案内"
    announcement: "ご希望の点滴内容をお話しください。わからない場合は「わからない」とお話しください。どうぞ。"

  - module_name: "検査内容"
    purpose: "検査内容聴取案内"
    announcement: "ご希望の検査内容をお話しください。わからない場合は「わからない」とお話しください。どうぞ。"

  - module_name: "心理_中医_相談"
    purpose: "心理/中医/相談選択案内"
    announcement: "ご希望の内容を次の3つからお選びください。1番、心理カウンセリング。2番、中医カウンセリング。3番、その他相談。どうぞ。"

  - module_name: "予約希望日"
    purpose: "予約希望日聴取案内"
    announcement: "ご予約を希望されるお日にちを、本日より2日以降の日程でお話しください。複数ある場合は続けてお話しください。どうぞ。"

  - module_name: "現在の予約日"
    purpose: "現在の予約日聴取案内"
    announcement: "現在のご予約日をお話しください。どうぞ。"

  - module_name: "予約内容"
    purpose: "予約内容聴取案内"
    announcement: "ご予約の内容を簡潔にお話しください。どうぞ。"

  - module_name: "変更希望日"
    purpose: "変更希望日聴取案内"
    announcement: "変更をご希望されるお日にちを、本日より2日以降の日程でお話しください。複数ある場合は、続けてお話しください。どうぞ。"

  - module_name: "キャンセル希望日"
    purpose: "キャンセル希望日聴取案内"
    announcement: "キャンセルをご希望されるお日にちをお話しください。どうぞ。"

  - module_name: "問い合わせ内容"
    purpose: "問い合わせ内容聴取案内"
    announcement: "お問い合わせ内容をご自由におっしゃってください。"

  # --- 終話TTS ---
  - module_name: "非通知_アナウンス"
    purpose: "非通知案内"
    announcement: "お電話ありがとうございます。海風診療所の予約専用AI電話です。お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に186を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"

  - module_name: "時間外_アナウンス"
    purpose: "時間外案内"
    announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"

  - module_name: "END_汎用終話"
    purpose: "予約/変更/問い合わせ完了終話"
    announcement: "ご要望を承りました。2診療日以内に当院スタッフより、お電話またはショートメールにてご連絡いたします。ご連絡をもって確定となりますので、お待ちくださいませ。それでは失礼いたします。"

  - module_name: "END_キャンセル終話"
    purpose: "キャンセル完了終話"
    announcement: "キャンセルを承りました。確認が必要な場合のみ、当院スタッフよりお電話またはショートメールにてご連絡をさせていただくことがございます。あらかじめご了承くださいませ。それでは失礼いたします。"

  - module_name: "END_団体予約"
    purpose: "団体予約終話"
    announcement: "団体のお申込みですね。2診療日以内に当院スタッフより折り返しご連絡いたします。お待ちくださいませ。それでは失礼いたします。"

  - module_name: "END_聴取失敗"
    purpose: "リトライ上限終話"
    announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。それでは失礼いたします。"

