# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管案件。入力: docs/migration/gen2_海風診療所_診療.md"
  - "個人情報（氏名・生年月日・電話番号）を用件確認の前に聴取する（Gen2準拠の施設固有設計）"
  - "診療と健診の両受付が1つのフローに統合されている（Director注意事項に明記）"
  - "新規予約ルートは健診/診療→保険/自由→点滴/検査/その他の3段階分岐を含む"
  - "Gen2の類義語対応: 「印刷」「定期」「新薬」「再診」等→「診察」、「賃料」「飲料」→「診療」、「薬」「お薬」→「予約」、「電気」「でんき」→「新規」。Gen3ではOpenAIプロンプト内で同等の正規化を行うこと"
  - "Gen2の <sub alias> タグ: 「海風診療所」の読み「うみかぜしんりょうしょ」をTTS文言に反映すること（SSMLまたは読み仮名補記）"
  - "予約日の年度補完ルール: 着信日時を基準に、10月以降に1〜9月の日付を言われた場合は翌年とする"
  - "予約希望日はフリーテキスト（YYYY-MM-DD形式に変換しない）。reservationDateとdesiredReservationDateは別フィールド"
  - "Gen2 checkpoint フィールドはGen3に含めない（Commubo互換概念のため除外）"
  - "Gen2 endpoint/smsFlag/checkout フィールドはsaveContextModel2DBに含めない"
  - "acceptance_times不使用（Gen2に時間帯制御なし）。将来的な有効化に備えEND_時間外はデフォルト文言で配置"
  - "サブフロー構成: 氏名聴取（復唱なし）+ 生年月日聴取（復唱あり）+ 電話番号聴取（復唱あり）+ RAG検索。診察券番号聴取サブフローはGen2に該当ステップがないため不使用"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id"
    resolved: false
  - item: "営業時間（acceptance_timesを使用するか、使用する場合の稼働時間）"
    resolved: false
  - item: "対象環境（デモ/本番）"
    resolved: false
  - item: "診察券番号聴取の追加要否"
    resolved: false
  - item: "reservationType のrangeValues定義方法（TEXT自由テキスト or 固定リスト）"
    resolved: false
  - item: "smsFlag=1（予約/変更/問い合わせ）とsmsFlag=2（キャンセル）のSMS文面"
    resolved: false
