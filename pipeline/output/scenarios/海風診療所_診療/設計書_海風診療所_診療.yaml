version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "海風診療所"
  group_name: "海風診療所"
  flow_name: "海風診療所$診療_20260409"
  target_facility: "海風診療所（単一施設）"
  office_id: "TODO_要確認"
  phone_number: ""
  business_hours: "なし（acceptance_times不使用）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "海風診療所$診療_20260409"
      role: "main"
      description: "冒頭チェーン → 氏名/生年月日/電話番号サブフロー → 用件確認（4択） → 用件別詳細聴取（健診/診療の多段分岐） → 終話"
  subflows:
    - name: "海風診療所$氏名聴取_20260409"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。フロー名プレフィックスのみ置換"
    - name: "海風診療所$生年月日聴取_20260409"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー。Gen2で生年月日の復唱確認あり"
    - name: "海風診療所$電話番号聴取_20260409"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10 準拠。docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。Gen2で着信番号確認+手動入力+復唱確認あり"
    - name: "海風診療所$RAG検索_20260409"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 16 準拠。docs/reference/bivr/samples/json/RAG検索.json を完全コピー。パターン3の問い合わせルート用+全終話前用"

# --- セクション3: フローの目的 ---
purpose: "海風診療所の予約専用AI電話。患者からの着信を受け、氏名・生年月日・連絡先電話番号を聴取した後、用件（予約/変更/キャンセル/問い合わせ）を確認する。予約の場合は健診/診療の分岐を経て詳細聴取を行い、折り返し受付を自動化する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "海風診療所$診療_20260409"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2,smsFlag=-1) → 切断
            └─ 通常 → 冒頭_アナウンス(TTS)
                        → サブフロー遷移_氏名聴取(Custom Jump to Flow)
                        → サブフロー遷移_生年月日聴取(Custom Jump to Flow)
                        → サブフロー遷移_電話番号聴取(Custom Jump to Flow)
                        → 用件確認(TTS) → 入力_用件確認(DTMF STT, max_dtmf_length=1)
                            → OpenAI_用件確認(generate_by_OpenAI)
                                ├─ 新規予約 → saveContext_用件 → 来院歴確認(TTS) → 入力_来院歴確認(DTMF STT) → OpenAI_来院歴確認 → saveContext_来院歴
                                │     → 健診_診療確認(TTS) → 入力_健診_診療確認(DTMF STT) → OpenAI_健診_診療確認
                                │         ├─ 健診 → 個人_団体確認(TTS) → 入力_個人_団体確認(DTMF STT) → OpenAI_個人_団体確認
                                │         │     ├─ 団体 → saveContext_予約種別_団体 → [RAG_最終質問] → 完了フラグ_団体予約(status=1,smsFlag=-1) → END_団体予約(TTS) → 切断
                                │         │     └─ 個人 → 一般_雇入れ確認(TTS) → 入力_一般_雇入れ確認(DTMF STT) → OpenAI_一般_雇入れ確認 → saveContext_予約種別
                                │         │               → オプション確認(TTS) → 入力_オプション確認(STT) → OpenAI_オプション確認 → saveContext_オプション
                                │         │               → 予約希望日(TTS) → 入力_予約希望日(STT) → OpenAI_予約希望日 → saveContext_予約希望日
                                │         │               → [RAG_最終質問] → 完了フラグ_汎用(status=1,smsFlag=1) → END_汎用終話(TTS) → 切断
                                │         └─ 診療 → 保険_自由確認(TTS) → 入力_保険_自由確認(DTMF STT) → OpenAI_保険_自由確認
                                │               ├─ 保険診療 → saveContext_予約種別_保険 → 予約希望日 → [RAG_最終質問] → 完了フラグ_汎用 → END_汎用終話 → 切断
                                │               └─ 自由診療 → 点滴_検査_その他確認(TTS) → 入力_点滴_検査_その他確認(DTMF STT) → OpenAI_点滴_検査_その他確認
                                │                     ├─ 点滴 → saveContext_予約種別_点滴 → 点滴内容(TTS) → 入力_点滴内容(STT) → OpenAI_点滴内容 → saveContext_詳細
                                │                     │         → 予約希望日 → [RAG_最終質問] → 完了フラグ_汎用 → END_汎用終話 → 切断
                                │                     ├─ 検査 → saveContext_予約種別_検査 → 検査内容(TTS) → 入力_検査内容(STT) → OpenAI_検査内容 → saveContext_詳細
                                │                     │         → 予約希望日 → [RAG_最終質問] → 完了フラグ_汎用 → END_汎用終話 → 切断
                                │                     └─ その他 → saveContext_予約種別_その他 → 心理_中医_相談(TTS) → 入力_心理_中医_相談(DTMF STT) → OpenAI_心理_中医_相談 → saveContext_詳細
                                │                               → 予約希望日 → [RAG_最終質問] → 完了フラグ_汎用 → END_汎用終話 → 切断
                                ├─ 予約変更 → saveContext_用件 → 現在の予約日(TTS) → 入力_現在の予約日(STT) → OpenAI_現在の予約日 → saveContext_予約日
                                │     → 予約内容(TTS) → 入力_予約内容(STT) → OpenAI_予約内容 → saveContext_詳細
                                │     → 変更希望日(TTS) → 入力_変更希望日(STT) → OpenAI_変更希望日 → saveContext_予約希望日
                                │     → [RAG_最終質問] → 完了フラグ_汎用(status=1,smsFlag=1) → END_汎用終話(TTS) → 切断
                                ├─ キャンセル → saveContext_用件 → キャンセル希望日(TTS) → 入力_キャンセル希望日(STT) → OpenAI_キャンセル希望日 → saveContext_予約日
                                │     → [RAG_最終質問] → 完了フラグ_キャンセル(status=1,smsFlag=2) → END_キャンセル終話(TTS) → 切断
                                ├─ その他問い合わせ → saveContext_用件 → サブフロー遷移_RAG検索(Custom Jump to Flow)
                                │     → 完了フラグ_汎用(status=1,smsFlag=1) → END_汎用終話(TTS) → 切断
                                └─ NO_RESULT → リトライ_用件確認
                                                 ├─ Retry → 用件確認(TTS)
                                                 └─ No more → 完了フラグ_聴取失敗(status=3,smsFlag=-1) → END_聴取失敗(TTS) → 切断

      [RAG_最終質問] = サブフロー遷移_RAG検索_最終(Custom Jump to Flow) ※パターン3の全終話前RAG

      --- 各聴取ステップのリトライは省略表示。全て Retry→該当TTS / No more→END_聴取失敗 ---

      --- メインフロー内終話パターン ---
      END_非通知(TTS) → 切断
      END_時間外(TTS) → 切断 ※acceptance_times不使用のため通常到達しないが、将来的な有効化に備えデフォルト配置
      END_聴取失敗(TTS) → 切断
      END_汎用終話(TTS) → 切断
      END_キャンセル終話(TTS) → 切断
      END_団体予約(TTS) → 切断
    notes: |
      acceptance_times不使用（Gen2に時間帯制御なし）。将来的に有効化する場合はincoming-classifierの後にacceptance_timesを挿入する。
      個人情報（氏名・生年月日・電話番号）を用件確認の前に聴取する（Gen2準拠の順序）。
      新規予約ルートは健診/診療→保険/自由→点滴/検査/その他の多段分岐を含む複雑な構成。

  - flow_name: "海風診療所$氏名聴取_20260409"
    diagram: |
      docs/reference/bivr/samples/json/氏名聴取.json を完全コピー（CLAUDE.md Rule 9）。
      フロー名プレフィックスのみ「海風診療所$」に置換。構造・接続・スクリプトは一切変更不可。

  - flow_name: "海風診療所$生年月日聴取_20260409"
    diagram: |
      docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー（CLAUDE.md Rule 9）。
      フロー名プレフィックスのみ「海風診療所$」に置換。構造・接続・スクリプトは一切変更不可。

  - flow_name: "海風診療所$電話番号聴取_20260409"
    diagram: |
      docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー（CLAUDE.md Rule 9/10）。
      フロー名プレフィックスのみ「海風診療所$」に置換。構造・接続・スクリプトは一切変更不可。

  - flow_name: "海風診療所$RAG検索_20260409"
    diagram: |
      docs/reference/bivr/samples/json/RAG検索.json を完全コピー（CLAUDE.md Rule 16）。
      フロー名プレフィックスのみ「海風診療所$」に置換。構造・接続・スクリプトは一切変更不可。

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # --- 標準フィールド（itemDefault: true）---
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "新規予約"
      - order: "2"
        value: "予約変更"
      - order: "3"
        value: "キャンセル"
      - order: "4"
        value: "その他問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "Gen2 classification enum から転記"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取。復唱確認あり"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取。復唱確認あり"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "非通知"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "Gen2 status: 0→3（聴取失敗）に変換。Gen3では0は使用禁止"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

  # --- 施設固有フィールド（itemDefault: false）---
  - context_name: "history"
    context_name_jp: "来院歴"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 history。「あり」/「なし」を格納"

  - context_name: "reservationType"
    context_name_jp: "予約種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 reservationType。一般健診/雇入れ健診/保険診療/点滴診療/検査診療/その他自由診療/健診団体予約 等をフリーテキスト格納"

  - context_name: "option"
    context_name_jp: "オプション"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 option。個人健診のオプション希望内容"

  - context_name: "details"
    context_name_jp: "詳細内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 details。点滴内容/検査内容/心理中医相談/予約内容/問い合わせ内容を共用"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 reservationDate。現在の予約日/キャンセル希望日/変更希望日を共用"

  - context_name: "desiredReservationDate"
    context_name_jp: "予約希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 DesiredreservationDate。フリーテキスト（複数候補を読点区切りで格納可）"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # --- 個人情報（サブフローで聴取。参考情報として記載）---
  - order: 1
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー（氏名聴取）で実行。profile_words: 氏名辞書。Gen2: フルネームの前に「名前は」をつけて発話"

  - order: 2
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "valid"
      - "不正値"
      - "2桁_0007"
      - "2桁_0831"
      - "2桁_3263"
    notes: "サブフロー（生年月日聴取_復唱あり）で実行。DOB Re-confirmation あり。DTMF 8桁=生年月日(YYYYMMDD形式、例: 19850831)"

  - order: 3
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "サブフロー（電話番号聴取_復唱あり）で実行。incoming-classifierで携帯/その他分岐。Phone Re-confirmation あり。DTMF 最大11桁=電話番号(ハイフンなし数字入力、例: 09012345678)"

  # --- メインフロー聴取項目 ---
  - order: 4
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "新規予約"
      - "予約変更"
      - "キャンセル"
      - "その他問い合わせ"
    notes: "DTMF 1=予約, 2=変更, 3=キャンセル, 4=問い合わせ"

  - order: 5
    name: "来院歴確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "history"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "あり"
      - "なし"
    notes: "DTMF 1=あり, 2=なし。新規予約ルートのみ"

  - order: 6
    name: "健診_診療確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "健診"
      - "診療"
    notes: "DTMF 1=健診, 2=診療。ルーティング分岐のみ（context保存なし）"

  - order: 7
    name: "個人_団体確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "個人"
      - "団体"
    notes: "DTMF 1=個人, 2=団体。団体の場合はreservationType=健診団体予約をsaveContext2DBで保存"

  - order: 8
    name: "一般_雇入れ確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "reservationType"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "一般健診"
      - "雇入れ健診"
    notes: "DTMF 1=一般健診, 2=雇入れ健診。個人健診ルートのみ"

  - order: 9
    name: "オプション確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "option"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "フリーテキスト。「ないです」も有効回答。個人健診ルートのみ"

  - order: 10
    name: "保険_自由確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "保険診療"
      - "自由診療"
    notes: "DTMF 1=保険診療, 2=自由診療。保険の場合はreservationType=保険診療をsaveContext2DBで保存"

  - order: 11
    name: "点滴_検査_その他確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "reservationType"
