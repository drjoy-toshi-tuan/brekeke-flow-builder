      - "消化器外科"
      - "消化器内科"
      - "心臓血管外科"
      - "腎移植外科"
      - "腎臓内科"
      - "整形外科"
      - "精神科"
      - "総合内科"
      - "東洋医学"
      - "糖尿病代謝内科"
      - "乳腺外科"
      - "脳神経外科"
      - "泌尿器科"
      - "皮膚科"
      - "病理診断科"
      - "放射線科"
      - "放射線治療"
      - "放射線診断・IVR"
      - "麻酔科疼痛治療科"
      - "免疫内分泌内科"
    notes: "5 親 + 32 単独診療科 + 対象外2 + わからない。echo_back 親では false（最終確定後に子聴取で復唱）。中黒入り正式表記は OpenAI が正規化。「内科」単独発話は「わからない」扱い。"

  - order: 2
    name: "診療科_呼吸器二択"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "呼吸器内科"
      - "呼吸器外科"
    notes: "親「呼吸器」発話後の二択。echo_back: true で復唱。"

  - order: 3
    name: "診療科_消化器二択"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "消化器内科"
      - "消化器外科"
    notes: "親「消化器」発話後の二択。echo_back: true で復唱。"

  - order: 4
    name: "診療科_脳神経二択"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
