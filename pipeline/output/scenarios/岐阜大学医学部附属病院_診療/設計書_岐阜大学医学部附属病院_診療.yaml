    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "腎臓内科"
      - "腎移植外科"
    notes: "親「腎臓」発話後の二択。echo_back: true。"

  - order: 7
    name: "WEB_or_AI_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "webOrAiSelection"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "WEB"
      - "AI"
    notes: "DTMF 1=WEB(はい), 2=AI(いいえ)。眼科/脳神経内科以外の診療科で問う。WEB → 連絡先電話番号 → END_WEB確認 / AI → 通常 AI レーン。"

  - order: 8
    name: "用件_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "再診予約"
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
    notes: "DTMF 1=再診予約, 2=予約変更, 3=予約キャンセル, 4=予約確認。echo_back: true で復唱（4 種それぞれの文言）。"

  - order: 9
    name: "再診理由_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "再診ルートのみ。自由テキスト。5 秒無言で打ち切り。"

  - order: 10
    name: "予約日_聴取_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "予約変更ルートのみ。月+日の DTMF 4 桁並走可。過去日付は +1 年で自動補正。echo_back: true。"

  - order: 11
    name: "変更理由_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "予約変更ルートのみ。自由テキスト。体調不良の場合は具体的症状を聴取。"

  - order: 12
    name: "予約希望時期_聴取_変更"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "予約変更ルートのみ。OpenAI が「今日/本日/当日/今から」を「今日」に正規化、それ以外はそのまま summarize。後段 ContextMatchRouter で「今日」→ 代表電話案内 / 「other」→ 残薬確認 へ分岐（Pattern B）。"

  - order: 13
    name: "残薬確認_聴取_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "residualMedication"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
      - "処方されていない"
    notes: "予約変更ルートのみ。DTMF 1=あり(はい), 2=なし(いいえ)。3 値の echo_back 不要（移管ノート判断）。"

  - order: 14
    name: "予約日_聴取_キャンセル"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "予約キャンセルルートのみ。月+日の DTMF 4 桁並走可。echo_back: true。"

  - order: 15
    name: "キャンセル理由_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "予約キャンセルルートのみ。自由テキスト。体調不良の場合は具体的症状を聴取。"

  - order: 16
    name: "次回予約希望_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "nextReservationDesired"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "予約キャンセルルートのみ。DTMF 1=はい, 2=いいえ。はい→希望時期+残薬聴取、いいえ→電話番号→終話。"

  - order: 17
    name: "予約希望時期_聴取_キャンセル"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "予約キャンセル(次回希望あり)ルートのみ。OpenAI 正規化は変更ルートと同一。"

  - order: 18
    name: "残薬確認_聴取_キャンセル"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "residualMedication"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
      - "処方されていない"
    notes: "予約キャンセル(次回希望あり)ルートのみ。DTMF 1=あり, 2=なし。"

  - order: 19
    name: "予約確認内容_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "予約確認ルートのみ。自由テキスト。次回予約日時の確認等。"

