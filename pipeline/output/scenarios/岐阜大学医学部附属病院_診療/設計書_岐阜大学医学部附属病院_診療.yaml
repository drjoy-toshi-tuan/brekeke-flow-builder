# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 (commubo) → Gen3 移管。元資料は commubo抽出/【083】/【083岐阜大学医学部附属病院】診療1_M_本番/ 配下の main.yaml + サブ yaml 19 本。"
  - "施設正式名称は「岐阜大学医学部附属病院」（附属）。フォルダ名「付属」は誤記、main.yaml の挨拶 TTS が正。"
  - "診療科ハイラルキ二段（5 親 + 32 単独 + 対象外2）。親 hearing → 子 hearing で内/外科を確定。放射線のみ 3 分岐（科/治療/診断・IVR）。腎臓は 腎臓内科/腎移植外科。"
  - "中黒入り正式表記の正規化（OpenAI で吸収）: 血液・感染症内科 / 耳鼻咽喉科・頭頸部外科 / 放射線診断・IVR / リハビリテーション部・リハビリテーション科。"
