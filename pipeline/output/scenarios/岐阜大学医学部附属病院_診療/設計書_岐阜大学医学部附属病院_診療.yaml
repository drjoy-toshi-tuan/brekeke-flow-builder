# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "診療科_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    no_result_default: "登録なし"
    output_labels:
      - "呼吸器"
      - "消化器"
      - "脳神経"
      - "放射線"
      - "腎臓"
