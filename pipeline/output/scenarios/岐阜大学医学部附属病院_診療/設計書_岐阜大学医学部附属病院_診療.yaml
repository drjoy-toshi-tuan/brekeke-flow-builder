termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "申し訳ございません。電話番号が非通知設定の場合、AI電話では受付できません。先頭に数字の186を付けておかけなおしください。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（祝日・年末年始含む）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、祝日、年末年始を除く、月曜から金曜の、9時から15時となっております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件聴取・診療科聴取）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_当日代表案内"
    condition: "予約希望時期で「今日/本日/当日/今から」発話"
    tts_announcement: "申し訳ございません。今日受診希望の方は、代表電話へおかけなおしください。お電話番号が分かる方は、このままお電話をお切りください。分からない方は、ご案内いたしますのでメモをご準備ください。お電話番号は、058-230-6000、です。繰り返します。お電話番号は、058-230-6000、です。繰り返します。お電話番号は、058-230-6000、です。それでは、失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_当日代表案内"

  - name: "END_WEB確認"
    condition: "WEB レーン（連絡先電話番号聴取完了）"
    tts_announcement: "WEBでの申込受付を承りました。確認ができ次第、ショートメール、場合によっては電話にてご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_WEB確認"

  - name: "END_再診予約"
    condition: "再診予約ルート全聴取完了"
    tts_announcement: "再診予約の申し込みを受付いたしました。確認ができ次第、ショートメール、場合によっては電話にてご連絡いたします。なお、医師へ確認する必要がある場合は、回答までに1週間以上要する場合がございます。万が一ご連絡がない場合は、代表電話におかけ直しください。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_再診予約"

  - name: "END_予約変更"
    condition: "予約変更ルート全聴取完了"
    tts_announcement: "予約変更の申し込みを受付いたしました。確認ができ次第、ショートメール、場合によっては電話にてご連絡いたします。なお、医師へ確認する必要がある場合は、回答までに1週間以上要する場合がございます。万が一ご連絡がない場合は、代表電話におかけ直しください。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約変更"

  - name: "END_予約キャンセル"
    condition: "予約キャンセルルート全聴取完了"
    tts_announcement: "キャンセルの申し込みを受付いたしました。必要がある場合のみ、担当者よりご連絡させていただきます。お電話ありがとうございました。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_予約キャンセル"

  - name: "END_予約確認"
    condition: "予約確認ルート全聴取完了"
    tts_announcement: "予約確認の申し込みを受付いたしました。確認ができ次第、ショートメール、場合によっては電話にてご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約確認"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # smsFlag は各終話パターンに直接設定済みのため、ContextMatchRouter での分岐は不要。
  # 再診予約=1, 予約変更=1, 予約キャンセル=2, 予約確認=1, WEB確認=1 が用件確定後に決定的に決まる。

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  # RAG サブフローは現状なし。Gen1 main.yaml に StartDigressNode（雑談ノード）が存在しないため。
  # CS 要望に応じて将来追加可能（パターン 2: 全終話前 / パターン 1: 用件_問合せ後）。

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内 + 受付前提条件 + 折返連絡確定"
    announcement: "お電話ありがとうございます。岐阜大学医学部附属病院の、予約専用、AI電話です。受付には診察券番号が必要ですので、お手元に無い方は、ご準備のうえ、おかけ直しください。また、初診予約、並びに、今日受診希望の方は、代表電話へおかけ直しください。なお、当院からの折り返しのご連絡をもって確定とさせていただきます。"

  - module_name: "診療科_聴取"
    purpose: "診療科聴取（親）"
    announcement: "まず初めに、受診される診療科をお話ください。「診療科は眼科です」、のように「診療科は」をつけてお話ください。"

  - module_name: "診療科_呼吸器二択"
    purpose: "呼吸器内/外科 二択確認"
    announcement: "呼吸器内科と呼吸器外科の、どちらですか？"

  - module_name: "診療科_消化器二択"
    purpose: "消化器内/外科 二択確認"
    announcement: "消化器内科と消化器外科の、どちらですか？"

  - module_name: "診療科_脳神経二択"
    purpose: "脳神経内/外科 二択確認"
    announcement: "脳神経内科と脳神経外科の、どちらですか？"

  - module_name: "診療科_放射線三択"
    purpose: "放射線科/治療/診断・IVR 三択確認"
    announcement: "放射線科と、放射線診断・IVRと、放射線治療の3つのうち、どれをご希望ですか？"

  - module_name: "診療科_腎臓二択"
    purpose: "腎臓内科/腎移植外科 二択確認"
    announcement: "腎臓内科と、腎移植外科の、どちらですか？"

  - module_name: "WEB_or_AI_聴取"
    purpose: "WEB申込 vs AI電話 選択"
    announcement: "電話と同じ内容が専用のウェブページから入力できます。ウェブページの入力を希望されますか？1.はい、2.いいえ、でお話ください。「いいえ」の場合は、AI電話でご用件をお伺いします。"

  - module_name: "WEB案内_アナウンス"
    purpose: "WEB レーン案内 + 連絡先電話番号への導入"
    announcement: "ウェブページの入力を承ります。最後に、ご連絡先のお電話番号をお伺いします。"

  - module_name: "AI受付_アナウンス"
    purpose: "AI 電話レーン案内 + 診察券番号聴取への導入"
    announcement: "それでは、このままお電話で受付いたします。次に、診察券番号をお伺いします。"

  - module_name: "用件_聴取"
    purpose: "用件聴取（4 種、DTMF 並走）"
    announcement: "ご用件を、次の4つのうちのいずれかでお話ください。1.再診の予約を取る、2.予約を変更する、3.予約をキャンセルする、4.予約を確認する。それでは、お話ください。"

  - module_name: "再診理由_聴取"
    purpose: "再診予約理由聴取"
    announcement: "予約理由を、お話ください。"

  - module_name: "予約日_聴取_変更"
    purpose: "予約変更時の現在予約日聴取"
    announcement: "現在の予約日を「4月1日」のように日付でお話ください。わからない場合は「わからない」のようにお話ください。ダイヤルプッシュで月と日にちの4桁の数字の入力も可能です。"

  - module_name: "変更理由_聴取"
    purpose: "予約変更理由聴取"
    announcement: "変更理由をお話ください。体調不良が理由の場合は、具体的な症状をお話ください。"

  - module_name: "予約希望時期_聴取_変更"
    purpose: "予約変更時の希望時期聴取"
    announcement: "予約希望時期を「来週」、や、「3月下旬」、のようにお話ください。"

  - module_name: "残薬確認_聴取_変更"
    purpose: "予約変更時の残薬確認（3 値）"
    announcement: "変更希望日までのお薬は十分にありますか？1.はい、2.いいえ、でお話ください。処方されていない場合は、処方されていない、とお話ください。"

  - module_name: "予約日_聴取_キャンセル"
    purpose: "予約キャンセル時の現在予約日聴取"
    announcement: "現在の予約日を「4月1日」のように日付でお話ください。わからない場合は「わからない」のようにお話ください。ダイヤルプッシュで月と日にちの4桁の数字の入力も可能です。"

  - module_name: "キャンセル理由_聴取"
    purpose: "予約キャンセル理由聴取"
    announcement: "キャンセル理由をお話ください。体調不良が理由の場合は、具体的な症状をお話ください。"

  - module_name: "次回予約希望_聴取"
