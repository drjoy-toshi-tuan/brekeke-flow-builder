version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "岐阜大学医学部附属病院"
  scenario_name: "診療"
  group_name: "岐阜大学医学部附属病院"
  flow_name: "岐阜大学医学部附属病院$診療"
  target_facility: "岐阜大学医学部附属病院"
  office_id: "TODO_要確認"
  phone_number: "058-230-6000"
  business_hours: "祝日除く 月〜金 9:00〜15:00、年末年始(12/29〜1/4)休診"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "demo"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "岐阜大学医学部附属病院$診療"
      role: "main"
      description: "冒頭チェーン → 診療科聴取（5 親 + 32 単独 + 対象外/わからない）→ 子診療科聴取 → WEB or AI 分岐 → AI レーン: 個人情報 4 サブフロー → 用件聴取（4 値復唱）→ 用件別聴取 → 連絡先電話番号 → 終話 / WEB レーン: 連絡先電話番号 → END_WEB確認"
  subflows:
    - name: "岐阜大学医学部附属病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピー。フロー名プレフィックスのみ施設名に置換。"
    - name: "岐阜大学医学部附属病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。"
    - name: "岐阜大学医学部附属病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー。"
    - name: "岐阜大学医学部附属病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。AI レーンと WEB レーンの両方から呼び出される。"

# --- セクション3: フローの目的 ---
purpose: "岐阜大学医学部附属病院（再診患者）からの予約関連電話を受け、診療科 → WEB or AI 電話受付選択 → 個人情報（診察券番号・氏名・生年月日）→ 用件（再診予約 / 予約変更 / 予約キャンセル / 予約確認）→ 用件別追加聴取（予約日 / 予約希望時期 / 理由・確認内容 / 残薬有無 / 次回予約希望）→ 連絡先電話番号 を聴取して折り返し受付を自動化する。眼科・脳神経内科は予約センター（058-230-6125）へ転送、当日予約希望は代表電話（058-230-6000）案内、初診予約は AI 受付不可。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "岐阜大学医学部附属病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
            └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times)
                  ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                  └─ 受付可 → 冒頭_アナウンス
                        → 診療科_聴取(hearing, enum)
                            ├─ 呼吸器 → 診療科_呼吸器二択(echo_back) → ★WEB_OR_AI
                            ├─ 消化器 → 診療科_消化器二択(echo_back) → ★WEB_OR_AI
                            ├─ 脳神経 → 診療科_脳神経二択(echo_back)
                            │     ├─ 脳神経外科 → ★WEB_OR_AI
                            │     └─ other(=脳神経内科) → 担当者へ転送
                            ├─ 放射線 → 診療科_放射線三択(echo_back) → ★WEB_OR_AI
                            ├─ 腎臓 → 診療科_腎臓二択(echo_back) → ★WEB_OR_AI
                            ├─ 眼科 → 担当者へ転送(call_transfer Blind, 058-230-6125)
                            ├─ 脳神経内科 → 担当者へ転送
                            ├─ わからない → ★WEB_OR_AI(skip)
                            └─ other(各単独診療科, echo_back) → ★WEB_OR_AI

      ★WEB_OR_AI = WEB_or_AI_聴取(hearing, enum, Y/N)
            ├─ WEB → WEB案内_アナウンス → Jump to 電話番号聴取SF → 完了フラグ_WEB確認(status=1, smsFlag=1) → END_WEB確認 → 切断
            └─ other(=AI) → AI受付_アナウンス
                  → Jump to 診察券番号聴取SF
                    → Jump to 氏名聴取SF
                      → Jump to 生年月日聴取SF
                        → 用件_聴取(hearing, enum, echo_back: true)
                            ├─ 再診予約 → ★再診ルート
                            ├─ 予約変更 → ★変更ルート
                            ├─ 予約キャンセル → ★キャンセルルート
                            └─ 予約確認 → ★確認ルート

      ★再診ルート:
        再診理由_聴取(text)
          → Jump to 電話番号聴取SF
            → 完了フラグ_再診予約(status=1, smsFlag=1) → END_再診予約 → 切断

      ★変更ルート:
        予約日_聴取(datetime)
          → 変更理由_聴取(text)
            → 予約希望時期_聴取(text)
              → ContextMatchRouter on OpenAI_予約希望時期_聴取
                  ├─ 今日 → 完了フラグ_当日代表案内(status=2, smsFlag=-1) → END_当日代表案内 → 切断
                  └─ other → 残薬確認_聴取(enum 3値)
                        → Jump to 電話番号聴取SF
                          → 完了フラグ_予約変更(status=1, smsFlag=1) → END_予約変更 → 切断

      ★キャンセルルート:
        予約日_聴取(datetime)
          → キャンセル理由_聴取(text)
            → 次回予約希望_聴取(enum Y/N)
                ├─ はい → 予約希望時期_聴取(text) [変更ルートと同じ枝で「今日」検出]
                │     ├─ 今日 → END_当日代表案内
                │     └─ other → 残薬確認_聴取 → Jump to 電話番号聴取SF
                │                       → 完了フラグ_予約キャンセル(status=1, smsFlag=2) → END_予約キャンセル → 切断
                └─ other(=いいえ) → Jump to 電話番号聴取SF
                                    → 完了フラグ_予約キャンセル(status=1, smsFlag=2) → END_予約キャンセル → 切断

      ★確認ルート:
        予約確認内容_聴取(text)
          → Jump to 電話番号聴取SF
            → 完了フラグ_予約確認(status=1, smsFlag=1) → END_予約確認 → 切断
    notes: |
      - acceptance_times 使用（平日 9:00〜15:00、祝日・年末年始除く）。詳細スケジュールは Dr.JOY 側で設定。
      - 入電番号別の転送時アナウンス（058-230-6123/6124/6000）は再現せず（NON-BLOCKER N-3、稼働後不要となる時限的仕様の可能性）。
      - 診療科ハイラルキ二段（呼吸器/消化器/脳神経/放射線/腎臓 → 各子聴取）。echo_back: true は親ではなく子・単独診療科 hearing に乗る。
      - 眼科/脳神経内科 → 058-230-6125 へ Blind Transfer（予約センター）。
      - 用件聴取は DTMF 1=再診予約 / 2=予約変更 / 3=予約キャンセル / 4=予約確認、echo_back: true。
      - 予約希望時期は OpenAI が「今日/本日/当日/今から」発話を「今日」に正規化、ContextMatchRouter で代表電話案内に分岐（Pattern B）。
      - 個人情報 4 サブフロー（診察券番号/氏名/生年月日/電話番号）は CLAUDE.md Rule 9 準拠でサンプル BIVR から完全コピー。
      - 失敗時は寛容モード（retry_failure: skip）。診療科聴取・用件聴取のみ end_failure。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ====== 冒頭ブロック ======
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 診療科_聴取

  # ====== 診療科聴取（親）======
  - step: 診療科_聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: end_failure
    conditions:
      - match: "呼吸器"
        next: 診療科_呼吸器二択
      - match: "消化器"
        next: 診療科_消化器二択
      - match: "脳神経"
        next: 診療科_脳神経二択
      - match: "放射線"
        next: 診療科_放射線三択
      - match: "腎臓"
        next: 診療科_腎臓二択
      - match: "眼科"
        next: 担当者へ転送
      - match: "脳神経内科"
        next: 担当者へ転送
      - match: "わからない"
        next: WEB_or_AI_聴取
      - match: "other"
        next: WEB_or_AI_聴取

  # ====== 子診療科 hearing 群 ======
  - step: 診療科_呼吸器二択
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "呼吸器内科"
        next: WEB_or_AI_聴取
      - match: "other"
        next: WEB_or_AI_聴取

  - step: 診療科_消化器二択
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "消化器内科"
        next: WEB_or_AI_聴取
      - match: "other"
        next: WEB_or_AI_聴取

  - step: 診療科_脳神経二択
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "脳神経外科"
        next: WEB_or_AI_聴取
      - match: "other"
        next: 担当者へ転送

  - step: 診療科_放射線三択
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "放射線科"
        next: WEB_or_AI_聴取
      - match: "放射線治療"
        next: WEB_or_AI_聴取
      - match: "other"
        next: WEB_or_AI_聴取

  - step: 診療科_腎臓二択
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "腎臓内科"
        next: WEB_or_AI_聴取
      - match: "other"
        next: WEB_or_AI_聴取

  # ====== 担当者へ転送（眼科 / 脳神経内科）======
  - step: 担当者へ転送
    type: call_transfer
    transfer_type: "Blind Transfer"

  # ====== WEB or AI 電話 分岐 ======
  - step: WEB_or_AI_聴取
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "WEB"
        next: WEB案内_アナウンス
      - match: "other"
        next: AI受付_アナウンス

  # ====== WEB レーン ======
  - step: WEB案内_アナウンス
    type: announcement
    next: jump_電話番号聴取_WEB

  - step: jump_電話番号聴取_WEB
    type: subflow
    flowname: "岐阜大学医学部附属病院$電話番号聴取"
    next: END_WEB確認

  - step: END_WEB確認
    type: termination
    termination_ref: "END_WEB確認"

  # ====== AI レーン: 個人情報 4 サブフロー ======
  - step: AI受付_アナウンス
    type: announcement
    next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "岐阜大学医学部附属病院$診察券番号聴取"
    next: 氏名聴取

  - step: 氏名聴取
    type: subflow
    flowname: "岐阜大学医学部附属病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "岐阜大学医学部附属病院$生年月日聴取"
    next: 用件_聴取

  # ====== 用件聴取（4 値、復唱あり）======
  - step: 用件_聴取
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "再診予約"
        next: 再診理由_聴取
      - match: "予約変更"
        next: 予約日_聴取_変更
      - match: "予約キャンセル"
        next: 予約日_聴取_キャンセル
      - match: "other"
        next: 予約確認内容_聴取

  # ====== 再診ルート ======
  - step: 再診理由_聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_電話番号聴取_再診

  - step: jump_電話番号聴取_再診
    type: subflow
    flowname: "岐阜大学医学部附属病院$電話番号聴取"
    next: END_再診予約

  - step: END_再診予約
    type: termination
    termination_ref: "END_再診予約"

  # ====== 変更ルート ======
  - step: 予約日_聴取_変更
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 変更理由_聴取

  - step: 変更理由_聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 予約希望時期_聴取_変更

  - step: 予約希望時期_聴取_変更
    type: hearing
    output_format: text
    retry_failure: skip
    next: 当日判定_変更

  - step: 当日判定_変更
    type: context_match_router
    reference_module: "OpenAI_予約希望時期_聴取_変更"
    conditions:
      - match: "今日"
        next: END_当日代表案内
      - match: "other"
        next: 残薬確認_聴取_変更

  - step: 残薬確認_聴取_変更
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: jump_電話番号聴取_変更
      - match: "なし"
        next: jump_電話番号聴取_変更
      - match: "処方されていない"
        next: jump_電話番号聴取_変更
      - match: "other"
        next: jump_電話番号聴取_変更

  - step: jump_電話番号聴取_変更
    type: subflow
    flowname: "岐阜大学医学部附属病院$電話番号聴取"
    next: END_予約変更

  - step: END_予約変更
    type: termination
    termination_ref: "END_予約変更"

  # ====== キャンセルルート ======
  - step: 予約日_聴取_キャンセル
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: キャンセル理由_聴取

  - step: キャンセル理由_聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 次回予約希望_聴取

  - step: 次回予約希望_聴取
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "はい"
        next: 予約希望時期_聴取_キャンセル
      - match: "other"
        next: jump_電話番号聴取_キャンセル

  - step: 予約希望時期_聴取_キャンセル
    type: hearing
    output_format: text
    retry_failure: skip
    next: 当日判定_キャンセル

  - step: 当日判定_キャンセル
    type: context_match_router
    reference_module: "OpenAI_予約希望時期_聴取_キャンセル"
    conditions:
      - match: "今日"
        next: END_当日代表案内
      - match: "other"
        next: 残薬確認_聴取_キャンセル

  - step: 残薬確認_聴取_キャンセル
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: jump_電話番号聴取_キャンセル
      - match: "なし"
        next: jump_電話番号聴取_キャンセル
      - match: "処方されていない"
        next: jump_電話番号聴取_キャンセル
      - match: "other"
        next: jump_電話番号聴取_キャンセル

  - step: jump_電話番号聴取_キャンセル
    type: subflow
    flowname: "岐阜大学医学部附属病院$電話番号聴取"
    next: END_予約キャンセル

  - step: END_予約キャンセル
    type: termination
    termination_ref: "END_予約キャンセル"

  # ====== 確認ルート ======
  - step: 予約確認内容_聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_電話番号聴取_確認

  - step: jump_電話番号聴取_確認
    type: subflow
    flowname: "岐阜大学医学部附属病院$電話番号聴取"
    next: END_予約確認

  - step: END_予約確認
    type: termination
    termination_ref: "END_予約確認"

  # ====== 当日代表案内（共通終話）======
  - step: END_当日代表案内
    type: termination
    termination_ref: "END_当日代表案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "再診予約"
      - id: "2"
        order: "2"
        value: "予約変更"
      - id: "3"
        order: "3"
        value: "予約キャンセル"
      - id: "4"
        order: "4"
        value: "予約確認"
    item_default: true
    editable: true
    deletable: false
    notes: "用件選択結果（DTMF 1〜4 並走 + 音声、echo_back あり）"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取（復唱なし）"

  - context_name: "medicalCardNumber"
