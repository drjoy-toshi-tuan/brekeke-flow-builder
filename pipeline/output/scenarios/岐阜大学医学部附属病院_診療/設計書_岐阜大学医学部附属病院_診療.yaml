      - "脳神経内科"
    notes: "親「脳神経」発話後の二択。脳神経内科 → 予約センター転送。echo_back: true。"

  - order: 5
    name: "診療科_放射線三択"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
