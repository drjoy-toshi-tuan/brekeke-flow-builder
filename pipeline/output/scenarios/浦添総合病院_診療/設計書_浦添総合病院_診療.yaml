# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "phonetype（電話番号聴取サブフロー出力）"
  patterns:
    - condition: "classification ∈ {予約変更, 予約キャンセル, 再診予約, 初診予約}"
      sms_flag: "1"
      notes: "折り返し電話と SMS の両方を案内（クライアント要望）。完了フラグ→予約/予約変更/キャンセル TTS 経由"
    - condition: "classification = 予約確認 かつ phonetype = 携帯"
      sms_flag: "1"
      notes: "SMS のみ送信。050-1721-8524 から発信"
    - condition: "classification = 予約確認 かつ phonetype ∈ {固定, その他}"
      sms_flag: "-1"
      notes: "SMS 送信なし。098-851-5171 から折り返し"
    - condition: "代表案内系全終話（症状あり/本日予約/紹介状なし/救急外来/歯科口腔外科/心臓リハビリ外来/診療科不明/聴取失敗/時間外/非通知）"
      sms_flag: "-1"
      notes: "代表電話番号案内のみ。SMS 送信なし"

