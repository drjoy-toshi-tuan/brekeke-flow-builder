# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。浦添総合病院の、予約専用、AI電話です。"
    input_method: "voice_only"
    save_to: ""
    next_step: "用件確認"
    retry_failure: "skip"

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の４つのうちの、いずれかでお話いただくか、ダイヤルプッシュでご入力ください。1、予約変更。2、予約キャンセル。3、予約確認。4、予約を取る。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約変更"
        - "予約キャンセル"
        - "予約確認"
        - "予約"
      mapping:
        - input: "DTMF 1 / 「変更」「予約変更」「延期」「最初の」「日程をかえたい」「日付」「時間を変えたい」「取り直したい」「予約シンコウ」「平行」「並行」「別の」「変えたい」「変えて」「変える」を含む発話"
          output: "予約変更"
        - input: "DTMF 2 / 「キャンセル」「取り消し」「取消」「やめる」「ユーザースキャンする」「二番」「ちゃん製」を含む発話"
          output: "予約キャンセル"
        - input: "DTMF 3 / 「確認」「日時確認」「日時を確認する」「教えて」「金額」「三番」「時間を忘れた」「調べて」「日時」「紛失」「聞きたい」「忘れた」「その他確認」を含む発話"
          output: "予約確認"
        - input: "DTMF 4 / 「予約」「予約をとる」「予約を取る」「予約をする」「予約お願い」「予約がしたい」「予約でお願い」「予約をしたい」「録りたい」「録る」「初診」「初診予約」「再診」「再診予約」「診察」「診察の予約」「新規の」「新卒」「四番」「四百」「印刷」「印刷の予約」「中央」「入札」「有効する」「千円札」「休薬をする」を含む発話"
          output: "予約"
      no_result_condition: "上記いずれにも該当しない / 「予約以外」（処方箋・症状・書類等）/ 無音"
    save_to: "classification"
    next_step: "症状確認"
    retry_failure: "end_failure"

  - step_name: "症状確認"
    tts_announcement: "現在症状がおありで、当日、または翌診療日のご予約が必要でしょうか。はい、希望します。または、いいえ、結構です。のように、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "緊急"
        - "通常"
      mapping:
        - input: "「はい」「希望します」「必要です」「必要だ」「必要かも」「そうしたい」「そうそう」「そうです」「あってます」「配送です」を含む発話"
          output: "緊急"
        - input: "「いいえ」「結構です」「必要ありません」「必要ない」「ちがう」「そうじゃない」「まちがった」「いいです」を含む発話"
          output: "通常"
      no_result_condition: "上記いずれにも該当しない / 無音"
    save_to: "emergencyFlag"
    next_step: "用件分岐_症状後"
    retry_failure: "end_failure"

  - step_name: "当日予約確認"
    tts_announcement: "本日のご予約の方ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "当日希望"
        - "後日"
      mapping:
        - input: "「はい」「そうです」「あります」「希望します」「あってます」「配送です」「必要です」「必要だ」「必要かも」「そうしたい」「そうそう」を含む発話"
          output: "当日希望"
        - input: "「いいえ」「ちがう」「結構です」「必要ありません」「必要ない」「まちがった」を含む発話"
          output: "後日"
      no_result_condition: "上記いずれにも該当しない / 無音"
    save_to: "sameDayReservation"
    next_step: "診療科"
    retry_failure: "end_failure"

  - step_name: "通院中確認"
    tts_announcement: "通院中の患者さんですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "再診予約"
        - "初診予約"
      mapping:
        - input: "「はい」「そうです」「通院中」「以前から」「定期」「再診」「あります」「ある」「あってます」「大丈夫」を含む発話 / 肯定エンティティ"
          output: "再診予約"
        - input: "「いいえ」「初めて」「はじめて」「ちがう」「そうじゃない」「ない」「結構です」を含む発話 / 否定エンティティ"
          output: "初診予約"
      no_result_condition: "上記いずれにも該当しない / 無音"
    save_to: "classification"
    next_step: "紹介状確認"
    retry_failure: "end_failure"

  - step_name: "紹介状確認"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "「はい」「あります」「ある」「持っています」「持ってます」「もってます」「そうです」「あってます」「大丈夫」を含む発話"
          output: "あり"
        - input: "「いいえ」「ありません」「ない」「持っていません」「持ってません」「もってない」「いません」「いない」「以てない」「盛ってない」「ちがう」を含む発話"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない / 無音"
    save_to: "referralLetter"
    next_step: "医療機関名"
    retry_failure: "end_failure"

  - step_name: "医療機関名"
    tts_announcement: "かしこまりました。紹介状を発行した医療機関名、もしくは健診を受診された施設名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "{医療機関名を含む発話（例: 〇〇クリニック、〇〇医院、〇〇病院、〇〇診療所、〇〇健診センター）}"
          output: "{抽出した医療機関名テキスト}"
      no_result_condition: "発話が完全な無言、または医療機関名と判定できない場合"
    save_to: "referringMedicalInstitution"
    next_step: "診療科"
    retry_failure: "end_failure"

  - step_name: "診療科"
    tts_announcement: "ご希望の診療科をおっしゃってください。わからない場合には分からないとお話ください。"
