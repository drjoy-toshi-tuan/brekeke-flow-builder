# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
      - "予約"
    notes: "DTMF 1=予約変更, 2=予約キャンセル, 3=予約確認, 4=予約（=新規/再診統合）。Gen1 の派生用件（予約以外/予約とる/取り消す/印刷の予約 等）は OpenAI で 4 分類に集約。出力『予約』は通院中確認 hearing で再診予約/初診予約 に上書きされる。"

  - order: 2
    name: "症状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "emergencyFlag"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "緊急"
      - "通常"
    notes: "「現在症状がおありで、当日または翌診療日のご予約が必要でしょうか」Yes/No タイプ。「緊急」「希望します」「必要です」を含む発話は 緊急 へ。"

  - order: 3
    name: "当日予約確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "sameDayReservation"
    openai_processing: "classify"
    output_format: "enum"
