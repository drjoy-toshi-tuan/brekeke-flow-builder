# --- セクション2: フロー構成 ---
# 個人情報聴取（氏名・生年月日・電話番号）はサブフロー分割型で構成。診察券番号は Gen1 commubo になし。
flow_structure:
  type: "subflow"
  flows:
    - name: "浦添総合病院$診療"
      role: "main"
      description: "冒頭チェーン → 用件確認(4分類+DTMF) → 症状確認(緊急ゲート) → 用件別前処理(当日予約確認/通院中確認/紹介状確認) → 診療科聴取 → 診療科分岐(AI非対応/分岐あり再聴取) → 用件後処理(予約日/理由/希望日) → 個人情報サブフロー → 終話分岐(用件×電話種別)"
  subflows:
    - name: "浦添総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。reference 個人情報サブフロー.bivr の氏名聴取をコピーして使用"
    - name: "浦添総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。reference 個人情報サブフロー.bivr の生年月日聴取（DOB Re-confirmation 復唱あり版）をコピーして使用"
    - name: "浦添総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。reference 個人情報サブフロー.bivr の電話番号聴取（incoming-classifier + Phone Normalization + 復唱）をコピーして使用。Gen1 の入電番号取得確認・市外局番5/4/3/2桁判定は標準サブフローで吸収"

# --- セクション3: フローの目的 ---
purpose: "浦添総合病院（本院）向けの AI 電話。患者からの予約変更・予約キャンセル・予約確認・新規/再診予約の問い合わせを受付け、用件・症状・診療科・予約日・理由・希望日・氏名・生年月日・連絡先電話番号を聴取して折り返し受付（電話 or SMS）を自動化する。当日/翌診療日の症状急変・本日予約変更・救急外来・歯科口腔外科の変更キャンセル・心臓リハビリ外来・紹介状なし初診はそれぞれ専用の代表電話案内へ離脱する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "浦添総合病院$診療"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(完了フラグ_非通知 status=2) → 切断
            └─ 通常   → acceptance_times
                          ├─ 時間外 → END_時間外(完了フラグ_時間外 status=6) → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → 用件確認(hearing, DTMF+音声, save_to=classification)
                                            ├─ 予約変更 ─┐
                                            ├─ 予約キャンセル ┤
                                            ├─ 予約確認 ┤
                                            └─ other(=予約)┘
                                                → 症状確認(hearing, Yes/No, save_to=emergencyFlag)
                                                    ├─ 緊急 → END_症状あり案内(代表電話 0120-979-706 ×3)
                                                    └─ other → 用件分岐_症状後(CMR classification)
                                                          ├─ 予約変更/キャンセル/確認 → 当日予約確認
                                                          │       ├─ 当日希望 → END_本日予約案内(代表電話 0120-979-706 ×3)
                                                          │       └─ other(=後日) → 診療科
                                                          └─ other(=予約) → 通院中確認(save_to=classification 上書き)
                                                                ├─ 再診予約 → 診療科
                                                                └─ other(=初診予約) → 紹介状確認
                                                                       ├─ あり → 医療機関名 → 診療科
                                                                       └─ other(=なし) → END_紹介状なし(代表電話 0120-979-706 ×3)

      診療科(hearing, save_to=clinicalDepartment, no_result_default=登録なし)
        → 診療科分岐(CMR clinicalDepartment)
            ├─ 救急外来 → END_救急外来案内(代表電話 098-878-0231 ×3)
            ├─ 心臓リハビリ外来 → END_心臓リハビリ外来案内(代表電話 098-878-0231 ×3)
            ├─ 歯科口腔外科 → 歯科口腔外科分岐(CMR classification)
            │     ├─ 予約変更 → END_歯科口腔外科案内
            │     ├─ 予約キャンセル → END_歯科口腔外科案内
            │     └─ other → 用件分岐_診療科後
            ├─ 内科 → 内科再聴取(hearing 内科系再列挙) → 用件分岐_診療科後
            ├─ 呼吸器 → 呼吸器分岐(hearing 内科/外科) → 用件分岐_診療科後
            ├─ 心臓 → 心臓分岐(hearing 3-way) → CMR(心臓リハビリ外来 → END / other → 用件分岐_診療科後)
            ├─ 術前 → 術前分岐(hearing 共同診/整形外科) → 用件分岐_診療科後
            ├─ 肝臓 → 肝臓分岐(hearing 消化器内科/外科) → 用件分岐_診療科後
            ├─ 膵臓 → 膵臓分岐(hearing 消化器内科/外科) → 用件分岐_診療科後
            ├─ 登録なし → END_診療科不明案内(代表電話 0120-979-706 ×3)
            └─ other → 用件分岐_診療科後(CMR classification)
                  ├─ 予約変更 → 予約日 → 理由 → 用件分岐_理由後
                  │                                       ├─ 予約変更 → 希望日 → 氏名聴取
                  │                                       └─ other → 氏名聴取
                  ├─ 予約キャンセル → 予約日 → 理由 → 氏名聴取
                  └─ other(=予約確認/再診予約/初診予約) → 氏名聴取

      氏名聴取(jump → 浦添総合病院$氏名聴取)
        → 生年月日聴取(jump → 浦添総合病院$生年月日聴取)
            → 電話番号聴取(jump → 浦添総合病院$電話番号聴取, 入電番号取得済みならスキップ含む)
                → 終話分岐_用件(CMR classification)
                    ├─ 予約確認 → 終話分岐_電話種別(CMR 電話番号聴取)
                    │       ├─ 携帯 → END_受付完了_確認_携帯(SMS送信あり, status=1, smsFlag=1)
                    │       └─ other(=固定/その他) → END_受付完了_確認_非携帯(折り返し, status=1, smsFlag=-1)
                    └─ other(=予約変更/キャンセル/再診予約/初診予約) → END_受付完了_予約変更キャンセル_新規(折り返し+SMS両案内, status=1, smsFlag=1)

      ─── 終話パターン一覧 ───
      END_非通知(status=2, smsFlag=-1) → 切断
      END_時間外(status=6, smsFlag=-1) → 切断
      END_聴取失敗(status=3, smsFlag=-1) → 切断（合流: 各 hearing の retry 上限到達 → 代表電話案内 0120-979-706 ×3）
      END_症状あり案内(status=2, smsFlag=-1) → 切断（症状=緊急。0120-979-706 ×3）
      END_本日予約案内(status=2, smsFlag=-1) → 切断（当日予約=希望。0120-979-706 ×3）
      END_紹介状なし(status=2, smsFlag=-1) → 切断（初診予約+紹介状なし。選定療養費案内＋0120-979-706 ×3）
      END_救急外来案内(status=2, smsFlag=-1) → 切断（救急外来。098-878-0231 ×3）
      END_歯科口腔外科案内(status=2, smsFlag=-1) → 切断（歯科口腔外科×変更/キャンセル。098-878-0231 ×3）
      END_心臓リハビリ外来案内(status=2, smsFlag=-1) → 切断（心臓リハビリ外来。098-878-0231 ×3）
      END_診療科不明案内(status=2, smsFlag=-1) → 切断（診療科=登録なし=「わからない」。0120-979-706 ×3）
      END_受付完了_予約変更キャンセル_新規(status=1, smsFlag=1) → 切断（予約変更/キャンセル/再診予約/初診予約共通）
      END_受付完了_確認_携帯(status=1, smsFlag=1) → 切断（予約確認×携帯）
      END_受付完了_確認_非携帯(status=1, smsFlag=-1) → 切断（予約確認×固定/その他）
    notes: |
      Gen1 commubo の 用件4分類 + 通院中確認(初診/再診サブ分類) を維持し、最終的な classification は
      予約変更/予約キャンセル/予約確認/再診予約/初診予約 の 5 値となる（通院中確認 hearing が classification を上書き保存）。
      症状確認は 全用件共通の前段ゲート として配置（Gen1 では用件聴取 yaml 内部に閉じていたが、Gen3 では用件確認直後に独立 hearing として展開）。
      当日予約確認:5/16 は 予約変更/キャンセル/確認 のみ通過（予約=新規/再診はスキップ）。
      診療科分岐は Gen1 のサブシナリオ戻り値による分岐ロジックを Gen3 では ContextMatchRouter + 個別 disambiguation hearing で表現。
      AI非対応: 救急外来 / 歯科口腔外科×変更キャンセル / 心臓リハビリ外来 はそれぞれ専用 END へ即離脱。
      saveCompletionFlag2db の addCurrentDate=Yes は scaffold 自動付与。受付完了時に受付日時が自動で読み上げられる。
      終話TTSは Gen1 main.yaml の文言を一言一句そのまま転記（折り返し電話番号 098-851-5171, SMS発信元 050-1721-8524, 予約センター 0120-979-706, 病院代表 098-878-0231）。
      電話番号案内は Gen1 案内回数カウント（3回読み上げ）に合わせて TTS 内に「繰り返します。」付きで 3 回分を埋め込み。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # --- 用件確認（4分類: DTMF+音声）---
  - step: 用件確認
    type: hearing
    output_format: enum
    save_to: classification
    conditions:
      - match: "予約変更"
        next: 症状確認
      - match: "予約キャンセル"
        next: 症状確認
      - match: "予約確認"
        next: 症状確認
      - match: "other"
        next: 症状確認
    retry_failure: end_failure
    notes: "DTMF 1=予約変更, 2=予約キャンセル, 3=予約確認, 4=予約（=新規/再診統合）。other は予約相当（=新規 or 再診、後段の通院中確認で分岐）。Gen1 の派生用件（予約以外/予約とる/取り消す/印刷の予約 等）は OpenAI で 4 分類に集約させる。"

  # --- 症状確認（全用件共通の前段ゲート）---
  - step: 症状確認
    type: hearing
    output_format: enum
    save_to: emergencyFlag
    conditions:
      - match: "緊急"
        next: END_症状あり案内
      - match: "other"
        next: 用件分岐_症状後
    retry_failure: end_failure
    notes: "Yes/No 質問。「現在症状がおありで、当日または翌診療日のご予約が必要でしょうか」。緊急（=症状あり、当日翌診療日希望）は AI 非対応として代表電話案内へ即誘導。other は通常相当。"

  # --- 用件分岐_症状後（4-way: 当日予約確認 or 通院中確認）---
  - step: 用件分岐_症状後
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: 当日予約確認
      - match: "予約キャンセル"
        next: 当日予約確認
      - match: "予約確認"
        next: 当日予約確認
      - match: "other"
        next: 通院中確認
    notes: "用件確認 hearing の OpenAI 出力（classification）で分岐。other（=予約=新規/再診）は通院中確認へ。Gen1 では症状確認後 main 側で「用件を判断」していた箱。"

  # --- 当日予約確認（予約変更/キャンセル/確認のみ通過）---
  - step: 当日予約確認
    type: hearing
    output_format: enum
    save_to: sameDayReservation
    conditions:
      - match: "当日希望"
        next: END_本日予約案内
      - match: "other"
        next: 診療科
    retry_failure: end_failure
    notes: "Yes/No 質問。「本日のご予約の方ですか？」当日希望は AI 非対応として代表電話案内へ即誘導。other は後日希望相当（通常受付フローへ進む）。"

  # --- 通院中確認（予約=新規/再診ルートのみ通過、classification を上書き）---
  - step: 通院中確認
    type: hearing
    output_format: enum
    save_to: classification
    conditions:
      - match: "再診予約"
        next: 診療科
      - match: "other"
        next: 紹介状確認
    retry_failure: end_failure
    notes: "Yes/No 質問。「通院中の患者さんですか？」Yes=再診予約（classification を上書き）/ No=初診予約（classification を上書き）。other は初診予約相当。"

  # --- 紹介状確認（初診予約のみ通過）---
  - step: 紹介状確認
    type: hearing
    output_format: enum
    save_to: referralLetter
    conditions:
      - match: "あり"
        next: 医療機関名
      - match: "other"
        next: END_紹介状なし
    retry_failure: end_failure
    notes: "Yes/No 質問。「他の医療機関からの紹介状はお持ちですか？」あり→医療機関名聴取へ。other（=なし）→紹介状なし案内（選定療養費案内＋代表電話 0120-979-706）へ即誘導。"

  - step: 医療機関名
    type: hearing
    output_format: text
    save_to: referringMedicalInstitution
    next: 診療科
    retry_failure: end_failure
    notes: "「紹介状を発行した医療機関名、もしくは健診を受診された施設名をお話ください。」自由発話で医療機関名を抽出して save。"

  # --- 診療科聴取（全ルート合流）---
  - step: 診療科
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "登録なし"
        next: END_診療科不明案内
      - match: "救急外来"
        next: END_救急外来案内
      - match: "心臓リハビリ外来"
        next: END_心臓リハビリ外来案内
      - match: "歯科口腔外科"
        next: 歯科口腔外科分岐
      - match: "内科"
        next: 内科再聴取
      - match: "呼吸器"
        next: 呼吸器分岐
      - match: "心臓"
        next: 心臓分岐
      - match: "術前"
        next: 術前分岐
      - match: "肝臓"
        next: 肝臓分岐
      - match: "膵臓"
        next: 膵臓分岐
      - match: "other"
        next: 用件分岐_診療科後
    retry_failure: end_failure
    notes: |
      OpenAI は以下のいずれかを返す:
        (1) 確定診療科名: 整形外科 / 眼科 / 共同診 / 形成外科 / 呼吸器外科 / 呼吸器内科 / 歯科口腔外科 / 循環器内科 / 消化器内科 / 心臓リハビリ外来 / 心臓血管外科 / 神経内科 / 腎臓内科 / 腎泌尿器科 / 地域医療支援科 / 乳腺外科 / 脳神経外科 / 皮膚科 / 病院総合内科 / 糖尿病内分泌科 / 耳鼻咽喉科 / 外科 / 救急外来
        (2) 内科（単独発話。具体科目を再聴取するためのフォールバック）
        (3) 曖昧分岐トリガー: 呼吸器 / 心臓 / 術前 / 肝臓 / 膵臓（次段の disambiguation hearing で内科/外科を確定）
        (4) 復唱用サブカテゴリは親診療科にマッピング: CSI/フットケア/糖尿病→糖尿病内分泌科, IBD/消化器/肝胆膵→消化器内科, SDM→腎臓内科, スポーツ/外傷/骨腫瘍/骨折予防→整形外科, ペースメーカー/不整脈/循環器生活習慣病/下肢静脈瘤→循環器内科, めまい/耳鼻科→耳鼻咽喉科, 甲状腺→外科, 血管内治療/脊髄→脳神経外科, 末梢血管外科→心臓血管外科, 就労→共同診
        (5) 「わからない」「知らない」「忘れた」等→登録なし（NO_RESULT 相当）
      no_result_default=登録なし により、聴取できなかった場合も「登録なし」が context に保存され、END_診療科不明案内 へ確定遷移する（Dr.JOY 側で削除レコード化されない）。

  # --- 歯科口腔外科分岐（用件=変更/キャンセルのみ AI非対応）---
  - step: 歯科口腔外科分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: END_歯科口腔外科案内
      - match: "予約キャンセル"
        next: END_歯科口腔外科案内
      - match: "other"
        next: 用件分岐_診療科後
    notes: "歯科口腔外科は 予約確認/再診予約/初診予約 では受付可能。予約変更・予約キャンセルのみ AI 受付対象外として代表電話案内（098-878-0231 ×3）へ離脱。"

  # --- 内科単独発話の再聴取 ---
  - step: 内科再聴取
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "登録なし"
        next: END_診療科不明案内
      - match: "救急外来"
        next: END_救急外来案内
      - match: "心臓リハビリ外来"
        next: END_心臓リハビリ外来案内
      - match: "歯科口腔外科"
        next: 歯科口腔外科分岐
      - match: "other"
        next: 用件分岐_診療科後
    retry_failure: end_failure
    notes: "「どちらの内科でしょうか。『呼吸器内科』、のようにお話ください。わからない場合には、わからない、とお答えください。」OpenAI で具体的な内科系診療科（呼吸器内科 / 消化器内科 / 循環器内科 / 神経内科 / 腎臓内科 / 糖尿病内分泌科 / 病院総合内科 等）を抽出。再聴取で「わからない」が来た場合は END_診療科不明案内 へ。clinicalDepartment を上書き保存。"

  # --- 呼吸器分岐（呼吸器内科/呼吸器外科）---
  - step: 呼吸器分岐
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    conditions:
      - match: "呼吸器内科"
        next: 用件分岐_診療科後
      - match: "other"
        next: 用件分岐_診療科後
    retry_failure: end_failure
    notes: "「呼吸器内科と呼吸器外科の、どちらですか？」other は 呼吸器外科 相当（clinicalDepartment は OpenAI 出力で上書き）。両分岐とも 用件分岐_診療科後 に合流。"

  # --- 心臓分岐（循環器内科/心臓血管外科/心臓リハビリ外来）---
  - step: 心臓分岐
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    conditions:
      - match: "循環器内科"
        next: 用件分岐_診療科後
      - match: "心臓リハビリ外来"
        next: END_心臓リハビリ外来案内
      - match: "other"
        next: 用件分岐_診療科後
    retry_failure: end_failure
    notes: "「次の3つより、ご希望の診療科をお話ください。心臓血管外科、循環器内科、心臓リハビリ外来。」other は 心臓血管外科 相当。心臓リハビリ外来選択時は AI 非対応として代表電話案内へ離脱。"

  # --- 術前分岐（共同診/整形外科）---
  - step: 術前分岐
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    conditions:
      - match: "共同診"
        next: 用件分岐_診療科後
      - match: "other"
        next: 用件分岐_診療科後
    retry_failure: end_failure
    notes: "「整形外科と、共同診、どちらでしょうか？」other は 整形外科 相当。両分岐とも 用件分岐_診療科後 に合流。"

  # --- 肝臓分岐（消化器内科/外科）---
  - step: 肝臓分岐
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    conditions:
      - match: "消化器内科"
        next: 用件分岐_診療科後
      - match: "other"
        next: 用件分岐_診療科後
    retry_failure: end_failure
    notes: "「消化器内科と外科、どちらでしょうか？」other は 外科 相当。両分岐とも 用件分岐_診療科後 に合流。"

  # --- 膵臓分岐（消化器内科/外科）---
  - step: 膵臓分岐
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    conditions:
      - match: "消化器内科"
        next: 用件分岐_診療科後
      - match: "other"
        next: 用件分岐_診療科後
    retry_failure: end_failure
    notes: "「消化器内科と外科、どちらでしょうか？」other は 外科 相当。両分岐とも 用件分岐_診療科後 に合流。"

  # --- 用件分岐_診療科後（予約変更/キャンセル → 予約日 / else → 氏名聴取）---
  - step: 用件分岐_診療科後
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: 予約日
      - match: "予約キャンセル"
        next: 予約日
      - match: "other"
        next: 氏名聴取
    notes: "用件＝予約変更/キャンセル のみ予約日・理由・希望日を聴取（変更は希望日まで、キャンセルは理由まで）。other（=予約確認/再診予約/初診予約）は予約日聴取をスキップして個人情報サブフローへ直行。"

  # --- 予約日聴取（予約変更/キャンセル のみ通過）---
  - step: 予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 理由
    retry_failure: end_failure
    notes: "「現在の予約日を「4月1日」のように日付でお話ください。分からない場合には分からないとお答えください。」OpenAI で datetime 正規化（和暦/西暦/MM/DD/曜日表現の吸収は output_format=datetime で自動）。"

  - step: 理由
    type: hearing
    output_format: text
    save_to: reason
    next: 用件分岐_理由後
    retry_failure: end_failure
    notes: "「ご予約変更の理由を簡単にお話ください。」/「ご予約キャンセルの理由を簡単にお話ください。」用件で文言が変わるが Gen3 では共通の自由発話聴取として 1 hearing にまとめ、prompter の context-aware 文言で対応する。"

  # --- 用件分岐_理由後（予約変更 → 希望日 / 予約キャンセル → 氏名聴取）---
  - step: 用件分岐_理由後
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: 希望日
      - match: "other"
        next: 氏名聴取
    notes: "用件＝予約変更 のみ希望日を聴取。other（=予約キャンセル）は氏名聴取へ直行。"

  - step: 希望日
    type: hearing
    output_format: text
    save_to: desiredReservationDate
    next: 氏名聴取
    retry_failure: end_failure
    notes: "「ご希望の予約日をお話ください」自由発話で希望日を聴取。OpenAI で日付・期日表現を正規化（複数候補・優先順位含む可能性があるため text で保存）。"

  # --- 個人情報サブフロー ---
  - step: 氏名聴取
    type: subflow
    flowname: "浦添総合病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "浦添総合病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "浦添総合病院$電話番号聴取"
    next: 終話分岐_用件

  # --- 終話分岐_用件 ---
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約確認"
        next: 終話分岐_電話種別
      - match: "other"
        next: END_受付完了_予約変更キャンセル_新規
    notes: "用件＝予約確認 のみ電話種別で更に分岐（携帯=SMS / 固定=折り返し）。other（=予約変更/キャンセル/再診予約/初診予約）は折り返し+SMS 両案内の共通 END へ。"

  # --- 終話分岐_電話種別（予約確認のみ通過）---
  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: END_受付完了_確認_携帯
      - match: "other"
        next: END_受付完了_確認_非携帯
    notes: "電話番号聴取サブフローが返す phonetype を参照。携帯=SMS で 050-1721-8524 から送信、固定/その他=098-851-5171 から折り返し。"

  # --- 終話ブロック ---
  - step: END_受付完了_予約変更キャンセル_新規
    type: termination
    termination_ref: "END_受付完了_予約変更キャンセル_新規"

  - step: END_受付完了_確認_携帯
    type: termination
    termination_ref: "END_受付完了_確認_携帯"

  - step: END_受付完了_確認_非携帯
    type: termination
    termination_ref: "END_受付完了_確認_非携帯"

  - step: END_症状あり案内
    type: termination
    termination_ref: "END_症状あり案内"

  - step: END_本日予約案内
    type: termination
    termination_ref: "END_本日予約案内"

  - step: END_紹介状なし
    type: termination
    termination_ref: "END_紹介状なし"

  - step: END_救急外来案内
    type: termination
    termination_ref: "END_救急外来案内"

  - step: END_歯科口腔外科案内
    type: termination
    termination_ref: "END_歯科口腔外科案内"

  - step: END_心臓リハビリ外来案内
    type: termination
    termination_ref: "END_心臓リハビリ外来案内"

  - step: END_診療科不明案内
    type: termination
    termination_ref: "END_診療科不明案内"

