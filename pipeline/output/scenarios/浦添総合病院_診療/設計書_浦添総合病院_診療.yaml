version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "浦添総合病院"
  scenario_name: "診療"
  group_name: "浦添総合病院"
  flow_name: "浦添総合病院$診療"
  target_facility: "浦添総合病院（本院）"
  office_id: "TODO_要確認"
  phone_number: "098-878-0231"
  business_hours: "祝日除く月〜金 8:30〜17:30 / 土 8:30〜12:30（日祝・年末年始休み。年末年始は 1/5 (月) 8:30〜）"
