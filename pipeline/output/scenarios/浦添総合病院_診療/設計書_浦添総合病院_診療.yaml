        - "心臓リハビリ外来"
        - "心臓血管外科"
        - "神経内科"
        - "腎臓内科"
        - "腎泌尿器科"
        - "地域医療支援科"
        - "乳腺外科"
        - "脳神経外科"
        - "皮膚科"
        - "病院総合内科"
        - "糖尿病内分泌科"
        - "耳鼻咽喉科"
        - "外科"
        - "救急外来"
        - "内科"
        - "呼吸器"
        - "心臓"
