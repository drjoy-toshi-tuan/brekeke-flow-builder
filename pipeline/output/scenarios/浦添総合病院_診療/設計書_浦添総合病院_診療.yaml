# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 commubo シナリオからの第3世代マイグレーション。元 main.yaml + 用件聴取.yaml + 診療科.yaml + 患者氏名聴取.yaml + 生年月日聞き取り.yaml + 連絡先聴取.yaml + 紹介状+医療機関名.yaml + 当日予約確認：5_16.yaml + 内科発話後フリー聴取.yaml + 予約日聞き取り.yaml + 希望日聴取.yaml + 理由聴取.yaml の構造を維持。"
  - "用件は最終的に classification 5 値: 予約変更/予約キャンセル/予約確認/再診予約/初診予約。用件確認 hearing が 4 値（予約変更/キャンセル/確認/予約）で保存し、通院中確認 hearing が「予約」を 再診予約/初診予約 に上書き。"
  - "症状確認は全用件共通の前段ゲート（Gen1 では用件聴取 yaml 内部だったが Gen3 では独立 hearing として展開、director判断）。緊急発話なら AI 受付対象外として代表電話案内へ即離脱。"
  - "当日予約確認:5/16 は 予約変更/キャンセル/確認 のみ通過し、診療科聴取の前段に配置。再診予約/初診予約はスキップ（Gen1 main.yaml の用件を判断ロジック踏襲）。"
  - "紹介状確認は初診予約のみ通過し、紹介状なしは選定療養費案内＋予約センター案内で離脱。紹介状ありは医療機関名を聴取して診療科聴取へ進む。"
  - "診療科は全ルート合流。OpenAI が確定診療科名 / 内科単独 / 曖昧分岐トリガー（呼吸器/心臓/術前/肝臓/膵臓）/ 登録なし のいずれかを返す。曖昧分岐は個別 disambiguation hearing で内科/外科/リハビリを確定。「内科」単独発話は 内科再聴取 hearing で具体内科系を再聴取。"
  - "AI 非対応診療科: 救急外来（病院代表 098-878-0231 ×3）/ 歯科口腔外科×変更キャンセル（病院代表 ×3）/ 心臓リハビリ外来（病院代表 ×3）。それ以外の代表案内系（症状あり/本日予約/紹介状なし/診療科不明/聴取失敗）は予約センター 0120-979-706 ×3。"
  - "復唱用サブカテゴリ（CSI/IBD/SDM/フットケア/めまい/脊髄/血管内治療/末梢血管外科/甲状腺/不整脈/ペースメーカー 等）は OpenAI 内で親診療科にマッピング。STT 辞書（profile_words）にも該当語を登録。"
  - "電話番号案内は Gen1 案内回数カウント（3回読み上げ）に合わせて TTS 内に「繰り返します。」付きで 3 回分を埋め込み。文言を縮めない（Gen1 移管方針）。"
  - "電話番号聴取サブフローは Gen1 の入電番号取得確認・市外局番5/4/3/2桁判定を吸収。入電番号取得済み（API_DRJOY 由来 = telephoneNumber コンテキストに値あり）の場合は復唱確認のみで聴取スキップする標準サブフローを使用。"
  - "完了アナウンスは用件×電話種別で 3 種使い分け: (1) 予約変更/キャンセル/再診/初診共通 → 折り返し+SMS両案内 smsFlag=1 / (2) 予約確認×携帯 → SMSのみ smsFlag=1 / (3) 予約確認×固定/その他 → 折り返しのみ smsFlag=-1。"
  - "終話TTSは Gen1 main.yaml の文言を一言一句そのまま転記（折り返し電話番号 098-851-5171, SMS発信元 050-1721-8524, 予約センター 0120-979-706, 病院代表 098-878-0231）。"
  - "saveCompletionFlag2db の addCurrentDate=Yes は scaffold が自動付与する。受付完了時に受付日時が自動で読み上げられる（Gen1 の `<? $発話用DATE_NOW ?>` 相当）。"
  - "営業時間: 祝日除く月〜金 8:30〜17:30 / 土 8:30〜12:30（日祝・年末年始 1/4 まで休み、1/5 (月) 8:30〜再開）。具体的なスケジュールは Dr.JOY 側で設定する。"
  - "Gen1 にあった main.yaml 内の `現在の時間取得 / 時間判別 / 時間外コメント / 年末年始アナウンス` 箱は dead code 扱い（acceptance_times に集約） → Gen3 では使用しない。"
  - "Gen1 にあった `テストのためルート変更 / TESTルート / 再テスト` 等のテスト箱は移管対象外。"
  - "Gen1 用件聴取 yaml の `用件の復唱（再診）` `用件の復唱（キャンセル）_1` は END_戻る で main に戻ってからの分岐再判定だったが、Gen3 では用件確認 hearing と通院中確認 hearing の組合せで等価表現。"
  - "Gen1 entity の和暦判定（大正/昭和/平成/令和を全枚挙）は Gen3 の generate_by_OpenAI output_format=datetime で吸収（director判断）。"
  - "病診連携フロー（2026-04-30 移管済 = output/scenarios/浦添総合病院_病診連携/）と同じ group_name『浦添総合病院』で展開。診察券番号の聴取は Gen1 commubo にないため移管しない（病診連携と同様）。"
  - "Gen1 にあった main.yaml の API_DRJOY サブシナリオ（外部API連携）は Gen3 では Brekeke + 電話番号聴取サブフロー内 incoming-classifier に集約。連絡先聴取冒頭の入電番号取得確認は標準サブフローの復唱確認パスで等価。"

