# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（祝日除く月〜金 8:30〜17:30 / 土 8:30〜12:30 以外、日祝・年末年始 1/4 まで含む）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、日曜祝日と年末年始を除く、月曜日から金曜日の8時30分から17時30分、土曜日は8時30分から12時30分となっております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件確認 / 症状確認 / 当日予約確認 / 通院中確認 / 紹介状確認 / 医療機関名 / 診療科 / 内科再聴取 / 各 disambiguation 分岐 / 予約日 / 理由 / 希望日 の各 hearing で end_failure）"
    tts_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、浦添総合病院 予約センターまでおかけなおしください。受付時間は、日曜祝日、年末年始を除く、月曜日から金曜日の8時30分から17時30分、土曜日の8時30分から12時30分です。お電話番号が分かる場合は、お電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。予約センターの番号は、0、1、2、0、の、9、7、9、の、7、0、6、です。繰り返します。予約センターの番号は、0、1、2、0、の、9、7、9、の、7、0、6、です。繰り返します。予約センターの番号は、0、1、2、0、の、9、7、9、の、7、0、6、です。お電話ありがとうございました。それでは失礼いたします。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

