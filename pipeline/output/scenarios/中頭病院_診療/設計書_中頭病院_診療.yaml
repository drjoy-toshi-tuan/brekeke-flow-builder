  - item: "「紹介予約のみ受付」の時間外特例（土曜午後等）は director 判断で代表 0570-09-1301 案内（END_時間外）に統一する方針。Gen1 では別ルート（紹介状有無聴取）に流していたが、Gen3 では時間外として一律 SMS不可・代表案内化。要顧客確認"
