  - item: "電話番号NG・診療科NGの「098-939-1300 を3回読み上げ」TTSは END_聴取失敗 で上書きしたが、Gen3 ではどの hearing のリトライ失敗から到達するか整理が必要。現設計では retry_failure: end_failure を設定した hearing（用件確認/紹介状確認/予約種別確認/医療機関名/新規予約用診療科/第1希望日/第2希望日/用件確認/診療科聞き取り/予約日/変更希望日）すべてが共通の END_聴取失敗 に流れる"
