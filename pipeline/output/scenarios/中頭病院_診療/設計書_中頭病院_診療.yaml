version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "中頭病院"
  scenario_name: "診療"
  group_name: "中頭病院"
  flow_name: "中頭病院$診療"
  target_facility: "中頭病院（沖縄県沖縄市）"
  office_id: "TODO_要確認"
  phone_number: "098-939-1300（代表）/ 0570-09-1300（中頭病院ナビダイヤル）/ 0570-09-1301（ちばなクリニックナビダイヤル）"
  business_hours: "月〜金 8:30-17:30、土 8:30-12:30、日祝・年末年始休み（紹介予約は月-金 8:30-17:30 / 土 8:30-11:30）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "中頭病院$診療"
      role: "main"
      description: "中頭病院の診療予約フロー（新規予約・予約変更・予約キャンセル・予約確認の4用件）"
  subflows:
    - name: "中頭病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー分割型。Gen1 患者氏名聞き取り.yaml に対応。新規予約路と既存予約路の両方から呼び出す（step 名のみ別、flowname は共通）"
    - name: "中頭病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 使用。和暦/西暦の判定。Gen1 生年月日聞き取り.yaml に対応"
    - name: "中頭病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "8 桁数字。Gen1 診察券番号確認.yaml に対応。「わからない」時は END_診察券無し で diagCardNumber 未取得のまま戻る"
    - name: "中頭病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier + Phone Normalization + Re-confirmation。phonetype 判定（携帯/その他）。Gen1 連絡先電話番号聞き取り.yaml + 電話番号区切り.yaml に対応"

# --- セクション3: フローの目的 ---
purpose: |
  中頭病院に着信した診療予約系の電話を AI が受付し、用件（診察予約・予約変更・予約キャンセル・予約確認）を識別したうえで、
  必要な情報（医療機関名・診療科・氏名・生年月日・診察券番号・希望日・予約日・連絡先）を聴取して Dr.JOY に登録する。
  当日の手術／入院予約・健康診断／人間ドック・乳児健診紹介状の方は適切な代表ナビダイヤルへ案内（受付対象外）。
  新規予約は紹介状を持つ患者のみ受付し、診療科は「乳腺外科・産婦人科・形成外科」の 3 科に限定。
  完了後は携帯/固定の判定で SMS 送信有無を分け、3 診療日以内に担当者から折り返す案内で終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "中頭病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 → 切断
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        ↓
                                予約種別確認(健診・人間ドック・入院予約etc)
                                  ├─ 該当する → END_代表電話案内
                                  └─ 該当しない → 紹介状確認
                                                  ├─ あり → 医療機関名聞き取り → 新規予約用診療科
                                                  │           ├─ 乳腺/産婦人科/形成 → 氏名_新規 → 生年月日_新規 → 第1希望日 → 第2希望日 → 電話番号_新規
                                                  │           │     → CMR_新規_phonetype → END_新規予約_携帯 / END_新規予約_固定
                                                  │           └─ それ以外 → END_新規予約対象外
                                                  └─ なし → 用件確認
                                                              ├─ 予約変更/キャンセル → 氏名_既存 → 生年月日_既存 → 診察券番号 → 診療科聞き取り
                                                              │     → 予約日聴取 → CMR_変更時のみ希望日(変更→変更希望日 / other→検査確認)
                                                              │     → 検査確認 → 電話番号_既存
                                                              │     → CMR_既存_phonetype
                                                              │         ├─ 携帯 → CMR_既存_用件_携帯(変更/キャンセル) → END_予約変更_携帯 / END_予約キャンセル_携帯
                                                              │         └─ その他 → CMR_既存_用件_固定 → END_予約変更_固定 / END_予約キャンセル_固定
                                                              ├─ 予約確認 → WEB確認_アナウンス → 電話番号_確認
                                                              │     → CMR_確認_phonetype → END_予約確認_SMS / END_予約確認_HP
                                                              └─ other → 用件NG_アナウンス → 電話番号_NG
                                                                          → CMR_NG_phonetype → END_電話受付_携帯 / END_電話受付_固定
    notes: |
      - 時間外特例「紹介予約のみ受付（土曜午後等）」は acceptance_times の時間外用 termination で代表 0570-09-1301 案内に統一する方針（director 判断、移管ノート参照）
      - 電話番号NG/診療科NG（リトライ失敗）は END_聴取失敗（status=3）に流れ、施設固有の代表電話案内（098-939-1300 を3回読み上げ）TTSで上書き
      - 検査確認 hearing は出力（あり/なし）を context examFlag に保存し、後段は両方 next: 電話番号_既存 で同じ経路に合流（context は Dr.JOY 側で参照）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 開始ブロック ===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 予約種別確認

  # === 予約種別確認（代表案内振り分け） ===
  - step: 予約種別確認
    type: hearing
    output_format: enum
    conditions:
      - match: "該当する"
        next: END_代表電話案内
      - match: "other"
        next: 紹介状確認

  # === 紹介状有無確認 ===
  - step: 紹介状確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 医療機関名聞き取り
      - match: "other"
        next: 用件確認

  # === 紹介状あり・新規予約路 ===
  - step: 医療機関名聞き取り
    type: hearing
    output_format: text
    next: 新規予約用診療科

  - step: 新規予約用診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "乳腺外科"
        next: 氏名聴取_新規
      - match: "産婦人科"
        next: 氏名聴取_新規
      - match: "形成外科"
        next: 氏名聴取_新規
      - match: "other"
        next: END_新規予約対象外

  - step: 氏名聴取_新規
    type: subflow
    flowname: "中頭病院$氏名聴取"
    next: 生年月日聴取_新規

  - step: 生年月日聴取_新規
    type: subflow
    flowname: "中頭病院$生年月日聴取"
    next: 第1受診希望日

  - step: 第1受診希望日
    type: hearing
    output_format: datetime
    next: 第2受診希望日

  - step: 第2受診希望日
    type: hearing
    output_format: datetime
    next: 電話番号聴取_新規

  - step: 電話番号聴取_新規
    type: subflow
    flowname: "中頭病院$電話番号聴取"
    next: CMR_新規_phonetype

  - step: CMR_新規_phonetype
    type: context_match_router
    reference_module: "電話番号聴取_新規"
    conditions:
      - match: "携帯"
        next: END_新規予約_携帯
      - match: "other"
        next: END_新規予約_固定

  # === 紹介状なし・用件分岐 ===
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "予約変更"
        next: 氏名聴取_既存
      - match: "予約キャンセル"
        next: 氏名聴取_既存
      - match: "予約確認"
        next: WEB確認_アナウンス
      - match: "other"
        next: 用件NG_アナウンス

  # === 既存予約路（変更/キャンセル共通） ===
  - step: 氏名聴取_既存
    type: subflow
    flowname: "中頭病院$氏名聴取"
    next: 生年月日聴取_既存

  - step: 生年月日聴取_既存
    type: subflow
    flowname: "中頭病院$生年月日聴取"
    next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "中頭病院$診察券番号聴取"
    next: 診療科聞き取り

  - step: 診療科聞き取り
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 予約日聴取

  - step: 予約日聴取
    type: hearing
    output_format: datetime
    next: CMR_変更時のみ希望日

  - step: CMR_変更時のみ希望日
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: 変更希望日聴取
      - match: "other"
        next: 検査確認

  - step: 変更希望日聴取
    type: hearing
    output_format: datetime
    next: 検査確認

  - step: 検査確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 電話番号聴取_既存
      - match: "other"
        next: 電話番号聴取_既存

  - step: 電話番号聴取_既存
    type: subflow
    flowname: "中頭病院$電話番号聴取"
    next: CMR_既存_phonetype

  - step: CMR_既存_phonetype
    type: context_match_router
    reference_module: "電話番号聴取_既存"
    conditions:
      - match: "携帯"
        next: CMR_既存_用件_携帯
      - match: "other"
        next: CMR_既存_用件_固定

  - step: CMR_既存_用件_携帯
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: END_予約変更_携帯
      - match: "other"
        next: END_予約キャンセル_携帯

  - step: CMR_既存_用件_固定
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: END_予約変更_固定
      - match: "other"
        next: END_予約キャンセル_固定

  # === 予約確認路（WEB確認案内） ===
  - step: WEB確認_アナウンス
    type: announcement
    next: 電話番号聴取_確認

  - step: 電話番号聴取_確認
    type: subflow
    flowname: "中頭病院$電話番号聴取"
    next: CMR_確認_phonetype

  - step: CMR_確認_phonetype
    type: context_match_router
    reference_module: "電話番号聴取_確認"
    conditions:
      - match: "携帯"
        next: END_予約確認_SMS
      - match: "other"
        next: END_予約確認_HP

  # === 用件NG路（用件聞き取り不能） ===
  - step: 用件NG_アナウンス
    type: announcement
    next: 電話番号聴取_NG

  - step: 電話番号聴取_NG
    type: subflow
    flowname: "中頭病院$電話番号聴取"
    next: CMR_NG_phonetype

  - step: CMR_NG_phonetype
    type: context_match_router
    reference_module: "電話番号聴取_NG"
    conditions:
      - match: "携帯"
        next: END_電話受付_携帯
      - match: "other"
        next: END_電話受付_固定

  # === 終話ブロック ===
  - step: END_代表電話案内
    type: termination
    termination_ref: "END_代表電話案内"

  - step: END_新規予約対象外
    type: termination
    termination_ref: "END_新規予約対象外"

  - step: END_新規予約_携帯
    type: termination
    termination_ref: "END_新規予約_携帯"

  - step: END_新規予約_固定
    type: termination
    termination_ref: "END_新規予約_固定"

  - step: END_予約変更_携帯
    type: termination
    termination_ref: "END_予約変更_携帯"

  - step: END_予約変更_固定
    type: termination
    termination_ref: "END_予約変更_固定"

  - step: END_予約キャンセル_携帯
    type: termination
    termination_ref: "END_予約キャンセル_携帯"

  - step: END_予約キャンセル_固定
    type: termination
    termination_ref: "END_予約キャンセル_固定"

  - step: END_予約確認_SMS
    type: termination
    termination_ref: "END_予約確認_SMS"

  - step: END_予約確認_HP
    type: termination
    termination_ref: "END_予約確認_HP"

  - step: END_電話受付_携帯
    type: termination
    termination_ref: "END_電話受付_携帯"

  - step: END_電話受付_固定
    type: termination
    termination_ref: "END_電話受付_固定"

