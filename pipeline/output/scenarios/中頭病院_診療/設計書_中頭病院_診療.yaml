# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "予約種別確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "preReservationType"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "該当する"
      - "該当しない"
    notes: "Yes/No 判定。Gen1 予約種別確認 + 肯定否定_1 サブフローに対応。「該当する」=代表電話案内へ離脱、「該当しない」(other) =正規ルート進行"

  - order: 2
    name: "紹介状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "referralStatus"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "Yes/No 判定。Gen1 紹介状有無聞き取り.yaml に対応。「あり」=新規予約路、「なし」(other)=既存予約路"

  - order: 3
    name: "医療機関名聞き取り"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "referralOrganization"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "自由テキスト。Gen1 医療機関名聞き取り.yaml に対応"

  - order: 4
    name: "新規予約用診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "乳腺外科"
      - "産婦人科"
      - "形成外科"
    notes: "Gen1 新規用診療科.yaml に対応。3 科限定。echo_back あり（科目復唱）。それ以外（other）は END_新規予約対象外 へ"

  - order: 5
    name: "第1受診希望日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "desiredDate1"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "DTMF 4 桁（MMDD）または音声で日付聴取。Gen1 第1受診希望日.yaml に対応。echo_back で復唱確認"

  - order: 6
    name: "第2受診希望日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "desiredDate2"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "DTMF 4 桁（MMDD: 月2桁+日2桁、例 0408=4月8日）または音声で日付聴取。Gen1 第2受診希望日（同 yaml 流用）に対応。echo_back で復唱確認"

  - order: 7
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
      - "診察予約"
    notes: |
      Gen1 用件聞き取り.yaml に対応。4 値分類 + echo_back（用件復唱）。
      紹介状なし路で「診察予約」を選んだ場合は紹介状必須のため聞き取り不能扱い → 用件NG路に流す。
      -> conditions: 予約変更/キャンセル → 氏名聴取_既存、予約確認 → WEB確認、other(=診察予約 or NG) → 用件NG_アナウンス

  - order: 8
    name: "診療科聞き取り"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "遺伝性腫瘍外来"
      - "外科"
      - "肝胆膵外科"
      - "救急科"
      - "形成外科"
      - "血液腫瘍内科"
      - "血管外科"
      - "呼吸器外科"
      - "呼吸器内科"
      - "産科"
      - "耳鼻いんこう科"
      - "循環器内科"
      - "小児科"
      - "消化器外科"
      - "消化器内科"
      - "心臓血管外科"
      - "腎臓内科"
      - "整形外科"
      - "総合内科"
      - "内科"
      - "乳腺外科"
      - "脳神経外科"
      - "泌尿器科"
      - "皮膚科"
      - "婦人科"
      - "放射線科"
      - "放射線治療科"
      - "麻酔科"
      - "産婦人科"
      - "登録なし"
    notes: |
      Gen1 診療科聞き取り.yaml に対応（既存予約路用）。29 科 + 「登録なし」（no_result_default）。
      呼吸器・消化器・脳神経・婦人科の 4 科は分岐あり（外科/内科/産科 等の聞き返し）→ プロンプトで再質問。
      Gen3 では 1 hearing で OpenAI が最終正規化値（30 値の rangeValues いずれか）に到達するまでリトライ。
      conditions は default のみ（CMR で再分岐しない、context に保存して終話で参照）

  - order: 9
    name: "予約日聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "Gen1 予約日の聞き取り.yaml に対応。既存予約日聴取（変更/キャンセル路で使用）。DTMF 4 桁（MMDD）対応"

  - order: 10
    name: "変更希望日聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "changeDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "DTMF 4 桁（MMDD: 月2桁+日2桁、例 0415=4月15日）または音声で日付聴取。Gen1 希望日.yaml に対応。予約変更時の希望日聴取。本日より3日以降の日付チェック（プロンプトで対応）。echo_back で復唱確認"

  - order: 11
    name: "検査確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "examFlag"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: |
      Gen1 検査確認 + 返答確認 + 検査有り 箱に対応。
      「胃カメラ、大腸カメラ、CT、MRI の予約検査はありますか？」 Yes/No。
      conditions は両方 next: 電話番号聴取_既存（出力ラベルを context examFlag に保存して同経路に合流）

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。中頭病院の予約専用、AI電話です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "予約種別確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約種別確認"
    tts_announcement: "ご用件は、当日の手術・入院予約の方、健康診断・人間ドック、または乳児健診の紹介状をお持ちの方に該当しますか？「はい」または「いいえ」でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "該当する"
        - "該当しない"
      mapping:
        - input: "はい / そうです / 該当する / 入院予約 / 当日手術 / 健診 / 人間ドック / 乳児健診 / 紹介状（健診系）"
          output: "該当する"
        - input: "いいえ / 違います / 該当しない / 上記以外"
          output: "該当しない"
      no_result_condition: "上記いずれにも分類できない発話"
    save_to: "preReservationType"
    next_step: "紹介状確認"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "紹介状確認"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか？「はい」または「いいえ」でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "はい / 持っています / あります / 紹介状がある"
          output: "あり"
        - input: "いいえ / 持っていません / ありません / 紹介状なし"
          output: "なし"
      no_result_condition: "上記いずれにも分類できない発話"
    save_to: "referralStatus"
    next_step: "用件確認 (なしの場合) / 医療機関名聞き取り (ありの場合)"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "医療機関名聞き取り"
    tts_announcement: "どちらの医療機関から紹介状をもらわれましたか？医療機関名をおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "referralOrganization"
    next_step: "新規予約用診療科"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "新規予約用診療科"
    tts_announcement: "当院の新規予約は「乳腺外科」「産婦人科」「形成外科」の3科のみ対応となっております。紹介された診療科をおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "乳腺外科"
        - "産婦人科"
        - "形成外科"
        - "NO_RESULT"
      mapping:
        - input: "乳腺外科 / 乳腺 / ブレストセンター / マンモグラフィー / 胸のしこり / 乳がん検診"
          output: "乳腺外科"
        - input: "産婦人科 / 産科 / 婦人科 / お産 / ギネ / 妊婦健診 / 母親学級 / 子宮筋腫 / 月経 / 不正出血"
          output: "産婦人科"
        - input: "形成外科 / 形成 / 美容外科 / 美容形成 / できもの / 火傷 / 陥入爪 / 粉瘤 / 乳房縮小"
          output: "形成外科"
      no_result_condition: "上記3科いずれにも該当しない（内科・整形外科等の発話）"
    save_to: "clinicalDepartment"
    next_step: "氏名聴取_新規 (3科のいずれか) / END_新規予約対象外 (other)"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "第1受診希望日"
    tts_announcement: "受診される第一希望日を、「4月1日」のように日付でおっしゃってください。AIが正しく認識しない場合はダイヤルプッシュで月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "日付として解釈できない発話"
    save_to: "desiredDate1"
    next_step: "第2受診希望日"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "第2受診希望日"
    tts_announcement: "続いて、受診される第二希望日を、「4月8日」のように日付でおっしゃってください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "日付として解釈できない発話"
    save_to: "desiredDate2"
    next_step: "電話番号聴取_新規"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話ください。「診察の予約を取る」、「予約を変更する」、「予約をキャンセルする」、「予約を確認する」、それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約変更"
        - "予約キャンセル"
        - "予約確認"
        - "診察予約"
      mapping:
        - input: "予約を変更 / 変更する / 延期 / 日を変えたい / 日時変更 / 取り直す"
          output: "予約変更"
        - input: "キャンセル / 取り消し / 取消 / やめる / 予約のキャンセル"
          output: "予約キャンセル"
        - input: "確認 / 予約の確認 / 予約日時を確認 / 時間を忘れた / 聞きたい / 教えて"
          output: "予約確認"
        - input: "診察の予約 / 予約を取る / 予約お願い / 受診 / 初めて（初診） / 診療予約"
          output: "診察予約"
      no_result_condition: "上記4値いずれにも分類できない発話"
    save_to: "classification"
    next_step: "氏名聴取_既存(変更/キャンセル) / WEB確認_アナウンス(確認) / 用件NG_アナウンス(other)"
    retry_failure: "end_failure"
    retry_failure_announcement: "申し訳ございません。うまく聞き取りが出来ませんでした。"

  - step_name: "診療科聞き取り"
    tts_announcement: "現在予約されている診療科をおっしゃってください。わからない場合は「わからない」とお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "遺伝性腫瘍外来"
        - "外科"
        - "肝胆膵外科"
        - "救急科"
        - "形成外科"
        - "血液腫瘍内科"
        - "血管外科"
        - "呼吸器外科"
        - "呼吸器内科"
        - "産科"
        - "耳鼻いんこう科"
        - "循環器内科"
        - "小児科"
        - "消化器外科"
        - "消化器内科"
        - "心臓血管外科"
        - "腎臓内科"
        - "整形外科"
        - "総合内科"
        - "内科"
        - "乳腺外科"
        - "脳神経外科"
        - "泌尿器科"
        - "皮膚科"
        - "婦人科"
        - "放射線科"
        - "放射線治療科"
        - "麻酔科"
        - "産婦人科"
        - "登録なし"
      mapping:
        - input: "呼吸器外科 / 呼外 / 食道 / 肺の病気 → 呼吸器外科"
          output: "呼吸器外科"
        - input: "呼吸器内科 / 呼内 / 肺がん検診 / 肺の内科 → 呼吸器内科"
          output: "呼吸器内科"
        - input: "消化器外科 / 消化器・外科 / 消火器 → 消化器外科"
          output: "消化器外科"
        - input: "消化器内科 / 消内 / 胃カメラ / 内視鏡 / 便秘 / 下痢 → 消化器内科"
          output: "消化器内科"
        - input: "脳神経外科 / 脳外 / 頭痛 / 脳梗塞 → 脳神経外科"
          output: "脳神経外科"
        - input: "婦人科 / 月経 / 子宮筋腫 / 不正出血 / おりもの → 婦人科"
          output: "婦人科"
        - input: "産科 / お産 / 妊婦健診 / 分娩 → 産科"
          output: "産科"
        - input: "産婦人科（産科か婦人科か区別できない発話）→ 産婦人科"
          output: "産婦人科"
        - input: "わからない / 主治医名のみ発話 → 登録なし"
          output: "登録なし"
        - input: "その他 27 科の発話（外科 / 形成外科 / 整形外科 / 麻酔科 / 乳腺外科 / 内科 / 循環器内科 等）"
          output: "（該当する科目）"
      no_result_condition: "30 科いずれにも該当しない（OpenAI 出力 NO_RESULT → no_result_default で「登録なし」を保存）"
    save_to: "clinicalDepartment"
    next_step: "予約日聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "予約日聴取"
    tts_announcement: "予約票に記載されている予約日を「4月1日」のように日付でおっしゃってください。AIが正しく認識しない場合はダイヤルプッシュで月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "日付として解釈できない発話"
    save_to: "reservationDate"
    next_step: "CMR_変更時のみ希望日"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "変更希望日聴取"
    tts_announcement: "担当医へ予約変更の確認が必要となりますので、本日より3日以降の日付で、変更希望日を「4月15日」のように日付でおっしゃってください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "日付として解釈できない、または本日から3日以内の日付発話"
    save_to: "changeDate"
    next_step: "検査確認"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "検査確認"
    tts_announcement: "胃カメラ、大腸カメラ、CT、MRIの予約検査はありますか？「あります」または「ありません」でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "あります / はい / 検査がある / 胃カメラ / 大腸カメラ / CT / MRI"
          output: "あり"
        - input: "ありません / いいえ / ない / わからない"
          output: "なし"
