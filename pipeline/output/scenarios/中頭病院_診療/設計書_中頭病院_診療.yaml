# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1→Gen3 移管。元資料は commubo抽出/【026】中頭病院｜【027】ちばなクリニック/【0028中頭病院】診療1_M_本番/"
  - "代表電話3種類の使い分け: 098-939-1300（中頭病院代表、END_聴取失敗で3回読み上げ）/ 0570-09-1300（中頭病院ナビダイヤル、入院・手術用）/ 0570-09-1301（ちばなクリニックナビダイヤル、健診・人間ドック・乳児健診紹介状用）"
  - "新規予約は「乳腺外科・産婦人科・形成外科」3 科限定。それ以外を発話した場合は END_新規予約対象外 で離脱"
  - "用件は4 分岐: 予約変更 / 予約キャンセル / 予約確認 / 診察予約。診察予約は紹介状あり路でのみ受付（紹介状なし路では「診察予約」は other 扱いで用件NG路へ）"
  - "受付時間: 月-金 8:30-17:30、土 8:30-12:30、日祝・年末年始休み。紹介予約のみは月-金 8:30-17:30 / 土 8:30-11:30。Gen1 の「紹介予約のみ」時間外特例は acceptance_times の時間外用 termination で代表 0570-09-1301 案内に統一する方針（director 判断、移管ノート参照）"
  - "完了アナウンスは用件×電話種別で 8 種類（変更/キャンセル/新規/確認 × 携帯/固定）。携帯時は「ショートメール」言及あり、固定時は「ショートメール」言及なし"
  - "予約確認ルートは特殊: 携帯あり → SMS で WEB確認URL 送付 → END_予約確認_SMS、固定 → SMS不可案内 → END_予約確認_HP"
  - "予約変更時のみ「変更希望日」を別途聴取。CMR_変更時のみ希望日 で classification を参照して分岐（変更→変更希望日→検査確認、その他→検査確認直行）"
  - "検査確認 hearing は出力（あり/なし）どちらも同じ next: 電話番号聴取_既存 に流す（context examFlag 保存のみが目的、CMR は不要）"
  - "診療科は分岐あり 4 科（呼吸器/消化器/脳神経/婦人科）+ 分岐なし 27 科 + 産婦人科 + 登録なし = 30 値。分岐あり科は OpenAI プロンプト内で「呼吸器外科 or 呼吸器内科 か聞き返し」をルール化（hearing 内で完結）"
  - "Gen1 の「カウント・再質問カウント・countXxx」等の重複 box はリトライ機構で吸収（hearing.retry_count）"
  - "Gen1 の「肯定否定」共通サブフローは Gen3 では各 Yes/No hearing として個別配置（scaffold が固定プロンプト埋め込み）"
  - "Gen1 の dynamic tag「<? $連絡先電話番号（ハイフン区切あり） ?>」「<? $入電番号（ハイフン区切りあり） ?>」は電話番号聴取サブフロー内の Re-confirmation node data で `#data#` プレースホルダ経由で吸収（subflow テンプレート側で対応）"
  - "「電話番号NG」「診療科NG」（リトライ失敗）は END_聴取失敗（status=3）に流れる。施設固有の3回読み上げ TTS は tts_modules.END_聴取失敗 で上書き済み"
  - "ContextMatchRouter は 2 段ネスト（phonetype × classification）で 8 終話（4用件×2電話種別）+ 4 ENDsを設計。reference_module は subflow ステップ名（電話番号聴取_新規等）または OpenAI モジュール名（OpenAI_用件確認）を指定"
  - "SMS 送信文面は Dr.JOY 側で設定（フローJSONには含めない）。設計書の sms_flag のみで携帯ルートでの送信指示を保持"
  - "ちばなクリニック_診療（gen1_ちばなクリニック_診療.md）が姉妹フローとして同パッケージ内にある。本フローとは別ジョブ"

