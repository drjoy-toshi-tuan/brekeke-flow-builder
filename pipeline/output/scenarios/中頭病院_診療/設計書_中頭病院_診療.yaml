# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - classification
    - phonetype
  patterns:
    - condition: "classification=診察予約 かつ phonetype=携帯"
      sms_flag: "1"
      notes: "新規予約・携帯。SMS送信あり"
    - condition: "classification=診察予約 かつ phonetype=その他"
      sms_flag: "-1"
      notes: "新規予約・固定。SMS送信なし"
    - condition: "classification=予約変更 かつ phonetype=携帯"
      sms_flag: "1"
      notes: "予約変更・携帯。SMS送信あり"
    - condition: "classification=予約変更 かつ phonetype=その他"
      sms_flag: "-1"
      notes: "予約変更・固定。SMS送信なし"
    - condition: "classification=予約キャンセル かつ phonetype=携帯"
      sms_flag: "1"
      notes: "キャンセル・携帯。SMS送信あり"
    - condition: "classification=予約キャンセル かつ phonetype=その他"
      sms_flag: "-1"
      notes: "キャンセル・固定。SMS送信なし"
    - condition: "classification=予約確認 かつ phonetype=携帯"
      sms_flag: "1"
      notes: "予約確認・携帯。WEB確認URLをSMS送付"
    - condition: "classification=予約確認 かつ phonetype=その他"
      sms_flag: "-1"
      notes: "予約確認・固定。SMS送信なし、HP案内"
    - condition: "classification=電話受付 かつ phonetype=携帯"
      sms_flag: "1"
      notes: "用件NG・携帯。SMS送信あり（連絡先のみ取得）"
    - condition: "classification=電話受付 かつ phonetype=その他"
      sms_flag: "-1"
      notes: "用件NG・固定。SMS送信なし"

