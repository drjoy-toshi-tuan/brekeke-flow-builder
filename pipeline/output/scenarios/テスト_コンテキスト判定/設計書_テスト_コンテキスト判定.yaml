  - step: CMR_CMR211
    type: context_match_router
    module1: "<%long_text_211%>"
    module2: "<%long_text_211%>"
    value_pairs:
      - {value1: "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン12345678901234567890123456789012345678901234567890123456789012345678901234567890",
         value2: "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン12345678901234567890123456789012345678901234567890123456789012345678901234567890"}
    conditions:
