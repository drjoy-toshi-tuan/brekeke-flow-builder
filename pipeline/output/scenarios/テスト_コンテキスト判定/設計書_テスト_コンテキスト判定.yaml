  # ============================================================
  # CMR-402: サブフロー戻り値を variable 経由で CMR 参照
  #   (Pattern 6 にサブフロー実装無いので setObject でシミュレート)
  # ============================================================
  - step: CMR402_setup
    type: save_context2db
    context_name: "pn_phonetype"
    context_value: "固定電話"
    next: CMR_CMR402

  - step: CMR_CMR402
    type: context_match_router
    module1: "<%pn_phonetype%>"
    module2: "<%pn_phonetype%>"
    value_pairs:
      - {value1: "固定電話", value2: "固定電話"}
      - {value1: "携帯電話", value2: "携帯電話"}
    conditions:
      - match: "固定電話"
        next: Assert_CMR402_PASS
      - match: "携帯電話"
        next: Assert_CMR402_FAIL
      - match: "other"
        next: Assert_CMR402_FAIL

  - step: Assert_CMR402_PASS
    type: inline_script
    body: |
      $runner.getLogger().info("[TEST PASS] CMR-402: サブフロー戻り値 (pn_phonetype) を <%var%> で参照");
      $runner.setResult("ok");
    next: 集計

  - step: Assert_CMR402_FAIL
    type: inline_script
    body: |
      $runner.getLogger().error("[TEST FAIL] CMR-402: 固定電話にマッチせず");
      $runner.setResult("ok");
    next: 集計

  # ============================================================
