# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "個人情報同意確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "consentAgreement"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "肯定"
      - "否定"
    notes: |
      - 「はい、許可します／肺／いいです／廃墟化します」→ 肯定
      - 「いいえ／拒否」→ 否定
      - 肺＝はい救済は SKILL_B_Yes_No.md の同義語として埋め込む

  - order: 2
    name: "連絡方法聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "contact"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "SMS"
      - "電話"
      - "どちらでも"
    notes: |
      - 「SMS／ショートメール／メッセージ／えすえむえす」→ SMS
      - 「電話／でんわ／コール／折り返し電話」→ 電話
      - 「どちらでも／おまかせ」→ どちらでも
      - リトライ失敗時は contact="電話" 相当で用件確認へ進む（customer_doc 5-6）

  - order: 3
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: |
      - 「予約／再診／新規／印刷／定期／新薬／最新／禁忌／でんき／電気／薬／お薬／要約」→ 予約
      - 「変更」→ 変更
      - 「キャンセル／取り消し／やめる」→ キャンセル
      - 「問い合わせ／確認／その他」→ 確認
      - 上記いずれにも該当しない → default（END_汎用代表案内へ）
      - 分類語の揺れは SKILL_A_Classification.md で対応

  - order: 4
    name: "受診歴確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "再診"
      - "予約"
    notes: |
      - 「新規／初めて／電気／でんき」→ 新規
      - 「再診／2 回目／以前／何度か」→ 再診
      - 判別不能 → 予約（紹介状確認へ進むが 7 科ガードは発動しない）
      - classification を上書き保存（用件確認で「予約」と入っていたものを 新規/再診/予約 に置換）

  - order: 5
    name: "予約_紹介状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "introduction"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: |
      - 肯定 → 有、否定 → 無
      - 肺＝はい救済

  - order: 6
    name: "予約_医師指定確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "doctor"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: |
      - 「はい、あります」→ 有、「いいえ、ありません」→ 無
      - 医師名は質問しない（customer_doc 5 担当医師の確認）
      - 全出力値で default 遷移（再診_診療科聴取 へ）

  - order: 7
    name: "新規_診療科判定"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "総合診療科"
      - "循環器内科"
      - "脳神経内科"
      - "脳神経外科"
      - "呼吸器内科"
      - "血管外科"
      - "メンタルヘルス"
      - "泌尿器科"
      - "整形外科"
      - "皮膚科"
      - "腎臓内科"
      - "形成外科"
      - "代謝内分泌内科"
      - "乳腺科"
      - "感染症科"
      - "眼科"
      - "産婦人科"
      - "小児科"
      - "耳鼻咽喉科"
      - "消化器内科"
      - "消化器外科"
      - "呼吸器外科"
      - "歯科口腔外科"
      - "睡眠無呼吸センター"
      - "ストーマ外来"
    notes: |
      - no_result_default="登録なし"
      - 受付不可 7 科（循環器内科／脳神経内科／呼吸器内科／メンタルヘルス／代謝内分泌内科／感染症科／呼吸器外科）は END_新規受付不可 に分岐
      - 小児科 → 小児科_ワクチン確認
      - その他 → 共通_希望日聴取
      - キーワード揺れ（め/めか→眼科、はいしゃ→歯科口腔外科、しんぞう→循環器内科 等）は AmiVoice 辞書と OpenAI プロンプトで吸収
      - 診療科が不明／わからないと発話された場合は追加質問せず空欄（登録なし相当）のまま次へ（customer_doc 1-3）

  - order: 8
    name: "再診_診療科聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "総合診療科"
      - "循環器内科"
      - "脳神経内科"
      - "脳神経外科"
      - "呼吸器内科"
      - "血管外科"
      - "メンタルヘルス"
      - "泌尿器科"
      - "整形外科"
      - "皮膚科"
      - "腎臓内科"
      - "形成外科"
      - "代謝内分泌内科"
      - "乳腺科"
      - "感染症科"
      - "眼科"
      - "産婦人科"
      - "小児科"
      - "耳鼻咽喉科"
      - "消化器内科"
      - "消化器外科"
      - "呼吸器外科"
      - "歯科口腔外科"
      - "睡眠無呼吸センター"
      - "ストーマ外来"
    notes: |
      - no_result_default="登録なし"
      - 再診では 7 科ガードは発動しない（customer_doc 5 再診セクション）
      - 小児科 → 小児科_ワクチン確認、その他 → 共通_希望日聴取

  - order: 9
    name: "小児科_ワクチン確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "vaccine"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: |
      - 肯定 → 有 → 小児科_インフル確認、否定 → 無 → 共通_希望日聴取

  - order: 10
    name: "小児科_インフル確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "Influenza"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: |
      - 肯定 → 有、否定 → 無
      - 全出力値で default 遷移（共通_希望日聴取 へ）

  - order: 11
    name: "共通_希望日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "自由テキスト。「再来週」「来月上旬」等の相対表現もそのまま格納（日付形式には変換しない）"

  - order: 12
    name: "変更_診療科聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "総合診療科"
      - "循環器内科"
      - "脳神経内科"
      - "脳神経外科"
      - "呼吸器内科"
      - "血管外科"
