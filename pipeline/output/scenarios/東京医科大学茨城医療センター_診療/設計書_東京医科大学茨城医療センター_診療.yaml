# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【サブフロー完全コピー】診察券番号／氏名／生年月日／電話番号の 4 サブフローは docs/reference/bivr/samples/個人情報サブフロー.bivr を完全コピーし、フロー名プレフィックスを「東京医科大学茨城医療センター」に置換する（CLAUDE.md Rule 9 準拠）。サブフロー内部の構造・接続・スクリプト改変は禁止"
  - "【status コード customer 固有 enum】customer function の status enum は [\"0\",\"1\",\"2\",\"7\",\"8\"]。Gen3 では 0（冒頭切断）を使用禁止のため status=2（代表案内）に置換。本設計の終話で使う status は 1（通話完了）/ 2（代表案内・非通知・時間外・聴取失敗・汎用代表案内）/ 7（同意拒否）/ 8（新規受付不可）の 4 値のみ"
  - "【checkpoint / checkout / endpoint は内部フラグ】customer function 要求のため context_fields に保持するが、Gen3 ではフロー内で明示的に設定しない（saveCompletionFlag2db の status に一本化）。AI は絶対に発話しない（TTS 文言への混入禁止）"
  - "【肯定同義語救済】すべての Yes/No 判定 hearing（個人情報同意確認／予約_紹介状確認／予約_医師指定確認／小児科_ワクチン確認／小児科_インフル確認）で『肺』『いいです』『廃墟化します』を肯定同義語として扱う。prompter は SKILL_B_Yes_No.md に同義語として埋め込む"
  - "【分類語の揺れ対応】用件確認で『印刷／定期／新薬／再診／最新／禁忌』→ 予約（customer_doc 5 冒頭）、『薬／お薬／要約』→ 予約、『電気／でんき』→ 新規扱い（受診歴確認側）。SKILL_A_Classification.md で対応"
  - "【数字認識ルール】4/5 の誤変換救済: 『for』『C』→ 4 としない、『よん』『し』→ 4、『号』『go』→ 5 としない、『ご』『ごお』『ごー』→ 5（customer_doc 1-8）。診察券番号・電話番号・日付系 hearing の prompter プロンプトで明示"
  - "【もしもし対策】STT で『もしもし』のみが検出された場合、「お声は届いております。」と発話して同じ質問を再提示する（customer_doc 1-15）。Retry のカスタム文言で対応（全 hearing 共通）"
  - "【診療科が不明時】入電者が『わからない』と回答した場合、または診療科リストに合致しない場合は、症状・理由・内容説明などの追加質問を禁止。clinicalDepartment は『登録なし』または空欄のまま次へ進める（customer_doc 1-3）"
  - "【予約日と予約希望日の分離】変更ルートで reservationDate（datetime 正規化）と DesiredreservationDate（自由文）は別項目として扱う。予約日未聴取時に予約希望日の値を予約日に代入することは禁止（customer_doc 5 冒頭）"
  - "【日付年度の自動補正】10 月以降に入電して 1〜9 月の日付を言われた場合は翌年として解釈する（customer_doc 5 冒頭）。変更_現在日聴取・キャンセル_現在日聴取の OpenAI 正規化プロンプトで実装"
  - "【一度に複数情報発話対応】入電者が複数情報を一度に発話した場合、すでに伝えられた内容は復唱・再確認せず不足項目のみ質問する。hearing の skip ルールと prompter の共通ルールで対応（customer_doc 冒頭）"
  - "【聴取内容の再質問・復唱禁止】customer_doc 冒頭最重要ルール。診療科・予約日・患者名・生年月日など全情報は一度聴取後に再聴取しない。retry_count=1 を守り、リトライ後は空文字格納で次へ"
  - "【患者名復唱厳禁】患者名は『カタカナでお答えください』『〇〇ですね』等の復唱・指示を一切行わない（customer_doc 1-10）。氏名聴取サブフロー内で処理"
  - "【診察券番号・電話番号の復唱フォーマット】診察券番号は 1 桁ずつ読み上げ（<speak type=\"digits\">）、電話番号は電話番号読み上げ（<speak type=\"telephone\">）。ただし Gen3 では SSML タグ使用禁止のため tts_g の読み方調整（半角スペース挿入等）で代替する"
  - "【SSML 完全削除】customer_doc の <speak type=\"digits\"> / <speak type=\"telephone\"> / <break time=\"...\"/> / <dtmf/> は Gen3 では全削除。TTS は {tts_g:...}（全小文字）形式"
  - "【生年月日 2 回失敗→空欄】生年月日は 2 回認識失敗で patientDateOfBirth を空文字セットし、エラーアナウンスなしで次の質問へ進む（customer_doc 1-11）。生年月日聴取サブフローの retry_count=1 で対応"
  - "【電話番号の桁数バリデーション】11 桁時は先頭 3 桁が 070/080/090/050 のいずれかでなければ再聴取、10 桁時は 070/080/090/050 で始まってはいけない（customer_doc 1-13）。電話番号聴取サブフロー内で対応。3 回失敗時: 非通知 → 代表案内で終話、非通知以外 → 着信番号自動格納"
  - "【連絡方法聴取は携帯のみ実行】070/080/090/060 で始まる 11 桁の場合のみ実行。固定・その他はスキップして用件確認へ（customer_doc 5-6）。context_match_router で phonetype=携帯 時のみ 連絡方法聴取 に分岐"
  - "【smsFlag=1 は終話時確定】customer_doc 5-6: 終話アナウンス（END_診療予約完了／予約変更完了／キャンセル完了／確認完了）出力時点で smsFlag=1 を代入。それ以外（途中切断・代表案内・受付不可）は smsFlag=0（Gen3 template では -1）"
  - "【reason / details の発話厳禁】ユーザーに対して reason・details の内容を復唱したり、同情発話・意見・質問を一切行わない。prompter の SKILL_E_FreeText.md に明示"
  - "【未聴取 function フィールドの初期化】customer function required に含まれるが本フローで聴取しない項目（reason / history / institution / disease / other / checkpoint / checkout）は saveContextModel2DB で空文字 \"\" を初期値として埋める。OpenAI プロンプトで強制聴取させない"
  - "【予約_医師指定確認 → 再診_診療科聴取】customer_doc 5 「初めて/新規の場合」のフローでは 紹介状有 → 医師指定確認 → 診療科（7 科ガードなし）の順。Gen2 yaml が 再診_診療科聴取 を再利用する構造を踏襲する（新規+紹介状有のときは受付不可 7 科チェックを発動させない設計）"
  - "【Dr.JOY 側設定事項】SMS 送信文面 / status マスター / 診療科マスター / office_id / 代表電話(029-887-1161) / ARS 番号 は Dr.JOY 管理画面で別途設定。設計書・フローJSON には含めない"

