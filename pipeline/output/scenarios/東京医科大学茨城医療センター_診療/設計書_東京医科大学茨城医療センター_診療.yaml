# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # --- 冒頭 + 同意確認 ---
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内（2 診療日以内受付不可を明示）"
    announcement: "お電話ありがとうございます。東京医科大学茨城医療センターの、予約専用AI電話です。こちらのお電話では、本日より2診療日以内の内容に関してはお受けできません。代表電話へおかけ直しください。"
  - module_name: "個人情報同意確認"
    purpose: "個人情報聴取の同意確認"
    announcement: "こちらのお電話では、個人情報をお伺いいたします。ご了承いただけますでしょうか。「はい、許可します」、または、「いいえ」でお答えください。"

  # --- 連絡方法 + 用件 ---
  - module_name: "連絡方法聴取"
    purpose: "携帯番号時の折り返し連絡方法確認"
    announcement: "折り返しのご連絡方法は、ショートメールとお電話、どちらをご希望でしょうか。お話しください。"
  - module_name: "用件確認"
    purpose: "4 用件の選択"
    announcement: "それではご用件を、予約、変更、キャンセル、その他問い合わせ、の中からお選びください。"

  # --- 予約ルート ---
  - module_name: "受診歴確認"
    purpose: "新規/再診 判別"
    announcement: "ご希望されるのは、新規予約ですか？再診予約ですか？お話しください。"
  - module_name: "予約_紹介状確認"
    purpose: "紹介状有無"
    announcement: "かかりつけ医からの紹介状はお持ちでしょうか。"
  - module_name: "予約_医師指定確認"
    purpose: "医師指定の有無"
    announcement: "医師の指定はございますでしょうか。「はい、あります」、または、「いいえ、ありません」のようにお答えください。"
  - module_name: "予約_選定療養費案内"
    purpose: "紹介状無時の 7,700 円案内"
    announcement: "かしこまりました。他の医療機関からの紹介状をお持ちでない患者さんにつきましては、通常の診療費とは別に、初診時、選定療養費として、7,700円を全額自己負担いただいております。予めご了承ください。"
  - module_name: "新規_診療科判定"
    purpose: "新規ルートの診療科聴取（7 科ガード付き）"
    announcement: "診療科をお話ください。わからない場合は「わからない」とお話ください。"
  - module_name: "再診_診療科聴取"
    purpose: "再診ルートの診療科聴取（7 科ガードなし）"
    announcement: "診療科をお話ください。わからない場合は「わからない」とお話ください。"
  - module_name: "小児科_ワクチン確認"
    purpose: "小児科選択時のワクチン希望確認"
    announcement: "ワクチン接種予約をご希望でしょうか。「はいそうです」「いいえ違います」のようにお答えください。"
  - module_name: "小児科_インフル確認"
    purpose: "ワクチン希望時のインフルエンザ確認"
    announcement: "ご希望のワクチンはインフルエンザでしょうか。「はいそうです」「いいえ違います」のようにお答えください。"
