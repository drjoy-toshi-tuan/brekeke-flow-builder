# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 — 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（use_acceptance_times=false のため到達しないが template 必須項目として保持）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（customer_doc では空文字格納で次ステップへ進む仕様のため実質到達しない）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_同意拒否"
    condition: "個人情報同意確認＝否定"
    tts_announcement: "恐れ入りますが、こちらのお電話ではご用件を承ることができません。当院の代表番号、『029-887-1161』へおかけ直しください。それでは失礼いたします。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_同意拒否"
  - name: "END_新規受付不可"
    condition: "新規ルート＋紹介状＝無＋診療科∈{循環器内科,脳神経内科,呼吸器内科,メンタルヘルス,代謝内分泌内科,感染症科,呼吸器外科}"
