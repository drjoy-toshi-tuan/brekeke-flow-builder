# 設計書 — 東京医科大学茨城医療センター 診療
# 生成元: @director エージェント（Gen2→Gen3移管）
# 生成日: 2026/04/22
# 確認レポート: docs/designs/確認レポート_東京医科大学茨城医療センター_診療_20260422.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "東京医科大学茨城医療センター"
  group_name: "東京医科大学茨城医療センター"
  flow_name: "東京医科大学茨城医療センター$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認（代表番号: 029-887-1161）"
  business_hours: "なし（24時間受付 / customer_doc に時刻判定なし）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "東京医科大学茨城医療センター$診療"
      role: "main"
      description: "予約・変更・キャンセル・確認の4用件を受け付けるメインフロー。冒頭に個人情報同意確認、末尾に追加問い合わせ・終話分岐を含む"
  subflows:
    - name: "東京医科大学茨城医療センター$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "診察券番号復唱あり（<speak type=\"digits\">{}</speak>ですね）。『わからない』分岐は個人情報サブフロー.bivr のサンプルに含まれる実装を踏襲"
    - name: "東京医科大学茨城医療センター$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "カタカナ変換必須。苗字のみ聴取時は下の名前を再質問。患者名の復唱は厳禁（customer_doc 1-10）"
    - name: "東京医科大学茨城医療センター$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 構成。和暦↔西暦変換、2桁元号判定あり。リトライ上限=1、超過時は空文字格納で次へ進む（customer_doc 1-11）"
    - name: "東京医科大学茨城医療センター$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier で 携帯/固定/その他 を分岐。YES→incoming 採用（復唱なし）。NO→音声/DTMF聴取→復唱→NG なら再聴取1回のみ→確認不要で確定。phonetype を設定してメインフローに返却"

# --- セクション3: フローの目的 ---
purpose: |
  東京医科大学茨城医療センターの予約専用 AI 電話窓口。
  本日より2診療日以内の内容は受付不可である旨を冒頭で案内したうえで、以下の用件を聴取・処理する:
    - 新規予約（受診歴→紹介状→[医師指定 or 選定療養費]→診療科→[小児科ならワクチン＋インフル確認]→予約希望日）
    - 再診予約（診療科→[小児科ならワクチン＋インフル確認]→予約希望日）
    - 予約変更（診療科→現在の予約日→予約希望日）
    - 予約キャンセル（診療科→現在の予約日）
    - その他問い合わせ（確認内容）
  新規ルートで紹介状「無」かつ 7 科（循環器内科／脳神経内科／呼吸器内科／メンタルヘルス／代謝内分泌内科／感染症科／呼吸器外科）のいずれかが選択された場合は受付不可終話。
  個人情報同意拒否時は代表番号 029-887-1161 を案内して終話。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "東京医科大学茨城医療センター$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知(status=2) → 切断
            └─ 通常   → 冒頭_アナウンス
                          → 個人情報同意確認
                              ├─ 否定 → END_同意拒否(status=7, endpoint=電話案内)
                              └─ 肯定 → jump_診察券番号聴取(サブフロー)
                                          → jump_氏名聴取(サブフロー)
                                            → jump_生年月日聴取(サブフロー, 復唱あり)
                                              → jump_電話番号聴取(サブフロー, 携帯/固定分岐＋復唱)
                                                → 連絡先種別分岐(context_match_router: phonetype)
                                                    ├─ 携帯 → 連絡方法聴取 → 用件確認
                                                    └─ その他 → 用件確認
                                                → 用件確認
                                                    ├─ 予約 → 受診歴確認
                                                    │        ├─ 新規 → 予約_紹介状確認
                                                    │        │         ├─ 有 → 予約_医師指定確認 → 再診_診療科聴取
                                                    │        │         └─ 無 → 予約_選定療養費案内 → 新規_診療科判定
                                                    │        │                  ├─ 循環器内科/脳神経内科/呼吸器内科/メンタルヘルス/代謝内分泌内科/感染症科/呼吸器外科 → END_新規受付不可
                                                    │        │                  ├─ 小児科 → 小児科_ワクチン確認 → (有)小児科_インフル確認 → 共通_希望日聴取
                                                    │        │                  │                                 └─ (無) → 共通_希望日聴取
                                                    │        │                  └─ default → 共通_希望日聴取
                                                    │        ├─ 再診 → 再診_診療科聴取
                                                    │        │         ├─ 小児科 → 小児科_ワクチン確認 → (同上)
                                                    │        │         └─ default → 共通_希望日聴取
                                                    │        └─ 予約(判別不能) → 予約_紹介状確認（同上分岐。7科チェックは新規ルート側のみ）
                                                    ├─ 変更 → 変更_診療科聴取 → 変更_現在日聴取 → 共通_希望日聴取
                                                    ├─ キャンセル → キャンセル_診療科聴取 → キャンセル_現在日聴取 → 最終確認_追加問合せ
                                                    ├─ 確認 → 確認_内容聴取 → 最終確認_追加問合せ
                                                    └─ default → END_汎用代表案内
                                                → 共通_希望日聴取 → 最終確認_追加問合せ
                                                → 最終確認_追加問合せ → 終話分岐_用件(context_match_router: classification)
                                                    ├─ 新規/再診/予約 → END_診療予約完了(status=1)
                                                    ├─ 変更 → END_予約変更完了(status=1)
                                                    ├─ キャンセル → END_キャンセル完了(status=1)
                                                    ├─ 確認 → END_確認完了(status=1)
                                                    └─ default → END_診療予約完了
    notes: |
      - 全 hearing のリトライ失敗時は原則 skip（1回再聴取→空文字格納→「かしこまりました。」で次へ）。customer_doc 1-1 準拠
      - 診療科 NO_RESULT は "登録なし" を clinicalDepartment に保存してリトライ（モジュール選定ガイド 2.5）
      - 「肺／いいです／廃墟化します」は肯定同義語として全 Yes/No 判定 hearing の prompter プロンプトで対応（SKILL_B_Yes_No.md）
      - 選定療養費案内は announcement（入力待ち無し）。ガード不要（scaffold が入力待ち無し TTS として処理）
      - 予約_医師指定確認 → 再診_診療科聴取 への遷移は Gen2 yaml の構造を踏襲（新規+紹介状有では 7 科受付不可ガードを発動させない設計）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 個人情報同意確認

  # --- 個人情報同意確認（Pattern A: OpenAI 直後 Yes/No 分岐） ---
  - step: 個人情報同意確認
    type: hearing
    output_format: enum
    conditions:
      - match: "肯定"
        next: jump_診察券番号聴取
      - match: "否定"
        next: END_同意拒否

  # --- 個人情報サブフロー 4 本（customer_doc 5-1 の順序: 診察券→氏名→生年月日→連絡先電話番号） ---
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "東京医科大学茨城医療センター$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "東京医科大学茨城医療センター$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "東京医科大学茨城医療センター$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "東京医科大学茨城医療センター$電話番号聴取"
    next: 連絡先種別分岐

  # --- 連絡方法聴取（携帯のみ実行。固定・その他はスキップ） ---
  - step: 連絡先種別分岐
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: 連絡方法聴取
      - match: "default"
        next: 用件確認

  - step: 連絡方法聴取
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 用件確認

  # --- 用件確認（Pattern A: enum 直後 4 分岐） ---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "予約"
        next: 受診歴確認
      - match: "変更"
        next: 変更_診療科聴取
      - match: "キャンセル"
        next: キャンセル_診療科聴取
      - match: "確認"
        next: 確認_内容聴取
      - match: "default"
        next: END_汎用代表案内

  # --- 予約ルート（受診歴で 新規/再診/予約 に分類） ---
  - step: 受診歴確認
    type: hearing
    output_format: enum
    conditions:
      - match: "新規"
        next: 予約_紹介状確認
      - match: "再診"
        next: 再診_診療科聴取
      - match: "予約"
        next: 予約_紹介状確認

  - step: 予約_紹介状確認
    type: hearing
    output_format: enum
    conditions:
      - match: "有"
        next: 予約_医師指定確認
      - match: "無"
        next: 予約_選定療養費案内

  - step: 予約_医師指定確認
    type: hearing
    output_format: enum
    next: 再診_診療科聴取

  - step: 予約_選定療養費案内
    type: announcement
    next: 新規_診療科判定

  # --- 新規_診療科判定（受付不可 7 科のガード + 小児科分岐） ---
  - step: 新規_診療科判定
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "循環器内科"
        next: END_新規受付不可
      - match: "脳神経内科"
        next: END_新規受付不可
      - match: "呼吸器内科"
        next: END_新規受付不可
      - match: "メンタルヘルス"
        next: END_新規受付不可
      - match: "代謝内分泌内科"
        next: END_新規受付不可
      - match: "感染症科"
        next: END_新規受付不可
      - match: "呼吸器外科"
        next: END_新規受付不可
      - match: "小児科"
        next: 小児科_ワクチン確認
      - match: "default"
        next: 共通_希望日聴取

  # --- 再診_診療科聴取（7 科ガードなし、小児科のみ分岐） ---
  - step: 再診_診療科聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "小児科"
        next: 小児科_ワクチン確認
      - match: "default"
        next: 共通_希望日聴取

  # --- 小児科ワクチン確認 ---
  - step: 小児科_ワクチン確認
    type: hearing
    output_format: enum
    conditions:
      - match: "有"
        next: 小児科_インフル確認
      - match: "無"
        next: 共通_希望日聴取

  - step: 小児科_インフル確認
    type: hearing
    output_format: enum
    next: 共通_希望日聴取

  - step: 共通_希望日聴取
    type: hearing
    output_format: text
    next: 最終確認_追加問合せ

  # --- 変更ルート ---
  - step: 変更_診療科聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 変更_現在日聴取

  - step: 変更_現在日聴取
    type: hearing
    output_format: datetime
    next: 共通_希望日聴取

  # --- キャンセルルート ---
  - step: キャンセル_診療科聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: キャンセル_現在日聴取

  - step: キャンセル_現在日聴取
    type: hearing
    output_format: datetime
    next: 最終確認_追加問合せ

  # --- 確認ルート ---
  - step: 確認_内容聴取
    type: hearing
    output_format: text
    next: 最終確認_追加問合せ

  # --- 最終確認（追加問い合わせ）→ 終話分岐 ---
  - step: 最終確認_追加問合せ
    type: hearing
    output_format: text
    next: 終話分岐_用件

  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "新規"
        next: END_診療予約完了
      - match: "再診"
        next: END_診療予約完了
      - match: "予約"
        next: END_診療予約完了
      - match: "変更"
        next: END_予約変更完了
      - match: "キャンセル"
        next: END_キャンセル完了
      - match: "確認"
        next: END_確認完了
      - match: "default"
        next: END_診療予約完了

  # --- 終話 ---
  - step: END_同意拒否
    type: termination
    termination_ref: "END_同意拒否"
  - step: END_新規受付不可
    type: termination
    termination_ref: "END_新規受付不可"
  - step: END_診療予約完了
    type: termination
    termination_ref: "END_診療予約完了"
  - step: END_予約変更完了
    type: termination
    termination_ref: "END_予約変更完了"
  - step: END_キャンセル完了
    type: termination
    termination_ref: "END_キャンセル完了"
  - step: END_確認完了
    type: termination
    termination_ref: "END_確認完了"
  - step: END_汎用代表案内
    type: termination
    termination_ref: "END_汎用代表案内"

# --- セクション5: コンテキストフィールド一覧 ---
