    output_labels: []
    notes: |
      - 「4 月 1 日」等の日付発話を YYYY-MM-DD HH:MM 形式に正規化
      - 10 月以降で 1〜9 月の日付を言われた場合は翌年に補正（customer_doc 5 冒頭）
      - 過去日時は customer_doc 1-14 準拠で再聴取だが、Gen3 では retry で対応（script ブロックは使用しない）
      - DTMF 対応表: 8 桁=YYYYMMDD / 4 桁=MMDD / 2 桁=DD（未来補完）。# キーで確定、タイムアウト時は音声入力

