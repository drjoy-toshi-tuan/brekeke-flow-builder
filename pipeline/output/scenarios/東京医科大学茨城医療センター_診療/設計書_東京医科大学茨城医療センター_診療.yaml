      - "消化器内科"
      - "消化器外科"
      - "呼吸器外科"
      - "歯科口腔外科"
      - "睡眠無呼吸センター"
      - "ストーマ外来"
    notes: |
      - no_result_default="登録なし"
      - 7 科ガード・小児科分岐なし（変更なので診療科はそのまま次へ）

  - order: 13
    name: "変更_現在日聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 1
    echo_back: false
    save_to: "reservationDate"
