# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns:
    - condition: "全 正常終話（END_診療予約完了/予約変更完了/キャンセル完了/確認完了）"
      sms_flag: "1"
      notes: "customer_doc 5-6: 終話アナウンス出力時点で smsFlag=1。携帯/固定の別なく 1 固定（Dr.JOY 側で送信判定）"
    - condition: "END_同意拒否 / END_新規受付不可 / END_汎用代表案内 / END_非通知 / END_時間外 / END_聴取失敗"
      sms_flag: "-1"
      notes: "異常系は SMS 送信なし"

