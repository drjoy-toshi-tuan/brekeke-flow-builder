# 設計書: 関越病院 -- 薬剤部
# 生成元: @director エージェント
# 生成日: 2026/04/16
# テンプレート: docs/specs/設計書テンプレート.yaml 準拠
# 移行元: docs/migration/gen2_関越病院_薬剤部.md
# 確認レポート: docs/designs/確認レポート_関越病院_薬剤部_20260416.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "関越病院"
  group_name: "関越病院"
  flow_name: "関越病院$薬剤部"
  target_facility: "関越病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: ""
  business_hours: "あり（スケジュールはDr.JOY側で設定）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
# CLAUDE.md Rule 9 準拠: 個人情報聴取サブフローは個人情報サブフロー.bivr を完全コピー。
# フロー名プレフィックスのみ施設名に置換。構造・接続・スクリプトの変更は禁止。
flow_structure:
  type: "subflow"
  flows:
    - name: "関越病院$薬剤部"
      role: "main"
      description: >
        冒頭チェーン → 薬局名 → 用件確認(DTMF) → 担当者名 → 診察券番号サブフロー → 氏名サブフロー
        → 用件分岐1(classification: その他問合せ→問い合わせ内容_その他, 疑義照会/報告→診療科)
        → 診療科 → 用件分岐2(classification: 疑義照会→問い合わせ内容_疑義照会, 報告→問い合わせ内容_報告)
        → 報告ルート: 折返し有無 → 必要なら電話番号サブフロー → 終話分岐(phonetype) → 終話
    - name: "関越病院$氏名聴取"
      role: "sub"
      description: "患者氏名聴取（音声のみ）→ 結果返却"
    - name: "関越病院$診察券番号聴取"
      role: "sub"
      description: "診察券番号聴取（DTMF + 音声、digits復唱確認、わからない分岐あり）→ 結果返却"
    - name: "関越病院$電話番号聴取"
      role: "sub"
      description: "電話番号聴取（incoming-classifier→携帯/固定分岐→Phone Normalization→復唱確認）→ 結果返却"
    - name: "関越病院$RAG検索"
      role: "sub"
      description: "FAQ検索サブフロー。問い合わせ内容をRAGで検索し回答"

  subflows:
    - name: "関越病院$氏名聴取"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。復唱なし（Gen2プロンプトで患者名の復唱禁止と明記）"
    - name: "関越病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。digits復唱あり。わからない分岐あり。Gen2 TTS: 「診察券番号をお伺いします。8桁以内の番号をお話下さい。番号がわからない場合は、わからないのようにお話下さい。」"
    - name: "関越病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。telephone復唱あり。報告ルート+折返し必要の場合のみ呼出。phonetypeコンテキストを保存しメインフローに返却"
    - name: "関越病院$RAG検索"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen2→Gen3移管デフォルト（パターン3）。inquiry_insertion_point=問い合わせ内容_その他"

# --- セクション3: フローの目的 ---
purpose: >
  関越病院の薬剤部向けAI電話。外部薬局からの疑義照会・報告・その他問合せを受け付け、
  薬局名・担当者名・患者情報（診察券番号・氏名）・診療科・問い合わせ内容を聴取して
  折り返し受付を自動化する。Gen2からの移管。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "関越病院$薬剤部"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)

      --- 共通聴取ブロック ---
      冒頭_アナウンス
        → 薬局名(hearing/text)
        → 用件確認(hearing/enum: 疑義照会, 報告, その他問合せ) [DTMF 1/2/3]
        → 担当者名(hearing/text)
        → jump_診察券番号聴取(Custom Jump to Flow)
        → jump_氏名聴取(Custom Jump to Flow)

      --- 用件分岐1: classification ---
      → 用件分岐1(ContextMatchRouter: classification)
          ├─ その他問合せ → 問い合わせ内容_その他(hearing/text) → jump_RAG検索 → END_折返し不要
          └─ default(疑義照会/報告) → 診療科(hearing/enum: 19科)

      --- 用件分岐2: classification ---
      → 用件分岐2(ContextMatchRouter: classification)
          ├─ 疑義照会 → 問い合わせ内容_疑義照会(hearing/text) → END_折返し不要
          └─ default(報告) → 問い合わせ内容_報告(hearing/text) → 折返し有無(hearing/enum)

      --- 折返し分岐 ---
      折返し有無
          ├─ 必要 → jump_電話番号聴取(Custom Jump to Flow)
          │           → 終話分岐_電話種別(ContextMatchRouter: phonetype)
          │               ├─ 1(携帯) → END_折返しあり_入電番号
          │               └─ 2(その他) → END_折返しあり_聴取番号
          └─ 不要/default → END_折返し不要
    notes: >
      用件確認は Pattern B（後段分岐）: OpenAI で classification を保存し、
      後段の ContextMatchRouter (用件分岐1/2) で分岐。
      RAGサブフローはパターン3: inquiry_insertion_point=問い合わせ内容_その他、pre_termination=true。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ===== 冒頭ブロック =====
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 薬局名

  # ===== 共通聴取ブロック =====
  - step: 薬局名
    type: hearing
    output_format: text
    next: 用件確認

  - step: 用件確認
    type: hearing
    output_format: enum
    # Pattern B: 全ルート共通で担当者名へ進む。分岐は後段 ContextMatchRouter で実施
    next: 担当者名

  - step: 担当者名
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "関越病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "関越病院$氏名聴取"
    next: 用件分岐1

  # ===== 用件分岐1: その他問合せ vs 疑義照会/報告 =====
  - step: 用件分岐1
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "その他問合せ"
        next: 問い合わせ内容_その他
      - match: "default"
        next: 診療科

  # ===== 診療科聴取（疑義照会/報告ルート）=====
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 用件分岐2

  # ===== 用件分岐2: 疑義照会 vs 報告 =====
  - step: 用件分岐2
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "疑義照会"
        next: 問い合わせ内容_疑義照会
      - match: "default"
        next: 問い合わせ内容_報告

  # ===== 疑義照会ルート =====
  - step: 問い合わせ内容_疑義照会
    type: hearing
    output_format: text
    next: END_折返し不要

  # ===== 報告ルート =====
  - step: 問い合わせ内容_報告
    type: hearing
    output_format: text
    next: 折返し有無

  - step: 折返し有無
    type: hearing
    output_format: enum
    conditions:
      - match: "必要"
        next: jump_電話番号聴取
      - match: "default"
        next: END_折返し不要

  - step: jump_電話番号聴取
    type: subflow
    flowname: "関越病院$電話番号聴取"
    next: 終話分岐_電話種別

  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: END_折返しあり_入電番号
      - match: "2"
        next: END_折返しあり_聴取番号

  # ===== その他問合せルート =====
  - step: 問い合わせ内容_その他
    type: hearing
    output_format: text
    next: jump_RAG検索

  # ===== RAG検索サブフロー（パターン3: inquiry_insertion_point） =====
  - step: jump_RAG検索
    type: subflow
    flowname: "関越病院$RAG検索"
    next: END_折返し不要

  # ===== 終話ブロック =====
  - step: END_折返し不要
    type: termination
    termination_ref: "END_折返し不要"

  - step: END_折返しあり_入電番号
    type: termination
    termination_ref: "END_折返しあり_入電番号"

  - step: END_折返しあり_聴取番号
    type: termination
    termination_ref: "END_折返しあり_聴取番号"

