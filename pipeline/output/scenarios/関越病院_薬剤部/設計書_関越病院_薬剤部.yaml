# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "薬局名"
    tts_announcement: "まず初めに、薬局名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "clinicalDepartment2"
    next_step: "用件確認"
    retry_failure: "skip"

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の3つのうち、いずれかでお話ください。1、疑義照会。2、報告。3、その他問合せ。それでは、お話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "疑義照会"
        - "報告"
        - "その他問合せ"
      mapping:
        - input: "DTMF 1 または「疑義」「照会」「紹介」を含む発話"
          output: "疑義照会"
        - input: "DTMF 2 または「報告」を含む発話"
          output: "報告"
        - input: "DTMF 3 または「その他」「問合せ」「問い合わせ」を含む発話"
          output: "その他問合せ"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: "classification"
    next_step: "担当者名"
    retry_failure: "end_failure"

  - step_name: "担当者名"
    tts_announcement: "担当者名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "Desiredreservation"
    next_step: "jump_診察券番号聴取"
    retry_failure: "skip"

  - step_name: "診療科"
    tts_announcement: "診療科をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "外科"
        - "整形外科"
        - "リハビリテーション科"
        - "呼吸器内科"
        - "呼吸器外科"
        - "消化器内科"
        - "消化器外科"
        - "脳神経内科"
        - "脳神経外科"
        - "循環器内科"
        - "心臓血管外科"
        - "歯科口腔外科"
        - "産科"
        - "婦人科"
        - "小児科"
        - "泌尿器科"
        - "眼科"
        - "耳鼻咽喉科"
      mapping:
        - input: "「内科」「いっぱん」「そうごう」「一般」「総合」"
          output: "内科"
        - input: "「外科」「しゅじゅつ」「オペ」（呼吸器/消化器/脳神経/心臓血管/歯科口腔の修飾なし）"
          output: "外科"
        - input: "「整形」「整形外科」「ほね」「骨折」"
          output: "整形外科"
        - input: "「リハビリ」「リハビリテーション」「再生」「運動」"
          output: "リハビリテーション科"
        - input: "「呼吸器内科」「咳」「肺炎」（内科修飾あり）"
          output: "呼吸器内科"
        - input: "「呼吸器外科」（外科修飾あり）"
          output: "呼吸器外科"
        - input: "「消化器内科」「胃」「お腹」（内科修飾あり）"
          output: "消化器内科"
        - input: "「消化器外科」「胃腸」（外科修飾あり）"
          output: "消化器外科"
        - input: "「脳神経内科」「神経」（内科修飾あり）"
          output: "脳神経内科"
        - input: "「脳神経外科」「脳外」（外科修飾あり）"
          output: "脳神経外科"
        - input: "「循環器」「循環器内科」「心臓」（内科修飾あり）"
          output: "循環器内科"
        - input: "「心臓血管外科」「血管」（外科修飾あり）"
          output: "心臓血管外科"
        - input: "「歯科」「口腔」「歯医者」"
          output: "歯科口腔外科"
        - input: "「産科」「妊娠」「お産」（産科文脈）"
          output: "産科"
        - input: "「婦人科」「ホルモン」（婦人科文脈）"
          output: "婦人科"
        - input: "「小児科」「子供」「こども病院」"
          output: "小児科"
        - input: "「泌尿器」「泌尿器科」「おしっこ」「尿」"
          output: "泌尿器科"
        - input: "「眼科」「目」「視力」"
          output: "眼科"
        - input: "「耳鼻咽喉科」「耳鼻科」「耳」「鼻」「喉」"
          output: "耳鼻咽喉科"
      no_result_condition: "上記いずれの診療科にも該当しない発話。リストにない診療科名の場合は近い診療科をレコメンドする"
    save_to: "clinicalDepartment"
    next_step: "用件分岐2"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "問い合わせ内容_疑義照会"
    tts_announcement: "疑義の内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "reason"
    next_step: "END_折返し不要"
    retry_failure: "skip"

  - step_name: "問い合わせ内容_報告"
    tts_announcement: "報告の内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "reason"
    next_step: "折返し有無"
    retry_failure: "skip"

  - step_name: "問い合わせ内容_その他"
    tts_announcement: "問い合わせ内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "reason"
    next_step: "jump_RAG検索"
    retry_failure: "skip"

  - step_name: "折返し有無"
    tts_announcement: "当院からの、折り返しの連絡は必要ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "必要"
        - "不要"
      mapping:
        - input: "「はい」「お願いします」「必要」「欲しい」等の肯定表現"
          output: "必要"
        - input: "「いいえ」「不要」「結構です」「大丈夫」等の否定表現"
          output: "不要"
      no_result_condition: "肯定/否定いずれとも判断できない発話"
    save_to: "details"
    next_step: "jump_電話番号聴取（必要時）/ END_折返し不要（不要時）"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須） ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_折返し不要"
    condition: "疑義照会完了 / 報告(折返し不要)完了 / その他問合せ完了"
    tts_announcement: "かしこまりました。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_折返し不要"
  - name: "END_折返しあり_入電番号"
    condition: "報告(折返し必要)完了 かつ phonetype=携帯"
    tts_announcement: "かしこまりました。お伺いした番号に折り返しいたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_折返しあり_入電番号"
  - name: "END_折返しあり_聴取番号"
    condition: "報告(折返し必要)完了 かつ phonetype=その他"
    tts_announcement: "かしこまりました。お掛けいただいた番号に折り返しいたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_折返しあり_聴取番号"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "問い合わせ内容_その他"
  pre_termination: true

