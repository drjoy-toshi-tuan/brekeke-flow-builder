# --- セクション11: 特記事項・制約 ---
special_notes:
  - "本フローは薬剤部専用（外部薬局からの疑義照会受付）。一般患者向けではないため、生年月日聴取は不要"
  - "Gen2プロンプトで「担当者名と患者名の復唱は禁止」と明記されているため、氏名聴取サブフローの復唱はなし"
  - "患者IDは「8桁以内」「3桁以上」の制約あり。「わからない」応答を許容する（診察券番号聴取サブフローの「わからない」分岐を有効化）"
  - "Gen2プロンプトの数字認識ルール: 4(よん/し/C/Sea)、5(ご/Go)等の特殊読みをOpenAIプロンプトに含める"
  - "電話番号は10桁または11桁のみ許容。11桁の場合は先頭3桁が090/080/070/050のいずれか（Gen2ルール踏襲）"
  - "Gen2プロンプトで「呼吸器科」等リストにない診療科が発話された場合は「当院に○○はございませんが、○○でしょうか？」とレコメンドする指示あり。OpenAIプロンプトに反映すること"
  - "Gen2 contextName互換: clinicalDepartment2=薬局名、Desiredreservation=担当名（Gen2 function property名を踏襲）"
  - "Gen2 status=0（途中切断）は Gen3 では status=2 に置換済み"

# --- セクション12: 要確認事項（人間に確認が必要）---
# 詳細は確認レポート（docs/designs/確認レポート_関越病院_薬剤部_20260416.md）を参照。
confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
  - item: "営業時間スケジュール（Dr.JOY側設定）"
    resolved: false
  - item: "smsFlag の薬局向けフローでの適切な値（全正常終話 smsFlag=1 で仮設定）"
    resolved: false
  - item: "冒頭TTS「疑義紹介」の文言確認（「疑義照会」の可能性）"
    resolved: false
  - item: "Gen2 function未使用フィールド（history, symptoms等）のDr.JOY画面での要否"
    resolved: false
  - item: "RAGサブフロー（パターン3）の必要性確認（Gen2にRAG機能なし）"
    resolved: false
