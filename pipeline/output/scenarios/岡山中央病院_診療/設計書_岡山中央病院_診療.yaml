# =====================================================
# セクション11: 特記事項・制約
# =====================================================
special_notes:
  - "【法人内クリニック名義での受電】岡山中央病院本体ではなく、系列「セントラルクリニック・伊島」名義で電話に出る運用（Gen1 main.yaml 行 22）。冒頭_アナウンス文言を岡山中央病院本体名に差し替えるかどうか、顧客に確認する必要あり（confirmation_items 参照）。"
  - "【3 用件のみ受付】予約変更・キャンセル・確認といった派生用件は「診察の予約について」 1 系統に統合（Gen1 entity_classification.md 用件エンティティの同 canonical 配下に統合済み）。後段の希望日聴取・連絡事項自由テキストで担当者に詳細を伝える運用。"
  - "【個人情報聴取が用件聴取の前段】Gen1 の順序を踏襲。他施設（西宮渡辺・医誠会・中部徳洲会等）は用件→個人情報の順だが、本フローは個人情報→用件の順。人間ドック判定でも先に個人情報を取得してから案内終話する点に注意（Gen1 仕様維持）。"
  - "【人間ドック案内 3 回繰り返し】Gen1 では 健康センター番号案内 → 3回ループ → 繰り返します → 健康センター番号案内 のループ箱で実現していたが、Gen3 では END_人間ドック案内 終話 TTS にインライン化（電話番号 086-252-3222 を 3 回読み上げる文字列として）。"
  - "【先生名聴取は希望日聴取に統合】Gen1 では 診療科聞き取り.yaml 内で 先生名 entity が並列に検出され、先生名ヒアリング.yaml サブフローへ分岐していたが、Gen3 では希望日聴取の自由テキスト発話に含めて伝える運用に簡略化。先生名固有名詞は OpenAI 正規化の同義語ヒントに残す。"
  - "【タイトル_2 は dead code として除外】Gen1 main.yaml の タイトル_2「只今電話が混み合っております」は到達経路が yaml 上に存在しない（参照元なし）→ Gen3 では実装しない。"
  - "【テストルート は除外】Gen1 main.yaml の テストルート（テスト用入口）は Gen3 では削除。"
  - "【業務時間】Gen1 時間外切断.yaml の判定: 平日 8:30〜16:45 / 土曜 8:30〜12:00 / 日祝・12/28〜1/4 休止。Gen3 では acceptance_times モジュールに集約（具体スケジュールは Dr.JOY 側で設定）。"
  - "【SMS 送信】受付完了 (END_受付完了) のみ smsFlag=1。文面は Dr.JOY 側で設定（設計書では送信フラグのみ管理）。"
  - "【Gen1 entity 自動取込】entity_classification.md / entity_stt_patch.json / entity_openai_synonyms.md は scaffold/properties が自動参照。本設計書では転記しない。"

# =====================================================
# セクション12: 要確認事項（人間に確認が必要）
# =====================================================
confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
  - item: "代表電話番号（IVR 着信用）"
    resolved: false
  - item: "冒頭アナウンスの名乗り文言: 元資料は『セントラルクリニック・伊島です』だが、岡山中央病院本体の名乗りに差し替えるべきか確認"
    resolved: false
  - item: "人間ドック案内の電話番号: 元資料 main.yaml は 086-252-3222、移管ノートには 0570-001789 の記載あり（箱名のみで実体なし）。本設計書は 086-252-3222 を採用しているが、現在の正しい番号を確認"
    resolved: false
  - item: "営業時間スケジュール（Dr.JOY 側設定）: 平日 8:30〜16:45、土曜 8:30〜12:00、日祝休、12/28〜1/4 休止 で問題ないか確認"
    resolved: false
  - item: "SMS 送信文面（Dr.JOY 側設定）: 受付完了時の SMS テキスト内容を確認"
    resolved: false
  - item: "Dr.JOY 認証設定（生年月日 / 診察券番号 / 電話番号 の優先順位）"
    resolved: false
  - item: "Gen1 の 先生名聴取（希望先生のフォローアップ）を Gen3 でも明示ステップとして残すか、希望日聴取の自由テキストに統合するかを最終確認（本設計書は統合方式）"
    resolved: false
  - item: "診療科聴取で no_result_default = 登録なし のままでよいか（Gen1 では判定不能でリトライしていたが、Gen3 推奨は登録なし保存で進行）"
    resolved: false
