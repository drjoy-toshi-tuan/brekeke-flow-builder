# =====================================================
# セクション6: 聴取項目一覧
# =====================================================
hearing_items:
  - order: 1
    name: "用件聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "診察の予約について"
      - "人間ドックについて"
      - "その他ご相談"
    notes: |
      Gen1 用件聴取.yaml の用件エンティティ 3 値と完全一致。
      - 「診察の予約について」: 新規予約・予約変更・予約キャンセル・予約日時確認・薬関連を統合（Gen1 の同 canonical 配下に「予約変更/予約キャンセル/再診/初診/取り消し/薬の変更/薬をキャンセル」等が混在）。
      - 「人間ドックについて」: ドック・健康診断・健診・検診・人間ドック を統合。
      - 「その他ご相談」: その他・確認・相談・問い合わせ・聞きたい・知りたい・教えてほしい を統合。
      OpenAI 正規化プロンプトで「位置/一/印刷/インサツ/平行/並行」等の同音異義語誤認識補正を明示すること（Gen1 entity_openai_synonyms.md 参照）。

  - order: 2
    name: "診療科聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "眼科"
      - "形成外科"
      - "思春期カウンセリング"
      - "消化器内科"
      - "心療内科"
      - "内科"
      - "乳腺外科"
      - "婦人科"
    notes: "Gen1 診療科聞き取り.yaml の診療科エンティティ 8 値。判定不能時は no_result_default で『登録なし』を保存して希望日聴取へ進む。Gen1 では『先生名』エンティティとの併存判定があったが、Gen3 では診療科のみに簡略化（先生名は希望日聴取の自由テキストに含めて伝える運用）。"

  - order: 3
    name: "希望日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "Gen1 希望日聞き取り（フリー聴収）.yaml と一致。「ご希望の日時や、内容をお話ください。折り返し、電話で詳しく確認させていただきます。」自由テキスト保存。希望先生名もここで一緒に発話してもらう運用。"

  - order: 4
    name: "連絡事項_診察予約"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "contactNote"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "Gen1 連絡事項確認.yaml と一致。「他にご連絡事項はございますか？なければ特になしとお答えください。」自由テキスト保存。"

  - order: 5
    name: "相談内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "Gen1 問い合わせ内容.yaml と一致。「お問い合わせ内容をお話ください。」自由テキスト保存。"

  - order: 6
    name: "連絡事項_相談"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "contactNote"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "その他ご相談ルート用の連絡事項確認。Gen1 では 連絡事項確認.yaml サブフローを 2 回参照しているため Gen3 でもステップを分けて 2 つ用意（context は共通の contactNote に上書き保存）。"

# =====================================================
# セクション7: ステップ詳細
# =====================================================
step_details:
  - step_name: "用件聴取"
    tts_announcement: "ご用件を、次の3つのうちのいずれかでお話ください。「診察の予約について」、「人間ドックについて」、「その他ご相談」。それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "診察の予約について"
        - "人間ドックについて"
        - "その他ご相談"
      mapping:
        - input: "予約をしたい / 診察予約 / 予約変更 / 予約キャンセル / 予約確認 / 再診 / 初診 / 薬を変更 / 薬をキャンセル / 取り消し / 取り直す"
          output: "診察の予約について"
        - input: "人間ドック / ドック / 健康診断 / 健診 / 検診"
          output: "人間ドックについて"
        - input: "その他 / 相談 / 問い合わせ / 聞きたい / 知りたい / 確認したい / 教えてほしい"
          output: "その他ご相談"
      no_result_condition: "上記いずれにも該当せず、用件が判定不能"
    save_to: "classification"
    next_step: "用件分岐に従う"
    retry_failure: "end_failure"
    retry_failure_announcement: "お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、おかけなおしください。"

  - step_name: "診療科聴取"
    tts_announcement: "それでは、ご希望の診療科名をお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "眼科"
        - "形成外科"
        - "思春期カウンセリング"
        - "消化器内科"
        - "心療内科"
        - "内科"
        - "乳腺外科"
        - "婦人科"
      mapping:
        - input: "眼科 / がんか / 視力検査"
          output: "眼科"
        - input: "形成外科 / 美容外科 / 美容形成 / 形成"
          output: "形成外科"
        - input: "思春期カウンセリング / カウンセリング / 思春期"
          output: "思春期カウンセリング"
        - input: "消化器内科 / 消化器 / 消内"
          output: "消化器内科"
        - input: "心療内科 / しんない"
          output: "心療内科"
        - input: "内科 / ないか"
          output: "内科"
        - input: "乳腺外科 / 乳腺 / 乳がん検診 / マンモグラフィー / エコー"
          output: "乳腺外科"
        - input: "婦人科 / 産婦人科 / 産科 / 子宮がん検診"
          output: "婦人科"
      no_result_condition: "上記いずれの診療科にも該当しない（Gen1 では判定不能で再質問していたが、Gen3 では no_result_default = 登録なし を保存して希望日聴取へ進む）"
    save_to: "clinicalDepartment"
    next_step: "希望日聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "希望日聴取"
    tts_announcement: "ご希望の日時や、内容をお話ください。折り返し、電話で詳しく確認させていただきます。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "（自由テキスト保存のため OpenAI 処理なし）"
    save_to: "reason"
    next_step: "連絡事項_診察予約"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "連絡事項_診察予約"
    tts_announcement: "他にご連絡事項はございますか？なければ、特になし、とお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "（自由テキスト保存のため OpenAI 処理なし）"
    save_to: "contactNote"
    next_step: "END_受付完了"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "相談内容聴取"
    tts_announcement: "それでは、お問い合わせ内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "（自由テキスト保存のため OpenAI 処理なし）"
    save_to: "reason"
    next_step: "連絡事項_相談"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "連絡事項_相談"
    tts_announcement: "他にご連絡事項はございますか？なければ、特になし、とお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "（自由テキスト保存のため OpenAI 処理なし）"
    save_to: "contactNote"
    next_step: "END_受付完了"
    retry_failure: "skip"
    retry_failure_announcement: ""

# =====================================================
# セクション8: 終話パターン
# =====================================================
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "ただいまの時間帯は、AI電話の対応時間外です。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達 / 用件判定不能"
    tts_announcement: "お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、おかけなおしください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（受付完了）---
  - name: "END_受付完了"
    condition: "診察予約 or その他ご相談 ルートで全聴取完了"
    tts_announcement: "申し込みを受付いたしました。担当者から電話、もしくは、ショートメッセージにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了"

  # --- 人間ドック案内（代表案内）---
  - name: "END_人間ドック案内"
    condition: "用件 = 人間ドックについて"
    tts_announcement: "申し訳ございませんが、人間ドックのご予約に関するお問い合わせは、健康増進センターにて承ります。電話番号を申し上げますので、そちらへお掛けなおし下さい。健康増進センターの電話番号は、086-252-3222です。繰り返します。健康増進センターの電話番号は、086-252-3222です。繰り返します。健康増進センターの電話番号は、086-252-3222です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_人間ドック案内"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

# =====================================================
# セクション8b: RAG/FAQ検索サブフロー
# =====================================================
# Gen1 元資料には RAG/FAQ 検索サブフローなし。Gen3 移管でも追加しない。
# 「その他ご相談」ルートは Gen1 と同じく自由テキストで担当者折返し対応。
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

