# 設計書 — 岡山中央病院 診療
# 生成元: @director エージェント
# 生成日: 2026-05-01
# 確認レポート: output/scenarios/岡山中央病院_診療/確認レポート_岡山中央病院_診療_20260501.md
# 作業種別: Gen1→Gen3 移管
# 元資料: commubo抽出/【023】セントラル・クリニック 伊島/【0018岡山中央病院】診療1_M_本番/
version: "1.0"

# =====================================================
# セクション1: 基本情報
# =====================================================
basic_info:
  facility_name: "岡山中央病院"
  scenario_name: "診療"
  group_name: "岡山中央病院"
  flow_name: "岡山中央病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "平日 8:30〜16:45 / 土曜 8:30〜12:00 / 日祝・12/28〜1/4 休止（年末年始）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# =====================================================
# セクション2: フロー構成
# =====================================================
flow_structure:
  type: "subflow"
  flows:
    - name: "岡山中央病院$診療"
      role: "main"
      description: "岡山中央病院（系列クリニック「セントラルクリニック・伊島」名義で受電）の診療予約受付フロー。3 用件分類（診察の予約について / 人間ドックについて / その他ご相談）の軽量版。診察予約は診療科 + 希望日 + 連絡事項を聴取して受付完了。人間ドックは健康増進センター（086-252-3222）案内のみで終話。その他ご相談はフリーテキスト相談 + 連絡事項を聴取して受付完了。個人情報聴取（氏名→電話番号→生年月日→診察券番号）は用件聴取の前段に共通配置（Gen1 順序を踏襲）。"
  subflows:
    - name: "岡山中央病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。patientName を返却。"
    - name: "岡山中央病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（incoming-classifier + Phone Normalization + 復唱あり）。additionalPhoneNumber と phonetype（1=携帯/ip050、2=その他/landline/withheld）を返却。"
    - name: "岡山中央病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（DOB Re-confirmation 復唱あり）。patientDateOfBirth を返却。"
    - name: "岡山中央病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。medicalCardNumber を返却。Gen1 では 8 桁制限+持ってない時の END_診察券無し 分岐があるが、Gen3 では標準サブフロー仕様に合わせる。"

# =====================================================
# セクション3: フローの目的
# =====================================================
purpose: >
  岡山中央病院（受電時の名乗りは系列「セントラルクリニック・伊島」）の外来予約に関する電話を受け、
  個人情報（氏名・連絡先電話番号・生年月日・診察券番号）を聴取した上で、
  3 用件（診察の予約について / 人間ドックについて / その他ご相談）を分類し、
  診察予約は診療科・希望日・連絡事項を聴取して受付を完了し（折返し電話 / SMS）、
  人間ドックは健康増進センター（086-252-3222）への掛け直し案内のみで終話し、
  その他ご相談は自由テキストで内容を聴取して受付を完了する。

# =====================================================
# セクション4: シナリオフロー図
# =====================================================
flow_diagrams:
  - flow_name: "岡山中央病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常 → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → jump_氏名聴取
                                        → jump_電話番号聴取
                                        → jump_生年月日聴取
                                        → jump_診察券番号聴取
                                        → 用件聴取 (enum: 診察の予約について / 人間ドックについて / その他ご相談)
                                              ├─ 診察の予約について → 診療科聴取 (enum, 8 科 + 登録なし)
                                              │                          → 希望日聴取 (text)
                                              │                          → 連絡事項_診察予約 (text)
                                              │                          → END_受付完了
                                              ├─ 人間ドックについて → END_人間ドック案内（健康増進センター 086-252-3222 を 3 回案内して終話）
                                              └─ その他ご相談 → 相談内容聴取 (text)
                                                                  → 連絡事項_相談 (text)
                                                                  → END_受付完了
    notes: |
      - 個人情報聴取は用件聴取の前段に配置（Gen1 順序を踏襲。他施設は用件→個人情報の順で逆）。
      - 用件分岐は Pattern A（OpenAI 直後の hearing.conditions で直接 next を切替）。
      - 終話は phonetype 分岐なしの単線（Gen1 main.yaml の完了フラグも単一のため）。
      - 人間ドック案内 TTS には「電話番号復唱を 3 回繰り返す」内容をインライン化（Gen1 の `3回ループ` 箱を Gen3 では単一終話文言に集約）。

# =====================================================
# セクション4b: シナリオフロー定義（ブロック構成）
# =====================================================
scenario_flow:
  # ---------- 冒頭 ----------
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: jump_氏名聴取

  # ---------- 個人情報聴取（用件聴取の前段に共通配置）----------
  - step: jump_氏名聴取
    type: subflow
    flowname: "岡山中央病院$氏名聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "岡山中央病院$電話番号聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "岡山中央病院$生年月日聴取"
    next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "岡山中央病院$診察券番号聴取"
    next: 用件聴取

  # ---------- 用件聴取（Pattern A）----------
  - step: 用件聴取
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "診察の予約について"
        next: 診療科聴取
      - match: "人間ドックについて"
        next: END_人間ドック案内
      - match: "その他ご相談"
        next: 相談内容聴取
      - match: "other"
        next: END_聴取失敗

  # ---------- 診察予約ルート ----------
  - step: 診療科聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "other"
        next: 希望日聴取

  - step: 希望日聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 連絡事項_診察予約

  - step: 連絡事項_診察予約
    type: hearing
    output_format: text
    retry_failure: skip
    next: END_受付完了

  # ---------- その他ご相談ルート ----------
  - step: 相談内容聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 連絡事項_相談

  - step: 連絡事項_相談
    type: hearing
    output_format: text
    retry_failure: skip
    next: END_受付完了

  # ---------- 終話ブロック ----------
  - step: END_受付完了
    type: termination
    termination_ref: "END_受付完了"

  - step: END_人間ドック案内
    type: termination
    termination_ref: "END_人間ドック案内"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

# =====================================================
# セクション5: コンテキストフィールド一覧
# =====================================================
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - { id: "1", order: "1", value: "診察の予約について" }
      - { id: "2", order: "2", value: "人間ドックについて" }
      - { id: "3", order: "3", value: "その他ご相談" }
    item_default: true
    editable: true
    deletable: false
    notes: "Gen1 用件聴取.yaml「セットした用件の分岐」の 3 値と完全一致。診察の予約 = 新規予約 + 予約変更 + 予約キャンセル + 予約確認 + 薬関連が統合（Gen1 entity_classification の同 canonical 配下）。"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
