# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "新潟県けんこう財団長岡_健診2$健診2"
      role: "main"
      description: "冒頭チェーン → 用件 5 分岐（健診予約 / 日時変更 / キャンセル / 企業問合せ / 問い合わせ） → 各ルートで聴取 → 終話。健診予約のみ受診票確認 + 電話番号サブフロー後段で SMS / WEB 案内に分岐。日時変更・キャンセル・問い合わせは個人情報聴取（氏名・生年月日・電話番号）後、業務時間判定で終話文言を切替。企業問合せは企業名担当者・企業連絡先聴取後、業務時間判定で終話文言を切替"
    - name: "新潟県けんこう財団長岡_健診2$氏名聴取_20260507"
      role: "sub"
      description: "氏名聴取（標準サブフロー、復唱なし）"
    - name: "新潟県けんこう財団長岡_健診2$生年月日聴取_20260507"
      role: "sub"
      description: "生年月日聴取（標準サブフロー、復唱あり）"
    - name: "新潟県けんこう財団長岡_健診2$電話番号聴取_20260507"
      role: "sub"
      description: "電話番号聴取（標準サブフロー、復唱あり、incoming-classifier + 携帯/その他判別あり）"

  subflows:
    - name: "新潟県けんこう財団長岡_健診2$氏名聴取_20260507"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen3 標準サブフロー（CLAUDE.md Rule 9）。日時変更・キャンセル・問い合わせの 3 ルートで呼び出される（健診予約・企業問合せでは使わない）"

    - name: "新潟県けんこう財団長岡_健診2$生年月日聴取_20260507"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen3 標準サブフロー（CLAUDE.md Rule 9）。Gen1 の `生年月日聞き取り.yaml` で復唱（`<? $生年月日（復唱用） ?>`）あり、和暦・西暦両対応"

    - name: "新潟県けんこう財団長岡_健診2$電話番号聴取_20260507"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen3 標準サブフロー（CLAUDE.md Rule 9）。incoming-classifier で携帯/固定/その他を判別し phonetype context をセット。健診予約は post-subflow CMR で SMS / WEB 分岐に使用、それ以外のルートは phonetype 分岐なし（単線で次へ）"

# --- セクション3: フローの目的 ---
purpose: "新潟県けんこう財団・長岡健康管理センターへの健診予約等の電話を受け、用件（健診予約/日時変更/キャンセル/企業問合せ/問い合わせ）を 5 分岐し、各ルートで必要な聴取（受診票有無・予約日・希望日・希望時間・氏名・生年月日・電話番号・企業内容）を行って Dr.JOY に登録する。健診予約は携帯番号取得時に SMS で WEB 予約 URL を送付、非携帯なら WEB 予約案内のみで終話。日時変更・キャンセル・企業問合せ・問い合わせは聴取終了後、入電時刻が営業時間内か否かで終話文言を切替（営業時間内: 当日担当者連絡 / 営業時間外: 営業日に担当者連絡）。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "新潟県けんこう財団長岡_健診2$健診2"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 → 完了フラグ_非通知(status=2) → 切断
            └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times: 月-土 8-16)
                  ├─ 時間外/TIMEOUT/ERROR → END_時間外 → 完了フラグ_時間外(status=6) → 切断
                  └─ 受付可 → 冒頭_アナウンス(TTS)
                        → 用件_確認(hearing, enum)
                            ├─ 健診予約 → 受診票_確認(hearing, enum) → 電話番号聴取_予約(subflow)
                            │     → 終話分岐_予約_電話種別(CMR on phonetype)
                            │         ├─ 携帯 → END_予約完了_携帯(SMS送信、status=1, smsFlag=1)
                            │         └─ other → END_予約完了_WEB案内(status=2, smsFlag=-1)
                            ├─ 日時変更 → 予約日_変更(hearing, datetime, echo_back) → 受診希望日_変更(hearing, datetime, echo_back)
                            │     → 希望時間_変更(hearing, datetime, echo_back)
                            │     → 氏名聴取_変更(subflow) → 生年月日聴取_変更(subflow) → 電話番号聴取_変更(subflow)
                            │     → 営業時間判定_変更(script, business_hours)
                            │         ├─ SUCCESS(営業時間内) → END_変更_受付内
                            │         └─ other(営業時間外) → END_変更_受付外
                            ├─ キャンセル → 予約日_キャンセル(hearing, datetime, echo_back)
                            │     → 氏名聴取_キャンセル(subflow) → 生年月日聴取_キャンセル(subflow) → 電話番号聴取_キャンセル(subflow)
                            │     → END_キャンセル(時間によらず固定文言)
                            ├─ 企業問合せ → 企業_問合せ_内容(hearing, text) → 企業名_担当者名(hearing, text)
                            │     → 企業_連絡先電話番号(hearing, text)
                            │     → 営業時間判定_企業(script, business_hours)
                            │         ├─ SUCCESS(営業時間内) → END_企業問合せ_受付内
                            │         └─ other(営業時間外) → END_企業問合せ_受付外
                            └─ 問い合わせ → 問合せ_内容(hearing, text)
                                  → 氏名聴取_問合せ(subflow) → 生年月日聴取_問合せ(subflow) → 電話番号聴取_問合せ(subflow)
                                  → 営業時間判定_問合せ(script, business_hours)
                                      ├─ SUCCESS(営業時間内) → END_問合せ_受付内
                                      └─ other(営業時間外) → END_問合せ_受付外

      ─── リトライ上限到達時 ───
      各 hearing の retry_failure に従う:
        - 用件_確認 / 受診票_確認 / 予約日 / 希望日 / 希望時間 → end_failure（END_聴取失敗）
        - 内容系 hearing（企業内容・企業名担当者・問合せ内容）→ skip（フリーテキストのため空でも次へ進める）
    notes: |
      長岡用 健診2 の Gen3 移管設計。Gen1 の主要差分を踏まえて以下のように整理:
      - Gen1 の施設選択（東新潟/西新潟/長岡）は長岡専用版なので削除（main.yaml に該当箱なし）
      - Gen1 の連休中専用フロー（用件聞き取り（連休中）.yaml、5/1〜5/7 GW、お盆ハードコード、連休中：健診予約/予約変更_*）は廃止し、Dr.JOY 側 acceptance_times の休業日設定で吸収（NON-BLOCKER N-1）
      - Gen1 の `（保留）折返し方法確認.yaml` は dead code として削除
      - Gen1 の入電番号未取得 → webページ案内ルートは Gen3 標準電話番号サブフローの手入力フォールバックで代替
      - 終話の 2 段時間判定（聴取終了後にもう一度時刻チェック）は移管ノート方針に従って維持。post-hearing に script_template=business_hours を配置

# --- セクション4b: シナリオフロー定義（ブロック構成） ---
scenario_flow:
  # === 冒頭ブロック ===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件_確認

  # === 用件 5 分岐（Pattern A: hearing の enum で直接分岐）===
  - step: 用件_確認
    type: hearing
    output_format: enum
    conditions:
      - match: "健診予約"
        next: 受診票_確認
      - match: "日時変更"
        next: 予約日_変更
      - match: "キャンセル"
        next: 予約日_キャンセル
      - match: "企業問合せ"
        next: 企業_問合せ_内容
      - match: "問い合わせ"
        next: 問合せ_内容
      - match: "other"
        next: 用件_確認

  # === 健診予約ルート ===
  - step: 受診票_確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 電話番号聴取_予約
      - match: "なし"
        next: 電話番号聴取_予約
      - match: "other"
        next: 電話番号聴取_予約

  - step: 電話番号聴取_予約
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$電話番号聴取_20260507"
    next: 終話分岐_予約_電話種別

  - step: 終話分岐_予約_電話種別
    type: context_match_router
    reference_module: "電話番号聴取_予約"
    conditions:
      - match: "携帯"
        next: END_予約完了_携帯
      - match: "other"
        next: END_予約完了_WEB案内

  - step: END_予約完了_携帯
    type: termination
    termination_ref: "END_予約完了_携帯"

  - step: END_予約完了_WEB案内
    type: termination
    termination_ref: "END_予約完了_WEB案内"

  # === 日時変更ルート ===
  - step: 予約日_変更
    type: hearing
    output_format: datetime
    next: 受診希望日_変更

  - step: 受診希望日_変更
    type: hearing
    output_format: datetime
    next: 希望時間_変更

  - step: 希望時間_変更
    type: hearing
    output_format: datetime
    next: 氏名聴取_変更

  - step: 氏名聴取_変更
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$氏名聴取_20260507"
    next: 生年月日聴取_変更

  - step: 生年月日聴取_変更
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$生年月日聴取_20260507"
    next: 電話番号聴取_変更

  - step: 電話番号聴取_変更
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$電話番号聴取_20260507"
    next: 営業時間判定_変更

  - step: 営業時間判定_変更
    type: script
    script_template: business_hours
    template_params:
      START_HOUR: 8
      END_HOUR: 16
    conditions:
      - match: "SUCCESS"
        next: END_変更_受付内
      - match: "other"
        next: END_変更_受付外

  - step: END_変更_受付内
    type: termination
    termination_ref: "END_変更_受付内"

  - step: END_変更_受付外
    type: termination
    termination_ref: "END_変更_受付外"

  # === キャンセルルート ===
  - step: 予約日_キャンセル
    type: hearing
    output_format: datetime
    next: 氏名聴取_キャンセル

  - step: 氏名聴取_キャンセル
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$氏名聴取_20260507"
    next: 生年月日聴取_キャンセル

  - step: 生年月日聴取_キャンセル
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$生年月日聴取_20260507"
    next: 電話番号聴取_キャンセル

  - step: 電話番号聴取_キャンセル
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$電話番号聴取_20260507"
    next: END_キャンセル

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  # === 企業問合せルート ===
  - step: 企業_問合せ_内容
    type: hearing
    output_format: text
    next: 企業名_担当者名

  - step: 企業名_担当者名
    type: hearing
    output_format: text
    next: 企業_連絡先電話番号

  - step: 企業_連絡先電話番号
    type: hearing
    output_format: text
    next: 営業時間判定_企業

  - step: 営業時間判定_企業
    type: script
    script_template: business_hours
    template_params:
      START_HOUR: 8
      END_HOUR: 16
    conditions:
      - match: "SUCCESS"
        next: END_企業問合せ_受付内
      - match: "other"
        next: END_企業問合せ_受付外

  - step: END_企業問合せ_受付内
    type: termination
    termination_ref: "END_企業問合せ_受付内"

  - step: END_企業問合せ_受付外
    type: termination
    termination_ref: "END_企業問合せ_受付外"

  # === 問い合わせルート ===
  - step: 問合せ_内容
    type: hearing
    output_format: text
    next: 氏名聴取_問合せ

  - step: 氏名聴取_問合せ
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$氏名聴取_20260507"
    next: 生年月日聴取_問合せ

  - step: 生年月日聴取_問合せ
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$生年月日聴取_20260507"
    next: 電話番号聴取_問合せ

  - step: 電話番号聴取_問合せ
    type: subflow
    flowname: "新潟県けんこう財団長岡_健診2$電話番号聴取_20260507"
    next: 営業時間判定_問合せ

  - step: 営業時間判定_問合せ
    type: script
    script_template: business_hours
    template_params:
      START_HOUR: 8
      END_HOUR: 16
    conditions:
      - match: "SUCCESS"
        next: END_問合せ_受付内
      - match: "other"
        next: END_問合せ_受付外

  - step: END_問合せ_受付内
    type: termination
    termination_ref: "END_問合せ_受付内"

  - step: END_問合せ_受付外
    type: termination
    termination_ref: "END_問合せ_受付外"

