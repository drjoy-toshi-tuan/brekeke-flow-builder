        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理(各ルート完了) 2=代表案内(非通知/WEB案内) 3=聴取失敗 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件_確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "健診予約"
      - "日時変更"
      - "キャンセル"
      - "企業問合せ"
      - "問い合わせ"
    notes: "DTMF 1=健診予約 / 2=日時変更 / 3=キャンセル / 4=企業問合せ / 5=問い合わせ。Gen1 で復唱あり（用件の復唱（新規）等）→ echo_back: true"

  - order: 2
    name: "受診票_確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "history"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "DTMF 1=はい（あり） / 2=いいえ（なし）。Gen1 では分岐に使わず context 保存のみ。Gen3 でも同等（next は単線で 電話番号聴取_予約 へ）"

  - order: 3
    name: "予約日_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "現在の予約日。DTMF 4 桁（例: 4月15日 → 0415）。Gen1 `予約日聞き取り.yaml` で `<? $予約日の読み ?>` 復唱あり"

  - order: 4
    name: "受診希望日_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "desiredDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "変更希望日。DTMF 4 桁。Gen1 `受診希望日聞き取り.yaml` で `<? $予約希望日の読み ?>` 復唱あり、当日 10:30 締切 / 翌営業日以降ルール"

  - order: 5
    name: "希望時間_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "desiredTime"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "希望時間。DTMF 4 桁（例: 9時30分 → 0930）。Gen1 `希望時間聞き取り.yaml` で復唱あり、30 分単位制約 / 4-12月 7:00-13:30 / 1-3月 8:00-13:30 / 11:00-12:30 は予約不可。OpenAI 正規化プロンプトで吸収"

  - order: 6
    name: "予約日_キャンセル"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "現在の予約日。DTMF 4 桁。Gen1 `予約日聞き取り.yaml` で復唱あり"

  - order: 7
    name: "企業_問合せ_内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "企業問合せルートのみ。フリーテキスト。Gen1 `内容聞き取り.yaml` 「お問い合わせの内容をお話ください」"

  - order: 8
    name: "企業名_担当者名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "companyName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "企業問合せルートのみ。フリーテキスト。Gen1 `企業名、担当者名聞き取り.yaml` 「企業または法人名と、ご担当者のお名前をお話ください」"

  - order: 9
    name: "企業_連絡先電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "companyPhone"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "企業問合せルートのみ。DTMF 11 桁。Gen1 `企業：連絡先電話番号聞き取り.yaml` で復唱あり"

  - order: 10
    name: "問合せ_内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "問い合わせルートのみ。フリーテキスト。Gen1 `内容聞き取り.yaml` 「お問い合わせの内容をお話ください」"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件_確認"
    tts_announcement: "ご用件を、次の5つのうちの、いずれかでお話ください。1「健診の予約」、2「予約日時の変更」、3「予約のキャンセル」、4「企業ご担当者様からの問い合わせ」、5「その他お問い合わせ」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "健診予約"
        - "日時変更"
        - "キャンセル"
        - "企業問合せ"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 / 「健診の予約」「予約」「健康診断の予約」「人間ドックの予約」「特定健診」「雇入れ時健康診断」「新規予約」等"
          output: "健診予約"
        - input: "DTMF 2 / 「予約日時の変更」「変更」「日程」「日付」「変えたい」「取り直したい」等"
          output: "日時変更"
        - input: "DTMF 3 / 「キャンセル」「取り消し」「やめる」「取消」等"
          output: "キャンセル"
        - input: "DTMF 4 / 「企業ご担当者様からの問い合わせ」「企業」「会社」「法人」「団体」「集団」「企業担当」「担当者」等"
          output: "企業問合せ"
        - input: "DTMF 5 / 「その他お問い合わせ」「問い合わせ」「お伺いしたい」「料金」「金額」「検査結果」「アクセス」「忘れた」「なくした」等"
          output: "問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "Pattern A 直接分岐（受診票_確認 / 予約日_変更 / 予約日_キャンセル / 企業_問合せ_内容 / 問合せ_内容）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "受診票_確認"
    tts_announcement: "「健康診断受診のお知らせ」は、お手元にございますか？お持ちの方は1、お持ちでない方は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 / 「はい」「あります」「持っています」「持ってまーす」等"
          output: "あり"
        - input: "DTMF 2 / 「いいえ」「ない」「ありません」「持っていません」「持ってない」「もっていない」等"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "history"
    next_step: "電話番号聴取_予約（あり/なし いずれも同じ次へ。context 保存のみ・分岐に使用しない）"
    retry_failure: "end_failure"

  - step_name: "予約日_変更"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話ください。プッシュボタンの場合は、月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY-MM-DD HH:MM 形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "「12月25日」等の日付発話 / DTMF 4 桁（例: 1225）"
          output: "YYYY-MM-DD 形式に正規化（HH:MM は 00:00 固定）"
        - input: "日付として認識できない発話"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない発話"
    save_to: "reservationDate"
    next_step: "受診希望日_変更"
    retry_failure: "end_failure"

  - step_name: "受診希望日_変更"
    tts_announcement: "受診希望日を「4月1日」のように日付でお話ください。プッシュボタンの場合は、月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY-MM-DD HH:MM 形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "「12月25日」「来週の月曜」等の日付発話 / DTMF 4 桁"
          output: "YYYY-MM-DD 形式に正規化"
        - input: "日付として認識できない発話"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない発話"
    save_to: "desiredDate"
    next_step: "希望時間_変更"
    retry_failure: "end_failure"

  - step_name: "希望時間_変更"
    tts_announcement: "ご希望の時間を「9時30分」のように30分単位でお話ください。プッシュボタンの場合は、時間と分の4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "HH:MM 形式の時間"
        - "NO_RESULT"
      mapping:
        - input: "「9時30分」「10時」等の時間発話 / DTMF 4 桁（例: 0930）"
          output: "HH:MM 形式に正規化（30 分単位、4-12月: 7:00-13:30 / 1-3月: 8:00-13:30、11:00-12:30 は受付不可の旨案内）"
        - input: "時間として認識できない発話"
          output: "NO_RESULT"
      no_result_condition: "時間として認識できない発話 / 30 分単位以外"
    save_to: "desiredTime"
    next_step: "氏名聴取_変更"
    retry_failure: "end_failure"

  - step_name: "予約日_キャンセル"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話ください。プッシュボタンの場合は、月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY-MM-DD HH:MM 形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "「12月25日」等の日付発話 / DTMF 4 桁"
          output: "YYYY-MM-DD 形式に正規化"
        - input: "日付として認識できない発話"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない発話"
    save_to: "reservationDate"
    next_step: "氏名聴取_キャンセル"
    retry_failure: "end_failure"

  - step_name: "企業_問合せ_内容"
    tts_announcement: "お問い合わせの内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（要約してそのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "企業名_担当者名"
    retry_failure: "skip"

  - step_name: "企業名_担当者名"
    tts_announcement: "企業または法人名と、ご担当者のお名前をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "companyName"
    next_step: "企業_連絡先電話番号"
    retry_failure: "skip"

  - step_name: "企業_連絡先電話番号"
    tts_announcement: "ご連絡先のお電話番号を、固定電話の場合は市外局番からお話ください。プッシュボタンでの入力もできます。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "10〜11 桁の数字列"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 数字入力 / 「090...」「03-1234-5678」等の電話番号発話"
          output: "ハイフンなし数字列に正規化"
        - input: "数字入力なし / 電話番号として認識できない"
          output: "NO_RESULT"
      no_result_condition: "数字入力がない / 電話番号として認識できない"
    save_to: "companyPhone"
    next_step: "営業時間判定_企業"
    retry_failure: "end_failure"

  - step_name: "問合せ_内容"
    tts_announcement: "お問い合わせの内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（要約してそのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "氏名聴取_問合せ"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（祝日除く月〜土 8:00 - 16:00 以外）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。予約専用ダイヤルの受付時間は、祝日を除く、月曜日から土曜日の8時から16時となっております。恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件・受診票・予約日・希望日・希望時間・企業連絡先 等）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 健診予約ルート（携帯/その他で SMS or WEB 案内に分岐）---
  - name: "END_予約完了_携帯"
    condition: "健診予約：電話番号サブフローで携帯番号取得"
    tts_announcement: "かしこまりました、ショートメールでWEB予約用のURLを送付いたします。URLをクリックし、お申し込みをお願いいたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約完了_携帯"

  - name: "END_予約完了_WEB案内"
    condition: "健診予約：電話番号サブフローで非携帯（その他）"
    tts_announcement: "恐れ入りますが、健康診断のお知らせが届いていない方、または携帯番号をお持ちでない方は、ホームページのWEB予約からお申込みください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_予約完了_WEB案内"

  # --- 日時変更ルート（営業時間内/外で文言切替）---
  - name: "END_変更_受付内"
    condition: "日時変更：聴取終了 かつ 入電時刻が営業時間内（月-土 8:00-16:00）"
    tts_announcement: "内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_変更_受付内"

  - name: "END_変更_受付外"
    condition: "日時変更：聴取終了 かつ 入電時刻が営業時間外"
    tts_announcement: "当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_変更_受付外"

  # --- キャンセルルート（時間によらず固定）---
  - name: "END_キャンセル"
    condition: "キャンセル：聴取終了"
    tts_announcement: "ご予約のキャンセルを承りました。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_キャンセル"

  # --- 企業問合せルート（営業時間内/外で文言切替）---
  - name: "END_企業問合せ_受付内"
    condition: "企業問合せ：聴取終了 かつ 入電時刻が営業時間内"
    tts_announcement: "内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_企業問合せ_受付内"

  - name: "END_企業問合せ_受付外"
    condition: "企業問合せ：聴取終了 かつ 入電時刻が営業時間外"
    tts_announcement: "当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_企業問合せ_受付外"

  # --- 問い合わせルート（営業時間内/外で文言切替）---
  - name: "END_問合せ_受付内"
    condition: "問い合わせ：聴取終了 かつ 入電時刻が営業時間内"
    tts_announcement: "内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_問合せ_受付内"

  - name: "END_問合せ_受付外"
    condition: "問い合わせ：聴取終了 かつ 入電時刻が営業時間外"
    tts_announcement: "当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_問合せ_受付外"

# --- smsFlag分岐設計 ---
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "phonetype"
  patterns:
    - condition: "classification=健診予約 かつ phonetype=携帯"
      sms_flag: "1"
      notes: "WEB予約 URL を SMS で送信"
    - condition: "classification=健診予約 かつ phonetype=その他"
      sms_flag: "-1"
      notes: "WEB案内アナウンスのみ・SMS なし"
    - condition: "classification=日時変更 / キャンセル / 企業問合せ / 問い合わせ"
      sms_flag: "-1"
      notes: "SMS 送信なし"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "営業日の冒頭施設案内"
    announcement: "お電話ありがとうございます。長岡健康管理センターの、予約専用、AI電話です。"

  - module_name: "用件_確認"
    purpose: "用件 5 分岐の聴取アナウンス"
    announcement: "ご用件を、次の5つのうちの、いずれかでお話ください。1「健診の予約」、2「予約日時の変更」、3「予約のキャンセル」、4「企業ご担当者様からの問い合わせ」、5「その他お問い合わせ」、それでは、お話ください。"

  - module_name: "受診票_確認"
    purpose: "受診票有無確認"
    announcement: "「健康診断受診のお知らせ」は、お手元にございますか？お持ちの方は1、お持ちでない方は2を押してください。"

  - module_name: "予約日_変更"
    purpose: "現在の予約日聴取（変更ルート）"
    announcement: "現在の予約日を「4月1日」のように日付でお話ください。プッシュボタンの場合は、月と日にちの4桁の数字を入力してください。"

  - module_name: "受診希望日_変更"
    purpose: "受診希望日聴取（変更ルート）"
    announcement: "受診希望日を「4月1日」のように日付でお話ください。プッシュボタンの場合は、月と日にちの4桁の数字を入力してください。"

  - module_name: "希望時間_変更"
    purpose: "希望時間聴取（変更ルート）"
    announcement: "ご希望の時間を「9時30分」のように30分単位でお話ください。プッシュボタンの場合は、時間と分の4桁の数字を入力してください。"

  - module_name: "予約日_キャンセル"
    purpose: "現在の予約日聴取（キャンセルルート）"
    announcement: "現在の予約日を「4月1日」のように日付でお話ください。プッシュボタンの場合は、月と日にちの4桁の数字を入力してください。"

  - module_name: "企業_問合せ_内容"
    purpose: "企業問合せ内容聴取"
    announcement: "お問い合わせの内容をお話ください。"

  - module_name: "企業名_担当者名"
    purpose: "企業名・担当者名聴取"
    announcement: "企業または法人名と、ご担当者のお名前をお話ください。"

  - module_name: "企業_連絡先電話番号"
    purpose: "企業連絡先電話番号聴取"
    announcement: "ご連絡先のお電話番号を、固定電話の場合は市外局番からお話ください。プッシュボタンでの入力もできます。"

  - module_name: "問合せ_内容"
    purpose: "その他問合せ内容聴取"
    announcement: "お問い合わせの内容をお話ください。"

  # --- 終話 TTS ---
  - module_name: "END_非通知"
    purpose: "非通知着信時の終話"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  - module_name: "END_時間外"
    purpose: "営業時間外の終話"
    announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。予約専用ダイヤルの受付時間は、祝日を除く、月曜日から土曜日の8時から16時となっております。恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"

  - module_name: "END_聴取失敗"
    purpose: "聴取失敗時の終話"
    announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"

  - module_name: "END_予約完了_携帯"
    purpose: "健診予約・携帯番号取得時の終話（SMS 送信あり）"
    announcement: "かしこまりました、ショートメールでWEB予約用のURLを送付いたします。URLをクリックし、お申し込みをお願いいたします。お電話ありがとうございました。"

  - module_name: "END_予約完了_WEB案内"
    purpose: "健診予約・非携帯時の終話（WEB予約案内・SMS なし）"
    announcement: "恐れ入りますが、健康診断のお知らせが届いていない方、または携帯番号をお持ちでない方は、ホームページのWEB予約からお申込みください。お電話ありがとうございました。"

  - module_name: "END_変更_受付内"
    purpose: "日時変更・営業時間内の終話"
    announcement: "内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"

  - module_name: "END_変更_受付外"
    purpose: "日時変更・営業時間外の終話"
    announcement: "当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"

  - module_name: "END_キャンセル"
    purpose: "キャンセル完了の終話（時間によらず固定）"
    announcement: "ご予約のキャンセルを承りました。お電話ありがとうございました。"

  - module_name: "END_企業問合せ_受付内"
    purpose: "企業問合せ・営業時間内の終話"
    announcement: "内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"

  - module_name: "END_企業問合せ_受付外"
    purpose: "企業問合せ・営業時間外の終話"
    announcement: "当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"

  - module_name: "END_問合せ_受付内"
    purpose: "問い合わせ・営業時間内の終話"
    announcement: "内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"

  - module_name: "END_問合せ_受付外"
    purpose: "問い合わせ・営業時間外の終話"
    announcement: "当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"

