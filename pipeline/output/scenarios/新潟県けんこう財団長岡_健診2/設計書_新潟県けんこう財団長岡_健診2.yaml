# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1→Gen3 移管。元資料: commubo抽出/【033】新潟県けんこう財団｜【034】健昌会｜【035】新潟縣健康管理協会/【002新潟県けんこう財団(長岡用)】健診2_M_本番/"
  - "施設名は TTS 内では「長岡健康管理センター」固定。Gen1 main.yaml の `挨拶` 箱「長岡健康管理センターの、予約専用、AI電話です」をそのまま冒頭_アナウンスに転記"
  - "営業時間: 月曜〜土曜 8:00 - 16:00（祝日除く）。Gen1 `入電曜日時間判断.yaml` に基づく。Dr.JOY 側 acceptance_times に登録"
  - "終話の 2 段時間判定: 聴取後に script_template=business_hours で再度時刻チェック → 営業時間内/外で TTS 切替（移管ノート方針）"
  - "連休中（GW 5/1〜5/7、お盆 〜8/15 復帰 8/16）の専用アナウンスは Gen3 では持たない。Dr.JOY 側 acceptance_times の休業日設定で吸収する想定（NON-BLOCKER N-1。年度ごとに更新必要）"
  - "Gen1 の `（保留）折返し方法確認.yaml` は dead code として削除（移管ノート判断）"
  - "Gen1 の `入電番号未取得 → webページ案内へ` ルートは Gen3 標準電話番号サブフローの手入力フォールバックで代替（NON-BLOCKER N-8）"
  - "健診予約ルートは個人情報聴取（氏名・生年月日）を行わない。受診票確認 + 電話番号サブフロー → SMS / WEB 分岐のみ（Gen1 同等）"
  - "受診票有無は context 保存のみで分岐に使わない（Gen1 同等。Dr.JOY 画面表示用）"
  - "用件_確認 で復唱あり（echo_back: true）。Gen1 で `用件の復唱（新規）`「健診の予約、でよろしいですか？」など 5 種類の復唱が存在"
  - "予約日 / 受診希望日 / 希望時間 で復唱あり（echo_back: true）。Gen1 で `<? $予約日の読み ?>` 等の動的タグあり"
  - "希望時間の制約（30 分単位、4-12月: 7:00-13:30 / 1-3月: 8:00-13:30、11:00-12:30 は受付不可）は OpenAI 正規化プロンプトで吸収。範囲外なら NO_RESULT 扱い → リトライ"
  - "電話番号サブフローは標準（CLAUDE.md Rule 9 完全コピー）。健診予約ルートのみ post-subflow で ContextMatchRouter on phonetype を配置し、携帯/その他で SMS / WEB 終話に分岐"
  - "RAG/FAQ サブフローは不要（Gen1 に FAQ 機能なし、その他問い合わせは内容聴取で代替）"
  - "AmiVoice 辞書は Gen1 entity_stt_patch.json の標準テンプレート（hearing_yoken_common / hearing_yesno_common / hearing_phone_number / hearing_time / hearing_unknown / echo_back_yesno）を継承予定。本設計書の amivoice_dictionary には本フロー固有のものを列挙"

