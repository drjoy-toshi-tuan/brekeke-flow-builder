# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "電話番号サブフロー結果（phonetype: 1=携帯, 2=その他）"
    - "classification（用件区分: 変更/キャンセル/予約日時確認）"
  patterns:
    - condition: "phonetype=1(携帯) AND classification=変更"
      sms_flag: "1"
      notes: "END_変更_携帯 - ショートメール案内"
    - condition: "phonetype=1(携帯) AND classification=キャンセル"
      sms_flag: "1"
      notes: "END_キャンセル_携帯 - ショートメール案内"
    - condition: "phonetype=1(携帯) AND classification=予約日時確認"
      sms_flag: "1"
      notes: "END_確認_携帯 - ショートメール案内"
    - condition: "phonetype=2(その他) AND classification=変更"
      sms_flag: "-1"
      notes: "END_変更_固定 - 電話案内"
    - condition: "phonetype=2(その他) AND classification=キャンセル"
      sms_flag: "-1"
      notes: "END_キャンセル_固定 - 電話案内"
    - condition: "phonetype=2(その他) AND classification=予約日時確認"
      sms_flag: "-1"
      notes: "END_確認_固定 - 電話案内"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"
  inquiry_insertion_point: ""
  pre_termination: true
  notes: "Gen2→Gen3移管デフォルトはパターン3だが、用件メニューに問い合わせ選択肢がないためパターン1不適用。パターン2のみ適用（全終話前にRAGサブフロー配置）"

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # === メインフロー ===
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内"
    announcement: "お電話ありがとうございます。秋田県立循環器・脳脊髄センターのAI電話です。診察券番号をお手元にご用意のうえ、お電話をお願いします。このお電話は、約3分で完了します。"

  - module_name: "用件確認"
    purpose: "用件聴取案内（DTMF 3択）"
    announcement: "ご用件を、次の3つのうちの、いずれかでお話ください。1、予約変更。<break time=\"400ms\"/>2、予約キャンセル。<break time=\"400ms\"/>3、予約日時の確認。<break time=\"400ms\"/>それでは、お話ください。"

  - module_name: "診療科_聴取"
    purpose: "診療科聴取案内"
    announcement: "予約票に記載されている診療科をお話しください。どうぞ。"

  - module_name: "脳神経特定"
    purpose: "脳/脳神経の曖昧性解消"
    announcement: "脳神経外科ですか？脳神経内科ですか？"

  - module_name: "診療科2_聴取"
    purpose: "追加診療科聴取案内"
    announcement: "ほかに、ご予約の診療科があればお話ください。無い場合は、ない、とお話しください。どうぞ。"

  - module_name: "脳神経特定2"
    purpose: "診療科2の脳/脳神経の曖昧性解消"
    announcement: "脳神経外科ですか？脳神経内科ですか？"

  - module_name: "検査_聴取"
    purpose: "検査名聴取案内"
    announcement: "検査を予定されている方は、検査名をお話しください。検査が無い場合や分からない場合は、ありません、や、分かりません、のようにお話しください。どうぞ。"

  - module_name: "現在の予約日_聴取"
    purpose: "現在の予約日聴取案内"
    announcement: "現在の予約日を、4月1日、のように日付でお話ください。分からない場合には分からない、とお答えください。どうぞ。"

  - module_name: "変更希望日_聴取"
    purpose: "変更希望日聴取案内"
    announcement: "ご希望の変更日を、4月1日、のように日付でお話ください。どうぞ。"

  - module_name: "残薬確認_聴取"
    purpose: "残薬確認案内"
    announcement: "当院で処方されている方は、希望の予約変更日までのお薬が足りますか？はい、大丈夫です。<break time=\"400ms\"/>いいえ、足りません。<break time=\"400ms\"/>いずれかでお話ください。"

  - module_name: "キャンセル理由_聴取"
    purpose: "キャンセル理由聴取案内（DTMF 4択）"
    announcement: "次に、予約取り消しの理由を、次の4つのうちからお話ください。1、インフルエンザ、コロナ等、感染症のため。<break time=\"400ms\"/>2、体調変化のため。<break time=\"400ms\"/>3、他院へ入院中のため。<break time=\"400ms\"/>4、都合がつかないため。<break time=\"400ms\"/>それではお話ください。"

  # === 終話系 ===
