# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # === メインフロー聴取項目 ===
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "変更"
      - "キャンセル"
      - "予約日時確認"
    notes: "DTMF 1=変更, 2=キャンセル, 3=予約日時確認"

  - order: 2
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
