# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管案件。Gen2プロンプト（OpenAI対話型）からBrekeke IVRフロー構造への変換"
  - "用件3択（変更/キャンセル/予約日時確認）で大きく3ルートに分岐する複雑なフロー"
  - "予約日時確認ルートは診療科のみ聴取して個人情報へ進む（診療科2/検査/予約日をスキップ）"
  - "変更ルートは診療科→診療科2→検査→予約日→変更希望日→残薬確認→個人情報の順"
  - "キャンセルルートは診療科→診療科2→検査→予約日→キャンセル理由→個人情報の順"
  - "診療科で「脳」「脳神経」のみの入力時は脳神経外科/脳神経内科の特定ステップが発動"
  - "救急科が選択された場合は代表電話番号（018-833-0115）を案内して終話。変更/キャンセル両ルートの診療科/診療科2で発動しうる"
  - "終話1（携帯=SMS案内、smsFlag=1）と終話2（固定=電話案内、smsFlag=-1）の2系統x3用件=6パターンの正常終話"
  - "Gen2の終話2（キャンセル）と終話2（予約日時確認）のTTS文言はコピペ誤りと判断し修正（確認レポートN-6, N-7参照）"
  - "Gen2のstatus=9（非通知）はGen3標準のstatus=2に変換（確認レポートN-10参照）"
  - "Gen2のcheckpoint/endpoint/smsFlag/checkoutフィールドはsaveContextModel2DBから除外（Gen3非対応またはsaveCompletionFlag2dbパラメータ）"
  - "desiredReservationDate（変更希望日）はTEXT型。Gen2プロンプトで日付形式ではなくフリーテキストで格納と明記"
  - "RAGサブフローはパターン2（全終話前配置）。Gen2デフォルトのパターン3から変更（問い合わせ選択肢がないためパターン1不適用）"
  - "個人情報サブフロー4つ（氏名/生年月日_復唱なし/診察券番号/電話番号_復唱あり）+ RAG検索サブフロー = 計5サブフロー"
  - "acceptance_timesモジュールを配置。営業時間スケジュールはDr.JOY側で設定（設計書にはスケジュール詳細未記載）"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（Dr.JOY管理画面で確認）"
    resolved: false
  - item: "営業時間（曜日・時間帯）— Dr.JOY側設定"
    resolved: false
  - item: "smsFlag: 固定電話=smsFlag -1 に変更（Gen2はsmsFlag=1だが固定にSMS不可のため修正）"
    resolved: false
  - item: "血液内科の扱い（Gen2 enumにあるが診療科キーワードリストに記載なし。現在も有効か確認）"
    resolved: false
  - item: "終話2（キャンセル）のTTS文言コピペ誤り修正: 予約変更→予約キャンセル"
    resolved: false
  - item: "終話2（予約日時確認）のTTS文言コピペ誤り修正: 予約変更→ご予約に関するお問い合わせ"
    resolved: false
  - item: "時間外アナウンスの文言（施設固有の文言があれば差し替え）"
