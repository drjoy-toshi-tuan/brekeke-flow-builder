# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の3つのうちの、いずれかでお話ください。1、予約変更。<break time=\"400ms\"/>2、予約キャンセル。<break time=\"400ms\"/>3、予約日時の確認。<break time=\"400ms\"/>それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "予約日時確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「変更」「予約変更」を含む"
          output: "変更"
        - input: "DTMF 2 または「キャンセル」「取り消し」を含む"
          output: "キャンセル"
        - input: "DTMF 3 または「確認」「予約日時」を含む"
          output: "予約日時確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "診療科_聴取"
    retry_failure: "end_failure"

  - step_name: "診療科"
    tts_announcement: "予約票に記載されている診療科をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "脳神経外科"
        - "脊髄脊椎外科"
        - "脳神経内科"
        - "もの忘れ診療科"
        - "糖尿病・内分泌内科"
        - "循環器内科"
        - "心臓血管外科"
        - "脳血管内科"
        - "麻酔科"
        - "リハビリテーション科"
        - "放射線科"
        - "総合診療科"
        - "救急科"
        - "脳神経病理診断科"
        - "整形外科"
        - "脳曖昧"
        - "NO_RESULT"
      mapping:
        - input: "診療科リスト内の科名またはキーワードに一致"
          output: "該当する診療科名（正式名称）"
        - input: "「脳」のみ、または「脳神経」のみ（外科/内科が付かない）"
          output: "脳曖昧"
        - input: "該当診療科がリストにない場合"
          output: "NO_RESULT（近しい診療科をレコメンドするプロンプト指示あり）"
      no_result_condition: "診療科リスト内のいずれにも該当しない"
    save_to: "clinicalDepartment"
    next_step: "ContextMatchRouter_用件分岐1（予約日時確認→氏名サブフロー / 変更・キャンセル→診療科2）"
    retry_failure: "end_failure"

  - step_name: "脳神経特定"
    tts_announcement: "脳神経外科ですか？脳神経内科ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "脳神経外科"
        - "脳神経内科"
        - "NO_RESULT"
      mapping:
        - input: "「外科」「脳外」を含む"
          output: "脳神経外科"
        - input: "「内科」「脳内」を含む"
          output: "脳神経内科"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "clinicalDepartment"
    next_step: "ContextMatchRouter_用件分岐1"
    retry_failure: "end_failure"

  - step_name: "診療科2"
    tts_announcement: "ほかに、ご予約の診療科があればお話ください。無い場合は、ない、とお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "脳神経外科"
        - "脊髄脊椎外科"
        - "脳神経内科"
        - "もの忘れ診療科"
        - "糖尿病・内分泌内科"
        - "循環器内科"
        - "心臓血管外科"
        - "脳血管内科"
        - "麻酔科"
        - "リハビリテーション科"
        - "放射線科"
        - "総合診療科"
        - "救急科"
        - "脳神経病理診断科"
        - "整形外科"
        - "脳曖昧"
        - "ない"
        - "NO_RESULT"
      mapping:
        - input: "「ない」「なし」「ありません」等の否定表現"
          output: "ない"
        - input: "診療科リスト内の科名またはキーワードに一致"
          output: "該当する診療科名（正式名称）"
        - input: "「脳」のみ、または「脳神経」のみ"
          output: "脳曖昧"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "clinicalDepartment2"
    next_step: "検査_聴取"
    retry_failure: "skip"

  - step_name: "検査"
    tts_announcement: "検査を予定されている方は、検査名をお話しください。検査が無い場合や分からない場合は、ありません、や、分かりません、のようにお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "検査名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "検査名テキスト（フリーテキスト。ありません/分かりませんも含む）"
      no_result_condition: "音声認識結果が空"
    save_to: "inspection"
    next_step: "現在の予約日_聴取"
    retry_failure: "skip"

  - step_name: "現在の予約日"
    tts_announcement: "現在の予約日を、4月1日、のように日付でお話ください。分からない場合には分からない、とお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト"
      mapping:
        - input: "日付表現（月日、曜日等）"
          output: "YYYY-MM-DD 00:00形式。分からない場合はそのまま文字起こし"
      no_result_condition: "音声認識結果が空"
    save_to: "reservationDate"
    next_step: "ContextMatchRouter_用件分岐2（変更→変更希望日 / キャンセル→キャンセル理由）"
    retry_failure: "skip"

  - step_name: "変更希望日"
    tts_announcement: "ご希望の変更日を、4月1日、のように日付でお話ください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "希望日テキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（日付形式に変換しない。言われたまま文字起こし）"
      no_result_condition: "音声認識結果が空"
    save_to: "desiredReservationDate"
    next_step: "残薬確認_聴取"
    retry_failure: "skip"

  - step_name: "残薬確認"
    tts_announcement: "当院で処方されている方は、希望の予約変更日までのお薬が足りますか？はい、大丈夫です。<break time=\"400ms\"/>いいえ、足りません。<break time=\"400ms\"/>いずれかでお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「大丈夫」「足りる」等の肯定表現"
          output: "はい"
        - input: "「いいえ」「足りない」「足りません」等の否定表現"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "leftoverMedication"
    next_step: "サブフロー遷移_氏名"
    retry_failure: "skip"

  - step_name: "キャンセル理由"
    tts_announcement: "次に、予約取り消しの理由を、次の4つのうちからお話ください。1、インフルエンザ、コロナ等、感染症のため。<break time=\"400ms\"/>2、体調変化のため。<break time=\"400ms\"/>3、他院へ入院中のため。<break time=\"400ms\"/>4、都合がつかないため。<break time=\"400ms\"/>それではお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "感染症"
        - "体調変化"
        - "他院入院"
        - "都合"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「感染症」「インフルエンザ」「コロナ」を含む"
          output: "感染症"
        - input: "DTMF 2 または「体調」「体調変化」を含む"
          output: "体調変化"
        - input: "DTMF 3 または「入院」「他院」を含む"
          output: "他院入院"
        - input: "DTMF 4 または「都合」「つかない」を含む"
          output: "都合"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "reason"
    next_step: "サブフロー遷移_氏名"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "大変恐れ入りますが、当窓口は、非通知でのお電話を承ることができません。電話番号の前に、186をつけて再度お電話をお掛け直しください。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定"
    tts_announcement: "お電話ありがとうございます。秋田県立循環器・脳脊髄センターです。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件確認/診療科）"
    tts_announcement: "ご回答の確認ができませんでしたのでこちらからお電話失礼させていただきます。それでは失礼いたします。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  - name: "END_救急科案内"
    condition: "診療科または診療科2で救急科が選択された場合"
    tts_announcement: "救急科の受付はAI電話では実施しておりません。恐れ入りますが、秋田循環器・脳脊髄センター代表電話へおかけ直しください。番号は、018-833-0115です。繰り返します、番号は、018-833-0115です。繰り返します、番号は、018-833-0115です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_救急科"

  # --- 正常系（携帯 = 終話1 = SMS案内）---
  - name: "END_変更_携帯"
    condition: "用件=変更 かつ 電話番号サブフロー結果=携帯"
    tts_announcement: "予約変更の申し込みを受付いたしました。職員からの折り返しをもって申し込みは確定します。3診療日以内にショートメールにてご連絡いたします。ショートメール記載のURLを必ずご確認ください。他にご質問がないようでしたら、このままお電話をお切りください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_携帯"

  - name: "END_キャンセル_携帯"
    condition: "用件=キャンセル かつ 電話番号サブフロー結果=携帯"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。職員からの折り返しをもって申し込みは確定します。3診療日以内にショートメールにてご連絡いたします。ショートメール記載のURLを必ずご確認ください。他にご質問がないようでしたら、このままお電話をお切りください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_携帯"

  - name: "END_確認_携帯"
    condition: "用件=予約日時確認 かつ 電話番号サブフロー結果=携帯"
    tts_announcement: "ご予約に関するお問い合わせを受付いたしました。職員からの折り返しをもって申し込みは確定します。3診療日以内にショートメールにてご連絡いたします。ショートメール記載のURLを必ずご確認ください。他にご質問がないようでしたら、このままお電話をお切りください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_携帯"

  # --- 正常系（固定 = 終話2 = 電話案内）---
  - name: "END_変更_固定"
    condition: "用件=変更 かつ 電話番号サブフロー結果=固定"
    tts_announcement: "予約変更の申し込みを受付いたしました。職員からの折り返しをもって申し込みは確定します。3診療日以内に電話にてご連絡いたします。他にご質問がないようでしたら、このままお電話をお切りください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_固定"

  - name: "END_キャンセル_固定"
    condition: "用件=キャンセル かつ 電話番号サブフロー結果=固定"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。職員からの折り返しをもって申し込みは確定します。3診療日以内に電話にてご連絡いたします。他にご質問がないようでしたら、このままお電話をお切りください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_固定"

