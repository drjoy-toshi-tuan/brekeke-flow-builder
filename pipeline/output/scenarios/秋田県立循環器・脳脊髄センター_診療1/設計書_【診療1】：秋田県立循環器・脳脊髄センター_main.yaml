    notes: "termination: return。復唱なし（Gen2プロンプトで生年月日は復唱例外対象外）"

  - flow_name: "秋田県立循環器・脳脊髄センター$診察券番号聴取_20260414"
    diagram: |
      CLAUDE.md Rule 9 完全コピー対象
      docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピーする。
