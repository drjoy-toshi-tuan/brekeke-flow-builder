# --- セクション3: フローの目的 ---
purpose: "患者からの電話を受け、用件（予約変更・予約キャンセル・予約日時確認）を確認し、診療科・検査・予約日等の業務情報と患者個人情報（氏名・生年月日・診察券番号・連絡先電話番号）を聴取して折り返し受付を自動化する。救急科は代表電話番号を案内して終話する。連絡先が携帯の場合はSMS案内、固定電話の場合は電話案内の終話文言を使い分ける。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "秋田県立循環器・脳脊髄センター$診療1_20260414"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(saveCompletionFlag2db, status=2, smsFlag=-1) → 非通知_アナウンス(TTS) → 切断
            └─ 通常/携帯/固定 → acceptance_times
                          ├─ 時間外/TIMEOUT/ERROR → 完了フラグ_時間外(saveCompletionFlag2db, status=6, smsFlag=-1) → 時間外_アナウンス(TTS) → 切断
                          └─ 受付可(true) → 冒頭_アナウンス(TTS)
                                              → 用件確認(TTS) → 入力_用件確認(DTMF AmiVoice STT, max_dtmf_length=1)
                                              → OpenAI_用件確認(classify: 変更/キャンセル/予約日時確認)
                                                  ├─ 変更/キャンセル/予約日時確認 → 診療科_聴取
                                                  └─ NO_RESULT → リトライ_用件確認
                                                                    ├─ Retry → 用件確認(TTS)
                                                                    └─ No more → 完了フラグ_聴取失敗 → END_聴取失敗(TTS) → 切断

      ─── 診療科聴取（全用件共通）───
      診療科_聴取(TTS) → 入力_診療科(AmiVoice STT) → OpenAI_診療科(classify)
          ├─ 救急科 → 完了フラグ_救急科(saveCompletionFlag2db, status=2, smsFlag=-1) → END_救急科案内(TTS) → 切断
          ├─ 脳曖昧 → 脳神経特定(TTS) → 入力_脳神経特定(AmiVoice STT) → OpenAI_脳神経特定(classify: 脳神経外科/脳神経内科)
          │            → ContextMatchRouter_用件分岐1
          ├─ {診療科名} → ContextMatchRouter_用件分岐1
          └─ NO_RESULT → リトライ_診療科
                            ├─ Retry → 診療科_聴取(TTS)
                            └─ No more → 完了フラグ_聴取失敗 → END_聴取失敗(TTS) → 切断

      ─── 用件別分岐1（診療科2以降 or 患者名へ直行）───
      ContextMatchRouter_用件分岐1 (参照: OpenAI_用件確認)
          ├─ 予約日時確認 → ★サブフロー遷移_氏名
          └─ 変更/キャンセル(default) → 診療科2_聴取

      ─── 診療科2聴取（変更/キャンセルルートのみ）───
      診療科2_聴取(TTS) → 入力_診療科2(AmiVoice STT) → OpenAI_診療科2(classify)
          ├─ 救急科 → 完了フラグ_救急科 → END_救急科案内(TTS) → 切断
          ├─ 脳曖昧 → 脳神経特定2(TTS) → 入力_脳神経特定2 → OpenAI_脳神経特定2 → 検査_聴取
          ├─ ない → 検査_聴取
          ├─ {診療科名} → 検査_聴取
          └─ NO_RESULT → リトライ_診療科2
                            ├─ Retry → 診療科2_聴取(TTS)
                            └─ No more → 検査_聴取（リトライ失敗時は次へスキップ）

      ─── 検査聴取 ───
      検査_聴取(TTS) → 入力_検査(AmiVoice STT) → OpenAI_検査(normalize) → 現在の予約日_聴取

      ─── 現在の予約日聴取 ───
      現在の予約日_聴取(TTS) → 入力_現在の予約日(AmiVoice STT) → OpenAI_現在の予約日(convert)
          → ContextMatchRouter_用件分岐2 (参照: OpenAI_用件確認)
              ├─ 変更 → 変更希望日_聴取
              └─ キャンセル(default) → キャンセル理由_聴取

      ─── 変更ルート固有 ───
      変更希望日_聴取(TTS) → 入力_変更希望日(AmiVoice STT) → OpenAI_変更希望日(normalize)
          → 残薬確認_聴取(TTS) → 入力_残薬確認(AmiVoice STT) → OpenAI_残薬確認(classify: はい/いいえ)
              → ★サブフロー遷移_氏名

      ─── キャンセルルート固有 ───
      キャンセル理由_聴取(TTS) → 入力_キャンセル理由(DTMF AmiVoice STT, max_dtmf_length=1) → OpenAI_キャンセル理由(classify)
          → ★サブフロー遷移_氏名

      ─── 個人情報サブフロー遷移チェーン（3ルートの合流点）───
      ★サブフロー遷移_氏名 = Custom Jump to Flow → 氏名聴取サブフロー（.*で1本受け）
          → Custom Jump to Flow → 生年月日聴取サブフロー（.*で1本受け）
              → Custom Jump to Flow → 診察券番号聴取サブフロー（.*で1本受け）
                  → Custom Jump to Flow → 電話番号聴取サブフロー（結果: 1=携帯, 2=その他）
                      → Custom Jump to Flow → RAG検索サブフロー（.*で1本受け）

      ─── smsFlag分岐 + 用件別終話 ───
      RAG検索結果返却後
          → ContextMatchRouter_携帯固定分岐 (参照: JumpToFlow_電話番号聴取, condition: 1=携帯/2=その他)
              ├─ 1(携帯) → 完了フラグ_受付完了_携帯(saveCompletionFlag2db, status=1, smsFlag=1)
              │               → ContextMatchRouter_用件別終話_携帯 (参照: OpenAI_用件確認)
              │                   ├─ 変更 → END_変更_携帯(TTS) → 切断
              │                   ├─ キャンセル → END_キャンセル_携帯(TTS) → 切断
              │                   └─ 予約日時確認(default) → END_確認_携帯(TTS) → 切断
              └─ 2/その他(default) → 完了フラグ_受付完了_固定(saveCompletionFlag2db, status=1, smsFlag=-1)
                                       → ContextMatchRouter_用件別終話_固定 (参照: OpenAI_用件確認)
                                           ├─ 変更 → END_変更_固定(TTS) → 切断
                                           ├─ キャンセル → END_キャンセル_固定(TTS) → 切断
                                           └─ 予約日時確認(default) → END_確認_固定(TTS) → 切断
    notes: |
      - 3ルート（予約日時確認は診療科後に直接個人情報へ、変更/キャンセルは業務固有聴取を挟む）が個人情報サブフロー遷移チェーンで合流
      - smsFlag分岐は電話番号サブフロー結果（1=携帯, 2=その他）で2段分岐し、さらに用件で3分岐
      - 合計10終話パターン: 携帯3 + 固定3 + 救急科案内 + 聴取失敗 + 非通知 + 時間外

  - flow_name: "秋田県立循環器・脳脊髄センター$氏名聴取_20260414"
    diagram: |
      CLAUDE.md Rule 9 完全コピー対象
