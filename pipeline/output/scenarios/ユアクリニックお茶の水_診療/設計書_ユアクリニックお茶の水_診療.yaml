  - item: "[N-7] 通話テストでの全 3 ルート（AI 時間内 / AI 時間外 / 代表転送）動作確認"
    resolved: false
    status: "TODO"
    assignee: "QA / 施設運用担当"
    notes: "script ブロック custom logic は実機検証が必須。本番投入前に時間帯ごとの分岐動作を実コールで確認"
