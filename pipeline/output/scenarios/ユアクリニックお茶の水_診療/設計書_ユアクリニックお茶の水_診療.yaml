  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "Q2 で聴取。氏名聴取サブフローで PatientName 取得（カタカナ変換済み）。小児科継承先のため subflow 内 OpenAI prompt に「お子様の場合は保護者からお子様のお名前を」のガイダンス補足"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
