  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "本フローでは診療科聴取なし。Dr.JOY デフォルト項目として保持"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
