# 設計書 — ユアクリニックお茶の水 診療
# 生成元: @director エージェント
# 生成日: 2026/05/07
# 確認レポート: output/scenarios/ユアクリニックお茶の水_診療/確認レポート_ユアクリニックお茶の水_診療_20260507.md
# ベース: docs/migration/gen1_ユアクリニックお茶の水_診療.md (Gen1→Gen3 移管) + commubo抽出 yaml 7 本
#
# 構造概要:
#   - 用件分類なしの単一トラック「3 質問問い合わせ受付」（ユアクリニック秋葉原と双子だが移転告知 TTS なし）
#   - 複雑な時間帯判定（祝日 + 2026 GW 特別日付 + 平日/土曜/祝日の時間帯ルール）を script (custom) ブロックに集約
#   - Q1=問い合わせ内容（hearing text）/ Q2=患者名（PatientName subflow）/ Q3=連絡先電話番号（電話番号 subflow）
#   - 時間外でも 3 質問受付を継続（時間外プレフィックス TTS → Q1）
#   - 一部時間帯は AI 受付ではなく代表電話に Blind Transfer
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "ユアクリニックお茶の水"
  scenario_name: "診療"
  group_name: "ユアクリニックお茶の水"
  flow_name: "ユアクリニックお茶の水$診療"
  target_facility: "ユアクリニックお茶の水（小児科継承先・本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "平日 8:30-19:00 / 土曜 8:30-17:00（時間帯別に AI 受付/代表転送/時間外を切替。詳細は scenario_flow.時間帯判定 の notes 参照）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "ユアクリニックお茶の水$診療"
      role: "main"
      description: "冒頭挨拶 → 時間帯判定（script: 祝日+GW+曜日+時間帯）→ 3 ルート（AI 時間内 / AI 時間外プレフィックス付き / 代表転送）→ Q1 問い合わせ内容（フリーテキスト）→ Q2 患者名（subflow）→ Q3 連絡先電話番号（subflow）→ 終話"

  subflows:
    - name: "ユアクリニックお茶の水$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的 JSON コピー。Gen1 仕様: 復唱なし（元 yaml は「ありがとうございます」と短い完了 TTS のみ）。**小児科継承先のため、PatientName エンティティ説明文に「お子様の場合は保護者からお子様のお名前を」を補足**（移管ノート director ノート対応）"

    - name: "ユアクリニックお茶の水$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10 準拠。静的 JSON コピー。incoming-classifier→携帯確認/連絡先聴取→Phone Normalization→復唱確認→携帯判別→結果返却。元 yaml の `連絡先聴取.yaml` + `電話番号区切り.yaml`（携帯3-4-4 / IP3-4-4 / 固定5-1-4 / 固定4-2-4 / 固定3-3-4 / 固定2-4-4）の桁数別区切りロジックはサブフロー内部の Phone Normalization に集約"

# --- セクション3: フローの目的 ---
purpose: "ユアクリニックお茶の水（小児科継承先）への問い合わせダイヤル。患者または保護者からの電話を受け、3 つの質問（問い合わせ内容・患者名・連絡先電話番号）を聴取して、内容確認後に院内スタッフが土日祝を除く 2 日以内に折り返し連絡する非同期受付フロー。複雑な時間帯ルールに基づき、AI 受付（時間内/時間外）または代表電話への Blind Transfer に振り分ける。新規予約・予約変更・診療科分岐は行わない（用件分類なし）。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "ユアクリニックお茶の水$診療"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(saveCompletionFlag2db, status=2, smsFlag=-1)
            │            → 非通知_アナウンス(TTS) → 切断
            └─ 通常/携帯/固定/その他 → 冒頭_アナウンス(TTS, 「お電話ありがとうございます。ユアクリニックお茶の水のAI電話です。」)
                          → 時間帯判定(script, custom: 祝日+2026GW+曜日+時間帯)
                              ├─ AI_時間内 → Q1_問い合わせ内容
                              ├─ AI_時間外 → 時間外_アナウンス(TTS) → Q1_問い合わせ内容
                              └─ 代表転送 → 代表転送_ガイダンス(TTS) → 代表転送(call_transfer Blind Transfer)

      ─── AI 受付ルート（3 質問）───
      Q1_問い合わせ内容(hearing, text, save_to=reason)
          TTS: 「全部で3つ質問をさせていただきます。まずは1つ目の質問です。本日のお問合せ内容をお話ください。それではどうぞ。」
        → Q2_アナウンス(announcement, 「かしこまりました。続いて、二つ目の質問です。」)
        → 氏名聴取(subflow PatientName)
        → Q3_アナウンス(announcement, 「それでは、最後の質問です。ご連絡先のお電話番号をお伺いします。」)
        → 電話番号聴取(subflow)
        → 完了フラグ_受付完了(saveCompletionFlag2db, status=1, smsFlag=1) → END_受付完了(TTS) → 切断

      ─── 代表電話転送ルート ───
      代表転送_ガイダンス(TTS, 「只今のお時間は、スタッフへお繋ぎいたします。代表電話に転送いたしますのでそのままお待ちください。」)
        → 代表転送(call_transfer, Blind Transfer)
            ├─ 成功 → 完了フラグ_転送成功(status=3) → END_転送成功 → 切断（scaffold 自動）
            └─ 失敗 → 転送失敗_アナウンス → 完了フラグ_転送失敗(status=9) → END_転送失敗 → 切断（scaffold 自動）

      ─── 異常系 ───
      Q1 retry 失敗 → END_聴取失敗(saveCompletionFlag2db, status=2, smsFlag=-1)
                       → 聴取失敗_アナウンス(TTS) → 切断
                       (Q2/Q3 サブフロー内 retry 失敗 → 代表転送 は IVR UI 手動追加。confirmation_items 参照)
    notes: |
      Gen1 commubo 構造を Gen3 9 ブロック型にマッピング:
        - 冒頭 3 箱（API_DRJOY_CONTEXT_SETTINGS / API_DRJOY / 挨拶）→ opening + 冒頭_アナウンス（2 ブロック 1 セット）
        - 時間判断.yaml + 3 回聞き取り失敗救済 時間判別.yaml → 単一 script ブロック（custom）に集約
        - 主流れ「AI ※時間外アナ有 announcement → 冒頭発話」は Q1 TTS 冒頭にマージして短縮
        - 用件分類なし（ユアクリニック秋葉原と同じ 3 質問構造、entity_classification.md の「予約キャンセル/予約以外」等は本フローでは未使用）
        - 代表電話転送先番号は properties マネージャー入力枠（confirmation_items N-1 参照）
        - 2026 年 GW 特別日付（4/29-5/6）は year-specific のため 2027 年以降は properties で更新運用（confirmation_items N-3 参照）

# --- セクション4c: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック（2 ブロック 1 セット必須）===
  - step: 冒頭
    type: opening
    use_acceptance_times: false   # 標準 acceptance_times は単純すぎるため、後段の script ブロックで全判定を実施
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 時間帯判定

  # === 時間帯判定（祝日 + 2026 GW 特別日付 + 平日/土曜/祝日の時間帯ルール）===
  - step: 時間帯判定
    type: script
    script_template: custom
    template_params:
      logic: |
        // 祝日カレンダー必須 + 2026 年 GW 特別日付 case 化 + 平日/土曜/祝日の 5 段階時間帯ブラケット判定。
        // 入力: addCurrentDate=Yes が現在の日付・曜日・時刻を Script に提供する想定。
        // 出力: "AI_時間内" / "AI_時間外" / "代表転送" のいずれか。
        //
        // ルール優先順位（上から順に評価）:
        //
        // 【1】2026 GW 特別日付（year-specific、2027 年以降は properties で更新運用）
        //   1-a) today == 2026-04-29 (水・祝): 8:30 <= time < 16:00 → "代表転送" / それ以外 → "AI_時間外"
        //   1-b) today == 2026-05-01 (金):     通常曜日扱い（=平日ルール【3】へ fallthrough）
        //   1-c) today == 2026-05-02 (土):     通常曜日扱い（=土曜ルール【4】へ fallthrough）
        //   1-d) today == 2026-05-03 (日・祝): 全日 "AI_時間外"
        //   1-e) today == 2026-05-04 (月・祝): 8:30 <= time < 13:00 → "代表転送" / それ以外 → "AI_時間外"
        //   1-f) today == 2026-05-05 (火・祝): 8:30 <= time < 16:00 → "代表転送" / それ以外 → "AI_時間外"
        //   1-g) today == 2026-05-06 (水・祝): 8:30 <= time < 13:00 → "代表転送" / それ以外 → "AI_時間外"
        //
        // 【2】祝日（祝日カレンダー、2026 GW 以外の祝日）
        //   - time < 8:30  → "AI_時間外"
        //   - 8:30 <= time < 11:00 → "AI_時間内"
        //   - 11:00 <= time < 13:00 → "代表転送"
        //   - 13:00 <= time → "AI_時間外"
        //
        // 【3】平日（月-金、祝日でない）
        //   - time < 8:30  → "AI_時間外"
        //   - 8:30 <= time < 11:00 → "代表転送"
        //   - 11:00 <= time < 15:00 → "AI_時間内"
        //   - 15:00 <= time < 17:00 → "代表転送"
        //   - 17:00 <= time < 19:00 → "AI_時間内"
        //   - 19:00 <= time → "AI_時間外"
        //
        // 【4】土曜（祝日でない）
        //   - time < 8:30  → "AI_時間外"
        //   - 8:30 <= time < 11:00 → "AI_時間内"
        //   - 11:00 <= time < 13:30 → "代表転送"
        //   - 13:30 <= time < 15:00 → "AI_時間内"
        //   - 15:00 <= time < 17:00 → "代表転送"
        //   - 17:00 <= time → "AI_時間外"
        //
        // 【5】日曜（祝日でない）
        //   - 全日 "AI_時間外"
    conditions:
      - match: "AI_時間内"
        next: Q1_問い合わせ内容
      - match: "AI_時間外"
        next: 時間外_アナウンス
      - match: "代表転送"
        next: 代表転送_ガイダンス
      - match: "other"
        next: 時間外_アナウンス
    notes: |
      カレンダー計算必須（祝日カレンダー＋施設固有の 2026 GW 特別日付 case 化）のため script_template: custom 採用。
      モジュール選定ガイド §3.8 の許容理由「祝日」「休館日」に該当。
      addCurrentDate=Yes により Brekeke が現在日時・曜日・祝日フラグを Script に注入する前提。
      2026 GW 特別日付（4/29 / 5/1 / 5/2 / 5/3 / 5/4 / 5/5 / 5/6）は year-specific のため、
      2027 年以降は properties マネージャーで logic ブロックの GW 特別日付セクションを年次更新する運用。
      動作未検証要素のため本番投入前に音声テストで全 3 ルートの分岐動作を確認すること。

  # === 時間外プレフィックスアナウンス（時間外でも 3 質問受付を継続）===
  - step: 時間外_アナウンス
    type: announcement
    next: Q1_問い合わせ内容

  # === Q1: 問い合わせ内容（フリーテキスト 1 本）===
  - step: Q1_問い合わせ内容
    type: hearing
    output_format: text
    save_to: reason
    next: Q2_アナウンス
    retry_failure: end_failure
    retry_failure_announcement: "{tts_g:申し訳ございません。うまく聞き取りができなかったため、後ほど担当者にて確認をいたします。}"

  # === Q2: 患者名（PatientName subflow + 前段アナウンス）===
  - step: Q2_アナウンス
    type: announcement
    next: 氏名聴取

  - step: 氏名聴取
    type: subflow
    flowname: "ユアクリニックお茶の水$氏名聴取"
    next: Q3_アナウンス

  # === Q3: 連絡先電話番号（電話番号 subflow + 前段アナウンス）===
  - step: Q3_アナウンス
    type: announcement
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "ユアクリニックお茶の水$電話番号聴取"
    next: END_受付完了

  # === 代表電話転送ルート ===
  - step: 代表転送_ガイダンス
    type: announcement
    next: 代表転送

  - step: 代表転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "{tts_g:只今お電話が込み合っております。恐れ入りますが、お時間を空けて再度おかけなおしください。}"

  # === 終話ブロック群 ===
  - step: END_受付完了
    type: termination
    termination_ref: "END_受付完了"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
