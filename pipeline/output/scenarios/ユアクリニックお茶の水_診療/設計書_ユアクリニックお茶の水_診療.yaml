# --- セクション11: 特記事項・制約 ---
special_notes:
  - "ユアクリニック秋葉原（移転元）の小児科継承先。フロー構造は秋葉原診療と双子（3 質問問い合わせ受付）だが、**移転告知 TTS なし** + **時間判断が 2026 年 GW 特別日付込みの最新版**"
  - "用件分類なし（全件＝問い合わせ預かりのみ）。OpenAI 用件分類 / 診療科聴取 / 予約日聴取 / 診察券聴取 / 生年月日聴取は使用しない"
  - "**時間外でも 3 質問受付を継続**: 時間外プレフィックス TTS（救急案内＋翌営業日終了までに連絡）→ Q1 進行。標準 acceptance_times モジュールは未使用、script ブロック「時間帯判定」で全判定"
  - "**2026 GW 特別日付（4/29-5/6）は year-specific**: 2027 年以降は properties マネージャーで logic ブロックの GW 特別日付セクションを年次更新する運用ルールを別途文書化（confirmation_items N-3）"
  - "**代表電話番号は properties マネージャー入力枠**: 元 yaml に番号の記載がないため、call_transfer.params.number は properties で別途設定（confirmation_items N-1）"
  - "**Q2/Q3 サブフロー内 retry 失敗時の代表転送は IVR UI 手動追加**: Custom Jump to Flow からは親フローの END / call_transfer に接続不可のため、サブフロー内で完結させる必要がある（confirmation_items N-4）"
  - "**Q1 retry 失敗時は切断扱い**: Gen1 元では call_transfer だが、Gen3 hearing block の retry_failure は skip / end_failure / disconnect のみ。end_failure → END_聴取失敗 で「うまく聞き取りができなかったため、後ほど担当者にて確認をいたします」と案内して切断する形に丸めた（confirmation_items N-5）"
  - "**小児科継承先の特殊事情**: 「患者 = 入電者の子」のケースが多いため、PatientName サブフロー内の OpenAI prompt に「お子様の場合は保護者からお子様のお名前を」のガイダンスを補足する"
  - "DTMF 入力なし（全 hearing は音声のみ）"
  - "RAG / FAQ サブフロー未使用"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "[N-1] 代表電話転送先電話番号 — properties マネージャー入力枠で設定（call_transfer.params.number）"
    resolved: false
    status: "TODO"
    assignee: "施設運用担当 / マネージャー"
    notes: "元 Gen1 yaml には番号の記載がない（`院内代表転送` サブシナリオが Blind Transfer 呼び出し前提）。施設に確認して properties に設定"

  - item: "[N-2] office_id（施設 ID）の確定"
    resolved: false
    status: "TODO"
    assignee: "Dr.JOY 管理者"
    notes: "Dr.JOY 管理画面で確認"

  - item: "[N-3] 2026 GW 特別日付 logic の 2027 年以降の年次更新運用ルール文書化"
    resolved: false
    status: "TODO"
    assignee: "運用チーム"
    notes: "script ブロック「時間帯判定」の template_params.logic 内 GW 特別日付セクションを毎年 4 月までに properties マネージャーで更新。祝日法改正にも対応"

  - item: "[N-4] サブフロー内 retry 上限到達時の代表転送 → Brekeke IVR UI で手動追加（氏名聴取 / 電話番号聴取 共通）"
    resolved: false
    status: "TODO"
    assignee: "人間（Brekeke IVR UI）"
    notes: "Custom Jump to Flow から親フローの call_transfer に接続不可。サブフロー内 retry_false パスに 聞取り失敗_転送ガイダンス TTS（「申し訳ございません、うまく認識ができませんでした。代表電話に転送いたしますのでそのままお待ちください。」）+ Blind Transfer モジュールを手動追加"

  - item: "[N-5] Q1 retry 上限到達時の挙動 — 代表転送に切り替えるか確認"
    resolved: false
    status: "TODO"
    assignee: "施設運用担当"
    notes: "現設計は END_聴取失敗（saveCompletionFlag2db status=2 → TTS → Disconnect）。Gen1 元仕様の代表転送に揃えたい場合は IVR UI 上で hearing の retry_false → call_transfer に手動配線する"

  - item: "[N-6] reason context の「理由」流用是非（Q1 問い合わせ内容のフリーテキスト保存先）"
