# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "Q1_問い合わせ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Q1 = 問い合わせ内容のフリーテキスト 1 本聴取（DTMF なし、音声のみ）。元 Gen1 yaml `問合せ内容聴取.yaml` の「発話あり/なし」「ご用件あり/なし」「5 秒無音」3 種チェックは Gen3 standard hearing block の no_speech / no_result で吸収。OpenAI は要約・正規化のみ（分岐なし）。retry 失敗時は END_聴取失敗 へ（confirmation_items N-5 参照）"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "{tts_g:お電話ありがとうございます。ユアクリニックお茶の水のAI電話です。}"
    input_method: "voice_only"
    next_step: "時間帯判定"
    retry_failure: "skip"

  - step_name: "時間外_アナウンス"
    tts_announcement: "{tts_g:ただいまのお時間は診療時間外です。救急の方は東京都医療機関案内サービス、ひまわり03-5272-0303におかけください。当院へお問い合わせの方は、この後にご用件をお伺いいたします。内容確認後、院内スタッフから翌営業日終了までにショートメッセージもしくはお電話にてご連絡いたします。}"
    input_method: "voice_only"
    next_step: "Q1_問い合わせ内容"
    retry_failure: "skip"

  - step_name: "Q1_問い合わせ内容"
    tts_announcement: "{tts_g:全部で3つ質問をさせていただきます。まずは1つ目の質問です。本日のお問合せ内容をお話ください。それではどうぞ。}"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "<フリーテキスト要約>"
      mapping:
        - input: "患者または保護者の自由発話（症状・診断書依頼・予約変更希望・処方薬問い合わせ 等）"
          output: "発話内容を 30〜60 字程度の要約テキストで保存"
      no_result_condition: "5 秒無音 / 認識不能"
    save_to: "reason"
    next_step: "Q2_アナウンス"
    retry_failure: "end_failure"
    retry_failure_announcement: "{tts_g:申し訳ございません。うまく聞き取りができなかったため、後ほど担当者にて確認をいたします。}"

  - step_name: "Q2_アナウンス"
    tts_announcement: "{tts_g:かしこまりました。続いて、二つ目の質問です。}"
    input_method: "voice_only"
    next_step: "氏名聴取"
    retry_failure: "skip"

  - step_name: "Q3_アナウンス"
    tts_announcement: "{tts_g:それでは、最後の質問です。ご連絡先のお電話番号をお伺いします。}"
    input_method: "voice_only"
    next_step: "電話番号聴取"
    retry_failure: "skip"

  - step_name: "代表転送_ガイダンス"
    tts_announcement: "{tts_g:只今のお時間は、スタッフへお繋ぎいたします。代表電話に転送いたしますのでそのままお待ちください。}"
    input_method: "voice_only"
    next_step: "代表転送"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系（デフォルト必須）===
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "{tts_g:恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。}"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（本フローでは時間外も AI 受付を継続するため、デフォルトとして配置のみ。実際の到達経路なし）"
    tts_announcement: "{tts_g:お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。}"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "Q1 retry 上限到達"
    tts_announcement: "{tts_g:申し訳ございません。うまく聞き取りができなかったため、後ほど担当者にて確認をいたします。お電話ありがとうございました。}"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 正常系 ===
  - name: "END_受付完了"
    condition: "Q1/Q2/Q3 全聴取完了（AI 時間内 / AI 時間外 共通）"
    tts_announcement: "{tts_g:ありがとうございます。質問は以上です。内容確認後、院内スタッフから土・日、祝日を除く二日以内にショートメッセージもしくはお電話にてご連絡いたします。お電話ありがとうございました。}"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # 本フローは AI 受付完了で常に SMS 送信（smsFlag=1）。代表転送ルートは status=3 で完了（SMS なし、saveCompletionFlag2db は scaffold が自動配置）。
  # SMS 送信あり/なしの分岐ロジックは不要。

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "施設名 + AI 電話案内（移転告知なし、ユアクリニック秋葉原版とは異なる）"
    announcement: "{tts_g:お電話ありがとうございます。ユアクリニックお茶の水のAI電話です。}"

  - module_name: "時間外_アナウンス"
    purpose: "時間外プレフィックス（時間外でも 3 質問受付を継続）"
    announcement: "{tts_g:ただいまのお時間は診療時間外です。救急の方は東京都医療機関案内サービス、ひまわり03-5272-0303におかけください。当院へお問い合わせの方は、この後にご用件をお伺いいたします。内容確認後、院内スタッフから翌営業日終了までにショートメッセージもしくはお電話にてご連絡いたします。}"

  - module_name: "Q1_問い合わせ内容"
    purpose: "Q1 = 冒頭発話マージ + 問い合わせ内容聴取（Gen1 「冒頭発話」+「問合せ内容確認」を統合）"
    announcement: "{tts_g:全部で3つ質問をさせていただきます。まずは1つ目の質問です。本日のお問合せ内容をお話ください。それではどうぞ。}"

  - module_name: "Q2_アナウンス"
    purpose: "Q2（患者名サブフロー）への前段アナウンス"
    announcement: "{tts_g:かしこまりました。続いて、二つ目の質問です。}"

  - module_name: "Q3_アナウンス"
    purpose: "Q3（電話番号サブフロー）への前段アナウンス"
    announcement: "{tts_g:それでは、最後の質問です。ご連絡先のお電話番号をお伺いします。}"

  - module_name: "代表転送_ガイダンス"
    purpose: "代表電話 Blind Transfer 前のアナウンス"
    announcement: "{tts_g:只今のお時間は、スタッフへお繋ぎいたします。代表電話に転送いたしますのでそのままお待ちください。}"

  # --- 終話 TTS ---
  - module_name: "END_受付完了"
    purpose: "AI 受付完了（土日祝除く 2 日以内に SMS または電話で折り返し連絡）"
    announcement: "{tts_g:ありがとうございます。質問は以上です。内容確認後、院内スタッフから土・日、祝日を除く二日以内にショートメッセージもしくはお電話にてご連絡いたします。お電話ありがとうございました。}"

  - module_name: "END_非通知"
    purpose: "非通知終話"
    announcement: "{tts_g:恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。}"

  - module_name: "END_時間外"
    purpose: "時間外終話（本フローでは未使用。デフォルト配置のみ）"
    announcement: "{tts_g:お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。}"

  - module_name: "END_聴取失敗"
    purpose: "Q1 retry 上限到達時の聴取失敗終話（Gen1 「END_戻る：聞取りできず」セリフ流用）"
    announcement: "{tts_g:申し訳ございません。うまく聞き取りができなかったため、後ほど担当者にて確認をいたします。お電話ありがとうございました。}"

