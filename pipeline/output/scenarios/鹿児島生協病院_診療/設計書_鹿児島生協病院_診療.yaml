    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "OpenAI 不要（text 保存）。STT 結果をそのまま保存"
    save_to: "DesiredreservationDate"
    next_step: "終話分岐_予約変更"
