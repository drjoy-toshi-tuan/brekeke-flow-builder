# 設計書 — 鹿児島生協病院 診療（眼科専用）
# 生成元: @director エージェント
# 生成日: 2026-04-22
# 作業種別: Gen2→Gen3移管
# 入力資料:
#   - docs/migration/gen2_鹿児島生協病院_診療.md（移管ノート）
#   - docs/reference/customer_docs/【診療1】：鹿児島生協病院.md（Gen2 元資料）
# 確認レポート: docs/designs/確認レポート_鹿児島生協病院_診療_2026-04-22.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "鹿児島生協病院"
  group_name: "鹿児島生協病院"
  flow_name: "鹿児島生協病院$診療"
  target_facility: "本院のみ（眼科専用）"
  office_id: "TODO_要確認"
  phone_number: "099-267-1455"
  business_hours: "月〜土 8:30-11:30、月・木 13:45-16:00（初診NG アナウンス内で案内。Dr.JOY 側で営業時間制御する場合は acceptance_times を無効化）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "鹿児島生協病院$診療"
      role: "main"
      description: "眼科専用：再診予約・予約変更・予約キャンセル・予約確認の受付（初診は弾く）"
  subflows:
    - name: "鹿児島生協病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "患者氏名（patientName）。復唱禁止（元資料 1-9 明記）"
    - name: "鹿児島生協病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        連絡先電話番号（additionalPhoneNumber）。
        incoming-classifier で携帯/固定/IP/非通知を 3 分岐。
        携帯は着信番号を自動格納して「今おかけいただいている番号でよろしいですか？」復唱。
        固定・IP・非通知・携帯否定時は手動聴取→Phone Normalization→復唱確認。
        【手動タスク】サブフロー内リトライ 3 回失敗時に END_回答不可 TTS→切断を Brekeke IVR UI で追加すること。
    - name: "鹿児島生協病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        患者生年月日（patientDateOfBirth）。
        復唱文言は指定あり：「生年月日は{西暦4桁}年{1〜12の月}月{1〜31の日}日でよろしいですか？はい、そうです、または、いいえ、違います、のようにお答えください。」
        リトライ上限 2（2 回失敗でブランクセット→用件別フロー分岐へ skip）。

# --- セクション3: フローの目的 ---
purpose: |
  鹿児島生協病院・眼科専用の AI 電話応対。受診歴のある患者からの「再診予約」「予約変更」「予約キャンセル」「予約確認」の 4 用件を受付ける。
  初診（受診歴なし）患者は受付不可として受付時間を案内して終話。
  各用件で患者氏名・連絡先電話番号・生年月日を聴取し、用件別の追加項目（予約希望日・次回予約有無・問い合わせ内容）を聴取して Dr.JOY に受付情報を登録する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "鹿児島生協病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 → 切断
            └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times)
                                  ├─ 時間外 → END_時間外 → 切断
                                  └─ 受付可 → 冒頭_アナウンス(TTS)
                                                └─ 受診歴確認(hearing, Yes/No)
                                                      ├─ 無（初診） → END_初診受付不可 → 切断
                                                      └─ 有（再診） → 用件聴取(hearing, enum → classification)
                                                            └─ 患者氏名聴取(subflow)
                                                                  → 患者電話番号聴取(subflow)
                                                                        → 患者生年月日聴取(subflow)
                                                                              → 用件別フロー分岐(context_match_router: classification)
                                                                                    ├─ 再診/変更 → 予約変更_希望日聴取(hearing, text)
                                                                                    │                 └─ 終話分岐_予約変更(context_match_router: classification)
                                                                                    │                       ├─ 再診 → END_受付完了_再診(smsFlag=1)
                                                                                    │                       └─ 変更 → END_受付完了_変更(smsFlag=1)
                                                                                    ├─ キャンセル → キャンセル_次回予約有無(hearing, enum → next_reservation)
                                                                                    │                   ├─ 有 → キャンセル_予約希望日(hearing, text)
                                                                                    │                   │          → 最終確認_追加問合せ(hearing, text)
                                                                                    │                   │              → END_キャンセル受付完了(smsFlag=2)
                                                                                    │                   └─ 無 → 最終確認_追加問合せ(hearing, text)
                                                                                    │                              → END_キャンセル受付完了(smsFlag=2)
                                                                                    └─ 確認 → 確認_問い合わせ内容(hearing, text)
                                                                                                └─ END_受付完了_確認(smsFlag=1)
    notes: |
      - 診療科 clinicalDepartment は「眼科」を固定値で保存（scaffold/generator が opening 直後に saveContext2DB を挟む）
      - 電話番号サブフロー内の 3 回失敗時 END_回答不可 は confirmation_items の手動タスクで処理
      - DOB サブフロー内の 2 回失敗時はブランクセットで用件別フロー分岐へ skip

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 2 ブロック 1 セット ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 受診歴確認

  # --- 受診歴確認（Pattern A: OpenAI 直後分岐）---
  - step: 受診歴確認
    type: hearing
    output_format: enum
    conditions:
      - match: "有"
        next: 用件聴取
      - match: "無"
        next: END_初診受付不可

  # --- 用件聴取（Pattern B: 後段の用件別フロー分岐で処理。単線で次へ）---
  - step: 用件聴取
    type: hearing
    output_format: enum
    next: 患者氏名聴取

  # --- 個人情報聴取サブフロー 3 連 ---
  - step: 患者氏名聴取
    type: subflow
    flowname: "鹿児島生協病院$氏名聴取"
    next: 患者電話番号聴取

  - step: 患者電話番号聴取
    type: subflow
    flowname: "鹿児島生協病院$電話番号聴取"
    next: 患者生年月日聴取

  - step: 患者生年月日聴取
    type: subflow
    flowname: "鹿児島生協病院$生年月日聴取"
    next: 用件別フロー分岐

  # --- 用件別フロー分岐（Pattern B）---
  - step: 用件別フロー分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "キャンセル"
        next: キャンセル_次回予約有無
      - match: "確認"
        next: 確認_問い合わせ内容
      - match: "default"
        next: 予約変更_希望日聴取

  # --- 再診・変更ルート ---
  - step: 予約変更_希望日聴取
    type: hearing
    output_format: text
    next: 終話分岐_予約変更

  - step: 終話分岐_予約変更
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "再診"
        next: END_受付完了_再診
      - match: "変更"
        next: END_受付完了_変更

  # --- 確認ルート ---
  - step: 確認_問い合わせ内容
    type: hearing
    output_format: text
    next: END_受付完了_確認

  # --- キャンセルルート ---
  - step: キャンセル_次回予約有無
    type: hearing
    output_format: enum
    conditions:
      - match: "有"
        next: キャンセル_予約希望日
      - match: "無"
        next: 最終確認_追加問合せ

  - step: キャンセル_予約希望日
    type: hearing
    output_format: text
    next: 最終確認_追加問合せ

  - step: 最終確認_追加問合せ
    type: hearing
    output_format: text
    next: END_キャンセル受付完了

  # --- 終話ブロック群 ---
  - step: END_初診受付不可
    type: termination
    termination_ref: "END_初診受付不可"

  - step: END_受付完了_再診
    type: termination
    termination_ref: "END_受付完了_再診"

  - step: END_受付完了_変更
    type: termination
    termination_ref: "END_受付完了_変更"

  - step: END_受付完了_確認
    type: termination
    termination_ref: "END_受付完了_確認"

  - step: END_キャンセル受付完了
    type: termination
    termination_ref: "END_キャンセル受付完了"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "再診"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "確認"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分（眼科は初診を受付けないため「新規」「初診」は含まない）"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "患者氏名（カタカナ変換。復唱禁止）"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "Gen2 function で required だがフローでは聴取しない（空文字のまま dialogue_completed に渡す）"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values:
      - id: "1"
        order: "1"
        value: "眼科"
    item_default: true
    editable: true
    deletable: true
    notes: "眼科固定値（opening 直後の saveContext2DB で「眼科」を保存）"

  - context_name: "first_examination"
    context_name_jp: "受診歴"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "受診歴確認の結果（有/無）。初診弾きに使用"

  - context_name: "DesiredreservationDate"
    context_name_jp: "予約希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "フリーワード格納（日付形式に正規化しない。元資料 1-13 明記）"

  - context_name: "next_reservation"
    context_name_jp: "次回予約有無"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "キャンセル時のみ聴取（有/無）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "和暦対応。リトライ上限 2（2 回失敗でブランクセット→skip）"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "連絡先電話番号（聴取）。復唱あり"

  - context_name: "inquiry_details"
    context_name_jp: "問い合わせ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "キャンセル時の最終問い合わせ or 予約確認時の問い合わせ内容"

  - context_name: "question"
    context_name_jp: "最後の問い合わせ"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "確認用件時の問い合わせ内容（inquiry_details と重複するが Gen2 function 定義に従って保持）"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: true
    notes: "1=通話完了、2=代表案内（初診弾き含む）、6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "受診歴確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "first_examination"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: |
      Yes/No 救済語：肯定扱い=「肺 / いいです / が今 / PHVます / P」。
      否定扱い=「初めて / 不審 / 電気」（「不審」「電気」は「初診」扱いでもあるため否定に振る）。
      復唱禁止。

  - order: 2
    name: "用件聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "再診"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: |
      用件キーワード救済（classification 判定プロンプトに全部埋める）：
      「印刷/定期/新薬/再診/最新/禁忌/大変」→ 再診、
      「薬品」→ 変更、
      「キャンセル」→ キャンセル、
      「確認」→ 確認、
      「薬/お薬/要約/通訳/集約/契約/主役/服薬」→ 予約（文脈から用件を推定）、
      「不審/電気/でんき」→ 初診（再度「初診」扱いとなるが受診歴確認で既に弾き済のため通常ここには到達しない）。
      復唱禁止（但し近しい語のみ「〇〇でよろしいですか？」と確認してよい）。

  - order: 3
    name: "予約変更_希望日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "フリーワード格納（元資料 1-13 明記）。日付正規化しない。再診・変更共通ステップ。"

  - order: 4
    name: "確認_問い合わせ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "question"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約確認時の問い合わせ内容（自由テキスト）"

  - order: 5
    name: "キャンセル_次回予約有無"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "next_reservation"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "有"
      - "無"
    notes: |
      Yes/No 救済語同様（肺/いいです/が今/PHVます/P→肯定）。
      肯定→有（→キャンセル_予約希望日へ）、否定→無（→最終確認_追加問合せへ）。

  - order: 6
    name: "キャンセル_予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "キャンセル時の次回予約希望日（次回予約有無=有の場合のみ聴取）。フリーワード格納。"

  - order: 7
    name: "最終確認_追加問合せ"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inquiry_details"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "キャンセル用件時の最終問い合わせ内容（自由テキスト）"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "受診歴確認"
    tts_announcement: "まず初めに、鹿児島生協病院の眼科を受診したことはありますか？はい、または、いいえ、でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "有"
        - "無"
      mapping:
        - input: "はい / そうです / 肺 / いいです / が今 / PHVます / P（Yes/No 救済語含む肯定）"
          output: "有"
        - input: "いいえ / ちがいます / 初めて / 不審 / 電気 / でんき（否定・初診相当語）"
          output: "無"
      no_result_condition: "上記いずれにも該当せず用件を特定できない場合"
    save_to: "first_examination"
    next_step: "Pattern A 分岐：有→用件聴取、無→END_初診受付不可"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "用件聴取"
    tts_announcement: "ご用件を、次の4つのうちの、いずれかでお話ください。「再診予約をする」、「予約日を変更する」、「予約をキャンセルする」、「予約の確認」。それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "再診"
        - "変更"
        - "キャンセル"
        - "確認"
      mapping:
        - input: "再診 / 再診予約 / 診察 / 印刷 / 定期 / 新薬 / 最新 / 禁忌 / 大変"
          output: "再診"
        - input: "変更 / 予約日を変更 / 日程を変える / 薬品"
          output: "変更"
        - input: "キャンセル / 取り消し / 取りやめ"
          output: "キャンセル"
        - input: "確認 / 予約の確認 / 自分の予約はいつか"
          output: "確認"
      no_result_condition: "上記いずれにも該当しない場合。近しい場合は『〇〇でよろしいですか？』と確認可（復唱禁止の例外）"
    save_to: "classification"
    next_step: "患者氏名聴取（単線、分岐は後段の用件別フロー分岐で実施）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "予約変更_希望日聴取"
