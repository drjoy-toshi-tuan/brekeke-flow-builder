    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "OpenAI 不要（text 保存）"
    save_to: "question"
    next_step: "END_受付完了_確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "キャンセル_次回予約有無"
    tts_announcement: "次回の予約希望はございますか？ございましたらご希望時期をお話ください。ない場合は「ありません」とおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
