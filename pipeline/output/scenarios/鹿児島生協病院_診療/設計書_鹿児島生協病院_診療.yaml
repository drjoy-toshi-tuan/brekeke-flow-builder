# --- セクション10: AmiVoice辞書（profile_words）---
# 眼科固定のため診療科辞書は不要。特殊キーワード（救済語）は OpenAI プロンプト側で処理する方針（STT 辞書に入れると誤変換を誘発する可能性があるため）。
amivoice_dictionary: []

# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【眼科専用】診療科 clinicalDepartment は「眼科」を固定値で saveContext2DB に保存。受診科識別プロセスは不要（opening 直後に挟む）。"
  - "【初診は受付不可】受診歴確認で「無」→ END_初診受付不可（受付時間案内を含む長文）で終話。初診扱い語（不審/電気/でんき）も否定側に振る。"
  - "【復唱許可項目】生年月日と連絡先電話番号のみ。それ以外（氏名・受診歴・用件・予約希望日・次回予約有無・問い合わせ内容）はいついかなる時も復唱禁止。"
  - "【生年月日復唱フレーズ指定】「生年月日は{西暦4桁}年{1〜12の月}月{1〜31の日}日でよろしいですか？はい、そうです、または、いいえ、違います、のようにお答えください。」形式。月日の先頭ゼロ禁止（「7月」OK、「07月」不可）、YYYYMMDD や「/」区切り禁止。年のみ「2001年」のように 0 含む可。生年月日聴取サブフロー側のプロパティで設定（prompter 担当）。"
  - "【電話番号復唱フレーズ】「<speak type=\"telephone\" breakc=\"300ms\">{電話番号}</speak>、でよろしいですか？はい、そうです、または、いいえ、違います、のようにお答えください。」。SSML タグは元資料指示のため保持（通常 SSML 禁止だが施設指示優先）。"
  - "【Yes/No 救済語】肯定扱い: 肺 / いいです / が今 / PHVます / P（否定側救済語なし）。受診歴確認・キャンセル_次回予約有無・電話番号復唱・生年月日復唱など全 Yes/No 判定の OpenAI prompt に埋める。"
  - "【数字誤認識救済】「C / c / Ｃ / ｃ / for / ふぉー / フォー / しー / しい / し」→ 4、「ごー / ごお / ご」→ 5。診察券番号・電話番号の prompt 側で正規化（今フローでは電話番号のみ該当）。"
  - "【用件キーワード救済】classification 判定プロンプトに埋める：「印刷/定期/新薬/再診/最新/禁忌/大変」→ 再診、「薬品」→ 変更、「不審/電気/でんき」→ 初診（否定扱い）、「薬/お薬/要約/通訳/集約/契約/主役/服薬」→ 予約（文脈推定）。"
  - "【「もしもし」単独発話】「お声は届いております。」とアナウンスし直前質問を再案内。他発話が混ざっている場合は「もしもし」を無視して他内容で判断。全聴取ブロックの OpenAI prompt 共通ルール。"
  - "【予約希望日はフリーワード格納】DesiredreservationDate は日付形式に正規化しない。STT 結果をそのまま text 保存（元資料 1-13 明記）。"
  - "【複数情報一度発話】入電者が一度に複数情報を発話した場合、既取得項目は再質問・復唱しない。全 OpenAI prompt に反映。"
  - "【DOB リトライ上限 2】2 回認識失敗で patientDateOfBirth をブランクセットし、エラー案内せず次の質問（用件別フロー分岐）へ skip。生年月日聴取サブフロー側で処理。"
  - "【電話番号 3 回失敗】END_回答不可「ご回答の確認ができませんでしたのでこちらからお電話失礼させていただきます。それでは失礼いたします。」で終話。Gen3 サブフロー内完結のため termination_patterns には入れず confirmation_items で Brekeke IVR UI 手動追加タスク化。"
  - "【smsFlag 特例】キャンセル用件 smsFlag=2（他施設は 1 が多いが、鹿児島生協診療は 2）。Dr.JOY 側の SMS テンプレート割り当てで smsFlag=2 専用テンプレートを用意すること。"
  - "【施設情報】所在地=鹿児島県 鹿児島市 谷山 中央5丁目20-10、代表電話=099-267-1455。代表番号は冒頭アナウンスで当日予約用として、また初診受付不可アナウンス（受付時間案内を含む）で使用。"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id を Dr.JOY 管理画面から取得して basic_info.office_id に設定"
    resolved: false
  - item: "use_acceptance_times の判定：Dr.JOY 側で営業時間制御する場合は false、フロー側で時間外アナウンスを出したい場合は true のまま"
    resolved: false
  - item: "非通知アナウンス文言（テンプレートデフォルトで本番稼働可か顧客確認）"
    resolved: false
  - item: "時間外アナウンス文言（use_acceptance_times=true の場合のみ）"
    resolved: false
  - item: "clinicalDepartment=「眼科」固定値セット方法の最終確認（opening 直後に saveContext2DB を挟む設計）"
    resolved: false
  - item: "medicalCardNumber コンテキストを Dr.JOY 画面に表示するか（Gen2 function required だが聴取しない。空のままでよいか）"
    resolved: false
  - item: "SMS 文面 smsFlag=1 用（再診/変更/確認）を Dr.JOY 管理画面で設定"
    resolved: false
  - item: "SMS 文面 smsFlag=2 用（キャンセル専用）を Dr.JOY 管理画面で設定 ※他施設と異なる特例"
    resolved: false
  - item: "【手動タスク・人間（Brekeke IVR UI）】電話番号聴取サブフロー内の 3 回失敗時に END_回答不可 TTS「ご回答の確認ができませんでしたのでこちらからお電話失礼させていただきます。それでは失礼いたします。」→ 切断モジュールを追加（Custom Jump to Flow から親フロー END へ接続不可のためサブフロー内で完結させる）"
    resolved: false
  - item: "認証設定（優先順位：生年月日/電話番号/診察券番号）を Dr.JOY 管理画面で設定"
    resolved: false
  - item: "Dr.JOY 画面の表示設定（確認画面表示 ○/×）を Dr.JOY 管理画面で設定"
    resolved: false
