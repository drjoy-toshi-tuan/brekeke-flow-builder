# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 — 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（主要聴取項目）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_初診受付不可"
    condition: "受診歴確認 = 無（初診）"
    tts_announcement: "恐れ入りますが、初めて受診される方のご予約はお受けできません。大変申し訳ございませんが予約なしでのご来院の上、受診をお願いします。鹿児島生協病院の眼科外来は午前中は月曜日から土曜日までの8時30分から11時30分、午後は月曜日と木曜日の13時45分から16時までの受付となっております。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_初診受付不可"

  - name: "END_受付完了_再診"
    condition: "再診予約受付完了（classification=再診、status=1）"
    tts_announcement: "再診予約の申し込みを受付いたしました。3診療日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_再診"

  - name: "END_受付完了_変更"
    condition: "予約変更受付完了（classification=変更、status=1）"
    tts_announcement: "予約変更の申し込みを受付いたしました。3診療日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_変更"

  - name: "END_受付完了_確認"
    condition: "予約確認受付完了（classification=確認、status=1）"
    tts_announcement: "予約確認の申し込みを受付いたしました。3診療日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_確認"

  - name: "END_キャンセル受付完了"
    condition: "予約キャンセル受付完了（classification=キャンセル、status=1）※ smsFlag=2 は他施設と異なる"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。3診療日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル受付完了"

