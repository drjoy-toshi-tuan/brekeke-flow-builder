# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 -- 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（汎用終話案内）"
    tts_announcement: "申し訳ございません。ご回答の確認ができませんでしたのでこちらからお電話失礼させていただきます。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（個人/企業で終話アナウンス共通）---
  - name: "END_予約"
    condition: "classification=予約 で全聴取完了"
    tts_announcement: "予約についてのご要望を承りました。日曜、祝日を除く、3営業日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。担当者からのご連絡後に確定となりますのでしばらくお待ちくださいませ。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約"

  - name: "END_変更"
    condition: "classification=変更 で全聴取完了"
    tts_announcement: "予約変更についてのご要望を承りました。日曜、祝日を除く、3営業日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。担当者からのご連絡後に確定となりますのでしばらくお待ちくださいませ。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更"

  - name: "END_キャンセル"
    condition: "classification=キャンセル で全聴取完了"
    tts_announcement: "予約キャンセルについてのご要望を承りました。担当者より折り返しご連絡をさせていただく場合がございます。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_問合せ"
    condition: "classification=問い合わせ で全聴取完了"
    tts_announcement: "お問い合わせを承りました。日曜、祝日を除く、3営業日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_問合せ"

  - name: "END_直通案内"
    condition: "当日受診相談（RAGサブフロー経由 or 特別分岐）"
    tts_announcement: "当日受診のご相談は、健康管理センター直通ダイヤル、0299851139へおかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_直通案内"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
  patterns:
    - condition: "classification=予約"
      sms_flag: "1"
      notes: "予約完了（個人/企業共通）"
    - condition: "classification=変更"
      sms_flag: "1"
      notes: "変更完了（個人/企業共通）"
    - condition: "classification=キャンセル"
      sms_flag: "1"
      notes: "キャンセル完了（個人/企業共通）"
    - condition: "classification=問い合わせ"
      sms_flag: "2"
      notes: "問い合わせ完了（個人/企業共通）"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "個人_問合せ内容/企業_問合せ内容 の saveContext後"
  pre_termination: true
  notes: >
    Gen2→Gen3移管デフォルト（CLAUDE.md Rule 16）。
    パターン1: 問合せルート内でRAG検索（問合せ内容聴取後）。
    パターン2: 全終話前に「何かご質問はございますか？」。
    RAGで回答不可の場合:「申し訳ございません。こちらのお電話で回答ができませんので、
    日曜、祝日を除く、3営業日以内に、担当者より別途ご連絡させていただきます。」→ status=1維持。
    直通案内(0299-85-1139)はRAG FAQに登録して対応。

