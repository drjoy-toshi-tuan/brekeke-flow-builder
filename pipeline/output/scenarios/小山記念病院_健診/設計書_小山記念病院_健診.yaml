  - context_name: "Preferred_date"
    context_name_jp: "予約希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約時の希望日。フリーテキスト（月曜日/上旬/下旬等）"

  - context_name: "reason"
    context_name_jp: "問合せ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "問合せ内容 or 企業予約の連絡事項。フリーテキスト"

  - context_name: "change_item"
    context_name_jp: "変更内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更時の変更対象（検査項目/日付等）。フリーテキスト"

  - context_name: "Number_of_patients"
    context_name_jp: "受診人数"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業予約のみ聴取。フリーテキスト"

  - context_name: "local_aid"
    context_name_jp: "市町村補助"
    display_type: "TEXT"
    range_values: []
