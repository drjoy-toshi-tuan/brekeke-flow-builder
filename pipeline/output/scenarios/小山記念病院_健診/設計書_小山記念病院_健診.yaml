# --- セクション7: ステップ詳細 ---
step_details:
  # === 共通 ===
  - step_name: "個人企業確認"
    tts_announcement: "お電話ありがとうございます。小山記念病院健康管理センターの予約専用ダイヤルです。今お電話いただいているのは、企業のご担当者様でしょうか、それとも個人様でしょうか。企業のご担当者様は1、個人様は2と番号をお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "個人"
        - "企業"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「企業」「会社」「担当者」「医療機関」「団体」「健保組合」「スタッフ」を含む"
          output: "企業"
        - input: "DTMF 2 または「個人」「自分」「家族」「はい」を含む"
          output: "個人"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "company_check"
    next_step: "個人→ジャンプ_氏名聴取 / 企業→企業_名称"
    retry_failure: "skip"
    retry_failure_detail: "リトライ上限到達→個人パスにデフォルト遷移（Gen2準拠: デフォルト=個人）"

  # === 個人パス ===
  - step_name: "個人_用件"
    tts_announcement: "ご用件を、次の4つのうちの、いずれかでお話しください。予約、変更、キャンセル、そのた問合せ。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "「予約」「薬」「集約」「要約」等の予約関連語"
          output: "予約"
        - input: "「変更」「取り直したい」「変えたい」「変える」等"
          output: "変更"
        - input: "「キャンセル」「やめる」「取り消し」「取消」「やめたい」等"
          output: "キャンセル"
        - input: "「問合せ」「質問」「聞きたい」等"
          output: "問い合わせ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→個人_予約種類 / 変更→個人_現在予約日 / キャンセル→個人_現在予約日 / 問い合わせ→個人_問合せ内容"
    retry_failure: "skip"
    retry_failure_detail: "リトライ上限到達→フォールバック宣言TTS(その他お問合せとしてお預かりいたします)→classification=問い合わせ→問合せルートへ"

  - step_name: "個人_予約種類"
    tts_announcement: "ご予約を希望される内容を次の3つからお選びください。健康診断、婦人科健診、予防接種。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "健康診断"
        - "婦人科健診"
        - "予防接種"
        - "NO_RESULT"
      mapping:
        - input: "「健康診断」「健診」「検診」「ドック」等"
          output: "健康診断"
        - input: "「婦人科」「子宮」「乳がん」等"
          output: "婦人科健診"
        - input: "「予防接種」「ワクチン」「接種」等"
          output: "予防接種"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "course"
    next_step: "健康診断→個人_健診種類 / 婦人科健診→個人_婦人科種類 / 予防接種→個人_ワクチン種類"
    retry_failure: "skip"
    retry_failure_detail: "リトライ上限→フォールバック（問合せルートへ）"

  - step_name: "個人_健診種類"
    tts_announcement: "健康診断の種類を次の3つからお選びください。人間ドック、生活習慣病予防健診、そのた。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "人間ドック"
        - "生活習慣病予防健診"
        - "その他"
        - "NO_RESULT"
      mapping:
        - input: "「人間ドック」「ドック」「一日ドック」「日帰りドック」等"
          output: "人間ドック"
        - input: "「生活習慣病」「生活習慣病予防健診」「成人病」等"
          output: "生活習慣病予防健診"
        - input: "「その他」「そのた」「それ以外」等"
          output: "その他"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "course"
    next_step: "人間ドック/生活習慣病→個人_胃検査 / その他→個人_種類"
    retry_failure: "skip"
    retry_failure_detail: "リトライ上限→フォールバック（問合せルートへ）"

  - step_name: "個人_胃検査"
    tts_announcement: "胃の検査について次の3つからお選びください。内視鏡検査、バリウム検査、胃の検査なし。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内視鏡検査"
        - "バリウム検査"
        - "胃の検査なし"
        - "NO_RESULT"
      mapping:
        - input: "「内視鏡」「胃カメラ」「経鼻」「経口」等"
          output: "内視鏡検査"
        - input: "「バリウム」「胃部X線」「胃のレントゲン」等"
          output: "バリウム検査"
        - input: "「なし」「胃の検査なし」「不要」等"
          output: "胃の検査なし"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "option"
    next_step: "個人_オプション"
    retry_failure: "skip"

  - step_name: "個人_種類"
    tts_announcement: "その他に希望される健康診断について、定期健診、脳ドックなどのようにお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "コース名テキスト"
        - "ドック確認"
        - "NO_RESULT"
      mapping:
        - input: "コースリスト内の名称に一致（定期健診/脳ドック/肺ドック/特定健診等）"
          output: "該当コース名"
        - input: "「ドック」のみ（種類が曖昧）"
          output: "ドック確認"
      no_result_condition: "コースリスト外かつ「ドック」以外"
    save_to: "course"
    next_step: "コース名→個人_オプション / ドック確認→個人_ドック確認"
    retry_failure: "skip"

  - step_name: "個人_ドック確認"
    tts_announcement: "ドックの聞き間違いが多いため、改めて確認させてください。1、人間ドック。2、肺ドック。3、脳ドック。4、簡易脳ドック。いずれになるか、再度お話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "人間ドック"
        - "肺ドック"
        - "脳ドック"
        - "簡易脳ドック"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「人間ドック」"
          output: "人間ドック"
        - input: "DTMF 2 または「肺ドック」「肺」"
          output: "肺ドック"
        - input: "DTMF 3 または「脳ドック」「脳」"
          output: "脳ドック"
        - input: "DTMF 4 または「簡易脳ドック」「簡易」"
          output: "簡易脳ドック"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "course"
    next_step: "個人_オプション"
