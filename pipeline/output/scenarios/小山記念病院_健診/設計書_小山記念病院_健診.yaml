# 設計書 -- 小山記念病院 健診
# 生成元: @director エージェント
# 生成日: 2026/04/09
# 確認レポート: docs/designs/確認レポート_小山記念病院_健診_20260409.md
# ゴールデンテンプレート参照: docs/specs/golden_templates/健診受付型.yaml
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "小山記念病院"
  group_name: "小山記念病院"
  flow_name: "小山記念病院$健診_20260409"
  target_facility: "小山記念病院 健康管理センター"
  office_id: "TODO_要確認"
  phone_number: ""
  business_hours: "TODO_要確認"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "小山記念病院$健診_20260409"
      role: "main"
      description: >
        冒頭チェーン → 個人/企業確認(DTMF) → 個人パス(氏名/生年月日/電話番号サブフロー → 用件4分岐 → 各用件詳細聴取)
        / 企業パス(企業名/担当者名/電話番号サブフロー → 用件4分岐 → 各用件詳細聴取) → RAGサブフロー → smsFlag分岐 → 終話
    - name: "小山記念病院$氏名聴取_20260409"
      role: "sub"
      description: "氏名聴取 → 結果返却（CLAUDE.md Rule 9 静的JSONコピー）"
    - name: "小山記念病院$生年月日聴取_20260409"
      role: "sub"
      description: "生年月日聴取(復唱なし) → 結果返却（CLAUDE.md Rule 9 静的JSONコピー）"
    - name: "小山記念病院$電話番号聴取_20260409"
      role: "sub"
      description: "着信番号分岐 → 電話番号聴取/復唱確認 → 結果返却（CLAUDE.md Rule 9 静的JSONコピー）"
    - name: "小山記念病院$RAG検索_20260409"
      role: "sub"
      description: "RAG検索サブフロー（CLAUDE.md Rule 16 静的JSONコピー）"
  subflows:
    - name: "小山記念病院$氏名聴取_20260409"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人パスで使用。リトライ上限到達時は氏名未取得のまま次へスキップ"
    - name: "小山記念病院$生年月日聴取_20260409"
      target: "生年月日聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人パスで使用。復唱なし（2026/04/08 Gen2更新反映）。リトライ上限到達時は取得範囲のみで次へスキップ"
    - name: "小山記念病院$電話番号聴取_20260409"
      target: "電話番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        個人/企業の両パスで使用（2箇所からJump）。復唱あり。
        termination=return: smsFlag値は用件(classification)に依存するが、用件聴取は電話番号の後のため、
        サブフロー内で終話チェーンを完結できない。終話はメインフローに集約。
    - name: "小山記念病院$RAG検索_20260409"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "パターン3: 問合せルート後 + 全終話前の2箇所から呼び出し"

# --- セクション3: フローの目的 ---
purpose: >
  小山記念病院 健康管理センターの予約専用ダイヤル。
  冒頭で個人/企業を判別し、個人情報（氏名・生年月日・電話番号 or 企業名・担当者名・電話番号）を聴取後、
  用件（予約・変更・キャンセル・問合せ）に応じた詳細情報を聴取して折り返し受付を自動化する。
  個人予約では予約種類（健康診断/婦人科健診/予防接種）ごとの詳細分岐、企業予約では受診人数・コース・時期を聴取する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "小山記念病院$健診_20260409"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2,smsFlag=-1) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6,smsFlag=-1) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → 個人企業確認(DTMF AmiVoice STT, max=1)
                                      → OpenAI_個人企業(classify: 個人/企業)
                                          ├─ 企業 → saveContext_個人企業 → 【企業パス】(後述)
                                          ├─ 個人 → saveContext_個人企業 → 【個人パス】(後述)
                                          └─ NO_RESULT → リトライ_個人企業(No more→個人パスにデフォルト)

      === 個人パス ===
      saveContext_個人企業(company_check=個人)
        → ジャンプ_氏名聴取(Custom Jump to Flow → 小山記念病院$氏名聴取)
        → ジャンプ_生年月日聴取(Custom Jump to Flow → 小山記念病院$生年月日聴取)
        → ジャンプ_電話番号聴取_個人(Custom Jump to Flow → 小山記念病院$電話番号聴取)
        → 個人_用件(TTS) → 入力_個人_用件(AmiVoice STT) → OpenAI_個人_用件(classify)
            ├─ 予約 → saveContext_用件_予約(classification=予約)
            │         → 個人_予約種類(TTS) → 入力_個人_予約種類(AmiVoice STT) → OpenAI_個人_予約種類(classify)
            │             ├─ 健康診断 → saveContext_コース_健康診断
            │             │             → 個人_健診種類(TTS) → 入力_個人_健診種類(AmiVoice STT) → OpenAI_個人_健診種類(classify)
            │             │                 ├─ 人間ドック → saveContext_コース_人間ドック → 個人_胃検査(TTS)→STT→OpenAI→save
            │             │                 │               → 個人_オプション(TTS)→STT→save → 個人_希望日(TTS)→STT→save → 【集約→RAG→終話_予約】
            │             │                 ├─ 生活習慣病予防健診 → saveContext_コース_生活習慣病 → 個人_胃検査→オプション→希望日 → 【集約→RAG→終話_予約】
            │             │                 ├─ その他 → 個人_種類(TTS)→STT→OpenAI_個人_種類
            │             │                 │           ├─ 通常入力 → saveContext_コース → オプション→希望日 → 【集約→RAG→終話_予約】
            │             │                 │           └─ ドック確認 → 個人_ドック確認(TTS,DTMF)→STT→OpenAI→save → オプション→希望日 → 【同上】
            │             │                 └─ NO_RESULT → リトライ_健診種類(No more→フォールバック→問合せルート)
            │             ├─ 婦人科健診 → saveContext_コース_婦人科
            │             │               → 個人_婦人科種類(TTS)→STT→OpenAI→save
            │             │               → 個人_市町村補助(TTS)→STT→OpenAI→save → 個人_希望日→save → 【集約→RAG→終話_予約】
            │             ├─ 予防接種 → saveContext_コース_予防接種
            │             │             → 個人_ワクチン種類(TTS)→STT→save
            │             │             → 個人_市町村補助→save → 個人_希望日→save → 【集約→RAG→終話_予約】
            │             └─ NO_RESULT → リトライ_予約種類(No more→フォールバック→問合せルート)
            ├─ 変更 → saveContext_用件_変更(classification=変更)
            │         → 個人_現在予約日(TTS)→STT→save → 個人_変更内容(TTS)→STT→save → 【集約→RAG→終話_変更】
            ├─ キャンセル → saveContext_用件_キャンセル(classification=キャンセル)
            │               → 個人_現在予約日(TTS)→STT→save → 【集約→RAG→終話_キャンセル】
            ├─ 問い合わせ → saveContext_用件_問合せ(classification=問い合わせ)
            │               → 個人_問合せ内容(TTS)→STT→save → 【RAG(パターン1)→集約→RAG(パターン2)→終話_問合せ】
            └─ NO_RESULT → リトライ_個人_用件(No more→フォールバック宣言→問合せルート)

      === 企業パス ===
      saveContext_個人企業(company_check=企業)
        → 企業_名称(TTS) → 入力_企業_名称(AmiVoice STT) → OpenAI_企業_名称(normalize) → saveContext_企業名
        → 企業_担当者名(TTS) → 入力_企業_担当者名(AmiVoice STT) → OpenAI_企業_担当者名(normalize) → saveContext_担当者名
        → ジャンプ_電話番号聴取_企業(Custom Jump to Flow → 小山記念病院$電話番号聴取)
        → 企業_用件(TTS) → 入力_企業_用件(AmiVoice STT) → OpenAI_企業_用件(classify)
            ├─ 予約 → saveContext_用件_予約(classification=予約)
            │         → 企業_受診人数(TTS)→STT→save → 企業_コース(TTS)→STT→save
            │         → 企業_時期(TTS)→STT→save → 企業_連絡事項(TTS)→STT→save → 【集約→RAG→終話_予約】
            ├─ 変更 → saveContext_用件_変更(classification=変更)
            │         → 企業_受診者名(TTS)→STT→OpenAI→save → 企業_現在予約日(TTS)→STT→save
            │         → 企業_変更内容(TTS)→STT→save → 【集約→RAG→終話_変更】
            ├─ キャンセル → saveContext_用件_キャンセル(classification=キャンセル)
            │               → 企業_受診者名(TTS)→STT→OpenAI→save → 企業_現在予約日(TTS)→STT→save
            │               → 【集約→RAG→終話_キャンセル】
            ├─ 問い合わせ → saveContext_用件_問合せ(classification=問い合わせ)
            │               → 企業_問合せ内容(TTS)→STT→save → 【RAG(パターン1)→集約→RAG(パターン2)→終話_問合せ】
            └─ NO_RESULT → リトライ_企業_用件(No more→フォールバック宣言→問合せルート)

      === 集約→RAG→終話チェーン ===
      各ルートの最終save完了後:
        → ジャンプ_RAG(Custom Jump to Flow → 小山記念病院$RAG検索) ← パターン2: 全終話前「何かご質問はありますか？」
        → [RAGから戻り]
        → smsFlag分岐(ContextMatchRouter: classificationの値で分岐)
            ├─ classification=予約 → 完了フラグ_予約(status=1,smsFlag=1) → 終話_予約(TTS) → 切断
            ├─ classification=変更 → 完了フラグ_変更(status=1,smsFlag=1) → 終話_変更(TTS) → 切断
            ├─ classification=キャンセル → 完了フラグ_キャンセル(status=1,smsFlag=1) → 終話_キャンセル(TTS) → 切断
            └─ classification=問い合わせ → 完了フラグ_問合せ(status=1,smsFlag=2) → 終話_問合せ(TTS) → 切断

      ─── メインフロー内終話パターン ───
      END_非通知 → 切断
      END_時間外 → 切断
      END_聴取失敗 → 切断
      END_予約 → 切断
      END_変更 → 切断
      END_キャンセル → 切断
      END_問合せ → 切断
      END_直通案内 → 切断 (RAGサブフロー内でFAQ応答として案内。別途直通案内用の終話パスも用意)
    notes: >
      冒頭チェーン順序: wait→saveContextModel2DB→incoming-classifier→acceptance_times。
      個人/企業分岐が冒頭アナウンス直後。各ルートの終話はsmsFlag分岐で集約。
      フォールバック: 用件/予約種類でリトライ上限→classification=問い合わせをセットして問合せルートへ。

  - flow_name: "小山記念病院$氏名聴取_20260409"
    diagram: |
      CLAUDE.md Rule 9 完全コピー対象
      docs/reference/bivr/samples/json/氏名聴取.json を完全コピーする。
      フロー名プレフィックスのみ「小山記念病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "CLAUDE.md Rule 9/11 準拠。個人情報サブフロー.bivr を完全コピー。"

  - flow_name: "小山記念病院$生年月日聴取_20260409"
    diagram: |
      CLAUDE.md Rule 9 完全コピー対象
      docs/reference/bivr/samples/json/生年月日聴取_復唱なし.json を完全コピーする。
      フロー名プレフィックスのみ「小山記念病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "CLAUDE.md Rule 9/11 準拠。復唱なし（Gen2 2026/04/08更新反映）。"

  - flow_name: "小山記念病院$電話番号聴取_20260409"
    diagram: |
      CLAUDE.md Rule 9/10 完全コピー対象
      docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピーする。
      フロー名プレフィックスのみ「小山記念病院$」に置換。構造・接続・スクリプトは一切変更不可。
      termination=return のため、サブフロー内に終話チェーンは配置しない。
    notes: "CLAUDE.md Rule 9/10/11 準拠。復唱あり。termination=return。"

  - flow_name: "小山記念病院$RAG検索_20260409"
    diagram: |
      CLAUDE.md Rule 16 完全コピー対象
      docs/reference/bivr/samples/json/RAG検索.json を完全コピーする。
      フロー名プレフィックスのみ「小山記念病院$」に置換。
    notes: "CLAUDE.md Rule 16 準拠。パターン3: 問合せルート内(パターン1) + 全終話前(パターン2)。"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # === 標準フィールド (item_default: true) ===
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "予約"
      - order: "2"
        value: "変更"
      - order: "3"
        value: "キャンセル"
      - order: "4"
        value: "問い合わせ"
      - order: "5"
        value: "無回答"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。Gen2のenum準拠。無回答=用件リトライ上限到達時のみ使用"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "個人: 受診者名（氏名聴取サブフロー）。企業変更/キャンセル: 受診者名（メインフロー内聴取）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "個人パスのみ聴取。復唱なし。生年月日聴取サブフロー"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "電話番号聴取サブフローで聴取。個人/企業共通"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: true
    notes: "1=未処理(通話完了) 2=代表案内(直通案内) 3=聴取失敗 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

  # === 施設固有フィールド (item_default: false) ===
  - context_name: "company_check"
    context_name_jp: "個人企業区分"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: false
    deletable: true
    notes: "個人 / 企業。Gen2では内部変数だったがGen3ではDr.JOY画面に表示"

  - context_name: "company_name"
    context_name_jp: "企業名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業パスのみ聴取。Gen2の'company name'からリネーム（スペース禁止）"

  - context_name: "contactName"
    context_name_jp: "担当者名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業パスのみ聴取。企業の連絡担当者名"

  - context_name: "course"
    context_name_jp: "受診コース"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "個人: 健診種類名(人間ドック等)/婦人科健診/予防接種。企業: 希望コース名。フリーテキスト"

  - context_name: "option"
