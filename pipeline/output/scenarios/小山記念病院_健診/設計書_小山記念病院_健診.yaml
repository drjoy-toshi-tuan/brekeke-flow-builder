# --- セクション11: 特記事項・制約 ---
special_notes:
  - >
    Gen2から第3世代への移管案件。Gen2は2026/04/08更新版（最新）を基準とする。
    主な変更点: 生年月日の復唱なし、電話番号と生年月日のDTMF対応、企業でも変更/キャンセル受付、
    終話アナウンスの個人/企業統一。
  - >
    個人/企業の2大ブランチがあり、各ブランチ内で用件4分岐、さらに個人予約では
    予約種類3分岐+健診種類3分岐と深い分岐構造を持つ。メインフローのモジュール数が非常に多くなる。
  - >
    フォールバック仕様: 用件や予約種類で分類不可の場合は「その他お問合せとしてお預かりいたします」と
    宣言し、classification=問い合わせをセットして問合せルートに遷移する。
    これはGen2の「分類フォールバック(Branch-safe Routing)」を継承した仕様。
  - >
    直通案内(0299-85-1139): 当日受診相談時に案内する電話番号。
    Gen2ではAIが会話中に検知して案内していた。Gen3ではRAGサブフローのFAQに登録し、
    当日受診に関する質問が来た場合にRAGが回答する形で対応する。
    別途、END_直通案内の終話パス(status=2)も用意する。
  - >
    氏名のカタカナ正規化: Gen2仕様に準じ、入力がどの文字種でもカタカナで出力する。
    漢字名で読みが曖昧な場合は再質問1回→それでも不明なら聞き取れた表記で保存して次へ。
  - >
    企業担当者名(contactName)と受診者名(patientName)は別フィールド。
    企業変更/キャンセル時はpatientNameに受診者名を格納する。
  - >
    Gen2のcompany_name(旧: "company name"スペース含み)はGen3でcompany_nameにリネーム。
  - >
    Gen2のMedical_historyフィールドは一度も聴取されない。Gen2互換で残存させるが、不要なら削除可。

