# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【施設名の二重表記】施設管理上の正式名は「西部総合病院」だが、TTS 発話は「西部さくらクリニック」で統一する（2026/04/07 改訂済み）。END_聴取失敗 アナウンスには両表記が混在するが、customer_doc 原文通りに再現する。"
  - "【聴取順序の固定】customer_doc 1-3 で「用件を先に聞かないでください。指示の順番通りに聞いてください。」と明記。氏名 → 生年月日 → 連絡先電話番号 → 用件 の順序を崩してはいけない。"
  - "【復唱禁止ルール】受診者名（patientName）は復唱しない。それ以外は「○○ですね。」で復唱。電話番号は <speak type=\"telephone\"> 相当のフォーマットだが、Gen3 では SSML 不可のため {tts_g:...} 内で桁区切り発話に変換（prompter / properties 側で処理）。"
  - "【複数名入電対応】氏名聴取で複数名発話された場合、最初の1名のみ patientName に格納 → 生年月日聴取時に専用アナウンス「受診される方の生年月日を西暦で、1人目の方から順番に、人数分お話ください。」に分岐する。氏名サブフローから生年月日サブフロー起動時に分岐フラグを渡す設計が必要（confirmation_items N-1 参照）。"
  - "【additionalPhoneNumber 格納規則】(a) 口頭/DTMF で1回でも番号提示 → 必ず additionalPhoneNumber 格納（空欄禁止）。(b) 携帯着信で「はい、そうです」確認時 → Incoming_phone_number をコピー格納。(c) 番号未提示時のみ空欄可。"
  - "【SMS 案内の出し分け】Incoming_phone_number または additionalPhoneNumber のいずれかが携帯番号（090/080/070/060）の場合のみ SMS 案内文言を使用。固定番号しかない場合は SMS 案内なし版の終話文言へ。"
  - "【予約日の年跨ぎ補正】月日のみ発話 → 着信年補完。ただし 10月以降の入電で 1〜9月の日付を指定された場合は翌年とする。例: 2025年11月1日に「5月1日」→ 2026-05-01。"
  - "【キーワード正規化ルール】「検針/返信/天候診断/返金控寸断」→健診、「人間ロック/ドック/ロック/人間独」→人間ドック、「薬/お薬/要約/通訳」→予約、「取り直したい/別の/変えたい」→変更、「やめる/取り消し/取消」→キャンセル。「検診」は健診として扱うが、前に「乳がん」「子宮がん」「子宮頸がん」が付く場合は除外。"
  - "【「かしこまりました。」抑制】追加質問で「折り返しの電話してほしい時間」を伝えられた場合のみ、終話アナウンス先頭の「かしこまりました。」を付けない分岐を用意する必要あり（confirmation_items N-4 参照）。"
  - "【折り返し対応問合せ】「折り返し対応の時間を聞かれた」→「順番に対応しておりますので、しばらくお待ちください」固定応答。「折り返し希望時間を伝えられた」→「ご要望を承りました。」固定応答（confirmation_items N-4 参照）。"
  - "【プロンプト非対応質問】customer_doc 1-2 のエスカレーション文言: 「お話しいただきました内容はAI電話では対応ができません、恐れ入りますが、祝日を除く月曜～金曜の8：45～17：00、土曜は8：45～12：00に、西部さくらクリニック直通番号へおかけなおしください。…電話番号は048-854-1114です。」を別途用意（prompter 側でプロンプトに埋め込み）。"
  - "【電話番号桁数チェック】090/080/070/060/050 開始 → 11桁期待、それ以外 → 10桁期待。リトライ3回まで、超過時は END_聴取失敗 へ合流。電話番号聴取サブフロー内の桁数チェックロジックの確認が必要（confirmation_items N-3 参照）。"
  - "【本日予約確認の制限】本日予約確認は「変更」フロー専用。「キャンセル・予約・問い合わせ」では絶対に発話しない（customer_doc 明記）。"
  - "【キャンセル時の today_reservation 一致チェック】reservationDate が着信日と同一なら today_reservation=「当日」、それ以外は「－」（全角ハイフン）。customer_doc 5 明記。Gen3 では追加スクリプトで実装（confirmation_items N-6 参照）。"
  - "【predict_date 不採用】Preferred_date は原文テキスト格納（「9月上旬の午前中」等そのまま）。日付正規化しない。reservationDate のみ yyyy-MM-dd 00:00:00 形式で正規化。"
  - "【company_name 対応】氏名聴取時に企業名・団体名・組合名が発話されたら company_name に格納し、「受診をされる方のお名前をお話ください」へ再誘導する分岐が氏名サブフロー内で必要（confirmation_items N-2 参照）。"
  - "【status=0/5 の置換】Gen2 function の status enum は 0/1/2 だが、Gen3 では 0 と 5 は使用禁止のため、聴取失敗・代表案内ルートは status=2 に置換。通常完了は 1 のまま。"
  - "【endpoint と smsFlag の取扱】Gen2 function required の endpoint / smsFlag は saveContextModel2DB に含めず、saveCompletionFlag2db のパラメータ（sms_flag 等）として設定。"

