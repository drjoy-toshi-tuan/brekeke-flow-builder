# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 main.yaml の重複箱（用件の確認 / _1 / _2、用件を判断 / _1、肯定否定_1〜_5、紹介状分岐、8時半前_1 / _2、複数診療科flagセット、リハビリだけ代表案内 / _1、患者サポート外来、API_DRJOY 系、用件セット系）は独立ブロック化せず、OpenAI + ContextMatchRouter + context に集約した（feedback_gen1_director_default_rules 第3項準拠）"
  - "用件聴取は echo_back: true（移管ノート §移管方針「各分岐直後に echo_back 4 本」に対応）。Gen1 では用件別に「ご予約の変更でよろしいですか?」等の専用 echo_back サブ箱だったが、Gen3 では汎用「#data#でよろしいですか？」に集約（confirmation_items 参照）"
  - "予約変更ルートは Gen1 の 複数診療科確認 → 診療科聞き取り → 用件の確認_1 リハビリ判定 → 予約日 → 用件の確認_2 を簡素化。Gen3 では「変更理由 → 希望日聴取」のみ（移管ノート §移管方針）"
  - "予約キャンセルルートも 複数診療科 / 診療科 を省略。「予約日 → 用件再判定（変更/キャンセル切替可）→ キャンセル理由 → 次予約希望」のみ"
  - "新規予約ルートには Gen1 の前段ゲート 3 段（紹介状 / 健診結果 / それ以外）を Gen3 でも維持。それぞれ独自の確認チェーンを持つ"
  - "それ以外ルートは Gen1 では 再診確認 → 複数診療科確認 だったが、Gen3 では migration note 通り 再診確認 → 医師指示確認 (No時のみ) → 選定療養費確認 → 症状聴取 → 複数診療科確認 のフルチェーンを実装"
  - "紹介状ルート判定は連絡先聴取の後段で実行。CMR で OpenAI_予約対応_用件確認 を参照し、「紹介状」 → date_of_call_classifier で営業時間内なら地域連携室 Blind Transfer、営業前/後なら折り返し案内"
  - "Gen1 の API_DRJOY_1（地域連携室転送前のフラグセット）は Gen3 では call_transfer ブロック直前の TTS（地域連携室_転送案内）に集約。call_transfer の status=3/9 自動生成と END_転送成功/END_転送失敗 が scaffold で配置される"
  - "Gen1 の時間別冒頭アナウンス（8時半前=8:00-8:30 / 17時以降=17:00-17:30 / 時間内=8:30-17:00 の 3-way バリアント）は Gen3 で省略。単一の冒頭_アナウンスに集約（confirmation_items 参照）"
  - "携帯/その他で SMS 言及切替（移管ノート §施設固有「携帯番号で締め文言切替」準拠）。Gen1 携帯番号あり/なし TTS の踏襲。終話分岐_*_電話種別 CMR で連絡先聴取モジュールから phonetype を読む"
  - "代表電話 029-830-3711 は終話 TTS で 3 回繰り返し読み上げ（移管ノート §director見落としポイント「3 回繰り返し読み上げ → 文言短縮しないこと」準拠）。digit-by-digit「0、2、9、の、8、3、0、の、3、7、1、1」形式で SSML 不使用"
  - "ハイフン統一: Gen1 の `‐`（U+2010）は `-`（U+002D）に置換（移管ノート §director見落としポイント準拠）"
  - "Gen1 分岐あり診療科（呼吸器/消化器/脳神経/眼科/整形外科/産婦人科）の second turn 再質問は Gen3 で省略。OpenAI が文脈判断で内科/外科/科を直接確定する前提（confirmation_items 参照）"
