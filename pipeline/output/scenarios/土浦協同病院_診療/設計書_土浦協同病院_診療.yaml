# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ============================================================
  # 冒頭チェーン
  # ============================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件聴取

  # ============================================================
  # 用件聴取（4 用件 + 予約以外、DTMF 1-4、echo_back）
  # ============================================================
  - step: 用件聴取
    type: hearing
    output_format: enum
    save_to: classification
    echo_back: true
    retry_failure: end_failure
    conditions:
      - match: "診察"
        next: 予約対応_用件確認
      - match: "予約変更"
        next: 予約変更_変更理由聴取
      - match: "予約キャンセル"
        next: キャンセル_予約日聴取
      - match: "予約確認"
        next: 確認_内容聴取
      - match: "予約以外"
        next: END_予約以外_案内
      - match: "other"
        next: 予約対応_用件確認  # NO_RESULT 上限到達は scaffold 自動で END_聴取失敗 に流す。other は緩めに「診察ルートに合流」

  # ============================================================
  # 診察ルート前段ゲート（予約対応 3 分岐 DTMF 1-3）
  # ============================================================
  - step: 予約対応_用件確認
    type: hearing
    output_format: enum
    save_to: appointmentSubtype
    echo_back: true
    retry_failure: end_failure
    conditions:
      - match: "紹介状"
        next: 紹介元医療機関名聴取
      - match: "健診結果"
        next: 健診場所確認
      - match: "それ以外"
        next: 再診確認
      - match: "other"
        next: 再診確認

  - step: 紹介元医療機関名聴取
    type: hearing
    output_format: text
    save_to: referralSource
    retry_failure: skip
    next: 新規_複数診療科確認

  - step: 健診場所確認
    type: hearing
    output_format: enum
    save_to: healthCheckLocation
    retry_failure: end_failure
    conditions:
      - match: "はい"
        next: 新規_複数診療科確認
      - match: "other"
        next: END_他院健診_案内

  - step: 再診確認
    type: hearing
    output_format: enum
    save_to: revisitFlag
    retry_failure: end_failure
    conditions:
      - match: "はい"
        next: 選定療養費確認
      - match: "other"
        next: 医師指示確認

  - step: 医師指示確認
    type: hearing
    output_format: enum
    save_to: doctorReferralFlag
    retry_failure: end_failure
    conditions:
      - match: "はい"
        next: 選定療養費確認
      - match: "other"
        next: 選定療養費確認

  - step: 選定療養費確認
    type: hearing
    output_format: enum
    save_to: selectedFeeAcceptance
    retry_failure: end_failure
    conditions:
      - match: "はい"
        next: 症状聴取
      - match: "other"
        next: END_選定療養費非了承_案内

  - step: 症状聴取
    type: hearing
    output_format: text
    save_to: symptoms
    retry_failure: skip
    next: 新規_複数診療科確認

  # ============================================================
  # 新規予約共通 ─ 複数診療科確認 → 診療科聴取 → 分岐
  # ============================================================
  - step: 新規_複数診療科確認
    type: hearing
    output_format: enum
    save_to: multipleDeptFlag
    retry_failure: end_failure
    conditions:
      - match: "はい"
        next: 新規_診療科聴取
      - match: "other"
        next: 新規_診療科聴取

  - step: 新規_診療科聴取
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    retry_failure: end_failure
    conditions:
      - match: "default"
        next: 新規_診療科分岐

  - step: 新規_診療科分岐
    type: context_match_router
    reference_module: "OpenAI_新規_診療科聴取"
    conditions:
      - match: "リハビリテーション科"
        next: END_リハビリ_案内
      - match: "患者サポート外来"
        next: END_患者サポート_案内
      - match: "other"
        next: 新規_複数診療科ルーティング

  - step: 新規_複数診療科ルーティング
    type: context_match_router
    reference_module: "OpenAI_新規_複数診療科確認"
    conditions:
      - match: "はい"
        next: 新規_2科目以降聴取
      - match: "other"
        next: 次へ_診察券番号

  - step: 新規_2科目以降聴取
    type: hearing
    output_format: text
    save_to: additionalDepartments
    retry_failure: skip
    next: 次へ_診察券番号

  # ============================================================
  # 予約変更ルート
  # ============================================================
  - step: 予約変更_変更理由聴取
    type: hearing
    output_format: text
    save_to: reason
    retry_failure: skip
    next: 予約変更_希望日聴取

  - step: 予約変更_希望日聴取
    type: hearing
    output_format: datetime
    save_to: reservationDate
    retry_failure: skip
    next: 次へ_診察券番号

  # ============================================================
  # 予約キャンセルルート
  # ============================================================
  - step: キャンセル_予約日聴取
    type: hearing
    output_format: datetime
    save_to: reservationDate
    retry_failure: skip
    next: キャンセル_用件再判定

  - step: キャンセル_用件再判定
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "予約変更"
        next: 予約変更_変更理由聴取
      - match: "other"
        next: キャンセル_理由聴取

  - step: キャンセル_理由聴取
    type: hearing
    output_format: text
    save_to: reason
    retry_failure: skip
    next: キャンセル_次予約希望確認

  - step: キャンセル_次予約希望確認
    type: hearing
    output_format: enum
    save_to: nextReservationFlag
    retry_failure: end_failure
    conditions:
      - match: "はい"
        next: 次へ_診察券番号
      - match: "other"
        next: END_キャンセル_次予約なし

  # ============================================================
  # 予約確認ルート
  # ============================================================
  - step: 確認_内容聴取
    type: hearing
    output_format: text
    save_to: reason
    retry_failure: skip
    next: 次へ_診察券番号

  # ============================================================
  # 個人情報サブフロー4本連鎖
  # ============================================================
  - step: 次へ_診察券番号
    type: announcement
    next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "土浦協同病院$診察券番号聴取"
    next: 患者氏名聴取

  - step: 患者氏名聴取
    type: subflow
    flowname: "土浦協同病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "土浦協同病院$生年月日聴取"
    next: 連絡先聴取

  - step: 連絡先聴取
    type: subflow
    flowname: "土浦協同病院$電話番号聴取"
    next: 紹介状ルート判定

  # ============================================================
  # 紹介状ルート判定（連絡先後段）
  # ============================================================
  - step: 紹介状ルート判定
    type: context_match_router
    reference_module: "OpenAI_予約対応_用件確認"
    conditions:
      - match: "紹介状"
        next: 紹介状_営業時間判定
      - match: "other"
        next: 終話分岐_用件

  - step: 紹介状_営業時間判定
    type: date_of_call_classifier
    conditions:
      - match: "営業時間内"
        next: 地域連携室_転送案内
      - match: "営業前"
        next: END_紹介状_営業前_案内
      - match: "営業終了"
        next: END_紹介状_営業終了_案内
      - match: "other"
        next: END_紹介状_営業終了_案内

  - step: 地域連携室_転送案内
    type: announcement
    next: 地域連携室_転送

  - step: 地域連携室_転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    # 転送先電話番号（地域連携室）は人間が IVR プロパティで設定。
    # call_transfer ブロックは status=3(成功)/9(失敗) の END_転送成功/END_転送失敗 を自動生成

  # ============================================================
  # 終話分岐: 用件 → 携帯/その他
  # ============================================================
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "診察"
        next: 終話分岐_新規_電話種別
      - match: "予約変更"
        next: 終話分岐_変更_電話種別
      - match: "予約確認"
        next: 終話分岐_確認_電話種別
      - match: "予約キャンセル"
        next: 終話分岐_キャンセル_電話種別
      - match: "other"
        next: 終話分岐_用件失敗_電話種別

  - step: 終話分岐_新規_電話種別
    type: context_match_router
    reference_module: "連絡先聴取"
    conditions:
      - match: "携帯"
        next: END_新規予約_携帯
      - match: "other"
        next: END_新規予約_その他

  - step: 終話分岐_変更_電話種別
    type: context_match_router
    reference_module: "連絡先聴取"
    conditions:
      - match: "携帯"
        next: END_予約変更_携帯
      - match: "other"
        next: END_予約変更_その他

  - step: 終話分岐_確認_電話種別
    type: context_match_router
    reference_module: "連絡先聴取"
    conditions:
      - match: "携帯"
        next: END_予約確認_携帯
      - match: "other"
        next: END_予約確認_その他

  - step: 終話分岐_キャンセル_電話種別
    type: context_match_router
    reference_module: "連絡先聴取"
    conditions:
      - match: "携帯"
        next: END_予約キャンセル_携帯
      - match: "other"
        next: END_予約キャンセル_その他

  - step: 終話分岐_用件失敗_電話種別
    type: context_match_router
    reference_module: "連絡先聴取"
    conditions:
      - match: "携帯"
        next: END_用件失敗_携帯
      - match: "other"
        next: END_用件失敗_その他

  # ============================================================
  # 終話ブロック
  # ============================================================
  - step: END_予約以外_案内
    type: termination
    termination_ref: "END_予約以外_案内"
  - step: END_他院健診_案内
    type: termination
    termination_ref: "END_他院健診_案内"
  - step: END_選定療養費非了承_案内
    type: termination
    termination_ref: "END_選定療養費非了承_案内"
  - step: END_リハビリ_案内
    type: termination
    termination_ref: "END_リハビリ_案内"
  - step: END_患者サポート_案内
    type: termination
    termination_ref: "END_患者サポート_案内"
  - step: END_キャンセル_次予約なし
    type: termination
    termination_ref: "END_キャンセル_次予約なし"
  - step: END_紹介状_営業前_案内
    type: termination
    termination_ref: "END_紹介状_営業前_案内"
  - step: END_紹介状_営業終了_案内
    type: termination
    termination_ref: "END_紹介状_営業終了_案内"
  - step: END_新規予約_携帯
    type: termination
    termination_ref: "END_新規予約_携帯"
  - step: END_新規予約_その他
    type: termination
    termination_ref: "END_新規予約_その他"
  - step: END_予約変更_携帯
    type: termination
    termination_ref: "END_予約変更_携帯"
  - step: END_予約変更_その他
    type: termination
    termination_ref: "END_予約変更_その他"
  - step: END_予約確認_携帯
    type: termination
    termination_ref: "END_予約確認_携帯"
  - step: END_予約確認_その他
    type: termination
    termination_ref: "END_予約確認_その他"
  - step: END_予約キャンセル_携帯
    type: termination
    termination_ref: "END_予約キャンセル_携帯"
  - step: END_予約キャンセル_その他
    type: termination
    termination_ref: "END_予約キャンセル_その他"
  - step: END_用件失敗_携帯
    type: termination
    termination_ref: "END_用件失敗_携帯"
  - step: END_用件失敗_その他
    type: termination
    termination_ref: "END_用件失敗_その他"

