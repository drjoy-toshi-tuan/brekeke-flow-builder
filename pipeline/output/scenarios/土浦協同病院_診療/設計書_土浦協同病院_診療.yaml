version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "土浦協同病院"
  scenario_name: "診療"
  group_name: "土浦協同病院"
  flow_name: "土浦協同病院$診療"
  target_facility: "土浦協同病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "029-830-3711"        # 代表電話。折り返し連絡発信元・代表案内系終話で読み上げ
  business_hours: "祝日除く 月〜金 8:00-17:30（年末年始 12/27〜1/4 は休止 — Dr.JOY 側 acceptance_times 稼働休止期間で設定。1/5 8:00 から再開）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  # プラットフォーム選択
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "土浦協同病院$診療"
      role: "main"
      description: |
        冒頭（営業時間） → 用件聴取(echo_back, 4 用件 + 予約以外) →
        [用件別前段ゲート: 診察=予約対応 3分岐 (紹介状/健診結果/それ以外)、
         予約変更=変更理由→希望日、予約キャンセル=予約日→用件再判定→キャンセル理由→次予約希望、
         予約確認=確認内容] →
        個人情報サブフロー4本連鎖（診察券→氏名→生年月日→連絡先）→
        紹介状ルート判定（時間内＆紹介状あり → 地域連携室 Blind Transfer / 営業前後 → 折り返し案内）→
        用件×電話種別の終話分岐（携帯=SMS言及あり / その他=SMS言及なし）

  subflows:
    - name: "土浦協同病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。標準サブフローを完全コピー。「わからない」→ END_診察券無し（context保存）→ 親フローでは特別扱いせず、Gen1 同様診察券無しでも氏名・生年月日聴取を続ける"

    - name: "土浦協同病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。標準サブフローを完全コピー。Gen1: 復唱なし"

    - name: "土浦協同病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。標準サブフローを完全コピー。DOB Re-confirmation あり。Gen1 では大正/昭和/平成/令和の枚挙判定だが Gen3 では OpenAI datetime 正規化で吸収"

    - name: "土浦協同病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。標準サブフローを完全コピー。incoming-classifier→携帯確認/連絡先聴取→Phone Normalization→復唱確認→携帯判別→結果返却。Gen1 の市外局番5/4/3/2桁区切り処理は Phone Normalization で標準対応"

# --- セクション3: フローの目的 ---
purpose: |
  土浦協同病院（予約専用 AI 電話）。患者からの予約関連電話を受け、用件
  （診察=新規予約 / 予約変更 / 予約キャンセル / 予約確認）の 4 用件 + 予約以外
  を分類した上で、用件別ルートを実行する。新規予約は前段ゲート 3 分岐
  （紹介状 / 健診結果 / それ以外）で経路を分け、紹介状ありの場合は連絡先聴取後
  に営業時間判定を行い地域連携室への Blind Transfer を実行する。
  個人情報（診察券・氏名・生年月日・連絡先）はサブフローで聴取し、最後に
  電話種別（携帯/その他）と用件で終話メッセージを切り替える（携帯は SMS 言及あり）。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "土浦協同病院$診療"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常/携帯/固定 → acceptance_times
                          ├─ 時間外 → END_時間外(TTS) → 完了フラグ_時間外(status=6) → 切断
                          └─ 受付可 → 冒頭_アナウンス(TTS, 「お電話ありがとうございます。土浦協同病院の、予約専用、AI電話です。」)

      ─── 用件聴取（4 用件 + 予約以外、DTMF 1-4 + AmiVoice STT, echo_back ）───
      用件聴取 → OpenAI_用件聴取
        ├─ 診察(=新規予約)   → 予約対応_用件確認
        ├─ 予約変更         → 予約変更_変更理由聴取
        ├─ 予約キャンセル    → キャンセル_予約日聴取
        ├─ 予約確認         → 確認_内容聴取
        ├─ 予約以外         → END_予約以外_案内
        └─ NO_RESULT/other  → リトライ → No more → END_用件聴取失敗_受付完了

      ─── 診察ルート前段ゲート（予約対応 3 分岐 DTMF 1-3）───
      予約対応_用件確認 → OpenAI_予約対応_用件確認 (echo_back)
        ├─ 紹介状     → 紹介元医療機関名聴取(text)         → 新規_複数診療科確認
        ├─ 健診結果   → 健診場所確認(Yes/No)
        │                 ├─ はい(当院予防医療センター)    → 新規_複数診療科確認
        │                 └─ other(他院 = いいえ)         → END_他院健診_案内
        └─ それ以外   → 再診確認(Yes/No)
                          ├─ はい(再診)                  → 選定療養費確認
                          └─ other(新規 = いいえ)        → 医師指示確認(Yes/No)
                                                            ├─ はい(医師指示あり) → 選定療養費確認
                                                            └─ other(なし)        → 選定療養費確認

      選定療養費確認(Yes/No)
        ├─ はい(了承)  → 症状聴取(text)            → 新規_複数診療科確認
        └─ other(拒否) → END_選定療養費非了承_案内

      ─── 新規予約 共通 ─ 複数診療科確認 → 診療科聴取 → 分岐 ───
      新規_複数診療科確認(Yes/No, save: multipleDeptFlag) → 新規_診療科聴取(enum, no_result_default=登録なし)
        → 新規_診療科分岐(CMR on OpenAI_新規_診療科聴取)
            ├─ リハビリテーション科       → END_リハビリ_案内
            ├─ 患者サポート外来           → END_患者サポート_案内
            └─ other                     → 新規_複数診療科ルーティング(CMR on OpenAI_新規_複数診療科確認)
                                              ├─ はい  → 新規_2科目以降聴取(text) → 次へ_診察券番号
                                              └─ other → 次へ_診察券番号

      ─── 予約変更ルート（簡素化版）───
      予約変更_変更理由聴取(text, save: reason)
        → 予約変更_希望日聴取(datetime, save: reservationDate)
        → 次へ_診察券番号

      ─── 予約キャンセルルート ───
      キャンセル_予約日聴取(datetime, save: reservationDate)
        → キャンセル_用件再判定(CMR on OpenAI_用件聴取)  ※Gen1 用件の確認_2 相当
            ├─ 予約変更            → 予約変更_変更理由聴取（変更ルートに合流）
            └─ other(=キャンセル)  → キャンセル_理由聴取(text, save: reason)
                                         → キャンセル_次予約希望確認(Yes/No)
                                              ├─ はい  → 次へ_診察券番号
                                              └─ other → END_キャンセル_次予約なし

      ─── 予約確認ルート ───
      確認_内容聴取(text, save: reason) → 次へ_診察券番号

      ─── 個人情報サブフロー4本連鎖 ───
      次へ_診察券番号(announcement「それでは、」)
        → 診察券番号聴取(subflow)
        → 患者氏名聴取(subflow)
        → 生年月日聴取(subflow)
        → 連絡先聴取(subflow)
        → 紹介状ルート判定(CMR on OpenAI_予約対応_用件確認)
            ├─ 紹介状     → 紹介状_営業時間判定(date_of_call_classifier)
            │                ├─ 営業時間内(8:30-17:00)  → 地域連携室_転送案内(announcement)
            │                │                              → 地域連携室_転送(call_transfer)
            │                │                                  ├─ 成功 → END_転送成功 (status=3, 自動)
            │                │                                  └─ 失敗 → END_転送失敗 (status=9, 自動)
            │                ├─ 営業前(8:00-8:30)        → END_紹介状_営業前_案内
            │                ├─ 営業後(17:00-17:30)      → END_紹介状_営業終了_案内
            │                └─ other                   → END_紹介状_営業終了_案内
            └─ other     → 終話分岐_用件(CMR on OpenAI_用件聴取)
                              ├─ 診察           → 終話分岐_新規_電話種別 → END_新規予約_携帯/その他
                              ├─ 予約変更       → 終話分岐_変更_電話種別 → END_予約変更_携帯/その他
                              ├─ 予約確認       → 終話分岐_確認_電話種別 → END_予約確認_携帯/その他
                              ├─ 予約キャンセル → 終話分岐_キャンセル_電話種別 → END_予約キャンセル_携帯/その他
                              └─ other         → 終話分岐_用件失敗_電話種別 → END_用件失敗_携帯/その他

      ─── 終話パターン一覧 ───
      END_非通知 (status=2)
      END_時間外 (status=6) — 平日 8:00-17:30 外、年末年始 12/27-1/4 含む
      END_聴取失敗 (status=3)
      END_予約以外_案内 (status=2)
      END_他院健診_案内 (status=2) — 「他院健診の二次検診はお受けできない、近隣医療機関へ」
      END_選定療養費非了承_案内 (status=2) — 「選定療養費を了承いただけない場合は近隣医療機関へ」
      END_リハビリ_案内 (status=2) — 「リハビリテーション科は AI 電話では行っていない、代表電話 029-830-3711 へ」
      END_患者サポート_案内 (status=2) — 「患者サポート外来は AI 電話では行っていない、代表電話へ」
      END_キャンセル_次予約なし (status=1) — Gen1 予約キャンセルの流れ「必要がある場合のみ担当者よりご連絡」
      END_紹介状_営業前_案内 (status=1) — 「8:30 以降に地域連携室より折り返し」
      END_紹介状_営業終了_案内 (status=1) — 「翌診療日 8:30 以降に地域連携室より折り返し」
      END_新規予約_携帯/その他 (status=1)
      END_予約変更_携帯/その他 (status=1)
      END_予約確認_携帯/その他 (status=1)
      END_予約キャンセル_携帯/その他 (status=1)
      END_用件失敗_携帯/その他 (status=1) — Gen1「用件聴取失敗時受付完了」相当
      END_用件聴取失敗_受付完了 (status=3) — リトライ上限到達
      END_転送成功 / END_転送失敗 (call_transfer から自動生成、status=3/9)
    notes: |
      - Gen1 main.yaml の重複箱（用件の確認 / _1 / _2、用件を判断 / _1、肯定否定_1〜_5、紹介状分岐、
        8時半前_1 / _2、複数診療科 flag セット、リハビリだけ代表案内 / _1、患者サポート外来 等）は
        独立ブロック化せず、OpenAI + ContextMatchRouter + context に集約する（feedback_gen1_director_default_rules 第3項）。
      - 用件聴取は echo_back: true（Gen1 は 4 用件それぞれ別の echo_back サブ箱で確認していたが、
        Gen3 標準の汎用復唱「#data#でよろしいですか？」に集約。confirmation_items に記載）。
      - 予約変更ルートは Gen1 の 複数診療科確認 → 診療科聞き取り → リハビリ判定 を省略し、
        「変更理由 → 希望日」のみのシンプル構成（移管ノート §移管方針）。
      - 予約キャンセルルートも 複数診療科 / 診療科 を省略。「予約日 → 用件再判定（変更/キャンセル切替可）→
        キャンセル理由 → 次予約希望」のみ。
      - 紹介状ルート判定は連絡先聴取の後段で実行。CMR で OpenAI_予約対応_用件確認 を参照し、
        「紹介状」 → 営業時間判定 → 地域連携室 Blind Transfer または営業前後の折り返し案内。
      - 営業時間判定は date_of_call_classifier ブロックで 8:30-17:00 を判定（Brekeke UI で
        comparison_time 設定する前提。confirmation_items 参照）。
      - Gen1 の時間別冒頭アナウンス（8時半前/17時以降/時間内）の 3-way バリアントは Gen3 で省略。
        単一の冒頭_アナウンスに集約（confirmation_items に記載）。
      - 携帯/その他で SMS 言及切替（Gen1 携帯番号あり/なし TTS の踏襲）。
      - 産婦人科二次健診特別案内（Gen1 健診結果ルート + 診療科判断 sub の END_産婦人科）は Gen3 で省略
        （confirmation_items 参照）。Brekeke UI で手動追加可能。

