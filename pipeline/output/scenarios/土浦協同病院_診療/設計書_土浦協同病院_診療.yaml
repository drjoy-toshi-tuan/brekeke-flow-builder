    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "音声のみ。Gen1 キャンセル理由.yaml 相当。「キャンセルの理由をおっしゃってください。」"

