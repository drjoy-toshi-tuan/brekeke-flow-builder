    notes: |
      Gen1 診療科聞き取り.yaml + 診療科判断.yaml の OpenAI 統合。Gen1 では分岐あり診療科
      （呼吸器/消化器/脳神経/眼科/整形外科/産婦人科）が選ばれた場合のみ second turn で
      内科/外科等を再質問していたが、Gen3 では追加質問せず OpenAI に文脈判断を委ね、
      呼吸器内科/呼吸器外科/消化器内科/消化器外科/脳神経内科/脳神経外科/産科/婦人科 等の
      最終形で直接返す前提。entity_openai_synonyms.md の類義語を prompter が反映。
      no_result_default=登録なし（モジュール選定ガイド §2.5）。

