# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 3
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "診察"
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
      - "予約以外"
    notes: "DTMF 1=診察 / 2=予約変更 / 3=予約キャンセル / 4=予約確認。DTMF 並走あり（Gen1 用件聞き取り.yaml DTMF分岐より）。Gen1 再診予約/初診予約/予約取得は診察に集約。Gen1 echo_back 4 本（用件別の確認サブ箱）は Gen3 標準の汎用復唱に集約"

  - order: 2
    name: "予約対応_用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 3
    echo_back: true
    save_to: "appointmentSubtype"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "紹介状"
      - "健診結果"
      - "それ以外"
    notes: "DTMF 1=紹介状 / 2=健診結果 / 3=それ以外。Gen1 予約対応.yaml DTMF分岐より。再診予約/初診予約も「それ以外」に集約。echo_back あり（Gen1 では 紹介状へ進む/健診結果へ進む/それ以外へ進む の確認サブ箱）"

  - order: 3
    name: "紹介元医療機関名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "referralSource"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "音声のみ。Gen1 紹介元医療機関名.yaml の自由文聴取（無言/聞き取れずスキップ）"

  - order: 4
    name: "健診場所確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
