  # --- 異常系（デフォルト必須 -- 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（祝日除く 月〜金 8:00-17:30 以外、または年末年始 12/27〜1/4）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、祝日を除く、月曜から金曜の、8時から17時30分となっております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 受付不可系（status=2: 代表案内/AI不可）---
