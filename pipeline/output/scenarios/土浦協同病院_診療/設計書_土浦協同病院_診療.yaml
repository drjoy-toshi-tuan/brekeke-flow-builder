      - "いいえ"
    notes: "DTMF 1=はい / 2=いいえ。Gen1 健診場所確認 + 肯定否定 の Yes/No 判定。「当院の予防医療センターで受けられた結果をお持ちでしょうか？」"

  - order: 5
    name: "再診確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "revisitFlag"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "DTMF 1=はい / 2=いいえ。Gen1 再診確認 + 肯定否定_1 の Yes/No 判定。「予約されるのは現在通院中の診療科ですか？」"

  - order: 6
    name: "医師指示確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "doctorReferralFlag"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "DTMF 1=はい / 2=いいえ。Gen1 医師からの指示確認 + 肯定否定_2 の Yes/No 判定。「土浦協同病院の医師の指示でのご予約でしょうか？」（再診=No 時のみ聴取）"

  - order: 7
