      - "いいえ"
    notes: "DTMF 1=はい / 2=いいえ。Gen1 予約希望確認 + 肯定否定_4 の Yes/No 判定。「次の予約希望はありますか？」"

  - order: 17
    name: "確認_内容聴取"
    stt_type: "AmiVoice_STT"
