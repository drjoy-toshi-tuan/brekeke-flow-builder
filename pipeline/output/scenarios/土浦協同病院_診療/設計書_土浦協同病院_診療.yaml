      - "新生児科"
      - "腎臓内科"
      - "整形外科"
      - "総合内科"
      - "代謝内分泌内科"
      - "乳児検診"
      - "乳腺外科"
      - "乳腺看護外来"
      - "脳神経外科"
      - "脳神経内科"
      - "泌尿器科"
      - "皮膚科"
      - "補聴器外来"
      - "母親学級"
      - "母乳外来"
      - "放射線治療科"
      - "予防接種小児"
      - "膠原病内科"
