# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"
  patterns:
    - condition: "phonetype=携帯"
      sms_flag: "1"
      notes: "携帯ルートのみ SMS 送信あり。終話TTSにSMS言及"
    - condition: "phonetype=その他"
      sms_flag: "-1"
      notes: "固定/IP/フリーは SMS 受信不可。終話TTSにSMS言及なし"

# --- セクション8b: RAG/FAQ検索サブフロー ---
# Gen1 元資料に FAQ/RAG 関連箱は存在しないため none。
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "施設名の挨拶"
    announcement: "お電話ありがとうございます。土浦協同病院の、予約専用、AI電話です。"

  - module_name: "用件聴取"
    purpose: "用件確認（4 用件 + 予約以外、DTMF 1-4）"
    announcement: "ご用件を、次の4つのうちの、いずれかでお話ください。「診察の予約は、1」、「予約の変更は、2」、「予約のキャンセルは、3」、「予約の確認は、4」、それでは、お話ください。"

  - module_name: "予約対応_用件確認"
    purpose: "診察ルート前段ゲート（紹介状/健診結果/それ以外）"
    announcement: "恐れ入りますが、本日これから受診されたい方は、代表番号におかけなおしください。それでは、予約についてお伺いします。次の3つのうち、いずれかでお話ください。「紹介状をお持ちの方は、1」、「健診結果をお持ちの方は、2」、「それ以外の方は、3」、それではお話ください。"

  - module_name: "紹介元医療機関名聴取"
    purpose: "紹介元医療機関名の自由文聴取"
    announcement: "紹介元の医療機関名をお話ください。"

  - module_name: "健診場所確認"
    purpose: "健診結果ルート: 当院予防医療センターか他院か"
    announcement: "「当院の予防医療センター」で受けられた結果をお持ちでしょうか？「はい」または「いいえ」でお話ください。ダイヤルプッシュでも操作可能です。はいの場合は1、いいえの場合は2、を押してください。"

  - module_name: "再診確認"
    purpose: "それ以外ルート: 通院中の診療科か"
    announcement: "予約されるのは現在通院中の診療科ですか？「はい」または「いいえ」でお話ください。ダイヤルプッシュでも操作可能です。はいの場合は1、いいえの場合は2、を押してください。"

  - module_name: "医師指示確認"
    purpose: "それ以外+新規ルート: 医師指示有無"
    announcement: "今回は土浦協同病院の医師の指示でのご予約でしょうか？「はい」または「いいえ」でお話ください。ダイヤルプッシュでも操作可能です。はいの場合は1、いいえの場合は2、を押してください。"

  - module_name: "選定療養費確認"
