    announcement: "当院では診療費とは別に、11000円の選定療養費を徴収しています。ご了承の上、受診を希望されますか？「はい」または「いいえ」でお話ください。ダイヤルプッシュでも操作可能です。はいの場合は1、いいえの場合は2、を押してください。"

  - module_name: "症状聴取"
    purpose: "それ以外ルート: 症状聴取"
