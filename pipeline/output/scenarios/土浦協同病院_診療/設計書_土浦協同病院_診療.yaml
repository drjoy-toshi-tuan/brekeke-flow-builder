    output_labels:
      - "1ケ月健診小児"
      - "がんゲノム診療科"
      - "シナジス外来"
      - "ストーマ外来"
      - "フットケア外来"
      - "ペインクリニック"
      - "ペースメーカー外来"
      - "リハビリテーション科"
      - "リンパ浮腫"
      - "遺伝カウンセリング外来"
      - "患者サポート外来"
      - "漢方外来"
      - "緩和ケア科"
      - "眼科"
      - "救急科"
