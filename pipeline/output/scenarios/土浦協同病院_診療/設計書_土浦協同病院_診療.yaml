    notes: "音声のみ。Gen1 確認内容の聞き取り.yaml 相当。「ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」など、内容を簡潔におっしゃってください。」"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。土浦協同病院の、予約専用、AI電話です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "用件聴取"
    retry_failure: "skip"

  - step_name: "用件聴取"
    tts_announcement: "ご用件を、次の4つのうちの、いずれかでお話ください。「診察の予約は、1」、「予約の変更は、2」、「予約のキャンセルは、3」、「予約の確認は、4」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "診察"
        - "予約変更"
        - "予約キャンセル"
        - "予約確認"
        - "予約以外"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「診察」「診察予約」「診察を取りたい」「診療予約」「初診」「初めて」「再診」「定期」「予約をしたい」「予約取得」"
          output: "診察"
        - input: "DTMF 2 または「予約変更」「日程変更」「変えたい」「日にちを変える」「延期」"
          output: "予約変更"
        - input: "DTMF 3 または「予約キャンセル」「やめる」「取り消し」「取り消す」"
          output: "予約キャンセル"
        - input: "DTMF 4 または「予約確認」「予約票をなくした」「忘れた」「教えて」「調べて」"
          output: "予約確認"
        - input: "「お見舞い」「会計」「処方箋」「症状」「書類」「診断書」「副作用」「アクセス」「お薬」等の予約以外"
          output: "予約以外"
      no_result_condition: "上記いずれにも該当しない・無音"
    save_to: "classification"
    next_step: "（用件別に分岐）"
    retry_failure: "end_failure"

  - step_name: "予約対応_用件確認"
    tts_announcement: "恐れ入りますが、本日これから受診されたい方は、代表番号におかけなおしください。それでは、予約についてお伺いします。次の3つのうち、いずれかでお話ください。「紹介状をお持ちの方は、1」、「健診結果をお持ちの方は、2」、「それ以外の方は、3」、それではお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "紹介状"
        - "健診結果"
        - "それ以外"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「紹介状」「案内状」「手紙」「照会」「照会状」「情報提供書」「診療情報提供書」「提供書」"
          output: "紹介状"
        - input: "DTMF 2 または「健診結果」「健康診断」「再検査」「精密検査」「要精検」"
          output: "健診結果"
        - input: "DTMF 3 または「それ以外」「いつもの」「その他」「なにもない」「診察」「診療」「普通の」「予約」「初診」「再診」「初めて」「新規」「定期」"
          output: "それ以外"
      no_result_condition: "上記いずれにも該当しない・無音"
    save_to: "appointmentSubtype"
    next_step: "紹介状→紹介元医療機関名聴取 / 健診結果→健診場所確認 / それ以外→再診確認"
    retry_failure: "end_failure"

  - step_name: "紹介元医療機関名聴取"
    tts_announcement: "紹介元の医療機関名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "医療機関名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "そのままtextで保存（自由文）"
      no_result_condition: "音声認識結果が空・無言"
    save_to: "referralSource"
    next_step: "新規_複数診療科確認"
    retry_failure: "skip"

  - step_name: "健診場所確認"
    tts_announcement: "「当院の予防医療センター」で受けられた結果をお持ちでしょうか？「はい」または「いいえ」でお話ください。ダイヤルプッシュでも操作可能です。はいの場合は1、いいえの場合は2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「OK」「あっています」「合っています」「大丈夫」「問題ありません」「肯定」"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「ダメ」「ノー」「違います」「違う」"
          output: "いいえ"
      no_result_condition: "肯定/否定が判定できない"
    save_to: "healthCheckLocation"
    next_step: "はい→新規_複数診療科確認 / other→END_他院健診_案内"
    retry_failure: "end_failure"

  - step_name: "再診確認"
    tts_announcement: "予約されるのは現在通院中の診療科ですか？「はい」または「いいえ」でお話ください。ダイヤルプッシュでも操作可能です。はいの場合は1、いいえの場合は2、を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
