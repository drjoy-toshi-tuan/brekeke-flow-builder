      - "いいえ"
    notes: "DTMF 1=はい / 2=いいえ。Gen1 選定療養費の確認 + 肯定否定_3 の Yes/No 判定。「11000円の選定療養費を徴収しています。ご了承の上、受診を希望されますか？」"

  - order: 8
    name: "症状聴取"
