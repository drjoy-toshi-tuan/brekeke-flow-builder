version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "東京女子医科大学病院"
  group_name: "東京女子医科大学病院"
  flow_name: "東京女子医科大学病院$診療_20260410"
  target_facility: "東京女子医科大学病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: ""
  business_hours: "なし（acceptance_times 不使用）"
