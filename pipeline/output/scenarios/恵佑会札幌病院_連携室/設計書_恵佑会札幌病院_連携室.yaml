    save_to: "clinicalDepartment"
    next_step: "(enum) 歯科口腔外科・歯科→END_歯科転送 / default→jump_氏名聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "診療科_初診"
    tts_announcement: "診察を希望する診療科を「診療科は消化器外科です」のようにお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
