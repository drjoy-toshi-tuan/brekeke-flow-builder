# 確認レポート: docs/designs/確認レポート_恵佑会札幌病院_連携室_2026-04-22.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "恵佑会札幌病院"
  group_name: "恵佑会札幌病院"
  flow_name: "恵佑会札幌病院$連携室"
  target_facility: "恵佑会札幌病院"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "TODO_要確認"     # Gen2 プロンプトに明示なし。Dr.JOY 側で acceptance_times 詳細設定
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"               # 移管ノート L4 で明示

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "恵佑会札幌病院$連携室"
      role: "main"
      description: "冒頭 Yes/No 判定 → 用件4択 → (予約/変更/キャンセル/その他問い合わせ) → 共通個人情報聴取サブフロー × 4 → その他確認事項 → 用件×電話種別で終話（8ルート + 代表案内/歯科転送/異常系3）"
  subflows:
    - name: "恵佑会札幌病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/氏名聴取.json を完全コピー。Gen2 L413-415 のカタカナ判定→再聴取1回ロジックはサブフロー内で処理"
    - name: "恵佑会札幌病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/生年月日聴取_復唱あり.json を完全コピー。Gen2 L44「生年月日はyyyy年m月d日でよろしいですか？」の復唱は DOB Re-confirmation モジュール内蔵。和暦（大正/昭和/平成/令和）対応もサブフロー内で処理"
    - name: "恵佑会札幌病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/電話番号聴取_復唱あり.json を完全コピー。Gen2 L437-448 の incoming-classifier 3分岐（mobile=着信番号自動格納→復唱 / landline+withheld=聴取）と phonetype 保存、10/11桁チェック、DTMF再聴取1回ループはすべてサブフロー内で処理。FAQ参照禁止ルール（L80, L431）も prompter が OpenAI プロンプトに反映"
    - name: "恵佑会札幌病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/診察券番号聴取.json を完全コピー。Gen2 L408「わからない」分岐あり。予約新規（紹介状あり/なし）ではスキップし、再診・変更・キャンセル・問い合わせ時のみジャンプ"

# --- セクション3: フローの目的 ---
purpose: "恵佑会札幌病院の診察予約申し込みAI電話（シナリオ名「連携室」だが実態は患者直通）。患者からの電話を受け、用件（予約/変更/キャンセル/その他問い合わせ）・受診歴・紹介状有無・診療科・予約日・患者情報（氏名・生年月日・連絡先電話番号・診察券番号）を聴取してDr.JOYに保存し、折り返し受付を自動化する。当日の予約関連・歯科口腔外科関連は代表電話または専用電話へ案内して終話。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "恵佑会札幌病院$連携室"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 受付時間判定(acceptance_times)
                    ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                    └─ 受付可 → 冒頭_アナウンス(TTS: 施設挨拶)
                          → 当日翌日確認 (hearing, AmiVoice_STT, enum=はい/いいえ)
                              ├─ はい → 用件確認
                              └─ いいえ → END_代表案内(status=2, smsFlag=0) → 切断 [011-863-2101 案内]

      用件確認 (hearing, DTMF_AmiVoice, enum 4択)
        ├─ 予約         → 受診歴確認
        ├─ 変更         → 現在の予約日_変更
        ├─ キャンセル   → 現在の予約日_キャンセル
        └─ その他問い合わせ → 問い合わせ内容

      ■ 予約ルート
      受診歴確認 (hearing, AmiVoice_STT, enum)
        ├─ 新規 → 紹介状確認
        └─ 再診 → 診療科_再診

      紹介状確認 (hearing, AmiVoice_STT, enum)
        ├─ あり → 紹介時診療科
        └─ なし → 診療科_初診

      紹介時診療科 (hearing, AmiVoice_STT, enum, no_result_default=登録なし)
        ├─ 歯科口腔外科・歯科 → END_歯科転送(status=2, smsFlag=0) [050-1725-8755 案内]
        └─ default            → jump_氏名聴取  [※ 新規は診察券番号スキップ]

      診療科_初診 (hearing, AmiVoice_STT, enum, no_result_default=登録なし)
        ├─ 歯科口腔外科・歯科 → END_歯科転送
        └─ default            → jump_氏名聴取  [※ 新規は診察券番号スキップ]

      診療科_再診 (hearing, AmiVoice_STT, enum, no_result_default=登録なし)
        ├─ 歯科口腔外科・歯科 → END_歯科転送
        └─ default            → 予約希望日

      予約希望日 (hearing, text)
        → jump_診察券番号聴取

      ■ 変更ルート
      現在の予約日_変更 (hearing, datetime)
        → 変更_予約希望日 (hearing, text)
        → jump_診察券番号聴取

      ■ キャンセルルート
      現在の予約日_キャンセル (hearing, datetime)
        → キャンセル理由 (hearing, text)
        → jump_診察券番号聴取

      ■ 問い合わせルート
      問い合わせ内容 (hearing, text)
        → jump_診察券番号聴取

      ■ 個人情報共通チェーン
      jump_診察券番号聴取 → jump_氏名聴取 → jump_生年月日聴取 → jump_電話番号聴取
        → その他確認事項 (hearing, text)
        → 終話分岐_用件 (ContextMatchRouter on classification)
            ├─ 予約             → 終話分岐_一般_電話種別
            ├─ 変更             → 終話分岐_一般_電話種別
            ├─ その他問い合わせ → 終話分岐_一般_電話種別
            └─ キャンセル       → 終話分岐_キャンセル_電話種別

      終話分岐_一般_電話種別 (CMR on phonetype)
        ├─ 携帯       → END_一般_携帯 (status=1, smsFlag=1) → 切断
        └─ その他     → END_一般_固定 (status=1, smsFlag=1) → 切断

      終話分岐_キャンセル_電話種別 (CMR on phonetype)
        ├─ 携帯       → END_キャンセル_携帯 (status=1, smsFlag=2) → 切断
        └─ その他     → END_キャンセル_固定 (status=1, smsFlag=2) → 切断

      リトライ上限到達 → END_聴取失敗(status=3, smsFlag=-1) → 切断
    notes: |
      - 予約新規（紹介あり/なし）は診察券番号聴取をスキップし、紹介時診療科/診療科_初診 から直接 jump_氏名聴取 へ遷移（Gen2 L342-353 準拠）。
      - 再診・変更・キャンセル・問い合わせは jump_診察券番号聴取 を経由。
      - 歯科口腔外科の横断遮断は 3種の診療科 hearing で実装。問い合わせ内容・その他確認事項での歯科関連発話の対応は prompter 側の OpenAI プロンプトで注記（scenario_flow では分岐しない）。
      - smsFlag=2 はキャンセル専用。他施設と異なる施設固有ルール。
      - phonetype（携帯 / その他）は電話番号聴取サブフロー内で保存。メインフローの終話分岐で参照。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ─── 冒頭ブロック ───
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 当日翌日確認

  # ─── 当日翌日 Yes/No 判定 ───
  - step: 当日翌日確認
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 用件確認
      - match: "いいえ"
        next: END_代表案内

  # ─── 用件確認（DTMF 4択）───
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "予約"
        next: 受診歴確認
      - match: "変更"
        next: 現在の予約日_変更
      - match: "キャンセル"
        next: 現在の予約日_キャンセル
      - match: "その他問い合わせ"
        next: 問い合わせ内容

  # ─── 予約ルート: 受診歴 → 紹介状 → 診療科 ───
  - step: 受診歴確認
    type: hearing
    output_format: enum
    conditions:
      - match: "新規"
        next: 紹介状確認
      - match: "再診"
        next: 診療科_再診

  - step: 紹介状確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 紹介時診療科
      - match: "なし"
        next: 診療科_初診

  - step: 紹介時診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "歯科口腔外科・歯科"
        next: END_歯科転送
      - match: "default"
        next: jump_氏名聴取

  - step: 診療科_初診
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "歯科口腔外科・歯科"
        next: END_歯科転送
      - match: "default"
        next: jump_氏名聴取

  - step: 診療科_再診
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "歯科口腔外科・歯科"
        next: END_歯科転送
      - match: "default"
        next: 予約希望日

  # ─── 予約希望日（再診ルート専用）───
  - step: 予約希望日
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # ─── 変更ルート ───
  - step: 現在の予約日_変更
    type: hearing
    output_format: datetime
    next: 変更_予約希望日

  - step: 変更_予約希望日
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # ─── キャンセルルート ───
  - step: 現在の予約日_キャンセル
    type: hearing
    output_format: datetime
    next: キャンセル理由

  - step: キャンセル理由
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # ─── 問い合わせルート ───
  - step: 問い合わせ内容
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # ─── 個人情報聴取サブフロー（4連）───
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "恵佑会札幌病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "恵佑会札幌病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "恵佑会札幌病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "恵佑会札幌病院$電話番号聴取"
    next: その他確認事項

  # ─── その他確認事項 ───
  - step: その他確認事項
    type: hearing
    output_format: text
    next: 終話分岐_用件

  # ─── 終話分岐（2段 CMR: 用件 → 電話種別）───
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "予約"
        next: 終話分岐_一般_電話種別
      - match: "変更"
        next: 終話分岐_一般_電話種別
      - match: "その他問い合わせ"
        next: 終話分岐_一般_電話種別
      - match: "キャンセル"
        next: 終話分岐_キャンセル_電話種別

  - step: 終話分岐_一般_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_一般_携帯
      - match: "default"
        next: END_一般_固定

  - step: 終話分岐_キャンセル_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_キャンセル_携帯
      - match: "default"
        next: END_キャンセル_固定

  # ─── 終話ブロック ───
  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

  - step: END_歯科転送
    type: termination
    termination_ref: "END_歯科転送"

  - step: END_一般_携帯
    type: termination
    termination_ref: "END_一般_携帯"

  - step: END_一般_固定
    type: termination
    termination_ref: "END_一般_固定"

  - step: END_キャンセル_携帯
    type: termination
    termination_ref: "END_キャンセル_携帯"

  - step: END_キャンセル_固定
    type: termination
    termination_ref: "END_キャンセル_固定"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "予約"
      - order: "2"
        value: "変更"
      - order: "3"
        value: "キャンセル"
      - order: "4"
        value: "その他問い合わせ"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。DTMF 1-4 または音声で分類"

  - context_name: "history"
    context_name_jp: "受診歴"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約ルートのみ聴取。新規 / 再診 の2値（Gen2 function の enum は未定義だが yaml 本文で分岐）"

  - context_name: "introduction"
