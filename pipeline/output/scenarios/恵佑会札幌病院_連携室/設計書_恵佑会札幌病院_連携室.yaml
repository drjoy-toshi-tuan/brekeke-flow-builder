    notes: "診察券番号聴取サブフローで保存。予約新規ではスキップ。『わからない』分岐あり"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "生年月日聴取サブフローで保存。復唱あり（DOB Re-confirmation 内蔵）。和暦対応"

  - context_name: "telephoneNumber"
