    deletable: true
    notes: "1=通話完了 2=代表案内(非通知/当日/歯科転送) 3=聴取失敗 6=時間外。Gen2 の status=0（途中切断）は CLAUDE.md 規約に従い status=2 相当として扱う"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "自動格納"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "当日翌日確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "冒頭アナウンスの直後に配置する Yes/No 判定。『明日以降＝はい→用件確認 / 本日＝いいえ→代表電話案内で終話』。Gen2 L170-175 準拠。肯定語拡張『肺』→肯定 も prompter で対応"

  - order: 2
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "その他問い合わせ"
    notes: "DTMF 1=予約, 2=変更, 3=キャンセル, 4=その他問い合わせ。音声でも受付（例: 『予約』『変更』）。類義語『薬/お薬/要約→予約』『僕を取る/CPO薬→新規予約』等は prompter で対応"

  - order: 3
    name: "受診歴確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "history"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "再診"
    notes: "予約ルート専用。TTS『新規予約をご希望ですか？2回目以降の診察予約ですか？』。類義語『電気/天気/人気/元気/前期/緊急枠→新規』『印刷/定期/新薬/再診/最新→診察』『写真/そっち→初診→新規』等は prompter で対応"

  - order: 4
    name: "紹介状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "introduction"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "予約・新規ルート専用。TTS『紹介状はお持ちでしょうか？』。肯定/否定で 2 分岐"

  - order: 5
    name: "紹介時診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "消化器外科"
      - "呼吸器外科"
      - "乳腺外科"
      - "消化器内科"
      - "腫瘍内科"
      - "泌尿器科"
      - "耳鼻咽喉科・頭頸部外科"
      - "形成外科"
      - "放射線診断科"
      - "IVRセンター"
      - "放射線治療科"
      - "麻酔科"
      - "緩和ケア内科"
      - "心療内科・サイコオンコロジー外来"
      - "循環器内科"
      - "歯科口腔外科・歯科"
      - "病理診断科"
      - "婦人科"
      - "登録なし"
    notes: "紹介状ありルート専用。no_result_default='登録なし' を設定（モジュール選定ガイド 2.5）。『歯科口腔外科・歯科』判定時は END_歯科転送へ分岐（Gen2 L20-22, L880-883）"

  - order: 6
    name: "診療科_初診"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "消化器外科"
      - "呼吸器外科"
      - "乳腺外科"
      - "消化器内科"
      - "腫瘍内科"
      - "泌尿器科"
      - "耳鼻咽喉科・頭頸部外科"
      - "形成外科"
      - "放射線診断科"
      - "IVRセンター"
      - "放射線治療科"
      - "麻酔科"
      - "緩和ケア内科"
      - "心療内科・サイコオンコロジー外来"
      - "循環器内科"
      - "歯科口腔外科・歯科"
      - "病理診断科"
      - "婦人科"
      - "登録なし"
    notes: "紹介状なしルート専用。no_result_default='登録なし'。『歯科口腔外科・歯科』→ END_歯科転送"

  - order: 7
    name: "診療科_再診"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "消化器外科"
      - "呼吸器外科"
      - "乳腺外科"
      - "消化器内科"
      - "腫瘍内科"
      - "泌尿器科"
      - "耳鼻咽喉科・頭頸部外科"
      - "形成外科"
      - "放射線診断科"
      - "IVRセンター"
      - "放射線治療科"
      - "麻酔科"
      - "緩和ケア内科"
      - "心療内科・サイコオンコロジー外来"
      - "循環器内科"
      - "歯科口腔外科・歯科"
      - "病理診断科"
      - "婦人科"
      - "登録なし"
    notes: "予約・再診ルート専用。no_result_default='登録なし'。『歯科口腔外科・歯科』→ END_歯科転送。default → 予約希望日"

  - order: 8
    name: "予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約・再診ルート専用。フリーテキスト（Gen2 L450『候補日を複数聴取した場合、「、」で区切って格納』）。曖昧表現を許容"

  - order: 9
    name: "現在の予約日_変更"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "変更ルート専用。YYYY-MM-DD HH:MM 形式に正規化。相対日付（今日/明日）は着信日から換算。10-12月に1-9月→翌年扱い（Gen2 L322-326）"

  - order: 10
    name: "変更_予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更ルート専用。フリーテキスト"

  - order: 11
    name: "現在の予約日_キャンセル"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "キャンセルルート専用。YYYY-MM-DD HH:MM 形式に正規化"

  - order: 12
    name: "キャンセル理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "キャンセルルート専用。フリーテキスト"

  - order: 13
    name: "問い合わせ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "その他問い合わせルート専用。フリーテキスト。Gen2 L459-465『FAQで対応できない場合は定型文「担当からの折返しの際に回答をさせていただきます」』は prompter で対応。再聴取は1回のみ（Gen2 L83-84）"

  - order: 14
    name: "その他確認事項"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "others"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "全用件共通の最終聴取。TTS『そのほかに何かお問い合わせは有りませんか？』。『ない』『大丈夫』で即終話、追加質問があっても1回のみ聴取→終話（Gen2 L6, L467-472）"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。恵佑会札幌病院の、診察予約申し込み電話です。テレビの音や周囲の騒音がない静かなところでお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "当日翌日確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "当日翌日確認"
    tts_announcement: "こちらのお電話は明日以降の予約についてのお問い合わせでしょうか？明日以降の場合は「はい」、本日の場合は「いいえ」でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
      mapping:
        - input: "「はい」「明日以降」「肺」（肯定語拡張）を含む"
          output: "はい"
        - input: "「いいえ」「本日」「今日」を含む"
          output: "いいえ"
      no_result_condition: "無応答 / 肯否判定不能"
    save_to: ""
    next_step: "(enum) はい→用件確認 / いいえ→END_代表案内"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "用件確認"
    tts_announcement: "次の４つのうち、いずれかの番号をお話しください。「予約を申し込む方は、１」、「予約を変更する方は、２」、「予約をキャンセルする方は、3」、「その他お問い合わせの方は、4」、または{tts_g:<dtmf digit=\"1\"/>}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "その他問い合わせ"
      mapping:
        - input: "DTMF 1 または「予約」「1」「いち」「薬/お薬/要約/僕を取る/CPO薬（類義語）」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「2」「に」「へんこう」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「3」「さん」「取消」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「その他」「4」「よん」「問い合わせ」を含む"
          output: "その他問い合わせ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "(enum) 予約→受診歴確認 / 変更→現在の予約日_変更 / キャンセル→現在の予約日_キャンセル / その他問い合わせ→問い合わせ内容"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "受診歴確認"
    tts_announcement: "新規予約をご希望ですか？2回目以降の診察予約ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "新規"
        - "再診"
      mapping:
        - input: "「新規」「初めて」「はじめて」「電気/天気/人気/元気/前期/緊急枠（類義語）」を含む"
          output: "新規"
        - input: "「再診」「2回目」「にかいめ」「以前」「過去に」「印刷/定期/新薬/最新（類義語）」を含む"
          output: "再診"
      no_result_condition: "無応答 / 判定不能"
    save_to: "history"
    next_step: "(enum) 新規→紹介状確認 / 再診→診療科_再診"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "紹介状確認"
    tts_announcement: "紹介状はお持ちでしょうか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "「はい」「ある」「持っている」「肺（肯定語拡張）」を含む"
          output: "あり"
        - input: "「いいえ」「ない」「持っていない」を含む"
          output: "なし"
      no_result_condition: "無応答 / 判定不能"
    save_to: "introduction"
    next_step: "(enum) あり→紹介時診療科 / なし→診療科_初診"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "紹介時診療科"
    tts_announcement: "紹介状の封筒に記載されている診療科名を「診療科は消化器外科です」のようにお話しください。わからない場合は「わからない」とお話しください。"
