# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2 からの移管。Gen2 の status=0（冒頭切断/途中切断）と status=2/smsFlag=0（代表案内）は CLAUDE.md 規約に従い以下のマッピングで扱う: 代表案内/歯科転送は status=2 を維持（smsFlag=0）、途中切断は Dr.JOY 側の通話ログから判別"
  - "シナリオ名は『連携室』だが実態は患者直通の診察予約フロー。入電者氏名・医療機関名（organizationName）等の連携室特有聴取項目は無し。通常の地域連携室（医療機関→医療機関）構造と誤認しないこと"
  - "**歯科口腔外科の横断遮断ルール**: 3種の診療科聴取（紹介時/初診/再診）いずれでも『歯科口腔外科』『歯科』含有検出→ END_歯科転送（050-1725-8755 案内, status=2, smsFlag=0）。問い合わせ内容・その他確認事項での歯科関連発話は prompter 側の OpenAI プロンプト（SKILL_E）で注記し、実装は scenario_flow では分岐しない（運用優先）"
  - "**smsFlag=2 はキャンセル専用**: 他施設と異なる施設固有ルール。Dr.JOY 側 SMS 配信管理で smsFlag=1（予約/変更/その他問い合わせ）と smsFlag=2（キャンセル）の文面を別設定する必要あり"
  - "**予約新規は診察券番号聴取をスキップ**: Gen2 L342-353 に準拠。紹介時診療科/診療科_初診 の default 遷移先は jump_氏名聴取（直行）"
  - "**生年月日のみ復唱あり、他復唱禁止**: Gen2 L48-51 準拠。生年月日聴取サブフローは samples/json/生年月日聴取_復唱あり.json を使用、他項目は復唱なし"
  - "**電話番号聴取の FAQ 参照禁止**: Gen2 L80, L431 準拠。電話番号聴取サブフロー内の OpenAI プロンプトに『FAQ/RAG 参照禁止、桁数チェックのみ優先』を明記（prompter 実行時）"
  - "**連絡先電話番号の mobile 分岐**: Gen2 L438-448 準拠。incoming-classifier で mobile（090/080/070/060）=着信番号確認復唱 / landline(050等)=聴取 / withheld=聴取。すべて電話番号聴取サブフロー内部で処理"
  - "**予約日 ≠ 予約希望日**: Gen2 L322-328 準拠。予約日は datetime（変更・キャンセルルートのみ聴取）、予約希望日は text（再診・変更ルートで聴取、曖昧表現許容）。クロスオーバー禁止"
  - "**年度ルール**: Gen2 L324-326 準拠。10-12月に1-9月の日付を言われた場合→翌年扱い。OpenAI プロンプトで反映（prompter 対応）"
  - "**数字誤認識救済**: C→4, for→4, 号/go→5。診察券番号・電話番号・生年月日の OpenAI プロンプトに反映（prompter 対応）"
  - "**類義語救済（多数）**: 慶友会→恵佑会、写真/そっち→初診、電車券→診察券、大地震→受診、iPhone→ハイフン、救急→99 等（Gen2 L269-310）。prompter 側で SKILL_C/D 系プロンプトに転記"
  - "**肯定語の拡張**: Gen2 L313-314 準拠。『肺』→ 肯定。Yes/No 判定（当日翌日確認・紹介状確認・復唱確認）の全プロンプトに適用"
  - "**複数情報同時発話の処理**: Gen2 L53-66, L330-331 準拠。入電者が一度に複数情報を発話した場合、既聴取項目は復唱・再質問禁止、不足項目のみ1つずつ聴取。prompter で全 OpenAI プロンプトに反映"
  - "**その他確認事項の再聴取は1回のみ**: Gen2 L6（2026/03/15 改訂）準拠。追加質問→回答→1回だけ『他にお問い合わせはございますか？』→即終話"
  - "**問い合わせ内容の挙動**: Gen2 L459-465 準拠。FAQ 対応不可時は定型文『問い合わせ内容を承りました。担当からの折返しの際に回答をさせていただきます。』で勝手に終話せず、必ず診察券番号聴取へ遷移（prompter 注記）"
  - "**TTS形式は {tts_g:...} (全小文字)**: CLAUDE.md 準拠。<speak type=\"telephone\">, <dtmf digit=\"1\"/>, <dtmf2/>, <dtmf2 digit=\"8\"/> 等のタグは Gen2 原文通り保持（電話番号案内・DTMF受付時のプロパティ）"
  - "**Gen2 の checkpoint / checkout / endpoint / reservationType は Gen3 context_fields に含めない**: Dr.JOY 側の通話ログから判別するか、saveCompletionFlag2db の status/smsFlag で代替"
  - "**DesiredreservationDate (PascalCase) → desiredReservationDate (camelCase)**: Gen3 命名規則に準拠して変換"

