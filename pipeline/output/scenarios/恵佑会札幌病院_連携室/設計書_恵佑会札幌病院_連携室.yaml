# --- セクション8: 終話パターン ---
termination_patterns:
  # ─── 異常系（デフォルト必須）───
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。恵佑会札幌病院の診察予約申し込み電話です。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # ─── 代表案内系 ───
  - name: "END_代表案内"
    condition: "当日翌日確認で「いいえ」判定（本日予約）"
    tts_announcement: "大変申し訳ございません。当日に関するお問い合わせはAI電話で承っておりません。恐れいりますが、この後ご案内をする代表電話にお問い合わせください。番号をご案内しますのでメモをご準備下さい。番号は{tts_g:<speak type=\"telephone\">011-863-2101</speak>}です。番号は{tts_g:<speak type=\"telephone\">011-863-2101</speak>}です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_代表案内"

  - name: "END_歯科転送"
    condition: "診療科聴取で「歯科口腔外科・歯科」判定"
    tts_announcement: "大変申し訳ございません。歯科口腔外科に関するお問い合わせはこちらでは承っておりません。恐れいりますが、この後ご案内をする専用電話にお問い合わせください。番号をご案内しますのでメモをご準備下さい。番号は{tts_g:<speak type=\"telephone\">050-1725-8755</speak>}です。電話番号は{tts_g:<speak type=\"telephone\">050-1725-8755</speak>}です。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_歯科転送"

  # ─── 正常系: 一般（予約/変更/その他問い合わせ）───
  - name: "END_一般_携帯"
    condition: "全聴取完了 かつ classification ∈ {予約, 変更, その他問い合わせ} かつ phonetype=携帯"
    tts_announcement: "ご用件を受付いたしました。この後すぐに内容を確認いただけるショートメッセージをお送りしますので、必ずご確認と、必要があれば修正をお願いいたします。また3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_一般_携帯"

  - name: "END_一般_固定"
    condition: "全聴取完了 かつ classification ∈ {予約, 変更, その他問い合わせ} かつ phonetype=その他"
    tts_announcement: "ご用件を受付いたしました。3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_一般_固定"

  # ─── 正常系: キャンセル ───
  - name: "END_キャンセル_携帯"
    condition: "全聴取完了 かつ classification=キャンセル かつ phonetype=携帯"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。この後すぐに内容を確認いただけるショートメッセージをお送りしますので、必ずご確認と、必要があれば修正をお願いいたします。また必要がある場合のみ担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル_携帯"

  - name: "END_キャンセル_固定"
    condition: "全聴取完了 かつ classification=キャンセル かつ phonetype=その他"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。必要がある場合のみ担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル_固定"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "phonetype"
  patterns:
    - condition: "classification ∈ {予約, 変更, その他問い合わせ}"
      sms_flag: "1"
      notes: "一般完了系。携帯・固定いずれも smsFlag=1"
    - condition: "classification = キャンセル"
      sms_flag: "2"
      notes: "施設固有: キャンセル専用 smsFlag=2。他施設と異なる"
    - condition: "非通知 / 時間外 / 聴取失敗"
      sms_flag: "-1"
      notes: "SMS送信なし"
    - condition: "代表案内 / 歯科転送"
      sms_flag: "0"
      notes: "Gen2 準拠。SMS送信なし扱い"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  notes: "移管ノート L21 で明示『RAG は元資料に記載なし → 不要』。FAQ 対応不可時は定型文『担当からの折返しの際に回答をさせていただきます』で処理（Gen2 L78-79, L462）"

