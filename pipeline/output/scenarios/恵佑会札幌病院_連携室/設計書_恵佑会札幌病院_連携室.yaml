        - input: "「放射線治療科」「放治」「放射治」「放射線（治療文脈）」を含む"
          output: "放射線治療科"
        - input: "「麻酔科」「麻酔」を含む"
          output: "麻酔科"
        - input: "「緩和ケア内科」「緩和」「緩ケア」「緩和ケア」を含む"
          output: "緩和ケア内科"
        - input: "「心療内科」「サイコオンコロジー」「心内」「心療」を含む"
          output: "心療内科・サイコオンコロジー外来"
        - input: "「循環器内科」「循」「循内」「循環器」を含む"
          output: "循環器内科"
        - input: "「歯科口腔外科」「歯」「歯科」「口外」「歯口外」「歯医者」「口腔外科」を含む"
          output: "歯科口腔外科・歯科"
        - input: "「病理診断科」「病理」「病診」を含む"
          output: "病理診断科"
        - input: "「婦人科」「女性診療」「女性科」「沈下（誤認）」を含む"
          output: "婦人科"
        - input: "「わからない」「不明」「知らない」「リストに該当なし」"
          output: "登録なし"
