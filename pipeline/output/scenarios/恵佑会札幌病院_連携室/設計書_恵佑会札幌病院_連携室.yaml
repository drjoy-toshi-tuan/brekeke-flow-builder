      - order: "8"
        value: "形成外科"
      - order: "9"
        value: "放射線診断科"
      - order: "10"
        value: "IVRセンター"
      - order: "11"
        value: "放射線治療科"
      - order: "12"
        value: "麻酔科"
      - order: "13"
        value: "緩和ケア内科"
      - order: "14"
        value: "心療内科・サイコオンコロジー外来"
      - order: "15"
        value: "循環器内科"
      - order: "16"
        value: "歯科口腔外科・歯科"
