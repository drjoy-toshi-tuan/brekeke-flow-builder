        - input: "「消化器内科」「消内」「消内科」「内科」「私もいない場（誤認）」を含む"
          output: "消化器内科"
        - input: "「腫瘍内科」「腫瘍」「腫内」を含む"
          output: "腫瘍内科"
        - input: "「泌尿器科」「泌」「泌尿」「泌尿器」「起業家（誤認）」を含む"
          output: "泌尿器科"
        - input: "「耳鼻咽喉科」「耳鼻科」「耳鼻」「頭頸部」を含む"
          output: "耳鼻咽喉科・頭頸部外科"
        - input: "「形成外科」「形外」「形成」を含む"
