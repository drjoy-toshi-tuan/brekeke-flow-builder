        value: "消化器外科"
      - order: "2"
        value: "呼吸器外科"
      - order: "3"
        value: "乳腺外科"
      - order: "4"
        value: "消化器内科"
      - order: "5"
        value: "腫瘍内科"
      - order: "6"
