  - "用件分類による分岐は無し。用件は記録のみ（OpenAI で text 正規化、ContextMatchRouter なし）"
  - "ヒアリング項目は3つのみ: ①施設情報（医療機関名・部署・担当者名の合成自由文）/ ②連絡先電話番号（subflow）/ ③用件（自由文）"
  - "氏名・生年月日・診察券番号・診療科の聴取は無し（PatientName/DOB/PatientID サブフロー不要）"
