# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "徳島大学病院$診療"
      role: "main"
      description: |
        冒頭チェーン（営業時間チェック=平日7:00-20:00）→ 体調確認(Y/N)
        → 用件確認(変更/キャンセル/確認, DTMF 1/2/3, echo_back)
        → 変更=WEB案内+Y/N分岐（Y→電話番号サブフロー→SMS終話 / N→AI共通レーン）
        → キャンセル/変更AI=診療科聞き取り(7群階層)→代表案内分岐(放射線→代表電話)→予約日→理由(用件別TTS)
        → 確認=確認内容聴取(text)
        → 個人情報サブフロー4本（診察券→氏名→生年月日→電話番号）→ 折り返し案内 → RAG → 終話(用件別)
  subflows:
    - name: "徳島大学病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピー。8桁。「わからない」分岐あり"
    - name: "徳島大学病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。フルネーム。復唱なし（Gen1原本通り）"
    - name: "徳島大学病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー。和暦/西暦両対応。復唱あり（Gen1原本に復唱モジュールあり）"
    - name: "徳島大学病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。incoming-classifier内蔵。携帯/固定分岐でphonetypeを保存。復唱あり"
    - name: "徳島大学病院$RAG検索"
      target: "RAG検索"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 16 準拠。docs/reference/bivr/samples/json/RAG検索.json を完全コピー。パターン2（全正常終話前に配置）"

# --- セクション3: フローの目的 ---
purpose: "徳島大学病院の予約専用AI電話。患者からの電話を受け、まず体調不良かどうかを確認したうえで（体調不良→外来直接案内）、用件（予約変更/予約キャンセル/予約確認）を聴取する。新規予約はAI受付対象外。予約変更はWEB予約案内（ショートメッセージ送信）の選択を提供し、希望しない場合または他の用件は診療科（7群階層）→予約日→理由→個人情報の聴取を行い、3診療日以内の折り返し連絡を案内して終話する。放射線診断科・放射線治療科は代表電話（088-633-9071）への案内のみ行う。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "徳島大学病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知(status=2) → 切断
              └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times: 平日7:00-20:00, 年末年始休)
                    ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外(status=6) → 切断
                    └─ 受付可 → 冒頭_アナウンス
                          → 体調確認(Y/N)
                              ├─ 体調不良 → END_体調相談(status=2)
                              └─ default → 用件確認(DTMF/voice, echo_back)
                                    ├─ 変更 → 変更_WEB案内 → 変更_WEB利用Y/N
                                    │     ├─ はい → 電話番号聴取(サブフロー) → END_変更_WEB(status=1, smsFlag=1)
                                    │     └─ default(いいえ) → 診療科聞き取り(共通AIレーンへ)
                                    ├─ キャンセル → 診療科聞き取り(共通AIレーンへ)
                                    ├─ 確認 → 理由_確認(text) → 個人情報サブフロー連鎖
                                    └─ default → END_聴取失敗(status=3)

      ★共通AIレーン（変更AI / キャンセル）:
        診療科聞き取り(enum, echo_back, no_result_default=登録なし)
          → 代表案内判別(ContextMatchRouter on 診療科聞き取り)
              ├─ 呼吸器 → 診療科_呼吸器(enum 2値)
              ├─ 消化器 → 診療科_消化器(enum 2値)
              ├─ 脳神経 → 診療科_脳神経(enum 2値)
              ├─ 口腔 → 診療科_口腔(enum 3値)
              ├─ 歯科 → 診療科_歯科(enum 4値, DTMF1-4)
              ├─ 小児 → 診療科_小児(enum 4値, DTMF1-4)
              ├─ 放射線 → END_代表案内(status=2)
              ├─ 放射線治療科 → END_代表案内
              ├─ 放射線診断科 → END_代表案内
              └─ other → 予約日聴取（leaf直接 or 登録なし）
        子hearing(診療科_xxx) → 予約日聴取
        予約日聴取(datetime)
          → 理由分岐(ContextMatchRouter on classification)
              ├─ 変更 → 理由_変更(text)
              ├─ キャンセル → 理由_キャンセル(text)
              └─ other → 理由_キャンセル
        理由_X → 個人情報サブフロー連鎖

      ★個人情報サブフロー連鎖（共通）:
        診察券番号聴取(SF) → 氏名聴取(SF) → 生年月日聴取(SF) → 電話番号聴取(SF)
          → 折り返し案内(announcement)
          → RAG検索(SF)
          → 終話分岐(ContextMatchRouter on classification)
              ├─ 変更 → END_変更_AI(status=1, smsFlag=1)
              ├─ キャンセル → END_キャンセル_AI(status=1, smsFlag=1)
              ├─ 確認 → END_確認_AI(status=1, smsFlag=1)
              └─ other → END_確認_AI
    notes: |
      - acceptance_times使用。受付時間=平日（月〜金）7:00〜20:00。年末年始（12/27〜1/4）はDr.JOY側スケジュール設定で除外（フローJSONには曜日・時間ハードコードしない）。
      - 用件は変更/キャンセル/確認の3択（新規予約はAI受付対象外）。DTMF 1=変更, 2=キャンセル, 3=確認。
      - 用件確認は echo_back=true で各用件の復唱（"ご予約の変更でよろしいですか?"等）を実施。
      - 診療科聞き取りは echo_back=true で親レベル復唱。子hearing（呼吸器/消化器/脳神経/口腔/歯科/小児）は echo_back=false（親で確定済みのため）。
      - 放射線（親）/放射線治療科/放射線診断科は AI受付不可。代表電話 088-633-9071 を 3 回繰り返し読み上げて終話（status=2 代表案内）。
      - 体調不良（体調確認=Y）の場合は外来診療科へ直接連絡を案内して終話（status=2 代表案内）。
      - 変更ルートは2段構成: WEB案内 → WEB利用Y/N → Yes時のみ電話番号聴取(SF)経由で SMS送信案内終話。No時は AI共通レーンに合流。
      - 確認ルートは Gen1 原本通り 診療科・予約日聴取をスキップして 確認内容聴取(text) → 個人情報 → 終話。
      - 個人情報サブフロー4本（診察券→氏名→生年月日→電話番号）は全用件で共通（変更_WEB除く）。
      - 全正常終話前に RAG検索サブフロー（パターン2）を配置。Gen1 原本に FAQ は無いが Gen1→Gen3 移管デフォルトに従う。
      - 終話TTSは Gen1 の "予約変更の申し込みを受け付け致しました" 等の用件別 TTS を尊重し、共通の "3診療日以内に担当者から折り返し電話、もしくは、ショートメッセージにてご連絡いたします" + "お電話ありがとうございました。それでは失礼いたします" を後段に連結する。
      - 終話 status: 1=未処理（受付完了）/ 2=代表案内（体調不良・放射線・非通知）/ 3=聴取失敗 / 6=時間外。Gen1の status=0 は第3世代禁止のため使用しない。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 体調確認

  # --- 体調確認 ---
  - step: 体調確認
    type: hearing
    output_format: enum
    conditions:
      - match: "体調不良"
        next: END_体調相談
      - match: "other"
        next: 用件確認
    retry_failure: end_failure

  # --- 用件確認 ---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "変更"
        next: 変更_WEB案内
      - match: "キャンセル"
        next: 診療科聞き取り
      - match: "確認"
        next: 理由_確認
      - match: "other"
        next: END_聴取失敗
    retry_failure: end_failure

  # --- 変更ルート（WEB案内）---
  - step: 変更_WEB案内
    type: announcement
    next: 変更_WEB利用Y_N

  - step: 変更_WEB利用Y_N
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 電話番号聴取_WEB
      - match: "other"
        next: 診療科聞き取り
    retry_failure: skip

  - step: 電話番号聴取_WEB
    type: subflow
    flowname: "徳島大学病院$電話番号聴取"
    next: END_変更_WEB

  # --- 共通AIレーン: 診療科聞き取り（親）---
  - step: 診療科聞き取り
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 代表案内判別
    retry_failure: skip

  # --- 代表案内判別（放射線→代表電話 / それ以外→子hearing or leaf直接）---
  - step: 代表案内判別
    type: context_match_router
    reference_module: "診療科聞き取り"
    conditions:
      - match: "呼吸器"
        next: 診療科_呼吸器
      - match: "消化器"
        next: 診療科_消化器
      - match: "脳神経"
        next: 診療科_脳神経
      - match: "口腔"
        next: 診療科_口腔
      - match: "歯科"
        next: 診療科_歯科
      - match: "小児"
        next: 診療科_小児
      - match: "放射線"
        next: END_代表案内
      - match: "放射線治療科"
        next: END_代表案内
      - match: "放射線診断科"
        next: END_代表案内
      - match: "other"
        next: 予約日聴取

  # --- 子hearing（7群のうち6群、放射線は代表案内へ）---
  - step: 診療科_呼吸器
    type: hearing
    output_format: enum
    next: 予約日聴取
    retry_failure: skip

  - step: 診療科_消化器
    type: hearing
    output_format: enum
    next: 予約日聴取
    retry_failure: skip

  - step: 診療科_脳神経
    type: hearing
    output_format: enum
    next: 予約日聴取
    retry_failure: skip

  - step: 診療科_口腔
    type: hearing
    output_format: enum
    next: 予約日聴取
    retry_failure: skip

  - step: 診療科_歯科
    type: hearing
    output_format: enum
    next: 予約日聴取
    retry_failure: skip

  - step: 診療科_小児
    type: hearing
    output_format: enum
    next: 予約日聴取
    retry_failure: skip

  # --- 予約日聴取 ---
  - step: 予約日聴取
    type: hearing
    output_format: datetime
    next: 理由分岐
    retry_failure: skip

  # --- 理由分岐（用件で TTS 振り分け）---
  - step: 理由分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 理由_変更
      - match: "キャンセル"
        next: 理由_キャンセル
      - match: "other"
        next: 理由_キャンセル

  - step: 理由_変更
    type: hearing
    output_format: text
    next: 診察券番号聴取
    retry_failure: skip

  - step: 理由_キャンセル
    type: hearing
    output_format: text
    next: 診察券番号聴取
    retry_failure: skip

  # --- 確認ルート: 確認内容聴取（text）---
  - step: 理由_確認
    type: hearing
    output_format: text
    next: 診察券番号聴取
    retry_failure: skip

  # --- 個人情報サブフロー連鎖 ---
  - step: 診察券番号聴取
    type: subflow
    flowname: "徳島大学病院$診察券番号聴取"
    next: 氏名聴取

  - step: 氏名聴取
    type: subflow
    flowname: "徳島大学病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "徳島大学病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "徳島大学病院$電話番号聴取"
    next: 折り返し案内

  # --- 折り返し案内 → RAG → 終話分岐 ---
  - step: 折り返し案内
    type: announcement
    next: RAG検索

  - step: RAG検索
    type: subflow
    flowname: "徳島大学病院$RAG検索"
    next: 終話分岐

  - step: 終話分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: END_変更_AI
      - match: "キャンセル"
        next: END_キャンセル_AI
      - match: "確認"
        next: END_確認_AI
      - match: "other"
        next: END_確認_AI

  # --- 終話 ---
  - step: END_体調相談
    type: termination
    termination_ref: "END_体調相談"

  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

  - step: END_変更_WEB
    type: termination
    termination_ref: "END_変更_WEB"

  - step: END_変更_AI
    type: termination
    termination_ref: "END_変更_AI"

  - step: END_キャンセル_AI
    type: termination
    termination_ref: "END_キャンセル_AI"

  - step: END_確認_AI
    type: termination
    termination_ref: "END_確認_AI"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

