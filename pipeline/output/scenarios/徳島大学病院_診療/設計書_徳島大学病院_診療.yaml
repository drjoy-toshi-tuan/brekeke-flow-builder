# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。徳島大学病院の、予約専用AI電話です。"
    input_method: "none"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: null
    next_step: "体調確認"
    retry_failure: "skip"

  - step_name: "体調確認"
    tts_announcement: "まず初めに、今回のお問い合わせは、体調が悪くて本日診察を受けたい、もしくは、体調が悪くて予約を変更したいですか？はい、または、いいえ、でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "体調不良"
        - "通常"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「そうです」「OK」等の肯定発話、または「体調が悪い」「本日受診したい」等の体調不良を示す発話"
          output: "体調不良"
        - input: "「いいえ」「違います」「ダメ」等の否定発話"
          output: "通常"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "肯定/否定のいずれにも判定できない"
    save_to: "physicalCondition"
    next_step: "体調不良→END_体調相談 / other(通常/NO_RESULT)→用件確認"
    retry_failure: "end_failure"
    retry_failure_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の3つのうちのいずれかでお話ください。「1番、予約変更」、「2番、予約キャンセル」、「3番、予約確認」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「変更」「予約変更」「延期」「取り直したい」「変えたい」を含む"
          output: "変更"
        - input: "DTMF 2 または「キャンセル」「取り消し」「やめる」「予約のキャンセル」を含む"
          output: "キャンセル"
        - input: "DTMF 3 または「確認」「予約確認」「日にち」「時間」「教えて」「分からない」「忘れた」「紛失」を含む"
          output: "確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "変更・キャンセル・確認のいずれにも判定できない"
    save_to: "classification"
    next_step: "変更→変更_WEB案内 / キャンセル→診療科聞き取り / 確認→理由_確認 / NO_RESULT→END_聴取失敗"
    retry_failure: "end_failure"

  - step_name: "変更_WEB案内"
    tts_announcement: "予約変更は、WEBでも受付を行っております。WEB予約ページのご案内をショートメッセージでお送りすることができますが、ご希望されますか？"
    input_method: "none"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: null
    next_step: "変更_WEB利用Y_N"
    retry_failure: "skip"

  - step_name: "変更_WEB利用Y_N"
    tts_announcement: "「はい」、または「いいえ」、でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「OK」「お願いします」「希望します」等の肯定発話"
          output: "はい"
        - input: "「いいえ」「違います」「結構です」「電話で」等の否定発話"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "肯定/否定のいずれにも判定できない"
    save_to: "webApplyConsent"
    next_step: "はい→電話番号聴取_WEB / other→診療科聞き取り（AI共通レーン）"
    retry_failure: "skip"

  - step_name: "診療科聞き取り"
    tts_announcement: "予約されている診療科をおっしゃって下さい。わからない場合は、「わからない」とお話下さい。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "呼吸器"
        - "消化器"
        - "脳神経"
        - "口腔"
        - "歯科"
        - "小児"
        - "放射線"
        - "呼吸器膠原病内科"
        - "呼吸器外科"
        - "消化器内科"
        - "消化器外科"
        - "脳神経内科"
