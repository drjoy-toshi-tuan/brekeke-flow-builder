# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1（commubo）→ Gen3 移管。原本ファイル: commubo抽出/【075】徳島大学病院/【0079徳島大学病院】診療1_M_本番/main.yaml + 14本のサブyaml"
  - "新規予約はAI受付対象外。用件は変更/キャンセル/確認の3択のみ（Gen1原本通り）"
  - "冒頭の体調確認（Y/N）はGen1固有の仕様。体調不良→外来診療科への直接連絡を案内して終話（status=2 代表案内扱い）"
  - "診療科は7群階層: 親hearing→ContextMatchRouter→子hearing（呼吸器/消化器/脳神経/口腔/歯科/小児）の構成。放射線（親）/放射線治療科/放射線診断科は AI受付不可で代表電話案内終話"
  - "代表電話案内（END_代表案内）は 088-633-9071 を3回繰り返し読み上げ。Gen1原本の繰り返しカウントロジックは TTS文言内に集約"
  - "予約変更は WEB予約案内（SMS送信）→Y/N分岐の2段構成。Y→電話番号聴取SF→SMS送信終話 / N→AI共通レーン（診療科→予約日→理由→個人情報→折り返し案内）"
  - "予約確認ルートは Gen1原本通り 診療科聞き取り・予約日聴取をスキップして 確認内容聴取(text)→個人情報→折り返し案内→終話"
  - "理由聴取は用件で TTS 文言を切替: 変更=「今回の変更理由と、次回予約希望日をご自由に」/ キャンセル=「キャンセル理由を簡単に」/ 確認=「次回の予約日時を教えて欲しい等、内容を簡潔に」"
  - "echo_back（復唱）対象: 用件確認 + 診療科聞き取り（親） + 予約日聴取 + 生年月日聴取(SF) + 電話番号聴取(SF)。子hearing（診療科_xxx）は echo_back=false（親で確定済み）"
  - "用件確認は DTMF 1=変更, 2=キャンセル, 3=確認。診療科_歯科 / 診療科_小児 は DTMF 1-4。それ以外は voice_only"
  - "受付時間=月〜金 7:00〜20:00、年末年始 12/27〜1/4 休診。年末年始の \"8時30分から再開\" という Gen1 文言は7時受付と矛盾するため END_時間外 では時刻を含めない汎用文言に統一。Gen1の TEST番号登録（運用テスト用14件の判別ロジック）は Gen3 では再現しない"
  - "個人情報サブフロー4本（診察券→氏名→生年月日→電話番号）は CLAUDE.md Rule 9 準拠でサンプルJSON完全コピー。フロー名プレフィックスのみ \"徳島大学病院$\" に置換"
  - "RAG検索サブフローは Gen1→Gen3 移管デフォルト（パターン2）に従い、全正常終話前（折り返し案内→終話分岐の間）に配置。変更_WEBレーン（短縮ルート）にはRAG配置しない"
  - "Gen1 status=0（途中切断）/status=5（処理済み）は第3世代禁止のため、本設計書では 1/2/3/6 のみ使用"
  - "Gen1 原本 \"小児科の聞き取りへ\" box の TTS タイポ「3番、小児小児歯科」は「3番、小児歯科」に修正（要マネージャー確認）"
  - "コンテキスト入れ替え box（呼吸器・膠原病内科 / 内分泌・代謝内科 の中黒入り正式表記セット）は OpenAI 正規化辞書に吸収（独立ブロック化不要）"
  - "Gen1 で複数経路に出現する 用件分岐_1 / 用件分岐_2 / セットした用件の分岐 / 用件判別 等は、Gen3 では classification context を一度確定後 ContextMatchRouter で参照することで重複聴取を回避"
  - "Gen1 の TEST番号登録 box（運用テスト用入電番号14件 + 担当者携帯）は Gen3 では再現しない（本番設計から除外）"
  - "Gen1 の代表電話案内は TTS 案内のみで実際の Blind Transfer は無し。設計書でも Call Transfer モジュールは配置しない"

