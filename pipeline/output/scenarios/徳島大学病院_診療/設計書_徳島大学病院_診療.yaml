# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "体調確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "physicalCondition"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "体調不良"
      - "通常"
    notes: "Gen1「体調確認.yaml」。\"体調が悪くて本日診察を受けたい、もしくは、体調が悪くて予約を変更したいですか？\" に対する Y/N 判定。Yes(体調不良)→END_体調相談 / No(通常)→用件確認。SKILL_B（Yes/No判定）パターン"

  - order: 2
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "DTMF 1=変更, 2=キャンセル, 3=確認。echo_back=true で各用件の復唱（ご予約の変更でよろしいですか?等）を実施。新規予約はAI受付対象外のため3択のみ。リトライ失敗→END_聴取失敗。SKILL_A（分類）パターン"

  - order: 3
    name: "変更_WEB利用Y_N"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "webApplyConsent"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
