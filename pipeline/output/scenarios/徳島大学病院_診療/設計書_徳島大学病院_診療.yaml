        - input: "「内科」「口腔内科」を含む"
          output: "口腔内科"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "3科のいずれにも判定できない"
    save_to: "clinicalDepartment"
    next_step: "予約日聴取"
    retry_failure: "skip"

  - step_name: "診療科_歯科"
    tts_announcement: "歯科は複数ございます。この後ご案内する診療科名、もしくは番号でお話下さい。1番、歯科衛生室、2番、歯科統合臨床センター、3番、歯科放射線科、4番、歯科麻酔科。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "歯科衛生室"
        - "歯科統合臨床センター"
        - "歯科放射線科"
