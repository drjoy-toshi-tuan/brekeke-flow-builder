# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（平日7:00-20:00 以外、または年末年始 12/27-1/4）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、土日祝日を除く、月曜日から金曜日の午前7時から午後20時となっております。なお、年末年始は休診となっております。恐れ入りますが、受付時間内にお掛け直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件確認/体調確認）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（施設固有）---
  - name: "END_体調相談"
    condition: "体調確認=Yes（体調不良）"
    tts_announcement: "申し訳ございません。体調に関するご予約の相談や連絡は、恐れ入りますが、予約されている外来診療科へ直接おかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_体調相談"
  - name: "END_代表案内"
    condition: "診療科=放射線/放射線治療科/放射線診断科（AI受付不可）"
    tts_announcement: "申し訳ございません。放射線科は、AI電話では承ることができません。恐れ入りますが、専用番号にお掛け直し下さい。電話番号がわかる場合は、お電話をお切りください。お分かりにならない場合はご案内いたしますので、メモをご用意ください。番号は、088-633-9071です。繰り返します。番号は、088-633-9071です。繰り返します。番号は、088-633-9071です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内"
  - name: "END_変更_WEB"
    condition: "予約変更ルート + WEB利用希望（Y）"
    tts_announcement: "予約変更の申し込みを受け付け致しました。お電話終了後にショートメッセージにてWEB予約ページをお送りいたしますのでご確認ください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更_WEB"
  - name: "END_変更_AI"
    condition: "予約変更ルート + AI受付完了（WEB利用希望なし or 否定）"
    tts_announcement: "予約変更の申し込みを受け付け致しました。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更_AI"
  - name: "END_キャンセル_AI"
    condition: "予約キャンセルルート受付完了"
    tts_announcement: "予約キャンセルの申し込みを受け付け致しました。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_キャンセル_AI"
  - name: "END_確認_AI"
    condition: "予約確認ルート受付完了"
    tts_announcement: "予約に関するお問い合わせを受付いたしました。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_確認_AI"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # smsFlag は各終話パターンに直接設定済みのため、ContextMatchRouter/Scriptでの分岐は不要。
  # 変更_WEB=1, 変更_AI=1, キャンセル=1, 確認=1, 体調相談=-1, 代表案内=-1, 非通知=-1, 時間外=-1, 聴取失敗=-1

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"
  inquiry_insertion_point: ""
  pre_termination: true
  # パターン2: 全正常終話前（折り返し案内 → 終話分岐 の間）にRAGサブフローを配置。
  # 「最後にご質問はございますか？」と問いかけ、質問があればRAG回答ループ、なければ終話へ。
  # Gen1原本にFAQ/RAGの記載は無いが、Gen1→Gen3移管デフォルト（パターン2）に従う。
  # 変更_WEBレーン（電話番号聴取SF経由の短縮ルート）にはRAGを配置しない（即終話）。

