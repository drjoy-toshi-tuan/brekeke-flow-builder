# --- セクション11: 特記事項・制約 ---
special_notes:
  - "愛仁会健診固有: 用件入口は DTMF 2 値のみ（1=新規予約 / 2=予約以外）。倉敷の 5 分岐 / 蘇生会の 5 分岐とは異なる極めてシンプルな入口（migration note 第 1 項、director 判断ログ #1）"
  - "「予約以外」エンティティは予約に関する話ではなく、アクセス/書類/症状/会計等の問い合わせ全般を指す施設固有定義（22 件のキーワード）。Gen3 ではこれらを WEB 予約フォームへ SMS 送信して案内する独自運用（migration note 第 8 項）"
  - "Gen1 の「時間外 → 携帯チェック → WEB予約案内」分岐は director 判断で本初版では未実装。時間外は END_時間外 (072-692-9291 案内) に集約。NON-BLOCKER N-3 で確認の上、必要なら次版で追加実装"
  - "Gen1 の「予約以外ルート開始時に携帯あり=WEB予約希望確認(DTMF 1=WEB / 2=TEL) → 1=即終話」の早期 WEB 離脱パスも本初版では未実装。全員 氏名→生年月日→連絡先 を聴取してから 用件詳細確認 → WEB案内 / 代表電話案内 に振り分ける。NON-BLOCKER N-4"
  - "用件詳細確認は Gen3 新設の OpenAI 分類点（Gen1 main.yaml の「用件の分岐」が dead code として残っており、Gen3 で active 化する設計判断、director 判断ログ #2）"
  - "用件確認の echo_back: true は scaffold 標準の Re-confirmation node（#data# 埋め込み）を使用。Gen1 の個別文言（DTMF 1→「予約を取る、ですね。」/ DTMF 2→「ご予約以外の用件、ですね。」）は再現しない。NON-BLOCKER N-2"
  - "代表電話 072-692-9291（健康管理センター直通）は CP 系終話（END_時間外 / END_聴取失敗 / END_予約以外_代表案内）で 3 回繰り返し読み上げる（短縮・省略禁止）"
  - "電話番号には半角ハイフンを使用（072-692-9291）。Brekeke 仕様で全角や中黒は不可"
  - "PatientName サブフローは 1 枠のみ。Gen1「受診者名（担当者名）」を PatientName で集約（受診者と担当者の分離設計は無し、director.md §3.1.1）"
  - "受付時間は 月-金 9:00-15:00、土 9:00-12:00（時間外案内 TTS 値を採用）。代表電話案内 TTS の「8:45-17:00」とは差分あり、director 判断で時間外案内の値を本番受付時間と推定（migration note）"
  - "Gen1 の動的タグ「<? $連絡先電話番号（ハイフン区切あり） ?>」「<? $入電番号（ハイフン区切りあり） ?>」等は Gen3 では電話番号聴取サブフロー内の Re-confirmation node が #data# 埋め込みで自動処理"
  - "saveCompletionFlag2db の status 値は Gen3 許可値（1/2/3/6/7/8/9）のみを使用。Gen2 で使われていた 0/5 は禁止"
  - "TTS は `{tts_g:...}` 形式（小文字、Google TTS デフォルト）。SSML タグは使用禁止（電話番号読み上げ用 say-as は scaffold が自動付与する範囲のみ許容）"
  - "転送機能は無し（Blind Transfer / Attended Transfer ともに無し）。代表電話番号案内型の終話（番号案内型）"
  - "「タイトル」「それでは」等の繋ぎ TTS（Gen1 main.yaml）は次段ブロック先頭 TTS にマージしている（director 判断ログ #5）"
  - "受診希望日 (新規) は datetime ではなく text で保存（曖昧表現「10月中旬」を許容するため、director 判断ログ #3）。現在の予約日 (予約以外) は datetime で正規化（具体的な既存予約日の特定が必要）"
  - "Gen1 yaml では新規ルートも 受診者名→生年月日→連絡先→受診希望日 を聴取するが、director は migration note 第 1 項『新規ルートは受診希望日のみ聴取』を踏まえつつ、Dr.JOY 側で患者特定が必要なため Gen3 でも氏名・生年月日・連絡先は聴取する設計とした（director 判断ログ #6）"

