# --- smsFlag 分岐設計 ---
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"
    - "classification"
  patterns:
    - condition: "新規 かつ phonetype=携帯"
      sms_flag: "1"
      notes: "新規予約完了時、携帯ならSMS送信。3営業日以内の折り返し電話 + SMS"
    - condition: "新規 かつ phonetype=その他"
      sms_flag: "-1"
      notes: "固定/その他は SMS 受信不可。折り返し電話のみ"
    - condition: "予約以外（other=変更/キャンセル/予約確認） かつ phonetype=携帯"
      sms_flag: "1"
      notes: "変更/キャンセル受付完了時、携帯ならSMS送信"
    - condition: "予約以外（other=変更/キャンセル/予約確認） かつ phonetype=その他"
      sms_flag: "-1"
      notes: "固定/その他は SMS 受信不可"
    - condition: "予約以外（=アクセス/書類等） かつ phonetype=携帯"
      sms_flag: "1"
      notes: "WEB予約フォーム URL を SMS で送付（施設固有運用）"
    - condition: "予約以外（=アクセス/書類等） かつ phonetype=その他"
      sms_flag: "-1"
      notes: "WEB案内不可のため代表電話を案内"
    - condition: "非通知・時間外・聴取失敗（異常系）"
      sms_flag: "-1"
      notes: "全異常終話で SMS 送信なし"

