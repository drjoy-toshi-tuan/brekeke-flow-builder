# 設計書 -- 愛仁会健診センター 健診
# 生成元: @director エージェント
# 生成日: 2026/05/07
# 確認レポート: output/scenarios/愛仁会健診センター_健診/確認レポート_愛仁会健診センター_健診_20260507.md
# 作業種別: Gen1→Gen3 移管
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "愛仁会健診センター"
  scenario_name: "健診"
  group_name: "愛仁会健診センター"
  flow_name: "愛仁会健診センター$健診"
  target_facility: "愛仁会総合健康センター（健康管理センター）"
  office_id: "TODO_要確認"
  phone_number: "072-692-9291"
  business_hours: "祝日・年末年始除く 月〜金 9:00〜15:00、土 9:00〜12:00（acceptance_times、NON-BLOCKER N-1）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "愛仁会健診センター$健診"
      role: "main"
      description: |
        冒頭 → 用件確認(DTMF 1=新規 / 2=予約以外、echo_back) →
        新規ルート: 氏名→生年月日→連絡先→受診希望日→終話分岐(phonetype) → END。
        予約以外ルート: 氏名→生年月日→連絡先→用件詳細確認(OpenAI 2-way) →
          - 予約以外(アクセス/書類等): phonetype分岐 → 携帯=WEB予約フォーム案内SMS / その他=代表電話案内
          - 変更/キャンセル/予約確認: 現在の予約日 → 終話分岐(phonetype) → END。
        転送無し（番号案内型）。代表電話 072-692-9291 を CP 系終話で 3 回繰り返し読み上げ。
  subflows:
    - name: "愛仁会健診センター$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー（director.md §3.1.1）。Gen1「受診者名（担当者名）聴取」を PatientName 1 枠に充当（受診者と担当者の分離設計は無し）"
    - name: "愛仁会健診センター$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 使用。和暦/西暦両対応・大正/昭和元年/昭和/平成元年/平成/令和元年/令和の自動判定"
    - name: "愛仁会健診センター$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Phone Normalization + Re-confirmation。incoming-classifier で携帯/固定/その他を分岐し phonetype を設定。SMS 送信可否の判断に使用。非通知は冒頭 opening で既に弾いているためここには到達しない"

# --- セクション3: フローの目的 ---
purpose: |
  愛仁会総合健康センター（健康管理センター）健診予約専用ダイヤルへの着信を受け、
  健康診断の新規予約 または 予約以外（変更／キャンセル／予約確認／その他問い合わせ）の用件を聴取し、
  氏名・生年月日・連絡先電話番号を収集して、3 営業日以内の担当者折り返し電話または
  ショートメールでの連絡につなげる。
  「予約以外」と判定された場合（アクセス／書類／症状／会計等の問い合わせ全般）で、
  着信が携帯電話の場合は WEB 予約フォーム URL を SMS 送信して案内、
  固定電話の場合は代表電話 072-692-9291 を 3 回繰り返し読み上げて再度かけ直しを案内する。
  時間外・聴取失敗・非通知は同代表電話を案内する。転送機能は無し。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "愛仁会健診センター$健診"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信分類(incoming-classifier)
              ├─ 非通知 → END_非通知 → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times)
                                    ├─ 時間外 → END_時間外(072-692-9291案内) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                                    └─ 受付可 → 冒頭_アナウンス(TTS)
                                                  → 用件確認

      用件確認(hearing DTMF 2-value, echo_back: true)
        ├─ 新規(DTMF 1) → 氏名聴取 → 生年月日聴取 → 電話番号聴取 → 受診希望日(text)
        │                          → 終話_phonetype分岐
        │                            ├─ 携帯 → END_新規受付_携帯(SMS送信あり, status=1, smsFlag=1)
        │                            └─ other → END_新規受付_その他(SMS送信なし, status=1, smsFlag=-1)
        │
        └─ 予約以外(DTMF 2) → 氏名聴取 → 生年月日聴取 → 電話番号聴取 → 用件詳細確認(enum 2-way)
                              ├─ 予約以外(アクセス/書類等) → 予約以外_phonetype分岐
                              │                              ├─ 携帯 → WEB予約フォーム案内 → END_WEB案内(SMS送信あり, status=1, smsFlag=1)
                              │                              └─ other → END_予約以外_代表案内(072-692-9291案内, status=2, smsFlag=-1)
                              │
                              └─ other(=変更/キャンセル/予約確認) → 現在の予約日(datetime)
                                                                  → 変更_phonetype分岐
                                                                    ├─ 携帯 → END_変更受付_携帯(SMS送信あり, status=1, smsFlag=1)
                                                                    └─ other → END_変更受付_その他(SMS送信なし, status=1, smsFlag=-1)

      ─── サブフロー遷移 ───
      氏名聴取    = Custom Jump to Flow → 愛仁会健診センター$氏名聴取（return）
      生年月日聴取 = Custom Jump to Flow → 愛仁会健診センター$生年月日聴取（return）
      電話番号聴取 = Custom Jump to Flow → 愛仁会健診センター$電話番号聴取（return、phonetype を設定）

      ─── 異常終話 ───
      END_非通知       : 非通知着信     → status=2, smsFlag=-1
      END_時間外       : 受付時間外     → status=6, smsFlag=-1（072-692-9291 を 3 回繰返）
      END_聴取失敗     : リトライ上限到達 → status=3, smsFlag=-1（072-692-9291 を 3 回繰返）
    notes: |
      Pattern A 採用箇所: 用件確認（DTMF 2-way enum 直後分岐）、用件詳細確認（OpenAI enum 直後分岐: 予約以外 vs other）。
      Pattern B 採用箇所: 終話_phonetype分岐 / 予約以外_phonetype分岐 / 変更_phonetype分岐（context_match_router: 電話番号聴取 の phonetype 出力を参照）。
      用件確認は echo_back: true で内蔵復唱（NON-BLOCKER N-2）。Gen1 では DTMF 1 → 「予約を取る、ですね。」/ DTMF 2 → 「ご予約以外の用件、ですね。」の個別文言だが、scaffold の echo_back は #data# 埋め込みの汎用復唱に置換される。
      Gen1 の「時間外 → 携帯チェック → WEB予約案内」分岐は director 判断で **本初版では未実装** とし、時間外は END_時間外（072-692-9291 案内）に集約（NON-BLOCKER N-3）。
      Gen1 の「予約以外ルート開始時に携帯あり=WEB予約希望確認(DTMF 1=WEB / 2=TEL) → 1=即終話」の早期 WEB 離脱パスも director 判断で **本初版では未実装** とし、全員 氏名→生年月日→連絡先 を聴取してから用件詳細確認 → WEB案内 / 代表電話案内 に振り分ける（NON-BLOCKER N-4）。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック（opening + 冒頭_アナウンス は 2 ブロック 1 セット）---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # --- 用件確認（DTMF 2-value, echo_back, Pattern A）---
  - step: 用件確認
    type: hearing
    output_format: enum
    save_to: classification
    echo_back: true
    conditions:
      - match: "新規"
        next: 氏名聴取
      - match: "予約以外"
        next: 氏名聴取_予約以外
      - match: "other"
        next: 氏名聴取

  # --- 個人情報聴取サブフロー連鎖（新規ルート用）---
  # 新規 / 予約以外 で氏名→生年月日→電話番号 までは共通だが、
  # サブフロー後の遷移先（受診希望日 vs 用件詳細確認）が異なるため
  # 別系統で配置する
  - step: 氏名聴取
    type: subflow
    flowname: "愛仁会健診センター$氏名聴取"
    target: 氏名聴取
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "愛仁会健診センター$生年月日聴取"
    target: 生年月日聴取
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "愛仁会健診センター$電話番号聴取"
    target: 電話番号聴取
    next: 用件分岐_新規予約以外

  # --- 用件分岐（新規 / 予約以外 を classification context で再分岐）---
  - step: 用件分岐_新規予約以外
    type: context_match_router
    reference_module: "用件確認"
    conditions:
      - match: "新規"
        next: 受診希望日
      - match: "予約以外"
        next: 用件詳細確認
      - match: "other"
        next: 受診希望日

  # --- 個人情報聴取サブフロー連鎖（予約以外ルート用 — 同フロー内で別 step として配置）---
  # ↑ 予約以外ルートの氏名聴取_予約以外 は scaffold で生成される個別ジャンプ
  - step: 氏名聴取_予約以外
    type: subflow
    flowname: "愛仁会健診センター$氏名聴取"
    target: 氏名聴取
    next: 生年月日聴取_予約以外

  - step: 生年月日聴取_予約以外
    type: subflow
    flowname: "愛仁会健診センター$生年月日聴取"
    target: 生年月日聴取
    next: 電話番号聴取_予約以外

  - step: 電話番号聴取_予約以外
    type: subflow
    flowname: "愛仁会健診センター$電話番号聴取"
    target: 電話番号聴取
    next: 用件詳細確認

  # --- 新規ルート: 受診希望日 → 終話分岐 ---
  - step: 受診希望日
    type: hearing
    output_format: text
    save_to: desiredDate
    next: 新規_終話分岐
    retry_failure: skip

  - step: 新規_終話分岐
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: END_新規受付_携帯
      - match: "other"
        next: END_新規受付_その他

  # --- 予約以外ルート: 用件詳細確認（OpenAI 2-way）→ 分岐 ---
  - step: 用件詳細確認
    type: hearing
    output_format: enum
    save_to: classification
    conditions:
      - match: "予約以外"
        next: 予約以外_phonetype分岐
      - match: "other"
        next: 現在の予約日

  # --- 予約以外（アクセス/書類等）→ phonetype分岐 ---
  - step: 予約以外_phonetype分岐
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: WEB予約フォーム案内
      - match: "other"
        next: END_予約以外_代表案内

  - step: WEB予約フォーム案内
    type: announcement
    next: END_WEB案内

  # --- 変更/キャンセル/予約確認 → 現在の予約日 → 終話分岐 ---
  - step: 現在の予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 変更_終話分岐
    retry_failure: skip

  - step: 変更_終話分岐
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: END_変更受付_携帯
      - match: "other"
        next: END_変更受付_その他

  # --- 終話ブロック ---
  - step: END_新規受付_携帯
    type: termination
    termination_ref: "END_新規受付_携帯"

  - step: END_新規受付_その他
    type: termination
    termination_ref: "END_新規受付_その他"

  - step: END_変更受付_携帯
    type: termination
    termination_ref: "END_変更受付_携帯"

  - step: END_変更受付_その他
    type: termination
    termination_ref: "END_変更受付_その他"

  - step: END_WEB案内
    type: termination
    termination_ref: "END_WEB案内"

  - step: END_予約以外_代表案内
    type: termination
    termination_ref: "END_予約以外_代表案内"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "新規"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "予約確認"
      - id: "5"
        order: "5"
        value: "予約以外"
    item_default: true
    editable: true
    deletable: false
    notes: "用件確認(DTMF) → 新規 or 予約以外。予約以外の場合は 用件詳細確認(voice OpenAI) で 予約以外/変更/キャンセル/予約確認 に再分類して classification を上書き"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名聴取サブフローで聴取。Gen1「受診者名（担当者名）」を PatientName 1 枠に充当（director.md §3.1.1）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "生年月日聴取サブフロー。和暦/西暦対応・大正〜令和の元号自動判定（DOB Re-confirmation）"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "電話番号聴取サブフロー。携帯着信は着信番号自動格納＋復唱、固定/その他は手動聴取＋正規化＋復唱"

  - context_name: "phonetype"
    context_name_jp: "電話種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "電話番号聴取サブフロー内で設定（携帯=ショートメール送信可 / その他=送信不可）。CMR で SMS 送信可否の判断に使用"

  - context_name: "desiredDate"
    context_name_jp: "受診希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "新規ルートのみ聴取。「10月10日」のような日程または「10月中旬」のような時期など曖昧表現を許容するためフリーワード保存（NON-BLOCKER N-5）"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約以外ルート（変更/キャンセル/予約確認）で聴取。YYYY-MM-DD HH:MM 形式。Gen1 仕様の DTMF 西暦8桁入力を Gen3 では音声 datetime hearing に置換"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "4"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理（受付完了）/ 2=代表案内（予約以外その他・非通知）/ 3=聴取失敗 / 6=時間外。Gen3 で 0/5 は使用禁止"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "予約以外"
      - "other"
    notes: |
      DTMF 1=新規（健診の予約） / 2=予約以外（変更・キャンセル・問い合わせ等）。
      音声入力は受け付けず DTMF のみで確定（Gen1 仕様、director 判断ログ #1）。
      OpenAI synonyms（Gen1 entity_openai_synonyms.md より、prompter が反映）:
        - 新規: 取りたい / 取得 / 紹介状 / 診察の予約 / 診療予約 / 健診の予約 / 健診予約 / 検査 / 検査の予約 / 雇い入れ / 事業主 / 就職 / 進学 / 生活習慣病 / 全身 / 特定健診 / 人間ドック / 健診 / 検診 / 検針
        - 予約以外: 取り消す / キャンセル / やめる / 取消 / 変更 / 延期 / 時間 / 日程 / 日付 / 別の / 変えたい / 変えて / 変える / 予約の変更 / 確認 / 教えて / 調べて / 分からない / 紛失 / 問い合わせ / 問合せ / 予約票 / アクセス / お見舞い / くすり / 会計 / 行き方 / 質問 / 処方箋 / 書類 / 症状 / 証明書 / 診断書 / 病棟 / 副作用 / 文書 / 聞きたい
      echo_back: true により Re-confirmation node が #data# 埋め込みで「ご用件は #data#、でよろしいですか?」を発話（NON-BLOCKER N-2）

  - order: 2
    name: "受診希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "新規ルートのみ聴取。「10月10日のように日程や、10月中旬のように時期など、自由におっしゃってください」 フリーワード保存。失敗時は skip（NON-BLOCKER N-5）"

  - order: 3
    name: "用件詳細確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約以外"
      - "other"
    notes: |
      予約以外ルート（DTMF=2）でのみ聴取。Gen3 新設の OpenAI 分類点（Gen1 では「用件の分岐」が dead code として残っており、director 判断 #2 で active 化）。
      OpenAI 2-way 判定:
        - 予約以外（アクセス/書類/症状/会計等）: アクセス / お見舞い / くすり / 会計 / 行き方 / 伺い / 質問 / 処方箋 / 書類 / 症状 / 証明書 / 診断書 / 病棟 / 副作用 / 文書 / 聞きたい / その他 / なくした / 確認 / 教えて / 調べて / 分からない / 分からん / 紛失 / 忘れた / 問い合わせ / 問合せ / 予約票
        - other（=変更/キャンセル/予約確認）: 変更 / 取り消し / 取り消す / 取消 / 延期 / 時間 / 日程 / 日付 / 別の / 変えたい / 変えて / 変える / 予約の変更 / キャンセル / やめる / 予約のキャンセル / 確認 / 予約確認
      予約以外 → 予約以外_phonetype分岐（携帯=WEB案内 / その他=代表電話案内）。
      other → 現在の予約日 → 変更_終話分岐。
      classification context は用件確認の DTMF 入力で「予約以外」が一旦保存されるが、ここで詳細値（変更/キャンセル/予約確認/予約以外）に上書きされる

  - order: 4
    name: "現在の予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "予約以外ルート（other=変更/キャンセル/予約確認）で聴取。Gen1 仕様の DTMF 西暦8桁入力を Gen3 では音声 datetime hearing に置換（director 判断 #4）。YYYY-MM-DD HH:MM 形式に変換、未来日チェック・10月以降に1-9月指定は翌年扱い"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: |
      ご用件を、次の2つのうちの、いずれかでダイヤルプッシュしてください。
      「予約を取る」は1を、
      「予約の変更・キャンセル」は2を、
      それでは、押してください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規"
        - "予約以外"
        - "other"
      mapping:
        - input: "DTMF 1 / 1番 / 一 / 一番 / 健診 / 検診 / 検針 / 健康診断 / 健診の予約 / 健診予約 / 人間ドック / 特定健診 / 取りたい / 取得 / 紹介状 / 診察の予約 / 診療予約 / 検査 / 検査の予約 / 雇い入れ / 事業主 / 就職 / 進学 / 生活習慣病 / 全身 / 予約 / 予約したい / 予約を取る"
          output: "新規"
        - input: "DTMF 2 / 2番 / 二 / 二番 / 変更 / 予約変更 / 予約の変更 / 取り直したい / 取り直す / 別の / 変えたい / 変えて / 変える / 延期 / 日程 / 日付 / 平行 / 並行 / キャンセル / やめる / 取り消し / 取消 / 取り消す / 予約のキャンセル / 確認 / 予約確認 / 問い合わせ / 問合せ / その他 / アクセス / お見舞い / くすり / 会計 / 行き方 / 質問 / 処方箋 / 書類 / 症状 / 証明書 / 診断書 / 病棟 / 副作用 / 文書 / 聞きたい / 教えて / 調べて / 分からない / なくした / 忘れた / 紛失 / 予約票"
          output: "予約以外"
      no_result_condition: "上記いずれにも該当しない場合は other（=新規ルートにフォールバック、安全側）"
    save_to: "classification"
    next_step: "新規→氏名聴取／ 予約以外→氏名聴取_予約以外／ other→氏名聴取"
