  - step_name: "受診希望日"
    tts_announcement: "受診を希望される日を、「10月10日」のように日程や、「10月中旬」のように時期など、自由におっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日付表現（10月10日 / 来週の月曜日 等）または曖昧表現（10月中旬 / 来月上旬 / なるべく早く 等）"
          output: "そのままテキスト格納（曖昧表現も許容）"
      no_result_condition: "聴取不可時は skip（次の終話分岐へ）"
    save_to: "desiredDate"
    next_step: "新規_終話分岐"
    retry_failure: "skip"

  - step_name: "用件詳細確認"
    tts_announcement: |
      ご用件を、もう少し詳しくお聞かせください。
      ご予約の変更、キャンセル、予約内容のご確認、または、アクセス・書類・お会計・症状などその他のお問い合わせ、いずれでしょうか？
      ご用件をお話しください。
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約以外"
        - "other"
      mapping:
        - input: "アクセス / お見舞い / くすり / 会計 / 行き方 / 伺い / 質問 / 処方箋 / 書類 / 症状 / 証明書 / 診断書 / 病棟 / 副作用 / 文書 / 聞きたい / その他のお問い合わせ / 予約以外 / なくした / 紛失 / 教えて / 調べて / 分からない"
          output: "予約以外"
        - input: "変更 / 予約変更 / 予約の変更 / 取り直し / 別の / 変えたい / 日程 / 日付 / キャンセル / 取り消し / 予約のキャンセル / 予約確認 / 確認 / 予約内容を教えて"
          output: "other"
      no_result_condition: "判別不可時は other（=変更/キャンセル/予約確認 扱いで現在の予約日聴取へ進む）"
    save_to: "classification"
    next_step: "予約以外→予約以外_phonetype分岐／ other→現在の予約日"
    retry_failure: "end_failure"
    retry_failure_announcement: "お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、祝日を除く、月曜日から金曜日の8時45分から17時、土曜日の8時45分から12時に、健康管理センター直通番号、072-692-9291へおかけ直しください。電話番号が分かる場合は、そのままお電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。代表電話番号は、072-692-9291です。繰り返します。代表電話番号は、072-692-9291です。繰り返します。代表電話番号は、072-692-9291です。お電話ありがとうございました。"

  - step_name: "現在の予約日"
    tts_announcement: "現在の健診ご予約日を、「10月10日」のように日付でお話しください。わからない場合は、分からない、とおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日付表現（10月10日 / 来週の月曜日 等）"
          output: "YYYY-MM-DD HH:MM 形式に変換（10月以降に1-9月指定は翌年扱い、未来日チェック）"
      no_result_condition: "日付として解釈できない場合または「わからない」発話は skip"
    save_to: "reservationDate"
    next_step: "変更_終話分岐"
    retry_failure: "skip"

