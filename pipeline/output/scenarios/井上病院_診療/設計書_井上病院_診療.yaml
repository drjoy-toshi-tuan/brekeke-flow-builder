# --- セクション11: 特記事項・制約 ---
special_notes:
  - "STT テンプレート再利用（commubo抽出/entity_stt_patch.json）: hearing_yesno_common / hearing_phone_number / hearing_unknown / hearing_yoken_common / echo_back_yesno の 5 テンプレートを各 hearing / subflow に継承（30 surfaces を OpenAI 正規化、19 surfaces を STT 辞書で吸収）"
  - "OpenAI 正規化辞書（commubo抽出/entity_openai_synonyms.md）: 分からない（解らない/動かない 等）/ 別の（違う/携帯/他の 等）/ 否定（いーえ/ちがうねん 等）/ 持ってない（盛ってない/以てない 等）/ 肯定（はい大丈夫です/配送です 等）/ 否定単語（駄目/違って 等）/ 肯定単語（大丈夫/問題ない 等）を prompter が OpenAI prompt の類義語例セクションに反映"
  - "Gen1 構造を Gen3 6 ブロック型に集約: opening / announcement（接続フレーズ 4 種）/ hearing（経路判断 + 問い合わせ内容聴取 2 種）/ subflow（個人情報 4 種）/ context_match_router（用件分岐 + 終話分岐 2 種）/ termination（5 種）"
  - "経路判断は Pattern B（hearing で値確定 → CMR で 2 箇所参照）。CMR の other は明示的に「電話相当」として設計"
  - "テスト用箱（main.yaml: 渡部 / 千葉発話で 経路判断 へ早期分岐）は本番投入版で除外（移管ノート明記）"
  - "END_受付時間説明（main.yaml 終了:箱、代表電話 9:00-17:00 / 整形外科・眼科 9:30-12:30 案内）は孤児箱のためフローから除外（NON-BLOCKER N-6）"
  - "サブフロー（診察券番号 / 氏名 / 電話番号）内のリトライ失敗 → 代表案内 TTS → 切断 は Custom Jump to Flow の制約で親フローに接続不可。Brekeke UI で手動接続必要（confirmation_items 参照）"

