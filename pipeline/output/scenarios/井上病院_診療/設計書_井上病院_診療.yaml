    announcement: "お問い合わせ内容をお伺いします。『8月1日の内科予約を8月8日以降に変更してほしい』、など、具体的にお話ください。"

  - module_name: "最後に_アナウンス"
    purpose: "連絡先聴取への接続フレーズ（WEB / 電話 両ルート共通）"
    announcement: "最後に、"

  - module_name: "非通知_アナウンス"
    purpose: "非通知着信時アナウンス"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  - module_name: "時間外_アナウンス"
    purpose: "受付時間外（祝日 / 月〜金 8:30 前 / 16:00 以降）アナウンス"
    announcement: "申し訳ございません。ただいまの時間は受付時間外となっております。受付時間は、祝日を除く、月曜日から金曜日、朝8時30分から16時までです。恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"

  - module_name: "聴取失敗_アナウンス"
    purpose: "リトライ上限到達時の代表案内アナウンス"
    announcement: "予約制ではないので、基本的に当日受診が可能です。診療時間や休診情報等に関しては代表番号にてご確認ください。お電話ありがとうございました。"

  - module_name: "END_受付完了_WEB"
    purpose: "WEB ルート完了時アナウンス（URL の SMS 送信案内）"
    announcement: "受付はまだ完了しておりませんので、お電話終了後にショートメールで入力用URLをお送りいたしますので依頼内容を入力していただき、申し込みを完了させてください。お電話ありがとうございました。"

  - module_name: "END_受付完了_電話"
    purpose: "電話ルート完了時アナウンス（折り返し電話 / SMS 案内）"
    announcement: "お問い合わせを受け付けました。後ほど担当者からショートメール、もしくは折り返し電話にてご連絡いたします。お電話ありがとうございました。"

