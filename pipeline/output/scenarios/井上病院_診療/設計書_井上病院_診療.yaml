  - item: "END_受付完了_WEB の smsFlag。仮設定 1（URL を SMS で送信案内のため）。要件レビューで確認"
    resolved: false
  - item: "END_受付完了_電話 の smsFlag。仮設定 -1（担当者対応依存）。SMS 自動送信が必要なら 1 に変更"
    resolved: false
  - item: "RAG / FAQ サブフロー導入判断（Gen1 元資料に未実装）。CLAUDE.md Rule 16 のデフォルト（Gen1→Gen3=パターン 2）に従って終話前 RAG を追加するか確認"
    resolved: false
  - item: "経路判断 hearing の echo_back。仮設定 false。Gen1 では復唱処理あり、Gen3 で再確認したい場合は echo_back=true に変更"
    resolved: false
  - item: "連絡先聴取サブフロー内の非通知時携帯推し TTS（Gen1 連絡先聴取.yaml の『非通知：携帯推し』箱）。Gen3 標準サブフローが同等処理を持つか要確認"
    resolved: false
  - item: "END_受付時間説明（孤児箱）の取扱。Gen3 では除外しているが、運用上必要なら復活方針を決定"
    resolved: false
  - item: "[診察券番号聴取] サブフロー内 retry 上限到達時に 代表案内 TTS→切断 を手動追加（Brekeke UI）"
    resolved: false
  - item: "[氏名聴取] サブフロー内 retry 上限到達時に 代表案内 TTS→切断 を手動追加（Brekeke UI）"
    resolved: false
  - item: "[電話番号聴取] サブフロー内 retry 上限到達時に 代表案内 TTS→切断 を手動追加（Brekeke UI）"
    resolved: false
