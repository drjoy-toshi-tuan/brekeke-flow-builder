    announcement: "次に、"

  - module_name: "続いて_アナウンス"
    purpose: "生年月日聴取 → 問い合わせ内容聴取 への接続フレーズ（電話ルートのみ）"
    announcement: "続いて、"

  - module_name: "問い合わせ内容聴取"
