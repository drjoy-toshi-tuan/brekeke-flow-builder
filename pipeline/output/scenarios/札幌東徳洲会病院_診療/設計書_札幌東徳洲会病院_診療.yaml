    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "当日/翌日の予約かどうかのフィルター。はい→代表案内、いいえ/NO_RESULT→次へ。DTMF 1=はい, 2=いいえ"

  - order: 2
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "確認"
