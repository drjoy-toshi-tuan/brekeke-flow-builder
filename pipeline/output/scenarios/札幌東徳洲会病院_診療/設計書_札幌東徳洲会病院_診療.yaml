# --- セクション3: フローの目的 ---
purpose: "患者からの予約関連電話を受け、当日/翌日の予約は代表案内に誘導し、それ以外は連絡先電話番号・診察券番号・氏名・生年月日・用件（新規/再診/変更/キャンセル/確認）・診療科等を聴取して折り返し受付を自動化する。新規は許可4科（消化器センター/耳鼻咽喉科・頭頸部外科/形成外科/循環器内科）のみ受付し、皮膚科は来院案内、その他は代表案内に誘導する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "さ_札幌東徳洲会病院_診療$診療_20260413"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(saveCompletionFlag2db, status=2, smsFlag=-1)
            │            → 非通知_アナウンス(TTS) → 切断
            └─ 通常/携帯/固定/海外/その他 → acceptance_times
                          ├─ 時間外/TIMEOUT/ERROR → 完了フラグ_時間外(saveCompletionFlag2db, status=6, smsFlag=-1)
                          │                         → 時間外_アナウンス(TTS) → 切断
                          └─ 受付可(true) → 冒頭_アナウンス(TTS)

      ─── 当日確認 ───
      冒頭_アナウンス → 当日確認(TTS) → 入力_当日確認(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_当日確認
            ├─ はい → 完了フラグ_代表案内_当日(saveCompletionFlag2db, status=2, smsFlag=-1)
            │          → END_代表案内_当日(TTS) → 切断
            ├─ いいえ → サブフロー遷移_電話番号聴取(Custom Jump to Flow)
            └─ NO_RESULT → リトライ_当日確認
                              ├─ Retry → 当日確認(TTS)
                              └─ No more → サブフロー遷移_電話番号聴取

      ─── 個人情報サブフロー連鎖 ───
      サブフロー遷移_電話番号聴取(Custom Jump to Flow)
        → サブフロー遷移_診察券番号聴取(Custom Jump to Flow)
          → サブフロー遷移_氏名聴取(Custom Jump to Flow)
            → サブフロー遷移_生年月日聴取(Custom Jump to Flow)
              → 用件確認(TTS)

      ─── 用件確認 ───
      用件確認(TTS) → 入力_用件確認(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_用件確認
            ├─ 予約 → 予約_受診歴(TTS)
            ├─ 変更 → 変更キャンセル_診療科(TTS)
            ├─ キャンセル → 変更キャンセル_診療科(TTS)
            ├─ 確認 → 確認_内容(TTS)
            └─ NO_RESULT → リトライ_用件確認
                              ├─ Retry → 用件確認(TTS)
                              └─ No more → 完了フラグ_聴取失敗(saveCompletionFlag2db, status=3, smsFlag=-1)
                                             → END_聴取失敗(TTS) → 切断

      ─── 予約ルート: 受診歴 ───
      予約_受診歴(TTS) → 入力_予約_受診歴(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_予約_受診歴
            ├─ はい（初診=新規） → saveContext_用件_新規(saveContext2DB, classification=新規)
            │                       → 新規_診療科(TTS)
            ├─ いいえ（再診） → saveContext_用件_再診(saveContext2DB, classification=再診)
            │                    → 再診_症状(TTS)
            └─ NO_RESULT → リトライ_予約_受診歴
                              ├─ Retry → 予約_受診歴(TTS)
                              └─ No more → 完了フラグ_聴取失敗 → END_聴取失敗(TTS) → 切断

      ─── 新規ルート: 診療科 ───
      新規_診療科(TTS) → 入力_新規_診療科(AmiVoice STT)
        → OpenAI_新規_診療科（正規化）
            ├─ 皮膚科 → 完了フラグ_来院案内(saveCompletionFlag2db, status=2, smsFlag=-1)
            │            → END_来院案内(TTS) → 切断
            ├─ 消化器センター → 新規_紹介状(TTS)
            ├─ 耳鼻咽喉科・頭頸部外科 → 新規_紹介状(TTS)
            ├─ 形成外科 → 新規_紹介状(TTS)
            ├─ 循環器内科 → 新規_紹介状(TTS)
            ├─ NO_RESULT → リトライ_新規_診療科
            │                 ├─ Retry → 新規_診療科(TTS)
            │                 └─ No more → 完了フラグ_聴取失敗 → END_聴取失敗(TTS) → 切断
            └─ その他（許可4科以外） → 完了フラグ_代表案内_新規(saveCompletionFlag2db, status=2, smsFlag=-1)
                                         → END_代表案内_新規(TTS) → 切断

      ─── 新規ルート: 紹介状 ───
      新規_紹介状(TTS) → 入力_新規_紹介状(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_新規_紹介状
            ├─ あり → 共通_予約希望日(TTS)
            ├─ なし → 新規_選定療養費(TTS) → 共通_予約希望日(TTS)
            └─ NO_RESULT → リトライ_新規_紹介状
                              ├─ Retry → 新規_紹介状(TTS)
                              └─ No more → 共通_予約希望日(TTS)

      ─── 再診ルート: 症状 ───
      再診_症状(TTS) → 入力_再診_症状(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_再診_症状
            ├─ はい（同じ症状） → 再診_診療科(TTS)
            ├─ いいえ（別症状=新規へ） → saveContext_用件_新規(saveContext2DB, classification=新規)
            │                             → 新規_診療科(TTS) ★新規ルートに合流
            └─ NO_RESULT → リトライ_再診_症状
                              ├─ Retry → 再診_症状(TTS)
                              └─ No more → 再診_診療科(TTS)

      ─── 再診ルート: 診療科 ───
      再診_診療科(TTS) → 入力_再診_診療科(AmiVoice STT)
        → OpenAI_再診_診療科（正規化）
            ├─ 放射線治療科 → 完了フラグ_代表案内_診療科(saveCompletionFlag2db, status=2, smsFlag=-1)
            │                  → END_代表案内_診療科(TTS) → 切断
            ├─ リハビリテーション科 → 完了フラグ_代表案内_診療科 → END_代表案内_診療科(TTS) → 切断
            ├─ 救急集中治療センター → 完了フラグ_代表案内_診療科 → END_代表案内_診療科(TTS) → 切断
            ├─ 化学療法センター → 完了フラグ_代表案内_診療科 → END_代表案内_診療科(TTS) → 切断
            ├─ 皮膚科 → 完了フラグ_来院案内 → END_来院案内(TTS) → 切断
            ├─ NO_RESULT → リトライ_再診_診療科
            │                 ├─ Retry → 再診_診療科(TTS)
            │                 └─ No more → 共通_予約希望日(TTS)
            └─ その他（通常診療科） → 共通_予約希望日(TTS)

      ─── 変更/キャンセルルート: 診療科 → 予約日 ───
      変更キャンセル_診療科(TTS) → 入力_変更キャンセル_診療科(AmiVoice STT)
        → OpenAI_変更キャンセル_診療科（正規化）
            ├─ 成功 → 共通_予約日(TTS)
            └─ NO_RESULT → リトライ_変更キャンセル_診療科
                              ├─ Retry → 変更キャンセル_診療科(TTS)
                              └─ No more → 共通_予約日(TTS)

      共通_予約日(TTS) → 入力_共通_予約日(AmiVoice STT)
        → OpenAI_共通_予約日（日付変換）
            ├─ valid → 予約日後分岐(ContextMatchRouter on classification)
            │             ├─ 変更 → 共通_予約希望日(TTS)
            │             └─ キャンセル → キャンセル_理由(TTS)
            └─ NO_RESULT → リトライ_共通_予約日
                              ├─ Retry → 共通_予約日(TTS)
                              └─ No more → 予約日後分岐

      ─── キャンセルルート固有 ───
      キャンセル_理由(TTS) → 入力_キャンセル_理由(AmiVoice STT)
        → OpenAI_キャンセル_理由（要約）
            └─ 成功/NO_RESULT → サブフロー遷移_RAG検索

      ─── 共通: 予約希望日 ───
      共通_予約希望日(TTS) → 入力_共通_予約希望日(AmiVoice STT)
        → OpenAI_共通_予約希望日（フリーテキスト保存）
            └─ 成功/NO_RESULT → サブフロー遷移_RAG検索

      ─── 確認ルート ───
      確認_内容(TTS) → 入力_確認_内容(AmiVoice STT)
        → OpenAI_確認_内容（フリーテキスト保存）
            └─ 成功/NO_RESULT → サブフロー遷移_RAG検索

      ─── RAG → 終話チェーン（共通合流） ───
      サブフロー遷移_RAG検索(Custom Jump to Flow)
        → 完了フラグ_受付完了(saveCompletionFlag2db, status=1, smsFlag=1)
          → 終話分岐_電話番号(ContextMatchRouter on phonetype from 電話番号サブフロー)
              ├─ 携帯(1) → END_受付完了_携帯(TTS) → 切断
              └─ 固定/その他(2) → END_受付完了_固定(TTS) → 切断
    notes: |
      Gen2固有の聴取順序（個人情報→用件確認）を維持。
      当日確認で早期に代表案内へ誘導。
      新規/再診で診療科のpost-routing が異なるため別ステップで管理。
      変更/キャンセルは診療科・予約日を共有。
      予約日後にContextMatchRouterでclassification分岐（変更→予約希望日、キャンセル→理由）。
      終話はsaveCompletionFlag2db→ContextMatchRouter(phonetype)→携帯/固定TTS。

