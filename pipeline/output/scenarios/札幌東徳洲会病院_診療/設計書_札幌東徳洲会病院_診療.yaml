  - "再診→症状確認→「いいえ」の場合: classification を新規に変更し、新規_診療科聴取ステップに合流"
  - "予約希望日はフリーテキスト保存（日付形式に強制変換しない）"
  - "予約日と予約希望日は別フィールド。相互の値の転記禁止"
  - "氏名は復唱禁止（Gen2仕様を踏襲）"
  - "代表電話番号 011-722-1110 は3回繰り返してアナウンスする"
  - "選定療養費は7,700円"
  - "Gen2 checkpoint/checkout/endpoint はGen3に含めない（saveContextModel2DBに不要）"
