  - "新規許可4科: 消化器センター, 耳鼻咽喉科・頭頸部外科, 形成外科, 循環器内科。これ以外の新規予約は代表案内（011-722-1110）に誘導"
  - "再診不可4科: 放射線治療科, リハビリテーション科, 救急集中治療センター, 化学療法センター。代表案内に誘導"
