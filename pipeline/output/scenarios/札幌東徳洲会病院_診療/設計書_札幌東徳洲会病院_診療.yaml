# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "当日確認"
    tts_announcement: "当日または翌日の予約に関するお電話でしょうか。はい、そうです。または、いいえ、違います。のようにお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」を含む"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「違います」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "はい→END_代表案内_当日 / いいえ→サブフロー遷移_電話番号聴取"
    retry_failure: "skip"

  - step_name: "用件確認"
    tts_announcement: "次の4つのうちのいずれかでご用件をお話しください。1、予約を取る。2、予約を変更する。3、予約をキャンセルする。4、予約の確認。それではお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「取る」「取りたい」「薬」「お薬」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「変えたい」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「取り消し」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」「教えて」を含む"
          output: "確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→予約_受診歴 / 変更→変更キャンセル_診療科 / キャンセル→変更キャンセル_診療科 / 確認→確認_内容"
    retry_failure: "end_failure"

  - step_name: "予約_受診歴"
    tts_announcement: "当院でのご受診は初めてですか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「初めて」を含む"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「通っている」「かかっている」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "history"
    next_step: "はい→saveContext(classification=新規)→新規_診療科 / いいえ→saveContext(classification=再診)→再診_症状"
    retry_failure: "end_failure"

  - step_name: "新規_診療科"
    tts_announcement: "受診を希望される診療科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "皮膚科"
        - "消化器センター"
        - "耳鼻咽喉科・頭頸部外科"
        - "形成外科"
        - "循環器内科"
        - "その他"
        - "NO_RESULT"
      mapping:
        - input: "「皮膚」「ひふ」を含む"
          output: "皮膚科"
        - input: "許可4科（消化器センター/耳鼻咽喉科・頭頸部外科/形成外科/循環器内科）に一致"
          output: "該当科名"
        - input: "上記以外の診療科リストに一致"
          output: "その他"
        - input: "診療科名を抽出できない"
          output: "NO_RESULT"
      no_result_condition: "診療科名を抽出できない"
    save_to: "clinicalDepartment"
    next_step: "皮膚科→END_来院案内 / 許可4科→新規_紹介状 / その他→END_代表案内_新規"
    retry_failure: "end_failure"

  - step_name: "新規_紹介状"
    tts_announcement: "紹介状はお持ちでしょうか。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「あります」「持っている」を含む"
          output: "あり"
        - input: "DTMF 2 または「いいえ」「ない」「持っていない」を含む"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "introduction"
    next_step: "あり→共通_予約希望日 / なし→新規_選定療養費（TTS案内のみ）→共通_予約希望日"
    retry_failure: "skip"

  - step_name: "再診_症状"
    tts_announcement: "前回と同じ症状でのご来院でしょうか。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「同じ」を含む"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「違う」「別の」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "disease"
    next_step: "はい→再診_診療科 / いいえ→saveContext(classification=新規)→新規_診療科に合流"
    retry_failure: "skip"

  - step_name: "再診_診療科"
    tts_announcement: "受診を希望される診療科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "放射線治療科"
        - "リハビリテーション科"
        - "救急集中治療センター"
        - "化学療法センター"
        - "皮膚科"
        - "その他"
        - "NO_RESULT"
      mapping:
        - input: "不可4科に一致（放射線治療科/リハビリテーション科/救急集中治療センター/化学療法センター）"
          output: "該当科名"
        - input: "「皮膚」「ひふ」を含む"
          output: "皮膚科"
        - input: "上記以外の診療科リストに一致"
          output: "その他"
        - input: "診療科名を抽出できない"
          output: "NO_RESULT"
      no_result_condition: "診療科名を抽出できない"
    save_to: "clinicalDepartment"
    next_step: "不可4科→END_代表案内_診療科 / 皮膚科→END_来院案内 / その他→共通_予約希望日"
    retry_failure: "skip"

  - step_name: "変更キャンセル_診療科"
    tts_announcement: "受診を希望される診療科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "診療科名"
        - "NO_RESULT"
      mapping:
        - input: "診療科リストに一致する発話"
          output: "正規化された診療科名"
        - input: "診療科名を抽出できない"
          output: "NO_RESULT"
      no_result_condition: "診療科名を抽出できない"
    save_to: "clinicalDepartment"
    next_step: "共通_予約日"
    retry_failure: "skip"

  - step_name: "共通_予約日"
    tts_announcement: "予約票に記載されている予約日を、4月1日のように日付でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "valid"
        - "NO_RESULT"
      mapping:
        - input: "本日以降の有効な日付"
          output: "valid（YYYY-MM-DD形式）"
        - input: "過去の日付"
          output: "NO_RESULT（再聴取）"
        - input: "日付として解釈できない"
          output: "NO_RESULT"
      no_result_condition: "日付として解釈できない、または過去日"
    save_to: "reservationDate"
    next_step: "ContextMatchRouter(classification) → 変更:共通_予約希望日 / キャンセル:キャンセル_理由"
    retry_failure: "skip"

  - step_name: "共通_予約希望日"
    tts_announcement: "受診を希望されている時期をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果から希望時期を抽出"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "desiredReservationDate"
    next_step: "サブフロー遷移_RAG検索"
    retry_failure: "skip"

  - step_name: "キャンセル_理由"
    tts_announcement: "キャンセル理由をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "サブフロー遷移_RAG検索"
    retry_failure: "skip"

  - step_name: "確認_内容"
    tts_announcement: "ご確認内容についてお伺いします。次回の予約日時を教えて欲しい、または、その他ご不明な点等ございましたら、こちらでお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "details"
    next_step: "サブフロー遷移_RAG検索"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "お電話ありがとうございます。札幌東徳洲会病院の予約専用AI電話です。お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に186を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "用件確認/受診歴のリトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 代表案内系 ---
  - name: "END_代表案内_当日"
    condition: "当日/翌日の予約と判定"
    tts_announcement: "申し訳ございません。本日または翌日の予約に関しては、こちらのAI電話ではお受けできません。代表電話へおかけ直しください。電話番号を申し上げます。メモをご準備ください。番号は011-722-1110です。くりかえします。番号は011-722-1110です。番号は011-722-1110です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内_当日"

  - name: "END_代表案内_診療科"
    condition: "再診_対象外診療科（放射線治療科/リハビリテーション科/救急集中治療センター/化学療法センター）"
    tts_announcement: "申し訳ございません。ご指定の診療科の予約に関しては、こちらのAI電話ではお受けできません。代表電話へおかけ直しください。電話番号を申し上げます。メモをご準備ください。番号は011-722-1110です。くりかえします。番号は011-722-1110です。番号は011-722-1110です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内_診療科"

  - name: "END_代表案内_新規"
    condition: "新規_許可4科以外の診療科"
