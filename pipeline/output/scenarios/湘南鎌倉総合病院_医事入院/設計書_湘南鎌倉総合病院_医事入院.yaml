# 設計書 — 湘南鎌倉総合病院 医事入院
# 生成元: @director エージェント
# 生成日: 2026-05-01
# 作業種別: Gen1→Gen3 移管
# 元資料: commubo抽出/【001】湘南鎌倉総合病院/【0001湘南鎌倉総合病院】医事入院1_M_本番/
# 移管ノート: docs/migration/gen1_湘南鎌倉総合病院_医事入院.md
# 確認レポート: output/scenarios/湘南鎌倉総合病院_医事入院/確認レポート_湘南鎌倉総合病院_医事入院_20260501.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "湘南鎌倉総合病院"
  scenario_name: "医事入院"
  group_name: "湘南鎌倉総合病院"
  flow_name: "湘南鎌倉総合病院$医事入院"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "なし（callback ボットのため acceptance_times 不要）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "湘南鎌倉総合病院$医事入院"
      role: "main"
      description: |
        医事課入院係への callback ボット。代表電話混雑時に AI が一次受けし、
        診察券番号（初診の場合スキップ）/ 氏名 / 生年月日 / 連絡先電話番号 / 携帯番号 / 用件 を聴取し、
        3 診療日以内に担当者から折り返し電話連絡を行う旨を案内して終話。
  subflows:
    - name: "湘南鎌倉総合病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "初診確認 hearing で『再診/その他』ルートに来た場合のみ呼び出し。subflow 内 retry 失敗時は『大変申し訳ございません、診察券番号を聞き取ることができませんでした。後ほど、担当者にて確認させていただきます。』を発話して氏名聴取へ進める手動タスクが必要（confirmation_items 参照）"
    - name: "湘南鎌倉総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー 1 枠（モジュール選定ガイド §3.1.1）"
    - name: "湘南鎌倉総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "和暦/西暦判定 + DOB Re-confirmation 復唱はサブフロー内蔵"
    - name: "湘南鎌倉総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        連絡先電話番号（固定/携帯）の聴取。subflow 内 incoming-classifier + Phone Normalization + 復唱を内蔵。
        Gen1 の「入電番号でよろしいですか？」分岐もサブフロー標準で吸収。
        subflow 内 retry 失敗時は『大変申し訳ございません、お電話番号を聞き取ることができませんでした。後ほど担当者にて確認させていただきます。』を発話して用件聴取へ進める手動タスクが必要（confirmation_items 参照）

# --- セクション3: フローの目的 ---
purpose: |
  代表電話（医事課入院係）への着信が回線混雑で繋がらなかった場合の callback ボット。
  患者から自動的に折り返し連絡される際に AI が一次受けし、
  患者本人確認情報（氏名・生年月日・診察券番号・連絡先・携帯番号）と用件（最大 2 件）を聴取して
  3 診療日以内に担当者から折り返す旨を案内する。
  通常 inbound と異なり、acceptance_times / call_transfer / date_of_call_classifier は使用しない。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "湘南鎌倉総合病院$医事入院"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 (TTS) → 完了フラグ_非通知 → 切断
            └─ 通常   → 冒頭_アナウンス(TTS)
                          → 初診確認(hearing/enum)
                              ├─ 初診     → 連絡先電話番号聴取(subflow) ── (診察券スキップ)
                              └─ other(=再診) → 診察券番号聴取(subflow)
                                                 → 氏名聴取(subflow)
                                                 → 生年月日聴取(subflow)
                                                 → 連絡先電話番号聴取(subflow)
                          ↓
                          (合流) → 携帯番号聴取(hearing/text)
                                 → 用件聴取_1(hearing/text)
                                 → 追加用件確認(hearing/enum)
                                     ├─ あり    → 用件聴取_2(hearing/text) ─┐
                                     └─ other(=なし)  ───────────────────┴→ 通話完了_アナウンス(TTS)
                                                                              → END_受付完了 → 完了フラグ → 切断
    notes: |
      - 初診確認で「初診」が選ばれた場合は 診察券番号 / 氏名 / 生年月日 をスキップして連絡先電話番号聴取へ直接ジャンプ
        （Gen1 診察券番号聞き取り.yaml の「初めて」エンティティ → END_診察券無し → main 側『次へ_3』スキップ動線を Gen3 では先頭分岐に集約）
      - acceptance_times は不要（callback ボットのため受付時間外でも常時稼働）
      - 用件カテゴリ分岐は無し（reason / additionalInquiry に自由テキストで保存）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  # --- 冒頭アナウンス ---
  - step: 冒頭_アナウンス
    type: announcement
    next: 初診確認

  # --- 初診確認（Yes/No 分岐）---
  - step: 初診確認
    type: hearing
    output_format: enum
    save_to: firstVisit
    conditions:
      - match: "初診"
        next: 連絡先電話番号聴取
      - match: "other"
        next: 診察券番号聴取

  # --- 診察券番号聴取（再診ルートのみ）---
  - step: 診察券番号聴取
    type: subflow
    flowname: "湘南鎌倉総合病院$診察券番号聴取"
    next: 氏名聴取

  # --- 氏名聴取 ---
  - step: 氏名聴取
    type: subflow
    flowname: "湘南鎌倉総合病院$氏名聴取"
    next: 生年月日聴取

  # --- 生年月日聴取 ---
  - step: 生年月日聴取
    type: subflow
    flowname: "湘南鎌倉総合病院$生年月日聴取"
    next: 連絡先電話番号聴取

  # --- 連絡先電話番号聴取 ---
  - step: 連絡先電話番号聴取
    type: subflow
    flowname: "湘南鎌倉総合病院$電話番号聴取"
    next: 携帯番号聴取

  # --- 携帯番号聴取（緊急連絡用、持ってない可）---
  - step: 携帯番号聴取
    type: hearing
    output_format: text
    save_to: mobilePhoneNumber
    next: 用件聴取_1

  # --- 用件聴取①（自由テキスト）---
  - step: 用件聴取_1
    type: hearing
    output_format: text
    save_to: reason
    next: 追加用件確認

  # --- 追加用件 Yes/No ---
  - step: 追加用件確認
    type: hearing
    output_format: enum
    save_to: additionalInquiryFlag
    conditions:
      - match: "あり"
        next: 用件聴取_2
      - match: "other"
        next: 通話完了_アナウンス

  # --- 用件聴取②（追加用件あり時のみ）---
  - step: 用件聴取_2
    type: hearing
    output_format: text
    save_to: additionalInquiry
    next: 通話完了_アナウンス

  # --- 通話完了アナウンス（折り返し案内）---
  - step: 通話完了_アナウンス
    type: announcement
    next: END_受付完了

  # --- 終話（受付完了）---
  - step: END_受付完了
    type: termination
    termination_ref: "END_受付完了"

