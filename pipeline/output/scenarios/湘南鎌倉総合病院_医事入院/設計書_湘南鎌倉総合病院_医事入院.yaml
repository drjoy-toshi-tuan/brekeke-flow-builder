# --- セクション11: 特記事項・制約 ---
special_notes:
  - "callback ボット（医事課入院係への着信が回線混雑で繋がらなかった患者を AI が一次受け）。同施設の病診連携と同方針で acceptance_times / call_transfer / date_of_call_classifier は使用しない。"
  - "用件カテゴリ分岐は無し（reason / additionalInquiry に自由テキストで保存）。Gen1 main.yaml に存在する「新規予約」「予約変更」「予約キャンセル」「予約確認」「予約以外」エンティティは実フロー（problem yaml）では分岐に使われていないため Gen3 では取り込まない。"
  - "Gen1 main.yaml にあるカスタムエンティティ「診療科」（48 件）は本フローでは use されていないため STT 辞書に積まない。"
  - "Gen1 診察券番号聞き取り.yaml の「初めて」エンティティ → END_診察券無し → main 側『次へ_3』への動線（生年月日へジャンプ、診察券スキップ）は、Gen3 では先頭の『初診確認』hearing で集約。初診=診察券聴取スキップ、再診=診察券聴取実行 とフロー先頭で分岐する。"
  - "Gen1 連絡先電話番号聞き取り.yaml l.397–468 の「緊急時の連絡方法として携帯電話の番号をお伺い」は、Gen3 では電話番号サブフロー後段の独立 hearing ブロック『携帯番号聴取』として配置。output_format=text で『持っていない』発話もそのまま保存し OpenAI 不要。"
  - "Gen1 問い合わせ内容①.yaml と問い合わせ内容②.yaml は完全同一の内容（diff ゼロ）→ Gen3 では同一の hearing 定義を context 名違い（reason / additionalInquiry）で 2 回配置。"
  - "Gen1『追加用件有無確認.yaml』はファイル内に『診察券有無確認』という箱名が残っているが、セリフは『その他、追加のご用件はございますか？』であり実体は追加用件 Yes/No。Gen3 では『追加用件確認』hearing として素直に作る。"
  - "Gen1『3 回聞き取りに失敗した場合』TTS は Gen3 の END_聴取失敗 にそのまま転記（代表電話の DTMF 操作案内付き）。"
  - "用件聴取（用件①・②）と携帯番号聴取・追加用件確認の retry_failure は『skip』としている。callback 性質上、聴取できなかった項目があっても通話を継続して可能な限り情報を取りに行く。"
  - "初診確認のみ retry_failure='end_failure'（何度聞いても認識できなければ代表電話案内 END_聴取失敗 に流す）。フロー分岐の起点なのでスキップしようがないため。"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（施設ID）— Dr.JOY 管理画面で確認"
    resolved: false
    blocker: false
    notes: "設計書には影響なし。IVR 設定時に別途確認"

  - item: "対応電話番号（IVR 着信 ARS 番号）— Brekeke 設定時に確認"
    resolved: false
    blocker: false
    notes: "設計書には記載しない。Brekeke 側で設定"

  - item: "[診察券番号聴取] サブフロー内の retry 上限到達時に『大変申し訳ございません、診察券番号を聞き取ることができませんでした。後ほど、担当者にて確認させていただきます。』TTS → 氏名聴取へ続行 を手動追加"
    resolved: false
    blocker: false
    assignee: "人間（Brekeke IVR UI）"
    notes: "Custom Jump to Flow からは親フローの END モジュールへ接続不可。サブフロー内で完結させる必要がある。callback 性質上、診察券が取れなくても氏名以降を取りに行く。"

  - item: "[電話番号聴取] サブフロー内の retry 上限到達時に『大変申し訳ございません、お電話番号を聞き取ることができませんでした。後ほど担当者にて確認させていただきます。』TTS → 用件聴取_1 へ続行 を手動追加"
    resolved: false
    blocker: false
    assignee: "人間（Brekeke IVR UI）"
    notes: "Custom Jump to Flow からは親フローの END モジュールへ接続不可。サブフロー内で完結させる必要がある。callback 性質上、電話番号が取れなくても用件は取りに行く（着信元番号は telephoneNumber に自動格納されているため担当者は架電可能）。"

  - item: "携帯電話番号の保存先 context 名（mobilePhoneNumber）の妥当性確認"
    resolved: false
    blocker: false
    notes: "案件固有フィールド（itemDefault: false）として追加。Dr.JOY 画面で表示確認・命名規則すり合わせ要"

  - item: "case 1: 初診ルート（診察券スキップ → 氏名聴取スキップ → 生年月日聴取スキップ）について、Gen1 では『初めて』検出時に氏名・生年月日もスキップしていた可能性。本設計書では『初診の場合、診察券のみスキップして氏名・生年月日・電話番号は聴取する』としたが、要件として『初診なら氏名・生年月日もスキップ』にしたい場合は再修正が必要"
    resolved: false
    blocker: false
    notes: "Gen1 main.yaml の `次へ_3` は『生年月日聞き取り』にジャンプしているため、診察券だけスキップして氏名はスキップしない（Gen1 動作と本設計書動作は一致）。ただし新規仕様として氏名スキップしたい場合は director 再起動要。"

  - item: "smsFlag = -1（SMS 送信なし）固定の妥当性"
    resolved: false
    blocker: false
    notes: "Gen1 では SMS 送信機能を持たない（main.yaml に smsFlag フィールドなし）。Gen3 でも callback 後に担当者が直接架電するため SMS 不要と判断。SMS で受付控えを送る運用なら sms_flag を 1 に変更"
