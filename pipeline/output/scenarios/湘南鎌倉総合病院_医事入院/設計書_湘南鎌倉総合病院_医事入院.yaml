# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "初診確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "firstVisit"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "初診"
      - "再診"
    notes: "Gen1『当院でのご受診は初めてですか？』の Yes/No。Yes=初診（診察券スキップ）/ No=再診（診察券聴取へ）"

  - order: 2
    name: "携帯番号聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "mobilePhoneNumber"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "緊急連絡用携帯番号。「持っていない」発話もそのままテキスト保存"

  - order: 3
    name: "用件聴取_1"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "用件①（自由テキスト）。Gen1 で問い合わせ内容①の保存先と同等"

  - order: 4
    name: "追加用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "additionalInquiryFlag"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "Gen1『その他、追加のご用件はございますか？』の Yes/No。Yes=用件②聴取へ進む / No=通話完了アナウンスへ"

  - order: 5
    name: "用件聴取_2"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "additionalInquiry"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "用件②（自由テキスト）。追加用件ありの場合のみ実行"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "初診確認"
    tts_announcement: "当院でのご受診は初めてですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "初診"
        - "再診"
      mapping:
        - input: "はい / 初めて / はじめて / 始めて / 初診"
          output: "初診"
        - input: "いいえ / いえ / じゃない / 違う / 受診したことがある / 既に受診"
          output: "再診"
      no_result_condition: "肯定/否定どちらにも該当しない発話、もしくは無音"
    save_to: "firstVisit"
    next_step: "(初診→連絡先電話番号聴取 / 再診→診察券番号聴取)"
    retry_failure: "end_failure"

  - step_name: "携帯番号聴取"
    tts_announcement: |
      緊急時の連絡方法として、携帯電話の番号をお伺いしています。携帯電話をお持ちの場合は、番号をおっしゃってください。お持ちでない場合は「持っていない」とおっしゃってください。
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "mobilePhoneNumber"
    next_step: "用件聴取_1"
    retry_failure: "skip"
    retry_failure_announcement: "携帯電話番号は後ほど担当者にて確認させていただきます。"

  - step_name: "用件聴取_1"
    tts_announcement: "ご用件を簡潔におっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "reason"
    next_step: "追加用件確認"
    retry_failure: "end_failure"

  - step_name: "追加用件確認"
    tts_announcement: "その他、追加のご用件はございますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "はい / あります / ある / 持っています"
          output: "あり"
        - input: "いいえ / ありません / ない / 持っていない / 大丈夫です"
          output: "なし"
      no_result_condition: "肯定/否定どちらにも該当しない発話、もしくは無音"
    save_to: "additionalInquiryFlag"
    next_step: "(あり→用件聴取_2 / なし→通話完了_アナウンス)"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "用件聴取_2"
    tts_announcement: "ご用件を簡潔におっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "additionalInquiry"
    next_step: "通話完了_アナウンス"
    retry_failure: "skip"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（本フロー未使用 — callback ボットのため acceptance_times なし）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: |
      お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、再度代表電話へおかけなおしください。代表電話では音声ガイダンスが流れますので、「患者さん、また、ご家族の方は」の1番を押した後に、「その他については」の4番を押してください。お電話ありがとうございました。
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_受付完了"
    condition: "全聴取完了"
    tts_announcement: |
      ご用件を承りました。3診療日以内に担当者から折り返し電話連絡いたします。なお、代表電話は大変こみあっております。当院からの折り返し電話に出られなかった場合でも、必ずこちらから再度ご連絡をしますのでお待ちくださいますようお願い申し上げます。お電話ありがとうございました。
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了"

# smsFlag 分岐（本フローは SMS 不使用のため無効）
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

# --- セクション8b: RAG/FAQ 検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTS モジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内（callback 用 + 折り返し説明）"
    announcement: "医事課入院係をお呼び出ししましたが、回線が混みあっておりお繋ぎできませんでした。AI電話がご用件をお伺いし、3診療日以内に担当者から折り返し電話連絡いたします。"

  - module_name: "初診確認"
    purpose: "初診/再診を聞き分けて診察券聴取の要否を分岐"
    announcement: "当院でのご受診は初めてですか？"

  - module_name: "携帯番号聴取"
    purpose: "緊急連絡用の携帯番号を聴取（持っていない可）"
    announcement: "緊急時の連絡方法として、携帯電話の番号をお伺いしています。携帯電話をお持ちの場合は、番号をおっしゃってください。お持ちでない場合は「持っていない」とおっしゃってください。"

  - module_name: "用件聴取_1"
    purpose: "用件①（自由テキスト）"
    announcement: "ご用件を簡潔におっしゃってください。"

  - module_name: "追加用件確認"
    purpose: "追加用件 Yes/No"
    announcement: "その他、追加のご用件はございますか？"

  - module_name: "用件聴取_2"
    purpose: "用件②（追加用件ありの場合のみ）"
    announcement: "ご用件を簡潔におっしゃってください。"

  - module_name: "通話完了_アナウンス"
    purpose: "受付完了案内 + 折り返し連絡説明 + 終話挨拶"
    announcement: "ご用件を承りました。3診療日以内に担当者から折り返し電話連絡いたします。なお、代表電話は大変こみあっております。当院からの折り返し電話に出られなかった場合でも、必ずこちらから再度ご連絡をしますのでお待ちくださいますようお願い申し上げます。お電話ありがとうございました。"

  - module_name: "END_非通知"
    purpose: "非通知着信時の終話アナウンス"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  - module_name: "END_時間外"
    purpose: "時間外着信時の終話アナウンス（本フロー未使用）"
    announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"

  - module_name: "END_聴取失敗"
    purpose: "リトライ上限到達時の終話アナウンス（代表電話の DTMF 操作案内付き）"
    announcement: "お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、再度代表電話へおかけなおしください。代表電話では音声ガイダンスが流れますので、「患者さん、また、ご家族の方は」の1番を押した後に、「その他については」の4番を押してください。お電話ありがとうございました。"

  - module_name: "END_受付完了"
    purpose: "全聴取完了時の終話アナウンス（通話完了_アナウンスと同一文言を再利用）"
    announcement: "ご用件を承りました。3診療日以内に担当者から折り返し電話連絡いたします。なお、代表電話は大変こみあっております。当院からの折り返し電話に出られなかった場合でも、必ずこちらから再度ご連絡をしますのでお待ちくださいますようお願い申し上げます。お電話ありがとうございました。"

