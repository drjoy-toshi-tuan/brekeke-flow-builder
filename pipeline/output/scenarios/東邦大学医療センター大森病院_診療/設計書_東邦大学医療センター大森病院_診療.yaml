    condition: "初診ルート全聴取完了"
    tts_announcement: "診療予約の希望を承りました。終話後、東邦大学大森病院よりショートメールが届きますので内容を必ずご確認いただき、誤りがありましたら修正をお願いいたします。また、ご住所の登録もお願いいたします。平日2日以内に、担当者から、改めてショートメールをお送りします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_診療予約"

  - name: "END_予約変更"
