# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "初診"
      - "変更"
      - "キャンセル"
      - "セカンドオピニオン"
    notes: "DTMF 1=初診, 2=変更, 3=キャンセル, 4=セカンドオピニオン。復唱あり（Gen1: 「診療の予約でよろしいですか?」等）"

  - order: 2
    name: "紹介状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: ""   # 分岐用のみ、保存しない
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
    notes: "「他の医療機関からの紹介状はお持ちでしょうか？」の Yes/No 判定。other 分岐 = なし"

  - order: 3
    name: "紹介元医療機関名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "referrerHospital"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 セリフ: 「紹介状を発行された医療機関名をおっしゃってください。」"

  - order: 4
    name: "紹介元医療機関電話番号"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "referrerPhone"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 セリフ: 「そちらの医療機関の電話番号もおっしゃってください。わからなければ「わからない」とおっしゃってください。」 ※ 患者連絡先の電話番号聴取サブフローとは別物のためテキスト保存にする"

  - order: 5
    name: "診療科_初診"
