    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約キャンセル"

  - name: "END_セカンドオピニオン"
    condition: "セカンドオピニオン申込完了（書類あり）"
    tts_announcement: "かしこまりました、申込に必要な書類を本日中にご郵送ください。資料が到着いたしましたら、担当者より候補日をショートメール、または電話にてご連絡させていただきます。お電話ありがとうございました。"
