# smsFlag 分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  notes: |
    Gen3 では携帯/固定の出し分けを削除し、終話 TTS は用件ごと 1 本に統一する方針（移管ノート director 判断）。
    SMS 送信は IVR プロパティ側 + Dr.JOY 側で着番から判定する想定。
    各正常系終話の sms_flag は "1" 固定で、Dr.JOY 側で最終的に SMS 送信可否を制御する前提。

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  notes: |
    Gen1 commubo にも RAG/雑談ノードは存在しない。Gen3 でも RAG は不要。
    将来的に「最後にご質問は？」が必要であればパターン 2 で追加可能。

