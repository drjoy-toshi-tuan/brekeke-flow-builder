# --- セクション3: フローの目的 ---
purpose: |
  東邦大学医療センター大森病院の予約専用 AI 電話。患者からの電話を受け、4 つの用件
  （初診=紹介状ありの診療予約 / 予約変更 / 予約キャンセル / セカンドオピニオン申込）を分類し、
  各ルートに必要な情報（紹介元医療機関名・診療科・氏名・生年月日・診察券番号・電話番号 等）を聴取して
  Dr.JOY に折り返し受付として登録する。
  特殊診療科（リハビリ・リプロ・がんセンター・緩和・臨床遺伝・放射線・感染症 等）は AI で受付不可なので
  各専用 TTS で代表番号や HP 案内に誘導する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "東邦大学医療センター大森病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外
                          └─ 受付可 → 冒頭_アナウンス(TTS)
                                        └─ 用件確認(hearing, enum, echo_back)
                                              ├─ 初診 → 3診療日制約_案内 → 紹介状確認
                                              │            ├─ あり → 紹介元医療機関名 → 紹介元医療機関電話番号
                                              │            │           → 診療科_初診 (特殊7科 or 通常)
                                              │            │             ├─ リハビリ → END_リハビリ_初診
                                              │            │             ├─ リプロ泌尿器 → END_リプロ泌尿器_初診
                                              │            │             ├─ がんセンター/緩和 → END_がんセンター緩和_初診
                                              │            │             ├─ 臨床遺伝 → END_臨床遺伝_初診
                                              │            │             ├─ 放射線 → END_放射線_初診
                                              │            │             ├─ 総合診療感染症科 → END_総感染_初診
                                              │            │             └─ other → 医師指定 → 症状確認 → 性別
                                              │            │                          → [生年月日Sub] → 予約希望日 → [診察券Sub]
                                              │            │                          → [氏名Sub] → [電話番号Sub] → END_診療予約
                                              │            └─ なし(other) → END_紹介状なし
                                              ├─ 変更 ─┐
                                              ├─ キャンセル ─┤
                                              │            └─ 診療科_変更キャンセル (受付不可10種 or 通常)
                                              │                ├─ 受付不可10種 → END_代表案内_変更キャンセル
                                              │                └─ other → [診察券Sub] → 現在の予約日
                                              │                            → 用件分岐(CMR)
                                              │                                ├─ 変更 → 予約希望日 → [氏名Sub] → [生年月日Sub]
                                              │                                │             → 用件分岐_2(CMR=変更) → [電話番号Sub] → 用件最終分岐 → END_予約変更
                                              │                                └─ キャンセル → [氏名Sub] → [生年月日Sub]
                                              │                                              → 用件分岐_2(CMR=キャンセル) → キャンセル詳細
                                              │                                                ├─ 全キャンセル → キャンセル理由 → [電話番号Sub] → 用件最終分岐 → END_予約キャンセル
                                              │                                                └─ 今回のみ(other) → 希望日有無
                                              │                                                          ├─ 決まっている → 予約希望日 → [電話番号Sub] → END_予約変更
                                              │                                                          └─ 決まっていない(other) → 希望日未定_案内 → キャンセル理由 → [電話番号Sub] → END_予約キャンセル
                                              ├─ セカンドオピニオン → セカンド書類確認
                                              │            ├─ あり → [氏名Sub] → [生年月日Sub] → [電話番号Sub]
                                              │            │           → 診療科_セカンド → END_セカンドオピニオン
                                              │            └─ なし(other) → END_セカンド書類なし
                                              └─ other(対象外用件・聞き取れず) → END_聴取失敗
    notes: |
      - 携帯/固定の出し分けは Gen3 仕様で削除。終話 TTS は用件ごとに 1 本（移管ノート director 判断 → 確認レポート N-1）
      - GW 期間判定（5/1〜5/7）は全削除。Gen3 では date_of_call_classifier + acceptance_times の標準処理に統一
      - 「もしもし」連発対応も削除（標準 retry テンプレに集約）
      - 代表番号の使い分け（外来予約センター 03-5763-5323 / 病院代表 03-3762-4151）は Gen3 では END_聴取失敗 1 本に統一（確認レポート N-2）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭 ===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # === 用件確認（4 分岐 + other） ===
  - step: 用件確認
    type: hearing
    output_format: enum
    echo_back: true
    save_to: classification
    conditions:
      - match: "初診"
        next: 3診療日制約_案内
      - match: "変更"
        next: 診療科_変更キャンセル
      - match: "キャンセル"
        next: 診療科_変更キャンセル
      - match: "セカンドオピニオン"
        next: セカンド書類確認
      - match: "other"
        next: END_聴取失敗

  # ====== 初診ルート ======
  - step: 3診療日制約_案内
    type: announcement
    next: 紹介状確認

  - step: 紹介状確認
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "あり"
        next: 紹介元医療機関名
      - match: "other"   # = なし相当
        next: END_紹介状なし

  - step: 紹介元医療機関名
    type: hearing
    output_format: text
    save_to: referrerHospital
    next: 紹介元医療機関電話番号

  - step: 紹介元医療機関電話番号
    type: hearing
    output_format: text
    save_to: referrerPhone
    next: 診療科_初診

  - step: 診療科_初診
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "リハビリテーション科"
        next: END_リハビリ_初診
      - match: "リプロダクションセンター泌尿器科"
        next: END_リプロ泌尿器_初診
      - match: "がんセンター"
        next: END_がんセンター緩和_初診
      - match: "緩和ケアセンター"
        next: END_がんセンター緩和_初診
      - match: "臨床遺伝診療部"
        next: END_臨床遺伝_初診
      - match: "放射線科"
        next: END_放射線_初診
      - match: "総合診療感染症科"
        next: END_総感染_初診
      - match: "other"
        next: 医師指定_初診

  - step: 医師指定_初診
    type: hearing
    output_format: text
    save_to: doctorRequest
    next: 症状確認_初診

  - step: 症状確認_初診
    type: hearing
    output_format: text
    save_to: symptoms
    next: 性別_初診

  - step: 性別_初診
    type: hearing
    output_format: text
    save_to: patientGender
    next: 生年月日聴取_初診

  - step: 生年月日聴取_初診
    type: subflow
    flowname: "東邦大学医療センター大森病院$生年月日聴取"
    next: 予約希望日_初診

  - step: 予約希望日_初診
    type: hearing
    output_format: datetime
    save_to: desiredDate
    next: 診察券番号聴取_初診

  - step: 診察券番号聴取_初診
    type: subflow
    flowname: "東邦大学医療センター大森病院$診察券番号聴取"
    next: 氏名聴取_初診

  - step: 氏名聴取_初診
    type: subflow
    flowname: "東邦大学医療センター大森病院$氏名聴取"
    next: 電話番号聴取_初診

  - step: 電話番号聴取_初診
    type: subflow
    flowname: "東邦大学医療センター大森病院$電話番号聴取"
    next: END_診療予約

  # ====== 変更/キャンセルルート ======
  - step: 診療科_変更キャンセル
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "リハビリテーション科"
        next: END_代表案内_変更キャンセル
      - match: "リプロダクションセンター婦人科"
        next: END_代表案内_変更キャンセル
      - match: "がんセンター"
        next: END_代表案内_変更キャンセル
      - match: "臨床遺伝診療部"
        next: END_代表案内_変更キャンセル
      - match: "緩和ケアセンター"
        next: END_代表案内_変更キャンセル
      - match: "リプロダクションセンター泌尿器科"
        next: END_代表案内_変更キャンセル
      - match: "放射線科"
        next: END_代表案内_変更キャンセル
      - match: "小児循環器科"
        next: END_代表案内_変更キャンセル
      - match: "産科"
        next: END_代表案内_変更キャンセル
      - match: "総合診療感染症科"
        next: END_代表案内_変更キャンセル
      - match: "other"
        next: 診察券番号聴取_変更キャンセル

  - step: 診察券番号聴取_変更キャンセル
    type: subflow
    flowname: "東邦大学医療センター大森病院$診察券番号聴取"
    next: 現在の予約日

  - step: 現在の予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 用件分岐_変更キャンセル

  - step: 用件分岐_変更キャンセル
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 予約希望日_変更
      - match: "other"   # = キャンセル
        next: 氏名聴取_変更キャンセル

  - step: 予約希望日_変更
    type: hearing
    output_format: datetime
    save_to: desiredDate
    next: 氏名聴取_変更キャンセル

  - step: 氏名聴取_変更キャンセル
    type: subflow
    flowname: "東邦大学医療センター大森病院$氏名聴取"
    next: 生年月日聴取_変更キャンセル

  - step: 生年月日聴取_変更キャンセル
    type: subflow
    flowname: "東邦大学医療センター大森病院$生年月日聴取"
    next: 用件分岐_変更キャンセル_2

  - step: 用件分岐_変更キャンセル_2
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 電話番号聴取_変更キャンセル
      - match: "other"   # = キャンセル
        next: キャンセル詳細

  - step: キャンセル詳細
    type: hearing
    output_format: enum
    save_to: cancelDetail
    echo_back: true
    conditions:
      - match: "全キャンセル"
        next: キャンセル理由
      - match: "other"   # = 今回の予約日のみキャンセル今後希望
        next: 希望日有無

  - step: 希望日有無
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "決まっている"
        next: 予約希望日_キャンセル後変更
      - match: "other"   # = 決まっていない
        next: 希望日未定_案内

  - step: 予約希望日_キャンセル後変更
    type: hearing
    output_format: datetime
    save_to: desiredDate
    next: 電話番号聴取_キャンセル後変更

  - step: 電話番号聴取_キャンセル後変更
    type: subflow
    flowname: "東邦大学医療センター大森病院$電話番号聴取"
    next: END_予約変更

  - step: 希望日未定_案内
    type: announcement
    next: キャンセル理由

  - step: キャンセル理由
    type: hearing
    output_format: text
    save_to: reason
    next: 電話番号聴取_変更キャンセル

  - step: 電話番号聴取_変更キャンセル
    type: subflow
    flowname: "東邦大学医療センター大森病院$電話番号聴取"
    next: 用件最終分岐

  - step: 用件最終分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: END_予約変更
      - match: "other"   # = キャンセル
        next: END_予約キャンセル

  # ====== セカンドオピニオンルート ======
  - step: セカンド書類確認
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "あり"
        next: 氏名聴取_セカンド
      - match: "other"   # = なし
        next: END_セカンド書類なし

  - step: 氏名聴取_セカンド
    type: subflow
    flowname: "東邦大学医療センター大森病院$氏名聴取"
    next: 生年月日聴取_セカンド

  - step: 生年月日聴取_セカンド
    type: subflow
    flowname: "東邦大学医療センター大森病院$生年月日聴取"
    next: 電話番号聴取_セカンド

  - step: 電話番号聴取_セカンド
    type: subflow
    flowname: "東邦大学医療センター大森病院$電話番号聴取"
    next: 診療科_セカンド

  - step: 診療科_セカンド
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "other"   # 診療科は分岐せずすべて END_セカンドオピニオン
        next: END_セカンドオピニオン

  # ====== 終話ブロック ======
  - step: END_診療予約
    type: termination
    termination_ref: "END_診療予約"

  - step: END_予約変更
    type: termination
    termination_ref: "END_予約変更"

  - step: END_予約キャンセル
    type: termination
    termination_ref: "END_予約キャンセル"

  - step: END_セカンドオピニオン
    type: termination
    termination_ref: "END_セカンドオピニオン"

  - step: END_セカンド書類なし
    type: termination
    termination_ref: "END_セカンド書類なし"

  - step: END_紹介状なし
    type: termination
    termination_ref: "END_紹介状なし"

  - step: END_リハビリ_初診
    type: termination
    termination_ref: "END_リハビリ_初診"

  - step: END_リプロ泌尿器_初診
    type: termination
    termination_ref: "END_リプロ泌尿器_初診"

  - step: END_がんセンター緩和_初診
    type: termination
    termination_ref: "END_がんセンター緩和_初診"

  - step: END_臨床遺伝_初診
    type: termination
    termination_ref: "END_臨床遺伝_初診"

  - step: END_放射線_初診
    type: termination
    termination_ref: "END_放射線_初診"

  - step: END_総感染_初診
    type: termination
    termination_ref: "END_総感染_初診"

  - step: END_代表案内_変更キャンセル
    type: termination
    termination_ref: "END_代表案内_変更キャンセル"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "初診"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "セカンドオピニオン"
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分。Gen1 では「新規/変更/キャンセル/セカンドオピニオン」表記、Gen3 では「初診」に統一（紹介状必須のため）"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
