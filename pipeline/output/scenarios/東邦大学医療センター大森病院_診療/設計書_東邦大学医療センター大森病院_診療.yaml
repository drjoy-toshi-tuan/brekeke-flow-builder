    output_labels: []
    notes: "Gen1 セリフ: 「性別を教えていただけますか？」 OpenAI で「男性」「女性」のいずれかに正規化"

  - order: 9
    name: "予約希望日_初診"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "desiredDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "DTMF 4 桁（月日。例: 0415=4月15日）。Gen1 セリフ: 「3診療日以降のご希望の日時をおっしゃってください。」"

  - order: 10
    name: "診療科_変更キャンセル"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "がんセンター"
      - "ペインクリニック"
      - "メンタルヘルスセンター"
      - "リウマチ膠原病センター"
      - "リハビリテーション科"
      - "リプロダクションセンター泌尿器科"
      - "リプロダクションセンター婦人科"
      - "緩和ケアセンター"
      - "眼科"
      - "形成外科"
      - "血液腫瘍科"
      - "呼吸器センター外科"
      - "呼吸器センター内科"
      - "口腔外科"
      - "産科"
      - "耳鼻咽喉科"
      - "循環器センター外科"
      - "循環器センター内科"
      - "小児科"
      - "小児外科"
      - "小児循環器科"
      - "消化器センター外科"
      - "消化器センター内科"
      - "心療内科"
      - "新生児科"
      - "腎センター"
      - "整形外科"
      - "総合診療感染症科"
      - "総合診療内科"
      - "東洋医学科"
      - "糖尿病代謝内分泌センター"
      - "内分泌外科"
      - "乳腺外科"
      - "脳神経センター外科"
      - "脳神経センター内科"
      - "泌尿器科"
      - "皮膚科"
      - "病理診断科"
      - "婦人科"
      - "放射線科"
      - "麻酔科"
      - "臨床遺伝診療部"
      - "登録なし"
    notes: "Gen1 セリフ: 「予約をされている診療科をおっしゃってください。」 受付不可 10 種を専用 END_代表案内_変更キャンセル に分岐"

  - order: 11
    name: "現在の予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "DTMF 4 桁。Gen1 セリフ: 「予約票に記載されている予約日を「4月1日」のように日付でお話ください。」"

  - order: 12
    name: "予約希望日_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "desiredDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: |
      DTMF 4 桁（月日。例: 0415=4月15日）。
      DTMF 対応表:
        - DTMF 4 桁 (MMDD) → YYYY-MM-DD HH:MM に正規化（例: 0415 → 4月15日）
        - 音声例「4月15日」「来週の火曜日」も同形式で正規化
      Gen1 セリフ: 「3診療日以降で、変更希望日を4月1日のようにおっしゃってください。」

  - order: 13
    name: "キャンセル詳細"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "cancelDetail"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "全キャンセル"
    notes: "DTMF 1=全キャンセル(該当診療科を全てキャンセル今後希望なし), 2=今回のみ(この予約日のみキャンセル今後希望)。other 分岐 = 今回のみ。Gen1 セリフ: 「キャンセルについて次の2つのうちいずれかでお話ください。「該当診療科を全てキャンセルし、今後診療を希望しない」は、1番を「この予約日はキャンセルするが、今後診療を希望する」は、2番とおっしゃってください。」"

  - order: 14
    name: "希望日有無"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: ""
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "決まっている"
    notes: "DTMF 1=決まっている, 2=決まっていない。other 分岐 = 決まっていない。Gen1 セリフ: 「今後の診療について次のうちいずれかでお話ください。「希望する日が決まっている」は、1番を「希望する日が決まっていない」は、2番とおっしゃってください。」"

  - order: 15
    name: "予約希望日_キャンセル後変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "desiredDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "DTMF 4 桁。希望日有無=決まっている のときに聴取"

  - order: 16
    name: "キャンセル理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 セリフ: 「ご予約キャンセルの理由をおっしゃってください。」"

  - order: 17
    name: "セカンド書類確認"
