      - "呼吸器センター内科"
      - "口腔外科"
      - "産科"
      - "耳鼻咽喉科"
      - "循環器センター外科"
      - "循環器センター内科"
      - "小児科"
      - "小児外科"
      - "小児循環器科"
      - "消化器センター外科"
      - "消化器センター内科"
      - "心療内科"
      - "新生児科"
      - "腎センター"
      - "整形外科"
      - "総合診療感染症科"
      - "総合診療内科"
      - "東洋医学科"
      - "糖尿病代謝内分泌センター"
      - "内分泌外科"
      - "乳腺外科"
