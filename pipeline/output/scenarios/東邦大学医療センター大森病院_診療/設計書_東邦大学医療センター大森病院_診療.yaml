# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1→Gen3 移管。元 commubo の 13 yaml を Gen3 標準ブロック構成に変換。"
  - "携帯/固定の出し分けは Gen3 仕様で削除。終話 TTS は用件ごと 1 本に統一（移管ノート director 判断 → 確認レポート N-1）。"
  - "GW 期間判定（5/1〜5/7 の日時分岐 + GW挨拶/GW診療/GW変更）は全削除。Gen3 では date_of_call_classifier + acceptance_times の標準処理に統一。"
  - "「もしもし」連発カウントは削除（Gen3 では retry_count + retry TTS の標準処理に統一。1 回目「はい、聞こえております」/ 2 回目以降「もしもし、と聞こえております」のニュアンス差は IVR プロパティ側で吸収）。"
  - "代表番号 2 種類（外来予約センター 03-5763-5323 / 病院代表 03-3762-4151）は Gen3 では END_聴取失敗 1 本に統一（病院代表番号案内）→ 確認レポート N-2。"
  - "稼働前アナウンス（「4月21日零時より」）は Gen1 移管時の旧文言のため削除。"
  - "転送（聴取失敗の転送①/②、フラグ4/フラグ7設定）は削除。call_transfer モジュールは使わず、聴取失敗時は END_聴取失敗（病院代表番号案内）で完結。"
  - "diagnostic_department の正規化は OpenAI が直接担当。Gen1 の分岐モジュール（呼吸器/消化器/脳神経/循環器/総合診療/小児医療/産婦人科/リプロダクションセンター）は Gen3 では削除。OpenAI のプロンプトに「呼吸器内科/外科の判別は発話を参照して『呼吸器センター内科』or『呼吸器センター外科』に確定」等のルールを記述する。"
  - "性別は Gen3 では output_format=text + OpenAI 正規化（男性/女性）で実装。Gen1 のように後段でなにか分岐するわけではないので分岐モジュールは不要。"
  - "キャンセル後で希望日決まっている → 予約変更フローへ合流させるが、Gen1 と同様に最終的に変更扱いの終話（END_予約変更）にする。"
  - "サブフロー内の retry 上限到達時の挙動（電話番号聴取で代表番号案内など）は Custom Jump to Flow から親フローへシグナル不可のため、必要なら Brekeke IVR UI でサブフロー内に切断モジュールを手動追加する（confirmation_items に列挙）。"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（施設ID）— Dr.JOY 管理画面で確認。設計書・フローJSONには不要"
    resolved: false
  - item: "IVR 着信電話番号（ARS 番号）— Brekeke 設定時に設定"
    resolved: false
  - item: "営業時間（曜日・時間帯）— Dr.JOY 側でスケジュール設定。フローJSONには acceptance_times 配置のみ。Gen1 から「平日 9:00〜16:30」と推測"
    resolved: false
  - item: "終話 TTS の携帯/固定の出し分け削除（移管ノート director 判断）— Gen3 では SMS 送信は IVR プロパティ側 + Dr.JOY 側で着番判定する想定。customer_doc がないため、念のため浜口確認"
    resolved: false
  - item: "代表番号の使い分け削除（外来予約センター 03-5763-5323 / 病院代表 03-3762-4151）— Gen3 では END_聴取失敗 1 本（病院代表）に統一でよいか確認"
    resolved: false
  - item: "「予約以外」「予約確認」用件は明示せず、用件確認 hearing の other → END_聴取失敗 で代表案内する設計でよいか確認"
    resolved: false
  - item: "smsFlag の最終配置（IVR プロパティ側で着番判定するか、フロー側で smsFlag=1 固定にするか）"
    resolved: false
  - item: "[電話番号聴取] サブフロー内の retry 上限到達時に 代表案内TTS→切断 を手動追加（Brekeke IVR UI）"
    resolved: false
  - item: "SMS 送信文面（Dr.JOY 管理画面で設定）"
    resolved: false
  - item: "認証設定（生年月日 / 診察券番号 / 電話番号の優先順位）— Dr.JOY 管理画面で設定"
    resolved: false
  - item: "Dr.JOY 画面の表示設定（確認画面表示 ○/×）— Dr.JOY 管理画面で設定"
    resolved: false
