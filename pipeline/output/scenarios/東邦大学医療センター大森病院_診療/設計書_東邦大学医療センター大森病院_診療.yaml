step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうち、いずれかでお話ください。1．「診療予約」、2．「予約の変更」、3．「予約のキャンセル」、4．「セカンドオピニオン」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "初診"
        - "変更"
        - "キャンセル"
        - "セカンドオピニオン"
      mapping:
        - input: "DTMF 1, 1, 一, 印刷の予約, 撮る, 取る, 受診, 初診, 診察の予約, 診療, 薬をとる, 予約したい, 予約します, 予約をお願い, 予約をします, 予約を取りたい, 予約取ったんだけど, 余白を取る, 要約, 紹介状, 健診の予約, 取りたい"
          output: "初診"
        - input: "DTMF 2, 延期, 時間, 取り直したい, 取り直す, 二, 日程, 日付, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更"
          output: "変更"
        - input: "DTMF 3, 三, やめる, 取り消し, 取り消す, 取消, キャンセル"
          output: "キャンセル"
        - input: "DTMF 4, 四, よん, オピニオン, セカン, セカンド, 申込書"
          output: "セカンドオピニオン"
      no_result_condition: "予約以外の発話（お見舞い・処方箋・症状相談 等）または上記いずれにも該当しない場合は other に振り分けて END_聴取失敗"
    save_to: "classification"
    next_step: "(各分岐の最初のステップへ)"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

