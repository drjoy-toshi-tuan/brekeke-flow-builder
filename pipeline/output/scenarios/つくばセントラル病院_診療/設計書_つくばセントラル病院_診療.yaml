# --- セクション11: 特記事項・制約 ---
special_notes:
  - "**復唱確認なし**（顧客指定、全フロー共通）。電話番号/生年月日のサブフローでも recitation: なし"
  - "**聞き直し1回まで**（retry_count=1）。全 hearing 共通"
  - "**冒頭で当日翌日問い合わせを排除**: 日程確認 hearing で「はい」→ END_代表案内_当日翌日(status=9)"
  - "**着信番号判定は電話番号聴取サブフロー内蔵の incoming-classifier に委譲**: メインフロー側に追加の script 判定は不要"
  - "**診療科多分岐**: 骨粗しょう症/がん検診/産婦人科/一般内科/特定健診/予防接種/健診希望 の 7 ラベル + default。default は no_result_default で「登録なし」を保存し用件確認へ進む"
  - "**症状聴取でも同様のキーワード再振り分け**: 一般内科ルートに入った後でも、症状発話から専門ルートに振り分け可能。enum 5 ラベル + その他(default)"
  - "**代表案内 3 種**: END_代表案内1（一般内科、来院案内のみ）/ END_代表案内2（特定健診系、029-872-1771）/ END_代表案内3（予防接種系、029-875-3511）"
  - "**当日翌日案内**: status=9 を採用。029-872-1771 を案内"
  - "**来院案内 (END_来院案内)**: status=7。がん検診症状あり または 産婦人科非検診で発生。代表電話 029-875-3511 を 3 回読み上げ"
  - "**SMS 送信パターン**: status=1 の終話で smsFlag=1 (予約/変更/健診/がん検診/骨粗しょう症), smsFlag=2 (キャンセル/お問い合わせ)。代表案内・来院案内・聴取失敗・非通知・時間外は smsFlag=-1"
  - "**DTMF 対応**: 診察券番号（サブフロー内）、連絡先電話番号（サブフロー内）、用件確認（DTMF 1=予約, 2=変更, 3=キャンセル, 4=確認）"
  - "**個人情報聴取の順序**: 連絡先電話番号 → 診察券番号 → 氏名 → 生年月日。CLAUDE.md Rule 9 に従い 4 サブフローで処理"
  - "**営業時間チェックなし**: use_acceptance_times=false。日程確認 hearing で当日翌日を排除し、その他の時間制御は Dr.JOY 側で運用"
  - "RAG / FAQ サブフロー未使用"

