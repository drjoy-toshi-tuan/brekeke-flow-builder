#
# 構造概要:
#   - 新規作成。冒頭で「今日明日問い合わせ」を絞り（はい→代表案内、いいえ→本フロー継続）
#   - 個人情報聴取（電話番号 / 診察券番号 / 氏名 / 生年月日）→ 診療科 → 用件確認 → 予約/変更/キャンセル/確認
#   - 診療科の段階で特殊診療科（骨粗しょう症 / がん検診 / 産婦人科 / 一般内科 / 特定健診 / 予防接種 / 健診）を専門ルートへ振り分け
#   - 症状聴取（一般予約）でもキーワード検出で同様の専門ルートへ再振り分け
#   - 復唱確認なし、聞き直し1回まで
version: "1.0"

