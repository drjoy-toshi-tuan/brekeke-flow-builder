# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "{tts_g:お電話ありがとうございます。セントラル総合クリニックのAI電話です。このお電話にてご連絡いただいた内容は、当院にて確認後、折り返しご連絡差し上げますので最後までお話しください。}"
    input_method: "voice_only"
    next_step: "日程確認"
    retry_failure: "skip"

  - step_name: "日程確認"
    tts_announcement: "{tts_g:お電話は、今日、明日の予約に関するお問い合わせでしょうか？「はい」、または「いいえ」でお答えください。}"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
      mapping:
        - input: "「はい」「そうです」「今日」「明日」を含む"
          output: "はい"
        - input: "「いいえ」「違います」を含む"
          output: "いいえ"
      no_result_condition: "上記いずれにも該当しない / 認識不能"
    save_to: ""
    next_step: "（条件分岐）"
    retry_failure: "end_failure"

  - step_name: "診療科"
    tts_announcement: "{tts_g:受診を希望されている診療科をお話ください。検査の方は検査とお話しください。}"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "骨粗しょう症検診"
        - "子宮がん検診"
        - "乳がん検診"
        - "産婦人科"
        - "一般内科"
        - "特定健診"
        - "予防接種"
        - "健診希望"
        - "登録なし"
      mapping:
        - input: "「骨粗しょう症」「骨密度」を含む"
          output: "骨粗しょう症検診"
        - input: "「子宮がん」「子宮頸がん」を含む"
          output: "子宮がん検診"
        - input: "「乳がん」「マンモグラフィ」「乳腺」を含む"
          output: "乳がん検診"
        - input: "「産婦人科」「婦人科」「産科」を含む"
          output: "産婦人科"
        - input: "「一般内科」「内科」を含む"
          output: "一般内科"
        - input: "「特定健診」「緩和ケア」「眼科」「救急」「歯科」「口腔」「放射線」「腫瘍」「麻酔」「リハビリ」「化学療法」を含む"
          output: "特定健診"
        - input: "「予防接種」「予防注射」「ワクチン」「HPV」「乳幼児健診」を含む"
          output: "予防接種"
        - input: "「健診」「人間ドック」を含む"
          output: "健診希望"
        - input: "上記いずれにも該当しない"
          output: "登録なし"
      no_result_condition: "認識不能"
    save_to: "clinicalDepartment"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"

  - step_name: "用件確認"
    tts_announcement: "{tts_g:ご用件をお伺いします。次の4つのうち、いずれかでお話ください。1「予約」、2「変更」、3「キャンセル」、4「予約確認」、それではお話ください。プッシュボタンでも操作できます。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
      mapping:
        - input: "DTMF 1 または「予約」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」を含む"
          output: "確認"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "（条件分岐）"
    retry_failure: "end_failure"

