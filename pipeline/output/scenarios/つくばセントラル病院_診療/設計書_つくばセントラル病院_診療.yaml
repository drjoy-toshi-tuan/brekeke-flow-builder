basic_info:
  facility_name: "つくばセントラル病院"
  scenario_name: "診療"
  group_name: "つくばセントラル病院"
  flow_name: "つくばセントラル病院$診療"
  target_facility: "つくばセントラル病院（セントラル総合クリニック）"
  office_id: "5b8a5379d2122d061d5143a8"
  phone_number: "TODO_要確認"
  business_hours: "TODO_要確認（Dr.JOY 管理画面で設定）"
  flow_type: "subflow"
  work_type: "new"
  environment: "demo"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "つくばセントラル病院$診療"
      role: "main"
      description: "冒頭→日程確認(Yes/No)→着信番号判定→電話番号聴取→診察券番号→氏名→生年月日→診療科分岐→用件確認分岐→各終話"

  subflows:
    - name: "つくばセントラル病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的 JSON コピー。復唱なし"

    - name: "つくばセントラル病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的 JSON コピー。**復唱なし**（顧客指定: 全フロー復唱確認なし）"

    - name: "つくばセントラル病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10 準拠。静的 JSON コピー。incoming-classifier 内蔵で携帯→確認/それ以外→直接聴取の分岐を含む。**復唱なし**（顧客指定）"

    - name: "つくばセントラル病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的 JSON コピー。DTMF入力対応。「わからない」分岐あり"

# --- セクション3: フローの目的 ---
purpose: "セントラル総合クリニック（つくばセントラル病院）への診療関連電話を受け、当日翌日の問い合わせは代表案内に振り分け、それ以外は連絡先・診察券番号・氏名・生年月日・診療科・用件を聴取して、予約/変更/キャンセル/予約確認/各種検診の折り返し受付を自動化する。診療科や症状のキーワードで特殊診療科（骨粗しょう症健診/がん検診/産婦人科/一般内科/特定健診/予防接種/健診人間ドック）を専門ルートに振り分ける。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "つくばセントラル病院$診療"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知 → 非通知_アナウンス → 切断
            └─ 通常 → 冒頭_アナウンス
                  → 日程確認(hearing enum: はい/いいえ)
                      ├─ はい → END_代表案内_当日翌日(status=9)
                      └─ いいえ → 着信番号判定(script phone_type)
                              ├─ mobile  → 電話番号聴取(subflow)
                              └─ それ以外 → 電話番号聴取(subflow)
                                  → 診察券番号聴取(subflow)
                                  → 氏名聴取(subflow)
                                  → 生年月日聴取(subflow)
                                  → 診療科(hearing enum: 多分岐)
                                      ├─ 骨粗しょう症検診 → 受診券所持確認_骨粗しょう症 …
                                      ├─ 子宮がん検診 / 乳がん検診 → 症状確認_がん検診 …
                                      ├─ 産婦人科 → 検診確認_産婦人科 …
                                      ├─ 一般内科 → END_代表案内1
                                      ├─ 特定健診 系 → END_代表案内2
                                      ├─ 予防接種 系 → END_代表案内3
                                      ├─ 健診希望 → 健診内容確認 → END_終話_健診_人間ドック
                                      └─ default → 用件確認(hearing enum)
                                              ├─ 予約 → 受診歴確認 → (再診→症状聴取 / 初診→紹介状確認 → ...)→ 予約希望日 → END_終話_予約
                                              ├─ 変更 → 予約日聴取_変更 → 予約希望日_変更 → END_終話_変更
                                              ├─ キャンセル → 予約日聴取_キャンセル → キャンセル理由 → END_終話_キャンセル
                                              └─ 確認 → 内容確認_予約確認 → END_終話_お問い合わせ

      ─── 骨粗しょう症健診ルート ───
      受診券所持確認_骨粗しょう症(enum: はい/いいえ)
        ├─ はい → 予約希望日聴取_骨粗しょう症 → END_終話_骨粗しょう症健診
        └─ いいえ → 自費確認_骨粗しょう症 → 予約希望日聴取_骨粗しょう症 → END_終話_骨粗しょう症健診

      ─── がん検診ルート ───
      症状確認_がん検診(enum: はい/いいえ)
        ├─ はい → END_来院案内(status=7)
        └─ いいえ → 受診券所持確認_がん検診(enum)
              ├─ はい → 市町村確認_がん検診 → 他検診受診確認_がん検診 → 予約希望日聴取_がん検診 → END_終話_子宮がん乳がん検診
              └─ いいえ → 自費確認_がん検診(enum)
                    ├─ はい → 市町村確認_がん検診 → ...
                    └─ いいえ → 予約希望日聴取_がん検診 → END_終話_子宮がん乳がん検診

      ─── 産婦人科ルート ───
      検診確認_産婦人科(enum: はい/いいえ)
        ├─ はい → 症状確認_がん検診（がん検診ルート合流）
        └─ いいえ → END_来院案内
    notes: |
      - 日程確認は冒頭ステップ。「今日/明日のお問合せ」は AI 受付対象外。
      - 着信番号判定は incoming_phone_number に基づく script (phone_type) で携帯/それ以外を振り分ける。
        サブフロー「電話番号聴取」が内部で同等の incoming-classifier 判定を持つため、本体側の着信番号判定は subflow 内で実質的に処理される。
      - 個人情報聴取は CLAUDE.md Rule 9 に従い 4 つの独立サブフローで処理。
      - 診療科の hearing は OpenAI enum 分岐で 7+1（default→用件確認）。
      - 症状聴取_一般予約 でもキーワード検出で 5 種の専門ルート再振り分けが必要（hearing enum、save_to=disease）。

# --- セクション4c: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック ===
  - step: 冒頭
    type: opening
    use_acceptance_times: false   # 営業時間情報は顧客指定なし。日程確認 hearing で当日翌日のみ排除する設計
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 日程確認

  # === 日程確認（当日/翌日 排除）===
  - step: 日程確認
    type: hearing
    output_format: enum
    save_to: ""
    conditions:
      - match: "はい"
        next: END_代表案内_当日翌日
      - match: "いいえ"
        next: 電話番号聴取
    retry_failure: end_failure

  # === 個人情報聴取（4 サブフロー）===
  # 電話番号聴取は内蔵 incoming-classifier で携帯/固定非通知の分岐を実施
  - step: 電話番号聴取
    type: subflow
    flowname: "つくばセントラル病院$電話番号聴取"
    next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "つくばセントラル病院$診察券番号聴取"
    next: 氏名聴取

  - step: 氏名聴取
    type: subflow
    flowname: "つくばセントラル病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "つくばセントラル病院$生年月日聴取"
    next: 診療科

  # === 診療科分岐（多分岐 enum）===
  - step: 診療科
    type: hearing
    output_format: enum
    save_to: "clinicalDepartment"
    no_result_default: "登録なし"
    conditions:
      - match: "骨粗しょう症検診"
        next: 受診券所持確認_骨粗しょう症
      - match: "子宮がん検診"
        next: 症状確認_がん検診
      - match: "乳がん検診"
        next: 症状確認_がん検診
      - match: "産婦人科"
        next: 検診確認_産婦人科
      - match: "一般内科"
        next: END_代表案内1
      - match: "特定健診"
        next: END_代表案内2
      - match: "予防接種"
        next: END_代表案内3
      - match: "健診希望"
        next: 健診内容確認
      - match: "default"
        next: 用件確認
    retry_failure: end_failure

  # === 用件確認（DTMF対応）===
  - step: 用件確認
    type: hearing
    output_format: enum
    save_to: "classification"
    conditions:
      - match: "予約"
        next: 受診歴確認
      - match: "変更"
        next: 予約日聴取_変更
      - match: "キャンセル"
        next: 予約日聴取_キャンセル
      - match: "確認"
        next: 内容確認_予約確認
    retry_failure: end_failure

  # === 一般予約ルート ===
  - step: 受診歴確認
    type: hearing
    output_format: enum
    save_to: "history"
    conditions:
      - match: "再診"
        next: 症状聴取_一般予約
      - match: "初診"
        next: 紹介状確認
    retry_failure: end_failure

  - step: 紹介状確認
    type: hearing
    output_format: enum
    save_to: "introduction"
    conditions:
      - match: "あり"
        next: 紹介元医療機関聴取
      - match: "なし"
        next: 症状聴取_一般予約
    retry_failure: end_failure

  - step: 紹介元医療機関聴取
    type: hearing
    output_format: text
    save_to: "introductionHosp"
    next: 担当医聴取
    retry_failure: skip

  - step: 担当医聴取
    type: hearing
    output_format: text
    save_to: "doctor"
    next: 予約希望日聴取_一般予約
    retry_failure: skip

  - step: 症状聴取_一般予約
    type: hearing
    output_format: enum
    save_to: "disease"
    no_result_default: ""
    conditions:
      - match: "産婦人科"
        next: 検診確認_産婦人科
      - match: "子宮がん検診"
        next: 症状確認_がん検診
      - match: "乳がん検診"
        next: 症状確認_がん検診
      - match: "骨粗しょう症検診"
        next: 受診券所持確認_骨粗しょう症
      - match: "予防接種"
        next: END_代表案内3
      - match: "default"
        next: 予約希望日聴取_一般予約
    retry_failure: skip
    notes: "OpenAI で症状からキーワード（産婦人科・がん検診・骨粗しょう症・予防接種）を抽出して再振り分け。default は自由テキストとして save_to=disease に格納し予約希望日へ進む"

  - step: 予約希望日聴取_一般予約
    type: hearing
    output_format: datetime
    save_to: "Preferred_date"
    next: END_終話_予約
    retry_failure: skip

  # === 変更ルート ===
  - step: 予約日聴取_変更
    type: hearing
    output_format: datetime
    save_to: "reservationDate"
    next: 予約希望日聴取_変更
    retry_failure: end_failure

  - step: 予約希望日聴取_変更
    type: hearing
    output_format: datetime
    save_to: "Preferred_date"
    next: END_終話_変更
    retry_failure: skip

  # === キャンセルルート ===
  - step: 予約日聴取_キャンセル
    type: hearing
    output_format: datetime
    save_to: "reservationDate"
    next: キャンセル理由聴取
    retry_failure: end_failure

  - step: キャンセル理由聴取
    type: hearing
    output_format: text
    save_to: "reason"
    next: END_終話_キャンセル
    retry_failure: skip

  # === 予約確認ルート ===
  - step: 内容確認_予約確認
    type: hearing
    output_format: text
    save_to: "inquiry"
    next: END_終話_お問い合わせ
    retry_failure: skip

  # === 骨粗しょう症健診ルート ===
  - step: 受診券所持確認_骨粗しょう症
    type: hearing
    output_format: enum
    save_to: "medicalTicket"
    conditions:
      - match: "はい"
        next: 予約希望日聴取_骨粗しょう症
      - match: "いいえ"
        next: 自費確認_骨粗しょう症
    retry_failure: end_failure

  - step: 自費確認_骨粗しょう症
    type: hearing
    output_format: enum
    save_to: "selfpaidCheck"
    conditions:
      - match: "default"
        next: 予約希望日聴取_骨粗しょう症
    retry_failure: skip

  - step: 予約希望日聴取_骨粗しょう症
    type: hearing
    output_format: datetime
    save_to: "Preferred_date"
    next: END_終話_骨粗しょう症健診
    retry_failure: skip

  # === がん検診・産婦人科ルート ===
  - step: 検診確認_産婦人科
    type: hearing
    output_format: enum
    save_to: ""
    conditions:
      - match: "はい"
        next: 症状確認_がん検診
      - match: "いいえ"
        next: END_来院案内
    retry_failure: end_failure

  - step: 症状確認_がん検診
    type: hearing
    output_format: enum
    save_to: "disease"
    conditions:
      - match: "はい"
        next: END_来院案内
      - match: "いいえ"
        next: 受診券所持確認_がん検診
    retry_failure: end_failure

  - step: 受診券所持確認_がん検診
    type: hearing
    output_format: enum
    save_to: "medicalTicket"
    conditions:
      - match: "はい"
        next: 市町村確認_がん検診
      - match: "いいえ"
        next: 自費確認_がん検診
    retry_failure: end_failure

  - step: 自費確認_がん検診
    type: hearing
    output_format: enum
    save_to: "selfpaidCheck"
    conditions:
      - match: "はい"
        next: 市町村確認_がん検診
      - match: "いいえ"
        next: 予約希望日聴取_がん検診
    retry_failure: end_failure

  - step: 市町村確認_がん検診
    type: hearing
    output_format: text
    save_to: "city"
    next: 他検診受診確認_がん検診
    retry_failure: skip

  - step: 他検診受診確認_がん検診
    type: hearing
    output_format: text
    save_to: "inquiry"
    next: 予約希望日聴取_がん検診
    retry_failure: skip

  - step: 予約希望日聴取_がん検診
    type: hearing
    output_format: datetime
    save_to: "Preferred_date"
    next: END_終話_子宮がん乳がん検診
    retry_failure: skip

  # === 健診・人間ドックルート ===
  - step: 健診内容確認
    type: hearing
    output_format: text
    save_to: "inquiry"
    next: END_終話_健診_人間ドック
    retry_failure: skip

  # === 終話ブロック群 ===
  - step: END_終話_予約
    type: termination
    termination_ref: "END_終話_予約"

  - step: END_終話_変更
    type: termination
    termination_ref: "END_終話_変更"

  - step: END_終話_キャンセル
    type: termination
    termination_ref: "END_終話_キャンセル"

  - step: END_終話_お問い合わせ
    type: termination
    termination_ref: "END_終話_お問い合わせ"

  - step: END_終話_子宮がん乳がん検診
    type: termination
    termination_ref: "END_終話_子宮がん乳がん検診"

  - step: END_終話_骨粗しょう症健診
    type: termination
    termination_ref: "END_終話_骨粗しょう症健診"

  - step: END_終話_健診_人間ドック
    type: termination
    termination_ref: "END_終話_健診_人間ドック"

  - step: END_代表案内1
    type: termination
    termination_ref: "END_代表案内1"

  - step: END_代表案内2
    type: termination
    termination_ref: "END_代表案内2"

  - step: END_代表案内3
    type: termination
    termination_ref: "END_代表案内3"

  - step: END_代表案内_当日翌日
    type: termination
    termination_ref: "END_代表案内_当日翌日"

  - step: END_来院案内
    type: termination
    termination_ref: "END_来院案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "予約確認"
    item_default: true
    editable: true
    deletable: false
    notes: "用件確認 hearing の保存先"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: ""

