# 設計書 — 牛久愛和総合病院 診療
# 生成元: @director エージェント
# 生成日: 2026-04-30
# 入力資料: docs/migration/gen2_牛久愛和総合病院_診療.md
# 元資料: docs/reference/customer_docs/【診療1】：牛久愛和総合病院.md
# 確認レポート: docs/designs/確認レポート_牛久愛和総合病院_診療_2026-04-30.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "牛久愛和総合病院"
  scenario_name: "診療"
  group_name: "牛久愛和総合病院"
  flow_name: "drjoy^牛久愛和総合病院$診療"
  target_facility: "牛久愛和総合病院"
  office_id: "TODO_要確認"
  phone_number: "029-873-3111"
  business_hours: "なし（24時間 AI 受付。改訂履歴 2026/04/20 で営業時間外の予約不可ルールが削除されたため、時間外判定なし）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "drjoy^牛久愛和総合病院$診療"
      role: "main"
      description: "牛久愛和総合病院の予約専用 AI 電話。新規/再診の予約取得、予約変更/キャンセル/確認、検診（子宮がん/乳がん）の受付、その他問い合わせを処理する。"
  subflows:
    - name: "drjoy^牛久愛和総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "元資料 1-2「氏名は復唱してはいけません」に従い復唱なし。漢字変換せずカタカナで文字起こし。"
    - name: "drjoy^牛久愛和総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "元資料 1-2「電話番号と診察券番号のみ復唱を許可」を厳格適用し、生年月日も復唱なし。和暦→西暦正規化のみ実施。"
    - name: "drjoy^牛久愛和総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming 採用パターン（「今おかけいただいている電話番号でよろしいですか？」）。携帯/固定/その他の3分岐を内包し、phonetype を保存。Yes/No 救済として『肺→はい』『いいです→はい』を OpenAI プロンプトに含める。"
    - name: "drjoy^牛久愛和総合病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "8桁以内、数字のみ。発話に数字が含まれない場合は再ヒアリング（標準サブフローのリトライで対応）。「C/Sea→4」「号→5」の置換を OpenAI プロンプトに含める。「わからない」分岐あり。"

# --- セクション3: フローの目的 ---
purpose: |
  牛久愛和総合病院の予約専用 AI 電話。患者からの電話を受け、用件（新規予約／再診予約／変更／キャンセル／確認／検診／問い合わせ）を聴取し、
  個人情報（氏名・生年月日・連絡先電話番号・診察券番号）と診療科・担当先生・予約希望日／現在予約日・理由を聴取して
  Dr.JOY に保存する。施設側オペレーターは保存内容を確認のうえ、3 営業日以内に折り返し連絡する。
  特殊診療科（リハビリ・小児科・健診センター・耳鼻咽喉科）はその場で代表番号を案内し終話。
  ワクチン予約・複数人予約は冒頭の用件確認時にガードして代表案内終話する。
  検診（子宮がん／乳がん）は症状有無で専門外来振替か検診本来フローへ分岐。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "drjoy^牛久愛和総合病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 (status=2, smsFlag=0) → 切断
            └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS)
                                  → 用件確認 (hearing, enum)
                                      ├─ ワクチン → END_代表案内_ワクチン → 切断
                                      ├─ 複数人 → END_代表案内_複数人 → 切断
                                      ├─ 予約 → 新規・再診確認 (hearing, enum: 新規/再診)
                                      │                          → 氏名聴取（個人情報セクションへ）
                                      └─ 確認/変更/キャンセル/検診/問い合わせ/other → 氏名聴取

      個人情報セクション:
        氏名聴取 (subflow)
          → 生年月日聴取 (subflow)
            → 電話番号聴取 (subflow, phonetype 保存)
              → 診察券番号聴取 (subflow)
                → 診療科 (hearing, enum + no_result_default)
                    ├─ リハビリ → END_代表案内_リハビリ
                    ├─ 小児科 → END_代表案内_小児科
                    ├─ 健診センター → END_代表案内_健診
                    ├─ 耳鼻咽喉科 → END_代表案内_耳鼻科
                    ├─ 子宮がん検診 → 検診_症状確認
                    ├─ 乳がん検診 → 検診_症状確認
                    └─ other → 診療科2 (hearing, text)
                                → フロー分岐判定 (CMR: classification)

      フロー分岐判定:
        ├─ 予約 → 紹介状確認判定 (CMR: patientType)
        │            ├─ 新規 → 紹介状確認 (hearing, enum)
        │            │            ├─ あり → 担当先生
        │            │            └─ なし → 選定療養費案内 → 担当先生
        │            └─ 再診 → 担当先生
        ├─ 変更 → 担当先生
        ├─ キャンセル → 担当先生
        └─ 確認/問い合わせ/other → その他問い合わせ

      予約日関連:
        担当先生 (hearing, text)
          → 予約日関連判定 (CMR: classification)
              ├─ 変更 → 現在予約日 (hearing, datetime)
              │           → 予約希望日 (hearing, text)
              │              → 当日翌日判定 (script, custom)
              │                  ├─ 当日翌日 → END_代表案内_当日翌日
              │                  └─ other → 変更理由 (hearing, text) → その他問い合わせ
              ├─ キャンセル → 現在予約日 (hearing, datetime)
              │                → キャンセル理由 (hearing, text) → その他問い合わせ
              └─ 予約 → 予約希望日 (hearing, text)
                          → 当日翌日判定 (script, custom)
                              ├─ 当日翌日 → END_代表案内_当日翌日
                              └─ other → その他問い合わせ

      検診フロー:
        検診_症状確認 (hearing, enum)
          ├─ 症状なし → 受診券確認 (hearing, enum)
          │                ├─ あり → 市町村 (hearing, text) → 同時予約確認 (hearing, text)
          │                │           → その他問い合わせ
          │                └─ なし → END_自費検診不可
          └─ 症状あり → 検診_症状あり案内 (announcement) → 担当先生（予約フロー新規ルートに合流）

      最終フロー:
        その他問い合わせ (hearing, enum: なし/other)
          ├─ なし → 終了前判定 (CMR: 電話番号聴取の phonetype 出力)
          │           ├─ 携帯 → END_通話終了_携帯 (status=1, smsFlag=1)
          │           └─ other → END_通話終了_固定 (status=1, smsFlag=0)
          └─ other → その他問い合わせ回答 (announcement) → その他問い合わせ (自己ループ)
    notes: |
      営業時間チェック（acceptance_times）は配置しない（移管ノート 37 行目「改訂履歴 2026/04/20『【1-11. 営業時間外の予約不可】ルール削除』」に従う）。
      非通知のみ着信分類で弾く。ワクチン優先判定／複数人予約判定は用件確認 hearing の OpenAI プロンプト内で先取り判定し、enum 出力で直接分岐する（Pattern A）。
      「先取りスロット充填＆SKIP」の仕様は OpenAI プロンプト側で吸収する（prompter 担当）。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ===== 冒頭 =====
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # ===== 用件確認（ワクチン・複数人ガード内蔵） =====
  - step: 用件確認
    type: hearing
    output_format: enum
    save_to: classification
    conditions:
      - match: "ワクチン"
        next: END_代表案内_ワクチン
      - match: "複数人"
        next: END_代表案内_複数人
      - match: "予約"
        next: 新規・再診確認
      - match: "確認"
        next: 氏名聴取
      - match: "変更"
        next: 氏名聴取
      - match: "キャンセル"
        next: 氏名聴取
      - match: "検診"
        next: 氏名聴取
      - match: "問い合わせ"
        next: 氏名聴取
      - match: "other"
        next: 氏名聴取

  # ===== 新規・再診確認（予約のみ） =====
  - step: 新規・再診確認
    type: hearing
    output_format: enum
    save_to: patientType
    conditions:
      - match: "新規"
        next: 氏名聴取
      - match: "other"
        next: 氏名聴取

  # ===== 個人情報セクション =====
  - step: 氏名聴取
    type: subflow
    flowname: "drjoy^牛久愛和総合病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "drjoy^牛久愛和総合病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "drjoy^牛久愛和総合病院$電話番号聴取"
    next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "drjoy^牛久愛和総合病院$診察券番号聴取"
    next: 診療科

  # ===== 診療科聴取（特殊診療科分岐） =====
  - step: 診療科
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "リハビリ"
        next: END_代表案内_リハビリ
      - match: "小児科"
        next: END_代表案内_小児科
      - match: "健診センター"
        next: END_代表案内_健診
      - match: "耳鼻咽喉科"
        next: END_代表案内_耳鼻科
      - match: "子宮がん検診"
        next: 検診_症状確認
      - match: "乳がん検診"
        next: 検診_症状確認
      - match: "other"
        next: 診療科2

  - step: 診療科2
    type: hearing
    output_format: text
    save_to: clinicalDepartment2
    next: フロー分岐判定

  # ===== 用件別フロー分岐 =====
  - step: フロー分岐判定
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約"
        next: 紹介状確認判定
      - match: "変更"
        next: 担当先生
      - match: "キャンセル"
        next: 担当先生
      - match: "other"
        next: その他問い合わせ

  # ===== 紹介状確認（新規予約のみ） =====
  - step: 紹介状確認判定
    type: context_match_router
    reference_module: "OpenAI_新規・再診確認"
    conditions:
      - match: "新規"
        next: 紹介状確認
      - match: "other"
        next: 担当先生

  - step: 紹介状確認
    type: hearing
    output_format: enum
    save_to: introduction
    conditions:
      - match: "あり"
        next: 担当先生
      - match: "other"
        next: 選定療養費案内

  - step: 選定療養費案内
    type: announcement
    next: 担当先生

  # ===== 担当先生 =====
  - step: 担当先生
    type: hearing
    output_format: text
    save_to: doctor
    next: 予約日関連判定

  # ===== 予約日関連判定（用件で日付聴取を分岐） =====
  - step: 予約日関連判定
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 現在予約日
      - match: "キャンセル"
        next: 現在予約日
      - match: "other"
        next: 予約希望日

  # ===== 現在予約日（変更/キャンセル時） =====
  - step: 現在予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 予約希望日関連判定

  - step: 予約希望日関連判定
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 予約希望日
      - match: "other"
        next: キャンセル理由

  # ===== 予約希望日（予約・変更時） =====
  - step: 予約希望日
    type: hearing
    output_format: text
    save_to: DesiredreservationDate
    next: 当日翌日判定

  - step: 当日翌日判定
    type: script
    script_template: custom
    reference_module: "予約希望日"
    notes: |
      予約希望日のフリーワードに「今日」「明日」「明後日」等の相対日付表現が含まれているか、
      または日付として解釈可能な値が着信日時から見て当日／翌日に該当するかを判定する。
      営業日カレンダー（祝日・土日除外）必須。当日／翌日の場合は END_代表案内_当日翌日 へ。
      元資料 1-6: 「今日の日付を取得し、今日の日付から判別して、当日・翌日の予約は AI 電話で受け付けない」
      元資料 1-7: 「今日／明日／明後日のような相対的日付表現は着信日時から自動換算する」
      元資料 5章: 「10月以降で1月から9月の日付を言われたときは翌年」
    conditions:
      - match: "当日翌日"
        next: END_代表案内_当日翌日
      - match: "other"
        next: 理由聴取判定

  - step: 理由聴取判定
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 変更理由
      - match: "other"
        next: その他問い合わせ

  - step: 変更理由
    type: hearing
    output_format: text
    save_to: reason
    next: その他問い合わせ

  - step: キャンセル理由
    type: hearing
    output_format: text
    save_to: reason
    next: その他問い合わせ

  # ===== 検診フロー =====
  - step: 検診_症状確認
    type: hearing
    output_format: enum
    save_to: symptoms
    conditions:
      - match: "症状なし"
        next: 受診券確認
      - match: "other"
        next: 検診_症状あり案内

  - step: 検診_症状あり案内
    type: announcement
    next: 担当先生

  - step: 受診券確認
    type: hearing
    output_format: enum
    save_to: examTicket
    conditions:
      - match: "あり"
        next: 市町村
      - match: "other"
        next: END_自費検診不可

  - step: 市町村
    type: hearing
    output_format: text
    save_to: city
    next: 同時予約確認

  - step: 同時予約確認
    type: hearing
    output_format: text
    save_to: jointReservation
    next: その他問い合わせ

  # ===== その他問い合わせ（自己ループ） =====
  - step: その他問い合わせ
    type: hearing
    output_format: enum
    save_to: question
    conditions:
      - match: "なし"
        next: 終了前判定
      - match: "other"
        next: その他問い合わせ回答

  - step: その他問い合わせ回答
    type: announcement
    next: その他問い合わせ

  # ===== 終了前判定（電話種別で携帯/固定を分岐） =====
  - step: 終了前判定
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: END_通話終了_携帯
      - match: "other"
        next: END_通話終了_固定

  # ===== 終話ブロック =====
  - step: END_代表案内_ワクチン
    type: termination
    termination_ref: "END_代表案内_ワクチン"

  - step: END_代表案内_複数人
    type: termination
    termination_ref: "END_代表案内_複数人"

  - step: END_代表案内_リハビリ
    type: termination
    termination_ref: "END_代表案内_リハビリ"

  - step: END_代表案内_小児科
    type: termination
    termination_ref: "END_代表案内_小児科"

  - step: END_代表案内_健診
    type: termination
    termination_ref: "END_代表案内_健診"

  - step: END_代表案内_耳鼻科
    type: termination
    termination_ref: "END_代表案内_耳鼻科"

  - step: END_代表案内_当日翌日
    type: termination
    termination_ref: "END_代表案内_当日翌日"

  - step: END_自費検診不可
    type: termination
    termination_ref: "END_自費検診不可"

  - step: END_通話終了_固定
    type: termination
    termination_ref: "END_通話終了_固定"

  - step: END_通話終了_携帯
    type: termination
    termination_ref: "END_通話終了_携帯"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "新規"
      - id: "2"
        order: "2"
        value: "再診"
      - id: "3"
        order: "3"
        value: "変更"
      - id: "4"
        order: "4"
        value: "キャンセル"
      - id: "5"
        order: "5"
        value: "確認"
      - id: "6"
        order: "6"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分。OpenAI_用件確認 で保存。"

  - context_name: "patientType"
    context_name_jp: "新規再診区分"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "予約用件かつ新規/再診を聞いた時のみ保存（『新規』『再診』のいずれか）。紹介状確認分岐の判定に使う。"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名聴取サブフローで保存。漢字変換せずカタカナ保存（元資料 1-2）。"

