# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "ワクチン"
      - "複数人"
      - "予約"
      - "確認"
      - "変更"
      - "キャンセル"
      - "検診"
      - "問い合わせ"
    notes: |
      最優先で2つのガード判定を行う：
        (1) 「インフルエンザ／コロナの予防接種・ワクチン」検出 → "ワクチン"
            ※「帯状疱疹／シングリックス／たいじょうほうしん ワクチン」は除外（皮膚科判定として後段で処理）
        (2) 「二人」発話検出 → "複数人"
      その後、用件分類を 6 値で判定：
        - 「予約」「薬／お薬／集約／要約」 → "予約"
        - 「確認」 → "確認"
        - 「変更」 → "変更"
        - 「キャンセル」 → "キャンセル"
        - 「検診／健診／健康診断／人間ドック」 → "検診"
        - 「印刷／定期／新薬／再診／最新／禁忌」 → "確認"（=診察。元資料 5章）
        - 「天気」 → "予約"の新規扱い（元資料 5章「天気→新規」、ただし用件としては「予約」）
        - その他問い合わせ → "問い合わせ"
      Pattern A（OpenAI 直後分岐）。

  - order: 2
    name: "新規・再診確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientType"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "再診"
    notes: "「新規予約」「初めて」「初診」 → 新規。「2回目」「再診」「以前」 → 再診。default は再診扱い（other → 再診）。"

  - order: 3
    name: "氏名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "氏名聴取サブフロー（drjoy^牛久愛和総合病院$氏名聴取）に委譲。フルネーム聴取・カタカナ保存・苗字のみの場合の追加聴取はサブフロー内で処理。復唱なし。"

  - order: 4
    name: "生年月日聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: false
    save_to: "patientDateOfBirth"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "生年月日聴取サブフロー（drjoy^牛久愛和総合病院$生年月日聴取）に委譲。和暦→西暦正規化のみ。復唱なし。"

  - order: 5
    name: "電話番号聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "電話番号聴取サブフロー（drjoy^牛久愛和総合病院$電話番号聴取）に委譲。incoming 採用パターン（「今おかけいただいている電話番号でよろしいですか？」）。Yes/No 救済として『肺→はい』『いいです→はい』を OpenAI プロンプトに含める。phonetype 保存（携帯/その他）。"

  - order: 6
    name: "診察券番号聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: true
    save_to: "medicalCardNumber"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: |
      診察券番号聴取サブフロー（drjoy^牛久愛和総合病院$診察券番号聴取）に委譲。
      8桁以内、数字のみ（記号NG）。
      「C／Sea」 → 4 へ置換、「号」 → 5 へ置換（元資料 1-12）。
      数字キーワードの認識: いち→1, ひー→1, に→2, つー→2, ふー→2, さん→3, み→3, よん→4, しー→4, し→4, よー→4, ご→5, いつ→5, Go→5, ろく→6, ろー→6, む→6, むー→6, なな→7, しち→7, はち→8, や→8, きゅう→9, Q→9, きゅー→9, ゼロ→0, れい→0, まる→0, おー→0。
      数字が含まれない場合は再ヒアリング（標準サブフローのリトライ）。
      「わからない」分岐あり（サブフロー内で処理）。

  - order: 7
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "総合診療科"
      - "血液内科"
      - "消化器内科"
      - "循環器科"
      - "腎臓内科"
      - "泌尿器科"
      - "総合外科"
      - "消化器外科"
      - "整形外科"
      - "脳神経外科"
      - "形成外科"
      - "小児科"
      - "眼科"
      - "脳神経内科"
      - "耳鼻咽喉科"
      - "歯科口腔外科"
      - "皮膚科"
      - "糖尿病代謝内科"
      - "血管内治療科"
      - "救急医療科"
      - "健診センター"
      - "産婦人科"
      - "呼吸器内科"
      - "呼吸器外科"
      - "リウマチ膠原病内科"
      - "甲状腺内分泌外科"
      - "初診外来"
      - "女性泌尿器科"
      - "乳腺・甲状腺科"
      - "乳腺科"
      - "小児循環器科"
      - "リハビリ"
      - "子宮がん検診"
      - "乳がん検診"
    notes: |
      診療科判定。リストに無い場合「当院に○○はございませんが、○○でしょうか？」と近しい部署をレコメンド（OpenAI プロンプト）。
      no_result_default="登録なし" を設定（モジュール選定ガイド 2.5）。
      特殊救済（OpenAI プロンプトに必須記載）：
        ・「できないか」 → 血液内科
        ・「鹿／会社／車」 → 歯科口腔外科
        ・「産科」 → 眼科
        ・「しきゅうがんけんしん／いきゅうがんけんしん／ちきゅうがんけんしん／きゅうがんけんしん／しきゅうがん」 → 子宮がん検診
        ・「小児神経／小児心理／小児アレルギー／小児腎臓／小児腎／小児 じんぞう」 → 小児科（小児循環器科に置換禁止）
        ・「小児循環器／しょうにじゅんかんき」 → 小児循環器科
        ・「呼吸器」単体 → 「呼吸器内科と呼吸器外科のどちらでしょうか？」と確認
        ・「婦人科」 → 産婦人科
        ・「帯状疱疹／シングリックス／たいじょうほうしん」 → 皮膚科

  - order: 8
    name: "診療科2"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment2"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "同日他科の診療科。フリーテキストで保存。診療科リストに無い回答も許容。"

  - order: 9
    name: "紹介状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "introduction"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "新規予約時のみ聴取。Yes/No 判定。default は「なし」扱い（other → 選定療養費案内）。"

  - order: 10
    name: "担当先生"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "doctor"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "担当先生のフルネーム。「わからない」回答も許容しそのまま保存。"

  - order: 11
    name: "現在予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: |
      現在ご予約いただいている日付（変更／キャンセル時のみ）。
      YYYY-MM-DD HH:MM 形式に正規化。元資料 5章「10月以降で1月から9月の日付を言われたときは翌年」「曜日は発話しない／矛盾しても再質問しない」を OpenAI プロンプトに含める。

  - order: 12
    name: "予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: |
      予約希望日（予約／変更時）。
      元資料 5章「予約希望日だけはフリーワードで言われたまま文字起こしする。日付形式で格納しない。」を厳守。
      OpenAI は文字起こしの整形のみ（日時正規化禁止）。
      「曜日は発話しない／矛盾しても再質問しない」（元資料 1-7）。

  - order: 13
    name: "変更理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "予約変更の理由。フリーテキスト。"

  - order: 14
    name: "キャンセル理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "予約キャンセルの理由。フリーテキスト。reason context を変更理由と共有。"

  - order: 15
    name: "検診_症状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "symptoms"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "症状なし"
      - "症状あり"
    notes: |
      設問:「症状がある場合は専門外来の予約になりますが、症状は何もないですか？」
      「はい／何もない／無いです／大丈夫」 → "症状なし"
      「いいえ／あります／○○が痛い／○○が出る」 → "症状あり"
      Pattern A 直接分岐。

  - order: 16
    name: "受診券確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "examTicket"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "受診券／利用券の有無。default は「なし」扱い（other → END_自費検診不可）。"

  - order: 17
    name: "市町村"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "city"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "受診券利用時の発行市町村。フリーテキスト。"

  - order: 18
    name: "同時予約確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "jointReservation"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: |
      設問:「ご一緒に他の検診のご予約はございますか？」
      子宮がん検診選択時は「乳がん検診」を、乳がん検診選択時は「子宮がん検診」を例示する想定（OpenAI プロンプトで動的説明）。

  - order: 19
    name: "その他問い合わせ"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "question"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "なし"
      - "any"
    notes: |
      自己ループ判定。
      「ない／特にない／大丈夫／ありません」 → "なし"（→ 終了前判定 へ）
      それ以外（質問内容を含む発話） → "any"（→ その他問い合わせ回答 → 自己ループ）
      生発話を question フィールドに連結保存することを OpenAI プロンプトで指示する（「内容を要約せず、ユーザー発話そのまま保存」）。
      元資料 5章: 折り返し時間質問は「順番に対応しておりますので、しばらくお待ちください」と回答。
      折り返し希望時間は「ご要望を承りました」と回答。
      AI 電話で対応不可の質問は「ご質問いただいた内容は AI 電話ではご対応できませんので、代表電話の『029-873-3111』におかけ直しください」と回答。

