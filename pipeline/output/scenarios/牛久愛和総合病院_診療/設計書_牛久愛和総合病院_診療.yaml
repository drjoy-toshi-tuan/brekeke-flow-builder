    condition: "通話完了 かつ 携帯（^0(90|80|70|60)）"
    tts_announcement: "後ほど折り返しお電話、もしくはショートメールでご連絡いたします。なお、予約日につきましてはご希望に添えない場合がございます。３営業日以内にご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_通話終了_携帯"

# --- smsFlag 分岐設計 ---
sms_flag_routing:
  enabled: true
  routing_keys: ["phonetype"]
  patterns:
    - condition: "phonetype=携帯（^0(90|80|70|60)）"
      sms_flag: "1"
      notes: "END_通話終了_携帯 経由のみ。元資料 1-13: smsFlag=1 を設定するのは『通話完了 かつ 携帯 かつ 最後の案内が「ショートメールでご連絡」』の3条件揃った場合のみ。"
    - condition: "phonetype=固定／その他、または代表案内系・聴取失敗・非通知"
      sms_flag: "0"
      notes: "上記以外は全て smsFlag=0。元資料 1-13:「endpoint が冒頭切断・途中切断・時間外・電話転送・電話案内のいずれかの場合は必ず 0」を厳守。"

# --- セクション8b: RAG/FAQ 検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  # 元資料に RAG/FAQ の記載なし。汎用 FAQ 案内（元資料 1-4）は「その他問い合わせ」hearing の OpenAI プロンプト内で
  # 「ご質問いただいた内容は AI 電話ではご対応できませんので、代表電話の『029-873-3111』におかけ直しください」と
  # 案内する形に集約。サブフローとしては不要。

