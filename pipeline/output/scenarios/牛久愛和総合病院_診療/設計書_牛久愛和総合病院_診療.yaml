# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【最優先ガード（移管ノート尊重）】用件確認 hearing で『ワクチン／予防接種』『二人』を最優先で検出し、それぞれ END_代表案内_ワクチン／END_代表案内_複数人 に直行。診療科判定や予約フローへ進めてはいけない。"
  - "【帯状疱疹はワクチンガード対象外】『帯状疱疹／シングリックス／たいじょうほうしん』は皮膚科に確定して通常フローへ進める。インフル／コロナ系のワクチンガードと混同しないこと（OpenAI プロンプトに優先順位明記）。"
  - "【複数人予約禁止】1通話につき患者1名のみ。『二人』検出は冒頭の用件確認だけでなく、後続の聴取段階でも検出されたら終話する想定（OpenAI プロンプトに通底ルールとして埋め込む）。"
  - "【代表案内終話の電話番号3回繰り返し】リハビリ／小児科／健診センター の代表案内 TTS は『電話番号は〜です。繰り返します。電話番号は〜です。繰り返します。電話番号は〜です。それでは失礼いたします。』と必ず3回繰り返す。テンプレ短縮禁止。健診センターのみ 029-873-4334 で他は 029-873-3111。"
  - "【総合診療科・整形外科の特例】本フロー（5-3-1 新規／5-3-2 再診／5-1 確認／5-2 変更・キャンセル）では、総合診療科は新規予約時のみ END_代表案内_耳鼻科 と同等のアナウンス（予約制でない案内）で終話する設計が元資料に記載。ただし変更／キャンセル／確認では先に進む。今回の設計では『診療科 → other → 診療科2 → フロー分岐判定』ルートに集約し、予約用件かつ総合診療科の場合の特殊終話は OpenAI プロンプト＋ContextMatchRouter で別途扱う必要がある可能性あり（confirmation_items 参照）。"
  - "【氏名・生年月日の復唱禁止】元資料 1-2 厳守。『電話番号と診察券番号のみ復唱を許可』。SSML（<speak type='telephone'>）はリテラル無効のため設計書に書かない（移管ノート 41 行目）。復唱フォーマットは Brekeke の `<% %>` でプロパティ実装。"
  - "【TTS 禁止語彙・置換ルール】元資料 1-0 厳守。『ありがとうございます』『お気軽に』禁止。『おっしゃってください』→『お話ください』統一。全 TTS 文言の語彙チェックを prompter で実施。"
  - "【予約日と予約希望日は別項目】元資料 5章。reservationDate（DATE 形式）と DesiredreservationDate（フリーワード）の二重管理を厳守。予約希望日は日付形式に整形しない。"
  - "【年度判定ルール】元資料 5章: 『10月以降で1月から9月の日付を言われたときは翌年』。現在予約日の OpenAI プロンプトに必須記載。曜日は発話しない／矛盾しても再質問しない（元資料 1-7）。"
  - "【数字 4／5 の誤認識救済】診察券番号で『C／Sea』→ 4、『号』→ 5 へ置換。発話に数字が含まれない場合は再ヒアリング（元資料 1-12）。"
  - "【先取りスロット充填＆SKIP】元資料【共通ルール】: 入電者が冒頭や途中で複数情報を一度に発話した場合、各スロットに格納し、未取得項目のみ後続で聴取する。OpenAI プロンプトに必須記載。"
  - "【予約日／予約希望日の判定優先】曖昧表現（『〜くらい』『〜希望』『〜あたり』）は DesiredreservationDate に格納。確定意図（『予約お願いします』『取りたい』等）は予約日と希望日の文脈次第。判別不能なら『ご希望日でしょうか？それとも確定のご予約日でしょうか？』と一度だけ確認する OpenAI プロンプトを埋め込む。"
  - "【FAQ ／RAG なし】元資料に FAQ／RAG 記載なし。汎用 FAQ 案内『ご質問いただいた内容は AI 電話ではご対応できませんので、代表電話の 029-873-3111 におかけ直しください』は『その他問い合わせ』hearing の OpenAI プロンプト内で吸収（element 1-4）。"
  - "【営業時間チェック削除】移管ノート 37 行目: 改訂履歴 2026/04/20『【1-11. 営業時間外の予約不可】ルール削除』。use_acceptance_times: false で配置しない。"
  - "【status マッピング第3世代対応】元資料の status enum [0/1/2/7] のうち、第3世代では『1（通話完了）／2（代表案内）／3（聴取失敗）／6（時間外）』のみ使用。元資料 status='0' / '7' は第3世代規約により不採用（CLAUDE.md 準拠）。"
  - "【smsFlag のスコープ】smsFlag=1 を設定するのは『END_通話終了_携帯』経由のみ（元資料 1-13: endpoint=通話完了 かつ 携帯 かつ「ショートメールでご連絡」アナウンスの三条件）。それ以外（代表案内系・聴取失敗・非通知）は全て smsFlag=0。"
  - "【通話終了アナウンスの末尾固定文言】『なお、予約日につきましてはご希望に添えない場合がございます。３営業日以内にご連絡いたします。お電話ありがとうございました。それでは失礼いたします。』は END_通話終了_固定／END_通話終了_携帯 双方の末尾に必ず付ける（元資料 1-10）。"
  - "【ContextMatchRouter の reference_module】設計書では classification を直接読まず、必ず『OpenAI_用件確認』のようにモジュール名を指定する。Brekeke は module1Name にモジュール名を渡し、内部でそのモジュールが context に保存した値を参照する仕様（director.md ルール）。"
  - "【その他問い合わせ自己ループ】OpenAI プロンプトで『ない／大丈夫／特にない』 → 『なし』、それ以外 → 『any』とし、生発話を question フィールドに連結保存する。AI 補完応答（『ご要望を承りました。順番に対応しておりますので、しばらくお待ちください』）後にループバック。"

