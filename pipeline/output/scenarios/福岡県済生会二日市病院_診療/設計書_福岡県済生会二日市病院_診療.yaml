# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【サブフロー完全コピー】氏名・生年月日・診察券番号・電話番号の 4 サブフローは docs/reference/bivr/samples/個人情報サブフロー.bivr を完全コピーし、プレフィックスのみ「福岡県済生会二日市病院」に置換する（CLAUDE.md Rule 9 準拠）。ただし電話番号聴取サブフローには「固定のみ（携帯未所持）」分岐の追加拡張が必要（confirmation_items N-1）"
  - "【復唱禁止ルール】customer_doc 2.1 / 2.2 準拠で、電話番号のみ復唱・その他は復唱禁止。すべての hearing で echo_back=false。電話番号の復唱はサブフロー内で専用フォーマット（gen_properties の電話番号読み上げ形式）で処理"
  - "【用件 2 択】customer_doc の受付対象は「変更」「キャンセル」のみ。「新規」「再診」「診察」等の発話は AI 電話の対象外としてリトライで再誘導（用件確認 retry_failure=end_failure / END_聴取失敗 で終話）"
  - "【受診科 複数判定】「○○と○○」「○○、○○」等の複数回答検出は OpenAI プロンプトで特殊値「複数」を返す設計。「複数」は clinicalDepartment に格納せず、フロー内部の分岐用途のみに使用（分岐後は END_複数受診科案内 で終話するため格納不要）"
  - "【検査 NG ワード 30 語】customer_doc 5-1章のNGワード（髄液／自費／CT／MRI／RI／エコー／ホルター／脳波／神経生理／注射／点滴／内視鏡／気管支鏡／化学療法／栄養指導／カメラ／注腸／透視／胃ろう／尿素呼気／輸血／PCR／イベントレコーダー／PSG／パルソックス／CPX／ペースメーカー／エピペン／フットケア／入院）はいずれも OpenAI プロンプトで「あり」に正規化"
  - "【予約日の年度補完】「4月1日」のように月日のみ発話された場合、着信年を補完する。10月以降入電で1〜9月の日付発話は翌年扱い（customer_doc 5章）。過去日付は未来日のみ受付（customer_doc 1-4）"
  - "【予約希望日のフリーワード格納】customer_doc 5章「予約希望日はフリーワードで言われたまま文字起こしする」準拠。日付形式に正規化しない。OpenAI 不要（openai_processing: none）"
  - "【禁句】「ありがとうございます」「お気軽に」は使用禁止。「おっしゃってください」→「お話ください」に置換。prompter の全 hearing プロンプトに明示（customer_doc 1-1）"
  - "【数字認識】「よん」「し」「Si」「For」「for」→4、「ご」「ごお」→5。「号」「for」等の誤変換を禁止。prompter の数値正規化テンプレに明示（customer_doc 1-1）"
  - "【和暦対応】生年月日・予約日で大正／昭和／平成／令和の発話を受け付けて西暦変換。prompter の日付正規化テンプレに和暦マッピングを含める（customer_doc 5章）"
  - "【リスト外診療科のレコメンド】customer_doc 1-3 / 4章準拠で、リスト外の近似科発話時は「当院に○○はございませんが、○○でしょうか？」と問い返し、回答があるまで次に進まない。prompter の受診科分類プロンプトに明示"
  - "【聴取内容の再質問・復唱禁止】customer_doc 【重要】節準拠。一度聴取した内容は不明確でも再質問・復唱しない。複数情報が同時発話された場合は記録のみ行い、不足情報のみ次ステップで聴取。prompter の全 hearing プロンプトに明示"
  - "【SSML 完全削除】customer_doc の `<speak type=\"telephone\">` `<speak type=\"telephone\" breakc=\"300ms\">{}</speak>` `<dtmf/>` `<break>` 等は Gen3 では全削除。TTS は `{tts_g:...}`（全小文字）形式で、電話番号 092-923-1551 は gen_properties の電話番号読み上げトークンで出力（1桁ずつ / 半角スペース挿入等で聞き取りやすく調整）"
  - "【status 体系】Gen2 の 0（冒頭切断／途中切断／時間外／電話転送）は Gen3 の 0 禁止ルールに従い 2（代表案内相当）または 6（時間外）に置換する。正常完了=1、代表案内=2、聴取失敗=3、時間外=6。customer_doc 状態フラグ定義（1/2/0）のうち 0 は Gen3 では使わない"
  - "【smsFlag】通話完了（status=1）時のみ sms_flag=1。他（status=2/3/6）は sms_flag=-1。customer_doc では smsFlag=0/1/2 の 3 値だが Gen3 運用では -1/1 の 2 値で実装"
  - "【最後の問い合わせループ】「ない」= 終話分岐、「折り返し時間」= 定型アナウンス→ループ、「質問」= RAG検索→ループ。RAG 未ヒット時は customer_doc 1-2 の定型フォールバック「ご質問いただいた内容はAI電話ではご対応できませんので、職員がご連絡した際にご確認ください。」を応答"
  - "【Dr.JOY 側設定事項】SMS 送信文面 / office_id / 営業時間スケジュール（本フローでは使用しないが代表電話案内の曜日・時刻は TTS 内に固定記載）/ 認証設定 は Dr.JOY 管理画面で別途設定。設計書・フローJSON には含めない"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（Dr.JOY 管理画面で確認）"
    resolved: false
  - item: "本番 IVR 着信 050 番号（Brekeke 設定時に確認）"
    resolved: false
  - item: "[電話番号聴取サブフロー] 個人情報サブフロー.bivr の標準構造に「固定のみ（携帯未所持）→ phonetype=固定のみ をセットして return」分岐を追加拡張する必要あり。既存サンプルに該当分岐が無ければ、サブフロー内で『携帯電話はお持ちですか？』→「いいえ」で phonetype=固定のみ を saveContext2DB し return する経路を手動で追加する"
    resolved: false
  - item: "[予約日聴取] Gen2 では reservationDate（DATE） と reservationDate2（TEXT 原文）の 2 フィールドを同時に保存する実装だが、Gen3 の generate_by_OpenAI は通常 1 つの contextName にしか保存できない。scaffold ではまず reservationDate のみ保存とし、reservationDate2 を使いたい場合は追加の saveContext2DB モジュールで原文を保存する構成を後段で検討（本設計書では reservationDate への datetime 正規化のみ実装、reservationDate2 は context_fields に定義のみ残す）"
    resolved: false
  - item: "[用件確認] retry_failure=end_failure で聴取失敗時に END_聴取失敗 終話にする設計で良いか。customer_doc にはリトライ失敗時の挙動が明記されていないため、skip にして受診科聴取に進める選択肢もあり得る"
    resolved: false
  - item: "[smsFlag 値] customer_doc は smsFlag=0/1/2 の 3 値（0=送信なし、1=送信あり、2=代表案内）だが、Gen3 運用では -1/1 の 2 値に集約している。Dr.JOY 側の受信ロジックが Gen2 enum に依存していないか確認"
    resolved: false
  - item: "[RAG 検索範囲] customer_doc には FAQ 対象の明示リストがない。Dr.JOY 側の FAQ マスターに登録された項目が RAG 応答対象となるため、登録範囲（アクセス・面会時間・費用・持ち物・保険・薬等）を施設側と確認"
    resolved: false
  - item: "[受診科 OpenAI プロンプト] 「複数」は clinicalDepartment に格納しない設計としているが、scaffold の saveContext2DB 実装上、OpenAI 出力値をそのまま格納する動作がデフォルト。格納を回避する場合は分岐直後の saveContext2DB をスキップする特別対応が必要か、または格納を許容して終話後の Dr.JOY 側で処理するか確認"
    resolved: false
  - item: "[冒頭アナウンス] customer_doc の冒頭アナウンスに「複数の診療科を同日に予約されている方、3診療日以内のご予約の方は代表電話へおかけなおしください」と受付制限の口頭案内が含まれる。実際に受付制限として検知・分岐するロジックは設けず、アナウンスのみで患者の自己判断に委ねる設計で良いか確認"
    resolved: false
