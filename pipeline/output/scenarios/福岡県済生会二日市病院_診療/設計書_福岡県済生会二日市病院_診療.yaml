version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "福岡県済生会二日市病院"
  group_name: "福岡県済生会二日市病院"
  flow_name: "福岡県済生会二日市病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "092-923-1551"  # 代表電話（IVR着信050番号は別途Brekeke設定時に確認）
  business_hours: "なし（AI電話は24時間受付。代表電話の営業時間 月〜金 14:00〜16:00 は終話TTSでのみ案内）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "福岡県済生会二日市病院$診療"
      role: "main"
      description: "予約変更・予約キャンセルを受け付けるメインフロー。新規・再診予約は受け付けない"
  subflows:
    - name: "福岡県済生会二日市病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "customer_doc は「わからない」発話時は空文字を受け入れる仕様。サブフロー内で復唱なし・桁数バリデーションのみ。6桁以内（Gen2 description 準拠）"
    - name: "福岡県済生会二日市病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "customer_doc 2.1「復唱禁止」準拠。苗字のみ検出時は下の名前を再聴取するパターンをサブフロー内で処理（個人情報サブフロー.bivr の標準構造を使用）"
    - name: "福岡県済生会二日市病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "customer_doc 2.1「復唱禁止」準拠。DOB Re-confirmation による読み上げ復唱は行わない。和暦対応（大正/昭和/平成/令和）は OpenAI プロンプトで処理"
    - name: "福岡県済生会二日市病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        customer_doc 2.2 例外「電話番号のみ復唱あり」準拠。
        incoming-classifier で 携帯/固定/その他 を判定:
          - 携帯（060/070/080/090開始）: 着信番号を additionalPhoneNumber に格納 →「今おかけいただいている○○でよろしいですか？」復唱 → はい→そのまま / いいえ→手入力ルート
          - 固定/その他: 「携帯電話はお持ちですか？」→ はい→手入力ルート / いいえ→phonetype="固定のみ" をセットして return（メインフロー側で END_代表案内_固定NG へ分岐）
          - 手入力ルート: DTMF+音声で聴取 → Phone Normalization → 復唱 → はい→phonetype="その他" / いいえ→再入力
        ※ 標準の個人情報サブフロー.bivr に「固定のみ（携帯未所持）で代表案内終話」の分岐が無い場合はサブフロー側に追加拡張が必要（confirmation_items N-1 参照）
    - name: "福岡県済生会二日市病院$RAG検索"
      target: "最後の問い合わせ内のFAQ検索"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        customer_doc 1.6 / 1-2 準拠。
        最後の問い合わせで質問（折り返し時間以外）が発話された場合にFAQ検索を実行し、
        回答後はメインフローの「最後の問い合わせ」に戻る（ループ）。
        プロンプト外の質問は「ご質問いただいた内容はAI電話ではご対応できませんので、職員がご連絡した際にご確認ください。」のテンプレ回答。

# --- セクション3: フローの目的 ---
purpose: |
  福岡県済生会二日市病院の予約変更・予約キャンセル専用 AI 電話窓口。
  患者からの電話を受けて以下の処理を行う:
    - 冒頭アナウンスで受付制限（複数診療科同日予約・3診療日以内の予約）を口頭で案内
    - 用件確認（変更 / キャンセル の2択。新規・再診は受け付けない）
    - 受診科聴取（リスト18科。複数科回答 / 同日検査NGワード発話時は代表電話へ誘導）
    - 予約日聴取（DTMF+音声）、変更時のみ「予約希望日」を追加聴取、理由を聴取
    - 診察券番号 / 氏名 / 生年月日 / 連絡先電話番号 をサブフローで聴取
    - 着信番号種別で電話番号処理を分岐（携帯→着信番号確認、固定→携帯所持確認、固定のみ→代表電話案内）
    - 最後の問い合わせで FAQ（RAG）応対。折り返し時間は定型回答、それ以外は RAG 応答を繰り返す
    - 非通知着信・複数診療科・検査NGワード・固定のみ は各専用終話で代表電話（092-923-1551）へ誘導

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "福岡県済生会二日市病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知(TTS, scaffold自動接続) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常   → 冒頭_アナウンス
                          → 用件確認(enum: 変更/キャンセル)
                              └─ default → 受診科聴取(enum, no_result_default="登録なし")
                                    ├─ 複数    → END_複数受診科案内 (status=2, sms=-1) → 切断
                                    └─ default → 検査有無聴取(enum: あり/なし)
                                          ├─ あり    → END_検査あり案内 (status=2, sms=-1) → 切断
                                          └─ なし    → 予約日聴取(datetime, DTMF)
                                                → 分岐_変更希望日(CMR: classification)
                                                     ├─ 変更     → 予約希望日聴取(text) → 理由聴取
                                                     └─ default  → 理由聴取
                                                → 理由聴取(text)
                                                → jump_診察券番号聴取(サブフロー)
                                                → jump_氏名聴取(サブフロー)
                                                → jump_生年月日聴取(サブフロー)
                                                → jump_電話番号聴取(サブフロー)
                                                → 分岐_固定のみ判定(CMR: phonetype)
                                                     ├─ 固定のみ → END_代表案内_固定NG (status=2) → 切断
                                                     └─ default → 最後の問い合わせ(enum)
                                                            ├─ なし       → 終話分岐_用件(CMR: classification)
                                                            │                  ├─ 変更     → END_終話_変更 (status=1, sms=1)
                                                            │                  └─ default → END_終話_キャンセル (status=1, sms=1)
                                                            ├─ 折り返し時間 → 折り返し時間案内(announcement) → 最後の問い合わせ(ループ)
                                                            └─ 質問       → jump_RAG検索(サブフロー) → 最後の問い合わせ(ループ)
    notes: |
      - 用件確認の出力値は「変更」「キャンセル」の2択のみ（新規・再診は受け付けない）。「契約変更」→「変更」補正、「薬/お薬」→「予約」扱いだが用件としては変更/キャンセルのいずれかに振り分け
      - 受診科リスト18科（customer_doc 4章）。複数回答（「○○と○○」等）は OpenAI プロンプトで特殊値「複数」を返す
      - 検査NGワード31語（customer_doc 5-1章）は OpenAI プロンプトで「あり」に正規化
      - 予約日は DTMF+音声。未来日のみ受付（過去日補正は year 補完ルールで吸収）
      - 「予約希望日」は自由テキストのまま格納（日付正規化しない — customer_doc 5章準拠）
      - 電話番号サブフローは phonetype=携帯/その他/固定のみ を返却。固定のみはメインフロー側で END_代表案内_固定NG へ分岐
      - 最後の問い合わせは RAG サブフロー（質問ルート）でループ。折り返し時間は定型アナウンスでループ。「ない」類似で終話分岐へ
      - 終話 TTS は customer_doc 1-7章 / 5-1章 から一言一句転記。代表電話 092-923-1551 は gen_properties の電話番号読み上げ形式で出力（SSML 不使用）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # --- 用件確認（enum 2分岐 : Pattern A）---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 受診科聴取

  # --- 受診科聴取（複数判定＋登録なしフォールバック）---
  - step: 受診科聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "複数"
        next: END_複数受診科案内
      - match: "default"
        next: 検査有無聴取

  # --- 検査有無聴取 ---
  - step: 検査有無聴取
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: END_検査あり案内
      - match: "default"
        next: 予約日聴取

  # --- 予約日（datetime, DTMF+音声） ---
  - step: 予約日聴取
    type: hearing
    output_format: datetime
    next: 分岐_変更希望日

  # --- 変更のみ予約希望日聴取（classification で分岐）---
  - step: 分岐_変更希望日
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: 予約希望日聴取
      - match: "default"
        next: 理由聴取

  - step: 予約希望日聴取
    type: hearing
    output_format: text
    next: 理由聴取

  - step: 理由聴取
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # --- 個人情報サブフロー群（診察券 → 氏名 → 生年月日 → 電話番号）---
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "福岡県済生会二日市病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "福岡県済生会二日市病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "福岡県済生会二日市病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "福岡県済生会二日市病院$電話番号聴取"
    next: 分岐_固定のみ判定

  # --- 電話番号サブフロー結果で分岐（固定のみ→代表案内）---
  - step: 分岐_固定のみ判定
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "固定のみ"
        next: END_代表案内_固定NG
      - match: "default"
        next: 最後の問い合わせ

  # --- 最後の問い合わせループ ---
  - step: 最後の問い合わせ
    type: hearing
    output_format: enum
    conditions:
      - match: "なし"
        next: 終話分岐_用件
      - match: "折り返し時間"
        next: 折り返し時間案内
      - match: "質問"
        next: jump_RAG検索

  - step: 折り返し時間案内
    type: announcement
    next: 最後の問い合わせ

  - step: jump_RAG検索
    type: subflow
    flowname: "福岡県済生会二日市病院$RAG検索"
    next: 最後の問い合わせ

  # --- 終話分岐（用件で変更/キャンセル終話に分岐）---
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: END_終話_変更
      - match: "default"
        next: END_終話_キャンセル

  # --- 終話ブロック ---
  - step: END_終話_変更
    type: termination
    termination_ref: "END_終話_変更"
  - step: END_終話_キャンセル
    type: termination
    termination_ref: "END_終話_キャンセル"
  - step: END_複数受診科案内
    type: termination
    termination_ref: "END_複数受診科案内"
  - step: END_検査あり案内
    type: termination
    termination_ref: "END_検査あり案内"
  - step: END_代表案内_固定NG
    type: termination
    termination_ref: "END_代表案内_固定NG"

