    deletable: true
    notes: |
      Gen3 標準値。customer_doc は Gen2 の "0"/"1"/"2" enum だが、Gen3 では 0 禁止ルールに従い
      Gen2 の 0（冒頭切断・途中切断・時間外・電話転送相当）は 2（代表案内） or 6（時間外）に置換する。

  - context_name: "smsFlag"
    context_name_jp: "SMS送信フラグ"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 smsFlag を保持。1=送信あり / -1=送信なし。saveCompletionFlag2db で設定"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "変更"
      - "キャンセル"
    notes: |
      customer_doc 5章準拠。
      - 「変更／予約変更／契約変更／取り直したい／変えたい／別の日」→ 変更
      - 「キャンセル／取り消し／やめる／取消／キャンセルしたい」→ キャンセル
      - 「薬／お薬」→ 予約（この AI 電話は予約変更・キャンセル専用のため、文脈上は「変更」扱いで OK）
      - 「印刷／定期／新薬／再診／最新／禁忌」→ 診察（→ AI 電話では受け付けない旨のリトライ誘導）
      - 復唱禁止（customer_doc 2.1）。echo_back: false

  - order: 2
    name: "受診科聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "呼吸器内科"
      - "脳神経内科"
      - "循環器内科"
      - "消化器内科"
      - "糖尿病内科"
      - "総合内科"
      - "呼吸器外科"
      - "血管外科"
      - "泌尿器科"
      - "脳神経外科"
      - "整形外科"
      - "皮膚科"
      - "腎臓内科"
      - "膠原病内科"
      - "消化器外科"
      - "乳腺外科"
      - "形成外科"
      - "血液内科"
      - "複数"
    notes: |
      no_result_default="登録なし"（モジュール選定ガイド 2.5）。
      customer_doc 4章キーワード対応:
        - 脳神経内科: 物忘れ／痙縮／ボトックス／認知症／神経内科
        - 循環器内科: 心不全／不整脈／ペースメーカー／無呼吸／CPAP／シーパップ／アブレーション／睡眠／心臓／睡眠医療センター
        - 整形外科: 脊椎外来
        - 乳腺外科: 乳腺／マンモグラフィー／乳がん
      リスト外の近似科は OpenAI プロンプトで「当院に○○はございませんが、○○でしょうか？」レコメンドし、
      回答で確定した正式名称を格納。2科以上発話（「○○と○○」等）は「複数」を返して END_複数受診科案内 へ。
      復唱禁止（customer_doc 2.1）。echo_back: false

  - order: 3
    name: "検査有無聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: |
      customer_doc 5-1章準拠。
      - 肯定（はい／ある／されています等）→ あり
      - NGワード発話（髄液／自費／CT／MRI／RI／エコー／ホルター／脳波／神経生理／注射／点滴／内視鏡／気管支鏡／化学療法／栄養指導／カメラ／注腸／透視／胃ろう／尿素呼気／輸血／PCR／イベントレコーダー／PSG／パルソックス／CPX／ペースメーカー／エピペン／フットケア／入院）→ あり
      - 否定（いいえ／ない／ありません等）→ なし
      save_to は空（内部分岐のみ、Dr.JOY へは格納しない）

  - order: 4
    name: "予約日聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: |
      DTMF 対応表（dtmf_max_length=8 / YYYYMMDD 形式）:
        DTMF 8桁 = YYYYMMDD（例: 20260501 → 2026年5月1日）
        DTMF 4桁 = MMDD（例: 0501 → 当年 or 翌年の5月1日。年は今日基準で未来補完）
        DTMF 2桁 = DD（例: 15 → 当月 or 翌月の15日。月は今日基準で未来補完）
        # 終了キーで確定。未入力タイムアウトは音声フォールバック
      OpenAI 正規化:
        - 月日のみ発話 → 着信年を補完（10月以降入電で1〜9月の日付は翌年扱い）
        - 和暦対応（令和7年4月1日 等）
        - 過去日付は未来の同日付に繰り上げ
        - reservationDate に YYYY-MM-DD 00:00、reservationDate2 に原文テキストを併せて格納する設計
                  （scaffold では reservationDate への保存のみとし、reservationDate2 は
                   generate_by_OpenAI の追加 contextName で対応 — confirmation_items N-2 参照）
      復唱禁止（customer_doc 2.1）。echo_back: false

  - order: 5
    name: "予約希望日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredreservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: |
      customer_doc 5章準拠「予約希望日はフリーワードで言われたまま文字起こしする。日付形式で格納しない」
      変更ルートのみ通過。キャンセルルートでは聴取しない。
      「連休明け」「夏休み明け」「来月上旬」等の相対表現もそのまま格納

  - order: 6
    name: "理由聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: |
      「薬が足りなくなった」等の発話を簡潔な名詞句に要約。
      AI は復唱・同情発話（「お大事に」等）禁止。prompter に明示

  - order: 7
    name: "最後の問い合わせ"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "question"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "なし"
      - "折り返し時間"
      - "質問"
    notes: |
      customer_doc 1-6章準拠。
      - 「ない／ありません／大丈夫／特になし／いいえ」→ なし
      - 「折り返しの時間／何時に電話／いつ連絡」等 → 折り返し時間
      - それ以外の質問発話 → 質問
      save_to=question には発話原文を格納（分類値ではなく原文を残す）
      復唱禁止（customer_doc 2.1）。echo_back: false

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件は予約変更、予約キャンセルのどちらでしょうか？"
    input_method: "voice_only"
    openai_rules:
      output_values: ["変更", "キャンセル"]
      mapping:
        - input: "変更／予約変更／契約変更／取り直したい／取り直す／変えたい／変える／別の日に／日にち変更"
          output: "変更"
        - input: "キャンセル／取り消し／取消／取り消す／やめる／やめたい／予約キャンセル"
          output: "キャンセル"
      no_result_condition: "上記いずれにも該当しない場合（新規・再診・診察・薬の問い合わせ等はこの AI 電話の対象外のため、再聴取で変更 or キャンセルに誘導）"
    save_to: "classification"
    next_step: "受診科聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: "申し訳ございません。ご用件を承ることができませんでした。恐れ入りますが、おかけ直しください。"

  - step_name: "受診科聴取"
    tts_announcement: "予約票に記載されている受診科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "呼吸器内科"
        - "脳神経内科"
        - "循環器内科"
        - "消化器内科"
        - "糖尿病内科"
        - "総合内科"
        - "呼吸器外科"
        - "血管外科"
        - "泌尿器科"
        - "脳神経外科"
        - "整形外科"
        - "皮膚科"
        - "腎臓内科"
        - "膠原病内科"
        - "消化器外科"
        - "乳腺外科"
        - "形成外科"
        - "血液内科"
        - "複数"
      mapping:
        - input: "単一の受診科発話（customer_doc 4章のリスト18科・キーワード類義語に一致）"
          output: "該当正式名称"
        - input: "近似科発話（「循環器科」「神経内科」等、リスト外だがキーワード類義語と近い）"
          output: "該当正式名称（レコメンド確認後）"
        - input: "2科以上発話（「○○と○○」「○○、○○」等）"
          output: "複数"
        - input: "リスト外の発話で類義語キーワードにも該当しないもの"
          output: "登録なし"
      no_result_condition: "無音・無関係発話 → 「登録なし」を saveContext2DB で格納してリトライ（モジュール選定ガイド 2.5）"
    save_to: "clinicalDepartment"
    next_step: "（scenario_flow の conditions を参照: 複数→END_複数受診科案内 / default→検査有無聴取）"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "検査有無聴取"
    tts_announcement: "同じ日に、MRIなどの検査関連や、栄養指導・入院説明のご予約はされていますか？"
    input_method: "voice_only"
    openai_rules:
      output_values: ["あり", "なし"]
      mapping:
        - input: "はい／ある／されています／予約しています／しています"
          output: "あり"
        - input: "NGワード発話: 髄液／自費／CT／MRI／RI／エコー／ホルター／脳波／神経生理／注射／点滴／内視鏡／気管支鏡／化学療法／栄養指導／カメラ／注腸／透視／胃ろう／尿素呼気／輸血／PCR／イベントレコーダー／PSG／パルソックス／CPX／ペースメーカー／エピペン／フットケア／入院"
          output: "あり"
        - input: "いいえ／ない／ありません／していません／特になし"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない場合"
    save_to: ""
    next_step: "あり → END_検査あり案内 / なし → 予約日聴取"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "予約日聴取"
    tts_announcement: "予約票に記載されている予約日を「4月1日」のように日付でお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["YYYY-MM-DD HH:MM"]
      mapping:
        - input: "「4月1日」「5月の20日」等の月日発話"
          output: "YYYY-MM-DD 00:00 形式に正規化（着信年を補完）"
        - input: "「2026年4月1日」等の西暦発話"
          output: "YYYY-MM-DD 00:00"
        - input: "「令和7年4月1日」等の和暦発話"
          output: "YYYY-MM-DD 00:00"
        - input: "DTMF 8桁（例: 20260501）"
          output: "2026-05-01 00:00"
        - input: "DTMF 4桁（例: 0501）"
          output: "当年 or 翌年の YYYY-05-01 00:00（未来補完）"
      no_result_condition: "日付特定不可 → 空文字（次ステップへ進む）"
    save_to: "reservationDate"
    next_step: "分岐_変更希望日"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "予約希望日聴取"
    tts_announcement: "ご希望の予約日を、本日より3診療日以降の日付でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["自由テキスト"]
      mapping:
        - input: "任意の日付・時期表現（「5月の下旬」「連休明け」「○月○日」等）"
          output: "発話をそのまま格納（不要語除外のみ）"
      no_result_condition: "無音・無関係発話 → 空文字"
    save_to: "desiredreservationDate"
    next_step: "理由聴取"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "理由聴取"
    tts_announcement: "予約変更・キャンセルの理由をお伺いします。「薬が足りなくなった」など、理由をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["名詞句（例: 本人体調不良, 仕事の都合, 予定重複, 薬切れ）"]
      mapping:
        - input: "任意の理由発話"
          output: "[主体]+[事象] の簡潔名詞句に要約"
      no_result_condition: "無音・無関係発話 → 空文字"
    save_to: "reason"
    next_step: "jump_診察券番号聴取"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "最後の問い合わせ"
    tts_announcement: "そのほかに何かお問い合わせは有りませんか？"
    input_method: "voice_only"
    openai_rules:
      output_values: ["なし", "折り返し時間", "質問"]
      mapping:
        - input: "ない／ありません／大丈夫／特になし／いいえ／結構です"
          output: "なし"
        - input: "折り返しの時間／いつ電話がくるのか／何時に連絡／何日以内に／いつ対応／時間を指定したい"
          output: "折り返し時間"
        - input: "上記以外の発話（アクセス／面会時間／費用／保険／薬／予約方法 等の質問）"
          output: "質問"
      no_result_condition: "無音 → なし（customer_doc の「ない」扱い）"
    save_to: "question"
    next_step: "（scenario_flow の conditions を参照）"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。"

  - step_name: "折り返し時間案内"
    tts_announcement: "順番に対応しておりますので、しばらくお待ちください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "最後の問い合わせ"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 — 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信（incoming-classifier で anonymous 判定）"
    tts_announcement: "恐れ入りますが、非通知設定の方は1，8，6をつけて携帯電話でおかけ直しいただくか、祝日を除く、月曜日から金曜日の14:00から16:00の間に代表電話へおかけなおしください。代表電話の電話番号が分かる場合は、そのままお電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。代表電話は、092-923-1551です。繰り返します。代表電話は、092-923-1551です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（use_acceptance_times=false のため到達しないが template 必須項目として保持）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件確認のみ end_failure、他は skip で実質到達しない）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（customer_doc 1-7章 / 5-1章 より文言を一言一句転記）---
  - name: "END_終話_変更"
    condition: "classification=変更 かつ 最後の問い合わせ=なし で全聴取完了"
    tts_announcement: "それでは、土日祝日を除く3診療日以内に、{電話番号}へ担当者からショートメール、もしくは折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_終話_変更"
  - name: "END_終話_キャンセル"
    condition: "classification=キャンセル かつ 最後の問い合わせ=なし で全聴取完了"
    tts_announcement: "予約のキャンセルを承りました。内容を確認後、追加のご案内が必要な場合には、{電話番号}へご連絡させていただく場合がございますのでご了承ください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_終話_キャンセル"
  - name: "END_複数受診科案内"
    condition: "受診科聴取で2科以上発話 → OpenAI 出力が「複数」"
    tts_announcement: "大変申し訳ございません。AI電話では2つ以上の受診科のお申し込みを承ることができません。恐れ入りますが済生会二日市病院代表電話までおかけなおしください。受付時間は土日祝日を除く月曜日から金曜日の14時から16時です。お電話番号が分かる場合は、お電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。092-923-1551、繰り返します、092-923-1551、お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_複数受診科案内"
  - name: "END_検査あり案内"
    condition: "検査有無聴取で「あり」 or NGワード発話"
    tts_announcement: "大変申し訳ございません。AI電話ではお申し込みを承ることができません。恐れ入りますが済生会二日市病院代表電話までおかけなおしください。受付時間は土日祝日を除く月曜日から金曜日の14時から16時です。お電話番号が分かる場合は、お電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。092-923-1551、繰り返します、092-923-1551、お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_検査あり案内"
  - name: "END_代表案内_固定NG"
    condition: "電話番号聴取サブフローで phonetype=固定のみ（固定電話着信 かつ 携帯未所持）"
    tts_announcement: "大変申し訳ございませんが、済生会二日市病院代表電話へおかけなおしください。受付時間は祝日を除く、月曜日から金曜日の14時から16時です。電話番号は代表電話は、092-923-1551です。ご案内している代表電話は病院ホームページでもご確認いただけます。繰り返します。電話番号は代表電話は、092-923-1551。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内_固定NG"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["classification", "phonetype"]
  patterns:
    - condition: "classification ∈ {変更, キャンセル} かつ 全聴取完了 かつ phonetype ≠ 固定のみ"
      sms_flag: "1"
      notes: "通話完了ルート（SMS 送信あり）— customer_doc 1-7章準拠"
    - condition: "phonetype = 固定のみ / 非通知 / 複数受診科 / 検査あり / 聴取失敗"
      sms_flag: "-1"
      notes: "代表電話案内ルート（SMS なし）"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "1"                      # パターン1: 問い合わせフロー内にRAGサブフローを挿入
  inquiry_insertion_point: "最後の問い合わせ"
  pre_termination: false
  notes: |
    customer_doc 1-6章 / 1-2章準拠。最後の問い合わせで「質問」分類の発話があった場合に
    jump_RAG検索 サブフローで FAQ 検索を実行し、回答後はメインフローの「最後の問い合わせ」に戻って
    再度 問い合わせ有無を確認するループ構造。
    RAG 検索でヒットしない場合は定型フォールバック「ご質問いただいた内容はAI電話ではご対応できませんので、
    職員がご連絡した際にご確認ください。」を応答してループに戻る。

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # --- 冒頭 ---
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内（受付制限も口頭で案内）"
    announcement: "お電話ありがとうございます。福岡県済生会二日市病院の予約変更・キャンセル専用、AI電話です。複数の診療科を同日に予約されている方、3診療日以内のご予約の方は代表電話へおかけなおしください。"

  # --- 聴取ステップ ---
  - module_name: "用件確認"
    purpose: "用件確認の発話"
    announcement: "ご用件は予約変更、予約キャンセルのどちらでしょうか？"
  - module_name: "受診科聴取"
    purpose: "受診科の発話"
    announcement: "予約票に記載されている受診科をお話しください。"
  - module_name: "検査有無聴取"
    purpose: "同日検査・栄養指導・入院説明の有無確認"
    announcement: "同じ日に、MRIなどの検査関連や、栄養指導・入院説明のご予約はされていますか？"
  - module_name: "予約日聴取"
    purpose: "現在の予約日の聴取"
    announcement: "予約票に記載されている予約日を「4月1日」のように日付でお話しください。"
  - module_name: "予約希望日聴取"
    purpose: "変更希望日の聴取（変更ルートのみ）"
    announcement: "ご希望の予約日を、本日より3診療日以降の日付でお話しください。"
  - module_name: "理由聴取"
    purpose: "変更・キャンセル理由の聴取"
    announcement: "予約変更・キャンセルの理由をお伺いします。「薬が足りなくなった」など、理由をお話しください。"
  - module_name: "最後の問い合わせ"
    purpose: "追加問い合わせ有無の確認"
    announcement: "そのほかに何かお問い合わせは有りませんか？"
  - module_name: "折り返し時間案内"
    purpose: "折り返し時間を聞かれた場合の定型応答"
    announcement: "順番に対応しておりますので、しばらくお待ちください。"

  # --- 終話 TTS（customer_doc より一言一句転記。gen_properties デフォルトで上書き防止）---
  - module_name: "END_終話_変更"
    purpose: "変更受付完了の終話アナウンス（SMS送信あり）"
    announcement: "それでは、土日祝日を除く3診療日以内に、{電話番号}へ担当者からショートメール、もしくは折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
  - module_name: "END_終話_キャンセル"
    purpose: "キャンセル受付完了の終話アナウンス"
    announcement: "予約のキャンセルを承りました。内容を確認後、追加のご案内が必要な場合には、{電話番号}へご連絡させていただく場合がございますのでご了承ください。お電話ありがとうございました。それでは失礼いたします。"
  - module_name: "END_非通知"
    purpose: "非通知着信時の代表案内終話（scaffold 自動接続: opening→incoming-classifier→anonymous 経路）"
    announcement: "恐れ入りますが、非通知設定の方は1，8，6をつけて携帯電話でおかけ直しいただくか、祝日を除く、月曜日から金曜日の14:00から16:00の間に代表電話へおかけなおしください。代表電話の電話番号が分かる場合は、そのままお電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。代表電話は、092-923-1551です。繰り返します。代表電話は、092-923-1551です。お電話ありがとうございました。それでは失礼いたします。"
  - module_name: "END_複数受診科案内"
    purpose: "2科以上の受診科発話時の代表案内終話"
    announcement: "大変申し訳ございません。AI電話では2つ以上の受診科のお申し込みを承ることができません。恐れ入りますが済生会二日市病院代表電話までおかけなおしください。受付時間は土日祝日を除く月曜日から金曜日の14時から16時です。お電話番号が分かる場合は、お電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。092-923-1551、繰り返します、092-923-1551、お電話ありがとうございました。それでは失礼いたします。"
  - module_name: "END_検査あり案内"
    purpose: "同日検査 or NGワード発話時の代表案内終話"
    announcement: "大変申し訳ございません。AI電話ではお申し込みを承ることができません。恐れ入りますが済生会二日市病院代表電話までおかけなおしください。受付時間は土日祝日を除く月曜日から金曜日の14時から16時です。お電話番号が分かる場合は、お電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。092-923-1551、繰り返します、092-923-1551、お電話ありがとうございました。それでは失礼いたします。"
  - module_name: "END_代表案内_固定NG"
    purpose: "固定電話のみ所持（携帯未所持）時の代表案内終話"
    announcement: "大変申し訳ございませんが、済生会二日市病院代表電話へおかけなおしください。受付時間は祝日を除く、月曜日から金曜日の14時から16時です。電話番号は代表電話は、092-923-1551です。ご案内している代表電話は病院ホームページでもご確認いただけます。繰り返します。電話番号は代表電話は、092-923-1551。お電話ありがとうございました。それでは失礼いたします。"

