# --- セクション11: 特記事項・制約 ---
special_notes:
  - "施設名は「相澤病院」（あいざわびょういん）。長野県松本市の救命救急センター併設の中核病院。"
  - "代表電話「0263-33-8685」（外来予約センター）は本フローの転送先・番号案内先として最頻出。"
  - "救命救急センター「0263-36-9999」は冒頭・時間外・救急科・転送失敗等の複数箇所で繰り返し案内。"
  - "選定療養費 8,000円 は施設指定金額。prompter で他金額に改変禁止。"
  - "GW分岐（4/29-5/6）は年次更新が必要。GW判定 script の template_params で期間範囲を毎年見直すこと。"
  - "新規予約は通院中診療科のみ受付。通院外で「診察予約」希望 + 紹介状なしの場合は変更扱いに切替えるGen1独自仕様を踏襲。"
  - "心療内科は OpenAI が「精神神経科」と誤認識しがちなため、二段復唱（はい/いいえ）で再確認するロジックを必ず保持。"
  - "診療科聴取 STT 辞書は entity_classification.md の 777 surfaces（誤認識バリアント含む）を additional_words に直書きで展開。テンプレ流用は不可。"
  - "Gen1 の case 数膨大な count／再質問ロジックは Gen3 の標準 Retry モジュール（retry_count + Retry node）に集約。"
  - "Gen1「4_14 削除 予約日聞取り.yaml」「4_14 削除 理由聞き取り.yaml」は移管対象外（旧版で既に削除予定とファイル名で明示）。"
  - "携帯電話番号は連絡先電話番号と独立した別サブフローで聴取（緊急時連絡用）。「持っていない」を許容する点が標準サブフローと異なる（個人情報サブフロー.bivr のテンプレに含まれない場合は別 .bivr テンプレ要追加）。"
  - "代表電話番号案内の繰り返しは Gen1 で 15 回ループだが、Gen3 の scaffold デフォルトは 3 回読み上げで終話。CS 確認後に必要なら context_match_router でループを別途設計（confirmation_items 参照）。"
  - "GW判定 script は script_template: custom。理由：既存テンプレ（future_date / phone_type / day_of_week / business_hours / condition_group）のどれにも該当しない、年次固定の「GW期間判定」というカレンダー計算が必要。"

