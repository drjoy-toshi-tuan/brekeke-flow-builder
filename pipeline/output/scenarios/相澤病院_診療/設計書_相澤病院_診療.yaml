# 設計書 — 相澤病院 / 診療（Gen1 → Gen3 移管）
# 元資料: commubo抽出/【012】相澤病院/【0011相澤病院】診療1_M_本番/
# 生成日: 2026-04-30
# 確認レポート: docs/designs/確認レポート_相澤病院_診療_20260430.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "相澤病院"
  scenario_name: "診療"
  group_name: "相澤病院"
  flow_name: "相澤病院$診療"
  target_facility: "相澤病院（本院）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"               # 着信ARS番号（Brekeke 設定時）
  business_hours: "祝日・年末年始（12/29-1/4）を除く 月～金 9:00～16:00"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "相澤病院$診療"
      role: "main"
      description: "メインフロー（用件聴取・診療科聴取・個人情報聴取・終話分岐）"
  subflows:
    # 個人情報サブフロー（個人情報サブフロー.bivr テンプレを完全コピー）
    - name: "相澤病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1: 患者氏名聞き取り.yaml — フルネーム聴取"

    - name: "相澤病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1: 生年月日：0129更新.yaml — 和暦/西暦/DTMF8桁対応"

    - name: "相澤病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1: 連絡先番号聞き取り.yaml — 連絡先番号（携帯/固定）。incoming-classifier 経由で着信番号採用ロジックも内包"

    - name: "相澤病院$携帯電話番号聴取"
      target: "携帯電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        Gen1: 連絡先番号聞き取り.yaml の後段「携帯電話番号の聞き取り」枝。
        緊急時の連絡先として「携帯電話の番号」を別途聴取するための独立サブフロー。
        「持っていない」を許容する点が標準の電話番号聴取と異なる（テンプレ存在確認要）。

# --- セクション3: フローの目的 ---
purpose: |
  相澤病院の予約専用 AI 電話。患者からの着信を受け、用件（診察予約 / 変更 /
  キャンセル / 人間ドック・健診案内 / 予約確認）を聴取し、診療科を多段絞り込みで
  特定。氏名・生年月日・連絡先電話番号・携帯電話番号を聴取して折返し受付を自動化する。
  ・救命救急センター誘導（0263-36-9999）を冒頭で案内
  ・「現在通院中の診療科」かどうかで新規予約可否を分岐（新規は通院中診療科のみ）
  ・紹介状なしの場合は選定療養費（8,000円）を必ずアナウンス
  ・対応外診療科は所定の番号案内（健診: 0263-34-6360 / 放射線科系: 0263-33-8600 等）に振り分け
  ・受診希望日が当日かつ稼働時間内の場合は外来予約センター（0263-33-8685）へ Blind Transfer
  ・GW 期間（4/29-5/6 入電）は折返し日が変わるため独立分岐

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "相澤病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス（救命救急番号案内）→ 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス（施設名・救命救急番号アナウンス）
                                        → 用件確認(hearing, enum) → classification
                                            ├─ 予約確認 → END_予約確認番号案内
                                            ├─ 健診 → 健診受診希望確認(hearing, enum)
                                            │           ├─ あり → 通院中確認へ
                                            │           └─ なし → END_健診センター番号案内
                                            ├─ 診察予約 → 通院中診療科確認(hearing, enum)
                                            │           ├─ はい → 紹介状確認(hearing, enum)
                                            │           │         ├─ あり → 紹介状あり_アナウンス → 診療科聴取
                                            │           │         └─ なし → 選定療養費_アナウンス → 診療科聴取
                                            │           └─ いいえ → 新規予約不可_紹介状確認(hearing, enum)
                                            │                       ├─ あり → 紹介状あり_アナウンス → 診療科聴取
                                            │                       └─ なし → 新規予約不可_アナウンス → 変更扱いで診療科聴取
                                            └─ 変更/キャンセル → 変更キャンセル_アナウンス → 診療科聴取
                                        → 診療科聴取(hearing, enum, 多値)
                                            ├─ 系統名（呼吸器/脳神経/循環器/腫瘍/精神/放射線/小児/スポーツ）→ 系統別追問
                                            ├─ 内科 → 内科詳細(hearing)
                                            ├─ 外科 → 外科詳細(hearing)
                                            ├─ 救急科 → END_救急科番号案内
                                            ├─ 健康センター → END_健診センター番号案内
                                            ├─ 放射線科/内視鏡/PETCT → END_放射線科系番号案内
                                            ├─ 心療内科 → 心療内科復唱(hearing, enum)
                                            │             ├─ はい → END_心療内科美容整形案内
                                            │             └─ いいえ → 診療科再聴取
                                            ├─ 美容整形 → END_心療内科美容整形案内
                                            ├─ 精神神経科/皮膚科/麻酔科 → END_再診のみ案内
                                            ├─ わからない → 通常フローへ（科未定で受付）
                                            └─ 分岐なし科 → 用件確認再復唱
                                        → 用件確認再復唱(announcement)
                                          → 氏名聴取(subflow)
                                            → 生年月日聴取(subflow)
                                              → 電話番号聴取(subflow)
                                                → 携帯電話番号聴取(subflow)
                                                  → 終話分岐_用件(context_match_router on classification)
                                                      ├─ キャンセル → END_キャンセル受付
                                                      ├─ 診察予約 → 受診希望今日確認(hearing, enum)
                                                      │             ├─ あり → 当日希望_時間判定(script: business_hours)
                                                      │             │         ├─ SUCCESS(時間内) → 担当者へ転送(call_transfer)
                                                      │             │         └─ FAIL(時間外)   → END_当日受診不可番号案内
                                                      │             └─ なし → GW判定(script: custom)
                                                      └─ 変更 → GW判定(script: custom)
                                                                ├─ SUCCESS(GW期間) → END_GW案内
                                                                └─ FAIL(通常)      → END_通常折返し
    notes: |
      Gen1 の 9 系統二段絞り込みは Gen3 では「診療科聴取（多選択肢）→ 系統別 hearing」
      で再実装する。Gen1 の各「分岐（呼吸器）の聞き取り」等は系統別 hearing として整理する。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ============================================================
  # 1. 冒頭ブロック
  # ============================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認
    notes: |
      Gen1「挨拶」+「救命救急センター誘導」+「次へ_2 → 用件」の3箱を統合。
      TTS: 「お電話ありがとうございます。相澤病院の、予約専用AI電話です。
            救命救急センターへのご用件は、0263-36-9999へおかけなおしください。」

  # ============================================================
  # 2. 用件確認
  # ============================================================
  - step: 用件確認
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "予約確認"
        next: END_予約確認番号案内
      - match: "健診"
        next: 健診受診希望確認
      - match: "診察予約"
        next: 通院中診療科確認
      - match: "キャンセル"
        next: 変更キャンセル_アナウンス
      - match: "other"        # = 変更
        next: 変更キャンセル_アナウンス
    notes: |
      Gen1: 用件.yaml の「用件の確認」「セットした用件の分岐」「用件を確認」復唱統合。
      output 値: 診察予約 / 変更 / キャンセル / 健診 / 予約確認 の 5 値。
      復唱（echo_back: true）あり：scaffold が「ご予約のキャンセルでよろしいですか？」相当の
      Re-confirmation node + 復唱 STT + 復唱 OpenAI(肯定/否定) を自動配置。
      DTMF 1=診察予約, 2=変更, 3=キャンセル も並行受付（stt_type: DTMF_AmiVoice）。
      "other" は変更に該当（diagram の通り変更とキャンセルが同じ次ステップに合流するため
      「変更」を other に集約。OpenAI prompt は 5 値を明示する点に注意）。

  # ============================================================
  # 3a. 健診ルート
  # ============================================================
  - step: 健診受診希望確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 通院中診療科確認
      - match: "other"        # = なし
        next: END_健診センター番号案内
    notes: |
      Gen1「健診⇒受診希望か確認」: TTS「健診を受診後に、届いた紹介状をお持ちで、
      当院での診察をご希望ですか？」。あり=Yes は標準フローへ合流（通院中確認に進む）、
      なし=No は健診センター（0263-34-6360）番号案内へ。

  # ============================================================
  # 3b. 診察予約ルート（通院中→紹介状→選定療養費）
  # ============================================================
  - step: 通院中診療科確認
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 紹介状確認
      - match: "other"        # = いいえ
        next: 新規予約不可_紹介状確認
    notes: |
      Gen1「新規予約?」: TTS「現在、通院中の診療科のご予約ですか？」。
      Yes は通常の紹介状確認へ、No は新規予約不可ルート（紹介状ありなら受付、
      なしは「新規のご予約は承っておりません」アナウンス後に変更扱いで聴取継続）に分岐。

  - step: 紹介状確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 紹介状あり_アナウンス
      - match: "other"        # = なし
        next: 選定療養費_アナウンス
    notes: |
      Gen1「紹介状有無の確認」: TTS「他の医療機関からの紹介状はお持ちですか？」。
      output 値: あり / なし。

  - step: 紹介状あり_アナウンス
    type: announcement
    next: 診療科聴取
    notes: |
      Gen1「それでは」: TTS「かしこまりました。それでは、紹介状の封筒に
      記載されている診療科、または、」→ 診療科聴取へ繋ぐ前置き。

  - step: 選定療養費_アナウンス
    type: announcement
    next: 診療科聴取
    notes: |
      Gen1「紹介状なし」: TTS「かしこまりました。紹介状がない場合は、
      診療費とは別に、選定療養費として、8,000円をご負担いただいております
      のでご了承ください。それでは、」。金額（8,000円）は施設指定なので
      prompter で改変禁止（special_notes に明記）。

  - step: 新規予約不可_紹介状確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 紹介状あり_アナウンス
      - match: "other"        # = なし
        next: 新規予約不可_アナウンス
    notes: |
      通院中ではない場合の紹介状確認。あり=新患受付可で標準フロー、
      なし=新規受付不可（変更扱いで予約変更受付に切り替え）。

  - step: 新規予約不可_アナウンス
    type: announcement
    next: 診療科聴取
    notes: |
      Gen1「新規無し予約変更のみ」: TTS「恐れ入りますが、当院は新規のご予約は
      承っておりません。予約の変更のみ承っておりますので、変更について
      お伺いします。まず、」。元資料では `<? $clinical_department ?>` 動的
      埋め込みがあったが、この時点では診療科未確定のため Gen3 では文言から
      動的部分を削除（汎用文言で固定）。

  # ============================================================
  # 3c. 変更/キャンセル ルート
  # ============================================================
  - step: 変更キャンセル_アナウンス
    type: announcement
    next: 診療科聴取
    notes: |
      Gen1「変更・キャンセル」: TTS「それでは、」のみの繋ぎ発話。

  # ============================================================
  # 4. 診療科聴取（一段目: 多選択肢 enum）
  # ============================================================
  - step: 診療科聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    echo_back: true
    conditions:
      - match: "呼吸器系統"
        next: 系統別_呼吸器
      - match: "脳神経系統"
        next: 系統別_脳神経
      - match: "循環器系統"
        next: 系統別_循環器
      - match: "腫瘍系統"
        next: 系統別_腫瘍
      - match: "精神系統"
        next: 系統別_精神
      - match: "放射線系統"
        next: 系統別_放射線
      - match: "小児系統"
        next: 系統別_小児
      - match: "スポーツ系統"
        next: 系統別_スポーツ
      - match: "放射線治療科"
        next: 系統別_放射線治療科
      - match: "内科"
        next: 内科詳細
      - match: "外科"
        next: 外科詳細
      - match: "救急科"
        next: END_救急科番号案内
      - match: "健康センター"
        next: END_健診センター番号案内
      - match: "放射線科"
        next: END_放射線科系番号案内
      - match: "内視鏡"
        next: END_放射線科系番号案内
      - match: "PETCT"
        next: END_放射線科系番号案内
      - match: "心療内科"
        next: 心療内科復唱
      - match: "美容整形"
        next: END_心療内科美容整形案内
      - match: "精神神経科"
        next: END_再診のみ案内
      - match: "皮膚科"
        next: END_再診のみ案内
      - match: "麻酔科"
        next: END_再診のみ案内
      - match: "わからない"
        next: 用件確認再復唱
      - match: "other"        # = 分岐なし科の正規名（一致した値）
        next: 用件確認再復唱
    notes: |
      Gen1「診療科の聞き取り」を Gen3 では 1 hearing で多選択肢処理に集約。
      出力ラベルは 9 系統名 + 内科/外科 + 対応外（救急/健診/放射線/PETCT/内視鏡/
      心療内科/美容整形/精神神経科/皮膚科/麻酔科）+ わからない + 個別科（分岐なし）。
      個別科（分岐なし）は OpenAI が出力した正規科名（例: 整形外科, 消化器内科 等
      30 科以上）が context.clinicalDepartment に保存され、"other" として
      用件確認再復唱へ進む。
      no_result_default: "登録なし" は診療科聴取の必須設定（モジュール選定ガイド §2.5）。
      復唱（echo_back: true）あり: 「<% clinicalDepartment %>、でよろしいですか?」。
      ※ profile_words は entity_classification.md（777 surfaces）を additional_words 直書きで反映。

  # --- 4-a. 系統別追問 ---
  - step: 系統別_呼吸器
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "呼吸器内科"
        next: 用件確認再復唱
      - match: "呼吸器外科"
        next: 用件確認再復唱
      - match: "other"        # = 否定（戻る）
        next: 診療科聴取
    notes: "Gen1「分岐（呼吸器）の聞き取り」: TTS「呼吸器内科と呼吸器外科の、どちらですか？」"

  - step: 系統別_脳神経
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "脳神経内科"
        next: 用件確認再復唱
      - match: "脳神経外科"
        next: 用件確認再復唱
      - match: "other"
        next: 診療科聴取
    notes: "Gen1「分岐（脳神経）の聞き取り」: TTS「脳神経内科と脳神経外科の、どちらですか？」"

  - step: 系統別_循環器
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "循環器内科"
        next: 用件確認再復唱
      - match: "腫瘍循環器科"
        next: 用件確認再復唱
      - match: "other"
        next: 診療科聴取
    notes: "Gen1「循環器の聞き取り」: TTS「循環器内科と腫瘍循環器科、どちらですか？」"

  - step: 系統別_腫瘍
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "腫瘍精神科"
        next: 用件確認再復唱
      - match: "腫瘍循環器科"
        next: 用件確認再復唱
      - match: "other"
        next: 診療科聴取
    notes: "Gen1「腫瘍の聞き取り」: TTS「腫瘍精神科と腫瘍循環器科、どちらですか？」"

  - step: 系統別_精神
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "精神神経科"
        next: END_再診のみ案内
      - match: "腫瘍精神科"
        next: 用件確認再復唱
      - match: "other"
        next: 診療科聴取
    notes: |
      Gen1「精神の聞き取り」: TTS「精神神経科と腫瘍精神科、どちらですか？」。
      精神神経科は「再診のみ」案内（ただし腫瘍精神科は通常受付）。

  - step: 系統別_放射線
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "治療科"
        next: 系統別_放射線治療科
      - match: "放射線科"
        next: END_放射線科系番号案内
      - match: "other"
        next: 診療科聴取
    notes: |
      Gen1「放射線の聞き取り」: TTS「放射線治療科と放射線科、どちらですか？
      治療科、または 放射線科、でお答えください。」治療科 → 陽子線/トモ二択へ。

  - step: 系統別_放射線治療科
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "陽子線治療センター"
        next: 用件確認再復唱
      - match: "トモセラピーセンター"
        next: 用件確認再復唱
      - match: "other"
        next: 診療科聴取
    notes: |
      Gen1「放射線治療科の聞き取りへ」: TTS「放射線治療科ですね？
      陽子線治療センターとトモセラピーセンター、どちらでしょうか？」

  - step: 系統別_小児
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "小児科"
        next: 用件確認再復唱
      - match: "小児外科"
        next: 用件確認再復唱
      - match: "other"
        next: 診療科聴取
    notes: "Gen1「小児科の聞き取りへ」: TTS「小児科と小児外科、どちらですか？」"

  - step: 系統別_スポーツ
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "スポーツ障害予防治療科"
        next: 用件確認再復唱
      - match: "スポーツリハ科"
        next: 用件確認再復唱
      - match: "other"
        next: 診療科聴取
    notes: |
      Gen1「スポーツの聞き取りへ」: TTS「スポーツ障害予防治療科と
      スポーツリハ科、どちらですか？」

  # --- 4-b. 内科/外科詳細 ---
  - step: 内科詳細
    type: hearing
    output_format: enum
    echo_back: true
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 用件確認再復唱
    notes: |
      Gen1「内科詳細確認」: TTS「どちらの内科でしょうか？「消化器内科」のように
      お答え下さい。」。OpenAI で再正規化し clinicalDepartment 上書き保存。
      output_format: enum で具体科名（消化器内科 / 循環器内科 / 呼吸器内科 等）に
      落とすが、対象が膨大なため scaffold は default 単線で次へ進める。
      no_result_default: "登録なし" 設定で OpenAI 認識不可時の安全網を確保。

  - step: 外科詳細
    type: hearing
    output_format: enum
    echo_back: true
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: 用件確認再復唱
    notes: |
      Gen1「外科詳細確認」: TTS「どちらの外科でしょうか？「整形外科」のように
      お答え下さい。予約票に「外科」と記載がある場合は「外科」とお答えください。」

  # --- 4-c. 心療内科二段確認 ---
  - step: 心療内科復唱
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: END_心療内科美容整形案内
      - match: "other"        # = いいえ
        next: 診療科聴取
    notes: |
      Gen1「心療内科復唱_1」: TTS「心療内科、で、よろしいですか？」。
      Gen1 では「精神神経科」と誤認識しがちなため復唱で再確認するロジック。

  # ============================================================
  # 5. 用件確認再復唱（診療科確定後の最終確認）
  # ============================================================
  - step: 用件確認再復唱
    type: announcement
    next: 氏名聴取
    notes: |
      Gen1「用件の確認」「次へ」: 診療科確定後の繋ぎ発話。
      Gen3 では患者氏名聴取への繋ぎ announcement として配置。
      TTS: 「では次に、」のみ（後続の氏名聴取サブフローが「患者さんのお名前を、
      フルネームでお答えください。」を発話するため、ここでは繋ぎだけ）。

  # ============================================================
  # 6. 個人情報サブフロー連鎖
  # ============================================================
  - step: 氏名聴取
    type: subflow
    flowname: "相澤病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "相澤病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "相澤病院$電話番号聴取"
    next: 携帯電話番号聴取

  - step: 携帯電話番号聴取
    type: subflow
    flowname: "相澤病院$携帯電話番号聴取"
    next: 終話分岐_用件
    notes: |
      Gen1「携帯電話番号の聞き取りへ１」「２」: 緊急連絡先として携帯番号を別途聴取。
      連絡先電話番号がすでに携帯の場合はスキップ可能だが、scaffold は標準的に呼び出す。

  # ============================================================
  # 7. 終話分岐（用件 + 受診希望今日 + 営業時間 + GW）
  # ============================================================
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "キャンセル"
        next: END_キャンセル受付
      - match: "診察予約"
        next: 受診希望今日確認
      - match: "other"        # = 変更/健診/予約確認はここに来ないが安全網として GW判定へ
        next: GW判定
    notes: |
      用件区分で終話を分岐。
      - キャンセル → END_キャンセル受付
      - 診察予約 → 受診希望今日確認 → 当日希望なら時間内/外で分岐、それ以外は GW判定 → 通常折返し
      - 変更（other）→ GW判定 → GW期間なら GW案内、通常期間なら 通常折返し

  - step: 受診希望今日確認
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 当日希望_時間判定
      - match: "other"        # = なし（後日希望）
        next: GW判定
    notes: |
      Gen1「受診希望日は今日？」: TTS「本日の受診をご希望ですか？はい、そうです、
      または、いいえ、ちがいます、で、お答えください。」。

  - step: 当日希望_時間判定
    type: script
    script_template: business_hours
    reference_module: "受診希望今日確認"
    template_params:
      START_HOUR: 9
      END_HOUR: 16
    conditions:
      - match: "SUCCESS"
        next: 担当者へ転送
      - match: "FAIL"
        next: END_当日受診不可番号案内
    notes: |
      月～金 9:00～16:00 の稼働時間内かを判定。
      SUCCESS（時間内）→ 担当者へ Blind Transfer。
      FAIL（時間外）→ Gen1「月 0：00～9：00、月～木 16：00～翌9：00」
      相当の救命救急センター誘導アナウンス + 番号案内へ。
      ※ acceptance_times による時間外判定とは別の二次判定（既に冒頭で受付可と
        判定された後に「当日希望」のみさらに営業時間判定を入れる Gen1 仕様の踏襲）。

  - step: 担当者へ転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: ""
    conditions:
      - match: "FAIL"
        next: END_転送失敗
    notes: |
      Gen1「転送へ」: TTS「それでは担当者がお伺いいたします。しばらく、
      そのままお待ちください。」→ 0263-33-8685 へ Blind Transfer。
      転送番号は IVR プロパティで設定（params.number は空文字）。
      失敗時は status=9 で END_転送失敗 へ。Gen1「転送失敗」アナウンス文言は
      END_転送失敗 に転記する（tts_modules 参照）。
      ※ qa_validator E-10 対策で FAIL 経路を明示。SUCCESS 側は scaffold が
        status=3（転送成功・自動終話）を補完するため記載不要。

  - step: GW判定
    type: script
    script_template: custom
    reference_module: "OpenAI_用件確認"
    template_params: {}
    conditions:
      - match: "SUCCESS"        # = GW期間（4/29-5/6）に該当
        next: END_GW案内
      - match: "FAIL"           # = 通常期間
        next: END_通常折返し
    notes: |
      Gen1「GW日付分岐」: 入電日が 4/29-5/6 に該当する場合 GW 期間として
      別アナウンスを再生する。Script モジュールで現在日付を判定し、施設指定の
      GW 期間（年次更新が必要）に該当するかを返す。template_params で
      期間範囲を渡すこと（例: GW_START="04-29", GW_END="05-06"）。
      ※ acceptance_times での通常時間外判定とは独立。GW は折返し日が
        変わるための分岐であり、入電は受付（時間内）扱い。
      ※ script_template: custom の理由 → 既存テンプレ（future_date / phone_type /
        day_of_week / business_hours / condition_group）のどれにも該当しない
        カレンダー計算が必要。具体的には「ゴールデンウィーク（祝日）の連休期間に
        該当するかどうか」のカレンダー判定で、施設固有の祝日扱い（4/29 昭和の日
        ～ 5/6 振替休日）に基づき折返し営業日を後ろ倒しする。年次で祝日カレンダーが
        変わるため毎年更新運用が必要（special_notes に明記）。

  # ============================================================
  # 8. 終話ブロック群
  # ============================================================
  - step: END_予約確認番号案内
    type: termination
    termination_ref: "END_予約確認番号案内"

  - step: END_健診センター番号案内
    type: termination
    termination_ref: "END_健診センター番号案内"

  - step: END_放射線科系番号案内
    type: termination
    termination_ref: "END_放射線科系番号案内"

  - step: END_救急科番号案内
    type: termination
    termination_ref: "END_救急科番号案内"

  - step: END_心療内科美容整形案内
    type: termination
    termination_ref: "END_心療内科美容整形案内"

  - step: END_再診のみ案内
    type: termination
    termination_ref: "END_再診のみ案内"

  - step: END_キャンセル受付
    type: termination
    termination_ref: "END_キャンセル受付"

  - step: END_GW案内
    type: termination
    termination_ref: "END_GW案内"

  - step: END_通常折返し
    type: termination
    termination_ref: "END_通常折返し"

  - step: END_当日受診不可番号案内
    type: termination
    termination_ref: "END_当日受診不可番号案内"

  - step: END_転送失敗
    type: termination
    termination_ref: "END_転送失敗"

