# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: |
      ご用件を、次の3つのうちのいずれかでお話ください。
      「診察の予約を取る」、「予約を変更する」、「予約をキャンセルする」、
      それでは、お話ください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["診察予約", "変更", "キャンセル", "健診", "予約確認"]
      mapping:
        - input: "DTMF 1, 一番, 初診, 受診, 予約をしたい, 予約をとる, 予約お願い 等"
          output: "診察予約"
        - input: "DTMF 2, 二番, 変えたい, 変更, 延期, 取り直し 等"
          output: "変更"
        - input: "DTMF 3, 三番, やめる, 取り消し, キャンセル 等"
          output: "キャンセル"
        - input: "健診, 検診, 人間ドック, ドック, 健康センター 等"
          output: "健診"
        - input: "予約確認, 確認したい, 予約の確認 等"
          output: "予約確認"
      no_result_condition: "上記いずれにも該当しない / 「もしもし」のみ等"
    save_to: "classification"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: |
      申し訳ございません。うまく聞き取ることができませんでした。
      予約センターの番号をご案内いたしますので、そちらにお掛け直しください。
      受付時間は土日・祝日、年末年始を除く、月曜日から金曜日の、9時から16時です。
      番号を確認できましたらお電話をお切りください。

  - step_name: "健診受診希望確認"
    tts_announcement: |
      健診を受診後に、届いた紹介状をお持ちで、当院での診察をご希望ですか？
      はい、または、いいえ、で、お答えください。
    input_method: "voice_only"
    openai_rules:
      output_values: ["あり", "なし"]
      mapping:
        - input: "はい, そうです, 希望します 等"
          output: "あり"
        - input: "いいえ, 希望しません, 違います 等"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "kenshinFollowup"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "通院中診療科確認"
    tts_announcement: |
      現在、通院中の診療科のご予約ですか？
      はい、または、いいえ、で、お答えください。
    input_method: "voice_only"
    openai_rules:
      output_values: ["はい", "いいえ"]
      mapping:
        - input: "はい, そうです, 通院中 等"
          output: "はい"
        - input: "いいえ, 違います, 初めて 等"
          output: "いいえ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "currentlyAttending"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "紹介状確認"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか？はい、または、いいえ、で、お答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["あり", "なし"]
      mapping:
        - input: "はい, あります, もってる, 紹介状あります 等"
          output: "あり"
        - input: "いいえ, ない, 持ってません 等"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "introductionLetter"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "新規予約不可_紹介状確認"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか？はい、または、いいえ、で、お答えください。"
