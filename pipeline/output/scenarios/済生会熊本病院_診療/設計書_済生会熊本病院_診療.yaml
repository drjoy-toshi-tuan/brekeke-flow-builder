# 設計書 — 済生会熊本病院 診療
# 生成元: @director エージェント
# 生成日: 2026-05-01
# 作業種別: Gen1→Gen3 移管
# 元資料: commubo抽出/【039】済生会熊本病院/【0035済生会熊本病院】診療1_M_本番/
# 確認レポート: output/scenarios/済生会熊本病院_診療/確認レポート_済生会熊本病院_診療_20260501.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "済生会熊本病院"
  scenario_name: "診療"
  group_name: "済生会熊本病院"
  flow_name: "済生会熊本病院$診療"
  target_facility: "済生会熊本病院（本院）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "平日 8:30〜17:00（土日祝・GW期間 5/2-5/6 は時間外。GW期間は Dr.JOY 側カレンダーで休業日設定）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "済生会熊本病院$診療"
      role: "main"
      description: "予約確認・予約変更・予約キャンセル・その他お問い合わせの 4 用件を平日 8:30-17:00 受付し、用件別に終話に振り分けるメインフロー"
  subflows:
    - name: "済生会熊本病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "患者さんのフルネーム聴取。PatientName サブフロー 1 枠。"
    - name: "済生会熊本病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 内蔵。元号判定はサブフローテンプレ任せ。"
    - name: "済生会熊本病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier で携帯/固定/その他を 3 分岐。phonetype に「携帯」または「その他」を保存して返却。Gen1 では固定電話聴取後に追加で携帯番号を聴取するロジックがあったが、Gen3 では Gen3 標準パターンに統一（confirmation_items N-3 参照）。"
    - name: "済生会熊本病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "診察券番号（音声+DTMF）。「わからない」分岐ありはサブフローテンプレ任せ。Gen1 では 7 桁仕様だったがサブフローテンプレは 8 桁前提。Brekeke IVR UI 側で 7 桁仕様への切替か Dr.JOY 側での 7/8 桁混在許容を要確認（confirmation_items N-9 参照）。"

# --- セクション3: フローの目的 ---
purpose: |
  済生会熊本病院に予約関連の電話をかけてきた患者に対し、氏名・診察券番号・生年月日・連絡先電話番号・用件を順次聴取する。
  用件は 4 種類（予約確認 / 予約変更 / 予約キャンセル / その他お問い合わせ）。
  用件 = 変更の場合は現在の予約日 → 希望日（自由テキスト）を追加聴取。
  用件 = キャンセルの場合は現在の予約日 → キャンセル理由（自由テキスト）を追加聴取。
  用件 = 確認 / その他 の場合は確認内容（自由テキスト）を聴取。
  全ての聴取完了後、用件別に終話 TTS（4 種）で締め、Dr.JOY に登録して担当者からの折り返し連絡 + SMS 送信につなぐ。
  受付時間は平日 8:30-17:00。GW 期間（5/2-5/6）は Dr.JOY 側カレンダーで休業日扱い。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "済生会熊本病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 → 切断
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → jump_氏名聴取 (subflow)
                                            → 氏名_次へ
                                              → jump_診察券番号聴取 (subflow)
                                                → 診察券_次へ
                                                  → jump_生年月日聴取 (subflow)
                                                    → 生年月日_次へ
                                                      → jump_電話番号聴取 (subflow)
                                                        → 用件_前置き
                                                          → 用件確認 (hearing/enum/echo_back)
                                                              ├─ 確認     → 確認内容(hearing/text)            ─┐
                                                              ├─ 変更     → 現在の予約日_変更(hearing/datetime) │
                                                              │              → 希望日(hearing/text)            │
                                                              ├─ キャンセル → 現在の予約日_キャンセル(hearing/datetime)
                                                              │              → キャンセル理由(hearing/text)    │
                                                              └─ other(=その他) → 確認内容(hearing/text、合流)─┘
                                                                                                                ↓
                                                                                                          完了_前置き
                                                                                                                ↓
                                                                                                  用件分岐_終話 (CMR: OpenAI_用件確認)
                                                                                                          ├─ 確認      → END_確認
                                                                                                          ├─ 変更      → END_変更
                                                                                                          ├─ キャンセル → END_キャンセル
                                                                                                          └─ other(=その他) → END_その他
    notes: |
      - 受付時間: 平日 8:30-17:00（土日祝・GW期間 5/2-5/6 は時間外）
      - 用件 4 種すべてで sms_flag=1（Gen1 元資料に全用件で「ショートメールにてご連絡」と記載）
      - END_キャンセル の TTS には Gen1「終話（キャンセルのみ）」箱の「確認事項がある場合は、担当者よりお電話させていただきますので、ご了承ください。」を組み込み
      - END_聴取失敗 の TTS には施設代表番号 096-351-8051 をリテラル直書き

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:

  # ===== 冒頭ブロック（opening + announcement の 2 ブロック 1 セット）=====
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 氏名聴取

  # ===== 氏名聴取（PatientName サブフロー）=====
  - step: 氏名聴取
    type: subflow
    flowname: "済生会熊本病院$氏名聴取"
    next: 氏名_次へ

  - step: 氏名_次へ
    type: announcement
    next: 診察券番号聴取

  # ===== 診察券番号聴取（サブフロー、復唱+わからない分岐内蔵）=====
  - step: 診察券番号聴取
    type: subflow
    flowname: "済生会熊本病院$診察券番号聴取"
    next: 診察券_次へ

  - step: 診察券_次へ
    type: announcement
    next: 生年月日聴取

  # ===== 生年月日聴取（サブフロー、DOB Re-confirmation 内蔵）=====
  - step: 生年月日聴取
    type: subflow
    flowname: "済生会熊本病院$生年月日聴取"
    next: 生年月日_次へ

  - step: 生年月日_次へ
    type: announcement
    next: 電話番号聴取

  # ===== 連絡先電話番号聴取（サブフロー、phonetype を保存）=====
  - step: 電話番号聴取
    type: subflow
    flowname: "済生会熊本病院$電話番号聴取"
    next: 用件_前置き

  # ===== 用件確認への接続文 =====
  - step: 用件_前置き
    type: announcement
    next: 用件確認

  # ===== 用件確認（DTMF 1-4 + 音声、復唱あり、4 分岐）=====
  - step: 用件確認
    type: hearing
    stt_type: DTMF_AmiVoice
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: classification
    output_format: enum
    output_labels:
      - "確認"
      - "変更"
      - "キャンセル"
      - "その他"
    conditions:
      - match: "確認"
        next: 確認内容
      - match: "変更"
        next: 現在の予約日_変更
      - match: "キャンセル"
        next: 現在の予約日_キャンセル
      - match: "other"   # = その他お問い合わせ（確認内容に合流）
        next: 確認内容
    notes: |
      DTMF 1=確認, 2=変更, 3=キャンセル, 4=その他。DTMF と音声を並行受付。
      「もしもし」誤検知排除を OpenAI プロンプトで実施（prompter 担当）。
      Gen1「用件聞き取り.yaml」の 4 値（予約確認/予約変更/予約キャンセル/その他お問い合わせ）に対応。

  # ===== 確認用件 / その他用件: 確認内容（自由テキスト）=====
  - step: 確認内容
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: reason
    output_format: text
    next: 完了_前置き
    notes: |
      Gen1「確認内容の聞き取り.yaml」相当。
      用件=確認 のときは「ご確認内容についてお伺いします。次回の予約日時を教えて欲しい、など、内容を簡潔におっしゃってください。」、
      用件=その他 のときは「お問合せ内容を簡潔におっしゃってください。」とプロンプトを切替たい場合は分岐すべきだが、
      Gen3 では用件区別なく単一の発話「ご用件の内容について、簡潔にお話しください。」で吸収する（confirmation_items N-12 参照）。

  # ===== 変更用件: 現在の予約日（datetime）=====
  - step: 現在の予約日_変更
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 2
    echo_back: false
    save_to: reservationDate
    output_format: datetime
    next: 希望日
    notes: |
      Gen1「予約日.yaml」相当。「現在の予約日を「4月1日」のように日付でお話ください。」
      「わからない」発話は OpenAI プロンプトで NO_RESULT 扱いにし、リトライ後 skip で次へ進む（reservationDate は空文字格納）。

  # ===== 変更用件: 希望日（自由テキスト）=====
  - step: 希望日
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: desiredPeriod
    output_format: text
    next: 完了_前置き
    notes: |
      Gen1「希望日.yaml」相当。「予約希望時期を「来週」、や、「今月下旬」、のようにおっしゃってください。」
      自由テキストで保存（日付パース不要）。「ありません」「来月上旬」等を許容。

  # ===== キャンセル用件: 現在の予約日（datetime）=====
  - step: 現在の予約日_キャンセル
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 2
    echo_back: false
    save_to: reservationDate
    output_format: datetime
    next: キャンセル理由
    notes: |
      Gen1「予約日.yaml」相当（変更時と同一プロンプト）。
      「わからない」発話は OpenAI プロンプトで NO_RESULT 扱いにし、リトライ後 skip で次へ進む。

  # ===== キャンセル用件: キャンセル理由（自由テキスト）=====
  - step: キャンセル理由
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: reason
    output_format: text
    next: 完了_前置き
    notes: |
      Gen1「確認内容の聞き取り.yaml」の「予約キャンセル」分岐相当。「キャンセル理由をおっしゃってください。」
      reason context にキャンセル理由として保存。確認内容と共用（同時に通らないため衝突なし）。

  # ===== 完了アナウンス前の接続文 =====
  - step: 完了_前置き
    type: announcement
    next: 用件分岐_終話

  # ===== 用件分岐_終話（用件で 4 終話に振り分け）=====
  - step: 用件分岐_終話
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "確認"
        next: END_確認
      - match: "変更"
        next: END_変更
      - match: "キャンセル"
        next: END_キャンセル
      - match: "other"   # = その他
        next: END_その他
    notes: "OpenAI_用件確認 が classification context に保存した値を参照して 4 終話に振り分け。"

  # ===== 終話 4 通り =====
  - step: END_確認
    type: termination
    termination_ref: "END_確認"
  - step: END_変更
    type: termination
    termination_ref: "END_変更"
  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"
  - step: END_その他
    type: termination
    termination_ref: "END_その他"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "確認"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "その他"
    item_default: true
    editable: true
    deletable: false
    notes: "Gen1 用件: 予約確認/予約変更/予約キャンセル/その他お問い合わせ"

  - context_name: "patientName"
    context_name_jp: "患者氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "患者さんのフルネーム"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "Gen1 では 7 桁仕様。サブフローテンプレは 8 桁前提のため運用側で要確認（confirmation_items N-9）。"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフロー DOB Re-confirmation 内蔵"

  - context_name: "reason"
    context_name_jp: "理由・確認内容"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "キャンセル理由（用件=キャンセル）または確認内容（用件=確認/その他）。同時に通らないため共用。"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "用件=変更/キャンセル の場合のみ聴取。「4月1日」等の日付発話を YYYY-MM-DD に正規化。比較日より前なら +1 年確定。"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取。携帯/固定 判定後 phonetype に種別を保存。"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "転送"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理（正常終話）、2=代表案内（非通知/聴取失敗）、6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: ""

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

  # 施設固有フィールド（itemDefault: false）
  - context_name: "desiredPeriod"
    context_name_jp: "予約希望時期"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "用件=変更 の場合のみ聴取。Gen1「希望日.yaml」相当。「来月上旬」「ありません」等の自由テキスト。日付パース不要。"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "確認"
      - "変更"
      - "キャンセル"
      - "その他"
    notes: "DTMF 1=確認, 2=変更, 3=キャンセル, 4=その他。DTMF と音声を並行受付。「もしもし」誤検知排除を OpenAI プロンプトで実施。"

  - order: 2
    name: "確認内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "用件=確認 または 用件=その他 の場合のみ通る。reason context をキャンセル理由と共用。"

  - order: 3
    name: "現在の予約日_変更"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "用件=変更 の場合のみ通る。「4月1日」等の日付発話を YYYY-MM-DD に正規化。比較日より前なら +1 年確定。"

  - order: 4
    name: "希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "desiredPeriod"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "用件=変更 の場合のみ通る。「来月上旬」「来週」等の自由テキスト。日付パース不要。"

  - order: 5
    name: "現在の予約日_キャンセル"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "用件=キャンセル の場合のみ通る。変更時と同一プロンプト。"

  - order: 6
    name: "キャンセル理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "用件=キャンセル の場合のみ通る。「特にない」を許容する自由テキスト。"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。済生会熊本病院の予約確認センターです。ここからはAI電話がご案内します。途中で電話を切った場合でも、担当者よりご連絡いたしますので、ご安心ください。初めに、"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "氏名聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話ください。「予約を確認する」、「予約を変更する」、「予約をキャンセルする」、「その他お問い合せ」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "確認"
        - "変更"
        - "キャンセル"
        - "その他"
      mapping:
        - input: "DTMF 1 / 「予約確認」「確認したい」「の確認」「を確認」「確認の希望」「確認希望」 等"
          output: "確認"
        - input: "DTMF 2 / 「予約変更」「変更」「の変更」「延期」「取り直したい」「取り直す」「変えたい」「変えて」「変える」「並行」 等"
          output: "変更"
        - input: "DTMF 3 / 「キャンセル」「のキャンセル」「やめる」「行けない」「取り消し」「取り消す」「取消」 等"
          output: "キャンセル"
        - input: "DTMF 4 / 「その他」「その他お問い合わせ」「その他お問合せ」「お問合せ」「教えて」 等"
          output: "その他"
        - input: "「もしもし」のみ"
          output: "NO_RESULT（誤検知排除）"
      no_result_condition: "上記いずれにも該当しない、または「もしもし」のみ"
    save_to: "classification"
    next_step: "（条件分岐: 確認→確認内容 / 変更→現在の予約日_変更 / キャンセル→現在の予約日_キャンセル / その他→確認内容）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "確認内容"
    tts_announcement: "ご用件の内容について、簡潔にお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "（自由発話）"
          output: "（発話内容をそのまま保存）"
      no_result_condition: "（text 型のため OpenAI 不要）"
    save_to: "reason"
    next_step: "完了_前置き"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "現在の予約日_変更"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話ください。わからない場合は「わからない」のようにお話下さい。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「4月1日」「来月の15日」 等の日付発話"
          output: "YYYY-MM-DD（比較日より前なら +1 年）"
        - input: "「わからない」「忘れた」「覚えていない」「知らない」 等"
          output: "NO_RESULT（リトライ後 skip で空文字格納）"
      no_result_condition: "日付として解釈できない発話、または「わからない」相当"
    save_to: "reservationDate"
    next_step: "希望日"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "希望日"
    tts_announcement: "予約希望時期を「来週」、や、「今月下旬」、のようにおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「来週」「今月下旬」「来月上旬」「ありません」 等の自由発話"
          output: "（発話内容をそのまま保存）"
      no_result_condition: "（text 型のため OpenAI 不要）"
    save_to: "desiredPeriod"
    next_step: "完了_前置き"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "現在の予約日_キャンセル"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話ください。わからない場合は「わからない」のようにお話下さい。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「4月1日」「来月の15日」 等の日付発話"
          output: "YYYY-MM-DD（比較日より前なら +1 年）"
        - input: "「わからない」「忘れた」「覚えていない」「知らない」 等"
          output: "NO_RESULT（リトライ後 skip で空文字格納）"
      no_result_condition: "日付として解釈できない発話、または「わからない」相当"
    save_to: "reservationDate"
    next_step: "キャンセル理由"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "キャンセル理由"
    tts_announcement: "キャンセル理由をおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "（自由発話）"
          output: "（発話内容をそのまま保存）"
      no_result_condition: "（text 型のため OpenAI 不要）"
    save_to: "reason"
    next_step: "完了_前置き"
    retry_failure: "skip"
    retry_failure_announcement: ""

