# --- セクション10: AmiVoice辞書（profile_words）---
# 元資料 entity_classification.md / entity_stt_patch.json から scaffold が自動取り込みする方針のため、
# director 側では転記不要。ここでは scaffold の自動取り込み対象を明記する。
amivoice_dictionary:
  - step_name: "用件確認"
    words: |
      # entity_stt_patch.json: 用件 entity (キャンセル/その他/確認/変更) の R1/R2/R3 surfaces を自動取り込み
      # 詳細は commubo抽出/【039】済生会熊本病院/【0035済生会熊本病院】診療1_M_本番/entity_stt_patch.json 参照

# --- セクション11: 特記事項・制約 ---
special_notes:
  - "受付時間: 平日 8:30-17:00（土日祝・GW期間 5/2-5/6 含む時間外）。GW期間は Dr.JOY 側カレンダー（不定期休業日）で年単位で設定し、END_時間外 が発火する想定。"
  - "Gen1 の GW 専用ガイダンス（「ゴールデンウィークの休業期間は、5月2日から5月6日までです。5月7日8時30分より、受付を開始いたします。」）は Gen3 では END_時間外 に統合（年単位で日付が変わるため。confirmation_items N-2 参照）。"
  - "用件 4 種すべてで sms_flag=1（Gen1 元資料に全用件で「ショートメールにてご連絡」と記載のため）。携帯/固定の SMS 出し分けは行わない。"
  - "END_キャンセル の TTS には Gen1「終話（キャンセルのみ）」箱の追加文言「確認事項がある場合は、担当者よりお電話させていただきますので、ご了承ください。」を組み込み済み。"
  - "END_聴取失敗 の TTS には施設代表番号 096-351-8051 をリテラル直書き。Gen1 では番号案内を 3 回繰り返してから終話する仕様だったが、Gen3 では 1 回読み上げで終話（confirmation_items N-6 参照）。"
  - "Gen1 の 連絡先電話番号聞き取り.yaml で固定電話だった場合に追加で携帯番号を聴取するロジック（「持っていない」発話で完了扱い）は Gen3 標準の電話番号サブフローに統合（追加聴取ステップは省略。confirmation_items N-3 参照）。"
  - "Gen1 用件聞き取りサブの「もしもし」誤検知排除（countもしもし リトライ）は、Gen3 では OpenAI プロンプト内のルール（「もしもし」のみは NO_RESULT を返す）で吸収する。"
  - "用件確認の echo_back（復唱）文言は scaffold のデフォルト「ご用件は、#data# でよろしいですか?」を使用。Gen1 では 4 用件で個別文言（「ご予約のキャンセルでよろしいですか?」等）だったが、Gen3 では統一（confirmation_items N-4 参照）。"
  - "確認内容（用件=確認）と キャンセル理由（用件=キャンセル）と 確認内容（用件=その他）は reason context を共用。用件分岐により同時には通らないため衝突なし。Dr.JOY 画面では classification と組み合わせて意味を識別。"
  - "現在の予約日（変更/キャンセル）は datetime 型で reservationDate context に保存。希望日（変更時）は text 型で desiredPeriod context に分離保存（型が違うため別 context にする必要あり。confirmation_items N-13 参照）。"
  - "診察券番号は Gen1 で 7 桁仕様だったが、Gen3 のサブフローテンプレは 8 桁前提。Brekeke IVR UI 側で 7 桁仕様への切替か Dr.JOY 側での 7/8 桁混在許容を要確認（confirmation_items N-9 参照）。"
  - "診療科聴取は本フローには無い（Gen1 にも無し）。診療科は折り返しの担当者対応で確認する運用。"
  - "個人情報サブフロー（氏名/生年月日/電話番号/診察券番号）は docs/reference/bivr/samples/個人情報サブフロー.bivr の完全コピー方針（CLAUDE.md Rule 9）。サブフロー内部のモジュール構成は本設計書では記述しない。"
  - "AmiVoice 辞書（profile_words）は entity_stt_patch.json から scaffold が自動取り込み。OpenAI 類義語は entity_openai_synonyms.md から prompter が自動取り込み。"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（Dr.JOY 管理画面で確認）"
    resolved: false
  - item: "phone_number（IVR 着信電話番号、Brekeke 設定時に決定）"
    resolved: false
  - item: "GW 期間（5/2-5/6）の取り扱い: Dr.JOY 側カレンダー（不定期休業日）で休業日設定し END_時間外 を発火させる方針で問題ないか。GW 専用ガイダンス（「5月7日8時30分より、受付を開始いたします。」）が必要なら別途 director に再依頼"
    resolved: false
  - item: "携帯番号追加聴取（Gen1 携帯チェック）の省略: Gen3 標準の電話番号サブフロー（incoming-classifier で携帯/固定判定）で代替する判断で問題ないか。Gen1 と同等の二段階聴取が必須なら別途 director に再依頼"
    resolved: false
