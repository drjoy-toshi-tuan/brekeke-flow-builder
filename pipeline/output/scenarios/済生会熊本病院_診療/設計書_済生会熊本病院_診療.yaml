    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（土日祝・GW期間 5/2-5/6 含む）"
    tts_announcement: "ただいまの時間は受付時間外となります。受付時間は平日、8時30分から17時となっております。恐れ入りますが、受付時間内にお掛け直し下さい。お電話ありがとうございました。"
