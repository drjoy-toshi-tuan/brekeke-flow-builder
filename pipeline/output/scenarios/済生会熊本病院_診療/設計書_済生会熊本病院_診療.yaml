    condition: "用件=確認"
    tts_announcement: "予約確認の申し込みを受付いたしました。土日祝日を除く翌日までに、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_確認"
  - name: "END_変更"
    condition: "用件=変更"
    tts_announcement: "予約変更の申し込みを受付いたしました。土日祝日を除く翌日までに、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更"
  - name: "END_キャンセル"
    condition: "用件=キャンセル"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。確認事項がある場合は、担当者よりお電話させていただきますので、ご了承ください。土日祝日を除く翌日までに、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_キャンセル"
  - name: "END_その他"
    condition: "用件=その他お問い合わせ"
    tts_announcement: "その他お問い合わせ、の申し込みを受付いたしました。土日祝日を除く翌日までに、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_その他"

