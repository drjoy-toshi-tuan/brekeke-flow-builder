    notes: "回答内容はフリーワード受付（「姉です」をそのまま）。復唱・読み上げ禁止"

  - step_name: "用件"
    tts_announcement: "診察券、予約票など診察券番号がわかるものをお手元にご用意ください。次の4つのうちのいずれかでご用件をお話しください。1, 予約を取る、2, 予約を変更する、3, 予約をキャンセルする、4, 予約日時の確認。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "診療予約"
        - "予約変更"
        - "キャンセル"
        - "予約日時確認"
      mapping:
        - input: "DTMF 1 / よやく / 予約を取る / 新規 / 診療予約 / 予約取りたい"
          output: "診療予約"
        - input: "DTMF 2 / 変更 / 予約変更 / 日にち変えたい / 予約取り直し"
          output: "予約変更"
        - input: "DTMF 3 / キャンセル / 取り消し / やめたい"
          output: "キャンセル"
        - input: "DTMF 4 / 確認 / 予約日時確認 / 問合せ / その他お問合せ"
          output: "予約日時確認"
      no_result_condition: "上記いずれにも該当しない場合 → NO_RESULT で再聴取"
    save_to: "classification"
    next_step: "（条件分岐: 診療予約→診察_ワクチン確認, 予約変更→予約変更_診察券番号, キャンセル→キャンセル_診察券番号, 予約日時確認→予約日時確認_診察券番号）"
    retry_failure: "end_failure"
    notes: "customer_doc 原文には <dtmf digit='1'/> を含むが、Gen3 では TTS から SSML 除外。DTMF 受付は stt_type=DTMF_AmiVoice + dtmf_max_length=1 で表現"

  - step_name: "診察_ワクチン確認"
    tts_announcement: "今回のご用件は、診察予約でしょうか？ワクチン予約でしょうか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "診察予約"
        - "ワクチン予約"
      mapping:
        - input: "1 / 1番 / 前半 / 診察 / 検査 / 診療 / 検診 / 診察予約 / 診療の予約"
          output: "診察予約"
        - input: "2 / 2番 / 後半 / ワクチン / ワクチン予約 / ワクチンの予約 / インフルエンザ / 予防接種 / 接種"
          output: "ワクチン予約"
      no_result_condition: "上記いずれにも該当しない場合 → NO_RESULT で再聴取"
    save_to: "classification"
    next_step: "（条件分岐: 診察予約→受診歴, ワクチン予約→ワクチン_診察券番号）"
    retry_failure: "end_failure"
    notes: "classification を上書き（「診療予約」→「診察予約」or「ワクチン予約」）"

  - step_name: "受診歴"
    tts_announcement: "過去に当院を受診されたことはございますでしょうか？「はい」または「いいえ」でお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "初診"
        - "再診"
      mapping:
        - input: "はい / そうです / 通院中 / 通っています / 再診 / 半年以内に受診歴有り"
          output: "再診"
        - input: "いいえ / 違います / 初めてです / 初診 / 半年以内に受診歴無し"
          output: "初診"
      no_result_condition: "「わからない」「わかりません」または不明回答 → NO_RESULT で再聴取"
    save_to: "Medical_history"
    next_step: "（条件分岐: 初診→紹介状の有無, 再診→診察予約_診察券番号）"
