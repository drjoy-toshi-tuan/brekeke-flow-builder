    save_to: "unavailableDate"
    next_step: "症状"
    retry_failure: "skip"
    notes: "「ない」入力時は「特に無し」を格納。復唱禁止"

  - step_name: "症状"
    tts_announcement: "次に、現在の症状を簡潔にお話しください。どうぞ。"
    input_method: "voice_only"
    save_to: "disease"
    next_step: "受診歴_終話判定"
    retry_failure: "skip"
    notes: "「風」入力時は「風邪」に正規化"

  - step_name: "ワクチン種類"
