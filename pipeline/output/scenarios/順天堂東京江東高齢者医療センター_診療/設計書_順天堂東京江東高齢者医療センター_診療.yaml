        - "不承"
      mapping:
        - input: "はい / OK / 問題ない / 払います / 了承します"
          output: "了承"
        - input: "いいえ / 了承しない / ダメ / けっこうです / 払いません"
          output: "不承"
      no_result_condition: "上記いずれにも該当しない → NO_RESULT で再聴取"
    save_to: "selectedExpenses"
    next_step: "（条件分岐: 不承→END_選定療養費不承, 了承→診察予約_診療科）"
    retry_failure: "end_failure"

  - step_name: "医療機関名"
    tts_announcement: "紹介状をお手元にご用意のうえ、紹介状に記載されている紹介元医療機関をお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
