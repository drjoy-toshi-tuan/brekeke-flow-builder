# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【status 値の施設要件】customer_doc 仕様: 1=各終話完了, 7=非通知拒否, 8=かけ直し案内, 9=選定療養費不承。Gen2 の 0（途中切断/冒頭切断）は Gen3 で未確定扱い（call_complete 未呼出で運用上問題なし）"
  - "【smsFlag 値の施設要件】1=診察予約（受診歴無し or 有り）, 2=ワクチン予約, 3=予約変更, 4=キャンセル, 5=予約日時確認, 0=代表案内系（非通知/かけ直し案内/選定療養費不承）"
  - "【classification 二段確定】用件 hearing で「診療予約」と一旦格納 → 診察_ワクチン確認 で「診察予約」または「ワクチン予約」に上書き。Dr.JOY 画面表示は最終値のみ。OpenAI プロンプト設計時に「診療予約」中間値を意識すること"
  - "【classification 別の聴取項目厳守】（customer_doc に「他項目聴取絶対禁止」と複数回明記）診察予約=多項目, ワクチン予約=3 項目（診察券番号/ワクチン種類/都合が悪い日）, 予約変更=7 項目, キャンセル=5 項目（都合が悪い日聴取禁止）, 予約日時確認=2 項目（診察券番号/診療科のみ）"
  - "【個人情報聴取中の用件先取り防御】続柄・氏名・生年月日・連絡先電話番号の聴取中に「予約取りたい」等の用件キーワードが入力されても classification に格納禁止 → 再聴取扱い。OpenAI プロンプトに「用件キーワードでも該当聴取項目の再聴取トリガー」を明記（director → prompter 受渡）"
  - "【「わからない」格納値の正規化】medicalCardNumber=「わからない」/ clinicalDepartment=「登録なし」（聴取失敗時も同様）/ institution=「わからない」/ doctorOrclinic=「希望無し」/ clinicalDepartment2=「無い」/ unavailableDate=「特に無し」"
  - "【復唱可能項目】予約日（現在の予約日）/ 生年月日 / 連絡先電話番号 の 3 項目のみ。それ以外（氏名・診察券番号・診療科・複数診療科・受診歴・紹介状の有無・選定療養費・医療機関名・医師名・症状・理由・残薬確認・問い合わせ内容・都合が悪い日）は復唱絶対禁止（即時次ステップ遷移）"
  - "【SSML/<dtmf>タグの取扱い】customer_doc 原文は `<speak type=\"telephone\">` `<dtmf digit=\"1\"/>` 等の SSML を「変更不可コード」として大量使用。Gen3 では TTS テキストへの SSML 含有を禁止し、DTMF 受付は STT モジュールの dtmf_max_length / termdtmf で表現。電話番号復唱は scaffold の echo_back（Re-confirmation node, confirmation_type=telephone）で実現"
  - "【STT 救済キーワード】customer_doc §3 判断ルールの音響誤認識補正（「社長は」→昭和、「修正/先生」→平成 [生年月日のみ]、「ルパン人」→本人 [続柄のみ]、「DM/PD/PHがいます」→否定形 [Yes/No のみ]、「PD」→いいえ、「変更保険」→健康保険、「いろんな種」→利用なし、等）は OpenAI プロンプトで吸収する設計。AmiVoice 辞書（profile_words）には診療科読みのみ登録"
  - "【FAQ 確認 §10】customer_doc に FAQ 確認ルール定義あり（聴取中の逆質問対応・「回答不可」案内）。しかし FAQ ナレッジ実体が未提供のため、当面 RAG サブフロー無しで構築。FAQ ナレッジ提供後に rag_subflow.pattern: 3 への切替を検討"
  - "【「不要な発話」の禁止リスト】customer_doc §1-1: 「かしこまりました／承知いたしました／承りました／受け取りました」「ありがとうございます／お気軽に」は冒頭・終話・代表案内以外で使用禁止。prompter ハードルールとして注入"
  - "【identityConfirm（続柄）のフリーワード保持】「姉です」をそのまま identityConfirm に格納（「姉」だけに省略禁止）。output_format: text、復唱・再確認禁止"
  - "【生年月日の和暦変換】「昭和60年4月1日」→ 1985-04-01 のように西暦変換して patientDateOfBirth に yyyy-MM-dd 形式で格納。和暦の補正（社長は→昭和、先生/修正→平成）は OpenAI プロンプトで対応"
  - "【予約日 yyyy-MM-dd 00:00:00】予約変更・キャンセルの「現在の予約日」は時間は付けず日付のみ格納（reservationDate）。echo_back: true で復唱確認あり"
  - "【日付妥当性チェック】最小年=1900年、最大年=今日の日付以下、月=1〜12、月別最大日数（うるう年判定含む）、年=4 桁・月=1-2 桁・日=1-2 桁。範囲外 → 再聴取"
  - "【電話番号聴取の MOBILE/FIXED 分岐仕様】MOBILE 時: 「今おかけいただいている <% incoming_phone_number %> でよろしいですか？」→ Yes=incoming を additionalPhoneNumber に代入 / No=連絡先聴取アナウンス + 復唱。FIXED 時: 通常聴取アナウンス + 復唱。標準電話番号聴取サブフロー側で吸収する想定。標準サブフローに分岐がない場合は scaffold 検証時に拡張または 2 サブフローに分離を再検討"
  - "【END_時間外 の保持】use_acceptance_times: false のため本フローでは END_時間外 経路は実行されないが、テンプレ規約に従い termination_patterns には残置（削除禁止）"

