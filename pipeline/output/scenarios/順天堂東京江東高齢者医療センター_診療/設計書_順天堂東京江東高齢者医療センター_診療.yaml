# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 — 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信（incoming-classifier OTHER 分岐）"
    tts_announcement: "お電話ありがとうございます。順天堂東京江東高齢者医療センターの外来予約専用AI電話です。恐れ入りますが、非通知設定での受付はできません。非通知の設定をオフにして、再度おかけ直しください。それでは失礼いたします。"
    status: "7"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（本フローでは use_acceptance_times=false のため未使用、テンプレ規約に従い保持）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件/受診歴/紹介状/健診結果/選定療養費/予約日 等で 1 回リトライしても有効回答なし）"
    tts_announcement: "申し訳ございません。ご回答内容が確認できませんでした。担当より折り返し連絡のうえ、再確認いたします。それでは失礼いたします。"
    status: "3"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_聴取失敗"
  # --- 正常系（施設要件）---
  - name: "END_診察予約_受診歴無し"
    condition: "classification=診察予約 かつ Medical_history=初診（症状聴取完了後）"
    tts_announcement: "かしこまりました。内容を確認のうえ、休診日を除く3日以内に担当者からショートメール、もしくは、折り返し電話にてご連絡いたします。担当から必ずご連絡いたしますので、お待ちください。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_診察予約_受診歴無し"
  - name: "END_診察予約_受診歴有り"
    condition: "classification=診察予約 かつ Medical_history=再診（症状聴取完了後）"
    tts_announcement: "かしこまりました。もし、前回受診日より半年以上空いている場合には、初診予約となり、選定療養費が発生する可能性がございます。また、内容に応じて所定の紹介状が必要な場合もございますので、予めご了承ください。内容を確認のうえ、3診療日以内に担当者からショートメール、もしくは、折り返し電話にてご連絡いたします。担当から必ご連絡いたしますので、お待ちください。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_診察予約_受診歴有り"
  - name: "END_ワクチン予約"
    condition: "classification=ワクチン予約（都合が悪い日聴取完了後）"
    tts_announcement: "かしこまりました。内容を確認のうえ、休診日を除く3日以内に担当者からショートメール、もしくは、折り返し電話にてご連絡いたします。担当から必ずご連絡いたしますので、お待ちください。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_ワクチン予約"
  - name: "END_予約変更"
    condition: "classification=予約変更（残薬確認聴取完了後）"
    tts_announcement: "かしこまりました。内容を確認のうえ、休診日を除く3日以内に担当者からショートメール、もしくは、折り返し電話にてご連絡いたします。担当から必ずご連絡いたしますので、お待ちください。それでは失礼いたします。"
    status: "1"
    sms_flag: "3"
    completion_flag_name: "完了フラグ_予約変更"
  - name: "END_キャンセル"
    condition: "classification=キャンセル（理由聴取完了後）"
    tts_announcement: "かしこまりました。内容を確認のうえ、休診日を除く3日以内に担当者からショートメール、もしくは、折り返し電話にてご連絡いたします。担当から必ずご連絡いたしますので、お待ちください。それでは失礼いたします。"
    status: "1"
    sms_flag: "4"
    completion_flag_name: "完了フラグ_キャンセル"
  - name: "END_予約日時確認"
    condition: "classification=予約日時確認（診療科聴取完了後）"
    tts_announcement: "かしこまりました。内容を確認のうえ、休診日を除く翌日までに担当者からショートメール、もしくは、折り返し電話にてご連絡いたします。担当から必ずご連絡いたしますので、お待ちください。それでは失礼いたします。"
    status: "1"
    sms_flag: "5"
    completion_flag_name: "完了フラグ_予約日時確認"
