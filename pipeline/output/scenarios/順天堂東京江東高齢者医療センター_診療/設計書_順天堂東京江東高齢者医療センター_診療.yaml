    retry_failure: "end_failure"

  - step_name: "健康診断結果の有無"
    tts_announcement: "医療機関での検査・診察を必要とする健康診断の結果はお持ちでしょうか。「はい」または「いいえ」でお答えください。どうぞ。"
    input_method: "voice_only"
