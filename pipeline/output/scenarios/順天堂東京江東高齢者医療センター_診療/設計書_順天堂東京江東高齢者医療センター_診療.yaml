version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "順天堂東京江東高齢者医療センター"
  scenario_name: "診療"
  group_name: "順天堂東京江東高齢者医療センター"
  flow_name: "順天堂東京江東高齢者医療センター$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: ""
  business_hours: "なし（24時間対応・時間外判定モジュール不要）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "順天堂東京江東高齢者医療センター$診療"
      role: "main"
      description: "外来予約専用 AI 電話。続柄・個人情報（氏名・生年月日・連絡先電話番号）聴取後、用件分岐（診察予約・ワクチン予約・予約変更・キャンセル・予約日時確認）。診察予約は受診歴・紹介状・健診結果による多段分岐あり"
  subflows:
    - name: "順天堂東京江東高齢者医療センター$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "標準氏名聴取サブフロー。カタカナ変換ロジック内蔵。用件キーワード防御は OpenAI プロンプトで対応"
    - name: "順天堂東京江東高齢者医療センター$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "標準生年月日聴取サブフロー。和暦→西暦変換・元号誤認識補正（社長は→昭和、先生/修正→平成 等）を OpenAI プロンプトで対応。復唱（echo_back）あり"
    - name: "順天堂東京江東高齢者医療センター$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "標準電話番号聴取サブフロー。MOBILE 時 incoming_phone_number 確認型・FIXED 時 通常聴取の二択分岐をサブフロー側で実装する想定。標準テンプレで吸収できない場合は scaffold 検証時に拡張または 2 サブフローに分離"
    - name: "順天堂東京江東高齢者医療センター$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "標準診察券番号聴取サブフロー。「わからない」入力時は medicalCardNumber=「わからない」として次ステップへ。本フローでは 5 用件ルート（再診/ワクチン/予約変更/キャンセル/予約日時確認）から共有呼出"

# --- セクション3: フローの目的 ---
purpose: |
  順天堂東京江東高齢者医療センターの外来予約専用 AI 電話。患者または家族からの入電に対し、続柄・氏名・生年月日・連絡先電話番号を聴取後、4 用件（診察予約・予約変更・キャンセル・予約日時確認）を分類し、用件別の必須項目（受診歴・紹介状の有無・健診結果・選定療養費・診療科・診察券番号・予約日 等）を聴取して、Dr.JOY 担当者の折り返し対応・SMS 送信のためのコンテキストを保存する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "順天堂東京江東高齢者医療センター$診療"
    diagram: |
      冒頭(wait + saveContextModel2DB + incoming-classifier)
        ├─ OTHER (非通知) → END_非通知拒否 (status=7, smsFlag=0)
        └─ MOBILE/FIXED → 冒頭_アナウンス
                            ↓
                          続柄 (text → identityConfirm)
                            ↓
                          氏名聴取 (subflow → patientName)
                            ↓
                          生年月日聴取 (subflow → patientDateOfBirth, recitation あり)
                            ↓
                          電話番号聴取 (subflow → additionalPhoneNumber, MOBILE/FIXED 分岐, recitation あり)
                            ↓
                          用件 (enum 4-value, DTMF 1=診療予約/2=予約変更/3=キャンセル/4=予約日時確認)
                            ├─ 診療予約 → 診察_ワクチン確認 (enum 2-value)
                            │              ├─ 診察予約 → 受診歴 (enum)
                            │              │              ├─ 初診 → 紹介状の有無 (enum)
                            │              │              │            ├─ 紹介状有り → 医療機関名 (enum, わからない分岐)
                            │              │              │            │                  ├─ わからない → END_かけ直し案内 (status=8)
                            │              │              │            │                  └─ other → 診察予約_診療科
                            │              │              │            └─ 紹介状無し → 健康診断結果の有無 (enum)
                            │              │              │                              ├─ 健診結果有り → 選定療養費案内 (announcement) → 診察予約_診療科
                            │              │              │                              └─ 健診結果無し → 選定療養費 (enum)
                            │              │              │                                                ├─ 不承 → END_選定療養費不承 (status=9)
                            │              │              │                                                └─ 了承 → 診察予約_診療科
                            │              │              └─ 再診 → 診察予約_診察券番号 (subflow) → 診察予約_診療科
                            │              │                       診察予約_診療科 → 診察予約_複数診療科 → 医師名_専門外来名 → 診察予約_都合が悪い日 → 症状 → 受診歴_終話判定 (context_match_router)
                            │              │                                                                                                                       ├─ 初診 → END_診察予約_受診歴無し (status=1, smsFlag=1)
                            │              │                                                                                                                       └─ other → END_診察予約_受診歴有り (status=1, smsFlag=1)
                            │              └─ ワクチン予約 → ワクチン_診察券番号 (subflow) → ワクチン種類 → ワクチン_都合が悪い日 → END_ワクチン予約 (status=1, smsFlag=2)
                            ├─ 予約変更 → 予約変更_診察券番号 (subflow) → 予約変更_診療科 → 予約変更_複数診療科 → 予約変更_現在の予約日 (datetime, echo_back あり) → 予約変更_都合が悪い日 → 予約変更_理由 → 残薬確認 → END_予約変更 (status=1, smsFlag=3)
                            ├─ キャンセル → キャンセル_診察券番号 (subflow) → キャンセル_診療科 → キャンセル_複数診療科 → キャンセル_現在の予約日 (datetime, echo_back あり) → キャンセル_理由 → END_キャンセル (status=1, smsFlag=4)
                            └─ 予約日時確認 → 予約日時確認_診察券番号 (subflow) → 予約日時確認_診療科 → END_予約日時確認 (status=1, smsFlag=5)
    notes: |
      - 営業時間判定は不要（customer_doc に時間外特例案内なし）。use_acceptance_times: false。
      - 非通知拒否は incoming-classifier の OTHER 分岐 + END_非通知（status=7 に上書き）で実現。
      - 受診歴判定は context_match_router で Medical_history（OpenAI_受診歴 の出力）を参照。初診/再診で別終話文言。
      - 用件キーワード防御（個人情報聴取中に「予約取りたい」等が入力されても classification に格納禁止）は各サブフロー / 続柄 hearing の OpenAI プロンプトで対応。

# --- セクション4b: シナリオフロー定義 ---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 続柄

  # --- 続柄聴取 ---
  - step: 続柄
    type: hearing
    output_format: text
    save_to: "identityConfirm"
    next: 氏名聴取
    notes: "フリーワード格納（「姉です」をそのまま identityConfirm に格納。「姉」だけへの省略禁止）。用件キーワード防御（予約・変更・キャンセル等の用件入力は再聴取扱い）は prompter 側で OpenAI プロンプトに反映"

  # --- 個人情報聴取（標準サブフロー 3 枠）---
  - step: 氏名聴取
    type: subflow
    flowname: "順天堂東京江東高齢者医療センター$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "順天堂東京江東高齢者医療センター$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "順天堂東京江東高齢者医療センター$電話番号聴取"
    next: 用件

  # --- 用件分岐（Pattern A: OpenAI 直後分岐）---
  - step: 用件
    type: hearing
    output_format: enum
    save_to: "classification"
    conditions:
      - match: "診療予約"
        next: 診察_ワクチン確認
      - match: "予約変更"
        next: 予約変更_診察券番号
      - match: "キャンセル"
        next: キャンセル_診察券番号
      - match: "other"   # = 予約日時確認（4 値目）
        next: 予約日時確認_診察券番号
    notes: "DTMF 1=診療予約, 2=予約変更, 3=キャンセル, 4=予約日時確認。<dtmf digit='1'/> 等の SSML は Gen3 では TTS に含めず stt_type=DTMF_AmiVoice + dtmf_max_length=1 で表現"

  # --- 診察/ワクチン確認（diagnosed 専用、classification 二段確定）---
  - step: 診察_ワクチン確認
    type: hearing
    output_format: enum
    save_to: "classification"
    conditions:
      - match: "診察予約"
        next: 受診歴
      - match: "other"   # = ワクチン予約
        next: ワクチン_診察券番号
    notes: "classification を「診療予約」から「診察予約」or「ワクチン予約」に上書き。voice-only（DTMF なし）"

  # ==========================================================
  # 診察予約ルート（classification = 診察予約）
  # ==========================================================
  - step: 受診歴
    type: hearing
    output_format: enum
    save_to: "Medical_history"
    conditions:
      - match: "初診"
        next: 紹介状の有無
      - match: "other"   # = 再診
        next: 診察予約_診察券番号
    notes: "Yes/No 二値（はい=再診/いいえ=初診）。「わからない」入力は NO_RESULT 扱いで再聴取（customer_doc 仕様）"

  - step: 紹介状の有無
    type: hearing
    output_format: enum
    save_to: "introductionLetter"
    conditions:
      - match: "紹介状有り"
        next: 医療機関名
      - match: "other"   # = 紹介状無し
        next: 健康診断結果の有無
    notes: "Yes/No 二値（はい=紹介状有り/いいえ=紹介状無し）"

  - step: 健康診断結果の有無
    type: hearing
    output_format: enum
    save_to: "healthcheckResult"
    conditions:
      - match: "健康診断結果有り"
        next: 選定療養費案内
      - match: "other"   # = 健康診断結果無し
        next: 選定療養費
    notes: "Yes/No 二値（はい=健診結果有り/いいえ=健診結果無し）"

  - step: 選定療養費案内
    type: announcement
    next: 診察予約_診療科
    notes: "案内目的のみ。ユーザー応答を待たず即座に次ステップへ進む"

  - step: 選定療養費
    type: hearing
    output_format: enum
    save_to: "selectedExpenses"
    conditions:
      - match: "不承"
        next: END_選定療養費不承
      - match: "other"   # = 了承
        next: 診察予約_診療科
    notes: "Yes/No 二値（はい=了承/いいえ=不承）。不承時は selectedExpenses='不承' を同時格納（終話側で実施）"

  - step: 医療機関名
    type: hearing
    output_format: enum
    save_to: "institution"
    conditions:
      - match: "わからない"
        next: END_かけ直し案内
      - match: "other"   # = 医療機関名が回答された
        next: 診察予約_診療科
    notes: "OpenAI は「わからない」を示す表現を「わからない」と分類し、それ以外は紹介元医療機関名の raw text を institution に格納。「わからない」分類時は END_かけ直し案内 (status=8) で終話"

  - step: 診察予約_診察券番号
    type: subflow
    flowname: "順天堂東京江東高齢者医療センター$診察券番号聴取"
    next: 診察予約_診療科

  - step: 診察予約_診療科
    type: hearing
    output_format: enum
    save_to: "clinicalDepartment"
    no_result_default: "登録なし"
    next: 診察予約_複数診療科
    notes: "「わからない」入力時 / 聴取失敗時は clinicalDepartment='登録なし' を格納（customer_doc 明示仕様）"

  - step: 診察予約_複数診療科
    type: hearing
    output_format: text
    save_to: "clinicalDepartment2"
    next: 医師名_専門外来名
    notes: "フリーワード格納。「ないです」等の否定表現は OpenAI で「無い」に正規化して格納"

  - step: 医師名_専門外来名
    type: hearing
    output_format: text
    save_to: "doctorOrclinic"
    next: 診察予約_都合が悪い日
    notes: "「希望なし」を示す表現は「希望無し」に正規化して格納"

  - step: 診察予約_都合が悪い日
    type: hearing
    output_format: text
    save_to: "unavailableDate"
    next: 症状
    notes: "「ないです」等の否定表現は「特に無し」に正規化して格納。復唱禁止"

  - step: 症状
    type: hearing
    output_format: text
    save_to: "disease"
    next: 受診歴_終話判定
    notes: "「風」入力時は「風邪」に正規化"

  - step: 受診歴_終話判定
    type: context_match_router
    reference_module: "OpenAI_受診歴"
    conditions:
      - match: "初診"
        next: END_診察予約_受診歴無し
      - match: "other"   # = 再診
        next: END_診察予約_受診歴有り

  # ==========================================================
  # ワクチン予約ルート（classification = ワクチン予約）
  # 厳守項目: 診察券番号 → ワクチン種類 → 都合が悪い日 の 3 項目のみ
  # ==========================================================
  - step: ワクチン_診察券番号
    type: subflow
    flowname: "順天堂東京江東高齢者医療センター$診察券番号聴取"
    next: ワクチン種類

  - step: ワクチン種類
    type: hearing
    output_format: text
    save_to: "vaccineType"
    next: ワクチン_都合が悪い日
    notes: "フリーワード格納。ユーザー回答をそのまま受付"

  - step: ワクチン_都合が悪い日
    type: hearing
    output_format: text
    save_to: "unavailableDate"
    next: END_ワクチン予約

  # ==========================================================
  # 予約変更ルート（classification = 予約変更）
  # 厳守項目: 診察券番号 → 診療科 → 複数診療科 → 現在の予約日 → 都合が悪い日 → 理由 → 残薬確認 の 7 項目
  # ==========================================================
  - step: 予約変更_診察券番号
    type: subflow
    flowname: "順天堂東京江東高齢者医療センター$診察券番号聴取"
    next: 予約変更_診療科

  - step: 予約変更_診療科
    type: hearing
    output_format: enum
    save_to: "clinicalDepartment"
    no_result_default: "登録なし"
    next: 予約変更_複数診療科

  - step: 予約変更_複数診療科
    type: hearing
    output_format: text
    save_to: "clinicalDepartment2"
    next: 予約変更_現在の予約日
    notes: "「変更を希望する診療科」のフリーワード格納。「ないです」等は「無い」に正規化"

  - step: 予約変更_現在の予約日
    type: hearing
    output_format: datetime
    save_to: "reservationDate"
    echo_back: true
    next: 予約変更_都合が悪い日
    notes: "yyyy-MM-dd 00:00:00 形式で格納。復唱（echo_back）あり"

  - step: 予約変更_都合が悪い日
    type: hearing
    output_format: text
    save_to: "unavailableDate"
    next: 予約変更_理由

  - step: 予約変更_理由
    type: hearing
    output_format: text
    save_to: "reason"
    next: 残薬確認
    notes: "予約変更の理由をフリーワード格納"

  - step: 残薬確認
    type: hearing
    output_format: text
    save_to: "remainingMedicineCheck"
    next: END_予約変更
    notes: "服用中の薬の残り日数。フリーワード格納"

  # ==========================================================
  # キャンセルルート（classification = キャンセル）
  # 厳守項目: 診察券番号 → 診療科 → 複数診療科 → 現在の予約日 → 理由 の 5 項目
  # ※「都合が悪い日」は絶対聴取禁止
  # ==========================================================
  - step: キャンセル_診察券番号
    type: subflow
    flowname: "順天堂東京江東高齢者医療センター$診察券番号聴取"
    next: キャンセル_診療科

  - step: キャンセル_診療科
    type: hearing
    output_format: enum
    save_to: "clinicalDepartment"
    no_result_default: "登録なし"
    next: キャンセル_複数診療科

  - step: キャンセル_複数診療科
    type: hearing
    output_format: text
    save_to: "clinicalDepartment2"
    next: キャンセル_現在の予約日
    notes: "「キャンセルを希望する診療科」のフリーワード格納"

  - step: キャンセル_現在の予約日
    type: hearing
    output_format: datetime
    save_to: "reservationDate"
    echo_back: true
    next: キャンセル_理由
    notes: "復唱（echo_back）あり"

  - step: キャンセル_理由
    type: hearing
    output_format: text
    save_to: "reason"
    next: END_キャンセル
    notes: "キャンセルの理由をフリーワード格納"

  # ==========================================================
  # 予約日時確認ルート（classification = 予約日時確認）
  # 厳守項目: 診察券番号 → 診療科 の 2 項目のみ
  # ==========================================================
  - step: 予約日時確認_診察券番号
    type: subflow
    flowname: "順天堂東京江東高齢者医療センター$診察券番号聴取"
    next: 予約日時確認_診療科

  - step: 予約日時確認_診療科
    type: hearing
    output_format: enum
    save_to: "clinicalDepartment"
    no_result_default: "登録なし"
    next: END_予約日時確認

  # ==========================================================
  # 終話ブロック
  # ==========================================================
  - step: END_診察予約_受診歴無し
    type: termination
    termination_ref: "END_診察予約_受診歴無し"

  - step: END_診察予約_受診歴有り
    type: termination
    termination_ref: "END_診察予約_受診歴有り"

  - step: END_ワクチン予約
    type: termination
    termination_ref: "END_ワクチン予約"

  - step: END_予約変更
    type: termination
    termination_ref: "END_予約変更"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_予約日時確認
    type: termination
    termination_ref: "END_予約日時確認"

  - step: END_選定療養費不承
    type: termination
    termination_ref: "END_選定療養費不承"

  - step: END_かけ直し案内
    type: termination
    termination_ref: "END_かけ直し案内"

