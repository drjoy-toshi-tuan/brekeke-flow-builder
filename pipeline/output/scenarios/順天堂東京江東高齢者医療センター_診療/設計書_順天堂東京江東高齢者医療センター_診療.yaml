          output: "健康診断結果有り"
        - input: "いいえ / 持っていない / ない / ありません"
          output: "健康診断結果無し"
      no_result_condition: "上記いずれにも該当しない → NO_RESULT で再聴取"
    save_to: "healthcheckResult"
    next_step: "（条件分岐: 健診結果有り→選定療養費案内, 健診結果無し→選定療養費）"
    retry_failure: "end_failure"

  - step_name: "選定療養費案内"
    tts_announcement: "健康診断の結果をお持ちですね。健康診断の結果によっては、初診時選定療養として、7,700円を全額自己負担していただく可能性があるため、折り返し担当者より確認のご連絡をさせていただきます。"
