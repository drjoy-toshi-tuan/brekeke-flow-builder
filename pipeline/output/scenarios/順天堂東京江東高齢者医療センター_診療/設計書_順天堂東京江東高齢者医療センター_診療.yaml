  - module_name: "冒頭_アナウンス"
    purpose: "通常冒頭アナウンス（incoming-classifier MOBILE/FIXED 後）"
    announcement: "お電話ありがとうございます。順天堂東京江東高齢者医療センターの外来予約専用AI電話です。当日緊急受診をご希望の場合は代表電話へおかけ直しください。これから流れる質問に沿ってご回答ください。"

  - module_name: "続柄"
    purpose: "本人/ご家族やその他の聴取"
    announcement: "今お電話をいただいている方の続柄を次の中からお話しください。患者さまご本人、ご家族、その他、どうぞ。"

  - module_name: "用件"
    purpose: "4 用件の DTMF/音声入力聴取"
    announcement: "診察券、予約票など診察券番号がわかるものをお手元にご用意ください。次の4つのうちのいずれかでご用件をお話しください。1, 予約を取る、2, 予約を変更する、3, 予約をキャンセルする、4, 予約日時の確認。"

  - module_name: "診察_ワクチン確認"
    purpose: "診察予約 / ワクチン予約 の二択分岐"
    announcement: "今回のご用件は、診察予約でしょうか？ワクチン予約でしょうか？"

  - module_name: "受診歴"
    purpose: "Yes/No: 過去受診歴"
    announcement: "過去に当院を受診されたことはございますでしょうか？「はい」または「いいえ」でお答えください。どうぞ。"

  - module_name: "紹介状の有無"
    purpose: "Yes/No: 紹介状の有無"
    announcement: "他の医療機関からの紹介状はお持ちでしょうか。「はい」または「いいえ」でお答えください。どうぞ。"

  - module_name: "健康診断結果の有無"
