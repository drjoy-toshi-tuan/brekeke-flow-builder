# 確認レポート: output/scenarios/順天堂東京江東高齢者医療センター_診療/確認レポート_順天堂東京江東高齢者医療センター_診療_20260520.md
# 元資料: docs/reference/customer_docs/【診療1】：順天堂東京江東高齢者医療センター.md
