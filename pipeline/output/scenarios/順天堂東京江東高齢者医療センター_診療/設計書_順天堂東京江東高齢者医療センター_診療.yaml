        - input: "<医療機関名を含む発話>"
          output: "other"   # 実際の institution context には発話に含まれる医療機関名の raw text を格納
      no_result_condition: "聴取失敗時 → NO_RESULT で再聴取"
    save_to: "institution"
    next_step: "（条件分岐: わからない→END_かけ直し案内, other（=医療機関名 raw text）→診察予約_診療科）"
    retry_failure: "end_failure"

  - step_name: "診察予約_診療科"
