    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（土曜日曜祝日 / 平日 13 時前 17 時以降 / 年末年始 12/31〜1/4）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、土曜日曜祝日を除く、平日の13時から17時となっております。恐れ入りますが、受付時間内におかけなおしください。"
