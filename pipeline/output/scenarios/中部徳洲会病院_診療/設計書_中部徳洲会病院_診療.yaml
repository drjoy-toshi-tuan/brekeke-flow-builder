# 設計書 — 中部徳洲会病院 診療
# 生成元: @director エージェント
# 生成日: 2026/05/01
# 確認レポート: output/scenarios/中部徳洲会病院_診療/確認レポート_中部徳洲会病院_診療_20260501.md
# ベース: docs/migration/gen1_中部徳洲会病院_診療.md (Gen1→Gen3 移管) + commubo抽出 yaml 12 本
#
# 主要設計ポイント:
#   - 用件は 7 enum: 再診 / 初診 / 予約変更 / 予約キャンセル / 確認 / 予防接種 / 健診
#   - 用件=健診 → 0570-001-789 案内終話 (転送なし)
#   - 用件=予防接種 → ワクチン名聴取 → 診療科聴取
#   - 用件=初診 → 紹介状有無聴取 (なし時 7000円自己負担案内) → 診療科聴取
#   - 診療科 4 種は call_transfer (歯科口腔外科/リハビリテーション科/放射線科/健康管理センター)
#   - 用件=変更 → 予約日 + 希望日聴取、用件=キャンセル → 予約日 + 理由聴取
#   - 個人情報サブフロー連鎖: 氏名 → 生年月日 → 電話番号 (診察券番号は gen1 に存在しないため未使用)
#   - 終話 CMR は 用件で 3 終話に集約 (変更/確認, 予約系=初診/再診/予防接種, キャンセル)
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "中部徳洲会病院"
  scenario_name: "診療"
  group_name: "中部徳洲会病院"
  flow_name: "中部徳洲会病院$診療"
  target_facility: "中部徳洲会病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "098-923-1091"
  business_hours: "土曜日曜祝日・年末年始(12/31〜1/4)を除く、平日 13:00-17:00"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "中部徳洲会病院$診療"
      role: "main"
      description: "冒頭チェーン → 用件確認 (7 enum + 復唱) → 用件別前段聴取 (健診/予防接種/紹介状) → 診療科聴取 (4 転送 + 通常ルート) → 用件後段聴取 (変更=予約日+希望日, キャンセル=予約日+理由) → 個人情報サブフロー連鎖 (氏名→生年月日→電話番号) → 用件別終話 (3 集約)"

  subflows:
    - name: "中部徳洲会病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的JSONコピー。Gen1 元 yaml 仕様: 復唱なし (聞き取り完了 = 「ありがとうございます。」のみ)"

    - name: "中部徳洲会病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的JSONコピー。DOB Re-confirmation あり。Gen1 旧:生年月日聴取 (和暦/西暦自動判別) を新フリー版に統一して移管 (移管ノート director 判断)"

    - name: "中部徳洲会病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10 準拠。静的JSONコピー。incoming-classifier→携帯確認/連絡先聴取→Phone Normalization→復唱確認→携帯判別→結果返却。Gen1 の電話番号区切り.yaml/電話種別.yaml/新:連絡先聴取.yaml はサブフロー内部の incoming-classifier ベース処理に集約"

# --- セクション3: フローの目的 ---
purpose: "中部徳洲会病院 (098-923-1091) への予約専用ダイヤル。患者からの電話を受け、用件 (再診 / 初診 / 予約変更 / 予約キャンセル / 確認 / 予防接種 / 健診) を判定し、用件と診療科に応じて (a) AI 受付 → 個人情報聴取 → 折り返し対応、(b) AI 非対応診療科 4 種 (歯科口腔外科 / リハビリテーション科 / 放射線科 / 健康管理センター) への転送、(c) 健診直通ダイヤル 0570-001-789 の音声案内、(d) 紹介状なし初診への 7000 円自己負担案内 のいずれかに振り分ける。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "中部徳洲会病院$診療"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(saveCompletionFlag2db, status=2, smsFlag=-1)
            │            → 非通知_アナウンス(TTS) → 切断
            └─ 通常/携帯/固定/その他 → acceptance_times
                          ├─ 時間外 → 完了フラグ_時間外(saveCompletionFlag2db, status=6, smsFlag=-1)
                          │            → 時間外_アナウンス(TTS, 平日 13:00-17:00 / 年末年始 12/31-1/4 休止) → 切断
                          └─ 受付可 → 冒頭_アナウンス(TTS)

      ─── 用件確認（Pattern A + echo_back）───
      冒頭_アナウンス → 用件確認(TTS+STT+OpenAI+Retry+save2db, echo_back=true)
        ├─ 再診 → 診療科聴取
        ├─ 初診 → 紹介状有無
        ├─ 予約変更 → 診療科聴取
        ├─ 予約キャンセル → 診療科聴取
        ├─ 確認 → 診療科聴取
        ├─ 予防接種 → ワクチン名聴取
        ├─ 健診 → END_健診_案内 (0570-001-789)
        └─ other → END_聴取失敗

      ─── 紹介状有無（初診ルート）───
      紹介状有無(hearing, enum)
        ├─ あり → 診療科聴取
        └─ なし → 紹介状なし_案内(announcement, 7000円自己負担) → 診療科聴取

      ─── ワクチン名聴取（予防接種ルート）───
      ワクチン名聴取(hearing, text) → 診療科聴取

      ─── 診療科聴取（用件=変更/キャンセル/確認/再診/初診/予防接種 共通）───
      診療科聴取(hearing, enum, no_result_default=登録なし)
        ├─ 歯科口腔外科 → 歯科口腔外科_転送ガイダンス → 歯科口腔外科_転送(call_transfer, 098-923-1076)
        ├─ リハビリテーション科 → リハビリテーション科_転送ガイダンス → リハビリテーション科_転送(call_transfer, 098-923-2645)
        ├─ 放射線科 → 放射線科_転送ガイダンス → 放射線科_転送(call_transfer, 098-923-0264)
        ├─ 健康管理センター → 健康管理センター_転送ガイダンス → 健康管理センター_転送(call_transfer, 098-932-7555)
        └─ other (登録なし含む) → CMR_用件後段

      ─── CMR_用件後段（用件で分岐）───
      CMR_用件後段(ContextMatchRouter, reference_module=OpenAI_用件確認)
        ├─ 予約変更 → 変更_予約日(TTS)
        ├─ 予約キャンセル → キャンセル_予約日(TTS)
        ├─ 確認 / 再診 / 初診 / 予防接種 → 氏名聴取
        └─ other → 氏名聴取(フォールバック)

      ─── 予約変更ルート ───
      変更_予約日(hearing, datetime) → 変更_希望日(hearing, datetime) → 氏名聴取

      ─── 予約キャンセルルート ───
      キャンセル_予約日(hearing, datetime) → キャンセル_理由(hearing, text) → 氏名聴取

      ─── 個人情報サブフロー連鎖（共通）───
      氏名聴取(subflow) → 生年月日聴取(subflow) → 電話番号聴取(subflow) → CMR_終話分岐

      ─── CMR_終話分岐（用件で終話 TTS を 3 集約）───
      CMR_終話分岐(ContextMatchRouter, reference_module=OpenAI_用件確認)
        ├─ 予約変更 / 確認 → END_変更確認_完了(TTS, 折り返し連絡で予約変更が確定)
        ├─ 初診 / 再診 / 予防接種 → END_予約_完了(TTS, 折り返し連絡で予約が確定)
        ├─ 予約キャンセル → END_キャンセル_完了(TTS, キャンセル承りました)
        └─ other → END_予約_完了(フォールバック)

      ─── 転送ブロック共通（call_transfer 自動補完）───
      {診療科}_転送 (call_transfer, transfer_type=Blind Transfer)
        ├─ 成功 → 完了フラグ_転送成功(status=3) → END_転送成功 → 切断 (scaffold 自動)
        └─ 失敗 → 転送失敗_アナウンス → 完了フラグ_転送失敗(status=9) → END_転送失敗 → 切断 (scaffold 自動)
    notes: |
      Gen1 commubo の 90+ 個の「箱」を Gen3 9 ブロック型にマッピング。
      用件確認は Pattern A + echo_back=true（汎用 #data# 復唱）。
      診療科は Pattern B（後段 CMR_用件後段）で用件×診療科の組合せで分岐。
      個人情報サブフローは Gen1 順序維持: 氏名→生年月日→電話番号 (診察券番号は Gen1 に存在しないため Gen3 でも省略)。
      Gen1 の 「用件聴取できずCP → 医師事務へ転送」フォールバックは END_聴取失敗 で切断に統一 (NON-BLOCKER N-3)。
      Gen1 の 二次健診分岐 (二次健診判断へ / 二次検診の確認) は Gen3 では未実装 (NON-BLOCKER N-4)。
      Gen1 の 携帯判別→予約不要案内 (SMS外来表) は Gen3 では予約終話に統一し、SMS送信は smsFlag=1 で表現 (NON-BLOCKER N-5)。

  # サブフローのフロー図は静的JSONコピーのため省略

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック（2 ブロック 1 セット必須）===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # === 用件確認（Pattern A + echo_back）===
  - step: 用件確認
    type: hearing
    output_format: enum
    save_to: classification
    echo_back: true
    conditions:
      - match: "再診"
        next: 診療科聴取
      - match: "初診"
        next: 紹介状有無
      - match: "予約変更"
        next: 診療科聴取
      - match: "予約キャンセル"
        next: 診療科聴取
      - match: "確認"
        next: 診療科聴取
      - match: "予防接種"
        next: ワクチン名聴取
      - match: "健診"
        next: END_健診_案内
      - match: "other"
        next: END_聴取失敗

  # === 紹介状有無（初診ルート）===
  - step: 紹介状有無
    type: hearing
    output_format: enum
    save_to: hasReferralLetter
    conditions:
      - match: "あり"
        next: 診療科聴取
      - match: "なし"
        next: 紹介状なし_案内
      - match: "other"
        next: 診療科聴取

  - step: 紹介状なし_案内
    type: announcement
    next: 診療科聴取

  # === ワクチン名聴取（予防接種ルート）===
  - step: ワクチン名聴取
    type: hearing
    output_format: text
    save_to: vaccineName
    next: 診療科聴取

  # === 診療科聴取（用件 6 種共通）===
  - step: 診療科聴取
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "歯科口腔外科"
        next: 歯科口腔外科_転送ガイダンス
      - match: "リハビリテーション科"
        next: リハビリテーション科_転送ガイダンス
      - match: "放射線科"
        next: 放射線科_転送ガイダンス
      - match: "健康管理センター"
        next: 健康管理センター_転送ガイダンス
      - match: "other"
        next: CMR_用件後段

  # === CMR_用件後段（用件で分岐: 変更/キャンセル/その他）===
  - step: CMR_用件後段
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: 変更_予約日
      - match: "予約キャンセル"
        next: キャンセル_予約日
      - match: "other"
        next: 氏名聴取

  # === 予約変更ルート ===
  - step: 変更_予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 変更_希望日

  - step: 変更_希望日
    type: hearing
    output_format: datetime
    save_to: desiredReservationDate
    next: 氏名聴取

  # === 予約キャンセルルート ===
  - step: キャンセル_予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: キャンセル_理由

  - step: キャンセル_理由
    type: hearing
    output_format: text
    save_to: reason
    next: 氏名聴取

  # === 個人情報サブフロー連鎖 ===
  - step: 氏名聴取
    type: subflow
    flowname: "中部徳洲会病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "中部徳洲会病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "中部徳洲会病院$電話番号聴取"
    next: CMR_終話分岐

  # === CMR_終話分岐（用件で 3 終話に集約）===
  - step: CMR_終話分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: END_変更確認_完了
      - match: "確認"
        next: END_変更確認_完了
      - match: "初診"
        next: END_予約_完了
      - match: "再診"
        next: END_予約_完了
      - match: "予防接種"
        next: END_予約_完了
      - match: "予約キャンセル"
        next: END_キャンセル_完了
      - match: "other"
        next: END_予約_完了

  # === 転送ガイダンス・call_transfer 群 ===
  - step: 歯科口腔外科_転送ガイダンス
    type: announcement
    next: 歯科口腔外科_転送

  - step: 歯科口腔外科_転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "大変申し訳ございません。只今お電話が混み合っております。恐れ入りますが、098-923-1091へおかけなおしください。電話番号を再度申し上げます。098-923-1091へおかけなおしください。"
    conditions:
      - match: "success"
        next: END_転送成功
      - match: "failure"
        next: END_転送失敗

  - step: リハビリテーション科_転送ガイダンス
    type: announcement
    next: リハビリテーション科_転送

  - step: リハビリテーション科_転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "大変申し訳ございません。只今お電話が混み合っております。恐れ入りますが、098-923-1091へおかけなおしください。電話番号を再度申し上げます。098-923-1091へおかけなおしください。"
    conditions:
      - match: "success"
        next: END_転送成功
      - match: "failure"
        next: END_転送失敗

  - step: 放射線科_転送ガイダンス
    type: announcement
    next: 放射線科_転送

  - step: 放射線科_転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "大変申し訳ございません。只今お電話が混み合っております。恐れ入りますが、098-923-1091へおかけなおしください。電話番号を再度申し上げます。098-923-1091へおかけなおしください。"
    conditions:
      - match: "success"
        next: END_転送成功
      - match: "failure"
        next: END_転送失敗

  - step: 健康管理センター_転送ガイダンス
    type: announcement
    next: 健康管理センター_転送

  - step: 健康管理センター_転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "大変申し訳ございません。只今お電話が混み合っております。恐れ入りますが、098-923-1091へおかけなおしください。電話番号を再度申し上げます。098-923-1091へおかけなおしください。"
    conditions:
      - match: "success"
        next: END_転送成功
      - match: "failure"
        next: END_転送失敗

  # === 終話ブロック群 ===
  - step: END_予約_完了
    type: termination
    termination_ref: "END_予約_完了"

  - step: END_変更確認_完了
    type: termination
    termination_ref: "END_変更確認_完了"

  - step: END_キャンセル_完了
    type: termination
    termination_ref: "END_キャンセル_完了"

  - step: END_健診_案内
    type: termination
    termination_ref: "END_健診_案内"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

  - step: END_転送成功
    type: termination
    termination_ref: "END_転送成功"

  - step: END_転送失敗
    type: termination
    termination_ref: "END_転送失敗"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "再診"
      - id: "2"
        order: "2"
        value: "初診"
      - id: "3"
        order: "3"
        value: "予約変更"
      - id: "4"
        order: "4"
        value: "予約キャンセル"
      - id: "5"
        order: "5"
        value: "確認"
      - id: "6"
        order: "6"
        value: "予防接種"
      - id: "7"
        order: "7"
        value: "健診"
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分。Gen1 元 yaml の 5 用件 (再診/初診/予約変更/予約キャンセル/確認) + 予防接種 + 健診 (人間ドック・健康診断) を統合。健診は END_健診_案内 で 0570-001-789 案内終話"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
