        - input: "外科 (ストーマ/下肢静脈瘤/大動脈/胸壁/漏斗胸/褥瘡)"
          output: "外科"
        - input: "整形 / TK"
          output: "整形外科"
        - input: "形成外科 / 美容形成 / 美容外科 / 厳正結果"
          output: "形成外科"
        - input: "心臓 / 心外 / 心臓血管"
          output: "心臓血管外科"
        - input: "循環器 / ハート / フットケア / ペースメーカー / 不整脈"
          output: "循環器内科"
        - input: "腎臓 / 腎内 / 腎移植 / のう胞腎"
          output: "腎臓内科"
        - input: "血液 / 血内 / 血液の癌"
          output: "血液内科"
        - input: "婦人 / マタニティ / お産 / 産婦人 / 周産"
          output: "婦人科"
        - input: "小児 / こども"
          output: "小児科"
        - input: "皮膚 / 皮膚科"
          output: "皮膚科"
        - input: "眼科 / 視力検査"
          output: "眼科"
        - input: "耳鼻 / 耳鼻咽喉 / 耳鼻科 / 咽喉科"
          output: "耳鼻咽喉科"
        - input: "泌尿器 / 尿器 / 頻尿"
          output: "泌尿器科"
        - input: "胃カメラ / 大腸カメラ / 内視鏡"
          output: "内視鏡検査"
        - input: "胃ろう"
          output: "胃ろう"
        - input: "がん / がん疼痛 / 化学療法"
          output: "がん疼痛外来"
        - input: "SH外来 / 性病"
          output: "SH外来"
        - input: "わからない / 分からない / 知らない / 覚えていない / 忘れた"
          output: "登録なし"
      no_result_condition: "上記いずれにも該当しない発話・無発話・聞き取り不能 → 登録なし (no_result_default で自動セット)"
    save_to: "clinicalDepartment"
    next_step: "（条件分岐: 4 転送ルート / その他 → CMR_用件後段）"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。後ほど折り返しのお電話にて、担当者よりお伺いいたします。"

  - step_name: "変更_予約日"
