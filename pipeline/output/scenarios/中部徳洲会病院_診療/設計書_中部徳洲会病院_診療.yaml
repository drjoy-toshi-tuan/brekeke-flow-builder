# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "再診"
      - "初診"
      - "予約変更"
      - "予約キャンセル"
      - "確認"
      - "予防接種"
      - "健診"
    notes: "Gen1 用件.yaml 相当。「診察の予約 / 予防接種の予約 / 予約変更 / 予約キャンセル / 予約確認」+ 内部分岐 (診察 → 初診/再診)。Gen3 では 7 enum に展開。echo_back=true で汎用 #data# 復唱。Gen1 では復唱後に 「はい大丈夫です/いいえ違います」で再確認するパターンだったが、Gen3 では 復唱モジュール内蔵 で同等処理"

  - order: 2
    name: "紹介状有無"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "hasReferralLetter"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "Gen1 紹介状有無.yaml 相当。Yes/No 判定。なし → 7000円自己負担案内を経由して診療科聴取へ"

  - order: 3
    name: "ワクチン名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "vaccineName"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "Gen1 ワクチン名.yaml 相当。「ご希望の予防接種の種類をお話ください」のフリーテキスト。「分からない」も許容"

  - order: 4
    name: "診療科聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "歯科口腔外科"
      - "リハビリテーション科"
      - "放射線科"
      - "健康管理センター"
    notes: "Gen1 診療科.yaml 相当。28 診療科 + 登録なし。歯科口腔外科 / リハビリテーション科 / 放射線科 / 健康管理センター は call_transfer 用専用ルート (output_labels に列挙)。それ以外の診療科 (内科/外科/呼吸器内科/...等) は other → CMR_用件後段 でルーティング。no_result_default=登録なし。Gen1 の 内科/外科 分岐 (呼吸器/消化器/脳神経) は OpenAI プロンプトで一発判定 (内科か外科か発話から判定)、追加聴取は省略"

  - order: 5
    name: "変更_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "予約変更ルートのみ。現在の予約日聴取。YYYY-MM-DD 形式。Gen1 予約日.yaml 相当。過去日なら +1 年で確定 (OpenAI プロンプトで対応)"

  - order: 6
    name: "変更_希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "予約変更ルートのみ。希望予約日聴取。Gen1 希望日聴取.yaml 相当。「内服薬のある患者様の場合は、お手元にあるお薬の範囲内での変更」の TTS 注意文言を含む"

  - order: 7
    name: "キャンセル_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "予約キャンセルルートのみ。Gen1 予約日.yaml 共通"

  - order: 8
    name: "キャンセル_理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "予約キャンセルルートのみ。Gen1 理由聴取.yaml 相当。「ご予約キャンセルの理由を簡潔にお話ください」"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の5つのうちの、いずれかでお話ください。「診察の予約」、「予防接種の予約」、「予約変更」、「予約キャンセル」、「予約確認」。それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "再診"
        - "初診"
        - "予約変更"
        - "予約キャンセル"
        - "確認"
        - "予防接種"
        - "健診"
        - "NO_RESULT"
      mapping:
        - input: "診察の予約 / 予約お願い / 予約をしたい / 予約をとる / 取りたい / 録りたい / 受診"
          output: "（次の質問: 通院中の患者ですか？ → 肯定→再診 / 否定→初診）"
        - input: "通院中／二回目以降／前にも来た／受診歴あり"
          output: "再診"
        - input: "初めて／はじめて／初診／新規"
          output: "初診"
        - input: "予約変更 / 変更 / 延期 / 日にち変えて / 別の日 / 平行（並行/変更の誤認識）"
          output: "予約変更"
        - input: "予約キャンセル / キャンセル / 取り消し / やめる / 取消"
          output: "予約キャンセル"
        - input: "予約確認 / 確認 / 教えて / 時間を忘れた / 日時確認 / 予約日時を確認"
          output: "確認"
        - input: "予防接種 / インフル / ワクチン / 注射 / 予防 / 帯状疱疹"
          output: "予防接種"
        - input: "健診 / 検診 / 人間ドック / ドック / 健康管理センター / KC / 健康診断 / 子宮がん検診 / 脳ドック / 特定健診"
          output: "健診"
      no_result_condition: "上記いずれにも該当しない／無発話／聞き取り不能"
    save_to: "classification"
    next_step: "（条件分岐: 再診→診療科聴取 / 初診→紹介状有無 / 予約変更→診療科聴取 / 予約キャンセル→診療科聴取 / 確認→診療科聴取 / 予防接種→ワクチン名聴取 / 健診→END_健診_案内 / その他→END_聴取失敗）"
    retry_failure: "end_failure"
    retry_failure_announcement: "申し訳ございません。うまく聞き取りが出来ませんでした。恐れ入りますが、098-923-1091へおかけなおしください。電話番号を再度申し上げます。098-923-1091へおかけなおしください。"

  - step_name: "紹介状有無"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "あり / あります / ある / 持っています / 持ってます / はい"
          output: "あり"
        - input: "ありません / ない / 持ってない / お願いします / いいえ"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない／曖昧な発話"
    save_to: "hasReferralLetter"
    next_step: "あり→診療科聴取 / なし→紹介状なし_案内→診療科聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "ワクチン名聴取"
    tts_announcement: "ご希望の予防接種の種類をお話ください。分からない場合には、わからない、のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "（聴取テキストをそのまま正規化して保存）"
      mapping:
        - input: "発話テキスト（例: インフルエンザ／コロナ／帯状疱疹／肺炎球菌／わからない）"
          output: "正規化後のワクチン名"
      no_result_condition: "発話なし／聞き取り不能"
    save_to: "vaccineName"
    next_step: "診療科聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "診療科聴取"
