# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2からの移管。聴取順序はGen2を維持: 冒頭→用件確認→[用件再聴取]→用件別聴取（変更/キャンセル）→共通聴取（診療科→個人情報4本→折返し希望時間→その他）→RAG→終話"
  - "用件確認は Gen2 の DTMF 1=変更 / DTMF 2=キャンセル に対応。認識不可時は用件再聴取（1回のみ）を実施。それでも判定できない場合は取得不可ルート（共通聴取のみ）に流して担当者折り返し用の情報を取得する"
  - "4診療日以降確認（変更ルート）で「いいえ」の場合は別窓口案内（代表電話 0570059111）で終話。status=2, smsFlag=-1"
  - "診療科は Gen2 の43科リストを OpenAI で正規化。no_result_default=登録なし で NO_RESULT時も空欄にせず「登録なし」を保存する（モジュール選定ガイド 2.5 準拠）"
  - "個人情報サブフロー（診察券番号・氏名・生年月日・電話番号）は CLAUDE.md Rule 9 に従い samples を完全コピー。電話番号以外は復唱なし（Gen2プロンプト「電話番号以外は復唱をしてはいけない」に準拠）"
  - "電話番号聴取サブフロー内のincoming-classifierで非通知/携帯/固定を判定。非通知時はサブフロー内でDTMF再聴取、それでも失敗なら END_非通知 相当の終話（サブフロー標準挙動）"
  - "折返し希望時間は Gen2 仕様に従い、連絡先電話番号が携帯（phonetype=1）の場合はスキップ、固定/その他（phonetype=2）の場合のみ聴取"
  - "終話は classification の値で分岐（変更/キャンセル/取得不可）。smsFlag は変更=1, キャンセル=1, 取得不可=2 で確定（Gen2仕様を維持）"
  - "Gen2の status=0（途中切断）は第3世代では禁止のため、代表案内系（END_別窓口案内・END_非通知）は status=2 に置換した（CLAUDE.md 準拠）"
  - "Gen2 smsFlag=0（SMS送信なし）は Gen3 では sms_flag=-1 に変換。Gen2 smsFlag=1,2 はそのまま数値を維持"
  - "代表電話 0570059111 を別窓口案内・非通知時の案内に使用（Gen2プロンプト明記）"
  - "RAGサブフローは Gen2→Gen3 移管デフォルトのパターン3 から、Gen2プロンプトにRAG/FAQ利用の明示記載がないためパターン2（pre_termination のみ）に調整"
  - "Gen2 のリトライは 1-5 節「再質問回数は1回に限定します」に従い retry_count=1 で統一"
  - "予約日（reservationDate）は復唱禁止（Gen2プロンプト「電話番号以外は復唱をしてはいけない」）。形式は YYYY-MM-DD 00:00:00"
  - "Gen2 content フィールド（用件再聴取時のフリーテキスト保存）は Gen3 では classification への統一で代替し除外。Gen2 の取得不可ルート挙動はスキップルートで再現"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
  - item: "対象電話番号（050番号 — デモ/本番）"
    resolved: false
  - item: "対象環境（現在はdemoを仮設定）"
    resolved: false
  - item: "営業時間チェックの要否（現在はacceptance_times不使用 — Gen2に明記なし）"
    resolved: false
  - item: "Gen2 status=0（途中切断）→ Gen3 status=2 への変更の承認"
    resolved: false
  - item: "Gen2 smsFlag=0 → Gen3 sms_flag=-1 への変換の承認"
    resolved: false
