# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # smsFlag は各終話パターンに直接設定済みのため、ContextMatchRouter/Scriptでの分岐は不要。
  # 変更=1, キャンセル=1, 取得不可=2, 別窓口案内=-1, 非通知=-1, 時間外=-1, 聴取失敗=-1 が各ルートで確定的に決まる。

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"
  inquiry_insertion_point: ""
  pre_termination: true
  # パターン2: 全正常終話前（END_変更、END_キャンセル、END_取得不可）にRAGサブフローを配置。
  # 「最後にご質問はございますか？」と問いかけ、質問があればRAG回答ループ、なければ終話へ。
  # Gen2プロンプトにRAG/FAQ利用の明示記載はないため、Gen2→Gen3移管のデフォルト（パターン3）から
  # パターン2に調整（その他聴取後のみ。問い合わせ専用ルートは存在しない）。

