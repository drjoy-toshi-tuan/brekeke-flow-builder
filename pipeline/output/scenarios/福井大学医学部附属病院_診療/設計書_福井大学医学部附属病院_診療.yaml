# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "福井大学医学部附属病院の、予約専用AI電話です。お手元に診察券をご準備の上、お話しください。"
    input_method: "none"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: null
    next_step: "用件確認"
    retry_failure: "skip"

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次のいずれかでお話ください。1、予約の変更、2、予約のキャンセル。それではお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「変更」「予約変更」「人口」を含む"
          output: "変更"
        - input: "DTMF 2 または「キャンセル」「予約キャンセル」を含む"
          output: "キャンセル"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "変更・キャンセルのいずれにも判定できない"
    save_to: "classification"
    next_step: "変更→変更_4診療日以降確認 / キャンセル→キャンセル_予約日 / default/NO_RESULT→用件再聴取"
    retry_failure: "skip"

  - step_name: "用件再聴取"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。今回お電話いただいたご用件をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "NO_RESULT"
      mapping:
        - input: "「変更」「予約変更」「人口」を含む"
          output: "変更"
        - input: "「キャンセル」「予約キャンセル」を含む"
          output: "キャンセル"
        - input: "上記いずれにも該当しない（質問・雑談・無言等すべて含む）"
          output: "NO_RESULT"
      no_result_condition: "変更・キャンセルのいずれにも判定できない"
    save_to: "classification"
    next_step: "変更→変更_4診療日以降確認 / キャンセル→キャンセル_予約日 / default/NO_RESULT→診療科_共通（取得不可ルート）"
    retry_failure: "skip"

  - step_name: "変更_4診療日以降確認"
    tts_announcement: "変更される予約日は、本日から、土日祝を除く、4日後以降でしょうか。はい、もしくは、いいえ、でお答えください。わからない場合は、「わからない」とお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」を含む"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「違います」を含む"
          output: "いいえ"
        - input: "「わからない」「分からない」を含む"
          output: "わからない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "はい/いいえ/わからないのいずれにも判定できない"
    save_to: "after4businessdays"
    next_step: "いいえ→END_別窓口案内 / はい・わからない・NO_RESULT→変更_予約日"
    retry_failure: "skip"

  - step_name: "変更_予約日"
    tts_announcement: "次に、現在の予約日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付文字列"
        - "NO_RESULT"
      mapping:
        - input: "日付として認識可能な発話"
          output: "YYYY-MM-DD 00:00:00 形式の日付文字列"
        - input: "日付として認識できない"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない"
    save_to: "reservationDate"
    next_step: "変更_変更希望日"
    retry_failure: "skip"

  - step_name: "変更_変更希望日"
    tts_announcement: "次に、変更希望日をお伺いいたします。ご都合の良い日付や曜日をお話しください。決まっていない場合は、決まっていない、とお話しください。"
