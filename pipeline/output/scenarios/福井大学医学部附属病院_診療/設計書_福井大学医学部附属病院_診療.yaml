# --- セクション3: フローの目的 ---
purpose: "福井大学医学部附属病院の予約専用AI電話。患者からの予約変更・予約キャンセルの電話を受け、用件を確認したうえで変更ルート（4診療日以降確認→予約日→変更希望日→変更理由）またはキャンセルルート（予約日→キャンセル理由）の用件別情報を聴取し、その後に共通情報（診療科・診察券番号・氏名・生年月日・連絡先電話番号・折返し希望時間・その他問い合わせ）を取得して折り返し担当者連絡用の受付を自動化する。用件が聞き取れなかった場合も取得不可ルートで共通情報を聴取して折り返し連絡の基礎情報を確保する。4診療日以内の予約は代表電話（0570059111）へ別窓口案内する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "福井大学医学部附属病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 完了フラグ_非通知(saveCompletionFlag2db, status=2, smsFlag=-1) → 非通知_アナウンス(TTS) → 切断
              └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS)
                    → 用件確認(TTS → STT → OpenAI → Retry)
                        ├─ 変更 → 変更_4診療日以降確認
                        ├─ キャンセル → キャンセル_予約日
                        └─ 認識不可(default/リトライ失敗) → 用件再聴取(TTS → STT → OpenAI → Retry)
                                ├─ 変更 → 変更_4診療日以降確認
                                ├─ キャンセル → キャンセル_予約日
                                └─ 認識不可(default/リトライ失敗) → 診療科_共通（取得不可ルート）

      ★変更ルート:
        変更_4診療日以降確認(TTS → STT → OpenAI → Retry)
          ├─ いいえ → END_別窓口案内(status=2, smsFlag=-1)
          └─ default（はい/わからない/NO_RESULT）→ 変更_予約日

        変更_予約日(datetime) → 変更_変更希望日(text) → 変更_理由(text) → 診療科_共通

      ★キャンセルルート:
        キャンセル_予約日(datetime) → キャンセル_理由(text) → 診療科_共通

      ★共通ルート:
        診療科_共通(enum + no_result_default=登録なし)
          → Jump to 診察券番号聴取SF
          → Jump to 氏名聴取SF
          → Jump to 生年月日聴取SF
          → Jump to 電話番号聴取SF（incoming-classifier内蔵・phonetype保存）
          → 折返し希望時間分岐(ContextMatchRouter on phonetype)
              ├─ 携帯(phonetype=1) → その他聴取
              └─ 固定/その他(phonetype=2) → 折返し希望時間聴取(text) → その他聴取
          → その他聴取(text) → Jump to RAG検索SF
          → 終話分岐(ContextMatchRouter on classification)
              ├─ 変更 → END_変更(status=1, smsFlag=1)
              ├─ キャンセル → END_キャンセル(status=1, smsFlag=1)
              └─ default → END_取得不可(status=1, smsFlag=2)
    notes: |
      - acceptance_times不使用（Gen2プロンプトに営業時間の明記なし。代表電話の受付時間13-15時はアナウンス文言内のみに現れ、AI電話自体の受付時間ではない）
      - 用件確認は DTMF 1=変更 / DTMF 2=キャンセル のDTMF対応
      - 用件確認・用件再聴取で変更/キャンセルに判定できなかった場合は取得不可ルートで共通聴取のみ実施
      - 4診療日以降確認で「いいえ」→ 別窓口案内(0570059111)で終話
      - 診療科はGen2の43科リストをOpenAIで正規化。認識不可時は「登録なし」をclinicalDepartmentに保存して次へ進む（no_result_default）
      - 個人情報サブフロー4本（診察券番号→氏名→生年月日→電話番号）を順次遷移
      - 電話番号聴取サブフロー内のincoming-classifierで非通知/携帯/固定を判定しphonetypeを保存
      - 携帯の場合は折返し希望時間聴取をスキップ（Gen2仕様）
      - 全正常終話前にRAGサブフローを配置（パターン2）
      - 終話は classification の値で分岐（変更/キャンセル/取得不可）

  - flow_name: "福井大学医学部附属病院$診察券番号聴取"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピー。
      フロー名プレフィックスのみ「福井大学医学部附属病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "7桁以下の数字。「わからない」分岐あり。復唱なし"

  - flow_name: "福井大学医学部附属病院$氏名聴取"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。
      フロー名プレフィックスのみ「福井大学医学部附属病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱なし（Gen2プロンプト「電話番号以外は復唱をしてはいけない」に準拠）"

  - flow_name: "福井大学医学部附属病院$生年月日聴取"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/生年月日聴取_復唱なし.json を完全コピー。
      フロー名プレフィックスのみ「福井大学医学部附属病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱なし（Gen2プロンプト「電話番号以外は復唱をしてはいけない」に準拠）"

  - flow_name: "福井大学医学部附属病院$電話番号聴取"
    diagram: |
      CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。
      フロー名プレフィックスのみ「福井大学医学部附属病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱あり（Gen2で電話番号のみ復唱を明記）。incoming-classifier内蔵。携帯/固定分岐。phonetype保存"

  - flow_name: "福井大学医学部附属病院$RAG検索"
    diagram: |
      CLAUDE.md Rule 16 準拠。docs/reference/bivr/samples/json/RAG検索.json を完全コピー。
      フロー名プレフィックスのみ「福井大学医学部附属病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "パターン2。全正常終話前に配置。「最後にご質問はございますか？」と問いかけRAG応答"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # --- 用件確認 ---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "変更"
        next: 変更_4診療日以降確認
      - match: "キャンセル"
        next: キャンセル_予約日
      - match: "default"
        next: 用件再聴取
    retry_failure: skip

  - step: 用件再聴取
    type: hearing
    output_format: enum
    conditions:
      - match: "変更"
        next: 変更_4診療日以降確認
      - match: "キャンセル"
        next: キャンセル_予約日
      - match: "default"
        next: 診療科_共通
    retry_failure: skip

  # --- 変更ルート ---
  - step: 変更_4診療日以降確認
    type: hearing
    output_format: enum
    conditions:
      - match: "いいえ"
        next: END_別窓口案内
      - match: "default"
        next: 変更_予約日
    retry_failure: skip

  - step: 変更_予約日
    type: hearing
    output_format: datetime
    next: 変更_変更希望日
    retry_failure: skip

  - step: 変更_変更希望日
    type: hearing
    output_format: text
    next: 変更_理由
    retry_failure: skip

  - step: 変更_理由
    type: hearing
    output_format: text
    next: 診療科_共通
    retry_failure: skip

  # --- キャンセルルート ---
  - step: キャンセル_予約日
    type: hearing
    output_format: datetime
    next: キャンセル_理由
    retry_failure: skip

  - step: キャンセル_理由
    type: hearing
    output_format: text
    next: 診療科_共通
    retry_failure: skip

  # --- 共通ルート ---
  - step: 診療科_共通
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: jump_診察券番号聴取
    retry_failure: skip

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "福井大学医学部附属病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "福井大学医学部附属病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "福井大学医学部附属病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "福井大学医学部附属病院$電話番号聴取"
    next: 折返し希望時間分岐

  - step: 折返し希望時間分岐
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: その他聴取
      - match: "2"
        next: 折返し希望時間聴取
      - match: "default"
        next: 折返し希望時間聴取

  - step: 折返し希望時間聴取
    type: hearing
    output_format: text
    next: その他聴取
    retry_failure: skip

  - step: その他聴取
    type: hearing
    output_format: text
    next: jump_RAG検索
    retry_failure: skip

  - step: jump_RAG検索
    type: subflow
    flowname: "福井大学医学部附属病院$RAG検索"
    next: 終話分岐

  - step: 終話分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: END_変更
      - match: "キャンセル"
        next: END_キャンセル
      - match: "default"
        next: END_取得不可

  # --- 終話 ---
  - step: END_変更
    type: termination
    termination_ref: "END_変更"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_取得不可
    type: termination
    termination_ref: "END_取得不可"

  - step: END_別窓口案内
    type: termination
    termination_ref: "END_別窓口案内"

