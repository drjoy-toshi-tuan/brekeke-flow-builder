# --- セクション10: AmiVoice辞書（profile_words）---
# 薬局名聴取（フォールバック経路）で 4 薬局名を認識する辞書。
# 電話帳マッチ経路では Phone2Name が直接読み上げるため STT 辞書は不要だが、
# フォールバック経路（電話帳ミス）でも 4 薬局のいずれかをお話しになる
# 可能性が高いので登録しておく。
# raw.md L57-63 「薬局名（店舗名までは入れずOK）」より店舗名サフィックスは省略。
amivoice_dictionary:
  - step_name: "薬局名聴取"
    words: |
      クオール薬局 くおーるやっきょく
      クオール くおーる
      ミツヤ薬局 みつややっきょく
      ミツヤ みつや
      ミネ薬局 みねやっきょく
      ミネドラッグ みねどらっぐ
      日本調剤 にほんちょうざい

