  - "既存診療フロー (drjoy^すずな皮膚科クリニック$診療_20260401) の用件分岐 OpenAI に DTMF 5番=疑義照会 経路を追加し、Custom Jump to Flow で本フローを呼び出す経路追加は別タスク (本設計書のスコープ外)"
