  - "Phone2Name の FOUND_KATAKANA_NAME_DEFAULT_TMP は 'recipient_name さんですね。' に設定。recipient_name は電話帳のフリガナで動的差込される Brekeke 公式プレースホルダ"
  - "augment ブロック (薬局カテゴリ判定 / 薬局名読み上げ) は scaffold が placeholder Script で生成。最終的に Brekeke IVR UI で drjoy^Incoming$incoming-category-classifier および drjoy^External Integration$Phone2Name に手動置換が必要"
