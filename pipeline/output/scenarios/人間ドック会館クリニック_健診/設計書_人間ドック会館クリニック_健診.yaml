      予約ルートのみ。復唱禁止。
      「特にない/ない/ありません/大丈夫」→ "なし" を保存（OpenAI 正規化）。
      「わからない/わかりません」→ 顧客ドキュメント原文は company_name へ「不明」だが、
      移管ノート指摘により仮設定では option へ「不明」を保存（confirmation_items N-1）。

  - order: 8
