    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: |
      予約ルートのみ。フリーテキスト保存。
      Gen2: 明確な日付発話のみ YYYY年M月D日 で保存、それ以外はフリーテキスト。
      当日予約は「1週間後以降の日付で〜」案内が必要（confirmation_items N-2）。

  - order: 9
