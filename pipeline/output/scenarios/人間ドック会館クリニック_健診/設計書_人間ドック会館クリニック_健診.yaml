# 設計書 -- 人間ドック会館クリニック 健診
# 生成元: @director エージェント
# 生成日: 2026/04/20
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/【健診1】：人間ドック会館クリニック.md
# 移管ノート: docs/migration/gen2_人間ドック会館クリニック_健診.md
# 確認レポート: docs/designs/確認レポート_人間ドック会館クリニック_健診_20260420.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "人間ドック会館クリニック"
  group_name: "人間ドック会館CL"
  flow_name: "人間ドック会館CL$健診"
  target_facility: "人間ドック会館クリニック（本院のみ）"
  office_id: "TODO_要確認"                # BLOCKER なし / Dr.JOY 側で付与
  phone_number: "03-3937-6256"            # 終話アナウンスでの折り返し番号
  business_hours: "なし（営業時間チェックなし）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"                      # 移管ノート: 環境=本番

# --- セクション2: フロー構成 ---
# Gen2 yaml の構造をそのまま踏襲:
#   冒頭 → 用件確認 → 個人企業確認 → [個人: 氏名→生年月日 / 企業: 企業名→担当者名]
#     → 電話番号サブフロー → 用件別分岐（予約/変更/キャンセル/問い合わせ） → 終話
# 氏名・生年月日・電話番号は個人情報サブフロー.bivr（Rule 9）を完全コピー
# 企業名・担当者名はメインフロー内の hearing ブロックで直接聴取（専用サブフロー不要）
flow_structure:
  type: "subflow"
  flows:
    - name: "人間ドック会館CL$健診"
      role: "main"
      description: "冒頭→用件→個人企業分岐→個人/企業情報聴取→電話番号→用件別聴取→終話"
    - name: "人間ドック会館CL$氏名聴取"
      role: "sub"
      description: "氏名聴取（個人ルートのみ使用）"
    - name: "人間ドック会館CL$生年月日聴取"
      role: "sub"
      description: "生年月日聴取（個人ルートのみ使用、DOB Re-confirmation あり）"
    - name: "人間ドック会館CL$電話番号聴取"
      role: "sub"
      description: "電話番号聴取（個人・企業ルート合流後・incoming-classifier で携帯/固定分岐）"
  subflows:
    - name: "人間ドック会館CL$氏名聴取"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報サブフロー.bivr を完全コピー。個人ルート専用"
    - name: "人間ドック会館CL$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報サブフロー.bivr を完全コピー。Gen2: 和暦/西暦両対応・復唱あり"
    - name: "人間ドック会館CL$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        個人情報サブフロー.bivr を完全コピー。
        Gen2 仕様: 着信=携帯 → 着信番号で復唱確認 / 着信=固定 → 手動聴取+復唱
        終話はメインフロー側（用件によって smsFlag が 1/2/3/4 に変わるため）

# --- セクション3: フローの目的 ---
purpose: >
  人間ドック会館クリニック健診専用の AI 電話。
  用件（予約・変更・キャンセル・問い合わせ）を聴取後、個人/企業の別を確認し、
  個人は氏名・生年月日、企業は企業名・担当者名を聴取。
  続いて電話番号を聴取し、用件別に必要情報（健保組合・希望コース・オプション・
  受診希望日・予約日・変更内容・問合せ内容など）を収集して折り返し受付を自動化する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "人間ドック会館CL$健診"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2, smsFlag=0) → 切断
            └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS)

      ─── 用件確認（復唱あり）───
      → 用件_確認(TTS) [DTMF + 音声]
      → 入力_用件_確認(DTMF AmiVoice STT)
      → OpenAI_用件_確認(enum: 予約/変更/キャンセル/問い合わせ)
      → Re-confirmation（「ご用件は〜でよろしいですか」）
      → 復唱_用件（はい/いいえ）
          ├─ 肯定 → 個人企業確認
          ├─ 否定（最大2回再聴取） → END_聴取失敗 相当 → classification="問い合わせ" 保存 → 個人企業確認
          └─ NO_RESULT（リトライ上限） → classification="問い合わせ" 保存 → 個人企業確認

      ─── 個人/企業分岐 ───
      → 個人_企業_確認(TTS) [Yes/No]
      → 入力・OpenAI 判定
          ├─ 個人（はい） → jump_氏名聴取 → jump_生年月日聴取 → jump_電話番号聴取
          └─ 企業（いいえ） → 企業名_聴取 → 担当者名_聴取 → jump_電話番号聴取

      ─── 電話番号聴取サブフロー戻り後: 用件別分岐（ContextMatchRouter: classification）───
      → 用件_別_分岐
          ├─ 予約       → 健康保険組合 → 希望コース → 追加オプション → 受診希望日 → その他_予約 → END_終話_予約
          ├─ 変更       → 予約日_変更 → 変更内容 → その他_変更 → END_終話_変更
          ├─ キャンセル → 予約日_キャンセル → その他_キャンセル → END_終話_キャンセル
          └─ 問い合わせ → 問合せ_内容 → その他_問合せ → END_終話_問い合わせ

      ─── 終話 ───
      END_非通知 → 切断 (status=2, smsFlag=0)
      END_終話_予約       → 切断 (status=1, smsFlag=1)
      END_終話_変更       → 切断 (status=1, smsFlag=2)
      END_終話_キャンセル → 切断 (status=1, smsFlag=3)
      END_終話_問い合わせ → 切断 (status=1, smsFlag=4)
      END_聴取失敗        → 切断 (status=2, smsFlag=0 / リトライ失敗経路用)
    notes: |
      Gen2→Gen3 移管。受付時間チェックは customer_doc に記載なしのため acceptance_times 不使用。
      用件聴取失敗時は classification="問い合わせ" を保存して個人企業確認へ継続（Gen2 仕様）。
      企業名・担当者名は短い聴取のためメインフロー内 hearing で処理（サブフロー化しない）。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 用件_確認

  # --- 用件確認（Pattern A: OpenAI直後分岐 + echo_back）---
  - step: 用件_確認
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "予約"
        next: 個人_企業_確認
      - match: "変更"
        next: 個人_企業_確認
      - match: "キャンセル"
        next: 個人_企業_確認
      - match: "問い合わせ"
        next: 個人_企業_確認

  # --- 個人/企業分岐（Pattern A: Yes/No 型 enum）---
  - step: 個人_企業_確認
    type: hearing
    output_format: enum
    conditions:
      - match: "個人"
        next: jump_氏名聴取
      - match: "企業"
        next: 企業名_聴取

  # --- 個人ルート（氏名→生年月日→電話番号合流）---
  - step: jump_氏名聴取
    type: subflow
    flowname: "人間ドック会館CL$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "人間ドック会館CL$生年月日聴取"
    next: jump_電話番号聴取

  # --- 企業ルート（企業名→担当者名→電話番号合流）---
  - step: 企業名_聴取
    type: hearing
    output_format: text
    next: 担当者名_聴取

  - step: 担当者名_聴取
    type: hearing
    output_format: text
    next: jump_電話番号聴取

  # --- 電話番号サブフロー（個人・企業合流地点）---
  - step: jump_電話番号聴取
    type: subflow
    flowname: "人間ドック会館CL$電話番号聴取"
    next: 用件_別_分岐

  # --- 用件別分岐（Pattern B: ContextMatchRouter 参照 classification）---
  - step: 用件_別_分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "予約"
        next: 健康保険組合_予約
      - match: "変更"
        next: 予約日_変更
      - match: "キャンセル"
        next: 予約日_キャンセル
      - match: "問い合わせ"
        next: 問合せ_内容

  # --- 予約ルート ---
  - step: 健康保険組合_予約
    type: hearing
    output_format: text
    next: 希望コース_予約

  - step: 希望コース_予約
    type: hearing
    output_format: text
    next: 追加オプション_予約

  - step: 追加オプション_予約
    type: hearing
    output_format: text
    next: 受診希望日_予約

  - step: 受診希望日_予約
    type: hearing
    output_format: text
    next: その他_予約

  - step: その他_予約
    type: hearing
    output_format: text
    next: END_終話_予約

  # --- 変更ルート ---
  - step: 予約日_変更
    type: hearing
    output_format: datetime
    next: 変更内容_変更

  - step: 変更内容_変更
    type: hearing
    output_format: text
    next: その他_変更

  - step: その他_変更
    type: hearing
    output_format: text
    next: END_終話_変更

  # --- キャンセルルート ---
  - step: 予約日_キャンセル
    type: hearing
    output_format: datetime
    next: その他_キャンセル

  - step: その他_キャンセル
    type: hearing
    output_format: text
    next: END_終話_キャンセル

  # --- 問い合わせルート ---
  - step: 問合せ_内容
    type: hearing
    output_format: text
    next: その他_問合せ

  - step: その他_問合せ
    type: hearing
    output_format: text
    next: END_終話_問い合わせ

  # --- 終話ブロック ---
  - step: END_終話_予約
    type: termination
    termination_ref: "END_終話_予約"

  - step: END_終話_変更
    type: termination
    termination_ref: "END_終話_変更"

  - step: END_終話_キャンセル
    type: termination
    termination_ref: "END_終話_キャンセル"

  - step: END_終話_問い合わせ
    type: termination
    termination_ref: "END_終話_問い合わせ"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # 標準フィールド
  - context_name: "classification"
    context_name_jp: "用件"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: true
    notes: "Gen2 function enum: 予約/変更/キャンセル/問い合わせ"

  - context_name: "patientName"
    context_name_jp: "氏名・担当者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "個人=氏名、企業=担当者名を同一フィールドに格納（Gen2 仕様）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "個人ルートのみ聴取。企業ルートでは聴取しない"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "携帯=着信番号を自動格納 / 固定=手動聴取+復唱"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
    item_default: true
    editable: true
    deletable: true
    notes: "1=通話完了, 2=非通知拒否・聴取失敗"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

  # 施設固有フィールド
  - context_name: "company_check"
    context_name_jp: "個人/企業"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "個人/企業 の別。Gen2: 「個人」または「企業」を格納"

  - context_name: "company_name"
    context_name_jp: "企業名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業ルートのみ聴取。個人ルートでは空"

  - context_name: "course"
    context_name_jp: "希望コース"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約ルートのみ"

  - context_name: "option"
    context_name_jp: "追加オプション"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: |
      予約ルートのみ。「特にない/ない/ありません/大丈夫」→ "なし" を保存。
      顧客ドキュメントに「わからない」→ companyName に「不明」と記載があるが、
      migration note で「原文誤記の可能性、option に格納すべきか要確認」との指摘あり（confirmation_items N-1 参照）

  - context_name: "Preferred_date"
    context_name_jp: "受診希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約ルートのみ。フリーテキスト（日付表現が明確な場合のみ YYYY年M月D日 形式）"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更・キャンセルルートのみ"

  - context_name: "insurance"
    context_name_jp: "健康保険組合"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約ルートのみ"

  - context_name: "inquiry"
    context_name_jp: "変更内容・問合せ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: |
      変更ルート=変更内容、問合せルート=問合せ内容 を同一フィールドに格納。
      Gen2 yaml に [inqury] と誤記があるが正しくは inquiry（function 側の表記に合わせる）

  - context_name: "reason"
    context_name_jp: "キャンセル理由"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 function に存在するが、yaml 本体に聴取箱がない。将来拡張用に定義のみ"

  - context_name: "detail"
    context_name_jp: "その他"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "全ルート末尾の「その他に何かお問い合わせはございますか？」回答"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # メインフロー: 用件確認（復唱あり）
  - order: 1
    name: "用件_確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 1
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "問い合わせ"
    notes: |
      DTMF 1=予約を取る, 2=変更する, 3=キャンセルする, 4=その他お問い合わせ。
      Gen2 では <dtmf digit="1"/> をアナウンスに埋め込んでいるが、Gen3 では SSML 不可のため
      DTMF_AmiVoice モジュールで1桁入力を受けつける。
      復唱あり（Gen2【復唱ルール】の「復唱可能 3 項目」の1つ）。
      聴取失敗時は classification="問い合わせ" を保存して次へ継続（Gen2 仕様: 用件未確定時は問い合わせ扱い）。

  # メインフロー: 個人/企業確認
  - order: 2
    name: "個人_企業_確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "company_check"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "個人"
      - "企業"
    notes: |
      Yes/No 型 enum。「はい」「そうです」「本人です」等→個人、「いいえ」「違います」等→企業。
      Gen2: companyCheck に「個人」または「企業」を格納。復唱禁止。

  # 企業ルート（メインフロー内 hearing）
  - order: 3
    name: "企業名_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "company_name"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "企業ルートのみ。復唱禁止（Gen2【復唱禁止項目】）。フリーテキスト保存"

  - order: 4
    name: "担当者名_聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: |
      企業ルートのみ。Gen2: 「ご担当者様のお名前を〜」→ patientName に格納。
      個人ルートの氏名と同じフィールドに格納（復唱禁止・カタカナ変換）。

  # 予約ルート
  - order: 5
    name: "健康保険組合_予約"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "insurance"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約ルートのみ。復唱禁止。フリーテキスト保存"

  - order: 6
    name: "希望コース_予約"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "course"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約ルートのみ。復唱禁止。コース名は CSV 未提供のためフリーテキスト保存"

  - order: 7
    name: "追加オプション_予約"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
