# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3 移管。更新日時 2026/01/28（status/smsFlag 再制御・冒頭アナウンス修正済み）版を正とする"
  - "元資料: docs/reference/customer_docs/【健診1】：人間ドック会館クリニック.md"
  - "Gen2 function スキーマ（L1-144）: dialogue_completed の properties を Gen3 context_fields に展開。endpoint は saveCompletionFlag2db 側のため context_fields から除外"
  - "受付時間チェックは customer_doc に記載なし → acceptance_times 未配置（use_acceptance_times=false）"
  - "用件聴取には Gen2 で <dtmf digit='1'/> を使用 → Gen3 では SSML 不可のため DTMF_AmiVoice モジュール（1桁）で代替"
  - "復唱可能項目は 3 項目のみ: 用件 / 生年月日 / 電話番号（Gen2【復唱ルール】準拠）。echo_back=true はこの 3 項目のみに設定し、それ以外は false"
  - "生年月日・電話番号の復唱は個人情報サブフロー.bivr の標準動作（DOB Re-confirmation / Phone Re-confirmation）に任せる"
  - "個人ルートは氏名+生年月日、企業ルートは企業名+担当者名（企業ルートに生年月日なし）"
  - "氏名と担当者名は patientName に統一格納（Gen2 仕様）。company_name は企業ルートのみ設定"
  - "企業名・担当者名はメインフロー内 hearing ブロックで直接聴取（サブフロー化せず）。短い2項目のため"
  - "電話番号の携帯/固定判別は個人情報サブフロー内の incoming-classifier + Phone Normalization + Re-confirmation で処理"
  - "Gen2 yaml の [inqury] 誤記 → function 側の inquiry に統一（問合せ内容・変更内容とも）"
  - "Gen2 プロンプト 1-10: 用件類義語リストは OpenAI プロンプトに反映（prompter 担当）。代表例のみ profile_words にも記載"
  - "Gen2 プロンプト 3-1: 判断ルール（「検針」→健診、「人間ロック」→人間ドック等）は OpenAI プロンプトに反映"
  - "当日予約拒否ルール: 受診希望日聴取で「本日」の場合「当日予約は承っておりません。1週間後以降の〜」案内。Gen3 では OpenAI プロンプトで本日判定して NO_RESULT 扱いにし、再聴取するか、Script で当日判定を行うか要検討（confirmation_items N-2）"
  - "用件聴取失敗時の挙動: classification=問い合わせ を保存してフロー継続。Gen2 では「その他」聴取をスキップする仕様だが、Gen3 では判別フラグを持てないため標準どおり「その他」も聴取する設計（NON-BLOCKER N-3）"
  - "追加オプションの「わからない」→ Gen2 原文は company_name に「不明」格納と記載されているが、原文誤記の可能性。暫定で option フィールドに「不明」を保存（NON-BLOCKER N-1）"
  - "SMS 送信内容（smsFlag=1〜4 それぞれのテンプレート）は Dr.JOY 側で設定する"

