      confirmation_items N-3 にて人間レビュー対象とする。

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件_確認"
    tts_announcement: "次の4つのうちのいずれかでご用件をお話しください。1.予約を取る、2.変更する、3.キャンセルする、4.その他お問い合わせ、それではお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 / 「予約」「よやく」「申し込み」「予約したい」「予約を取る」「予約入れたい」「アポ」「アポイント」「新規予約」「検針」「返信」「人間ドック」「ドック」「人間ロック」「薬」「集約」等"
          output: "予約"
        - input: "DTMF 2 / 「変更」「へんこう」「変えたい」「予約変えたい」「予約ずらしたい」「日付変更」「時間変えたい」「取り直したい」「取り直し」「日程変更」「予約移動」「調整」等"
          output: "変更"
        - input: "DTMF 3 / 「キャンセル」「きゃんせる」「取り消し」「取消」「やめたい」「行けなくなった」「中止」「シャント0」「キャンプ0」等"
          output: "キャンセル"
        - input: "DTMF 4 / 「問い合わせ」「といあわせ」「質問」「聞きたい」「確認したい」「相談」「伺いたい」「そのた」「そのほか」「わからない」「不明」「決めてない」等"
          output: "問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が曖昧で 1-4 のいずれにも分類できない"
    save_to: "classification"
    next_step: "個人_企業_確認（肯定復唱後） / リトライ"
    retry_failure: "skip"
    retry_failure_announcement: "かしこまりました。折り返しの際に確認させていただきます。次の内容を伺います。"

  - step_name: "個人_企業_確認"
    tts_announcement: "ご連絡をいただいている方は健康診断を受けるご本人様でしょうか。「はい、そうです」、または「いいえ、違います」、のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "個人"
        - "企業"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「はい、そうです」「そうです」「本人です」「はい、本人です」等の肯定表現"
          output: "個人"
        - input: "「いいえ」「いえ」「いや」「違います」「いいえ、違います」等の否定表現"
          output: "企業"
        - input: "判別不能"
          output: "NO_RESULT"
      no_result_condition: "肯定・否定どちらとも判定不能"
    save_to: "company_check"
    next_step: "個人→jump_氏名聴取 / 企業→企業名_聴取"
    retry_failure: "skip"

  - step_name: "企業名_聴取"
    tts_announcement: "ご連絡をいただいている方の、企業名もしくは団体名をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "company_name"
    next_step: "担当者名_聴取"
    retry_failure: "skip"

  - step_name: "担当者名_聴取"
    tts_announcement: "ご担当者様のお名前を、「私は、ドック花子です。」のようにフルネームでお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "カタカナ氏名"
      mapping:
        - input: "音声認識結果"
          output: "カタカナに変換（Gen2【1-7】氏名カタカナ変換ルール）"
      no_result_condition: "音声認識結果が空"
    save_to: "patientName"
    next_step: "jump_電話番号聴取"
    retry_failure: "skip"

  - step_name: "健康保険組合_予約"
    tts_announcement: "ご加入の健康保険組合をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "insurance"
    next_step: "希望コース_予約"
    retry_failure: "skip"

  - step_name: "希望コース_予約"
    tts_announcement: "受診を希望されるコースや内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "course"
    next_step: "追加オプション_予約"
    retry_failure: "skip"

  - step_name: "追加オプション_予約"
    tts_announcement: "追加を希望されるオプション検査がございましたら、お話しください。ない場合には、「特にない」とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "なし"
        - "不明"
        - "フリーテキスト"
      mapping:
        - input: "「特にない」「ない」「ありません」「特にありません」「大丈夫」"
          output: "なし"
        - input: "「わからない」「わかりません」"
          output: "不明（confirmation_items N-1: 保存先が option か company_name か要確認）"
        - input: "オプション名を含むその他の音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "option"
    next_step: "受診希望日_予約"
    retry_failure: "skip"

  - step_name: "受診希望日_予約"
    tts_announcement: "受診を希望されるお日にちをお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "「今日」「本日」等の当日表現"
          output: "本日扱い（confirmation_items N-2: 当日予約拒否の実装要検討）"
        - input: "月日のみの発話"
          output: "着信年を補完（10〜12月着信で1〜9月指定は翌年）"
        - input: "「来月」「来週」等の曖昧表現"
          output: "フリーテキスト保存"
      no_result_condition: "音声認識結果が空"
    save_to: "Preferred_date"
    next_step: "その他_予約"
    retry_failure: "skip"

  - step_name: "その他_予約"
    tts_announcement: "その他に何かお問い合わせはございますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "detail"
    next_step: "END_終話_予約"
    retry_failure: "skip"

  - step_name: "予約日_変更"
    tts_announcement: "現在の予約日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "YYYY-MM-DD HH:MM 形式の日時"
        - "NO_RESULT"
      mapping:
        - input: "日付表現（月日、または年月日）"
          output: "YYYY-MM-DD 00:00:00 に正規化。年省略時は着信年を補完"
        - input: "認識不能"
          output: "NO_RESULT"
      no_result_condition: "日付として解釈不能"
    save_to: "reservationDate"
    next_step: "変更内容_変更"
    retry_failure: "skip"

  - step_name: "変更内容_変更"
    tts_announcement: "オプション検査の追加や変更、もしくは日程変更など希望されている内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "inquiry"
    next_step: "その他_変更"
    retry_failure: "skip"

  - step_name: "その他_変更"
    tts_announcement: "その他に何かお問い合わせはございますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "detail"
    next_step: "END_終話_変更"
    retry_failure: "skip"

  - step_name: "予約日_キャンセル"
    tts_announcement: "現在の予約日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "YYYY-MM-DD HH:MM 形式の日時"
        - "NO_RESULT"
      mapping:
        - input: "日付表現"
          output: "YYYY-MM-DD 00:00:00 に正規化"
        - input: "認識不能"
          output: "NO_RESULT"
      no_result_condition: "日付として解釈不能"
    save_to: "reservationDate"
    next_step: "その他_キャンセル"
    retry_failure: "skip"

  - step_name: "その他_キャンセル"
    tts_announcement: "その他に何かお問い合わせはございますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "detail"
    next_step: "END_終話_キャンセル"
    retry_failure: "skip"

  - step_name: "問合せ_内容"
    tts_announcement: "お問い合わせの内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "inquiry"
    next_step: "その他_問合せ"
    retry_failure: "skip"

  - step_name: "その他_問合せ"
    tts_announcement: "その他に何かお問い合わせはございますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "detail"
    next_step: "END_終話_問い合わせ"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "非通知でのお電話は受付できません。発信者番号を通知してから、再度おかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（本フローでは未使用。acceptance_times 未配置）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（本フローでは retry_failure=skip を基本とし、到達はしない想定）"
    tts_announcement: "かしこまりました。折り返しの際に確認させていただきます。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（用件別）---
  - name: "END_終話_予約"
    condition: "予約ルート完了（classification=予約）"
    tts_announcement: "申し込みを受付いたしました。3営業日以内に折り返しお電話もしくはショートメールにてご連絡いたします。折り返し番号は、03-3937-6256です。03-3937-6256から着信がありましたら、ご対応をお願いします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約"

  - name: "END_終話_変更"
    condition: "変更ルート完了（classification=変更）"
    tts_announcement: "申し込みを受付いたしました。3営業日以内に折り返しお電話もしくはショートメールにてご連絡いたします。折り返し番号は、03-3937-6256です。03-3937-6256から着信がありましたら、ご対応をお願いします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_変更"

  - name: "END_終話_キャンセル"
    condition: "キャンセルルート完了（classification=キャンセル）"
    tts_announcement: "キャンセルを受付いたしました。またのご利用をお待ちしております。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "3"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_終話_問い合わせ"
    condition: "問い合わせルート完了（classification=問い合わせ）"
    tts_announcement: "申し込みを受付いたしました。3営業日以内に折り返しお電話もしくはショートメールにてご連絡いたします。折り返し番号は、03-3937-6256です。03-3937-6256から着信がありましたら、ご対応をお願いします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "4"
    completion_flag_name: "完了フラグ_問い合わせ"

# smsFlag 分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
  patterns:
    - condition: "classification=予約"
      sms_flag: "1"
      notes: "予約ルート完了"
    - condition: "classification=変更"
      sms_flag: "2"
      notes: "変更ルート完了"
    - condition: "classification=キャンセル"
      sms_flag: "3"
      notes: "キャンセルルート完了"
    - condition: "classification=問い合わせ"
      sms_flag: "4"
      notes: "問い合わせルート完了"

# --- セクション8b: RAG/FAQ 検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  # 移管ノート「RAG/FAQ は本施設では無し」に準拠

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # 冒頭チェーン
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内"
    announcement: "お電話ありがとうございます。人間ドック会館クリニックのAI電話です。このあとのご案内で、うまく聞き取れない場合は、「もう一度」、「もう一回」などとお話しいただくと、再度ご質問いたします。"

  - module_name: "END_非通知"
    purpose: "非通知拒否終話"
