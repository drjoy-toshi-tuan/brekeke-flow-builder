  # サブフロー聴取項目（Rule 9完全コピー）
  - order: 16
    name: "診察券番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "medicalCardNumber"
