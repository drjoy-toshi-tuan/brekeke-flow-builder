# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
  patterns:
    - condition: "classification=キャンセル"
      sms_flag: "2"
      notes: "Gen2ルール: status==1かつキャンセルのときのみ smsFlag=2"
    - condition: "classification=変更"
      sms_flag: "1"
      notes: "Gen2ルール: status==1かつキャンセル以外は smsFlag=1"
    - condition: "classification=確認"
      sms_flag: "1"
      notes: "Gen2ルール: status==1かつキャンセル以外は smsFlag=1"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"
  inquiry_insertion_point: ""
  pre_termination: true
  notes: >
    パターン2（全終話前のみ）。Gen2に問い合わせ専用フローが存在しないため、
    パターン1の挿入箇所が不明。正常終話（END_変更/END_キャンセル/END_確認）の前にRAGサブフローを挿入。
    代表案内系/異常系の終話前には挿入しない。

