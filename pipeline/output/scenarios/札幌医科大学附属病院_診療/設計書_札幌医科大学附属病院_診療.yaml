# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "当日翌日確認"
    tts_announcement: "今回お電話いただいたご用件は、本日もしくは翌営業日の予約に関するお問い合わせでしょうか。はい、そうです。いいえ、違いますのようにお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "当日翌日"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」「当日」「今日」「翌日」「明日」等の肯定/当日翌日表現"
          output: "当日翌日"
        - input: "DTMF 2 または「いいえ」「違います」「明後日」「先の日程」等の否定/将来日程表現"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "clinicDay"
    next_step: "当日翌日→END_当日翌日案内、いいえ/NO_RESULT→診療科_聴取（リトライ上限到達時も診療科_聴取へ）"
    retry_failure: "skip"

  - step_name: "診療科聴取"
    tts_announcement: "それでは、予約票に記載されている診療科を、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "消化器総合"
        - "乳腺内分泌外科"
        - "歯科口腔外科"
        - "整形外科"
        - "小児科"
        - "麻酔科"
        - "放射線治療科"
        - "免疫リウマチ内科"
        - "循環器腎臓代謝内分泌内科"
        - "呼吸器アレルギー内科"
        - "腫瘍内科"
        - "血液内科"
        - "脳神経内科"
        - "総合診療科"
        - "感染症内科"
        - "心臓血管外科"
        - "呼吸器外科"
        - "神経精神科"
        - "リハビリテーション科"
        - "神経再生医療科"
        - "脳神経外科"
        - "皮膚科"
        - "形成外科"
        - "泌尿器科"
        - "眼科"
        - "耳鼻咽喉科"
        - "婦人科"
        - "消化器内科"
        - "NO_RESULT"
      mapping:
        - input: "しょうかきげか/しょうかきのげか/しょうげ/消化器外科 等"
          output: "消化器総合"
        - input: "消化器内科/しょうない/しょうかきのないか 等"
          output: "消化器内科"
        - input: "せいけい/せいけいげか 等"
          output: "整形外科"
        - input: "しょうにか/しょうに 等"
          output: "小児科"
        - input: "ますい/ぺいん/かんぽう/じゅつぜん 等"
          output: "麻酔科"
        - input: "ほうしゃせんちりょうか/ほうしゃせん/らじ 等"
          output: "放射線治療科"
        - input: "りうまち/めんえき/こうげんびょう 等"
          output: "免疫リウマチ内科"
        - input: "じゅんかんき/じんぞう/ないぶんぴつ 等"
          output: "循環器腎臓代謝内分泌内科"
        - input: "こきゅうきないか/あれるぎーないか/こない 等"
          output: "呼吸器アレルギー内科"
        - input: "しゅようないか/しゅない 等"
          output: "腫瘍内科"
        - input: "けつえきないか/けつない 等"
          output: "血液内科"
        - input: "のうしんけいないか 等"
          output: "脳神経内科"
        - input: "そうごうしんりょうか/そうしん 等"
          output: "総合診療科"
        - input: "しんぞうけっかんげか/しんげ 等"
          output: "心臓血管外科"
        - input: "こきゅうきげか/こげ 等"
          output: "呼吸器外科"
        - input: "しんけいせいしんか/せいしんか/ものわすれ/にんちしょう/はったつしょう 等"
          output: "神経精神科"
        - input: "りはびりてーしょんか/りはか 等"
          output: "リハビリテーション科"
        - input: "しんけいさいせいいりょうか 等"
          output: "神経再生医療科"
        - input: "あたまの外科 等"
          output: "脳神経外科"
        - input: "「診察」「印刷」「定期」「新薬」「再診」「最新」「禁忌」等"
          output: "NO_RESULT"
        - input: "上記いずれにも該当しない/聞き取り不可"
          output: "NO_RESULT"
      no_result_condition: "診療科として認識できない発話"
    save_to: "clinicalDepartment"
    next_step: >
      後段ContextMatchRouterでグループ分岐:
      消化器総合/乳腺内分泌外科 → G1用件聴取
      整形外科/小児科 → G3診察予定確認
      麻酔科 → G4診察予定確認
      歯科口腔外科/放射線治療科 → G5用件聴取
      上記以外 → END_代表案内_診療科対象外
    retry_failure: "end_failure"

  - step_name: "診察予定確認_G3"
    tts_announcement: "次のご予約は、CT、MRI、骨塩定量検査を予定しておりますでしょうか。はい、予定しています、いいえ、予定していません、のようにお話ください。わからない場合は、わからないとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "有"
        - "無"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「予定しています」等の肯定"
          output: "有"
        - input: "「いいえ」「予定していません」等の否定"
          output: "無"
        - input: "「わからない」等"
          output: "わからない"
        - input: "上記以ずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "判定不可"
    save_to: "medicalServiceDetails"
    next_step: "有→END_代表案内_G3G4、無/わからない/NO_RESULT→用件聴取"
    retry_failure: "skip"

  - step_name: "診察予定確認_G4"
    tts_announcement: "次のご予約は、レントゲン撮影と、採血を予定しておりますでしょうか。はい、予定しています、いいえ、予定していません、のようにお話ください。わからない場合はわからない、とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "有"
        - "無"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「予定しています」等の肯定"
          output: "有"
        - input: "「いいえ」「予定していません」等の否定"
          output: "無"
        - input: "「わからない」等"
          output: "わからない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "判定不可"
    save_to: "medicalServiceDetails"
    next_step: "有→END_代表案内_G3G4、無/わからない/NO_RESULT→用件聴取"
    retry_failure: "skip"

  - step_name: "用件聴取"
    tts_announcement: "ご用件を、次の3つのうちの、いずれかでお話ください。予約を変更する。予約をキャンセルする。予約を確認する。それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "NO_RESULT"
      mapping:
        - input: "「変更」「変えたい」「変更する」「契約の変更」等"
          output: "変更"
        - input: "「キャンセル」「取り消し」「キャンセルする」等"
          output: "キャンセル"
        - input: "「確認」「確認する」「確認したい」等"
          output: "確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "3択のいずれにも該当しない"
    save_to: "classification"
    next_step: "変更→予約日聴取、キャンセル→予約日聴取(キャンセル)、確認→確認内容聴取"
    retry_failure: "end_failure"

  - step_name: "予約日聴取"
    tts_announcement: "予約票に記載されている予約日を、4月1日のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト"
        - "NO_RESULT"
      mapping:
        - input: "日付として認識可能な発話"
          output: "日付テキスト（YYYY-MM-DD形式）"
        - input: "日付として認識不可"
          output: "NO_RESULT"
      no_result_condition: "日付として認識不可"
    save_to: "reservationDate"
