# --- セクション11: 特記事項・制約 ---
special_notes:
  - >
    Gen2→Gen3移管。Gen2プロンプト v4（2026/03/31修正）が元。
    放射線治療科はG5（歯科口腔外科と同グループ）に分岐するよう制御。
  - >
    診療科は全28科。G1-G5以外はすべてG6（代表電話案内）。
    G6の代表電話番号は011-611-2111。受付時間: 祝日除く月〜金 9:00〜15:30。
  - >
    smsFlag分岐: classification=キャンセル→smsFlag="2"、変更/確認→smsFlag="1"。
    ContextMatchRouterでclassificationベースの終話分岐を実装する。
  - >
    G3（整形外科/小児科）の変更ルートのみ第1-3希望日を聴取（他グループは希望日1つ）。
    第2/3希望日はsecondPreferredDate/thirdPreferredDateに格納。
  - >
    G5（歯科口腔外科/放射線治療科）の変更ルートのみ都合確認を聴取。
    callbackTimeに格納。
  - >
    Gen2の「診察」と判断する単語リスト（印刷/定期/新薬/再診/最新/禁忌）は
    OpenAI_診療科のプロンプトで NO_RESULT として処理する。
  - >
    Gen2では複合発話を受け入れていたが、Gen3では1発話1意図の原則に従い各ステップで1つの情報のみ聴取する。
  - >
    Gen2のendpoint/checkout/smsFlagフィールドはsaveContextModel2DBに含めない（Gen2→Gen3マッピングルール）。
  - >
    個人情報聴取サブフローはCLAUDE.md Rule 9準拠。静的JSONを完全コピー。
    生年月日は復唱なし（Gen2で明示的に復唱禁止）。
  - >
    RAGサブフローはパターン2（全終話前のみ）。正常終話（END_変更/END_キャンセル/END_確認）前に挿入。
    代表案内系/異常系の終話前には配置しない。

