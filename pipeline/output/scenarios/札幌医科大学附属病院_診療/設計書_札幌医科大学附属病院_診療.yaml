# --- セクション3: フローの目的 ---
purpose: >
  札幌医科大学附属病院の予約専用AI電話。患者からの電話を受け、
  当日/翌日予約の確認 → 診療科の特定 → グループ別分岐（G1:消化器系/G3:整形小児/G4:麻酔/G5:歯科放射線/G6:代表案内）
  → 用件（変更/キャンセル/確認）→ グループ別聴取項目 → 個人情報聴取（診察券番号/氏名/生年月日/電話番号）
  → 受付完了まで自動化する。対象外の診療科や当日/翌日予約、特定検査予定がある場合は代表電話案内に誘導する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "札幌医科大学附属病院$診療_20260413"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(status=2) → END_非通知(TTS) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → 完了フラグ_時間外(status=6) → END_時間外(TTS) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → 当日翌日_確認(TTS)
                                      → 入力_当日翌日確認(DTMF AmiVoice STT, max_dtmf_length=1)
                                      → OpenAI_当日翌日(generate_by_OpenAI)
                                          ├─ 当日翌日 → 完了フラグ_当日翌日案内(status=2) → END_当日翌日案内(TTS) → 切断
                                          └─ いいえ/NO_RESULT → リトライ_当日翌日
                                                                   ├─ Retry → 当日翌日_確認(TTS)
                                                                   └─ No more → 診療科_聴取(TTS)

      ─── 診療科聴取 ───
      診療科_聴取(TTS)
        → 入力_診療科(AmiVoice STT)
        → OpenAI_診療科(generate_by_OpenAI)
            ├─ NO_RESULT → リトライ_診療科
            │               ├─ Retry → 診療科_聴取(TTS)
            │               └─ No more → 完了フラグ_聴取失敗(status=3) → END_聴取失敗(TTS) → 切断
            └─ success → ContextMatchRouter_グループ分岐(module=OpenAI_診療科)
                            ├─ 消化器総合/乳腺内分泌外科 → G1: 用件_聴取
                            ├─ 整形外科/小児科 → G3: 診察予定_G3(TTS)
                            ├─ 麻酔科 → G4: 診察予定_G4(TTS)
                            ├─ 歯科口腔外科/放射線治療科 → G5: 用件_聴取
                            └─ その他 → 完了フラグ_代表案内_診療科(status=2) → END_代表案内_診療科対象外(TTS) → 切断

      ─── G3: 診察予定確認（CT/MRI/骨塩定量検査）───
      診察予定_G3(TTS)
        → 入力_診察予定_G3(AmiVoice STT)
        → OpenAI_診察予定_G3(generate_by_OpenAI)
            ├─ 有 → 完了フラグ_代表案内_G3G4(status=2) → END_代表案内_G3G4(TTS) → 切断
            ├─ 無/わからない → 用件_聴取(TTS) に合流
            └─ NO_RESULT → リトライ_診察予定_G3 → No more → 用件_聴取(TTS) に合流

      ─── G4: 診察予定確認（レントゲン/採血）───
      診察予定_G4(TTS)
        → 入力_診察予定_G4(AmiVoice STT)
        → OpenAI_診察予定_G4(generate_by_OpenAI)
            ├─ 有 → 完了フラグ_代表案内_G3G4(status=2) → END_代表案内_G3G4(TTS) → 切断
            ├─ 無/わからない → 用件_聴取(TTS) に合流
            └─ NO_RESULT → リトライ_診察予定_G4 → No more → 用件_聴取(TTS) に合流

      ─── 用件聴取（G1/G3/G4/G5 共通）───
      用件_聴取(TTS)
        → 入力_用件(AmiVoice STT)
        → OpenAI_用件(generate_by_OpenAI)
            ├─ 変更 → 予約日_聴取(TTS)
            ├─ キャンセル → 予約日_キャンセル_聴取(TTS)
            ├─ 確認 → 確認内容_聴取(TTS)
            └─ NO_RESULT → リトライ_用件
                             ├─ Retry → 用件_聴取(TTS)
                             └─ No more → 完了フラグ_聴取失敗(status=3) → END_聴取失敗(TTS) → 切断

      ─── 変更ルート ───
      予約日_聴取(TTS)
        → 入力_予約日(AmiVoice STT)
        → OpenAI_予約日(generate_by_OpenAI)
            └─ success → ContextMatchRouter_変更グループ分岐(module=OpenAI_診療科)
                            ├─ 整形外科/小児科 → 第一希望日_聴取(TTS)
                            ├─ 麻酔科 → 希望日_聴取(TTS)
                            └─ default → 希望日_聴取(TTS)

      希望日_聴取(TTS) [G1/G4/G5用]
        → 入力_希望日(AmiVoice STT)
        → OpenAI_希望日 → ContextMatchRouter_担当先生要否(module=OpenAI_診療科)
                            ├─ 消化器総合/乳腺内分泌外科/歯科口腔外科/放射線治療科 → 担当先生_聴取(TTS)
                            └─ default → サブフロー遷移_診察券番号

      第一希望日_聴取(TTS) [G3用]
        → 入力_第一希望日(AmiVoice STT) → OpenAI_第一希望日
        → 第二希望日_聴取(TTS)
        → 入力_第二希望日(AmiVoice STT) → OpenAI_第二希望日
        → 第三希望日_聴取(TTS)
        → 入力_第三希望日(AmiVoice STT) → OpenAI_第三希望日
        → サブフロー遷移_診察券番号

      担当先生_聴取(TTS) [G1/G5]
        → 入力_担当先生(AmiVoice STT) → OpenAI_担当先生
        → サブフロー遷移_診察券番号

      ─── キャンセルルート ───
      予約日_キャンセル_聴取(TTS)
        → 入力_予約日_キャンセル(AmiVoice STT) → OpenAI_予約日_キャンセル
        → 次回受診予定日_聴取(TTS)
        → 入力_次回受診予定日(AmiVoice STT)
        → OpenAI_次回受診予定日(generate_by_OpenAI)
            ├─ はい → 次回予約希望日_聴取(TTS) → 入力 → OpenAI → ContextMatchRouter_キャンセル担当先生要否
            └─ いいえ → ContextMatchRouter_キャンセル担当先生要否(module=OpenAI_診療科)
                          ├─ G1/G5 → 担当先生_キャンセル_聴取(TTS) → サブフロー遷移_診察券番号
                          └─ default → サブフロー遷移_診察券番号

      ─── 確認ルート ───
      確認内容_聴取(TTS)
        → 入力_確認内容(AmiVoice STT) → OpenAI_確認内容
        → サブフロー遷移_診察券番号

      ─── 個人情報サブフロー遷移（共通合流）───
      サブフロー遷移_診察券番号(Custom Jump to Flow)
        → サブフロー遷移_氏名(Custom Jump to Flow)
        → サブフロー遷移_生年月日(Custom Jump to Flow)
        → サブフロー遷移_電話番号(Custom Jump to Flow)
        → ContextMatchRouter_G5都合(module=OpenAI_診療科)
            ├─ 歯科口腔外科/放射線治療科 → ContextMatchRouter_G5変更判定(module=OpenAI_用件)
            │     ├─ 変更 → 都合確認_聴取(TTS) → 入力 → OpenAI → サブフロー遷移_RAG
            │     └─ default → サブフロー遷移_RAG
            └─ default → サブフロー遷移_RAG

      ─── RAGサブフロー（全終話前、パターン2）───
      サブフロー遷移_RAG(Custom Jump to Flow)
        → ContextMatchRouter_終話分岐(module=OpenAI_用件)
            ├─ キャンセル → 完了フラグ_キャンセル(status=1, smsFlag=2) → END_キャンセル(TTS) → 切断
            ├─ 確認 → 完了フラグ_確認(status=1, smsFlag=1) → END_確認(TTS) → 切断
            └─ 変更 → 完了フラグ_変更(status=1, smsFlag=1) → END_変更(TTS) → 切断

      ─── 終話パターン一覧 ───
      END_非通知(TTS) → 切断
      END_時間外(TTS) → 切断
      END_聴取失敗(TTS) → 切断
      END_当日翌日案内(TTS) → 切断
      END_代表案内_診療科対象外(TTS) → 切断
      END_代表案内_G3G4(TTS) → 切断
      END_変更(TTS) → 切断
      END_キャンセル(TTS) → 切断
      END_確認(TTS) → 切断
    notes: |
      診療科ルーティング:
        G1(消化器総合/乳腺内分泌外科): 用件→予約日→希望日→担当先生→個人情報→終話
        G3(整形外科/小児科): 診察予定確認→用件→予約日→第1-3希望日→個人情報→終話
        G4(麻酔科): 診察予定確認→用件→予約日→希望日→個人情報→終話
        G5(歯科口腔外科/放射線治療科): 用件→予約日→希望日→担当先生→個人情報→都合確認(変更のみ)→終話
        G6(上記以外): 代表電話案内
      ContextMatchRouterを使用してグループ分岐と終話分岐を制御する。
      用件聴取モジュールは全グループ共通（アナウンス文言同一のため）。

