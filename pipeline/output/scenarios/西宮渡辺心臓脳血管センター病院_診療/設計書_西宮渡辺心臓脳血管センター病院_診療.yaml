      output_values: ["再診", "新規"]
      mapping:
        - { input: "はい / そうです / 通院中 / 通っています / あります", output: "再診" }
        - { input: "いいえ / 違います / 初めて / 初診 / しょしん / 新規 / 新しい / 一度も", output: "新規" }
      no_result_condition: "上記いずれにも該当しない発話（NO_RESULT は default で新規扱い、紹介状確認へ進む安全側）"
    save_to: "visitHistory"
