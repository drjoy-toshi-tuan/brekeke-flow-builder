    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約変更_携帯"

  - name: "END_予約変更_固定"
    condition: "classification=変更 AND phonetype=2"
    tts_announcement: "予約の変更を受付いたしました。のちほど、担当者から折り返し、電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_予約変更_固定"

  - name: "END_予約キャンセル_携帯"
    condition: "classification=キャンセル AND phonetype=1"
    tts_announcement: "ご予約のキャンセルを承りました。追加のご案内や確認が必要な方には、のちほど、担当者から折り返し、電話もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
