# セクション11: 特記事項・制約
# =====================================================
special_notes:
  - "受付時間は曜日別: 月-金 8:30-16:30 / 土曜 8:30-11:30 / 日祝休。Dr.JOY/Brekeke の祝日カレンダーで個別管理。"
  - "Gen1 元資料に存在する『2/3 8:30 〜運用開始（営業前アナウンス）』は運用開始日の暫定文言のため Gen3 では除外。Gen3 移管後（2026 年 5 月時点）にこの文言は不要。時限的アナウンスが必要な場合は patch_box で対応する。"
  - "代表電話 0798-36-1880 は END_当日予約 / END_緊急救急 / END_未対応案内 / END_聴取失敗 の 4 終話 TTS で読み上げる。Gen1 では繰り返し回数が異なる: 緊急救急=2 回 / 当日予約=2 回 / 未対応案内=3 回 / 聴取失敗=3 回。Gen3 でもこの繰り返し回数を踏襲。"
  - "用件分類は 4 値（診察予約 / 変更 / キャンセル / 確認）。健康診断・健診・人間ドックは用件レベルでは NO_RESULT 扱い、診療科聴取段階で「未対応」として吸収。"
  - "用件「診察予約」のみ「本日のご受診?」（当日確認）→ 当日希望なら END_当日予約。当日希望なしで通院歴問答（再診/新規）。新規の場合のみ紹介状確認。"
  - "紹介状の有無確認は新規予約ルートのみ実行。Gen1 仕様通り、あり/なし共に新規_診療科 へ続行（紹介状なしを終話誘導しない）。N-4 を確認。"
  - "確認ルートは予約日を聴取しない（Gen1 main.yaml 用件の確認 → 確認(箱) → 内容確認 直行と一致）。"
  - "キャンセルルートのみ「次の予約希望日はありますか？」を聴取。あり/なし共に氏名聴取に続行（業務分岐には使わない）。"
  - "予約日聴取は音声 + DTMF 4 桁（MMDD）併用。OpenAI で「YYYY-MM-DD（年は本日以降の最も近い同日に補正）」へ正規化。Gen1 の比較日 +1 年補正は OpenAI プロンプトで吸収。"
  - "終話 TTS は Gen1 main.yaml の 携帯あり/なし × 用件 4 種 = 8 通りに展開。携帯（phonetype=1）は SMS 言及あり、固定（phonetype=2）は電話のみ。Gen1 の SMSあり/SMSなし は時間内文言、SMSあり_1/SMSなし_1 は時間外文言だが、Gen3 では時間外は冒頭の date_of_call_classifier で END_時間外（status=6）に直接ルーティングする設計のため時間外専用受付完了文言は不要。"
  - "状態フラグ status の使用値: 1=受付完了 / 2=代表案内・誘導 / 3=聴取失敗 / 6=時間外。Gen1 status=0 / 5 は使用禁止。"
  - "サブフロー（氏名 / 生年月日 / 電話番号 / 診察券）は標準テンプレートをコピー使用。flowname プレフィックスは「西宮渡辺心臓脳血管センター病院$」。"
  - "group_name 文字数: 西宮渡辺心臓脳血管センター病院 = 14 文字（漢字）。最長サブフロー名（診察券番号聴取 = 7 文字）と組合せても URL エンコード後 約 211 バイト ≤ 255 の安全範囲内。"
  - "Gen1 診療科聞き取り.yaml の「外科のみ単独発話 → 心臓血管外科/血管外科/呼吸器外科/整形外科/脳神経外科 の問い直し」は OpenAI プロンプトで「外科のみの発話は最も類似した外科系診療科を 1 つ選択。判定不能なら NO_RESULT」と指示することで 1 段で吸収（director の追問ループは作らない）。"
  - "Gen1 診療科聞き取り.yaml の「わからない」発話は no_result_default=登録なし に保存して通常ルートへ続行（Gen1 では `わからないセット → かしこまりました → END_戻る` で通常ルートに合流するのと同等動作）。"
  - "TTS は `{tts_g:...}` 小文字フォーマット（Google TTS）デフォルト。SSML 不可。動的値置換は `<% var %>` のみ使用可。"
  - "STT 辞書（profile_words）と OpenAI 類義語は entity_stt_patch.json / entity_openai_synonyms.md / entity_classification.md に機械抽出済み（304 STT 辞書 + 95 OpenAI 類義語）。scaffold/properties が自動取り込みするため director の手動転記は不要。セクション10 の amivoice_dictionary は施設固有の代表的な追加項目のみ。"

