# =====================================================
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内"
    announcement: "お電話ありがとうございます。西宮渡辺心臓脳・血管センターの、予約専用AI電話です。"

  - module_name: "非通知_アナウンス"
    purpose: "非通知着信時の案内"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  - module_name: "時間外_アナウンス"
    purpose: "受付時間外の案内"
    announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。このままお電話にて内容はお伺いいたしますが、回答につきましては翌営業日にさせていただきます。受付時間は、日曜・祝日を除く、月曜日から金曜日の8時30分から16時30分、土曜日は8時30分から11時30分となっております。恐れ入りますが、翌営業日に折り返し電話、もしくはSMSにてご連絡いたします。お電話ありがとうございました。"

  - module_name: "用件確認"
    purpose: "用件分類（診察予約 / 変更 / キャンセル / 確認）"
    announcement: "ご用件を、次の4つのうちのいずれかでお話しください。「診察の予約を取る」、「変更する」、「確認する」、「キャンセルする」、それでは、お話しください。"

  - module_name: "当日確認"
    purpose: "用件「診察予約」直後の本日希望チェック"
    announcement: "本日のご受診をご希望でしょうか。「はい、本日です」または、「いいえ、別の日です」のようにお話しください。"

  - module_name: "通院歴確認"
    purpose: "診察予約 + 当日希望なしの通院歴チェック"
    announcement: "現在、通院中の診療科のご予約ですか。「はい、通院中です」または、「いいえ、初めてです」のようにお話しください。"

  - module_name: "紹介状確認"
    purpose: "新規予約ルートの紹介状有無確認"
    announcement: "他の医療機関からの紹介状はお持ちですか。「はい、持っています」または、「いいえ、持っていません」でお答えください。"

  - module_name: "新規_診療科"
    purpose: "新規予約ルートの診療科聴取"
    announcement: "受診を希望される診療科をおっしゃってください。"

  - module_name: "再診_診療科"
    purpose: "再診ルートの診療科聴取"
    announcement: "予約票に記載されている診療科をおっしゃってください。"

  - module_name: "変更_診療科"
    purpose: "予約変更ルートの診療科聴取"
    announcement: "予約票に記載されている診療科をおっしゃってください。"

  - module_name: "キャンセル_診療科"
    purpose: "予約キャンセルルートの診療科聴取"
    announcement: "予約票に記載されている診療科をおっしゃってください。"

  - module_name: "確認_診療科"
    purpose: "予約確認ルートの診療科聴取"
    announcement: "受診を希望されている診療科をおっしゃってください。"

  - module_name: "予約日聴取"
    purpose: "予約日聴取（変更・キャンセル共通、音声 + DTMF 4 桁併用）"
    announcement: "では次に、予約票に記載されている予約日を「4月1日」のように日付でおっしゃってください。なお、ダイヤルプッシュでの入力も可能です。シャープに続けて、月と日にちの4桁の数字を入力してください。"

  - module_name: "変更理由聴取"
    purpose: "予約変更の理由聴取"
    announcement: "では次に、変更の理由をお伺いいたします。簡潔にお話しください。"

  - module_name: "キャンセル理由聴取"
    purpose: "予約キャンセルの理由聴取"
    announcement: "では次に、キャンセルの理由をお伺いいたします。簡潔にお話しください。"

  - module_name: "次予約希望日確認"
    purpose: "キャンセル時の次予約希望日有無確認"
    announcement: "次の予約希望日はありますか。「はい、あります」または、「いいえ、ありません」でお答えください。"

  - module_name: "確認内容聴取"
    purpose: "予約確認ルートの確認内容聴取"
    announcement: "では次に、確認されたい内容をお伺いいたします。簡潔にお話しください。"

  - module_name: "END_当日予約"
    purpose: "当日予約 → AI 電話受付不可案内（代表電話 0798-36-1880）"
    announcement: "当日のご予約に関しては、こちらのAI電話では受付できません。恐れ入りますが、西宮渡辺心臓脳・血管センター代表電話までおかけなおしください。代表電話番号は、0798-36-1880です。繰り返します。代表電話番号は、0798-36-1880です。お電話ありがとうございました。"

  - module_name: "END_緊急救急"
    purpose: "緊急/救急 → 代表電話誘導（Gen1 救急案内 と完全一致、2 回繰り返し）"
    announcement: "大変申し訳ございません。この電話では受付しておりません。代表電話番号、0798-36-1880へご連絡ください。繰り返します。代表電話番号、0798-36-1880へご連絡ください。お電話ありがとうございました。"

  - module_name: "END_未対応案内"
    purpose: "AI 非対応診療科（フットケア外来 / 外来リハビリ / 心血管センター / 健診 / 予防接種 / セカンドオピニオン外来）→ 代表電話誘導（Gen1 未対応終話 と完全一致、3 回繰り返し）"
    announcement: "電話番号が分かる方は、このままお電話をお切りください。わからない方は、ご案内しますので、メモをご準備ください。代表電話番号は、0798-36-1880です。繰り返します。代表電話番号は、0798-36-1880です。繰り返します。代表電話番号は、0798-36-1880です。お電話ありがとうございました。"

  - module_name: "END_聴取失敗"
    purpose: "リトライ上限到達 → 代表電話誘導（Gen1 聞き取れず終話 と完全一致、3 回繰り返し）"
    announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、西宮渡辺心臓脳・血管センター 代表番号までおかけなおしください。受付時間は日曜祝日、年末年始を除く月曜日から金曜日の8時30分から16時30分、土曜日は8時30分から11時30分です。電話番号が分かる場合は、そのままお電話をお切りください。分からない場合は、このままご案内いたします。代表電話番号は、0798-36-1880です。繰り返します。代表電話番号は、0798-36-1880です。繰り返します。代表電話番号は、0798-36-1880です。お電話ありがとうございました。"

  - module_name: "END_診察予約_携帯"
    purpose: "診察予約 + 携帯電話の終話"
    announcement: "予約の申し込みを受付いたしました。のちほど、担当者から折り返し、電話もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"

