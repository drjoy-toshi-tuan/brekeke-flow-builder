    condition: "classification=キャンセル AND phonetype=2"
    tts_announcement: "ご予約のキャンセルを承りました。追加のご案内や確認が必要な方には、のちほど、担当者から折り返し、電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
