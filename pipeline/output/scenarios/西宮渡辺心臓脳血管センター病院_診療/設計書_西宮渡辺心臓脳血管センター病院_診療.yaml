# =====================================================
# セクション2: フロー構成
# =====================================================
flow_structure:
  type: "subflow"
  flows:
    - name: "西宮渡辺心臓脳血管センター病院$診療"
      role: "main"
      description: "西宮渡辺心臓脳・血管センターの診療予約受付フロー。用件 4 分類（診察予約 / 変更 / キャンセル / 確認）+ 診療科段階で 緊急/救急/未対応 特殊終話、診察予約ルートでの当日予約チェック・通院歴チェック・紹介状確認、変更/キャンセル/確認ルートでの予約日・理由聴取、最終的に classification × phonetype の終話 8 分岐 + 当日予約・緊急救急・未対応・聴取失敗・非通知・時間外の特殊終話を実装する。診療科リストは循環器・心臓血管・脳神経外科特化（12 診療科）。"
  subflows:
    - name: "西宮渡辺心臓脳血管センター病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。patientName を返却。"
    - name: "西宮渡辺心臓脳血管センター病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（DOB Re-confirmation 復唱あり）。patientDateOfBirth を返却。Gen1 では和暦/西暦判定 + DTMF 8 桁を含むがサブフロー標準テンプレートで吸収。"
    - name: "西宮渡辺心臓脳血管センター病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（incoming-classifier + Phone Normalization + 復唱あり）。additionalPhoneNumber と phonetype（1=携帯/ip050、2=固定/IP/その他/withheld）を返却。"
    - name: "西宮渡辺心臓脳血管センター病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。medicalCardNumber を返却。「わからない」分岐含む。新規（診察予約 + 通院歴=新規）はスキップ。"

# =====================================================
# セクション3: フローの目的
# =====================================================
purpose: >
  西宮渡辺心臓脳・血管センターの診療予約に関する電話を受け、
  診察予約（新規・再診）・予約変更・予約キャンセル・予約確認の 4 用件を分類する。
  診察予約ルートでは「本日希望」「通院歴」「紹介状」の 3 段問答を行い、
  当日希望なら代表電話誘導、通院歴なし（新規）なら紹介状を確認した上で診療科聴取、通院歴あり（再診）なら直接診療科聴取に進む。
  各用件で診療科を聴取し、緊急・救急は END_緊急救急 へ、AI 非対応診療科（フットケア外来 / 外来リハビリ / 心血管センター / 健診 / 予防接種 / セカンドオピニオン外来）は
  END_未対応案内（代表電話誘導）へ分岐する。
  変更・キャンセル・確認ルートでは予約日・理由・（キャンセル時のみ）次予約希望日を追加聴取する。
  最終的に氏名・生年月日・電話番号（および新規以外は診察券番号）を聴取し、
  classification × phonetype（携帯/固定）の 2 段分岐で計 8 パターンの終話 TTS を出し分ける。

# =====================================================
# セクション4: シナリオフロー図
# =====================================================
flow_diagrams:
  - flow_name: "西宮渡辺心臓脳血管センター病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常 → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → 用件確認 (enum: 診察予約/変更/キャンセル/確認)
                                           ├─ 診察予約 → 当日確認 (enum: 本日/別日)
                                           │              ├─ 本日 → END_当日予約
                                           │              └─ 別日 → 通院歴確認 (enum: 再診/新規)
                                           │                          ├─ 再診 → 再診_診療科 → (緊急/救急→END_緊急救急、未対応→END_未対応案内、default→氏名聴取)
                                           │                          └─ 新規 → 紹介状確認 (enum: あり/なし)
                                           │                                      └─ 共通 → 新規_診療科 → (緊急/救急→END_緊急救急、未対応→END_未対応案内、default→氏名聴取)
                                           ├─ 変更 → 変更_診療科 → (緊急/救急→END_緊急救急、未対応→END_未対応案内、default→予約日聴取 → 理由種別分岐 → 変更理由聴取 → 氏名聴取)
                                           ├─ キャンセル → キャンセル_診療科 → (緊急/救急→END_緊急救急、未対応→END_未対応案内、default→予約日聴取 → 理由種別分岐 → キャンセル理由聴取 → 次予約希望日確認 → 氏名聴取)
                                           └─ 確認 → 確認_診療科 → (緊急/救急→END_緊急救急、未対応→END_未対応案内、default→確認内容聴取 → 氏名聴取)
                                        共通個人情報聴取（氏名聴取 → 生年月日聴取 → 電話番号聴取）
                                          → 終話分岐_診察券要否_用件 (classification)
                                              ├─ 診察予約 → 終話分岐_診察券要否_通院歴 (visitHistory)
                                              │              ├─ 新規 → 終話分岐_用件（診察券スキップ）
                                              │              └─ default → 診察券番号聴取 → 終話分岐_用件
                                              └─ default → 診察券番号聴取 → 終話分岐_用件
                                          → 終話分岐_用件 (classification)
                                              ├─ 診察予約 → 終話分岐_診察予約_電話種別 → END_診察予約_携帯/固定
                                              ├─ 変更 → 終話分岐_変更_電話種別 → END_予約変更_携帯/固定
                                              ├─ キャンセル → 終話分岐_キャンセル_電話種別 → END_予約キャンセル_携帯/固定
                                              └─ 確認 → 終話分岐_確認_電話種別 → END_予約確認_携帯/固定
    notes: "Pattern A: 用件確認・診療科聴取の特殊診療科直接分岐。Pattern B: 終話直前の classification × phonetype 2 段 ContextMatchRouter（8 終話 + 当日予約/緊急救急/未対応案内/聴取失敗の特殊終話）。"

# =====================================================
# セクション4b: シナリオフロー定義（ブロック構成）
# =====================================================
scenario_flow:
  # ---------- 冒頭 ----------
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # ---------- 用件確認 (Pattern A) ----------
  - step: 用件確認
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "診察予約"
        next: 当日確認
      - match: "変更"
        next: 変更_診療科
      - match: "キャンセル"
        next: キャンセル_診療科
      - match: "確認"
        next: 確認_診療科
      - match: "other"
        next: END_聴取失敗

  # =====================================================
  # 診察予約ルート（当日確認 → 通院歴 → 紹介状 → 診療科）
  # =====================================================
  - step: 当日確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "本日"
        next: END_当日予約
      - match: "別日"
        next: 通院歴確認
      - match: "other"
        next: 通院歴確認

  - step: 通院歴確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "再診"
        next: 再診_診療科
      - match: "新規"
        next: 紹介状確認
      - match: "other"
        next: 紹介状確認

  - step: 紹介状確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: 新規_診療科
      - match: "なし"
        next: 新規_診療科
      - match: "other"
        next: 新規_診療科

  - step: 新規_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "未対応"
        next: END_未対応案内
      - match: "other"
        next: 氏名聴取

  - step: 再診_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "未対応"
        next: END_未対応案内
      - match: "other"
        next: 氏名聴取

  # =====================================================
  # 変更ルート
  # =====================================================
  - step: 変更_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "未対応"
        next: END_未対応案内
      - match: "other"
        next: 予約日聴取

  # =====================================================
  # キャンセルルート
  # =====================================================
  - step: キャンセル_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "未対応"
        next: END_未対応案内
      - match: "other"
        next: 予約日聴取

  # =====================================================
  # 確認ルート
  # =====================================================
  - step: 確認_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "未対応"
        next: END_未対応案内
      - match: "other"
        next: 確認内容聴取

  - step: 確認内容聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 氏名聴取

  # =====================================================
  # 予約日聴取（変更・キャンセル共通）→ 理由種別分岐 → 各理由聴取
  # =====================================================
  - step: 予約日聴取
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 理由種別分岐

  - step: 理由種別分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 変更理由聴取
      - match: "キャンセル"
        next: キャンセル理由聴取
      - match: "other"
        next: 氏名聴取

  - step: 変更理由聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 氏名聴取

  - step: キャンセル理由聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 次予約希望日確認

  - step: 次予約希望日確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: 氏名聴取
      - match: "なし"
        next: 氏名聴取
      - match: "other"
        next: 氏名聴取

  # =====================================================
  # 共通 個人情報聴取
  # =====================================================
  - step: 氏名聴取
    type: subflow
    flowname: "西宮渡辺心臓脳血管センター病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "西宮渡辺心臓脳血管センター病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "西宮渡辺心臓脳血管センター病院$電話番号聴取"
    next: 終話分岐_診察券要否_用件

  # =====================================================
  # 診察券聴取要否分岐（新規=診察予約+通院歴=新規 のみスキップ）
  # =====================================================
  - step: 終話分岐_診察券要否_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "診察予約"
        next: 終話分岐_診察券要否_通院歴
      - match: "other"
        next: 診察券番号聴取

  - step: 終話分岐_診察券要否_通院歴
    type: context_match_router
    reference_module: "OpenAI_通院歴確認"
    conditions:
      - match: "新規"
        next: 終話分岐_用件
      - match: "other"
        next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "西宮渡辺心臓脳血管センター病院$診察券番号聴取"
    next: 終話分岐_用件

  # =====================================================
  # 終話分岐（Pattern B: classification × phonetype）
  # =====================================================
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "診察予約"
        next: 終話分岐_診察予約_電話種別
      - match: "変更"
        next: 終話分岐_変更_電話種別
      - match: "キャンセル"
        next: 終話分岐_キャンセル_電話種別
      - match: "確認"
        next: 終話分岐_確認_電話種別
      - match: "other"
        next: END_聴取失敗

  - step: 終話分岐_診察予約_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_診察予約_携帯
      - match: "other"
        next: END_診察予約_固定

  - step: 終話分岐_変更_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_予約変更_携帯
      - match: "other"
        next: END_予約変更_固定

  - step: 終話分岐_キャンセル_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_予約キャンセル_携帯
      - match: "other"
        next: END_予約キャンセル_固定

  - step: 終話分岐_確認_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_予約確認_携帯
      - match: "other"
        next: END_予約確認_固定

  # =====================================================
  # 終話ブロック
  # =====================================================
  - step: END_当日予約
    type: termination
    termination_ref: "END_当日予約"

  - step: END_緊急救急
    type: termination
    termination_ref: "END_緊急救急"

  - step: END_未対応案内
    type: termination
    termination_ref: "END_未対応案内"

  - step: END_診察予約_携帯
    type: termination
    termination_ref: "END_診察予約_携帯"

  - step: END_診察予約_固定
    type: termination
    termination_ref: "END_診察予約_固定"

  - step: END_予約変更_携帯
    type: termination
    termination_ref: "END_予約変更_携帯"

  - step: END_予約変更_固定
    type: termination
    termination_ref: "END_予約変更_固定"

  - step: END_予約キャンセル_携帯
    type: termination
    termination_ref: "END_予約キャンセル_携帯"

  - step: END_予約キャンセル_固定
    type: termination
    termination_ref: "END_予約キャンセル_固定"

  - step: END_予約確認_携帯
    type: termination
    termination_ref: "END_予約確認_携帯"

  - step: END_予約確認_固定
    type: termination
    termination_ref: "END_予約確認_固定"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

# =====================================================
# セクション5: コンテキストフィールド一覧
# =====================================================
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - { id: "1", order: "1", value: "診察予約" }
      - { id: "2", order: "2", value: "変更" }
      - { id: "3", order: "3", value: "キャンセル" }
      - { id: "4", order: "4", value: "確認" }
    item_default: true
    editable: true
    deletable: false
    notes: "Gen1 用件聞き取り.yaml「セットした用件の分岐」の 4 値（診察予約=「診察予約」 + 通院歴問答で「再診/新規」に再分類、変更=「予約変更」、キャンセル=「予約キャンセル」、確認=「予約日時を確認する」相当）。"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名聴取サブフローで取得。"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "診察券番号聴取サブフローで取得。新規（診察予約 + 通院歴=新規）はスキップ。"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "生年月日聴取サブフローで取得（DOB Re-confirmation 復唱あり）。Gen1 では和暦/西暦判定 + DTMF 8 桁併存。"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values:
      - { order: "1",  value: "ペースメーカー外来" }
      - { order: "2",  value: "児童精神科" }
      - { order: "3",  value: "循環器内科" }
      - { order: "4",  value: "心療内科" }
      - { order: "5",  value: "糖尿病内科" }
      - { order: "6",  value: "泌尿器科" }
      - { order: "7",  value: "不整脈科" }
      - { order: "8",  value: "血管外科" }
      - { order: "9",  value: "呼吸器外科" }
      - { order: "10", value: "心臓血管外科" }
      - { order: "11", value: "整形外科" }
      - { order: "12", value: "脳神経外科" }
      - { order: "13", value: "登録なし" }
    item_default: true
    editable: true
    deletable: false
    notes: "Gen1 診療科聞き取り.yaml の `01_00_分岐なし診療科`（7 科：ペースメーカー外来 / 児童精神科 / 循環器内科 / 心療内科 / 糖尿病内科 / 泌尿器科 / 不整脈科）+ `分岐あり診療科`（5 科：血管外科 / 呼吸器外科 / 心臓血管外科 / 整形外科 / 脳神経外科）= 計 12 診療科 + 登録なし（no_result）。緊急/救急/未対応は終話分岐の意思決定にのみ使用するため clinicalDepartment には含めない。"

  - context_name: "todayReservation"
    context_name_jp: "当日希望"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "用件「診察予約」直後のみ聴取。{本日, 別日}。本日→END_当日予約、別日→通院歴確認 へ。NO_RESULT は別日扱い（安全側）。"

  - context_name: "visitHistory"
    context_name_jp: "通院歴"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "用件「診察予約」+ 当日希望なしの場合のみ聴取。{再診, 新規}。再診→直接診療科、新規→紹介状確認 → 診療科。診察券聴取要否分岐でも参照。"

  - context_name: "referralLetter"
    context_name_jp: "紹介状有無"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "用件「診察予約」+ 通院歴「新規」の場合のみ聴取。{あり, なし}。Gen1 仕様通りあり/なし共に診療科聴取に続行（紹介状なしを終話誘導しない）。Dr.JOY 担当者が後でフォローする業務情報。"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "変更/キャンセルルートで聴取。YYYY-MM-DD 形式。Gen1 予約日の聞き取り.yaml の比較日 +1 年補正は OpenAI 側で吸収。DTMF 4 桁（MMDD）併用受付。"

  - context_name: "reason"
    context_name_jp: "理由"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "変更/キャンセル/確認ルートで聴取。変更理由 / キャンセル理由 / 確認内容のいずれもこのフィールドに保存（用件は classification で識別）。"

  - context_name: "hasNextDate"
    context_name_jp: "次予約希望日有無"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "用件「キャンセル」のみ聴取。{あり, なし}。Gen1 変更キャンセル分岐.yaml の END_希望日あり/END_希望日無し に対応。フロー分岐には使わず、Dr.JOY 上の参考情報として保存。"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納。"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "電話番号聴取サブフローで取得。"

  - context_name: "phonetype"
    context_name_jp: "電話種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "電話番号聴取サブフローが 1=携帯/ip050、2=固定/IP/その他/withheld を設定。終話分岐の 2 段 ContextMatchRouter で参照。"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - { id: "1", order: "1", value: "未処理" }
      - { id: "2", order: "2", value: "代表案内" }
      - { id: "3", order: "3", value: "聴取失敗" }
      - { id: "6", order: "6", value: "時間外" }
    item_default: true
    editable: true
    deletable: false
    notes: "1=受付完了 / 2=代表案内・誘導 / 3=聴取失敗 / 6=時間外。Gen1 status=0 / 5 は使用禁止。"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: ""

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値。"

# =====================================================
# セクション6: 聴取項目一覧
# =====================================================
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "診察予約"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "Gen1 用件聞き取り.yaml の 4 用件（診察予約 / 変更 / キャンセル / 確認）。「診察の予約を取る / 初診 / 再診」→診察予約、「予約を変更する / 取り直し」→変更、「予約をキャンセルする / 取り消し」→キャンセル、「予約日時を確認する / 教えて」→確認。Gen1 と同じく復唱あり。健康診断は用件レベルでは分類せず、診療科聴取の「未対応」分岐で吸収。"

  - order: 2
    name: "当日確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "todayReservation"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "本日"
      - "別日"
    notes: "用件「診察予約」直後のみ聴取。「はい / 本日 / 今日」→本日（END_当日予約 へ）、「いいえ / 別の日 / 明日以降」→別日（通院歴確認 へ）。NO_RESULT は default で別日扱い（安全側）。"

  - order: 3
    name: "通院歴確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "visitHistory"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "再診"
      - "新規"
    notes: "用件「診察予約」+ 当日希望なしの場合のみ聴取。「はい / 通院中 / あります」→再診、「いいえ / 初めて / 初診 / 新規」→新規。NO_RESULT は default で新規扱い（紹介状確認へ進む安全側）。Gen1 用件聞き取り.yaml の `セットした用件の分岐_1` と完全一致。"

  - order: 4
    name: "紹介状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "referralLetter"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "用件「診察予約」+ 通院歴「新規」の場合のみ聴取。「はい / 持っています / もってます」→あり、「いいえ / 持っていません / もってない」→なし。Gen1 仕様通り、あり/なし共に新規_診療科 へ続行（紹介状なしを終話誘導しない）。NO_RESULT は default で新規_診療科 へ。"

  - order: 5
    name: "新規_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "ペースメーカー外来"
      - "児童精神科"
      - "循環器内科"
      - "心療内科"
      - "糖尿病内科"
      - "泌尿器科"
      - "不整脈科"
      - "血管外科"
      - "呼吸器外科"
      - "心臓血管外科"
      - "整形外科"
      - "脳神経外科"
      - "緊急"
      - "救急"
      - "未対応"
    notes: "新規予約ルート用。緊急/救急→END_緊急救急、未対応（フットケア外来 / 外来リハビリ / 心血管センター / 健診 / 予防接種 / セカンドオピニオン外来）→END_未対応案内、default→氏名聴取。no_result→『登録なし』を保存して 氏名聴取 へ。Gen1 では入口 TTS が「受診を希望される診療科」となる。Gen1 復唱あり。Gen1 の「外科」一括発話 → 心臓血管外科/血管外科/呼吸器外科/整形外科/脳神経外科 の問い直しは OpenAI で曖昧時の追問プロンプトとして吸収（director は OpenAI ルールに「外科のみの発話は最も類似した外科系診療科を 1 つ選択」と指示）。"

  - order: 6
    name: "再診_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "ペースメーカー外来"
      - "児童精神科"
      - "循環器内科"
      - "心療内科"
      - "糖尿病内科"
      - "泌尿器科"
      - "不整脈科"
      - "血管外科"
      - "呼吸器外科"
      - "心臓血管外科"
      - "整形外科"
      - "脳神経外科"
      - "緊急"
      - "救急"
      - "未対応"
    notes: "再診ルート用。Gen1 では入口 TTS が「予約票に記載されている診療科」となる。分岐ロジックは新規_診療科 と同じ。"

  - order: 7
    name: "変更_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "ペースメーカー外来"
      - "児童精神科"
      - "循環器内科"
      - "心療内科"
      - "糖尿病内科"
      - "泌尿器科"
      - "不整脈科"
      - "血管外科"
      - "呼吸器外科"
      - "心臓血管外科"
      - "整形外科"
      - "脳神経外科"
      - "緊急"
      - "救急"
      - "未対応"
    notes: "変更ルート用。緊急/救急→END_緊急救急、未対応→END_未対応案内、default→予約日聴取。"

  - order: 8
    name: "キャンセル_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "ペースメーカー外来"
      - "児童精神科"
      - "循環器内科"
      - "心療内科"
      - "糖尿病内科"
      - "泌尿器科"
      - "不整脈科"
      - "血管外科"
      - "呼吸器外科"
      - "心臓血管外科"
      - "整形外科"
      - "脳神経外科"
      - "緊急"
      - "救急"
      - "未対応"
    notes: "キャンセルルート用。緊急/救急→END_緊急救急、未対応→END_未対応案内、default→予約日聴取。"

  - order: 9
    name: "確認_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "ペースメーカー外来"
      - "児童精神科"
      - "循環器内科"
      - "心療内科"
      - "糖尿病内科"
      - "泌尿器科"
      - "不整脈科"
      - "血管外科"
      - "呼吸器外科"
      - "心臓血管外科"
      - "整形外科"
      - "脳神経外科"
      - "緊急"
      - "救急"
      - "未対応"
    notes: "確認ルート用。緊急/救急→END_緊急救急、未対応→END_未対応案内、default→確認内容聴取（予約日はスキップ）。"

  - order: 10
    name: "確認内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "確認用件で聴取するフリーテキスト。Gen1 内容確認.yaml に対応。「予約時間を忘れた」「次回予約日が知りたい」などの自由発話を reason に保存。"

  - order: 11
    name: "予約日聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "変更/キャンセルルートで聴取。Gen1 予約日の聞き取り.yaml の音声 + DTMF 4 桁（シャープ/アスタ + MMDD）併用受付に対応。OpenAI で MMDD → YYYY-MM-DD 正規化（年は本日以降の最も近い同日に補正）。Gen1 復唱あり。DTMF 4 桁（月 2 桁 + 日 2 桁）。"

  - order: 12
    name: "変更理由聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更ルートで聴取するフリーテキスト。「体調不良で行けない」「日程をずらしたい」などの自由発話を reason に保存。"

  - order: 13
    name: "キャンセル理由聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "キャンセルルートで聴取するフリーテキスト。「都合が悪くなった」「不要になった」などの自由発話を reason に保存。"

  - order: 14
    name: "次予約希望日確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "hasNextDate"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "キャンセルルートのみ聴取。Gen1 変更キャンセル分岐.yaml と完全一致。「はい / あります」→あり、「いいえ / ありません」→なし。あり/なし共に氏名聴取に続行（業務分岐には使わず Dr.JOY 表示用情報）。"

# =====================================================
# セクション7: ステップ詳細
# =====================================================
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話しください。「診察の予約を取る」、「変更する」、「確認する」、「キャンセルする」、それでは、お話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["診察予約", "変更", "キャンセル", "確認"]
      mapping:
        - { input: "診察 / 診察予約 / 予約を取る / 受診 / 初めて / 初診 / しょしん / 再診 / さいしん / 1 / 1番 / ひとつ", output: "診察予約" }
        - { input: "変更 / 予約変更 / 変えたい / ずらしたい / 日程変更 / 取り直し / 2 / 2番 / ふたつ", output: "変更" }
        - { input: "キャンセル / 取り消し / やめる / 中止 / 4 / 4番 / よっつ", output: "キャンセル" }
        - { input: "確認 / 予約確認 / 教えて / 時間を忘れた / 日時確認 / 3 / 3番 / みっつ", output: "確認" }
      no_result_condition: "上記いずれにも該当しない発話（健康診断・健診・人間ドック等は用件レベルでは NO_RESULT として扱い、リトライ後に END_聴取失敗 へ。診療科聴取段階で「未対応」として吸収する設計のため）"
    save_to: "classification"
    next_step: "診察予約→当日確認 / 変更→変更_診療科 / キャンセル→キャンセル_診療科 / 確認→確認_診療科 / NO_RESULT→END_聴取失敗"
    retry_failure: "end_failure"

  - step_name: "当日確認"
    tts_announcement: "本日のご受診をご希望でしょうか。「はい、本日です」または、「いいえ、別の日です」のようにお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["本日", "別日"]
      mapping:
        - { input: "はい / 本日 / 今日 / きょう / ほんじつ / 当日 / お願いします", output: "本日" }
        - { input: "いいえ / 違います / 別の日 / 明日 / 来週 / 来月 / 後日", output: "別日" }
