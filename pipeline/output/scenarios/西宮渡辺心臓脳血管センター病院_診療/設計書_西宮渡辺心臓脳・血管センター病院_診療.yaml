# =====================================================
# セクション7: ステップ詳細
# =====================================================
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちのいずれかでお話しください。「診察の予約を取る」、「変更する」、「確認する」、「キャンセルする」、それでは、お話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["診察予約", "変更", "キャンセル", "確認"]
      mapping:
