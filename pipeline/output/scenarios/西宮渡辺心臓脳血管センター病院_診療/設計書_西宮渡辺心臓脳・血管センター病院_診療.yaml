    - name: "西宮渡辺心臓脳血管センター病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（DOB Re-confirmation 復唱あり）。patientDateOfBirth を返却。"
    - name: "西宮渡辺心臓脳血管センター病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（incoming-classifier + Phone Normalization + 復唱あり）。additionalPhoneNumber と phonetype（1=携帯/ip050、2=固定/IP/その他/withheld）を返却。"
    - name: "西宮渡辺心臓脳血管センター病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。medicalCardNumber を返却。新規（診察予約 + 通院歴=新規）はスキップ。"

# =====================================================
# セクション3: フローの目的
# =====================================================
purpose: >
  西宮渡辺心臓脳・血管センター病院の診療予約に関する電話を受け、
  診察予約（再診・新規）・予約変更・予約キャンセル・予約確認の 4 用件を分類する。
  診察予約ルートでは「本日希望」「通院歴」「紹介状」の 3 段問答を行い、
  当日希望なら代表電話誘導、通院歴なし（新規）なら紹介状を確認した上で診療科聴取、
  通院歴あり（再診）なら直接診療科聴取に進む。
  各用件で診療科を聴取し、緊急/救急・未対応診療科（フットケア外来・外来リハビリ・心血管センター・健診・予防接種・セカンドオピニオン外来）は
  特殊終話（代表電話 0798-36-1880 誘導）に分岐する。
  変更・キャンセル・確認ルートでは予約日・理由・（キャンセル時のみ）次予約希望日を追加聴取する。
  最終的に氏名・生年月日・電話番号（および新規以外は診察券番号）を聴取し、
  classification × phonetype（携帯/固定）の 2 段分岐で計 8 パターンの終話 TTS を出し分ける。

# =====================================================
# セクション4: シナリオフロー図
# =====================================================
flow_diagrams:
  - flow_name: "西宮渡辺心臓脳血管センター病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常 → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → 用件確認 (enum: 診察予約/変更/キャンセル/確認)
                                           ├─ 診察予約 → 当日確認 (enum: 本日/別日)
                                           │              ├─ 本日 → END_当日予約
                                           │              └─ 別日 → 通院歴確認 (enum: 再診/新規)
                                           │                          ├─ 再診 → 再診_診療科 → (緊急救急/未対応 → END、default → 氏名聴取)
                                           │                          └─ 新規 → 紹介状確認 (enum: あり/なし)
                                           │                                      └─ 共通 → 新規_診療科 → (緊急救急/未対応 → END、default → 氏名聴取)
                                           ├─ 変更 → 変更_診療科 → (特殊 → END、default → 予約日聴取 → 理由種別分岐 → 変更理由聴取 → 氏名聴取)
                                           ├─ キャンセル → キャンセル_診療科 → (特殊 → END、default → 予約日聴取 → 理由種別分岐 → キャンセル理由聴取 → 次予約希望日確認 → 氏名聴取)
                                           └─ 確認 → 確認_診療科 → (特殊 → END、default → 確認内容聴取 → 氏名聴取)
                                        共通個人情報聴取（氏名聴取 → 生年月日聴取 → 電話番号聴取）
                                          → 終話分岐_診察券要否_用件 (classification)
                                              ├─ 診察予約 → 終話分岐_診察券要否_通院歴 (visitHistory)
                                              │              ├─ 新規 → 終話分岐_用件（診察券スキップ）
                                              │              └─ default → 診察券番号聴取 → 終話分岐_用件
                                              └─ default → 診察券番号聴取 → 終話分岐_用件
                                          → 終話分岐_用件 (classification)
                                              ├─ 診察予約 → 終話分岐_診察予約_電話種別 → END_診察予約_携帯/固定
                                              ├─ 変更 → 終話分岐_変更_電話種別 → END_予約変更_携帯/固定
                                              ├─ キャンセル → 終話分岐_キャンセル_電話種別 → END_予約キャンセル_携帯/固定
                                              └─ 確認 → 終話分岐_確認_電話種別 → END_予約確認_携帯/固定
    notes: "Pattern A: 用件確認・診療科聴取の特殊診療科直接分岐。Pattern B: 終話直前の classification × phonetype 2 段 ContextMatchRouter（8 終話 + 当日予約/緊急救急/未対応診療科/聴取失敗の特殊終話）。"

# =====================================================
# セクション4b: シナリオフロー定義（ブロック構成）
# =====================================================
scenario_flow:
  # ---------- 冒頭 ----------
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # ---------- 用件確認 (Pattern A) ----------
  - step: 用件確認
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "診察予約"
        next: 当日確認
      - match: "変更"
        next: 変更_診療科
      - match: "キャンセル"
        next: キャンセル_診療科
      - match: "確認"
        next: 確認_診療科
      - match: "other"
        next: END_聴取失敗

  # =====================================================
  # 診察予約ルート（当日確認 → 通院歴 → 紹介状 → 診療科）
  # =====================================================
  - step: 当日確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "本日"
        next: END_当日予約
      - match: "別日"
        next: 通院歴確認
      - match: "other"
        next: 通院歴確認

  - step: 通院歴確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "再診"
        next: 再診_診療科
      - match: "新規"
        next: 紹介状確認
      - match: "other"
        next: 紹介状確認

  - step: 紹介状確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: 新規_診療科
      - match: "なし"
        next: 新規_診療科
      - match: "other"
        next: 新規_診療科

  - step: 新規_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "セカンドオピニオン外来"
        next: END_未対応診療科
      - match: "フットケア外来"
        next: END_未対応診療科
      - match: "外来リハビリ"
        next: END_未対応診療科
      - match: "健診"
        next: END_未対応診療科
      - match: "心血管センター"
        next: END_未対応診療科
      - match: "予防接種"
        next: END_未対応診療科
      - match: "other"
        next: 氏名聴取

  - step: 再診_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "セカンドオピニオン外来"
        next: END_未対応診療科
      - match: "フットケア外来"
        next: END_未対応診療科
      - match: "外来リハビリ"
        next: END_未対応診療科
      - match: "健診"
        next: END_未対応診療科
      - match: "心血管センター"
        next: END_未対応診療科
      - match: "予防接種"
        next: END_未対応診療科
      - match: "other"
        next: 氏名聴取

  # =====================================================
  # 変更ルート
  # =====================================================
  - step: 変更_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "セカンドオピニオン外来"
        next: END_未対応診療科
      - match: "フットケア外来"
        next: END_未対応診療科
      - match: "外来リハビリ"
        next: END_未対応診療科
      - match: "健診"
        next: END_未対応診療科
      - match: "心血管センター"
        next: END_未対応診療科
      - match: "予防接種"
        next: END_未対応診療科
      - match: "other"
        next: 予約日聴取

  # =====================================================
  # キャンセルルート
  # =====================================================
  - step: キャンセル_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "セカンドオピニオン外来"
        next: END_未対応診療科
      - match: "フットケア外来"
        next: END_未対応診療科
      - match: "外来リハビリ"
        next: END_未対応診療科
      - match: "健診"
        next: END_未対応診療科
      - match: "心血管センター"
        next: END_未対応診療科
      - match: "予防接種"
        next: END_未対応診療科
      - match: "other"
        next: 予約日聴取

  # =====================================================
  # 確認ルート
  # =====================================================
  - step: 確認_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "緊急"
        next: END_緊急救急
      - match: "救急"
        next: END_緊急救急
      - match: "セカンドオピニオン外来"
        next: END_未対応診療科
      - match: "フットケア外来"
        next: END_未対応診療科
      - match: "外来リハビリ"
        next: END_未対応診療科
      - match: "健診"
        next: END_未対応診療科
      - match: "心血管センター"
        next: END_未対応診療科
      - match: "予防接種"
        next: END_未対応診療科
      - match: "other"
        next: 確認内容聴取

  - step: 確認内容聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 氏名聴取

  # =====================================================
  # 予約日聴取（変更・キャンセル共通）→ 理由種別分岐 → 各理由聴取
  # =====================================================
  - step: 予約日聴取
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 理由種別分岐

  - step: 理由種別分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 変更理由聴取
      - match: "キャンセル"
        next: キャンセル理由聴取
      - match: "other"
        next: 氏名聴取

  - step: 変更理由聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 氏名聴取

  - step: キャンセル理由聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 次予約希望日確認

  - step: 次予約希望日確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: 氏名聴取
      - match: "なし"
        next: 氏名聴取
      - match: "other"
        next: 氏名聴取

  # =====================================================
  # 共通 個人情報聴取
  # =====================================================
  - step: 氏名聴取
    type: subflow
    flowname: "西宮渡辺心臓脳血管センター病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "西宮渡辺心臓脳血管センター病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "西宮渡辺心臓脳血管センター病院$電話番号聴取"
    next: 終話分岐_診察券要否_用件

  # =====================================================
  # 診察券聴取要否分岐（新規=診察予約+通院歴=新規 のみスキップ）
  # =====================================================
  - step: 終話分岐_診察券要否_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "診察予約"
        next: 終話分岐_診察券要否_通院歴
      - match: "other"
        next: 診察券番号聴取

  - step: 終話分岐_診察券要否_通院歴
    type: context_match_router
    reference_module: "OpenAI_通院歴確認"
    conditions:
      - match: "新規"
        next: 終話分岐_用件
      - match: "other"
        next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "西宮渡辺心臓脳血管センター病院$診察券番号聴取"
    next: 終話分岐_用件

  # =====================================================
  # 終話分岐（Pattern B: classification × phonetype）
  # =====================================================
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "診察予約"
        next: 終話分岐_診察予約_電話種別
      - match: "変更"
        next: 終話分岐_変更_電話種別
      - match: "キャンセル"
        next: 終話分岐_キャンセル_電話種別
      - match: "確認"
        next: 終話分岐_確認_電話種別
      - match: "other"
        next: END_聴取失敗

  - step: 終話分岐_診察予約_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_診察予約_携帯
      - match: "other"
        next: END_診察予約_固定

  - step: 終話分岐_変更_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_予約変更_携帯
      - match: "other"
        next: END_予約変更_固定

  - step: 終話分岐_キャンセル_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_予約キャンセル_携帯
      - match: "other"
        next: END_予約キャンセル_固定

  - step: 終話分岐_確認_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_予約確認_携帯
      - match: "other"
        next: END_予約確認_固定

  # =====================================================
  # 終話ブロック
  # =====================================================
  - step: END_当日予約
    type: termination
    termination_ref: "END_当日予約"

  - step: END_緊急救急
    type: termination
    termination_ref: "END_緊急救急"

  - step: END_未対応診療科
    type: termination
    termination_ref: "END_未対応診療科"

  - step: END_診察予約_携帯
    type: termination
    termination_ref: "END_診察予約_携帯"

  - step: END_診察予約_固定
    type: termination
    termination_ref: "END_診察予約_固定"

  - step: END_予約変更_携帯
    type: termination
