# =====================================================
# セクション6: 聴取項目一覧
# =====================================================
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "診察予約"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "Gen1 用件聞き取り.yaml の 4 用件（診察予約 / 変更 / キャンセル / 確認）。「診察の予約を取る / 初診 / 再診」→診察予約、「予約を変更する / 取り直し」→変更、「予約をキャンセルする / 取り消し」→キャンセル、「予約日時を確認する / 教えて」→確認。Gen1 と同じく復唱あり。健康診断は本 hearing では NO_RESULT（other 経路）→ END_聴取失敗（診療科側でのみ未対応扱い）。"

  - order: 2
    name: "当日確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "todayReservation"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "本日"
      - "別日"
    notes: "用件「診察予約」直後のみ聴取。「はい / 本日 / 今日」→本日（END_当日予約 へ）、「いいえ / 別の日 / 明日以降」→別日（通院歴確認 へ）。NO_RESULT は default で別日扱い（安全側）。Gen1 用件聞き取り.yaml「当日予約チェック」と完全一致。"

  - order: 3
