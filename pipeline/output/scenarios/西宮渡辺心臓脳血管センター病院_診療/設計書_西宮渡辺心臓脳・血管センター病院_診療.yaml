# =====================================================
# セクション11: 特記事項・制約
# =====================================================
special_notes:
  - "受付時間は曜日別: 月-金 8:30-16:30 / 土曜 8:30-11:30 / 日祝・年末年始休。Dr.JOY/Brekeke 側のカレンダーで設定。"
  - "代表電話 0798-36-1880 は END_当日予約 / END_緊急救急 / END_未対応診療科 / END_聴取失敗 の 4 終話 TTS で読み上げる（Gen1 では聴取失敗・未対応終話で 3 回繰り返し読み上げ）。"
  - "用件「健康診断」「人間ドック」は用件 hearing では NO_RESULT（other）扱い → END_聴取失敗。診療科 hearing で「健診」を選択した場合は END_未対応診療科 へ。Gen2 用件聞き取り.yaml に「健康診断」エンティティが定義されていない仕様を踏襲。"
  - "用件「診察予約」のみ「本日のご受診?」（当日確認）→ 当日希望なら END_当日予約。当日希望なしで通院歴問答（再診/新規）。新規の場合のみ紹介状確認。"
  - "紹介状の有無確認は新規予約ルートのみ実行。Gen1 仕様通り、あり/なし共に新規_診療科 へ続行（紹介状なしを終話誘導しない）。N-5 を確認。"
  - "確認ルートは予約日を聴取しない（Gen1 main.yaml 用件の確認 → 確認(箱) → 内容確認 直行と一致）。"
  - "キャンセルルートのみ「次の予約希望日はありますか？」を聴取（Gen1 変更キャンセル分岐.yaml 準拠）。あり/なし共に氏名聴取に続行（業務分岐には使わない）。"
  - "予約日聴取は音声 + DTMF 4 桁（MMDD）併用。OpenAI で「YYYY-MM-DD（年は本日以降の最も近い同日に補正）」へ正規化。Gen1 の比較日 +1 年補正は OpenAI プロンプトで吸収。"
  - "終話 TTS は Gen1 main.yaml の SMSあり/SMSあり_1/SMSなし/SMSなし_1 を classification × phonetype の 8 通りに展開。携帯（phonetype=1）は SMS 言及あり、固定（phonetype=2）は電話のみ。受付時間文言（8:30-16:30 / 土曜 8:30-11:30）はすべての終話 TTS に含めて Gen1 仕様を踏襲。"
  - "状態フラグ status の使用値: 1=受付完了 / 2=代表案内・誘導 / 3=聴取失敗 / 6=時間外。Gen1 status=0 / 5 は使用禁止。"
  - "サブフロー（氏名 / 生年月日 / 電話番号 / 診察券）は標準テンプレートをコピー使用。flowname プレフィックスは「西宮渡辺心臓脳血管センター病院$」。"
  - "group_name 文字数: 西宮渡辺心臓脳血管センター病院 = 13 文字（漢字+カタカナ+長音、中黒なし）。最長サブフロー名（診察券番号聴取 = 7 文字）と組合せても URL エンコード後 約 196 バイト < 255 の安全範囲内。"
  - "施設正式名は「西宮渡辺心臓脳・血管センター病院」（中黒入り）。group_name は URL エンコード/フォルダ命名の一貫性のため中黒を除いた「西宮渡辺心臓脳血管センター病院」を採用（N-2）。冒頭挨拶 TTS と各 END 系 TTS では正式名（中黒入り「西宮渡辺心臓脳・血管センター」）を使う。"
  - "TTS は `{tts_g:...}` 小文字フォーマット（Google TTS）デフォルト。SSML 不可。動的値置換は `<% var %>` のみ使用可。"
  - "STT 辞書（profile_words）と OpenAI 類義語は entity_stt_patch.json / entity_openai_synonyms.md / entity_classification.md に機械抽出済み（304 STT 辞書 + 95 OpenAI 類義語）。scaffold/properties が自動取り込みするため director の手動転記は不要。セクション10 の amivoice_dictionary は施設固有の代表的な追加項目のみ。"
  - "ペア施設: 西宮渡辺病院（本院・一般総合）の診療フローは 2026-05-01 に移管済（output/scenarios/西宮渡辺病院_診療/）。本心臓脳血管センター病院は同フォルダ内に併設されているが別法人扱いで別フローを持つ（循環器・心臓血管特化）。代表電話番号・診療科リスト・未対応診療科リストが本院と異なる点に注意。"
  - "Gen1 営業前文言（「2/3 8:30〜利用開始となります」）は運用開始日の暫定文言のため Gen3 設計には含めない（N-4）。再導入が必要な場合は patch_box で時限的に管理。"
  - "Gen1 では時間外でも「翌営業日に折り返し電話、もしくはSMSにてご連絡」と案内した上で内容聴取を続行する仕様だったが、Gen3 では時間外切断（END_時間外 status=6）に統一する（N-3）。"

