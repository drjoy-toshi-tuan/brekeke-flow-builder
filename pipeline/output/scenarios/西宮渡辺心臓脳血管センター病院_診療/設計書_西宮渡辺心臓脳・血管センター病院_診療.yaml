# =====================================================
# セクション2: フロー構成
# =====================================================
flow_structure:
  type: "subflow"
  flows:
    - name: "西宮渡辺心臓脳血管センター病院$診療"
      role: "main"
      description: "西宮渡辺心臓脳・血管センター病院の診療予約受付フロー。用件 4 分類（診察予約 / 変更 / キャンセル / 確認）+ 診察予約ルートでの当日予約チェック・通院歴チェック・紹介状確認、変更/キャンセル/確認ルートでの予約日・理由聴取、最終的に classification × phonetype の終話 8 分岐 + 当日予約・緊急救急・未対応診療科・聴取失敗・非通知・時間外の特殊終話を実装する。診療科は循環器・心臓血管特化の 12 科 + 未対応 6 科。"
  subflows:
    - name: "西宮渡辺心臓脳血管センター病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
