# =====================================================
# セクション8: 終話パターン
# =====================================================
termination_patterns:
  # --- 異常系（デフォルト必須） ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（日曜祝日 / 月-金 8:30 前 or 16:30 後 / 土曜 8:30 前 or 11:30 後）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。このままお電話にて内容はお伺いいたしますが、回答につきましては翌営業日にさせていただきます。受付時間は、日曜・祝日を除く、月曜日から金曜日の8時30分から16時30分、土曜日は8時30分から11時30分となっております。恐れ入りますが、翌営業日に折り返し電話、もしくはSMSにてご連絡いたします。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達 or 用件聴取の最終 NO_RESULT"
    tts_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、西宮渡辺心臓脳・血管センター 代表番号までおかけなおしください。受付時間は日曜祝日、年末年始を除く月曜日から金曜日の8時30分から16時30分、土曜日は8時30分から11時30分です。電話番号が分かる場合は、そのままお電話をお切りください。分からない場合は、このままご案内いたします。代表電話番号は、0798-36-1880です。繰り返します。代表電話番号は、0798-36-1880です。繰り返します。代表電話番号は、0798-36-1880です。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 業務系（status=2: 代表案内・誘導）---
  - name: "END_当日予約"
    condition: "用件=診察予約 AND 当日確認=本日"
    tts_announcement: "当日のご予約に関しては、こちらのAI電話では受付できません。恐れ入りますが、西宮渡辺心臓脳・血管センター代表電話までおかけなおしください。代表電話番号は、0798-36-1880です。繰り返します。代表電話番号は、0798-36-1880です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_当日予約"

  - name: "END_緊急救急"
    condition: "診療科聴取で緊急/救急を選択"
    tts_announcement: "大変申し訳ございません。この電話では受付しておりません。代表電話番号、0798-36-1880へご連絡ください。繰り返します。代表電話番号、0798-36-1880へご連絡ください。お電話ありがとうございました。"
