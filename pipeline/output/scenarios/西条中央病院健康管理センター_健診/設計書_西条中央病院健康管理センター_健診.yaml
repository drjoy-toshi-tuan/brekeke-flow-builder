# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系（デフォルト必須）===
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（祝日 / 月〜金 8 時前または 20 時以降 / 土日）"
    tts_announcement: "申し訳ありません。現在は受付時間外です。受付時間は、祝日を除く月曜から金曜の8時から20時です。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件確認・種類聴取・変更_変更内容 等の重要分岐ステップ）／ 用件確認 default 経路"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、営業時間内に健康管理センターへおかけ直しください。電話番号は0897-47-3625。繰り返します。番号は、0897-47-3625。詳細はホームページをご確認ください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 正常系（西条中央病院健康管理センター 健診固有）===
  - name: "END_共通_携帯"
    condition: "全聴取完了 AND phonetype=携帯（連絡先電話番号が 070/080/090 開始）"
    tts_announcement: "お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_共通_携帯"

  - name: "END_共通_携帯以外"
    condition: "全聴取完了 AND phonetype=その他（携帯以外＝固定/IP/050/0120 等）"
    tts_announcement: "お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_共通_携帯以外"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"
  patterns:
    - condition: "phonetype=携帯"
      sms_flag: "1"
      notes: "→ END_共通_携帯 (status=1)。締めあいさつ TTS で『SMS にてご連絡』と案内済み"
    - condition: "phonetype=その他"
      sms_flag: "-1"
      notes: "→ END_共通_携帯以外 (status=1)。締めあいさつ TTS は携帯と共通だが SMS 送信はしない（運用上は smsFlag=-1 のため SMS は送信されない）"

