    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "キャンセルルート専用。Gen1 予約日.yaml「現在の予約日を「4月1日」のように日付でお話ください。わからない場合は分からないとお話ください。」DTMF 4 桁（月日）入力可。echo_back=true で「○月○日、をキャンセルでよろしいですか?」相当の確認"

  - order: 10
    name: "問合せ_内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "問い合わせルート専用。Gen1 詳細聞き取り.yaml 問い合わせ「お問い合わせの内容をお話ください。」自由発話 text 受け（OpenAI で要約のみ）"

