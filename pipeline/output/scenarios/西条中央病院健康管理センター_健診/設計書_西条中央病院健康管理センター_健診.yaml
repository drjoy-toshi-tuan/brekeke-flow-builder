# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 (commubo) → Gen3 移管。Gen1 main.yaml は『個人情報先行（氏名→生年月日→連絡先→用件）』の独自順序であり、Gen3 でもこの順序を保持（飯塚・倉敷型の用件先行とは異なる）"
  - "用件確認は 4 値分類（新規／変更／キャンセル／問い合わせ）。echo_back=true で 1 回復唱。Gen1 では 4 用件別個別文言（『健診のご予約、でよろしいですか?』『ご予約の変更、でよろしいですか?』『ご予約のキャンセル、でよろしいですか?』『その他お問い合わせ、でよろしいですか?』）。完全再現したい場合は properties で 4 ブランチ別 Re-confirmation node TTS に分割（confirmation_items 参照）"
  - "種類聴取（新規ルート専用）は 4 値分類（人間ドック／協会けんぽ／定期健診／その他の健診）。echo_back=true。Gen1 にあった『定期健診→用件の復唱（人間ドック）_1』への誤接続バグは Gen3 で正しく『定期健診、でよろしいですか?』echo_back を作って修正"
  - "変更_変更内容 は 2 値分類（受診内容／日程変更）。echo_back=true で『受診内容の変更、でよろしいですか?』『受診日の変更、でよろしいですか?』（Gen1 文言）。受診内容ルートは reason へ自由テキスト保存、日程変更ルートは preferredDate へ希望日聴取"
  - "新規ルートは 種類聴取 → 新規_希望時期（preferredDate）→ 新規_希望内容（option）の 2 段階聴取。Gen1 の 詳細聞き取り.yaml で新規ルートだけ 2 段階だった構造を Gen3 でも 2 個の hearing ブロックで保持"
  - "キャンセルルートは 予約日聴取のみ（詳細聞き取りスキップ）。Gen1 仕様踏襲"
  - "問い合わせルートは 問合せ_内容聴取（reason）のみ。Gen1 仕様踏襲（追加質問なし）"
  - "予約日聴取（変更・キャンセル）は datetime 形式（yyyy-MM-dd 00:00:00）。Gen1 の DTMF 4 桁（月日）入力＋過去日付なら +1 年補正は OpenAI 正規化プロンプトで吸収。echo_back=true で 1 回復唱"
  - "希望時期（新規・変更）は曖昧表現許容のため text 受け（datetime にしない）"
  - "受付時間外: 祝日除く 月〜金 8 時前 or 20 時以降 / 土日。営業時間スケジュールは Dr.JOY 側で acceptance_times に登録"
  - "代表電話案内: 0897-47-3625（健康管理センター）。Gen1 の Blind Transfer は無く、Gen3 でも call_transfer ブロック不要。END_聴取失敗 TTS で番号を 2 回繰り返し読み上げる設計（Gen1 電話番号箱の文言を踏襲）"
  - "Gen1『もしもし』検知（用件入口で countもしもし、1 回目「はい、聞こえております」、2 回目以上「はい、『もしもし』と聞こえております」）: Gen3 では 用件確認 OpenAI プロンプトの no_result_condition に『もしもしのみ』を含めて救済語扱い → リトライへ。専用 hearing は配置しない（confirmation_items 参照）"
  - "Gen1『3 回聞き取れず』→ END_用件取得できず: Gen3 ではリトライ上限到達で END_聴取失敗 TTS（代表番号案内含む）に集約"
  - "Gen1『2/28〜3/2 の AI 受付休止期間』アナウンス（令和8年度予約準備のため）: 移管時点 (2026-05) では既に過去日。Gen3 で再現するなら Script モジュール + 時期判定で別途実装（confirmation_items 参照）。デフォルトでは未実装"
  - "Gen1『4/1 10:30 以降は 050-5527-2746 切替』アナウンス: 旧 0897-47-3625 と新 050-5527-2746 の番号並存中。Gen3 では時期判定 termination として残す要件があれば別途実装。デフォルトでは未実装（confirmation_items 参照）"
  - "phonetype 分岐: 電話番号聴取サブフロー内で『携帯』『その他』を判定し phonetype context に保存。phonetype分岐 (CMR) で smsFlag を切替（携帯=1 / その他=-1）。締めあいさつ TTS は両ルートとも共通『3営業日以内に、担当者から折り返し電話、もしくは、SMSにてご連絡いたします』（Gen1 仕様踏襲）"
  - "氏名聴取は復唱なし（Gen1 氏名聞き取り.yaml の聞き取り完了が即 END_戻る）。生年月日聴取・電話番号聴取は復唱あり"
  - "TTS は {tts_g:...} 小文字のみ。SSML タグ・<dtmf/> 等は不使用（電話番号復唱の <speak type='telephone'> のみ電話番号サブフロー内の復唱用 SSML 例外として標準サンプルに含まれる）"
  - "Gen1 の <? $予約日の読み ?> / <? $生年月日（復唱用） ?> / <? $連絡先電話番号（ハイフン区切あり） ?> / <? $入電番号（ハイフン区切りあり） ?> 等の動的タグは Gen3 では <% var %> 構文へ。subflow 内 echo_back と DOB Re-confirmation / Re-confirmation node に集約済みのためメインフローでの直接参照は不要"
  - "ContextMatchRouter の reference_module: 用件分岐_受付完了 → OpenAI_用件確認（モジュール名）、phonetype分岐 → 電話番号聴取（subflow ステップ名）。両方とも conditions 末尾に match: 'other' + 明示 next を配置済み"
  - "group_name = facility_name = 「西条中央病院健康管理センター」（13 文字）。URL エンコード後の制約（漢字 19 文字以内目安）を満たす。flow_dir 名は launch_parallel regex 制約から半角スペース無しの「西条中央病院健康管理センター_健診」で固定"
  - "Gen1 main.yaml に 診療科 エンティティ（IVRセンター / アレルギー科 / オンコロジー / ... 計 47 科）が定義されているが、フロー本体では未使用（他フロー流用残骸）。Gen3 設計書には診療科聴取は含めない"
  - "Gen1 変更.yaml に ドックメニュー / 健診メニュー / バリウム検査 / 内視鏡検査 等のサブエンティティが定義されているが、フロー本体では未使用（流用残骸）。Gen3 設計書には取り込まない（移管ノート参照）"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（Dr.JOY 施設ID）— Dr.JOY 管理画面で確認"
    resolved: false
  - item: "用件確認 echo_back の 4 ブランチ別 個別文言（『健診のご予約、でよろしいですか?』『ご予約の変更、でよろしいですか?』『ご予約のキャンセル、でよろしいですか?』『その他お問い合わせ、でよろしいですか?』）を Gen3 で完全再現するか、Gen3 default echo_back（generic 復唱文）で運用するかを決定。完全再現の場合は properties で 4 個別 Re-confirmation node TTS に分割が必要"
    resolved: false
  - item: "種類聴取 echo_back の 4 ブランチ別 個別文言（『人間ドック、でよろしいですか?』『協会けんぽ、でよろしいですか?』『定期健診、でよろしいですか?』『その他の健診、でよろしいですか?』）を Gen3 で完全再現するか確認。完全再現の場合は properties で 4 個別 Re-confirmation node TTS に分割が必要"
    resolved: false
