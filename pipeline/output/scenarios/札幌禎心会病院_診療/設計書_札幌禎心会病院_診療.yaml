# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件_予約or情報提供書"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: null
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "情報提供書"
    notes: "Gen1 第1段。復唱あり（Gen1の「ご予約について、でよろしいですか?/情報提供書の申し込みについて、でよろしいですか?」を踏襲）"

  - order: 2
    name: "当日受診確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "当日"
      - "当日以外"
    notes: "予約ルートのみ。「本日の予約に関する内容ですか？」→当日=END_当日代表案内 / 当日以外=用件_予約系"

  - order: 3
    name: "用件_予約系"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "診察予約"
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
    notes: "Gen1 第2段4択。復唱あり。診察予約のみ次に新患確認(初診/再診)を追加聴取"

  - order: 4
    name: "新患確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "初診"
      - "再診"
    notes: "用件_予約系=診察予約のみ。「当院でのご受診は初めてですか？」→初診=新規予約_初診 / 再診=新規予約_再診 として classification を上書き。初診→紹介状有無、再診→診療科"

  - order: 5
    name: "紹介状有無"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "introduction"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "新規予約_初診ルートのみ。「他の医療機関からの紹介状はお持ちですか？」→あり=直接診療科、なし=選定療養費案内→診療科"

  - order: 6
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "てんかん外来"
      - "ペインクリニック外科"
      - "めまい難聴外来"
      - "緩和ケア外来"
      - "形成外科"
      - "健診センター"
      - "歯科口腔外科"
      - "腫瘍内科"
      - "循環器内科"
      - "消化器外科"
      - "消化器内科"
      - "心臓血管外科"
      - "神経内科"
      - "整形外科"
      - "脊椎脊髄末梢神経外科"
      - "糖尿病内科"
      - "頭頸科頭頸部腫瘍センター"
      - "乳腺外科"
      - "脳神経外科"
      - "泌尿器科"
      - "皮膚科"
      - "膝関節専門外来"
      - "婦人科"
      - "物忘れ外来"
      - "放射線治療科"
      - "がんセカンドオピニオン外来"
      - "救急"
      - "血管内留置デバイス外来"
    notes: "通常診療科25種 + 代表案内診療科3種(末尾)。代表案内診療科ヒット時はEND_診療科代表案内へ。no_result_default=登録なしでDr.JOY側に「登録なし」レコードを残す（Gen1の5回不一致+2回再質問は retry_count=2 で代用）"

  - order: 7
    name: "予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "予約変更/キャンセル共通。Gen1仕様: 西暦不要(月日のみ)、過去日付なら自動で+1年。DTMF 4桁(月2桁+日2桁)対応"

  - order: 8
    name: "確認内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "confirmation"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "予約確認ルートのみ。「次回の予約日時を教えて欲しい」等の自由発話"

  - order: 9
    name: "情報提供書_医療機関名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "referredHospital"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "情報提供書ルートのみ。「どこの医療機関へのお手紙ですか？」→フリーテキスト保存"

  - order: 10
    name: "情報提供書_診療科宛先"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "referredDepartment"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "情報提供書ルートのみ。「どの診療科宛になりますか？」→フリーテキスト保存"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件_予約or情報提供書"
    tts_announcement: "ご用件を、次の2つのうちの、いずれかでお話ください。「予約について」。「情報提供書の申し込みについて」。それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約"
        - "情報提供書"
        - "NO_RESULT"
      mapping:
        - input: "「予約」「お薬」「ご予約」「予約について」を含む"
          output: "予約"
        - input: "「情報提供書」「情報」「情報提供」「提供書」を含む"
          output: "情報提供書"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "予約→当日受診確認、情報提供書→情報提供書_医療機関名"
    retry_failure: "end_failure"

  - step_name: "当日受診確認"
    tts_announcement: "まず初めにお伺いします。本日の予約に関する内容ですか？はい、または、いいえでお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "当日"
        - "当日以外"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「そうです」「本日」「今日」を含む"
          output: "当日"
        - input: "「いいえ」「違います」「明日以降」「来週」等の否定表現を含む"
          output: "当日以外"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "当日→END_当日代表案内、当日以外→用件_予約系"
    retry_failure: "end_failure"

  - step_name: "用件_予約系"
    tts_announcement: "ご用件を、次の4つのうちの、いずれかでお話ください。「診察の予約を取る」「予約を変更する」「予約をキャンセルする」「予約を確認する」、それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "診察予約"
        - "予約変更"
        - "予約キャンセル"
        - "予約確認"
        - "NO_RESULT"
      mapping:
        - input: "「予約取りたい」「診察予約」「予約をする」「初診」「新規」「再診」「定期受診」を含む"
          output: "診察予約"
        - input: "「変更」「変えたい」「日程変更」「延期」を含む"
          output: "予約変更"
        - input: "「キャンセル」「取り消し」「やめる」を含む"
          output: "予約キャンセル"
        - input: "「確認」「教えて」「予約日いつ」「予約票なくした」を含む"
          output: "予約確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "診察予約→新患確認、予約変更/キャンセル→診療科、予約確認→確認内容"
    retry_failure: "end_failure"

  - step_name: "新患確認"
    tts_announcement: "当院でのご受診は初めてですか？はい、または、いいえでお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "初診"
        - "再診"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「初めて」「はじめて」「かかったことがない」「まだ」を含む"
          output: "初診"
        - input: "「いいえ」「違います」「かかっている」「かかってる」「再診」を含む"
          output: "再診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "初診→紹介状有無 (classification=新規予約_初診)、再診→診療科 (classification=新規予約_再診)"
    retry_failure: "end_failure"

  - step_name: "紹介状有無"
    tts_announcement: "他の医療機関からの紹介状はお持ちですか？「はい持っています」、または、「いいえ持っていません」のように少し長めの言葉でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「持っています」「あります」を含む"
          output: "あり"
        - input: "「いいえ」「持っていません」「ありません」を含む"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "introduction"
    next_step: "あり→診療科、なし→選定療養費案内→診療科"
    retry_failure: "end_failure"

  - step_name: "診療科"
    tts_announcement: "受診を希望される診療科をお話ください。予約変更や予約キャンセルの場合は、予約票に記載されている診療科をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "てんかん外来"
        - "ペインクリニック外科"
        - "めまい難聴外来"
        - "緩和ケア外来"
        - "形成外科"
        - "健診センター"
        - "歯科口腔外科"
        - "腫瘍内科"
        - "循環器内科"
        - "消化器外科"
        - "消化器内科"
        - "心臓血管外科"
        - "神経内科"
        - "整形外科"
        - "脊椎脊髄末梢神経外科"
        - "糖尿病内科"
        - "頭頸科頭頸部腫瘍センター"
        - "乳腺外科"
        - "脳神経外科"
        - "泌尿器科"
        - "皮膚科"
        - "膝関節専門外来"
        - "婦人科"
        - "物忘れ外来"
        - "放射線治療科"
        - "がんセカンドオピニオン外来"
        - "救急"
        - "血管内留置デバイス外来"
      mapping:
        - input: "通常診療科25種のキーワード（てんかん/ペイン/めまい/緩和/形成/健診/歯科/腫瘍/循環器/消化器外科/消化器内科/心臓血管/神経/整形/脊椎/糖尿病/頭頸/乳腺/脳神経/泌尿器/皮膚/膝関節/婦人/物忘れ/放射線 等）"
          output: "対応する診療科正式名（output_values 列挙の通常診療科25種のいずれか）"
        - input: "「がんセカンドオピニオン」「セカンドオピニオン」「オピニオン」を含む"
          output: "がんセカンドオピニオン外来"
        - input: "「救急」「九」を含む"
          output: "救急"
        - input: "「血管内留置」「デバイス」「VAD」「BAD」を含む"
          output: "血管内留置デバイス外来"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT（no_result_default=登録なしで保存）"
      no_result_condition: "上記いずれにも該当しない（no_result_default=登録なしで保存）"
    save_to: "clinicalDepartment"
    next_step: "通常診療科→診療科後_分岐、代表案内診療科→END_診療科代表案内、登録なし→診療科後_分岐(運用上は登録なしも次へ進める)"
    retry_failure: "end_failure"
    retry_failure_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。受付時間は、日曜祝日、年末年始を除く、月曜日から金曜日の、9時から17時、土曜日の9時から12時となっております。電話番号は011-712-1131です。繰り返します。電話番号は011-712-1131です。"

  - step_name: "予約日"
    tts_announcement: "予約票に記載されている予約日を「4月1日」のように日付でおっしゃってください。なお、AIが予約日を正しく認識しない場合は、ダイヤルプッシュでの入力も可能です。月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "yyyy-MM-dd 00:00:00"
        - "NO_RESULT"
      mapping:
        - input: "発話「4月1日」/ DTMF「0401」→当年または翌年の日付に補完（過去日付なら+1年）"
          output: "yyyy-MM-dd 00:00:00"
        - input: "日付として解析不能"
          output: "NO_RESULT"
      no_result_condition: "日付として解析不能"
    save_to: "reservationDate"
    next_step: "氏名聴取"
    retry_failure: "end_failure"

  - step_name: "確認内容"
    tts_announcement: "ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」など、内容を簡潔におっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "確認内容テキスト"
      mapping:
        - input: "発話された確認内容"
          output: "発話内容を要約してそのまま保存"
      no_result_condition: "なし"
    save_to: "confirmation"
    next_step: "診察券番号聴取"
    retry_failure: "end_failure"

  - step_name: "情報提供書_医療機関名"
    tts_announcement: "どこの医療機関へのお手紙ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "医療機関名テキスト"
      mapping:
        - input: "発話された医療機関名"
          output: "発話内容をそのまま保存"
      no_result_condition: "なし"
    save_to: "referredHospital"
    next_step: "情報提供書_診療科宛先"
    retry_failure: "end_failure"

  - step_name: "情報提供書_診療科宛先"
    tts_announcement: "どの診療科宛になりますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "診療科名テキスト"
      mapping:
        - input: "発話された診療科名"
          output: "発話内容をそのまま保存"
      no_result_condition: "なし"
    save_to: "referredDepartment"
    next_step: "診察券番号聴取"
    retry_failure: "end_failure"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定（祝日・年末年始(12/30〜1/4)・平日17時以降〜翌9時前・土曜12時以降〜翌9時前・日曜終日）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、日曜祝日、年末年始を除く、月曜日から金曜日の9時から17時、土曜日の9時から12時となっております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "いずれかの聴取ステップでリトライ上限到達"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。電話番号は011-712-1131です。繰り返します。電話番号は011-712-1131です。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_受付完了_携帯"
    condition: "全聴取完了 かつ 電話番号サブフロー返却値=1（携帯）"
    tts_announcement: "ご予約の申し込みを受付いたしました。3診療日以内に、担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_携帯"

  - name: "END_受付完了_固定"
    condition: "全聴取完了 かつ 電話番号サブフロー返却値=2（その他/固定/IP）"
    tts_announcement: "ご予約の申し込みを受付いたしました。3診療日以内に、担当者から折り返し、電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_固定"

  - name: "END_当日代表案内"
    condition: "当日受診確認で「当日」を選択（当日予約はAI電話では受付不可）"
    tts_announcement: "申し訳ございません。当日のご予約に関しては、こちらのAI電話ではお受けできません。恐れ入りますが、代表電話までおかけなおしください。電話番号は011-712-1131です。繰り返します。電話番号は011-712-1131です。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_当日代表案内"

  - name: "END_診療科代表案内"
    condition: "診療科聴取で代表案内診療科3種(がんセカンドオピニオン外来/救急/血管内留置デバイス外来)のいずれかを選択"
    tts_announcement: "<% clinicalDepartment %>はAI電話では受付できません。恐れ入りますが、代表電話までおかけ直しください。電話番号は011-712-1131です。繰り返します。電話番号は011-712-1131です。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_診療科代表案内"

# END_診療科聞き取りNG は終話 termination としては作らず、
# 診療科 hearing の retry_failure_announcement で診療科専用の代表案内文言を再生して
# end_failure 標準経路（END_聴取失敗 / 完了フラグ_聴取失敗 status=3）に流す設計とした

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"
  patterns:
    - condition: "電話番号サブフロー返却値=1（携帯）"
      sms_flag: "1"
      notes: "END_受付完了_携帯 ルートへ。3診療日以内にSMSまたは電話で折り返し"
    - condition: "電話番号サブフロー返却値=2（その他/固定/IP）"
      sms_flag: "-1"
      notes: "END_受付完了_固定 ルートへ。3診療日以内に電話のみで折り返し"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

