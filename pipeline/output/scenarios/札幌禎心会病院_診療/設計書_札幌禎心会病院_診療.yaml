# 設計書 -- 札幌禎心会病院 診療
# 生成元: @director エージェント
# 生成日: 2026/05/01
# 元資料: commubo抽出/【031】札幌禎心会病院｜【032】北口クリニック/【0033札幌禎心会病院】診療1_M_本番/
# 移管ノート: docs/migration/gen1_札幌禎心会病院_診療.md
# 作業種別: Gen1→Gen3移管
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "札幌禎心会病院"
  scenario_name: "診療"
  group_name: "札幌禎心会病院"
  flow_name: "札幌禎心会病院$診療"
  target_facility: "札幌禎心会病院"
  office_id: "TODO_要確認"
  phone_number: "011-712-1131"
  business_hours: "祝日・年末年始(12/30〜1/4)を除く 月〜金 9:00〜17:00 / 土 9:00〜12:00 / 日祝休"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "札幌禎心会病院$診療"
      role: "main"
      description: "予約専用ダイヤル。当日予約は受付不可、予約系4ルート(初診/再診/変更/キャンセル/確認)+情報提供書ルートで聴取し、smsFlag(携帯/固定)で終話分岐"
  subflows:
    - name: "札幌禎心会病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報サブフロー.bivr の氏名聴取を完全コピー。patientName 格納。患者氏名前提（subject=patient）"
    - name: "札幌禎心会病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報サブフロー.bivr の生年月日聴取（復唱あり）を完全コピー。和暦対応。subject=patient"
    - name: "札幌禎心会病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報サブフロー.bivr の電話番号聴取を完全コピー。incoming-classifier 内蔵。返却値 1=携帯/2=その他。phonetype コンテキストに保存し終話分岐に使用"
    - name: "札幌禎心会病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報サブフロー.bivr の診察券番号聴取を完全コピー。「わからない/持ってない」発話で診察券無し扱い。予約確認/情報提供書の2ルートから呼ばれる（main.yaml実装に従う。新規予約/予約変更/キャンセルでは呼ばない）"

# --- セクション3: フローの目的 ---
purpose: >
  札幌禎心会病院の予約専用AI電話。患者からの入電に対し、当日予約は不可案内・代表転送、それ以外は
  予約系(新規/再診/変更/キャンセル/予約確認) + 情報提供書ルートに分岐。各ルートで必要な情報
  (紹介状有無・診療科・予約日・確認内容・医療機関名・診察券番号・氏名・生年月日・連絡先)を
  聴取し、3診療日以内の折り返し連絡(SMS or 電話)を案内する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "札幌禎心会病院$診療"
    diagram: |
      ====== 冒頭チェーン ======
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2,smsFlag=-1) → 切断
            └─ 通常 → acceptance_times
                       ├─ 時間外 → END_時間外(TTS) → 完了フラグ_時間外(status=6,smsFlag=-1) → 切断
                       └─ 受付可 → 冒頭_アナウンス(TTS) → 用件_予約or情報提供書

      ====== 用件_予約or情報提供書（第1段、復唱あり）======
      用件_予約or情報提供書(TTS, 「ご予約について」/「情報提供書の申し込みについて」)
        → 入力_用件_予約or情報提供書(AmiVoice STT)
        → OpenAI_用件_予約or情報提供書(classify: 予約 / 情報提供書)
            ├─ 予約 → 当日受診確認
            └─ 情報提供書 → 情報提供書_医療機関名

      ====== 当日受診確認（予約系のみ）======
      当日受診確認(TTS, 「本日の予約に関する内容ですか？はい/いいえ」)
        → 入力_当日受診確認(AmiVoice STT)
        → OpenAI_当日受診確認(classify: 当日 / 当日以外)
            ├─ 当日 → END_当日代表案内 (status=2,smsFlag=-1)
            └─ 当日以外 → 用件_予約系

      ====== 用件_予約系（第2段、4択 + 復唱あり）======
      用件_予約系(TTS, 「診察の予約を取る/予約を変更する/予約をキャンセルする/予約を確認する」)
        → 入力_用件_予約系(AmiVoice STT)
        → OpenAI_用件_予約系(classify: 診察予約 / 予約変更 / 予約キャンセル / 予約確認)
            ├─ 診察予約 → 新患確認
            ├─ 予約変更 → 診療科
            ├─ 予約キャンセル → 診療科
            └─ 予約確認 → 確認内容

      ====== 新患確認（診察予約ルートのみ）======
      新患確認(TTS, 「当院でのご受診は初めてですか？はい/いいえ」)
        → 入力_新患確認(AmiVoice STT)
        → OpenAI_新患確認(classify: 初診 / 再診)
            ├─ 初診 → saveContext(classification="新規予約_初診") → 紹介状有無
            └─ 再診 → saveContext(classification="新規予約_再診") → 診療科

      ====== 紹介状有無（初診ルートのみ）======
      紹介状有無(TTS, 「他の医療機関からの紹介状はお持ちですか？」)
        → 入力_紹介状有無(AmiVoice STT)
        → OpenAI_紹介状有無(classify: あり / なし)
            ├─ あり → 診療科
            └─ なし → 選定療養費案内(announcement) → 診療科

      ====== 診療科聞き取り（25通常診療科 / 3代表案内診療科）======
      診療科(TTS, 用件によりアナウンス分岐)
        → 入力_診療科(AmiVoice STT)
        → OpenAI_診療科(classify: 通常診療科25種 / 代表案内診療科3種)
            ├─ 通常診療科 → saveContext(clinicalDepartment) → 診療科後_分岐
            ├─ 代表案内診療科 → END_診療科代表案内 (status=2,smsFlag=-1)
            └─ no_result(5回NG) → END_聴取失敗 (診療科専用文言を retry_failure_announcement で上書き)

      ====== 診療科後_分岐（用件区分で次ステップ決定）======
      診療科後_分岐(context_match_router, reference_module: OpenAI_用件_予約系)
            ├─ 予約変更 → 予約日
            ├─ 予約キャンセル → 予約日
            └─ other(=新規予約_初診/再診) → 氏名聴取

      ====== 予約日聴取（予約変更/キャンセル）======
      予約日(TTS, 「予約票に記載されている予約日を『4月1日』のように」)
        → 入力_予約日(AmiVoice STT, DTMF入力対応 max_dtmf_length=4)
        → OpenAI_予約日(convert: yyyy-MM-dd 過去日付なら+1年)
            → saveContext(reservationDate)
        → 氏名聴取

      ====== 確認内容聴取（予約確認ルート）======
      確認内容(TTS, 「ご確認内容についてお伺いします。次回の予約日時を教えて欲しい等」)
        → 入力_確認内容(AmiVoice STT)
        → OpenAI_確認内容(summarize: free text)
            → saveContext(confirmation)
        → 診察券番号聴取(Custom Jump)

      ====== 情報提供書ルート ======
      情報提供書_医療機関名(TTS, 「どこの医療機関へのお手紙ですか？」)
        → 入力_情報提供書_医療機関名(AmiVoice STT)
        → OpenAI_情報提供書_医療機関名(normalize: free text)
            → saveContext(referredHospital)
        → 情報提供書_診療科宛先(TTS, 「どの診療科宛になりますか？」)
        → 入力_情報提供書_診療科宛先(AmiVoice STT)
        → OpenAI_情報提供書_診療科宛先(normalize: free text)
            → saveContext(referredDepartment)
        → 診察券番号聴取(Custom Jump)

      ====== 診察券番号サブフロー（予約確認/情報提供書ルート合流）======
      診察券番号聴取(Custom Jump → 札幌禎心会病院$診察券番号聴取)
        → 氏名聴取

      ====== 個人情報サブフロー（共通: 氏名→生年月日→電話番号）======
      氏名聴取(Custom Jump → 札幌禎心会病院$氏名聴取)
        → 生年月日聴取(Custom Jump → 札幌禎心会病院$生年月日聴取)
        → 電話番号聴取(Custom Jump → 札幌禎心会病院$電話番号聴取)
        → 終話分岐_電話種別

      ※ 新規予約(初診/再診)ルートは診察券番号聴取をスキップして直接氏名聴取に到達。
        予約変更/キャンセル/予約確認/情報提供書ルートは診察券番号聴取を経由。

      ====== 終話分岐（phonetype で smsFlag 分岐）======
      終話分岐_電話種別(context_match_router, reference_module: 電話番号聴取)
            ├─ 1(携帯) → END_受付完了_携帯 (status=1,smsFlag=1, 「3診療日以内に折り返し電話orSMS」)
            └─ other(その他) → END_受付完了_固定 (status=1,smsFlag=-1, 「3診療日以内に折り返し電話」)

      ====== 全終話パターン ======
      END_非通知(status=2,smsFlag=-1) → 切断
      END_時間外(status=6,smsFlag=-1) → 切断
      END_聴取失敗(status=3,smsFlag=-1) → 切断
      END_当日代表案内(status=2,smsFlag=-1, 「当日のご予約はAI電話では受付できません」+代表番号読み上げ) → 切断
      END_診療科代表案内(status=2,smsFlag=-1, 「<診療科>はAI電話では受付できません」+代表番号読み上げ) → 切断
      END_受付完了_携帯(status=1,smsFlag=1) → 切断
      END_受付完了_固定(status=1,smsFlag=-1) → 切断
      ※ 診療科 hearing のリトライ上限到達は END_聴取失敗 を再利用し、診療科専用の代表案内文言を
        retry_failure_announcement で上書きする（受付時間の説明を含む）
    notes: |
      Gen1 では 情報提供書 を 1段目（用件聞き取り前）で問いかけており、Gen3 では director 判断で
      冒頭直後に 用件_予約or情報提供書(復唱あり) を配置（移管ノート director 推奨）。
      予約系(4択)は 用件_予約系(復唱あり) で、新患確認(初診/再診)は 用件_予約系=診察予約 ルートのみで聞く。
      Gen1 で「用件を判断」「用件の確認_1」等の重複箱は Gen3 では classification context + ContextMatchRouter
      に集約。診療科後の分岐は OpenAI_用件_予約系 出力値（予約変更/キャンセルなら予約日、新規予約なら氏名へ）
      で振り分け。
      氏名/生年月日/電話番号/診察券番号は全て個人情報サブフロー.bivr のコピーを使用（CLAUDE.md Rule 9）。
      終話TTS文言は携帯/固定の2パターンのみで、Gen1 の用件別TTS差分（「予約変更の申し込みを受付いたしました」等）
      は汎用文言「ご予約の申し込みを受付いたしました」に統合（confirmation_items 参照）。
      非通知/時間外は Gen3 標準仕様で受付拒否。年末年始(12/30-1/4)は Dr.JOY 側のスケジュール設定で
      時間外扱いにする（フローJSON側では特別扱いせず END_時間外 で対応）。
      代表電話番号 011-712-1131 は END_当日代表案内/END_診療科代表案内/END_聴取失敗
      の TTS 内で読み上げ（Gen1 では「繰り返します。電話番号は...」と2回読み上げ）。

  - flow_name: "札幌禎心会病院$氏名聴取"
    diagram: |
      *** 完全コピー対象（CLAUDE.md Rule 9）***
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」フローを完全コピー。
      フロー名プレフィックスのみ「札幌禎心会病院$」に置換。構造・接続・スクリプトは変更不可。
      patientName コンテキストに格納。subject=patient（患者本人前提、入電者氏名や続柄は聞かない）。
    notes: "CLAUDE.md Rule 9 準拠。Gen1 では「患者さんのお名前を、フルネームでおっしゃってください」"

  - flow_name: "札幌禎心会病院$生年月日聴取"
    diagram: |
      *** 完全コピー対象（CLAUDE.md Rule 9）***
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「生年月日聴取（復唱あり）」フローを完全コピー。
      DOB Re-confirmation + 復唱STT + 復唱OpenAI(肯定/否定) の標準構成。和暦・西暦両対応。
    notes: "CLAUDE.md Rule 9 準拠。Gen1 で『（生年月日）でよろしいですか?』復唱が必須のため復唱ありバージョン。subject=patient"

  - flow_name: "札幌禎心会病院$電話番号聴取"
    diagram: |
      *** 完全コピー対象（CLAUDE.md Rule 9/10/11）***
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「電話番号聴取」フローを完全コピー。
      incoming-classifier 内蔵。携帯は着信番号復唱、その他は連絡先聴取+Phone Normalization+復唱。
      固定で取得した場合の追加「緊急時連絡先として携帯番号」聴取は本サブフローのオプションとして含まれる。
      返却値: 1=携帯 / 2=その他。phonetype コンテキストに保存。
    notes: "CLAUDE.md Rule 9/10/11 準拠。Gen1 では入電番号が携帯ならそれを使用、固定なら別番号聴取+携帯番号オプション"

  - flow_name: "札幌禎心会病院$診察券番号聴取"
    diagram: |
      *** 完全コピー対象（CLAUDE.md Rule 9）***
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「診察券番号聴取」フローを完全コピー。
      「わからない/持ってない」分岐あり。DTMF 10桁までの数字入力。
    notes: "CLAUDE.md Rule 9 準拠。予約変更/キャンセル/予約確認/情報提供書ルートから呼ばれる。新規予約(初診/再診)では呼ばない（Gen1踏襲）"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件_予約or情報提供書

  # --- 用件_予約or情報提供書（第1段、復唱あり）---
  - step: 用件_予約or情報提供書
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "予約"
        next: 当日受診確認
      - match: "other"
        next: 情報提供書_医療機関名

  # --- 当日受診確認（予約系のみ）---
  - step: 当日受診確認
    type: hearing
    output_format: enum
    conditions:
      - match: "当日"
        next: END_当日代表案内
      - match: "other"
        next: 用件_予約系

  # --- 用件_予約系（第2段、4択、復唱あり）---
  - step: 用件_予約系
    type: hearing
    output_format: enum
    echo_back: true
    save_to: "classification"
    conditions:
      - match: "診察予約"
        next: 新患確認
      - match: "予約変更"
        next: 診療科
      - match: "予約キャンセル"
        next: 診療科
      - match: "other"
        next: 確認内容

  # --- 新患確認（診察予約ルート）---
  - step: 新患確認
    type: hearing
    output_format: enum
    conditions:
      - match: "初診"
        next: 紹介状有無
      - match: "other"
        next: 診療科

  # --- 紹介状有無（初診ルート）---
  - step: 紹介状有無
    type: hearing
    output_format: enum
    save_to: "introduction"
    conditions:
      - match: "あり"
        next: 診療科
      - match: "other"
        next: 選定療養費案内

  - step: 選定療養費案内
    type: announcement
    next: 診療科

  # --- 診療科聞き取り ---
  - step: 診療科
    type: hearing
    output_format: enum
    save_to: "clinicalDepartment"
    no_result_default: "登録なし"
    conditions:
      - match: "がんセカンドオピニオン外来"
        next: END_診療科代表案内
      - match: "救急"
        next: END_診療科代表案内
      - match: "血管内留置デバイス外来"
        next: END_診療科代表案内
      - match: "other"
        next: 診療科後_分岐

  # --- 診療科後_分岐（用件区分で次ステップ決定）---
  - step: 診療科後_分岐
    type: context_match_router
    reference_module: "OpenAI_用件_予約系"
    conditions:
      - match: "予約変更"
        next: 予約日
      - match: "予約キャンセル"
        next: 予約日
      - match: "other"
        next: 氏名聴取

  # --- 予約日聴取（予約変更/キャンセル）---
  - step: 予約日
    type: hearing
    output_format: datetime
    save_to: "reservationDate"
    next: 氏名聴取

  # --- 確認内容聴取（予約確認ルート）---
  - step: 確認内容
    type: hearing
    output_format: text
    save_to: "confirmation"
    next: 診察券番号聴取

  # --- 情報提供書ルート ---
  - step: 情報提供書_医療機関名
    type: hearing
    output_format: text
    save_to: "referredHospital"
    next: 情報提供書_診療科宛先

  - step: 情報提供書_診療科宛先
    type: hearing
    output_format: text
    save_to: "referredDepartment"
    next: 診察券番号聴取

  # --- 診察券番号聴取サブフロー（予約確認/情報提供書ルート共通合流）---
  - step: 診察券番号聴取
    type: subflow
    flowname: "札幌禎心会病院$診察券番号聴取"
    next: 氏名聴取

  # --- 個人情報サブフロー（共通：氏名→生年月日→電話番号）---
  - step: 氏名聴取
    type: subflow
    flowname: "札幌禎心会病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "札幌禎心会病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "札幌禎心会病院$電話番号聴取"
    next: 終話分岐_電話種別

  # --- 終話分岐（phonetype で smsFlag 分岐）---
  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "1"
        next: END_受付完了_携帯
      - match: "other"
        next: END_受付完了_固定

  # --- 終話ブロック ---
  - step: END_受付完了_携帯
    type: termination
    termination_ref: "END_受付完了_携帯"

  - step: END_受付完了_固定
    type: termination
    termination_ref: "END_受付完了_固定"

  - step: END_当日代表案内
    type: termination
    termination_ref: "END_当日代表案内"

  - step: END_診療科代表案内
    type: termination
    termination_ref: "END_診療科代表案内"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

