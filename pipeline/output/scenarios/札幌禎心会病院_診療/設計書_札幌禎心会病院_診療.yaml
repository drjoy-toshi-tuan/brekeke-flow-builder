# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1→Gen3移管案件（本番環境）。Gen1 commubo の単独中規模シナリオから Gen3 アーキテクチャへ再構成"
  - "代表電話: 011-712-1131。当日代表案内/診療科代表案内/診療科聞き取りNG/聴取失敗の終話TTS内で2回読み上げ（Gen1踏襲: 「電話番号は011-712-1131です。繰り返します。電話番号は011-712-1131です。」）"
  - "営業時間: 祝日・年末年始(12/30〜1/4)を除く 月〜金 9:00〜17:00 / 土 9:00〜12:00 / 日祝休。Dr.JOY 側のスケジュール設定で acceptance_times を制御。年末年始期間も時間外として扱うため別系統の年末年始アナウンスは設けない（フローJSON簡略化）"
  - "Gen1 では 情報提供書(予約 vs 情報提供書) を最初に問い、その後で当日受診確認→用件聞き取り(4択)とする 3 段階構造。Gen3 では director 判断で「冒頭→用件_予約or情報提供書(復唱あり)→当日受診確認(予約のみ)→用件_予約系(4択+復唱)」に再整理（移管ノート director 推奨）"
  - "用件_予約or情報提供書 は復唱あり（Gen1 の「ご予約について、でよろしいですか?」「情報提供書の申し込みについて、でよろしいですか?」を踏襲）"
  - "用件_予約系 は復唱あり（Gen1 の「ご予約の変更でよろしいですか?」「初診のご予約でよろしいですか?」等を踏襲）"
  - "Gen1 の 5 用件出力（初診予約/再診予約/予約変更/予約キャンセル/予約確認）を Gen3 では 4 択（診察予約/予約変更/予約キャンセル/予約確認）に縮約し、診察予約選択時のみ後続で「新患確認」(初診/再診)を追加聴取する設計（Gen1 の「新患確認」box を踏襲）"
  - "新患確認は classification を「新規予約_初診」または「新規予約_再診」に上書きする。初診のみ紹介状有無→診療科、再診は直接診療科へ"
  - "紹介状なしの場合は「初診時選定療養費 1,100円を全額自己負担」アナウンス必須（Gen1 踏襲）"
  - "診療科聴取は通常診療科25種 + 代表案内診療科3種(がんセカンドオピニオン外来/救急/血管内留置デバイス外来)。代表案内診療科ヒット時は END_診療科代表案内 へ。clinicalDepartment context は END TTS で「<% clinicalDepartment %>はAI電話では受付できません」として読み上げる"
  - "no_result_default=登録なし（モジュール選定ガイド 2.5 準拠）。Gen1 では「5回不一致+2回再質問でも取れない場合は END_診療科聞き取りNG → 代表案内」だったが、Gen3 では retry_count=2 + retry_failure_announcement で診療科専用文言を上書きしつつ END_聴取失敗 標準経路に流す（status=3）"
  - "予約日聴取（予約変更/キャンセル時）: Gen1仕様 西暦不要(月日のみ)、過去日付なら自動で+1年、DTMF 4桁(月2桁+日2桁)対応。Gen3 では output_format=datetime + addCurrentDate=Yes で年補完を Brekeke 側に寄せる"
  - "診察券番号聴取は予約確認/情報提供書の2ルートのみ（main.yaml の用件の確認_1 / 確認内容の聞き取り → 次へ_1 → 診察券番号聞き取り に従う）。新規予約(初診/再診)/予約変更/予約キャンセルは診察券番号を聴取しない（Gen1 では 診察券有無の確認 → デフォルト 診察券無し → 患者氏名 で実質スキップ）。移管ノート 7 項目には『新規予約以外: 診察券番号聞き取り → 有り扱い』とあるが、これは main.yaml の実装と異なるため main.yaml の動作に合わせた（confirmation_items 参照）"
  - "氏名聴取は subject=patient（患者本人前提）。入電者氏名や続柄は聴取しない（Gen1 仕様）"
  - "生年月日聴取は subject=patient（「患者さんの生年月日」明記）。復唱ありバージョンを使用"
  - "電話番号サブフローは incoming-classifier 内蔵。携帯ならそれを連絡先として復唱、固定なら別番号聴取+携帯番号オプション。返却値 phonetype: 1=携帯 / 2=その他"
  - "smsFlag分岐: 電話番号サブフロー返却値で終話を分岐。携帯=smsFlag=1（SMS送信あり）、その他=smsFlag=-1（電話のみ）"
  - "Gen1 の用件別TTS差分（「予約変更の申し込みを受付いたしました」「予約キャンセルの申し込みを受付いたしました」等）は Gen3 では汎用文言「ご予約の申し込みを受付いたしました」に統合。confirmation_items でユーザ確認"
  - "リトライ上限: retry_count=2（初回+2回リトライ=計3回）。上限到達時は END_聴取失敗 へ遷移。診療科は retry_failure_announcement で診療科専用の代表案内文言（受付時間説明含む）を上書きしてから END_聴取失敗 経路に流す"
  - "全STTモジュールのTIMEOUT/ERRORは、対応するリトライカウンターに接続（NO_RESULT と同経路）"
  - "Gen1 の「もしもし」「もう一度」のメタ発話処理は Gen3 標準のリトライハンドリングに統合（特別箱を設けない）"
  - "Gen1 の「予約以外」発話検出（処方箋/書類/症状/質問 等）は Gen3 では用件_予約or情報提供書 の no_result としてリトライ → 上限到達で END_聴取失敗 へ。専用 END_予約以外 は設けない（confirmation_items で要確認）"
  - "Gen1 の DTMF 入力対応（予約日4桁・診察券番号・電話番号）は Gen3 でも同様にサポート"
  - "雑談ノード（StartDigressNode）は Gen1 にも存在しないため対応不要"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id"
    resolved: false
    notes: "Dr.JOY 管理画面で確認"
  - item: "営業時間スケジュールの Dr.JOY 側設定"
    resolved: false
    notes: "祝日・年末年始(12/30〜1/4)を除く 月〜金 9:00〜17:00 / 土 9:00〜12:00 / 日祝休 を Dr.JOY 側 acceptance_times のスケジュール設定で反映する。年末年始の年次更新が必要"
  - item: "用件別TTS文言の集約方針"
    resolved: false
    notes: "Gen1 では route 別に「予約変更の申し込みを受付いたしました」「予約キャンセルの申し込みを受付いたしました」「ご予約に関するお問い合わせを受付いたしました」「情報提供書に関するお問い合わせを受付いたしました」と差分があったが、Gen3 では汎用文言「ご予約の申し込みを受付いたしました」に統合。施設側で route 別文言が必要な場合は END を 5x2=10 パターン化する必要がある"
  - item: "Gen1 5用件 vs Gen3 4択の縮約妥当性"
    resolved: false
    notes: "Gen1 第1段で「初診予約」「再診予約」「予約変更」「予約キャンセル」「予約確認」の 5 出力を返していたが、Gen3 では「診察予約 → 新患確認(初診/再診)」の 2 段階構造に統合（Gen1 の 新患確認 box を流用）。施設側で「初診/再診で別ルート」を望むなら新患確認の前段で 5 択 hearing にする必要がある"
  - item: "予約以外発話の取扱い（Gen1 では END_予約以外専用終話あり）"
    resolved: false
    notes: "Gen1 では「処方箋/書類/症状/質問/会計 等」の予約以外発話を検出して専用終話「こちらは予約専用ダイヤルとなっております。ご予約以外のお問い合わせにつきましては、代表電話へおかけなおしください。」を案内していた。Gen3 では用件_予約or情報提供書 の NO_RESULT 経由で END_聴取失敗 にまとめている。専用終話を維持するか確認"
  - item: "診療科 27 vs 28 vs 25+3 の整合性"
    resolved: false
    notes: "移管ノートには「27科 + 代表案内3科」とあるが、Gen1 元資料の entity 定義からは「通常診療科25種 + 代表案内診療科3種 = 28」。本設計書では Gen1 yaml の entity 定義(25種)に従って 25+3 構成とした。施設側の最新の正式な診療科リストを Dr.JOY 側で確認すること"
  - item: "代表案内診療科の rangeValues 登録要否"
    resolved: false
    notes: "がんセカンドオピニオン外来/救急/血管内留置デバイス外来 は END_診療科代表案内 に分岐するため Dr.JOY 上は受け付けないが、ログ・運用上 rangeValues に追加すべきかは要確認。本設計書では rangeValues に含めていない"
  - item: "終話分岐の「電話番号聴取」サブフロー返却値の参照可否"
    resolved: false
    notes: "ContextMatchRouter の reference_module: 電話番号聴取 はサブフロー step 名指定。サブフロー返却値（phonetype: 1=携帯/2=その他）を参照できる前提だが、scaffold/validator で正しく解決されるか初回ビルドで要確認。動かない場合は別途 phonetype context を直接参照する形（reference_module: scriptモジュール名）に変更"
  - item: "年末年始アナウンスの差別化要否"
    resolved: false
    notes: "Gen1 では年末年始期間（12/30〜1/4）に専用アナウンス「申し訳ございませんが、ただいまの時間は、年末年始のため受付時間外となっております。受付開始は2026年1月5日月曜日の朝9時からとなっております。」を流していた。Gen3 では END_時間外 に統合し汎用文言とした。施設で年末年始専用アナウンスが必要な場合は acceptance_times の前段に script ブロックで日付判定を追加する必要がある"
  - item: "5回NG + 2回再質問のリトライ仕様"
    resolved: false
    notes: "Gen1 では診療科で「5回NG + 2回再質問」と詳細なリトライ階層があったが、Gen3 では retry_count=2 で簡略化。施設で詳細リトライが必要な場合は別途 augment ブロックの検討が必要"
  - item: "Gen1 もしもし/もう一度メタ発話処理"
    resolved: false
    notes: "Gen1 では「もしもし」発話に「はい、聞こえております。」、「もう一度」発話に「かしこまりました。それでは、再度、ご案内いたします。」と返答していた。Gen3 では標準リトライに統合し専用ハンドリングなし。施設で必要なら OpenAI プロンプトに「メタ発話 → ガイダンス再案内」のルールを追加できる"
  - item: "SMS送信文面（Dr.JOY 側設定）"
    resolved: false
    notes: "実際に患者に送信される SMS 文面は Dr.JOY 管理画面で設定。設計書では smsFlag=1 のフラグ設定のみ指示"
  - item: "認証設定（Dr.JOY 側）"
    resolved: false
    notes: "生年月日・診察券番号・電話番号の認証優先順位は Dr.JOY 管理画面で設定"
  - item: "診察券番号聴取の対象ルート（移管ノートと main.yaml の差異）"
    resolved: false
    notes: "移管ノート 7 項目には『新規予約以外(予約変更/キャンセル/予約確認): 診察券番号聞き取り → 有り扱い』とあり 4 ルート対象とされているが、Gen1 main.yaml の実装は『予約確認/情報提供書の 2 ルートのみ 診察券番号聴取、それ以外は 診察券有無の確認 → デフォルト 診察券無し → 患者氏名 で実質スキップ』となっている。本設計書は main.yaml 実装側（2 ルートのみ聴取）に従ったが、施設側の意図が移管ノート側（4 ルート）であれば、診療科後_分岐 / 予約日 → 氏名聴取 の代わりに → 診察券番号聴取 → 氏名聴取 へ繋ぎ変える必要あり"
