amivoice_dictionary: []
special_notes:
- 元 bivr の TTS prompt は全て空（IVR プロパティ駆動）。本設計書の announcement は
  properties 生成用の既定値であり、本番文言は Brekeke 側プロパティで上書きされる前提。
- 元 bivr の Entity Classifier 残骸チェーン（Entity_予約/変更/キャンセル/問い合わせ・
  NTT_yes/no・復唱_用件系）と TEST モジュールは死コードのため再構築に含めない。
- 元 bivr は start が 冒頭_アナウンス 直指しで営業時間チェックを迂回していた
  （テスト用変更の可能性）。再構築では標準 opening（非通知判定＋受付時間判定）を経由する。
confirmation_items:
- item: office_id の確定（TODO_要確認）
- item: 全 TTS 文言を Brekeke 本番プロパティと突合（tts_modules は既定値）
- item: 用件確認の語彙は元 Scripts_用件 のミラー。OpenAI 2段目フォールバックは廃止したため、
    認識率が要件を満たすか P7/P6 で確認（不足時はキーワード拡充 or preset 化を壁打ちで決定）
- item: FAQ 回答の動的差込（<%scripts-faq%>）が再構築後も機能するか実機確認
