# 設計書 — 島村記念病院 健診
# Gen2→Gen3 移管。元資料: docs/reference/customer_docs/【健診1】：島村記念病院.md
# 移管ノート: docs/migration/gen2_島村記念病院_健診.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "島村記念病院"
  scenario_name: "健診"
  group_name: "島村記念病院"
  flow_name: "島村記念病院$健診"
  target_facility: "本院（健診センター）"
  office_id: "5eecd40f2c9faeddaddc2823"
  phone_number: "03-3928-0071"     # 代表電話（フロー内 [代表案内] で読み上げ）
  business_hours: "なし（24時間受付・Date of Call Classifier 不要）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# 個人情報聴取は氏名（入電者名・受診者名の 2 回呼出）／生年月日／電話番号の 3 種を切り出す。
# 入電者名と受診者名はどちらも氏名聴取サブフロー（PatientName 系）に充当する（移管ノート判断）。
flow_structure:
  type: "subflow"
  flows:
    - name: "島村記念病院$健診"
      role: "main"
      description: "健診の新規予約／変更／キャンセル／確認の 4 用件をハンドリングするメインフロー。冒頭で用件を判定し、変更／キャンセル／確認の場合は当日案内を挟んでから個人情報聴取に入る。"
  subflows:
    - name: "島村記念病院$入電者名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "氏名聴取サブフローを 1 回目として呼出。サブフロー戻り後、callerName と patientName の両方に同じ値を保存する（callerName→patientName 自動コピー相当）。再確認禁止（recitation: なし）。"
    - name: "島村記念病院$受診者名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "氏名聴取サブフローを 2 回目として呼出（受診者確認＝本人でない場合のみ）。patientName のみ上書き保存。callerName は更新しない。再確認禁止。"
    - name: "島村記念病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "生年月日聴取サブフロー。専用フォーマット (2) で復唱必須。8桁 DTMF 対応。2桁元号判定込み。"
    - name: "島村記念病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "電話番号聴取サブフロー。phone_type を mobile/ip050/landline/withheld のいずれかで返却し、メイン側の終話分岐で参照する。invalid 1 回目は無効電話番号案内→再聴取、2 回目 invalid もしくは取得不可の場合は空文字で確定して STEP 6（用件別ヒアリング）へフォールスルー（切断しない）。"

# --- セクション3: フローの目的 ---
purpose: |
  島村記念病院 健診センターの予約専用 AI 電話窓口。入電者から用件（新規予約／変更／キャンセル／確認）を聴取し、
  共通の個人情報聴取（入電者名→受診者確認→受診者名→生年月日→電話番号）を経た後、
  用件別ヒアリングを実行して受付を完了させる。受付完了後の終話アナウンスと smsFlag は phone_type
  （携帯／IP050／固定／非通知）と用件の組み合わせで決定する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "島村記念病院$健診"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → END_非通知 → 切断
              └─ 通常 → 冒頭_アナウンス
                          → 用件確認 (echo_back: 復唱必須／enum)
                              ├─ 新規予約 → 入電者名聴取
                              └─ 変更/キャンセル/確認 → 当日案内 → 入電者名聴取
                          → 入電者名聴取(subflow:氏名聴取)
                          → 受診者確認 (本人/本人でない)
                              ├─ 本人 → 生年月日聴取
                              └─ 本人でない → 受診者名聴取(subflow:氏名聴取)
                          → 生年月日聴取(subflow)
                          → 電話番号聴取(subflow)
                          → 用件分岐(ContextMatchRouter on classification)
                              ├─ 新規予約 → [新規予約ルート]
                              ├─ 変更   → [変更ルート]
                              ├─ キャンセル → [キャンセルルート]
                              └─ 確認   → [確認ルート]

      [新規予約ルート]
        予約歴 → 健康保険組合 → 被保険者区分 → 希望コース → 追加オプション
          ├─ 女性検診含む → 女性検診詳細(子宮/乳/両方)
          │     ├─ 子宮がん検診のみ → 受診希望日1
          │     └─ 乳がん検診/両方 → 乳がん検査方法(超音波/マンモ/両方) → 受診希望日1
          ├─ 乳がん検診含む → 乳がん検査方法 → 受診希望日1
          └─ 上記以外 → 受診希望日1
        受診希望日1 → 受診希望日1範囲チェック
          ├─ 範囲外 → 受診希望日受付不可案内 → 受診希望日2
          └─ 範囲内 → 受診希望日2
        受診希望日2
          ├─ "なし" → 終話分岐_新規予約
          ├─ 範囲外 → 受診希望日受付不可案内 → 受診希望日3
          └─ 範囲内 → 受診希望日3
        受診希望日3 → 受診希望日3範囲チェック → 終話分岐_新規予約
          ├─ mobile/ip050 → END_新規予約_SMSあり (status=1, smsFlag=1)
          └─ landline/withheld → END_新規予約_SMSなし (status=1, smsFlag=1)

      [変更ルート]
        予約日_変更 → 予約日判定_変更
          ├─ 過去 → 予約日過去案内_変更 → 変更内容
          ├─ 当日 → END_代表案内 (status=2, smsFlag=0)
          └─ 未来 → 変更内容
        変更内容 (1番.コースまたはオプション / 2番.日程変更 / 3番.両方)
          ├─ コースまたはオプション → 変更コース確認 → 変更オプション確認 → 終話分岐_変更
          ├─ 日程変更 → 変更希望日有無
          └─ 両方 → 変更コース確認 → 変更オプション確認 → 変更希望日有無
        変更希望日有無
          ├─ あり → 変更希望日1 → 変更希望日2 → 変更希望日3 → 終話分岐_変更
          │   （各日付で範囲チェック {TOMORROW}〜{END_PERIOD_DATE}、範囲外なら変更希望日受付不可案内）
          │   （第2希望が "なし" なら 終話分岐_変更 へ直行）
          └─ なし → 変更希望時期 → 終話分岐_変更
        終話分岐_変更
          ├─ mobile/ip050 → END_変更_SMSあり (status=1, smsFlag=2)
          └─ landline/withheld → END_変更_SMSなし (status=1, smsFlag=2)

      [キャンセルルート]
        予約日_キャンセル → 予約日判定_キャンセル
          ├─ 過去 → 予約日過去案内_キャンセル → キャンセル確認
          ├─ 当日 → END_代表案内 (status=2, smsFlag=0)
          └─ 未来 → キャンセル確認
        キャンセル確認 (はい / いいえ)
          ├─ はい → END_キャンセル (status=1, smsFlag=3, phone_type 不問)
          └─ いいえ → 変更内容（=変更ルートに合流。最終 smsFlag=2 へ）

      [確認ルート]
        予約日_確認 (過去・未来・本日いずれも許容) → 確認内容 → 終話分岐_確認
        終話分岐_確認
          ├─ mobile/ip050 → END_確認_SMSあり (status=1, smsFlag=4)
          └─ landline/withheld → END_確認_SMSなし (status=1, smsFlag=4)
    notes: |
      ・受付時間制御は無し（24時間受付・Date of Call Classifier 不要）
      ・非通知のみ冒頭で弾く（END_非通知）
      ・予約日 (1.15) は 当日 → 即 END_代表案内、過去 → 復唱で肯定された場合のみ過去拒否案内
        （即拒否しないこと）
      ・予約日 (確認) (1.24) は独立ロジック。過去・未来いずれも許容し代表案内へは飛ばさない
      ・受診希望日範囲: {NEXT_MONTH_DATE}=2026-05-22 〜 {END_PERIOD_DATE}=2027-03-31
      ・変更希望日範囲: {TOMORROW}=2026-04-23 〜 {END_PERIOD_DATE}=2027-03-31
      ・キャンセル「いいえ」は変更ルートに合流し、最終的な smsFlag は 終話分岐_変更 で 2 に確定する
        （customer_doc 1090 行のステータス上書きと整合）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック ===
  - step: 冒頭
    type: opening
    use_acceptance_times: false       # 24時間受付・営業時間制御なし
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # === 共通フロー: 用件 → 案内発話判定 → 個人情報聴取 ===
  - step: 用件確認
    type: hearing
    stt_type: DTMF_AmiVoice
    dtmf_max_length: 1
    retry_count: 1
    echo_back: true                   # 専用フォーマット (1)「ご用件は{classification}でよろしいでしょうか。」
    save_to: classification
    output_format: enum
    output_labels:
      - "新規予約"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "DTMF 1=新規予約 / 2=変更 / 3=キャンセル / 4=確認。echo_back=true で復唱必須。再確認否定時は再聴取（最大1回）。"
    conditions:
      - match: "新規予約"
        next: 入電者名聴取               # 当日案内をスキップ
      - match: "変更"
        next: 当日案内
      - match: "キャンセル"
        next: 当日案内
      - match: "確認"
        next: 当日案内

  - step: 当日案内
    type: announcement
    next: 入電者名聴取

  - step: 入電者名聴取
    type: subflow
    flowname: "島村記念病院$入電者名聴取"
    next: 受診者確認

  - step: 受診者確認
    type: hearing
    stt_type: AmiVoice_STT
    dtmf_max_length: null
    retry_count: 1
    echo_back: false                  # 復唱厳禁項目
    save_to: relationship
    output_format: enum
    output_labels:
      - "本人"
      - "本人でない"
    notes: "「ほんにん／ほんにんです」等は本人。「家族／代理／本人ではない／子ども／夫／妻／母／父／息子／娘／担当者／看護師／職員」等は本人でない。"
    conditions:
      - match: "本人"
        next: 生年月日聴取
      - match: "本人でない"
        next: 受診者名聴取

  - step: 受診者名聴取
    type: subflow
    flowname: "島村記念病院$受診者名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "島村記念病院$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "島村記念病院$電話番号聴取"
    next: 用件分岐

  - step: 用件分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"  # classification の保存元モジュール
    conditions:
      - match: "新規予約"
        next: 予約歴
      - match: "変更"
        next: 予約日_変更
      - match: "キャンセル"
        next: 予約日_キャンセル
      - match: "確認"
        next: 予約日_確認

  # ============================================================
  # === 新規予約ルート ===
  # ============================================================
  - step: 予約歴
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: history
    output_format: enum
    output_labels:
      - "初回"
      - "2回目以降"
    notes: "「当院のご予約は初めてですか？」に対し肯定→「初回」、否定→「2回目以降」を保存。再確認禁止。"
    conditions:
      - match: "default"
        next: 健康保険組合

  - step: 健康保険組合
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: insuranceAssociation
    output_format: text
    notes: "団体名のみ抽出。不明・拒否（ない／なし／わからない等）は「なし」を格納。再確認禁止。"
    next: 被保険者区分

  - step: 被保険者区分
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: insuredPerson
    output_format: enum
    output_labels:
      - "被保険者"
      - "被扶養者"
    notes: "肯定／本人／被保険者→「被保険者」、否定／本人ではない／被扶養者→「被扶養者」。受診者確認の判定とは別物（混同禁止）。"
    conditions:
      - match: "default"
        next: 希望コース

  - step: 希望コース
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: course
    output_format: text
    notes: "【コース・オプション一覧】に定義された正式名称のみ抽出。「です／あの」等のクッション語は除外。再確認禁止。新規予約のみ格納。"
    next: 追加オプション

  - step: 追加オプション
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: option
    output_format: enum
    output_labels:
      - "女性検診"
      - "乳がん検診"
      - "その他"
    notes: |
      OpenAI で「女性検診」「乳がん検診」キーワードを検出して分岐先を決定（option へ書き込む値とは別）。
      実際に option に保存するのは【コース・オプション一覧】の正式名称（複数は「／」で連結、重複排除、否定は「なし」）。
      女性検診詳細の検査名（子宮がん検診／乳腺超音波検査／マンモグラフィー）は次ブロック以降で一時保持し、
      全サブフロー終了直後に統合して option に一括書き込む。
    conditions:
      - match: "女性検診"
        next: 女性検診詳細
      - match: "乳がん検診"
        next: 乳がん検査方法
      - match: "その他"
        next: 受診希望日1

  - step: 女性検診詳細
    type: hearing
    stt_type: DTMF_AmiVoice
    dtmf_max_length: 1
    retry_count: 1
    echo_back: false
    save_to: option
    output_format: enum
    output_labels:
      - "子宮がん検診"
      - "乳がん検診"
      - "両方"
    notes: |
      DTMF 1=子宮がん検診 / 2=乳がん検診 / 3=両方。
      - 「子宮がん検診」のみ → option に「子宮がん検診」を追加し、女性検診詳細サブフロー終了。
      - 「乳がん検診」のみ → option には何も書き込まない（名称「子宮がん検診／乳がん検診」は格納禁止）。
      - 「両方」 → option に「子宮がん検診」を追加し、乳がん検査方法へ進む。
      再確認禁止。
    conditions:
      - match: "子宮がん検診"
        next: 受診希望日1
      - match: "乳がん検診"
        next: 乳がん検査方法
      - match: "両方"
        next: 乳がん検査方法

  - step: 乳がん検査方法
    type: hearing
    stt_type: DTMF_AmiVoice
    dtmf_max_length: 1
    retry_count: 1
    echo_back: false
    save_to: option
    output_format: enum
    output_labels:
      - "乳腺超音波検査"
      - "マンモグラフィー"
      - "乳腺超音波検査／マンモグラフィー"
    notes: |
      DTMF 1=乳腺超音波／エコー → 「乳腺超音波検査」 / 2=マンモグラフィー／マンモ／乳房X線／乳房エックス線 → 「マンモグラフィー」 /
      3=両方 → 「乳腺超音波検査／マンモグラフィー」を option に追加。重複排除。再確認禁止。
      本ブロック完了で追加オプション聴取終了とみなし、保持してきた全オプションを option へ最終確定して受診希望日1へ進む。
    conditions:
      - match: "default"
        next: 受診希望日1

  - step: 受診希望日1
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: true                   # 専用フォーマット (4)「YYYY年M月D日でよろしいでしょうか。」
    save_to: preferredDate1
    output_format: datetime
    notes: "範囲チェックは復唱で肯定された後に実施。先に範囲判定して再聴取に飛ばさないこと。"
    next: 受診希望日1_範囲チェック

  - step: 受診希望日1_範囲チェック
    type: script
    script_template: custom
    reference_module: "OpenAI_受診希望日1"
    template_params:
      START_DATE: "{NEXT_MONTH_DATE}"   # 2026-05-22
      END_DATE: "{END_PERIOD_DATE}"     # 2027-03-31
    notes: "健診センターの営業日カレンダーに基づく受付期間の範囲判定。受診希望日1 が健診受付営業日範囲 {NEXT_MONTH_DATE} 〜 {END_PERIOD_DATE} の範囲内かを判定。範囲外なら受診希望日受付不可案内→受診希望日2へ。範囲内なら受診希望日2へ直行。再聴取は最大1回。"
    conditions:
      - match: "範囲内"
        next: 受診希望日2
      - match: "範囲外"
        next: 受診希望日受付不可案内_1

  - step: 受診希望日受付不可案内_1
    type: announcement
    next: 受診希望日2

  - step: 受診希望日2
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: true
    save_to: preferredDate2
    output_format: datetime
    notes: "「なし／特にない／希望なし」等もしくは preferredDate2='' なら受診希望日3 をスキップして終話分岐_新規予約 へ。"
    next: 受診希望日2_範囲チェック
    conditions:
      - match: "なし"
        next: 終話分岐_新規予約

  - step: 受診希望日2_範囲チェック
    type: script
    script_template: custom
    reference_module: "OpenAI_受診希望日2"
    template_params:
      START_DATE: "{NEXT_MONTH_DATE}"
      END_DATE: "{END_PERIOD_DATE}"
    notes: "健診センターの営業日カレンダーに基づく受付期間の範囲判定。範囲外なら受診希望日受付不可案内→受診希望日3へ。範囲内なら受診希望日3へ直行。"
    conditions:
      - match: "範囲内"
        next: 受診希望日3
      - match: "範囲外"
        next: 受診希望日受付不可案内_2

  - step: 受診希望日受付不可案内_2
    type: announcement
    next: 受診希望日3

  - step: 受診希望日3
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: true
    save_to: preferredDate3
    output_format: datetime
    notes: "第3希望。範囲外であってもアナウンスを発話したのち終話分岐_新規予約へ進む（再聴取なし）。"
    next: 受診希望日3_範囲チェック

  - step: 受診希望日3_範囲チェック
    type: script
    script_template: custom
    reference_module: "OpenAI_受診希望日3"
    template_params:
      START_DATE: "{NEXT_MONTH_DATE}"
      END_DATE: "{END_PERIOD_DATE}"
    notes: "健診センターの営業日カレンダーに基づく受付期間の範囲判定。範囲外なら受診希望日受付不可案内→終話分岐_新規予約へ。範囲内なら終話分岐_新規予約へ直行。"
    conditions:
      - match: "範囲内"
        next: 終話分岐_新規予約
      - match: "範囲外"
        next: 受診希望日受付不可案内_3

  - step: 受診希望日受付不可案内_3
    type: announcement
    next: 終話分岐_新規予約

  - step: 終話分岐_新規予約
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "mobile"
        next: END_新規予約_SMSあり
      - match: "ip050"
        next: END_新規予約_SMSあり
      - match: "default"
        next: END_新規予約_SMSなし

  # ============================================================
  # === 変更ルート ===
  # ============================================================
  - step: 予約日_変更
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: true                    # 年省略時のみ復唱（年明示時は復唱禁止）。簡略化のため echo_back: true で運用
    save_to: reservationDate
    output_format: datetime
    notes: "現在の予約日を聴取。復唱で肯定された後に判定。本日 → 即代表案内、過去 → 過去案内→再聴取（1回のみ）→変更内容、未来 → 変更内容。"
    next: 予約日判定_変更

  - step: 予約日判定_変更
    type: script
    script_template: custom
    reference_module: "OpenAI_予約日_変更"
    template_params:
      TODAY_REF: "{TODAY}"
    notes: "営業日カレンダー基準（{TODAY}）で予約日が当日／過去／未来のいずれかを判定。本日（{TODAY}と同一）→ END_代表案内、過去（{TODAY}より前の営業日）→ 予約日過去案内_変更、未来（{TODAY}より後の営業日）→ 変更内容。"
    conditions:
      - match: "当日"
        next: END_代表案内
      - match: "過去"
        next: 予約日過去案内_変更
      - match: "未来"
        next: 変更内容

  - step: 予約日過去案内_変更
    type: announcement
    next: 変更内容

  - step: 変更内容
    type: hearing
    stt_type: DTMF_AmiVoice
    dtmf_max_length: 1
    retry_count: 1
    echo_back: false
    save_to: changeType
    output_format: enum
    output_labels:
      - "コースまたはオプション"
      - "日程変更"
      - "両方"
    notes: "DTMF 1=コースまたはオプション / 2=日程変更 / 3=両方。再確認禁止。両方の場合は コース確認 → オプション確認 → 変更希望日有無 を必ずこの順で全実行。"
    conditions:
      - match: "コースまたはオプション"
        next: 変更コース確認
      - match: "日程変更"
        next: 変更希望日有無
      - match: "両方"
        next: 変更コース確認

  - step: 変更コース確認
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: changeDetails
    output_format: text
    notes: |
      変数 course は絶対に更新せず空文字を維持。changeDetails に「変更後コース: 〔コース名〕」または「コース変更: なし」形式で一時保持。
      最終確定は変更オプション確認後に統合。再確認禁止。
    next: 変更オプション確認

  - step: 変更オプション確認
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: changeDetails
    output_format: text
    notes: |
      追加・キャンセル・入れ替え意図ごとに「オプション追加: 〔A・B〕」「オプションキャンセル: 〔A〕」「オプション変更: 〔旧〕 → 〔新〕」形式で抽出し、
      コース確認のブロックと「／」で連結して changeDetails へ最終書き込み。重複排除。option には空文字を格納。
      キャンセル意図は女性検診サブフロー起動禁止（追加・変更先のみサブフロー適用）。再確認禁止。
    next: 変更分岐後

  - step: 変更分岐後
    type: context_match_router
    reference_module: "OpenAI_変更内容"
    notes: "changeType が 'コースまたはオプション' なら 終話分岐_変更 へ、'両方' なら変更希望日有無 へ進む。"
    conditions:
      - match: "コースまたはオプション"
        next: 終話分岐_変更
      - match: "両方"
        next: 変更希望日有無

  - step: 変更希望日有無
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: changeDateAvailability       # 一時参照用（永続化不要）。再確認禁止
    output_format: enum
    output_labels:
      - "あり"
      - "なし"
    notes: "肯定（はい・ある等）→ 変更希望日1、否定（いいえ・ない・決まっていない等）→ 変更希望時期。再確認禁止。"
    conditions:
      - match: "あり"
        next: 変更希望日1
      - match: "なし"
        next: 変更希望時期

  - step: 変更希望時期
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: reschedulePeriod
    output_format: text
    notes: "「〇月頃」「連休明け」「夏休み明け」等の自由表現をそのまま抽出。不要語（です／お願いします／あたり等）は除外。再確認禁止。"
    next: 終話分岐_変更

  - step: 変更希望日1
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: true
    save_to: changepreferredDate1
    output_format: datetime
    notes: "範囲チェックは復唱で肯定された後に実施。範囲外は変更希望日受付不可案内→変更希望日2 へ。"
    next: 変更希望日1_範囲チェック

  - step: 変更希望日1_範囲チェック
    type: script
    script_template: custom
    reference_module: "OpenAI_変更希望日1"
    template_params:
      START_DATE: "{TOMORROW}"          # 2026-04-23
      END_DATE: "{END_PERIOD_DATE}"     # 2027-03-31
    notes: "健診センターの営業日カレンダーに基づく変更受付期間の範囲判定。変更希望日1 が翌営業日 {TOMORROW} 〜 受付終了営業日 {END_PERIOD_DATE} の範囲内かを判定。"
    conditions:
      - match: "範囲内"
        next: 変更希望日2
      - match: "範囲外"
        next: 変更希望日受付不可案内_1

  - step: 変更希望日受付不可案内_1
    type: announcement
    next: 変更希望日2

  - step: 変更希望日2
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: true
    save_to: changepreferredDate2
    output_format: datetime
    notes: "「なし／特にない／希望なし」もしくは changepreferredDate2='' なら変更希望日3 をスキップし 終話分岐_変更 へ。"
    next: 変更希望日2_範囲チェック
    conditions:
      - match: "なし"
        next: 終話分岐_変更

  - step: 変更希望日2_範囲チェック
    type: script
    script_template: custom
    reference_module: "OpenAI_変更希望日2"
    template_params:
      START_DATE: "{TOMORROW}"
      END_DATE: "{END_PERIOD_DATE}"
    notes: "健診センターの営業日カレンダーに基づく変更受付期間の範囲判定。範囲外なら変更希望日受付不可案内_2 → 変更希望日3、範囲内なら変更希望日3 へ直行。"
    conditions:
      - match: "範囲内"
        next: 変更希望日3
      - match: "範囲外"
        next: 変更希望日受付不可案内_2

  - step: 変更希望日受付不可案内_2
    type: announcement
    next: 変更希望日3

  - step: 変更希望日3
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: true
    save_to: changepreferredDate3
    output_format: datetime
    notes: "第3希望。範囲外でも案内を発話したのち 終話分岐_変更 へ進む。"
    next: 変更希望日3_範囲チェック

  - step: 変更希望日3_範囲チェック
    type: script
    script_template: custom
    reference_module: "OpenAI_変更希望日3"
    template_params:
      START_DATE: "{TOMORROW}"
      END_DATE: "{END_PERIOD_DATE}"
    notes: "健診センターの営業日カレンダーに基づく変更受付期間の範囲判定。範囲外なら変更希望日受付不可案内_3 → 終話分岐_変更、範囲内なら 終話分岐_変更 へ直行。"
    conditions:
      - match: "範囲内"
        next: 終話分岐_変更
      - match: "範囲外"
        next: 変更希望日受付不可案内_3

  - step: 変更希望日受付不可案内_3
    type: announcement
    next: 終話分岐_変更

  - step: 終話分岐_変更
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "mobile"
        next: END_変更_SMSあり
      - match: "ip050"
        next: END_変更_SMSあり
      - match: "default"
        next: END_変更_SMSなし

  # ============================================================
  # === キャンセルルート ===
  # ============================================================
  - step: 予約日_キャンセル
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: true
    save_to: reservationDate
    output_format: datetime
    notes: "現在の予約日を聴取。復唱で肯定後に判定。本日→即代表案内、過去→過去案内→キャンセル確認、未来→キャンセル確認。"
    next: 予約日判定_キャンセル

  - step: 予約日判定_キャンセル
    type: script
    script_template: custom
    reference_module: "OpenAI_予約日_キャンセル"
    template_params:
      TODAY_REF: "{TODAY}"
    notes: "営業日カレンダー基準（{TODAY}）で予約日が当日／過去／未来のいずれかを判定。本日（{TODAY}と同一）→ END_代表案内、過去（{TODAY}より前の営業日）→ 予約日過去案内_キャンセル、未来（{TODAY}より後の営業日）→ キャンセル確認。"
    conditions:
      - match: "当日"
        next: END_代表案内
      - match: "過去"
        next: 予約日過去案内_キャンセル
      - match: "未来"
        next: キャンセル確認

  - step: 予約日過去案内_キャンセル
    type: announcement
    next: キャンセル確認

  - step: キャンセル確認
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: cancelConfirmation         # 一時参照用（永続化不要）
    output_format: enum
    output_labels:
      - "全キャンセル"
      - "一部キャンセル"
    notes: "肯定（はい等）→ 全キャンセル → END_キャンセル。否定（いいえ等）→ 一部キャンセル → 変更内容（変更ルート合流）。再確認禁止。"
    conditions:
      - match: "全キャンセル"
        next: END_キャンセル
      - match: "一部キャンセル"
        next: 変更内容

  # ============================================================
  # === 確認ルート ===
  # ============================================================
  - step: 予約日_確認
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: true                    # 年省略時のみ復唱、年明示時は復唱禁止（簡略化のため echo_back: true で運用）
    save_to: reservationDate
    output_format: datetime
    notes: "確認目的のため過去・未来いずれも許容。1.15 の制限事項（過去拒否・本日代表案内）は一切適用しない。再聴取は最大1回。"
    next: 確認内容

  - step: 確認内容
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: details
    output_format: text
    notes: |
      ユーザーの問合せ内容を [対象] + [アクション] の名詞句で抽出（例:「予約日時の確認」「持ち物の確認」）。
      不明瞭な場合はユーザー発話を原文のまま格納。再質問ルール非適用（全件聴取）。再確認禁止。
      AI からの回答・補足・読み上げは一切禁止（システム記録用）。
    next: 終話分岐_確認

  - step: 終話分岐_確認
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "mobile"
        next: END_確認_SMSあり
      - match: "ip050"
        next: END_確認_SMSあり
      - match: "default"
        next: END_確認_SMSなし

  # ============================================================
  # === 終話ブロック ===
  # ============================================================
  - step: END_新規予約_SMSあり
    type: termination
    termination_ref: "END_新規予約_SMSあり"

  - step: END_新規予約_SMSなし
    type: termination
    termination_ref: "END_新規予約_SMSなし"

  - step: END_変更_SMSあり
    type: termination
    termination_ref: "END_変更_SMSあり"

  - step: END_変更_SMSなし
    type: termination
    termination_ref: "END_変更_SMSなし"

  - step: END_確認_SMSあり
    type: termination
    termination_ref: "END_確認_SMSあり"

  - step: END_確認_SMSなし
    type: termination
    termination_ref: "END_確認_SMSなし"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
# customer_doc function の properties から抽出。endpoint / smsFlag は saveCompletionFlag2db のパラメータなので含めない。
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "新規予約"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "確認"
    item_default: true
    editable: true
    deletable: false
    notes: "新規予約／変更／キャンセル／確認の 4 区分"

  - context_name: "callerName"
    context_name_jp: "入電者名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "入電者名（カタカナ）。入電者名聴取サブフローの戻り値を保存。受診者確認＝本人なら patientName と同値。"

  - context_name: "relationship"
    context_name_jp: "受診者確認"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "本人 / 本人でない の判定結果（永続フィールド）"

  - context_name: "patientName"
    context_name_jp: "受診者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "受診者名（カタカナ）。受診者確認＝本人でない場合に受診者名聴取サブフローで上書き。"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "YYYY-MM-DD 00:00 形式。専用フォーマット (2) で復唱必須。"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "10 桁または 11 桁。incoming_phone_number からの自動コピー厳禁。口頭発話＋再確認同意で確定。invalid 2 回目は空文字確定で STEP 6 へ。"

  - context_name: "phone_type"
    context_name_jp: "端末種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "mobile / ip050 / withheld / landline。終話分岐の参照キー。電話番号聴取サブフロー内で判定。"

  - context_name: "phone_number_check"
    context_name_jp: "電話番号有効性"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "valid / invalid。電話番号聴取サブフロー内で判定。"

  - context_name: "history"
    context_name_jp: "予約歴"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "初回 / 2回目以降"

  - context_name: "insuranceAssociation"
    context_name_jp: "健康保険組合"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "団体名（不明・拒否時は「なし」）"

  - context_name: "insuredPerson"
    context_name_jp: "被保険者区分"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "被保険者 / 被扶養者"

  - context_name: "course"
    context_name_jp: "希望コース"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "新規予約のみ格納。変更時は空文字維持（変更後コースは changeDetails に書く）。"

  - context_name: "option"
    context_name_jp: "追加オプション"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "正式名称を「／」連結で格納。子宮がん検診のみ格納可、乳がん検診は「乳腺超音波検査」「マンモグラフィー」のいずれかに置換。否定は「なし」、変更時は空文字。"

  - context_name: "preferredDate1"
    context_name_jp: "受診希望日 第1"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: false
