# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（必須） ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（本フローでは未使用だがデフォルト保持）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（電話番号聴取以外。電話番号は STEP 6 フォールスルー）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系・新規予約 ---
  - name: "END_新規予約_SMSあり"
    condition: "phone_type=mobile/ip050 かつ phone_number_check=valid（新規予約完了）"
    tts_announcement: "新規予約の申し込みを受付いたしました。通話終了後、内容確認用のショートメッセージをお送りします。内容をご確認のうえ、必要に応じて修正をお願いいたします。5営業日前後で折り返しお電話、もしくはショートメールにてご連絡いたします。当院からのご連絡をお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_新規予約_SMSあり"

  - name: "END_新規予約_SMSなし"
    condition: "phone_type=landline/withheld または phone_number_check=invalid（新規予約完了）"
    tts_announcement: "新規予約の申し込みを受付いたしました。5営業日前後で折り返しお電話、もしくはショートメールにてご連絡いたします。当院からのご連絡をお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_新規予約_SMSなし"

  # --- 正常系・変更 ---
  - name: "END_変更_SMSあり"
    condition: "phone_type=mobile/ip050 かつ phone_number_check=valid（変更完了。一部キャンセル合流含む）"
    tts_announcement: "予約変更の申し込みを受付いたしました。通話終了後、内容確認用のショートメッセージをお送りします。内容をご確認のうえ、必要に応じて修正をお願いいたします。3営業日以内に折り返しお電話、もしくはショートメールにてご連絡いたします。当院からのご連絡をお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_変更_SMSあり"

  - name: "END_変更_SMSなし"
    condition: "phone_type=landline/withheld または phone_number_check=invalid（変更完了）"
    tts_announcement: "予約変更の申し込みを受付いたしました。3営業日以内に折り返しお電話、もしくはショートメールにてご連絡いたします。当院からのご連絡をお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_変更_SMSなし"

  # --- 正常系・確認 ---
  - name: "END_確認_SMSあり"
    condition: "phone_type=mobile/ip050 かつ phone_number_check=valid（確認完了）"
    tts_announcement: "確認の申し込みを受付いたしました。通話終了後、内容確認用のショートメッセージをお送りします。内容をご確認のうえ、必要に応じて修正をお願いいたします。必要に応じて担当者より、折り返しお電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "4"
    completion_flag_name: "完了フラグ_確認_SMSあり"

  - name: "END_確認_SMSなし"
    condition: "phone_type=landline/withheld または phone_number_check=invalid（確認完了）"
    tts_announcement: "確認の申し込みを受付いたしました。必要に応じて担当者より、折り返しお電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "4"
    completion_flag_name: "完了フラグ_確認_SMSなし"

  # --- 正常系・キャンセル（phone_type 非依存） ---
  - name: "END_キャンセル"
    condition: "全キャンセル確定（phone_type 不問）"
    tts_announcement: "キャンセルを承りました。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "3"
    completion_flag_name: "完了フラグ_キャンセル"

  # --- 代表案内（当日予約変更／キャンセルの即代表誘導） ---
  - name: "END_代表案内"
    condition: "予約日（変更／キャンセル）が当日 = {TODAY}"
    tts_announcement: "本日のご予約に関するお問い合わせは、代表電話におかけ直しいただき、『3番』、『2番』、の順にお進みください。繰り返します。代表電話におかけ直しいただき、『3番』、『2番』、の順にお進みください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_代表案内"

# smsFlag 分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phone_type"
    - "classification"
  patterns:
    - condition: "phone_type ∈ {mobile, ip050} かつ classification=新規予約"
      sms_flag: "1"
      notes: "END_新規予約_SMSあり"
    - condition: "phone_type ∈ {landline, withheld} または phone_number_check=invalid。classification=新規予約"
      sms_flag: "1"
      notes: "END_新規予約_SMSなし（smsFlag は 1 だが SMS 文言は告知なし）"
    - condition: "phone_type ∈ {mobile, ip050} かつ classification=変更（または一部キャンセル合流）"
      sms_flag: "2"
      notes: "END_変更_SMSあり"
    - condition: "phone_type ∈ {landline, withheld} かつ classification=変更"
      sms_flag: "2"
      notes: "END_変更_SMSなし"
    - condition: "classification=キャンセル かつ 全キャンセル"
      sms_flag: "3"
      notes: "END_キャンセル（phone_type 不問）"
    - condition: "phone_type ∈ {mobile, ip050} かつ classification=確認"
      sms_flag: "4"
      notes: "END_確認_SMSあり"
    - condition: "phone_type ∈ {landline, withheld} かつ classification=確認"
      sms_flag: "4"
      notes: "END_確認_SMSなし"
    - condition: "予約日 = {TODAY}（変更／キャンセル時）"
      sms_flag: "0"
      notes: "END_代表案内（status=2 で smsFlag=0 上書き）"

