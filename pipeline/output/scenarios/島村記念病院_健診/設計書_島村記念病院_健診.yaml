    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 1
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels: ["新規予約", "変更", "キャンセル", "確認"]
    notes: "DTMF 1=新規予約, 2=変更, 3=キャンセル, 4=確認。専用フォーマット (1) で復唱必須。"

  - order: 2
