  - "案内発話判定: 用件確認の echo_back 後、新規予約は当日案内をスキップして直接入電者名聴取へ。変更／キャンセル／確認は当日案内 → 入電者名聴取へ。"
  - "入電者名と受診者名はどちらも氏名聴取サブフローに充当。1 回目は入電者名聴取（callerName + patientName 同時保存）、2 回目は受診者名聴取（patientName のみ上書き、本人でない場合のみ）。"
