# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: '<break time="500ms"/> はじめに、ご用件を次の4つのうちの、いずれかでお話しください。 <break time="150ms"/> 『1番.新規予約』 <break time="500ms"/> 『2番.変更』 <break time="500ms"/> 『3番.キャンセル』 <break time="500ms"/> 『4番.確認』 <break time="200ms"/><dtmf digit="1"/>'
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["新規予約", "変更", "キャンセル", "確認"]
      mapping:
        - input: "DTMF 1 / 「予約」「お薬」「よやく」「しんきよやく」「新規」「しんき」「鍼灸薬」「しんきゅうやく」"
          output: "新規予約"
        - input: "DTMF 2 / 「取り直したい」「取り直す」「別の日に」「変えたい」「変える」「変えて」"
          output: "変更"
        - input: "DTMF 3 / 「やめる」「取り消し」「取り消す」「取消」「やめたい」「経験」「建設」"
          output: "キャンセル"
        - input: "DTMF 4 / 「確かめる」「かくにん」「予約確認」「ようやく」「ようやくび」"
          output: "確認"
      no_result_condition: "上記のいずれにも該当せず判別不能"
    save_to: "classification"
    next_step: "（echo_back 経由でブランチ）"
    retry_failure: "end_failure"
    retry_failure_announcement: '申し訳ございません。もう一度、ご用件を次の4つのうちの、いずれかでお話しください。 <break time="150ms"/> 『1番.新規予約』 <break time="500ms"/> 『2番.変更』 <break time="500ms"/> 『3番.キャンセル』 <break time="500ms"/> 『4番.確認』 <break time="200ms"/><dtmf digit="1"/>'

  - step_name: "受診者確認"
    tts_announcement: "お電話いただいている方は、受診されるご本人様でしょうか？『はい』、または、『いいえ』でお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["本人", "本人でない"]
      mapping:
        - input: "「はい」「ほんにん」「ほんにんです」等の肯定"
          output: "本人"
        - input: "「いいえ」「家族」「代理」「本人ではない」「子ども」「夫」「妻」「母」「父」「息子」「娘」「担当者」「看護師」「職員」"
          output: "本人でない"
      no_result_condition: "判別不能"
    save_to: "relationship"
    next_step: "本人 → 生年月日聴取 / 本人でない → 受診者名聴取"
    retry_failure: "skip"

  - step_name: "予約歴"
    tts_announcement: "当院のご予約は初めてですか？『はい』、または、『いいえ』でお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["初回", "2回目以降"]
      mapping:
        - input: "「はい」等の肯定"
          output: "初回"
        - input: "「いいえ」等の否定"
          output: "2回目以降"
      no_result_condition: "判別不能"
    save_to: "history"
    next_step: "健康保険組合"
    retry_failure: "skip"

  - step_name: "健康保険組合"
    tts_announcement: "ご加入の健康保険組合名をお話しください。わからない場合は『わからない』とお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "団体名（クッション語除外）"
          output: "団体名"
        - input: "「わからない」「ない」「なし」"
          output: "なし"
      no_result_condition: "判別不能（空文字格納）"
    save_to: "insuranceAssociation"
    next_step: "被保険者区分"
    retry_failure: "skip"

  - step_name: "被保険者区分"
    tts_announcement: "受診者様は健康保険の加入のご本人様ですか。はい、または、いいえ、でお答えください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: ["被保険者", "被扶養者"]
      mapping:
        - input: "肯定／本人／被保険者"
          output: "被保険者"
        - input: "否定／本人ではない／被扶養者"
          output: "被扶養者"
      no_result_condition: "判別不能"
    save_to: "insuredPerson"
    next_step: "希望コース"
    retry_failure: "skip"

  - step_name: "希望コース"
    tts_announcement: "受診を希望されるコースや内容をお話しください。どうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "コース類義語の発話"
          output: "【コース・オプション一覧】の正式名称（1.10 のルール参照）"
      no_result_condition: "判別不能（空文字格納）"
    save_to: "course"
    next_step: "追加オプション"
    retry_failure: "skip"

  - step_name: "追加オプション"
