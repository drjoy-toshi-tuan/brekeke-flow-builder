  - "電話番号聴取サブフローの 2 回目 invalid 時は STEP 6（用件別ヒアリング）へフォールスルー。空文字で確定し切断しない（customer_doc 1.6 例外処理）。"
  - "終話時 SMS 文言は phone_type で 2 系統に分岐（mobile/ip050 → SMSあり / landline/withheld → SMSなし）。ただし「キャンセル」のみ phone_type 不問で 1 系統。"
  - "smsFlag は classification 値で確定（1=新規予約 / 2=変更 / 3=キャンセル / 4=確認）。phone_type の影響は受けない。代表案内のみ status=2 で smsFlag=0 に上書き。"
  - "予約日 (1.15) の特殊処理: 当日 = {TODAY} → reservationDate に格納せず即 END_代表案内（status=2 / smsFlag=0）。過去 → 復唱で肯定された場合のみ予約日過去案内 → 再聴取（1 回のみ）。"
  - "予約日 (確認) (1.24) は独立ロジック。過去・未来・本日いずれも許容し代表案内へは飛ばさない。再確認は年省略時のみ（年明示時は禁止）。"
  - "受診希望日範囲チェックは「復唱で肯定」された後に実施。先に範囲判定して再聴取に飛ばさないこと（customer_doc 1.14 の処理フロー厳守）。範囲外時は受診希望日受付不可案内 → 次の希望日へ進む。再聴取は最大 1 回。"
  - "変更希望日範囲チェックも同様。範囲: {TOMORROW}=2026-04-23 〜 {END_PERIOD_DATE}=2027-03-31。"
  - "受診希望日2 / 変更希望日2 で「なし」発話 → 第3 希望をスキップして終話分岐へ直行。第 2 希望が空文字 ('') の場合も同様。"
  - "「肺→はい」救済: 「肺（はい）」「いいです（肯定文脈）」「そう」「あっています」「せいかい」を肯定として扱う。Yes/No 系 OpenAI prompt で明記。"
  - "数字 4/5 誤認識救済: 「for」「C」→ 4、「号」「go」→ 5。生年月日・電話番号・DTMF プロンプトで対応（prompter 担当）。"
  - "「検診」は原則「健診」扱い、ただし「乳がん検診」「子宮がん検診」「子宮頸がん検診」は例外。OpenAI prompt の正規化テーブルに明記。"
  - "コース 33 種・オプション 30 種超は元資料末尾【コース・オプション一覧】を参照（prompter で正規化テーブル化）。course / option は自由文格納（enum なし）。"
  - "再確認厳禁項目（復唱禁止）: 入電者名／受診者名／予約歴／健康保険組合／被保険者・被扶養者／希望コース／追加オプション／女性検診詳細／乳がん検査方法／変更内容／変更コース確認／変更オプション確認／変更希望日有無／変更希望時期／キャンセル確認／確認内容／受診者確認 → 全 hearing ブロック echo_back: false。"
  - "再確認必須項目（echo_back: true）: 用件確認／生年月日（subflow）／電話番号（subflow）／受診希望日 第1-3／変更希望日 第1-3／予約日（変更／キャンセル）。予約日（確認）は条件付き（年省略時のみ復唱、年明示時は禁止 — 簡略化のため echo_back: true で運用し OpenAI で吸収）。"
  - "オプションの一時保持と統合: 女性検診詳細サブフロー中はメモリ保持、全サブフロー抜けたタイミングで option に一括書き込み。「子宮がん検診」「乳がん検診」という名称そのものは option に格納しない（子宮がん検診は格納可、乳がん検診は乳腺超音波検査／マンモグラフィーに置換）。"
  - "コース確認時 course は絶対に更新しない（空文字維持）。変更内容は changeDetails に「変更後コース: 〔名〕」形式で書く。"
  - "オプション確認のキャンセル意図はサブフロー起動禁止（追加・変更先のみ）。"
  - "キャンセル確認否定 → 変更内容（変更ルート合流）。最終 smsFlag は終話分岐_変更 で 2 に確定（一部キャンセル扱い）。"
  - "function スキーマの命名揺れ: 変更希望日は changepreferredDate1/2/3（changeDate1/2/3 は誤）、変更希望時期は reschedulePeriod（changePeriod は誤）、予約歴は history（reservationHistory は誤）、受診者確認は relationship。function 側を正とする。"
  - "endpoint / smsFlag は saveContextModel2DB に含めず saveCompletionFlag2db のパラメータとして扱う。status は STATUS 型として saveContextModel2DB に含める。"
