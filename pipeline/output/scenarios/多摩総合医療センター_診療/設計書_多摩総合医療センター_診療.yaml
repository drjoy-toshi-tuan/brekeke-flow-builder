# =====================================================
# セクション11: 特記事項・制約
# =====================================================
special_notes:
  - "【冒頭2文1セット】「こちらは多摩総合医療センターの、予約専用、AI電話です。」+「紹介状や、診察券をお持ちの方はお手元にご用意ください。」を opening + 冒頭_アナウンス の 2 ブロック 1 セットで配置。冒頭_アナウンス には両方の文をまとめて格納。"
  - "【受付時間】日曜祝日除く月〜土 8:30〜17:00。年末年始（12/28〜1/4）も時間外として扱う（time_judgment は acceptance_times モジュールで包括的に判定）。"
  - "【時間外TTS】WEB フォーム誘導の一文を含む（他院と異なる）。「また当院では、WEBフォームによる初診予約・予約日時の確認・予約キャンセルの申し込みも承っております。ぜひホームページをご覧ください。」を必ず含める。"
  - "【用件 6 分類】Gen1 用件聴取.yaml「セットした用件の分岐」と完全一致（診察/再診/変更/キャンセル/確認/その他）。Gen3 では用件は1回だけ分類し、以降 classification context で制御（Gen1 の用件の分岐_0/1/2/3 を統合）。"
  - "【受診歴確認】用件「診察」直後に挿入。受診歴あり→前回症状確認（再診扱い）/ なし→紹介状聴取（初診扱い）。NO_RESULT は安全側で紹介状聴取（初診扱い）へ。"
  - "【初診紹介状必須】当院は紹介受診重点医療機関。初診で紹介状なし→END_紹介状なし へ強制誘導。"
  - "【診療科受付可否マトリクス】Gen1 main.yaml の診療科の分岐 / 診療科の分岐_1 / 診療科の分岐_2 を完全反映。同じ診療科でも初診/変更キャンセル/再診で誘導先が異なる（女性専用外来は3ルート、救急は3ルートで異なる文言）。"
  - "【初診のみ受付不可診療科】ゲノム/腫瘍/血液/緩和ケア → END_医療連携室 or END_医療連携_FAX（血液内科のみ）。リハビリ/看護外来 → END_初診受付不可。"
  - "【再診のみ代表電話誘導】救急/救命/腫瘍/緩和ケア → END_救急_再診（同一文言）。腫瘍・緩和ケアは初診では医療連携室、再診では代表電話と誘導先が異なる。"
  - "【リウマチ特殊ルート】初診ルートで リウマチ外科 / リウマチ膠原病内科 を選んだ場合、END に飛ばさず紹介元医療機関聴取に直接遷移（Gen1 仕様）。"
  - "【小児科 別機関誘導】初診/再診とも小児総合医療センター・地域医療機関への誘導（END_小児科_別機関）。"
  - "【精神神経科・産婦人科 変更/キャンセル】AI 電話では確定不可。理由のみ聞いて後ほど折返し（変更キャンセル特殊_理由）。「妊婦検診については…」は産婦人科・キャンセルの文脈だが、Gen3 では文言を統一して『この電話では変更やキャンセルできませんが、ご用件を伺って後ほどご連絡いたします。』とする。"
  - "【診察券聴取要否分岐】初診（diagnosticCard 未発行）はスキップ。判定は context_match_router で classification=診察 AND visitHistory=なし のみ jump_診察券番号 をスキップ。それ以外は jump_診察券番号 必須。2 段の context_match_router で実装。"
  - "【phonetype 判定】電話番号聴取サブフローが正規表現で mobile / ip050 / landline / withheld を判定。mobile/ip050→phonetype=1（携帯用終話）、landline/withheld→phonetype=2（固定用終話）。"
  - "【終話 8 パターン】classification × phonetype の 2 段 ContextMatchRouter で 8 分岐（診察予約/予約変更/予約キャンセル/予約確認 × 携帯/固定）。診察と再診はどちらも END_診察予約_xx へ集約（Gen1 の文言「診察予約の申し込みを受付いたしました。」が共通）。"
  - "【期間表現】「本日を含めて3営業日以内」（顧客資料 Gen1 main.yaml「日時確認終話前アナウンス変更」と完全一致）。携帯=「ショートメッセージ」言及あり、固定=言及なし。"
  - "【SMSフラグ割当】受付完了で携帯（phonetype=1）→smsFlag=1（SMS送信あり）、固定（phonetype=2）→smsFlag=-1。誘導系（END_その他案内/医療連携室/初診受付不可/女性専用/救急/小児科/紹介状なし/聴取失敗/時間外/非通知）は全て smsFlag=-1。"
  - "【Gen1→Gen3: status 置換】Gen1 status=0（冒頭/途中切断）は Gen3 では使用禁止のため、誘導系は全て status=2 へ置換。受付完了は status=1。聴取失敗は status=3。時間外は status=6。"
  - "【Gen1→Gen3: checkpoint 機能】Gen1 commubo の checkpoint（受診歴CP_1 等）は Gen3 では context（visitHistory 等）+ context_match_router で代替。"
  - "【Gen1→Gen3: 重複ブロック削除】Gen1 main.yaml の用件の分岐_0/1/2/3 は Gen3 では用件聴取 1 回 + classification context で代替。携帯電話番号チェック_0/1/2/3 は Gen3 の電話番号聴取サブフロー（phonetype 判定込み）で代替。"
  - "【固定発話厳守】冒頭 / 用件聴取 / 各 END_* TTS は Gen1 元資料 yaml の文言と厳密一致で gen_properties に渡すこと。"
  - "【prompter 注意】generate_by_OpenAI プロンプトには『終話アナウンスの出力前は絶対に status / smsFlag に確定値を書き込まない』制約を必ず含める。"

