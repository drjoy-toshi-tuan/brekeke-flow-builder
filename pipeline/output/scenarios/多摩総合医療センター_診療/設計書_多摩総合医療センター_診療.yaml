# 設計書 — 多摩総合医療センター 診療
# 生成元: @director エージェント
# 生成日: 2026-04-27
# 確認レポート: docs/designs/確認レポート_多摩総合医療センター_診療_20260427.md
# 作業種別: Gen1→Gen3 移管
version: "1.0"

# =====================================================
# セクション1: 基本情報
# =====================================================
basic_info:
  facility_name: "多摩総合医療センター"
  scenario_name: "診療"
  group_name: "多摩総合医療センター"
  flow_name: "多摩総合医療センター$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "0423235111"
  business_hours: "日曜祝日除く月〜土 8:30〜17:00（年末年始 12/28〜1/4 休止）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# =====================================================
# セクション2: フロー構成
# =====================================================
flow_structure:
  type: "subflow"
  flows:
    - name: "多摩総合医療センター$診療"
      role: "main"
      description: "多摩総合医療センターの診療予約受付フロー。用件 6 分類（診察/再診/変更/キャンセル/確認/その他）、初診ルートでの紹介状確認、診療科ごとの受付可否マトリクス（医療連携室誘導/予約センター誘導/別機関誘導/代表電話誘導）、再診ルートでの前回症状確認、変更/キャンセルでの理由・予約日聴取、最終的に classification × phonetype の終話 8 分岐を実装する。"
  subflows:
    - name: "多摩総合医療センター$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。patientName を返却。"
    - name: "多摩総合医療センター$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（DOB Re-confirmation 復唱あり）。patientDateOfBirth を返却。"
    - name: "多摩総合医療センター$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー（incoming-classifier + Phone Normalization + 復唱あり）。additionalPhoneNumber と phonetype（1=携帯/ip050、2=その他/landline/withheld）を返却。"
    - name: "多摩総合医療センター$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "サブフロー標準コピー。medicalCardNumber を返却。初診（診察+受診歴なし）はスキップする。"

# =====================================================
# セクション3: フローの目的
# =====================================================
purpose: >
  多摩総合医療センターの外来予約に関する電話を受け、
  診察予約（初診含む）・再診予約・予約変更・予約キャンセル・予約日時確認・その他問合せの 6 用件を分類し、
  受診歴確認・紹介状有無・前回症状・診療科・予約日・理由・患者個人情報を聴取する。
  診療科ごとの受付可否マトリクス（初診不可診療科/AI電話受付不可/別機関誘導/代表電話誘導）に従って終話誘導し、
  受付可な場合は classification × phonetype（携帯/固定）の 2 段分岐で計 8 パターンの終話 TTS を出し分ける。

# =====================================================
# セクション4: シナリオフロー図
# =====================================================
flow_diagrams:
  - flow_name: "多摩総合医療センター$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常 → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → 用件聴取 (enum: 診察/再診/変更/キャンセル/確認/その他)
                                           ├─ 診察 → 受診歴確認 (enum: あり/なし)
                                           │         ├─ あり → 前回症状確認 → 再診_診療科 (enum, 特殊診療科→END_*)
                                           │         │         → default → jump_氏名 → ...
                                           │         └─ なし → 紹介状聴取 (enum: あり/なし)
                                           │                   ├─ なし → END_紹介状なし
                                           │                   └─ あり → 初診_診療科 (enum, 特殊診療科→END_*)
                                           │                              ├─ ゲノム/腫瘍/血液/緩和ケア → END_医療連携室
                                           │                              ├─ リハビリ/看護外来 → END_初診受付不可
                                           │                              ├─ 女性専用外来 → END_女性専用外来_新規
                                           │                              ├─ 救急/救命 → END_救急_代表
                                           │                              ├─ 小児科 → END_小児科_別機関
                                           │                              └─ default(リウマチ含む) → 紹介元医療機関聴取 → 紹介元電話番号聴取 → jump_氏名
                                           ├─ 再診 → 前回症状確認 → 再診_診療科
                                           ├─ 変更 → 変更_診療科 (enum, 精神神経科/産婦人科→特殊_理由)
                                           │         → 変更_理由 → 変更_予約日 → jump_氏名
                                           ├─ キャンセル → キャンセル_診療科 → キャンセル_理由 → キャンセル_予約日 → jump_氏名
                                           ├─ 確認 → 確認_診療科 → jump_氏名
                                           └─ その他 → END_その他案内
                                        共通個人情報聴取(jump_氏名 → jump_生年月日 → jump_電話番号)
                                          → 終話分岐_診察券要否_用件 (classification)
                                              ├─ 診察 → 終話分岐_診察券要否_受診歴 (visitHistory)
                                              │          ├─ なし → 終話分岐_用件 （初診は診察券スキップ）
                                              │          └─ default → jump_診察券番号 → 終話分岐_用件
                                              └─ default → jump_診察券番号 → 終話分岐_用件
                                          → 終話分岐_用件 (classification)
                                              ├─ 診察/再診 → 終話分岐_診察予約_電話種別 → END_診察予約_携帯/固定
                                              ├─ 変更 → 終話分岐_変更_電話種別 → END_予約変更_携帯/固定
                                              ├─ キャンセル → 終話分岐_キャンセル_電話種別 → END_予約キャンセル_携帯/固定
                                              └─ 確認 → 終話分岐_確認_電話種別 → END_予約確認_携帯/固定
    notes: "診療科特殊分岐は hearing.conditions で直接 END_* に飛ばす Pattern A。終話は classification × phonetype の 2 段 ContextMatchRouter（Pattern B）。"

# =====================================================
# セクション4b: シナリオフロー定義（ブロック構成）
# =====================================================
scenario_flow:
  # ---------- 冒頭 ----------
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件聴取

  # ---------- 用件聴取（Pattern A） ----------
  - step: 用件聴取
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "診察"
        next: 受診歴確認
      - match: "再診"
        next: 前回症状確認
      - match: "変更"
        next: 変更_診療科
      - match: "キャンセル"
        next: キャンセル_診療科
      - match: "確認"
        next: 確認_診療科
      - match: "その他"
        next: END_その他案内
      - match: "default"
        next: END_聴取失敗

  # =====================================================
  # 診察ルート（初診 or 受診歴ありの再診）
  # =====================================================
  - step: 受診歴確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: 前回症状確認
      - match: "なし"
        next: 紹介状聴取
      - match: "default"
        next: 紹介状聴取

  - step: 紹介状聴取
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "あり"
        next: 初診_診療科
      - match: "なし"
        next: END_紹介状なし
      - match: "default"
        next: END_聴取失敗

  - step: 初診_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "ゲノム診療科"
        next: END_医療連携室
      - match: "腫瘍内科"
        next: END_医療連携室
      - match: "血液内科"
        next: END_医療連携_FAX
      - match: "緩和ケア内科"
        next: END_医療連携室
      - match: "リハビリテーション科"
        next: END_初診受付不可
      - match: "看護外来"
        next: END_初診受付不可
      - match: "女性専用外来"
        next: END_女性専用外来_新規
      - match: "救急診療科"
        next: END_救急_代表
      - match: "救命・集中治療科"
        next: END_救急_代表
      - match: "小児科"
        next: END_小児科_別機関
      - match: "リウマチ外科"
        next: 紹介元医療機関聴取
      - match: "リウマチ膠原病内科"
        next: 紹介元医療機関聴取
      - match: "default"
        next: 紹介元医療機関聴取

  - step: 紹介元医療機関聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 紹介元電話番号聴取

  - step: 紹介元電話番号聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_氏名

  # =====================================================
  # 再診ルート（再診 or 診察+受診歴あり）
  # =====================================================
  - step: 前回症状確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "同じ"
        next: 再診_診療科
      - match: "違う"
        next: 再診_診療科
      - match: "default"
        next: 再診_診療科

  - step: 再診_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "女性専用外来"
        next: END_女性専用外来_再診
      - match: "救急診療科"
        next: END_救急_再診
      - match: "救命・集中治療科"
        next: END_救急_再診
      - match: "腫瘍内科"
        next: END_救急_再診
      - match: "緩和ケア内科"
        next: END_救急_再診
      - match: "小児科"
        next: END_小児科_別機関
      - match: "default"
        next: jump_氏名

  # =====================================================
  # 変更ルート
  # =====================================================
  - step: 変更_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "精神神経科"
        next: 変更キャンセル特殊_理由
      - match: "産婦人科"
        next: 変更キャンセル特殊_理由
      - match: "女性専用外来"
        next: END_女性専用外来_新規
      - match: "救急診療科"
        next: END_救急_代表
      - match: "default"
        next: 変更_理由

  - step: 変更_理由
    type: hearing
    output_format: text
    retry_failure: skip
    next: 変更_予約日

  - step: 変更_予約日
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: jump_氏名

  # =====================================================
  # キャンセルルート
  # =====================================================
  - step: キャンセル_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "精神神経科"
        next: 変更キャンセル特殊_理由
      - match: "産婦人科"
        next: 変更キャンセル特殊_理由
      - match: "女性専用外来"
        next: END_女性専用外来_新規
      - match: "救急診療科"
        next: END_救急_代表
      - match: "default"
        next: キャンセル_理由

  - step: キャンセル_理由
    type: hearing
    output_format: text
    retry_failure: skip
    next: キャンセル_予約日

  - step: キャンセル_予約日
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: jump_氏名

  # =====================================================
  # 変更/キャンセル特殊（精神神経科・産婦人科は理由のみ後ほど折返し）
  # =====================================================
  - step: 変更キャンセル特殊_理由
    type: hearing
    output_format: text
    retry_failure: skip
    next: jump_氏名

  # =====================================================
  # 確認ルート
  # =====================================================
  - step: 確認_診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "default"
        next: jump_氏名

  # =====================================================
  # 共通 個人情報聴取
  # =====================================================
  - step: jump_氏名
    type: subflow
    flowname: "多摩総合医療センター$氏名聴取"
    next: jump_生年月日

  - step: jump_生年月日
    type: subflow
    flowname: "多摩総合医療センター$生年月日聴取"
    next: jump_電話番号

  - step: jump_電話番号
    type: subflow
    flowname: "多摩総合医療センター$電話番号聴取"
    next: 終話分岐_診察券要否_用件

  # =====================================================
  # 診察券聴取要否分岐（初診=診察+受診歴なし のみスキップ）
  # =====================================================
  - step: 終話分岐_診察券要否_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "診察"
        next: 終話分岐_診察券要否_受診歴
      - match: "default"
        next: jump_診察券番号

  - step: 終話分岐_診察券要否_受診歴
    type: context_match_router
    reference_module: "visitHistory"
    conditions:
      - match: "なし"
        next: 終話分岐_用件
      - match: "default"
        next: jump_診察券番号

  - step: jump_診察券番号
    type: subflow
    flowname: "多摩総合医療センター$診察券番号聴取"
    next: 終話分岐_用件

  # =====================================================
  # 終話分岐（Pattern B: classification × phonetype）
  # =====================================================
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "診察"
        next: 終話分岐_診察予約_電話種別
      - match: "再診"
        next: 終話分岐_診察予約_電話種別
      - match: "変更"
        next: 終話分岐_変更_電話種別
      - match: "キャンセル"
        next: 終話分岐_キャンセル_電話種別
      - match: "確認"
        next: 終話分岐_確認_電話種別
      - match: "default"
        next: END_聴取失敗

  - step: 終話分岐_診察予約_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: END_診察予約_携帯
      - match: "default"
        next: END_診察予約_固定

  - step: 終話分岐_変更_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: END_予約変更_携帯
      - match: "default"
        next: END_予約変更_固定

  - step: 終話分岐_キャンセル_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: END_予約キャンセル_携帯
      - match: "default"
        next: END_予約キャンセル_固定

  - step: 終話分岐_確認_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: END_予約確認_携帯
      - match: "default"
        next: END_予約確認_固定

  # =====================================================
  # 終話ブロック
  # =====================================================
  - step: END_その他案内
    type: termination
    termination_ref: "END_その他案内"

  - step: END_紹介状なし
    type: termination
    termination_ref: "END_紹介状なし"

  - step: END_医療連携室
    type: termination
    termination_ref: "END_医療連携室"

  - step: END_医療連携_FAX
    type: termination
    termination_ref: "END_医療連携_FAX"

  - step: END_初診受付不可
    type: termination
    termination_ref: "END_初診受付不可"

  - step: END_女性専用外来_新規
    type: termination
    termination_ref: "END_女性専用外来_新規"

  - step: END_女性専用外来_再診
    type: termination
    termination_ref: "END_女性専用外来_再診"

  - step: END_救急_代表
    type: termination
    termination_ref: "END_救急_代表"

  - step: END_救急_再診
    type: termination
    termination_ref: "END_救急_再診"

  - step: END_小児科_別機関
    type: termination
    termination_ref: "END_小児科_別機関"

  - step: END_診察予約_携帯
    type: termination
    termination_ref: "END_診察予約_携帯"

  - step: END_診察予約_固定
    type: termination
    termination_ref: "END_診察予約_固定"

  - step: END_予約変更_携帯
    type: termination
    termination_ref: "END_予約変更_携帯"

  - step: END_予約変更_固定
    type: termination
    termination_ref: "END_予約変更_固定"

  - step: END_予約キャンセル_携帯
    type: termination
    termination_ref: "END_予約キャンセル_携帯"

  - step: END_予約キャンセル_固定
    type: termination
    termination_ref: "END_予約キャンセル_固定"

  - step: END_予約確認_携帯
    type: termination
    termination_ref: "END_予約確認_携帯"

  - step: END_予約確認_固定
    type: termination
    termination_ref: "END_予約確認_固定"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

# =====================================================
# セクション5: コンテキストフィールド一覧
# =====================================================
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - { id: "1", order: "1", value: "診察" }
      - { id: "2", order: "2", value: "再診" }
      - { id: "3", order: "3", value: "変更" }
      - { id: "4", order: "4", value: "キャンセル" }
