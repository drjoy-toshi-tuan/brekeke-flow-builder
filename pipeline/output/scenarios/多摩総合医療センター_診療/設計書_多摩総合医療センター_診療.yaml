  - name: "END_時間外"
    condition: "受付時間外（年末年始 12/28-1/4 含む）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、日曜祝日を除く、月曜日から土曜日の8時30分から17時となっております。恐れ入りますが、受付時間内におかけ直しください。また当院では、WEBフォームによる初診予約・予約日時の確認・予約キャンセルの申し込みも承っております。ぜひホームページをご覧ください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（システム的聴取失敗）"
