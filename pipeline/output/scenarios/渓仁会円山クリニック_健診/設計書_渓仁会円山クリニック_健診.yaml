# ============================================================

# ==========================================================
# 1. 基本情報
# ==========================================================
basic_info:
  facility_name: "渓仁会円山クリニック"
  group_name: "渓仁会円山クリニック"
  flow_name: "渓仁会円山クリニック$健診"
  flow_type: "subflow"
  work_type: "gen2_migration"
  base_file: "docs/migration/gen2_渓仁会円山クリニック_健診.md"
  source_doc: "docs/reference/customer_docs/【健診1】：渓仁会円山クリニック.md"
  target_env: "デモ"
  environment: "demo"
  office_id: ""  # Dr.JOY管理画面で確認（設計書・JSON不要）
  phone_number: "011-611-7766"
  business_hours: "月〜土 8:30〜17:00"
  flow_purpose: "渓仁会円山クリニック 健診専用 AI電話応対フロー。受診者の個人情報（氏名・生年月日・連絡先）を聴取した上で、予約／変更／キャンセル／問い合わせの4用件に振り分け、Dr.JOY連携する。"
  retry_count_default: 1  # 「再度伺います」は各聴取1回（用件のみ2回、電話番号のみ3回）

# ==========================================================
# 1b. フローの目的
# ==========================================================
purpose: |
  渓仁会円山クリニック 健診専用のAI電話応対フロー。
  受診者からの電話を受け、個人情報（氏名・生年月日・連絡先）を聴取した上で、
  予約／予約変更／予約キャンセル／予約内容の確認 の4用件に振り分ける。
  聴取内容は Dr.JOY と連携し、担当者が3診療日以内に折り返し対応する。
  RAGサブフローでFAQ対応も行う（Pattern 3）。

# ==========================================================
# 2. フロー構成
# ==========================================================
flow_structure:
  structure_type: "サブフロー分割型"
  subflows:
    - name: "氏名聴取"
      flowname: "渓仁会円山クリニック$氏名聴取"
      listening_items: ["氏名"]
      echo_back: false
      termination: "return"
      notes: "OpenAI未経由のためsave2db側でcontextName必須。元資料『受診者名の確認は一度だけ行い、再度受診者名を聞かない。復唱確認禁止』に従い復唱なし。"
    - name: "生年月日聴取"
      flowname: "渓仁会円山クリニック$生年月日聴取"
      listening_items: ["生年月日"]
      echo_back: true
      termination: "return"
      notes: "復唱あり（元資料『生年月日復唱：1回「yyyy年m月d日でよろしいですか？」』）。2桁元号判定あり。"
    - name: "電話番号聴取"
      flowname: "渓仁会円山クリニック$電話番号聴取"
      listening_items: ["電話番号"]
      echo_back: true
      termination: "return"
      notes: "冒頭に incoming-classifier を配置し、携帯→復唱確認→肯定で確定、固定電話/その他→直接聴取→復唱確認。否定時は直接聴取にフォールバック。最大3回リトライ。"
    - name: "RAG検索"
      flowname: "渓仁会円山クリニック$RAG検索"
      listening_items: ["問合せ内容のFAQ応答"]
      echo_back: false
      termination: "return"
      notes: "Pattern 3（Gen2→Gen3デフォルト）。共通_最後の問い合わせ直後・END_通常直前に配置し、reasonをFAQ検索する。"

# ==========================================================
# 3. 成果物スコープ
# ==========================================================
deliverable_scope:
  flow_json: true
  properties: true
  other: ""

# ==========================================================
# 4a. 冒頭チェーン設定
# ==========================================================
flow_config:
  use_acceptance_times: true
  opening_tts: "冒頭_アナウンス"

# ==========================================================
# 4b. シナリオフロー（ブロック単位）
# ==========================================================
scenario_flow:

  # --- 冒頭 ---
  - step: "冒頭"
    type: "opening"
    use_acceptance_times: true
    next: "冒頭_アナウンス"

  # --- 冒頭アナウンス ---
  - step: "冒頭_アナウンス"
    type: "announcement"
    prompt: "お電話ありがとうございます。渓仁会円山クリニックの健診専用、AI電話です。初めに、受診される方のお名前、生年月日、ご連絡先をお伺いします。"
    next: "jump_氏名聴取"

  # --- 個人情報聴取サブフロー ---
  - step: "jump_氏名聴取"
    type: "subflow"
    flowname: "渓仁会円山クリニック$氏名聴取"
    next: "jump_生年月日聴取"

  - step: "jump_生年月日聴取"
    type: "subflow"
    flowname: "渓仁会円山クリニック$生年月日聴取"
    next: "jump_電話番号聴取"

  - step: "jump_電話番号聴取"
    type: "subflow"
    flowname: "渓仁会円山クリニック$電話番号聴取"
    next: "用件選択"

  # --- 用件選択 ---
  - step: "用件選択"
    type: "hearing"
    prompt: "それではご用件を次の4つのうちのいずれかでお話ください。1.健診の予約。2.予約の変更。3.予約のキャンセル。4.予約内容の確認。それではお話ください。"
    output_format: "enum"
    save_to: "classification"
    echo_back: false
    retry_max: 2
    retry_failure: "確認_お問い合わせ"  # 元資料「リトライ超過時: 確認_お問い合わせ」
    conditions:
      - match: "予約"
        next: "予約_受診歴確認"
      - match: "変更"
        next: "変更_予約日"
      - match: "キャンセル"
        next: "キャンセル_予約日"
      - match: "問い合わせ"
        next: "確認_お問い合わせ"
    notes: |
      DTMF対応: 1=予約, 2=変更, 3=キャンセル, 4=問い合わせ。
      特殊キーワード:
        「健診」: 検針/返信/天候診断/返金控寸断/検診/妊娠の予約（※乳がん/子宮がん/子宮頸がん検診は除外）
        「予約」: 薬/お薬
        「変更」: 取り直したい/取り直す/別の/変えたい/変える/変えて
        「キャンセル」: やめる/取り消し/取り消す/取消/やめたい

  # ========== 予約ルート ==========
  - step: "予約_受診歴確認"
    type: "hearing"
    prompt: "当院への受診歴はありますか？"
    output_format: "enum"
    save_to: "Medical_history"
    echo_back: false
    conditions:
      - match: "あり"
        next: "予約_企業名"
      - match: "なし"
        next: "予約_企業名"
    notes: "肯定→『あり』、否定→『なし』を格納。いずれも次は企業名へ。"

  - step: "予約_企業名"
    type: "hearing"
    prompt: "お勤めされている方は企業名をお話ください。そうではない方は、特にない、のようにお話ください。"
    output_format: "text"
    save_to: "company_name"
    echo_back: false
    next: "予約_受診希望コース"

  - step: "予約_受診希望コース"
    type: "hearing"
    prompt: "ご希望のメニューを次の3つのうちのいずれかでお話ください。人間ドック。生活習慣病健診。定期健診。それでは、お話ください。"
    output_format: "enum"
    save_to: "course"
    echo_back: false
    conditions:
      - match: "人間ドック"
        next: "予約_予約希望時期"
      - match: "生活習慣病健診"
        next: "予約_予約希望時期"
      - match: "定期健診"
        next: "予約_予約希望時期"
    notes: |
      特殊キーワード:
        「人間ドック」: 人間ロック/ドック/ロック/人間独/人間/ドック
        「生活習慣病健診」: 生活/週間/習慣
        「定期健診」: 定期/提示

  - step: "予約_予約希望時期"
    type: "hearing"
    prompt: "ご希望の予約日や希望時期を、4月1日、や、4月上旬、のようにお話ください。なお、本日から3週間以降の予約を受け付けております。"
    output_format: "text"
    save_to: "Preferred_date"
    echo_back: false
    next: "共通_最後の問い合わせ"

  # ========== 変更ルート ==========
  - step: "変更_予約日"
    type: "hearing"
    prompt: "次に現在の予約日を、4月1日、のように日付でお話ください。"
    output_format: "datetime"
    save_to: "reservationDate"
    echo_back: false
    next: "変更_変更項目"
    notes: "datetime形式で格納。10月〜12月入電時の1〜9月日付は翌年、それ以外は当年を自動補完。"

  - step: "変更_変更項目"
    type: "hearing"
    prompt: "変更される内容を、次の3つのうちの、いずれかでお話ください。オプション変更。日程変更。それ以外の変更。それではお話ください。"
    output_format: "enum"
    save_to: "change_item"
    echo_back: false
    conditions:
      - match: "オプション変更"
        next: "変更_内容確認_オプション"
      - match: "日程変更"
        next: "変更_予約希望時期"
      - match: "それ以外の変更"
        next: "変更_内容確認_その他"
    notes: |
      特殊キーワード:
        「日程変更」: 予約日/日時/日付/日程/時間/スケジュール等の日時関連
        「オプション変更」: 内容/コース/オプション/受診内容等の変更
      不正時デフォルト: 「それ以外の変更」として扱う。

  - step: "変更_内容確認_オプション"
    type: "hearing"
    prompt: "変更されたいオプション名をお話ください。"
    output_format: "text"
    save_to: "reason"
    echo_back: false
    next: "共通_最後の問い合わせ"

  - step: "変更_予約希望時期"
    type: "hearing"
    prompt: "受診を希望される日にちを、4月1日、のように日付でお話ください。"
    output_format: "text"
    save_to: "Preferred_date"
    echo_back: false
    next: "共通_最後の問い合わせ"

  - step: "変更_内容確認_その他"
    type: "hearing"
    prompt: "変更されたい内容をお話しください。"
    output_format: "text"
    save_to: "reason"
    echo_back: false
    next: "共通_最後の問い合わせ"

  # ========== キャンセルルート ==========
  - step: "キャンセル_予約日"
    type: "hearing"
    prompt: "次に現在の予約日を、4月1日、のように日付でお話ください。"
    output_format: "datetime"
    save_to: "reservationDate"
    echo_back: false
    next: "キャンセル_予約希望時期"
    notes: "datetime形式で格納。"

  - step: "キャンセル_予約希望時期"
    type: "hearing"
    prompt: "ご希望の予約日や希望時期を、4月1日、や、4月上旬、のようにお話ください。ない場合は、ありません、とお話しください。"
    output_format: "text"
    save_to: "Preferred_date"
    echo_back: false
    next: "共通_最後の問い合わせ"

  # ========== 確認ルート ==========
  - step: "確認_お問い合わせ"
    type: "hearing"
    prompt: "確認したい内容をお話ください。"
    output_format: "text"
    save_to: "reason"
    echo_back: false
    next: "共通_最後の問い合わせ"

  # ========== 共通ラスト ==========
  - step: "共通_最後の問い合わせ"
    type: "hearing"
    prompt: "そのほかに何かお問い合わせは有りませんか？"
    output_format: "text"
    save_to: "reason"
    echo_back: false
    next: "jump_RAG検索"
    notes: |
      「なし」「ない」「ありません」「大丈夫です」「いいえ」「いえ」「けっこう」「もう大丈夫」「質問ありません」「いいえありません」「もうありません」等の否定回答時は『なし』を格納。

  - step: "jump_RAG検索"
    type: "subflow"
    flowname: "渓仁会円山クリニック$RAG検索"
    next: "END_通常"
    notes: "RAG Pattern 3（Gen2→Gen3デフォルト）。reasonをFAQ検索し、該当回答があれば返答、なければ『ご質問いただいた内容は、AI電話ではお答えできません。』を発話。"

  # ========== 終話ブロック ==========
  - step: "END_通常"
    type: "termination"
    termination_ref: "END_通常"

# ==========================================================
# 4c. シナリオフロー図（ASCII）
# ==========================================================
flow_diagrams:
  - flow_name: "渓仁会円山クリニック$健診"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知 → 切断
              └─ 通常 → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外(TTS) → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス(TTS)
                                        → jump_氏名聴取(subflow)
                                        → jump_生年月日聴取(subflow)
                                        → jump_電話番号聴取(subflow)
                                        → 用件選択(聴取: DTMF+音声/enum)
                                            ├─ 予約 → 予約_受診歴確認(聴取) → 予約_企業名(聴取)
                                            │          → 予約_受診希望コース(聴取) → 予約_予約希望時期(聴取)
                                            │          → 共通_最後の問い合わせ(聴取)
                                            ├─ 変更 → 変更_予約日(聴取/datetime) → 変更_変更項目(聴取/enum)
                                            │          ├─ オプション変更 → 変更_内容確認_オプション(聴取)
                                            │          ├─ 日程変更 → 変更_予約希望時期(聴取)
                                            │          └─ それ以外の変更 → 変更_内容確認_その他(聴取)
                                            │          → 共通_最後の問い合わせ(聴取)
                                            ├─ キャンセル → キャンセル_予約日(聴取/datetime)
                                            │          → キャンセル_予約希望時期(聴取)
                                            │          → 共通_最後の問い合わせ(聴取)
                                            └─ 問い合わせ → 確認_お問い合わせ(聴取)
                                                       → 共通_最後の問い合わせ(聴取)
                                        → jump_RAG検索(subflow)
                                        → END_通常(TTS) → 完了フラグ_通常(status=1, sms=1) → 切断
    notes: "Gen2→Gen3移管。個人情報聴取（氏名・生年月日・電話番号）はサブフロー分割。RAGはPattern 3で終話直前に配置。"

# ==========================================================
# 5. コンテキストフィールド（saveContextModel2DB）
# ==========================================================
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - value: "予約"
      - value: "変更"
      - value: "キャンセル"
      - value: "問い合わせ"
      - value: "無回答"
    notes: "Gen2 function enum 踏襲。"

  - context_name: "patientName"
    context_name_jp: "受診者氏名"
    display_type: "TEXT"
    range_values: []
    notes: "フルカタカナで格納。"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    notes: "復唱あり。和暦対応（大正/昭和/平成/令和）。"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    notes: "10桁（市外局番始まり、携帯プレフィックス不可）/11桁（携帯プレフィックス必須）で検証。"

  - context_name: "Medical_history"
    context_name_jp: "受診歴"
    display_type: "TEXT"
    range_values: []
    notes: "『あり』『なし』のいずれかを格納。"

  - context_name: "company_name"
    context_name_jp: "企業名"
    display_type: "TEXT"
    range_values: []
    notes: "Gen2 function では \"company name\"（スペース含む）だが、Gen3では snake_case の company_name に統一。"

  - context_name: "course"
    context_name_jp: "受診希望コース"
    display_type: "TEXT"
    range_values: []
    notes: "『人間ドック』『生活習慣病健診』『定期健診』のいずれかを格納。"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    notes: "yyyy-MM-dd 00:00:00 形式。"

  - context_name: "Preferred_date"
    context_name_jp: "予約希望時期"
    display_type: "TEXT"
    range_values: []

  - context_name: "change_item"
    context_name_jp: "変更項目"
    display_type: "TEXT"
    range_values: []
    notes: "『オプション変更』『日程変更』『それ以外の変更』のいずれかを格納。"

  - context_name: "reason"
    context_name_jp: "問い合わせ内容／最後の質問"
    display_type: "TEXT"
    range_values: []
    notes: "Gen2『reasonは上書き禁止』ルールはGen3のsaveContext2DB（上書き）で実現困難。Gen3では最終値を保持するデフォルト動作。"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values: []
    notes: "Gen3標準。1=未処理, 2=代表案内, 3=聴取失敗, 6=時間外, 7=非通知。"

# ==========================================================
# 6. 聴取項目一覧
# ==========================================================
