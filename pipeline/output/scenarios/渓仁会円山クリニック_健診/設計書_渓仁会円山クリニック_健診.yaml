# ==========================================================
# 13. director 判断ログ
# ==========================================================
director_log:

  - decision: "status値のGen2→Gen3マッピング"
    choice: "Gen2 '0'→Gen3 '3'(聴取失敗)、Gen2 '1'→Gen3 '1'(未処理/通話完了)、Gen2 '2'→Gen3 '2'(代表案内) として対応"
    reason: "Gen3の許容値は 1/2/3/6/7/8/9 のみ（0/5 は禁止）。Gen2のstatus='0'（冒頭切断・途中切断）はGen3の聴取失敗(3)に集約される。"

  - decision: "endpoint/smsFlag を saveContextModel2DB から除外"
    choice: "saveContextModel2DB には含めず、saveCompletionFlag2db の各終話パラメータとして設定"
    reason: "CLAUDE.md Gen2→Gen3マッピングルール準拠。"

  - decision: "company_name のフィールド名"
    choice: "Gen2 'company name'（スペース含む）→Gen3 'company_name'（snake_case）に統一"
    reason: "Gen3のcontextNameはスペースを含まないsnake_case/camelCaseが標準。"

  - decision: "代表電話着信時の冒頭短縮アナウンスの扱い"
    choice: "全着信で通常アナウンス（『お電話ありがとうございます〜』）に統一。短縮版は廃止"
    reason: "Gen3のincoming-classifierは着信番号ベースの個別分岐に対応しないため、Gen2の条件分岐をGen3で再現できない。冗長さは許容範囲。"

  - decision: "RAGパターン選定"
    choice: "pattern=3（共通_最後の問い合わせ直後・END_通常直前に挿入）"
    reason: "Gen2→Gen3移管のデフォルト（CLAUDE.md Rule 16）。reasonのFAQ検索を終話直前で行う構造が自然。"

  - decision: "氏名聴取の復唱なし"
    choice: "echo_back=false"
    reason: "元資料『受診者名の確認は一度だけ行い、再度受診者名を聞かない。復唱確認禁止』の明示指示。"

  - decision: "予約日(reservationDate)の output_format"
    choice: "datetime"
    reason: "Gen2 function では DATE 型。Gen3ではdatetimeで格納（yyyy-MM-dd 00:00:00）。"

  - decision: "予約希望時期(Preferred_date)の output_format"
    choice: "text"
    reason: "元資料で『4月1日』『4月上旬』等の曖昧表現を許容する明示。text形式で自然言語保存が妥当。"

  - decision: "用件選択リトライ超過時の遷移先"
    choice: "確認_お問い合わせ（リトライ超過時のみ）"
    reason: "元資料『リトライ超過時: 確認_お問い合わせ』の明示指示を踏襲。"
