# ==========================================================
# 10. 特記事項・制約
# ==========================================================
special_notes:
  - "代表電話（011-611-7766）からの着信時は『お電話ありがとうございます。渓仁会円山クリニックの健診専用、AI電話です』を省略して『初めに、』から発話する元資料の仕様は、Gen3のincoming-classifierでは着信番号ベースの分岐ができないため、全着信で通常アナウンス（『お電話ありがとうございます。〜』）に統一する。"
  - "Gen2『聴取内容の再質問・復唱禁止（氏名含む）』ルールはGen3でも踏襲。氏名聴取サブフローの復唱なし設定はこのため。"
  - "Gen2『複数情報を一度に発話された場合、既に伝えられた情報は聞き直さない』ルールはGen3のフロー構造上、各ステップで独立して聴取するため厳密な再現は困難。OpenAI正規化プロンプトで『直前の発話から抽出可能な情報は抽出する』旨の指示を含める。"
  - "連絡先電話番号3回リトライ失敗→END_聴取失敗3回（代表電話案内、status=2）はサブフロー内で完結する。Gen3のCustom Jump to Flowアーキテクチャではサブフロー→親フローの分岐シグナルが出せないため、サブフロー内で TTS→saveCompletionFlag2db(status=2)→Disconnect を配置する。Brekeke IVR UI で手動配置が必要（confirmation_items 参照）。"
  - "Gen2『reason 上書き禁止』ルール（既存値を保持）はGen3のsaveContext2DBで厳密実現困難。Gen3では最終聴取値を保持する標準動作で運用。問い合わせ内容の蓄積が必要な場合は別途検討。"
  - "reservationDate（変更・キャンセルの予約日）は datetime 出力、Preferred_date（予約希望時期）は text 出力（『4月上旬』等の曖昧表現も受け入れるため）。"
  - "用件選択はDTMF+音声の併用（Gen2『<dtmf digit=\"1\" />』踏襲）。1=予約, 2=変更, 3=キャンセル, 4=問い合わせ。"

