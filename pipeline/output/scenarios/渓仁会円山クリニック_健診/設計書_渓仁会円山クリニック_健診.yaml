# ==========================================================
# 6b. ステップ詳細（step_details）
# ==========================================================
step_details:

  - step_name: "用件選択"
    tts_announcement: "それではご用件を次の4つのうちのいずれかでお話ください。1.健診の予約。2.予約の変更。3.予約のキャンセル。4.予約内容の確認。それではお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "問い合わせ"
      mapping:
        - input: "DTMF 1 または 予約／健診／お薬／検診／検針／返信／天候診断／妊娠の予約 等"
          output: "予約"
        - input: "DTMF 2 または 変更／取り直したい／取り直す／別の／変えたい／変える／変えて 等"
          output: "変更"
        - input: "DTMF 3 または キャンセル／やめる／取り消し／取り消す／取消／やめたい 等"
          output: "キャンセル"
        - input: "DTMF 4 または 確認／問い合わせ 等"
          output: "問い合わせ"
      no_result_condition: "上記いずれにも該当しない、または無音"
    save_to: "classification"
    next_step: "（enum分岐: 予約→予約_受診歴確認／変更→変更_予約日／キャンセル→キャンセル_予約日／問い合わせ→確認_お問い合わせ）"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約_受診歴確認"
    tts_announcement: "当院への受診歴はありますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "はい／ある／ございます／受診したことがある 等の肯定"
          output: "あり"
        - input: "いいえ／ない／ございません／受診したことがない 等の否定"
          output: "なし"
      no_result_condition: "上記いずれにも該当しない、または無音"
    save_to: "Medical_history"
    next_step: "予約_企業名"
    retry_failure: "skip"

  - step_name: "予約_企業名"
    tts_announcement: "お勤めされている方は企業名をお話ください。そうではない方は、特にない、のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "発話された企業名（自由テキスト）／特にない／ない"
          output: "発話内容をそのまま格納（text）"
      no_result_condition: "無音"
    save_to: "company_name"
    next_step: "予約_受診希望コース"
    retry_failure: "skip"

  - step_name: "予約_受診希望コース"
    tts_announcement: "ご希望のメニューを次の3つのうちのいずれかでお話ください。人間ドック。生活習慣病健診。定期健診。それでは、お話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "人間ドック"
        - "生活習慣病健診"
        - "定期健診"
      mapping:
        - input: "人間ドック／人間ロック／ドック／ロック／人間独／人間 等"
          output: "人間ドック"
        - input: "生活習慣病健診／生活／習慣／週間 等"
          output: "生活習慣病健診"
        - input: "定期健診／定期／提示 等"
          output: "定期健診"
      no_result_condition: "上記いずれにも該当しない、または無音"
    save_to: "course"
    next_step: "予約_予約希望時期"
    retry_failure: "skip"

  - step_name: "予約_予約希望時期"
    tts_announcement: "ご希望の予約日や希望時期を、4月1日、や、4月上旬、のようにお話ください。なお、本日から3週間以降の予約を受け付けております。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日付表現（4月1日／4月上旬／来週 等）"
          output: "発話内容をそのまま格納（text）"
      no_result_condition: "無音"
    save_to: "Preferred_date"
    next_step: "共通_最後の問い合わせ"
    retry_failure: "skip"

  - step_name: "変更_予約日"
    tts_announcement: "次に現在の予約日を、4月1日、のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日付表現（4月1日 等の具体的な日付）"
          output: "yyyy-MM-dd 00:00:00 形式に正規化"
      no_result_condition: "日付として解釈不能、または無音"
    save_to: "reservationDate"
    next_step: "変更_変更項目"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "変更_変更項目"
    tts_announcement: "変更される内容を、次の3つのうちの、いずれかでお話ください。オプション変更。日程変更。それ以外の変更。それではお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "オプション変更"
        - "日程変更"
        - "それ以外の変更"
      mapping:
        - input: "オプション変更／オプション／内容／コース／受診内容 等"
          output: "オプション変更"
        - input: "日程変更／日程／予約日／日時／日付／時間／スケジュール 等"
          output: "日程変更"
        - input: "それ以外の変更／その他 等、もしくは分類不能"
          output: "それ以外の変更"
      no_result_condition: "上記いずれにも該当しない場合は『それ以外の変更』として扱う"
    save_to: "change_item"
    next_step: "（enum分岐: オプション変更→変更_内容確認_オプション／日程変更→変更_予約希望時期／それ以外の変更→変更_内容確認_その他）"
    retry_failure: "skip"

  - step_name: "変更_内容確認_オプション"
    tts_announcement: "変更されたいオプション名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "発話されたオプション名（自由テキスト）"
          output: "発話内容をそのまま格納（text）"
      no_result_condition: "無音"
    save_to: "reason"
    next_step: "共通_最後の問い合わせ"
    retry_failure: "skip"

  - step_name: "変更_予約希望時期"
    tts_announcement: "受診を希望される日にちを、4月1日、のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日付表現（4月1日 等）"
          output: "発話内容をそのまま格納（text）"
      no_result_condition: "無音"
    save_to: "Preferred_date"
    next_step: "共通_最後の問い合わせ"
    retry_failure: "skip"

  - step_name: "変更_内容確認_その他"
    tts_announcement: "変更されたい内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "発話された変更内容（自由テキスト）"
          output: "発話内容をそのまま格納（text）"
      no_result_condition: "無音"
    save_to: "reason"
    next_step: "共通_最後の問い合わせ"
    retry_failure: "skip"

  - step_name: "キャンセル_予約日"
    tts_announcement: "次に現在の予約日を、4月1日、のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日付表現（4月1日 等の具体的な日付）"
          output: "yyyy-MM-dd 00:00:00 形式に正規化"
      no_result_condition: "日付として解釈不能、または無音"
    save_to: "reservationDate"
    next_step: "キャンセル_予約希望時期"
    retry_failure: "skip"

  - step_name: "キャンセル_予約希望時期"
    tts_announcement: "ご希望の予約日や希望時期を、4月1日、や、4月上旬、のようにお話ください。ない場合は、ありません、とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日付表現／ありません／ない 等"
          output: "発話内容をそのまま格納（text）"
      no_result_condition: "無音"
    save_to: "Preferred_date"
    next_step: "共通_最後の問い合わせ"
    retry_failure: "skip"

  - step_name: "確認_お問い合わせ"
    tts_announcement: "確認したい内容をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "発話された問い合わせ内容（自由テキスト）"
          output: "発話内容をそのまま格納（text）"
      no_result_condition: "無音"
    save_to: "reason"
    next_step: "共通_最後の問い合わせ"
    retry_failure: "skip"

  - step_name: "共通_最後の問い合わせ"
    tts_announcement: "そのほかに何かお問い合わせは有りませんか？"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "発話された追加の質問内容（自由テキスト）"
          output: "発話内容をそのまま格納（text）"
        - input: "なし／ない／ありません／大丈夫です／いいえ／いえ／けっこう／もう大丈夫／質問ありません 等の否定"
          output: "『なし』を格納"
      no_result_condition: "無音"
    save_to: "reason"
    next_step: "jump_RAG検索"
    retry_failure: "skip"

# ==========================================================
# 7. 終話パターン
# ==========================================================
termination_patterns:

  - name: "END_通常"
    condition: "全ての正常ルート完了後"
    tts_announcement: "携帯電話の方には、通話終了後、今、お話頂いた内容のショートメールが届きますので、必ずご確認をお願いいたします。担当者が3診療日以内にお電話またはショートメールにてご連絡いたします。確認後、予約内容の確定となりますので、それまで登録内容に変更はございません。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_通常"

  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "申し訳ございません。当院では非通知でのお電話はお受けしておりません。番号通知設定をしてお掛け直しいただくか、代表電話、011-611-7766までお電話ください。お電話ありがとうございました。それでは失礼いたします。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
    notes: "Gen2 に非通知ハンドリングなし。Gen3デフォルトで追加。"

  - name: "END_時間外"
    condition: "acceptance_times 判定で営業時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間は月曜日から土曜日、8時半から17時となっております。時間内に改めてお掛け直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
    notes: "Gen2 に時間外ハンドリングなし。Gen3デフォルトで追加。"

  - name: "END_聴取失敗"
    condition: "主要聴取のリトライ上限到達（共通）"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話、011-611-7766へおかけ直しください。なお、ガイダンスの、1番の1、を選択してください。受付時間は、月曜日から土曜日の8時半から17時となっております。電話番号は、011-611-7766です。お電話ありがとうございました。それでは失礼いたします。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

# ==========================================================
# 7b. TTSモジュール一覧（tts_modules）
# ==========================================================
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内"
    announcement: "お電話ありがとうございます。渓仁会円山クリニックの健診専用、電話です。初めに、受診される方のお名前、生年月日、ご連絡先をお伺いします。"

  - module_name: "END_非通知"
    purpose: "非通知着信アナウンス"
    announcement: "申し訳ございません。当院では非通知でのお電話はお受けしておりません。番号通知設定をしてお掛け直しいただくか、代表電話、011-611-7766までお電話ください。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_時間外"
    purpose: "営業時間外アナウンス"
    announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間は月曜日から土曜日、8時半から17時となっております。時間内に改めてお掛け直しください。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_聴取失敗"
    purpose: "リトライ上限到達アナウンス"
    announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話、011-611-7766へおかけ直しください。なお、ガイダンスの、1番の1、を選択してください。受付時間は、月曜日から土曜日の8時半から17時となっております。電話番号は、011-611-7766です。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_通常"
    purpose: "正常完了アナウンス"
    announcement: "携帯電話の方には、通話終了後、今、お話頂いた内容のショートメールが届きますので、必ずご確認をお願いいたします。担当者が3診療日以内にお電話またはショートメールにてご連絡いたします。確認後、予約内容の確定となりますので、それまで登録内容に変更はございません。お電話ありがとうございました。それでは失礼いたします。"

# ==========================================================
# 8. 復唱モジュール（Re-confirmation）
# ==========================================================
echo_back_items:
  - hearing_item: "生年月日聴取（サブフロー内）"
    confirmation_type: "date_of_birth"
    prompt: "{#data#} でよろしいですか？"
    on_affirmative_next: "メインフロー戻り"
    on_negative_next: "生年月日再聴取"
    notes: "サブフロー内で処理。肯定→return、否定→再聴取（最大1回）。"

  - hearing_item: "電話番号聴取（サブフロー内）"
    confirmation_type: "telephone"
    prompt: "電話番号は、{#data#} でよろしいでしょうか。"
    on_affirmative_next: "メインフロー戻り"
    on_negative_next: "電話番号再聴取（直接聴取パス）"
    notes: "携帯着信時は incoming_phone_number を復唱、固定/その他は聴取した番号を復唱。"

