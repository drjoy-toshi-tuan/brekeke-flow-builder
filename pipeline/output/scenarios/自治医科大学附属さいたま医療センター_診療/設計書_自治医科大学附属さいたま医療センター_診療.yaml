# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。自治医科大学附属さいたま医療センターの、外来予約専用、AI電話です。"
    input_method: "none"
    save_to: null
    next_step: "用件_聴取"
    retry_failure: "skip"

  - step_name: "用件_聴取"
    tts_announcement: "ご用件を、次の4つのうちの、いずれかでお話ください。1.外来診察の予約を取る、2.外来予約を変更する、3.外来予約をキャンセルする、4.外来予約を確認する。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "再診"
        - "初診"
        - "変更"
        - "キャンセル"
        - "確認"
