# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "自治医科大学附属さいたま医療センター$診療"
      role: "main"
      description: "冒頭チェーン → 用件聴取（5値、DTMF1=再診/2=変更/3=キャンセル/4=確認、初診は音声のみ、echo_back）→ 用件別聴取 → 個人情報4サブフロー → 用件別終話。再診/初診は診療科聴取（4親+30単独+対象外2、二段聴取あり）。初診のみ紹介状聴取・医師名聴取あり。変更/キャンセルは予約種別→予約日→診察分岐→医師名or予約時間→理由聴取。確認は確認内容聴取のみ。"
  subflows:
    - name: "自治医科大学附属さいたま医療センター$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピー。フロー名プレフィックスのみ施設名に置換。"
    - name: "自治医科大学附属さいたま医療センター$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。"
    - name: "自治医科大学附属さいたま医療センター$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー。"
    - name: "自治医科大学附属さいたま医療センター$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。"

# --- セクション3: フローの目的 ---
purpose: "自治医科大学附属さいたま医療センターの患者からの電話を受け、用件（再診予約/初診予約/予約変更/予約キャンセル/予約確認の5種）を聴取し、用件別に必要情報（紹介状有無/診療科/予約種別/予約日/医師名or予約時間/理由/予約日都合/個人情報）を聴取して折り返し受付を自動化する。新規（初診）患者は紹介状必須、診療科は4親エンティティ+30単独診療科（救急科・病理診断科は対象外）。聴取失敗時は代表電話 048-647-4898（初診紹介の場合は 048-788-2788）への案内を行う。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "自治医科大学附属さいたま医療センター$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
            └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times)
                  ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                  └─ 受付可 → 冒頭_アナウンス
                        → 用件_聴取(hearing, enum 5値, echo_back: true)
                            ├─ 再診 → 診療科_聴取
                            ├─ 初診 → 紹介状_聴取
                            │           ├─ あり → 診療科_聴取
                            │           └─ other(=なし) → END_紹介状なし
                            ├─ 変更 → 予約種別_聴取
                            ├─ キャンセル → 予約種別_聴取
                            ├─ 確認 → 予約確認内容_聴取
                            └─ other → 予約確認内容_聴取(safety net)

      ★再診/初診ルート（共通）:
        診療科_聴取(hearing, enum, echo_back: false, no_result_default: 登録なし)
            ├─ 呼吸器 → 診療科_呼吸器二択(echo_back: true)
            ├─ 消化器 → 診療科_消化器二択(echo_back: true)
            ├─ 脳神経 → 診療科_脳神経二択(echo_back: true)
            ├─ 産婦人科 → 診療科_産婦人科二択(echo_back: true)
            ├─ 救急科 → END_対象外診療科
            ├─ 病理診断科 → END_対象外診療科
            ├─ わからない → 診療科後ルーター
            └─ other(=単独診療科, echo_back: true で復唱) → 診療科後ルーター

        診療科_{呼吸器/消化器/脳神経/産婦人科}二択 → 診療科後ルーター(共通合流)

        診療科後ルーター(CMR on 用件_聴取)
            ├─ 初診 → 医師名_聴取_初診(text)
            └─ other(=再診) → 予約日都合_聴取_予約

        医師名_聴取_初診 → 予約日都合_聴取_予約 → ★共通jump

      ★変更/キャンセル ルート（共通モジュール）:
        予約種別_聴取(hearing, enum 2値: 診察/診察以外, echo_back: true)
            └─ 全分岐 → 予約日_聴取
        予約日_聴取(hearing, datetime, DTMF 4桁並走)
            → 診察分岐_予約種別(CMR on 予約種別_聴取)
                ├─ 診察 → 医師名_聴取_変更キャンセル(text)
                └─ other(=診察以外) → 予約時間_聴取(text)
        医師名_聴取_変更キャンセル / 予約時間_聴取 → 用件分岐_理由

        用件分岐_理由(CMR on 用件_聴取)
            ├─ 変更 → 変更理由_聴取(text) → 予約日都合_聴取_変更(text) → ★共通jump
            ├─ キャンセル → キャンセル理由_聴取(text) → ★共通jump
            └─ other → キャンセル理由_聴取(safety net)

      ★確認ルート:
        予約確認内容_聴取(text) → ★共通jump

      ★共通jump（全用件で合流）:
        Jump to 診察券番号聴取SF
          → Jump to 氏名聴取SF
            → Jump to 生年月日聴取SF
              → Jump to 電話番号聴取SF
                → 終話分岐_用件(CMR on 用件_聴取)
                    ├─ 再診 → 完了フラグ_再診予約(status=1, smsFlag=1) → END_再診予約 → 切断
                    ├─ 初診 → 完了フラグ_初診予約(status=1, smsFlag=1) → END_初診予約 → 切断
                    ├─ 変更 → 完了フラグ_予約変更(status=1, smsFlag=1) → END_予約変更 → 切断
                    ├─ キャンセル → 完了フラグ_予約キャンセル(status=1, smsFlag=2) → END_予約キャンセル → 切断
                    ├─ 確認 → 完了フラグ_予約確認(status=1, smsFlag=1) → END_予約確認 → 切断
                    └─ other → 完了フラグ_予約確認(safety net) → END_予約確認 → 切断
    notes: |
      - acceptance_times 使用（祝日・年末年始(12/26〜1/4)除く 月〜金 9:00〜16:00）。詳細スケジュールは Dr.JOY 側で設定。
      - 用件聴取は DTMF 1=再診 / 2=変更 / 3=キャンセル / 4=確認 並走。初診は音声のみ（「初めて」「紹介状」等で OpenAI 判定）。echo_back: true で 5 種それぞれの復唱文言を生成。
      - 紹介状有無聴取は初診ルートのみ。「紹介状なし」→ END_紹介状なし（紹介状を準備して再度お電話）。
      - 診療科聴取は二段ハイラルキ（4 親 + 30 単独 + 対象外 2）。親エンティティ（呼吸器/消化器/脳神経/産婦人科）発話 → 各子診療科 hearing で内/外科 or 産科/婦人科 確定（echo_back: true）。中黒入り正式表記（耳鼻咽喉・頭頸部外科 / 一般・消化器外科）は OpenAI が正規化。
      - 対象外診療科（救急科・病理診断科）→ END_対象外診療科。
      - 変更/キャンセルルートは予約種別（診察/診察以外）→ 予約日 → 診察分岐CMR → 医師名(診察) or 予約時間(診察以外) → 用件分岐CMR → 変更理由 or キャンセル理由 へ。変更ルートのみ予約日都合聴取あり（Gen1 main.yaml 準拠）。
      - 失敗時は寛容モード（retry_failure: skip）。用件聴取・診療科聴取（親）のみ end_failure → END_聴取失敗（両番号案内文言）。
      - 個人情報 4 サブフロー（診察券番号/氏名/生年月日/電話番号）は CLAUDE.md Rule 9 準拠でサンプル BIVR から完全コピー。
      - 終話分岐は CMR on 用件_聴取 で 5 ルート（再診/初診/変更/キャンセル/確認）に振り分け、それぞれ専用 TTS + status/smsFlag を設定。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ====== 冒頭ブロック ======
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件_聴取

  # ====== 用件聴取（5値、DTMF 1〜4 並走、echo_back あり）======
  - step: 用件_聴取
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "再診"
        next: 診療科_聴取
      - match: "初診"
        next: 紹介状_聴取
      - match: "変更"
        next: 予約種別_聴取
      - match: "キャンセル"
        next: 予約種別_聴取
      - match: "確認"
        next: 予約確認内容_聴取
      - match: "other"
        next: 予約確認内容_聴取

  # ====== 紹介状有無（初診ルートのみ）======
  - step: 紹介状_聴取
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "あり"
        next: 診療科_聴取
      - match: "other"
        next: END_紹介状なし

  # ====== 診療科聴取（親、再診/初診共通）======
  - step: 診療科_聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: end_failure
    conditions:
      - match: "呼吸器"
        next: 診療科_呼吸器二択
      - match: "消化器"
        next: 診療科_消化器二択
      - match: "脳神経"
        next: 診療科_脳神経二択
      - match: "産婦人科"
        next: 診療科_産婦人科二択
      - match: "救急科"
        next: END_対象外診療科
      - match: "病理診断科"
        next: END_対象外診療科
      - match: "わからない"
        next: 診療科後ルーター
      - match: "other"
        next: 診療科後ルーター

  # ====== 子診療科 hearing 群（echo_back: true で復唱）======
  - step: 診療科_呼吸器二択
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "呼吸器内科"
        next: 診療科後ルーター
      - match: "other"
        next: 診療科後ルーター

  - step: 診療科_消化器二択
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "消化器内科"
        next: 診療科後ルーター
      - match: "other"
        next: 診療科後ルーター

  - step: 診療科_脳神経二択
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "脳神経内科"
        next: 診療科後ルーター
      - match: "other"
        next: 診療科後ルーター

  - step: 診療科_産婦人科二択
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "産科"
        next: 診療科後ルーター
      - match: "other"
        next: 診療科後ルーター

  # ====== 診療科後ルーター（再診 vs 初診 で医師名聴取の有無を分岐）======
  - step: 診療科後ルーター
    type: context_match_router
    reference_module: "用件_聴取"
    conditions:
      - match: "初診"
        next: 医師名_聴取_初診
      - match: "other"
        next: 予約日都合_聴取_予約

  # ====== 初診ルート: 医師名聴取 ======
  - step: 医師名_聴取_初診
    type: hearing
    output_format: text
    retry_failure: skip
    next: 予約日都合_聴取_予約

  # ====== 再診/初診共通: 予約日都合聴取 ======
  - step: 予約日都合_聴取_予約
    type: hearing
    output_format: text
    retry_failure: skip
    next: 診察券番号聴取

  # ====== 変更/キャンセル ルート: 予約種別聴取 ======
  - step: 予約種別_聴取
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "診察"
        next: 予約日_聴取
      - match: "other"
        next: 予約日_聴取

  - step: 予約日_聴取
    type: hearing
    output_format: datetime
    retry_failure: skip
    next: 診察分岐_予約種別

  - step: 診察分岐_予約種別
    type: context_match_router
    reference_module: "予約種別_聴取"
    conditions:
      - match: "診察"
        next: 医師名_聴取_変更キャンセル
      - match: "other"
        next: 予約時間_聴取

  - step: 医師名_聴取_変更キャンセル
    type: hearing
    output_format: text
    retry_failure: skip
    next: 用件分岐_理由

  - step: 予約時間_聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 用件分岐_理由

  - step: 用件分岐_理由
    type: context_match_router
    reference_module: "用件_聴取"
    conditions:
      - match: "変更"
        next: 変更理由_聴取
      - match: "キャンセル"
        next: キャンセル理由_聴取
      - match: "other"
        next: キャンセル理由_聴取

  - step: 変更理由_聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 予約日都合_聴取_変更

  - step: キャンセル理由_聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 診察券番号聴取

  - step: 予約日都合_聴取_変更
    type: hearing
    output_format: text
    retry_failure: skip
    next: 診察券番号聴取

  # ====== 確認ルート ======
  - step: 予約確認内容_聴取
    type: hearing
    output_format: text
    retry_failure: skip
    next: 診察券番号聴取

  # ====== 個人情報 4 サブフロー（全用件共通の合流ポイント）======
  - step: 診察券番号聴取
    type: subflow
    flowname: "自治医科大学附属さいたま医療センター$診察券番号聴取"
    next: 氏名聴取

  - step: 氏名聴取
    type: subflow
    flowname: "自治医科大学附属さいたま医療センター$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "自治医科大学附属さいたま医療センター$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "自治医科大学附属さいたま医療センター$電話番号聴取"
    next: 終話分岐_用件

  # ====== 終話分岐（用件 5 値で振り分け）======
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "用件_聴取"
    conditions:
      - match: "再診"
        next: END_再診予約
      - match: "初診"
        next: END_初診予約
      - match: "変更"
        next: END_予約変更
      - match: "キャンセル"
        next: END_予約キャンセル
      - match: "確認"
        next: END_予約確認
      - match: "other"
        next: END_予約確認

  # ====== 終話ブロック ======
  - step: END_紹介状なし
    type: termination
    termination_ref: "END_紹介状なし"

  - step: END_対象外診療科
    type: termination
    termination_ref: "END_対象外診療科"

  - step: END_再診予約
    type: termination
    termination_ref: "END_再診予約"

  - step: END_初診予約
    type: termination
    termination_ref: "END_初診予約"

  - step: END_予約変更
    type: termination
    termination_ref: "END_予約変更"

  - step: END_予約キャンセル
    type: termination
    termination_ref: "END_予約キャンセル"

  - step: END_予約確認
    type: termination
    termination_ref: "END_予約確認"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "再診予約"
      - id: "2"
        order: "2"
        value: "初診予約"
      - id: "3"
        order: "3"
        value: "予約変更"
      - id: "4"
        order: "4"
