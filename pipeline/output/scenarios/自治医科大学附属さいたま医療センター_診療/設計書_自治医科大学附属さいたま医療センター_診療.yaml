# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "再診"
      - "初診"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "DTMF 1=再診, 2=変更, 3=キャンセル, 4=確認。初診は音声のみ（「初めて」「紹介状」「新規」等で OpenAI 判定）。echo_back: true で 5 種それぞれの復唱文言を生成（再診のご予約ですね？/初診のご予約ですね？/予約の変更ですね？/予約のキャンセルですね？/予約確認ですね？）。"

  - order: 2
    name: "紹介状_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "referralLetter"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "DTMF 1=あり, 2=なし。初診ルートのみ。なしの場合は END_紹介状なし へ。"

  - order: 3
