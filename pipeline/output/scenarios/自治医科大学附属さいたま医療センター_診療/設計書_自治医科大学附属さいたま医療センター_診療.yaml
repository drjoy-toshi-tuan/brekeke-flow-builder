  - order: 9
    name: "予約日都合_聴取_予約"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inconvenientDates"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "再診/初診ルート共通。「ありません」発話で空保存。曜日・時間帯の自由テキスト。5 秒無言で打ち切り。"

  - order: 10
    name: "予約種別_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "reservationType"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "診察"
      - "診察以外"
    notes: "変更/キャンセルルート共通。DTMF 1=診察, 2=診察以外。echo_back: true で復唱。診察以外には CT/MRI/PET-CT/採血/内視鏡/透析/化学療法/手術/処置/眼科検査/採尿/超音波/点滴/注射/心電図/脳波/放射線/輸血/薬/入院/骨密度/RI/アレルギー/栄養指導 等 30+ サブカテゴリが含まれる（context は「診察以外」フラグのみ保存し、サブカテゴリは保存しない）。"

  - order: 11
    name: "予約日_聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
