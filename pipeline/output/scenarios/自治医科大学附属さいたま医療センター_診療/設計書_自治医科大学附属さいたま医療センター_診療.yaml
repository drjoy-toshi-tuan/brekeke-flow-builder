# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "申し訳ございません。電話番号が非通知設定の場合、AI電話では受付できません。先頭に数字の186を付けておかけなおしください。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（祝日・年末年始(12/26〜1/4)含む）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、土曜、日曜、祝日、年末年始を除く、月曜日から金曜日の9時から16時となっております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件聴取・診療科聴取）"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、コールセンターへおかけ直しください。受付時間は、土日祝日を除く、月曜日から金曜日の9時から16時となっております。電話番号がわかる方は、お電話をお切りください。お分かりにならない場合はこの後ご案内いたしますので、メモをご用意ください。電話番号は初診紹介受診の方は、048-788-2788、それ以外の方は、048-647-4898、です。繰り返します。電話番号は初診紹介受診の方は、048-788-2788、それ以外の方は、048-647-4898、です。電話番号は初診紹介受診の方は、048-788-2788、それ以外の方は、048-647-4898、です。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 案内系（紹介状なし / 対象外診療科）---
  - name: "END_紹介状なし"
    condition: "初診ルートで紹介状なし"
