# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "自治医科大学附属さいたま医療センター"
  scenario_name: "診療"
  group_name: "自治医科大学附属さいたま医療センター"
  flow_name: "自治医科大学附属さいたま医療センター$診療"
  target_facility: "自治医科大学附属さいたま医療センター"
