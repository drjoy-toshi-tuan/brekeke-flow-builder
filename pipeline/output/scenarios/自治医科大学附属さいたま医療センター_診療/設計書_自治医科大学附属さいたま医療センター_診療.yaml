    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_紹介状なし"

  - name: "END_対象外診療科"
    condition: "診療科聴取で救急科・病理診断科を選択"
    tts_announcement: "申し訳ございません。救急科、病理診断科については、AI電話では受付できません。恐れ入りますが、コールセンターへおかけ直しください。電話番号は、048-647-4898、です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_対象外診療科"

  # --- 正常系（用件 5 値別）---
  - name: "END_再診予約"
    condition: "再診ルート全聴取完了"
    tts_announcement: "再診予約の申し込みを受付いたしました。平日2日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
