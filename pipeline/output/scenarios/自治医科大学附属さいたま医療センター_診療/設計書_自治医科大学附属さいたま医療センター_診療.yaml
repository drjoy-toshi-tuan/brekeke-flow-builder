      - "耳鼻咽喉・頭頸部外科"
      - "循環器内科"
      - "小児科"
      - "小児外科"
      - "小児眼科"
      - "小児耳鼻科"
      - "小児泌尿器科"
      - "消化器内科"
      - "心臓血管外科"
      - "腎臓内科"
      - "整形外科"
      - "総合診療科"
      - "透析"
      - "内分泌代謝科"
      - "入院準備外来"
