# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 (commubo) → Gen3 移管。元資料は commubo抽出/【055】自治医科大学附属さいたま医療センター/【0053自治医科大学附属さいたま医療センター】診療1_M_本番/ 配下の main.yaml + サブ yaml 11 本。"
  - "施設正式名称は「自治医科大学附属さいたま医療センター」(漢字 18 文字、URL エンコード後 group_name 安全圏内)。"
  - "用件 5 値（再診/初診/変更/キャンセル/確認）の DTMF 並走: 1=再診, 2=変更, 3=キャンセル, 4=確認。初診は音声のみ（Gen1 では 1 で「診察予約」を確定し後段で初再診を二段聴取していたが、Gen3 では用件 hearing 1 本で 5 値判定に集約 — 移管ノート判断）。"
  - "用件 hearing は echo_back: true で 5 種それぞれの復唱文言を生成（再診/初診/変更/キャンセル/確認）。Pattern A（hearing の出力で直接フロー分岐）。"
  - "紹介状有無聴取は初診ルートのみ。なし → END_紹介状なし（紹介状を準備して再度お電話）。Gen1 信州大・徳島大・岐阜大では新規予約は AI 受付不可だったが、自治医ではフロー残存。"
  - "診療科聴取は二段ハイラルキ（4 親 + 30 単独 + 対象外 2）。親エンティティ（呼吸器/消化器/脳神経/産婦人科）発話 → 各子診療科 hearing で内/外科 or 産科/婦人科 を確定（echo_back: true）。Gen1 北里大・信州大・岐阜大より分岐が少なく、CT/MRI レーンも無い。"
  - "中黒入り正式表記の正規化（OpenAI で吸収）: 耳鼻咽喉・頭頸部外科 / 一般・消化器外科。元資料 entity_openai_synonyms.md の「耳鼻咽喉頭頸部外科 → 耳鼻咽喉・頭頸部外科」「一般消化器外科 → 一般・消化器外科」変換ルールを反映。"
  - "対象外診療科（救急科・病理診断科）→ END_対象外診療科。代表電話 048-647-4898 案内 TTS。"
  - "失敗時は寛容モード（retry_failure: skip）。用件_聴取・診療科_聴取（親）の 2 つのみ end_failure → END_聴取失敗 へ。"
  - "END_聴取失敗 の TTS は「初診紹介の方は 048-788-2788、それ以外は 048-647-4898」と両番号を 3 回繰り返し案内（Gen1 「初再診不明：失敗時アナウンス」をそのまま採用、3 系統使い分け→1 系統集約）。"
  - "Gen1 は失敗時 3 系統文言（初診=048-788-2788 / 初診以外=048-647-4898 / 不明=両番号）を使い分けていたが、scaffold の retry_failure: end_failure は 1 種類しか終話を指せないため、最も安全な「両番号案内」に集約。3 系統使い分けが必要なら CMR で再分岐する後続改修課題（NON-BLOCKER N-1）。"
  - "再診ルートと初診ルートの違いは医師名聴取の有無のみ（Gen1 main.yaml 用件分岐_1 の「新規→次へ_3医師名 / デフォルト→次へ_2予約日都合」を再現）。"
  - "再診/初診ルートでは予約種別・予約日聴取は行わない（Gen1 main.yaml 準拠）。聴取するのは診療科 → (医師名_初診のみ) → 予約日都合 → 個人情報。実用シナリオ的には予約日聴取がないため、折り返し時の確認情報が少ない可能性あり（NON-BLOCKER N-2、CS 要望次第で再診/初診ルートにも予約種別・予約日を追加可）。"
  - "変更ルートのみ予約日都合聴取あり（Gen1 用件分岐_2 デフォルト=変更 → 次へ_2 予約日都合経路を再現）。キャンセル/確認は予約日都合聴取なし。"
  - "個人情報サブフロー（診察券番号/氏名/生年月日/電話番号）は CLAUDE.md Rule 9 準拠で docs/reference/bivr/samples/json/*.json を完全コピー。フロー名プレフィックスのみ施設名に置換。"
  - "電話番号聴取は復唱あり版（生年月日聴取と同じ）。AI レーンのみ（WEB レーンなし）。"
  - "Gen1 「稼働日前アナウンス」（5/19 9:00 開始）は再現せず（移管ノート判断: 起草日 5/1、Gen3 投入が 5/19 以降にずれる前提 — NON-BLOCKER N-3）。"
  - "Gen1 「年末年始アナウンス」（12/26〜1/4 専用 TTS、体調不良受診先 048-647-2111 を案内）は再現せず（END_時間外 に集約 — NON-BLOCKER N-4）。Dr.JOY 側 acceptance_times の祝日・年末年始期間設定で時間外扱いとする。"
  - "TTS は {tts_g:...}（小文字、Google）デフォルト。SSML 禁止。Gen1 の <? $予約日の読み ?> 等の変数記法は Gen3 では <% var %> に変換（必要箇所のみ、現状本設計書では使用なし）。"
  - "電話番号復唱は <speak type=\"telephone\" breakc=\"300ms\"> SSML 例外を保持可（電話番号聴取サブフロー内、CLAUDE.md 規定）。"
  - "DTMF 4 桁並走（予約日聴取の月+日）は datetime 変換ロジックで吸収。過去日付なら +1 年で確定。"
  - "予約種別「診察以外」は CT/MRI/PET-CT/採血/内視鏡/透析/化学療法/手術/処置/眼科検査/超音波/点滴/注射/心電図/脳波/放射線/輸血/薬/入院 等 30+ サブカテゴリを含むが、context は「診察以外」フラグのみ保存（サブカテゴリ詳細は保存しない）。"

