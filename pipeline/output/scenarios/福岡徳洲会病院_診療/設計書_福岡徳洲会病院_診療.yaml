# 設計書 -- 福岡徳洲会病院 診療
# 生成元: @director エージェント
# 生成日: 2026-05-01
# 元資料: commubo抽出/【052】福岡徳洲会病院/【0077福岡徳洲会病院】診療1_M_本番/
# 移管ノート: docs/migration/gen1_福岡徳洲会病院_診療.md
# 作業種別: Gen1→Gen3 移管
# 備考: 徳洲会グループ「診療」シナリオ 4 施設目（湘南藤沢/八尾/札幌 起草済）。
#       八尾と同じく **新規予約フローを持たない**（用件 3 分岐: 変更 / キャンセル / 確認）。
#       新規（DTMF 4）は専用 termination「新規予約は受付できません、代表電話へ」案内。
#       診療科聴取は厚みあり（分岐あり診療科 = 呼吸器・脳神経・産婦人科の内/外/科分岐）。

version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "福岡徳洲会病院"
  scenario_name: "診療"
  group_name: "福岡徳洲会病院"
  flow_name: "福岡徳洲会病院$診療"
  target_facility: "福岡徳洲会病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "092-573-6622"
  business_hours: "祝日除く、月〜金 8:00〜20:00"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# CLAUDE.md Rule 9 準拠: 個人情報聴取（氏名/生年月日/電話番号/診察券番号）は静的サブフロー JSON を完全コピー。
# フロー名プレフィックスのみ「福岡徳洲会病院$」に置換。構造・接続・スクリプトの変更は禁止。
flow_structure:
  type: "subflow"
  flows:
    - name: "福岡徳洲会病院$診療"
      role: "main"
      description: |
        冒頭チェーン → 用件聴取（変更/キャンセル/確認/新規）
          → 新規 → END_新規受付不可
          → 変更/キャンセル/確認 → 診療科聴取（分岐あり診療科は内/外/科を再聴取）
            → 用件別聴取（追加診療科 → 予約日 → 理由 → 変更希望日 / 確認_内容）
              → 個人情報サブフロー連鎖（診察券→氏名→生年月日→電話番号）
                → 用件別終話（変更/キャンセル/確認 で TTS 冒頭文言が異なる）

  subflows:
    - name: "福岡徳洲会病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的JSONコピー。「わからない」分岐あり"

    - name: "福岡徳洲会病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的JSONコピー。Gen1 仕様: 氏名は復唱しない"

    - name: "福岡徳洲会病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的JSONコピー。和暦/西暦判定 + DOB Re-confirmation あり"

    - name: "福岡徳洲会病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的JSONコピー。incoming-classifier→携帯確認/連絡先聴取→Phone Normalization→復唱確認→携帯判別→結果返却"

# --- セクション3: フローの目的 ---
purpose: |
  福岡徳洲会病院の予約専用 AI 電話に着信した患者から、用件（変更/キャンセル/確認）と
  診療科・予約情報・個人情報（診察券・氏名・生年月日・連絡先）を聴取し、
  3 診療日以内の折り返し受付を自動化する。新規予約・健康診断・歯科口腔外科・リハビリ科・
  ペインクリニックは AI 電話受付対象外であり、各専用案内に誘導して終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "福岡徳洲会病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2) → 切断
              └─ 通常   → 営業時間判定(date_of_call_classifier: 平日8〜20時 + 祝日/年末年始除外)
                            ├─ 時間外 → END_時間外(TTS) → 完了フラグ_時間外(status=6) → 切断
                            └─ 受付可 → 冒頭_アナウンス(TTS=「お電話ありがとうございます。福岡徳洲会病院の、予約専用、AI電話です。」)

      ─── 用件聴取 ───
      冒頭_アナウンス → 用件聴取(TTS、DTMF 1=変更/2=キャンセル/3=確認/4=新規)
        → OpenAI_用件聴取（echo_back=true で復唱確認）
            ├─ 変更       → 診療科聴取
            ├─ キャンセル → 診療科聴取
            ├─ 確認       → 診療科聴取
            ├─ 新規       → END_新規受付不可
            └─ NO_RESULT  → リトライ → 上限到達 → END_聴取失敗

      ─── 診療科聴取（enum、no_result_default=登録なし、echo_back=true）───
      診療科聴取 → OpenAI_診療科聴取
        ├─ 健康診断             → END_健康診断代表案内
        ├─ 歯科口腔外科         → END_転送案内_歯科口腔外科リハビリ
        ├─ リハビリテーション科 → END_転送案内_歯科口腔外科リハビリ
        ├─ ペインクリニック     → END_麻酔科代表電話案内
        ├─ 呼吸器               → 呼吸器分岐確認（内科/外科を再聴取）
        ├─ 脳神経               → 脳神経分岐確認（内科/外科を再聴取）
        ├─ 産婦人科             → 産婦人科分岐確認（産科/婦人科を再聴取）
        └─ other（通常科 30+ / 登録なし） → 追加診療科聴取

      ─── 分岐確認サブステップ（呼吸器/脳神経/産婦人科）───
      呼吸器分岐確認(TTS=「呼吸器内科と呼吸器外科の、どちらですか?」)
        → OpenAI_呼吸器分岐確認 (echo_back=true)
            ├─ 呼吸器内科 / 呼吸器外科 → 追加診療科聴取
            └─ other（否定）          → 用件聴取（再開）
      脳神経分岐確認・産婦人科分岐確認も同様（産婦人科は産科/婦人科）。

      ─── 追加診療科聴取（全用件共通、フリーテキスト保存）───
      追加診療科聴取(TTS=「他に診療科があればおっしゃってください。ない場合は、ありません、とおっしゃってください。」)
        → OpenAI_追加診療科聴取（output_format=text、reason 系コンテキストへ保存）
            → 用件分岐_次（ContextMatchRouter on classification）
                ├─ 確認                → 確認_内容聴取
                └─ other（変更/キャンセル）→ 予約日聴取

      ─── 確認ルート ───
      確認_内容聴取(TTS=「ご確認内容についてお伺いします。」, output_format=text)
        → サブフロー連鎖（診察券→氏名→生年月日→電話番号）→ END_受付完了_確認

      ─── 変更/キャンセルルート ───
      予約日聴取(TTS=「現在の予約日を「4月1日」のように日付でお話ください。」, output_format=datetime)
        → 用件分岐_理由（ContextMatchRouter on classification）
            ├─ 変更       → 理由_変更(TTS=「変更の理由をおっしゃってください。」, text)
            │                  → 変更希望日聴取(TTS=「予約希望日をおっしゃってください。」, datetime)
            │                       → サブフロー連鎖 → END_受付完了_変更
            └─ other（キャンセル）→ 理由_キャンセル(TTS=「キャンセルの理由をおっしゃってください。」, text)
                                       → サブフロー連鎖 → END_受付完了_キャンセル

      ─── サブフロー連鎖（変更/キャンセル/確認 共通） ───
      jump_診察券番号聴取
        → jump_氏名聴取
          → jump_生年月日聴取
            → jump_電話番号聴取
              → 用件分岐_終話(ContextMatchRouter on classification)
                  ├─ 変更       → END_受付完了_変更
                  ├─ キャンセル → END_受付完了_キャンセル
                  └─ other（確認）→ END_受付完了_確認

      ─── 終話パターン（status / smsFlag）───
      END_受付完了_変更        : status=1, smsFlag=1
      END_受付完了_キャンセル  : status=1, smsFlag=1
      END_受付完了_確認        : status=1, smsFlag=1
      END_新規受付不可         : status=2, smsFlag=-1
      END_転送案内_歯科口腔外科リハビリ : status=2, smsFlag=-1
      END_麻酔科代表電話案内   : status=2, smsFlag=-1
      END_健康診断代表案内     : status=2, smsFlag=-1
      END_非通知               : status=2, smsFlag=-1
      END_時間外               : status=6, smsFlag=-1
      END_聴取失敗             : status=2, smsFlag=-1

    notes: |
      - 八尾徳洲会と同様に新規予約フローは持たない。新規発話は END_新規受付不可 へ流す。
      - 用件 3 つ（変更/キャンセル/確認）の終話 TTS は冒頭文言が異なるが「3 診療日以内の折り返し」部分は完全一致。
        携帯/固定で TTS 分岐させる方式（札幌・湘南藤沢式）は採用しない。
      - 分岐あり診療科（呼吸器・脳神経・産婦人科）は echo_back=true で内/外/科を再聴取し、否定で用件聴取に戻す。
      - 確認用件では予約日・理由・変更希望日をスキップし、追加診療科聴取後に確認_内容聴取（フリーテキスト）を挟む。
      - 営業時間判定は date_of_call_classifier で「祝日除く + 12/26〜1/4 年末年始除外 + 平日 8:00〜20:00」を判定。
        年末年始の専用 TTS は元資料に記載があるが、Gen3 では一旦 END_時間外 に集約する（NON-BLOCKER で要確認）。

  - flow_name: "福岡徳洲会病院$診察券番号聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピー。
      フロー名プレフィックスのみ「福岡徳洲会病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "「わからない」分岐あり。8 桁以内の数字 or DTMF 受付。Gen1 元資料も同等仕様"

  - flow_name: "福岡徳洲会病院$氏名聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。
      フロー名プレフィックスのみ「福岡徳洲会病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "復唱なし。Gen1 元資料も同等仕様"

  - flow_name: "福岡徳洲会病院$生年月日聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー。
      フロー名プレフィックスのみ「福岡徳洲会病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "和暦/西暦自動判定 + DOB Re-confirmation あり。DTMF 8 桁西暦も受付。Gen1 元資料も同等仕様"

  - flow_name: "福岡徳洲会病院$電話番号聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。
      フロー名プレフィックスのみ「福岡徳洲会病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "incoming-classifier→携帯確認/連絡先聴取→Phone Normalization→復唱確認→携帯判別→結果返却"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭（opening + 冒頭_アナウンス は 2 ブロック 1 セット必須）---
  - step: 冒頭
    type: opening
    use_acceptance_times: false       # 受付時間判定は date_of_call_classifier ブロックで実施
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 営業時間判定

  # --- 営業時間 + 祝日 + 年末年始判定（カレンダー Script + date_of_call_classifier 相当）---
  # 元資料 時間判断.yaml の「祝日チェック → 年末年始(12/26〜1/4) → 平日 8〜20 時」相当を表現する。
  # 平日 8〜20 時の判定は business_hours Script テンプレートで実装する（カレンダー必須 = director.md 準拠）。
  - step: 営業時間判定
    type: script
    script_template: "business_hours"
    template_params:
      START_HOUR: 8
      END_HOUR: 20
      INCLUDE_WEEKEND: false
      INCLUDE_HOLIDAYS: false        # 祝日は時間外扱い
    conditions:
      - match: "SUCCESS"             # 平日 8:00〜20:00 + 非祝日 + 非年末年始
        next: 用件聴取
      - match: "other"               # 時間外 / 祝日 / 年末年始
        next: END_時間外
    notes: |
      平日 8:00〜20:00 + 非祝日 + 非年末年始 (12/26〜1/4) のときに SUCCESS。
      Gen1 元資料には年末年始の専用 TTS があるが、Gen3 ではまず END_時間外 に集約する。
      年末年始の独立終話（END_年末年始）が必要な場合は customer 確認後に追加（NON-BLOCKER）。

  # --- 用件聴取（DTMF 1=変更 / 2=キャンセル / 3=確認 / 4=新規。echo_back あり）---
  - step: 用件聴取
    type: hearing
    output_format: enum
    echo_back: true
    save_to: classification
    conditions:
      - match: "変更"
        next: 診療科聴取
      - match: "キャンセル"
        next: 診療科聴取
      - match: "確認"
        next: 診療科聴取
      - match: "新規"
        next: END_新規受付不可
      - match: "other"
        next: END_聴取失敗

  # --- 診療科聴取（enum、no_result_default=登録なし、echo_back=true）---
  # 33 通常科 + 3 上位カテゴリ（呼吸器/脳神経/産婦人科） + 4 専用終話誘導科
  # 元資料 診療科聴取.yaml のエンティティ「01_00_分岐なし診療科」+「00_00_分岐あり診療科」+「00_01_分岐あり診療科」を統合
  - step: 診療科聴取
    type: hearing
    output_format: enum
    echo_back: true
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "健康診断"
        next: END_健康診断代表案内
      - match: "歯科口腔外科"
        next: END_転送案内_歯科口腔外科リハビリ
      - match: "リハビリテーション科"
        next: END_転送案内_歯科口腔外科リハビリ
      - match: "ペインクリニック"
        next: END_麻酔科代表電話案内
      - match: "呼吸器"
        next: 呼吸器分岐確認
      - match: "脳神経"
        next: 脳神経分岐確認
      - match: "産婦人科"
        next: 産婦人科分岐確認
      - match: "other"               # 通常 30+ 科 / 呼吸器内科/外科 / 脳神経内科/外科 / 産科 / 婦人科 / 登録なし
        next: 追加診療科聴取

  # --- 呼吸器分岐確認（内/外を再聴取、echo_back あり）---
  - step: 呼吸器分岐確認
    type: hearing
    output_format: enum
    echo_back: true
    save_to: clinicalDepartment
    conditions:
      - match: "呼吸器内科"
        next: 追加診療科聴取
      - match: "呼吸器外科"
        next: 追加診療科聴取
      - match: "other"               # 否定 → 用件聴取に戻る
        next: 用件聴取

  - step: 脳神経分岐確認
    type: hearing
    output_format: enum
    echo_back: true
    save_to: clinicalDepartment
    conditions:
      - match: "脳神経内科"
        next: 追加診療科聴取
      - match: "脳神経外科"
        next: 追加診療科聴取
      - match: "other"
        next: 用件聴取

  - step: 産婦人科分岐確認
    type: hearing
    output_format: enum
    echo_back: true
    save_to: clinicalDepartment
    conditions:
      - match: "産科"
        next: 追加診療科聴取
      - match: "婦人科"
        next: 追加診療科聴取
      - match: "other"
        next: 用件聴取

  # --- 追加診療科聴取（フリーテキスト、全用件共通）---
  - step: 追加診療科聴取
    type: hearing
    output_format: text
    save_to: additionalDepartment
    next: 用件分岐_次

  # --- 用件分岐: 確認は内容聴取へ、変更/キャンセルは予約日聴取へ ---
  - step: 用件分岐_次
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "確認"
        next: 確認_内容聴取
      - match: "other"               # 変更 / キャンセル
        next: 予約日聴取

  # --- 確認ルート: 内容聴取（フリーテキスト） ---
  - step: 確認_内容聴取
    type: hearing
    output_format: text
    save_to: details
    next: jump_診察券番号聴取

  # --- 変更/キャンセルルート: 予約日 → 理由（用件で TTS 異なる）→ (変更のみ)変更希望日 ---
  - step: 予約日聴取
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 用件分岐_理由

  - step: 用件分岐_理由
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "変更"
        next: 理由_変更
      - match: "other"               # キャンセル
        next: 理由_キャンセル

  - step: 理由_変更
    type: hearing
    output_format: text
    save_to: reason
    next: 変更希望日聴取

  - step: 理由_キャンセル
    type: hearing
    output_format: text
    save_to: reason
    next: jump_診察券番号聴取

  - step: 変更希望日聴取
    type: hearing
    output_format: datetime
    save_to: desiredDate
    next: jump_診察券番号聴取

  # --- 個人情報サブフロー連鎖（診察券→氏名→生年月日→電話番号）---
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "福岡徳洲会病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "福岡徳洲会病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "福岡徳洲会病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "福岡徳洲会病院$電話番号聴取"
    next: 用件分岐_終話

  # --- 用件で終話 TTS の冒頭が異なるため classification で分岐 ---
  - step: 用件分岐_終話
    type: context_match_router
    reference_module: "OpenAI_用件聴取"
    conditions:
      - match: "変更"
        next: END_受付完了_変更
      - match: "キャンセル"
        next: END_受付完了_キャンセル
      - match: "other"               # 確認
        next: END_受付完了_確認

  # --- 終話 ---
  - step: END_受付完了_変更
    type: termination
    termination_ref: "END_受付完了_変更"

  - step: END_受付完了_キャンセル
    type: termination
    termination_ref: "END_受付完了_キャンセル"

  - step: END_受付完了_確認
    type: termination
    termination_ref: "END_受付完了_確認"

  - step: END_新規受付不可
    type: termination
    termination_ref: "END_新規受付不可"

  - step: END_転送案内_歯科口腔外科リハビリ
    type: termination
    termination_ref: "END_転送案内_歯科口腔外科リハビリ"

  - step: END_麻酔科代表電話案内
    type: termination
    termination_ref: "END_麻酔科代表電話案内"

  - step: END_健康診断代表案内
    type: termination
    termination_ref: "END_健康診断代表案内"

  # --- 異常系終話（非通知 / 時間外 / 聴取失敗）。termination_patterns に既登録 ---
  - step: END_非通知
    type: termination
    termination_ref: "END_非通知"

  - step: END_時間外
    type: termination
    termination_ref: "END_時間外"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

