# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "変更"
      - "キャンセル"
      - "確認"
      - "新規"
    notes: "DTMF 1=変更, 2=キャンセル, 3=確認, 4=新規。新規は END_新規受付不可 へ誘導。元資料 用件.yaml 相当"

  - order: 2
    name: "診療科聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "enum"
    no_result_default: "登録なし"
    output_labels:
      - "内科"
      - "循環器内科"
      - "消化器内科"
      - "呼吸器内科"
      - "呼吸器外科"
      - "呼吸器"
      - "心療内科"
      - "腎臓内科"
      - "肝臓内科"
      - "血液内科"
      - "総合診療科"
      - "小児科"
      - "外科"
      - "心臓血管外科"
      - "肝胆膵外科"
      - "乳腺外科"
      - "形成外科"
      - "整形外科"
      - "脳神経内科"
      - "脳神経外科"
      - "脳神経"
      - "産婦人科"
      - "眼科"
      - "耳鼻科"
      - "皮膚科"
      - "泌尿器科"
      - "精神科"
      - "リウマチ科"
      - "下肢静脈瘤外来"
      - "脊髄脊椎外来"
      - "禁煙外来"
      - "リハビリテーション科"
      - "歯科口腔外科"
      - "ペインクリニック"
      - "健康診断"
      - "登録なし"
    notes: |
      Gen1 元資料 診療科聴取.yaml のエンティティ「01_00_分岐なし診療科」+「00_00_分岐あり診療科」+「00_01_分岐あり診療科」を統合。
      ・「呼吸器」「脳神経」を発話した場合は分岐確認（内/外を再聴取）へ
      ・「産婦人科」を発話した場合も分岐確認（産科/婦人科を再聴取）へ
      ・「呼吸器内科/呼吸器外科/脳神経内科/脳神経外科/産科/婦人科」と具体名で発話された場合は通常進行
      ・健康診断/歯科口腔外科/リハビリテーション科/ペインクリニックは専用終話へ
      ・OpenAI が抽出できない場合は no_result_default="登録なし" で classification に保存して通常進行

