# --- セクション8b: RAG/FAQ 検索サブフロー ---
# Gen1 元資料に FAQ・RAG 相当の機能なし。Gen1→Gen3 移管デフォルトはパターン 2 だが、
# 本フローは Gen1 オリジナルに「最後の質問」相当の構造を持たないため pattern=none を採用する。
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

