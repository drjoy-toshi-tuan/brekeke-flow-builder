    save_to: "reason"
    next_step: "jump_診察券番号聴取"
    retry_failure: "skip"

  - step_name: "変更希望日聴取"
    tts_announcement: "予約希望日をおっしゃってください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY-MM-DD"
        - "NO_RESULT"
      mapping:
        - input: "発話で日付"
          output: "YYYY-MM-DD"
        - input: "DTMF シャープ/アスタ + 4 桁"
          output: "YYYY-MM-DD（過去日 → +1 年）"
      no_result_condition: "日付として解釈できない"
    save_to: "desiredDate"
    next_step: "jump_診察券番号聴取"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須・削除禁止）---
  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "祝日 / 年末年始 (12/26〜1/4) / 平日 8 時前 or 20 時以降"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、祝日を除く、月曜日から金曜日の8時から20時となっております。恐れ入りますが、受付時間内におかけなおしください。ペインクリニックは専用の直通番号に平日の午前中にお問い合わせください。電話番号は092-514-6137です。再度申し上げます。ペインクリニックの直通電話番号は092-514-6137です。お電話ありがとうございました。失礼いたします。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "用件聴取/診療科聴取のリトライ上限到達"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。受付時間は、土日、祝日を除く、月曜日から金曜日の13時から16時となっております。電話番号は092-573-6622です。繰り返します。電話番号は、092-573-6622です。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（用件で TTS 冒頭が異なる）---
