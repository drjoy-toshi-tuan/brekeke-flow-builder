    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "キャンセルルートのみ。TTS=「キャンセルの理由をおっしゃってください。」"

  - order: 11
    name: "変更希望日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "desiredDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "変更ルートのみ。TTS=「予約希望日をおっしゃってください。」"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件聴取"
    tts_announcement: "ご用件を、次の3つのうちの、いずれかでお話ください。1、変更する。2、キャンセルする。3、確認する。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "新規"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「変更」「変えたい」「変える」「日程」「日付」「取り直す」を含む"
          output: "変更"
        - input: "DTMF 2 または「キャンセル」「取り消し」「やめる」を含む"
          output: "キャンセル"
        - input: "DTMF 3 または「確認」「問い合わせ」を含む"
          output: "確認"
        - input: "DTMF 4 または「予約」「新規」「健診」「健康診断」「人間ドック」「就職」「進学」「雇い入れ」を含む"
          output: "新規"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "発話/DTMF が用件 4 種に該当しない"
    save_to: "classification"
    next_step: "変更/キャンセル/確認 → 診療科聴取 / 新規 → END_新規受付不可 / NO_RESULT → リトライ"
    retry_failure: "end_failure"

  - step_name: "診療科聴取"
    tts_announcement: "予約票に記載されている診療科をお伺いします。複数診療科の場合は、まず、一つ目の診療科をおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "循環器内科"
        - "消化器内科"
        - "呼吸器内科"
        - "呼吸器外科"
        - "呼吸器"
        - "心療内科"
        - "腎臓内科"
        - "肝臓内科"
        - "血液内科"
        - "総合診療科"
        - "小児科"
        - "外科"
        - "心臓血管外科"
        - "肝胆膵外科"
        - "乳腺外科"
        - "形成外科"
        - "整形外科"
        - "脳神経内科"
        - "脳神経外科"
        - "脳神経"
        - "産婦人科"
        - "眼科"
        - "耳鼻科"
        - "皮膚科"
        - "泌尿器科"
        - "精神科"
        - "リウマチ科"
        - "下肢静脈瘤外来"
        - "脊髄脊椎外来"
        - "禁煙外来"
        - "リハビリテーション科"
        - "歯科口腔外科"
        - "ペインクリニック"
        - "健康診断"
        - "登録なし"
        - "NO_RESULT"
      mapping:
        - input: "「呼吸器」のみ（内/外指定なし）"
          output: "呼吸器"
        - input: "「呼吸器内科」「内科」「呼内」を含む"
          output: "呼吸器内科"
        - input: "「呼吸器外科」「外科」「呼外」を含む"
          output: "呼吸器外科"
        - input: "「脳神経」のみ"
          output: "脳神経"
        - input: "「脳神経内科」「神経内科」「脳内」を含む"
          output: "脳神経内科"
        - input: "「脳神経外科」「頭痛」「脳外」を含む"
          output: "脳神経外科"
        - input: "「産婦人科」「ぎね」「婦人」を含む"
          output: "産婦人科"
        - input: "「健康診断」「健診」「検診」「人間ドック」を含む"
          output: "健康診断"
        - input: "「歯科口腔外科」「歯科」「口腔外科」「歯医者」を含む"
          output: "歯科口腔外科"
        - input: "「リハビリ」「リハビリテーション」「訓練」を含む"
          output: "リハビリテーション科"
        - input: "「ペインクリニック」「ペイン」「麻酔科」「緩和」を含む"
          output: "ペインクリニック"
        - input: "その他通常診療科リストの同義語に一致"
          output: "該当する正規化された科名"
        - input: "診療科として抽出できない"
          output: "NO_RESULT（→ no_result_default で『登録なし』を classification に保存）"
      no_result_condition: "診療科名を抽出できない"
    save_to: "clinicalDepartment"
    next_step: "終話誘導科 → 専用終話 / 上位カテゴリ（呼吸器/脳神経/産婦人科） → 分岐確認 / その他/登録なし → 追加診療科聴取"
    retry_failure: "end_failure"

  - step_name: "呼吸器分岐確認"
    tts_announcement: "呼吸器内科と呼吸器外科の、どちらですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "呼吸器内科"
        - "呼吸器外科"
        - "NO_RESULT"
      mapping:
        - input: "「内科」「ないか」「呼内」を含む"
          output: "呼吸器内科"
        - input: "「外科」「呼外」を含む"
          output: "呼吸器外科"
        - input: "否定（「違います」「いいえ」）"
          output: "NO_RESULT"
      no_result_condition: "内/外を抽出できない、または否定"
    save_to: "clinicalDepartment"
    next_step: "呼吸器内科/外科 → 追加診療科聴取 / NO_RESULT → リトライ → 上限到達 → 用件聴取に戻る (other 経路)"
    retry_failure: "skip"

  - step_name: "脳神経分岐確認"
    tts_announcement: "脳神経内科と脳神経外科の、どちらですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "脳神経内科"
        - "脳神経外科"
        - "NO_RESULT"
      mapping:
        - input: "「内科」「ないか」「神経内科」「脳内」を含む"
          output: "脳神経内科"
        - input: "「外科」「頭痛」「脳外」を含む"
          output: "脳神経外科"
        - input: "否定"
          output: "NO_RESULT"
      no_result_condition: "内/外を抽出できない、または否定"
    save_to: "clinicalDepartment"
    next_step: "脳神経内科/外科 → 追加診療科聴取 / NO_RESULT → 用件聴取"
    retry_failure: "skip"

  - step_name: "産婦人科分岐確認"
    tts_announcement: "産科と婦人科の、どちらですか？"
