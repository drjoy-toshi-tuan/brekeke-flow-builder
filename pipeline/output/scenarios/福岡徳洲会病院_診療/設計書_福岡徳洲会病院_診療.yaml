      mapping:
        - input: "発話で「4月1日」のような日付"
          output: "YYYY-MM-DD"
        - input: "DTMF シャープ/アスタ + 4 桁（MMDD）"
          output: "YYYY-MM-DD（過去日 → +1 年）"
        - input: "「わからない」「しらない」を含む"
          output: "NO_RESULT（空保存で次へ）"
      no_result_condition: "日付として解釈できない"
    save_to: "reservationDate"
    next_step: "用件分岐_理由"
    retry_failure: "skip"

  - step_name: "理由_変更"
    tts_announcement: "変更の理由をおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "（フリーテキストそのまま保存）"
      mapping: []
      no_result_condition: "STT 結果が空 → 再質問 1 回 → skip"
    save_to: "reason"
    next_step: "変更希望日聴取"
    retry_failure: "skip"

