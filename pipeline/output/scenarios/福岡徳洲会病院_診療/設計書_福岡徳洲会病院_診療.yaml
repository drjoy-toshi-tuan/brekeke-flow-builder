    retry_failure: "skip"

  - step_name: "確認_内容聴取"
    tts_announcement: "ご確認内容についてお伺いします。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "（フリーテキストそのまま保存）"
      mapping: []
      no_result_condition: "STT 結果が空 → 再質問 1 回 → skip"
    save_to: "details"
    next_step: "jump_診察券番号聴取"
    retry_failure: "skip"

  - step_name: "予約日聴取"
    tts_announcement: "現在の予約日を「4月1日」のように日付でお話ください。わからない場合は「わからない」のようにおっしゃってください。"
