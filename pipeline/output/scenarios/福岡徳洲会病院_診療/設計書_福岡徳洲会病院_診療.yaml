    condition: "全聴取完了 かつ classification=変更"
    tts_announcement: "予約変更の申し込みを受付いたしました。3診療日以内の、担当者からの折り返し電話、もしくは、SMSにて受付完了となります。折り返しは、当院代表番号、092-573-6622よりおかけいたします。お電話ありがとうございました。それでは失礼いたします。"
