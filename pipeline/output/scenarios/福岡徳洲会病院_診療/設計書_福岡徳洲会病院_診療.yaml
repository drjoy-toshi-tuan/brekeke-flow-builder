# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【新規予約フロー無し】八尾徳洲会と同様。用件は『変更/キャンセル/確認』の 3 分岐で運用。DTMF 4=新規 は END_新規受付不可 へ誘導し、健診/人間ドック/就職/進学等の発話も同経路に流す。"
  - "【受付時間】祝日除く、月〜金 8:00〜20:00。徳洲会内で最も長い（湘南藤沢 9-16/9-14・八尾 8-16/8-11・札幌 9-17 と異なる）。"
  - "【代表電話 092-573-6622】病院代表。聴取失敗・対象外診療科・新規予約案内・健康診断代表案内すべて同番号。"
  - "【ペインクリニック直通 092-514-6137】平日午前専用。Gen1 元資料では時間外案内 TTS で 2 回繰り返し読み上げる仕様（END_時間外 に組み込み済）。麻酔科代表電話案内 の電話番号は元資料準拠で 092-573-6622 を採用したが、移管ノートでは 092-514-6137 と記載されており差分あり（NON-BLOCKER で要確認）。"
  - "【4 種類の異なる受付時間案内 TTS】(1) END_時間外 = 月〜金 8-20 時, (2) END_聴取失敗（代表電話案内）= 月〜金 13-16 時, (3) END_麻酔科代表電話案内 = 月〜金 9-12 時, (4) END_健康診断代表案内 = 月〜金 10-16 時/土 10-12 時。混同しないよう注意。"
  - "【分岐あり診療科 3 系統】呼吸器（内/外）/ 脳神経（内/外）/ 産婦人科（産科/婦人科）。同義語に「ないか」「外科」「形が」「経過」「結果」等の音響的曖昧語が大量。echo_back=true で内/外を再聴取し、否定で用件聴取に戻る。"
  - "【追加診療科は全用件共通】Gen1 追加問い合わせ_追加診療科.yaml は用件分岐の振り分け箱があるが、TTS は『他に診療科があればおっしゃってください...』で全用件共通。Gen3 では 1 hearing ステップに集約。"
  - "【理由聴取の TTS】変更時=変更の理由 / キャンセル時=キャンセルの理由 と TTS 本文が用件で異なる。Gen3 では 2 つの hearing ステップ（理由_変更 / 理由_キャンセル）を用意し ContextMatchRouter で分岐。"
  - "【変更希望日】変更ルートのみ聴取。確認ルートでは『確認_内容聴取（フリーテキスト）』を別ステップとして実装し、変更希望日聴取は経由しない。"
  - "【予約日 DTMF 4 桁】予約日聴取で DTMF シャープ/アスタ + 4 桁数字を受付（過去日なら +1 年で確定）。Brekeke STT の dtmf_max_length=4 + termdtmf=#/* で表現する。"
  - "【3 つの『予約 ◯◯ の流れ』終話 TTS】後半（折り返し受付完了の文言）は完全一致だが、冒頭文言は「予約変更の申し込み」「予約キャンセルの申し込み」「ご予約に関するお問い合わせ」で異なる。携帯/固定で TTS 分岐させる札幌・湘南藤沢方式は採用しない。"
  - "【「もしもし」「もう一度」フォールバック】Gen1 用件 yaml で「もしもし」発話 → 1 回目「はい、聞こえております」/ 2 回目以上「はい、もしもしと聞こえております」と回数別 TTS の仕組みあり。Gen3 では Brekeke STT のリトライ機構と OpenAI 同義語処理に吸収するため独立ブロック化しない。"
  - "【入電番号取得分岐は無し】八尾の『終話電話番号確認』や湘南藤沢の『WEBか電話か』のような入電番号取得有無で分岐する仕組みは持たない。"
  - "【リハビリ確認内容サブフロー（訓練/診察）は実装しない】Gen1 元資料 リハビリ確認内容.yaml はリハビリ科ルート専用だが、main.yaml では next が `分からない分岐` で終わっており訓練/診察の判定値は後段で参照されない（情報収集のみ）。Gen3 ではリハビリ科は END_転送案内_歯科口腔外科リハビリ で終話するため、リハビリ確認内容サブフローは作成しない。"
  - "【セットした用件の分岐 健診予約バグ相当】Gen1 用件.yaml の `セットした用件の分岐` で「健診予約」判定の next が空欄でループ未定義（元資料のバグ相当）。Gen3 では「新規予約 / 健診予約」共通の END_新規受付不可 termination に集約して解消する。"
  - "【年末年始 TTS】Gen1 元資料 時間判断.yaml には『年末年始』専用 TTS（『大変申し訳ございませんが、本ダイヤルは年末年始のため、お休みをいただいております。受付の再開は1月5日8時より、通常通り対応させていただきます。』）があるが、Gen3 ではまず END_時間外 に集約する。年末年始独立終話が必要か顧客確認（NON-BLOCKER）。"
  - "【サブフロー命名】個人情報サブフロー連鎖は CLAUDE.md Rule 9 準拠で静的 JSON コピー。フロー名プレフィックスのみ「福岡徳洲会病院$」に置換。group_name の URL エンコード後文字数は 36 文字、最長サブフロー名「診察券番号聴取」と合算しても URL 長制限 (255 chars) に収まる。"
  - "【Gen1 `<? $... ?>` 構文】TTS 内の Gen1 構文（例: `<? $診療科の読み ?>`）は Gen3 では `<% var %>` に変換するが、本フローでは echo_back=true による Re-confirmation node が #data# 復唱を担うため、TTS 内に直接埋め込むことはしない。設計書の TTS には Gen1 構文を含めない。"

