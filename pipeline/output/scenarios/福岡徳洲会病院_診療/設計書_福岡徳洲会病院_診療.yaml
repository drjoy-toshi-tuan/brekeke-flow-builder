        - input: "否定"
          output: "NO_RESULT"
      no_result_condition: "産科/婦人科を抽出できない、または否定"
    save_to: "clinicalDepartment"
    next_step: "産科/婦人科 → 追加診療科聴取 / NO_RESULT → 用件聴取"
    retry_failure: "skip"

  - step_name: "追加診療科聴取"
    tts_announcement: "他に診療科があればおっしゃってください。ない場合は、ありません、とおっしゃってください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "（フリーテキストそのまま保存）"
      mapping:
        - input: "「ありません」「なし」「ない」を含む"
          output: "ありません"
        - input: "他の診療科名を含む"
          output: "発話テキストそのまま"
      no_result_condition: "STT 結果が空（無音）→ 再質問 1 回 → skip"
