# 設計書 — 石巻赤十字病院 診療
# 作業種別: Gen2→Gen3 移管
# 生成日: 2026-04-20
# 元資料: docs/reference/customer_docs/【診療1】：石巻赤十字病院.md
# 移管ノート: docs/migration/gen2_石巻赤十字病院_診療.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "石巻赤十字病院"
  group_name: "石巻赤十字病院"
  flow_name: "石巻赤十字病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "0225217226"       # 代表案内先電話番号（フロー内で案内用）
  business_hours: "なし（Gen2 元資料に営業時間制御の記載なし）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "石巻赤十字病院$診療"
      role: "main"
      description: "予約変更・キャンセル・確認の3分岐を受け付け、共通情報（診察券番号・氏名・生年月日・電話番号）を聴取して折り返し受付を自動化"
  subflows:
    - name: "石巻赤十字病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"            # digits フォーマット復唱
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "「わからない」分岐あり。復唱は IVRプロパティ側で桁分割表記"
    - name: "石巻赤十字病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"            # 復唱禁止（施設固有ルール）
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "復唱禁止（元資料 1-2 / 5-1）。訂正意図があれば上書きのみ、「修正いたしました」の確認文のみ"
    - name: "石巻赤十字病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"            # DOB Re-confirmation で復唱
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "訂正発話時は即時上書きして「生年月日はYYYY年M月D日ですね。」と一度だけ確認"
    - name: "石巻赤十字病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"            # telephone フォーマット復唱
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier で携帯着信判別。携帯なら着信番号確認、それ以外は直接聴取。10桁未満は必ず復唱確認"

# --- セクション3: フローの目的 ---
purpose: |
  石巻赤十字病院の予約専用AI電話として、入電者から「予約の変更／キャンセル／確認」の用件を聴取し、
  予約日が3日以上先であることを確認した上で、診療科（変更・キャンセル時のみ）・診察券番号・氏名・
  生年月日・連絡先電話番号を順次聴取する。最後にその他の問い合わせを受け付け、
  3診療日以内の折り返し対応のために情報を Dr.JOY に登録する。
  予約日が3日以内の場合・対象外診療科（慢性疼痛内科/放射線診断科/産科/救急科）の場合は、
  代表番号 0225217226 への案内で終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "石巻赤十字病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS: 「お電話ありがとうございます。石巻赤十字病院の、予約変更、AI電話です。」)
                                  → 用件確認(hearing enum: 変更/キャンセル/確認)
                                      ├─ 変更     → 予約日確認_変更キャンセル
                                      ├─ キャンセル → 予約日確認_変更キャンセル
                                      └─ 確認     → 予約日確認_確認

                  予約日確認_変更キャンセル(hearing enum: はい/いいえ)
                    ├─ いいえ → END_代表案内
                    └─ はい   → 診療科1聴取(hearing enum)
                                  ├─ 慢性疼痛内科  → END_代表案内
                                  ├─ 放射線診断科  → END_代表案内
                                  ├─ 産科         → END_代表案内
                                  ├─ 救急科       → END_代表案内
                                  ├─ わからない   → jump_診察券番号聴取
                                  └─ default      → 診療科2聴取(hearing enum: ない/その他)
                                                      └─ default → jump_診察券番号聴取

                  予約日確認_確認(hearing enum: はい/いいえ)
                    ├─ いいえ → END_代表案内
                    └─ はい   → 内容確認(hearing text) → jump_診察券番号聴取

                  jump_診察券番号聴取(subflow)
                    → jump_氏名聴取(subflow)
                    → jump_生年月日聴取(subflow)
                    → jump_電話番号聴取(subflow)
                    → 最後の問い合わせ(hearing text)
                    → END_終話(status=1, smsFlag=1)

      [異常系]
        非通知着信        → END_非通知(status=2, smsFlag=-1)
        リトライ上限到達   → END_聴取失敗(status=3, smsFlag=-1)
    notes: |
      - 営業時間チェック(acceptance_times)は元資料に記載なし → use_acceptance_times: false
      - 予約日 Yes/No の結果は context 保存せず、OpenAI 直後分岐（Pattern A）で振り分ける
      - 診療科1で「わからない」が発話されたら診療科2をスキップして診察券番号聴取へ直行
      - 確認フローでは診療科1/診療科2を一切ヒアリングしない（内容確認のみ）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック ===
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # === 用件確認（Pattern A: OpenAI 直後分岐）===
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "変更"
        next: 予約日確認_変更キャンセル
      - match: "キャンセル"
        next: 予約日確認_変更キャンセル
      - match: "確認"
        next: 予約日確認_確認

  # === 予約日確認（変更/キャンセル用）===
  - step: 予約日確認_変更キャンセル
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 診療科1聴取
      - match: "いいえ"
        next: END_代表案内

  # === 予約日確認（確認用）===
  - step: 予約日確認_確認
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: 内容確認
      - match: "いいえ"
        next: END_代表案内

  # === 診療科1聴取 ===
  - step: 診療科1聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "慢性疼痛内科"
        next: END_代表案内
      - match: "放射線診断科"
        next: END_代表案内
      - match: "産科"
        next: END_代表案内
      - match: "救急科"
        next: END_代表案内
      - match: "わからない"
        next: jump_診察券番号聴取
      - match: "default"
        next: 診療科2聴取

  # === 診療科2聴取 ===
  - step: 診療科2聴取
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: jump_診察券番号聴取

  # === 内容確認（確認フロー専用 — 自由テキスト）===
  - step: 内容確認
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # === 共通情報聴取サブフロー ===
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "石巻赤十字病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "石巻赤十字病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "石巻赤十字病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "石巻赤十字病院$電話番号聴取"
    next: 最後の問い合わせ

  # === 最後の問い合わせ（連絡先聴取完了直後に必ず聞く）===
  - step: 最後の問い合わせ
    type: hearing
    output_format: text
    next: END_終話

  # === 終話ブロック ===
  - step: END_終話
    type: termination
    termination_ref: "END_終話"

  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

  - step: END_非通知
    type: termination
    termination_ref: "END_非通知"

