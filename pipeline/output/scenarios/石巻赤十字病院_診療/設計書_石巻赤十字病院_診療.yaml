      該当診療科がない場合：「当院に○○はございませんが、○○でしょうか？」と近しい診療科をレコメンド

  - order: 5
    name: "診療科2聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment2"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "ない"
      - "default"
    notes: "1つ目の診療科聴取後、2つ目を聴取。ない場合は「ない」とお話しください"

  - order: 6
    name: "内容確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "確認フロー専用。FAQ 照合なし。発話内容をそのままテキスト格納"

  - order: 7
    name: "最後の問い合わせ"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "question"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: |
      連絡先電話番号確認完了直後に必ず聴取。折り返し時間を聞かれたら「順番に対応しておりますので、しばらくお待ちください」。
      折り返し希望時間を伝えられたら「ご要望を承りました。」で一律回答

