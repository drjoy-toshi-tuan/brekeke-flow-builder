# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（use_acceptance_times: false のため通常は到達しない）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（AI補完経路）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（施設固有）---
  - name: "END_終話"
    condition: "全聴取完了（変更/キャンセル/確認いずれも連絡先電話番号確認完了後）"
    tts_announcement: "かしこまりました。お申し込みを受付いたしました。3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_終話"

  - name: "END_代表案内"
    condition: "予約日が3日以内（いいえ）または診療科が対象外（慢性疼痛内科/放射線診断科/産科/救急科）"
