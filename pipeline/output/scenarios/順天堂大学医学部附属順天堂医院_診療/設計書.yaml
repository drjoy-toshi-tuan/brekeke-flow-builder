step_details:
- step_name: 診療科
  tts_announcement: 診療科をお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - 整形外科
    - 泌尿器科
    - 腎臓内科
    - 皮膚科
    - 脳神経内科
    - 脳神経外科
    - 消化器内科
    - 食道胃外科
    - 大腸肛門器外科
    - 肝胆膵外科
    - 呼吸器外科
    - NO_RESULT
    mapping:
    - input: departments[].synonymsに一致する発話
      output: 対応するdepartments[].name
    - input: 上記いずれにも該当しない
      output: NO_RESULT
    no_result_condition: 11診療科のいずれの類義語にも該当しない
  save_to: clinicalDepartment
  next_step: 診療科確認（saveContext後）→ 受診歴聴取
  retry_failure: skip
  notes: 'リトライ1回目失敗後は診療科リスト提示TTS。 リスト提示後も認識できない場合はclinicalDepartment2にフリーテキスト保存して続行（skip）。 profile_words: 診療科辞書（11科+類義語）。 診療科_不明処理: リスト提示後NO_RESULT時、STT発話テキストをそのままclinicalDepartment2にsaveContext2DBで保存し受診歴_聴取へ続行。
    診療科_リスト提示STT: 入力_診療科_リスト STTは第1STT（入力_診療科）と同じprofile_words・stt_type（AmiVoice_STT）・retry_count(2)を使用すること。OpenAI_診療科_リストも第1OpenAI（OpenAI_診療科）と同じoutput_valuesとmappingを使用する。

    '
- step_name: 受診歴
  tts_announcement: 過去に当院にて受診された事はございますか。あります、ありませんでお答えください。
  input_method: voice_only
  openai_rules:
    output_values:
    - あり（再診）
    - なし（初診）
    - NO_RESULT
    mapping:
    - input: はい/あります/あった/再診/何回も/いつも通っている 等の肯定表現
      output: あり（再診）
    - input: いいえ/ありません/ない/初めて/初診 等の否定表現
      output: なし（初診）
    - input: 上記いずれにも該当しない
      output: NO_RESULT
    no_result_condition: 肯定・否定のいずれにも判定できない
  save_to: history
  next_step: なし(初診)→script_2Bゲート_初診 / あり(再診)→サブフロー遷移_診察券番号聴取
  retry_failure: end_failure
- step_name: 用件_初診
  tts_announcement: 本日のご用件を、予約をとる、変更する、キャンセルする、のいずれかでお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - 予約
    - 変更
    - キャンセル
    - NO_RESULT
    mapping:
    - input: 予約/取る/取りたい/新規 等
      output: 予約
    - input: 変更/変えたい/日程変更 等
      output: 変更
    - input: キャンセル/取消/やめたい 等
      output: キャンセル
    - input: 上記いずれにも該当しない
      output: NO_RESULT
    no_result_condition: 予約/変更/キャンセルのいずれにも該当しない
  save_to: classification
  next_step: 予約→N_INIT_紹介状聴取 / 変更→N_CHANGE_現在予約日聴取 / キャンセル→N_CANCEL_現在予約日聴取
  retry_failure: end_failure
- step_name: 用件_再診
  tts_announcement: 本日のご用件を、次の4つのうちのいずれかでお話しください。予約の取得、変更、キャンセル、その他問合せ、それではお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - 予約
    - 変更
    - キャンセル
    - 問合せ
    - NO_RESULT
    mapping:
    - input: 予約/取る/取りたい 等
      output: 予約
    - input: 変更/変えたい 等
      output: 変更
    - input: キャンセル/取消 等
      output: キャンセル
    - input: 問合せ/確認/質問/聞きたい 等
      output: 問合せ
    - input: 上記いずれにも該当しない
      output: NO_RESULT
    no_result_condition: 4択のいずれにも該当しない
  save_to: classification
  next_step: 予約→script_2Bゲート_再診 / 変更→R_CHANGE / キャンセル→R_CANCEL / 問合せ→R_Q
  retry_failure: end_failure
- step_name: 紹介状有無_初診
  tts_announcement: 紹介状はお持ちでしょうか。はい、いいえでお答えください。
  input_method: voice_only
  openai_rules:
    output_values:
    - あり
    - なし
    - NO_RESULT
    mapping:
    - input: はい/あります/持っています
      output: あり
    - input: いいえ/ありません/持っていません
      output: なし
    no_result_condition: はい/いいえの判定不能
  save_to: introduction
  next_step: あり→N_INIT_発行病院名聴取 / なし→END_INTRO_NONE
  retry_failure: end_failure
- step_name: 紹介状有無_再診
  tts_announcement: 病院、クリニックからの紹介状はお持ちでしょうか。はい、いいえでお答えください。
  input_method: voice_only
  openai_rules:
    output_values:
    - あり
    - なし
    - NO_RESULT
    mapping:
    - input: はい/あります
      output: あり
    - input: いいえ/ありません
      output: なし
    no_result_condition: はい/いいえの判定不能
  save_to: introduction
  next_step: あり→R_INIT_発行病院名聴取 / なし→R_INIT_予約希望日聴取（病院名・宛名スキップ）
  retry_failure: end_failure
- step_name: 発行病院名
  tts_announcement: 紹介状を発行した病院名を省略せずにお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - フリーテキスト
    mapping:
    - input: 音声認識結果
      output: そのまま保存
    no_result_condition: 音声認識結果が空
  save_to: institution
  next_step: 宛名聴取
  retry_failure: skip
- step_name: 宛名
  tts_announcement: 紹介状に記載されている宛名を省略せずに全てお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - フリーテキスト
    mapping:
    - input: 音声認識結果
      output: そのまま保存
    no_result_condition: 音声認識結果が空
  save_to: doctor
  next_step: 予約希望日聴取
  retry_failure: skip
- step_name: 予約希望日
  tts_announcement: 予約希望日をお伺いいたします。ご都合の良い日付や曜日を、7月1日、10月上旬や、来週のようにお話しください。
  input_method: dtmf_voice
  openai_rules:
    output_values:
    - フリーテキスト
    mapping:
    - input: 日付・曜日・期間表現
      output: そのまま保存（フリーテキスト）
    no_result_condition: 認識結果が空
  save_to: DesiredreservationDate
  next_step: ルートにより異なる（次のステップまたはSMS判定）
  retry_failure: skip
- step_name: 現在予約日_変更
  tts_announcement: 現在の予約日を日付でおっしゃってください。すでにキャンセル済みで、再予約をご希望の方はキャンセル済みとお話しください。
  input_method: dtmf_voice
  openai_rules:
    output_values:
    - 日付テキスト
    - キャンセル済み
    - NO_RESULT
    mapping:
    - input: 日付表現
      output: YYYY-MM-DD形式
    - input: キャンセル済み
      output: キャンセル済み（alreadyCanceled=1に設定）
    no_result_condition: 日付もキャンセル済みも認識できない
  save_to: reservationDate
  next_step: 予約希望日聴取
  retry_failure: skip
- step_name: 現在予約日_キャンセル
  tts_announcement: 現在の予約日を日付でおっしゃってください。
  input_method: dtmf_voice
  openai_rules:
    output_values:
    - 日付テキスト
    - NO_RESULT
    mapping:
    - input: 日付表現
      output: YYYY-MM-DD形式
    no_result_condition: 日付として認識できない
  save_to: reservationDate
  next_step: ルートにより異なる
  retry_failure: skip
- step_name: 変更理由
  tts_announcement: 今回の変更理由をお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - フリーテキスト
    mapping:
    - input: 音声認識結果
      output: そのまま保存
    no_result_condition: 認識結果が空
  save_to: reason
  next_step: SMS判定
  retry_failure: skip
- step_name: キャンセル理由
  tts_announcement: 今回のキャンセル理由をお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - フリーテキスト
    mapping:
    - input: 音声認識結果
