special_notes:
- Gen2→Gen3移管案件。Gen2プロンプト（OpenAI Assistants形式）からの移行
- 'フロー順序はGen2を維持: 個人情報（氏名→生年月日→電話番号）→ 診療科 → 受診歴 → 用件 → 用件別ルート'
- S2B対象診療科（消化器内科/食道胃外科/大腸肛門器外科/肝胆膵外科/呼吸器外科）は初診時・再診予約時にAI受付不可（END_2B）。Scriptモジュールで判定
- '2Bゲートは2箇所: 初診時（受診歴聴取直後）と再診予約時（用件聴取後）'
- 初診+予約+紹介状なし→受付不可（END_INTRO_NONE）。再診+紹介状なしは正常続行（予約希望日へ）
- 診療科確認（{dept}ですね。）と受診歴聴取は別々のTTSモジュール。Gen2では合体出力だが、Gen3ではsaveContext2DBを挟むため分離
- '氏名聴取: カタカナ変換、復唱なし、リトライ1回（Gen2仕様。IVRプロパティで上書き）'
- '診察券番号: 再診時のみ聴取。最大8桁。復唱なし'
- 'smsFlag: 携帯+予約=1、携帯+変更=2、携帯+キャンセル=3、非携帯=-1。問合せルートは常に-1'
- 問合せルート（R_Q）はACCEPT_DONE出力なし。Gen2仕様準拠
- Gen2 status=0はGen3で使用禁止のため、受付完了はstatus=1、代表案内系はstatus=2に統合
- 0338133111（代表電話）は incoming-classifier で anonymous 同等扱い
- 個人情報聴取サブフロー（氏名・生年月日・電話番号・診察券番号）は CLAUDE.md Rule 9 に基づき docs/reference/bivr/samples/個人情報サブフロー.bivr を完全コピー
- 現在予約日_変更ステップは「キャンセル済み」回答にも対応。alreadyCanceled=1に設定後、再予約フローに進む
- END_CLOSEはACCEPT_DONE後/問合せ完了後の追加クローズTTS。saveCompletionFlag2dbは不要（ACCEPT_DONEまたは問合せ完了の前段で既に実行済み）
- '複合発話（例: 予約と変更を同時に依頼）時は最初の用件を優先処理する。複数用件の場合は後日おかけ直しをご案内する'
- TIMEOUT/ERROR/NO_RESULTは全てリトライモジュールに統合。generatorはCLAUDE.mdのnext配列規則に従い先頭3スロットに個別配置する
- 【ルート別分離方式】用件別ルートのTTSモジュールはルートプレフィックス（N_INIT_/N_CHANGE_/N_CANCEL_/R_INIT_/R_CHANGE_/R_CANCEL_/R_Q_）付きで個別登録する。同一文言であっても、next先がルートごとに異なるため1モジュール共有は不可。generatorはルートごとに独立したTTSモジュールを生成すること
- 【ACCEPT_DONE分離】ACCEPT_DONE_SMS/NO_SMSは受付確認のみ。「その他問合せ」の案内はACCEPT_DONE直後の「その他問合せ_聴取」TTSモジュール（共有）で実施する。二重発話を防止するためACCEPT_DONEにその他問合せプロンプトを含めない
- 【Rule 16 パターン3】Gen2→Gen3移管のため、全終話パス（END_受付完了_SMS_予約/変更/キャンセル、END_受付完了_NO_SMS、END_問合せ完了）の直前にRAG検索サブフロー（RAG検索_終話前）を挿入する。初回発話:「何かご質問はございますか？」。患者が質問なしと回答した場合のみ終話に進む。
