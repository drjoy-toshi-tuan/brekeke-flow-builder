    no_result_condition: 認識結果が空
  save_to: reason
  next_step: SMS判定
  retry_failure: skip
- step_name: 予約理由
  tts_announcement: 今回の予約された理由をお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - フリーテキスト
    mapping:
    - input: 音声認識結果
      output: そのまま保存
    no_result_condition: 認識結果が空
  save_to: reason
  next_step: SMS判定
  retry_failure: skip
- step_name: 問合せ内容
  tts_announcement: それでは、確認したい内容を、現在の予約日を確認したいなど、簡潔におっしゃってください。
  input_method: voice_only
  openai_rules:
    output_values:
    - フリーテキスト
    mapping:
    - input: 音声認識結果
      output: そのまま保存
    no_result_condition: 認識結果が空
  save_to: details
  next_step: その他問合せ（R_Q）
  retry_failure: skip
  notes: '

    【RAG】問い合わせ内容を聴取後、RAG検索サブフロー（RAG検索_問い合わせ）を呼び出してFAQ回答を試みる。RAGサブフローはループ機能を内蔵しており、患者が「ありません」と回答するまで繰り返す。'
- step_name: その他問合せ
  tts_announcement: その他、お聞きになりたい事がございましたら簡潔にお話しください。
  input_method: voice_only
  openai_rules:
    output_values:
    - フリーテキスト
    mapping:
    - input: 音声認識結果
      output: そのまま保存
    no_result_condition: 認識結果が空
  save_to: question
  next_step: END_CLOSE
  retry_failure: skip
  notes: '

    【RAG】その他問合せもRAG検索サブフローで処理する。'
termination_patterns:
- name: END_受付完了_SMS_予約
  condition: 全聴取完了 かつ 携帯電話 かつ classification=予約
  tts_announcement: ご用件をお預かりいたしました。この後、ショートメッセージをお送りいたしますので、お預かりした情報のご確認をお願いいたします。翌診療日までに病院から確定情報のご連絡をいたします。
  status: '1'
  sms_flag: '1'
  completion_flag_name: 完了フラグ_受付完了_SMS予約
- name: END_受付完了_SMS_変更
  condition: 全聴取完了 かつ 携帯電話 かつ classification=変更
  tts_announcement: ご用件をお預かりいたしました。この後、ショートメッセージをお送りいたしますので、お預かりした情報のご確認をお願いいたします。翌診療日までに病院から確定情報のご連絡をいたします。
  status: '1'
  sms_flag: '2'
  completion_flag_name: 完了フラグ_受付完了_SMS変更
- name: END_受付完了_SMS_キャンセル
  condition: 全聴取完了 かつ 携帯電話 かつ classification=キャンセル
  tts_announcement: ご用件をお預かりいたしました。この後、ショートメッセージをお送りいたしますので、お預かりした情報のご確認をお願いいたします。翌診療日までに病院から確定情報のご連絡をいたします。
  status: '1'
  sms_flag: '3'
  completion_flag_name: 完了フラグ_受付完了_SMSキャンセル
- name: END_受付完了_NO_SMS
  condition: 全聴取完了 かつ 非携帯電話
  tts_announcement: ご用件をお預かりいたしました。翌診療日までに病院から確定情報のご連絡をいたします。
  status: '1'
  sms_flag: '-1'
  completion_flag_name: 完了フラグ_受付完了_NOSMS
- name: END_問合せ完了
  condition: 再診+問合せルート完了
  tts_announcement: ''
  status: '1'
  sms_flag: '-1'
  completion_flag_name: 完了フラグ_問合せ完了
- name: END_2B
  condition: S2B対象診療科（消化器内科/食道胃外科/大腸肛門器外科/肝胆膵外科/呼吸器外科）の初診時、または再診+予約時
  tts_announcement: 恐れ入りますが、新規のご予約につきましては、AI電話での受付をおこなうことはできません。お手数をおかけしますが、当院ホームページをご確認の上、順天堂医院内、受付へお越しください。なお、紹介状をお持ちでない場合、選定療養費が11,000円かかることがございます。まず、かかりつけの医療機関での診察をお勧めします。お電話ありがとうございました。それでは失礼いたします。
  status: '2'
  sms_flag: '-1'
  completion_flag_name: 完了フラグ_2B
- name: END_INTRO_NONE
  condition: 初診+予約+紹介状なし
  tts_announcement: 恐れ入りますが、紹介状をお持ちではない方は初診予約をお取りすることができません。お手数をおかけしますが、当院ホームページをご確認の上、初診受付の受付時間内に直接病院までお越しください。なお、紹介状をお持ちでない場合、選定療養費が11,000円かかります。まず、かかりつけの医療機関での診察をお勧めします。お電話ありがとうございました。それでは失礼いたします。
  status: '2'
  sms_flag: '-1'
  completion_flag_name: 完了フラグ_紹介状なし
- name: END_聴取失敗
  condition: 受診歴/用件のリトライ上限到達
  tts_announcement: 申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。
  status: '2'
  sms_flag: '-1'
  completion_flag_name: 完了フラグ_聴取失敗
- name: END_時間外
  condition: acceptance_timesで時間外と判定
  tts_announcement: お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。
  status: '6'
  sms_flag: '-1'
  completion_flag_name: 完了フラグ_時間外
- name: END_非通知
  condition: incoming-classifierで非通知と判定
  tts_announcement: 恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。
  status: '2'
  sms_flag: '-1'
  completion_flag_name: 完了フラグ_非通知
sms_flag_routing:
  enabled: true
  routing_keys:
  - phonetype
  - classification
  patterns:
  - condition: phonetype=携帯 AND classification=予約
    sms_flag: '1'
    notes: 予約受付完了SMS
  - condition: phonetype=携帯 AND classification=変更
    sms_flag: '2'
    notes: 変更受付完了SMS
  - condition: phonetype=携帯 AND classification=キャンセル
    sms_flag: '3'
    notes: キャンセル受付完了SMS
  - condition: phonetype!=携帯
    sms_flag: '-1'
    notes: 非携帯はSMS送信なし
