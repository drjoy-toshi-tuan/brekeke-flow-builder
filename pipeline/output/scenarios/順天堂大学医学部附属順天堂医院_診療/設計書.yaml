  - order: '6'
    value: 脳神経外科
  - order: '7'
    value: 消化器内科
  - order: '8'
    value: 食道胃外科
  - order: '9'
    value: 大腸肛門器外科
  - order: '10'
    value: 肝胆膵外科
  - order: '11'
