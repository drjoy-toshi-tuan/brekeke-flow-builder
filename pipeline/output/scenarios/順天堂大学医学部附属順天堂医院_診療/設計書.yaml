purpose: '患者からの電話を受け、氏名・生年月日・電話番号の個人情報を聴取した後、 診療科（11科）と受診歴（初診/再診）を確認する。 S2B対象診療科（消化器内科・食道胃外科・大腸肛門器外科・肝胆膵外科・呼吸器外科）の 新規予約はAI受付不可として代表案内する。 用件（予約/変更/キャンセル/問合せ）に応じて紹介状有無・予約日・理由等を聴取し、 折り返し受付を自動化する。携帯電話の場合はSMSを送信する。

  '
flow_diagrams:
- flow_name: じゅ_順天堂医院$診療_20260408
  diagram: "===== 冒頭チェーン =====\nwait(2000ms)\n  → saveContextModel2DB\n  → incoming-classifier\n      ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断\n      └─ 通常 → acceptance_times\n   \
    \               ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断\n                  └─ 受付可(true) → 冒頭_アナウンス(TTS)\n\n===== 個人情報聴取（サブフロー群） =====\n冒頭_アナウンス → サブフロー遷移_氏名聴取(Custom\
    \ Jump to Flow, .*通過)\n  → サブフロー遷移_生年月日聴取(Custom Jump to Flow, .*通過)\n  → サブフロー遷移_電話番号聴取(Custom Jump to Flow, .*通過)\n\n===== 診療科聴取 =====\n→ 診療科_聴取(TTS) → 入力_診療科(AmiVoice STT) → OpenAI_診療科(generate_by_OpenAI)\n\
    \    ├─ {各診療科名} → saveContext_診療科 → 診療科_確認(TTS: \"{dept}ですね。\")\n    └─ NO_RESULT → リトライ_診療科\n                      ├─ Retry → 診療科_再聴取(TTS)\n                      └─ No more → 診療科_リスト提示(TTS) → 入力_診療科_リスト(STT)\
    \ → OpenAI_診療科_リスト\n                                     ├─ {診療科名} → saveContext_診療科 → 診療科_確認\n                                     └─ NO_RESULT → saveContext_診療科_不明(clinicalDepartment2に保存) → 受診歴_聴取\n\
    \n===== 受診歴聴取 =====\n診療科_確認 → 受診歴_聴取(TTS) → 入力_受診歴(AmiVoice STT) → OpenAI_受診歴(classify: あり(再診)/なし(初診))\n    ├─ あり(再診) → saveContext_受診歴 → ★再診ルート\n    ├─ なし(初診) → saveContext_受診歴 → ★初診ルート\n    └─ NO_RESULT\
    \ → リトライ_受診歴\n                      ├─ Retry → 受診歴_再聴取(TTS)\n                      └─ No more → 完了フラグ_聴取失敗(status=2, smsFlag=-1) → END_聴取失敗(TTS) → 切断\n\n===== 初診ルート =====\n★初診ルート → script_2Bゲート_初診（clinicalDepartmentがS2B対象か判定）\n\
    \    ├─ S2B対象 → 完了フラグ_2B(status=2, smsFlag=-1) → END_2B(TTS) → 切断\n    └─ 非S2B → 用件_初診_聴取(TTS) → 入力_用件_初診(AmiVoice STT) → OpenAI_用件_初診(classify: 予約/変更/キャンセル)\n                  ├─ 予約     → saveContext_用件\
    \ → N_INIT_紹介状聴取\n                  ├─ 変更     → saveContext_用件 → N_CHANGE_現在予約日聴取\n                  ├─ キャンセル → saveContext_用件 → N_CANCEL_現在予約日聴取\n                  └─ NO_RESULT → リトライ_用件_初診\n     \
    \                              ├─ Retry → 用件_初診_再聴取(TTS)\n                                   └─ No more → 完了フラグ_聴取失敗 → END_聴取失敗 → 切断\n\n===== 再診ルート =====\n★再診ルート → サブフロー遷移_診察券番号聴取(Custom Jump to Flow,\
    \ .*通過)\n  → 用件_再診_聴取(TTS) → 入力_用件_再診(AmiVoice STT) → OpenAI_用件_再診(classify: 予約/変更/キャンセル/問合せ)\n      ├─ 予約     → saveContext_用件 → script_2Bゲート_再診\n      │                                   ├─ S2B対象\
    \ → 完了フラグ_2B → END_2B → 切断\n      │                                   └─ 非S2B → R_INIT_紹介状聴取\n      ├─ 変更     → saveContext_用件 → R_CHANGE_現在予約日聴取\n      ├─ キャンセル → saveContext_用件 → R_CANCEL_現在予約日聴取\n\
    \      ├─ 問合せ   → saveContext_用件 → R_Q_問合せ内容聴取\n      └─ NO_RESULT → リトライ_用件_再診\n                       ├─ Retry → 用件_再診_再聴取(TTS)\n                       └─ No more → 完了フラグ_聴取失敗 → END_聴取失敗 → 切断\n\n\
    ===== 初診+予約 (N_INIT) =====\nN_INIT_紹介状聴取(TTS) → 入力_紹介状_初診(STT) → OpenAI_紹介状_初診(classify: あり/なし)\n    ├─ なし → 完了フラグ_紹介状なし(status=2, smsFlag=-1) → END_INTRO_NONE(TTS) → 切断\n    └─ あり → saveContext_紹介状\
    \ → N_INIT_発行病院名聴取(TTS) → 入力_発行病院名(STT)\n                → saveContext_病院名 → N_INIT_宛名聴取(TTS) → 入力_宛名(STT)\n                → saveContext_宛名 → N_INIT_予約希望日聴取(TTS) → 入力_予約希望日(STT)\n                →\
    \ saveContext_希望日 → ★SMS判定\n\n===== 初診+変更 (N_CHANGE) =====\nN_CHANGE_現在予約日聴取(TTS) → 入力_現在予約日_変更(STT) → saveContext_予約日\n  → N_CHANGE_予約希望日聴取(TTS) → 入力_予約希望日_変更(STT) → saveContext_希望日\n  → N_CHANGE_発行病院名聴取(TTS)\
    \ → 入力_発行病院名_変更(STT) → saveContext_病院名\n  → N_CHANGE_宛名聴取(TTS) → 入力_宛名_変更(STT) → saveContext_宛名\n  → N_CHANGE_変更理由聴取(TTS) → 入力_変更理由(STT) → saveContext_理由 → ★SMS判定\n\n===== 初診+キャンセル (N_CANCEL) =====\n\
    N_CANCEL_現在予約日聴取(TTS) → 入力_現在予約日_キャンセル(STT) → saveContext_予約日 → ★SMS判定\n\n===== 再診+予約 (R_INIT) =====\nR_INIT_紹介状聴取(TTS) → 入力_紹介状_再診(STT) → OpenAI_紹介状_再診(classify: あり/なし)\n    ├─ あり → saveContext_紹介状\
    \ → R_INIT_発行病院名聴取(TTS) → 入力_発行病院名_再診(STT)\n    │          → saveContext_病院名 → R_INIT_宛名聴取(TTS) → 入力_宛名_再診(STT)\n    │          → saveContext_宛名 → R_INIT_予約希望日聴取(TTS) → 入力_予約希望日_再診(STT)\n    │     \
    \     → saveContext_希望日 → R_INIT_予約理由聴取(TTS) → 入力_予約理由(STT)\n    │          → saveContext_理由 → ★SMS判定\n    └─ なし → saveContext_紹介状 → R_INIT_予約希望日聴取_直接(TTS) → 入力_予約希望日_再診_直接(STT)\n                → saveContext_希望日\
    \ → R_INIT_予約理由聴取_直接(TTS) → 入力_予約理由_直接(STT)\n                → saveContext_理由 → ★SMS判定\n\n===== 再診+変更 (R_CHANGE) =====\nR_CHANGE_現在予約日聴取(TTS) → 入力_現在予約日_R変更(STT) → saveContext_予約日\n  → R_CHANGE_予約希望日聴取(TTS)\
    \ → 入力_予約希望日_R変更(STT) → saveContext_希望日\n  → R_CHANGE_変更理由聴取(TTS) → 入力_変更理由_再診(STT) → saveContext_理由 → ★SMS判定\n\n===== 再診+キャンセル (R_CANCEL) =====\nR_CANCEL_現在予約日聴取(TTS) → 入力_現在予約日_Rキャンセル(STT) → saveContext_予約日\n\
    \  → R_CANCEL_キャンセル理由聴取(TTS) → 入力_キャンセル理由(STT) → saveContext_理由 → ★SMS判定\n\n===== 再診+問合せ (R_Q) — ACCEPT_DONEなし =====\nR_Q_問合せ内容聴取(TTS) → 入力_問合せ内容(STT) → saveContext_問合せ内容\n  → R_Q_その他問合せ(TTS) → 入力_その他問合せ(STT)\
    \ → saveContext_その他問合せ\n  → 完了フラグ_問合せ完了(status=1, smsFlag=-1) → END_CLOSE(TTS) → 切断\n\n===== SMS判定 → 終話（予約/変更/キャンセル共通） =====\n★SMS判定 → script_SMS判定（phonetype + classification で smsFlag算出）\n    ├─ 携帯+予約\
    \ → 完了フラグ_受付完了_SMS予約(status=1, smsFlag=1) → ACCEPT_DONE_SMS(TTS)\n    ├─ 携帯+変更 → 完了フラグ_受付完了_SMS変更(status=1, smsFlag=2) → ACCEPT_DONE_SMS(TTS)\n    ├─ 携帯+キャンセル → 完了フラグ_受付完了_SMSキャンセル(status=1, smsFlag=3)\
    \ → ACCEPT_DONE_SMS(TTS)\n    └─ 非携帯 → 完了フラグ_受付完了_NOSMS(status=1, smsFlag=-1) → ACCEPT_DONE_NO_SMS(TTS)\n→ その他問合せ_聴取(TTS) → 入力_その他問合せ(STT) → saveContext_その他問合せ\n→ END_CLOSE(TTS) → 切断\n\n===== 終話パターン一覧\
    \ =====\nEND_2B:            S2B対象診療科 AI受付不可 → 代表案内(status=2, smsFlag=-1)\nEND_INTRO_NONE:    初診+紹介状なし → 受付不可(status=2, smsFlag=-1)\nEND_聴取失敗:      リトライ上限到達(status=2, smsFlag=-1)\nEND_時間外:        時間外(status=6,\
    \ smsFlag=-1)\nEND_非通知:        非通知(status=2, smsFlag=-1)\nEND_CLOSE:         正常終話(status=1, smsFlag=用件別)\n"
  notes: 'Gen2フロー順序を維持: 個人情報→診療科→受診歴→用件。

    S2Bゲートは初診/再診の2箇所にScriptモジュールで配置。

    SMS判定はScriptモジュールでphonetype+classificationから算出。

    問合せルートはACCEPT_DONEを経由しない（Gen2仕様準拠）。

    '
