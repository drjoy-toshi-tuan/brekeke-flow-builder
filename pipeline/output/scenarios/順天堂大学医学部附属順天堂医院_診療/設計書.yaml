  display_type: CLASSIFICATION
  range_values:
  - order: '1'
    value: 予約
  - order: '2'
    value: 変更
  - order: '3'
    value: キャンセル
  - order: '4'
    value: 問合せ
  item_default: true
  editable: true
  deletable: false
  notes: 'Gen2 enum: 予約/変更/キャンセル/問合せ'
