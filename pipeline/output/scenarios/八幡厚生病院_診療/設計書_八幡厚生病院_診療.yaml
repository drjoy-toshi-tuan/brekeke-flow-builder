# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管案件（デモ環境）。Gen2プロンプトの3ルート（新規予約/予約変更/予約キャンセル）を第3世代フロー構造に変換"
  - "冒頭で携帯/固定分岐（Gen2踏襲）。携帯の場合のみ予約手段確認（DTMF 1=ネット誘導 / 2=電話対応）を提供"
  - "冒頭アナウンスが携帯と固定で2種類: 携帯『八幡厚生病院の、予約専用、AI電話です。まずはじめに、申し込み方法をお伺いします。』/ 固定『お電話ありがとうございます。八幡厚生病院の、予約専用、AI電話です。』"
  - "本人確認で本人/本人以外を判定。本人以外の場合のみ patientName2（電話口氏名）+ relationship（続柄）をメインフロー内で追加聴取してから氏名サブフローへ合流"
  - "氏名サブフローは本人/本人以外共通。patientName に患者名を格納。Gen2では本人以外の場合『受診を希望される患者さんのお名前を教えてください。』と文言差があったが、Gen3では氏名サブフロー共通文言『ご本人様のお名前を伺います。...』に統一（confirmation_items参照）"
  - "生年月日サブフローは復唱ありバージョンを使用（Gen2で (生年月日)でよろしいでしょうか？ の復唱が必須）"
  - "電話番号サブフローは incoming-classifier で携帯/固定/IP を判定。携帯は着信番号を自動格納して復唱確認、その他は連絡先聴取+Phone Normalization+復唱確認。返却値で phonetype をセット（1=携帯 / 2=その他）"
  - "用件の DTMF 対応: 1=新規予約, 2=予約変更, 3=予約キャンセル。Gen2キーワード『薬/お薬』は『新規』扱い、『電気/でんき』は『新規』扱い（Gen2 1-8の特殊マッピング踏襲）"
  - "受診歴の結果で classification を『初診』/『再診』に上書き（Gen2踏襲）。history コンテキストには『なし』/『あり』を別途保存"
  - "ルート別聴取順序: 初診=症状→終話、再診=診察券番号→予約希望日→症状→終話、変更=診察券番号→予約日→予約希望日→症状→終話、キャンセル=診察券番号→予約日→終話"
  - "予約日は datetime 形式（yyyy-MM-dd 00:00:00）で正規化。10月以降に1〜9月を言われた場合は翌年扱い（Gen2仕様）"
  - "予約希望日は text 形式のまま保存（日付形式に正規化しない）。Gen2 1-8『予約希望日はフリーワードで言われたまま文字起こしする』の仕様に忠実"
  - "smsFlag分岐: 電話番号サブフロー返却値で終話を分岐。携帯=smsFlag=1（SMS送信あり）、その他=smsFlag=-1（SMS送信なし）、ネット誘導=smsFlag=3（申込URL送信）"
  - "終話TTS文言は携帯用と固定用で差をつける。携帯『3日以内にSMSか電話にて返答いたします』、固定『3日以内にお電話にて返答いたします』（SMSの言及なし）"
  - "代表電話番号: 093-691-3344（ハイフンなし: 0936913344）。END_聴取失敗で読み上げ"
  - "リトライ上限: 全聴取ステップで3回（初回+2回リトライ）。Gen2仕様に忠実。上限到達時は END_聴取失敗 へ遷移"
  - "全STTモジュールのTIMEOUT/ERRORは、対応するリトライカウンター（Speech Retry Counter）に接続する。フロー図ではNO_RESULTのみ明示しているが、TIMEOUT/ERRORも同一のリトライカウンターに接続すること"
  - "Gen2の endpoint/smsFlag/Incoming_date/Incoming_phone_number フィールドは saveContextModel2DB に含めない（標準フィールド dateOfCall/telephoneNumber で代替、smsFlag は saveCompletionFlag2db パラメータ）"
  - "Gen2の reason/clinicalDepartment は本フローで使用しないため saveContextModel2DB から除外"
  - "複合発話（例: 『5月10日に内科で予約しているヤマダタロウですが、次回の予約日を変えたいです』）の場合、第3世代では1発話1意図が原則。Gen2では複合情報を記録する仕様だったが、Gen3ではステップを分離して1つずつ処理する設計とした"
  - "患者名のカタカナ変換は OpenAI normalize で実施（Gen2 1-13『必ず、カタカナに変換し格納すること』を踏襲）"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id"
    resolved: false
    notes: "Dr.JOY管理画面で確認"
  - item: "営業時間（曜日・時間帯）とacceptance_times配置の要否"
    resolved: false
    notes: "END_エラー終了アナウンスから『祝日を除く月〜金 9:00-17:00』と推定し use_acceptance_times: true で設定。Dr.JOY側での実際のスケジュール設定が必要"
  - item: "時間外アナウンス文言"
    resolved: false
    notes: "Gen2に明示なし。END_エラー終了の文言を参考に仮設定。差し替え要否を確認"
  - item: "非通知受付の方針（Gen2との差分）"
    resolved: false
    notes: "Gen2では非通知でも固定ルートへ合流して応答していたが、Gen3標準仕様に合わせ『END_非通知で受付拒否』に変更。Gen2仕様を維持すべきか要確認。維持する場合は incoming-classifier の非通知分岐を『冒頭アナウンス_固定』へ付け替える"
  - item: "本人以外ルートの氏名聴取TTS文言"
    resolved: false
    notes: "Gen2では『受診を希望される患者さんのお名前を教えてください。』だが、Gen3では氏名サブフロー共通文言『ご本人様のお名前を伺います。...』に統一。文言差を解消する場合はプロパティ個別対応が必要"
  - item: "status=7（ネット誘導）→status=2 変更の妥当性"
    resolved: false
    notes: "Gen2では status=7 にネット誘導をマップしていたが、Gen3 directorルールでは status=7 が『非通知』に割り当てられているため status=2（代表案内）に変更。Dr.JOY側の運用表示で支障がないか確認"
  - item: "smsFlag=9（途中切断時）の扱い"
    resolved: false
    notes: "Gen2では通話途中切断時に smsFlag=9 を設定する仕様だったが、Gen3では saveCompletionFlag2db 未呼出の場合は自動的にデフォルト値となる。Gen2の『途中切断にSMSを送る』要件を維持する場合、別途 saveCompletionFlag2db_途中切断(smsFlag=9) モジュールの追加が必要"
  - item: "SMS送信文面（Dr.JOY側設定）"
    resolved: false
    notes: "実際に患者に送信されるSMS文面はDr.JOY管理画面で設定。設計書では smsFlag=1/3 のフラグ設定のみ指示"
  - item: "対象環境（demo で仮設定）"
    resolved: false
    notes: "Gen2移管ノートに『環境: デモ』とあるため demo で仮設定。本番環境への移行タイミングを確認"
  - item: "用件の DTMF 特殊キーワード対応"
    resolved: false
    notes: "Gen2 1-8 で『印刷/定期/新薬/再診/最新/禁忌』を『診察』扱いにする指示があるが、本フローには『診察』用件がないため『新規』扱いにマッピング。これが意図通りか確認"
