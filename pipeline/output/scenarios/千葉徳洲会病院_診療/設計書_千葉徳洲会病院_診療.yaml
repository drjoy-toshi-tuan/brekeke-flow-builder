    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "contact"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "電話"
      - "ショートメッセージ"
      - "どちらでもいい"
    notes: "携帯電話の場合のみ聴取（ContextMatchRouterで電話番号サブフロー返却値=携帯の場合のみ分岐）"

  # === サブフロー聴取項目（参考情報 -- 静的JSONコピーのため構造変更不可）===
  - order: 14
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー内。profile_words: 氏名辞書"

  - order: 15
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: false
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels: []
    notes: "サブフロー内。復唱なし（Gen2で生年月日復唱禁止）。DTMF 8桁（YYYYMMDD形式、例: 19900115）"

  - order: 16
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "サブフロー内。Phone Normalization + Re-confirmation。incoming-classifierで携帯/その他分岐。DTMF 最大11桁（電話番号入力、例: 09012345678）"

  - order: 17
    name: "診察券番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: false
    save_to: "medicalCardNumber"
    openai_processing: "classify"
    output_format: "number"
    output_labels:
      - "数字"
      - "わからない"
    notes: "サブフロー内。再診/変更/キャンセル/確認ルートで使用。「わからない」も許容。DTMF 最大10桁（診察券番号入力）"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "当日翌日確認"
    tts_announcement: "お電話ありがとうございます。千葉徳洲会病院の予約専用AI電話です。まず初めに、今回のお問い合わせは当日もしくは翌日の予約に関する内容ですか。はいまたはいいえでお答えください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」を含む"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「違います」を含む、またはその他の回答"
          output: "いいえ"
        - input: "無音・認識不可"
          output: "NO_RESULT"
      no_result_condition: "無音・認識不可"
    save_to: null
    next_step: "はい→END_当日翌日受付不可 / いいえ→サブフロー遷移_氏名聴取"
    retry_failure: "end_failure"

  - step_name: "用件確認"
    tts_announcement: "ご用件を次の4つのうちいずれかでお話ください。1、予約を取る。2、変更する。3、キャンセルする。4、予約を確認する。それではお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「予約を取る」「一」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「変更する」「二」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「取り消し」「三」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」「問い合わせ」「四」を含む"
          output: "確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→受診歴確認 / 変更→診察券番号(変更) / キャンセル→診察券番号(キャンセル) / 確認→診察券番号(確認)"
    retry_failure: "end_failure"

  - step_name: "受診歴確認"
    tts_announcement: "当院でのご受診は初めてですか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "初回"
        - "再診"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「初めて」「初診」を含む"
          output: "初回"
        - input: "「いいえ」「通っている」「再診」を含む"
          output: "再診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "history"
    next_step: "初回→紹介状確認 / 再診→サブフロー遷移_診察券番号_再診"
    retry_failure: "end_failure"

  - step_name: "紹介状確認"
    tts_announcement: "他の医療機関からの紹介状もしくは検査結果はお持ちですか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "有り"
        - "無し"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「持っている」「あります」を含む"
          output: "有り"
        - input: "「いいえ」「持っていない」「ありません」を含む"
          output: "無し"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "introduction"
    next_step: "有り→病名 / 無し→END_紹介状無し"
    retry_failure: "end_failure"

  - step_name: "病名"
    tts_announcement: "受診目的の病名をお話ください。わからない場合は「わからない」とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "disease"
    next_step: "診療科_予約用"
    retry_failure: "skip"

  - step_name: "症状"
    tts_announcement: "受診目的の症状をお話ください。わからない場合は「わからない」とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "symptoms"
    next_step: "診療科_予約用"
    retry_failure: "skip"

  - step_name: "診療科_予約用"
    tts_announcement: "受診を希望される診療科をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{診療科名}"
        - "予約センター案内"
        - "健診センター案内"
        - "NO_RESULT"
      mapping:
        - input: "眼科/放射線治療科/麻酔科/緩和ケア科/小児科/皮膚科"
          output: "予約センター案内"
        - input: "健康診断/人間ドック/市民健診/健診"
          output: "健診センター案内"
        - input: "上記以外の有効な診療科名"
          output: "{正規化された診療科名}"
        - input: "認識不可"
          output: "NO_RESULT"
      no_result_condition: "診療科名を抽出できない"
    save_to: "clinicalDepartment"
    next_step: "予約センター案内→END_予約センター案内 / 健診センター案内→END_健診センター案内 / {科名}→希望時期"
    retry_failure: "skip"

  - step_name: "診療科_変更キャンセル用"
    tts_announcement: "予約票に記載されている診療科をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{診療科名}"
        - "予約センター案内"
        - "健診センター案内"
        - "NO_RESULT"
      mapping:
        - input: "眼科/放射線治療科/麻酔科/緩和ケア科/小児科/皮膚科"
          output: "予約センター案内"
        - input: "健康診断/人間ドック/市民健診/健診"
          output: "健診センター案内"
        - input: "上記以外の有効な診療科名"
          output: "{正規化された診療科名}"
        - input: "認識不可"
          output: "NO_RESULT"
      no_result_condition: "診療科名を抽出できない"
    save_to: "clinicalDepartment"
    next_step: "予約センター案内→END_予約センター案内 / 健診センター案内→END_健診センター案内 / {科名}→予約日"
    retry_failure: "skip"

  - step_name: "予約日"
    tts_announcement: "予約票に記載されている予約日を「7月1日」のように日付でお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト"
      mapping:
        - input: "日付表現"
          output: "YYYY-MM-DD形式（10月以降に1-9月→翌年）"
      no_result_condition: "日付として解釈できない"
    save_to: "reservationDate"
    next_step: "ContextMatchRouter(classification)で分岐: 変更→希望時期 / キャンセル→理由"
    retry_failure: "skip"

  - step_name: "希望時期"
    tts_announcement: "受診を希望されている日付や時期をご自由にお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "desired"
    next_step: "合流A（連絡方法分岐）"
    retry_failure: "skip"

  - step_name: "理由"
    tts_announcement: "キャンセル理由などをご自由にお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "合流A（連絡方法分岐）"
    retry_failure: "skip"

  - step_name: "確認内容"
    tts_announcement: "ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」など、内容を簡潔にお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
        - "健診センター案内"
      mapping:
        - input: "「健康診断」「市民健診」「人間ドック」「定期健診」「特定健診」「脳ドック」「心臓ドック」「健診」「健康管理課」を含む"
          output: "健診センター案内"
        - input: "上記以外"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "details"
    next_step: "健診センター案内→END_健診センター案内 / フリーテキスト→合流A（連絡方法分岐）"
    retry_failure: "skip"

  - step_name: "連絡方法"
    tts_announcement: "当院からのご連絡を、電話、ショートメッセージ、または、どちらでも良い、のいずれかでお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "電話"
        - "ショートメッセージ"
        - "どちらでもいい"
        - "NO_RESULT"
      mapping:
        - input: "「電話」を含む"
          output: "電話"
        - input: "「ショートメッセージ」「SMS」「ショートメール」を含む"
          output: "ショートメッセージ"
        - input: "「どちらでも」「どっちでも」を含む"
          output: "どちらでもいい"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "contact"
    next_step: "合流B（RAGサブフロー）"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_times判定で時間外（またはTIMEOUT/ERROR）"
    tts_announcement: "お電話ありがとうございます。千葉徳洲会病院です。大変申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（当日翌日確認/用件確認/受診歴確認/紹介状確認）"
    tts_announcement: "申し訳ございません。確認できませんでしたので、折り返し担当者よりご確認いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 施設固有の異常系 ---
  - name: "END_当日翌日受付不可"
    condition: "当日翌日確認で「はい」"
