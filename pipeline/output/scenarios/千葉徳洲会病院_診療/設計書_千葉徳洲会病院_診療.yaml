      フロー名プレフィックスのみ「千葉徳洲会病院$」に置換。構造・接続・スクリプトは一切変更不可。
      ※ Gen2で生年月日の復唱は禁止されているため復唱なし版を使用。

  - flow_name: "千葉徳洲会病院$電話番号聴取_20260410"
    diagram: |
      docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。
      フロー名プレフィックスのみ「千葉徳洲会病院$」に置換。構造・接続・スクリプトは一切変更不可。

  - flow_name: "千葉徳洲会病院$診察券番号聴取_20260410"
    diagram: |
      docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピー。
      フロー名プレフィックスのみ「千葉徳洲会病院$」に置換。構造・接続・スクリプトは一切変更不可。

  - flow_name: "千葉徳洲会病院$RAG検索_20260410"
    diagram: |
      docs/reference/bivr/samples/json/RAG検索.json を完全コピー。
      フロー名プレフィックスのみ「千葉徳洲会病院$」に置換。構造・接続・スクリプトは一切変更不可。

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # --- 標準フィールド（itemDefault: true）---
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "新規"
      - order: "2"
        value: "再診"
      - order: "3"
        value: "変更"
      - order: "4"
        value: "キャンセル"
      - order: "5"
        value: "確認"
    item_default: true
    editable: true
    deletable: false
    notes: "用件選択結果。Gen2の「予約」は受診歴確認後に「新規」または「再診」に更新される"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "患者氏名（フルネーム）"

  - context_name: "medicalCardNumber"
