# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
  patterns:
    - condition: "^新規$|^再診$"
      sms_flag: "1"
      notes: "予約ルート（新規紹介状あり/再診）"
    - condition: "^変更$|^キャンセル$"
      sms_flag: "2"
      notes: "変更/キャンセルルート"
    - condition: "^確認$"
      sms_flag: "3"
      notes: "確認ルート"

