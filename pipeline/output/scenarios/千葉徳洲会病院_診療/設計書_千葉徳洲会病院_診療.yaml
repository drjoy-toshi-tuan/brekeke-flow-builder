# 確認レポート: docs/designs/確認レポート_千葉徳洲会病院_診療_20260410.md
# ゴールデンテンプレート参照: 予約管理型.yaml
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "千葉徳洲会病院"
  group_name: "千葉徳洲会病院"
  flow_name: "千葉徳洲会病院$診療_20260410"
  target_facility: "千葉徳洲会病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: ""                # 050番号未記載。IVR設定時に確認
  business_hours: "デフォルト設定（Gen2に営業時間チェックの記載なしだが、Gen2移管デフォルトとしてacceptance_timesを配置。具体的なスケジュールはDr.JOY側で設定）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "千葉徳洲会病院$診療_20260410"
      role: "main"
      description: "冒頭チェーン → 当日翌日確認 → 個人情報サブフロー（氏名・生年月日・電話番号）→ 用件確認（4択）→ ルート別聴取 → 連絡方法分岐 → RAGサブフロー → smsFlag分岐 → 終話"
  subflows:
    - name: "千葉徳洲会病院$氏名聴取_20260410"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。氏名聴取.json を完全コピー"

    - name: "千葉徳洲会病院$生年月日聴取_20260410"
      target: "生年月日聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen2で生年月日の復唱禁止と明記。生年月日聴取_復唱なし.json を完全コピー"

    - name: "千葉徳洲会病院$電話番号聴取_20260410"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen2で電話番号のみ復唱許可。電話番号聴取_復唱あり.json を完全コピー"

    - name: "千葉徳洲会病院$診察券番号聴取_20260410"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "再診/変更/キャンセル/確認ルートで使用。診察券番号聴取.json を完全コピー。メインフローから複数箇所でJump to Flowする"

    - name: "千葉徳洲会病院$RAG検索_20260410"
      target: "RAG検索"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "パターン2: 全終話前に配置。RAG検索.json を完全コピー。Gen2の「最後の質問」位置に配置"

# --- セクション3: フローの目的 ---
purpose: "患者からの予約専用AI電話を受け、当日翌日確認→患者情報（氏名・生年月日・連絡先電話番号）→用件（予約/変更/キャンセル/確認）→ルート別の詳細聴取を行い、折り返し受付を自動化する。予約不可診療科は予約センター案内、健康診断は健診センター案内に誘導する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "千葉徳洲会病院$診療_20260410"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(status=2, smsFlag=-1) → 非通知_アナウンス(TTS) → 切断
            └─ 通常/携帯/固定 → acceptance_times
                ├─ 時間外/TIMEOUT/ERROR → 完了フラグ_時間外(status=6, smsFlag=-1) → END_時間外(TTS) → 切断
                └─ 受付可(true) → 冒頭_アナウンス(TTS)
                                  → 当日翌日確認(TTS) → 入力_当日翌日確認(DTMF STT, max_dtmf_length=1) → OpenAI_当日翌日確認
                                      ├─ はい → 完了フラグ_当日翌日(status=2, smsFlag=-1) → END_当日翌日受付不可(TTS) → 切断
                                      ├─ いいえ → ★個人情報聴取へ
                                      └─ NO_RESULT → リトライ_当日翌日確認
                                                        ├─ Retry → 当日翌日確認(TTS)
                                                        └─ No more → 完了フラグ_聴取失敗(status=3, smsFlag=-1) → END_聴取失敗(TTS) → 切断

      ★個人情報聴取（用件確認の前に実施 -- Gen2設計順序を維持）
        → サブフロー遷移_氏名聴取(Custom Jump to Flow)
        → サブフロー遷移_生年月日聴取(Custom Jump to Flow)
        → サブフロー遷移_電話番号聴取(Custom Jump to Flow)
        → 用件確認(TTS) → 入力_用件確認(DTMF STT, max_dtmf_length=1) → OpenAI_用件確認
            ├─ 予約 → ★予約ルート
            ├─ 変更 → ★変更ルート
            ├─ キャンセル → ★キャンセルルート
            ├─ 確認 → ★確認ルート
            └─ NO_RESULT → リトライ_用件確認
                              ├─ Retry → 用件確認(TTS)
                              └─ No more → END_聴取失敗 → 切断

      ★予約ルート
        → 受診歴確認(TTS) → 入力_受診歴確認(AmiVoice STT) → OpenAI_受診歴確認
            ├─ 初回 → 紹介状確認(TTS) → 入力_紹介状確認(AmiVoice STT) → OpenAI_紹介状確認
            │     ├─ 有り → 病名(TTS) → 入力_病名(AmiVoice STT) → OpenAI_病名
            │     │     → 診療科_予約用(TTS) → 入力_診療科_予約用(AmiVoice STT) → OpenAI_診療科_予約用
            │     │         ├─ 予約センター案内 → 完了フラグ_予約センター(status=2, smsFlag=-1) → END_予約センター案内(TTS) → 切断
            │     │         ├─ 健診センター案内 → 完了フラグ_健診(status=7, smsFlag=-1) → END_健診センター案内(TTS) → 切断
            │     │         └─ {科名} → 希望時期(TTS) → 入力_希望時期(AmiVoice STT) → OpenAI_希望時期 → ★合流A
            │     └─ 無し → 完了フラグ_紹介状無し(status=2, smsFlag=-1) → END_紹介状無し(TTS) → 切断
            ├─ 再診 → サブフロー遷移_診察券番号_再診(Custom Jump to Flow)
            │     → 症状(TTS) → 入力_症状(AmiVoice STT) → OpenAI_症状
            │     → 診療科_予約用（新規と共有）
            │         ├─ 予約センター案内 → END_予約センター案内 → 切断
            │         ├─ 健診センター案内 → END_健診センター案内 → 切断
            │         └─ {科名} → 希望時期 → ★合流A
            └─ NO_RESULT → リトライ_受診歴確認
                              ├─ Retry → 受診歴確認(TTS)
                              └─ No more → END_聴取失敗 → 切断

      ★変更ルート
        → サブフロー遷移_診察券番号_変更(Custom Jump to Flow)
        → 診療科_変更キャンセル用(TTS) → 入力_診療科_変更キャンセル用(AmiVoice STT) → OpenAI_診療科_変更キャンセル用
            ├─ 予約センター案内 → END_予約センター案内 → 切断
            ├─ 健診センター案内 → END_健診センター案内 → 切断
            └─ {科名} → 予約日(TTS) → 入力_予約日(AmiVoice STT) → OpenAI_予約日
                          → 希望時期（予約ルートと共有） → ★合流A

      ★キャンセルルート
        → サブフロー遷移_診察券番号_キャンセル(Custom Jump to Flow)
        → 診療科_変更キャンセル用（変更ルートと共有）
            ├─ 予約センター案内 → END_予約センター案内 → 切断
            ├─ 健診センター案内 → END_健診センター案内 → 切断
            └─ {科名} → 予約日（変更ルートと共有）
                          → 理由(TTS) → 入力_理由(AmiVoice STT) → OpenAI_理由 → ★合流A

      ★確認ルート
        → サブフロー遷移_診察券番号_確認(Custom Jump to Flow)
        → 確認内容(TTS) → 入力_確認内容(AmiVoice STT) → OpenAI_確認内容
            ├─ 健診センター案内 → END_健診センター案内 → 切断
            └─ {フリーテキスト} → ★合流A

      ★合流A → 連絡方法分岐(ContextMatchRouter: 電話番号サブフロー返却値 phoneType)
        ├─ 携帯 → 連絡方法(TTS) → 入力_連絡方法(AmiVoice STT) → OpenAI_連絡方法 → ★合流B
        └─ その他 → ★合流B

      ★合流B → サブフロー遷移_RAG検索(Custom Jump to Flow)
        → smsFlag分岐(ContextMatchRouter: OpenAI_用件確認の出力値)
            ├─ 予約 → 完了フラグ_受付完了_sms1(status=1, smsFlag=1) → END_受付完了(TTS) → 切断
            ├─ 変更 → 完了フラグ_受付完了_sms2(status=1, smsFlag=2) → END_受付完了(TTS) → 切断
            ├─ キャンセル → 完了フラグ_受付完了_sms2(status=1, smsFlag=2) → END_受付完了 → 切断
            └─ 確認 → 完了フラグ_受付完了_sms3(status=1, smsFlag=3) → END_受付完了 → 切断

      ─── メインフロー内終話パターン ───
      END_非通知(status=2) → 切断
      END_時間外(status=6) → 切断
      END_聴取失敗(status=3) → 切断
      END_当日翌日受付不可(status=2) → 切断
      END_紹介状無し(status=2) → 切断
      END_予約センター案内(status=2) → 切断
      END_健診センター案内(status=7) → 切断
      END_受付完了(status=1, smsFlag=1/2/3) → 切断
    notes: |
      - acceptance_timesを配置（Gen2に営業時間チェックの記載なしだが、Gen2移管デフォルトとして配置。具体的なスケジュールはDr.JOY側で設定）
      - 個人情報聴取は用件確認の前に実施（Gen2設計順序を維持）
      - 診療科チェーンは2セット（予約用/変更キャンセル用）でTTS文言が異なる
      - 希望時期チェーンは予約ルートと変更ルートで共有
      - 予約日チェーンは変更ルートとキャンセルルートで共有
      - smsFlag分岐はContextMatchRouterで用件値を参照し、個別のsaveCompletionFlag2dbに分岐

  - flow_name: "千葉徳洲会病院$氏名聴取_20260410"
    diagram: |
      docs/reference/bivr/samples/json/氏名聴取.json を完全コピー。
      フロー名プレフィックスのみ「千葉徳洲会病院$」に置換。構造・接続・スクリプトは一切変更不可。

  - flow_name: "千葉徳洲会病院$生年月日聴取_20260410"
    diagram: |
