# --- セクション11: 特記事項・制約 ---
special_notes:
  - "個人情報聴取（氏名・生年月日・電話番号）は用件確認の前に実施する（Gen2設計順序を維持）。通常の「用件確認→個人情報」とは逆の順序"
  - "生年月日の復唱は禁止（Gen2プロンプトで明記）。復唱なし版サブフローを使用"
  - "電話番号のみ復唱あり（Gen2で唯一復唱が許可された項目）"
  - "診察券番号は再診/変更/キャンセル/確認ルートのみで聴取。新規（紹介状あり）ルートでは不要"
  - "診療科チェーンは2セット（予約用/変更キャンセル用）。TTS文言が異なるが、profile_wordsとOpenAI分類ロジックは共通"
  - "予約不可診療科: 眼科/放射線治療科/麻酔科/緩和ケア科/小児科/皮膚科 → 予約センター案内（047-774-0489）"
  - "婦人科は予約センター案内にしてはいけない（Gen2で明記）"
  - "健康診断 → 健診センター案内（047-774-0385）。確認内容ステップでも健診キーワードで健診センター案内に分岐"
  - "連絡方法聴取は携帯電話の場合のみ。ContextMatchRouterで電話番号サブフロー結果（phoneType）を参照して分岐"
  - "smsFlag分岐: 新規/再診=1, 変更/キャンセル=2, 確認=3。ContextMatchRouterでclassification値を参照"
  - "予約日のフォーマット: YYYY-MM-DD。10月以降に1-9月を言われた場合は翌年とする"
  - "acceptance_timesをデフォルト配置（Gen2に営業時間チェックの記載なしだが、Gen2移管デフォルトとして配置。具体的なスケジュールはDr.JOY側で設定）"
  - "RAGサブフローはパターン2（全終話前）。Gen2の「最後の質問」位置に配置"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id"
    resolved: false
  - item: "営業時間（acceptance_timesの要否と曜日・時間帯）"
    resolved: false
  - item: "非通知アナウンス文言（デフォルト使用中）"
    resolved: false
  - item: "対応電話番号（050番号）"
    resolved: false
  - item: "smsFlag=1/2/3のDr.JOY側SMS文面"
    resolved: false
  - item: "環境指定（デモで仮設定中）"
    resolved: false
