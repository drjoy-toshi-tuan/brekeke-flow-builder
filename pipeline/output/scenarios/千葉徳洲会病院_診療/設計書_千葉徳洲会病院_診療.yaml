    context_name_jp: "連絡方法"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "携帯電話の場合のみ聴取。電話/ショートメッセージ/どちらでもいい"

  - context_name: "question"
    context_name_jp: "最後の問い合わせ"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "RAGサブフロー内で聴取・保存される内容"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # === メインフロー聴取項目 ===
  - order: 1
    name: "当日翌日確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "DTMF 1=はい, 2=いいえ。「はい」→END_当日翌日受付不可。「いいえ」・その他→氏名聴取へ"

  - order: 2
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "DTMF 1=予約, 2=変更, 3=キャンセル, 4=確認"

  - order: 3
    name: "受診歴確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "history"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "初回"
      - "再診"
    notes: "予約ルートのみ。「初回」→classification=新規, history=初回。「再診」→classification=再診, history=再診"

  - order: 4
    name: "紹介状確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "introduction"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "有り"
      - "無し"
    notes: "新規ルートのみ。「有り」→病名聴取へ。「無し」→END_紹介状無し"

  - order: 5
    name: "病名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "disease"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "新規（紹介状あり）ルートのみ。フリーテキスト。「わからない」も許容"

  - order: 6
    name: "症状"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "symptoms"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "再診ルートのみ。フリーテキスト。「わからない」も許容"

  - order: 7
    name: "診療科_予約用"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "label"
    output_labels:
      - "{診療科名}"
      - "予約センター案内"
      - "健診センター案内"
    notes: "新規/再診ルート。TTS: 受診を希望される診療科。profile_words: 診療科辞書。予約不可6科→予約センター案内、健康診断→健診センター案内"

  - order: 8
    name: "診療科_変更キャンセル用"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "label"
    output_labels:
      - "{診療科名}"
      - "予約センター案内"
      - "健診センター案内"
    notes: "変更/キャンセルルート。TTS: 予約票に記載されている診療科。profile_wordsは診療科_予約用と同一"

  - order: 9
    name: "予約日"
    stt_type: "AmiVoice_STT"
