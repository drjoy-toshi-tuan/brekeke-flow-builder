  - order: 11
    name: "理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "キャンセルルートのみ。フリーテキスト"

  - order: 12
    name: "確認内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "judge"
    output_format: "free_text"
    output_labels:
      - "フリーテキスト"
      - "健診センター案内"
    notes: "確認ルートのみ。健診キーワード（健康診断/市民健診/人間ドック等）検出で健診センター案内分岐。それ以外はフリーテキスト保存"

  - order: 13
    name: "連絡方法"
