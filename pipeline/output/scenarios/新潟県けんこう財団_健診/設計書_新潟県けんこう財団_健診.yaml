    resolved: false
  - item: "休日リスト（2026年版）の正確性 -- 年度更新が必要"
    resolved: false
  - item: "企業名と担当者名を1ステップで統合聴取してよいか"
    resolved: false
  - item: "希望時間の入力形式（プリセット選択か自由入力か）"
    resolved: false
  - item: "受診票なし時のフロー詳細（施設選択スキップ→SMS/WEB案内へ直行でよいか）"
    resolved: false
  - item: "smsFlag分岐（予約完了/変更完了でSMS送信、キャンセル/企業問合せ/その他ではSMS送信なし）で正しいか"
