  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件選択"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "健診の予約"
      - "予約日時の変更"
      - "予約のキャンセル"
      - "企業問合せ"
      - "その他問合せ"
    notes: "DTMF 1=健診の予約, 2=予約日時の変更, 3=予約のキャンセル, 4=企業ご担当者様からの問い合わせ, 5=その他お問い合わせ"

  - order: 2
    name: "受診票確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "history"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "あり"
      - "なし"
    notes: "DTMF 1=はい（あり）, 2=いいえ（なし）。予約ルートのみ"

  - order: 3
    name: "施設選択"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "facility"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "東新潟"
      - "西新潟"
      - "長岡"
    notes: "DTMF 1=東新潟, 2=西新潟, 3=長岡。予約ルート（受診票あり）のみ"

  - order: 4
    name: "登録番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: false
    save_to: "medicalCardNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "DTMF数字入力。受診票記載の登録番号。termdtmf=#"

  - order: 5
    name: "予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "date_text"
    output_labels: []
    notes: "変更・キャンセルルート。現在の予約日を聴取。復唱確認（Re-confirmation node data）。DTMF数字入力（日付を数字で入力、例: 4月15日→0415）。termdtmf=#"

  - order: 6
    name: "希望日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "desiredDate"
    openai_processing: "normalize"
    output_format: "date_text"
    output_labels: []
    notes: "予約・変更ルート。希望受診日を聴取。復唱確認（Re-confirmation node data）。当日予約判定スクリプトあり。DTMF数字入力（日付を数字で入力、例: 4月15日→0415）。termdtmf=#"

  - order: 7
    name: "希望時間"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "desiredTime"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "予約・変更ルート。希望時間を聴取。復唱確認（Re-confirmation node data）。DTMF数字入力（時間を数字で入力、例: 10時30分→1030）。termdtmf=#"

  - order: 8
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "氏名聴取サブフロー内。予約・変更・キャンセルルート"

  - order: 9
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "normalize"
    output_format: "date_text"
    output_labels: []
    notes: "生年月日聴取サブフロー内（復唱あり）。予約・変更・キャンセルルート。DTMF数字入力（例: 1990年1月5日→19900105）。termdtmf=#"

  - order: 10
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "電話番号聴取サブフロー内（復唱あり）。予約・変更・キャンセルルート。DTMF数字入力（電話番号を数字で入力）。termdtmf=#"

  - order: 11
    name: "企業問合せ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "企業問合せルート。AmiVoice STTのみ（DTMF入力不可能なフリーテキスト）"

  - order: 12
    name: "企業名担当者名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "companyName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "企業問合せルート。AmiVoice STTのみ（DTMF入力不可能なフリーテキスト）"

  - order: 13
    name: "企業連絡先電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: false
    save_to: "companyPhone"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "企業問合せルート。DTMF数字入力"

  - order: 14
    name: "その他問合せ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "その他問合せルート（休日のみ。営業日は有人転送）。AmiVoice STTのみ（DTMF入力不可能なフリーテキスト）"

  - order: 15
    name: "折り返し確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "折り返し希望"
      - "折り返し不要"
    notes: "DTMF 1=折り返し希望, 2=折り返し不要。リトライ上限到達時の共通遷移先"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件選択"
    tts_announcement: "ご用件をお選びください。健診のご予約は1、予約日時の変更は2、予約のキャンセルは3、企業ご担当者様からのお問い合わせは4、その他のお問い合わせは5を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "健診の予約"
        - "予約日時の変更"
        - "予約のキャンセル"
        - "企業問合せ"
        - "その他問合せ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「健診」を含む"
          output: "健診の予約"
        - input: "DTMF 2 または「変更」を含む"
          output: "予約日時の変更"
        - input: "DTMF 3 または「キャンセル」「取り消し」を含む"
          output: "予約のキャンセル"
        - input: "DTMF 4 または「企業」「担当者」を含む"
          output: "企業問合せ"
        - input: "DTMF 5 または「その他」「問い合わせ」を含む"
          output: "その他問合せ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "各用件ルートへ分岐"
    retry_failure: "end_failure"

  - step_name: "受診票確認"
    tts_announcement: "お手元に健診のお知らせ、受診票はお持ちですか。お持ちの方は1、お持ちでない方は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「持っている」を含む"
          output: "あり"
        - input: "DTMF 2 または「いいえ」「持っていない」を含む"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "history"
    next_step: "あり→施設選択 / なし→SMS/WEB案内フロー"
    retry_failure: "end_failure"

  - step_name: "施設選択"
    tts_announcement: "受診を希望される施設をお選びください。東新潟は1、西新潟は2、長岡は3を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "東新潟"
        - "西新潟"
        - "長岡"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「東新潟」「東」「ひがし」を含む"
          output: "東新潟"
        - input: "DTMF 2 または「西新潟」「西」「にし」を含む"
          output: "西新潟"
        - input: "DTMF 3 または「長岡」「ながおか」を含む"
          output: "長岡"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "facility"
    next_step: "登録番号聴取"
    retry_failure: "end_failure"

  - step_name: "登録番号"
    tts_announcement: "受診票に記載されている登録番号をプッシュボタンで入力してください。入力が終わりましたらシャープを押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "数字列"
        - "NO_RESULT"
      mapping:
        - input: "DTMF数字入力"
          output: "数字列（そのまま保存）"
        - input: "入力なし"
          output: "NO_RESULT"
      no_result_condition: "数字入力がない"
    save_to: "medicalCardNumber"
    next_step: "希望日聴取"
    retry_failure: "end_failure"

  - step_name: "予約日"
    tts_announcement: "現在のご予約日をお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY/MM/DD形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "「12月25日」「令和7年3月15日」等の日付発話"
          output: "YYYY/MM/DD形式に正規化"
        - input: "日付として認識できない"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない発話"
    save_to: "reservationDate"
    next_step: "希望日聴取（変更ルート）/ ジャンプ_氏名聴取（キャンセルルート）"
    retry_failure: "end_failure"

  - step_name: "希望日"
    tts_announcement: "ご希望の受診日をお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY/MM/DD形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "「12月25日」「来週の月曜」等の日付発話"
          output: "YYYY/MM/DD形式に正規化"
        - input: "日付として認識できない"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない発話"
    save_to: "desiredDate"
    next_step: "script_当日予約判定（希望日が本日の場合）→ 希望時間聴取"
    retry_failure: "end_failure"

  - step_name: "希望時間"
    tts_announcement: "ご希望のお時間をお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "HH:MM形式の時間"
        - "NO_RESULT"
      mapping:
        - input: "「午前10時」「14時半」等の時間発話"
          output: "HH:MM形式に正規化"
        - input: "時間として認識できない"
          output: "NO_RESULT"
      no_result_condition: "時間として認識できない発話"
    save_to: "desiredTime"
    next_step: "ジャンプ_氏名聴取"
    retry_failure: "end_failure"

  - step_name: "企業問合せ内容"
    tts_announcement: "お問い合わせの内容をお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "企業名担当者名聴取"
    retry_failure: "skip"

  - step_name: "企業名担当者名"
    tts_announcement: "企業名とご担当者のお名前をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "companyName"
    next_step: "企業連絡先電話番号聴取"
    retry_failure: "skip"

  - step_name: "企業連絡先電話番号"
    tts_announcement: "ご連絡先のお電話番号をプッシュボタンで入力してください。入力が終わりましたらシャープを押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "電話番号"
        - "NO_RESULT"
      mapping:
        - input: "DTMF数字入力"
          output: "電話番号（数字列そのまま保存）"
        - input: "入力なし"
          output: "NO_RESULT"
      no_result_condition: "数字入力がない"
    save_to: "companyPhone"
    next_step: "完了フラグ_企業問合せ → END_企業問合せ完了"
    retry_failure: "end_failure"

  - step_name: "その他問合せ内容"
    tts_announcement: "お問い合わせの内容をお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "完了フラグ_問合せ → END_問合せ完了"
    retry_failure: "skip"

  - step_name: "折り返し確認"
    tts_announcement: "担当者からの折り返しをご希望されますか。ご希望の場合は1、ご希望でない場合は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "折り返し希望"
        - "折り返し不要"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「希望」を含む"
          output: "折り返し希望"
        - input: "DTMF 2 または「いいえ」「不要」を含む"
          output: "折り返し不要"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "折り返し希望→END_折返し希望 / 折り返し不要→END_折返し不要 / NO_RESULT→END_聴取失敗"
    retry_failure: "end_failure"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_海外"
    condition: "海外着信"
    tts_announcement: "恐れ入りますが、海外からのお電話はお受けしておりません。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_海外"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。新潟県けんこう財団でございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（折り返し確認でもNO_RESULT）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  - name: "END_折返し希望"
    condition: "リトライ上限到達後、折り返し希望"
    tts_announcement: "担当者より折り返しご連絡いたします。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_折返し希望"

  - name: "END_折返し不要"
    condition: "リトライ上限到達後、折り返し不要"
    tts_announcement: "恐れ入りますが、改めておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_折返し不要"

  # --- 正常系 ---
  - name: "END_予約完了"
    condition: "健診予約の全聴取完了"
    tts_announcement: "ご予約を承りました。予約の確定は担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約完了"

  - name: "END_変更完了"
    condition: "予約変更の全聴取完了"
    tts_announcement: "予約変更のご依頼を承りました。予約の確定は担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更完了"

  - name: "END_キャンセル完了"
    condition: "予約キャンセルの全聴取完了"
    tts_announcement: "ご予約のキャンセルを承りました。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_キャンセル完了"

  - name: "END_企業問合せ完了"
    condition: "企業問合せの全聴取完了"
    tts_announcement: "お問い合わせありがとうございます。担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_企業問合せ"

  - name: "END_問合せ完了"
    condition: "その他問合せの内容聴取完了（休日時）"
    tts_announcement: "お問い合わせありがとうございます。担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_問合せ"

  - name: "END_転送成功"
    condition: "その他問合せで有人転送成功"
    tts_announcement: ""
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_転送成功"

  - name: "END_転送失敗"
    condition: "その他問合せで有人転送失敗"
    tts_announcement: "ただいまお電話が混み合っております。恐れ入りますが、再度おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_転送失敗"

  - name: "END_WEB案内"
    condition: "受診票なし かつ 携帯電話なし"
    tts_announcement: "恐れ入りますが、ホームページのWEB予約からお申込みください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_WEB案内"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
  patterns:
    - condition: "classification=健診の予約"
      sms_flag: "1"
      notes: "予約完了 → SMS送信あり"
    - condition: "classification=予約日時の変更"
      sms_flag: "1"
      notes: "変更完了 → SMS送信あり"
    - condition: "classification=予約のキャンセル"
      sms_flag: "-1"
      notes: "キャンセル完了 → SMS送信なし"
    - condition: "classification=企業問合せ"
      sms_flag: "-1"
      notes: "企業問合せ → SMS送信なし"
    - condition: "classification=その他問合せ"
      sms_flag: "-1"
      notes: "その他問合せ → SMS送信なし"

# --- セクション8b: RAG/FAQ検索サブフロー ---
