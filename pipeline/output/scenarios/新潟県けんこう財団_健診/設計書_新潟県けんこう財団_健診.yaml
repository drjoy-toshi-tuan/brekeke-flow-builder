# 設計書 -- 新潟県けんこう財団 健診
# 生成元: @director エージェント
# 生成日: 2026/04/09
# 確認レポート: docs/designs/確認レポート_新潟県けんこう財団_健診_20260409.md
# ゴールデンテンプレート参照: 健診受付型.yaml
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "新潟県けんこう財団"
  group_name: "新潟縣健康管理協会_健診1"
  flow_name: "新潟縣健康管理協会_健診1$健診"
  target_facility: "新潟県けんこう財団（新潟縣健康管理協会）-- 3施設用のうち1施設分"
  office_id: "TODO_要確認"
  phone_number: "025-250-0215"
  business_hours: "祝日除く月〜金（詳細はDr.JOY側で設定）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "新潟縣健康管理協会_健診1$健診"
      role: "main"
      description: "冒頭チェーン → 営業日判定 → 用件5分岐（予約/変更/キャンセル/企業問合せ/その他） → 各聴取ステップ → SMS判定 → 終話"
    - name: "新潟縣健康管理協会_健診1$氏名聴取"
      role: "sub"
      description: "氏名聴取 → 結果返却"
    - name: "新潟縣健康管理協会_健診1$生年月日聴取"
      role: "sub"
      description: "生年月日聴取（復唱あり）→ 結果返却"
    - name: "新潟縣健康管理協会_健診1$電話番号聴取"
      role: "sub"
      description: "着信番号分岐 → 電話番号聴取/復唱確認 → SMS判定 → 終話チェーン → 結果返却"
  subflows:
    - name: "新潟縣健康管理協会_健診1$氏名聴取"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen3標準サブフロー。docs/reference/bivr/samples/json/氏名聴取.json を完全コピー"
    - name: "新潟縣健康管理協会_健診1$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen3標準サブフロー。docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピー"
    - name: "新潟縣健康管理協会_健診1$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "self_contained"
      notes: "Gen3標準サブフロー。docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピー。終話チェーン（SMS判定分岐）を含む。用件ルートごとにsmsFlag分岐で終話パターンが変わるため self_contained"

# --- セクション3: フローの目的 ---
purpose: "新潟県けんこう財団（3施設: 東新潟・西新潟・長岡）の健診予約受付AI電話。用件5分岐（予約/変更/キャンセル/企業問合せ/その他）を行い、各ルートで必要な情報を聴取。営業日判定（休日リスト+曜日チェック）により休日時は転送不可。その他問合せは営業時間内のみ有人転送。個人患者の電話番号聴取時にSMS送信判定（携帯/固定/受診票なし）を実施する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "新潟縣健康管理協会_健診1$健診"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2) → 切断
            ├─ 海外   → 海外_アナウンス(TTS) → 完了フラグ_海外(status=2) → 切断
            └─ 携帯/固定/その他 → acceptance_times
                  ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6) → 切断
                  └─ 受付可(true) → script_営業日判定(Script)
                        ├─ 休日 → 休日_アナウンス(TTS) → 用件_選択(TTS) → 入力_用件_選択(DTMF)
                        │     → OpenAI_用件_選択
                        │         ├─ 健診の予約 → [予約ルート]
                        │         ├─ 予約日時の変更 → [変更ルート]
                        │         ├─ 予約のキャンセル → [キャンセルルート]
                        │         ├─ 企業問合せ → [企業問合せルート]
                        │         ├─ その他問合せ → [その他問合せルート_休日]（転送不可→内容聴取へ）
                        │         └─ NO_RESULT → リトライ_用件_選択
                        └─ 営業日 → 冒頭_アナウンス(TTS) → 用件_選択(TTS) → 入力_用件_選択(DTMF)
                              → OpenAI_用件_選択
                                  ├─ 健診の予約 → [予約ルート]
                                  ├─ 予約日時の変更 → [変更ルート]
                                  ├─ 予約のキャンセル → [キャンセルルート]
                                  ├─ 企業問合せ → [企業問合せルート]
                                  ├─ その他問合せ → [その他問合せルート_営業日]（有人転送025-250-0215）
                                  └─ NO_RESULT → リトライ_用件_選択

      ─── [予約ルート] ───
      saveContext_用件(classification=健診の予約)
        → 受診票_確認(TTS) → 入力_受診票_確認(DTMF, max_dtmf_length=1)
        → OpenAI_受診票_確認
            ├─ あり → 施設_選択(TTS) → 入力_施設_選択(DTMF, max_dtmf_length=1)
            │     → OpenAI_施設_選択
            │         ├─ 東新潟 → saveContext_施設(facility=東新潟) → 登録番号聴取へ
            │         ├─ 西新潟 → saveContext_施設(facility=西新潟) → 登録番号聴取へ
            │         ├─ 長岡   → saveContext_施設(facility=長岡) → 登録番号聴取へ
            │         └─ NO_RESULT → リトライ_施設_選択
            │     → 登録番号_聴取(TTS) → 入力_登録番号(DTMF, max_dtmf_length=10) → OpenAI_登録番号
            │     → 希望日_聴取(TTS) → 入力_希望日(DTMF AmiVoice) → OpenAI_希望日 → 復唱_希望日(Re-confirmation)
            │         → script_当日予約判定（希望日が本日の場合）
            │             ├─ 受付可 → 希望時間聴取へ
            │             └─ 受付不可 → 当日締切_アナウンス(TTS) → 希望日再聴取
            │     → 希望時間_聴取(TTS) → 入力_希望時間(DTMF AmiVoice) → OpenAI_希望時間 → 復唱_希望時間(Re-confirmation)
            │     → ジャンプ_氏名聴取 → ジャンプ_生年月日聴取 → ジャンプ_電話番号聴取
            │     → [電話番号聴取サブフロー内でSMS判定→終話]
            └─ なし → saveContext_受診票(history=なし)
                  → ジャンプ_電話番号聴取（受診票なしフラグ付き）
                  → [電話番号聴取サブフロー内でSMS判定→終話]

      ─── [変更ルート] ───
      saveContext_用件(classification=予約日時の変更)
        → 予約日_聴取(TTS) → 入力_予約日(DTMF AmiVoice) → OpenAI_予約日 → 復唱_予約日(Re-confirmation)
        → 希望日_聴取(TTS) → 入力_希望日(DTMF AmiVoice) → OpenAI_希望日 → 復唱_希望日(Re-confirmation)
        → 希望時間_聴取(TTS) → 入力_希望時間(DTMF AmiVoice) → OpenAI_希望時間 → 復唱_希望時間(Re-confirmation)
        → ジャンプ_氏名聴取 → ジャンプ_生年月日聴取 → ジャンプ_電話番号聴取
        → [電話番号聴取サブフロー内でSMS判定→終話]

      ─── [キャンセルルート] ───
      saveContext_用件(classification=予約のキャンセル)
        → 予約日_聴取(TTS) → 入力_予約日(DTMF AmiVoice) → OpenAI_予約日 → 復唱_予約日(Re-confirmation)
        → ジャンプ_氏名聴取 → ジャンプ_生年月日聴取 → ジャンプ_電話番号聴取
        → [電話番号聴取サブフロー内でSMS判定→終話]

      ─── [企業問合せルート] ───
      saveContext_用件(classification=企業問合せ)
        → 企業_内容_聴取(TTS) → 入力_企業_内容(DTMF AmiVoice) → OpenAI_企業_内容
        → 企業名担当者_聴取(TTS) → 入力_企業名担当者(AmiVoice STT) → OpenAI_企業名担当者
        → 企業連絡先_聴取(TTS) → 入力_企業連絡先(DTMF, max_dtmf_length=11) → OpenAI_企業連絡先
        → 完了フラグ_企業問合せ(status=1, smsFlag=-1) → END_企業問合せ完了(TTS) → 切断

      ─── [その他問合せルート_営業日] ───
      saveContext_用件(classification=その他問合せ)
        → 転送_案内(TTS) → CallTransfer(025-250-0215)
            ├─ 転送成功 → 完了フラグ_転送成功(status=1) → 切断
            └─ 転送失敗 → 転送失敗_アナウンス(TTS) → 完了フラグ_転送失敗(status=3) → 切断

      ─── [その他問合せルート_休日] ───
      saveContext_用件(classification=その他問合せ)
        → その他_内容_聴取(TTS) → 入力_その他_内容(DTMF AmiVoice) → OpenAI_その他_内容
        → 完了フラグ_問合せ(status=1, smsFlag=-1) → END_問合せ完了(TTS) → 切断

      ─── [折り返し確認（リトライ上限到達時の共通遷移先）] ───
      折り返し_確認(TTS) → 入力_折り返し_確認(DTMF, max_dtmf_length=1)
        → OpenAI_折り返し_確認
            ├─ 折り返し希望 → 完了フラグ_折返し希望(status=3, smsFlag=-1) → END_折返し希望(TTS) → 切断
            ├─ 折り返し不要 → 完了フラグ_折返し不要(status=2, smsFlag=-1) → END_折返し不要(TTS) → 切断
            └─ NO_RESULT → 完了フラグ_聴取失敗(status=3, smsFlag=-1) → END_聴取失敗(TTS) → 切断
    notes: |
      冒頭チェーン: wait → saveContextModel2DB → incoming-classifier → acceptance_times → script_営業日判定
      営業日/休日の状態はscript_営業日判定で判定し、後段の「その他問合せ」ルートで転送可否を分岐する。
      折り返し確認は全聴取ステップのRetry Counter No more から遷移する共通フロー。
      電話番号聴取サブフロー（self_contained）内でSMS判定→終話を完結させる。

  - flow_name: "新潟縣健康管理協会_健診1$氏名聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/氏名聴取.json を完全コピーする。
      フロー名プレフィックスのみ「新潟縣健康管理協会_健診1$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "CLAUDE.md Rule 9/11 準拠"

  - flow_name: "新潟縣健康管理協会_健診1$生年月日聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピーする。
      フロー名プレフィックスのみ「新潟縣健康管理協会_健診1$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "CLAUDE.md Rule 9/11 準拠。復唱あり"

  - flow_name: "新潟縣健康管理協会_健診1$電話番号聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9/10） ★★★
      docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピーする。
      フロー名プレフィックスのみ「新潟縣健康管理協会_健診1$」に置換。構造・接続・スクリプトは一切変更不可。

      ★ 以下の終話チェーンのみ施設固有のカスタマイズが必要 ★
      電話番号聴取完了後の終話チェーンで、用件ルートとSMS判定を組み合わせた分岐:

      [終話チェーン（施設固有部分）]
        → ContextMatchRouter(classification参照)
            ├─ 健診の予約   → 完了フラグ(status=1, smsFlag=1) → END_予約完了(TTS) → 切断
            ├─ 予約日時の変更 → 完了フラグ(status=1, smsFlag=1) → END_変更完了(TTS) → 切断
            ├─ 予約のキャンセル → 完了フラグ(status=1, smsFlag=-1) → END_キャンセル完了(TTS) → 切断
            └─ 受診票なし+携帯なし → 完了フラグ(status=2, smsFlag=-1) → END_WEB案内(TTS) → 切断
    notes: |
      CLAUDE.md Rule 9/10 準拠。電話番号聴取部分は個人情報サブフロー.bivr を完全コピー。
      終話チェーン（SMS判定分岐）のみ施設固有にカスタマイズ。
      受診票なし+携帯なしの場合はWEB案内で終話（SMS送信なし）。

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "健診の予約"
      - order: "2"
        value: "予約日時の変更"
      - order: "3"
        value: "予約のキャンセル"
      - order: "4"
        value: "企業問合せ"
      - order: "5"
        value: "その他問合せ"
    item_default: true
    editable: true
    deletable: true
    notes: "DTMF 1-5 の5分岐に対応"

  - context_name: "facility"
    context_name_jp: "施設名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "東新潟/西新潟/長岡。予約ルートのみ。saveContext2DBで固定値保存"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
