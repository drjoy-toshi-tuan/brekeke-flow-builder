# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1→Gen3移管。Gen1の21サブシナリオを第3世代標準フローに統合"
  - "acceptance_times直後にscript_営業日判定（@General$Script）を配置。休日リスト（holidays配列）は年度ごとに更新が必要"
  - "予約ルート内にscript_当日予約判定（@General$Script）を配置。10:30以前→受付可、10:30以降→受付不可"
  - "その他問い合わせは営業日のみ有人転送（025-250-0215）。休日は内容聴取で代替"
  - "休日時は用件選択で「その他問い合わせ」を選んでも転送せず、内容聴取→終話にルーティング。script_営業日判定の結果をContextMatchRouterまたはScriptで参照して分岐"
  - "転送先番号 025-250-0215 は本番環境のみ。デモ環境では転送先未設定（NON-BLOCKER N-3参照）"
  - "受診票なしの患者: 施設選択・登録番号・希望日・希望時間をスキップし、電話番号聴取サブフローへ直行。SMS判定でWEB案内へ分岐する可能性あり"
  - "企業問合せルートは個人情報サブフロー（氏名・生年月日・電話番号）を使わず、メインフロー内で企業名・担当者名・企業連絡先を聴取"
  - "Gen1の「年末年始応用分岐」「連休中」パターンは全て廃止。script_営業日判定のholidays配列で一元管理"
  - "RAGサブフローは不要（rag_subflow.pattern: none）。Gen1にFAQ機能はなく、「その他問い合わせ」は有人転送で対応"
  - "script_営業日判定とscript_当日予約判定のJavaScriptコードは設計資料（docs/migration/gen1_新潟県けんこう財団_健診.md）に記載済み"

