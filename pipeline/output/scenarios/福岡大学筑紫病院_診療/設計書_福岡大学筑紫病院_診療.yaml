    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "新規予約"
        - "対象外"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「変更」「予約変更」「予約を変えたい」「契約変更」「契約法」「予約品子」を含む"
