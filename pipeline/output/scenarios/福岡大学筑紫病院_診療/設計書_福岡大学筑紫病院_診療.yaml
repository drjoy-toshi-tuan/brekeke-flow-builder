# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管。元プロンプト: docs/migration/gen2_福岡大学筑紫病院_診療.md（20260224修正版）"
  - "代表電話番号: 0570-02-7777（全終話アナウンスで使用）"
  - "Gen2の冒頭アナウンスと用件確認を分離: 冒頭_アナウンス（施設案内のみ）+ 用件確認（選択肢案内）の2TTSモジュール構成"
  - "キャンセルルートのみ: 診療科聴取前にキャンセル注意事項アナウンスを挿入（「予約をキャンセルした場合、電話でのご予約はお受けできません...」）"
  - "予約希望日はフリーテキストで保存（Gen2仕様: 日付形式に変換しない）。「4月中旬」「来週の月曜」等そのまま格納"
  - "複数人対応: Gen2では2名以上の患者情報が発話された場合、全文をreasonに退避し1名分のみ受付。Gen3ではOpenAIプロンプト内で検出し、NO_RESULTとしてリトライカウンターに回す方針。prompterが対応すること"
  - "Gen2のSTT誤認識補正キーワード（prompterへの指示）: 「契約変更」「契約法」「予約品子」→変更 / 「契約キャンセル」→キャンセル / 「補給金ないか」「9Cないか」→呼吸器内科 / 「しょうきか」→消化器内科 / 「印刷」「定期」「新薬」「再診」「最新」「禁忌」→診察（用件判定で考慮） / 「薬」「お薬」→予約（用件判定で考慮） / 「4」の表記ゆれ: 「for」「For」「Si」→4 / 「5」の表記ゆれ: 「号」→5"
  - "Gen2の復唱ルール: 患者名のみ復唱禁止。それ以外（診療科・予約日・診察券番号・生年月日・電話番号）は復唱する。氏名聴取サブフローは復唱なし版を使用"
  - "1-8通話終了直前ルール（prompterへの指示）: 折り返し時間を聞かれた場合は「順番に対応しておりますので、しばらくお待ちください」/ 希望時間を伝えられた場合は「ご要望を承りました。ご希望に添えない場合もありますので、ご了承ください。」"
  - "smsFlag分岐: Gen2では0/1/2の3値。Gen3では-1/1/2に変更（NON-BLOCKER N-3参照）"
  - "Gen2のstatus値マッピング: Gen2の0(途中切断)→Gen3では除外(禁止値) / Gen2の1(未処理)→Gen3の1 / Gen2の7(非通知)→Gen3の2(代表案内)"

