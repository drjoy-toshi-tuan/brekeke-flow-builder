  - item: "clinicalDepartment2フィールドの要否（Gen2にあるが未使用。必要であれば追加）"
    resolved: false
  - item: "Gen2の未使用フィールド群（history/institution/introduction/disease/details/symptoms/question）の要否"
    resolved: false
  - item: "時間外アナウンス文言（デフォルト使用中。施設固有の文言があれば差し替え）"
    resolved: false
  - item: "RAGサブフロー配置（パターン3で設定済み。不要であれば変更）"
    resolved: false
  - item: "対象環境（demoで設定済み。本番の場合はprodに変更）"
    resolved: false
