# ゴールデンテンプレート参照: 予約管理型
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "福岡大学筑紫病院"
  group_name: "福岡大学筑紫病院"
  flow_name: "福岡大学筑紫病院$診療_20260413"
  target_facility: "福岡大学筑紫病院"
  office_id: "TODO_要確認"
  phone_number: "0570-02-7777"
  business_hours: "TODO_要確認"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "福岡大学筑紫病院$診療_20260413"
      role: "main"
      description: "冒頭チェーン → 用件分岐（3択: 変更/キャンセル/確認）→ 診療科・予約日・予約希望日聴取 → サブフロー遷移（個人情報）→ smsFlag分岐 → 終話"
  subflows:
    - name: "福岡大学筑紫病院$診察券番号聴取_20260413"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9準拠。診察券番号聴取.jsonを完全コピー。「分からない」分岐あり"

    - name: "福岡大学筑紫病院$氏名聴取_20260413"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9準拠。氏名聴取.jsonを完全コピー。Gen2指示: 患者名の復唱禁止"

    - name: "福岡大学筑紫病院$生年月日聴取_20260413"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9準拠。生年月日聴取_復唱あり.jsonを完全コピー。Gen2指示: 生年月日は復唱する"

    - name: "福岡大学筑紫病院$電話番号聴取_20260413"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10準拠。電話番号聴取_復唱あり.jsonを完全コピー。incoming-classifier→携帯/固定分岐。メインフロー側でsmsFlag分岐に使用"

    - name: "福岡大学筑紫病院$RAG検索_20260413"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 16準拠。RAG検索.jsonを完全コピー。パターン3（対象外判定時+全正常終話前）"

# --- セクション3: フローの目的 ---
purpose: "患者からの電話を受け、用件（予約変更・予約キャンセル・日時の確認）を聴取し、診療科・予約日・患者情報を収集して折り返し受付を自動化する。新規予約希望・対象外（医療相談等）は代表電話番号（0570-02-7777）を案内して終話する。3診療日以降の用件のみ対象。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "福岡大学筑紫病院$診療_20260413"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(status=2,smsFlag=-1) → 非通知_アナウンス(TTS) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外 → 完了フラグ_時間外(status=6,smsFlag=-1) → 時間外_アナウンス(TTS) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → 用件確認(TTS)
                                      → 入力_用件確認(DTMF AmiVoice STT, max_dtmf_length=1)
                                      → OpenAI_用件確認
                                          ├─ 変更 → 診療科_聴取(TTS) → ...
                                          ├─ キャンセル → キャンセル_アナウンス(TTS) → 診療科_聴取(TTS) → ...
                                          ├─ 確認 → 診療科_聴取(TTS) → ...
                                          ├─ 新規予約 → 完了フラグ_新規予約不可(status=2,smsFlag=-1) → END_新規予約不可(TTS) → 切断
                                          ├─ 対象外 → JumpToFlow RAG検索(パターン1) → 完了フラグ_対象外(status=2,smsFlag=-1) → END_対象外案内(TTS) → 切断
                                          └─ NO_RESULT → リトライ_用件確認
                                                           ├─ Retry → 用件確認(TTS)
                                                           └─ No more → 完了フラグ_代表電話案内(status=3,smsFlag=-1) → END_代表電話案内(TTS) → 切断

      --- 診療科聴取（変更・キャンセル・確認 共通ステップ）---
      診療科_聴取(TTS) → 入力_診療科(AmiVoice STT) → OpenAI_診療科
        └─ success → ContextMatchRouter_診療科後(module: OpenAI_用件確認)
              ├─ ^変更$ → 予約日_聴取
              ├─ ^キャンセル$ → 予約日_聴取
              └─ ^確認$ → JumpToFlow 診察券番号聴取
        └─ NO_RESULT → リトライ_診療科
              ├─ Retry → 診療科_聴取(TTS)
              └─ No more → 完了フラグ_代表電話案内 → END_代表電話案内(TTS) → 切断

      --- 予約日聴取（変更・キャンセル共通）---
      予約日_聴取(TTS) → 入力_予約日(AmiVoice STT) → OpenAI_予約日
        └─ success → ContextMatchRouter_予約日後(module: OpenAI_用件確認)
              ├─ ^変更$ → 予約希望日_聴取
              └─ ^キャンセル$ → JumpToFlow 診察券番号聴取
        └─ NO_RESULT → リトライ_予約日
              ├─ Retry → 予約日_聴取(TTS)
              └─ No more → 完了フラグ_代表電話案内 → END_代表電話案内(TTS) → 切断

      --- 予約希望日聴取（変更ルートのみ）---
      予約希望日_聴取(TTS) → 入力_予約希望日(AmiVoice STT) → OpenAI_予約希望日
        └─ success → JumpToFlow 診察券番号聴取
        └─ NO_RESULT → リトライ_予約希望日
              ├─ Retry → 予約希望日_聴取(TTS)
              └─ No more → 完了フラグ_代表電話案内 → END_代表電話案内(TTS) → 切断

      --- 個人情報サブフロー遷移（全ルート共通合流点）---
      JumpToFlow 診察券番号聴取 → JumpToFlow 氏名聴取 → JumpToFlow 生年月日聴取 → JumpToFlow 電話番号聴取

      --- 電話番号聴取サブフロー戻り後 → RAG（パターン2）→ smsFlag分岐 → 終話 ---
      JumpToFlow 電話番号聴取
        ├─ ^1$ (携帯) → JumpToFlow RAG検索(パターン2: 最後にご質問は？)
        │     → ContextMatchRouter_終話_携帯(module: OpenAI_用件確認)
        │           ├─ ^キャンセル$ → 完了フラグ_受付完了_キャンセル(status=1,smsFlag=2) → END_キャンセル完了(TTS) → 切断
        │           └─ ^.*$ → 完了フラグ_受付完了_SMS(status=1,smsFlag=1) → ContextMatchRouter_TTS_携帯(module: OpenAI_用件確認)
        │                 ├─ ^変更$ → END_変更完了(TTS) → 切断
        │                 └─ ^.*$ → END_確認完了(TTS) → 切断
        └─ ^2$ (その他) → JumpToFlow RAG検索(パターン2: 最後にご質問は？)
              → ContextMatchRouter_終話_固定(module: OpenAI_用件確認)
                    ├─ ^キャンセル$ → 完了フラグ_受付完了_キャンセル(status=1,smsFlag=2) → END_キャンセル完了(TTS) → 切断
                    └─ ^.*$ → 完了フラグ_受付完了_SMSなし(status=1,smsFlag=-1) → ContextMatchRouter_TTS_固定(module: OpenAI_用件確認)
                          ├─ ^変更$ → END_変更完了(TTS) → 切断
                          └─ ^.*$ → END_確認完了(TTS) → 切断

      --- メインフロー内終話パターン ---
      END_非通知 → 切断
      END_時間外 → 切断
      END_代表電話案内 → 切断
      END_対象外案内 → 切断
      END_新規予約不可 → 切断
      END_変更完了 → 切断
      END_キャンセル完了 → 切断
      END_確認完了 → 切断
    notes: |
      ContextMatchRouter活用:
      - ContextMatchRouter_診療科後: OpenAI_用件確認の結果で、変更/キャンセル→予約日、確認→診察券番号に分岐
      - ContextMatchRouter_予約日後: OpenAI_用件確認の結果で、変更→予約希望日、キャンセル→診察券番号に分岐
      - ContextMatchRouter_終話_携帯/固定: 用件別にsmsFlag値と終話TTSを選択
      RAGサブフロー:
      - パターン1挿入点: 対象外判定後（END_対象外案内の前にRAG試行）
      - パターン2挿入点: 電話番号聴取サブフロー戻り後（終話チェーン直前）

  - flow_name: "福岡大学筑紫病院$診察券番号聴取_20260413"
    diagram: |
      docs/reference/bivr/samples/json/診察券番号聴取.json を完全コピーする。
      フロー名プレフィックスのみ「福岡大学筑紫病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "CLAUDE.md Rule 9準拠。復唱あり（digits形式）。「分からない」分岐あり。"

  - flow_name: "福岡大学筑紫病院$氏名聴取_20260413"
    diagram: |
      docs/reference/bivr/samples/json/氏名聴取.json を完全コピーする。
      フロー名プレフィックスのみ「福岡大学筑紫病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "CLAUDE.md Rule 9準拠。復唱なし。"

  - flow_name: "福岡大学筑紫病院$生年月日聴取_20260413"
    diagram: |
      docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピーする。
      フロー名プレフィックスのみ「福岡大学筑紫病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "CLAUDE.md Rule 9準拠。DOB Re-confirmation あり。2桁入力時は元号確認ステップへ分岐。"

  - flow_name: "福岡大学筑紫病院$電話番号聴取_20260413"
    diagram: |
      docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピーする。
      フロー名プレフィックスのみ「福岡大学筑紫病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: |
      CLAUDE.md Rule 9/10/11準拠。
      incoming-classifier→携帯/固定分岐。Phone Normalization + Re-confirmation。
      結果返却スクリプトが携帯(1)/その他(2)を返却。メインフロー側のsmsFlag分岐で使用。

  - flow_name: "福岡大学筑紫病院$RAG検索_20260413"
    diagram: |
      docs/reference/bivr/samples/json/RAG検索.json を完全コピーする。
      フロー名プレフィックスのみ「福岡大学筑紫病院$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "CLAUDE.md Rule 16準拠。RAGサブフローのTTS文言はプロパティで制御。"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "変更"
      - id: "2"
        order: "2"
        value: "キャンセル"
      - id: "3"
        order: "3"
        value: "確認"
    item_default: true
    editable: true
    deletable: false
    notes: "予約変更/キャンセル/確認の3択。Gen2のclassificationフィールドをそのまま踏襲"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "全ルートで聴取。14科。OpenAI正規化で診療科名を決定"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更・キャンセルルートで聴取。yyyy-MM-dd 00:00形式で保存"

  - context_name: "desiredReservationDate"
    context_name_jp: "予約希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更ルートのみ聴取。フリーテキストで保存（日付形式に変換しない）"

  - context_name: "reason"
    context_name_jp: "備考"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "複数人情報退避用。OpenAIプロンプトが2名以上の情報を検出した場合に全文格納"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取。数字のみ受付。「分からない」分岐あり"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取。フルネーム。復唱禁止"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取。西暦・和暦対応。復唱あり"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取。着信番号確認 or 手動入力。復唱あり"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理(正常完了) 2=代表案内/非通知/対象外/新規予約不可 3=聴取失敗 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # === メインフロー聴取項目 ===
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "変更"
      - "キャンセル"
      - "確認"
      - "新規予約"
      - "対象外"
    notes: "DTMF 1=変更, 2=キャンセル, 3=確認。新規予約・対象外（医療相談等）はOpenAI判定のみ（DTMF割当なし）"

  - order: 2
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "label"
    output_labels:
      - "循環器内科"
      - "内分泌・糖尿病内科"
      - "呼吸器内科"
      - "消化器内科"
      - "腎臓内科"
      - "小児科"
      - "外科"
      - "呼吸器・乳腺外科"
      - "整形外科"
      - "脳神経外科"
      - "腎泌尿器外科"
      - "眼科"
      - "耳鼻咽喉・頭頸部外科"
      - "形成外科"
    notes: "全ルート共通。profile_words: 診療科辞書。リストに一致しない場合はNO_RESULT"

  - order: 3
    name: "予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels: []
    notes: "変更・キャンセルルートのみ。yyyy-MM-dd 00:00形式に変換。「分からない」は空文字で保存し次へ進む"

  - order: 4
    name: "予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "変更ルートのみ。フリーテキストで保存（日付形式に変換しない）。「4月中旬」等そのまま格納"

  # === サブフロー聴取項目（リファレンスJSONからの完全コピー）===
  - order: 5
    name: "診察券番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "medicalCardNumber"
    openai_processing: "classify"
    output_format: "number"
    output_labels:
      - "数字"
      - "わからない"
    notes: "サブフロー。digits形式復唱。「わからない」→氏名へスキップ。DTMF 0-9=直接入力（診察券番号をそのままプッシュ入力、#で確定）"

  - order: 6
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー。復唱禁止（Gen2指示）。profile_words: 氏名辞書"

  - order: 7
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "valid"
      - "不正値"
      - "2桁_0007"
      - "2桁_0831"
      - "2桁_3263"
    notes: "サブフロー。DOB Re-confirmationあり。2桁入力時は元号確認ステップへ分岐。DTMF 0-9=直接入力（8桁: YYYYMMDD形式でプッシュ入力、#で確定）"

  - order: 8
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "サブフロー。Phone Normalization + Re-confirmation。incoming-classifierで携帯/その他分岐。返却値1=携帯/2=その他。DTMF 0-9=直接入力（10-11桁の電話番号をプッシュ入力、#で確定）"

# --- セクション7: ステップ詳細 ---
step_details:
