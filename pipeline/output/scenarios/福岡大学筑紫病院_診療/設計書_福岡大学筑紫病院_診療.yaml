          output: "対象外"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "変更→診療科_聴取 / キャンセル→キャンセル_アナウンス / 確認→診療科_聴取 / 新規予約→END_新規予約不可 / 対象外→RAG→END_対象外案内"
