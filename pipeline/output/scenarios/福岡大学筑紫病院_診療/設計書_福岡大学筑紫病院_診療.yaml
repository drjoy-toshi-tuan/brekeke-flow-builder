# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "incoming-classifierで非通知と判定"
    tts_announcement: "大変恐れ入りますが、当窓口は、非通知でのお電話を承ることができません。電話番号の前に186をつけて再度お電話をお掛け直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_timesで時間外と判定"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_代表電話案内"
    condition: "リトライ上限到達（用件確認・診療科・予約日・予約希望日のいずれか）"
    tts_announcement: "大変申し訳ございませんが、ご回答の確認ができませんでしたので、こちらからお電話失礼させていただきます。お手数ですが、福岡大学筑紫病院代表電話へおかけなおしください。番号は、0570-02-7777、0570-02-7777です。それでは失礼いたします。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表電話案内"

  # --- 代表案内系 ---
  - name: "END_対象外案内"
    condition: "用件確認で対象外（医療相談等）と判定"
    tts_announcement: "お話いただきました内容は、AI電話では対応ができません。恐れ入りますが、福岡大学筑紫病院代表電話へおかけなおしください。番号は、0570-02-7777、0570-02-7777です。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_対象外"

  - name: "END_新規予約不可"
    condition: "用件確認で新規予約希望と判定"
    tts_announcement: "大変申し訳ございません。AI電話では診察のご予約を承ることができません。ご予約をご希望の方は、福岡大学筑紫病院の代表電話へおかけなおしください。電話番号がお分かりになる方はこのままお電話をお切りください。分からない方はご案内いたしますのでメモをご準備ください。電話番号は0570-02-7777、0570-02-7777です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_新規予約不可"

  # --- 正常系（smsFlag分岐あり）---
  - name: "END_変更完了"
    condition: "全聴取完了かつ用件=変更"
    tts_announcement: "予約変更の申し込みを受付いたしました。内容を確認のうえ、3診療日以内に0570-02-7777より折り返し電話、もしくは、SMSにてご連絡いたします。それでは、お電話をお切りください。失礼いたします。"
    status: "1"
    sms_flag: "smsFlag routing参照"
    completion_flag_name: "完了フラグ_受付完了_SMS / 完了フラグ_受付完了_SMSなし"

  - name: "END_キャンセル完了"
    condition: "全聴取完了かつ用件=キャンセル"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。内容を確認のうえ、3診療日以内に0570-02-7777より折り返し電話、もしくは、SMSにてご連絡いたします。それでは、お電話をお切りください。失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_受付完了_キャンセル"

  - name: "END_確認完了"
    condition: "全聴取完了かつ用件=確認"
    tts_announcement: "ご予約に関するお問い合わせを受付いたしました。内容を確認のうえ、3診療日以内に0570-02-7777より折り返し電話、もしくは、SMSにてご連絡いたします。それでは、お電話をお切りください。失礼いたします。"
    status: "1"
    sms_flag: "smsFlag routing参照"
    completion_flag_name: "完了フラグ_受付完了_SMS / 完了フラグ_受付完了_SMSなし"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "phoneType"
  patterns:
    - condition: "classification=変更 かつ phoneType=携帯"
      sms_flag: "1"
      notes: "変更+携帯 → SMS送信（タイプ1）"
    - condition: "classification=確認 かつ phoneType=携帯"
      sms_flag: "1"
      notes: "確認+携帯 → SMS送信（タイプ1）"
    - condition: "classification=キャンセル（phoneType問わず）"
      sms_flag: "2"
      notes: "キャンセル → SMS送信（タイプ2）。Gen2仕様: 電話種別によらずsmsFlag=2"
    - condition: "classification=変更 かつ phoneType=その他"
      sms_flag: "-1"
      notes: "変更+固定 → SMS送信なし"
    - condition: "classification=確認 かつ phoneType=その他"
      sms_flag: "-1"
      notes: "確認+固定 → SMS送信なし"
  implementation_notes: |
    実装方式:
    1. 電話番号聴取サブフローの返却値（1=携帯/2=その他）でCustom Jump to Flowが分岐
    2. 携帯パス: ContextMatchRouter(module: OpenAI_用件確認)で classification を判定
       - ^キャンセル$ → saveCompletionFlag2db(smsFlag=2)
       - ^.*$ (変更/確認) → saveCompletionFlag2db(smsFlag=1)
    3. 固定パス: ContextMatchRouter(module: OpenAI_用件確認)で classification を判定
       - ^キャンセル$ → saveCompletionFlag2db(smsFlag=2)
       - ^.*$ (変更/確認) → saveCompletionFlag2db(smsFlag=-1)
    4. 各completion flag後、ContextMatchRouter(module: OpenAI_用件確認)で終話TTS選択
       - ^変更$ → END_変更完了(TTS)
       - ^キャンセル$ → END_キャンセル完了(TTS)
       - ^.*$ → END_確認完了(TTS)

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "用件確認のOpenAI分岐で「対象外」判定時 → RAGサブフローを先に試行し、回答不可の場合のみEND_対象外案内へ遷移"
  pre_termination: true
  pre_termination_notes: "電話番号聴取サブフロー完了後、smsFlag分岐の前にRAGサブフロー（パターン2: 最後にご質問はございますか？）を配置"

