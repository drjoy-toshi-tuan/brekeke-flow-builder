# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "{tts_g:恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。}"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（24h受付のため実フローでは未到達。互換性のため定義のみ保持）"
    tts_announcement: "{tts_g:お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。}"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "{tts_g:大変申し訳ございません。うまく聞き取ることができませんでした。今おかけいただいている電話番号へ折り返しご連絡しますので、お待ちください。}"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"
  # --- 正常系（直接来院ルートの終話）---
  - name: "END_直接来院完了"
    condition: "直接来院ルートの全聴取完了"
    tts_announcement: "{tts_g:受診のお申し込みを受け付けました。なお現在、国内ではしかの流行が確認されています。発疹や発熱などの症状がある方、または1ヶ月以内に海外渡航歴のある方、そのほか思い当たることがある方は、受付までお申し出ください。それでは、お気を付けてお越しください。}"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_直接来院完了"
  # --- 正常系（救急搬送ルートの終話 = 転送）---
  # call_transfer ブロック「担当者へ転送」配置時に scaffold が以下を自動生成:
  #   - 完了フラグ_転送成功 (status=3, smsFlag=-1) → END_転送成功
  #   - 完了フラグ_転送失敗 (status=9, smsFlag=-1) → END_転送失敗（"転送に失敗しました..." 標準文言）

# smsFlag 分岐は不要（救急搬送・直接来院ともに SMS 送信なし。固定電話・携帯混在の救急現場のため）
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

# --- セクション8b: RAG/FAQ検索サブフロー ---
# 救急搬送フローには RAG/FAQ サブフローを配置しない（緊急事態の dialog 短縮を優先）
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

