# 設計書 -- 医誠会国際総合病院 施設間搬送
# 生成元: @director エージェント
# 生成日: 2026/04/30
# 確認レポート: docs/designs/確認レポート_医誠会国際総合病院_施設間搬送_20260430.md
# 元資料: commubo抽出/【011】医誠会国際総合病院/【0012医誠会国際総合病院】施設間搬送1_M_本番/
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "医誠会国際総合病院"
  scenario_name: "施設間搬送"
  group_name: "医誠会国際総合病院"
  flow_name: "医誠会国際総合病院$施設間搬送"
  target_facility: "医誠会国際総合病院（救急搬送・施設間搬送受け入れ）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"             # 着信用 050 番号は IVR プロパティで設定
  business_hours: "24時間（救急搬送受付のため受付時間制限なし）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# 救急搬送受付向けの 24h フロー。Gen1 commubo 移管。
# メイン主分岐は「救急搬送（医療施設からの転院搬送依頼）/ 直接来院（自家用車等で来院）」の二択。
#
# 救急搬送ルート（Gen1 移管ノートで指定された包括的な聴取シーケンス）:
#   施設名 → 住所 → 状態 → バイタル → 患者氏名 → 個人情報 → 連絡先 → 緊急手術確認 → Blind Transfer
#
# 直接来院ルート:
#   選定療養費案内（紹介状無し時 9,900 円） → 患者氏名 → 個人情報 → 症状聴取 → 連絡先 → 終話（はしか流行案内付き）
#
# 患者氏名・電話番号は標準サブフロー使用。両ルートから同じサブフローを呼び出すため、
# scenario_flow 内では subflow ブロックを 2 回（_搬送 / _来院）配置するが、
# flow_structure.subflows[] には各サブフロー 1 エントリのみ登録する（PatientName §3.1.1 準拠）。
flow_structure:
  type: "subflow"
  flows:
    - name: "医誠会国際総合病院$施設間搬送"
      role: "main"
      description: "冒頭挨拶 → 用件二択（救急搬送/直接来院）→ 各ルートに応じた聴取 → 救急搬送はBlind Transfer / 直接来院ははしか流行案内を含む終話"
  subflows:
    - name: "医誠会国際総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName 標準サブフロー。患者氏名のフルネーム聴取。Gen1 患者名聴取.yaml に対応。両ルート（救急搬送/直接来院）から同サブフローを呼び出す（PatientName §3.1.1: 1 サブフロー登録、複数ジャンプ点 OK）"
    - name: "医誠会国際総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Phone Normalization + Re-confirmation 標準サブフロー。連絡先電話番号聴取。Gen1 連絡先聴取.yaml に対応。両ルートから同サブフローを呼び出す"

# --- セクション3: フローの目的 ---
purpose: "医誠会国際総合病院の施設間搬送（救急搬送・転院搬送）受付専用 AI 電話。24時間着信を受け、医療施設からの救急搬送依頼は施設名・住所・患者状態・バイタル・氏名・個人情報・連絡先・緊急手術要否を聴取した上で受け入れ担当者へ転送。患者本人または家族による直接来院希望は選定療養費案内（紹介状無し時 9,900 円）の上で氏名・個人情報・症状・連絡先を聴取して受付完了とする。終話時には国内はしか流行への注意喚起アナウンスを含める。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "医誠会国際総合病院$施設間搬送"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS: 「医誠会無料救急搬送です。AI電話が対応いたします。」)
                                  → 搬送or来院確認(hearing: enum, DTMF 1=救急搬送 / 2=直接来院)
                                      │
                                      ├─ 救急搬送 ───────────────────────────────────┐
                                      │   施設名聴取_アナウンス(TTS: 「それでは、はじめに、」)
                                      │     → 施設名聴取(hearing: text)
                                      │     → 住所聴取_アナウンス(TTS: 「続いて、」)
                                      │     → 住所聴取(hearing: text)
                                      │     → 状態聴取_アナウンス(TTS: 「次に、」)
                                      │     → 状態聴取(hearing: text)
                                      │     → バイタル聴取(hearing: text)
                                      │     → 氏名聴取_搬送_アナウンス(TTS: 「かしこまりました。続いて、」)
                                      │     → 氏名聴取_搬送 [subflow PatientName]
                                      │     → 個人情報聴取_搬送_アナウンス(TTS: 「続いて、」)
                                      │     → 個人情報聴取_搬送(hearing: text)
                                      │     → 連絡先聴取_搬送_アナウンス(TTS: 「最後に、」)
                                      │     → 連絡先聴取_搬送 [subflow Phone]
                                      │     → 緊急手術確認(hearing: enum, 必要/不要)
                                      │       │
                                      │       └─ 必要/other → 転送ガイダンス(TTS: 「電話を転送いたします。少々お待ちください。」)
                                      │                       → 担当者へ転送(call_transfer Blind Transfer 080-9923-2523)
                                      │                            ├─ 成功 → 完了フラグ_転送成功(status=3) → END_転送成功 → 切断
                                      │                            └─ 失敗 → END_転送失敗(TTS) → 完了フラグ_転送失敗(status=9) → 切断
                                      │
                                      └─ other(=直接来院) ─────────────────────────┐
                                          直接来院_アナウンス(TTS: 「かしこまりました。紹介状持参がない場合、選定療養費、9900円をお支払いいただきますので、ご了承ください。それでは、」)
                                            → 氏名聴取_来院 [subflow PatientName 同 flowname]
                                            → 個人情報聴取_来院_アナウンス(TTS: 「続いて、」)
                                            → 個人情報聴取_来院(hearing: text)
                                            → 症状聴取(hearing: text)
                                            → 連絡先聴取_来院_アナウンス(TTS: 「最後に、」)
                                            → 連絡先聴取_来院 [subflow Phone 同 flowname]
                                            → END_直接来院完了(TTS: 受付完了+はしか流行案内) → 完了フラグ_直接来院完了(status=1) → 切断
    notes: |
      - 24時間受付（救急搬送）のため acceptance_times モジュールは配置しない（use_acceptance_times: false）
      - 主分岐は 搬送or来院確認 hearing で Pattern A（OpenAI 直後分岐）。enum 2 値（救急搬送 / other=直接来院）
      - 両ルートから同一の氏名聴取・電話番号聴取サブフローを呼び出す（scenario_flow に subflow ブロックを 2 回配置、step 名は _搬送 / _来院 で区別）
      - flow_structure.subflows[] には「氏名聴取」「電話番号聴取」を各 1 エントリのみ登録（PatientName 1 枠ルール §3.1.1 準拠）
      - 緊急手術確認は enum hearing で必要/不要（other）を context 保存するが、両ブランチとも転送ガイダンスへ進む（受け入れ担当者の事前情報として保存）
      - 転送先は Blind Transfer 1 系統（080-9923-2523）。第2系統（080-7031-1207）の順次フォールバックは Brekeke IVR UI 側で手動配置（NON-BLOCKER N-2）
      - 緊急時オーバーライド（ベット逼迫時の公設救急優先案内）は Gen3 第1版では未実装。運用フラグでの出し分けは将来課題（NON-BLOCKER N-3）
      - 入電番号からの施設名自動取得 → 施設名確認の auto-skip ルートは Gen3 第1版では未実装（Brekeke 側に標準モジュール無し）。常に施設名聴取から開始（NON-BLOCKER N-4）
      - 個人情報聴取（生年月日・年齢・性別）は Gen1 と同様に自由テキスト 1 ステップで聴取（emergency context での dialog 短縮を優先）。構造化が必要な場合は将来 DOB Re-confirmation サブフロー + 年齢/性別 hearing に分割可能（NON-BLOCKER N-5）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false             # 24時間受付（救急搬送のため時間外なし）
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 搬送or来院確認

  # --- 主分岐: 救急搬送 / 直接来院 ---
  - step: 搬送or来院確認
    type: hearing
    output_format: enum
    save_to: classification
    retry_failure: end_failure
    conditions:
      - match: "救急搬送"
        next: 施設名聴取_アナウンス
      - match: "other"                      # = 直接来院（custom entity「直接来院」または DTMF 2）
        next: 直接来院_アナウンス

  # ============================================================
  # 救急搬送ルート（Gen1 移管ノート 「搬送ルート」セクションに対応）
  # ============================================================
  - step: 施設名聴取_アナウンス
    type: announcement
    next: 施設名聴取

  - step: 施設名聴取
    type: hearing
    output_format: text
    save_to: facilityName
    retry_failure: end_failure
    next: 住所聴取_アナウンス

  - step: 住所聴取_アナウンス
    type: announcement
    next: 住所聴取

  - step: 住所聴取
    type: hearing
    output_format: text
    save_to: pickupAddress
    retry_failure: end_failure
    next: 状態聴取_アナウンス

  - step: 状態聴取_アナウンス
    type: announcement
    next: 状態聴取

  - step: 状態聴取
    type: hearing
    output_format: text
    save_to: patientStatus
    retry_failure: end_failure
    next: バイタル聴取

  - step: バイタル聴取
    type: hearing
    output_format: text
    save_to: vitalSigns
    retry_failure: end_failure
    next: 氏名聴取_搬送_アナウンス

  - step: 氏名聴取_搬送_アナウンス
    type: announcement
    next: 氏名聴取_搬送

  - step: 氏名聴取_搬送
    type: subflow
    flowname: "医誠会国際総合病院$氏名聴取"
    next: 個人情報聴取_搬送_アナウンス

  - step: 個人情報聴取_搬送_アナウンス
    type: announcement
    next: 個人情報聴取_搬送

  - step: 個人情報聴取_搬送
    type: hearing
    output_format: text
    save_to: personalInfo
    retry_failure: end_failure
    next: 連絡先聴取_搬送_アナウンス

  - step: 連絡先聴取_搬送_アナウンス
    type: announcement
    next: 連絡先聴取_搬送

  - step: 連絡先聴取_搬送
    type: subflow
    flowname: "医誠会国際総合病院$電話番号聴取"
    next: 緊急手術確認

  - step: 緊急手術確認
    type: hearing
    output_format: enum
    save_to: emergencySurgery
    retry_failure: end_failure
    conditions:
      - match: "必要"
        next: 転送ガイダンス
      - match: "other"                      # = 不要（必要以外。両ブランチとも転送へ進む。値は受け入れ担当者の事前情報として context 保存）
        next: 転送ガイダンス

  - step: 転送ガイダンス
    type: announcement
    next: 担当者へ転送

  - step: 担当者へ転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    # 転送先電話番号は IVR プロパティ側で設定（params.number は空文字）
    # 第1段の転送先: 転送1 = 080-9923-2523（migration note 参照）
    # ※ 第2段 080-7031-1207 への順次フォールバックは Brekeke IVR UI で手動配置（NON-BLOCKER N-2）
    # call_transfer は scaffold が自動で status=3(成功)/9(失敗) と END_転送成功/END_転送失敗 を補完

  # ============================================================
  # 直接来院ルート（Gen1 移管ノート 「直接来院ルート」セクションに対応）
  # ============================================================
  - step: 直接来院_アナウンス
    type: announcement
    next: 氏名聴取_来院

  - step: 氏名聴取_来院
    type: subflow
    flowname: "医誠会国際総合病院$氏名聴取"
    next: 個人情報聴取_来院_アナウンス

  - step: 個人情報聴取_来院_アナウンス
    type: announcement
    next: 個人情報聴取_来院

  - step: 個人情報聴取_来院
    type: hearing
    output_format: text
    save_to: personalInfo
    retry_failure: end_failure
    next: 症状聴取

  - step: 症状聴取
    type: hearing
    output_format: text
    save_to: symptoms
    retry_failure: end_failure
    next: 連絡先聴取_来院_アナウンス

  - step: 連絡先聴取_来院_アナウンス
    type: announcement
    next: 連絡先聴取_来院

  - step: 連絡先聴取_来院
    type: subflow
    flowname: "医誠会国際総合病院$電話番号聴取"
    next: END_直接来院完了

  # ============================================================
  # 終話ブロック
  # ============================================================
  - step: END_直接来院完了
    type: termination
    termination_ref: END_直接来院完了

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
# 標準フィールドのうち、診察券番号・診療科・予約日・理由は本フロー（救急搬送）では使用しないため
# 標準フィールドとして定義のみ保持し、聴取は行わない（item_default は標準値を維持）。
# 救急搬送固有フィールド（facilityName / pickupAddress / patientStatus / vitalSigns / personalInfo /
# symptoms / emergencySurgery）を施設固有フィールド（item_default: false）として追加する。
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "救急搬送"
      - id: "2"
        order: "2"
        value: "直接来院"
    item_default: true
    editable: true
    deletable: false
    notes: "用件二択。Gen1 の救急搬送希望/直接来院 entity に対応"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名聴取サブフローで保存。両ルートで使用"

  - context_name: "facilityName"
    context_name_jp: "お迎え先施設名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "施設固有フィールド。Gen1 施設名聴取.yaml に対応。救急搬送ルートのみ"

  - context_name: "pickupAddress"
    context_name_jp: "お迎え先住所"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "施設固有フィールド。Gen1 住所聞き取り.yaml に対応。救急搬送ルートのみ"

  - context_name: "patientStatus"
    context_name_jp: "患者状態"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "施設固有フィールド。Gen1 状態聴取.yaml に対応。救急搬送ルートのみ（自由テキスト）"

  - context_name: "vitalSigns"
    context_name_jp: "バイタル（血圧・体温・治療中の病気）"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "施設固有フィールド。Gen1 血圧や体温の聴取（旧バイタル）.yaml に対応。救急搬送ルートのみ（自由テキスト）"

  - context_name: "personalInfo"
    context_name_jp: "個人情報（生年月日・年齢・性別）"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "施設固有フィールド。Gen1 個人情報聴取.yaml に対応。両ルートで使用（自由テキスト 1 発話）。Gen1 と同じく構造化せず一括保存。将来 DOB/年齢/性別 に分割する場合は NON-BLOCKER N-5 参照"

  - context_name: "symptoms"
    context_name_jp: "症状・治療中の病気"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "施設固有フィールド。Gen1 症状聴取.yaml に対応。直接来院ルートのみ（自由テキスト）"

  - context_name: "emergencySurgery"
    context_name_jp: "緊急手術要否"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "必要"
      - id: "2"
        order: "2"
        value: "不要"
    item_default: false
    editable: true
    deletable: false
    notes: "施設固有フィールド。Gen1 緊急手術必要か確認.yaml に対応。救急搬送ルートのみ。受け入れ担当者の事前準備情報として保存（フロー分岐用ではなく転送前の情報収集）"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "電話番号聴取サブフローで保存。両ルートで使用"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納（システム）"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "転送"
      - id: "6"
        order: "6"
        value: "時間外"
      - id: "9"
        order: "9"
        value: "転送失敗"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理(直接来院完了) / 2=代表案内/非通知/聴取失敗 / 3=転送成功 / 6=時間外（24h受付のため実フローでは未到達。互換性のため定義のみ保持）/ 9=転送失敗"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

