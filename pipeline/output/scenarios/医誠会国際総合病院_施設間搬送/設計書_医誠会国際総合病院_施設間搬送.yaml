    announcement: "{tts_g:恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。}"
  - module_name: "END_時間外"
    purpose: "時間外アナウンス（24h受付のため実フローでは未到達。互換性のため定義のみ保持）"
    announcement: "{tts_g:お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。}"
  - module_name: "END_聴取失敗"
    purpose: "リトライ上限到達時の終話アナウンス（Gen1 「3回失敗⇒終話へ（番号OK）」 + 「それでは、失礼いたします。」 を統合）"
    announcement: "{tts_g:大変申し訳ございません。うまく聞き取ることができませんでした。今おかけいただいている電話番号へ折り返しご連絡しますので、お待ちください。それでは、失礼いたします。}"
  - module_name: "END_直接来院完了"
    purpose: "直接来院ルート: 受付完了 + はしか流行案内 + 退室案内（Gen1 「直接来院終話」 + 「直接来院終話 3/26 追加」 を統合）"
    announcement: "{tts_g:受診のお申し込みを受け付けました。なお現在、国内ではしかの流行が確認されています。発疹や発熱などの症状がある方、または1ヶ月以内に海外渡航歴のある方、そのほか思い当たることがある方は、受付までお申し出ください。それでは、お気を付けてお越しください。}"

# --- セクション10: AmiVoice辞書（profile_words）---
# 主分岐 + 緊急手術確認は DTMF + 音声の混合受付。Gen1 entity_classification.md の R2/R3 規則に基づき
# 既存テンプレ（hearing_yesno_common / hearing_yoken_common）で吸収可能な surface 群はテンプレ参照とし、
# 施設固有エントリは下記に列挙する。
amivoice_dictionary:
  - step_name: "搬送or来院確認"
    words: |
      救急 きゅうきゅう
      搬送 はんそう
      緊急 きんきゅう
      直接 ちょくせつ
      自分で じぶんで
      行きます いきます
      行く いく
      一番 いちばん
      二番 にばん

  - step_name: "緊急手術確認"
    words: |
      必要 ひつよう
      必要です ひつようです
      不要 ふよう
      お願いします おねがいします
      手術 しゅじゅつ

# --- セクション11: 特記事項・制約 ---
special_notes:
  - "本フローは救急搬送（医療施設からの転院搬送）と直接来院（自家用車来院）の両方を受け付ける特殊フロー。診療予約系の標準テンプレートと構造が大きく異なる（用件分類は 2 値、診療科聴取なし、予約日聴取なし、診察券番号なし）。"
  - "24時間受付のため acceptance_times モジュールは使用しない。時間外終話パスは互換性のためデフォルトで定義するが、実運用では到達しない。"
  - "救急搬送ルートは医療従事者からの依頼を想定。施設名・住所は受け入れ準備のため必須項目。バイタル・緊急手術要否は受け入れ担当者の事前情報として保存。"
  - "直接来院ルートは患者本人または家族からの来院希望を想定。選定療養費（紹介状無し時 9,900 円）の案内を必ず含める。"
  - "終話時のはしか流行注意アナウンスは季節要因の固定文言。Dr.JOY 側で定期的な文言更新が必要（季節終了時の差し替え）。"
  - "個人情報聴取（生年月日・年齢・性別）は Gen1 と同様に自由テキスト 1 ステップで実装。emergency context での dialog 短縮を優先。構造化ニーズが顕在化した場合は将来 DOB Re-confirmation サブフロー + 年齢 hearing + 性別 enum hearing に分割可能（NON-BLOCKER N-5）。"
  - "両ルートから同一サブフロー（氏名聴取・電話番号聴取）を呼び出すため、scenario_flow には subflow ブロックを 2 回（_搬送 / _来院 サフィックス付き）配置するが、flow_structure.subflows[] には各サブフロー 1 エントリのみ登録する（PatientName 1 枠ルール §3.1.1 準拠）。"
  - "緊急手術確認 hearing は enum 出力（必要/不要）を context 保存するが、両ブランチとも転送ガイダンスへ進む（フロー分岐用ではなく受け入れ担当者の事前情報として保存）。"
  - "転送先 2 系統の順次フォールバック（転送1=080-9923-2523 → 転送2=080-7031-1207）は Brekeke IVR UI 側で手動配置が必要（NON-BLOCKER N-2）。設計書には 1 系統（080-9923-2523）のみ記載。"
  - "緊急時オーバーライド（ベット逼迫時の公設救急優先案内）は Gen3 第1版では未実装。Gen1 で「緊急時対応ノードへ繋ぐ場合はここから」という運用フラグで切り替えていた挙動を Gen3 で再現するには、acceptance_times の特殊スケジュール設定または別フロー分割が必要（NON-BLOCKER N-3）。"
  - "Gen1 で構想されていた「入電番号からの施設名自動取得 → 施設名確認 yes/no で auto-skip」は Gen3 第1版では未実装（Brekeke 側に標準モジュール無し）。常に施設名聴取から開始する（NON-BLOCKER N-4）。"

