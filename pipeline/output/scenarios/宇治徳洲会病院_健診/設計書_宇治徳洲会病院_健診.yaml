# --- セクション11: 特記事項・制約 ---
special_notes:
  - "企業/個人で聴取項目が大きく異なる複合フロー。企業ルートは企業名+担当者名+用件+問合せ内容+電話番号。個人ルートは用件+ルート固有聴取+氏名+生年月日+診察券番号+電話番号"
  - "個人ルートに「予約」選択肢はない（Gen2仕様継承）。企業のみ予約可（Webフォーム案内のみ）"
  - "smsFlagは2パターン: classification=キャンセル→smsFlag=2、それ以外→smsFlag=1。電話番号聴取サブフロー内で分岐"
  - "代表電話番号 0774-21-0010 を聴取失敗時のTTSで3回案内する（Gen2仕様継承）"
  - "予約日のDTMF入力は4桁(MMDD)。年はシステムで補完。10月以降で1-9月入力は翌年扱い（Gen2 section 1.3）"
  - "予約希望日はフリーワード保存が基本。明確な日付発話の場合のみyyyy-MM-ddに変換（Gen2 section 6）"
  - "Gen2 section 6の音声認識誤変換辞書: 「検針」「返信」→健診、「人間ロック」→人間ドック、「薬」→予約、「肺」→はい、「が今」→いいえ。OpenAIプロンプトに反映すること"
  - "Gen2 section 3の複数情報処理（一度に複数名の氏名・生年月日を聴取）は、Gen3では1発話1意図の原則により対応しない。1人ずつ聴取する"
  - "Gen2ソースにOpenAI APIキー（sk-proj-...）が平文で含まれている。設計書には含めない。キーローテーション推奨"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
  - item: "営業時間（曜日・時間帯）-- Gen2に記載なし。acceptance_timesモジュールは配置するがスケジュールは未設定"
    resolved: false
  - item: "smsFlag割り当て: smsFlag=1（キャンセル以外）/ smsFlag=2（キャンセル）が正しいか"
    resolved: false
  - item: "個人ルートに「予約」選択肢がないことの確認（Gen2仕様通り）"
    resolved: false
  - item: "RAGサブフロー（pattern 3）の要否確認。Gen2にFAQ検索機能はないが、Gen3移管デフォルトとして配置"
    resolved: false
  - item: "対象環境（デモ/本番）の確認。仮でデモ環境を設定"
    resolved: false
