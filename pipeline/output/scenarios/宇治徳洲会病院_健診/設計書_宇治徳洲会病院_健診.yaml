  - module_name: "用件確認_企業"
    purpose: "企業用件選択案内（4択）"
    announcement: "ありがとうございます。ご用件を、次の4つのうちの、いずれかでお話しください。予約を取る場合は1番、予約を変更する場合は2番、予約をキャンセルする場合は3番、その他お問い合わせの場合は4番を押してください。または、お話しください。"

  - module_name: "新規予約案内_企業"
