# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 (commubo) → Gen3 移管。Gen1 main.yaml は「個人情報を先に聴取してから用件聞取り」の順序だったが、Gen3 では「用件→各用件聴取→個人情報→受付完了→締め」の標準順序に再構成（移管ノートの「用件別の合流先」記述に従う）"
  - "用件確認は 5 値分類（新規／変更／キャンセル／問い合わせ／折返し連絡）。echo_back=true で 1 回復唱。Gen1 の 用件別個別文言（『健康診断のご予約、でよろしいですか?』『ご予約のキャンセル、でよろしいですか?』等）は Gen3 default echo_back（『お話いただいた内容は <% classification %> でしたが、よろしいでしょうか？』）に集約。完全一致が必要な場合は properties で 5 ブランチ別 Re-confirmation node TTS に分割（confirmation_items 参照）"
  - "折返し連絡ルートは個人情報聴取をスキップし END_折返し連絡 に直行（Gen1 仕様踏襲）。status=1, sms_flag=-1"
  - "問い合わせルートには 追加質問 がない（Gen1 仕様）。問合せ_内容聴取 直後に 氏名聴取 へ合流"
  - "変更ルートは 予約日聴取→変更項目（受診日 / その他）→ 受診日なら希望時期、その他なら内容聴取 → 追加質問 → 共通 の順。other は内容聴取に振分け"
  - "キャンセルルートは 予約日聴取→追加質問→共通 の順（内容聴取・希望時期は無し）"
  - "予約日聴取（変更・キャンセル）は datetime 形式（yyyy-MM-dd 00:00:00）。Gen1 の DTMF 4 桁（月日）入力＋過去日付なら +1 年補正は OpenAI 正規化プロンプトで吸収。echo_back=true で 1 回復唱"
  - "希望時期（新規・変更）は曖昧表現許容のため text 受け（datetime にしない）"
  - "内容聴取（新規・変更・問合せ）は自由テキスト保存。OpenAI processing は summarize（発話要約のみ）"
  - "追加質問は free text（reason ではなく専用 additionalQuestion フィールドに保存）"
  - "受付時間外: 日祝・年末年始 / 平日 8 時前 or 16 時以降 / 土曜 8 時前 or 12 時以降。土曜不定休のためホームページ案内を END_時間外 TTS に必ず含める"
  - "代表電話案内: 倉敷中央病院付属予防医療プラザ専用番号 086-422-6800（ガイダンス 2 番で予防医療プラザ着信）。Gen1 の Blind Transfer 等は使わず、END_聴取失敗 TTS で番号案内する設計"
  - "Gen1「もしもし」検知: 用件確認 OpenAI プロンプトで救済語扱い（NO_RESULT 相当に分類してリトライへ）。専用 hearing は配置しない"
  - "Gen1「3 回案内後カット」: Gen3 ではリトライ上限到達で END_聴取失敗 TTS に集約（HP 案内文言を END_聴取失敗 に組み込み済み）"
  - "Gen1「入電番号判断（IVR_TRANSFER vs それ以外）」分岐: Gen3 では未実装。冒頭_アナウンス は『上記以外』バージョンのみ採用（完全形）。IVR 経由短縮アナウンスが必要な場合は別途設計（confirmation_items 参照）"
  - "phonetype 分岐: 電話番号聴取サブフロー内で「携帯」「その他」を判定し phonetype context に保存。phonetype分岐 (CMR) で締めあいさつ TTS（携帯 = SMS あり / その他 = 電話のみ）を切替"
  - "氏名聴取は復唱なし（Gen1 入電者氏名.yaml 仕様）。生年月日聴取・電話番号聴取は復唱あり"
  - "TTS は {tts_g:...} 小文字のみ。SSML タグ・<dtmf/> 等は不使用（電話番号復唱の <speak type='telephone' breakc='300ms'> のみ電話番号復唱の SSML 例外として標準サンプルに含まれる）"
  - "Gen1 の <? $予約日の読み ?> / <? $連絡先電話番号（ハイフン区切あり） ?> 等の動的タグは Gen3 では <% var %> 構文へ。subflow 内 echo_back に集約済みのためメインフローでの直接参照は不要"
  - "ContextMatchRouter の reference_module: 用件分岐_受付完了 → OpenAI_用件確認（モジュール名）、phonetype分岐 → 電話番号聴取（subflow ステップ名）。両方とも conditions 末尾に match: 'other' + 明示 next を配置済み"
  - "group_name = facility_name = 「倉敷中央病院付属予防医療プラザ」（14 文字）。URL エンコード後の制約（漢字 19 文字以内目安）を満たす"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（Dr.JOY 施設ID）— Dr.JOY 管理画面で確認"
    resolved: false
  - item: "用件確認 echo_back の 5 ブランチ別 個別文言（『健康診断のご予約、でよろしいですか?』『ご予約のキャンセル、でよろしいですか?』『ご予約の変更、でよろしいですか?』『その他お問い合わせ、でよろしいですか?』『当施設から折り返しの着信があった方のご連絡、でよろしいですか?』）を Gen3 で完全再現するか、Gen3 default echo_back（generic 復唱文）で運用するかを決定。完全再現の場合は properties で 5 個別 Re-confirmation node TTS に分割が必要"
    resolved: false
  - item: "Gen1「入電番号判断」（IVR_TRANSFER vs その他）の Gen3 実装要否。IVR 経由短縮アナウンス『こちらは健康診断の予約関連専用、AI電話です。』が必要な場合は別途 hearing or augment ブロックを追加（現設計では『上記以外』完全形 TTS のみ採用）"
    resolved: false
  - item: "Gen1「もしもし検知」の Gen3 実装要否。現設計では 用件確認 OpenAI プロンプトの no_result_condition に『もしもしのみ』を含めて救済語扱い → リトライへ。専用『はい、聞こえております』TTS が必要な場合は別途 augment ブロックを追加"
    resolved: false
  - item: "RAG/FAQ サブフローの追加要否。Gen1→Gen3 移管時のデフォルトはパターン2（全終話前にラスト質問 RAG）だが、Gen1 にFAQ機能が無いため現設計では 'none' に設定。導入時は問合せ_内容聴取 直後と 受付完了 直前の 2 箇所配置を検討"
    resolved: false
  - item: "予約日聴取（変更・キャンセル）の +1 年補正ロジック実装確認。Gen1 では『現在日より過去なら +1 年』を script モジュールで処理していたが、Gen3 では OpenAI 正規化プロンプトで対応する設計。実機通話テストで動作確認すること"
    resolved: false
  - item: "問合せ_内容聴取 直後の キーワード判定（「健診の結果」「人間ドックの結果」「健康診断の結果」を含むなら代表案内へ振分け）の追加要否。Medcity21 等同種シナリオには存在するが、Gen1 倉敷予防医療プラザには無し。施設運用上必要なら問合せ_内容聴取 と 氏名聴取 の間に context_match_router を追加"
    resolved: false
  - item: "電話番号聴取サブフロー内の非通知聴取失敗時の遷移確認。標準サンプル JSON 完コピ前提だが、サブフロー内で完結するか親フローへシグナルするかを copy_subflows.py 実行後に確認"
    resolved: false
  - item: "Dr.JOY 側の SMS 送信文面設定（sms_flag=1 の場合の本文）"
    resolved: false
  - item: "Dr.JOY 側の認証設定（生年月日・電話番号の優先順位）"
    resolved: false
  - item: "Dr.JOY 側の営業時間スケジュール詳細登録: 月〜金 8:00-16:00 / 土 8:00-12:00 / 日祝・年末年始休 / 土曜不定休（Brekeke acceptance_times は曜日・時間のみ。土曜不定休の個別日付は Dr.JOY 側で休館日カレンダーとして登録）"
    resolved: false
  - item: "Gen1「★転送可否と入れ替え」箱の意図確認。テスト用の名残（移管ノートで言及）として削除しているが、Gen2/Gen3 で何らかの転送先入れ替えロジックが意図されていた場合は別途設計必要"
    resolved: false
  - item: "用件確認 retry_failure='end_failure' で END_聴取失敗 へ遷移する仕様の妥当性。Gen1 では 5 回連続聞き取れず → 『再度お伺いします』再質問 → 3 回累積で END_用件取得できず → 終話へ。Gen3 では retry_count=2＋end_failure で代表案内に直行する設計（CP 用件聴取不可と等価）"
    resolved: false
