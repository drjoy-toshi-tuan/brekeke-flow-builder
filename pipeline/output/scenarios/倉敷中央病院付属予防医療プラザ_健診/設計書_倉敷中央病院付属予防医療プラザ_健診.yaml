# 設計書: 倉敷中央病院付属予防医療プラザ — 健診
# 生成元: @director エージェント
# 作業種別: Gen1 (commubo) → Gen3 移管
# 元資料: commubo抽出/【006】倉敷中央病院/【0007倉敷中央病院付属予防医療プラザ】健診1_M_本番/
# 移管ノート: docs/migration/gen1_倉敷中央病院付属予防医療プラザ_健診.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "倉敷中央病院付属予防医療プラザ"
  scenario_name: "健診"
  group_name: "倉敷中央病院付属予防医療プラザ"
  flow_name: "倉敷中央病院付属予防医療プラザ$健診"
  target_facility: "本院のみ（予防医療プラザ専用）"
  office_id: "TODO_要確認"
  phone_number: "086-422-6800"
  business_hours: "祝日・年末年始除く 月〜金 8:00〜16:00 / 土 8:00〜12:00（土曜は不定休）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "倉敷中央病院付属予防医療プラザ$健診"
      role: "main"
      description: "健診の予約・変更・キャンセル・問い合わせ・折返し連絡を 5 用件で受付。Gen1 では個人情報を先に聴取していたが、Gen3 では 用件→各用件聴取→個人情報→受付完了→締め の標準順序へ再構成。締めあいさつは 携帯/その他 で smsFlag 切替。"
  subflows:
    - name: "倉敷中央病院付属予防医療プラザ$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1 では「入電者氏名」サブフロー。受診者と入電者の分離設計は無く 1 名のみ patientName へ格納。Gen1 にも 復唱なし"
    - name: "倉敷中央病院付属予防医療プラザ$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1 復唱「<生年月日>、でよろしいですか？」。和暦聴取・大正〜令和判定込みで標準サンプル JSON を完コピ"
    - name: "倉敷中央病院付属予防医療プラザ$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1 復唱「ご連絡先の電話番号は、<番号>でよろしいでしょうか？」。incoming-classifier で携帯/固定判別、サブフロー出口で phonetype を「携帯」/「その他」で保存。締めあいさつ TTS 切替に使用"

# --- セクション3: フローの目的 ---
purpose: |
  倉敷中央病院付属予防医療プラザ（予防医療プラザ）への健診関連電話を受付。
  ユーザーから「新規予約／予約変更／予約キャンセル／問い合わせ／折返し連絡」5 用件を聴取し、
  各用件ごとの必須項目（追加オプション希望・希望時期・現在の予約日・変更項目・追加質問）を確定させ、
  共通で氏名・生年月日・連絡先を聴取してから Dr.JOY 担当者が3営業日以内に折り返す前提でステータス・SMS 送信フラグを記録する。
  携帯番号取得時は SMS 併用案内を流し、それ以外は折り返し電話のみの案内に切り替える。
  受付時間外（日祝・年末年始・平日 8 時前/16 時以降・土曜 8 時前/12 時以降）は代表番号 086-422-6800 へ案内して終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "倉敷中央病院付属予防医療プラザ$健診"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外
                          └─ 受付可 → 冒頭_アナウンス
                                        → 用件確認 (enum 5値, 復唱あり)
                                            ├─ 新規        → 新規_内容聴取 → 新規_希望時期 → 新規_追加質問 → [共通]
                                            ├─ 変更        → 変更_予約日聴取 → 変更_変更項目
                                            │                                  ├─ 受診日 → 変更_希望時期 → 変更_追加質問 → [共通]
                                            │                                  └─ default → 変更_内容聴取 → 変更_追加質問 → [共通]
                                            ├─ キャンセル  → キャンセル_予約日聴取 → キャンセル_追加質問 → [共通]
                                            ├─ 問い合わせ  → 問合せ_内容聴取 → [共通]
                                            ├─ 折返し連絡  → END_折返し連絡
                                            └─ default     → END_聴取失敗

      [共通: 個人情報聴取 → 用件分岐 → 受付完了TTS → phonetype分岐 → 締め]
      [共通] = 氏名聴取(subflow) → 生年月日聴取(subflow) → 電話番号聴取(subflow)
              → 用件分岐_受付完了 (CMR: OpenAI_用件確認)
                    ├─ 新規        → 新規_受付完了 (announcement)
                    ├─ 変更        → 変更_受付完了 (announcement)
                    ├─ キャンセル  → キャンセル_受付完了 (announcement)
                    ├─ 問い合わせ  → 問合せ_受付完了 (announcement)
                    └─ other       → 問合せ_受付完了
              → phonetype分岐 (CMR: 電話番号聴取)
                    ├─ 携帯  → END_共通_携帯  (sms_flag=1)
                    └─ other → END_共通_携帯以外 (sms_flag=-1)
    notes: "use_acceptance_times=true。土曜不定休のため END_時間外 TTS にホームページ案内を必ず含める。Gen1 にあった「もしもし」検知・「3 回案内後カット」は Gen3 では 用件 OpenAI プロンプトでの救済語＋END_聴取失敗 の代表案内 TTS に集約"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ============================================================
  # 冒頭チェーン（必須）
  # ============================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # ============================================================
  # 用件確認（5値分岐 + 復唱 + フォールバック）
  # ============================================================
  - step: 用件確認
    type: hearing
    output_format: enum
    output_labels:
      - "新規"
      - "変更"
      - "キャンセル"
      - "問い合わせ"
      - "折返し連絡"
    conditions:
      - match: "新規"
        next: 新規_内容聴取
      - match: "変更"
        next: 変更_予約日聴取
      - match: "キャンセル"
        next: キャンセル_予約日聴取
      - match: "問い合わせ"
        next: 問合せ_内容聴取
      - match: "折返し連絡"
        next: END_折返し連絡
      - match: "other"
        next: END_聴取失敗

  # ============================================================
  # A) 新規ルート
  # ============================================================
  - step: 新規_内容聴取
    type: hearing
    output_format: text
    next: 新規_希望時期

  - step: 新規_希望時期
    type: hearing
    output_format: text
    next: 新規_追加質問

  - step: 新規_追加質問
    type: hearing
    output_format: text
    next: 氏名聴取

  # ============================================================
  # B) 変更ルート
  # ============================================================
  - step: 変更_予約日聴取
    type: hearing
    output_format: datetime
    next: 変更_変更項目

  - step: 変更_変更項目
    type: hearing
    output_format: enum
    output_labels:
      - "受診日"
      - "その他"
    conditions:
      - match: "受診日"
        next: 変更_希望時期
      - match: "other"
        next: 変更_内容聴取

  - step: 変更_希望時期
    type: hearing
    output_format: text
    next: 変更_追加質問

  - step: 変更_内容聴取
    type: hearing
    output_format: text
    next: 変更_追加質問

  - step: 変更_追加質問
    type: hearing
    output_format: text
    next: 氏名聴取

  # ============================================================
  # C) キャンセルルート
  # ============================================================
  - step: キャンセル_予約日聴取
    type: hearing
    output_format: datetime
    next: キャンセル_追加質問

  - step: キャンセル_追加質問
    type: hearing
    output_format: text
    next: 氏名聴取

  # ============================================================
  # D) 問い合わせルート（追加質問なし）
  # ============================================================
  - step: 問合せ_内容聴取
    type: hearing
    output_format: text
    next: 氏名聴取

  # ============================================================
  # 共通: 個人情報聴取（サブフロー 3 本）
  # ============================================================
  - step: 氏名聴取
    type: subflow
    flowname: "倉敷中央病院付属予防医療プラザ$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "倉敷中央病院付属予防医療プラザ$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "倉敷中央病院付属予防医療プラザ$電話番号聴取"
    next: 用件分岐_受付完了

  # ============================================================
  # 用件分岐（受付完了 TTS の振分け）
  # ============================================================
  - step: 用件分岐_受付完了
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "新規"
        next: 新規_受付完了
      - match: "変更"
        next: 変更_受付完了
      - match: "キャンセル"
        next: キャンセル_受付完了
      - match: "問い合わせ"
        next: 問合せ_受付完了
      - match: "other"
        next: 問合せ_受付完了

  - step: 新規_受付完了
    type: announcement
    next: phonetype分岐

  - step: 変更_受付完了
    type: announcement
    next: phonetype分岐

  - step: キャンセル_受付完了
    type: announcement
    next: phonetype分岐

  - step: 問合せ_受付完了
    type: announcement
    next: phonetype分岐

  # ============================================================
  # phonetype 分岐（締めあいさつの振分け）
  # ============================================================
  - step: phonetype分岐
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: END_共通_携帯
      - match: "other"
        next: END_共通_携帯以外

  # ============================================================
  # 終話ブロック
  # ============================================================
  - step: END_共通_携帯
    type: termination
    termination_ref: "END_共通_携帯"

  - step: END_共通_携帯以外
    type: termination
    termination_ref: "END_共通_携帯以外"

  - step: END_折返し連絡
    type: termination
    termination_ref: "END_折返し連絡"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # === Dr.JOY デフォルト項目 ===
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "新規"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "問い合わせ"
      - id: "5"
        order: "5"
        value: "折返し連絡"
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分。Gen1 用件聞取り（復唱無し）.yaml の 5 値を踏襲"

  - context_name: "patientName"
    context_name_jp: "受診者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "Gen1 入電者氏名サブフロー。受診者=入電者の前提で 1 名のみ格納"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "和暦聴取→正規化→1 回復唱"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "聴取する電話番号。incoming-classifier で携帯/固定判別→ phonetype に保存"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納（システム）"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "現在予約されている日程（変更・キャンセル時に聴取）。Gen1 予約日聞き取り.yaml + 1 年補正ロジックを OpenAI プロンプトで吸収"

  - context_name: "reason"
    context_name_jp: "問合せ・変更内容"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "問合せ_内容聴取・変更_内容聴取の合流先。複数回入力時は OpenAI プロンプトで改行追記"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理（受付完了） 2=代表案内（非通知） 3=聴取失敗 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

  # === 案件固有フィールド（itemDefault: false）===
  - context_name: "option"
    context_name_jp: "新規追加オプション希望"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "新規_内容聴取「追加を希望されるオプション検査がございましたら、お話ください…」の保存先。フリーテキスト保存（リスト同定なし、特にありません等も text 受け）"

  - context_name: "preferredDate"
    context_name_jp: "受診希望時期"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "新規_希望時期・変更_希望時期の合流先。「来月上旬」「なるべく早く」等の曖昧表現許容のため text"

  - context_name: "changeItem"
    context_name_jp: "変更項目"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "変更_変更項目（受診日 / その他）の保存先。「受診日」または「その他」"

  - context_name: "additionalQuestion"
    context_name_jp: "追加質問"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "新規_追加質問・変更_追加質問・キャンセル_追加質問の合流先。「他に、オペレーターにお伝えになりたいことがあれば…」自由テキスト。「特にありません」等の否定表現も text 受け"

  - context_name: "phonetype"
    context_name_jp: "電話種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "電話番号聴取サブフロー内で「携帯」「その他」を判定して保存。phonetype分岐 で締めあいさつ TTS（携帯/その他）の振分けに使用"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "変更"
      - "キャンセル"
      - "問い合わせ"
      - "折返し連絡"
    notes: "Gen1 救済語マッピング適用: 新規←{健康診断,健診,検診,人間ドック,ドック,特定健診,検針,返信,雇い入れ,進学,事業主,生活習慣病} / 変更←{延期,日程,日付,別の,変えたい,予約の変更,取り直す,並行,平行} / キャンセル←{やめる,取消,取り消し,取り消す,予約のキャンセル} / 問い合わせ←{その他,なくした,確認,調べて,忘れた,料金,金額,検査結果,アクセス,聞きたい} / 折返し連絡←{折り返し,コールバック,折返し,連絡が欲しい}。other は END_聴取失敗（代表案内 TTS）へ。echo_back=true で復唱確認 (Re-confirmation node) を 1 回挟む"

  - order: 2
    name: "新規_内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "option"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "「追加を希望されるオプション検査がございましたら、お話ください。ない場合には『特にありません』、のようにお話ください。」自由発話のためフリーテキスト保存（OpenAI で発話要約のみ実施）"

  - order: 3
    name: "新規_希望時期"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "preferredDate"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "「受診を希望されている時期をお話ください。」明確日付・曖昧表現どちらも text 受け（datetime 制約を避けるため）"

  - order: 4
    name: "新規_追加質問"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "additionalQuestion"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "「他に、オペレーターにお伝えになりたいことがあれば、お話下さい。なければ『特にありません』のようにお話下さい。」自由テキスト保存"

  - order: 5
    name: "変更_予約日聴取"
