# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系（デフォルト必須）===
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（日祝・年末年始 / 平日 8 時前または 16 時以降 / 土曜 8 時前または 12 時以降）"
    tts_announcement: "申し訳ありません。現在は受付時間外です。受付時間は、日曜祝日、年末年始を除く月曜から金曜の8時から16時、土曜は8時から12時です。なお、土曜は不定休のため、ホームページの「営業日のご案内」をご確認ください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件確認・変更項目等の重要分岐ステップ）／ 用件確認 default 経路"
    tts_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、倉敷中央病院付属予防医療プラザ専用番号、086-422-6800まで、お電話をおかけください。お電話が繋がりましたらガイダンス2番を押してください。受付時間は、日曜祝日、年末年始を除く月曜から金曜の8時から16時、土曜は8時から12時です。なお、土曜は不定休のため、ホームページの「営業日のご案内」をご確認ください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 正常系（倉敷中央病院付属予防医療プラザ 健診固有）===
  - name: "END_共通_携帯"
    condition: "全聴取完了 AND phonetype=携帯（連絡先電話番号が 070/080/090 開始）"
    tts_announcement: "3営業日を目安に、担当者からお電話、もしくは、ショートメールにてご連絡し、ご予約を確定いたします。現在お申込みが集中しており、通常よりお時間を頂戴しておりますが、必ずご連絡致しますので、よろしくお願い申し上げます。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_共通_携帯"

  - name: "END_共通_携帯以外"
    condition: "全聴取完了 AND phonetype=その他（携帯以外＝固定/IP/050/0120 等）"
    tts_announcement: "3営業日を目安に、担当者から折り返しご連絡し、ご予約を確定いたします。現在お申込みが集中しており、通常よりお時間を頂戴しておりますが、必ずご連絡致しますので、よろしくお願い申し上げます。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_共通_携帯以外"

  - name: "END_折返し連絡"
    condition: "用件確認＝折返し連絡（個人情報聴取スキップ）"
    tts_announcement: "折り返しのご連絡、ありがとうございます。大変恐れ入りますが、オペレーターより改めてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_折返し連絡"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"
    - "classification"
  patterns:
    - condition: "classification ∈ {新規,変更,キャンセル,問い合わせ} AND phonetype=携帯"
      sms_flag: "1"
      notes: "→ END_共通_携帯 (status=1)"
    - condition: "classification ∈ {新規,変更,キャンセル,問い合わせ} AND phonetype=その他"
      sms_flag: "-1"
      notes: "→ END_共通_携帯以外 (status=1)"
    - condition: "classification=折返し連絡"
      sms_flag: "-1"
      notes: "→ END_折返し連絡 (status=1)"

