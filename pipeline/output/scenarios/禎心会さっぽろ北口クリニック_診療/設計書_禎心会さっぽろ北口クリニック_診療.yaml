# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1→Gen3 移管。サブシナリオ 14 本を Gen3 9 ブロック型に集約。冒頭の API_DRJOY_CONTEXT_SETTINGS / API_DRJOY は Gen3 標準処理（saveContextModel2DB / acceptance_times）に吸収"
  - "Gen1 main.yaml の連鎖「用件を判断 / 用件を判断_1 / _2 / _3」は context_match_router 2 枚（用件分岐_2 / 用件分岐_3）に圧縮。reference_module は OpenAI_用件聞き取り（同一 OpenAI モジュールを 2 回参照）"
  - "PatientName / 生年月日 / 電話番号サブフローは 1 枠ルール準拠。flow_structure.subflows[] にはそれぞれ 1 本だけ登録し、scenario_flow からは複数の step が同じ flowname を参照（4 ルートから氏名・生年月日・電話番号を呼び出し）"
  - "「健診・ドック / ワクチン接種 / 脳ドック / 心臓ドック / 婦人科の健診ドック」は症状ヒアリング・紹介状確認をスキップ（Gen1 main.yaml「健診ドックワクチン接種で症状聞かない。」より）。診療科聴取_新規 の conditions で直接分岐"
  - "予約変更/キャンセル/確認は氏名→生年月日後に用件分岐_3 で再分岐するが、これは Gen1 「次へ_1 → 患者氏名_1 → 生年月日_1 → 用件を判断_3」の構造を継承。氏名・生年月日先行確定により取り違え防止"
  - "新規予約のみ電話種別で SMS 出し分け（携帯=END_新規予約_携帯, 固定/IP=END_新規予約_固定）。予約変更/キャンセル/確認は Gen1 既存セリフをそのまま使用するため電話種別分岐なし（変更/確認は固定文言で SMS 言及あり）。これは Gen3 標準（固定電話に SMS 言及しない）と乖離するため確認レポート N-3 で人間確認対象"
  - "代表電話 011-709-1131 は END_聴取失敗（リトライ上限到達時の案内）の TTS 内に組み込み"
  - "営業時間（月火水金 8:25-17:00 / 木土 8:25-12:30 / 日祝・年末年始休）は acceptance_times モジュール配置を指示するが、具体的なスケジュール設定は Dr.JOY 側で行う"
  - "Gen1 「禎心会病院案内へ」「禎心会病院案内へ_1」（札幌禎心会病院 050-1722-2947 への誘導）はメインフロー上の到達経路が確認できないため Gen3 では除外（director判断）。要確認事項として確認レポートに記載"
  - "Gen1 「当日は代表へ」（当日予約は AI 不可）も到達経路が main.yaml 上で確認できないため Gen3 では除外。実装が必要な場合は予約日聴取後に当日判定 Script を追加要"
  - "Gen1 「営業前」（4月1日 9時より受付開始）は年度依存ハードコードのため除外。新年度の受付開始告知は Dr.JOY 側で別途運用"
  - "Gen1 「診療科聞き取りNG → 診療科フリー聴取」のフォールバックは Gen3 では `no_result_default: 登録なし` でカバー。フリー聴取相当は追加要望_新規 で吸収"
  - "Gen1 entity_classification.md の「代表案内診療科」（がんセカンドオピニオン外来 / 救急 / 血管内留置デバイス外来）と診療科.yaml の「代表案内分岐」（神経内科・脊椎脊髄末梢神経外科 等を本院誘導）はメインフロー上の到達経路がテスト残骸の可能性が高いため Gen3 では実装しない。診療科リストには通常 25 科のみ登録し、代表案内系の本院誘導が必要なら別途仕様確認"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（Dr.JOY 施設ID）"
    resolved: false
  - item: "本院誘導 announcement（禎心会病院案内へ / 禎心会病院案内へ_1）の有効ルート確認。Gen1 main.yaml 上は到達経路がないため Gen3 では除外したが、特定診療科（がんセカンドオピニオン / 救急 / 血管内留置デバイス / 神経内科 / 脊椎脊髄末梢神経外科 等）を本院（札幌禎心会病院 050-1722-2947）に誘導する仕様が本来必要かどうかを顧客に確認"
    resolved: false
  - item: "「当日は代表へ」（当日予約は AI 不可）の必要性確認。Gen1 上は到達経路不明だが、当日予約を弾く仕様が必要なら予約日聴取後に Script（today 判定）+ 代表案内終話を追加する"
    resolved: false
  - item: "予約確認 / 予約変更ルートの SMS 言及。Gen1 既存セリフでは固定電話でも SMS に言及するため Gen3 でも継承したが、Gen3 標準では「固定電話に SMS 言及しない」のが推奨。固定電話パターンで SMS 言及をやめるか確認"
    resolved: false
  - item: "新規予約・予約変更の予約希望日聴取（output_format=datetime）の許容形式。「来月上旬」のような曖昧表現を datetime（YYYY-MM-DD HH:MM）で受け付けられないため、必要なら追加要望ステップで吸収する設計でよいか"
    resolved: false
  - item: "営業時間 acceptance_times の Dr.JOY 側設定（月火水金 8:25-17:00 / 木土 8:25-12:30 / 日祝・年末年始休）"
    resolved: false
  - item: "smsFlag の最終割り当て（特に予約変更・予約確認の固定電話パターン）"
    resolved: false
  - item: "診療科聴取の OpenAI プロンプト類義語精度。Gen1 entity_classification.md には 309 件の専門名詞・読み仮名・キーワードが登録されている。STT profile_words に転記したのは主要なものに限定したため、@prompter での OpenAI プロンプト生成時に元資料 (entity_classification.md / entity_openai_synonyms.md) を再参照すること"
    resolved: false
