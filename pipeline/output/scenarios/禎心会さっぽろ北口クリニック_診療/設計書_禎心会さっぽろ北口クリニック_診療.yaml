# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系 ===
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、日曜祝日、年末年始を除く、月曜、火曜、水曜、金曜の8時25分から17時、木曜、土曜の8時25分から12時30分となっております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "用件・氏名・生年月日・診療科いずれかのリトライ上限到達"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。電話番号は011-709-1131です。繰り返します。電話番号は011-709-1131です。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 正常系 ===
  - name: "END_新規予約_携帯"
    condition: "新規予約ルート完了 かつ phonetype=携帯"
    tts_announcement: "3診療日以内に、担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_新規予約_携帯"

  - name: "END_新規予約_固定"
    condition: "新規予約ルート完了 かつ phonetype=その他（固定/IP）"
    tts_announcement: "3診療日以内に、担当者から折り返し、電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_新規予約_固定"

  - name: "END_予約確認"
    condition: "予約確認ルート完了"
    tts_announcement: "予約に関するお問合せを受付いたしました。3診療日以内に、担当者からショートメール、もしくは折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約確認"

  - name: "END_初診再診変更"
    condition: "予約変更ルート完了"
    tts_announcement: "それでは、3診療日以内に、担当者からショートメール、もしくは折り返し電話にてご連絡いたします。折り返しのご連絡をもって予約が確定いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_初診再診変更"

  - name: "END_予約キャンセル"
    condition: "予約キャンセルルート完了"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_予約キャンセル"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["phonetype", "classification"]
  patterns:
    - condition: "classification=新規予約 かつ phonetype=携帯"
      sms_flag: "1"
      notes: "新規予約は電話種別で SMS 出し分け"
    - condition: "classification=新規予約 かつ phonetype=その他"
      sms_flag: "-1"
      notes: "固定/IP電話は SMS 受信不可"
    - condition: "classification=予約確認"
      sms_flag: "1"
      notes: "Gen1 既存セリフを尊重し、固定電話でも SMS 言及あり（要顧客確認）"
    - condition: "classification=予約変更"
      sms_flag: "1"
      notes: "同上"
    - condition: "classification=予約キャンセル"
      sms_flag: "-1"
      notes: "キャンセルは折り返し連絡なし"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "施設名と自動応答である旨の冒頭案内（Gen1 挨拶+タイトルを統合）"
    announcement: "お電話ありがとうございます。禎心会さっぽろ北口クリニックの、予約専用電話です。ご希望をお伺いしますので、この後の質問にお答えください。"

  - module_name: "用件聞き取り"
    purpose: "用件 4 分類聴取 TTS"
    announcement: "ご用件を、次の４つのうちの、いずれかでお話ください。「予約を取る」「予約を変更する」「予約をキャンセルする」「予約を確認する」、それでは、お話ください。"

  - module_name: "予約案内"
    purpose: "新規予約ルート導入 announcement"
    announcement: "ご予約のご案内をいたします。なお、直近のご予約には対応できない場合がございます。"

  - module_name: "診療科聴取_新規"
    purpose: "新規予約ルートの診療科聴取 TTS"
    announcement: "希望される診療科、ドック、ワクチン接種などを一つ、お話ください。"

  - module_name: "紹介状有無"
    purpose: "紹介状有無聴取 TTS"
    announcement: "他の医療機関からの紹介状はお持ちですか？"

  - module_name: "症状ヒアリング"
    purpose: "新規予約ルートの症状ヒアリング TTS"
    announcement: "現在の症状を、簡単にお話ください。"

  - module_name: "追加要望_新規"
    purpose: "新規予約ルートの追加要望聴取 TTS"
    announcement: "複数名、複数診療科の予約や、予約希望日など、ご希望があればお話ください。なければ、特にありませんとお話ください。"

  - module_name: "確認内容の聞き取り"
    purpose: "予約確認ルートの確認内容聴取 TTS"
    announcement: "ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」など、内容を簡潔にお話ください。"

  - module_name: "診療科聴取_変更キャンセル"
    purpose: "予約変更/キャンセルルートの診療科聴取 TTS"
    announcement: "予約されている診療科、ドック、ワクチン接種などを一つ、もしくはわからないとお話ください。"

  - module_name: "予約日聴取"
    purpose: "予約変更/キャンセルルートの予約日（フリー聴取）TTS"
    announcement: "予約されている日付を「4月1日」のようにお話いただくか、「わからない」とお話ください。"

  - module_name: "予約希望日聴取"
    purpose: "予約変更ルートの希望日聴取 TTS"
    announcement: "受診を希望されている日付や時期を、ご自由にお話ください。"

  - module_name: "END_非通知"
    purpose: "非通知着信時の終話 TTS"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  - module_name: "END_時間外"
    purpose: "時間外着信時の終話 TTS"
    announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、日曜祝日、年末年始を除く、月曜、火曜、水曜、金曜の8時25分から17時、木曜、土曜の8時25分から12時30分となっております。恐れ入りますが、受付時間内におかけなおしください。"

  - module_name: "END_聴取失敗"
    purpose: "リトライ上限到達時の代表案内終話 TTS"
    announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。電話番号は011-709-1131です。繰り返します。電話番号は011-709-1131です。"

  - module_name: "END_新規予約_携帯"
    purpose: "新規予約 + 携帯ルートの終話 TTS"
    announcement: "3診療日以内に、担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_新規予約_固定"
    purpose: "新規予約 + 固定/IP ルートの終話 TTS"
    announcement: "3診療日以内に、担当者から折り返し、電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_予約確認"
    purpose: "予約確認ルートの終話 TTS"
    announcement: "予約に関するお問合せを受付いたしました。3診療日以内に、担当者からショートメール、もしくは折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_初診再診変更"
    purpose: "予約変更ルートの終話 TTS"
    announcement: "それでは、3診療日以内に、担当者からショートメール、もしくは折り返し電話にてご連絡いたします。折り返しのご連絡をもって予約が確定いたします。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_予約キャンセル"
    purpose: "予約キャンセルルートの終話 TTS"
    announcement: "予約キャンセルの申し込みを受付いたしました。お電話ありがとうございました。それでは失礼いたします。"

