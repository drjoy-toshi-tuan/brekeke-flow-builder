# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。禎心会さっぽろ北口クリニックの、予約専用電話です。ご希望をお伺いしますので、この後の質問にお答えください。"
    input_method: "voice_only"
    save_to: ""
    next_step: "用件聞き取り"
    retry_failure: "skip"

  - step_name: "用件聞き取り"
    tts_announcement: "ご用件を、次の４つのうちの、いずれかでお話ください。「予約を取る」「予約を変更する」「予約をキャンセルする」「予約を確認する」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規予約"
        - "予約変更"
        - "予約キャンセル"
        - "予約確認"
      mapping:
        - input: "DTMF 1 / 「予約を取る」「予約する」「初診」「再診」「診察予約」「診療予約」「予約お願い」「予約をしたい」"
          output: "新規予約"
        - input: "DTMF 2 / 「予約を変更する」「変更」「延期」「取り直す」「予約の変更」"
          output: "予約変更"
        - input: "DTMF 3 / 「予約を確認する」「確認」「予約確認」「日時確認」「時間を忘れた」「予約日時を確認する」"
          output: "予約確認"
        - input: "DTMF 4 / 「予約をキャンセルする」「キャンセル」「やめる」「取り消し」「取り消す」「予約のキャンセル」"
          output: "予約キャンセル"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "（OpenAI 分岐により遷移先が決まる）"
    retry_failure: "end_failure"

  - step_name: "予約案内"
    tts_announcement: "ご予約のご案内をいたします。なお、直近のご予約には対応できない場合がございます。"
    input_method: "voice_only"
    save_to: ""
    next_step: "診療科聴取_新規"
    retry_failure: "skip"

  - step_name: "診療科聴取_新規"
    tts_announcement: "希望される診療科、ドック、ワクチン接種などを一つ、お話ください。"
    input_method: "voice_only"
