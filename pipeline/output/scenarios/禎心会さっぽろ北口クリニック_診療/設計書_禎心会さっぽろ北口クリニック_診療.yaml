# 生成元: @director エージェント
# 生成日: 2026-05-07
# 作業種別: Gen1 → Gen3 マイグレーション
# 元資料: commubo抽出/【031】札幌禎心会病院｜【032】北口クリニック/【0044禎心会さっぽろ北口クリニック】診療1_M_本番/
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "禎心会さっぽろ北口クリニック"
  scenario_name: "診療"
  group_name: "禎心会さっぽろ北口クリニック"
  flow_name: "禎心会さっぽろ北口クリニック$診療"
  target_facility: "禎心会さっぽろ北口クリニック（単独）"
  office_id: "TODO_要確認"
  phone_number: "011-709-1131"
  business_hours: "祝日・年末年始除く 月火水金 8:25〜17:00 / 木土 8:25〜12:30 / 日祝休"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "禎心会さっぽろ北口クリニック$診療"
      role: "main"
      description: "メインフロー：用件4分類（新規予約/予約変更/予約キャンセル/予約確認）→ ルート別聴取 → 終話"
  subflows:
    - name: "禎心会さっぽろ北口クリニック$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1 患者氏名聞き取り.yaml のサブシナリオ。新規予約 / 予約変更 / 予約キャンセル / 予約確認 の 4 ルートから参照される PatientName 1 枠"
    - name: "禎心会さっぽろ北口クリニック$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1 生年月日聞き取り.yaml のサブシナリオ。和暦/西暦変換と DOB Re-confirmation 復唱を含む。4 ルートから参照"
    - name: "禎心会さっぽろ北口クリニック$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1 連絡先電話番号聞き取り.yaml + 電話番号区切り.yaml のサブシナリオ。incoming-classifier で携帯/固定分岐し phonetype を保存。4 ルートから参照"

# --- セクション3: フローの目的 ---
purpose: |
  禎心会さっぽろ北口クリニックの予約専用電話における、患者からの電話を自動応対するボイスボットフロー。
  用件（新規予約 / 予約変更 / 予約キャンセル / 予約確認）を聴取し、各ルートに応じた個人情報・診療科・予約日等を取得して
  Dr.JOY に登録する。新規予約のみ電話種別で SMS 案内を出し分け、それ以外の用件は固定文言で完了案内する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "禎心会さっぽろ北口クリニック$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 → 切断
            └─ 通常   → 営業時間チェック(acceptance_times: 月火水金 8:25-17:00 / 木土 8:25-12:30)
                          ├─ 時間外 → END_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → 用件聞き取り (DTMF 1=新規予約 / 2=変更 / 3=確認 / 4=キャンセル)
                                          ├─ 新規予約 → 予約案内(announcement)
                                          │              → 診療科聴取_新規 (no_result_default=登録なし)
                                          │                ├─ 健診・ドック/ワクチン接種/脳ドック/心臓ドック/婦人科の健診ドック → 追加要望_新規
                                          │                └─ other → 紹介状有無 → 症状ヒアリング → 追加要望_新規
                                          │              → 追加要望_新規
                                          │                → 氏名聴取_新規(subflow)
                                          │                → 生年月日聴取_新規(subflow)
                                          │                → 電話番号聴取_新規(subflow)
                                          │                → 終話分岐_新規予約(CMR: 電話番号聴取_新規)
                                          │                  ├─ 携帯(phonetype=1) → END_新規予約_携帯
                                          │                  └─ other(=固定/その他) → END_新規予約_固定
                                          ├─ 予約変更 ─┐
                                          ├─ 予約キャンセル ─┤
                                          └─ 予約確認 ─┘
                                                       → 氏名聴取_変更等(subflow)
                                                       → 生年月日聴取_変更等(subflow)
                                                       → 用件分岐_3(CMR: OpenAI_用件聞き取り)
                                                         ├─ 予約確認 → 確認内容の聞き取り
                                                         │             → 電話番号聴取_確認(subflow)
                                                         │             → END_予約確認
                                                         ├─ 予約変更 → 診療科聴取_変更キャンセル
                                                         │             → 予約日聴取
                                                         │             → 用件分岐_2(CMR: OpenAI_用件聞き取り)
                                                         │               ├─ 予約変更 → 予約希望日聴取
                                                         │               │             → 電話番号聴取_変更(subflow)
                                                         │               │             → END_初診再診変更
                                                         │               └─ other(=キャンセル) → 電話番号聴取_キャンセル(subflow) → END_予約キャンセル
                                                         └─ 予約キャンセル → 診療科聴取_変更キャンセル
                                                                              → 予約日聴取
                                                                              → 用件分岐_2 (上と合流)
    notes: |
      - 「健診・ドック / ワクチン接種 / 脳ドック / 心臓ドック / 婦人科の健診ドック」は症状ヒアリング・紹介状確認をスキップ（Gen1 main.yaml「健診ドックワクチン接種で症状聞かない。」より）
      - 用件3 (変更/キャンセル/確認) は氏名→生年月日→用件分岐_3 で再度ルート分岐する 3 段連鎖を CMR 1 枚に圧縮
      - 予約変更/キャンセルは「診療科 → 予約日(フリー)」を共通化し、変更ルートだけさらに「予約希望日」を追加する用件分岐_2 を挟む

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック ===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件聞き取り

  # === 用件聞き取り（DTMF 1〜4 + 音声） ===
  - step: 用件聞き取り
    type: hearing
    output_format: enum
    conditions:
      - match: "新規予約"
        next: 予約案内
      - match: "予約変更"
        next: 氏名聴取_変更等
      - match: "予約キャンセル"
        next: 氏名聴取_変更等
      - match: "予約確認"
        next: 氏名聴取_変更等
      - match: "other"
        next: END_聴取失敗

  # === 新規予約ルート ===
  - step: 予約案内
    type: announcement
    next: 診療科聴取_新規

  - step: 診療科聴取_新規
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "健診・ドック"
        next: 追加要望_新規
      - match: "ワクチン接種"
        next: 追加要望_新規
      - match: "脳ドック"
        next: 追加要望_新規
      - match: "心臓ドック"
        next: 追加要望_新規
      - match: "婦人科の健診ドック"
        next: 追加要望_新規
      - match: "other"
        next: 紹介状有無

  - step: 紹介状有無
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 症状ヒアリング
      - match: "other"
        next: 症状ヒアリング

  - step: 症状ヒアリング
    type: hearing
    output_format: text
    next: 追加要望_新規

  - step: 追加要望_新規
    type: hearing
    output_format: text
    next: 氏名聴取_新規

  - step: 氏名聴取_新規
    type: subflow
    flowname: "禎心会さっぽろ北口クリニック$氏名聴取"
    next: 生年月日聴取_新規

  - step: 生年月日聴取_新規
    type: subflow
    flowname: "禎心会さっぽろ北口クリニック$生年月日聴取"
    next: 電話番号聴取_新規

  - step: 電話番号聴取_新規
    type: subflow
    flowname: "禎心会さっぽろ北口クリニック$電話番号聴取"
    next: 終話分岐_新規予約

  - step: 終話分岐_新規予約
    type: context_match_router
    reference_module: "電話番号聴取_新規"
    conditions:
      - match: "1"
        next: END_新規予約_携帯
      - match: "other"
        next: END_新規予約_固定

  # === 用件3 (変更/キャンセル/確認) 共通ルート ===
  - step: 氏名聴取_変更等
    type: subflow
    flowname: "禎心会さっぽろ北口クリニック$氏名聴取"
    next: 生年月日聴取_変更等

  - step: 生年月日聴取_変更等
    type: subflow
    flowname: "禎心会さっぽろ北口クリニック$生年月日聴取"
    next: 用件分岐_3

  - step: 用件分岐_3
    type: context_match_router
    reference_module: "OpenAI_用件聞き取り"
    conditions:
      - match: "予約確認"
        next: 確認内容の聞き取り
      - match: "予約変更"
        next: 診療科聴取_変更キャンセル
      - match: "予約キャンセル"
        next: 診療科聴取_変更キャンセル
      - match: "other"
        next: 診療科聴取_変更キャンセル

  # === 予約確認ルート ===
  - step: 確認内容の聞き取り
    type: hearing
    output_format: text
    next: 電話番号聴取_確認

  - step: 電話番号聴取_確認
    type: subflow
    flowname: "禎心会さっぽろ北口クリニック$電話番号聴取"
    next: END_予約確認

  # === 予約変更/キャンセル共通ルート ===
  - step: 診療科聴取_変更キャンセル
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "other"
        next: 予約日聴取

  - step: 予約日聴取
    type: hearing
    output_format: datetime
    next: 用件分岐_2

  - step: 用件分岐_2
    type: context_match_router
    reference_module: "OpenAI_用件聞き取り"
    conditions:
      - match: "予約変更"
        next: 予約希望日聴取
      - match: "other"
        next: 電話番号聴取_キャンセル

  # === 予約変更ルート ===
  - step: 予約希望日聴取
    type: hearing
    output_format: datetime
    next: 電話番号聴取_変更

  - step: 電話番号聴取_変更
    type: subflow
    flowname: "禎心会さっぽろ北口クリニック$電話番号聴取"
    next: END_初診再診変更

  # === 予約キャンセルルート ===
  - step: 電話番号聴取_キャンセル
    type: subflow
    flowname: "禎心会さっぽろ北口クリニック$電話番号聴取"
    next: END_予約キャンセル

  # === 終話ブロック ===
  - step: END_新規予約_携帯
    type: termination
    termination_ref: "END_新規予約_携帯"

  - step: END_新規予約_固定
    type: termination
    termination_ref: "END_新規予約_固定"

  - step: END_予約確認
    type: termination
    termination_ref: "END_予約確認"

  - step: END_初診再診変更
    type: termination
    termination_ref: "END_初診再診変更"

  - step: END_予約キャンセル
    type: termination
    termination_ref: "END_予約キャンセル"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

