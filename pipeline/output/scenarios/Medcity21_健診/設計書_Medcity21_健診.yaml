    retry_failure: "skip"

  - step_name: "キャンセル_振替希望"
    tts_announcement: "別の日程でのご受診を希望されますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "希望する"
        - "希望しない"
      mapping:
        - input: "はい／お願いします／変更したい／別の日／希望する／肺（救済語）"
          output: "希望する"
        - input: "いいえ／結構です／必要ない／変更しない／キャンセルだけ／が今（救済語）"
          output: "希望しない"
      no_result_condition: "判別不能"
    save_to: "reschedule_request"
    next_step: "変更_希望時期聴取（希望する → 終話分岐_振替 で 変更扱い終話に振分） / 氏名聴取（default=希望しない → 終話分岐_振替 で END_キャンセル）"
    retry_failure: "skip"

  - step_name: "オプション_予約日聴取"
    tts_announcement: "現在予約されている日程をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "発話日付"
          output: "yyyy-MM-dd 00:00:00 形式"
      no_result_condition: "発話なし"
    save_to: "reservationDate"
    next_step: "オプション_内容聴取"
    retry_failure: "skip"

  - step_name: "オプション_内容聴取"
    tts_announcement: "オプションの追加や変更の希望内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "超音波／エコー"
          output: "超音波"
        - input: "マンモ／マンモグラフィ"
          output: "マンモグラフィ"
        - input: "トモシン／トモシンセシス／3Dマンモグラフィ"
          output: "3Dマンモグラフィ"
        - input: "リスト外内容"
          output: "(発話内容そのまま text 保存)"
      no_result_condition: "発話なし"
    save_to: "option"
    next_step: "氏名聴取"
    retry_failure: "skip"

  - step_name: "問合せ_内容聴取"
    tts_announcement: "お問い合わせの内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "発話内容（自由記述）"
          output: "(発話内容そのまま text 保存。OpenAI で要約・整形のみ)"
      no_result_condition: "発話なし"
    save_to: "reason"
    next_step: "問合せ_キーワード判定"
    retry_failure: "skip"

  - step_name: "問合せ_返信希望"
    tts_announcement: "問い合わせ内容について折り返しを希望される場合は、はい、とお話しください。この後、お名前などをお聞きします。解決した方はこのままお電話をお切りください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "希望する"
        - "希望しない"
      mapping:
        - input: "はい／お願いします／折り返し希望／お願い／お聞きします／肺（救済語）"
          output: "希望する"
        - input: "いいえ／不要です／結構です／必要ない／大丈夫／が今（救済語）"
          output: "希望しない"
      no_result_condition: "判別不能"
    save_to: "reply"
    next_step: "氏名聴取（希望する） / END_返信不要（希望しない）"
    retry_failure: "skip"

  - step_name: "ラスト質問"
    tts_announcement: "そのほかに何かお問い合わせは有りませんか？"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "ない／ありません／大丈夫／結構です（否定）"
          output: "(空文字 or text そのまま保存。reply は変更しない)"
        - input: "質問内容（駐車場は？／持ち物は？等）"
          output: "(発話内容そのまま question に保存。複数回は改行追記)"
      no_result_condition: "発話なし"
    save_to: "question"
    next_step: "jump_RAG検索_ラスト質問 → 終話分岐_用件"
    retry_failure: "skip"

  - step_name: "用件確認_失敗_アナウンス"
    tts_announcement: "申し訳ございません、ご回答が確認できませんでした。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: null
    next_step: "用件確認_失敗_用件書換"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系（デフォルト必須）===
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 正常系（Medcity21 健診固有）===
  - name: "END_共通_携帯"
    condition: "classification ∈ {予約,変更,オプション,問合せ} AND additionalPhoneNumber が 090/080/070/060 開始（phonetype=携帯）"
    tts_announcement: "かしこまりました。お申し込みを受付いたしました。3営業日以内に、担当者からの折り返し電話にて確定となります。なおこの後、ショートメッセージが送付されますのでご確認ください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_共通_携帯"

  - name: "END_共通_携帯以外"
    condition: "classification ∈ {予約,変更,オプション,問合せ} AND 携帯以外（phonetype=その他、050/03/06等を含む）"
    tts_announcement: "かしこまりました。お申し込みを受付いたしました。3営業日以内に、担当者からの折り返し電話にて確定となります。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_共通_携帯以外"

  - name: "END_キャンセル"
    condition: "classification=キャンセル AND reschedule_request=希望しない（または default）"
    tts_announcement: "かしこまりました。予約のキャンセルを承りました。必要がある場合のみ担当者からご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_返信不要"
    condition: "classification=問合せ AND reply=希望しない"
    tts_announcement: "かしこまりました。お電話ありがとうございました。それでは失礼いたします。"
    status: "7"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_返信不要"

  - name: "END_代表案内"
    condition: "変更で1週間以内 / キャンセルで2週間以内 / 問合せ内容に「健診の結果／人間ドックの結果／健康診断の結果」を含む / 用件確認の聴取失敗ではないが対象外と判定された場合"
    tts_announcement: "申し訳ありません。このご用件は、AI電話ではお受けできません。06-6624-4010まで、お電話ください。受付時間は、月曜から土曜の、9時から16時半です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "0"
    completion_flag_name: "完了フラグ_代表案内"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "reply"
    - "phonetype"
    - "reschedule_request"
  patterns:
    - condition: "classification=問合せ AND reply=希望しない"
      sms_flag: "0"
      notes: "→ END_返信不要 (status=7)"
    - condition: "classification ∈ {予約,変更,オプション,問合せ} AND phonetype=携帯"
      sms_flag: "1"
      notes: "→ END_共通_携帯 (status=1)"
    - condition: "classification ∈ {予約,変更,オプション,問合せ} AND phonetype=その他"
      sms_flag: "1"
      notes: "→ END_共通_携帯以外 (status=1)"
    - condition: "classification=キャンセル AND reschedule_request != 希望する"
      sms_flag: "2"
      notes: "→ END_キャンセル (status=1)"
    - condition: "classification=キャンセル AND reschedule_request=希望する"
      sms_flag: "1"
      notes: "終話分岐_振替で classification=キャンセルでも振替希望ありなら 通常終話扱い（END_共通_携帯/携帯以外）に流す。classification の文字列上書きは不要（cascade で対応済み）"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "問合せ_キーワード判定"
  pre_termination: true

