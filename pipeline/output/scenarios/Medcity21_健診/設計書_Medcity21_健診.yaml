    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: null
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "「本日を含め2週間以内の予約のキャンセルでしょうか？」。再質問は最大3回。はい→END_代表案内 / default→予約日聴取"

