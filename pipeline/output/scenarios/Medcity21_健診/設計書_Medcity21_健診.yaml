# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "本日のご用件を、次のうち、いずれかでお選びください。なお、質問は2分半程度で完了します。予約。日程変更。キャンセル。オプションの追加・変更。その他お問い合わせ。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "オプション"
        - "問合せ"
      mapping:
        - input: "予約／薬／お薬／予約したい／予約取りたい"
          output: "予約"
        - input: "変更／日程変更／取り直す／取り直したい／別の／変えたい／変える／変えて／日にち変えたい"
          output: "変更"
        - input: "キャンセル／取り消し／取消／取り消す／やめる／やめたい"
          output: "キャンセル"
        - input: "オプション／オプション追加／オプション変更／オプション追加変更"
          output: "オプション"
        - input: "問い合わせ／その他／質問／聞きたい"
          output: "問合せ"
      no_result_condition: "上記いずれにも該当しない / 雑音のみ / 短すぎる発話"
    save_to: "classification"
    next_step: "(条件分岐)"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約_受診歴確認"
    tts_announcement: "当施設のご利用は初めてでしょうか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
      mapping:
        - input: "はい／そうです／初めて／初めてです／肺／いいです（救済語）"
          output: "はい"
        - input: "いいえ／違います／２回目／前にも来た／受診したことある／が今／PHVます（救済語）"
          output: "いいえ"
      no_result_condition: "判別不能"
    save_to: "history"
    next_step: "予約_保険組合名（はい：履歴なし） / 予約_内容確認（default：履歴あり）"
    retry_failure: "skip"

  - step_name: "予約_内容確認"
    tts_announcement: "前回受診いただいているコースと同じ内容でよろしいでしょうか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
      mapping:
        - input: "はい／そうです／同じです／変えません"
          output: "はい"
        - input: "いいえ／違います／違うコース／別のコース／変えたい"
          output: "いいえ"
      no_result_condition: "判別不能"
    save_to: "checking_details"
    next_step: "予約_保険組合名（いいえ） / 予約_オプション追加（default=はい）"
    retry_failure: "skip"

  - step_name: "予約_保険組合名"
    tts_announcement: "加入されている健康保険組合名をお話しください。補助を利用されない場合は、利用しない、とお話しください。わからない場合は、わからない、とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "協会けんぽ／全国健康保険協会／協会"
          output: "協会けんぽ"
        - input: "大阪市国保／市国保／大阪市国民健康保険組合"
          output: "大阪市国民健康保険組合"
        - input: "リスト外組合名／利用しない／わからない／その他テキスト"
          output: "(発話内容そのまま text 保存)"
      no_result_condition: "発話なし"
    save_to: "company"
    next_step: "予約_希望コース"
    retry_failure: "skip"

  - step_name: "予約_希望コース"
    tts_announcement: "希望のコースをお話しください。わからない場合はわからない、とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "ドック／健康診断／健診／人間ロック／ロック／人間独"
          output: "人間ドック"
        - input: "標準"
          output: "標準コース"
        - input: "ライフ／ライフスタイル"
          output: "ライフスタイルコース"
        - input: "がん"
          output: "がんコース"
        - input: "スマートエグゼ／スマートエグゼクティブ／スマエグ"
          output: "スマートエグゼクティブコース"
        - input: "エグゼ／エグゼクティブ"
          output: "エグゼクティブコース"
        - input: "PETCTエグゼ／PETエグゼ"
          output: "PETCTエグゼクティブコース"
        - input: "エイジング／エイジングチェック"
          output: "エイジングチェックコース"
        - input: "スタイリッシュ"
          output: "スタイリッシュコース"
        - input: "ラグジュアリー"
          output: "ラグジュアリーコース"
        - input: "リスト外コース名／わからない／その他テキスト"
          output: "(発話内容そのまま text 保存)"
      no_result_condition: "発話なし"
    save_to: "course"
    next_step: "予約_オプション追加"
    retry_failure: "skip"

  - step_name: "予約_オプション追加"
