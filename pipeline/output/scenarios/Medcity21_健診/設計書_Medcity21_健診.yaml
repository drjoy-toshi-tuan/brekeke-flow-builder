  - order: 14
    name: "オプション_予約日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "「現在予約されている日程をお話しください」。yyyy-MM-dd 00:00:00 形式"

  - order: 15
    name: "オプション_内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "option"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "「オプションの追加や変更の希望内容をお話しください」。オプション3種同定・リスト外は text 保存"

