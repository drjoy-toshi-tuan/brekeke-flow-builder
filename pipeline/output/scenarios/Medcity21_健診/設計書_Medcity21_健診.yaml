special_notes:
  - "use_acceptance_times=false（受付時間外分岐の指示なし。Date of Call Classifier 不要）。代表案内 TTS 内で月〜土 9:00〜16:30 を案内するのみ。Gen2 function スキーマの endpoint=時間外 enum はあるがフロー記載なし → director 判断で省略"
  - "復唱は生年月日のみ1回（DOB Re-confirmation サブフロー内で実装）。氏名・その他項目は復唱・確認禁止"
  - "電話番号は phone_type 3 分岐（anonymous / mobile / {ip_phone, other}）。anonymous 時は正規化通過後に1回復唱、mobile 時は incoming_phone_number で1回確認、ip_phone/other は復唱なし。非通知聴取失敗のみ END_代表案内（status=2, smsFlag=0）"
  - "条件確認系（変更_条件確認・キャンセル_条件確認）は再質問最大3回（その他は最大2回）"
  - "Gen2 救済語マッピング: 予約←{薬,お薬} / 変更←{取り直す,別の,変えたい} / キャンセル←{やめる,取消} / 健診←{検針,返信,天候診断,検診} / 人間ドック←{人間ロック,ドック,人間独} / 肯定←{肺,いいです} / 否定←{が今,PHVます}。OpenAI プロンプトの誤認補正辞書に必ず含めること"
