# 設計書: 大阪公立大学医学部附属病院 先端予防医療部附属クリニック MedCity21 — 健診
# 生成元: @director エージェント
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/【健診1】：大阪公立大学医学部附属病院Medcity21.md
# 移管ノート: docs/migration/gen2_Medcity21_健診.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "大阪公立大学医学部附属病院 先端予防医療部附属クリニック MedCity21"
  scenario_name: "健診"
  group_name: "Medcity21"
  flow_name: "Medcity21$健診"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "06-6624-4010"
  business_hours: "なし（受付時間外分岐の指示なし。代表案内TTS内で月〜土 9:00〜16:30 と発話するのみ）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "Medcity21$健診"
      role: "main"
      description: "健診の予約・日程変更・キャンセル・オプション追加変更・その他問合せを5用件で受付。RAG (FAQ参照V2) を問合せ内容後とラスト質問の前に挿入"
  subflows:
    - name: "Medcity21$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "復唱・確認禁止。文字種指定禁止。最初の1名のみ patientName に格納（複数名は OpenAI プロンプト側で reason に追記）"
    - name: "Medcity21$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "和暦聴取。DOB Re-confirmation で1回復唱。yyyy-MM-dd 00:00:00 形式で patientDateOfBirth に保存"
    - name: "Medcity21$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "phone_type 3 分岐 (anonymous / mobile / {ip_phone, other})。携帯確認後 phonetype を「携帯」/「その他」で保存。非通知時の聴取失敗は END_代表案内 へ遷移（サブフロー内 self-handling）"
    - name: "Medcity21$RAG検索"
      target: "RAG検索"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "FAQ参照V2。is_question ガード付き（短い名詞・応答は QA スキップ）。NO HIT 時は固定許可文「ご質問いただいた内容はAI電話ではご対応できませんので、折り返しご連絡時にご確認ください。」"

# --- セクション3: フローの目的 ---
purpose: |
  大阪公立大学医学部附属病院 先端予防医療部附属クリニック MedCity21 への健診関連電話を受付。
  ユーザーから「予約／日程変更／キャンセル／オプション追加変更／その他お問い合わせ」5用件を聴取し、
  各用件ごとの必須項目（受診歴・コース・希望時期・予約日・氏名・生年月日・連絡先電話番号）を確定させ、
  Dr.JOY 担当者が3営業日以内に折り返す前提でステータスと SMS 送信フラグを記録する。
  代表案内が必要なケース（変更で1週間以内・キャンセルで2週間以内・健診結果系問合せ・非通知聴取失敗）は
  06-6624-4010 へ案内して終話する。FAQ 検索（RAG）は問合せ内容聴取後とラスト質問前で起動する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "Medcity21$健診"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知
            └─ 通常   → 冒頭_アナウンス
                          → 用件確認 (enum 5値 + フォールバック)
                              ├─ 予約       → 予約_受診歴確認
                              │                ├─ はい(初めて)  → 予約_保険組合名 → 予約_希望コース → 予約_オプション追加 → 予約_希望時期 → [共通]
                              │                └─ default      → 予約_内容確認
                              │                                    ├─ いいえ(別内容) → 予約_保険組合名 → ...(同上)
                              │                                    └─ default       → 予約_オプション追加 → 予約_希望時期 → [共通]
                              ├─ 変更       → 変更_条件確認 (1週間以内?)
                              │                ├─ はい  → END_代表案内
                              │                └─ default → 変更_予約日聴取 → 変更_希望時期聴取 → [共通]
                              ├─ キャンセル → キャンセル_条件確認 (2週間以内?)
                              │                ├─ はい  → END_代表案内
                              │                └─ default → キャンセル_予約日聴取 → キャンセル_振替希望
                              │                                                       ├─ 希望する → 変更_希望時期聴取 → [共通]
                              │                                                       └─ 希望しない → [共通]
                              ├─ オプション → オプション_予約日聴取 → オプション_内容聴取 → [共通]
                              ├─ 問合せ     → 問合せ_内容聴取
                              └─ default   → 用件確認_失敗_アナウンス → 用件確認_失敗_用件書換 → 問合せ_内容聴取

      [問合せ分岐]
      問合せ_内容聴取 → 問合せ_キーワード判定
                          ├─ 健診/人間ドック/健康診断の結果 → END_代表案内
                          └─ default → jump_RAG検索_問合せ → 問合せ_返信希望
                                                              ├─ 希望する → [共通]
                                                              └─ 希望しない → END_返信不要

      [共通: 個人情報聴取 → ラスト質問 → 終話分岐]
      [共通] = 氏名聴取(subflow) → 生年月日聴取(subflow) → 電話番号聴取(subflow) → ラスト質問
              → jump_RAG検索_ラスト質問 → 終話分岐_用件
                                            ├─ キャンセル → 終話分岐_振替
                                            │                ├─ 希望する → 終話分岐_返信
                                            │                └─ default → END_キャンセル
                                            └─ default → 終話分岐_返信
                                                          ├─ 希望しない → END_返信不要
                                                          └─ default → 終話分岐_電話
                                                                        ├─ 携帯  → END_共通_携帯
                                                                        └─ default → END_共通_携帯以外
    notes: "use_acceptance_times=false（受付時間外分岐の指示なし、Date of Call Classifier 不要）。代表案内TTSで月〜土 9:00〜16:30 を案内するのみ"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ============================================================
  # 冒頭チェーン（必須）
  # ============================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # ============================================================
  # 用件確認（5値分岐 + フォールバック）
  # ============================================================
  - step: 用件確認
    type: hearing
    output_format: enum
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "オプション"
      - "問合せ"
    conditions:
      - match: "予約"
        next: 予約_受診歴確認
      - match: "変更"
        next: 変更_条件確認
      - match: "キャンセル"
        next: キャンセル_条件確認
      - match: "オプション"
        next: オプション_予約日聴取
      - match: "問合せ"
        next: 問合せ_内容聴取
      - match: "default"
        next: 用件確認_失敗_アナウンス

  - step: 用件確認_失敗_アナウンス
    type: announcement
    next: 用件確認_失敗_用件書換

  - step: 用件確認_失敗_用件書換
    type: augment
    augment_pattern: director_handled
    augment_purpose: |
      用件確認の聴取失敗フォールバック時、classification を「問合せ」に上書きしてから問合せフローへ合流する。
      Gen2 customer_doc 仕様: 「聴取失敗フォールバック (F) は classification を「問合せ」に書き換えて E フローへ合流」。
      Brekeke 側では saveContext2DB を 1 個追加して classification="問合せ" を明示書き込みする実装が必要。
      scaffold は placeholder Script を生成するため、稼働前に手動で saveContext2DB へ差し替えること（confirmation_items 参照）。
    next: 問合せ_内容聴取

  # ============================================================
  # A) 予約フロー
  # ============================================================
  - step: 予約_受診歴確認
    type: hearing
    output_format: enum
    output_labels:
      - "はい"
      - "いいえ"
    conditions:
      - match: "はい"
        next: 予約_保険組合名
      - match: "default"
        next: 予約_内容確認

  - step: 予約_内容確認
    type: hearing
    output_format: enum
    output_labels:
      - "はい"
      - "いいえ"
    conditions:
      - match: "いいえ"
        next: 予約_保険組合名
      - match: "default"
        next: 予約_オプション追加

  - step: 予約_保険組合名
    type: hearing
    output_format: text
    next: 予約_希望コース

  - step: 予約_希望コース
    type: hearing
    output_format: text
    next: 予約_オプション追加

  - step: 予約_オプション追加
    type: hearing
    output_format: text
    next: 予約_希望時期

  - step: 予約_希望時期
    type: hearing
    output_format: text
    next: 氏名聴取

  # ============================================================
  # B) 変更フロー
  # ============================================================
  - step: 変更_条件確認
    type: hearing
    output_format: enum
    output_labels:
      - "はい"
      - "いいえ"
    conditions:
      - match: "はい"
        next: END_代表案内
      - match: "default"
        next: 変更_予約日聴取

  - step: 変更_予約日聴取
    type: hearing
    output_format: datetime
    next: 変更_希望時期聴取

  - step: 変更_希望時期聴取
    type: hearing
    output_format: text
    next: 氏名聴取

  # ============================================================
  # C) キャンセルフロー
  # ============================================================
  - step: キャンセル_条件確認
    type: hearing
    output_format: enum
    output_labels:
      - "はい"
      - "いいえ"
    conditions:
      - match: "はい"
        next: END_代表案内
      - match: "default"
        next: キャンセル_予約日聴取

  - step: キャンセル_予約日聴取
    type: hearing
    output_format: datetime
    next: キャンセル_振替希望

  - step: キャンセル_振替希望
    type: hearing
    output_format: enum
    output_labels:
      - "希望する"
      - "希望しない"
    conditions:
      - match: "希望する"
        next: 変更_希望時期聴取
      - match: "default"
        next: 氏名聴取

  # ============================================================
  # D) オプションフロー
  # ============================================================
  - step: オプション_予約日聴取
    type: hearing
    output_format: datetime
    next: オプション_内容聴取

  - step: オプション_内容聴取
    type: hearing
    output_format: text
    next: 氏名聴取

  # ============================================================
  # E) 問合せフロー
  # ============================================================
  - step: 問合せ_内容聴取
    type: hearing
    output_format: text
    next: 問合せ_キーワード判定

  - step: 問合せ_キーワード判定
    type: context_match_router
    reference_module: "reason"
    conditions:
      - match: ".*健診の結果.*"
        next: END_代表案内
      - match: ".*人間ドックの結果.*"
        next: END_代表案内
      - match: ".*健康診断の結果.*"
        next: END_代表案内
      - match: "default"
        next: jump_RAG検索_問合せ

  - step: jump_RAG検索_問合せ
    type: subflow
    flowname: "Medcity21$RAG検索"
    next: 問合せ_返信希望

  - step: 問合せ_返信希望
    type: hearing
    output_format: enum
    output_labels:
      - "希望する"
      - "希望しない"
    conditions:
      - match: "希望する"
        next: 氏名聴取
      - match: "希望しない"
        next: END_返信不要

  # ============================================================
  # 共通: 個人情報聴取（サブフロー）
  # ============================================================
  - step: 氏名聴取
    type: subflow
    flowname: "Medcity21$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "Medcity21$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "Medcity21$電話番号聴取"
    next: ラスト質問

  # ============================================================
  # 共通: ラスト質問 + RAG（パターン2: 終話前 RAG）
  # ============================================================
  - step: ラスト質問
    type: hearing
    output_format: text
    next: jump_RAG検索_ラスト質問

  - step: jump_RAG検索_ラスト質問
    type: subflow
    flowname: "Medcity21$RAG検索"
    next: 終話分岐_用件

  # ============================================================
  # 終話分岐カスケード（4段 ContextMatchRouter）
  # ============================================================
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "キャンセル"
        next: 終話分岐_振替
      - match: "default"
        next: 終話分岐_返信

  - step: 終話分岐_振替
    type: context_match_router
    reference_module: "reschedule_request"
    conditions:
      - match: "希望する"
        next: 終話分岐_返信
      - match: "default"
        next: END_キャンセル

  - step: 終話分岐_返信
    type: context_match_router
    reference_module: "reply"
    conditions:
      - match: "希望しない"
        next: END_返信不要
      - match: "default"
        next: 終話分岐_電話

  - step: 終話分岐_電話
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_共通_携帯
      - match: "default"
        next: END_共通_携帯以外

  # ============================================================
  # 終話ブロック
  # ============================================================
  - step: END_共通_携帯
    type: termination
    termination_ref: "END_共通_携帯"

  - step: END_共通_携帯以外
    type: termination
    termination_ref: "END_共通_携帯以外"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_返信不要
    type: termination
    termination_ref: "END_返信不要"

  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # === Dr.JOY デフォルト項目 ===
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "オプション"
      - id: "5"
        order: "5"
        value: "問合せ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分。Gen2 function スキーマの classification enum と一致（「空文字」は Gen3 では未使用）"

  - context_name: "patientName"
    context_name_jp: "受診者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名。最初の1名のみ格納。複数名は OpenAI プロンプトで reason に追記"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "生年月日。和暦聴取→正規化→1回復唱"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "聴取する電話番号。phone_type 3 分岐で取得方法を切替"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納（システム）"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "現在予約されている日程（変更・キャンセル・オプション時に聴取）"

  - context_name: "reason"
    context_name_jp: "問合せ内容"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "問合せフローでの理由・複数名氏名の追記先"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
      - id: "7"
        order: "7"
        value: "返信不要"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理（受付完了） 2=代表案内 3=聴取失敗 6=時間外 7=返信不要"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

  # === 案件固有フィールド（itemDefault: false）===
  - context_name: "history"
    context_name_jp: "受診歴"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "予約_受診歴確認の保存先。「あり」/「無し」"

  - context_name: "checking_details"
    context_name_jp: "コース等内容確認"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "予約_内容確認の保存先（前回コース踏襲確認）"

  - context_name: "course"
    context_name_jp: "受診希望コース"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "コース10種から同定、リスト外はそのままテキスト保存"

  - context_name: "option"
    context_name_jp: "追加オプション"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "オプション3種から同定、リスト外はそのままテキスト保存"

