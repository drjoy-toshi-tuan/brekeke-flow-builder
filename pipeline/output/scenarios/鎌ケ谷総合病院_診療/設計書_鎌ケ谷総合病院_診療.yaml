# --- セクション11: 特記事項・制約 ---
special_notes:
  - "当日予約ブレーク: 変更/キャンセルルートで予約日が当日の場合、代表電話へ案内して終話（status=2）。Gen2のisSameDayReservationルール（日付一致 AND 当日キーワード検出）を、Gen3ではscriptモジュールによる日付比較で代替実装する"
  - "診療科統合ブロック: 予約/変更/キャンセルで共通の診療科聴取ブロックを使用し、後段のContextMatchRouter(classification)で用件別に分岐する設計"
  - "smsFlag分岐: Gen2はsmsFlag=1統一だが、Gen3では固定電話はSMS受信不可のためphonetype分岐を導入。携帯=smsFlag:1, 固定=smsFlag:-1"
  - "予約希望日復唱: Gen2では予約希望日を動的に読み上げたが、Gen3のannouncementブロックでは動的値挿入不可。固定文言で代替。将来的にRe-confirmation node dataで動的読み上げに対応可"
  - "対応外診療科リスト: 脳血管内治療センター/小児科/放射線治療科・放射線治療センター/放射線診断科/救急科/回復期リハビリテーション病棟/人工透析センター/臨床試験センター/病理診断科/リハビリテーション科。用件確認ステップの優先グループ4として検出し、代表電話へ案内"
  - "紹介状なし時の選定療養費: 初診時選定療養費2,200円の案内（announcementブロック）を紹介状確認の後に挿入"
  - "代表電話番号: 047-498-8111, 歯科口腔外科直通: 047-498-8721, 健診センター直通: 047-498-8125"

