    notes: "DTMF 8桁入力: YYYYMMDD形式（例: 20260501 = 2026年5月1日）。音声入力も可（5月1日、来週の火曜日 等）。YYYY-MM-DD 00:00:00形式に正規化。変更ルート用"

  - order: 6
    name: "予約希望日_変更"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "none"
