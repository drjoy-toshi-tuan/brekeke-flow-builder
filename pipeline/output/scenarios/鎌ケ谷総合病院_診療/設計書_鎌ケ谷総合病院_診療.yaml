        - "呼吸器内科"
        - "循環器内科"
        - "緩和ケア内科・緩和ケア病棟"
        - "消化器内科"
        - "外科"
        - "呼吸器外科"
        - "乳腺外科"
        - "整形外科・リウマチ科"
        - "脳神経外科"
        - "泌尿器科"
        - "眼科"
        - "頭頸部外科"
        - "脳神経内科"
        - "形成外科"
        - "産婦人科"
        - "皮膚科"
        - "麻酔科"
        - "糖尿病内科"
        - "難病脳内科"
        - "物忘れ外来"
        - "リウマチ・膠原病内科"
        - "腎臓内科"
        - "耳鼻咽喉科"
