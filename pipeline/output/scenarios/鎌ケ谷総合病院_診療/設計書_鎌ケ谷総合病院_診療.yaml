# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "歯科口腔外科"
      - "健康管理センター"
      - "インフルエンザワクチン"
      - "コロナウイルスワクチン"
      - "対応外診療科"
      - "予約"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "DTMF 1=予約, 2=変更, 3=キャンセル, 4=確認/問い合わせ。歯科口腔外科/健康管理/インフルエンザ/コロナ/対応外は音声のみで検出（DTMF割当なし、優先グループとして最優先判定）"

  - order: 2
    name: "受診歴確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規"
      - "再診"
    notes: "DTMF 1=はい(新規), 2=いいえ(再診)。classification を予約から新規/再診に上書き"

  - order: 3
    name: "紹介状確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "introduction"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "あり"
      - "なし"
    notes: "DTMF 1=はい(あり), 2=いいえ(なし)"

  - order: 4
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "心臓血管外科"
      - "(総合)内科"
      - "呼吸器内科"
      - "循環器内科"
      - "緩和ケア内科・緩和ケア病棟"
      - "消化器内科"
      - "外科"
      - "呼吸器外科"
      - "乳腺外科"
      - "整形外科・リウマチ科"
      - "脳神経外科"
      - "泌尿器科"
      - "眼科"
      - "頭頸部外科"
      - "脳神経内科"
      - "形成外科"
      - "産婦人科"
      - "皮膚科"
      - "麻酔科"
      - "糖尿病内科"
      - "難病脳内科"
      - "物忘れ外来"
      - "リウマチ・膠原病内科"
      - "腎臓内科"
      - "耳鼻咽喉科"
      - "がんロコモ外来"
    notes: "音声のみ（診療科名は音声入力が自然）。no_result_default=登録なし。予約/変更/キャンセル共通ブロック"

  - order: 5
    name: "予約日_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
