        - input: "しょうかきないか, しょうかき"
          output: "消化器内科"
        - input: "げか, がいか"
          output: "外科"
        - input: "こきゅうきげか, しゃっくり"
          output: "呼吸器外科"
        - input: "にゅうせんげか, にゅうせん"
          output: "乳腺外科"
        - input: "せいけいげか, りうまち"
          output: "整形外科・リウマチ科"
        - input: "のうしんけいげか, のうげ"
          output: "脳神経外科"
        - input: "ひにょうきか, ひにょうか"
          output: "泌尿器科"
        - input: "がんか"
          output: "眼科"
        - input: "とうけいぶげか, とうけいぶ"
          output: "頭頸部外科"
        - input: "のうしんけいないか, しんけいないか"
          output: "脳神経内科"
        - input: "けいせいげか, けいせい"
          output: "形成外科"
        - input: "ふじんか, さんふじんか, さんか"
          output: "産婦人科"
        - input: "ひふか"
          output: "皮膚科"
        - input: "ますいか"
          output: "麻酔科"
        - input: "とうにょうびょう, とうにょう"
          output: "糖尿病内科"
        - input: "なんびょう, えいえるえす"
          output: "難病脳内科"
        - input: "ものわすれ, にんちしょう"
          output: "物忘れ外来"
        - input: "こうげんびょう, りうまちこうげんびょう"
          output: "リウマチ・膠原病内科"
        - input: "じんぞうないか, じんない"
          output: "腎臓内科"
        - input: "じびいんこうか, じびか"
          output: "耳鼻咽喉科"
        - input: "がんろこも"
          output: "がんロコモ外来"
      no_result_condition: "リスト外の診療科名、または判定不能の場合"
    save_to: "clinicalDepartment"
    next_step: "用件別分岐（ContextMatchRouter）"
    retry_failure: "skip"

  - step_name: "予約日_変更"
    tts_announcement: "次に、予約票に記載されている予約日を、5月1日のように日付でお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["YYYY-MM-DD 00:00:00"]
      mapping:
        - input: "日付表現（5月1日、来週の火曜日、明日 等）"
          output: "YYYY-MM-DD 00:00:00形式に正規化"
      no_result_condition: "日付として解釈できない場合"
