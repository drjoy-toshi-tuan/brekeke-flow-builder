# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件をお話しください。予約は1、変更は2、キャンセルは3、その他のお問い合わせは4を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "歯科口腔外科"
        - "健康管理センター"
        - "インフルエンザワクチン"
        - "コロナウイルスワクチン"
        - "対応外診療科"
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
      mapping:
        - input: "DTMF 1 / 予約, ようやく, 予約です, 予約したい, 予約ほしい"
          output: "予約"
        - input: "DTMF 2 / 変更, へんこ, へこ, 予約変更, 変更したい, 修正, 取り直し"
          output: "変更"
        - input: "DTMF 3 / キャンセル, キャセル, キャンセ, 取り消し, とりけす, やめたい, 中止"
          output: "キャンセル"
        - input: "DTMF 4 / 確認, かくに, かくにんです, 確かめたい, 教えてほしい, 知りたい, 問い合わせ"
          output: "確認"
        - input: "歯科口腔外科, 歯科口腔, 歯科, 歯医者, はいしゃ（優先グループ1）"
          output: "歯科口腔外科"
        - input: "健康管理, 健康管理センター, 健康診断, 健診（優先グループ2）"
          output: "健康管理センター"
        - input: "インフルエンザワクチン, インフルエンザ（優先グループ3）"
          output: "インフルエンザワクチン"
        - input: "コロナ, コロナワクチン, コロナウイルスワクチン, コロナウイルス（優先グループ3b）"
          output: "コロナウイルスワクチン"
        - input: "脳血管内治療, 小児科, 放射線治療, 放射線診断, 救急科, 回復期リハビリテーション, 人工透析, 臨床試験, 病理診断, リハビリテーション科（優先グループ4）"
          output: "対応外診療科"
      no_result_condition: "上記いずれにも該当しない場合"
    save_to: "classification"
    next_step: "条件分岐（conditions参照）"
    retry_failure: "end_failure"

  - step_name: "受診歴確認"
    tts_announcement: "当院でのご受診は初めてですか。初めての方は1、以前受診されたことがある方は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["新規", "再診"]
      mapping:
        - input: "DTMF 1 / はい, 初めて, 初診"
          output: "新規"
        - input: "DTMF 2 / いいえ, 以前受診した, 通院中, 再診"
          output: "再診"
      no_result_condition: "判定不能の場合"
    save_to: "classification"
    next_step: "条件分岐（新規→紹介状確認, default→診療科）"
    retry_failure: "skip"

  - step_name: "紹介状確認"
    tts_announcement: "初診のご予約ですね。他の医療機関からの紹介状はお持ちですか。お持ちの方は1、お持ちでない方は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["あり", "なし"]
      mapping:
        - input: "DTMF 1 / はい, あります, 持っている"
          output: "あり"
        - input: "DTMF 2 / いいえ, ありません, 持っていない"
          output: "なし"
      no_result_condition: "判定不能の場合"
    save_to: "introduction"
    next_step: "条件分岐（なし→選定療養費案内, default→診療科）"
    retry_failure: "skip"

  - step_name: "診療科"
    tts_announcement: "受診を希望される診療科をお話しください。"
    input_method: "voice_only"
