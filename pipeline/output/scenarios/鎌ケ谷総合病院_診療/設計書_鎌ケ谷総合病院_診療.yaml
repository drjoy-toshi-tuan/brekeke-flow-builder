      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "details"
    next_step: "jump_RAG検索_確認"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（携帯/固定分岐）---
  - name: "END_通常_携帯"
    condition: "全聴取完了 かつ phonetype=携帯"
    tts_announcement: "お申し込みを受付いたしました。予約はまだ確定しておりません。担当者より3日以内に、お電話またはショートメッセージで必ずご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_通常_携帯"
  - name: "END_通常_固定"
    condition: "全聴取完了 かつ phonetype=固定/その他"
    tts_announcement: "お申し込みを受付いたしました。予約はまだ確定しておりません。担当者より3日以内に、お電話にて必ずご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_通常_固定"

