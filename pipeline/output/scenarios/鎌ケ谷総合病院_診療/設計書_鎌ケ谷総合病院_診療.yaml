# --- セクション2: フロー構成 ---
# CLAUDE.md Rule 9 準拠: 個人情報聴取サブフローは個人情報サブフロー.bivr を完全コピー。
# フロー名プレフィックスのみ施設名に置換。構造・接続・スクリプトの変更は禁止。
flow_structure:
  type: "subflow"
  flows:
    - name: "鎌ケ谷総合病院$診療_20260416"
      role: "main"
      description: >
        冒頭チェーン → 用件確認（9分岐: 歯科口腔外科/健康管理/インフルエンザ/コロナ/対応外/予約/変更/キャンセル/確認）
        → 予約ルート: 受診歴確認→紹介状確認→診療科→個人情報
        → 変更ルート: 診療科→予約日→希望日→当日判定→理由→診察券番号→個人情報
        → キャンセルルート: 診療科→予約日→当日判定→理由→診察券番号→個人情報
        → 確認ルート: 内容確認→RAG→診察券番号→個人情報
        → 共通: 氏名→生年月日→電話番号→RAG→phonetype分岐→終話
    - name: "鎌ケ谷総合病院$氏名聴取_20260416"
      role: "sub"
      description: "患者氏名聴取（音声のみ）→ 結果返却"
    - name: "鎌ケ谷総合病院$生年月日聴取_20260416"
      role: "sub"
      description: "生年月日聴取（DTMF 8桁 + DOB Re-confirmation復唱確認）→ 結果返却"
    - name: "鎌ケ谷総合病院$電話番号聴取_20260416"
      role: "sub"
      description: "電話番号聴取（incoming-classifier→携帯/固定分岐→Phone Normalization→復唱確認）→ 結果返却"
    - name: "鎌ケ谷総合病院$診察券番号聴取_20260416"
      role: "sub"
      description: "診察券番号聴取（DTMF + 音声、「わからない」分岐あり）→ 結果返却"
    - name: "鎌ケ谷総合病院$RAG検索_20260416"
      role: "sub"
      description: "患者向けFAQ検索（問い合わせ内容をRAGで検索→回答 or フォールバック）→ 結果返却"
  subflows:
    - name: "鎌ケ谷総合病院$氏名聴取_20260416"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の氏名聴取を完全コピー"
    - name: "鎌ケ谷総合病院$生年月日聴取_20260416"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の生年月日聴取（復唱あり）を完全コピー"
    - name: "鎌ケ谷総合病院$電話番号聴取_20260416"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10 準拠。個人情報サブフロー.bivr の電話番号聴取を完全コピー。phonetype をコンテキストに保存し、メインフローに返却"
    - name: "鎌ケ谷総合病院$診察券番号聴取_20260416"
      target: "診察券番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr の診察券番号聴取を完全コピー。「わからない」分岐あり"
    - name: "鎌ケ谷総合病院$RAG検索_20260416"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "FAQ検索サブフロー。STT→OpenAI→RAG→回答ループ"

# --- セクション3: フローの目的 ---
purpose: >
  鎌ケ谷総合病院の予約専用AI電話。患者からの電話を受け、用件（予約/変更/キャンセル/確認）を確認し、
  用件に応じた追加情報（診療科・予約日・理由等）と患者情報（氏名・生年月日・連絡先電話番号）を聴取して、
  折り返し受付を自動化する。歯科口腔外科・健康管理センター・インフルエンザワクチン・対応外診療科は
  直通番号または代表番号への案内で終話する。Gen2からの移管。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "鎌ケ谷総合病院$診療_20260416"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(status=2, smsFlag=-1) → END_非通知(TTS) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外 → 完了フラグ_時間外(status=6, smsFlag=-1) → END_時間外(TTS) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS) → 用件確認
      ─── 用件確認（9分岐）───
      用件確認
          ├─ 歯科口腔外科 → END_歯科口腔外科(status=2)
          ├─ 健康管理センター → END_健康管理センター(status=2)
          ├─ インフルエンザワクチン → END_インフルエンザワクチン(status=2)
          ├─ コロナウイルスワクチン → END_コロナワクチン(status=2)
          ├─ 対応外診療科 → END_対応外診療科案内(status=2)
          ├─ 予約 → 受診歴確認
          │     ├─ 新規 → 紹介状確認
          │     │     ├─ あり → 診療科
          │     │     └─ なし → 選定療養費案内 → 診療科
          │     └─ 再診(default) → 診療科
          ├─ 変更 → 診療科
          ├─ キャンセル → 診療科
          └─ 確認(default) → 内容確認 → RAG検索_確認 → 診察券番号 → (共通ルート合流)
      ─── 診療科→用件別分岐 ───
      診療科 → ContextMatchRouter(classification)
          ├─ 変更 → 予約日_変更 → 予約希望日_変更 → 予約希望日復唱 → 当日予約判定
          │     ├─ 当日 → END_当日予約案内(status=2)
          │     └─ 非当日 → 理由_変更 → 診察券番号 → (共通ルート合流)
          ├─ キャンセル → 予約日_キャンセル → 当日予約判定
          │     ├─ 当日 → END_当日予約案内(status=2)
          │     └─ 非当日 → 理由_キャンセル → 診察券番号 → (共通ルート合流)
          └─ 新規/再診/default → (共通ルート合流)
      ─── 共通ルート ───
      氏名聴取(Sub) → 生年月日聴取(Sub) → 電話番号聴取(Sub)
        → RAG検索(Sub) → ContextMatchRouter(phonetype)
            ├─ 携帯 → END_通常_携帯(status=1, smsFlag=1)
            └─ 固定/その他 → END_通常_固定(status=1, smsFlag=-1)

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭 ===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # === 用件確認（9分岐）===
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "歯科口腔外科"
        next: END_歯科口腔外科
      - match: "健康管理センター"
        next: END_健康管理センター
      - match: "インフルエンザワクチン"
        next: END_インフルエンザワクチン
      - match: "コロナウイルスワクチン"
        next: END_コロナワクチン
      - match: "対応外診療科"
        next: END_対応外診療科案内
      - match: "予約"
        next: 受診歴確認
      - match: "変更"
        next: 診療科
      - match: "キャンセル"
        next: 診療科
      - match: "確認"
        next: 内容確認
      - match: "default"
        next: 内容確認

  # === 予約ルート ===
  - step: 受診歴確認
    type: hearing
    output_format: enum
    conditions:
      - match: "新規"
        next: 紹介状確認
      - match: "default"
        next: 診療科

  - step: 紹介状確認
    type: hearing
    output_format: enum
    conditions:
      - match: "なし"
        next: 選定療養費案内
      - match: "default"
        next: 診療科

  - step: 選定療養費案内
    type: announcement
    next: 診療科

  # === 診療科（予約/変更/キャンセル共通）===
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 用件別分岐

  - step: 用件別分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: 予約日_変更
      - match: "キャンセル"
        next: 予約日_キャンセル
      - match: "default"
        next: jump_氏名聴取

  # === 変更ルート ===
  - step: 予約日_変更
    type: hearing
    output_format: datetime
    next: 予約希望日_変更

  - step: 予約希望日_変更
    type: hearing
    output_format: text
    next: 予約希望日復唱_変更

  - step: 予約希望日復唱_変更
    type: announcement
    next: 当日予約判定_変更

  - step: 当日予約判定_変更
    type: script
    script_template: custom
    reference_module: "OpenAI_予約日_変更"
    conditions:
      - match: "当日"
        next: END_当日予約案内
      - match: "default"
        next: 理由_変更

  - step: 理由_変更
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # === キャンセルルート ===
  - step: 予約日_キャンセル
    type: hearing
    output_format: datetime
    next: 当日予約判定_キャンセル

  - step: 当日予約判定_キャンセル
    type: script
    script_template: custom
    reference_module: "OpenAI_予約日_キャンセル"
    conditions:
      - match: "当日"
        next: END_当日予約案内
      - match: "default"
        next: 理由_キャンセル

  - step: 理由_キャンセル
    type: hearing
    output_format: text
    next: jump_診察券番号聴取

  # === 確認ルート ===
  - step: 内容確認
    type: hearing
    output_format: text
    next: jump_RAG検索_確認

  - step: jump_RAG検索_確認
    type: subflow
    flowname: "鎌ケ谷総合病院$RAG検索_20260416"
    next: jump_診察券番号聴取

  # === 変更/キャンセル/確認 共通 → 診察券番号 ===
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "鎌ケ谷総合病院$診察券番号聴取_20260416"
    next: jump_氏名聴取

  # === 全ルート共通（個人情報聴取）===
  - step: jump_氏名聴取
    type: subflow
    flowname: "鎌ケ谷総合病院$氏名聴取_20260416"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "鎌ケ谷総合病院$生年月日聴取_20260416"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "鎌ケ谷総合病院$電話番号聴取_20260416"
    next: jump_RAG検索

  # === pre-termination RAG（Pattern 3）===
  - step: jump_RAG検索
    type: subflow
    flowname: "鎌ケ谷総合病院$RAG検索_20260416"
    next: 終話分岐_電話種別

  # === 終話分岐 ===
  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "1"
        next: END_通常_携帯
      - match: "default"
        next: END_通常_固定

  # === 終話ブロック ===
  - step: END_通常_携帯
    type: termination
    termination_ref: "END_通常_携帯"

  - step: END_通常_固定
    type: termination
    termination_ref: "END_通常_固定"

  - step: END_歯科口腔外科
    type: termination
    termination_ref: "END_歯科口腔外科"

  - step: END_健康管理センター
    type: termination
    termination_ref: "END_健康管理センター"

  - step: END_インフルエンザワクチン
    type: termination
    termination_ref: "END_インフルエンザワクチン"

  - step: END_コロナワクチン
    type: termination
    termination_ref: "END_コロナワクチン"

  - step: END_対応外診療科案内
    type: termination
    termination_ref: "END_対応外診療科案内"

  - step: END_当日予約案内
    type: termination
    termination_ref: "END_当日予約案内"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
  # --- 標準フィールド (itemDefault: true) ---
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - {order: "1", value: "新規"}
      - {order: "2", value: "再診"}
      - {order: "3", value: "変更"}
      - {order: "4", value: "キャンセル"}
      - {order: "5", value: "確認"}
      - {order: "6", value: "コロナウイルスワクチン"}
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。用件確認ステップで初期設定、受診歴確認ステップで新規/再診に更新"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "患者氏名（カタカナ）。氏名聴取サブフローで設定"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
