# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["phonetype"]
  patterns:
    - condition: "phonetype=1（携帯）"
      sms_flag: "1"
      notes: "携帯電話はSMS送信あり"
    - condition: "phonetype=2（固定/その他）"
      sms_flag: "-1"
      notes: "固定電話はSMS受信不可のため送信なし"

