    notes: "DTMF 8桁入力: YYYYMMDD形式（例: 20260501 = 2026年5月1日）。音声入力も可（5月1日、来週の火曜日 等）。YYYY-MM-DD 00:00:00形式に正規化。キャンセルルート用"

