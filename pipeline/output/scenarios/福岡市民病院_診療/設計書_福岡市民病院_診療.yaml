# 生成元: @director エージェント (2026/04/20)
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/【診療1】：福岡市民病院.md
# 確認レポート: docs/designs/確認レポート_福岡市民病院_診療_2026-04-20.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "福岡市民病院"
  group_name: "福岡市民病院"
  flow_name: "福岡市民病院$診療"
  target_facility: "福岡市民病院"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "祝日除く月〜土 9:00〜17:00"  # 仮値。Dr.JOY 側で詳細スケジュール設定
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "福岡市民病院$診療"
      role: "main"
      description: "冒頭 → 個人情報聴取（氏名→生年月日→診察券番号）→ 診療科 → 診療科2 → 用件確認 → 用件別聴取 → 電話番号聴取 → 用件別終話"
  subflows:
    - name: "福岡市民病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/氏名聴取.json を完全コピー。Gen2 ルールにより復唱禁止"
    - name: "福岡市民病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/生年月日聴取_復唱なし.json を完全コピー。Gen2 ルールにより復唱禁止（DOB Re-confirmation を使わない版）。和暦→西暦変換は OpenAI プロンプト内で実施"
    - name: "福岡市民病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/診察券番号聴取.json を完全コピー。Gen2 ルールにより復唱必須。「わからない」→「わからない」格納、「決まっていない」→「不明」格納。C→4、ハイフン類義語（iPhone/の/はいふん 等）→「-」変換は OpenAI プロンプトで処理"
    - name: "福岡市民病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/電話番号聴取_復唱あり.json を完全コピー。incoming-classifier + Phone Normalization + 携帯/固定判別内蔵。phonetype を保存。Gen2 ルールにより復唱必須"

# --- セクション3: フローの目的 ---
purpose: "福岡市民病院の外来予約に関する問合せ（予約変更・キャンセル・予約確認）を受け、氏名・生年月日・診察券番号・診療科・用件・連絡先電話番号を聴取してDr.JOYに保存し、折り返し受付を自動化する。新規予約（初診）は受け付けず代表電話案内後に切断（紹介状＋直接来院運用）。Gen2 の順序上の特徴として、共通の個人情報（氏名→生年月日→診察券番号→診療科→診療科2）を用件聴取より前に聴取する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "福岡市民病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB: status=0 smsFlag=1 他)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 受付時間判定(acceptance_times)
                    ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                    └─ 受付可 → 冒頭_アナウンス(TTS, 入力待ちなし)
                          → jump_氏名聴取 (サブフロー, 復唱なし)
                              → jump_生年月日聴取 (サブフロー, 復唱なし)
                                  → jump_診察券番号聴取 (サブフロー, 復唱あり)
                                      → 診療科 (AmiVoice_STT, enum, echo_back:false, no_result_default=登録なし)
                                          → 診療科2 (AmiVoice_STT, enum, echo_back:false, no_result_default=なし)
                                              → 用件確認 (DTMF_AmiVoice, enum, echo_back:true)
                                                  ├─ 変更      ─┐
                                                  ├─ キャンセル ─┼→ 予約日 → 用件分岐_日程
                                                  ├─ 予約確認   → 内容確認 → jump_電話番号聴取 → 終話分岐
                                                  └─ 新規      → END_代表案内_予約新規(status=2, smsFlag=-1) → 切断
                                                用件分岐_日程 (ContextMatchRouter: classification)
                                                  ├─ 変更      → 予約希望日 → jump_電話番号聴取 → 終話分岐
                                                  └─ キャンセル → jump_電話番号聴取 → 終話分岐
                                                終話分岐 (ContextMatchRouter: classification)
                                                  ├─ 変更      → END_終話_変更(status=1, smsFlag=2) → 切断
                                                  ├─ キャンセル → END_終話_キャンセル(status=1, smsFlag=3) → 切断
                                                  └─ 予約確認   → END_終話_予約確認(status=1, smsFlag=4) → 切断

      リトライ上限到達 → END_聴取失敗(status=3, smsFlag=-1) → 切断
    notes: |
      - Gen2 特徴: 共通の個人情報（氏名→生年月日→診察券番号→診療科→診療科2）を用件聴取より前に聴取
      - 用件確認は復唱必須（OpenAI + Re-confirmation）。肯定→分岐、否定→再聴取 1回限り
      - 診察券番号は復唱必須（サブフロー内蔵）。「わからない」/「不明」のフォールバックあり
      - 電話番号は復唱必須（サブフロー内蔵）。incoming-classifier + Phone Normalization
      - 氏名・生年月日・診療科・診療科2 は **Gen2 ルールで復唱禁止**。echo_back:false を明示
      - 新規予約（「よやく」「よやくしたい」等）は代表電話案内で終話（status=2, smsFlag=0）
      - Gen2 function の status="0"（冒頭切断/途中切断）は CLAUDE.md 規約に従い削除。異常系は status=2/3/6 に置換

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: jump_氏名聴取

  # --- 個人情報聴取サブフロー（共通の個人情報 — Gen2 の順序どおり）---
  - step: jump_氏名聴取
    type: subflow
    flowname: "福岡市民病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "福岡市民病院$生年月日聴取"
    next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "福岡市民病院$診察券番号聴取"
    next: 診療科

  # --- 診療科（復唱禁止 — Gen2 ルール）---
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    next: 診療科2

  # --- 診療科2（復唱禁止 — Gen2 ルール。「ない/ないです」→「なし」格納）---
  - step: 診療科2
    type: hearing
    output_format: enum
    no_result_default: "なし"
    next: 用件確認

  # --- 用件確認（復唱必須 — Gen2 ルール。echo_back:true）---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "変更"
        next: 予約日
      - match: "キャンセル"
        next: 予約日
      - match: "予約確認"
        next: 内容確認
      - match: "新規"
        next: END_代表案内_予約新規

  # --- 予約確認ルート: 内容確認 → 電話番号 ---
  - step: 内容確認
    type: hearing
    output_format: text
    next: jump_電話番号聴取

  # --- 変更/キャンセル共通: 予約日 ---
  - step: 予約日
    type: hearing
    output_format: datetime
    next: 用件分岐_日程

  # --- 用件分岐_日程: 変更→予約希望日 / キャンセル→電話番号 ---
  - step: 用件分岐_日程
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: 予約希望日
      - match: "キャンセル"
        next: jump_電話番号聴取

  # --- 変更ルート: 予約希望日 ---
  - step: 予約希望日
    type: hearing
    output_format: text
    next: jump_電話番号聴取

  # --- 電話番号聴取サブフロー（復唱あり）---
  - step: jump_電話番号聴取
    type: subflow
    flowname: "福岡市民病院$電話番号聴取"
    next: 終話分岐

  # --- 終話分岐: classification 別に 3 終話へ ---
  - step: 終話分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: END_終話_変更
      - match: "キャンセル"
        next: END_終話_キャンセル
      - match: "予約確認"
        next: END_終話_予約確認

  # --- 終話ブロック ---
  - step: END_終話_変更
    type: termination
    termination_ref: "END_終話_変更"

  - step: END_終話_キャンセル
    type: termination
    termination_ref: "END_終話_キャンセル"

  - step: END_終話_予約確認
    type: termination
    termination_ref: "END_終話_予約確認"

  - step: END_代表案内_予約新規
    type: termination
    termination_ref: "END_代表案内_予約新規"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "変更"
      - order: "2"
        value: "キャンセル"
      - order: "3"
        value: "予約確認"
      - order: "4"
        value: "新規"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。Gen2 function の enum（変更/キャンセル/予約確認/空）に『新規』をルーティング用値として追加（代表電話案内終話時に保存）"

