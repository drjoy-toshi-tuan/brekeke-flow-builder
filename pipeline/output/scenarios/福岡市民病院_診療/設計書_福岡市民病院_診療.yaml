# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2 からの移管。Gen2 の status='0'（冒頭切断/途中切断）および smsFlag='1'（デフォルト保持）は CLAUDE.md 規約に従い Gen3 では使用しない。異常系は status=2(代表案内)/3(聴取失敗)/6(時間外) に置換"
  - "Gen2 の特徴的な聴取順序（共通の個人情報 → 用件聴取）を踏襲。他施設（斗南病院等）の『用件 → 共通項目』型とは順序が逆"
  - "Gen2 ルール: 復唱必須 3項目（用件 / 診察券番号 / 連絡先電話番号）→ echo_back:true または専用サブフロー"
  - "Gen2 ルール: 復唱禁止 4項目（氏名 / 生年月日 / 診療科 / 診療科2）→ echo_back:false を明示。生年月日は DOB Re-confirmation を使わない『生年月日聴取_復唱なし.json』サンプルを利用"
  - "Gen2 ルール: 全聴取項目で最大1回のリトライ（retry_count:1）。2回目失敗で『聴取失敗』判定 → 固定文言『申し訳ございません。ご回答内容が確認できませんでした。担当より折り返し連絡のうえ、再確認いたします。次の内容をお伺いします。』を出力して次ステップへ（retry_failure:skip）"
  - "診察券番号の C→4 変換、ハイフン類義語（iPhone/AiPhone/の/はいふん等）→『-』変換、『わからない』→『わからない』格納、『決まっていない』→『不明』格納は診察券番号聴取サブフロー内の OpenAI プロンプトで処理"
  - "和暦→西暦換算（大正=1911+年数 / 昭和=1925+年数 / 平成=1988+年数 / 令和=2018+年数）は生年月日聴取サブフロー内の OpenAI プロンプトで処理"
  - "電話番号: 10桁 or 11桁（11桁は 090/080/070/050/060 開始）。9-10桁で0欠落なら先頭に0補完。電話番号聴取サブフローに incoming-classifier + Phone Normalization 内蔵"
  - "氏名: 全角カタカナ完全統一。漢字・ひらがな・英字混入禁止。STTの漢字誤変換は同音カタカナへ強制補正（氏名聴取サブフローの OpenAI プロンプトで処理）"
  - "新規予約（『よやく』『よやくしたい』『やっとりたい』等）は classification='新規' を保存して END_代表案内_予約新規 へ遷移。Gen2 のようにフラグだけで終話させるのではなく、classification フィールドで識別可能にする"
  - "SSML タグ（<speak>, <break>, <dtmf/>, <say-as> 等）は Gen3 では使用禁止。TTS は {tts_g:...}（全小文字）形式。{TTS_AI:...}（大文字）は誤り、使わない"
  - "Gen2 function の `checkout` / `endpoint` / 未使用フィールド（medicalTicket / selfpaidCheck / reason / inspection / history / institution / introduction / introductionHosp / city / details / question / disease / doctor / other / checkpoint）は Gen3 では context_fields に含めない（Dr.JOY 側の通話ログで判別）"
  - "DesiredreservationDate（Gen2 の PascalCase）は Gen3 命名規則に合わせ desiredReservationDate（camelCase）に統一"
  - "冒頭アナウンスは『入力待ちなし』で即次ステップ（氏名聴取）へ遷移する opening ブロック仕様。ユーザー応答を求めない"
  - "口調・禁止語: すべて丁寧語。『ありがとうございます。』『お気軽に』は禁止。『おっしゃってください』ではなく『お話ください』に統一。『かしこまりました』は使用可"
  - "ターン制御: ユーザー発話終了は 1.5秒無音継続で判定（発話途中での打ち切り禁止）。質問出力直後に自発的なエラー案内を出さない"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID — Dr.JOY管理画面で確認）"
    resolved: false
    blocker: false
    notes: "Dr.JOY 側で設定。フローJSONには含めない"

  - item: "代表電話番号（basic_info.phone_number）"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトには具体番号の記載なし。END_代表案内_予約新規 の TTS は『直接来院』案内で具体番号を発話しない仕様のため現状維持で問題ない想定。Brekeke IVR 側で着信番号設定時に確認"

  - item: "営業時間スケジュール（acceptance_times の詳細）"
    resolved: false
    blocker: false
    notes: "仮値『祝日除く月〜土 9:00〜17:00』を設定。Gen2 プロンプトには営業時間の記載なし（endpoint enum に『時間外』は定義あり）。Dr.JOY 管理画面から詳細スケジュールを設定"

  - item: "稼働休止期間（年末年始等）"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトには記載なし。Dr.JOY 管理画面から設定"

  - item: "SMS配信文面（Dr.JOY側）"
    resolved: false
    blocker: false
    notes: "smsFlag=2(変更)/3(キャンセル)/4(予約確認)/0(新規案内)/-1(SMS無し) に対応する SMS 本文を Dr.JOY 管理画面から設定。フロー側は smsFlag のみ制御"

  - item: "診療科2 の扱い（Dr.JOY画面表示）"
    resolved: false
    blocker: false
    notes: "Gen2 function では clinicalDepartment2 は display_type=TEXT かつ enum は 15科+空。Gen3 では context_fields で display_type=TEXT として定義したが、Dr.JOY 画面での表示をどうするか要確認"

  - item: "用件確認の DTMF 入力（ボタン数字 1/2/3）のリスナー有無"
    resolved: false
    blocker: false
    notes: "Gen2 はアナウンスに『1．予約の変更、2．予約のキャンセル、３．予約の確認』と番号を読み上げていたが DTMF 入力は実装されていなかった。Gen3 では DTMF_AmiVoice を採用して数字入力も受け付ける設計としたが、顧客が音声のみを想定していれば AmiVoice_STT に変更"

  - item: "非通知・時間外・聴取失敗の TTS 文言"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトにはフロー上の出口として記載なし。テンプレートデフォルト文言 + 施設名を採用済み。施設固有文言があれば差し替え"

  - item: "Gen2 の詳細ルール（再質問アナウンス B/C、復唱後否定再聴取フォーマット等）の Gen3 実装"
    resolved: false
    blocker: false
    notes: "Gen2 では項目別に再質問フォーマット A/B/C を固定文で定義。Gen3 では scaffold のデフォルト retry_failure_announcement を採用済み。施設固有表現（『次の内容をお伺いします。』等）は step_details.retry_failure_announcement に転記済み。細かい復唱後否定再聴取フォーマットが必要な場合は個別に hearing ブロック追加を検討"
