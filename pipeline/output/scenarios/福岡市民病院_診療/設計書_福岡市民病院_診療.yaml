    notes: "2つ目の診療科。Gen2 ルールにより復唱禁止（echo_back:false）。『ない』『ないです』『ありません』→『なし』格納。該当なし時も『なし』フォールバック"

  - order: 3
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 1
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "変更"
      - "キャンセル"
      - "予約確認"
      - "新規"
    notes: "Gen2 ルールにより復唱必須（echo_back:true）。DTMF 1=変更, 2=キャンセル, 3=予約確認。『よやく』『よやくしたい』『やっとりたい』等の新規予約意図検出は『新規』ラベルにマップし代表電話案内へ遷移。リトライ 1 + 復唱後否定再聴取 1"

  - order: 4
    name: "予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "変更/キャンセル用件のみ。YYYY-MM-DD HH:MM 形式。相対日付は着信日から換算。10-12月入電で1-9月の日付は翌年扱い。Gen2 ルールにより復唱禁止"

  - order: 5
    name: "予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更用件のみ。フリーテキスト（曜日・時間・上旬中旬下旬等の曖昧表現を許容）。Gen2 ルールにより復唱禁止"

  - order: 6
    name: "内容確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "inquiry"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約確認用件専用。問合せ内容をフリーテキスト保存。Gen2 ルールにより復唱禁止"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "診療科"
    tts_announcement: "次に、ご用件のある診療科をお話しください。わからない場合は「わからない」とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "循環器内科"
        - "糖尿病内科"
        - "腎臓内科"
        - "脳神経内科"
        - "消化管内科"
        - "肝臓内科"
        - "感染症内科"
        - "血管外科"
        - "脳神経外科"
        - "消化管外科"
        - "肝臓・胆のう・膵臓外科"
        - "整形外科"
        - "眼科"
        - "リウマチ・膠原病内科"
        - "登録なし"
      mapping:
        - input: "内科 / ないか / こきゅうき"
          output: "内科"
        - input: "循環器内科 / じゅんかんきないか / じゅんない / じゅんかんき"
          output: "循環器内科"
        - input: "糖尿病内科 / 糖内 / とうない / 糖尿 / とうにょう / 内分泌 / ないぶんぴつ"
          output: "糖尿病内科"
        - input: "腎臓内科 / じんぞうないか / 腎臓 / じんぞう / じんない"
          output: "腎臓内科"
        - input: "脳神経内科 / のうしんけいないか / のうない / しんけいないか"
          output: "脳神経内科"
        - input: "消化管内科 / 消内 / しょうない / 消化内 / しょうかない / 消化器内 / しょうかきない"
          output: "消化管内科"
        - input: "肝臓内科 / 肝内 / かんない / 肝臓 / かんぞう"
          output: "肝臓内科"
        - input: "感染症内科 / 感内 / 感染内 / かんせん"
          output: "感染症内科"
        - input: "血管外科 / けっかんげか / 血外 / 血管 / けっかん / 脈外 / みゃくがい"
          output: "血管外科"
        - input: "脳神経外科 / のうしんけいげか / のうげ / のうけっかん / しんけいげか"
          output: "脳神経外科"
        - input: "消化管外科 / 消外 / しょうがい / 消化外 / 消化器外 / しょうかきがい"
          output: "消化管外科"
        - input: "肝臓・胆のう・膵臓外科 / 肝胆膵外 / かんたんすい / 胆膵外 / たんのうげか / すいぞうげか"
          output: "肝臓・胆のう・膵臓外科"
        - input: "整形外科 / せいけいげか / せいけい"
          output: "整形外科"
        - input: "眼科 / がんか"
          output: "眼科"
        - input: "リウマチ・膠原病内科 / りうまち / こうげんびょうないか / こうげんびょう / りゅうまち / リュウマチ科"
          output: "リウマチ・膠原病内科"
        - input: "わからない / リストに該当なし / 複数科同時発話で特定不可"
          output: "登録なし"
      no_result_condition: "無応答 / 音声認識不能 / リストいずれにも該当しない"
    save_to: "clinicalDepartment"
    next_step: "診療科2"
    retry_failure: "skip"
    retry_failure_announcement: "申し訳ございません。ご回答内容が確認できませんでした。担当より折り返し連絡のうえ、再確認いたします。次の内容をお伺いします。"

  - step_name: "診療科2"
    tts_announcement: "他に、複数のご予約がある方は、2つ目の診療科をお話しください。ない場合は「ないです」とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "内科"
        - "循環器内科"
        - "糖尿病内科"
        - "腎臓内科"
        - "脳神経内科"
        - "消化管内科"
        - "肝臓内科"
        - "感染症内科"
        - "血管外科"
        - "脳神経外科"
        - "消化管外科"
        - "肝臓・胆のう・膵臓外科"
        - "整形外科"
        - "眼科"
        - "リウマチ・膠原病内科"
        - "なし"
      mapping:
        - input: "ない / ないです / ありません / なし / 無し / 結構です 等"
          output: "なし"
        - input: "診療科リストの各項目（診療科ステップと同じ類義語リスト）"
          output: "該当診療科"
      no_result_condition: "無応答 / 音声認識不能 / リストいずれにも該当しない"
    save_to: "clinicalDepartment2"
    next_step: "用件確認"
    retry_failure: "skip"
    retry_failure_announcement: "申し訳ございません。ご回答内容が確認できませんでした。担当より折り返し連絡のうえ、次の内容をお伺いします。"

  - step_name: "用件確認"
    tts_announcement: "それでは、ご用件を、次のいずれかでお話ください。1．予約の変更、2．予約のキャンセル、３．予約の確認。それではお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "予約確認"
        - "新規"
      mapping:
        - input: "DTMF 1 / 「変更」「予約の変更」「予約変更」「1．予約の変更」「取り直したい」「変えたい」 を含む発話"
          output: "変更"
        - input: "DTMF 2 / 「キャンセル」「予約のキャンセル」「予約キャンセル」「やめる」「取り消し」「取消」 を含む発話"
          output: "キャンセル"
        - input: "DTMF 3 / 「確認」「予約の確認」「予約確認」「よやくかくにん」「確かめる」 を含む発話"
          output: "予約確認"
        - input: "「よやく」「よやくしたい」「よやくをとる」「よやくをとりたい」「やく」「やくです」「やくいれたい」「やっしたい」「やっとりたい」「やくおねがい」など『予約を取りたい』を意味する表現"
          output: "新規"
      no_result_condition: "上記いずれにも該当しない / 肯定否定不明"
    save_to: "classification"
    next_step: "(enum分岐) 変更→予約日 / キャンセル→予約日 / 予約確認→内容確認 / 新規→END_代表案内_予約新規"
    retry_failure: "skip"
    retry_failure_announcement: "申し訳ございません。ご回答内容が確認できませんでした。担当より折り返し連絡のうえ、再確認いたします。次の内容をお伺いします。"

  - step_name: "予約日"
    tts_announcement: "次に、現在の予約日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「5月10日」「来週の火曜」等の日付表現"
          output: "YYYY-MM-DD HH:MM 形式に正規化"
        - input: "相対日付（今日/明日/明後日）"
          output: "着信日時から換算"
        - input: "10-12月入電で1-9月の月を言われた場合"
          output: "翌年扱い（例: 2026年11月入電で「5月1日」→ 2027-05-01）"
      no_result_condition: "日付として解釈不能"
    save_to: "reservationDate"
    next_step: "用件分岐_日程"
    retry_failure: "skip"
    retry_failure_announcement: "申し訳ございません。ご回答内容が確認できませんでした。担当より折り返し連絡のうえ、再確認いたします。次の内容をお伺いします。"

  - step_name: "予約希望日"
    tts_announcement: "次に、予約希望日をお伺いいたします。ご都合の良い日付や曜日をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答 / 不明瞭"
    save_to: "desiredReservationDate"
    next_step: "jump_電話番号聴取"
    retry_failure: "skip"
    retry_failure_announcement: "申し訳ございません。ご回答内容が確認できませんでした。担当より折り返し連絡のうえ、次の内容をお伺いします。"

  - step_name: "内容確認"
    tts_announcement: "ご確認内容についてお伺いします。「次回の予約日時を教えて欲しい」等、確認したい内容をお話し下さい。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "無応答 / 不明瞭"
    save_to: "inquiry"
    next_step: "jump_電話番号聴取"
    retry_failure: "skip"
    retry_failure_announcement: "申し訳ございません。ご回答内容が確認できませんでした。担当より折り返し連絡のうえ、次の内容をお伺いします。"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。福岡市民病院の予約専用AI電話です。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答内容が確認できませんでした。担当より折り返し連絡のうえ、再確認いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 代表案内系 ---
  - name: "END_代表案内_予約新規"
    condition: "用件聴取で『予約をとりたい』系発話を検出（classification=新規）"
    tts_announcement: "当院は、初診の方の予約受付はおこなっておりません。当院を初めて受診される方は、紹介状をお持ちいただき、平日の8時30分から11時の間に直接来院の上、受付をしてください。紹介状をお持ちではない方は、選定療養費別途7700円をいただきます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表案内_予約新規"

  # --- 正常系（用件別）---
  - name: "END_終話_変更"
    condition: "全聴取完了 かつ classification=変更"
    tts_announcement: "予約変更の問い合わせを承りました。変更については、ご希望に添えない場合がございます。あらかじめご承知おきください。3診療日以内に担当者からショートメール、もしくはお電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_終話_変更"

  - name: "END_終話_キャンセル"
    condition: "全聴取完了 かつ classification=キャンセル"
    tts_announcement: "予約キャンセルの問い合わせを承りました。必要に応じて、担当者よりショートメールまたはお電話にてご連絡させていただく場合があります。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "3"
    completion_flag_name: "完了フラグ_終話_キャンセル"

  - name: "END_終話_予約確認"
    condition: "全聴取完了 かつ classification=予約確認"
    tts_announcement: "予約確認の問い合わせを承りました。変更については、ご希望に添えない場合がございます。あらかじめご承知おきください。3診療日以内に担当者からショートメール、もしくはお電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "4"
    completion_flag_name: "完了フラグ_終話_予約確認"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  notes: "福岡市民病院は用件別に smsFlag を 2/3/4 で固定し、端末別（携帯/固定）の分岐はしない。Gen2 function も smsFlag 用件別固定。固定電話のSMS不達は Dr.JOY 側で phonetype 参照して制御"

