  - name: "END_受付完了"
    condition: "全聴取完了かつ携帯"
    tts_announcement: "相談員から折り返しご連絡させていただきます。平日10時から17時の間に折り返します。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了"
  - name: "END_受付完了_SMS無し"
    condition: "全聴取完了かつ固定電話またはその他"
    tts_announcement: "相談員から折り返しご連絡させていただきます。平日10時から17時の間に折り返します。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_SMS無し"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["phoneType"]
  patterns:
    - condition: "携帯"
      sms_flag: "1"
      notes: "電話番号サブフローのphoneType=携帯の場合。ContextMatchRouterで分岐。"
    - condition: ".*"
      sms_flag: "-1"
      notes: "固定電話・その他はSMS送信なし"

