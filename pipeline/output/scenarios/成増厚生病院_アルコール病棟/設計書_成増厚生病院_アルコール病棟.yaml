# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管。Gen2プロンプトの施設名: 成増厚生病院 東京アルコール医療総合センター。"
  - "本人確認で「本人」の場合、personフィールドの値をpatientNameにも格納する処理を推奨。Scriptモジュール（$runner.getModuleResult で person の OpenAI 結果を取得 → $runner.setResult で patientName に保存）で実現可能。generatorは可能であれば実装すること。"
  - "Gen2では復唱確認（echo-back）が患者本人確認・受診歴入院歴・用件確認にあったが、Gen3では1発話1意図の原則に従い復唱ステップは除去。電話番号のみ標準サブフローのRe-confirmationで対応。"
  - "Gen2の口調指示: 「ありがとうございます」は使用禁止（終話の「お電話ありがとうございました」は例外）。「おっしゃってください」ではなく「お話しください」を使用。TTS文言に反映済み。"
  - "Gen2では用件不明時のデフォルトが「問い合わせ」だったが、Gen3ではNO_RESULT→リトライ→上限到達時END_聴取失敗とする。"
  - "Gen2 function propertiesのうち本フローで未使用の12フィールド（medicalCardNumber, clinicalDepartment, clinicalDepartment2, reservationDate, DesiredreservationDate, reason, patientDateOfBirth, symptoms, institution, introduction, disease, details）はcontext_fieldsに含めない。Gen2 functionの汎用テンプレートに含まれていたが本フローの聴取ステップで使用されていないため。"
  - "Gen2のendpoint/smsFlag/checkoutはsaveContextModel2DBに含めず。endpointとsmsFlagはsaveCompletionFlag2dbのパラメータとして終話パターンに記載。checkoutはGen2固有の途中切断追跡でGen3には相当する概念がないため除外。"
  - "既存の診療フロー（な_成増厚生病院$診療1）で「アルコールの相談」は050-1725-6865を案内して終話している。本フローがその受電先として機能するため、転送モジュールは不要。"

# --- セクション12: 要確認事項（人間に確認が必要）---
