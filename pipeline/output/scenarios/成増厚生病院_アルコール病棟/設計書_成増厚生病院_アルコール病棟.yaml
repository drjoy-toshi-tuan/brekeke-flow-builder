    resolved: false
  - item: "受電番号（050-1725-6865）が本フローの受電番号として正しいか。既存診療フローの転送先番号から仮設定。"
    resolved: false
  - item: "RAGナレッジベースの有無。未構築の場合はrag_subflow.patternをnoneに変更。"
    resolved: false
