# 設計書 — 福岡徳洲会病院 リハビリ（通所リハビリテーション）
# 生成元: @director エージェント
# 生成日: 2026-04-27
# 元資料: docs/reference/customer_docs/【リハビリ1】：福岡徳洲会 20251225.md
# 移管ノート: docs/migration/gen2_福岡徳洲会病院_リハビリ.md
# 備考: 本プロジェクト初のリハビリシナリオ。customer_doc 側は「超シンプルシナリオ」を明言しているが
#       function schema には通所リハビリ特有のフィールド（欠席連絡・お迎え時間・体験利用 等）を持つ。
#       聴取は patientName / reason の2項目のみ。他の required フィールドは空文字保存で済ませる。
#       customer_doc §Ⅰ「出力可能文以外は一文字でも違えばルール違反」「言い換え・意訳禁止」が最重要制約。

version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "福岡徳洲会病院"
  scenario_name: "リハビリ"
  group_name: "福岡徳洲会病院"
  flow_name: "福岡徳洲会病院$リハビリ"
  target_facility: "福岡徳洲会病院 通所リハビリテーション"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "TODO_要確認（customer_doc に記載なし。Dr.JOY 側で設定）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# 個人情報聴取サブフローの利用方針（CLAUDE.md Rule 9 準拠）:
#   氏名のみサブフロー化。DOB/電話/診察券番号は customer_doc で聴取していないため呼び出し不要。
#   （function schema には存在するが空文字許容 = 関連サブフロー不要）
#   復唱・再確認の全面禁止（customer_doc §Ⅱ, §1-8）に従い、氏名聴取サブフローの
#   復唱（recitation）は「なし」で運用する。
flow_structure:
  type: "subflow"
  flows:
    - name: "福岡徳洲会病院$リハビリ"
      role: "main"
      description: "通所リハビリテーション専用 AI 電話。氏名・用件を聴取し status 判定後に終話する超シンプルフロー。"
  subflows:
    - name: "福岡徳洲会病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        標準氏名聴取サブフロー（Custom Jump to Flow）を使用。カタカナ変換は内蔵 OpenAI に委譲。
        customer_doc §1-4-1 に従い retry_count=1 を採用（標準の 2 を 1 に上書き）。
        再質問文言は §1-7 + §V を合成した施設固有文言:
        「申し訳ありません。うまく聞き取れませんでした。ゆっくり話すとAIがうまく聞き取れません。普通のスピードではっきりとお話しください。再度伺います。お名前をお話しください。」
        を IVR プロパティ（リトライ_患者氏名聴取.prompt_true）で上書きする。復唱は絶対禁止。

# --- セクション3: フローの目的 ---
purpose: |
  福岡徳洲会病院 通所リハビリテーションの代表電話（AI 電話）に着信した利用者から、氏名と用件を
  聴取して Dr.JOY に記録し、人間スタッフに折り返し連絡を依頼するための「受付代行」フロー。
  復唱・再確認・言い換え・FAQ 対応は一切行わず、患者氏名と用件を淡々と聴取するだけの超シンプル構成。
  customer_doc §Ⅱ・§1-8・§1-9 により、本フロー内で AI が自由発話することは一切許されない。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "福岡徳洲会病院$リハビリ"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=2) → 切断
              └─ 通常   → 営業時間チェック(acceptance_times)
                            ├─ 時間外 → END_時間外(TTS) → 完了フラグ_時間外(status=6) → 切断
                            └─ 受付可 → 冒頭_アナウンス(TTS)
                                          → 患者氏名聴取(Custom Jump to Flow → 氏名聴取サブフロー)
                                            → 用件聴取(TTS + STT + save2db, output_format=text)
                                              → 終話判定_氏名チェック(ContextMatchRouter: patientName)
                                                  ├─ 非空(.+) → END_終話_成功(TTS, status=1) → 切断
                                                  └─ 空(default) → 終話判定_用件チェック(ContextMatchRouter: reason)
                                                                      ├─ 非空(.+) → END_終話_成功(TTS, status=1) → 切断
                                                                      └─ 空(default) → END_終話_失敗(同一 TTS, status=2) → 切断
    notes: |
      - FAQ・復唱・再確認は一切なし（§1-2, §Ⅱ, §1-8）。
      - 時間外・非通知アナウンスはテンプレート既定文言を使用（customer_doc に記載なし。N-3/N-4 で要確認）。
      - 終話 TTS は成功 / 失敗で同一文言。違いは saveCompletionFlag2db の status 値のみ。
      - 用件聴取は output_format=text（OpenAI 正規化なし）。STT 結果をそのまま reason に保存。
      - 各聴取項目とも retry_count=1（§1-4-1）。リトライ失敗時は無言で次へ skip。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true     # customer_doc 記載なしだが Dr.JOY 側で時間制御を行う想定（N-2）
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 患者氏名聴取

  # --- 氏名聴取（サブフロー） ---
  - step: 患者氏名聴取
    type: subflow
    flowname: "福岡徳洲会病院$氏名聴取"
    next: 用件聴取

  # --- 用件聴取（メインフロー内 hearing） ---
  - step: 用件聴取
    type: hearing
    output_format: text                 # 自由記述。reason フィールドへそのまま保存
    retry_failure: skip                 # customer_doc §1-4-1: リトライ超過時は次項目へ強制遷移
    next: 終話判定_氏名チェック

  # --- 終話判定（ContextMatchRouter 2 段直列: patientName → reason の空チェック） ---
  # script ブロックはカレンダー計算（営業日・祝日・休館日）専用（モジュール選定ガイド §3.8 / qa_validator E-13）。
  # 複数 context の OR 空チェックは ContextMatchRouter を 2 段直列に並べて等価に実現する。
  # 1 段目で patientName 非空なら SUCCESS、空なら 2 段目に流す。
  # 2 段目で reason 非空なら SUCCESS、空なら FAIL（両 context 空＝失敗）。
  - step: 終話判定_氏名チェック
    type: context_match_router
    reference_module: "patientName"
    conditions:
      - match: ".+"
        next: END_終話_成功
      - match: "default"
        next: 終話判定_用件チェック
    notes: |
      patientName が非空（.+ にマッチ）なら成功ルート確定。空文字なら 2 段目（用件チェック）へ。
      status マッピング: 非空 → END_終話_成功（status=1）

  - step: 終話判定_用件チェック
    type: context_match_router
    reference_module: "reason"
    conditions:
      - match: ".+"
        next: END_終話_成功
      - match: "default"
        next: END_終話_失敗
    notes: |
      patientName が空だった場合のみ到達。reason 非空（.+ にマッチ）なら成功、空なら失敗。
      status マッピング:
        - reason 非空 → END_終話_成功（status=1）
        - reason 空（= patientName / reason 両方空）→ END_終話_失敗（status=2、Gen2 の 0 を Gen3 禁止のため 2 に置換）
      customer_doc §Ⅲ「データ格納」の status 判定（patientName または reason 非空 → 1、両方空 → 0/Gen3 規則で 2）に等価。

  # --- 終話 ---
  - step: END_終話_成功
    type: termination
    termination_ref: "END_終話_成功"

  - step: END_終話_失敗
    type: termination
    termination_ref: "END_終話_失敗"

# --- セクション5: コンテキストフィールド一覧 ---
