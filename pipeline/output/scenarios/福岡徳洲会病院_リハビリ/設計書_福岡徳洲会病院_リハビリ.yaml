# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "患者氏名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1                      # customer_doc §1-4-1: 再質問1回のみ
    echo_back: false                    # customer_doc §Ⅱ・§1-8: 復唱絶対禁止
    save_to: "patientName"
    openai_processing: "convert"        # カタカナ変換（§1-7）
    output_format: "text"
    output_labels: []
    notes: |
      氏名聴取サブフロー（福岡徳洲会病院$氏名聴取）に委譲。
      サブフロー内の OpenAI プロンプトは customer_doc §1-7 に完全準拠:
        - カタカナ出力を強制（かな・漢字入力をすべてカタカナに正規化）
        - 復唱・確認・疑問終助詞（「〜ですか」「〜でしょうか」）出力禁止
        - 再質問文言は固定（後述 tts_modules 参照）
        - §1-5 数字表記ルールに従う（"for"/"C"/"号"/"go" 出力禁止）
      リトライ失敗時は skip（= 用件聴取へ）。聞き取れた表記でそのまま保存する。

  - order: 2
    name: "用件聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1                      # customer_doc §1-4-1: 再質問1回のみ
    echo_back: false                    # 復唱絶対禁止
    save_to: "reason"
    openai_processing: "none"           # text そのまま保存（OpenAI 正規化なし）
    output_format: "text"
    output_labels: []
    notes: |
      リトライ失敗時は skip（= 終話判定へ）。聞き取れたテキストを reason に保存する。
      ※ customer_doc の function schema には classification enum があるが、本シンプルシナリオでは
         AI 分類せず、ユーザー発話をそのまま reason に格納する方針（移管ノート §1 明言）。

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "患者氏名聴取"
    tts_announcement: "お名前をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "カタカナ表記の氏名（例: ヤマダ タロウ）"
        - "カタカナ変換不可時は STT が聞き取った表記そのまま"
      mapping:
        - input: "ヤマダ タロウ（既にカタカナ）"
          output: "ヤマダ タロウ"
        - input: "やまだ たろう（ひらがな）"
          output: "ヤマダ タロウ"
        - input: "山田 太郎（漢字で読みが自明）"
          output: "ヤマダ タロウ"
        - input: "小山 大和（コヤマ/オヤマ・ヤマト/ダイワが不確定）"
          output: "再質問文言を出力 → 再聴取でも不一致なら聞き取れた表記のまま保存"
      no_result_condition: "無音・非言語音（「ん」「えー」等）のみ → 再質問1回 → それでも取得できなければ skip"
    save_to: "patientName"
    next_step: "用件聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""      # skip のため無言（TTS 出力なし）

  - step_name: "用件聴取"
    tts_announcement: "ご用件をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "STT 結果のテキスト（そのまま）"
      mapping: []
      no_result_condition: "無音・非言語音のみ → 再質問1回 → それでも取得できなければ skip"
    save_to: "reason"
    next_step: "終話判定"
    retry_failure: "skip"
    retry_failure_announcement: ""      # skip のため無言

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須・削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（保険用。本フローでは全聴取項目 retry_failure=skip のため通常到達しない）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（customer_doc §V 準拠）---
  - name: "END_終話_成功"
    condition: "patientName または reason が非空（デフォルトルート）"
    tts_announcement: "お申込みを受付しました。失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_終話_成功"
  - name: "END_終話_失敗"
    condition: "patientName および reason が両方空文字"
    tts_announcement: "お申込みを受付しました。失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_終話_失敗"

# smsFlag 分岐は不要（本フローは SMS 送信なし固定）
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

# --- セクション8b: RAG/FAQ 検索サブフロー ---
# customer_doc §1-2 の「FAQ の対応はしない」明言に従い、RAG サブフローは一切組み込まない。
# Gen2→Gen3 移管のデフォルトは pattern 3 だが、customer_doc の明示禁止指示を優先。
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTSモジュール一覧 ---
