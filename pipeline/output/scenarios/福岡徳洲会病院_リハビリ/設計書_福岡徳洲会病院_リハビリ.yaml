# 以下の文言を完全一致で登録する。gen_properties の汎用デフォルトで上書きされないように注意。
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "通話開始時の固定アナウンス"
    announcement: "福岡徳洲会病院通所リハビリテーション専用、AI電話です。"

  - module_name: "患者氏名聴取"
    purpose: "氏名聴取 質問文言（氏名聴取サブフロー内）"
    announcement: "お名前をお話しください。"

  - module_name: "リトライ_患者氏名聴取"
    purpose: "氏名聴取 再質問文言（氏名聴取サブフロー内・1回のみ発話）"
    announcement: "申し訳ありません。うまく聞き取れませんでした。ゆっくり話すとAIがうまく聞き取れません。普通のスピードではっきりとお話しください。再度伺います。お名前をお話しください。"

  - module_name: "用件聴取"
    purpose: "用件聴取 質問文言"
    announcement: "ご用件をお話しください。"

  - module_name: "リトライ_用件聴取"
    purpose: "用件聴取 再質問文言（1回のみ発話）"
    announcement: "申し訳ありません。うまく聞き取れませんでした。再度、ご用件をお話しください。"

  - module_name: "END_終話_成功"
    purpose: "全聴取完了時の終話（成功）"
    announcement: "お申込みを受付しました。失礼いたします。"

  - module_name: "END_終話_失敗"
    purpose: "両項目とも空文字だった場合の終話（失敗）"
    announcement: "お申込みを受付しました。失礼いたします。"

  - module_name: "END_非通知"
    purpose: "非通知着信時の案内"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  - module_name: "END_時間外"
    purpose: "営業時間外着信時の案内"
    announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"

  - module_name: "END_聴取失敗"
    purpose: "聴取失敗時の保険終話"
    announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"

# --- セクション10: AmiVoice辞書（profile_words）---
# リハビリシナリオ固有の専門用語辞書は customer_doc に記載なし。
# 氏名・自由発話の用件のみのため、特別な辞書は不要。
amivoice_dictionary: []

# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【最重要・§Ⅰ】出力可能文の固定文言制約。customer_doc に記載のある文言を一文字でも変えて出力するとルール違反。言い換え・意訳・補足説明・省略・追加禁止。@prompter / @reviewer 工程で OpenAI プロンプトのフォールバック文に禁止文字列（「聞き取りませんでした」「もう一度お願いします」「〜でしょうか」「〜ですか」）が混入しないよう特に注意。"
  - "【§Ⅱ・§1-8】復唱・再確認・Yes/No 確認の全面禁止。氏名復唱もしない。Re-confirmation・DOB Re-confirmation・Phone Normalization 等の復唱モジュールを一切使わない。"
  - "【§1-1】口調規則: 「ありがとうございます」「お気軽に」禁止、「おっしゃってください」→「お話ください」に統一。終話は「失礼いたします」で締める。"
  - "【§1-2】FAQ 対応なし。RAG サブフロー・FAQ 分岐を一切組み込まない（rag_subflow.pattern=none）。"
  - "【§1-3】着信電話番号の先頭 0 保持。telephoneNumber に格納する際に零サプレスしないこと。"
  - "【§1-4-1】各項目の再質問は 1 回のみ。超過時は聞き取れたテキストをそのまま保存して次項目へ強制遷移（retry_failure=skip）。リトライ失敗アナウンスは発話しない（無言で次へ）。"
  - "【§1-5】数字表記ルール: 「よん/し」→ 4、「ご/ごお/ごー」→ 5。\"for\"/\"C\"/\"号\"/\"go\" の出力禁止。OpenAI 正規化プロンプトで明示。"
  - "【§1-6】Gen2 SSML 制御指示（<dtmf />, <break time=\"500ms\"/> 等）は Gen3 では SSML 禁止のため無視。TTS は {tts_g:...} 形式のみ。<speak>, <break>, <say-as> 等を埋め込まない。"
  - "【§1-7】氏名カタカナ変換: 入力文字種を問わずカタカナに正規化。判別不可時は聞き取れた表記で保存、再質問は 1 回のみ。再質問文言は §1-7 + §V を合成した長文版を使用。"
  - "【§1-9】言い換え禁止: 再質問文言は customer_doc 記載の固定文を完全一致で使用。意訳・省略・接続詞追加もルール違反。"
  - "【§Ⅲ】status 値マッピング: patientName もしくは reason が非空 → 1、両方空 → 2（Gen2 の 0 は Gen3 禁止値のため 2 に置換）、代表案内 → 2。本フローでは代表案内ルートは実装しない。"
  - "【未聴取フィールド扱い】classification / medicalCardNumber / patientDateOfBirth / additionalPhoneNumber / reservationDate / Preferred_date / Medical_history / company_name / company_check / checking_details / Fax_number / change_item は function schema 上 required だが本シンプルシナリオでは聴取せず空文字保存とする。saveContextModel2DB に定義のみ行い、フロー内で populate しない。"
  - "【サブフロー retry_count 上書き】氏名聴取サブフロー標準の retry_count（通常 2）を 1 に上書きする必要あり（§1-4-1 準拠）。手順は N-6 で要確認。"
  - "【サブフロー再質問 TTS 上書き】氏名聴取サブフローの「リトライ_患者氏名聴取」プロパティを §1-7 + §V の長文合成版で上書きすること。gen_properties の汎用デフォルト（短縮版）が当たって施設固有文言が失われないように注意。"
  - "【endpoint フィールド】function schema の endpoint は saveCompletionFlag2db のパラメータとして扱い、saveContextModel2DB には含めない（director.md Gen2 マッピングルール）。"
  - "【終話判定の構成】script ブロックはカレンダー計算（営業日・祝日・休館日）専用のため使用しない（qa_validator E-13 / モジュール選定ガイド §3.8）。複数 context（patientName / reason）の OR 空チェックは ContextMatchRouter を 2 段直列に並べて等価表現する。1 段目（終話判定_氏名チェック: patientName 参照）で非空なら成功、空なら 2 段目（終話判定_用件チェック: reason 参照）に流し、reason 非空なら成功、両方空なら失敗。両終話の TTS は同一文言で status のみ 1/2 で差別化する。"

