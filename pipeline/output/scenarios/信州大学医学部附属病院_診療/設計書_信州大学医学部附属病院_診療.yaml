# 設計書: 信州大学医学部附属病院 — 診療
# 作業種別: Gen1 (commubo) → Gen3 移管
# 元資料: commubo抽出/【042】信州大学医学部附属病院/【0038信州大学医学部附属病院】診療1_M_本番/
# 移管日: 2026-05-01
# 確認レポート: 確認レポート_信州大学医学部附属病院_診療_20260501.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "信州大学医学部附属病院"
  scenario_name: "診療"
  group_name: "信州大学医学部附属病院"
  flow_name: "信州大学医学部附属病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "0570-00-3010"        # 代表電話 (Gen1 main.yaml 「失敗」箱から抽出)。聴取失敗時の代表案内に使用
  business_hours: "祝日を除く、月曜〜金曜 8:30〜16:30。年末年始 (12/30〜1/5) 休診。"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "信州大学医学部附属病院$診療"
      role: "main"
      description: "新規予約・予約変更・予約キャンセル・予約確認 + CT/MRI 検査予約を受け付けるメインフロー"
  subflows:
    - name: "信州大学医学部附属病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー (患者氏名 1 名のみ、入電者 = 受診者前提)"
    - name: "信州大学医学部附属病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 含む。和暦/西暦両対応。DTMF 8 桁入力も対応"
    - name: "信州大学医学部附属病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "「わからない」発話の分岐あり (新規予約時の診察券無を吸収)。最大 15 桁"
    - name: "信州大学医学部附属病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "携帯/固定判別あり (phonetype コンテキストに保存)。電話番号区切り読み上げ含む (Gen1 電話番号区切り.yaml は <% var %> 構文で吸収)"

# --- セクション3: フローの目的 ---
purpose: |
  信州大学医学部附属病院・予約専用 AI 電話の外来予約自動応対フロー。
  患者からの電話を受け、用件 (新規予約 / 予約変更 / 予約キャンセル / 予約確認) と
  CT/MRI 検査予約を分類した上で、診療科 (38 種) を聴取する。
  紹介受診重点医療機関の指定により、紹介状なしの新規予約は原則代表案内に振り分け、
  頭痛外来のみ初診時選定療養費 7,700 円の自己負担案内で受付続行する。
  クローズ診療科 5 種 (血液内科 / 精神科 / 子どものこころ診療部 / 海外渡航者ワクチン外来 / 移植外科) は
  それぞれ専用 TTS で別電話番号案内 + 代表案内に振り分ける。海外渡航者ワクチン外来のみ
  受診歴あり再診 + 平日 13:00〜16:00 着信は専用番号 0263-37-3475 へ Blind Transfer する。
  脳神経外科は新規予約不可だが CT/MRI 検査予約のみ受付。
  個人情報 (氏名 / 生年月日 / 診察券番号 / 電話番号) を 4 つのサブフローで聴取し、
  Dr.JOY に格納して 3 営業日以内に担当者から折り返し連絡する設計。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "信州大学医学部附属病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外
                          └─ 受付可 → 冒頭_アナウンス
                                        → 用件確認(hearing, enum [新規/予約変更/予約キャンセル/予約確認/CT/MRI], echo_back)
                                          → 用件_主分岐(CMR ref OpenAI_用件確認)
                                            ├─ 新規           → 診療科聴取_新規
                                            ├─ 予約変更       → 診療科聴取_変更キャンセル
                                            ├─ 予約キャンセル → 診療科聴取_変更キャンセル
                                            ├─ 予約確認       → 確認内容聴取
                                            ├─ CT             → 診療科聴取_CTMRI
                                            ├─ MRI            → 診療科聴取_CTMRI
                                            └─ other          → 診療科聴取_新規

      [新規予約レーン]
      診療科聴取_新規(hearing, enum 38 dept, echo_back, no_result→"登録なし")
        → 診療科確定_新規(CMR ref OpenAI_診療科聴取_新規)
            ├─ 産科                       → 出産予定日聴取
            ├─ 血液内科                   → END_血液内科クローズ
            ├─ 精神科                     → END_精神科クローズ
            ├─ 子どものこころ診療部       → END_子どものこころクローズ
            ├─ 海外渡航者ワクチン外来     → 受診歴
            ├─ 移植外科                   → END_移植外科クローズ
            ├─ 脳神経外科                 → END_脳神経外科_新規不可
            └─ other (一般診療科)         → 受診歴

      受診歴(hearing, enum [初診/再診])
        → 受診歴後_診療科再チェック(CMR ref OpenAI_診療科聴取_新規)
            ├─ 海外渡航者ワクチン外来 → 海外渡航者_受診歴チェック
            └─ other                   → 紹介状有無

      海外渡航者_受診歴チェック(CMR ref OpenAI_受診歴)
        ├─ 再診 → 海外渡航者_時間チェック(script: business_hours 13-16)
        │           ├─ SUCCESS → 海外渡航者_転送(call_transfer 0263-37-3475)
        │           └─ FAIL    → END_海外渡航者ワクチン外来_時間外
        └─ other → END_海外渡航者ワクチン外来_クローズ

      紹介状有無(hearing, enum [あり/なし])
        ├─ あり   → 紹介元医療機関名聴取(text) → jump_氏名聴取
        └─ other  → 紹介状なし_診療科チェック(CMR ref OpenAI_診療科聴取_新規)
                      ├─ 頭痛外来 → 紹介状なし_頭痛外来_アナウンス → jump_氏名聴取
                      └─ other    → END_紹介状なし_代表案内

      出産予定日聴取(datetime) → 妊娠週数聴取(text) → jump_氏名聴取

      [予約変更/キャンセルレーン]
      診療科聴取_変更キャンセル(hearing, enum, echo_back, no_result→"登録なし")
        → 予約日聴取(datetime, DTMF 4 桁並走)
        → 用件分岐_予約日後(CMR ref OpenAI_用件確認)
            ├─ 予約変更       → 変更希望日聴取(text) → 残薬確認(enum 3 値) → 変更理由(enum 4 値)
            │                      ├─ 体調変化 → 症状確認(text) → jump_氏名聴取
            │                      └─ other    → jump_氏名聴取
            ├─ 予約キャンセル → キャンセル理由(enum 4 値)
            │                      ├─ 体調変化 → キャンセル症状確認(text) → jump_氏名聴取
            │                      └─ other    → jump_氏名聴取
            └─ other          → 変更希望日聴取

      [CT/MRI 検査レーン]
      診療科聴取_CTMRI(hearing, enum, echo_back, no_result→"登録なし")
        → ペースメーカー_アナウンス(announcement, "<% classification %>検査を受診される方へ...")
        → ペースメーカー有無(hearing, enum [あり/なし])
        → jump_氏名聴取

      [予約確認レーン]
      確認内容聴取(text)
        → jump_氏名聴取

      [個人情報サブフロー連鎖]
      jump_氏名聴取 → jump_生年月日聴取 → jump_診察券番号聴取 → jump_電話番号聴取
        → 終話分岐_電話種別(CMR ref 電話番号聴取)
            ├─ 携帯  → 終話分岐_携帯_用件(CMR ref OpenAI_用件確認)
            │           ├─ 新規/CT/MRI/other → END_新規_携帯
            │           ├─ 予約変更          → END_変更_携帯
            │           ├─ 予約キャンセル    → END_キャンセル_携帯
            │           └─ 予約確認          → END_確認_携帯
            └─ other → 終話分岐_その他_用件(CMR ref OpenAI_用件確認)
                        ├─ 新規/CT/MRI/other → END_新規_その他
                        ├─ 予約変更          → END_変更_その他
                        ├─ 予約キャンセル    → END_キャンセル_その他
                        └─ 予約確認          → END_確認_その他
    notes: |
      - 用件確認は Pattern B (OpenAI → ContextMatchRouter) で 6 値 (新規/予約変更/予約キャンセル/予約確認/CT/MRI) に分岐。
        echo_back=true で「新規、で、よろしいですか？」「CT、で、よろしいですか？」等の復唱確認を行う。
      - 診療科聴取は 3 つの別 hearing (新規 / 変更キャンセル / CTMRI) で TTS 文言を「受診を希望される / 予約票に記載されている / 通院されている」と差し替える。
        共通の 38 種 leaf 診療科を使用。「呼吸器」「内科」「外科」等の親グループ単独発話は NO_RESULT で再聴取に流す。
      - クローズ 5 種 (血液内科 / 精神科 / 子どものこころ / 海外渡航者ワクチン外来 / 移植外科) はそれぞれ専用 TTS。
      - 海外渡航者ワクチン外来は受診歴あり再診 + 平日 13:00〜16:00 のみ専用番号転送。
      - 脳神経外科は新規予約不可だが、CT/MRI 検査時のみ受付 (用件 = CT/MRI なら CTMRI レーンに既に分岐済みのため END_脳神経外科_新規不可 には到達しない)。
      - 紹介状なしの場合、頭痛外来のみ自己負担案内 (7,700 円) で受付続行。それ以外は代表案内へ。
      - 産科は出産予定日 + 妊娠週数の二段聴取。「わからない」発話可 (skip フォールバック)。
      - 予約キャンセルは変更希望日・残薬確認をスキップしてキャンセル理由のみ聴取 (移管ノート判断)。

# --- セクション4b: シナリオフロー定義 (ブロック構成) ---
scenario_flow:
  # =====================================================================
  # 冒頭 2 ブロック 1 セット
  # =====================================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # =====================================================================
  # 用件確認 (Pattern B: enum + echo_back → ContextMatchRouter で 6 分岐)
  # =====================================================================
  - step: 用件確認
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "other"
        next: 用件_主分岐

  - step: 用件_主分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "新規"
        next: 診療科聴取_新規
      - match: "予約変更"
        next: 診療科聴取_変更キャンセル
      - match: "予約キャンセル"
        next: 診療科聴取_変更キャンセル
      - match: "予約確認"
        next: 確認内容聴取
      - match: "CT"
        next: 診療科聴取_CTMRI
      - match: "MRI"
        next: 診療科聴取_CTMRI
      - match: "other"
        next: 診療科聴取_新規

  # =====================================================================
  # 新規予約レーン: 診療科聴取_新規 → 診療科確定_新規
  # =====================================================================
  - step: 診療科聴取_新規
    type: hearing
    output_format: enum
    echo_back: true
    no_result_default: "登録なし"
    conditions:
      - match: "other"
        next: 診療科確定_新規

  - step: 診療科確定_新規
    type: context_match_router
    reference_module: "OpenAI_診療科聴取_新規"
    conditions:
      - match: "産科"
        next: 出産予定日聴取
      - match: "血液内科"
        next: END_血液内科クローズ
      - match: "精神科"
        next: END_精神科クローズ
      - match: "子どものこころ診療部"
        next: END_子どものこころクローズ
      - match: "海外渡航者ワクチン外来"
        next: 受診歴
      - match: "移植外科"
        next: END_移植外科クローズ
      - match: "脳神経外科"
        next: END_脳神経外科_新規不可
      - match: "other"
        next: 受診歴

  # =====================================================================
  # 受診歴 (新規予約 + 一般診療科 / 海外渡航者ワクチン外来)
  # =====================================================================
  - step: 受診歴
    type: hearing
    output_format: enum
    conditions:
      - match: "other"
        next: 受診歴後_診療科再チェック

  - step: 受診歴後_診療科再チェック
    type: context_match_router
    reference_module: "OpenAI_診療科聴取_新規"
    conditions:
      - match: "海外渡航者ワクチン外来"
        next: 海外渡航者_受診歴チェック
      - match: "other"
        next: 紹介状有無

  # =====================================================================
  # 海外渡航者ワクチン外来: 受診歴 + 時間チェック → 専用番号転送
  # =====================================================================
  - step: 海外渡航者_受診歴チェック
    type: context_match_router
    reference_module: "OpenAI_受診歴"
    conditions:
      - match: "再診"
        next: 海外渡航者_時間チェック
      - match: "other"
        next: END_海外渡航者ワクチン外来_クローズ

  - step: 海外渡航者_時間チェック
    type: script
    script_template: business_hours
    template_params:
      START_HOUR: 13
      END_HOUR: 16
    conditions:
      - match: "SUCCESS"
        next: 海外渡航者_転送
      - match: "other"
        next: END_海外渡航者ワクチン外来_時間外

  - step: 海外渡航者_転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "申し訳ございませんが、担当部署が混み合っているためお繋ぎすることができませんでした。恐れ入りますが、電話番号を申し上げますので受付時間内に再度おかけなおし下さい。受付時間は月曜から金曜の13時から16時までです。電話番号は、0263-37-3475、です。繰り返します、電話番号は、0263-37-3475、です。それでは失礼いたします。"

  # =====================================================================
  # 紹介状有無 → 紹介元医療機関名 / 頭痛外来案内 / 代表案内
  # =====================================================================
  - step: 紹介状有無
    type: hearing
    output_format: enum
    conditions:
      - match: "あり"
        next: 紹介元医療機関名聴取
      - match: "other"
        next: 紹介状なし_診療科チェック

  - step: 紹介状なし_診療科チェック
    type: context_match_router
    reference_module: "OpenAI_診療科聴取_新規"
    conditions:
      - match: "頭痛外来"
        next: 紹介状なし_頭痛外来_アナウンス
      - match: "other"
        next: END_紹介状なし_代表案内

  - step: 紹介状なし_頭痛外来_アナウンス
    type: announcement
    next: jump_氏名聴取

  - step: 紹介元医療機関名聴取
    type: hearing
    output_format: text
    next: jump_氏名聴取

  # =====================================================================
  # 産科ルート: 出産予定日 → 妊娠週数 → 個人情報
  # =====================================================================
  - step: 出産予定日聴取
    type: hearing
    output_format: datetime
    next: 妊娠週数聴取

  - step: 妊娠週数聴取
    type: hearing
    output_format: text
    next: jump_氏名聴取

  # =====================================================================
  # 予約変更/キャンセルレーン: 診療科聴取_変更キャンセル → 予約日 → 分岐
  # =====================================================================
  - step: 診療科聴取_変更キャンセル
    type: hearing
    output_format: enum
    echo_back: true
    no_result_default: "登録なし"
    conditions:
      - match: "other"
        next: 予約日聴取

  - step: 予約日聴取
    type: hearing
    output_format: datetime
    next: 用件分岐_予約日後

  - step: 用件分岐_予約日後
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: 変更希望日聴取
      - match: "予約キャンセル"
        next: キャンセル理由
      - match: "other"
        next: 変更希望日聴取

  - step: 変更希望日聴取
    type: hearing
    output_format: text
    next: 残薬確認

  - step: 残薬確認
    type: hearing
    output_format: enum
    conditions:
      - match: "other"
        next: 変更理由

  - step: 変更理由
    type: hearing
    output_format: enum
    conditions:
      - match: "体調変化"
        next: 症状確認
      - match: "other"
        next: jump_氏名聴取

  - step: 症状確認
    type: hearing
    output_format: text
    next: jump_氏名聴取

  - step: キャンセル理由
    type: hearing
    output_format: enum
    conditions:
      - match: "体調変化"
        next: キャンセル症状確認
      - match: "other"
        next: jump_氏名聴取

  - step: キャンセル症状確認
    type: hearing
    output_format: text
    next: jump_氏名聴取

  # =====================================================================
  # CT/MRI レーン: 診療科聴取_CTMRI → ペースメーカー
  # =====================================================================
  - step: 診療科聴取_CTMRI
    type: hearing
    output_format: enum
    echo_back: true
    no_result_default: "登録なし"
    conditions:
      - match: "other"
        next: ペースメーカー_アナウンス

  - step: ペースメーカー_アナウンス
    type: announcement
    next: ペースメーカー有無

  - step: ペースメーカー有無
    type: hearing
    output_format: enum
    conditions:
      - match: "other"
        next: jump_氏名聴取

  # =====================================================================
  # 予約確認レーン: 確認内容聴取
  # =====================================================================
  - step: 確認内容聴取
    type: hearing
    output_format: text
    next: jump_氏名聴取

  # =====================================================================
  # 個人情報サブフロー (4 本連鎖)
  # =====================================================================
  - step: jump_氏名聴取
    type: subflow
    flowname: "信州大学医学部附属病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "信州大学医学部附属病院$生年月日聴取"
    next: jump_診察券番号聴取

  - step: jump_診察券番号聴取
    type: subflow
    flowname: "信州大学医学部附属病院$診察券番号聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "信州大学医学部附属病院$電話番号聴取"
    next: 終話分岐_電話種別

  # =====================================================================
  # 終話分岐: 電話種別 (携帯/その他) × 用件 (4 用件)
  # =====================================================================
  - step: 終話分岐_電話種別
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: 終話分岐_携帯_用件
      - match: "other"
        next: 終話分岐_その他_用件

  - step: 終話分岐_携帯_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "新規"
        next: END_新規_携帯
      - match: "予約変更"
        next: END_変更_携帯
      - match: "予約キャンセル"
        next: END_キャンセル_携帯
      - match: "予約確認"
        next: END_確認_携帯
      - match: "CT"
        next: END_新規_携帯
      - match: "MRI"
        next: END_新規_携帯
      - match: "other"
        next: END_新規_携帯

  - step: 終話分岐_その他_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "新規"
        next: END_新規_その他
      - match: "予約変更"
        next: END_変更_その他
      - match: "予約キャンセル"
        next: END_キャンセル_その他
      - match: "予約確認"
        next: END_確認_その他
      - match: "CT"
        next: END_新規_その他
      - match: "MRI"
        next: END_新規_その他
      - match: "other"
        next: END_新規_その他

  # =====================================================================
  # 終話ブロック: 正常系 (4 用件 × 携帯/その他 = 8) + 案内系 (8) + 異常系 (3)
  # =====================================================================
  # 正常系: 携帯ルート
  - step: END_新規_携帯
    type: termination
    termination_ref: "END_新規_携帯"
  - step: END_変更_携帯
    type: termination
    termination_ref: "END_変更_携帯"
  - step: END_キャンセル_携帯
    type: termination
    termination_ref: "END_キャンセル_携帯"
  - step: END_確認_携帯
    type: termination
    termination_ref: "END_確認_携帯"

  # 正常系: 固定/その他ルート
  - step: END_新規_その他
    type: termination
    termination_ref: "END_新規_その他"
  - step: END_変更_その他
    type: termination
    termination_ref: "END_変更_その他"
  - step: END_キャンセル_その他
    type: termination
    termination_ref: "END_キャンセル_その他"
  - step: END_確認_その他
    type: termination
    termination_ref: "END_確認_その他"

  # 案内系終話 (代表案内・クローズ診療科・専用番号案内)
  - step: END_紹介状なし_代表案内
    type: termination
    termination_ref: "END_紹介状なし_代表案内"
  - step: END_血液内科クローズ
    type: termination
    termination_ref: "END_血液内科クローズ"
  - step: END_精神科クローズ
    type: termination
    termination_ref: "END_精神科クローズ"
  - step: END_子どものこころクローズ
    type: termination
    termination_ref: "END_子どものこころクローズ"
  - step: END_海外渡航者ワクチン外来_クローズ
    type: termination
    termination_ref: "END_海外渡航者ワクチン外来_クローズ"
  - step: END_海外渡航者ワクチン外来_時間外
    type: termination
    termination_ref: "END_海外渡航者ワクチン外来_時間外"
  - step: END_移植外科クローズ
    type: termination
    termination_ref: "END_移植外科クローズ"
  - step: END_脳神経外科_新規不可
    type: termination
    termination_ref: "END_脳神経外科_新規不可"

