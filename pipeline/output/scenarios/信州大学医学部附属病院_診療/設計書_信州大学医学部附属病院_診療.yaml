# --- smsFlag 分岐設計 ---
sms_flag_routing:
  enabled: true
  routing_keys: ["phonetype", "classification"]
  patterns:
    - condition: "phonetype = 携帯 (4 用件 + CT/MRI すべて)"
      sms_flag: "1"
      notes: "携帯は SMS 送信あり。終話文言で「ショートメールにてご連絡」と明示"
    - condition: "phonetype = その他 (4 用件 + CT/MRI すべて)"
      sms_flag: "-1"
      notes: "固定電話・その他は SMS 送信なし。終話文言で「お電話にてご連絡」とのみ案内"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  # Gen1 元資料に FAQ / RAG 機能の記載なし。大規模院フローが既に長いため pattern 2 (Gen1→Gen3 移管デフォルト) は採用しない。
  # 必要時は確認レポート N-10 にて施設要望確認後に追加。

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "施設挨拶 + 通話時間案内"
    announcement: "お電話ありがとうございます。信州大学医学部付属病院の、予約専用、AI電話です。このお電話は約3分から5分で完了します。"

  - module_name: "用件確認"
    purpose: "用件 4 種 + CT/MRI 検査の聴取 (DTMF + 音声)"
    announcement: "ご用件を、次の4つのうちの、いずれかでお話ください。「診察の予約を取る」「予約を変更する」「予約をキャンセルする」「予約を確認する」、それでは、お話ください。CT検査・MRI検査の予約も承ります。ダイヤルプッシュでも操作できます。"

  - module_name: "診療科聴取_新規"
    purpose: "新規予約用 診療科聴取 (38 leaf dept)"
    announcement: "受診を希望される診療科をおっしゃってください。"

  - module_name: "診療科聴取_変更キャンセル"
    purpose: "予約変更/キャンセル用 診療科聴取"
    announcement: "予約票に記載されている診療科をおっしゃってください。"

  - module_name: "診療科聴取_CTMRI"
    purpose: "CT/MRI 検査用 診療科聴取 (既存通院前提)"
    announcement: "通院されている診療科をおっしゃってください。"

  - module_name: "受診歴"
    purpose: "当院受診初めてかの確認 (新規予約 + 一般診療科時)"
    announcement: "当院のご受診は、初めてですか？はい、初めてです、または、いいえ、受診歴があります、のように、お答えください。ダイヤルプッシュでは、初診は1、再診は2、を押してください。"

  - module_name: "紹介状有無"
    purpose: "紹介状の有無確認 (新規予約 + 一般診療科時)"
    announcement: "信州大学病院宛の紹介状はお持ちですか？はい、持っています、または、いいえ、持っていません、のように、お答えください。ダイヤルプッシュでは、紹介状ありは1、なしは2、を押してください。"

  - module_name: "紹介状なし_頭痛外来_アナウンス"
    purpose: "頭痛外来 + 紹介状なし時の自己負担案内"
    announcement: "かしこまりました。他の医療機関からの紹介状をお持ちでない患者さんにつきましては、通常の診療費とは別に、初診時選定療養費として、7,700円を全額自己負担いただいております。予めご了承ください。"

  - module_name: "紹介元医療機関名聴取"
    purpose: "紹介元医療機関名の自由テキスト聴取"
    announcement: "続いて、紹介元医療機関の、お名前をおっしゃってください。"

  - module_name: "出産予定日聴取"
    purpose: "産科のみ 出産予定日聴取 (datetime + わからない可)"
    announcement: "出産についてお伺いします。出産予定日は何月何日ですか？わからない場合には、わからないとおっしゃってください。"

  - module_name: "妊娠週数聴取"
    purpose: "産科のみ 妊娠週数聴取"
    announcement: "現在、妊娠何週目になりますか？わからない場合には、わからないとおっしゃってください。"

  - module_name: "予約日聴取"
    purpose: "予約変更/キャンセル時の現在予約日聴取"
    announcement: "では次に、予約票に記載されている予約日を「4月1日」のように日付でおっしゃってください。ダイヤルプッシュで月と日にちの4桁の数字を入力することもできます。"

  - module_name: "変更希望日聴取"
    purpose: "予約変更時の希望日聴取 (第 3 希望まで自由発話可)"
    announcement: "続いて、変更希望日をおっしゃってください。診察状況によってはご希望に添えない場合がございますので、あらかじめご了承ください。複数候補がある場合は、第3希望までおっしゃっていただいて結構です。"

  - module_name: "残薬確認"
    purpose: "予約変更時の残薬有無確認 (3 値)"
    announcement: "当院で処方されている方は、希望の予約変更日までのお薬が足りますか？次の3つのいずれかでお応えください。1「はい大丈夫です」、2「いいえ足りません」、3「処方されていません」。"

  - module_name: "変更理由"
    purpose: "予約変更理由の確認 (4 値)"
    announcement: "次に、変更理由を次の4つのうちからお話ください。「1.インフルエンザなどの感染症のため」「2.体調変化のため」「3.他院へ入院中のため」「4.都合がつかないため」、それでは、お話ください。"

  - module_name: "症状確認"
