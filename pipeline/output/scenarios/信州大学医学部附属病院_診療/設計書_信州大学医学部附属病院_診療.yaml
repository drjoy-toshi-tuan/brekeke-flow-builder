# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系 (デフォルト必須) ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外 (年末年始 12/30〜1/5 含む)"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、祝日を除く、月曜日から金曜日の8時半から16時半となっております。年末年始は1月5日まで休業とさせていただいております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達 (代表案内へ)"
    tts_announcement: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。受付時間は、土日祝日を除く、月曜日から金曜日の8時半から17時となっております。電話番号は、0570-00-3010、です。繰り返します。電話番号は、0570-00-3010、です。繰り返します。電話番号は、0570-00-3010、です。それでは、失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系終話: 携帯ルート (4 用件 × 携帯) ---
  - name: "END_新規_携帯"
    condition: "新規予約 / CT / MRI 聴取完了 + 携帯"
    tts_announcement: "当院からの折り返しをもって確定となります。平日3日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_新規_携帯"

  - name: "END_変更_携帯"
    condition: "予約変更聴取完了 + 携帯"
    tts_announcement: "当院からの折り返しをもって確定となります。平日3日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更_携帯"

  - name: "END_キャンセル_携帯"
    condition: "予約キャンセル聴取完了 + 携帯"
    tts_announcement: "当院からの折り返しをもって確定となります。平日3日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
