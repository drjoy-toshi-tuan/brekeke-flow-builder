# --- セクション11: 特記事項・制約 ---
special_notes:
  - "稼働時間: 祝日を除く月〜金 8:30〜16:30、年末年始 (12/30〜1/5) 休診。Dr.JOY 側 acceptance_times カレンダーで曜日・時間設定 + 個別休診日カレンダーを設定する。"
  - "用件確認は Pattern B (OpenAI → ContextMatchRouter) を採用。echo_back=true で 4 用件 + CT/MRI それぞれの復唱を実施。「もしもし」「もう一度」発話は OpenAI プロンプト側でリトライにフォールバック。"
  - "CT/MRI 検査予約は新規予約の特殊レーンとして classification の enum 値に含めて区別する。終話 TTS は「END_新規_*」と共有 (フォールバック先 ロールアップ)。"
  - "診療科 38 leaf を 1 段で扱う方針。「呼吸器」「消化器」「脳神経」「産婦人科」「内分泌」「内科」「外科」等の親グループ単独発話は OpenAI が NO_RESULT として返し、retry で再聴取に流す。"
  - "クローズ診療科 5 種 (血液内科 / 精神科 / 子どものこころ診療部 / 海外渡航者ワクチン外来 / 移植外科) はそれぞれ専用 TTS で別電話番号案内。新規予約のみが対象 (予約変更/キャンセル/確認は通常ルート)。"
  - "脳神経外科は新規予約不可 (END_脳神経外科_新規不可)。ただし CT/MRI 検査時のみ受付可 (CTMRI レーン → ペースメーカー → 個人情報)。"
  - "海外渡航者ワクチン外来は受診歴あり再診 + 平日 13:00〜16:00 のみ専用番号 0263-37-3475 へ Blind Transfer。それ以外はクローズ案内 / 時間外案内。"
  - "頭痛外来は紹介状なしの場合のみ初診時選定療養費 7,700 円の自己負担案内で受付続行。それ以外の診療科で紹介状なしは END_紹介状なし_代表案内 へ。"
  - "産科のみ出産予定日 + 妊娠週数の二段聴取。両方とも「わからない」発話可 (skip フォールバック)。"
  - "予約変更: 診療科 → 予約日 → 変更希望日 → 残薬確認 → 変更理由 (体調変化時のみ症状追加)。"
  - "予約キャンセル: 診療科 → 予約日 → キャンセル理由 (体調変化時のみ症状追加)。変更希望日・残薬確認はスキップ (移管ノート director 判断)。"
  - "予約確認: 確認内容自由テキスト → 個人情報サブフロー連鎖 (診療科聴取はスキップ)。"
  - "終話文言は携帯/その他で 4 用件 × 2 種 = 8 通り。CT/MRI は新規ロールアップ。携帯は SMS 送信あり「ショートメールにてご連絡」、その他は SMS 送信なし「お電話にてご連絡」。"
  - "聴取失敗 (END_聴取失敗) 時の代表案内は予約センター電話番号 0570-00-3010 を 3 回復唱して切断。"
  - "海外渡航者_時間チェック は script_template: business_hours (START_HOUR=13, END_HOUR=16) で実装。Dr.JOY 側 acceptance_times (8:30〜16:30) との二重設定を避ける。"
  - "個人情報サブフロー (氏名 / 生年月日 / 診察券番号 / 電話番号) はサンプル JSON 完コピ。フロー名プレフィックスのみ「信州大学医学部附属病院」に置換。"
  - "Gen1 電話番号区切り.yaml は Gen3 では `<% var %>` 構文で吸収・別ブロック化不要 (北里と同方針)。"
  - "Gen1 「内科」「外科」発話の二段聴取 (内科count再質問 → 内科発話) は Gen3 では OpenAI 正規化層で no_result + retry 経由で再聴取に集約。"
  - "Gen1 「呼吸器/消化器/脳神経/産婦人科/内分泌」のハイラルキ二段聴取は Gen3 では OpenAI 正規化層に集約 (親グループ単独発話 → no_result → retry → 子聴取相当)。"
  - "scaffold_generator が status=3 (転送成功) / status=9 (転送失敗) と END_転送成功 / END_転送失敗 終話チェーンを 海外渡航者_転送 (call_transfer) に対し自動補完する。"

# --- セクション12: 要確認事項 (人間に確認が必要) ---
confirmation_items:
  - item: "office_id (Dr.JOY 施設ID)"
    resolved: false
    notes: "Dr.JOY 管理画面で確認"

  - item: "代表電話番号 0570-00-3010 (聴取失敗時の代表案内)"
    resolved: false
    notes: "Gen1 main.yaml 「失敗」箱から抽出。信州大学医学部附属病院の代表予約電話番号として正しいか施設に最終確認"

  - item: "紹介受診重点医療機関の対象診療科 (頭痛外来のみ紹介状なし可で他は代表案内)"
    resolved: false
    notes: "Gen1 紹介状.yaml の診療科判別から「頭痛外来のみ自己負担案内 + 受付続行」と読み取った。他に紹介状なしで受診可能な診療科がないか施設確認"

  - item: "海外渡航者ワクチン外来の専用転送可能時間帯 (平日 13:00〜16:00)"
    resolved: false
    notes: "Gen1 海外渡航者ワクチン外来クローズ TTS から抽出。年末年始や祝日の例外がある場合は追加対応"

  - item: "脳神経外科 新規予約不可の終話文言 (END_脳神経外科_新規不可)"
    resolved: false
    notes: "Gen1 元資料に明示文言なし → 暫定文言「CT検査・MRI検査の場合は最初におっしゃってください」を含めた。施設指定の専用文言があれば差し替え"

  - item: "12/29 午前のみ受付の有無"
    resolved: false
    notes: "松本協立病院の事例を踏まえ確認。Gen1 元資料には明示なし → 設定なし。要対応なら Dr.JOY カレンダー側で個別設定"

  - item: "DTMF 1〜4 操作案内の冒頭ガイダンスでの明示要否"
    resolved: false
    notes: "Gen1 では DTMF を裏で受付 (冒頭で明示せず)。Gen3 では「ダイヤルプッシュでも操作できます」と明示する案件が多い。本設計書では用件確認 TTS 末尾に「ダイヤルプッシュでも操作できます」と入れた"

  - item: "profile_words 読み仮名の正確性"
    resolved: false
    notes: "主要 38 診療科に対して標準的な読み仮名を仮設定。STT チューニング段階で entity_stt_patch.json (5024 行) の追加候補との整合性を再確認"

  - item: "クローズ診療科 5 種の TTS 文言・転送先電話番号"
    resolved: false
    notes: "Gen1 main.yaml の 5 つの「〜クローズ」箱から正確に転記済み (0263-37-2846 / 0263-37-3381 / 0263-37-3475 / 0263-37-2930)。文言更新がないか施設確認"

  - item: "RAG/FAQ サブフローの要否 (現状 pattern: none)"
    resolved: false
    notes: "Gen1 元資料に FAQ/RAG 記載なし + 大規模院フローが既に長いため none を採用。Gen1→Gen3 移管デフォルトは pattern 2 だが、必要時に追加"

  - item: "Dr.JOY 側 営業時間設定 (祝日除く月〜金 8:30〜16:30 + 年末年始 12/30〜1/5 休診)"
    resolved: false
    notes: "acceptance_times モジュールが参照する曜日・時間 + 個別カレンダー設定。Dr.JOY 管理画面で設定"

  - item: "Dr.JOY 側 SMS 送信文面 (4 用件分: 新規/変更/キャンセル/確認)"
    resolved: false
    notes: "フロー JSON は smsFlag=1 の指示のみ。実 SMS 文面は Dr.JOY 管理画面で設定"

  - item: "Dr.JOY 側 認証設定 (優先①生年月日 / 優先②電話番号 / 優先③診察券番号 等)"
    resolved: false
    notes: "Gen1 元資料に明示なし。Dr.JOY 管理画面で施設要件に合わせて設定"

  - item: "脳神経外科の新規予約振り分け実装方針 (CMR で先回り判定)"
    resolved: false
    notes: "現状: 診療科確定_新規 で 脳神経外科 → END_脳神経外科_新規不可 直行。CT/MRI 用件は 用件_主分岐 で先に CTMRI レーンに分岐するため、脳神経外科 + CT/MRI は END_脳神経外科_新規不可 には到達しない (CTMRI レーン経由でペースメーカー → 個人情報へ進む)。実装後に通話テストで挙動確認推奨"

  - item: "scenario_flow の `海外渡航者_時間チェック` (script_template: business_hours)"
    resolved: false
    notes: "scaffold_generator がカスタム時間範囲 (13:00〜16:00) を business_hours テンプレートでサポートしているか確認。サポート未対応なら date_of_call_classifier への置換を検討"
