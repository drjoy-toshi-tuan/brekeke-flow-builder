# 設計書 -- 浦添総合病院 病診連携
# 生成元: @director エージェント
# 生成日: 2026/04/30
# 元資料: commubo抽出/【010】浦添総合病院/【0010-1浦添総合病院】病診連携1_M_本番/
# 移管元: 第1世代 Commubo シナリオ
# 確認レポート: docs/designs/確認レポート_浦添総合病院_病診連携_2026-04-30.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "浦添総合病院"
  scenario_name: "病診連携"
  group_name: "浦添総合病院"
  flow_name: "浦添総合病院$病診連携"
  target_facility: "浦添総合病院 医療連携支援室『かけはし』"
  office_id: "TODO_要確認"
  phone_number: "098-879-0630"
  business_hours: "祝日除く月〜金 9:00〜17:00 / 土 9:00〜12:00（年末年始 12/30〜1/4 休止）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  # プラットフォーム選択
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# 個人情報聴取（氏名・生年月日）はサブフロー分割型で構成。
# 電話番号・診察券番号は Gen1 commubo に存在しないため移管しない。
flow_structure:
  type: "subflow"
  flows:
    - name: "浦添総合病院$病診連携"
      role: "main"
      description: "冒頭チェーン → 紹介元医療機関名聴取 → 緊急性チェック → 用件確認(4分類) → 用件別分岐(入院転院/当日予約は即代表案内) → (情報提供のみ問い合わせ2段) → 患者氏名/生年月日 → その他問合せ → 用件別終話"
  subflows:
    - name: "浦添総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。reference 個人情報サブフロー.bivr の氏名聴取をコピーして使用"
    - name: "浦添総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。reference 個人情報サブフロー.bivr の生年月日聴取（DOB Re-confirmation 復唱あり版）をコピーして使用"

# --- セクション3: フローの目的 ---
purpose: "浦添総合病院 医療連携支援室『かけはし』向けの AI 電話。地域医療機関からの紹介・予約・FAX到着確認・情報提供（資料請求）依頼を受け付け、紹介元医療機関名・患者氏名・生年月日・問い合わせ内容を聴取して折り返し受付を自動化する。当日予約・緊急・入院転院依頼は AI 受付対象外として代表電話へ案内する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "浦添総合病院$病診連携"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(TTS+完了フラグ_非通知 status=7) → 切断
            └─ 通常   → acceptance_times
                          ├─ 時間外 → END_時間外(TTS+完了フラグ_時間外 status=6) → 切断
                          └─ 受付可 → 冒頭_アナウンス(TTS: "お電話ありがとうございます。浦添総合病院の、地域医療連携、AI電話です。")
                                        → 施設名聴取(hearing, output_format=text, save_to=inquiringFacility)
                                            → 施設名_復唱(announcement: "<% inquiringFacility %>、ご連絡ありがとうございます。")
                                                → 緊急性チェック(hearing, output_format=enum, save_to=emergencyFlag)
                                                    ├─ 緊急 → END_代表案内(status=2)
                                                    └─ other(=通常) → 用件確認(hearing, DTMF+音声, output_format=enum, save_to=classification)
                                                                        ├─ 入院・転院依頼 → END_代表案内_1(status=2, 電話番号3回繰り返し)
                                                                        ├─ 予約依頼 → 当日予約日確認(hearing, output_format=enum, save_to=sameDayReservation)
                                                                        │                ├─ 当日希望 → END_当日予約(status=2, 電話番号3回繰り返し)
                                                                        │                └─ other(=後日) → 氏名聴取(jump)
                                                                        ├─ 情報提供依頼 → 問い合わせ_資料期日(hearing, output_format=text, save_to=inquiryDeadline)
                                                                        │                  → 問い合わせ_患者種別(hearing, output_format=enum, save_to=inquiryPatientType)
                                                                        │                      ├─ 入院中 → 氏名聴取(jump)
                                                                        │                      └─ other(=通院中相当) → 氏名聴取(jump)
                                                                        └─ other(=FAX到着確認) → 氏名聴取(jump)

      ─── 個人情報聴取・その他問合せ合流ルート ───
      氏名聴取(Custom Jump to Flow → 浦添総合病院$氏名聴取)
        → 生年月日聴取(Custom Jump to Flow → 浦添総合病院$生年月日聴取)
            → その他問合せ(hearing, output_format=text, save_to=otherInquiry, retry_failure=skip)
                → 終話分岐_用件(context_match_router, reference_module=OpenAI_用件確認)
                    ├─ 予約依頼 → END_受付完了_予約(status=1)
                    ├─ 情報提供依頼 → END_受付完了_情報提供(status=1)
                    └─ other(=FAX到着確認) → END_受付完了_FAX(status=1)

      ─── 終話パターン一覧 ───
      END_非通知(status=7, smsFlag=-1) → 切断
      END_時間外(status=6, smsFlag=-1) → 切断
      END_聴取失敗(status=2, smsFlag=-1) → 切断（合流: 各 hearing の retry 上限到達 → 代表案内文言）
      END_代表案内(status=2, smsFlag=-1) → 切断（緊急合流。電話番号2回繰り返し）
      END_代表案内_1(status=2, smsFlag=-1) → 切断（入院・転院依頼専用。電話番号3回繰り返し）
      END_当日予約(status=2, smsFlag=-1) → 切断（当日予約・早急対応専用。電話番号3回繰り返し）
      END_受付完了_予約(status=1, smsFlag=-1) → 切断
      END_受付完了_情報提供(status=1, smsFlag=-1) → 切断
      END_受付完了_FAX(status=1, smsFlag=-1) → 切断
    notes: |
      Gen1 commubo の 4 用件分類（予約依頼/情報提供依頼/FAX到着確認/入院・転院依頼）を維持。
      入院・転院依頼は AI 受付対象外（即代表案内、電話番号3回読み）。
      予約依頼の当日希望/早急対応希望者・緊急判定も AI 受付対象外（即代表案内）。
      情報提供依頼のみ問い合わせ2段（資料期日 → 患者種別）を実施。
      FAX到着確認は患者氏名・生年月日 → その他問合せ → 受付完了で終話。
      用件別の最終終話 TTS は context_match_router で classification 値を見て分岐。
      saveCompletionFlag2db の addCurrentDate=Yes は scaffold 自動付与。受付日時を読み上げる（Gen1 の <? $発話用DATE_NOW ?> 相当）。
      全終話で smsFlag=-1（SMS 送信なし）。Gen1 commubo に SMS 送信機能なし。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 施設名聴取

  # --- 紹介元医療機関名 聴取 ---
  - step: 施設名聴取
    type: hearing
    output_format: text
    save_to: inquiringFacility
    next: 施設名_復唱
    retry_failure: end_failure
    notes: "紹介元医療機関名を自由発話で聴取。OpenAI で発話から医療機関名を抽出して save。"

  - step: 施設名_復唱
    type: announcement
    next: 緊急性チェック

  # --- 緊急性チェック ---
  - step: 緊急性チェック
    type: hearing
    output_format: enum
    save_to: emergencyFlag
    conditions:
      - match: "緊急"
        next: END_代表案内
      - match: "other"
        next: 用件確認
    retry_failure: end_failure
    notes: "Yes/No 質問。緊急の場合は AI 受付対象外として代表案内へ即誘導。other は通常相当（用件確認に進む）。"

  # --- 用件確認（4分類: DTMF+音声）---
  - step: 用件確認
    type: hearing
    output_format: enum
    save_to: classification
    conditions:
      - match: "入院・転院依頼"
        next: END_代表案内_1
      - match: "予約依頼"
        next: 当日予約日確認
      - match: "情報提供依頼"
        next: 問い合わせ_資料期日
      - match: "other"
        next: 氏名聴取
    retry_failure: end_failure
    notes: "DTMF 1=予約依頼, 2=FAX到着確認, 3=情報提供依頼。発話で「入院」「転院」を含むものは入院・転院依頼。other は FAX到着確認 相当。"

  # --- 当日予約日確認（予約依頼ルート専用）---
  - step: 当日予約日確認
    type: hearing
    output_format: enum
    save_to: sameDayReservation
    conditions:
      - match: "当日希望"
        next: END_当日予約
      - match: "other"
        next: 氏名聴取
    retry_failure: end_failure
    notes: "Yes/No 質問。「当日予約のご希望、または早急な対応が必要ですか？」当日希望なら AI 受付対象外として代表案内へ即誘導。other は後日希望相当（通常受付フローへ進む）。"

  # --- 問い合わせ2段（情報提供依頼ルート専用）---
  - step: 問い合わせ_資料期日
    type: hearing
    output_format: text
    save_to: inquiryDeadline
    next: 問い合わせ_患者種別
    retry_failure: end_failure
    notes: "「資料はいつまでに必要かお答えください。」自由発話で期日を聴取。OpenAI で日付・期日表現を正規化。"

  - step: 問い合わせ_患者種別
    type: hearing
    output_format: enum
    save_to: inquiryPatientType
    conditions:
      - match: "入院中"
        next: 氏名聴取
      - match: "other"
        next: 氏名聴取
    retry_failure: end_failure
    notes: "「入院中と通院中、どちらの患者様になりますか？」分岐先は同じ（氏名聴取に合流）だが Dr.JOY 表示用に分類値を保存。other は通院中相当。"

  # --- 個人情報サブフロー ---
  - step: 氏名聴取
    type: subflow
    flowname: "浦添総合病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "浦添総合病院$生年月日聴取"
    next: その他問合せ

  # --- その他問合せ（最終聴取）---
  - step: その他問合せ
    type: hearing
    output_format: text
    save_to: otherInquiry
    next: 終話分岐_用件
    retry_failure: skip
    notes: "「職員へお伝えになりたいことがありましたらお話ください。ない場合には特にない、などとお話ください。」最後の聴取項目のため retry_failure=skip で終話分岐へ進める。"

  # --- 用件別終話分岐 ---
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約依頼"
        next: END_受付完了_予約
      - match: "情報提供依頼"
        next: END_受付完了_情報提供
      - match: "other"
        next: END_受付完了_FAX
    notes: "classification 値で分岐。other は FAX到着確認（合流済み正常ルート）。入院・転院依頼はここに到達しない（用件確認直後に END_代表案内_1 へ遷移済み）。"

  # --- 終話ブロック ---
  - step: END_受付完了_予約
    type: termination
    termination_ref: "END_受付完了_予約"

  - step: END_受付完了_情報提供
    type: termination
    termination_ref: "END_受付完了_情報提供"

  - step: END_受付完了_FAX
    type: termination
    termination_ref: "END_受付完了_FAX"

  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

  - step: END_代表案内_1
    type: termination
    termination_ref: "END_代表案内_1"

  - step: END_当日予約
    type: termination
    termination_ref: "END_当日予約"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約依頼"
      - id: "2"
        order: "2"
        value: "FAX到着確認"
      - id: "3"
        order: "3"
        value: "情報提供依頼"
      - id: "4"
        order: "4"
        value: "入院・転院依頼"
    item_default: true
    editable: true
    deletable: false
    notes: "Gen1 commubo の用件4分類。DTMF 1/2/3 は announce 対象、入院・転院依頼は voice 認識のみ。"

  - context_name: "patientName"
    context_name_jp: "患者氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名聴取サブフローで保存"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "生年月日聴取サブフローで保存（DOB Re-confirmation 復唱あり）"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "6"
        order: "6"
        value: "時間外"
      - id: "7"
        order: "7"
        value: "非通知"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理(受付完了で Dr.JOY 側が処理) / 2=代表案内（NG/緊急/入院転院/当日予約） / 6=時間外 / 7=非通知"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値。displayType/itemDefault/deletable は変更不可"

  # --- 施設固有フィールド ---
  - context_name: "inquiringFacility"
    context_name_jp: "紹介元医療機関名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "Gen1 commubo の施設名サブフローで聴取していた紹介元医療機関名"

  - context_name: "emergencyFlag"
    context_name_jp: "緊急性"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "緊急"
      - id: "2"
        order: "2"
        value: "通常"
    item_default: false
    editable: true
    deletable: false
    notes: "緊急性チェック hearing の出力。緊急なら END_代表案内 に即誘導"

  - context_name: "sameDayReservation"
    context_name_jp: "当日予約希望"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "当日希望"
      - id: "2"
        order: "2"
        value: "後日"
    item_default: false
    editable: true
    deletable: false
    notes: "予約依頼ルートのみ使用。当日希望なら END_当日予約 に即誘導"

  - context_name: "inquiryDeadline"
    context_name_jp: "資料必要期日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "情報提供依頼ルートのみ使用。「資料はいつまでに必要か」の自由発話を保存"

  - context_name: "inquiryPatientType"
    context_name_jp: "問合せ患者種別"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "入院中"
      - id: "2"
        order: "2"
        value: "通院中"
    item_default: false
    editable: true
    deletable: false
    notes: "情報提供依頼ルートのみ使用。「入院中と通院中、どちらの患者様か」"

  - context_name: "otherInquiry"
    context_name_jp: "その他問合せ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "全用件共通。最後の自由発話聴取で職員への伝言を保存"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "施設名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inquiringFacility"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "紹介元医療機関名を自由発話で聴取。OpenAI で医療機関名を抽出・正規化。"

  - order: 2
    name: "緊急性チェック"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "emergencyFlag"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "緊急"
      - "通常"
    notes: "「本件は緊急のご連絡でしょうか？」緊急発話のみを 緊急 へ振り分ける Yes/No タイプ。"

  - order: 3
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約依頼"
      - "情報提供依頼"
      - "FAX到着確認"
      - "入院・転院依頼"
    notes: "DTMF 1=予約依頼, 2=FAX到着確認, 3=情報提供依頼（announce 対象）。入院・転院依頼は voice 認識のみ（announce 非対象だが Gen1 entity に残置）。"

  - order: 4
    name: "当日予約日確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "sameDayReservation"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "当日希望"
      - "後日"
    notes: "予約依頼ルート専用。Yes/No タイプ。当日希望のみ END_当日予約 へ。"

  - order: 5
    name: "問い合わせ_資料期日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
