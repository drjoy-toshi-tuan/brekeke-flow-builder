    tts_announcement: "恐れ入りますが、当日、または早急な対応をご希望の場合は、医療連携支援室『かけはし』へおかけ直しください。電話番号が分かる方は、このままお電話をお切りください。わからない方はご案内しますので、メモをご準備ください。電話番号は、0、9、8、の、8、7、9、の、0、6、3、0、です。繰り返します。電話番号は、0、9、8、の、8、7、9、の、0、6、3、0、です。繰り返します。電話番号は、0、9、8、の、8、7、9、の、0、6、3、0、です。お電話ありがとうございました。それでは失礼いたします。"
