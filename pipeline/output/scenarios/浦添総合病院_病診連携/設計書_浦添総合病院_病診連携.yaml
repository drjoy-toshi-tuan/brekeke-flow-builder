    condition: "緊急性チェック=緊急"
    tts_announcement: "恐れ入りますが、医療連携支援室『かけはし』へおかけ直しください。電話番号が分かる方は、このままお電話をお切りください。わからない方はご案内しますので、メモをご準備ください。代表電話は、0、9、8、の、8、7、9、の、0、6、3、0、です。繰り返します。番号は0、9、8、の、8、7、9、の、0、6、3、0、です。お電話ありがとうございました。"
