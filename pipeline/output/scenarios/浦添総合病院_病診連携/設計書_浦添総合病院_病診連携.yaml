# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 commubo シナリオからの第3世代マイグレーション。元 main.yaml の 4 用件分類（予約依頼/情報提供依頼/FAX到着確認/入院・転院依頼）を維持。"
  - "入院・転院依頼は AI 受付対象外として用件確認直後に END_代表案内_1（電話番号3回繰り返し）へ即誘導する。"
  - "予約依頼の当日希望・早急対応希望者は AI 受付対象外として END_当日予約（電話番号3回繰り返し）へ即誘導する。緊急性チェック=緊急の場合も AI 受付対象外として END_代表案内（電話番号2回繰り返し）へ即誘導する。"
  - "情報提供依頼ルートのみ問い合わせ2段（資料期日 → 患者種別）を実施。順序は Gen1 commubo の `問い合わせ② → 問い合わせ①` を踏襲（期日 → 患者種別）。"
  - "受付完了 TTS は施設名復唱を含むため `<% inquiringFacility %>` プレースホルダーを使用。Brekeke + Google TTS で context 値が置換される。"
  - "saveCompletionFlag2db の addCurrentDate=Yes は scaffold が自動付与する。受付完了時に受付日時が自動で読み上げられる（Gen1 の `<? $発話用DATE_NOW ?>` 相当）。"
  - "全終話で smsFlag=-1（SMS 送信なし）。Gen1 commubo に SMS 送信機能なし。Dr.JOY 側で SMS 通知が必要になった場合は smsFlag を別途設定。"
  - "営業時間: 祝日除く月〜金 9:00〜17:00 / 土 9:00〜12:00（Gen1 の 5/1 以降版を採用）。日曜・祝日・年末年始（12/30〜1/4）は時間外。具体的なスケジュールは Dr.JOY 側で設定する。"
  - "代表電話番号: 098-879-0630（医療連携支援室『かけはし』）。各案内 TTS 内で「0、9、8、の、8、7、9、の、0、6、3、0」と読点区切りで読み上げる Gen1 流用の文言を維持（読点と数字の組み合わせは Brekeke + Google TTS で電話番号として正しく発話される実績あり）。"
  - "Gen1 にあった「入電情報による紹介元医療機関名スキップ機能」（API_DRJOY 入電情報あり時に施設名サブフローをスキップ）は Gen3 では未実装。常に紹介元医療機関名を聴取する。Dr.JOY 側で入電情報連携が要件になった時点で別途追加する。"
  - "Gen1 にあった `テスト用分岐 / 藤田さん用 / 下僕用` テスト箱は移管対象外。"
  - "Gen1 にあった現在時刻判定ロジック（15時前等、`現在の時間取得 / 現在の時間判断` 箱）は acceptance_times に集約済みのため Gen3 では使用しない。"
  - "Gen1 にあった `終話案内 / 終話案内 ～5/1 / 終話案内 5/1～` の 5/1 受付時間切替分岐は acceptance_times 側責任。最新版である 5/1 以降版（月-金 9-17、土 9-12）を採用。"
  - "Gen1 entity 'もしもし' の特殊応答（「はい、聞こえております」等）は Gen3 では実装しない。標準のリトライフローで対応する。"
  - "Gen1 のエンティティ正規化辞書（予約以外/予約変更/予約確認/予約キャンセル/新規予約/定期受診 等の派生）は OpenAI_用件確認 のプロンプトで 4 分類（予約依頼/情報提供依頼/FAX到着確認/入院・転院依頼）に集約させる。"

