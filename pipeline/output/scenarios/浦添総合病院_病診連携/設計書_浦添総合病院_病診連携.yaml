# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。浦添総合病院の、地域医療連携、AI電話です。"
    input_method: "voice_only"
    save_to: ""
    next_step: "施設名聴取"
    retry_failure: "skip"

  - step_name: "施設名聴取"
    tts_announcement: "紹介元の医療機関名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "{医療機関名を含む発話（例: 〇〇クリニック、〇〇医院、〇〇病院、〇〇診療所）}"
          output: "{抽出した医療機関名テキスト}"
      no_result_condition: "発話が完全な無言、または医療機関名と判定できない場合"
    save_to: "inquiringFacility"
    next_step: "施設名_復唱"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "施設名_復唱"
    tts_announcement: "<% inquiringFacility %>、ご連絡ありがとうございます。"
    input_method: "voice_only"
    save_to: ""
    next_step: "緊急性チェック"
    retry_failure: "skip"

  - step_name: "緊急性チェック"
    tts_announcement: "本件は緊急のご連絡でしょうか？「緊急です」または「いいえ、違います」とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "緊急"
        - "通常"
      mapping:
        - input: "「緊急」「急ぎ」「はい」「そうです」「あってます」「大丈夫」を含む発話"
          output: "緊急"
        - input: "「いいえ」「違います」「ちがう」「そうじゃない」「ない」を含む発話"
          output: "通常"
      no_result_condition: "上記いずれにも該当しない / 無音"
    save_to: "emergencyFlag"
    next_step: "用件確認"
    retry_failure: "end_failure"

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次のいずれかの番号、または内容をお話いただくか、ダイヤルプッシュでお答えください。1「予約依頼」2「ファックス到着確認」3「情報提供依頼」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約依頼"
        - "情報提供依頼"
        - "FAX到着確認"
        - "入院・転院依頼"
      mapping:
        - input: "DTMF 1 / 「予約」「予約依頼」「変更」「確認」「キャンセル」「新規予約」「定期受診」「初診」「紹介状」「診察の予約」「診療予約」「取りたい」を含む発話"
          output: "予約依頼"
        - input: "DTMF 2 / 「FAX」「ファックス」「到着」「到着確認」「サン」「3」「三」を含む発話"
          output: "FAX到着確認"
        - input: "DTMF 3 / 「情報提供依頼」「資料」「資料請求」「書類」「情報」「診療情報提供依頼」「請求」「請求書」「医療請求」「2」「二」を含む発話"
          output: "情報提供依頼"
        - input: "「入院」「転院」「入院依頼」「転院依頼」「入院・転院」「ヨン」「4」「四」を含む発話"
          output: "入院・転院依頼"
      no_result_condition: "上記いずれにも該当しない / 「予約以外」（お見舞い・処方箋・症状・書類等）/ 無音"
    save_to: "classification"
    next_step: "用件確認_分岐"
    retry_failure: "end_failure"

  - step_name: "当日予約日確認"
    tts_announcement: "当日予約のご希望、または早急な対応が必要ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "当日希望"
        - "後日"
      mapping:
        - input: "「はい」「そうです」「お願いします」「あります」「急ぎ」「当日」「本日」「今日」を含む発話"
          output: "当日希望"
        - input: "「いいえ」「違います」「ない」「ちがう」「後日」「あとで」「翌日以降」を含む発話"
          output: "後日"
      no_result_condition: "上記いずれにも該当しない / 無音"
    save_to: "sameDayReservation"
    next_step: "当日予約_分岐"
    retry_failure: "end_failure"

  - step_name: "問い合わせ_資料期日"
    tts_announcement: "資料はいつまでに必要かお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「明日まで」「今週中」「○月○日まで」「来週中」「今月中」等の期日表現"
          output: "{抽出した期日表現テキスト}"
      no_result_condition: "発話なし / 期日と判定できない場合"
    save_to: "inquiryDeadline"
    next_step: "問い合わせ_患者種別"
    retry_failure: "end_failure"

  - step_name: "問い合わせ_患者種別"
    tts_announcement: "入院中と通院中、どちらの患者様になりますか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "入院中"
        - "通院中"
      mapping:
        - input: "「入院」「入院中」を含む発話"
          output: "入院中"
        - input: "「通院」「通院中」「外来」を含む発話"
          output: "通院中"
      no_result_condition: "上記いずれにも該当しない / 無音"
    save_to: "inquiryPatientType"
    next_step: "氏名聴取"
    retry_failure: "end_failure"

  - step_name: "その他問合せ"
    tts_announcement: "職員へお伝えになりたいことがありましたらお話ください。ない場合には特にない、などとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "任意の伝言発話"
          output: "{発話テキストをそのまま保存}"
        - input: "「特にない」「ない」「ありません」「大丈夫です」を含む発話"
          output: "特になし"
      no_result_condition: "発話なし"
    save_to: "otherInquiry"
    next_step: "終話分岐_用件"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（祝日除く月〜金 9:00〜17:00 / 土 9:00〜12:00 以外、年末年始 12/30〜1/4 含む）"
    tts_announcement: "申し訳ございません。ただいまの時間は受付時間外となっております。受付時間は、日曜祝日と年末年始を除く、月曜日から金曜日の9時から17時、土曜日は9時から12時です。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（施設名 / 緊急性 / 用件 / 当日予約 / 問い合わせ系の各 hearing で end_failure）"
    tts_announcement: "恐れ入りますが、医療連携支援室『かけはし』へおかけ直しください。電話番号が分かる方は、このままお電話をお切りください。わからない方はご案内しますので、メモをご準備ください。代表電話は、0、9、8、の、8、7、9、の、0、6、3、0、です。繰り返します。番号は0、9、8、の、8、7、9、の、0、6、3、0、です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 案内系（status=2）---
