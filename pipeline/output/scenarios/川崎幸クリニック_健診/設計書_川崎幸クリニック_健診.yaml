    save_to: "option"
    next_step: "共通_人数受診時期"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "その他_希望検査"
    tts_announcement: "今回希望される検査内容をお伝えください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "desiredInspection"
    next_step: "最後の問い合わせ"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "共通_人数受診時期"
    tts_announcement: "それでは、受診を希望されている日や、人数をお話しください。決まっていない場合は、決まっていないとお話しください。"
