  - context_name: "changeItem"
    context_name_jp: "変更項目"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "日程変更 or 変更内容（自由文で記録、構造分岐しない）"

  - context_name: "details2"
    context_name_jp: "受診内容（キャンセル）"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "キャンセルルートの受診内容"

  - context_name: "reason"
    context_name_jp: "問い合わせ内容"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "問い合わせルートの確認内容。また氏名が複数名発話された場合の2人目以降もここに所定形式で格納"

  - context_name: "question"
    context_name_jp: "最後の問い合わせ"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "終話直前の追加問い合わせ内容（全ルート共通）"

  - context_name: "phonetype"
    context_name_jp: "電話種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "携帯 / その他 の2値。電話番号聴取サブフロー内で先頭3桁（090/080/070/060/050）判定で設定。終話分岐に使用"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "聴取失敗"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: true
    notes: "1=正常終話 2=代表案内 3=聴取失敗 6=時間外（Gen2 の status=0 途中切断は Gen3 では使用禁止）"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "着信日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "問い合わせ"
    notes: "DTMF 1=予約, 2=変更, 3=キャンセル, 4=問い合わせ。音声キーワードも併用判定。分類不可時は「問い合わせ」を返す。リトライ2回（例外）。リトライ超過は END_聴取失敗"

  - order: 2
    name: "健診の種類"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 1
    echo_back: false
    save_to: "menu"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "川崎市"
      - "健保組合"
      - "その他"
    notes: "DTMF 1=川崎市, 2=健保組合, 3=その他。分類不可時は「その他」を返す"

  - order: 3
    name: "川崎市_受診内容1"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "details1"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "特定健診/市のがん検診/オプションを自由文で聴取"

  - order: 4
    name: "健保組合_健保名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "companyname"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "健保組合名/仲介会社名を聴取。東京薬業→東京薬業健康保険組合、I9Bグループ→IQVIAグループ 等の正規化"

  - order: 5
    name: "健保組合_受診希望コース"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "course"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "コース・内容の自由文聴取（Aコース/ABコース/人間ドック/生活習慣病予防健診/定期健康診断/雇用時健診/特定健診 のキーワード認識）"

  - order: 6
    name: "健保組合_オプション"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "option"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "複数オプションは読点「、」で連結。「ない」「なし」「主」等は空文字扱い。追加オプションリスト（腹部超音波、胸部CT、肺ドック等）とワクチンリスト、がん健診種類リストのキーワード対応あり"

  - order: 7
    name: "その他_希望検査"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "desiredInspection"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "人間ドック/Aコース/ABコース等の判定は自由文に格納（enum化しない）"

  - order: 8
    name: "共通_人数受診時期"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "detail"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "「決まっていない」も可。自由文"

  - order: 9
    name: "変更_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "yyyy-MM-dd 00:00:00 に正規化。月日のみの発話は着信年を補完、10-12月着信で1-9月は翌年扱い。「わからない」は空で次へ"

  - order: 10
    name: "変更_変更項目"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "changeItem"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "日時変更/変更内容の区別は自由文に格納（構造分岐しない）"

  - order: 11
    name: "キャンセル_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "同上。キャンセル対象の予約日"

  - order: 12
    name: "キャンセル_受診内容2"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "details2"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "キャンセルの受診内容"

  - order: 13
    name: "問い合わせ_確認内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "問い合わせ内容の自由文。RAGで回答できない場合のフロー外質問もここ"

  - order: 14
    name: "最後の問い合わせ"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "question"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "全ルート共通。無ければ空文字で終話へ進む"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件"
    tts_announcement: "ご用件を、次の4つのうちの、いずれかでお話しください。予約を取る場合は1、予約を変更する場合は2、予約をキャンセルする場合は3、その他お問い合わせは4、それでは、お話しください。<dtmf digit=\"1\" />"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["予約", "変更", "キャンセル", "問い合わせ"]
      mapping:
        - input: "DTMF 1 / 予約 / 薬 / お薬 / 集約 / 通訳 / 500"
          output: "予約"
        - input: "DTMF 2 / 変更 / 取り直したい / 取り直す / 別の / 変えたい / 変える / 変えて"
          output: "変更"
        - input: "DTMF 3 / キャンセル / やめる / 取り消し / 取消 / やめたい / シャント0 / キャンプ0"
          output: "キャンセル"
        - input: "DTMF 4 / 問い合わせ / 上記に当てはまらない回答（分類不可フォールバック）"
          output: "問い合わせ"
      no_result_condition: "2回リトライしても無音・聞き取り不能の場合"
    save_to: "classification"
    next_step: "（分岐: conditions 参照）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "健診の種類"
    tts_announcement: "今回受診を希望される健診の種類を、以下の3つのうちいずれかでお話しください。川崎市の健診の方は1、健康保険組合の健診の方は2、その他の健診の方は3。それでは、お話しください。<dtmf digit=\"1\" />"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["川崎市", "健保組合", "その他"]
      mapping:
        - input: "DTMF 1 / 川崎市 / 市"
          output: "川崎市"
        - input: "DTMF 2 / 健保組合 / 健保 / 健康保険組合 / 変更保険→健康保険"
          output: "健保組合"
        - input: "DTMF 3 / その他 / 人間ドック / Aコース / ABコース / 協会けんぽ 等（3択に該当しない場合のフォールバック）"
          output: "その他"
      no_result_condition: "リトライ後も不明"
    save_to: "menu"
    next_step: "（分岐: conditions 参照）"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "川崎市_受診内容1"
    tts_announcement: "特定健診か、市のがん検診か、また、オプションがある場合は項目名をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "details1"
    next_step: "共通_人数受診時期"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "健保組合_健保名"
    tts_announcement: "健保組合名、または仲介会社名をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "東京薬業"
          output: "東京薬業健康保険組合"
        - input: "I9Bグループ"
          output: "IQVIAグループ"
      no_result_condition: ""
    save_to: "companyname"
    next_step: "健保組合_受診希望コース"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "健保組合_受診希望コース"
    tts_announcement: "それでは、受診を希望されるコースや内容をお話ください"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "ドック / 一日ドック / 一日人間ドック / 日帰り人間ドック / 日帰りドック / 通院ドック / 人間ロック / ロック / 人間独"
          output: "人間ドック"
        - input: "生活習慣病健診 / 生活予防検査 / 成人病検診"
