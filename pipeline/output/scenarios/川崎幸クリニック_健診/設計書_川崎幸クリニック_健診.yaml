# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【smsFlag 3値】: 通常終話=1 / キャンセル終話=2 / 異常終話=-1。Gen2 の 0/1/2 のうち、Gen3 では 0（SMS送信ステータス未確定）は -1（送信なし）に置換。"
  - "【status 値マッピング】: Gen3 では status=0（Gen2 の 冒頭切断・途中切断）は使用禁止。Gen2 の END_エラー切断 (status=0) は Gen3 では status=3（聴取失敗）。Gen2 の END_代表案内 (status=2) はそのまま status=2。"
  - "【電話番号聴取】: 桁数チェック最大3回（他項目は1回）。3回失敗時は サブフロー内で END_代表案内 TTS を再生後、切断。Custom Jump to Flow は親フローの END モジュールに接続できないため、サブフロー内で完結させる必要あり（confirmation_items C-1）。"
  - "【氏名聴取】: 患者本人のみ patientName に格納。複数名発話時は2人目以降を reason に所定形式（カタカナ氏名 + yyyy-MM-dd、1人1行）で格納。担当者名・会社名は patientName 対象外（健保組合ルートで companyname に別途聴取）。"
  - "【生年月日】: 復唱1回のみ（「yyyy年m月d日でよろしいですか？」）。訂正入力時は訂正内容に対して1回だけ再復唱。和暦対応（社長は→昭和、修正→平成 は生年月日聴取時のみ有効）。"
  - "【日付正規化ルール】: 10-12月着信で1-9月の日付発話は翌年扱い（プロンプターで必須記載）。予約日と予約希望日は別項目（reservationDate=yyyy-MM-dd 00:00:00、Preferred_date=自由文）。"
  - "【数字誤認識の救済】: 4/５の認識: for/C → 4, 号/go → 5（電話番号・診察券・生年月日のプロンプトに注記必須）。"
  - "【Yes/No キーワード】: 肯定=そうです/はい/あります/する/そうそう/あっています/合っています/いい、否定=違います/ちゃうちゃう/いえいえ/いや/いいえ/じゃない。**復唱確認時のみ適用**。"
  - "【分類不可時フォールバック】: 用件 → 問い合わせ、健診の種類 → その他。OpenAI プロンプトで明示。"
  - "【キャンセルは単一終話】: 電話種別を問わず END_キャンセル（smsFlag=2）。他ルートと異なり phonetype 分岐なし。"
  - "【川崎市ルートの終話文は長文】: 特定健診受診券の自己負担金額確認文言が固定では「無料/無料と＊のどちらか」、携帯では「無料の横にアスタリスク印字の有無」と内容が異なる。原文ママ保持（要約禁止）。"
  - "【SSML タグ使用例外】: 電話番号復唱には <speak type=\"telephone\" breakc=\"300ms\">…</speak>、生年月日再質問と用件・健診の種類ブロックには <dtmf/> <dtmf digit=\"1\"/> <dtmf digit=\"8\"/> タグを原文どおり保持（Gen3 SSML 禁止ルールの例外。director 判断）。"
  - "【再質問統一テンプレート】: 「申し訳ありません。うまく聞き取れませんでした。ゆっくり話すとAIがうまく聞き取れません。普通のスピードではっきりとお話しください。再度伺います。」+ 元の固定質問文を厳密に再提示。"
  - "【絶対的な聞き直し禁止】: 氏名・追加オプション・コース名・希望日・フリーワードは復唱しない。聞き直し禁止。例外は 生年月日（DOB復唱）と電話番号（桁数チェック）のみ。"
  - "【FAQ リストキーワード対応】: 検針/返信/天候診断→健診、人間ロック/ドック/ロック→人間ドック、集約→予約、やめる/取り消し→キャンセル、等（OpenAI プロンプトに必須記載）。"

