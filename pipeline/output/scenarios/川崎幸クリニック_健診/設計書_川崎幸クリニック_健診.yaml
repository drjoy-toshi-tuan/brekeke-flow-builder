    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "変更_予約日"
    tts_announcement: "それでは、現在の予約日を「4月1日」のように日付でお話ください。わからない場合は、分からないとお話しください。"
    input_method: "voice_only"
    openai_rules:
