# --- セクション8: 終話パターン ---
termination_patterns:
  # ===== 異常系（デフォルト必須）=====
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "用件リトライ上限到達（2回）"
    tts_announcement: "申し訳ございません。こちらのお電話で回答ができませんので別途ご連絡させていただきます。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # ===== 施設固有の代表案内 =====
  # NOTE: END_代表案内 は電話番号聴取サブフロー内で完結する終話のため、
  # termination_patterns からは意図的に除外（Gen3 Custom Jump to Flow の制約により
  # サブフロー内リトライ失敗は親フローへシグナルできない）。
  # サブフロー内の手動追加タスクは confirmation_items C-1 を参照。
  # TTS 文言は tts_modules セクションの END_代表案内 エントリで保持。

  # ===== 正常系 =====
  - name: "END_キャンセル"
    condition: "classification=キャンセル（電話種別問わず単一）"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。必要がある場合のみ、担当者よりご連絡させていただきます。お電話ありがとうございました。 それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_予約_川崎市_固定"
    condition: "classification=予約 かつ menu=川崎市 かつ phonetype=その他"
    tts_announcement: "予約の申し込みを受付いたしました。日曜、祝日を除く、翌営業日以内に、担当者から折り返し電話にてご連絡いたします。担当者からのご連絡後に確定となりますのでしばらくお待ちくださいませ。特定健診受診の方には、後ほど「受診券に記載の、自己負担金額」について確認させていただきます。受診券に印字されている、自己負担金額の欄に「無料」、と記載があるか、または「無料と＊（アスタリスクマーク）」のどちらが記載されているかをご確認の上お待ちください。お電話ありがとうございました。 それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約_川崎市_固定"

  - name: "END_予約_川崎市_携帯"
    condition: "classification=予約 かつ menu=川崎市 かつ phonetype=携帯"
    tts_announcement: "予約の申し込みを受付いたしました。日曜、祝日を除く、翌営業日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。担当者からのご連絡後に確定となりますのでしばらくお待ちくださいませ。特定健診受診の方には、後ほど「受診券に記載の、自己負担金額」について確認させていただきます。受診券に印字されている自己負担金額の欄に「無料」の文字の横にアスタリスクマークが印字されているかどうかをご確認の上お待ちください。お電話ありがとうございました。 それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約_川崎市_携帯"

