# 設計書 — 川崎幸クリニック 健診
# 生成元: @director エージェント
# 生成日: 2026-04-22
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/【健診1】：川崎幸クリニック（リナ作成）.md
# 移管ノート: docs/migration/gen2_川崎幸クリニック_健診.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "川崎幸クリニック"
  group_name: "川崎幸クリニック"
  flow_name: "川崎幸クリニック$健診"
  target_facility: "川崎幸クリニック 健診センター"
  office_id: "TODO_要確認"
  phone_number: "044-541-5210"
  business_hours: "祝日を除く 月〜金 8:30-17:00 / 土 8:30-12:30（日祝休）※Dr.JOY側で設定"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "川崎幸クリニック$健診"
      role: "main"
      description: "健診予約専用ダイヤル。用件（予約/変更/キャンセル/問い合わせ）を聴取し、予約時は健診の種類（川崎市/健保組合/その他）で分岐。全ルート共通で最後の問い合わせを経て、用件×健診種類×電話種別で終話TTSを出し分け。"
  subflows:
    - name: "川崎幸クリニック$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "患者本人の氏名をフルカタカナで聴取。複数名発話時は1人目のみ patientName、2人目以降は reason へ所定形式で格納（プロンプターが処理）"
    - name: "川崎幸クリニック$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "復唱1回（「yyyy年m月d日でよろしいですか？」）。訂正入力時は再復唱1回のみ許可。和暦も受付（社長は→昭和、修正→平成）"
    - name: "川崎幸クリニック$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "self_contained"
      notes: "桁数チェック最大3回リトライ（他項目は1回）。3回失敗時は サブフロー内で END_代表案内 TTS→切断まで完結する必要あり（確認項目 C-1 参照）。phonetype context に 携帯/その他 を格納し、メインフローの終話分岐で参照"
    - name: "川崎幸クリニック$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "「分からない」発話を許容。未入力のまま次へ進める（サブフロー側で スキップ分岐が必要）"

# --- セクション3: フローの目的 ---
purpose: |
  川崎幸クリニックの健診予約専用ダイヤルを自動応答化する。
  受診者名・生年月日・連絡先電話番号・診察券番号を共通ヒアリングで取得したあと、
  用件（予約/変更/キャンセル/その他お問い合わせ）で分岐し、予約ルートでは健診の種類
  （川崎市/健保組合/その他）で更にネスト分岐して必要項目を聴取。全ルート共通で最後の
  問い合わせを聴いたのちに、用件×健診種類×電話種別で終話文言を出し分けて終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "川崎幸クリニック$健診"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外
                          └─ 受付可 → 冒頭_アナウンス(TTS)
                                        → 氏名聴取(subflow)
                                        → 生年月日聴取(subflow)
                                        → 電話番号聴取(subflow: self_contained — 3回失敗は代表案内で完結)
                                        → 診察券番号聴取(subflow)
                                        → 用件(hearing: DTMF 4分岐)
                                            ├─ 1/予約 → 健診の種類(hearing: DTMF 3分岐)
                                            │             ├─ 1/川崎市 → 川崎市_受診内容1 → 共通_人数受診時期 → 最後の問い合わせ
                                            │             ├─ 2/健保組合 → 健保組合_健保名 → 健保組合_受診希望コース → 健保組合_オプション → 共通_人数受診時期 → 最後の問い合わせ
                                            │             └─ 3/その他 → その他_希望検査 → 最後の問い合わせ
                                            ├─ 2/変更 → 変更_予約日 → 変更_変更項目 → 最後の問い合わせ
                                            ├─ 3/キャンセル → キャンセル_予約日 → キャンセル_受診内容2 → 最後の問い合わせ
                                            └─ 4/問い合わせ → 問い合わせ_確認内容 → 最後の問い合わせ
                                        → 終話分岐_用件 [CMR on classification]
                                            ├─ キャンセル → END_キャンセル
                                            ├─ 予約 → 終話分岐_健診種類 [CMR on menu]
                                            │           ├─ 川崎市 → 終話分岐_川崎市_電話 [CMR on phonetype]
                                            │           │            ├─ 携帯 → END_予約_川崎市_携帯
                                            │           │            └─ その他 → END_予約_川崎市_固定
                                            │           ├─ 健保組合 → 終話分岐_健保_電話 [CMR on phonetype]
                                            │           │             ├─ 携帯 → END_予約_健保その他_携帯
                                            │           │             └─ その他 → END_予約_健保その他_固定
                                            │           └─ その他 → 終話分岐_予約その他_電話 [CMR on phonetype]
                                            │                        ├─ 携帯 → END_予約_健保その他_携帯
                                            │                        └─ その他 → END_予約_健保その他_固定
                                            ├─ 変更 → 終話分岐_変更_電話 [CMR on phonetype]
                                            │          ├─ 携帯 → END_変更_携帯
                                            │          └─ その他 → END_変更_固定
                                            └─ 問い合わせ → 終話分岐_問合_電話 [CMR on phonetype]
                                                           ├─ 携帯 → END_問い合わせ_携帯
                                                           └─ その他 → END_問い合わせ_固定
    notes: |
      - 用件リトライ超過（2回）は END_聴取失敗（Gen2 の END_エラー切断相当）へ
      - 電話番号3回失敗は 電話番号聴取サブフロー内で END_代表案内 に接続（親フローへは返さない）
      - キャンセルは電話種別を問わず単一終話（smsFlag=2 のみ）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ===== 冒頭ブロック =====
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 氏名聴取

  # ===== 共通ヒアリング（サブフロー群） =====
  - step: 氏名聴取
    type: subflow
    flowname: "川崎幸クリニック$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "川崎幸クリニック$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "川崎幸クリニック$電話番号聴取"
    next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "川崎幸クリニック$診察券番号聴取"
    next: 用件

  # ===== 用件聴取（4分岐） =====
  - step: 用件
    type: hearing
    output_format: enum
    conditions:
      - match: "予約"
        next: 健診の種類
      - match: "変更"
        next: 変更_予約日
      - match: "キャンセル"
        next: キャンセル_予約日
      - match: "問い合わせ"
        next: 問い合わせ_確認内容

  # ===== 予約ルート =====
  - step: 健診の種類
    type: hearing
    output_format: enum
    conditions:
      - match: "川崎市"
        next: 川崎市_受診内容1
      - match: "健保組合"
        next: 健保組合_健保名
      - match: "その他"
        next: その他_希望検査

  # 川崎市ルート
  - step: 川崎市_受診内容1
    type: hearing
    output_format: text
    next: 共通_人数受診時期

  # 健保組合ルート
  - step: 健保組合_健保名
    type: hearing
    output_format: text
    next: 健保組合_受診希望コース

  - step: 健保組合_受診希望コース
    type: hearing
    output_format: text
    next: 健保組合_オプション

  - step: 健保組合_オプション
    type: hearing
    output_format: text
    next: 共通_人数受診時期

  # その他予約ルート
  - step: その他_希望検査
    type: hearing
    output_format: text
    next: 最後の問い合わせ

  # 川崎市・健保組合の合流点
  - step: 共通_人数受診時期
    type: hearing
    output_format: text
    next: 最後の問い合わせ

  # ===== 変更ルート =====
  - step: 変更_予約日
    type: hearing
    output_format: datetime
    next: 変更_変更項目

  - step: 変更_変更項目
    type: hearing
    output_format: text
    next: 最後の問い合わせ

  # ===== キャンセルルート =====
  - step: キャンセル_予約日
    type: hearing
    output_format: datetime
    next: キャンセル_受診内容2

  - step: キャンセル_受診内容2
    type: hearing
    output_format: text
    next: 最後の問い合わせ

  # ===== 問い合わせルート =====
  - step: 問い合わせ_確認内容
    type: hearing
    output_format: text
    next: 最後の問い合わせ

  # ===== 全ルート合流 → 最後の問い合わせ → 終話分岐 =====
  - step: 最後の問い合わせ
    type: hearing
    output_format: text
    next: 終話分岐_用件

  # ===== 終話分岐チェーン =====
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "キャンセル"
        next: END_キャンセル
      - match: "予約"
        next: 終話分岐_健診種類
      - match: "変更"
        next: 終話分岐_変更_電話
      - match: "問い合わせ"
        next: 終話分岐_問合_電話

  - step: 終話分岐_健診種類
    type: context_match_router
    reference_module: "menu"
    conditions:
      - match: "川崎市"
        next: 終話分岐_川崎市_電話
      - match: "健保組合"
        next: 終話分岐_健保_電話
      - match: "その他"
        next: 終話分岐_予約その他_電話

  - step: 終話分岐_川崎市_電話
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_予約_川崎市_携帯
      - match: "その他"
        next: END_予約_川崎市_固定

  - step: 終話分岐_健保_電話
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_予約_健保その他_携帯
      - match: "その他"
        next: END_予約_健保その他_固定

  - step: 終話分岐_予約その他_電話
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_予約_健保その他_携帯
      - match: "その他"
        next: END_予約_健保その他_固定

  - step: 終話分岐_変更_電話
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_変更_携帯
      - match: "その他"
        next: END_変更_固定

  - step: 終話分岐_問合_電話
    type: context_match_router
    reference_module: "phonetype"
    conditions:
      - match: "携帯"
        next: END_問い合わせ_携帯
      - match: "その他"
        next: END_問い合わせ_固定

  # ===== 終話ブロック =====
  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_予約_川崎市_固定
    type: termination
    termination_ref: "END_予約_川崎市_固定"

  - step: END_予約_川崎市_携帯
    type: termination
    termination_ref: "END_予約_川崎市_携帯"

  - step: END_予約_健保その他_固定
    type: termination
    termination_ref: "END_予約_健保その他_固定"

  - step: END_予約_健保その他_携帯
    type: termination
    termination_ref: "END_予約_健保その他_携帯"

  - step: END_変更_固定
    type: termination
    termination_ref: "END_変更_固定"

  - step: END_変更_携帯
    type: termination
    termination_ref: "END_変更_携帯"

  - step: END_問い合わせ_固定
    type: termination
    termination_ref: "END_問い合わせ_固定"

  - step: END_問い合わせ_携帯
    type: termination
    termination_ref: "END_問い合わせ_携帯"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分（DTMF 1-4 と音声キーワードの両方で判定）"

  - context_name: "patientName"
    context_name_jp: "受診者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "受診者本人の氏名（フルカタカナ）。複数名発話時は1人目のみここ、2人目以降は reason へ"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "yyyy-MM-dd 形式。和暦も受付"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "桁数チェック最大3回。先頭0保持、10/11桁のみ受付"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "着信番号自動格納（Dr.JOY標準）"

  - context_name: "medicalCardNumber"
    context_name_jp: "ID番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "診察券登録番号。「分からない」発話時は未入力のまま次へ"

  - context_name: "menu"
    context_name_jp: "健診の種類"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "川崎市 / 健保組合 / その他 の3値（予約ルートでのみ格納）"

  - context_name: "details1"
    context_name_jp: "受診内容（川崎市）"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "特定健診・市のがん検診・オプション（川崎市予約ルートのみ）"

  - context_name: "companyname"
    context_name_jp: "健保・仲介会社名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "健保組合ルートで聴取。東京薬業→東京薬業健康保険組合、I9Bグループ→IQVIAグループ等の正規化あり"

  - context_name: "course"
    context_name_jp: "受診希望コース"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "健保組合ルートで聴取。Aコース/ABコース/人間ドック 等"

  - context_name: "option"
    context_name_jp: "追加オプション"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "複数は読点「、」で連結。健保組合ルートのみ"

  - context_name: "desiredInspection"
    context_name_jp: "希望検査"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "その他予約ルートでのみ格納（自由文）"

  - context_name: "detail"
    context_name_jp: "人数・受診時期"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "川崎市・健保組合の予約ルートで聴取。「決まっていない」も可"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
