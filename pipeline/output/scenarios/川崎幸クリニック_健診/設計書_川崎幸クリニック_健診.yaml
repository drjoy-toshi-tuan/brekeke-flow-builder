sms_flag_routing:
  enabled: true
  routing_keys: ["classification"]
  patterns:
    - condition: "classification=キャンセル"
      sms_flag: "2"
      notes: "キャンセル専用SMS（他と異なる値）"
    - condition: "classification∈{予約,変更,問い合わせ}"
      sms_flag: "1"
      notes: "通常送信"
    - condition: "異常終話（代表案内・時間外・非通知・聴取失敗）"
      sms_flag: "-1"
      notes: "送信なし（Gen3 標準）"

