          output: "定期健康診断"
        - input: "雇入れ時 / 雇入れ前健診 / 雇用前健診 / 入社時健診 / 入社前の健診"
          output: "雇用時健診"
        - input: "特定健診 / 特定健康検査"
          output: "特定健診"
