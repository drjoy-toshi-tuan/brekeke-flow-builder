    tts_announcement: "診察券のID番号を「番号は、いち にぃ さん よん ごー です」のようにお話しください。わからない場合は、「わからない」とお話しください。どうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "数字"
        - "わからない"
        - "NO_RESULT"
      mapping:
