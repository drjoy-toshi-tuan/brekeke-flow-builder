# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # === メインフロー聴取項目 ===
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 1
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "DTMF 1=変更, 2=キャンセル, 3=確認。Gen2のリトライ上限1回（初回+再聴取=計2回）"

  - order: 2
    name: "変更_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "label"
    output_labels:
      - "歯科口腔外科"
      - "登録なし"
      - "{診療科名}"
    notes: "変更ルート。profile_words: 31診療科辞書。認識不能時は「登録なし」を格納して次へ。歯科口腔外科検出時は専用アナウンスへ分岐"

  - order: 3
    name: "変更_現在の予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels: []
    notes: "変更ルート。YYYY-MM-DD 00:00:00形式に変換。「わからない」はそのまま格納して次へ。年不明時は未来日になるよう当年/翌年を補完"

  - order: 4
    name: "変更_次回希望時期"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
