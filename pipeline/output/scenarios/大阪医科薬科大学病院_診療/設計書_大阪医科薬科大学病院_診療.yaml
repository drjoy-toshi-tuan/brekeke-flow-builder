        - "登録なし"
        - "{診療科名}"
        - "NO_RESULT"
      mapping:
        - input: "診療科リストに一致するキーワード"
          output: "{対応する診療科名}"
        - input: "「わからない」、リストにない言葉、診療科と関係ない発話"
          output: "登録なし"
        - input: "音声認識結果が空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "clinicalDepartment"
    next_step: "歯科口腔外科→変更_歯科アナウンス→変更_現在の予約日 / その他→変更_現在の予約日"
