# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定"
    tts_announcement: "申し訳ございません。電話番号を通知のうえ再度おかけ直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定"
    tts_announcement: "お電話ありがとうございます。大阪医科薬科大学病院です。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "用件確認のリトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、代表電話の072-683-1221におかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（用件別 x 携帯/固定）---
  - name: "END_変更完了"
    condition: "変更ルート完了 かつ 携帯"
    tts_announcement: "かしこまりました。予約変更の申し込みを受付いたしました。土日祝日をのぞく2日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更"

  - name: "END_変更完了_固定"
    condition: "変更ルート完了 かつ 固定/その他"
    tts_announcement: "かしこまりました。予約変更の申し込みを受付いたしました。土日祝日をのぞく2日以内に担当者から折り返し電話にてご連絡いたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更"

  - name: "END_キャンセル完了"
    condition: "キャンセルルート完了（携帯/固定共通）"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。必要があれば担当者から折り返しご連絡いたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_確認完了"
    condition: "確認ルート完了 かつ 携帯"
    tts_announcement: "かしこまりました。予約確認の申し込みを受付いたしました。土日祝日をのぞく2日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_確認"

  - name: "END_確認完了_固定"
    condition: "確認ルート完了 かつ 固定/その他"
    tts_announcement: "かしこまりました。予約確認の申し込みを受付いたしました。土日祝日をのぞく2日以内に担当者から折り返し電話にてご連絡いたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_確認"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "phonetype"
  patterns:
    - condition: "classification=変更 かつ phonetype=携帯"
      sms_flag: "1"
      notes: "変更受付完了SMS送信。TTS内でSMS言及"
    - condition: "classification=変更 かつ phonetype=固定"
      sms_flag: "1"
      notes: "変更受付完了SMS送信（Dr.JOYバックエンドで判断）。TTS内でSMS不言及"
    - condition: "classification=キャンセル"
      sms_flag: "2"
      notes: "キャンセル受付完了SMS送信。TTS内でSMS不言及（携帯/固定共通）"
    - condition: "classification=確認 かつ phonetype=携帯"
      sms_flag: "1"
      notes: "確認受付完了SMS送信。TTS内でSMS言及"
    - condition: "classification=確認 かつ phonetype=固定"
      sms_flag: "1"
      notes: "確認受付完了SMS送信（Dr.JOYバックエンドで判断）。TTS内でSMS不言及"

