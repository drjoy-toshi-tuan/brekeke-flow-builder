    purpose: "用件聴取案内（リトライ）"
    announcement: "申し訳ありません。うまく認識できませんでした。再度、ご用件を次の3つのうちのいずれかでお話ください。1、予約を変更する。2、予約をキャンセルする。3、予約を確認する。それでは、お話ください。"

