# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管案件。Gen2 OpenAI Assistantプロンプトから構造を抽出"
  - "用件は変更/キャンセル/確認の3択（DTMF対応）。Gen2では「無回答」もenumに含まれるが、Gen3ではNO_RESULTとして処理"
  - "歯科口腔外科の特別アナウンス: 変更・キャンセルルートのみ。「手術に関する予約変更はAI電話では受付できません」を発話後、次の聴取項目に進む（入力待ちなし）"
  - "診療科「登録なし」: リストに一致しない場合は「登録なし」を格納し、再聴取せずに次へ進む"
  - "音声認識誤変換補正ルール: 「参加」→産科、「京成」→形成外科、「企業機関」/「微妙」→腎泌尿器外科、「製品神経科」→精神神経科、「GBか」→耳鼻咽喉科。これらはprofile_wordsおよびOpenAIプロンプトで対応"
  - "診察券番号: 3桁以上必須。'C'発話は全て'4'へ置換（OpenAIプロンプトで対応）。digits復唱あり"
  - "患者名: 復唱禁止。苗字のみの場合は1回だけ下の名前を聴取。再質問は1回のみ"
  - "予約日: YYYY-MM-DD 00:00:00形式。年不明時は未来日になるよう当年/翌年を補完。「わからない」はそのまま格納"
  - "予約希望時期: フリーテキスト格納（日付形式に変換しない）"
  - "smsFlag: 変更/確認=1、キャンセル=2。携帯/固定でTTSのSMS言及有無を切り替え"
  - "Gen2のstatus=7(非通知)はGen3のstatus=2(代表案内)にマッピング"
  - "Gen2 functionの未使用フィールド（history, symptoms, institution, introduction, disease, details, clinicalDepartment2, question, checkout）はGen3で除外"
  - "Gen2のendpoint/smsFlag/Incoming_phone_number/phone_typeフィールドはGen3のsaveCompletionFlag2db/incoming-classifierに対応するため、saveContextModel2DBには含めない"
  - "「ありがとうございます。」は使用禁止（Gen2プロンプト準拠）。終話で使用する「かしこまりました」は許可"

