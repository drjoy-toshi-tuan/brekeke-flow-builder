# 生成元: @director エージェント
# 生成日: 2026/04/14
# 確認レポート: docs/designs/確認レポート_大阪医科薬科大学病院_診療_20260414.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "大阪医科薬科大学病院"
  group_name: "お_大阪医薬大_診療"
  flow_name: "お_大阪医薬大_診療$診療_M_浜口_20260414"
  target_facility: "大阪医科薬科大学病院"
  office_id: "TODO_要確認"
  phone_number: "072-683-1221"
  business_hours: "TODO_要確認"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "お_大阪医薬大_診療$診療_M_浜口_20260414"
      role: "main"
      description: "冒頭チェーン → 用件確認(3択) → 用件別分岐(変更/キャンセル/確認) → 診療科・用件固有項目聴取 → サブフロー遷移(個人情報聴取) → 用件別終話分岐"
    - name: "お_大阪医薬大_診療$個人情報聴取"
      role: "sub"
      description: "診察券番号 → 氏名 → 生年月日 → 電話番号 → 結果返却"
  subflows:
    - name: "お_大阪医薬大_診療$個人情報聴取"
      target: "個人情報聴取（診察券番号・氏名・生年月日・電話番号）"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivr を完全コピー。フロー名プレフィックスのみ施設名に置換"

# --- セクション3: フローの目的 ---
purpose: "患者からの電話を受け、用件（変更・キャンセル・確認）を確認した後、診療科・予約日・理由等の用件固有情報と患者情報（診察券番号・氏名・生年月日・連絡先電話番号）を聴取し、折り返し受付を自動化する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "お_大阪医薬大_診療$診療_M_浜口_20260414"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → 用件確認(TTS+DTMF STT, max=1)
                                      → OpenAI_用件確認
                                          ├─ 変更 → 変更_診療科(TTS+STT+OpenAI)
                                          │     ├─ 歯科口腔外科 → 変更_歯科アナウンス(TTS) → 変更_現在の予約日
                                          │     └─ {other/登録なし} → 変更_現在の予約日
                                          │   変更_現在の予約日(TTS+STT+OpenAI)
                                          │     → 変更_次回希望時期(TTS+STT+OpenAI)
                                          │     → 変更_検査有無(TTS+STT+OpenAI)
                                          │     → 変更_変更理由(TTS+STT+OpenAI)
                                          │     → jump_個人情報聴取
                                          │
                                          ├─ キャンセル → キャンセル_診療科(TTS+STT+OpenAI)
                                          │     ├─ 歯科口腔外科 → キャンセル_歯科アナウンス(TTS) → キャンセル_現在の予約日
                                          │     └─ {other/登録なし} → キャンセル_現在の予約日
                                          │   キャンセル_現在の予約日(TTS+STT+OpenAI)
                                          │     → キャンセル_理由(TTS+STT+OpenAI)
                                          │     → jump_個人情報聴取
                                          │
                                          ├─ 確認 → 確認_診療科(TTS+STT+OpenAI)
                                          │     → 確認内容(TTS+STT+OpenAI)
                                          │     → jump_個人情報聴取
                                          │
                                          └─ NO_RESULT → リトライ_用件確認
                                                           ├─ Retry → 用件確認(TTS)
                                                           └─ No more → END_聴取失敗 → 切断

      ─── サブフロー完了後の終話チェーン ───
      jump_個人情報聴取 完了後
        → ContextMatchRouter_用件終話分岐(classification)
            ├─ 変更 → 完了フラグ_変更(status=1, smsFlag=1)
            │     → ContextMatchRouter_変更_電話分岐(phonetype)
            │         ├─ 携帯(1) → END_変更完了(TTS) → 切断
            │         └─ 固定(2) → END_変更完了_固定(TTS) → 切断
            ├─ キャンセル → 完了フラグ_キャンセル(status=1, smsFlag=2)
            │     → END_キャンセル完了(TTS) → 切断
            └─ 確認 → 完了フラグ_確認(status=1, smsFlag=1)
                  → ContextMatchRouter_確認_電話分岐(phonetype)
                      ├─ 携帯(1) → END_確認完了(TTS) → 切断
                      └─ 固定(2) → END_確認完了_固定(TTS) → 切断

      ─── メインフロー内終話パターン ───
      END_非通知 → 切断
      END_時間外 → 切断
      END_聴取失敗 → 切断
      END_変更完了 / END_変更完了_固定 → 切断
      END_キャンセル完了 → 切断
      END_確認完了 / END_確認完了_固定 → 切断
    notes: |
      acceptance_times使用（営業時間スケジュールはDr.JOY側で設定）。
      用件3択(変更/キャンセル/確認)で完全分離した3ルート構成。
      歯科口腔外科の特別アナウンスは変更/キャンセルルートのみ。
      終話チェーンはContextMatchRouterで用件別→携帯/固定別に分岐。
      キャンセルはTTSにSMS言及なし（携帯/固定共通）。

  - flow_name: "お_大阪医薬大_診療$個人情報聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「診察券番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「お_大阪医薬大_診療$」に置換。構造・接続・スクリプトは一切変更不可。

      このサブフローは以下の4つの聴取ステップを順に実行する:
        1. 診察券番号（DTMF AmiVoice STT, max_dtmf_length=10）
        2. 氏名（AmiVoice STT — 音声のみ）
        3. 生年月日（DTMF AmiVoice STT, max_dtmf_length=8 + DOB Re-confirmation）
        4. 電話番号（incoming-classifier → 携帯/固定分岐 → Phone Normalization → Re-confirmation）

      電話番号聴取後、結果返却スクリプトでメインフローに戻る。
      リファレンス.bivr 内の構成: 41モジュール（Disconnect含む）
    notes: |
      CLAUDE.md Rule 9/10/11 準拠。
      個人情報サブフロー.bivr を完全コピー。独自のモジュール追加・削除・接続変更は禁止。
      フロー名プレフィックスのみ施設名に置換すること。

# --- セクション4b: ルーティングマップ ---
routing_map:
  flow_config:
    use_acceptance_times: true
    opening_tts: "冒頭_アナウンス"

  openai_branches:
    - module: "OpenAI_用件確認"
      to:
        "変更": "変更_診療科"
        "キャンセル": "キャンセル_診療科"
        "確認": "確認_診療科"

    - module: "OpenAI_変更_診療科"
      to:
        "歯科口腔外科": "変更_歯科アナウンス"
        "default": "変更_現在の予約日"

    - module: "OpenAI_キャンセル_診療科"
      to:
        "歯科口腔外科": "キャンセル_歯科アナウンス"
        "default": "キャンセル_現在の予約日"

    - module: "OpenAI_確認_診療科"
      to:
        "default": "確認内容"

    - module: "OpenAI_変更_現在の予約日"
      to:
        "default": "変更_次回希望時期"

    - module: "OpenAI_変更_次回希望時期"
      to:
        "default": "変更_検査有無"

    - module: "OpenAI_変更_検査有無"
      to:
        "default": "変更_変更理由"

    - module: "OpenAI_変更_変更理由"
      to:
        "default": "jump_個人情報聴取"

    - module: "OpenAI_キャンセル_現在の予約日"
      to:
        "default": "キャンセル_理由"

    - module: "OpenAI_キャンセル_理由"
      to:
        "default": "jump_個人情報聴取"

    - module: "OpenAI_確認内容"
      to:
        "default": "jump_個人情報聴取"

  retry_exceptions:
    - module: "リトライ_変更_診療科"
      false_to: "変更_現在の予約日"
    - module: "リトライ_キャンセル_診療科"
      false_to: "キャンセル_現在の予約日"
    - module: "リトライ_確認_診療科"
      false_to: "確認内容"
    - module: "リトライ_変更_現在の予約日"
      false_to: "変更_次回希望時期"
    - module: "リトライ_変更_次回希望時期"
      false_to: "変更_検査有無"
    - module: "リトライ_変更_検査有無"
      false_to: "変更_変更理由"
    - module: "リトライ_変更_変更理由"
      false_to: "jump_個人情報聴取"
    - module: "リトライ_キャンセル_現在の予約日"
      false_to: "キャンセル_理由"
    - module: "リトライ_キャンセル_理由"
      false_to: "jump_個人情報聴取"
    - module: "リトライ_確認内容"
      false_to: "jump_個人情報聴取"

  post_subflow_chain:
    to: "ContextMatchRouter_用件終話分岐"

  context_routers:
    - module: "ContextMatchRouter_用件終話分岐"
      context_name: "classification"
      to:
        "変更": "完了フラグ_変更"
        "キャンセル": "完了フラグ_キャンセル"
        "確認": "完了フラグ_確認"
    - module: "ContextMatchRouter_変更_電話分岐"
      context_name: "phonetype"
      to:
        "1": "END_変更完了"
        "default": "END_変更完了_固定"
    - module: "ContextMatchRouter_確認_電話分岐"
      context_name: "phonetype"
      to:
        "1": "END_確認完了"
        "default": "END_確認完了_固定"

  # 歯科口腔外科アナウンスTTSの next 接続
  # 変更_歯科アナウンス → 変更_現在の予約日
  # キャンセル_歯科アナウンス → キャンセル_現在の予約日
  # これらはTTSモジュール（入力待ちなし）のため、next = [{"label":"Next Module","nextModuleName":"..."}]
  announcement_tts_next:
    - module: "変更_歯科アナウンス"
      next_to: "変更_現在の予約日"
    - module: "キャンセル_歯科アナウンス"
      next_to: "キャンセル_現在の予約日"

