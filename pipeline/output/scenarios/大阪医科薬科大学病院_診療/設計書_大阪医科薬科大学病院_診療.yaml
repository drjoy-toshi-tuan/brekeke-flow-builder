# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "初めに、ご用件を次の3つのうちのいずれかでお話ください。1、予約を変更する。2、予約をキャンセルする。3、予約を確認する。それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「変更」「変えたい」を含む"
          output: "変更"
        - input: "DTMF 2 または「キャンセル」「取り消し」を含む"
          output: "キャンセル"
        - input: "DTMF 3 または「確認」「教えて」を含む"
          output: "確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "変更→変更_診療科 / キャンセル→キャンセル_診療科 / 確認→確認_診療科"
    retry_failure: "end_failure"

