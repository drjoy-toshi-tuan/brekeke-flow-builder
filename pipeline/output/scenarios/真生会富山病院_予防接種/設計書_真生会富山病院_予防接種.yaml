# smsFlag 分岐設計
sms_flag_routing:
  enabled: true
  routing_keys: ["classification"]
  patterns:
    - condition: "classification=新規予約 OR 変更 OR 問合せ（受付完了）"
      sms_flag: "1"
      notes: "予約完了/問合せ受付通知 SMS"
    - condition: "classification=キャンセル / 接種後体調代表案内 / 異常系（時間外/非通知/聴取失敗）"
      sms_flag: "-1"
      notes: "完了通知不要・番号案内のみ。SMS なし"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
