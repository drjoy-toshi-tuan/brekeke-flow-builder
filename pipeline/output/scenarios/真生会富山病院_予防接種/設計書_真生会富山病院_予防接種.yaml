# 生成日: 2026-05-01
# 確認レポート: output/scenarios/真生会富山病院_予防接種/確認レポート_真生会富山病院_予防接種_20260501.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "真生会富山病院"
  scenario_name: "予防接種"
  group_name: "真生会富山病院"
  flow_name: "真生会富山病院$予防接種"
  target_facility: "真生会富山病院（本院）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"               # 着信ARS番号（Brekeke 設定時）
  business_hours: "日祝・年末年始（〜1/4）を除く 月〜金 9:00〜15:00 / 土 9:00〜11:00（接種シーズン限定）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "真生会富山病院$予防接種"
      role: "main"
      description: "メインフロー（用件聴取・ワクチン種類聴取・予約日時確定・個人情報聴取・終話分岐）"
  subflows:
    # 個人情報サブフロー（個人情報サブフロー.bivr テンプレを完全コピー）
    - name: "真生会富山病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1: 患者氏名聞き取り.yaml — 接種者本人のフルネーム聴取。1 通話 1 名分の運用前提。"

    - name: "真生会富山病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen1: 生年月日聞き取り.yaml — 和暦/西暦両対応。「わからない」許容。"

    - name: "真生会富山病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: |
        Gen1: 連絡先電話番号聞き取り.yaml + 電話番号区切り.yaml — 着信番号自動採用パスを内包する標準テンプレ。
        Gen1 main.yaml の「入電番号を連絡先電話番号にセット」は incoming-classifier 経由で自動的に
        実装される（標準サブフローテンプレで吸収）。

# --- セクション3: フローの目的 ---
purpose: |
  真生会富山病院のコロナ・インフルエンザ予防接種専用 AI 電話。患者からの着信を受け、
  用件（新規予約 / 変更 / キャンセル / 問合せ）を聴取し、各ルートで以下を遂行する:
  ・新規予約 / 変更: ワクチン種類（インフル/コロナ/同時）→ 接種費用案内 → 予約希望日聴取
    → 空き枠確認 API → 希望時間選択 → 時間枠ロック API → 復唱確認 → 予約確定 API
    → 氏名・生年月日・電話番号聴取 → 終話（予約完了 + 内容復唱 + 注意事項）
  ・キャンセル: 既存予約日聴取 → 氏名・生年月日聴取 → 終話（キャンセル完了）
  ・問合せ: 接種後体調不良チェック → (はい=代表 0766-52-2156 案内 / いいえ=問合せ内容聴取
    → 個人情報聴取 → 折返し or SMS 終話)
  ・3 回失敗時: 健診センター 0766-52-2473 番号案内で切断
  ・接種シーズン限定運用（毎年シーズン外は稼働前/今年度終了アナウンスでガード）

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "真生会富山病院$予防接種"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス → 完了フラグ_非通知 → 切断
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → 時間外_アナウンス → 完了フラグ_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス（施設名 + 予防接種専用案内）
                                        → 用件確認(hearing, enum, echo_back) → classification
                                            ├─ 新規予約 → 新規予約_1名分制限案内
                                            │              → ワクチン種類聴取(hearing, enum, echo_back)
                                            ├─ 変更    → 変更_繋ぎ_アナウンス → 既存予約日聴取_変更(hearing, datetime)
                                            │              → 変更_再予約_アナウンス → ワクチン種類聴取(共通)
                                            ├─ キャンセル → キャンセル_繋ぎ_アナウンス → 既存予約日聴取_キャンセル(hearing, datetime)
                                            │              → キャンセル_氏名繋ぎ → jump_氏名聴取_キャンセル
                                            │                  → jump_生年月日聴取_キャンセル → END_キャンセル完了
                                            └─ 問合せ  → 接種後体調確認(hearing, enum, judge)
                                                          ├─ はい → END_接種後体調代表案内（0766-52-2156）
                                                          └─ いいえ → 問合せ_繋ぎ_アナウンス → 問合せ内容聴取(hearing, text)
                                                                       → 問合せ_氏名繋ぎ → jump_氏名聴取_問合せ
                                                                          → jump_生年月日聴取_問合せ
                                                                          → jump_電話番号聴取_問合せ
                                                                          → END_問合せ受付完了
      [新規/変更 共有チェーン]
        ワクチン種類聴取(hearing, enum, echo_back) → vaccineType
          ├─ インフルエンザ → インフル接種費用_案内
          ├─ 新型コロナ → コロナ接種費用_案内
          └─ other(=同時接種) → 同時接種費用_案内
            (3者合流) → 予約希望日聴取_導入_アナウンス
              → 予約希望日聴取(hearing, datetime, echo_back)
                → augment_API空き枠確認 (Brekeke カスタムモジュール)
                  → 空き枠分岐
                      ├─ total=0 → 空き枠なし_案内 → 予約希望日聴取(loop)
                      └─ total>=1 → 希望時間案内_アナウンス
                                      → 希望時間選択(hearing, text)
                                        → augment_API時間枠ロック (Brekeke カスタムモジュール)
                                          ├─ 失敗 → 別時間_案内 → 予約希望日聴取(loop)
                                          └─ 成功 → 予約日時復唱確認(hearing, enum, judge, echo_back)
                                                     ├─ はい → augment_API予約確定 (Brekeke カスタムモジュール)
                                                     │           → 予約完了_繋ぎ_アナウンス → 予約_氏名繋ぎ
                                                     │             → jump_氏名聴取_予約 → jump_生年月日聴取_予約
                                                     │             → jump_電話番号聴取_予約
                                                     │             → 終話分岐_用件(context_match_router on classification)
                                                     │                 ├─ 新規予約 → END_新規予約完了（補足案内付き）
                                                     │                 └─ other(=変更) → END_変更完了（補足案内付き）
                                                     └─ いいえ → 別時間_案内 → 予約希望日聴取(loop)
    notes: |
      Gen1 の「count再質問_1〜_7」「count上記以外_1〜_2」等の連番リトライカウンタは
      Gen3 標準 Retry モジュール（retry_count + Retry node）に集約。
      Brekeke 側 4 つのカスタム API（API_CHECK_BOOKING / API_CHECK_TIME /
      API_CHECK_FRAME_AND_LOCK / API_BOOKING）の利用可否は Dr.JOY 担当に要確認
      （confirmation_items BLOCKER 参照）。利用不可の場合は予約完結フローを「案内のみ」
      に縮退させる必要がある。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ============================================================
  # 1. 冒頭ブロック
  # ============================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認
    notes: |
      Gen1「挨拶」: TTS「お電話ありがとうございます。真生会富山病院、コロナ、
      インフルエンザ、予防接種専用、AI電話です。」をそのまま転記。
      Gen1 の冒頭直後にあった「中学生以下の方とフルミストご希望の方はホームページを
      ご確認ください」の補足アナウンス（時間内へ箱）は本アナウンスに統合する。

  # ============================================================
  # 2. 用件確認（4 分岐: 新規予約 / 変更 / キャンセル / 問合せ）
  # ============================================================
  - step: 用件確認
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "新規予約"
        next: 新規予約_1名分制限案内
      - match: "変更"
        next: 変更_繋ぎ_アナウンス
      - match: "キャンセル"
        next: キャンセル_繋ぎ_アナウンス
      - match: "other"        # = 問合せ
        next: 接種後体調確認
    notes: |
      Gen1「用件聞き取り.yaml」の主分岐を統合。Gen1 では DTMF 4-way（1=予約 / 2=変更 /
      3=キャンセル / 4=確認・その他問い合わせ）+ 復唱（4 種：「予防接種のご予約で
      よろしいですか？」「ご予約の変更で、よろしいですか？」「ご予約のキャンセルで
      よろしいですか?」「その他問い合わせ、でよろしいですか?」）+ 接種後体調エンティティ
      検出（→ 即代表案内）の複雑構造を Gen3 では Pattern A + echo_back に集約。
      output 値: 新規予約 / 変更 / キャンセル / 問合せ の 4 値。
      復唱（echo_back: true）あり：scaffold が用件 4 種それぞれの復唱 TTS を埋め込み、
      Re-confirmation node + 復唱 STT + 復唱 OpenAI(肯定/否定) を自動配置。
      DTMF 1=新規予約, 2=変更, 3=キャンセル, 4=問合せ も並行受付（stt_type: DTMF_AmiVoice）。
      "other" は問合せに該当（4 値中 3 値を明示分岐し、問合せが残余として other に集約）。
      Gen1 にあった「接種後の体調」エンティティ即時検出ショートカットは Gen3 では
      問合せルート内の「接種後体調確認」hearing に集約（用件確認 OpenAI prompt 内には
      接種後体調を予約用件として誤分類しない注意書きを prompter に依頼）。

  # ============================================================
  # 3. 問合せルート
  # ============================================================
  - step: 接種後体調確認
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: END_接種後体調代表案内
      - match: "other"        # = いいえ
        next: 問合せ_繋ぎ_アナウンス
    notes: |
      Gen1「接種後の体調か確認」: TTS「問い合わせの内容は、「接種後の体調不良に
      ついて」でしょうか？はい、そうです、または、いいえ、違います、のように
      お答えください。」。「はい」のみで代表案内（0766-52-2156）ルートへ確定。
      output 値: はい / いいえ。openai_processing: judge。
      ※ 「いいえ」は other に集約。

  - step: 問合せ_繋ぎ_アナウンス
    type: announcement
    next: 問合せ内容聴取
    notes: |
      Gen1「問い合わせ内容の聞き取りへ」: TTS「それでは、」のみの繋ぎ発話。

  - step: 問合せ内容聴取
    type: hearing
    output_format: text
    next: 問合せ_氏名繋ぎ_アナウンス
    notes: |
      Gen1「問合せ内容.yaml 問合せ内容」: TTS「お問い合わせの内容を簡潔にお話ください。」
      output_format: text（自由テキスト保存）。OpenAI 不要。
      reason context に保存。

  - step: 問合せ_氏名繋ぎ_アナウンス
    type: announcement
    next: jump_氏名聴取_問合せ
    notes: |
      Gen1「次へ」: TTS「次に、」。

  - step: jump_氏名聴取_問合せ
    type: subflow
    flowname: "真生会富山病院$氏名聴取"
    next: 問合せ_生年月日繋ぎ_アナウンス

  - step: 問合せ_生年月日繋ぎ_アナウンス
    type: announcement
    next: jump_生年月日聴取_問合せ
    notes: |
      Gen1「次へ_1」: TTS「続いて、」。

  - step: jump_生年月日聴取_問合せ
    type: subflow
    flowname: "真生会富山病院$生年月日聴取"
    next: jump_電話番号聴取_問合せ

  - step: jump_電話番号聴取_問合せ
    type: subflow
    flowname: "真生会富山病院$電話番号聴取"
    next: END_問合せ受付完了
    notes: |
      Gen1「入電番号を連絡先電話番号にセット」を Gen3 標準サブフローで実装。
      サブフロー内 incoming-classifier で着信番号を採用するパスがデフォルトで存在。

  # ============================================================
  # 4. キャンセルルート
  # ============================================================
  - step: キャンセル_繋ぎ_アナウンス
    type: announcement
    next: 既存予約日聴取_キャンセル
    notes: |
      Gen1「次へ_2」: TTS「次に、」。

  - step: 既存予約日聴取_キャンセル
    type: hearing
    output_format: datetime
    next: キャンセル_氏名繋ぎ_アナウンス
    notes: |
      Gen1「予約日の聞き取り.yaml」: TTS「現在の予約日をお話ください。
      わからない方は「わからない」とお話ください。」
      過去日が含まれる場合 +1 年補正は OpenAI prompt 内で吸収（prompter 指示）。
      「わからない」発話は OpenAI 出力で空文字を許容（reservationDate 未保存で進行）。
      retry_failure: end_failure（健診センター案内終話へ）。

  - step: キャンセル_氏名繋ぎ_アナウンス
    type: announcement
    next: jump_氏名聴取_キャンセル
    notes: |
      Gen1「次へ」: TTS「次に、」。

  - step: jump_氏名聴取_キャンセル
    type: subflow
    flowname: "真生会富山病院$氏名聴取"
    next: キャンセル_生年月日繋ぎ_アナウンス

  - step: キャンセル_生年月日繋ぎ_アナウンス
    type: announcement
    next: jump_生年月日聴取_キャンセル
    notes: |
      Gen1「次へ_1」: TTS「続いて、」。

  - step: jump_生年月日聴取_キャンセル
    type: subflow
    flowname: "真生会富山病院$生年月日聴取"
    next: END_キャンセル完了
    notes: |
      Gen1 ではキャンセル時も入電番号セットがあるが、明示的な電話番号聴取は
      なし。Gen3 ではキャンセル時は telephoneNumber（着信元）のみで折返し対応
      可能と判断し、電話番号聴取サブフローは省略。
      Dr.JOY 担当が「キャンセルでも追加電話番号が必要」と判断する場合は
      jump_電話番号聴取_キャンセル を追加（confirmation_items 参照）。

  # ============================================================
  # 5. 変更ルート（→ ワクチン種類で新規ルートと共有）
  # ============================================================
  - step: 変更_繋ぎ_アナウンス
    type: announcement
    next: 既存予約日聴取_変更
    notes: |
      Gen1「次へ_2」: TTS「次に、」。

  - step: 既存予約日聴取_変更
    type: hearing
    output_format: datetime
    next: 変更_再予約_アナウンス
    notes: |
      Gen1「予約日の聞き取り.yaml」: TTS「現在の予約日をお話ください。
      わからない方は「わからない」とお話ください。」
      変更ルートの場合、既存予約日確認後にキャンセル＋再予約として処理する。
      reservationDate context に保存（変更前の元予約日）。

  - step: 変更_再予約_アナウンス
    type: announcement
    next: 新規予約_1名分制限案内
    notes: |
      Gen1「再予約へ」: TTS「それでは、現在の予約をキャンセルし、再度予約をお取りします。」
      → 新規予約と同じ「1 名分制限案内 → ワクチン種類聴取」チェーンに合流。
      classification context は「変更」のまま保持されるため、最終終話で CMR
      による分岐に使用される。

  # ============================================================
  # 6. 新規予約ルート（変更ルートも合流）
  # ============================================================
  - step: 新規予約_1名分制限案内
    type: announcement
    next: ワクチン種類聴取
    notes: |
      Gen1「予防接種の種類聞き取り.yaml 冒頭アナウンス」:
      TTS「1度の電話で、予約できるのは、1名分のみです。」
      家族複数名一括予約のクレーム回避のため必ず告知（director 省略禁止）。

  - step: ワクチン種類聴取
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "インフルエンザ"
        next: インフル接種費用_案内
      - match: "新型コロナ"
        next: コロナ接種費用_案内
      - match: "other"        # = 同時接種
        next: 同時接種費用_案内
    notes: |
      Gen1「予防接種の種類聞き取り.yaml」: 3-way enum + 復唱確認。
      TTS「接種希望のワクチンを、次の3つのうちの、いずれかでお話ください。
            「インフルエンザワクチンのみ」、「新型コロナワクチンのみ」、
            「二つの同時接種」、それではお話ください。」
      output 値: インフルエンザ / 新型コロナ / 同時接種。
      vaccineType context に保存（補足案内・終話復唱で参照）。
      復唱（echo_back: true）3 種:
        - 「インフルエンザワクチンで、よろしいですか？」
        - 「新型コロナワクチンで、よろしいですか？」
        - 「インフルエンザワクチンと新型コロナワクチンの同時接種でよろしいですか?」
      ※ "other" は同時接種に該当（3 値中 2 値を明示、同時接種が残余）。

  - step: インフル接種費用_案内
    type: announcement
    next: 予約希望日聴取_導入_アナウンス
    notes: |
      Gen1「インフルエンザ接種費用」:
      TTS「射水市・富山市の接種券をお持ちの方は、接種券に記載の金額で、接種できます。
            一般料金は4,000円です。」
      ※ 一般料金 4,000 円は施設指定金額。prompter で改変禁止（special_notes に明記）。

  - step: コロナ接種費用_案内
    type: announcement
    next: 予約希望日聴取_導入_アナウンス
    notes: |
      Gen1「新型コロナ接種費用」:
      TTS「射水市・富山市の接種券をお持ちの方は、接種券に記載の金額で、接種できます。
            一般料金は15,300円です。」
      ※ 一般料金 15,300 円は施設指定金額。prompter で改変禁止。

  - step: 同時接種費用_案内
    type: announcement
    next: 予約希望日聴取_導入_アナウンス
    notes: |
      Gen1「同時接種　接種費用」:
      TTS「射水市・富山市の接種券をお持ちの方は、接種券に記載の金額で、接種できます。
            一般料金はインフルエンザ4,000円、コロナ15,300円です。」
      ※ 金額は施設指定。prompter で改変禁止。

  - step: 予約希望日聴取_導入_アナウンス
    type: announcement
    next: 予約希望日聴取
    notes: |
      Gen1「希望日聴取へ」: TTS「それでは、予約をお取りします。」

  - step: 予約希望日聴取
    type: hearing
    output_format: datetime
    echo_back: true
    next: augment_API空き枠確認
    notes: |
      Gen1「予約希望日.yaml 希望日の聞き取りへ」:
      TTS「接種は午後に実施しています。接種日は、TODO_接種日（例: 1月26日月曜日）です。
            ご都合の良い日を、お話ください。」
      ※ 接種日は病院側で限定（接種日候補が運用シーズンごとに変更）。
        confirmation_items の BLOCKER「接種日（最新）」参照。
      desiredDate context に保存。retry_failure: end_failure（健診センター案内終話）。
      復唱（echo_back: true）: scaffold が「<% desiredDate_jp %>でよろしいですか？」を
      自動配置（datetime 形式の場合 prompter が表示用 context を保存する設計が必要）。

  - step: augment_API空き枠確認
    type: augment
    augment_pattern: new_module
    augment_purpose: |
      Brekeke 側カスタムモジュール `API_CHECK_BOOKING` を呼び出し、指定接種日の
      予約可能枠数（total）と各枠時刻リストを取得する。Dr.JOY 連携 API。
      返り値: total（int）、startTimeList（カンマ区切り文字列、表示用）。
    next: 空き枠分岐
    notes: |
      Gen1「API_CHECK_BOOKING」サブシナリオ呼び出しの Gen3 移管。
      Brekeke カスタムモジュール（HTTP リクエスト）として実装する想定。
      scaffold は placeholder Script を生成、人間が後から URL/parameters を
      Brekeke UI で設定する。Dr.JOY 担当に予防接種枠管理 API の有無を要確認
      （confirmation_items BLOCKER 参照）。

  - step: 空き枠分岐
    type: context_match_router
    reference_module: "augment_API空き枠確認"
    conditions:
      - match: "0"
        next: 空き枠なし_案内
      - match: "other"        # = 1 件以上
        next: 希望時間案内_アナウンス
    notes: |
      Gen1「Check_frame_case（空き時間数確認）」: total = 0 / 1〜4 / >=5 の 3-way だが、
      Gen3 では「0 / 1 件以上」の 2-way に簡略化（1〜4 件と 5+ 件は希望時間選択 hearing
      に共通化、prompter プロンプト内で起こり得る件数別の対応指示を吸収）。
      reference_module は augment_API空き枠確認 が context に保存した枠数値を参照。

  - step: 空き枠なし_案内
    type: announcement
    next: 予約希望日聴取
    notes: |
      Gen1「Frame time empty（空き枠無し）」:
      TTS「大変申し訳ございません。<% desiredDate_jp %>にご予約できる時間帯は
            ございません。再度ご希望の予約日をお伺いいたします。」
      予約希望日聴取にループ復帰。

  - step: 希望時間案内_アナウンス
    type: announcement
    next: 希望時間選択
    notes: |
      Gen1「希望時間聴取へ（冒頭アナウンス）」+「希望時間聴取へ」:
      TTS「空いている時間をお伝えします。<% startTimeList %>、です。
            難しい場合は「いいえ」、とお答えください。
            ご都合に合う時間がございましたら、希望の時間をお話ください。」
      <% startTimeList %> は augment_API空き枠確認 が context 保存した
      時刻リスト（カンマ区切り文字列）。

  - step: 希望時間選択
    type: hearing
    output_format: text
    next: augment_API時間枠ロック
    notes: |
      Gen1「希望時間回答」+「Time wishes?」: 自由テキスト hearing で時刻聴取。
      desiredTime context に保存。OpenAI で「14:30」「2 時半」等を HH:MM 形式に
      正規化（prompter 指示）。「いいえ」発話時は別時間希望のため API 側で
      未マッチ判定 → 別時間案内ループ。

  - step: augment_API時間枠ロック
    type: augment
    augment_pattern: new_module
    augment_purpose: |
      Brekeke 側カスタムモジュール `API_CHECK_FRAME_AND_LOCK` を呼び出し、
      指定接種日 + 指定時刻の枠を一時ロックする。Dr.JOY 連携 API。
      返り値: success/failure boolean。
    conditions:
      - match: "true"
        next: 予約日時復唱確認
      - match: "false"
        next: 別時間_案内
    notes: |
      Gen1「API_CHECK_FRAME_AND_LOCK」+「Check_Frame_Lock」サブシナリオ呼び出しの Gen3 移管。
      ロック失敗時は別時間案内ループへ。

  - step: 別時間_案内
    type: announcement
    next: 予約希望日聴取
    notes: |
      Gen1「Choose another time frame」:
      TTS「大変申し訳ございません。ご希望の時間帯、<% desiredTime %>、は予約が
            取れないため、別の時間帯をご返答ください。再度、空き時間を確認します。」
      予約希望日聴取にループ復帰（Gen1 では空き時間確認 API 再実行だが Gen3
      では希望日からやり直す簡略化）。

  - step: 予約日時復唱確認
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "はい"
        next: augment_API予約確定
      - match: "other"        # = いいえ
        next: 別時間_案内
    notes: |
      Gen1「復唱確認（ワクチン・予約日時）」+「予約日時確認（肯定否定）.yaml」:
      TTS「<% vaccineType %>の、<% desiredDate_jp %>、<% desiredTime %>のご予約で
            よろしいでしょうか？」
      output 値: はい / いいえ。openai_processing: judge。
      復唱（echo_back: true）あり：内容を再度読み上げる前段に scaffold が自動配置。
      ※ Gen1 の hearing と復唱の二重構造（Gen1 の echo_back 出口 → 復唱 STT →
        復唱 OpenAI(肯定/否定) → 分岐）に相当。

  - step: augment_API予約確定
    type: augment
    augment_pattern: new_module
    augment_purpose: |
      Brekeke 側カスタムモジュール `API_BOOKING` を呼び出し、ロック済みの予約枠を
      確定する。Dr.JOY 連携 API。返り値: success/failure boolean。
    next: 予約完了_繋ぎ_アナウンス
    notes: |
      Gen1「API_BOOKING」サブシナリオ呼び出しの Gen3 移管。
      失敗時は Gen1 では「System overload」案内で終話だが、Gen3 では暫定的に
      成功時パスのみ実装（失敗時の挙動は Brekeke 側で実装後に追加配線）。

  - step: 予約完了_繋ぎ_アナウンス
    type: announcement
    next: 予約_氏名繋ぎ_アナウンス
    notes: |
      Gen1「希望予約日時確認完了」: TTS「かしこまりました。」

  - step: 予約_氏名繋ぎ_アナウンス
    type: announcement
    next: jump_氏名聴取_予約
    notes: |
      Gen1「次へ」: TTS「次に、」。

  - step: jump_氏名聴取_予約
    type: subflow
    flowname: "真生会富山病院$氏名聴取"
    next: 予約_生年月日繋ぎ_アナウンス

  - step: 予約_生年月日繋ぎ_アナウンス
    type: announcement
    next: jump_生年月日聴取_予約
    notes: |
      Gen1「次へ_1」: TTS「続いて、」。

  - step: jump_生年月日聴取_予約
    type: subflow
    flowname: "真生会富山病院$生年月日聴取"
    next: jump_電話番号聴取_予約

  - step: jump_電話番号聴取_予約
    type: subflow
    flowname: "真生会富山病院$電話番号聴取"
    next: 終話分岐_用件
    notes: |
      Gen1「入電番号を連絡先電話番号にセット」を Gen3 標準サブフローで実装。

  # ============================================================
  # 7. 終話分岐（新規予約 / 変更）
  # ============================================================
  - step: 終話分岐_用件
    type: context_match_router
    reference_module: "用件確認"
    conditions:
      - match: "新規予約"
        next: END_新規予約完了
      - match: "other"        # = 変更
        next: END_変更完了
    notes: |
      Gen1 main.yaml の「用件の確認」（共通箱・本ルート末尾）を Gen3 では
      ContextMatchRouter で実装。reference_module は用件確認 hearing が
      classification に保存した値を参照。
      ※ "other" は変更に該当（新規予約のみ明示、変更が残余）。

  # ============================================================
  # 8. 終話ブロック群
  # ============================================================
  - step: END_問合せ受付完了
    type: termination
    termination_ref: "END_問合せ受付完了"

  - step: END_接種後体調代表案内
    type: termination
    termination_ref: "END_接種後体調代表案内"

  - step: END_キャンセル完了
    type: termination
    termination_ref: "END_キャンセル完了"

  - step: END_新規予約完了
    type: termination
    termination_ref: "END_新規予約完了"

  - step: END_変更完了
    type: termination
    termination_ref: "END_変更完了"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - { id: "1", order: "1", value: "新規予約" }
      - { id: "2", order: "2", value: "変更" }
      - { id: "3", order: "3", value: "キャンセル" }
      - { id: "4", order: "4", value: "問合せ" }
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分。Gen1「用件」エンティティの 4 値"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフロー（氏名聴取）で保存。接種者本人のフルネーム"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "本フローでは聴取しない（予防接種専用窓口は診察券番号不要）。フィールド定義のみ保持"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: |
      予防接種専用窓口のため診療科聴取は無し。フィールド定義のみ保持
      （Dr.JOY 標準フィールド）。ワクチン種類は別途 vaccineType に保存。

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフロー（生年月日聴取）で保存"

  - context_name: "reason"
    context_name_jp: "理由"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "問合せ内容聴取で保存（問合せルートのみ）"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "変更・キャンセルルートでの既存予約日"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: |
      サブフロー（電話番号聴取）で保存。Gen1 の「入電番号セット」運用に基づき
      着信番号を採用するパスがサブフロー内に内包されている。

  - context_name: "vaccineType"
    context_name_jp: "ワクチン種類"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: |
      ワクチン種類聴取で保存。値: インフルエンザ / 新型コロナ / 同時接種。
      Gen1 では <? $clinical_department ?> 変数として参照されていたが、
      Gen3 では予防接種専用フィールドとして独立させる。
      終話 TTS（補足等）で <% vaccineType %> として参照。

  - context_name: "desiredDate"
    context_name_jp: "予約希望日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: |
      新規予約・変更ルートでの予約希望日（接種日）。datetime hearing で YYYY-MM-DD 形式
      で保存。表示用に desiredDate_jp（「1月26日月曜日」形式）も別途 prompter 指示で
      script 経由で保存（TTS 復唱用）。

  - context_name: "desiredTime"
    context_name_jp: "予約希望時間"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: |
      希望時間選択で保存。HH:MM 形式（OpenAI 正規化）。Gen1
      <? $booking_frame_time ?> 相当。

  - context_name: "startTimeList"
    context_name_jp: "空き時間候補"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: |
      augment_API空き枠確認 が context に保存する空き時刻のカンマ区切りリスト
      （表示用）。Gen1 <? $start_time_list ?> 相当。

  - context_name: "frameCount"
    context_name_jp: "空き枠数"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: |
      augment_API空き枠確認 が context に保存する空き枠数（total）。
      空き枠分岐 ContextMatchRouter で参照。

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - { id: "1", order: "1", value: "未処理" }
      - { id: "2", order: "2", value: "代表案内" }
      - { id: "3", order: "3", value: "転送" }
      - { id: "6", order: "6", value: "時間外" }
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理 2=代表案内 3=転送 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: ""

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規予約"
      - "変更"
      - "キャンセル"
      - "問合せ"
    notes: |
      DTMF 1=新規予約, 2=変更, 3=キャンセル, 4=問合せ。
      Gen1「用件聞き取り.yaml」の用件分類 + DTMF 4-way + 復唱確認 4 種を統合。
      接種後体調エンティティは問合せルート内で別途確認するため、ここでは
      問合せ分類に集約（OpenAI prompt に「接種後の体調」発話は問合せに分類する旨を
      明記）。

  - order: 2
    name: "接種後体調確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: |
      Gen1「接種後の体調か確認」: 問い合わせ内容が接種後体調不良かの判定。
      はい → END_接種後体調代表案内（0766-52-2156）。
      いいえ → 通常の問合せ内容聴取へ。
      ※ save_to は便宜上 reason を流用（実体は分岐用 yes/no）。

  - order: 3
    name: "問合せ内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: |
      Gen1「問合せ内容.yaml 問合せ内容」: 自由テキスト hearing。
      OpenAI 不要（output_format: text のみ）。reason context に保存。

  - order: 4
    name: "既存予約日聴取_キャンセル"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: |
      Gen1「予約日の聞き取り.yaml」: 既存予約日の聴取。
      「わからない」発話は OpenAI 出力で空文字を許容（reservationDate 未保存で進行）。
      過去日が含まれる場合 +1 年補正は OpenAI prompt 内で吸収（prompter 指示）。

  - order: 5
    name: "既存予約日聴取_変更"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: |
      Gen1「予約日の聞き取り.yaml」: 既存予約日の聴取（変更ルート）。
      キャンセル時と同じテンプレ + 同じ context 保存先。

  - order: 6
    name: "ワクチン種類聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "vaccineType"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "インフルエンザ"
      - "新型コロナ"
      - "同時接種"
    notes: |
      Gen1「予防接種の種類聞き取り.yaml」: 3-way enum。
      復唱確認 3 種 (echo_back: true)。
      vaccineType context に保存。entity_classification.md の R1_STT_PROPER_NOUN_GROUP
      37 件（ワクチン種類エンティティ）を STT additional_words に直書き。

  - order: 7
    name: "予約希望日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "desiredDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: |
      Gen1「予約希望日.yaml 希望日の聞き取りへ」: 接種日の聴取。
      接種日候補は病院側で限定（接種日がシーズンごとに変更）→ TTS に動的接種日を埋め込み。
      desiredDate context（YYYY-MM-DD）に保存 + 表示用 desiredDate_jp も別途保存
      （prompter で正規化指示）。

  - order: 8
    name: "希望時間選択"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredTime"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: |
      Gen1「希望時間回答」+「Time wishes?」: 自由テキスト hearing。
      OpenAI で「14:30」「2 時半」等を HH:MM 形式に正規化。
      「いいえ」発話時は空文字を出力（API 側で未マッチ判定 → 別時間案内ループ）。

  - order: 9
    name: "予約日時復唱確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "reason"          # 便宜上 reason 流用（分岐用 yes/no）
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: |
      Gen1「復唱確認（ワクチン・予約日時）」+「予約日時確認（肯定否定）.yaml」:
      ワクチン種類 + 予約希望日 + 希望時間の最終確認。
      echo_back: true で内容復唱（vaccineType + desiredDate_jp + desiredTime）。
      ※ save_to は便宜上 reason を流用（実体は分岐用 yes/no）。

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: |
      ご用件を、次の4つから、お選びください。
      「予約する」、「変更する」、「キャンセルする」、「その他問い合わせ」、
      それでは、お話ください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values: ["新規予約", "変更", "キャンセル", "問合せ"]
      mapping:
        - input: "DTMF 1, 一番, 予防接種, 予約, 予約をしたい, 予約お願い, 予約をとる 等"
          output: "新規予約"
        - input: "DTMF 2, 二番, 変更, 変えたい, 延期, 取り直す, 別の 等"
          output: "変更"
        - input: "DTMF 3, 三番, キャンセル, 取り消し, やめる, 取消 等"
          output: "キャンセル"
        - input: "DTMF 4, 四番, 問い合わせ, その他, 教えて, 聞きたい, 予約確認, 日時確認, 接種後の体調 等"
          output: "問合せ"
      no_result_condition: "上記いずれにも該当しない / 「もしもし」のみ等"
    save_to: "classification"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"
    retry_failure_announcement: |
      申し訳ございません。うまく聞き取ることができませんでした。
      恐れ入りますが、日曜、祝日を除く、月曜から金曜の、9時から15時、
      土曜の、9時から11時に、健診センターへおかけなおしください。
      電話番号は、0766-52-2473です。繰り返します。0766-52-2473です。
      繰り返します。0766-52-2473です。
      それでは失礼いたします。

  - step_name: "接種後体調確認"
    tts_announcement: |
      問い合わせの内容は、「接種後の体調不良について」でしょうか？
      はい、そうです、または、いいえ、違います、のようにお答えください。
    input_method: "voice_only"
    openai_rules:
      output_values: ["はい", "いいえ"]
      mapping:
        - input: "はい, そうです, 接種後の体調, 体調が悪い, 接種した後 等"
          output: "はい"
        - input: "いいえ, 違います, 別の, 違う 等"
          output: "いいえ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "reason"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "問合せ内容聴取"
    tts_announcement: "お問い合わせの内容を簡潔にお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "（OpenAI 不要。自由テキスト保存）"
    save_to: "reason"
    next_step: "問合せ_氏名繋ぎ_アナウンス"
    retry_failure: "end_failure"

  - step_name: "既存予約日聴取_キャンセル"
    tts_announcement: |
      現在の予約日をお話ください。
      わからない方は「わからない」とお話ください。
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD 形式の日付", "（空文字: わからない発話の場合）"]
      mapping:
        - input: "12月26日, 12月26, 来月の26日 等"
          output: "YYYY-12-26（過去日なら +1 年補正）"
        - input: "わからない, 覚えていない, 忘れた 等"
          output: "（空文字 / NO_RESULT）"
      no_result_condition: "日付発話なし"
    save_to: "reservationDate"
    next_step: "キャンセル_氏名繋ぎ_アナウンス"
    retry_failure: "end_failure"

  - step_name: "既存予約日聴取_変更"
    tts_announcement: |
      現在の予約日をお話ください。
      わからない方は「わからない」とお話ください。
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD 形式の日付", "（空文字: わからない発話の場合）"]
      mapping:
        - input: "12月26日, 12月26, 来月の26日 等"
          output: "YYYY-12-26（過去日なら +1 年補正）"
        - input: "わからない, 覚えていない, 忘れた 等"
          output: "（空文字 / NO_RESULT）"
      no_result_condition: "日付発話なし"
    save_to: "reservationDate"
    next_step: "変更_再予約_アナウンス"
    retry_failure: "end_failure"

  - step_name: "ワクチン種類聴取"
    tts_announcement: |
      接種希望のワクチンを、次の3つのうちの、いずれかでお話ください。
      「インフルエンザワクチンのみ」、「新型コロナワクチンのみ」、「二つの同時接種」、
      それではお話ください。
    input_method: "voice_only"
    openai_rules:
      output_values: ["インフルエンザ", "新型コロナ", "同時接種"]
      mapping:
        - input: "インフル, インフルエンザ, インフルエンザワクチン, いう円座, ザ博打ん 等（誤認識バリアント含む）"
          output: "インフルエンザ"
        - input: "コロナ, コロナウイルス, 新型, 新型コロナ, 新型コロナワクチン 等"
          output: "新型コロナ"
        - input: "同時, 同時に, 一緒, 一緒に, 二つ, 二つとも, ふたつ, 両方, どちらも, あわせて 等"
          output: "同時接種"
      no_result_condition: "上記いずれにも該当しない / 「もしもし」のみ等"
    save_to: "vaccineType"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

  - step_name: "予約希望日聴取"
    tts_announcement: |
      接種は午後に実施しています。接種日は、TODO_接種日（最新シーズンの接種日。例: 1月26日月曜日）です。
      ご都合の良い日を、お話ください。
    input_method: "voice_only"
    openai_rules:
      output_values: ["YYYY-MM-DD 形式の日付"]
      mapping:
        - input: "1月26日, 1月26日月曜日 等"
          output: "YYYY-01-26"
      no_result_condition: "日付発話なし"
    save_to: "desiredDate"
    next_step: "augment_API空き枠確認"
    retry_failure: "end_failure"
    retry_failure_announcement: |
      申し訳ございません。うまく聞き取ることができませんでした。
      恐れ入りますが、日曜、祝日を除く、月曜から金曜の、9時から15時、
      土曜の、9時から11時に、健診センターへおかけなおしください。
      電話番号は、0766-52-2473です。繰り返します。0766-52-2473です。
      繰り返します。0766-52-2473です。
      それでは失礼いたします。

  - step_name: "希望時間選択"
    tts_announcement: |
      ご希望のお時間をお話ください。
    input_method: "voice_only"
    openai_rules:
      output_values: ["HH:MM 形式の時刻", "（空文字: いいえ発話の場合）"]
      mapping:
        - input: "14時30分, 2時半, 14:30 等"
          output: "14:30"
        - input: "いいえ, 違います, ない 等"
          output: "（空文字 / NO_RESULT）"
      no_result_condition: "時刻発話なし"
    save_to: "desiredTime"
    next_step: "augment_API時間枠ロック"
    retry_failure: "end_failure"

  - step_name: "予約日時復唱確認"
    tts_announcement: |
      <% vaccineType %>の、<% desiredDate_jp %>、<% desiredTime %>のご予約でよろしいでしょうか？
    input_method: "voice_only"
    openai_rules:
      output_values: ["はい", "いいえ"]
      mapping:
        - input: "はい, そうです, OK, 大丈夫, 違いない 等"
          output: "はい"
        - input: "いいえ, 違います, 別の, ない 等"
          output: "いいえ"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "reason"
    next_step: "（conditions で分岐）"
    retry_failure: "end_failure"

