# --- セクション11: 特記事項・制約 ---
special_notes:
  - "施設名は「真生会富山病院」（しんせいかいとやまびょういん）。富山県射水市の中核病院。同施設には診療（アイセンター）と予防接種の 2 フローが並列稼働。本設計書は予防接種専用窓口。"
  - "代表電話「0766-52-2156」は接種後体調不良問合せ専用の案内先（END_接種後体調代表案内）。"
  - "健診センター「0766-52-2473」は 3 回失敗時のフォールバック案内先（END_聴取失敗）。診療側の「アイセンター 0766-52-6979」とは別番号で、混同禁止。"
  - "接種費用の一般料金（インフル 4,000円 / コロナ 15,300円 / 同時 = インフル 4,000円・コロナ 15,300円）は施設指定金額。prompter で改変禁止。"
  - "予防接種専用窓口のため診療科聴取は無し。代わりにワクチン種類聴取（インフルエンザ / 新型コロナ / 同時接種）を vaccineType context に保存。clinicalDepartment context は標準フィールドとして空のまま保持。"
  - "1 通話 1 名分のみ運用（家族複数名一括予約不可）。ワクチン種類聴取の直前に必ず告知（director 省略禁止）。"
  - "接種日は病院側で限定（接種日候補がシーズンごとに変更）。予約希望日聴取 TTS の「接種日は、TODO_接種日です」は毎シーズン更新が必要。confirmation_items の BLOCKER 参照。"
  - "稼働期間制限（接種シーズン限定運用）。Gen1 では「9/24 まで稼働前アナウンス」「1/26 から終了アナウンス」で年内ガードしていた。Gen3 では acceptance_times に年内範囲設定 or 別 announcement で対応する。シーズン開始日・終了日は毎年運用担当に要確認。"
  - "Brekeke 側カスタム API（API_CHECK_BOOKING / API_CHECK_TIME / API_CHECK_FRAME_AND_LOCK / API_BOOKING）の利用可否は Dr.JOY 担当に要確認。利用不可の場合は予約完結フローを「案内のみ」に縮退する判断が必要（confirmation_items BLOCKER 参照）。"
  - "Gen1 の case 数膨大な count／再質問ロジックは Gen3 の標準 Retry モジュール（retry_count + Retry node）に集約。"
  - "Gen1 の <? $clinical_department ?> 変数は予防接種では「インフルエンザワクチン」「新型コロナワクチン」「同時接種」のいずれかが入る変数だったが、Gen3 では vaccineType に分離してフィールドを明示化。"
  - "終話 TTS（補足等）の「予約内容を二重に読み上げる長文構成」は Gen1 当時の高齢者向け配慮を Gen3 でも維持（簡略化禁止）。"
  - "Gen1 の「キャンセル時は入電番号セットのみで電話番号聴取なし」を Gen3 でも踏襲（jump_電話番号聴取_キャンセル を配置せず、telephoneNumber で代替）。Dr.JOY 側で追加電話番号必要なら confirmation_items 参照。"
  - "echo_back: true の対象: 用件確認 / ワクチン種類聴取 / 予約希望日聴取 / 予約日時復唱確認。氏名・生年月日・電話はサブフロー内で完結し、メインフローでは echo_back 配置しない。"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  # === BLOCKER ===
  - item: |
      [BLOCKER] 接種日（最新シーズンの接種実施日）。Gen1 当時は「1月26日月曜日」固定だったが、
      毎シーズンの接種実施日は変動する。予約希望日聴取の TTS 内「接種日は、TODO_接種日です」
      および END_新規予約完了 / END_変更完了 内の動的部分を確定する必要がある。
      運用担当に最新シーズン（2026 年秋〜2027 年冬想定）の接種実施日を要確認。
      確認後、予約希望日聴取モジュールの IVR プロパティ（gen_properties で生成される
      properties_*.md）または scaffold 側で動的接種日プレースホルダ（<% vaccineDate %>）を
      埋め込む方式に切り替える。
    resolved: false
  - item: |
      [BLOCKER] Brekeke 側カスタム API（4 種）の利用可否。
        - API_CHECK_BOOKING（指定日の空き枠数取得）
        - API_CHECK_TIME（指定時刻の空き有無確認）
        - API_CHECK_FRAME_AND_LOCK（指定枠の一時ロック）
        - API_BOOKING（予約確定）
      これらが Dr.JOY 連携 API として用意されていない場合、予約完結フローを実装不可。
      代替案: 予約案内のみフロー（接種日・時間希望聴取後、API 呼出を省略して
      「ご希望をお伺いしました。担当者より折返し連絡いたします」終話）に縮退する判断が必要。
      Dr.JOY 担当・運用担当に要確認。
    resolved: false
  - item: |
      [BLOCKER] 稼働期間（接種シーズンの開始日・終了日）。
      Gen1 では「9/25 から開始」「1/26 から終了」だったが、毎年の接種シーズンに合わせて
      変更が必要。シーズン外時は acceptance_times の範囲外として時間外アナウンスで
      ガードするか、「稼働前アナウンス」「今年度終了アナウンス」を別 announcement で
      実装するかの方針を運用担当に確認。
    resolved: false

  # === NON-BLOCKER ===
  - item: |
      office_id（Dr.JOY 施設ID）— Dr.JOY 管理画面で確認。設計書・フローJSONには不要。
    resolved: false
  - item: |
      着信ARS番号 / 050番号（デモ・本番）— Brekeke 設定時に IVR プロパティで設定。
    resolved: false
  - item: |
      キャンセル時の電話番号聴取要否。Gen1 では入電番号セットのみで電話番号聴取なしだが、
      Dr.JOY 側で「キャンセル時も追加電話番号が必要」と判断する場合は
      jump_電話番号聴取_キャンセル を END_キャンセル完了 直前に追加する。
      初期実装は Gen1 踏襲（電話番号聴取省略）で進める前提。
    resolved: false
  - item: |
      終話 TTS「END_新規予約完了」「END_変更完了」内の二重予約内容復唱。
      Gen1 の「補足」箱の長文構造（マスク着用 + 接種券持参 + 内容再復唱 + 注意事項再案内）を
      Gen3 でも完全踏襲したが、運用上「2 重復唱は冗長」と判断される場合は注意事項のみに
      簡略化可能。CS 側に確認の上、文言を確定。
    resolved: false
  - item: |
      Gen1「希望時間回答」の 1〜4 件 / 5+ 件で TTS 分岐するロジックは Gen3 では「0 件 /
      1 件以上」の 2-way に簡略化したが、CS が「1 件のみ提示時は復唱確認に直結したい」
      「5+ 件は時間自由聴取にしたい」等の細かい挙動を要望する場合は
      augment_API空き枠確認 の戻り値で context_match_router を 3-way に再設計する。
    resolved: false
  - item: |
      予約希望日聴取で「接種日 = 1 日のみ」の Gen1 仕様を Gen3 でも維持するかどうか。
      シーズンによっては「1/26 月 / 1/27 火」等の複数候補が出る可能性。
      複数候補の場合は予約希望日聴取 TTS のテンプレ（接種日リスト）を変更する必要あり。
    resolved: false
  - item: |
      Gen1「3回失敗アナウンス（健診センター案内）」での電話番号 3 回繰り返しは
      Gen3 でも維持。Gen1 では同一文言で「繰り返します」を 3 回挿入する形式だった
      ため END_聴取失敗 / END_接種後体調代表案内 / END_時間外（健診センター案内系）
      でも同様の繰り返し構造を維持。文言短縮要望があれば確認の上で削減。
    resolved: false
  - item: |
      代表電話番号案内終話（END_接種後体調代表案内 = 0766-52-2156）と健診センター
      番号案内終話（END_聴取失敗 = 0766-52-2473）は完全に別ルートとして実装。
      Gen1 の混同しやすい表記を Gen3 では「接種後体調代表案内」「健診センター案内」と
      終話名に明示的に使い分けた。Dr.JOY 側で誤って同じ status 値（status=2）に
      集計されないよう、Dr.JOY 管理画面側で別ステータスに分けるかの確認。
    resolved: false
  - item: |
      desiredDate_jp / startTimeList の表示用フォーマット（例: 「1月26日月曜日」「14:00, 14:30, 15:00」）の
      生成ロジック。Brekeke 側 Script モジュールで保存するか、augment_API空き枠確認 から
      返ってきたデータをそのまま参照するかは Dr.JOY 担当との実装擦り合わせが必要。
    resolved: false
