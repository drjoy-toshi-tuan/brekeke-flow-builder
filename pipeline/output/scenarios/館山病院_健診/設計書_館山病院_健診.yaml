# --- セクション3: フローの目的 ---
purpose: "館山病院の健診予約専用AI電話。個人/企業を分岐し、予約・変更・キャンセル・問い合わせの4用件に対応する。予約ルートでは受診歴（初診/再診）・コース・予約希望日を聴取し、単独検査希望や当日予約は代表電話案内に誘導する。全用件で受診者（個人）または担当者（企業）の氏名・連絡先電話番号を聴取し、折り返し受付を自動化する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "館山病院$健診_20260410"
    diagram: |
      ======= 冒頭チェーン =======
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├── 非通知 → 完了フラグ_非通知(status=2, smsFlag=-1) → 非通知_アナウンス(TTS) → 切断
            └── 通常/携帯/固定 → acceptance_times
                  ├── 時間外/TIMEOUT/ERROR → 完了フラグ_時間外(status=6, smsFlag=-1) → 時間外_アナウンス(TTS) → 切断
                  └── 受付可(true) → 冒頭_アナウンス(TTS)

      ======= 個人企業確認 =======
      冒頭_アナウンス(TTS)
        → 個人企業_確認(TTS) → 入力_個人企業確認(DTMF AmiVoice STT, max_dtmf_length=1)
          → OpenAI_個人企業(generate_by_OpenAI)
              ├── 個人 → 用件_確認
              ├── 企業 → 用件_確認
              └── NO_RESULT → リトライ_個人企業 → [Retry→個人企業_確認 / No more→用件_確認]

      ======= 用件確認 =======
      用件_確認(TTS) → 入力_用件確認(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_用件(generate_by_OpenAI)
            ├── 予約 → 予約ルート（予約_受診歴確認）
            ├── 変更 → 変更ルート（変更_予約日）
            ├── キャンセル → キャンセルルート（キャンセル_予約日）
            ├── 問い合わせ → 問い合わせルート（問い合わせ_内容）
            └── NO_RESULT → リトライ_用件 → [Retry→用件_確認 / No more→END_FAQ外_代表電話案内]

      ======= 予約ルート =======
      予約_受診歴確認(TTS) → 入力_受診歴(AmiVoice STT)
        → OpenAI_受診歴(generate_by_OpenAI)
            ├── 初診 → 予約_コース聴取
            ├── 再診 → 予約_前回コース確認(TTS) → 入力_前回コース(AmiVoice STT)
            │           → OpenAI_前回コース → 予約_コース聴取
            └── NO_RESULT → リトライ_受診歴 → [Retry / No more→予約_コース聴取]

      予約_コース聴取(TTS) → 入力_コース(AmiVoice STT)
        → OpenAI_コース(generate_by_OpenAI)
            ├── 単独検査 → END_単独検査対応不可チェーン
            ├── {コース名} → 予約_希望日
            └── NO_RESULT → リトライ_コース

      予約_希望日(TTS) → 入力_希望日(AmiVoice STT)
        → OpenAI_予約希望日(generate_by_OpenAI)
            ├── 当日 → END_当日予約不可_希望日チェーン
            ├── {日付テキスト} → CMR_企業個人_予約
            └── NO_RESULT → リトライ_予約希望日

      CMR_企業個人_予約(ContextMatchRouter: OpenAI_個人企業)
        ├── 企業 → 予約_希望人数_企業(TTS) → 入力_希望人数_企業(AmiVoice STT)
        │           → OpenAI_希望人数_企業 → 企業名_聴取(TTS) → 入力_企業名(AmiVoice STT)
        │           → OpenAI_企業名 → ジャンプ_氏名聴取 → ジャンプ_電話番号聴取
        └── 個人 → 予約_希望人数_個人(TTS) → 入力_希望人数_個人(AmiVoice STT)
                    → OpenAI_希望人数_個人 → ジャンプ_氏名聴取 → ジャンプ_生年月日聴取
                    → CMR_診察券_予約(ContextMatchRouter: OpenAI_受診歴)
                          ├── 初診 → ジャンプ_電話番号聴取
                          └── 再診/その他 → ジャンプ_診察券番号聴取 → ジャンプ_電話番号聴取

      [電話番号聴取サブフローから戻り]
        → ジャンプ_RAG_終話前 → [RAG検索サブフローから戻り]
        → ラスト_質問(TTS) → 入力_ラスト質問(AmiVoice STT)
          → OpenAI_ラスト質問(generate_by_OpenAI)
              ├── 単独検査 → END_単独検査対応不可チェーン
              └── {テキスト} → END_終話チェーン(status=1, smsFlag=1)

      ======= 変更ルート =======
      変更_予約日(TTS) → 入力_変更予約日(AmiVoice STT)
        → OpenAI_変更予約日(generate_by_OpenAI)
            ├── 当日 → END_当日予約不可_予約日チェーン
            ├── {日付テキスト} → 変更_変更項目
            └── NO_RESULT → リトライ_変更予約日

      変更_変更項目(TTS) → 入力_変更項目(AmiVoice STT)
        → OpenAI_変更項目(generate_by_OpenAI)
            ├── 変更内容 → 変更_変更内容(TTS) → 入力_変更内容(AmiVoice STT)
            │               → OpenAI_変更内容
            │                   ├── 単独検査 → END_単独検査対応不可チェーン
            │                   └── {テキスト} → CMR_企業個人_変更
            ├── 日程変更 → 変更_日程変更(TTS) → 入力_日程変更(AmiVoice STT)
            │               → OpenAI_日程変更
            │                   ├── 当日 → END_当日予約不可_希望日チェーン
            │                   └── {テキスト} → CMR_企業個人_変更
            └── NO_RESULT → リトライ_変更項目

      CMR_企業個人_変更(ContextMatchRouter: OpenAI_個人企業)
        ├── 企業 → 企業名_聴取 → ジャンプ_氏名聴取 → ジャンプ_電話番号聴取
        └── 個人 → ジャンプ_氏名聴取 → ジャンプ_生年月日聴取
                    → ジャンプ_診察券番号聴取 → ジャンプ_電話番号聴取
      → ラスト質問 → END_終話

      ======= キャンセルルート =======
      キャンセル_予約日(TTS) → 入力_キャンセル予約日(AmiVoice STT)
        → OpenAI_キャンセル予約日
            ├── 当日 → END_当日予約不可_予約日チェーン
            ├── {日付テキスト} → キャンセル_希望日
            └── NO_RESULT → リトライ_キャンセル予約日

      キャンセル_希望日(TTS) → 入力_キャンセル希望日(AmiVoice STT)
        → OpenAI_キャンセル希望日
            ├── 当日 → END_当日予約不可_希望日チェーン
            ├── {日付テキスト} → CMR_企業個人_キャンセル
            └── NO_RESULT → リトライ_キャンセル希望日

      CMR_企業個人_キャンセル(ContextMatchRouter: OpenAI_個人企業)
        ├── 企業 → 企業名_聴取 → ジャンプ_氏名聴取 → ジャンプ_電話番号聴取
        └── 個人 → ジャンプ_氏名聴取 → ジャンプ_生年月日聴取
                    → ジャンプ_診察券番号聴取 → ジャンプ_電話番号聴取
      → ラスト質問 → END_終話

      ======= 問い合わせルート =======
      問い合わせ_内容(TTS) → 入力_問い合わせ(AmiVoice STT)
        → OpenAI_問い合わせ
            ├── 単独検査 → END_単独検査対応不可チェーン
            ├── {テキスト} → CMR_企業個人_問い合わせ
            └── NO_RESULT → リトライ_問い合わせ

      CMR_企業個人_問い合わせ(ContextMatchRouter: OpenAI_個人企業)
        ├── 企業 → 企業名_聴取 → ジャンプ_氏名聴取 → ジャンプ_電話番号聴取
        └── 個人 → ジャンプ_氏名聴取 → ジャンプ_生年月日聴取
                    → ジャンプ_診察券番号聴取 → ジャンプ_電話番号聴取
      → ラスト質問 → END_終話

      ======= 終話チェーン =======
      END_終話: 完了フラグ_終話(status=1, smsFlag=1) → END_終話アナウンス(TTS) → 切断
      END_単独検査対応不可: 完了フラグ_単独検査(status=2, smsFlag=-1) → END_単独検査アナウンス(TTS) → 切断
      END_当日予約不可_予約日: 完了フラグ_当日予約日(status=2, smsFlag=-1) → END_当日予約不可_予約日アナウンス(TTS) → 切断
      END_当日予約不可_希望日: 完了フラグ_当日希望日(status=2, smsFlag=-1) → END_当日予約不可_希望日アナウンス(TTS) → 切断
      END_FAQ外_代表電話案内: 完了フラグ_FAQ外(status=2, smsFlag=-1) → END_FAQ外アナウンス(TTS) → 切断
      END_聴取失敗: 完了フラグ_聴取失敗(status=3, smsFlag=-1) → END_聴取失敗アナウンス(TTS) → 切断
    notes: |
      冒頭チェーン: wait → saveContextModel2DB → incoming-classifier → acceptance_times。
      企業個人分岐は複数箇所のContextMatchRouterでOpenAI_個人企業の出力を参照。
      診察券判定は予約ルートのみCMR_診察券_予約（OpenAI_受診歴参照）で初診をスキップ。
      変更/キャンセル/問い合わせの個人パスでは常に診察券聴取。

