# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # --- 標準フィールド（itemDefault: true） ---
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "初診"
      - order: "2"
        value: "再診"
      - order: "3"
        value: "変更"
      - order: "4"
        value: "キャンセル"
      - order: "5"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。予約ルートでは受診歴確認後に初診/再診に更新"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "個人=受診者名、企業=担当者名。氏名聴取サブフローで聴取"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "個人パスかつ初診以外のみ聴取。8桁以内。診察券番号聴取サブフロー"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "個人パスのみ。生年月日聴取サブフロー（復唱あり）"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
