# --- セクション11: 特記事項・制約 ---
special_notes:
  - "単独検査判定ルール: 検査項目が1種類のみで、健診・ドック・セット・オプション・追加等の複合表現を含まない場合に「単独検査」と判定する。ただしAI認知症予防検査は単独検査ではない。詳細はGen2プロンプト【5. 単独検査の説明・判定案内】を参照し、prompterがOpenAIプロンプトに反映すること"
  - "当日予約不可: 日付関連の各OpenAIモジュールで「今日」または着信日時の月日と同一日付を検出した場合、「当日」を出力して代表電話案内に分岐する。OpenAIプロンプトに着信日時情報を渡す必要あり"
  - "氏名はカタカナ表記で保存: Gen2仕様に従い、OpenAIプロンプトで氏名を全てカタカナに変換して保存する指示を含める"
  - "複数名受診: 予約ルートで2名以上の受診がある場合、1人目はpatientName/patientDateOfBirthに格納し、2人目以降はreasonにカタカナ氏名+yyyy-MM-dd形式で格納する。OpenAIプロンプトで対応"
  - "個人/企業パスの違い: 企業パスでは生年月日・診察券番号を聴取しない。個人パスでは初診の場合に診察券番号をスキップする"
