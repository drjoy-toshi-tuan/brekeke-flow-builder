        - input: "「今日」または着信日時の月日と同一日付"
          output: "当日"
        - input: "具体的な日付の発話"
          output: "日付テキスト（フリーワード格納）"
      no_result_condition: "日付として認識できない発話"
    save_to: "reservationDate"
    next_step: "当日→END_当日予約不可_予約日 / その他→キャンセル_希望日"
    retry_failure: "skip"

  - step_name: "キャンセル_希望日"
    tts_announcement: "次回の受診希望日が決まっていれば、お日にちを4月1日のようにお話しください。ない場合はないとお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "当日"
        - "日付テキスト"
        - "NO_RESULT"
      mapping:
        - input: "「今日」または着信日時と同一日付"
          output: "当日"
        - input: "「ない」「ありません」「未定」等"
          output: "なし"
        - input: "具体的な日付の発話"
          output: "日付テキスト（フリーワード格納）"
      no_result_condition: "音声認識結果が空"
    save_to: "Preferred_date"
    next_step: "当日→END_当日予約不可_希望日 / その他→CMR_企業個人_キャンセル"
    retry_failure: "skip"

  - step_name: "問い合わせ内容"
    tts_announcement: "お問い合わせの内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "単独検査"
        - "フリーテキスト"
      mapping:
        - input: "単独検査と判定される内容（単独検査判定ルール準拠）"
          output: "単独検査"
        - input: "上記以外の発話"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "単独検査→END_単独検査対応不可 / その他→CMR_企業個人_問い合わせ"
    retry_failure: "skip"

  - step_name: "ラスト質問"
    tts_announcement: "そのほか健診センターへお伝えしたいことがあればお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "単独検査"
        - "フリーテキスト"
      mapping:
        - input: "単独検査と判定される内容（単独検査判定ルール準拠）"
          output: "単独検査"
        - input: "上記以外の発話"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason3"
    next_step: "単独検査→END_単独検査対応不可 / その他→END_終話チェーン"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須） ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（電話番号聴取等）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_終話"
    condition: "全聴取完了（予約/変更/キャンセル/問い合わせの全ルート共通）"
    tts_announcement: "かしこまりました。お申し込みを受付いたしました。内容を確認のうえ、3診療日以内に折り返しご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_終話"

  # --- 代表電話案内系 ---
  - name: "END_単独検査対応不可"
    condition: "コース聴取/変更内容/問い合わせ内容/ラスト質問で単独検査と判定"
    tts_announcement: "単独検査については、AI電話では対応できません。恐れ入りますが、代表電話「0470-23-5030」へおかけ直しください。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_単独検査"
  - name: "END_当日予約不可_予約日"
    condition: "変更/キャンセルの予約日が着信当日"
    tts_announcement: "当日のご予約についてはAI電話ではご対応できませんので、代表電話の「TODO_要確認」におかけ直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_当日予約日"
    notes: "BLOCKER B-1: Gen2に046-227-1131と記載されているが、館山病院の代表電話は0470-23-5030。正しい番号を確認すること"
  - name: "END_当日予約不可_希望日"
    condition: "予約希望日/キャンセル希望日/日程変更希望日が着信当日"
    tts_announcement: "当日のご予約についてはAI電話ではご対応できませんので、代表電話の「0470-23-5030」におかけ直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_当日希望日"
  - name: "END_FAQ外_代表電話案内"
    condition: "用件確認のリトライ上限到達"
    tts_announcement: "ご質問いただいた内容はAI電話ではご対応できませんので、代表電話の「0470-23-5030」におかけ直しください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_FAQ外"

