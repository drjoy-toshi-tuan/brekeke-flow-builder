# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "個人企業確認"
    tts_announcement: "個人健診ですか？はい、または、いいえでお答えください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "個人"
        - "企業"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」「個人」「一人」「家族」「夫」「妻」「本人」等の肯定・個人関連語"
          output: "個人"
        - input: "DTMF 2 または「いいえ」「違います」「企業」「会社」「担当者」「団体」「医療機関」「スタッフ」「健保組合」等の否定・企業関連語"
          output: "企業"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "company_check"
    next_step: "用件_確認"
    retry_failure: "skip"

  - step_name: "用件確認"
    tts_announcement: "ご用件を次のうちいずれかでお話しください。1、健診の予約。2、予約変更。3、予約キャンセル。4、その他問合せ。それではお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「健診」「検診」「ドック」「薬」「お薬」等の予約関連語"
          output: "予約"
        - input: "DTMF 2 または「変更」「取り直したい」「変えたい」「別の」等の変更関連語"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「やめる」「取り消し」等のキャンセル関連語"
          output: "キャンセル"
        - input: "DTMF 4 または「問い合わせ」「聞きたい」「質問」等の問い合わせ関連語"
          output: "問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→予約_受診歴確認 / 変更→変更_予約日 / キャンセル→キャンセル_予約日 / 問い合わせ→問い合わせ_内容"
    retry_failure: "end_failure"

  - step_name: "受診歴確認"
    tts_announcement: "当院のご予約は初めてですか？2回目以降のご予約ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "初診"
        - "再診"
        - "NO_RESULT"
      mapping:
        - input: "「初めて」「はじめて」「初めてです」「初回」等"
          output: "初診"
        - input: "「2回目」「二回目以降」「前回も」「昨年も」「診察券あります」等"
          output: "再診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "Medical_history"
    next_step: "初診→予約_コース聴取 / 再診→予約_前回コース確認"
    retry_failure: "skip"

  - step_name: "前回コース確認"
    tts_announcement: "前回と同じコースをご希望ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "前回と同じ"
        - "前回と違う"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「同じ」「同じです」等の肯定"
          output: "前回と同じ"
        - input: "「いいえ」「違う」「違います」「変えたい」等の否定"
          output: "前回と違う"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "checking_details"
    next_step: "予約_コース聴取"
    retry_failure: "skip"

  - step_name: "コース聴取"
    tts_announcement: "それでは、受診を希望されるコースを「人間ドック」、「特定健診」、「協会一般健診」などのようにお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "人間ドック"
        - "脳ドック"
        - "雇入時健診"
        - "生活習慣病健診"
        - "法定健診A_B"
        - "特定健診"
        - "協会一般健診"
        - "AI認知症予防検査"
        - "単独検査"
        - "NO_RESULT"
      mapping:
        - input: "「ドック」「一日ドック」「日帰りドック」「人間ドック」「人間ロック」「ロック」「人間独」"
          output: "人間ドック"
        - input: "「脳ドック」「脳検査」「脳」"
          output: "脳ドック"
        - input: "「雇入時」「雇入れ前」「雇用前」「入社時」「入社前」"
          output: "雇入時健診"
        - input: "「生活習慣病」「生活予防」"
          output: "生活習慣病健診"
        - input: "「法定」「法定11項目」「法定健診A」「法定健診B」"
          output: "法定健診A_B"
        - input: "「特定健診」「特定健康診査」「特定健康検査」"
          output: "特定健診"
        - input: "「協会」「一般健診」「全国健康保険協会」"
          output: "協会一般健診"
        - input: "「認知症」「認知症予防」「AI認知症」"
          output: "AI認知症予防検査"
        - input: "検査項目が1種類のみで、健診・ドック・セット・オプション等の複合表現を含まない（単独検査判定ルール準拠）。ただしAI認知症予防検査は単独検査ではない"
          output: "単独検査"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない、または発話内容がリストに存在しない"
    save_to: "course"
    next_step: "単独検査→END_単独検査対応不可 / その他→予約_希望日"
    retry_failure: "skip"

  - step_name: "予約希望日"
