# 設計書 — 井上病院附属診療所 健診
# 生成元: @director エージェント
# 生成日: 2026-05-07
# 作業種別: Gen1 → Gen3 移管
# 元資料: commubo抽出/【002】井上病院｜【003】ユアクリニック秋葉原｜【004】井上病院附属診療所/【0022井上病院附属診療所】健診1_M_本番/
# 確認レポート: output/scenarios/井上病院附属診療所_健診/確認レポート_井上病院附属診療所_健診_20260507.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "井上病院附属診療所"
  scenario_name: "健診"
  group_name: "井上病院附属診療所"
  flow_name: "井上病院附属診療所$健診"
  target_facility: "井上病院附属診療所 健診センター（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "0120-86-9370"
  business_hours: "祝日除く月〜土 9:00〜16:00（12/28〜1/4 年末年始は留保受付のみ）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "井上病院附属診療所$健診"
      role: "main"
      description: "メインフロー。顧客種別×用件 4 分岐の二軸マトリクスで受付処理"
  subflows:
    - name: "井上病院附属診療所$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人受診 × 変更/キャンセルルートのみ使用。Gen1 の和暦判定（大正/昭和/平成/令和）を Gen3 標準サブフローで吸収"
    - name: "井上病院附属診療所$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "全レーン共通。Gen1 の市外局番5/4/3/2 桁区切りロジックを Gen3 標準サブフローで吸収"

# --- セクション3: フローの目的 ---
purpose: |
  井上病院附属診療所 健診センターのフリーダイヤル 0120-86-9370 への入電を AI 電話で受け、
  顧客種別（企業/個人）と用件（新規健診予約 / 予約変更 / 予約キャンセル / その他問い合わせ）の
  二軸マトリクスで聴取項目を切り替えながら、担当者の折り返し対応に必要な情報を収集する。
  個人 × 新規予約のケースでは AI 電話聴取をスキップして WEB 予約 URL を SMS 送信する分岐を持つ。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "井上病院附属診療所$健診"
    diagram: |
      冒頭(wait) → コンテキスト設定 → 着信電話番号分類
        ├─ 非通知 → END_非通知
        └─ 通常   → 冒頭_アナウンス
                      → 入電時間判定(date_of_call_classifier)
                          ├─ 年末年始(12/28-1/4) → END_年末年始
                          ├─ 営業時間内(月-土 9-16) → 顧客種別確認
                          ├─ 時間外受付(月-土 16-17) → 時間外案内 → 顧客種別確認
                          └─ その他(夜間/日祝)     → END_時間外
            顧客種別確認(DTMF1=企業/2=個人) → 用件確認(DTMF1=新規/2=変更/3=キャンセル/4=問合せ)
              ├─ 新規 → CMR_新規(顧客種別)
              │   ├─ 個人 → WEB誘導_アナウンス → WEB申込確認
              │   │   ├─ 希望 → END_新規_WEB(smsFlag=2)
              │   │   └─ 不要 → 受診メニュー確認 → 詳細聴取 → 受診者名_新規個人
              │   │             → jump_電話番号 → END_受付完了_新規
              │   └─ 企業 → 受診メニュー確認_企業 → 詳細聴取_企業 → 企業名聴取_新規
              │             → 受診者名_新規企業 → jump_電話番号 → END_受付完了_新規
              ├─ 変更 → タイトル_変更_アナウンス → 現在の予約日聴取 → 変更内容確認
              │         → 変更該当者氏名聴取 → CMR_変更(顧客種別)
              │   ├─ 個人 → 受診者名_変更個人 → jump_生年月日 → jump_電話番号 → END_受付完了_変更
              │   └─ 企業 → 企業名聴取_変更 → 受診者名_変更企業
              │             → jump_電話番号 → END_受付完了_変更
              ├─ キャンセル → タイトル_キャンセル_アナウンス → 現在の予約日聴取_キャ
              │              → 変更該当者氏名聴取_キャ → 再受診予定確認 → CMR_キャンセル(顧客種別)
              │   ├─ 個人 → 受診者名_キャンセル個人 → jump_生年月日 → jump_電話番号
              │   │         → CMR_キャンセル終話(再受診予定)
              │   │             ├─ 予定あり → END_受付完了_キャンセル_有
              │   │             └─ 予定なし → END_受付完了_キャンセル_無
              │   └─ 企業 → 企業名聴取_キャ → 受診者名_キャンセル企業 → jump_電話番号
              │             → CMR_キャンセル終話(再受診予定)
              │                 ├─ 予定あり → END_受付完了_キャンセル_有
              │                 └─ 予定なし → END_受付完了_キャンセル_無
              └─ 問合せ → 詳細聴取_問合 → CMR_問合(顧客種別)
                  ├─ 個人 → 受診希望日聴取 → 受診者名_問合個人
                  │         → jump_電話番号 → END_受付完了_問合
                  └─ 企業 → 受診者名_問合企業 → jump_電話番号 → END_受付完了_問合
    notes: |
      4×2=8 ルートが基本だが、用件 hearing 直後に Pattern A で 4 分岐し、各ルート内で
      CMR を 1 枚使って顧客種別 2 分岐する構造。jump_電話番号 / jump_生年月日 はサブフロー化
      して個別ルートから複数回呼ばれる（Custom Jump to Flow）。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false   # date_of_call_classifier で年末年始込みの判定を行うため acceptance_times は使わない
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 入電時間判定

  # --- 入電時間判定（年末年始 / 営業時間内 / 時間外受付 / その他）---
  - step: 入電時間判定
    type: date_of_call_classifier
    conditions:
      - match: "年末年始"
        next: END_年末年始
      - match: "営業時間内"
        next: 顧客種別確認
      - match: "時間外受付"
        next: 時間外案内
      - match: "other"
        next: END_時間外

  - step: 時間外案内
    type: announcement
    next: 顧客種別確認

  # --- 顧客種別確認（DTMF 1=企業 / 2=個人）---
  - step: 顧客種別確認
    type: hearing
    output_format: enum
    conditions:
      - match: "企業"
        next: 用件確認
      - match: "other"   # 個人（DTMF 2 / 「個人」発話）
        next: 用件確認

  # --- 用件確認（DTMF 1=新規 / 2=変更 / 3=キャンセル / 4=問合せ）→ Pattern A 4 分岐 ---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "新規"
        next: CMR_新規分岐
      - match: "変更"
        next: タイトル_変更_アナウンス
      - match: "キャンセル"
        next: タイトル_キャンセル_アナウンス
      - match: "other"   # 問い合わせ（DTMF 4 / 「問い合わせ」発話）
        next: 詳細聴取_問合

  # ============== 新規ルート ==============
  - step: CMR_新規分岐
    type: context_match_router
    reference_module: "OpenAI_顧客種別確認"
    conditions:
      - match: "企業"
        next: 受診メニュー確認_企業
      - match: "other"   # 個人
        next: WEB誘導_アナウンス

  # --- 個人新規: WEB 誘導 ---
  - step: WEB誘導_アナウンス
    type: announcement
    next: WEB申込確認

  - step: WEB申込確認
    type: hearing
    output_format: enum
    conditions:
      - match: "希望"
        next: END_新規_WEB
      - match: "other"   # 不要 / 持っていない / 否定
        next: 受診メニュー確認_個人

  - step: 受診メニュー確認_個人
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 詳細聴取_新規個人

  - step: 詳細聴取_新規個人
    type: hearing
    output_format: text
    next: 受診者名_新規個人

  - step: 受診者名_新規個人
    type: hearing
    output_format: text
    next: jump_電話番号_新規

  # --- 企業新規 ---
  - step: 受診メニュー確認_企業
    type: hearing
    output_format: enum
    conditions:
      - match: "default"
        next: 詳細聴取_新規企業

  - step: 詳細聴取_新規企業
    type: hearing
    output_format: text
    next: 企業名聴取_新規

  - step: 企業名聴取_新規
    type: hearing
    output_format: text
    next: 受診者名_新規企業

  - step: 受診者名_新規企業
    type: hearing
    output_format: text
    next: jump_電話番号_新規

  # --- 新規ルート 共通: 電話番号サブフロー ---
  - step: jump_電話番号_新規
    type: subflow
    flowname: "井上病院附属診療所$電話番号聴取"
    next: END_受付完了_新規

  # ============== 変更ルート ==============
  - step: タイトル_変更_アナウンス
    type: announcement
    next: 現在の予約日聴取

  - step: 現在の予約日聴取
    type: hearing
    output_format: datetime
    next: 変更内容確認

  - step: 変更内容確認
    type: hearing
    output_format: text
    next: 変更該当者氏名聴取

  - step: 変更該当者氏名聴取
    type: hearing
    output_format: text
    next: CMR_変更分岐

  - step: CMR_変更分岐
    type: context_match_router
    reference_module: "OpenAI_顧客種別確認"
    conditions:
      - match: "企業"
        next: 企業名聴取_変更
      - match: "other"   # 個人
        next: 受診者名_変更個人

  # --- 個人変更 ---
  - step: 受診者名_変更個人
    type: hearing
    output_format: text
    next: jump_生年月日_変更

  - step: jump_生年月日_変更
    type: subflow
    flowname: "井上病院附属診療所$生年月日聴取"
    next: jump_電話番号_変更

  # --- 企業変更 ---
  - step: 企業名聴取_変更
    type: hearing
    output_format: text
    next: 受診者名_変更企業

  - step: 受診者名_変更企業
    type: hearing
    output_format: text
    next: jump_電話番号_変更

  # --- 変更共通: 電話番号サブフロー ---
  - step: jump_電話番号_変更
    type: subflow
    flowname: "井上病院附属診療所$電話番号聴取"
    next: END_受付完了_変更

  # ============== キャンセルルート ==============
  - step: タイトル_キャンセル_アナウンス
    type: announcement
    next: 現在の予約日聴取_キャ

  - step: 現在の予約日聴取_キャ
    type: hearing
    output_format: datetime
    next: 変更該当者氏名聴取_キャ

  - step: 変更該当者氏名聴取_キャ
    type: hearing
    output_format: text
    next: 再受診予定確認

  - step: 再受診予定確認
    type: hearing
    output_format: enum
    conditions:
      - match: "予定あり"
        next: CMR_キャンセル分岐
      - match: "other"   # 予定なし
        next: CMR_キャンセル分岐

  - step: CMR_キャンセル分岐
    type: context_match_router
    reference_module: "OpenAI_顧客種別確認"
    conditions:
      - match: "企業"
        next: 企業名聴取_キャ
      - match: "other"   # 個人
        next: 受診者名_キャンセル個人

  # --- 個人キャンセル ---
  - step: 受診者名_キャンセル個人
    type: hearing
    output_format: text
    next: jump_生年月日_キャ

  - step: jump_生年月日_キャ
    type: subflow
    flowname: "井上病院附属診療所$生年月日聴取"
    next: jump_電話番号_キャンセル

  # --- 企業キャンセル ---
  - step: 企業名聴取_キャ
    type: hearing
    output_format: text
    next: 受診者名_キャンセル企業

  - step: 受診者名_キャンセル企業
    type: hearing
    output_format: text
    next: jump_電話番号_キャンセル

  # --- キャンセル共通: 電話番号 → 終話分岐 ---
  - step: jump_電話番号_キャンセル
    type: subflow
    flowname: "井上病院附属診療所$電話番号聴取"
    next: CMR_キャンセル終話分岐

  - step: CMR_キャンセル終話分岐
    type: context_match_router
    reference_module: "OpenAI_再受診予定確認"
    conditions:
      - match: "予定あり"
        next: END_受付完了_キャンセル_有
      - match: "other"   # 予定なし
        next: END_受付完了_キャンセル_無

  # ============== 問合せルート ==============
  - step: 詳細聴取_問合
    type: hearing
    output_format: text
    next: CMR_問合分岐

  - step: CMR_問合分岐
    type: context_match_router
    reference_module: "OpenAI_顧客種別確認"
    conditions:
      - match: "企業"
        next: 受診者名_問合企業
      - match: "other"   # 個人
        next: 受診希望日聴取

  # --- 個人問合 ---
  - step: 受診希望日聴取
    type: hearing
    output_format: text
    next: 受診者名_問合個人

  - step: 受診者名_問合個人
    type: hearing
    output_format: text
    next: jump_電話番号_問合

  # --- 企業問合 ---
  - step: 受診者名_問合企業
    type: hearing
    output_format: text
    next: jump_電話番号_問合

  # --- 問合共通: 電話番号サブフロー ---
  - step: jump_電話番号_問合
    type: subflow
    flowname: "井上病院附属診療所$電話番号聴取"
    next: END_受付完了_問合

  # ============== 終話ブロック ==============
  - step: END_受付完了_新規
    type: termination
    termination_ref: "END_受付完了_新規"

  - step: END_新規_WEB
    type: termination
    termination_ref: "END_新規_WEB"

  - step: END_受付完了_変更
    type: termination
    termination_ref: "END_受付完了_変更"

  - step: END_受付完了_キャンセル_有
    type: termination
    termination_ref: "END_受付完了_キャンセル_有"

  - step: END_受付完了_キャンセル_無
    type: termination
    termination_ref: "END_受付完了_キャンセル_無"

  - step: END_受付完了_問合
    type: termination
    termination_ref: "END_受付完了_問合"

  - step: END_年末年始
    type: termination
    termination_ref: "END_年末年始"

  # 異常系終話（入電時間判定で参照される。scaffold で自動補完されるが、
  # next 参照の到達性を確保するため明示）
  - step: END_時間外
    type: termination
    termination_ref: "END_時間外"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "新規健診予約"
      - id: "2"
        order: "2"
        value: "予約変更"
      - id: "3"
        order: "3"
        value: "予約キャンセル"
      - id: "4"
        order: "4"
        value: "その他問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分（DTMF 1/2/3/4 → 4 値）"

  - context_name: "patientName"
    context_name_jp: "患者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
