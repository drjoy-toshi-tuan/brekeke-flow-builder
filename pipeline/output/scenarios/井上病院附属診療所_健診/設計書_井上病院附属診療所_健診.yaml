    dtmf_max_length: 1
    retry_count: 3
    echo_back: false
    save_to: "customerType"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "企業"
      - "個人"
    notes: "DTMF 1=企業 / 2=個人。3 回リトライで聞き取れない場合は END_聴取失敗（代表電話案内）"

  - order: 2
