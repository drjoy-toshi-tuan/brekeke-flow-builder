# --- セクション11: 特記事項・制約 ---
special_notes:
  - "受付時間: 月〜土 8:30〜15:30（日曜・祝日休）。フロー内部の判定は 9:00〜16:00 で切る（音声案内は 8:30〜15:30 と案内）。Dr.JOY 側 acceptance_times の運用範囲ではなく date_of_call_classifier で年末年始込みの 4 系統判定を行う"
  - "年末年始 12/28〜1/4 は留保受付（END_年末年始 で受付内容を残し、翌営業日 1/5 から順次折り返し）。スケジュール詳細・祝日カレンダーは Dr.JOY 側で設定"
  - "16:00〜17:00 帯は時間外扱いだが「時間外案内」アナウンス後にフロー継続（翌営業日折り返し）。17:00 以降は END_時間外 で完全切断"
  - "直通フリーダイヤル 0120-86-9370 は END_聴取失敗（代表電話案内）の TTS で読み上げ。Gen1 では 4 段階の announcement チェーン（代表電話へ → 直通番号案内 → 直通電話 → 電話切断へ）だったが、Gen3 では単一の終話 TTS に集約"
  - "個人 × 新規予約は WEB 誘導サブフローを通り、希望者は SMS で WEB 予約 URL を受信して終話（smsFlag=2）。氏名・生年月日は聴取しない。これは本フロー固有の特殊分岐"
  - "受診者名（subjectName）は個人=本人氏名、企業=部署名/担当者名 を同一 context に保存する。氏名 PatientName 標準サブフローは使用しない（受診者本人と限らない代理予約も多いため自由テキスト hearing で対応）"
  - "変更/キャンセル時の「変更該当者氏名」は subjectName とは別の context（changeTargetName）に保存。Gen1 設計を継承"
  - "用件確認・受診メニュー確認・WEB申込確認・顧客種別確認・再受診予定確認 は DTMF 主体（dtmf_max_length=1）。聞き取り失敗 3 回で代表電話案内に合流（END_聴取失敗）"
  - "smsFlag は 3 値運用: 1=通常 SMS（折り返し連絡用）/ 2=WEB URL SMS（個人新規 WEB 希望時のみ）/ -1=送信なし（時間外/非通知/年末年始/キャンセル予定なし/聴取失敗）"
  - "Gen1 の 種類分岐_1（受診者名後の問い合わせ二次判定）と 用件の分岐_1 は Gen3 では削除し、問合せルートは「Detail聴取_問合 → CMR_問合分岐」の 1 段に集約。1 発話 1 意図の Gen3 原則に合わせる"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（Dr.JOY 施設 ID）"
    resolved: false
    notes: "管理画面で確認。フロー JSON には不要（参考情報）"

  - item: "営業時間スケジュール詳細（祝日カレンダー / 12/28〜1/4 年末年始 / 第5土曜の扱い）の Dr.JOY 設定"
    resolved: false
    notes: "date_of_call_classifier の判定式は施設の祝日定義に依存。Dr.JOY 管理画面で設定する"

  - item: "SMS 送信文面（smsFlag=1 通常 / smsFlag=2 WEB URL）"
    resolved: false
    notes: "フロー JSON では smsFlag 値を設定するのみ。実際の SMS 文面は Dr.JOY 管理画面で設定"

  - item: "[電話番号聴取] サブフロー内 retry 上限到達時の END_聴取失敗（代表案内）への接続"
    resolved: false
    notes: "Custom Jump to Flow からは親フロー END_モジュールへ接続不可。サブフロー内で完結する切断モジュールを Brekeke IVR UI で手動追加（または既存 個人情報サブフロー.bivr のサンプル流用）"

  - item: "[生年月日聴取] サブフロー内 retry 上限到達時の END_聴取失敗（代表案内）への接続"
    resolved: false
    notes: "電話番号聴取と同じく手動補完が必要"

  - item: "現在の予約日聴取の YYYY 補完ルール（DTMF 4 桁 MMDD のみ受付時、過去日付は翌年扱いで OK か）"
    resolved: false
    notes: "Gen1 では「日付比較 → プラス1年後で確定」処理あり。Gen3 でも同等の挙動でよいか運用に確認"

  - item: "詳細聴取 / 受診希望日 / 変更内容確認 の reason context 重複保存ルール"
    resolved: false
    notes: "現状すべて save_to: reason に保存しているため、複数項目を聴取するルートでは後勝ちで上書きされる。Dr.JOY 画面表示で問題ないか / 個別 context に分けるか確認"

  - item: "用件確認の OpenAI 正規化辞書（Gen1 用件エンティティの 50+ 類義語）"
    resolved: false
    notes: "@prompter が OpenAI prompt を生成する際、entity_openai_synonyms.md / 用件聴取.yaml の値マッピングを参照する"

  - item: "顧客種別 = 企業の場合、用件確認の 4 択（新規/変更/キャンセル/問合）すべてが対応するか（Gen1 では用件聴取は共通だが、企業ルートではキャンセル前に再受診予定 hearing が含まれる点が個人と同じか）"
    resolved: false
    notes: "現設計では企業/個人共に再受診予定確認を経由。運用に確認"
