      DTMF 対応表:
        - DTMF 4 桁 MMDD（例: 0401） → YYYY-MM-DD（過去日なら翌年扱い）
        - DTMF 4 桁 MMDD（例: 0510） → YYYY-MM-DD（過去日なら翌年扱い）
        - 音声「5月10日」 → YYYY-MM-DD
      OpenAI で YYYY-MM-DD に正規化（過去日なら翌年扱い）。復唱あり。

