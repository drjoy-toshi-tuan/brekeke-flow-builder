# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "{tts_g:恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました}"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（夜間/日祝/深夜早朝）"
    tts_announcement: "{tts_g:お電話ありがとうございます。井上病院健診センターの予約専用AI電話です。受付時間は、日曜・祝日を除く、月曜日から土曜日の、8時30分から15時30分までとなっております。受付時間内に再度お電話ください。お電話ありがとうございました}"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（聞き取り NG 12 種すべての合流先 = 代表電話案内）"
    tts_announcement: "{tts_g:お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、日曜・祝日を除く、月曜日から土曜日の、8時30分から15時30分に、井上病院健診センターの直通番号、0120-86-9370へおかけなおしください。お電話ありがとうございました}"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_受付完了_新規"
    condition: "新規健診予約 受付完了（個人 WEB 経由を除く）"
    tts_announcement: "{tts_g:現在の予約状況を確認させていただき、担当者から折り返し電話、もしくは、SMSにて確定のご連絡を3営業日以内にさせていただきます。お電話ありがとうございました。それでは失礼いたします}"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_新規"

  - name: "END_新規_WEB"
    condition: "新規健診予約（個人 × WEB 案内希望）"
    tts_announcement: "{tts_g:お電話終了後にショートメールでURLをお送りいたします。URLをタップし、予約申し込みを完了させてください。お電話ありがとうございました}"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_新規_WEB"

  - name: "END_受付完了_変更"
    condition: "予約変更 受付完了"
    tts_announcement: "{tts_g:現在の予約状況を確認させていただき、担当者から折り返し電話、もしくは、SMSにて確定のご連絡を3営業日以内にさせていただきます。お電話ありがとうございました。それでは失礼いたします}"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_変更"

  - name: "END_受付完了_キャンセル_有"
    condition: "予約キャンセル受付完了 かつ 再受診予定あり"
    tts_announcement: "{tts_g:キャンセルの申し込みを受付いたしました。再受診のご予約を行う場合は再度AI電話へご連絡ください。お電話ありがとうございました}"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_キャンセル_有"

  - name: "END_受付完了_キャンセル_無"
    condition: "予約キャンセル受付完了 かつ 再受診予定なし"
    tts_announcement: "{tts_g:キャンセルの申し込みを受付いたしました。お電話ありがとうございました}"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_キャンセル_無"

  - name: "END_受付完了_問合"
    condition: "その他問い合わせ 受付完了"
    tts_announcement: "{tts_g:現在の予約状況を確認させていただき、担当者から折り返し電話、もしくは、SMSにて確定のご連絡を3営業日以内にさせていただきます。お電話ありがとうございました。それでは失礼いたします}"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了_問合"

  - name: "END_年末年始"
    condition: "12月28日〜1月4日 入電"
    tts_announcement: "{tts_g:12月28日から1月4日までは年末年始のため、お問い合わせ内容の受付はいたしますが、翌営業日の1月5日より、順次折り返しのご連絡をさせていただきます。お電話ありがとうございました}"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_年末年始"

# smsFlag 分岐（複数パターンあり：classification + revisitPlan + webRequestFlag の組み合わせで決まる）
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "revisitPlan"
    - "webRequestFlag"
  patterns:
    - condition: "classification=新規 かつ webRequestFlag=希望"
      sms_flag: "2"
      notes: "WEB 予約 URL 送信"
    - condition: "classification=キャンセル かつ revisitPlan=予定なし"
      sms_flag: "-1"
      notes: "キャンセル確定後の SMS 送信なし（短文終話）"
    - condition: "それ以外（新規 WEB 不要 / 変更 / キャンセル 予定あり / 問合）"
      sms_flag: "1"
      notes: "通常 SMS（折り返し連絡用）"
    - condition: "異常系（時間外/非通知/年末年始/聴取失敗）"
      sms_flag: "-1"
      notes: "SMS 送信なし"

