# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "顧客種別確認"
    tts_announcement: "{tts_g:お電話をいただいている方についてお伺いします。企業のご担当者の方は1を、個人の方は2を、ダイヤルプッシュで入力してください}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "企業"
        - "個人"
      mapping:
        - input: "DTMF 1 / 「企業」「企業の担当」「会社」"
          output: "企業"
        - input: "DTMF 2 / 「個人」「本人」「個人予約」"
          output: "個人"
      no_result_condition: "上記いずれにも該当しない（無言・無関係発話）"
    save_to: "customerType"
    next_step: "用件確認"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "用件確認"
    tts_announcement: "{tts_g:それではご用件を、次の4つのうちの、いずれかでダイヤルプッシュしてください。1、健診予約。2、予約変更。3、予約キャンセル。4、その他のお問い合わせ。それでは押してください}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規"
        - "変更"
        - "キャンセル"
        - "問い合わせ"
      mapping:
        - input: "DTMF 1 / 「健康診断」「健診」「検診」「特定健診」「人間ドック」「雇い入れ」「就職」「進学」「事業主」「生活習慣病」「全身」「予約を取る」「健診予約」「検査の予約」"
          output: "新規"
        - input: "DTMF 2 / 「変更」「日程」「日付」「延期」「時間」「別の」「変えたい」「変えて」「予約の変更」"
          output: "変更"
        - input: "DTMF 3 / 「キャンセル」「やめる」「取消」「取り消し」「取り消す」「予約のキャンセル」"
          output: "キャンセル"
        - input: "DTMF 4 / 「問い合わせ」「その他」「教えて」「調べて」「分からない」「忘れた」「質問」「聞きたい」「料金」「金額」「検査結果」"
          output: "問い合わせ"
      no_result_condition: "上記いずれにも該当しない（無言・無関係発話）"
    save_to: "classification"
    next_step: "（4 分岐: 新規→CMR_新規分岐 / 変更→タイトル_変更_アナウンス / キャンセル→タイトル_キャンセル_アナウンス / 問い合わせ→詳細聴取_問合）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "WEB申込確認"
    tts_announcement: "{tts_g:おかけいただいている電話番号に、WEB予約ページのURLをショートメールでお送りすることができますが、ご希望されますか?ご希望の方は1を、不要の方は2を、ダイヤルプッシュしてください}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "希望"
        - "不要"
      mapping:
        - input: "DTMF 1 / 「はい」「希望」「お願いします」「OK」「大丈夫」「合っています」"
          output: "希望"
        - input: "DTMF 2 / 「いいえ」「不要」「いりません」「持ってない」「携帯ではない」「違います」"
          output: "不要"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "webRequestFlag"
    next_step: "（希望→END_新規_WEB / 不要→受診メニュー確認_個人）"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "受診メニュー確認_個人"
    tts_announcement: "{tts_g:予約内容を、次の3つのうちの、いずれかでダイヤルプッシュしてください。1、人間ドック。2、協会けんぽ。3、その他の健診。それでは押してください}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "人間ドック"
        - "協会けんぽ"
        - "その他の健診"
      mapping:
        - input: "DTMF 1 / 「人間ドック」「ドック」「CT コース」「二年ドック」「半日コース」"
          output: "人間ドック"
        - input: "DTMF 2 / 「協会けんぽ」「けんぽ」「協会」「健保」「償還」"
          output: "協会けんぽ"
        - input: "DTMF 3 / 「その他」「MRI」「胃カメラ」「特殊健診」「学校健診」「学生健診」「電離」「鉛」「石綿」「有機溶剤」「プレミアレディース」"
          output: "その他の健診"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "visitMenu"
    next_step: "詳細聴取_新規個人"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "受診メニュー確認_企業"
    tts_announcement: "{tts_g:予約内容を、次の3つのうちの、いずれかでダイヤルプッシュしてください。1、人間ドック。2、協会けんぽ。3、その他の健診。それでは押してください}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "人間ドック"
        - "協会けんぽ"
        - "その他の健診"
      mapping:
        - input: "（個人ルートと同一）"
          output: "—"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "visitMenu"
    next_step: "詳細聴取_新規企業"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "詳細聴取_新規個人"
    tts_announcement: "{tts_g:検査内容や受診時期など、ご希望の内容を簡単にお話ください}"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "5 秒間無言（ご用件なし）"
    save_to: "reason"
    next_step: "受診者名_新規個人"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "詳細聴取_新規企業"
    tts_announcement: "{tts_g:検査内容や受診時期など、ご希望の内容を簡単にお話ください}"
    input_method: "voice_only"
    openai_rules:
