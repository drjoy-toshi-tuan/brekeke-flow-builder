# --- セクション11: 特記事項・制約 ---
special_notes:
  - "use_acceptance_times=true。Gen1 入電日時判断.yaml では平日 8:00〜20:00、土日祝・年末年始は受付時間外。年末年始休業（〜令和8年1月4日）は acceptance_times の business_hours スケジュール（Dr.JOY 側）で吸収。Gen1 「年末年始」箱の専用 TTS は END_時間外 に集約（汎用文言で代替）。年末年始固有文言が必要な場合は別途切り替え（confirmation_items 参照）"
  - "Gen1 の代表電話案内 TTS（聞き取れず → 代表電話案内 → 電話番号 → 終話）の経路は END_代表電話案内 に集約済み。Gen1 タイトル箱（混雑時案内）と合流するため、混雑時の専用フローは設けない（顧客要望時は別途追加）"
  - "当日予約は AI 非対応。Brekeke Blind Transfer ではなく音声案内（健診センター直通 0776-28-8513 の番号読み上げ）+ 切断のみで完結（Gen1 代表転送サブフロー由来）。call_transfer ブロック不要"
  - "Gen1 用件①.yaml の「もしもし」検知（1 回目／2 回目以上）は OpenAI プロンプトに「もしもし」を予約以外パターンに含めて吸収。Gen3 で countもしもし は実装しない"
  - "Gen1 「3 回聞き取れず」は retry_count=3 に集約。用件確認・予約関する用件のみ retry=3、それ以外は retry=2"
  - "新規ルート内 3 分岐（予約関する用件）は context=reservationKind に保存、終話 TTS の振分（END_新規／END_変更／END_キャンセル）に使用。Gen3 では classification × reservationKind の cascade ではなく、scenario_flow 上で各サブブランチが直接 END_* に分岐するため終話分岐 ContextMatchRouter は不要"
  - "家族内容（同伴予約者）は新規ルートのみ聴取（新規／変更／キャンセル）。契約・問い合わせルートでは聴取しない。Gen1 main 用件の分岐_6（契約／聴取不可は最後直行、それ以外は家族内容経由）の論理を Gen3 では各ルートに直接埋め込み"
  - "Gen1 締めあいさつ 3 種の振分は smsFlag に集約: 締めあいさつ_2（電話のみ／SMS なし）→ smsFlag=-1（END_新規） / 締めあいさつ（SMS あり）→ smsFlag=1（END_変更／契約／問合せ） / 締めあいさつ_1（条件付 SMS）→ smsFlag=2（END_キャンセル）。携帯/その他の二段振分（Gen1 携帯電話番号チェック × 3）は不要（携帯/その他で文言差異がないため）"
  - "Gen1 「次へ」「最後に、」の繋ぎ TTS は次段 hearing TTS の冒頭にマージ済み（変更_予約日 の前置「続いて、」は省略、追加問い合わせ TTS には冒頭「最後に、」を含める）"
  - "TTS 文言から SSML タグ（<speak>, <break>, <dtmf/>, <say-as> 等）はすべて除去済み（Gen3 は SSML 不可、{tts_g:...} 形式のみ）。Gen1 「<? $予約日の読み ?>」「<? $連絡先電話番号（ハイフン区切あり） ?>」等の動的タグは Gen3 では <% var %> 構文に置換予定（具体差込が必要な場合は prompter 段階で対応）"
  - "電話番号聴取サブフローは Gen3 標準（incoming-classifier + 携帯/その他判定 + 復唱 1 回）を完コピ。Gen1 電話番号区切り.yaml の 携帯3-4-4 / IP3-4-4 / フリー4-3-3 / フリー4-3-4 / 固定 5-1-4 / 4-2-4 / 3-3-4 / 2-4-4 のフォーマット振分はサブフロー側 Phone Normalization に内包"
  - "生年月日聴取サブフローは Gen3 標準（DOB Re-confirmation 1 回復唱付き）。Gen1 生年月日.yaml の和暦判定（大正/昭和/平成/令和の年範囲チェック）は OpenAI 正規化で吸収"
  - "予約日聴取は datetime hearing の 1 ステップに集約（Gen1 の月チェック／日チェック／生年月日の判定／日付比較／プラス1年後 等の複雑な日付チェックは OpenAI convert + scaffold の addCurrentDate=Yes に内包）"
  - "Gen1 status enum の 0 は Gen3 では使用禁止のため status=2（代表案内）に置換済み（status=3 は転送成功用に予約されているため聴取失敗にも status=2 を採用）"
  - "用件取得失敗（END_用件取得できず）と聞き取れず（聞き取れず → 代表電話案内）の 2 経路は END_代表電話案内 に統合。3 回失敗以外（途中の hearing で 2 回失敗）は END_聴取失敗（status=2）"
  - "saveContextModel2DB に classification の rangeValues として「当日予約」を含めるが、当日予約は実体的には保存後すぐ END_当日転送 に行くため、Dr.JOY 画面では status=2 / smsFlag=-1 として「代表案内」扱い"

# --- セクション12: 要確認事項 ---
confirmation_items:
  - item: "office_id（Dr.JOY 施設ID）"
    resolved: false
  - item: "Dr.JOY 側の SMS 送信文面設定（smsFlag=1 / smsFlag=2 で送る本文）。smsFlag=1 は通常 SMS、smsFlag=2 は『必要がある場合のみ』のショートメール（条件付き）"
    resolved: false
  - item: "Dr.JOY 側の認証設定（生年月日・電話番号の優先順位）。氏名・生年月日・電話番号の Dr.JOY 認証ロジックはフロー側ではなく Dr.JOY 側で設定"
    resolved: false
  - item: "Dr.JOY 側の営業時間スケジュール詳細設定（acceptance_times の business_hours）。Gen1 では平日 8:00〜20:00 + 土日祝・年末年始除外。年末年始休業（〜令和8年1月4日）は固定期間の指定が必要（Gen1 入電日時判断.yaml の祝日チェックサブフロー相当）"
    resolved: false
  - item: "年末年始休業の専用 TTS 文言を END_時間外 とは別に出すかどうか。Gen1 では「誠に勝手ながら、当センターは令和8年1月4日(日曜日)まで、年末年始の休業とさせていただきます。年明けは、令和8年1月5日（月曜日）8:00より、通常通り営業いたします。」の固定文言があるが、Gen3 では汎用 END_時間外 に集約。顧客要望次第で年末年始用 TTS を別途配置"
    resolved: false
  - item: "smsFlag=2（条件付き SMS）の Dr.JOY 側挙動: 「必要がある場合のみ」の判定は Dr.JOY オペレーター側の手動操作と思われる。フロー側では smsFlag=2 を立てるのみで、SMS 自動送信はしない設計でよいか確認"
    resolved: false
  - item: "電話番号聴取サブフローの非通知時の挙動: メインフロー冒頭の incoming-classifier で非通知は END_非通知 に直行するため、サブフロー内で非通知再判定は不要。サブフロー内で着信元番号を取得済み携帯ルートに進む / その他ルート（番号再聴取）に進むの分岐ロジックを scaffold 標準で実装"
    resolved: false
  - item: "新規_補助有無 で「あり」→ 新規_企業名聴取 → 新規_問合せ内容 の経路で、企業名聴取が分からない時の reason への影響: 「分からない」と回答された場合、companyName=「分からない」を保存するのみで、その後のフローは継続（reason は新規_問合せ内容で別途聴取）"
    resolved: true
  - item: "用件確認の 3 回失敗時の遷移: END_代表電話案内（status=2）に直行。ただし scaffold が retry_failure=skip でない（end_failure になっている）かどうかを確認。Gen1 では 3 回聞き取れず → END_用件取得できず → 代表電話案内 → 電話番号 → 終話 の連鎖だったため、Gen3 では retry_failure を end_failure 相当に切り替えて END_代表電話案内 へ遷移する設計が必要（用件確認・予約関する用件の 2 ステップのみ）。step_details の retry_failure は skip としているが、scaffold の挙動次第で end_failure に変更"
    resolved: false
  - item: "予約日聴取（変更・キャンセル）の DTMF 4 桁（MMDD）対応: Gen1 では予約日セット（DTMF）箱で 4 桁取得 → 日付比較 → プラス1年後で確定 のロジックがあるが、Gen3 datetime hearing の OpenAI convert + addCurrentDate=Yes で吸収可能か実機確認"
    resolved: false
  - item: "変更_変更項目の分岐: 受診内容 / 日程変更の 2 値だが、両分岐とも次は変更_問合せ内容（共通 TTS）に行くため、enum 分岐は context 保存のみで実質的な分岐なし。設計書では conditions に other → 変更_問合せ内容 のみ書いているが、scaffold の挙動を確認"
    resolved: true
  - item: "Gen1 の混雑時タイトル箱「只今お電話が込み合っております。0776-28-8513 へおかけなおしください」は Gen3 では END_代表電話案内（同等文言）に集約済み。混雑検知ロジック（同時通話数等）はフロー側で実装しない（Brekeke 側設定）"
    resolved: true
  - item: "TTS 発話の動的差込（<% var %> 形式）: 予約日復唱・電話番号復唱はサブフロー側で実装。メインフロー側 hearing の echo_back=true（変更_予約日 / キャンセル_予約日）の復唱文言フォーマットは scaffold デフォルト（confirmation_type: data）に従う"
    resolved: false
