# 設計書: 福井県済生会病院 — 健診
# 生成元: @director エージェント
# 作業種別: Gen1→Gen3 移管
# 元資料: commubo抽出/【077】福井県済生会病院/【【0000福井県済生会病院】健診1_M_本番/
# 移管ノート: docs/migration/gen1_福井県済生会病院_健診.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "福井県済生会病院"
  scenario_name: "健診"
  group_name: "福井県済生会病院"
  flow_name: "福井県済生会病院$健診"
  target_facility: "本院（健診センター）"
  office_id: "TODO_要確認"
  phone_number: "0776-28-8513"
  business_hours: "土日祝・年末年始除く 平日 8:00〜20:00（ボイスボット稼働）。健診センター直通の有人受付は平日 8:00〜17:00（代表電話案内 TTS で告知）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "福井県済生会病院$健診"
      role: "main"
      description: "健診の当日予約／新規予約／契約／問い合わせの 4 用件を受付。新規ルートのみ予約関する用件で 3 分岐（新規／変更／キャンセル）し、補助有無による企業名再聴取・家族内容聴取を行う。当日予約は健診センター（0776-28-8513）への番号案内で終話、用件取得失敗時は代表電話案内 TTS で終話。"
  subflows:
    - name: "福井県済生会病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "新規・契約・問い合わせの全ルートで共用。受診者名（契約ルートでは担当者名）を patientName に格納。Gen1 yaml に復唱なしのため復唱・確認禁止"
    - name: "福井県済生会病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "新規・問い合わせルートのみで使用。和暦 1 回復唱。yyyy-MM-dd 形式で patientDateOfBirth に保存。契約ルートでは生年月日を聴取しない"
    - name: "福井県済生会病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "全ルート共通。incoming-classifier + 携帯/その他の phonetype 判定。additionalPhoneNumber 保存後に復唱 1 回。電話番号区切り（携帯3-4-4 / IP3-4-4 / フリー4-3-3 / 固定 5-1-4 等）はサブフロー側 Phone Normalization で実装"

# --- セクション3: フローの目的 ---
purpose: |
  福井県済生会病院 健診センターへの電話を AI 電話で受付。
  発信者の用件を「当日予約／新規予約／契約／その他問い合わせ」の 4 用件で分類し、
  新規ルートではさらに「健診の予約／予約変更／予約キャンセル」の 3 種に細分化。
  各ルート別に氏名・生年月日・電話番号・予約日・問合せ内容・家族内容（同伴予約者）等を聴取する。
  当日予約は AI 非対応のため健診センター直通（0776-28-8513）の番号案内 TTS で終話、
  用件 3 回失敗・聴取失敗等のフォールバックは代表電話案内 TTS で終話。
  非通知・受付時間外（土日祝・平日 20 時以降・年末年始）は対応する終話 TTS で切断する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "福井県済生会病院$健診"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知
            └─ 通常   → 営業時間チェック(acceptance_times)
                          ├─ 時間外 → END_時間外
                          └─ 受付可 → 冒頭_アナウンス → 用件確認 (enum 4値 + フォールバック)
                                        ├─ 当日予約     → 当日転送_アナウンス → END_当日転送
                                        ├─ 新規         → 新規_氏名聴取
                                        ├─ 契約         → 契約_氏名聴取
                                        ├─ 問い合わせ   → 問合せ_問い合わせ内容
                                        └─ other       → END_代表電話案内

      [新規ルート]
      新規_氏名聴取(subflow) → 新規_生年月日聴取(subflow) → 新規_電話番号聴取(subflow)
        → 予約関する用件 (enum 3値 + フォールバック)
            ├─ 新規       → 新規_補助有無
            │                 ├─ あり → 新規_企業名聴取 → 新規_問合せ内容 → 新規_家族内容 → 新規_追加問い合わせ → END_新規
            │                 └─ other(=なし) → 新規_問合せ内容 → 新規_家族内容 → 新規_追加問い合わせ → END_新規
            ├─ 変更       → 変更_予約日(datetime) → 変更_変更項目 → 変更_問合せ内容 → 変更_家族内容 → 変更_追加問い合わせ → END_変更
            ├─ キャンセル → キャンセル_予約日(datetime) → キャンセル_問合せ内容 → キャンセル_家族内容 → キャンセル_追加問い合わせ → END_キャンセル
            └─ other     → END_代表電話案内

      [契約ルート]
      契約_氏名聴取(subflow) → 契約_企業名聴取 → 契約_電話番号聴取(subflow) → 契約_問合せ内容 → 契約_追加問い合わせ → END_契約
      （契約は生年月日聴取・家族内容なし）

      [問い合わせルート]
      問合せ_問い合わせ内容(text) → 問合せ_氏名聴取(subflow) → 問合せ_生年月日聴取(subflow) → 問合せ_電話番号聴取(subflow) → 問合せ_追加問い合わせ → END_問合せ
      （問い合わせは家族内容なし、問合せ内容を最初に聴取）

      [当日予約ルート]
      当日転送_アナウンス → END_当日転送
      （健診センター直通 0776-28-8513 の番号案内のみで終話。Brekeke Blind Transfer ではなく音声案内 + 切断）
    notes: "use_acceptance_times=true。土日祝・平日 20 時以降・年末年始は時間外 TTS で切断。年末年始休業（〜令和8年1月4日）は確認レポートの NON-BLOCKER で扱い"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ============================================================
  # 冒頭チェーン（必須）
  # ============================================================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # ============================================================
  # 用件確認（4値分岐 + フォールバック）
  # ============================================================
  - step: 用件確認
    type: hearing
    output_format: enum
    output_labels:
      - "当日予約"
      - "新規"
      - "契約"
      - "問い合わせ"
    conditions:
      - match: "当日予約"
        next: 当日転送_アナウンス
      - match: "新規"
        next: 新規_氏名聴取
      - match: "契約"
        next: 契約_氏名聴取
      - match: "問い合わせ"
        next: 問合せ_問い合わせ内容
      - match: "other"
        next: END_代表電話案内

  # ============================================================
  # 当日予約ルート
  # ============================================================
  - step: 当日転送_アナウンス
    type: announcement
    next: END_当日転送

  # ============================================================
  # 新規ルート（共通: 氏名 → 生年月日 → 電話番号 → 予約関する用件）
  # ============================================================
  - step: 新規_氏名聴取
    type: subflow
    flowname: "福井県済生会病院$氏名聴取"
    next: 新規_生年月日聴取

  - step: 新規_生年月日聴取
    type: subflow
    flowname: "福井県済生会病院$生年月日聴取"
    next: 新規_電話番号聴取

  - step: 新規_電話番号聴取
    type: subflow
    flowname: "福井県済生会病院$電話番号聴取"
    next: 予約関する用件

  - step: 予約関する用件
    type: hearing
    output_format: enum
    output_labels:
      - "新規"
      - "変更"
      - "キャンセル"
    conditions:
      - match: "新規"
        next: 新規_補助有無
      - match: "変更"
        next: 変更_予約日
      - match: "キャンセル"
        next: キャンセル_予約日
      - match: "other"
        next: END_代表電話案内

  # ============================================================
  # 新規 — 健診の予約サブブランチ
  # ============================================================
  - step: 新規_補助有無
    type: hearing
    output_format: enum
    output_labels:
      - "あり"
      - "なし"
    conditions:
      - match: "あり"
        next: 新規_企業名聴取
      - match: "other"
        next: 新規_問合せ内容

  - step: 新規_企業名聴取
    type: hearing
    output_format: text
    next: 新規_問合せ内容

  - step: 新規_問合せ内容
    type: hearing
    output_format: text
    next: 新規_家族内容

  - step: 新規_家族内容
    type: hearing
    output_format: text
    next: 新規_追加問い合わせ

  - step: 新規_追加問い合わせ
    type: hearing
    output_format: text
    next: END_新規

  # ============================================================
  # 新規 — 予約変更サブブランチ
  # ============================================================
  - step: 変更_予約日
    type: hearing
    output_format: datetime
    next: 変更_変更項目

  - step: 変更_変更項目
    type: hearing
    output_format: enum
    output_labels:
      - "受診内容"
      - "日程変更"
    conditions:
      - match: "other"
        next: 変更_問合せ内容

  - step: 変更_問合せ内容
    type: hearing
    output_format: text
    next: 変更_家族内容

  - step: 変更_家族内容
    type: hearing
    output_format: text
    next: 変更_追加問い合わせ

  - step: 変更_追加問い合わせ
    type: hearing
    output_format: text
    next: END_変更

  # ============================================================
  # 新規 — 予約キャンセルサブブランチ
  # ============================================================
  - step: キャンセル_予約日
    type: hearing
    output_format: datetime
    next: キャンセル_問合せ内容

  - step: キャンセル_問合せ内容
    type: hearing
    output_format: text
    next: キャンセル_家族内容

  - step: キャンセル_家族内容
    type: hearing
    output_format: text
    next: キャンセル_追加問い合わせ

  - step: キャンセル_追加問い合わせ
    type: hearing
    output_format: text
    next: END_キャンセル

  # ============================================================
  # 契約ルート（氏名 → 企業名 → 電話番号 → 問合せ内容 → 追加問い合わせ。生年月日・家族内容なし）
  # ============================================================
  - step: 契約_氏名聴取
    type: subflow
    flowname: "福井県済生会病院$氏名聴取"
    next: 契約_企業名聴取

  - step: 契約_企業名聴取
    type: hearing
    output_format: text
    next: 契約_電話番号聴取

  - step: 契約_電話番号聴取
    type: subflow
    flowname: "福井県済生会病院$電話番号聴取"
    next: 契約_問合せ内容

  - step: 契約_問合せ内容
    type: hearing
    output_format: text
    next: 契約_追加問い合わせ

  - step: 契約_追加問い合わせ
    type: hearing
    output_format: text
    next: END_契約

  # ============================================================
  # 問い合わせルート（問合せ内容 → 氏名 → 生年月日 → 電話番号 → 追加問い合わせ。家族内容なし）
  # ============================================================
  - step: 問合せ_問い合わせ内容
    type: hearing
    output_format: text
    next: 問合せ_氏名聴取

  - step: 問合せ_氏名聴取
    type: subflow
    flowname: "福井県済生会病院$氏名聴取"
    next: 問合せ_生年月日聴取

  - step: 問合せ_生年月日聴取
    type: subflow
    flowname: "福井県済生会病院$生年月日聴取"
    next: 問合せ_電話番号聴取

  - step: 問合せ_電話番号聴取
    type: subflow
    flowname: "福井県済生会病院$電話番号聴取"
    next: 問合せ_追加問い合わせ

  - step: 問合せ_追加問い合わせ
    type: hearing
    output_format: text
    next: END_問合せ

  # ============================================================
  # 終話ブロック
  # ============================================================
  - step: END_当日転送
    type: termination
    termination_ref: "END_当日転送"

  - step: END_新規
    type: termination
    termination_ref: "END_新規"

  - step: END_変更
    type: termination
    termination_ref: "END_変更"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_契約
    type: termination
    termination_ref: "END_契約"

  - step: END_問合せ
    type: termination
    termination_ref: "END_問合せ"

  - step: END_代表電話案内
    type: termination
    termination_ref: "END_代表電話案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # === Dr.JOY デフォルト項目 ===
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "当日予約"
      - id: "2"
        order: "2"
        value: "新規"
      - id: "3"
        order: "3"
        value: "契約"
      - id: "4"
        order: "4"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件区分（main の用件①.yaml 4 分岐）"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "受診者名（契約ルートでは担当者名）。氏名/担当名サブフローで保存"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "新規・問い合わせルートで聴取。契約ルートでは未聴取"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "全ルート共通。電話番号聴取サブフロー内で 1 回復唱"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "変更・キャンセル時に聴取"

  - context_name: "reason"
    context_name_jp: "問合せ内容"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "全ルートの問合せ内容。新規ルートは希望時期、変更/キャンセルは変更/キャンセル理由、契約はご用件、問い合わせはお問い合わせ内容を保存"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理（受付完了） 2=代表案内（当日予約・代表電話案内・非通知） 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "システム自動取得"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

  # === 案件固有フィールド（itemDefault: false）===
  - context_name: "reservationKind"
    context_name_jp: "予約関する用件"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "新規ルート内 3 分岐（新規／変更／キャンセル）の保存先。終話 TTS の振分にも使用"

  - context_name: "subsidyAvailable"
    context_name_jp: "補助有無"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "新規予約時の健康保険組合等からの補助有無。「あり」/「なし」"

  - context_name: "companyName"
    context_name_jp: "企業名／組合名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "新規ルート（補助あり時）：健康保険組合名 / 契約ルート：問合せ企業名"

  - context_name: "changeItem"
    context_name_jp: "変更項目"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "変更ルートで「受診内容」/「日程変更」を保存"

  - context_name: "familyMembers"
    context_name_jp: "家族内容（同伴予約）"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "新規ルート（新規/変更/キャンセル）専用。同伴予約者の氏名・生年月日 or「いない」を自由文で保存"

  - context_name: "additionalInquiry"
    context_name_jp: "追加問い合わせ"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "全ルート最終段で日中折り返し希望時間帯・伝達事項を自由文で保存"

  - context_name: "phonetype"
    context_name_jp: "電話種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "電話番号聴取サブフロー内で「携帯」/「その他」を保存。Gen1 では締めあいさつTTSの振分に使用していたが、Gen3 では classification × reservationKind で終話 TTS を直接決定するため未使用（参考保存のみ）"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "当日予約"
      - "新規"
      - "契約"
      - "問い合わせ"
