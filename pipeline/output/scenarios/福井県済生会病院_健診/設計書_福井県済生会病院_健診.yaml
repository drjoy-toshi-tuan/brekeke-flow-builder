# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "reservationKind"
  patterns:
    - condition: "classification=新規 AND reservationKind=新規"
      sms_flag: "-1"
      notes: "→ END_新規。Gen1 締めあいさつ_2 由来「予約の確定については…担当者から折り返し電話にて」（SMS なし、電話のみ）"
    - condition: "classification=新規 AND reservationKind=変更"
      sms_flag: "1"
      notes: "→ END_変更。Gen1 締めあいさつ「翌営業日までに…SMSにてご連絡」"
    - condition: "classification=新規 AND reservationKind=キャンセル"
      sms_flag: "2"
      notes: "→ END_キャンセル。Gen1 締めあいさつ_1「必要がある場合のみ…ショートメール」（条件付き SMS = sms_flag=2）"
    - condition: "classification=契約"
      sms_flag: "1"
      notes: "→ END_契約。Gen1 締めあいさつ「SMSにてご連絡」"
    - condition: "classification=問い合わせ"
      sms_flag: "1"
      notes: "→ END_問合せ。Gen1 締めあいさつ「SMSにてご連絡」"
    - condition: "classification=当日予約"
      sms_flag: "-1"
      notes: "→ END_当日転送。番号案内のみで終話、SMS なし"

