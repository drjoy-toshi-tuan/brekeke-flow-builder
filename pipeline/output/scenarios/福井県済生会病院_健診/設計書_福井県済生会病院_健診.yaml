# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系（デフォルト必須）===
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（土日祝・平日 8:00 前/20:00 以降・年末年始）"
    tts_announcement: "福井県済生会病院、健診センター、AI電話です。申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は土日、祝日を除く、平日の8時から20時となっております。恐れ入りますが、受付時間内におかけなおしください。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達（用件確認・予約関する用件以外の hearing で 2 回失敗）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 正常系（福井県済生会病院 健診固有）===
  - name: "END_新規"
    condition: "classification=新規 AND reservationKind=新規"
    tts_announcement: "健診の予約の申し込みを受付いたしました。予約の確定については、土日、祝日を除く、翌営業日までに担当者から折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_新規"

  - name: "END_変更"
    condition: "classification=新規 AND reservationKind=変更"
    tts_announcement: "予約変更の申し込みを受付いたしました。土日、祝日を除く、翌営業日までに担当者から折り返し電話、もしくは、SMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
