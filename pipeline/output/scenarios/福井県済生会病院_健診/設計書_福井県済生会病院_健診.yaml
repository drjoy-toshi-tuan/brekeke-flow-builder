# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちの、いずれかでお話ください。なお、ダイヤルプッシュでの入力も可能です。1．「今日の受診について」2．「予約について」3．「契約について」4．「その他問い合わせ」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "当日予約"
        - "新規"
        - "契約"
        - "問い合わせ"
      mapping:
        - input: "DTMF 1 / 当日 / 今日 / 日付（今日来院）"
          output: "当日予約"
        - input: "DTMF 2 / 健診の予約 / 健康診断 / 検診 / 人間ドック / 予約 / 紹介状 / 取りたい / キャンセル / 変更（新規ルート内で再分岐）"
          output: "新規"
        - input: "DTMF 3 / 契約 / 書類"
          output: "契約"
        - input: "DTMF 4 / 問い合わせ / お問合せ / 質問 / 確認 / アクセス / 検査結果 / 領収書 / 再発行 / 金額 / 教えて / 調べて / 聞きたい / 忘れた / なくした"
          output: "問い合わせ"
      no_result_condition: "上記いずれにも該当しない / 雑音のみ / 短すぎる発話"
    save_to: "classification"
    next_step: "(条件分岐: 当日予約→当日転送_アナウンス / 新規→新規_氏名聴取 / 契約→契約_氏名聴取 / 問い合わせ→問合せ_問い合わせ内容 / other→END_代表電話案内)"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "当日転送_アナウンス"
    tts_announcement: "当日に関するお問い合わせは、健診センターへ転送いたします。少々お待ちください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: null
    next_step: "END_当日転送"
    retry_failure: "skip"

  - step_name: "予約関する用件"
    tts_announcement: "ご用件を、次の3つのうちの、いずれかでお話ください。1．「健診の予約」2．「予約の変更」3．「予約のキャンセル」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規"
        - "変更"
        - "キャンセル"
      mapping:
        - input: "DTMF 1 / 健診の予約 / 健康診断 / 検診 / 人間ドック / 紹介状 / 取りたい / 予約を取る"
          output: "新規"
        - input: "DTMF 2 / 変更 / 取り直す / 取り直したい / 別の / 変えたい / 変えて / 変える / 日程 / 日付 / 予約変更 / 予約の変更"
          output: "変更"
        - input: "DTMF 3 / キャンセル / やめる / 取り消し / 取消 / 取り消す"
          output: "キャンセル"
      no_result_condition: "上記いずれにも該当しない / 雑音のみ"
    save_to: "reservationKind"
    next_step: "(条件分岐: 新規→新規_補助有無 / 変更→変更_予約日 / キャンセル→キャンセル_予約日 / other→END_代表電話案内)"
    retry_failure: "skip"

  - step_name: "新規_補助有無"
    tts_announcement: "今回の受診は健康保険組合などからの補助はございますでしょうか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
      mapping:
        - input: "はい / あります / そうです / 持っています / 補助あり"
          output: "あり"
        - input: "いいえ / いえ / ない / ありません / 持っていない / 持ってない / 大丈夫 / 自費"
          output: "なし"
      no_result_condition: "判別不能"
    save_to: "subsidyAvailable"
    next_step: "あり→新規_企業名聴取 / other(=なし)→新規_問合せ内容"
    retry_failure: "skip"

  - step_name: "新規_企業名聴取"
    tts_announcement: "どちらの組合からの補助でしょうか？分からない場合は分からないとお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "組合名（任意の発話）"
          output: "(発話内容そのまま text 保存)"
        - input: "分からない / わからない / ない"
          output: "分からない"
      no_result_condition: "発話なし"
    save_to: "companyName"
    next_step: "新規_問合せ内容"
    retry_failure: "skip"

  - step_name: "新規_問合せ内容"
    tts_announcement: "それでは、受診を希望される時期をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "明確日付（5月15日／2026年5月15日／来週月曜日）"
          output: "(発話内容そのまま text 保存。OpenAI で要約・整形のみ)"
        - input: "曖昧表現（来月上旬／なるべく早く／GW明け 等）"
          output: "(発話内容そのまま text 保存)"
      no_result_condition: "発話なし"
    save_to: "reason"
    next_step: "新規_家族内容"
    retry_failure: "skip"

  - step_name: "新規_家族内容"
    tts_announcement: "そのほか予約を希望される方がいらっしゃる場合は、お名前・生年月日をお話ください。いない場合は、「いない」とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "氏名・生年月日の組合せ（複数名可）"
          output: "(発話内容そのまま text 保存。複数名は改行追記)"
        - input: "いない / なし / ありません / 大丈夫 / いません"
          output: "いない"
      no_result_condition: "発話なし"
    save_to: "familyMembers"
    next_step: "新規_追加問い合わせ"
    retry_failure: "skip"

  - step_name: "新規_追加問い合わせ"
    tts_announcement: "最後に、日中折り返し希望の時間帯やお伝えしたいことがあれば、お話ください。無いようでしたら「特にありません」のようにお話下さい。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "時間帯・伝達事項（自由発話）"
          output: "(発話内容そのまま text 保存)"
        - input: "特にありません / ない / なし / 大丈夫 / 結構です"
          output: "特にありません"
      no_result_condition: "発話なし"
    save_to: "additionalInquiry"
    next_step: "END_新規"
    retry_failure: "skip"

  - step_name: "変更_予約日"
    tts_announcement: "ご予約をいただいている、お日にちを「6月1日」のようにお話ください。分からない場合は「分からない」とお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
