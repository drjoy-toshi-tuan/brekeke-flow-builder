# 設計書 — 医誠会国際総合病院 診療（予約専用AI電話）
# 生成元: @director エージェント
# 生成日: 2026/04/23
# 元資料: docs/reference/customer_docs/【診療1】：医誠会国際総合病院.md
# BLOCKER: なし（非通知受入拒否=設定しない の挙動調整は NON-BLOCKER として運用確認で対応）
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "医誠会国際総合病院"
  group_name: "医誠会国際総合病院"
  flow_name: "医誠会国際総合病院$診療"
  target_facility: "本院のみ"
  office_id: "TODO_要確認"
  phone_number: "0570-099-166"
  business_hours: "祝日・年末年始を除く 月〜金 8:30〜17:00"
  flow_type: "subflow"
  work_type: "new"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "医誠会国際総合病院$診療"
      role: "main"
      description: >
        予約専用AI電話メインフロー。冒頭チェーン → 診療科聴取（メインフロー内 hearing）
        → 診察券番号・氏名・生年月日・電話番号の各サブフロー → 16:00 を境にした時間帯別終話。
  subflows:
    - name: "医誠会国際総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "個人情報サブフロー.bivr の氏名聴取を完全コピー。復唱なし（customer_doc 準拠）。"
    - name: "医誠会国際総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation あり。西暦8桁 DTMF 対応。customer_doc の復唱あり指定に合致"
    - name: "医誠会国際総合病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        サンプルの診察券番号聴取サブフローをコピー。8 桁以内でバリデーション。
        「わからない／持っていない」→ 空文字格納 → メインへ戻る。
        サブフロー内リトライ失敗時は空文字のまま次のサブフローへ（skip 相当）。
    - name: "医誠会国際総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        incoming-classifier で携帯/固定/非通知/海外を分岐する標準サブフロー。
        携帯/固定は着信番号を復唱（customer_doc: 「今おかけいただいている XX-XXXX-XXXX でよろしいですか？」）、
        非通知は音声/DTMF で連絡先を聴取（customer_doc: 「日中連絡のとれる携帯電話番号、
        もしくは、0から始まる市外局番の電話番号をお話ください」）。
        Phone Normalization + Re-confirmation を経由。

# --- セクション3: フローの目的 ---
purpose: |
  医誠会国際総合病院の予約専用AI電話として、月〜金 8:30〜17:00（祝日・年末年始を除く）
  の稼働時間内に患者からの電話を受け付け、以下の情報を聴取して担当者の折り返し対応につなぐ:
    - 診療科（わからない／聴取失敗時は「登録なし」として次へ進む）
    - 診察券番号（わからない／聴取失敗時は空文字として次へ進む）
    - 氏名
    - 生年月日（復唱あり）
    - 連絡先電話番号（復唱あり。非通知時は音声で聴取）
  16:00 を境に終話アナウンス文言が変化する（前半: 順番に折り返し / 後半: 翌診療日までに折り返し）。
  SMS 送信は行わず、全ルートで smsFlag=-1 に統一する。非通知着信も受け付ける（非通知受入拒否=設定しない）。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "医誠会国際総合病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 完了フラグ_非通知 → 切断
            │          ※ 要運用確認: 顧客仕様「非通知受入拒否=設定しない」に沿って
            │            非通知着信を冒頭_アナウンスへ合流させる場合は手動配線が必要
            └─ 固定/携帯/海外/WebRTC/その他 → 受付時間判定(acceptance_times)
                  ├─ 時間外 → 完了フラグ_時間外 → 切断
                  └─ 受付可 → 冒頭_アナウンス(TTS)
                                → 診療科(TTS → AmiVoice STT → OpenAI → Retry)
                                    ├─ リスト該当 → saveContext_診療科
                                    ├─ 「わからない」 → 登録なし
                                    ├─ NO_RESULT → saveDefault 登録なし → リトライ
                                    └─ リトライ失敗 → skip（登録なしのまま次へ）
                                → [診察券番号聴取サブフロー] (Custom Jump to Flow)
                                    └─ 「わからない」／失敗 → 空文字格納
                                → [氏名聴取サブフロー] (Custom Jump to Flow)
                                → [生年月日聴取サブフロー] (Custom Jump to Flow, 復唱あり)
                                → [電話番号聴取サブフロー] (Custom Jump to Flow, 復唱あり)
                                    ├─ 携帯/固定: 着信番号を復唱確認
                                    └─ 非通知: 音声/DTMF で聴取＋復唱
                                → 終話分岐_時間帯(Script: business_hours START=8 END=16)
                                    ├─ 営業時間内（8:30〜15:59）→ END_受付完了_前半
                                    └─ 営業時間外（16:00〜16:59）→ END_受付完了_後半

      === 終話パス ===
      END_受付完了_前半 → 完了フラグ_受付完了_前半(status=1, smsFlag=-1) → 切断
      END_受付完了_後半 → 完了フラグ_受付完了_後半(status=1, smsFlag=-1) → 切断
      END_非通知       → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断  ※ 要運用確認
      END_時間外       → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
      END_聴取失敗     → 完了フラグ_聴取失敗(status=2, smsFlag=-1) → 切断
    notes: |
      - acceptance_times 使用。月〜金 8:30〜17:00（詳細スケジュールは Dr.JOY 側で設定）
      - 非通知受入拒否=設定しない → scaffold のデフォルト配線は END_非通知 へ分岐するため、
        本番運用前に「非通知着信を冒頭_アナウンスに合流させる」修正を fixer もしくは
        人手で適用するか判断する（confirmation_items N-1）
      - 16:00 での時間帯分岐は Brekeke Script（business_hours テンプレ）で実装。
        より厳密な「16:00:00」境界判定が必要な場合は DateOfCall Classifier への切替を検討
      - 診療科 NO_RESULT は「登録なし」を saveContext2DB → リトライへ戻す（モジュール選定ガイド 2.5）
      - 診療科・診察券番号のリトライ失敗は skip（登録なし／空文字を保持して次へ進む）
      - 氏名・生年月日・電話番号のリトライ失敗は end_failure（END_聴取失敗へ）
      - SMS は全ルート不使用（smsFlag=-1 統一）
      - 聴取失敗アナウンス文言（customer_doc 64-74 行）で施設固有の「順番に折り返し対応」
        「翌診療日までに順番に折り返し対応」表現を利用。retry_failure_announcement は
        時間帯の違いを gen_properties のデフォルトで吸収できないため、
        段階的改善として `END_聴取失敗` 単一終話を採用（confirmation_items N-2）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 診療科

  # --- 診療科聴取（メインフロー内 hearing）---
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "default"
        next: jump_診察券番号聴取

  # --- 個人情報サブフロー群（customer_doc 聴取順）---
  - step: jump_診察券番号聴取
    type: subflow
    flowname: "医誠会国際総合病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "医誠会国際総合病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "医誠会国際総合病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "医誠会国際総合病院$電話番号聴取"
    next: 終話分岐_時間帯

  # --- 16:00 境界の時間帯分岐 ---
  - step: 終話分岐_時間帯
    type: script
    script_template: business_hours
    template_params:
      START_HOUR: 8
      END_HOUR: 16
    conditions:
      - match: "営業時間内"
        next: END_受付完了_前半
      - match: "営業時間外"
        next: END_受付完了_後半

  # --- 終話（時間帯別）---
  - step: END_受付完了_前半
    type: termination
    termination_ref: "END_受付完了_前半"

  - step: END_受付完了_後半
    type: termination
    termination_ref: "END_受付完了_後半"

