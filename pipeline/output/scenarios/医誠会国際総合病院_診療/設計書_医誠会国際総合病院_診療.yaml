# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "incoming-classifier で非通知と判定（顧客仕様では受入許容だが、scaffold デフォルトでは本 END に接続）"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_times で時間外と判定（月〜金 8:30〜17:00 外、および土日祝・年末年始）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "氏名/生年月日/電話番号のリトライ上限到達"
    tts_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、順番に折り返し対応いたしますのでお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（時間帯別）---
  - name: "END_受付完了_前半"
    condition: "全聴取完了 かつ 現在時刻が 8:30〜15:59"
    tts_announcement: "かしこまりました。順番に折り返し対応いたしますのでお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_前半"

  - name: "END_受付完了_後半"
    condition: "全聴取完了 かつ 現在時刻が 16:00〜16:59"
    tts_announcement: "かしこまりました。翌診療日までに順番に折り返し対応いたしますのでお待ちください。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_後半"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # 全ルートで smsFlag=-1 統一（customer_doc「終話後のSMS送信はなし」）

