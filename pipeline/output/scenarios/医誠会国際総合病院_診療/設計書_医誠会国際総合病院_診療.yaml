      NO_RESULT は saveContext2DB(value="登録なし") を経由してリトライ（モジュール選定ガイド 2.5）。
      customer_doc 記載の類義語キーワードは amivoice_dictionary セクションに登録。

  - order: 2
    name: "診察券番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 1
    echo_back: false
    save_to: "medicalCardNumber"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: >
      サブフロー（医誠会国際総合病院$診察券番号聴取）で聴取。8 桁以内。
      「わからない」「持っていない」→ 空文字格納して次へ。
      サブフロー内リトライ失敗時も空文字のまま次のサブフローへ進む（skip 相当）。
      DTMF 8 桁入力可。

  - order: 3
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: >
      サブフロー（医誠会国際総合病院$氏名聴取）で聴取。復唱なし。
      リトライ失敗時は END_聴取失敗 へ（customer_doc 失敗アナウンス該当）。

  - order: 4
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 1
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: >
      サブフロー（医誠会国際総合病院$生年月日聴取）で聴取。DOB Re-confirmation で復唱あり。
      和暦/西暦対応。西暦 8 桁 DTMF 入力可。
      リトライ失敗時は END_聴取失敗 へ。

  - order: 5
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 1
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: >
      サブフロー（医誠会国際総合病院$電話番号聴取）で聴取。Phone Normalization + Re-confirmation で復唱あり。
      通常着信: 着信番号を復唱して肯定/否定で確定。
      非通知: 音声/DTMF で連絡先番号を聴取→復唱。
      リトライ失敗時は END_聴取失敗 へ。

