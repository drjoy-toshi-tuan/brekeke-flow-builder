# --- セクション11: 特記事項・制約 ---
special_notes:
  - "用件は「予約」単一。customer_doc 基本設定 用件①=予約のみで、変更・キャンセル・確認は対象外"
  - "customer_doc 状態定義に 0(途中切断) / 4(処理中) / 5(処理済み) があるが、Gen3 status 許可値 1/2/3/6/7/8/9 に合わせて 4/5 は除外、0 は 2 に置換（CLAUDE.md 状態フラグ規則準拠）"
  - "SMS 送信は行わない（customer_doc 『終話後のSMS送信はなし』）→ 全終話で smsFlag=-1"
  - "リトライ回数は 1 回（合計 2 回質問）— customer_doc 指定に合致"
  - "診療科・診察券番号は「わからない」／聴取失敗時に skip（空文字・登録なしのまま次へ）"
  - "氏名・生年月日・電話番号のリトライ失敗は END_聴取失敗（customer_doc 1回失敗アナウンスを流用）"
  - "16:00 を境に終話アナウンス文言が 2 パターンに分岐（前半=『順番に折り返し』／後半=『翌診療日までに順番に折り返し』）。Script(business_hours, START=8, END=16) で実装"
  - "稼働曜日・時間（月〜金 8:30〜17:00、祝日・年末年始除く）の詳細スケジュールは Dr.JOY 側で設定（acceptance_times の business_hours パラメータに反映）"
  - "非通知受入拒否=設定しない → 非通知着信も受け付ける仕様。customer_doc の 1回失敗アナウンス『非通知』バリエーションは非通知着信が電話番号聴取を通過する前提で書かれている。scaffold デフォルトでは冒頭 incoming-classifier から END_非通知 へ分岐するため、要運用確認（confirmation_items N-1）"
  - "代表電話番号: 0570-099-166（customer_doc 基本設定1）"
  - "050 番号: デモ 05058932432 / 本番 05058931670（customer_doc 基本設定1）"
  - "施設住所: 〒530-0052 大阪府大阪市北区南扇町4-14（customer_doc 基本設定1）"
  - "発話待機時間 1.5 秒 / 無回答待機時間 10 秒（customer_doc 基本設定1）"
  - "customer_doc には「稼働前アナウンス」「通話切断ガイダンス」の文言記載があるが、現行 scaffold 対応範囲外のため本設計書では未反映（要運用確認 N-3）"
  - "customer_doc の失敗アナウンスで『非通知・8:30-16:00』『非通知・16:00-17:00』の変種が定義されているが、電話番号聴取サブフローの retry_failure 専用文言として出し分ける実装は複雑なため、段階的改善として END_聴取失敗 単一終話に統合（confirmation_items N-2）"
  - "診療科類義語 customer_doc の記載通り。『びょういりしんだんか』は『びょうり』のタイプミスと思われるが辞書は原文尊重（要確認 N-4）"

