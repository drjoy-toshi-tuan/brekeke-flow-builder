# 設計書 — 小山記念病院 薬剤部
# 生成元: @director エージェント
# 生成日: 2026-04-17
# 入力資料: docs/migration/gen2_小山記念病院_薬剤部.md
# 元資料:   docs/reference/customer_docs/小山記念病院_薬剤部.md
# 作業種別: Gen2→Gen3 移管
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "小山記念病院"
  group_name: "小山記念病院"
  flow_name: "小山記念病院$薬剤部"
  target_facility: "小山記念病院 薬剤部"
  office_id: "TODO_要確認"
  phone_number: "0299-85-1111"
  business_hours: "TODO_要確認（Dr.JOY側で設定）"
  flow_type: "1flow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
# このフローは薬局→病院薬剤部間の問合せ受付であり、患者ではなく薬局側が発信者。
# 氏名/生年月日/電話番号/診察券番号の標準4点セット聴取は行わないため、
# 個人情報サブフロー（氏名聴取等）を使わない 1flow 型構成を採用する。
flow_structure:
  type: "1flow"
  flows:
    - name: "小山記念病院$薬剤部"
      role: "main"
      description: "薬局からの疑義照会・報告・その他問合せの一次受付"
  subflows: []

# --- セクション3: フローの目的 ---
purpose: >
  小山記念病院 薬剤部に薬局から入電した際、薬局名・用件（疑義照会／報告／その他問合せ）・
  担当者名・患者ID・患者名・診療科・内容を自動聴取し、Dr.JOYへ登録する。
  ボットでは対応完了とし、病院から折り返すための情報を蓄積することを目的とする。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "小山記念病院$薬剤部"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times)
                ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6) → 切断
                └─ 受付可 → 冒頭_アナウンス(TTS)「小山記念病院、薬剤部です。」
                    → 薬局名聴取(E1)
                      → 用件確認(C, enum: 疑義照会/報告/その他問合せ)
                        → 担当者名(T1)
                          → 患者ID(T2)
                            → 患者名(T3)
                              → 用件分岐(ContextMatchRouter on classification)
                                  ├─ 疑義照会 → 診療科(Dept, enum 22科, no_result_default=登録なし)
                                  │                → 詳細分岐(ContextMatchRouter on classification)
                                  │                      ├─ 疑義照会 → 疑義内容(H1) → END_Z1
                                  │                      └─ 報告     → 報告内容(H2) → 折返有無(I2)
                                  │                                                      ├─ 必要   → END_Z1
                                  │                                                      └─ 不要   → END_Z3
                                  ├─ 報告 → 診療科 → 詳細分岐 → 報告内容 → 折返有無 → (同上)
                                  └─ その他 → 問合せ内容(H3) → END_Z1
    notes: |
      Gen2 からの変更点:
      1. 非通知コールは冒頭で切断（Gen2 は非通知でも続行して Fend で連絡先聴取 → Z2 終話）
      2. 着信番号と薬局リスト（NDJSON 全77件）の全桁完全一致で clinicalDepartment2 を自動格納する
         Gen2 §4 の機能は Gen3 では再現しない。常時 E1（薬局名聴取）を実施
      3. Gen2 の「用件_C再ヒアリング」専用ボックスは Gen3 の Retry 機構で代替（retry_count=2）

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭 ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  # --- 冒頭アナウンス ---
  - step: 冒頭_アナウンス
    type: announcement
    next: 薬局名聴取

  # --- E1: 薬局名 ---
  - step: 薬局名聴取
    type: hearing
    output_format: text
    retry_failure: end_failure
    next: 用件確認

  # --- C: 用件 (enum) ---
  - step: 用件確認
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "default"
        next: 担当者名

  # --- T1: 担当者名 ---
  - step: 担当者名
    type: hearing
    output_format: text
    retry_failure: skip
    next: 患者ID

  # --- T2: 患者ID ---
  - step: 患者ID
    type: hearing
    output_format: text
    retry_failure: skip
    next: 患者名

  # --- T3: 患者名 ---
  - step: 患者名
    type: hearing
    output_format: text
    retry_failure: skip
    next: 用件分岐

  # --- 用件分岐 (classification で後続ルート決定) ---
  - step: 用件分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "疑義照会"
        next: 診療科
      - match: "報告"
        next: 診療科
      - match: "default"
        next: 問合せ内容

  # --- Dept: 診療科 (enum 22科) ---
  - step: 診療科
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    retry_failure: skip
    conditions:
      - match: "default"
        next: 詳細分岐

  # --- 詳細分岐 (classification で 疑義/報告 分岐) ---
  - step: 詳細分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "疑義照会"
        next: 疑義内容
      - match: "報告"
        next: 報告内容
      - match: "default"
        next: 報告内容

  # --- H1: 疑義内容 ---
  - step: 疑義内容
    type: hearing
    output_format: text
    retry_failure: skip
    next: END_Z1

  # --- H2: 報告内容 ---
  - step: 報告内容
    type: hearing
    output_format: text
    retry_failure: skip
    next: 折返有無

  # --- H3: 問合せ内容 ---
  - step: 問合せ内容
    type: hearing
    output_format: text
    retry_failure: skip
    next: END_Z1

  # --- I2: 折返有無 (enum: 必要/不要) ---
  - step: 折返有無
    type: hearing
    output_format: enum
    retry_failure: skip
    conditions:
      - match: "必要"
        next: END_Z1
      - match: "不要"
        next: END_Z3
      - match: "default"
        next: END_Z3

  # --- 終話: Z1 (通常終話) ---
  - step: END_Z1
    type: termination
    termination_ref: "END_Z1"

  # --- 終話: Z3 (報告・折り返し不要) ---
  - step: END_Z3
    type: termination
    termination_ref: "END_Z3"

