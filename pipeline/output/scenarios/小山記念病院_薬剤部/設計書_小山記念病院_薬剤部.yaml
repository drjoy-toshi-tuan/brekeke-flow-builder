# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2 §1.1「復唱・聞き返し禁止」に厳格準拠し、全 hearing で echo_back=false、復唱モジュール非配置"
  - "Gen2 §4 の着信電話番号と薬局リスト（NDJSON 全77件）の全桁完全一致自動特定機能は Gen3 標準モジュールで再現不可のため、機能を廃止し常時 E1（薬局名聴取）を実施する（UX は一段階劣化）"
  - "Gen2 では非通知着信でも継続し Fend（連絡先電話番号聴取）→ Z2 終話を行っていたが、Gen3 標準の非通知切断に変更。Z2 終話パターンは廃止"
  - "Gen2 §9 の Z1/Z2/Z3 発話中切断の特例（status=1 維持）は Gen3 では saveCompletionFlag2db の単純な status 設定で代替"
  - "Gen2 status=0（途中切断）は Gen3 status=2（代表案内）に置換。Gen2 status=1（通話完了）は Gen3 status=1（未処理）にマッピング"
  - "Gen2 smsFlag『常に 0』→ Gen3 では SMS 送信なし = sms_flag='-1' で統一"
  - "Gen2 §1.15 の patientName 末尾敬称除去は、OpenAI を経由しない text 単純保存では実装されない。敬称付きで保存される前提で Dr.JOY 側が吸収する想定"
  - "Gen2 の『用件_C再ヒアリング』専用ボックス（AI補完トリガ）は Gen3 の Retry モジュール（retry_count=2）で代替。リトライ失敗時は skip し、後段の ContextMatchRouter default で「その他問合せ」ルートへ合流"
  - "Gen2 §7 の I2 不明瞭→不要ルールは、折返有無 enum hearing の conditions に default: END_Z3 を追加して再現"
  - "Gen2 §1.8 details は報告ルートの I2 聴取時のみ格納。その他区分では空のままで OK（Dr.JOY 側で空文字表示）"
  - "Gen2 §1.16 および §4 全桁完全一致ルールは Gen3 では廃止のため、§11 Mermaid 付録図の『冒頭_一致』分岐（{yomi}さんですね。）も非実装"
  - "患者ID（T2）は Gen2 も音声のみ（<dtmf/> タグ無し）。英数ID を音声で読み上げてもらう UX。認識精度が課題の場合は後日 DTMF_AmiVoice 化を検討"

