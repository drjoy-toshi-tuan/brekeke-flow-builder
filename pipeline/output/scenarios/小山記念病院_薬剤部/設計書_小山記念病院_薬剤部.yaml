# --- セクション6: 聴取項目一覧 ---
# Gen2 §1.1「復唱・聞き返し禁止」に従い、全項目 echo_back=false。
# Gen2 のフローには <dtmf/> タグが Fend のみに付与されている（他項目は音声のみ）。
# Gen3 でも Fend 廃止に伴い DTMF 入力は使用しない → 全項目 AmiVoice_STT。
hearing_items:
  - order: 1
    name: "薬局名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment2"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "E1。Gen2 §4 の着信番号自動特定は Gen3 未対応のため常時聴取"

  - order: 2
    name: "用件確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "疑義照会"
      - "報告"
      - "その他問合せ"
    notes: |
      C。Gen2 §7 の近似語を含め、「疑義照会／報告／その他問合せ」の3択に正規化。
      Retry 失敗時は skip でフロー続行（classification 空 → 後段の用件分岐 default で「その他」扱い）。

  - order: 3
    name: "担当者名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "Desiredreservation"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "T1"

  - order: 4
    name: "患者ID"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "medicalCardNumber"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "T2。Gen2 では <dtmf/> タグ無し（音声のみ）。数値認識が不安定な場合は DTMF 化を検討"

  - order: 5
    name: "患者名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "T3。Gen2 §1.15 末尾敬称除去は TEXT 単純保存では省略"

  - order: 6
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "内科"
      - "消化器科"
      - "消化器内科"
      - "循環器科"
      - "腎臓内科"
      - "呼吸器内科"
      - "産婦人科"
      - "眼科"
      - "泌尿器科"
      - "外科"
      - "乳腺外科"
      - "整形外科"
      - "脳神経外科"
      - "神経内科"
      - "形成外科"
      - "口腔外科"
      - "救急科"
      - "甲状腺科"
      - "心臓血管外科"
      - "糖尿病内科"
      - "緩和ケア科"
      - "透析センター"
    notes: "Dept。疑義照会・報告ルートのみ聴取。no_result 時は「登録なし」を格納"

  - order: 7
    name: "疑義内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "H1。疑義照会ルートのみ"

  - order: 8
    name: "報告内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "H2。報告ルートのみ"

  - order: 9
    name: "問合せ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "H3。その他問合せルートのみ"

  - order: 10
    name: "折返有無"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "必要"
      - "不要"
    notes: |
      I2。報告ルートのみ。Gen2 §7 の不明瞭→不要ルールに合わせ default→END_Z3。

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "小山記念病院、薬剤部です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "薬局名聴取"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "薬局名聴取"
    tts_announcement: "薬局名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: "clinicalDepartment2"
    next_step: "用件確認"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "用件確認"
