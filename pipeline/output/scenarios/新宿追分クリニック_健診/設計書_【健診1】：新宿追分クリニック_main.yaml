  - module_name: "終話_条件付SMS案内"
    purpose: "正常終話 - 条件付SMS案内（携帯 x キャンセル/問い合わせ）"
    announcement: "内容確認後、必要があれば 土日祝日を除いた 3営業日以内にスタッフより、折り返しまたショートメッセージでご連絡をいたします。それでは失礼いたします。"

  - module_name: "聴取失敗_スキップ"
    purpose: "聴取失敗時のスキップアナウンス（Gen2仕様踏襲）"
    announcement: "ご回答を確認できませんでした。次の内容を伺います。"

