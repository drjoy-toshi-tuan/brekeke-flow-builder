    sms_flag: "4"
    completion_flag_name: "完了フラグ_問い合わせ"

  - name: "END_問い合わせ_固定"
    condition: "classification=その他の問い合わせ かつ phoneType=固定"
    tts_announcement: "内容確認後、土日祝日を除いた 3営業日以内にスタッフより折り返しご連絡をいたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "4"
    completion_flag_name: "完了フラグ_問い合わせ"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "changeitem"
    - "phoneType"
  patterns:
    - condition: "classification=予約"
      sms_flag: "1"
      notes: "予約ルート。TTS: 携帯=終話1(SMS案内付), 固定=終話2(折り返しのみ)"
    - condition: "classification=予約変更 & changeitem=日程の変更"
      sms_flag: "2"
      notes: "日程変更ルート。TTS: 携帯=終話1, 固定=終話2"
    - condition: "classification=予約変更 & changeitem=内容の変更"
      sms_flag: "2"
      notes: "内容変更ルート。TTS: 携帯=終話1, 固定=終話2"
    - condition: "classification=予約変更 & changeitem=予約の取り消し"
      sms_flag: "3"
      notes: "キャンセルルート。TTS: 携帯=終話3(条件付SMS案内), 固定=終話2"
    - condition: "classification=その他の問い合わせ"
      sms_flag: "4"
      notes: "問い合わせルート。TTS: 携帯=終話3, 固定=終話2"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "問い合わせ_聴取の後（その他の問い合わせルート内）"
  pre_termination: true
  notes: |
    Gen2→Gen3移管デフォルト: パターン3（複合）
    - 問い合わせフロー内: 問い合わせ内容聴取後にRAGサブフローへ遷移（最大3ラウンドのFAQ対応）
    - 全終話前: 予約/予約変更/キャンセル各ルートの終話直前に「何かご質問はございますか？」で再度RAGサブフローへ遷移
    Gen2のFAQ対応ルール（3回制限）はRAGサブフロー内で自動的に処理される。
    RAGサブフローのデフォルトTTS:
    - パターン1（問い合わせ内初回）: お問い合わせ内容をご自由におっしゃってください。
    - パターン2（終話前初回）: 何かご質問はございますか？
    - ループ時: その他に何かご質問はございますか？ない場合は「ありません」のようにお話しください。

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # === メインフロー ===
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内 + 日程確認質問"
    announcement: "お電話ありがとうございます。新宿追分クリニック <break time=\"150ms\"/> および <break time=\"150ms\"/> 新宿追分クリニック・レディース健診予約センター専用AI電話です。団体予約の方は当院ホームページをご覧ください。もう一度お聞きになりたい場合は、もう一回、とお話しください。<break time=\"500ms\"/> 本日の予約に関する内容ですか？はい、そうです、か、いいえ、違います、でお話しください。"

  - module_name: "案内当日"
    purpose: "当日予約者向け案内（別番号への誘導）"
    announcement: "本日のご予約について、キャンセル、または日程変更希望の方は、次の質問に進みますのでそのままお待ちください。遅刻のご連絡など、キャンセル、日程変更以外のお問い合わせについては、こちらのAI電話ではお受けできません。恐れ入りますが、<speak type=\"telephone\">0353633334</speak>に、おかけ直しください。繰り返します。<speak type=\"telephone\">0353633334</speak> です。"

  - module_name: "本人_代理人_聴取"
    purpose: "本人/代理人確認"
    announcement: "今回健診をご予約されるご本人様ですか？はい、そうです、か、いいえ、違います、でお話しください。"

  - module_name: "電話口の人_聴取"
    purpose: "代理人の名前聴取"
    announcement: "ご連絡いただいている方のお名前を、名前はヤマダタロウです、のようにフルネームでお話ください。"

  - module_name: "担当者_案内"
    purpose: "SMS/折り返し案内"
    announcement: "SMSがご利用いただけない方には、担当者よりお電話いたします。"

  - module_name: "用件_聴取"
    purpose: "用件3択案内"
    announcement: "ご用件を次の3つのうちのいずれかでお話しください。 <break time=\"500ms\"/> 1、予約を取る。<break time=\"500ms\"/> 2、予約変更、<break time=\"500ms\"/> または、<break time=\"200ms\"/>取り消し。<break time=\"500ms\"/> 3、その他問い合わせ。それではお話しください。"

  - module_name: "コース_聴取"
    purpose: "健診コース聴取"
    announcement: "受診を希望される健診コースや内容をお話ください。"

  - module_name: "希望時期_聴取"
    purpose: "希望時期確認（3週間以内?）"
    announcement: "受診を希望される時期は3週間以内ですか？はい、そうです、か、いいえ、違います、でお話しください。"

  - module_name: "予約日_聴取"
    purpose: "現在の予約日聴取"
    announcement: "現在のご予約日をお話ください。わからない場合はわかりませんとお答えください。"

  - module_name: "変更項目_聴取"
    purpose: "変更項目3択案内"
    announcement: "それでは、次の3つのうちいずれかでお話しください。<break time=\"500ms\"/>1、日程の変更。<break time=\"500ms\"/>2、内容の変更。<break time=\"500ms\"/>3、予約を取り消し。<break time=\"500ms\"/>それではお話しください。"

  - module_name: "変更内容_聴取"
    purpose: "変更内容聴取"
    announcement: "変更を希望される内容をお話ください。"

  - module_name: "問い合わせ_聴取"
    purpose: "問い合わせ内容聴取"
    announcement: "お問い合わせ内容をお話しください。"

  # === 終話系TTS ===
  - module_name: "非通知_アナウンス"
    purpose: "非通知案内"
    announcement: "お電話ありがとうございます。新宿追分クリニック <break time=\"150ms\"/> および <break time=\"150ms\"/> 新宿追分クリニック・レディース健診予約センター専用AI電話です。申し訳ございません。電話番号が非通知設定の場合、AI電話では受付できません。通知設定をしていただくか、先頭に数字の186を付けておかけなおしください。それでは失礼いたします。"

  - module_name: "時間外_アナウンス"
    purpose: "時間外案内"
    announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"

  - module_name: "終話_聴取失敗"
    purpose: "聴取失敗終話"
    announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"

  - module_name: "終話_SMS案内"
    purpose: "正常終話 - SMS案内付（携帯 x 予約/日程変更/内容変更）"
    announcement: "電話終了後に送信されるSMSより必要項目の入力を完了してください。土日祝日を除いた 3営業日以内にスタッフより折り返し、またはショートメッセージでご連絡をいたします。それでは失礼いたします。"

  - module_name: "終話_折り返し案内"
    purpose: "正常終話 - 折り返しのみ（全固定電話）"
