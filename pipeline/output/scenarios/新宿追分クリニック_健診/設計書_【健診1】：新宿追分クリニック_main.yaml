    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_日程変更"

  - name: "END_日程変更_固定"
    condition: "classification=予約変更 かつ changeitem=日程の変更 かつ phoneType=固定"
    tts_announcement: "内容確認後、土日祝日を除いた 3営業日以内にスタッフより折り返しご連絡をいたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_日程変更"

  # --- 正常系: 内容変更ルート ---
  - name: "END_内容変更_携帯"
    condition: "classification=予約変更 かつ changeitem=内容の変更 かつ phoneType=携帯"
    tts_announcement: "電話終了後に送信されるSMSより必要項目の入力を完了してください。土日祝日を除いた 3営業日以内にスタッフより折り返し、またはショートメッセージでご連絡をいたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_内容変更"

  - name: "END_内容変更_固定"
    condition: "classification=予約変更 かつ changeitem=内容の変更 かつ phoneType=固定"
    tts_announcement: "内容確認後、土日祝日を除いた 3営業日以内にスタッフより折り返しご連絡をいたします。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_内容変更"

  # --- 正常系: キャンセルルート ---
  - name: "END_キャンセル_携帯"
    condition: "classification=予約変更 かつ changeitem=予約の取り消し かつ phoneType=携帯"
    tts_announcement: "内容確認後、必要があれば 土日祝日を除いた 3営業日以内にスタッフより、折り返しまたショートメッセージでご連絡をいたします。それでは失礼いたします。"
