# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2からの移管案件。Gen2プロンプトの聴取順序（個人情報→用件分岐）をGen3でも踏襲する"
  - "Gen2の「かしこまりました」使用禁止ルールをGen3でも適用。ただし変更項目聴取のTTS原文にGen2が含めている場合はそのまま転記"
  - "聴取失敗時の挙動はskip（「ご回答を確認できませんでした。次の内容を伺います。」TTS後に次のステップへ進む）。各RetryモジュールのNo moreパスに聴取失敗_スキップTTSを配置すること"
  - "smsFlag分岐は3変数（classification x changeitem x phoneType）で決定。電話番号サブフローはreturn型のため、phoneType判定はメインフロー側で実施"
  - "電話番号聴取サブフローの返却値（1=携帯, 2=その他）をメインフロー側で保持し、終話ルーティングで使用する。ContextMatchRouter等で参照可能にすること"
  - "Gen2の非通知アナウンスは施設名を含む長文（冒頭挨拶 + 非通知拒否案内 + 186案内）。Gen3ではこの施設固有文言を使用する"
  - "Gen2の案内当日ステップは施設固有。電話番号 03-5363-3334 への誘導を含む。<speak type=\"telephone\">タグはGen3のTTSでも保持すること"
  - "Gen2 dialogue_completedの未使用フィールド（address, insuredPerson, insuranceNumber, symbol, healthInsuranceNumber, aidConfirmation, kitConfirmation, insuranceFacility, option）はGen3に移管しない。将来的に必要になった場合はsaveContextModel2DBに追加する"
  - "Gen2のstatus=0（途中切断/冒頭切断）はGen3ではsaveCompletionFlag2dbを呼ばない（Gen3ではstatus=0は使用禁止）"
  - "電話番号聴取サブフローのTTS文言をプロパティで「平日、9時から16時、のあいだで、繋がりやすい電話番号をお知らせください」に差し替えること"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
  - item: "営業時間（acceptance_timesのスケジュール設定はDr.JOY側）"
    resolved: false
  - item: "RAGサブフローのパターン（デフォルト: 3。不要であれば1に変更）"
    resolved: false
  - item: "時間外アナウンス文言（デフォルトテンプレート使用中。施設固有の文言があれば差し替え）"
    resolved: false
  - item: "Gen2未使用フィールドのGen3除外確認（address, insurance系等を含めないことの確認）"
    resolved: false
