# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1→Gen3 移管。Gen1 の 21 サブシナリオを第 3 世代標準フローに統合。施設選択 DTMF（東新潟/西新潟/長岡）は新潟縣単独施設のため削除"
  - "用件確認に echo_back=true（用件の復唱）を設定。OpenAI_用件確認 → ContextMatchRouter で 5 分岐"
  - "終話アナウンスは date_of_call_classifier で営業時間内/外を判定し、営業内『内容を確認の上、担当者よりご連絡』 / 営業外『当施設の営業日に担当者より、ご連絡』 で切替（Gen1 完了フラグ後の入電曜日時間判断再実行を再現）。キャンセルのみ時間判定スキップ（Gen1 でも文言一定）"
  - "smsFlag: 健診予約・日時変更=1（WEB 予約 URL を SMS 送信）/ それ以外=−1。受診票なし時の WEB 予約案内も smsFlag=−1（SMS 送信文面は Dr.JOY 側で別途設定）"
  - "お盆連休（8/13-8/15）は acceptance_times の holidays 配列で 営業外扱い → END_時間外。Gen1 の連休中専用 用件 hearing（3 値制限）は Gen3 では実装しない。NON-BLOCKER N-3 参照"
  - "GW ハードコード（5/1 16:00 〜 5/6 終日）は holidays 配列に集約（Gen1 主要差分の一つ）"
  - "当日予約 10:30 締切ロジック（Gen1 受診希望日聞き取りの 現在の時間判断 → 当日：予約不可）は本設計書には含めず NON-BLOCKER N-1 として記録。実装する場合は受診希望日 hearing の直後に script_template: custom を追加"
  - "Gen1 「（保留）折返し方法確認」yaml は dead code（SMS 送信へ直結）のため削除"
  - "Gen1 折り返し確認 12 経路（希望日NG / 氏名NG / 電話番号NG / 予約日NG / 内容NG / 用件NG / 希望時間NG / 生年月日NG / 受診票有無NG / 登録番号NG / 折返し方法NG / 担当名NG）は scaffold の retry_failure: end_failure に統一（END_聴取失敗 を経由）。明示的な折り返し希望/不要分岐が必要なら NON-BLOCKER N-2 を参照"
  - "個人情報サブフロー（氏名・生年月日・電話番号）は return 方式。終話チェーンはメインフロー側で用件×営業内/外の組み合わせで処理（self_contained ではない）"
  - "受診票なし時は SMS 送信せず WEB 予約案内のみで終話（END_WEB案内 status=2 smsFlag=-1）。Gen1 の SMS 送信用携帯番号聞き取り は実装しない"
  - "Gen1 動的タグ `<? $予約日の読み ?>` `<? $生年月日（復唱用） ?>` `<? $希望時間の読み ?>` は echo_back に集約済み。`<% var %>` 構文への置換は scaffold が処理"
  - "RAG サブフローは不要（rag_subflow.pattern: none）。Gen1 に FAQ 機能なし、その他問合せは聴取後に担当者ご連絡で対応"

