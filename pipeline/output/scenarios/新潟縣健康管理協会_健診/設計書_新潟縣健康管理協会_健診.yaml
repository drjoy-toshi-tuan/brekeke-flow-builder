# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の5つのうちの、いずれかでお話ください。1「健診の予約」、2「予約日時の変更」、3「予約のキャンセル」、4「企業ご担当者様からの問い合わせ」、5「その他お問い合わせ」、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "健診予約"
        - "日時変更"
        - "キャンセル"
        - "企業問合せ"
        - "問い合わせ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「健診」「予約」「人間ドック」「特定健診」「雇入れ」「事業主」「就職」を含む"
          output: "健診予約"
        - input: "DTMF 2 または「変更」「日程」「日時」「日付」「取り直し」「変えたい」を含む"
          output: "日時変更"
        - input: "DTMF 3 または「キャンセル」「やめる」「取り消し」「取消」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「企業」「会社」「企業担当」「担当」「担当者」「団体」「法人」を含む"
          output: "企業問合せ"
        - input: "DTMF 5 または「問い合わせ」「お問合せ」「質問」「金額」「料金」「教えて」「検査結果」「内容」「アクセス」を含む"
          output: "問い合わせ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "分岐_用件（CMR）"
    retry_failure: "end_failure"

  - step_name: "受診票確認"
    tts_announcement: "「健康診断受診のお知らせ」は、お手元にございますか？お持ちの方は1、お持ちでない方は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「あります」「持っている」「持ってます」を含む"
          output: "あり"
        - input: "DTMF 2 または「いいえ」「ありません」「持っていない」「もってない」を含む"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "history"
    next_step: "あり→登録番号 / なし→END_WEB案内"
    retry_failure: "end_failure"

  - step_name: "登録番号"
    tts_announcement: "登録番号をお伺いします。「健康診断受診のお知らせ」に記載されている登録番号を、ダイヤルプッシュで入力してください。入力が終わりましたらシャープを押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "数字列"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 数字入力 または音声で数字を発話"
          output: "数字列（そのまま保存）"
        - input: "「わからない」「ない」「持っていない」を含む"
          output: "NO_RESULT"
        - input: "数字として認識できない"
          output: "NO_RESULT"
      no_result_condition: "数字以外の発話"
    save_to: "medicalCardNumber"
    next_step: "受診希望日聴取"
    retry_failure: "end_failure"

  - step_name: "予約日"
    tts_announcement: "現在のご予約日を「4月1日」のように日付でお話しください。または、ダイヤルプッシュで月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY-MM-DD 形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "「4月1日」「令和7年4月1日」等の日付発話、または DTMF 4 桁"
          output: "YYYY-MM-DD 形式に正規化"
        - input: "日付として認識できない"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない"
    save_to: "reservationDate"
    next_step: "分岐_予約日後（CMR）"
    retry_failure: "end_failure"

  - step_name: "受診希望日"
    tts_announcement: "受診希望日を「4月1日」のように日付でお話しください。または、ダイヤルプッシュで月と日にちの4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY-MM-DD 形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "「4月15日」「来週の月曜」等の日付発話、または DTMF 4 桁"
          output: "YYYY-MM-DD 形式に正規化"
        - input: "日付として認識できない"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない"
    save_to: "desiredDate"
    next_step: "希望時間聴取"
    retry_failure: "end_failure"

  - step_name: "希望時間"
    tts_announcement: "ご希望の時間を「9時30分」のように30分単位でお話しください。または、ダイヤルプッシュで時刻の4桁の数字を入力してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "HH:MM 形式の時間"
        - "NO_RESULT"
      mapping:
        - input: "「9時30分」「10時」等の時間発話、または DTMF 4 桁"
          output: "HH:MM 形式に正規化（30 分単位）"
        - input: "時間として認識できない"
          output: "NO_RESULT"
      no_result_condition: "時間として認識できない"
    save_to: "desiredTime"
    next_step: "氏名聴取"
    retry_failure: "end_failure"

  - step_name: "企業内容"
    tts_announcement: "お問い合わせの内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "企業名担当者聴取"
    retry_failure: "skip"

  - step_name: "企業名担当者"
    tts_announcement: "企業または法人名と、ご担当者のお名前をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "companyName"
    next_step: "企業連絡先聴取"
    retry_failure: "skip"

  - step_name: "企業連絡先"
    tts_announcement: "ご連絡先のお電話番号を、固定電話の場合は市外局番からお話しください。または、ダイヤルプッシュで入力してください。入力が終わりましたらシャープを押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "電話番号（数字列）"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 数字入力 または音声で電話番号を発話"
          output: "電話番号（数字列、ハイフン除去）"
        - input: "数字として認識できない"
          output: "NO_RESULT"
      no_result_condition: "数字以外の発話"
    save_to: "companyPhone"
    next_step: "終話_時間判定"
    retry_failure: "end_failure"

  - step_name: "内容_その他"
    tts_announcement: "お問い合わせの内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "氏名聴取"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（acceptance_times が NG を返す。お盆連休も含む）"
    tts_announcement: "申し訳ございませんが、ただいまの時間は受付時間外となっております。予約専用ダイヤルの受付時間は、祝日を除く、月曜日から土曜日の8時から16時となっております。恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "大変申し訳ございません。上手く聞き取ることができませんでした。誠に恐れ入りますが、改めておかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系：健診予約 ---
  - name: "END_予約完了_営業内"
    condition: "健診予約完了 かつ 営業時間内"
    tts_announcement: "かしこまりました。内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約完了_営業内"

  - name: "END_予約完了_営業外"
    condition: "健診予約完了 かつ 営業時間外"
    tts_announcement: "かしこまりました。当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約完了_営業外"

  # --- 正常系：日時変更 ---
  - name: "END_変更完了_営業内"
    condition: "日時変更完了 かつ 営業時間内"
    tts_announcement: "かしこまりました。内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更完了_営業内"

  - name: "END_変更完了_営業外"
    condition: "日時変更完了 かつ 営業時間外"
    tts_announcement: "かしこまりました。当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更完了_営業外"

  # --- 正常系：キャンセル（時間判定スキップ）---
  - name: "END_キャンセル完了"
    condition: "予約キャンセル完了"
    tts_announcement: "ご予約のキャンセルを承りました。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_キャンセル完了"

  # --- 正常系：企業問合せ ---
  - name: "END_企業問合せ完了_営業内"
    condition: "企業問合せ完了 かつ 営業時間内"
    tts_announcement: "お問い合わせを承りました。内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_企業問合せ_営業内"

  - name: "END_企業問合せ完了_営業外"
    condition: "企業問合せ完了 かつ 営業時間外"
    tts_announcement: "お問い合わせを承りました。当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_企業問合せ_営業外"

  # --- 正常系：その他問い合わせ ---
  - name: "END_問合せ完了_営業内"
    condition: "問い合わせ（その他）完了 かつ 営業時間内"
    tts_announcement: "お問い合わせを承りました。内容を確認の上、担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_問合せ_営業内"

  - name: "END_問合せ完了_営業外"
    condition: "問い合わせ（その他）完了 かつ 営業時間外"
    tts_announcement: "お問い合わせを承りました。当施設の営業日に担当者より、ご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_問合せ_営業外"

  # --- 正常系：受診票なし → WEB 予約案内 ---
  - name: "END_WEB案内"
    condition: "健診予約 かつ 受診票なし"
    tts_announcement: "恐れ入りますが、健康診断のお知らせが届いていない方は、ホームページのWEB予約からお申込みください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_WEB案内"

# smsFlag 分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
  patterns:
    - condition: "classification=健診予約"
      sms_flag: "1"
      notes: "予約完了 → SMS 送信あり（WEB 予約 URL）"
    - condition: "classification=日時変更"
      sms_flag: "1"
      notes: "変更完了 → SMS 送信あり"
    - condition: "classification=キャンセル"
      sms_flag: "-1"
      notes: "キャンセル → SMS 送信なし"
    - condition: "classification=企業問合せ"
      sms_flag: "-1"
      notes: "企業問合せ → SMS 送信なし"
    - condition: "classification=問い合わせ"
      sms_flag: "-1"
      notes: "その他問合せ → SMS 送信なし"
    - condition: "受診票なし（健診予約 かつ history=なし）"
      sms_flag: "-1"
      notes: "WEB 予約案内のみ。SMS 送信なし"

# --- セクション8b: RAG/FAQ 検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTS モジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "営業日の冒頭施設案内"
    announcement: "お電話ありがとうございます。新潟縣健康管理協会の、予約専用、AI電話です。"

  - module_name: "用件確認"
    purpose: "用件 5 分岐の選択アナウンス"
    announcement: "ご用件を、次の5つのうちの、いずれかでお話ください。1「健診の予約」、2「予約日時の変更」、3「予約のキャンセル」、4「企業ご担当者様からの問い合わせ」、5「その他お問い合わせ」、それでは、お話ください。"

