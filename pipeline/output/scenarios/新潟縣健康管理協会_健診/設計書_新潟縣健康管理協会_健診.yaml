# 移管方針: 既存 3 施設用設計（新潟県けんこう財団_健診）をベースに新潟縣固有差分のみ反映
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "新潟縣健康管理協会"
  scenario_name: "健診"
  group_name: "新潟縣健康管理協会"
  flow_name: "新潟縣健康管理協会$健診"
  target_facility: "新潟縣健康管理協会（単独施設）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "祝日除く月〜土 8:00〜16:00（詳細は Dr.JOY 側で設定）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "新潟縣健康管理協会$健診"
      role: "main"
      description: "冒頭チェーン → 用件 5 分岐 → 各ルート聴取 → 終話時間判定 → 各 (用件 × 営業内/外) 終話"
    - name: "新潟縣健康管理協会$氏名聴取"
      role: "sub"
      description: "氏名聴取 → 結果返却"
    - name: "新潟縣健康管理協会$生年月日聴取"
      role: "sub"
      description: "生年月日聴取（復唱あり）→ 結果返却"
    - name: "新潟縣健康管理協会$電話番号聴取"
      role: "sub"
      description: "着信番号分岐 → 電話番号聴取 → 復唱確認 → 結果返却（return）"
  subflows:
    - name: "新潟縣健康管理協会$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen3 標準サブフロー。サブフローテンプレートを完全コピー"
    - name: "新潟縣健康管理協会$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen3 標準サブフロー。復唱あり"
    - name: "新潟縣健康管理協会$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen3 標準サブフロー。復唱あり。終話チェーンはメインフロー側（用件別 × 営業内/外）で処理するため return 方式"

# --- セクション3: フローの目的 ---
purpose: "新潟縣健康管理協会の健診予約受付 AI 電話。用件 5 分岐（健診予約 / 日時変更 / キャンセル / 企業問合せ / その他問合せ）を行い、各ルートで必要な情報を聴取する。聴取完了後に営業時間を再判定し、営業時間内なら『内容を確認の上、担当者よりご連絡』、営業時間外なら『当施設の営業日に担当者より、ご連絡』とアナウンスを切り替える。健診予約・日時変更完了時は SMS 送信フラグを立てて Dr.JOY 側で WEB 予約 URL を SMS 送信する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "新潟縣健康管理協会$健診"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知(status=7) → 切断
            └─ 通常 → 営業時間チェック(acceptance_times)
                  ├─ 時間外 → END_時間外(status=6) → 切断
                  └─ 受付可 → 冒頭_アナウンス
                        → 用件確認(enum, echo_back=true)
                          → 分岐_用件(ContextMatchRouter on OpenAI_用件確認)
                              ├─ 健診予約 → 受診票確認(enum)
                              │     ├─ あり → 登録番号 → 受診希望日(echo_back) → 希望時間(echo_back) → 氏名聴取
                              │     └─ other(=なし) → END_WEB案内(status=2) → 切断
                              ├─ 日時変更 → 予約日(echo_back) → 分岐_予約日後(CMR)
                              │                                        ├─ 日時変更 → 受診希望日 → 希望時間 → 氏名聴取
                              │                                        └─ other(=キャンセル) → 氏名聴取
                              ├─ キャンセル → 予約日(echo_back) → 分岐_予約日後(CMR) → 氏名聴取
                              ├─ 企業問合せ → 企業内容 → 企業名担当者 → 企業連絡先(echo_back) → 終話_時間判定
                              └─ other(=問い合わせ) → 内容_その他 → 氏名聴取

      氏名聴取 → 生年月日聴取 → 電話番号聴取 → 分岐_キャンセル_or_他(CMR)
        ├─ キャンセル → END_キャンセル完了(status=1, smsFlag=-1) → 切断
        └─ other → 終話_時間判定(date_of_call_classifier)
              ├─ 営業内 → 終話_分岐_営業内(CMR on OpenAI_用件確認)
              │     ├─ 健診予約    → END_予約完了_営業内(status=1, smsFlag=1)
              │     ├─ 日時変更    → END_変更完了_営業内(status=1, smsFlag=1)
              │     ├─ 企業問合せ  → END_企業問合せ完了_営業内(status=1, smsFlag=-1)
              │     └─ other(=問合せ) → END_問合せ完了_営業内(status=1, smsFlag=-1)
              └─ other(=営業外) → 終話_分岐_営業外(CMR on OpenAI_用件確認)
                    ├─ 健診予約    → END_予約完了_営業外(status=1, smsFlag=1)
                    ├─ 日時変更    → END_変更完了_営業外(status=1, smsFlag=1)
                    ├─ 企業問合せ  → END_企業問合せ完了_営業外(status=1, smsFlag=-1)
                    └─ other(=問合せ) → END_問合せ完了_営業外(status=1, smsFlag=-1)
    notes: |
      - 冒頭チェーン: wait → saveContextModel2DB → incoming-classifier → acceptance_times → 冒頭_アナウンス
      - 用件確認は echo_back=true（Pattern B）。OpenAI_用件確認 の出力を classification context に保存し、後段の ContextMatchRouter で分岐
      - 予約日 hearing は日時変更とキャンセルで共有。後段の分岐_予約日後 CMR で classification を参照して分岐
      - キャンセルは時間判定スキップ（Gen1 でも文言が時間内/外で同一のため）
      - 健診予約（受診票なし）は WEB 予約案内で即終話（status=2）
      - 折り返し確認 12 経路（Gen1 の用件NG/希望日NG等の中継）は scaffold の retry_failure: end_failure → END_聴取失敗 に統一

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック ===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # === 用件確認 (echo_back あり、5 値) ===
  - step: 用件確認
    type: hearing
    output_format: enum
    echo_back: true
    save_to: classification
    output_labels:
      - 健診予約
      - 日時変更
      - キャンセル
      - 企業問合せ
      - 問い合わせ
    retry_failure: end_failure
    next: 分岐_用件

  - step: 分岐_用件
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "健診予約"
        next: 受診票確認
      - match: "日時変更"
        next: 予約日
      - match: "キャンセル"
        next: 予約日
      - match: "企業問合せ"
        next: 企業内容
      - match: "other"
        next: 内容_その他
    notes: "other = 問い合わせ（5 値の最後の一つ）。Gen1 用件の分岐 を CMR で再現"

  # === 健診予約ルート ===
  - step: 受診票確認
    type: hearing
    output_format: enum
    echo_back: false
    save_to: history
    output_labels:
      - あり
      - なし
    retry_failure: end_failure
    conditions:
      - match: "あり"
        next: 登録番号
      - match: "other"
        next: END_WEB案内
    notes: "DTMF 1=あり, 2=なし。other=なし → WEB 予約案内で即終話（Gen1 webページ案内へ を継承）"

  - step: 登録番号
    type: hearing
    output_format: text
    echo_back: false
    save_to: medicalCardNumber
    retry_failure: end_failure
    next: 受診希望日
    notes: "DTMF 数字入力（10 桁）。termdtmf=#。Gen1 登録番号聞き取り を継承。「わからない」発話は OpenAI が空文字に正規化（NO_RESULT 扱い）"

  # === 予約日 (日時変更・キャンセル共通) ===
  - step: 予約日
    type: hearing
    output_format: datetime
    echo_back: true
    save_to: reservationDate
    retry_failure: end_failure
    next: 分岐_予約日後
    notes: "現在の予約日。日時変更・キャンセルで共有。echo_back=true（Gen1 復唱確認継承）"

  - step: 分岐_予約日後
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "日時変更"
        next: 受診希望日
      - match: "other"
        next: 氏名聴取
    notes: "Gen1 用件の分岐_2 を CMR で再現。other=キャンセル → 氏名聴取直行（希望日・希望時間スキップ）"

  # === 受診希望日・希望時間 (健診予約・日時変更共通) ===
  - step: 受診希望日
    type: hearing
    output_format: datetime
    echo_back: true
    save_to: desiredDate
    retry_failure: end_failure
    next: 希望時間
    notes: "echo_back=true（Gen1 復唱確認）。当日 10:30 締切ロジックは special_notes 参照（NON-BLOCKER N-1）"

  - step: 希望時間
    type: hearing
    output_format: text
    echo_back: true
    save_to: desiredTime
    retry_failure: end_failure
    next: 氏名聴取
    notes: "30 分単位。echo_back=true（Gen1 復唱確認）。健診予約・日時変更で共有"

  # === 企業問合せルート ===
  - step: 企業内容
    type: hearing
    output_format: text
    echo_back: false
    save_to: reason
    retry_failure: skip
    next: 企業名担当者
    notes: "AmiVoice STT のみ（フリーテキスト）。retry_failure=skip で次へ"

  - step: 企業名担当者
    type: hearing
    output_format: text
    echo_back: false
    save_to: companyName
    retry_failure: skip
    next: 企業連絡先
    notes: "AmiVoice STT のみ。企業名と担当者名を統合聴取（Gen1 同様）"

  - step: 企業連絡先
    type: hearing
    output_format: text
    echo_back: true
    save_to: companyPhone
    retry_failure: end_failure
    next: 終話_時間判定
    notes: "DTMF 数字入力（11 桁）。termdtmf=#。echo_back=true（Gen1 「企業：連絡先電話番号聞き取り」yaml の復唱確認継承）"

  # === その他問合せルート ===
  - step: 内容_その他
    type: hearing
    output_format: text
    echo_back: false
    save_to: reason
    retry_failure: skip
    next: 氏名聴取
    notes: "AmiVoice STT のみ。retry_failure=skip"

  # === 個人情報サブフロー（複数ルート共通）===
  - step: 氏名聴取
    type: subflow
    flowname: "新潟縣健康管理協会$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "新潟縣健康管理協会$生年月日聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "新潟縣健康管理協会$電話番号聴取"
    next: 分岐_キャンセル_or_他

  # === 終話分岐 ===
  - step: 分岐_キャンセル_or_他
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "キャンセル"
        next: END_キャンセル完了
      - match: "other"
        next: 終話_時間判定
    notes: "キャンセルは時間判定スキップ（Gen1 でも文言一定）。other は時間判定 + 用件分岐へ"

  - step: 終話_時間判定
    type: date_of_call_classifier
    conditions:
      - match: "営業内"
        next: 終話_分岐_営業内
      - match: "other"
        next: 終話_分岐_営業外
    notes: "Gen1 完了フラグ後の入電曜日時間判断再実行を再現。other=営業外/時間外/連休中 すべて含む"

  - step: 終話_分岐_営業内
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "健診予約"
        next: END_予約完了_営業内
      - match: "日時変更"
        next: END_変更完了_営業内
      - match: "企業問合せ"
        next: END_企業問合せ完了_営業内
      - match: "other"
        next: END_問合せ完了_営業内
    notes: "営業内終話。other=問い合わせ"

  - step: 終話_分岐_営業外
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "健診予約"
        next: END_予約完了_営業外
      - match: "日時変更"
        next: END_変更完了_営業外
      - match: "企業問合せ"
        next: END_企業問合せ完了_営業外
      - match: "other"
        next: END_問合せ完了_営業外
    notes: "営業外終話。other=問い合わせ"

  # === 終話ブロック ===
  - step: END_予約完了_営業内
    type: termination
    termination_ref: "END_予約完了_営業内"
  - step: END_予約完了_営業外
    type: termination
    termination_ref: "END_予約完了_営業外"
  - step: END_変更完了_営業内
    type: termination
    termination_ref: "END_変更完了_営業内"
  - step: END_変更完了_営業外
    type: termination
    termination_ref: "END_変更完了_営業外"
  - step: END_キャンセル完了
    type: termination
    termination_ref: "END_キャンセル完了"
  - step: END_企業問合せ完了_営業内
    type: termination
    termination_ref: "END_企業問合せ完了_営業内"
  - step: END_企業問合せ完了_営業外
    type: termination
    termination_ref: "END_企業問合せ完了_営業外"
  - step: END_問合せ完了_営業内
    type: termination
    termination_ref: "END_問合せ完了_営業内"
  - step: END_問合せ完了_営業外
    type: termination
    termination_ref: "END_問合せ完了_営業外"
  - step: END_WEB案内
    type: termination
    termination_ref: "END_WEB案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "健診予約"
      - id: "2"
        order: "2"
        value: "日時変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
