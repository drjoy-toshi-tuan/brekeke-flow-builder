# --- セクション13: director 判断ログ（参考）---
director_log:
  - decision: "携帯チェック の発火位置の Gen1→Gen3 移植方針"
    choice: "(B) 電話番号聴取 後段に配置（Gen3 標準パターン）"
    reason: "Gen3 では 電話番号聴取 サブフロー内 incoming-classifier が phone_type context を確定する仕様。Gen1 の『用件確認直後に着信番号で携帯/固定判定』を Gen3 で再現するには script_template: phone_type に独自実装が必要。標準パターン採用で実装コスト・保守性が改善。UX 的には WEB 予約希望確認の発火が後段（連絡先聴取後）に移るが、既に氏名・生年月日・電話番号を伺った後でも違和感は許容範囲"

  - decision: "受診希望日聴取 の output_format"
    choice: "text"
    reason: "Gen1 元資料『「10月10日」のように日程や、「10月中旬」のように時期など、自由におっしゃってください』より、曖昧表現を許容するため。datetime では『10月中旬』を YYYY-MM-DD に正規化できない"

  - decision: "現在の予約日聴取 の output_format"
    choice: "datetime"
    reason: "Gen1 元資料は DTMF 西暦 8 桁入力（19700404 形式）を採用しており、明確な YYYY-MM-DD への正規化が前提"

  - decision: "用件確認 の echo_back"
    choice: "false"
    reason: "Gen1 の『用件の復唱（健康診断）』『用件の復唱（変更）』は単方向アナウンスで yes/no 確認なし。Gen3 echo_back（Re-confirmation node）は yes/no 確認を強制するため不適合"

  - decision: "用件確認 の出力ラベル"
    choice: '"新規" / "予約以外"'
    reason: "Gen1 main.yaml 用件の分岐_1 が 一致『その他』→ 携帯チェック / default → 受診者名 という構造で、DTMF=2 を『予約以外』として扱っているため。entity 定義上は『変更』だが、流れ上は予約以外 = 変更 + 問い合わせ + キャンセル の包括カテゴリ"

  - decision: "終話パターンの SMS フラグ"
    choice: "共通 sms=1（携帯/固定で TTS を分けない）"
    reason: "Gen1 終話挨拶『3 営業日以内に担当者から折り返し電話、もしくはショートメール』が両者言及で、固定電話に対しても違和感なし。設計簡素化のため固定/携帯で TTS 文言を分けない"

  - decision: "リトライ失敗時の終話"
    choice: "共通 END_聴取失敗（代表電話案内）"
    reason: "Gen1 main.yaml の全 CP（Compliance Path）箱が 代表電話へ → 直通番号案内 の同一終話に集約されているため"

  - decision: "WEB 予約希望確認 のリトライ失敗時"
    choice: "skip → 現在の予約日聴取"
    reason: "Gen1 の LoopCount 5 回失敗 → 入力確認できないので TEL へ → 受診者名 を Gen3 で簡素化。Gen3 では既に氏名等聴取済みのため、現在予約日聴取に直接進む"

  - decision: "サブフロー step 名"
    choice: "氏名聴取 / 生年月日聴取 / 電話番号聴取（jump_ プレフィックス付与なし）"
    reason: "director プロンプトの新命名規約に準拠"

  - decision: "flow 名 / group 名"
    choice: "正式名「カーム尼崎健診プラザ」（11 文字）"
    reason: "URL エンコード後 33 バイト + サブフロー名最長（電話番号聴取 = 約 27 バイト）+ \"drjoy^\" + \"$\" + \"_YYYYMMDD\" = 80 バイト程度。255 バイト制約内・19 文字以内ルール遵守"
