# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1（commubo）→ Gen3（Brekeke IVR）移管。元資料: commubo抽出/【018】愛仁会総合健康センター｜【019】カーム尼崎健診プラザ/【0009-2カーム】健診1_M_本番/"
  - "用件入口は DTMF 2 値のみ（1=新規 / 2=予約以外）。音声入力は受け付けない。Gen1 main.yaml の用件聴取仕様を踏襲"
  - "**第 2/第 4 土曜のみ営業の特殊ルール**: acceptance_times の標準仕様（曜日 × 時間帯）では表現困難。**Dr.JOY 管理画面の祝日カレンダー機能で第 1/第 3/第 5 土曜を休業日として個別登録**することで対応する想定（Dr.JOY 運用担当に確認要・confirmation_items 参照）"
  - "**携帯チェック の発火位置**: Gen1 では用件確認直後（連絡先聴取の前）に着信番号で携帯/固定を判定していたが、Gen3 では電話番号聴取サブフローが phone_type を確定する仕様のため、**連絡先聴取後**に発火する設計とした。これにより着信番号での短絡判定（『電話前にいきなり WEB 予約フォーム案内』）はできなくなるが、UX 影響は許容範囲（director_log 参照）"
  - "新規ルートは受診希望日（自由テキスト）のみ聴取。健診種類（人間ドック/協会けんぽ/その他）の聴取は無し → 担当者折り返しに任せる（Gen1 仕様踏襲）"
  - "Gen1『用件の復唱（健康診断）』『用件の復唱（変更）』は単方向アナウンスで yes/no 確認なし。Gen3 では echo_back: false とし、用件確認 hearing 直後に氏名聴取へ直接進む（復唱アナウンスは省略）"
  - "全聴取項目のリトライ失敗は共通の END_聴取失敗（代表電話 06-6430-1315 案内）で終話。Gen1 の 各 CP（Compliance Path）箱が 代表電話へ → 直通番号案内 に集約されている設計を踏襲"
  - "WEB 予約希望確認のリトライ 5 回失敗は『skip』で 現在の予約日聴取 に進む（Gen1 LoopCount 5 → 入力確認できないので TEL へ → 受診者名 を Gen3 で簡素化）"
  - "代表電話案内の受付時間（祝日除く 月-金 8:45-17:00、土 8:45-12:00）と本番受付時間（時間外案内文言: 月-金 9:00-15:00 + 第 2/第 4 土曜 9:00-12:00）に Gen1 元資料上で差分あり。本番受付時間は時間外案内の値を採用、代表電話案内は元資料 TTS をそのまま転記"
  - "TTS は `{tts_g:...}` 小文字形式（GOOGLE TTS デフォルト）。SSML タグは使用しない（Re-confirmation node の `<speak type=\"telephone\">` だけは電話番号復唱の SSML 例外として許可）"

