], "x": 4100, "y": 3800}, "END_上限エラー": {"type": "Text to speech", "category": "Text To Speech", "next": [{"label": "Next Module", "target": "完了フラグ_上限エラー"}], "subs": [{"label": "save-上限エラー", "target": "save-上限エラー"}], "x": 4400, "y": 3600}, "完了フラグ_上限エラー": {"type": "saveCompletionFlag2db", "category": "Persistence", "next": [{"label": "next", "target": "切断_上限エラー"}], "subs": [], "x": 4400, "y": 3800}, "切断_上限エラー": {"type": "Disconnect", "category": "", "next": [], "subs": [], "x": 4400, "y": 4000}, "save-非通知": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 300, "y": 600}, "save-時間外": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 500, "y": 800}, "save-転送健診": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 100, "y": 1460}, "save-転送当日変更": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": -500, "y": 3340}, "save-終話4_SMS": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 800, "y": 6000}, "save-終話4_noSMS": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 1100, "y": 6000}, "save-終話1": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 3500, "y": 3600}, "save-終話2": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 3800, "y": 3600}, "save-終話3": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 4100, "y": 3600}, "save-転送リハビリ": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 4400, "y": 3600}, "save-上限エラー": {"type": "save2db", "category": "Persistence", "next": [], "subs": [], "x": 4700, "y": 3600}}}]};
const TC={"Text to speech":"#3b82f6","generate_by_OpenAI":"#10b981","DTMF AmiVoice STT Input":"#f59e0b","Speech to Text":"#f59e0b","saveContextModel2DB":"#8b5cf6","saveContext2DB":"#8b5cf6","save2db":"#8b5cf6","saveCompletionFlag2db":"#ef4444","Disconnect":"#ef4444","Custom Jump to Flow":"#06b6d4","Speech Retry Counter":"#06b6d4","incoming-classifier":"#06b6d4","acceptance_times":"#06b6d4","Wait":"#6b7280","Script":"#06b6d4","ContextMatchRouter":"#06b6d4"};
function gc(t){return TC[t]||"#6b7280"}
let flows=[D.main,...D.subflows],cfi=0,nodes=[],edges=[],cam={x:0,y:0,z:1},sel=null,hov=null,drag=false,ds={x:0,y:0},cs={x:0,y:0};
const cv=document.getElementById("canvas"),cx=cv.getContext("2d"),NW=160,NH=36,NR=6;

function build(fl){
  nodes=[];edges=[];
  const ms=fl.modules,ns=Object.keys(ms),ni={};
  // BFS levels
  const lv={},vis=new Set();
  let q=[fl.start];lv[fl.start]=0;vis.add(fl.start);
  while(q.length){
    const c=q.shift(),m=ms[c];if(!m)continue;
    m.next.forEach(e=>{if(ms[e.target]&&!vis.has(e.target)){vis.add(e.target);lv[e.target]=(lv[c]||0)+1;q.push(e.target)}});
  }
  ns.forEach(n=>{if(lv[n]===undefined)lv[n]=999});
  const lvs={};ns.forEach(n=>{const l=lv[n];if(!lvs[l])lvs[l]=[];lvs[l].push(n)});
  const sl=Object.keys(lvs).map(Number).sort((a,b)=>a-b);
  const CG=210,RG=52;
  sl.forEach((l,li)=>{lvs[l].forEach((n,gi)=>{
    ni[n]=nodes.length;
    nodes.push({name:n,type:ms[n].type,color:gc(ms[n].type),x:li*CG,y:gi*RG,w:NW,h:NH,next:ms[n].next,subs:ms[n].subs,cat:ms[n].category});
  })});
  ns.forEach(n=>{const m=ms[n];
    m.next.forEach(e=>{if(ni[e.target]!==undefined)edges.push({f:ni[n],t:ni[e.target],lb:e.label,tp:"n"})});
    m.subs.forEach(e=>{if(ni[e.target]!==undefined)edges.push({f:ni[n],t:ni[e.target],lb:e.label,tp:"s"})});
  });
}

function rsz(){cv.width=cv.parentElement.clientWidth;cv.height=cv.parentElement.clientHeight;dr()}
function ts(x,y){return{x:(x-cam.x)*cam.z+cv.width/2,y:(y-cam.y)*cam.z+cv.height/2}}
function tw(sx,sy){return{x:(sx-cv.width/2)/cam.z+cam.x,y:(sy-cv.height/2)/cam.z+cam.y}}

function rr(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath()}

function dr(){
  cx.clearRect(0,0,cv.width,cv.height);
  const hl=document.getElementById("hl-type").value;
  // Edges
  edges.forEach(e=>{
    const fn=nodes[e.f],tn=nodes[e.t];
    const p1=ts(fn.x+fn.w,fn.y+fn.h/2),p2=ts(tn.x,tn.y+tn.h/2);
    let col=e.tp==="s"?"#f59e0b44":"#4a556844";
    if(sel!==null&&(e.f===sel||e.t===sel))col=e.tp==="s"?"#f59e0bcc":"#60a5facc";
    cx.strokeStyle=col;cx.lineWidth=sel!==null&&(e.f===sel||e.t===sel)?2:1;
    cx.beginPath();
    const cx1=p1.x+(p2.x-p1.x)*0.4,cx2=p1.x+(p2.x-p1.x)*0.6;
    cx.moveTo(p1.x,p1.y);cx.bezierCurveTo(cx1,p1.y,cx2,p2.y,p2.x,p2.y);cx.stroke();
    if(cam.z>0.3){const a=Math.atan2(p2.y-(p2.y+p1.y)/2,p2.x-(p2.x+p1.x)/2);cx.fillStyle=col;cx.beginPath();cx.moveTo(p2.x,p2.y);cx.lineTo(p2.x-6*Math.cos(a-0.4),p2.y-6*Math.sin(a-0.4));cx.lineTo(p2.x-6*Math.cos(a+0.4),p2.y-6*Math.sin(a+0.4));cx.fill()}
    if(cam.z>0.5&&e.lb&&e.lb!=="Next Module"&&e.lb!=="next"){const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2-6;cx.fillStyle="#8899a6";cx.font=Math.max(8,9*cam.z)+"px sans-serif";cx.textAlign="center";cx.fillText(e.lb,mx,my)}
  });
  // Nodes
  nodes.forEach((n,i)=>{
    const p=ts(n.x,n.y),w=n.w*cam.z,h=n.h*cam.z;
    let al=1;
    if(hl&&n.type!==hl)al=0.15;
    if(sel!==null&&sel!==i){const cn=edges.some(e=>(e.f===sel&&e.t===i)||(e.t===sel&&e.f===i));if(!cn)al=Math.min(al,0.25)}
    cx.globalAlpha=al;
    rr(p.x,p.y,w,h,NR*cam.z);
    cx.fillStyle=i===sel?n.color:(i===hov?n.color+"cc":n.color+"33");cx.fill();
    cx.strokeStyle=n.color;cx.lineWidth=i===sel?2:1;cx.stroke();
    if(cam.z>0.25){cx.fillStyle=i===sel?"#fff":"#e7e9ea";const fs=Math.max(8,11*cam.z);cx.font=fs+"px sans-serif";cx.textAlign="left";cx.textBaseline="middle";const mc=Math.floor(w/(fs*0.55));let lb=n.name.length>mc?n.name.substring(0,mc-1)+"\u2026":n.name;cx.fillText(lb,p.x+6*cam.z,p.y+h/2)}
    cx.globalAlpha=1;
  });
}

function ht(mx,my){const w=tw(mx,my);for(let i=nodes.length-1;i>=0;i--){const n=nodes[i];if(w.x>=n.x&&w.x<=n.x+n.w&&w.y>=n.y&&w.y<=n.y+n.h)return i}return null}

function fa(){
  if(!nodes.length)return;
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  nodes.forEach(n=>{x0=Math.min(x0,n.x);y0=Math.min(y0,n.y);x1=Math.max(x1,n.x+n.w);y1=Math.max(y1,n.y+n.h)});
  cam.x=(x0+x1)/2;cam.y=(y0+y1)/2;
  cam.z=Math.min(cv.width/(x1-x0+100),cv.height/(y1-y0+100),1.5);dr();
}

function sd(idx){
  const p=document.getElementById("detail");
  if(idx===null){p.classList.remove("open");return}
  const n=nodes[idx];
  const inc=edges.filter(e=>e.t===idx),out=edges.filter(e=>e.f===idx);
  let h="<h3>"+n.name+"</h3>";
  h+='<div class="field"><span class="label">タイプ: </span><span class="value" style="color:'+n.color+'">'+n.type+"</span></div>";
  if(n.cat)h+='<div class="field"><span class="label">カテゴリ: </span><span class="value">'+n.cat+"</span></div>";
  if(out.length){h+='<div class="field" style="margin-top:10px"><span class="label">出力 ('+out.length+"):</span></div>";out.forEach(e=>{const tn=nodes[e.t];h+='<div class="conn" data-i="'+e.t+'" style="border-left:3px solid '+tn.color+'">'+(e.lb&&e.lb!=="Next Module"?"<b>"+e.lb+"</b> \u2192 ":"\u2192 ")+tn.name+"</div>"})}
  if(inc.length){h+='<div class="field" style="margin-top:10px"><span class="label">入力 ('+inc.length+"):</span></div>";inc.forEach(e=>{const fn=nodes[e.f];h+='<div class="conn" data-i="'+e.f+'" style="border-left:3px solid '+fn.color+'">'+fn.name+(e.lb&&e.lb!=="Next Module"?" <b>["+e.lb+"]</b>":"")+"</div>"})}
  p.innerHTML=h;p.classList.add("open");
  p.querySelectorAll(".conn").forEach(el=>{el.addEventListener("click",()=>{const i=parseInt(el.dataset.i);sn(i);co(i)})});
}

function sn(i){sel=i;sd(i);ml();dr()}
function co(i){const n=nodes[i];cam.x=n.x+n.w/2;cam.y=n.y+n.h/2;cam.z=Math.max(cam.z,0.8);dr()}

function ml(){
  const ls=document.getElementById("module-list"),sv=document.getElementById("search").value.toLowerCase();
  let h="";nodes.forEach((n,i)=>{if(sv&&!n.name.toLowerCase().includes(sv)&&!n.type.toLowerCase().includes(sv))return;h+='<div class="mod-item'+(i===sel?" selected":"")+'" data-i="'+i+'"><span class="dot" style="background:'+n.color+'"></span><span class="name">'+n.name+"</span></div>"});
  ls.innerHTML=h;
  ls.querySelectorAll(".mod-item").forEach(el=>{el.addEventListener("click",()=>{const i=parseInt(el.dataset.i);sn(i);co(i)})});
}

function bt(){
  const tb=document.getElementById("flow-tabs");let h="";
  flows.forEach((f,i)=>{const lb=f.name.split("$")[1]||f.name;h+='<button class="'+(i===cfi?"active":"")+'" data-i="'+i+'">'+lb+"</button>"});
  tb.innerHTML=h;
  tb.querySelectorAll("button").forEach(b=>{b.addEventListener("click",()=>{cfi=parseInt(b.dataset.i);sel=null;hov=null;build(flows[cfi]);bt();ml();document.getElementById("stats").textContent=flows[cfi].name+" | "+Object.keys(flows[cfi].modules).length+" modules";fa()})});
}

cv.addEventListener("mousedown",e=>{const h=ht(e.offsetX,e.offsetY);if(h!==null){sn(h)}else{drag=true;ds={x:e.offsetX,y:e.offsetY};cs={x:cam.x,y:cam.y};sel=null;sd(null);dr()}});
cv.addEventListener("mousemove",e=>{if(drag){cam.x=cs.x-(e.offsetX-ds.x)/cam.z;cam.y=cs.y-(e.offsetY-ds.y)/cam.z;dr()}else{const h=ht(e.offsetX,e.offsetY);if(h!==hov){hov=h;cv.style.cursor=h!==null?"pointer":"grab";dr()}}});
cv.addEventListener("mouseup",()=>{drag=false});
cv.addEventListener("wheel",e=>{e.preventDefault();const f=e.deltaY>0?0.9:1.1,w=tw(e.offsetX,e.offsetY);cam.z*=f;cam.z=Math.max(0.05,Math.min(3,cam.z));cam.x=w.x-(e.offsetX-cv.width/2)/cam.z;cam.y=w.y-(e.offsetY-cv.height/2)/cam.z;dr()});

document.getElementById("btn-fit").addEventListener("click",fa);
document.getElementById("btn-reset").addEventListener("click",()=>{cam={x:0,y:0,z:1};sel=null;hov=null;sd(null);dr()});
document.getElementById("search").addEventListener("input",ml);

window.addEventListener("resize",rsz);

build(flows[0]);
document.getElementById("stats").textContent=flows[0].name+" | "+Object.keys(flows[0].modules).length+" modules";
