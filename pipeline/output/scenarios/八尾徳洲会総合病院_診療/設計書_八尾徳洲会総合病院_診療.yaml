# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - classification
  patterns:
    - condition: "classification = 予約変更/予約キャンセル/予約確認 (AI受付完了)"
      sms_flag: "1"
      notes: "予約系3用件は SMS 送信で詳細通知"
    - condition: "classification = 歯科口腔外科/健診センター (転送)"
      sms_flag: "-1"
      notes: "転送ルートは SMS 送信なし（status=3 転送成功で完了）"
    - condition: "classification = 予約以外 / その他案内"
      sms_flag: "-1"
      notes: "案内系は SMS 送信なし"

