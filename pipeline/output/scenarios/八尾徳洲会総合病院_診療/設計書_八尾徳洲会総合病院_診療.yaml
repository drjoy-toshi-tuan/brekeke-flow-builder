# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約変更"
      - "予約キャンセル"
      - "予約確認"
      - "歯科口腔外科"
      - "健診センター"
      - "予約以外"
    notes: "DTMF 1=予約変更, 2=予約キャンセル, 3=予約確認, 4=歯科口腔外科。健診センター・予約以外は OpenAI 類義語判定。「もしもし」「もう一度」フォールバックは OpenAI プロンプトの類義語例で対応 (prompter SKILL_A)。echo_back: 汎用 #data# 復唱"

  - order: 2
    name: "用件_共通_診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "歯科口腔外科"
      - "健診センター"
      - "病児保育診察"
      - "検査名"
      - "わからない"
    notes: "予約変更/キャンセル/確認 共通の診療科聴取。歯科/健診/病児/検査は専用ルートへ、わからない/分岐なし診療科は AI 受付ルートへ。no_result_default=登録なし。entity_classification.md (R1=940 / R2=51 / R3=78) から scaffold が profile_words 自動展開"

  - order: 3
    name: "変更_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "予約変更ルートのみ。現在の予約日聴取。YYYY-MM-DD 形式。過去日なら +1 年で確定 (OpenAI プロンプトで対応)。元 yaml は DTMF 4 桁数字 (シャープ/アスタ + 月日) もサポート、Gen3 では音声優先"

  - order: 4
    name: "変更_予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "予約変更ルートのみ。希望予約日聴取。明日以降のみ受付（当日は不可、OpenAI プロンプトで対応）"

  - order: 5
    name: "変更_変更詳細"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "details"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "予約変更ルートのみ。「他に予約を変更したい内容があればお話ください」のフリーテキスト"

  - order: 6
    name: "変更_変更理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
