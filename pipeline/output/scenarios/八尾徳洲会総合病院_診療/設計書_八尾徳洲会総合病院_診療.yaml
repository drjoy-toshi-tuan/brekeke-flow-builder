# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1 commubo (第 1 世代) からの移管。新規予約は受け付けない（予約変更 / 予約キャンセル / 予約確認 / 歯科口腔外科 の 4 用件 + 健診センター + 予約以外）"
  - "用件確認は echo_back: true で汎用 #data# 復唱に統一。元 yaml の用件別カスタム復唱文言（「ご予約の変更でよろしいですか?」「歯科・口腔外科でよろしいですか?...」等）は汎用化"
  - "診療科は Pattern B（後段 ContextMatchRouter）で用件×診療科で終話分岐。分岐なし診療科 60+ 件 / 検査名 30+ 件は entity_classification.md から scaffold/properties が自動取り込み"
  - "歯科口腔外科ルートは date_of_call_classifier 3 段ネスト（8:30 / 12:30 / 13:30 境界）で時間帯ルーティング"
  - "健診センタールートは date_of_call_classifier 1 段（11:00 境界）で時間帯ルーティング"
  - "個人情報サブフローは Gen1 順序維持: 氏名 → 生年月日 → 診察券 → 電話番号"
  - "電話番号サブフロー内で incoming-classifier ベースで入電番号取得済み判定（元 yaml の「終話電話番号確認.yaml」の入電番号取得確認ロジックは電話番号聴取サブフロー内に集約）"
  - "予約キャンセル特殊終話文言（翌診療日折り返し + 1ヶ月以内変更可）は END_予約キャンセル_完了 の TTS に組み込み"
  - "時間外パスは END_時間外 に統合。年末年始 (12/31〜1/4) も同 TTS に含める"
  - "BLOCKER B-1: 歯科夕診日チェック（隔週火木交互）の判定ロジック仕様不明 → 設計書では未実装。時間外時に歯科 17-19 時の代表電話案内ルートが必要な場合は仕様確認後に再実装"
  - "「もしもし」「もう一度」フォールバックは prompter SKILL_A の類義語例で OpenAI プロンプトに統合"
  - "予約日・予約希望日は AmiVoice STT 優先。元 yaml の DTMF 4 桁数字入力（シャープ/アスタ + 月日）は Gen3 では二次的サポート"
  - "予約変更時の「当日への予約変更不可」ルート（元 yaml `当日は不可` + `Y/N`）は OpenAI プロンプトで「明日以降のみ受付」を強制する形で吸収"

