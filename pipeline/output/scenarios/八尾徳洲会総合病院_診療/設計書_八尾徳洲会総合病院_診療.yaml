# 設計書 — 八尾徳洲会総合病院 診療
# 生成元: @director エージェント
# 生成日: 2026/05/01
# 確認レポート: output/scenarios/八尾徳洲会総合病院_診療/確認レポート_八尾徳洲会総合病院_診療_20260501.md
# ベース: docs/migration/gen1_八尾徳洲会総合病院_診療.md (Gen1→Gen3 移管) + commubo抽出 yaml 14 本
#
# ⚠️ BLOCKER あり: 歯科夕診日チェック（隔週火木交互）の判定ロジック仕様が不明。
# 設計書では時間外は END_時間外 に統合（夕診日案内ルート未実装）。確認レポート B-1 参照。
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "八尾徳洲会総合病院"
  scenario_name: "診療"
  group_name: "八尾徳洲会総合病院"
  flow_name: "八尾徳洲会総合病院$診療"
  target_facility: "八尾徳洲会総合病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "072-993-8501"
  business_hours: "日曜祝日除く、月曜日〜金曜日 8:00-16:00 / 土曜日 8:00-11:00 / 12月31日〜1月4日は年末年始休止"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "八尾徳洲会総合病院$診療"
      role: "main"
      description: "冒頭チェーン → 用件確認 (4用件 + 健診 + 予約以外) → 診療科 (CMR で歯科/健診/病児/検査/わからない/分岐なし) → 用件別固有聴取 → 個人情報サブフロー連鎖 → 終話"

  subflows:
    - name: "八尾徳洲会総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的JSONコピー。Gen1仕様: 氏名は復唱しない（元 yaml では「ありがとうございます」と短い完了 TTS のみ）"

    - name: "八尾徳洲会総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的JSONコピー。DOB Re-confirmation あり"

    - name: "八尾徳洲会総合病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。静的JSONコピー。8桁以内、「分からない」分岐あり"

    - name: "八尾徳洲会総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9/10 準拠。静的JSONコピー。incoming-classifier→携帯確認/連絡先聴取→Phone Normalization→復唱確認→携帯判別→結果返却。元 yaml の「終話電話番号確認.yaml」(入電番号取得済みなら案内のみ) はサブフロー内部の incoming-classifier ベース処理に集約"

# --- セクション3: フローの目的 ---
purpose: "八尾徳洲会総合病院 (072-993-8501) への予約専用ダイヤル。患者からの電話を受け、用件 (予約変更 / 予約キャンセル / 予約確認 / 歯科口腔外科 / 健診センター / 予約以外) を判定し、用件と診療科に応じて (a) AI 受付 → 個人情報聴取 → 折り返し対応、(b) 歯科部署/健診センターへの転送、(c) 代表電話案内、(d) 予約以外案内 のいずれかに振り分ける。新規予約は受け付けない。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "八尾徳洲会総合病院$診療"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 完了フラグ_非通知(saveCompletionFlag2db, status=2, smsFlag=-1)
            │            → 非通知_アナウンス(TTS) → 切断
            └─ 通常/携帯/固定/その他 → acceptance_times
                          ├─ 時間外 → 完了フラグ_時間外(saveCompletionFlag2db, status=6, smsFlag=-1)
                          │            → 時間外_アナウンス(TTS, 年末年始 12/31-1/4 休止文言含む) → 切断
                          └─ 受付可 → 冒頭_アナウンス(TTS)

      ─── 用件確認 ───
      冒頭_アナウンス → 用件確認(TTS+STT+OpenAI+Retry+save2db, echo_back=true)
        ├─ 予約変更 → 用件_共通_診療科(TTS)
        ├─ 予約キャンセル → 用件_共通_診療科(TTS)
        ├─ 予約確認 → 用件_共通_診療科(TTS)
        ├─ 歯科口腔外科 → 歯科時間判定_8時半(date_of_call_classifier)
        ├─ 健診センター → 健診時間判定_11時(date_of_call_classifier)
        ├─ 予約以外 → END_予約以外(TTS) → 切断
        └─ other → END_聴取失敗(TTS) → 切断

      ─── 用件_共通_診療科（予約変更/キャンセル/確認 共通）───
      用件_共通_診療科(TTS+STT+OpenAI+Retry+save2db, no_result_default=登録なし)
        ├─ 歯科口腔外科 → 歯科時間判定_8時半
        ├─ 健診センター → 健診時間判定_11時
        ├─ 病児保育診察 → END_病児保育案内(TTS) → 切断
        ├─ 検査名 → END_代表案内(TTS) → 切断
        ├─ わからない → CMR_用件後段
        └─ other (=分岐なし診療科) → CMR_用件後段

      ─── CMR_用件後段（用件で分岐）───
      CMR_用件後段(ContextMatchRouter, reference_module=OpenAI_用件確認)
        ├─ 予約変更 → 変更_予約日(TTS)
        ├─ 予約キャンセル → キャンセル_予約日(TTS)
        ├─ 予約確認 → 氏名聴取(subflow)
        └─ other → 変更_予約日(TTS, フォールバック)

      ─── 予約変更ルート ───
      変更_予約日(hearing, datetime) → 変更_予約希望日(hearing, datetime)
        → 変更_変更詳細(hearing, text) → 変更_変更理由(hearing, text)
        → 氏名聴取(subflow)

      ─── 予約キャンセルルート ───
      キャンセル_予約日(hearing, datetime) → キャンセル_理由(hearing, text)
        → 氏名聴取(subflow)

      ─── 個人情報サブフロー連鎖（共通）───
      氏名聴取(subflow) → 生年月日聴取(subflow) → 診察券番号聴取(subflow) → 電話番号聴取(subflow)
        → CMR_終話分岐

      ─── CMR_終話分岐（用件で終話 TTS を分岐）───
      CMR_終話分岐(ContextMatchRouter, reference_module=OpenAI_用件確認)
        ├─ 予約変更 → 完了フラグ_予約変更(saveCompletionFlag2db, status=1, smsFlag=1) → END_予約変更_完了(TTS) → 切断
        ├─ 予約キャンセル → 完了フラグ_予約キャンセル → END_予約キャンセル_完了(TTS, 特殊文言: 翌診療日折り返し+1ヶ月以内変更可) → 切断
        ├─ 予約確認 → 完了フラグ_予約確認 → END_予約確認_完了(TTS) → 切断
        └─ other → 完了フラグ_予約変更 → END_予約変更_完了(TTS, フォールバック) → 切断

      ─── 歯科口腔外科ルート（時間帯判定）───
      歯科時間判定_8時半(date_of_call_classifier, comparison_time=08:30:00)
        ├─ 時間外 (8:30 前) → END_歯科_時間前(TTS) → 切断
        └─ 受付可 (8:30 以降) → 歯科時間判定_12時半

      歯科時間判定_12時半(date_of_call_classifier, comparison_time=12:30:00)
        ├─ 時間外 (12:30 前) → 歯科_転送ガイダンス(announcement) → 歯科_転送(call_transfer)
        └─ 受付可 (12:30 以降) → 歯科時間判定_13時半

      歯科時間判定_13時半(date_of_call_classifier, comparison_time=13:30:00)
        ├─ 時間外 (13:30 前) → END_歯科_昼休み(TTS) → 切断
        └─ 受付可 (13:30 以降) → 歯科_転送ガイダンス(announcement) → 歯科_転送(call_transfer)

      歯科_転送(call_transfer, transfer_type=Blind Transfer)
        ├─ 成功 → 完了フラグ_転送成功 (status=3) → END_転送成功 → 切断 (scaffold 自動)
        └─ 失敗 → 転送失敗_アナウンス → 完了フラグ_転送失敗 (status=9) → END_転送失敗 → 切断 (scaffold 自動)

      ─── 健診センタールート（時間帯判定）───
      健診時間判定_11時(date_of_call_classifier, comparison_time=11:00:00)
        ├─ 時間外 (11 時前) → END_健診_時間前(TTS, 代表+健診直通 2 番号案内) → 切断
        └─ 受付可 (11 時以降) → 健診_転送ガイダンス(announcement) → 健診_転送(call_transfer)

      健診_転送(call_transfer, transfer_type=Blind Transfer)
        ├─ 成功 → 完了フラグ_転送成功 (status=3) → END_転送成功 → 切断 (scaffold 自動)
        └─ 失敗 → 転送失敗_アナウンス → 完了フラグ_転送失敗 (status=9) → END_転送失敗 → 切断 (scaffold 自動)
    notes: |
      Gen1 commubo 構造を Gen3 9 ブロック型にマッピング。
      用件確認は Pattern A + echo_back=true（汎用 #data# 復唱）。元 yaml の用件別カスタム復唱文言は汎用化。
      診療科は Pattern B（後段 CMR_用件後段）で用件×診療科の組み合わせで分岐。
      個人情報サブフローは Gen1 順序維持: 氏名→生年月日→診察券→電話番号。
      時間外パスは END_時間外 に統合（夕診日案内ルートは BLOCKER B-1 のため未実装）。
      予約キャンセルの特殊終話文言（翌診療日折り返し+1ヶ月以内変更可）は END_予約キャンセル_完了 の TTS に組み込み。

  # サブフローのフロー図は静的JSONコピーのため省略（個人情報サブフローは samples/ から完全コピー）

# --- セクション4b: ルーティングマップ（routing_map）— 後方互換用、scenario_flow があるため optional ---
# scenario_flow が定義されているため routing_map は未使用（scaffold_generator が scenario_flow を優先処理）

# --- セクション4c: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック（2 ブロック 1 セット必須）===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # === 用件確認（4 用件 + 健診 + 予約以外）===
  - step: 用件確認
    type: hearing
    output_format: enum
    save_to: classification
    conditions:
      - match: "予約変更"
        next: 用件_共通_診療科
      - match: "予約キャンセル"
        next: 用件_共通_診療科
      - match: "予約確認"
        next: 用件_共通_診療科
      - match: "歯科口腔外科"
        next: 歯科時間判定_8時半
      - match: "健診センター"
        next: 健診時間判定_11時
      - match: "予約以外"
        next: END_予約以外
      - match: "other"
        next: END_聴取失敗

  # === 診療科聴取（用件: 予約変更/キャンセル/確認 共通）===
  - step: 用件_共通_診療科
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "歯科口腔外科"
        next: 歯科時間判定_8時半
      - match: "健診センター"
        next: 健診時間判定_11時
      - match: "病児保育診察"
        next: END_病児保育案内
      - match: "検査名"
        next: END_代表案内
      - match: "わからない"
        next: CMR_用件後段
      - match: "other"
        next: CMR_用件後段

  # === CMR_用件後段（用件で分岐: 変更/キャンセル/確認）===
  - step: CMR_用件後段
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: 変更_予約日
      - match: "予約キャンセル"
        next: キャンセル_予約日
      - match: "予約確認"
        next: 氏名聴取
      - match: "other"
        next: 変更_予約日

  # === 予約変更ルート ===
  - step: 変更_予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 変更_予約希望日

  - step: 変更_予約希望日
    type: hearing
    output_format: datetime
    save_to: desiredReservationDate
    next: 変更_変更詳細

  - step: 変更_変更詳細
    type: hearing
    output_format: text
    save_to: details
    next: 変更_変更理由

  - step: 変更_変更理由
    type: hearing
    output_format: text
    save_to: reason
    next: 氏名聴取

  # === 予約キャンセルルート ===
  - step: キャンセル_予約日
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: キャンセル_理由

  - step: キャンセル_理由
    type: hearing
    output_format: text
    save_to: reason
    next: 氏名聴取

  # === 個人情報サブフロー連鎖 ===
  - step: 氏名聴取
    type: subflow
    flowname: "八尾徳洲会総合病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "八尾徳洲会総合病院$生年月日聴取"
    next: 診察券番号聴取

  - step: 診察券番号聴取
    type: subflow
    flowname: "八尾徳洲会総合病院$診察券番号聴取"
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "八尾徳洲会総合病院$電話番号聴取"
    next: CMR_終話分岐

  # === CMR_終話分岐（用件で終話 TTS を分岐）===
  - step: CMR_終話分岐
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "予約変更"
        next: END_予約変更_完了
      - match: "予約キャンセル"
        next: END_予約キャンセル_完了
      - match: "予約確認"
        next: END_予約確認_完了
      - match: "other"
        next: END_予約変更_完了

  # === 歯科口腔外科 時間帯判定（3 段ネスト）===
  - step: 歯科時間判定_8時半
    type: date_of_call_classifier
    conditions:
      - match: "時間外"
        next: END_歯科_時間前
      - match: "受付可"
        next: 歯科時間判定_12時半
      - match: "other"
        next: END_歯科_時間前

  - step: 歯科時間判定_12時半
    type: date_of_call_classifier
    conditions:
      - match: "時間外"
        next: 歯科_転送ガイダンス
      - match: "受付可"
        next: 歯科時間判定_13時半
      - match: "other"
        next: 歯科_転送ガイダンス

  - step: 歯科時間判定_13時半
    type: date_of_call_classifier
    conditions:
      - match: "時間外"
        next: END_歯科_昼休み
      - match: "受付可"
        next: 歯科_転送ガイダンス
      - match: "other"
        next: 歯科_転送ガイダンス

  - step: 歯科_転送ガイダンス
    type: announcement
    next: 歯科_転送

  - step: 歯科_転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "大変申し訳ございませんが、ただいまお電話が混み合っております。しばらくたってからおかけ直しください。"

  # === 健診センター 時間帯判定（1 段）===
  - step: 健診時間判定_11時
    type: date_of_call_classifier
    conditions:
      - match: "時間外"
        next: END_健診_時間前
      - match: "受付可"
        next: 健診_転送ガイダンス
      - match: "other"
        next: 健診_転送ガイダンス

  - step: 健診_転送ガイダンス
    type: announcement
    next: 健診_転送

  - step: 健診_転送
    type: call_transfer
    transfer_type: "Blind Transfer"
    on_failure_announcement: "大変申し訳ございませんが、ただいまお電話が混み合っております。しばらくたってからおかけ直しください。"

  # === 終話ブロック群 ===
  - step: END_予約変更_完了
    type: termination
    termination_ref: "END_予約変更_完了"

  - step: END_予約キャンセル_完了
    type: termination
    termination_ref: "END_予約キャンセル_完了"

  - step: END_予約確認_完了
    type: termination
    termination_ref: "END_予約確認_完了"

  - step: END_代表案内
    type: termination
    termination_ref: "END_代表案内"

  - step: END_病児保育案内
    type: termination
    termination_ref: "END_病児保育案内"

  - step: END_予約以外
    type: termination
    termination_ref: "END_予約以外"

  - step: END_歯科_時間前
    type: termination
    termination_ref: "END_歯科_時間前"

  - step: END_歯科_昼休み
    type: termination
    termination_ref: "END_歯科_昼休み"

  - step: END_健診_時間前
    type: termination
    termination_ref: "END_健診_時間前"

  - step: END_聴取失敗
    type: termination
    termination_ref: "END_聴取失敗"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約変更"
      - id: "2"
        order: "2"
        value: "予約キャンセル"
      - id: "3"
        order: "3"
        value: "予約確認"
      - id: "4"
        order: "4"
        value: "歯科口腔外科"
      - id: "5"
        order: "5"
        value: "健診センター"
      - id: "6"
        order: "6"
        value: "予約以外"
    item_default: true
    editable: true
    deletable: false
