    output_format: "text"
    output_labels: []
    notes: "予約変更ルートのみ。「変更理由をお話ください」のフリーテキスト"

  - order: 7
    name: "キャンセル_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
