# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "{tts_g:お電話ありがとうございます。八尾徳洲会総合病院の、予約専用、AI電話です。}"
    input_method: "voice_only"
    next_step: "用件確認"
    retry_failure: "skip"

  - step_name: "用件確認"
    tts_announcement: "{tts_g:ご用件を、次の4つのうちの、いずれかでお話いただくか、番号を押してください。「1.予約を変更する」「2.予約をキャンセルする」「3.予約を確認する」「4.歯科・口腔外科へのお電話」、それでは、お話ください。}"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約変更"
        - "予約キャンセル"
        - "予約確認"
        - "歯科口腔外科"
        - "健診センター"
        - "予約以外"
      mapping:
        - input: "DTMF 1 または「変更」「延期」「日程」「日付」「時間」「別の」"
          output: "予約変更"
        - input: "DTMF 2 または「キャンセル」「やめる」「取り消し」「取消」"
          output: "予約キャンセル"
        - input: "DTMF 3 または「確認」「教えて」「調べて」「分からない」「予約票」"
          output: "予約確認"
        - input: "DTMF 4 または「歯科」「口腔外科」「歯医者」"
          output: "歯科口腔外科"
        - input: "「健診」「人間ドック」「健康診断」「特定健診」"
          output: "健診センター"
        - input: "「お見舞い」「アクセス」「くすり」「処方箋」「書類」「症状」「診断書」「質問」「聞きたい」「会計」"
          output: "予約以外"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "(分岐: conditions 参照)"
    retry_failure: "end_failure"

  - step_name: "用件_共通_診療科"
    tts_announcement: "{tts_g:それでは順番にお伺いしますのでひとつずつお答えください。わからない場合はわからないとお話ください。予約票に記載されている診療科もしくは検査名を、「診療科は内科です」もしくは「検査名はエコーです」のようにお話ください。}"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "歯科口腔外科"
        - "健診センター"
        - "病児保育診察"
        - "検査名"
        - "わからない"
      mapping:
        - input: "歯科 / 口腔外科 / 歯医者 / 滋賀（=歯科 STT 誤認識） 等"
          output: "歯科口腔外科"
        - input: "健診 / 人間ドック / 健康診断 / 特定健診 等"
          output: "健診センター"
        - input: "病児保育 / 保育"
          output: "病児保育診察"
        - input: "CT / MRI / 大腸ファイバー / エコー / マンモ 等 30+ 検査名"
          output: "検査名"
        - input: "わからない / 知らない / 忘れた / 覚えていない 等"
          output: "わからない"
        - input: "内科 / 外科 / 整形外科 / 産婦人科 / 眼科 / 脳神経外科 / 循環器 / 消化器 / 耳鼻咽喉科 等 60+ 分岐なし診療科 → no_result_default で「登録なし」を保存"
          output: "（NO_RESULT → no_result_default=登録なし → other 分岐 → CMR_用件後段）"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "clinicalDepartment"
    next_step: "(分岐: conditions 参照)"
    retry_failure: "end_failure"

  - step_name: "変更_予約日"
    tts_announcement: "{tts_g:現在の予約日を、「4月1日」のように日付でお話ください。}"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "<YYYY-MM-DD>"
      mapping:
        - input: "「4月1日」「来週の火曜日」等の日付発話"
          output: "YYYY-MM-DD（過去日なら +1 年で確定）"
      no_result_condition: "日付として認識できない"
    save_to: "reservationDate"
    next_step: "変更_予約希望日"
    retry_failure: "skip"

  - step_name: "変更_予約希望日"
    tts_announcement: "{tts_g:ご希望の予約日を、明日以降の日付で「4月1日」のようにお話ください。希望日がない場合には、「ありません」とお答えください。}"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "<YYYY-MM-DD>"
        - "ありません"
      mapping:
        - input: "明日以降の日付発話"
          output: "YYYY-MM-DD"
        - input: "「ありません」「いつでも」「結構です」「特に」"
          output: "ありません"
      no_result_condition: "当日の日付発話 / 認識不能"
    save_to: "desiredReservationDate"
    next_step: "変更_変更詳細"
    retry_failure: "skip"

  - step_name: "変更_変更詳細"
    tts_announcement: "{tts_g:他に予約を変更したい診療科や検査のご予約がございましたら、内容をお話ください。ない場合は「ありません」とお答えください。}"
    input_method: "voice_only"
    save_to: "details"
    next_step: "変更_変更理由"
    retry_failure: "skip"

  - step_name: "変更_変更理由"
    tts_announcement: "{tts_g:それでは、予約変更の理由をお話ください。}"
    input_method: "voice_only"
    save_to: "reason"
    next_step: "氏名聴取"
    retry_failure: "skip"

  - step_name: "キャンセル_予約日"
    tts_announcement: "{tts_g:現在の予約日を、「4月1日」のように日付でお話ください。}"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "<YYYY-MM-DD>"
      mapping:
        - input: "「4月1日」「来週の火曜日」等の日付発話"
          output: "YYYY-MM-DD（過去日なら +1 年で確定）"
      no_result_condition: "日付として認識できない"
    save_to: "reservationDate"
    next_step: "キャンセル_理由"
    retry_failure: "skip"

  - step_name: "キャンセル_理由"
    tts_announcement: "{tts_g:それでは、キャンセルの理由をお話ください。}"
    input_method: "voice_only"
    save_to: "reason"
    next_step: "氏名聴取"
    retry_failure: "skip"

  - step_name: "歯科_転送ガイダンス"
    tts_announcement: "{tts_g:それでは、担当部署へ転送いたします。しばらくお待ちください。}"
    input_method: "voice_only"
    next_step: "歯科_転送"
    retry_failure: "skip"

  - step_name: "健診_転送ガイダンス"
    tts_announcement: "{tts_g:それでは、担当部署へ転送いたします。しばらくお待ちください。}"
    input_method: "voice_only"
    next_step: "健診_転送"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系（デフォルト必須）===
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "{tts_g:恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。}"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（年末年始 12/31〜1/4 含む）"
    tts_announcement: "{tts_g:申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、日曜祝日を除く、月曜日から金曜日の8時から16時、土曜日は8時から11時となっております。本日のご予約の方は、代表電話072-993-8501へおかけください。なお、12月31日から1月4日までは年末年始のため休止しております。年始は1月5日より開始いたしますので、5日の8時以降におかけくださいますようお願いいたします。お電話ありがとうございました。}"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "{tts_g:大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。}"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 正常系（用件別）===
  - name: "END_予約変更_完了"
    condition: "予約変更ルート 全聴取完了"
    tts_announcement: "{tts_g:ご予約の変更を承りました。後ほど担当者よりご連絡いたします。お電話ありがとうございました。それでは失礼いたします。}"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約変更"

  - name: "END_予約キャンセル_完了"
    condition: "予約キャンセルルート 全聴取完了"
    tts_announcement: "{tts_g:ご予約のキャンセルを承りました。必要に応じて、翌診療日までに職員より折り返しご連絡をさせていただく場合がございますのでご了承ください。また、1か月以内にご連絡いただけましたら予約変更が可能です。お電話ありがとうございました。それでは失礼いたします。}"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約キャンセル"

  - name: "END_予約確認_完了"
    condition: "予約確認ルート 全聴取完了"
    tts_announcement: "{tts_g:ご予約の確認を承りました。後ほど担当者よりご連絡いたします。お電話ありがとうございました。それでは失礼いたします。}"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約確認"

  # === 案内系（代表電話・専用案内）===
  - name: "END_予約以外"
    condition: "用件: 予約以外（お見舞い・くすり・処方箋・書類・症状・診断書 等）"
    tts_announcement: "{tts_g:申し訳ございません。こちらは予約専用ダイヤルとなっております。ご予約以外のお問い合わせにつきましては、代表電話へおかけなおしください。電話番号は、072-993-8501です。お電話ありがとうございました。}"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_予約以外"

  - name: "END_代表案内"
    condition: "診療科: 検査名 / 分岐なし診療科のうち代表案内対象（実装上は検査名のみ）"
    tts_announcement: "{tts_g:電話番号は、072-993-8501です。繰り返します。電話番号は、072-993-8501です。繰り返します。電話番号は、072-993-8501です。繰り返します。電話番号は、072-993-8501です。繰り返します。電話番号は、072-993-8501です。お電話ありがとうございました。}"
