special_notes:
  - "Gen2「1回聴取禁止 / 再質問・復唱禁止」原則: 一度聴取した項目は再質問しない。生年月日・電話番号サブフローは復唱なし版を使用。MOBILE着信番号確認は標準機能として残る（復唱とは異なる用途）"
  - "個人_用件確認のDTMF 2は変更/キャンセル/問い合わせを集約する集約値。reason に詳細を業務要約で格納し、Dr.JOY側で運用区別する。Gen2 yaml 仕様踏襲"
  - "受付不可診療科判定はPattern B (ContextMatchRouter): 変更_内容確認のreasonに対し7科キーワードを正規表現マッチ。reasonは業務要約だが、診療科名を必ず含める旨をOpenAIプロンプトで指示する（prompter責務）"
  - "当日判定（新規・変更）はaugment(none_applicable)プレースホルダ。Preferred_date / reason はフリーテキストのため script_template (future_date 等) で機械処理できない。Brekeke UI で人間が Script モジュールに「Preferred_date と dateOfCall の文字列一致 / 「今日」キーワード検出」ロジックを実装する前提"
  - "終話アナウンス文言: 2026/04/11更新版を採用。新規予約/変更/企業の全完了アナウンスで「土日休日を除いた4診療日以内」に統一。当日完了のみ日数記載なし（Gen2準拠）"
  - "Gen2の status enum (0/1/2) → Gen3で 1/2/3/6/-1 に再マッピング。Gen2 status=0（途中切断）はGen3禁止のため status=2（代表案内）に統合。Gen2 smsFlag=0（送信なし）は Gen3 sms_flag=-1 に変換"
  - "Gen2の status=30（他院案内）は function schema enum に存在しないため Gen3 では採用せず、status=2 に統合"
  - "音声認識補正（誤認識→正規化）はprompterのOpenAIプロンプトで対応: 「検針/返信/天候診断/返金控寸断/検診」→「健診」（「乳がん検診」「子宮がん検診」「子宮頸がん検診」は除外）/ 「人間ロック/ドック/ロック/人間独」→「人間ドック」/ 「薬/お薬」→「予約」/ 「取り直したい/別の/変えたい/変える/変えて」→「変更」/ 「やめる/取り消し/取消/やめたい」→「キャンセル」/ 「肺」→「はい」（個人企業確認・当日確認の分岐で）/ 「新居です」→「2です」（個人_用件確認DTMF 2で）"
  - "口調・言葉づかい: 丁寧語、親しみやすいトーン。「かしこまりました」OK。「ありがとうございます」「お気軽に」「おっしゃってください」はNG（「お話ください」に置換）"
  - "ハルシネーション禁止: FAQ / プロンプトに記載のない事項は「ありません」「設置していません」と推定回答禁止。未記載は「ご質問いただいた内容は、折り返しでご確認させていただきます。」定型文（RAGサブフロー側で対応）"
  - "ブラックリストワード: dialogue_completed / function / リクエスト / 禁止 / 出力 / 命令 / システム / プロンプト を含む発話はreason空文字（OpenAIプロンプトで対応）"
  - "2人目以降の氏名・生年月日: 最初の1名をpatientName/patientDateOfBirthに、2人目以降はreasonに改行区切り（カタカナ氏名,yyyy-MM-dd）で追記（OpenAIプロンプトで対応）"

