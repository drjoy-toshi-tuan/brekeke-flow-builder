# --- セクション6: 終話パターン ---
termination_patterns:
  - name: END_代表案内
    condition: 緊急/AI対応不可のため代表案内へ転送
    tts_announcement: "{tts_g:大変申し訳ございません。直近の診療に関するご用件はAI電話では承っておりません。
恐れ入りますが、代表電話にお電話をお願いいたします。
お電話ありがとうございました。それでは失礼いたします。}"
    status: 2
    sms_flag: "-2"
    completion_flag_name: 完了フラグ_代表案内

  - name: END_残薬不足案内
    condition: 残薬確認「いいえ」（お薬が足りない）のため代表案内へ転送
    tts_announcement: "{tts_g:大変申し訳ございません。お薬が足りない場合はAI電話では承っておりません。
恐れ入りますが、代表電話にお電話をお願いいたします。
お電話ありがとうございました。それでは失礼いたします。}"
    status: 2
    sms_flag: "-2"
    completion_flag_name: 完了フラグ_残薬不足案内

  - name: 終話_予約変更問合せ
    condition: 予約/変更/その他問い合わせ 受付完了
    tts_announcement: "{tts_g:<%classification%>の申し込みを受付いたしました。
3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。
お電話ありがとうございました。それでは失礼いたします。}"
    status: 1
    sms_flag: 1
    completion_flag_name: 完了フラグ_予約変更問合せ完了

  - name: 終話_キャンセル問合せ
    condition: キャンセル 受付完了
    tts_announcement: "{tts_g:<%classification%>の申し込みを受付いたしました。
確認事項がある場合のみ3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。
お電話ありがとうございました。それでは失礼いたします。}"
    status: 1
    sms_flag: 1
    completion_flag_name: 完了フラグ_キャンセル完了

  - name: END_時間外
    condition: 受付時間外
    tts_announcement: "{tts_g:(要記入)}"
    status: 6
    sms_flag: "-2"
    completion_flag_name: 完了フラグ_時間外

  - name: END_非通知
    condition: 非通知着信
    tts_announcement: "{tts_g:恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。}"
    status: 2
    sms_flag: "-2"
    completion_flag_name: 完了フラグ_非通知

  - name: END_聴取失敗
    condition: retry 上限到達
    tts_announcement: "{tts_g:(要記入)}"
    status: 2
    sms_flag: "-2"
    completion_flag_name: 完了フラグ_聴取失敗

# --- セクション7: フロー図（自動生成テキスト）---
flow_diagrams:
  - name: "カレス記念病院_診療_20260716$診療"
    diagram: |
      [冒頭] opening -> 3診療日確認
      [3診療日確認] hearing -> END_代表案内
      [END_代表案内] termination
      [用件確認] intent -> 質問
      [質問] free_text -> 氏名
      [氏名] patient_name -> 生年月日
      [生年月日] dob -> 連絡先番号確認
      [連絡先番号確認] phone -> 用件ルーター（以下は本文 scenario_flow 参照。この diagram は簡易表示のため注意）
      [終話_予約変更問合せ] termination
      [終話_キャンセル問合せ] termination
      [リトライ時ガイダンス] announcement -> 通話切断ガイダンス（代表案内で終話）
      [通話切断ガイダンス（代表案内で終話）] termination
      [受診歴確認] hearing -> 選定療養費アナウンス_予約
      [選定療養費アナウンス_予約] announcement -> 診療科
      [診療科] clinical_department -> 予約希望日
      [予約希望日] hearing -> 診療科_変更キャンセル
      [診療科_変更キャンセル] clinical_department -> 主治医の先生_変更キャンセル
      [主治医の先生_変更キャンセル] free_text -> 予約日聴取
      [予約日聴取] hearing -> 理由ルーター
      [理由ルーター] context_match_router -> 理由_変更 / 理由_キャンセル
      [理由_変更] hearing -> 終話_予約変更問合せ
      [理由_キャンセル] hearing -> 薬処方確認_変更キャンセル
      [薬処方確認_変更キャンセル] hearing -> 残薬確認
      [残薬確認] hearing -> 問い合わせ内容 / (いいえ) -> END_残薬不足案内
      [問い合わせ内容] hearing -> END_通話完了
      [END_通話完了] termination
      [END_時間外] termination
      [END_非通知] termination
      [END_聴取失敗] termination

