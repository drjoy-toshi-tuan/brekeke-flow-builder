    announcement: "{tts_g:大変申し訳ございません。ご回答をうまく聞き取ることができませんでした。
恐れ入りますが、代表電話にお電話をお願いいたします。
お電話ありがとうございました。それでは失礼いたします。}"
  - module_name: "受診歴確認"
    announcement: "{tts_g:ご希望される診療科での受診ははじめてですか？わからない場合は、「わからない。」とお話しください。}"
  - module_name: "選定療養費アナウンス（予約）"
    announcement: "{tts_g:他の医療機関からの紹介状をお持ちでない患者様につきましては、
通常の診療費とは別に、初診時選定療養費として7,700円を全額自己負担いただいております。
