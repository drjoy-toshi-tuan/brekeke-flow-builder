  - module_name: "冒頭"
    announcement: "{tts_g:お電話ありがとうございます。 カレス記念病院の診療専用AI電話です。
「プ」と音が鳴ったらお話しください。}"
  - module_name: "3診療日確認"
    announcement: "{tts_g:こちらのお電話は、〇月〇日以降の受診を希望されるお問い合わせでしょうか？
「はい、そうです」または「いいえ、違います」でお話しください。}"
  - module_name: "END_代表案内"
    announcement: "{tts_g:大変申し訳ございません。（直近の診療に関するご用件/お薬が足りない場合）はAI電話では承っておりません。
恐れ入りますが、代表電話にお電話をお願いいたします。
お電話ありがとうございました。それでは失礼いたします。}"
  - module_name: "用件確認"
    announcement: "{tts_g:ご用件を次の４つのうちのいずれかでお話しください。
「1番、予約」「2番、変更」「3番、キャンセル」「4番、その他お問い合わせ」
ダイヤルプッシュでも入力いただけます。}"
  - module_name: "質問"
    announcement: "{tts_g:そのほかに何かお問い合わせはありますか。ない場合は「ありません。」とお話しください。}"
  - module_name: "氏名"
    announcement: "{tts_g:患者さんのお名前を「名前は山田太郎です。」のようにフルネームでお話しください。}"
  - module_name: "生年月日"
    announcement: "{tts_g:生年月日をお話しください。西暦の場合ダイヤルプッシュでも入力いただけます。}"
  - module_name: "電話番号"
    announcement: "{tts_g:ご連絡先は今おかけいただいている「××× ‐ ××× ‐ ×××」でよろしいですか？
「はい、そうです」、または、「いいえ、ちがいます」、でお話しください。}"
  - module_name: "連絡先番号（固定電話）"
    announcement: "{tts_g:ご連絡先のお電話番号をお伺いします。携帯番号または0から始まる市外局番でお話しください。
ダイヤルプッシュでも入力いただけます。
入力が終わりましたら、最後に「こめじるし」を押してください。}"
  - module_name: "終話"
    announcement: "{tts_g:（予約/変更/キャンセル/問い合わせ）の申し込みを受付いたしました。
3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。
お電話ありがとうございました。それでは失礼いたします。}"
  - module_name: "終話②（キャンセル・問い合わせ）"
    announcement: "{tts_g:（キャンセル/問い合わせ）の申し込みを受付いたしました。
確認事項がある場合のみ3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。
お電話ありがとうございました。それでは失礼いたします。}"
  - module_name: "リトライ時ガイダンス"
    announcement: "{tts_g:恐れ入りますがご回答が確認できませんでした。今一度おっしゃっていただけますでしょうか。
（質問を繰り返す）}"
