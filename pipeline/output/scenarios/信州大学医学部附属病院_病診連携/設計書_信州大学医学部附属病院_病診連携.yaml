# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系（必須） ===
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（土日祝・年末年始・平日17:15以降〜翌8:30）"
    tts_announcement: "申し訳ございません。ただいまの時間は受付時間外となっております。受付時間は、土日祝日と年末年始を除く、月曜日から金曜日の8時30分から17時15分です。恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（代表案内）"
    tts_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、地域医療連携支援室へおかけ直しください。電話番号が分かる方は、このままお電話をお切りください。わからない方はご案内しますので、メモをご準備ください。0263-37-3370、0263-37-3370、0263-37-3370。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 正常系 ===
  - name: "END_FAX到着確認"
    condition: "FAX到着確認 受付完了"
    tts_announcement: "申込みを受付けしました。到着が確認できない場合は折り返しご連絡致します。お電話ありがとうございました。"
