  - module_name: "END_時間外"
    purpose: "受付時間外の終話アナウンス"
    announcement: "申し訳ございません。ただいまの時間は受付時間外となっております。受付時間は、土日祝日と年末年始を除く、月曜日から金曜日の8時30分から17時15分です。恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"

