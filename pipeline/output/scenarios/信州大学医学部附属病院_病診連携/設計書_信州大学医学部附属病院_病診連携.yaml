# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "施設名聴取"
    tts_announcement: "まず初めに、施設名をお話ください。"
    input_method: "voice_only"
    save_to: "organizationName"
    next_step: "担当者名聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、地域医療連携支援室へおかけ直しください。電話番号が分かる方は、このままお電話をお切りください。わからない方はご案内しますので、メモをご準備ください。0263-37-3370、0263-37-3370、0263-37-3370"

  - step_name: "担当者名聴取"
    tts_announcement: "続いて、お電話いただいているご担当者様のお名前をお話ください。"
    input_method: "voice_only"
    save_to: "staffName"
    next_step: "用件確認"
    retry_failure: "end_failure"
    retry_failure_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、地域医療連携支援室へおかけ直しください。電話番号が分かる方は、このままお電話をお切りください。わからない方はご案内しますので、メモをご準備ください。0263-37-3370、0263-37-3370、0263-37-3370"

  - step_name: "用件確認"
    tts_announcement: "ご用件をダイヤルプッシュで選択してください。1「FAX到着確認」、2「情報提供依頼」、3「入院・転院依頼」、4「その他問合せ」、それでは、ご選択ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "FAX到着確認"
        - "情報提供依頼"
        - "入院・転院依頼"
        - "その他問合せ"
      mapping:
        - input: "DTMF 1 / イチ / ファックス / 到着 / FAX / 位置(同音救済)"
          output: "FAX到着確認"
        - input: "DTMF 2 / 二 / 資料 / 資料請求 / 医療請求 / 書類 / 情報 / 診療情報提供依頼 / 請求 / 請求書"
