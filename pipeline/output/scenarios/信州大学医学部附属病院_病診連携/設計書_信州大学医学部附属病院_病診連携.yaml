# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen1→Gen3 移管。同施設の診療フローは別途 Gen3 化済（gen1_信州大学医学部附属病院_診療.md）。本フローは inbound 病診連携受付（医療機関スタッフからの架電）で、患者からの架電を扱う診療フローとは構造が異なる。"
  - "用件は4分類: FAX到着確認/情報提供依頼/入院・転院依頼/その他問合せ。各用件で聴取項目が大きく異なるため、scenario_flow は4ルート並列の構造。"
  - "用件の DTMF 番号は冒頭 TTS で明示する: 1=FAX到着確認, 2=情報提供依頼, 3=入院・転院依頼, 4=その他問合せ。"
  - "復唱（echo_back: true）対象は 5 ステップ（施設名聴取 / 用件確認 / 用件詳細_FAX到着確認 / 用件詳細_情報提供依頼 / 用件詳細_問合せ）のみ。生年月日・診療科・自由テキスト・Yes/No 系は復唱なし。"
  - "PatientName サブフロー（氏名聴取）は1本のみ。情報提供依頼/入院転院依頼/その他問合せ(紹介状送信・進捗確認) の3ルートから同じ flowname を呼び出して共有する。flow_structure.subflows[] には1エントリのみ登録（qa_validator E-12 準拠）。"
  - "患者生年月日は『生年月日フリー』を踏襲し自由テキストで保存。和暦/西暦の正規化は行わない。『分からない』『わかりません』『忘れた』等も受容。"
  - "47 診療科に no_result_default『登録なし』を設定。OpenAI が NO_RESULT を返した場合、context に『登録なし』を保存してリトライ（モジュール選定ガイド 2.5 準拠）。"
  - "代表番号 0263-37-3370 はリトライ上限到達時の代表案内 TTS で 3 連呼する（元 yaml の代表案内箱を踏襲）。"
  - "Gen1 の API_DRJOY_CONTEXT_SETTINGS / API_DRJOY による『入電番号→施設名 自動取得』機能は本設計書では非採用。施設名・担当者名は毎回 hearing で聴取する方針（Gen3 アーキテクチャでは標準モジュールに該当する API 呼び出し機能がないため。詳細は確認レポート N-3 参照）。"
  - "Gen1 のテスト系箱（テスト番号判別 / テスト：DrJOY渡部 / テスト：DrJOY清水 / テスト：DrJOY / テスト施設名 / 稼働前）は本番フローで未使用のため移管対象外。"
  - "Gen1 の主要動線では転送（API_DRJOY_1 → 転送 → 転送完了）は使われていないため、本設計書では call_transfer ブロック未配置。転送が必要になった場合は別途設計を再検討する。"
  - "SMS は本フロー全体で送信しない（医療機関スタッフからの架電のため、患者向け SMS は対象外）。全終話の sms_flag=-1。"
  - "用件確認で同音異義語が多い: 店員/入金/返品/天神依頼→入院・転院依頼、Suica/受信→これから受診の方の追加情報、位置/イチ→1番系、ファックス→FAX到着確認 等。OpenAI プロンプトで吸収する。"
  - "RAG/FAQ サブフローは未配置（pattern: none）。本フローは医療機関スタッフ向け業務窓口で患者 FAQ を扱わないため。"
  - "営業時間 平日 8:30〜17:15 の Brekeke 側 acceptance_times パラメータ詳細（祝日リスト・年末年始定義）は Dr.JOY 側で設定する。"
  - "context_field は Dr.JOY デフォルト 11 件 + 案件固有 10 件（organizationName / staffName / subClassification / otherInquiryContent / replyDeadline / desiredTiming / doctorSharing / doctorName / sameDayConfirmation / additionalInquiry）。フロー内で実際に使うのは案件固有10件 + classification + patientName + clinicalDepartment + patientDateOfBirth + status + telephoneNumber + dateOfCall + callId。reservationDate / medicalCardNumber / additionalPhoneNumber / reason はデフォルト維持のため定義のみ残し、本フローでは未使用。"

