version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "信州大学医学部附属病院"
  scenario_name: "病診連携"
  group_name: "信州大学医学部附属病院"
  flow_name: "信州大学医学部附属病院$病診連携"
  target_facility: "信州大学医学部附属病院 地域医療連携支援室"
  office_id: "TODO_要確認"
  phone_number: "0263-37-3370"
  business_hours: "祝日・年末年始を除く月〜金 8:30〜17:15（土日祝・年末年始休）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "信州大学医学部附属病院$病診連携"
      role: "main"
      description: "医療機関からの病診連携受付フロー（FAX到着確認/情報提供依頼/入院・転院依頼/その他問合せ）"
  subflows:
    - name: "{group}$氏名聴取_{date}"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー1枠を3ルート（情報提供依頼/入院転院依頼/その他問合せ）で共有して呼び出す。"

# --- セクション3: フローの目的 ---
purpose: |
  医療機関スタッフからの inbound 架電を受け、用件（FAX到着確認/情報提供依頼/入院・転院依頼/その他問合せ）を分類し、
  各用件に応じた追加情報（紹介元医療機関名・担当者名・患者氏名・生年月日・診療科・依頼詳細・希望時期・医師間共有・医師名・返答期限・問合せ内容等）を聴取して
  地域医療連携支援室へ取り次ぐ。受付時間外（土日祝・年末年始・平日17:15以降〜翌8:30）は時間外案内、聴取失敗時は代表番号案内（0263-37-3370）でクローズする。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "信州大学医学部附属病院$病診連携"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 → 切断
            └─ 通常   → 受付時間判定(acceptance_times)
                          ├─ 時間外 → END_時間外 → 切断
                          └─ 受付可 → 冒頭_アナウンス
                                        → 施設名聴取(text + 復唱)
                                        → 担当者名聴取(text)
                                        → 用件確認(enum + DTMF1〜4 + 復唱)
                                            ├─ FAX到着確認 → 用件詳細_FAX到着確認(enum + DTMF1〜4 + 復唱)
                                            │       ├─ 診療報告/問い合わせ回答/これから受診の方の追加情報 → END_FAX到着確認
                                            │       └─ その他 → FAX_内容確認(text) → END_FAX到着確認
                                            ├─ 情報提供依頼 → 当日予約日_情報提供依頼(enum DTMF1/2)
                                            │       → 情報提供_患者氏名(subflow) → 情報提供_生年月日(text)
                                            │       → 情報提供_診療科(enum) → 用件詳細_情報提供依頼(enum + DTMF1〜3 + 復唱)
                                            │            ├─ 治療の経過/MRIの実施可否 → 返答期限_情報提供依頼(text)
                                            │            └─ その他 → 情報提供_内容確認(text) → 返答期限_情報提供依頼(text)
                                            │       → END_情報提供依頼
                                            ├─ 入院・転院依頼 → 当日予約日_入院転院(enum DTMF1/2)
                                            │       → 入院転院_患者氏名(subflow) → 入院転院_生年月日(text)
                                            │       → 入院転院_診療科(enum) → 希望時期_入院転院(text)
                                            │       → 医師間共有(enum DTMF1/2) → 医師名_入院転院(text)
                                            │       → その他問合せ_入院転院(text) → END_入院転院依頼
                                            └─ その他問合せ → 用件詳細_問合せ(enum + DTMF1〜3 + 復唱)
                                                    ├─ 紹介状の送信依頼/問い合わせの進捗確認 → 問合せ_患者氏名(subflow)
                                                    │       → 問合せ_生年月日(text) → 問合せ_診療科(enum) → END_その他問合せ
                                                    └─ その他の問合せ → 問合せ_その他内容(text) → END_その他問合せ

      [異常系] 各 hearing のリトライ上限到達 → END_聴取失敗（代表案内 0263-37-3370 を 3 連呼）
    notes: "Gen1 の API_DRJOY_CONTEXT_SETTINGS / API_DRJOY による『入電番号→施設名 自動取得』機能は本設計書では非採用。施設名・担当者名は毎回 hearing で聴取する。"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック ===
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 施設名聴取

  # === 共通: 施設名 + 担当者名 + 用件分岐 ===
  - step: 施設名聴取
    type: hearing
    output_format: text
    save_to: organizationName
    echo_back: true
    next: 担当者名聴取

  - step: 担当者名聴取
    type: hearing
    output_format: text
    save_to: staffName
    next: 用件確認

  - step: 用件確認
    type: hearing
    output_format: enum
    save_to: classification
    echo_back: true
    conditions:
      - match: "FAX到着確認"
        next: 用件詳細_FAX到着確認
      - match: "情報提供依頼"
        next: 当日予約日_情報提供依頼
      - match: "入院・転院依頼"
        next: 当日予約日_入院転院
      - match: "other"
        next: 用件詳細_問合せ

  # === FAX到着確認ルート ===
  - step: 用件詳細_FAX到着確認
    type: hearing
    output_format: enum
    save_to: subClassification
    echo_back: true
    conditions:
      - match: "診療報告"
        next: END_FAX到着確認
      - match: "問い合わせ回答"
        next: END_FAX到着確認
      - match: "これから受診の方の追加情報"
        next: END_FAX到着確認
      - match: "other"
        next: FAX_内容確認

  - step: FAX_内容確認
    type: hearing
    output_format: text
    save_to: otherInquiryContent
    next: END_FAX到着確認

  # === 情報提供依頼ルート ===
  - step: 当日予約日_情報提供依頼
    type: hearing
    output_format: enum
    save_to: sameDayConfirmation
    conditions:
      - match: "はい"
        next: 情報提供_患者氏名
      - match: "other"
        next: 情報提供_患者氏名

  - step: 情報提供_患者氏名
    type: subflow
    flowname: "{group}$氏名聴取_{date}"
    next: 情報提供_生年月日

  - step: 情報提供_生年月日
    type: hearing
    output_format: text
    save_to: patientDateOfBirth
    next: 情報提供_診療科

  - step: 情報提供_診療科
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "other"
        next: 用件詳細_情報提供依頼

  - step: 用件詳細_情報提供依頼
    type: hearing
    output_format: enum
    save_to: subClassification
    echo_back: true
    conditions:
      - match: "治療の経過"
        next: 返答期限_情報提供依頼
      - match: "MRIの実施可否"
        next: 返答期限_情報提供依頼
      - match: "other"
        next: 情報提供_内容確認

  - step: 情報提供_内容確認
    type: hearing
    output_format: text
    save_to: otherInquiryContent
    next: 返答期限_情報提供依頼

  - step: 返答期限_情報提供依頼
    type: hearing
    output_format: text
    save_to: replyDeadline
    next: END_情報提供依頼

  # === 入院・転院依頼ルート ===
  - step: 当日予約日_入院転院
    type: hearing
    output_format: enum
    save_to: sameDayConfirmation
    conditions:
      - match: "はい"
        next: 入院転院_患者氏名
      - match: "other"
        next: 入院転院_患者氏名

  - step: 入院転院_患者氏名
    type: subflow
    flowname: "{group}$氏名聴取_{date}"
    next: 入院転院_生年月日

  - step: 入院転院_生年月日
    type: hearing
    output_format: text
    save_to: patientDateOfBirth
    next: 入院転院_診療科

  - step: 入院転院_診療科
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "other"
        next: 希望時期_入院転院

  - step: 希望時期_入院転院
    type: hearing
    output_format: text
    save_to: desiredTiming
    next: 医師間共有

  - step: 医師間共有
    type: hearing
    output_format: enum
    save_to: doctorSharing
    conditions:
      - match: "はい"
        next: 医師名_入院転院
      - match: "other"
        next: 医師名_入院転院

  - step: 医師名_入院転院
    type: hearing
    output_format: text
    save_to: doctorName
    next: その他問合せ_入院転院

  - step: その他問合せ_入院転院
    type: hearing
    output_format: text
    save_to: additionalInquiry
    next: END_入院転院依頼

  # === その他問合せルート ===
  - step: 用件詳細_問合せ
    type: hearing
    output_format: enum
    save_to: subClassification
    echo_back: true
    conditions:
      - match: "紹介状の送信依頼"
        next: 問合せ_患者氏名
      - match: "問い合わせの進捗確認"
        next: 問合せ_患者氏名
      - match: "other"
        next: 問合せ_その他内容

  - step: 問合せ_その他内容
    type: hearing
    output_format: text
    save_to: otherInquiryContent
    next: END_その他問合せ

  - step: 問合せ_患者氏名
    type: subflow
    flowname: "{group}$氏名聴取_{date}"
    next: 問合せ_生年月日

  - step: 問合せ_生年月日
    type: hearing
    output_format: text
    save_to: patientDateOfBirth
    next: 問合せ_診療科

  - step: 問合せ_診療科
    type: hearing
    output_format: enum
    save_to: clinicalDepartment
    no_result_default: "登録なし"
    conditions:
      - match: "other"
        next: END_その他問合せ

  # === 終話ブロック ===
  - step: END_FAX到着確認
    type: termination
    termination_ref: "END_FAX到着確認"

  - step: END_情報提供依頼
    type: termination
    termination_ref: "END_情報提供依頼"

  - step: END_入院転院依頼
    type: termination
    termination_ref: "END_入院転院依頼"

  - step: END_その他問合せ
    type: termination
    termination_ref: "END_その他問合せ"

