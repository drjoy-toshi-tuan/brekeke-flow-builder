  - module_name: "高校生未満案内"
    purpose: "高校生未満ゲート（案内のみ）"
    announcement: "本窓口は、高校生未満の場合、ご予約を承ることができません。診察を希望される方が高校生未満の場合はお電話をお切りください。"

  - module_name: "本人確認"
