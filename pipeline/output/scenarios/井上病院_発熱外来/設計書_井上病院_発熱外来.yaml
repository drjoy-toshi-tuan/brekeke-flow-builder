# --- セクション11: 特記事項・制約 ---
special_notes:
  - "当日発熱外来予約専用ダイヤル。用件分類は不要（全件＝発熱当日予約一本道）。"
  - "受付時間: 平日 10:00〜12:00（午前のみ短時間枠）。Dr.JOY 管理画面の acceptance_times スケジュールで設定。Gen1 yaml の入電時間判別.yaml では 9〜18 時で記述されているが、Gen1 終話 TTS 文言は 10:00〜12:00 が正（NON-BLOCKER N-6）"
  - "Dr.JOY API 連携モジュール（在庫取得 = GET_EMPTY_FRAME, 予約登録 = BOOKING_AI）は augment 暫定配置。実装方針は NON-BLOCKER N-1。Brekeke 側で Dr.JOY 専用 API 連携モジュールが必要"
  - "在庫取得結果 HAS_EMPTY_FRAME を context_match_router で 0/other 分岐。0=予約枠終了、other(>0)=正規ルート。API 失敗時の挙動も other 分岐に倒れるため、フェイルセーフが必要な場合は要再設計（NON-BLOCKER N-7）"
  - "高校生未満ゲートは announcement のみで強制切断はせず（Gen1 互換）。Gen1 にあった「もう一度」発話による再生機構は Gen3 で省略（NON-BLOCKER N-2）"
  - "本人確認 hearing は Yes/No 双方とも当院受診確認に進む（保存値 callerSubject はフロー分岐に使用しない、Dr.JOY 画面での記録用）。NON-BLOCKER N-4"
  - "受診歴ありルートで「診察券番号わからない / 持ってない」と答えた場合、標準診察券番号聴取サブフロー内の END_診察券無し 分岐に依存して次へ進む。Gen3 の標準サブフローがこれをハンドリングしているか要確認（NON-BLOCKER N-3）"
  - "性別聴取（hearing）は発熱外来特有。男性/女性 双方とも電話番号聴取に進む（記録のみ、フロー分岐に使用しない）"
  - "完了挨拶は携帯/固定で文言分岐しない（Gen1 互換、smsFlag=1 で SMS 送信を試行、固定の場合は Dr.JOY 側で電話折り返しに切替）。NON-BLOCKER N-5"
  - "DTMF 入力対応なし（Gen1 から踏襲）。すべて AmiVoice STT 音声入力。標準サブフロー（電話番号/診察券番号/生年月日聴取）は内部で DTMF を受け付けるが、本フローでは案内しない"
  - "リトライ回数は全 hearing 3 回上限（Gen1 の count再質問 を踏襲）"
  - "Gen1 の連結 TTS（「それでは、」「続いて、」「次に」「ありがとうございます。最後に、」）は当院受診確認・性別の hearing TTS にマージ済み。サブフロー直前のものは省略（独立 announcement ブロック化禁止のため）"
  - "終話 status 値: 1=予約完了 / 2=非通知・予約枠終了・予約失敗（代表案内扱い）/ 3=聴取失敗 / 6=時間外。CLAUDE.md の許可値リスト（1/2/3/6/7/8/9）に準拠"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "B-1: office_id（Dr.JOY 管理画面で確認 — 設計書には不要）"
    resolved: false
  - item: "B-2: 着信用 050 番号（IVR プロパティで設定 — 設計書には不要）"
    resolved: false
  - item: "N-1: 在庫取得（GET_EMPTY_FRAME）/ 予約登録（BOOKING_AI）の Dr.JOY API 連携モジュール実装方針。augment placeholder のままだと scaffold は Script placeholder を生成する。Brekeke 側で Dr.JOY 専用モジュール（drjoy^... 系）を用意するか、scaffold_generator に新ブロック型として追加するかを確認"
    resolved: false
  - item: "N-2: 高校生未満ゲートで Gen1 にあった「もう一度」発話による案内再生機構を Gen3 で残すか、announcement のみで省略して良いか確認（現状省略）"
    resolved: false
  - item: "N-3: 受診歴ありルートで「診察券番号わからない/持ってない」と答えた場合の挙動。標準診察券番号聴取サブフロー内の END_診察券無し 分岐がメインフローに復帰して氏名聴取に進む想定だが、サブフロー実装と整合するか確認"
    resolved: false
  - item: "N-4: 本人確認 hearing の保存値 callerSubject を Dr.JOY 画面に表示するか、内部記録のみとするか。現状は CLASSIFICATION で表示する設定"
    resolved: false
  - item: "N-5: 終話_予約完了 で smsFlag=1（SMS送信）に固定。携帯/固定で分岐させずに固定でも SMS 送信を試行する方針で良いか確認（Gen1 互換で「ショートメッセージ、またはお電話にて」と案内）"
    resolved: false
  - item: "N-6: 受付時間 平日 10:00〜12:00 で確定して良いか確認。Gen1 入電時間判別.yaml は 9〜18 時で記述（古い設定の名残）、Gen1 時間外案内 TTS は 10:00〜12:00 で記述（最新設定）。最新の時間が正と判断"
    resolved: false
  - item: "N-7: 在庫取得 API 失敗時のフェイルセーフ。現状は other 分岐で正規ルートに進むが、API 失敗時は予約登録不可の可能性が高いため、明示的に END_予約枠終了 に倒す設計に変更すべきか確認"
    resolved: false
  - item: "N-8: Gen1 の連結 TTS（「それでは、」「続いて、」「次に」「ありがとうございます。最後に、」）のうち、サブフロー直前のもの（生年月日聴取/電話番号聴取/氏名聴取/診察券番号聴取）は Gen3 で省略。UX 観点で残すべきか確認"
    resolved: false
  - item: "N-9: status 値割当（予約完了=1, 非通知=2, 予約枠終了=2, 予約失敗=2, 聴取失敗=3, 時間外=6）で良いか確認。特に予約失敗（System overload）と予約枠終了を区別したい場合は別 status 値の検討が必要"
    resolved: false
