# --- セクション6: 聴取項目一覧 ---
# DTMF 入力なし（Gen1 から踏襲）。全 hearing AmiVoice STT 音声入力。
hearing_items:
  - order: 1
    name: "本人確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "callerSubject"
    openai_processing: "classify"
    output_format: "enum"
    output_labels: ["本人", "家族"]
    notes: "Yes/No を本人/家族に分類。フロー分岐には使用せず双方とも当院受診確認に進む。Gen1 互換: PatientName subject 切替の伏線情報"

  - order: 2
    name: "当院受診確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "firstVisit"
    openai_processing: "classify"
    output_format: "enum"
    output_labels: ["初診", "受診歴あり"]
    notes: "「当院のご受診は、初めてですか？」 Yes(初診)→診察券スキップ / No(受診歴あり)→診察券聴取"

  - order: 3
    name: "性別"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "gender"
    openai_processing: "classify"
    output_format: "enum"
    output_labels: ["男性", "女性"]
    notes: "発熱外来特有。男性/女性 双方とも電話番号聴取に進む（記録のみ）。STT 救済語（弾性=男性, 助成=女性, オス/メス, 生命/異常部 等）は OpenAI 正規化で吸収"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "本人確認"
    tts_announcement: "診察を受けるご本人様からのお電話ですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "本人"
        - "家族"
        - "NO_RESULT"
      mapping:
        - input: "はい / そうです / はい本人です / 本人 / 私 / 私です / 自分 / 大丈夫"
          output: "本人"
        - input: "いいえ / 違います / 家族 / 親 / 妻 / 夫 / 息子 / 娘 / 母 / 父"
          output: "家族"
      no_result_condition: "上記いずれにも該当しない発話。リトライへ"
    save_to: "callerSubject"
    next_step: "当院受診確認"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "当院受診確認"
    tts_announcement: "それでは、当院のご受診は、初めてですか？"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "初診"
        - "受診歴あり"
        - "NO_RESULT"
      mapping:
        - input: "はい / そうです / 初めて / 初めてです / 初診 / 来たことない / 一度もない"
          output: "初診"
        - input: "いいえ / 違います / 前にも / 何度か / 何回か / あります / 通っている / かかっている / 受診歴あり / 診察券持ってる"
          output: "受診歴あり"
      no_result_condition: "上記いずれにも該当しない発話。リトライへ。リトライ失敗時は受診歴ありルート（診察券聴取）に倒す（other 分岐）"
    save_to: "firstVisit"
    next_step: "（条件分岐: 初診 → 氏名聴取 / other（受診歴あり） → 診察券番号聴取）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "性別"
    tts_announcement: "次に、性別をお伺いいたします。男性、もしくは女性でお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "男性"
        - "女性"
        - "NO_RESULT"
      mapping:
        - input: "男性 / 男 / おとこ / オトコ / だんせい / ダンセイ / オス / 弾性 / 男です"
          output: "男性"
        - input: "女性 / 女 / おんな / オンナ / じょせい / ジョセイ / メス / 助成 / 生命 / 女です"
          output: "女性"
      no_result_condition: "上記いずれにも該当しない発話（異常部 / 配送です 等の音響的曖昧語含む）。リトライへ"
    save_to: "gender"
    next_step: "電話番号聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須） ---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外（平日 10:00〜12:00 以外）"
    tts_announcement: "本日の受付時間は終了いたしました。受付時間は、平日10時から12時となります。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（本人確認/当院受診確認/性別 hearing および各サブフロー内のリトライ失敗合流先）"
    tts_announcement: "お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、代表電話へご連絡下さい。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系（発熱外来予約完了）---
  - name: "END_予約完了"
    condition: "BOOKING_AI 成功（全聴取完了 + Dr.JOY 予約登録成功）"
    tts_announcement: "ご予約の申し込みを受付ました。予約についてのご連絡を、ショートメッセージ、またはお電話にてご連絡いたします。それでは、失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約完了"

  # --- 異常系（在庫枠終了 / API 失敗）---
  - name: "END_予約枠終了"
    condition: "在庫取得結果 HAS_EMPTY_FRAME == 0（当日予約枠が完売）"
    tts_announcement: "申し訳ございません。本日の予約受付枠は、終了いたしました。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_予約枠終了"

  - name: "END_予約失敗"
    condition: "BOOKING_AI 失敗（System overload 救済）"
    tts_announcement: "予約を承ることができませんでした。恐れ入りますが再度電話を掛けなおしていただき、最初から予約手続きを行ってください。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_予約失敗"

# --- smsFlag 分岐（携帯/固定で文言分岐させない方針）---
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []

# --- セクション8b: RAG/FAQ検索サブフロー ---
# 当日予約専用ダイヤルのため RAG なし
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "施設案内（挨拶）"
    announcement: "お電話ありがとうございます。井上病院の発熱外来、AI電話です。"

  - module_name: "注意事項"
    purpose: "途中切断警告（在庫判定通過後・受診歴聴取前）"
