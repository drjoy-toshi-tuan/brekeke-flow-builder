  - module_name: "性別"
    purpose: "性別聴取の問いかけ（発熱外来特有）"
    announcement: "次に、性別をお伺いいたします。男性、もしくは女性でお答えください。"

  - module_name: "非通知_アナウンス"
    purpose: "非通知着信の終話"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  - module_name: "時間外_アナウンス"
    purpose: "受付時間外の終話（平日 10:00〜12:00 案内）"
    announcement: "本日の受付時間は終了いたしました。受付時間は、平日10時から12時となります。お電話ありがとうございました。"

  - module_name: "END_聴取失敗"
    purpose: "リトライ上限到達の終話（代表電話案内）"
    announcement: "お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、代表電話へご連絡下さい。"

  - module_name: "END_予約完了"
    purpose: "発熱外来予約完了の終話（SMS送信あり）"
    announcement: "ご予約の申し込みを受付ました。予約についてのご連絡を、ショートメッセージ、またはお電話にてご連絡いたします。それでは、失礼いたします。"

  - module_name: "END_予約枠終了"
    purpose: "当日予約枠完売時の終話"
    announcement: "申し訳ございません。本日の予約受付枠は、終了いたしました。お電話ありがとうございました。"

  - module_name: "END_予約失敗"
    purpose: "BOOKING_AI 失敗時の終話（System overload 救済）"
