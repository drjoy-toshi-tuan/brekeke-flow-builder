version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "井上病院"
  scenario_name: "発熱外来"
  group_name: "井上病院"
  flow_name: "井上病院$発熱外来"
  target_facility: "井上病院（発熱外来専用ダイヤル）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"          # 着信用 050 番号は IVR プロパティで設定
  business_hours: "平日 10:00〜12:00（午前のみ短時間枠）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"

  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
# 当日発熱外来予約専用ダイヤルのため、用件分類は不要（全件＝発熱外来当日予約）。
# 個人情報聴取（氏名・生年月日・電話番号・診察券番号）は標準サブフロー4本に切り出す。
# Dr.JOY API 連携（在庫取得・予約登録）は augment ブロックで暫定配置（Brekeke 側で Dr.JOY 専用モジュール実装が必要）。
flow_structure:
  type: "subflow"
  flows:
    - name: "井上病院$発熱外来"
      role: "main"
      description: "冒頭挨拶 → 在庫取得（Dr.JOY API）→ 在庫判定 → 注意事項 → 高校生未満案内 → 本人/受診歴聴取 → 個人情報聴取4本（条件分岐: 初診なら診察券スキップ）→ 性別聴取 → 連絡先聴取 → 予約登録（Dr.JOY API）→ 終話"

  subflows:
    - name: "井上病院$診察券番号聴取"
      target: "診察券番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "受診歴ありルートのみ通過。標準サブフロー（DTMF + STT 両対応）を使用。Gen1 では「わからない」回答時に END_診察券無し で次へ進めるため、Gen3 でも標準サブフローの『わからない』分岐に依存（NON-BLOCKER N-3）"

    - name: "井上病院$氏名聴取"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "標準氏名聴取サブフロー（PatientName 1 枠ルール準拠）"

    - name: "井上病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "復唱あり（DOB Re-confirmation）。和暦/西暦変換あり"

    - name: "井上病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "復唱あり（Phone Normalization + Re-confirmation）。incoming-classifier で携帯/固定判別"

# --- セクション3: フローの目的 ---
purpose: |
  井上病院の発熱外来 (当日予約専用) AI 電話。当日の予約枠在庫を Dr.JOY API から取得し、
  空きがある場合のみ患者属性を聴取してDr.JOY に予約登録する。
  - 用件分類は不要（全件＝発熱当日予約）
  - 受付時間は平日 10:00〜12:00（午前のみ短時間枠）
  - 高校生未満は予約不可（案内のみで案内的にゲート、強制切断はせず患者の判断に委ねる）
  - 受診歴の有無で診察券番号聴取の有無を分岐（初診→スキップ / 受診歴あり→聴取）
  - 性別聴取（男性/女性）あり（発熱外来特有、他フローには無い）

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "井上病院$発熱外来"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常/携帯/固定 → acceptance_times（受付時間: 平日 10:00〜12:00）
                                  ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6) → 切断
                                  └─ 受付可 → 冒頭_アナウンス(TTS)
                                                → 在庫取得 [augment: Dr.JOY API GET_EMPTY_FRAME → HAS_EMPTY_FRAME context へ保存]
                                                → 在庫判定 [context_match_router on 在庫取得]
                                                    ├─ "0"   → 予約枠終了_アナウンス(TTS) → 完了フラグ_予約枠終了(status=2) → 切断
                                                    └─ other → 注意事項(TTS)
                                                                → 高校生未満案内(TTS)
                                                                → 本人確認(hearing enum: 本人/家族, save_to=callerSubject)
                                                                → 当院受診確認(hearing enum: 初診/受診歴あり, save_to=firstVisit)
                                                                    ├─ 初診           → 氏名聴取 sub
                                                                    └─ other(受診歴あり) → 診察券番号聴取 sub → 氏名聴取 sub
                                                                          → 生年月日聴取 sub
                                                                          → 性別(hearing enum: 男性/女性, save_to=gender)
                                                                          → 電話番号聴取 sub
                                                                          → 予約登録 [augment: Dr.JOY API BOOKING_AI]
                                                                              ├─ success → 予約完了_アナウンス(TTS) → 完了フラグ_予約完了(status=1, smsFlag=1) → 切断
                                                                              └─ other(failure) → 予約失敗_アナウンス(TTS) → 完了フラグ_予約失敗(status=2) → 切断

      全 hearing リトライ失敗 (本人確認 / 当院受診確認 / 性別 / 各サブフロー内) → 代表電話案内(TTS) → 完了フラグ_聴取失敗(status=3) → 切断
    notes: |
      - 入電時間判別.yaml は date_of_call_classifier 配置を取らず acceptance_times 単体で吸収
        （Dr.JOY 管理画面で平日 10:00〜12:00 のスケジュールを設定）
      - 高校生未満ゲートは announcement のみ（強制切断なし、もう一度発話の再生機構は Gen3 で省略）
      - 本人確認 hearing は Yes/No 双方とも当院受診確認に進む（保存値は callerSubject に記録するのみ、分岐に使用しない）
      - 受診歴ありルートは 診察券番号聴取 → 氏名聴取 / 初診ルートは直接 氏名聴取
      - Dr.JOY API モジュール（在庫取得・予約登録）は augment 暫定配置。実装方針は NON-BLOCKER N-1
      - リトライ失敗時の終話は END_聴取失敗（代表電話案内）に集約

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック（opening + 冒頭_アナウンス の 2 ブロック 1 セット）---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 在庫取得

  # --- 在庫取得（Dr.JOY API GET_EMPTY_FRAME）---
  - step: 在庫取得
    type: augment
    augment_pattern: new_module
    augment_purpose: |
      Dr.JOY API GET_EMPTY_FRAME — 当日発熱外来空き枠数を取得し HAS_EMPTY_FRAME context に整数値を保存する。
      Brekeke 標準モジュールには無い Dr.JOY 専用 API 連携モジュールが必要。
      scaffold は placeholder Script を生成して完走させる想定。
      実運用時は Brekeke 側で本物の API 連携モジュール（`drjoy^...$GET_EMPTY_FRAME` 等）に差し替え必須。
    next: 在庫判定

  # --- 在庫判定（HAS_EMPTY_FRAME == 0 → 予約枠終了 / それ以外 → 続行）---
  - step: 在庫判定
    type: context_match_router
    reference_module: 在庫取得
    conditions:
      - match: "0"
        next: END_予約枠終了
      - match: "other"
        next: 注意事項

  # --- 注意事項アナウンス（途中切断警告）---
  - step: 注意事項
    type: announcement
    next: 高校生未満案内

  # --- 高校生未満ゲート（案内のみ、強制切断なし）---
  - step: 高校生未満案内
    type: announcement
    next: 本人確認

  # --- 本人確認 hearing（Yes/No 双方とも次へ進む。保存のみ）---
  - step: 本人確認
    type: hearing
    output_format: enum
    save_to: callerSubject
    output_labels: ["本人", "家族"]
    retry_failure: end_failure
    conditions:
      - match: "other"   # 本人/家族 のいずれでも当院受診確認に進む（Subject 切替の伏線情報のみ）
        next: 当院受診確認

  # --- 当院受診確認 hearing（初診/受診歴あり で診察券聴取の有無を分岐）---
  - step: 当院受診確認
    type: hearing
    output_format: enum
    save_to: firstVisit
    output_labels: ["初診", "受診歴あり"]
    retry_failure: end_failure
    conditions:
      - match: "初診"
        next: 氏名聴取
      - match: "other"   # 受診歴あり 含む（NO_RESULT は OpenAI リトライへ。保険として受診歴ありに倒す）
        next: 診察券番号聴取

  # --- 診察券番号聴取（受診歴ありルートのみ通過）---
  - step: 診察券番号聴取
    type: subflow
    flowname: "井上病院$診察券番号聴取"
    next: 氏名聴取

  # --- 氏名聴取 ---
  - step: 氏名聴取
    type: subflow
    flowname: "井上病院$氏名聴取"
    next: 生年月日聴取

  # --- 生年月日聴取（復唱あり、和暦/西暦変換）---
  - step: 生年月日聴取
    type: subflow
    flowname: "井上病院$生年月日聴取"
    next: 性別

  # --- 性別 hearing（発熱外来特有）---
  - step: 性別
    type: hearing
    output_format: enum
    save_to: gender
    output_labels: ["男性", "女性"]
    retry_failure: end_failure
    conditions:
      - match: "other"   # 男性/女性 のいずれでも電話番号聴取に進む
        next: 電話番号聴取

  # --- 電話番号聴取（復唱あり、incoming-classifier で携帯/固定判別）---
  - step: 電話番号聴取
    type: subflow
    flowname: "井上病院$電話番号聴取"
    next: 予約登録

  # --- 予約登録（Dr.JOY API BOOKING_AI）---
  - step: 予約登録
    type: augment
    augment_pattern: new_module
    augment_purpose: |
      Dr.JOY API BOOKING_AI — 取得した患者情報・連絡先で Dr.JOY に発熱外来予約を登録する。
      success → END_予約完了（SMS送信あり）/ failure → END_予約失敗（System overload 救済 termination）。
      Brekeke 標準モジュールには無い Dr.JOY 専用 API 連携モジュールが必要。
      scaffold は placeholder Script を生成して完走させる想定。
      実運用時は Brekeke 側で本物の API 連携モジュール（`drjoy^...$BOOKING_AI` 等）に差し替え必須。
    conditions:
      - match: "success"
        next: END_予約完了
      - match: "other"   # failure / error / timeout すべて含む（System overload 救済へ）
        next: END_予約失敗

  # --- 終話ブロック群 ---
  - step: END_予約完了
    type: termination
    termination_ref: END_予約完了

  - step: END_予約枠終了
    type: termination
    termination_ref: END_予約枠終了

  - step: END_予約失敗
    type: termination
    termination_ref: END_予約失敗

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
