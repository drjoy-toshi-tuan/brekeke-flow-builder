    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_個人_新規_mobile"
  - name: "END_個人_新規_landline"
    condition: "company_check=個人, classification=新規予約, phone_type=landline/ip050"
    tts_announcement: "ご用件を受付いたしました。日曜、祝日を除く3日以内に、担当者から折り返し電話にてご連絡いたします。なお、折り返しのご連絡の際に、保険証の情報を確認いたします。お手元にご用意の上、お待ちください。お電話ありがとうございました。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_個人_新規_landline"
  - name: "END_個人_変更_mobile"
    condition: "company_check=個人, classification=変更, phone_type=mobile"
    tts_announcement: "ご用件を受付いたしました。日曜、祝日を除く3日以内に、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。なお、折り返しのご連絡の際に、保険証の情報を確認いたします。お手元にご用意の上、お待ちください。お電話ありがとうございました。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_個人_変更_mobile"
