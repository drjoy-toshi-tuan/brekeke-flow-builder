# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "company_check"
    - "phone_type"
  patterns:
    - condition: "classification=新規予約 (通話完了)"
      sms_flag: "1"
      notes: "企業/個人 × mobile/landline の 4 パターンすべて smsFlag=1"
    - condition: "classification=変更 (通話完了)"
      sms_flag: "2"
      notes: "企業/個人 × mobile/landline の 4 パターンすべて smsFlag=2"
    - condition: "classification=予約内容及び日程の確認 (通話完了)"
      sms_flag: "3"
      notes: "企業/個人 × mobile/landline の 4 パターンすべて smsFlag=3"
    - condition: "classification=キャンセル (通話完了)"
      sms_flag: "4"
      notes: "キャンセルは phone_type 非依存の単一 TTS"
    - condition: "通話未完了（代表案内・時間外・非通知・聴取失敗）"
      sms_flag: "-1"
      notes: "Gen2 の 0 は Gen3 では -1（SMS 送信なし）に置換"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false
  # 判断根拠: Gen2 プロンプト 1-2 に『FAQ に記載がある場合は FAQ 参照後に直前フローへ戻る』旨の記載はあるが、
  # 元資料に FAQ 本体は未提供。移管ノート方針どおり RAG 設置なし。FAQ 系の発話は OpenAI プロンプト側で
  # 『ご質問いただいた内容はAI電話ではご対応できませんので、折り返しでご確認させていただきます』の定型応答 + 再質問ループで処理（prompter 担当）。

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # === 冒頭 ===
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内"
    announcement: "お電話ありがとうございます。つくばトータルヘルスプラザ、予約専用、AI電話です。予約に関する用件以外については代表電話へおかけ直し下さい。"

  # === メインフロー hearing TTS ===
  - module_name: "予約日確認"
    purpose: "本日より4日目以降か確認"
    announcement: "日曜・祝日を除き、本日より4日目以降に関するお問い合わせでよろしいですか？「はい」か「いいえ」でお話しください。"

  - module_name: "企業個人確認"
    purpose: "企業/個人区分確認"
    announcement: "お電話いただいている方は、企業のご担当者様ですか？「はい」か「いいえ」でお話しください。"

  - module_name: "企業名"
    purpose: "企業名聴取"
    announcement: "お電話いただいた方の、企業名をお話ください"

  - module_name: "用件"
    purpose: "用件区分聴取（DTMF 4 択）"
    announcement: "ご用件を、次の4つのいずれかでお話ください。「新規予約お申込の方は1を」「予約内容の変更の方は2を」「予約キャンセルの方は3を」「予約内容及び日程の確認は4を」、それではお話ください。<dtmf digit=\"1\"/>"

  - module_name: "新規_希望コース"
    purpose: "新規予約ルート 希望コース聴取（DTMF 3 択）"
    announcement: "ご希望のコースを教えてください。「健康診断をご希望の方は1を」、「人間ドックをご希望の方は2を」、「乳がん・子宮がん検診のみをご希望の方は3を」、分からない場合は、「分からない」とお話ください。<dtmf digit=\"1\"/>"

  - module_name: "新規_助成確認"
    purpose: "新規予約かつ course=乳がん・子宮がん検診のみ の場合の助成確認"
    announcement: "お住いの市町村の助成制度をご利用の場合は市町村名を、企業からの予約の場合は会社名を、どちらでもない方はその他 とお話しください。"

  - module_name: "新規_人数時期"
    purpose: "新規予約ルート 人数・予約希望時期聴取"
    announcement: "受診を希望される方の人数と、予約希望時期を、お話しください。"

  - module_name: "変更キャンセル_コース確認"
    purpose: "変更/キャンセル 共通 コース確認（DTMF 3 択）"
    announcement: "現在ご予約されているコースを教えてください。「健康診断の方は1を」、「人間ドックの方は2を」、「乳がん・子宮がん検診のみの方は3を」、分からない場合は、「分からない」とお話ください。<dtmf digit=\"1\"/>"

  - module_name: "変更_内容"
    purpose: "変更ルート 変更・追加希望内容聴取"
    announcement: "変更や追加希望の内容について、簡潔にお話ください。"

  - module_name: "キャンセル_対象者聴取"
    purpose: "企業×キャンセル時のキャンセル対象者聴取"
    announcement: "キャンセルされる方のお名前をお話しください。"

  - module_name: "キャンセル_現在予約日聴取"
    purpose: "キャンセルルート 現在の予約日聴取"
    announcement: "現在の予約日を、お話ください"

