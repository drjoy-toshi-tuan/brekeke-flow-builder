# 設計書 — 筑波記念病院 健診
# 生成元: @director エージェント
# 生成日: 2026/04/22
# 元資料: docs/reference/customer_docs/【健診】：筑波記念病院.md
# 移管ノート: docs/migration/gen2_筑波記念病院_健診.md
#
# 作業種別: Gen2→Gen3移管
# Customer Docs（プロンプト+function+yaml 全量）を参照し、第3世代 scenario_flow 構造に変換。
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "筑波記念病院"
  group_name: "筑波記念病院"
  flow_name: "筑波記念病院$健診"
  target_facility: "筑波記念病院 つくばトータルヘルスプラザ"
  office_id: "TODO_要確認"                                   # NON-BLOCKER N-1: Dr.JOY Admin で確認
  phone_number: "0298643588"                                 # 代表電話（Gen2 プロンプト内・全 END_代表案内系で使用）
  business_hours: "TODO_要確認"                              # NON-BLOCKER N-2: Gen2 に記載なし。Dr.JOY 側で設定
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"                                        # 移管ノート: 環境=本番

# --- セクション2: フロー構成 ---
# Gen2 yaml を 9 ブロック型に分解。個人情報（氏名/生年月日/電話番号）はサブフロー分離。
# 企業ルートは「企業名→担当者名(氏名聴取sub)→電話番号sub→用件」、個人ルートは「氏名sub→生年月日sub→電話番号sub→用件」。
# 用件以降は 企業/個人 共通フロー（キャンセル時のみ企業×キャンセルでキャンセル者名 hearing を追加）。
flow_structure:
  type: "subflow"
  flows:
    - name: "筑波記念病院$健診"
      role: "main"
      description: "冒頭→予約日確認(4日目以降か)→企業/個人確認→(企業:企業名→担当者名sub / 個人:氏名sub→生年月日sub)→電話番号sub→用件(DTMF4択)→用件別ヒアリング→終話判定(company_check × phone_type × classification)"
    - name: "筑波記念病院$氏名聴取"
      role: "sub"
      description: "氏名聴取（復唱なし）→ 結果返却。個人の受診者名 および 企業の担当者名 の両方で呼び出し（同一サブフロー定義、scenario_flow側で呼び分け）"
    - name: "筑波記念病院$生年月日聴取"
      role: "sub"
      description: "生年月日聴取（復唱あり — DOB Re-confirmation）→ 結果返却。個人ルートのみ使用"
    - name: "筑波記念病院$電話番号聴取"
      role: "sub"
      description: "incoming-classifier 3分岐（携帯/固定/050）→ Phone Normalization → 復唱確認 → phone_type 確定 → 結果返却。企業/個人 共通"
  subflows:
    - name: "筑波記念病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen2 プロンプト 『受診される方の名前を「名前はタナカタロウです。」のようにお話しください』と担当者名プロンプトの 2 パターンに対応。save_to: patientName（カタカナ格納）。Gen2『企業の patientName は通話終了まで書き換えない』ルールはキャンセル_対象者聴取 を氏名サブフロー経由にせず reason 直格納にすることで遵守"
    - name: "筑波記念病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen2 プロンプト『生年月日を西暦から...復唱』+『2900年代→1900年代の自動補正』+『数字4/5誤認救済（for/C/Sea→4、号/Go→5）』をサブフロー内の OpenAI/DOB Re-confirmation プロンプトで処理（prompter 担当）。2回失敗で空文字のまま次へ"
    - name: "筑波記念病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Gen2 プロンプト 1.11『連絡先電話番号』+ 1-4『着信元電話番号の種別判定（090/080/070/060=携帯、050=固定、それ以外=固定）』+『桁数バリデーション 3回まで再聴取』対応。phone_type context（mobile/ip050/landline/withheld）は本サブフロー内 incoming-classifier + saveContext2DB で確定。終話判定 ContextMatchRouter で参照。termination=return（メインフロー側で company_check × classification × phone_type による 12 パターン終話を制御）"

# --- セクション3: フローの目的 ---
purpose: >
  筑波記念病院つくばトータルヘルスプラザ（健診部門）専用のAI電話窓口。受付可能な予約日（日曜・祝日除き本日より4日目以降）かを
  まず確認し、企業のご担当者様か個人かを分岐してから、本人確認情報（企業=企業名+担当者名、個人=受診者名+生年月日）を聴取。
  連絡先電話番号を聴取し、用件（新規予約/変更/キャンセル/予約内容及び日程の確認）を DTMF 4 択で聴取。
  用件別に必要情報を聴取（新規=希望コース+助成確認(乳がん子宮がん時のみ)+人数・予約希望時期、変更=コース+変更内容、
  キャンセル=(企業時のみ)キャンセル者名+コース+現在予約日、確認=追加情報なし）。終話は company_check（企業/個人）×
  phone_type（携帯/固定）×classification（新規/変更/確認）の 12 組合せ + キャンセル単独 + 代表案内系 3 種。
  Gen2→Gen3移管。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "筑波記念病院$健診"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → END_非通知(TTS) → 完了フラグ_非通知(status=7, smsFlag=-1) → 切断
            └─ 通常/携帯/固定/050 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → END_時間外(TTS) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → 予約日確認(hearing enum はい/いいえ)
                                          ├─ いいえ → END_代表電話案内_3日以内(status=2, smsFlag=-1) → 切断
                                          └─ はい   → 企業個人確認(hearing enum 企業/個人, save_to=company_check)
                                                        ├─ 企業 → 企業名(hearing text, save_to=companyName)
                                                        │           → 企業_担当者名(jump_氏名聴取, save_to=patientName)
                                                        │           → 電話番号聴取(sub, phone_type 確定)
                                                        │           → 用件
                                                        └─ 個人 → 氏名聴取(sub, save_to=patientName)
                                                                    → 生年月日聴取(sub, 復唱あり)
                                                                    → 電話番号聴取(sub, phone_type 確定)
                                                                    → 用件

      ─── 用件分岐 ───
      用件(hearing enum DTMF 1/2/3/4, save_to=classification)
        ├─ 1 新規予約 → 新規_希望コース
        ├─ 2 変更     → 変更キャンセル_コース確認
        ├─ 3 キャンセル → キャンセル判定_分岐(ContextMatchRouter on company_check)
        │                 ├─ 企業 → キャンセル_対象者聴取(hearing text, save_to=reason) → 変更キャンセル_コース確認
        │                 └─ 個人 → 変更キャンセル_コース確認
        └─ 4 予約内容及び日程の確認 → 終話判定

      ─── 新規予約ルート ───
      新規_希望コース(hearing enum DTMF 1/2/3, save_to=course)
        ├─ 乳がん・子宮がん検診のみ → 新規_助成確認(hearing text, save_to=subsidyProvider) → 新規_人数時期
        └─ default (健康診断/人間ドック/分からない) → 新規_人数時期
      新規_人数時期(hearing text, save_to=DesiredreservationDate)
        → 新規_当日判定(script 「今日」検出)
            ├─ 今日 → END_代表電話案内_当日(status=2, smsFlag=-1)
            └─ default → 終話判定

      ─── 変更/キャンセル共通: コース確認+分岐 ───
      変更キャンセル_コース確認(hearing enum DTMF 1/2/3, save_to=course)
        → 変更キャンセル_分岐(ContextMatchRouter on classification)
            ├─ 変更 → 変更_内容(hearing text, save_to=reason) → 終話判定
            └─ キャンセル → キャンセル_現在予約日聴取(hearing datetime, save_to=reservationDate) → END_キャンセル完了(status=1, smsFlag=4)

      ─── 終話判定（3段 ContextMatchRouter）───
      終話判定(ContextMatchRouter on company_check)
        ├─ 企業 → 終話判定_企業_phone(ContextMatchRouter on phone_type)
        │           ├─ mobile   → 終話判定_企業_mobile_cls(ContextMatchRouter on classification)
        │           │               ├─ 新規予約 → END_企業_新規_mobile(status=1, smsFlag=1)
        │           │               ├─ 変更     → END_企業_変更_mobile(status=1, smsFlag=2)
        │           │               └─ 確認     → END_企業_確認_mobile(status=1, smsFlag=3)
        │           └─ landline/ip050 → 終話判定_企業_landline_cls
        │                                 ├─ 新規予約 → END_企業_新規_landline(status=1, smsFlag=1)
        │                                 ├─ 変更     → END_企業_変更_landline(status=1, smsFlag=2)
        │                                 └─ 確認     → END_企業_確認_landline(status=1, smsFlag=3)
        └─ 個人 → 終話判定_個人_phone(ContextMatchRouter on phone_type)
                    ├─ mobile   → 終話判定_個人_mobile_cls
                    │               ├─ 新規予約 → END_個人_新規_mobile(status=1, smsFlag=1)
                    │               ├─ 変更     → END_個人_変更_mobile(status=1, smsFlag=2)
                    │               └─ 確認     → END_個人_確認_mobile(status=1, smsFlag=3)
                    └─ landline/ip050 → 終話判定_個人_landline_cls
                                          ├─ 新規予約 → END_個人_新規_landline(status=1, smsFlag=1)
                                          ├─ 変更     → END_個人_変更_landline(status=1, smsFlag=2)
                                          └─ 確認     → END_個人_確認_landline(status=1, smsFlag=3)

      ─── 特殊・異常終話 ───
      END_代表電話案内_3日以内 : 予約日確認=いいえ (status=2, smsFlag=-1)
      END_代表電話案内_当日     : 新規_人数時期が今日を含む (status=2, smsFlag=-1)
      END_問い合わせ代表案内    : 用件で適切な値が得られない (status=2, smsFlag=-1)
      END_キャンセル完了        : キャンセル_現在予約日聴取完了 (status=1, smsFlag=4)
      END_非通知終了            : 冒頭 incoming-classifier withheld (status=7, smsFlag=-1)
      END_時間外               : acceptance_times 外 (status=6, smsFlag=-1)
      END_聴取失敗             : 各リトライ上限到達時 (status=2, smsFlag=-1)
    notes: |
      Gen2→Gen3 移管時の設計判断:
      - 冒頭の『挨拶と予約日確認』Gen2 箱は Gen3 で announcement（冒頭_アナウンス）+ hearing（予約日確認）の 2 ブロックに分離
      - 『キャンセル判定_分岐』は AI補完=true の Pattern B（ContextMatchRouter on company_check）として明示配置
      - 『変更キャンセル_コース確認』は Gen2 yaml 内で hearing + 条件分岐（classification 含む "2,変更"）が 1 箱に同居していたため、
        Gen3 では hearing（course 格納のみ、単線）→ context_match_router on classification へ分離
      - 『新規予約ルート完了時の当日判定』は Gen2 プロンプト 1-5 の『予約希望日が当日の場合は代表案内で終話』を script ブロックで実装
      - 『終話判定』は Gen2 の『終話判定』箱（company_check）+ Gen2 プロンプト内『個人/企業終話アナウンス × 携帯/固定 × 用件別 smsFlag』を
        3 段 ContextMatchRouter（company_check → phone_type → classification）に展開し 12 パターンの正常終話を作成
      - status 値は Gen3 canonical（1=通話完了/2=案内/6=時間外/7=非通知）にマッピング。Gen2 の status=3（非通知）は Gen3 では
        status=7 に置換。Gen2 の status=0（途中切断）は第3世代では未使用（切断時点の status で確定）
      - smsFlag は Gen2 仕様を維持（新規=1, 変更=2, 確認=3, キャンセル=4, それ以外=-1。Gen2 の 0 は Gen3 では -1 に置換）

  - flow_name: "筑波記念病院$氏名聴取"
    diagram: |
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「筑波記念病院$」に置換。構造・接続・スクリプトは一切変更不可。
      復唱なし版（Gen2 プロンプト『聴取内容の復唱は生年月日のみ』に準拠）。
    notes: "CLAUDE.md Rule 9/11 準拠。入電者名（個人=受診者名、企業=担当者名）の両方でこの 1 本を参照（scenario_flow 側で 2 jump 呼び分け）"

  - flow_name: "筑波記念病院$生年月日聴取"
    diagram: |
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「生年月日聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「筑波記念病院$」に置換。構造・接続・スクリプトは一切変更不可。
      復唱あり版（DOB Re-confirmation）。Gen2 プロンプト『生年月日のみ復唱』に準拠。
    notes: "CLAUDE.md Rule 9/11 準拠。Gen2『2900年代→1900年代補正』『数字4/5誤認救済』は prompter が OpenAI/DOB Re-confirmation プロンプトに反映。個人ルートのみで使用（企業ルートでは生年月日聴取をスキップ — Gen2 仕様）"

  - flow_name: "筑波記念病院$電話番号聴取"
    diagram: |
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「電話番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「筑波記念病院$」に置換。構造・接続・スクリプトは一切変更不可。
      termination=return: 終話チェーンはメインフロー側（company_check × phone_type × classification の 12 パターンで制御するため）。
    notes: "CLAUDE.md Rule 9/10/11 準拠。Gen2 1.11/1-4/1-8 対応（携帯/固定/050 判定 + 桁数バリデーション 3 回 + 数字 4/5 誤認救済）。phone_type（mobile/ip050/landline/withheld）は本サブフロー内 incoming-classifier + saveContext2DB で確定"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # ============================
  # 冒頭
  # ============================
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 予約日確認

  # ============================
  # 予約日確認（Pattern A: enum 直接分岐）
  # ============================
  - step: 予約日確認
    type: hearing
    output_format: enum
    echo_back: false
    conditions:
      - match: "はい"
        next: 企業個人確認
      - match: "いいえ"
        next: END_代表電話案内_3日以内

  # ============================
  # 企業/個人確認（Pattern A: enum 直接分岐、company_check 格納）
  # ============================
  - step: 企業個人確認
    type: hearing
    output_format: enum
    echo_back: false
    save_to: company_check
    conditions:
      - match: "企業"
        next: 企業名
      - match: "個人"
        next: 氏名聴取

  # ============================
  # 企業ルート（企業名 → 担当者名 sub → 電話番号 sub → 用件）
  # ============================
  - step: 企業名
    type: hearing
    output_format: text
    echo_back: false
    save_to: companyName
    next: 企業_担当者名

  # 企業の担当者名は氏名聴取サブフロー（patientName に格納、復唱なし）
  - step: 企業_担当者名
    type: subflow
    flowname: "筑波記念病院$氏名聴取"
    next: 電話番号聴取

  # ============================
  # 個人ルート（氏名 sub → 生年月日 sub → 電話番号 sub → 用件）
  # ============================
  - step: 氏名聴取
    type: subflow
    flowname: "筑波記念病院$氏名聴取"
    next: 生年月日聴取

  - step: 生年月日聴取
    type: subflow
    flowname: "筑波記念病院$生年月日聴取"
    next: 電話番号聴取

  # ============================
  # 共通: 電話番号聴取サブフロー（phone_type 確定）
  # ============================
  - step: 電話番号聴取
    type: subflow
    flowname: "筑波記念病院$電話番号聴取"
    next: 用件

  # ============================
  # 用件（DTMF 1/2/3/4 の 4 択、Pattern A: enum 直接分岐）
  # ============================
  - step: 用件
    type: hearing
    output_format: enum
    echo_back: false
    save_to: classification
    conditions:
      - match: "新規予約"
        next: 新規_希望コース
      - match: "変更"
        next: 変更キャンセル_コース確認
      - match: "キャンセル"
        next: キャンセル判定_分岐
      - match: "予約内容及び日程の確認"
        next: 終話判定
      - match: "default"
        next: END_問い合わせ代表案内

  # ============================
  # 新規予約ルート
  # ============================
  - step: 新規_希望コース
    type: hearing
    output_format: enum
    echo_back: false
    save_to: course
    conditions:
      - match: "乳がん・子宮がん検診のみ"
        next: 新規_助成確認
      - match: "健康診断"
        next: 新規_人数時期
      - match: "人間ドック"
        next: 新規_人数時期
      - match: "分からない"
        next: 新規_人数時期

  - step: 新規_助成確認
    type: hearing
    output_format: text
    echo_back: false
    save_to: subsidyProvider
    next: 新規_人数時期

  - step: 新規_人数時期
    type: hearing
    output_format: text
    echo_back: false
    save_to: DesiredreservationDate
    next: 新規_当日判定

  # Gen2 プロンプト 1-5『予約希望日が着信日時の月日と同じ日付の発話 → 代表案内』を script で判定
  - step: 新規_当日判定
    type: script
    script_template: custom
    reference_module: "新規_人数時期"
    conditions:
      - match: "今日"
        next: END_代表電話案内_当日
      - match: "default"
        next: 終話判定

  # ============================
  # 変更/キャンセル共通: コース確認 + Pattern B 分岐
  # ============================
  - step: 変更キャンセル_コース確認
    type: hearing
    output_format: enum
    echo_back: false
    save_to: course
    next: 変更キャンセル_分岐

  - step: 変更キャンセル_分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: 変更_内容
      - match: "キャンセル"
        next: キャンセル_現在予約日聴取

  # ============================
  # 変更ルート
  # ============================
  - step: 変更_内容
    type: hearing
    output_format: text
    echo_back: false
    save_to: reason
    next: 終話判定

  # ============================
  # キャンセルルート前段（Pattern B: company_check で企業時のみキャンセル者名聴取）
  # ============================
  - step: キャンセル判定_分岐
    type: context_match_router
    reference_module: "company_check"
    conditions:
      - match: "企業"
        next: キャンセル_対象者聴取
      - match: "個人"
        next: 変更キャンセル_コース確認

  # Gen2『キャンセル者名聴取で patientName に格納してはならない。企業担当者名 patientName は保持』に準拠、reason に格納
  - step: キャンセル_対象者聴取
    type: hearing
    output_format: text
    echo_back: false
    save_to: reason
    next: 変更キャンセル_コース確認

  - step: キャンセル_現在予約日聴取
    type: hearing
    output_format: datetime
    echo_back: false
    save_to: reservationDate
    next: END_キャンセル完了

  # ============================
  # 終話判定（3 段 ContextMatchRouter: company_check → phone_type → classification）
  # ============================
  - step: 終話判定
    type: context_match_router
    reference_module: "company_check"
    conditions:
      - match: "企業"
        next: 終話判定_企業_phone
      - match: "個人"
        next: 終話判定_個人_phone

  - step: 終話判定_企業_phone
    type: context_match_router
    reference_module: "phone_type"
    conditions:
      - match: "mobile"
        next: 終話判定_企業_mobile_cls
      - match: "landline"
        next: 終話判定_企業_landline_cls
      - match: "ip050"
        next: 終話判定_企業_landline_cls

  - step: 終話判定_企業_mobile_cls
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "新規予約"
        next: END_企業_新規_mobile
      - match: "変更"
        next: END_企業_変更_mobile
      - match: "予約内容及び日程の確認"
        next: END_企業_確認_mobile

  - step: 終話判定_企業_landline_cls
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "新規予約"
        next: END_企業_新規_landline
      - match: "変更"
        next: END_企業_変更_landline
      - match: "予約内容及び日程の確認"
        next: END_企業_確認_landline

  - step: 終話判定_個人_phone
    type: context_match_router
    reference_module: "phone_type"
    conditions:
      - match: "mobile"
        next: 終話判定_個人_mobile_cls
      - match: "landline"
        next: 終話判定_個人_landline_cls
      - match: "ip050"
        next: 終話判定_個人_landline_cls

  - step: 終話判定_個人_mobile_cls
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "新規予約"
        next: END_個人_新規_mobile
      - match: "変更"
        next: END_個人_変更_mobile
      - match: "予約内容及び日程の確認"
        next: END_個人_確認_mobile

  - step: 終話判定_個人_landline_cls
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "新規予約"
        next: END_個人_新規_landline
      - match: "変更"
        next: END_個人_変更_landline
      - match: "予約内容及び日程の確認"
        next: END_個人_確認_landline

  # ============================
  # 終話ブロック（正常終話: 企業×phone_type×classification = 6 個人×phone_type×classification = 6）
  # ============================
  - step: END_個人_新規_mobile
    type: termination
    termination_ref: "END_個人_新規_mobile"

  - step: END_個人_新規_landline
    type: termination
    termination_ref: "END_個人_新規_landline"

  - step: END_個人_変更_mobile
    type: termination
    termination_ref: "END_個人_変更_mobile"

  - step: END_個人_変更_landline
    type: termination
    termination_ref: "END_個人_変更_landline"

  - step: END_個人_確認_mobile
    type: termination
    termination_ref: "END_個人_確認_mobile"

  - step: END_個人_確認_landline
    type: termination
    termination_ref: "END_個人_確認_landline"

  - step: END_企業_新規_mobile
    type: termination
    termination_ref: "END_企業_新規_mobile"

  - step: END_企業_新規_landline
    type: termination
    termination_ref: "END_企業_新規_landline"

  - step: END_企業_変更_mobile
    type: termination
    termination_ref: "END_企業_変更_mobile"

  - step: END_企業_変更_landline
    type: termination
    termination_ref: "END_企業_変更_landline"

  - step: END_企業_確認_mobile
    type: termination
    termination_ref: "END_企業_確認_mobile"

  - step: END_企業_確認_landline
    type: termination
    termination_ref: "END_企業_確認_landline"

  # ============================
  # 終話ブロック（キャンセル単独）
  # ============================
  - step: END_キャンセル完了
    type: termination
    termination_ref: "END_キャンセル完了"

  # ============================
  # 終話ブロック（特殊: 代表案内系）
  # ============================
  - step: END_代表電話案内_3日以内
    type: termination
    termination_ref: "END_代表電話案内_3日以内"

  - step: END_代表電話案内_当日
    type: termination
    termination_ref: "END_代表電話案内_当日"

  - step: END_問い合わせ代表案内
    type: termination
    termination_ref: "END_問い合わせ代表案内"

  # ============================
  # 終話ブロック（異常系）
  # 非通知/時間外/聴取失敗は scaffold が自動生成するため scenario_flow には含めない
  # termination_patterns には定義（status/smsFlag/TTS を制御するため）
  # ============================

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # === 標準フィールド（itemDefault: true）===
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "新規予約"
      - order: "2"
        value: "変更"
      - order: "3"
        value: "キャンセル"
      - order: "4"
        value: "予約内容及び日程の確認"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。DTMF 1=新規予約, 2=変更, 3=キャンセル, 4=予約内容及び日程の確認。Gen2 function enum の空文字は Gen3 では未使用（リトライで処理）"

  - context_name: "patientName"
    context_name_jp: "受診者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "氏名聴取サブフローで聴取（カタカナ格納）。個人=受診者名、企業=担当者名。Gen2『企業の patientName は通話終了まで書き換えない』ルールはキャンセル_対象者聴取 を reason 直格納にすることで遵守"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "生年月日聴取サブフロー（復唱あり）で聴取。個人ルートのみ。Gen2『2900年代→1900年代補正』『数字4/5誤認救済』はサブフロー内プロンプトで処理"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "着信番号自動格納（Gen2 Incoming_phone_number 相当）"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "電話番号聴取サブフローで確定。Gen2 1.11 準拠（携帯/固定/050 判定 + 桁数バリデーション 3 回）"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - order: "1"
        value: "通話完了"
      - order: "2"
        value: "代表案内"
      - order: "6"
        value: "時間外"
      - order: "7"
        value: "非通知"
    item_default: true
    editable: true
    deletable: true
    notes: "1=通話完了 2=代表案内（予約不可含む） 6=時間外 7=非通知。Gen2 status=3（非通知）は Gen3 canonical では status=7 に置換。Gen2 status=0（途中切断）は Gen3 未使用"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

  # === 施設固有フィールド（itemDefault: false）===
  - context_name: "company_check"
    context_name_jp: "企業/個人区分"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業個人確認 hearing で saveTo。値: 企業 / 個人。以降のキャンセル判定_分岐、終話判定で Pattern B 参照"

  - context_name: "companyName"
    context_name_jp: "企業名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "企業ルートのみ。フリーテキスト（部署名含めて）。Gen2 function の『company name』（途中にスペース入り）は Gen3 では camelCase の companyName に正規化"

  - context_name: "course"
    context_name_jp: "受診希望コース"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "新規予約/変更/キャンセル ルートで使用。Gen2『検診/検針/返信/天候診断/返金控寸断→健康診断』『人間ロック/ドック/ロック/人間独→人間ドック』の類義語正規化は prompter 側 OpenAI プロンプトで処理。値: 健康診断 / 人間ドック / 乳がん・子宮がん検診のみ / 分からない"

  - context_name: "subsidyProvider"
    context_name_jp: "助成金提供者"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "新規予約かつ course=乳がん・子宮がん検診のみ の場合のみ聴取。市町村名 / 会社名 / その他 のフリーテキスト。Gen2『9番検査→子宮がん検査』『9体がん→子宮体がん』の語彙置換はプロンプトに反映"

  - context_name: "DesiredreservationDate"
    context_name_jp: "受診希望時期・人数"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "新規予約ルートのみ。フリーテキスト（人数+時期。例: 「1人、来月上旬」）。Gen2 function 名称を維持。日付でなく時期表現を許容するため display_type=TEXT（DATE ではない）"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "キャンセルルートのみ（キャンセル_現在予約日聴取）。YYYY-MM-DD 形式。変更ルートでは reservationDate は格納しない（変更_内容＝reason にまとめる）"

  - context_name: "reason"
    context_name_jp: "理由・内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更ルートでは変更・追加希望内容、企業×キャンセルルートではキャンセル対象者名。Gen2 の reason フィールドを第3世代でも踏襲（用途を文脈で使い分け）"

  - context_name: "phone_type"
    context_name_jp: "端末種別"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "mobile（携帯: 090/080/070/060）/ ip050（050）/ landline（その他固定）/ withheld（非通知 — 冒頭で弾くため終話判定到達なし）。電話番号聴取サブフロー内の incoming-classifier + saveContext2DB で確定。終話判定_{会社個人}_phone で参照"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # === サブフロー内聴取（静的コピー — サブフロー側で詳細定義）===
  - order: 1
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "氏名聴取サブフロー（復唱なし）。Gen2『復唱は生年月日のみ』に準拠。カタカナ変換。個人=受診者名、企業=担当者名の 2 箇所で呼び分け。リトライ上限到達時は patientName 未確定のまま次へスキップ"

  - order: 2
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "生年月日聴取サブフロー（復唱あり: DOB Re-confirmation）。和暦→西暦、2900 年代→1900 年代補正、数字 4/5 誤認救済（for/C/Sea→4、号/Go→5）はサブフロー内プロンプトで処理。個人ルートのみ"

  - order: 3
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 3
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "電話番号聴取サブフロー（復唱あり）。Gen2 1.11/1-4 準拠（携帯=090/080/070/060 判定、050=固定、それ以外=固定）。桁数バリデーション 3 回。数字 4/5 誤認救済。phone_type 確定（mobile/ip050/landline/withheld）"

  # === メインフロー聴取 ===
  - order: 4
    name: "予約日確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: ""
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "いいえ"
    notes: >
      「日曜・祝日を除き、本日より4日目以降に関するお問い合わせでよろしいですか？」の Yes/No 判定。
      Gen2 プロンプト『配当です→はい、そうです』の救済必須（prompter が OpenAI プロンプトに反映）。
      Gen2 条件 入力『いいえ,ちがいます,昨日,明日,今日』→ いいえ（3日以内扱い）→ END_代表電話案内_3日以内。
      回答保存先なし（分岐のみ、context 格納不要）。リトライ失敗 → END_聴取失敗

  - order: 5
    name: "企業個人確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "company_check"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "企業"
      - "個人"
    notes: >
      「企業のご担当者様ですか？「はい」か「いいえ」でお話しください」の Yes/No 判定。
      Gen2 企業判定キーワード『はい,そうです,担当者,医療機関,会社,スタッフ,団体,健保組合』→ 企業。
      個人判定キーワード『いいえ,ちがいます,一人,二人,5人,私,家族,夫,妻,母親,父親,友達,近所』→ 個人。
      デフォルト → 個人。『配当です→はい』救済必須。リトライ失敗 → END_聴取失敗

  - order: 6
    name: "企業名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "companyName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "企業ルートのみ。「お電話いただいた方の、企業名をお話ください」。部署名を含めてフリーテキスト格納。リトライ失敗 → END_聴取失敗"

  - order: 7
    name: "用件"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規予約"
      - "変更"
      - "キャンセル"
      - "予約内容及び日程の確認"
    notes: >
      DTMF 1=新規予約, 2=変更, 3=キャンセル, 4=予約内容及び日程の確認。
      Gen2 音声類義語: 『薬,お薬』→新規予約扱い、『取り直したい,取り直す,別の,変えたい,変える,変えて』→変更、『やめる,取り消し,取り消す,取消,やめたい』→キャンセル。
      数字誤認救済必須（for/C/Sea→4、号/Go→5）。リトライ失敗 → END_聴取失敗

  - order: 8
    name: "新規_希望コース"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "course"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "健康診断"
      - "人間ドック"
      - "乳がん・子宮がん検診のみ"
      - "分からない"
    notes: >
      新規予約ルートのみ。DTMF 1=健康診断, 2=人間ドック, 3=乳がん・子宮がん検診のみ。音声『分からない』も許容。
      Gen2 類義語: 『検診,検針,返信,天候診断,返金控寸断』→健康診断、『人間ロック,ドック,ロック,人間独』→人間ドック。
      Gen2『9番検査→子宮がん検査』『9体がん→子宮体がん』の置換は prompter で OpenAI プロンプトに反映。
      リトライ失敗 → END_聴取失敗

  - order: 9
    name: "新規_助成確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "subsidyProvider"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "新規予約かつ course=乳がん・子宮がん検診のみ の場合のみ。「市町村名 / 会社名 / その他」をフリーテキスト格納。リトライ失敗 → END_聴取失敗"

  - order: 10
    name: "新規_人数時期"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: "新規予約ルートのみ。「受診を希望される方の人数と、予約希望時期」をフリーテキスト格納。Gen2『ストーリー→1人』誤認救済は prompter で反映。直後の script『新規_当日判定』で『今日/着信日と同日』を検出して END_代表電話案内_当日 へ分岐"

  - order: 11
    name: "変更キャンセル_コース確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "course"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "健康診断"
      - "人間ドック"
      - "乳がん・子宮がん検診のみ"
      - "分からない"
    notes: >
      変更/キャンセル 共通。DTMF 1/2/3 + 音声『分からない』。用件=変更 の場合と 用件=キャンセル の場合の両方で呼ばれる。
      直後の ContextMatchRouter on classification で分岐（変更→変更_内容、キャンセル→キャンセル_現在予約日聴取）。
      Gen2 類義語規則は 新規_希望コース と同一。リトライ失敗 → END_聴取失敗

  - order: 12
    name: "変更_内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "text"
    output_labels: []
    notes: >
      変更ルートのみ。「変更や追加希望の内容について、簡潔にお話ください」。
      Gen2 プロンプトでは連絡先電話番号が携帯時のみ『終話後にお送りするSMSからも内容の変更や追加が可能です。』と付記するが、
      Gen3 ではこの分岐は終話 TTS の携帯/固定差分で吸収し、本 hearing TTS は固定文言に統一。リトライ失敗 → END_聴取失敗

  - order: 13
    name: "キャンセル_対象者聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: >
      企業×キャンセル のみ。「キャンセルされる方のお名前をお話しください。」
      Gen2『キャンセル者名を patientName に格納してはならない（企業担当者 patientName は保持）』に準拠し reason に格納。
      2 人以上の名前は全員 reason に格納（Gen2 仕様）。リトライ失敗 → END_聴取失敗

  - order: 14
    name: "キャンセル_現在予約日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: >
      キャンセルルートのみ。「現在の予約日を、お話ください」→ YYYY-MM-DD 形式。
      Gen2 ルール: 月日のみ発話→当年度補完、10 月以降に 1-9 月の日付→翌年扱い（prompter で OpenAI プロンプトに反映）。
      Gen2『当日予約→代表案内』は本フローでは新規予約ルートの新規_当日判定のみで実施。キャンセル側では過去日程でも受付（Gen2 仕様どおり）。
      リトライ失敗 → END_聴取失敗

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "予約日確認"
    tts_announcement: "日曜・祝日を除き、本日より4日目以降に関するお問い合わせでよろしいですか？「はい」か「いいえ」でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「そうです」「配当です」等の肯定"
          output: "はい"
        - input: "「いいえ」「ちがいます」「昨日」「明日」「今日」等の否定または近い日付"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: ""
    next_step: "はい→企業個人確認, いいえ→END_代表電話案内_3日以内"
    retry_failure: "end_failure"

  - step_name: "企業個人確認"
    tts_announcement: "お電話いただいている方は、企業のご担当者様ですか？「はい」か「いいえ」でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "企業"
        - "個人"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「そうです」「担当者」「医療機関」「会社」「スタッフ」「団体」「健保組合」「配当です」等"
          output: "企業"
        - input: "「いいえ」「ちがいます」「一人」「二人」「5人」「私」「家族」「夫」「妻」「母親」「父親」「友達」「近所」等"
          output: "個人"
        - input: "上記いずれにも該当しない（曖昧応答）"
          output: "個人"
      no_result_condition: "音声認識結果が空"
    save_to: "company_check"
    next_step: "企業→企業名, 個人→氏名聴取"
    retry_failure: "end_failure"

  - step_name: "企業名"
    tts_announcement: "お電話いただいた方の、企業名をお話ください"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
        - "NO_RESULT"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（部署名含めて格納）"
        - input: "音声認識結果が空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "companyName"
    next_step: "企業_担当者名（jump_氏名聴取）"
    retry_failure: "end_failure"

  - step_name: "用件"
    tts_announcement: "ご用件を、次の4つのいずれかでお話ください。「新規予約お申込の方は1を」「予約内容の変更の方は2を」「予約キャンセルの方は3を」「予約内容及び日程の確認は4を」、それではお話ください。<dtmf digit=\"1\"/>"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "新規予約"
        - "変更"
        - "キャンセル"
        - "予約内容及び日程の確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「新規」「予約」「薬」「お薬」等の新規予約を示す発話"
          output: "新規予約"
        - input: "DTMF 2 または「変更」「取り直したい」「取り直す」「別の」「変えたい」「変える」「変えて」等"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「やめる」「取り消し」「取り消す」「取消」「やめたい」等"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」「問い合わせ」等の確認関連"
          output: "予約内容及び日程の確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "DTMF・音声ともに判別不能"
    save_to: "classification"
    next_step: "1→新規_希望コース, 2→変更キャンセル_コース確認, 3→キャンセル判定_分岐, 4→終話判定"
    retry_failure: "end_failure"

  - step_name: "新規_希望コース"
    tts_announcement: "ご希望のコースを教えてください。「健康診断をご希望の方は1を」、「人間ドックをご希望の方は2を」、「乳がん・子宮がん検診のみをご希望の方は3を」、分からない場合は、「分からない」とお話ください。<dtmf digit=\"1\"/>"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "健康診断"
        - "人間ドック"
        - "乳がん・子宮がん検診のみ"
        - "分からない"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「健康診断」「検診」「検針」「返信」「天候診断」「返金控寸断」等"
          output: "健康診断"
        - input: "DTMF 2 または「人間ドック」「人間ロック」「ドック」「ロック」「人間独」等"
          output: "人間ドック"
        - input: "DTMF 3 または「乳がん」「子宮がん」「9番検査」「9体がん」を含む発話"
          output: "乳がん・子宮がん検診のみ"
        - input: "「分からない」「わからない」「不明」等"
          output: "分からない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "DTMF・音声ともに判別不能"
    save_to: "course"
    next_step: "乳がん・子宮がん検診のみ→新規_助成確認, その他→新規_人数時期"
    retry_failure: "end_failure"

  - step_name: "新規_助成確認"
    tts_announcement: "お住いの市町村の助成制度をご利用の場合は市町村名を、企業からの予約の場合は会社名を、どちらでもない方はその他 とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "市町村名または会社名"
        - "その他"
        - "NO_RESULT"
      mapping:
        - input: "市町村名（例: 茨城県つくば市）"
          output: "市町村名（フリーテキスト）"
        - input: "会社名・事業所名"
          output: "会社名（フリーテキスト）"
        - input: "「その他」「どちらでもない」等"
          output: "その他"
        - input: "音声認識結果が空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "subsidyProvider"
    next_step: "新規_人数時期"
    retry_failure: "end_failure"

  - step_name: "新規_人数時期"
    tts_announcement: "受診を希望される方の人数と、予約希望時期を、お話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
        - "NO_RESULT"
      mapping:
        - input: "人数+時期の発話（例: 「1人で来月上旬」「3名で5月中旬」）"
          output: "フリーテキスト（そのまま格納）"
        - input: "「ストーリー」「1人」の誤認識→「1人」補正"
          output: "補正後のフリーテキスト"
        - input: "音声認識結果が空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "DesiredreservationDate"
    next_step: "新規_当日判定（script）"
    retry_failure: "end_failure"

  - step_name: "新規_当日判定"
    tts_announcement: ""
    input_method: "script"
    openai_rules:
      output_values:
        - "今日"
        - "default"
      mapping:
        - input: "新規_人数時期の格納値に「今日」「本日」を含む、または着信日時と同じ日付表現"
          output: "今日"
        - input: "その他"
          output: "default"
      no_result_condition: ""
    save_to: ""
    next_step: "今日→END_代表電話案内_当日, default→終話判定"
    retry_failure: "skip"

  - step_name: "変更キャンセル_コース確認"
    tts_announcement: "現在ご予約されているコースを教えてください。「健康診断の方は1を」、「人間ドックの方は2を」、「乳がん・子宮がん検診のみの方は3を」、分からない場合は、「分からない」とお話ください。<dtmf digit=\"1\"/>"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "健康診断"
        - "人間ドック"
        - "乳がん・子宮がん検診のみ"
        - "分からない"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「健康診断」系の類義語"
          output: "健康診断"
        - input: "DTMF 2 または「人間ドック」系の類義語"
          output: "人間ドック"
        - input: "DTMF 3 または「乳がん・子宮がん」系"
          output: "乳がん・子宮がん検診のみ"
        - input: "「分からない」等"
          output: "分からない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "DTMF・音声ともに判別不能"
    save_to: "course"
    next_step: "変更キャンセル_分岐（ContextMatchRouter on classification: 変更→変更_内容, キャンセル→キャンセル_現在予約日聴取）"
    retry_failure: "end_failure"

  - step_name: "変更_内容"
    tts_announcement: "変更や追加希望の内容について、簡潔にお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
        - "NO_RESULT"
      mapping:
        - input: "変更内容の発話"
          output: "フリーテキスト（そのまま格納。復唱禁止）"
        - input: "音声認識結果が空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "終話判定"
    retry_failure: "end_failure"

  - step_name: "キャンセル_対象者聴取"
    tts_announcement: "キャンセルされる方のお名前をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "氏名テキスト"
        - "NO_RESULT"
      mapping:
        - input: "1 名の氏名発話"
          output: "カタカナ氏名を reason に格納"
        - input: "2 名以上の氏名発話"
          output: "全員分の氏名を reason に改行区切りで格納（Gen2 仕様）"
        - input: "音声認識結果が空"
          output: "NO_RESULT"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "変更キャンセル_コース確認"
    retry_failure: "end_failure"

  - step_name: "キャンセル_現在予約日聴取"
    tts_announcement: "現在の予約日を、お話ください"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "YYYY-MM-DD 形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "日付表現（月日のみ→当年度補完、10 月以降の 1-9 月→翌年）"
          output: "YYYY-MM-DD 形式"
        - input: "認識不能・曖昧な回答"
          output: "NO_RESULT"
      no_result_condition: "日付として認識できない"
    save_to: "reservationDate"
    next_step: "END_キャンセル完了"
    retry_failure: "end_failure"

# --- セクション8: 終話パターン ---
termination_patterns:
  # === 異常系（デフォルト必須 — 削除禁止）===
  - name: "END_非通知"
    condition: "非通知着信（incoming-classifier withheld）"
    tts_announcement: "お電話ありがとうございます。つくばトータルヘルスプラザの、予約専用、AI電話です。申し訳ございません。電話番号が非通知設定の場合、AI電話では受付できません。先頭に数字の186を付けるか、通知のできる電話からおかけなおしください。お電話ありがとうございました。"
    status: "7"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、代表電話の0298643588におかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # === 特殊・代表案内系 ===
  - name: "END_代表電話案内_3日以内"
    condition: "予約日確認=いいえ（3日以内の問い合わせ）"
    tts_announcement: "大変申し訳ございません。日曜・祝日を除き、本日より3日目以内に関するお問い合わせはAI電話では承っておりません。恐れ入りますが、この後ご案内をする代表電話にお問い合わせください。番号をご案内しますのでメモをご準備下さい。<break time=\"500ms\"/>番号は<speak type=\"telephone\" breakc=\"100ms\">0298643588</speak>です。<break time=\"500ms\"/>番号は<speak type=\"telephone\" breakc=\"100ms\">0298643588</speak>です。<break time=\"500ms\"/>番号は<speak type=\"telephone\" breakc=\"100ms\">0298643588</speak>です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表電話案内_3日以内"

  - name: "END_代表電話案内_当日"
    condition: "新規予約で予約希望日が着信日と同日（新規_当日判定=今日）"
    tts_announcement: "当日のご予約についてはAI電話ではご対応できませんので、代表電話の<speak type=\"telephone\" breakc=\"100ms\">0298643588</speak>におかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_代表電話案内_当日"

  - name: "END_問い合わせ代表案内"
    condition: "用件で適切な値が得られない（予約以外の問い合わせ想定）"
    tts_announcement: "大変申し訳ございません。予約以外に関するお問い合わせはAI電話では承っておりません。恐れ入りますが、この後ご案内する代表電話におかけ直しください。番号をご案内しますのでメモをご準備下さい。<break time=\"500ms\"/>番号は<speak type=\"telephone\" breakc=\"100ms\">0298643588</speak>です。<break time=\"500ms\"/>番号は<speak type=\"telephone\" breakc=\"100ms\">0298643588</speak>です。<break time=\"500ms\"/>番号は<speak type=\"telephone\" breakc=\"100ms\">0298643588</speak>です。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_問い合わせ代表案内"

  # === 正常系: キャンセル完了（phone_type 非依存の単独文言）===
  - name: "END_キャンセル完了"
    condition: "キャンセル_現在予約日聴取 完了"
    tts_announcement: "キャンセルを受付いたしました。必要がある場合のみ、担当者よりご連絡いたします。お電話ありがとうございました。"
    status: "1"
    sms_flag: "4"
    completion_flag_name: "完了フラグ_キャンセル完了"

  # === 正常系: 個人 × 用件 × phone_type（6 パターン）===
  - name: "END_個人_新規_mobile"
    condition: "company_check=個人, classification=新規予約, phone_type=mobile"
