  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取。携帯/固定 判定後 phonetype に種別を保存。"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "転送"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: false
    notes: "1=未処理（正常終話）、2=代表案内（非通知/聴取失敗）、6=時間外（24時間ボットだがテンプレ準拠で残す）"

  - context_name: "dateOfCall"
    context_name_jp: "入電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: ""

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "NUMBER"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "システム固定値"

  # 施設固有フィールド（itemDefault: false）
  - context_name: "desiredPeriod"
    context_name_jp: "受診希望時期"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "用件=予約 の場合のみ聴取。Gen1「予約希望日.yaml」相当。「来月上旬」「ありません」等の自由テキスト。日付パース不要。"

  - context_name: "lastQuestion"
    context_name_jp: "お伝えになりたいこと"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: false
    notes: "全用件共通の最終聴取項目。Gen1「最後の質問.yaml」相当。「ありません」「特になし」等を含む自由テキスト。"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "変更"
      - "キャンセル"
      - "予約"
      - "確認"
    notes: "DTMF 1=変更, 2=キャンセル, 3=予約, 4=確認。DTMF と音声を並行受付。「もしもし」誤検知排除を OpenAI プロンプトで実施。"

  - order: 2
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: true
    save_to: "clinicalDepartment"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "一般外科"
      - "外科"
      - "感染症内科"
      - "形成外科"
      - "血液内科"
      - "呼吸器外科"
      - "呼吸器内科"
      - "循環器内科"
      - "消化器外科"
      - "消化器内科"
      - "心臓血管外科"
      - "腎臓内科"
      - "整形外科"
      - "精神科"
      - "総合内科"
      - "糖尿病リウマチ科"
      - "内科"
      - "乳腺外科"
      - "脳神経外科"
      - "脳神経内科"
      - "泌尿器科"
      - "皮膚科"
    notes: "no_result_default: 登録なし。Gen1 二段聴取（呼吸器→内科/外科 等）は OpenAI プロンプトで吸収。"

  - order: 3
    name: "予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "用件=変更/キャンセル の場合のみ通る。DTMF MMDD 4桁。比較日より前なら +1 年確定（OpenAI プロンプトで実装）。"

  - order: 4
    name: "予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "desiredPeriod"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "用件=予約 の場合のみ通る。「来月上旬」「ありません」等の自由テキスト。日付パース不要。"

  - order: 5
    name: "キャンセル理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "用件=キャンセル の場合のみ通る。「特にない」を許容する自由テキスト。"

  - order: 6
    name: "確認内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "用件=確認 の場合のみ通る。reason context をキャンセル理由と共用（同時に通らない）。"

  - order: 7
    name: "最後の質問"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 1
    echo_back: false
    save_to: "lastQuestion"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "全用件共通の最終聴取。「ありません」「特になし」等を含む自由テキスト。"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の4つのうちの、いずれかでお話ください。1.変更、2.キャンセル、3.診察予約、4.予約確認、それでは、お話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "予約"
        - "確認"
      mapping:
        - input: "DTMF 1 / 「変更」「予約の変更」「日程変更」「日付変更」「延期」「取り直す」「変え」 等"
          output: "変更"
        - input: "DTMF 2 / 「キャンセル」「やめる」「取り消す」「取消」「予約のキャンセル」 等"
          output: "キャンセル"
        - input: "DTMF 3 / 「診察予約」「診療予約」「予約する」「予約をとる」「初診」「再診」「受診」「撮りたい」 等"
          output: "予約"
        - input: "DTMF 4 / 「予約確認」「お聞きしたい」「教えて」「調べて」「予約票」「忘れた」「紛失」 等"
          output: "確認"
        - input: "「もしもし」"
          output: "NO_RESULT（誤検知排除）"
      no_result_condition: "上記いずれにも該当しない、または「もしもし」のみ"
    save_to: "classification"
    next_step: "用件_次へ"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "診療科"
    tts_announcement: "診療科をお話下さい。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "一般外科"
        - "外科"
        - "感染症内科"
        - "形成外科"
        - "血液内科"
        - "呼吸器外科"
        - "呼吸器内科"
        - "循環器内科"
        - "消化器外科"
        - "消化器内科"
        - "心臓血管外科"
        - "腎臓内科"
        - "整形外科"
        - "精神科"
        - "総合内科"
        - "糖尿病リウマチ科"
        - "内科"
        - "乳腺外科"
        - "脳神経外科"
        - "脳神経内科"
        - "泌尿器科"
        - "皮膚科"
      mapping:
        - input: "「呼吸器内科」相当の発話"
          output: "呼吸器内科"
        - input: "「呼吸器外科」相当の発話"
          output: "呼吸器外科"
        - input: "「呼吸器」のみ（内科/外科の区別なし）"
          output: "NO_RESULT（再聴取で内科/外科を確定）"
        - input: "「消化器」のみ（内科/外科の区別なし）"
          output: "NO_RESULT"
        - input: "「脳神経」のみ（内科/外科の区別なし）"
          output: "NO_RESULT"
        - input: "「糖尿病・リウマチ科」「リウマチ科」「糖尿病」"
          output: "糖尿病リウマチ科"
      no_result_condition: "親エンティティのみ（呼吸器/消化器/脳神経）または上記診療科いずれにも該当しない"
    save_to: "clinicalDepartment"
    next_step: "診療科_次へ"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約日"
    tts_announcement: "予約票に記載されている予約日を、「4月1日」のように日付でおっしゃってください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values: []
      mapping:
        - input: "「4月1日」「4月の1日」「来月の15日」 等の日付発話"
          output: "YYYY-MM-DD（比較日より前なら +1 年）"
        - input: "DTMF 4 桁（MMDD）。例: 「0510」"
          output: "YYYY-05-10（比較日より前なら +1 年）"
      no_result_condition: "日付として解釈できない発話"
    save_to: "reservationDate"
    next_step: "予約日_次へ"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約希望日"
    tts_announcement: "受診を希望されている時期をお話ください。希望がなければ、ありません、のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "「来月上旬」「来週中」「ありません」「特にない」 等の自由発話"
          output: "（発話内容をそのまま保存）"
      no_result_condition: "（text 型のため OpenAI 不要）"
    save_to: "desiredPeriod"
    next_step: "連絡先_前置き"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "キャンセル理由"
    tts_announcement: "差し支えなければ、キャンセルの理由をお話ください。特に理由がない場合は、「特にない」、のようにお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "（自由発話）"
          output: "（発話内容をそのまま保存）"
      no_result_condition: "（text 型のため OpenAI 不要）"
    save_to: "reason"
    next_step: "連絡先_前置き"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "確認内容"
    tts_announcement: "ご確認内容について、簡潔にお話下さい。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "（自由発話）"
          output: "（発話内容をそのまま保存）"
      no_result_condition: "（text 型のため OpenAI 不要）"
    save_to: "reason"
    next_step: "連絡先_前置き"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "最後の質問"
    tts_announcement: "当院にお伝えになりたいことがあればお話ください。特になければ「ありません。」とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "（自由発話）"
          output: "（発話内容をそのまま保存）"
      no_result_condition: "（text 型のため OpenAI 不要）"
    save_to: "lastQuestion"
    next_step: "完了フラグ_用件確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"
  - name: "END_時間外"
    condition: "受付時間外（24時間受付のため通常は到達しないがテンプレ準拠で残す）"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"
  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系: 携帯ルート（SMS 送信あり）---
  - name: "END_変更_携帯"
    condition: "用件=変更 かつ phonetype=携帯"
    tts_announcement: "予約変更の申し込みを受付いたしました。後ほど、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更_携帯"
  - name: "END_キャンセル_携帯"
    condition: "用件=キャンセル かつ phonetype=携帯"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。後ほど、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_キャンセル_携帯"
  - name: "END_予約_携帯"
    condition: "用件=予約 かつ phonetype=携帯"
    tts_announcement: "診察予約の申し込みを受付いたしました。後ほど、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約_携帯"
  - name: "END_確認_携帯"
    condition: "用件=確認 かつ phonetype=携帯"
    tts_announcement: "予約確認について、お問い合わせを受付いたしました。後ほど、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_確認_携帯"

  # --- 正常系: 固定/その他ルート（SMS 送信なし）---
  - name: "END_変更_固定"
    condition: "用件=変更 かつ phonetype=その他"
    tts_announcement: "予約変更の申し込みを受付いたしました。後ほど、担当者から折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_変更_固定"
  - name: "END_キャンセル_固定"
    condition: "用件=キャンセル かつ phonetype=その他"
    tts_announcement: "予約キャンセルの申し込みを受付いたしました。後ほど、担当者から折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_キャンセル_固定"
  - name: "END_予約_固定"
    condition: "用件=予約 かつ phonetype=その他"
    tts_announcement: "診察予約の申し込みを受付いたしました。後ほど、担当者から折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_予約_固定"
  - name: "END_確認_固定"
    condition: "用件=確認 かつ phonetype=その他"
    tts_announcement: "予約確認について、お問い合わせを受付いたしました。後ほど、担当者から折り返し電話にてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_確認_固定"

# smsFlag 分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "phonetype"
    - "classification"
  patterns:
    - condition: "phonetype=携帯（4 用件すべて）"
      sms_flag: "1"
      notes: "携帯ルート 4 終話: SMS 送信あり"
    - condition: "phonetype=その他（4 用件すべて）"
      sms_flag: "-1"
      notes: "固定/その他ルート 4 終話: SMS 送信なし"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "none"
  inquiry_insertion_point: ""
  pre_termination: false

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  - module_name: "冒頭_アナウンス"
    purpose: "施設名案内＋折り返し連絡確定の案内＋用件聴取への導入"
    announcement: "お電話ありがとうございます。近森病院の予約に関するAI電話です。このお電話で承る内容は、担当者からの折り返しのご連絡により、確定となります。まず初めに、"

  - module_name: "用件確認"
