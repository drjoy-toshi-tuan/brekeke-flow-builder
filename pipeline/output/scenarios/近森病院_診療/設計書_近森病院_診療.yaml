# 設計書 — 近森病院 診療
# 生成元: @director エージェント
# 生成日: 2026-05-01
# 作業種別: Gen1→Gen3 移管
# 元資料: commubo抽出/【046】近森病院/【0048近森病院】診療1_M_本番/
# 確認レポート: output/scenarios/近森病院_診療/確認レポート_近森病院_診療_20260501.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "近森病院"
  scenario_name: "診療"
  group_name: "近森病院"
  flow_name: "近森病院$診療"
  target_facility: "近森病院（本院）"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "24時間受付（時間帯判定なし）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "近森病院$診療"
      role: "main"
      description: "予約・予約変更・予約キャンセル・予約確認の4用件を24時間受付し、用件×電話種別で8通りの終話に振り分けるメインフロー"
  subflows:
    - name: "近森病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "受診される方のフルネーム聴取。PatientName サブフロー1枠。"
    - name: "近森病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 内蔵。元号判定はサブフローテンプレ任せ。"
    - name: "近森病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "incoming-classifier で携帯/固定/その他を3分岐。phonetype に「携帯」または「その他」を保存して返却。"
    - name: "近森病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "8桁番号（音声+DTMF）。「わからない」分岐ありはサブフローテンプレ任せ。"

# --- セクション3: フローの目的 ---
purpose: |
  近森病院に予約関連の電話をかけてきた患者に対し、用件（変更/キャンセル/予約/確認）・診察券番号・受診者名・生年月日・診療科・予約日（変更/キャンセル時）・予約希望時期（新規予約時）・キャンセル理由（キャンセル時）・確認内容（確認時）・連絡先電話番号・最後に伝えたいことを順次聴取し、Dr.JOYに登録して担当者からの折り返し連絡につなぐ。24時間受付。携帯/固定の電話種別に応じてSMS送信あり/なしの2系統で終話する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "近森病院$診療"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → END_非通知 → 切断
            └─ 通常   → 冒頭_アナウンス
                          → 用件確認(hearing/enum/echo_back)   ※DTMF 1=変更, 2=キャンセル, 3=予約, 4=確認
                              ↓
                          用件_次へ → 診察券番号聴取(subflow)
                              → 診察券_次へ → 氏名聴取(subflow)
                                  → 氏名_次へ → 生年月日聴取(subflow)
                                      → 生年月日_次へ → 診療科(hearing/enum/echo_back/no_result_default=登録なし)
                                          → 診療科_次へ → 用件分岐_主(CMR: OpenAI_用件確認)
                                              ├─ 変更      → 予約日(hearing/datetime/echo_back)
                                              │                ↓
                                              │           予約日_次へ → 用件分岐_予約日後(CMR: OpenAI_用件確認)
                                              │                ├─ キャンセル → キャンセル理由(hearing/text)
                                              │                └─ other(=変更) ────────────────┐
                                              ├─ キャンセル → 予約日 → 予約日_次へ → 用件分岐_予約日後   │
                                              │                                                    │
                                              ├─ 予約     → 予約希望日(hearing/text) ──────────┤
                                              └─ other(=確認) → 確認内容(hearing/text) ─────────┤
                                                                                                  ↓
                                                                                          連絡先_前置き
                                                                                                  ↓
                                                                                      連絡先電話番号聴取(subflow)
                                                                                                  ↓
                                                                                            接続詞_最後
                                                                                                  ↓
                                                                                  最後の質問(hearing/text)
                                                                                                  ↓
                                                                                        完了フラグ_用件確認
                                                                                                  ↓
                                                                              携帯電話番号チェック(CMR: 電話番号聴取)
                                                                              ├─ 携帯 → 用件分岐_携帯(CMR: OpenAI_用件確認)
                                                                              │            ├─ 変更      → END_変更_携帯
                                                                              │            ├─ キャンセル → END_キャンセル_携帯
                                                                              │            ├─ 予約     → END_予約_携帯
                                                                              │            └─ other(=確認) → END_確認_携帯
                                                                              └─ other(=その他/固定) → 用件分岐_固定(CMR: OpenAI_用件確認)
                                                                                           ├─ 変更      → END_変更_固定
                                                                                           ├─ キャンセル → END_キャンセル_固定
                                                                                           ├─ 予約     → END_予約_固定
                                                                                           └─ other(=確認) → END_確認_固定
    notes: |
      - 24時間受付ボットのため acceptance_times は使用しない（use_acceptance_times: false）
      - 用件分岐 CMR は 3 箇所（用件分岐_主 / 用件分岐_予約日後 / 用件分岐_携帯 / 用件分岐_固定）
      - 「最後の質問」（伝えたいこと）後に completion flag → 携帯電話番号チェック CMR で 8 通りに振り分け
      - 終話 8 通り: 4 用件 × 携帯/固定 = SMS 送信あり/なしで文言が変わる

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:

  # ===== 冒頭ブロック（opening + announcement の 2 ブロック 1 セット）=====
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # ===== 用件確認（DTMF 1-4 + 音声、復唱あり、4 分岐）=====
  - step: 用件確認
    type: hearing
    stt_type: DTMF_AmiVoice
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: classification
    output_format: enum
    output_labels:
      - "変更"
      - "キャンセル"
      - "予約"
      - "確認"
    conditions:
      - match: "変更"
        next: 用件_次へ
      - match: "キャンセル"
        next: 用件_次へ
      - match: "予約"
        next: 用件_次へ
      - match: "other"
        next: 用件_次へ
    notes: "DTMF 1=変更, 2=キャンセル, 3=予約, 4=確認。DTMF と音声を並行受付。「もしもし」誤検知排除を OpenAI プロンプトで実施（prompter 担当）。"

  - step: 用件_次へ
    type: announcement
    next: 診察券番号聴取

  # ===== 診察券番号聴取（サブフロー）=====
  - step: 診察券番号聴取
    type: subflow
    flowname: "近森病院$診察券番号聴取"
    next: 診察券_次へ

  - step: 診察券_次へ
    type: announcement
    next: 氏名聴取

  # ===== 受診者名聴取（PatientName サブフロー）=====
  - step: 氏名聴取
    type: subflow
    flowname: "近森病院$氏名聴取"
    next: 氏名_次へ

  - step: 氏名_次へ
    type: announcement
    next: 生年月日聴取

  # ===== 生年月日聴取（サブフロー、復唱内蔵）=====
  - step: 生年月日聴取
    type: subflow
    flowname: "近森病院$生年月日聴取"
    next: 生年月日_次へ

  - step: 生年月日_次へ
    type: announcement
    next: 診療科

  # ===== 診療科聴取（enum、復唱あり、no_result→「登録なし」）=====
  - step: 診療科
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 2
    echo_back: true
    no_result_default: "登録なし"
    save_to: clinicalDepartment
    output_format: enum
    output_labels:
      - "一般外科"
      - "外科"
      - "感染症内科"
      - "形成外科"
      - "血液内科"
      - "呼吸器外科"
      - "呼吸器内科"
      - "循環器内科"
      - "消化器外科"
      - "消化器内科"
      - "心臓血管外科"
      - "腎臓内科"
      - "整形外科"
      - "精神科"
      - "総合内科"
      - "糖尿病リウマチ科"
      - "内科"
      - "乳腺外科"
      - "脳神経外科"
      - "脳神経内科"
      - "泌尿器科"
      - "皮膚科"
    conditions:
      - match: "other"
        next: 診療科_次へ
    notes: |
      Gen1 の二段聴取（「呼吸器」だけ発話されたら「内科か外科か」を再聴取）は OpenAI プロンプトで吸収する。
      呼吸器/消化器/脳神経 のみ発話され内科/外科が特定できない場合は NO_RESULT とし、リトライへ。
      Gen1 の「糖尿病・リウマチ科変換」は中黒なし「糖尿病リウマチ科」に統一済み（output_labels と一致）。
      profile_words は entity_classification.md / entity_stt_patch.json の自動取り込みに任せる。

  - step: 診療科_次へ
    type: announcement
    next: 用件分岐_主

  # ===== 用件分岐_主（用件で 3 ルートに分岐）=====
  - step: 用件分岐_主
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: 予約日
      - match: "キャンセル"
        next: 予約日
      - match: "予約"
        next: 予約希望日
      - match: "other"  # = 確認
        next: 確認内容

  # ===== 予約日（変更/キャンセル時のみ。datetime、復唱あり）=====
  - step: 予約日
    type: hearing
    stt_type: DTMF_AmiVoice
    dtmf_max_length: 4
    retry_count: 2
    echo_back: true
    save_to: reservationDate
    output_format: datetime
    next: 予約日_次へ
    notes: |
      DTMF 4 桁（MMDD）対応。比較日より前なら +1 年で確定（OpenAI プロンプトで実装）。
      Gen1 の元号判定（大正/昭和/平成/令和）は予約日で実質使われていなかったため省略。
      DTMF: 月 2 桁 + 日 2 桁。例: "0510" → "5月10日"

  - step: 予約日_次へ
    type: announcement
    next: 用件分岐_予約日後

  # ===== 用件分岐_予約日後（変更ならそのまま連絡先、キャンセルなら理由聴取）=====
  - step: 用件分岐_予約日後
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "キャンセル"
        next: キャンセル理由
      - match: "other"  # = 変更（残りはここしか来ない）
        next: 連絡先_前置き
    notes: "Gen1 では 用件を判断_3 のデフォルトが「予約希望日」になっていて変更ルートが誤誘導されていた（移管ノートで「director が修正」と明記）。Gen3 では変更→連絡先へ直行と修正済み。"

  # ===== キャンセル理由（キャンセル時のみ、自由テキスト）=====
  - step: キャンセル理由
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: reason
    output_format: text
    next: 連絡先_前置き
    notes: '発話: 「差し支えなければ、キャンセルの理由をお話ください。特に理由がない場合は、「特にない」、のようにお話ください。」'

  # ===== 予約希望日（新規予約時のみ、自由テキスト）=====
  - step: 予約希望日
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: desiredPeriod
    output_format: text
    next: 連絡先_前置き
    notes: '発話: 「受診を希望されている時期をお話ください。希望がなければ、ありません、のようにお話ください。」 日付パース不要、自由テキストで保存。'

  # ===== 確認内容（確認用件時のみ、自由テキスト）=====
  - step: 確認内容
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: reason
    output_format: text
    next: 連絡先_前置き
    notes: '発話: 「ご確認内容について、簡潔にお話下さい。」 reason context にキャンセル理由と共用（同時に通らないため衝突なし）。'

  # ===== 連絡先聴取前の接続文 =====
  - step: 連絡先_前置き
    type: announcement
    next: 連絡先電話番号聴取

  # ===== 連絡先電話番号聴取（サブフロー、phonetype を保存）=====
  - step: 連絡先電話番号聴取
    type: subflow
    flowname: "近森病院$電話番号聴取"
    next: 接続詞_最後

  # ===== 最後の質問への接続文 =====
  - step: 接続詞_最後
    type: announcement
    next: 最後の質問

  # ===== 最後の質問（伝えたいこと、自由テキスト）=====
  - step: 最後の質問
    type: hearing
    stt_type: AmiVoice_STT
    retry_count: 1
    echo_back: false
    save_to: lastQuestion
    output_format: text
    next: 完了フラグ_用件確認
    notes: '発話: 「当院にお伝えになりたいことがあればお話ください。特になければ「ありません。」とお話ください。」'

  # ===== 完了フラグ前の接続文 =====
  - step: 完了フラグ_用件確認
    type: announcement
    next: 携帯電話番号チェック

  # ===== 携帯電話番号チェック（電話番号聴取サブフローの phonetype で分岐）=====
  - step: 携帯電話番号チェック
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: 用件分岐_携帯
      - match: "other"  # = その他/固定
        next: 用件分岐_固定
    notes: "電話番号聴取サブフロー（subflow ステップ名）が phonetype context に「携帯」または「その他」を保存する仕様。"

  # ===== 用件分岐_携帯（携帯ルート、4 用件 × 終話）=====
  - step: 用件分岐_携帯
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: END_変更_携帯
      - match: "キャンセル"
        next: END_キャンセル_携帯
      - match: "予約"
        next: END_予約_携帯
      - match: "other"  # = 確認
        next: END_確認_携帯

  # ===== 用件分岐_固定（固定/その他ルート、4 用件 × 終話）=====
  - step: 用件分岐_固定
    type: context_match_router
    reference_module: "OpenAI_用件確認"
    conditions:
      - match: "変更"
        next: END_変更_固定
      - match: "キャンセル"
        next: END_キャンセル_固定
      - match: "予約"
        next: END_予約_固定
      - match: "other"  # = 確認
        next: END_確認_固定

  # ===== 終話 8 通り =====
  - step: END_変更_携帯
    type: termination
    termination_ref: "END_変更_携帯"
  - step: END_キャンセル_携帯
    type: termination
    termination_ref: "END_キャンセル_携帯"
  - step: END_予約_携帯
    type: termination
    termination_ref: "END_予約_携帯"
  - step: END_確認_携帯
    type: termination
    termination_ref: "END_確認_携帯"
  - step: END_変更_固定
    type: termination
    termination_ref: "END_変更_固定"
  - step: END_キャンセル_固定
    type: termination
    termination_ref: "END_キャンセル_固定"
  - step: END_予約_固定
    type: termination
    termination_ref: "END_予約_固定"
  - step: END_確認_固定
    type: termination
    termination_ref: "END_確認_固定"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
