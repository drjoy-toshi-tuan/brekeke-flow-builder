# --- セクション11: 特記事項・制約 ---
special_notes:
  - "24 時間受付ボット。営業時間チェック（acceptance_times）は使用しない（use_acceptance_times: false）。"
  - "Gen1 の 4/22 稼働開始日付ガード（END_営業前 → 「4 月 X 日、朝 8 時半より利用開始」案内）は、移管時点で既に稼働済みのため Gen3 では削除済み。"
  - "Gen1 の 24h稼働:稼働前その他例外休業時対策 サブシナリオは廃止。祝日チェックは Customer Doc に運用要件として記載がないため、本フローには組み込まない（必要なら後日 director 経由で追加）。"
  - "用件 4 種 × 電話種別（携帯/固定）= 8 通りの正常終話。携帯のみ SMS 送信（smsFlag=1）、固定/その他は SMS なし（smsFlag=-1）。"
  - "Gen1 の 用件を判断_3 箱は、変更ルートが誤って予約希望日に流れるバグがあった（移管ノート記載）。Gen3 では用件分岐_予約日後 CMR で「キャンセル → キャンセル理由」「変更 → 連絡先へ直行」と正しく分岐させる。"
  - "Gen1 の診療科二段聴取（呼吸器/消化器/脳神経 → 内科/外科）は、Gen3 では OpenAI プロンプトで吸収する方針。親エンティティのみ発話された場合は NO_RESULT を返してリトライへ流す。"
  - "Gen1 の「糖尿病・リウマチ科変換」は、Gen3 では中黒なしの「糖尿病リウマチ科」に統一済み。OpenAI プロンプトの output 値・ContextField の rangeValues とも一致させる。"
  - "Gen1 用件聞き取りサブの「もしもし」誤検知排除（countもしもし リトライ）は、Gen3 では OpenAI プロンプト内のルール（「もしもし」のみは NO_RESULT を返す）で吸収する。"
  - "用件確認 / 診療科 / 予約日 の echo_back（復唱）文言は scaffold のデフォルト「#data# でよろしいですか?」を使用。Gen1 では用件 4 種で復唱文言が個別だったが、Gen3 では統一。"
  - "受診者名は患者氏名と異なる場合がある（受診される方のフルネーム）が、Gen3 では PatientName サブフロー 1 枠に充当。save_to: patientName。"
  - "reason context は「キャンセル理由」と「確認内容」で共用する（用件分岐により同時には通らない）。Dr.JOY 画面では classification と組み合わせて意味を識別する。"
  - "予約希望日（用件=予約）は自由テキスト保存（desiredPeriod）。日付パース不要。「ありません」も許容。"
  - "個人情報サブフロー（氏名/生年月日/電話番号/診察券番号）は docs/reference/bivr/samples/個人情報サブフロー.bivr の完全コピー方針（CLAUDE.md Rule 9）。サブフロー内部のモジュール構成は本設計書では記述しない。"
  - "AmiVoice 辞書（profile_words）は entity_stt_patch.json から scaffold が自動取り込み。OpenAI 類義語は entity_openai_synonyms.md から prompter が自動取り込み。"

