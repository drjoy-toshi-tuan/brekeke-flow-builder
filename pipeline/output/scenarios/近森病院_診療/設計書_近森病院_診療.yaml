        order: "17"
        value: "内科"
      - id: "18"
        order: "18"
        value: "乳腺外科"
      - id: "19"
        order: "19"
        value: "脳神経外科"
      - id: "20"
        order: "20"
        value: "脳神経内科"
      - id: "21"
        order: "21"
        value: "泌尿器科"
      - id: "22"
        order: "22"
        value: "皮膚科"
      - id: "23"
        order: "23"
        value: "登録なし"
    item_default: true
    editable: true
    deletable: false
    notes: "Gen1 entity_classification.md の 01_00_分岐なし診療科 から抽出。「糖尿病・リウマチ科」は中黒なしの「糖尿病リウマチ科」に統一。「登録なし」は no_result フォールバック値。"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日(和暦)"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフロー DOB Re-confirmation 内蔵"

  - context_name: "reason"
    context_name_jp: "理由・確認内容"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "キャンセル理由（用件=キャンセル）または確認内容（用件=確認）。同時に通らないため共用。"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "用件=変更/キャンセル の場合のみ聴取。MMDD（4桁）DTMF または音声。比較日より前なら +1 年確定。"

  - context_name: "telephoneNumber"
    context_name_jp: "着信元電話番号"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: false
