# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【復唱制限】用件・生年月日・連絡先電話番号以外の聴取項目は復唱禁止（元資料 #重要：聴取内容の再質問・復唱禁止について）。特に受診者名の復唱は絶対禁止。"
  - "【氏名カタカナ変換】patientName は発話がひらがな・漢字のいずれでも全てカタカナで保存する（元資料 #氏名（patientName）の取り扱い）。"
  - "【再質問文言固定】再聴取時の1回目・2回目は「申し訳ございません、うまく聞き取りができませんでした。再度、お話しください。」（元資料 #回答を待つ時間・質問回数）。3回目で次の質問へ進む（retry_count=2）。"
  - "【氏名の再聴取文言特殊】氏名は「申し訳ありません。うまく聞き取れませんでした。ゆっくり話すとAIがうまく聞き取れません。普通のスピードではっきりとお話しください。再度伺います。」を使用（元資料 #氏名の取り扱い）— 氏名聴取サブフロー内で実装済み。"
  - "【生年月日復唱形式】生年月日は「yyyy年m月d日ですね。」で1回だけ復唱し、訂正があれば1回のみ再復唱（元資料 #復唱を許可するケース）。DOB Re-confirmation モジュールで実装。"
  - "【電話番号復唱形式】連絡先電話番号は「{TEL}でよろしいですか？」形式で復唱。携帯着信時は「今おかけいただいている{Incoming_phone_number}でよろしいですか？」で着信番号を提案（元資料 #連絡先電話番号 / 共通_連絡先_携帯確認）。"
  - "【非通知ガード】incoming-classifier で anonymous/unknown/空白を検出した場合は END_非通知 へ遷移。「186 を付けて再発信」を案内。"
  - "【数字表記正規化】「4/四/し/よん」は全て 4、「5/五/ご/ごお/ごー」は全て 5 に統一。「for」「C」「号」「go」等の誤認識は数字に置換（元資料 #数字ヒアリング時の表記について）。"
  - "【複数情報対応】1発話で複数情報を伝えられた場合、記録済みの情報は再聴取しない（元資料 #複数情報の処理）。ただし第3世代は1発話1意図が原則のため、複数情報は OpenAI プロンプト側の記述で「既知の情報があれば記録して不足分のみ質問」する方針。"
  - "【2人目以降の氏名・生年月日】2人目以降の氏名・生年月日は reason に「氏名カタカナ, yyyy-MM-dd」形式で1人1行格納（元資料 #複数情報の処理）。OpenAI プロンプト側の記述で対応する。"
  - "【RAG pattern 3】その他問い合わせルートの reason 聴取後と、全聴取完了の END_受付完了 直前の2箇所で RAG検索サブフローを呼び出す（Gen2 の「最後の問い合わせ」ループの置き換え）。"
  - "【日付補完ルール】reservationDate は月日のみ発話なら当日の年度を補完。10月以降の入電で1〜9月の日付を発話された場合は翌年に設定（元資料 #予約日）。"
  - "【Preferred_date は text】「来月上旬」「なるべく早く」等の曖昧表現を受け付けるため text 保存（元資料: フリーワードで文字起こし、明確な日付でも TEXT）。"
  - "【status 値マッピング】Gen2 の status=0（冒頭切断/途中切断）・status=8（非通知）は第3世代では禁止値のため、2（代表案内・案内不可）に置換。"
  - "【smsFlag 一律=1】本フローは全用件で「翌営業日に担当者が折り返し電話 or SMS 連絡」と案内するため、正常終話は一律 smsFlag=1。異常系（非通知/時間外/聴取失敗）は -1。"
  - "【Checkup_details の context_name】Gen2 のフィールド名 Checkup_details（キャメル+スネーク混在）は Gen2 データ互換のためそのまま保持。Preferred_date も同様。"
  - "【endpoint/smsFlag 除外】Gen2 function の endpoint と smsFlag は saveContextModel2DB に含めず、saveCompletionFlag2db のパラメータとして各終話ブロックで設定する（director 指針）。"

