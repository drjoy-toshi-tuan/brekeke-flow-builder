# 設計書 — 柏厚生総合病院 健診
# 生成元: @director エージェント
# 生成日: 2026-04-17
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/【健診1】：柏厚生総合病院.md
# 移管ノート: docs/migration/gen2_柏厚生総合病院_健診.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "柏厚生総合病院"
  group_name: "柏厚生総合病院"
  flow_name: "柏厚生総合病院$健診"
  target_facility: "柏厚生総合病院 健診センター"
  office_id: "TODO_要確認"
  phone_number: "TODO_要確認"
  business_hours: "Dr.JOY側で設定（フローJSON側は acceptance_times 配置のみ）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "柏厚生総合病院$健診"
      role: "main"
      description: "健診センターの予約・予約変更・キャンセル・その他問い合わせを受け付けるAI電話フロー"
  subflows:
    - name: "柏厚生総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "受診者氏名をカタカナ変換して patientName に格納。復唱は絶対禁止（元資料 #氏名の取り扱い）"
    - name: "柏厚生総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation で「yyyy年m月d日ですね。」と1回だけ復唱（元資料 #復唱を許可するケース）"
    - name: "柏厚生総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "着信番号が携帯(090/080/070/060)なら「今かけている番号でよいか」を復唱確認。固定/その他は直接聴取→復唱。持っていない申告は着信番号登録。"
    - name: "柏厚生総合病院$RAG検索"
      target: "RAG検索"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "その他問い合わせ用。Dr.JOY側FAQリストを検索し読み上げ。Gen2 の「最後の問い合わせ」ループの置き換え"

# --- セクション3: フローの目的 ---
purpose: |
  柏厚生総合病院 健診センターへの入電を受け、健診予約（新規）・予約変更・キャンセル・その他問い合わせの
  4用件を分類し、用件別の必須項目と共通項目（氏名・生年月日・連絡先電話番号）を聴取して折り返し受付を
  自動化する。翌営業日に担当者が折り返し電話またはSMSで連絡する前段としての情報収集を担う。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "柏厚生総合病院$健診"
    diagram: |
      冒頭(wait)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常  → 営業時間チェック(acceptance_times)
                        ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                    → 用件確認 [enum 4分岐 + echo_back]
                                        ├─ 予約        → 予約_受診内容 → 予約_オプション → 予約_健康保険組合名 → 予約_受診希望日
                                        ├─ 予約変更    → 変更_現在の受診内容 → 変更_現在の予約日 → 変更_変更希望内容
                                        ├─ キャンセル  → キャンセル_現在の受診内容 → キャンセル_現在の予約日
                                        └─ その他問い合わせ → その他_問い合わせ内容 → jump_RAG検索(pattern1)
                                    → 【合流】jump_氏名聴取
                                    → jump_生年月日聴取
                                    → jump_電話番号聴取
                                    → jump_RAG最終確認(pattern2)
                                    → END_受付完了(status=1, smsFlag=1) → 切断
    notes: "個人情報聴取（氏名/生年月日/電話番号）はサブフローへ委譲。RAGは pattern 3（その他ルート + 全終話前の2箇所）。"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  # --- 冒頭アナウンス ---
  - step: 冒頭_アナウンス
    type: announcement
    next: 用件確認

  # --- 用件確認（enum 4分岐 + 復唱許可）---
  - step: 用件確認
    type: hearing
    output_format: enum
    echo_back: true
    conditions:
      - match: "予約"
        next: 予約_受診内容
      - match: "予約変更"
        next: 変更_現在の受診内容
      - match: "キャンセル"
        next: キャンセル_現在の受診内容
      - match: "その他問い合わせ"
        next: その他_問い合わせ内容

  # --- 予約ルート ---
  - step: 予約_受診内容
    type: hearing
    output_format: text
    next: 予約_オプション

  - step: 予約_オプション
    type: hearing
    output_format: text
    next: 予約_健康保険組合名

  - step: 予約_健康保険組合名
    type: hearing
    output_format: text
    next: 予約_受診希望日

  - step: 予約_受診希望日
    type: hearing
    output_format: text    # 「来月上旬」等の曖昧表現を許容するため text（元資料: フリーワードで文字起こし）
    next: jump_氏名聴取

  # --- 予約変更ルート ---
  - step: 変更_現在の受診内容
    type: hearing
    output_format: text
    next: 変更_現在の予約日

  - step: 変更_現在の予約日
    type: hearing
    output_format: datetime   # Gen2 function: reservationDate は DATE 型。YYYY-MM-DD HH:MM 正規化
    next: 変更_変更希望内容

  - step: 変更_変更希望内容
    type: hearing
    output_format: text
    next: jump_氏名聴取

  # --- キャンセルルート ---
  - step: キャンセル_現在の受診内容
    type: hearing
    output_format: text
    next: キャンセル_現在の予約日

  - step: キャンセル_現在の予約日
    type: hearing
    output_format: datetime
    next: jump_氏名聴取

  # --- その他問い合わせルート ---
  - step: その他_問い合わせ内容
    type: hearing
    output_format: text
    next: jump_RAG検索

  # --- RAG検索サブフロー（pattern 1: その他ルート内）---
  - step: jump_RAG検索
    type: subflow
    flowname: "柏厚生総合病院$RAG検索"
    next: jump_氏名聴取

  # --- 共通: 個人情報聴取サブフロー連鎖 ---
  - step: jump_氏名聴取
    type: subflow
    flowname: "柏厚生総合病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "柏厚生総合病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "柏厚生総合病院$電話番号聴取"
    next: jump_RAG最終確認

  # --- RAG最終確認サブフロー（pattern 2: 終話前）---
  - step: jump_RAG最終確認
    type: subflow
    flowname: "柏厚生総合病院$RAG検索"
    next: END_受付完了

  # --- 終話ブロック ---
  - step: END_受付完了
    type: termination
    termination_ref: "END_受付完了"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "予約変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "その他問い合わせ"
    item_default: true
    editable: true
    deletable: true
    notes: "Gen2 function enum から転記（無回答は 4世代では no_result/retry 扱いのため除外）"

  - context_name: "patientName"
    context_name_jp: "受診者名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "カタカナ変換必須。復唱絶対禁止（元資料 #氏名の取り扱い）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "和暦/西暦変換。DOB Re-confirmation で復唱"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "聴取する電話番号。10桁または11桁。携帯先頭は 090/080/070/060"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "着信番号自動格納"

  - context_name: "course"
    context_name_jp: "受診希望コース"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約ルート専用。例: 人間ドック、生活習慣病予防健診 等"

  - context_name: "option"
    context_name_jp: "追加オプション"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約ルート専用。希望なしの場合は「希望しない」を格納"

  - context_name: "insurance"
    context_name_jp: "健康保険組合名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約ルート専用。不明時は「わからない」を格納"

  - context_name: "Preferred_date"
    context_name_jp: "受診希望日"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約ルート専用。曖昧表現を許容するため TEXT（元資料: フリーワードで文字起こし）"

  - context_name: "Checkup_details"
    context_name_jp: "現在の受診内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約変更・キャンセルルート専用"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約変更・キャンセルルート専用。YYYY-MM-DD HH:MM"

  - context_name: "reason"
    context_name_jp: "確認内容・変更内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約変更ルートの変更希望内容、その他問い合わせルートの問い合わせ本文を格納"

  - context_name: "company_name"
    context_name_jp: "企業名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 function に定義あり。発話に企業名が含まれる場合に格納（明示的な聴取ステップなし）"

  - context_name: "inqury"
    context_name_jp: "その他問い合わせ内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "Gen2 function に定義あり。現時点では reason で代用しているが Gen2 互換のため保持"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "転送"
      - id: "6"
        order: "6"
