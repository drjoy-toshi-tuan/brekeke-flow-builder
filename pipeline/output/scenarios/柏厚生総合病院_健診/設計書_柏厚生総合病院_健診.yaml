# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "お手数をおかけしますが、発信者番号を通知して再度お電話ください。電話番号の前に 186 を追加いただくことで発信者番号を通知していただくことができます。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 正常系 ---
  - name: "END_受付完了"
    condition: "全聴取完了"
    tts_announcement: "ご要望を承りました。翌営業日に、担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。担当者からのご連絡後に確定となりますのでしばらくお待ちくださいませ。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  # 本フローは全用件共通で smsFlag=1（翌営業日に折り返し電話 or SMS 連絡）のため分岐不要。
  # 電話種別（携帯/固定）による SMS 送信可否の実体判断は 電話番号聴取サブフロー内で phonetype を
  # 格納しており、Dr.JOY側の通知ロジックで判定される想定。フローJSON側は一律 smsFlag=1 を設定する。

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: 3
  inquiry_insertion_point: "その他_問い合わせ内容"
  pre_termination: true

