    editable: true
    deletable: true
    notes: "1=通話完了 2=代表案内・非通知 3=聴取失敗 6=時間外。Gen2 の status=0/8 は Gen3 では 2 に置換"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: ""

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "予約"
      - "予約変更"
      - "キャンセル"
      - "その他問い合わせ"
    notes: "DTMF 1=予約, 2=予約変更, 3=キャンセル, 4=その他問い合わせ。用件は復唱許可（「予約ですね？」形式）"

  - order: 2
    name: "予約_受診内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "course"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約ルート。自由発話（例: 人間ドック、脳ドック、生活習慣病予防健診 等）。「人間ロック」「ドック」「ロック」「人間独」は「人間ドック」と判断（元資料）"

  - order: 3
    name: "予約_オプション"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "option"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約ルート。希望なしは「希望しない」を格納"

  - order: 4
    name: "予約_健康保険組合名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "insurance"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約ルート。不明時は「わからない」を格納"

  - order: 5
    name: "予約_受診希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "Preferred_date"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約ルート。フリーワード文字起こし（明確な日付でも TEXT 保存：元資料準拠）。「本日より2営業日以降」の案内"

  - order: 6
    name: "変更_現在の受診内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "Checkup_details"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約変更ルート"

  - order: 7
    name: "変更_現在の予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "予約変更ルート。YYYY-MM-DD HH:MM 正規化。月日のみなら当日の年度を補完、10月以降で1〜9月発話なら翌年。DTMF 対応表: 8桁の数字で YYYYMMDD を入力（例: 20260510 → 2026-05-10 00:00）。4桁 MMDD の場合は当日の年度を補完、6桁 YYMMDD の場合は 20YY として解釈"

  - order: 8
    name: "変更_変更希望内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "予約変更ルート"

  - order: 9
    name: "キャンセル_現在の受診内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "Checkup_details"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "キャンセルルート"

  - order: 10
    name: "キャンセル_現在の予約日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "キャンセルルート。YYYY-MM-DD HH:MM 正規化。DTMF 対応表: 8桁の数字で YYYYMMDD を入力（例: 20260510 → 2026-05-10 00:00）。4桁 MMDD の場合は当日の年度を補完、6桁 YYMMDD の場合は 20YY として解釈"

  - order: 11
    name: "その他_問い合わせ内容"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "その他問い合わせルート。聴取後 RAG 検索サブフローへ遷移"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "用件確認"
    tts_announcement: "ご用件を次の4つの内からお話しください。「予約」、「予約変更」、「キャンセル」、「その他問い合わせ」。それではどうぞ。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "予約変更"
        - "キャンセル"
        - "その他問い合わせ"
      mapping:
        - input: "「予約」を含む（※「予約変更」を含まない場合）/ DTMF 1 / 「薬」「お薬」（元資料: 「予約」として判断）"
          output: "予約"
        - input: "「予約変更」「変更」「取り直したい」「取り直す」「別の」「変えたい」「変える」「変えて」を含む / DTMF 2"
          output: "予約変更"
        - input: "「キャンセル」「やめる」「取り消し」「取り消す」「取消」「やめたい」を含む / DTMF 3"
          output: "キャンセル"
        - input: "「問い合わせ」「質問」を含む / DTMF 4"
          output: "その他問い合わせ"
      no_result_condition: "上記いずれにも該当しない場合は NO_RESULT とし、リトライへ"
    save_to: "classification"
    next_step: "（分岐: 用件ごとに異なる）"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "予約_受診内容"
    tts_announcement: "受診を希望される内容をお話しください。それではどうぞ。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: "（text 保存のため正規化なし。STT結果をそのまま course に格納）"
