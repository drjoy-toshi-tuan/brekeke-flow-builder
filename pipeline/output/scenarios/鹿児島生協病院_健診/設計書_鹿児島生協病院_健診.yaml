# --- セクション6: 聴取項目一覧 ---
hearing_items:
  - order: 1
    name: "1名複数名確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "numberOfReservations"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "other"
    notes: "「今回のお申込みは、1名分ですか？1名の場合は「はいそうです」、複数名の場合は「いいえ違います」、で、お答えください。」 はい=1名（other=複数名）。後段の複数名分岐で参照、複数名時のみ職場名聴取を挿入"

  - order: 2
    name: "用件聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "健診"
      - "変更"
      - "キャンセル"
      - "other"
    notes: |
      DTMF 1=健診（健診の予約・新規）/ 2=変更 / 3=キャンセル / 4=問い合わせ（=other）。
      OpenAI synonyms（125 件）は entity_openai_synonyms.md を prompter が反映:
        - 健診: 健康診断/健診の予約/健診予約/検診/検針/エンジンの予約（誤認）/元の予約（誤認）/現金の予約（誤認）/現行診断（誤認）/現振の（誤認）/雇い入れ/事業主/就職/進学/人間ドック/生活習慣病/全身/特定健診/返信
        - 変更: 延期/時間/取り直したい/取り直す/日程/日付/判子（誤認）/平行/並行/別の/変えたい/変えて/変える
        - キャンセル: やめる/取り消し/取り消す/取消
        - 問い合わせ（other）: アクセス/お見舞い/くすり/違い/違う/飲み方/会計/行き方/伺い/質問/処方箋/書類/症状/証明書/診断書/病棟/副作用/文書/聞きたい/教えて/金額/検査結果/調べて/料金/なくした/忘れた/問い合わす
      「もしもし」検知も OpenAI プロンプトで救済語扱い（独立 hearing 化しない、director 判断ログ #7）。
      echo_back: true により Re-confirmation node が #data# 埋め込みで「ご用件は #data#、でよろしいですか?」を発話（NON-BLOCKER N-4）

  - order: 3
    name: "健診種類聴取"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: true
    save_to: "kenshinType"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "採用時定期"
      - "協会けんぽ"
      - "other"
    notes: |
      DTMF 1=採用時定期（採用時健診・定期健診）/ 2=協会けんぽ（協会けんぽの生活習慣病予防健診）/ 3=人間ドックその他（=other）。
      新規ルート専用。
      OpenAI synonyms:
        - 採用時定期: 一般健診/会社から/雇い入れ/雇入/採用時/定期健診/入社時健診/必要検針（誤認）/法定健診/一番/一/1
        - 協会けんぽ: けんぽ/協会/生活習慣病予防/生活予防/二番/二/2
        - other（人間ドックその他）: その他/レディースドック/基本コース/基本ドック/三番/人間ドック/三/3
      「わからない」発話も other（=人間ドックその他）に集約（Gen1 では END_戻る だが、Gen3 では人間ドックその他扱いで継続）。
      echo_back: true（NON-BLOCKER N-5）

  - order: 4
    name: "所定用紙確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "formAvailable"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "other"
    notes: "「結果を記載する、所定の用紙はお持ちですか？お持ちの場合は、はい、お持ちでない場合は、いいえ、とお答えください。」 はい=用紙あり（用紙注意 TTS へ）/ other=用紙なし（受診希望時期聴取へ直行）。新規ルートの採用時定期のみ呼ばれる"

  - order: 5
    name: "新規_受診希望時期聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "新規ルートのみ。「受診を希望される時期をおはなしください。」 Gen1 のフリーワード保存仕様を継承（曖昧表現許容）"

  - order: 6
    name: "予約日聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "datetime"
    output_labels: []
    notes: "変更/キャンセルルート共通。「現在の予約日を教えてください。わからない場合には、「わからない」、とお話ください。」 YYYY-MM-DD HH:MM 形式に変換、10月以降に1-9月指定は翌年扱い（NON-BLOCKER N-11）"

  - order: 7
    name: "胃カメラ検査確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "gastrocamera"
    openai_processing: "judge"
    output_format: "enum"
    output_labels:
      - "はい"
      - "other"
    notes: "変更ルートのみ。「ご予約のコースの中に、胃カメラの検査はございますか？」 Gen1 では Yes/No に関係なく胃調査CP（pass-through）→ 受診希望時期に流れるため、Gen3 でも分岐先は同一（情報のみ context 保存）"

  - order: 8
    name: "変更_受診希望時期聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredDate"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "変更ルート。「受診を希望される時期をおはなしください。」 新規_受診希望時期聴取と同じ context（desiredDate）に保存"

  - order: 9
    name: "問い合わせ内容聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inquiry"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "問い合わせ（other）ルート。Gen1 問合せ① 相当。「ご用件をお話ください。」の自由応答"

  - order: 10
    name: "問い合わせ追加聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "inquiryAdditional"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "問い合わせ（other）ルート。Gen1 問合せ② 相当。「その他、健診の内容で追加のご連絡事項はございますか？ございましたら、このままお話ください。」"

  - order: 11
    name: "職場名聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "companyName"
    openai_processing: "none"
    output_format: "text"
    output_labels: []
    notes: "複数名予約時のみ（複数名分岐で挿入）。「健康診断の結果を提出する、職場名をお話ください。」 Gen1 `職場名聴取.yaml` の `職場名聞き取り_1` セリフを採用（複数名時はこちら、職場名のみ聴取）"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "1名複数名確認"
    tts_announcement: "今回のお申込みは、1名分ですか？1名の場合は「はい、そうです」、複数名の場合は「いいえ、違います」、で、お答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "other"
      mapping:
        - input: "はい/そうです/大丈夫/合っています/合ってます/問題ありません/違いありません/丈夫/1名/一名/個人"
          output: "はい"
        - input: "いいえ/違います/違う/違って/ダメ/駄目/ノー/複数/複数名/2名/二名/3名/三名"
          output: "other"
      no_result_condition: "判別不可時は other（=複数名扱い、職場名聴取を挿入）"
    save_to: "numberOfReservations"
    next_step: "用件聴取"
    retry_failure: "end_failure"

  - step_name: "用件聴取"
    tts_announcement: |
      ご用件を、次の4つのうちの、いずれかでお話ください。
      「1，健診の予約」
      「2，予約の変更」
      「3，予約のキャンセル」
      「4，その他お問合せ」
      それでは、お話ください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "健診"
        - "変更"
        - "キャンセル"
        - "other"
      mapping:
        - input: "DTMF 1 / 1番 / 一 / 一番 / 健診 / 健診の予約 / 健康診断 / 健診予約 / 検診 / 検針 / 人間ドック / ドック / 特定健診 / 雇い入れ / 事業主 / 就職 / 進学 / 生活習慣病 / 全身 / 予約 / 元の予約 / 現金の予約 / 現行診断 / 現振の / エンジンの予約 / 返信"
          output: "健診"
        - input: "DTMF 2 / 2番 / 二 / 二番 / 変更 / 予約変更 / 予約の変更 / 延期 / 時間 / 取り直したい / 取り直す / 日程 / 日付 / 判子 / 平行 / 並行 / 別の / 変えたい / 変えて / 変える"
          output: "変更"
        - input: "DTMF 3 / 3番 / 三 / 三番 / キャンセル / 予約キャンセル / 予約のキャンセル / やめる / 取り消し / 取り消す / 取消"
          output: "キャンセル"
        - input: "DTMF 4 / 4番 / 四 / 四番 / その他 / お問合せ / 問い合わせ / 問合せ / 質問したい / 問合せ内容 / 料金 / アクセス / お見舞い / 違い / 違う / 飲み方 / 会計 / 行き方 / 伺い / 質問 / 処方箋 / 書類 / 症状 / 証明書 / 診断書 / 病棟 / 副作用 / 文書 / 聞きたい / 教えて / 金額 / 検査結果 / 調べて / なくした / 忘れた / 問い合わす / もしもし"
          output: "other"
      no_result_condition: "上記いずれにも該当しない場合は other（=問い合わせ扱い、フリーワード救済）"
    save_to: "classification"
    next_step: "健診→健診種類聴取／ 変更→予約日聴取／ キャンセル→予約日聴取／ other→問い合わせ内容聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: "大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話番号へおかけなおしください。受付時間は日曜祝日、年末年始を除く、月曜日から金曜日の8時30分から16時30分、土曜日は8時30分から12時です。番号が分かる場合は、電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。電話番号は、099-267-1455です。繰り返します。電話番号は、099-267-1455です。繰り返します。電話番号は、099-267-1455です。"

  - step_name: "健診種類聴取"
    tts_announcement: |
      健診の種類についてお伺いします。
      これよりご案内する番号を、ダイヤルプッシュ、または、番号でお答えください。
      検査結果を会社へ提出する採用時健診、定期健診は1番、
      協会けんぽの生活習慣病予防健診は2番、
      人間ドック等、それ以外の健診は3番、
      わからない場合は、わからないとお答えください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "採用時定期"
        - "協会けんぽ"
        - "other"
      mapping:
        - input: "DTMF 1 / 1番 / 一 / 一番 / 採用時 / 採用時健診 / 定期健診 / 一般健診 / 会社から / 雇い入れ / 雇入 / 入社時健診 / 法定健診 / 必要検針"
          output: "採用時定期"
        - input: "DTMF 2 / 2番 / 二 / 二番 / 協会 / 協会けんぽ / けんぽ / 生活習慣病予防 / 生活予防"
          output: "協会けんぽ"
        - input: "DTMF 3 / 3番 / 三 / 三番 / 人間ドック / その他 / その他の健診 / レディースドック / 基本コース / 基本ドック / わからない / 知らない / 忘れた"
          output: "other"
      no_result_condition: "上記いずれにも該当しない場合は other（=人間ドックその他扱い）"
    save_to: "kenshinType"
    next_step: "採用時定期→所定用紙確認／ 協会けんぽ→新規_受診希望時期聴取／ other→新規_受診希望時期聴取"
    retry_failure: "end_failure"

  - step_name: "所定用紙確認"
    tts_announcement: "結果を記載する、所定の用紙はお持ちですか？お持ちの場合は、はい、お持ちでない場合は、いいえ、とお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "other"
      mapping:
        - input: "はい/持っています/あります/お持ちです/そうです/大丈夫"
          output: "はい"
        - input: "いいえ/持っていません/ありません/ない/持ってません/もってない"
          output: "other"
      no_result_condition: "判別不可時は other（=用紙なし扱い、用紙注意なし）"
    save_to: "formAvailable"
    next_step: "はい→用紙注意_アナウンス／ other→新規_受診希望時期聴取"
    retry_failure: "skip"

  - step_name: "新規_受診希望時期聴取"
    tts_announcement: "受診を希望される時期をおはなしください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "自由発話（4月1日/来月上旬/なるべく早く 等）"
          output: "そのまま格納（曖昧表現も許容）"
      no_result_condition: "聴取不可時は skip"
    save_to: "desiredDate"
    next_step: "新規_2週間案内"
    retry_failure: "skip"

  - step_name: "予約日聴取"
    tts_announcement: "現在の予約日を教えてください。わからない場合には、「わからない」、とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "日付表現（4月1日/来週の月曜日 等）"
          output: "YYYY-MM-DD HH:MM 形式に変換（10月以降に1-9月指定は翌年扱い、未来日チェック）"
      no_result_condition: "日付として解釈できない場合または「わからない」発話は skip"
    save_to: "reservationDate"
    next_step: "予約日後_用件分岐"
    retry_failure: "skip"

  - step_name: "胃カメラ検査確認"
    tts_announcement: "ご予約のコースの中に、胃カメラの検査はございますか？「はい、あります」や、「いいえ、ないです」のように、お答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "はい"
        - "other"
      mapping:
        - input: "はい/あります/そうです/大丈夫"
          output: "はい"
        - input: "いいえ/ないです/ない/違います"
          output: "other"
      no_result_condition: "判別不可時は other（=なし扱い、ただし分岐先は同じ）"
    save_to: "gastrocamera"
    next_step: "変更_受診希望時期聴取（はい/other 共通）"
    retry_failure: "skip"

  - step_name: "変更_受診希望時期聴取"
    tts_announcement: "受診を希望される時期をおはなしください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping:
        - input: "自由発話（曖昧表現許容）"
          output: "そのまま格納"
