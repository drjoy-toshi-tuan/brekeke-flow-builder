# --- セクション11: 特記事項・制約 ---
special_notes:
  - "鹿児島生協病院 健診固有: GW（5/2 12時以降〜5/6 終日）と年末年始（12/28 16時以降〜1/3 終日）は休診期間。Script モジュール 1 個で両期間を判定し、それぞれ専用案内 TTS で終話する（director 判断ログ #3）"
  - "代表電話番号は 099-267-1455（1 種類のみ）。終話 TTS で 3 回繰り返し読み上げる（短縮・省略禁止）。倉敷・蘇生会のような 2 種類運用ではない"
  - "電話番号には半角ハイフンを使用（例: 099-267-1455）。Brekeke 仕様で全角や中黒は不可"
  - "用件聴取の「もしもし」検知は OpenAI プロンプトで救済語扱い（独立 hearing 化しない、director 判断ログ #7）"
  - "用件 OpenAI synonyms 125 件は entity_openai_synonyms.md を prompter が反映する。設計書には主要 synonym のみ列挙"
  - "1 名複数名確認は用件聴取の前段に配置（移管ノート指示通り、director 判断ログ #4）。複数名時のみ氏名聴取後に職場名聴取を挿入。Gen1 では 1名/複数名情報が伝播しないバグがあったが Gen3 では context（numberOfReservations）で正しく伝播"
