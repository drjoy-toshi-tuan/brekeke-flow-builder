# 設計書 -- 鹿児島生協病院 健診
# 生成元: @director エージェント
# 生成日: 2026/05/07
# 確認レポート: output/scenarios/鹿児島生協病院_健診/確認レポート_鹿児島生協病院_健診_20260507.md
# 作業種別: Gen1→Gen3 移管
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "鹿児島生協病院"
  scenario_name: "健診"
  group_name: "鹿児島生協病院"
  flow_name: "鹿児島生協病院$健診"
  target_facility: "鹿児島生協病院（健診部門）"
  office_id: "TODO_要確認"
  phone_number: "099-267-1455"
  business_hours: "日祝を除く 月〜金 8:30〜16:30、土 8:30〜12:00（GW 5/2 12時以降〜5/6 終日 と 年末年始 12/28 16時以降〜1/3 終日 は休診。Script で判定）"
  flow_type: "subflow"
  work_type: "gen1_migration"
  environment: "prod"
  tts_platform: "GOOGLE"
  stt_platform: "AMIVOICE"
  openai_platform: "OPENAI"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "鹿児島生協病院$健診"
      role: "main"
      description: |
        冒頭 → 休診期間判定（GW + 年末年始） → 1名複数名確認(Yes/No) → 用件聴取(4分岐 echo_back) →
        各ルート聴取 → 氏名 → 複数名分岐(職場名 or skip) → 生年月日 → 連絡先 サブフロー →
        終話分岐(phonetype) → END。
        新規=健診種類聴取(3分岐 echo_back)+所定用紙確認(採用時定期のみ)+受診希望時期+2週間案内、
        変更=予約日+胃カメラ+受診希望時期、キャンセル=予約日のみ、問い合わせ=問合せ内容+問合せ追加。
        休診期間（GW・年末年始）はそれぞれ専用案内 TTS で終話、聴取失敗・時間外は 099-267-1455 案内。
  subflows:
    - name: "鹿児島生協病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "PatientName サブフロー。受診者氏名（複数名時は実質代表者氏名）。Gen1 では複数名予約時に「代表者様のお名前」と文言切替していたが PatientName 1 枠の制約で共通文言「受診される方」で受ける（director.md §3.1.1、NON-BLOCKER N-7）"
    - name: "鹿児島生協病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "DOB Re-confirmation 使用。Gen1 同様、和暦/西暦両対応・大正/昭和元年/昭和/平成元年/平成/令和元年/令和の自動判定"
    - name: "鹿児島生協病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Phone Normalization + Re-confirmation。incoming-classifier で携帯/固定/その他を分岐し phonetype を設定。非通知は冒頭 opening で既に弾いているためここには到達しない"

# --- セクション3: フローの目的 ---
purpose: |
  鹿児島生協病院 健診専用ダイヤルへの着信を受け、
  健診の予約／変更／キャンセル／その他お問い合わせ の用件を聴取し、
  患者情報（氏名・生年月日・連絡先電話番号）を収集して折り返し受付を自動化する。
  新規健診予約では健診種類（採用時定期／協会けんぽ／人間ドックその他）と受診希望時期を、
  変更では現在の予約日・胃カメラ検査有無・受診希望時期を聴取する。
  複数名予約時は氏名聴取後に職場名を追加聴取する。
  GW（5/2 12時以降〜5/6）と年末年始（12/28 16時以降〜1/3）は休診期間として専用案内で終話し、
  時間外・聴取失敗時は代表電話番号 099-267-1455 を 3 回繰り返し案内する。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "鹿児島生協病院$健診"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信分類(incoming-classifier)
              ├─ 非通知 → END_非通知 → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 営業時間チェック(acceptance_times)
                                    ├─ 時間外 → END_時間外(099-267-1455 を 3 回案内) → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                                    └─ 受付可 → 冒頭_アナウンス(TTS)
                                                  → 休診期間判定(script: custom)
                                                      ├─ GW(5/2 12時〜5/6) → END_GW(専用 TTS) → 完了フラグ_GW(status=6, smsFlag=-1) → 切断
                                                      ├─ 年末年始(12/28 16時〜1/3) → END_年末年始(専用 TTS) → 完了フラグ_年末年始(status=6, smsFlag=-1) → 切断
                                                      └─ 通常 → 1名複数名確認

      1名複数名確認(hearing yes/no, save: numberOfReservations)
        ├─ はい(=1名) → 用件聴取
        └─ other(=複数名) → 用件聴取  ← どちらも次は同じ。値は後段の複数名分岐で参照

      用件聴取(hearing 4-way enum, echo_back: true, DTMF 1-4)
        ├─ 健診(新規) → 健診種類聴取(hearing 3-way enum, echo_back: true, DTMF 1-3)
        │                   ├─ 採用時定期 → 所定用紙確認(hearing yes/no)
        │                   │                  ├─ はい(用紙あり) → 用紙注意_アナウンス → 新規_受診希望時期聴取
        │                   │                  └─ other(用紙なし) → 新規_受診希望時期聴取
        │                   ├─ 協会けんぽ → 新規_受診希望時期聴取
        │                   └─ other(=人間ドックその他) → 新規_受診希望時期聴取
        │                 → 新規_受診希望時期聴取(text) → 新規_2週間案内_アナウンス → 氏名聴取
        │
        ├─ 変更 → 予約日聴取(datetime) → 予約日後_用件分岐(CMR: 用件聴取)
        │                                    ├─ 変更 → 胃カメラ検査確認(yes/no)
        │                                    │            ├─ はい → 変更_受診希望時期聴取(text) → 氏名聴取
        │                                    │            └─ other → 変更_受診希望時期聴取(text) → 氏名聴取
        │                                    └─ other(= キャンセル) → 氏名聴取
        │
        ├─ キャンセル → 予約日聴取(datetime) → 予約日後_用件分岐 → other → 氏名聴取
        │
        └─ other(= 問い合わせ) → 問い合わせ内容聴取(text) → 問い合わせ追加聴取(text) → 氏名聴取

      氏名聴取(★氏名聴取 サブフロー)
        → 複数名分岐(CMR: 1名複数名確認)
            ├─ 複数名(other) → 職場名聴取(text) → 生年月日聴取
            └─ other(=1名/はい) → 生年月日聴取
        → 生年月日聴取(★生年月日聴取 サブフロー)
        → 電話番号聴取(★電話番号聴取 サブフロー)
        → 終話_phonetype分岐(CMR: 電話番号聴取)
            ├─ 携帯 → END_締めあいさつ_携帯(SMS送信あり, status=1, smsFlag=1)
            └─ other → END_締めあいさつ_その他(SMS送信なし, status=1, smsFlag=-1)

      ─── サブフロー遷移（★マーク）───
      ★氏名聴取    = Custom Jump to Flow → 鹿児島生協病院$氏名聴取（return）
      ★生年月日聴取 = Custom Jump to Flow → 鹿児島生協病院$生年月日聴取（return）
      ★電話番号聴取 = Custom Jump to Flow → 鹿児島生協病院$電話番号聴取（return）

      ─── 異常終話 ───
      END_非通知       : 非通知着信     → status=2, smsFlag=-1
      END_時間外       : 受付時間外     → status=6, smsFlag=-1（099-267-1455 を 3 回案内）
      END_聴取失敗     : リトライ上限到達 → status=3, smsFlag=-1（099-267-1455 を 3 回案内）
      END_GW           : GW 休診期間     → status=6, smsFlag=-1（5/6まで休診、5/7再開案内）
      END_年末年始     : 年末年始休診    → status=6, smsFlag=-1（1/4 10時より折返し案内）
    notes: |
      Pattern A 採用箇所: 1名複数名確認・用件聴取・健診種類聴取・所定用紙確認・胃カメラ検査確認（OpenAI 直後分岐）。
      Pattern B 採用箇所: 予約日後_用件分岐（context_match_router: 用件聴取の classification 出力を参照）・複数名分岐（context_match_router: 1名複数名確認の出力を参照）・終話_phonetype分岐（context_match_router: 電話番号聴取の phonetype 出力を参照）。
      用件聴取・健診種類聴取は echo_back: true で内蔵復唱（NON-BLOCKER N-4 / N-5）。
      谷山生協番号案内 は Gen1 では pass-through のため Gen3 では削除（director 判断ログ #6）。
      キャンセルルートは個人情報聴取をスキップせず、Gen1 通り全聴取してから終話する（蘇生会との差分、director 判断ログ #5）。

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: true
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 休診期間判定

  # --- 休診期間判定（script: custom）---
  - step: 休診期間判定
    type: script
    script_template: custom
    template_params:
      DESCRIPTION: "現在日時が GW（5/2 12時以降〜5/6 終日）または年末年始（12/28 16時以降〜1/3 終日）の休診期間に該当するかを判定。各期間は専用案内 TTS で終話、それ以外は通常フローへ"
    conditions:
      - match: "GW"
        next: END_GW
      - match: "年末年始"
        next: END_年末年始
      - match: "other"
        next: 1名複数名確認
    notes: "施設固有の休館日（GW: 5/2 12時以降〜5/6 終日 / 年末年始: 12/28 16時以降〜1/3 終日）に該当するかをカレンダー計算で判定する。両期間とも月/日/時刻固定の休館日期間であり、祝日相当の固定日付による営業日判定が必要なため Script モジュールでのみ実現可能（OpenAI + ContextMatchRouter では現在日付の比較ができない）。Gen1 main.yaml `時間判断` サブシナリオ（祝日チェック → 日付判断 → GW 日付分岐 → 5/2 時間分岐）と `現在の時間取得` → `12/28 16時以降〜1月3日終日` 箱の Gen3 統合移植。Brekeke Script で Date() を使った月/日/時刻固定の休館日期間判定。NON-BLOCKER N-2 で動作確認推奨"

  # --- 1 名/複数名確認（Yes/No）---
  - step: 1名複数名確認
    type: hearing
    output_format: enum
    save_to: numberOfReservations
    conditions:
      - match: "はい"
        next: 用件聴取
      - match: "other"
        next: 用件聴取

  # --- 用件聴取（4-way enum, echo_back: true, DTMF 1-4）---
  - step: 用件聴取
    type: hearing
    output_format: enum
    save_to: classification
    echo_back: true
    conditions:
      - match: "健診"
        next: 健診種類聴取
      - match: "変更"
        next: 予約日聴取
      - match: "キャンセル"
        next: 予約日聴取
      - match: "other"
        next: 問い合わせ内容聴取

  # --- 新規ルート ---
  - step: 健診種類聴取
    type: hearing
    output_format: enum
    save_to: kenshinType
    echo_back: true
    conditions:
      - match: "採用時定期"
        next: 所定用紙確認
      - match: "協会けんぽ"
        next: 新規_受診希望時期聴取
      - match: "other"
        next: 新規_受診希望時期聴取

  - step: 所定用紙確認
    type: hearing
    output_format: enum
    save_to: formAvailable
    conditions:
      - match: "はい"
        next: 用紙注意_アナウンス
      - match: "other"
        next: 新規_受診希望時期聴取

  - step: 用紙注意_アナウンス
    type: announcement
    next: 新規_受診希望時期聴取

  - step: 新規_受診希望時期聴取
    type: hearing
    output_format: text
    save_to: desiredDate
    next: 新規_2週間案内
    retry_failure: skip

  - step: 新規_2週間案内
    type: announcement
    next: 氏名聴取

  # --- 変更/キャンセル共通: 予約日聴取 ---
  - step: 予約日聴取
    type: hearing
    output_format: datetime
    save_to: reservationDate
    next: 予約日後_用件分岐
    retry_failure: skip

  - step: 予約日後_用件分岐
    type: context_match_router
    reference_module: "用件聴取"
    conditions:
      - match: "変更"
        next: 胃カメラ検査確認
      - match: "other"
        next: 氏名聴取

  # --- 変更ルート: 胃カメラ確認 → 受診希望時期 ---
  - step: 胃カメラ検査確認
    type: hearing
    output_format: enum
    save_to: gastrocamera
    conditions:
      - match: "はい"
        next: 変更_受診希望時期聴取
      - match: "other"
        next: 変更_受診希望時期聴取

  - step: 変更_受診希望時期聴取
    type: hearing
    output_format: text
    save_to: desiredDate
    next: 氏名聴取
    retry_failure: skip

  # --- 問い合わせルート（other）---
  - step: 問い合わせ内容聴取
    type: hearing
    output_format: text
    save_to: inquiry
    next: 問い合わせ追加聴取
    retry_failure: skip

  - step: 問い合わせ追加聴取
    type: hearing
    output_format: text
    save_to: inquiryAdditional
    next: 氏名聴取
    retry_failure: skip

  # --- 共通: 氏名 → 複数名分岐 → (職場名) → 生年月日 → 連絡先 ---
  - step: 氏名聴取
    type: subflow
    flowname: "鹿児島生協病院$氏名聴取"
    target: 氏名聴取
    next: 複数名分岐

  - step: 複数名分岐
    type: context_match_router
    reference_module: "1名複数名確認"
    conditions:
      - match: "はい"
        next: 生年月日聴取
      - match: "other"
        next: 職場名聴取

  - step: 職場名聴取
    type: hearing
    output_format: text
    save_to: companyName
    next: 生年月日聴取
    retry_failure: skip

  - step: 生年月日聴取
    type: subflow
    flowname: "鹿児島生協病院$生年月日聴取"
    target: 生年月日聴取
    next: 電話番号聴取

  - step: 電話番号聴取
    type: subflow
    flowname: "鹿児島生協病院$電話番号聴取"
    target: 電話番号聴取
    next: 終話_phonetype分岐

  # --- 終話 phonetype 分岐 ---
  - step: 終話_phonetype分岐
    type: context_match_router
    reference_module: "電話番号聴取"
    conditions:
      - match: "携帯"
        next: END_締めあいさつ_携帯
      - match: "other"
        next: END_締めあいさつ_その他

  # --- 終話ブロック ---
  - step: END_締めあいさつ_携帯
    type: termination
    termination_ref: "END_締めあいさつ_携帯"

  - step: END_締めあいさつ_その他
    type: termination
    termination_ref: "END_締めあいさつ_その他"

  - step: END_GW
    type: termination
    termination_ref: "END_GW"

  - step: END_年末年始
    type: termination
    termination_ref: "END_年末年始"

# --- セクション5: コンテキストフィールド一覧 ---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "健診"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "問い合わせ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件聴取の OpenAI 出力。健診=健診の予約（新規）、変更=予約変更、キャンセル=予約キャンセル、問い合わせ=その他お問合せ。other → 問い合わせ にフォールバック"

  - context_name: "numberOfReservations"
    context_name_jp: "予約人数"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "1名複数名確認の Yes/No 結果。はい=1名 / other=複数名。後段の複数名分岐で参照し、複数名時は氏名後に職場名聴取を挿入"

  - context_name: "kenshinType"
    context_name_jp: "健診種類"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "新規ルート専用。健診種類聴取の OpenAI 出力。採用時定期=採用時健診/定期健診、協会けんぽ=協会けんぽの生活習慣病予防健診、other=人間ドック等それ以外。採用時定期のみ所定用紙確認へ分岐"

  - context_name: "formAvailable"
    context_name_jp: "所定用紙有無"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "新規ルートの採用時定期のみ。「結果を記載する所定の用紙はお持ちですか？」の Yes/No。はい=用紙あり（用紙注意 TTS 流す）/ other=用紙なし（注意 TTS なし）"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "氏名聴取サブフローで聴取。受診者氏名（複数名時は実質代表者氏名、PatientName 1 枠で集約 — NON-BLOCKER N-7）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "生年月日聴取サブフロー。和暦/西暦対応・大正〜令和の元号自動判定"

  - context_name: "companyName"
    context_name_jp: "職場名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "複数名予約時のみ聴取。「健康診断の結果を提出する、職場名をお話ください。」（または「職場名をお話ください。該当しない場合は、いいえ、とお話ください。」）"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更/キャンセルルートのみ聴取。YYYY-MM-DD HH:MM 形式に変換。10月以降に1-9月指定は翌年扱い（NON-BLOCKER N-11）"

