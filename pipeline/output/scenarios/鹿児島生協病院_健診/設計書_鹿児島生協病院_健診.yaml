      no_result_condition: "skip（追加事項なし扱い）"
    save_to: "inquiryAdditional"
    next_step: "氏名聴取"
    retry_failure: "skip"

  - step_name: "職場名聴取"
    tts_announcement: "健康診断の結果を提出する、職場名をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
