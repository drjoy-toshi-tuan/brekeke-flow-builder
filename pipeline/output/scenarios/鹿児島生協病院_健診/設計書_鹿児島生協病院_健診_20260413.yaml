# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管案件。Gen2プロンプト（本番/デモ重複あり）とYAML対話フロー定義から変換"
  - "人数確認（個人/複数名）が冒頭にある特殊構成。複数名ルートは代表者氏名・職場名を先に聴取"
  - "複数名ルートではContextMatchRouterで氏名サブフローをスキップ（代表者氏名がpatientNameに設定済み）"
  - "用件確認は4択（健診の予約/予約の変更/予約のキャンセル/その他問合せ）"
  - "予約ルート内に採用定期専用の2段階分岐（所定用紙→病院指定）あり。所定用紙ありまたは病院指定なしの場合は谷山生協クリニック（099-210-2211）へ案内"
  - "当日予約はAI電話で受付不可。代表電話（099-267-1455）へ案内"
  - "smsFlag分岐はclassification依存: 予約/変更/問い合わせ=1, キャンセル=-1"
  - "キャンセルと問い合わせルートは希望時期をスキップして直接個人情報聴取へ"
  - "Gen2では大半のリトライ超過時にスキップ/フォールバック動作。Gen3でも同様にskip動作を採用"
  - "Gen2プロンプトの口調指示: 「お話ください」に統一（「おっしゃってください」は使わない）、「ありがとうございます」は使わない"
  - "生年月日・診察券番号の聴取あり（標準サブフロー使用）。Gen2プロンプトにも生年月日聴取ステップが存在"
  - "clinicalDepartment/clinicalDepartment2/medicalCardNumber はGen2 function定義にあるがフローで未使用のため除外"
  - "RAGサブフローはパターン3（Gen2→Gen3デフォルト）。不要であれば設計書のrag_subflow.patternをnoneに変更"

# --- セクション12: 要確認事項（人間に確認が必要）---
