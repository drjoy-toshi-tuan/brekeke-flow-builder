version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "鹿児島生協病院"
  group_name: "鹿児島生協病院"
  flow_name: "鹿児島生協病院$健診_20260413"
  target_facility: "鹿児島生協病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "099-267-1455"
  business_hours: "TODO_要確認（Gen2プロンプトに具体的な曜日・時間の記載なし。Dr.JOY側で設定）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "鹿児島生協病院$健診_20260413"
      role: "main"
      description: "冒頭チェーン → 人数確認 → (複数名: 代表者氏名・職場名) → 用件確認(4択) → 用件別ルート → 共通ルート(希望時期→氏名→生年月日→RAG) → 電話番号サブフロー(self_contained)"
  subflows:
    - name: "鹿児島生協病院$氏名聴取_20260413"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9準拠。氏名聴取サブフローをリファレンスから完全コピー。複数名ルートではContextMatchRouterでスキップ"
    - name: "鹿児島生協病院$生年月日聴取_20260413"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9準拠。生年月日聴取_復唱ありをリファレンスから完全コピー"
    - name: "鹿児島生協病院$電話番号聴取_20260413"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "self_contained"
      notes: "CLAUDE.md Rule 9/10準拠。電話番号聴取_復唱ありをリファレンスから完全コピー。終話チェーン（smsFlag分岐: classification依存）を含む。termination=self_containedのためサブフロー内で通話終了"
    - name: "鹿児島生協病院$RAG検索_20260413"
      target: "RAG検索"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 16準拠。RAG検索.jsonをリファレンスから完全コピー。パターン3: 問い合わせルート内 + 全終話前"

# --- セクション3: フローの目的 ---
purpose: "鹿児島生協病院の健診専用AI電話。個人/複数名の人数確認後、用件を4択（健診の予約/予約の変更/予約のキャンセル/その他問合せ）で聴取し、用件別に必要な情報（健診内容・予約日・胃カメラ有無・問い合わせ内容等）を収集する。共通ステップとして希望時期・受診者氏名・生年月日・連絡先電話番号を聴取し、折り返し受付を自動化する。採用時健診の所定用紙保持者は谷山生協クリニック（099-210-2211）へ案内。当日の予約は代表電話（099-267-1455）へ案内。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "鹿児島生協病院$健診_20260413"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → 人数確認(TTS) → 入力_人数確認(DTMF) → OpenAI_人数確認
                                          ├─ 複数名 → 代表者氏名(TTS) → 入力_代表者氏名(STT) → OpenAI_代表者氏名
                                          │            → 職場名(TTS) → 入力_職場名(STT) → OpenAI_職場名 → [用件確認に合流]
                                          ├─ 個人 → [用件確認に合流]
                                          └─ NO_RESULT → リトライ_人数確認(Retry → 人数確認 / No more → 用件確認)

      --- 用件確認 ---
      用件確認(TTS) → 入力_用件確認(DTMF) → OpenAI_用件確認
          ├─ 健診の予約 → [予約ルート]
          ├─ 予約の変更 → [変更ルート]
          ├─ 予約のキャンセル → [キャンセルルート]
          ├─ その他問合せ → [問い合わせルート]
          └─ NO_RESULT → リトライ_用件確認(Retry → 用件確認 / No more → 問い合わせルートへフォールバック)

      --- 予約ルート ---
      予約_健診内容(TTS) → 入力_予約_健診内容(DTMF) → OpenAI_予約_健診内容
          ├─ 採用定期 → 予約_所定用紙(TTS) → 入力_予約_所定用紙(DTMF) → OpenAI_予約_所定用紙
          │              ├─ 肯定(持っている) → END_クリニック案内(TTS) → 完了フラグ_クリニック案内(status=3) → 切断
          │              ├─ 否定(持っていない) → 予約_病院指定(TTS) → 入力_予約_病院指定(DTMF) → OpenAI_予約_病院指定
          │              │                        ├─ 肯定(指示あり) → [共通ルート: 希望時期]
          │              │                        ├─ 否定(指示なし) → END_クリニック案内(TTS) → 完了フラグ_クリニック案内(status=3) → 切断
          │              │                        └─ NO_RESULT → リトライ_予約_病院指定
          │              └─ NO_RESULT → リトライ_予約_所定用紙
          ├─ 協会けんぽ → [共通ルート: 希望時期]
          ├─ その他健診 → [共通ルート: 希望時期]
          ├─ わからない → [共通ルート: 希望時期]
          └─ NO_RESULT → リトライ_予約_健診内容

      --- 変更ルート ---
      変更_予約日(TTS) → 入力_変更_予約日(STT) → OpenAI_変更_予約日
          ├─ 当日 → END_当日予約不可(TTS) → 完了フラグ_当日予約不可(status=2) → 切断
          ├─ 有効日付/わからない → 変更_胃カメラ有無(TTS) → 入力_変更_胃カメラ有無(DTMF) → OpenAI_変更_胃カメラ有無
          │                        → [共通ルート: 希望時期]
          └─ NO_RESULT → リトライ_変更_予約日

      --- キャンセルルート ---
      キャンセル_予約日(TTS) → 入力_キャンセル_予約日(STT) → OpenAI_キャンセル_予約日
          ├─ 当日 → END_当日予約不可(TTS) → 完了フラグ_当日予約不可(status=2) → 切断
          ├─ 有効日付/わからない → [共通ルート: 氏名聴取（希望時期スキップ）]
          └─ NO_RESULT → リトライ_キャンセル_予約日

      --- 問い合わせルート ---
      問い合わせ_内容確認(TTS) → 入力_問い合わせ_内容確認(STT) → OpenAI_問い合わせ_内容確認
          → 問い合わせ_その他問合せ(TTS) → 入力_問い合わせ_その他問合せ(STT) → OpenAI_問い合わせ_その他問合せ
          → [共通ルート: 氏名聴取（希望時期スキップ）]

      --- 共通ルート ---
      [予約/変更ルートから] → 共通_希望時期(TTS) → 入力_共通_希望時期(STT) → OpenAI_共通_希望時期
          ├─ 当日 → END_当日予約不可(TTS) → 完了フラグ_当日予約不可(status=2) → 切断
          ├─ 有効 → 人数判定_ContextMatchRouter(OpenAI_人数確認の結果を参照)
          └─ NO_RESULT → リトライ_共通_希望時期

      [キャンセル/問い合わせルートから] → 人数判定_ContextMatchRouter

      人数判定_ContextMatchRouter:
          ├─ 複数名 → ジャンプ_生年月日聴取(氏名スキップ: 代表者氏名で設定済み)
          └─ .*(個人/デフォルト) → ジャンプ_氏名聴取

      ジャンプ_氏名聴取(Custom Jump to Flow) → [氏名サブフロー返却] → ジャンプ_生年月日聴取
      ジャンプ_生年月日聴取(Custom Jump to Flow) → [生年月日サブフロー返却]
          → ジャンプ_RAG検索(Custom Jump to Flow) → [RAGサブフロー返却]
          → ジャンプ_電話番号聴取(Custom Jump to Flow) → [電話番号サブフロー内で終話]

      --- メインフロー内終話パターン ---
      END_クリニック案内(status=3) → 切断
      END_当日予約不可(status=2) → 切断
      END_聴取失敗(status=2) → 切断
      END_時間外(status=6) → 切断
      END_非通知(status=2) → 切断
    notes: |
      冒頭チェーン順序: wait → saveContextModel2DB → incoming-classifier → acceptance_times
      用件確認リトライNo more → 問い合わせルートへフォールバック（Gen2動作を再現）
      予約ルートの採用定期のみ所定用紙→病院指定の2段階分岐あり
      キャンセル/問い合わせルートは希望時期をスキップして直接氏名聴取（または複数名なら生年月日）へ
      複数名ルートではContextMatchRouterで氏名サブフローをスキップ

  - flow_name: "鹿児島生協病院$氏名聴取_20260413"
    diagram: |
      *** 完全コピー対象（CLAUDE.md Rule 9） ***
      docs/reference/bivr/samples/json/氏名聴取.json を完全コピーする。
      フロー名プレフィックスのみ「鹿児島生協病院$」に置換。構造・接続・スクリプトは一切変更不可。

      構成: TTS → AmiVoice STT → OpenAI正規化 → Retry → script_結果返却_氏名
      リトライ上限到達時は氏名未取得のままスキップ。
    notes: "CLAUDE.md Rule 9/11準拠。フロー名プレフィックスのみ置換。"

  - flow_name: "鹿児島生協病院$生年月日聴取_20260413"
    diagram: |
      *** 完全コピー対象（CLAUDE.md Rule 9） ***
      docs/reference/bivr/samples/json/生年月日聴取_復唱あり.json を完全コピーする。
      フロー名プレフィックスのみ「鹿児島生協病院$」に置換。構造・接続・スクリプトは一切変更不可。

      構成: TTS → DTMF AmiVoice STT → OpenAI変換 → DOB Re-confirmation → Retry → script_結果返却_生年月日
      2桁入力時は元号確認ステップへ分岐。
    notes: "CLAUDE.md Rule 9/11準拠。復唱あり版を使用。"

  - flow_name: "鹿児島生協病院$電話番号聴取_20260413"
    diagram: |
      *** 完全コピー対象（CLAUDE.md Rule 9/10） ***
      docs/reference/bivr/samples/json/電話番号聴取_復唱あり.json を完全コピーする。
      フロー名プレフィックスのみ「鹿児島生協病院$」に置換。構造・接続・スクリプトは一切変更不可。

      構成: incoming-classifier → 携帯/固定分岐 → Phone Normalization → Re-confirmation → script_結果返却

      *** 以下の終話チェーンのみ施設固有のカスタマイズが必要 ***
      電話番号聴取完了後の終話チェーンで、smsFlag分岐を施設固有に設定する:

      [終話チェーン（施設固有部分）]
        → smsFlag分岐(ContextMatchRouter: classification値を参照)
            ├─ 予約のキャンセル → 完了フラグ(status=1, smsFlag=-1) → END_受付完了_キャンセル(TTS) → 切断
            └─ .*(予約/変更/問い合わせ) → 完了フラグ(status=1, smsFlag=1) → END_受付完了(TTS) → 切断
    notes: |
      CLAUDE.md Rule 9/10準拠。電話番号聴取部分はリファレンスから完全コピー。
      終話チェーン（smsFlag分岐）のみ施設固有にカスタマイズ。
      smsFlag分岐: classification値をContextMatchRouterで参照し、キャンセルのみsmsFlag=-1。

  - flow_name: "鹿児島生協病院$RAG検索_20260413"
    diagram: |
      *** 完全コピー対象（CLAUDE.md Rule 16） ***
      docs/reference/bivr/samples/json/RAG検索.json を完全コピーする。
      フロー名プレフィックスのみ「鹿児島生協病院$」に置換。
    notes: "パターン3のうちパターン2部分（全終話前RAG）。TTS文言はプロパティで制御。"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB用）---
context_fields:
  # --- 標準フィールド（itemDefault: true）---
  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "健診の予約"
      - order: "2"
        value: "予約の変更"
      - order: "3"
        value: "予約のキャンセル"
      - order: "4"
        value: "その他問合せ"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。Gen2のenum値をそのまま使用"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "受診者氏名（フルネーム）。複数名ルートでは代表者氏名がセットされる"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "受診者生年月日"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "着信番号自動格納"

  - context_name: "additionalPhoneNumber"
    context_name_jp: "連絡先電話番号"
    display_type: "PHONE_NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "聴取する連絡先電話番号"

  - context_name: "status"
    context_name_jp: "状態"
    display_type: "STATUS"
    range_values:
      - id: "1"
        order: "1"
        value: "未処理"
      - id: "2"
        order: "2"
        value: "代表案内"
      - id: "3"
        order: "3"
        value: "クリニック案内"
      - id: "6"
        order: "6"
        value: "時間外"
    item_default: true
    editable: true
    deletable: true
    notes: "1=未処理（正常完了） 2=代表案内（当日予約不可・聴取失敗・非通知） 3=クリニック案内 6=時間外"

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

  # --- 施設固有フィールド（itemDefault: false）---
  - context_name: "number_of_people"
    context_name_jp: "申込人数"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "個人/複数名。OpenAI_人数確認の出力値"

  - context_name: "workplace_name"
    context_name_jp: "職場名"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "複数名ルートのみ。職場名をフリーテキストで保存"

  - context_name: "checkup_type"
    context_name_jp: "健診内容"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "採用定期/協会けんぽ/その他健診/わからない。予約ルートのみ"

  - context_name: "reservationDate"
    context_name_jp: "現在の予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "変更/キャンセルルートのみ。日付形式で保存"

  - context_name: "DesiredreservationDate"
    context_name_jp: "希望時期"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "予約/変更の共通ルート。フリーテキストで保存（日付形式ではない）"

  - context_name: "gastrocamera"
    context_name_jp: "胃カメラ有無"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "有/無。変更ルートのみ"

  - context_name: "question"
    context_name_jp: "内容確認"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "問い合わせルートのみ。フリーテキスト"

  - context_name: "other_inquiries"
    context_name_jp: "その他問合せ"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "問い合わせルートのその他問合せ + RAGサブフローで捕捉した追加質問"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # --- メインフロー聴取項目 ---
  - order: 1
    name: "人数確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "number_of_people"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "個人"
      - "複数名"
    notes: "DTMF 1=個人, 2=複数名。リトライNo more→用件確認へスキップ（個人扱い）"

  - order: 2
    name: "代表者氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "複数名ルートのみ。カタカナでフルネーム正規化。リトライNo more→スキップ（氏名空のまま次へ）"

  - order: 3
    name: "職場名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "workplace_name"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "複数名ルートのみ。フリーテキスト。リトライNo more→スキップ"

  - order: 4
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "健診の予約"
      - "予約の変更"
      - "予約のキャンセル"
      - "その他問合せ"
    notes: "DTMF 1=健診の予約, 2=予約の変更, 3=予約のキャンセル, 4=その他問合せ。リトライNo more→問い合わせルートへフォールバック"

  - order: 5
    name: "予約_健診内容"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "checkup_type"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "採用定期"
      - "協会けんぽ"
      - "その他健診"
      - "わからない"
    notes: "DTMF 1=採用定期, 2=協会けんぽ, 3=その他健診。「わからない」は音声のみ。予約ルートのみ実行"

  - order: 6
    name: "予約_所定用紙"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "肯定"
      - "否定"
    notes: "DTMF 1=はい(持っている), 2=いいえ(持っていない)。予約-採用定期ルートのみ。context保存不要（ルーティングのみ）"

  - order: 7
