    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "肯定"
      - "否定"
    notes: "DTMF 1=はい(指示あり), 2=いいえ(指示なし)。予約-採用定期-所定用紙なしルートのみ。context保存不要（ルーティングのみ）"

  - order: 8
    name: "変更_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels:
      - "日付テキスト"
      - "当日"
    notes: "変更ルートのみ。日付テキストまたは「わからない」。OpenAIで「当日」検出時はnext分岐でEND_当日予約不可へ"

  - order: 9
    name: "変更_胃カメラ有無"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "gastrocamera"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "有"
      - "無"
    notes: "DTMF 1=有, 2=無。変更ルートのみ"

  - order: 10
    name: "キャンセル_予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels:
      - "日付テキスト"
      - "当日"
    notes: "キャンセルルートのみ。日付テキストまたは「わからない」。OpenAIで「当日」検出時はnext分岐でEND_当日予約不可へ"

  - order: 11
    name: "問い合わせ_内容確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "question"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "問い合わせルートのみ。フリーテキスト保存。リトライNo more→スキップ"

  - order: 12
    name: "問い合わせ_その他問合せ"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
