# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "人数確認"
    tts_announcement: "お電話ありがとうございます。鹿児島生協病院の、健診専用、AI電話です。今回のお申込みは、お一人分ですか、複数名でしょうか。お一人の場合は1を、複数名の場合は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "個人"
        - "複数名"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「一人」「個人」「一名」「自分だけ」を含む"
          output: "個人"
        - input: "DTMF 2 または「複数」「二人」「三人」「グループ」「団体」「会社」を含む"
          output: "複数名"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "number_of_people"
    next_step: "個人→用件確認 / 複数名→代表者氏名"
    retry_failure: "skip"

  - step_name: "代表者氏名"
    tts_announcement: "それでは、代表者様のお名前をフルネームでお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "氏名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "カタカナ正規化した氏名（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "patientName"
    next_step: "職場名"
    retry_failure: "skip"

  - step_name: "職場名"
    tts_announcement: "職場名をお答えください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "職場名テキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "workplace_name"
    next_step: "用件確認"
    retry_failure: "skip"

  - step_name: "用件確認"
    tts_announcement: "ご用件を次の4つのうちのいずれかでお話ください。健診の予約は1番、予約の変更は2番、予約のキャンセルは3番、その他お問い合わせは4番。それではお話ください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "健診の予約"
        - "予約の変更"
        - "予約のキャンセル"
        - "その他問合せ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「新規」「申し込み」を含む（「変更」「キャンセル」を含まない）"
          output: "健診の予約"
        - input: "DTMF 2 または「変更」「日程変更」を含む"
          output: "予約の変更"
        - input: "DTMF 3 または「キャンセル」「取り消し」「取消」を含む"
          output: "予約のキャンセル"
        - input: "DTMF 4 または「問い合わせ」「質問」「確認」「聞きたい」を含む"
          output: "その他問合せ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "健診の予約→予約_健診内容 / 予約の変更→変更_予約日 / 予約のキャンセル→キャンセル_予約日 / その他問合せ→問い合わせ_内容確認"
    retry_failure: "skip"

  - step_name: "予約_健診内容"
    tts_announcement: "健診の種類についてお伺いします。これよりご案内する番号を、ダイヤルプッシュ、または番号でお答えください。検査結果を会社へ提出する採用時健診、定期健診は1番。協会けんぽの生活習慣病予防健診は2番。人間ドック等、それ以外の健診は3番。わからない場合は、わからないとお答えください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "採用定期"
        - "協会けんぽ"
        - "その他健診"
        - "わからない"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「採用」「定期」を含む"
          output: "採用定期"
        - input: "DTMF 2 または「協会」「けんぽ」「生活習慣」を含む"
          output: "協会けんぽ"
        - input: "DTMF 3 または「人間ドック」「ドック」「それ以外」を含む"
          output: "その他健診"
        - input: "「わからない」「不明」を含む"
          output: "わからない"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "checkup_type"
    next_step: "採用定期→予約_所定用紙 / 協会けんぽ・その他健診・わからない→共通_希望時期"
    retry_failure: "skip"

  - step_name: "予約_所定用紙"
    tts_announcement: "結果を記載する所定の用紙はお持ちですか。お持ちの場合は1を、お持ちでない場合は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "肯定"
        - "否定"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「持っている」「ある」を含む"
          output: "肯定"
        - input: "DTMF 2 または「いいえ」「持っていない」「ない」を含む"
          output: "否定"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "肯定→END_クリニック案内 / 否定→予約_病院指定"
    retry_failure: "skip"

  - step_name: "予約_病院指定"
    tts_announcement: "職場の担当者から鹿児島生協病院で受診するよう指示はありましたか。はいの場合は1を、いいえの場合は2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "肯定"
        - "否定"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」「ある」を含む"
          output: "肯定"
        - input: "DTMF 2 または「いいえ」「ない」「わからない」を含む"
          output: "否定"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "肯定→共通_希望時期 / 否定→END_クリニック案内"
    retry_failure: "skip"

  - step_name: "変更_予約日"
    tts_announcement: "現在の予約日を教えてください。わからない場合には、わからない、とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト"
        - "当日"
        - "NO_RESULT"
      mapping:
        - input: "具体的な日付が含まれる（YYYY-MM-DD形式に変換可能）"
          output: "日付テキスト（そのまま保存）"
        - input: "「今日」「本日」「きょう」を含む"
          output: "当日"
        - input: "「わからない」「不明」を含む"
          output: "日付テキスト（「わからない」をそのまま保存）"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "reservationDate"
    next_step: "当日→END_当日予約不可 / その他→変更_胃カメラ有無"
    retry_failure: "skip"

  - step_name: "変更_胃カメラ有無"
    tts_announcement: "続いて、ご予約のコースの中に胃カメラの検査はございますか。ございましたら1を、なければ2を押してください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "有"
        - "無"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「ある」「ございます」を含む"
          output: "有"
        - input: "DTMF 2 または「いいえ」「ない」「ございません」を含む"
          output: "無"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "gastrocamera"
    next_step: "共通_希望時期"
    retry_failure: "skip"

  - step_name: "キャンセル_予約日"
    tts_announcement: "現在の予約日を教えてください。わからない場合には、わからない、とお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "日付テキスト"
        - "当日"
        - "NO_RESULT"
      mapping:
        - input: "具体的な日付が含まれる"
          output: "日付テキスト（そのまま保存）"
        - input: "「今日」「本日」「きょう」を含む"
          output: "当日"
        - input: "「わからない」「不明」を含む"
          output: "日付テキスト（「わからない」をそのまま保存）"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "reservationDate"
    next_step: "当日→END_当日予約不可 / その他→人数判定_ContextMatchRouter（希望時期スキップ）"
    retry_failure: "skip"

  - step_name: "問い合わせ_内容確認"
    tts_announcement: "それでは、ご用件をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "question"
    next_step: "問い合わせ_その他問合せ"
    retry_failure: "skip"

  - step_name: "問い合わせ_その他問合せ"
    tts_announcement: "その他、健診の内容で追加のご連絡事項はございますか。ございましたら、このままお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "フリーテキスト"
      mapping:
        - input: "音声認識結果"
          output: "フリーテキスト（そのまま保存）"
      no_result_condition: "音声認識結果が空"
    save_to: "other_inquiries"
    next_step: "人数判定_ContextMatchRouter（希望時期スキップ）"
    retry_failure: "skip"

  - step_name: "共通_希望時期"
    tts_announcement: "受診を希望される時期をお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "希望時期テキスト"
        - "当日"
        - "NO_RESULT"
      mapping:
        - input: "具体的な時期・日付が含まれる"
          output: "希望時期テキスト（そのまま保存）"
        - input: "「今日」「本日」「きょう」を含む"
          output: "当日"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "DesiredreservationDate"
    next_step: "当日→END_当日予約不可 / その他→人数判定_ContextMatchRouter"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # --- 異常系（デフォルト必須 -- 削除禁止）---
  - name: "END_非通知"
    condition: "非通知着信"
    tts_announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "受付時間外"
    tts_announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "リトライ上限到達（クリティカルステップ）"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # --- 施設固有終話（メインフロー内）---
  - name: "END_クリニック案内"
    condition: "予約-採用定期ルートで所定用紙あり、または病院指定なし"
    tts_announcement: "大変恐れ入りますが、今回のご予約は谷山生協クリニックにて承ります。電話番号を申しあげますのでそちらへおかけなおしください。番号は099-210-2211、繰り返します、番号は099-210-2211、繰り返します、番号は099-210-2211。お電話ありがとうございました。それでは失礼いたします。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_クリニック案内"

  - name: "END_当日予約不可"
    condition: "予約日・希望時期が当日"
    tts_announcement: "当日の予約についてはAI電話ではご対応できませんので、代表電話の099-267-1455におかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_当日予約不可"

  # --- 正常終話（電話番号サブフロー内 -- self_contained）---
  - name: "END_受付完了"
    condition: "全聴取完了 かつ classification in {健診の予約, 予約の変更, その他問合せ}"
    tts_announcement: "お申し込みを承りました。3診療日以内に担当者から折り返し電話、もしくはSMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_受付完了"

  - name: "END_受付完了_キャンセル"
    condition: "全聴取完了 かつ classification = 予約のキャンセル"
    tts_announcement: "予約のキャンセルを承りました。3診療日以内に担当者から折り返しご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"
    status: "1"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付完了_キャンセル"

# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
  patterns:
    - condition: "classification=予約のキャンセル"
      sms_flag: "-1"
      notes: "キャンセルはSMS送信なし"
    - condition: "classification=健診の予約 | 予約の変更 | その他問合せ"
      sms_flag: "1"
      notes: "予約・変更・問い合わせはSMS送信あり"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "問い合わせ_その他問合せの後（問い合わせルートのみ）"
  pre_termination: true
  # パターン3（Gen2→Gen3移管デフォルト）:
  #   パターン1: 問い合わせルート内で内容確認後にRAGサブフロー
  #   パターン2: 全終話前（生年月日サブフロー返却後、電話番号サブフロー前）にRAGサブフロー
  # RAGサブフローはdocs/reference/bivr/samples/json/RAG検索.jsonを完全コピー。
  # TTS文言はプロパティで制御:
  #   パターン2初回: "何かご質問はございますか？"
  #   ループ時: "その他に何かご質問はございますか？ない場合は「ありません」のようにお話しください。"

# --- セクション9: TTSモジュール一覧 ---
tts_modules:
  # --- メインフロー: 冒頭チェーン ---
  - module_name: "冒頭_アナウンス"
    purpose: "冒頭施設案内"
    announcement: "お電話ありがとうございます。鹿児島生協病院の、健診専用、AI電話です。"

  - module_name: "時間外_アナウンス"
    purpose: "時間外案内"
    announcement: "お電話ありがとうございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"

  - module_name: "非通知_アナウンス"
    purpose: "非通知案内"
    announcement: "恐れ入りますが、電話番号を通知しておかけ直しください。お電話ありがとうございました。"

  # --- メインフロー: 聴取ステップ ---
  - module_name: "人数確認"
    purpose: "人数確認案内"
    announcement: "今回のお申込みは、お一人分ですか、複数名でしょうか。お一人の場合は1を、複数名の場合は2を押してください。"

  - module_name: "代表者氏名"
    purpose: "代表者氏名聴取案内（複数名ルート）"
    announcement: "それでは、代表者様のお名前をフルネームでお話ください。"

  - module_name: "職場名"
    purpose: "職場名聴取案内（複数名ルート）"
    announcement: "職場名をお答えください。"

  - module_name: "用件確認"
    purpose: "用件選択案内（4択）"
    announcement: "ご用件を次の4つのうちのいずれかでお話ください。健診の予約は1番、予約の変更は2番、予約のキャンセルは3番、その他お問い合わせは4番。それではお話ください。"

  - module_name: "予約_健診内容"
    purpose: "健診内容選択案内（予約ルート）"
    announcement: "健診の種類についてお伺いします。これよりご案内する番号を、ダイヤルプッシュ、または番号でお答えください。検査結果を会社へ提出する採用時健診、定期健診は1番。協会けんぽの生活習慣病予防健診は2番。人間ドック等、それ以外の健診は3番。わからない場合は、わからないとお答えください。"

  - module_name: "予約_所定用紙"
    purpose: "所定用紙確認案内（予約-採用定期ルート）"
    announcement: "結果を記載する所定の用紙はお持ちですか。お持ちの場合は1を、お持ちでない場合は2を押してください。"

  - module_name: "予約_病院指定"
    purpose: "病院指定確認案内（予約-採用定期ルート）"
    announcement: "職場の担当者から鹿児島生協病院で受診するよう指示はありましたか。はいの場合は1を、いいえの場合は2を押してください。"

  - module_name: "変更_予約日"
    purpose: "現在の予約日聴取案内（変更ルート）"
    announcement: "現在の予約日を教えてください。わからない場合には、わからない、とお話ください。"

  - module_name: "変更_胃カメラ有無"
    purpose: "胃カメラ有無確認案内（変更ルート）"
    announcement: "続いて、ご予約のコースの中に胃カメラの検査はございますか。ございましたら1を、なければ2を押してください。"

  - module_name: "キャンセル_予約日"
    purpose: "現在の予約日聴取案内（キャンセルルート）"
    announcement: "現在の予約日を教えてください。わからない場合には、わからない、とお話ください。"

  - module_name: "問い合わせ_内容確認"
    purpose: "内容確認聴取案内（問い合わせルート）"
    announcement: "それでは、ご用件をお話ください。"

  - module_name: "問い合わせ_その他問合せ"
    purpose: "その他問合せ聴取案内（問い合わせルート）"
    announcement: "その他、健診の内容で追加のご連絡事項はございますか。ございましたら、このままお話ください。"

  - module_name: "共通_希望時期"
    purpose: "希望時期聴取案内（予約/変更共通）"
    announcement: "受診を希望される時期をお話ください。"

  # --- メインフロー: 終話TTS ---
  - module_name: "END_クリニック案内"
    purpose: "谷山生協クリニック案内終話"
    announcement: "大変恐れ入りますが、今回のご予約は谷山生協クリニックにて承ります。電話番号を申しあげますのでそちらへおかけなおしください。番号は099-210-2211、繰り返します、番号は099-210-2211、繰り返します、番号は099-210-2211。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_当日予約不可"
    purpose: "当日予約不可案内終話"
    announcement: "当日の予約についてはAI電話ではご対応できませんので、代表電話の099-267-1455におかけ直しください。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_聴取失敗"
    purpose: "リトライ上限終話"
    announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"

  # --- 電話番号サブフロー内: 終話TTS ---
  - module_name: "END_受付完了"
    purpose: "受付完了終話（SMS有り）"
    announcement: "お申し込みを承りました。3診療日以内に担当者から折り返し電話、もしくはSMSにてご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"

  - module_name: "END_受付完了_キャンセル"
    purpose: "キャンセル受付完了終話（SMS無し）"
    announcement: "予約のキャンセルを承りました。3診療日以内に担当者から折り返しご連絡いたします。お電話ありがとうございました。それでは失礼いたします。"

