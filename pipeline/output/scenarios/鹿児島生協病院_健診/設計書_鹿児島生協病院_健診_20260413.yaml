    resolved: false
  - item: "RAGサブフロー配置パターン3の要否"
    resolved: false
  - item: "環境指定（デモで仮設定済み）"
    resolved: false
  - item: "clinicalDepartment/clinicalDepartment2/medicalCardNumber を除外して問題ないか"
