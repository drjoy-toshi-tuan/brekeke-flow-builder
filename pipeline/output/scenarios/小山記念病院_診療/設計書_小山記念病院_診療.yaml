# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3移管案件。元資料: docs/migration/gen2_小山記念病院_診療.md"
  - "個人情報4点（氏名→生年月日→電話番号→診察券番号）を用件確認の前に聴取する（Gen2の順序を維持）"
  - "当日の新規予約・日程変更はAI電話では対応不可。代表電話案内。ただし当日のキャンセルのみは可能（本日希望確認で「いいえ」と案内する仕組み）"
  - "特殊診療科のルーティング（6パターン）: リハビリ科(0299-85-1172), 救急科/歯科(代表0299-85-1111), 健康管理センター(050-1725-3302), くりや耳鼻咽喉科(0299-85-1115), くりやデンタルクリニック(0299-77-9200), 麻酔科・放射線科・新生児室(受付不可)"
  - "歯科と言われた場合は代表電話案内。ただし「くりや歯科」と言われた場合はくりやデンタルクリニックとして処理（OpenAIプロンプト内で判定）"
  - "呼吸器のみと言われた場合は内科/外科を確認する（OpenAIプロンプト内で対応。追加のSTTモジュールは不要 → NO_RESULT扱いで再質問）"
  - "紹介状なし + 初診の場合は選定療養費注意喚起アナウンスを発話（TTS_選定療養費_注意）"
  - "受診歴の聴取は診察>予約ルートのみ。変更/キャンセル/日時の確認では取得しない"
  - "検査>日時の確認では予約日・希望日を聴取しない（検査項目のみ→RAG→終話）"
  - "予約日/希望日の当日判定: 当日→即END_本日案内。過去日→1回のみ再聴取。再聴取後も過去日/当日→END_本日案内"
  - "smsFlag は3段階分岐: 3（予約+紹介状無+携帯）/ 1（携帯+それ以外）/ -1（非携帯）。Gen2のsmsFlag=0は-1にマッピング"
  - "Gen2のfailed/checkoutフィールドはcontextに残す（Dr.JOY画面での確認用途）"
  - "categoryフィールド（診察/検査）はGen3で追加。終話TTS分岐に使用"
  - "Gen2のendpoint/smsFlagはsaveContextModel2DBに含めない（saveCompletionFlag2dbパラメータ）"
  - "Gen2のstatus=0（途中切断）はGen3では使用禁止。途中切断はシステム自動処理"
  - "失敗終話（Gen2の3-13）のstatus=1を維持。Gen3のEND_聴取失敗（リトライ上限）はstatus=3"
  - "診察券番号は0から始まる8桁。静的JSONのmax_dtmf_lengthはデフォルト（変更不要）"
  - "Gen2での入力正規化ルール: 「定期,新薬,再診,最新,禁忌,印刷」→診察、「お薬,契約,要約,薬」→予約、「電気,でんき」→新規、「いいです,肺」→肯定。これらはOpenAIプロンプトに反映する"

