# smsFlag分岐設計
sms_flag_routing:
  enabled: true
  routing_keys:
    - "classification"
    - "referralLetter"
    - "phonetype"
  patterns:
    - condition: "phonetype=携帯 AND classification=予約 AND referralLetter=無"
      sms_flag: "3"
      notes: "Gen2準拠。紹介状なし予約の携帯宛SMS（選定療養費注意喚起含む特別テンプレート）"
    - condition: "phonetype=携帯 AND NOT(classification=予約 AND referralLetter=無)"
      sms_flag: "1"
      notes: "Gen2準拠。通常の携帯宛SMS"
    - condition: "phonetype!=携帯"
      sms_flag: "-1"
      notes: "携帯以外はSMS送信なし。Gen2のsmsFlag=0に相当"
  implementation_notes: |
    Script モジュール（script_smsFlag判定）で実装する。
    phonetype は電話番号聴取サブフローの結果返却値（1=携帯, 2=その他）から判定。
    classification と referralLetter は saveContext2DB に保存済みの値を $runner.getModuleResult() で取得。
    判定結果に基づいて3つの saveCompletionFlag2db モジュールに分岐:
    - 完了フラグ_正常終話_sms3 (status=1, smsFlag=3)
    - 完了フラグ_正常終話_sms1 (status=1, smsFlag=1)
    - 完了フラグ_正常終話_nosms (status=1, smsFlag=-1)

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "3"
  inquiry_insertion_point: "全正常終話の直前（RAGサブフロー経由で終話に到達）"
  pre_termination: true
  notes: |
    Gen2→Gen3移管デフォルト（CLAUDE.md Rule 16）。
    Gen2の3-14「その他お問い合わせなどはございますでしょうか」に相当。
    RAGサブフローは docs/reference/bivr/samples/json/RAG検索.json を完全コピー。
    初回TTS: 「その他お問い合わせなどはございますでしょうか。こちらの電話では、よくある質問などにも対応が可能ですのでお話しくださいませ。ない場合はないとお話しください。」
    ループTTS: 「その他に何かご質問はございますか。ない場合は「ありません」のようにお話しください。」
    RAGで回答できない場合: 「ご質問いただいた内容はAI電話ではご対応できませんので、折り返しでご確認させていただきます。」

