# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # --- メインフロー聴取項目 ---
  - order: 1
    name: "本日希望確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "はい"
      - "いいえ"
    notes: "DTMF 1=はい(本日), 2=いいえ(翌診療日以降/キャンセル)。はい→END_本日案内、いいえ→用件カテゴリへ"

  - order: 2
    name: "用件カテゴリ"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "category"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "診察"
      - "検査"
    notes: "DTMF 1=診察, 2=検査。健康診断の再検査は「診察」を選択する旨をアナウンス"

  - order: 3
    name: "診察用件"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "DTMF 1=予約を取る, 2=変更する, 3=キャンセルする, 4=日時の確認。条件: category=診察"

  - order: 4
    name: "検査用件"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "変更"
      - "キャンセル"
      - "確認"
    notes: "DTMF 1=変更する, 2=キャンセルする, 3=日時の確認。条件: category=検査"

  - order: 5
    name: "紹介状"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "referralLetter"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "有"
      - "無"
      - "不明"
    notes: "条件: 診察>予約ルートのみ。紹介状「無」の場合は選定療養費注意喚起アナウンスを発話"

  - order: 6
    name: "受診歴"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "visitHistory"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "あり"
      - "なし"
      - "不明"
    notes: "条件: 診察>予約ルートのみ（紹介状有無にかかわらず聴取）。あり=再診→症状聴取へ、なし=初診→診療科聴取へ"

  - order: 7
    name: "症状"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "symptoms"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "条件: 診察>予約かつ再診のみ。フリーテキスト保存"

  - order: 8
    name: "診療科"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "clinicalDepartment"
    openai_processing: "normalize"
    output_format: "label"
    output_labels:
      - "{診療科名}"
      - "代表電話案内"
      - "リハビリ科"
      - "健康管理センター"
      - "くりや耳鼻咽喉科"
      - "くりやデンタルクリニック"
      - "受付不可"
    notes: >
      条件: 診察ルート全般。profile_words: 診療科辞書。
      OpenAI next配列で特殊診療科分岐（10スロット使い切り）:
      [0]TIMEOUT [1]ERROR [2]NO_RESULT [3]success(通常の診療科名)
      [4]代表電話案内(救急/歯科) [5]リハビリ科 [6]健康管理センター
      [7]くりや耳鼻咽喉科 [8]くりやデンタルクリニック [9]受付不可(麻酔科/放射線科/新生児室)。
      呼吸器のみの場合は内科/外科を確認（OpenAIプロンプト内で対応）。
      歯科→くりや歯科ならくりやデンタルクリニック、それ以外の歯科は代表電話案内。

  - order: 9
    name: "検査項目"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "examinationItems"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "条件: 検査ルート全般。フリーテキスト保存"

  - order: 10
    name: "予約日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reservationDate"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "valid"
      - "当日"
      - "過去日"
    notes: "条件: 変更/キャンセルルート。YYYY-MM-DD形式に変換。当日→END_本日案内、過去日→1回のみ再聴取"

  - order: 11
    name: "予約希望日"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "DesiredreservationDate"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "valid"
      - "当日"
      - "過去日"
    notes: "条件: 予約/変更ルート、キャンセル時変更希望あり。フリーワードで保存（希望に添えない場合があるため）。当日→END_本日案内、過去日→1回のみ再聴取"

  - order: 12
    name: "キャンセル理由"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "reason"
    openai_processing: "summarize"
    output_format: "free_text"
    output_labels: []
    notes: "条件: キャンセルルートのみ。フリーテキスト保存"

  - order: 13
    name: "変更希望確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "reservationChange"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "あり"
      - "なし"
    notes: "DTMF 1=はい(あり), 2=いいえ(なし)。条件: キャンセルルートのみ。あり→希望日聴取、なし→RAGサブフローへ"

  # --- サブフロー聴取項目（静的JSONコピー。参考情報として記載）---
  - order: 14
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー（静的JSON）。profile_words: 氏名辞書"

  - order: 15
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels:
      - "valid"
      - "不正値"
      - "2桁_0007"
      - "2桁_0831"
      - "2桁_3263"
    notes: "サブフロー（静的JSON）。DOB Re-confirmation あり。DTMF 8桁=生年月日入力"

  - order: 16
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "サブフロー（静的JSON）。Phone Normalization + Re-confirmation。incoming-classifierで携帯/その他分岐。DTMF 11桁=電話番号入力"

  - order: 17
    name: "診察券番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: false
    save_to: "medicalCardNumber"
    openai_processing: "classify"
    output_format: "number"
    output_labels:
      - "数字"
      - "わからない"
    notes: "サブフロー（静的JSON）。わからない→スキップ。DTMF 10桁=診察券番号入力"

# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "本日希望確認"
    tts_announcement: "本日の予約に関するお問い合わせ、もしくは予約希望日は本日でしょうか。翌診療日以降、または予約のキャンセルのみの方はいいえとお伝えください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「本日」「今日」を含む肯定"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「翌日以降」「キャンセル」を含む否定"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "肯定・否定どちらにも該当しない"
    save_to: null
    next_step: "はい→END_本日案内、いいえ→用件カテゴリ"
    retry_failure: "end_failure"

  - step_name: "用件カテゴリ"
    tts_announcement: "ご用件をお伺いします。なお、健康診断の再検査については診察を選択してください。次の2つのうちからお選びください。「診察の予約」、「検査の予約」、どちらになりますか。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "診察"
        - "検査"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「診察」「診療」「再検査」を含む"
          output: "診察"
        - input: "DTMF 2 または「検査」を含む"
          output: "検査"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "診察・検査どちらにも該当しない"
    save_to: "category"
    next_step: "診察→診察用件、検査→検査用件"
    retry_failure: "end_failure"

  - step_name: "診察用件"
    tts_announcement: "ご用件を、次の4つのうちからお選びください。「予約を取る」「変更する」「キャンセルする」「日時の確認」、それではお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「取る」「取りたい」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「変えたい」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「取り消し」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」「日時」「いつ」を含む"
          output: "確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "4つの用件のいずれにも該当しない"
    save_to: "classification"
    next_step: "予約→紹介状、変更→診療科、キャンセル→診療科、確認→診療科"
    retry_failure: "end_failure"

  - step_name: "検査用件"
    tts_announcement: "ご用件を、次の3つのうちからお選びください。「変更する」「キャンセルする」「日時の確認」、それではお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「変更」を含む"
          output: "変更"
        - input: "DTMF 2 または「キャンセル」を含む"
          output: "キャンセル"
        - input: "DTMF 3 または「確認」「日時」を含む"
          output: "確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "3つの用件のいずれにも該当しない"
    save_to: "classification"
    next_step: "変更→検査項目、キャンセル→検査項目、確認→検査項目"
    retry_failure: "end_failure"

  - step_name: "紹介状"
    tts_announcement: "他の医療機関からの紹介状はお持ちでしょうか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "有"
        - "無"
        - "不明"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「持っている」「ある」等の肯定"
          output: "有"
        - input: "「いいえ」「持っていない」「ない」等の否定"
          output: "無"
        - input: "「わからない」「不明」等"
          output: "不明"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "有無が判定できない"
    save_to: "referralLetter"
    next_step: "無→選定療養費注意喚起→受診歴、有/不明→受診歴"
    retry_failure: "end_failure"

  - step_name: "受診歴"
    tts_announcement: "当院でのご受診は初めてですか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "不明"
        - "NO_RESULT"
      mapping:
        - input: "「初めてです」「初めて」「初診」等の肯定"
          output: "なし"
        - input: "「初めてではない」「通っている」「前にも」「再診」等の否定"
          output: "あり"
        - input: "「わからない」等"
          output: "不明"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "初診/再診が判定できない"
    save_to: "visitHistory"
    next_step: "あり(再診)→症状、なし(初診)/不明→診療科"
    retry_failure: "end_failure"

  - step_name: "症状"
    tts_announcement: "前回と同じ症状でご受診ですか。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "症状テキスト"
      mapping:
        - input: "音声認識結果"
          output: "症状テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "symptoms"
    next_step: "診療科"
    retry_failure: "skip"

  - step_name: "診療科"
    tts_announcement: "診療科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "{診療科名}"
        - "代表電話案内"
        - "リハビリ科"
        - "健康管理センター"
        - "くりや耳鼻咽喉科"
        - "くりやデンタルクリニック"
        - "受付不可"
        - "NO_RESULT"
      mapping:
        - input: "通常の診療科名・類義語"
          output: "{診療科名}"
        - input: "「救急」「緊急」「歯科」（くりや歯科以外）"
          output: "代表電話案内"
        - input: "「リハビリ」「リハ」"
          output: "リハビリ科"
        - input: "「健康診断」「人間ドック」「健康管理」"
          output: "健康管理センター"
        - input: "「耳鼻科」「耳鼻咽喉」「くりや耳鼻」"
          output: "くりや耳鼻咽喉科"
        - input: "「くりや歯科」「くりやデンタル」「デンタル」"
          output: "くりやデンタルクリニック"
        - input: "「麻酔」「放射線」「新生児」"
          output: "受付不可"
        - input: "「呼吸器」のみ（内科/外科が不明）"
          output: "NO_RESULT（プロンプト内で内科/外科を確認する再質問を生成）"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "診療科が特定できない"
    save_to: "clinicalDepartment"
    next_step: "通常→ルート別次ステップ、特殊→各END_特殊診療科"
    retry_failure: "end_failure"

  - step_name: "検査項目"
    tts_announcement: "検査の内容をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "検査項目テキスト"
      mapping:
        - input: "音声認識結果"
          output: "検査項目テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "examinationItems"
    next_step: "変更/キャンセル→予約日、確認→RAGサブフロー"
    retry_failure: "skip"

  - step_name: "予約日"
    tts_announcement: "予約票に記載されている予約日を「4月1日」のように日付でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "valid"
        - "当日"
        - "過去日"
        - "NO_RESULT"
      mapping:
        - input: "翌日以降の有効な日付"
          output: "valid"
        - input: "本日・今日・当日・着信日と一致する日付"
          output: "当日"
        - input: "着信日より前の日付"
          output: "過去日"
        - input: "日付として認識できない"
          output: "NO_RESULT"
      no_result_condition: "日付として解析不能"
    save_to: "reservationDate"
    next_step: "valid→ルート別次ステップ、当日→END_本日案内、過去日→再聴取（1回のみ）"
    retry_failure: "end_failure"

  - step_name: "予約希望日"
    tts_announcement: "翌診療日以降のお日にちで、ご希望の日にちをお話しください。なお、希望に添えない場合は担当者よりご連絡いたします。それではお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "valid"
        - "当日"
        - "過去日"
        - "NO_RESULT"
      mapping:
        - input: "翌日以降の有効な日付"
          output: "valid"
        - input: "本日・今日・当日"
          output: "当日"
        - input: "着信日より前の日付"
          output: "過去日"
        - input: "日付として認識できない"
          output: "NO_RESULT"
      no_result_condition: "日付として解析不能"
    save_to: "DesiredreservationDate"
    next_step: "valid→RAGサブフロー、当日→END_本日案内、過去日→再聴取（1回のみ）"
    retry_failure: "end_failure"

  - step_name: "キャンセル理由"
    tts_announcement: "予約キャンセルの理由を簡潔にお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "理由テキスト"
      mapping:
        - input: "音声認識結果"
          output: "理由テキスト（フリーテキスト）"
      no_result_condition: "音声認識結果が空"
    save_to: "reason"
    next_step: "変更希望確認"
    retry_failure: "skip"

  - step_name: "変更希望確認"
    tts_announcement: "予約日の変更を希望されますか。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "あり"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」等の肯定"
          output: "あり"
        - input: "DTMF 2 または「いいえ」等の否定"
          output: "なし"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "肯定/否定が判定できない"
    save_to: "reservationChange"
    next_step: "あり→予約希望日、なし→RAGサブフロー"
    retry_failure: "end_failure"

