# --- セクション3: フローの目的 ---
purpose: >
  患者からの予約専用AI電話を受け、個人情報（氏名・生年月日・連絡先電話番号・診察券番号）を先に聴取した後、
  用件カテゴリ（診察/検査）と詳細用件（予約/変更/キャンセル/日時の確認）を聴取し、
  診療科・予約日・希望日等のルート別情報を収集して折り返し受付を自動化する。
  特殊診療科（リハビリ科・救急科等6パターン）は専用番号への案内で終話する。
  当日の新規予約・日程変更は代表電話案内（当日キャンセルのみ可能）。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "小山記念病院$診療_20260409"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → TTS_非通知アナウンス → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外/TIMEOUT/ERROR → TTS_時間外アナウンス → 完了フラグ_時間外(status=6, smsFlag=-1) → 切断
                        └─ 受付可 → TTS_冒頭アナウンス
                              → Jump_氏名聴取(サブフロー)
                              → Jump_生年月日聴取(サブフロー)
                              → Jump_電話番号聴取(サブフロー)
                              → Jump_診察券番号聴取(サブフロー)
                              → TTS_本日希望確認 → STT_本日希望 → OpenAI_本日希望
                                  ├─ はい(本日) → TTS_本日案内 → 完了フラグ_本日案内(status=2, smsFlag=-1) → 切断
                                  ├─ いいえ → TTS_用件カテゴリ → STT_用件カテゴリ → OpenAI_用件カテゴリ
                                  │   ├─ 診察 → saveContext_カテゴリ(診察) → 診察用件ルート(下記)
                                  │   ├─ 検査 → saveContext_カテゴリ(検査) → 検査用件ルート(下記)
                                  │   └─ NO_RESULT → リトライ_用件カテゴリ
                                  │       ├─ Retry → TTS_用件カテゴリ
                                  │       └─ No more → TTS_聴取失敗 → 完了フラグ_聴取失敗(status=3, smsFlag=-1) → 切断
                                  └─ NO_RESULT → リトライ_本日希望
                                      ├─ Retry → TTS_本日希望確認
                                      └─ No more → TTS_聴取失敗 → 完了フラグ_聴取失敗(status=3, smsFlag=-1) → 切断

      ─── 診察用件ルート ───
      TTS_診察用件 → STT_診察用件 → OpenAI_診察用件
          ├─ 予約 → saveContext_用件(予約)
          │   → TTS_紹介状 → STT_紹介状 → OpenAI_紹介状
          │       ├─ 無 → saveContext_紹介状(無) → TTS_選定療養費注意
          │       │   → TTS_受診歴 → STT_受診歴 → OpenAI_受診歴
          │       │       ├─ 再診(あり) → saveContext_受診歴 → TTS_症状 → STT_症状 → OpenAI_症状 → saveContext_症状 → 診療科聴取
          │       │       └─ 初診(なし)/不明 → saveContext_受診歴 → 診療科聴取
          │       └─ 有/不明 → saveContext_紹介状
          │           → TTS_受診歴 → STT_受診歴 → OpenAI_受診歴
          │               ├─ 再診(あり) → saveContext_受診歴 → TTS_症状 → STT_症状 → OpenAI_症状 → saveContext_症状 → 診療科聴取
          │               └─ 初診(なし)/不明 → saveContext_受診歴 → 診療科聴取
          ├─ 変更 → saveContext_用件(変更) → 診療科聴取
          ├─ キャンセル → saveContext_用件(キャンセル) → 診療科聴取
          ├─ 日時の確認 → saveContext_用件(確認) → 診療科聴取
          └─ NO_RESULT → リトライ_診察用件
              ├─ Retry → TTS_診察用件
              └─ No more → TTS_聴取失敗 → 完了フラグ_聴取失敗(status=3, smsFlag=-1) → 切断

      ─── 診療科聴取（診察ルート共通）───
      TTS_診療科 → STT_診療科 → OpenAI_診療科
          ├─ 通常の診療科 → saveContext_診療科
          │   ├─ [予約ルート] → TTS_希望日 → STT_希望日 → OpenAI_希望日
          │   │     ├─ 当日 → TTS_本日案内 → 完了フラグ_本日案内(status=2, smsFlag=-1) → 切断
          │   │     ├─ 過去日 → TTS_希望日_再聴取 → STT_希望日 → OpenAI_希望日
          │   │     │     ├─ valid → saveContext_希望日 → Jump_RAGサブフロー → 正常終話分岐
          │   │     │     └─ 当日/過去日 → TTS_本日案内 → 完了フラグ_本日案内 → 切断
          │   │     └─ valid → saveContext_希望日 → Jump_RAGサブフロー → 正常終話分岐
          │   ├─ [変更ルート] → TTS_予約日 → STT_予約日 → OpenAI_予約日
          │   │     ├─ 当日 → TTS_本日案内 → 完了フラグ_本日案内 → 切断
          │   │     ├─ 過去日 → TTS_予約日_再聴取 → ... → saveContext_予約日
          │   │     └─ valid → saveContext_予約日
          │   │           → TTS_希望日 → ... → saveContext_希望日 → Jump_RAGサブフロー → 正常終話分岐
          │   ├─ [キャンセルルート] → TTS_予約日 → ... → saveContext_予約日
          │   │     → TTS_理由 → STT_理由 → OpenAI_理由 → saveContext_理由
          │   │     → TTS_変更希望 → STT_変更希望 → OpenAI_変更希望
          │   │         ├─ あり → TTS_希望日 → ... → saveContext_希望日 → Jump_RAGサブフロー → 正常終話分岐
          │   │         └─ なし → saveContext_変更希望(なし) → Jump_RAGサブフロー → 正常終話分岐
          │   └─ [日時の確認ルート] → Jump_RAGサブフロー → 正常終話分岐
          ├─ 代表電話案内(救急/歯科) → TTS_特殊_代表電話 → 完了フラグ_特殊診療科(status=2, smsFlag=-1) → 切断
          ├─ リハビリ科 → TTS_特殊_リハビリ → 完了フラグ_特殊診療科(status=2, smsFlag=-1) → 切断
          ├─ 健康管理センター → TTS_特殊_健康管理 → 完了フラグ_特殊診療科(status=2, smsFlag=-1) → 切断
          ├─ くりや耳鼻咽喉科 → TTS_特殊_耳鼻咽喉 → 完了フラグ_特殊診療科(status=2, smsFlag=-1) → 切断
          ├─ くりやデンタルクリニック → TTS_特殊_デンタル → 完了フラグ_特殊診療科(status=2, smsFlag=-1) → 切断
          ├─ 受付不可(麻酔科/放射線科/新生児室) → TTS_特殊_受付不可 → 完了フラグ_特殊診療科(status=2, smsFlag=-1) → 切断
          └─ NO_RESULT → リトライ_診療科
              ├─ Retry → TTS_診療科
              └─ No more → TTS_聴取失敗 → 完了フラグ_聴取失敗(status=3, smsFlag=-1) → 切断

      ─── 検査用件ルート ───
      TTS_検査用件 → STT_検査用件 → OpenAI_検査用件
          ├─ 変更 → saveContext_用件(変更) → 検査項目聴取
          ├─ キャンセル → saveContext_用件(キャンセル) → 検査項目聴取
          ├─ 日時の確認 → saveContext_用件(確認) → 検査項目聴取
          └─ NO_RESULT → リトライ_検査用件
              ├─ Retry → TTS_検査用件
              └─ No more → TTS_聴取失敗 → 完了フラグ_聴取失敗(status=3, smsFlag=-1) → 切断

      ─── 検査項目聴取 ───
      TTS_検査項目 → STT_検査項目 → OpenAI_検査項目 → saveContext_検査項目
          ├─ [変更/キャンセルルート] → TTS_予約日 → ... → saveContext_予約日
          │     → TTS_希望日 → ... → saveContext_希望日 → Jump_RAGサブフロー → 正常終話分岐
          └─ [日時の確認ルート] → Jump_RAGサブフロー → 正常終話分岐

      ─── 正常終話分岐（RAGサブフロー後）───
      Jump_RAGサブフロー(最後の質問)
        → script_終話分岐（category + classification に基づくルーティング）
            ├─ 診察_予約 → TTS_END_診察_予約 → smsFlag分岐
            ├─ 診察_変更 → TTS_END_診察_変更 → smsFlag分岐
            ├─ 診察_キャンセル → TTS_END_診察_キャンセル → smsFlag分岐
            ├─ 診察_確認 → TTS_END_診察_確認 → smsFlag分岐
            ├─ 検査_変更 → TTS_END_検査_変更 → smsFlag分岐
            ├─ 検査_キャンセル → TTS_END_検査_キャンセル → smsFlag分岐
            └─ 検査_確認 → TTS_END_検査_確認 → smsFlag分岐

      ─── smsFlag分岐 ───
      script_smsFlag判定（classification, referralLetter, phonetype に基づく判定）
          ├─ smsFlag=3（予約+紹介状無+携帯） → 完了フラグ_正常終話_sms3(status=1, smsFlag=3) → 切断
          ├─ smsFlag=1（携帯+上記以外） → 完了フラグ_正常終話_sms1(status=1, smsFlag=1) → 切断
          └─ smsFlag=-1（携帯以外） → 完了フラグ_正常終話_nosms(status=1, smsFlag=-1) → 切断
    notes: |
      Gen2の聴取順序を維持: 個人情報4点 → 本日確認 → 用件カテゴリ → 詳細分岐。
      特殊診療科は6パターン。OpenAI_診療科のnext配列で分岐（10スロット使い切り）。
      正常終話は7パターンのTTS + 3パターンのsmsFlag = 最大21チェーンだが、script_終話分岐とscript_smsFlag判定で集約。
      当日判定は予約日/希望日のOpenAIモジュール内で実施。

