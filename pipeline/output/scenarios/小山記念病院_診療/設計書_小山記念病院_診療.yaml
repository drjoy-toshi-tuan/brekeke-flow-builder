# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  # --- 標準フィールド（itemDefault: true）---
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "予約"
      - order: "2"
        value: "変更"
      - order: "3"
        value: "キャンセル"
      - order: "4"
        value: "確認"
    item_default: true
    editable: true
    deletable: true
    notes: "Gen2丸め値: 診察>予約→予約, 診察>変更/検査>変更→変更, 診察>キャンセル/検査>キャンセル→キャンセル, 日時の確認/検査の確認→確認"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "サブフローで聴取"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
