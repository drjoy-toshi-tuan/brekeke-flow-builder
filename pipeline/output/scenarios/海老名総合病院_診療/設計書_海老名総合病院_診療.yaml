sms_flag_routing:
  enabled: false
  routing_keys: []
  patterns: []
  notes: "Gen2 移管では完了系 smsFlag=1 固定、異常系 smsFlag=-1 固定。携帯/固定での SMS 配信制御は Dr.JOY 側で phonetype を参照して実施（フローは phonetype を保存するのみ）。Gen2 の「途中切断で smsFlag=0」ルールは Gen3 status=0 廃止に伴い不適用"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"
  inquiry_insertion_point: ""
  pre_termination: true
  notes: |
    パターン2（全終話前に「最後の問い合わせ」RAG）:
    - 個人情報聴取完了後、終話分岐の直前に「海老名総合病院$RAG検索」を1回呼び出す
    - RAG サブフローは Gen2 プロンプトの「最後の問い合わせ」(question) + フロー中 FAQ 対応を統合したもの
    - 発話文言（サブフロー内の TTS）: 「他にご用件はございますか？」
    - Gen2 プロンプト 1-2 の確認ルートにおける「内容確認」時の FAQ 回答禁止ルールは、scenario_flow 上で RAG をその位置に挟まないことで実現済み
    - 折り返し対応時間を聞かれた場合は「順番に対応しておりますので、しばらくお待ちください」、折り返し希望時間は「ご要望を承りました。」と回答（RAG サブフロー側の想定回答）

