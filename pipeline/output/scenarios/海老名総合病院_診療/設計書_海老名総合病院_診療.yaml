    tts_announcement: "本日から2営業日後までのご予約に関するお問い合わせは、受付時間内に外来予約センターへおかけ直しください。3日以内の予約に関するお問い合わせですか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」「3日以内」等を含む発話"
          output: "はい"
        - input: "DTMF 2 または「いいえ」「違います」「3日以上」「P」「DH」「DeNA」等を含む発話"
          output: "いいえ"
      no_result_condition: "肯定・否定いずれにも分類できない"
    save_to: ""
    next_step: "はい→END_3日以内 / いいえ→用件確認"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "用件確認"
    tts_announcement: "ご用件を、次の４つからお話ください。予約の変更は1を、キャンセルは2を、確認は3を、紹介状のある方・予約を取りたい方は4。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "変更"
        - "キャンセル"
        - "確認"
        - "予約希望"
      mapping:
        - input: "DTMF 1 または「変更」「薬品」を含む発話"
