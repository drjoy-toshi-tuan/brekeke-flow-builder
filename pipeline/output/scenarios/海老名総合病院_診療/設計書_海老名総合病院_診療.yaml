    editable: true
    deletable: true
    notes: "氏名聴取サブフローで保存（カタカナ変換・復唱なし）"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "生年月日聴取サブフローで保存。DOB Re-confirmation 内蔵。和暦/西暦対応。2桁年は再質問で元号確定"

  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: true
    notes: "診察券番号聴取サブフローで保存。3桁以上必須。「わからない」は空欄で保存"

  - context_name: "telephoneNumber"
    context_name_jp: "電話番号（着信）"
    display_type: "PHONE_NUMBER_CALL"
    range_values: []
    item_default: true
    editable: true
    deletable: true
