        value: "消化器内科"
      - order: "11"
        value: "呼吸器内科"
      - order: "12"
        value: "血液内科"
      - order: "13"
        value: "神経内科"
      - order: "14"
        value: "リウマチ膠原病科"
      - order: "15"
        value: "糖尿病センター"
      - order: "16"
        value: "形成外科"
      - order: "17"
        value: "皮膚科"
      - order: "18"
        value: "循環器内科"
      - order: "19"
        value: "脳神経外科"
      - order: "20"
        value: "腎臓内科"
      - order: "21"
        value: "呼吸器外科"
      - order: "22"
        value: "産科"
      - order: "23"
        value: "婦人科"
      - order: "24"
        value: "乳腺外科"
      - order: "25"
        value: "救急科"
      - order: "26"
        value: "リハビリテーション科"
      - order: "27"
        value: "歯科口腔外科"
      - order: "28"
        value: "麻酔科"
      - order: "29"
