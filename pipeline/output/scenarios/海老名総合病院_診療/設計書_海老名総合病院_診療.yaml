    notes: "Gen2 function enum の 31 科 + 登録なし。予約不可 6 科（リハビリテーション科/歯科口腔外科/麻酔科/放射線科/内視鏡/在宅診療科）は診療科 hearing で分岐して代表電話案内へ。no_result_default='登録なし' で NO_RESULT 時に自動格納"

  - context_name: "reservationDate"
    context_name_jp: "予約日"
    display_type: "DATE"
    range_values: []
    item_default: false
    editable: true
    deletable: true
