# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
    blocker: false
    notes: "Dr.JOY 管理画面で確認し設定。フローJSON には含めない"

  - item: "対象環境（デモ/本番）"
    resolved: false
    blocker: false
    notes: "仮設定: demo。本番リリース時に変更"

  - item: "acceptance_times（営業時間チェック）の要否"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトに時間外判定ロジックなし（use_acceptance_times: false で設定）。Brekeke/Dr.JOY 側で時間外ルーティングする場合は追加設定要"

  - item: "Gen2 status=0（冒頭切断/途中切断）の扱い"
    resolved: false
    blocker: false
    notes: "CLAUDE.md 規約により Gen3 では status=0 使用禁止。該当状態は Dr.JOY 側で通話ログから判別する方針で問題ないか要確認"

  - item: "smsFlag 仕様: 完了系 smsFlag=1 固定 / 異常系 smsFlag=-1 固定"
    resolved: false
    blocker: false
    notes: "Gen2 の smsFlag=0（途中切断）は Gen3 status=0 廃止に伴い -1 に統一。固定電話に SMS が届かない件は Dr.JOY 側で phonetype を参照して配信制御する想定。フロー側で phonetype=その他 のとき smsFlag=-1 にする選択肢もあり"

  - item: "キャンセルルートの直近予約判定を冒頭の3日以内確認に統合してよいか"
    resolved: false
    blocker: false
    notes: "Gen2 ではキャンセルルート内で「当日/翌日/翌々日」判定を再度実施していたが、Gen3 では冒頭 3 日以内確認に統合。ユーザー体験上の差異を要確認"

  - item: "用件確認のリトライ回数（Gen3 標準 2 回でよいか）"
    resolved: false
    blocker: false
    notes: "Gen2 プロンプトにリトライ回数の明記なし。Gen3 標準 2 回で仮設定。顧客要望により 3 回等に変更要"

  - item: "用件曖昧時確認ステップ（Gen2 プロンプト 1-13）の実装方式"
    resolved: false
    blocker: false
    notes: "Gen2 では「（変更/キャンセル/確認/ご予約）でよろしいですか？」と確認していた。Gen3 では用件確認 OpenAI の精度と NO_RESULT 再ヒアリングで代替。別ステップ追加の要否を要確認"

  - item: "診療科レコメンド機能の OpenAI プロンプト実装詳細"
    resolved: false
    blocker: false
    notes: "リストにない診療科 → 近しい診療科を提案。prompter が OpenAI プロンプトで対応。実運用でのレコメンド精度を要確認"

  - item: "RAG サブフローのパターン（pattern: 2 固定でよいか）"
    resolved: false
    blocker: false
    notes: "Gen2→Gen3 デフォルトは pattern: 3（フロー内 + 終話前）だが、Gen2 プロンプト 1-2 例外ルール（確認ルートの内容確認で FAQ 禁止）と整合するため、本設計では pattern: 2（終話前のみ）を採用。顧客承認要"

  - item: "最後の問い合わせ RAG サブフローの TTS 文言・FAQ 回答範囲"
    resolved: false
    blocker: false
