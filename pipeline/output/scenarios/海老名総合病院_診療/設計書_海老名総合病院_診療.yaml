        - input: "DTMF 2 または「キャンセル」「取消」を含む発話"
          output: "キャンセル"
        - input: "DTMF 3 または「確認」「再診」「大変」を含む発話"
          output: "確認"
        - input: "DTMF 4 または「予約」「紹介状」「薬」「お薬」「要約」「通訳」「集約」「新規」「初診」「不審」「電気」「でんき」を含む発話"
          output: "予約希望"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "変更→診療科_変更 / キャンセル→診療科_キャンセル / 確認→内容確認 / 予約希望→END_予約希望"
