  flows:
    - name: "海老名総合病院$診療"
      role: "main"
      description: "冒頭 → 3日以内確認 → 用件確認(変更/キャンセル/確認/予約希望) → ルート別聴取(診療科 + 予約日 + 希望日有無 + 次回希望日) → 個人情報聴取サブフロー × 4 → RAG(最後の問い合わせ) → 用件別終話"
  subflows:
    - name: "海老名総合病院$診察券番号聴取"
      target: "診察券番号聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/診察券番号聴取.json を完全コピー。「わからない」分岐あり"
    - name: "海老名総合病院$氏名聴取"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/氏名聴取.json を完全コピー。Gen2 の「復唱しない」仕様と一致"
    - name: "海老名総合病院$生年月日聴取"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/生年月日聴取_復唱あり.json を完全コピー。和暦/西暦・2桁年再質問・DOB Re-confirmation 内蔵"
    - name: "海老名総合病院$電話番号聴取"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "CLAUDE.md Rule 9 準拠。samples/json/電話番号聴取_復唱あり.json を完全コピー。incoming-classifier + Phone Normalization + 携帯/固定判別内蔵。phonetype を保存"
    - name: "海老名総合病院$RAG検索"
      target: "RAG検索"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: "Dr.JOY 側 FAQ リストを RAG 検索するサブフロー。samples/json/RAG検索.json を完全コピー。「最後の問い合わせ」(question) の聴取および FAQ 対応を担当"

# --- セクション3: フローの目的 ---
purpose: "海老名総合病院メディカルプラザの診療予約専用AI電話として、患者からの電話を受け、用件（予約変更・キャンセル・確認）・診療科・予約日・予約希望日の有無・個人情報（氏名・生年月日・診察券番号・連絡先電話番号）を聴取してDr.JOYに保存し、折り返し受付を自動化する。本日から2営業日後までの直近予約問合せ・新規予約/紹介状問合せ・予約不可6科（リハビリテーション科/歯科口腔外科/麻酔科/放射線科/内視鏡/在宅診療科）は代表電話案内（外来予約センター）で終話する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "海老名総合病院$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
          → 着信電話番号分類(incoming-classifier)
              ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=-1) → 切断
              └─ 通常/携帯/固定 → 冒頭_アナウンス(TTS)
                    → 3日以内確認 (hearing, enum, DTMF+音声)
                        ├─ はい → END_3日以内(status=2, smsFlag=-1) → 切断
                        └─ いいえ → 用件確認 (hearing, enum, DTMF+音声)
                              ├─ 予約希望(4) → END_予約希望(status=2, smsFlag=-1) → 切断
                              ├─ 変更(1) ──┐
                              ├─ キャンセル(2) ──┐
                              │                  └→ 診療科 [用件別に分離]
                              └─ 確認(3) → 内容確認 (hearing, text) → jump_診察券番号

                    === 変更ルート ===
                    診療科_変更 (hearing, enum, no_result_default=登録なし)
                      ├─ 予約不可6科 → END_予約不可(status=2, smsFlag=-1) → 切断
                      └─ default → 予約日_変更 (hearing, datetime)
                            → 希望日有無_変更 (hearing, enum)
                                ├─ 有 → 次回希望日_変更 (hearing, text) → jump_診察券番号
                                └─ 無 → jump_診察券番号

                    === キャンセルルート ===
                    診療科_キャンセル (hearing, enum, no_result_default=登録なし)
                      ├─ 予約不可6科 → END_予約不可(status=2, smsFlag=-1) → 切断
                      └─ default → 予約日_キャンセル (hearing, datetime)
                            → 希望日有無_キャンセル (hearing, enum)
                                ├─ 有 → 次回希望日_キャンセル (hearing, text) → jump_診察券番号
                                └─ 無 → jump_診察券番号

                    === 共通: 個人情報聴取 + 最後の問い合わせ + 終話分岐 ===
                    jump_診察券番号 (subflow)
                      → jump_氏名聴取 (subflow)
                        → jump_生年月日聴取 (subflow, 復唱あり)
                          → jump_電話番号聴取 (subflow, 復唱あり, phonetype保存)
                            → jump_RAG検索 (subflow, 「他にご用件はございますか？」)
                              → 終話分岐 (context_match_router on classification)
                                  ├─ 変更 → END_変更(status=1, smsFlag=1) → 切断
                                  ├─ キャンセル → END_キャンセル(status=1, smsFlag=1) → 切断
                                  └─ 確認 → END_確認(status=1, smsFlag=1) → 切断

      リトライ上限到達 → END_聴取失敗(status=3, smsFlag=-1) → 切断
    notes: |
      - acceptance_times 不使用（Gen2 プロンプトに時間外判定なし）
      - キャンセルルート内の「当日/翌日/翌々日」個別判定は廃止し、冒頭の「3日以内」質問に統合
      - 診療科の復唱・氏名の復唱は行わない（Gen2 仕様準拠）
      - 連絡先電話番号と生年月日はそれぞれのサブフローで復唱（DOB Re-confirmation / Phone Normalization + Re-confirmation）
      - 「最後の問い合わせ」(question) は RAG サブフローに集約。Gen2 のフロー途中 FAQ 対応は簡素化

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # --- 冒頭ブロック ---
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 3日以内確認

  # --- 3日以内確認（冒頭直近予約ガード）---
  - step: 3日以内確認
    type: hearing
    output_format: enum
    conditions:
      - match: "はい"
        next: END_3日以内
      - match: "いいえ"
        next: 用件確認

  # --- 用件確認（DTMF + 音声）---
  - step: 用件確認
    type: hearing
    output_format: enum
    conditions:
      - match: "変更"
        next: 診療科_変更
      - match: "キャンセル"
        next: 診療科_キャンセル
      - match: "確認"
        next: 内容確認
      - match: "予約希望"
        next: END_予約希望

  # --- 確認ルート: 内容確認(text) → 個人情報聴取へ直結（FAQ 対応は禁止） ---
  - step: 内容確認
    type: hearing
    output_format: text
    next: jump_診察券番号

  # === 変更ルート ===
  - step: 診療科_変更
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "リハビリテーション科"
        next: END_予約不可
      - match: "歯科口腔外科"
        next: END_予約不可
      - match: "麻酔科"
        next: END_予約不可
      - match: "放射線科"
        next: END_予約不可
      - match: "内視鏡"
        next: END_予約不可
      - match: "在宅診療科"
        next: END_予約不可
      - match: "default"
        next: 予約日_変更

  - step: 予約日_変更
    type: hearing
    output_format: datetime
    next: 希望日有無_変更

  - step: 希望日有無_変更
    type: hearing
    output_format: enum
    conditions:
      - match: "有"
        next: 次回希望日_変更
      - match: "無"
        next: jump_診察券番号

  - step: 次回希望日_変更
    type: hearing
    output_format: text
    next: jump_診察券番号

  # === キャンセルルート ===
  - step: 診療科_キャンセル
    type: hearing
    output_format: enum
    no_result_default: "登録なし"
    conditions:
      - match: "リハビリテーション科"
        next: END_予約不可
      - match: "歯科口腔外科"
        next: END_予約不可
      - match: "麻酔科"
        next: END_予約不可
      - match: "放射線科"
        next: END_予約不可
      - match: "内視鏡"
        next: END_予約不可
      - match: "在宅診療科"
        next: END_予約不可
      - match: "default"
        next: 予約日_キャンセル

  - step: 予約日_キャンセル
    type: hearing
    output_format: datetime
    next: 希望日有無_キャンセル

  - step: 希望日有無_キャンセル
    type: hearing
    output_format: enum
    conditions:
      - match: "有"
        next: 次回希望日_キャンセル
      - match: "無"
        next: jump_診察券番号

  - step: 次回希望日_キャンセル
    type: hearing
    output_format: text
    next: jump_診察券番号

  # === 個人情報聴取サブフロー（4連）===
  - step: jump_診察券番号
    type: subflow
    flowname: "海老名総合病院$診察券番号聴取"
    next: jump_氏名聴取

  - step: jump_氏名聴取
    type: subflow
    flowname: "海老名総合病院$氏名聴取"
    next: jump_生年月日聴取

  - step: jump_生年月日聴取
    type: subflow
    flowname: "海老名総合病院$生年月日聴取"
    next: jump_電話番号聴取

  - step: jump_電話番号聴取
    type: subflow
    flowname: "海老名総合病院$電話番号聴取"
    next: jump_RAG検索

  # --- RAG サブフロー（「最後の問い合わせ」= question を聴取 + FAQ対応）---
  - step: jump_RAG検索
    type: subflow
    flowname: "海老名総合病院$RAG検索"
    next: 終話分岐

  # --- 終話分岐: 用件別に3つの終話へ ---
  - step: 終話分岐
    type: context_match_router
    reference_module: "classification"
    conditions:
      - match: "変更"
        next: END_変更
      - match: "キャンセル"
        next: END_キャンセル
      - match: "確認"
        next: END_確認

  # --- 終話ブロック ---
  - step: END_変更
    type: termination
    termination_ref: "END_変更"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_確認
    type: termination
    termination_ref: "END_確認"

  - step: END_3日以内
    type: termination
    termination_ref: "END_3日以内"

  - step: END_予約希望
    type: termination
    termination_ref: "END_予約希望"

  - step: END_予約不可
    type: termination
    termination_ref: "END_予約不可"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "classification"
    context_name_jp: "用件区分"
    display_type: "CLASSIFICATION"
    range_values:
      - order: "1"
        value: "変更"
      - order: "2"
        value: "キャンセル"
      - order: "3"
        value: "確認"
      - order: "4"
        value: "予約希望"
    item_default: true
    editable: true
    deletable: true
    notes: "用件区分。予約希望は新規予約/紹介状問合せ（代表電話案内へ）"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values:
