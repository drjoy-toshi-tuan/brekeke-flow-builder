# --- セクション11: 特記事項・制約 ---
special_notes:
  - "Gen2→Gen3 移管。元資料: docs/reference/customer_docs/【診療1】：海老名総合病院.md、移管ノート: docs/migration/gen2_海老名総合病院_診療.md"
  - "Gen2 プロンプト status=0（冒頭切断/途中切断）は CLAUDE.md 規約に従い Gen3 では使用禁止。該当する中断系の識別は Dr.JOY 側で通話ログ/タイムスタンプから判別"
  - "Gen2 の endpoint（冒頭切断/時間外/電話転送/電話案内/途中切断/通話完了）フィールドは Gen3 では context_fields に含めない（Dr.JOY 側通話ログで代替）"
  - "Gen2 の smsFlag は saveCompletionFlag2db のパラメータとして扱い、context_fields には含めない（Gen3 標準）。完了系 smsFlag=1、異常系 smsFlag=-1 に統一（Gen2 の smsFlag=0 は -1 に置換）"
  - "Gen2 PascalCase の DesiredreservationDate は Gen3 命名規則に従い camelCase の desiredReservationDate に変更"
  - "Gen2 snake_case の scheduled_appointment_date は Gen3 命名規則に従い camelCase の scheduledAppointmentDate に変更"
  - "acceptance_times は不使用（Gen2 プロンプトに時間外判定ロジックなし）。END_時間外 は CLAUDE.md 規約によりデフォルト必須として定義だけ残す（通常は到達しない）"
  - "キャンセルルート内の「当日/翌日/翌々日（直近3日）」個別判定は Gen3 では廃止し、冒頭の「3日以内確認」質問に統合（二重判定を排除）"
  - "予約不可 6 科（リハビリテーション科/歯科口腔外科/麻酔科/放射線科/内視鏡/在宅診療科）は END_予約不可 で外来予約センター案内し終話"
  - "用件確認で「予約希望」（DTMF 4・紹介状・新規予約・初診問合せ）判定は END_予約希望 で外来予約センター案内し終話"
  - "診療科の復唱は行わない（Gen2 プロンプト 2 仕様準拠）。氏名の復唱も行わない（同）"
  - "生年月日は生年月日聴取サブフロー内の DOB Re-confirmation で復唱・和暦/西暦正規化・2桁年再質問を実施"
  - "連絡先電話番号は電話番号聴取サブフロー内で incoming-classifier + Phone Normalization + 携帯/固定判別 + 復唱を実施。phonetype（携帯/その他）を保存"
