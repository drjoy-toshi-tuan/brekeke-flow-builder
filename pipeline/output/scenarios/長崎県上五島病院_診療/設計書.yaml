    output_labels: []
    notes: "変更ルート。YYYY-MM-DD形式。リトライ失敗時はスキップ"

  - order: 13
    name: "予約希望日_変更"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "desiredReservationDate"
