# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "3診療日確認"
    tts_announcement: "お電話いただいているお問い合わせは、休日・祝日を除く3診療日以降のご用件でしょうか。はい、もしくは、いいえでお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "肯定"
        - "否定"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「そうです」等の肯定表現"
          output: "肯定"
        - input: "DTMF 2 または「いいえ」「違います」等の否定表現"
          output: "否定"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない発話"
    save_to: null
    next_step: "肯定→ジャンプ_氏名聴取, 否定→END_3診療日以内案内"
    retry_failure: "skip"

  - step_name: "用件確認"
    tts_announcement: "次の4つのうちのいずれかでご用件をお話しください。1、予約を取る、2、予約を変更する、3、予約をキャンセルする、4、予約確認。それではお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "予約確認"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「予約を取りたい」「薬」「お薬」等"
          output: "予約"
        - input: "DTMF 2 または「変更」「予約を変更したい」等"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」「予約を取り消したい」等"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」「予約確認」等"
          output: "予約確認"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "4つの用件のいずれにも分類できない"
    save_to: "classification"
    next_step: "用件中継_案内(TTS) → 用件別ルートへ"
    retry_failure: "end_failure"

  - step_name: "受診歴確認"
    tts_announcement: "当院でのご受診は初めてですか？"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "初診"
        - "再診"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「はい」「初めて」等の肯定表現"
          output: "初診"
        - input: "DTMF 2 または「いいえ」「通院中」「再診」「診察」「定期」等"
          output: "再診"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "初診/再診を判別できない"
    save_to: "history"
    next_step: "診療科_予約"
    retry_failure: "skip"

  - step_name: "診療科_予約"
    tts_announcement: "受診を希望されている診療科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "受付OK"
        - "発熱外来"
        - "受付不可"
        - "NO_RESULT"
      mapping:
        - input: "診療科リスト内の名称または類義語"
          output: "正規化された診療科名を保存した上で、以下の可否判定ルールに従い分岐"
      no_result_condition: "診療科を特定できない"
    save_to: "clinicalDepartment"
    next_step: "受付OK→診療科2, 発熱外来→END_発熱外来, 受付不可→END_受付不可"
    retry_failure: "skip"

  - step_name: "診療科_変更"
    tts_announcement: "受診を希望されている診療科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "受付OK"
        - "発熱外来"
        - "受付不可"
        - "NO_RESULT"
      mapping:
        - input: "診療科リスト内の名称または類義語"
          output: "正規化された診療科名を保存。変更ルートの可否判定: グループA+B=受付OK、グループC=受付不可、発熱外来=特別"
      no_result_condition: "診療科を特定できない"
    save_to: "clinicalDepartment"
    next_step: "受付OK→予約日_変更, 発熱外来→END_発熱外来, 受付不可→END_受付不可"
    retry_failure: "skip"

  - step_name: "診療科_キャンセル"
    tts_announcement: "受診を希望されている診療科をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "受付OK"
        - "発熱外来"
        - "受付不可"
        - "NO_RESULT"
      mapping:
        - input: "診療科リスト内の名称または類義語"
          output: "正規化された診療科名を保存。キャンセルルートの可否判定: グループA+B=受付OK、グループC=受付不可、発熱外来=特別"
      no_result_condition: "診療科を特定できない"
    save_to: "clinicalDepartment"
    next_step: "受付OK→予約日_キャンセル, 発熱外来→END_発熱外来, 受付不可→END_受付不可"
    retry_failure: "skip"

  - step_name: "診療科2"
    tts_announcement: "他に受診を希望される診療科がある場合は、お話しください。なければないとお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "診療科名（フリーテキスト）"
        - "なし"
        - "NO_RESULT"
      mapping:
        - input: "何かしらの診療科名"
          output: "診療科名（正規化）"
        - input: "「なし」「ない」「ありません」等"
          output: "なし"
      no_result_condition: "聞き取れなかった場合"
    save_to: "clinicalDepartment2"
    next_step: "予約希望日_予約"
    retry_failure: "skip"

  - step_name: "予約希望日_予約"
    tts_announcement: "受診を希望されている時期をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "希望時期（フリーテキスト）"
      mapping:
        - input: "日付や時期の発話"
          output: "言われたまま文字起こし（フリーテキスト）"
      no_result_condition: "聞き取れなかった場合"
    save_to: "desiredReservationDate"
    next_step: "ジャンプ_RAG → END_予約"
    retry_failure: "skip"

  - step_name: "予約日_変更"
    tts_announcement: "予約票に記載されている予約日を、4月1日、のように日付でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "YYYY-MM-DD形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "日付の発話（和暦・西暦対応）"
          output: "YYYY-MM-DD形式に変換"
      no_result_condition: "日付として解釈できない"
    save_to: "reservationDate"
    next_step: "予約希望日_変更"
    retry_failure: "skip"

  - step_name: "予約希望日_変更"
    tts_announcement: "受診を希望されている時期をお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "希望時期（フリーテキスト）"
      mapping:
        - input: "日付や時期の発話"
          output: "言われたまま文字起こし（フリーテキスト）"
      no_result_condition: "聞き取れなかった場合"
    save_to: "desiredReservationDate"
    next_step: "ジャンプ_RAG → END_変更"
    retry_failure: "skip"

  - step_name: "予約日_キャンセル"
    tts_announcement: "予約票に記載されている予約日を、4月1日、のように日付でお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "YYYY-MM-DD形式の日付"
        - "NO_RESULT"
      mapping:
        - input: "日付の発話（和暦・西暦対応）"
          output: "YYYY-MM-DD形式に変換"
      no_result_condition: "日付として解釈できない"
    save_to: "reservationDate"
    next_step: "ジャンプ_RAG → END_キャンセル"
    retry_failure: "skip"

  - step_name: "確認_内容"
    tts_announcement: "ご確認内容についてお伺いします。次回の予約日時を教えて欲しい、等、ご不明な点等ございましたら、こちらでお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "確認内容（フリーテキスト）"
      mapping:
        - input: "確認したい内容の発話"
          output: "言われたまま文字起こし（フリーテキスト）"
      no_result_condition: "聞き取れなかった場合"
    save_to: "details"
    next_step: "ジャンプ_RAG → END_確認"
    retry_failure: "skip"

# --- セクション8: 終話パターン ---
termination_patterns:
  # 異常系（デフォルト必須）
  - name: "END_非通知"
    condition: "incoming-classifierで非通知と判定"
    tts_announcement: "お電話ありがとうございます。長崎県上五島病院、診察予約専用、AI電話です。申し訳ございません。電話番号が非通知設定の場合、AI電話では受付できません。通知設定をしていただくか、先頭に数字の186を付けておかけなおしください。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_非通知"

  - name: "END_時間外"
    condition: "acceptance_timesで時間外と判定"
    tts_announcement: "お電話ありがとうございます。長崎県上五島病院でございます。ただいまの時間は受付時間外です。受付時間内におかけ直しください。お電話ありがとうございました。"
    status: "6"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_時間外"

  - name: "END_聴取失敗"
    condition: "用件確認のリトライ上限到達"
    tts_announcement: "申し訳ございません。ご回答を正しく聞き取ることができませんでした。恐れ入りますが、おかけ直しください。お電話ありがとうございました。"
    status: "3"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_聴取失敗"

  # 施設固有の異常系
  - name: "END_3診療日以内案内"
    condition: "3診療日確認で否定"
    tts_announcement: "大変申し訳ございません。休日・祝日を除く2診療日以内のお問い合わせに関しましては、代表電話へおかけ直しください。電話番号が分かる場合は、そのままお電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。番号は0959-52-3000です。番号は0959-52-3000です。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_3診療日以内"

  - name: "END_発熱外来"
    condition: "診療科が発熱外来"
    tts_announcement: "申し訳ございません。発熱外来の予約はラインでお受付しております。ラインが使えない方のみ代表電話へおかけ直しください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_発熱外来"

  - name: "END_受付不可"
    condition: "診療科がグループCまたはグループB+初診"
    tts_announcement: "申し訳ございません。ご指定の診療科の予約はAI電話では受付しておりません。月曜から金曜の午前8時半から11時、13時半から15時の間に直接ご来院ください。お電話ありがとうございました。それでは失礼いたします。"
    status: "2"
    sms_flag: "-1"
    completion_flag_name: "完了フラグ_受付不可"

  # 正常系
  - name: "END_予約"
    condition: "予約ルート完了"
    tts_announcement: "予約の申し込みを受付いたしました。このお電話にてご連絡いただいた内容は、当院にて確認後、3診療日以内に折り返し電話、またはショートメッセージをお送りし、確定となります。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_予約"

  - name: "END_変更"
    condition: "変更ルート完了"
    tts_announcement: "予約変更の申し込みを受付いたしました。このお電話にてご連絡いただいた内容は、当院にて確認後、3診療日以内に折り返し電話、またはショートメッセージをお送りし、確定となります。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_変更"

  - name: "END_キャンセル"
    condition: "キャンセルルート完了"
    tts_announcement: "キャンセルの申し込みを受付いたしました。このお電話にてご連絡いただいた内容は、当院にて確認後、必要がある場合のみ折り返し電話、またはショートメッセージをお送りさせていただきます。それでは失礼いたします。"
    status: "1"
    sms_flag: "2"
    completion_flag_name: "完了フラグ_キャンセル"

  - name: "END_確認"
    condition: "確認ルート完了"
    tts_announcement: "予約確認の申し込みを受付いたしました。このお電話にてご連絡いただいた内容は、当院にて確認後、3診療日以内に折り返し電話、またはショートメッセージをお送りし、確定となります。それでは失礼いたします。"
    status: "1"
    sms_flag: "1"
    completion_flag_name: "完了フラグ_確認"

# smsFlag分岐設計
sms_flag_routing:
  enabled: false                      # 各終話パターンにsmsFlag値が固定。ContextMatchRouter不要
  routing_keys: []
  patterns:
    - condition: "予約/変更/確認で通話完了"
      sms_flag: "1"
      notes: "SMS送信あり"
    - condition: "キャンセルで通話完了"
      sms_flag: "2"
      notes: "SMS送信あり（キャンセル用文面）"
    - condition: "異常系（非通知/時間外/聴取失敗/3診療日以内/発熱外来/受付不可）"
      sms_flag: "-1"
      notes: "SMS送信なし"

# --- セクション8b: RAG/FAQ検索サブフロー ---
rag_subflow:
  pattern: "2"                        # 全終話前に「何かご質問はございますか？」RAGサブフロー
  inquiry_insertion_point: ""         # パターン2のため不使用
  pre_termination: true               # 各用件ルートの終話前にRAGサブフローを挿入

# --- セクション9: TTSモジュール一覧 ---
