# --- セクション11: 特記事項・制約 ---
special_notes:
  - "個人情報聴取順序がGen2固有: 氏名→電話番号→診察券番号→生年月日→用件の順。用件確認の前に個人情報を聴取する。Gen2プロンプトに「氏名を聴取する前に電話番号や診察券番号を聞くことは厳禁」と明記されており、この順序を厳守すること"
  - "3診療日確認: 冒頭に「3診療日以降のご用件か」を確認するゲーティングステップ。否定の場合は代表電話（0959-52-3000）を案内して終話。リトライ失敗時は肯定扱い（次へスキップ）"
  - |
    診療科可否判定ルール（3グループ分類）:
    グループA（初診・再診・キャンセル・変更すべてOK）: 産婦人科, 眼科, 耳鼻咽喉科, リハビリテーション科
    グループB（再診・キャンセル・変更のみOK、初診は不可）: 内科, 循環器内科, 消化器内科, 神経内科, 腎臓内科, 外科, 整形外科, 精神科, 泌尿器科, 総合診療科
    グループC（AI電話非対応）: 呼吸器内科, 脳神経外科, 小児科, 皮膚科, 放射線科, 麻酔科, 発熱外来, 高齢者総合外来, 胃内視鏡, 心臓カテーテル, 救急外来, 透析科, 午後外来, 発達外来, 補聴器外来
    ただし発熱外来は特別扱い（グループCの受付不可アナウンスではなく、LINE予約への誘導アナウンスを使用）
  - |
    可否判定テーブル（用件×グループ）:
    予約+初診: グループA=受付OK, グループB=受付不可, グループC=受付不可
    予約+再診: グループA=受付OK, グループB=受付OK, グループC=受付不可
    変更: グループA=受付OK, グループB=受付OK, グループC=受付不可
    キャンセル: グループA=受付OK, グループB=受付OK, グループC=受付不可
    発熱外来は用件・受診歴に関係なくEND_発熱外来へ
  - "診療科2は予約ルートのみ。全診療科を受け付ける（可否判定なし）"
  - "予約希望日はフリーテキスト格納（日付形式でなくてよい）。Gen2:「フリーワードで言われたまま文字起こし」"
  - "予約日はYYYY-MM-DD形式で格納。過去日付は再聴取。10月以降に1-9月を指定した場合は翌年扱い"
  - "キャンセルのみsmsFlag=2（他の正常系はsmsFlag=1）"
  - "END_受付不可のTTS文言にはGen2では{clinicalDepartment}の動的挿入があったが、Gen3ではTTS発話にコンテキスト変数を埋め込めないため、汎用文言（「ご指定の診療科」）に変更済み"
  - "Gen2のcheckpoint/checkout/endpointフィールドはGen3で除外。Gen2 status=0（途中切断）はGen3では使用禁止のため除外"
  - "用件中継案内（「3つほどご質問をいたします」）は4ルート共通。確認ルートでは質問が1つだが、Gen2通りの文言を維持"
  - "RAGサブフローはパターン2（全終話前に配置）。Gen2のFAQインライン対応をGen3ではRAGサブフローで代替"

# --- セクション12: 要確認事項（人間に確認が必要）---
confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
  - item: "営業時間（曜日・時間帯）-- Gen2に記載なし。acceptance_times配置要否を確認"
    resolved: false
  - item: "時間外アナウンス文言 -- デフォルト文言を仮設定中"
    resolved: false
  - item: "対象環境（demo/prod）-- demoを仮設定中"
    resolved: false
  - item: "RAGサブフローパターン -- パターン2を採用（デフォルトはパターン3だが問い合わせ専用フローなし）"
    resolved: false
  - item: "smsFlag割り当て -- 予約/変更/確認=1, キャンセル=2, 異常系=-1"
    resolved: true
  - item: "非通知アナウンス文言 -- Gen2の施設固有文言を転記済み"
    resolved: true
  - item: "各終話パターンのTTS文言 -- Gen2から転記済み"
    resolved: true
  - item: "診療科可否判定ルール（3グループ分類）-- Gen2から転記済み"
    resolved: true
