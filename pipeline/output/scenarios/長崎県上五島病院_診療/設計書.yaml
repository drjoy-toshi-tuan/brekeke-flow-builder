  - module_name: "用件確認"
    purpose: "用件聴取（4択）"
    announcement: "次の4つのうちのいずれかでご用件をお話しください。1、予約を取る、2、予約を変更する、3、予約をキャンセルする、4、予約確認。それではお話しください。"

  - module_name: "用件中継_案内"
    purpose: "用件確定後の中継アナウンス"
