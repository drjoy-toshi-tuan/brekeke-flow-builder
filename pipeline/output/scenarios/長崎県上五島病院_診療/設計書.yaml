# --- セクション3: フローの目的 ---
purpose: "患者からの電話を受け、3診療日以降の問い合わせかを確認した後、患者情報（氏名・連絡先電話番号・診察券番号・生年月日）を聴取し、用件（予約・変更・キャンセル・予約確認）を把握する。用件に応じて診療科・予約日等を聴取し、診療科の予約受付可否判定（3グループ分類）を行い、折り返し受付を自動化する。"

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "長崎県上五島病院$診療_20260408"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2) → 切断
            └─ 通常 → acceptance_times
                        ├─ 時間外 → 時間外_アナウンス(TTS) → 完了フラグ_時間外(status=6) → 切断
                        └─ 受付可 → 冒頭_アナウンス(TTS)
                                      → 3診療日確認(TTS)
                                      → 入力_3診療日確認(DTMF AmiVoice STT, max_dtmf_length=1)
                                      → OpenAI_3診療日確認
                                          ├─ 肯定 → ジャンプ_氏名聴取(Custom Jump to Flow)
                                          ├─ 否定 → 完了フラグ_3診療日以内(status=2) → END_3診療日以内案内(TTS) → 切断
                                          └─ NO_RESULT → リトライ_3診療日確認
                                                           ├─ Retry → 3診療日確認(TTS)
                                                           └─ No more → ジャンプ_氏名聴取 (スキップ: 肯定扱い)

      [氏名聴取サブフロー] → [電話番号聴取サブフロー] → [診察券番号聴取サブフロー] → [生年月日聴取サブフロー]

        → 用件確認(TTS)
        → 入力_用件確認(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_用件確認
            ├─ 予約 → saveContext_用件 → 用件中継_案内(TTS) → 受診歴確認ルート
            ├─ 変更 → saveContext_用件 → 用件中継_案内(TTS) → 変更ルート
            ├─ キャンセル → saveContext_用件 → 用件中継_案内(TTS) → キャンセルルート
            ├─ 予約確認 → saveContext_用件 → 用件中継_案内(TTS) → 確認ルート
            └─ NO_RESULT → リトライ_用件確認
                              ├─ Retry → 用件確認(TTS)
                              └─ No more → 完了フラグ_聴取失敗(status=3) → END_聴取失敗(TTS) → 切断

      --- 予約ルート ---
      受診歴確認(TTS) → 入力_受診歴確認(DTMF AmiVoice STT, max_dtmf_length=1)
        → OpenAI_受診歴確認
            ├─ 初診 → saveContext_受診歴
            ├─ 再診 → saveContext_受診歴
            └─ NO_RESULT → リトライ_受診歴確認 → No more → saveContext_受診歴(スキップ)
        → 診療科_予約(TTS) → 入力_診療科_予約(AmiVoice STT)
          → OpenAI_診療科_予約 (正規化 + 可否判定)
              ├─ 受付OK → saveContext_診療科
              │            → 診療科2(TTS) → 入力_診療科2(AmiVoice STT)
              │              → OpenAI_診療科2 → saveContext_診療科2
              │              → 予約希望日_予約(TTS) → 入力_予約希望日_予約(AmiVoice STT)
              │                → OpenAI_予約希望日_予約 → saveContext_予約希望日
              │                → ジャンプ_RAG(Custom Jump to Flow)
              │                → 完了フラグ_予約(status=1, smsFlag=1) → END_予約(TTS) → 切断
              ├─ 発熱外来 → 完了フラグ_発熱外来(status=2) → END_発熱外来(TTS) → 切断
              ├─ 受付不可 → 完了フラグ_受付不可(status=2) → END_受付不可(TTS) → 切断
              └─ NO_RESULT → リトライ_診療科_予約
                              ├─ Retry → 診療科_予約(TTS)
                              └─ No more → saveContext_診療科(スキップ) → 診療科2へ

      --- 変更ルート ---
      診療科_変更(TTS) → 入力_診療科_変更(AmiVoice STT)
        → OpenAI_診療科_変更 (正規化 + 可否判定: グループCのみ不可)
            ├─ 受付OK → saveContext_診療科
            │            → 予約日_変更(TTS) → 入力_予約日_変更(AmiVoice STT)
            │              → OpenAI_予約日_変更 → saveContext_予約日
            │              → 予約希望日_変更(TTS) → 入力_予約希望日_変更(AmiVoice STT)
            │                → OpenAI_予約希望日_変更 → saveContext_予約希望日
            │                → ジャンプ_RAG(Custom Jump to Flow)
            │                → 完了フラグ_変更(status=1, smsFlag=1) → END_変更(TTS) → 切断
            ├─ 発熱外来 → END_発熱外来(共用)
            ├─ 受付不可 → END_受付不可(共用)
            └─ NO_RESULT → リトライ_診療科_変更
                            ├─ Retry → 診療科_変更(TTS)
                            └─ No more → saveContext_診療科(スキップ) → 予約日_変更へ

      --- キャンセルルート ---
      診療科_キャンセル(TTS) → 入力_診療科_キャンセル(AmiVoice STT)
        → OpenAI_診療科_キャンセル (正規化 + 可否判定: グループCのみ不可)
            ├─ 受付OK → saveContext_診療科
            │            → 予約日_キャンセル(TTS) → 入力_予約日_キャンセル(AmiVoice STT)
            │              → OpenAI_予約日_キャンセル → saveContext_予約日
            │              → ジャンプ_RAG(Custom Jump to Flow)
            │              → 完了フラグ_キャンセル(status=1, smsFlag=2) → END_キャンセル(TTS) → 切断
            ├─ 発熱外来 → END_発熱外来(共用)
            ├─ 受付不可 → END_受付不可(共用)
            └─ NO_RESULT → リトライ_診療科_キャンセル → スキップ → 予約日_キャンセルへ

      --- 確認ルート ---
      確認_内容(TTS) → 入力_確認_内容(AmiVoice STT)
        → OpenAI_確認_内容 → saveContext_確認内容
        → ジャンプ_RAG(Custom Jump to Flow)
        → 完了フラグ_確認(status=1, smsFlag=1) → END_確認(TTS) → 切断

      --- メインフロー内終話パターン ---
      END_非通知 → 切断
      END_時間外 → 切断
      END_聴取失敗 → 切断
      END_3診療日以内案内 → 切断
      END_発熱外来 → 切断
      END_受付不可 → 切断
      END_予約 → 切断
      END_変更 → 切断
      END_キャンセル → 切断
      END_確認 → 切断
    notes: |
      Gen2の聴取順序を維持: 個人情報（氏名→電話番号→診察券番号→生年月日）を用件確認の前に聴取する。
      acceptance_timesの有無はNON-BLOCKER。不要な場合はincoming-classifierから直接冒頭アナウンスへ接続。
      診療科可否判定は用件ルートごとに異なるルールを適用（後述のstep_details参照）。

  # サブフロー図
  - flow_name: "長崎県上五島病院$氏名聴取_20260408"
    diagram: |
      --- 完全コピー対象（CLAUDE.md Rule 9） ---
