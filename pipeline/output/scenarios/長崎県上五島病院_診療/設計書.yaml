    purpose: "確認内容聴取"
    announcement: "ご確認内容についてお伺いします。次回の予約日時を教えて欲しい、等、ご不明な点等ございましたら、こちらでお話しください。"

  # 終話TTS
  - module_name: "END_3診療日以内案内"
    purpose: "3診療日以内の代表案内終話"
    announcement: "大変申し訳ございません。休日・祝日を除く2診療日以内のお問い合わせに関しましては、代表電話へおかけ直しください。電話番号が分かる場合は、そのままお電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。番号は0959-52-3000です。番号は0959-52-3000です。お電話ありがとうございました。それでは失礼いたします。"

