# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # メインフロー聴取項目
  - order: 1
    name: "3診療日確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: null                     # 直接的にコンテキストには保存しない（分岐制御のみ）
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "肯定"
      - "否定"
    notes: "DTMF 1=はい, 2=いいえ。肯定→氏名聴取へ。否定→代表電話案内で終話。リトライ失敗時は肯定扱い（次へスキップ）"

  - order: 2
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "free_text"
    output_labels: []
    notes: "サブフロー（氏名聴取.json）で聴取。カタカナ変換。復唱禁止"

  - order: 3
    name: "電話番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 11
    retry_count: 2
    echo_back: true
    save_to: "additionalPhoneNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "サブフロー（電話番号聴取_復唱あり.json）で聴取。incoming-classifierで携帯/固定分岐。復唱確認あり。DTMF 0-9=電話番号の各桁入力, #=入力確定"

  - order: 4
    name: "診察券番号"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 2
    echo_back: true
    save_to: "medicalCardNumber"
    openai_processing: "normalize"
    output_format: "number"
    output_labels: []
    notes: "サブフロー（診察券番号聴取.json）で聴取。復唱確認あり。「わからない」分岐あり。DTMF 0-9=診察券番号の各桁入力, #=入力確定"

  - order: 5
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 8
    retry_count: 2
    echo_back: true
    save_to: "patientDateOfBirth"
    openai_processing: "convert"
    output_format: "date_text"
    output_labels: []
    notes: "サブフロー（生年月日聴取_復唱あり.json）で聴取。DOB Re-confirmation + 2桁元号確認。和暦対応。DTMF 0-9=生年月日の各桁入力（8桁: YYYYMMDD）, #=入力確定"

  - order: 6
    name: "用件確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "label"
    output_labels:
      - "予約"
      - "変更"
      - "キャンセル"
      - "予約確認"
    notes: "DTMF 1=予約, 2=変更, 3=キャンセル, 4=予約確認"

  # 予約ルート聴取項目
  - order: 7
    name: "受診歴確認"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 1
    retry_count: 2
    echo_back: false
    save_to: "history"
    openai_processing: "classify"
    output_format: "label"
