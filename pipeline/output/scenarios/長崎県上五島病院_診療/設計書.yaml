  - module_name: "END_予約"
    purpose: "予約完了終話"
    announcement: "予約の申し込みを受付いたしました。このお電話にてご連絡いただいた内容は、当院にて確認後、3診療日以内に折り返し電話、またはショートメッセージをお送りし、確定となります。それでは失礼いたします。"

  - module_name: "END_変更"
    purpose: "変更完了終話"
    announcement: "予約変更の申し込みを受付いたしました。このお電話にてご連絡いただいた内容は、当院にて確認後、3診療日以内に折り返し電話、またはショートメッセージをお送りし、確定となります。それでは失礼いたします。"

  - module_name: "END_キャンセル"
    purpose: "キャンセル完了終話"
    announcement: "キャンセルの申し込みを受付いたしました。このお電話にてご連絡いただいた内容は、当院にて確認後、必要がある場合のみ折り返し電話、またはショートメッセージをお送りさせていただきます。それでは失礼いたします。"

  - module_name: "END_確認"
    purpose: "確認完了終話"
    announcement: "予約確認の申し込みを受付いたしました。このお電話にてご連絡いただいた内容は、当院にて確認後、3診療日以内に折り返し電話、またはショートメッセージをお送りし、確定となります。それでは失礼いたします。"

