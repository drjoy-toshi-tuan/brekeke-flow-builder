# 生成元: @director エージェント
# 生成日: 2026/04/22
# 確認レポート: docs/designs/確認レポート_新宿健診プラザ_健診_20260422.md
# 作業種別: Gen2→Gen3 移管
# 元資料: docs/reference/customer_docs/【本番｜n8n実行｜健診1】：新宿健診プラザ.md
# 移管ノート: docs/migration/gen2_新宿健診プラザ_健診.md
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "新宿健診プラザ"
  group_name: "新宿健診プラザ"
  flow_name: "新宿健診プラザ$健診_20260422"
  target_facility: "新宿健診プラザ（本院）＋ 立川健診プラザ（WEBフォーム送信時の受診施設選択肢）"
  office_id: "TODO_要確認"                     # NON-BLOCKER N-1: Dr.JOY 管理画面で確認
  phone_number: "03-3207-2222"                 # 予約センター代表番号（聴取失敗アナウンスで使用）
  business_hours: "24時間受付（AI電話、acceptance_times なし）"
  flow_type: "subflow"
  work_type: "gen2_migration"
  environment: "prod"

# --- セクション2: フロー構成 ---
# Gen2 yaml 構造を踏襲しつつ、個人情報聴取（氏名・生年月日・電話番号）はサブフローに分離。
# 登録番号は「わからない」特殊分岐があるためインラインhearingで実装（標準サブフロー外）。
flow_structure:
  type: "subflow"
  flows:
    - name: "新宿健診プラザ$健診_20260422"
      role: "main"
      description: >
        冒頭チェーン → 用件確認（新規予約/日時変更/キャンセル） → 用件別聴取 → 個人情報サブフロー呼出 → 用件別終話
    - name: "新宿健診プラザ$氏名聴取_20260422"
      role: "sub"
      description: "氏名聴取（カタカナ変換、復唱禁止）→ 結果返却"
    - name: "新宿健診プラザ$生年月日聴取_20260422"
      role: "sub"
      description: "生年月日聴取（和暦→西暦変換）→ DOB Re-confirmation（復唱あり）→ 結果返却"
    - name: "新宿健診プラザ$電話番号聴取_20260422"
      role: "sub"
      description: "incoming-classifier → MOBILE→着信番号復唱 / FIXED・OTHER→連絡先聴取 → Phone Normalization → Re-confirmation → 結果返却"
  subflows:
    - name: "新宿健診プラザ$氏名聴取_20260422"
      target: "氏名聴取"
      recitation: "なし"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        CLAUDE.md Rule 9 準拠。docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」を完全コピー。
        フロー名プレフィックスのみ「新宿健診プラザ$」に置換。カタカナ変換・復唱禁止（Gen2 §14 仕様）。
    - name: "新宿健診プラザ$生年月日聴取_20260422"
      target: "生年月日聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        CLAUDE.md Rule 9 準拠。生年月日聴取サブフローを完全コピー。
        DOB Re-confirmation による復唱確認あり（Gen2 §4復唱可能項目）。和暦→西暦変換ルール（元号換算：大正=1911+年/昭和=1925+年/平成=1988+年/令和=2018+年）。
    - name: "新宿健診プラザ$電話番号聴取_20260422"
      target: "電話番号聴取"
      recitation: "あり"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      termination: "return"
      notes: >
        CLAUDE.md Rule 9/10 準拠。電話番号聴取サブフローを完全コピー。
        内部で incoming-classifier によって MOBILE/FIXED/OTHER を判定：
        - MOBILE → 着信番号復唱「今おかけいただいている{番号}でよろしいですか」→ 肯定/否定
        - FIXED・OTHER → 「0から始まる市外局番の電話番号をお話ください」→ Phone Normalization → Re-confirmation
        終話はメインフロー側（用件・smsFlagが異なる）

# --- セクション3: フローの目的 ---
purpose: >
  新宿健診プラザ（＋立川健診プラザWEB案内含む）専用の予約専用AI電話。
  用件（新規予約/日時変更/キャンセル）を受け取り、それぞれのルートで必要な情報（登録番号・予約日・予約時間・受診希望日・受診希望時間・氏名・生年月日・連絡先電話番号・受診施設・受診キット有無）を聴取し、
  予約センターへの折り返し連絡または WEB 予約案内・コールセンター案内につなぐ。有人転送なし。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "新宿健診プラザ$健診_20260422"
    diagram: |
      wait(2000ms)
        → saveContextModel2DB
        → incoming-classifier
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知(status=2, smsFlag=0) → 切断
            └─ 通常（MOBILE/FIXED/OTHER すべて通常フローへ）
                  → 冒頭_アナウンス(TTS：「お電話ありがとうございます。健診プラザの、予約専用、AI電話です。」)

      ─── 用件確認 ───
      → 用件_確認(TTS：「ご用件を、次の3つのうちの、いずれかでお話ください。『新規予約』、『予約日時の変更』、『予約のキャンセル』。それではお話ください。」)
      → 入力_用件_確認(AmiVoice STT)
      → OpenAI_用件_確認(分類)
          ├─ 新規予約   → saveContext_用件 ─── 新規予約ルートへ ───
          ├─ 日時変更   → saveContext_用件 ─── 日時変更ルートへ ───
          ├─ キャンセル → saveContext_用件 ─── キャンセルルートへ ───
          └─ NO_RESULT  → リトライ_用件_確認
                           ├─ Retry → 用件_確認
                           └─ No more → END_聴取失敗

      ─── 新規予約ルート ───
      → 受診キット_確認(TTS：「…受診のお知らせと受診キットは届いていますか?」)
      → 入力_受診キット(AmiVoice STT) → OpenAI_受診キット → saveContext_受診キット
          ├─ 手元にあり → 注意アナウンス_新規(TTS：「このお電話での受付に関しましては確定ではなく、3営業日以内に…」)
          │                → 登録番号聴取_新規(hearing, enum: わからない/default)
          │                    ├─ わからない → END_かけなおし案内(status=8, smsFlag=0)
          │                    └─ 10桁OK → 受診希望日聴取_新規(hearing, datetime, echo_back)
          │                                   → 受診希望日_ゲート判定_新規(script)
          │                                      ├─ 年度末エラー → エラー_受診希望日_年度末_新規(hearing, echo_back) → (loop) 受診希望日_ゲート判定_新規
          │                                      ├─ 休館日エラー → エラー_受診希望日_休館日_新規(hearing, echo_back) → (loop)
          │                                      ├─ 最短日エラー → エラー_受診希望日_最短_新規(hearing, echo_back) → (loop)
          │                                      └─ OK → 受診希望時間聴取_新規(hearing, text, echo_back)
          │                                                 → jump_氏名聴取 (Custom Jump to Flow → 新宿健診プラザ$氏名聴取_20260422)
          │                                                 → jump_生年月日聴取(Custom Jump to Flow → 新宿健診プラザ$生年月日聴取_20260422)
          │                                                 → jump_電話番号聴取(Custom Jump to Flow → 新宿健診プラザ$電話番号聴取_20260422)
          │                                                 → END_新規予約(status=1, smsFlag=1)
          │
          └─ 手元になし → 受診キットなし_分岐(context_match_router: incoming-classifier 参照)
                          ├─ 携帯(MOBILE) → 受診施設聴取(hearing, enum)
                          │                      ├─ 新宿健診プラザ → END_WEBフォーム送信_新宿(status=7, smsFlag=2)
                          │                      └─ 立川健診プラザ → END_WEBフォーム送信_立川(status=7, smsFlag=3)
                          └─ 固定/その他(FIXED・OTHER) → END_WEB案内(status=9, smsFlag=0)

      ─── 日時変更ルート ───
      → 注意アナウンス_変更(TTS：「このお電話での受付に関しましては確定ではなく、3営業日以内に…」)
      → 予約日聴取_変更(hearing, datetime, echo_back → reservationDate = YYYY-MM-DD 00:00:00)
      → 受診希望日聴取_変更(hearing, datetime, echo_back)
      → 受診希望日_ゲート判定_変更(script)
          ├─ 年度末エラー → エラー_受診希望日_年度末_変更(hearing, echo_back) → (loop) 受診希望日_ゲート判定_変更
          ├─ 休館日エラー → エラー_受診希望日_休館日_変更(hearing, echo_back) → (loop)
          ├─ 最短日エラー → エラー_受診希望日_最短_変更(hearing, echo_back) → (loop)
          └─ OK → 受診希望時間聴取_変更(hearing, text, echo_back)
                     → jump_氏名聴取
                     → jump_生年月日聴取
                     → jump_電話番号聴取
                     → END_日時変更(status=1, smsFlag=1)

      ─── キャンセルルート ───
      → 予約日聴取_キャンセル(hearing, datetime, echo_back → reservationDate)
      → 予約時間聴取_キャンセル(hearing, text, echo_back → reservationTime)
      → jump_氏名聴取
      → jump_生年月日聴取
      → jump_電話番号聴取
      → END_キャンセル(status=1, smsFlag=4)

      ─── 終話パターン（メインフロー） ───
      END_非通知            (status=2, smsFlag=0)
      END_聴取失敗           (status=2, smsFlag=0)
      END_時間外             (status=6, smsFlag=-1)  ※ use_acceptance_times=false だが異常系テンプレとして保持
      END_新規予約           (status=1, smsFlag=1)
      END_日時変更           (status=1, smsFlag=1)
      END_キャンセル         (status=1, smsFlag=4)
      END_WEBフォーム送信_新宿 (status=7, smsFlag=2)
      END_WEBフォーム送信_立川 (status=7, smsFlag=3)
      END_WEB案内            (status=9, smsFlag=0)
      END_かけなおし案内       (status=8, smsFlag=0)
    notes: |
      Gen2→Gen3 移管。Gen2 の箱構成を極力温存しつつ、個人情報聴取のみサブフロー化。
      受診希望日の 3 ゲート判定（年度末超過→休館日→最短日の順）は script モジュールで実装し、エラー発話後は各エラーhearing が echo_back 付きで再聴取 → ゲート判定にループ復帰する構造。
      phone_type は opening の incoming-classifier 出力を直接 context_match_router で参照（追加 saveContext 不要）。
      非通知は CLAUDE.md 標準に従い opening で早期終話。

  - flow_name: "新宿健診プラザ$氏名聴取_20260422"
    diagram: |
      ===== 完全コピー対象（CLAUDE.md Rule 9） =====
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」フローを完全コピー。
      フロー名プレフィックスのみ「新宿健診プラザ$」に置換。構造・接続・スクリプトは一切変更不可。
      構成: AmiVoice STT → OpenAI正規化(カタカナ変換) → saveContext(patientName) → script_結果返却
    notes: "Gen2 §14 準拠。復唱禁止。リトライ上限(2回)到達時は patientName 未取得のまま次へスキップ。"

  - flow_name: "新宿健診プラザ$生年月日聴取_20260422"
    diagram: |
      ===== 完全コピー対象（CLAUDE.md Rule 9） =====
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「生年月日聴取」フローを完全コピー。
      構成: DTMF AmiVoice STT(8桁) → OpenAI正規化(和暦→西暦) → DOB Re-confirmation(復唱) → 復唱STT → 復唱OpenAI(肯定/否定) → saveContext(patientDateOfBirth) → script_結果返却
    notes: "Gen2 §13 準拠。和暦→西暦変換ルールあり。復唱可能項目（復唱後否定の再質問 最大3回）。"

  - flow_name: "新宿健診プラザ$電話番号聴取_20260422"
    diagram: |
      ===== 完全コピー対象（CLAUDE.md Rule 9/10） =====
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「電話番号聴取」フローを完全コピー。
      構成: incoming-classifier → {
        携帯(MOBILE) → 着信番号を additionalPhoneNumber に自動格納 → Phone Normalization → Re-confirmation「今おかけいただいている…でよろしいですか」→ 復唱STT → OpenAI(肯定/否定)
                                    ├─ 肯定 → そのまま保存 → script_結果返却
                                    └─ 否定 → 連絡先聴取パスへ合流
        固定/その他 → 連絡先聴取(DTMF AmiVoice 11桁) → Phone Normalization → Re-confirmation「…<speak type=telephone breakc=300ms>{}</speak>でよろしいですか」→ 復唱STT → OpenAI(肯定/否定)
                                    ├─ 肯定 → saveContext(additionalPhoneNumber) → script_結果返却
                                    └─ 否定 → 電話番号_否定後再質問 → 再聴取パスへ
      }
    notes: |
      Gen2 §電話番号 準拠。phone_type=MOBILE の場合のみ「今おかけいただいている」確認ありの別TTS。
      復唱動作ルール: 電話番号は「0」から発話、<speak type="telephone" breakc="300ms"> タグ付き（SSML禁止ルールの例外）。
      termination=return: 終話チェーンはメインフロー側（用件で smsFlag 値が異なるため）。

# --- セクション4b: ルーティングマップ（routing_map）---
routing_map:
  flow_config:
    use_acceptance_times: false           # AI電話 24時間受付
    opening_tts: "冒頭_アナウンス"
  openai_branches:
    - module: "OpenAI_用件_確認"
      to:
        "新規予約": "受診キット_確認"
        "日時変更": "注意アナウンス_変更"
        "キャンセル": "予約日聴取_キャンセル"
    - module: "OpenAI_受診キット_確認"
      to:
        "手元にあり": "注意アナウンス_新規"
        "手元になし": "受診キットなし_分岐"
    - module: "OpenAI_受診施設聴取"
      to:
        "新宿健診プラザ": "END_WEBフォーム送信_新宿"
        "立川健診プラザ": "END_WEBフォーム送信_立川"
    - module: "OpenAI_登録番号聴取_新規"
      to:
        "わからない": "END_かけなおし案内"
        "default": "受診希望日聴取_新規"
  post_subflow_chain:
    # 新規予約・日時変更・キャンセルの3ルートそれぞれで、電話番号聴取サブフロー完了後は直ちに各終話へ
    to: "（各ルートの末尾に配置。新規予約→END_新規予約 / 日時変更→END_日時変更 / キャンセル→END_キャンセル）"
  context_routers:
    - module: "受診キットなし_分岐"
      context_name: "incoming-classifier"
      to:
        "携帯": "受診施設聴取"
        "default": "END_WEB案内"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
