          output: "HH時MM分"
        - input: "H時M分"
          output: "そのまま H時M分"
        - input: "H時（分欠落）"
          output: "H時00分（00補完）"
        - input: "午前中/午後/夕方/朝 等"
          output: "フリーワードとしてそのまま保存"
      no_result_condition: "時刻として認識不可"
    save_to: "Preferred_time"
    next_step: "echo_back → jump_氏名聴取_新規"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

