    editable: true
    deletable: true
    notes: >
      Gen2 では 0（途中切断）・1（未処理）・2（代表案内）・7（WEBフォーム送信）・8（かけなおし案内）・9（WEB案内）を定義。
      第3世代では status=0 禁止 → デフォルトを 2（代表案内）で上書き。

  - context_name: "dateOfCall"
    context_name_jp: "受電日時"
    display_type: "DATE"
    range_values: []
    item_default: true
    editable: false
    deletable: false
    notes: "受電日時自動格納"

  - context_name: "callId"
    context_name_jp: "通話ID"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: false
    deletable: true
    notes: "通話ID自動格納"

# --- セクション4b: シナリオフロー定義（ブロック構成）---
scenario_flow:
  # === 冒頭ブロック ===
  - step: 冒頭
    type: opening
    use_acceptance_times: false
    next: 冒頭_アナウンス

  - step: 冒頭_アナウンス
    type: announcement
    next: 用件_確認

  # === 用件確認（全ルート共通）===
  - step: 用件_確認
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "新規予約"
        next: 受診キット_確認
      - match: "日時変更"
        next: 注意アナウンス_変更
      - match: "キャンセル"
        next: 予約日聴取_キャンセル

  # ================================================================
  # 新規予約ルート
  # ================================================================
  - step: 受診キット_確認
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "手元にあり"
        next: 注意アナウンス_新規
      - match: "手元になし"
        next: 受診キットなし_分岐

  # --- 受診キット=手元になし 分岐 ---
  - step: 受診キットなし_分岐
    type: context_match_router
    reference_module: "incoming-classifier"
    conditions:
      - match: "携帯"
        next: 受診施設聴取
      - match: "default"
        next: END_WEB案内

  - step: 受診施設聴取
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "新宿健診プラザ"
        next: END_WEBフォーム送信_新宿
      - match: "立川健診プラザ"
        next: END_WEBフォーム送信_立川

  # --- 受診キット=手元にあり 分岐 ---
  - step: 注意アナウンス_新規
    type: announcement
    next: 登録番号聴取_新規

  - step: 登録番号聴取_新規
    type: hearing
    output_format: enum
    retry_failure: end_failure
    conditions:
      - match: "わからない"
        next: END_かけなおし案内
      - match: "default"
        next: 受診希望日_前段計算_新規

  - step: 受診希望日_前段計算_新規
    type: script
    script_template: desired_date_precompute
    template_params:
      MIN_DAYS_AHEAD: "7"
      FISCAL_END_DATE: "2027-03-31"
    notes: "受診希望日聴取_新規 の TTS が <%desired_date_jp%> / <%desired_date_mmdd%> を参照するため、TTS 直前に setObject で値を確定させる前段 script。"
    next: 受診希望日聴取_新規

  - step: 受診希望日聴取_新規
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 受診希望日_ゲート判定_新規

  - step: 受診希望日_ゲート判定_新規
    type: script
    script_template: shinjuku_kenshin_date_gate
    reference_module: "OpenAI_受診希望日聴取_新規"
    template_params:
      INPUT_MODULE: "OpenAI_受診希望日聴取_新規"
    notes: "休館日リストが必要なためカレンダー計算 Script（モジュール選定ガイド §3.8）。FISCAL_END_DATE / MIN_DAYS_AHEAD / HOLIDAYS はテンプレ内に直書き"
    conditions:
      - match: "年度末エラー"
        next: エラー_受診希望日_年度末_新規
      - match: "休館日エラー"
        next: エラー_受診希望日_休館日_新規
      - match: "最短日エラー"
        next: エラー_受診希望日_最短_新規
      - match: "OK"
        next: 受診希望時間聴取_新規

  - step: エラー_受診希望日_年度末_新規
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 受診希望日_ゲート判定_新規

  - step: エラー_受診希望日_休館日_新規
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 受診希望日_ゲート判定_新規

  - step: エラー_受診希望日_最短_新規
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 受診希望日_ゲート判定_新規

  - step: 受診希望時間聴取_新規
    type: hearing
    output_format: text
    retry_failure: end_failure
    next: jump_氏名聴取_新規

  - step: jump_氏名聴取_新規
    type: subflow
    flowname: "新宿健診プラザ$氏名聴取_20260422"
    next: jump_生年月日聴取_新規

  - step: jump_生年月日聴取_新規
    type: subflow
    flowname: "新宿健診プラザ$生年月日聴取_20260422"
    next: jump_電話番号聴取_新規

  - step: jump_電話番号聴取_新規
    type: subflow
    flowname: "新宿健診プラザ$電話番号聴取_20260422"
    next: END_新規予約

  # ================================================================
  # 日時変更ルート
  # ================================================================
  - step: 注意アナウンス_変更
    type: announcement
    next: 予約日聴取_変更

  - step: 予約日聴取_変更
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 受診希望日_前段計算_変更

  - step: 受診希望日_前段計算_変更
    type: script
    script_template: desired_date_precompute
    template_params:
      MIN_DAYS_AHEAD: "7"
      FISCAL_END_DATE: "2027-03-31"
    notes: "受診希望日聴取_変更 の TTS が <%desired_date_jp%> / <%desired_date_mmdd%> を参照するため、TTS 直前に setObject で値を確定させる前段 script。"
    next: 受診希望日聴取_変更

  - step: 受診希望日聴取_変更
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 受診希望日_ゲート判定_変更

  - step: 受診希望日_ゲート判定_変更
    type: script
    script_template: shinjuku_kenshin_date_gate
    reference_module: "OpenAI_受診希望日聴取_変更"
    template_params:
      INPUT_MODULE: "OpenAI_受診希望日聴取_変更"
    notes: "休館日リストが必要なためカレンダー計算 Script（モジュール選定ガイド §3.8）。FISCAL_END_DATE / MIN_DAYS_AHEAD / HOLIDAYS はテンプレ内に直書き"
    conditions:
      - match: "年度末エラー"
        next: エラー_受診希望日_年度末_変更
      - match: "休館日エラー"
        next: エラー_受診希望日_休館日_変更
      - match: "最短日エラー"
        next: エラー_受診希望日_最短_変更
      - match: "OK"
        next: 受診希望時間聴取_変更

  - step: エラー_受診希望日_年度末_変更
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 受診希望日_ゲート判定_変更

  - step: エラー_受診希望日_休館日_変更
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 受診希望日_ゲート判定_変更

  - step: エラー_受診希望日_最短_変更
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 受診希望日_ゲート判定_変更

  - step: 受診希望時間聴取_変更
    type: hearing
    output_format: text
    retry_failure: end_failure
    next: jump_氏名聴取_変更

  - step: jump_氏名聴取_変更
    type: subflow
    flowname: "新宿健診プラザ$氏名聴取_20260422"
    next: jump_生年月日聴取_変更

  - step: jump_生年月日聴取_変更
    type: subflow
    flowname: "新宿健診プラザ$生年月日聴取_20260422"
    next: jump_電話番号聴取_変更

  - step: jump_電話番号聴取_変更
    type: subflow
    flowname: "新宿健診プラザ$電話番号聴取_20260422"
    next: END_日時変更

  # ================================================================
  # キャンセルルート
  # ================================================================
  - step: 予約日聴取_キャンセル
    type: hearing
    output_format: datetime
    retry_failure: end_failure
    next: 予約時間聴取_キャンセル

  - step: 予約時間聴取_キャンセル
    type: hearing
    output_format: text
    retry_failure: end_failure
    next: jump_氏名聴取_キャンセル

  - step: jump_氏名聴取_キャンセル
    type: subflow
    flowname: "新宿健診プラザ$氏名聴取_20260422"
    next: jump_生年月日聴取_キャンセル

  - step: jump_生年月日聴取_キャンセル
    type: subflow
    flowname: "新宿健診プラザ$生年月日聴取_20260422"
    next: jump_電話番号聴取_キャンセル

  - step: jump_電話番号聴取_キャンセル
    type: subflow
    flowname: "新宿健診プラザ$電話番号聴取_20260422"
    next: END_キャンセル

  # ================================================================
  # 終話ブロック
  # ================================================================
  - step: END_新規予約
    type: termination
    termination_ref: "END_新規予約"

  - step: END_日時変更
    type: termination
    termination_ref: "END_日時変更"

  - step: END_キャンセル
    type: termination
    termination_ref: "END_キャンセル"

  - step: END_WEBフォーム送信_新宿
    type: termination
    termination_ref: "END_WEBフォーム送信_新宿"

  - step: END_WEBフォーム送信_立川
    type: termination
    termination_ref: "END_WEBフォーム送信_立川"

  - step: END_WEB案内
    type: termination
    termination_ref: "END_WEB案内"

  - step: END_かけなおし案内
    type: termination
    termination_ref: "END_かけなおし案内"

# --- セクション6: 聴取項目一覧 ---
hearing_items:
  # --- 全ルート共通 ---
  - order: 1
    name: "用件_確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "classification"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新規予約"
      - "日時変更"
      - "キャンセル"
    notes: "Gen2 §4.1 類義語マッピングあり。復唱禁止（§1-1）。DTMF 1/2/3 対応は prompter が OpenAI プロンプトで対応"

  # --- 新規予約ルート ---
  - order: 2
    name: "受診キット_確認"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "testKitCheck"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "手元にあり"
      - "手元になし"
    notes: "Gen2 §5 受診キット 類義語あり。復唱禁止"

  - order: 3
    name: "受診施設聴取"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 3
    echo_back: false
    save_to: "facility"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "新宿健診プラザ"
      - "立川健診プラザ"
    notes: >
      受診キット=手元になし & phone_type=MOBILE の時のみ到達。復唱禁止。
      facility 格納時に smsFlag を 2（新宿）/3（立川）に切り替える（Gen2 §3.2 smsFlag ルール）。
      ⚠️ saveCompletionFlag2db の sms_flag 値は END_WEBフォーム送信_新宿 / END_WEBフォーム送信_立川 で個別設定（本設計書 termination_patterns）

  - order: 4
    name: "登録番号聴取_新規"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 10
    retry_count: 3
    echo_back: false
    save_to: "medicalCardNumber"
    openai_processing: "classify"
    output_format: "enum"
    output_labels:
      - "わからない"
      - "default"
    notes: >
      Gen2 §12 準拠。「わからない」表現 → END_かけなおし案内。10桁数字OK → 次へ。10桁以外は再聴取（最大3回）。
      OpenAI は「わからない表現」と「10桁数字」を分類し、後者の場合は raw 数字値を save_to に格納（ただし enum 分岐上は "default" ラベルとして扱う）、
      前者の場合は文字列「わからない」を格納する。復唱禁止。
      DTMF 対応: 音声「わからない」相当表現 or DTMF 10桁で登録番号入力（DTMF=10桁の登録番号、「わからない」は音声のみ）

  - order: 5
    name: "受診希望日聴取_新規"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_date"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: >
      Gen2 §10-3 STEP1 準拠。MMDD や M月D日 入力時の年補完は §10-3 STEP1 のみ適用（§6 汎用ルール適用禁止）。
      echo_back=true で STEP2 復唱を実現。DTMF 4桁（MMDD）対応。
      DTMF: 「MMDD 4桁」, 音声「〇月〇日」。復唱可能項目

  - order: 6
    name: "エラー_受診希望日_年度末_新規"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_date"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: >
      受診希望日ゲート判定で年度末エラー → エラー案内TTS → 再聴取（dtmf 4桁）→ echo_back で復唱 → ゲート判定へ戻る。
      DTMF: 「MMDD 4桁」

  - order: 7
    name: "エラー_受診希望日_休館日_新規"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_date"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: >
      受診希望日ゲート判定で休館日エラー → エラー案内TTS → 再聴取 → echo_back → ゲート判定。
      DTMF: 「MMDD 4桁」（月と日にちを4桁で入力）

  - order: 8
    name: "エラー_受診希望日_最短_新規"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_date"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: >
      受診希望日ゲート判定で最短日未満エラー → エラー案内TTS → 再聴取 → echo_back → ゲート判定。
      DTMF: 「MMDD 4桁」（月と日にちを4桁で入力）

  - order: 9
    name: "受診希望時間聴取_新規"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_time"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: >
      Gen2 §受診希望時間 準拠。「9時30分」形式 or HHMM 4桁 DTMF or フリーワード（午前中/午後）。
      「16時」のみ入力時は「16時00分」に補完（prompter 対応）。復唱可能項目（echo_back=true）

  # --- 日時変更ルート ---
  - order: 10
    name: "予約日聴取_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: >
      現在の予約日。YYYY-MM-DD 00:00:00 形式で格納（Gen2 §11 準拠）。当年度を補完。
      DTMF: 「MMDD 4桁」。復唱可能項目

  - order: 11
    name: "受診希望日聴取_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_date"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: >
      新規予約ルートと同仕様（§10-3 参照）。DTMF: 「MMDD 4桁」

  - order: 12
    name: "エラー_受診希望日_年度末_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_date"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: >
      エラー再聴取（新規予約と同仕様）。DTMF: 「MMDD 4桁」

  - order: 13
    name: "エラー_受診希望日_休館日_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_date"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: >
      エラー再聴取。DTMF: 「MMDD 4桁」

  - order: 14
    name: "エラー_受診希望日_最短_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_date"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: >
      エラー再聴取。DTMF: 「MMDD 4桁」

  - order: 15
    name: "受診希望時間聴取_変更"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "Preferred_time"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: >
      新規予約ルートと同仕様。DTMF: 「HHMM 4桁」（時間と分を4桁）

  # --- キャンセルルート ---
  - order: 16
    name: "予約日聴取_キャンセル"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "reservationDate"
    openai_processing: "normalize"
    output_format: "datetime"
    output_labels: []
    notes: "現在の予約日。YYYY-MM-DD 00:00:00 形式。DTMF: 「MMDD 4桁」"

  - order: 17
    name: "予約時間聴取_キャンセル"
    stt_type: "DTMF_AmiVoice"
    dtmf_max_length: 4
    retry_count: 3
    echo_back: true
    save_to: "reservationTime"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: >
      現在の予約時間。「9時30分」形式 or HHMM 4桁 DTMF or フリーワード。
      「16時」のみ入力時は「16時00分」に補完。復唱可能項目。
      ⚠️ キャンセルルートのみ予約時間を聴取（日時変更は予約日のみ、新規予約は予約日・予約時間ともに聴取しない）

  # --- サブフロー聴取（参考情報、構造はサブフロー bivr 準拠）---
  - order: 18
    name: "氏名"
    stt_type: "AmiVoice_STT"
    dtmf_max_length: null
    retry_count: 2
    echo_back: false
    save_to: "patientName"
    openai_processing: "normalize"
    output_format: "text"
    output_labels: []
    notes: "氏名聴取サブフロー内。Gen2 §14 準拠（カタカナ変換・復唱禁止）"

  - order: 19
    name: "生年月日"
    stt_type: "DTMF_AmiVoice"
