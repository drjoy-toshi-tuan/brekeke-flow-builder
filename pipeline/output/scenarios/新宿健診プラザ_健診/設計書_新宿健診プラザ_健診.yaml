# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "冒頭_アナウンス"
    tts_announcement: "お電話ありがとうございます。 健診プラザの、予約専用、AI電話です。"
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "用件_確認"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "用件_確認"
    tts_announcement: "ご用件を、次の3つのうちの、いずれかでお話ください。「新規予約」、「予約日時の変更」、「予約のキャンセル」。それではお話ください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "新規予約"
        - "日時変更"
        - "キャンセル"
        - "NO_RESULT"
      mapping:
        - input: "「1」「新規予約」「1番」「新規の予約」「予約取り」「予約したい」「予約お願い」「1お願いします」等"
          output: "新規予約"
        - input: "「2」「2番」「変更」「日時変更」「予約日変更」「予約の変更」「時間の変更」「変更したい」「2お願いします」等"
          output: "日時変更"
        - input: "「3」「3番」「キャンセル」「予約キャンセル」「キャンセルしたい」「取り消し」「3お願いします」等"
          output: "キャンセル"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "認識できない/雑音/無関係発話"
    save_to: "classification"
    next_step: "新規予約→受診キット_確認 / 日時変更→注意アナウンス_変更 / キャンセル→予約日聴取_キャンセル"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "受診キット_確認"
    tts_announcement: >
      AI電話でのご予約希望の受付は当施設から事前に受診のお知らせと受診キットがお手元に届いた方のみ受付させていただいております。受診のお知らせと受診キットは届いていますか?
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "手元にあり"
        - "手元になし"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「持っています」「届いています」「あります」「もう届いた」等の肯定表現"
          output: "手元にあり"
        - input: "「いいえ」「持っていません」「ありません」「ない」「わからない」「まだ届いていない」等の否定表現"
          output: "手元になし"
      no_result_condition: "判別不能"
    save_to: "testKitCheck"
    next_step: "手元にあり→注意アナウンス_新規 / 手元になし→受診キットなし_分岐"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "受診キットなし_分岐"
    tts_announcement: ""
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "携帯(MOBILE)→受診施設聴取 / 固定・その他(FIXED・OTHER)→END_WEB案内"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "受診施設聴取"
    tts_announcement: >
      受診のお知らせと受診キットをお持ちでない場合は、WEB予約のご案内をSMSにてお送りいたします。そちらからお申し込みくださいませ。受診を希望する施設は「新宿健診プラザ」と「立川健診プラザ」、どちらの施設をご希望かお話ください。
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "新宿健診プラザ"
        - "立川健診プラザ"
        - "NO_RESULT"
      mapping:
        - input: "「1」「新宿」「新宿健診」「新宿プラザ」「新宿健診プラザ」等"
          output: "新宿健診プラザ"
        - input: "「2」「立川」「立川健診」「立川プラザ」「立川健診プラザ」等"
          output: "立川健診プラザ"
      no_result_condition: "判別不能"
    save_to: "facility"
    next_step: "新宿→END_WEBフォーム送信_新宿 / 立川→END_WEBフォーム送信_立川"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "注意アナウンス_新規"
    tts_announcement: >
      このお電話での受付に関しましては確定ではなく、3営業日以内に、当施設からご連絡差し上げて確定となりますので、終話後、当施設からのご連絡をお待ちくださいませ。
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "登録番号聴取_新規"
    retry_failure: "skip"
    retry_failure_announcement: ""

  - step_name: "登録番号聴取_新規"
    tts_announcement: >
      受診のお知らせに記載の頭の「0」を含む10桁の登録番号を伺いします。わからない場合は「わからない」とお話ください。10桁の登録番号をお話、もしくは10桁の数字でプッシュしてください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "わからない"
        - "default"
        - "NO_RESULT"
      mapping:
        - input: "「わからない」「わかりません」「知りません」「知らない」「不明です」等"
          output: "わからない"
        - input: "ちょうど 10 桁の数字（0から始まるものを含む）"
          output: "default（そのまま 10桁数字値を medicalCardNumber に格納）"
        - input: "10桁以外の数字/数字なし"
          output: "NO_RESULT（再聴取）"
      no_result_condition: "10桁以外 / 数字混在文字 / 認識不能"
    save_to: "medicalCardNumber"
    next_step: "わからない→END_かけなおし案内 / default(10桁OK)→受診希望日聴取_新規"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "受診希望日聴取_新規"
    tts_announcement: >
      受診希望日を<%desired_date_jp%>以降の日付でお話ください。<%desired_date_mmdd%>のように、月と日にちを4桁の数字でお話ください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY-MM-DD（confirmed_date）"
        - "NO_RESULT"
      mapping:
        - input: "「M月D日」「MMDD」「yyyy年m月d日」等の日付表現"
          output: >
            §10-3 STEP1 の年補完を適用して YYYY-MM-DD に正規化:
            (1) MMDD/M月D日 → {TODAY}年を付与して tmp_date
            (2) tmp_date < {DESIRED_DATE} なら年+1 → confirmed_date
            (3) 上記不該当かつ tmp_date < {TODAY} なら年+1 → confirmed_date
            (4) それ以外 → confirmed_date = tmp_date
            年込みの発話は補完なしで confirmed_date = 発話値
        - input: "日付として認識できない/雑音"
          output: "NO_RESULT"
      no_result_condition: "日付認識不可"
    save_to: "Preferred_date"
    next_step: "echo_back（復唱）→ 肯定→受診希望日_ゲート判定_新規 / 否定→エラー再聴取"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "受診希望日_ゲート判定_新規"
    tts_announcement: ""
    input_method: "voice_only"
    openai_rules:
      output_values: []
      mapping: []
      no_result_condition: ""
    save_to: ""
    next_step: "年度末エラー/休館日エラー/最短日エラー/OK の4分岐"
    retry_failure: "skip"
    retry_failure_announcement: >
      Script モジュール実装詳細（prompter 担当）:
      1. confirmed_date > {FISCAL_END_DATE} なら「年度末エラー」
      2. confirmed_date が {HOLIDAYS} リストに YYYY-MM-DD 完全一致 なら「休館日エラー」
      3. confirmed_date < {DESIRED_DATE} なら「最短日エラー」
      4. いずれにも該当しなければ「OK」
      ⚠️ 判定順序厳守（Gen2 §10-3 STEP3）。途中で該当した時点で判定打ち切り。

  - step_name: "エラー_受診希望日_年度末_新規"
    tts_announcement: >
      申し訳ございません。今年度のご予約は、<%fiscal_end_full_jp%>までとなります。<%fiscal_end_jp%>までの日付でお話しください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY-MM-DD"
        - "NO_RESULT"
      mapping:
        - input: "日付表現"
          output: "Gen2 §10-3 STEP1 の年補完を再適用して YYYY-MM-DD に正規化"
      no_result_condition: "日付認識不可"
    save_to: "Preferred_date"
    next_step: "echo_back → 受診希望日_ゲート判定_新規（再ループ）"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "エラー_受診希望日_休館日_新規"
    tts_announcement: >
      申し訳ございません。ご希望のお日にちは休館日となっております。再度、<%desired_date_jp%>以降、別の日付でお話しください。
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "YYYY-MM-DD"
        - "NO_RESULT"
      mapping:
        - input: "日付表現"
          output: "YYYY-MM-DD に正規化（年補完同様）"
      no_result_condition: "日付認識不可"
    save_to: "Preferred_date"
    next_step: "echo_back → 受診希望日_ゲート判定_新規"
    retry_failure: "end_failure"
    retry_failure_announcement: ""

  - step_name: "エラー_受診希望日_最短_新規"
