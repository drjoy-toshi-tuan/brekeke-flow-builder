# smsFlag 分岐設計
sms_flag_routing:
  enabled: false                                 # 各終話の saveCompletionFlag2db で個別に sms_flag を設定（ContextMatchRouter/Script による分岐は不要）
  routing_keys:
    - "classification"
    - "facility"
  patterns:
    - condition: "classification=新規予約 & testKitCheck=手元にあり"
      sms_flag: "1"
      notes: "END_新規予約"
    - condition: "classification=日時変更"
      sms_flag: "1"
      notes: "END_日時変更"
    - condition: "classification=キャンセル"
      sms_flag: "4"
      notes: "END_キャンセル"
    - condition: "classification=新規予約 & testKitCheck=手元になし & phone_type=MOBILE & facility=新宿健診プラザ"
      sms_flag: "2"
      notes: "END_WEBフォーム送信_新宿"
    - condition: "classification=新規予約 & testKitCheck=手元になし & phone_type=MOBILE & facility=立川健診プラザ"
      sms_flag: "3"
      notes: "END_WEBフォーム送信_立川"
    - condition: "classification=新規予約 & testKitCheck=手元になし & phone_type in (FIXED, OTHER)"
      sms_flag: "0"
      notes: "END_WEB案内"

