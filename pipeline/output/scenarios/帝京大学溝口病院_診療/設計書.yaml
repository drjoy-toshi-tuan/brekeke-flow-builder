# --- セクション7: ステップ詳細 ---
step_details:
  - step_name: "診察券確認"
    tts_announcement: "診察券はお手元にございますか。「持っています」「ありません」、また初めて当院をご利用の方は「初めてです」とお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "ある"
        - "ない"
        - "初めて"
        - "NO_RESULT"
      mapping:
        - input: "「持っています」「あります」「ある」を含む"
          output: "ある"
        - input: "「ありません」「ない」「なし」を含む"
          output: "ない"
        - input: "「初めて」「はじめて」を含む"
          output: "初めて"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "ある→本日予約確認 / ない→END_診察券なし / 初めて→サブフロー遷移_氏名聴取"
    retry_failure: "end_failure"

  - step_name: "本日予約確認"
    tts_announcement: "本日の予約に関するお電話でしょうか。「いいえ、違います」または「本日の予約です」とお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「本日」「今日」「はい」「そうです」を含む"
          output: "はい"
        - input: "「いいえ」「違います」「ちがいます」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: null
    next_step: "はい→END_代表案内_本日 / いいえ→サブフロー遷移_診察券番号聴取"
    retry_failure: "end_failure"

  - step_name: "用件確認"
    tts_announcement: "ご用件を、「1.予約」「2.変更」「3.キャンセル」「4.予約確認」「5.そのた問合せ」のいずれかでお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "予約"
        - "変更"
        - "キャンセル"
        - "確認"
        - "その他問合せ"
        - "NO_RESULT"
      mapping:
        - input: "DTMF 1 または「予約」「予約したい」「よやく」を含む"
          output: "予約"
        - input: "DTMF 2 または「変更」「へんこう」を含む"
          output: "変更"
        - input: "DTMF 3 または「キャンセル」を含む"
          output: "キャンセル"
        - input: "DTMF 4 または「確認」「かくにん」を含む"
          output: "確認"
        - input: "DTMF 5 または「その他」「問合せ」を含む"
          output: "その他問合せ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "classification"
    next_step: "予約→受診歴確認 / 変更→注射装具確認_変更 / キャンセル→注射装具確認_キャンセル / 確認→END_確認 / その他問合せ→問合せ内容聴取"
    retry_failure: "end_failure"

  - step_name: "受診歴確認"
    tts_announcement: "予約をご希望の診療科を受診されたことはありますか。「はい、あります」または「いいえ、ありません」とお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「あります」「ある」を含む"
          output: "はい"
        - input: "「いいえ」「ありません」「ない」「初めて」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "inquiry"
    next_step: "はい（再診）→前回と同じ確認 / いいえ（初診）→紹介状確認"
    retry_failure: "skip"

  - step_name: "前回と同じ確認"
    tts_announcement: "今回の受診は、前回と同じ症状でしょうか。「はい、そうです」または「いいえ、違います」とお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「そうです」「同じ」を含む"
          output: "はい"
        - input: "「いいえ」「違います」「違う」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "inquiry"
    next_step: "はい/いいえ→診療科_聴取_再診"
    retry_failure: "skip"

  - step_name: "紹介状確認"
    tts_announcement: "紹介状はお持ちでしょうか。「はい、あります」または「いいえ、ありません」とお話しください。"
    input_method: "dtmf_voice"
    openai_rules:
      output_values:
        - "はい"
        - "いいえ"
        - "NO_RESULT"
      mapping:
        - input: "「はい」「あります」「持っています」を含む"
          output: "はい"
        - input: "「いいえ」「ありません」「ない」を含む"
          output: "いいえ"
        - input: "上記いずれにも該当しない"
          output: "NO_RESULT"
      no_result_condition: "上記いずれにも該当しない"
    save_to: "inquiry"
    next_step: "はい/いいえ→診療科_聴取_初診"
    retry_failure: "skip"

  - step_name: "診療科_聴取_初診"
    tts_announcement: "診療科を「診療科は内科です」のようにお話しください。わからない場合は「わからない」とお話しください。"
    input_method: "voice_only"
    openai_rules:
      output_values:
        - "精神科"
        - "心療内科"
        - "歯科"
        - "口腔外科"
        - "神経内科"
