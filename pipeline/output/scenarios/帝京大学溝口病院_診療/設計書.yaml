# --- セクション11: 特記事項・制約 ---
special_notes:
  - "用件確認は5択分岐（予約・変更・キャンセル・確認・その他問合せ）"
  - "診察券確認で3分岐: ある→本日予約確認→個人情報聴取、ない→終話、初めて→診察券番号スキップして氏名聴取から"
  - "「初めて」の場合は診察券番号のみスキップし、氏名・生年月日・電話番号は聴取する"
  - "本日の予約に関する問い合わせは代表電話案内に誘導"
  - "当日受入拒否: 設定する（本日の予約は代表電話へ案内）"
  - "非通知受入拒否: 設定する（186を付けてかけ直し案内）"
  - "FAQなし（RAGサブフロー不使用）"
  - "切断トリガー文言: 「お電話ありがとうございました。」"
  - "--- 診療科特殊ルール ---"
  - "1. 精神科・心療内科 → AI電話では受付不可 → 終話（直接ご来院）案内"
  - "2. 歯科・口腔外科 → AI電話では受付不可 → 終話（予約不可）案内"
  - "3. リハビリテーション科 → 予約・変更・キャンセルのみ受付可。原先生の場合は通常フロー、原先生以外は代表電話案内"
  - "4. 脳神経内科（神経内科）>平井先生 → 純新患の新規予約は受付不可 → 病診連携案内（044-844-3517）"
  - "5. 産科・妊婦健診・小児眼科・斜視外来 → 新規予約は代表電話（平日午後2-4時）案内"
  - "6. 放射線科・補聴器外来 → 新規予約はOK、変更/キャンセルは代表案内"
  - "7. 注射・特定注射・美容注射・装具 → 変更/キャンセルは代表電話案内"
  - "8. 検査あり → 術前検査・時間指定チェック → MRI/CT/内視鏡は代表電話案内（検査後診察の変更は各外来）"
  - "--- SMS設定 ---"
  - "予約・変更・確認・キャンセル・問合せ: smsFlag=1"
  - "代表案内・転送・時間外・途中切断: smsFlag=-1"
  - "SMS送信番号: 050-5838-9222"
  - "--- 終話パターンは用件別に分離 ---"
  - "予約・変更→同一終話TTS、キャンセル→専用TTS、確認→専用TTS、問合せ→専用TTS"
  - "--- 営業時間 ---"
  - "acceptance_times使用。稼働曜日: 月〜金、稼働時間: 9:00-16:30、休止: 土日祝・年末年始"

