# 設計書: 帝京大学医学部附属溝口病院 — 診療シナリオ
# 生成元: @director エージェント
# 生成日: 2026/03/31
# テンプレート: docs/specs/設計書テンプレート.yaml 準拠
# ゴールデンテンプレート参照: docs/specs/golden_templates/予約管理型.yaml
version: "1.0"

# --- セクション1: 基本情報 ---
basic_info:
  facility_name: "帝京大学医学部附属溝口病院"
  group_name: "帝京溝口"
  flow_name: "帝京溝口$診療"
  target_facility: "帝京大学医学部附属溝口病院（本院のみ）"
  office_id: "TODO_要確認"
  phone_number: "050-5838-9194"          # デモ環境用050番号
  phone_number_prod: "050-5838-9222"     # 本番用050番号
  sms_sender_number: "050-5838-9222"     # SMS送信番号
  representative_phone: "044-844-3333"   # 代表電話番号
  business_hours: "祝日除く月〜金 9:00-16:30"
  flow_type: "subflow"
  work_type: "new"
  environment: "demo"

# --- セクション2: フロー構成 ---
flow_structure:
  type: "subflow"
  flows:
    - name: "帝京溝口$診療"
      role: "main"
      description: "冒頭チェーン → 診察券確認 → 本日予約確認 → 個人情報サブフロー遷移 → 用件分岐（5択）→ 各用件ルート聴取 → 終話"
    - name: "帝京溝口$診察券番号聴取"
      role: "sub"
      description: "診察券番号聴取（DTMF 8桁）。初めての場合はスキップ"
    - name: "帝京溝口$氏名聴取"
      role: "sub"
      description: "氏名聴取（音声のみ）"
    - name: "帝京溝口$生年月日聴取"
      role: "sub"
      description: "生年月日聴取（DTMF 8桁 + DOB Re-confirmation復唱）"
    - name: "帝京溝口$電話番号聴取"
      role: "sub"
      description: "電話番号聴取（incoming-classifier→携帯/固定分岐→Phone Normalization→復唱）"
  subflows:
    - name: "帝京溝口$診察券番号聴取"
      target: "診察券番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivrの診察券番号聴取を完全コピー。フロー名プレフィックスのみ置換"
    - name: "帝京溝口$氏名聴取"
      target: "氏名聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivrの氏名聴取を完全コピー"
    - name: "帝京溝口$生年月日聴取"
      target: "生年月日聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivrの生年月日聴取を完全コピー"
    - name: "帝京溝口$電話番号聴取"
      target: "電話番号聴取"
      transition_module: "drjoy^Custom Module$Custom Jump to Flow"
      notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivrの電話番号聴取を完全コピー"

# --- セクション3: フローの目的 ---
purpose: >
  患者からの電話を受け、診察券の有無・用件（予約・変更・キャンセル・確認・その他問合せ）・
  診療科・担当医・予約希望日等を聴取し、折り返し受付を自動化する。
  精神科・心療内科・歯科口腔外科等のAI不可診療科、注射・装具の変更キャンセル、
  検査関連の特殊ルール、紹介状の有無等の複雑な診療科特殊ルールに対応し、
  適切な終話パターン（代表案内・病診連携案内・直接来院案内等）に振り分ける。

# --- セクション4: シナリオフロー図 ---
flow_diagrams:
  - flow_name: "帝京溝口$診療"
    diagram: |
      冒頭(wait 2000ms)
        → コンテキスト設定(saveContextModel2DB)
        → 着信電話番号分類(incoming-classifier)
            ├─ 非通知 → 非通知_アナウンス(TTS) → 完了フラグ_非通知 → 切断
            └─ 通常 → 営業時間チェック(acceptance_times)
                        ├─ 時間外/TIMEOUT/ERROR → 時間外_アナウンス(TTS) → 完了フラグ_時間外 → 切断
                        └─ 受付可(true) → 冒頭_アナウンス(TTS)
                                            → 診察券確認

      ─── 診察券確認 ───
      診察券確認(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_診察券確認（classify: ある/ない/初めて）
            ├─ ある → 本日予約確認
            ├─ ない → 診察券なし_アナウンス(TTS) → 完了フラグ_診察券なし → 切断
            └─ 初めて → ★サブフロー遷移_氏名聴取（診察券番号スキップ）

      ─── 本日予約確認 ───
      本日予約確認(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_本日予約確認（classify: はい/いいえ）
            ├─ はい（本日の予約） → 代表電話_アナウンス(TTS) → 完了フラグ_代表案内_本日 → 切断
            └─ いいえ → ★サブフロー遷移_診察券番号聴取

      ─── 個人情報聴取（サブフロー遷移チェーン） ───
      ★サブフロー遷移_診察券番号聴取 → Custom Jump to Flow → 帝京溝口$診察券番号聴取
        → ★サブフロー遷移_氏名聴取 → Custom Jump to Flow → 帝京溝口$氏名聴取
        → ★サブフロー遷移_生年月日聴取 → Custom Jump to Flow → 帝京溝口$生年月日聴取
        → ★サブフロー遷移_電話番号聴取 → Custom Jump to Flow → 帝京溝口$電話番号聴取
        → 用件確認

      ─── 「初めて」ルート（診察券番号スキップ） ───
      ★サブフロー遷移_氏名聴取（初めてルート）→ Custom Jump to Flow → 帝京溝口$氏名聴取
        → ★サブフロー遷移_生年月日聴取 → Custom Jump to Flow → 帝京溝口$生年月日聴取
        → ★サブフロー遷移_電話番号聴取 → Custom Jump to Flow → 帝京溝口$電話番号聴取
        → 用件確認

      ─── 用件確認（5択） ───
      用件確認(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_用件確認（classify: 予約/変更/キャンセル/確認/その他問合せ）
            ├─ 予約 → 受診歴確認
            ├─ 変更 → 注射装具確認_変更
            ├─ キャンセル → 注射装具確認_キャンセル
            ├─ 確認 → 完了フラグ_確認 → 終話_確認(TTS) → 切断
            └─ その他問合せ → 問合せ内容聴取

      ═══════════════════════════════════
      ─── 予約ルート ───
      ═══════════════════════════════════
      受診歴確認(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_受診歴確認（classify: はい/いいえ）
            ├─ はい（再診）→ 前回と同じ確認
            └─ いいえ（初診）→ 紹介状確認

      前回と同じ確認(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_前回と同じ（classify: はい/いいえ）
            ├─ はい → 診療科_聴取_再診
            └─ いいえ → 診療科_聴取_再診

      紹介状確認(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_紹介状（classify: はい/いいえ）
            ├─ はい/いいえ → 診療科_聴取_初診

      診療科_聴取_初診(TTS+AmiVoice STT)
        → OpenAI_診療科_初診（normalize/classify）
            ├─ 精神科/心療内科 → 終話_直接来院_アナウンス(TTS) → 完了フラグ_直接来院 → 切断
            ├─ 歯科/口腔外科 → 終話_予約不可_アナウンス(TTS) → 完了フラグ_予約不可 → 切断
            ├─ 神経内科＋平井先生（純新患）→ 病診連携_アナウンス(TTS) → 完了フラグ_病診連携 → 切断
            ├─ 産科/妊婦健診/小児眼科/斜視外来 → 代表電話_午後案内_アナウンス(TTS) → 完了フラグ_代表案内_午後 → 切断
            ├─ リストにない → リトライ_診療科_初診 → Retry/No more
            └─ {正常な診療科名} → 予約希望日_聴取

      診療科_聴取_再診(TTS+AmiVoice STT)
        → OpenAI_診療科_再診（normalize/classify）
            ├─ 精神科/心療内科 → 終話_直接来院_アナウンス(TTS) → 切断
            ├─ 歯科/口腔外科 → 終話_予約不可_アナウンス(TTS) → 切断
            ├─ リハビリテーション科 → 担当医_聴取 → OpenAI_担当医_リハ
            │     ├─ 原先生 → 予約希望日_聴取
            │     └─ 原先生以外 → 代表電話_アナウンス(TTS) → 切断
            ├─ リストにない → リトライ_診療科_再診 → Retry/No more
            └─ {正常な診療科名} → 担当医_聴取 → 予約希望日_聴取

      予約希望日_聴取(TTS+AmiVoice STT)
        → OpenAI_予約希望日（convert: date_text）
            → 完了フラグ_予約変更 → 終話_予約変更(TTS) → 切断

      ═══════════════════════════════════
      ─── 変更ルート ───
      ═══════════════════════════════════
      注射装具確認_変更(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_注射装具_変更（classify: はい/いいえ/わからない）
            ├─ はい → 代表電話_アナウンス(TTS) → 完了フラグ_代表案内_注射装具 → 切断
            └─ いいえ/わからない → 診療科_聴取_変更

      診療科_聴取_変更(TTS+AmiVoice STT)
        → OpenAI_診療科_変更（normalize/classify）
            ├─ 精神科/心療内科 → 終話_直接来院_アナウンス(TTS) → 切断
            ├─ 歯科/口腔外科 → 終話_予約不可_アナウンス(TTS) → 切断
            ├─ 放射線科/補聴器外来 → 代表電話_アナウンス(TTS) → 完了フラグ_代表案内_放射線 → 切断
            ├─ リストにない → リトライ_診療科_変更 → Retry/No more
            └─ {正常な診療科名} → 検査有無確認

      検査有無確認(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_検査有無（classify: はい/いいえ）
            ├─ はい → 術前検査確認
            └─ いいえ → 予約日_聴取_変更

      術前検査確認(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_術前検査（classify: はい/いいえ）
            ├─ はい → 時間指定確認
            └─ いいえ → 時間指定確認

      時間指定確認(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_時間指定（classify: はい/いいえ）
            ├─ はい → 診察日のみ変更_アナウンス(TTS) → 検査内容_聴取
            └─ いいえ → 検査内容_聴取

      検査内容_聴取(TTS+AmiVoice STT)
        → OpenAI_検査内容（classify: MRI/CT/内視鏡/その他）
            ├─ MRI/CT/内視鏡 → 代表電話_検査_アナウンス(TTS) → 完了フラグ_代表案内_検査 → 切断
            └─ その他 → 予約日_聴取_変更

      予約日_聴取_変更(TTS+AmiVoice STT)
        → OpenAI_予約日_変更（convert: date_text）
            → 予約希望日_聴取_変更

      予約希望日_聴取_変更(TTS+AmiVoice STT)
        → OpenAI_予約希望日_変更（convert: date_text）
            → 理由_聴取_変更

      理由_聴取_変更(TTS+AmiVoice STT)
        → OpenAI_理由_変更（summarize: free_text）
            → 完了フラグ_予約変更 → 終話_予約変更(TTS) → 切断

      ═══════════════════════════════════
      ─── キャンセルルート ───
      ═══════════════════════════════════
      注射装具確認_キャンセル(TTS+DTMF STT, max_dtmf_length=1)
        → OpenAI_注射装具_キャンセル（classify: はい/いいえ/わからない）
            ├─ はい → 代表電話_アナウンス(TTS) → 完了フラグ_代表案内_注射装具 → 切断
            └─ いいえ/わからない → 診療科_聴取_キャンセル

      診療科_聴取_キャンセル(TTS+AmiVoice STT)
        → OpenAI_診療科_キャンセル（normalize/classify）
            ├─ 精神科/心療内科 → 終話_直接来院_アナウンス(TTS) → 切断
            ├─ 歯科/口腔外科 → 終話_予約不可_アナウンス(TTS) → 切断
            ├─ 放射線科/補聴器外来 → 代表電話_アナウンス(TTS) → 完了フラグ_代表案内_放射線 → 切断
            ├─ リストにない → リトライ_診療科_キャンセル → Retry/No more
            └─ {正常な診療科名} → 予約日_聴取_キャンセル

      予約日_聴取_キャンセル(TTS+AmiVoice STT)
        → OpenAI_予約日_キャンセル（convert: date_text）
            → 理由_聴取_キャンセル

      理由_聴取_キャンセル(TTS+AmiVoice STT)
        → OpenAI_理由_キャンセル（summarize: free_text）
            → 完了フラグ_キャンセル → 終話_キャンセル(TTS) → 切断

      ═══════════════════════════════════
      ─── その他問合せルート ───
      ═══════════════════════════════════
      問合せ内容聴取(TTS+AmiVoice STT)
        → OpenAI_問合せ内容（summarize: free_text）
            → 完了フラグ_問合せ → 終話_問合せ(TTS) → 切断

      ═══════════════════════════════════
      ─── メインフロー内終話パターン ───
      ═══════════════════════════════════
      END_非通知 → 切断
      END_時間外 → 切断
      END_診察券なし → 切断
      END_代表案内_本日 → 切断
      END_直接来院 → 切断
      END_予約不可 → 切断
      END_病診連携 → 切断
      END_代表案内_午後 → 切断
      END_代表案内_注射装具 → 切断
      END_代表案内_放射線 → 切断
      END_代表案内_検査 → 切断
      END_予約変更（予約・変更共通）→ 切断
      END_キャンセル → 切断
      END_確認 → 切断
      END_問合せ → 切断
    notes: |
      acceptance_times使用（月〜金 9:00-16:30）。
      「初めて」の場合は診察券番号聴取のみスキップし、氏名・生年月日・電話番号は聴取する。
      診療科特殊ルールが複雑。用件ルートごとに診療科チェックの分岐先が異なる。

  - flow_name: "帝京溝口$診察券番号聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「診察券番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「帝京溝口$」に置換。構造・接続・スクリプトは一切変更不可。
      max_dtmf_length=8（0から始まる8桁）
    notes: "CLAUDE.md Rule 9 準拠。個人情報サブフロー.bivrを完全コピー"

  - flow_name: "帝京溝口$氏名聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「氏名聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「帝京溝口$」に置換。構造・接続・スクリプトは一切変更不可。
    notes: "CLAUDE.md Rule 9 準拠"

  - flow_name: "帝京溝口$生年月日聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「生年月日聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「帝京溝口$」に置換。構造・接続・スクリプトは一切変更不可。
      DOB Re-confirmation あり。
    notes: "CLAUDE.md Rule 9 準拠"

  - flow_name: "帝京溝口$電話番号聴取"
    diagram: |
      ★★★ 完全コピー対象（CLAUDE.md Rule 9） ★★★
      docs/reference/bivr/samples/個人情報サブフロー.bivr の「電話番号聴取」フローを完全コピーする。
      フロー名プレフィックスのみ「帝京溝口$」に置換。構造・接続・スクリプトは一切変更不可。
      incoming-classifier → 携帯/固定分岐 → Phone Normalization → Re-confirmation
    notes: "CLAUDE.md Rule 9 準拠"

# --- セクション5: コンテキストフィールド一覧（saveContextModel2DB 用）---
context_fields:
  - context_name: "medicalCardNumber"
    context_name_jp: "診察券番号"
    display_type: "NUMBER"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "0始まり8桁。サブフローで聴取"

  - context_name: "patientName"
    context_name_jp: "氏名"
    display_type: "TEXT"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "サブフローで聴取"

  - context_name: "patientDateOfBirth"
    context_name_jp: "生年月日"
    display_type: "DATE_OF_BIRTH"
    range_values: []
    item_default: true
    editable: true
    deletable: false
    notes: "認証設定: 優先2。サブフローで聴取"

  - context_name: "classification"
    context_name_jp: "区分"
    display_type: "CLASSIFICATION"
    range_values:
      - id: "1"
        order: "1"
        value: "予約"
      - id: "2"
        order: "2"
        value: "変更"
      - id: "3"
        order: "3"
        value: "キャンセル"
      - id: "4"
        order: "4"
        value: "確認"
      - id: "5"
        order: "5"
        value: "その他問合せ"
    item_default: true
    editable: true
    deletable: false
    notes: "用件5択"

  - context_name: "inquiry"
    context_name_jp: "問い合わせ"
    display_type: "TEXT"
    range_values: []
    item_default: false
    editable: true
    deletable: true
    notes: "受診歴・前回と同じ・紹介状有無・注射装具・検査有無・術前検査・時間指定・検査内容等の聴取結果を集約"

  - context_name: "clinicalDepartment"
    context_name_jp: "診療科"
    display_type: "DEPARTMENT"
    range_values:
      - id: "1"
        order: "1"
        value: "内科"
      - id: "2"
        order: "2"
        value: "消化器内科"
      - id: "3"
        order: "3"
        value: "外科"
      - id: "4"
        order: "4"
        value: "整形外科"
      - id: "5"
