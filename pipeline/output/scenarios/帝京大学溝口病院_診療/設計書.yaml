confirmation_items:
  - item: "office_id（施設ID）"
    resolved: false
  - item: "神経内科>平井先生の純新患判定ロジック: 初診かつ受診歴なし（いいえ）かつ神経内科を選択した場合に担当医を聴取して平井先生かどうか判定する。この解釈で正しいか確認"
    resolved: false
  - item: "リハビリテーション科の原先生判定: 再診予約で診療科=リハビリテーション科の場合のみ担当医を聴取し、原先生以外は代表案内。この解釈で正しいか確認"
    resolved: false
  - item: "小児眼科・斜視外来の分類: 診療科聴取で「小児眼科」「斜視外来」を独立の選択肢として判定するか、眼科の下位分類として判定するか確認"
    resolved: false
  - item: "診療科ごとの終話パターンで、同じ代表電話番号（044-844-3333）案内でも文言が微妙に異なる（検査の場合は検査後診察の注意書き付き等）。全パターンが正しく反映されているか確認"
    resolved: false
  - item: "「初めて」の患者が神経内科>平井先生を希望した場合の扱い: 初めて=初診=純新患と解釈して病診連携案内でよいか確認"
    resolved: false
  - item: "smsFlag: 全正常終話パターン（予約/変更/キャンセル/確認/問合せ）を1、その他（代表案内/時間外/途中切断/診察券なし/非通知）を-1としている。この割り当てで正しいか確認"
    resolved: true
  - item: "発話待機時間: 2秒（wait 2000ms）"
    resolved: true
  - item: "無回答待機時間: 10秒"
    resolved: true
  - item: "リトライ回数: 無回答・用件は2回、その他は1回"
    resolved: true
  - item: "営業時間（月〜金 9:00-16:30、土日祝・年末年始は休止）はDr.JOY側で設定"
    resolved: true
  - item: "認証設定（優先1:連絡先電話番号、優先2:生年月日）はDr.JOY側で設定"
    resolved: true
  - item: "Dr.JOY画面の状態（status）フィールドは非表示設定 → Dr.JOY側で設定"
