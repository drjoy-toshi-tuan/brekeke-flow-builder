# --- セクション11: 特記事項・制約 ---
special_notes:
  - "【最優先】clinicalDepartment=精密検査 の場合、classification（予約/変更/キャンセル/問い合わせ）を**無視**して連絡先電話番号種別のみで終話文を決定する。キャンセル文言（『ご予約のキャンセルを承りました』）は絶対に使用しない。終話判定_内部 script の条件順で精密検査を最優先に配置。"
  - "【復唱禁止】受診者名・問い合わせ内容・追加の質問・受診希望コース・希望オプション・受診希望時期・現在の予約日・変更内容は絶対に復唱しない（1/1-8/1-13/プロンプト先頭の重要指示）。**生年月日のみ「○○ですね」の復唱を許可**（生年月日聴取サブフロー内の DOB Re-confirmation）。"
  - "【additionalPhoneNumber 初期化ルール】着信時に着信番号を additionalPhoneNumber へ絶対にコピーしない。聴取完了後のみセット。途中切断時もブランクのまま（プロンプト原則4）。"
  - "【連絡先電話番号の4分岐】非通知/050/固定/不明は「ショートメールを受信できる携帯番号をお話しください」文言を使用。携帯（090/080/070）のみ「今おかけいただいている ○○ でよろしいですか？」確認文を使用。この確認文は携帯以外で絶対に使用禁止。サブフロー内でincoming-classifierで判別する（1-10 ①〜⑤）。"
  - "【連絡先電話番号リトライ超過】anonymous着信時のみ END_連絡先エラー終話（『こちらからお電話失礼させていただきます』）。それ以外は END_折返案内。リトライ上限3回（他項目の2回より多い）。サブフロー内リトライ失敗を親フローへシグナルできないため、Brekeke IVR UI で手動配線（confirmation_items 参照）。"
  - "【3名以上折返】numberOfReservations>=3 で即 END_折返案内（status=2,smsFlag=0）、以降のヒアリングに進まない。"
  - "【3営業日以内確認】冒頭で肯定→ END_予約代表案内（0537-28-8133 を3回繰り返し、status=2,smsFlag=0）。否定→受診者名聴取へ進む。"
  - "【当日/翌日拒否】受診希望時期／現在の予約日で「当日」「翌日」発話→ END_当日代表案内（0537-28-8133、status=2,smsFlag=0）。過去日付は未来化して受付、10月以降に1〜9月発話は翌年扱い（プロンプト予約関連フロー）。"
  - "【受診希望時期の再ヒアリング制御】desiredConsultation の再質問では、生年月日系定型文（『生まれた年』『生まれた月』等）を絶対に使用しない（【重要】受診希望時期の再ヒアリング制御）。prompter はこのルールをリトライ文言に反映すること。"
  - "【希望オプション例外】希望オプション聴取のみ retry_count=1、リトライ超過時は option を空欄でセットして次へ（終話しない）。他項目は retry=2、リトライ超過で END_聴取失敗（1-5-1）。"
  - "【dtmf/SSML タグ除去】Gen2 yaml 中の <dtmf digit=\"8\" />（生年月日聴取）と <speak type=\"telephone\">（050/携帯確認）は TTS プロンプト禁止。dtmf 設定は IVR プロパティ側、telephone 読み上げは IVR プロパティ側で digit 読み上げ設定を行う。"
  - "【単語正規化】「検針/返信/天候診断」→『健診』、「人間ロック/ドック/ロック/人間独」→『人間ドック』、「薬/お薬」→『予約』、「取り直したい/別の/変えたい」→『変更』、「やめる/取り消し」→『キャンセル』。「検診」の前に「乳がん/子宮がん/子宮頸がん」がある場合は除外（プロンプト 5. 予約関連の対応フロー冒頭）。"
  - "【レコメンド対象キーワード】「クーポン」「市の検診」「受診票が来た」「乳がん」「子宮がん」「休日検診」「協会けんぽ」発話時は複数候補を『{キーワード}で該当するコースは{N}コースございます。{候補}でしょうか？』フォーマットで返答（1-3）。prompter はコース聴取の OpenAI プロンプトに埋め込む。"
  - "【プロンプト非掲載質問】1-2 に基づき、プロンプトに記載のない質問には「うまく聞き取りができませんでした。再度ご用件をお話しください」を1回、2回目以降は「ご質問いただいた内容はAI電話ではご対応できませんので、代表電話の『0537-21-5555』におかけ直しください」と案内。**代表電話番号は 0537-21-5555（予約代表 0537-28-8133 と区別）**。"
  - "【function required の扱い】Gen2 function の required に medicalCardNumber / healthInsuranceAssociation が含まれるが、フローでは聴取しない。display_type 用の項目定義のみとしてコンテキストに含め、常に空欄で保存する（saveContextModel2DB の rangeValues なし）。"
  - "【status 値】Gen2 の checkpoint 0/1/2/7 + 必須項目充足で status 決定。Gen3 では saveCompletionFlag2db の status 直接指定で表現。Gen2 に出てくる status=0（途中切断）/5 は Gen3 では使用せず status=2（代表案内相当）または status=3（聴取失敗）に置換。"
  - "【用件①=問い合わせ】人数聴取をスキップして直接 問い合わせ内容聴取 → 追加の質問聴取 → 終話判定。用件②は聴取しないため classification は空欄になる。終話判定では classification 空の場合は精密判定のみ参照し、精密でなければ予約変更問合せルートに流す（実装時に要注意）。"
  - "【『もしもし』処理】単独発話時は「お声は届いております。」とアナウンスし再度質問アナウンス。他の発話がある場合は「もしもし」は判断対象から除外（1-14）。prompter の OpenAI プロンプトに組み込む。"

