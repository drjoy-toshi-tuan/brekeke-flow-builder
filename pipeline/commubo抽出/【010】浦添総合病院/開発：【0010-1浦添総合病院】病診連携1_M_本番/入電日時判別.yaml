flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: 2025/5/1以降
            - 判定: 一致
              入力: 土曜日
              次の箱: （土曜日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: 変更前：（平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 17時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: （土曜日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 12時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: 変更後：（平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 17時半まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: 2025/5/1以降
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 5月1日以前
              次の箱: 変更前：（平日）時間の分岐
            - 判定: 一致
              入力: 2025/5/1当日
              次の箱: 変更後：（平日）時間の分岐
          デフォルト: 変更後：（平日）時間の分岐

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
