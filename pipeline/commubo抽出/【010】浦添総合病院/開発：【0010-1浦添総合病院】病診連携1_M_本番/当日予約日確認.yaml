flow:
  最初の箱: 紹介状有無の確認

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 当日予約のご希望、または早急な対応が必要ですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介元医療機関聞き取り
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介元医療機関聞き取り
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、か、「いいえ」、でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 紹介元医療機関聞き取り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_転送
      - 箱: 再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回再質問
              次の箱: END_３回聞き取れず
          デフォルト: 再度聞き取りへ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_転送
        セリフ: none
        入力待ち: なし
      - 箱: END_３回聞き取れず
        セリフ: none
        入力待ち: なし
