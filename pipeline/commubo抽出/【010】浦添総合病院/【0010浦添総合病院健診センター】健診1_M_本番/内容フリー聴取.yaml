flow:
  最初の箱: それでは

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [いる, きまった, している, 決まった, 決まっている, 決まってまーす, 決まってます, 決定している, 大丈夫]
      - 名前: 否定
        値:
          未定: [いない, まだ, 決まっていない, 決まってない]

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 上記以外on_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 上記以外on_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_2
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問の有無_3
          デフォルト: Yes/No判別
      - 箱: 上記以外on_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_3
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 予約確認内容
            - 判定: 一致
              入力: 予約
              次の箱: 企業・個人
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル理由
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約
              次の箱: お伺いします。
            - 判定: 一致
              入力: 変更
              次の箱: 変更
      - 箱: 用件の確認_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約
              次の箱: 新規_2
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル理由
      - 箱: 用件の確認_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 問い合わせ
              次の箱: かしこまりました
            - 判定: 一致
              入力: 予約
              次の箱: 続いて、
      - 箱: 用件の確認_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約
              次の箱: 新規・個人③へ
            - 判定: 一致
              入力: キャンセル
              次の箱: かしこまりました
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 予約確認内容
            - 判定: 一致
              入力: 予約
              次の箱: 企業・個人
      - 箱: 予約確認内容
        セリフ: お問い合わせの内容をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 新規
        セリフ: 検査内容や受診時期など、ご希望の内容を簡単にお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: キャンセル理由
        セリフ: 予約キャンセルの理由をお話ください。なければ「特にない」とお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 新規_1
        セリフ: 受診を希望されるコースや検査名をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 新規_2
        セリフ: 追加を希望されるオプション検査がございましたら、お話ください。なければ「特にない」とお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 受診時期・コース
        セリフ: 受診を希望される日付はお決まりですか？はい決まっています、や、いいえ決まっていません、のようにお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: Yes/No判別
      - 箱: 変更
        セリフ: オプション追加や日時変更など、変更を希望される内容をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_2
      - 箱: 企業：受診者名
        セリフ: 受診される方のお名前と生年月日をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_3
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴き取り_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック_1
      - 箱: 聴き取り_2
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック_2
      - 箱: 聴き取り_3
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック_3
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: 用件の確認_3
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: 用件の確認_3
          デフォルト: 上記以外on
      - 箱: 聴取内容チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア_1
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無_1
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無_1
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: 用件の確認_4
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: 用件の確認_4
          デフォルト: 上記以外on_1
      - 箱: 聴取内容チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア_2
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無_2
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無_2
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: かしこまりました
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: かしこまりました
          デフォルト: 上記以外on_2
      - 箱: 聴取内容チェック_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア_3
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無_4
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無_4
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: かしこまりました
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: かしこまりました
          デフォルト: 上記以外on_3
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 無言クリア_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 無言クリア_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_2
      - 箱: 無言クリア_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_3
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: 失敗聴取
          デフォルト: 再質問
      - 箱: 再質問の有無_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: 失敗聴取
          デフォルト: 再質問_1
      - 箱: 再質問の有無_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: 失敗聴取
          デフォルト: 再質問_2
      - 箱: 再質問の有無_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: 失敗聴取
          デフォルト: 再質問_2
      - 箱: 再質問の有無_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: 失敗聴取
          デフォルト: 再質問_3
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 再質問_1
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認_2
      - 箱: 再質問_2
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認_1
      - 箱: 再質問_3
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業：受診者名
      - 箱: 失敗聴取
        セリフ: 申し訳ございません。上手く聞き取りができませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: かしこまりました
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: 続いて、
        セリフ: かしこまりました。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業・個人_1
      - 箱: 希望無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: かしこまりました
      - 箱: 希望有
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_希望有
      - 箱: 企業・個人
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 企業
              次の箱: 新規
            - 判定: 一致
              入力: 個人
              次の箱: 新規_1
      - 箱: 企業・個人_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 企業
              次の箱: 企業：受診者名
            - 判定: 一致
              入力: 個人
              次の箱: 新規_2
      - 箱: それでは
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 新規・個人③へ
        セリフ: かしこまりました。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診時期・コース
      - 箱: お伺いします。
        セリフ: お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診時期・コース
      - 箱: Yes/No判別
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 希望無
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 希望有
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 希望無
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 希望有
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 希望有
          デフォルト: count上記以外

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_希望有
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
