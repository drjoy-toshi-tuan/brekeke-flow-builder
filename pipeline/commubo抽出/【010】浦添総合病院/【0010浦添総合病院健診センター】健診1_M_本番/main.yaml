flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n浦添総合病院 健診センターの、健診専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間判別
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 携帯電話番号チェック
          デフォルト: 携帯電話番号チェック_1
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約キャンセルの流れ（その他診療科）
          デフォルト: 予約キャンセルの流れ（その他診療科）_1
      - 箱: 携帯電話番号チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: クローズ_1
          デフォルト: クローズ
      - 箱: 予約キャンセルの流れ（その他診療科）
        セリフ: 再予約をされない方は、お送りした資料、検体一式は破棄をお願いいたします。再予約のご予定がある方は、保管をお願いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: クローズ
        セリフ: お申し込みを受付いたしました。現時点では予約は確定しておりませんのでご注意ください。本日より10営業日を目安に、0570-010-986よりお電話、にて予約確定のご連絡をいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: クローズ_1
        セリフ: お申し込みを受付いたしました。現時点では予約は確定しておりませんのでご注意ください。本日より10営業日を目安に、0570-010-986よりお電話、もしくはショートメールにて予約確定のご連絡をいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約キャンセルの流れ（その他診療科）_1
        セリフ: 再予約をされない方は、お送りした資料、検体一式は破棄をお願いいたします。再予約のご予定がある方は、保管をお願いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 電話切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 個人・企業判別
        セリフ: none
        説明: サブシナリオ「個人・企業判別」を呼び出す
        参照ファイル: 個人・企業判別.yaml
        回答振り分け:
          デフォルト: 企業団体名・部署担当者名
      - 箱: 受診者名聞き取り
        セリフ: none
        説明: サブシナリオ「受診者名聞き取り」を呼び出す
        参照ファイル: 受診者名聞き取り.yaml
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 用件
      - 箱: 個人：用件分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 現在の予約日/予約希望日_1
            - 判定: 一致
              入力: キャンセル
              次の箱: 現在の予約日/予約希望日
          デフォルト: 完了フラグ
      - 箱: 現在の予約日/予約希望日
        セリフ: none
        説明: サブシナリオ「現在の予約日/予約希望日」を呼び出す
        参照ファイル: 現在の予約日_予約希望日.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 現在の予約日/予約希望日_1
        セリフ: none
        説明: サブシナリオ「現在の予約日/予約希望日」を呼び出す
        参照ファイル: 現在の予約日_予約希望日_1.yaml
        回答振り分け:
          デフォルト: 現在の予約日/予約希望日
      - 箱: 内容フリー聴取
        セリフ: none
        説明: サブシナリオ「内容フリー聴取」を呼び出す
        参照ファイル: 内容フリー聴取.yaml
        回答振り分け:
          デフォルト: 現在の予約日/予約希望日
      - 箱: 企業団体名・部署担当者名
        セリフ: none
        説明: サブシナリオ「企業団体名・部署担当者名」を呼び出す
        参照ファイル: 企業団体名・部署担当者名.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 用件
        セリフ: none
        説明: サブシナリオ「用件」を呼び出す
        参照ファイル: 用件.yaml
        回答振り分け:
          デフォルト: 内容フリー聴取
      - 箱: 時間外
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、土日祝日、月曜日を除く、平日11時30分から15時です。\n恐れ入りますが、受付時間内におかけなおしください。お電話ありがとうございました。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 3回失敗
        セリフ: "恐れ入りますが、浦添総合病院 健診センターへおかけなおしください。\n受付時間は、土日祝日を除く、平日11時30分から15時となっております。お電話番号が分かる場合は、そのままお電話をお切りください。 分からない場合はご案内いたしますのでメモをご準備ください。\n電話番号は、0570-010-986です。繰り返します。電話番号は、0570-010-986です。お電話ありがとうございました。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 稼働前
        セリフ: "この電話番号は、ご利用開始前です。\n稼働スケジュールについては、当院のホームページをご確認下さい。\nお電話ありがとうございました。 \nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 内容失敗
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗
      - 箱: 用件失敗
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗
      - 箱: 生年月日失敗
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗
      - 箱: 企業失敗
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗
      - 箱: 企業個人失敗
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗
      - 箱: 予約日失敗
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗
      - 箱: 予約受付不可（6/25～）
        セリフ: "現在、お電話、及びご予約が大変混みあっており、ご不便をおかけして申し訳ございません\n7月の健診予約は終了いたしました。\n8月以降のご予約は7月1日より再開いたします。\n恐れ入りますが、7月1日以降におかけ直しください。\nまた、協会けんぽ　加入事業所からのご予約はお電話ではなくFAXにてお願いいたします。\nお電話お待ちしております。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 2月アナウンス
        セリフ: "こちらのお電話でのご予約は、2月27日までとなっております。それ以降に関してのご予約は、0570ー010-986におかけください。\n尚、こちらのお電話でご予約できる日付は3月21日までとなっております。協会けんぽ　加入事業所からのご予約はお電話ではなくFAXにてお願いいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 個人・企業判別
      - 箱: 年末年始終話へ
        セリフ: お電話ありがとうございました。それでは、失礼いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 年末年始終話へ_1
        セリフ: お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 時間判別
        セリフ: none
        説明: サブシナリオ「時間判別」を呼び出す
        参照ファイル: 時間判別.yaml
        回答振り分け:
          デフォルト: 2月アナウンス

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
