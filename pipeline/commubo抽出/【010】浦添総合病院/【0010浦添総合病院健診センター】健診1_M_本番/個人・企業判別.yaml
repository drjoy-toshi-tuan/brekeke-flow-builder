flow:
  最初の箱: はじめに、

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [あってます, そうそう, そうです, はーい, はいメモ, 個人マスク, 大丈夫, 配送です]
      - 名前: 否定
        値:
          いいえ: [そうじゃない, ちがう, ちゃうちゃう, まちがった, 違います, 会社で, 会社です, 三重]

  共通:
    箱一覧:
      - 箱: 企業か個人聞き取り
        セリフ: ご自身の予約に関するご連絡でしょうか？はいそうです、またはいいえ違います、でお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 企業の問い合わせ
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 個人
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 個人
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 個人
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 企業の問い合わせ
          デフォルト: 上記以外ON
      - 箱: 企業の問い合わせ
        セリフ: 企業のご担当者様ですね。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: END_企業
      - 箱: 個人
        セリフ: 個人受診の方ですね。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: END_個人
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回質問済み
              次の箱: ３回聞き取れず
          デフォルト: 再質問
      - 箱: 上記以外ON
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再質問の有無
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業か個人聞き取り
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_問合せ種類聞き取れず
      - 箱: はじめに、
        セリフ: はじめに、お電話口の方についてお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業か個人聞き取り

  終了:
    箱一覧:
      - 箱: END_企業
        セリフ: none
        入力待ち: なし
      - 箱: END_個人
        セリフ: none
        入力待ち: なし
      - 箱: END_問合せ種類聞き取れず
        セリフ: none
        入力待ち: なし
