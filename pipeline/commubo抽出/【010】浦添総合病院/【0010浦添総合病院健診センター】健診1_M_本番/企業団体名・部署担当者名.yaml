flow:
  最初の箱: 冒頭

  共通:
    箱一覧:
      - 箱: 名前の聴取へ
        セリフ: 部署と、ご担当者様のお名前をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 部署名、名前の聴き取り
      - 箱: 企業名の聴取へ
        セリフ: ご連絡いただいている方の企業もしくは団体名をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業名の聴き取り
      - 箱: 部署名、名前の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 企業名の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック_1
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋担当者名なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 無言9（5秒）＋担当者名なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 無言3（約2秒）＋担当者名あり
              次の箱: 聞き取り完了
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋担当者名あり
              次の箱: 聞き取り完了
          デフォルト: 無言on
      - 箱: 聴取内容チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア_1
            - 判定: 数値以上
              入力: 無言9（5秒）＋企業団体名なし
              次の箱: 再質問の有無_1
            - 判定: 一致
              入力: 無言9（5秒）＋企業団体名なし
              次の箱: 再質問の有無_1
            - 判定: 数値以上
              入力: 無言3（約2秒）＋企業団体名あり
              次の箱: 聞き取り完了_1
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋企業団体名あり
              次の箱: 聞き取り完了_1
          デフォルト: 無言on_1
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 部署名、名前の聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 部署名、名前の聴き取り
      - 箱: 再度質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴取へ
      - 箱: 無言on_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業名の聴き取り
      - 箱: 無言クリア_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業名の聴き取り
      - 箱: 再度質問_1
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業名の聴取へ
      - 箱: 聞き取り完了
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 聞き取り完了_1
        セリフ: かしこまりました。次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴取へ
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_失敗
          デフォルト: 再度質問
      - 箱: 再質問の有無_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_失敗
          デフォルト: 再度質問_1
      - 箱: 冒頭
        セリフ: 当院より折り返しお電話をさせていただきますので、
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業名の聴取へ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_失敗
        セリフ: none
        入力待ち: なし
