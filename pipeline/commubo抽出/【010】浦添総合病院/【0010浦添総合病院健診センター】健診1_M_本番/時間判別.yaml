flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付判断
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 月曜
              次の箱: END_時間外
            - 判定: lessEqual
              入力: 平日（火〜金）
              次の箱: 時間の分岐
          デフォルト: END_時間外
      - 箱: 時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 11時半前
              次の箱: 平日の11時半前
            - 判定: 数値
              入力: 15時15分まで
              次の箱: 平日11時半〜15時15分（時間内）
          デフォルト: 平日15時15分以降（時間外）
      - 箱: 時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: 土曜日の8時半前
            - 判定: 数値
              入力: 11時15分まで
              次の箱: 土曜日8時半〜11時15分（時間内）
          デフォルト: END_時間外
      - 箱: 時間の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 11時半前
              次の箱: 平日の11時半前
            - 判定: lessEqual
              入力: 15時15分まで
              次の箱: 平日11時半〜15時15分（時間内）
          デフォルト: 2月27日～4月30日まで
      - 箱: 祝日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 平日の11時半前
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 平日11時半〜15時15分（時間内）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_稼働中
      - 箱: 平日15時15分以降（時間外）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 土曜日の8時半前
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 土曜日8時半〜11時15分（時間内）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_稼働中
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 年末年始の日付判断_1
      - 箱: 年末年始の日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/29まで
              次の箱: 12/19～12/29まで
            - 判定: lessEqual
              入力: 12/30～1/5
              次の箱: 年末年始アナウンス
          デフォルト: 曜日の分岐
      - 箱: 年末年始の日付判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1/1
              次の箱: 年末年始アナウンス
          デフォルト: 祝日
      - 箱: 日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 2/27日前
              次の箱: 祝日チェック
            - 判定: 一致
              入力: 2/27
              次の箱: 時間の分岐_2
            - 判定: lessEqual
              入力: 2月27日～4月30日まで
              次の箱: 2月27日～4月30日まで
          デフォルト: 祝日チェック
      - 箱: 年末年始アナウンス
        セリフ: 誠に恐れ入りますが、本日は年末年始のため休診とさせていただいております。診療は1月6日より再開いたします。ご理解のほど、よろしくお願い申し上げます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始アナウンスへ
      - 箱: 12/19～12/29まで
        セリフ: "AI電話での健診予約は終了いたしました。恐れ入りますが、1月6日以降におかけ直しください。\nなお、オペレーター対応は12月29日午前まで行っております。ご希望の方は、「0570-010-986」へおかけください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_2月27日～4月30日まで
      - 箱: 2月27日～4月30日まで
        セリフ: こちらのお電話での予約は終了いたしました。ご予約に関しては、0570ー010-986におかけ直しください。繰り返します。ご予約に関しては、0570ー010-986におかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_2月27日～4月30日まで

  終了:
    箱一覧:
      - 箱: END_稼働中
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_2月27日～4月30日まで
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始アナウンスへ
        セリフ: none
        入力待ち: なし
