flow:
  最初の箱: 受診希望聞き取り

  共通:
    箱一覧:
      - 箱: 受診希望聞き取り
        セリフ: ご希望の予約日をお話ください
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: すべて聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: 終話
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: 終話
          デフォルト: 上記以外ON
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回質問済み
              次の箱: 3回聞き取れず
          デフォルト: 再質問
      - 箱: 上記以外ON
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 再質問
        セリフ: 恐れ入りますが、
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診希望聞き取り
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診希望日聞き取れず
      - 箱: 終話
        セリフ: かしこまりました。ご希望に添えない場合もございますので、恐れ入りますが、ご了承ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診希望日聞き取り完了

  終了:
    箱一覧:
      - 箱: END_受診希望日聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_受診希望日聞き取れず
        セリフ: none
        入力待ち: なし
