flow:
  最初の箱: 用件確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あってます, そうしたい, はーい, はいそうです, はい希望します, よろしい, 異常部, 希望します, 丈夫, 大丈夫]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない, はじめて, まちがえた, 結構です, 初めて, 必要ありません, 必要ない]
      - 名前: 用件
        値:
          キャンセル: [2, ２, キャンセル, ちゃん製, に, にばん, やめる, ユーザースキャンする, 取り消し, 取り消す, 取消, 二番]
          確認: [3, ３, お聞き, さんばん, その他確認, ニューヨーク時間, 確認, 教えて, 金額, 三番, 時間を忘れた, 調べて, 日時, 日時を確認する, 日時確認, 日時確認, 紛失, 聞きたい, 忘れた]
          診察: [４番, 4番, しょしん, はじめて, よん, 印刷, 印刷の契約, 印刷の予約, 印刷は奴, 休薬をする, 再診, 再診予約, 最新, 三新薬, 四番, 四百, 取得, 初めて, 初診, 初診予約, 新規の, 新卒, 診察, 診察の予約, 千円札, 中央, 中央ドル, 入札, 有効する, 予約お願い, 予約がしたい, 予約する, 予約でお願い, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          変更: [１番, 1番, いち, 一番, 延期, 銀行, 最初の, 時間, 時間を変えたい, 取り直したい, 取り直す, 新興, 人工, 日程, 日程をかえたい, 日付, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更, 予約シンコウ]

  共通:
    箱一覧:
      - 箱: 用件確認
        セリフ: "ご用件を、次の４つのうちの、いずれかでお話いただくか、ダイヤルプッシュでご入力ください。\n「1、予約変更」\n「2、予約キャンセル」\n「3、予約確認」\n「4、予約を取る」、それでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF受け
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。はい、大丈夫です、か、いいえ、違います、でお答えいただけますか?\nお答えいただいた後、AIが返答するまで、少々お待ちください。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（診察）_1
      - 箱: 再度聞き取りへ_2
        セリフ: うまく聞き取りが出来ませんでした。再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 症状確認
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 初診予約
              次の箱: 用件の復唱（診察）
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: 予約変更
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: 予約日時の確認
              次の箱: 用件の復唱（日時確認）
      - 箱: 用件の復唱（診察）
        セリフ: 診察のご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: 症状確認
      - 箱: 用件の復唱（キャンセル）
        セリフ: ご予約のキャンセル、ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（変更）
        セリフ: ご予約の変更、ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（日時確認）
        セリフ: 予約日時の確認、ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（再診）
        セリフ: 再診のご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（キャンセル）_1
        セリフ: 初診のご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（診察）_1
        セリフ: 通院中の患者さんですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 初診のセット
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 再診のセット
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 再診のセット
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 初診のセット
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 再診のセット
          デフォルト: count上記以外_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件取得できず
      - 箱: 再診のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（再診）
      - 箱: 初診のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（キャンセル）_1
      - 箱: DTMF受け
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: DTMF：1 変更へ
              次の箱: 変更
            - 判定: 一致
              入力: DTMF：2 キャンセルへ
              次の箱: キャンセル
            - 判定: 一致
              入力: DTMF：3 確認へ
              次の箱: 確認
            - 判定: 一致
              入力: DTMF：4 予約へ
              次の箱: 診察
          デフォルト: count上記以外
      - 箱: 変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: キャンセル
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 診察
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 症状確認
        セリフ: "現在症状がおありで、当日、または翌診療日のご予約が必要でしょうか。\nはい、希望します。または、いいえ、結構です。のように、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 当日翌診療日へ変更希望
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 変更しない
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 当日翌診療日へ変更希望
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 当日翌診療日へ変更希望
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 変更しない
          デフォルト: count上記以外_2
      - 箱: 当日翌診療日へ変更希望
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 変更しない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（診察）_1
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 肯定/否定

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
