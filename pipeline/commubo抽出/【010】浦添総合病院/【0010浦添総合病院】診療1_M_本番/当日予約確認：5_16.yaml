flow:
  最初の箱: 本日予約の方確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [あってます, そうしたい, そうそう, そうです, そうです, はーい, はいきぼうします, 希望します, 配送です, 必要かも, 必要だ, 必要です]
      - 名前: 否定
        値:
          いいえ: [いいです, そうじゃない, ちがう, まちがった, 結構です, 必要ありません, 必要ない]

  共通:
    箱一覧:
      - 箱: 本日予約の方確認へ
        セリフ: 本日のご予約の方ですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 肯定/否定
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 肯定/否定_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 本日予約の方確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 否定：症状聴取
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_予約日聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_予約日聞き取れず
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 本日予約の方
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 本日予約の方
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 本日予約の方
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
          デフォルト: count上記以外
      - 箱: 肯定/否定_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 当日翌診療日へ変更希望
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 否定_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 当日翌診療日へ変更希望
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 当日翌診療日へ変更希望
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定_1
          デフォルト: count上記以外_1
      - 箱: 本日予約の方
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_本日予約の方
      - 箱: 当日翌診療日へ変更希望
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_当日翌診療日変更希望
      - 箱: 否定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件確認
      - 箱: 否定_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る（診療科聴取へ）
      - 箱: 否定：症状聴取
        セリフ: "現在症状がおありで、早めの予約変更が必要でしょうか。\nはい、必要です。または、いいえ、結構です。のように、お話ください"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定_1
      - 箱: 用件確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 否定：症状聴取
          デフォルト: END_戻る（診療科聴取へ）

  終了:
    箱一覧:
      - 箱: END_予約日聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_本日予約の方
        セリフ: none
        入力待ち: なし
      - 箱: END_当日翌診療日変更希望
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る（診療科聴取へ）
        セリフ: none
        入力待ち: なし
