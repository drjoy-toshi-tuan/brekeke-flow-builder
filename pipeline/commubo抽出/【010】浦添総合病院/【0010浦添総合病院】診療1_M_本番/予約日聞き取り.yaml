flow:
  最初の箱: 現在の予約日の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: わからない
        値:
          わからない: [しらない, しりません, 覚えていない, 覚えてない, 書いていない, 知らない]
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []

  共通:
    箱一覧:
      - 箱: 現在の予約日の聞き取りへ
        セリフ: 現在の予約日を「4月1日」のように日付でお話ください。分からない場合には分からないとお答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 日付チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 値含む
              入力: 日の発話あり
              次の箱: 日付チェック_2
            - 判定: 値含む
              入力: 月の発話あり
              次の箱: 月の発話あり
            - 判定: 値含む
              入力: 年の発話あり
              次の箱: 日付チェック_3
          デフォルト: 日付チェック_3
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: 値含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち
              次の箱: 月チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち
              次の箱: 月チェック
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 日付
              次の箱: 日付チェック
            - 判定: エンティティ含む
              入力: わからない
              次の箱: 分からないセット
          デフォルト: 聴取内容チェック
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再度質問
      - 箱: リセット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再度聞き取りへ
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 無言9（5秒）＋日にちなし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 無言9（5秒）＋日にちなし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 無言5（約3秒）＋日にちあり
              次の箱: 日付チェック_1
            - 判定: エンティティ含む
              入力: 無言5（約3秒）＋日にちあり
              次の箱: 日付チェック_1
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 分からないセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 再度質問
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 現在の予約日の聞き取りへ
      - 箱: 日付チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 日付あり
              次の箱: 生年月日の判定
          デフォルト: リセット
      - 箱: 聞き取り完了
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: 回答なし
          デフォルト: リセット
      - 箱: 回答なし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_予約日取得できず
      - 箱: 日付チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 月チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01月
              次の箱: 日チェック
          デフォルト: 月の置換
      - 箱: 日付チェック_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
            - 判定: 一致
              入力: 01月
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 日チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日の置換
      - 箱: 月の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日チェック
      - 箱: 日の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: 数字を日付に
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 0以下
              次の箱: 聞き取りへ戻る
            - 判定: lessEqual
              入力: 9以下
              次の箱: 0桁詰め
            - 判定: lessEqual
              入力: 31以下
              次の箱: 日の置換
          デフォルト: 聞き取りへ戻る
      - 箱: 0桁詰め
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日の置換
      - 箱: 聞き取りへ戻る
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 生年月日の判定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1927〜1988（昭和）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1927〜1988（昭和）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1990〜2018（平成）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1990〜2018（平成）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 2019-01-01〜04-30（平成）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 2019-01-01〜04-30（平成）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 2020〜（令和）
              次の箱: 聞き取り完了
          デフォルト: count上記以外
      - 箱: 月の発話あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_2
      - 箱: 月の発話あり_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 月チェック
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 回答なし
          デフォルト: リセット_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 現在の予約日の聞き取りへ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_予約日取得できず
        セリフ: none
        入力待ち: なし
