        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐（心臓）の聞き取り
      - 箱: 分岐（術前）の聞き取りへ
        セリフ: 整形外科と、共同診、どちらでしょうか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐（術前）の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐あり診療科
              次の箱: 00分岐あり診療科セット
            - 判定: エンティティ含む
              入力: 復唱用
              次の箱: 復唱のみの診療科セット
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度⇒再度案内
            - 判定: エンティティ含む
              入力: 内科発話
