        回答振り分け:
          デフォルト: 分岐（呼吸器）の聞き取り
      - 箱: 診療科の聞き取りへ（予約変更・キャンセル）
        セリフ: 予約票に記載されている診療科をおっしゃってください。分からない場合には分からないとお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取りへ（新規、再診）
        セリフ: 予約を希望される診療科をおっしゃってください。わからない場合には分からないとお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 分岐（肝臓）の聞き取りへ
        セリフ: 消化器内科と外科、どちらでしょうか？
        入力待ち: なし
