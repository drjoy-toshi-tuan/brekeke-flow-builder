              次の箱: 次へ_7
            - 判定: 一致
              入力: 予約変更
              次の箱: 次へ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 次へ
            - 判定: 一致
              入力: 初診予約
              次の箱: 次へ_6
            - 判定: 一致
