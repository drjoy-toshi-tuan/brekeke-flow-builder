flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n浦添総合病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日聞き取り
      - 箱: 次へ_1
        セリフ: では、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日聴取
      - 箱: 次へ_2
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ_3
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 完了フラグ（予約変更キャンセル）
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 完了フラグ（予約変更キャンセル）
            - 判定: 一致
              入力: 再診予約
              次の箱: 完了フラグ（予約変更キャンセル）
            - 判定: 一致
              入力: 初診予約
              次の箱: 完了フラグ（予約変更キャンセル）
            - 判定: 一致
              入力: 予約確認
              次の箱: 完了フラグ（確認）
      - 箱: 次へ_3
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聴取
      - 箱: 次へ_4
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 次へ_5
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由聴取
      - 箱: 予約/予約変更/キャンセル
        セリフ: AI電話の申込を受け付けました。3診療日以内に、098-851-5171より折り返し電話、もしくは今お掛けいただいている050-1721-8524よりショートメールにてご連絡をいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約確認（携帯以外）
        セリフ: AI電話の申込を受け付けました。3診療日以内に、098-851-5171より、折り返しご連絡いたします。
