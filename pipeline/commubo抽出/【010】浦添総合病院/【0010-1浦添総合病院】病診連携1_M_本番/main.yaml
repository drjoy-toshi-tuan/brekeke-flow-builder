        参照ファイル: 用件.yaml
        回答振り分け:
          デフォルト: 用件セット分岐
      - 箱: 次へ_1
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 緊急性チェック
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名聴取済みcheck
      - 箱: 次へ_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日予約日確認
      - 箱: 次へ_4
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 問い合わせ①
      - 箱: 用件セット分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
