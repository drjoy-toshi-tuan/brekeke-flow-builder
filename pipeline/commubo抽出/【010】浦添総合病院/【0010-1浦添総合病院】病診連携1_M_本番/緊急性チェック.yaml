flow:
  最初の箱: 本日予約の方確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          緊急: [あってます, そうです, そうです, はーい, はい, 急ぎ, 配送です]
      - 名前: 否定
        値:
          いいえ: [そうじゃない, ちがう, ない, まちがった]

  共通:
    箱一覧:
      - 箱: 本日予約の方確認へ
        セリフ: 本件は緊急のご連絡でしょうか？　「緊急です」または「いいえ、違います」とお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 本日予約の方確認へ
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 緊急
              次の箱: 緊急の方
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 緊急の方
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 緊急の方
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 緊急じゃない
          デフォルト: count上記以外
      - 箱: 緊急の方
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_緊急
      - 箱: 緊急じゃない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_緊急じゃない

  終了:
    箱一覧:
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_緊急
        セリフ: none
        入力待ち: なし
      - 箱: END_緊急じゃない
        セリフ: none
        入力待ち: なし
