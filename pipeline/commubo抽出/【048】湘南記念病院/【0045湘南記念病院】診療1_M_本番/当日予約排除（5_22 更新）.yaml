flow:
  最初の箱: 当日予約有無

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [まって, もいちど, もういっかい, もう一_回, もう一度, もーいちど, もっかい, わんもあ]
      - 名前: 肯定
        値:
          はい: [あってます, あってる, そうそう, そうです, その通りです, はーい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 否定
        値:
          いいえ: [いーえ, いえ, いや, そうじゃない, ちがう, まちがった]

  共通:
    箱一覧:
      - 箱: 用件判断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: END_当日希望
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_明日以降
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_当日希望
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_明日以降
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_明日以降
          デフォルト: count上記以外
      - 箱: 当日予約有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日予約有無_1
      - 箱: 当日予約有無_1
        セリフ: "また、このお電話では、本日のご用件を承ることができません。\n明日以降の受診予約についてでよろしいですか？\nはい、そうです。またはいいえ、違います。でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件判断
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: count再質問
          デフォルト: 用件判断
      - 箱: 再質問
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、や、「いいえ」、のような短い単語だけでは認識が難しいため、\n「はいそうです」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。\n本日の予約に関する内容ですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件判断
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聴取できず
          デフォルト: 再質問

  終了:
    箱一覧:
      - 箱: END_明日以降
        セリフ: none
        入力待ち: なし
      - 箱: END_当日希望
        セリフ: none
        入力待ち: なし
      - 箱: END_聴取できず
        セリフ: none
        入力待ち: なし
