flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n湘南記念病院の、予約専用、AI電話です。当院は、2026年1月1日より順次、外来診療を縮小し、2026年3月31日をもってすべての外来診療を終了させていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日の聞き取り
      - 箱: 次へ_1
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 確認内容の聞き取りへ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認内容の聞き取り
      - 箱: 次へ_2
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約希望日
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診予約
              次の箱: 再診
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセル
            - 判定: 一致
              入力: 予約確認
              次の箱: 予約確認
          デフォルト: 予約確認
      - 箱: 次へ_3
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_4
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 再診
        セリフ: 再診予約の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡猶予
      - 箱: 予約変更
        セリフ: 予約変更の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡猶予
      - 箱: 予約キャンセル
        セリフ: 予約キャンセルの申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡猶予
      - 箱: 予約確認
        セリフ: ご予約に関するお問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡猶予
      - 箱: 連絡猶予
        セリフ: 3診療日以内の担当者からの折り返し電話、もしくはSMSにて確定となります。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 予約確定タイミングの説明
            - 判定: 一致
              入力: 再診
              次の箱: 新規予約・予約変更・キャンセル・定期受診へ
            - 判定: 一致
              入力: 新規
              次の箱: （初診）代表へ
            - 判定: 一致
              入力: 変更
              次の箱: 予約確定タイミングの説明_1
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約確定タイミングの説明_1
          デフォルト: 予約確定タイミングの説明
      - 箱: 用件を判断_1
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 次へ
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ
            - 判定: 一致
              入力: 再診
              次の箱: 次へ_2
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間外ノードへ
      - 箱: 新規予約・予約変更・キャンセル・定期受診へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_4
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_3
      - 箱: 確認内容の聞き取り
        セリフ: none
        説明: サブシナリオ「確認内容の聞き取り」を呼び出す
        参照ファイル: 確認内容の聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 時間外ノードへ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: Dr.JOY 番号判別
      - 箱: 時間外
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外です。受付時間は、土日祝日、年末年始を除く月曜日から金曜日の、9時から15時となっております。\n恐れ入りますが、受付時間内にお掛け直し下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 時間外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件（5/22 更新）
        セリフ: none
        説明: サブシナリオ「用件（5/22 更新）」を呼び出す
        参照ファイル: 用件（5_22 更新）.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 次へ_5
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件（5/22 更新）
      - 箱: 当日予約→代表へ
        セリフ: "この電話では、本日の予約を承ることができません。\n恐れ入りますが、代表電話へお掛け直し下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表誘導：0467-32-3456
      - 箱: 代表誘導：0467-32-3456
        セリフ: 番号は、0467-32-3456です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 回数count
      - 箱: 回数count
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 終話
          デフォルト: 繰り返し
      - 箱: 繰り返し
        セリフ: 繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表誘導：0467-32-3456
      - 箱: 予約希望日
        セリフ: none
        説明: サブシナリオ「予約希望日」を呼び出す
        参照ファイル: 予約希望日.yaml
        回答振り分け:
          デフォルト: 診療科 わからない
      - 箱: 二科目診療科聴取
        セリフ: none
        説明: サブシナリオ「二科目診療科聴取」を呼び出す
        参照ファイル: 二科目診療科聴取.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 続いて、
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 二科目診療科聴取
      - 箱: 診療科 わからない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: わからない
              次の箱: 続いて、
          デフォルト: 続いて、
      - 箱: 代表へ
        セリフ: "申し訳ございません。恐れ入りますが、\n<? $clinical_department ?>\nについては、月曜日から金曜日の9時～16時の間に、代表電話へお掛け直し下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表誘導：0467-32-3456
      - 箱: （初診）代表へ
        セリフ: "2026年1月1日より順次、外来診療を縮小し、2026年3月31日をもってすべての外来診療を終了させていただきますので、\n恐れ入りますが、代表電話へお掛け直し下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表誘導：0467-32-3456
      - 箱: 代表へ_1
        セリフ: "申し訳ございません。\n<? $clinical_department ?>\nは、AI電話では承ることができません。恐れ入りますが、代表電話へお掛け直し下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表誘導：0467-32-3456
      - 箱: 代表へ_2
        セリフ: "申し訳ございません。\n<? $clinical_department ?>\nは、2025年12月をもって外来診療を終了いたしました。ご不明な点がございましたら代表電話へお掛け直し下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表誘導：0467-32-3456
      - 箱: 診察券用意案内
        セリフ: ご予約には診察券番号が必要ですので、診察券または予約票をご用意ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日予約排除（5/22 更新）
      - 箱: 当日予約排除（5/22 更新）
        セリフ: none
        説明: サブシナリオ「当日予約排除（5/22 更新）」を呼び出す
        参照ファイル: 当日予約排除（5_22 更新）.yaml
        回答振り分け:
          デフォルト: 次へ_5
      - 箱: 予約確定タイミングの説明
        セリフ: 本日承る内容は、この電話が終了後、3診療日以内に担当者よりお電話、またはSMSにてご連絡のうえ、確定となります。
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認内容の聞き取りへ
      - 箱: 予約確定タイミングの説明_1
        セリフ: 本日承る内容は、この電話が終了後、3診療日以内に担当者よりお電話、またはSMSにてご連絡のうえ、確定となります。
        入力待ち: なし
        回答振り分け:
          デフォルト: 新規予約・予約変更・キャンセル・定期受診へ
      - 箱: Dr.JOY 番号判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 05017074509
              次の箱: 診察券用意案内
          デフォルト: 時間判断
      - 箱: 乳腺外科分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 乳腺外科
              次の箱: 代表へ
          デフォルト: 代表へ_1
      - 箱: 時間判断
        セリフ: none
        説明: サブシナリオ「時間判断」を呼び出す
        参照ファイル: 時間判断.yaml
        回答振り分け:
          デフォルト: 診察券用意案内
      - 箱: 診療科
        セリフ: none
        説明: サブシナリオ「診療科」を呼び出す
        参照ファイル: 診療科.yaml
        回答振り分け:
          デフォルト: 用件を判断_1

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_（初診）代表へ
        セリフ: "2026年1月1日より順次、外来診療を縮小し、2026年3月31日をもってすべての外来診療を終了させていただきますので、\n恐れ入りますが、代表電話へお掛け直し下さい。"
        入力待ち: なし
