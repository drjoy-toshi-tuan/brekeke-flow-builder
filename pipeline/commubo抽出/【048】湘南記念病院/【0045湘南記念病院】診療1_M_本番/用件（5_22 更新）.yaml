flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 用件
        値:
          キャンセル: [3, 3番, キャンプ, のキャンセル, やめる, よく県する, 行けない, 三, 取り消し, 取り消す, 取消, 予約のキャンセル]
          確認: [4, 4番, の確認, を確認, 確認したい, 確認の希望, 確認を希望, 確認希望, 四]
          診察: [1, 1番, わたしよやく, 一, 再診の予約, 四百とります, 信託万二百オフ後, 診察の予約, 薬をとる, 予約をお願い, 予約をポール, 予約を取りたい, 予約を取る, 余白を取る]
          変更: [2, 2番, いや抗原航空, の銀行, の変更, の辺, 延期, 取り直したい, 取り直す, 二, 二番, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちのいずれかでお話ください。ボタン操作も可能です。\n\n1番、予約を取る、\n2番、変更、\n3番、キャンセル、\n4　番、確認、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF内容確認
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。はい、そうです、または、いいえ、違いますでお答えいただけますか？\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。はい、そうです、または、いいえ、違いますでお答えいただけますか？\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 新患判断
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: 確認
              次の箱: 確認復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 診察
              次の箱: 予約判別
      - 箱: 予約キャンセル復唱
        セリフ: "ご予約のキャンセルでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約変更復唱
        セリフ: "ご予約の変更でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 確認復唱
        セリフ: "ご予約の確認でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約判別
        セリフ: 診察のご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: 新患判断
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: 用件を確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 初診確認へ
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 初診確認へ
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 初診確認へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 再診
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 再診
          デフォルト: count上記以外_2
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 3回聞き取れず
          デフォルト: 用件再設定へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 用件を確認_1
      - 箱: DTMF内容確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1：診察
              次の箱: 予約判別
            - 判定: 一致
              入力: 2：変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: 3：キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 4：確認
              次の箱: 確認復唱
          デフォルト: count上記以外
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 新患判断
        セリフ: 当院でのご受診は初めてですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 初診確認へ
        セリフ: 初診のご予約、ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 再診
        セリフ: "再診のご予約、ですね?\n本日承る内容は、この電話が終了後、3診療日以内に担当者よりお電話、またはSMSにてご連絡のうえ、確定となります。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
