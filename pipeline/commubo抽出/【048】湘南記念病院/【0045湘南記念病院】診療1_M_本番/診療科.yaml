flow:
  最初の箱: 用件を判断

  エンティティ定義:
    カスタム:
      - 名前: 01_00_分岐なし診療科
        値:
          アートメイク: [あートニック, アイライン, あうんとメイク, あとメイク, あどメイク, ハードメイク, パートメイク, ファンドメイク, ま言え, 眉毛]
          アロママッサージ: [あの, あるの, あるま, あローマ, アロマ, マッサージ, 車]
          リハビリテーション科: [リハ, リハビリ, リハビリテーション, リハビリテーションセンター, リハビリ科, リハビリ店さんか, リハ科, 二は, 二八, 二百ミリ, 日は]
          栄養科: [イオンか, ええよ, えー八_日, えー八日, え言おうか, 栄養, 栄養が, 栄養価, 見ようか]
          栄養指導: [A四指導, えーヨシロウ, えー用紙, 三次どう, 三芳の, 指導]
          外科: [けが, てか, メーカー, レッカー, 形が, 経過, 経管, 結果, 月間, 時間, 理科, 劣化]
          禁煙外来: [期限, 期限が, 禁煙, 金がない, 親展, 人間が]
          形成外科: [京成, 形成, 訂正, 美容外科, 美容形成, 平成, 平成元が, 編成]
          健康診断: [君ん検針, 健診センター, 検診, 検診センター, 市民健診, 市民検診, 変更診断]
          検査: [センサ, 件さ, 検査科, 先生, 千三]
          産婦人科: [お産, お産センター, マタニティ, 三か, 三個, 参加, 主人間, 周産]
          腫瘍内科: [使用, 腫瘍, 需要がん大, 中庸はないか, 必要ないか]
          睡眠時無呼吸外来: [CPAP, 睡眠時, 無呼吸]
          整形外科: [TK, 整形, 閉経]
          脊椎外来: [脊椎, 平日以外ない]
          糖尿病外来: [糖尿病]
          内科: [ないか, 何か, 呼吸器, 呼吸器科, 呼吸器缶, 今日書き, 循環器, 循環器科, 尚書き, 消化器科, 障害か, 表記, 補給機]
          内視鏡室: [いいカメラ, カメラ, 胃カメラ, 代表, 大腸カメラ, 内視鏡]
          乳腺外科: [二千, 二千外科, 二本センター, 乳がんセンター, 乳癌センター, 乳腺, 入船, 優先, 有線, 有線外科]
          脳神経外科: [のすん系外科, の下, の買い, 頭痛, 脳外]
          発熱外来: [それで, なぜ, はずの図外来, 特別が, 特別だ依頼, 特別な, 特別外来, 特別害ない, 発熱, 風, 風邪, 壁]
          泌尿器科: [ウロ, 金曜日, 昨日聞か, 信用機関, 信用機関, 泌尿, 泌尿器, 費用]
          皮膚科: [Vista, いうか, いるか, 岐阜が, 水が, 昼か, 昼ば, 二日, 皮膚]
          婦人科: [ギネ, ぎね, フジコ, 疑念, 主人, 主人間, 二年, 二年, 婦人, 富士銀行]
          放射線科: [放射, 放射線]
          予防接種: [インフル, コロナ, の棒全紙, リボン摂取, 女房先週, 女房千種, 帯状疱疹, 注射, 肺炎球菌, 有望摂取, 予備種, 予防注射, 両方接種]
      - 名前: わからない
        値:
          わからない: [しらない, しりませーん, わかりません, わすれた, 覚えていない, 覚えてない, 書いていない, 知らない, 分からない, 分からん, 忘れちゃった]
      - 名前: 肯定エンティティ
        値:
          肯定: [してまーす, はーい, 異常部, 合って, 丈夫, 大丈夫, 配送です]
      - 名前: 否定エンティティ
        値:
          否定: [EHが今, いいえ, いえ, いや, じゃない, ちがいまーす, ちがう, ちゃう, 違います]

  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（予約変更・キャンセル）
        セリフ: 予約票に記載されている診療科をおっしゃってください。複数診療科の場合は、一つ目の診療科をお話ください。わからない場合は、「わからない」、のようにお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取りへ（新規予約）
        セリフ: 受診を希望される診療科をおっしゃってください。複数診療科の場合は、一つ目の診療科をお話ください。わからない場合は、「わからない」、のようにお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科セット
            - 判定: エンティティ含む
              入力: わからない
              次の箱: わからない セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 診療科の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 分岐なし診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 産婦人科/検査→乳腺排除
      - 箱: わからない セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 分岐なし診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐なし診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 診療科読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 診療科確認へ
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 代表案内案件
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 代表案内案件
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 代表案内案件
          デフォルト: count上記以外_1
      - 箱: 診療科を確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 産婦人科→婦人科
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 産婦人科→婦人科
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 産婦人科→婦人科
          デフォルト: count上記以外_2
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 診療科を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_4
          デフォルト: 診療科を確認_1
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 婦人科への付け替え_1
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
            - 判定: 一致
              入力: キャンセル
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
            - 判定: 一致
              入力: 再診
              次の箱: 診療科の聞き取りへ（新規予約）
            - 判定: 一致
              入力: 新規
              次の箱: 診療科の聞き取りへ（新規予約）
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
              次の箱: END_聞き取れず
          デフォルト: 否定
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: 産婦人科/検査→乳腺排除
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 産婦人科
              次の箱: 婦人科への付け替え
          デフォルト: 分岐なし診療科読み取得
      - 箱: 婦人科への付け替え
        セリフ: "産婦人科、ですね？\n当院には産婦人科はございません。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 婦人科への付け替え_1
      - 箱: 婦人科への付け替え_1
        セリフ: 婦人科でよろしいでしょうか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認_1
      - 箱: 産婦人科→婦人科
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 代表案内案件
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 放射線科
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 検査科
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: リハビリテーション科
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 栄養科
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 内視鏡室
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 発熱外来
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 腫瘍内科
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 健康診断（健診）
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 予防接種
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 検査
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 栄養指導
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: アートメイク
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: アロママッサージ
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 乳腺外科
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 検査
              次の箱: END_代表案内（13診療科）
            - 判定: 一致
              入力: 形成外科
              次の箱: END_外来終了
            - 判定: 一致
              入力: 婦人科
              次の箱: END_外来終了
            - 判定: 一致
              入力: 脳神経外科
              次の箱: END_外来終了
            - 判定: 一致
              入力: 皮膚科
              次の箱: END_外来終了
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_代表案内（13診療科）
        セリフ: none
        入力待ち: なし
      - 箱: END_外来終了
        セリフ: none
        入力待ち: なし
