flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付の分岐_1
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 月～金
              次の箱: 月～金 時間 分岐
            - 判定: 一致
              入力: 土曜日
              次の箱: END_受付時間外
          デフォルト: END_受付時間外
      - 箱: 日付の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 12/30
              次の箱: 月～金 時間 分岐_1
            - 判定: 数値
              入力: 1/4前（12/31，1/1，1/2，1/3）
              次の箱: 年末年始
          デフォルト: 時間外へ
      - 箱: 日付の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1/4
              次の箱: 年末年始
          デフォルト: 曜日の分岐
      - 箱: 月～金 時間 分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9時～15時
              次の箱: END_時間内
            - 判定: lessEqual
              入力: 9時～15時
              次の箱: END_時間内
          デフォルト: END_受付時間外
      - 箱: 月～金 時間 分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 15時前
              次の箱: END_時間内
          デフォルト: 年末年始
      - 箱: 時間外へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 年末年始
        セリフ: 申し訳ございませんが、ただいまの時間は、年末年始のため受付時間外となっております。受付開始は2026年1月5日月曜日の朝9時からとなっております。恐れ入りますがおかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始

  終了:
    箱一覧:
      - 箱: END_時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
