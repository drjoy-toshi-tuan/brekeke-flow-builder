flow:
  最初の箱: 健診種類確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: わからない
        値:
          わからない: [しらない, しりません, わすれた, 覚えていない, 覚えてない, 書いていない, 知らない, 忘れちゃった]
      - 名前: 健診内容
        値:
          その他の健診: [3, その他, レディースドック, 基本コース, 基本ドック, 三番, 人間ドック]
          協会けんぽ: [2, けんぽ, 協会, 生活習慣病予防, 生活予防, 二番]
          採用時定期: [1, 一般健診, 一番, 会社から, 雇い入れ, 雇入, 採用時, 定期健診, 入社時健診, 必要検針, 法定健診]
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]

  共通:
    箱一覧:
      - 箱: 健診種類確認へ
        セリフ: "健診の種類についてお伺いします。\nこれよりご案内する番号を、ダイヤルプッシュ、または 番号でお答え下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: メニュー詳細
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 健診内容の発話
              次の箱: 健診内容セット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF内容確認
            - 判定: エンティティ含む
              入力: わからない
              次の箱: わからない セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件を確認_1
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: 用件を確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_取得できず
          デフォルト: 再度聞き取りへ_2
      - 箱: count聞き直し_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_取得できず
          デフォルト: END_再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。正しく認識ができませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: メニュー詳細
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。正しく認識ができませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診内容の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。正しく認識ができませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 所定用紙有無
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: メニュー詳細
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診種類確認へ
      - 箱: 所定用紙有無
        セリフ: "結果を記載する、所定の用紙はお持ちですか？\nお持ちの場合は、はい、お持ちでない場合は、いいえ、とお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 採用時健診、定期健診
        セリフ: "採用時健診、または定期健診のご予約でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 協会けんぽ
        セリフ: "協会けんぽの生活習慣病予防健診でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: その他の健診
        セリフ: "人間ドックやその他の健診でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 有
        セリフ: 健診結果用紙は当院所定の用紙での対応となり、手書きでの対応はできませんのであらかじめご了承下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 無
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 有
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 有
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 有
          デフォルト: count上記以外_2
      - 箱: 用件を確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 健診内容の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定⇒再聴取へ
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 健診内容の分岐_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 健診内容の分岐_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 健診内容の分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診種類確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診内容セット
      - 箱: 否定⇒再聴取へ
        セリフ: 失礼しました、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: メニュー詳細
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_取得できず
      - 箱: メニュー詳細
        セリフ: "検査結果を会社へ提出する採用時健診、定期健診は1番、\n協会けんぽの生活習慣病予防健診は2番、\n人間ドック等、それ以外の健診は3番、\nわからない場合は、わからないとお答え下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: DTMF内容確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1：採用時健診・定期健診
              次の箱: 採用時健診、定期健診
            - 判定: 一致
              入力: 2：協会けんぽ
              次の箱: 協会けんぽ
            - 判定: 一致
              入力: 3：人間ドック等、それ他健診
              次の箱: その他の健診
      - 箱: 健診内容セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診内容の分岐
      - 箱: わからない セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 健診内容の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 採用時定期
              次の箱: 採用時健診、定期健診
            - 判定: 一致
              入力: 協会けんぽ
              次の箱: 協会けんぽ
            - 判定: 一致
              入力: その他の健診
              次の箱: その他の健診
      - 箱: 健診内容の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 採用時定期
              次の箱: 所定用紙有無
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_再度聞き取りへ
        セリフ: "申し訳ございません。正しく認識ができませんでした。\n再度、お伺いします。"
        入力待ち: なし
      - 箱: END_取得できず
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
