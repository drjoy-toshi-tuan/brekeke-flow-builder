flow:
  最初の箱: 受診歴確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [OK, いいです, オケー, はーい, はい, よろしい, 大丈夫です。, 配送です]
      - 名前: 否定
        値:
          否定: [いーえ, いいえ, ううん, そうじゃない, ダメ, ちがう, ちゃうちゃう, 違います, 間違った]

  共通:
    箱一覧:
      - 箱: 受診歴確認
        セリフ: ご予約のコースの中に、胃カメラの検査はございますか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 胃カメラ検査あり
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 胃カメラ検査なし
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 胃カメラ検査なし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、あります」、や、「いいえ、ないです」、のように少し長めの言葉でお伝えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診歴確認
      - 箱: 胃カメラ検査なし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_胃カメラ検査有無
      - 箱: 胃カメラ検査あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_胃カメラ検査有無
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_胃カメラ有無聞き取れず

  終了:
    箱一覧:
      - 箱: END_胃カメラ検査有無
        セリフ: none
        入力待ち: なし
      - 箱: END_胃カメラ有無聞き取れず
        セリフ: none
        入力待ち: なし
