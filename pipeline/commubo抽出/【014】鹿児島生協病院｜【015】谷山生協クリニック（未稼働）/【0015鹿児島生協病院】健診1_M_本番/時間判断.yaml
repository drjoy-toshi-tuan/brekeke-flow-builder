flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付判断
      - 箱: GW 日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 5/2の前
              次の箱: END_受付時間内
            - 判定: 一致
              入力: 05/02
              次の箱: 5/2 時間分岐
            - 判定: lessEqual
              入力: 5/6まで
              次の箱: GW
          デフォルト: END_受付時間内
      - 箱: 5/2 時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12時の前
              次の箱: END_受付時間内
          デフォルト: GW
      - 箱: GW
        セリフ: "大変申し訳ございませんが、5月6日まで休診となっております。\nなお、受付再開は5月7日からとなっております。恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_GW
      - 箱: 日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 5/3の前
              次の箱: END_受付時間内
            - 判定: lessEqual
              入力: 5/6まで
              次の箱: GW
          デフォルト: END_受付時間内

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_GW
        セリフ: none
        入力待ち: なし
