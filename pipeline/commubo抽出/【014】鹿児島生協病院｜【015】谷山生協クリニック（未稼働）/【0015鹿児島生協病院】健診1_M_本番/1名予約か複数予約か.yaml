flow:
  最初の箱: 個人か複数名か確認

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [はーい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 種類
        値:
          その他: [その他の健診]
          会社: [会社の健診]
          個人: [個人の健診]
          住民: [倉敷, 倉敷市住民健診]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]

  共通:
    箱一覧:
      - 箱: 個人か複数名か確認
        セリフ: 今回のお申込みは、1名分ですか？1名の場合は「はいそうです」、複数名の場合は「いいえ違います」、で、お答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約人数の聞き取り
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 予約人数の聞き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 個人か複数名か確認
      - 箱: 予約人数の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 人数確認
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 人数確認
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 複数確認
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 複数確認
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 人数確認
          デフォルト: count上記以外
      - 箱: 人数確認
        セリフ: １名のご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: テストのためルート変更
      - 箱: 複数確認
        セリフ: 複数名のご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: テストのためルート変更
      - 箱: テストのためルート変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_予約人数聞き取れず

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_予約人数聞き取れず
        セリフ: none
        入力待ち: なし
