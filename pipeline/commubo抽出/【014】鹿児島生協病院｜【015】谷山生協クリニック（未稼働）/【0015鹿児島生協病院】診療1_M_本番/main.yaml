flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 月日
        値:
          月日: []
      - 名前: 新規予約
        値:
          新規予約: [取りたい, 取得, 初診, 紹介状, 診察の予約, 診療予約]
      - 名前: 定期受診
        値:
          定期受診: [受診予約, 循環器, 定期]
      - 名前: 日にちのみ
        値:
          日にちのみ: []
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]
      - 名前: 予約キャンセル
        値:
          予約キャンセル: [キャンセル, やめる, 取消]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]
      - 名前: 予約確認
        値:
          予約確認: [その他, なくした, 確認, 教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 問い合わせ, 問合せ, 予約票]
      - 名前: 予約変更
        値:
          予約変更: [時間, 日程, 日付, 別の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。鹿児島生協病院の眼科専用、AI電話です。\n初めて受診される方や、当日の予約に関するお問い合わせは、099-267-1455へおかけなおし下さい。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 予約有無確認
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 切替前分岐（10/8）
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 代表電話へ
        セリフ: "大変申し訳ございません。うまく聞き取ることができませんでした。\n恐れ入りますが、代表電話番号へおかけなおしください。\n受付時間は、日曜祝日年末年始を除く、月曜日から金曜日、午前9時から12時、午後14時から16時30分となります。\n土曜日は9時から12時で、午後の受付はございません。\n代表電話番号が分かる場合は、お電話をお切りください。\n分からない場合はご案内いたしますのでメモをご準備ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表電話
      - 箱: 代表電話
        セリフ: "番号は、099-267-1455です。\n繰り返します。099-267-1455です。\n繰り返します。099-267-1455です。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件聞き取れずCP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗（代表）completeflag：2
      - 箱: 理由聞き取れずCP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗（代表）completeflag：2
      - 箱: 予約希望日聞き取れずCP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗（代表）completeflag：2
      - 箱: 失敗（代表）completeflag：2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表電話へ
      - 箱: 氏名NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗（代表）completeflag：2
      - 箱: 生年月日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗（代表）completeflag：2
      - 箱: 連絡先NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗（代表）completeflag：2
      - 箱: 連絡先聴取
        セリフ: none
        説明: サブシナリオ「連絡先聴取」を呼び出す
        参照ファイル: 連絡先聴取.yaml
        回答振り分け:
          デフォルト: 次に
      - 箱: 初めに
        セリフ: まずはじめに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聴取
      - 箱: 患者氏名聴取
        セリフ: none
        説明: サブシナリオ「患者氏名聴取」を呼び出す
        参照ファイル: 患者氏名聴取.yaml
        回答振り分け:
          デフォルト: 続いて
      - 箱: 次に
        セリフ: かしこまりました。次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聴取
      - 箱: 続いて
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取
      - 箱: 生年月日聴取
        セリフ: none
        説明: サブシナリオ「生年月日聴取」を呼び出す
        参照ファイル: 生年月日聴取.yaml
        回答振り分け:
          デフォルト: 診察券番号聴取へ
      - 箱: 診察券番号聴取へ
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: 用件聴取
        セリフ: none
        説明: サブシナリオ「用件聴取」を呼び出す
        参照ファイル: 用件聴取.yaml
        回答振り分け:
          デフォルト: 氏名聴取へ
      - 箱: 用件分岐
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 確認終話へ
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約日変更へ
            - 判定: 一致
              入力: 変更
              次の箱: 予約日変更へ
      - 箱: 用件分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 確認終話へ
            - 判定: 一致
              入力: 変更
              次の箱: 次回予約
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル理由
      - 箱: 予約日変更へ
        セリフ: それでは
        入力待ち: なし
        回答振り分け:
          デフォルト: 現在の予約日確認
      - 箱: 変更終話へ
        セリフ: かしこまりました。申し込みを受付いたしました。予約日は折返しご連絡時に確定いたします。ご了承ください。
        入力待ち: あり
        回答振り分け:
          デフォルト: 連絡予定説明
      - 箱: 確認終話へ
        セリフ: かしこまりました。申し込みを受付いたしました。
        入力待ち: あり
        回答振り分け:
          デフォルト: 連絡予定説明
      - 箱: 現在の予約日確認
        セリフ: none
        説明: サブシナリオ「現在の予約日確認」を呼び出す
        参照ファイル: 現在の予約日確認.yaml
        回答振り分け:
          デフォルト: 予約希望日へ
      - 箱: 予約希望日へ
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐_1
      - 箱: 次回予約
        セリフ: none
        説明: サブシナリオ「次回予約」を呼び出す
        参照ファイル: 次回予約.yaml
        回答振り分け:
          デフォルト: 変更終話へ
      - 箱: キャンセル理由
        セリフ: none
        説明: サブシナリオ「キャンセル理由」を呼び出す
        参照ファイル: キャンセル理由.yaml
        回答振り分け:
          デフォルト: キャンセル受付
      - 箱: キャンセル受付
        セリフ: "かしこまりました。\n予約キャンセルを受付いたしました。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 連絡予定説明
        セリフ: 休診日を除く3日以内に、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 予約有無確認
        セリフ: none
        説明: サブシナリオ「予約有無確認」を呼び出す
        参照ファイル: 予約有無確認.yaml
        回答振り分け:
          デフォルト: 初めに
      - 箱: 予約なし代表案内へ
        セリフ: "恐れ入りますが、このお電話で新規予約を承ることができません。代表電話番号へおかけなおしください。\n受付時間は日曜祝日、年末年始を除く、月曜から土曜の8時30分から12時です。電話番号をご案内いたしますので、メモをご準備ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表電話
      - 箱: 予約有無聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗（代表）completeflag：2
      - 箱: 氏名聴取へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聴取
      - 箱: 切替前分岐（10/8）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 10/7まで
              次の箱: 挨拶
            - 判定: 一致
              入力: 10/8
              次の箱: 10/8
          デフォルト: 新番号案内
      - 箱: 10/8
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時まで（移行前）
              次の箱: 挨拶
          デフォルト: 新番号案内
      - 箱: 新番号案内
        セリフ: "鹿児島生協病院の眼科専用、AI電話です。\n恐れ入りますが、電話番号が変更となりました。\nお手数をおかけしますが、050-1726-2621へおかけ直しください。 \n繰り返します。050-1726-2621へおかけ直しください。\nお電話ありがとうございました。 それでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断待ち

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
