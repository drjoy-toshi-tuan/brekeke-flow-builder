flow:
  最初の箱: 用件を判断

  エンティティ定義:
    カスタム:
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9以上
              次の箱: count聞き直し_2
            - 判定: 数値以上
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
            - 判定: エンティティ含む
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_3
          デフォルト: 診察券番号確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 診察券番号確認
      - 箱: 再度聞き取りへ
        セリフ: 申し訳ございません、再度10桁の登録番号をお話いただくか、ダイヤルキーで入力してください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認へ
      - 箱: 診察券番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 分からない場合
            - 判定: エンティティ含む
              入力: 数字
              次の箱: 診察券番号セット（発話）
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 診察券番号セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: countクリア
          デフォルト: count上記以外
      - 箱: countクリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号クリア
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号セット（発話）
      - 箱: 診察券番号桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 11桁以上
              次の箱: count聞き直し_1
            - 判定: 一致
              入力: 10桁
              次の箱: 診察券番号の読みセット
            - 判定: lessEqual
              入力: 9桁以下
              次の箱: 先頭0付加
      - 箱: 診察券番号確認へ
        セリフ: "診察券の登録番号は、\n<? $診察券番号の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認
      - 箱: 診察券番号確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 診察券番号
              次の箱: 診察券番号クリア
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 1回聞き取れず
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: テストのためルート変更
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: テストのためルート変更
          デフォルト: count上記以外_1
      - 箱: 否定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 診察券番号の聞き取りへ
        セリフ: 診察券に記載のある10桁の登録番号を、ハイフンを除いてお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号の聞き取りへ_1
        セリフ: "10桁の登録番号を、ハイフンを除いてお話ください。\n診察券がない場合やわからない場合は、「わからない」とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号セット（発話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 10桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外_2
      - 箱: 診察券番号セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 10桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外_2
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号の読みセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認へ
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診
              次の箱: 診察券番号の聞き取りへ_1
            - 判定: 一致
              入力: キャンセル
              次の箱: 診察券番号の聞き取りへ
            - 判定: 一致
              入力: 確認
              次の箱: 診察券番号の聞き取りへ
            - 判定: 一致
              入力: 変更
              次の箱: 診察券番号の聞き取りへ
          デフォルト: 診察券番号の聞き取りへ_1
      - 箱: ダイヤルプッシュ案内
        セリフ: 申し訳ございません、再度10桁の登録番号をお話いただくか、ダイヤルキーで入力してください。
        入力待ち: あり
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 再テスト
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ
      - 箱: 分からない場合
        セリフ: "かしこまりました。\n可能な範囲で、当院からのご連絡までに診察券等をご準備ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_わからない
      - 箱: 先頭0付加
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号桁数チェック
      - 箱: テストのためルート変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ２回以上
              次の箱: 1回聞き取れず
          デフォルト: 否定
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1回以上
              次の箱: 1回聞き取れず
          デフォルト: ダイヤルプッシュ案内
      - 箱: count聞き直し_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1回以上
              次の箱: 1回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ２回以上
              次の箱: 1回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 1回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_取得できず

  終了:
    箱一覧:
      - 箱: END_わからない
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_取得できず
        セリフ: 申し訳ございません、再度
        入力待ち: なし
