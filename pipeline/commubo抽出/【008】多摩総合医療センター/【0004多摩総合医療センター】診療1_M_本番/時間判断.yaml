flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始チェック
      - 箱: テスト
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 時間外コメント
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～土）
              次の箱: （平日）時間の分岐
          デフォルト: 時間外コメント
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時30分前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 17時まで
              次の箱: END_受付時間内
          デフォルト: 時間外コメント
      - 箱: 年末年始チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12/28
              次の箱: 祝日チェック
            - 判定: lessEqual
              入力: 1/4
              次の箱: 年末年始コメント
          デフォルト: 祝日チェック
      - 箱: 時間外コメント
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、日曜祝日を除く、月曜日から土曜日の8時30分から17時となっております。\n恐れ入りますが、受付時間内におかけなおしください。\nまた当院では、WEBフォームによる初診予約・予約日時の確認・予約キャンセルの申し込みも承っております。ぜひホームページをご覧ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 年末年始コメント
        セリフ: "申し訳ございません。年末年始の期間、AI電話でのお受付けはできません。\n恐れ入りますが、1月5日の8:30以降におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
