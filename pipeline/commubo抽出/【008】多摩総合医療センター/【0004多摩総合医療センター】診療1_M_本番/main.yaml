flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: こちらは多摩総合医療センターの、予約専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 診察券準備
        セリフ: 紹介状や、診察券をお持ちの方はお手元にご用意ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 診察予約
          デフォルト: 診察予約_1
      - 箱: 携帯電話番号チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約キャンセル
          デフォルト: キャンセル予約
      - 箱: 携帯電話番号チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約確認
          デフォルト: 予約確認_1
      - 箱: 携帯電話番号チェック_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約変更
          デフォルト: 予約変更_1
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話_1
        セリフ: お電話ありがとうございました。それでは失礼いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電日時間判断ノードへの接続
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号聴取
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の分岐_2
      - 箱: 完了フラグ_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: その他アナウンス
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 入電日時間判断ノードへの接続
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間判断
      - 箱: 電話切断へ接続
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_1
      - 箱: 次へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聴取
      - 箱: 次へ_1
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介元医療機関聞き取り
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聴取
      - 箱: 次へ_3
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更／キャンセル理由聞き取り
      - 箱: 次へ_4
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聴取
      - 箱: 次へ_5
        セリフ: 続いて、診察券の登録番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聴取
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察
              次の箱: 受診歴確認
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ_6
            - 判定: 一致
              入力: 確認
              次の箱: 次へ_6
            - 判定: 一致
              入力: その他
              次の箱: 完了フラグ_1
            - 判定: 一致
