        セリフ: "申し訳ございません。\n恐れ入りますが、ご予約に関するお問い合わせにつきましては、予約センター042-323-9200、へおかけ直しください。\nご予約以外のお問い合わせにつきましては、代表電話042-323-5111、へおかけ直しください。"
