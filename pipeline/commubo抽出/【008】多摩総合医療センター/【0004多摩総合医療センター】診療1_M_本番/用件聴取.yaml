flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: お問い合わせ内訳
        値:
          疑義照会: [薬局]
          問い合わせ: [その他, 診療]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 用件
        値:
          キャンセル: [やめる, 取り消し, 取り消す, 取消]
          その他: [アクセス, お見舞い, くすり, 飲み方, 会計, 行き方, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書]
          確認: [教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 予約時間, 予約日, 予約票]
          再診: [はい新薬, 再診, 最新, 三新薬]
          診察: [とれ, はい新薬, はじめて, 豪ドル, 再診, 最新, 撮りたい, 撮る, 三新薬, 取りたい, 取る, 取得, 受診, 初めて, 初心, 初心予約, 初診, 初診予約, 診察, 診察の予約, 診療予約, 入れたい, 予約お願い, 予約する, 予約をお願い, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 予約を取れ, 録りたい, 録る]
          変更: [延期, 取り直したい, 取り直す, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちいずれかでお話ください。\n「診察の予約を取る」、「予約をキャンセルする」、「予約を変更する」、「予約日時を確認する」、それでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: 用件を確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: count聞き直し_1
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察
              次の箱: 用件の復唱（初診）
            - 判定: 一致
              入力: キャンセル
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: 確認
              次の箱: 用件の復唱（確認）
            - 判定: 一致
              入力: その他
              次の箱: 用件の復唱（その他）
            - 判定: 一致
              入力: 変更
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: 再診
              次の箱: 用件の復唱（再診）
      - 箱: セットした用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: 変更/キャンセルの場合
            - 判定: 一致
              入力: 変更
              次の箱: 変更/キャンセルの場合
          デフォルト: END_戻る
      - 箱: 用件の復唱（初診）
        セリフ: "診察のご予約、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（キャンセル）
        セリフ: "ご予約のキャンセル、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（確認）
        セリフ: "予約日時の確認、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（その他）
        セリフ: "初診予約・予約キャンセル・予約日時の確認以外のお問い合わせ、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（変更）
        セリフ: "ご予約の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（再診）
        セリフ: "再診のご予約、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 変更/キャンセルの場合
        セリフ: "かしこまりました。\nなお、化学療法、輸血のいずれかを含む変更、キャンセルの場合、この電話では変更、キャンセルできませんのでご用件を伺って後ほどご連絡差し上げます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: リセット
        セリフ: 再度、テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件聴取できず

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_用件聴取できず
        セリフ: none
        入力待ち: なし
