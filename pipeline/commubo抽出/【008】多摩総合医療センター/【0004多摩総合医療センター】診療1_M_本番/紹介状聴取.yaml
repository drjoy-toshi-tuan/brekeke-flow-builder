flow:
  最初の箱: 紹介状有無の確認

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: "初診のご予約ですね。\n他の医療機関からの紹介状もしくは健診結果票等はお持ちでしょうか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい持っています」、や、「いいえ持っていません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 紹介状あり
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 紹介状なし
        セリフ: "申し訳ございません。\n当院は紹介受診重点医療機関に指定されており、受診にあたっては紹介状もしくは健診結果票等のご用意をお願いしております。恐れ入りますが、まずは地域の医療機関にご相談ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_紹介状なし
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1回以上
              次の箱: 聴取できず
          デフォルト: 再度聞き取りへ
      - 箱: 聴取できず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聴取できず

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介状なし
        セリフ: none
        入力待ち: なし
      - 箱: END_聴取できず
        セリフ: none
        入力待ち: なし
