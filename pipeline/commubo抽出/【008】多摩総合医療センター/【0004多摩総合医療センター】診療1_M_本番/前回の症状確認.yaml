flow:
  最初の箱: 検査内容確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [あってます, そうそう, そうです, はーい, 配送です]
      - 名前: 否定
        値:
          いいえ: [ちがう, ちゃうちゃう, まちがった, 違います, 新しく]

  共通:
    箱一覧:
      - 箱: 検査内容確認
        セリフ: 前回と同じ症状でご受診ですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 検査内容【否定】
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 検査内容【肯定】
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 検査内容【肯定】
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、あります」、や、「いいえ、ないです」、のように少し長めの言葉でお伝えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 検査内容確認
      - 箱: 検査内容【肯定】
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_同じ
      - 箱: 検査内容【否定】
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_違う
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1回以上
              次の箱: 1回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 1回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず

  終了:
    箱一覧:
      - 箱: END_同じ
        セリフ: none
        入力待ち: なし
      - 箱: END_違う
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
