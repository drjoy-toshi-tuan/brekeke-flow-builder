flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電日時間判断ノードへの接続
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 入電日時間判断ノードへの接続
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル
      - 箱: 掛けなおし案内
        セリフ: "申し訳ございません。\nいずれもない方は別の受付方法をご案内させていただきます。\n予約の取得については、AI電話050-1720-9026、若しくは予約センター042-323-9200にお掛け直しください。また、その他のご用件についてはAI電話やWEBフォームでも受け付けしております。ぜひ当院ホームページをご覧ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 掛けなおし案内_1
        セリフ: "申し訳ございません。\nうまく聞き取りができませんでした。再度お電話いただくか、予約の取得については、AI電話050-1720-9026、若しくは予約センター042-323-9200にお掛け直しください。\nまた、その他のご用件についてはAI電話やWEBフォームでも受け付けしております。ぜひ当院ホームページをご覧ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 掛けなおし案内_2
        セリフ: "申し訳ございません。\nうまく聞き取りができませんでした。\nお手数ですが、予約センター042-323-9200、若しくはAI電話050-1720-9026にお掛け直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話
        セリフ: お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 氏名聴取
        セリフ: none
        説明: サブシナリオ「氏名聴取」を呼び出す
        参照ファイル: 氏名聴取.yaml
        回答振り分け:
          デフォルト: 接続詞_1
      - 箱: 接続詞
        セリフ: かしこまりました。では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号
      - 箱: 接続詞_1
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聴取
      - 箱: 接続詞_2
        セリフ: かしこまりました。では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 氏名聴取
      - 箱: 生年月日聴取
        セリフ: none
        説明: サブシナリオ「生年月日聴取」を呼び出す
        参照ファイル: 生年月日聴取.yaml
        回答振り分け:
          デフォルト: 接続詞_3
      - 箱: 接続詞_3
        セリフ: 最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取
      - 箱: 接続詞_4
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 接続詞_3
      - 箱: 終話_1
        セリフ: "予約の申し込みを受付いたしました。\n本日を含めて3営業日以内に折り返し電話、\nもしくはショートメッセージにてご連絡いたします。\n紹介状や診察券などをお持ちの方はお手元にご用意ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 受診案内
        セリフ: none
        説明: サブシナリオ「受診案内」を呼び出す
        参照ファイル: 受診案内.yaml
        回答振り分け:
          デフォルト: 掛けなおし案内
      - 箱: 連絡先聴取
        セリフ: none
        説明: サブシナリオ「連絡先聴取」を呼び出す
        参照ファイル: 連絡先聴取.yaml
        回答振り分け:
          デフォルト: 終話_1
      - 箱: 7年受診歴有無確認
        セリフ: none
        説明: サブシナリオ「7年受診歴有無確認」を呼び出す
        参照ファイル: 7年受診歴有無確認.yaml
        回答振り分け:
          デフォルト: 接続詞
      - 箱: 診察券番号
        セリフ: none
        説明: サブシナリオ「診察券番号」を呼び出す
        参照ファイル: 診察券番号.yaml
        回答振り分け:
          デフォルト: 接続詞_2
      - 箱: 診察家番号
        セリフ: none
        説明: サブシナリオ「診察家番号」を呼び出す
        参照ファイル: 診察家番号.yaml
        回答振り分け:
          デフォルト: 接続詞_2
      - 箱: 時間外発話
        セリフ: 予約の受付開始は2月25日からを予定しております。2月25日以降の平日に、改めておかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 都立がん検診診察券番号
        セリフ: none
        説明: サブシナリオ「都立がん検診診察券番号」を呼び出す
        参照ファイル: 都立がん検診診察券番号.yaml
        回答振り分け:
          デフォルト: 接続詞
      - 箱: 次へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 都立がん検診診察券番号
      - 箱: 時間外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: タイトル
        セリフ: none
        説明: サブシナリオ「タイトル」を呼び出す
        参照ファイル: タイトル.yaml
        回答振り分け:
          デフォルト: 受診案内

  終了:
    箱一覧:
      - 箱: END_終話
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: END_終話
