flow:
  最初の箱: 診察券番号の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [1回, 1度, もう一回, 一回, 再度]
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9以上
              次の箱: count聞き直し_2
            - 判定: 数値以上
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
            - 判定: エンティティ含む
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_3
          デフォルト: 診察券番号確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 診察券番号確認
      - 箱: 再度聞き取りへ
        セリフ: 申し訳ございません、再度8桁の登録番号をお話いただくか、ダイヤルキーで入力してください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、そうです」、や、「いいえ、違います」、のように長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認へ
      - 箱: 診察券番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 分からない場合
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: 接続詞
            - 判定: エンティティ含む
              入力: 数字
              次の箱: 診察券番号セット（発話）
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 診察券番号セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: countクリア
          デフォルト: count上記以外
      - 箱: countクリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号クリア
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号セット（発話）
      - 箱: 診察券番号桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9桁以上
              次の箱: count聞き直し_1
            - 判定: 一致
              入力: 8桁
              次の箱: 診察券番号の読みセット
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号確認へ
        セリフ: "診察券の登録番号は、\n<? $診察券番号の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認
      - 箱: 診察券番号確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 診察券番号
              次の箱: 診察券番号クリア
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count聞き直し
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: テストのためルート変更
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: テストのためルート変更
          デフォルト: count上記以外_1
      - 箱: 否定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 診察券番号の聞き取りへ
        セリフ: "都立がん検診センターの、診察券の登録番号をお伺いします。\n8桁以内の番号を、ハイフンを除いてお話ください。診察券がない場合やわからない場合は、「わからない」とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号セット（発話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 8桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外_2
      - 箱: 診察券番号セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 8桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外_2
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号の読みセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認へ
      - 箱: ダイヤルプッシュ案内
        セリフ: 申し訳ございません、再度8桁の登録番号をお話いただくか、ダイヤルキーで入力してください。
        入力待ち: あり
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 分からない場合
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_わからない
      - 箱: テストのためルート変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ２回以上
              次の箱: 1回聞き取れず
          デフォルト: 否定
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1回以上
              次の箱: 1回聞き取れず
          デフォルト: ダイヤルプッシュ案内
      - 箱: count聞き直し_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1回以上
              次の箱: 1回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ２回以上
              次の箱: 1回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 1回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_取得できず
      - 箱: 接続詞
        セリフ: かしこまりました。繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ

  終了:
    箱一覧:
      - 箱: END_わからない
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_再テスト
        セリフ: 再度テストします。
        入力待ち: なし
      - 箱: END_テスト用
        セリフ: none
        入力待ち: なし
      - 箱: END_取得できず
        セリフ: none
        入力待ち: なし
