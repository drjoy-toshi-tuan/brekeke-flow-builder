        入力待ち: なし
        回答振り分け:
          デフォルト: END_稼働停止

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_稼働停止
        セリフ: none
        入力待ち: なし
