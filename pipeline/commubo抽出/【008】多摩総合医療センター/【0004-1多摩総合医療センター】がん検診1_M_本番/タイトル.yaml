flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3/31 17時まで
      - 箱: 入電時間（テスト用）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3/31 17時まで
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付判断
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （平日）時間の分岐
          デフォルト: 時間外コメント
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時30分前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 17時まで
              次の箱: 挨拶
          デフォルト: 時間外コメント
      - 箱: 時間外コメント
        セリフ: "こちらは、がん検診センターの閉所に伴い、多摩総合医療センターへ移行される患者さん向けの予約専用、AI電話です。\n申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、祝日を除く、月曜日から金曜日の8時30分から17時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 挨拶
        セリフ: こちらは、がん検診センターの閉所に伴い、多摩総合医療センターへ移行される患者さん向けの予約専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間内
      - 箱: 年末年始
        セリフ: "こちらは、がん検診センターの閉所に伴い、多摩総合医療センターへ移行される患者さん向けの予約専用、AI電話です。\n申し訳ございません。\n年末年始の期間、AI電話でのお受付けはできません。恐れ入りますが、1月5日の8:30以降におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 1月4日（12/30，12/31，1/1，1/2，1/3）
              次の箱: 年末年始
          デフォルト: 時間外コメント
      - 箱: 日付判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12/28より前
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 12/28
              次の箱: 年末年始
            - 判定: lessEqual
              入力: 1月4日
              次の箱: 年末年始
          デフォルト: 曜日の分岐
      - 箱: 3/31 17時まで
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 3/30まで
              次の箱: 祝日チェック
            - 判定: 一致
              入力: 3/31 17時前
              次の箱: 祝日チェック
            - 判定: 数値
              入力: 3/31 17時前
              次の箱: 祝日チェック
            - 判定: 一致
              入力: 3/31 17時以降
              次の箱: 稼働停止アナウンス
            - 判定: 数値以上
              入力: 3/31 17時以降
              次の箱: 稼働停止アナウンス
            - 判定: lessEqual
              入力: 3/31~5/31
              次の箱: 稼働停止アナウンス
          デフォルト: 稼働停止アナウンス
      - 箱: 稼働停止アナウンス
