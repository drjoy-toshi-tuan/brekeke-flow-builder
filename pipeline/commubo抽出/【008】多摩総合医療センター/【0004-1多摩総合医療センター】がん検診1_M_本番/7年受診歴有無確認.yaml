flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もう1度, もう一回, 再度]
      - 名前: 肯定
        値:
          はい: [そうです, その通り, はじめて, 受けたことない, 初めて, 初めてです]
      - 名前: 否定
        値:
          何度: [あります, 何度かあります, 何度かある]
      - 名前: 分からない
        値:
          わからない: [知らない, 知りません, 分かりません]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: "都立がん検診センターで過去7年以内に受診歴がありますか？\nはい、または、いいえでお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 紹介状有無の確認（2回目以降）
        セリフ: 都立がん検診センターで過去7年以内に受診歴がありますか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: 再質問
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 分からない
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 受診歴なし
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 受診歴あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 受診歴あり
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 受診歴なし
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 受診歴あり
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、あります」、や、「いいえ、ありません」、のように長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認（2回目以降）
      - 箱: 受診歴あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診歴あり
      - 箱: 受診歴なし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診歴なし
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回以上
              次の箱: 3回聴き取りできず
          デフォルト: 再度聞き取りへ
      - 箱: 3回聴き取りできず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診歴確認できず
      - 箱: 分からない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_分からない
      - 箱: 再質問
        セリフ: かしこまりました、繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認

  終了:
    箱一覧:
      - 箱: END_受診歴なし
        セリフ: none
        入力待ち: なし
      - 箱: END_受診歴あり
        セリフ: none
        入力待ち: なし
      - 箱: END_分からない
        セリフ: none
        入力待ち: なし
      - 箱: END_受診歴確認できず
        セリフ: none
        入力待ち: なし
