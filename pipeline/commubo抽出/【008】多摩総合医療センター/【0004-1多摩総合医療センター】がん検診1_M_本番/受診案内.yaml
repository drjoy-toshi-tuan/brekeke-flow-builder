flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もう1度, もう一回, 再度]
      - 名前: 肯定
        値:
          はい: [あります, そうです, その通り, 受け取っている, 受け取ってます, 受け取ってる]
      - 名前: 否定
        値:
          否定: [いない, いません, されていない, ない]
      - 名前: 分からない
        値:
          わからない: [知らない, 知りません, 分かりません]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: "「がん検診センターからのお知らせ」や、当院での検診を案内されていますか？\nはい、または、いいえでお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 紹介状有無の確認（2回目以降）
        セリフ: 「がん検診センターからのお知らせ」や、当院での検診を案内されていますか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: 再質問
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 分からない
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 受診歴なし
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 受診歴あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 受診歴あり
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 受診歴なし
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 受診歴あり
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、受け取っている」、や、「いいえ、受け取っていない」、のように長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認（2回目以降）
      - 箱: 受診歴あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診歴あり
      - 箱: 受診歴なし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診歴なし
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回以上
              次の箱: 3回聴き取りできず
          デフォルト: 再度聞き取りへ
      - 箱: 3回聴き取りできず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診歴確認できず
      - 箱: 分からない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_分からない
      - 箱: 再質問
        セリフ: かしこまりました、繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認

  終了:
    箱一覧:
      - 箱: END_受診歴なし
        セリフ: none
        入力待ち: なし
      - 箱: END_受診歴あり
        セリフ: none
        入力待ち: なし
      - 箱: END_分からない
        セリフ: none
        入力待ち: なし
      - 箱: END_受診歴確認できず
        セリフ: none
        入力待ち: なし
