flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [一回, 一度, 再度]
      - 名前: 肯定（エンティティ）
        値:
          肯定: [いいです, はーい, よろしいです, 異常部, 丈夫, 大丈夫, 当てはまる, 配送です]
      - 名前: 否定（エンティティ）
        値:
          否定: [いいえ, いえ, いや, じゃない, ちがう, ちゃう, 当てはまらない]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: こちらは多摩総合医療センター、救急外来イーアールです。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 時間内
        セリフ: 電話混雑のため、AI音声にてご案内させていただきます。
        入力待ち: あり
        回答振り分け:
          デフォルト: 時間内_1
      - 箱: 時間内_1
        セリフ: まず症状が、大けが、意識不明、大量の出血、激しい頭痛、強い胸の痛み、呼吸困難、手足の麻痺、などの場合には、この電話を切って119番にて救急車を呼ぶことをお勧めします。
        入力待ち: あり
        回答振り分け:
          デフォルト: それ以外の場合には、
      - 箱: イーアール専用AI電話変更のお知らせ
        セリフ: "イーアール専用AI電話の電話番号が変更になりました。 \nお手数ですが、現在受け付けている新たな電話番号、050-5865-6061におかけ直しくださいませ。\n イーアール専用AI電話の電話番号が変更になりました。\nお手数ですが、現在受け付けている新たな電話番号、050-5865-6061におかけ直しくださいませ。\n イーアール専用AI電話の電話番号が変更になりました。\nお手数ですが、現在受け付けている新たな電話番号、050-5865-6061におかけ直しくださいませ。\n イーアール専用AI電話の電話番号が変更になりました。\nお手数ですが、現在受け付けている新たな電話番号、050-5865-6061におかけ直しくださいませ。\n イーアール専用AI電話の電話番号が変更になりました。\nお手数ですが、現在受け付けている新たな電話番号、050-5865-6061におかけ直しくださいませ。\n イーアール専用AI電話の電話番号が変更になりました。\nお手数ですが、現在受け付けている新たな電話番号、050-5865-6061におかけ直しくださいませ。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 終話_1
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電日時間判断ノードへの接続
      - 箱: 通話完了
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 通話完了_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 入電日時間判断ノードへの接続
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間内と3月18日以降の判断_1
      - 箱: 終話
        セリフ: "申し訳ございません、うまく聞き取りができませんでした。\nお手数ですが、代表042-323-5111、にお掛け直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: 終話
          デフォルト: 再質問
      - 箱: 再質問の有無_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: 終話
          デフォルト: 再質問_1
      - 箱: 再質問の有無_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: 終話
          デフォルト: 再質問_2
      - 箱: 再質問の有無_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: 終話
          デフォルト: 再質問_3
      - 箱: 再質問
        セリフ: うまく聞き取りができませんでした。恐れ入りますが、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル
      - 箱: 再質問_1
        セリフ: うまく聞き取りができませんでした。恐れ入りますが、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 質問
      - 箱: 再質問_2
        セリフ: うまく聞き取りができませんでした。恐れ入りますが、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 質問_1
      - 箱: 再質問_3
        セリフ: うまく聞き取りができませんでした。恐れ入りますが、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル_5
      - 箱: タイトル
        セリフ: "質問にお答えください。以下の三つに当てはまりますか？\n「一ヶ月以内に当院を退院した」、\n「一ヶ月以内に当院で手術を受けた」、\n「外来化学療法室に通院中」。\n当てはまる方は「はい」、当てはまらない方は「いいえ」、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 回答の分岐
      - 箱: 回答の分岐
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もう一回
              次の箱: 再度
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: スタッフ転送
            - 判定: エンティティ含む
              入力: 否定
              次の箱: タイトル_1
            - 判定: エンティティ含む
              入力: 否定肯定
              次の箱: スタッフ転送
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: スタッフ転送
            - 判定: エンティティ含む
              入力: 否定エンティティ登録
              次の箱: タイトル_1
          デフォルト: 上記以外
      - 箱: 回答の分岐_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もう一回
              次の箱: 再度_3
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: スタッフ転送_1
            - 判定: エンティティ含む
              入力: 否定
              次の箱: タイトル_6
            - 判定: エンティティ含む
              入力: 否定肯定
              次の箱: スタッフ転送_1
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: タイトル_6
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: スタッフ転送_1
          デフォルト: 上記以外_3
      - 箱: 回答の分岐_2
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もう一回
              次の箱: 再度_2
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: スタッフ転送_1
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 終話_1
            - 判定: エンティティ含む
              入力: 否定肯定
              次の箱: スタッフ転送_1
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 終話_1
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: スタッフ転送_1
          デフォルト: 上記以外_2
      - 箱: 回答の分岐_3
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もう一回
              次の箱: 再度_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: タイトル_5
            - 判定: エンティティ含む
              入力: 否定
              次の箱: タイトル_3
            - 判定: エンティティ含む
              入力: 否定肯定
              次の箱: タイトル_5
            - 判定: エンティティ含む
              入力: 否定エンティティ登録
              次の箱: タイトル_3
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: タイトル_5
          デフォルト: 上記以外_1
      - 箱: タイトル_1
        セリフ: "以下、受診についてのご案内を申し上げます。\nイーアールでは、緊急の病気やケガに対応いたしますが、予約は受け付けておりません。\n来院された順番ではなく、救急車も含め緊急性の高い症状の患者さんから順に診察いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル_2
      - 箱: タイトル_2
        セリフ: "緊急性が低い症状の場合、待ち時間は概ね3時間以上となっております。\n診察は、当番の医師が担当いたします。整形外科や脳外科など、専門医の指定は出来ません。\n特に、眼科、歯科、泌尿器科などの症状には、対応が困難となっております。"
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル_4
      - 箱: タイトル_3
        セリフ: "ほかの医療機関をお探しの場合には、シャープ7、1、1、9にご相談をお勧めします。\nまた、地域の休日夜間診療所の受診もご検討ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 質問_1
      - 箱: タイトル_4
        セリフ: また、妊娠に関連した症状については、まず、掛かりつけの、病院にご相談ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 質問
      - 箱: 質問
        セリフ: "以上、ご了解の上，イーアール受診を希望されますか？\nはい、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 回答の分岐_3
      - 箱: 質問_1
        セリフ: "さらにご質問がありますか？\nはい、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 回答の分岐_2
      - 箱: タイトル_5
        セリフ: "さらにご質問がありますか？\nはい、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 回答の分岐_1
      - 箱: タイトル_6
        セリフ: "保険証かマイナンバーカード、および、\nお薬手帳をお持ちの上、気をつけて来院ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: 再質問の有無
          デフォルト: 回答の分岐
      - 箱: 上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: 再質問の有無_1
          デフォルト: 回答の分岐_3
      - 箱: 上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: 再質問の有無_2
          デフォルト: 回答の分岐_2
      - 箱: 上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: 再質問の有無_3
          デフォルト: 回答の分岐_1
      - 箱: 転送①
        セリフ: none
        説明: サブシナリオ「転送①」を呼び出す
        回答振り分け:
          デフォルト: 通話完了_1
      - 箱: 転送②
        セリフ: none
        説明: サブシナリオ「転送②」を呼び出す
        回答振り分け:
          デフォルト: 通話完了_1
      - 箱: 終話_1
        セリフ: お電話ありがとうございました。それでは失礼いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: スタッフ転送
        セリフ: スタッフにおつなぎいたします。診察券をご用意の上、そのまま切らずにお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送①
      - 箱: スタッフ転送_1
        セリフ: スタッフにおつなぎいたします。お持ちの方は診察券をご用意の上、そのまま切らずにお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送①
      - 箱: スタッフ転送_2
        セリフ: ただいまお繋ぎしております、少々お待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送②
      - 箱: 転送中
        セリフ: ただいまお繋ぎしております、少々お待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送①
      - 箱: それ以外の場合には、
        セリフ: それ以外の場合には、
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル
      - 箱: 再度
        セリフ: かしこまりました。繰り返します。
        入力待ち: なし
        回答振り分け:
