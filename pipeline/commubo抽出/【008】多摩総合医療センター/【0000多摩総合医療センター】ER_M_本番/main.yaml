      - 箱: 再度_3
        セリフ: かしこまりました。繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル_5
      - 箱: 時間内と3月18日以降の判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 3月17日
              次の箱: 時間内
            - 判定: 一致
              入力: 3/18 0時～9時まで（時間内）
              次の箱: 時間内
            - 判定: 数値
              入力: 3/18 0時～9時まで（時間内）
              次の箱: 時間内
          デフォルト: イーアール専用AI電話変更のお知らせ
      - 箱: 時間内と3月18日以降の判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 3月17日
              次の箱: 時間内
            - 判定: 一致
              入力: 3/18 0時～9時まで（時間内）
              次の箱: 時間内
            - 判定: 数値
              入力: 3/18 0時～9時まで（時間内）
              次の箱: 時間内
          デフォルト: イーアール専用AI電話変更のお知らせ

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 10以上
