flow:
  最初の箱: 当日希望確認_1

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [あってます, そうそう, そうです, はーい, 今日がいい, 今日で, 配送です, 本日]
      - 名前: 否定
        値:
          いいえ: [いいです, そうじゃない, ちがう, ちゃうちゃう, まちがった, 今日じゃない]

  共通:
    箱一覧:
      - 箱: 当日希望確認
        セリフ: 今日の診療に関する内容ですか？はい、または、いいえ、で、お答えください。
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 当日希望確認_1
        セリフ: まず初めに、お伺いします。
        入力待ち: あり
        回答振り分け:
          デフォルト: 当日希望確認
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_当日希望
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_当日希望
          デフォルト: 上記以外ON
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1回質問済み２回目
              次の箱: END_聞き取れず
          デフォルト: 再質問
      - 箱: 上記以外ON
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再質問の有無
      - 箱: 再質問
        セリフ: うまく聞き取りができませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日希望確認

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_当日希望
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
