flow:
  最初の箱: 診察券番号の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [あってます, あってる, そうそう, そうです, その通りです, はーい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 持ってない
        値:
          もってない: [ない, もっていない, もってない, もってませーん, 持っていません, 手元にありません]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃない, ちがう, まちがった, 違う, 間違えた, 間違った]
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9以上
              次の箱: coun再質問
            - 判定: 数値以上
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
            - 判定: エンティティ含む
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 診察券番号確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: うまく聞き取りが出来ませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ
      - 箱: 再度聞き取りへ_1
        セリフ: "うまく聞き取りが出来ませんでした。\n再度お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認へ
      - 箱: 診察券番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: END_診察券無し
            - 判定: エンティティ含む
              入力: 持ってない
              次の箱: END_診察券無し
            - 判定: エンティティ含む
              入力: 数字
              次の箱: 診察券番号セット（発話）
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 診察券番号セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: countクリア
          デフォルト: count上記以外
      - 箱: countクリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号クリア
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号セット（発話）
      - 箱: 診察券番号桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9桁以上
              次の箱: 再度聞き取り
            - 判定: lessEqual
              入力: 8桁以内
              次の箱: 診察券番号の読みセット
          デフォルト: countクリア
      - 箱: 再度聞き取り
        セリフ: 申し訳ありません、正しい桁数で聞き取れませんでした。再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 診察券番号確認へ
        セリフ: "診察券番号は、\n<? $診察券番号の読み ?>\n、でよろしいでしょうか?\nはい、または、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認
      - 箱: 診察券番号確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 診察券番号
              次の箱: 診察券番号クリア
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_診察券有り
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_診察券有り
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_診察券有り
          デフォルト: count上記以外_1
      - 箱: 否定
        セリフ: "正しく聞き取るための、お願いです。なるべく数字と数字の間に間をあけずにお答えいただけますか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 診察券番号の聞き取りへ
        セリフ: お分かりであれば、診察券番号をお話下さい。わからない場合はわからないとお話ください。ダイヤルキーでの入力も可能です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号セット（発話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 8桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外_2
      - 箱: 診察券番号セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 8桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外_2
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号の読みセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認へ
      - 箱: ダイヤルプッシュ案内
        セリフ: 8桁以内の番号をお話いただくか、ダイヤルキーで入力して下さい。
        入力待ち: あり
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1回質問２回目
              次の箱: 診察券番号聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: coun再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1回質問済み２回目
              次の箱: 診察券番号聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 診察券番号聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず

  終了:
    箱一覧:
      - 箱: END_診察券無し
        セリフ: none
        入力待ち: なし
      - 箱: END_診察券有り
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
