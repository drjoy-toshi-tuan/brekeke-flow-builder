flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 代表案内案件
        値:
          代表案内: [エンジン, ドック, 健康診断, 健診, 検診, 原因, 人間ドック]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 用件
        値:
          キャンセル: [３, さん, さんばん, サンバン, やめる, 三番, 取り消し, 取り消す, 取消, 二百株, 予約キャンセル, 予約のキャンセル]
          確認: [４, よん, よんばん, ヨンバン, 四番, 予約確認]
          診察予約: [1, １, いち, イチ, いちばん, お札の予約, しょしん, はじめて, よくボトル, 一番, 外来の予約, 再診, 最新, 撮りたい, 札の予約, 三新薬, 取得, 受診, 初めて, 初診, 信託の薬, 信用の予約, 親子, 診察, 診察の予約, 診察予約, 診療予約, 代替の薬, 百お願い, 薬を取る, 有効とる, 予約お願い, 予約する, 予約の方, 予約をお願い, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 連絡はする, 録りたい, 録る]
          変更: [2, ２, ニ, にばん, の変更, を変更, 延期, 取り直したい, 取り直す, 二番, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちのいずれかでお話ください。\n\n「予約を取る」、\n「予約を変更する」、\n「予約をキャンセルする」、\n「予約を確認する」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: 人間ドック・健診
              次の箱: 人間ドック・健診セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。はい、か、いいえ、でお答えいただけますか？\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "うまく聞き取りが出来ませんでした。はい、か、いいえ、でお答えいただけますか？\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初診か再診か
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 人間ドック・健診セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 診察予約復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル復唱
            - 判定: 一致
              入力: 変更
              次の箱: 変更復唱
            - 判定: 一致
              入力: 確認
              次の箱: 確認復唱
            - 判定: 一致
              入力: 健康診断・ドック
              次の箱: END_健診・ドック発話
      - 箱: セットした用件の分岐_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 新規セット：紹介状有無へ
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 新規セット：紹介状有無へ
          デフォルト: count上記以外_2
      - 箱: セットした用件の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: コンテキスト変換
            - 判定: 一致
              入力: キャンセル
              次の箱: END_戻る
            - 判定: 一致
              入力: 変更
              次の箱: END_戻る
            - 判定: 一致
              入力: 確認
              次の箱: END_戻る
            - 判定: 一致
              入力: 健康診断・ドック
      - 箱: キャンセル復唱
        セリフ: "ご予約のキャンセルでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 変更復唱
        セリフ: "ご予約の変更でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 診察予約復唱
        セリフ: 診察のご予約でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 確認復唱
        セリフ: "ご予約の確認でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: ドック・健康診断
              次の箱: END_健診・ドック発話
          デフォルト: count上記以外_1
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 新規セット：紹介状有無へ
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: セットした用件の分岐_1
      - 箱: 再診セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 紹介状確認
        セリフ: none
        説明: サブシナリオ「紹介状確認」を呼び出す
        回答振り分け:
          デフォルト: END_戻る
      - 箱: コンテキスト変換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 初診か再診か
      - 箱: 初診か再診か
        セリフ: 当院の受診は、初めてですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐_1

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_健診・ドック発話
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
