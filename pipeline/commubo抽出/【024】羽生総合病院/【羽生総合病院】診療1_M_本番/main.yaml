flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 代表案内
        値:
          代表案内: [リハビリテーション科, 胃婁交換, 外来化学療法, 緩和ケア, 救急科, 歯科口腔外科, 小児科, 心理療法室, 透析, 美容外科, 放射線画像診断科放射線治療科, 鍼灸室]
      - 名前: 予約対応なし
        値:
          予約対応なし: [病理診断科, 麻酔科]
      - 名前: 予約不要
        値:
          腎臓内科: [腎臓内科]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: お電話ありがとうございます。羽生総合病院、予約専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 切断待ち_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日聞取り
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号
      - 箱: 確認内容の聞き取りへ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 内容（フリー）
      - 箱: 次へ_2
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号
      - 箱: 次へ_3
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_4
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取りTEST
      - 箱: 次へ_5
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
