            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約キャンセル
          デフォルト: 予約キャンセルの流れ（特定診療科）
      - 箱: 携帯電話番号チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 再診受診の流れ_1
          デフォルト: 再診受診の流れ
      - 箱: 携帯電話番号チェック_2
