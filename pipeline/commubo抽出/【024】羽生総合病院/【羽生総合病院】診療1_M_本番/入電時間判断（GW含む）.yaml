flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付の分岐_1
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～土）
              次の箱: （平日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 17時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: 年末年始アナウンス
            - 判定: 数値
              入力: 17時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: テストノード
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 日付の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/31より前
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 1/4
              次の箱: 年末年始アナウンス
          デフォルト: 曜日の分岐
      - 箱: 日付の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/30より前
              次の箱: END_受付時間外
            - 判定: lessEqual
              入力: 12/31～1/3まで
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 5月4日
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 5月5日
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 5月6日
              次の箱: （平日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: 年末年始アナウンス
        セリフ: "当院では、12月31日から1月4日の間、予約専用ダイヤルは受付時間外となっております。1月5日 月曜日 朝8:30より受付いたしますので、時間内におかけなおし下さい。\nなお、年末年始の診療は時間外対応を行っております。受診をご希望の場合は代表電話048-562-3000へお問い合わせください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始アナウンス

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始アナウンス
        セリフ: none
        入力待ち: なし
