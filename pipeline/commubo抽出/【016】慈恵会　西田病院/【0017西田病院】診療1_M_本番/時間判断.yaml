flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: GW時期
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: GW時期
      - 箱: GW時期
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 4/30の前
              次の箱: END_24h稼働
            - 判定: 一致
              入力: 4/30
              次の箱: 4/30 時間分岐
            - 判定: lessEqual
              入力: 5/6まで
              次の箱: GW時期アナウンス
            - 判定: 一致
              入力: 5/7
              次の箱: 5/7 時間分岐
          デフォルト: END_24h稼働
      - 箱: 4/30 時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 17時まで
              次の箱: END_24h稼働
          デフォルト: GW時期アナウンス
      - 箱: 5/7 時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 7時59まで
              次の箱: GW時期アナウンス
          デフォルト: END_24h稼働
      - 箱: GW時期アナウンス
        セリフ: 恐れ入りますが、休診期間中のため、5月7日、木曜日、朝8時以降におかけください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_GW

  終了:
    箱一覧:
      - 箱: END_曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
            - 判定: 一致
              入力: 土曜日
      - 箱: END_24h稼働
        セリフ: none
        入力待ち: なし
      - 箱: END_GW
        セリフ: none
        入力待ち: なし
