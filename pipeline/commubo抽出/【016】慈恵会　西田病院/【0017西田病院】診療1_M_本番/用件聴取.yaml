flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 代表案内
        値:
          問い合わせ: [アクセス, お伺いしたい, お問合せ, その他, その他を取り合わせ, なくした, 確認したい, 教えて, 金額, 検査結果, 質問, 質問したい, 調べて, 聞きたい, 忘れた, 問い合わす, 料金]
      - 名前: 否定
        値:
          いいえ: [EHが今, いーえ, いえ, いや, じゃない, そうじゃないねん, そうちゃうねん, ちがう, ちゃう, まちがった]
      - 名前: 用件
        値:
          キャンセル: [やめる, 取り消し, 取り消す, 取消]
          再診: [あかかりつけの予約, かかりつけ, かかりつけの予約, もう一度診察の予約を取る, 安心, 駅自身の薬, 再診, 再診の予約, 最新, 最新, 撮りたい, 三新薬, 取りたい, 受診, 新品, 新薬, 診察, 診察の予約, 診察の予約, 診療予約, 定期受診の予約, 予約する, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          初診: [はじめて, 健康診断, 健診の結果, 写真, 主人, 終身, 初めて, 償還, 償還表, 商品の結果, 照会状, 照会状, 紹介状, 新規, 新規の予約, 新旧, 新契約, 新地, 新品, 千気, 返信, 返信検診の結果]
          変更: [延期, 取り直したい, 取り直す, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の3つのうちのいずれかでお話ください\n定期受診の予約、\n予約を変更する、\n予約をキャンセルする、それでは、お話ください。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: 代表案内
              次の箱: 代表案内セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 8以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 初診/再診分岐
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: 3回聞き取れず
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 初診のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（初診）
      - 箱: 定期受診へ
        セリフ: 失礼しました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 再診のセット
      - 箱: 再診のセット
        セリフ: "定期受診の予約、でよろしいでしょうか?\nはい、または、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 代表案内セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 初診
              次の箱: 初診確認
            - 判定: 一致
              入力: 再診予約
              次の箱: 再診のセット
            - 判定: 一致
              入力: キャンセル
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: 変更
              次の箱: 用件の復唱（変更）
      - 箱: セットした用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: END_戻る
            - 判定: 一致
              入力: 変更
              次の箱: END_戻る
            - 判定: 一致
              入力: 再診
              次の箱: END_戻る
      - 箱: 用件の復唱（キャンセル）
        セリフ: "ご予約のキャンセル、でよろしいでしょうか?\nはい、または、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（変更）
        セリフ: "ご予約の変更、でよろしいでしょうか?\nはい、または、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（初診）
        セリフ: 恐れ入りますが、初めて受診される方は、代表電話番号へおかけなおし下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_初診代表案内へ
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定⇒再質問へ
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 否定⇒再質問へ
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_1
          デフォルト: count上記以外_1
      - 箱: 否定⇒再質問へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 初診/再診分岐
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: 値含む
              入力: 初診
              次の箱: 初診のセット
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 初診のセット
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 定期受診へ
            - 判定: 値含む
              入力: 再診
              次の箱: 定期受診へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 定期受診へ
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 定期受診へ
          デフォルト: count上記以外_2
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、初めてです」、や、いいえ、違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初診確認
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 初診確認
        セリフ: "初診のご予約で、よろしいでしょうか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初診/再診分岐

  終了:
    箱一覧:
      - 箱: END_初診代表案内へ
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
