flow:
  最初の箱: 用件を判断

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [はーい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]

  共通:
    箱一覧:
      - 箱: 変更する診療科の数
        セリフ: する診療科は、ひとつでしょうか？1つの場合は「はい」、2つ以上の場合は「いいえ」、で、お答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約人数の聞き取り
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 予約人数の聞き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 予約人数の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 人数確認
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 人数確認
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 複数確認
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 複数確認
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 人数確認
          デフォルト: count上記以外
      - 箱: 人数確認
        セリフ: １つの診療科予約についてですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 複数確認
        セリフ: 2つ以上の診療科予約についてですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル
      - 箱: 予約変更
        セリフ: 今回、予約変更
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更する診療科の数
      - 箱: 予約キャンセル
        セリフ: 今回、予約キャンセル
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更する診療科の数

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
