flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n西田病院の、予約専用AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: ありがとうございます。では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 氏名聴取へ
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者名聴取
      - 箱: 終話へ
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 終話へ（CXL smsflag3）
        セリフ: 予約キャンセルを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話へ（再診/変更）
        セリフ: 3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡をいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: smsflag2（変更）
            - 判定: 一致
              入力: 再診
              次の箱: smsflag1（再診）
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 終話へ（CXL smsflag3）
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約日聴取
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約日聴取
            - 判定: 一致
              入力: 再診
              次の箱: 予約候補日フリー聴取
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 複数診療科聴取へ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 複数診療科聴取へ
            - 判定: 一致
              入力: 再診
              次の箱: 診療科聴取へ
            - 判定: 一致
              入力: 代表案内
              次の箱: 代表案内 終話へ
      - 箱: 診療科数を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 複数
              次の箱: 複数診療科聴取へ（フリー発話）
            - 判定: 一致
              入力: ひとつ
              次の箱: 診療科聴取へ
      - 箱: 用件を判断_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: キャンセル理由聴取
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約候補日フリー聴取
      - 箱: 用件を判断_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 病院への連絡事項聴取へ
            - 判定: 一致
              入力: 再診
              次の箱: 生年月日聴取へ
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電時間判断ノードへ
      - 箱: 複数診療科聴取へ
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科数確認
      - 箱: 電話切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 最後に、ご連絡先のお電話番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 入電時間判断ノードへ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間判断
      - 箱: GW
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 用件聴取へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聴取
      - 箱: 予約候補日フリー聴取
        セリフ: none
        説明: サブシナリオ「予約候補日フリー聴取」を呼び出す
        参照ファイル: 予約候補日フリー聴取.yaml
        回答振り分け:
          デフォルト: 用件を判断_3
      - 箱: 連絡先聴取
        セリフ: none
        説明: サブシナリオ「連絡先聴取」を呼び出す
        参照ファイル: 連絡先聴取.yaml
        回答振り分け:
          デフォルト: 終話へ
      - 箱: 予約日聴取完了
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断_2
      - 箱: 病院への追加連絡事項聴取
        セリフ: none
        説明: サブシナリオ「病院への追加連絡事項聴取」を呼び出す
        参照ファイル: 病院への追加連絡事項聴取.yaml
        回答振り分け:
          デフォルト: 生年月日聴取へ
      - 箱: キャンセル理由聴取
        セリフ: none
        説明: サブシナリオ「キャンセル理由聴取」を呼び出す
        参照ファイル: キャンセル理由聴取.yaml
        回答振り分け:
          デフォルト: 病院への連絡事項聴取へ
      - 箱: 病院への連絡事項聴取へ
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 病院への追加連絡事項聴取
      - 箱: 生年月日聴取へ
        セリフ: つぎに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 氏名聴取へ
      - 箱: 患者名聴取
        セリフ: none
        説明: サブシナリオ「患者名聴取」を呼び出す
        参照ファイル: 患者名聴取.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 診療科数確認
        セリフ: none
        説明: サブシナリオ「診療科数確認」を呼び出す
        参照ファイル: 診療科数確認.yaml
        回答振り分け:
          デフォルト: 診療科数を判断
      - 箱: 複数診療科聴取へ（フリー発話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 複数診療科名聴取（フリー）
      - 箱: 複数診療科名聴取（フリー）
        セリフ: none
        説明: サブシナリオ「複数診療科名聴取（フリー）」を呼び出す
        参照ファイル: 複数診療科名聴取（フリー）.yaml
        回答振り分け:
          デフォルト: 診療科聴取完了
      - 箱: 診療科聴取完了
        セリフ: "ありがとうございます。\nでは、次に、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日聴取
      - 箱: 用件NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 3回聴取NG 終話へ
        セリフ: "大変申し訳ございません。うまく聞き取ることができませんでした。\n恐れ入りますが、代表電話番号へおかけなおしください。\n受付時間は、日曜祝日、年末年始を除く、月曜から金曜、7時30分～17時、土曜は7時30分～11時30分です。\n電話番号が分かる場合は、お電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号案内
      - 箱: 予約以外 終話へ
        セリフ: "受付時間は、日曜祝日、年末年始を除く、月曜から金曜、7時30分～17時、土曜は7時30分～11時30分です。\n電話番号が分かる場合は、お電話をお切りください。分からない場合はご案内いたしますのでメモをご準備ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号案内
      - 箱: 予約以外 終話へ_1
        セリフ: 大変恐れ入りますが、お問合せの内容は、AI電話では対応することができません。代表電話番号へおかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約以外 終話へ
      - 箱: 初診その他 終話へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約以外 終話へ
      - 箱: 診療科数聴取NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 診療科NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 複数診療科聴取NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 予約日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 希望日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: キャンセル理由NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 追加連絡事項NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 生年月日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 氏名NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 連絡先NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聴取NG 終話へ
      - 箱: 番号案内
        セリフ: 電話番号は、0972-22-0180です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 回数カウント
      - 箱: 回数カウント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回以上
              次の箱: 終話
          デフォルト: 繰り返し
      - 箱: 繰り返し
        セリフ: 繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号案内
      - 箱: 診療科聴取へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科聴取（医師名）
      - 箱: 診療科聴取（医師名）
        セリフ: none
        説明: サブシナリオ「診療科聴取（医師名）」を呼び出す
        参照ファイル: 診療科聴取（医師名）.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: smsflag2（変更）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話へ（再診/変更）
      - 箱: smsflag1（再診）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話へ（再診/変更）
      - 箱: 予約日聴取
        セリフ: none
        説明: サブシナリオ「予約日聴取」を呼び出す
        参照ファイル: 予約日聴取.yaml
        回答振り分け:
          デフォルト: 予約日聴取完了
      - 箱: 用件聴取
        セリフ: none
        説明: サブシナリオ「用件聴取」を呼び出す
        参照ファイル: 用件聴取.yaml
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 代表案内 終話へ
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約以外 終話へ_1
      - 箱: 時間判断
        セリフ: none
        説明: サブシナリオ「時間判断」を呼び出す
        参照ファイル: 時間判断.yaml
        回答振り分け:
          デフォルト: 用件聴取へ

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
