flow:
  最初の箱: その他

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 8以上
              次の箱: 再質問の有無
          デフォルト: 聴き取り
      - 箱: その他
        セリフ: "その他、病院への連絡事項はございますか？\n無ければ、『特にない』、のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: 上記以外on
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_聞き取りできず
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: うまく聞き取りができませんでした。恐れ入りますが、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: その他

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取りできず
        セリフ: none
        入力待ち: なし
