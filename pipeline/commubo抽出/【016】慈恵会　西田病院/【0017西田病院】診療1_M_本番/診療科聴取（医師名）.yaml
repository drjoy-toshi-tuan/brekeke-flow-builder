flow:
  最初の箱: 用件を判断

  エンティティ定義:
    カスタム:
      - 名前: わからない
        値:
          わからない: [しらない, しりません, わかりません, わすれた, 覚えていない, 覚えてない, 書いていない, 知らない, 分からない, 分からん, 忘れちゃった]
      - 名前: 肯定
        値:
          肯定: [はーい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 消化器分岐
        値:
          消化器外科: [いうか, けが, てか, メーカー, レッカー, 外科, 刑が, 経過, 結果, 消化器外科, 消火器外科, 消外, 劣化]
          消化器内科: [小額内科, 尚書きないか, 庄内, 消火器内科, 消内, 表記なんか]
      - 名前: 診療科
        値:
          リウマチ膠原病内科: [U町, いう町か, こー現状, りうまち, りゅーまち, リューマチ, 抗原量, 豊原病, 膠原病]
          外科: [いうか, けが, げか, てか, メーカー, レッカー, 形が, 経過, 結果]
          眼科: [あんか, あんた, がんか, だんか, だんだ, なんか, 眼科, 元金か, 視力検査]
          呼吸器内科: [こーない, 吸気内科, 呼内, 来ない]
          循環器内科: [ハート, 循環, 循環器科, 循内, 順番, 中間期内科, 絨毯]
          小児科: [商品, 将棋, 小児, 賞味, 正味]
          消化器内科: [小額内科, 尚書き, 庄内, 消化器, 消火器, 消内, 腸書き, 表記なんか]
          腎臓内科: [ジンナイ, 腎臓, 腎内]
          整形外科: [TK, えー外科, 経由か, 整形, 日経, 閉経]
          透析科: [とーせき, 後席, 透析]
          内科: [ないか, なにか, なんか, 内科]
          内分泌糖尿病内科: [糖尿内科, 糖尿病, 内分泌]
          脳神経外科: [の下, の買い, 脳外, 脳神経]
          泌尿器科: [ウロ, 医療機関, 金曜着, 金曜日, 事業期間, 信用機関, 泌尿, 費用, 利用]
          皮膚科: [いうか, 岐阜が, 昼か, 二日, 皮膚]
          婦人科: [ギネ, フジコ, ふじん, 三分の印鑑, 傘下, 参加, 産科, 産婦人科, 子宮がん検診, 二年, 婦人科, 富士銀行]
          放射線科: [放射, 放射線]
      - 名前: 先生名
        値:
          奥田先生: [おくだ, オクダ, 奥田]
          加隈先生: [あクマ, アクマ, アズマ, オグマ, かくま, カクマ, かくま, カグマ, カグマ, サクマ, タクマ, ナガヌマ, フクマ, 各ま]
          吉田先生: [ヨシダ]
          三股先生: [イマタ, みつまた, ミツマタ, ミマタ]
          山口先生: [やまぐち, ヤマグチ, 山口]
          柴田先生: [シバタ, シバタ, 柴田]
          小田先生: [オダ, 小田]
          森先生: [モリ, 森]
          清水先生: [しみず, シミズ, 清水]
          増田先生: [ますだ, マスダ, マツダ, 増田]
          中川先生: [なかがわ, ナカガワ, 中川]
          島袋先生: [しまぶくろ, シマブクロ, 島袋]
          波津久先生: [あづくせん, タグチ, はずく, ハズク, ハズク, ハゾク, はづく, はづく, 家族, 外す, 省く, 筈]
          武内先生: [タケウチ, 竹内]
          木許先生: [きもと, キモト, 木元]
      - 名前: 否定
        値:
          否定: [EHが今, いいえ, いえ, いや, じゃない, ちがう, ちゃう]
      - 名前: 分岐_診療科
        値:
          消化器: [小額内科, 少額, 尚書き, 庄内, 消化管, 消化器, 消化器科, 消火器, 消火器, 消内, 腸書き, 表が, 表記なんか, 評価機]

  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（予約変更・キャンセル）
        セリフ: 現在予約されている診療科名をお答えください。診療科がわからない場合は、わからない、とお答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取りへ（新規予約）
        セリフ: 受診を希望される診療科名をおっしゃってください。診療科がわからない場合は、わからない、とお答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐あり_消化器
              次の箱: 分岐あり_消化器セット
            - 判定: エンティティ含む
              入力: 診療科ヒアリング
              次の箱: 診療科セット
            - 判定: エンティティ含む
              入力: 先生ヒアリング
              次の箱: 先生名セット
            - 判定: エンティティ含む
              入力: わからない
              次の箱: わからない セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: カウント再質問
          デフォルト: 診療科の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 先生名セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 先生読み取得
      - 箱: わからない セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ①テストの為のルート変更
      - 箱: 診療科読み取得
        セリフ: none
        説明: サブシナリオ「診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得_1
      - 箱: 先生読み取得
        セリフ: none
        説明: サブシナリオ「先生読み取得」を呼び出す
        回答振り分け:
          デフォルト: 先生読み取得_1
      - 箱: 分岐あり診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐あり診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 分岐あり診療科読み取得_2
      - 箱: 分岐あり診療科読み取得_1
        セリフ: none
        説明: サブシナリオ「分岐あり診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得_1
      - 箱: 診療科読み取得_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 先生読み取得_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 医師名確認へ
      - 箱: 診療科セット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ①テストの為のルート変更
      - 箱: 分岐あり診療科読み取得_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐確認へ
      - 箱: 診療科確認へ
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 医師名確認へ
        セリフ: "<? $医師名読み ?>\n、でよろしいですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 診療科再設定へ
            - 判定: エンティティ含む
              入力: 先生名
              次の箱: 先生名再設定へ
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 先生名だったか？
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 先生名だったか？
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 否定
          デフォルト: count上記以外_1
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ_1
          デフォルト: 診療科を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 分岐（消化器）の聞き取り
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、そうです」もしくは「いいえ、ちがいます」でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐（消化器）の聞き取りへ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 診療科再設定へ
        セリフ: 失礼しました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科セット
      - 箱: 先生名再設定へ
        セリフ: 失礼しました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 先生名セット
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約
              次の箱: 診療科の聞き取りへ（新規予約）
            - 判定: 一致
              入力: 予約変更
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 聞き直し3回
              次の箱: ①聞き取りできず TESTルート変更
          デフォルト: 診療科or医師名
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: ２回以下
              次の箱: 再度聞き取りへ_2
          デフォルト: ①聞き取りできず TESTルート変更
      - 箱: 先生名だったか？
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 先生名
              次の箱: 先生名から診療科
          デフォルト: 医師名フリー聴取
      - 箱: 医師名フリー聴取
        セリフ: none
        説明: サブシナリオ「医師名フリー聴取」を呼び出す
        回答振り分け:
          デフォルト: 消化器外科？
      - 箱: ①テストの為のルート変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: ①聞き取りできず TESTルート変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取りできず
      - 箱: テストの為のループへ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取りへ（新規予約）
      - 箱: カウント再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ①聞き取りできず TESTルート変更
          デフォルト: 再度聞き取りへ
      - 箱: 先生名から診療科
        セリフ: none
        説明: サブシナリオ「先生名から診療科」を呼び出す
        回答振り分け:
          デフォルト: 診療科セット_1
      - 箱: 診療科or医師名
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診療科空
              次の箱: 医師名確認へ
          デフォルト: 診療科確認へ
      - 箱: 分岐あり_消化器セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐あり診療科読み取得
      - 箱: 分岐確認へ
        セリフ: "<? $分岐あり診療科読み ?>\n、ですね？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐（消化器）の聞き取りへ
      - 箱: 分岐（消化器）の聞き取りへ
        セリフ: 消化器内科と消化器外科の、どちらですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐（消化器）の聞き取り
      - 箱: 分岐（消化器）の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 消化器
              次の箱: 分岐（消化器）セット
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 再度聞き取りへ
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 再度聞き取りへ
          デフォルト: count上記以外_2
      - 箱: 分岐（消化器）セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐あり診療科読み取得_1
      - 箱: 消化器外科？
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 消化器外科
              次の箱: 外科セット
          デフォルト: ①テストの為のルート変更
      - 箱: 外科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ①テストの為のルート変更

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取りできず
        セリフ: none
        入力待ち: なし
