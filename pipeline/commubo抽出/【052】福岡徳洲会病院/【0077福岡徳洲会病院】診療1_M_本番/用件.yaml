flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もう一回, 一回, 一度]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 用件
        値:
          キャンセル: [2, キャンセル, やめる, 取り消し, 取り消す, 取消, 二]
          確認: [3, 確認, 三, 問い合わせ]
          新規: [ドック, ようやく, 眼瞼すんの, 健康診断, 健診, 健診・人間ドックの予約, 健診と人間ドックの予約, 健診と人間ロック, 健診の予約, 検診, 検診と人間ドック, 検針, 検針と人間ドック, 元金種, 雇い入れ, 事業主, 就職, 進学, 人間ドック, 人間独, 人工診断, 生活習慣病, 全身, 全身, 天候診断, 特定健診, 返金控寸断, 返信, 予約]
          変更: [1, 一, 取り直したい, 取り直す, 日程, 日付, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更, 方向]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の3つのうちの、いずれかでお話ください。\n1「変更する」、2「キャンセルする」、3「確認する」\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: 用件の確認へ
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: 用件の確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: END_再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、ご用件をお話いただくか、ダイヤルブッシュで押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 健診予約
            - 判定: 一致
              入力: 変更
              次の箱: 用件_変更をセット
            - 判定: 一致
              入力: キャンセル
              次の箱: 用件_キャンセルをセット
            - 判定: 一致
              入力: 確認
              次の箱: 用件_問い合わせをセット
      - 箱: 用件_キャンセルをセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件_変更をセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件_問い合わせをセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: リセット
        セリフ: 再度、テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件取得できず
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 用件_変更をセット
            - 判定: 一致
              入力: 2
              次の箱: 用件_キャンセルをセット
            - 判定: 一致
              入力: 3
              次の箱: 用件_問い合わせをセット
            - 判定: 一致
              入力: 4
              次の箱: END_用件_新規をセット
          デフォルト: count上記以外_1

  終了:
    箱一覧:
      - 箱: END_再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、ご用件をお話いただくか、ダイヤルブッシュで押してください。"
        入力待ち: なし
      - 箱: END_用件_新規をセット
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
