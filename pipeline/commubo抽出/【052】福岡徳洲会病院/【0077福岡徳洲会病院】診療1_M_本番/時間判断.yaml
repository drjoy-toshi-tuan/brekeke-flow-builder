flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 祝日分岐
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （平日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 20時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 20時まで
              次の箱: END_受付時間内
          デフォルト: 年末年始
      - 箱: 祝日分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 1/3以下の日（12/30，12/31、1/1，1/2、1/3）
              次の箱: 年末年始
          デフォルト: END_受付時間外
      - 箱: 日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12月26日前
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 12/26
              次の箱: （平日）時間の分岐_1
            - 判定: lessEqual
              入力: 1/4（12/27，12/28，12/29，1/4）
              次の箱: 年末年始
          デフォルト: 曜日の分岐
      - 箱: 年末年始
        セリフ: 大変申し訳ございませんが、本ダイヤルは年末年始のため、お休みをいただいております。受付の再開は1月5日8時より、通常通り対応させていただきます。ご不便をお掛け致しますが、どうぞよろしくお願い申し上げます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_稼働前
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 4月28日前
