flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n福岡徳洲会病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 携帯電話番号チェック
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 携帯電話番号チェック_1
            - 判定: 一致
              入力: 予約確認
              次の箱: 携帯電話番号チェック_2
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約変更の流れ
          デフォルト: 予約変更の流れ
      - 箱: 携帯電話番号チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約キャンセルの流れ（特定診療科）
          デフォルト: 予約キャンセルの流れ（特定診療科）
      - 箱: 携帯電話番号チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約確認の流れ
          デフォルト: 予約確認の流れ
      - 箱: 予約キャンセルの流れ（特定診療科）
        セリフ: "予約キャンセルの申し込みを受付いたしました。\n3診療日以内の、担当者からの折り返し電話、もしくは、SMSにて受付完了となります。折り返しは、当院代表番号、092-573-6622よりおかけいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ
        セリフ: "予約変更の申し込みを受付いたしました。\n3診療日以内の、担当者からの折り返し電話、もしくは、SMSにて受付完了となります。折り返しは、当院代表番号、092-573-6622よりおかけいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約確認の流れ
        セリフ: "ご予約に関するお問い合わせを受付いたしました。\n3診療日以内の、担当者からの折り返し電話、もしくは、SMSにて受付完了となります。折り返しは、当院代表番号、092-573-6622よりおかけいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 接続詞
            - 判定: 一致
              入力: キャンセル
              次の箱: 接続詞
            - 判定: 一致
              入力: 確認
              次の箱: 接続詞_2
            - 判定: 一致
              入力: 新規
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 接続詞_6
            - 判定: 一致
              入力: キャンセル
              次の箱: 接続詞_1
            - 判定: 一致
              入力: 変更
              次の箱: 接続詞_1
      - 箱: 用件を判断_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 接続詞_6
            - 判定: 一致
              入力: キャンセル
              次の箱: 接続詞_3
      - 箱: 用件を判断_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 追加問い合わせ/追加診療科
            - 判定: 一致
              入力: 確認
              次の箱: 接続詞_8
            - 判定: 一致
              入力: キャンセル
              次の箱: 接続詞_8
      - 箱: 用件を判断_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 接続詞_3
            - 判定: 一致
              入力: 変更
              次の箱: 接続詞_3
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間判断
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 用件
        セリフ: none
        説明: サブシナリオ「用件」を呼び出す
        参照ファイル: 用件.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 接続詞
        セリフ: つづいて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科聴取
      - 箱: 接続詞_1
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日
      - 箱: 接続詞_2
        セリフ: つづいて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科聴取
      - 箱: 接続詞_3
        セリフ: では、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号
      - 箱: 接続詞_4
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 氏名
      - 箱: 接続詞_5
        セリフ: かしこまりました。次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日
      - 箱: 接続詞_6
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更希望日
      - 箱: 接続詞_7
        セリフ: 新規予約に関するお問い合わせは、このお電話では受付できません。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件
      - 箱: 予約日
        セリフ: none
        説明: サブシナリオ「予約日」を呼び出す
        参照ファイル: 予約日.yaml
        回答振り分け:
          デフォルト: 理由
      - 箱: 接続詞_8
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 追加問い合わせ/追加診療科
      - 箱: 診察券番号
        セリフ: none
        説明: サブシナリオ「診察券番号」を呼び出す
        参照ファイル: 診察券番号.yaml
        回答振り分け:
          デフォルト: 接続詞_4
      - 箱: 氏名
        セリフ: none
        説明: サブシナリオ「氏名」を呼び出す
        参照ファイル: 氏名.yaml
        回答振り分け:
          デフォルト: 接続詞_5
      - 箱: 生年月日
        セリフ: none
        説明: サブシナリオ「生年月日」を呼び出す
        参照ファイル: 生年月日.yaml
        回答振り分け:
          デフォルト: 接続詞_9
      - 箱: 接続詞_9
        セリフ: 最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先
      - 箱: 連絡先
        セリフ: none
        説明: サブシナリオ「連絡先」を呼び出す
        参照ファイル: 連絡先.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 代表電話案内
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。受付時間は、土日、祝日を除く、月曜日から金曜日の13時から16時となっております。電話番号は092-573-6622です。\n繰り返します。\n電話番号は、092-573-6622です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 麻酔科代表電話案内
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。受付時間は、土日、祝日を除く、月曜日から金曜日の9時から12時となっております。電話番号は092-573-6622です。\n繰り返します。\n電話番号は、092-573-6622です。\nお電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 健康診断代表案内
        セリフ: "健康診断は、AI電話では受付できません。恐れ入りますが、代表電話番号へおかけ直しください。受付時間は月曜日から金曜日までは10時～16時までとなっております。土曜日は10時～12時までとなっております。電話番号は092-573-6622です。\n繰り返します。\n電話番号は、092-573-6622です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科分岐
      - 箱: 診療科NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科分岐
      - 箱: 予約日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科分岐
      - 箱: 診察券番号NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科分岐
      - 箱: 氏名NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科分岐
      - 箱: 生年月日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科分岐
      - 箱: 連絡先NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科分岐
      - 箱: 変更希望日
        セリフ: none
        説明: サブシナリオ「変更希望日」を呼び出す
        参照ファイル: 変更希望日.yaml
        回答振り分け:
          デフォルト: 用件を判断_4
      - 箱: 診療科分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: ペインクリニック
              次の箱: 麻酔科代表電話案内
          デフォルト: 代表電話案内
      - 箱: 診療科聴取
        セリフ: none
        説明: サブシナリオ「診療科聴取」を呼び出す
        参照ファイル: 診療科聴取.yaml
        回答振り分け:
          デフォルト: 分からない分岐
      - 箱: 追加問い合わせ/追加診療科
        セリフ: none
        説明: サブシナリオ「追加問い合わせ/追加診療科」を呼び出す
        参照ファイル: 追加問い合わせ_追加診療科.yaml
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 分からない分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 分からない
              次の箱: 用件を判断_1
          デフォルト: 用件を判断_3
      - 箱: 理由
        セリフ: none
        説明: サブシナリオ「理由」を呼び出す
        参照ファイル: 理由.yaml
        回答振り分け:
          デフォルト: 用件を判断_2
      - 箱: 時間外案内
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、祝日を除く、月曜日から金曜日の8時から20時となっております。\n恐れ入りますが、受付時間内におかけなおしください。\nペインクリニックは専用の直通番号に平日の午前中にお問い合わせください。\n電話番号は092-514-6137です。\n再度申し上げます。\nペインクリニックの直通電話番号は092-514-6137です。\nお電話ありがとうございました。失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 年末年始
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 時間判断
        セリフ: none
        説明: サブシナリオ「時間判断」を呼び出す
        参照ファイル: 時間判断.yaml
        回答振り分け:
          デフォルト: 接続詞_7
      - 箱: リハビリ確認内容
        セリフ: none
        説明: サブシナリオ「リハビリ確認内容」を呼び出す
        参照ファイル: リハビリ確認内容.yaml
        回答振り分け:
          デフォルト: 分からない分岐

  終了:
