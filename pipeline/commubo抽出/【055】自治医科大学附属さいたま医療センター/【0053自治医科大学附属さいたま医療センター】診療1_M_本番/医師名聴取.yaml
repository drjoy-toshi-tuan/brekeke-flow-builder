flow:
  最初の箱: 用件分岐

  エンティティ定義:
    カスタム:
      - 名前: ありません
        値:
          ありません: [しません, 指定無し, 誰でも, 無いです]
      - 名前: 診療科
      - 名前: 分からない
        値:
          分からない: [わからない, わかりません, 覚えていない, 覚えていません, 覚えてない, 覚えてません, 知らない, 知りません, 読めない, 読めません, 分かりません, 聞いていない, 聞いていません, 聞いてない, 聞いてません]

  共通:
    箱一覧:
      - 箱: 医師名or診療科の聴取へ
        セリフ: 予約票に記載されている先生のお名前、または診療科をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聴き取り
      - 箱: 医師名の聴取へ
        セリフ: "医師名の指定がある場合は、医師名をお話ください。\n無い場合は「ありません」のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聴き取り
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋用件なし
              次の箱: count再質問
            - 判定: 一致
              入力: 無言9（5秒）＋用件なし
              次の箱: count再質問
            - 判定: 一致
              入力: 待ち時間経過
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 無言3（約2秒）＋用件あり
              次の箱: 聞き取り完了
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋用件あり
              次の箱: 聞き取り完了
          デフォルト: 無言on
      - 箱: わからないセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 指定無しセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聴き取り
      - 箱: 再度質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度質問
      - 箱: 聞き取り完了
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: すべて聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: ありません
              次の箱: 指定無しセット
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: わからないセット
          デフォルト: 聴取内容チェック
      - 箱: 用件分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 初診
              次の箱: 医師名の聴取へ
          デフォルト: 医師名or診療科の聴取へ

  終了:
    箱一覧:
      - 箱: END_医師名の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 人名
            - 判定: エンティティ含む
              入力: 診療科名
            - 判定: エンティティ含む
              入力: 分からない
      - 箱: END_医師名の聴き取り_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 人名
            - 判定: エンティティ含む
              入力: 診療科名
            - 判定: エンティティ含む
              入力: 分からない
      - 箱: END_医師名セット
        セリフ: none
        入力待ち: なし
      - 箱: END_診療科セット
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用
        セリフ: none
        入力待ち: なし
