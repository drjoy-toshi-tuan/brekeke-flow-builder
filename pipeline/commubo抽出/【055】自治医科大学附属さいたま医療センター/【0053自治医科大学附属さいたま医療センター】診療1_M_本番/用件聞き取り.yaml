flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あっています, あっている, あってます, あってます, あってる, いいです, そうそう, そうです, それです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 再診予約
        値:
          再診: [はい新薬, 安心, 再診予約, 最新, 最新訳, 三信, 三新薬, 耐震]
      - 名前: 初診予約
        値:
          初診: [はじめて, 禁忌, 写真, 終身, 初めて, 初診予約, 商品, 新規, 新規の予約, 新規予約, 新品]
      - 名前: 数字の１
        値:
          １: [1, いち, イチ, いちばん, イチバン, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, にばん, ニバン, 二, 二番]
      - 名前: 代表案内案件
        値:
          代表案内: [ドック, 健康診断, 健診, 検診, 人間ドック]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, そうじゃない, そうじゃないねん, そうちゃうねん, そうではない, それではない, ちがう, まちがった, 違いました, 違います, 間違い, 別の]
      - 名前: 用件
        値:
          キャンセル: [3, ３, サン, さんばん, やめる, 三, 三番, 取り消し, 取り消す, 取消, 予約のキャンセル]
          診察予約: [1, １, しょしん, はじめて, 一, 印刷の, 印刷のやつをドル。, 再診, 最新, 撮りたい, 三新薬, 取得, 受診, 初めて, 初診, 診察, 診察の予約, 診療予約, 予約お願い, 予約する, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          内容確認: [4, ４, その他確認, よん, ヨン, 確認, 確認, 角煮, 教えて, 四, 四番, 時間を忘れた, 次回の予約の日時を確認, 次回の予約日時を確認, 次回予約の日時を確認, 次回予約日時を確認, 日時確認, 聞きたい, 忘れた, 予約の核, 予約の確認, 予約を確認, 予約確認, 予約日時を確認する]
          変更: [2, ２, 延期, 取り直したい, 取り直す, 二, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 予約の変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちの、いずれかでお話ください。\n「1.外来診察の予約を取る」\n「2.外来予約を変更する」\n「3.外来予約をキャンセルする」\n「4.外来予約を確認する」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_3
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 初診再診確認
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_6
          デフォルト: 用件を確認_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 用件再設定へ
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ(DTMF)
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再質問（DTMF)
      - 箱: count再質問_6
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ_3
      - 箱: count再質問_7
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ(DTMF)_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初再診確認
      - 箱: 再度聞き取りへ_3
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初診再診分岐
      - 箱: 再度聞き取りへ(DTMF)
        セリフ: "正しい番号を認識出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: DTMF分岐
      - 箱: 再度聞き取りへ(DTMF)_1
        セリフ: "正しい番号を認識出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初診再診確認
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 診察予約復唱
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 確認
              次の箱: 予約確認復唱
      - 箱: 初再診確認
        セリフ: "初診ですか？再診ですか？\n受診中の診療科でない場合は初診とお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初診再診確認
      - 箱: 初診再診確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 再診
              次の箱: 再診予約の復唱確認
            - 判定: エンティティ含む
              入力: 初診
              次の箱: 新規（初診）予約の復唱確認
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_2
          デフォルト: count上記以外_2
      - 箱: 初診再診分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 再診
              次の箱: 再診予約の復唱確認
            - 判定: エンティティ含む
              入力: 初診
              次の箱: 新規（初診）予約の復唱確認
      - 箱: 初診再診分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 再診
              次の箱: 初診（新規）を再設定
            - 判定: エンティティ含む
              入力: 初診
              次の箱: 再診を再設定
      - 箱: 予約キャンセル復唱
        セリフ: "ご予約のキャンセルでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: はい、いいえ、でお答えください。
      - 箱: 予約変更復唱
        セリフ: "ご予約の変更でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: はい、いいえ、でお答えください。
      - 箱: 診察予約復唱
        セリフ: 診察のご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: 初再診確認
      - 箱: 予約確認復唱
        セリフ: "ご予約の確認でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: はい、いいえ、でお答えください。
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 数字の１発話（肯定）
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 数字の２発話（否定）
              次の箱: count再質問_8
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_8
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_8
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐_1
          デフォルト: count上記以外_1
      - 箱: 用件を確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 数字の１発話（肯定）
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 数字の２発話（否定）
              次の箱: 初診再診分岐_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 初診再診分岐_1
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 初診再診分岐_1
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐_2
          デフォルト: count上記以外_3
      - 箱: count再質問_8
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 2回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聴き取り失敗
      - 箱: 新規（初診）予約の復唱確認
        セリフ: 初診のご予約で、よろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: はい、いいえ、でお答えください。_1
      - 箱: 再診予約の復唱確認
        セリフ: 再診のご予約で、よろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: はい、いいえ、でお答えください。_1
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．診察の予約
              次の箱: 診察予約復唱
            - 判定: 一致
              入力: ２．予約を変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: ３．予約をキャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: ４．予約を確認
              次の箱: 予約確認復唱
          デフォルト: count再質問_5
      - 箱: DTMF分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．肯定
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: ２．否定
              次の箱: count再質問_8
          デフォルト: count再質問_4
      - 箱: DTMF分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．肯定
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: ２．否定
              次の箱: 初診再診分岐_1
          デフォルト: count再質問_7
      - 箱: 再質問（DTMF)
        セリフ: "正しい番号が確認できませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再診を再設定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: 初診（新規）を再設定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: はい、いいえ、でお答えください。
        セリフ: １．はい、または、２．いいえ、のいずれかでお答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: はい、いいえ、でお答えください。_1
        セリフ: １．はい、または、２．いいえ、のいずれかでお答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聴き取り失敗
        セリフ: none
        入力待ち: なし
