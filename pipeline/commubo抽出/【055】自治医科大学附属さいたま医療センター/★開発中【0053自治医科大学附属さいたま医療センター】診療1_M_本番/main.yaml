      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n自治医科大学附属さいたま医療センターの、外来予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
