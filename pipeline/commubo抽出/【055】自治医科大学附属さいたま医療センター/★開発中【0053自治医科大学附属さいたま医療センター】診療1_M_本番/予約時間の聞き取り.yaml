flow:
  最初の箱: 予約時聞き取り

  エンティティ定義:
    カスタム:
      - 名前: 希望時間帯
        値:
          午後: [13時, 14時, １時, 2時, ごご, ゴゴ]
          午前: [10時, 11時, 8時, 9時, ごぜん, ゴゼン, 午前中, 昼前, 朝]
          指定なし: [いつでも, どちらでも, 何時でも, 希望なし, 空いてる, 特になし]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: count再質問
          デフォルト: 聴き取り
      - 箱: 予約時聞き取り
        セリフ: 予約票に記載されている予約時間を「何時何分」のようにお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: エンティティ含む
              入力: わからない
              次の箱: わからないセット
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋数字無し
              次の箱: count再質問
            - 判定: 一致
              入力: 上記以外9（5秒）＋数字無し
              次の箱: count再質問
            - 判定: 数値
              入力: 上記以外2（約1秒）＋数字発話あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋数字発話あり
              次の箱: END_聞き取り完了
          デフォルト: count上記以外
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。 再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約時聞き取り
      - 箱: わからないセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: ありがとうございます。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
