flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 時間外コメント
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （月～金）時間の分岐
          デフォルト: 時間外コメント
      - 箱: （月～金）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時より前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 16時まで
              次の箱: END_受付時間内
          デフォルト: 時間外コメント
      - 箱: 時間外コメント
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、土曜、日曜、祝日、年末年始を除く、月曜日から金曜日の9時から16時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
