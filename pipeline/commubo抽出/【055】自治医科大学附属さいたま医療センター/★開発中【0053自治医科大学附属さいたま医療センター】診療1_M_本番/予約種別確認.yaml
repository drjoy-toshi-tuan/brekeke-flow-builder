flow:
  最初の箱: 診察orそれ以外確認

  エンティティ定義:
    カスタム:
      - 名前: それ以外
        値:
          それ以外: [2, ２, その他, ニ, にばん, ニバン, 診察じゃない, 診察ではない, 診察以外, 診療以外, 二, 二番]
      - 名前: 肯定
        値:
          肯定: [あっています, あっている, あってます, あってる, いいです, そうです, それで, それです, はい, 大丈夫です]
      - 名前: 診察
        値:
          診察: [1, １, いち, イチ, いちばん, イチバン, いんすアップ, しんさつ, 一, 一番, 印刷, 診察, 診察の予約, 診療]
      - 名前: 診察以外
        値:
          CT: [CT検査]
          MRI: [MR, MRI検査]
          PETCT: [PET, シンチ, しんち]
          RI: [RI検査]
          アレルギー: [アレルギー検査]
          栄養指導: [栄養, 栄養相談]
          化学療法: [オンコロジー, こうがんざい, 化学, 抗がん剤, 抗ガン剤, 抗癌剤]
          眼科検査: [眼科検査2, 眼鏡, 眼鏡屋]
          検査: [けんさ, ケンサ]
          骨密度: [こつみつど]
          採血: [血液検査]
          採尿: [細胞診, 尿検査]
          手術: [オペ, 外来手術, 入院手術]
          処置: [処置室]
          心電図: []
          注射: []
          超音波: [エコー, エコー検査]
          点滴: []
          内視鏡: [胃カメラ, 下部内視鏡, 上部内視鏡, 大腸カメラ]
          入院: []
          脳波: [脳波検査]
          放射線: [レントゲン]
          薬: [処方, 処方希望, 処方箋, 薬希望]
          輸血: [ゆけつ, ユケツ]
      - 名前: 数字の１
        値:
          １: [1, いち, イチ, いちばん, イチバン, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, にばん, ニバン, 二, 二番]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, そうじゃない, そうではない, それじゃない, それではない, 違います, 違う, 違って, 間違い, 間違っています, 間違っている, 間違ってます, 別の]

  共通:
    箱一覧:
      - 箱: 診察orそれ以外確認
        セリフ: "次に、予約の種類をお伺いします。次の２つのいずれかでお話ください。\n１．診察、２．診察以外、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 診察発話
              次の箱: 診察セット
            - 判定: エンティティ含む
              入力: 診察以外発話
              次の箱: 診察以外セット
            - 判定: エンティティ含む
              入力: それ以外
              次の箱: 診察以外セット_1
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外_2
      - 箱: 診察セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認（診察・診察以外）
      - 箱: 診察以外セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 項目分岐
      - 箱: PET-CTセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認（診察・診察以外）
      - 箱: 診察以外セット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認（診察以外）
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: DTMF回答分岐
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 復唱確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 聞き取り
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ(DTMF)
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝診察
              次の箱: 診察セット_1
            - 判定: 一致
              入力: 2＝診察以外
              次の箱: 診察以外セット_2
          デフォルト: count上記以外
      - 箱: DTMF回答分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 種別分岐_1
            - 判定: 一致
              入力: 2＝否定
              次の箱: 種別分岐
          デフォルト: count再質問_3
      - 箱: 診察セット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認（診察）
      - 箱: 診察以外セット_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認（診察以外）
      - 箱: 診察以外再セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: 診察再セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: 復唱確認（診察）
        セリフ: 診察予約についての、お問い合わせ、でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 復唱確認（診察以外）
        セリフ: 診察以外についての、お問い合わせ、でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 復唱確認（診察・診察以外）
        セリフ: "<? $reservation_type ?>\nについての、お問い合わせ、でよろしいですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 復唱確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 数字の１発話
              次の箱: 種別分岐_1
            - 判定: エンティティ含む
              入力: 数字の２発話
              次の箱: 種別分岐
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 種別分岐_1
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 種別分岐_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 種別分岐_1
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 種別分岐
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 種別分岐
            - 判定: エンティティ含む
              入力: 診察発話
              次の箱: 種別再設定へ
            - 判定: エンティティ含む
              入力: 診察以外発話
              次の箱: 種別再設定へ_1
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐_1
          デフォルト: count上記以外_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。 うまく聞き取りが出来ませんでした。 \n再度、はい、そうです、や、いいえ、違います、のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。 うまく聞き取りが出来ませんでした。 \n再度お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察orそれ以外確認
      - 箱: 再度聞き取りへ(DTMF)
        セリフ: "申し訳ございません。 正しい番号が認識出来ませんでした。 \n再度、はい、は、１を、いいえ、は、２を、押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 種別再設定へ
        セリフ: 失礼しました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察セット
      - 箱: 種別再設定へ_1
        セリフ: 失礼しました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察以外セット
      - 箱: 種別分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察
              次の箱: 診察以外再セット
            - 判定: 一致
              入力: 診察以外
              次の箱: 診察再セット
      - 箱: 種別分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察
              次の箱: END_聞き取り完了
          デフォルト: 診察以外再セット
      - 箱: 項目分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: PETCT
              次の箱: PET-CTセット
          デフォルト: 復唱確認（診察・診察以外）

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
