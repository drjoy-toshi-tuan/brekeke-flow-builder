flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\nこちらは蘇生会総合病院、健康増進センター予約専用ダイヤルです。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電日時チェック
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 締めあいさつ
          デフォルト: 締めあいさつ_1
      - 箱: 問い合わせ/企業問合せ
        セリフ: お問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 新規
        セリフ: 予約の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 変更
        セリフ: 予約変更の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: キャンセル
        セリフ: "キャンセルの申し込みを受付いたしました。\n必要がある場合のみ、担当者よりご連絡させていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 締めあいさつ
        セリフ: "日曜、祝日を除く、翌営業日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。\n状況によってはご連絡が遅れる場合もありますが、出来るだけ早くご連絡いたしますのでご理解ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 締めあいさつ_1
        セリフ: "日曜、祝日を除く、翌営業日以内に担当者から折り返し電話にてご連絡いたします。\n状況によってはご連絡が遅れる場合もありますが、出来るだけ\n早くご連絡いたしますのでご理解ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 受診歴フリー
            - 判定: 一致
              入力: 変更
              次の箱: 次へ
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 問い合わせフリー
            - 判定: 一致
              入力: 企業
              次の箱: 企業名確認
      - 箱: 用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: 新規
              次の箱: 新規
            - 判定: 一致
              入力: 予約
              次の箱: 新規
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル
            - 判定: 一致
              入力: 企業
              次の箱: 問い合わせ/企業問合せ
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 問い合わせ/企業問合せ
          デフォルト: 問い合わせ/企業問合せ
      - 箱: 用件の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 次へ_1
          デフォルト: 受診内容フリー_1
      - 箱: 次へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日聞き取り
      - 箱: 次へ_1
        セリフ: "変更される内容は予約日ですか？\n「はい、そうです」や、「いいえ、違います」のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 否定肯定確認_1
      - 箱: 次へ_2
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の分岐
      - 箱: 氏名聞き取り
        セリフ: none
        説明: サブシナリオ「氏名聞き取り」を呼び出す
        参照ファイル: 氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 担当者名聞き取り
        セリフ: none
        説明: サブシナリオ「担当者名聞き取り」を呼び出す
        参照ファイル: 担当者名聞き取り.yaml
        回答振り分け:
          デフォルト: タイトル_1
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 次に、ご連絡先のお電話番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の分岐_1
      - 箱: 予約日聞き取り
        セリフ: none
        説明: サブシナリオ「予約日聞き取り」を呼び出す
        参照ファイル: 予約日聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の分岐_2
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 否定肯定確認
        セリフ: none
        説明: サブシナリオ「否定肯定確認」を呼び出す
        参照ファイル: 否定肯定確認.yaml
        回答振り分け:
          デフォルト: 氏名聞き取り
      - 箱: 否定肯定確認_1
        セリフ: none
        説明: サブシナリオ「否定肯定確認」を呼び出す
        参照ファイル: 否定肯定確認.yaml
        回答振り分け:
          デフォルト: 受診希望日フリー
      - 箱: 企業名確認
        セリフ: none
        説明: サブシナリオ「企業名確認」を呼び出す
        参照ファイル: 企業名確認.yaml
        回答振り分け:
          デフォルト: タイトル
      - 箱: 企業確認
        セリフ: はじめに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 人間ドック、健康診断、精密検査確認
      - 箱: 人間ドック、健康診断、精密検査確認
        セリフ: "今回は人間ドック、健康診断、精密検査について、でよろしいでしょうか？\n「はい、そうです」や、「いいえ、違います」のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 否定肯定確認
      - 箱: 冒頭NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表番号（電話番号取得失敗時）
      - 箱: 人間ドック、健康診断、精密検査以外のお問い合わせ
        セリフ: 申し訳ございません。人間ドック、健康診断、精密検査以外のお問い合わせは、代表番号へおかけ直し下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表番号（人間ドック・健康診断以外）
      - 箱: 代表番号（人間ドック・健康診断以外）
        セリフ: "電話番号が分かる場合は、そのままお切りください。分からない場合はご案内いたしますのでメモをご準備ください。\n電話番号は0570‐071‐101です。\n繰り返します。\n電話番号は0570‐071‐101です。\n繰り返します。\n電話番号は0570‐071‐101です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 代表番号（電話番号取得失敗時）
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。\n恐れ入りますが、日曜、祝日を除く、月曜から土曜の9時から16時に、健康増進センター予約専用ダイヤルへおかけなおしください。\n電話番号が分かる場合は、そのままお切りください。分からない場合はご案内いたしますのでメモをご準備ください。\n電話番号は0120‐621‐388です。\n繰り返します。\n電話番号は0120‐621‐388です。\n繰り返します。\n電話番号は0120‐621‐388です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 電話番号聞き取りNG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表番号（電話番号取得失敗時）
      - 箱: 受診歴フリー
        セリフ: none
        説明: サブシナリオ「受診歴フリー」を呼び出す
        参照ファイル: 受診歴フリー.yaml
        回答振り分け:
          デフォルト: 受診内容フリー
      - 箱: 受診内容フリー
        セリフ: none
        説明: サブシナリオ「受診内容フリー」を呼び出す
        参照ファイル: 受診内容フリー.yaml
        回答振り分け:
          デフォルト: 受診希望日フリー
      - 箱: 受診内容フリー_1
        セリフ: none
        説明: サブシナリオ「受診内容フリー」を呼び出す
        参照ファイル: 受診内容フリー_1.yaml
        回答振り分け:
          デフォルト: 連絡事項フリー
      - 箱: 受診希望日フリー
        セリフ: none
        説明: サブシナリオ「受診希望日フリー」を呼び出す
        参照ファイル: 受診希望日フリー.yaml
        回答振り分け:
          デフォルト: 連絡事項フリー
      - 箱: 連絡事項フリー
        セリフ: none
        説明: サブシナリオ「連絡事項フリー」を呼び出す
        参照ファイル: 連絡事項フリー.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 問い合わせフリー
        セリフ: none
        説明: サブシナリオ「問い合わせフリー」を呼び出す
        参照ファイル: 問い合わせフリー.yaml
        回答振り分け:
          デフォルト: 問い合わせ確認
      - 箱: 変更内容フリー
        セリフ: none
        説明: サブシナリオ「変更内容フリー」を呼び出す
        参照ファイル: 変更内容フリー.yaml
        回答振り分け:
          デフォルト: 連絡事項フリー
      - 箱: 企業問合せ内容
        セリフ: none
        説明: サブシナリオ「企業問合せ内容」を呼び出す
        参照ファイル: 企業問合せ内容.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: タイトル
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当者名聞き取り
      - 箱: タイトル_1
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業問合せ内容
      - 箱: 入電日時チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間判断
      - 箱: 問い合わせ確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 連絡事項フリー
          デフォルト: 完了フラグ
      - 箱: 時間判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/30日前
              次の箱: 企業確認
            - 判定: lessEqual
              入力: 12/31～1/4
              次の箱: 年末年始アナウンス
          デフォルト: 企業確認
      - 箱: 年末年始アナウンス
        セリフ: 12月31日より1月4日まで当センターは、休診となっております。折り返しのご連絡は1月5日月曜日より、始めさせていただきます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業確認
      - 箱: 年始年始
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
