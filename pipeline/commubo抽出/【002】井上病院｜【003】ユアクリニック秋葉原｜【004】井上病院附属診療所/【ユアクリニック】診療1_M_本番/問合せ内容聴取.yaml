flow:
  最初の箱: 問合せ内容確認

  エンティティ定義:
    カスタム:
      - 名前: 続き
        値:
          続き: [前回]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]

  共通:
    箱一覧:
      - 箱: 問合せ内容確認
        セリフ: 本日のお問合せ内容をお話ください。それではどうぞ。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_戻る：聞取りできず
          デフォルト: 再度聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_戻る
          デフォルト: count上記以外
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再度聴き取り
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 問合せ内容確認

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る：聞取りできず
        セリフ: うまく聞き取りができなかったため、後ほど担当者にて確認をいたします。
        入力待ち: なし
