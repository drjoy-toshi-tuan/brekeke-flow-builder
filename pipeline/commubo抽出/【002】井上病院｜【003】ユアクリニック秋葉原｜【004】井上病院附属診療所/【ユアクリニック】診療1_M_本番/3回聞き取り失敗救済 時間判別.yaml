flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: （平日）時間の分岐
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時以降
              次の箱: 院内転送コメント
            - 判定: 数値
              入力: 19時まで 院内代表へ転送
              次の箱: 院内転送コメント
      - 箱: 院内転送コメント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_院内転送

  終了:
    箱一覧:
      - 箱: END_院内転送
        セリフ: none
        入力待ち: なし
