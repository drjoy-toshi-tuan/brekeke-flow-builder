flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 木曜日（8月中）、祝日の分岐（パターンC）
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 月曜日
              次の箱: 平日の時間分岐（パータンA）
            - 判定: 一致
              入力: 火曜日
              次の箱: 平日の時間分岐（パータンA）
            - 判定: 一致
              入力: 水曜日
              次の箱: 平日の時間分岐（パータンA）
            - 判定: 一致
              入力: 木曜日
              次の箱: 平日の時間分岐（パータンA）
            - 判定: 一致
              入力: 金曜日
              次の箱: 平日の時間分岐（パータンA）
            - 判定: 一致
              入力: 土曜日
              次の箱: 土曜日の分岐（パターンB）
          デフォルト: AI※時間外転送コメントあり
      - 箱: 平日の時間分岐（パータンA）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30前
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 11時まで
              次の箱: END_代表電話転送
            - 判定: 数値
              入力: 15時まで（6/6修正）
              次の箱: END_AI電話
            - 判定: 数値
              入力: 17時まで　（10/10修正）
              次の箱: END_代表電話転送
            - 判定: 数値
              入力: 19時まで
              次の箱: END_AI電話
          デフォルト: AI※時間外転送コメントあり
      - 箱: 土曜日の分岐（パターンB）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30前
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 11時まで
              次の箱: END_AI電話
            - 判定: 数値
              入力: 16時まで
              次の箱: END_代表電話転送
          デフォルト: AI※時間外転送コメントあり
      - 箱: 木曜日（8月中）、祝日の分岐（パターンC）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30前
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 11時まで
              次の箱: END_AI電話
            - 判定: 数値
              入力: 13時まで
              次の箱: END_代表電話転送
          デフォルト: AI※時間外転送コメントあり
      - 箱: 平日の時間分岐（パータンA）_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30前
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 11時まで
              次の箱: END_代表電話転送
            - 判定: 数値
              入力: 13時まで
              次の箱: END_AI電話
          デフォルト: END_（12/17-18）13時半-14時のAI ※臨時休診
      - 箱: 平日の時間分岐（パータンA）_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: "14:30前"
              次の箱: END_（12/17-18）13時半-14時のAI ※臨時休診
            - 判定: 数値
              入力: 15時まで
              次の箱: END_AI電話
            - 判定: 数値
              入力: 17時まで
              次の箱: END_代表電話転送
            - 判定: 数値
              入力: 19時
              次の箱: END_AI電話
          デフォルト: AI※時間外転送コメントあり
      - 箱: AI※時間外転送コメントあり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_AI ※時間外アナ有
      - 箱: 特別日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 12//17
              次の箱: 平日の時間分岐（パータンA）_1
            - 判定: 一致
              入力: 12/18
              次の箱: 平日の時間分岐（パータンA）_2
          デフォルト: 曜日の分岐

  終了:
    箱一覧:
      - 箱: END_代表電話転送
        セリフ: none
        入力待ち: なし
      - 箱: END_AI ※時間外アナ有
        セリフ: none
        入力待ち: なし
      - 箱: END_AI電話
        セリフ: none
        入力待ち: なし
      - 箱: END_（12/17-18）13時半-14時のAI ※臨時休診
        セリフ: none
        入力待ち: なし
