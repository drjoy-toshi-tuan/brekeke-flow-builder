flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始チェック
      - 箱: 年末年始チェック
        セリフ: none
        説明: サブシナリオ「年末年始チェック」を呼び出す
        回答振り分け:
          デフォルト: 1/2診療
      - 箱: （土曜・祝日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 7時前
              次の箱: END_即代表転送
            - 判定: 数値
              入力: 9時まで
              次の箱: END_AI ※時間外アナ有
            - 判定: 数値
              入力: 12時まで
              次の箱: END_即代表転送
            - 判定: 数値
              入力: 13時まで
              次の箱: END_受付時間内（AI電話対応）
          デフォルト: END_即代表転送
      - 箱: 1/2診療
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 20250102
              次の箱: （土曜・祝日）時間の分岐
          デフォルト: END_即代表転送
      - 箱: 12/28の13:30以降と1/4の9時前
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: "12/28の13:30以降"
              次の箱: END_即代表転送
            - 判定: 数値以上
              入力: "12/28の13:30以降"
              次の箱: END_即代表転送
            - 判定: 一致
              入力: 1/4　9時前
              次の箱: END_即代表転送
            - 判定: 数値
              入力: 1/4　9時前
              次の箱: END_即代表転送
          デフォルト: END_年末年始以外

  終了:
    箱一覧:
      - 箱: END_受付時間内（AI電話対応）
        セリフ: none
        入力待ち: なし
      - 箱: END_AI ※時間外アナ有
        セリフ: none
        入力待ち: なし
      - 箱: END_即代表転送
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始以外
        セリフ: none
        入力待ち: なし
