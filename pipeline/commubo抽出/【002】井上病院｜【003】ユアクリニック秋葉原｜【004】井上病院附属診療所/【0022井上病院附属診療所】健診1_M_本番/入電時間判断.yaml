flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付分岐_1
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 月～土
              次の箱: 平日
          デフォルト: END_時間外
      - 箱: 平日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: END_時間外
            - 判定: 数値
              入力: 16時まで
              次の箱: END_時間内
          デフォルト: END_時間外
      - 箱: 平日_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: END_時間外
            - 判定: 数値
              入力: 16時まで
              次の箱: END_時間内
            - 判定: 数値
              入力: 16時～17時
              次の箱: END_時間外
          デフォルト: 年末年始アナウンス（時間内）
      - 箱: 平日_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: 年末年始アナウンス（時間内）
            - 判定: 数値
              入力: 16時まで
              次の箱: END_時間内
          デフォルト: END_時間外
      - 箱: 日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/25まで
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 12/26
              次の箱: 平日_1
            - 判定: lessEqual
              入力: 1/4まで
              次の箱: 年末年始アナウンス（時間内）
            - 判定: 一致
              入力: 1/5
              次の箱: 平日_2
          デフォルト: 曜日の分岐
      - 箱: 日付分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/29まで
              次の箱: END_時間外
            - 判定: lessEqual
              入力: 1/3まで
              次の箱: 年末年始アナウンス（時間内）_1
          デフォルト: END_時間外
      - 箱: 年末年始アナウンス（時間内）
        セリフ: 12/28から1/4までは年末年始のため、お問い合わせ内容の受付はいたしますが、翌営業日の1月5日より、順次折り返しのご連絡をさせていただきます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始
      - 箱: 年末年始アナウンス（時間内）_1
        セリフ: 12/28から1/4までは年末年始のため、お問い合わせ内容の受付はいたしますが、翌営業日の1月5日より、順次折り返しのご連絡をさせていただきます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始
      - 箱: テスト用ノード
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
