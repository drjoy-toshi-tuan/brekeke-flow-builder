flow:
  最初の箱: 用件の確認：個人

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [はーい, よろしい, 異常部, 丈夫, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない, まちがえた]
      - 名前: 用件
        値:
          キャンセル: [やめる, ラベル, 取り消し, 取り消す, 取消, 大丈夫, 予約のキャンセル]
          新規: [とる, 健康診断, 健康診断, 健診, 健診の予約, 健診予約, 検査, 検査の予約, 検診, 検針, 雇い入れ, 事業主, 就職, 進学, 人間ドック, 生活習慣病, 千四百, 全身, 特定健診, 返信, 予約を取る, 要約]
          変更: [延期, 時間, 取り直したい, 取り直す, 日程, 日付, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更, 予約の変更]
          問い合わせ: [アクセス, そうなった, そうなんか, そうなんだ, ソノダ, その他, その盤, どなた, なくした, 教えて, 金額, 検査結果, 七番, 質問, 調べて, 聞きたい, 忘れた, 問い合わす, 料金]

  共通:
    箱一覧:
      - 箱: 用件の確認：個人
        セリフ: "それではご用件を、次の4つのうちの、いずれかでダイヤルプッシュしてください。\n「1、健診予約」\n「２，予約変更」\n「３，予約キャンセル」\n 「４，その他」、 それでは押してください"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 2回目聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。正しい入力が確認できませんでした。。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認：個人
      - 箱: 用件の復唱（健康診断）
        セリフ: 健診予約、ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（キャンセル）
        セリフ: ご予約のキャンセル、ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（変更）
        セリフ: ご予約の変更、ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（問い合わせ）
        セリフ: その他お問い合わせ、ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 2回目聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件取得できず
      - 箱: DTMF
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １
              次の箱: 用件の復唱（健康診断）
            - 判定: 一致
              入力: ２
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: ３
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: ４
              次の箱: 用件の復唱（問い合わせ）
          デフォルト: 再度聞き取りへ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
