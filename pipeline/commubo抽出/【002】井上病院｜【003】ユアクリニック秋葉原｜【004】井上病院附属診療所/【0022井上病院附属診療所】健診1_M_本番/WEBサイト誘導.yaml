flow:
  最初の箱: 案内

  エンティティ定義:
    カスタム:
      - 名前: 肯定単語
        値:
          はい: [OK, あっています, あってます, あってる, いいです, いいよ, イエス, そうです, 違いありません, 違いない, 合っています, 合ってます, 大丈夫, 問題ありません, 問題ない]
      - 名前: 持ってない
        値:
          持ってない: [いない, いませーん, いません, ない, もってない, もてない, 以てない, 持っていません, 持ってませーん, 持ってません, 盛ってない]
      - 名前: 電話番号
        値:
          IP電話番号: []
          携帯電話番号: []
          電話番号: []
      - 名前: 否定単語
        値:
          違います: [いえ, ダメ, ダメ, ノー, 違い, 違う, 違って, 駄目]
      - 名前: 別の
        値:
          別の: [違う, 携帯, 他の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 携帯無し
        セリフ: WEBでの申し込みをご希望の方は、このまま電話を切って、インターネットで「井上病院健診センター」でお調べいただき、お申し込みください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_WEB申し込み無し。
      - 箱: 番号確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: かしこまりました。
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 入電携帯番号でOK
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 入電携帯番号でOK
          デフォルト: count上記以外
      - 箱: 携帯番号
        セリフ: おかけいただいている電話に、WEB予約ページを案内することができますが、ご希望されますか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号確認
      - 箱: 電話番号区切り
        セリフ: none
        説明: サブシナリオ「電話番号区切り」を呼び出す
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 電話種別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 入電携帯番号でOK
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_WEBサイト送信
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 携帯番号
          デフォルト: 携帯無し
      - 箱: 入電番号取得確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得
              次の箱: 携帯無し
          デフォルト: 電話種別
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ
          デフォルト: 番号確認
      - 箱: 再度聞き取りへ
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。このままお電話での申し込みを進めさせていただきます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_WEB申し込み無し。
      - 箱: 案内
        セリフ: 予約に関しては、WEBでも受付を行っております。
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号区切り
      - 箱: かしこまりました。
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_WEB申し込み無し。

  終了:
    箱一覧:
      - 箱: END_WEB申し込み無し。
        セリフ: none
        入力待ち: なし
      - 箱: END_WEBサイト送信
        セリフ: none
        入力待ち: なし
