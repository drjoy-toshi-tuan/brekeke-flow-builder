flow:
  最初の箱: 健診種類の確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 種類
        値:
          その他の健診: [MRI, じんぱい, その下, その他, その他の検診, その他の検針, プレミアレディース, 胃カメラ, 鉛, 学校から, 学生健診, 検針, 個人, 石綿, 大学, 電離, 頭, 特殊健診, 有機, 有機溶剤]
          協会けんぽ: [けんぼ, けんぽ, 協会, 健保, 償還, 障害健保, 了解健保]
          人間ドック: [CTコース, しーちーコース, 人間ドック, 人間ドック, 二年ロック, 半日コース]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]

  共通:
    箱一覧:
      - 箱: 健診種類の確認へ
        セリフ: "予約内容を、次の3つのうちの、いずれかでダイヤルプッシュしてください。\n 「1、人間ドック」\n 「２、協会けんぽ」\n 「３，その他の健診」、 それでは押してください"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMFのセット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。正しい入力が確認できませんでした。。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診種類の確認へ
      - 箱: DTMFのセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 用件の復唱（住民）
            - 判定: 一致
              入力: 2
              次の箱: 用件の復唱（協会けんぽ）
            - 判定: 一致
              入力: 3
              次の箱: 用件の復唱（その他）
          デフォルト: 再度聞き取りへ
      - 箱: 用件の復唱（その他）
        セリフ: その他の健診、ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（協会けんぽ）
        セリフ: 「協会けんぽ」ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（住民）
        セリフ: 「人間ドック」ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_種類聞き取れず

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_種類聞き取れず
        セリフ: none
        入力待ち: なし
