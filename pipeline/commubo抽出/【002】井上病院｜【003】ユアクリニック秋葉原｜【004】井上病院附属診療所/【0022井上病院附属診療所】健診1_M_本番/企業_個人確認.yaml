flow:
  最初の箱: 企業か患者聞き取り

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [あってます, そうそう, そうです, はーい, 配送です]
      - 名前: 否定
        値:
          いいえ: [そうじゃない, ちがう, ちゃうちゃう, まちがった]

  共通:
    箱一覧:
      - 箱: 企業か患者聞き取り
        セリフ: "お電話をいただいている方についてお伺いします。\n企業のご担当者の方は1を、個人の方は2をダイヤルプッシュで入力してください"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: タイトル
          デフォルト: 上記以外ON
      - 箱: 企業の問い合わせ
        セリフ: 企業のご担当者さまですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_完了
      - 箱: 患者
        セリフ: 個人予約の方ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_完了
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回質問済み
              次の箱: ３回聞き取れず
          デフォルト: 再質問
      - 箱: 上記以外ON
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再質問の有無
      - 箱: 再質問
        セリフ: "正しい番号が確認できませんでした。\n恐れ入りますが、再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業か患者聞き取り
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_問合せ種類聞き取れず
      - 箱: タイトル
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 企業の問い合わせ
            - 判定: 一致
              入力: 2
              次の箱: 患者
          デフォルト: 再質問

  終了:
    箱一覧:
      - 箱: END_完了
        セリフ: none
        入力待ち: なし
      - 箱: END_問合せ種類聞き取れず
        セリフ: none
        入力待ち: なし
