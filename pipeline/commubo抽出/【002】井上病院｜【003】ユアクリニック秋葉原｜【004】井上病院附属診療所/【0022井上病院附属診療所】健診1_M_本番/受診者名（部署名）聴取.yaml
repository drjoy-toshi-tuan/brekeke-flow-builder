flow:
  最初の箱: 種類分岐

  共通:
    箱一覧:
      - 箱: 名前の聴取へ
        セリフ: ご担当者様のお名前をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り_1
      - 箱: 名前の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 人名
              次の箱: 名前セット
          デフォルト: 聴取内容チェック
      - 箱: 名前の聴き取り_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 人名
              次の箱: 名前セット_1
          デフォルト: 聴取内容チェック_1
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋氏名なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 無言9（5秒）＋氏名なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
          デフォルト: 無言on
      - 箱: 名前セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 聴取内容チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア_1
            - 判定: 数値以上
              入力: 無言9（5秒）＋部署名担当名なし
              次の箱: 再質問の有無_1
            - 判定: 一致
              入力: 無言9（5秒）＋部署名担当名なし
              次の箱: 再質問の有無_1
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋部署名担当名あり
              次の箱: 聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋部署名担当名あり
              次の箱: 聞き取り完了
          デフォルト: 上記以外on
      - 箱: 名前セット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り_1
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 再度質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件で分岐
      - 箱: 無言クリア_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り_1
      - 箱: 再度質問_1
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴取へ
      - 箱: 聞き取り完了
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 種類分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 企業の健診
              次の箱: 部署名担当名聞取りへ
            - 判定: 一致
              入力: 個人受診
              次の箱: 用件で分岐
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_氏名聞き取れず
          デフォルト: 再度質問
      - 箱: 再質問の有無_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_氏名聞き取れず
          デフォルト: 再度質問_1
      - 箱: 部署名担当名聞取りへ
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴取へ
      - 箱: 氏名聞き取り
        セリフ: お名前をフルネームでお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 氏名聞き取り_1
        セリフ: では、お電話されている方の、お名前をフルネームでお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り_1
      - 箱: 用件で分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 氏名聞き取り_1
          デフォルト: 氏名聞き取り

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_氏名聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_
        セリフ: none
        入力待ち: なし
