flow:
  最初の箱: 用件の分岐

  共通:
    箱一覧:
      - 箱: 詳細聴取
        セリフ: 検査内容や受診時期など、ご希望の内容を簡単にお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: すべて聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_詳細内容聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_詳細内容聞き取り完了
          デフォルト: 上記以外ON
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回質問済み
              次の箱: ３回聞き取れず
          デフォルト: 再質問
      - 箱: 上記以外ON
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の分岐
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 種類分岐
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 種類分岐_1
          デフォルト: END_詳細内容聞き取り完了
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_詳細内容聞き取れず
      - 箱: 種類分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 企業の健診
              次の箱: 詳細聴取
            - 判定: 一致
              入力: 患者の健診
              次の箱: END_詳細内容聞き取り完了
      - 箱: 種類分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 企業の健診
              次の箱: 企業：問い合わせ聴取
            - 判定: 一致
              入力: 患者の健診
              次の箱: 個人受診：お問い合わせ
      - 箱: 個人受診：お問い合わせ
        セリフ: お問合せ内容をお話ください
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 企業：問い合わせ聴取
        セリフ: その他お問い合わせの内容をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り

  終了:
    箱一覧:
      - 箱: END_詳細内容聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_詳細内容聞き取れず
        セリフ: none
        入力待ち: なし
