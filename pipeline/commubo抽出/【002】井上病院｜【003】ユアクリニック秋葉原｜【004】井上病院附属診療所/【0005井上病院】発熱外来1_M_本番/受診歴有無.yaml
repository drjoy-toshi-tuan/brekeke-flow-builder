flow:
  最初の箱: 高校生判別

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [まって, もいちど, もういっかい, もう一_回, もう一度, もーいちど, もっかい, わんもあ]
      - 名前: 肯定
        値:
          はい: [あってます, あってる, そうそう, そうです, その通りです, はーい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 否定
        値:
          いいえ: [いーえ, いえ, いや, そうじゃない, ちがう, まちがった]

  共通:
    箱一覧:
      - 箱: 高校生判別
        セリフ: "本窓口は、高校生未満の場合、ご予約を承ることができません。\n診察を希望される方が高校生未満の場合はお電話をお切りください。\nもう一度お聞きしたい方は、「もう一度」とお話ください。"
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一回
          デフォルト: 本人確認の聞き取り
      - 箱: 本人確認の聞き取り
        セリフ: 診察を受けるご本人様からのお電話ですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件判断
      - 箱: 用件判断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 当院受診確認
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 当院受診確認
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 当院受診確認
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 当院受診確認
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 当院受診確認
          デフォルト: count上記以外
      - 箱: 用件判断_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る_1
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_戻る_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る_1
          デフォルト: count上記以外_1
      - 箱: 当院受診確認
        セリフ: 当院のご受診は、初めてですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件判断_1
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: 再質問
          デフォルト: 用件判断
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: 再質問_1
          デフォルト: 用件判断_1
      - 箱: 再質問
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、や、「いいえ」、のような短い単語だけでは認識が難しいため、\n「はいそうです」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 本人確認の聞き取り
      - 箱: 再質問_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、や、「いいえ」、のような短い単語だけでは認識が難しいため、\n「はいそうです」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 当院受診確認
      - 箱: もう一回
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 高校生判別

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: それでは、
        入力待ち: なし
      - 箱: END_戻る_1
        セリフ: none
        入力待ち: なし
