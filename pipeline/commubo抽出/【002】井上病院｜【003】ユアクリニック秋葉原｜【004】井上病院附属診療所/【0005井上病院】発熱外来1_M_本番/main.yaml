flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: Confirm
        値:
          いいえ: [違います]
          はい: [そうです]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n井上病院の発熱外来、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 終話
        セリフ: "ご予約の申し込みを受付ました。予約についてのご連絡を、ショートメッセージ、またはお電話にてご連絡いたします。\nそれでは、失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 診察券無し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ
      - 箱: 診察券有り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電時間判断へ
      - 箱: 電話切断へ
        セリフ: "本日の受付時間は終了いたしました。\n受付時間は、平日10:00～12:00となります。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: BOOKING_AI
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 入電時間判断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: GET_EMPTY_FRAME
      - 箱: 連絡先聴取へ
        セリフ: ありがとうございます。最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聞取り
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 患者氏名聞き取れず チェックポイント
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 生年月日聞き取れず チェックポイント
      - 箱: 代表へ案内
        セリフ: お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、代表電話へご連絡下さい
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 生年月日聞き取れず チェックポイント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表へ案内
      - 箱: 診察券番号聞き取れず チェックポイント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表へ案内
      - 箱: 患者氏名聞き取れず チェックポイント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表へ案内
      - 箱: 連絡先番号聞き取れず チェックポイント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表へ案内
      - 箱: 連絡先聞取り
        セリフ: none
        説明: サブシナリオ「連絡先聞取り」を呼び出す
        参照ファイル: 連絡先聞取り.yaml
        回答振り分け:
          デフォルト: チェックポイント 連絡先無し
      - 箱: チェックポイント 連絡先無し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表へ案内
      - 箱: 入電時間判別
        セリフ: none
        説明: サブシナリオ「入電時間判別」を呼び出す
        参照ファイル: 入電時間判別.yaml
        回答振り分け:
          デフォルト: GET_EMPTY_FRAME
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 診察券番号聞き取れず チェックポイント
      - 箱: GET_EMPTY_FRAME
        セリフ: none
        説明: サブシナリオ「GET_EMPTY_FRAME」を呼び出す
        回答振り分け:
          デフォルト: CHECK_EMPTY_FRAME
      - 箱: BOOKING_AI
        セリフ: none
        説明: サブシナリオ「BOOKING_AI」を呼び出す
        回答振り分け:
          デフォルト: 終話
      - 箱: CHECK_EMPTY_FRAME
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: HAS_EMPTY_FRAME
              次の箱: 注意事項
          デフォルト: NOT_EMPTY_FRAME
      - 箱: System overload
        セリフ: 予約を承ることができませんでした。恐れ入りますが再度電話を掛けなおしていただき、最初から予約手続きを行ってください
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: NOT_EMPTY_FRAME
        セリフ: "申し訳ございません。\n本日の予約受付枠は、終了いたしました。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 注意事項
        セリフ: このお電話は、途中で電話を切ると予約確定できませんのでご注意ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診歴有無
      - 箱: 受診歴有無
        セリフ: none
        説明: サブシナリオ「受診歴有無」を呼び出す
        参照ファイル: 受診歴有無.yaml
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 次に
        セリフ: 次に
        入力待ち: なし
        回答振り分け:
          デフォルト: 性別確認
      - 箱: 性別確認
        セリフ: none
        説明: サブシナリオ「性別確認」を呼び出す
        参照ファイル: 性別確認.yaml
        回答振り分け:
          デフォルト: 連絡先聴取へ

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
