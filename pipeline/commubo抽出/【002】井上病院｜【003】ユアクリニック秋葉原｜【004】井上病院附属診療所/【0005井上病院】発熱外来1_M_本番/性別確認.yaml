flow:
  最初の箱: 性別の聞き取り

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [まって, もいちど, もういっかい, もう一_回, もう一度, もーいちど, もっかい, わんもあ]
      - 名前: 肯定
        値:
          はい: [あってます, あってる, そうそう, そうです, その通りです, はーい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 性別
        値:
          女性: [おんな, オンナ, ジョセイ, じょせい, メス, 助成, 女, 女性]
          男性: [オス, おとこ, オトコ, だんせい, ダンセイ, 弾性, 男, 男性]

  共通:
    箱一覧:
      - 箱: 性別の聞き取り
        セリフ: "性別をお伺いいたします。\n男性、もしくは女性でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件判断
      - 箱: 用件判断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 性別
              次の箱: 性別セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: 再質問
          デフォルト: 用件判断
      - 箱: 再質問
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 性別の聞き取り
      - 箱: 性別セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
