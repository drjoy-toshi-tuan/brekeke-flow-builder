flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n井上病院の、予約専用AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電時間判断へ
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: ID聞き取り
      - 箱: 次へ_1
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聴取
      - 箱: 受付完了連絡
        セリフ: "お問い合わせを受け付けました。\n後ほど担当者からショートメール、もしくは折り返し電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 受付完了連絡：WEB
        セリフ: "受付はまだ完了しておりませんので、お電話終了後にショートメールで\n\n入力用URLをお送りいたしますので依頼内容を入力していただき、申し込みを完了させてください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 電話切断へ
        セリフ: "申し訳ございません。ただいまの時間は受付時間外となっております。\n受付時間は、祝日を除く、月曜日から金曜日、朝8時30分から16時までです。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 入電時間判断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: テスト用
      - 箱: 入電日時間判断
        セリフ: none
        説明: サブシナリオ「入電日時間判断」を呼び出す
        参照ファイル: 入電日時間判断.yaml
        回答振り分け:
          デフォルト: 経路判断
      - 箱: 経路判断
        セリフ: none
        説明: サブシナリオ「経路判断」を呼び出す
        参照ファイル: 経路判断.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: 連絡先聴取へ
        セリフ: 最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: ID聞き取り
        セリフ: none
        説明: サブシナリオ「ID聞き取り」を呼び出す
        参照ファイル: ID聞き取り.yaml
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 患者氏名チェックポイント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内
      - 箱: 連絡先チェックポイント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内
      - 箱: 内容NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内
      - 箱: IDチェックポイント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内
      - 箱: 問い合わせ内容聴取へ
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 問い合わせ内容聴取
      - 箱: 問い合わせ内容聴取
        セリフ: none
        説明: サブシナリオ「問い合わせ内容聴取」を呼び出す
        参照ファイル: 問い合わせ内容聴取.yaml
        回答振り分け:
          デフォルト: 連絡先聴取へ
      - 箱: 代表案内
        セリフ: "予約制ではないので、基本的に当日受診が可能です。\n診療時間や休診情報等に関しては代表番号にてご確認ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 連絡先聴取
        セリフ: none
        説明: サブシナリオ「連絡先聴取」を呼び出す
        参照ファイル: 連絡先聴取.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 生年月日聴取
        セリフ: none
        説明: サブシナリオ「生年月日聴取」を呼び出す
        参照ファイル: 生年月日聴取.yaml
        回答振り分け:
          デフォルト: 分岐_1
      - 箱: 分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 電話
              次の箱: 受付完了連絡
            - 判定: 一致
              入力: WEB
              次の箱: 受付完了連絡：WEB
      - 箱: 分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 電話
              次の箱: 問い合わせ内容聴取へ
            - 判定: 一致
              入力: WEB
              次の箱: 連絡先聴取へ
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 渡部
              次の箱: 経路判断
            - 判定: 一致
              入力: 千葉
              次の箱: 経路判断
          デフォルト: 入電日時間判断

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_受付時間説明
        セリフ: "代表電話の受付時間は、年末年始及び祝日を除く月曜から金曜の、朝9時から17時までです。\n整形外科と眼科は、受付時間が一部異なり月曜から金曜の朝9時30分から12時30分となります。\n代表の電話番号が分かる場合は、そのままお電話をお切りください。\n分からない場合はご案内いたしますのでメモをご準備ください。"
        入力待ち: なし
