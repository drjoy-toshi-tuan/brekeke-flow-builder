flow:
  最初の箱: 案内

  エンティティ定義:
    カスタム:
      - 名前: 肯定単語
        値:
          はい: [OK, あっています, あってます, あってる, いいです, いいよ, イエス, そうです, 違いありません, 違いない, 合っています, 合ってます, 大丈夫, 問題ありません, 問題ない]
      - 名前: 持ってない
        値:
          持ってない: [いない, いませーん, いません, ない, もってない, もてない, 以てない, 持っていません, 持ってませーん, 持ってません, 盛ってない]
      - 名前: 電話番号
        値:
          IP電話番号: []
          携帯電話番号: []
          電話番号: []
      - 名前: 否定単語
        値:
          違います: [いえ, いや, ダメ, ダメ, ノー, 違い, 違う, 違って, 駄目]
      - 名前: 別の
        値:
          別の: [違う, 携帯, 他の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 電話
            - 判定: エンティティ含む
              入力: 否定：任意
              次の箱: 電話
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: WEB
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: WEB
            - 判定: エンティティ含む
              入力: 肯定：任意
              次の箱: WEB
          デフォルト: count上記以外
      - 箱: ヒアリング
        セリフ: WEB受付をご希望の場合は『はい』、固定電話や、このまま電話での受付をご希望の場合は『いいえ』とお答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認
      - 箱: WEB
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_WEBサイト送信
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 確認
      - 箱: 再度聞き取りへ
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認
      - 箱: 案内
        セリフ: 予約方法についてお伺いします。ショートメールを受信できる携帯電話をお持ちの方は、WEB受付が可能です。
        入力待ち: なし
        回答振り分け:
          デフォルト: ヒアリング
      - 箱: 電話
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_WEB申し込み無し。
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回
              次の箱: END_WEB申し込み無し。
          デフォルト: 再度聞き取りへ

  終了:
    箱一覧:
      - 箱: END_WEB申し込み無し。
        セリフ: none
        入力待ち: なし
      - 箱: END_WEBサイト送信
        セリフ: none
        入力待ち: なし
