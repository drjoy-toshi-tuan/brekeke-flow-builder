flow:
  最初の箱: 内容聴取

  共通:
    箱一覧:
      - 箱: すべて聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（18秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（18秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約4秒）＋ご用件あり
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 上記以外2（約4秒）＋ご用件あり
              次の箱: END_戻る
          デフォルト: 上記以外ON
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回質問済み
              次の箱: 3回聞き取れず
          デフォルト: 再質問
      - 箱: 上記以外ON
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 再質問
        セリフ: "うまく聞き取ることができませんでした。\n恐れ入りますが、再度、お問い合わせ内容をお話下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 内容聴取
        セリフ: お問い合わせ内容をお伺いします。”8月1日の内科予約を8月8日以降に変更してほしい”、など、具体的にお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
