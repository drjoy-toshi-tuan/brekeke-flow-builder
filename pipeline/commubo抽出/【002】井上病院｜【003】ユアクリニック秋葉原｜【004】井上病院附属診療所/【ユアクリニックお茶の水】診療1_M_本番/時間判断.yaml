flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付判断2026年GW
      - 箱: 曜日の分岐（通常）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 月曜日
              次の箱: 平日の時間分岐
            - 判定: 一致
              入力: 火曜日
              次の箱: 平日の時間分岐
            - 判定: 一致
              入力: 水曜日
              次の箱: 平日の時間分岐
            - 判定: 一致
              入力: 木曜日
              次の箱: 平日の時間分岐
            - 判定: 一致
              入力: 金曜日
              次の箱: 平日の時間分岐
            - 判定: 一致
              入力: 土曜日
              次の箱: 土曜日の分岐
          デフォルト: AI※時間外転送コメントあり
      - 箱: 平日の時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30まで(時間外対応)
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 11時まで(代表転送)
              次の箱: END_代表電話転送
            - 判定: 数値
              入力: 15時まで（AI電話）
              次の箱: END_AI電話（時間内）
            - 判定: 数値
              入力: 17時まで(代表転送)
              次の箱: END_代表電話転送
            - 判定: 数値
              入力: 19時まで（AI電話）
              次の箱: END_AI電話（時間内）
          デフォルト: AI※時間外転送コメントあり
      - 箱: 土曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30まで(時間外対応)
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 11時まで（AI電話）
              次の箱: END_AI電話（時間内）
            - 判定: 数値
              入力: "13:30まで(代表転送)"
              次の箱: END_代表電話転送
            - 判定: 数値
              入力: 15時まで（AI電話）
              次の箱: END_AI電話（時間内）
            - 判定: 数値
              入力: 17時まで(代表転送)
              次の箱: END_代表電話転送
          デフォルト: AI※時間外転送コメントあり
      - 箱: 8:30～16時、16時～翌8:30
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30まで(時間外対応)
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 16時まで(代表転送)
              次の箱: END_代表電話転送
          デフォルト: AI※時間外転送コメントあり
      - 箱: 8:30～13時、13時～翌8:30
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30まで(時間外転送)
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 13時まで(代表転送)
              次の箱: END_代表電話転送
          デフォルト: AI※時間外転送コメントあり
      - 箱: 8:30～13時、13時～翌8:30_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30まで(時間外対応)
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 13時まで(代表転送)
              次の箱: END_代表電話転送
          デフォルト: AI※時間外転送コメントあり
      - 箱: 祝日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8：30まで(時間外対応)
              次の箱: AI※時間外転送コメントあり
            - 判定: 数値
              入力: 11時まで（AI電話）
              次の箱: END_AI電話（時間内）
            - 判定: 数値
              入力: 13時まで(代表転送)
              次の箱: END_代表電話転送
          デフォルト: AI※時間外転送コメントあり
      - 箱: AI※時間外転送コメントあり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_AI ※時間外アナ有
      - 箱: 特別日2026年GW
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 4/30より前
              次の箱: 曜日の分岐（通常）
            - 判定: 一致
              入力: 4/30(木)
              次の箱: 8:30～13時、13時～翌8:30
            - 判定: 一致
              入力: 5/1
              次の箱: 曜日の分岐（通常）
            - 判定: 一致
              入力: 5/2
              次の箱: 曜日の分岐（通常）
          デフォルト: 曜日の分岐（通常）
      - 箱: 日付判断2026年GW
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 4/29より前
              次の箱: 祝日の分岐
            - 判定: 一致
              入力: 4/29（水）
              次の箱: 8:30～16時、16時～翌8:30
            - 判定: 一致
              入力: 5/3（日）
              次の箱: AI※時間外転送コメントあり
            - 判定: 一致
              入力: 5/4（月）
              次の箱: 8:30～13時、13時～翌8:30_1
            - 判定: 一致
              入力: 5/5（火）
              次の箱: 8:30～16時、16時～翌8:30
            - 判定: 一致
              入力: 5/6（水）
              次の箱: 8:30～13時、13時～翌8:30_1
          デフォルト: 祝日の分岐

  終了:
    箱一覧:
      - 箱: END_テスト用　4/28
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用 4/29
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用 4/30
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用　5/1
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用　5/2
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用　5/3
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用　5/4
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用　5/5
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用　5/6
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用　5/7
        セリフ: none
        入力待ち: なし
      - 箱: END_代表電話転送
        セリフ: none
        入力待ち: なし
      - 箱: END_AI ※時間外アナ有
        セリフ: none
        入力待ち: なし
      - 箱: END_AI電話（時間内）
        セリフ: none
        入力待ち: なし
