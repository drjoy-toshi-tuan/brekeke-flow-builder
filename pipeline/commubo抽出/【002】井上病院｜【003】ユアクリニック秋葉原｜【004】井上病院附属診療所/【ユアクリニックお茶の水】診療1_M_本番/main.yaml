flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 月日
        値:
          月日: []
      - 名前: 新規予約
        値:
          新規予約: [取りたい, 取得, 初診, 紹介状, 診察の予約, 診療予約]
      - 名前: 診療科
        値:
          小児科: []
          内科: []
      - 名前: 定期受診
        値:
          定期受診: [受診予約, 循環器, 定期]
      - 名前: 日にちのみ
        値:
          日にちのみ: []
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]
      - 名前: 予約キャンセル
        値:
          予約キャンセル: [キャンセル, やめる, 取消]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]
      - 名前: 予約確認
        値:
          予約確認: [その他, なくした, 確認, 教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 問い合わせ, 問合せ, 予約票]
      - 名前: 予約変更
        値:
          予約変更: [時間, 日程, 日付, 別の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\nユアクリニックお茶の水のAI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間判断
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: API_DRJOY_1
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 院内代表転送_1
      - 箱: 通話完了
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: AI ※時間外アナ有
        セリフ: "ただいまのお時間は診療時間外です。救急の方は東京都医療機関案内サービス、ひまわり03-5272-0303におかけください。当院へお問い合わせの方は、この後にご用件をお伺いいたします。\n内容確認後、院内スタッフから翌営業日終了までにショートメッセージもしくはお電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 冒頭発話
      - 箱: 院内代表転送
        セリフ: "只今のお時間は、スタッフへお繋ぎいたします。\n代表電話に転送いたしますのでそのままお待ちください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY_1
      - 箱: 院内転送：聞取り失敗
        セリフ: 申し訳ございません、うまく認識ができませんでした。代表電話に転送いたしますのでそのままお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY_1
      - 箱: 院内代表転送_1
        セリフ: none
        説明: サブシナリオ「院内代表転送」を呼び出す
        回答振り分け:
          デフォルト: END_切断
      - 箱: 転送失敗
        セリフ: 申し訳ございません。
        入力待ち: なし
        回答振り分け:
          デフォルト: 混み合っている旨で切断
      - 箱: 混み合っている旨で切断
        セリフ: "只今お電話が込み合っております。\n恐れ入りますが、お時間を空けて再度おかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: Q1：問い合わせ内容聴取
        セリフ: まずは1つ目の質問です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 問合せ内容聴取
      - 箱: Q2：二つ目の質問へ
        セリフ: かしこまりました。続いて、二つ目の質問です。
        入力待ち: あり
        回答振り分け:
          デフォルト: 患者名聴取
      - 箱: Q3：連絡先へ
        セリフ: "それでは、最後の質問です。\nご連絡先のお電話番号をお伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取
      - 箱: 連絡先聴取
        セリフ: none
        説明: サブシナリオ「連絡先聴取」を呼び出す
        参照ファイル: 連絡先聴取.yaml
        回答振り分け:
          デフォルト: 終話へ
      - 箱: 終話へ
        セリフ: "ありがとうございます。質問は以上です。\n内容確認後、院内スタッフから土・日、祝日を除く二日以内にショートメッセージもしくはお電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 問合せ内容聴取
        セリフ: none
        説明: サブシナリオ「問合せ内容聴取」を呼び出す
        参照ファイル: 問合せ内容聴取.yaml
        回答振り分け:
          デフォルト: Q2：二つ目の質問へ
      - 箱: 患者名聴取
        セリフ: none
        説明: サブシナリオ「患者名聴取」を呼び出す
        参照ファイル: 患者名聴取.yaml
        回答振り分け:
          デフォルト: Q3：連絡先へ
      - 箱: 冒頭発話
        セリフ: 全部で3つ質問をさせていただきます。
        入力待ち: なし
        回答振り分け:
          デフォルト: Q1：問い合わせ内容聴取
      - 箱: 時間判断
        セリフ: none
        説明: サブシナリオ「時間判断」を呼び出す
        参照ファイル: 時間判断.yaml
        回答振り分け:
          デフォルト: AI ※時間外アナ有

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_3回聞き取り失敗救済 時間判別
        セリフ: none
        説明: サブシナリオ「3回聞き取り失敗救済 時間判別」を呼び出す
        参照ファイル: 3回聞き取り失敗救済 時間判別.yaml
