flow:
  最初の箱: 用件を判断

  エンティティ定義:
    カスタム:
      - 名前: 01_00_分岐なし診療科
        値:
          てんかん外来: [てんかん, てんたん, てんぱん, 印鑑が要らない, 元考えて, 玄関外内, 展開, 点番, 返還間]
          ペインクリニック外科: [Pingクリニック, ウイングクリニック, プリンクリニック, ペイン, メインクリニック外科, 原因, 原因クリニック, 痛い, 変クリニック, 便, 麻酔, 無痛]
          めまい難聴外来: [うん障害ライト, えまい, で前ぐらい, ナンチョウ, めまい, めまい外来, 炎症外来, 何錠, 南朝, 軟調, 難聴外来, 二枚, 二枚何錠外来, 二枚軟調, 二枚軟調外来, 二枚難聴がない, 目まい, 目まいがいない, 目まいなんでしょう外来, 目まい何錠外来, 目まい軟調外来, 目まい難聴がない, 目まい難聴が本来]
          緩和ケア外来: [あんわけや, がんわけや, ケア, 乾き, 緩和, 緩和ケア]
          形成外科: [Kせい, 形成]
          健診センター: [センタ－, とくとく健診, ドック, 管理センタ－, 銀行センター, 銀行センター。, 健康センター。, 健康管理, 健康診断, 健康診断。, 健診, 健診, 検診, 検針, 人間ドック, 特定健診, 脳ドック, 変更センター, 変更センター。, 変更せんと]
          歯科口腔外科: [近くをクレジットカード, 口腔, 航空, 歯医者, 歯科]
          腫瘍内科: [ケモ, 化学療法, 使用, 腫瘍, 必要ないか]
          循環器内科: [ハート, 循環, 循環器, 循環器なんか, 循環器内科, 循内, 中間期内科]
          消化器外科: [商売げか, 商売外科, 小額外科, 尚書きえか, 尚書き外科, 消外, 腸が消え間]
          消化器内科: [ピロリ, 胃腸, 今日関係ないか, 商売ないか, 商売内科, 小額内科, 尚書き内科, 庄内, 消内, 消内]
          心臓血管外科: [シンゲ, 関係か, 現像結果, 心外, 心臓, 心臓センター, 心臓外科, 心臓血管, 新下, 新規, 新芸, 新年, 真下, 進化, 進撃]
          神経内科: [神経]
          整形外科: [TK, 整形, 閉経]
          脊椎脊髄末梢神経外科: [セキスイ, セキズイ, セキツイ, 積水, 脊髄, 脊椎, 脊椎外科, 脊椎脊髄いいましょう神経外科, 抹消]
          糖尿病内科: [糖尿, 糖尿内科, 糖尿病]
          頭頸科頭頸部腫瘍センター: [統計, 統計か, 統計部, 頭頸科頭頸部腫瘍センター]
          乳腺外科: [乳腺, 乳腺か, 乳腺科]
          脳神経外科: [の下, の信, 頭痛, 脳外科, 脳神経]
          泌尿器科: [ウロ, ウロ科, 金曜日, 信用機関, 泌尿, 泌尿器, 費用]
          皮膚科: [Vista, いうか, いるか, 岐阜が, 水が, 昼か, 昼ば, 二日, 皮膚]
          膝関節専門外来: [いざ, 関節, 膝関節, 膝関節専門, 膝専門]
          婦人科: [お産, お産センター, ギネ, マタニティ, 三か, 三個, 参加, 酸化, 周産, 夫人, 婦人, 婦人科]
          物忘れ外来: [もの忘れ, 認知症, 認知症外来, 物忘れ, 物忘れ外来]
          放射線治療科: [治療, 放射線, 放射線治療, 陽子線, 陽子線治療, 陽子線治療センター]
      - 名前: 代表案内診療科
        値:
          がんセカンドオピニオン外来: [オピニオン, がんセカンドオピニオン, セカンド, セカンドオピニオン]
          救急: [救急, 九, 九九, 九十九, 週休, 十九]
          血管内留置デバイス外来: [BAB, BAD, VAB, VAD, デバイス, 欠陥, 血管, 血管内, 血管内でうちデバイス, 循環の留置, 留置]

  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（予約変更・キャンセル）
        セリフ: 予約票に記載されている診療科をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取りへ（新規予約）
        セリフ: 受診を希望される診療科をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科セット
            - 判定: エンティティ含む
              入力: 代表案内診療科
              次の箱: 代表案内診療科セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 診療科の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 分岐なし診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科読み取得
      - 箱: 代表案内診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科読み取得
      - 箱: 分岐なし診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐なし診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 診療科読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 診療科確認へ
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科再設定へ
            - 判定: エンティティ含む
              入力: 代表案内診療科
              次の箱: 代表案内診療科再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 代表案内分岐
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 代表案内分岐
          デフォルト: count上記以外_1
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 診療科を確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 分岐なし診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科セット
      - 箱: 代表案内診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内診療科セット
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
            - 判定: 一致
              入力: 予約
              次の箱: 診療科の聞き取りへ（新規予約）
            - 判定: 一致
              入力: 条件5
              次の箱: 診療科の聞き取りへ（新規予約）
          デフォルト: 診療科の聞き取りへ（新規予約）
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
              次の箱: END_診療科聞き取りNG
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
              次の箱: END_診療科聞き取りNG
          デフォルト: 再度聞き取りへ
      - 箱: 代表案内分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 代表案内
              次の箱: 案内１
          デフォルト: END_診療科聞き取りOK
      - 箱: 案内１
        セリフ: "<? $診療科の読み ?>\nは、AI電話では受付できません。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_代表案内

  終了:
    箱一覧:
      - 箱: END_診療科聞き取りOK
        セリフ: none
        入力待ち: なし
      - 箱: END_診療科聞き取りNG
        セリフ: none
        入力待ち: なし
      - 箱: END_count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 1以下
      - 箱: END_代表案内
        セリフ: none
        入力待ち: なし
