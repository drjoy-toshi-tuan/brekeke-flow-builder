flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n札幌禎心会病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日の聞き取り
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 確認内容の聞き取りへ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認内容の聞き取り
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診予約
              次の箱: 再診予約
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更の流れ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルの流れ
            - 判定: 一致
              入力: 新規予約
              次の箱: 新規予約の流れ_2
            - 判定: 一致
              入力: 予約確認
              次の箱: 予約確認の流れ
            - 判定: 一致
              入力: 情報提供書
              次の箱: 情報提供書の流れ
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_3
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 新規予約の流れ_1
          デフォルト: 新規予約の流れ
      - 箱: 新規予約の流れ
        セリフ: 3診療日以内に、担当者から折り返し、電話にてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 新規予約の流れ_1
        セリフ: 3診療日以内に、担当者から折り返し電話、もしくは、SMSにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ
        セリフ: 予約変更の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 新規予約の流れ_2
        セリフ: 初診予約の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 予約キャンセルの流れ
        セリフ: 予約キャンセルの申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 予約確認の流れ
        セリフ: ご予約に関するお問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 情報提供書の流れ
        セリフ: 情報提供書に関するお問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 情報提供書
              次の箱: 次へ_1
            - 判定: 一致
              入力: 新規予約
              次の箱: 診察券有無の確認
            - 判定: 一致
              入力: 再診予約
              次の箱: 診察券有無の確認
            - 判定: 一致
              入力: 予約変更
              次の箱: 次へ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 次へ
      - 箱: 診察券有無の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察券有
              次の箱: 次へ_1
          デフォルト: 診察券無し
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約確認
              次の箱: 確認内容の聞き取りへ
            - 判定: 一致
              入力: 再診予約
              次の箱: 新規予約・予約変更・キャンセル・再診予約へ
            - 判定: 一致
              入力: 予約変更
              次の箱: 新規予約・予約変更・キャンセル・再診予約へ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 新規予約・予約変更・キャンセル・再診予約へ
            - 判定: 一致
              入力: 新規予約
              次の箱: 紹介状有無聞き取り
      - 箱: 診察券無し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 診察券有り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間外接続用
      - 箱: 新規予約・予約変更・キャンセル・再診予約へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科聞き取り
      - 箱: 切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 代表案内
        セリフ: "電話番号は011-712-1131です。\n繰り返します。\n電話番号は011-712-1131です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断へ
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 最後に、ご連絡先のお電話番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 紹介状有無聞き取り
        セリフ: none
        説明: サブシナリオ「紹介状有無聞き取り」を呼び出す
        参照ファイル: 紹介状有無聞き取り.yaml
        回答振り分け:
          デフォルト: 新規予約・予約変更・キャンセル・再診予約へ
      - 箱: 診療科聞き取り
        セリフ: none
        説明: サブシナリオ「診療科聞き取り」を呼び出す
        参照ファイル: 診療科聞き取り.yaml
        回答振り分け:
