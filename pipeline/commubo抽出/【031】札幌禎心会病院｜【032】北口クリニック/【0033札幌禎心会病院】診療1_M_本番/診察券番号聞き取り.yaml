flow:
  最初の箱: 診察券確認へ１

  エンティティ定義:
    カスタム:
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9以上
              次の箱: count再質問
            - 判定: 数値以上
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号の読みセット
            - 判定: エンティティ含む
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号の読みセット
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 聞き取りできず
          デフォルト: 診察券番号確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 聞き取りできず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: 申し訳ございません。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 聞き取りできず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_診察券無し
      - 箱: 診察券番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: END_診察券無し
            - 判定: エンティティ含む
              入力: 数字
              次の箱: 診察券番号セット（発話）
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 診察券番号セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: countクリア
          デフォルト: count上記以外
      - 箱: countクリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号クリア
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号セット（発話）
      - 箱: 診察券番号確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 診察券番号
              次の箱: 診察券番号クリア
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 再度聞き取りへ
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_診察券有り
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_診察券有り
          デフォルト: count上記以外_1
      - 箱: 診察券番号の聞き取りへ
        セリフ: 診察券がない場合や、わからない場合は、「わからない」とお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号セット（発話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の読みセット
      - 箱: 診察券番号セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号の読みセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_診察券有り
      - 箱: 診察券確認へ１
        セリフ: 診察券番号をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ
      - 箱: ダイヤルプッシュ案内
        セリフ: お話いただくか、ダイヤルプッシュで入力してください。
        入力待ち: あり
        回答振り分け:
          デフォルト: 診察券番号の聞き取り

  終了:
    箱一覧:
      - 箱: END_診察券無し
        セリフ: none
        入力待ち: なし
      - 箱: END_診察券有り
        セリフ: none
        入力待ち: なし
