flow:
  最初の箱: 当日受診の確認

  エンティティ定義:
    カスタム:
      - 名前: つなぎことば
        値:
          うん: [あー, うーん, うん, ええ, えーっと, えっと]

  共通:
    箱一覧:
      - 箱: 当日受診の確認
        セリフ: "まず初めにお伺いします。本日の予約に関する内容ですか？\nはい、または、いいえでお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: つなぎことば
              次の箱: count上記以外
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_当日受診じゃない
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_当日受診
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_当日受診
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、そうです」、や、「いいえ、違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日受診の確認

  終了:
    箱一覧:
      - 箱: END_当日受診
        セリフ: none
        入力待ち: なし
      - 箱: END_当日受診じゃない
        セリフ: none
        入力待ち: なし
