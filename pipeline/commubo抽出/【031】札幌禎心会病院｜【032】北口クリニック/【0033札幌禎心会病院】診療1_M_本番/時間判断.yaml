flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付分岐
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 月～金曜日
              次の箱: 平日時間の分岐
            - 判定: 一致
              入力: 土曜
              次の箱: 土曜時間の分岐
          デフォルト: END_時間外
      - 箱: 平日時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: END_時間外
            - 判定: 数値
              入力: 17時まで
              次の箱: END_時間内
          デフォルト: END_時間外
      - 箱: 土曜時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: END_時間外
            - 判定: 数値
              入力: 12時まで
              次の箱: END_時間内
          デフォルト: END_時間外
      - 箱: 平日時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: END_時間外
            - 判定: 数値
              入力: 17時まで
              次の箱: END_時間内
          デフォルト: 年末年始アナウンス
      - 箱: 日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 1/4前（12/30，12/31，1/1，1/2，1/3）
              次の箱: 年末年始アナウンス
          デフォルト: END_時間外
      - 箱: 日付分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12/29前日
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 12/29当日
              次の箱: 平日時間の分岐_1
            - 判定: 一致
              入力: 1/4
              次の箱: 年末年始アナウンス
          デフォルト: 曜日の分岐
      - 箱: 年末年始アナウンス
        セリフ: 申し訳ございませんが、ただいまの時間は、年末年始のため受付時間外となっております。受付開始は2026年1月5日月曜日の朝9時からとなっております。恐れ入りますがおかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始

  終了:
    箱一覧:
      - 箱: END_時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
