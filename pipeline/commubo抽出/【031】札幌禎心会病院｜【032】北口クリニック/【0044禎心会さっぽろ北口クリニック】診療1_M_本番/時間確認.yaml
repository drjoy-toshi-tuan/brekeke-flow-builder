flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_稼働中
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 月・火・水
              次の箱: 平日の時間分岐
            - 判定: 一致
              入力: 木
              次の箱: 土曜の時間分岐
            - 判定: 一致
              入力: 金
              次の箱: 平日の時間分岐
            - 判定: 一致
              入力: 土曜日
              次の箱: 土曜の時間分岐
          デフォルト: END_時間外
      - 箱: 平日の時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時25分前
              次の箱: END_時間外
            - 判定: 数値
              入力: 17時まで
              次の箱: END_稼働中
          デフォルト: END_時間外
      - 箱: 土曜の時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時25分前
              次の箱: END_時間外
            - 判定: 数値
              入力: 12時まで
              次の箱: END_稼働中
          デフォルト: END_時間外
      - 箱: 平日の時間分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時25分前
              次の箱: END_時間外
          デフォルト: END_稼働中
      - 箱: 祝日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 祝日
      - 箱: 年末年始設定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12月30日以前
              次の箱: 曜日の分岐
            - 判定: lessEqual
              入力: 1/4
              次の箱: 祝日
            - 判定: 一致
              入力: 3/2
              次の箱: 平日の時間分岐_1
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_稼働中
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_稼働前
        セリフ: none
        入力待ち: なし
