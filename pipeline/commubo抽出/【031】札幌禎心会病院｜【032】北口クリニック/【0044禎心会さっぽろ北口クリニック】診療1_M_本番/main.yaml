    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n禎心会さっぽろ北口クリニックの、予約専用電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
