        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り_1
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 初診再診変更の流れ
            - 判定: 一致
              入力: 新規予約
              次の箱: 初診再診変更の流れ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルの流れ
            - 判定: 一致
              入力: 予約確認
              次の箱: 予約確認の流れ
      - 箱: 次へ_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 次へ_3
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
