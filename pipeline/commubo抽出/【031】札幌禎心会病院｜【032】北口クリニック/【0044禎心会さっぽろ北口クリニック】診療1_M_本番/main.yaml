        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: END_新規予約の流れ_1
          デフォルト: END_新規予約の流れ
      - 箱: 初診再診変更の流れ
        セリフ: それでは、3診療日以内に、担当者からショートメール、もしくは折り返し電話にてご連絡いたします。折り返しのご連絡をもって予約が確定いたします。お電話ありがとうございました。
