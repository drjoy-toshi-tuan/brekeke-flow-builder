  共通:
    箱一覧:
      - 箱: 時間内挨拶2
        セリフ: はじめに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電者氏名
      - 箱: IVRからの転送挨拶
        セリフ: こちらは健康診断の予約関連専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 上記以外からの入電挨拶
        セリフ: 倉敷中央病院付属予防医療プラザの、予約関連専用、AI電話です。この通話は、通話の内容確認およびサービス向上のため、録音させていただいております。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電日時間判断ノードへの接続
      - 箱: API_DRJOY_1
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 代表電話案内
      - 箱: API_DRJOY_2
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 転送
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 入電番号判断
      - 箱: 入電日時間判断ノードへの接続
