      - 箱: キャンセル
        セリフ: "予約キャンセルのお申し込みを受付いたしました。\n今年度新たな健診予約が必要な方は、改めてご連絡ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 変更
        セリフ: 予約変更のお申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 新規
        セリフ: 健康診断の、予約のお申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 問い合わせ
