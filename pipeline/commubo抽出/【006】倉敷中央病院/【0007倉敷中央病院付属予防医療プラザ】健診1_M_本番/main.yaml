        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 締めあいさつ 5/20 更新
        セリフ: "3営業日を目安に、担当者から折り返しご連絡し、ご予約を確定いたします。\n現在お申込みが集中しており、通常よりお時間を頂戴しておりますが、必ずご連絡致しますので、よろしくお願い申し上げます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 締めあいさつ 5/20 更新_1
        セリフ: "3営業日を目安に、担当者からお電話、もしくは、ショートメールにてご連絡し、ご予約を確定いたします。\n現在お申込みが集中しており、通常よりお時間を頂戴しておりますが、必ずご連絡致しますので、よろしくお願い申し上げます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 通話完了
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 電話切断へ接続
