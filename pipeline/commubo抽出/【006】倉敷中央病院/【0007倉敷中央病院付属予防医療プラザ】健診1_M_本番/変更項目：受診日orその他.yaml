flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定（エンティティ）
        値:
          肯定: [はーい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 否定（エンティティ）
        値:
          否定: [EHが今, いいえ, いえ, いや, じゃない, ちがう, ちゃう]
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 解らへん, 解りません, 分からない, 分からへん, 分かりません]
      - 名前: 変更内容
        値:
          その他: [オプション, コース, その他の変更, ないよ, メニュー, 以外, 健診, 検査, 種類, 受診日外の変更, 内容, 部品ないよ]
          受診日: [JCB, ずしんび, ゆしんび, 化身美, 時間, 自信び, 自信を持って, 自信美, 自信無敵, 自信無理, 自振日, 自身に, 受験日, 受信に, 受信び, 受信り, 受信機, 受信時, 受信日, 受信日, 受信日の変更, 終身日, 終身日, 住信, 重心ｂ, 重心離, 地震日, 日にち, 日程, 日付, 入金日, 入清日, 部品, 郵便日]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "次の2つのうち、どちらを変更されるかお話ください。\n「受診日」「受診日以外の変更」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更内容の確認
      - 箱: 変更内容の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 変更内容の発話
              次の箱: 変更内容のセット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 変更内容の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: コースを確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐
      - 箱: 変更内容のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: セットした変更内容の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 受診日
              次の箱: 受診日の変更
          デフォルト: その他の変更
      - 箱: その他の変更
        セリフ: "その他の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースを確認
      - 箱: 受診日の変更
        セリフ: "受診日の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースを確認
      - 箱: コースを確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 変更内容の発話
              次の箱: END_コース再設定へ
            - 判定: エンティティ含む
              入力: 肯定
            - 判定: エンティティ含む
              入力: 肯定エンティティ
            - 判定: エンティティ含む
              入力: 肯定否定
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
          デフォルト: count上記以外_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
          デフォルト: END_否定
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_変更項目聞き取れず

  終了:
    箱一覧:
      - 箱: END_用件の確認へ
        セリフ: "変更される内容を、次の2つのうちの、いずれかでお話ください。\n「受診日」「その他の変更」、\nそれでは、お話ください。"
        入力待ち: なし
      - 箱: END_否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_コース再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
      - 箱: END_変更項目聞き取れず
        セリフ: none
        入力待ち: なし
