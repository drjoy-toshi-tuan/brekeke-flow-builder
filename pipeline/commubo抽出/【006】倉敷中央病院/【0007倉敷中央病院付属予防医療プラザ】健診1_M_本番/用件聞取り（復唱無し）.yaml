flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [よろしい, 異常部, 丈夫, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 用件
        値:
          キャンセル: [やめる, 取り消し, 取り消す, 取消, 予約のキャンセル]
          新規: [エンジンの予約, ご審査の予約, ご診断の予約, ドック, ようやく, 銀行診断休薬, 健康診断, 健康診断の追加, 健康診断の要約, 健診, 健診の予約, 検診, 検針, 雇い入れ, 事業主, 就職, 進学, 人間ドック, 人間独の申込み, 人工診断の予約, 生活習慣病, 先行診断の予約, 先進の予約, 全身, 天候診断の予約, 特定健診, 変更診断の予約, 返信]
          折返し連絡: [コールバック, 折り返し, 折り返しのご連絡, 折り返し連絡, 折返し, 連絡が欲しい]
          変更: [延期, 時間, 取り直したい, 取り直す, 日程, 日付, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更, 予約の変更, 予約の方向, 予約の本校]
          問い合わせ: [アクセス, その他, なくした, 教えて, 金額, 検査結果, 質問, 調べて, 聞きたい, 忘れた, 問い合わす, 料金]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の5つのうちのいずれかでお話ください。\n「健康診断の予約」\n「予約の変更」\n「予約のキャンセル」、\n「当施設から着信があった方の、折り返し連絡」、\n「その他お問い合わせ」、それでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
          デフォルト: END_再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 健診予約
              次の箱: 用件の復唱（新規）
            - 判定: 一致
              入力: キャンセル
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: 変更
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: 折返し連絡
              次の箱: 用件の復唱（折返し連絡）
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 用件の復唱（問い合わせ）
      - 箱: 用件の復唱（新規）
        セリフ: "健康診断のご予約、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（キャンセル）
        セリフ: "ご予約のキャンセル、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（変更）
        セリフ: "ご予約の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（問い合わせ）
        セリフ: "その他お問い合わせ、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（折返し連絡）
        セリフ: "当施設から折り返しの着信があった方のご連絡、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 肯定
            - 判定: エンティティ含む
              入力: 肯定否定
            - 判定: エンティティ含む
              入力: 肯定
          デフォルト: count上記以外_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
          デフォルト: END_否定
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件取得できず

  終了:
    箱一覧:
      - 箱: END_再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
      - 箱: END_否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
