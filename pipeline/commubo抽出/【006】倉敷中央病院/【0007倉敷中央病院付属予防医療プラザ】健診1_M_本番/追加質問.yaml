flow:
  最初の箱: 質問へ

  エンティティ定義:
    カスタム:
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []

  共通:
    箱一覧:
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋日にちなし
              次の箱: 再度質問の有無
            - 判定: 一致
              入力: 無言9（5秒）＋日にちなし
              次の箱: 再度質問の有無
            - 判定: 数値以上
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: END_聞き取り完了
          デフォルト: 無言on
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: その他質問聞き取り（フリーワード）
        セリフ: オペレーターにお伝えになりたいことがあれば、お話下さい。なければ『特にありません』 のようにお話下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 再度質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_聞き取り完了
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: その他質問聞き取り（フリーワード）
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 質問へ
        セリフ: 他に、
        入力待ち: なし
        回答振り分け:
          デフォルト: その他質問聞き取り（フリーワード）

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
