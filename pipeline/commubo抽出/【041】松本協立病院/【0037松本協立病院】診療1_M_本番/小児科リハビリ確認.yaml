flow:
  最初の箱: 小児科リハビリ確認

  エンティティ定義:
    カスタム:
      - 名前: 2階
        値:
          2階: [にかい, 向かい, 小児, 二回, 二階, 二杯]
      - 名前: 4階
        値:
          4階: [よんかい, 四回, 四階, 四杯, 大人]
      - 名前: わからない
        値:
          わからない: [どちら, どっち, わかりません, わかんない, 何才, 何歳, 分からない, 分かりません, 分かんない]
      - 名前: 肯定
        値:
          はい: [1, 1番, あってます, いち, イチ, そうそう, そうです, そうです, はーい, 一, 一番, 配送です]
      - 名前: 否定
        値:
          いいえ: [2, そうじゃない, に, にばん, まちがった, 違います, 違う, 二, 二番]

  共通:
    箱一覧:
      - 箱: 小児科リハビリ確認
        セリフ: "小児科のリハビリですか？\nはい、または、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再度テスト
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 聴取失敗
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: DTMF回答分岐
      - 箱: 再度テスト
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 小児科リハビリ確認
      - 箱: 再度聞き取りへ
        セリフ: "うまく聞き取りが出来ませんでした。\nはい、そうです、や、いいえ、違います、のようにお答えください。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 小児科リハビリ確認
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: わかりません
              次の箱: わからない
            - 判定: エンティティ含む
              入力: 4階発話
              次の箱: その他リハビリ
            - 判定: エンティティ含む
              入力: 2階発話
              次の箱: 小児科リハビリ
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 小児科リハビリ
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 小児科リハビリ
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 小児科リハビリ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: その他リハビリ
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: その他リハビリ
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: 小児科リハビリ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_小児科リハビリ
      - 箱: わからない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: 聴取失敗
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: その他リハビリ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_その他リハビリ
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 小児科リハビリ
            - 判定: 一致
              入力: 2＝否定
              次の箱: その他リハビリ
          デフォルト: count上記以外_1

  終了:
    箱一覧:
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_小児科リハビリ
        セリフ: none
        入力待ち: なし
      - 箱: END_その他リハビリ
        セリフ: none
        入力待ち: なし
