flow:
  最初の箱: 循環器内科：阿部先生

  エンティティ定義:
    カスタム:
      - 名前: 希望時間帯
        値:
          午後: [13時, 14時, １時, 2時, ごご, ゴゴ]
          午前: [10時, 11時, 8時, 9時, ごぜん, ゴゼン, 午前中, 昼前, 朝]
          指定なし: [いつでも, どちらでも, 何時でも, 希望なし, 空いてる, 特になし]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: count再質問
          デフォルト: 聴き取り
      - 箱: 希望日時聞き取り
        セリフ: ご希望の変更日時をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 希望日時聞き取り_1
        セリフ: ご希望の変更日時を、第3希望までおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 上記以外クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）+時期発話無し
              次の箱: count再質問
            - 判定: 一致
              入力: 上記以外9（5秒）+時期発話無し
              次の箱: count再質問
            - 判定: 数値
              入力: 上記以外2（約1秒）＋時期発話あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋時期発話あり
              次の箱: END_聞き取り完了
          デフォルト: count上記以外
      - 箱: 上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 循環器内科：阿部先生
      - 箱: 循環器内科：阿部先生
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 阿部医師希望
              次の箱: 希望日時聞き取り_1
          デフォルト: 希望日時聞き取り

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_テスト用（名前あり）
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nAI電話がうまく聞き取りできませんでした。\n後ほど担当者より確認させていただきます。"
        入力待ち: なし
