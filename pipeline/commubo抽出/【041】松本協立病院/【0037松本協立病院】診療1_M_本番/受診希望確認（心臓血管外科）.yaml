flow:
  最初の箱: 下肢静脈瘤確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [1, 1番, あってます, いち, イチ, そうそう, そうです, そうです, はーい, 一, 一番, 配送です]
      - 名前: 否定
        値:
          いいえ: [2, そうじゃない, に, にばん, まちがった, 違います, 違う, 二, 二番]

  共通:
    箱一覧:
      - 箱: 下肢静脈瘤確認
        セリフ: "下肢静脈瘤の診察をご希望でしょうか？\nはい、そうです、や、いいえ、違います、のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
          デフォルト: 回答確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
          デフォルト: DTMF回答分岐
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: DTMF回答分岐_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。 うまく聞き取りが出来ませんでした。 \n再度、はい、そうです、や、いいえ、違います、のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 下肢静脈瘤
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 下肢静脈瘤
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 下肢静脈瘤
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 下肢静脈瘤ではない
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 下肢静脈瘤ではない
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐_1
          デフォルト: count上記以外
      - 箱: 回答確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外_1
      - 箱: 下肢静脈瘤
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_下肢静脈瘤
      - 箱: 下肢静脈瘤ではない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_その他
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
            - 判定: 一致
              入力: 2＝否定
          デフォルト: count上記以外_2
      - 箱: DTMF回答分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 下肢静脈瘤
            - 判定: 一致
              入力: 2＝否定
              次の箱: 下肢静脈瘤ではない
          デフォルト: count上記以外_3

  終了:
    箱一覧:
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nAI電話がうまく聞き取りできませんでした。\n後ほど担当者より確認させていただきます。"
        入力待ち: なし
      - 箱: END_下肢静脈瘤
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_その他
        セリフ: かしこまりました。
        入力待ち: なし
