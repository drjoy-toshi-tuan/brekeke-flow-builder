flow:
  最初の箱: 後日予約希望有無確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [1, 1番, あっています, あってます, いいです, いち, イチ, お願いします, そうそう, そうです, それで, はーい, 一, 一番, 希望します, 明日以降]
      - 名前: 否定
        値:
          いいえ: [2, ありません, そうじゃない, に, にばん, まちがった, 違います, 違う, 希望しない, 希望しません, 今日, 二, 二番]

  共通:
    箱一覧:
      - 箱: 後日予約希望有無確認
        セリフ: "申し訳ございません。\n整形外科は完全予約制になっており、当日の予約はお取りできません。\n明日以降のご希望であればお伺いできますが、希望されますか？\nはい、希望します、いいえ、希望しません、のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 回答確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: DTMF回答分岐
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、はい、または、いいえ、で、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、1、はい、または、2、いいえ、で、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 後日予約希望
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 後日予約希望
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 後日予約希望
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 後日予約希望しない
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 後日予約希望しない
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 回答確認
          デフォルト: count上記以外
      - 箱: 回答確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外_1
      - 箱: 後日予約希望
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_後日予約希望
      - 箱: 後日予約希望しない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_後日予約希望しない
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 後日予約希望
            - 判定: 一致
              入力: 2＝否定
              次の箱: 後日予約希望しない
          デフォルト: count上記以外_2

  終了:
    箱一覧:
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_後日予約希望
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_後日予約希望しない
        セリフ: かしこまりました。
        入力待ち: なし
