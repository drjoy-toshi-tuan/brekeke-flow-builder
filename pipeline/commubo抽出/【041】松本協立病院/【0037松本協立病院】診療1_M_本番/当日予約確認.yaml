flow:
  最初の箱: 当日予約の問合せか

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [1, 1番, あっています, あっている, あってます, あってる, いいです, いち, イチ, そうそう, そうです, それです, はーい, 一, 一番, 今日, 当日, 配送です]
      - 名前: 否定
        値:
          いいえ: [2, ありません, そうじゃない, それじゃない, それではない, に, にばん, 違います, 違う, 間違い, 間違った, 間違って, 二, 二番, 別の]

  共通:
    箱一覧:
      - 箱: 当日予約の問合せか
        セリフ: "今回は、当日の予約についてのお問い合わせでしょうか？\nはい、または、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再度テスト
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: DTMF回答分岐
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度テスト
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日予約の問合せか
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nAI電話がうまく聞き取りできませんでした。\n再度、「はい、そうです」や「いいえ、違います」のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。\nAI電話がうまく聞き取りできませんでした。\n再度、「はい、そうです」や「いいえ、違います」のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 当日予約セット
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 当日予約セット
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 当日予約セット
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 明日以降の予約セット
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 明日以降の予約セット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: 当日予約セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_当日予約
      - 箱: 明日以降の予約セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_明日以降の予約
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 当日予約セット
            - 判定: 一致
              入力: 2＝否定
              次の箱: 明日以降の予約セット
          デフォルト: count上記以外_1

  終了:
    箱一覧:
      - 箱: END_再度聞き取りへ
        セリフ: "うまく聞き取りが出来ませんでした。\nご用件を、次の2つから番号を押してください。\n「本日の予約に関する内容」は1を、「明日以降の予約に関する内容」は2を、それでは押してください。"
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_当日予約
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_明日以降の予約
        セリフ: かしこまりました。
        入力待ち: なし
