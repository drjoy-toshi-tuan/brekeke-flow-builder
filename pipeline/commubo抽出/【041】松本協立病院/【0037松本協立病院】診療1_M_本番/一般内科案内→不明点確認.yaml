flow:
  最初の箱: 分岐

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [1, 1番, あってます, いち, イチ, そうそう, そうです, そうです, はーい, 一, 一番, 配送です]
      - 名前: 否定
        値:
          いいえ: [2, そうじゃない, に, にばん, まちがった, 違います, 違う, 二, 二番]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
          デフォルト: 回答確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
          デフォルト: DTMF回答分岐
      - 箱: 再度聞き取りへ
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。 再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 不明点有無確認
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 不明点あり
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 不明点あり
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 不明点あり
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 不明点無し
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 不明点無し
          デフォルト: count上記以外
      - 箱: 回答確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外_1
      - 箱: 不明点あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_不明点あり
      - 箱: 不明点無し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_不明点無し
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
            - 判定: 一致
              入力: 2＝否定
          デフォルト: count上記以外_2
      - 箱: 当日予約（小児以外）→一般内科
        セリフ: "申し訳ございません。\nご指定の診療科では、当日予約はお取りできません。\n予約無しの一般内科外来にご来院ください。\n受付時間は、祝日を除く、月曜から金曜の、8時30分から16時30分までと、土曜の、8時30分から11時30分までです。\n何かご不明点があれば、予約センターへ電話を転送します。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 不明点有無確認
      - 箱: 紹介状無し初診→一般内科
        セリフ: "申し訳ございません。\nご指定の診療科では、紹介状をお持ちでない方のご予約はお取りできません。\n予約なしの一般内科外来へご来院ください。\n受付時間は、祝日を除く、月曜から金曜の、8時30分から16時30分までと、土曜の、8時30分から11時30分までです。\n何かご不明点があれば、予約センターへ電話を転送します。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 不明点有無確認
      - 箱: 不明点有無確認
        セリフ: 「はい、あります」や、「いいえ、ありません」のように、お答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 内科→直接来院へ
        セリフ: "申し訳ございません。\n一般内科は予約制ではございませんので、受付時間内にご来院ください。\n受付時間は、祝日を除く、月曜から金曜の、8時30分から16時30分までと、土曜の、8時30分から11時30分までです。\n何かご不明点があれば、予約センターへ電話を転送します。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 不明点有無確認
      - 箱: 分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 内科
              次の箱: 内科→直接来院へ
            - 判定: 一致
              入力: 当日予約
              次の箱: 当日予約（小児以外）→一般内科
            - 判定: 一致
              入力: 紹介状無し
              次の箱: 紹介状無し初診→一般内科

  終了:
    箱一覧:
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_不明点あり
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_不明点無し
        セリフ: かしこまりました。
        入力待ち: なし
