flow:
  最初の箱: 担当医名の聴取へ

  エンティティ定義:
    カスタム:
      - 名前: 分からない
        値:
          分からない: [いない, いません, おりません, わからない, わかりません, 覚えていない, 覚えていません, 覚えてない, 初めて, 知らない, 知りません, 分かりません, 聞いていない, 聞いていません, 聞いてない]

  共通:
    箱一覧:
      - 箱: 担当医名の聴取へ
        セリフ: "担当医師名が分かる場合は、医師名をおっしゃってください。\n初めての受診や、分からない場合は「分からない」とおっしゃってください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当医名の聴き取り
      - 箱: 担当医名の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 分からないセット
            - 判定: エンティティ含む
              入力: 人名
              次の箱: 名前セット
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋氏名なし
              次の箱: 無回答セット
            - 判定: 一致
              入力: 無言9（5秒）＋氏名なし
              次の箱: 無回答セット
            - 判定: 一致
              入力: 待ち時間経過
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
          デフォルト: 無言on
      - 箱: 名前セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 分からないセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当医名の聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当医名の聴き取り
      - 箱: 聞き取り完了
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_親シナリオへ戻る
      - 箱: 無回答セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了

  終了:
    箱一覧:
      - 箱: END_親シナリオへ戻る
        セリフ: none
        入力待ち: なし
