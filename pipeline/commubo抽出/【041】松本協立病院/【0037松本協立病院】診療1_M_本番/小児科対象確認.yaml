flow:
  最初の箱: 小児か確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [1, 1番, あってます, いち, イチ, そうそう, そうです, そうです, はーい, 一, 一番, 配送です]
      - 名前: 否定
        値:
          いいえ: [2, そうじゃない, に, にばん, まちがった, 違います, 違う, 二, 二番]

  共通:
    箱一覧:
      - 箱: 小児か確認
        セリフ: "受診される方は、中学生、または、それよりも若い年齢でしょうか？\nはい、または、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再度テスト
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 回答確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: DTMF回答分岐
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度テスト
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 小児か確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nAI電話がうまく聞き取りできませんでした。\n「はい、そうです」や「いいえ、違います」のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 再度聞き取りへ_1
        セリフ: "うまく聞き取りが出来ませんでした。\nご用件を、次の2つから番号を押してください。\n「患者さんの年齢が12歳以下の場合」は1を、「13歳以上の場合」は2を、それでは押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 回答確認
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 中学生以下
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 中学生以下
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 中学生以下
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 大人
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 大人
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: 回答確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外_1
      - 箱: 中学生以下
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_小児
      - 箱: 大人
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_大人
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 中学生以下
            - 判定: 一致
              入力: 2＝否定
              次の箱: 大人
          デフォルト: count上記以外_2

  終了:
    箱一覧:
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_小児
        セリフ: none
        入力待ち: なし
      - 箱: END_大人
        セリフ: none
        入力待ち: なし
