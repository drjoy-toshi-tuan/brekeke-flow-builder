flow:
  最初の箱: 医師確認

  エンティティ定義:
    カスタム:
      - 名前: 医師名
        値:
          阿部医師: [あべ, あべ先生, 阿部, 阿部先生]
          市川医師: [市川先生]
          若林医師: [わかばやし, わかばやし先生, 若林, 若林先生]
          小山医師: [こやま, こやま先生, 小山, 小山先生]
          小林医師: [こばやし, こばやし先生, 小林, 小林先生]
      - 名前: 肯定
        値:
          はい: [1, 1番, あってます, いち, イチ, そうそう, そうです, そうです, はーい, 一, 一番, 配送です]
      - 名前: 否定
        値:
          いいえ: [2, そうじゃない, に, にばん, まちがった, 違います, 違う, 二, 二番]

  共通:
    箱一覧:
      - 箱: 医師確認
        セリフ: "阿部先生の診察をご希望ですか？\nはい、または、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: DTMF回答分岐
      - 箱: 再度テスト
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 医師確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nAI電話がうまく聞き取りできませんでした。\n「はい、そうです」や「いいえ、違います」のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 阿部医師希望
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 阿部医師希望
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 阿部医師希望
            - 判定: エンティティ含む
              入力: 否定
              次の箱: その他医師
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: その他医師
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: 阿部医師希望
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_阿部医師希望
      - 箱: その他医師
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_その他医師
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 阿部医師希望
            - 判定: 一致
              入力: 2＝否定
              次の箱: その他医師
          デフォルト: count上記以外_1

  終了:
    箱一覧:
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nAI電話がうまく聞き取りできませんでした。\n後ほど担当者より確認させていただきます。"
        入力待ち: なし
      - 箱: END_阿部医師希望
        セリフ: none
        入力待ち: なし
      - 箱: END_その他医師
        セリフ: none
        入力待ち: なし
