flow:
  最初の箱: 用件を判断

  エンティティ定義:
    カスタム:
      - 名前: 01_00_初診紹介状必須_診療科
        値:
          呼吸器内科: [こーない, 吸気内科, 呼吸器, 呼内, 来ない]
          耳鼻咽喉科: [BB, BBか, DB, DBか, GB, GBか, キビ科, シビイン効果, ジビカ, ジビン効果, ジビ科, チビイン効果, ちび科, チ病効果, ひび, リビング効果, リビ科, 咽喉科, 気味, 義務効果, 君か, 耳科, 耳鼻科, 自ミン効果, 自秘咽喉科, 準備完, 切り, 郵便か, 郵便交換, 郵便効果]
          循環器内科: [ハート, 循環, 循環器, 循環器科, 循内, 順番, 中間期内科, 絨毯]
          消化器内科: [商売ないか, 商売内科, 小額内科, 尚書きないか, 庄内, 消化器, 消火器内科, 消内, 表記なんか]
          心臓血管外科: [キンゾウ, ギンゾウ, シンゲ, 関係か, 血管外科, 現像結果, 心外, 心臓, 心臓センター, 心臓外科, 心臓手術, 新下, 新規, 新芸, 新田, 新年, 真下, 進化, 進撃, 静脈瘤]
          腎臓内科: [ジンナイ, 腎臓, 腎内]
          睡眠外来: [CPAP, いびき, すいみん, 睡眠, 睡眠センター, 無呼吸]
          総合診療科: [五五, 商品, 総合, 総合診療, 総診, 送信]
          登山者外来検診: [山登り, 登山, 登山者, 登山者外来, 登山者外来健診]
          糖尿病内科: [トクヤ, とケア, どけや, フット, フットケア, フットケア外来, 振っとけや, 糖尿, 糖尿病, 売っとけ]
          泌尿器科: [ウロ, シゲオカ, シミを聞か, ミヤオカ, ミヤギコウ, 医療機関, 金曜着, 金曜日, 事業期間, 信用機関, 泌尿, 泌尿器, 費用, 利用期間]
      - 名前: 02_00_初診紹介状不要_診療科
        値:
          スマートウォッチ外来: [アップルウォッチ, ウォッチ, スマートウォッチ]
          外科: [けが, そっか, てか, ヘルニア, マンモ, メーカー, やっぱ, リバー, レッカー, 形が, 経過, 経管, 結果, 結構, 月間, 月間, 消化器外科, 乳がん, 乳癌, 乳腺外科, 乳房, 理科, 劣化, 鼡径ヘルニア]
          漢方外来: [かんぽう, 漢方, 漢方薬]
          禁煙外来: [たばこ, 禁煙]
          心身症外来: [心身症, 心身症内科]
          整形外科: [K外科, TK, えー外科, 経由か, 整形, 提携銀行, 日経, 閉経]
      - 名前: 04_00_別窓口案内_診療科
        値:
          歯科センター: [Cか, ああいい車, ああ一緒, はーいい車, ま一緒, 会社, 確か, 期間, 歯医者, 歯科, 滋賀, 鹿, 疾患, 新価, 新患, 地下, 反射, 弊社]
          小児科: [子ども, 子供, 将棋, 小児, 賞味, 正味, 発達, 発達外来, 発達障害]
          透析センター: [トウセキ, 後席, 透析]
      - 名前: 05_00_対象外_診療科
        値:
          失神外来: [しっしん, シッシン, 失神]
          放射線科: [放射, 放射線]
          訪問科在宅診療部: [在宅, 在宅診療, 在宅診療部, 訪問科在宅診療, 訪問診療]
          麻酔科: [あSuica, あ追加, まSuica, まずい, ま追加, 追加, 麻酔]
      - 名前: リハビリテーション科
        値:
          リハビリテーション科: [ミカミ, ミリ, リハ, リハビリ, リハビリテーション, リハビリテーションセンター, リハビリ科, リハ科, 雅に, 二は, 二八, 二百ミリ]
      - 名前: 下肢静脈瘤
        値:
          下肢静脈瘤: []
      - 名前: 健診
        値:
          健診: [ドック, 健康診断, 健診, 検診, 人間ドック]
      - 名前: 検査
        値:
          検査: [けんさ, ケンサ, 胃カメラ]
      - 名前: 肯定
        値:
          肯定: [あっています, あってます, いいです, うん, うんうん, そう, そうそう, そうです, それで, はーい, はい, はいはい, よいです, 大丈夫]
      - 名前: 精神科
        値:
          精神科: [メンタル, メンタルヘルス, 心療内科, 精神]
      - 名前: 内科（予約不要）
        値:
          内科: [ないか, ナイカ]
      - 名前: 入院
        値:
          入院: [にゅういん, ニュウイン]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, それじゃない, それではない, 違います, 違う, 間違い, 間違っています, 間違ってます, 間違ってる, 別の]
      - 名前: 肛門外科
        値:
          肛門外科: [おしり, コウモン, こうもん, こうもんか, コウモンカ, コーモン, こーもん, 痔, 訪問科, 肛門, 肛門科]

  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（予約変更・キャンセル）
        セリフ: "診察予約の場合は、予約票に記載されている診療科をおっしゃってください。\n検査予約のみの変更の場合は、「検査」とおっしゃってください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取りへ（新規予約）
        セリフ: ご希望の診療科または専門外来の名前をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 下肢静脈瘤
              次の箱: 診療科セット（心臓血管外科）
            - 判定: 一致
              入力: 入院（用件：変更）
              次の箱: 入院セット
            - 判定: エンティティ含む
              入力: 入院（用件：変更）
              次の箱: 入院セット
            - 判定: 一致
              入力: 入院（用件：キャンセル）
              次の箱: 入院セット
            - 判定: エンティティ含む
              入力: 入院（用件：キャンセル）
              次の箱: 入院セット
            - 判定: エンティティ含む
              入力: 肛門外科
              次の箱: 肛門外科セット
            - 判定: エンティティ含む
              入力: 01初診紹介状必須_診療科
              次の箱: 01初診紹介状必須_診療科セット
            - 判定: エンティティ含む
              入力: 02初診紹介状不要_診療科
              次の箱: 初診紹介状不要_診療科セット
            - 判定: エンティティ含む
              入力: 精神科
              次の箱: 診療科セット（精神科）
            - 判定: エンティティ含む
              入力: 03別窓口案内_診療科
              次の箱: 03別窓口案内_診療科セット
            - 判定: エンティティ含む
              入力: リハビリ
              次の箱: 診療科セット（リハビリ）
            - 判定: エンティティ含む
              入力: 健診
              次の箱: 健診セット
            - 判定: エンティティ含む
              入力: 検査（変更）
              次の箱: 診療科セット（検査）
            - 判定: 一致
              入力: 検査（変更）
              次の箱: 診療科セット（検査）
            - 判定: 一致
              入力: 検査（キャンセル）
              次の箱: 診療科セット（検査）
            - 判定: エンティティ含む
              入力: 検査（キャンセル）
              次の箱: 診療科セット（検査）
            - 判定: エンティティ含む
              入力: 04対象外_診療科
              次の箱: 04対象外_診療科セット
          デフォルト: count上記以外
      - 箱: 診療科分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01初診紹介状必須_診療科
              次の箱: 診療科分岐_1
            - 判定: 一致
              入力: 精神科
              次の箱: 初診分岐
            - 判定: 一致
              入力: 02初診紹介状不要_診療科
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: 03別窓口案内_診療科
              次の箱: END_転送（別窓口案内）
            - 判定: 一致
              入力: リハビリテーション科
              次の箱: END_転送（別窓口案内）
            - 判定: 一致
              入力: 04対象外_診療科
              次の箱: END_転送（対象外診療科）
            - 判定: 一致
              入力: 下肢静脈瘤
              次の箱: 初診分岐
            - 判定: 一致
              入力: 検査
              次の箱: END_聞き取り完了
          デフォルト: END_聞き取り完了
      - 箱: 初診分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 初診：精神科
              次の箱: END_初診：精神科
            - 判定: 一致
              入力: 初診：精神科
              次の箱: END_初診：精神科
            - 判定: 一致
              入力: 初診：下肢静脈瘤
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: 初診：下肢静脈瘤
              次の箱: END_聞き取り完了
          デフォルト: END_聞き取り完了
      - 箱: 診療科分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 登山者外来検診
              次の箱: 登山者外来・検診に変換
          デフォルト: 初診分岐
      - 箱: 登山者外来・検診に変換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 初診分岐
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 診療科の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 01初診紹介状必須_診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 01初診紹介状必須_診療科読み取得
      - 箱: 03別窓口案内_診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 03別窓口案内_診療科読み取得
      - 箱: 04対象外_診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 04対象外_診療科読み取得
      - 箱: 初診紹介状不要_診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 02初診紹介状不要_診療科読み取得
      - 箱: 01初診紹介状必須_診療科読み取得
        セリフ: none
        説明: サブシナリオ「01初診紹介状必須_診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 01初診紹介状必須_診療科読み取得_1
      - 箱: 04対象外_診療科読み取得
        セリフ: none
        説明: サブシナリオ「04対象外_診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 04対象外_診療科読み取得_1
      - 箱: 02初診紹介状不要_診療科読み取得
        セリフ: none
        説明: サブシナリオ「02初診紹介状不要_診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 03別窓口案内_診療科読み取得
        セリフ: none
        説明: サブシナリオ「03別窓口案内_診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 03別窓口案内_診療科読み取得_1
      - 箱: 診療科読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 03別窓口案内_診療科読み取得_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 04対象外_診療科読み取得_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 01初診紹介状必須_診療科読み取得_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 診療科確認へ
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか？\nはい、そうです、または、いいえ、違います、のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: リハビリ復唱確認へ
        セリフ: "リハビリのご予約でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 診療科分岐
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 診療科分岐
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 診療科分岐
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 肛門外科
              次の箱: 肛門外科_診療科再設定へ
            - 判定: エンティティ含む
              入力: 01初診紹介状必須_診療科
              次の箱: 01初診紹介状必須_診療科再設定へ
            - 判定: エンティティ含む
              入力: 02初診紹介状不要_診療科
              次の箱: 初診紹介状不要_診療科再設定へ
            - 判定: エンティティ含む
              入力: 精神科
              次の箱: 精神科再設定へ
            - 判定: エンティティ含む
              入力: 03別窓口案内_診療科
              次の箱: 03別窓口案内_診療科再設定へ
            - 判定: エンティティ含む
              入力: リハビリテーション科
              次の箱: リハビリテーション科再設定へ
            - 判定: エンティティ含む
              入力: 04対象外_診療科
              次の箱: 04対象外_診療科再設定へ
            - 判定: エンティティ含む
              入力: 検査（変更）
              次の箱: 検査再設定へ
            - 判定: 一致
              入力: 検査（変更）
              次の箱: 検査再設定へ
            - 判定: 一致
              入力: 検査（キャンセル）
              次の箱: 検査再設定へ
            - 判定: 一致
              入力: 検査（キャンセル）
              次の箱: 検査再設定へ
          デフォルト: count上記以外_1
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 診療科を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 否定
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 01初診紹介状必須_診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
