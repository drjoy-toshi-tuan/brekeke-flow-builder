flow:
  最初の箱: 初診確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [OK, いいです, オケー, そうです, はーい, はい, よろしい, 受けます, 初めてです, 初診です, 大丈夫です。, 配送です]
      - 名前: 否定
        値:
          否定: [いーえ, いいえ, ううん, じゃない, そうじゃない, ダメ, ちがう, ちゃうちゃう, ではない, 違います, 違う, 間違った, 再診]

  共通:
    箱一覧:
      - 箱: 初診確認
        セリフ: 初診のご予約ですか？はいそうです、または、いいえ違いますとお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 再診
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 再診
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 初診
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 初診
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 初診
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、そうです」、や、「いいえ、違います」、のように少し長めの言葉でお伝えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初診確認
      - 箱: 初診
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_初診
      - 箱: 再診
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_再診
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず

  終了:
    箱一覧:
      - 箱: END_再診
        セリフ: none
        入力待ち: なし
      - 箱: END_初診
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
