flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あります, ある, てーま, はーい, まーす, まーす, ます, ますー, 異常部, 載っています, 載ってます, 持って, 持ってます, 丈夫]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, せーん, ない, ないです, ません, 載っていません, 載ってません, 持ってない, 持ってません]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 鹿児島市立病院宛の紹介状、もしくは検診結果はお持ちですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 2巡目
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
          デフォルト: count上記以外
      - 箱: 有無を確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 2巡目
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい持っています」、や、「いいえ持っていません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 紹介状あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_紹介状有り：戻る
      - 箱: 紹介状なし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_紹介状無し：戻る
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 2巡目
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 初回
              次の箱: 有無を確認
          デフォルト: 有無を確認_1

  終了:
    箱一覧:
      - 箱: END_紹介状有り：戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介状無し：戻る
        セリフ: none
        入力待ち: なし
