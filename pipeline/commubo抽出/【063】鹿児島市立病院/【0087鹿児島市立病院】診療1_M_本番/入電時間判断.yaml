flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月〜金）
              次の箱: 時間の分岐
          デフォルト: END_時間外
      - 箱: 時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: 平日の9時前
            - 判定: 数値
              入力: 17時まで
              次の箱: 平日9時〜17時（時間内）
          デフォルト: 平日17時以降（時間外）
      - 箱: 時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: 平日の9時前
            - 判定: 数値
              入力: 17時まで
              次の箱: 平日9時〜17時（時間内）
          デフォルト: 年末年始アナウンス
      - 箱: 時間の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時まで
              次の箱: 年末年始アナウンス
            - 判定: 数値
              入力: 17時まで
              次の箱: 平日9時〜17時（時間内）
          デフォルト: 平日17時以降（時間外）
      - 箱: 祝日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 平日の9時前
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 平日9時〜17時（時間内）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_稼働中
      - 箱: 平日17時以降（時間外）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日にちの分岐_1
      - 箱: テスト用ノード
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 日にちの分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/25まで
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 12/26
              次の箱: 時間の分岐_1
            - 判定: lessEqual
              入力: 12/27～1/4
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 1/5
              次の箱: 時間の分岐_2
          デフォルト: 曜日の分岐
      - 箱: 日にちの分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/29まで
              次の箱: 祝日
            - 判定: lessEqual
              入力: 12/30～1/3
              次の箱: 年末年始アナウンス
          デフォルト: 祝日
      - 箱: 年末年始アナウンス
        セリフ: 申し訳ございませんが、当院は年末年始、休診となっております。年始の受付再開時間は、１月５日月曜日の午前９時からとなっておりますので、恐れ入りますが、改めておかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始アナウンス

  終了:
    箱一覧:
      - 箱: END_稼働中
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始アナウンス
        セリフ: none
        入力待ち: なし
