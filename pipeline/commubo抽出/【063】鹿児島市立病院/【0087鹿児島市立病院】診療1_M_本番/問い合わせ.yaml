flow:
  最初の箱: 分岐

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2巡目
      - 箱: 予約希望日時
        セリフ: 「次回の予約日時を教えて欲しい」など、内容を簡潔にお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 2巡目
      - 箱: 折返し時間帯
        セリフ: ご都合の良い時間帯を「9時から12時」「12時から15時」「15時から17時」のようにお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 2巡目
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴き取り_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: 上記以外on
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2巡目
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: END_失敗
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。 再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐_1
      - 箱: 接続詞
        セリフ: それでは、ご確認内容についてお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約希望日時
      - 箱: 折返し
        セリフ: 当院より折返しお電話いたしますので、
        入力待ち: なし
        回答振り分け:
          デフォルト: 折返し時間帯
      - 箱: 分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 接続詞
            - 判定: 一致
              入力: 折返し
              次の箱: 折返し
      - 箱: 分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 予約希望日時
            - 判定: 一致
              入力: 折返し
              次の箱: 折返し時間帯
      - 箱: 2巡目
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 初回
              次の箱: 聴き取り
          デフォルト: 聴き取り_1

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_失敗
        セリフ: none
        入力待ち: なし
