flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n鹿児島市立病院の患者様向け初診専用AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 社内テスト用分岐
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 折返し
        セリフ: 土日祝日を除く、3診療日以内に担当者から折り返しご連絡いたします。担当者から折り返しする電話番号は発信専用ダイヤルとなっておりますので、担当者からの折り返し電話をお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: クローズ
        セリフ: を受付いたしました。土日祝日を除く、3診療日以内に、担当者から折り返しお電話いたします。担当者から折り返しする電話番号は発信専用ダイヤルとなっておりますので、担当者からの折り返し電話をお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: キャンセル
        セリフ: "予約キャンセルを受付いたしました。\n内容により、当院よりご連絡差し上げる場合がございます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 問い合わせ
            - 判定: 一致
              入力: 折返し
              次の箱: 問い合わせ
            - 判定: 一致
              入力: 変更
              次の箱: 診療科
            - 判定: 一致
              入力: キャンセル
              次の箱: 診療科
            - 判定: 一致
              入力: 初診
              次の箱: 初診確認
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 現在の予約日
            - 判定: 一致
              入力: キャンセル
              次の箱: 現在の予約日
            - 判定: 一致
              入力: 初診
              次の箱: 用件を判断_2
            - 判定: 一致
              入力: 確認
              次の箱: 用件を判断_2
            - 判定: 一致
              入力: 折返し
              次の箱: 用件を判断_2
      - 箱: 用件を判断_2
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル
            - 判定: 一致
              入力: 初診
              次の箱: 初診
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: 確認
              次の箱: 確認
            - 判定: 一致
              入力: 折返し
              次の箱: 折返し
      - 箱: 用件を判断_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 用件を判断_1
            - 判定: 一致
              入力: キャンセル
              次の箱: 用件を判断_1
            - 判定: 一致
              入力: 初診
              次の箱: 紹介元電話番号
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 紹介元番号判別_1
      - 箱: 用件
        セリフ: none
        説明: サブシナリオ「用件」を呼び出す
        参照ファイル: 用件.yaml
        回答振り分け:
          デフォルト: 氏名
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 連絡先電話番号
        セリフ: none
        説明: サブシナリオ「連絡先電話番号」を呼び出す
        参照ファイル: 連絡先電話番号.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 用件NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗
      - 箱: 紹介状NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗
      - 箱: 連絡先番号NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗
      - 箱: 紹介状
        セリフ: none
        説明: サブシナリオ「紹介状」を呼び出す
        参照ファイル: 紹介状.yaml
        回答振り分け:
          デフォルト: 折返しに_3
      - 箱: 診療科
        セリフ: none
        説明: サブシナリオ「診療科」を呼び出す
        参照ファイル: 診療科.yaml
        回答振り分け:
          デフォルト: 折返しに_4
      - 箱: 現在の予約日
        セリフ: none
        説明: サブシナリオ「現在の予約日」を呼び出す
        参照ファイル: 現在の予約日.yaml
        回答振り分け:
          デフォルト: 折返しに_6
      - 箱: 問い合わせ
        セリフ: none
        説明: サブシナリオ「問い合わせ」を呼び出す
        参照ファイル: 問い合わせ.yaml
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 紹介状無しアナウンス
        セリフ: "紹介状が必須のため近隣の医療機関へ受診をお願いします。\n紹介状をおとりになられましたら、再度ご連絡をお願いいたします。\nお電話ありがとうございました。それでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 氏名
        セリフ: none
        説明: サブシナリオ「氏名」を呼び出す
        参照ファイル: 氏名.yaml
        回答振り分け:
          デフォルト: 生年月日
      - 箱: 生年月日
        セリフ: none
        説明: サブシナリオ「生年月日」を呼び出す
        参照ファイル: 生年月日.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号
      - 箱: 初診
        セリフ: 初診予約の申し込み
        入力待ち: なし
        回答振り分け:
          デフォルト: クローズ
      - 箱: 変更
        セリフ: 予約変更の申し込み
        入力待ち: なし
        回答振り分け:
          デフォルト: クローズ
      - 箱: 確認
        セリフ: ご予約に関するお問い合わせ
        入力待ち: なし
        回答振り分け:
          デフォルト: クローズ
      - 箱: 時間外
        セリフ: 申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、土日祝日を除く、平日月曜日から金曜日の９時から１７時となっております。恐れ入りますが、受付時間内におかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 年末年始終話へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 失敗
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。受付時間は、平日月曜日から金曜日の９時から16時となっております。\n電話番号は　099-230-7000　です。代表電話に初診紹介予約についてとお伝えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 新生児内科：代表案内
        セリフ: "申し訳ございません。恐れ入りますが、代表電話へおかけ直しください。受付時間は、平日月曜日から金曜日の９時から16時となっております。\n電話番号は　099-230-7000　です。代表電話に初診紹介予約についてとお伝えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 再診：代表案内
        セリフ: 申し訳ございません。この電話は、初診予約専用電話となっております。恐れ入りますが、再診の方は代表電話におかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 紹介元病院
        セリフ: none
        説明: サブシナリオ「紹介元病院」を呼び出す
        参照ファイル: 紹介元病院.yaml
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 紹介元番号判別
        セリフ: none
        説明: サブシナリオ「紹介元番号判別」を呼び出す
        回答振り分け:
          デフォルト: 紹介元病院名取得
      - 箱: 紹介元番号判別_1
        セリフ: none
        説明: サブシナリオ「紹介元番号判別」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 紹介元病院名取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 診療科分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新生児内科
              次の箱: 新生児内科：代表案内
            - 判定: 一致
              入力: 精神科
              次の箱: 精神科
          デフォルト: 用件を判断_3
      - 箱: 精神科
        セリフ: 精神科ですね。申し訳ございません。当院の精神科は、入院患者様のみのご対応とさせていただいております。恐れ入りますが、近隣の医療機関へ外来受診をお願いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: ①
        セリフ: 医療機関の方は、医療機関直通ダイヤルもしくはWEB予約をご利用ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件
      - 箱: 連携医療機関からの入電
        セリフ: "恐れ入りますが、医療機関の方は、医療機関直通ダイヤルへおかけなおしください。\n電話番号は、099-230-7115です。繰り返します。電話番号は、099-230-7115です。繰り返します。電話番号は、099-230-7115です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 冒頭
        セリフ: お電話ありがとうございます。鹿児島市立病院の、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 社内テスト用分岐_1
      - 箱: 初診確認
        セリフ: none
        説明: サブシナリオ「初診確認」を呼び出す
        参照ファイル: 初診確認.yaml
        回答振り分け:
          デフォルト: 折返しに_2
      - 箱: 社内テスト用分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 渡部
              次の箱: ①
            - 判定: 一致
              入力: 新坂
              次の箱: ①
            - 判定: 一致
              入力: 鹿児島①
              次の箱: ①
            - 判定: 一致
              入力: 鹿児島②
              次の箱: ①
          デフォルト: 入電時間判断
      - 箱: 社内テスト用分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 渡部
              次の箱: 連携医療機関からの入電
          デフォルト: 入電時間判断_1
      - 箱: 折返しに
        セリフ: 折返しの際にご確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日
      - 箱: 折返しに_1
        セリフ: 折返しの際にご確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号
      - 箱: 折返しに_2
        セリフ: 折返しの際にご確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状
      - 箱: 折返しに_3
        セリフ: 折返しの際にご確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科
      - 箱: 折返しに_4
        セリフ: 折返しの際にご確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科分岐
      - 箱: 折返しに_5
        セリフ: 折返しの際にご確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介元病院
      - 箱: 折返しに_6
        セリフ: 折返しの際にご確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断_2
      - 箱: 紹介元電話番号
        セリフ: none
        説明: サブシナリオ「紹介元電話番号」を呼び出す
        参照ファイル: 紹介元電話番号.yaml
        回答振り分け:
          デフォルト: 紹介元番号判別
      - 箱: 入電時間判断
        セリフ: none
        説明: サブシナリオ「入電時間判断」を呼び出す
        参照ファイル: 入電時間判断.yaml
        回答振り分け:
          デフォルト: ①
      - 箱: 入電時間判断_1
        セリフ: none
        説明: サブシナリオ「入電時間判断」を呼び出す
        参照ファイル: 入電時間判断.yaml
        回答振り分け:
          デフォルト: 連携医療機関からの入電

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
