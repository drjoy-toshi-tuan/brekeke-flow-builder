flow:
  最初の箱: 生年月日の聴取へ

  エンティティ定義:
    カスタム:
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []

  共通:
    箱一覧:
      - 箱: 生年月日の聴取へ
        セリフ: 患者さんの、生年月日をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 日付チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 値含む
              入力: 日の発話あり
              次の箱: 日付チェック_2
            - 判定: 値含む
              入力: 月の発話あり
              次の箱: 月の発話あり
            - 判定: 値含む
              入力: 年の発話あり
              次の箱: 日付チェック_3
          デフォルト: 日付チェック_3
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: 値含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち
              次の箱: 月チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち
              次の箱: 月チェック
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 日付
              次の箱: 日付チェック
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 生年月日セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
          デフォルト: 聴取内容チェック
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問
      - 箱: リセット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問_1
      - 箱: リセット_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付再設定へ
      - 箱: リセット_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 無言9（5秒）＋日にちなし
              次の箱: リセット
            - 判定: 一致
              入力: 無言9（5秒）＋日にちなし
              次の箱: リセット
            - 判定: 数値以上
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: 日付チェック_1
            - 判定: エンティティ含む
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: 日付チェック_1
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再度質問
        セリフ: "恐れ入りますが、\n「昭和45年4月1日」や「1970年4月1日」のように、正確にお話いただけますか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 聞き取り完了
        セリフ: "<? $生年月日（復唱用） ?>\n、でよろしいですか?\n　「はい、そうです」または「いいえ、違います」、とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日確認
      - 箱: 日付チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 日付あり
              次の箱: 生年月日の判定
          デフォルト: リセット
      - 箱: 日付チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 月チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01月
              次の箱: 日チェック
          デフォルト: 月の置換
      - 箱: 日付チェック_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
            - 判定: 一致
              入力: 01月
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 日チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日の置換
      - 箱: 月の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日チェック
      - 箱: 日の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: 数字を日付に
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 0以下
              次の箱: 聞き取りへ戻る
            - 判定: lessEqual
              入力: 9以下
              次の箱: 0桁詰め
            - 判定: lessEqual
              入力: 31以下
              次の箱: 日の置換
          デフォルト: 聞き取りへ戻る
      - 箱: 0桁詰め
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日の置換
      - 箱: 聞き取りへ戻る
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 生年月日の判定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 大正
            - 判定: 数値
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 大正
            - 判定: 数値以上
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 昭和元年
            - 判定: 数値
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 昭和元年
            - 判定: 数値以上
              入力: 1927〜1988（昭和）
              次の箱: 昭和
            - 判定: 数値
              入力: 1927〜1988（昭和）
              次の箱: 昭和
            - 判定: 数値以上
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 昭和
            - 判定: 数値
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 昭和
            - 判定: 数値以上
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 平成元年
            - 判定: 数値
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 平成元年
            - 判定: 数値以上
              入力: 1990〜2018（平成）
              次の箱: 平成
            - 判定: 数値
              入力: 1990〜2018（平成）
              次の箱: 平成
            - 判定: 数値以上
              入力: 2019-01-01〜04-30（平成）
              次の箱: 平成
            - 判定: 数値
              入力: 2019-01-01〜04-30（平成）
              次の箱: 平成
            - 判定: 数値以上
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 令和元年
            - 判定: 数値
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 令和元年
            - 判定: 数値以上
              入力: 2020〜（令和）
              次の箱: 令和
          デフォルト: リセット_1
      - 箱: 大正
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 発話が西暦か和暦か
      - 箱: 昭和元年
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 発話が西暦か和暦か
      - 箱: 昭和
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 発話が西暦か和暦か
      - 箱: 平成元年
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 発話が西暦か和暦か
      - 箱: 平成
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 発話が西暦か和暦か
      - 箱: 令和元年
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 発話が西暦か和暦か
      - 箱: 令和
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 発話が西暦か和暦か
      - 箱: 発話が西暦か和暦か
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 和暦の発話
              次の箱: 復唱セット（和暦）
          デフォルト: 復唱セット（西暦）
      - 箱: 復唱セット（和暦）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 復唱セット（西暦）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 月の発話あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_2
      - 箱: 月の発話あり_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 月チェック
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 生年月日確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n恐れ入りますが、\n「昭和45年4月1日」や「1970年4月1日」のように、正確にお話いただけますか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 生年月日確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 日付
              次の箱: リセット_2
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 日付再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック
      - 箱: ダイヤルプッシュ案内
        セリフ: "なお、AIが生年月日を正しく認識しない場合は、ダイヤルプッシュでの入力も可能です。\n再度、患者さんの生年月日をおっしゃっていただくか、ダイヤルプッシュで西暦8桁の数字を入力してください。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 生年月日セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 8桁取得
              次の箱: 生年月日形式変更
          デフォルト: 無言クリア
      - 箱: 生年月日形式変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 2回以上
              次の箱: 聴取できず
          デフォルト: 再度質問
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 3回以上
              次の箱: 聴取できず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 2回以上
              次の箱: 聴取できず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 3回以上
              次の箱: 聴取できず
          デフォルト: リセット
      - 箱: 聴取できず
        セリフ: 申し訳ございません。上手く聞き取りができなかったため、後ほど担当者より確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット_3

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
