  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（新規予約）
        セリフ: 受診を希望される診療科をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 00分岐あり診療科
              次の箱: 00分岐あり診療科セット
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科セット
            - 判定: エンティティ含む
              入力: わからない
              次の箱: END_わからない
            - 判定: エンティティ含む
              入力: 01分岐あり診療科
              次の箱: 01分岐あり診療科セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: Count再質問
          デフォルト: 診療科の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません、うまく聞き取ることができませんでした。わからない場合は「わからない」、と、お話ください。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取りへ（新規予約）
      - 箱: 分岐なし診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科読み取得
      - 箱: 00分岐あり診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐あり診療科読み取得
      - 箱: 01分岐あり診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐あり診療科読み取得
      - 箱: 分岐なし診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐なし診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 分岐あり診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐あり診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 分岐あり診療科読み取得_1
      - 箱: 診療科読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 分岐あり診療科読み取得_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐確認へ
      - 箱: 診療科確認へ
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか?\n「はい、そうです」または「いいえ、違います」とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 01分岐あり診療科
              次の箱: 01分岐あり診療科再設定へ
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科再設定へ
            - 判定: エンティティ含む
              入力: 00分岐あり診療科
              次の箱: 00分岐あり診療科再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 診療科分岐
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 診療科分岐
          デフォルト: count上記以外_1
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: Count再質問_1
          デフォルト: 診療科を確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取りへ（新規予約）
      - 箱: 分岐なし診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科セット
      - 箱: 00分岐あり診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 00分岐あり診療科セット
      - 箱: 01分岐あり診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 01分岐あり診療科セット
      - 箱: 分岐確認へ
        セリフ: "<? $分岐あり診療科の読み ?>\nですね？"
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 眼科
              次の箱: 3歳児健診確認
            - 判定: 一致
              入力: 整形外科
              次の箱: （学校健診・側弯症）整形外科確認
      - 箱: Count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 再度聞き取りへ
      - 箱: Count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 再度聞き取りへ_1
      - 箱: スキップ
        セリフ: 申し訳ございません。上手く聞き取りができませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れない
      - 箱: 3歳児健診確認
        セリフ: "3歳児健診結果での受診でしょうか。\nはい、そうです、またはいいえ、違います、のようにお話ください。\nダイヤルプッシュでも操作可能です。はいの場合は１、いいえの場合は２、を押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定
      - 箱: 肯定否定
        セリフ: none
        説明: サブシナリオ「肯定否定」を呼び出す
        回答振り分け:
          デフォルト: 三歳児健診眼科
      - 箱: 肯定否定_1
        セリフ: none
        説明: サブシナリオ「肯定否定」を呼び出す
        回答振り分け:
          デフォルト: 学校健診整形外科
      - 箱: （学校健診・側弯症）整形外科確認
        セリフ: "学生の方の学校検診の結果での受診でしょうか。\nはい、そうです、またはいいえ、違います、のようにお話ください。\nダイヤルプッシュでも操作可能です。はいの場合は１、いいえの場合は２、を押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定_1
      - 箱: 診療科分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 乳腺外科
              次の箱: END_戻る
            - 判定: 一致
              入力: 泌尿器科
              次の箱: END_戻る
            - 判定: 一致
              入力: 小児科
              次の箱: END_戻る
            - 判定: 一致
              入力: 小児外科
              次の箱: END_戻る
            - 判定: 一致
              入力: 血管外科
              次の箱: END_戻る
            - 判定: 一致
              入力: 心臓外科
              次の箱: END_戻る
            - 判定: 一致
              入力: 産婦人科
              次の箱: END_産婦人科
          デフォルト: END_非対応診療科
      - 箱: 三歳児健診眼科
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 学校健診整形外科
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_わからない
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_産婦人科
        セリフ: none
        入力待ち: なし
      - 箱: END_非対応診療科
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れない
        セリフ: none
        入力待ち: なし
