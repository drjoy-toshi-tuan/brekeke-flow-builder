flow:
  最初の箱: タイトル

  エンティティ定義:
    カスタム:
      - 名前: キャンセル
        値:
          キャンセル: [３, 3, 3番, さん, サン, さんばん, みっつめ, やめる, 三, 三つ目, 取り消し, 取り消す, 取消]
      - 名前: もう一度
        値:
          もう一度: [なんて, もう一回, もっかい, わからな, わからん, 聞こえない]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 確認
        値:
          確認: [4, ４, 4番, お聞き, なくした, よっつめ, よん, ヨン, よんばん, 教えて, 四, 四つ目, 調べて, 分からない, 分からん, 紛失, 忘れた, 予約票]
      - 名前: 間違い
        値:
          間違い: [違う, 間違え]
      - 名前: 再診予約
        値:
          再診: [はい新薬, 安心, 再診予約, 最新, 最新訳, 三信, 三新薬, 耐震]
      - 名前: 初めて
        値:
          はじめて: []
      - 名前: 初診予約
        値:
          初診: [はじめて, 禁忌, 写真, 終身, 初めて, 初診予約, 新規, 新規の予約, 新規予約, 新品]
      - 名前: 新規
        値:
          新規: [はじめて, 禁忌, 写真, 終身, 初めて, 初診, 新規の予約, 新規予約, 新旧, 新品]
      - 名前: 診察予約
        値:
          診察予約: [1, １, １番, いち, イチ, いちばん, はじめて, ひとつめ, を取る, 一, 一つ目, 印刷, 豪ドル, 撮りたい, 取りたい, 取りたい, 取得, 受診, 初めて, 新規, 診察, 診察の予約, 診療予約, 入れたい, 予約お願い, 予約する, 予約をお願い, 予約をしたい, 予約をしたい, 予約をする, 予約をとり, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい]
      - 名前: 定期受診
        値:
          定期受診: [はい新薬, 再診, 最新, 三新薬, 定期, 定期受診予約]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 変更
        値:
          変更: [2, ２, ２ばん, ２番, にばん, ふたつめ, 延期, 時間, 二, 二つ目, 日程, 日付, 判子, 別の, 変え]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の４つのうちの、いずれかでお話ください。\n「診察の予約は、１」\n「予約の変更は、２」\n「予約のキャンセルは、３」\n「予約の確認は、４ 」、 それでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
            - 判定: エンティティ含む
              入力: 予約以外
              次の箱: 予約以外
            - 判定: エンティティ含む
              入力: 予約確認
              次の箱: 用件セット_2
            - 判定: エンティティ含む
              入力: 予約変更
              次の箱: 用件セット
            - 判定: エンティティ含む
              入力: 予約キャンセル
              次の箱: 用件セット_1
            - 判定: エンティティ含む
              入力: 再診予約
              次の箱: 用件セット_3
            - 判定: エンティティ含む
              入力: 初診予約
              次の箱: 用件セット_3
            - 判定: エンティティ含む
              入力: 予約取得
              次の箱: 用件セット_3
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: もしもし
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: 聞き取りできず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取り失敗
          デフォルト: ダイヤルミス
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取り失敗
          デフォルト: 否定
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\nダイヤルプッシュでも操作可能です。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 予約以外
        セリフ: "申し訳ございません。\nこちらは予約専用ダイヤルとなっております。\nご予約以外のお問い合わせにつきましては、代表電話へおかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_予約以外の用件
      - 箱: 予約変更へ進む
        セリフ: "ご予約の変更でよろしいですか?\n「はい、そうです」または「いいえ、違います」とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約確認へ進む
        セリフ: "ご予約の確認でよろしいですか?\n「はい、そうです」または「いいえ、違います」とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約キャンセルへ進む
        セリフ: "ご予約のキャンセルでよろしいですか?\n「はい、そうです」または「いいえ、違います」とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察
              次の箱: 診察へ進む
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更へ進む
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルへ進む
            - 判定: 一致
              入力: 新規予約
              次の箱: 診察へ進む
            - 判定: 一致
              入力: 予約確認
              次の箱: 予約確認へ進む
      - 箱: 用件セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約変更へ進む
      - 箱: 用件セット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約キャンセルへ進む
      - 箱: 用件セット_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約確認へ進む
      - 箱: 診察へ進む
        セリフ: "診察のご予約でよろしいですか?\n「はい、そうです」または「いいえ、違います」とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 予約確認
              次の箱: 予約確認へ
            - 判定: エンティティ含む
              入力: 予約変更
              次の箱: 予約変更へ
            - 判定: エンティティ含む
              入力: 予約キャンセル
              次の箱: 予約キャンセルへ
            - 判定: エンティティ含む
              入力: 再診予約
              次の箱: 診察予約へ
            - 判定: エンティティ含む
              入力: 初診予約
              次の箱: 診察予約へ
            - 判定: エンティティ含む
              入力: 予約取得
              次の箱: 診察予約へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外_1
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件セット_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察へ進む
      - 箱: 予約変更へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット
      - 箱: 予約キャンセルへ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット_1
      - 箱: 診察予約へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット_3
      - 箱: 予約確認へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット_2
      - 箱: もしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし1回目
      - 箱: もしもし1回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もう一度
        セリフ: "かしこまりました。\nそれでは、再度、ご案内いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: タイトル
        セリフ: 初めに
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1.診察
              次の箱: 用件セット_3
            - 判定: 一致
              入力: 2.変更
              次の箱: 用件セット
            - 判定: 一致
              入力: 3.キャンセル
              次の箱: 用件セット_1
            - 判定: 一致
              入力: 4.確認
              次の箱: 用件セット_2
          デフォルト: count再質問_2
      - 箱: ダイヤルミス
        セリフ: 正しい番号が押されませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 聞き取りできず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗

  終了:
    箱一覧:
      - 箱: END_予約以外の用件
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。\n後ほど担当者より確認をさせていただきます。"
        入力待ち: なし
