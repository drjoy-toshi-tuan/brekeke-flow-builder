flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 4/29 分岐
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 4/29 分岐
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 11/24分岐
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （平日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 7時前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 21時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 17時半まで
              次の箱: 年末年始
          デフォルト: END_受付時間外
      - 箱: 年末年始
        セリフ: 申し訳ございませんが、12月27日から1月4日まで休診のため、ただいまの時間は受付時間外となっております。年始のAI電話受付は、1月5日、午前8時から開始いたします。恐れ入りますが、1月5日以降におかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始
      - 箱: 11/24分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: "1月3日前（12/30,12/31,1/1,1/2,1/3)"
              次の箱: 年末年始
          デフォルト: END_受付時間外
      - 箱: 11/24分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12月27日前
              次の箱: 曜日の分岐
            - 判定: lessEqual
              入力: 12月29日（27，28，29）
              次の箱: 年末年始
            - 判定: 一致
              入力: 1月4日当日
              次の箱: （平日）時間の分岐_1
          デフォルト: 曜日の分岐
      - 箱: 4/29 分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 4月29日
              次の箱: （平日）時間の分岐
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
