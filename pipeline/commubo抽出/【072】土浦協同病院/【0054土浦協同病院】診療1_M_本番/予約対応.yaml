flow:
  最初の箱: タイトル

  エンティティ定義:
    カスタム:
      - 名前: キャンセル
        値:
          キャンセル: [やめる, 取り消し, 取り消す, 取消]
      - 名前: それ以外
        値:
          それ以外: [3, ３, 3番, いつもの, さん, サン, さんばん, その他, それ以外, なにもない, みっつめ, 三, 三つ目, 診察, 診療, 普通の, 予約]
      - 名前: もう一度
        値:
          もう一度: [もう一回]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 確認
        値:
          確認: [お聞き, なくした, 教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 予約票]
      - 名前: 間違い
        値:
          間違い: [違う, 間違え]
      - 名前: 健診結果
        値:
          健診結果: [２, 2, にばん, ふたつめ, 健康診断, 再検査, 精密検査, 二, 二つ目, 二番, 要精検]
      - 名前: 再診予約
        値:
          再診: [はい新薬, 安心, 再診予約, 最新, 最新訳, 三信, 三新薬, 耐震]
      - 名前: 初めて
        値:
          はじめて: []
      - 名前: 初診予約
        値:
          初診: [はじめて, 禁忌, 写真, 終身, 初めて, 初診予約, 新規, 新規の予約, 新規予約, 新品]
      - 名前: 紹介状
        値:
          紹介状: [1, １, イチ, いち, いちばん, ひとつめ, 案内状, 一, 一つ目, 一番, 手紙, 照会, 照会状, 紹介状, 情報提供書, 診療情報提供書, 提供書]
      - 名前: 新規
        値:
          新規: [はじめて, 禁忌, 写真, 終身, 初めて, 初診, 新規の予約, 新規予約, 新旧, 新品]
      - 名前: 診察予約
        値:
          診察予約: [はじめて, を取る, 印刷, 豪ドル, 撮りたい, 取りたい, 取りたい, 取得, 受診, 初めて, 新規, 診察, 診察の予約, 診療予約, 入れたい, 予約お願い, 予約する, 予約をお願い, 予約をしたい, 予約をしたい, 予約をする, 予約をとり, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい]
      - 名前: 定期受診
        値:
          定期受診: [はい新薬, 再診, 最新, 三新薬, 定期, 定期受診予約]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 変更
        値:
          変更: [延期, 時間, 日程, 日付, 判子, 別の, 変え]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "次の3つのうち、いずれかでお話ください。\n「紹介状をお持ちの方は、1」、\n「健診結果をお持ちの方は、２」、\n「それ以外の方は、３」、\nそれではお話ください。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
            - 判定: エンティティ含む
              入力: 健診結果
              次の箱: 用件セット
            - 判定: エンティティ含む
              入力: それ以外
              次の箱: 用件セット_1
            - 判定: エンティティ含む
              入力: 紹介状
              次の箱: 用件セット_2
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: もしもし
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ_1
          デフォルト: 用件を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\nダイヤルプッシュでも操作可能です。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 健診結果へ進む
        セリフ: "健診結果をお持ちでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: それ以外へ進む
        セリフ: "それ以外でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 紹介状
              次の箱: 紹介状へ進む
            - 判定: 一致
              入力: 健診結果
              次の箱: 健診結果へ進む
            - 判定: 一致
              入力: それ以外
              次の箱: それ以外へ進む
      - 箱: 用件セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診結果へ進む
      - 箱: 用件セット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: それ以外へ進む
      - 箱: 紹介状へ進む
        セリフ: "紹介状をお持ちでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 健診結果
              次の箱: 予約変更へ
            - 判定: エンティティ含む
              入力: それ以外
              次の箱: 予約キャンセルへ
            - 判定: エンティティ含む
              入力: 紹介状
              次の箱: 診察予約へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外_1
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件セット_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状へ進む
      - 箱: 予約変更へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット
      - 箱: 予約キャンセルへ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット_1
      - 箱: 診察予約へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット_2
      - 箱: もしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし1回目
      - 箱: もしもし1回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もう一度
        セリフ: "かしこまりました。\nそれでは、再度、ご案内いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: タイトル
        セリフ: 恐れ入りますが、本日これから受診されたい方は、代表番号におかけなおしください。それでは、予約についてお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1.紹介状
              次の箱: 用件セット_2
            - 判定: 一致
              入力: 2.健診結果
              次の箱: 用件セット
            - 判定: 一致
              入力: 3.それ以外
              次の箱: 用件セット_1
          デフォルト: ダイヤルミス
      - 箱: ダイヤルミス
        セリフ: 正しい番号が押されませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
