flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 時間内：冒頭挨拶
        セリフ: "お電話ありがとうございます。\n土浦協同病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 8時半前_1
      - 箱: 時間外：冒頭挨拶
        セリフ: "お電話ありがとうございます。\n土浦協同病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間外アナウンス
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日の聞き取り
      - 箱: 確認内容の聞き取りへ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認内容の聞き取り
      - 箱: 次へ_1
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認_2
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察
              次の箱: 新規予約の流れ
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更の流れ
            - 判定: 一致
              入力: 予約確認
              次の箱: 予約確認の流れ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルの流れ
          デフォルト: 用件聴取失敗時受付完了
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号
      - 箱: 次へ_3
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 携帯番号あり
          デフォルト: 携帯番号なし
      - 箱: 新規予約の流れ
        セリフ: 診療予約の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 予約キャンセルの流れ
        セリフ: 予約キャンセルを受付いたしました。必要がある場合のみ、担当者よりご連絡させていただきます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 携帯番号あり
        セリフ: "このあとすぐに、通話内容の確認、修正ができるショートメッセージをお送りしますので、必ずご確認ください。\n土日祝日を除く2日以内にショートメッセージ、もしくは病院代表番号、029-830-3711からお電話にてご連絡いたしますので、担当者から連絡があるまでお待ちください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ
        セリフ: 予約変更の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 予約確認の流れ
        セリフ: 予約確認の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 携帯番号なし
        セリフ: 土日、祝日を除く、2日以内に病院代表番号、029-830-3711からお電話にてご連絡いたしますので、担当者から連絡があるまでお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件聴取失敗時受付完了
        セリフ: 予約に関するお問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ
            - 判定: 一致
              入力: 診察
              次の箱: リハビリだけ代表案内_1
            - 判定: 一致
              入力: 予約変更
              次の箱: リハビリだけ代表案内
      - 箱: 用件の確認_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 変更理由
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル理由
          デフォルト: 次へ_2
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約確認
              次の箱: 確認内容の聞き取りへ
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更へ
            - 判定: 一致
              入力: 診察
              次の箱: 予約対応
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 複数診療科確認
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 紹介状
              次の箱: 紹介元医療機関名
            - 判定: 一致
              入力: 健診結果
              次の箱: 健診場所確認
          デフォルト: 再診確認
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間判別へ
      - 箱: API_DRJOY_1
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 地域連携室転送
      - 箱: 予約変更へ
        セリフ: "AI電話では、診察予約の変更のみ対応しています。本日これから受診されたい方、\nリハビリのご予約に関すること、時間指定のある検査の、日程変更をご希望の方は、恐れ入りますが、代表番号におかけ直しください。\nそれでは、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 複数診療科確認
      - 箱: 電話切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 電話切断へ_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 最後に、ご連絡先のお電話番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 診療科聞き取り
        セリフ: none
        説明: サブシナリオ「診療科聞き取り」を呼び出す
        参照ファイル: 診療科聞き取り.yaml
        回答振り分け:
          デフォルト: 患者サポート外来
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_3
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の確認_2
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 紹介状分岐
      - 箱: 確認内容の聞き取り
        セリフ: none
        説明: サブシナリオ「確認内容の聞き取り」を呼び出す
        参照ファイル: 確認内容の聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 診察券番号
        セリフ: none
        説明: サブシナリオ「診察券番号」を呼び出す
        参照ファイル: 診察券番号.yaml
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: キャンセル理由
        セリフ: none
        説明: サブシナリオ「キャンセル理由」を呼び出す
        参照ファイル: キャンセル理由.yaml
        回答振り分け:
          デフォルト: 予約希望確認
      - 箱: リハビリだけ代表案内
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: リハビリ
              次の箱: リハビリ
          デフォルト: 予約日の聞き取り
      - 箱: リハビリだけ代表案内_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: リハビリ
              次の箱: リハビリ
          デフォルト: 次へ_2
      - 箱: 代表案内
        セリフ: "祝日を除く、月曜から金曜の、8時30分から17時に、代表電話へおかけなおしください。電話番号が分かる場合は、そのままお電話をお切りください。 分からない場合はご案内いたしますので、メモをご準備ください。\n電話番号は、029‐830‐3711です。繰り返します。\n電話番号は、029‐830‐3711です。繰り返します。\n電話番号は、029‐830‐3711です。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 代表案内_1
        セリフ: "祝日を除く、月曜から金曜の、8時30分から17時に、代表電話へおかけなおしください。電話番号が分かる場合は、そのままお電話をお切りください。 分からない場合はご案内いたしますので、メモをご準備ください。\n電話番号は、029‐830‐3711です。繰り返します。\n電話番号は、029‐830‐3711です。繰り返します。\n電話番号は、029‐830‐3711です。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 時間外アナウンス
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、祝日を除く、月曜から金曜の、8時から17時30分となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間外フラグ
      - 箱: 予防医療センター案内
        セリフ: "申し訳ございません。\nAI電話ではお受けできませんので、祝日を除く、月曜から金曜の7時から20時に、予防医療センターまでにお電話ください。\n電話番号が分かる場合は、そのままお電話をお切りください。 \n分からない場合はご案内いたしますので、メモをご準備ください。\n電話番号は、050‐1725‐6511です。繰り返します。\n電話番号は、050-1725-6511です。繰り返します。\n電話番号は、050-1725-6511です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 予約対応
        セリフ: none
        説明: サブシナリオ「予約対応」を呼び出す
        参照ファイル: 予約対応.yaml
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 紹介元医療機関名
        セリフ: none
        説明: サブシナリオ「紹介元医療機関名」を呼び出す
        参照ファイル: 紹介元医療機関名.yaml
        回答振り分け:
          デフォルト: 紹介元あとで確認
      - 箱: 紹介元あとで確認
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。\n紹介元医療機関については、後ほど担当者より、確認をさせていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 複数診療科確認
      - 箱: 診療科あとで確認
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。\n2つ目以降の診療科については、後ほど担当者より、確認をさせていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認_1
      - 箱: 健診場所確認
        セリフ: "「当院の予防医療センター」で受けられた結果をお持ちでしょうか？\nはい、またはいいえ、のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定
      - 箱: 再診確認
        セリフ: "予約されるのは現在通院中の診療科ですか？\nはい、またはいいえ、のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定_1
      - 箱: 医師からの指示確認
        セリフ: "今回は土浦協同病院の医師の指示でのご予約でしょうか？\nはい、またはいいえ、のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定_2
      - 箱: 選定療養費の確認
        セリフ: "当院では診療費とは別に、11000円の選定療養費を徴収しています。ご了承の上、受診を希望されますか？\nはい、またはいいえ、のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定_3
      - 箱: 予約希望確認
        セリフ: "次の予約希望はありますか？\nはい、またはいいえ、のようにお話ください。\nダイヤルプッシュでも操作可能です。\nはいの場合は１、いいえの場合は２、を押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定_4
      - 箱: 肯定否定
        セリフ: none
        説明: サブシナリオ「肯定否定」を呼び出す
        参照ファイル: 肯定否定.yaml
        回答振り分け:
          デフォルト: 診療科判断
      - 箱: 肯定否定_1
        セリフ: none
        説明: サブシナリオ「肯定否定」を呼び出す
        参照ファイル: 肯定否定.yaml
        回答振り分け:
          デフォルト: 複数診療科確認
      - 箱: 肯定否定_2
        セリフ: none
        説明: サブシナリオ「肯定否定」を呼び出す
        参照ファイル: 肯定否定.yaml
        回答振り分け:
          デフォルト: 診療科聞き取り
      - 箱: 肯定否定_3
        セリフ: none
        説明: サブシナリオ「肯定否定」を呼び出す
        参照ファイル: 肯定否定.yaml
        回答振り分け:
          デフォルト: 症状確認
      - 箱: 肯定否定_4
        セリフ: none
        説明: サブシナリオ「肯定否定」を呼び出す
        参照ファイル: 肯定否定.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 肯定否定_5
        セリフ: none
        説明: サブシナリオ「肯定否定」を呼び出す
        参照ファイル: 肯定否定.yaml
        回答振り分け:
          デフォルト: 複数診療科flagセット
      - 箱: 症状後で確認
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。\n症状については、後ほど担当者より、確認をさせていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 理由後で確認
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。\n変更理由については、後ほど担当者より、確認をさせていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日聞き取り
      - 箱: 症状確認
        セリフ: none
        説明: サブシナリオ「症状確認」を呼び出す
        参照ファイル: 症状確認.yaml
        回答振り分け:
