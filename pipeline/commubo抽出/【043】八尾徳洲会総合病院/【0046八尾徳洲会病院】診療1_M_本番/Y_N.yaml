flow:
  最初の箱: その他質問聞き取り（フリーワード）

  エンティティ定義:
    カスタム:
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []

  共通:
    箱一覧:
      - 箱: その他質問聞き取り（フリーワード）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: Y/N
      - 箱: 再度質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取れず
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。再度、お伺いいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: その他質問聞き取り（フリーワード）
      - 箱: Y/N
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_肯定
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_肯定
          デフォルト: タイトル
      - 箱: タイトル
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5
              次の箱: 再度質問の有無
          デフォルト: Y/N

  終了:
    箱一覧:
      - 箱: END_否定
        セリフ: none
        入力待ち: なし
      - 箱: END_肯定
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
