flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: 平日の時間分岐
            - 判定: 一致
              入力: 土曜日
              次の箱: 土曜の時間分岐
          デフォルト: END_時間外
      - 箱: 平日の時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: END_時間外
            - 判定: 数値
              入力: 16時まで
              次の箱: END_稼働中
          デフォルト: END_時間外
      - 箱: 土曜の時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: END_時間外
            - 判定: 数値
              入力: 11時まで
              次の箱: END_稼働中
          デフォルト: END_時間外
      - 箱: 平日の時間分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: END_時間外
            - 判定: 数値
              入力: 16時まで
              次の箱: END_稼働中
          デフォルト: 年末年始
      - 箱: 祝日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付分岐_1
      - 箱: 日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12/30前
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 1/4
              次の箱: 年末年始
          デフォルト: 曜日の分岐
      - 箱: 日付分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 12/30当日
              次の箱: 平日の時間分岐_1
            - 判定: 数値
              入力: 1/4前（12/30，12/31，1/1，1/2，1/3）
              次の箱: 年末年始
          デフォルト: 祝日
      - 箱: 年末年始
        セリフ: 12月31日から1月4日までは年末年始のため、休止しております。年始は1月5日より開始いたしますので、5日の8時以降におかけくださいますようお願いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始

  終了:
    箱一覧:
      - 箱: END_テスト
        セリフ: none
        入力待ち: なし
      - 箱: END_稼働中
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
