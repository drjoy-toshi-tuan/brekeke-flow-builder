flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n八尾徳洲会総合病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルの流れ（特定診療科）
          デフォルト: キャンセル以外の流れ
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 次へ(smsflag4）
          デフォルト: 次へ(smsflag3）
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ(smsflag4）
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 次へ(smsflag3）
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: キャンセル以外の流れ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約キャンセルの流れ（特定診療科）
        セリフ: "ご予約のキャンセルを承りました。\n必要に応じて、翌診療日までに職員より折り返しご連絡をさせていただく場合がございますのでご了承ください。\nまた、1か月以内にご連絡いただけましたら予約変更が可能です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約確認
              次の箱: 診療科
            - 判定: 一致
              入力: 予約変更
              次の箱: 診療科
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 診療科
          デフォルト: 歯科入電時間分岐
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約希望日
          デフォルト: フリーの内容確認
      - 箱: 用件を判断_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 次へ_2
          デフォルト: 予約日
      - 箱: 診察券無し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 診察券有り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間外接続
      - 箱: API_DRJOY_1
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 歯科転送
      - 箱: API_DRJOY_2
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 健診転送
      - 箱: 電話切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の確認_1
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 診察券無し
      - 箱: 予約希望日
        セリフ: none
        説明: サブシナリオ「予約希望日」を呼び出す
        参照ファイル: 予約希望日.yaml
        回答振り分け:
          デフォルト: フリーの内容確認
      - 箱: 代表案内
        セリフ: "電話番号は、072-993-8501です。\n繰り返します。\n電話番号は、072-993-8501です。\n繰り返します。\n電話番号は、072-993-8501です。\n繰り返します。\n電話番号は、072-993-8501です。\n繰り返します。\n電話番号は、072-993-8501です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: フリーの内容確認
        セリフ: none
        説明: サブシナリオ「フリーの内容確認」を呼び出す
        参照ファイル: フリーの内容確認.yaml
        回答振り分け:
          デフォルト: フリーの変更理由
      - 箱: フリーの変更理由
        セリフ: none
        説明: サブシナリオ「フリーの変更理由」を呼び出す
        参照ファイル: フリーの変更理由.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 歯科入電時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: 8時半前
            - 判定: lessEqual
              入力: 12時半まで
              次の箱: 8時半以降
            - 判定: lessEqual
              入力: 13時半まで
              次の箱: お昼休み
          デフォルト: 8時半以降
      - 箱: 病児案内
        セリフ: 大変申し訳ございませんが、病児保育診察は、代表電話へおかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内
      - 箱: 入電時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 16～17時
              次の箱: 電話切断へ
            - 判定: 数値
              入力: 17～19時
              次の箱: 代表案内(歯科夕診時間中)
          デフォルト: 電話切断へ
      - 箱: 健診入電時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 11時前
              次の箱: 11時前
          デフォルト: 11時以降
      - 箱: 聞き取れない切断
        セリフ: 大変申し訳ございません。うまく聞き取ることができませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話電話番号確認
      - 箱: 予約希望日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取れない切断
      - 箱: 診療科NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取れない切断
      - 箱: 生年月日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取れない切断
      - 箱: 終話電話番号確認
        セリフ: none
        説明: サブシナリオ「終話電話番号確認」を呼び出す
        参照ファイル: 終話電話番号確認.yaml
        回答振り分け:
          デフォルト: 終話
      - 箱: 時間外接続
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間判断
      - 箱: 用件NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取れない切断
      - 箱: 8時半前
        セリフ: "恐れ入りますが、ただ今の時間は歯科・口腔外科の予約変更・キャンセルはお受けしておりません。\n8：30以降におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 8時半以降
        セリフ: それでは、担当部署へ転送いたします。しばらくお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY_1
      - 箱: 11時前
        セリフ: "大変申し訳ございませんが、健診センターへのご用件は、本日ご予約の方は、代表番号072-993-8501へ、\n本日のご予約以外の方は、平日11時から16時までに健診センター直通072-993-6505までおかけ直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 11時以降
        セリフ: それでは、担当部署へ転送いたします。しばらくお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY_2
      - 箱: お昼休み
        セリフ: "恐れ入りますが、ただ今の時間は歯科・口腔外科の予約変更・キャンセルはお受けしておりません。\n13：30以降におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 歯科転送
        セリフ: none
        説明: サブシナリオ「歯科転送」を呼び出す
        回答振り分け:
          デフォルト: END_切断
      - 箱: 健診転送
        セリフ: none
        説明: サブシナリオ「健診転送」を呼び出す
        回答振り分け:
          デフォルト: END_切断
      - 箱: 転送失敗
        セリフ: 大変申し訳ございませんが、ただいまお電話が混み合っております。しばらくたってからおかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 転送失敗_1
        セリフ: 大変申し訳ございませんが、ただいまお電話が混み合っております。しばらくたってからおかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 時間外案内
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、日曜祝日を除く、月曜日から金曜日の8時から16時、土曜日は8時から11時となっております。\n本日のご予約の方は、代表電話へおかけください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 歯科夕診日チェック（隔週火木交互に実施）
      - 箱: 年末年始
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 代表案内(歯科夕診時間中)
        セリフ: "歯科口腔外科に関するお問い合わせは、\n代表電話へおかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 当日代表案内
        セリフ: それでは、代表電話番号へお掛け直しいただき、本日受診可能かご確認ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内
      - 箱: 時間判断
        セリフ: none
        説明: サブシナリオ「時間判断」を呼び出す
        参照ファイル: 時間判断.yaml
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 診療科
        セリフ: none
        説明: サブシナリオ「診療科」を呼び出す
        参照ファイル: 診療科.yaml
        回答振り分け:
          デフォルト: 用件を判断_2
      - 箱: 予約日
        セリフ: none
        説明: サブシナリオ「予約日」を呼び出す
        参照ファイル: 予約日.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: 歯科夕診日チェック（隔週火木交互に実施）
        セリフ: none
        説明: サブシナリオ「歯科夕診日チェック（隔週火木交互に実施）」を呼び出す
        回答振り分け:
          デフォルト: 入電時間分岐

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_テスト用に時間判別ノードスキップ
        セリフ: none
        入力待ち: なし
