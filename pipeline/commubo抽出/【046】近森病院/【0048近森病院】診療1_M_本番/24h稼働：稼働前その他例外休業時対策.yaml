flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付判断
      - 箱: 当日時間分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前（仮）
              次の箱: END_営業前
          デフォルト: END_受付時間内
      - 箱: 日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 4/21以前
              次の箱: END_営業前
            - 判定: 一致
              入力: 2025/4/22
              次の箱: 当日時間分岐
          デフォルト: END_受付時間内

  終了:
    箱一覧:
      - 箱: END_祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_営業前
        セリフ: none
        入力待ち: なし
