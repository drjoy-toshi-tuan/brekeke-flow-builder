flow:
  最初の箱: 受診者名聴取

  共通:
    箱一覧:
      - 箱: 受診者名聴取
        セリフ: 受診される方のお名前を、フルネームでお話下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 名前の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 人名
              次の箱: 名前セット
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋氏名なし
              次の箱: 再度質問
            - 判定: 一致
              入力: 無言9（5秒）＋氏名なし
              次の箱: 再度質問
            - 判定: 数値以上
              入力: 無言3（約2秒）＋氏名あり
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋氏名あり
              次の箱: END_戻る
          デフォルト: 無言on
      - 箱: 名前セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 再度質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診者名聴取

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
