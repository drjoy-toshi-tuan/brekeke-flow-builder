flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: お電話ありがとうございます。 近森病院の予約に関するAI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返し連絡後確定
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: ありがとうございます。次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 次へ_1
        セリフ: かしこまりました。では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 次へ_2
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断_3
      - 箱: 次へ_3
        セリフ: かしこまりました。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診者名聞き取り
      - 箱: 次へ_4
        セリフ: ありがとうございます。次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 用件を判断_1
          デフォルト: 用件を判断_2
      - 箱: 予約キャンセル
        セリフ: 予約キャンセルの申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: SMS/折り返しで対応
      - 箱: 予約
        セリフ: 診察予約の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: SMS/折り返しで対応
      - 箱: その他確認
        セリフ: 予約確認について、お問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: SMS/折り返しで対応
      - 箱: 変更
        セリフ: 予約変更の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: SMS/折り返しで対応
      - 箱: 予約キャンセル_1
        セリフ: 予約キャンセルの申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返しで対応
      - 箱: 予約_1
        セリフ: 診察予約の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返しで対応
      - 箱: その他確認_1
        セリフ: 予約確認について、お問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返しで対応
      - 箱: 変更_1
        セリフ: 予約変更の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返しで対応
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 診療聴取へ
        セリフ: かしこまりました。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科聞き取り
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 予約日
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約日
            - 判定: 一致
              入力: 確認
              次の箱: 内容聴取
            - 判定: 一致
              入力: 予約
              次の箱: 予約希望日
          デフォルト: 内容聴取
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル
            - 判定: 一致
              入力: 予約
              次の箱: 予約
            - 判定: 一致
              入力: その他確認
              次の箱: その他確認
          デフォルト: その他確認
      - 箱: 用件を判断_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 変更_1
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル_1
            - 判定: 一致
              入力: 予約
              次の箱: 予約_1
            - 判定: 一致
              入力: その他確認
              次の箱: その他確認_1
          デフォルト: その他確認_1
      - 箱: 用件を判断_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: 内容聴取
          デフォルト: 予約希望日
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 電話切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: ありがとうございます。最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 診療科聞き取り
        セリフ: none
        説明: サブシナリオ「診療科聞き取り」を呼び出す
        参照ファイル: 診療科聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: 受診者名聞き取り
        セリフ: none
        説明: サブシナリオ「受診者名聞き取り」を呼び出す
        参照ファイル: 受診者名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_4
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 診療聴取へ
      - 箱: 予約日
        セリフ: none
        説明: サブシナリオ「予約日」を呼び出す
        参照ファイル: 予約日.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 接続詞
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_3
      - 箱: 内容聴取
        セリフ: none
        説明: サブシナリオ「内容聴取」を呼び出す
        参照ファイル: 内容聴取.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 折り返し連絡後確定
        セリフ: このお電話で承る 内容は、担当者からの折り返しのご連絡により、確定となります。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件へ
      - 箱: 用件へ
        セリフ: まず初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 予約希望日
        セリフ: none
        説明: サブシナリオ「予約希望日」を呼び出す
        参照ファイル: 予約希望日.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 24h稼働：稼働前その他例外休業時対策
        セリフ: none
        説明: サブシナリオ「24h稼働：稼働前その他例外休業時対策」を呼び出す
        参照ファイル: 24h稼働：稼働前その他例外休業時対策.yaml
        回答振り分け:
          デフォルト: 折り返し連絡後確定
      - 箱: 稼働前（Complete flag：3)
        セリフ: この番号は、4月X日、朝8時半より利用開始となります。 ご利用開始以降に、お掛け直し下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: SMS/折り返しで対応
        セリフ: 後ほど、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 折り返しで対応
        セリフ: 後ほど、担当者から折り返し電話にてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 最後の質問
        セリフ: none
        説明: サブシナリオ「最後の質問」を呼び出す
        参照ファイル: 最後の質問.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 接続詞
        セリフ: 最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 最後の質問

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
