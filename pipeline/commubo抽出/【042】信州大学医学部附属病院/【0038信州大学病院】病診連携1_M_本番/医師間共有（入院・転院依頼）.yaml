flow:
  最初の箱: 質問

  共通:
    箱一覧:
      - 箱: 質問
        セリフ: "貴院と当院、医師間で本件は既にお話いただいてる状況ですか？\nはいの方は1番を、いいえの方は2番を\nダイヤルプッシュで選択してください。\nそれではご選択ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_いいえ
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_はい
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_はい
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 判別
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、か、「いいえ」、でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 質問
      - 箱: 再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回再質問
              次の箱: END_３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1：はい
              次の箱: END_はい
            - 判定: 一致
              入力: 2：いいえ
              次の箱: END_いいえ
          デフォルト: count上記以外

  終了:
    箱一覧:
      - 箱: END_はい
        セリフ: none
        入力待ち: なし
      - 箱: END_いいえ
        セリフ: none
        入力待ち: なし
      - 箱: END_３回聞き取れず
        セリフ: none
        入力待ち: なし
