flow:
  最初の箱: それでは

  エンティティ定義:
    カスタム:
      - 名前: 分からない
        値:
          分からない: [ません, わからない, わかりません, 解らない, 分かりません]

  共通:
    箱一覧:
      - 箱: 上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 医師名
        セリフ: 事前にご相談いただいた当院医師名をお話ください。分からない場合は「分からない」とお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 3再質問
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 3再質問
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: 上記以外
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 医師名
      - 箱: 3再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回以上
              次の箱: END_聞き取れず
          デフォルト: 再質問
      - 箱: それでは
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 医師名

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
