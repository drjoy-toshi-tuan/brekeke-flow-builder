flow:
  最初の箱: 用件の確認へ（FAX到着確認）

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 用件
        値:
          その他の問合せ: [3, その他, 三]
          紹介状の送信依頼: [1, イチ, 位置, 依頼, 一, 紹介, 紹介状, 送信]
          問い合わせの進捗確認: [2, 確認, 進捗, 二]

  共通:
    箱一覧:
      - 箱: 用件の確認へ（FAX到着確認）
        セリフ: "次のうちいずれかの番号をダイヤルプッシュで選択してください。\n「紹介状の送信依頼」は1番\n「問い合わせの進捗確認」は2番\n「その他の問合せ」は3番、\nそれではご選択ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ（FAX到着確認）
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ（FAX到着確認）
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ（FAX到着確認）
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 紹介状の送信依頼
              次の箱: 紹介状の送信依頼_1
            - 判定: 一致
              入力: 問い合わせの進捗確認
              次の箱: 問い合わせ回答
            - 判定: 一致
              入力: その他の問合せ
              次の箱: その他の問合せ_1
      - 箱: 紹介状の送信依頼
        セリフ: 紹介状の送信依頼ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 問い合わせの進捗確認
        セリフ: 問い合わせの進捗確認ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 紹介状の送信依頼_1
        セリフ: 紹介状の送信依頼ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 問い合わせ回答
        セリフ: 問い合わせの進捗確認ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: その他の問合せ
        セリフ: その他の問合せですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: その他の問合せ_1
        セリフ: その他の問合せですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: リセット
        セリフ: 再度、テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ（FAX到着確認）
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件取得できず
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 紹介状の送信依頼
            - 判定: 一致
              入力: 2
              次の箱: 問い合わせの進捗確認
            - 判定: 一致
              入力: 3
              次の箱: その他の問合せ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
