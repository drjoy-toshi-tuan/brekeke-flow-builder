flow:
  最初の箱: 分岐

  共通:
    箱一覧:
      - 箱: 情報提供依頼
        セリフ: 回答
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号アナウンス
      - 箱: 当日確認（入転院）
        セリフ: 入転院
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号アナウンス
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る：肯定
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る：肯定
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 判別
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、か、「いいえ」、でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐
      - 箱: 再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回再質問
              次の箱: END_３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 分岐
        セリフ: 本日または明日の
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 情報提供依頼
              次の箱: 情報提供依頼
            - 判定: 一致
              入力: 入院・転院相談
              次の箱: 当日確認（入転院）
      - 箱: 番号アナウンス
        セリフ: をご希望ですか？はいの方は1番を、いいえの方は2番をダイヤルプッシュで選択してください。それではご選択ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: いいえ：2
              次の箱: END_戻る
            - 判定: 一致
              入力: はい：1
              次の箱: END_戻る：肯定
          デフォルト: count上記以外

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る：肯定
        セリフ: none
        入力待ち: なし
      - 箱: END_３回聞き取れず
        セリフ: none
        入力待ち: なし
