flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 用件
        値:
          FAX到着確認: [1, イチ, ファックス, 位置, 一, 到着]
          その他問合せ: [4, その他, ヨン, 四, 問い合わせ]
          情報提供依頼: [2, 医療請求, 資料, 資料請求依頼, 書類, 情報, 診療情報提供依頼, 請求, 請求書, 二]
          入院転院依頼: [3, サン, 三, 受信, 相談, 天神依頼, 店員, 転院, 転院依頼, 入院, 入金, 返品]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件をダイヤルプッシュで選択してください。\n1「FAX到着確認」\n2「情報提供依頼」\n3「入院・転院依頼」\n4「その他問合せ」、\nそれでは、ご選択ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: 用件を確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
          デフォルト: END_再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: その他問合せ
              次の箱: 用件の復唱（その他問合せ）
            - 判定: 一致
              入力: 情報提供依頼
              次の箱: 用件の復唱（資料請求依頼）
            - 判定: 一致
              入力: FAX到着確認
              次の箱: 用件の復唱（FAX到着確認）
            - 判定: 一致
              入力: 入院転院依頼
              次の箱: 用件の復唱（入院・転院相談）
      - 箱: 用件の復唱（その他問合せ）
        セリフ: お問合せですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（入院・転院相談）
        セリフ: 入院・転院依頼ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（資料請求依頼）
        セリフ: 情報提供依頼ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（FAX到着確認）
        セリフ: FAX到着確認ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（その他問合せ）_1
        セリフ: お問合せですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（入院・転院依頼）
        セリフ: 入院・転院依頼ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（資料請求依頼）_1
        セリフ: 情報提供依頼ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の復唱（FAX到着確認）_1
        セリフ: FAX到着確認ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
            - 判定: エンティティ含む
              入力: 否定
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_コンテキスト変換
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_コンテキスト変換
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_コンテキスト変換
          デフォルト: count上記以外_1
      - 箱: リセット
        セリフ: 再度、テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件取得できず
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 用件の復唱（FAX到着確認）_1
            - 判定: 一致
              入力: 2
              次の箱: 用件の復唱（資料請求依頼）_1
            - 判定: 一致
              入力: 3
              次の箱: 用件の復唱（入院・転院依頼）
            - 判定: 一致
              入力: 4
              次の箱: 用件の復唱（その他問合せ）_1

  終了:
    箱一覧:
      - 箱: END_再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
      - 箱: END_コンテキスト変換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入院転院依頼
