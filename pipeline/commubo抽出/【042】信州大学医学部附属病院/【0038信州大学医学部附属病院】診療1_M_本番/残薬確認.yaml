flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定エンティティ
        値:
          はい: [1, あります, ある, いいです, 一, 一番, 足りる, 余り]
      - 名前: 処方されない
        値:
          処方: [3, 三, 三番, 処方されない, 処方されません, 処方しない]
      - 名前: 否定エンティティ
        値:
          いいえ: [2, いえいえ, ない, 足りない, 足りません, 二番]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: "当院で処方されている方は、希望の予約変更日までのお薬が足りますか？次の３つのいずれかでお応えください。\n1「はい大丈夫です」、2「いいえ足りません」、3「処方されていません」。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 処方
              次の箱: 処方されない
            - 判定: エンティティ含む
              入力: 否定
              次の箱: お薬の結果
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: お薬の結果
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: お薬足りる
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: お薬足りる
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: お薬足りる
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫」、や、「いいえ足りません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: お薬足りる
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_足りる
      - 箱: 処方されない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_処方されない
      - 箱: お薬の結果
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_足りない
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: お薬の結果
            - 判定: 一致
              入力: 2
              次の箱: お薬足りる
            - 判定: 一致
              入力: 3
              次の箱: 処方されない

  終了:
    箱一覧:
      - 箱: END_足りない
        セリフ: none
        入力待ち: なし
      - 箱: END_足りる
        セリフ: none
        入力待ち: なし
      - 箱: END_処方されない
        セリフ: none
        入力待ち: なし
