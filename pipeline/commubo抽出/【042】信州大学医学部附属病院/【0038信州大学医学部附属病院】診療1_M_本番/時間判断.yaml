flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 稼働日： 4/10
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月〜金）
              次の箱: 時間の分岐
          デフォルト: END_時間外
      - 箱: 曜日の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月〜金）
              次の箱: END_稼働中
          デフォルト: END_1/6以降の時間外
      - 箱: 時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: 平日の8時半前
            - 判定: 数値
              入力: 16時半まで
              次の箱: 平日8時半〜16時半（時間内）
          デフォルト: 平日16時半以降（時間外）
      - 箱: 平日の8時半前
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 平日8時半〜16時半（時間内）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_稼働中
      - 箱: 平日16時半以降（時間外）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: END_1/6以降の時間外
      - 箱: 稼働日： 4/10
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12/30前
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 12/30
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 12/31
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 1/2
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 1/5
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 1/3
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 1/4
              次の箱: 曜日の分岐
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_稼働中
        セリフ: none
        入力待ち: なし
      - 箱: END_1/6以降の時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
