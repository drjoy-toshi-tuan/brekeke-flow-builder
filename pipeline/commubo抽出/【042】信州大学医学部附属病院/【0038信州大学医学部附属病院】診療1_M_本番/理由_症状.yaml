flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: フィラー
        値:
          フィラー: [あー, あのー, いやー, うー, うーんと, うん, えー, えーっと, えっと, おー, こう, この, そのー, ちょっと, なんか, なんか, なんていうか, ねー, ほら, まー, まあ, んー, んーっと, んっと]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 用件
        値:
          インフルエンザ: [1番, インフル, インフルエンザ, 一, 一新薬, 一番, 感染, 感染症]
          他院へ入院中: [3, 3番, 3番, 他院, 入院, 入院中]
          体調変化: [2, 2番, 悪化, 体調, 体調不良, 二, 二番]
          都合がつかない: [4番, 時間がない, 都合, 忙しい, 用事]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "次に、変更理由を次の４つのうちからお話ください。\n「1.インフルエンザなどの感染症のため」「2.体調変化のため」「3.他院へ入院中のため」「4.都合がつかないため」\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1以上
              次の箱: 聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1以上
              次の箱: 再質問
          デフォルト: 聞き取れず
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: インフルエンザなどの感染症のため
              次の箱: セット：インフルエンザ
            - 判定: 一致
              入力: 体調変化のため
              次の箱: セット：体調不良
            - 判定: 一致
              入力: 他院へ入院中のため
              次の箱: セット：他院
            - 判定: 一致
              入力: 都合がつかないため
              次の箱: 都合がつかないため
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1：インフルエンザ
              次の箱: セット：インフルエンザ
            - 判定: 一致
              入力: 2：体調変化のため
              次の箱: セット：体調不良
            - 判定: 一致
              入力: 3：他院
              次の箱: セット：他院
            - 判定: 一致
              入力: 4.都合がつかないため
              次の箱: 都合がつかないため
      - 箱: セット：他院
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: セット：インフルエンザ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: 都合がつかないため
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: セット：体調不良
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取れず
            - 判定: 一致
              入力: 2
              次の箱: もしもし2回目
          デフォルト: もしもし初回
      - 箱: もしもし初回
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目
        セリフ: "はい、「もしもし」と、聞こえております。\n恐れ入りますが、こちらでは、この後ご案内するご用件の中のいずれかで、お話下さい。\n改めてお伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 2.体調変化のため
              次の箱: 症状確認
          デフォルト: END_戻る
      - 箱: 症状確認
        セリフ: 体調変化について現在の状況をお伺いします。現在の症状を簡潔にお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: すべて聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容のチェック
      - 箱: 聴取内容のチェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問_1
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_戻る_1
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_戻る_1
          デフォルト: 上記以外on
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 症状確認
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る_1
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
