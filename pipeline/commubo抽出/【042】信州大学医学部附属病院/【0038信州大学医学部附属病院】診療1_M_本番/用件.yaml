flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: CT
        値:
          CT: [CT, しーてぃ, しーてー, してぃ]
      - 名前: MRI
        値:
          MRI: [M, R, あーるあい, えむ, えむあ, るあい]
      - 名前: フィラー
        値:
          フィラー: [あー, あのー, いやー, うー, うーんと, うん, えー, えーっと, えっと, おー, こう, この, そのー, ちょっと, なんか, なんか, なんていうか, ねー, ほら, まー, まあ, んー, んーっと, んっと]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 用件
        値:
          キャンセル: [3, 3番, 3番, やめる, 三, 取り消す, 取消]
          確認: [4番, お聞き, その他確認, なくした, 教えて, 四, 四番, 調べて, 分からない, 分からん, 紛失, 忘れた, 予約確認, 予約票]
          新規: [1番, しょしん, はじめて, 一, 一新薬, 一番, 再診, 最新, 撮りたい, 取得, 受診, 初めて, 初診, 診察, 診察の予約, 診療予約, 二百, 予約お願い, 予約する, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          変更: [2, 2番, の変更, の方向, 延期, 延期, 時間, 時間, 取り直したい, 取り直す, 取り直す, 二, 二番, 日程, 日付, 判子, 平行, 並行, 別の, 変え, 変えたい, 変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の４つのうちの、いずれかでお話ください。\n「診察の予約を取る」「予約を変更する」「予約をキャンセルする」「予約を確認する」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: CT発話
              次の箱: CT
            - 判定: エンティティ含む
              入力: MRI発話
              次の箱: MRI
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1以上
              次の箱: 聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1以上
              次の箱: 聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 変更復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル復唱
            - 判定: 一致
              入力: 新規
              次の箱: 診察予約復唱
            - 判定: 一致
              入力: 確認
              次の箱: その他確認復唱
      - 箱: キャンセル復唱
        セリフ: "ご予約のキャンセル、で、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 診察予約復唱
        セリフ: 診察のご予約、で、よろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: その他確認復唱
        セリフ: "ご予約の確認、で、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 変更復唱
        セリフ: "ご予約の変更、で、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 言い淀み回避
              次の箱: count上記以外_1
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1：予約
              次の箱: セット：予約
            - 判定: 一致
              入力: 2：変更
              次の箱: セット：変更
            - 判定: 一致
              入力: 3：キャンセル
              次の箱: セット：キャンセル
            - 判定: 一致
              入力: 4：確認
              次の箱: 確認
      - 箱: セット：予約
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セット：変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セット：キャンセル
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取れず
            - 判定: 一致
              入力: 2
              次の箱: もしもし2回目
          デフォルト: もしもし初回
      - 箱: もしもし初回
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目
        セリフ: "はい、「もしもし」と、聞こえております。\n恐れ入りますが、こちらでは、この後ご案内するご用件の中のいずれかで、お話下さい。\n改めてお伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: CT
        セリフ: CTですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_CTMRI戻り
      - 箱: MRI
        セリフ: MRIですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_CTMRI戻り

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_CTMRI戻り
        セリフ: none
        入力待ち: なし
