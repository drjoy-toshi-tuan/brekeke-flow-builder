flow:
  最初の箱: 出産予定日確認

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 上記以外on_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 出産予定日確認
        セリフ: 出産についてお伺いします。出産予定日は何月何日ですか？わからない場合には、わからないとおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 出産予定日確認_1
        セリフ: 現在、妊娠何週目になりますか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴き取り_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック_1
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋出産予定日なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋出産予定日なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋出産予定日あり
              次の箱: 続いて
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋出産予定日あり
              次の箱: 続いて
          デフォルト: 上記以外on
      - 箱: 聴取内容チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア_1
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋出産予定日なし
              次の箱: 再質問の有無_1
            - 判定: 一致
              入力: 上記以外9（5秒）＋出産予定日なし
              次の箱: 再質問の有無_1
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋出産予定日あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋出産予定日あり
              次の箱: END_聞き取り完了
          デフォルト: 上記以外on_1
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 無言クリア_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: 再質問
          デフォルト: 再質問
      - 箱: 再質問の有無_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: 再質問_1
          デフォルト: 再質問_1
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 出産予定日確認
      - 箱: 再質問_1
        セリフ: 恐れ入りますが、再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 出産予定日確認_1
      - 箱: 続いて
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 出産予定日確認_1

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
