        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 海外渡航者ワクチン外来
              次の箱: 入電時刻判断
          デフォルト: 診察券番号聞き取り
      - 箱: 受診歴
        セリフ: none
        説明: サブシナリオ「受診歴」を呼び出す
