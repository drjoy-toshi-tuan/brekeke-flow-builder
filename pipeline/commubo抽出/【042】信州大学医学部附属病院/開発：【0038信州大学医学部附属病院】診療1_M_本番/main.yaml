flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n信州大学医学部付属病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 用件を判断_1
          デフォルト: 用件を判断_2
      - 箱: 予約変更の流れ
        セリフ: 予約変更の申し込みを受付いたしました。平日3日以内に担当者から折り返し電話にてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 予約キャンセルの流れ（特定診療科）
        セリフ: 予約キャンセルを受付いたしました。延期をご希望の際は日程がお分かりになりましたら再度お電話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 新規予約の流れ
        セリフ: 初診予約の申し込みを受付いたしました。平日3日以内に担当者から折り返し電話にてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 予約キャンセルの流れ（特定診療科）_1
        セリフ: 予約キャンセルを受付いたしました。延期をご希望の際は日程がお分かりになりましたら再度お電話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 予約変更の流れ_1
        セリフ: 予約変更の申し込みを受付いたしました。平日3日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 新規予約の流れ_1
        セリフ: 初診予約の申し込みを受付いたしました。平日3日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 予約確認の流れ
        セリフ: ご予約に関するお問い合わせを受付いたしました。平日3日以内に担当者から折り返し電話にてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 予約確認の流れ_1
        セリフ: ご予約に関するお問い合わせを受付いたしました。平日3日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 再診予約の流れ
        セリフ: 再診予約の申し込みを受付いたしました。平日3日以内に担当者から折り返し電話にてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 再診の流れ
        セリフ: 再診予約の申し込みを受付いたしました。平日3日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 産科予約の流れ
        セリフ: 予約の申し込みを受付いたしました。平日3日以内に担当者から折り返し電話にてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 産科予約の流れ_1
        セリフ: 予約の申し込みを受付いたしました。平日3日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 終話
        セリフ: それでは失礼いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 確認内容の聞き取り
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約日の聞き取り
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約日の聞き取り
            - 判定: 一致
              入力: 新規
              次の箱: 産科のみ分岐
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 予約確認の流れ_1
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更の流れ_1
            - 判定: 一致
              入力: 再診
              次の箱: 再診の流れ
            - 判定: 一致
              入力: 初診
              次の箱: 新規予約の流れ_1
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルの流れ（特定診療科）_1
          デフォルト: 産科予約の流れ_1
      - 箱: 用件を判断_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認
              次の箱: 予約確認の流れ
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更の流れ
            - 判定: 一致
              入力: 再診
              次の箱: 再診予約の流れ
            - 判定: 一致
              入力: 初診
              次の箱: 新規予約の流れ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルの流れ（特定診療科）
          デフォルト: 産科予約の流れ
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間外ノードへ：開発時は用件接続
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 変更希望日
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 確認内容の聞き取り
        セリフ: none
        説明: サブシナリオ「確認内容の聞き取り」を呼び出す
        参照ファイル: 確認内容の聞き取り.yaml
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 頭痛外来以外
        セリフ: 申し訳ございません、当院は紹介受診重点医療機関に指定されており、受診にあたっては紹介状のご用意をお願いしております。恐れ入りますが、まずは地域の医療機関にご相談ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内フラグ
      - 箱: 用件NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗
      - 箱: 診療科NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗
      - 箱: 診察券
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗
      - 箱: 失敗
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、代表電話へおかけ直しください。受付時間は、土日祝日を除く、月曜日から金曜日の8時半から17時となっております。\n電話番号は 0570-00-3010 です。\n繰り返します、電話番号は 0570-00-3010 です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内フラグ
      - 箱: 時間外ノードへ：開発時は用件接続
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件
      - 箱: 入電時刻判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 13時以前かつ13時から16時
              次の箱: 時間内
            - 判定: 数値
              入力: 13時以前かつ13時から16時
              次の箱: 時間内
          デフォルト: 診察券番号聞き取り
      - 箱: 時間内
        セリフ: 担当者へお繋ぎいたします。このままお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 専用番号転送
      - 箱: 時間外
        セリフ: 申し訳ございませんが、ただいまの時間は受付時間外となっております。受付時間は、祝日を除く、月曜日から金曜日の8時半から16時半となっております。恐れ入りますが、受付時間内におかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内フラグ
      - 箱: 転送不可
        セリフ: 申し訳ございませんが、担当部署が混み合っているためお繋ぎすることができませんでした。恐れ入りますが、電話番号を申し上げますので受付時間内に再度おかけなおし下さい。受付時間は月曜から金曜の13時から16時までです。
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送不可_1
      - 箱: 転送不可_1
        セリフ: 電話番号は 0263-37-3475 です、繰り返します、電話番号は 0263-37-3475 です。それでは失礼いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 稼働前
        セリフ: この番号は、4月10日、朝8時半より利用開始となります。 ご利用開始以降に、お掛け直し下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 専用番号転送
        セリフ: none
        説明: サブシナリオ「専用番号転送」を呼び出す
        回答振り分け:
          デフォルト: 転送OK CP｜Complete flag（状態）
      - 箱: 転送OK CP｜Complete flag（状態）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 代表案内フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 海外渡航者ワクチン外来判断
