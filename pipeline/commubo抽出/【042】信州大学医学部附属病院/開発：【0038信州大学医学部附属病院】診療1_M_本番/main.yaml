        セリフ: 恐れ入りますが、移植外科医療センター専用ダイヤル、0263-37-2930におかけなおしください。受付時間は平日8：30から17：00です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内フラグ
      - 箱: 変更希望日
        セリフ: none
