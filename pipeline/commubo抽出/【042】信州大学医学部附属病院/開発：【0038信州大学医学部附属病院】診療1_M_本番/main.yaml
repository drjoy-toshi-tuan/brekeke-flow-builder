        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 頭痛外来：紹介状無
        セリフ: "かしこまりました。\n他の医療機関からの紹介状をお持ちでない患者さんにつきましては、通常の診療費とは別に、初診時選定療養費として、7,700円を全額自己負担いただいております。予めご了承ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 時間判別
        セリフ: none
        説明: サブシナリオ「時間判別」を呼び出す
        参照ファイル: 時間判別.yaml
        回答振り分け:
          デフォルト: 用件
      - 箱: 紹介元医療機関名
        セリフ: none
        説明: サブシナリオ「紹介元医療機関名」を呼び出す
        参照ファイル: 紹介元医療機関名.yaml
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 血液内科・海外渡航者ワクチン外来除外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 血液内科
              次の箱: 血液内科クローズ
            - 判定: 一致
              入力: 精神科
              次の箱: 精神科クローズ
            - 判定: 一致
              入力: 子どものこころ診療部
              次の箱: 子どものこころクローズ
            - 判定: 一致
              入力: 海外渡航者ワクチン外来
              次の箱: 海外渡航者ワクチン外来クローズ
            - 判定: 一致
              入力: 移植外科
              次の箱: 移植外科クローズ
          デフォルト: 紹介状
      - 箱: 血液内科クローズ
        セリフ: こちらの診療科は患者さんからのご予約はお受けしておりません。紹介元医療機関から当院外来予約センターへ、ご連絡いただけますようお願いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内フラグ
      - 箱: 精神科クローズ
        セリフ: 平日、15：00から16：30の間に、0263-37-2846　におかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表案内フラグ
      - 箱: 子どものこころクローズ
        セリフ: 平日、15：00から16：30の間に、0263-37-3381　におかけ直しください。
        入力待ち: なし
        回答振り分け:
