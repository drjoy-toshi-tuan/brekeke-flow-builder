flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付分岐
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 5時前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 24時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 5時前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 8時まで
              次の箱: END_受付時間内
          デフォルト: END_新エンジンへ案内
      - 箱: 日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 9月30日
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 10月1日
              次の箱: （平日）時間の分岐_1
          デフォルト: END_新エンジンへ案内

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_新エンジンへ案内
        セリフ: none
        入力待ち: なし
