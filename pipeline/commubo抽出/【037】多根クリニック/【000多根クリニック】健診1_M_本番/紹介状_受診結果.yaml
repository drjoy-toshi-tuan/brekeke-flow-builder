flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 変更内容
        値:
          受診結果: [結果, 質問]
          紹介状: [照会状, 紹介, 発行]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "内容を、次の2つのうちの、いずれかでお話ください。\n「紹介状の発行」「受診結果の質問」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更内容の確認
      - 箱: 変更内容の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 変更内容の発話
              次の箱: 変更内容のセット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 変更内容の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: コースを確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐
      - 箱: 変更内容のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐
      - 箱: セットした変更内容の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 紹介状
              次の箱: コースの復唱（健診内容）
            - 判定: 一致
              入力: 受診結果の質問
              次の箱: 用件の復唱（日程変更）
      - 箱: コースの復唱（健診内容）
        セリフ: "紹介状の発行、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースを確認
      - 箱: 用件の復唱（日程変更）
        セリフ: "受診結果の質問、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースを確認
      - 箱: コースを確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 変更内容の発話
              次の箱: コース再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: リセット
        セリフ: 再度、テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: コース再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更内容のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_変更項目聞き取れず

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_変更項目聞き取れず
        セリフ: none
        入力待ち: なし
