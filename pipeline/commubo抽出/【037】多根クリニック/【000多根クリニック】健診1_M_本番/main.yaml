        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: キャンセル
        セリフ: 予約キャンセルの申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号分岐
      - 箱: 予約/紹介状/受診結果の質問/問い合わせ
        セリフ: 申し込みを受付いたしました。3営業日以内に、担当者から順次折り返し電話にてご連絡いたします。お電話終了後に、通話内容の確認用のリンクをSMSでお送りしますのでご確認ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 変更
        セリフ: 日程変更の申し込みを受付いたしました。変更が完了後にSMSを送信いたします。確認事項があれば順次折り返しいたします。お電話終了後に、通話内容の確認用のリンクをSMSでお送りしますのでご確認ください。
