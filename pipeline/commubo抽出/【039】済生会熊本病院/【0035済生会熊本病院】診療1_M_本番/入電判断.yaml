flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: GW時間判断
      - 箱: GW時間判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 5月1日前
              次の箱: 祝日チェック
            - 判定: 一致
              入力: 5月1日
              次の箱: 5月1日の時間の分岐
            - 判定: 数値
              入力: 5月6日前
              次の箱: END_GW時間外
            - 判定: 一致
              入力: 5月6日
              次の箱: END_GW時間外
          デフォルト: 祝日チェック
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月〜金）
              次の箱: 時間の分岐
          デフォルト: END_時間外
      - 箱: 時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_時間外
            - 判定: 数値
              入力: 17時まで
              次の箱: END_稼働中
          デフォルト: END_時間外
      - 箱: 5月1日の時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_時間外
            - 判定: 数値
              入力: 17時まで
              次の箱: END_稼働中
          デフォルト: END_GW時間外
      - 箱: 祝日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 祝日
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: GW時間判断

  終了:
    箱一覧:
      - 箱: END_稼働中
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_GW時間外
        セリフ: none
        入力待ち: なし
