flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: お電話ありがとうございます。済生会熊本病院の予約確認センターです。
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電時間判断へ
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 切断待ち_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 診察券番号聴取へ
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券（7桁）
      - 箱: 確認内容の聴取へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認内容の聞き取り
      - 箱: 次へ
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 次へ_1
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日
      - 箱: 変更
        セリフ: 予約変更の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約確認
      - 箱: 予約確認
        セリフ: 土日祝日を除く翌日までに、担当者から折り返し電話、もしくはショートメールにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 確認
        セリフ: 予約確認の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約確認
      - 箱: キャンセル
        セリフ: 予約キャンセルの申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話（キャンセルのみ）
      - 箱: その他お問い合わせ
        セリフ: その他お問い合わせ、の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約確認
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話_1
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 現在の予約日聴取へ
            - 判定: 一致
              入力: 予約変更
              次の箱: 現在の予約日聴取へ
            - 判定: 一致
              入力: 予約確認
              次の箱: 確認内容の聴取へ
            - 判定: 一致
              入力: その他
              次の箱: 確認内容の聴取へ
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 変更
            - 判定: 一致
              入力: 予約確認
              次の箱: 確認
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: キャンセル
            - 判定: 一致
              入力: その他
              次の箱: その他お問い合わせ
          デフォルト: 予約確認
      - 箱: 用件を判断_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 希望日
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 確認内容の聴取へ
      - 箱: 用件を判断_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約日
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約日_1
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: かしこまりました。次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 確認内容の聞き取り
        セリフ: none
        説明: サブシナリオ「確認内容の聞き取り」を呼び出す
        参照ファイル: 確認内容の聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: 入電時間判断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電判断
      - 箱: 時間外ガイダンスへ（Complete flag：2)
        セリフ: ただいまの時間は受付時間外となります。受付時間は平日、8時30分から17時となっております。恐れ入りますが、受付時間内にお掛け直し下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_1
      - 箱: GW時間外ガイダンスへ（Complete flag：2)
        セリフ: ただいまの時間は受付時間外となります。ゴールデンウィークの休業期間は、5月2日から5月6日までです。5月7日8時30分より、受付を開始いたします。恐れ入りますが、受付時間内にお掛け直し下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_1
      - 箱: 用件NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2回失敗集まれ
      - 箱: 氏名聴取へ
        セリフ: ここからはAI電話がご案内します。途中で電話を切った場合でも、担当者よりご連絡いたしますので、ご安心ください。初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 氏名聞き取り
      - 箱: 現在の予約日聴取へ
        セリフ: かしこまりました。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断_3
      - 箱: 希望日
        セリフ: none
        説明: サブシナリオ「希望日」を呼び出す
        参照ファイル: 希望日.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: 診察券NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2回失敗集まれ
      - 箱: 生年月日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2回失敗集まれ
      - 箱: 希望日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2回失敗集まれ
      - 箱: 氏名NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2回失敗集まれ
      - 箱: 2回失敗集まれ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号
      - 箱: 失敗 代表案内へ
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。恐れ入りますが、平日、8時30分から17時に、予約確認センターへお掛け直し下さい。\n電話番号が分かる場合は、そのままお電話をお切り下さい。 分からない場合はご案内いたしますのでメモをご準備下さい。\n"
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号案内
      - 箱: 番号案内へ（回数カウント）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回アナウンス
              次の箱: 終話
          デフォルト: 繰り返し
      - 箱: 番号案内
        セリフ: 電話番号は、096‐351‐8051です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号案内へ（回数カウント）
      - 箱: 繰り返し
        セリフ: 繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号案内
      - 箱: 診察券（7桁）
        セリフ: none
        説明: サブシナリオ「診察券（7桁）」を呼び出す
        参照ファイル: 診察券（7桁）.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 生年月日
        セリフ: none
        説明: サブシナリオ「生年月日」を呼び出す
        参照ファイル: 生年月日.yaml
        回答振り分け:
          デフォルト: 携帯チェック
      - 箱: 氏名聞き取り
        セリフ: none
        説明: サブシナリオ「氏名聞き取り」を呼び出す
        参照ファイル: 氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 診察券番号聴取へ
      - 箱: 終話（キャンセルのみ）
        セリフ: 確認事項がある場合は、担当者よりお電話させていただきますので、ご了承ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 入電判断
        セリフ: none
        説明: サブシナリオ「入電判断」を呼び出す
        参照ファイル: 入電判断.yaml
        回答振り分け:
          デフォルト: 電話番号区切り
      - 箱: 入電番号
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得
              次の箱: 連絡先番号取得確認
          デフォルト: 連絡先番号あり
      - 箱: 連絡先番号取得確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: additionalphonenumer
              次の箱: 失敗 代表案内へ
          デフォルト: 連絡先番号あり
      - 箱: 連絡先番号あり
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。\n恐れ入りますが、土日祝日を除く翌日までに、当院よりお電話いたしますので、今しばらくお待ち下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: タイトル
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 非通知判定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 非通知
              次の箱: 非通知アナウンス
          デフォルト: 氏名聴取へ
      - 箱: 非通知アナウンス
        セリフ: 申し訳ございません。電話番号が非通知設定の場合、AI電話では受付できません。先頭に数字の、1、8、6、を付けておかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_1
      - 箱: 携帯チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話
              次の箱: 連絡先電話番号聞き取りへ
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: タイトル
      - 箱: 電話番号区切り
        セリフ: none
        説明: サブシナリオ「電話番号区切り」を呼び出す
        参照ファイル: 電話番号区切り_1.yaml
        回答振り分け:
          デフォルト: 非通知判定
      - 箱: 予約日
        セリフ: none
        説明: サブシナリオ「予約日」を呼び出す
        参照ファイル: 予約日.yaml
        回答振り分け:
          デフォルト: 用件を判断_2
      - 箱: 予約日_1
        セリフ: none
        説明: サブシナリオ「予約日」を呼び出す
        参照ファイル: 予約日.yaml
        回答振り分け:
          デフォルト: 用件を判断_2
      - 箱: 用件失敗（フリー）
        セリフ: none
        説明: サブシナリオ「用件失敗（フリー）」を呼び出す
        参照ファイル: 用件失敗（フリー）.yaml
        回答振り分け:
          デフォルト: 終話へ
      - 箱: 終話へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ
      - 箱: 予約日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2回失敗集まれ

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_切断_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち_1
