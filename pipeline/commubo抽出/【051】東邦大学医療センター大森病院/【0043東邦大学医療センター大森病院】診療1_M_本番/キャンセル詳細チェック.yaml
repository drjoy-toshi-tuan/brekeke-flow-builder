flow:
  最初の箱: キャンセル内容の確認

  エンティティ定義:
    カスタム:
      - 名前: キャンセル状況確認
        値:
          希望あり: [2, あります, ある, する, ニバン, にばん, 希望します, 希望する, 診療する, 二, 二番]
          希望なし: [1, ありません, いちばん, イチバン, いらない, しない, しません, ない, 一, 一番, 診療しない, 要らない]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 希望日状況確認
        値:
          決まっていない: [2, いません, しない, しません, ない, なし, 決まっていない, 決まっていません, 決まってません, 二番, 未定]
          決まっている: [1, あり, ある, いち, います, している, 一, 決まっています, 決まってます, 決まる]
      - 名前: 肯定
        値:
          肯定: [ある, はーい, よろしい, 異常部, 持っています, 持ってます, 持ってる, 丈夫, 大丈夫, 売ってます]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, いや, じゃない, ではない, ない, なし, まちがえた, よろしくない, 何度, 持っていない, 持ってない, 持ってません]

  共通:
    箱一覧:
      - 箱: キャンセル内容の確認
        セリフ: "キャンセルについて次の2つのうちいずれかでお話ください。\n「該当診療科を全てキャンセルし、今後診療を希望しない」は、1番を\n「この予約日はキャンセルするが、今後診療を希望する」は、2番とおっしゃってください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 希望日が決まっているか確認
        セリフ: "今後の診療について次のうちいずれかでお話ください。\n「希望する日が決まっている」は、1番を\n「希望する日が決まっていない」は、2番とおっしゃってください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日が決まっているか確認_1
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: 希望日が決まっているか確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 希望日状況確認のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし_1
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐_1
          デフォルト: count上記以外_2
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質門_1
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質門
          デフォルト: 復唱確認（次回受診希望有無）
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質門_2
          デフォルト: 希望日が決まっているか確認_1
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質門_3
          デフォルト: 復唱確認
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: 聞き取り出来ず
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: countもしもし_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: 聞き取り出来ず
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上_1
          デフォルト: もしもし2回目以上_1
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: キャンセル内容の確認
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: キャンセル内容の確認
      - 箱: もしもし2回目以上_1
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日が決まっているか確認
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 希望日状況確認のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした項目で分岐_2
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 希望なし
              次の箱: 診療希望なし
            - 判定: 一致
              入力: 希望あり
              次の箱: 診療希望あり
      - 箱: セットした項目で分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 希望あり
              次の箱: 希望日が決まっているか確認
            - 判定: 一致
              入力: 希望なし
              次の箱: END_診療希望なし
      - 箱: セットした項目で分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 決まっている
              次の箱: END_決まっている
            - 判定: 一致
              入力: 決まっていない
              次の箱: END_決まっていない
      - 箱: セットした項目で分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 決まっている
              次の箱: 診療希望あり_1
            - 判定: 一致
              入力: 決まっていない
              次の箱: 診療希望なし_1
      - 箱: 診療希望なし
        セリフ: "該当診療科を全てキャンセル、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認（次回受診希望有無）
      - 箱: 診療希望あり
        セリフ: "この予約日はキャンセルするが今後診療を希望する、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認（次回受診希望有無）
      - 箱: 診療希望あり_1
        セリフ: "希望する日が決まっている、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 診療希望なし_1
        セリフ: "希望する日が決まっていない、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 復唱確認（次回受診希望有無）
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: セットした項目で分岐
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした項目で分岐
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした項目で分岐
          デフォルト: count上記以外_1
      - 箱: 復唱確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ_1
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした項目で分岐_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした項目で分岐_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした項目で分岐_1
          デフォルト: count上記以外_3
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取り出来ず
          デフォルト: 否定
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取り出来ず
          デフォルト: 否定_1
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: キャンセル内容の確認
      - 箱: 否定_1
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日が決まっているか確認
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 用件再設定へ_1
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日状況確認のセット
      - 箱: 聞き取り出来ず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件取得できず
      - 箱: count再質門
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取り出来ず
          デフォルト: 再質問_3
      - 箱: count再質門_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取り出来ず
          デフォルト: 再質問
      - 箱: count再質門_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取り出来ず
          デフォルト: 再質問_1
      - 箱: count再質門_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取り出来ず
          デフォルト: 再質問_2
      - 箱: 再質問
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: キャンセル内容の確認
      - 箱: 再質問_1
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日が決まっているか確認
      - 箱: 再質問_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした項目で分岐_2
      - 箱: 再質問_3
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 診療希望なし
            - 判定: 一致
              入力: 2
              次の箱: 診療希望あり
      - 箱: DTMF分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 診療希望あり_1
            - 判定: 一致
              入力: 2
              次の箱: 診療希望なし_1

  終了:
    箱一覧:
      - 箱: END_決まっていない
        セリフ: none
        入力待ち: なし
      - 箱: END_診療希望なし
        セリフ: none
        入力待ち: なし
      - 箱: END_決まっている
        セリフ: none
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
