flow:
  最初の箱: 用件の確認

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [ある, はーい, よろしい, 異常部, 持っています, 持ってます, 持ってる, 丈夫, 大丈夫, 売ってます]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, いや, じゃない, ではない, ない, なし, まちがえた, よろしくない, 何度, 持っていない, 持ってない, 持ってません]
      - 名前: 用件
        値:
          キャンセル: [3, やめる, 三, 取り消し, 取り消す, 取消]
          セカンドオピニオン: [4, オピニオン, セカン, せかん, セカンド, よん, 四, 申込書]
          初診: [1, とる, 一, 印刷の予約, 撮る, 四百とります, 取る, 受診, 初診, 新規, 診察の予約, 診療, 薬をとる, 予約したい, 予約します, 予約をお願い, 予約をします, 予約をポール, 予約を取りたい, 予約取ったんだけど, 余白を取る, 要約]
          変更: [2, 延期, 時間, 取り直したい, 取り直す, 二, 日程, 日付, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更]

  共通:
    箱一覧:
      - 箱: 用件の確認
        セリフ: "ご用件を、次の4つのうち、いずれかでお話ください。\n1．「診療予約」\n2．「予約の変更」\n3．「予約のキャンセル」\n4．「セカンドオピニオン」、それでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認_1
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質門_1
          デフォルト: 用件の確認_1
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質門
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問_2
          デフォルト: 用件を確認_1
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問_3
          デフォルト: 用件を確認_2
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: 聞き取り出来ず
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 用件の復唱（健康診断）
            - 判定: 一致
              入力: キャンセル
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: 変更
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: セカンドオピニオン
              次の箱: 用件の復唱（セカンドオピニオン）
      - 箱: セットした用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 初診
              次の箱: 案内
            - 判定: 一致
              入力: キャンセル
              次の箱: END_戻る
            - 判定: 一致
              入力: 変更
              次の箱: END_戻る
            - 判定: 一致
              入力: セカンドオピニオン
              次の箱: 案内_1
      - 箱: 用件の復唱（健康診断）
        セリフ: "診療の予約、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（キャンセル）
        セリフ: "予約キャンセル、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（変更）
        セリフ: "予約変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（セカンドオピニオン）
        セリフ: "セカンドオピニオンの申込み、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_1
          デフォルト: count上記以外_1
      - 箱: 用件を確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状無
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
          デフォルト: count上記以外_2
      - 箱: 用件を確認_2
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 受診歴有_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 受診歴有_1
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 受診歴有
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 受診歴有
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 受診歴有_1
          デフォルト: count上記以外_3
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取り出来ず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 聞き取り出来ず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件取得できず
      - 箱: count再質門
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取り出来ず
          デフォルト: 再質問_1
      - 箱: count再質門_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聞き取り出来ず
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 再質問_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再質問_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無
      - 箱: 再質問_3
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 案内_1
      - 箱: 紹介状有無
        セリフ: 他の医療機関からの紹介状はお持ちでしょうか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 紹介状無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_紹介状なし
      - 箱: 紹介状あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 受診歴有
        セリフ: 申し訳ございません。セカンドオピニオンのお申し込みは資料をご準備後、再度おかけ直しいただきますようお願い申し上げます。セカンドオピニオンの申込方法や必要書類については当院のホームページに掲載がございますのでご確認ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_セカンドなし
      - 箱: 受診歴有_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_セカンドあり
      - 箱: 案内
        セリフ: かしこまりました。3診療日以内の予約についてはAI電話で受付できませんので、外来予約センターにお電話をお願いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 用件の復唱（健康診断）
            - 判定: 一致
              入力: 2
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: 3
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: 4
              次の箱: 用件の復唱（セカンドオピニオン）
      - 箱: 案内_1
        セリフ: "セカンドオピニオンのお申し込みに必要な書類はお手元にお持ちですか？必要書類をお持ちの方は、「はい、持っている」、\n必要書類の準備が出来ていない方は、「いいえ、持っていない」、とおっしゃってください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_2

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
      - 箱: END_count再質門
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
      - 箱: END_紹介状なし
        セリフ: none
        入力待ち: なし
      - 箱: END_セカンドなし
        セリフ: none
        入力待ち: なし
      - 箱: END_セカンドあり
        セリフ: none
        入力待ち: なし
