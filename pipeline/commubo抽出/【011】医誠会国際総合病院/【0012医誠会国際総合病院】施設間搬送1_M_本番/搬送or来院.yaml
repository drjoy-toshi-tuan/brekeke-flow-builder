flow:
  最初の箱: 初めに

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もう一回]
      - 名前: 間違い
        値:
          間違い: [違い, 違う, 間違え]
      - 名前: 救急搬送希望
        値:
          搬送希望: [1, 1番, いち, 一番, 救急, 緊急, 搬送]
      - 名前: 直接来院
        値:
          直接来院: [2, に, 行きます, 行く, 自分で, 直接, 二番]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]

  共通:
    箱一覧:
      - 箱: 搬送受けor来院 判別
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: 一致
              入力: DTMF「1」
              次の箱: 搬送希望
            - 判定: 一致
              入力: sysEntity「1」
              次の箱: 搬送希望
            - 判定: エンティティ含む
              入力: 救急搬送希望
              次の箱: 搬送希望
            - 判定: 一致
              入力: DTMF「2」
              次の箱: 直接来院 セット
            - 判定: 一致
              入力: sysEntity「2」
              次の箱: 直接来院 セット
            - 判定: エンティティ含む
              入力: 直接来院
              次の箱: 直接来院 セット
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
          デフォルト: 上記以外
      - 箱: 搬送希望
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 直接来院 セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: もう一度
        セリフ: もう一度、ご案内いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 搬送受けor来院 判別_1
      - 箱: 上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 搬送受けor来院 判別
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞取りへ
      - 箱: 再度聞取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n救急搬送をご希望の場合は「1」、ご自身で直接お越しになる場合は、「2」、を、ダイヤルプッシュで押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 搬送受けor来院 判別
      - 箱: 初めに
        セリフ: はじめにお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 搬送受けor来院 判別_1
      - 箱: 搬送受けor来院 判別_1
        セリフ: 救急搬送をご希望の場合は、「1」、ご自身で直接お越しになる場合は、「2」、と、お答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 搬送受けor来院 判別

  終了:
    箱一覧:
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
