flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 救急搬送希望
        値:
          1: [1番, いち, 一番, 救急, 搬送]
      - 名前: 直接来院
        値:
          2: [に, 行きます, 行く, 自分で, 直接, 二番]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: 医誠会無料救急搬送です。AI電話が対応いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 切断待ち_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 終話
        セリフ: "到着時間は担当者より折り返しご連絡いたしますので、お待ちください。\nなお現在 、国内ではしかの流行が確認されています。発疹や発熱などの症状がある方、または 1ヶ月以内に海外渡航歴のある方、そのほか思い当たることがある方は、受付までお申し出ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_1
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 緊急時対応ノードへ繋ぐ場合はここから
      - 箱: 通話完了
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 状態聴取へ
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 状態聴取
      - 箱: 氏名聴取
        セリフ: かしこまりました。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者名聴取
      - 箱: 連絡先へ
        セリフ: 最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取
      - 箱: 個人情報聴取へ
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 個人情報聴取
      - 箱: 施設名聴取へ
        セリフ: はじめに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名聴取
      - 箱: 住所へ
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 住所聞き取り
      - 箱: 住所聞き取り
        セリフ: none
        説明: サブシナリオ「住所聞き取り」を呼び出す
        参照ファイル: 住所聞き取り.yaml
        回答振り分け:
          デフォルト: 状態聴取へ
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 搬送or直接来院判断_2
      - 箱: CP詳細NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗⇒終話へ（番号OK）
      - 箱: CPバイタルサインNG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗⇒終話へ（番号OK）
      - 箱: 3回失敗⇒終話へ（番号OK）
        セリフ: "大変申し訳ございません。うまく聞き取ることができませんでした。\n今おかけいただいている電話番号へ折り返しご連絡しますので、お待ちください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_1
      - 箱: 連絡先聴取失敗
        セリフ: "ただしく聞き取りができませんでした。\n施設名とご住所でお調べし、到着時間を折り返しご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_1
      - 箱: CP個人情報NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗⇒終話へ（番号OK）
      - 箱: CP施設名NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗⇒終話へ（番号OK）
      - 箱: CP住所NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗⇒終話へ（番号OK）
      - 箱: CP連絡先NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取失敗
      - 箱: 終話_1
        セリフ: それでは、失礼いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 状態聴取
        セリフ: none
        説明: サブシナリオ「状態聴取」を呼び出す
        参照ファイル: 状態聴取.yaml
        回答振り分け:
          デフォルト: 血圧・体温聴取へ
      - 箱: 血圧・体温聴取へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 血圧や体温の聴取（旧バイタル）
      - 箱: 個人情報聴取
        セリフ: none
        説明: サブシナリオ「個人情報聴取」を呼び出す
        参照ファイル: 個人情報聴取.yaml
        回答振り分け:
          デフォルト: 搬送or直接来院判断
      - 箱: 施設名聴取
        セリフ: none
        説明: サブシナリオ「施設名聴取」を呼び出す
        参照ファイル: 施設名聴取.yaml
        回答振り分け:
          デフォルト: 住所へ
      - 箱: 血圧や体温の聴取（旧バイタル）
        セリフ: none
        説明: サブシナリオ「血圧や体温の聴取（旧バイタル）」を呼び出す
        参照ファイル: 血圧や体温の聴取（旧バイタル）.yaml
        回答振り分け:
          デフォルト: 氏名聴取
      - 箱: 連絡先聴取
        セリフ: none
        説明: サブシナリオ「連絡先聴取」を呼び出す
        参照ファイル: 連絡先聴取.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 入電番号からデータ取得
        セリフ: none
        説明: サブシナリオ「入電番号からデータ取得」を呼び出す
        回答振り分け:
          デフォルト: 入電番号から情報取得しコンテキストセット
      - 箱: 入電番号から情報取得しコンテキストセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名確認
      - 箱: 施設名確認
        セリフ: "<? $施設名読み ?>\n様からのお電話ですね?\nお迎え先は当院に登録されているご住所でよろしいですか?"
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 状態聴取へ_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 状態聴取へ_1
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 施設名聴取へ_1
          デフォルト: 施設名聴取へ_1
      - 箱: 施設名聴取へ_1
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名聴取
      - 箱: 状態聴取へ_1
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 状態聴取へ
      - 箱: 直接来院
        セリフ: "かしこまりました。\n紹介状持参がない場合、選定療養費、9900円をお支払いいただきますので、ご了承ください。\nそれでは、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者名聴取
      - 箱: 搬送or直接来院判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 搬送希望
              次の箱: 連絡先へ
            - 判定: 一致
              入力: 直接来院
              次の箱: 症状聴取
      - 箱: 搬送or直接来院判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 搬送希望
              次の箱: 転送へ
            - 判定: 一致
              入力: 直接来院
              次の箱: 直接来院
      - 箱: 搬送or直接来院判断_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 搬送希望
              次の箱: 終話
            - 判定: 一致
              入力: 直接来院
              次の箱: 直接来院終話
      - 箱: 症状聴取
        セリフ: none
        説明: サブシナリオ「症状聴取」を呼び出す
        参照ファイル: 症状聴取.yaml
        回答振り分け:
          デフォルト: 連絡先へ
      - 箱: 搬送or来院
        セリフ: none
        説明: サブシナリオ「搬送or来院」を呼び出す
        参照ファイル: 搬送or来院.yaml
        回答振り分け:
          デフォルト: 搬送or直接来院判断_1
      - 箱: 搬送or来院 CP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗⇒終話へ（番号OK）
      - 箱: 緊急手術確認 CP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗⇒終話へ（番号OK）
      - 箱: 直接来院終話
        セリフ: 受診のお申し込みを受け付けました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 直接来院終話 3/26 追加
      - 箱: 直接来院終話 3/26 追加
        セリフ: "なお現在 、国内ではしかの流行が確認されています。発疹や発熱などの症状がある方、または 1ヶ月以内に海外渡航歴のある方、そのほか思い当たることがある方は、受付までお申し出ください。\nそれでは、お気を付けてお越しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 通話完了
      - 箱: 患者名聴取
        セリフ: none
        説明: サブシナリオ「患者名聴取」を呼び出す
        参照ファイル: 患者名聴取.yaml
        回答振り分け:
          デフォルト: 個人情報聴取へ
      - 箱: 中村さん作成：搬送or来院
        セリフ: none
        説明: サブシナリオ「中村さん作成：搬送or来院」を呼び出す
        参照ファイル: 中村さん作成：搬送or来院.yaml
        回答振り分け:
          デフォルト: 搬送or直接来院判断_1
      - 箱: 緊急時変更
        セリフ: "現在、ベットがかなり逼迫しておりますので公設救急を優先しております。\n重症の方は公設救急にご連絡ください。\nベットが空き次第受け入れを再開いたしますので、しばらく経ってからおかけ直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 緊急時対応ノードへ繋ぐ場合はここから
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 中村さん作成：搬送or来院
      - 箱: 緊急手術必要か確認
        セリフ: none
        説明: サブシナリオ「緊急手術必要か確認」を呼び出す
        参照ファイル: 緊急手術必要か確認.yaml
        回答振り分け:
          デフォルト: 転送へ（完了フラグ7）
      - 箱: 転送へ（完了フラグ7）
        セリフ: "それでは、電話を転送いたします。\n少々お待ちください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送1(080-9923-2523へ)
      - 箱: 転送1(080-9923-2523へ)
        セリフ: none
        説明: サブシナリオ「転送1(080-9923-2523へ)」を呼び出す
        回答振り分け:
          デフォルト: 転送成功→終話へ(完了フラグ3)
      - 箱: 転送２(080-7031-1207へ)
        セリフ: none
        説明: サブシナリオ「転送２(080-7031-1207へ)」を呼び出す
        回答振り分け:
          デフォルト: 転送成功→終話へ(完了フラグ3)
      - 箱: 転送中アナウンス
        セリフ: ただいまお繋ぎしております、少々お待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送２(080-7031-1207へ)
      - 箱: 転送中アナウンス_1
        セリフ: ただいまお繋ぎしております、少々お待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送1(080-9923-2523へ)
      - 箱: 転送成功→終話へ(完了フラグ3)
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 転送へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送へ（完了フラグ7）

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_切断_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち_1
