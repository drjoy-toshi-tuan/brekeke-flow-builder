flow:
  最初の箱: 緊急手術必要か確認

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もう一回]
      - 名前: 間違い
        値:
          間違い: [違い, 違う, 間違え]
      - 名前: 肯定
        値:
          肯定: [1, 1番, いち, お願いします, そうです, それです, はい, 一番, 必要です]
      - 名前: 直接来院
        値:
          直接来院: [2, に, 行きます, 行く, 自分で, 直接, 二番]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, いや, じゃない, そうじゃない, そうではない, 違います, 違う, 間違い]

  共通:
    箱一覧:
      - 箱: 搬送受けor来院 判別
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 必要
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 必要
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 必要
            - 判定: 一致
              入力: sysEntity「1」
              次の箱: 必要
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 不要
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 不要
            - 判定: 一致
              入力: sysEntity「2」
              次の箱: 不要
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF判断
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
          デフォルト: 上記以外
      - 箱: 必要
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_必要
      - 箱: 不要
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_不要
      - 箱: もう一度
        セリフ: もう一度、ご案内いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 緊急手術必要か確認
      - 箱: 上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 搬送受けor来院 判別
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞取りへ
      - 箱: 再度聞取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\nはい、そうです、いいえ、違いますなど、長めの言葉でお答えください。\n再度お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 緊急手術必要か確認
      - 箱: 緊急手術必要か確認
        セリフ: 病院、クリニックからの緊急手術が必要な方ですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 搬送受けor来院 判別
      - 箱: DTMF判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １
              次の箱: 必要
            - 判定: 一致
              入力: 2
              次の箱: 不要
          デフォルト: 搬送受けor来院 判別

  終了:
    箱一覧:
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_必要
        セリフ: none
        入力待ち: なし
      - 箱: END_不要
        セリフ: none
        入力待ち: なし
