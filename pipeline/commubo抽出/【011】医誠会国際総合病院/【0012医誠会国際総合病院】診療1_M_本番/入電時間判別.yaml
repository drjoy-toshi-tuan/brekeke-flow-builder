flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 曜日の分岐（祝日以外）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月〜金）
              次の箱: 時間の分岐
          デフォルト: END_時間外
      - 箱: 時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: 平日の8時半前
            - 判定: 数値
              入力: 17時まで
              次の箱: 平日8時半〜17時（時間内）
          デフォルト: 平日17時以降（時間外）
      - 箱: 時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_時間外
            - 判定: 数値
              入力: 16時まで
              次の箱: END_戻る
          デフォルト: 年末年始アナウンス
      - 箱: 時間の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: 年末年始アナウンス
            - 判定: 数値
              入力: 17時まで
              次の箱: END_戻る
          デフォルト: END_時間外
      - 箱: 祝日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 平日の8時半前
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 平日8時半〜17時（時間内）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 平日17時以降（時間外）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 年末年始アナウンス分岐_1
      - 箱: 年末年始アナウンス分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/29まで
              次の箱: 曜日の分岐（祝日以外）
            - 判定: 一致
              入力: 12/30
              次の箱: 時間の分岐_1
            - 判定: lessEqual
              入力: 1/4まで
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 1/5
              次の箱: 時間の分岐_2
          デフォルト: 曜日の分岐（祝日以外）
      - 箱: 年末年始アナウンス分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1/1
              次の箱: 年末年始アナウンス
          デフォルト: 祝日
      - 箱: 年末年始アナウンス
        セリフ: 誠に申し訳ございません。年末年始のため、ただいまの時間は受付時間外となっております。受付は1月5日月曜日の、8時30分からとなりますので、恐れ入りますが、おかけ直しくださいますようお願いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始アナウンス終話へ
      - 箱: ★テストノード
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始アナウンス終話へ
        セリフ: none
        入力待ち: なし
