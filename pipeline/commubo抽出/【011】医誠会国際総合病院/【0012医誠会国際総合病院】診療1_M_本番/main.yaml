flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "ここからは、予約専用AI電話が応対いたします。\n担当者より折り返しご連絡いたしますので、ガイダンスに従ってお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日の聞き取り
      - 箱: 次へ_1
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号
      - 箱: 確認内容の聞き取りへ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認内容の聞き取り
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_3
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 2回失敗終話
        セリフ: ありがとうございました。それでは失礼いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診
            - 判定: 一致
              入力: 新規
            - 判定: 一致
              入力: 変更
              次の箱: 次へ
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診
              次の箱: END_新規予約・予約変更・キャンセル・定期受診へ
            - 判定: 一致
              入力: 変更
              次の箱: END_新規予約・予約変更・キャンセル・定期受診へ
            - 判定: 一致
              入力: キャンセル
              次の箱: END_新規予約・予約変更・キャンセル・定期受診へ
            - 判定: 一致
              入力: 新規
              次の箱: END_新規予約・予約変更・キャンセル・定期受診へ
            - 判定: 一致
              入力: その他
              次の箱: 確認内容の聞き取りへ
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電時間判断へ
      - 箱: 失敗あつまれ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2回失敗：終話へ
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 最後に、お電話番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 連絡先電話番号聞き取りへ_1
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 現在の時間取得
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_3
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 入電番号取得確認_1
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 確認内容の聞き取りへ
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 確認内容の聞き取り
        セリフ: none
        説明: サブシナリオ「確認内容の聞き取り」を呼び出す
        参照ファイル: 確認内容の聞き取り.yaml
        回答振り分け:
          デフォルト: END_理由聞き取れずCP
      - 箱: 氏名聞き取れずCP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗あつまれ
      - 箱: 診療科聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗あつまれ
      - 箱: 診察券番号
        セリフ: none
        説明: サブシナリオ「診察券番号」を呼び出す
        参照ファイル: 診察券番号.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 現在の時間取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間判別
      - 箱: 現在の時間取得_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間判別_1
      - 箱: 時間判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半-16時
              次の箱: 時間内：入電番号あり
            - 判定: 数値
              入力: 8時半-16時
              次の箱: 時間内：入電番号あり
            - 判定: 数値
              入力: 16時～17時
              次の箱: 時間外：番号あり
            - 判定: 数値
              入力: 16時～17時
              次の箱: 時間外：番号あり
          デフォルト: 時間外：番号あり
      - 箱: 時間判別_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半-16時
              次の箱: 入電番号取得確認_2
            - 判定: 数値
              入力: 8時半-16時
              次の箱: 入電番号取得確認_2
            - 判定: 数値
              入力: 16時～17時
              次の箱: 入電番号取得確認_3
            - 判定: 数値
              入力: 16時～17時
              次の箱: 入電番号取得確認_3
          デフォルト: 入電番号取得確認_3
      - 箱: 時間内：入電番号あり
        セリフ: かしこまりました。順番に折り返し対応いたしますのでお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 時間外：番号あり
        セリフ: "かしこまりました。\n外来時間終了のため翌診療日に折り返し対応いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 時間外：番号あり_1
        セリフ: 翌診療日までに順番に折り返し対応いたしますのでお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 時間外：非通知
        セリフ: 翌診療日までに順番に対応いたしますので、折り返しの連絡先をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取（フリー）
      - 箱: 時間内：番号あり
        セリフ: 順番に折り返し対応いたしますのでお待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 時間内：非通知
        セリフ: 順番に対応いたしますので、折り返しの連絡先をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取（フリー）
      - 箱: 生年月日聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗あつまれ
      - 箱: 2回失敗：終話へ
        セリフ: 大変申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、
        入力待ち: なし
        回答振り分け:
          デフォルト: 現在の時間取得_1
      - 箱: 番号案内
        セリフ: 番号は、0570-099-166です。
        入力待ち: なし
        回答振り分け:
          デフォルト: くりかえし
      - 箱: 入電時間判別
        セリフ: none
        説明: サブシナリオ「入電時間判別」を呼び出す
        参照ファイル: 入電時間判別.yaml
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 時間外アナウンス （Flag3）
        セリフ: "申し訳ございません。ただいまの時間は受付時間外となっております。受付時間は、土日祝日、年末年始を除く、月曜から金曜の8時30分から17時となっております。\n恐れ入りますが、受付時間内におかけ直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 入電時間判断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電時間判別
      - 箱: 入電番号取得確認
        セリフ: 担当者より折り返しご連絡後、確定となります。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号あり
              次の箱: 用件（非通知判断追加）
          デフォルト: 非通知：患者名聴取
      - 箱: 入電番号取得確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得
              次の箱: 連絡先電話番号聞き取りへ_1
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 入電番号取得確認_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得
              次の箱: 時間内：非通知
          デフォルト: 時間内：番号あり
      - 箱: 入電番号取得確認_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得
              次の箱: 時間外：非通知
          デフォルト: 時間外：番号あり_1
      - 箱: 非通知：患者名聴取
        セリフ: まず初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: END_非通知：患者名
      - 箱: 連絡先電話番号聞き取りへ_2
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: END_非通知：連絡先電話番号
      - 箱: 診察券番号_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 非通知：診察券番号
      - 箱: 非通知：診察券番号
        セリフ: none
        説明: サブシナリオ「非通知：診察券番号」を呼び出す
        参照ファイル: 診察券番号.yaml
        回答振り分け:
          デフォルト: 生年月日へ
      - 箱: 生年月日へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: END_生年月日聞き取り
      - 箱: 用件聴取へ
        セリフ: ありがとうございます。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件（非通知判断追加）
      - 箱: 連絡先番号聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗あつまれ
      - 箱: くりかえし
        セリフ: 繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_回数カウント
      - 箱: 診療科
        セリフ: none
        説明: サブシナリオ「診療科」を呼び出す
        参照ファイル: 診療科.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 用件（非通知判断追加）
        セリフ: none
        説明: サブシナリオ「用件（非通知判断追加）」を呼び出す
        参照ファイル: 用件（非通知判断追加）.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 連絡先聴取（フリー）
        セリフ: none
        説明: サブシナリオ「連絡先聴取（フリー）」を呼び出す
        参照ファイル: 連絡先聴取（フリー）.yaml
        回答振り分け:
          デフォルト: 2回失敗終話
      - 箱: 年末年始アナウンス終話へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診
            - 判定: 一致
              入力: 変更
            - 判定: 一致
              入力: キャンセル
            - 判定: 一致
              入力: 新規
            - 判定: 一致
              入力: その他
      - 箱: END_新規予約・予約変更・キャンセル・定期受診へ
        セリフ: それでは、
        入力待ち: なし
      - 箱: END_生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
      - 箱: END_用件聞き取れずCP
        セリフ: none
        入力待ち: なし
      - 箱: END_理由聞き取れずCP
        セリフ: none
        入力待ち: なし
      - 箱: END_回数カウント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
      - 箱: END_非通知：連絡先電話番号
        セリフ: none
        説明: サブシナリオ「非通知：連絡先電話番号」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
      - 箱: END_非通知：患者名
        セリフ: none
        説明: サブシナリオ「非通知：患者名」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
