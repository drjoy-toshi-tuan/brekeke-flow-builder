          呼吸器内科: [呼内]
          国際診療部: [国際, 診療部]
          骨粗鬆症外来: [こー少々外来, 骨粗しょう症, 骨粗鬆症所]
          産科: [お産, お産センター, マタニティ, 三か, 三個, 参加, 周産]
          産婦人科: [フジコ, 三分の印鑑]
          歯科矯正歯科: [矯正]
          歯科口腔外科: [ああいい車, はーいい車, ま一緒, 会社, 口腔外科, 歯医者, 反射, 弊社]
          耳鼻咽喉科: [DBか, リビング効果, 咽喉科, 義務効果, 君か, 耳科, 耳鼻科, 郵便か, 郵便交換, 郵便効果]
          腫瘍内科: [使用, 腫瘍, 腫瘍, 必要ないか]
          循環器内科: [ハート, 循環, 循環器, 循環器科, 循内]
          小児科: [小児, 表が]
          小児外科: [小児外科]
