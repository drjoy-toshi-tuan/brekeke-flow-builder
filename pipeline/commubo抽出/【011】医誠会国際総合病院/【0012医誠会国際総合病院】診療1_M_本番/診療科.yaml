          消化器外科: [消外]
          消化器内科: [庄内, 消内]
          心臓血管外科: [血管外科, 心外, 心臓, 心臓センター, 心臓外科]
          人間ドック: [ドック, 人間]
          腎臓内科: [ジンナイ, 腎臓, 腎内]
          整形外科: [兄弟, 整形, 定期, 点検]
          精神神経科: [もの忘れ, 精神, 精神科, 先進, 物忘れ, 返信]
          脊椎脊髄外科: [脊髄, 脊椎]
          総合診療科: [五五, 商品, 総合, 総合診療, 送信]
          総合内科: [ないか, 総合, 内科]
          糖尿病内分泌代謝内科: [代謝, 代謝内科, 糖尿, 糖尿病内科, 内分泌]
          乳腺外科: [二千, 乳腺, 乳腺内分泌外科, 入船, 優先, 有線, 有線外科]
          脳神経: []
          脳神経外科: [神経外科, 頭痛, 脳外]
          脳神経内科: [神経内科, 脳内, 変形]
          泌尿器科: [ウロ, 金曜日, 信用機関, 泌尿器]
          皮膚科: [皮膚]
          美容皮膚科美容外科: [イオンひっか, 美容外科, 美容皮膚科, 容器ですか]
          病理診断科: [病理診断]
          婦人科: [ギネ, ぎね, フジコ, 婦人, 富士銀行]
          放射線科: [IVR, アイブイアール, 当社が]
          放射線治療科: [治療科, 放射線治療]
          放射線診断科: [放射線診断]
          麻酔科: [Ping, Suica, あSuica, あ追加, ウイング, ペイン, まSuica, まずいか, ま追加, 原因, 追加, 麻酔]
          末梢血管外科: [末梢血管]
          臨床検査科: [検査科, 臨床]
          肛門科: [こー門]

  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ
        セリフ: 予約を希望される診療科をお話下さい。わからない場合には「わからない」とお話下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 分岐（脳神経）の聞き取りへ
        セリフ: 脳神経内科と脳神経外科の、どちらですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐（脳神経）の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科セット
            - 判定: エンティティ含む
              入力: センター読み診療科
              次の箱: センター系診療科セット
            - 判定: エンティティ含む
              入力: わからない
              次の箱: わからないセット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 診療科の聞き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ_1
          デフォルト: 分岐（脳神経）の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取りへ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐（脳神経）の聞き取りへ
      - 箱: 分岐なし診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科読み取得
      - 箱: センター系診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: センター系診療科読み取得
      - 箱: 分岐なし診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐なし診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 分岐（脳神経）読み取得
        セリフ: none
        説明: サブシナリオ「分岐（脳神経）読み取得」を呼び出す
        回答振り分け:
          デフォルト: 再度聞き取りへ_1
      - 箱: センター系診療科読み取得
        セリフ: none
        説明: サブシナリオ「センター系診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 診療科読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 診療科確認へ
        セリフ: "<? $分岐なし診療科の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: センター系診療科
              次の箱: センター系診療科再設定へ
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 診療科表示変更
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 診療科表示変更
          デフォルト: count上記以外_2
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 診療科を確認
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\nはい、か、いいえ、でお答えいただけますか？\nお答えいただいた後、AIが返答するまで、少々お待ちください。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取りへ
      - 箱: センター系診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: センター系診療科セット
      - 箱: 分岐なし診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科セット
      - 箱: 分岐（脳神経）の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
          デフォルト: 分岐（脳神経）セット
      - 箱: 分岐（脳神経）セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐（脳神経）読み取得
      - 箱: わからないセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_診察科不明
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
              次の箱: END_2回失敗
          デフォルト: 再度聞き取りへ_2
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回以上
              次の箱: END_2回失敗
          デフォルト: 再度聞き取りへ
      - 箱: 診療科表示変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 糖尿病・内分泌・代謝内科
              次の箱: 糖尿病・内分泌・代謝内科 セット
            - 判定: 一致
              入力: リウマチ・膠原病・アレルギー科
              次の箱: リウマチ・膠原病・アレルギー科セット
            - 判定: 一致
              入力: 歯科・矯正歯科
              次の箱: 歯科・矯正歯科 セット
            - 判定: 一致
              入力: 美容皮膚科・美容外科
              次の箱: 美容皮膚科・美容外科 セット
            - 判定: 一致
              入力: 「胸のかたち」治療センター
              次の箱: 「胸のかたち」治療センター セット
            - 判定: 一致
              入力: 創傷・じょくそう治療センター
              次の箱: 創傷・じょくそう治療センター セット
          デフォルト: END_戻る
      - 箱: 糖尿病・内分泌・代謝内科 セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: リウマチ・膠原病・アレルギー科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 歯科・矯正歯科 セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 美容皮膚科・美容外科 セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 「胸のかたち」治療センター セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 創傷・じょくそう治療センター セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_診察科不明
        セリフ: none
        入力待ち: なし
      - 箱: END_2回失敗
        セリフ: none
        入力待ち: なし
