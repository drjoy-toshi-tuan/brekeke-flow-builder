flow:
  最初の箱: 診察券番号の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あっています, あっている, あってます, あってる, いいです, そうです, それです, はい, 正しい, 大丈夫]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, そうじゃない, そうではない, それではない, 違います, 違う, 間違い, 別の]
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9以上
              次の箱: count再質問_2
            - 判定: 数値以上
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
            - 判定: エンティティ含む
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 診察券番号確認
      - 箱: count上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 否定
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取り
      - 箱: 再度聞き取りへ
        セリフ: 申し訳ございません、番号を正しく聞き取れませんでした。
        入力待ち: あり
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認へ
      - 箱: 診察券番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 分からないセット
            - 判定: エンティティ含む
              入力: 数字
              次の箱: 診察券番号セット（発話）
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 診察券番号セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: countクリア
          デフォルト: count上記以外
      - 箱: countクリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号クリア
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号セット（発話）
      - 箱: 分からない再設定へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分からないセット
      - 箱: 診察券番号桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 16桁以上
              次の箱: count再質問_3
            - 判定: lessEqual
              入力: 15桁以内
              次の箱: 診察券番号の読みセット
          デフォルト: countクリア
      - 箱: 再度聞き取り
        セリフ: 申し訳ございません、正しい桁数で聞き取れませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 診察券番号確認へ
        セリフ: "診察券番号は、\n<? $診察券番号の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認
      - 箱: 診察券番号確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 分からない再設定へ
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_診察券有り
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_診察券有り
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_診察券有り
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 診察券番号
              次の箱: 診察券番号クリア
          デフォルト: count上記以外_1
      - 箱: 否定
        セリフ: "恐れ入りますが、\nなるべく数字と数字の間に間をあけずにお話いただけますか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 診察券番号の聞き取りへ
        セリフ: "診察券番号、もしくは、予約票のID番号、をおっしゃってください。\n番号がわからない場合は、「わからない」とおっしゃってください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号セット（発話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 15桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外クリア
      - 箱: 診察券番号セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 15桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外クリア
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号の読みセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認へ
      - 箱: ダイヤルプッシュ案内
        セリフ: "なお、AIが番号を正しく認識しない場合は、ダイヤルプッシュでの入力も可能です。\n再度、番号をおっしゃっていただくか、ダイヤルプッシュで入力してください。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 分からないセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_診察券不明

  終了:
    箱一覧:
      - 箱: END_診察券不明
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_診察券有り
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。\n後ほど、担当者より確認させていただきます。"
        入力待ち: なし
      - 箱: END_診察券確認へ
        セリフ: 診察券番号をお伺いします。
        入力待ち: なし
