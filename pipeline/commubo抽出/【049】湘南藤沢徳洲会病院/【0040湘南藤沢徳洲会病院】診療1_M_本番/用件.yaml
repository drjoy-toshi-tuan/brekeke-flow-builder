      - 箱: 初診予約へ進む
        セリフ: "初診のご予約でよろしいですか？\nはい、そうです。いいえ、違います。のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 再診予約へ進む
