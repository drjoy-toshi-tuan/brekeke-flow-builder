            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 初再診確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 聞き取り失敗へ
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
