flow:
  最初の箱: 冒頭アナウンス

  エンティティ定義:
    カスタム:
      - 名前: キャンセル
        値:
          キャンセル: [3, 3番, さん, サン, さんばん, サンバン, やめる, 三, 三番, 取り消し, 取り消す, 取消]
      - 名前: もう一度
        値:
          もう一度: [０, 0, ぜろ, ゼロ, もう一回]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 確認
        値:
          確認: [4, 4番, いつ, お聞き, なくした, よばん, ヨバン, よんばん, ヨンバン, 教えて, 四, 四番, 調べて, 分からない, 分からん, 紛失, 忘れた, 予約票]
      - 名前: 間違い
        値:
          間違い: [違う, 間違え]
      - 名前: 健診
        値:
          健診: [けんしん, ケンシン, 健康診断, 健康診断受診後の再検査, 健診受診後の再検査, 検診, 検針, 献身, 返信, 返信受信後の再検査, 返信受診後の再検査]
      - 名前: 肯定
        値:
          肯定: [あっています, あっている, あってます, あってる, いいです, そうです, それです, はーい, はい, 大丈夫です]
      - 名前: 再診予約
        値:
          再診: [はい新薬, 安心, 再診予約, 最新, 最新訳, 三信, 三新薬, 耐震]
      - 名前: 初めて
        値:
          はじめて: []
      - 名前: 初診予約
        値:
          初診: [はじめて, 禁忌, 写真, 終身, 初めて, 初診予約, 新規, 新規の予約, 新規予約, 新品]
      - 名前: 診察予約
        値:
          診察予約: [1, 1番, いち, イチ, いちばん, イチバン, はじめて, を取る, 一, 一番, 印刷, 豪ドル, 撮りたい, 取りたい, 取りたい, 取得, 初めて, 新規, 診察, 診察の予約, 診療予約, 入れたい, 予約, 予約お願い, 予約する, 予約をお願い, 予約をしたい, 予約をしたい, 予約をする, 予約をとり, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい]
      - 名前: 数字の１
        値:
          １: [1, いち, イチ, いちばん, イチバン, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, にばん, ニバン, 二, 二番]
      - 名前: 否定
        値:
          否定: [あります, いいえ, いえ, いや, したことある, じゃない, そうではない, それではない, 違います, 違う, 間違い, 行ったことある, 別の, 来たことある]
      - 名前: 変更
        値:
          変更: [2, 2番, にばん, ニバン, 延期, 時間, 二, 二番, 日程, 日付, 判子, 別の, 変え]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の４つのうちの、いずれかでお話ください。\n「予約を取るは、１」、\n「変更は、２」、\n 「キャンセルは、３」、\n「確認は、４」、 \nそれでは、お願いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
            - 判定: エンティティ含む
              入力: 予約変更
              次の箱: 予約変更セット
            - 判定: エンティティ含む
              入力: 予約キャンセル
              次の箱: 予約キャンセルセット
            - 判定: エンティティ含む
              入力: 予約確認
              次の箱: 予約確認セット
            - 判定: エンティティ含む
              入力: 再診予約
              次の箱: 再診予約セット
            - 判定: エンティティ含む
              入力: 初診予約
              次の箱: 初診予約セット
            - 判定: エンティティ含む
              入力: 予約取得
              次の箱: 診察予約
            - 判定: エンティティ含む
              入力: 健診発話
              次の箱: かしこまりました。
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: もしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_4
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 新患確認
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
