flow:
  最初の箱: 側弯症確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [1, 1番, あってます, いち, イチ, そうそう, そうです, そうです, はーい, 一, 一番, 配送です]
      - 名前: 否定
        値:
          いいえ: [2, そうじゃない, に, にばん, まちがった, 違います, 違う, 二, 二番]

  共通:
    箱一覧:
      - 箱: 側弯症確認
        セリフ: "側弯症ですか？\nはい、そうです、や、いいえ、違います、のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: DTMF回答分岐
      - 箱: 再度テスト
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 側弯症確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。 うまく聞き取りが出来ませんでした。 \n再度、はい、そうです、や、いいえ、違います、のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 側弯症
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 側弯症
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 側弯症
            - 判定: エンティティ含む
              入力: 否定
              次の箱: その他
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: その他
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: 側弯症
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_側弯症
      - 箱: その他
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_その他
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 側弯症
            - 判定: 一致
              入力: 2＝否定
              次の箱: その他
          デフォルト: count上記以外_1

  終了:
    箱一覧:
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。\n後ほど、担当者より確認させていただきます。"
        入力待ち: なし
      - 箱: END_側弯症
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_その他
        セリフ: かしこまりました。
        入力待ち: なし
