flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あっています, あっている, あってます, あってる, あります, いいです, そうです, それで, それです, はい, もらいました, もらった, 持っています, 持っている, 持ってます, 持ってる, 受け取りました, 大丈夫です]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, そうじゃない, そうではない, それじゃない, それではない, もらっていない, もらっていません, もらってない, 違います, 違う, 間違い, 間違って, 持っていない, 持っていません, 持ってない, 受け取っていない, 受け取っていません, 受け取ってない, 別の]
      - 名前: 分からない
        値:
          分からない: [わからない, わかりません, わかんない, 覚えていない, 覚えていません, 覚えてない, 覚えてません, 知らない, 知りません, 分かりません, 聞いていない, 聞いていません, 聞いてない, 忘れた, 忘れました]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 他の医療機関からの紹介状はお持ちですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: わからない
              次の箱: 不明
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 有無を確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: DTMF回答分岐
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい持っています」、や、「いいえ持っていません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 紹介状あり
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_紹介状あり
      - 箱: 紹介状なし
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_紹介状無し
      - 箱: 聞き取りできず
        セリフ: 申し訳ございません。うまく聞き取りができなかったため、後ほど担当者にて確認させていただきます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: 不明
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_紹介状不明
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 聞き取りできず
          デフォルト: 再度聞き取りへ
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 紹介状あり
            - 判定: 一致
              入力: 2＝否定
              次の箱: 紹介状なし
          デフォルト: count上記以外_1

  終了:
    箱一覧:
      - 箱: END_紹介状無し
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介状あり
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介状不明
        セリフ: none
        入力待ち: なし
