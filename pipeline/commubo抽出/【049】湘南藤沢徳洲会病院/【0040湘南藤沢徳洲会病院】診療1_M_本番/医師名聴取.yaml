flow:
  最初の箱: 用件分岐

  エンティティ定義:
    カスタム:
      - 名前: 分からない
        値:
          分からない: [ありません, いない, いません, おりません, わからない, わかりません, 覚えていない, 覚えていません, 覚えてない, 書いていない, 書いていません, 書いてない, 知らない, 知りません, 分かりません, 聞いていない, 聞いていません, 聞いてない, 聞いてません]

  共通:
    箱一覧:
      - 箱: 医師名の聴取へ
        セリフ: "担当の先生のお名前をお話ください。\nわからない場合は「わからない」とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 医師名の聴き取り
      - 箱: 医師名の聴取へ_1
        セリフ: 何先生と書かれていますか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 医師名の聴き取り
      - 箱: 医師名の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 分からないセット
            - 判定: エンティティ含む
              入力: 人名
              次の箱: 医師名セット
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋氏名なし
              次の箱: count再質問
            - 判定: 一致
              入力: 無言9（5秒）＋氏名なし
              次の箱: count再質問
            - 判定: 一致
              入力: 待ち時間経過
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
          デフォルト: 無言on
      - 箱: 医師名セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 分からないセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 医師名の聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 医師名の聴き取り
      - 箱: 再度質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: 聞き取り完了
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度質問
      - 箱: 用件分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 初診予約
              次の箱: 医師名の聴取へ_1
            - 判定: 一致
              入力: 再診予約
              次の箱: 医師名の聴取へ

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。\n後ほど、担当者より確認させていただきます。"
        入力待ち: なし
