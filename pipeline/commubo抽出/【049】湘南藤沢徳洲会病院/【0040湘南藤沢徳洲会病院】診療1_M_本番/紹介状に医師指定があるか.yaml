flow:
  最初の箱: 医師名記載を確認

  エンティティ定義:
    カスタム:
      - 名前: わからない
        値:
          わからない: [わかりません, 分からない]
      - 名前: 肯定
        値:
          はい: [1, 1番, あってます, ありました, あります, いち, イチ, イチバン, いちばん, そうそう, そうです, はーい, 一, 一番, 配送です]
      - 名前: 否定
        値:
          いいえ: [2, ありません, そうじゃない, ニ, ニバン, にばん, まちがった, 違います, 違う, 書いていない, 書いてない, 二, 二番]

  共通:
    箱一覧:
      - 箱: 医師名記載を確認
        セリフ: "紹介状の封筒の表面に、先生のお名前が書かれていますか？\nわからない場合は、「わからない」とおっしゃってください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 肯定/否定
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: DTMF回答分岐
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。 うまく聞き取りが出来ませんでした。 \n再度、はい、希望します、や、いいえ、希望しません、のように、お答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定/否定
      - 箱: 肯定/否定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: わからない
              次の箱: わからない
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 肯定（記載あり）
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 肯定（記載あり）
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 肯定（記載あり）
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定（記載無し）
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 否定（記載無し）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: 肯定（記載あり）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_記載あり
      - 箱: わからない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_記載不明
      - 箱: 否定（記載無し）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_記載無し
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 肯定（記載あり）
            - 判定: 一致
              入力: 2＝否定
              次の箱: 否定（記載無し）
          デフォルト: count上記以外_1

  終了:
    箱一覧:
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。\n後ほど、担当者より確認させていただきます。"
        入力待ち: なし
      - 箱: END_記載あり
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_記載不明
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_記載無し
        セリフ: かしこまりました。
        入力待ち: なし
