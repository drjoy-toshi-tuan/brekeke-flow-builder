flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: 1
        値:
          1: [1番, WEB, いち, インターネット, ウェブ, オンライン, ち, ネット, 一, 一番, 市]
      - 名前: 2
        値:
          2: [２, 2番, このまま, デンワ, に, ニ, ニ、, にい, わかんない, 電話, 電話, 二番]
      - 名前: キャンセル
        値:
          キャンセル: [やめる, 取り消し, 取消]
      - 名前: もう一度
        値:
          もう一度: [もう一回]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 間違い
        値:
          間違い: [違い, 違う, 間違え]
      - 名前: 再診予約
        値:
          再診: [はい新薬, 安心, 再診予約, 最新, 最新訳, 三信, 三新薬, 耐震]
      - 名前: 初めて
        値:
          はじめて: []
      - 名前: 初診予約
        値:
          初診: [はじめて, 禁忌, 写真, 終身, 初めて, 初診予約, 新規, 新規の予約, 新規予約, 新品]
      - 名前: 新規
        値:
          新規: [はじめて, 禁忌, 写真, 終身, 初めて, 初診, 新規の予約, 新規予約, 新品]
      - 名前: 診察予約
        値:
          診察予約: [はじめて, 印刷, 撮りたい, 取りたい, 取りたい, 取得, 受診, 初めて, 新規, 診察, 診察の予約, 診療予約, 入れたい, 予約お願い, 予約をお願い, 予約をしたい, 予約をする, 予約をとり, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい]
      - 名前: 定期受診
        値:
          定期受診: [はい新薬, 再診, 最新, 三新薬, 定期, 定期受診予約]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 変更
        値:
          変更: [延期, 時間, 日程, 日付, 判子, 別の, 変え]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "受付はWEBフォームからお申込みも可能です。\nWEBフォームでお申し込みをご希望の場合は、1を、このままお電話でお申し込みをご希望の場合は、2を押してください。ダイヤルプッシュでも操作可能です。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 1
              次の箱: 用件セット1（WEB）
            - 判定: エンティティ含む
              入力: 2
              次の箱: 用件セット2（電話）
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: もしもし
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ
          デフォルト: 用件の確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: WEB予約へ進む
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_WEB予約希望
      - 箱: 電話予約へ進む
        セリフ: お電話でのご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_電話希望
      - 箱: 用件セット1（WEB）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: WEB予約へ進む
      - 箱: 用件セット2（電話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話予約へ進む
      - 箱: もしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし1回目
      - 箱: もしもし1回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、再度お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、再度お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もう一度
        セリフ: "かしこまりました。\nそれでは、再度、ご案内いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 用件セット1（WEB）
            - 判定: 一致
              入力: 2
              次の箱: 用件セット2（電話）

  終了:
    箱一覧:
      - 箱: END_WEB予約希望
        セリフ: none
        入力待ち: なし
      - 箱: END_電話希望
        セリフ: none
        入力待ち: なし
