flow:
  最初の箱: 冒頭アナウンス

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もう一回]
      - 名前: もしもし
        値:
          もしもし: []

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 用件、問い合わせ内容確認
        セリフ: 用件やお問い合わせ内容をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: もしもし
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 上記以外クリア
            - 判定: 数値以上
              入力: 上記以外9（約10秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（約10秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約2秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約2秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: 上記以外on
      - 箱: 上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。 再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件、問い合わせ内容確認
      - 箱: 冒頭アナウンス
        セリフ: 申し訳ございません。うまく聞き取ることができませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件、問い合わせ内容確認
      - 箱: もう一度
        セリフ: "かしこまりました。\nそれでは、再度、ご案内いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件、問い合わせ内容確認
      - 箱: もしもし
        セリフ: "はい、「もしもし」と聞こえております。\nきちんとお声が聞こえておりますので、要件をお話しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: ありがとうございます。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。\n後ほど、担当者より確認させていただきます。"
        入力待ち: なし
