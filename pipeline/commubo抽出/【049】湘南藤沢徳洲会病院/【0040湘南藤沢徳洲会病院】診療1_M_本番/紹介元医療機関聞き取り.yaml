flow:
  最初の箱: 紹介元確認

  エンティティ定義:
    カスタム:
      - 名前: もう一回、間違えた
        値:
          間違え: [まちがい, まちがえ, もう１回, もういちど, もういっかい, もう一回, もう一度, もっかい, 間違い]

  共通:
    箱一覧:
      - 箱: 紹介元確認
        セリフ: 紹介元の医療機関名をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 上記以外クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋施設名なし
              次の箱: count再質問
            - 判定: 一致
              入力: 上記以外9（5秒）＋施設名なし
              次の箱: count再質問
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋施設名あり
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋施設名あり
              次の箱: END_聞き取り成功
          デフォルト: count上記以外
      - 箱: 上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再度聴き取り
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。 再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介元確認

  終了:
    箱一覧:
      - 箱: END_聞き取り成功
        セリフ: ありがとうございます。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。\n後ほど、担当者より確認させていただきます。"
        入力待ち: なし
