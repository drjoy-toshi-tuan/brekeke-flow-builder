flow:
  最初の箱: 冒頭アナウンス

  エンティティ定義:
    カスタム:
      - 名前: 無し
        値:
          無し: [１つだけ, ありません, あれだけ, これだけ, それだけ, ないです, なし, ひとつだけ, 一つだけ, 一個だけ, 無いです]

  共通:
    箱一覧:
      - 箱: 診療科の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 無い
              次の箱: 無しセット
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋診療科発話なし
              次の箱: count再質問
            - 判定: 一致
              入力: 無言9（5秒）＋診療科発話なし
              次の箱: count再質問
            - 判定: 数値以上
              入力: 無言3（約2秒）＋診療科発話あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋診療科発話あり
              次の箱: END_聞き取り完了
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聴き取り
      - 箱: 再度質問
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 追加診療科聴取（フリー）
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度質問
      - 箱: 追加診療科聴取（フリー）
        セリフ: "複数の診療科があればおっしゃってください。\n無い場合は「ありません」とおっしゃってください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聴き取り
      - 箱: 無しセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: 冒頭アナウンス
        セリフ: 続けて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 追加診療科聴取（フリー）

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: ありがとうございます。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: 申し訳ございません。うまく聞き取ることができませんでした。後ほど担当者より確認させていただきます。
        入力待ち: なし
