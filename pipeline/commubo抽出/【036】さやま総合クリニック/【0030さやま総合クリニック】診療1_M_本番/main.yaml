flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: はい。石心会さやま総合クリニックの、外来予約専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付分岐へ
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日の聞き取り
      - 箱: 次へ_1
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日の聞き取り
      - 箱: ３回失敗後のかけ直し依頼
        セリフ: "お電話が遠いようで、回答が確認できませんでした。\n恐れ入りますが、日曜祝日を除く、月曜日から金曜日の8時から18時、土曜日の8時から17時に、外来予約センターへおかけなおしください。\n電話番号が分かる場合は、そのままお電話をお切りください。 \n分からない場合はご案内いたしますのでメモをご準備ください。\nお電話番号は、\n04-2953-9995、\nです。\n\n繰り返します。\nお電話番号は、04-2953-9995、\nです。\n\n繰り返します。\nお電話番号は、\n04-2953-9995、\nです。\nそれでは、失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ_2
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: キャンセル理由確認
      - 箱: 当日予約→かけ直し
        セリフ: "申し訳ございません。\n当日のご予約については、AI電話ではお受けできません。\n恐れ入りますが、日曜祝日を除く、月曜日から金曜日の8時から18時、土曜日の8時から17時に、外来予約センターへおかけなおしください。\n電話番号が分かる場合は、そのままお電話をお切りください。 \n分からない場合はご案内いたしますのでメモをご準備ください。\nお電話番号は、\n04-2953-9995、\nです。\n\n繰り返します。\nお電話番号は、04-2953-9995、\nです。\n\n繰り返します。\nお電話番号は、\n04-2953-9995、\nです。\nそれでは、失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 定期予約
              次の箱: 定期予約の流れ
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更の流れ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルの流れ
      - 箱: 次へ_3
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_4
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 次へ_5
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 次へ_6
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 他の要望確認
      - 箱: 予約キャンセルの流れ
        セリフ: 予約キャンセルの申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 定期予約の流れ
        セリフ: "定期予約の申し込みを受付いたしました。\n後ほど、担当者から折り返し電話、もしくはSMSにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ
        セリフ: "予約変更の申し込みを受付いたしました。\n後ほど、担当者から折り返し電話、もしくはSMSにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 定期予約
              次の箱: 次へ_1
            - 判定: 一致
              入力: 予約変更
              次の箱: 次へ
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ
      - 箱: 用件の確認_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ_2
          デフォルト: 次へ_1
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 定期予約
              次の箱: 診療科聞き取りへ
            - 判定: 一致
              入力: 予約変更
              次の箱: 診療科聞き取りへ
            - 判定: 一致
              入力: キャンセル
              次の箱: 診療科聞き取りへ
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 診療科聞き取りへ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科聞き取り
      - 箱: 代表案内へ（用件NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 代表案内へ（診療科NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 代表案内へ（内容NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 代表案内へ（希望日NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 代表案内へ（理由NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 代表案内へ（電話番号NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 代表案内へ（生年月日NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 代表案内へ（氏名NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 代表案内へ（診察券番号NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 代表案内へ（予約日NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（代表案内）
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_4
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の分岐
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 代表案内へ（当日予約）
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_3
      - 箱: 診療科聞き取り
        セリフ: none
        説明: サブシナリオ「診療科聞き取り」を呼び出す
        参照ファイル: 診療科聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の確認_1
      - 箱: 完了フラグ（代表案内）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ３回失敗後のかけ直し依頼
      - 箱: 他の要望確認
        セリフ: none
        説明: サブシナリオ「他の要望確認」を呼び出す
        参照ファイル: 他の要望確認.yaml
        回答振り分け:
          デフォルト: 次へ_5
      - 箱: 受付時間内へ
        セリフ: "新規のご予約、及び当日のご予約に関しては、こちらの電話では受付できませんので、外来予約センターへおかけ直しください。\n健診のご予約に関しては、健診センターへおかけ直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 受付時間外アナウンス（8/1以降）
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、日曜、祝日、年末年始を除く、月曜日から金曜日は24時間、土曜日は、0時から17時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 受付時間外アナウンス
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、日曜、祝日、年末年始を除く、月曜日から金曜日は、8時から18時、土曜日は、8時から17時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: キャンセル理由確認
        セリフ: none
        説明: サブシナリオ「キャンセル理由確認」を呼び出す
        参照ファイル: キャンセル理由確認.yaml
        回答振り分け:
          デフォルト: 次へ_6
      - 箱: 代表案内へ（当日予約）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日予約→かけ直し
      - 箱: 入電曜日時間判断(8/1以降)
        セリフ: none
        説明: サブシナリオ「入電曜日時間判断(8/1以降)」を呼び出す
        参照ファイル: 入電曜日時間判断(8_1以降).yaml
        回答振り分け:
          デフォルト: 年末年始日付分岐
      - 箱: 希望日の聞き取り
        セリフ: none
        説明: サブシナリオ「希望日の聞き取り」を呼び出す
        参照ファイル: 希望日の聞き取り.yaml
        回答振り分け:
          デフォルト: 代表案内へ（当日予約）
      - 箱: 日付分岐へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電曜日時間判断(8/1以降)
      - 箱: 年末年始日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/29まで
              次の箱: 受付時間外アナウンス（8/1以降）
            - 判定: 一致
              入力: 12/30
              次の箱: 年末年始冒頭アナウンス
            - 判定: 一致
              入力: 12/31
              次の箱: 年末年始冒頭アナウンス
            - 判定: 一致
              入力: 1/1
              次の箱: 年末年始冒頭アナウンス
            - 判定: 一致
              入力: 1/2
              次の箱: 年末年始冒頭アナウンス
            - 判定: 一致
              入力: 1/3
              次の箱: （土）時間の分岐
          デフォルト: 受付時間外アナウンス（8/1以降）
      - 箱: 年末年始冒頭アナウンス
        セリフ: "12月30日から1月4日までは、年末年始のため、外来診療を休止しております。\n折り返しのご連絡は1月5日（月）以降、順次となります。ご了承ください。また、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受付時間内へ
      - 箱: （土）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
