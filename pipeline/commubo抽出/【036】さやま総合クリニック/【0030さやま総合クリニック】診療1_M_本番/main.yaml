              入力: 17時まで
              次の箱: 年末年始冒頭アナウンス
          デフォルト: 受付時間外アナウンス（8/1以降）
      - 箱: （12/29）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 18時まで
              次の箱: 受付時間内へ
          デフォルト: 年末年始冒頭アナウンス
      - 箱: 年末年始日付の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/28まで
              次の箱: 受付時間内へ
            - 判定: 一致
              入力: 12/29
              次の箱: （12/29）時間の分岐
          デフォルト: 受付時間内へ
      - 箱: テスト
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電曜日時間判断(8/1以降)

  終了:
