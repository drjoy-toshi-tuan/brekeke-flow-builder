flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 代表案内案件
        値:
          代表案内: [ドック, 健康診断, 健診, 検診, 人間ドック]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 用件
        値:
          キャンセル: [3, 3番, キャンセル, さん, サン, さんばん, サンバン, やめる, 三, 三番, 取り消し, 取り消す, 取消]
          定期予約: [1, 1番, いち, イチ, いち, いちばん, イチバン, 一, 一番, 再診, 最初, 最新, 撮りたい, 三新薬, 始め, 取得, 受診, 診察, 診察の予約, 診療予約, 予約お願い, 予約する, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          変更: [2, 2番, に, ニ, にばん, ニバン, ヘンコウ, 延期, 取り直したい, 取り直す, 二番, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更, 予約の変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "はじめに、ご用件を、次の3つのうちのいずれかでお話ください。\n 1「定期受診の予約をとる」、2「予約を変更する」、3「予約をキャンセルする」、それでは、お話ください。ダイヤルプッシュでも操作できます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: DTMF回答分岐
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。\nご用件を、次の3つのうちのいずれかでお話ください。\n 1「定期受診の予約をとる」、2「予約を変更する」、3「予約をキャンセルする」、\n数字をダイヤルプッシュで入力しての受付も可能です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 定期予約
              次の箱: 定期予約復唱
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
      - 箱: 予約キャンセル復唱
        セリフ: "ご予約のキャンセルで、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約変更復唱
        セリフ: "ご予約の変更で、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 定期予約復唱
        セリフ: 定期受診のご予約で、よろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count聞き直し_2
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count聞き直し_2
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
          デフォルト: count上記以外_1
      - 箱: count聞き直し_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝定期予約
              次の箱: 定期予約セット
            - 判定: 一致
              入力: 2＝変更
              次の箱: 予約変更セット
            - 判定: 一致
              入力: 3＝キャンセル
              次の箱: 予約キャンセルセット
          デフォルト: count上記以外_2
      - 箱: 定期予約セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 予約変更セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 予約キャンセルセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
