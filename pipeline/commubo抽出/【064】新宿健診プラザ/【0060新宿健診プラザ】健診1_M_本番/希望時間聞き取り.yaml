flow:
  最初の箱: 希望時間の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あっています, あってます, うん, うんうん, そう, そうそう, そうです, そうね, それ, それで, それです, はーい, はい]
      - 名前: 時分
        値:
          時: []
          分: []
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いえいえ, そうじゃない, それじゃない, それではない, 違います, 違う, 違う, 間違い, 間違って]

  共通:
    箱一覧:
      - 箱: 希望時間の聞き取りへ
        セリフ: "ご希望の時間を「9時30分」のようにお話ください。\n0930のようにダイヤルプッシュで時間と分の4桁の数字の入力も可能です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 時間
              次の箱: 時間セット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 希望時間セット（DTMF）
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 聴き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 予約時間確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: リセット→再度聞き取りへ
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
          デフォルト: END_再度聞き取りへ（DTMF）
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: あり
        回答振り分け:
          デフォルト: 希望時間の聞き取りへ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り完了
      - 箱: 時間セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り完了
      - 箱: 聴き取り完了
        セリフ: "<? $希望時間の読み ?>\n、でよろしいですか?\nはい、または、いいえ、のいずれかでお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約時間確認
      - 箱: 予約時間確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 時間
              次の箱: リセット
          デフォルト: count上記以外_1
      - 箱: リセット
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間セット
      - 箱: リセット→再度聞き取りへ
        セリフ: "恐れ入りますが、\nなるべく言葉と言葉の間に間をあけずにお話いただけますか?\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間の聞き取りへ
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: 希望時間セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 4桁取得
              次の箱: 聴き取り完了
          デフォルト: 上記以外クリア
      - 箱: 上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
            - 判定: 一致
              入力: 2＝否定
          デフォルト: count再質問_3

  終了:
    箱一覧:
      - 箱: END_再度聞き取りへ（DTMF）
        セリフ: "正しい番号が認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
