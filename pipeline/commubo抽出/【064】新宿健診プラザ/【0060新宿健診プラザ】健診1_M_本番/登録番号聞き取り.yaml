flow:
  最初の箱: 登録番号確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [はーい, ハイ, はいそうです, はい合ってます, はい大丈夫です]
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9以上
              次の箱: count聞き直し
            - 判定: 数値以上
              入力: 3以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
            - 判定: エンティティ含む
              入力: 3以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: END_登録番号確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 登録番号確認（2回目以降）
      - 箱: 診察券番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 登録番号セット
            - 判定: エンティティ含む
              入力: 数字
              次の箱: 診察券番号セット（発話）
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 診察券番号セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: countクリア
          デフォルト: count上記以外
      - 箱: countクリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の読みセット
      - 箱: 再度聞き取り
        セリフ: 申し訳ございません、正しい桁数で聞き取れませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 登録番号確認（初回）
        セリフ: "登録番号は、\n<? $診察券番号の読み ?>\n、でよろしいでしょうか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_登録番号確認
      - 箱: 登録番号確認（2回目以降）
        セリフ: "登録番号は、\n<? $診察券番号の読み ?>\n、でよろしいでしょうか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_登録番号確認
      - 箱: 診察券番号の聞き取りへ
        セリフ: "「健康診断受診のお知らせ」に記載されている登録番号を仰ってください。\nわからない方は、「わからない」とお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号セット（発話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号桁数チェック
      - 箱: 診察券番号セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号の読みセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_登録番号聞き取り済み
      - 箱: 登録番号確認へ
        セリフ: 登録番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ
      - 箱: ダイヤルプッシュ案内
        セリフ: "なお、AIが登録番号を正しく認識しない場合は、ダイヤルプッシュでの入力も可能です。\n再度、10桁の番号をお答えいただくか、ダイヤルプッシュにてお答え下さい。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回以上
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回以上
          デフォルト: END_否定
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_登録番号聞き取れず
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取り
      - 箱: 登録番号セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_番号が分からない

  終了:
    箱一覧:
      - 箱: END_count上記以外
        セリフ: none
        入力待ち: なし
      - 箱: END_診察券番号クリア
        セリフ: 失礼しました、
        入力待ち: なし
      - 箱: END_登録番号確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
            - 判定: エンティティ含む
              入力: 肯定エンティティ
            - 判定: エンティティ含む
              入力: 肯定
            - 判定: エンティティ含む
              入力: 登録番号
      - 箱: END_否定
        セリフ: "恐れ入りますが、\nなるべく数字と数字の間に間をあけずにお答えいただけますか?"
        入力待ち: なし
      - 箱: END_登録番号聞き取り済み
        セリフ: none
        入力待ち: なし
      - 箱: END_番号が分からない
        セリフ: none
        入力待ち: なし
      - 箱: END_登録番号聞き取れず
        セリフ: none
        入力待ち: なし
