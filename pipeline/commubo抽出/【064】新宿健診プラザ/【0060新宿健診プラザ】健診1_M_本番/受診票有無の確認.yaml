flow:
  最初の箱: 受診票有無確認

  エンティティ定義:
    カスタム:
      - 名前: 持っている
        値:
          持っている: [あります, ある, いまーす, います, いる, 持っていまーす, 持ってまーす, 持ってます, 盛ってまーす, 盛ってます]
      - 名前: 持ってない
        値:
          持ってない: [いない, いませーん, いません, ない, もってない, もてない, 以てない, 持っていません, 持ってませーん, 持ってません, 盛ってない]
      - 名前: 否定単語
        値:
          違います: [いいえ, いえ, いや, じゃない, ダメ, ダメ, ノー, 違い, 違う, 違って, 駄目]

  共通:
    箱一覧:
      - 箱: 受診票有無確認
        セリフ: 「健康診断受診のお知らせ」は、お手元にございますか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診票有無確認_1
      - 箱: 受診票有無確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 受診票無
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 受診票無
            - 判定: エンティティ含む
              入力: 持ってない
              次の箱: 受診票無
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 受診票有
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 受診票有
            - 判定: エンティティ含む
              入力: 持っている
              次の箱: 受診票有
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 受診票有無確認_1
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、あります」、や、「いいえ、ありません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診票有無確認
      - 箱: 受診票有
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診票有
      - 箱: 受診票無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診票無
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診票有無聞き取れず

  終了:
    箱一覧:
      - 箱: END_受診票有無確認へ
        セリフ: 「健康診断受診のお知らせ」を、お手元にご準備ください。
        入力待ち: なし
      - 箱: END_受診票無
        セリフ: none
        入力待ち: なし
      - 箱: END_受診票有
        セリフ: none
        入力待ち: なし
      - 箱: END_受診票有無聞き取れず
        セリフ: none
        入力待ち: なし
