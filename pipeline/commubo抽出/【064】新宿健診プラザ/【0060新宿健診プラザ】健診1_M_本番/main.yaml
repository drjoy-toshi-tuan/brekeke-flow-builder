flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n健診プラザの、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 予約変更
        セリフ: "日時変更の希望を受付いたしました。\n内容を確認の上、3営業日以内に担当者よりショートメールまたはお電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約キャンセル
        セリフ: ご予約のキャンセルを承りました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電時間判断
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 最後に、日中に連絡の取りやすい連絡先のお電話番号として、携帯番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の分岐_1
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の分岐
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 日時変更
              次の箱: 次へ
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ
      - 箱: 用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 日時変更
              次の箱: 予約変更
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル
      - 箱: 用件の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 日時変更
              次の箱: 受診希望日聞き取り
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ_1
      - 箱: 受診票有無の確認
        セリフ: none
        説明: サブシナリオ「受診票有無の確認」を呼び出す
        参照ファイル: 受診票有無の確認.yaml
        回答振り分け:
          デフォルト: 携帯/固定電話識別へ
      - 箱: 氏名IN
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診者氏名聞き取り
      - 箱: 生年月日IN
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 次へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日聞き取り
      - 箱: 希望時間IN
        セリフ: 続けて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間聞き取り
      - 箱: 内容IN
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: END_内容聞き取り
      - 箱: 次へ_1
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約時間聞き取り
      - 箱: 受診希望日聞き取り
        セリフ: none
        説明: サブシナリオ「受診希望日聞き取り」を呼び出す
        参照ファイル: 受診希望日聞き取り.yaml
        回答振り分け:
          デフォルト: 希望時間IN
      - 箱: 受診者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「受診者氏名聞き取り」を呼び出す
        参照ファイル: 受診者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 生年月日IN
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 予約日聞き取り
        セリフ: none
        説明: サブシナリオ「予約日聞き取り」を呼び出す
        参照ファイル: 予約日聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の分岐_2
      - 箱: 希望時間聞き取り
        セリフ: none
        説明: サブシナリオ「希望時間聞き取り」を呼び出す
        参照ファイル: 希望時間聞き取り.yaml
        回答振り分け:
          デフォルト: 受診者氏名聞き取り
      - 箱: 時間外へ（完了フラグ7）
        セリフ: "ただいまの時間は受付時間外となります。\n恐れ入りますが、時間内におかけ直しください。 \n本窓口の受付時間は、日曜祝日、年末年始を除く月曜から土曜の8時半から17時です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: エンジン切り替えへ（完了フラグ7）
        セリフ: "誠に恐れ入りますが2月24日より、AI電話の電話番号が変わりました。\nお手数をおかけしますが、050-1725-3606へおかけ直しください。電話番号をご案内します。050-1725-3606です。繰り返します。050-1725-3606です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 代表案内(希望日NG)
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗時アナウンス
      - 箱: 代表案内(氏名NG)
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗時アナウンス
      - 箱: 代表案内(電話番号NG)
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗時アナウンス
      - 箱: 代表案内(予約日NG)
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗時アナウンス
      - 箱: 代表案内(用件NG)
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗時アナウンス
      - 箱: 代表案内(希望時間NG)
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗時アナウンス
      - 箱: 代表案内(生年月日NG)
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗時アナウンス
      - 箱: 代表案内(予約時間NG)
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗時アナウンス
      - 箱: 携帯/固定電話識別へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号区切り
      - 箱: 受診票の有無IN
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診票有無の確認
      - 箱: 電話番号区切り
        セリフ: none
        説明: サブシナリオ「電話番号区切り」を呼び出す
        参照ファイル: 電話番号区切り.yaml
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 入電番号取得確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得
              次の箱: END_webページ案内へ
          デフォルト: 携帯番号チェック
      - 箱: 携帯番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯番号取得あり
              次の箱: END_SMS送信へ
          デフォルト: 携帯電話の有無聞き取りへ
      - 箱: 携帯電話の有無聞き取りへ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: SMS送信用携帯番号聞き取りへ
      - 箱: SMS送信用携帯番号聞き取りへ
        セリフ: none
        説明: サブシナリオ「SMS送信用携帯番号聞き取りへ」を呼び出す
        参照ファイル: SMS送信用携帯番号聞き取りへ.yaml
        回答振り分け:
          デフォルト: END_SMS送信へ
      - 箱: 受付時間内へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 折り返し確認
        セリフ: none
        説明: サブシナリオ「折り返し確認」を呼び出す
        参照ファイル: 折り返し確認.yaml
        回答振り分け:
          デフォルト: END_完了フラグ（折返し希望）
      - 箱: 予約時間聞き取り
        セリフ: none
        説明: サブシナリオ「予約時間聞き取り」を呼び出す
        参照ファイル: 予約時間聞き取り.yaml
        回答振り分け:
          デフォルト: 氏名IN
      - 箱: 3回失敗時アナウンス
        セリフ: "お電話が遠いようで、回答が確認できませんでした。\n恐れ入りますが、日曜、祝日を除く、月曜日から土曜日の8時半から17時に、予約センターへおかけなおしください。\n電話番号が分かる場合は、そのままお電話をお切りください。\n分からない場合はご案内いたしますのでメモをご準備ください。\nお電話番号は、03-3207-2222、です。\n繰り返します。\nお電話番号は、03-3207-2222、です。\n繰り返します。\nお電話番号は、03-3207-2222、です。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: 稼働前分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 5/25まで
              次の箱: 稼働前アナウンス
            - 判定: 一致
              入力: 5/26
              次の箱: 5/26分岐
      - 箱: 5/26分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時30分まで（稼働前）
              次の箱: 稼働前アナウンス
      - 箱: 稼働前アナウンス
        セリフ: "この番号は、5/26午前8時30分より、受付開始となります。\n開始後におかけ直しください。\n\nお電話ありがとうございました。 \nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: 入電時間判断
        セリフ: none
        説明: サブシナリオ「入電時間判断」を呼び出す
        参照ファイル: 入電時間判断.yaml
        回答振り分け:
          デフォルト: エンジン切り替えへ（完了フラグ7）

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_健診予約
        セリフ: "健診予約の申し込みを承りました。\n内容を確認の上、担当者よりご連絡いたします。"
        入力待ち: なし
      - 箱: END_その他お問い合わせ
        セリフ: "お問い合わせの内容を承りました。\n内容を確認の上、担当者よりご連絡いたします。"
        入力待ち: なし
      - 箱: END_完了フラグ(折返し不要)
        セリフ: none
        入力待ち: なし
      - 箱: END_完了フラグ（折返し希望）
        セリフ: none
        入力待ち: なし
      - 箱: END_完了フラグ(聴取失敗→折返し)
        セリフ: none
        入力待ち: なし
      - 箱: END_用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 健診予約
            - 判定: 一致
              入力: 日時変更
      - 箱: END_登録番号IN
        セリフ: それでは、
        入力待ち: なし
      - 箱: END_内容聞き取り
        セリフ: none
        説明: サブシナリオ「内容聞き取り」を呼び出す
        参照ファイル: 内容聞き取り.yaml
      - 箱: END_折り返し確認へ(内容NG)
        セリフ: none
        入力待ち: なし
      - 箱: END_SMS送信へ
        セリフ: "恐れ入りますが、健康診断のお知らせが届いていない方は、WEB予約をご利用ください。\nショートメールで予約用のリンクをお送りしますので、ご希望の施設をお選びいただき、お申し込みください。"
        入力待ち: なし
      - 箱: END_webページ案内へ
        セリフ: 恐れ入りますが、健康診断のお知らせが届いていない方は、WEB予約をご利用ください。ホームページ上部にある、WEB予約をクリック後、ご希望の施設をお選びいただき、お申し込みください。
        入力待ち: なし
      - 箱: END_登録番号聞き取り
        セリフ: none
        説明: サブシナリオ「登録番号聞き取り」を呼び出す
        参照ファイル: 登録番号聞き取り.yaml
