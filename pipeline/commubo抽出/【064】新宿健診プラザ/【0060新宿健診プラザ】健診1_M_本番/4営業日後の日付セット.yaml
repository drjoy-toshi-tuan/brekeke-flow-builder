flow:
  最初の箱: チェック日付と曜日

  エンティティ定義:
    カスタム:
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []

  共通:
    箱一覧:
      - 箱: チェック日付と曜日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 日曜
              次の箱: 休業日
          デフォルト: 祝日チェック
      - 箱: 休業日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: チェック日付と曜日
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: チェック日付と曜日
      - 箱: 診療日付
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 受付OK日
              次の箱: 4営業日後の日付セット
          デフォルト: チェック日付と曜日
      - 箱: 4営業日後の日付セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_希望日の聞き取りへ
        セリフ: "受診希望日を\n<? $受け入れ最短日 ?>\n以降の日付で"
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
