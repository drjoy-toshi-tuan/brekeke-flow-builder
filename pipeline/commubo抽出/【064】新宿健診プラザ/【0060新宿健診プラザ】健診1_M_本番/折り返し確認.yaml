flow:
  最初の箱: テスト用（名前なし）

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: END_聴取失敗→折返し
          デフォルト: 聴き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: END_聴取失敗→折返し
          デフォルト: 折り返し確認
      - 箱: 氏名、電話番号聞き取り
        セリフ: "かしこまりました。\nそれでは、お名前と、連絡先の電話番号を、固定電話の場合は市外局番からお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 電話番号聞き取り
        セリフ: "かしこまりました。\nそれでは、連絡先の電話番号を、固定電話の場合は市外局番からお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: テスト用（名前なし）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 冒頭
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値
              入力: 上記以外2（約1秒）＋数字発話あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋数字発話あり
              次の箱: END_聞き取り完了
          デフォルト: count上記以外
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_3回聞き取れず
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返し確認
      - 箱: 折り返し確認
        セリフ: オペレーターからの折返し連絡を希望されますか？
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_聞き取り完了_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 氏名取得有無確認
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 氏名取得有無確認
          デフォルト: count上記以外_1
      - 箱: 冒頭
        セリフ: 大変申し訳ございません。上手く聞き取ることができませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返し確認
      - 箱: 氏名取得有無確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 氏名取得済
              次の箱: 電話番号聞き取り
          デフォルト: 氏名、電話番号聞き取り

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: "かしこまりました。\n内容を確認の上、担当者よりご連絡いたします。"
        入力待ち: なし
      - 箱: END_聞き取り完了_1
        セリフ: "かしこまりました。\n内容を確認の上、担当者よりご連絡いたします。"
        入力待ち: なし
      - 箱: END_テスト用（名前あり）
        セリフ: none
        入力待ち: なし
      - 箱: END_3回聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_聴取失敗→折返し
        セリフ: "かしこまりました。\n内容を確認の上、担当者よりご連絡いたします。"
        入力待ち: なし
