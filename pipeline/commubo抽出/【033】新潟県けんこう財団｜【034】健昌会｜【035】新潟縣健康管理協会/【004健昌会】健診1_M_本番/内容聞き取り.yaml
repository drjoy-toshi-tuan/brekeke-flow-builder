flow:
  最初の箱: 用件の分岐

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 変更
        セリフ: ご希望の検査名をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 問合せ
        セリフ: "予約変更に関する内容を、お話ください。\nまた、予約変更以外の内容は、恐れ入りますが、各施設の代表電話番号の2番へおかけ直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 上記以外クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: count上記以外
      - 箱: 上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の分岐
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: 問合せ
              次の箱: 問合せ

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: ありがとうございます。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用
        セリフ: none
        入力待ち: なし
