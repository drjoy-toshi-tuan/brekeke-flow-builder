flow:
  最初の箱: 予約日確定の有無確認

  エンティティ定義:
    カスタム:
      - 名前: 決まっていない
        値:
          決まっていない: [いない, いませーん, いません, ない, ません, 決まってない, 決まってません]
      - 名前: 決まっている
        値:
          決まっている: [います, 決まっています, 決まってます, 決まってる]
      - 名前: 肯定
        値:
          肯定: [1, １, あっています, あってます, イチ, いち, いちばん, イチバン, そうです, はい, 一, 一番, 大丈夫です]
      - 名前: 否定単語
        値:
          否定: [2, ２, いいえ, いや, じゃない, ダメ, ニ, にばん, ニバン, ノー, 違い, 違います, 違う, 違って, 駄目, 二, 二番]

  共通:
    箱一覧:
      - 箱: 予約日確定の有無確認
        セリフ: "ご予約の日時は、施設より連絡があり、確定していますでしょうか？\n1「はい」、2「いいえ」、をプッシュダイヤルでご入力ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日確定有無確認
      - 箱: 予約日確定有無確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_予約日確定
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_予約日確定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_予約日確定
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: END_予約日未確定
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_予約日未確定
            - 判定: エンティティ含む
              入力: 決まっていない
              次の箱: END_予約日未確定
            - 判定: エンティティ含む
              入力: 決まっている
              次の箱: END_予約日確定
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 予約日確定有無確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、そうです」、や、「いいえ、決まっていません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日確定の有無確認
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日確定の有無確認
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: END_予約日確定
            - 判定: 一致
              入力: 2＝否定
              次の箱: END_予約日未確定
          デフォルト: count再質問_1

  終了:
    箱一覧:
      - 箱: END_予約日確定
        セリフ: none
        入力待ち: なし
      - 箱: END_予約日未確定
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
