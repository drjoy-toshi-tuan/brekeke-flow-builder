flow:
  最初の箱: 現在の予約日の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [1, １, あっています, あってます, いいです, いち, イチ, いちばん, イチバン, そうです, それです, はい, 一, 一番, 大丈夫です]
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []
      - 名前: 否定
        値:
          否定: [2, ２, ありません, いいえ, そうじゃない, それじゃない, ニ, にばん, ニバン, 違います, 違う, 間違い, 間違えました, 間違った, 二, 二番, 別の]

  共通:
    箱一覧:
      - 箱: 現在の予約日の聞き取りへ
        セリフ: 現在の予約日を、プッシュダイヤルで、月と日にちの4桁の数字をご入力ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 日付チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 値含む
              入力: 日の発話あり
              次の箱: 日付チェック_2
            - 判定: 値含む
              入力: 月の発話あり
              次の箱: 月の発話あり
            - 判定: 値含む
              入力: 年の発話あり
              次の箱: 日付チェック_3
          デフォルト: 日付チェック_3
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: 値含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち
              次の箱: 月チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち
              次の箱: 月チェック
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 日付
              次の箱: 日付チェック
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 予約日セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
          デフォルト: 聴取内容チェック
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問_2
      - 箱: リセット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問_1
      - 箱: リセット_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問_4
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 無言9（5秒）＋日にちなし
              次の箱: リセット
            - 判定: 一致
              入力: 無言9（5秒）＋日にちなし
              次の箱: リセット
            - 判定: 数値以上
              入力: 無言3（約2秒）＋日にちあり
              次の箱: 日付チェック_1
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋日にちあり
              次の箱: 日付チェック_1
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再度質問
        セリフ: 恐れ入りますが、
        入力待ち: あり
        回答振り分け:
          デフォルト: DTMFブロック
      - 箱: 復唱確認
        セリフ: "<? $予約日の読み ?>\n、でよろしいですか？\n1「はい」、2「いいえ」、をプッシュダイヤルでご入力ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日確認
      - 箱: 日付チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 日付あり
              次の箱: 予約日の判定
          デフォルト: リセット
      - 箱: 日付チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 月チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01月
              次の箱: 日チェック
          デフォルト: 月の置換
      - 箱: 日付チェック_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
            - 判定: 一致
              入力: 01月
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 日チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日の置換
      - 箱: 月の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日チェック
      - 箱: 日の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: 数字を日付に
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 0以下
              次の箱: 聞き取りへ戻る
            - 判定: lessEqual
              入力: 9以下
              次の箱: 0桁詰め
            - 判定: lessEqual
              入力: 31以下
              次の箱: 日の置換
          デフォルト: 聞き取りへ戻る
      - 箱: 0桁詰め
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日の置換
      - 箱: 聞き取りへ戻る
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 予約日の判定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 復唱確認
            - 判定: 数値
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 復唱確認
            - 判定: 数値以上
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 復唱確認
            - 判定: 数値
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 復唱確認
            - 判定: 数値以上
              入力: 1927〜1988（昭和）
              次の箱: 復唱確認
            - 判定: 数値
              入力: 1927〜1988（昭和）
              次の箱: 復唱確認
            - 判定: 数値以上
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 復唱確認
            - 判定: 数値
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 復唱確認
            - 判定: 数値以上
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 復唱確認
            - 判定: 数値
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 復唱確認
            - 判定: 数値以上
              入力: 1990〜2018（平成）
              次の箱: 復唱確認
            - 判定: 数値
              入力: 1990〜2018（平成）
              次の箱: 復唱確認
            - 判定: 数値以上
              入力: 2019-01-01〜04-30（平成）
              次の箱: 復唱確認
            - 判定: 数値
              入力: 2019-01-01〜04-30（平成）
              次の箱: 復唱確認
            - 判定: 数値以上
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 復唱確認
            - 判定: 数値
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 復唱確認
            - 判定: 数値以上
              入力: 2020〜（令和）
              次の箱: 復唱確認
          デフォルト: リセット_1
      - 箱: 月の発話あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_2
      - 箱: 月の発話あり_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 月チェック
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 予約日確認
      - 箱: 再度聞き取りへ
        セリフ: 恐れ入りますが、
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 再度テスト
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 現在の予約日の聞き取りへ
      - 箱: 予約日確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: リセット
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: リセット
            - 判定: エンティティ含む
              入力: 日付
              次の箱: リセット_2
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: 再度聞き取りへ_1
        セリフ: "恐れ入りますが、\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 日付再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 予約日セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 4桁取得
              次の箱: 日付比較
          デフォルト: 無言クリア
      - 箱: ダイヤルプッシュ案内
        セリフ: 再度、現在の予約日を、プッシュダイヤルで月と日にちの4桁の数字をご入力ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 日付比較
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 比較日より前
              次の箱: プラス1年後で確定
          デフォルト: そのまま確定
      - 箱: そのまま確定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: プラス1年後で確定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度質問
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 日付再設定へ
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: 2＝否定
              次の箱: リセット
          デフォルト: count再質問_3
      - 箱: DTMFブロック
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 再度質問
          デフォルト: ダイヤルプッシュ案内

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
