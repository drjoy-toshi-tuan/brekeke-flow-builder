flow:
  最初の箱: 施設名の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [１, 1, いち, イチ, いちばん, イチバン, うん, うんうん, そうです, それです, はい, はいはい, 異常部, 一, 一番, 丈夫, 正しい, 大丈夫]
      - 名前: 受診希望施設名
        値:
          うめだ: [1, うめ, 一, 一番]
          近畿: [2, D, キンイチ, きんき, キンキ, にばん, ピンク, 印字, 右, 期限切れ, 禁忌, 金ピ, 元気, 現金, 現地, 新規, 二番, 日にち, 病気, 便秘]
          福島: [4, ふくしま, フクシマ, 四, 四番, 福芦マーク]
          淀川: [3, エガワ, おー動画は, さんばん, どうも, よどかわ, ヨドカワ, よどがわ, ヨドガワ, リビルド側, 三番, 窓側, 予想カバー]
      - 名前: 否定
        値:
          否定: [2, ２, ありません, いいえ, じゃない, ニ, にばん, ニバン, 違います, 違う, 間違い, 間違いました, 間違えました, 間違って, 二, 二番, 別の]

  共通:
    箱一覧:
      - 箱: 施設名の聞き取りへ
        セリフ: "問合せをしたい施設名を、「1.うめだ」、「2.近畿」、\n「3.淀川」、「4.福島」、のいずれかをプッシュダイヤルでご入力ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の確認
      - 箱: 施設名の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 施設名の発話
              次の箱: 施設名のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 施設名の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく認識が出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく認識が出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の復唱
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: 再度聞き取りへ（DTMF）_1
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の復唱
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: 施設名のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の復唱
      - 箱: 福島セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の復唱
      - 箱: 淀川セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の復唱
      - 箱: 近畿セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の復唱
      - 箱: うめだセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の復唱
      - 箱: 施設名の復唱
        セリフ: "<? $facilityname ?>\n、でよろしいですか?\n1「はい」、2「いいえ」、をプッシュダイヤルでご入力ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 施設名再設定へ
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: 施設名再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名のセット
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝うめだ
              次の箱: うめだセット
            - 判定: 一致
              入力: 2＝近畿
              次の箱: 近畿セット
            - 判定: 一致
              入力: 3＝淀川
              次の箱: 淀川セット
            - 判定: 一致
              入力: 4.福島
              次の箱: 福島セット
          デフォルト: count再質問_2
      - 箱: DTMF回答分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝はい
              次の箱: END_聞き取り成功
            - 判定: 一致
              入力: 2＝いいえ
              次の箱: count再質問_4
          デフォルト: count再質問_3

  終了:
    箱一覧:
      - 箱: END_聞き取り成功
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
