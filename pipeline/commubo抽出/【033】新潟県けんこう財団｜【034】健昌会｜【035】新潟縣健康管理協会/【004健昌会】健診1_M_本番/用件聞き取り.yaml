flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あっています, あってます, いいよ, そうです, はい, 異常部, 丈夫, 大丈夫, 大丈夫です]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 数字の１
        値:
          １: [1, いち, イチ, いちばん, イチバン, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, ニバン, にばん, 二, 二番]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いや, じゃない, だめ, 違います, 違う, 別の]
      - 名前: 用件
        値:
          キャンセル: [2, ２, きゃんせる, キャンセル, ニ, ニバン, にばん, やめたい, やめる, 取り消し, 取り消す, 取消, 二, 二番]
          変更: [1, １, イチ, いち, いちばん, イチバン, オプション, 一, 一番, 休薬日時の変更, 九_日の, 九_日次の変更, 五百ミリ一本変更, 五百日時の変更, 四百二十, 時間, 二百一の変更, 二百二十五, 二百日時の変更, 日時, 日程, 日付, 百日の変更, 百日時の変更, 予約の変更, 予約日の変更, 予約日時の健康, 予約日常変更, 予約変更, 曜日, 六時間の変更, 六日時の変更]
          問合せ: [3, ３, アクセス, お伺いしたい, お伺いしたい, さん, サン, さんばん, サンバン, その他, その他を取り合わせ, なくした, 確認, 確認したい, 確認したい, 教えて, 金額, 三, 三番, 質問, 質問したい, 質問したい, 調べて, 聞きたい, 忘れた, 問い合わす, 問い合わせ, 料金]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の3つのうちの、いずれかをプッシュダイヤルでご入力ください。\n「1、予約日時の変更」\n「2、予約のキャンセル」\n「3、その他、予約変更に関するお問い合わせ」"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく認識が出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ（DTMF）_1
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 変更セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（変更）
      - 箱: キャンセルセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（キャンセル）
      - 箱: 問合せセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（問い合わせ）
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: キャンセル
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: 問合せ
              次の箱: 用件の復唱（問い合わせ）
      - 箱: 用件の復唱（変更）
        セリフ: "「予約の変更」、でよろしいですか?\n1「はい」、2「いいえ」、をプッシュダイヤルでご入力ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（キャンセル）
        セリフ: "「ご予約のキャンセル」、でよろしいですか?\n1「はい」、2「いいえ」、をプッシュダイヤルでご入力ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（問い合わせ）
        セリフ: "「その他お問い合わせ」、でよろしいですか?\n1「はい」、2「いいえ」、をプッシュダイヤルでご入力ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 数字の１
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 数字の２
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_5
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 否定
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 用件再設定へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: リセット
        セリフ: 再度、テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝変更
              次の箱: 変更セット
            - 判定: 一致
              入力: 2＝キャンセル
              次の箱: キャンセルセット
            - 判定: 一致
              入力: 3＝問合せ
              次の箱: 問合せセット
          デフォルト: count再質問_2
      - 箱: DTMF回答分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝はい
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: 2＝いいえ
              次の箱: count再質問_4
          デフォルト: count再質問_3

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
