flow:
  最初の箱: 受診票有無確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [うん, うんうん, そう, そうそう, そうです, はーい, はい, はいはい]
      - 名前: 届いている
        値:
          届いている: [あります, ある, もらいました, 持ってます, 受け取りました, 送ってもらいました, 届いた, 届いています, 届いてます, 届いてんねん, 届きました, 来ました]
      - 名前: 届いてない
        値:
          届いてない: [きてません, こない, ない, 持っていません, 持ってない, 持ってませーん, 持ってません, 送ってこない, 送られてない, 届いていない, 届いていません, 届いておりません, 届いてへん, 届いてません, 来てない]
      - 名前: 否定単語
        値:
          違います: [いいえ, いえ, いや, じゃない, ダメ, ダメ, ちゃいます, ちゃう, ノー, 違い, 違う, 違って, 駄目]

  共通:
    箱一覧:
      - 箱: 受診票有無確認
        セリフ: "お手元に、当会の健康診断受診のお知らせはございますか？\n1「はい」、2「いいえ」、をプッシュダイヤルでご入力ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診票有無確認_1
      - 箱: 受診票有無確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 有り
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 有り
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 有り
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 無し
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 無し
            - 判定: エンティティ含む
              入力: 届いていない
              次の箱: 無し
            - 判定: エンティティ含む
              入力: 届いている
              次の箱: 有り
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 受診票有無確認_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診票有無確認
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正確な番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診票有無確認
      - 箱: 有り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受診票有
      - 箱: 無し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １＝はい
              次の箱: 有り
            - 判定: 一致
              入力: 2＝いいえ
              次の箱: 無し
          デフォルト: count再質問_1
      - 箱: 用件分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 問合せ
              次の箱: END_受診票無（問合せ）
          デフォルト: END_受診票無（問合せ以外）

  終了:
    箱一覧:
      - 箱: END_受診票無（問合せ以外）
        セリフ: none
        入力待ち: なし
      - 箱: END_受診票有
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_受診票無（問合せ）
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
