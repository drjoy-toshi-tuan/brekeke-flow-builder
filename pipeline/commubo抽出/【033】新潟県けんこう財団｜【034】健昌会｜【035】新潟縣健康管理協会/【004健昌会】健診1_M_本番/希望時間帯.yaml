flow:
  最初の箱: 希望時間帯の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 希望時間帯
        値:
          10時～11時台: [10時, 10時台, 11時, 11時台, 2, ２, に, ニ, にーばん, にばん, ニバン, に番, ニ番]
          12時台以降の午後: [12時台, 3, ３, 3バン, お昼過ぎ, ごご, ゴゴ, サンバン, さんばん, 午後, 三]
          8時～9時台: [１, 8時, 8時台, 9時, 9時台, いち, イチ, イチバン, ゴゼン, 一, 一番, 朝, 朝一]
      - 名前: 希望無し
        値:
          希望無し: [いつでも, おまかせ, どちらでも, どっちでも, 希望はない, 空いている時間, 空いてる時間, 空きがある, 特にない, 特になし]
      - 名前: 肯定
        値:
          肯定: [うん, うんうん, そうです, それです, はい, はいはい, 異常部, 丈夫, 正しい, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 数字の１
        値:
          １: [1, いち, イチ, いちばん, イチバン, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, にばん, ニバン, 二, 二番]
      - 名前: 数字の３
        値:
          3: [３, 3バン, ３番, さん, 三, 三バン, 三番]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, ううん, じゃない, 違います, 違う, 間違い, 間違って, 別の]

  共通:
    箱一覧:
      - 箱: 希望時間帯の聞き取りへ
        セリフ: "ご希望の時間帯を、次のいずれかの数字でプッシュダイヤルをご入力ください。\n「1.　8時～9時台」「2.　10時～11時台」「3.　12時台以降の午後」"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の確認
      - 箱: 希望時間帯の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: いつでも
              次の箱: 希望無しセット
            - 判定: エンティティ含む
              入力: 希望時間帯
              次の箱: 午前/午後セット
            - 判定: エンティティ含む
              入力: 時間を発話
              次の箱: 希望時間セット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 希望時間帯の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）_1
      - 箱: 再度聞き取りへ
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の聞き取りへ
      - 箱: 再度聞き取りへ_1
        セリフ: "恐れ入りますが、\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の復唱
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の聞き取りへ
      - 箱: 再度聞き取りへ（DTMF）_1
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の復唱
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の聞き取りへ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の聞き取りへ
      - 箱: 午前/午後セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の復唱
      - 箱: 8時～9時台セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の復唱
      - 箱: 10時～11時台セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の復唱
      - 箱: 希望時間セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り成功
      - 箱: 希望無しセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り成功
      - 箱: 希望時間帯の復唱
        セリフ: "<? $preferred_time ?>\n、でよろしいですか?\n1「はい」、2「いいえ」、をプッシュダイヤルでご入力ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 数字の１を発話
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 数字の２を発話
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_5
            - 判定: エンティティ含む
              入力: いつでも
              次の箱: 希望無し再設定へ
            - 判定: エンティティ含む
              入力: 時間発話
              次の箱: 希望時間再設定へ
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 否定
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 希望時間帯再設定へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の聞き取りへ
      - 箱: 希望時間帯再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 午前/午後セット
      - 箱: 希望無し再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望無しセット
      - 箱: 希望時間再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間セット
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝8時～9時台
              次の箱: 8時～9時台セット
            - 判定: 一致
              入力: 2＝10時～11時台
              次の箱: 10時～11時台セット
            - 判定: 一致
              入力: ３=12時台以降の午後
              次の箱: 12時台以降の午後セット
          デフォルト: count再質問_2
      - 箱: DTMF回答分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝はい
              次の箱: END_聞き取り成功
            - 判定: 一致
              入力: 2＝いいえ
              次の箱: count再質問_4
          デフォルト: count再質問_3
      - 箱: 12時台以降の午後セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間帯の復唱

  終了:
    箱一覧:
      - 箱: END_聞き取り成功
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
