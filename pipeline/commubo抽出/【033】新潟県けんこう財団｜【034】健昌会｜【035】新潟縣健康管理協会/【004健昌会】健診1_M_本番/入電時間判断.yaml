flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始分岐
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 時間外コメント（3月～）
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （月～金）時間の分岐
            - 判定: 一致
              入力: 土
              次の箱: （土）時間の分岐
          デフォルト: 時間外コメント（3月～）
      - 箱: （月～金）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時より前
              次の箱: 時間外コメント（3月～）
            - 判定: 数値
              入力: 16時30分まで
              次の箱: END_受付時間内
          デフォルト: 時間外コメント（3月～）
      - 箱: （土）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時30分より前
              次の箱: 時間外コメント（3月～）
            - 判定: 数値
              入力: 12時まで
              次の箱: END_受付時間内
          デフォルト: 時間外コメント（3月～）
      - 箱: 12/26時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時より前
              次の箱: 時間外コメント（3月～）
            - 判定: 数値
              入力: 16時30分まで
              次の箱: END_受付時間内
          デフォルト: 年末年始（アナウンス）
      - 箱: 1/8時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時より前
              次の箱: 年末年始（アナウンス）
            - 判定: 数値
              入力: 16時30分まで
              次の箱: END_受付時間内
          デフォルト: 時間外コメント（3月～）
      - 箱: 時間外コメント（3月～）
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、日曜、祝日、年末年始を除く、月曜日から金曜日は、8時から16時30分、土曜日は営業日のみ、8時30分から12時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 年末年始分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/25まで
              次の箱: 祝日チェック
            - 判定: 一致
              入力: 12/26
              次の箱: 12/26時間の分岐
            - 判定: lessEqual
              入力: 12/27～1/7まで
              次の箱: 年末年始（アナウンス）
            - 判定: 一致
              入力: 1/8
              次の箱: 1/8時間の分岐
          デフォルト: 祝日チェック
      - 箱: 年末年始（アナウンス）
        セリフ: 新規のご予約については、1月8日、木曜日、8時以降に代表電話へおかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始（24時間稼働）
      - 箱: テスト
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始分岐

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始（24時間稼働）
        セリフ: none
        入力待ち: なし
