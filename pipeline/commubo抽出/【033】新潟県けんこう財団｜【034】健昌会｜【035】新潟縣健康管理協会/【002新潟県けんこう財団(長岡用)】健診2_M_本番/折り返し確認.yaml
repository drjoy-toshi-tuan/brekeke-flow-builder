flow:
  最初の箱: 現在の時間セット

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あってます, うん, お願いします, そう, そうです, それ, はーい, はい, よろしく]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない, でない, 違い, 違う]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: END_聞き取り失敗
          デフォルト: 聴き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: END_聞き取り失敗
          デフォルト: 折り返し確認
      - 箱: 氏名、電話番号聞き取り
        セリフ: "かしこまりました。\nそれでは、お名前と、連絡先の電話番号を、固定電話の場合は市外局番からお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 電話番号聞き取り
        セリフ: "かしこまりました。\nそれでは、連絡先の電話番号を、固定電話の場合は市外局番からお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 連休中分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 連休中
              次の箱: END_連休中アナウンスへ
          デフォルト: 冒頭
      - 箱: 現在の時間セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 連休中分岐
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値
              入力: 上記以外2（約1秒）＋数字発話あり
              次の箱: 時間外分岐（16時～翌8時）
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋数字発話あり
              次の箱: 時間外分岐（16時～翌8時）
          デフォルト: count上記以外
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 折り返し確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 氏名取得有無確認
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 氏名取得有無確認
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 氏名取得有無確認
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_聞き取り完了（折返し不要）
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: END_聞き取り完了（折返し不要）
          デフォルト: count上記以外_1
      - 箱: 冒頭
        セリフ: "大変申し訳ございません。上手く聞き取ることができませんでした。\nオペレーターからの折返し連絡を希望されますか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返し確認
      - 箱: 氏名取得有無確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 氏名取得済
              次の箱: 電話番号聞き取り
          デフォルト: 氏名、電話番号聞き取り
      - 箱: 時間外分岐（16時～翌8時）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時より前
              次の箱: END_聞き取り完了（時間外）
            - 判定: 数値
              入力: 16時より前
              次の箱: END_聞き取り完了（時間内）
          デフォルト: END_聞き取り完了（時間外）

  終了:
    箱一覧:
      - 箱: END_聞き取り完了（時間外）
        セリフ: "かしこまりました。\n当施設の営業日に担当者より、ご連絡いたします。"
        入力待ち: なし
      - 箱: END_聞き取り完了（折返し不要）
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り完了（時間内）
        セリフ: "かしこまりました。\n内容を確認の上、担当者よりご連絡いたします。"
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: "大変申し訳ございません。\nうまく聞き取ることができませんでした。"
        入力待ち: なし
      - 箱: END_連休中アナウンスへ
        セリフ: none
        入力待ち: なし
