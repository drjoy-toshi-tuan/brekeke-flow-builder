flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あっています, あってます, うん, うんうん, そうそう, そうです, それで, それです, はーい, はい, はいはい, 異常部, 丈夫, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 数字の１
        値:
          １: [1, イチ, いち, イチバン, いちばん, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, にばん, ニバン, 二, 二番]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いえいえ, いや, じゃない, そうじゃない, そうではない, それじゃない, 違います, 違う, 間違い]
      - 名前: 用件
        値:
          キャンセル: [3, 3番, サン, さんばん, やめる, 三, 三番, 取り消し, 取り消す, 取消]
          健診予約: [1, 1番, KCの予約, Ping寝具訳, イチ, いちばん, エンジンの予約, ケイヒンの予約, ドックの予約, バックです, ロックの予約, 一, 一番, 金の予約, 金信の予約, 銀行新の予約, 景品の予約, 健康Ping断の良い, 健康診断の予約, 健診と人間ドックの予約, 健診と人間ロックの予約, 健診のお薬, 健診の予約, 検査の予約, 検診と人間ドックの予約, 検診の予約, 検針の薬, 検針の予約, 研修予約, 元新の予約, 原紙の予約, 現金の予約, 現状予約, 雇い入れ, 雇入れ時, 雇入れ時健康診断, 事業主, 就職, 新規, 新規予約, 診療予約, 進学, 人間ドックの予約, 人間独の予約, 人工診断, 生活習慣病, 転院の予約, 特定健診, 二年度の予約, 二百, 百, 品質の予約, 予約お願い, 予約したい, 予約です, 予約をお願い, 予約をしたい, 予約をとる, 予約を取って, 予約を取りたい]
          日時変更: [2, 2番, 45, 5百日時の変更, 四百日時の変更, 時間, 取り直したい, 取り直す, 他の, 二, 二番, 二百日時の変更, 日程, 日付, 日付, 百日時の変更, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更, 方向, 本校]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の3つのうち、いずれかの番号を押してください。\n1「健診の予約」、\n2「予約日時の変更」、\n3「予約のキャンセル」、\nそれでは、番号を押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: DTMF回答分岐
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。認識が出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。\n認識が出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。\n認識が出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 健診予約セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: DTMF復唱確認省略
      - 箱: 日時変更セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: DTMF復唱確認省略
      - 箱: キャンセル　セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: DTMF復唱確認省略
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 健診予約
              次の箱: 用件の復唱（新規）
            - 判定: 一致
              入力: 日時変更
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: キャンセル
              次の箱: 用件の復唱（キャンセル）
      - 箱: 用件の復唱（新規）
        セリフ: "健診の予約、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（キャンセル）
        セリフ: "予約のキャンセル、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（変更）
        セリフ: "予約日時の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 数字の1発話
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 数字の2発話
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り成功
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝健診予約
              次の箱: 健診予約セット
            - 判定: 一致
              入力: 2＝日時変更
              次の箱: 日時変更セット
            - 判定: 一致
              入力: 3＝キャンセル
              次の箱: キャンセル　セット
          デフォルト: count上記以外_2
      - 箱: DTMF回答分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: END_聞き取り成功
            - 判定: 一致
              入力: 2＝否定
              次の箱: count再質問_3
          デフォルト: count再質問_2
      - 箱: DTMF復唱確認省略
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り成功

  終了:
    箱一覧:
      - 箱: END_聞き取り成功
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
