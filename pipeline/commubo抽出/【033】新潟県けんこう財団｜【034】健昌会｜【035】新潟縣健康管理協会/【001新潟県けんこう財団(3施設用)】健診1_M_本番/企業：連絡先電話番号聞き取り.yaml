flow:
  最初の箱: 電話番号区切り

  エンティティ定義:
    カスタム:
      - 名前: 肯定単語
        値:
          はい: [1, １, OK, あっています, あってます, あってる, いいです, いいよ, イエス, いち, イチ, いちばん, イチバン, そうです, 違いありません, 違いない, 一, 一番, 合っています, 合ってます, 大丈夫, 問題ありません, 問題ない]
      - 名前: 持っている
        値:
          持っている: [あります, ある, いまーす, います, いる, 持っていまーす, 持ってまーす, 持ってます, 盛ってまーす, 盛ってます]
      - 名前: 持ってない
        値:
          持ってない: [いない, いませーん, いません, ない, もってない, もてない, 以てない, 持っていません, 持ってませーん, 持ってません, 盛ってない]
      - 名前: 電話番号
        値:
          IP電話番号: []
          携帯電話番号: []
          電話番号: []
      - 名前: 否定単語
        値:
          違います: [2, ２, いいえ, じゃない, ダメ, ニ, にばん, ニバン, 違い, 違う, 違って, 駄目, 二, 二番]
      - 名前: 別の
        値:
          別の: [違う, 携帯, 他の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 一度言い切り　桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 10桁
              次の箱: 電話番号蓄積
            - 判定: 一致
              入力: 11桁
              次の箱: 区切り
          デフォルト: 該当なし
      - 箱: 一度言い切り　桁数チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 10桁
              次の箱: 電話番号蓄積
            - 判定: 一致
              入力: 11桁
              次の箱: 区切り
          デフォルト: 電話番号の聞き取り
      - 箱: 区切り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯
              次の箱: 携帯3-4-4
            - 判定: 一致
              入力: IP
              次の箱: IP3-4-4
            - 判定: 一致
              入力: 固定5桁
              次の箱: 固定5-1-4
            - 判定: 一致
              入力: 固定5桁
              次の箱: 固定5-1-4
            - 判定: 一致
              入力: 固定4桁
              次の箱: 固定4-2-4
            - 判定: 一致
              入力: 固定4桁
              次の箱: 固定4-2-4
            - 判定: 一致
              入力: 固定3桁
              次の箱: 固定3-3-4
            - 判定: 一致
              入力: 固定3桁
              次の箱: 固定3-3-4
            - 判定: 一致
              入力: 固定2桁
              次の箱: 固定2-4-4
            - 判定: 一致
              入力: 固定2桁
              次の箱: 固定2-4-4
          デフォルト: 該当桁数なし
      - 箱: 携帯3-4-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱_1
      - 箱: IP3-4-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱_1
      - 箱: 固定3-3-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱_1
      - 箱: 電話番号復唱
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐_1
          デフォルト: count上記以外_1
      - 箱: 電話番号復唱_1
        セリフ: "ご連絡先の電話番号は、\n<? $連絡先電話番号（ハイフン区切あり） ?>\n、でよろしいでしょうか？\n合っている場合は1番を、違う場合は2番を押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱
      - 箱: 該当桁数なし
        セリフ: 申し訳ございません、正しい桁数で聞き取れませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 固定2-4-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱_1
      - 箱: 固定4-2-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱_1
      - 箱: 固定5-1-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱_1
      - 箱: 電話番号聞き取れず
        セリフ: "申し訳ございません、お電話番号を認識することができませんでした。\n恐れ入りますが、今おかけになっているお電話番号をご連絡先として登録させていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_入電番号登録へ
      - 箱: いいえ
        セリフ: "恐れ入りますが、\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 該当なし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 聞き返しNG
              次の箱: 非通知かどうか分岐
          デフォルト: 該当桁数なし
      - 箱: 携帯OK
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: 携帯以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: 電話番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 一度言い切り　桁数チェック_1
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号の聞き取り
      - 箱: 電話番号蓄積
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 11桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番5桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番5桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番4桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番4桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番3桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番3桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番2桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番2桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: なにか言っている
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言5＋phoneなし＋聞き返しNG
              次の箱: 非通知かどうか分岐
            - 判定: 一致
              入力: 無言5＋phoneなし＋聞き返しNG
              次の箱: 非通知かどうか分岐
            - 判定: 数値以上
              入力: 無言5＋phoneなし＋聞き返しNG
              次の箱: 非通知かどうか分岐
            - 判定: 数値以上
              入力: 無言5＋phoneなし
              次の箱: もう一度
            - 判定: 一致
              入力: 無言5＋phoneなし
              次の箱: もう一度
            - 判定: 数値以上
              入力: 無言2＋phoneあり＋聞き返しNG
              次の箱: 非通知かどうか分岐
            - 判定: エンティティ含む
              入力: 無言2＋phoneあり＋聞き返しNG
              次の箱: 非通知かどうか分岐
            - 判定: 数値以上
              入力: 無言2＋phoneあり＋聞き返しNG
              次の箱: 非通知かどうか分岐
            - 判定: 一致
              入力: 無言3＋phoneあり
              次の箱: 桁数不足など
            - 判定: エンティティ含む
              入力: 無言3＋phoneあり
              次の箱: 桁数不足など
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号の聞き取り
      - 箱: もう一度
        セリフ: 恐れ入ります、再度、ご連絡先のお電話番号を、0から始まる市外局番から、または携帯番号を、電話機の番号でご入力ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: 桁数不足など
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 該当桁数なし
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号の聞き取り
      - 箱: 音声確認用フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含まない
              入力: 音声確認フラグ未
              次の箱: フラグon
          デフォルト: 電話番号蓄積
      - 箱: フラグon
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号蓄積
      - 箱: 電話番号を
        セリフ: 日中に連絡のとれる連絡先のお電話番号を、電話機の番号でご入力ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: 番号確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: 番号確認_1
        セリフ: "ご連絡先の電話番号は、今おかけいただいている\n<? $入電番号（ハイフン区切りあり） ?>\nでよろしいですか?\n合っている場合は1番を、違う場合は2番を押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号確認
      - 箱: 復唱へ
        セリフ: "申し訳ございません。正しく認識が出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱_1
      - 箱: 復唱へ_1
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱_1
      - 箱: 電話番号区切り
        セリフ: none
        説明: サブシナリオ「電話番号区切り」を呼び出す
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 電話種別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 電話種別_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック_1
      - 箱: 接続詞
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号を
      - 箱: 入電携帯番号でOK
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 番号確認_1
          デフォルト: 番号確認_1
      - 箱: 携帯電話番号チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 携帯OK
          デフォルト: 携帯以外
      - 箱: 入電番号取得確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得
              次の箱: END_携帯有無の聞き取りへ
          デフォルト: 電話種別
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 番号確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_3
          デフォルト: 電話番号復唱
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。認識が出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号確認_1
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号の聞き取り
      - 箱: ダイヤルプッシュ案内
        セリフ: 再度、ご連絡先のお電話番号を、0から始まる市外局番から、または携帯番号を、電話機の番号でご入力ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 3以上
              次の箱: 非通知かどうか分岐
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 3以上
              次の箱: 非通知かどうか分岐
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 3以上
              次の箱: 非通知かどうか分岐
          デフォルト: いいえ
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 3以上
              次の箱: 非通知かどうか分岐
          デフォルト: 復唱へ
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 3以上
              次の箱: 非通知かどうか分岐
          デフォルト: 復唱へ_1
      - 箱: 非通知かどうか分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 非通知
              次の箱: END_聞き取り失敗
          デフォルト: 電話番号聞き取れず
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 入電携帯番号でOK
            - 判定: 一致
              入力: 2＝否定
              次の箱: 接続詞
          デフォルト: count再質問_1
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号確認_1
      - 箱: DTMF回答分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 電話種別_1
            - 判定: 一致
              入力: 2＝否定
              次の箱: count再質問_2
          デフォルト: count再質問_4

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_入電番号登録へ
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_携帯有無の聞き取りへ
        セリフ: none
        入力待ち: なし
