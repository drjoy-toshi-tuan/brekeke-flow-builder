flow:
  最初の箱: 現在の時間、1日後の日付セット

  エンティティ定義:
    カスタム:
      - 名前: 肯定エンティティ
        値:
          肯定: [1, あっています, あってます, イチ, いち, イチバン, いちばん, そうです, それでいいです, それです, はーい, はい, 一, 一番, 大丈夫]
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []
      - 名前: 否定
        値:
          否定: [2, ２, いいえ, いえ, いや, そうじゃない, それじゃない, それではない, ニ, にばん, ニバン, 違います, 違う, 間違い, 二, 二番, 別の]

  共通:
    箱一覧:
      - 箱: 予約希望日の聞き取りへ
        セリフ: 受診希望日を「4月1日」の場合は、「0、4、0、1」のように、4桁の番号を押してください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 日付チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 値含む
              入力: 日の発話あり
              次の箱: 日付チェック_2
            - 判定: 値含む
              入力: 月の発話あり
              次の箱: 月の発話あり
            - 判定: 値含む
              入力: 年の発話あり
              次の箱: 日付チェック_3
          デフォルト: 日付チェック_3
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 予約日セット（DTMF）
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問_4
      - 箱: リセット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問_3
      - 箱: リセット_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付再設定へ
      - 箱: リセット_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問_5
      - 箱: リセット_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問_6
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 無言9（5秒）＋日にちなし
              次の箱: count上記以外_1
            - 判定: 一致
              入力: 無言9（5秒）＋日にちなし
              次の箱: count上記以外_1
            - 判定: 数値以上
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: 日付チェック_1
            - 判定: エンティティ含む
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: 日付チェック_1
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再度質問
        セリフ: 恐れ入りますが、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 聞き取り完了
        セリフ: "<? $予約希望日の読み ?>\n、でよろしいですか?\n合っている場合は1番を、違う場合は2番を押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日確認
      - 箱: 日付チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 日付あり
              次の箱: 予約希望日の判定
          デフォルト: リセット
      - 箱: 日付チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 月チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01月
              次の箱: 日チェック
          デフォルト: 月の置換
      - 箱: 日付チェック_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
            - 判定: 一致
              入力: 01月
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 日チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日の置換
      - 箱: 月の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日チェック
      - 箱: 日の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: 数字を日付に
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 0以下
              次の箱: 聞き取りへ戻る
            - 判定: lessEqual
              入力: 9以下
              次の箱: 0桁詰め
            - 判定: lessEqual
              入力: 31以下
              次の箱: 日の置換
          デフォルト: 聞き取りへ戻る
      - 箱: 0桁詰め
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日の置換
      - 箱: 聞き取りへ戻る
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 予約希望日の判定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 現在の時間判断
            - 判定: 数値
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 現在の時間判断
            - 判定: 数値以上
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 現在の時間判断
            - 判定: 数値
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 現在の時間判断
            - 判定: 数値以上
              入力: 1927〜1988（昭和）
              次の箱: 現在の時間判断
            - 判定: 数値
              入力: 1927〜1988（昭和）
              次の箱: 現在の時間判断
            - 判定: 数値以上
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 現在の時間判断
            - 判定: 数値
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 現在の時間判断
            - 判定: 数値以上
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 現在の時間判断
            - 判定: 数値
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 現在の時間判断
            - 判定: 数値以上
              入力: 1990〜2018（平成）
              次の箱: 現在の時間判断
            - 判定: 数値
              入力: 1990〜2018（平成）
              次の箱: 現在の時間判断
            - 判定: 数値以上
              入力: 2019-01-01〜04-30（平成）
              次の箱: 現在の時間判断
            - 判定: 数値
              入力: 2019-01-01〜04-30（平成）
              次の箱: 現在の時間判断
            - 判定: 数値以上
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 現在の時間判断
            - 判定: 数値
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 現在の時間判断
            - 判定: 数値以上
              入力: 2020〜（令和）
              次の箱: 現在の時間判断
          デフォルト: リセット_1
      - 箱: 月の発話あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_2
      - 箱: 月の発話あり_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 月チェック
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 予約日確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 聴取内容チェック
      - 箱: 予約日確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。認識が出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 再度聞き取りへ_1
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 日付再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 予約日セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 4桁取得
              次の箱: 日付比較
          デフォルト: 無言クリア
      - 箱: ダイヤルプッシュ案内
        セリフ: 受診希望日を、ダイヤルプッシュで月と日にちの4桁の数字を入力してください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 日付比較
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 比較日より前
              次の箱: プラス1年後で確定
          デフォルト: そのまま確定
      - 箱: そのまま確定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: プラス1年後で確定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取り失敗
          デフォルト: 再度質問
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取り失敗
          デフォルト: 再度質問
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
              次の箱: END_聞き取り失敗
          デフォルト: 当日：予約不可
      - 箱: count再質問_6
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 休業日：予約不可
      - 箱: 現在の時間判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 10時30分まで
              次の箱: 休業日判断
          デフォルト: 日付判断
      - 箱: 日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 今日の日付
              次の箱: リセット_3
          デフォルト: 休業日判断
      - 箱: 当日：予約不可
        セリフ: "申し訳ございません。\n翌営業日以降の日付でご入力ください。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約希望日の聞き取りへ
      - 箱: 休業日：予約不可
        セリフ: "申し訳ございません。\nご希望のお日にちは休業日のためご予約いただけません。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約希望日の聞き取りへ
      - 箱: 現在の時間、1日後の日付セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約希望日の聞き取りへ
      - 箱: 休業日判断
        セリフ: none
        説明: サブシナリオ「休業日判断」を呼び出す
        回答振り分け:
          デフォルト: リセット_4
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: 2＝否定
              次の箱: リセット
          デフォルト: count再質問_2

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
