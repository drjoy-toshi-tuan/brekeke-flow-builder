flow:
  最初の箱: 施設名の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [いいです, そうです, それです, はい, 異常部, 丈夫, 大丈夫]
      - 名前: 受診希望施設名
        値:
          新潟健診プラザ: [1, いち, イチ, いちばん, イチバン, にいがた, ニイガタ, 一, 一番, 新潟]
          西新潟健診プラザ: [3, サン, さん, サンバン, さんばん, にし, ニシ, にしにいがた, ニシニイガタ, 三, 三番, 西, 西新潟, 二千二]
          東新潟健診プラザ: [2, ニ, にばん, ニバン, ひがし, ヒガシ, ひがしにいがた, ヒガシニイガタ, 東, 東新潟, 二, 二番]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 数字の１
        値:
          １: [1, いち, イチ, いちばん, イチバン, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, にばん, ニバン, 二, 二番]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, いや, じゃない, 違います]

  共通:
    箱一覧:
      - 箱: 施設名の聞き取りへ
        セリフ: "受診を希望される施設を、次の3つのうちより、番号を押してください。\n「1.新潟健診プラザ」、\n「2.東新潟健診プラザ」、\n「3.西新潟健診プラザ」。\nそれでは、番号を押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の確認
      - 箱: 施設名の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 施設名の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再質問（DTMF)
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: 再度聞き取りへ_1
        セリフ: "正しい番号を認識出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の復唱
      - 箱: 再質問（DTMF)
        セリフ: "正しい番号を認識出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: 施設名のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の復唱
      - 箱: 新潟：セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: DTMF復唱確認省略
      - 箱: 東新潟：セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: DTMF復唱確認省略
      - 箱: 西新潟：セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: DTMF復唱確認省略
      - 箱: 施設名の復唱
        セリフ: "<? $facilityname ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 数字の１発話（肯定）
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 数字の２発話（否定）
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 施設名再設定へ
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名の聞き取りへ
      - 箱: 施設名再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名のセット
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝新潟健診プラザ
              次の箱: 新潟：セット
            - 判定: 一致
              入力: 2＝東新潟健診プラザ
              次の箱: 東新潟：セット
            - 判定: 一致
              入力: 3＝西新潟健診プラザ
              次の箱: 西新潟：セット
          デフォルト: count再質問_2
      - 箱: DTMF回答分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: 2＝否定
              次の箱: count再質問_3
          デフォルト: count再質問_1
      - 箱: DTMF復唱確認省略
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_リセット
        セリフ: 再度、テストします。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
