flow:
  最初の箱: 登録番号確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          はい: [はーい, ハイ, はいそうです, はい合ってます, はい大丈夫です]
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9以上
              次の箱: count聞き直し
            - 判定: 数値以上
              入力: 3以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
            - 判定: エンティティ含む
              入力: 3以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
          デフォルト: 診察券番号の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ
      - 箱: 診察券番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 登録番号セット
            - 判定: エンティティ含む
              入力: 数字
              次の箱: 診察券番号セット（発話）
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 診察券番号セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: countクリア
          デフォルト: count上記以外
      - 箱: countクリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の読みセット
      - 箱: 再度聞き取り
        セリフ: 申し訳ございません、正しい桁数で聞き取れませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 診察券番号の聞き取りへ
        セリフ: "「健康診断受診のお知らせ」に記載されている登録番号を電話機の番号でご入力ください。\nわからない方は、「わからない」とお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号セット（発話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 10桁取得（10桁以上）
              次の箱: 診察券番号桁数チェック
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号の読みセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_登録番号聞き取り済み
      - 箱: 登録番号確認へ
        セリフ: 登録番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ
      - 箱: ダイヤルプッシュ案内
        セリフ: 再度、10桁の番号をお答えいただくか、ダイヤルプッシュにてお答え下さい。
        入力待ち: あり
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_登録番号聞き取れず
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取り
      - 箱: 登録番号セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_番号が分からない

  終了:
    箱一覧:
      - 箱: END_登録番号聞き取り済み
        セリフ: none
        入力待ち: なし
      - 箱: END_番号が分からない
        セリフ: none
        入力待ち: なし
      - 箱: END_登録番号聞き取れず
        セリフ: 申し訳ございません。登録番号を聞き取ることができませんでした。
        入力待ち: なし
