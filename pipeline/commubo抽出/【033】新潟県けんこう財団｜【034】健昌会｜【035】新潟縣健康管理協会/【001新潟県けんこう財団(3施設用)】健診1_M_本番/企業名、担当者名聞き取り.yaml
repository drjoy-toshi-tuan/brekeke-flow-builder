flow:
  最初の箱: 企業名、担当者名聞き取りへ

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5回以上
              次の箱: 再質問の有無
          デフォルト: 聴き取り
      - 箱: 企業名、担当者名聞き取りへ
        セリフ: 企業または法人名と、ご担当者のお名前をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外5（約5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外5（約5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約2秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約2秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: count上記以外
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: 3回聞き取れず
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 企業名、担当者名聞き取りへ
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用
        セリフ: none
        入力待ち: なし
