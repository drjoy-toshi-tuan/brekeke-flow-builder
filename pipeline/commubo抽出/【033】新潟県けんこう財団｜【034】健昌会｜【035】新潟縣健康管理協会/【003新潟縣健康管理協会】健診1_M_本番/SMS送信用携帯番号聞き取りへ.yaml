flow:
  最初の箱: 電話番号区切り

  エンティティ定義:
    カスタム:
      - 名前: 肯定単語
        値:
          はい: [1, OK, あっています, あってます, あってる, いいです, いいよ, イエス, いち, イチ, いちばん, イチバン, そうです, 違いありません, 違いない, 一, 一番, 合っています, 合ってます, 大丈夫, 問題ありません, 問題ない]
      - 名前: 持っている
        値:
          持っている: [あります, ある, いまーす, います, いる, 持っていまーす, 持ってまーす, 持ってます, 盛ってまーす, 盛ってます]
      - 名前: 持ってない
        値:
          持ってない: [いない, いませーん, いません, ない, もってない, もてない, 以てない, 持っていません, 持ってませーん, 持ってません, 盛ってない]
      - 名前: 電話番号
        値:
          IP電話番号: []
          携帯電話番号: []
          電話番号: []
      - 名前: 否定単語
        値:
          否定: [2, いいえ, いえ, いや, じゃない, ダメ, ダメ, にばん, ニバン, 違い, 違います, 違う, 違って, 駄目, 二, 二番]
      - 名前: 別の
        値:
          別の: [違う, 携帯, 他の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 一度言い切り　桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 10桁
              次の箱: 電話番号蓄積
            - 判定: 一致
              入力: 11桁
              次の箱: 区切り
          デフォルト: 該当なし
      - 箱: 一度言い切り　桁数チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 10桁
              次の箱: 電話番号蓄積
            - 判定: 一致
              入力: 11桁
              次の箱: 区切り
          デフォルト: 電話番号の聞き取り
      - 箱: 区切り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯
              次の箱: 携帯3-4-4
            - 判定: 一致
              入力: IP
              次の箱: IP3-4-4
            - 判定: 一致
              入力: 固定5桁
              次の箱: 固定5-1-4
            - 判定: 一致
              入力: 固定5桁
              次の箱: 固定5-1-4
            - 判定: 一致
              入力: 固定4桁
              次の箱: 固定4-2-4
            - 判定: 一致
              入力: 固定4桁
              次の箱: 固定4-2-4
            - 判定: 一致
              入力: 固定3桁
              次の箱: 固定3-3-4
            - 判定: 一致
              入力: 固定3桁
              次の箱: 固定3-3-4
            - 判定: 一致
              入力: 固定2桁
              次の箱: 固定2-4-4
            - 判定: 一致
              入力: 固定2桁
              次の箱: 固定2-4-4
          デフォルト: 携帯番号ではない
      - 箱: 携帯3-4-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: IP3-4-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯番号ではない
      - 箱: 固定3-3-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯番号ではない
      - 箱: 電話番号復唱
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 電話種別_1
            - 判定: エンティティ含む
              入力: 肯定単語
              次の箱: 電話種別_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 電話種別_1
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 否定単語
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐_1
          デフォルト: count上記以外_1
      - 箱: 復唱確認
        セリフ: "携帯番号は、\n<? $連絡先電話番号（ハイフン区切あり） ?>\n、でよろしいでしょうか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱
      - 箱: 該当桁数なし
        セリフ: "申し訳ございません、正しい桁数で聞き取れませんでした。\n再度、携帯番号をお伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 携帯番号ではない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_携帯番号とは別の番号を回答
      - 箱: 固定2-4-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯番号ではない
      - 箱: 固定4-2-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯番号ではない
      - 箱: 固定5-1-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯番号ではない
      - 箱: 電話番号聞き取れず
        セリフ: 大変申し訳ございません、お電話番号を聞き取ることができませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: いいえ
        セリフ: "恐れ入りますが、\nなるべく数字と数字の間に間をあけずにお話いただけますか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 該当なし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 再質問あり
              次の箱: 電話番号聞き取れず
          デフォルト: count再質問_5
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 電話番号聞き取れず
          デフォルト: いいえ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取り失敗へ_1
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 電話番号聞き取れず
          デフォルト: 復唱へ
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取り失敗へ
          デフォルト: もう一度
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取り失敗へ_1
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 電話番号聞き取れず
          デフォルト: 該当桁数なし
      - 箱: count再質問_6
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 電話番号聞き取れず
          デフォルト: 再度聞き取りへ（DTMF）_1
      - 箱: 携帯OK
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_携帯番号聞き取り完了
      - 箱: 電話番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: 値含む
              入力: 携帯電話番号
              次の箱: 一度言い切り　桁数チェック
            - 判定: 値含む
              入力: 電話番号
              次の箱: 一度言い切り　桁数チェック
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 一度言い切り　桁数チェック_1
          デフォルト: 音声確認用フラグ
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号の聞き取り
      - 箱: 電話番号蓄積
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 11桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番5桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番5桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番4桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番4桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番3桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番3桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番2桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番2桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: なにか言っている
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言5＋phoneなし＋聞き返しNG
              次の箱: 電話番号聞き取れず
            - 判定: 一致
              入力: 無言5＋phoneなし＋聞き返しNG
              次の箱: 電話番号聞き取れず
            - 判定: 数値以上
              入力: 無言5＋phoneなし＋聞き返しNG
              次の箱: 電話番号聞き取れず
            - 判定: 数値以上
              入力: 無言5＋phoneなし
              次の箱: count再質問_3
            - 判定: 一致
              入力: 無言5＋phoneなし
              次の箱: count再質問_3
            - 判定: 数値以上
              入力: 無言2＋phoneあり＋聞き返しNG
              次の箱: 電話番号聞き取れず
            - 判定: エンティティ含む
              入力: 無言2＋phoneあり＋聞き返しNG
              次の箱: 電話番号聞き取れず
            - 判定: 数値以上
              入力: 無言2＋phoneあり＋聞き返しNG
              次の箱: 電話番号聞き取れず
            - 判定: 一致
              入力: 無言2＋phoneあり
              次の箱: 桁数不足など
            - 判定: エンティティ含む
              入力: 無言2＋phoneあり
              次の箱: 桁数不足など
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号の聞き取り
      - 箱: もう一度
        セリフ: 恐れ入ります、再度、ご連絡先のお電話番号を、0から始まる市外局番から、または携帯番号でお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: 桁数不足など
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: count再質問_5
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号の聞き取り
      - 箱: 音声確認用フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含まない
              入力: 音声確認フラグ未
              次の箱: フラグon
          デフォルト: 電話番号蓄積
      - 箱: フラグon
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号蓄積
      - 箱: 携帯番号聞き取りへ
        セリフ: 携帯番号をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: 復唱へ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 電話番号区切り
        セリフ: none
        説明: サブシナリオ「電話番号区切り」を呼び出す
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 電話種別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 電話種別_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック_1
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: END_携帯電話で入電
          デフォルト: 携帯有無の聞き取りへ
      - 箱: 携帯電話番号チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 携帯OK
          デフォルト: 携帯OK
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 携帯電話有無確認
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 携帯あり
            - 判定: 一致
              入力: 2＝否定
              次の箱: 携帯なし
          デフォルト: count再質問_4
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 電話番号復唱
      - 箱: 携帯電話番号の聞き取りへ２
        セリフ: 携帯電話をお持ちですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話有無確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい持っています」、や、「いいえ持っていません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号の聞き取りへ２
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号の聞き取りへ２
      - 箱: 再度聞き取りへ（DTMF）_1
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認
      - 箱: 入電番号取得確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得
              次の箱: END_番号未取得→戻る
          デフォルト: 電話種別
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号の聞き取り
      - 箱: ダイヤルプッシュ案内
        セリフ: "なお、AIが電話番号を正しく認識しない場合は、ダイヤルプッシュでの入力も可能です。\n再度、携帯番号を11桁でお話いただくか、ダイヤルプッシュで入力してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: 携帯有無の聞き取りへ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号の聞き取りへ２
      - 箱: 接続詞
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯番号聞き取りへ
      - 箱: 携帯電話有無確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 携帯あり
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 携帯あり
            - 判定: エンティティ含む
              入力: 持っている
              次の箱: 携帯あり
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 携帯あり
            - 判定: エンティティ含む
