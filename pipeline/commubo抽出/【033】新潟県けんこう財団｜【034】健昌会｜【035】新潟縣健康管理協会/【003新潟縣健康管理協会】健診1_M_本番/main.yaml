flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n新潟縣健康管理協会の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 挨拶（連休中）
        セリフ: "お電話ありがとうございます。\n新潟縣健康管理協会の、予約専用、AI電話です。\nただいま休業期間中ですので、予約・変更・キャンセルのみ受付を行っております。\nその他のお問い合わせは、8月16日土曜日以降にご連絡ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り（連休中）
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 予約変更
        セリフ: 内容を確認の上、担当者よりご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約キャンセル
        セリフ: ご予約のキャンセルを承りました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 健診予約
        セリフ: 内容を確認の上、担当者よりご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: その他お問い合わせ
        セリフ: 内容を確認の上、担当者よりご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更_1
        セリフ: 当施設の営業日に担当者より、ご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約キャンセル_1
        セリフ: ご予約のキャンセルを承りました。
        入力待ち: なし
        回答振り分け:
