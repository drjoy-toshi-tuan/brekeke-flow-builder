flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 4/30と5/1
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～土）
              次の箱: （月～土）時間の分岐
          デフォルト: END_営業時間外
      - 箱: （月～土）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: END_営業時間外
            - 判定: 数値
              入力: 16時まで
              次の箱: END_営業時間内
          デフォルト: END_営業時間外
      - 箱: 4/30と5/1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 4/30
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 5/1
              次の箱: 曜日の分岐
          デフォルト: END_営業時間外

  終了:
    箱一覧:
      - 箱: END_（土曜）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
            - 判定: 数値
              入力: 13時まで
      - 箱: END_営業時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外コメント
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n予約専用ダイヤルの受付時間は、祝日を除く、月曜日から土曜日の8時から17時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
      - 箱: END_営業時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_現在の月判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 1月～3月
