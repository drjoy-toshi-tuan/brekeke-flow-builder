flow:
  最初の箱: 冒頭アナウンス

  エンティティ定義:
    カスタム:
      - 名前: WEB予約
        値:
          WEB予約: [L400, URL, WEB, インターネット, いんたーねっと, ウェブ, ウエブ, サイト, さいと, ネット, ねっと, ユーアールエル, 全部予約, 予約]
      - 名前: 折返し電話
        値:
          折返し電話: [おりかえし, オリカエシ, かけて, かけ直し, でんわ, デンワ, 折り返し, 折返し, 電話]
      - 名前: 否定単語
        値:
          違います: [いいえ, いえ, いや, じゃない, ダメ, ダメ, ノー, 違い, 違う, 違って, 駄目]

  共通:
    箱一覧:
      - 箱: 折返し方法確認
        セリフ: どちらでご予約を希望されるか、「WEB予約」もしくは「折り返し電話」どちらかをお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 回答確認
      - 箱: 冒頭アナウンス
        セリフ: 恐れ入りますが、健康診断のお知らせが届いていない方は、WEB予約もしくはオペレーターより折り返しご連絡をさせていただきます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折返し方法確認
      - 箱: 回答確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: WEB予約
              次の箱: WEB予約
            - 判定: エンティティ含む
              入力: 折り返し電話
              次の箱: 折り返し電話
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 回答確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 折返し方法確認
      - 箱: 折り返し電話
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_折り返し電話
      - 箱: WEB予約
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_WEB予約
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗

  終了:
    箱一覧:
      - 箱: END_WEB予約
        セリフ: "かしこまりました、ショートメールでWEB予約用のURLを送付いたします。\nURLをクリックし、お申し込みをお願いいたします。"
        入力待ち: なし
      - 箱: END_折り返し電話
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
