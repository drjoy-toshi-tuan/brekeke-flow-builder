flow:
  最初の箱: 希望時間の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [１, 1, あっています, あってます, いち, イチ, いちばん, イチバン, うん, うんうん, そう, そうそう, そうです, そうね, それ, それで, それです, はーい, はい, 一, 一番]
      - 名前: 時分
        値:
          時: []
          分: []
      - 名前: 否定
        値:
          否定: [2, いいえ, いえ, いえいえ, そうじゃない, それじゃない, それではない, ニ, にばん, ニバン, 違います, 違う, 違う, 間違い, 間違って, 二, 二番]

  共通:
    箱一覧:
      - 箱: 希望時間の聞き取りへ
        セリフ: ご希望の時間を「9時30分」のように30分単位でお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 時間
              次の箱: 時間セット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 希望時間セット（DTMF）
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 聴き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 希望時間確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: リセット→再度聞き取りへ
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: リセット_2
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: リセット_1
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取り失敗
          デフォルト: リセット
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間の聞き取りへ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り完了
      - 箱: 時間セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 30分単位チェック
      - 箱: 聴き取り完了
        セリフ: "<? $希望時間の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間確認
      - 箱: 希望時間確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 時間
              次の箱: count再質問_5
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF回答分岐
          デフォルト: count上記以外_1
      - 箱: リセット
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間セット
      - 箱: リセット→再度聞き取りへ
        セリフ: "恐れ入りますが、\nなるべく言葉と言葉の間に間をあけずにお話いただけますか?\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間の聞き取りへ
      - 箱: リセット_1
        セリフ: "恐れ入りますが、\n30分単位でお話いただけますか?\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間の聞き取りへ
      - 箱: リセット_2
        セリフ: "当施設の予約時間は、4月から12月の期間は7時00分から13時30分、1月から3月の期間は8時00分から13時30分です。\nなお、11時～12時30分は現在ご予約を承っておりません。\n恐れ入りますが、再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間の聞き取りへ
      - 箱: 30分単位チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 0分
              次の箱: 希望月判断
            - 判定: 一致
              入力: 30分
              次の箱: 希望月判断
          デフォルト: count再質問_4
      - 箱: 時間判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時00分まで
              次の箱: count再質問_3
            - 判定: 数値
              入力: 11時00分まで
              次の箱: 聴き取り完了
            - 判定: 数値
              入力: 13時00分まで
              次の箱: count再質問_3
            - 判定: 数値
              入力: 13時30分まで
              次の箱: 聴き取り完了
          デフォルト: count再質問_3
      - 箱: 時間判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 7時00分まで
              次の箱: count再質問_3
            - 判定: 数値
              入力: 11時00分まで
              次の箱: 聴き取り完了
            - 判定: 数値
              入力: 13時00分まで
              次の箱: count再質問_3
            - 判定: 数値
              入力: 13時30分まで
              次の箱: 聴き取り完了
          デフォルト: count再質問_3
      - 箱: 希望月判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 1月～3月
              次の箱: 時間判断
          デフォルト: 時間判断_1
      - 箱: 希望時間セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 4桁取得
              次の箱: 30分単位チェック
          デフォルト: 上記以外クリア
      - 箱: 上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: DTMF回答分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: 2＝否定
              次の箱: count再質問_2
          デフォルト: 再度聞き取りへ_1

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_月プリセット(テスト用)
        セリフ: none
        入力待ち: なし
