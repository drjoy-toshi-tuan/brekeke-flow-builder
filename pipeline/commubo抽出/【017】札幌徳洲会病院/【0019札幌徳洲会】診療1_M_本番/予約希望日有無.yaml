flow:
  最初の箱: 用件分岐

  エンティティ定義:
    カスタム:
      - 名前: 決まっていない
        値:
          決まっていない: [ありません, いいえ, いない, ない, なし, 決まってない]

  共通:
    箱一覧:
      - 箱: 理由の聴取へ
        セリフ: 予約希望日がお決まりの場合は日付を、お決まりでない場合は「決まっていない」とお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴き取り
      - 箱: 理由の聴取へ_1
        セリフ: 変更希望日がお決まりの場合は日付を、お決まりでない場合は「決まっていない」とお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴き取り
      - 箱: 理由の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 決まっていない
              次の箱: END_希望日無
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋項目なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 無言9（5秒）＋項目なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 無言3（約2秒）＋項目あり
              次の箱: 聞き取り完了
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋項目あり
              次の箱: 聞き取り完了
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴き取り
      - 箱: 再度質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴取へ
      - 箱: 聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_理由聞き取り完了
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回質問済
              次の箱: END_理由聞き取れず
          デフォルト: 再度質問
      - 箱: 用件分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: ワクチン
              次の箱: 理由の聴取へ
          デフォルト: 理由の聴取へ_1

  終了:
    箱一覧:
      - 箱: END_理由聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_希望日無
        セリフ: none
        入力待ち: なし
      - 箱: END_理由聞き取れず
        セリフ: none
        入力待ち: なし
