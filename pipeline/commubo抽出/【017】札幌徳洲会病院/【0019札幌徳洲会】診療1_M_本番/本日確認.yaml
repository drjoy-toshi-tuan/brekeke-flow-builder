flow:
  最初の箱: タイトル

  共通:
    箱一覧:
      - 箱: 本日受診の確認
        セリフ: 本日の受診に関する内容ですか？はい、または、いいえ、で、お答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、そうです」、や、「いいえ、違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 本日受診の確認
      - 箱: 紹介状あり
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_本日
      - 箱: 紹介状なし
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_本日以外
      - 箱: タイトル
        セリフ: まず初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 本日受診の確認

  終了:
    箱一覧:
      - 箱: END_本日以外
        セリフ: none
        入力待ち: なし
      - 箱: END_本日
        セリフ: none
        入力待ち: なし
