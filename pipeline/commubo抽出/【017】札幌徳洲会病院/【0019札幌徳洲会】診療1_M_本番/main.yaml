              次の箱: 紹介状分岐
            - 判定: 一致
              入力: 予約の確認
              次の箱: 用件の確認_1
            - 判定: 一致
              入力: 再診予約
              次の箱: 変更・キャンセル・定期受診へ_1
            - 判定: 一致
              入力: 予約変更
              次の箱: 変更・キャンセル・定期受診へ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 変更・キャンセル・定期受診へ
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
