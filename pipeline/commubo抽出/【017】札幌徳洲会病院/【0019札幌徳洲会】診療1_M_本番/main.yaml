      - 箱: 定期受診の流れ
        セリフ: "再診予約の申し込みを受付いたしました。\n3診療日以内に担当者から折り返し、電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 新規予約の流れ
        セリフ: "初診予約の申し込みを受付いたしました。\n3診療日以内に担当者から折り返し、電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約キャンセルの流れ（特定診療科）_1
        セリフ: "予約キャンセルの申し込みを受付いたしました。\nキャンセル確認のSMSが送信されますのでご確認をお願いいたします。"
        入力待ち: なし
