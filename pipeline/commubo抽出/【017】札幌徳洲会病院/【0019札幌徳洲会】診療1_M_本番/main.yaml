              入力: 携帯電話取得あり
              次の箱: 定期受診の流れ_1
          デフォルト: 定期受診の流れ
      - 箱: 携帯電話番号チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約変更の流れ_1
          デフォルト: 予約変更の流れ
      - 箱: 携帯電話番号チェック_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 新規予約の流れ_1
          デフォルト: 新規予約の流れ
      - 箱: 携帯電話番号チェック_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約確認の流れ
          デフォルト: 予約確認の流れ_1
      - 箱: 予約変更の流れ
        セリフ: "予約変更の申し込みを受付いたしました。\n3診療日以内に担当者から折り返し、電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約キャンセルの流れ（特定診療科）
        セリフ: "予約キャンセルの申し込みを受付いたしました。\n担当者から折り返し、キャンセル確認を電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
