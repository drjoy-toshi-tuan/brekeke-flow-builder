flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 決まっていない
        値:
          決まっていない: [きまっていない, きまってない, しらない, つかれた, まだ, むり, めんどくさい, わからない, 未定]
      - 名前: 決まっている
        値:
          決まっている: [あります, ある, きまっています, はい、きま]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: 札幌徳洲会病院の、予約専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日確認
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診予約
              次の箱: 携帯電話番号チェック_1
            - 判定: 一致
              入力: 予約変更
              次の箱: 携帯電話番号チェック_2
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 携帯電話番号チェック
            - 判定: 一致
              入力: 新規予約
              次の箱: 携帯電話番号チェック_3
            - 判定: 一致
              入力: 確認
              次の箱: 携帯電話番号チェック_4
          デフォルト: 用件聴取不可
      - 箱: 産婦人科判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: ワクチン
              次の箱: ワクチン案内
          デフォルト: 完了フラグ
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_3
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約キャンセルの流れ（特定診療科）_1
          デフォルト: 予約キャンセルの流れ（特定診療科）
      - 箱: 携帯電話番号チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
