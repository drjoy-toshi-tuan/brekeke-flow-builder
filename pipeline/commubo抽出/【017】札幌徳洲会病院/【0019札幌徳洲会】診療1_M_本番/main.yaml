      - 箱: 診察券有り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 施設名
      - 箱: 変更・キャンセル・定期受診へ
        セリフ: 続いて、
        入力待ち: なし
