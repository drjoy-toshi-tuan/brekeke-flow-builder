        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ_1
        セリフ: "予約変更の申し込みを受付いたしました。\n3診療日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。\n終話後、予約に関するSMSが送信されますのでご確認をお願いいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 新規予約の流れ_1
        セリフ: "初診予約の申し込みを受付いたしました。\n3診療日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。\n終話後、予約に関するSMSが送信されますのでご確認をお願いいたします。"
        入力待ち: なし
        回答振り分け:
