          リハビリテーション科: [リハ, リハビリ, リハビリテーション, リハビリテーションセンター, リハビリ科, リハ科, 二は, 二八, 二百ミリ]
          リンパ浮腫外来: [リンパ外来, リンパ浮腫, リンパ浮腫外来]
          下肢静脈瘤外来: [下肢静脈流がいない。, 下肢静脈流外来, 下肢静脈瘤外来, 監視静脈流, 詳しい静脈流, 静脈瘤外来]
          外科: [いいか, いうか, えか, けが, でーか, てか, でか, メーカー, レッカー, 下間, 形が, 経過, 結果, 理科, 劣化]
          外傷センター: [外傷, 外傷センター, 外商, 外相, 対象, 対象センター, 大賞, 大正]
          眼科: [あんた, だんだ, 元金か, 視力検査]
          形成外科: [形成, 美容形成, 平成, 平成元が, 編成]
          血液内科: [え機内か, ケツ内, できないか, 駅名か, 血液, 血液内科, 血内, 利益ないか]
          血友病センター: [いついう病センター, いつ病センター, 血友病, 血友病センター, 血友病外来, 血友病関節外来, 月いう病センター, 実いう病センター, 実いう病センター, 別いう病センター]
          健診: [健康診断, 健診, 検診, 検針, 献身, 謙信, 人間ドック, 人間ドッグ]
          甲状腺内視鏡サージセンター: [サージ, 甲状腺, 甲状腺内視鏡サージセンター]
          産婦人科: [お産, お産センター, ギネ, フジコ, マタニティ, 三か, 三個, 参加, 周産, 二年, 婦人, 富士銀行]
          歯科口腔外科: [Cか, ああいい車, ああ一緒, はーいい車, ま一緒, 会社, 期間, 近く口腔外科, 口腔外科, 航空外科, 歯医者, 歯科, 滋賀, 鹿, 疾患, 新価, 新患, 地下, 反射, 弊社]
          耳鼻咽喉科: [BB, BBか, DB, DBか, GB, GBか, キビ科, シビイン効果, ジビカ, ジビン効果, ジビ科, チビイン効果, ちび科, チ病効果, ひび, リビング効果, リビ科, 咽喉科, 気味, 義務効果, 銀行が, 君か, 耳科, 耳鼻科, 自ミン効果, 自秘咽喉科, 準備完, 切り, 郵便か, 郵便交換, 郵便効果]
          循環器内科: [ハート, 循環, 循環器, 循環器科, 循内, 順番, 中間期内科, 絨毯]
          小児科: [商品, 将棋, 小児, 小児間, 賞味, 正味]
          消化器内科: [商売ないか, 商売内科, 小額内科, 尚書きないか, 庄内, 消火器内科, 消内, 表記なんか]
          心臓血管外科: [シンゲ, 関係か, 血管外科, 現像結果, 心外, 心臓, 心臓センター, 心臓外科, 新下, 新規, 新芸, 新年, 真下, 進化, 進撃]
          腎臓内科: [腎臓, 腎臓内科, 腎臓病内科]
          整形外科: [TK, 整形, 整形外科, 日経外科, 閉経]
          糖尿病内科: [糖尿, 糖尿病, 糖尿病内科]
          内科: [ないか, なんか, 一般内科, 何か]
          内視鏡: [ピロリ菌, 胃カメラ, 下部消化管内視鏡, 上部消化管内視鏡, 大腸カメラ, 内視鏡, 尿素呼気試験]
          乳腺外科: [二千, 乳腺, 乳腺外科, 入船, 優先, 有線, 有線外科]
          脳神経外科: [の下, 頭痛, 脳外, 脳外科, 脳神経外科]
          泌尿器科: [ウロ, 金曜日, 信用機関, 泌尿, 泌尿器, 泌尿器科, 費用]
          皮フ科: [いいですか。, いうか, いうか。, 一週間, 岐阜が, 昼か, 二日, 皮膚, 皮膚が, 皮膚科]

  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（予約変更・キャンセル）
        セリフ: 予約票に記載されている診療科をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取りへ（新規予約）
        セリフ: 受診を希望される診療科をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 診療科ヒアリング済み
              次の箱: 分岐なし診療科セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 診療科の聞き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_2
          デフォルト: 診療科確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 分岐なし診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科読み取得
      - 箱: 分岐なし診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐なし診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 診療科読み取得
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診予約
              次の箱: 診療科の聞き取りへ（新規予約）
            - 判定: 一致
              入力: 予約変更
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診予約
              次の箱: 診療科チェック
            - 判定: 一致
              入力: 予約変更
              次の箱: 診療科読み取得
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 診療科読み取得
      - 箱: 診療科チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: リハビリテーション科
              次の箱: END_リハビリ科
            - 判定: 一致
              入力: 内視鏡科
              次の箱: END_内視鏡科
            - 判定: 一致
              入力: 健診
              次の箱: END_健診
          デフォルト: END_戻る
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３
              次の箱: END_聞き取れず終話
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３
              次の箱: END_戻る
          デフォルト: 再度聞き取りへ_1
      - 箱: count聞き直し_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３
              次の箱: END_聞き取れず終話
          デフォルト: タイトル
      - 箱: 診療科確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count聞き直し_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: タイトル
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はいそうです」、や、「いいえ、違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科読み取得

  終了:
    箱一覧:
      - 箱: END_再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_リハビリ科
        セリフ: none
        入力待ち: なし
      - 箱: END_内視鏡科
        セリフ: none
        入力待ち: なし
      - 箱: END_健診
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず終話
        セリフ: none
        入力待ち: なし
