flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: もっています
        値:
          もっています: [あります, ある, いただいています, もっています, もってる, もらってる]
      - 名前: もっていません
        値:
          もっていません: [ありません, あれへん, いただいていません, ない, もっていません, もってない, もらってない]
      - 名前: わからない
        値:
          わからない: [からない, しらん, なんだろう, わーらない, わーらん, わからん, 知らない, 分からない]
      - 名前: 地域連携案内診療科
        値:
          整形外科: [TK, 整形, 整形外科, 日経外科, 閉経]
          糖尿病内科: [糖尿, 糖尿病, 糖尿病が, 糖尿病科, 糖尿病内科]
          脳神経外科: [の下, 頭痛, 脳外, 脳外科, 脳神経外科]
      - 名前: 予約案内診療科
        値:
          ＩＢＤセンター: [ＩＢＤセンター, ＩＢＤセンター。, IBD千だ, iBセンター, IDセンター, IVD, まーEBセンター]
          ストマ外来: [うま外来, ストーマ外来, ストマ, ストマ外来]
          ソ径ヘルニア外来: [ソ径ヘルニア外来, ヘルニア外来]
          フットケア外来: [トクヤ, とケア, どけや, フット, フットケア, フットケア外来, 足外来]
          プライマリセンター: [プライマリセンター, プライマリ科, プラ科]
          リハビリテーション科: [リハ, リハビリ, リハビリテーション, リハビリテーションセンター, リハビリ科, リハ科, 二は, 二八, 二百ミリ]
          リンパ浮腫外来: [リンパ外来, リンパ浮腫, リンパ浮腫外来]
          下肢静脈瘤外来: [下肢静脈瘤外来, 静脈瘤外来]
          外科: [えか, けが, でーか, てか, でか, メーカー, レッカー, 形が, 経過, 結果, 理科, 劣化]
          外傷センター: [外傷, 外傷センター, 外商, 外相]
          眼科: [あんた, だんだ, なんか, 元金か, 視力検査]
          形成外科: [形成, 美容形成, 平成, 平成元が, 編成]
          血液内科: [え機内か, ケツ内, できないか, 駅名か, 血液, 血液内科, 血内, 利益ないか]
          血友病センター: [血友病, 血友病センター, 血友病外来, 血友病関節外来]
          健診: [健康診断, 健診, 検診, 検針, 献身, 謙信, 人間ドック, 人間ドッグ]
          呼吸器内科: [こーない, 吸気内科, 呼吸器, 呼吸器科, 呼吸器内科, 呼内, 来ない]
          甲状腺内視鏡サージセンター: [サージ, 甲状腺, 甲状腺内視鏡サージセンター]
          産婦人科: [お産, お産センター, ギネ, フジコ, マタニティ, 三か, 三個, 参加, 周産, 二年, 婦人, 富士銀行]
          歯科口腔外科: [Cか, ああいい車, ああ一緒, はーいい車, ま一緒, 会社, 期間, 口腔外科, 航空外科, 歯医者, 歯科, 滋賀, 鹿, 疾患, 新価, 新患, 地下, 反射, 弊社]
          耳鼻咽喉科: [BB, BBか, DB, DBか, GB, GBか, キビ科, シビイン効果, ジビカ, ジビン効果, ジビ科, チビイン効果, ちび科, チ病効果, ひび, リビング効果, リビ科, 咽喉科, 気味, 義務効果, 君か, 耳科, 耳鼻科, 自ミン効果, 自秘咽喉科, 準備完, 切り, 郵便か, 郵便交換, 郵便効果]
          循環器内科: [ハート, 循環, 循環器, 循環器科, 循内, 順番, 中間期内科, 絨毯]
          小児科: [ハート, 商品, 将棋, 小児, 賞味, 正味]
          消化器内科: [商売ないか, 商売内科, 小額内科, 尚書きないか, 庄内, 消火器内科, 消内, 表記なんか]
          心臓血管外科: [シンゲ, 関係か, 血管外科, 現像結果, 心外, 心臓, 心臓センター, 心臓外科, 新下, 新規, 新芸, 新年, 真下, 進化, 進撃]
          腎臓内科: [腎臓, 腎臓内科, 腎臓病内科]
          内科: [ないか, 一般内科, 何か]
          内視鏡: [ピロリ菌, 胃カメラ, 下部消化管内視鏡, 上部消化管内視鏡, 大腸カメラ, 内視鏡, 尿素呼気試験]
          乳腺外科: [二千, 乳腺, 乳腺外科, 入船, 優先, 有線, 有線外科]
          泌尿器科: [ウロ, ウロ, 信用機関, 泌尿, 泌尿器, 泌尿器科, 費用]
          皮フ科: [いうか, 岐阜が, 昼か, 二日, 皮膚, 皮膚科]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 他の医療機関からの紹介状はお持ちですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: もっていません
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: もっています。
              次の箱: 紹介状あり
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_3
          デフォルト: 有無を確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 診療科の聞き取り
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 診療科確認_3
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 診療科確認_4
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_それ以外/聞き取れず
          デフォルト: 再度聞き取りへ_3
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_それ以外/聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1以上
              次の箱: END_それ以外/聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 診療科確認
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1以上
              次の箱: END_それ以外/聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1以上
              次の箱: END_それ以外/聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認_1
      - 箱: 再度聞き取りへ_3
        セリフ: 再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認_2
      - 箱: 紹介状あり
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認
      - 箱: 紹介状なし
        セリフ: "かしこまりました。\n他の医療機関からの紹介状をお持ちでない患者さんにつきましては、通常の診療費とは別に、初診時選定療養費として、2200円を全額自己負担いただいております。予めご了承ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認
      - 箱: 地域連携室案内
        セリフ: "申し訳ございません。\nお申し込みになられた診療科については、紹介元の病院より、直接のご連絡をお願いしております。\n紹介元の病院に連絡を取っていただき、当院、医療連携室までお電話するよう、お伝えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_地域連携室
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 整形・糖尿・脳神経外科
              次の箱: 診療科セット
            - 判定: エンティティ含む
              入力: その他診療科
              次の箱: 診療科セット_1
          デフォルト: count上記以外_1
      - 箱: 診療科確認
        セリフ: 受診を希望する診療科をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科読み取得
        セリフ: none
        説明: サブシナリオ「診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得_2
      - 箱: 診療科読み取得_1
        セリフ: none
        説明: サブシナリオ「診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得_3
      - 箱: 診療科読み取得_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認_1
      - 箱: 診療科読み取得_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認_2
      - 箱: 診療科確認_1
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認_3
      - 箱: 診療科確認_2
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認_4
      - 箱: 診療科確認_3
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_5
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状無しの場合、氏名聞き取りに進む
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状無しの場合、氏名聞き取りに進む
          デフォルト: count上記以外_2
      - 箱: 診療科確認_4
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 途中抜け追加
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 途中抜け追加
          デフォルト: count上記以外_3
      - 箱: 診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 診療科セット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科読み取得_1
      - 箱: 紹介状無しの場合、氏名聞き取りに進む
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 無し
              次の箱: END_紹介状無し
          デフォルト: 地域連携室案内
      - 箱: 途中抜け追加
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 健診
              次の箱: END_健診
            - 判定: 一致
              入力: 内視鏡
              次の箱: END_内視鏡
          デフォルト: END_それ以外/聞き取れず

  終了:
    箱一覧:
      - 箱: END_地域連携室
        セリフ: none
        入力待ち: なし
      - 箱: END_それ以外/聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介状無し
        セリフ: none
        入力待ち: なし
      - 箱: END_健診
        セリフ: none
        入力待ち: なし
      - 箱: END_内視鏡
        セリフ: none
        入力待ち: なし
