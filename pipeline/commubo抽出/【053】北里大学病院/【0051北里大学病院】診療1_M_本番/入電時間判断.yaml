flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 稼働日設定_1
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （平日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 17時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: 稼働日設定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 1/4まで
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 1/12
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 2/23
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 4/29
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 7/20
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 10/12
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 11/23
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 1/11(2027)
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 2/23(2027)
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 3/22(2027)
              次の箱: （平日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: 稼働日設定_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/26まで
              次の箱: 曜日の分岐
            - 判定: lessEqual
              入力: 12/27～1/4まで
              次の箱: 年末年始アナウンス
          デフォルト: 曜日の分岐
      - 箱: 年末年始アナウンス
        セリフ: 12月27日から1月4日までは年末年始外来休診のため、休止しております。年始は1月5日より開始いたしますので、1月5日月曜日の、8時30分以降におかけくださいますようよろしくお願いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始アナウンス_1
      - 箱: 年末年始アナウンス_1
        セリフ: お電話ありがとうございます。北里大学病院の予約専用AI電話です。12月27日から1月4日までは年末年始外来休診のため、休止しております。年始は1月5日より開始いたしますので、1月5日月曜日の、8時30分以降におかけくださいますようよろしくお願いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始
      - 箱: テスト
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
