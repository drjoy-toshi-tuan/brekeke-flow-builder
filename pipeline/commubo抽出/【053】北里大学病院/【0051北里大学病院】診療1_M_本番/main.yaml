flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n北里大学病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 切断待ち_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日（当日チェック）
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 確認内容の聞き取りへ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認内容の聞き取り
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 時間判断_1
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルの流れ（その他診療科）
            - 判定: 一致
              入力: 予約確認
              次の箱: 携帯/固定の分岐
          デフォルト: 時間判断
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 次へ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 次へ
          デフォルト: 用件を判断_3
      - 箱: 用件の確認_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規予約
              次の箱: 用件の確認_1
          デフォルト: 診療科フリー
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_3
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 次へ_4
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 予約キャンセルの流れ（その他診療科）
        セリフ: 予約キャンセルを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ
        セリフ: "予約のご希望を承りました。このお電話では予約はまだ確定しておりません。\n平日3日以内に、担当者から折り返し電話、または、SMSにてご連絡し、その後に予約が確定いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 定期受診の流れ
        セリフ: "予約のご希望を承りました。このお電話では予約はまだ確定しておりません。\n平日3日以内に、担当者から折り返し電話、または、SMSにてご連絡し、その後に予約が確定いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約確認の流れ
        セリフ: 予約日時の確認を承りました。翌診療日までに担当者から予約についてSMS送信させていただきますので、届いたメッセージを必ずご確認ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ_1
        セリフ: "担当スタッフより折り返し電話、もしくは、SMSにてご連絡いたします。\nお時間は１週間程度お待ちいただいております。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約確認の流れ（携帯以外）
        セリフ: "予約日時の確認を承りました。\n翌診療日までに、担当者から折り返しお電話いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ12/26のみ
        セリフ: "予約のご希望を承りました。\n明日12月27日から1月4日まで年末年始休診のため、担当者からの折り返しが1月5日以降になる可能性がございます。ご了承ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 定期受診の流れ(12/26のみ）
        セリフ: "予約のご希望を承りました。\n明日12月27日から1月4日まで年末年始休診のため、担当者からの折り返しが1月5日以降になる可能性がございます。ご了承ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
