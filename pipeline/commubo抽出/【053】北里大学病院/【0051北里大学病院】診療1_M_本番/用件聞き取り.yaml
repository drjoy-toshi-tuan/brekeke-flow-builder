flow:
  最初の箱: 最初の案内

  エンティティ定義:
    カスタム:
      - 名前: はじめて
        値:
          はじめて: [行ったことない, 最初の受診, 初診です]
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 折り返し
        値:
          折り返し: [かけなおし, よっつ, 最後の, 四, 出られなかった, 着信があった, 電話かかってきた, 電話の, 病院から, 返事]
      - 名前: 途中抜け内容
        値:
          遺伝診療部: [遺伝, 診療部]
          栄養相談: [栄養]
          外来会計: [お会計, お金, 会計]
          外来調剤: [お薬, 処方箋, 調剤, 薬が欲しい, 薬局, 薬剤師]
          核医学受付: [核医学]
          緊急救急: [99, 救急, 緊急, 金９, 金九, 九級, 九九]
          歯科: [Cか, ああいい車, しか, はーいい車, 会社, 歯医者, 歯医者, 滋賀, 鹿, 新価, 新患, 弊社]
          代表番号: [代表, 電話番号, 病院の電話]
          内視鏡受付: [ない市況, 内視鏡]
          入院会計: [お金払いたい, お支払い, 会計, 支払い, 入金, 費用, 払い込み, 払う]
          文書窓口: [文書]
          放射線診断科: [放射, 放射線]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 予約以外
        値:
          予約以外: [そうじゃない, 入院, 面会, 予約じゃない, 予約ではない, 予約以外]
      - 名前: 用件
        値:
          確認: [その他確認, みっつ, 確認, 角煮, 教えて, 三, 時間を忘れた, 日時確認, 聞きたい, 忘れた, 約確認, 予約の核, 予約の確認, 予約確認, 予約日時を確認する]
          診察予約: [しょしん, はじめて, ひとつ, 一, 印刷の, 印刷のやつをドル。, 再診, 最初の, 最新, 撮りたい, 三新薬, 取得, 受診, 初めて, 初診, 診察, 診察の予約, 診療予約, 予約お願い, 予約する, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          変更: [キャンセル, に, ふたつ, やめる, 延期, 取り消し, 取り消す, 取り直したい, 取り直す, 取消, 二, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 予約の変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちのいずれかでお話ください。\n\n1.「診察の予約を取る」、\n2.「予約を変更する」、\n3.「予約を確認する」、\n4.「病院から着信があった方」、\nそれではお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: DYMF
              次の箱: DTMF
            - 判定: エンティティ含む
              入力: 折り返し
              次の箱: END_折り返し
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: 途中抜け用件
              次の箱: 用件のセット_1
            - 判定: エンティティ含む
              入力: 予約以外
              次の箱: 緊急救急復唱_1
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_3
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_4
          デフォルト: 用件を確認_1
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: セットした用件の分岐_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐_3
      - 箱: 再度聞き取りへ_3
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐_1
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 用件のセット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐_3
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 診察予約復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: 確認
              次の箱: 予約確認復唱
      - 箱: セットした用件の分岐_1
        セリフ: 現在、通院中の診療科のご予約ですか？
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: はじめてエンティティ
              次の箱: 新規セット
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 新規セット
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 新規セット
          デフォルト: count上記以外_3
      - 箱: セットした用件の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: セットした用件の分岐_1
          デフォルト: END_戻る
      - 箱: セットした用件の分岐_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 外来調剤
              次の箱: 外来調剤復唱
            - 判定: 一致
              入力: 緊急救急
              次の箱: 緊急救急復唱
            - 判定: 一致
              入力: 代表番号
              次の箱: 代表番号復唱
            - 判定: 一致
              入力: 入院会計
              次の箱: 入院会計復唱
            - 判定: 一致
              入力: 内視鏡受付
              次の箱: 内視鏡受付
            - 判定: 一致
              入力: 核医学受付
              次の箱: 核医学受付
            - 判定: 一致
              入力: 文書窓口
              次の箱: 文書窓口
            - 判定: 一致
              入力: 外来会計
              次の箱: 外来会計
            - 判定: 一致
              入力: 栄養相談
              次の箱: 栄養相談
            - 判定: 一致
              入力: 歯科
              次の箱: 歯科
            - 判定: 一致
              入力: 遺伝診療部
              次の箱: END_遺伝診療部
            - 判定: 一致
              入力: 放射線診断科
              次の箱: 放射線診断科
      - 箱: 予約キャンセル復唱
        セリフ: "ご予約のキャンセルでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約変更復唱
        セリフ: "ご予約の変更でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 診察予約復唱
        セリフ: 診察のご予約でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約確認復唱
        セリフ: "ご予約の確認でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 外来調剤復唱
        セリフ: 外来調剤でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 緊急救急復唱
        セリフ: 緊急・救急でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 代表番号復唱
        セリフ: 代表番号でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 入院会計復唱
        セリフ: 入院会計でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 緊急救急復唱_1
        セリフ: 予約以外の用件でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 内視鏡受付
        セリフ: 内視鏡受付でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 核医学受付
        セリフ: 核医学受付でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 外来会計
        セリフ: 外来会計でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 歯科
        セリフ: 歯科でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 文書窓口
        セリフ: 文書窓口でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 栄養相談
        セリフ: 栄養相談でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 放射線診断科
        セリフ: 放射線診断科でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_2
          デフォルト: count上記以外_1
      - 箱: 用件を確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_途中抜け対応
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_途中抜け対応
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_途中抜け対応
          デフォルト: count上記以外_2
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_3
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 新規セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 再診セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 最初の案内
        セリフ: 初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: DTMF
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １
              次の箱: 診察予約復唱
            - 判定: 一致
              入力: ２
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: ３
              次の箱: 予約確認復唱
            - 判定: 一致
              入力: ４
              次の箱: END_折り返し
          デフォルト: 用件の確認

  終了:
    箱一覧:
      - 箱: END_遺伝診療部
        セリフ: 遺伝診療部でよろしいですか？
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_途中抜け対応
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_折り返し
        セリフ: none
        入力待ち: なし
