flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 時間外コメント
      - 箱: 時間外コメント
        セリフ: ただいまの時間は受付時間外となります。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 11/12までつながない
              次の箱: 時間外コメント
            - 判定: 一致
              入力: 12/29
              次の箱: 時間外コメント
            - 判定: lessEqual
              入力: 平日 月～金
              次の箱: 平日の分岐
            - 判定: 一致
              入力: 土曜日
              次の箱: 土曜日の分岐
          デフォルト: 時間外コメント
      - 箱: 平日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 16時
              次の箱: END_時間内
          デフォルト: 時間外コメント
      - 箱: 土曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 12時
              次の箱: END_時間内
          デフォルト: 時間外コメント

  終了:
    箱一覧:
      - 箱: END_時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
