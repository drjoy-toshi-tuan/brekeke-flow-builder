flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 年末年始
      - 箱: 時間外コメント
        セリフ: ただいまの時間は受付時間外となります。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_時間外
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: 平日
            - 判定: 一致
              入力: 土曜日
              次の箱: 土曜日
          デフォルト: 時間外コメント
      - 箱: 平日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 16時まで
              次の箱: END_時間内
          デフォルト: 時間外コメント
      - 箱: 土曜日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 12時まで
              次の箱: END_時間内
          デフォルト: 時間外コメント
      - 箱: 年末年始
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1/4
              次の箱: 時間外コメント
          デフォルト: 曜日の分岐
      - 箱: テスト
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
