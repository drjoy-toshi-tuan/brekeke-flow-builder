flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 月日
        値:
          月日: []
      - 名前: 新規予約
        値:
          新規予約: [取りたい, 取得, 初診, 紹介状, 診察の予約, 診療予約]
      - 名前: 定期受診
        値:
          定期受診: [受診予約, 循環器, 定期]
      - 名前: 日にちのみ
        値:
          日にちのみ: []
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]
      - 名前: 予約キャンセル
        値:
          予約キャンセル: [キャンセル, やめる, 取消]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]
      - 名前: 予約確認
        値:
          予約確認: [その他, なくした, 確認, 教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 問い合わせ, 問合せ, 予約票]
      - 名前: 予約変更
        値:
          予約変更: [時間, 日程, 日付, 別の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n愛仁会総合健康センターの、予約専用AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電時間判断へ 開発中はシナリオへ繋ぐ
      - 箱: 完了フラグ
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話挨拶
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 希望日聞き取れず ＣＰ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表電話へ
      - 箱: 氏名聞き取れず ＣＰ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表電話へ
      - 箱: 生年月日聞き取れず ＣＰ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表電話へ
      - 箱: キャンセル日聞き取れず CP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表電話へ
      - 箱: 用件聞き取れず CP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表電話へ
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 受診希望日聴取
          デフォルト: 現在の予約日聴取
      - 箱: 用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: その他
              次の箱: 携帯チェック
          デフォルト: 受診者名（担当者名）聴取
      - 箱: 代表電話へ
        セリフ: お電話が遠いようで、回答が確認できませんでした。恐れ入りますが、、祝日を除く、月曜日から金曜日の8時45分から17時、土曜日の8時45分から12時に、健康管理センター直通番号へおかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 直通番号案内
      - 箱: 直通番号案内
        セリフ: "電話番号が分かる場合は、そのままお電話をお切りください。\n分からない場合はご案内いたしますのでメモをご準備ください。\n代表電話番号は、072-692-9291です。\n繰り返します。\n代表電話番号は、072-692-9291です。\n繰り返します。\n代表電話番号は。072-692-9291です。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件聴取
        セリフ: none
        説明: サブシナリオ「用件聴取」を呼び出す
        参照ファイル: 用件聴取.yaml
        回答振り分け:
          デフォルト: 用件の分岐_1
      - 箱: 受診者名（担当者名）聴取
        セリフ: none
        説明: サブシナリオ「受診者名（担当者名）聴取」を呼び出す
        参照ファイル: 受診者名（担当者名）聴取.yaml
        回答振り分け:
          デフォルト: タイトル
      - 箱: 受診希望日聴取
        セリフ: none
        説明: サブシナリオ「受診希望日聴取」を呼び出す
        参照ファイル: 受診希望日聴取.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 生年月日聞取り
        セリフ: none
        説明: サブシナリオ「生年月日聞取り」を呼び出す
        参照ファイル: 生年月日聞取り.yaml
        回答振り分け:
          デフォルト: それでは
      - 箱: 連絡先聴取
        セリフ: none
        説明: サブシナリオ「連絡先聴取」を呼び出す
        参照ファイル: 連絡先聴取.yaml
        回答振り分け:
          デフォルト: 用件の分岐
      - 箱: 現在の予約日聴取
        セリフ: none
        説明: サブシナリオ「現在の予約日聴取」を呼び出す
        参照ファイル: 現在の予約日聴取.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 終話挨拶
        セリフ: 3営業日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 入電時間判断へ 開発中はシナリオへ繋ぐ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電日時判断
      - 箱: 時間外切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯チェック_1
      - 箱: 連絡先聞き取れずCP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 代表電話へ
      - 箱: タイトル
        セリフ: それでは次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞取り
      - 箱: それでは
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聴取
      - 箱: WEB予約希望確認
        セリフ: "ご予約はWEB予約フォームからお申し込みも可能でございます。\nWEB予約フォームからお申し込みをご希望の場合は「1」を、\nこのままお電話でのお申し込みをご希望の場合は「2」を押してください"
        入力待ち: なし
        回答振り分け:
          デフォルト: DTMF入力
      - 箱: WEB予約希望確認_1
        セリフ: "ご予約はWEB予約フォームから、いつでもお申し込みが可能でございます。\nWEB予約フォームからお申し込みをご希望の場合は「1」を押してください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: DTMF入力_1
      - 箱: DTMF入力
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: 一致
              入力: WEB
              次の箱: WEB予約フォーム案内
            - 判定: 一致
              入力: TEL
              次の箱: 受診者名（担当者名）聴取
          デフォルト: LoopCount
      - 箱: DTMF入力_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: 一致
              入力: WEB
              次の箱: WEB予約フォーム案内_1
          デフォルト: タイトル_1
      - 箱: WEB予約フォーム案内
        セリフ: "かしこまりました。お電話終了後にショートメールでURLをお送りいたします。 \nURLをタップし、予約申し込みを完了させてください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: WEB予約フォーム案内_1
        セリフ: "かしこまりました。お電話終了後にショートメールでURLをお送りいたします。 \nURLをタップし、予約申し込みを完了させてください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: LoopCount
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5
              次の箱: 入力確認できないのでTELへ
          デフォルト: DTMF入力
      - 箱: 携帯チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: WEB予約希望確認
          デフォルト: 受診者名（担当者名）聴取
      - 箱: 携帯チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: WEB予約希望確認_1
          デフォルト: 時間外案内
      - 箱: 入力確認できないのでTELへ
        セリフ: "入力が確認できませんでした。\n引き続き、電話にてご案内させていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診者名（担当者名）聴取
      - 箱: 時間外案内
        セリフ: "恐れ入りますが、時間内におかけ直しください。\n本窓口の受付時間は、土日祝日、年末年始を除く月曜～金曜は9時～15時、土曜は9時から12時です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: タイトル_1
        セリフ: ご予約以外の方、お電話で予約の申し込みをご希望の方は、
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間外案内
      - 箱: 入電日時判断
        セリフ: none
        説明: サブシナリオ「入電日時判断」を呼び出す
        参照ファイル: 入電日時判断.yaml
        回答振り分け:
          デフォルト: 用件聴取

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
