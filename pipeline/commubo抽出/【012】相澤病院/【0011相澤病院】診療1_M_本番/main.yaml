            - 判定: 数値以上
              入力: 5以上
              次の箱: END_切断
          デフォルト: 番号案内
      - 箱: 入電時間判断
        セリフ: none
        説明: サブシナリオ「入電時間判断」を呼び出す
        参照ファイル: 入電時間判断.yaml
