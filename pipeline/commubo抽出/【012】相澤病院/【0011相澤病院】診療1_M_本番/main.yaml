flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: お電話ありがとうございます。相澤病院の、予約専用 AI電話です。
        入力待ち: あり
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 切断待ち_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 切断待ち_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_2
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_1
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日：0129更新
      - 箱: 予約キャンセル
        セリフ: "確認のため、改めてこちらからご連絡いたします。\nスタッフが確認後、 予約キャンセルとなりますのでしばらくお待ち下さい。\n体調がすぐれない場合には救命救急センターを御受診下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 診察予約※通常ガイダンス
        セリフ: 3診療日以内に担当者から折り返し電話、またはショートメールにてご連絡をいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折返し待機依頼
      - 箱: 折返し待機依頼
        セリフ: 電話に出られなかった場合でも、こちらから再度ご連絡をしますので、お掛け直しは不要です。連絡待ちの際に体調がすぐれない場合は救命救急センターをご受診下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話_1
        セリフ: お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_2
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 氏名聞取りへ
            - 判定: 一致
              入力: 変更
              次の箱: 次へ
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 受診希望今日？
            - 判定: 一致
              入力: 変更
              次の箱: 診療科
            - 判定: 一致
              入力: キャンセル
              次の箱: 変更・キャンセル
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 現在の時間取得
            - 判定: 一致
              入力: 変更
              次の箱: 現在の時間取得
            - 判定: 一致
              入力: キャンセル
              次の箱: 現在の時間取得
      - 箱: 用件を判断_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 次へ
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ
            - 判定: 一致
              入力: 診察予約
              次の箱: 新規無し予約変更のみ
      - 箱: 用件を判断_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 診察予約※通常ガイダンス
            - 判定: 一致
              入力: 変更
              次の箱: 診察予約※通常ガイダンス
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電時間判断へ
      - 箱: 変更・キャンセル
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科
      - 箱: 電話切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 救命救急センター誘導
        セリフ: 救命救急センターへのご用件は、0263-36-9999へおかけなおしください
        入力待ち: あり
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 救命救急センター
        セリフ: 恐れ入りますが、救命救急センターへのご用件は、0263-36-9999へおかけなおしください。
        入力待ち: あり
        回答振り分け:
          デフォルト: 救命救急センター番号繰り返し
      - 箱: 放射線科（内視鏡・PET/CT）
        セリフ: "恐れ入りますが、\n<? $診療科の読み ?>\nは、0263-33-8600へおかけなおしください。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 代表電話番号繰り返し
      - 箱: 次へ_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件
      - 箱: それでは
        セリフ: それでは、紹介状の封筒に記載されている診療科、または、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科
      - 箱: それでは_1
        セリフ: それでは
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 理由へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 4/14 削除 理由聞き取り
        セリフ: none
        説明: サブシナリオ「4/14 削除 理由聞き取り」を呼び出す
        参照ファイル: 4_14 削除 理由聞き取り.yaml
        回答振り分け:
          デフォルト: CP 理由聞取りできず
      - 箱: 氏名聞取りへ
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 紹介状有無判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 紹介状有り
              次の箱: それでは
          デフォルト: それでは_1
      - 箱: 健診センター
        セリフ: "恐れ入りますが、健診・人間ドックのご予約は、0263-34-6360へお掛けなおしください。\n受付時間は平日8時30分～17時、土曜は8時30分～12時です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診番号繰り返し
      - 箱: 予約確認発話
        セリフ: 恐れ入りますが、ご予約の確認は、予約センターの番号をご案内いたしますので、そちらにお掛け直しください。受付時間は土日・祝日、年末年始を除く、月曜日から金曜日の、9時から16時です。番号を確認できましたらお電話をお切りください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約確認番号案内
      - 箱: 心療内科・美容整形
        セリフ: 恐れ入りますが、当院では診療を行っておりませんので、お近くの医療機関をご受診ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 新規無し予約変更のみ
        セリフ: "恐れ入りますが、\n<? $clinical_department ?>\nは、新規のご予約は承っておりません。\n予約の変更のみ承っておりますので、変更についてお伺いします。まず、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由へ
      - 箱: ３回失敗 終話へ 案内先番号は0月下旬ころ指示あり
        セリフ: "申し訳ございません。うまく聞き取ることができませんでした。\n予約センターの番号をご案内いたしますので、そちらにお掛け直しください。\n受付時間は土日・祝日、年末年始を除く、月曜日から金曜日の、9時から16時です。番号を確認できましたらお電話をお切りください。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 番号案内
      - 箱: CP 用件聞取りNG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り失敗パターン
      - 箱: CP 受診希望日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り失敗パターン
      - 箱: 聞き取り失敗パターン
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ３回失敗 終話へ 案内先番号は0月下旬ころ指示あり
      - 箱: CP 連絡先 NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り失敗パターン
      - 箱: CP 診療科聞き取りできず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り失敗パターン
      - 箱: CP 予約日聞取りできず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り失敗パターン
      - 箱: CP 理由聞取りできず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り失敗パターン
      - 箱: CP 氏名NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り失敗パターン
      - 箱: 4/14 削除 予約日聞取り
        セリフ: none
        説明: サブシナリオ「4/14 削除 予約日聞取り」を呼び出す
        参照ファイル: 4_14 削除 予約日聞取り.yaml
        回答振り分け:
          デフォルト: CP 予約日聞取りできず
      - 箱: 詳細診療科聴取へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 内科・外科詳細聴取へ
      - 箱: 内科・外科詳細聴取へ
        セリフ: none
        説明: サブシナリオ「内科・外科詳細聴取へ」を呼び出す
        参照ファイル: 内科・外科詳細聴取へ.yaml
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 番号案内
        セリフ: "番号は、0263-33-8685です。\n繰り返します。番号は、0263-33-8685です。\n繰り返します。番号は、0263-33-8685です。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 案内回数カウント
      - 箱: 受診希望今日？
        セリフ: none
        説明: サブシナリオ「受診希望今日？」を呼び出す
        参照ファイル: 受診希望今日？.yaml
        回答振り分け:
