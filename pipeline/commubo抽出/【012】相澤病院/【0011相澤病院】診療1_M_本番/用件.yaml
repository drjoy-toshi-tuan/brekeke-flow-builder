flow:
  最初の箱: はじめに

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 代表案内案件
        値:
          代表案内: [ドック, ロック, 健康センター, 健康診断, 健診, 健診の結果, 検診, 検診の結果, 検針, 検針の, 検針の結果, 検針の予約, 照会状, 人間ドック, 人間ドッグの結果, 人間ロック, 肺癌検診, 返信, 返信の件か]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 予約確認
        値:
          予約確認: [確認, 確認したい, 確認の希望, 確認を希望, 確認希望, 予約の確認, 予約を確認]
      - 名前: 用件
        値:
          キャンセル: [3番, ３番, キャンプ, やめる, よく県する, 三番, 三本, 取り消し, 取り消す, 取消, 二百株, 予約のキャンセル, 余白よく検査]
          診察予約: [１番, あクボトオル, いちばん, お札の予約, しょしん, ニ百をする, はじめて, よくボトル, 一番, 印刷の予約, 外来の予約, 今, 再診, 最新, 撮りたい, 札の予約, 三新薬, 取得, 受診, 初めて, 初診, 信託の薬で, 信用の予約, 申告の, 診察, 診察の予約, 診療予約, 代替の薬, 美白, 百お願い, 薬を取る, 有効とる, 予約お願い, 予約する, 予約の方, 予約をお願い, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          変更: [２番, 2番, いや抗原航空, 延期, 取り直したい, 取り直す, 二番, 二本, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 予約の銀行, 予約の変更, 予約の辺]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の3つのうちのいずれかでお話ください。\n\n「診察の予約を取る」、\n「予約を変更する」、\n「予約をキャンセルする」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: 人間ドック・健診
              次の箱: 人間ドック・健診セット
            - 判定: エンティティ含む
              入力: 予約確認
              次の箱: 予約確認
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF内容確認
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_3
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。はい、そうです、または、いいえ、違いますでお答えいただけますか？\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診⇒受診希望か確認
      - 箱: 再度聞き取りへ_3
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 新規予約?
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 人間ドック・健診セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 予約確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 診察予約復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: 健康診断・ドック
              次の箱: 受信希望確認へ
            - 判定: エンティティ含む
              入力: 予約確認
              次の箱: END_予約確認発話
      - 箱: セットした用件の分岐_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状確認へ
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 紹介状確認へ
          デフォルト: count上記以外_4
      - 箱: セットした用件の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 新規予約?
            - 判定: 一致
              入力: キャンセル
              次の箱: END_戻る
            - 判定: 一致
              入力: 変更
              次の箱: END_戻る
      - 箱: 予約キャンセル復唱
        セリフ: "ご予約のキャンセルでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約変更復唱
        セリフ: "ご予約の変更でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 診察予約復唱
        セリフ: 診察のご予約でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: 予約確認
              次の箱: END_予約確認発話
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: ドック・健康診断
              次の箱: 受信希望確認へ
          デフォルト: count上記以外_2
      - 箱: 用件を確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: かしこまりました。
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: かしこまりました。
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_健診・ドック発話
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: END_健診・ドック発話
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
          デフォルト: count上記以外_3
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 紹介状確認へ
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状聴取
      - 箱: はじめに
        セリフ: 初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 用件を確認_1
      - 箱: count上記以外_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_3
          デフォルト: セットした用件の分岐_1
      - 箱: 紹介状聴取
        セリフ: none
        説明: サブシナリオ「紹介状聴取」を呼び出す
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 健診⇒受診希望か確認
        セリフ: 健診を受診後に、届いた紹介状をお持ちで、当院での診察をご希望ですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 受信希望確認へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診⇒受診希望か確認
      - 箱: かしこまりました。
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: DTMF内容確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1：診察予約
              次の箱: 診察予約復唱
            - 判定: 一致
              入力: 2：変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: 3：キャンセル
              次の箱: 予約キャンセル復唱
          デフォルト: count上記以外_1
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 新規予約?
        セリフ: 現在、通院中の診療科のご予約ですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐_1

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_健診・ドック発話
        セリフ: none
        入力待ち: なし
      - 箱: END_予約確認発話
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
