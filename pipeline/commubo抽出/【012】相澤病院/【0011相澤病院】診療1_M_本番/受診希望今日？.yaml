flow:
  最初の箱: 受診希望日は今日？

  エンティティ定義:
    カスタム:
      - 名前: 肯定（エンティティ）
        値:
          肯定: [はーい, 異常部, 今日がいい, 今日です, 丈夫, 大丈夫, 配送です]
      - 名前: 否定（エンティティ）
        値:
          否定: [いいえ, いえ, いや, じゃない]

  共通:
    箱一覧:
      - 箱: 受診希望日は今日？
        セリフ: 本日の受診をご希望ですか？はい、そうです、または、いいえ、ちがいます、で、お答えください。
        入力待ち: あり
        回答振り分け:
          デフォルト: 否定肯定
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 否定肯定
      - 箱: 否定肯定
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セット：今日
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: セット：今日
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セット：今日
            - 判定: エンティティ含む
              入力: 否定
              次の箱: セット：空白
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: セット：空白
          デフォルト: count上記以外
      - 箱: セット：今日
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: セット：空白
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: count聞き直し
        セリフ: "うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診希望日は今日？
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_受診希望日取得できず
          デフォルト: count聞き直し

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_受診希望日取得できず
        セリフ: none
        入力待ち: なし
