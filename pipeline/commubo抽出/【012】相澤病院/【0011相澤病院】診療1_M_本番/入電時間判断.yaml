flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日
      - 箱: TEST用 曜日時間偽装（月-0、火-1、水-2，木-3，金-4、土-5、日-6）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日
      - 箱: 祝日
        セリフ: none
        説明: サブシナリオ「祝日」を呼び出す
        回答振り分け:
          デフォルト: END_金16時以降～土日祝日（終日）
      - 箱: 平日時間判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: "0:00-9:00"
              次の箱: 曜日判別_2
            - 判定: 数値
              入力: "0:00-9:00"
              次の箱: 曜日判別_2
            - 判定: 数値
              入力: "09:00-16:00"
              次の箱: 曜日判別_1
            - 判定: 数値
              入力: "09:00-16:00"
              次の箱: 曜日判別_1
          デフォルト: 曜日判別
      - 箱: 曜日判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 月
              次の箱: END_平日時間外（月 0時0～9時、月-木 16：00～翌9：00）
            - 判定: lessEqual
              入力: 火～木
              次の箱: END_平日時間外（月 0時0～9時、月-木 16：00～翌9：00）
            - 判定: 一致
              入力: 金
              次の箱: END_金16時以降～土日祝日（終日）
            - 判定: 一致
              入力: 土
              次の箱: END_金16時以降～土日祝日（終日）
          デフォルト: END_金16時以降～土日祝日（終日）
      - 箱: 曜日判別_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 月～金
              次の箱: END_稼働時間内
          デフォルト: END_金16時以降～土日祝日（終日）
      - 箱: 曜日判別_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 月
              次の箱: END_平日時間外（月 0時0～9時、月-木 16：00～翌9：00）
            - 判定: lessEqual
              入力: 火～木
              次の箱: END_平日時間外（月 0時0～9時、月-木 16：00～翌9：00）
            - 判定: 一致
              入力: 金
              次の箱: END_平日時間外（月 0時0～9時、月-木 16：00～翌9：00）
            - 判定: 一致
              入力: 土
              次の箱: END_金16時以降～土日祝日（終日）
          デフォルト: END_金16時以降～土日祝日（終日）

  終了:
    箱一覧:
      - 箱: END_金16時以降～土日祝日（終日）
        セリフ: none
        入力待ち: なし
      - 箱: END_平日時間外（月 0時0～9時、月-木 16：00～翌9：00）
        セリフ: none
        入力待ち: なし
      - 箱: END_稼働時間内
        セリフ: none
        入力待ち: なし
