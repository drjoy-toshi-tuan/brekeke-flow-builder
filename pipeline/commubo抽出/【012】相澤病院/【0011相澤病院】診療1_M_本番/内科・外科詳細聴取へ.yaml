flow:
  最初の箱: 内科or外科

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 外科詳細確認
        セリフ: どちらの外科でしょうか？「整形外科」のようにお答え下さい。予約票に「外科」と記載がある場合は「外科」とお答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 内科詳細確認
        セリフ: どちらの内科でしょうか？「消化器内科」のようにお答え下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: 上記以外on
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_理由聴取できず
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 内科or外科
      - 箱: 内科or外科
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 内科
              次の箱: 内科詳細確認
            - 判定: 一致
              入力: 外科
              次の箱: 外科詳細確認

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_理由聴取できず
        セリフ: none
        入力待ち: なし
