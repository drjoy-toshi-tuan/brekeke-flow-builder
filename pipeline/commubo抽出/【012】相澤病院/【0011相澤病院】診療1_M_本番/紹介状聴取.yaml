flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: 紹介状
        値:
          紹介状: [あります, もってる, 紹介状あり, 紹介状あります]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 他の医療機関からの紹介状はお持ちですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、か、「いいえ」、でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 紹介状あり
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 紹介状なし
        セリフ: "かしこまりました。紹介状がない場合は、診療費とは別に、選定療養費として、8,000円をご負担いただいておりますのでご了承ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上（12/18 戻し）
              次の箱: END_紹介状有無聞き取れず
          デフォルト: 再度聞き取りへ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介状有無聞き取れず
        セリフ: none
        入力待ち: なし
