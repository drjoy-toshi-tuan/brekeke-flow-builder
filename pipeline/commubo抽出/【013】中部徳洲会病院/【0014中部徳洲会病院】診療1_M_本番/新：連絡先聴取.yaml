flow:
  最初の箱: 二次健診初診判別

  エンティティ定義:
    カスタム:
      - 名前: 肯定単語
        値:
          はい: [OK, あっています, あってます, あってる, いいです, いいよ, イエス, そうです, 違いありません, 違いない, 合っています, 合ってます, 大丈夫, 問題ありません, 問題ない]
      - 名前: 持ってない
        値:
          持ってない: [いない, いませーん, いません, ない, もってない, もてない, 以てない, 持っていません, 持ってませーん, 持ってません, 盛ってない]
      - 名前: 電話番号
        値:
          IP電話番号: []
          携帯電話番号: []
          電話番号: []
      - 名前: 否定単語
        値:
          違います: [いえ, ダメ, ダメ, ノー, 違い, 違う, 違って, 駄目]
      - 名前: 別の
        値:
          別の: [違う, 携帯, 他の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 一度言い切り　桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 10桁
              次の箱: 電話番号蓄積
            - 判定: 一致
              入力: 11桁
              次の箱: 区切り
          デフォルト: 該当なし
      - 箱: 一度言い切り　桁数チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 10桁
              次の箱: 電話番号蓄積
            - 判定: 一致
              入力: 11桁
              次の箱: 区切り
          デフォルト: ■電話番号の聞き取り
      - 箱: 区切り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯
              次の箱: 携帯3-4-4
            - 判定: 一致
              入力: IP
              次の箱: IP3-4-4
            - 判定: 一致
              入力: 固定5桁
              次の箱: 固定5-1-4
            - 判定: 一致
              入力: 固定5桁
              次の箱: 固定5-1-4
            - 判定: 一致
              入力: 固定4桁
              次の箱: 固定4-2-4
            - 判定: 一致
              入力: 固定4桁
              次の箱: 固定4-2-4
            - 判定: 一致
              入力: 固定3桁
              次の箱: 固定3-3-4
            - 判定: 一致
              入力: 固定3桁
              次の箱: 固定3-3-4
            - 判定: 一致
              入力: 固定2桁
              次の箱: 固定2-4-4
            - 判定: 一致
              入力: 固定2桁
              次の箱: 固定2-4-4
          デフォルト: 該当桁数なし
      - 箱: 携帯3-4-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱
      - 箱: IP3-4-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱
      - 箱: 固定3-3-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱
      - 箱: ■電話番号復唱
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定単語
              次の箱: 電話種別
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 電話種別
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 電話種別
            - 判定: エンティティ含む
              入力: 否定単語
              次の箱: いいえ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: いいえ
          デフォルト: はいorいいえ
      - 箱: 電話番号復唱
        セリフ: "ご連絡先の電話番号は、\n<? $連絡先電話番号（ハイフン区切あり） ?>\n、でよろしいでしょうか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: ■電話番号復唱
      - 箱: いいえ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 二次健診初診判別_2
      - 箱: 該当桁数なし
        セリフ: 申し訳ございません、正しい桁数で聞き取れませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 固定2-4-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱
      - 箱: 固定4-2-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱
      - 箱: 固定5-1-4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱
      - 箱: 電話番号聞き取れず
        セリフ: "大変申し訳ございません、お電話番号を聞き取ることができませんでした。\n恐れ入りますが、今おかけになっているお電話番号をご連絡先として登録させていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り不完了
      - 箱: いいえ_1
        セリフ: 恐れ入りますが、うまく聞き取りができませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: ダイヤルプッシュ案内
      - 箱: 該当なし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 聞き返しNG
              次の箱: 代表かそれ以外の分岐
          デフォルト: count聞き直し
      - 箱: 回数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 聞き返しNG3回以上
              次の箱: 代表かそれ以外の分岐
          デフォルト: count聞き直し_2
      - 箱: 携帯OK
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: ■電話番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: 値含む
              入力: 携帯電話番号
              次の箱: 一度言い切り　桁数チェック
            - 判定: 値含む
              入力: 電話番号
              次の箱: 一度言い切り　桁数チェック
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 一度言い切り　桁数チェック_1
          デフォルト: 音声確認用フラグ
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ■電話番号の聞き取り
      - 箱: 電話番号蓄積
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 11桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番5桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番5桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番4桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番4桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番3桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番3桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: 市外局番2桁＋全10桁
              次の箱: 区切り
            - 判定: 一致
              入力: 市外局番2桁＋全10桁
              次の箱: 区切り
            - 判定: エンティティ含む
              入力: なにか言っている
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言5＋phoneなし＋聞き返しNG
              次の箱: 代表かそれ以外の分岐
            - 判定: 一致
              入力: 無言5＋phoneなし＋聞き返しNG
              次の箱: 代表かそれ以外の分岐
            - 判定: 数値以上
              入力: 無言5＋phoneなし＋聞き返しNG
              次の箱: 代表かそれ以外の分岐
            - 判定: 数値以上
              入力: 無言5＋phoneなし
              次の箱: count再質問_2
            - 判定: 一致
              入力: 無言5＋phoneなし
              次の箱: count再質問_2
            - 判定: 数値以上
              入力: 無言2＋phoneあり＋聞き返しNG
              次の箱: 代表かそれ以外の分岐
            - 判定: エンティティ含む
              入力: 無言2＋phoneあり＋聞き返しNG
              次の箱: 代表かそれ以外の分岐
            - 判定: 数値以上
              入力: 無言2＋phoneあり＋聞き返しNG
              次の箱: 代表かそれ以外の分岐
            - 判定: 一致
              入力: 無言2＋phoneあり
              次の箱: 桁数不足など
            - 判定: エンティティ含む
              入力: 無言2＋phoneあり
              次の箱: 桁数不足など
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ■電話番号の聞き取り
      - 箱: もう一度
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 二次健診初診判別_1
      - 箱: 桁数不足など
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 該当桁数なし
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ■電話番号の聞き取り
      - 箱: 音声確認用フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含まない
              入力: 音声確認フラグ未
              次の箱: フラグon
          デフォルト: 電話番号蓄積
      - 箱: フラグon
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号蓄積
      - 箱: 携帯先、固定後*電話番号聴取
        セリフ: 日中、連絡の取れるご連絡先の携帯電話番号、または0から始まる市外局番を含めた電話番号をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: ■番号確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 別の
              次の箱: 別の番号
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 別の番号
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 携帯電話番号チェック
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 携帯電話番号チェック
          デフォルト: count上記以外_1
      - 箱: 番号確認
        セリフ: "ご連絡先のお電話番号は、今おかけいただいている\n<? $入電番号（ハイフン区切りあり） ?>\nでよろしいですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: ■番号確認
      - 箱: 復唱へ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号復唱
      - 箱: はいorいいえ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 二次健診初診判別_3
      - 箱: 電話番号区切り
        セリフ: none
        説明: サブシナリオ「電話番号区切り」を呼び出す
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 電話種別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック_1
      - 箱: 別の番号
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯先、固定後*電話番号聴取
      - 箱: 入電携帯番号でOK
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 携帯電話番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 持ってない
              次の箱: かしこまりました。
            - 判定: エンティティ含む
              入力: 数字
              次の箱: リセット
          デフォルト: count上記以外
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 入電携帯番号でOK
          デフォルト: 入電携帯番号でOK
      - 箱: 携帯電話番号チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 携帯OK
          デフォルト: 携帯OK
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 携帯電話番号の聞き取り
      - 箱: 携帯電話番号の聞き取りへ２
        セリフ: 携帯電話はお持ちでしょうか？お持ちの場合は、番号をお話ください。お持ちでない場合は『持っていない』、と、お話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号の聞き取り
      - 箱: 携帯電話番号の聞き取りへ２_1
        セリフ: 携帯電話をお持ちの場合は、番号をお話ください。お持ちでない場合は『持っていない』、と、お話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号の聞き取りへ２
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: ■番号確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号確認
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ■電話番号の聞き取り
      - 箱: ダイヤルプッシュ案内
        セリフ: 再度、日中連絡の取れるご連絡先のお電話番号をお話下さい。
        入力待ち: あり
        回答振り分け:
          デフォルト: リセット
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取り不可
          デフォルト: 再度聞き取りへ_1
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取り不可
          デフォルト: 該当桁数なし
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取り不可
          デフォルト: 復唱へ
      - 箱: count聞き直し_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取り不可
          デフォルト: いいえ_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 聴取失敗
          デフォルト: 再度聞き取りへ
      - 箱: 3回聞き取り不可
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 非通知
              次の箱: END_非通知・聞き取れず転送へ
            - 判定: 一致
              入力: 非通知
              次の箱: END_非通知・聞き取れず転送へ
            - 判定: 一致
              入力: 非通知
              次の箱: END_非通知・聞き取れず転送へ
          デフォルト: END_聞き取り不完了
      - 箱: 代表かそれ以外の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
