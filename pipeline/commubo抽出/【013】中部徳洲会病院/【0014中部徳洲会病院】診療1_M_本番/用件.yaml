flow:
  最初の箱: タイトル

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 人間ドックや健診の予約
        値:
          健診: [KC, センター, ドック, のドック, レディース健診, 管理, 管理センター, 系人, 健康, 健康管理センター, 健康診断, 健康診断, 健診, 検診, 子宮がん検診, 市町村のがん検診, 市民健診, 視聴さんの, 住民検診, 職場検診, 診断, 人間ドック, 特定健診, 乳がん検診, 脳ドック]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 予防接種
        値:
          予防接種: [インフル, の棒全紙, ワクチン, 女房先週, 女房千種, 注射, 有望摂取, 予防]
      - 名前: 用件
        値:
          キャンセル: [やめる, 取り消し, 取り消す, 取消, 予約のキャンセル]
          確認: [その他確認, 確認, 角煮, 教えて, 時間を忘れた, 日時確認, 聞きたい, 忘れた, 約確認, 予約の核, 予約の確認, 予約確認, 予約日時を確認する]
          診察: [しょしん, はじめて, 印刷の, 印刷のやつをドル。, 再診, 最新, 撮りたい, 三新薬, 取得, 受診, 初めて, 初診, 診察, 診察の予約, 診療予約, 予約お願い, 予約する, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          変更: [延期, 銀行, 時間, 取り直したい, 取り直す, 日にち, 日程, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 予約の変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の5つのうちの、いずれかでお話ください。\n「診察の予約」、「予防接種の予約」、\n「予約変更」、\n「予約キャンセル」\n「予約確認」それでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: ■用件の確認
      - 箱: ■用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: 予防接種
              次の箱: 予防接種セット
            - 判定: エンティティ含む
              入力: 人間ドック・健康診断
              次の箱: 人間ドック・健康診断
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: もしもし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: ■用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: ■用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: ■初診再診確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: ■初診再診確認
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察
              次の箱: 診察 復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: 確認
              次の箱: 予約確認復唱
            - 判定: 一致
              入力: 予防接種
              次の箱: 予防接種 復唱
      - 箱: ■初診再診確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 初診
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 初診
          デフォルト: count上記以外_2
      - 箱: セットした用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察
              次の箱: 初診再診判別
            - 判定: 一致
              入力: 健診
              次の箱: END_健診
            - 判定: 一致
              入力: 予防接種
              次の箱: END_予防接種
          デフォルト: END_戻る
      - 箱: 初診再診判別
        セリフ: "診察のご予約ですね？\n通院中の患者さんですか？\nはいそうです、か、いいえ違います、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: ■初診再診確認
      - 箱: 予約キャンセル復唱
        セリフ: "ご予約のキャンセルで、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定
      - 箱: 予約変更復唱
        セリフ: "ご予約の変更で、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定
      - 箱: 診察 復唱
        セリフ: 診察のご予約で、よろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定
      - 箱: 予約確認復唱
        セリフ: "ご予約の確認で、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定
      - 箱: 予防接種 復唱
        セリフ: "予防接種のご予約で、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定
      - 箱: ドック・健診復唱
        セリフ: "人間ドックや健診のご予約で、よろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定
      - 箱: ■用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 初診
        セリフ: 初診のご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 再診セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: タイトル
        セリフ: はじめに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ４以上
              次の箱: 3回聞き取れず
            - 判定: 一致
              入力: ３回目
              次の箱: もしもし３回目以上
            - 判定: 一致
              入力: 2以上
              次の箱: もしもし2回目
            - 判定: 一致
              入力: 1回目
              次の箱: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし３回目以上
        セリフ: "こちらはAI電話です。この後ご案内する用件のいずれかでお答えいただくことで、お電話で承ることができます。\n再度ご案内いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 人間ドック・健康診断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: ドック・健診復唱
      - 箱: 予防接種セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 肯定否定
        セリフ: はい、大丈夫です、かいいえ、違います、でお答えください
        入力待ち: なし
        回答振り分け:
          デフォルト: ■用件を確認

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_健診
        セリフ: none
        入力待ち: なし
      - 箱: END_予防接種
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
