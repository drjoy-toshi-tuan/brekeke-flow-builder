flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あり, あります。, ある, うん, はーい, 異常部, 持ってまーす, 持ってます, 大丈夫]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, お願いしまーす, ない, もっとらん, 持ってない]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 他の医療機関からの紹介状はお持ちですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: ■有無を確認
      - 箱: ■有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: ■有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。はい持ってます、か、いいえ持ってません、でお答えいただけますか？再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 紹介状あり
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_あり
      - 箱: 紹介状なし
        セリフ: "かしこまりました。他の医療機関からの紹介状をお持ちでない患者さんにつきましては、通常の診療費とは別に、初診時選定療養費として、7,000円を全額自己負担いただいております。\n予めご了承ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_なし
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取りへ

  終了:
    箱一覧:
      - 箱: END_あり
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_なし
        セリフ: none
        入力待ち: なし
