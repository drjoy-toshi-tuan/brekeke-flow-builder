flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 肯定
        値:
          肯定: [OK, してまーす, そう, そうでーす, そのとおり, その通り, はーい, 異常部, 合って, 丈夫, 大丈夫, 通り, 配送です]
      - 名前: 否定
        値:
          否定: [EHが今, いいえ, いえ, いや, じゃない, ちがいまーす, ちがう, ちゃう, 違います]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n中部徳洲会病院の予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話種別
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 氏名聴取
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 旧：生年月日聴取
      - 箱: 終話案内
        セリフ: "かしこまりました。\n担当者から折り返しのご連絡にてご予約の変更が確定いたします。数日以内にご連絡いたしますので、しばらくお待ちください。\nなお、後日ご予約の変更をご希望の場合は、再度こちらの番号までご連絡ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話案内_1
        セリフ: かしこまりました。キャンセルを承りました。追加のご案内が必要な場合は、改めて折り返しお電話させていただくことがございます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約終話案内
        セリフ: "かしこまりました。\n担当者から折り返しのご連絡にてご予約が確定いたします。数日以内にご連絡いたしますので、しばらくお待ちください。\nなお、後日ご予約の変更をご希望の場合は、再度こちらの番号までご連絡ください。"
