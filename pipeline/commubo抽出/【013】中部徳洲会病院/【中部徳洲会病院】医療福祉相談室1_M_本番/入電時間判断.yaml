flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 2026年GW日付分岐
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 土曜日
              次の箱: 土曜日分岐
          デフォルト: 時間外へ
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時30分前
              次の箱: 時間外へ
            - 判定: 数値
              入力: 17時まで
              次の箱: END_受付時間内
          デフォルト: 時間外へ
      - 箱: 時間外へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 土曜日分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 8時30分前
              次の箱: 時間外へ
            - 判定: lessEqual
              入力: 12時半まで
              次の箱: END_受付時間内
          デフォルト: 時間外へ
      - 箱: 2026年GW日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 5/4まで
              次の箱: 時間外へ
            - 判定: 数値
              入力: 5/5と5/6
              次の箱: （平日）時間の分岐
          デフォルト: 時間外へ
      - 箱: テスト
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_土曜日分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 8時30分前
            - 判定: lessEqual
              入力: 12時半まで
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
