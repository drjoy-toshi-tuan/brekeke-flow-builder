flow:
  最初の箱: 確認

  エンティティ定義:
    カスタム:
      - 名前: わからない
        値:
          わからない: [しらない, しりません, わかりません, わかんない, わすれた, 解らない, 覚えていない, 書いていない, 知らない, 分からない, 分からん, 忘れちゃった]
      - 名前: 下地
        値:
          下地: [C文字, しもじ, シモジ, しもち]
      - 名前: 下地個人判別
        値:
          下地光太郎: [こうたろう, コウタロウ, シモジコウタロウ, 硬貨ろう]
          下地碧生: [あおい, アオイ, シモジアオイ, 下地青い, 青い, 青い山]
      - 名前: 肯定
        値:
          肯定: [あってます, そうです, その通りです, はーい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 山城
        値:
          山城: [ヤシロ, ヤマシロ]
      - 名前: 山城個人判別
        値:
          山城碧生: [アオイ, 青い山]
          山城諒子: [ヨウコ, リョウコ, リョウコ, 看護師の山城さん]
      - 名前: 大城
        値:
          大城: [503, オーシロ, オオシロ, おーヒロ, 大城]
      - 名前: 大城個人判別
        値:
          大城実: [おおしろみのる, オオシロミノル, みのる, ミノル]
          大城尚幸: [おおしろなおゆき, オオシロナオユキ, ナオユキ]
      - 名前: 担当者判別
        値:
          ファーロー香織: [カオリ, ファーロー, 方増産]
          下地光太郎: [コウタロウ, コウタロウ, シモジ, しもじ, しもじこうたろう, 下地]
          下地碧生: [アオイ, あおい, しもじ, シモジ, 気持ち青い山]
          看護師: [カンゴシ, 三五七三, 番号資産]
          喜友名幸代: [キウナ, キューナ, サチヨ, 喜友名, 九七三, 幸代]
          久保梓: [アズサ, クボ, クボアズサ, 久保]
          宮城文力: [フミチカ, ふみちか, みやぎ, ミヤギ, ミヤジ, 宮城, 宮城文力さん]
          宮良麻美: [みやら, ミヤラ, みやらあさみ, ミヤラアサミ, 宮良]
          玉那覇りこ: [タマナハ, タマナハ, タマナハリコ, ヤマノサキコ, リコ, りこ, 玉は三, 玉那覇, 玉名は, 玉名りこ, 玉名破産, 七五三, 七三, 二個]
          金城正吾: [カネシロ, カネシロショーゴ, キンジョウ, キンジョー, キンゾウ, シンゾウ, 金城, 金属, 心臓総合]
          桑江朝美: [クワエ, トモミ, ともみ, 桑江]
          山城碧生: [ヤマシロアオイ, ヤマシロオオイ, 青い山, 面白]
          山城諒子: [ヤマシロリョウコ, ヤマシロリョーコ, ヨウコ, リョウコ]
          小橋川ひかる: [コバシカワ, コバシカワヒカル, コバヤカワ, コバヤシ側, こ橋側, こ橋側光, こ橋側光る, ヒカル, ヨシザワ, 小橋川, 小林側, 伸ばし側, 飛ばし側]
          新垣愛: [アラカキ, シンガキ, 新垣]
          大城実: [OC, おおしろみのる, オオシロミノル, みのる, ミノル]
          大城尚幸: [おおしろなおゆき, オオシロナオユキ, ナオユキ, なおゆき]
          池原ちひろ: [イケハラ, イケハラチヒロ, イチハラ, 池原]
          島袋操: [いまマクロ, シマブクロ, シマブクロミサオ, 島袋]
          藤田結愛: [フジタ, ふじた, フジタユア, ふじたゆあ, 藤田]
          比嘉彩花: [アヤカ, ヒガ, ひが, ヒガアヤカ, ひがあやか, 比嘉]
          本吉和美: [モトヨシ, 本吉]
          名城由起子: [ナシロ, ユキコ, 能代, 名城]
          與儀篤: [オギ, ミヤギ, ミヨジ, ヤギ, ユキ, ユミ, ヨギ, ヨギアツシ, 右下, 弓, 四三, 代々木, 読みアツシ, 與儀]
      - 名前: 否定
        値:
          否定: [EHが今, いいえ, いえ, いや, じゃない, ちがう, 違う人です]

  共通:
    箱一覧:
      - 箱: 固定電話転送
        セリフ: none
        説明: サブシナリオ「固定電話転送」を呼び出す
        回答振り分け:
          デフォルト: END_転送済み
      - 箱: 確認
        セリフ: 担当者へ転送いたしますので、
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認_1
      - 箱: 確認_1
        セリフ: 担当の名前を仰ってください。分からない場合には、分からないとお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当者名聞き取り
      - 箱: 担当者名聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 大城氏判別
              次の箱: 大城確認
            - 判定: エンティティ含む
              入力: 下地判別
              次の箱: 下地確認
            - 判定: エンティティ含む
              入力: 山城判別
              次の箱: 山城確認
            - 判定: エンティティ含む
              入力: 担当者判別
              次の箱: コンテキストセット_1
            - 判定: エンティティ含む
              入力: わからない
              次の箱: 固定電話転送_1
          デフォルト: count上記以外_1
      - 箱: 大城氏読み取得
        セリフ: none
        説明: サブシナリオ「大城氏読み取得」を呼び出す
        回答振り分け:
          デフォルト: 担当者読みセット_1
      - 箱: 担当者読み取得
        セリフ: none
        説明: サブシナリオ「担当者読み取得」を呼び出す
        回答振り分け:
          デフォルト: 担当者読みセット
      - 箱: 下地氏読み取得
        セリフ: none
        説明: サブシナリオ「下地氏読み取得」を呼び出す
        回答振り分け:
          デフォルト: 担当者読みセット_1
      - 箱: 山城氏読み取得
        セリフ: none
        説明: サブシナリオ「山城氏読み取得」を呼び出す
        回答振り分け:
          デフォルト: 担当者読みセット
      - 箱: 大城判別
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 大城氏判別
              次の箱: コンテキストセット
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_1
          デフォルト: count上記以外
      - 箱: 下地判別
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 下地氏判別
              次の箱: コンテキストセット_2
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_1
          デフォルト: count上記以外_3
      - 箱: 山城判別
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 山城氏判別
              次の箱: コンテキストセット_3
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_1
          デフォルト: count上記以外_4
      - 箱: 大城確認
        セリフ: "大城、ですね?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 大城聞き取り
      - 箱: 下地確認
        セリフ: "下地 ですね?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 下地聞き取り
      - 箱: 大城聞き取り
        セリフ: "大城実と、大城尚幸、\nどちらの担当者でしょうか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 大城判別
      - 箱: 下地聞き取り
        セリフ: 下地光太郎と、下地碧生、どちらの担当者でしょうか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 下地判別
      - 箱: 山城確認
        セリフ: "山城、ですね?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 山城聞き取り
      - 箱: 山城聞き取り
        セリフ: 山城碧生と、看護師の山城諒子、どちらでしょうか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 山城判別
      - 箱: コンテキストセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 大城氏読み取得
      - 箱: コンテキストセット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当者読み取得
      - 箱: コンテキストセット_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 下地氏読み取得
      - 箱: コンテキストセット_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 山城氏読み取得
      - 箱: 担当者確認へ
        セリフ: "担当者は、\n<? $担当者名の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当確認
      - 箱: 担当確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 担当/看護師判別
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 担当/看護師判別
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: count再質問_1
          デフォルト: count上記以外_2
      - 箱: 否定⇒再質問へ（各コンテキストクリア）
        セリフ: 失礼いたしました。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認_1
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 大城判別
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 担当者名聞き取り
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_3
          デフォルト: 担当確認
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_4
          デフォルト: 下地判別
      - 箱: count上記以外_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_6
          デフォルト: 山城判別
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聴取できず
          デフォルト: 再度確認へ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聴取できず
          デフォルト: 否定⇒再質問へ（各コンテキストクリア）
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聴取できず
          デフォルト: 再度確認へ_1
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聴取できず
          デフォルト: 再度確認へ_2
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聴取できず
          デフォルト: 再度確認へ_3
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聴取できず
          デフォルト: 再度確認へ_1
      - 箱: count再質問_6
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: END_聴取できず
          デフォルト: 再度確認へ_4
      - 箱: 再度確認へ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 大城聞き取り
      - 箱: 再度確認へ_1
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認_1
      - 箱: 再度確認へ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当者確認へ
      - 箱: 再度確認へ_3
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 下地聞き取り
      - 箱: 再度確認へ_4
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 山城聞き取り
      - 箱: 固定電話転送_1
        セリフ: かしこまりました。それでは、医療福祉相談室の窓口へ転送いたしますので、少々お待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 固定電話転送
      - 箱: 担当者読みセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当者確認へ
      - 箱: 担当者読みセット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当者確認へ
      - 箱: 転送
        セリフ: none
        説明: サブシナリオ「転送」を呼び出す
        回答振り分け:
          デフォルト: END_転送済み
      - 箱: 転送先番号確認
        セリフ: none
        説明: サブシナリオ「転送先番号確認」を呼び出す
        回答振り分け:
          デフォルト: 転送先番号セット
      - 箱: 転送先番号セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送
      - 箱: 担当/看護師判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 看護師
              次の箱: 看護師転送
          デフォルト: 担当者転送
      - 箱: 看護師転送
        セリフ: それでは、看護師の窓口へ転送いたします。少々お待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送先番号確認
      - 箱: 担当者転送
        セリフ: 担当者へ転送いたします。少々お待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送先番号確認
      - 箱: テスト用リセット
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 確認

  終了:
    箱一覧:
      - 箱: END_聴取できず
        セリフ: none
        入力待ち: なし
      - 箱: END_転送済み
        セリフ: none
        入力待ち: なし
      - 箱: END_転送失敗
        セリフ: none
        入力待ち: なし
