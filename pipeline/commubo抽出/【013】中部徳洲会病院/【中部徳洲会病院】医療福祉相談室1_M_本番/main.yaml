flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\nこちらは、中部徳洲会病院医療福祉相談室です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断へ
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 入電時間判断ノードへ（開発中はシナリオへ）
      - 箱: 受付時間外の案内CP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（時間外）
      - 箱: 年末年始
        セリフ: "申し訳ございませんが、年末年始はお休みしております。\n受付時間は、1月5日の8時30分より開始いたします。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受付時間外の案内CP
      - 箱: 受付時間外の案内CP_1
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、日曜祝日、年末年始を除く、月曜日から金曜日の8時30分から17時、土曜日は8時30分から12時30分となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 受付時間外の案内CP
      - 箱: 転送失敗
        セリフ: お電話をお繋ぎできませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: 固定電話（098-923-2647）へ転送
      - 箱: 転送失敗_1
        セリフ: "只今お電話が混みあっている為、お繋ぎできませんでした。\n恐れ入りますが、しばらく経ってから、おかけなおし下さい。\nそれでは、失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断へ
      - 箱: 固定電話（098-923-2647）へ転送
        セリフ: 医療福祉相談室窓口へお繋ぎいたします。少々お待ちください。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY_1
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断へ
      - 箱: 完了フラグ（時間外）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断へ
      - 箱: 完了フラグ_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断へ
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 入電OKCP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 担当者直接転送へ
      - 箱: 入電時間判断ノードへ（開発中はシナリオへ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電時間判断
      - 箱: 担当者直接転送へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 0307：看護師復唱→看護師 へ
      - 箱: API_DRJOY_1
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 098-923-2647 へ
      - 箱: 098-923-2647 へ
        セリフ: none
        説明: サブシナリオ「098-923-2647 へ」を呼び出す
        回答振り分け:
          デフォルト: 完了フラグ_1
      - 箱: 聞き取りできず
        セリフ: 恐れ入りますが、うまく聞き取ることができませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: 固定電話（098-923-2647）へ転送
      - 箱: 0307：看護師復唱→看護師 へ
        セリフ: none
        説明: サブシナリオ「0307：看護師復唱→看護師 へ」を呼び出す
        参照ファイル: 0307：看護師復唱→看護師 へ.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 入電時間判断
        セリフ: none
        説明: サブシナリオ「入電時間判断」を呼び出す
        参照ファイル: 入電時間判断.yaml
        回答振り分け:
          デフォルト: 入電OKCP

  終了:
    箱一覧:
      - 箱: END_切断へ
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
