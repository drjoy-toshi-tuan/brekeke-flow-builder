flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 用件
        値:
          キャンセル: [2, 2番, にばん, ニ番, やめる, 取り消し, 取り消す, 取消, 二、, 予約のキャンセル]
          確認: [3, 3番, その他確認, 確認, 角煮, 教えて, 三, 三番, 時間を忘れた, 日時確認, 聞きたい, 忘れた, 約確認, 予約の核, 予約の確認, 予約確認, 予約日時を確認する]
          二次健診: [4, 4番, に事件視力, よん, 右検針, 健診, 四番, 二次]
          変更: [1, 1番, いち, 一, 一番, 延期, 取り直したい, 取り直す, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 予約の変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちのいずれかでお話ください。\n\n「1.予約を変更する」、「2.予約をキャンセルする」、\n「3.予約を確認する」、「4.二次健診予約」、\n\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 変更セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: キャンセルセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 確認セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 確認セット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: 確認
              次の箱: 予約確認復唱
            - 判定: 一致
              入力: 二次健診
              次の箱: 二次健診復唱
      - 箱: セットした用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 予約キャンセル復唱
        セリフ: "予約キャンセルでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約変更復唱
        セリフ: "予約変更でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約確認復唱
        セリフ: "予約確認でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 二次健診復唱
        セリフ: "二次健診予約、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_1
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 再度、お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 変更セット
            - 判定: 一致
              入力: 2
              次の箱: キャンセルセット
            - 判定: 一致
              入力: 3
              次の箱: 確認セット
            - 判定: 一致
              入力: 4
              次の箱: 確認セット_1

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
