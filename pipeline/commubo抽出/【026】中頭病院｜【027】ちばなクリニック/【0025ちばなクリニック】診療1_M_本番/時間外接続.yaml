flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 年末年始アナウンス用分岐
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～土）
              次の箱: （平日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 11時半まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: 12/31時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 6時前
              次の箱: END_受付時間外
          デフォルト: 年末年始アナウンス
      - 箱: 1/5時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 6時前
              次の箱: 年末年始アナウンス
            - 判定: 数値
              入力: 8時半前まで
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 11時半前まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: 年末年始アナウンス用分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/29まで
              次の箱: END_受付時間外
            - 判定: 一致
              入力: 12/30
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 12/31
              次の箱: 12/31時間の分岐
            - 判定: lessEqual
              入力: 1/1～1/3
              次の箱: 年末年始アナウンス
          デフォルト: END_受付時間外
      - 箱: 年末年始アナウンス用分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/29まで
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 1/4
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 1/5
              次の箱: 1/5時間の分岐
          デフォルト: 曜日の分岐
      - 箱: 年末年始アナウンス
        セリフ: "お電話ありがとうございます。ちばな\nクリニックの、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始アナウンス_1
      - 箱: 年末年始アナウンス_1
        セリフ: 年末年始の為、12月31日から１月４日まで休診となっております。１月５日より通常通り診療を行います。ご不便をお掛け致しますが、何卒ご了承くださいますようお願い申し上げます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始アナウンス
      - 箱: ★テスト/削除する！！
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始アナウンス
        セリフ: none
        入力待ち: なし
