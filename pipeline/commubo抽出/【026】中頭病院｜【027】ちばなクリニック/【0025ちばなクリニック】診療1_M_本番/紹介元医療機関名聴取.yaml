flow:
  最初の箱: 予約目安説明

  エンティティ定義:
    カスタム:
      - 名前: わからない
        値:
          わからない: [しらない, しらね, しらん, ちゅんちゅん, なんなん, むぎゃん, わからない, わからん, わかんね, 覚えて, 分からない, 分らない]
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []

  共通:
    箱一覧:
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: わからない
              次の箱: END_わからない
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋日にちなし
              次の箱: 再度質問の有無
            - 判定: 一致
              入力: 無言9（5秒）＋日にちなし
              次の箱: 再度質問の有無
            - 判定: 数値以上
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: END_戻る
          デフォルト: 無言on
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 紹介元医療機関質問聞き取り（フリーワード）
        セリフ: "紹介状は、どちらの医療機関から受け取られましたか？医療機関名をお話下さい。\nわからない場合は、「わからない」とお話下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 再度質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_聞き取れず
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。再度、お伺いいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介元医療機関質問聞き取り（フリーワード）
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 予約目安説明
        セリフ: 当院の予約は1か月以上先の日程が目安となります。
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介元医療機関質問聞き取り（フリーワード）

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_わからない
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
