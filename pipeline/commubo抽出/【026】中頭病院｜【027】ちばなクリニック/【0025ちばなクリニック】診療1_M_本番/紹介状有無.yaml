flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定（エンティティ）
        値:
          肯定: [OK, あります, お持ちです, してまーす, そう, そうでーす, そのとおり, その通り, はーい, 異常部, 合って, 持ってます, 丈夫, 大丈夫, 配送です]
      - 名前: 否定（エンティティ）
        値:
          否定: [ありません, いいえ, いえ, いや, そうじゃない, ちがいまーす, ちがう, ない, ないです, もってません, 違います, 持ってない, 持ってません。]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 健康診断・人間ドックからの紹介状をお持ちでしょうか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_紹介状あり
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: END_紹介状なし
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_紹介状あり
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_紹介状あり
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_紹介状なし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい持っています」、や、「いいえ持っていません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取りへ

  終了:
    箱一覧:
      - 箱: END_紹介状あり
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介状なし
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
