flow:
  最初の箱: 用件判別

  エンティティ定義:
    カスタム:
      - 名前: 01_00_分岐なし診療科
        値:
          外科: [けが, てか, メーカー, レッカー, 外科, 形が, 経過, 経管, 結果, 月間, 時間, 理科, 劣化]
          眼科: [LAN, あんた, だんだ, 元金か, 文化]
          形成外科: [ケーズギガ。, 以前から、, 九千円か, 形成, 美容外科, 美容形成, 平成, 平成元が, 編成]
          耳鼻咽喉科: [BB, BBか, DB, DBか, GB, GBか, ジビイン候補か, ジビイン効果, ジビイン硬化, ちびーか, ひび, ヒビインコウガ, リビング効果, リビング効果, 咽喉科, 気味, 義務効果, 銀行が, 銀行カード, 銀行家, 君か, 耳科, 準備完, 準備銀行か, 切り, 瓶交換, 郵便か, 郵便交換, 郵便効果, 郵便効果, 郵便硬貨, 頸部でか]
          小児科: [商品, 将棋, 小児, 賞味, 正味]
          整形外科: [TK, えーが, 原因は, 紙幣が, 制限は。, 整形, 生命が, 電源は, 閉経, 名義が]
          内科: [あいか, アイカ, あいが, ないか, ないが, なにか, なんか, 何か, 内科]
          脳神経外科: [の下, 頭痛, 脳外]
          泌尿器科: [うろ, 医療機関, 金曜着, 金曜日, 事業期間, 信用機関, 泌尿, 費用, 利用期間]
          皮膚科: [いうか, いるか, 岐阜が, 水が, 昼か, 昼ば, 二日, 皮膚, 夕方]
          婦人科: [ギネ, ぎね, フジコ, 三個, 三分の印鑑, 傘下, 参加, 産科, 二年, 婦人]
      - 名前: わからない
        値:
          わからない: [おぼえてない, しらない, しらへん, しらん, なにかな, なんやろ, わからない, わからん, わかるか, 覚えてない, 知らない, 分からない]

  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（予約変更・キャンセル）
        セリフ: "現在予約されている診療科名をおっしゃってください。\nわからない場合は「わからない」とお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 二次健診
        セリフ: 紹介された診療科名をお話下さい。わからない場合は「わからない」とお話下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科セット
            - 判定: エンティティ含む
              入力: わからない
              次の箱: 用件判別_1
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問
          デフォルト: 診療科の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件判別
      - 箱: 否定→再度聞き取り
        セリフ: 再度お伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件判別
      - 箱: 分岐なし診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科読み取得
      - 箱: 分岐なし診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐なし診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 診療科読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 診療科確認へ
        セリフ: "<? $診療科の読み ?>\nでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 再質問_3
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問_1
          デフォルト: 診療科を確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療かわからない
      - 箱: 分岐なし診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科セット
      - 箱: 再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 再質問2
              次の箱: END_診療科聞き取りできず
          デフォルト: 再度聞き取りへ
      - 箱: 再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 再質問2
              次の箱: END_診療科聞き取りできず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 再質問2
              次の箱: わからないセット
          デフォルト: 再度聞き取りへ_2
      - 箱: 再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 再質問2
              次の箱: END_診療科聞き取りできず
          デフォルト: 否定→再度聞き取り
      - 箱: 診療かわからない
        セリフ: "主治医の先生の名前をおっしゃってください。\nわからない場合は「わからない」とお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋日にちなし
              次の箱: 再質問_2
            - 判定: 一致
              入力: 無言9（5秒）＋日にちなし
              次の箱: 再質問_2
            - 判定: 数値以上
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: END_戻る
          デフォルト: 無言On
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 無言On
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: わからないセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: それでは、
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療かわからない
      - 箱: 用件判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 二次健診
              次の箱: 二次健診
          デフォルト: 診療科の聞き取りへ（予約変更・キャンセル）
      - 箱: 用件判別_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 二次健診
              次の箱: END_戻る
          デフォルト: それでは、

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_診療科聞き取りできず
        セリフ: none
        入力待ち: なし
