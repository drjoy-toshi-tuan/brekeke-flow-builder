flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 腎臓内科
        値:
          じんぞうないか: [腎臓, 透析]
      - 名前: 膠原病・リウマチ科
        値:
          リウマチ科: [リウマチ]
          膠原病: [膠原病科]

  共通:
    箱一覧:
      - 箱: 通話開始チェックポイント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 挨拶（年末年始）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始終話へ
      - 箱: 挨拶（時間内）
        セリフ: お電話ありがとうございます。中頭総合ちばなクリニックの、予約専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 初めに
      - 箱: 挨拶（時間外）
        セリフ: お電話ありがとうございます。中頭総合ちばなクリニックの、予約専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 受付時間外へ
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 次へ_1
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 次へ_2
        セリフ: "ありがとうございます。\nそれでは、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 次へ_3
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: シンプル回答
        セリフ: 3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約日の聞き取り
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約日の聞き取り
            - 判定: 一致
              入力: 二次健診
              次の箱: 希望日聴取へ
      - 箱: 用件を判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約確認
              次の箱: WEB確認案内
            - 判定: 一致
              入力: 二次健診
              次の箱: 紹介状有無
          デフォルト: それでは
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間外テスト用外し
      - 箱: それでは
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科聞き取り
      - 箱: 電話切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 失敗案内
      - 箱: 完了フラグ
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: シンプル回答
      - 箱: 診療科聞き取り
        セリフ: none
        説明: サブシナリオ「診療科聞き取り」を呼び出す
        参照ファイル: 診療科聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 通話開始チェックポイント
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 本日の
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_3
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 当日検査Y/N
        セリフ: none
        説明: サブシナリオ「当日検査Y/N」を呼び出す
        参照ファイル: 当日検査Y_N.yaml
        回答振り分け:
          デフォルト: 有_1
      - 箱: 初めに
        セリフ: "本日の手術、入院予約の方は、中頭総合ちばなクリニックのナビダイヤル0570-09-1301へおかけなおしの上、ご予約のところで1番を押してください。\nまた、二次健診予約で紹介状をお持ちで無い方も、ナビダイヤル0570-09-1301へお掛け直しの上、新規のご予約へお進みください。\n初めに、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 用件NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 紹介状NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 紹介元医療機関NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 希望日NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 診療科NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 失敗案内
        セリフ: "大変申し訳ございません。うまく聞き取ることができませんでした。\n恐れ入りますが、代表電話番号へおかけなおしください。\n受付時間は日曜祝日、年末年始を除く月曜日から金曜日の8時30分から17時30分、土曜日は8時30分から12時30分です。\n分からない場合はご案内いたしますのでメモをご準備ください。\n電話番号は098-939-1301です。\n繰り返します。\n電話番号は098-939-1301です。\n繰り返します。\n電話番号は098-939-1301です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 時間外テスト用外し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間外接続
      - 箱: 受付時間外
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、日曜祝日年末年始を除く、月曜日から土曜日の8時30分から11時30分となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 受付時間外へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 受付時間外
      - 箱: 当日手術Y/N
        セリフ: none
        説明: サブシナリオ「当日手術Y/N」を呼び出す
        参照ファイル: 当日手術Y_N.yaml
        回答振り分け:
          デフォルト: 無
      - 箱: 本日の
        セリフ: 本日の予約に
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日手術Y/N
      - 箱: 本日の_1
        セリフ: 本日の予約に
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日検査Y/N
      - 箱: 有
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 有_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 現在の
        セリフ: 現在の予約に
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日手術Y/N
      - 箱: 現在の_1
        セリフ: 現在の予約に
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日検査Y/N
      - 箱: 無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日チェック
      - 箱: 無_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 当日チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 当日
              次の箱: 本日の_1
          デフォルト: 現在の_1
      - 箱: 通話完了
        セリフ: 現在の番号ではショートメールが送信できません。ご自身でHPを確認いただくか、ショートメールの送付を希望する場合は、携帯電話からおかけ直しください。ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: WEB確認案内
        セリフ: none
        説明: サブシナリオ「WEB確認案内」を呼び出す
        参照ファイル: WEB確認案内.yaml
        回答振り分け:
          デフォルト: 終話へ
      - 箱: 終話へ
        セリフ: "お電話終了後、ショートメールをお送りしますので、\n記載されたURLにアクセスいただきご確認をお願いいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話へ_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 紹介状有無
        セリフ: none
        説明: サブシナリオ「紹介状有無」を呼び出す
        参照ファイル: 紹介状有無.yaml
        回答振り分け:
          デフォルト: 紹介元医療機関名聴取
      - 箱: ナビダイヤル案内
        セリフ: 紹介状をお持ちでない場合は、中頭総合ちばなクリニック、ナビダイヤルへお掛け直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号案内
      - 箱: 番号案内
        セリフ: 番号は0570-09-1301です。繰り返します、番号は0570-09-1301です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 紹介元医療機関名聴取
        セリフ: none
        説明: サブシナリオ「紹介元医療機関名聴取」を呼び出す
        参照ファイル: 紹介元医療機関名聴取.yaml
        回答振り分け:
          デフォルト: それでは
      - 箱: 予約希望日1，2まとめて聴取
        セリフ: none
        説明: サブシナリオ「予約希望日1，2まとめて聴取」を呼び出す
        参照ファイル: 予約希望日1，2まとめて聴取.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 希望日聴取へ
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約希望日1，2まとめて聴取
      - 箱: 時間外接続
        セリフ: none
        説明: サブシナリオ「時間外接続」を呼び出す
        参照ファイル: 時間外接続.yaml
        回答振り分け:
          デフォルト: 挨拶（時間内）
      - 箱: 年末年始終話へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件を判断_1

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
