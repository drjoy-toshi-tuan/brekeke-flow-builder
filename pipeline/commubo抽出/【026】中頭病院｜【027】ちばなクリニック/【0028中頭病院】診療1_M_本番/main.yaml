flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: わからない
        値:
          わからない: [さあ, しらない, しらん, しるか, そっちでしらべろ, どうやろ, わからない, わからん, わかんない]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: お電話ありがとうございます。中頭病院の予約専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日の聞き取り
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 次へ_2
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り_1
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約キャンセルの流れ
          デフォルト: 予約キャンセルの流れ
      - 箱: 携帯電話番号チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約変更の流れ
          デフォルト: 予約変更の流れ
      - 箱: 携帯電話番号チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 新規予約の流れ
          デフォルト: 新規予約の流れ
      - 箱: 携帯電話番号チェック_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 予約確認の流れ
          デフォルト: 予約確認の流れ
      - 箱: 予約キャンセルの流れ
        セリフ: "予約キャンセルの申し込みを受付いたしました。\n内容は確定ではございません。\n3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ
        セリフ: "予約変更の申し込みを受付いたしました。\n内容は確定ではございません。\n3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 新規予約の流れ
        セリフ: "予約の申し込みを受付いたしました。\n内容は確定ではございません。\n3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約確認の流れ
        セリフ: 3診療日以内に担当者から折り返し電話、もしくは、SMSにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 電話受付の流れ
        セリフ: "内容は確定ではございません。\n3診療日以内に担当者から折り返し電話、もしくはショートメールにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件を判断
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約確認
              次の箱: WEB確認案内
          デフォルト: 患者氏名聞き取り
      - 箱: 用件を判断_1
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 次へ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 次へ
            - 判定: 一致
              入力: 予約確認
              次の箱: 連絡先電話番号聞き取り
          デフォルト: 受診される第一希望日を
      - 箱: 用件を判断_2
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 検査確認
            - 判定: 一致
              入力: 予約変更
              次の箱: 変更希望日を
      - 箱: 用件を判断_3
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 携帯電話番号チェック_1
            - 判定: 一致
              入力: 予約確認
              次の箱: 携帯電話番号チェック_3
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 携帯電話番号チェック
            - 判定: 一致
              入力: 用件で聞き取れない抜け
              次の箱: 電話受付の流れ
          デフォルト: 携帯電話番号チェック_2
      - 箱: 用件を判断_4
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 新規予約・予約変更・キャンセル・定期受診へ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 新規予約・予約変更・キャンセル・定期受診へ
            - 判定: 一致
              入力: 予約確認
              次の箱: 新規予約・予約変更・キャンセル・定期受診へ
          デフォルト: タイトル
      - 箱: 用件を判断_5
        セリフ: ありがとうございます。
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約確認
          デフォルト: 患者氏名聞き取り_1
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間外接続へ
      - 箱: 新規予約・予約変更・キャンセル・定期受診へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認
      - 箱: 時間外案内
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、日曜祝日を除く、月曜から土曜日の8時30分から11時30分となっております。\n紹介予約は月曜日から金曜日の8時30分から17時30分、および土曜日の8時30分から11時半までです。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件NG
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断_3
      - 箱: 紹介状有無聞き取り
        セリフ: none
        説明: サブシナリオ「紹介状有無聞き取り」を呼び出す
        参照ファイル: 紹介状有無聞き取り.yaml
        回答振り分け:
          デフォルト: 医療機関名聞き取り
      - 箱: 診療科聞き取り
        セリフ: none
        説明: サブシナリオ「診療科聞き取り」を呼び出す
        参照ファイル: 診療科聞き取り.yaml
        回答振り分け:
          デフォルト: 用件を判断_1
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 患者氏名聞き取り_1
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 用件を判断_4
      - 箱: 生年月日聞き取り_1
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 受診される第一希望日を
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 用件を判断_2
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 時間外接続へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間判別
      - 箱: 診察券番号確認
        セリフ: none
        説明: サブシナリオ「診察券番号確認」を呼び出す
        参照ファイル: 診察券番号確認.yaml
        回答振り分け:
          デフォルト: 診療科聞き取り
      - 箱: 受診される第一希望日を
        セリフ: 受診される第一希望日を
        入力待ち: なし
        回答振り分け:
          デフォルト: 第1受診希望日
      - 箱: 変更希望日を
        セリフ: 変更希望日を
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日
      - 箱: 受診される第2希望日を
        セリフ: 受診される第二希望日を
        入力待ち: なし
        回答振り分け:
          デフォルト: 第2受診希望日
      - 箱: 第1受診希望日
        セリフ: none
        説明: サブシナリオ「第1受診希望日」を呼び出す
        参照ファイル: 第1受診希望日.yaml
        回答振り分け:
          デフォルト: 受診される第2希望日を
      - 箱: 第2受診希望日
        セリフ: none
        説明: サブシナリオ「第2受診希望日」を呼び出す
        参照ファイル: 第1受診希望日.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 希望日
        セリフ: none
        説明: サブシナリオ「希望日」を呼び出す
        参照ファイル: 希望日.yaml
        回答振り分け:
          デフォルト: 検査確認
      - 箱: 新規案内
        セリフ: "当院の、新規予約は「乳腺外科・産婦人科・形成外科」のみ対応となっています。\nその他診療科はお受けすることができませんのでご了承ください。\nそれでは、"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_新規用診療科
      - 箱: 電話番号NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: NG終話
      - 箱: 診療科NG
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: NG終話
      - 箱: NG終話
        セリフ: "大変申し訳ございません。うまく聞き取ることができませんでした。\n恐れ入りますが、代表電話番号へおかけなおしください。\n受付時間は日曜祝日、年末年始を除く月曜日から金曜日の8時30分から17時30分、土曜日は8時30分から12時30分です。\n電話番号は\n098-939-1300\nです。繰り返します。\n電話番号は\n098-939-1300\nです。繰り返します。\n電話番号は\n098-939-1300\nです。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 紹介状無しは受け付けない
        セリフ: "紹介状をお持ちでない方のご予約は、恐れ入りますが、ちばなクリニックナビダイヤルへおかけ直しください。\n番号は0570-09-1301です。繰り返します。0570-09-1301です。\n予約日時の変更や、予約のキャンセルに関しては、\n月曜日から土曜日の8時30分から11時30分の間におかけ直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 紹介状無しは受け付けない_1
        セリフ: "紹介状をお持ちでない方のご予約は、恐れ入りますが、ちばなクリニックナビダイヤルへおかけ直しください。\n番号は0570-09-1301です。繰り返します。0570-09-1301です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 紹介予約のみ
        セリフ: "健康診断・人間ドック、または「乳児健診」の紹介状をお持ちの方は、\nちばなクリニックのナビダイヤル（0570-09-1301）へお掛け直しください。\n申し訳ございませんが、ただいまの時間は紹介予約のみ受付けております。\nその他の予約に関する問合せは、月曜日から土曜日の8時30分から11時30分の間におかけ直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初めに
      - 箱: WEB確認案内
        セリフ: none
        説明: サブシナリオ「WEB確認案内」を呼び出す
        参照ファイル: WEB確認案内.yaml
        回答振り分け:
          デフォルト: 終話へ
      - 箱: 通話完了
        セリフ: 現在の番号ではショートメールが送信できません。ご自身でHPを確認いただくか、ショートメールの送付を希望する場合は、携帯電話からおかけ直しください。ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話へ
        セリフ: "お電話終了後、ショートメールをお送りしますので、\n記載されたURLにアクセスいただきご確認をお願いいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 検査確認
        セリフ: "胃カメラ、大腸カメラ、CT、MRI\nの予約検査はありますか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 返答確認
      - 箱: 返答確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 連絡先電話番号聞き取り
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 検査有り
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 検査有り
            - 判定: エンティティ含む
              入力: わからない
              次の箱: 検査有り
          デフォルト: カウント
      - 箱: 検査有り
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: カウント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問カウント
          デフォルト: 返答確認
      - 箱: 再度お伺いいたします。
        セリフ: うまく聞き取りができませんでした。再度お伺いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 検査確認
      - 箱: 再質問カウント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2
              次の箱: 検査有り
          デフォルト: 再度お伺いいたします。
      - 箱: 用件を診察予約に
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 医療機関名聞き取り_1
      - 箱: タイトル
