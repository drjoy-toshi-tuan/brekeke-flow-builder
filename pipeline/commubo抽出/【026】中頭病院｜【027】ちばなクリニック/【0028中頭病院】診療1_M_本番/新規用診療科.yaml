flow:
  最初の箱: 診療科の聞き取りへ（新規予約）

  エンティティ定義:
    カスタム:
      - 名前: 00_00_01_呼吸器
        値:
          呼吸器外科: [お休憩か, てか, 外科, 形が, 経過, 結果, 呼外, 補給聞けば]
          呼吸器内科: [ないか, 何か, 呼内, 内科]
      - 名前: 00_00_02_消化器
        値:
          消化器外科: [てか, 外科, 形が, 経過, 結果, 消外]
          消化器内科: [ないか, 何か, 消内, 内科]
      - 名前: 00_00_03_脳神経
        値:
          脳神経外科: [てか, 外科, 形が, 経過, 結果, 脳外]
          脳神経内科: [ないか, 何か, 内科, 脳内]
      - 名前: 00_00_04_婦人科
        値:
          遺伝外来: [以前外来, 遺伝, 外来]
          一般婦人科: [ギネ, ぎね, フジコ, 一般, 銀行, 個人パ, 主人こう, 二年, 婦人, 富士銀行]
      - 名前: 00_00_分岐あり診療科
        値:
          呼吸器: [コピー機, 吸気, 五九, 補給機]
          消化器: [小額, 消火器, 表が]
          脳神経: [よう神経]
          婦人科: [ギネ, ぎね, フジコ, 銀行, 二年, 婦人, 富士銀行]
      - 名前: 01_00_分岐なし診療科
        値:
          形成外科: [ケーズギガ。, 以前から、, 九千円か, 形成, 美容外科, 美容形成, 平成, 平成元が, 編成]
          産婦人科: [ギネ, ぎね, フジコ, 三個, 三分の印鑑, 傘下, 参加, 産科, 二年, 婦人]
          乳腺外科: [二千, 乳腺, 入船, 優先, 有線, 有線外科]

  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（新規予約）
        セリフ: 受診を希望される診療科をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問
          デフォルト: 診療科の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取りへ（新規予約）
      - 箱: 分岐なし診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科読み取得
      - 箱: 分岐なし診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐なし診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 診療科読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 診療科確認へ
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再質問_1
          デフォルト: 診療科を確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取りへ（新規予約）
      - 箱: 分岐なし診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科セット
      - 箱: 再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 再質問3
              次の箱: END_診療科聞き取りできず
          デフォルト: 再度聞き取りへ
      - 箱: 再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 再質問3
              次の箱: END_診療科聞き取りできず
          デフォルト: 再度聞き取りへ_1

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_診療科聞き取りできず
        セリフ: none
        入力待ち: なし
