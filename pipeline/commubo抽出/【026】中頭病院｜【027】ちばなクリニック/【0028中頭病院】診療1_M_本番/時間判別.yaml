flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付分岐_1
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～土）
              次の箱: （平日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 11時半まで
              次の箱: END_受付時間内
            - 判定: lessEqual
              入力: "11:30-17:30"
              次の箱: 土曜は対象外
          デフォルト: END_受付時間外
      - 箱: 土曜は対象外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 土曜は対象外
              次の箱: END_受付時間外
          デフォルト: END_紹介のみ
      - 箱: テスト用ノード
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/29まで
              次の箱: END_受付時間外
            - 判定: 一致
              入力: 12/30
              次の箱: （平日）時間の分岐
            - 判定: lessEqual
              入力: 12/31～1/3
              次の箱: END_受付時間外
          デフォルト: END_受付時間外
      - 箱: 日付分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 12/29まで
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 1/4
              次の箱: END_受付時間外
          デフォルト: 曜日の分岐

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介のみ
        セリフ: none
        入力待ち: なし
      - 箱: END_
        セリフ: none
        入力待ち: なし
