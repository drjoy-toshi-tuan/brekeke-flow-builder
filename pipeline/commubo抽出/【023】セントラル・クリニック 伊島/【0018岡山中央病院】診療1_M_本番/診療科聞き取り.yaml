flow:
  最初の箱: 診療科の聞き取りへ（予約変更・キャンセル）

  エンティティ定義:
    カスタム:
      - 名前: 診療科
        値:
          眼科: [あんか, あんた, がんか, だんか, だんだ, なんか, 眼科, 元金か, 視力検査]
          形成外科: [形成, 美容外科, 美容形成, 平成, 平成元が, 編成]
          思春期カウンセリング: [カウンセリング, 思春期, 春期, 春季]
          消化器内科: [小額内科, 尚書き, 庄内, 消化器, 消火器, 消内, 腸書き, 表記なんか]
          心療内科: [しんない, 深慮, 両内科]
          内科: [ないか, なにか, なんか, 内科]
          乳腺外科: [えーこー, えこ, えご, エゴ, エコー, えこー, えこーうん, え五, グラＰ, ちょっと, マンモグラP, まんもぐらP, マンモグラフィー, もぐらP, 何のグラフいい, 何もグラフィック, 二千, 乳がん検診, 乳癌検診, 乳腺, 乳腺, 入船, 番号グラフいい, 変更, 優先, 有線, 有線外科]
          婦人科: [ギネ, フジコ, ふじん, 三分の印鑑, 傘下, 参加, 産科, 産婦人科, 子宮がん検診, 二年, 婦人科, 富士銀行]
      - 名前: 先生名
        値:
          いが先生: [いが, イガ, えが, エガ]
          いまだ先生: [いまだ, イマダ]
          えぐち先生: [いぐち, イグチ, えぐち, エグチ]
          おうたに先生: [おうたに, オウタニ, おおた, オオタ, オオタニ]
          かねしげ先生: [かねしげ, カネシゲ, サネシゲ, ねしげ]
          じゅげ先生: [きげ, キゲ, きのした, キノシタ, じゅげ, ジュゲ, ユゲ, 充電, 十K, 十円, 十限, 中継]

  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（予約変更・キャンセル）
        セリフ: ご希望の診療科名をお答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 診療科ヒアリング済み
              次の箱: 分岐なし診療科セット
            - 判定: エンティティ含む
              入力: 先生ヒアリング
              次の箱: 先生名セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 聞き直し_1
          デフォルト: 診療科の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取りへ（予約変更・キャンセル）
      - 箱: 分岐なし診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科読み取得
      - 箱: 先生名セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 先生読み取得
      - 箱: 分岐なし診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐なし診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 先生読み取得
        セリフ: none
        説明: サブシナリオ「先生読み取得」を呼び出す
        回答振り分け:
          デフォルト: 先生読み取得_1
      - 箱: 診療科読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 先生読み取得_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 診療科確認へ
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科再設定へ
            - 判定: エンティティ含む
              入力: 先生名
              次の箱: 先生名再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 先生名だったか？
          デフォルト: count上記以外_1
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 聞き直し
          デフォルト: 診療科を確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、そうです」もしくは「いいえ、ちがいます」でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取りへ（予約変更・キャンセル）
      - 箱: 分岐なし診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科セット
      - 箱: 先生名再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 先生名セット
      - 箱: 聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 聞き直し２回
              次の箱: 分からないセット
          デフォルト: 再度聞き取りへ_1
      - 箱: 聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 聞き直し２回
              次の箱: 分からないセット
          デフォルト: 再度聞き取りへ
      - 箱: 分からないセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 先生名だったか？
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 先生名
              次の箱: END_戻る
          デフォルト: 先生名ヒアリング
      - 箱: 先生名ヒアリング
        セリフ: none
        説明: サブシナリオ「先生名ヒアリング」を呼び出す
        回答振り分け:
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
