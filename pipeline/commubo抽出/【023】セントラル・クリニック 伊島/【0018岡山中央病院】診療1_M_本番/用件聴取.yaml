flow:
  最初の箱: 初めに

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 代表案内案件
        値:
          代表案内: [ドック, 健康診断, 健診, 検診, 人間ドック]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 用件
        値:
          その他ご相談: [そのた, そのほか, その他, 確認, 教えてほしい, 相談, 知りたい, 聞きたい, 問い合わせ]
          診察の予約について: [1, いち, いんさつ, インサツ, しょしん, はじめて, やめる, 位置, 一, 印刷, 印刷の予約, 印刷予約, 延期, 再診, 最新, 撮りたい, 三新薬, 取り消し, 取り消す, 取り直したい, 取り直す, 取消, 初めて, 初診, 診察の予約, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 薬のキャンセル, 薬の変更, 薬をキャンセル, 薬をしたい, 薬をする, 薬を取る, 薬を変更, 予約お願い, 予約お願い, 予約キャンセル, 予約する, 予約のキャンセル, 予約の変更, 予約をキャンセル, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を取り, 予約を取る, 予約を変更, 予約変更, 録りたい, 録る]
          人間ドックについて: [ドック, ロック, 健康診断, 健診, 検針, 検針, 人間ドック, 変更診断]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の3つのうちのいずれかでお話ください。\n\n「診察の予約について」、\n\n「人間ドックについて」、\n\n「その他ご相談」、\n、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ_1
          デフォルト: 用件を確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察の予約について
              次の箱: 診察の予約について復唱
            - 判定: 一致
              入力: 人間ドックについて
              次の箱: 人間ドックについて復唱
            - 判定: 一致
              入力: その他ご相談
              次の箱: 予約変更復唱
      - 箱: セットした用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 予約変更復唱
        セリフ: "その他のご相談でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 人間ドックについて復唱
        セリフ: "人間ドックについて、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 診察の予約について復唱
        セリフ: 診察の予約について、ですね。
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐_1
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_1
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 初めに
        セリフ: 初めに
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
