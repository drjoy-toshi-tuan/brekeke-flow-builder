flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: セントラルクリニック・伊島です。
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 連絡先
        セリフ: "AI電話にてご用件を承り、担当者よりお電話いたしますので、予めご了承ください。\nそれでは、最初に、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 生年月日聴収へ
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 連絡先聴収へ
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先聞き取り
      - 箱: 終話アナウンス
        セリフ: "申し込みを受付いたしました。\n担当者から電話、もしくは、ショートメッセージにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: その他ご相談
              次の箱: その他ご相談
            - 判定: 一致
              入力: 診察の予約について
              次の箱: 診療科聴取へ
            - 判定: 一致
              入力: 人間ドックについて
              次の箱: 人間ドック案内
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: テストルート
      - 箱: 用件NGCP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取れず終話
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話アナウンス
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 電話番号NGCP
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 聞き取れず終話
        セリフ: "お電話が遠いようで、回答が確認できませんでした。 \n恐れ入りますが、おかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 人間ドック案内
        セリフ: 申し訳ございませんが、人間ドックのご予約に関するお問い合わせは、健康増進センターにて承ります。電話番号を申し上げますので、そちらへお掛けなおし下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 健康センター番号案内
      - 箱: 健康センター番号案内
        セリフ: 健康増進センターの電話番号は、086-252-3222です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回ループ
      - 箱: 3回ループ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回以上
              次の箱: 終話
          デフォルト: 繰り返します。
      - 箱: 繰り返します。
        セリフ: 繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: 健康センター番号案内
      - 箱: 連絡先聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先聞き取り」を呼び出す
        参照ファイル: 連絡先聞き取り.yaml
        回答振り分け:
          デフォルト: 生年月日聴収へ
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先聴収へ
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: タイトル
      - 箱: 診療科聴取へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科聞き取り
      - 箱: 診療科聞き取り
        セリフ: none
        説明: サブシナリオ「診療科聞き取り」を呼び出す
        参照ファイル: 診療科聞き取り.yaml
        回答振り分け:
          デフォルト: 希望日聞き取り（フリー聴収）
      - 箱: 問い合わせ内容
        セリフ: none
        説明: サブシナリオ「問い合わせ内容」を呼び出す
        参照ファイル: 問い合わせ内容.yaml
        回答振り分け:
          デフォルト: 連絡事項確認
      - 箱: 連絡事項確認
        セリフ: none
        説明: サブシナリオ「連絡事項確認」を呼び出す
        参照ファイル: 連絡事項確認.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: タイトル
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号確認
      - 箱: タイトル_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聴取
      - 箱: お問い合わせ内容を
        セリフ: お問い合わせ内容を
        入力待ち: なし
        回答振り分け:
          デフォルト: 問い合わせ内容
      - 箱: その他ご相談
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: お問い合わせ内容を
      - 箱: 時間外切断
        セリフ: none
        説明: サブシナリオ「時間外切断」を呼び出す
        参照ファイル: 時間外切断.yaml
        回答振り分け:
          デフォルト: 連絡先
      - 箱: 時間外
        セリフ: ただいまの時間帯は、AI電話の対応時間外です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: タイトル_2
        セリフ: 只今電話が混み合っております。恐れ入りますが、おかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: テストルート
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間外切断
      - 箱: 診察券番号確認
        セリフ: none
        説明: サブシナリオ「診察券番号確認」を呼び出す
        参照ファイル: 診察券番号確認.yaml
        回答振り分け:
          デフォルト: タイトル_1
      - 箱: 用件聴取
        セリフ: none
        説明: サブシナリオ「用件聴取」を呼び出す
        参照ファイル: 用件聴取.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 希望日聞き取り（フリー聴収）
        セリフ: none
        説明: サブシナリオ「希望日聞き取り（フリー聴収）」を呼び出す
        参照ファイル: 希望日聞き取り（フリー聴収）.yaml
        回答振り分け:
          デフォルト: 連絡事項確認

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
