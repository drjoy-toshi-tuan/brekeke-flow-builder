flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始分岐
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 土曜
              次の箱: （土曜日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 16時45分まで
              次の箱: END_受付時間内
            - 判定: 数値
              入力: 16時45分～17時まで
              次の箱: END_テスト用停止ノード
          デフォルト: END_受付時間外
      - 箱: （土曜日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半
              次の箱: END_受付時間外
            - 判定: lessEqual
              入力: 12時まで
              次の箱: END_受付時間内
            - 判定: 数値
              入力: 12時半まで
              次の箱: END_土曜12時~12時半
          デフォルト: END_受付時間外
      - 箱: （土曜日）時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 11時半まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: 12/28だけ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 12/28
              次の箱: （土曜日）時間の分岐_1
          デフォルト: 曜日の分岐
      - 箱: 年末年始分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 1/4前
              次の箱: END_受付時間外
          デフォルト: 祝日チェック

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_土曜12時~12時半
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_テスト用停止ノード
        セリフ: none
        入力待ち: なし
