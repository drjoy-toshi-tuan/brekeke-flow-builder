flow:
  最初の箱: 名前の聴取へ

  エンティティ定義:
    カスタム:
      - 名前: わからない
        値:
          ありません: [あらしまへん, ありません, あれへん, ええように, しらない, しらん, だれでも, ない, なし, ねぇ, べつに, ましなんで, わからない, わからん]

  共通:
    箱一覧:
      - 箱: 名前の聴取へ
        セリフ: "ご希望の先生の名前をおっしゃってください。\n希望がない場合は、ありませんとお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 名前の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 人名
              次の箱: 名前セット
            - 判定: エンティティ含む
              入力: わからない
              次の箱: ありませんセット
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋氏名なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 無言9（5秒）＋氏名なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
          デフォルト: 無言on
      - 箱: 名前セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: ありませんセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り
      - 箱: 再度質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴取へ
      - 箱: 聞き取り完了
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ２2回質問済
              次の箱: 聞き取れなかった
          デフォルト: 再度質問
      - 箱: 聞き取れなかった
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
