flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 1/31以降
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 1/31以降
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 1月4日前
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 20時まで
              次の箱: END_受付時間内
          デフォルト: 時間外コメント
      - 箱: （平日）時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 12時まで
              次の箱: END_受付時間内
          デフォルト: 年末年始
      - 箱: （平日）時間の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: END_受付時間外
          デフォルト: END_Brekeke稼働開始
      - 箱: 時間外コメント
        セリフ: "福井県済生会病院、健診センター、AI電話です。\n申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は土日、祝日を除く、平日の8時から20時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1月4日
              次の箱: 年末年始
          デフォルト: 曜日の分岐
      - 箱: 1月4日前
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 12/30
              次の箱: （平日）時間の分岐_1
            - 判定: 数値
              入力: 1月4日（12/31，1/1，1/2，1/3）
              次の箱: 年末年始
          デフォルト: 時間外コメント
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （平日）時間の分岐
          デフォルト: 時間外コメント
      - 箱: 年末年始
        セリフ: "誠に勝手ながら、当センターは令和8年1月4日(日曜日)まで、年末年始の休業とさせていただきます。\n年明けは、令和8年1月5日（月曜日）8:00より、通常通り営業いたします。何卒ご理解ご協力をお願い申し上げます。\nお問い合わせにつきましては、営業開始後に改めてお電話いただくか、ホームページのお問い合わせにてご確認ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 1/31以降
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 2/2まで
              次の箱: 祝日チェック
            - 判定: 一致
              入力: 2/2当日
              次の箱: （平日）時間の分岐_2
          デフォルト: END_Brekeke稼働開始

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_Brekeke稼働開始
        セリフ: none
        入力待ち: なし
