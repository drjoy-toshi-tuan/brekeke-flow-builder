flow:
  最初の箱: 用件の分岐

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 受診日変更
        セリフ: 受診を希望されているお日にちや時期などをお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 新規
        セリフ: それでは、受診を希望される時期をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 問い合わせ
        セリフ: お問い合わせの内容をお話ください。例えば、次回の予約日時を教えて欲しい」など、内容を簡潔にお話しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 受診内容変更
        セリフ: オプション追加や変更等、変更を希望されている内容をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: キャンセル
        セリフ: 差し支えなければ、キャンセルの理由をお聞かせください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 問い合わせ_1
        セリフ: 次に、受診を希望される内容、オプションをお話ください。現時点で分からない場合はわからないとお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴き取り_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック_1
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: 用件の分岐_1
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: 用件の分岐_1
          デフォルト: count上記以外
      - 箱: 聴取内容チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア_1
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無_1
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無_1
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了_1
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了_1
          デフォルト: count上記以外_1
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 無言クリア_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り_1
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: スキップ
          デフォルト: 再質問
      - 箱: 再質問の有無_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: スキップ
          デフォルト: 再質問_1
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の分岐
      - 箱: 再質問_1
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 問い合わせ_1
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 新規
            - 判定: 一致
              入力: 変更
              次の箱: 変更項目の分岐
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル
            - 判定: 一致
              入力: 確認
              次の箱: 問い合わせ
            - 判定: 一致
              入力: 契約
              次の箱: 契約
            - 判定: 一致
              入力: 問い合わせ1
              次の箱: 契約_1
      - 箱: 変更項目の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 受診内容
              次の箱: 受診内容変更
            - 判定: 一致
              入力: 日程変更
              次の箱: 受診日変更
      - 箱: 用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 問い合わせ_1
          デフォルト: END_聞き取り完了
      - 箱: スキップ
        セリフ: 申し訳ございません。上手く聞き取りができなかったため、後ほど担当者より確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: 契約
        セリフ: ご用件をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 契約_1
        セリフ: お問い合わせ内容についてお伺いします。「健診センターに相談したいこと、確認したいこと」など、内容を簡潔にお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り完了_1
        セリフ: none
        入力待ち: なし
