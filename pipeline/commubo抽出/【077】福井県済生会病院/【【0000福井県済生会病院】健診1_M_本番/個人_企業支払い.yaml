flow:
  最初の箱: 紹介状有無の確認

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 今回の受診は健康保険組合などからの補助はございますでしょうか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 肯定
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 肯定
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい持っています」、や、「いいえ持っていません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 肯定
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 聞き取りできず
        セリフ: 申し訳ございません。うまく聞き取りができなかったため、後ほど担当者にて確認させていただきます
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 否定
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 聞き取りできず
          デフォルト: 再度聞き取りへ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
