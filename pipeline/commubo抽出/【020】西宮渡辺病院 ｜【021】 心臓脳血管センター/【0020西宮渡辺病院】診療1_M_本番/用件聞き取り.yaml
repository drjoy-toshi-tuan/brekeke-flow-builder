flow:
  最初の箱: 最初の案内

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 健康診断
        値:
          健康診断: [健康診断, 健診, 検査, 検診, 検針, 人間ドック, 人間ドッグ]
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 代表案内案件
        値:
          代表案内: [ドック, 健康診断, 健診, 検診, 人間ドック]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 用件
        値:
          キャンセル: [４, 4, やめる, よっつ, 最後, 四, 取り消し, 取り消す, 取消, 予約のキャンセル, 予約を取り消す]
          確認: [３, 3, その他確認, みっつ, 確認, 角煮, 教えて, 三, 時間を忘れた, 日時確認, 聞きたい, 忘れた, 約確認, 予約の核, 予約の確認, 予約確認, 予約日時を確認する]
          診察予約: [１, 1, しょしん, はじめ, はじめて, ひとつ, ログをする, ログを取る, 一, 印刷の, 印刷のやつをドル。, 再診, 最初, 最新, 撮りたい, 三新薬, 主役をする, 取得, 受診, 初めて, 初診, 診察, 診察の予約, 診療予約, 薬をする, 薬をとる, 予約お願い, 予約する, 予約をしたい, 予約をしたい, 予約をします, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          変更: [２, 2, ふたつ, 延期, 取り直したい, 取り直す, 二, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 予約の変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちのいずれかでお話ください。\n\n「診察の予約を取る」、\n「変更する」、\n「確認する」、\n「キャンセルする」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: 健康診断
              次の箱: END_健康診断
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ_1
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ_2
          デフォルト: 当日予約チェック
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ_3
          デフォルト: セットした用件の分岐_1
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル
      - 箱: 再度聞き取りへ_3
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル_1
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: 診察予約復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: 確認
              次の箱: 予約確認復唱
      - 箱: セットした用件の分岐_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 新規セット
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 再診セット
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: 新規セット
          デフォルト: count上記以外_3
      - 箱: セットした用件の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
              次の箱: タイトル
          デフォルト: END_戻る
      - 箱: 当日予約チェック
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_当日予約
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_当日予約
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count上記以外リセット
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: count上記以外リセット
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count上記以外リセット
          デフォルト: count上記以外_2
      - 箱: 予約キャンセル復唱
        セリフ: "ご予約のキャンセルでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約変更復唱
        セリフ: "ご予約の変更でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 診察予約復唱
        セリフ: 診察のご予約でよろしいですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約確認復唱
        セリフ: "ご予約の確認でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: セットした用件の分岐_2
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: セットした用件の分岐_2
          デフォルト: count上記以外_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 新規セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 再診セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 最初の案内
        セリフ: この通話は、サービス向上のため、録音させていただきます。初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: count上記以外リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: タイトル_1
      - 箱: タイトル
        セリフ: 本日のご受診をご希望でしょうか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日予約チェック
      - 箱: タイトル_1
        セリフ: 現在、通院中の診療科のご予約ですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐_1

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_健康診断
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_当日予約
        セリフ: none
        入力待ち: なし
