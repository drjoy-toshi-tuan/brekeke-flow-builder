  共通:
    箱一覧:
      - 箱: 診療科の聞き取りへ（予約変更・キャンセル）
        セリフ: 予約票に記載されている診療科をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取りへ（新規予約）
        セリフ: 受診を希望される診療科をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取りへ（確認）
        セリフ: 予約票に記載されている診療科をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科の聞き取り
      - 箱: 診療科の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 緊急・救急
              次の箱: 緊急救急セット
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科セット
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 診療科の聞き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 分岐なし診療科セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科読み取得
      - 箱: 緊急・救急セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 緊急・救急読み取得
      - 箱: 緊急救急セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 緊急・救急読み取得
      - 箱: 分岐なし診療科読み取得
        セリフ: none
        説明: サブシナリオ「分岐なし診療科読み取得」を呼び出す
        回答振り分け:
          デフォルト: 診療科読み取得
      - 箱: 緊急・救急読み取得
        セリフ: none
        説明: サブシナリオ「緊急・救急読み取得」を呼び出す
        回答振り分け:
          デフォルト: 緊急救急読み取得
      - 箱: 診療科読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 緊急救急読み取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 診療科確認へ
        セリフ: "<? $診療科の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科を確認
      - 箱: 診療科を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 緊急救急
              次の箱: 緊急救急再設定へ
            - 判定: エンティティ含む
              入力: 分岐なし診療科
              次の箱: 分岐なし診療科再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 緊急救急判断
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 緊急救急判断
          デフォルト: count上記以外_1
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: 診療科を確認
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科確認へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 分岐なし診療科再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 分岐なし診療科セット
      - 箱: 緊急救急再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 緊急・救急セット
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診
              次の箱: 診療科の聞き取りへ（新規予約）
            - 判定: 一致
              入力: 予約変更
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 診療科の聞き取りへ（予約変更・キャンセル）
          デフォルト: 診療科の聞き取りへ（確認）
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 聞き直し3回未満
              次の箱: 再度聞き取りへ
          デフォルト: END_診療科聞き取れず
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 聞き直し3回未満
              次の箱: 再度聞き取りへ_1
          デフォルト: END_診療科聞き取れず
      - 箱: count聞き直し設置
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 緊急救急判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 緊急
              次の箱: END_緊急救急
            - 判定: 一致
              入力: 救急
              次の箱: END_緊急救急
            - 判定: 一致
              入力: 条件4
              次の箱: END_健康診断
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_診療科聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_緊急救急
        セリフ: none
        入力待ち: なし
      - 箱: END_健康診断
        セリフ: none
        入力待ち: なし
