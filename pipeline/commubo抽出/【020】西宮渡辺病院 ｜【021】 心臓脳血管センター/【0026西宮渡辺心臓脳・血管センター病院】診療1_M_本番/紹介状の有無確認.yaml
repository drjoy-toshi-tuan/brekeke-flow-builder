flow:
  最初の箱: 紹介状確認

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あってます, そうそう, そうです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 代表案内案件
        値:
          代表案内: [ドック, 健康診断, 健診, 検診, 人間ドック]
      - 名前: 否定
        値:
          いいえ: [いえ, そうじゃないねん, そうちゃうねん, ちがう, まちがった]
      - 名前: 用件
        値:
          キャンセル: [やめる, 取り消し, 取り消す, 取消, 予約のキャンセル]
          確認: [その他確認, 確認, 角煮, 教えて, 時間を忘れた, 日時確認, 聞きたい, 忘れた, 約確認, 予約の核, 予約の確認, 予約確認, 予約日時を確認する]
          診察予約: [しょしん, はじめて, 印刷の, 印刷のやつをドル。, 再診, 最新, 撮りたい, 三新薬, 取得, 受診, 初めて, 初診, 診察, 診察の予約, 診療予約, 予約お願い, 予約する, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          変更: [延期, 取り直したい, 取り直す, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 予約の変更]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件を確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 3回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、お伺い致します。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_紹介状無し
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: END_紹介状無し
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_紹介状あり
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_紹介状あり
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_紹介状あり
          デフォルト: count上記以外
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: 紹介状確認
        セリフ: "他の医療機関からの紹介状はお持ちですか？\nはい、もってます。または、いいえ、もっていません。でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認

  終了:
    箱一覧:
      - 箱: END_紹介状あり
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介状無し
        セリフ: none
        入力待ち: なし
