flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: ドックメニュー
        値:
          簡易脳ドック: [簡易脳]
          人間ドック: [日帰り]
          脳ドック: []
      - 名前: バリウム検査
        値:
          バリウム検査: [バリウム]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 健診メニュー
        値:
          事業主: [安衛法, 事業主健診, 定期健診, 労安法, 労働安全衛生法]
          就職進学時: [雇い入れ, 進学, 入学, 入職時]
          生活習慣病: [生活習慣病予防健診, 予防健診]
          特定健診: [メタボ, 保健指導]
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 内視鏡検査
        値:
          内視鏡検査: [内視鏡]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 解らへん, 解りません, 分からない, 分からへん, 分かりません]
      - 名前: 変更しない
        値:
          変更しない: [そのまま, 変えません, 変更しません]
      - 名前: 変更する
        値:
          変更する: [変えます, 変更します]
      - 名前: 変更内容
        値:
          受診内容: [1, オプション, オプション追加, コース, メニュー, 一, 健診, 検査, 自信ないよ, 種類, 受信ないよ, 受信内容, 受診, 受診ないよ, 内容]
          日程変更: [2, 時間, 自信美, 自信無敵, 自信無理, 自振日, 自身に, 受験日, 受信に, 受信び, 受信り, 受信機, 受信日, 受信日の変更, 受診日, 終身日, 終身日, 住信, 重心ｂ, 重心離, 地震日, 二, 二番, 日にち, 日程変更, 日付, 日付, 入清日, 部品, 郵便日, 予約日]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "変更される内容を、次の2つのうちの、いずれかでお話ください。\n1.「受診内容」2.「日程変更」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更内容の確認
      - 箱: 変更内容の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 変更内容の発話
              次の箱: 変更内容のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 変更内容の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: コースを確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐
      - 箱: 変更内容のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐
      - 箱: セットした変更内容の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 受診内容
              次の箱: コースの復唱（健診内容）
            - 判定: 一致
              入力: 日程変更
              次の箱: 用件の復唱（日程変更）
      - 箱: コースの復唱（健診内容）
        セリフ: "受診内容の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースを確認
      - 箱: 用件の復唱（日程変更）
        セリフ: "受診日の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースを確認
      - 箱: コースを確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 変更内容の発話
              次の箱: コース再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ_1
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: コース再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更内容のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_変更項目聞き取れず
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ_1
          デフォルト: 再度聞き取りへ_1
      - 箱: スキップ
        セリフ: 申し訳ございません。上手く聞き取りができなかったため、後ほど担当者より確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: スキップ_1
        セリフ: 申し訳ございません。上手く聞き取りができなかったため、後ほど担当者より確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: DTMF
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: コースの復唱（健診内容）
            - 判定: 一致
              入力: 2
              次の箱: 用件の復唱（日程変更）

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_変更項目聞き取れず
        セリフ: none
        入力待ち: なし
