flow:
  最初の箱: 健診種類の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 種類
        値:
          その他: [4, がん, じん肺溶接ヒューム, その他, その他の健診, ヒューム, 四, 子宮, 子宮がん, 前半溶接ヒューム, 前半溶接ヒューム, 特殊健診, 特定健診, 乳がん, 婦人科, 有機溶剤]
          協会けんぽ: [1般健診, 2, けんぽ, 一般, 協会, 照会, 生活習慣病, 二番, 予防健診]
          人間ドック: [1, ドック, 一, 一日, 国保, 日帰り]
          定期健診: [3, 会社, 健康診断, 雇い入れ, 雇入れ, 雇用時, 三, 定期, 入職, 法定, 労働]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]

  共通:
    箱一覧:
      - 箱: 健診種類の確認へ
        セリフ: "ご希望のメニューを次の4つのうちのいずれかでお話ください。\n1.「人間ドック」\n2.「協会けんぽ」\n3.「定期健診」\n4.「その他の健診」それでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 種類の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診種類の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした種類の分岐
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした種類の分岐
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: セットした種類の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 人間ドック
              次の箱: 用件の復唱（人間ドック）
            - 判定: 一致
              入力: 協会けんぽ
              次の箱: 用件の復唱（協会けんぽ）
            - 判定: 一致
              入力: 定期健診
              次の箱: 用件の復唱（人間ドック）_1
            - 判定: 一致
              入力: その他の健診
              次の箱: 用件の復唱（その他）
      - 箱: 用件の復唱（協会けんぽ）
        セリフ: "協会けんぽ、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（人間ドック）
        セリフ: "人間ドック、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（その他）
        セリフ: "その他の健診、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（人間ドック）_1
        セリフ: "定期健診、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 種類の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 否定
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 再度聞き取りへ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診種類の確認へ
      - 箱: リセット_1
        セリフ: 再度、テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診種類の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_種類聞き取れず
      - 箱: スキップ
        セリフ: 申し訳ございません。上手く聞き取りができなかったため、後ほど担当者より確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: DTMF
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 用件の復唱（人間ドック）
            - 判定: 一致
              入力: 2
              次の箱: 用件の復唱（協会けんぽ）
            - 判定: 一致
              入力: 3
              次の箱: 用件の復唱（人間ドック）_1
            - 判定: 一致
              入力: 4
              次の箱: 用件の復唱（その他）

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_種類聞き取れず
        セリフ: none
        入力待ち: なし
