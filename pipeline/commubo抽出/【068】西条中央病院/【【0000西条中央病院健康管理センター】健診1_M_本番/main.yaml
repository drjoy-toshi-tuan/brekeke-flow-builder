flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 月日
        値:
          月日: []
      - 名前: 新規予約
        値:
          新規予約: [健診の予約, 健診予約, 取りたい, 取得, 初診, 紹介状, 予約を取りたい]
      - 名前: 診療科
        値:
          IVRセンター: []
          アレルギー科: []
          オンコロジー: []
          セカンドオピニオン: []
          フット外来: []
          リウマチ膠原病内科: []
          リハビリテーション｜その他: []
          リハビリテーション｜外傷: []
          リハビリテーション｜心臓: []
          外科: []
          外傷整形外科: []
          肝胆膵外科: []
          眼科: []
          形成外科: []
          血液内科: []
          呼吸器外科: []
          呼吸器内科: []
          産科: []
          歯科口腔外科: []
          耳鼻咽喉科: []
          腫瘍外科: []
          腫瘍内科: []
          循環器科: []
          小児科: []
          消化器内科: []
          心臓血管外科: []
          心療内科: []
          人工透析: []
          人工膝関節センター: []
          腎臓内科: []
          睡眠時無呼吸科: []
          整形外科: []
          脊椎脊髄外科: []
          総合診療科: []
          総合内科: []
          糖尿病内分泌科: []
          頭頸部外科: []
          内視鏡: []
          内分泌外科: []
          乳腺外科: []
          脳神経外科: []
          脳神経内科: []
          脳卒中診療科: []
          泌尿器科: []
          皮膚科: []
          婦人科: []
          放射線腫瘍科: []
          予防医学センター: []
      - 名前: 定期受診
        値:
          定期受診: [受診予約, 循環器, 定期]
      - 名前: 日にちのみ
        値:
          日にちのみ: []
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]
      - 名前: 予約キャンセル
        値:
          予約キャンセル: [キャンセル, やめる, 取消, 予約キャンセル]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]
      - 名前: 予約確認
        値:
          予約確認: [その他, なくした, 確認, 教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 問い合わせ, 問合せ, 予約票]
      - 名前: 予約変更
        値:
          予約変更: [時間, 日程, 日付, 別の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n西条中央病院の、健康管理センター専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付判断
      - 箱: ブレケケ移行のアナウンス
        セリフ: "お電話ありがとうございます。 西条中央病院　健康管理センターの、予約専用、AI電話です。\n4月1日より電話番号が変わりました。050-5527-2746 へおかけ直しください。\n電話番号を再度申し上げます。 050-5527-2746へおかけ直しください。\nお電話ありがとうございました。 それでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 切断待ち_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話_1
        セリフ: お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間判断
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 締めあいさつ
          デフォルト: 締めあいさつ
      - 箱: 問い合わせ
        セリフ: お問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 新規
        セリフ: 健康診断の予約の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 変更
        セリフ: 予約変更の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: キャンセル
        セリフ: 予約キャンセルの申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 締めあいさつ
        セリフ: 3営業日以内に、担当者から折り返し電話、もしくは、SMSにてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 次へ
            - 判定: 一致
              入力: 変更
              次の箱: 予約日
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約日
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 次へ_5
      - 箱: 用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 新規
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 問い合わせ
      - 箱: 用件の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 次へ_3
          デフォルト: 完了フラグ
      - 箱: 次へ
        セリフ: では、
        入力待ち: なし
        回答振り分け:
          デフォルト: 種類
      - 箱: 次へ_1
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 詳細聞き取り
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件
      - 箱: 次へ_3
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更_1
      - 箱: 次へ_4
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 詳細聞き取り
      - 箱: 次へ_5
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 詳細聞き取り
      - 箱: 氏名聞き取り
        セリフ: none
        説明: サブシナリオ「氏名聞き取り」を呼び出す
        参照ファイル: 氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 生年月日
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の分岐_1
      - 箱: 詳細聞き取り
        セリフ: none
        説明: サブシナリオ「詳細聞き取り」を呼び出す
        参照ファイル: 詳細聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 生年月日
        セリフ: none
        説明: サブシナリオ「生年月日」を呼び出す
        参照ファイル: 生年月日.yaml
        回答振り分け:
          デフォルト: 連絡先
      - 箱: 連絡先
        セリフ: none
        説明: サブシナリオ「連絡先」を呼び出す
        参照ファイル: 連絡先.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 用件
        セリフ: none
        説明: サブシナリオ「用件」を呼び出す
        参照ファイル: 用件.yaml
        回答振り分け:
          デフォルト: 用件の分岐
      - 箱: 種類
        セリフ: none
        説明: サブシナリオ「種類」を呼び出す
        参照ファイル: 種類.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 変更_1
        セリフ: none
        説明: サブシナリオ「変更」を呼び出す
        参照ファイル: 変更.yaml
        回答振り分け:
          デフォルト: 次へ_4
      - 箱: 予約日
        セリフ: none
        説明: サブシナリオ「予約日」を呼び出す
        参照ファイル: 予約日.yaml
        回答振り分け:
          デフォルト: 用件の分岐_2
      - 箱: 失敗アナウンス
        セリフ: 申し訳ございません。うまく聞き取ることができませんでした。恐れ入りますが、営業時間内に健康管理センターへおかけ直しください。詳細はホームページをご確認ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話番号
      - 箱: 電話番号
        セリフ: "電話番号は0897-47-3625。\n繰り返します。番号は、0897-47-3625。\n繰り返します。番号は、0897-47-3625。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 2/28前
              次の箱: 接続詞
            - 判定: 一致
              入力: 2/28
              次の箱: 時間判断_1
            - 判定: 数値
              入力: 3/2前
              次の箱: 時間外アナウンス
            - 判定: 一致
              入力: 3/2
              次の箱: 時間判断_2
          デフォルト: 接続詞
      - 箱: 4/1　10時半まで
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 3/31まで
              次の箱: 挨拶
            - 判定: 一致
              入力: 4/1 10時半の前
              次の箱: 挨拶
            - 判定: 数値
              入力: 4/1 10時半の前
              次の箱: 挨拶
          デフォルト: ブレケケ移行のアナウンス
      - 箱: 時間判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 4/1　10時半まで
      - 箱: 時間判断（テスト用）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 4/1　10時半まで
      - 箱: 接続詞
        セリフ: 初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 氏名聞き取り
      - 箱: 時間判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12時前
              次の箱: 接続詞
          デフォルト: 時間外アナウンス
      - 箱: 時間判断_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 10時前
              次の箱: 時間外アナウンス
          デフォルト: 接続詞
      - 箱: 時間外アナウンス
        セリフ: 令和8年度予約準備のため、AI電話による予約受付は 3月1日 まで休止しております。申し訳ございませんが、予約のお問い合わせは 3月2日 10時以降 におかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_1

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_切断_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち_1
      - 箱: END_
        セリフ: none
        説明: サブシナリオ「」を呼び出す
