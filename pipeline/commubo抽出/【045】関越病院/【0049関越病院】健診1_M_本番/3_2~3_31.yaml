flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3/2から3/31まで
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月〜金）
              次の箱: 時間の分岐
            - 判定: 一致
              入力: 土曜日
              次の箱: 時間の分岐_1
          デフォルト: END_時間外
      - 箱: 時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半～17時半
              次の箱: END_稼働中
            - 判定: 数値
              入力: 8時半～17時半
              次の箱: END_稼働中
          デフォルト: END_時間外
      - 箱: 時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半～12時
              次の箱: END_稼働中
            - 判定: 数値
              入力: 8時半～12時
              次の箱: END_稼働中
          デフォルト: END_時間外
      - 箱: 時間の分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
              次の箱: END_時間外
            - 判定: 数値
              入力: 12時
              次の箱: END_稼働中
          デフォルト: 年末年始アナウンス
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 日付判断_1
      - 箱: 日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 12/30
              次の箱: 時間の分岐_2
            - 判定: 数値
              入力: 1/4前（12/31，1/1，1/2，1/3）
              次の箱: 年末年始アナウンス
          デフォルト: END_時間外
      - 箱: 日付判断_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12/30前
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 1/4
              次の箱: 年末年始アナウンス
          デフォルト: 曜日の分岐
      - 箱: 3/2から3/31まで
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 3/2の前
              次の箱: 祝日チェック
            - 判定: lessEqual
              入力: 3/2～3/31まで
              次の箱: END_ブレケケ移行のアナウンス
          デフォルト: END_ブレケケ移行のアナウンス
      - 箱: 年末年始アナウンス
        セリフ: 12月30日 12時から1月4日までは年末年始のため、休止しております。年始は1月5日より開始いたしますので、1月5日の8時30分以降におかけくださいますようお願いいたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始

  終了:
    箱一覧:
      - 箱: END_稼働中
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
      - 箱: END_ブレケケ移行のアナウンス
        セリフ: none
        入力待ち: なし
