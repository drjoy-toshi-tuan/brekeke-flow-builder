flow:
  最初の箱: 予約コースの確認

  エンティティ定義:
    カスタム:
      - 名前: コース
        値:
          一般健診: [3, 3番, 一般, 健保, 健保組合, 健保組合の, 健保組合の検診, 健保組合の補助, 三, 三番]
          企業健診: [4, 会社, 企業, 四, 四番, 費用検針]
          人間ドック: [2, 基本ドック, 人間, 二番]
          特定健診: [1, 一, 一番, 特定]
      - 名前: 胃がん、乳がん健診
        値:
          胃がん健診: [イオン現振, 胃がん, 胃癌]
          乳がん検診: [乳がん, 乳癌]

  共通:
    箱一覧:
      - 箱: 変更コースの確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
          デフォルト: count上記以外_1
      - 箱: 変更コースの確認_1
        セリフ: "<? $course ?>\n、でよろしいですか？"
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更コースの確認
      - 箱: 再度聞き取り
        セリフ: 申し訳ございません。うまく、聞き取りができませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約コースの確認
      - 箱: 再度聞き取り_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、や、「いいえ」、のような短い単語だけでは認識が難しいため、\n「はいそうです」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更コースの確認_1
      - 箱: コースの判断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: コース
              次の箱: 変更コースセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF判別
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ５以上
              次の箱: count再質問_2
          デフォルト: コースの判断
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ５以上
              次の箱: count再質問_1
          デフォルト: 変更コースの確認
      - 箱: 予約コースの確認
        セリフ: "ご希望のメニューを次の4つのうちのいずれかでお話ください。。番号またはダイヤルプッシュでも可能です。\n\n「1番、特定健診」\n「2番、人間ドック」\n「3番、一般健診」\n「4番、企業健診」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースの判断
      - 箱: 変更コースセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更コースの確認_1
      - 箱: DTMF判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1.特定健診
              次の箱: 特定健診
            - 判定: 一致
              入力: 2：人間ドック
              次の箱: 人間ドック
            - 判定: 一致
              入力: 3：一般健診
              次の箱: 一般健診
            - 判定: 一致
              入力: 4：企業健診
              次の箱: 企業健診
      - 箱: 人間ドック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更コースの確認_1
      - 箱: 一般健診
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更コースの確認_1
      - 箱: 企業健診
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更コースの確認_1
      - 箱: 特定健診
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更コースの確認_1
      - 箱: 否定、再聴取へ
        セリフ: 失礼しました。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約コースの確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ２回以上
              次の箱: END_聞き取れず
          デフォルト: 否定、再聴取へ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ２回以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取り_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ２回以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取り

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
