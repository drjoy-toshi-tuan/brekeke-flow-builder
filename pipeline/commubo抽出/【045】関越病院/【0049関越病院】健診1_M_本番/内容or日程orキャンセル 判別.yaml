flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あってます, そうでーす, その通りです, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない, ちがいまーす, ちがう, 違いまーす, 間違えた]
      - 名前: 変更内容
        値:
          キャンセル: [3, 3番, やめる, 三, 三番, 取り消し, 取り消す, 取消, 予約キャンセル, 予約のキャンセル]
          受診内容: [1番, いちばん, オプション, オプション追加, コース, メニュー, 一番, 健診, 検査, 自信ないよ, 種類, 受信ないよ, 受信内容, 受診, 受診ないよ, 受診内容の変更, 内容, 二千ないよ, 予約内容, 予約内容。]
          日程変更: [2番, JCB, ずしんび, ゆしんび, 化身美, 時間, 時間, 自信び, 自信を持って, 自信美, 自信無敵, 自信無理, 自振日, 自身に, 受験日, 受信に, 受信び, 受信り, 受信機, 受信日, 受信日の変更, 終身日, 終身日, 住信, 重心ｂ, 重心離, 親首, 地震日, 二番, 日にち, 日程, 日程, 日付, 入清日, 部品, 郵便日, 予約日, 予約日。, 予約日の変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "変更またはキャンセル内容を、次の3つのうちの、いずれかでお話ください。\n1番「受診内容の変更」、\n2番「予約日の変更」、\n3番「予約のキャンセル」。\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 変更内容の確認
      - 箱: 変更内容の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 変更内容の発話
              次の箱: 変更内容のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF判別
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 変更内容の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: コースを確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐
      - 箱: 変更内容のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐
      - 箱: セットした変更内容の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 受診内容
              次の箱: コースの復唱（健診内容）
            - 判定: 一致
              入力: 日程変更
              次の箱: 用件の復唱（受診日）
          デフォルト: 用件の復唱（キャンセル）
      - 箱: コースの復唱（健診内容）
        セリフ: "受診内容の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースを確認
      - 箱: 用件の復唱（受診日）
        セリフ: "予約日の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースを確認
      - 箱: 用件の復唱（キャンセル）
        セリフ: "ご予約のキャンセル、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: コースを確認
      - 箱: コースを確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 変更内容の発話
              次の箱: 否定
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 2回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取れず
      - 箱: DTMF判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1：受診内容
              次の箱: セット： 受診内容
            - 判定: 一致
              入力: 2：日程変更
              次の箱: セット： 日程変更
            - 判定: 一致
              入力: 3：キャンセル
              次の箱: セット： キャンセル
      - 箱: セット： 受診内容
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐
      - 箱: セット： キャンセル
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐
      - 箱: セット： 日程変更
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした変更内容の分岐

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
