flow:
  最初の箱: 受診内容判別

  エンティティ定義:
    カスタム:
      - 名前: 決まっている
        値:
          決まっている: [いまーす, います, いる, もう, 決まっていまーす, 決まってまーす, 決まってます]
      - 名前: 決まってない
        値:
          決まってない: [いない, いませーん, いません, ない, まだ, 決まっていません, 決まってませーん, 決まってません]
      - 名前: 否定単語
        値:
          違います: [いいえ, いえ, いや, じゃない, ダメ, ダメ, ノー, 違い, 違う, 違って, 駄目]

  共通:
    箱一覧:
      - 箱: 再度聞き取りへ
        セリフ: 申し訳ございません。うまく聞き取りが出来ませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診内容判別
      - 箱: すべて聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の回数
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の回数
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_戻る
          デフォルト: count上記以外加算
      - 箱: 再質問の回数
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count上記以外加算
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 内容確認
        セリフ: ご希望の受診内容をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 日程確認
        セリフ: ご希望の日程をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: すべて聞き取り
      - 箱: 受診内容判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 受診内容
              次の箱: 内容確認
            - 判定: 一致
              入力: 日程変更
              次の箱: 日程確認

  終了:
    箱一覧:
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
