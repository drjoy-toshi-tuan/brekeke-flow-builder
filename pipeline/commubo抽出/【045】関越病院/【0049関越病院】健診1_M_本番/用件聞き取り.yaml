flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もういちど, もういっかい, もう一回, もっかい, わからない, 再度]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [OK, そう, そうでーす, そのとおり, その通り, はーいそうです, 異常部, 合って, 丈夫, 大丈夫, 通りで]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 用件
        値:
          その他: [3, お問い, さん, さんばん, サンバン, そのほか, その他, その他お問合せ, 教えて, 三, 三番]
          新規: [1, 1番, ドック, ようやく, 一番, 眼瞼すんの, 健康診断, 健診, 健診・人間ドックの予約, 健診と人間ドックの予約, 健診と人間ロック, 健診の予約, 健診の予約, 検診, 検診と人間ドック, 検針, 検針と人間ドック, 元金種, 雇い入れ, 事業主, 就職, 進学, 人間ドック, 人間独, 人工診断, 生活習慣病, 全身, 全身, 天候診断, 特定健診, 返金控寸断, 返信]
          折り返し: [4, おりかえし, コールバック, よん, よんばん, ヨンバン, 四, 四番, 折り返しのご連絡, 折り返し連絡, 折返し, 電話が来た, 連絡が欲しい]
          変更キャンセル: [2, 2番, キャンセル, 取り直したい, 取り直す, 取消, 二, 二番, 日程, 日付, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更, 変更キャンセル, 予約キャンセル, 予約のキャンセル, 予約の変更, 予約の方向, 予約の本校, 予約変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうち、いずれかでお話ください。\n\n「1番、健診の予約」\n「2番、予約の変更、キャンセル」\n「3番、その他お問い合わせ」\n「4番、当施設から着信があった方の折り返し連絡」\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: countもう一度
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: countもう一度
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ_2
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: 再度、ご案内します。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: コンテキストセット：新規
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（新規）
      - 箱: コンテキストセット：変更/キャンセル
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（変更/キャンセル）
      - 箱: コンテキストセット：その他
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（その他）
      - 箱: コンテキストセット：折り返し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱（折り返し）
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 健診予約
              次の箱: 用件の復唱（新規）
            - 判定: 一致
              入力: 変更キャンセル
              次の箱: 用件の復唱（変更/キャンセル）
            - 判定: 一致
              入力: その他
              次の箱: 用件の復唱（その他）
            - 判定: 一致
              入力: 折り返し
              次の箱: 用件の復唱（折り返し）
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規：1
              次の箱: コンテキストセット：新規
            - 判定: 一致
              入力: 変更キャンセル：2
              次の箱: コンテキストセット：変更/キャンセル
            - 判定: 一致
              入力: その他：3
              次の箱: コンテキストセット：その他
            - 判定: 一致
              入力: 折り返し：4
              次の箱: コンテキストセット：折り返し
      - 箱: 用件の復唱（新規）
        セリフ: "健診のご予約、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱
      - 箱: 用件の復唱（変更/キャンセル）
        セリフ: "ご予約の変更またはキャンセル、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱
      - 箱: 用件の復唱（その他）
        セリフ: "その他お問い合わせ、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱
      - 箱: 用件の復唱（折り返し）
        セリフ: "当施設からの着信があった方のご連絡、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の復唱
      - 箱: 用件の復唱
        セリフ: 「はい、そうです」、「いいえ、違います」、のようにお答えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_3
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 否定
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 用件再設定へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 2回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_ききとれず

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_ききとれず
        セリフ: none
        入力待ち: なし
