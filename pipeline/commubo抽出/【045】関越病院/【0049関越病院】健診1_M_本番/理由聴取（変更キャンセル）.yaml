flow:
  最初の箱: 用件の確認

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 受診内容
              次の箱: 変更理由確認
            - 判定: 一致
              入力: 日程変更
              次の箱: 変更理由確認
          デフォルト: キャンセル理由確認
      - 箱: 変更理由確認
        セリフ: ご予約変更の理由をお話下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: キャンセル理由確認
        セリフ: ご予約キャンセルの理由をお話下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_戻る
          デフォルト: 上記以外on
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: END_戻る
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
