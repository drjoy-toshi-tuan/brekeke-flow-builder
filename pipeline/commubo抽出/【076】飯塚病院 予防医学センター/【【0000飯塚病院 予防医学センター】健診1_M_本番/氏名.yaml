flow:
  最初の箱: 用件の分岐

  共通:
    箱一覧:
      - 箱: 名前の聴取へ
        セリフ: ご連絡いただいている方のお名前をフルネームでお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 名前の聴取へ_1
        セリフ: ご連絡いただいている方のお名前をフルネームでお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 名前の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 人名
              次の箱: ”でス”チェック
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（5秒）＋氏名なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 無言9（5秒）＋氏名なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
            - 判定: エンティティ含む
              入力: 無言3（約2秒）＋氏名あり
              次の箱: 聞き取り完了
          デフォルト: 無言on
      - 箱: 名前セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り
      - 箱: 再度質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の分岐
      - 箱: 聞き取り完了
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 企業
              次の箱: 名前の聴取へ_1
          デフォルト: 名前の聴取へ
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: END_聞き取れず
          デフォルト: 再度質問
      - 箱: ”でス”チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: ”でス”あり
              次の箱: 文末”ス”削除
          デフォルト: 名前セット
      - 箱: 文末”ス”削除
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 名前の聴き取り

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_氏名聞き取れず
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: 上手く聞き取りができなかったため、後ほど担当者より確認いたします。
        入力待ち: なし
