flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 月日
        値:
          月日: []
      - 名前: 新規予約
        値:
          新規予約: [健診の予約, 健診予約, 取りたい, 取得, 初診, 紹介状, 予約を取りたい]
      - 名前: 診療科
        値:
          IVRセンター: []
          アレルギー科: []
          オンコロジー: []
          セカンドオピニオン: []
          フット外来: []
          リウマチ膠原病内科: []
          リハビリテーション｜その他: []
          リハビリテーション｜外傷: []
          リハビリテーション｜心臓: []
          外科: []
          外傷整形外科: []
          肝胆膵外科: []
          眼科: []
          形成外科: []
          血液内科: []
          呼吸器外科: []
          呼吸器内科: []
          産科: []
          歯科口腔外科: []
          耳鼻咽喉科: []
          腫瘍外科: []
          腫瘍内科: []
          循環器科: []
          小児科: []
          消化器内科: []
          心臓血管外科: []
          心療内科: []
          人工透析: []
          人工膝関節センター: []
          腎臓内科: []
          睡眠時無呼吸科: []
          整形外科: []
          脊椎脊髄外科: []
          総合診療科: []
          総合内科: []
          糖尿病内分泌科: []
          頭頸部外科: []
          内視鏡: []
          内分泌外科: []
          乳腺外科: []
          脳神経外科: []
          脳神経内科: []
          脳卒中診療科: []
          泌尿器科: []
          皮膚科: []
          婦人科: []
          放射線腫瘍科: []
          予防医学センター: []
      - 名前: 定期受診
        値:
          定期受診: [受診予約, 循環器, 定期]
      - 名前: 日にちのみ
        値:
          日にちのみ: []
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]
      - 名前: 予約キャンセル
        値:
          予約キャンセル: [キャンセル, やめる, 取消, 予約キャンセル]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]
      - 名前: 予約確認
        値:
          予約確認: [その他, なくした, 確認, 教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 問い合わせ, 問合せ, 予約票]
      - 名前: 予約変更
        値:
          予約変更: [時間, 日程, 日付, 別の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n飯塚病院 予防医学センター専用の、AI電話です。\nこれより、お話いただいた内容は、当院の個人情報保護方針に基づき適切に管理致します。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 企業分岐
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 携帯電話取得あり
              次の箱: 締めあいさつ
          デフォルト: 締めあいさつ_1
      - 箱: 問い合わせ
        セリフ: お問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 新規
        セリフ: 健康診断の予約の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: 変更
        セリフ: 予約変更の申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 携帯電話番号チェック
      - 箱: キャンセル
        セリフ: 予約キャンセルの申し込みを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 締めあいさつ
        セリフ: 3営業日以内に、担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。また、お電話終了後に送信されるショートメールから内容確認と修正ができます。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 締めあいさつ_1
        セリフ: 3営業日以内に、担当者から折り返し電話にてご連絡いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 次へ
            - 判定: 一致
              入力: 変更
              次の箱: 次へ_3
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ_3
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 次へ_7
      - 箱: 用件の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規
              次の箱: 新規
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 問い合わせ
            - 判定: 一致
              入力: 聴取不可
              次の箱: 問い合わせ
      - 箱: 用件の分岐_2
