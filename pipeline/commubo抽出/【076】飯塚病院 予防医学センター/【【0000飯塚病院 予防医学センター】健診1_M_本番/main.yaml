              次の箱: 次へ_2
            - 判定: 一致
              入力: 問い合わせ
              次の箱: 次へ_2
            - 判定: 一致
              入力: 聴取不可
              次の箱: 次へ_2
      - 箱: 次へ
        セリフ: それでは、
        入力待ち: なし
