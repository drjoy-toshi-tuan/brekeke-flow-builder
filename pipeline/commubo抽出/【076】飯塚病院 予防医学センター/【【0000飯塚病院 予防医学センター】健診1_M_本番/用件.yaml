flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [一回, 一階, 再度, 聞き直したい]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 用件
        値:
          キャンセル: [3, キャンセル, やめる, 三, 取り消し, 取り消す, 取消]
          新規: [1, TC, ドック, とる, ようやく, 一, 眼瞼すんの, 健康診断, 健診, 健診・人間ドックの予約, 健診と人間ドックの予約, 健診と人間ロック, 健診の予約, 検診, 検診と人間ドック, 検針, 検針と人間ドック, 元金種, 原新, 雇い入れ, 事業主, 取る, 就職, 進学, 人間ドック, 人間独, 人工診断, 生活習慣病, 全身, 全身, 天候診断, 特定健診, 返金控寸断, 返信, 予約を取りたい, 予約を取る]
          変更: [2, に、, に。, 取り直したい, 取り直す, 二, 二番, 日程, 日付, 平行, 並行, 別の, 変えたい, 変えて, 変える, 変更, 予約の変更, 予約の方向, 予約の本校, 予約変更]
          問い合わせ: [4, アクセス, お伺いしたい, お伺いしたい, お問合せ, その他, その他を取り合わせ, なくした, 確認, 教えて, 金額, 検査結果, 四, 質問, 質問したい, 質問したい, 調べて, 聞きたい, 忘れた, 問い合わす, 料金]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちの、いずれかでお話ください。\n1．「健診の予約」2．「予約の変更」3．「予約のキャンセル」4．「その他お問い合わせ」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: countもしもし
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: 用件を確認
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: countもしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: もしもし2回目以上
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし１回目
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 健診予約
              次の箱: 用件の復唱（新規）
            - 判定: 一致
              入力: 変更
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: キャンセル
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: その他
              次の箱: 用件の復唱（問い合わせ）
      - 箱: 用件の復唱（新規）
        セリフ: "健診のご予約、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（キャンセル）
        セリフ: "ご予約のキャンセル、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（変更）
        セリフ: "ご予約の変更、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（問い合わせ）
        セリフ: "その他お問い合わせ、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: ３回聞き取れず
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_用件取得できず
      - 箱: DTMF
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 用件の復唱（新規）
            - 判定: 一致
              入力: 2
              次の箱: 用件の復唱（変更）
            - 判定: 一致
              入力: 3
              次の箱: 用件の復唱（キャンセル）
            - 判定: 一致
              入力: 4
              次の箱: 用件の復唱（問い合わせ）

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
