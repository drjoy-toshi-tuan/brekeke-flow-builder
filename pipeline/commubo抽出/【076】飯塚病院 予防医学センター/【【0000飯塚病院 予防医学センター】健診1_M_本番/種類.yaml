flow:
  最初の箱: 健診種類の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 種類
        値:
          その他: [3, その他, その他の健診, 三, 般検診, 問い合わせ]
          協会けんぽ: [2, けんぽ, 協会, 二, 二番]
          人間ドック: [1, 一, 一番, 人間]
      - 名前: 初めて
        値:
          初めて: [はじめて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]

  共通:
    箱一覧:
      - 箱: 健診種類の確認へ
        セリフ: "ご希望のメニューを次の3つのうちのいずれかでお話ください。\n1.「人間ドック」\n2.「協会けんぽの健診」\n3.「その他の健診」それでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 種類の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: ＤＴＭＦ
              次の箱: DTMF
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診種類の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした種類の分岐
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした種類の分岐
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回聞き取れず
      - 箱: セットした種類の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 人間ドック
              次の箱: 用件の復唱（人間ドック）
            - 判定: 一致
              入力: 協会けんぽ
              次の箱: 用件の復唱（市民健診）
            - 判定: 一致
              入力: その他
              次の箱: 用件の復唱（その他）
      - 箱: 用件の復唱（市民健診）
        セリフ: "協会けんぽの健診でよろしいですか?\nはい、そうです、または、いいえ、違います、のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（人間ドック）
        セリフ: "人間ドックでよろしいですか?\nはい、そうです、または、いいえ、違います、のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件の復唱（その他）
        セリフ: "その他の健診でよろしいですか?\nはい、そうです、または、いいえ、違います、のようにお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 種類の発話
              次の箱: 用件再設定へ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 否定
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 再度聞き取りへ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診種類の確認へ
      - 箱: リセット_1
        セリフ: 再度、テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 健診種類の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 3回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_種類聞き取れず
      - 箱: スキップ
        セリフ: 申し訳ございません。上手く聞き取りができなかったため、後ほど担当者より確認いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: リセット
      - 箱: DTMF
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1
              次の箱: 用件の復唱（人間ドック）
            - 判定: 一致
              入力: 2
              次の箱: 用件の復唱（市民健診）
            - 判定: 一致
              入力: 3
              次の箱: 用件の復唱（その他）

  終了:
    箱一覧:
      - 箱: END_用件の復唱（担当者への相談）
        セリフ: "担当者へのご相談、でよろしいですか?"
        入力待ち: なし
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_種類聞き取れず
        セリフ: none
        入力待ち: なし
