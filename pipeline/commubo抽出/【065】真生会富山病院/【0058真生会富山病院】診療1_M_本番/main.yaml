flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n真生会富山病院、アイセンターの、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 確認内容の聞き取りへ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由、確認内容の聞き取り
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診
              次の箱: 再診の流れ
            - 判定: 一致
              入力: 新規予約
              次の箱: 新規予約の流れ
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセルの流れ
            - 判定: 一致
              入力: 確認問合せ
              次の箱: 問い合わせの流れ
      - 箱: 次へ_1
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_2
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 次へ_3
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返し希望時間帯聞き取り
      - 箱: 予約キャンセルの流れ
        セリフ: "キャンセルの申し込みを受付いたしました。\n必要がある場合のみ担当者からご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 再診の流れ
        セリフ: "再診予約の申し込みを受付いたしました。\n日曜祝日を除く3診療日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 変更
        セリフ: "予約変更の申し込みを受付いたしました。\n日曜祝日を除く3診療日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 新規予約の流れ
        セリフ: "初診予約の申し込みを受付いたしました。\n日曜祝日を除く3診療日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 問い合わせの流れ
        セリフ: "ご予約に関するお問い合わせを受付いたしました。\n日曜祝日を除く3診療日以内に担当者から折り返し電話、もしくは、ショートメールにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: "お電話ありがとうございました。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 予約日の聞き取り
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約日の聞き取り
            - 判定: 一致
              入力: 再診
              次の箱: 診察券番号聞き取り
            - 判定: 一致
              入力: 新規予約
              次の箱: 患者氏名聞き取り
      - 箱: 用件の確認_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ_4
          デフォルト: 次へ
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 確認問合せ
              次の箱: 確認内容の聞き取りへ
            - 判定: 一致
              入力: キャンセル
              次の箱: 確認内容の聞き取りへ
            - 判定: 一致
              入力: 変更
              次の箱: 次へ_5
            - 判定: 一致
              入力: 再診
              次の箱: 次へ_5
            - 判定: 一致
              入力: 新規予約
              次の箱: 紹介状有無聞き取り
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 新エンジン移行後アナウンス(完了フラグ：7)
      - 箱: 次へ_4
        セリフ: 続けて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認_1
      - 箱: 次へ_5
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 受診内容聞き取り
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 続けて、ご連絡先のお電話番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 紹介状有無聞き取り
        セリフ: none
        説明: サブシナリオ「紹介状有無聞き取り」を呼び出す
        参照ファイル: 紹介状有無聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_5
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_3
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 理由、確認内容の聞き取り
        セリフ: none
        説明: サブシナリオ「理由、確認内容の聞き取り」を呼び出す
        参照ファイル: 理由、確認内容の聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の確認_2
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 別番号案内（用件NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 別番号案内（紹介状NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 別番号案内（受診内容NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 別番号案内（電話番号NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（２：別番号案内）
      - 箱: 別番号案内（氏名NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 別番号案内（生年月日NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 別番号案内（診察券NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 別番号案内（予約日NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 別番号案内（理由NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号取得確認
      - 箱: 2回失敗アナウンス（アイセンター案内)
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。\n恐れ入りますが、祝日を除く、月曜、水曜、金曜の、8時30分から17時、火曜、木曜、土曜の、8時30分から12時に、アイセンター直通電話へおかけなおしください。\n電話番号が分かる場合は、そのままお電話をお切りください。\n分からない場合はご案内いたしますので、メモをご準備ください。\n電話番号は、0766-52-6979、です。\n繰り返します。\n電話番号は、0766-52-6979、です。\n繰り返します。\n電話番号は、0766-52-6979、です。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 時間外アナウンス
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、祝日を除く、月曜、水曜、金曜の、8時30分から17時、火曜、木曜、土曜の、8時30分から12時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 2回失敗アナウンス（折り返し）
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。\n恐れ入りますが、当院よりお電話いたしますので、今しばらくお待ち下さい。\n\nお電話ありがとうございました。それでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 完了フラグ（8：折り返し案内）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2回失敗アナウンス（折り返し）
      - 箱: 完了フラグ（２：別番号案内）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 2回失敗アナウンス（アイセンター案内)
      - 箱: 時間外へ（完了フラグ：7）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間外アナウンス
      - 箱: 時間内へ
        セリフ: "本日の予約に関するお問い合わせは、アイセンター直通電話へおかけ直し下さい。\n"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 時間外チェック
        セリフ: none
        説明: サブシナリオ「時間外チェック」を呼び出す
        参照ファイル: 時間外チェック.yaml
        回答振り分け:
          デフォルト: 時間外へ（完了フラグ：7）
      - 箱: 8/1分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時30分まで（移行前）
              次の箱: 時間外チェック
      - 箱: 新エンジン移行後アナウンス(完了フラグ：7)
        セリフ: "8月1日より電話番号が変更になりました。\nお手数をおかけしますが、おかけ直しをお願いいたします。\n新しい番号をお伝えいたします。\n番号は、050-1724-9926です。\n繰り返します。番号は、050-1724-9926です。\n繰り返します。番号は、050-1724-9926です。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 受診内容聞き取り
        セリフ: none
        説明: サブシナリオ「受診内容聞き取り」を呼び出す
        参照ファイル: 受診内容聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_4
      - 箱: 入電番号取得確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得（非通知）
              次の箱: 完了フラグ（２：別番号案内）
          デフォルト: 完了フラグ（8：折り返し案内）
      - 箱: 折り返し希望時間帯聞き取り
        セリフ: none
        説明: サブシナリオ「折り返し希望時間帯聞き取り」を呼び出す
        参照ファイル: 折り返し希望時間帯聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 新エンジン移行前分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 7/31まで
              次の箱: 時間外チェック
            - 判定: 一致
              入力: 8/1
              次の箱: 8/1分岐

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
