flow:
  最初の箱: 紹介状有無の確認

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [あっています, あっている, あってます, あってる, いいです, そうです, それでいい, それです, はーい, はい, 正しい, 大丈夫]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, そうじゃない, そうではない, それじゃない, それではない, 違います, 違う, 間違い, 間違っています, 間違っている, 間違ってます, 間違ってる, 別の]

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 紹介状はお持ちでしょうか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介状あり
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_紹介状無し
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: END_紹介状無し
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい持っています」、や、「いいえ持っていません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 紹介状あり
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ（DTMF）
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: 紹介状あり
            - 判定: 一致
              入力: 2＝否定
              次の箱: END_紹介状無し
          デフォルト: count再質問_1

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_紹介状無し
        セリフ: かしこまりました。
        入力待ち: なし
