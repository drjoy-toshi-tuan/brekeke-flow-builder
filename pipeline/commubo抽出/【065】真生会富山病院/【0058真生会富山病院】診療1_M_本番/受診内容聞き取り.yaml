flow:
  最初の箱: 用件分岐

  エンティティ定義:
    カスタム:
      - 名前: CO対応
        値:
          ３歳半検診: []
          アトロピン: []
          オルソケラトロジー: [オルソ]
          コンタクト紛失: [コンタクト破損]
          サイプレ: []
          プリズム眼鏡: []
          マイオピン: []
          レーシック術前検査: []
          ロービジョン: []
          円錐角膜: []
          近視をおさえる目薬: []
          近視外来: []
          訓練: []
          斜視手術: []
          遮光眼鏡: []
          寝る時につけるコンタクト: [就寝, 就寝時, 寝る時]
          鼻パッド取れた: []
      - 名前: 医事課対応
        値:
          コンタクト作りたい: [コンタクト, コンタクトを]
          眼鏡作りたい: [眼鏡, 眼鏡を]
          診察予約: [外来, 診察, 診療]
          定期診察: [定期, 定期健診]
          適応検査: []
      - 名前: 看護師対応
        値:
          ＯＰＥ予約: [OPE予約, オペ, オペ予約, 手術, 手術予約]
          ボトックス: []
          日帰りから入院: []
          入院から日帰り: []
          入院日変更: [入院日]
          部屋の変更: [部屋]
          薬の問い合わせ: [薬, 薬について]
          涙の手術: [涙, 涙の]
      - 名前: 無し
        値:
          無し: [ありません, キャンセルじゃない, キャンセルではない, なし, 変更, 無い, 無いです]

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 具体的な受診内容聞き取りへ（変更）
        セリフ: 変更される内容について、診察、検査、手術など、項目をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 具体的な受診内容聞き取りへ
        セリフ: ご希望の受診内容をお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: CO対応
              次の箱: COセット
            - 判定: エンティティ含む
              入力: 看護師対応
              次の箱: 看護師セット
            - 判定: エンティティ含む
              入力: 医事課対応
              次の箱: 医事課セット
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 上記以外クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: 上記以外on
      - 箱: 上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。 再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: COセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 看護師セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 医事課セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 用件分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規予約
              次の箱: 具体的な受診内容聞き取りへ
            - 判定: 一致
              入力: 再診予約
              次の箱: 具体的な受診内容聞き取りへ
            - 判定: 一致
              入力: 変更
              次の箱: 具体的な受診内容聞き取りへ（変更）

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_具体的な受診内容聞き取りへ（キャンセル）
        セリフ: キャンセルされる受診内容をおっしゃってください。
        入力待ち: なし
