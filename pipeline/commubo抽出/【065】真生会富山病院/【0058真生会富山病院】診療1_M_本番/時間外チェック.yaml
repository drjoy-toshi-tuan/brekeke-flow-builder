flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 月
              次の箱: （月・水・金）時間の分岐
            - 判定: 一致
              入力: 火
              次の箱: （火・木・土）時間の分岐
            - 判定: 一致
              入力: 水
              次の箱: （月・水・金）時間の分岐
            - 判定: 一致
              入力: 木
              次の箱: （火・木・土）時間の分岐
            - 判定: 一致
              入力: 金
              次の箱: （月・水・金）時間の分岐
            - 判定: 一致
              入力: 土
              次の箱: （火・木・土）時間の分岐
          デフォルト: END_受付時間外
      - 箱: （月・水・金）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時30分より前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 17時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: （火・木・土）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時30分より前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 12時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
