flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 1/4前
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: 時間の分岐（平日）
            - 判定: 一致
              入力: 土
              次の箱: 時間の分岐（土曜）
          デフォルト: END_受付時間外
      - 箱: 時間の分岐（平日）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時より前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 15時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: 時間の分岐（土曜）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時より前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 11時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: 時間の分岐（平日）_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時より前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 15時まで
              次の箱: END_受付時間内
          デフォルト: 年末年始
      - 箱: 年末年始
        セリフ: 年末年始は1月4日まで休業とさせていただいております。誠に恐れ入りますが、1月5日9時以降におかけなおしください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始
      - 箱: 1/4前
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 1/4前（12/30，12/31，1/1，1/2、1/3）
              次の箱: 年末年始
          デフォルト: END_受付時間外
      - 箱: 日付判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12/29前
              次の箱: 曜日の分岐
            - 判定: 一致
              入力: 12/29当日
              次の箱: 時間の分岐（平日）_1
            - 判定: 一致
              入力: 1/4
              次の箱: 年末年始
          デフォルト: 曜日の分岐

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
