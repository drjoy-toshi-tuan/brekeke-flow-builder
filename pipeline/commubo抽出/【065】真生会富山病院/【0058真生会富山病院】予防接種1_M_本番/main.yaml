flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もう1回, もう一回, 再度]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: お電話ありがとうございます。 真生会富山病院、コロナ、インフルエンザ、予防接種専用、AI電話です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 1/26～終了アナウンス設定
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 切断待ち_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 問い合わせ内容の聞き取りへ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 問合せ内容の聞き取り
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規予約
              次の箱: 新規予約の流れ
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセルの流れ
            - 判定: 一致
              入力: 問合せ
              次の箱: 問い合わせの流れ
          デフォルト: 問い合わせの流れ
      - 箱: 次へ
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 予約キャンセルの流れ
        セリフ: キャンセルを完了いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 変更
        セリフ: "予防接種の変更を完了いたしました。\n予約内容をお伝えします。\n<? $clinical_department ?>\n、\n<? $予約希望日の読み ?>\n、\n<? $booking_frame_time ?>\nです。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 補足
      - 箱: 新規予約の流れ
        セリフ: "予防接種の予約を完了いたしました。\n予約内容をお伝えします。\n<? $clinical_department ?>\n、\n<? $予約希望日の読み ?>\n、\n<? $booking_frame_time ?>\nです。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 補足
      - 箱: 問い合わせの流れ
        セリフ: "予防接種の問い合わせを受付いたしました。\n日曜、祝日を除く3日以内に担当者から折り返し電話、またはショートメールにてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話_1
        セリフ: お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ
            - 判定: 一致
              入力: 変更
              次の箱: 再予約へ
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 問合せ
              次の箱: 接種後の体調か確認
            - 判定: 一致
              入力: 変更
              次の箱: 次へ_2
            - 判定: 一致
              入力: キャンセル
              次の箱: 次へ_2
            - 判定: 一致
              入力: 新規予約
              次の箱: 次へ_3
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 次へ_2
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日の聞き取り
      - 箱: 次へ_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予防接種の種類聞き取り
      - 箱: 入電番号を連絡先電話番号にセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        回答振り分け:
          デフォルト: 入電番号を連絡先電話番号にセット
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の確認_1
      - 箱: 問合せ内容の聞き取り
        セリフ: none
        説明: サブシナリオ「問合せ内容の聞き取り」を呼び出す
        参照ファイル: 問合せ内容の聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件を判断
      - 箱: 別番号案内（用件NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（２：健診センター案内）
      - 箱: 別番号案内（予防接種種類NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（２：健診センター案内）
      - 箱: 別番号案内（氏名NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（２：健診センター案内）
      - 箱: 別番号案内（生年月日NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（２：健診センター案内）
      - 箱: 別番号案内（希望日NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（２：健診センター案内）
      - 箱: 別番号案内（予約日時NG）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ（２：健診センター案内）
      - 箱: 3回失敗アナウンス（健診センター案内)
        セリフ: "申し訳ございません。\nうまく聞き取ることができませんでした。\n恐れ入りますが、日曜、祝日を除く、月曜から金曜の、9時から15時、土曜の、9時から11時に、健診センターへおかけなおしください。\n電話番号は、0766-52-2473です。\n繰り返します。0766-52-2473です。\n繰り返します。0766-52-2473です。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: 時間外（完了フラグ：7）
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、日曜、祝日を除く、月曜から金曜の、9時から15時、土曜の、9時から11時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 年末年始（完了フラグ：7）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 完了フラグ（２：健診センター案内）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 3回失敗アナウンス（健診センター案内)
      - 箱: 時間内へ
        セリフ: 中学生以下の方と、フルミストご希望の方は、ホームページをご確認ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 9/25分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時まで（稼働前）
              次の箱: 稼働前アナウンス(完了フラグ：7)
      - 箱: 稼働前アナウンス(完了フラグ：7)
        セリフ: "ご予約は、９月２５日から開始します。\n予約を希望される方は、平日は午前９時から、午後３時まで、土曜日は、９時から、１１時までに\n、お掛け直しください。繰り返します。\nご予約は、９月２５日から開始します。\n予約を希望される方は、平日は午前９時から、午後３時まで、土曜日は、９時から、１１時までに\n、お掛け直しください。\nお電話ありがとうございました。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: 稼働前分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9/24まで
              次の箱: 稼働前アナウンス(完了フラグ：7)
            - 判定: 一致
              入力: 9/25
              次の箱: 9/25分岐
      - 箱: 予防接種の種類聞き取り
        セリフ: none
        説明: サブシナリオ「予防接種の種類聞き取り」を呼び出す
        参照ファイル: 予防接種の種類聞き取り.yaml
        回答振り分け:
          デフォルト: ワクチン分岐
      - 箱: ワクチン分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: インフルエンザ
              次の箱: インフルエンザ接種費用
            - 判定: 一致
              入力: 新型コロナ
              次の箱: 新型コロナ接種費用
          デフォルト: 同時接種　接種費用
      - 箱: インフルエンザ接種費用
        セリフ: "射水市・富山市の接種券をお持ちの方は、接種券に記載の金額で、接種できます。\n一般料金は4,000円です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日聴取へ
      - 箱: 新型コロナ接種費用
        セリフ: "射水市・富山市の接種券をお持ちの方は、接種券に記載の金額で、接種できます。\n一般料金は15,300円です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日聴取へ
      - 箱: 同時接種　接種費用
        セリフ: "射水市・富山市の接種券をお持ちの方は、接種券に記載の金額で、接種できます。\n一般料金はインフルエンザ4,000円、コロナ15,300円です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日聴取へ
      - 箱: 予約希望日
        セリフ: none
        説明: サブシナリオ「予約希望日」を呼び出す
        参照ファイル: 予約希望日.yaml
        回答振り分け:
          デフォルト: API_CHECK_BOOKING
      - 箱: API_CHECK_BOOKING
        セリフ: none
        説明: サブシナリオ「API_CHECK_BOOKING」を呼び出す
        回答振り分け:
          デフォルト: System overload
      - 箱: Set_frame（枠確認）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: Check_frame_case（空き時間数確認）
      - 箱: Check_frame_case（空き時間数確認）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: total = 0
              次の箱: count再質問_2
            - 判定: 数値以上
              入力: 1 <= total <= 4
              次の箱: List frame time
            - 判定: lessEqual
              入力: 1 <= total <= 4
              次の箱: List frame time
            - 判定: 数値以上
              入力: "total >= 5"
              次の箱: Time wishes?
      - 箱: Check_frame_case（空き時間数確認）_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: total = 1
              次の箱: 復唱確認へ
            - 判定: 数値以上
              入力: 2 <= total <= 4
              次の箱: 希望時間聴取へ
            - 判定: lessEqual
              入力: 2 <= total <= 4
              次の箱: 希望時間聴取へ
      - 箱: List frame time
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: Set startTimeList
      - 箱: Frame time empty（空き枠無し）
        セリフ: "大変申し訳ございません。\n<? $予約希望日の読み ?>\nにご予約できる時間帯はございません。再度ご希望の予約日をお伺いいたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約希望日
      - 箱: Set startTimeList
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: Set index++
      - 箱: Set index++
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: Loop continue
              次の箱: Set startTimeList
          デフォルト: 次に
      - 箱: 希望時間聴取へ
        セリフ: "<? $start_time_list ?>\n\n、です。\n難しい場合は「いいえ」、とお答えください。\nご都合に合う時間がございましたら、希望の時間をお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望時間回答
      - 箱: 希望時間聴取へ（冒頭アナウンス）
        セリフ: 空いている時間をお伝えします。
        入力待ち: なし
        回答振り分け:
          デフォルト: Check_frame_case（空き時間数確認）_1
      - 箱: 復唱確認へ
        セリフ: "<? $start_time_list ?>\n\n、です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 復唱確認（ワクチン・予約日時）
      - 箱: 希望時間回答
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: 発話なし
              入力: 発話無し（無言）
              次の箱: count無言
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: 空き時間再度アナウンスへ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_4
            - 判定: エンティティ含む
              入力: Check frame
              次の箱: Check time wish empty
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 発話あり(上記以外クリア)
          デフォルト: count上記以外
      - 箱: 希望時間回答_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: Check frame
              次の箱: Check time wish empty_1
          デフォルト: Check time wish empty_1
      - 箱: Check time wish empty
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: OK
              次の箱: set booking_frame_time
          デフォルト: count上記以外_1
      - 箱: Check time wish empty_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: OK
              次の箱: Set_booking_frame_time
          デフォルト: 希望時間回答_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 空き枠無し終話
          デフォルト: Choose another time frame
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 空き枠無し終話
          デフォルト: 希望日から選択へ_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 空き枠無し終話
          デフォルト: Frame time empty（空き枠無し）
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
              次の箱: 代表案内（希望時間NG）
          デフォルト: 聞き取り失敗→再聴取へ
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_3
          デフォルト: 希望時間回答
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3以上
