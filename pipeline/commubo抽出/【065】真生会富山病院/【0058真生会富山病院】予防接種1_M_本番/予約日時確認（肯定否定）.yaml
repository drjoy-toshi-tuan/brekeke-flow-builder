flow:
  最初の箱: Y/N

  エンティティ定義:
    カスタム:
      - 名前: フィラー
        値:
          フィラー: [あー, あのー, いやー, うー, うーんと, うん, えーっと, えっと, おー, こう, この, そのー, ちょっと, なんか, なんか, なんていうか, ねー, ほら, ま, まあ, んー, んーっと, んっと]
      - 名前: 肯定
        値:
          肯定: [OK, あります, ある, いいです, いえす, うん, ええ, ぜひ, そうだ, そうです, そう思う, そのとおり, たしかに, はい, もちろんです, もってる, 持っています, 大丈夫です]
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []
      - 名前: 否定
        値:
          否定: [NO, ありません, いいえ, いえ, いや, ない, ません, 違います, 違う, 無い]

  共通:
    箱一覧:
      - 箱: その他質問聞き取り（フリーワード）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5
              次の箱: END_聞き取り失敗
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n「はいそうです」や、「いいえ違います」など、少し長めの言葉でお願いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: Y/N
      - 箱: Y/N
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_肯定
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_肯定
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_肯定
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_否定
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: END_否定
            - 判定: エンティティ含む
              入力: 言い淀み回避
              次の箱: 上記以外カウント
          デフォルト: 上記以外カウント
      - 箱: 上記以外カウント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5
              次の箱: count聞き直し
          デフォルト: Y/N
      - 箱: DTMF分岐判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: END_肯定
            - 判定: 一致
              入力: 2＝否定
              次の箱: END_否定
          デフォルト: count聞き直し

  終了:
    箱一覧:
      - 箱: END_聞き取り
        セリフ: none
        入力待ち: あり
      - 箱: END_再度質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3
      - 箱: END_否定
        セリフ: none
        入力待ち: なし
      - 箱: END_肯定
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
