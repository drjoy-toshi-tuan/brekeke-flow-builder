flow:
  最初の箱: 冒頭アナウンス

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もう一回]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: ワクチン種類
        値:
          インフルエンザワクチン: [いう円座, いう円座ワクチン, インフル, インフルエンザ, インフルワクチン, ザ博打ん, じゃワクチン, 員増えんじゃ, 円座ワクチン]
          新型コロナワクチン: [コロナ, コロナウイルス, こんなウイルス, 新型, 新型コロナ, 新型コロナウイルス, 新型コロナウイルスワクチン]
          同時接種: [あわせて, インフルエンザと新型コロナワクチン, どちらも, どっちも, ふたつ, ふたつとも, ふたつの, 一緒, 一緒に, 五時です, 通りです, 同時, 同時に, 二つ, 二つとも, 二つの, 二個, 両方]
      - 名前: 肯定
        値:
          肯定: [あっています, あっている, あってます, あってます, あってる, いいです, そうそう, そうです, それです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 再診予約
        値:
          再診: [はい新薬, 安心, 再診予約, 最新, 最新訳, 三信, 三新薬, 耐震]
      - 名前: 初診予約
        値:
          初診: [はじめて, 禁忌, 写真, 終身, 初めて, 初診予約, 新規, 新規の予約, 新規予約, 新品]
      - 名前: 数字の１
        値:
          １: [1, いち, イチ, いちばん, イチバン, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, にばん, ニバン, 二, 二番]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, そうじゃない, そうじゃないねん, そうちゃうねん, そうではない, それではない, ちがう, まちがった, 違いました, 違います, 間違い, 別の]

  共通:
    箱一覧:
      - 箱: 予防接種の種類を確認へ
        セリフ: "接種希望のワクチンを、次の3つのうちの、いずれかでお話ください。\n\n「インフルエンザワクチンのみ」、\n「新型コロナワクチンのみ」、\n「二つの同時接種」、\nそれではお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: ワクチン種類の確認
      - 箱: ワクチン種類の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: ワクチン種類の発話
              次の箱: ワクチン種類のセット
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: もしもし
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: ワクチン種類の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_3
          デフォルト: 肯定否定確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聴き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
          デフォルト: END_再度聞き取りへ
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聴き取り失敗
          デフォルト: ワクチン種類再設定へ
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聴き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
          デフォルト: END_再質問（DTMF)_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予防接種の種類を確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: ワクチン種類のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: インフルエンザワクチン
              次の箱: インフルエンザワクチン復唱
            - 判定: 一致
              入力: 新型コロナワクチン
              次の箱: 新型コロナワクチン復唱
            - 判定: 一致
              入力: 同時接種
              次の箱: 同時接種復唱
      - 箱: 同時接種復唱
        セリフ: "インフルエンザワクチンと新型コロナワクチンの同時接種でよろしいですか?\nはい、そうです、または、いいえ、違います、のようにお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定確認
      - 箱: 新型コロナワクチン復唱
        セリフ: "新型コロナワクチンで、よろしいですか？\nはい、そうです、または、いいえ、違います、のようにお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定確認
      - 箱: インフルエンザワクチン復唱
        セリフ: "インフルエンザワクチンで、よろしいですか？\nはい、そうです、または、いいえ、違います、のようにお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定確認
      - 箱: 肯定否定確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_5
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_5
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_2
          デフォルト: count上記以外_1
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
            - 判定: エンティティ含む
              入力: 肯定否定
            - 判定: エンティティ含む
              入力: 数字の１発話（肯定）
            - 判定: エンティティ含む
              入力: 否定
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
            - 判定: エンティティ含む
              入力: 数字の２発話（否定）
            - 判定: エンティティ含む
              入力: 初診発話
            - 判定: エンティティ含む
              入力: 再診発話
            - 判定: エンティティ含む
              入力: 用件の発話
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外_2
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聴き取り失敗
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予防接種の種類を確認へ
      - 箱: ワクチン種類再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: ワクチン種類のセット
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．肯定
            - 判定: 一致
              入力: ２．否定
          デフォルト: END_count再質問_1
      - 箱: DTMF分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．肯定
            - 判定: 一致
              入力: ２．否定
          デフォルト: END_count再質問
      - 箱: もう一度
        セリフ: "かしこまりました。\nそれでは、再度、ご案内いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予防接種の種類を確認へ
      - 箱: もしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし1回目
      - 箱: もしもし1回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予防接種の種類を確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予防接種の種類を確認へ
      - 箱: 冒頭アナウンス
        セリフ: 1度の電話で、予約できるのは、1名分のみです。
        入力待ち: なし
        回答振り分け:
          デフォルト: 予防接種の種類を確認へ

  終了:
    箱一覧:
      - 箱: END_count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
      - 箱: END_count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
      - 箱: END_再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聴き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．予約
            - 判定: 一致
              入力: ２．変更
            - 判定: 一致
              入力: ３．キャンセル
            - 判定: 一致
              入力: ４．確認、その他問い合わせ
      - 箱: END_再質問（DTMF)
        セリフ: "正しい番号が確認できませんでした。\n再度、お伺いします。"
        入力待ち: なし
      - 箱: END_再質問（DTMF)_1
        セリフ: "正しい番号が確認できませんでした。\n再度、お伺いします。"
        入力待ち: なし
