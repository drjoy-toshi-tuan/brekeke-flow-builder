flow:
  最初の箱: 初めに

  エンティティ定義:
    カスタム:
      - 名前: もう一度
        値:
          もう一度: [もう一回]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [あっています, あっている, あってます, あってます, あってる, いいです, そうそう, そうです, それです, はーい, はい, 異常部, 丈夫, 大丈夫, 配送です]
      - 名前: 再診予約
        値:
          再診: [はい新薬, 安心, 再診予約, 最新, 最新訳, 三信, 三新薬, 耐震]
      - 名前: 新規予約
        値:
          新規予約: [お薬, もう摂取の予約, 契約, 撮りたい, 取得, 初めて, 親孝行とる, 二百, 入力する, 予防接種の薬, 予防接種の予約, 予防接種薬, 予防接種予約, 予約, 予約お願い, 予約したい, 予約する, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
      - 名前: 数字の１
        値:
          １: [1, いち, イチ, いちばん, イチバン, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, にばん, ニバン, 二, 二番]
      - 名前: 接種後の体調
        値:
          接種後の体調: [接種した後, 接種後, 接種後の, 体調, 調子が悪い]
      - 名前: 否定
        値:
          否定: [ありません, いいえ, いえ, そうじゃない, そうじゃないねん, そうちゃうねん, そうではない, それではない, ちがう, まちがった, 違いました, 違います, 間違い, 別の]
      - 名前: 用件（変更／キャンセル／問合せ）
        値:
          キャンセル: [やめる, 取り消し, 取り消す, 取消]
          変更: [延期, 取り直したい, 取り直す, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 予約の変更]
          問合せ: [その他, その他問い合わせ, その他問合せ, 教えて, 時間を忘れた, 日時確認, 聞きたい, 忘れた, 問い合わせ, 問合せ, 予約の確認, 予約確認, 予約日時を確認する]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つから、お選びください。\n\n「予約する」、\n「変更する」、\n「キャンセルする」、\n「その他問い合わせ」、 \n\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 予約以外の用件発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: もしもし
            - 判定: エンティティ含む
              入力: 接種後の体調
              次の箱: END_接種後の体調→代表案内へ
          デフォルト: 新規予約のセット
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_3
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 用件を確認_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聴き取り失敗
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
          デフォルト: 再度聞き取りへ_2
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聴き取り失敗
          デフォルト: 用件再設定へ
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聴き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
          デフォルト: END_再質問（DTMF)_1
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
          デフォルト: 再質問（DTMF)
      - 箱: count再質問_6
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聴き取り失敗
          デフォルト: 新規予約再設定へ
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初再診確認
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 新規予約のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規予約
              次の箱: 新規予約復唱
            - 判定: 一致
              入力: 変更
              次の箱: 変更復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 問合せ
              次の箱: 問い合わせ復唱
      - 箱: 初再診確認
        セリフ: "当院でのご受診は初めてですか？\nはい、または、いいえ、のいずれかでお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認_1
      - 箱: 予約キャンセル復唱
        セリフ: "ご予約のキャンセルでよろしいですか?\nはい、そうです、または、いいえ、違います、のようにお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 変更復唱
        セリフ: "ご予約の変更で、よろしいですか？\nはい、そうです、または、いいえ、違います、のようにお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 新規予約復唱
        セリフ: "予防接種のご予約で、よろしいですか？\nはい、そうです、または、いいえ、違います、のようにお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 問い合わせ復唱
        セリフ: "その他問い合わせ、でよろしいですか?\nはい、そうです、または、いいえ、違います、のようにお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_7
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_7
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 予約の発話
              次の箱: count再質問_6
          デフォルト: count上記以外_1
      - 箱: 用件を確認_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_新規（初診）予約の確認
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_新規（初診）予約の確認
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_新規（初診）予約の確認
            - 判定: エンティティ含む
              入力: 数字の１発話（肯定）
              次の箱: END_新規（初診）予約の確認
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_再診予約の確認
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: END_再診予約の確認
            - 判定: エンティティ含む
              入力: 数字の２発話（否定）
              次の箱: END_再診予約の確認
            - 判定: エンティティ含む
              入力: 初診発話
              次の箱: END_新規（初診）予約の確認
            - 判定: エンティティ含む
              入力: 再診発話
              次の箱: END_再診予約の確認
            - 判定: エンティティ含む
              入力: 用件の発話
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外_2
      - 箱: count再質問_7
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聴き取り失敗
          デフォルト: 否定
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 新規予約再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 新規予約のセット
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．肯定
              次の箱: END_新規（初診）予約の確認
            - 判定: 一致
              入力: ２．否定
              次の箱: END_再診予約の確認
          デフォルト: count再質問_5
      - 箱: DTMF分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．肯定
            - 判定: 一致
              入力: ２．否定
          デフォルト: END_count再質問
      - 箱: 再質問（DTMF)
        セリフ: "正しい番号が確認できませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 初再診確認
      - 箱: もう一度
        セリフ: "かしこまりました。\nそれでは、再度、ご案内いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし2回目以上
          デフォルト: もしもし1回目
      - 箱: もしもし1回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 初めに
        セリフ: 初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし2回目以上
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ

  終了:
    箱一覧:
      - 箱: END_count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
      - 箱: END_接種後の体調→代表案内へ
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聴き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_新規（初診）予約の確認
        セリフ: 初診のご予約ですね？
        入力待ち: なし
      - 箱: END_再診予約の確認
        セリフ: 再診のご予約ですね？
        入力待ち: なし
      - 箱: END_DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．予約
            - 判定: 一致
              入力: ２．変更
            - 判定: 一致
              入力: ３．キャンセル
            - 判定: 一致
              入力: ４．確認、その他問い合わせ
      - 箱: END_再質問（DTMF)
        セリフ: "正しい番号が確認できませんでした。\n再度、お伺いします。"
        入力待ち: なし
      - 箱: END_再質問（DTMF)_1
        セリフ: "正しい番号が確認できませんでした。\n再度、お伺いします。"
        入力待ち: なし
