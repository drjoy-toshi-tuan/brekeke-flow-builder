flow:
  最初の箱: 現在の予約日の聞き取りへ

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [1, １, あっています, あっている, あってます, あってる, いいです, いち, イチ, いちばん, イチバン, そうです, それです, はい, 一, 一番, 大丈夫]
      - 名前: 年月日
        値:
          月: []
          日: []
          年: []
      - 名前: 否定
        値:
          否定: [2, ２, いいえ, いえ, そうじゃない, そうでない, そうではない, それではない, ニ, にばん, ニバン, 違います, 違う, 間違い, 間違っています, 間違っている, 間違ってます, 二, 二番, 別の]
      - 名前: 分からない
        値:
          分からない: [いつ, ない, ません, わからない, わかりません, 解らない, 覚えていない, 覚えてない, 不明, 分かりません, 聞いていない, 聞いていません, 聞いてない, 聞いてません]

  共通:
    箱一覧:
      - 箱: 現在の予約日の聞き取りへ
        セリフ: "現在の予約日をお話ください。\nわからない方は「わからない」とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 日付チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 値含む
              入力: 日の発話あり
              次の箱: 日付チェック_2
            - 判定: 値含む
              入力: 月の発話あり
              次の箱: 月の発話あり
            - 判定: 値含む
              入力: 年の発話あり
              次の箱: 日付チェック_3
          デフォルト: 日付チェック_3
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: 分からない
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋月あり＋日にち
              次の箱: 日チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: 値含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち＋月の発話
              次の箱: 月の発話あり_1
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち
              次の箱: 月チェック
            - 判定: エンティティ含む
              入力: 聴取日にちあり＋日にち
              次の箱: 月チェック
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 聴取した日にちあり＋月あり＋数字
              次の箱: 数字を日付に
            - 判定: エンティティ含む
              入力: 日付
              次の箱: 日付チェック
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
          デフォルト: 聴取内容チェック
      - 箱: リセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再度質問
      - 箱: リセット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 再度聞き取りへ
      - 箱: リセット_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付再設定へ
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 無言9（5秒）＋日にちなし
              次の箱: count再質問_2
            - 判定: 一致
              入力: 無言9（5秒）＋日にちなし
              次の箱: count再質問_2
            - 判定: 数値以上
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: 日付チェック_1
            - 判定: エンティティ含む
              入力: 無言2（約1.5秒）＋日にちあり
              次の箱: 日付チェック_1
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再度質問
        セリフ: "恐れ入りますが、\nなるべく言葉と言葉の間に間をあけずにお話いただけますか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 再質問
      - 箱: 聞き取り完了
        セリフ: "<? $予約日の読み ?>\n、でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日確認
      - 箱: 日付チェック_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 日付あり
              次の箱: 生年月日の判定
          デフォルト: count再質問_2
      - 箱: 日付チェック_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 月チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01月
              次の箱: 日チェック
          デフォルト: 月の置換
      - 箱: 日付チェック_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
            - 判定: 一致
              入力: 01月
              次の箱: 聴き取り
          デフォルト: 日付チェック_1
      - 箱: 日チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 01日
              次の箱: 聴き取り
          デフォルト: 日の置換
      - 箱: 月の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日チェック
      - 箱: 日の置換
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_1
      - 箱: 数字を日付に
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 0以下
              次の箱: 聞き取りへ戻る
            - 判定: lessEqual
              入力: 9以下
              次の箱: 0桁詰め
            - 判定: lessEqual
              入力: 31以下
              次の箱: 日の置換
          デフォルト: 聞き取りへ戻る
      - 箱: 0桁詰め
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日の置換
      - 箱: 聞き取りへ戻る
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 生年月日の判定
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1912-07-30〜1926-12-25（大正）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1926-12-25〜12-31（昭和元年）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1927〜1988（昭和）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1927〜1988（昭和）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1989-01-01〜01-07（昭和）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1989-01-07〜12-31（平成元年）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 1990〜2018（平成）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 1990〜2018（平成）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 2019-01-01〜04-30（平成）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 2019-01-01〜04-30（平成）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 聞き取り完了
            - 判定: 数値
              入力: 2019-05-01〜12-31（令和元年）
              次の箱: 聞き取り完了
            - 判定: 数値以上
              入力: 2020〜（令和）
              次の箱: 聞き取り完了
          デフォルト: count上記以外_1
      - 箱: 月の発話あり
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック_2
      - 箱: 月の発話あり_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 月チェック
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 予約日確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 生年月日の判定
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n恐れ入りますが、\nなるべく言葉と言葉の間に間をあけずにお話いただけますか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 再質問
      - 箱: 再度テスト
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 現在の予約日の聞き取りへ
      - 箱: 予約日確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count再質問_2
            - 判定: エンティティ含む
              入力: 日付
              次の箱: リセット_2
          デフォルト: count上記以外
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聞き取り完了
      - 箱: 日付再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 日付チェック
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 予約日セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 4桁取得
              次の箱: 日付比較
      - 箱: 再質問
        セリフ: 再度、現在の予約日を、日付でお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 日付比較
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 比較日より前
              次の箱: END_プラス1年後で確定
          デフォルト: END_そのまま確定
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聞き取り失敗
          デフォルト: 再度聞き取りへ_1
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聞き取り失敗
          デフォルト: リセット_1
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聞き取り失敗
          デフォルト: リセット
      - 箱: count再質問（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
          デフォルト: END_再度聞き取りへ（DTMF）
      - 箱: 分からない
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り完了

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_そのまま確定
        セリフ: none
        入力待ち: なし
      - 箱: END_プラス1年後で確定
        セリフ: none
        入力待ち: なし
      - 箱: END_DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
            - 判定: 一致
              入力: 2＝否定
      - 箱: END_再度聞き取りへ（DTMF）
        セリフ: "正しい番号を認識できませんでした。\n再度、お伺いします。"
        入力待ち: なし
