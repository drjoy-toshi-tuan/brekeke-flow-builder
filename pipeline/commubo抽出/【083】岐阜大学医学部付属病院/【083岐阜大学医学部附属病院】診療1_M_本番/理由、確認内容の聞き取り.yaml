flow:
  最初の箱: 用件の確認

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診
              次の箱: 再診理由
            - 判定: 一致
              入力: 予約確認
              次の箱: 予約確認内容
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: キャンセル理由確認
            - 判定: 一致
              入力: 変更
              次の箱: 変更理由確認
      - 箱: 予約確認内容
        セリフ: "ご確認内容についてお伺いします。\n「次回の予約日時を教えて欲しい」など、内容を簡潔にお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再診理由
        セリフ: 予約理由を、お話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: キャンセル理由確認
        セリフ: "キャンセル理由をお話ください。\n体調不良が理由の場合は、具体的な症状をお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 変更理由確認
        セリフ: "変更理由をお話ください。\n体調不良が理由の場合は、具体的な症状をお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 上記以外クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 数値以上
              入力: 上記以外3（約2秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外3（約2秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: 上記以外on
      - 箱: 上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: スキップ
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。 再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: スキップ
        セリフ: 申し訳ございません。AIが正しく聞き取ることができませんでした。次の質問に進みます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
