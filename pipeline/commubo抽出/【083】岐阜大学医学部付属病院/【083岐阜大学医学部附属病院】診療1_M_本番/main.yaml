flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n岐阜大学医学部附属病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 番号通知あり
        セリフ: "受付には診察券番号が必要ですので、お手元に無い方は、ご準備のうえ、おかけ直しください。\nまた、初診予約、並びに、今日受診希望の方は、代表電話へおかけ直しください。\nなお、当院からの折り返しのご連絡をもって確定とさせていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ_3
      - 箱: 非通知（完了フラグ8）
        セリフ: "申し訳ございません。\n電話番号が非通知設定の場合、AI電話では受付できません。\n先頭に数字の186を付けておかけなおしください。\nそれでは失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日の聞き取り
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 確認内容の聞き取りへ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由、確認内容の聞き取り
      - 箱: 次へ_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: WEB or AI電話
      - 箱: 次へ_3
        セリフ: まず初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療科聞き取り
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診予約
              次の箱: 再診予約の流れ
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更の流れ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルの流れ（その他診療科）
            - 判定: 一致
              入力: 予約確認
              次の箱: 予約確認の流れ
          デフォルト: 問合せの流れ
      - 箱: 次へ_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 次へ_5
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 次へ_6
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 予約キャンセルの流れ（その他診療科）
        セリフ: "キャンセルの申し込みを受付いたしました。\n必要がある場合のみ、担当者よりご連絡させていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 再診予約の流れ
        セリフ: "再診予約の申し込みを受付いたしました。\n確認ができ次第、ショートメール、場合によっては電話にてご連絡いたします。\nなお、医師へ確認する必要がある場合は、回答までに1週間以上要する場合がございます。\n万が一ご連絡がない場合は、代表電話におかけ直し下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約変更の流れ
        セリフ: "予約変更の申し込みを受付いたしました。\n確認ができ次第、ショートメール、場合によっては電話にてご連絡いたします。\nなお、医師へ確認する必要がある場合は、回答までに1週間以上要する場合がございます。\n万が一ご連絡がない場合は、代表電話におかけ直し下さい。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約確認の流れ
        セリフ: "予約確認の申し込みを受付いたしました。\n確認ができ次第、ショートメール、場合によっては電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 問合せの流れ
        セリフ: "予約に関するお問い合わせを受付いたしました。\n確認ができ次第、ショートメール、場合によっては電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: WEB確認の流れ
        セリフ: "WEBでの申込受付を承りました。\n確認ができ次第、ショートメール、場合によっては電話にてご連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 終話
        セリフ: お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 用件の確認_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 次へ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 次へ
            - 判定: 一致
              入力: 再診予約
              次の箱: 確認内容の聞き取りへ
          デフォルト: 確認内容の聞き取りへ
      - 箱: 診察券有無の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察券無
              次の箱: END_診察券無し
            - 判定: 一致
              入力: 診察券有
      - 箱: 用件の確認_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: キャンセル
              次の箱: 次回予約希望の有無
            - 判定: 一致
              入力: 再診
              次の箱: 次へ_9
            - 判定: 一致
              入力: 予約変更
              次の箱: 次へ_9
          デフォルト: 次へ_4
      - 箱: 用件の確認_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約変更
              次の箱: 残薬確認
            - 判定: 一致
              入力: キャンセル→次回予約希望
              次の箱: 残薬確認
          デフォルト: 次へ_4
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 時間外チェック
      - 箱: 次へ_7
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認_1
      - 箱: 次へ_8
        セリフ: 続けて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由、確認内容の聞き取り
      - 箱: 次へ_9
        セリフ: 続けて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約希望時期の聞き取り
      - 箱: 次へ_10
        セリフ: かしこまりました。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約希望時期の聞き取り
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: 最後に、ご連絡先のお電話番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 診療科聞き取り
        セリフ: none
        説明: サブシナリオ「診療科聞き取り」を呼び出す
        参照ファイル: 診療科聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_2
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_5
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_7
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_6
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: WEB入力番号聞き取り
        セリフ: none
        説明: サブシナリオ「WEB入力番号聞き取り」を呼び出す
        参照ファイル: WEB入力番号聞き取り.yaml
        回答振り分け:
          デフォルト: WEB確認の流れ
      - 箱: 診察券番号聞き取り
        セリフ: none
        説明: サブシナリオ「診察券番号聞き取り」を呼び出す
        参照ファイル: 診察券番号聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 理由、確認内容の聞き取り
        セリフ: none
        説明: サブシナリオ「理由、確認内容の聞き取り」を呼び出す
        参照ファイル: 理由、確認内容の聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の確認_2
      - 箱: 時間内へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 入電番号確認
      - 箱: 時間外へ（完了フラグ7）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 時間外アナウンス
      - 箱: 残薬確認
        セリフ: "変更希望日までのお薬は十分にありますか？\n１．はい、２．いいえ、でお話ください。\n処方されていない場合は、処方されていない、とお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定確認（残薬有無）
      - 箱: 肯定否定確認（残薬有無）
        セリフ: none
        説明: サブシナリオ「肯定否定確認（残薬有無）」を呼び出す
        参照ファイル: 肯定否定確認（残薬有無）.yaml
        回答振り分け:
          デフォルト: 聴取失敗セット
      - 箱: 本人or家族確認聞き取り失敗→終話
        セリフ: "申し訳ございません。\n患者さんご本人またはご家族以外の方がお電話いただいた場合、受付ができませんのでこのまま電話をお切りください。\nそれでは、失礼いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: 次へ_11
        セリフ: 次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号聞き取り
      - 箱: 時間外アナウンス
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、祝日を除く、月曜から金曜の、9時から15時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: 年末年始アナウンス
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、祝日、年末年始を除く、月曜から金曜の、9時から15時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話へ
      - 箱: 聴取失敗時聞き取り（フリー聴取）
        セリフ: none
        説明: サブシナリオ「聴取失敗時聞き取り（フリー聴取）」を呼び出す
        参照ファイル: 聴取失敗時聞き取り（フリー聴取）.yaml
        回答振り分け:
          デフォルト: 次へ_4
      - 箱: 予約希望時期の聞き取り
        セリフ: none
        説明: サブシナリオ「予約希望時期の聞き取り」を呼び出す
        参照ファイル: 予約希望時期の聞き取り.yaml
        回答振り分け:
          デフォルト: 用件の確認_3
      - 箱: 残薬ありセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: かしこまりました。
      - 箱: 残薬無しセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: かしこまりました。
      - 箱: 聴取失敗セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴取失敗
      - 箱: 処方無しセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: かしこまりました。
      - 箱: 次回予約希望の有無
        セリフ: "次回の予約は希望されますか？\nはい、または、いいえ、でお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 肯定否定確認（次回予約希望）
      - 箱: 肯定否定確認（次回予約希望）
        セリフ: none
        説明: サブシナリオ「肯定否定確認（次回予約希望）」を呼び出す
        参照ファイル: 肯定否定確認（次回予約希望）.yaml
        回答振り分け:
          デフォルト: 次へ_4
      - 箱: かしこまりました。
        セリフ: かしこまりました。
