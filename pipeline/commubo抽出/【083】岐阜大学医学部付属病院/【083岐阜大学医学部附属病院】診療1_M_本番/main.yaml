        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得（非通知）
              次の箱: 非通知（完了フラグ8）
            - 判定: 一致
              入力: 058-230-6123
              次の箱: 転送時アナウンス
            - 判定: 一致
              入力: 058-230-6124
              次の箱: 転送時アナウンス
            - 判定: 一致
              入力: 058-230-6000
              次の箱: 転送時アナウンス
          デフォルト: 番号通知あり
      - 箱: 転送時アナウンス
        セリフ: "6月2日から、岐阜大学医学部附属病院、予約センターの電話がAI対応に変わりました。\nアナウンスに沿ってご用件をお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 番号通知あり
      - 箱: 稼働前分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 6/1まで
              次の箱: 稼働前アナウンス
            - 判定: 一致
              入力: 6/2
              次の箱: 6/2分岐
      - 箱: 6/2分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時まで（稼働前）
