          デフォルト: 次へ_4
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        参照ファイル: 予約日の聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ_8
      - 箱: 予約センターへ転送
        セリフ: "<? $診療科の読み ?>\nについては予約センターの担当者へ転送いたします。\n少々お待ちくださいませ。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 転送(058-230-6125へ)
      - 箱: 転送(058-230-6125へ)
        セリフ: none
        説明: サブシナリオ「転送(058-230-6125へ)」を呼び出す
        回答振り分け:
          デフォルト: 転送成功→切断へ
      - 箱: 転送成功→切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: 転送失敗→切断へ
        セリフ: "申し訳ございません。\nただいま電話が混み合っておりますので、再度おかけなおしください。"
