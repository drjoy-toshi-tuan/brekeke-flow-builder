flow:
  最初の箱: 冒頭アナウンス

  共通:
    箱一覧:
      - 箱: 上記以外on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 用件フリー聴取
        セリフ: ご用件を自由にお伝えください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件あり
              次の箱: END_聞き取り完了
          デフォルト: 上記以外on
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済み
              次の箱: スキップ
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。 再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件フリー聴取
      - 箱: スキップ
        セリフ: 申し訳ございません。AIが正しく聞き取ることができませんでした。次の質問に進みます。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: 冒頭アナウンス
        セリフ: 申し訳ございません。AIが正しく聞き取ることができませんでした。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件フリー聴取

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_変更理由確認
        セリフ: ご予約変更の理由をお話ください。
        入力待ち: なし
