flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始日付分岐
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （平日）時間の分岐
          デフォルト: END_受付時間外
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 9時より前
              次の箱: END_受付時間外
            - 判定: 数値
              入力: 15時まで
              次の箱: END_受付時間内
          デフォルト: END_受付時間外
      - 箱: 年末年始日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 12/29
              次の箱: END_年末年始
            - 判定: 一致
              入力: 12/30
              次の箱: END_年末年始
            - 判定: 一致
              入力: 12/31
              次の箱: END_年末年始
            - 判定: 一致
              入力: 1/1
              次の箱: END_年末年始
            - 判定: 一致
              入力: 1/2
              次の箱: END_年末年始
            - 判定: 一致
              入力: 1/3
              次の箱: END_年末年始
            - 判定: 一致
              入力: 1/4
              次の箱: END_年末年始
          デフォルト: 祝日チェック
      - 箱: テスト
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始日付分岐

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
