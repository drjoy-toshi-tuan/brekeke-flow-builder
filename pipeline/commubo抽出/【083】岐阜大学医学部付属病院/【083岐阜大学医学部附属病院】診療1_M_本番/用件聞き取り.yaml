flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 肯定
        値:
          肯定: [1, １, あっています, あってます, いいです, そうそう, そうです, それで, はーい, はい, 異常部, 一, 一番, 丈夫, 大丈夫, 配送です]
      - 名前: 数字の１
        値:
          １: [1, いち, イチ, イチバン, いちばん, 一, 一番]
      - 名前: 数字の２
        値:
          ２: [2, ニ, にばん, ニバン, 二, 二番]
      - 名前: 代表案内案件
        値:
          代表案内: [ドック, 健康診断, 健診, 検診, 人間ドック]
      - 名前: 否定
        値:
          いいえ: [２, 2, ありません, いえ, ちがう, まちがった, 違いました, 違います, 違う, 違った, 間違い, 間違っています, 間違ってます, 二, 二番, 別の]
      - 名前: 用件
        値:
          キャンセル: [3, ３, サン, さんばん, サンバン, やめる, 三, 三番, 取り消し, 取り消す, 取消, 予約のキャンセル]
          確認: [4, ４, その他, その他確認, ヨバン, よばん, ヨン, よん, ヨンバン, ヨンバン, ヨンバン, よんばん, 確認, 角煮, 教えて, 四, 四番, 時間を忘れた, 日時確認, 聞きたい, 忘れた, 約確認, 予約の核, 予約の確認, 予約確認, 予約日時を確認する]
          再診: [1, １, いち, イチ, いちばん, イチバン, 一, 一番, 印刷の, 印刷のやつをドル。, 再診, 再診の予約, 最新, 撮りたい, 三新薬, 取得, 受診, 診察, 診察の予約, 診察予約, 診療の予約, 診療予約, 耐震, 予約お願い, 予約する, 予約をしたい, 予約をしたい, 予約をする, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい, 録る]
          変更: [2, ２, ニ, ニバン, 延期, 取り直したい, 取り直す, 二, 二番, 判子, 平行, 並行, 別の, 変えたい, 変えて, 変える, 予約の変更]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちのいずれかでお話ください。\n\n「１．再診の予約を取る」、\n「２．予約を変更する」、\n「３．予約をキャンセルする」、\n「４．予約を確認する」、\nそれでは、お話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: 用件のセット
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_5
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_1
          デフォルト: 当日予約チェック
      - 箱: count上記以外_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問_2
          デフォルト: セットした用件の分岐_1
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: count再質問_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
          デフォルト: 再度聞き取りへ_2
      - 箱: count再質問_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
          デフォルト: 再度聞き取りへ_3
      - 箱: count再質問_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再質問へ（DTMF）
      - 箱: count再質問_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再質問へ（DTMF）_1
      - 箱: count再質問_5
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 再度聞き取りへ_1
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 当日予約チェック
      - 箱: 再度聞き取りへ_3
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐_1
      - 箱: 用件のセット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐
      - 箱: セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 再診予約
              次の箱: 再診予約復唱
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: 確認
              次の箱: 予約確認復唱
      - 箱: セットした用件の分岐_1
        セリフ: 現在、通院中の診療科のご予約ですか？
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_再診セット
            - 判定: エンティティ含む
              入力: 肯定エンティティ
              次の箱: END_再診セット
            - 判定: エンティティ含む
              入力: 否定
              次の箱: END_新規セット
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_再診セット
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: END_新規セット
          デフォルト: count上記以外_3
      - 箱: 当日予約チェック
        セリフ: 本日のご予約でしょうか？
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 肯定
            - 判定: エンティティ含む
              入力: 肯定エンティティ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count初期化
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: count初期化
            - 判定: エンティティ含む
              入力: 否定エンティティ
              次の箱: count初期化
          デフォルト: count上記以外_2
      - 箱: 予約キャンセル復唱
        セリフ: "ご予約のキャンセルで、よろしいですか？\n１．はい、２．いいえ、でお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約変更復唱
        セリフ: "ご予約の変更で、よろしいですか?\n１．はい、２．いいえ、でお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 再診予約復唱
        セリフ: "再診のご予約で、よろしいですか？\n１．はい、２．いいえ、でお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約確認復唱
        セリフ: "ご予約の確認で、よろしいですか？\n１．はい、２．いいえ、でお話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 数字の１を発話
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 数字の２を発話
              次の箱: count再質問_6
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問_6
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: count再質問_6
            - 判定: エンティティ含む
              入力: 用件の発話
              次の箱: count再質問_7
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: DTMF分岐_1
          デフォルト: count上記以外_1
      - 箱: count再質問_6
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 否定
      - 箱: count再質問_7
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: 2回聞き取れず
          デフォルト: 用件再設定へ
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 用件再設定へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件のセット
      - 箱: 2回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聞き取り失敗
      - 箱: DTMF分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: １．再診予約
              次の箱: 再診予約復唱
            - 判定: 一致
              入力: ２．予約を変更
              次の箱: 予約変更復唱
            - 判定: 一致
              入力: ３．予約をキャンセル
              次の箱: 予約キャンセル復唱
            - 判定: 一致
              入力: ４．予約を確認
              次の箱: 予約確認復唱
          デフォルト: count再質問_3
      - 箱: 再質問へ（DTMF）
        セリフ: "正しい番号が確認できませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再質問へ（DTMF）_1
        セリフ: "正しい番号が確認できませんでした。\n再度、１．はい、２．いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: count初期化
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: セットした用件の分岐_1
      - 箱: DTMF分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 1＝肯定
              次の箱: END_聞き取り完了
            - 判定: 一致
              入力: 2＝否定
              次の箱: count再質問_6
          デフォルト: count再質問_4
      - 箱: テスト用リセット
        セリフ: 再度テストします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ

  終了:
    箱一覧:
      - 箱: END_セットした用件の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察予約
      - 箱: END_聞き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: none
        入力待ち: なし
      - 箱: END_新規セット
        セリフ: none
        入力待ち: なし
      - 箱: END_再診セット
        セリフ: none
        入力待ち: なし
