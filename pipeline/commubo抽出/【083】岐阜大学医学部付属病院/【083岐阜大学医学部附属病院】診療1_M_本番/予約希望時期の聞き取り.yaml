flow:
  最初の箱: 希望日時聞き取り

  エンティティ定義:
    カスタム:
      - 名前: 希望時間帯
        値:
          午後: [13時, 14時, １時, 2時, ごご, ゴゴ]
          午前: [10時, 11時, 8時, 9時, ごぜん, ゴゼン, 午前中, 昼前, 朝]
          指定なし: [いつでも, どちらでも, 何時でも, 希望なし, 空いてる, 特になし]
      - 名前: 今日
        値:
          今日: [キョウ, きょう, これから, 今から, 当日, 本日]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 希望日時聞き取り
        セリフ: 予約希望時期を「来週」、や、「3月下旬」、のようにお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 今日
              次の箱: 今日セット
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 上記以外クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 一致
              入力: 上記以外9（5秒）＋ご用件なし
              次の箱: count再質問
            - 判定: 数値
              入力: 上記以外2（約1秒）＋ご用件発話あり
              次の箱: END_聞き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋ご用件発話あり
              次の箱: END_聞き取り完了
          デフォルト: count上記以外
      - 箱: 上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2以上
              次の箱: END_聞き取り失敗
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。 再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 希望日時聞き取り
      - 箱: 今日セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_今日→代表案内へ

  終了:
    箱一覧:
      - 箱: END_聞き取り完了
        セリフ: ありがとうございます。
        入力待ち: なし
      - 箱: END_今日→代表案内へ
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り失敗
        セリフ: "申し訳ございません。\nAIが正しく聞き取ることができませんでした。次の質問に進みます。"
        入力待ち: なし
