flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。
    カスタム:
      - 名前: 月日
        値:
          月日: []
      - 名前: 新規予約
        値:
          新規予約: [取りたい, 取得, 初診, 紹介状, 診察の予約, 診療予約]
      - 名前: 診療科
        値:
          IVRセンター: []
          アレルギー科: []
          オンコロジー: []
          セカンドオピニオン: []
          フット外来: []
          リウマチ膠原病内科: []
          リハビリテーション｜その他: []
          リハビリテーション｜外傷: []
          リハビリテーション｜心臓: []
          外科: []
          外傷整形外科: []
          肝胆膵外科: []
          眼科: []
          形成外科: []
          血液内科: []
          呼吸器外科: []
          呼吸器内科: []
          産科: []
          歯科口腔外科: []
          耳鼻咽喉科: []
          腫瘍外科: []
          腫瘍内科: []
          循環器科: []
          小児科: []
          消化器内科: []
          心臓血管外科: []
          心療内科: []
          人工透析: []
          人工膝関節センター: []
          腎臓内科: []
          睡眠時無呼吸科: []
          整形外科: []
          脊椎脊髄外科: []
          総合診療科: []
          総合内科: []
          糖尿病内分泌科: []
          頭頸部外科: []
          内視鏡: []
          内分泌外科: []
          乳腺外科: []
          脳神経外科: []
          脳神経内科: []
          脳卒中診療科: []
          泌尿器科: []
          皮膚科: []
          婦人科: []
          放射線腫瘍科: []
          予防医学センター: []
      - 名前: 定期受診
        値:
          定期受診: [受診予約, 循環器, 定期]
      - 名前: 日にちのみ
        値:
          日にちのみ: []
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]
      - 名前: 予約キャンセル
        値:
          予約キャンセル: [キャンセル, やめる, 取消]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]
      - 名前: 予約確認
        値:
          予約確認: [その他, なくした, 確認, 教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 問い合わせ, 問合せ, 予約票]
      - 名前: 予約変更
        値:
          予約変更: [時間, 日程, 日付, 別の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お呼び出ししましたが、お繋ぎできませんでした。\nAI電話がご用件をお伺いし、担当者から折り返し電話連絡いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 問い合わせ内容①聞き取り
      - 箱: 終話
        セリフ: ご用件を承りました。お電話ありがとうございました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 次へ_1
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 次へ_1
        セリフ: はじめに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 施設名・部署・担当者名
      - 箱: 問い合わせ内容①聞き取り
        セリフ: none
        説明: サブシナリオ「問い合わせ内容①聞き取り」を呼び出す
        参照ファイル: 問い合わせ内容①聞き取り.yaml
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 施設名・部署・担当者名
        セリフ: none
        説明: サブシナリオ「施設名・部署・担当者名」を呼び出す
        参照ファイル: 施設名・部署・担当者名.yaml
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 連絡先電話番号聞き取り不可
        セリフ: "大変申し訳ございません、お電話番号を聞き取ることができませんでした。\n後ほど、担当者にて確認させていただきます。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 次へ

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
