flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始の分岐
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 時間外コメント
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月～金）
              次の箱: （平日）時間の分岐
            - 判定: 一致
              入力: 土曜日
              次の箱: （土曜）時間の分岐
          デフォルト: 時間外コメント
      - 箱: 年末年始の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 12/30
              次の箱: 時間の分岐
            - 判定: 一致
              入力: 12/31休み
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 1/1休み
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 1/2休み
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 1/3休み
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 1/4休み
              次の箱: 年末年始アナウンス
            - 判定: 一致
              入力: 1/5
              次の箱: （平日）時間の分岐_1
          デフォルト: 祝日チェック
      - 箱: （平日）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 19時まで
              次の箱: END_受付時間内
          デフォルト: 時間外コメント
      - 箱: （土曜）時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: 時間外コメント
            - 判定: 数値
              入力: 13時まで
              次の箱: END_受付時間内
          デフォルト: 時間外コメント
      - 箱: 時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: 時間外コメント
          デフォルト: 年末年始アナウンス
      - 箱: （平日）時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時前
              次の箱: 年末年始アナウンス
            - 判定: 数値
              入力: 19時まで
              次の箱: END_受付時間内
          デフォルト: 時間外コメント
      - 箱: 時間外コメント
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n予約専用AI電話の受付時間は、祝日を除く、月曜日から金曜日の8時から19時、土曜日の8時から13時となっております。\n恐れ入りますが、受付時間内におかけなおしください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_受付時間外
      - 箱: 年末年始アナウンス
        セリフ: 誠に勝手ながら、12月30日から1月5日まで、自動音声による電話対応を休止しております。ご不便をおかけいたしますが、何卒ご理解のほどお願いいたします。なお、急患の方は直接8番窓口へお越しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始
      - 箱: テスト
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 年末年始の分岐

  終了:
    箱一覧:
      - 箱: END_受付時間内
        セリフ: none
        入力待ち: なし
      - 箱: END_受付時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
