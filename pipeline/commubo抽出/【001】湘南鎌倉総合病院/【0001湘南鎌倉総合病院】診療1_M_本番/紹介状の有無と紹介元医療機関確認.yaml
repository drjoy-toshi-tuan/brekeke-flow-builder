flow:
  最初の箱: 紹介状有無の確認

  共通:
    箱一覧:
      - 箱: 紹介状有無の確認
        セリフ: 他の医療機関からの紹介状はお持ちですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 紹介状なし
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 紹介元医療機関聞き取り
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 紹介元医療機関聞き取り
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: 再度聞き取りへ
          デフォルト: 有無を確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: count上記以外クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、や、「いいえ」、のような短い単語だけでは認識が難しいため、\n「はい持っています」、や、「いいえ持っていません」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介状有無の確認
      - 箱: 紹介状なし
        セリフ: "かしこまりました。\n他の医療機関からの紹介状をお持ちでない患者さんにつきましては、通常の診療費とは別に、初診時選定療養費として、7,000円を全額自己負担いただいております。予めご了承ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る
      - 箱: 紹介元医療機関聞き取り
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介元医療機関聞き取り_1
      - 箱: 紹介元医療機関聞き取り_1
        セリフ: 紹介状を発行した医療機関名をおっしゃってください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 聴き取り
      - 箱: 聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: count上記以外クリア
            - 判定: 数値以上
              入力: 上記以外9（5秒）＋紹介元医療機関なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 上記以外9（5秒）＋紹介元医療機関なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 上記以外2（約1秒）＋紹介元医療機関あり
              次の箱: 紹介元医療機関聴き取り完了
            - 判定: エンティティ含む
              入力: 上記以外2（約1秒）＋紹介元医療機関あり
              次の箱: 紹介元医療機関聴き取り完了
          デフォルト: count上記以外_1
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 3回質問済み
              次の箱: 再質問
          デフォルト: 再質問
      - 箱: 再質問
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 紹介元医療機関聞き取り_1
      - 箱: 紹介元医療機関聴き取り完了
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_戻る

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
