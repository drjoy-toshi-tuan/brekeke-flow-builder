flow:
  最初の箱: 用件を判断

  エンティティ定義:
    カスタム:
      - 名前: 間違い
        値:
          間違い: [違い, 違う, 間違え]
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 初めて
        値:
          初めて: [はじめて, 始めて]
      - 名前: 否定
        値:
          否定: [いいえ, いえ, いや, じゃない]
      - 名前: 分からない
        値:
          分からない: [ない, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]

  共通:
    箱一覧:
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: END_聞き取り不能（初診含む）
            - 判定: 数値以上
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
            - 判定: エンティティ含む
              入力: 2以上＋番号取得あり
              次の箱: 診察券番号桁数チェック
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
          デフォルト: 診察券確認
      - 箱: 診察券番号の聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 分からない
              次の箱: わからない セット
            - 判定: エンティティ含む
              入力: 数字
              次の箱: 診察券番号セット（発話）
            - 判定: 一致
              入力: シャープ
              次の箱: シャープ、トーン（アスタ）
            - 判定: 一致
              入力: トーン（アスタ）
              次の箱: シャープ、トーン（アスタ）
            - 判定: エンティティ含む
              入力: DTMF
              次の箱: 診察券番号セット（DTMF）
            - 判定: 発話あり
              入力: 発話あり
              次の箱: countクリア
          デフォルト: count上記以外
      - 箱: countクリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号桁数チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 9桁以上
              次の箱: END_聞き取り不能（初診含む）
            - 判定: lessEqual
              入力: 8桁以内
              次の箱: END_戻る
          デフォルト: END_聞き取り不能（初診含む）
      - 箱: 診察券番号の聞き取りへ
        セリフ: "診察券番号が分かる場合は、8桁以内で番号をおっしゃってください。\n分からない場合は『分からない』とおっしゃってください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 診察券番号セット（発話）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 8桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外_1
      - 箱: 診察券番号セット（DTMF）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 8桁取得
              次の箱: 診察券番号桁数チェック
          デフォルト: count上記以外_1
      - 箱: シャープ、トーン（アスタ）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取り
      - 箱: 用件を判断
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 新規予約
              次の箱: 診察券確認へ１
          デフォルト: 診察券番号の聞き取りへ
      - 箱: 診察券確認へ１
        セリフ: 診察券番号をお伺いします。
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券確認へ２
      - 箱: 診察券確認へ２
        セリフ: 当院でのご受診は初めてですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券確認
      - 箱: 診察券確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 診察券有り
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 診察券有り
            - 判定: エンティティ含む
              入力: 初めて
              次の箱: END_聞き取り不能（初診含む）
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_聞き取り不能（初診含む）
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_聞き取り不能（初診含む）
          デフォルト: count上記以外_2
      - 箱: 診察券有り
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号の聞き取りへ
      - 箱: わからない セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_分からない

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取り不能（初診含む）
        セリフ: none
        入力待ち: なし
      - 箱: END_分からない
        セリフ: none
        入力待ち: なし
