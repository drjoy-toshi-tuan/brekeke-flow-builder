flow:
  最初の箱: 用件の確認へ

  エンティティ定義:
    カスタム:
      - 名前: キャンセル
        値:
          キャンセル: [やめる, 取り消し, 取り消す, 取消]
      - 名前: もう一度
        値:
          もう一度: [もう一回]
      - 名前: もしもし
        値:
          もしもし: []
      - 名前: 確認
        値:
          確認: [お聞き, なくした, 教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 予約票]
      - 名前: 肯定
        値:
          肯定: [異常部, 丈夫, 大丈夫]
      - 名前: 新規
        値:
          新規: [はじめて, 禁忌, 写真, 終身, 初めて, 初診, 新規の予約, 新規予約, 新旧, 新契約, 新地, 新品, 千気]
      - 名前: 診察予約
        値:
          診察予約: [はい新薬, はじめて, 印刷, 禁忌, 再診, 最新, 撮りたい, 取りたい, 取得, 受診, 初めて, 初診, 新しい, 新たな, 新規, 新品, 新薬, 診察, 診察の予約, 診療予約, 定期, 入れたい, 予約する, 予約をお願い, 予約をしたい, 予約をする, 予約をとり, 予約をとる, 予約を撮り, 予約を撮る, 予約を取り, 予約を取る, 録りたい]
      - 名前: 定期受診
        値:
          定期受診: [H受信, H住信, PP, PT, T九百, はい新薬, 駅の, 駅受信, 景気, 警備, 再診, 最新, 三新薬, 主人, 正規, 停止受診, 定期, 定期受診予約, 定期予約, 提携, 入金, 入金自身, 平均, 容器自身, 利益受信]
      - 名前: 変更
        値:
          変更: [延期, 時間, 取り直したい, 取り直す, 日程, 日付, 判子, 平行, 並行, 別の, 変え]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]

  共通:
    箱一覧:
      - 箱: 用件の確認へ
        セリフ: "ご用件を、次の4つのうちの、いずれかでお話ください。\n「診察の予約を取る」「予約を変更する」「予約をキャンセルする」「予約を確認する」、\nそれでは、お話ください。"
        入力待ち: あり
        回答振り分け:
          デフォルト: 用件の確認
      - 箱: 用件の確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 予約以外
              次の箱: 予約以外
            - 判定: エンティティ含む
              入力: 予約確認
              次の箱: 用件セット_3
            - 判定: エンティティ含む
              入力: 予約変更
              次の箱: 用件セット
            - 判定: エンティティ含む
              入力: 予約キャンセル
              次の箱: 用件セット_1
            - 判定: エンティティ含む
              入力: 定期受診
              次の箱: 用件セット_4
            - 判定: エンティティ含む
              入力: 新規
              次の箱: 用件セット_2
            - 判定: エンティティ含む
              入力: 予約取得
              次の箱: 診察予約
            - 判定: エンティティ含む
              入力: もしもし
              次の箱: もしもし
            - 判定: エンティティ含む
              入力: もう一度
              次の箱: もう一度
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し
          デフォルト: 用件の確認
      - 箱: count上記以外_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_2
          デフォルト: 用件を確認
      - 箱: count上記以外_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count聞き直し_1
          デフォルト: 診療予約の分岐聞き取り
      - 箱: count聞き直し
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 2以下
              次の箱: 再度聞き取りへ
          デフォルト: END_用件取得できず
      - 箱: count聞き直し_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 2以下
              次の箱: 再度聞き取りへ_1
          デフォルト: END_用件取得できず
      - 箱: count聞き直し_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 2以下
              次の箱: 再度聞き取りへ_2
          デフォルト: END_用件取得できず
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 2以下
              次の箱: 否定
          デフォルト: END_用件取得できず
      - 箱: もしもし
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 4以上
              次の箱: END_用件取得できず
            - 判定: 数値以上
              入力: 2以上
              次の箱: もしもし２回目・3回目
          デフォルト: もしもし１回目
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n再度、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 再度聞き取りへ_1
        セリフ: "申し訳ございません。\nうまく聞き取りが出来ませんでした。\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察予約の分岐聞き取りへ
      - 箱: 予約以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_予約以外の用件
      - 箱: 予約変更へ進む
        セリフ: "ご予約の変更でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 新規予約へ進む
        セリフ: "新規のご予約でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約確認へ進む
        セリフ: "ご予約の確認でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 定期受診へ進む
        セリフ: "定期受診のご予約でよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 予約キャンセルへ進む
        セリフ: "ご予約のキャンセルでよろしいですか?"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件を確認
      - 箱: 再度聞き取りへ_2
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい」、や、「いいえ」、のような短い単語だけでは認識が難しいため、\n「はい大丈夫です」、や、「いいえ違います」、のように少し長めの言葉でお答えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約確認
              次の箱: 予約確認へ進む
            - 判定: 一致
              入力: 定期受診
              次の箱: 定期受診へ進む
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更へ進む
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 予約キャンセルへ進む
            - 判定: 一致
              入力: 新規予約
              次の箱: 新規予約へ進む
      - 箱: 用件セット
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約変更へ進む
      - 箱: 用件セット_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約キャンセルへ進む
      - 箱: 用件セット_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 新規予約へ進む
      - 箱: 用件セット_3
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約確認へ進む
      - 箱: 用件セット_4
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 定期受診へ進む
      - 箱: 用件を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: END_戻る
          デフォルト: count上記以外_1
      - 箱: 否定
        セリフ: 恐れ入りますが、再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: 診察予約
        セリフ: 診察のご予約ですね？
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察予約の分岐聞き取りへ
      - 箱: 診察予約の分岐聞き取りへ
        セリフ: 新規のご予約と定期受診のご予約の、どちらですか？
        入力待ち: なし
        回答振り分け:
          デフォルト: 診療予約の分岐聞き取り
      - 箱: 診療予約の分岐聞き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 定期受診
              次の箱: 用件セット_4
            - 判定: エンティティ含む
              入力: 新規
              次の箱: 用件セット_2
            - 判定: エンティティ含む
              入力: 予約確認
              次の箱: 予約確認へ
            - 判定: エンティティ含む
              入力: 予約変更
              次の箱: 予約変更へ
            - 判定: エンティティ含む
              入力: 予約キャンセル
              次の箱: 予約キャンセルへ
            - 判定: エンティティ含む
              入力: 否定
              次の箱: count再質問
          デフォルト: count上記以外_2
      - 箱: 予約確認へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット_3
      - 箱: 予約変更へ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット
      - 箱: 予約キャンセルへ
        セリフ: 失礼しました、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件セット_1
      - 箱: もしもし１回目
        セリフ: "はい、聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もしもし２回目・3回目
        セリフ: "はい、「もしもし」と聞こえております。\n恐れ入りますが、"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ
      - 箱: もう一度
        セリフ: "かしこまりました。\nそれでは、再度、ご案内いたします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件の確認へ

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_予約以外の用件
        セリフ: none
        入力待ち: なし
      - 箱: END_用件取得できず
        セリフ: none
        入力待ち: なし
