        値:
          定期受診: [受診予約, 循環器, 定期]
      - 名前: 日にちのみ
        値:
          日にちのみ: []
      - 名前: 分からない
        値:
          分からない: [ない, ません, わからない, わかりません, 解らない, 持っていない, 持ってない, 動かない, 分かりません]
      - 名前: 予約キャンセル
        値:
          予約キャンセル: [キャンセル, やめる, 取消]
      - 名前: 予約以外
        値:
          予約以外: [アクセス, お見舞い, くすり, じゃない, ではない, ではない, 違い, 違う, 飲み方, 会計, 行き方, 伺い, 質問, 処方箋, 書類, 症状, 証明書, 診断書, 病棟, 副作用, 文書, 聞きたい]
      - 名前: 予約確認
        値:
          予約確認: [その他, なくした, 確認, 教えて, 調べて, 分からない, 分からん, 紛失, 忘れた, 問い合わせ, 問合せ, 予約票]
      - 名前: 予約変更
        値:
          予約変更: [時間, 日程, 日付, 別の, 変え, 変更]

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n湘南鎌倉総合病院の、予約専用、AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: API_DRJOY_1
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 次へ
        セリフ: では次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日（0205 new）
      - 箱: 次へ_1
        セリフ: 続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号（0312 renew）
      - 箱: 用件の確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 予約確認
              次の箱: 予約確認の流れ
            - 判定: 一致
              入力: 定期受診
              次の箱: 定期受診の流れ
            - 判定: 一致
              入力: 予約変更
              次の箱: 予約変更の流れ
            - 判定: 一致
              入力: 新規予約
              次の箱: 新規予約の流れ
            - 判定: 一致
              入力: 予約キャンセル
              次の箱: 診療科判断
      - 箱: 次へ_2
        セリフ: それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 診察券有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 診察券無し
              次の箱: 次へ_3
            - 判定: 一致
              入力: 診察券有り
              次の箱: 連絡先電話番号聞き取りへ
      - 箱: 携帯電話番号チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
