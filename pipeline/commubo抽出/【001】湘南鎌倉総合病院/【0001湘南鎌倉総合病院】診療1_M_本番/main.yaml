              入力: 携帯電話取得あり
              次の箱: 完了フラグ
          デフォルト: 完了フラグ
      - 箱: 予約変更の流れ
        セリフ: "予約変更の申し込みを受付いたしました。\n日曜・祝日を除き、本日より3日以内に、担当者から折り返し電話連絡いたします。"
        入力待ち: なし
        回答振り分け:
