flow:
  最初の箱: 用件判別

  共通:
    箱一覧:
      - 箱: 理由の聴き取り
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 聴取内容チェック
      - 箱: 聴取内容チェック
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 発話あり
              入力: 発話あり
              次の箱: 無言クリア
            - 判定: 数値以上
              入力: 無言9（10秒）＋項目なし
              次の箱: 再質問の有無
            - 判定: 一致
              入力: 無言9（10秒）＋項目なし
              次の箱: 再質問の有無
            - 判定: 数値以上
              入力: 無言3（約3秒）＋項目あり
              次の箱: END_戻る
            - 判定: エンティティ含む
              入力: 無言3（約3秒）＋項目あり
              次の箱: END_戻る
          デフォルト: 無言on
      - 箱: 無言on
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴き取り
      - 箱: 無言クリア
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴き取り
      - 箱: 再度質問
        セリフ: 申し訳ございません。 うまく聞き取りが出来ませんでした。再度、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件判別
      - 箱: 再質問の有無
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 2回質問済
              次の箱: END_聞き取れず
          デフォルト: 再度質問
      - 箱: 確認内容聴取
        セリフ: ご確認内容についてお伺いします。 「次回の予約日時を教えて欲しい」など、内容を簡潔に仰って下さい。
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴き取り
      - 箱: 用件判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 変更
            - 判定: 一致
              入力: キャンセル
              次の箱: キャンセル
          デフォルト: 確認内容聴取
      - 箱: 変更
        セリフ: 今回の変更理由と、次回予約希望日をご自由にお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴き取り
      - 箱: キャンセル
        セリフ: キャンセル理由を簡単にお話ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由の聴き取り

  終了:
    箱一覧:
      - 箱: END_戻る
        セリフ: none
        入力待ち: なし
      - 箱: END_聞き取れず
        セリフ: none
        入力待ち: なし
