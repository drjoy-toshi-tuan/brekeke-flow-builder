flow:
  最初の箱: 冒頭

  エンティティ定義:
    カスタム:
      - 名前: 肯定
        値:
          肯定: [OK, いいです, オケー, そうそう, そうです, はーい, はい, よろしい, 今日, 大丈夫です。, 配送です, 本日, 明日, 翌診療日]
      - 名前: 否定
        値:
          否定: [いーえ, いいえ, ううん, じゃない, そうじゃない, ダメ, ちがう, ちゃうちゃう, ではない, 違います, 間違った]

  共通:
    箱一覧:
      - 箱: 有無を確認
        セリフ: none
        入力待ち: あり
        回答振り分け:
          条件:
            - 判定: エンティティ含む
              入力: 否定
              次の箱: 否定（体調不良ではない）
            - 判定: エンティティ含む
              入力: 否定（エンティティ）
              次の箱: 否定（体調不良ではない）
            - 判定: エンティティ含む
              入力: 肯定否定
              次の箱: 肯定（体調不良）
            - 判定: エンティティ含む
              入力: 肯定
              次の箱: 肯定（体調不良）
            - 判定: エンティティ含む
              入力: 肯定（エンティティ）
              次の箱: 肯定（体調不良）
          デフォルト: count上記以外
      - 箱: count上記以外
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: 5以上
              次の箱: count再質問
          デフォルト: 有無を確認
      - 箱: 再度聞き取りへ
        セリフ: "申し訳ございません。うまく聞き取りが出来ませんでした。\n「はい、そうです」、や、「いいえ、違います」、のように少し長めの言葉でお伝えいただけますか?\n再度、お伺いします。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 冒頭_1
      - 箱: 肯定（体調不良）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_体調不良
      - 箱: 否定（体調不良ではない）
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_該当しない
      - 箱: count再質問
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値以上
              入力: ３回以上
              次の箱: ３回聞き取れず
          デフォルト: 再度聞き取りへ
      - 箱: ３回聞き取れず
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_聴取失敗
      - 箱: 冒頭
        セリフ: まず初めに、
        入力待ち: なし
        回答振り分け:
          デフォルト: 冒頭_1
      - 箱: 冒頭_1
        セリフ: "今回のお問い合わせは、体調が悪くて本日診察を受けたい、もしくは、体調が悪くて予約を変更したいですか？\nはい、または、いいえ、でお答えください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 有無を確認

  終了:
    箱一覧:
      - 箱: END_該当しない
        セリフ: none
        入力待ち: なし
      - 箱: END_体調不良
        セリフ: none
        入力待ち: なし
      - 箱: END_聴取失敗
        セリフ: none
        入力待ち: なし
