flow:
  最初の箱: 現在の曜日と時間の取得

  共通:
    箱一覧:
      - 箱: 現在の曜日と時間の取得
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: テスト用
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 祝日チェック
      - 箱: 曜日の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: lessEqual
              入力: 平日（月〜金）
              次の箱: 時間の分岐
          デフォルト: END_時間外
      - 箱: 時間の分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 午前7時まで
              次の箱: END_時間外
            - 判定: 数値
              入力: 7時～20時
              次の箱: END_稼働中
          デフォルト: END_時間外
      - 箱: 時間の分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 8時半前
            - 判定: 数値
              入力: 8時半～17時15分
              次の箱: END_稼働中へ
          デフォルト: 年末年始
      - 箱: 祝日チェック
        セリフ: none
        説明: サブシナリオ「祝日チェック」を呼び出す
        回答振り分け:
          デフォルト: 曜日の分岐
      - 箱: 日付分岐
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 12月26日前
            - 判定: 一致
              入力: 12/26
              次の箱: 時間の分岐_1
            - 判定: lessEqual
              入力: 1/4（12/27，12/28，12/29、1/4）
              次の箱: 年末年始
      - 箱: 日付分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 1/4前（12/30，12/31，1/1，1/2，1/3）
              次の箱: 年末年始
      - 箱: 年末年始
        セリフ: 申し訳ございませんが、ただいまの時間は、年末年始のため受付時間外となっております。受付開始は2026年1月5日月曜日の朝8時30分からとなっております。恐れ入りますがおかけ直しください。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_年末年始

  終了:
    箱一覧:
      - 箱: END_祝日
        セリフ: none
        入力待ち: なし
      - 箱: END_稼働中
        セリフ: none
        入力待ち: なし
      - 箱: END_時間外
        セリフ: none
        入力待ち: なし
      - 箱: END_年末年始
        セリフ: none
        入力待ち: なし
      - 箱: END_稼働中へ
        セリフ: none
        入力待ち: なし
