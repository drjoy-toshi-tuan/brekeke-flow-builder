flow:
  最初の箱: API_DRJOY_CONTEXT_SETTINGS

  エンティティ定義:
    システム:
      - 名前: 日付
        id: sys_date
        説明: 通話相手の発話から「4月1日」「金曜日」などの日付を示す部分を抽出します。
      - 名前: 時刻
        id: sys_time
        説明: 通話相手の発話から「10時15分」などの時刻を示す部分を抽出します。
      - 名前: 数字
        id: sys_number
        説明: 通話相手の発話から「21」などの数字を示す部分を抽出します。
      - 名前: 人名
        id: sys_person
        説明: 通話相手の発話から「ヤマダタロウ」などの人名を示す部分を抽出します。

  共通:
    箱一覧:
      - 箱: 挨拶
        セリフ: "お電話ありがとうございます。\n徳島大学病院の、予約専用AI電話です。"
        入力待ち: なし
        回答振り分け:
          デフォルト: TEST番号登録
      - 箱: 切断待ち
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 切断待ち_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: 終話へ
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 次へ
        セリフ: ありがとうございます。続いて、
        入力待ち: なし
        回答振り分け:
          デフォルト: 生年月日聞き取り
      - 箱: 予約変更の流れ
        セリフ: 予約変更の申し込みを受け付け致しました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返し案内
      - 箱: 予約キャンセル
        セリフ: 予約キャンセルの申し込みを受け付け致しました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返し案内
      - 箱: 折り返し案内
        セリフ: "3診療日以内に、担当者から折り返し電話、もしくは、ショートメッセージにてご連絡いたします。\n休日、祝日を除いて３日以上連絡がなかった場合は、予約センターへ直接お電話ください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 予約確認
        セリフ: 予約に関するお問い合わせを受付いたしました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 折り返し案内
      - 箱: 終話
        セリフ: お電話ありがとうございました。それでは失礼いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断
      - 箱: 終話_1
        セリフ: お電話ありがとうございました。それでは失礼いたします。
        入力待ち: なし
        回答振り分け:
          デフォルト: END_切断_1
      - 箱: API_DRJOY
        セリフ: none
        説明: サブシナリオ「API_DRJOY」を呼び出す
        回答振り分け:
          デフォルト: 挨拶
      - 箱: 電話切断へ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 連絡先電話番号聞き取りへ
        セリフ: かしこまりました。最後に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 連絡先電話番号聞き取り
      - 箱: 完了フラグ
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件分岐_1
      - 箱: 診療科聞き取り
        セリフ: none
        説明: サブシナリオ「診療科聞き取り」を呼び出す
        回答振り分け:
          デフォルト: 代表案内判別
      - 箱: 患者氏名聞き取り
        セリフ: none
        説明: サブシナリオ「患者氏名聞き取り」を呼び出す
        参照ファイル: 患者氏名聞き取り.yaml
        回答振り分け:
          デフォルト: 次へ
      - 箱: 用件聞き取り
        セリフ: none
        説明: サブシナリオ「用件聞き取り」を呼び出す
        参照ファイル: 用件聞き取り.yaml
        回答振り分け:
          デフォルト: 用件分岐
      - 箱: API_DRJOY_CONTEXT_SETTINGS
        セリフ: none
        説明: サブシナリオ「API_DRJOY_CONTEXT_SETTINGS」を呼び出す
        回答振り分け:
          デフォルト: API_DRJOY
      - 箱: 生年月日聞き取り
        セリフ: none
        説明: サブシナリオ「生年月日聞き取り」を呼び出す
        参照ファイル: 生年月日聞き取り.yaml
        回答振り分け:
          デフォルト: 用件分岐_2
      - 箱: 予約日の聞き取り
        セリフ: none
        説明: サブシナリオ「予約日の聞き取り」を呼び出す
        回答振り分け:
          デフォルト: 理由へ
      - 箱: 連絡先電話番号聞き取り
        セリフ: none
        説明: サブシナリオ「連絡先電話番号聞き取り」を呼び出す
        参照ファイル: 連絡先電話番号聞き取り.yaml
        回答振り分け:
          デフォルト: 終話へ
      - 箱: 理由聴取
        セリフ: none
        説明: サブシナリオ「理由聴取」を呼び出す
        参照ファイル: 理由聴取.yaml
        回答振り分け:
          デフォルト: 予約日へ_1
      - 箱: はじめに
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 体調確認
      - 箱: 氏名 へ
        セリフ: ありがとうございます。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 患者氏名聞き取り
      - 箱: 診察券番号（Free）
        セリフ: none
        説明: サブシナリオ「診察券番号（Free）」を呼び出す
        参照ファイル: 診察券番号（Free）.yaml
        回答振り分け:
          デフォルト: 氏名 へ
      - 箱: 用件へ
        セリフ: ありがとうございます。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 用件聞き取り
      - 箱: 用件分岐
        セリフ: かしこまりました。続いて、
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: WEB利用
            - 判定: 一致
              入力: キャンセル
              次の箱: 診療科聞き取り
            - 判定: 一致
              入力: 確認
              次の箱: 理由聴取
          デフォルト: 理由聴取
      - 箱: 用件分岐_1
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 予約変更の流れ
            - 判定: 一致
              入力: キャンセル
              次の箱: 予約キャンセル
            - 判定: 一致
              入力: 確認
              次の箱: 予約確認
          デフォルト: 予約確認
      - 箱: 用件分岐_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 変更
              次の箱: 入電番号取得確認
            - 判定: 一致
              入力: キャンセル
              次の箱: 連絡先電話番号聞き取りへ
            - 判定: 一致
              入力: 確認
              次の箱: 連絡先電話番号聞き取りへ
          デフォルト: 連絡先電話番号聞き取りへ
      - 箱: 予約日へ
        セリフ: ありがとうございます。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 予約日の聞き取り
      - 箱: 予約日へ_1
        セリフ: ありがとうございます。それでは、
        入力待ち: なし
        回答振り分け:
          デフォルト: 診察券番号（Free）
      - 箱: 理由へ
        セリフ: ありがとうございます。次に、
        入力待ち: なし
        回答振り分け:
          デフォルト: 理由聴取
      - 箱: 時間外
        セリフ: "申し訳ございませんが、ただいまの時間は受付時間外となっております。\n受付時間は、土日祝日を除く、月曜日から金曜日の午前7時から午後20時となっております。\n恐れ入りますが、受付時間内にお掛け直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 年末年始
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 電話切断へ
      - 箱: 代表案内判別
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 放射線診断科
              次の箱: 代表へ
            - 判定: 一致
              入力: 放射線治療科
              次の箱: 代表へ
          デフォルト: 予約日へ
      - 箱: 代表へ
        セリフ: "申し訳ございません。\n<? $診療科の読み ?>\nは、AI電話では承ることができません。恐れ入りますが、専用番号にお掛け直し下さい。 電話番号がわかる場合は、お電話をお切りください。 お分かりにならない場合はご案内いたしますので、メモをご用意ください。\n"
        入力待ち: なし
        回答振り分け:
          デフォルト: 088-633-9071
      - 箱: 088-633-9071
        セリフ: 番号は、088-633-9071です。
        入力待ち: なし
        回答振り分け:
          デフォルト: 繰り返しカウント
      - 箱: 繰り返しカウント
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 数値
              入力: 3回
              次の箱: 電話切断へ
          デフォルト: 繰り返し
      - 箱: 繰り返し
        セリフ: 繰り返します。
        入力待ち: なし
        回答振り分け:
          デフォルト: 088-633-9071
      - 箱: TEST番号登録
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 05017070320
              次の箱: はじめに
            - 判定: 一致
              入力: 05017074509
              次の箱: はじめに
            - 判定: 一致
              入力: 08059292927
              次の箱: はじめに
            - 判定: 一致
              入力: 0886339982
              次の箱: はじめに
            - 判定: 一致
              入力: 09052783467
              次の箱: はじめに
            - 判定: 一致
              入力: 07065860009
              次の箱: はじめに
            - 判定: 一致
              入力: 0886337033
              次の箱: はじめに
            - 判定: 一致
              入力: 0886339377
              次の箱: はじめに
            - 判定: 一致
              入力: 0886337306
              次の箱: はじめに
            - 判定: 一致
              入力: 0886339629
              次の箱: はじめに
            - 判定: 一致
              入力: 09043338126
              次の箱: はじめに
            - 判定: 一致
              入力: 川尻さん社用：08044172576
              次の箱: はじめに
            - 判定: 一致
              入力: 鈴木さん携帯：08043459990
              次の箱: はじめに
            - 判定: 一致
              入力: 黒岩さん：08044220245
              次の箱: はじめに
          デフォルト: 時間判断
      - 箱: 終話（体調相談に該当するため）
        セリフ: "申し訳ございません。\n体調に関するご予約の相談や連絡は、恐れ入りますが、予約されている外来診療科へ直接おかけ直しください。"
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_2
      - 箱: 終話_2
        セリフ: none
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話
      - 箱: 電話番号②
        セリフ: かしこまりました。お電話終了後にショートメッセージにてWEB予約ページをお送りいたしますのでご確認ください。
        入力待ち: なし
        回答振り分け:
          デフォルト: 終話_1
      - 箱: WEB利用
        セリフ: none
        説明: サブシナリオ「WEB利用」を呼び出す
        参照ファイル: WEB利用.yaml
        回答振り分け:
          デフォルト: 電話番号②
      - 箱: 携帯番号
        セリフ: none
        説明: サブシナリオ「携帯番号」を呼び出す
        参照ファイル: 携帯番号.yaml
        回答振り分け:
          デフォルト: 電話番号②
      - 箱: 体調確認
        セリフ: none
        説明: サブシナリオ「体調確認」を呼び出す
        参照ファイル: 体調確認.yaml
        回答振り分け:
          デフォルト: 用件へ
      - 箱: かしこまりました。
        セリフ: かしこまりました。
        入力待ち: なし
        回答振り分け:
          デフォルト: 完了フラグ
      - 箱: 時間判断
        セリフ: none
        説明: サブシナリオ「時間判断」を呼び出す
        参照ファイル: 時間判断.yaml
        回答振り分け:
          デフォルト: はじめに
      - 箱: 入電番号取得確認
        セリフ: none
        入力待ち: なし
        回答振り分け:
          条件:
            - 判定: 一致
              入力: 入電番号未取得
              次の箱: 連絡先電話番号聞き取りへ
          デフォルト: かしこまりました。

  終了:
    箱一覧:
      - 箱: END_切断
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち
      - 箱: END_切断_1
        セリフ: none
        入力待ち: あり
        回答振り分け:
          デフォルト: 切断待ち_1
