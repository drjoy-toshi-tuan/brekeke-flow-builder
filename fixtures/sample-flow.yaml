flow:
  name: "予約確認フロー"
  start: greet
  nodes:
    - id: greet
      type: announce
      text: "お電話ありがとうございます。ご用件をお選びください。"
      next: main_menu
    - id: main_menu
      type: input
      inputType: STT_DTMF
      voiceType: NUMBER
      retryCount: 2
      announce: "予約は1、変更は2を押してください。"
      next: classify
    - id: classify
      type: condition
      branches:
        - when: "input == '1'"
          to: reserve
        - when: "input == '2'"
          to: change
        - default: fallback
    - id: reserve
      type: announce
      text: "予約受付に進みます。"
      next: end
    - id: change
      type: announce
      text: "変更受付に進みます。"
      next: end
    - id: fallback
      type: announce
      text: "もう一度お選びください。"
      next: main_menu
    - id: end
      type: hangup
